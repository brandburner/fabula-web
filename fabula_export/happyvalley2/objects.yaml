- fabula_uuid: ger_object_d33a77a893f9
  global_id: ger_object_d33a77a893f9
  canonical_name: John Wadsworth's Mobile Phone
  description: "\n  John Wadsworth's mobile phone is a central object in his psychological\
    \ unraveling, serving as both a tool for covert communication and a vessel for\
    \ blackmail. It plays a pivotal role across multiple episodes, evolving from a\
    \ personal device to a symbol of his guilt, desperation, and toxic entanglements.\n\
    \n  **Day 5 (S02E01):**\n  - Gripped tightly near the newsagents at **15:45**\
    \ after scratching a losing lottery ticket, used to call his mother with feigned\
    \ calm to conceal shame and blackmail fears (noted by Ann Gallagher).\n  - Later\
    \ in **Vicky Fleming’s flat**, exploited by Vicky for its stored data—compromising\
    \ photos from his drugged affair blackout—and used to download his contacts (family,\
    \ colleagues, daughter’s teacher) for extortion. John attempts to buy it back\
    \ for £1,000 (stolen from his mother).\n  - Receives alarms, frantic texts from\
    \ Amanda, and explicit blackmail images from a blocked number, all while serving\
    \ as a physical tether to his spiraling guilt.\n\n  **Day 6 (S02E01):**\n  - Used\
    \ to call Vicky with strained enthusiasm at **11:12**, confirming a visit to her\
    \ home and revealing the toxic undertones of their bond.\n\n  **Day 17 (S02E06):**\n\
    \  - Slipped into his pocket in the **H-MIT office**, disheveled and dodging Jodie’s\
    \ gaze. Paired with wallet checks and a fake cold-med excuse, his haste betrays\
    \ flight plans and underscores his isolation. The device marks a fracture in trust\
    \ within the H-MIT unit and foreshadows his self-betrayal.\n\n  Throughout, the\
    \ phone embodies John’s duality: a tool for both connection (e.g., calls to family)\
    \ and destruction (e.g., blackmail, affair evidence). Its presence across episodes\
    \ highlights his unraveling mental state and the inescapable consequences of his\
    \ actions.\n  "
  purpose: Receiving secret text messages tied to John's concealed affair
  significance: The blackmail text shatters John's facade of normalcy, triggers his
    covert exit from family dinner, and propels him toward confrontation with Vicky
    Fleming, exposing his double life.
  potential_owner_mention: John Wadsworth
  potential_owner_uuid: null
  season_appearances:
  - 2
  local_uuids:
    1: object_e67cbd813023
  first_appearance_season: 2
  tier: planet
