    Wrapping)
  description: Sixty sandbags unloaded from a builder’s truck and stacked near the
    old barn at Upper Lighthazels Farm. The bags appear to contain ordinary construction
    sand but conceal compressed blocks of cannabis resin, each tightly wrapped in
    clear polythene sheeting. During unloading, one bag splits open amid children's
    kite play, spilling the resin blocks and exposing the drugs. The wrapping's visibility
    underscores premeditated hiding. Ashley Cowgill supervises the unloading, initially
