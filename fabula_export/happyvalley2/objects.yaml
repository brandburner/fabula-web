- fabula_uuid: ger_object_50e03ca35342
  global_id: ger_object_50e03ca35342
  canonical_name: Catherine Cawood's Handheld Police Radio
  description: "\n        Catherine Cawood's handheld police radio is a critical field\
    \ communication device used across multiple high-stakes incidents in **Happy Valley\
    \ S02**. The radio serves as her lifeline for **emergency medical response**,\
    \ **forensic coordination**, **suspect intel/confession relay**, **operational\
    \ warnings**, and **pursuit directives**, demonstrating her role as a field officer\
    \ navigating chaotic, high-pressure scenarios.\n\n        **Key Usage Scenarios:**\n\
    \        1. **Day 15 (Norland Road Police Station):** Receives dispatch for a\
    \ Sowerby Bridge disturbance (semi-naked man banging doors outside a pub) while\
    \ masking unease from recent murders and Tommy Lee Royce's threat over Ryan.\n\
    \        2. **Day 16 (Far Sunderland Farm):** Used in two distinct locations:\n\
    \           - **Inside the blood-drenched kitchen**, where she directs Shafiq\
    \ Shah to secure the scene, summons medical aid/forensics for **Alison Garrs'\
    \ overdose** and **Daryl Garrs' shotgun death**, and transmits updates to **operator\
    \ Bravo November four-five**.\n           - **Outside Far Sunderland Farm**, where\
    \ she relays **Alison Garrs' overdose collapse**, **Daryl Garrs' murder confession**,\
    \ and flags the **red Peugeot's tie to Operation Syracuse** while coordinating\
    \ with Shafiq.\n        3. **Day 17:**\n           - **Norland Road Police Station:**\
    \ Transmits a **cryptic alert to Mike Barnes** (overheard by Jodie and Andy in\
    \ H-MIT) about **Tommy Lee Royce's tightening threat**.\n           - **Sowerby\
    \ Bridge Station:** Broadcasts **John Wadsworth's dash onto the tracks** toward\
    \ an oncoming train and receives the directive *'DO NOT follow four-five'* over\
    \ static.\n\n        **Purpose:** The radio underscores Catherine's professional\
    \ strain, her constant pull between duty and dread, and her role as a field officer\
    \ in Sowerby Bridge's violent, supernatural-tinged chaos.\n      "
  purpose: Field communication with dispatch for emergency medical response, forensic
    coordination, and urgent operational alerts
  significance: Catherine wields the radio to defy protocol at the farm, dragging
    Alison to safety before backup arrives and exposing her prioritization of life
    over evidence preservation. The Day 17 transmission jolts the team into action
    against Royce's network, amplifying stakes in the Vicky Fleming murder probe and
    underscoring institutional urgency amid personal peril.
