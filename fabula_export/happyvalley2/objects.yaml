    with a dim electric light, revealing the damp concrete floor marked with blood
    spatters, whitewashed walls bearing stains, an isolated wooden chair, scattered
    masking tape fragments, and Ann Gallagher''s discarded knickers. The light plays
    a critical role in two key scenes: (1) Catherine Cawood''s discovery of the cellar''s
    horrors after smashing the padlock, and (2) Tommy Lee Royce''s methodical preparation
    of the space for Ann Gallagher''s assault, where the weak glow exposes the concrete
    floor, unzipped sleeping bag, gaffer tape, and wooden chair. The light''s dimness
    heightens the psychological tension in both scenes, tying Royce''s violence to
    Catherine''s investigative pursuit.'
