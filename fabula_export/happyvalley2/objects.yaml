  description: "\n        Lewis Whippey's Xbox console in the Milton Avenue sitting\
    \ room, used as a narrative prop during tense moments. The console plays a key\
    \ role in Day 5 of the Milton Avenue sitting room scene, where Lewis carries it\
    \ into the room, clutching it casually as he confronts Tommy Lee Royce over Ann\
    \ Gallagher's cellar captivity. The paused video game on its screen serves as\
    \ a focal point for Lewis's emotional state—his defiance of Tommy's orders (e.g.,\
    \ continuing to play despite being told to leave) and his moral reckoning amid\
    \ the safe house's escalating tension. The console's paused state mirrors Lewis's\
    \ internal conflict, symbolizing his stalled actions and unresolved guilt over\
    \ Ann's assault and his complicity in the kidnapping. Two days later, the console\
    \ is found discarded outside the house with a TV and dirty plates, signaling recent\
    \ occupation by the kidnappers but failing to reveal Ann's muffled screams from\
    \ below.\n      "
  purpose: Video game console
  significance: Lewis grips the Xbox as a marker of his initial domestic ease before
    moral fracture over Ann's treatment. Discarded outside by Day 7, it tips Catherine
    to the house's use as a hideout, amplifying irony as she stands feet from the
    bound victim without hearing her.
