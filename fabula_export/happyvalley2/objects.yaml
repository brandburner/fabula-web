    Ilinka and their families. These include **fabricated family letters** (mimicking
    updates and money transfers) and **wage transfer records** (falsely showing remittances
    sent home). Victims cling to these documents, believing their exploitation is
    temporary, while the Knezevics use them to crush resistance and maintain control.
    Catherine Cawood explains these tactics to Winnie in her Norland Road office,
    highlighting their role in trapping victims in psychological and physical captivity.
    The deception extends to wage records, which further isolate victims by pretending
    their labor benefits their families abroad.
  purpose: Deceive trafficked women into believing their families receive news and
    payments, ensuring compliance
  significance: Psychological anchor in Knezevics' trafficking scheme; Catherine's
    revelation to Winnie exposes operational ruthlessness and fuels her outrage amid
