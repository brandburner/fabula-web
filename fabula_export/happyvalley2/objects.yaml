  description: The original £1 million cash ransom demanded by Ann Gallagher's kidnappers,
    revealed to Kevin Weatherill by Nevison Gallagher in a tense confrontation in
    Nevison's Bentley. This demand serves as the inciting incident for the kidnapping
    plot, creating immediate tension between Kevin and Jenny Weatherill due to forensic
    risks (fingerprints) and threatening their cover story. It is the baseline ransom
    tied to the kidnapping itself, distinct from later escalations.
