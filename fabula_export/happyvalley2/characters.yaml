  global_id: ger_agent_cd5f706895af
  canonical_name: Brunhilde
  title_role: null
  description: Brunhilde is a **civilian figure and H-MIT team member** at Norland
    Road Police Station, serving as a key figure in West Yorkshire Police's murder
    investigations. Her **alibi clears her from involvement in Mr. Shepherd's death**,
    verified through contacts like Joyce and delivered by probationary constable Ann
    Gallagher to Sergeant John Wadsworth. Known for her **commanding presence and
    authoritative style**, she is nicknamed *Miss Trunchbull* by John Wadsworth (a
    reference to Roald Dahl's *Matilda*), reflecting her imposing yet respected demeanor.
    Positioned on the **investigation's periphery**, she connects witnesses, officers,
    and suspects—including Inspector Taylor and Jodie Shackleton—while her **unwavering
    professionalism** subtly redirects scrutiny amid the team's tense dynamics. Her
    role demands sharp focus, and her interactions with colleagues (e.g., Ann Gallagher,
    Andy Shepherd, John Wadsworth) shape the team's cohesion and investigative approach.
