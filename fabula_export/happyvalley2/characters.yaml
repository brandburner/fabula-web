    Cawood, Joyce, and others on patrols, scene management, and urgent responses.
    Known for his reliability, empathy, and humor, Shafiq coordinates teams, secures
    sites, and calms distressed individuals. His banter eases team tension, and his
    professionalism sustains him through frontline pressures. He is also part of Catherine
    Cawood's broader social and professional circle, attending intimate family events
    and providing support during relational strains. His role extends beyond policing
    to include quiet camaraderie with neighbors like the Gallaghers.
