  canonical_name: Marcus Gascoigne
  title_role: Councillor
  description: Marcus Gascoigne serves as a councillor in Todmorden, where he wields
    political influence to evade accountability. Sergeant Catherine Cawood arrested
    him for cocaine possession after a traffic crash, but damaged evidence—seized
