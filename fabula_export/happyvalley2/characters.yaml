- fabula_uuid: ger_agent_7e114a90dce7
  global_id: ger_agent_7e114a90dce7
  canonical_name: Rebecca Cawood
  title_role: null
  description: Becky Cawood serves as the deceased daughter of Sergeant Catherine
    Cawood, sister to Daniel Cawood and Clare Cartwright, and mother to Ryan Cawood.
    Her suicide at age 18, precipitated by the rape by Tommy Lee Royce, serves as
    the emotional and narrative catalyst for Catherine's grief, guilt, and quest for
    justice. Becky entered a relationship with Royce at age 17, which exploited her
    youth and inexperience, culminating in her unprepared motherhood and eventual
    suicide. Her death fractures the Cawood family—triggering Catherine's grief-driven
    protectiveness, Daniel's emotional withdrawal, and Clare's stabilizing role amid
    shared loss. Becky embodies the personal cost of violence in their close-knit
    Hebden Bridge world and exists only in flashbacks, memories, and indirect narrative
    impact. She died six weeks after Ryan's birth, transforming his birthday into
    a day of profound family mourning.
