  title_role: Police Control Room Operator
  description: Radio Dispatcher works from the West Yorkshire Police control room
    in Hebden Bridge. He coordinates field officers like Sergeant Catherine Cawood
    during crises, kidnappings, and standoffs. He relays threats, protocols, and instructions
    via radio with procedural efficiency. Detached and bureaucratic, he delivers acknowledgments
    in a calm tone that sustains operational tempo without emotional involvement.
    Frequent contacts include patrol sergeants and response units, underscoring his
    central role in linking control room directives to on-scene actions.
