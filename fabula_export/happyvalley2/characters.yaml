- fabula_uuid: ger_agent_21684a48474d
  global_id: ger_agent_21684a48474d
  canonical_name: Field Police Officers (Including Unnamed Constables)
  title_role: null
  description: Field Police Officers comprise the broader operational personnel of
    West Yorkshire Police, including both named and unnamed constables, who support
    frontline policing around Norland Road Station. They respond to high-priority
    alerts (e.g., Code Zero) via radio, coordinating with lead officers such as Sergeant
    Catherine Cawood, PC Shafiq, and PC Twiggy during station-wide mobilizations.
    Their roles include rapid acknowledgment, deployment support, suspect restraint,
    and logistical coordination (e.g., vehicle access for transport). While some officers
    (like the unnamed constable) operate with professional detachment—focusing on
    efficient task execution without personal engagement—others contribute to broader
    collective response capacity through reliable communication and action. Steady
    and procedural, they anchor the force's emergency response system.
