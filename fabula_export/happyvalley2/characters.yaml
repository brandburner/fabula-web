  canonical_name: H-MIT Operational Team (Briefing & Field Officers)
  title_role: null
  description: The H-MIT Operational Team serves as the core investigative unit of
    West Yorkshire Police's Homicide and Major Incident Team, comprising 30-40 officers
    who assemble for high-stakes briefings (e.g., at Norland Road Police Station)
    during critical murder probes. Under the direction of senior leaders like Detective
    Superintendent Andy Shepherd, Detective Inspector Mike Taylor, and Detective Sergeant
    Jodie Shackleton, they execute methodical investigative tasks—including CCTV analysis,
    house-to-house searches, and forensic support—while maintaining strict discipline
    and professionalism. Their collective focus ensures operational momentum, translating
    strategic directives into fieldwork and linking local crimes to broader investigative
    patterns. The team's presence is pivotal in anchoring complex cases linked to
    ongoing threats, with their collective expertise providing the manpower for systematic
    pursuit of suspects.
