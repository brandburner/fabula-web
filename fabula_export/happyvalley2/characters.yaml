  canonical_name: Psychologist
  title_role: Psychotherapist
  description: Catherine Cawood's psychotherapist (referred to as both 'Therapist'
    and 'Psychologist' in the narrative) conducts mandatory sessions to assess her
    fitness for duty after a traumatic event. He specializes in high-stress police
    officers, using calm persistence and strategic silence to probe violent impulses,
    family tensions, repressed grief over her daughter's suicide, and fixation on
    Tommy Lee Royce. Kind yet objective, he maintains analytical detachment to elicit
    admissions of sadness and rage that Catherine buries under sarcasm and stoicism.
    His evaluations influence her professional standing amid personal crises. The
    entity is consistently portrayed as a single individual despite the use of both
    'Therapist' and 'Psychologist' in the narrative.
