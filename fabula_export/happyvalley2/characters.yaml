    tiger kidnappings, and high-stakes interrogations**. As the **on-call leader**,
    they handle **urgent escalations** from local police, coordinating rapid responses
    to live abductions and mobilizing national-level resources. **Catherine Cawood**
    contacts them directly for high-priority cases, placing them at the center of
    multi-agency efforts. Their authority ensures **procedural rigor** and enables
    the **efficient documentation of suspect statements, alibis, and evidence** (e.g.,
    via iPad logging during interrogations). They support **lead investigators like
    Phil Crabtree** in psychological tactics and case advancement against figures
    like **Kevin Weatherill** and **Tommy Lee Royce**. Their role bridges **strategic
    oversight** and **tactical execution**, ensuring seamless coordination between
    **NCA operations and frontline police work**.
