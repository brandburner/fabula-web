    village''s steep, twisting roads—particularly the route to Hebden Bridge—amplify
    themes of isolation and peril, as seen in Catherine Cawood''s frantic high-speed
    chase. The graveyard contains key narrative sites: Becky''s grave (central to
    Ryan''s mourning and Catherine''s confrontation with inherited trauma) and Sylvia
    Plath''s grave (discovered by Ryan). The village''s layout and atmosphere (solenm
    burial grounds, perilous paths under gray skies) reinforce its role as a space
    of raw emotion and inherited trauma, while also serving as a launchpoint for Catherine''s
    desperate, high-stakes pursuits.'
