- fabula_uuid: ger_location_d2a5efa74f1e
  global_id: ger_location_d2a5efa74f1e
  canonical_name: Norland Road Police Station – Corridor Outside Inspector’s Office
  description: |-
    The Norland Road Police Station serves as a critical institutional hub in the series, depicted through multiple narrative lenses. Its fluorescent-lited corridors and clinical interview rooms facilitate urgent forensic work (e.g., rape evidence kits for Leonie) and victim interviews under Catherine's supervision, emphasizing procedural rigor. The station includes:

          - **Front Desk**: A public counter where civilians report urgent cases (e.g., Graham Tattersall demanding to share Victoria Fleming details on Day 17). Joyce maintains procedural calm here, handling interpersonal exchanges, radio interruptions, and quiet emotional beats (e.g., Joyce's solitary cactus). This space bridges station staff and outsiders in the daily grind of investigations.

          - **Catherine’s Office**: A compact workspace for paperwork and crisis management (e.g., Joyce’s interruption about Daryl Garrs).

          - **The Little Room**: A cramped, high-pressure **interrogation/DNA processing room** where tense confrontations occur (e.g., Daryl’s violent resistance during a forced DNA swab, with Shaf and the Custody Sergeant present).

          - **Witness Interview Rooms**: Separate rooms (e.g., where Catherine interviews Graham Tattersall on Day 17 at 08:25) with sparse furnishings—a table, chairs—under fluorescent lights. These rooms serve as pressure points for investigative pivots, channeling institutional procedure into critical exchanges (e.g., Tattersall's testimony testing internal leads against external evidence). The air in these spaces is thick with anticipation, as seen in the hushed corridor interactions with Ann Gallagher.

          The station also functions as an operational center for daily police work—cluttered desks, ringing phones, and tense exchanges—while occasionally acting as a temporary holding facility (e.g., rerouting suspects like Daryl Garrs during Halifax Bridewell's capacity issues). The space reflects both the bureaucratic strains of institutional policing and Catherine's personal commitment to enforcing proper procedure amid systemic neglect.
  location_type: Police Station Corridor
  parent_location_uuid: null
  season_appearances:
  - 1
  - 2
  local_uuids:
    1: location_2cd3a5e450bc
    2: location_0edf031a0291
