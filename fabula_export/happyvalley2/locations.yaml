  canonical_name: Huddersfield Christian Mission
  description: |-
    The primary worship space within the Huddersfield Christian Mission, encompassing multiple functional areas:
          1. **Main Sanctuary**: Characterized by stained glass windows filtering light into a solemn atmosphere, with rows of chairs and an altar. This space serves as a bastion of spiritual authority and stands adjacent to the Methodist café, separated by glass doors. It is a threshold between public chaos (the busy main street) and private introspection, where characters navigate faith, hidden violence, and grief.
          2. **Chapel Area**: A smaller, intimate space (10 chairs in a semi-circle around a small altar) where vulnerable conversations occur, such as Helen revealing her cancer to Clare.
          3. **Side Room**: A tucked-away, narrow room accessed via a corridor from the café. This space promises secrecy, with walls muffling sounds from the main sanctuary. It serves as a potential bolt-hole for characters like Clare searching for witnesses or avoiding attention.
          Outside, Halifax's busy main street hums with indifferent traffic, contrasting with the mission's internal tensions.
  location_type: Charitable Mission Canteen
