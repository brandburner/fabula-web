  canonical_name: House on Milton Avenue (including cellar)
  description: "\n        A **semi-detached house on Milton Avenue, Sowerby Bridge**,\
    \ serving as the primary site of Ann Gallagher’s abduction and confinement. The\
    \ structure sags in poor repair, its rundown facade blending into the bleak residential\
    \ street. **Interior details**:\n        - **Ground floor**: Dim, cluttered spaces\
    \ where Tommy shoulders Ann’s sleeping-bag bundle across the threshold, sealing\
    \ her abduction within the house.\n        - **Cellar**: A cold, damp, whitewashed\
    \ prison beneath the house, stripped bare and outfitted with a lone chair (for\
    \ Ann), meager supplies (lager, water, chocolate, Doritos, a bucket), and a grilled\
    \ window. The cellar amplifies Ann’s helplessness, with its mildew-stench and\
    \ muffled whimpers contrasting the kidnappers’ casual cruelty.\n        The house’s\
    \ **two-level layout** (ground floor + cellar) is critical to the narrative, transitioning\
    \ from the abduction scene above to Ann’s prolonged confinement below.\n      "
