  canonical_name: Upper Lighthazels Farm (Ashley Cowgill's Farm)
  description: Upper Lighthazels Farm (also known as Ashley Cowgill's Farm), a sprawling
    rural estate in Soyland, serves as a site of stark contrasts between innocence
    and criminal activity. The restored farmhouse and sunlit fields create an idyllic
    facade, where children play and builders renovate outhouses, while the property's
    hidden layers—such as the cannabis resin in the scaffolded barn and its role as
    a remote headquarters for kidnapping operations—reveal its darker purpose. The
    farmhouse, where Ashley Cowgill leads Kevin Weatherill inside to discuss the 'rental,'
    serves as a key location for tense interactions and psychological manipulation.
    The farm's isolation and outbuildings facilitate discreet coordination, with the
    tension between renovation (symbolizing legitimacy) and criminal schemes (e.g.,
    phone handovers, packing cars under watchful eyes) defining its narrative duality.
