  canonical_name: Mrs. Beresford’s Office (Ryan’s School)
  description: Ryan’s school serves as the institutional hub of his childhood, encompassing
    both its physical spaces (classrooms, corridors, restrooms) and the social dynamics
    that unfold within them. The sunlit classroom (where Mrs. Mukherjee reads *The
    Railway Children*) is one of its key components, a space where routine lessons
    intersect with tense family confrontations and Ryan’s internal struggles. The
    school’s corridors echo with shouts and petty battles (e.g., Max Higgins hoarding
    paper towels), while its restrooms become sites of unfair accusations and early
    lessons in justice. The school’s broader environment—including adjacent streets—anchors
    Ryan’s world of small betrayals, daily grit, and the looming presence of Tommy
    Lee Royce. Its calm facade masks deeper tensions, from absent fathers to feral
    outbursts, all of which shape Ryan’s formative experiences.
  location_type: School Headteacher's Office
