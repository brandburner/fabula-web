  canonical_name: Winnie’s House
  description: 'Winnie’s House is a trusted refuge in Hebden Bridge where Catherine
    Cawood drops her professional guard. The property includes multiple functional
    spaces: the main living area (where Catherine announces ''Only me, Winnie!'' and
    Ilinka calls family), the dimly lit hallway (hosting guarded departures and tender
    exchanges), and the cozy kitchen (where Ilinka recovers and Winnie shares life
    stories). Fears of pursuers prompt an alarm installation, transforming the quiet
    terrace house into a guarded haven. The space bridges domestic intimacy with external
    threats, where emotional warmth collides with investigative urgency—most notably
    in the kitchen scene where Ilinka''s recovery is disrupted by the Knezevic traffickers''
    photo.'
