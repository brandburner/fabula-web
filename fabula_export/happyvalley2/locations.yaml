  canonical_name: Frances’s House (Including Kitchen)
  description: "\n  The cramped, emotionally charged interior of Frances Drummond's\
    \ Hebden Bridge home, where domestic life and violent intent collide. The space\
    \ encompasses both the main living area (with unpacked suitcases, framed photos\
    \ of Jesus/Tommy/Ryan, and a petrol bomb) and the kitchen (where Frances meticulously\
    \ prepares a petrol bomb in a milk bottle). The house serves as a physical manifestation\
    \ of Frances's psychological state: the living area reflects her rootless instability\
    \ (unpacked suitcases, divided loyalties), while the kitchen becomes the site\
    \ of her calculated violence. Tea steams in the living area as she oscillates\
    \ between domestic pretense and destructive potential, while the kitchen—filled\
    \ with the sharp tang of fuel—marks her irreversible turn toward action. The house's\
    \ layout (living area + kitchen) and its objects (petrol bomb, milk bottle, photos)\
    \ create a cohesive narrative space where personal history and violent intent\
    \ intertwine.\n  "
