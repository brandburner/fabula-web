    with implied front-desk access like Norland Road''s—glass screens, tea offers,
    private offices—but its remoteness amplifies his panic and her urgency to keep
    him local. The mention carries tension: a safer bet for evasive witnesses, yet
    one that tests trust in her immediate empathy amid stammered fears.'
