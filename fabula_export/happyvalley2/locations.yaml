- fabula_uuid: ger_location_287df2d76e84
  global_id: ger_location_287df2d76e84
  canonical_name: Park Wood Crematorium (Elland Crematorium)
  description: |-
    Park Wood Crematorium (also known as Elland Crematorium) serves as the primary venue for Lynn Dewhurst's funeral in *Happy Valley* S02E02, where Tommy Lee Royce attends under armed escort and handcuffs. The site comprises three key functional areas:
      1. **Main Crematorium Building**: Hosts the funeral service, where emotional and procedural tensions peak (e.g., Tommy's outburst, Catherine Cawood's observation of Frances Drummond).
      2. **Car Park (Park Wood Crematorium Car Park)**: A clustered gathering space for vehicles (hearse, saloon cars, police vehicles) and mourners, where Catherine parks at a distance to observe Tommy's covert glance.
      3. **Chapel Side Door**: A narrow exit used to remove Tommy Lee Royce after his screams disrupt the service, channeling his fury away from mourners. Daylighting cuts sharp angles across the threshold, underscoring the shift from public grief to isolated restraint.

    The site carries symbolic weight as a nexus for procedural controls, emotional strain, and the intersection of justice and personal loss, including the cruel coincidence of Ann Gallagher scheduling her mother's service here soon after Lynn Royce's funeral.
  location_type: Town Crematorium
  parent_location_uuid: ger_location_e323caf6fd48
