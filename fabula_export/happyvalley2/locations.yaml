- fabula_uuid: ger_location_ff6518c32461
  global_id: ger_location_ff6518c32461
  canonical_name: St. Marks Junior School (Ryan’s School)
  description: |-
    A junior school (referred to as both *St. Marks Junior School* and *Ryan’s School* in narrative context) where Ryan attends classes. The school serves as a central location for the unfolding drama involving Catherine’s investigation into Frances Drummond’s false identity as a teaching assistant, her grooming of Ryan toward Tommy Lee Royce’s network, and the broader exposure of family secrets. **Key sub-locations include:**
      - **Classroom**: Children work at desks in this functional space where Frances Drummond circulates among students, offering one-on-one help until Mrs. Beresford intervenes.
      - **Corridor**: A **staff and visitor thoroughfare** connecting classrooms, offices, and the entrance. Catherine navigates this space to confront Mrs. Beresford, while Beresford intercepts Frances here, steering her toward the office.
      - **Staff Room**: A **shared faculty space** inside the school where coats and personal items are stored. The second detective fetches Frances Drummond’s coat from here during her arrest, injecting tension into this routine hub.
      - **Morning routines**: Children stream through front doors amid parental drop-offs and playground chatter.
      - **Catherine’s confrontation**: Catherine arrives with Ryan, fabricates pretexts to enter, and storms Mrs. Beresford’s office with CCTV evidence accusing staff of grooming.
      - **Frances Drummond’s arrest**: Detectives arrest Frances inside the office for her false identity as a teaching assistant.
      - **Playground revelations**: Conversations force Catherine to confront explanations of Ryan’s parentage, while Beresford deflects to his academic gains.
      - **Institutional vulnerability**: The school’s routines mask simmering threats to Ryan’s safety, with Clare offering (but Catherine redirecting) direct intervention.
  location_type: Junior School
  parent_location_uuid: null
  season_appearances:
  - 2
  local_uuids:
    1: location_c9b549851d7d
  first_appearance_season: 2
  tier: planet
