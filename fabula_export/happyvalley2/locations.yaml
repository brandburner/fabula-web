- fabula_uuid: ger_location_e4d03ce77435
  global_id: ger_location_e4d03ce77435
  canonical_name: Back Street Behind Catherine Cawood’s House, Hebden Bridge
  description: |2-

            **Consolidated Description**:
            Tommy names Hebden Bridge as the Yorkshire town where Catherine raises his son Ryan, a place steeped in his regret and anger. The town—including its public streets (e.g., the residential street where Catherine and Ryan argue)—serves as the emotional and narrative climax of Tommy’s arc. Key features include:
            1. **Tommy’s Obsession**: Hebden Bridge is his 'home ground,' the target of his journey and the site of his confrontation with Catherine and Ryan. His voice thickens with rage as he dwells on Ryan’s 'fatherless years' there.
            2. **Public vs. Private**: The town’s streets (e.g., the daylight-bathed street where Catherine and Ryan’s argument escalates) expose raw familial conflicts, forcing private fractures into public view. This contrasts with the town’s everyday routines, which Tommy’s presence disrupts.
            3. **Narrative Function**: Hebden Bridge is not just a setting but a *character* in Tommy’s story—his path is 'set on disrupting' its family dynamics, turning mundane routines into targets for his unraveling rage. The town’s 'everyday' quality makes his intrusion all the more jarring.
            4. **Geographical Context**: While part of the broader Calder Valley, Hebden Bridge is distinct from Sowerby Bridge (a separate town in the series). Its streets and public spaces are where Tommy’s personal vendetta plays out, distinct from the fugitive hideouts and police activity in Sowerby Bridge.
            **Note**: The 'Street, Hebden Bridge' entity is a *specific part* of Hebden Bridge, not a separate location. Its inclusion here enriches the description of Hebden Bridge as a whole.
  location_type: Terrace House Backstreet
