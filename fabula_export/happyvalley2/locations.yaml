- fabula_uuid: ger_location_cd94aa1d15e0
  global_id: ger_location_cd94aa1d15e0
  canonical_name: Upper Lighthazels Farm Kitchen
  description: "\n  The central rural farmhouse property in Yorkshire, known as **Upper\
    \ Lighthazels Farmhouse**, serving as a **dual-purpose hub** for both **family-driven\
    \ conflicts** (e.g., generational trauma, criminal activity) and **Ashley Cowgill's\
    \ kidnapping operations**. The property encompasses:\n  - **Interior spaces**:\
    \ The **kitchen**, a key setting for tense standoffs (e.g., Kevin Weatherill's\
    \ confrontation with Ashley Cowgill over ransom negotiations, evasive discussions\
    \ of Ann's move, and vague threats). This space is characterized by claustrophobic\
    \ tension, with Kevin shouldering into the cramped kitchen while Ashley sprawls\
    \ at the table counting meager bills.\n  - **Exterior areas**: The **yard near\
    \ the old barn**, a sub-location where scaffolding clings to a weathered structure\
    \ during renovations. This area is used for **logistics** (e.g., unloading sandbags\
    \ packed with hidden cannabis resin) and **confrontations** (e.g., Ashley Cowgill's\
    \ clash with Kevin Weatherill amid children's laughter and a red kite overhead,\
    \ blending pastoral calm with brewing menace).\n  - **Rural isolation**: The farm’s\
    \ remoteness enables discreet criminal activity, including kidnapping planning,\
    \ relocations, and moral strain tied to Ann's abduction (e.g., Kevin's alarm linking\
    \ the farm to the crime). The property may also have **legitimate or fabricated\
    \ rental documentation** to obscure its true use.\n\n  **Narrative roles**:\n\
    \  - **Family standoffs**: Central to adult-driven conflicts across **Episodes\
    \ 2 and 3 (S01E02-S01E03)**, including generational trauma and criminal activity.\n\
    \  - **Kidnapping operations**: Serves as the **operational base** for Ashley\
    \ Cowgill's scheme, with the kitchen as a ransom exchange site and the yard used\
    \ for logistics (e.g., cannabis storage, confrontations).\n  - **Moral tension**:\
    \ The clash between rural isolation and criminal activity is palpable, with the\
    \ farm tied directly to Ann's abduction and Kevin's alarm.\n\n  **Key sub-locations**:\n\
    \  - **Kitchen**: Site of ransom exchanges and family standoffs.\n  - **Yard near\
    \ the old barn**: Used for logistics, cannabis storage, and confrontations.\n\
    \  - **Outdoor field**: A distinct sub-location (not part of the farmhouse proper).\n\
    \n  **Episodes**: S01E01–S01E03.\n  **Interacts with**: Kevin Weatherill, Ashley\
    \ Cowgill, Tommy Lee Royce, Ann Gallagher, Lewis Whippey, Catriona Weatherill,\
    \ Sam Cowgill, Ben Cowgill, Jenny.\n  "
  location_type: Remote Rural Farmstead
  parent_location_uuid: ger_location_3a5f979c1095
  season_appearances:
  - 1
  - 1
  local_uuids:
    1: location_5bcbc862f1ec
