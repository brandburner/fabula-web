- fabula_uuid: ger_location_af9ed9d49a0c
  global_id: ger_location_af9ed9d49a0c
  canonical_name: Catherine's House
  description: 'Catherine Cawood''s terrace house serves as a fractured refuge and
    battleground for family trauma. The **sitting room**—where Clare enters to offer
    tea amid afternoon light—hosts raw emotional collisions (e.g., Catherine smashing
    the kettle against the skirting board in a moment of rage, Clare''s practicality
    steadying the air thick with shame and unraveling). The **kitchen**—sunlit counters
    and steeping tea—hosts similar raw emotional collisions (hurled kettles, shouted
    insults) during Ryan''s defiance and Clare''s interventions, while cigarette smoke
    lingers in stagnant silence. The **front door** becomes a barrier to lifelines
    (Clare and Mike knocking unanswered), symbolizing Catherine''s withdrawal. **Ryan’s
    bedroom** (upstairs) is a private refuge that becomes a chaotic mirror of his
    turmoil: Ryan storms here after exploding at Catherine in the kitchen below, trashing
    the space—smashing furniture, ripping posters, hurling objects—in a raw outburst
    of anger, pain, and entrapment. Crashing sounds echo through the house, drawing
    Clare to burst in and restrain him. The room shifts from private refuge to a stage
    for his emotional unraveling, underscoring the family’s fracture. Mundane objects—the
    shattered kettle, the pan, the scuffed baseboard, the trashed bedroom—mirror the
    fractured resolve of the household, turning domestic spaces into stages for raw
    confession and family fracture.'
  location_type: Three-Bedroom Terrace House
