  canonical_name: High-Dependency Ward/Corridor Complex (Hospital)
  description: |-
    A spatially and narratively interconnected hospital area comprising:
          1) The **High-Dependency Ward** (interior): A sterile, clinically lit space where Catherine Cawood recovers from Tommy Lee Royce's assault (fractured bones, internal injuries). Monitors beep rhythmically beside her bed, while Clare and Daniel maintain a vigilant, grief-stricken presence. The ward embodies the tension between medical recovery and emotional trauma, its antiseptic glow contrasting with the raw vulnerability of Catherine's condition.
          2) The **Adjacent Corridor** (exterior): A narrow, fluorescent-lit passage outside the ward where characters (e.g., Daniel, Clare, Phil Crabtree) wait or move between public and private spaces. This corridor serves as a liminal zone—where external pressures (media, police updates) collide with the family's fragile sanctuary. Linoleum floors and buzzing lights amplify the heavy silence, reflecting the characters' anxiety and the precariousness of Catherine's recovery.

          The complex captures the **duality of hospital spaces**: the ward as a site of medical intervention and the corridor as a threshold between public scrutiny and private grief. Both areas are inextricably linked in *Happy Valley* S01E05, with characters moving fluidly between them to process Catherine's condition and the broader investigation into her attackers.
  location_type: Hospital High-Dependency Ward Corridor
