- fabula_uuid: ger_location_2282817f8868
  global_id: ger_location_2282817f8868
  canonical_name: Catherine Cawood’s Terrace House Rear Doorstep
  description: "\n      **Catherine Cawood’s Terrace House** in Hebden Bridge serves\
    \ as the epicenter of intersecting crises—domestic dysfunction, professional intrusions,\
    \ and Ilinka’s trafficking trauma. The property features:\n      - **Exterior**:\
    \ A sunny front terrace (bright afternoon) where Catherine parks her car, unlocks\
    \ the front door, and guides Ilinka inside. Back doors stand open, flooding the\
    \ home with light. The exterior contrasts with interior chaos, reflecting Catherine’s\
    \ exhaustion and the home’s role as a battleground for family fractures and professional\
    \ duty.\n      - **Interior**:\n        - **Kitchen**: A domestic space where\
    \ family tensions and external crises intersect. Clare and Daniel argue fiercely\
    \ over Clare’s alcoholism, while Catherine enters with Ilinka, a traumatized trafficking\
    \ survivor. The kitchen also serves as a late-night haven for Catherine and Daniel,\
    \ their oblivious domestic routine contrasting with Clare’s unseen relapse in\
    \ the backyard.\n        - **Conservatory**: A glass-walled space connecting directly\
    \ to the kitchen through open back doors. Winnie enters here during a family crisis\
    \ to translate for Ilinka. Sunlit space hosts Catherine and Clare’s retreats with\
    \ tea, cigarettes, and talk of work cases like sheep thefts.\n      - **Backyard**:\
    \ An enclosed outdoor space behind the house, bounded by a dividing fence to neighbors\
    \ like Winnie’s. Sunlit grass hosts Ryan’s football games and draws Catherine’s\
    \ sharp reprimands through the wall. On this afternoon, Catherine crosses it without\
    \ pause to knock at Winnie’s door, bypassing her own yard amid family strains\
    \ and case pressures—it offers play space but no emotional refuge when vulnerability\
    \ strikes.\n      - **Threshold Dynamics**: The exterior (e.g., parked car under\
    \ night skies at 22:50) contrasts with interior warmth, mirroring Catherine’s\
    \ juggling of police work and familial obligations. The home embodies the family’s\
    \ concealed tensions and the sharp privacy divide between interior warmth and\
    \ exterior isolation.\n      "
  location_type: Terrace House Rear Doorstep
  parent_location_uuid: ger_location_2282817f8868
