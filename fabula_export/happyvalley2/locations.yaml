  canonical_name: Traffic Light Intersection (A629, Halifax Road)
  description: Cars queue under red lights on A629 Halifax Road. Ashley Cowgill drums
    nervously on his Range Rover wheel amid rain-slicked asphalt. Motorbike riders
    pull alongside; the rear gunman taps the window, fires once into Ashley's head,
    then his mouth. Blood pools as his body slumps. Four cars back, surveillance detectives
    shout "Shit!" and "Bloody hell!", sprint forward, confirm death, and radio urgent
    backup calls for helicopters and roadblocks. Chaos erupts on the urban junction,
    turning routine traffic into a crime scene.
