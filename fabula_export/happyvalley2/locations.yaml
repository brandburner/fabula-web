  canonical_name: Sowerby Bridge Railway Station Westbound Platform and Tracks
  description: The westbound platform and adjacent railway tracks at Sowerby Bridge
    Railway Station form a high-stakes chase corridor on Day 17. The crowded platform
    hums with morning commuters as John Wadsworth sprints across it, muttering 'shit
    shit shit' before leaping onto the exposed tracks below, where he runs toward
    an oncoming train. Catherine Cawood pursues on foot, boots pounding concrete,
    then crashes through foliage along the embankment when she jumps down after him.
