    conceal threats, while the rooms amplify the victims’ raw desperation. Both spaces
    are part of the same chaotic raid scene (cand_evt_scene_105a71b5e5340555_01),
    with Catherine and officers forcing entry through the back door to calm the victims
    amid shouts and taser discharge. The air hangs heavy with tension, marking the
