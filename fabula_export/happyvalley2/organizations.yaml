  canonical_name: Norland Road Police Station (Happy Valley Police Force)
  description: |-
    Norland Road Police Station is the central law enforcement hub for the Halifax area, overseeing a wide range of policing functions including homicide investigations, suspect arrests, witness interrogations, custody processing, patrols, night shifts, forensics, and suicide responses. The station plays a pivotal role in major criminal investigations, such as:

      - **Sean Balmforth's multiple murders**: Detectives like Jodie handle charges and evidence processing.
      - **Far Sunderland Farm crime scene**: After Sergeant Catherine Cawood notifies the station of Alison Garrs' overdose confession (implicating her in the killing of her son Daryl Garrs), CID and CSI teams deploy to process evidence linked to Operation Syracuse and Tommy Lee Royce's criminal network.
      - **Vicky Fleming's disappearance**: Sergeant Catherine Cawood questions Graham Tattersall in a station room, uncovering potential involvement by Detective John Wadsworth (through his wife Amanda's alibi), while navigating professional loyalty and duty conflicts.
      - **Internal investigations**: Officers and superiors (e.g., Mike) manage case updates, arrests, and evidence, often amid personal conflicts and procedural challenges.

      The station serves as a critical nexus for coordinating resources, managing interdepartmental collaboration (e.g., CID, CSI), and addressing high-stakes criminal cases while balancing institutional pressures and ethical dilemmas.
  sphere_of_influence: Local Police Station Operations and Institutional Crisis Management
