    and law enforcement to protect vulnerable individuals from manipulative influences
    tied to figures like Tommy Lee Royce. The unit prioritizes swift arrests, evidence
    collection, and procedural rigor to advance fraud investigations and safeguard
    institutional integrity. Their operations also include broader coordination with
    emergency response teams (e.g., ambulances, forensic teams) and multi-team responses
    to escalating crises (e.g., Far Sunderland Farm incident).
