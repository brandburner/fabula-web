  description: The Uniformed Police represent the working-class backbone of station
    operations in *Happy Valley*, encompassing both frontline officers and specialized
    teams like the House-to-House Inquiry Team. This group includes officers such
    as Shafiq Shah, Ann Gallagher, and John Wadsworth (Sergeant), who conduct routine
    patrols, manage frontline tensions during murder probes, and perform systematic
    door-to-door inquiries tied to fugitive manhunts (e.g., Tommy Lee Royce). The
