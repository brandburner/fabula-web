  canonical_name: West Yorkshire Police (Hebden Bridge Division)
  description: West Yorkshire Police is the regional law enforcement organization
    overseeing local stations (e.g., Sowerby Bridge, Hebden Bridge) and frontline
    policing operations across West Yorkshire. The force enforces protocols governing
    officer interactions, security duties (e.g., guarding Alison Garrs's hospital
    room), and public safety initiatives. Officers like Sergeant Catherine Cawood
    demonstrate both adherence to duty (e.g., uniformed presence, rule enforcement)
    and compassionate rule-bending (e.g., dismissing guards to provide personal support).
    Key incidents include high-risk standoffs (e.g., John Wadsworth on viaducts, Ryan's
    standoff), public appeals (e.g., September 12th Ripponden incident), and coordination
    of investigations. The organization embodies the tension between institutional
    protocols and individual officer discretion in policing. The Hebden Bridge division
    has a history of sexist policies in the 1980s, including mandatory skirts, handbags
    over truncheons, and harassment by Inspector Leonard Stott. Officers build camaraderie
    through resilience, often gathering at Grappollo’s Restaurant.
