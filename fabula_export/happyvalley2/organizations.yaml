    while Ann, a new PCSO, is mocked as a 'plastic police officer'—highlighting hierarchical
    and interpersonal tensions. Their work spans neighborhood searches, evidence gathering,
    and collaborative (though strained) efforts with plainclothes investigators. Personal
    distractions (e.g., John’s affair) occasionally threaten professional performance,
    but the group remains central to operational responses to crimes like Lewis Whippey’s
