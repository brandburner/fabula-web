  description: The Police (Detective Branch) is a specialized investigative unit that
    handles deception-related cases, particularly those involving fraud, impersonation,
    and institutional breaches. This unit executed Frances Drummond's arrest for fraud
    by false representation at St. Mark's Junior School, where two unnamed detectives
