  canonical_name: West Yorkshire Police (Greater Manchester Region)
  description: West Yorkshire Police operates as the primary regional law enforcement
    agency across West Yorkshire, encompassing divisions such as Calderdale Police.
    Officers arrest suspects like Sean Balmforth in serial murder cases, release public
    statements to reassure the community, and coordinate investigations across stations
    like Norland Road and Sowerby Bridge. The force handles night-shift calls, escalates
    criminal probes (e.g., matching Leonie’s partial registration to Sean Balmforth),
    and manages institutional procedures for cases involving threats like Tommy Lee
    Royce. Divisions like Calderdale Police uphold victim-centered protocols (e.g.,
    sexual assault cases, evidence kits for Leonie), pursue serious crime investigations
    (e.g., drug crimes, murders), and balance frontline response with internal mandates
    (e.g., therapy for officers). The force operates from Norland Road Police Station
    and supports house-to-house inquiries amid institutional strains.
