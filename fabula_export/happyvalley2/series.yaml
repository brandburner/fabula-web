    - fabula_uuid: ep_sea_ser_happy_valley_s01_e03
      episode_number: 3
      season_number: 1
      sort_ordinal: 103
      title: Happy Valley S01E03
      logline: Following a policewoman's brutal murder, Sergeant Catherine Cawood
        grapples with guilt and grief while hunting for the perpetrator, Tommy Lee
        Royce, whose involvement in a kidnapping case is spiraling out of control,
        threatening more innocent lives.
      high_level_summary: "Episode Three of Happy Valley opens with a seemingly routine\
        \ traffic stop by PC Kirsten McAskill, which quickly escalates when she pulls\
        \ over a white van driven by Lewis, who is transporting a kidnapped Ann Gallagher.\
        \ Unbeknownst to Kirsten, Tommy Lee Royce is nearby in a Mini. Tommy witnesses\
        \ the stop and, fearing exposure, deliberately runs Kirsten down, crushing\
        \ her beneath the vehicles then reversing over her repeatedly to ensure she\
        \ is dead before fleeing. Catherine receives the emergency call and rushes\
        \ to the scene, but arrives too late to save Kirsten. The entire police force\
        \ is plunged into mourning and a determined Catherine vows to bring the killers\
        \ responsible for her colleague's death to justice. \n\nMeanwhile, the kidnapping\
        \ plot thickens as Ashley pressures a reluctant Kevin to deliver another ransom\
        \ payment from Nevison Gallagher for the return of his daughter Ann. Ashley\
        \ and Tommy become increasingly ruthless and paranoid as the police investigation\
        \ intensifies. Nevison becomes more desperate to get his daughter back, while\
        \ his wife Helen grapples with her conscience, suspecting something is terribly\
        \ wrong and seeking guidance from Clare, Catherine's sister and a volunteer\
        \ at the local Mission. \n\nCatherine's personal life is further complicated\
        \ by her troubled relationship with her grandson Ryan and her ex-husband Richard,\
        \ who rekindles his desire to reconnect after Catherine mentions arresting\
        \ Marcus Gascoigne, a local counselor. She also struggles with hallucinations\
        \ of her deceased daughter Becky, triggered by the trauma of Kirsten's death.\
        \ The episode ends with Catherine vowing to uncover the truth behind Ann's\
        \ kidnapping and Royce's involvement, driven by a determination to bring him\
        \ to justice."
      dominant_tone: Tragic
