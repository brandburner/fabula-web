      title: Happy Valley S01E05
      logline: As Catherine recovers from a brutal assault, she grapples with the
        knowledge that Tommy Lee Royce is still on the loose, while Kevin's involvement
        in Ann's kidnapping leads to dire consequences, and Ashley's deal endangers
        him and his family.
      high_level_summary: "Following Ann Gallagher's rescue, Catherine Cawood lies\
        \ in critical condition in hospital, grappling with the fallout of Tommy Lee\
        \ Royce's brutality. Kevin Weatherill, implicated in Ann's kidnapping, faces\
        \ interrogation and arrest. He desperately tries to minimise his role, but\
        \ his lies unravel, leading to his imprisonment and increasing threats to\
        \ Jenny and his family. Meanwhile, Tommy, blinded by Catherine, escapes the\
        \ cellar where he held Ann. Desperate for help, he contacts Ashley Cowgill\
        \ who abandons him, leading Tommy to seek assistance from Lewis Whippey. \n\
        \nAs Catherine fights for her life, Ashley cuts a deal with authorities to\
        \ reduce his sentence, offering up information about a major drug operation,\
        \ which brings him a temporary reprieve from prison but endangers him and\
        \ his family as he becomes a target. Catherine, recovering physically but\
        \ struggling emotionally and mentally, is informed of Ashley’s betrayal. Her\
        \ emotional turmoil is further complicated by her strained relationship with\
        \ Ryan and her complicated feelings with Richard causing her to become more\
        \ isolated. \n\nTommy, hidden by Lewis and Brett, grows increasingly desperate\
        \ as the police close in and tempers fray. The news report makes it clear\
        \ that the police have launched a manhunt, making things difficult for Tommy.\
        \ The tension explodes when Lewis is killed during an argument, and Tommy\
        \ loses all control and murders Brett knowing the “safehouse” has been comprised.\
        \ \n\nPhillip informs Catherine that Ashley has given information that helps\
        \ the police greatly. Catherine visits Becky’s grave to cope with her depression.\
        \ She meets to have a discussion with Richard about the situation. During\
        \ which she makes the comment that she can’t stand Ryan. He is horrified by\
