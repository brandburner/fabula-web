    - fabula_uuid: ep_sea_ser_happy_valley_s02_e02
      episode_number: 2
      season_number: 2
      sort_ordinal: 202
      title: Happy Valley S02E02
      logline: Following the discovery of a trafficked woman, police sergeant Catherine
        finds herself embroiled in a complex investigation while grappling with family
        issues and Tommy Lee Royce's impending release for his mother's funeral.
      high_level_summary: |-
        Following the discovery of trafficked women, Catherine, a police sergeant, brings Ilinka, one of the victims, home temporarily. This coincides with tension at home, where her grandson Ryan knows about Clare's past alcoholism because Daniel told him. Catherine's neighbor, Winnie, discovers that Ilinka recognizes the clothes of one of the serial killer's victims as belonging to her friend Aurelia. This identification could potentially expose the Knezevics criminal enterprise, but Ilinka is afraid to work with the police because she fears retaliation.

        Meanwhile, John, a fellow officer, continues to be blackmailed by his mistress, Vicky, who threatens to expose their affair. John obtains money for Vicky from his mother under false pretenses. Later, John tells Vicky that he is finally going to leave his wife, Amanda, for Vicky, leading Vicky to believe she finally has what she wants. Catherine learns that Tommy Lee Royce is being temporarily released from prison to attend his mother's funeral, triggering deep emotions and anxiety for her, and also for Ann, a victim of Tommy Lee Royce. Frances, is revealed to be Ryan's new teaching assistant, maintaining contact while being strategically undercover.

        At Helen's wake, Catherine is warned about Sean Balmforth, an ex-convict working for Nevison may be connected to the murders because he was seen driving near the latest murder victim's home. Catherine abruptly leaves the wake and attends Tommy Lee Royce's mother's funeral, ensuring that he sees her there, a calculated move that gives her satisfaction. Later, Mike reprimands her, for her conduct and reminds her of her loose ends in the investigation, while she still remains.a person of interest. On the same night, Amanda is seemingly unfazed, although suspicious, when John lies about having to leave for work. He goes to Vicky's where tensions escalate, and he ends up strangling Vicky, leading to her death.

        Back at Catherine's house, Clare relapses into alcoholism. As Catherine tries to stop her from getting more alcohol, Catherine and Clare have a confrontation leading to raw revelations. Despite Catherine's warnings and threats, Clare leaves to go to the local pub. At the end of the episode, John makes his story believable by telling Amanda the news. Back at Catherine's house, Daniel tips off to Catherine of Claire's behavior sending Catherine to prevent Clair's fall. The episode concludes with Catherine pursuing Clare, as the situation dangerously unravels in pursuit of a dark resolution.
      dominant_tone: Tragic
      raw_credits_block: ''
      has_complete_credits: false
    - fabula_uuid: ep_sea_ser_happy_valley_s02_e03
      episode_number: 3
      season_number: 2
      sort_ordinal: 203
      title: Happy Valley S02E03
      logline: Police Sergeant Catherine Cawood grapples with unresolved trauma, a
        suicide case that hits close to home, and a potential connection between a
        new murder and the incarcerated Tommy Lee Royce, threatening to unravel her
        already strained life.
      high_level_summary: "Catherine Cawood, a police sergeant still reeling from\
        \ her daughter's death and a violent encounter with Tommy Lee Royce, is mandated\
        \ to attend therapy sessions. During a session, Catherine recounts recent\
        \ instances where she felt murderous towards her grandson, son, and sister\
        \ Clare, a recovering alcoholic who relapsed after Catherine attended Tommy\
        \ Lee Royce’s mother’s funeral. Clare blames Catherine for her relapse, sparking\
        \ tension between the sisters.\n\nFlashbacks reveal Clare's drunken encounter\
        \ with Spike, who makes disparaging comments about Catherine as a police officer.\
        \ Catherine reflects on visiting the funeral to know where Tommy Lee Royce\
        \ was. Meanwhile, Catherine faces professional scrutiny regarding her fitness\
        \ for duty. Her superior suggests medical retirement or mandatory sessions\
        \ with the force psychologist after her reappearance at Royce's mother's funeral.\
        \ \n\nBack in the present, Catherine finds herself investigating the death\
        \ of Goran Dragovic. Dragovic, a suspect in a trafficking case, is found hanged\
        \ in Crow Wood Park. Dragovic had been bailed out of prison and was the reason\
        \ why a traumatized victim was afraid to return to work at the biscuit factory.\
        \ His death occurs amid an investigation into the murder of a woman, Vicky\
        \ Fleming. \n\nSimultaneously, Detective John Wadsworth is revealed to be\
        \ the murderer. After murdering Vicky Fleming and trying to stage it as a\
        \ serial killing, he discovered that his wife was having an affair. He begins\
        \ an affair with Ann Gallagher. Increasingly overwhelmed, John is assigned\
        \ to bag up Vicky's belongings during the autopsy. Ann discovers the body\
        \ is Vicky Fleming but John has long tried to hide any connections to the\
        \ murder. Near the episode's end, John is driving on the moors wracked by\
        \ guilt, when a woman notices he nearly crashed his car. \n\nTommy Lee Royce\
        \ is visited in prison by Frances, who relays information about Ryan, Tommy’s\
        \ son. Royce grows increasingly frustrated that he cannot see his son because\
        \ of Catherine. At the end, Catherine learns the Dragovics believe that he\
        \ was murdered to prevent him from talking about a local crime family. Later\
        \ Catherine tells Clare that she knows that she can't go back to the biscuit\
        \ factory. Clare is grateful. The episode closes with a discussion between\
        \ the police about the victims: they realize they are not typical prostitutes.\
        \ \n\nThe episode weaves together themes of trauma, guilt, addiction, and\
        \ moral compromise, highlighting Catherine's struggle to maintain order in\
        \ her personal and professional life while battling her inner demons and external\
        \ threats."
      dominant_tone: Tragic
      raw_credits_block: ''
      has_complete_credits: false
    - fabula_uuid: ep_sea_ser_happy_valley_s02_e04
      episode_number: 4
      season_number: 2
      sort_ordinal: 204
      title: Happy Valley S02E04
      logline: Sergeant Catherine Cawood navigates the aftermath of a brutal rape,
        confronts negligent colleagues, and grapples with a mysterious birthday gift
        to her grandson Ryan, all while facing the chilling possibility that Tommy
        Lee Royce orchestrated it from prison.
      high_level_summary: "In the dark hours of the night, Sergeant Catherine Cawood\
        \ responds to a call from Annette whose friend Leonie, a young prostitute,\
        \ has been brutally raped. Catherine's investigation reveals the apathy of\
        \ two Special Constables who dismissed Leonie's assault, leading Catherine\
        \ to berate them for their negligence. Meanwhile, the investigation into a\
        \ series of murders intensifies, with Sean Balmforth, a known sex offender,\
        \ becoming the prime suspect.\n\nAs Catherine deals with the rape case, her\
        \ personal life is overshadowed by Ryan's tenth birthday, a day that always\
        \ brings back the pain of her daughter Becky's suicide, six weeks after Ryan\
        \ was born. A large, glittery birthday gift mysteriously appears on Catherine’s\
        \ doorstep, addressed to Ryan. This unnerves Catherine, who suspects Tommy\
