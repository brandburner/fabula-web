        local crimes, and grapples with raising her troubled grandson while navigating
        personal relationships.
      high_level_summary: "Sergeant Catherine Cawood, a no-nonsense police officer,\
        \ responds to a call about Liam Hughes, a man threatening to set himself on\
        \ fire, showcasing her calm yet assertive approach to handling crises. Simultaneously,\
        \ Kevin Weatherill, an accountant, seeks a pay raise from his boss, Nevison\
        \ Gallagher, to send his daughter to a private school, but is denied, revealing\
        \ his underlying resentment towards Nevison.\n\nMeanwhile, Richard, Catherine's\
        \ ex-husband, informs her that Tommy Lee Royce, the man responsible for her\
        \ daughter's death, has been released from prison, shaking Catherine to her\
        \ core. Back at home, Catherine deals with her grandson Ryan's behavioral\
        \ issues at school, adding to her stress and emotional turmoil. Catherine\
        \ meets Richard for dinner to discuss family issues and to try and learn more\
        \ about Tommy Lee Royce, but comes up empty. \n\nDriven by desperation and\
        \ resentment, Kevin approaches Ashley Cowgill, a local businessman, proposing\
        \ a kidnapping scheme targeting Nevison's daughter, Ann, for ransom. Ashley,\
        \ seeing an opportunity, agrees and recruits Tommy Lee Royce and Lewis Whippey\
        \ to carry out the abduction. As Kevin tries to call it off Ashley pressures\
        \ him to move forward, threatening him and his family. \n\nOn the day of the\
        \ kidnapping, Catherine responds to a call, dealing with an overdose. As she\
        \ wraps up, she spots Tommy Lee Royce further down the street, realizing he's\
        \ back. Soon after, Tommy and Lewis stage a car accident to abduct Ann. As\
        \ Catherine deals with family drama, Ann is held captive in a cellar. Nevison\
        \ receives a ransom call, and he enlists Kevin's help to figure out the ransom.\
        \ Ultimately, events spiral out of control as the kidnapping plot unfolds,\
        \ leading to a series of escalating conflicts and moral compromises."
