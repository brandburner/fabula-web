    - fabula_uuid: ep_sea_ser_happy_valley_s01_e04
      episode_number: 4
      season_number: 1
      sort_ordinal: 104
      title: Happy Valley S01E04
      logline: Sergeant Catherine Cawood's life spirals as she confronts Tommy Lee
        Royce, the man who destroyed her family, while simultaneously working to solve
        a kidnapping case, pushing her to her physical and emotional limits.
      high_level_summary: |-
        In the aftermath of a policewoman's murder, Sergeant Catherine Cawood navigates the complexities of her personal and professional life. Kevin, an accountant, is burdened by the knowledge of the crime, which slowly eats at him as he contemplates telling the police what he knows. Catherine investigates a potential lead in a kidnapping case, tracing it to Ashley Cowgill and his property on Milton Avenue. She encounters Julie Mulligan, Ashley's bright orange wife, who unwittingly provides clues that lead Catherine closer to the truth. Catherine's suspicion of Ashley grows as she uncovers evidence suggesting sinister activities at his property.

        Meanwhile, Ashley grapples with the escalating situation. He discovers the police are investigating, and that someone broke into the house. He panics and moves Ann to Lynn Dewhurst's house to hide her from the investigation. Tommy Lee Royce, now staying with Lynn Dewhurst, adds another layer of complexity, as it is revealed that he will kill Ann for a price. Catherine visits Lynn to get information on Tommy's whereabouts and is shaken to learn that Lynn knows Tommy is the father of her grandson, Ryan. This encounter deeply unsettles Catherine, who sees the ghost of her daughter who died after giving birth.

        Determined to see justice done and also help this family, Catherine reconnects with an old colleague, Phil Crabtree, who is with the National Crime Agency, as Ann Gallagher's parents reveal that she is was kidnapped days ago. The situation escalates as it's revealed Ann drove a yellow mini, and is wanted in relation to a P.C.'s death, which is shared on the local news. Meanwhile, her husband Nevison is shocked when accountant Kevin is ready to share incriminating information about what Ashley and the others are up to, due to him being privy to the kidnapping. Catherine and Phil lay a trap for the kidnappers, the main objective is to find Ann and save her from the inevitable: her murder. Phil enlists Catherine in the investigation of Ann's kidnapping, setting the stage for a dangerous confrontation. They try to stall Ann by setting up wiretaps in their devices. They urge Nevison's to stall the process if they are contacted.

        As the episode reaches its climax, Catherine investigates the kidnapping herself and discovers Ann held captive in Lynn's cellar. A brutal fight ensues between Catherine and Tommy. Ann, manages to free herself and incapacitate Tommy. Despite sustaining serious injuries, Catherine frees Ann. As she calls for help, Catherine collapses, seemingly dead. The episode ends on a cliffhanger, leaving Ann to fend for herself, unsure of what just happened with Catherine lifeless on the ground.
      dominant_tone: Gritty, with moments of hard-won hope
