      title: Happy Valley S01E02
      logline: Police Sergeant Catherine Cawood, grappling with personal tragedies
        and professional challenges, relentlessly pursues a gang of drug dealers and
        a recently released rapist, while a kidnapping plot spirals out of control,
        threatening the lives of those involved.
      high_level_summary: Episode Two opens with Catherine Cawood pursuing an ice
        cream van used for drug dealing, smashing its window and failing to stop it.
        Meanwhile, Nevison Gallagher is in deep trouble as his daughter Ann has been
        kidnapped, and the captors demand a million-pound ransom. He confides in his
        accountant Kevin Weatherill, who is already entangled in shady dealings with
        Nevison. Nevison is desperate but afraid to involve the police, fearing the
        kidnappers. Clare, Catherine's sister, expresses concern over Catherine's
        renewed obsession with Tommy Lee Royce, the man who assaulted her daughter
        Becky. Catherine, undeterred, investigates Tommy's whereabouts. Joyce reports
        that the ice cream van is back in operation, leading Catherine and her team
        to another confrontation and an arrest that results in Catherine getting kicked
        in the face. Ann Gallagher is shown captive in a cellar, while Tommy, one
        of her captors, is watched with unease by Lewis, another member of the group.
        Ashley Cowgill, the ringleader, is revealed to be the mastermind behind the
        kidnapping. Kevin's attempts to navigate the situation are complicated by
        his wife Jenny, who urges him to go to the police. Meanwhile, Catherine looks
        into Kevin Weatherill, finding out he is the neighbor of Richard, her ex-husband
        and Ryan's grandfather. Lewis grows increasingly disturbed by Tommy's actions
        and questions Ashley about the treatment of Ann. Ashley tasks Tommy with taking
        a photo of Ann in the cellar; Lewis objects to tommys treatment. Tommy brutally
        attacks Lewis. The next day, Catherine investigates a traffic accident involving
        Marcus Gascoigne, who is revealed to have been driving under the influence
        and in possession of drugs. Catherine arrests him despite pressure from other
        officers. Back at the station, Catherine confronts a constable displaying
        a failure to hold all accountable regardless of social standing. Discovering
        that Ann has been moved to better living conditions, and not harmed, Lewis
        continues to feel empathy for the frightened kidnapping victim. Ashley pressures
        Kevin to deliver an initial ransom payment. Catherine, while at supper with
        her family, is called to active duty and investigates reports of Tommy Lee
        Royce. Finding a dilapidated house, she's forced to give up to due a lack
        of enough evidence. Ashley suspects a snitch. While Ashley oversees the handling
        of building materials Kevin finds himself more deeply trapped in his association
        with Ashley. Nevison, in the meantime confers with his attorney, who advises
        him about the sensitivity and delicate balance involved in the kidnappings.
        Kevin finds his house visited by Catherine, with Kevin scared to reveal anything
        to her. The episode concludes with Catherine investigating a potential lead
        on Tommy Lee Royce's location, unaware of the danger it presents setting up
        the stage for the next episode.
