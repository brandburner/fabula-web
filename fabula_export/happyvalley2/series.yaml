- fabula_uuid: ser_happy_valley
  title: Happy Valley
  description: 'In the stark, windswept moors of rural Yorkshire, **Sergeant Catherine
    Cawood**—a hardened but deeply compassionate police officer—balances the weight
    of her past with the demands of her present. Still reeling from her daughter’s
    suicide, she raises her troubled grandson while confronting the dark underbelly
    of her community: drug rings, violent criminals, and the chilling return of **Tommy
    Lee Royce**, a released rapist whose shadow looms over her life. As Catherine
    navigates professional dangers and personal heartache, she must decide how much
    of herself she can sacrifice to protect those she loves—before the line between
    justice and vengeance blurs beyond return.'
