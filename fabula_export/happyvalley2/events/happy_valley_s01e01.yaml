  key_dialogue: &id069
  - |-
    ANN: *Stupid tosser.*
    *(muttered viciously as she steps out of her car, already seething with frustration—her first and last words as a free woman in this scene.)
  - |-
    TOMMY: *Shut yer mouth!*
    *(barked as he struggles to silence Ann’s screams, his voice a guttural command that strips away any pretense of humanity. The shift from polite deception to violent control is instantaneous.)
  - |-
    LEWIS: *You do what we tell you, and we won’t hurt you any more than we have to! And it’ll all be over soon enough. All right?*
    *(spoken to the motionless sleeping bag, Lewis’s tone a mix of threat and hollow reassurance. His words reveal his role as the reluctant enforcer—someone who justifies violence as a means to an end, not an end in itself.)
