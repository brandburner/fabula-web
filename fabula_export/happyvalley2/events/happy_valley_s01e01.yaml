    CLARE: *Lad down Sowerby Bridge set fire to himself this morning.*
    CATHERINE: *No he didn’t.*
    CLARE: *Apparently. Woman in t’shop said.*
  - |-
    CATHERINE: *He’s been in bother again. He chucked a chair across the classroom and told Mrs. Mukherjee to eff off.*
    CLARE: *Not again.*
    CLARE: *Do you sometimes think they over-react?*
    CATHERINE: *Tommy Lee Royce is out of prison.*
    CLARE: *Yeah. Yeah. Yeah, I heard.*
    CATHERINE: *Why didn’t you tell me?*
    CLARE: *((genuine)) I didn’t want to upset you.*
  - |-
    CATHERINE: *He asked me out. For a meal. Tonight. Is that all right? Can you see to Ryan?*
    CLARE: *Sure. That’s a bit mad. Isn’t it? A date with your ex-husband. Won’t the new younger model have something to say?*
    CATHERINE: *(opens her mouth to say something, then shrugs, dismissive)*
