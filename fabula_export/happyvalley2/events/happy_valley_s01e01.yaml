  key_dialogue: &id029
  - |-
    RICHARD: Where’s Tommy Lee Royce living?
    CATHERINE: I’ve no idea.
    RICHARD: Is he living round here?
    CATHERINE: Catherine. You know as much as me. More, probably. Hasn’t he got a release address?
    CATHERINE: Yeah. His mother’s. I went back to the nick and rang probation. She lives in a terrace house on Rishworth, but he won’t be there.
  - |-
    CATHERINE: It was a domestic. He was off his head on boze, he was off his head on skunk. His girlfriend’d dumped him, that’s - it’s the usual everyday story of country folk.
    RICHARD: Where did they take him?
    CATHERINE: I don’t know, I didn’t ask. Out of sight, out of mind.
  - 'CATHERINE: Where’s Tommy Lee Royce living?'
