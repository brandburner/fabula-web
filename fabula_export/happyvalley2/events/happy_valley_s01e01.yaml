- fabula_uuid: act_20e3357713c08364
  number: 3
  summary: The act commences with Kevin Weatherill's frantic, yet ultimately futile,
    attempts to call off the kidnapping, as Ashley Cowgill dismisses his pleas and
    reinforces his threats, leaving Kevin trapped and terrified. Desperate, Kevin
    drives to the police station, intending to confess, but his fear overwhelms him,
    and he flees before speaking to Catherine Cawood. Simultaneously, Ann Gallagher
    drives her Mini, unaware of the impending danger, as Tommy Lee Royce and Lewis
    Whippey stalk her in their van. They stage a car accident, a calculated maneuver
    to force Ann out of her vehicle. Tommy then brutally punches Ann, subduing her,
    and they abduct her, demonstrating Tommy's inherent violence and Lewis's shocked
    complicity. While responding to an unrelated 999 call, Catherine, with her keen
    observational skills, spots Tommy Lee Royce on the street, confirming his presence
    in the area and bringing her personal vendetta into immediate, tangible proximity
    with the unfolding crime. Ann is subsequently held captive in a cold, damp cellar,
    subjected to Tommy's menacing presence. The kidnapping plot escalates dramatically
    when Nevison Gallagher receives a chilling ransom call from Ashley, who, using
    Ann's phone, demands a million pounds and issues dire threats of violence if the
    police are involved. Overwhelmed and panicked, Nevison, unaware of Kevin's complicity,
    immediately contacts Kevin to help him navigate the financial logistics of raising
    the ransom. The episode concludes with Kevin caught in an agonizing moral trap,
    forced to aid the man he intended to harm, as Catherine unknowingly circles closer
    to the architect of her deepest pain, setting the stage for a dramatic and inevitable
    confrontation.
