  title: 'Tommy’s Dominance and the Illusion of Control: A Predator’s Calculated Calm'
  description: "\n  After a volatile confrontation inside the house—where Lewis’s\
    \ careless words risked exposing their criminal activity—Tommy Lee Royce asserts\
    \ his brutal authority over Lewis with a chilling threat: *'I’ll rip your cock\
    \ off and shove it up your arse.'* The exchange cements Tommy’s role as the alpha\
    \ predator, his violence not just physical but psychologically precise, designed\
    \ to instill fear while maintaining plausible deniability. Lewis, now visibly\
    \ cowed, retreats to the van, but Tommy’s dominance isn’t just about control—it’s\
    \ a performance. He methodically scans the street for witnesses, his cigarette\
    \ ritual (lighting it with deliberate slowness, savoring the moment) a signal\
    \ to himself and the world: *he is untouchable*. The mundane act of reading a\
    \ Chinese takeaway menu becomes a darkly ironic counterpoint to his violence,\
    \ underscoring his ability to compartmentalize. This beat is a masterclass in\
    \ subtext: Tommy’s nonchalance masks a predator’s patience, foreshadowing his\
    \ relentless pursuit of vengeance (or justice) in the wake of Becky’s suicide.\
    \ The scene also serves as a structural pivot—Lewis’s departure leaves Tommy alone,\
    \ free to survey his temporary territory, setting up his eventual confrontation\
    \ with Catherine and the unraveling of his carefully constructed facade.\n  "
