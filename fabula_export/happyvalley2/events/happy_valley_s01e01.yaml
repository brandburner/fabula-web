- fabula_uuid: cand_evt_scene_73a5703a9d995e88_02
  global_id: null
  title: 'The Unraveling: Catherine’s Obsession Exposed in a Moment of Vulnerability'
  description: "\n  In the dim, intimate setting of an Indian restaurant, Catherine\
    \ and Richard’s strained dynamic reaches a breaking point as their conversation\
    \ shifts from Richard’s professional anxieties to Catherine’s unresolved trauma.\
    \ After deflecting Richard’s probing about a suicidal man she subdued with foam,\
    \ Catherine abruptly derails the discussion to interrogate Tommy Lee Royce’s whereabouts—revealing\
    \ her compulsive surveillance of him. Her admission that she’s already verified\
    \ his release address and contacted probation exposes the depth of her obsession,\
    \ a fear she can no longer suppress, even in casual company. The scene underscores\
    \ her psychological unraveling, where grief and trauma have warped into a vigilant,\
    \ almost predatory need for control. Catherine’s abrupt pivot from professional\
    \ detachment to personal fixation marks a turning point, revealing how deeply\
    \ Tommy Lee Royce’s release has destabilized her. The moment is raw, unguarded,\
    \ and unsettling, laying bare the fragility beneath her hardened exterior.\n  "
