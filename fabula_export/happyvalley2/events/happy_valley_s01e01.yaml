  key_dialogue: &id053
  - 'KEVIN: *I don’t think this business—I don’t think we should do it, I think I’ve
    bitten off more than I can chew, I think I may have miscalculated—*'
  - 'ASHLEY: *Don’t ring me, Kevin. Not on my mobile, not on the landline. I’ll see
    you on Sat’day.*'
  - 'ASHLEY: *If this goes tits up. The police can trace calls, any calls, all calls,
    and they’ll wanna know what business you and me had on the phone at quarter past
    eight on this particular morning. So you just keep your nerve and you don’t ring
    me.*'
  - 'KEVIN: *(realizes Ashley’s gone, panicked)* Ashley? Ashley?! *(muttering)* Shit!
    Shit! Shit!'
