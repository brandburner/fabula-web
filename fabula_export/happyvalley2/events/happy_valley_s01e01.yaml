acts:
- fabula_uuid: act_8b858081fbe07ab1
  number: 1
  summary: The episode establishes Sergeant Catherine Cawood, a resilient police officer,
    through her calm and effective handling of a volatile situation involving a man
    threatening self-immolation. This initial sequence highlights her no-nonsense
    demeanor, practical skills, and underlying compassion. Concurrently, the narrative
    introduces Kevin Weatherill, a financially struggling accountant burdened by resentment
    towards his wealthy boss, Nevison Gallagher, who dismisses Kevin's plea for a
    pay raise to afford his daughter's private education. The central conflict of
    the series is decisively launched when Catherine's ex-husband, Richard, delivers
    the devastating news of Tommy Lee Royce's release from prison. Tommy is the man
    who raped Catherine's daughter, Becky, leading to her suicide, and this revelation
    profoundly destabilizes Catherine, redirecting her focus and igniting a deep-seated
    desire for justice. Further compounding Catherine's personal stress, she contends
    with her grandson Ryan's disruptive behavior at school, reflecting the ongoing
    challenges of her guardianship. In a desperate and misguided attempt to secure
    his family's future and exact a measure of revenge, Kevin approaches Ashley Cowgill,
    a local businessman with criminal ties, proposing the abduction of Nevison's daughter,
    Ann, for ransom. Ashley, perceiving a lucrative opportunity, readily agrees to
    the plan and enlists Lewis Whippey and, significantly, Tommy Lee Royce to execute
    the kidnapping. This pivotal development intertwines Catherine's personal vendetta
    with Kevin's criminal plot, setting the stage for an intricate and dangerous collision
    of lives and motivations.
