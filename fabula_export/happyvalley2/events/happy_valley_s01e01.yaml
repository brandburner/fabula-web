  title: Catherine’s Instinctive Dig Uncovers Weatherill’s Hidden Thread
  description: "\n  In a moment of quiet, methodical police work, **Catherine**—still\
    \ processing the emotional fallout of Tommy Lee Royce’s release and the suffocating\
    \ weight of her daughter’s suicide—runs **Kevin Weatherill’s** license plate through\
    \ the system. The routine check yields an address that *shouldn’t* matter yet:\
    \ **Fairview, Upper Kebroyd Drive**, a detail that lingers in her mind like a\
