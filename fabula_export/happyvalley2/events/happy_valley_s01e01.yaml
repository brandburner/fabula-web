  key_dialogue: &id033
  - 'ASHLEY: *Kevin.* ((peers into the car)) *Jenny.* ((looks into the back at MELISSA
    and CATRIONA)) *Ladies.*'
  - |-
    KEVIN: *I’ve got a cheque for you.*
    ASHLEY: *No rush.*
    KEVIN: *I’ll pop down later.*
    ASHLEY: *Any time. You know me, I’m not going anywhere.* ((*nods at Jenny’s legs*)) *You can play table tennis, can’t you? You’re not—*
  - |-
    KEVIN: *Take him. Ashley. Prime example.*
    JENNY: *Of what?*
    KEVIN: *What I’m talking about! You see that car he’s driving? Brand new. Fifty-odd thousand. All that from holiday caravan rentals. I’m in the wrong game. Altogether. I’m in the wrong... God knows. Everything.*
