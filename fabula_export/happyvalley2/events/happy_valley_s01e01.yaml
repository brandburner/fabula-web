  - |-
    **ASHLEY** *(dismissive, authoritative)*:
        *‘He’s fine. He comes recommended. He’s been inside for eight years, he’s only just got out.’*
  - |-
    **ASHLEY** *(calling across the yard, abrupt)*:
        *‘Tommy!’* *(immediate summons, cutting off further dissent)*
      ],

