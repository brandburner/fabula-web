      In the tense, domestic quiet of Richard and Ros’s kitchen, Richard—his back subtly turned to shield his phone—whispers a loaded invitation to Catherine: *‘You don’t fancy going to Rotherham. Again. Tonight. Do you?’* The question, delivered with the hushed urgency of a man balancing two lives, is both an olive branch and a test. His body language—glances over his shoulder, the low timbre of his voice—betrays the calculated secrecy of the exchange, a stark contrast to Ros’s oblivious humming as she cooks nearby. The subtext crackles: this isn’t just a casual outing. It’s a return to a shared past (or present) that exists outside the boundaries of Richard’s marriage, one that threatens to unravel the fragile equilibrium of his current life. The scene hinges on what’s *unsaid*: the unspoken history between Richard and Catherine, the risk of discovery, and the moral ambiguity of a man who can compartmentalize his desires so neatly—until the walls between his worlds start to crumble. The moment is a ticking clock, a setup for the inevitable collision of his dual lives, where Ros’s presence looms like a silent witness to his duplicity.
