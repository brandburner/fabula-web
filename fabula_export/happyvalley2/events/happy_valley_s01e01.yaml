- fabula_uuid: cand_evt_scene_d385ad081e064a48_01
  global_id: null
  title: '**"The Ledger of Desperation: A Father’s Humiliation and the Boss’s Cold
    Calculus"**'
  description: |2-

      In the sterile, power-laden confines of Nevison Gallagher’s office, **Kevin Weatherill**—a man whose financial anxiety has eroded his dignity—attempts to negotiate a raise for his daughter **Melissa’s** private school tuition, framing it as an investment in her future. The exchange is a masterclass in class disparity: Kevin, visibly unraveling, stumbles through his plea, his pride dissolving under Nevison’s unblinking scrutiny. Nevison, a man who wields generosity like a weapon, listens with the detached pragmatism of a businessman who has long since divorced profit from human need. When Kevin mentions the cost—**£10,000 a year**—Nevison’s response is a financial autopsy: *‘Twenty grand a year for five years, most likely seven. That’s just shy of one hundred and fifty thousand.’* The numbers hang in the air like a verdict. Nevison’s deflection—*‘I’ll think about it’*—is a professional death sentence, a phrase Kevin has heard before, a scripted brush-off that leaves him hollowed out. The scene is a microcosm of systemic indifference: Kevin’s raw, personal stakes (his daughter’s future, his own failing pride) collide with Nevison’s bureaucratic detachment, exposing the fragility of working-class hope in a world where opportunity is a ledger entry, not a right. The moment plants the seed for Kevin’s later desperation, where his resentment will curdle into something far more dangerous than humiliation—*action*.
  episode_uuid: ep_sea_ser_happy_valley_s01_e01
  scene_sequence: 7
  sequence_in_scene: 8
  key_dialogue:
  - '**KEVIN:** *‘The thing is. Melissa. My eldest. She’s very bright, she’s very
    clever. We tried to get her in at Salter Hebble High, but it’s outside the catchment
    area. The thing is… we—Jenny—it was Jenny’s idea. She—Melissa—sat the entrance
    exam for St. Bartholomew’s. They’ve offered her a place. But not a scholarship.
    There’s a lot of competition. We’d like to be able to send her there. But the
    thing is… I’d need a pay rise.’*'
  - |-
    **NEVISON:** *‘I don’t pay you peanuts, Kevin.’*
        **KEVIN:** *‘No, Nevison, I know that.’*
        **NEVISON:** *‘How much is it?’*
        **KEVIN:** *‘Ten thousand pounds a year.’*
        **NEVISON:** *‘Ten thousand. And what about Catriona?’*
        **KEVIN:** *‘Catriona’s eight.’*
        **NEVISON:** *‘Yes, but she’s not daft, is she? You can’t send one and not the other.’*
        **KEVIN:** *‘We’ll cross that bridge when we get there.’*
        **NEVISON:** *‘Twenty grand a year for… five years, most likely seven. That’s just shy of one hundred and fifty thousand.’*
  - |-
    **NEVISON:** *‘The thing is, I’ve got a hundred and fifteen permanent staff working here, Kevin. If they all asked for a rise so they could send their kids to St. Bartholomew’s, I’d struggle to make a profit. Wouldn’t I?’*
        **KEVIN:** *‘I didn’t necessarily mean the whole amount—’*
        **NEVISON:** *‘I’ll tell you what I’m going to do, Kevin.’* *(smiles)* *‘I’m going to think about it.’*
