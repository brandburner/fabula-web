  key_dialogue:
  - |-
    HELEN: *It isn’t like Kevin’s just anyone. Is it.*
    NEVISON: *Course he isn’t. And I did think about it. It’s more than I’d have done for anyone else. Anyone else, I’d have said on your bike. Fact I’ve mentioned it to you shows it’s not a decision I’ve made lightly. Doesn’t it? Eh?*
    **Context**: Nevison’s **performative generosity** is exposed as hollow. He frames his refusal as 'fairness,' but his admission that he *considered* the raise *only* because Kevin is 'not just anyone' reveals his decisions are **emotionally driven, not principled**. The subtext? *He cares more about perception than justice.*
  - |-
    ANN: *You’re not looking at me. You don’t think I’m going to agree with anything you say. Do you?*
    **Context**: Ann’s **verbal gut-punch** dismantles Nevison’s self-righteousness. Her indifference isn’t just defiance—it’s the **death of his illusion of control**. She sees through him, and her **refusal to engage** is more damaging than any argument. This line **foreshadows her later abduction**: a woman who won’t be controlled, even at the cost of her safety.
  - |-
    NEVISON: *How much did we spend on her education? [...] I might as well’ve pissed it all up against a wall.*
    **Context**: Nevison’s **grief-stricken cruelty** reduces Ann’s sacrificed dreams to a **financial waste**, exposing his **resentment** toward her independence. The line is a **microcosm of his character**: a man who **blames others for his own failures**. It’s also a **prophetic moment**—his inability to value Ann’s potential will **directly contribute to her abduction**, as her defiance makes her a target for Kevin’s revenge.
  - |-
    HELEN: *(calm, quiet, sad) That was unnecessary.*
    NEVISON: *I’m a nice fella, Helen. I’m a good boss. I can’t do for one what I can’t do for everybody. Even if it is Kevin.*
    **Context**: Nevison’s **self-justification** is undercut by Helen’s **silent judgment**. Her discomfort (both physical and emotional) **hints at her terminal illness**, while Nevison’s **delusional self-image** (*‘I’m a nice fella’*) contrasts sharply with his **cruelty**. This exchange **reveals the power imbalance** in their marriage and foreshadows Nevison’s **isolated grief** when Helen’s illness progresses.
