  key_dialogue:
  - |-
    BOY: *Oy. Oy. Where’s yer warrant?*
    CATHERINE: *I haven’t got one, I don’t need one.*
  - |-
    GIRL: *He smacked me on the head.*
    BOY: *It were an accident.*
    GIRL: *It wor an accident.*
  - |-
    CATHERINE: *What’s your name? You. Lad. I’m talking to you.*
    BOY: *Jason Tindall. You can call me Tinner if y’want.*
    CATHERINE: *Right, well can you pull that syringe out of your foot. For me. Please.*
