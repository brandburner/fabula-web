      him about changing clothes and running a bath. Her final interaction with Clare
      is brief but charged, accepting the offer of tea with a nod before heading upstairs,
      her steps heavy with unspoken burdens.
    beliefs:
    - That acknowledging Richard’s gesture openly would invite unwanted scrutiny or
      judgment from Clare.
    - That her responsibilities to Ryan must take precedence over her personal emotions,
      even if it means suppressing her own needs.
