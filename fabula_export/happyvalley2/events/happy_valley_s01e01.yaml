    CLARE: Was that Richard? I heard. Last night.
    CATHERINE: We didn’t do anything we haven’t done a thousand times before.
    CLARE: Ey - I’m not judging anybody.
    CATHERINE: I get lonely. I didn’t want Tommy Lee Royce buzzing round in my head all night, I wanted something else.
  - 'CATHERINE: He’s the sort that thinks Manchester is abroad. It wouldn’t occur
    to him to go anywhere else, he wouldn’t know how to be anywhere else. He’s like
    a rat, he’ll never be more than three feet away.'
  - |-
    CLARE: Did it work?
    CATHERINE: No.
