      Catherine is sworn to uphold, yet it is also the system that cannot protect
      her from her past. The station’s protocols (incident forms, radio coordination,
      administrative duties) are a distant hum in the background as Catherine’s personal
      crisis unfolds. The organization’s presence is felt in Kirsten’s desk, the incident
      form she’s filling out, the mug of tea Shafiq delivers—all symbols of the routine
      that masks the deeper dysfunction. Norland Road Police Station represents the
      illusion of control: Catherine is a sergeant, a figure of authority, yet her
      authority is meaningless in the face of Royce’s reappearance. The organization’s
      failure to address her trauma is implicit; it is a system that demands professionalism
      but offers no support for the personal wounds of its officers.'
