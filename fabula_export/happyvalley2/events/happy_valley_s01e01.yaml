  key_dialogue: &id079
  - '**ASHLEY:** *Is that Nev? Nevison Gallagher. How you doing, Nevison Gallagher?
    Oh, you can call me... God.*'
  - '**NEVISON:** *Who are you? Where is she?*'
  - '**ASHLEY:** *I want you to get your car keys, and I want you to walk outside
    to your car. Slowly. Don’t rush. Don’t speak to anyone. I’m gonna ring you again.
    In twenty minutes. You’ve got twenty minutes. I want you on your own. I see any
    police, anything that makes me suspicious—even for a second—and you’ll regret
    it. For the rest of your life. Do you understand me?*'
