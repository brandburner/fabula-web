  key_dialogue:
  - |-
    KEVIN: *We have no luck.*
    JENNY: *We have a nice house. We have two fantastic children.*
    KEVIN: *(humorless snigger)* Two fantastic children who are going to go to a sub-standard school because I don’t earn enough money to send them elsewhere.
  - |-
    KEVIN: *Half that company should be mine. Jenny. And instead… Every day I have to go in there. Smiling. Then bend over and take it up the [backside]—*
    KEVIN: *I’m sorry. It’s what it feels like.*
  - |-
    JENNY: *I think we do very well. All things considered.*
    KEVIN: *All things considered? What does that mean?*
    JENNY: *Nothing. I just meant—*
    KEVIN: *Given how little and dull and ordinary we are.*
