  scene_sequence: 23
  sequence_in_scene: 29
  key_dialogue: &id041
  - |-
    KEVIN: How would you like to make half a million pounds?
    ASHLEY: Sorry?
    KEVIN: ((he struggles, he’s shaking with nerves, but he’s also determined)) It’s not something I could do on my own. I’ve thought it through, I’ve thought through most of the details. But I’d need help.
  - |-
    KEVIN: Nevison Gallagher. Has a daughter. Ann. Nevison could afford to lose half a million pounds. Easily. Any more and he might go to the police. It’d take a good few days—probably a week—to let him get that kind of money together. In cash. Without arousing any suspicion at the bank. And I don’t know where we’d—you’d—keep her, there are aspects I haven’t thought through. Yet. But the basic...
    ASHLEY: ((amused, the closest he gets to smiling)) You’re talking about—kidnapping her?
  - |-
    KEVIN: ((his face hardens)) No. No, Ashley. I don’t like old Nev. Did you know. Him and my dad. Were best friends. At school. They grew up in the same street. They cooked the idea up together, they kicked it all off together. Then my dad went off to college. To train to be an accountant. And when he came back. Nevison offered him a job.
    KEVIN: ((he sneers)) They were partners! And somehow Nevison side-stepped that. Like he does side-step things. He’d got the lawyers in. And my dad—being my dad—he just accepted it.
    ASHLEY: Can I think about it?
    KEVIN: Oh, that’s what Nevison said. When I asked him for a rise. So I can get Melissa into a better school. He thought about it and then he said no.
