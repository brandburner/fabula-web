      for Nevison’s unraveling, and her safety becomes the sole focus of his desperate
      actions. The event underscores her role as both the victim and the unwitting
      instrument of her father’s humiliation, reflecting the broader theme of her
      as a casualty of Nevison’s emotional neglect.
