      desks, radios, and protocols—feels distant and ineffective in the face of Catherine’s
      personal vendetta. It is a place of order, but order cannot contain the chaos
      of her trauma. The station’s role here is ironic: it is meant to be a refuge,
      yet it is also the place where Catherine’s professional identity is most at
      odds with her personal unraveling.'
