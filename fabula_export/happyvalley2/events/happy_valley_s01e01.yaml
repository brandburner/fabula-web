- fabula_uuid: cand_evt_scene_3f06aff7cfdb86d1_01
  global_id: null
  title: 'The Phantom in the Takeaway Window: A Haunting in Broad Daylight'
  description: "\n  In a moment of professional detachment—recounting a bizarre, darkly\
    \ comic incident over the phone to Kirsten while patrolling—Catherine’s world\
    \ fractures when her trained eyes catch a glimpse of **Tommy Lee Royce** through\
    \ her windshield. The sight is fleeting: Royce, freshly released and now a specter\
    \ of her unhealed trauma, lingers outside a Chinese takeaway, flicking a cigarette\
    \ onto the pavement. The recognition hits her like a physical blow, silencing\
    \ her mid-story. Her instinctive reaction is visceral: she abruptly ends the call,\
    \ abandons her patrol car, and pursues him through the streets, her movements\
    \ sharp with adrenaline. Yet the chase yields nothing—Royce vanishes, leaving\
    \ only a smoldering cigarette butt as proof of his presence. The encounter is\
    \ a brutal reminder of the past’s inescapable grip on her present, forcing Catherine\
    \ to confront the raw, unprocessed wounds she carries beneath her professional\
    \ composure. This moment is not just a failed pursuit; it’s a psychological turning\
    \ point, where the line between her duty as a police officer and her personal\
    \ vendetta blurs irrevocably. The emptiness of the street mirrors the hollowness\
    \ she feels, a void that Royce’s reappearance has torn open once more.\n\n  The\
    \ event’s tension lies in its contrast: Catherine’s usual hyper-vigilance—her\
    \ trained ability to *see* everything—fails her in the one moment that matters\
    \ most. Her hesitation before pursuing Royce underscores her internal conflict:\
    \ the woman who has spent years enforcing the law is now tempted to cross a line\
    \ she swore to uphold. The takeaway window, a mundane backdrop, becomes a portal\
    \ to her nightmares, and the smoldering cigarette a metaphor for the unresolved\
    \ rage smoldering within her. This is not just a sighting; it’s a harbinger of\
    \ the chaos to come, where Catherine’s past and present will collide with devastating\
    \ consequences.\n  "
