  key_dialogue: &id073
  - |-
    **ANN** *(muttering, venomous)*:
        *‘Stupid tosser.’*
  - |-
    **LEWIS** *(over-the-top politeness, masking tension)*:
        *‘God, I’m really sorry.’
        **ANN**:
        *‘Idiotic thing to do!’*
        **LEWIS**:
        *‘Yeah, but—you were driving kind of a bit all ovver t’place weren’t you. Speed-wise.’*
        **ANN**:
        *‘Oh so it’s my fault that you’re not looking at what’s in front of [you]’*
  - |-
