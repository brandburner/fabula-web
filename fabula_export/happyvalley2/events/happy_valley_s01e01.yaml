  object_involvements:
  - object_uuid: ger_object_9c34741b897d
    description_of_involvement: 'Catherine’s Bluetooth device is the conduit through
      which her professional detachment shatters. She uses it to narrate the Spiderman
      anecdote to Kirsten, her voice clinical and detached, masking the turmoil beneath.
      When she spots Royce, her hand moves sharply to prod the device off, cutting
      the call mid-sentence. The Bluetooth headset symbolizes the thin veneer of normalcy
      she clings to—her ability to perform her role, to *sound* like the composed
      sergeant—before the sight of Royce forces her to abandon that facade. Its abrupt
      deactivation mirrors her emotional unraveling: the moment she can no longer
      pretend.'
    status_before_event: Clipped to Catherine’s ear, active, facilitating her phone
      call with Kirsten. A tool of professional communication, unremarkable in its
      function.
    status_after_event: Deactivated and discarded (metaphorically and physically),
      no longer a bridge to normalcy but a relic of the moment her composure cracked.
    global_id: ger_object_9c34741b897d
  - object_uuid: ger_object_b96714bd1456
    description_of_involvement: 'The Chinese takeaway menu is a mundane but pivotal
      object in this event. Tommy Lee Royce pauses to study it closely after lighting
      a cigarette, his gaze lingering as he flicks the butt onto the pavement. The
      menu serves as a prop for his casual, almost performative mundanity—a stark
      contrast to the violence of his past and the trauma he represents. For Catherine,
      the menu becomes a symbol of the banality that masks horror: Royce, a rapist
      and a monster, stands in broad daylight, perusing takeout options as if he hasn’t
      destroyed lives. The menu’s presence underscores the dissonance between the
      ordinary and the extraordinary, the seen and the unseen.'
    status_before_event: Displayed in the window of the Chinese takeaway, unremarkable
      and static, part of the everyday backdrop of Rawson Lane.
    status_after_event: Unchanged physically, but now imbued with narrative significance—Catherine
      will associate it forever with the moment she saw Royce, a visual trigger for
      her trauma.
    global_id: ger_object_b96714bd1456
  - object_uuid: ger_object_da9d1f2020b9
    description_of_involvement: 'Clare’s cigarette, smoked on the back step of Catherine’s
      house earlier in the scene, is not physically present here but looms as a metaphorical
      counterpart to Royce’s smoldering fag. Clare’s cigarette represents the slow
      burn of family tension—her laid-back posture, the smoke curling upward, the
      unspoken strain between her, Catherine, and Ryan. Royce’s cigarette, by contrast,
      is a sudden, violent spark: the ember that ignites Catherine’s pursuit. Both
      cigarettes symbolize unresolved conflict, but where Clare’s is passive (a habit,
      a pause), Royce’s is active (a taunt, a challenge). The smoldering butt he leaves
      behind is the only evidence of his presence, a literal and figurative ember
      of the trauma he’s reignited.'
    status_before_event: Not present in this event, but its metaphorical counterpart
      (Royce’s cigarette) is freshly lit and flicked onto the pavement.
    status_after_event: The smoldering butt remains on the pavement, a haunting remnant
      of Royce’s fleeting presence, much like the lingering tension Clare’s cigarette
      represents in Catherine’s personal life.
    global_id: ger_object_da9d1f2020b9
  - object_uuid: ger_object_7253af2225d0
    description_of_involvement: 'While not directly involved in this event, Kirsten’s
      steaming mug of tea—delivered by Shafiq—serves as a stark contrast to Catherine’s
      crisis. The mug, curling with vapor, represents the mundane comforts of the
      station: routine, camaraderie, the illusion of control. Its presence at Kirsten’s
      desk, untouched as she listens to Catherine’s call, underscores the disconnect
      between the two women’s realities. For Kirsten, the tea is a normal part of
      her day; for Catherine, such normalcy is a distant memory, shattered by the
      sight of Royce. The mug’s steam, rising unseen, mirrors the unspoken tensions
      simmering beneath the station’s surface.'
    status_before_event: Placed on Kirsten’s desk by Shafiq, steam curling upward,
      a prop of station life.
    status_after_event: Left untouched, cooling, as Kirsten returns to her work. The
      tea’s warmth fades, much like the fleeting normalcy it represented.
    global_id: ger_object_7253af2225d0
  - object_uuid: ger_object_627e32bb6e8f
    description_of_involvement: 'Catherine’s patrol car is both her sanctuary and
      her prison in this moment. It is the vehicle of her authority, the symbol of
      her professional identity, but also the cage of her grief. She drives it with
      trained precision, her eyes constantly moving (''mirrors, dashboard, mirrors,
      out front''), a habit that should have alerted her to Royce sooner. Yet when
      she sees him, the car becomes a barrier—she *abandons* it, as if shedding her
      institutional skin to pursue him on foot. The patrol car’s presence in the side
      street, doors locked, engine off, is a visual metaphor for her hesitation: the
      moment she chooses to act on personal vendetta over duty. Its abandonment is
      not just practical but symbolic—she is stepping outside the law.'
    status_before_event: Parked on Rawson Lane, engine running, Catherine at the wheel,
      a mobile extension of her professional role. The car is orderly, functional,
      a tool of her authority.
    status_after_event: Abandoned on a side street, parallel to Milton Avenue, doors
      locked. The car sits empty, a relic of the moment Catherine crossed a line,
      its presence a silent witness to her internal conflict.
