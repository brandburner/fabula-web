    emotional_state: Feigned composure masking deep exhaustion and unresolved grief,
      with flashes of defensiveness when confronted about Richard’s reappearance.
      Her emotional state is a fragile balance between personal longing and professional
      caution, complicated by her role as Ryan’s guardian.
    goals:
    - To maintain a facade of control and composure in front of Clare, despite her
      internal turmoil.
    - To briefly assert her authority over Ryan, re-establishing her role as his caregiver
      before retreating upstairs for a moment of solitude.
    what_happened: Catherine opens the envelope marked ‘Catherine’ with a mix of curiosity
      and trepidation, her fingers lingering on the card as she reads Richard’s name
      aloud. Her body language—weary posture, self-conscious amusement—betrays her
      internal conflict. She exchanges tense dialogue with Clare, her voice shifting
      from amused to defensive as Clare’s warning sinks in. When Ryan interrupts from
      upstairs, Catherine’s demeanor hardens slightly, her maternal instincts overriding
      her personal vulnerabilities as she shifts into caregiver mode, calling up to
      him about changing clothes and running a bath. Her final interaction with Clare
      is brief but charged, accepting the offer of tea with a nod before heading upstairs,
      her steps heavy with unspoken burdens.
