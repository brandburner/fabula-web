  key_dialogue: &id083
  - |-
    ASHLEY: *So here’s the situation, Nev. The people who’ve got your Annie. Are after one million pounds. In cash. They’re giving us two days, you and me. To get that money together. What d’you think?*

    NEVISON: *I can’t get hold of a million pounds. Not in cash, not in two days.*

    ASHLEY: *I don’t think they’re gonna believe that. You’re Nevison Gallagher. You live in a big house and you drive a Bentley.*
  - |-
    ASHLEY: *I won’t meself personally, but... I’ll do what I can for yer, Nev. I’ll be in touch.*

    [ASHLEY hangs up. NEVISON is beside himself with panic, anger, bewilderment, powerlessness. Ashley removes the sim card from Ann’s iPhone and crushes it underfoot. He then reaches for a stone from a wall and smashes the iPhone to bits.]
  - |-
    ASHLEY: *They’re evil, I’m telling you, believe me, y’don’t want them to feel you’re not concentrating.*

    NEVISON: *You do not hurt that girl!*
