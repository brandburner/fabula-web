- fabula_uuid: act_827029e2e7e11bd5
  number: 2
  summary: Following the agreement to kidnap Ann, Kevin Weatherill delves deeper into
    his criminal conspiracy, revealing to Ashley Cowgill his profound, long-standing
    resentment towards Nevison Gallagher, rooted in a perceived betrayal regarding
    their fathers' business partnership. This revelation underscores Kevin's mixed
    motivations of financial desperation and personal vengeance. Simultaneously, Catherine
    Cawood grapples with the emotional fallout of Tommy Lee Royce's release. She visits
    her daughter Becky's grave, a poignant moment of grief, and later confides in
    Mrs. Beresford, Ryan's headteacher, the harrowing truth of Becky's rape by Tommy
    and subsequent suicide. This deeply personal disclosure exposes Catherine's core
    trauma and her fears about Ryan's genetic connection to his biological father,
    Tommy, intensifying her internal conflict and hinting at her potential for extreme
    action. A significant turning point for Kevin occurs when Nevison, unexpectedly,
    offers to pay both his daughters' school fees and promote him to Deputy Managing
    Director, revealing his wife Helen's liver cancer as the catalyst for his generosity.
    This act of kindness completely undermines Kevin's initial motivation for the
    kidnapping, plunging him into a moral quagmire. Despite this, when Kevin attempts
    to call off the plan, Ashley aggressively threatens Kevin and his family, effectively
    trapping him in the dangerous scheme. Catherine, meanwhile, continues to wrestle
    with her desire for revenge, discussing her violent fantasies about Tommy with
    Richard, highlighting the depth of her anger and her struggle to remain within
    the bounds of the law.
