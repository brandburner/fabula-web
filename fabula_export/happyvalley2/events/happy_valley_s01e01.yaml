      movement is a contradiction, oscillating between collapse and action.
    goals:
    - To confess his role in the kidnapping and alleviate his guilt, even if it means
      self-destruction.
    - To regain a semblance of control over his life before the situation spirals
      further out of his hands.
    what_happened: Kevin Weatherill sits rigidly in the driver’s seat of his car,
      his hands gripping the steering wheel as if it were the only thing anchoring
      him to reality. His breath is shallow, his body trembling visibly, and his eyes
      dart between the police station’s imposing facade and the watch on his wrist.
      The car’s confined space amplifies his panic, turning it into a physical force
      pressing in on him. Without warning, his paralysis breaks—he shoves the door
      open with sudden, almost violent force and steps out, his movements jerky with
      adrenaline as he heads toward the station.
