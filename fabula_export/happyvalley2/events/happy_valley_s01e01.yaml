  - 'MRS.MUKHERJEE: *You’re such a nice little boy, Ryan. Most of the time. But then
    you let this unpleasant temper get the better of you. And I understand you get
    frustrated, but we have to find better ways of dealing with it.*'
  - 'CATHERINE: *Did he...? Hurt anyone?*'
  - 'MRS.MUKHERJEE: *Well no, he hurt himself.*'
  - 'MRS.MUKHERJEE: *When you start throwing chairs across the room and using unacceptable
    language... and you see we do have a responsibility to protect the other children.*'
