    - I was at Oldham Coliseum with Joyce dressed up like a pillock for the Rocky
    Horror Show! She invited me at the last second because her cousin dropped out,
    and that’s why it never went on my calendar.'
  - 'SHAF: So when Aurelia Petrovic was getting slashed, you and Joyce were doing
    the time warp.'
  - 'CATHERINE: Isn’t life weird?'
  - 'SHAF: I can’t picture that.'
  - 'CATHERINE: Yeah, don’t try.'
