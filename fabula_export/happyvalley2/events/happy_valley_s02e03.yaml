  global_id: null
  title: Catherine Recognizes the Hanged Man
  description: Catherine and Ann arrive at Crow Wood Park to investigate a reported
    suicide, where a hanged body is discovered in the trees. The scene opens with
    Catherine’s clinical detachment contrasting sharply with Ann’s visceral reaction
    to the corpse, revealing their divergent approaches to death and trauma. Catherine’s
    focus on procedural details—directing Ann to gather witness statements from the
    nuns, calling in CSI and CID—shifts abruptly when she recognizes the victim as
    Goran Dragovic, the man she tasered and released on bail the previous day. This
    recognition triggers a moment of stunned silence, followed by a tense exchange
    with Ann about the nicknames she’s given Catherine, which Ann reluctantly admits
    are affectionate but unflattering. The subtext of their conversation—Ann’s lingering
    resentment over Catherine’s past life-saving intervention and Catherine’s defensive
    professionalism—escalates into a raw confrontation, exposing the unresolved friction
    between them. The discovery of Dragovic’s body not only sets the stage for a murder
    investigation but also forces Catherine to confront her unresolved trauma and
    the consequences of her past actions, particularly her encounter with Tommy Lee
    Royce. The scene’s eerie stillness and the victim’s damp trousers hint at deeper
    connections to Catherine’s unresolved past and the looming threat of Royce’s influence,
    while the vodka bottles and discarded jacket suggest a staged suicide. The moment
    Catherine realizes she knows the victim marks a turning point, shifting the investigation
    from a routine suicide to a potential homicide tied to her own history.
