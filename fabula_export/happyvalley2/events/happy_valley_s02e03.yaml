  title: Clare’s veiled warning about Daniel
  description: "\n  In the kitchen of Catherine’s home, Clare casually announces Neil’s\
    \ impending visit while setting the table, a seemingly mundane detail that immediately\
    \ triggers Catherine’s defensive sarcasm. The exchange escalates when Clare—uncharacteristically\
    \ direct—asks Catherine to ensure Daniel doesn’t behave ‘weirdly’ around Neil.\
    \ This request, framed as a lighthearted plea, carries an undercurrent of tension:\
    \ Clare’s phrasing (‘*that’s new to Catherine*’) and Catherine’s unspoken reaction\
    \ (‘*what the fuck?*’) suggest this isn’t the first time Daniel’s behavior has\
    \ been a problem. The moment exposes Clare’s role as a silent observer of the\
    \ household’s fractures, while Catherine’s compliance (or resistance) will reveal\
    \ her own complicity in the unspoken rules governing their fractured family. The\
