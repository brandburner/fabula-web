  title: Ryan evades Catherine’s questions about Tommy
  description: Catherine intercepts Ryan in the backyard, probing his interactions
    with Miss Wealand about his incarcerated father, Tommy Lee Royce. Ryan’s terse,
    dismissive response—‘We don’t talk about my dad’—reveals his discomfort, while
    Catherine’s sharp warning to ‘keep it that way’ underscores her determination
    to suppress any connection between Ryan and Royce. The exchange exposes the fragility
    of their relationship, with Ryan’s evasiveness hinting at deeper secrets. Meanwhile,
    Catherine’s abrupt shift to delivering the news of Goran Dragovic’s death to Ilinka
    and Winnie pivots the scene into a darker, more urgent investigation, where Ilinka’s
    terrified denial of suicide (‘They’ve shut him up’) foreshadows a conspiracy that
    will force Catherine to confront both her personal demons and the case’s escalating
    violence. The scene’s tension lies in the contrast between Catherine’s control
    over Ryan’s silence and her inability to control the unraveling truth around Dragovic’s
    death, which threatens to destabilize her already precarious emotional state.
