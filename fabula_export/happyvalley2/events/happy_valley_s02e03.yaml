  title: Ann’s morbid curiosity and John’s unraveling
  description: In the tense, quiet atmosphere of the H-MIT offices, Ann Gallagher—eager
    and unfiltered—barges into John Wadsworth’s space with graphic, morbid fascination
    about the suicide victim’s corpse, revealing her unsettling detachment and latent
    obsession with death. Her questions about erectile responses during hanging and
    her spontaneous declaration of wanting to become a detective expose her as both
    a potential investigative asset and a liability, her enthusiasm bordering on voyeuristic.
    John, already on edge from his involvement in Vicky Fleming’s murder, reluctantly
    allows Ann to examine crime scene photos, his discomfort palpable. When Ann impulsively
    connects the unidentified victim to the missing woman from the burnt-out flat
    (Vicky Fleming), John’s panic flashes—his guilt momentarily surfacing as he’s
    forced to engage with the very crime he’s trying to conceal. Jodie Shackleton’s
    dry, professional interjections ground the scene, subtly reinforcing Ann’s naivety
    and John’s precarious position. The exchange underscores Ann’s potential as a
    detective (her observational skills and tenacity) while highlighting John’s fragility,
    his professional detachment crumbling under the weight of his secret. The scene
    also plants the seed for Ann’s romantic interest in John, complicating his already
    volatile state.
