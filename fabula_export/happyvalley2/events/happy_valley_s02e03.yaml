  title: Clare reveals Ryan’s tutor’s probing question
  description: In the quiet tension of Catherine’s conservatory, Clare—still emotionally
    raw from her relapse and Ilinka’s trauma—attempts to connect with Catherine over
    tea. Their exchange reveals Clare’s lingering vulnerability and self-doubt, as
    she oscillates between admiration for Catherine’s strength and resentment over
    her own perceived failures. The moment shifts when Clare casually mentions Ryan’s
    reading tutor, Miss Wealand, asking the boy about his father—a question that immediately
    piques Catherine’s investigative instincts. Catherine’s reaction (a mix of intrigue
    and suppressed anger) signals her recognition of a potential lead in the broader
    case, particularly given Tommy Lee Royce’s lingering influence. The scene underscores
    the fragility of Clare’s recovery while planting a critical clue that could unravel
    the mystery of Ryan’s paternity and its connection to Royce’s crimes. The conservatory’s
    dim lighting and Catherine’s defensive posture (sleeping with a cricket bat) reinforce
    the atmosphere of unresolved threat and emotional exhaustion that defines their
    dynamic.
