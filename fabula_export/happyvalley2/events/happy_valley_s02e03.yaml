  title: Tommy’s ritualized self-mythologizing
  description: In the claustrophobic confines of his prison cell, Tommy Lee Royce
    meticulously styles his hair with obsessive precision, his movements deliberate
    and almost ceremonial. The scene is bathed in ironic sunlight streaming through
    the grimy window, casting a halo-like glow around him as he admires his reflection.
    The crucifix tattoo on his neck—a crude, prison-made mark—contrasts sharply with
    the saintly lighting, underscoring the grotesque disconnect between his performative
    piety and the darkness of his true nature. This ritualistic grooming isn’t just
    vanity; it’s a deliberate act of self-mythologizing, a performance designed to
    reinforce his own twisted narrative of martyrdom and divine favor. The visual
    irony of the halo effect, combined with the squalor of his surroundings, exposes
    the hollow nature of his self-perception, reinforcing his role as a fallen figure
    who clings to the trappings of sanctity while embodying moral corruption. The
    scene serves as a psychological character study, deepening the audience’s understanding
    of Tommy’s narcissism and the delusional spirituality that fuels his identity,
    all while foreshadowing the ways his influence continues to poison Catherine’s
    life from behind bars.
