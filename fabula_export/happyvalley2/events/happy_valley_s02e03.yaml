  title: Shaf forces entry to interrogate Mrs. Dragovic
  description: In a working-class neighborhood reminiscent of Lynn Dewhurst’s home,
    Catherine Cawood and Shaf approach the Dragovic residence to deliver devastating
    news about Goran Dragovic’s death. Catherine, visibly uncomfortable, defers to
    Shaf, who takes the lead with calculated aggression. Mrs. Dragovic, immediately
    hostile and distrustful of police, attempts to shut the door, but Shaf exploits
    a fabricated 'accident' pretext to coerce entry into the home. The confrontation
    escalates as Shaf’s body language makes it clear he is entering regardless of
    her consent, exposing Catherine’s emotional vulnerability and the duo’s fractured
    dynamic. The scene underscores the power imbalance between the police and the
    vulnerable community they serve, while hinting at deeper secrets tied to Goran’s
    past and the broader murder investigation. Catherine’s reluctance to engage reflects
    her unresolved trauma, particularly her role in Goran’s prior arrest, while Shaf’s
    assertive tactics reveal his willingness to bend ethical boundaries for the sake
    of the investigation. The tension between them foreshadows future conflicts as
    the case deepens.
