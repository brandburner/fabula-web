  title: Ann identifies victim as Vicky Fleming
  description: 'In the tense, quiet atmosphere of the H-MIT offices, Ann Gallagher—eager
    and observant—interrupts John Wadsworth’s distracted work to share details about
    a suicide case she witnessed, revealing her fascination with death and her ambition
    to become a detective. John, visibly uncomfortable, deflects her questions about
    the victim’s identity, but Ann’s sharp mind connects the dots when she realizes
    the unidentified murder victim matches the missing woman from the burnt-out flat
    on Ripponden—Vicky Fleming. Jodie Shackleton’s offhand correction that the victim
    was *not* a prostitute further unsettles John, whose panic is palpable as Ann’s
    revelation tightens the noose around his hidden crime. The moment marks a critical
    turning point: Ann’s accidental deduction forces the investigation closer to the
    truth, while John’s internal unraveling becomes impossible to ignore. The scene
    underscores Ann’s growing role as an investigative asset and John’s desperate
    struggle to maintain his facade as the case closes in on him.'
