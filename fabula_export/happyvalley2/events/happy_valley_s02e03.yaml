  key_dialogue: &id035
  - 'CLARE: He said summat today. Odd. Miss Wealand. This new one that reads with
    him. I’ve met her, she seems right enough. But. He said they were talking about
    things he likes and things he doesn’t like. He doesn’t like reading. For instance.
    And he does like chips. And custard. And football. That kind of thing. Anyway,
    apparently she said, ''What about your dad? Do you like your dad?'' And he says
    he just said, ''We don’t talk about me dad.'' And that was it. But. Why’s she
    asking him about his dad? Doesn’t she know not to do that? Haven’t they told her?'
  - 'CATHERINE: Ask her. Next time you see her.'
  - 'CLARE: She won’t be there again ‘til next Monday, she only works Monday Tuesday
    Wednesday.'
