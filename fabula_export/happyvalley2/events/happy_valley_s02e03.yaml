  title: Amanda Threatens to Expose John’s Alibi
  description: 'In the tense, disheveled kitchen of John and Amanda Wadsworth’s home,
    the morning routine unfolds like a pressure cooker about to explode. John, visibly
    hungover and irritable, irons his shirt while Amanda aggressively loads the dishwasher,
    their mutual resentment palpable. The children—Ben, Amber, and Jack—move silently
    through the space, their sullen demeanors reflecting the household’s fractured
    state. Amanda seizes a moment when the children are out of earshot to confront
    John about his alibi, revealing she knows he lied about being on observation duty
    the night of Vicky Fleming’s murder. She drops the name of a colleague (Clifford)
    and threatens to escalate the matter to Andy Shepherd, the superintendent. John’s
    initial dismissal—‘pack your shit and move out’—escalates into a vicious verbal
    exchange, where Amanda’s accusations of neglect and infidelity collide with John’s
    crude insults. The subtext is explosive: Amanda’s threat isn’t just about his
    affair with Vicky; it’s a lever to expose his alibi, which could unravel his entire
    career and implicate him in the murder. John’s desperate deflection (‘What would
    Clifford know?’) and Amanda’s counter (‘Maybe I’ll ask Andy Shepherd’) signal
    a turning point—she’s no longer just a wronged wife but a potential witness who
    could destroy him. The scene ends with the threat hanging in the air, the children’s
    presence looming as a reminder of what’s at stake. This isn’t just a marital blowup;
    it’s a strategic gambit in a high-stakes game of exposure and survival.'
