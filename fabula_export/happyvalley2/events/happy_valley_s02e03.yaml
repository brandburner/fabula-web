  title: Jodie exposes John’s deception
  description: 'In a tense, high-stakes exchange at the H-MIT offices, John Wadsworth
    attempts to downplay the victim’s identity during a post-mortem discussion, subtly
    reinforcing the assumption that she was a prostitute—a narrative that aligns with
    his desperate need to obscure the truth. His evasiveness is met with Ann’s eager
    curiosity and Jodie Shackleton’s sharp, unrelenting scrutiny. When Ann casually
    connects the victim to the missing woman from the burnt-out flat on Ripponden,
    John’s panic is palpable, betraying his guilt. Jodie seizes the moment, bluntly
    correcting John’s misleading characterization of the victim’s lifestyle—‘We think
    she’s not a prostitute, John’—a revelation that fractures the investigative dynamic.
    The exchange forces John into a defensive posture, exposing his bias and the fragility
    of his alibi while escalating the professional friction between him and Jodie.
    The moment also hints at deeper institutional tensions, as Jodie’s intervention
    suggests a growing distrust of John’s handling of the case. For John, this is
    a critical turning point: his carefully constructed facade is beginning to unravel,
    and the net is tightening around him.'
