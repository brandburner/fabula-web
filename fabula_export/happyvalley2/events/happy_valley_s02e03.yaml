    discovered body, but John abruptly shifts the conversation to his personal crisis:
    he reveals his wife Amanda’s months-long affair with Graham Tattersall, which
    he discovered *after* returning home from Vicky Fleming’s murder. The flashback
    of John walking in on the affair (Amanda and Graham mid-act, stunned silence)
    underscores his psychological fracture—his guilt over Vicky’s death compounded
    by this betrayal. Ann, caught off-guard by his sudden vulnerability, offers sympathy,
    but John pivots abruptly to ask her out for a drink, a desperate bid for connection.
    Their stilted, overlapping dialogue reveals Ann’s hesitation (Is it inappropriate?
    When?) and John’s raw neediness (Really? Whenever.), culminating in a tentative
    agreement. The exchange deepens their fragile bond while exposing John’s unraveling
    state—his confession a crack in his professional facade, his invitation a plea
    for distraction from his crimes. The post-mortem mention lingers as a grim reminder
    of his complicity, heightening the tension between his personal and professional
    unraveling.'
