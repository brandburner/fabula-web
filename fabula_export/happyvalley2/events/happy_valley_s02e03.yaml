  title: Joyce turns to cactus for comfort
  description: After Catherine abruptly ends their call, Joyce—left emotionally exposed—turns
    to her office cactus as a silent confidant. The moment reveals her deep loneliness
    and the fragility of her coping mechanisms. By anthropomorphizing the cactus (showing
    it the phone as if seeking validation), Joyce exposes her isolation amid the chaos
    of the investigation. This intimate, almost ritualistic act underscores her vulnerability
    and the precarious state of her mental well-being, contrasting with her professional
    demeanor. The beat serves as a quiet counterpoint to Catherine’s unraveling, highlighting
    how both women rely on unconventional sources of solace in the face of trauma.
