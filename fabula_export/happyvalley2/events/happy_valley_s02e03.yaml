  title: Ann confirms Vicky Fleming’s identity
  description: In the H-MIT offices, Ann Gallagher reveals that the unidentified murder
    victim matches Vicky Fleming—a woman never officially reported missing. She offers
    to email a photo of Vicky, forcing John Wadsworth into a paralyzing moment of
    panic. His hesitation, though unnoticed by Jodie and Ann, exposes his deepening
    guilt. The revelation shifts the investigation from speculation to concrete evidence,
    tightening the noose around John’s hidden connection to the victim. Jodie’s approval
    of Ann’s initiative underscores the escalating pressure on John, whose internal
    scream—*No!*—contrasts sharply with his forced professional composure. This beat
    marks a critical turning point, accelerating the unraveling of John’s secrets
    and the case’s darkening trajectory.
