  title: John’s distracted drive interrupted by Jodie
  description: John Wadsworth, already unraveling after the autopsy of Vicky Fleming
    and the confirmation of her identity, drives home in a distracted state. His Bluetooth
    fails to connect, forcing him to answer Jodie Shackleton’s call manually—a small
    but telling detail that underscores his disorientation. The interruption disrupts
    his already fractured focus, momentarily pulling him from his spiraling thoughts
    about the murder he committed. Jodie’s call serves as an external anchor, briefly
    grounding him in the professional sphere while his personal life and guilt threaten
    to consume him. The scene highlights his deteriorating mental state, where even
    routine tasks like driving become hazardous due to his preoccupation with the
    crime he’s desperate to conceal. The moment foreshadows his impending breakdown
    and the tightening noose of the investigation closing in on him.
