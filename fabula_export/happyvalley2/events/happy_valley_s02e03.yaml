  global_id: null
  title: Nicknames expose unspoken tensions
  description: Catherine and Ann arrive at Crow Wood Park to investigate a suspected
    suicide, where Catherine’s clinical detachment clashes with Ann’s visceral reaction
    to the hanging body. Their exchange over Ann’s reluctance to reveal Catherine’s
    nicknames—‘Cat’ and ‘Cath’—escalates into a charged confrontation, exposing Ann’s
    lingering resentment over Catherine’s past life-saving intervention and Catherine’s
    defensive professionalism. The tension peaks when Catherine invokes her rank and
    their personal history (‘I saved your life. From that bastard.’), forcing Ann
    to confront the unspoken power dynamics and emotional debts between them. The
    moment is abruptly cut short when Catherine recognizes the victim as a man she
    previously tasered and released on bail, revealing her own unresolved guilt and
    the case’s personal stakes. The scene underscores their fragile alliance and the
    professional/personal fault lines threatening to destabilize their working relationship
    at a critical juncture in the investigation.
