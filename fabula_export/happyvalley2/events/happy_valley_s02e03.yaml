  title: Catherine’s Fragile Relief and Clare’s Warning
  description: Catherine returns home after being cleared of suspicion in the Aurelia
    Petrovic murder, her initial relief evident in her sarcastic triumph over Jodie
    Shackleton’s accusations. The moment is fleeting—Clare’s announcement that Neil
    is coming for dinner triggers Catherine’s sharp, defensive sarcasm, exposing the
    brittle undercurrent of domestic tension. Clare’s passive-aggressive request for
    Catherine to ‘not frighten him’ and her cryptic plea to ‘ask Daniel not to be
    weird’ reveal deeper, unresolved conflicts within the household. Catherine’s compliance—delivered
    with barely concealed irritation—hints at her role as the family’s reluctant mediator,
    while Clare’s veiled warnings suggest Daniel’s behavior is a growing concern.
    The exchange underscores how Catherine’s professional burdens spill into her personal
    life, further straining an already fragile dynamic. The scene serves as a microcosm
    of the Cawood household’s dysfunction, where unspoken tensions simmer beneath
    mundane interactions, and Catherine’s emotional exhaustion is palpable.
