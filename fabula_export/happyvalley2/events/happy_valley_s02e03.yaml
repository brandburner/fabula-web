  title: John assigned to Vicky’s autopsy
  description: 'In the H-MIT briefing room, Andy Shepherd outlines the discovery of
    Vicky Fleming’s mutilated corpse—strangled and vaginally mutilated, mirroring
    Tommy Lee Royce’s signature. The team is tasked with identifying the victim and
    canvassing witnesses, but the focus remains on John Wadsworth, whose visceral
    reaction to the news (and the subliminal flashback of him smashing a bottle in
    Vicky’s flat) reveals his complicity. Andy casually assigns John to handle exhibits
    at the post-mortem, a task he accepts reflexively before the horror of the implication
    sinks in: he’ll have to bag Vicky’s clothes and witness her autopsy. The scene
    underscores John’s unraveling—his professional compliance masking his guilt—while
    tying Vicky’s murder to Royce’s past crimes, elevating the stakes for Catherine’s
    unresolved trauma and the station’s buried history. The assignment forces John
    to confront his crime head-on, setting up his psychological breakdown and the
    eventual unraveling of his alibi.'
