  title: John’s unraveling during Vicky’s autopsy
  description: John Wadsworth, the murderer of Vicky Fleming, is forced to participate
    in her autopsy, where the clinical dissection of her body triggers violent flashbacks
    of her death. As the lab assistant hands him exhibits—including Vicky’s shoes
    and clothing—John’s dissociation becomes apparent, his gaze fixed on her decomposing
    face. The pathologist, Dr. Carol Fowler, notes signs of asphyxiation and internal
    injuries, details that mirror John’s own memories of the crime. When the assistant
    interrupts his reverie, John deflects with a weak excuse ('just out of practice'),
    masking his guilt. The scene underscores his psychological fracture, where the
    sterile mortuary setting contrasts sharply with the brutality of his crime, pushing
    him closer to exposure.
