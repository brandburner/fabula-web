  title: Tommy’s paranoid outburst against Catherine
  description: In a tense prison visiting room, Tommy Lee Royce’s fragile emotional
    state collapses into violent paranoia as he fixates on Catherine Cawood’s perceived
    manipulation of Ryan. Frances attempts to reassure him about Ryan’s lingering
    affection, but Tommy’s fragile hope quickly curdles into rage. He vehemently denies
    his past crimes (raping Ann Gallagher, killing the police girl), justifies his
    violent actions (beating his grandmother, killing Lewis), and escalates into a
    chilling demand for Catherine’s elimination—‘she needs putting out of her misery.’
    His erratic shifts between vulnerability and aggression expose his fractured psyche,
    while his obsession with controlling Ryan’s narrative reveals the depth of his
    unchecked paranoia. The confrontation foreshadows Catherine’s danger and underscores
    Tommy’s willingness to cross moral lines, even from prison. Frances’ calm demeanor
    contrasts with Tommy’s unraveling, highlighting the precarious balance of their
    relationship and the threat Tommy poses to Catherine’s investigation and personal
    safety.
