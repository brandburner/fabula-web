  title: Praveen Forces Catherine’s Psychological Reckoning
  description: 'In a tense, high-stakes confrontation, Praveen—Catherine’s superior—delivers
    an ultimatum: either submit to mandatory psychological evaluation with the force
    psychologist or face medical retirement. Praveen frames the choice as a pragmatic
    solution to Catherine’s unresolved trauma, referencing her near-fatal encounter
    with Tommy Lee Royce and her recent attendance at his mother’s funeral, a clear
    violation of professional boundaries. Catherine’s visceral resistance—her clenched
    fist, her refusal to acknowledge vulnerability—exposes her deep-seated refusal
    to confront her past. The power dynamic is unmistakable: Praveen wields institutional
    authority, while Catherine, though defiant, is cornered. The scene underscores
    the institutional pressure to address her trauma, which she has long evaded, while
    also revealing the precariousness of her professional standing. The ultimatum
    forces Catherine to confront the cost of her denial: either submit to psychological
    scrutiny or lose her career entirely. The tension escalates as Praveen’s calm,
    measured tone contrasts with Catherine’s growing agitation, culminating in her
    blunt refusal to consider retirement. The scene is a turning point, as it strips
    Catherine of her autonomy and pushes her toward a reckoning she cannot avoid—whether
    she likes it or not.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e03
  scene_sequence: 9
  sequence_in_scene: 17
  key_dialogue:
  - |-
    PRAVEEN: Have you thought about retirement?
    CATHERINE: No. Sir.
    PRAVEEN: Medical retirement.
    CATHERINE: Why? What’s wrong with me?
    PRAVEEN: Eighteen months ago you nearly died.
  - |-
    PRAVEEN: You were offered counselling. When you left hospital. Eighteen months ago.
    CATHERINE: Yes.
    PRAVEEN: Did you go?
    CATHERINE: Yup.
    PRAVEEN: Did you complete the course of treatment?
  - |-
    PRAVEEN: I’m giving you options. Catherine. Two options. I’d like you to see the force psychologist. I’d like you to complete whatever course of treatment he suggests. Or. The alternative, and I do think it’s something you should consider. Seriously, you’ve had a long and distinguished career... Why don’t I have a case conference with HR to take things forward down the medical retirement route.
    CATHERINE: You’re not gonna do that to me.
