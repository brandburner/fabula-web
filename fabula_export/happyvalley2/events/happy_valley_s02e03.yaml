  title: Catherine Admits Violent Impulses
  description: 'In a tense therapy session, Catherine Cawood is forced to confront
    the violent undercurrent of her grief after her therapist probes her ''happy sheet''
    responses. She initially deflects questions about self-harm and suicidal ideation,
    but when pressed, she admits to permanent sadness—a state that once defined her
    but now feels inescapable. The therapist challenges her stoic facade, noting that
    colleagues perceive her as the ''life and soul of the party,'' a contradiction
    that unsettles her. Catherine then reveals a shocking truth: she has contemplated
    killing others, including her grandson (for a school prank), her son (for infidelity),
    and her sister Clare (for a relapse triggered by Tommy Lee Royce’s mother’s funeral).
    The admission is raw, unfiltered, and laced with self-justification, exposing
    the fragility beneath her professional composure. The therapist’s observation
    that her anger is palpable—even feared—hints at the emotional volatility she suppresses,
    while her flippant tone masks the depth of her rage. This moment marks a turning
    point in her psychological unraveling, as she teeters between control and self-destruction,
    her trauma no longer contained by her usual defenses.'
