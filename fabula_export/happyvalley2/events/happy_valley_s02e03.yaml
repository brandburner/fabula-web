- fabula_uuid: cand_evt_scene_79ee23d18302b5e4_03
  global_id: null
  title: Catherine’s Paranoia Shatters Trust
  description: After a tense but momentarily warm exchange outside Angeliki’s Restaurant,
    Catherine’s unchecked paranoia about Mike Taylor’s influence over Joyce’s alibi
    request erupts into a bitter confrontation. The evening begins with Catherine
    venting about Tommy Lee Royce’s well-being in prison, revealing her lingering
    trauma and resentment. Joyce, initially supportive, casually asks Catherine to
    confirm her alibi for a past incident—a request that triggers Catherine’s suspicion.
    When Joyce refuses to deny Mike Taylor’s involvement, Catherine’s accusations
    escalate, accusing Joyce of betrayal and threatening her. The confrontation ends
    with Joyce withdrawing her offer to help, leaving Catherine isolated and emotionally
    raw. The scene underscores Catherine’s inability to separate past wounds from
    present reality, costing her the last reliable ally in her unraveling life. The
    fallout mirrors her broader professional and personal instability, where trauma-driven
    suspicions now dictate her relationships, leaving her increasingly alone.
  episode_uuid: ep_sea_ser_happy_valley_s02_e03
  scene_sequence: 20
  sequence_in_scene: 39
  key_dialogue: &id029
  - |-
    JOYCE: "Ey, have you alibied yourself yet?"
    CATHERINE: "Oh don’t you start."
    JOYCE: "Have you? No, have you?"
    CATHERINE: "No."
    JOYCE: "Why not? Why not?"
    CATHERINE: "Because! I can’t. I’ve checked everything. My calendar, my smart book, my day book, the rostas. I mean I don’t care, I don’t give a toss, I know I didn’t do it."
  - |-
    CATHERINE: "Why are you so bothered about me alibi-ing myself?"
    JOYCE: "Cos I care about you."
    CATHERINE: "Has Mike Taylor been on at you?"
    JOYCE: "No."
    CATHERINE: "Has he?"
    JOYCE: "No."
    CATHERINE: "Has he?"
    JOYCE: (refusing to answer again)
    CATHERINE: "You better not go telling him stuff I’ve said. This evening. About that twat. ‘Cos I’ll know if you have."
  - |-
    JOYCE: "Do you think I would? Do you think I’d do that?"
    CATHERINE: "No. I’m just saying."
    JOYCE: "Right."
    JOYCE: "So—sorry—are you threatening me?"
    CATHERINE: "No. I’m [just]—no. I’m just saying."
    JOYCE: "You don’t have to text me those dates. I was only trying to help."
    CATHERINE: "Right."
    JOYCE: "Night night then."
