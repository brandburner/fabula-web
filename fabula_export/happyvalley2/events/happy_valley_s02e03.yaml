  global_id: null
  title: John’s unraveling during Vicky’s autopsy
  description: 'John Wadsworth, the murderer of Vicky Fleming, is forced to participate
    in her autopsy, where the clinical dissection of her body triggers violent flashbacks
    of his crime. As Dr. Fowler examines Vicky’s injuries—including the broken hyoid
    bone, vaginal bruising, and lacerations—John relives the brutal act: the struggle,
    the beer bottle he used to stage the attack, and the moment he realized he had
    to make it look like a serial killer’s work. His dissociation is only broken when
    the lab assistant hands him exhibits to bag, forcing him to confront the physical
    evidence of his crime. The scene becomes a psychological crucible, where guilt
    and disorientation collide under the weight of his deception, threatening to expose
    his carefully constructed facade. His evasive response—‘It’s just it’s a while
    since I’ve done one of these’—reveals his fragility, while the flashbacks underscore
    the irreversible brutality of his actions. The autopsy isn’t just a procedural
    step; it’s a reckoning, where the clinical detachment of the mortuary clashes
    with John’s unraveling psyche, pushing him closer to a breaking point.'
