  title: Angeliki’s Sets the Scene for Jackson’s Show
  description: "\n  The scene opens with an establishing shot of Angeliki Restaurant,\
    \ a bustling nightspot in Hebden, where Jackson is set to perform at 9 PM. The\
    \ exterior shot—featuring a sign advertising Jackson’s live performance—grounds\
    \ the audience in the venue’s role as a social hub and narrative focal point.\
    \ The lively atmosphere contrasts with the darker undercurrents of Catherine’s\
    \ personal and professional life, foreshadowing how this public space will later\
    \ intersect with the story’s emotional and investigative stakes. The shot serves\
    \ as both a setup for Jackson’s performance and a thematic anchor, reinforcing\
    \ the tension between Hebden’s vibrant surface and the hidden turmoil beneath.\
