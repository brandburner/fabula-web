  title: Catherine probes Ann’s judgment and isolation
  description: 'Catherine Cawood interrogates Ann Gallagher about her reckless involvement
    with a married detective, exposing Ann’s emotional vulnerability and professional
    naivety. The confrontation escalates when Ann reluctantly admits to Catherine’s
    workplace nicknames—symbolizing her growing isolation—before abruptly ending.
    Catherine’s probing reveals her own fragility: her need to assert control over
    Ann’s choices mirrors her struggle to manage her own unraveling life. The exchange
    deepens the narrative’s exploration of trust, judgment, and the cost of emotional
    detachment, while Ann’s discomfort underscores the generational and professional
    divide between them. The scene’s abrupt cutoff leaves Catherine’s isolation and
    Ann’s naivety as unresolved tensions, setting up future conflicts in their working
    relationship.'
