  key_dialogue:
  - |-
    THERAPIST: 'Have you ever contemplated killing others. Does the ‘yes’ apply there.'
    CATHERINE: 'Oh yes.'
  - 'CATHERINE: ''Day before yesterday I could’ve merrily strung my grandson up for
    setting off a fire extinguisher in a corridor at school... Then last Thursday
    I could’ve happily throttled my son... Then—when was it? Two weeks ago—I could’ve
    cheerfully strangled my sister. Clare. She’s an alcoholic... She fell off the
    wagon. At this funeral. And she said it was my fault.'''
  - 'THERAPIST: ''Tommy Lee Royce’s mother’s funeral. We will come onto that.'''
