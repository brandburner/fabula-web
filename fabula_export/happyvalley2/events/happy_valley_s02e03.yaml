  title: Catherine admits violent fantasies to Joyce
  description: At Angeliki’s restaurant, Catherine Cawood’s unfiltered confession
    about her violent impulses toward Tommy Lee Royce—revealing her suppressed rage
    and moral fragility—collides with Joyce’s visceral reaction. Catherine’s dark
    humor and defiant tone mask her guilt over not killing Royce, while Joyce’s mix
    of relief and challenge exposes the precarious state of their relationship. The
    moment forces Catherine to confront the darkness she’s suppressed, while Joyce’s
    response (both supportive and probing) underscores the psychological toll of the
    case on both women. The interruption by the waitress, promoting the restaurant’s
    entertainment, creates a jarring tonal shift, highlighting the contrast between
    Catherine’s internal turmoil and the mundane, performative world around them.
    This exchange deepens the audience’s understanding of Catherine’s trauma and the
    fragility of her professional composure, while also testing the limits of Joyce’s
    trust and loyalty.
