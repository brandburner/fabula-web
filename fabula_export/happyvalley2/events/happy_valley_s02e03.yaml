  title: Catherine returns home after Joyce confrontation
  description: 'Catherine Cawood walks home alone at night, visibly unsettled after
    her emotionally charged exchange with Joyce. The script suggests she may be replaying
    their conversation in her head, her body language betraying the weight of unresolved
    tension. This moment marks a transition from the professional/personal collision
    at the pub to the private space where her trauma and defenses will inevitably
    clash. The exterior setting—her front door looming ahead—serves as a threshold
    between the external pressures of the case and the internal chaos of her fractured
    psyche. The lack of dialogue here underscores her isolation, while the visual
    focus on her physical return home foreshadows how her personal sanctuary will
    become a battleground for the forces tearing her apart: Tommy Lee Royce’s lingering
    influence, her daughter’s death, and the professional scrutiny threatening her
    career. The scene’s brevity and the cut to her front door create a sense of inevitability—she
    cannot escape what awaits her inside, whether it be Clare’s relapse, Daniel’s
    divorce papers, or her own unraveling mind.'
