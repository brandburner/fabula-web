  key_dialogue:
  - |-
    THERAPIST: Have you ever contemplated killing others. Does the ‘yes’ apply there.
    CATHERINE: Oh yes.
  - |-
    THERAPIST: How do you feel about that? People being scared of you.
    CATHERINE: Well. It’s useful. Occasionally. If I’m dealing with something. At work. I often have to deal with people who’re a lot bigger than me.
  - |-
    THERAPIST: The second part of the question. Others’. Have you ever contemplated killing others. Does the ‘yes’ apply there.
    CATHERINE: Oh yes.
    THERAPIST: Tell me about that.
    CATHERINE: Well. Day before yesterday I could’ve merrily strung my grandson up for setting off a fire extinguisher in a corridor at school... Then last Thursday I could’ve happily throttled my son... Then - when was it? Two weeks ago. I could’ve cheerfully strangled my sister. Clare.
