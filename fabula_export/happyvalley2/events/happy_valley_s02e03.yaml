    a suicide—to Ilinka and Winnie, expecting relief. Instead, Ilinka’s visceral reaction
    reveals the truth: Goran was murdered by the Knezevici family to silence him.
    Her terror and insistence (‘He would never kill himself. It’s them. They’ve shut
    him up’) force Catherine to confront the depth of the conspiracy, escalating her
    personal and professional stakes. The moment transforms a routine update into
    a turning point, exposing the fragility of the official narrative and pushing
    Catherine closer to uncovering the systemic corruption she’s been blind to. Ilinka’s
    refusal to accept the suicide verdict—delivered in her native language before
    Winnie translates—underscores the urgency and danger of the situation, while Catherine’s
    initial dismissal (‘What?’) highlights her lingering skepticism, which the revelation
    will soon shatter.'
