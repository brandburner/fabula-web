  global_id: null
  title: Praveen forces Catherine into therapy ultimatum
  description: In a tense, closed-door confrontation, Praveen—Catherine’s superior—directly
    challenges her refusal to address her unresolved trauma, using her recent attendance
    at Tommy Lee Royce’s mother’s funeral as evidence of her instability. Praveen
    frames the situation as a choice between mandatory psychological treatment or
    medical retirement, exposing the institutional pressure to sideline her. Catherine’s
    physical tell (flexing her injured hand) and blunt defiance reveal her deep resistance
    to confronting her past, while Praveen’s clinical detachment underscores the systemic
    push to remove her from active duty. The exchange escalates into an ultimatum,
    forcing Catherine to either submit to psychological evaluation or face forced
    retirement—a decision that would sever her professional identity and financial
    stability. The scene functions as a turning point, where Catherine’s personal
    and professional trajectories collide under institutional scrutiny, setting up
    her inevitable confrontation with her trauma and the Tommy Lee Royce case’s lingering
    influence.
  episode_uuid: ep_sea_ser_happy_valley_s02_e03
  scene_sequence: 9
  sequence_in_scene: 15
  key_dialogue:
  - |-
    PRAVEEN: Have you thought about retirement?
    CATHERINE: No. Sir.
    PRAVEEN: Medical retirement.
    CATHERINE: Why? What’s wrong with me?
  - |-
    PRAVEEN: A thing like that takes its toll mentally as well as physically, Catherine. We did go some way down the medical retirement route last time.
    CATHERINE: Yeah, and it wasn’t what I wanted then, and it isn’t what I want now. Sir.
  - |-
    PRAVEEN: You’ll see the force psychologist, you’ll remain operational, but this time you will complete whatever course of treatment he suggests to you.
    CATHERINE: You’re not gonna do that to me.
    PRAVEEN: There is no stigma attached. You’d retire on a full pension, you’d—
    CATHERINE: Yeah, and I’d miss the next three years’ salary.
