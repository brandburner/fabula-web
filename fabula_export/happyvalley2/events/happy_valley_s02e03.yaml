  title: Therapist exposes Catherine’s buried rage
  description: In a tense, probing therapy session, Catherine Cawood’s carefully constructed
    professional facade is systematically dismantled by her therapist, who forces
    her to confront the violent undercurrents of her grief. The therapist begins by
    referencing her 'happy sheet'—a form meant to assess emotional well-being—where
    Catherine admitted to contemplating violence. When she deflects with sarcasm and
    evasion, he presses further, exposing her repressed anger toward her family (her
    grandson, son, and sister) and her unresolved trauma over her daughter Becky’s
    suicide. The therapist’s observation that Catherine doesn’t *appear* sad—despite
    her admission—reveals the dissonance between her internal torment and her public
    persona. The session escalates when he directly asks if her 'yes' to violent impulses
    applies to others, and Catherine, after a calculated pause, confirms it with chilling
    certainty. The therapist then ties her rage to Tommy Lee Royce’s mother’s funeral,
    the event that triggered her mandatory therapy, hinting at a deeper, unspoken
    connection between her violence and Royce’s influence. The exchange culminates
    in Catherine’s reluctant admission that she is 'sad'—a rare moment of vulnerability—but
    her deflection into flippancy underscores how deeply she buries her pain. The
    therapist’s final note about returning to Royce’s funeral foreshadows the session’s
    unresolved tension, leaving Catherine’s rage and trauma hanging like a sword over
    the rest of the story. This scene is a turning point, forcing Catherine to acknowledge
    the darkness she usually masks with professionalism and sarcasm, while also setting
    up her eventual confrontation with Royce’s legacy.
