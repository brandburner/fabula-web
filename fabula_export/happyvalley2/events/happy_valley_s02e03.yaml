  title: Catherine cares for Clare’s intoxicated collapse
  description: 'At 3:27 AM, Catherine finds Clare unconscious and heavily intoxicated
    after a relapse, her body limp on the bed. Catherine methodically removes Clare’s
    shoes, positions her in the recovery position to prevent choking, and covers her
    with a blanket to stave off shivering. The act is clinical yet tender, revealing
    Catherine’s practiced experience with Clare’s alcoholism—she moves with quiet
    efficiency, but her exhaustion is palpable. After ensuring Clare’s physical safety,
    Catherine leaves a handwritten note by the bedside: *‘Ring me. I’m not cross.’*
    The gesture is small but loaded: it bridges their fractured relationship without
    confrontation, acknowledging Clare’s vulnerability while subtly asserting her
    own need for reconciliation. The scene underscores the cyclical nature of Clare’s
    addiction and Catherine’s role as reluctant caretaker, all while hinting at the
    unresolved tension between them—particularly around Tommy Lee Royce’s lingering
    influence. The note’s brevity and the absence of recrimination suggest Catherine’s
    emotional exhaustion, but also her inability to fully disengage, even in the dead
    of night.'
