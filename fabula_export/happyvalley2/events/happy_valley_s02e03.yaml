- fabula_uuid: act_6482db35327c40fe
  number: 2
  summary: 'Act Two deepens the intertwining narratives of Catherine''s and John''s
    lives, escalating their respective crises. John''s struggle with his heinous crime
    intensifies as he endures Vicky Fleming''s autopsy, forced to meticulously handle
    the evidence of his own brutal act. The scene is a visceral depiction of his guilt
    and terror, underscored by flashbacks to the murder itself. Concurrently, his
    personal life continues to unravel as he confides in Ann Gallagher about his wife''s
    infidelity, an attempt to forge a connection that quickly turns into a sudden,
    awkward invitation for a drink. Meanwhile, Catherine grapples with the fallout
    from Clare''s relapse, her son Daniel''s impending divorce, and her grandson Ryan''s
    behavioral issues, all while dealing with the emotional weight of her past. She
    has a revealing conversation with Joyce, admitting her deep-seated regret about
    not killing Tommy Lee Royce, exposing the raw anger beneath her composed exterior.
    A new case emerges for Catherine: the discovery of Goran Dragovic''s body, hanged
    in Crow Wood Park. This incident is a direct link to a previous case where Catherine
    tasered him, and it immediately raises concerns for Ilinka, the trafficking victim
    Goran had exploited. The midpoint of this act arrives when Ann, in her eager pursuit
    of becoming a detective, inadvertently connects the unidentified murder victim
    to Vicky Fleming, the woman from the arson case. This revelation is a catastrophic
    blow to John, as it threatens to expose his meticulously constructed cover-up,
    directly linking him to the very crime he is investigating.'
