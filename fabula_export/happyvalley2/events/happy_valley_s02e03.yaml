    to leave for Vicky Fleming’s autopsy. His uncharacteristic vulnerability—revealing
    his wife’s infidelity and the shock of discovering her affair—exposes his emotional
    fragility, which Ann absorbs with cautious empathy. The moment pivots when Ann’s
    professional curiosity spikes at the mention of the post-mortem, her eagerness
    to accompany him (despite its grim nature) underscoring her obsessive drive to
    prove herself in the investigation. John’s invitation for a drink, though awkward,
    marks a fragile human connection amid his unraveling, while Ann’s morbid fascination
    with the autopsy foreshadows her role in unearthing the case’s darker truths.
    The exchange reveals John’s guilt-ridden state and Ann’s detachment from the case’s
    emotional weight, setting up their uneasy alliance and the autopsy’s impending
    psychological toll on John.
