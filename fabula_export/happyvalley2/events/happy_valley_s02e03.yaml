  title: Catherine’s alibi confirmed by Joyce
  description: Catherine receives a critical radio transmission from Joyce while exiting
    Goran Dragovic’s house, confirming her alibi for Aurelia Petrovic’s murder. The
    moment is brief but charged with relief—Catherine’s smile and effusive gratitude
    ("You’re kidding... Well done. Fantastic! Thank you.") reveal her emotional investment
    in clearing her name. This confirmation temporarily lifts the professional pressure
    she’s under, though the larger investigation (and its potential ties to Tommy
    Lee Royce) remains unresolved. The exchange underscores Joyce’s role as a trusted
    ally and highlights Catherine’s vulnerability beneath her professional composure.
    The scene serves as a fleeting respite amid escalating tensions, reinforcing the
    precarious balance between Catherine’s personal trauma and her duty to the case.
