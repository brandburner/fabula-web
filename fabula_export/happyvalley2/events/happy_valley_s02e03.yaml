  title: Mike delivers Chief Super warning
  description: "\n  After concluding a tense morning briefing where Catherine assigns\
    \ Shaf and Ann to investigate the suspicious arson death of Vicky Fleming, Mike\
    \ delivers a low-key but devastating warning: the Chief Superintendent is arriving\
    \ unannounced at 1:30 PM to meet with her. The news lands like a gut punch—Catherine’s\
    \ already exhausted (having slept less than three hours), and the timing suggests\
    \ her recent cases, particularly the unresolved suicide and its potential ties\
    \ to Tommy Lee Royce, are under formal scrutiny. Mike’s blunt delivery ('Pillock.\
    \ Are you all right?') underscores the gravity: this isn’t just a routine check-in.\
    \ It’s a professional reckoning. Catherine’s pale complexion and the way she absorbs\
    \ the news without her usual bravado reveal her vulnerability. The scene pivots\
    \ from procedural urgency to institutional threat, forcing Catherine to confront\
    \ the fragility of her position as both a detective and a woman haunted by trauma.\
    \ The Chief Super’s visit looms as a turning point—one that could expose her emotional\
    \ instability or, worse, strip her of the case that’s become her obsession.\n\
    \  "
