  key_dialogue:
  - |-
    CATHERINE: Daniel?
    CATHERINE: Daniel. Sorry. Can you do me a favour, love? Sorry. Can you get Ryan off to school on time? I’ve got to get off to work and Clare’s -
    DANIEL: Is she all right?
    CATHERINE: God knows. Either way, I can’t see her surfacing much before dinner time.
  - |-
    CATHERINE: I’m sorry to ask, I wouldn’t have, but -
    DANIEL: It’s fine, don’t worry. I’ll drop him off on my way to work.
    CATHERINE: Tea.
    DANIEL: Thanks.
    CATHERINE: I love you.
    DANIEL: ((going back to sleep again)) Mm.
  - |-
    CATHERINE: I wish I knew what was going on. With you.
    CATHERINE: Will you make sure he gets some breakfast inside him?
    DANIEL: Course.
