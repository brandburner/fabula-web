- fabula_uuid: cand_evt_scene_83a5f435c5d906c8_01
  global_id: null
  title: Tommy demands Frances counter Catherine’s influence
  description: In a tense, hushed prison visit, Tommy Lee Royce—prisoner and former
    friend of Ryan—presses Frances to counteract Catherine Cawood’s negative portrayal
    of him. Frances reveals Ryan’s fond memories of Tommy (the milk offering, the
    boat trip) and his understanding of Tommy’s petrol incident as unintentional,
    softening Tommy’s guarded demeanor. Tommy, initially vulnerable, quickly shifts
    to paranoia, insisting Frances must "tell him stuff" to counter Catherine’s lies.
    He vehemently denies raping Ann Gallagher and killing the police girl, blaming
    Lewis, and justifies his violent acts (including kicking his grandmother) as self-defense.
    His frustration escalates as Frances resists his demands to "get Ryan out of there,"
    exposing his obsession with control and his fractured psyche. The exchange underscores
    Tommy’s deep-seated need for connection, his guilt over past actions, and his
    dangerous fixation on rewriting Ryan’s perception of him—all while hinting at
    his unchecked rage toward Catherine. The scene reveals Tommy’s emotional volatility,
    his manipulative tactics, and the fragility of his bond with Ryan, which he clings
    to as a lifeline amid his isolation and paranoia.
  episode_uuid: ep_sea_ser_happy_valley_s02_e03
