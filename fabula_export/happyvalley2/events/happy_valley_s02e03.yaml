  title: Catherine deflects with peacock metaphor
  description: In a tense therapeutic session, Catherine Cawood is pressured by her
    therapist to confront her fixation on Tommy Lee Royce. When asked why she attended
    Royce’s mother’s funeral, she deflects with a cryptic peacock metaphor—a friend’s
    phobia about birds that kept her trapped indoors—implying she wanted to 'know
    where he was' before he returned to prison. The therapist probes deeper, asking
    if she’s ever contemplated killing Royce, to which Catherine responds with cold
    detachment, admitting her daughter’s death was his fault but refusing to acknowledge
    regret over sparing his life. The exchange reveals her unresolved rage and the
    psychological toll of her self-imposed restraint, while her evasive storytelling
    exposes the depth of her obsession with Royce’s whereabouts and the fragility
    of her emotional control. The scene underscores her struggle between professional
    duty and personal vengeance, with the peacock metaphor serving as a darkly poetic
    admission of her need for surveillance and control over Royce’s existence.
  episode_uuid: ep_sea_ser_happy_valley_s02_e03
  scene_sequence: 10
  sequence_in_scene: 19
  key_dialogue:
  - |-
    THERAPIST: What took you to the funeral.
    CATHERINE: I have a friend. Who’s scared of birds. A proper phobia. And one day. This peacock. Came and sat just outside her front door. No idea where it came from. And it just sat there. For hours. And she didn’t dare go out, and her husband was at work, and she said she felt too stupid to ring anyone. So she just stared at it. Through the sitting room window. For two hours. Til it left. And I said why? And she said, “So I knew where it was”. Maybe that’s it, maybe that’s all it was. I just wanted to make sure I knew where he was. ‘Til he went back inside.
  - |-
    THERAPIST: Have you ever contemplated killing yourself or others. What about him? Tommy Lee Royce.
    CATHERINE: My daughter died because of him. What do you think?
  - |-
    THERAPIST: Do you regret that?
    CATHERINE: ((utterly convincing)) No.
