- fabula_uuid: cand_evt_scene_df7c915345137e47_01
  global_id: null
  title: Autopsy reveals ritualistic murder details
  description: "\n  In the sterile confines of the mortuary, the autopsy of Vicky\
    \ Fleming concludes with Carol Fowler and Andy Shepherd analyzing the victim’s\
    \ brutalized remains. The examination reveals a methodical, ritualistic killing:\
    \ Vicky was asphyxiated with a narrow ligature (likely an electric cable) while\
    \ alive, then subjected to internal vaginal injuries post-mortem—suggesting a\
    \ killer who escalated or was interrupted. The lack of blood at the crime scene,\
    \ combined with heavy rain and porous ground, complicates forensic evidence, leaving\
    \ Carol uncertain whether Vicky was killed where her body was found. The victim’s\
    \ profile—mid-40s, British dental work, no substance use—contradicts the initial\
    \ assumption of a typical prostitute lifestyle, hinting at a more targeted, organized\
    \ predator. John Wadsworth, visibly strained, bags evidence throughout, his psychological\
    \ unraveling subtly foreshadowed by his distraction and the weight of his own\
    \ guilt. The scene underscores the killer’s meticulous nature and the investigation’s\
    \ growing complexity, while also planting seeds for later revelations about Ryan’s\
    \ ligature-making and the case’s deeper connections to Tommy Lee Royce.\n  "
  episode_uuid: ep_sea_ser_happy_valley_s02_e03
  scene_sequence: 21
  sequence_in_scene: 40
  key_dialogue:
  - 'CAROL: She was asphyxiated with quite a narrow ligature, looking at the bruising
    on the muscle. Something like an electric cable. The grazing on the right knee
    happened—I would imagine—during the struggle. She was alive when it happened.
    She was already dead though when the internal vaginal injuries were inflicted.'
  - 'ANDY: Are we looking at the same killer?'
  - 'CAROL: Yeah. I mean it’s very similar. Not as frenzied, not as extensive. Internally.
    But yeah, broken glass—a broken bottle—used again to inflict the wounds. So...
    I don’t know, maybe he was disturbed before he’d done what he wanted to do. It’s
    essentially the same. Just less of it.'
  - 'ANDY: Was she killed where we found her?'
  - 'CAROL: ((shakes her head, can’t say)) There was very little blood. At the scene.
    But. It’s rained. And the ground’s porous. We’ve lost any post-mortem hyper-statis
    because of the skin discolouration. So. I couldn’t really tell you.'
