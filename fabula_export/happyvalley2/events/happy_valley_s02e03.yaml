- fabula_uuid: cand_evt_scene_e6ade398d4e3498a_04
  global_id: null
  title: Catherine admits violent impulses in therapy
  description: 'In a tense therapy session, Catherine Cawood reluctantly confronts
    her repressed rage and violent fantasies after the therapist probes her ''happy
    sheet'' response—where she admitted contemplating killing others. She deflects
    initial questions about self-harm but eventually reveals a litany of recent murderous
    impulses: strangling her grandson for a school prank, throttling her son for infidelity,
    and nearly choking her sister Clare, whose relapse she blames on herself. The
    therapist connects these outbursts to the unresolved trauma of Tommy Lee Royce’s
    mother’s funeral, a moment that triggered Clare’s relapse and Catherine’s own
    violent unraveling. The scene exposes Catherine’s self-destructive cycle—her anger
    as a shield for grief—and foreshadows her inability to separate professional duty
    from personal vengeance. The therapist’s calm persistence forces her to articulate
    what she’s spent years burying: that her sadness isn’t just about loss, but about
    the rage that’s consumed her in its wake. The revelation marks a turning point,
    where Catherine’s facade of control cracks, and her therapist becomes the first
    person to name the violence she’s wielding against herself and others.'
