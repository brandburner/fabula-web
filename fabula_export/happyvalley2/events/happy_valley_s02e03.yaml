    JOHN: Well it’s—yeah—starting to look that way.
  - |-
    JOHN: Turns out my wife’s been having it off wi’ this bastard she works with. For months. Just walked in, and... [flashback to John discovering Amanda and Graham Tattersall in bed] ...I’ve not told anyone.
    ANN: God. That’s rough. When?
    JOHN: Two weeks ago. Fella she’s known for years. With the kids in the house as well.
  - |-
    JOHN: Do you wanna go for a drink? Some time.
    ANN: Erm—
    JOHN: Sorry. Is that inappropriate?
    ANN: Going for a drink?
    JOHN: Asking.
    ANN: Oh. Is it? I don’t [know]—
    JOHN: Sorry.
    ANN: When?
    JOHN: Any time.
    ANN: Okay.
