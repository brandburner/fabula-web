    in, summoning him back to duty. The interruption forces John to suppress his emotional
    unraveling, reinforcing the tension between his personal torment and the unrelenting
    demands of the investigation. The moment underscores his psychological fragility
    and the inescapable pressure of his double life as both perpetrator and investigator.
    The abrupt shift from private breakdown to professional obligation highlights
    the story’s central conflict: John’s inability to reconcile his crimes with his
    role as a detective.'
