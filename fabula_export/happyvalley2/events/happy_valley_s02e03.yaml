  title: Joyce Delivers Second Body News
  description: |2-

      In the Norland Road Police Station locker room, Catherine Cawood is visibly seething as she prepares for duty, her body language radiating suppressed rage toward Tommy Lee Royce. Joyce enters, sensing Catherine’s foul mood, and casually inquires about her recent therapy session. Catherine’s response—a visceral, darkly humorous rant about the suffocating banality of therapy—reveals her deep resistance to emotional processing and her preference for action over introspection. Joyce, recognizing Catherine’s need for connection, unexpectedly invites her for a drink and meal, an offer that momentarily softens Catherine’s defenses. Just as the exchange shifts toward warmth, Joyce drops the bombshell: another body has been found in Brighouse, mirroring the location of the first victim. The revelation instantly reframes the scene, transforming Joyce’s gesture of camaraderie into a harbinger of escalating danger. Catherine’s immediate focus on the case’s geographical pattern—‘Brighouse. Again’—hints at her investigative instincts kicking in, while the subtext of Tommy Lee Royce’s lingering influence looms over the discovery. This moment serves as both a turning point in Catherine and Joyce’s relationship and a critical escalation in the case, forcing Catherine to confront the possibility of a serial killer operating in the same territory tied to her past trauma.
