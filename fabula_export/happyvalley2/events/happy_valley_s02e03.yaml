  title: John confesses infidelity to Ann
  description: Outside the police station, Ann Gallagher intercepts John Wadsworth
    as he prepares to leave for a post-mortem, noticing his uncharacteristic distress.
    When she asks about the new murder victim, John deflects but then abruptly confides
    in her about his wife Amanda’s ongoing affair with a colleague, Graham Tattersall—a
    revelation that catches Ann off guard given their limited prior interaction. The
    flashback to John discovering the affair (while still reeling from Vicky Fleming’s
    murder) underscores his psychological unraveling, as his guilt over the crime
    collides with his personal betrayal. Ann’s awkward but sympathetic response—culminating
    in John’s impulsive invitation for a drink—hints at a burgeoning connection between
    them, even as his visible discomfort about attending the autopsy foreshadows his
    impending breakdown. The exchange escalates the narrative tension by exposing
    John’s vulnerability and Ann’s growing entanglement in the case’s dark implications,
    while the flashback deepens the audience’s understanding of his fractured state.
