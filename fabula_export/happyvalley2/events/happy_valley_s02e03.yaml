  title: Catherine’s fragile trust shatters with Joyce
  description: After a tense but momentarily comforting exchange outside Angeliki’s
    Restaurant, Catherine’s paranoia and unresolved trauma resurface when Joyce casually
    asks about her alibi for Goran Dragovic’s murder. The conversation spirals from
    Joyce’s well-intentioned offer to help verify Catherine’s whereabouts to a bitter
    confrontation, where Catherine accuses Joyce of being complicit with Mike Taylor’s
    investigation into her mental state. Despite Joyce’s reassurances and a brief,
    warm hug, Catherine’s suspicion—fueled by alcohol and her deep-seated fear of
    betrayal—poisons the moment. The exchange ends with Joyce withdrawing her support,
    leaving Catherine isolated and regretful but too stubborn to fully apologize.
    The scene underscores Catherine’s self-destructive tendencies, her inability to
    trust even those closest to her, and the escalating pressure of the investigation,
    which now threatens to sever her last reliable alliance.
