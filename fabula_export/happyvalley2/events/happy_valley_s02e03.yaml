  title: John’s Flashback Reveals Vicky’s Murder
  description: The scene opens with a brutal flashback of John Wadsworth in Vicky
    Fleming’s flat, smashing a beer bottle to create a weapon before mutilating her
    corpse. The flashback abruptly cuts to the H-MIT briefing room, where Andy Shepherd
    delivers a clinical breakdown of the victim’s physical description and the circumstances
    of her discovery. The team discusses potential connections to previous murders,
    with Andy assigning John to handle exhibits at Vicky’s post-mortem. John’s immediate,
    instinctive agreement—followed by a delayed realization of the horror he’s agreed
    to—exposes his deep-seated guilt and visceral terror. His reaction underscores
    his complicity in Vicky’s death, while the flashback confirms his role as her
    killer. The moment is a turning point, forcing John to confront the reality of
    his crime in a way that will unravel his psyche and escalate the narrative tension
    around his cover-up.
