  title: Catherine’s Alibi Suspicion Erupts
  description: After leaving Angeliki’s Restaurant, Catherine and Joyce walk together,
    their conversation revealing Catherine’s lingering rage toward Tommy Lee Royce—her
    fixation on his well-being in prison and her fear of his manipulative influence.
    Joyce’s offhand question about Catherine’s alibi for Goran Dragovic’s murder triggers
    Catherine’s paranoia, escalating into a tense confrontation. Catherine accuses
    Joyce of being sent by Inspector Mike Taylor to gather information, damaging their
    friendship. The exchange ends with Joyce withdrawing her offer to help, leaving
    Catherine isolated and regretful but unwilling to fully apologize. The scene underscores
    Catherine’s emotional fragility, her distrust of colleagues, and the precariousness
    of her position as both investigator and potential suspect, while also exposing
    the professional and personal fractures in her life.
