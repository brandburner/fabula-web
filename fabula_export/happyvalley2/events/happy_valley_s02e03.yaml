  title: Catherine delegates under crisis pressure
  description: 'In the attic, Catherine wakes her son Daniel—who is sleeping in a
    makeshift bed—with a cup of tea, urgently asking him to take Ryan to school while
    Clare remains bedridden from her relapse. The exchange reveals Catherine’s exhaustion
    as she juggles professional duties and familial collapse, her fleeting concern
    for Daniel’s well-being underscoring her role as the sole stabilizing force amid
    escalating chaos. Daniel’s half-asleep responses and Catherine’s unanswered question
    about his emotional state highlight the family’s fractured communication, while
    her abrupt departure signals the relentless pressure she faces. The scene functions
    as a microcosm of Catherine’s balancing act: her authority as a mother and police
    sergeant is tested by Clare’s instability, Daniel’s emotional withdrawal, and
    her own unresolved trauma, all of which threaten to unravel under the weight of
    her responsibilities. The moment is a quiet but critical turning point, exposing
    the fragility of the household and foreshadowing the day’s larger crises—both
    personal and professional—that will demand her attention.'
