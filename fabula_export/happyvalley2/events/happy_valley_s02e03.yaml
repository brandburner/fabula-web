  title: Clare’s Drunken Confrontation and Spike’s Interruption
  description: In a crowded, chaotic Jockey’s Club, Clare—already drunk and emotionally
    volatile—unleashes a raw, accusatory tirade at Catherine for attending Tommy Lee
    Royce’s mother’s funeral, which she perceives as a betrayal of their sobriety
    pact. Clare’s outburst reveals her deep-seated abandonment fears and the fragility
    of her recovery, while Catherine’s defensive posture underscores her own unresolved
    guilt and avoidance of emotional accountability. The tension escalates until Spike,
    a drunken acquaintance with a history of run-ins with the police, stumbles into
    their conversation. Mistaking Catherine for a harsh officer he’s had prior conflicts
    with, Spike’s aggressive, slurred accusations derail Clare’s emotional moment,
    forcing Catherine into an uncomfortable defense of her profession. The interruption
    not only disrupts the sisters’ confrontation but also exposes Catherine’s internal
    conflict—her professional loyalty clashing with her personal disillusionment—while
    introducing Spike as an unpredictable wildcard who could further destabilize the
    fragile equilibrium between Clare and Catherine. The scene underscores Clare’s
    instability, Catherine’s unresolved trauma, and the volatile dynamics of their
    relationship, all while setting up future disruptions from external forces like
    Spike.
