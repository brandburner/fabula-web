  title: Catherine interrupts Ann’s community duty
  description: 'Ann Gallagher is engaged in a routine but compassionate interaction
    with an elderly couple at a bus stop, offering them guidance about their bus route.
    The moment is low-stakes but reveals Ann’s natural aptitude for community policing—patient,
    attentive, and grounded in human connection. Catherine Cawood abruptly disrupts
    this scene, her voice cutting through the quiet exchange with the urgency of a
    suicide call at Crow Wood Park. The interruption is jarring: Ann’s professional
    enthusiasm is immediately redirected from the mundane to the macabre, her silent
    ‘Yess!’ betraying both excitement and a hint of unease. Catherine’s tone is brusque,
    her language (‘baptism of fire’) framing the suicide as a rite of passage for
    Ann, while also underscoring the raw, unfiltered nature of their work. The contrast
    between Ann’s community-focused role and Catherine’s demand for immediate action
    highlights the tension between duty and personal growth, as well as the professional
    and emotional stakes that define their dynamic. For Catherine, this interruption
    is not just about the case—it’s a test of Ann’s readiness and a reflection of
    her own inability to escape the pull of trauma, even in moments of relative calm.
    The scene serves as a microcosm of their relationship: Catherine as the relentless
    force of necessity, Ann as the eager but untested protégé, both navigating the
    moral and emotional weight of their work.'
