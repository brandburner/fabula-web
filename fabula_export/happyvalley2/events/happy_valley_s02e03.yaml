  title: Catherine Recognizes the Hanged Man
  description: 'Catherine Cawood arrives at Crow Wood Park to find an ambulance and
    two nuns, one in shock after discovering a body. The paramedic confirms the victim
    is dead, and Catherine directs Ann to take witness statements while she radios
    for CSI and CID. As they approach the wooded area, Catherine notices the victim’s
    damp trousers and empty vodka bottles, suggesting a staged suicide. Ann’s fascination
    with the scene contrasts with Catherine’s professional detachment, but her focus
    shifts abruptly when she recognizes the hanged man as Goran Dragovic—the same
    man she tasered and arrested days earlier. The revelation forces her to confront
    her own role in his release on bail, while Ann’s earlier evasion about workplace
    nicknames underscores Catherine’s growing isolation. The scene marks a turning
    point: Catherine’s personal trauma collides with the case, and the park’s eerie
    stillness hints at deeper, ritualistic undertones tied to Tommy Lee Royce’s lingering
    influence. The discovery also introduces generational tension, as Ann’s eagerness
    to become a detective clashes with Catherine’s hardened skepticism.'
