  title: Vicky Fleming’s Body Discovered
  description: 'The scene opens on an abandoned construction site, where a decomposed
    woman’s body is partially concealed beneath debris. The camera lingers on the
    grotesque details—greenish-blue flesh, sunken eyes, and a protruding tongue—before
    revealing the victim’s identity: Vicky Fleming. The setting is cordoned off, with
    uniformed officers and CSIs (including Andy Shepherd) meticulously documenting
    the scene. The discovery is visceral and unsettling, immediately tying to unresolved
    cases and the incarcerated Tommy Lee Royce. For Sergeant Catherine Cawood, this
    moment is a catalyst, forcing her to confront the past she’s tried to bury. The
    body’s condition suggests a violent, premeditated death, escalating the tension
    between her personal trauma and the unfolding investigation. The scene’s clinical
    yet grim tone underscores the brutality of the crime and its potential to unravel
    Catherine’s fragile stability.'
