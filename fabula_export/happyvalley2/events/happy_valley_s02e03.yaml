  title: Catherine’s Vulnerability and Joyce’s Offer
  description: 'In the locker room, Catherine Cawood is visibly agitated while gearing
    up for duty, her body language betraying her suppressed rage toward Tommy Lee
    Royce. Joyce enters and casually inquires about Catherine’s therapy session, which
    Catherine dismisses with dark humor, describing it as a waste of time. Joyce,
    sensing Catherine’s emotional state, unexpectedly invites her for a drink and
    meal that evening. Catherine, initially reflexively resistant, accepts the offer,
    revealing a rare moment of openness. Joyce then delivers the grim news: another
    body has been found in Brighouse, mirroring the location of the first victim.
    This revelation adds urgency to the case and deepens the connection between the
    murders and Tommy Lee Royce’s lingering influence over Catherine’s life. The exchange
    subtly shifts their professional dynamic, hinting at Joyce’s growing concern for
    Catherine’s well-being and the potential for a deeper, more personal bond between
    them.'
