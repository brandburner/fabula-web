    know at the moment is: she’s white. She’s five foot four. Slight build. She’s
    got blond shoulder-length hair. Shoe size five. She’s between thirty and sixty
    years old.'
  - 'ANDY: She appears to have been strangled, and there is vaginal mutilation of
    the same nature as our previous three women.'
  - 'ANDY: John! Can you come and do exhibits for me at the post-mortem? Emma’s had
    to go to the dentist.'
  - 'JOHN: Sure.'
