  title: Forensic evidence compromised by crime scene conditions
  description: In the sterile aftermath of Vicky Fleming’s autopsy, Dr. Carol Fowler
    and Andy Shepherd dissect the brutal details of her death—revealing she was asphyxiated
    with a ligature while alive, then subjected to post-mortem mutilation with broken
    glass. The discussion confirms the killer’s signature method (a narrow ligature
    and glass wounds) but notes this attack was less frenzied than prior cases, suggesting
    an interruption. The critical turning point arrives when Carol admits the crime
    scene’s porous ground and heavy rain have contaminated forensic evidence, making
    it impossible to definitively determine if Vicky was killed where her body was
    found. This revelation forces the investigation into uncharted territory, undermining
    the case’s physical evidence and raising questions about Tommy Lee Royce’s potential
    involvement. The scene’s tension escalates as John Wadsworth, the killer, silently
    bags evidence—his psychological unraveling mirrored in the forensic uncertainty.
    For Sergeant Cawood, this contamination of evidence becomes a devastating parallel
    to her own unresolved trauma, where truth is as elusive as justice.
  episode_uuid: ep_sea_ser_happy_valley_s02_e03
  scene_sequence: 21
  sequence_in_scene: 41
  key_dialogue:
  - 'CAROL: She was asphyxiated with quite a narrow ligature, looking at the bruising
    on the muscle. Something like an electric cable. The grazing on the right knee
    happened—I would imagine—during the struggle. She was alive when it happened.
    She was already dead though when the internal vaginal injuries were inflicted.'
  - 'ANDY: Was she killed where we found her?'
  - 'CAROL: ((shakes her head, can’t say)) There was very little blood. At the scene.
    But. It’s rained. And the ground’s porous. We’ve lost any post-mortem hyper-statis
    because of the skin discolouration. So. I couldn’t really tell you.'
