  key_dialogue:
  - |-
    TOMMY: We don’t talk about me dad?
    FRANCES: Yeah, but listen, don’t get cross! He said that, but then nothing could be further from the truth! Once he started it was like he could talk about nothing else.
    TOMMY: ((suspicious, anxious)) What did he say?
    FRANCES: He said how much he liked you. When he met you. Outside the shop, and on the boat. And how he still thinks about you.
  - |-
    TOMMY: Did he say that? He actually said that? That he still thinks about me?
    FRANCES: Every day. Yes. He said it.
    TOMMY: Yeah, in a bad way.
    FRANCES: No! He talked about bringing you milk. And how he upset you by bringing his friend, and how much he wishes he hadn’t done that now because that seemed to spoil everything.
  - |-
    TOMMY: she needs putting out of her misery that one.
    FRANCES: ((lets that wash over her)) He’s been talking about things at home. His Auntie Clare drinks. I’ve met her. She’s a nice woman. But between the grandmother’s anger, and his auntie’s problem... yes. We could ask for better things.
    TOMMY: ((smiling, calm but frustrated)) No. Frances. I keep telling yer. And you keep not hearing. That’s not enough.
