acts:
- fabula_uuid: act_d2ed5ad2e81f8ea8
  number: 1
  summary: 'The first act establishes Sergeant Catherine Cawood''s deeply strained
    personal and professional life. It opens with her mandated therapy session, where
    she reluctantly admits to contemplating harm towards her grandson, son, and sister
    Clare, highlighting her internal turmoil and the weight of past trauma, particularly
    her daughter''s death. A flashback reveals the immediate cause of Clare''s relapse:
    Catherine''s attendance at Tommy Lee Royce''s mother''s funeral, which Clare blames
    her for. This sequence immediately foregrounds Catherine''s complex emotional
    landscape and the ripple effects of her past. Concurrently, Catherine faces professional
    scrutiny from her superior, Praveen, who offers her a stark choice between medical
    retirement and mandatory sessions with a force psychologist, explicitly linking
    her professional standing to her unresolved trauma and controversial actions.
    Amidst this personal and professional pressure, a new, significant case emerges
    during a morning briefing: the suspected arson of Vicky Fleming''s flat, hinting
    at a potential murder. Simultaneously, the audience is introduced to Detective
    John Wadsworth, who is revealed to be Vicky Fleming''s murderer, having staged
    the scene to resemble a serial killing. His personal life is also in disarray,
    as he discovers his wife''s affair. This act sets up the dual narrative tracks:
    Catherine''s struggle with her past and present demons, and John''s desperate
    attempts to cover up his crime while his world collapses around him. The inciting
    incidents are Catherine''s forced therapy and the initiation of the Vicky Fleming
    investigation, which will soon intertwine with her life.'
