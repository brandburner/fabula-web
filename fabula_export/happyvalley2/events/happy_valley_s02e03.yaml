  title: Prison as Catherine’s Psychological Fortress
  description: The scene opens with a wide shot of Gravesend Prison under a deceptively
    serene morning sky, its looming walls and stark shadows visually reinforcing the
    prison’s dual role as a physical barrier and a psychological prison for Catherine
    Cawood. The imagery—sunlight casting long, inescapable shadows across the concrete—serves
    as a foreboding introduction to the setting where Catherine’s unresolved trauma
    and the murder investigation will collide. The prison is not just a location;
    it is a manifestation of the inescapable past, a place where Tommy Lee Royce’s
    presence lingers like a specter, forcing Catherine to confront the unresolved
    grief and rage tied to her daughter’s death. The visual contrast between the sunny
    sky and the grim fortress underscores the dissonance between the world’s indifference
    and Catherine’s internal turmoil, setting the stage for her inevitable confrontation
    with her past and the malevolent influence of Tommy Lee Royce, who remains a looming
    threat even from behind bars. This moment establishes the prison as a symbolic
    and literal barrier, one that Catherine must navigate to uncover the truth while
    grappling with her own fragility.
