  title: Ilinka’s panic over Dragovic’s release
  description: Catherine returns home to find Clare, Winnie, and Ilinka already distressed
    by news of a potential national murder case linked to Ilinka’s past. Clare reveals
    Goran Dragovic—the man Catherine previously tasered—has been released on bail,
    triggering Ilinka’s immediate panic. Catherine attempts to downplay the threat,
    but her hesitation betrays deeper concern, especially when Winnie suggests the
    Knezevics may have funded his bail. The tension escalates when Winnie reveals
    Ilinka insists on returning to work at the biscuit factory, despite Catherine’s
    warnings about the Knezevics’ lingering influence. The scene underscores Catherine’s
    struggle to balance Ilinka’s autonomy with her own protective instincts, while
    the looming threat of Dragovic’s connections forces her to confront the unresolved
    danger of the criminal network. The dialogue reveals Catherine’s frustration with
    the system’s failures and her growing unease about the case’s broader implications,
    particularly for Ilinka’s safety.
