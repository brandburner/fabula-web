  title: John confesses infidelity to Ann
  description: 'After a tense exchange about the new murder case, John—visibly shaken—impulsively
    confides in Ann about discovering his wife Amanda’s affair with a colleague, Graham
    Tattersall. The revelation, delivered in a raw, fragmented flashback, exposes
    John’s emotional unraveling: his stunned confrontation with the lovers, his retreat
    from the house, and his subsequent isolation. Ann, caught off-guard by the sudden
    intimacy, reacts with cautious sympathy, marking a fragile shift in their professional
    dynamic. The moment culminates in John’s abrupt invitation for a drink, a tentative
    bid for connection that Ann hesitantly accepts, setting up their evolving relationship
    amid the case’s mounting pressures. The exchange underscores John’s vulnerability
    and Ann’s growing role as an emotional confidante, while the flashback reinforces
    his moral and psychological instability post-Vicky’s murder.'
