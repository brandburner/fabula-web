  title: Ilinka’s return plan exposes Catherine’s control
  description: Catherine returns home to find Ilinka and Winnie in the kitchen, where
    Clare and Neil are preparing tea. Clare reveals a national murder case linked
    to Ilinka’s past, then drops the bombshell that Goran Dragovic—the man Catherine
    tasered—has been released on bail. Ilinka’s fear is palpable, and Winnie translates
    her concerns, forcing Catherine to downplay the threat while subtly acknowledging
    the Knezevics’ influence. The tension escalates when Winnie reveals Ilinka’s insistence
    on returning to the biscuit factory, a decision Catherine immediately rejects.
    Catherine explains the trafficking scheme’s mechanics to Clare, who reacts with
    disgust, but the core conflict centers on Catherine’s protective instincts clashing
    with Ilinka’s autonomy. Catherine’s refusal is framed as pragmatic—Ilinka’s safety
    is at risk—but the subtext reveals Catherine’s trauma-driven need to control outcomes,
    especially when the Knezevics’ reach looms. The scene underscores the fragility
    of Ilinka’s recovery and the unresolved danger of the criminal network, while
    also exposing Catherine’s struggle to balance professional duty with personal
    fear.
