- fabula_uuid: cand_evt_scene_42b5fb6dd77bc806_01
  global_id: null
  title: Catherine’s Alibi Fails to Convince Shaf
  description: 'Catherine attempts to establish her alibi for the night of Aurelia
    Petrovic’s murder by claiming she attended the *Rocky Horror Show* with Joyce,
    a detail she admits was never recorded on her calendar. Her casual, almost dismissive
    tone—''Isn’t life weird?''—contrasts with Shaf’s skepticism, which is palpable
    in his dry observation that she and Joyce were ''doing the time warp'' while Aurelia
    was being killed. The exchange underscores the fragility of their professional
    trust: Catherine’s desperation to deflect suspicion is met with Shaf’s unspoken
    doubt, revealing how her emotional instability and past trauma are eroding her
    credibility. The absurdity of the alibi (a last-minute invitation to a campy musical)
    highlights her vulnerability, while Shaf’s refusal to ''picture that'' signals
    his growing distance from her. This moment deepens the tension between them, as
    the murder investigation forces Catherine to confront the consequences of her
    unresolved anger and the lies she’s built to contain it.'
