  title: Spike Mistakes Catherine for a Cop
  description: 'In the crowded, chaotic Jockey’s Club, Catherine and Clare share a
    tense moment—Clare, drunk and resentful, accuses Catherine of abandoning her by
    attending Tommy Lee Royce’s funeral. Before Catherine can respond, Spike, a volatile
    drunk, stumbles into their conversation. Mistaking Catherine for a brutal police
    officer he despises, he launches into a bitter tirade about police brutality,
    forcing Catherine into an uncomfortable defense of her colleagues. The confrontation
    exposes her internal conflict: her professional loyalty clashes with her personal
    disillusionment, revealing the fragility of her moral footing amid the mounting
    pressures of the investigation. Spike’s intrusion derails Clare’s emotional outburst,
    shifting the scene’s focus to Catherine’s strained relationship with authority—both
    within the force and in her own life.'
