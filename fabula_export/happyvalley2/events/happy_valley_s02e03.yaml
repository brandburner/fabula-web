- fabula_uuid: cand_evt_scene_185e08fb8139d805_03
  global_id: null
  title: Catherine’s lethal restraint and buried rage
  description: 'In a tense therapeutic session, Catherine Cawood deflects the therapist’s
    probing about her fixation on Tommy Lee Royce with a cryptic peacock metaphor,
    masking her obsessive need to monitor his whereabouts. When pressed about violent
    impulses, she admits to contemplating Royce’s death—tying her rage to her unresolved
    grief over her daughter’s murder. The therapist forces her to confront a past
    moment where she could have killed Royce but chose restraint, exposing the depth
    of her conflict: a rage she cannot fully confront, even as it festers beneath
    her professional composure. The exchange reveals Catherine’s self-deception—she
    claims no regret for sparing Royce, yet her visceral reaction betrays the truth.
    This moment is a turning point, laying bare the psychological toll of her trauma
    and the fragility of her control, which could unravel as the case escalates.'
