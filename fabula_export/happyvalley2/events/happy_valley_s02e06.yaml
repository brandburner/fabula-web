- fabula_uuid: cand_evt_scene_fbe459afb2efcf03_01
  global_id: null
  title: Tommy’s prison outburst over suspended privileges
  description: "\n  Tommy Lee Royce’s carefully constructed facade of control shatters\
    \ when a custodial officer delivers the news that his visits and phone calls are\
    \ suspended pending an inquiry. The restriction triggers an immediate, escalating\
    \ meltdown—Tommy’s questions about *why* are met with bureaucratic silence, which\
    \ only fuels his rage. His repeated demands for answers ('Why? Why? WHY?') reveal\
    \ his psychological dependence on external validation and his inability to tolerate\
    \ any loss of influence. The scene cuts to the corridor as Tommy’s outburst grows\
    \ violent, forcing a second officer to intervene. This moment exposes the raw\
    \ vulnerability beneath his manipulative persona: his need for control is not\
    \ just strategic but existential. The incident underscores the prison’s power\
