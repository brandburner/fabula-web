- fabula_uuid: cand_evt_scene_0e8a8030bf556632_01
  global_id: null
  title: Catherine confronts Frances’s delusions
  description: 'Catherine Cawood enters Frances Drummond’s home under the guise of
    a concerned grandmother, subtly probing Frances’s fractured loyalty to Tommy Lee
    Royce. The absence of Tommy and Ryan’s photos signals Frances’s emotional detachment
    from reality, while Catherine methodically dismantles Frances’s delusional belief
    in Tommy’s redemption. Frances, clinging to her infatuation, deflects Catherine’s
    revelations about Tommy’s crimes—including the rape of Catherine’s daughter and
    the murders of Ann Gallagher and Kirsten McAskill—by insisting Tommy was a victim
    of circumstance. Catherine’s controlled but seething responses expose Frances’s
    grooming and the psychological manipulation at play, culminating in a tense standoff
    where Frances accuses Catherine of jealousy. The scene hinges on Catherine’s strategic
    duality: a grandmother’s warmth masking a detective’s precision, while Frances’s
    refusal to confront Tommy’s monstrosity underscores her complicity in his web
    of deceit. The confrontation leaves Frances’s allegiance—and Ryan’s safety—hanging
    in the balance, with Catherine’s final warning serving as both a plea and a threat.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e06
  scene_sequence: 26
  sequence_in_scene: 42
  key_dialogue:
  - 'FRANCES: Ryan should have a relationship with his father. However difficult things
    are.'
  - 'CATHERINE: Tommy Lee Royce is a psychopath. He’s a sex offender. He raped my
    daughter. She was traumatized. We are going to have different versions of the
    same story, but please credit me with [some]... I was there. When she gave birth.
    And after. I know what she went through.'
  - 'FRANCES: I believe that no-one is born evil. He may have done things... but we
    all do that, we’re all human. But he isn’t evil. He’s a product of his childhood...
    With help—and kindness—I believe he will become the person he was always capable
    of being. Good and kind and gentle and thoughtful.'
  - 'CATHERINE: He’s using you. He’s used you. To get close to Ryan. He’s groomed
    you. You’ve been groomed. You’ve been picked, you’ve been chosen, for what he
    can get out of you.'
  - 'FRANCES: You’re jealous.'
