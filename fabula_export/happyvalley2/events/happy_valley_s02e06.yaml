      \ physical evidence, and the preservation of the chain of custody.\n      "
    power_dynamics: "\n      Operating under the authority of the police but with\
      \ specialized expertise that gives them significant influence over the interpretation\
      \ of the evidence. Their findings will shape the investigation’s direction and\
      \ the understanding of the Garrs family’s deaths.\n      "
    organizational_goals:
    - Collect and document forensic evidence to reconstruct the sequence of events
      leading to the murder-suicide.
    - Preserve the integrity of the crime scene to ensure that all evidence is admissible
