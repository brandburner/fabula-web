  global_id: null
  title: John’s suicidal leap onto the tracks
  description: 'John Wadsworth, cornered and desperate, abandons his car and flees
    onto the westbound platform at Sowerby Bridge Station, his panic escalating as
    he mutters ''shit shit shit'' under his breath. Catherine Cawood pursues relentlessly,
    her focus unbroken even as she quips about Gorkem’s failure to engage the patrol
    car’s handbrake. John’s recklessness peaks when he jumps down onto the railway
    tracks, running directly toward an oncoming train—a clear suicide attempt or a
    final bid to force Catherine to back off. Catherine halts at the platform’s edge,
    realizing the danger, and radios in a frantic warning: ''He’s on the tracks, he’s
    running on the tracks towards Sowerby Bridge.'' The moment exposes John’s unraveling
    psyche, his willingness to self-destruct rather than face capture, while Catherine’s
    split-second decision to stop reflects her instinct for survival and her refusal
    to let him slip away. The scene escalates the confrontation’s stakes, forcing
    Catherine to confront the violent consequences of John’s actions—both for him
    and her investigation—while the radio’s abrupt order to ''DO NOT follow four-five''
    hints at unseen forces manipulating the pursuit’s outcome. This act cements John’s
    descent into self-destruction and sets the stage for his final confrontation on
    the viaduct.'
