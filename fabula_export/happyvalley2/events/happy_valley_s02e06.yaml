- fabula_uuid: cand_evt_scene_00359296890d7a4a_02
  global_id: null
  title: Catherine exposes Frances’s fraud and triggers arrest
  description: 'Catherine returns to Mike’s office with critical evidence linking
    Frances Drummond to identity fraud—specifically, the stolen identity of Cecily
    Wealand, a stroke victim whose documentation Frances accessed during a period
    of vulnerability. The revelation underscores the calculated nature of Frances’s
    deception, as she exploited a grieving partner’s trust to build her cover. Catherine’s
    disgust is palpable as she reflects on Frances’s fifteen years of unblemished
    professional conduct, now shattered by her reckless obsession with Tommy Lee Royce.
    The scene pivots from investigative momentum to immediate action: Mike dispatches
    officers to arrest Frances while Catherine contacts the prison liaison to alert
    Gravesend about Royce’s grooming of a vulnerable woman. The exchange reveals Catherine’s
    dual focus—dismantling Frances’s threat to Ryan while exposing the systemic corruption
    of Royce’s influence. The dialogue’s clinical precision contrasts with the emotional
    weight of Frances’s moral unraveling, framing her as both a victim and an enabler
    of Royce’s manipulation. This moment marks a turning point: the arrest of Frances
    is a tactical victory, but the broader implications—Royce’s reach, the fragility
    of trust, and the cost of obsession—remain unresolved, heightening the stakes
    for Catherine’s personal mission to protect Ryan.'
