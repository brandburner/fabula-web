    \ place Vicky Fleming with an unidentified, smartly dressed man near her disappearance.\
    \ The description of the man (late 40s/early 50s, clean-shaven, professional attire)\
    \ mirrors John Wadsworth’s appearance, triggering a subliminal flashback to his\
    \ blackout night. The mention of potentially recoverable CCTV footage from three\
    \ days before the arson and Vicky’s last work appearance visibly unnerves John,\
    \ his face draining of color. The revelation forces John to confront the possibility\
    \ that his actions—whether intentional or not—were captured on camera, escalating\
    \ the tension around his guilt and the investigation’s closing net. The scene\
    \ pivots from procedural routine to a moment of raw, personal stakes for John,\
    \ while also advancing the plot toward a critical piece of forensic evidence.\n\
    \  "
