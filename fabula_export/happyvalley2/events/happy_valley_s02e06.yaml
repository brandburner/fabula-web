    global_id: ger_object_9f971013fda5
  - object_uuid: ger_object_cf4ddb64d007
    description_of_involvement: 'Alison’s diazepam, whisky, and vodka combination
      is the **chemical time bomb** that detonates this event. Their **toxic synergy**—**depressants
      and alcohol**—creates a **deadly cocktail** that **disables Alison’s resistance**,
      both **physically and psychologically**. The diazepam **slows her reflexes and
      clouds her mind**, the alcohol **amplifies the sedative effects**, and together
      they **break down her defenses**, allowing Catherine to **force a confession**.
      The substances are **not just catalysts for the overdose**, but **enablers of
      the truth**: Alison’s **delirious state** makes her **vulnerable to Catherine’s
      questioning**, her **slurred denials** giving way to the **raw admission** (*‘I
      shot Daryl’*). For Catherine, the combination is **both a tool and a complication**—it
      **weakens Alison enough to confess**, but it also **risks killing her before
      she can be arrested**. The substances’ presence is **a dark irony**: Alison
      **tried to escape her guilt through poison**, but the **same poison forced her
      to confront it**. Their role in the event is **dual**: they are **both the cause
      of the crisis and the means of resolving it**.'
    status_before_event: Consumed by Alison in the kitchen, their effects already
      taking hold as she stumbles outside.
    status_after_event: Metabolized in Alison’s system, their residues analyzed in
      toxicology reports as part of the investigation.
    global_id: ger_object_cf4ddb64d007
  - object_uuid: ger_object_b16e7f614143
    description_of_involvement: 'Alison’s execution shotgun is the **silent witness
