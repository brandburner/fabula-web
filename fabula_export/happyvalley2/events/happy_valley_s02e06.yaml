  - object_uuid: ger_object_72aab31f71fd
    description_of_involvement: 'Catherine’s metaphor of a ''rice pudding''—a creamy
      British dessert with a thin, fragile skin—serves as a narrative device to downplay
      Frances’ potential threat. By describing Frances as someone who ''couldn’t knock
      the skin off a rice pudding,'' Catherine frames her as harmless, almost comically
      so. The metaphor is revealing: it exposes Catherine’s tendency to underestimate
      threats when they appear soft or unassuming. The rice pudding becomes a symbol
      of her dismissive attitude, which Clare’s warning about ''poison in little bottles''
      directly challenges. The object is never physically present but functions as
      a powerful rhetorical tool in the scene.'
    status_before_event: Metaphorically invoked by Catherine to trivialise Frances’
      threat.
