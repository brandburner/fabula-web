  description: "\n  In the H-MIT office, Andy and Jodie discuss the escalating Vicky\
    \ Fleming investigation, with Andy pushing for aggressive media exposure of her\
    \ images to jog public memory. The conversation takes a darker turn as Andy voices\
    \ suspicion that the killer might be someone within their own team, planting seeds\
    \ of paranoia. Jodie reluctantly engages in the hypothetical exercise, but the\
    \ tension spikes when Andy reveals Vicky Fleming had John Wadsworth’s phone number—implicating\
    \ him due to his troubled marriage and the suspicious circumstances of the number’s\
    \ existence. Jodie’s forced proximity to John during this revelation creates unbearable\
    \ tension, as she must suppress any reaction while Andy confirms the information\
    \ will be shared with the review team. The moment forces Jodie to confront the\
    \ unsettling possibility of John’s involvement, while John’s internal panic grows\
    \ as he overhears fragments of the conversation. This exchange marks a critical\
    \ turning point, where professional duty clashes with personal loyalty, and the\
    \ investigation’s focus narrows dangerously toward one of their own.\n  "
