- fabula_uuid: act_f068986ec8755dfd
  number: 3
  summary: The final act accelerates as Catherine, armed with Neil's information and
    her own observations, begins to piece together John Wadsworth's involvement in
    Vicky Fleming's murder. Her suspicion solidifies when Ann Gallagher shares details
    of John's furtive phone calls and financial desperation, suggesting he was also
    being blackmailed. The arrival of Graham Tattersall at the police station, seeking
    to report John for assault and revealing John's affair with Amanda, provides the
    undeniable link. Confronted by Catherine and Graham, John Wadsworth makes a desperate
    dash for freedom, initiating a high-speed police pursuit through Sowerby Bridge.
    Catherine, in a patrol car with Gorkem, relentlessly pursues John, who, cornered
    at a dead end by the railway station, attempts to escape on foot. The chase culminates
    dramatically on a viaduct overlooking the police station. Catherine confronts
    a distraught John, who confesses to burning evidence and inadvertently killing
    Vicky Fleming during a confrontation over blackmail. Despite Catherine's attempts
    to talk him down, offering a path to a lesser charge, John, after declaring his
    love for his children, deliberately falls backward off the viaduct, dying upon
    impact with a van below. Catherine, shaken, processes the grim reality of his
    death. In the aftermath, Tommy Lee Royce's prison visits are suspended due to
    his manipulative behavior, and Catherine delivers the devastating news to Frances
    Drummond, exposing Tommy's multiple engagements and shattering Frances's illusions.
    Catherine then visits Alison Garrs in the hospital, offering a profound moment
    of shared grief over their lost children. The episode concludes with Catherine
    discovering a secret letter from Ryan to Tommy, revealing Ryan's continued, hidden
    communication with his father. Finally, a poignant conversation with Clare reveals
    Alison's tragic backstory of incest and her son Daryl being her father's child,
    deepening Catherine's understanding of intergenerational trauma. The series ends
    with Catherine, Clare, Daniel, and Ryan walking on the moors, a testament to resilience
    amidst enduring complexities.
