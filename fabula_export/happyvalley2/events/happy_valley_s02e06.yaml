    \ a critical forensic update to Jodie over the phone. The POLSA team’s work has\
    \ uncovered damning evidence in Daryl Garrs’ bedroom, with Andy cautiously but\
    \ confidently suggesting Daryl is the prime suspect in the Vicky Fleming investigation.\
    \ The conversation abruptly shifts when Jodie pivots to media strategy, revealing\
    \ the dual pressures facing the investigation: the forensic breakthrough and the\
    \ escalating PR fallout from Alison Garrs’ murder-suicide. The exchange underscores\
    \ the tension between solving the crime and managing its public perception, with\
    \ Andy’s reluctance to overcommit (after the Sean Balmforth misstep) contrasting\
    \ with Jodie’s pragmatic focus on damage control. This moment highlights the investigative\
    \ team’s fragility—both in their confidence and their unity—as they grapple with\
    \ the case’s widening implications.\n  "
