  global_id: null
  title: Catherine’s Breaking Point and Royce’s Shadow
  description: 'In the locker room, Catherine Cawood—still reeling from the brutal
    murder-suicide of Alison Garrs and her son—attempts to compose herself after bagging
    her bloodstained clothes for forensics. Mike Barnes enters, offering a rare moment
    of human connection amid the chaos. When he asks if she’s okay, her raw admission—*‘She
    shot her own child. In the back of the head.’*—exposes the depth of her trauma,
    a fracture in her professional armor. Mike’s follow-up about her therapist feels
    like an intrusion, but his intel on Frances Drummond—a Scottish pharmacist linked
    to Tommy Lee Royce—shifts the scene from personal unraveling to operational urgency.
    The revelation that Drummond may be the same woman seen in CCTV footage near Ryan
    forces Catherine to confront two simultaneous threats: her own emotional collapse
    and the escalating danger to her grandson. The moment becomes a turning point,
    where Catherine’s vulnerability and the investigation’s critical lead collide,
    demanding she act despite her grief.'
