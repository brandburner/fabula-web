  title: John seizes blackmail revelation as leverage
  description: 'In a tense corridor encounter at Norland Road Police Station, Catherine
    casually shares a critical lead about Vicky Fleming’s blackmail scheme—targeting
    Neil Ackroyd—with John Wadsworth, who is visibly unwell and emotionally unraveling.
    Catherine’s revelation about Vicky’s predatory tactics and Neil’s ruined life
    triggers a moment of recognition in John: this information could serve as a justification
    for his own morally compromised actions. His internal shift is palpable—from feigned
    concern for Neil to calculating how this revelation might absolve him of suspicion
    or even provide cover for his own involvement in Vicky’s murder. The exchange
    underscores John’s manipulative instincts, his desperation to control the narrative,
    and his willingness to exploit others’ suffering to protect himself. The scene
    functions as a turning point, revealing John’s moral decay and setting up his
    subsequent confession to Andy, where he will attempt to reframe his guilt as a
    tragic consequence of Vicky’s blackmail empire. The dialogue’s subtext—Catherine’s
    obliviousness to John’s true state and John’s performative sympathy—highlights
    the corruption festering within the police force and the lengths to which John
    will go to avoid accountability.'
