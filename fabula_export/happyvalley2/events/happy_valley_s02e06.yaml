  title: Catherine shatters Frances’s delusions
  description: 'Sergeant Catherine Cawood arrives at Frances Drummond’s home in full
    uniform, her presence alone signaling an official, irrevocable confrontation.
    She delivers irrefutable evidence of Tommy Lee Royce’s serial infidelity—printed
    records of his engagements to multiple women, including a 23-year-old student
    and a 45-year-old accountant—directly contradicting Frances’s romanticized belief
    that she alone can "save" him. Catherine’s delivery is clinical yet not unkind;
    she frames the revelation as a warning rather than a weapon, her final instruction—*‘You
    look after yourself’*—a rare moment of unguarded empathy that underscores the
    depth of Frances’s impending collapse. The scene marks a narrative turning point:
    Frances’s idealization of Tommy Lee is exposed as a delusion, forcing her to confront
    the predatory manipulation she’s enabled. For Catherine, the act is both professional
    duty and a calculated risk—she knows the truth will destabilize Frances, potentially
    making her more volatile or vulnerable, but it’s a necessary step to sever Tommy
    Lee’s influence over Ryan. The lingering shot of Frances, stunned and adrift,
    underscores the emotional devastation of the moment, while Catherine’s departure
    in the patrol vehicle reinforces the irreversible shift in power dynamics. Thematically,
    the scene critiques the dangers of toxic charisma and the fragility of self-deception,
    with Frances’s reaction foreshadowing her potential unraveling in the wake of
    this betrayal.'
