  object_involvements:
  - object_uuid: ger_object_930b98825fc4
    description_of_involvement: "\n      The 30 empty Diazepam blister packs are scattered\
      \ in front of Alison like a confession, their absence a damning indictment of\
      \ her intent. Each pack is devoid of pills, the foil torn open in haste, suggesting\
      \ a frantic, almost mechanical consumption. Catherine notes them immediately,\
      \ her fingers brushing against the packs as she checks Alison’s pulse. They\
      \ are not just evidence—they are a narrative detail, a physical representation\
      \ of Alison’s desperation to escape the reality of her actions. The packs will\
      \ later be analyzed to confirm the dosage and type of medication, but in this\
      \ moment, they are a visceral reminder of the lengths to which she went to end\
      \ her life.\n      "
    status_before_event: "\n      Full, sealed, and stored in a cabinet or drawer.\
      \ Alison retrieved them in a state of panic, tearing open the packs to consume\
      \ all 30 pills in a short period.\n      "
    status_after_event: |2-

            Collected as evidence, photographed in situ, and analyzed to confirm the type and quantity of medication ingested. They become a critical piece of the toxicology report.
    global_id: ger_object_930b98825fc4
  - object_uuid: ger_object_583de0d1fb57
    description_of_involvement: "\n      The empty whisky bottle rests beside the\
      \ vodka bottle and Diazepam packs, another piece of the puzzle in Alison’s overdose.\
      \ Its presence suggests a methodical, almost ritualistic consumption—first the\
      \ pills, then the alcohol to wash them down, then more alcohol to dull the edges\
      \ of reality. The bottle is a silent witness to her descent into despair, its\
      \ emptiness a metaphor for the void she sought to fill. Catherine’s gaze flicks\
      \ over it as she takes in the scene, her mind already piecing together the timeline\
      \ of Alison’s actions. It is a detail that will later be confirmed by toxicology\
      \ reports, but in this moment, it is a chilling indicator of intent.\n      "
    status_before_event: "\n      Partially full when Alison began drinking, now empty\
      \ and placed haphazardly on the table. It may have been used to chase the Diazepam,\
      \ its contents consumed in a state of panic and grief.\n      "
    status_after_event: |2-

            Photographed, tagged, and collected as evidence. Its contents are analyzed to confirm the type and quantity of alcohol ingested, contributing to the forensic narrative of the overdose.
    global_id: ger_object_583de0d1fb57
  - object_uuid: ger_object_9f971013fda5
    description_of_involvement: "\n      The empty vodka bottle sits directly in front\
      \ of Alison Garrs on the blood-splattered table, a grim companion to the whisky\
      \ bottle and scattered Diazepam packs. It is a stark indicator of her overdose\
      \ attempt—a desperate, failed escape from the horror of what she’s done. The\
      \ bottle is likely smudged with her fingerprints, its contents consumed in a\
      \ frenzied, alcohol-fueled stupor. Catherine notes it immediately, her eyes\
      \ scanning the table as she assesses Alison’s condition. It is not just a clue\
      \ but a narrative detail: the bottle represents Alison’s final, futile attempt\
      \ to numb the pain of her actions, a physical manifestation of her despair.\n\
      \      "
    status_before_event: "\n      Full or nearly full when Alison began drinking,\
      \ now empty and discarded on the table. It may be tipped over or lying on its\
      \ side, its contents consumed in a short, frantic period.\n      "
    status_after_event: |2-

            Collected as evidence by forensic teams, photographed in situ, and later analyzed for fingerprints and residue. It becomes part of the toxicology report confirming Alison’s overdose.
    global_id: ger_object_9f971013fda5
  - object_uuid: ger_object_b16e7f614143
    description_of_involvement: "\n      Alison’s execution shotgun is the centerpiece\
      \ of the crime scene, abandoned on the sink where she left it after firing a\
      \ fatal blast into the back of Daryl Garrs’ head. The weapon is still warm,\
      \ its barrel likely smeared with gore, and its presence is a silent testament\
      \ to the violence that unfolded. Catherine’s eyes linger on it as she radios\
      \ for backup, her gaze flickering between the shotgun and Alison’s barely conscious\
      \ form. It is both a clue and a symbol—the physical manifestation of Alison’s\
      \ desperate, fatal act of love and destruction. Forensic teams will later process\
      \ it for fingerprints and residue, but in this moment, it is a grotesque relic\
      \ of the murder-suicide.\n      "
    status_before_event: "\n      Loaded, recently fired, and placed haphazardly on\
      \ the sink after the shooting. The barrel is still warm, and traces of brain\
      \ matter and blood may be visible on its surface.\n      "
    status_after_event: |2-

            Secured as evidence by forensic teams, tagged and removed from the scene for analysis. Its condition is documented, and it becomes a key piece of proof in the investigation.
    global_id: ger_object_b16e7f614143
  - object_uuid: ger_object_50e03ca35342
    description_of_involvement: "\n      Catherine’s handheld police radio is her\
      \ lifeline in the chaos, the device through which she coordinates the response\
      \ to the crisis. She grips it tightly as she radios for backup, her voice measured\
      \ but urgent, directing the dispatch of ambulances, forensic teams, and additional\
      \ officers. The radio crackles with static, a reminder of the institutional\
      \ machinery now in motion. It is not just a tool—it is a symbol of Catherine’s\
      \ authority and the system she represents, a bridge between the horror of the\
      \ scene and the resources needed to address it. Without it, the response would\
      \ be delayed, and lives could be lost. In this moment, it is the difference\
      \ between chaos and control.\n      "
    status_before_event: "\n      Attached to Catherine’s belt or holster, fully charged\
      \ and ready for use. It has been used earlier in the day for routine communications\
      \ but is now repurposed for an emergency.\n      "
    status_after_event: |2-

            Still in Catherine’s possession, now slightly warm from use. It has facilitated the dispatch of critical resources, and its log will later be reviewed as part of the investigation.
    global_id: ger_object_50e03ca35342
  - object_uuid: ger_object_eebceb2f6620
    description_of_involvement: "\n      The kitchen table is the epicenter of the\
      \ violence, its surface a grotesque canvas of blood, brain matter, and shattered\
      \ lives. Daryl Garrs’ body is slumped across it, his face pressed into the gore,\
      \ while Alison sits nearby, her own life ebbing away. The table is not just\
      \ a piece of furniture—it is a symbol of the Garrs family’s collapse, a stage\
      \ for their final, tragic act. Catherine’s boots stick slightly to the floor\
      \ as she steps into the room, her eyes drawn to the table and the horror it\
      \ holds. It is a detail that will haunt her, a physical manifestation of the\
      \ case’s escalating brutality. Forensic teams will later process it for trace\
      \ evidence, but in this moment, it is a silent witness to the murder-suicide.\n\
      \      "
    status_before_event: "\n      A ordinary kitchen table, now transformed into a\
      \ crime scene. Its surface is clean but for the blood and gore from Daryl’s\
      \ shooting, and it bears the weight of Alison’s slumped body.\n      "
    status_after_event: |2-

            Cordoned off as part of the crime scene, photographed, and processed for forensic evidence. The table becomes a key piece of the investigation, its condition documented in detail.
    global_id: ger_object_eebceb2f6620
  - object_uuid: ger_object_8cd13dbe5d85
    description_of_involvement: "\n      Shafiq Shah’s baton is drawn as he heads\
      \ upstairs to check for additional threats or victims, its rigid form a stark\
      \ contrast to the chaos of the kitchen. The baton is not used—there are no threats\
