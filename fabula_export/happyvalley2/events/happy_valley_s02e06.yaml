    tense silence, their body language suggesting a recent confrontation. Clare immediately
    signals that Neil has something urgent to disclose, prompting him to reluctantly
    confess his prior connection to Vicky Fleming—a revelation that instantly raises
    suspicion about his motives and deepens the conspiracy’s reach. The admission
    forces Catherine to question whether Neil’s involvement is peripheral or central
    to the unfolding crisis, while also exposing a new vulnerability in her personal
    circle. The scene’s quiet intensity underscores the weight of the confession,
    as Neil’s hesitation and Clare’s supportive but strained demeanor imply this revelation
    could have broader implications for the investigation and Catherine’s trust in
    those around her.
