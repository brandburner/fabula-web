  title: John’s outburst fractures the Wadsworth family
  description: 'A trivial argument between Jack and Ben over missing football boots
    escalates into a volatile confrontation when John—already unraveling under the
    weight of his guilt over Vicky Fleming’s murder—explodes in a raw, unfiltered
    outburst. His sudden rage ("Just - ! Shut up. Shut UP. You need to stop arguing.
    You need to start looking after each other.") silences the room, exposing the
    family’s simmering tensions and his own deteriorating mental state. Amber’s pointed
    question ("You are stopping now dad. Aren’t you?") forces John to confront his
    instability, while his lingering resentment toward Amanda (implied by his glare)
    underscores the deeper fractures in the household. The scene marks a turning point:
    John’s inability to control his emotions signals his impending collapse, while
    the family’s stunned reaction reveals how far they’ve already drifted from one
    another. The outburst isn’t just about the boots—it’s a pressure valve for John’s
    guilt, the family’s dysfunction, and the crisis that’s been building since Vicky’s
    murder.'
