  title: Catherine exposes Tommy’s predatory manipulation
  description: Catherine Cawood visits Frances Drummond’s home to confront her about
    her blind loyalty to Tommy Lee Royce, a convicted sex offender and murderer. The
    scene opens with Catherine carefully controlling her tone to avoid antagonizing
    Frances, who is visibly defensive after police searched her home. Frances insists
    Tommy is capable of redemption, citing his traumatic childhood and her belief
    that kindness—not condemnation—can transform him. Catherine methodically dismantles
    Frances’s delusions by recounting Tommy’s crimes (rape, murder, attempted murder)
    and framing Frances as a victim of grooming, exploited for her access to Ryan.
    Frances deflects by accusing Catherine of jealousy and insisting Tommy’s appearance
    makes him trustworthy. Catherine’s final warning—that Frances’s infatuation will
    lead to her downfall—hints at the fragility of Frances’s trust and the depth of
    Tommy’s manipulative control. The confrontation forces Catherine to grapple with
    Frances’s complicity, while Frances’s refusal to acknowledge Tommy’s evil underscores
    her role as both victim and enabler of his crimes. The tension escalates as Catherine’s
    frustration bleeds through her controlled demeanor, revealing the personal stakes
    of protecting Ryan from Tommy’s influence.
