    description_of_involvement: 'St. Marks Junior School functions as both a setting
      and an active participant in this event. The organization’s role is twofold:
      first, as the institution where Ryan’s safety is directly threatened by Frances’
      presence, and second, as the tool Catherine uses to restrict Frances’ access
      without direct confrontation. Mrs. Beresford’s action—removing Frances from
      one-on-one sessions under the pretext of ''pupil feedback''—demonstrates how
      the school’s bureaucratic machinery can be leveraged for protective ends. However,
      the organization’s involvement also highlights its limitations: while it can
      enforce rules, it lacks the authority to fully address the root of the threat
      (Frances’ connection to Tommy Lee Royce). The school’s response is reactive,
      not proactive, reflecting its role as a mediator in a larger conflict.'
    active_representation: Via institutional protocol being followed (Mrs. Beresford’s
      decision to remove Frances), and through the collective action of staff (e.g.,
      Senco’s request for feedback).
    power_dynamics: Exercising authority over individuals (Frances) but operating
      under constraint (lack of concrete evidence, need to maintain appearances).
    organizational_goals:
    - To protect Ryan and other Year 6 students from potential harm by restricting
      Frances’ unsupervised access.
    - To maintain the school’s reputation and adherence to protocol, even as it bends
      the rules to accommodate Catherine’s request.
    influence_mechanisms:
    - Bureaucratic protocols (using 'feedback exercises' as a pretext for removal).
    - Hierarchical authority (Mrs. Beresford acting on behalf of Senco and the school’s
      governance structure).
    institutional_impact: The school’s action sets a precedent for how it will handle
      future threats, but it also exposes the fragility of its protections—Frances’
      removal is a temporary measure, not a permanent solution.
    internal_dynamics: Tension between protective instincts (Mrs. Beresford’s desire
      to safeguard students) and institutional caution (avoiding accusations without
      proof).
    global_id: ger_organization_339bd12b39d4
