  title: Graham reveals John’s violent assault
  description: In a tense, escalating interrogation, Graham Tattersall—already admitting
    to his affair with Amanda Wadsworth—shifts the focus to John Wadsworth’s violent
    outburst after Vicky Fleming’s murder. As Catherine prepares to escalate the case
    to CID, Graham’s fragmented confession implicates John in a physical assault,
    revealing his desperation to locate Amanda and suggesting a deeper, more violent
    connection to the crime. The scene pivots from marital infidelity to criminal
    culpability, forcing Catherine to confront the possibility that John’s involvement
    in Vicky’s murder extends beyond emotional instability to outright brutality.
    Graham’s raw, unfiltered account—marked by guilt, fear, and a need to deflect
    blame—serves as both a confession and a damning indictment of John’s unraveling
    state, while Catherine’s measured response underscores her growing suspicion that
    the case’s darkest layers are only now surfacing.
