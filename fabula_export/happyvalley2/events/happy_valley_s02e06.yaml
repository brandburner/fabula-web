  title: Catherine exposes Frances' stolen identity
  description: "\n  In Catherine’s office at Norland Road Police Station, Catherine\
    \ reveals to Clare the shocking truth about Frances Drummond: she is not who she\
    \ claims to be. Using police intelligence, Catherine exposes that Frances has\
    \ stolen the identity of Cecily Wealand—a deceased teaching assistant—specifically\
    \ to infiltrate Ryan’s school and gain access to him. The revelation underscores\
    \ the depth of Frances’ manipulation, her connection to Tommy Lee Royce, and the\
    \ dangerous lengths she has gone to in order to groom Ryan. Catherine’s urgency\
    \ is palpable as she waits for confirmation from East Lothian to arrest Frances\
    \ for fraud, while Clare reacts with horror at the extent of the deception. The\
    \ landline ringing abruptly cuts the conversation short, signaling an escalation\
    \ in the unfolding crisis. This moment forces Clare to confront the reality of\
    \ Ryan’s vulnerability and the sinister reach of Royce’s influence, while Catherine’s\
    \ professional focus clashes with her personal fear for her grandson’s safety.\n\
    \  "
