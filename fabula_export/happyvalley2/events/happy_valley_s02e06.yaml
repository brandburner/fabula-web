  title: Frances’s arrest and defiant loyalty
  description: In Mrs. Beresford’s office, Frances Drummond is confronted by detectives
    who arrest her for fraud by false representation after her deception as a teaching
    assistant is exposed. Despite her terror, Frances clings to her misguided justification—pleading
    that Ryan Cawood ‘needs someone who will listen to him’ about his father, Tommy
    Lee Royce. Mrs. Beresford, furious but composed, rejects Frances’s manipulation,
    emphasizing the betrayal of trust. The detectives seize Frances’s phone and coat
    as evidence, underscoring the institutional power now closing in on her. The scene
    reveals Frances’s psychological entanglement with Royce’s cult, her defiance rooted
    in delusional loyalty, and the school’s complicity in enabling her access to Ryan.
    This moment foreshadows Frances’s potential role as a witness—or obstacle—in Catherine’s
    investigation, while exposing the fragility of institutional safeguards against
    manipulation.
