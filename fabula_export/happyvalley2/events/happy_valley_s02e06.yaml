- fabula_uuid: cand_evt_scene_8fce47831b97ab8f_01
  global_id: null
  title: John’s paranoid confession on the viaduct
  description: On the viaduct, Catherine Cawood confronts John Wadsworth with irrefutable
    evidence of his betrayal, forcing him into a desperate, unraveling confession.
    John’s frantic claim that Vicky Fleming spiked his drink and blackmailed him with
    humiliating photos reveals his fractured psyche—his paranoia, self-loathing, and
    the depth of Tommy Lee Royce’s psychological grip. Catherine’s measured, almost
    clinical response underscores her strategic patience; she’s not just extracting
    answers but assessing whether John can still be salvaged as an ally or must be
    cut loose as a liability. The exchange exposes the fragility of John’s narrative,
    the extent of his complicity, and the systemic corruption Royce’s influence has
    seeped into. The viaduct setting—elevated, exposed—mirrors John’s precarious mental
    state, while Catherine’s composure contrasts sharply with his unraveling, reinforcing
    her role as the stabilizing force in the chaos.
  episode_uuid: ep_sea_ser_happy_valley_s02_e06
  scene_sequence: 56
  sequence_in_scene: 81
  key_dialogue:
  - 'CATHERINE: There’s other people’s evidence. There’s this Neil bloke I told you
    about. For one. And there’s - more than likely - there’s others.'
  - 'JOHN: She spiked my drink! She took photos of me looking stupid and she was going
    to send them to people!'
  - 'JOHN: Everybody! People I work with, my my kids, my mother, people I don’t even
    know that well! They’re just people - people you don’t even like - just people
    you’ve had on your phone for years!'
