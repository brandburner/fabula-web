    instincts sharp. Her trained eye locks onto Mrs. Beresford, whose rigid posture,
    darting glances, and white-knuckled grip on her bag betray an uncharacteristic
    tension. The headteacher’s body language—usually composed and authoritative—now
    radiates quiet panic, suggesting a crisis beneath the school’s routine. Catherine’s
    sharp intake of breath (''Ah.'') signals her recognition of this as a critical
    moment, not just a routine interaction. The unspoken urgency in Beresford’s demeanor
    forces Catherine to pivot from her own investigation, sensing that whatever threat
    is brewing here demands immediate attention. This is a turning point: Catherine’s
    instincts override her planned course of action, shifting her focus from surveillance
    to intervention before the situation escalates further.'
