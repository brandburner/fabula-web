  title: Frances’s Arrest and Defiant Justification
  description: In Mrs. Beresford’s office, Frances Drummond—posing as Miss Wealand—is
    arrested for fraud by two detectives after her false identity is exposed. Though
    visibly terrified, Frances clings to her mission, repeatedly insisting that Ryan
    Cawood ‘needs someone who will listen to him’ about his father’s absence. Mrs.
    Beresford, furious but composed, confronts Frances’s betrayal of trust, emphasizing
    the damage to the school’s reputation and the children’s well-being. The detectives
    methodically seize Frances’s phone and coat as evidence, underscoring the legal
    consequences of her actions. The scene reveals Frances’s delusional conviction
    that her manipulation of Ryan is altruistic, while Mrs. Beresford’s restrained
    anger exposes the depth of Frances’s deception. This confrontation marks a turning
    point in Catherine Cawood’s investigation, as Frances’s arrest forces the truth
    about her connection to Tommy Lee Royce into the open, while her defiance hints
    at her potential role as a reluctant witness—or a dangerous obstacle—in protecting
    Ryan from further psychological harm. The tension between institutional authority
    and Frances’s misguided loyalty to Royce foreshadows the broader battle over Ryan’s
    emotional well-being and the legal repercussions of Frances’s actions.
