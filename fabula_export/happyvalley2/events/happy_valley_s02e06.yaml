- fabula_uuid: cand_evt_scene_9e984399cf5802fb_01
  global_id: null
  title: Catherine’s Evasive Accountability to Clare
  description: While driving through the hills in a patrol car, Catherine Cawood engages
    in a tense phone conversation with her sister Clare, who presses her for answers
    about whether she’s taken action against Frances Drummond—a threat tied to Tommy
    Lee Royce’s influence. Catherine deflects Clare’s accusations, insisting she hasn’t
    ‘gone in all guns blazing,’ but her evasiveness reveals her professional paralysis
    and personal fear. The exchange underscores the fracture in their alliance, as
    Clare’s frustration exposes Catherine’s reluctance to confront Frances directly,
    despite the urgency of protecting Ryan. This moment of accountability under pressure
    highlights Catherine’s conflict between her duty as a sergeant and her emotional
    vulnerability, threatening to derail their fragile collaboration at a critical
    juncture in the investigation.
