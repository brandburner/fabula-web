  global_id: null
  title: John Wadsworth’s suicide and Catherine’s collapse
  description: 'On the viaduct, John Wadsworth—desperate and guilt-ridden after confessing
    to Vicky Fleming’s murder—briefly considers surrendering to Catherine Cawood’s
    reassurances. He recounts his suicide intervention training, almost convincing
    himself to step back from the edge, but his self-loathing and fear of consequences
    overwhelm him. In a sudden, irreversible act, he lets himself fall backward over
    the parapet, landing on Station Road below. The impact is fatal, witnessed by
    Catherine, who freezes in shock before racing to the edge to confirm his death.
    Meanwhile, Gorkem finds her in a state of emotional collapse, her professional
    composure shattered by the horror of the moment. The event marks a visceral turning
    point: John’s suicide eliminates a key suspect in the Vicky Fleming case, while
    Catherine’s trauma underscores the human cost of Tommy Lee Royce’s manipulations
    and the moral weight of her investigation. The scene’s brutality forces a reckoning
    with the limits of redemption and the irreversible consequences of despair.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e06
