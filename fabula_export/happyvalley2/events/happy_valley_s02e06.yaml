  title: Frances loses access to Ryan
  description: 'The scene opens in Catherine’s kitchen, where Clare’s lingering unease
    about Frances’ trustworthiness forces Catherine to voice her own doubts—though
    neither woman fully commits to the idea that Frances could be dangerous. Their
    exchange reveals a shared but unspoken fear that Frances’ connection to Tommy
    Lee Royce might be real, despite its seeming absurdity. The tension escalates
    when the action shifts to St. Marks Junior School, where Mrs. Beresford abruptly
    removes Frances from her one-on-one sessions with Ryan. The decision, framed as
    a routine feedback exercise, is clearly a direct consequence of Catherine’s earlier
    confrontation at the school. Frances’ reaction—lingering on her face as she processes
    the implication—confirms that Catherine’s suspicions have triggered a professional
    consequence. The moment marks a critical escalation: Catherine’s investigation
    is no longer abstract; it has tangible, immediate stakes for Frances’ access to
    Ryan, and by extension, Tommy Lee Royce’s manipulative reach. The scene underscores
    the power dynamics at play—Catherine’s authority as a police officer clashing
    with Frances’ desperate, delusional mission—while foreshadowing the inevitable
    confrontation between the two women over Ryan’s safety.'
