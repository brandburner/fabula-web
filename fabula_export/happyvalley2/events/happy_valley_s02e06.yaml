  - object_uuid: ger_object_b16e7f614143
    description_of_involvement: Alison’s execution shotgun is the silent witness to
      the crime that unravels in this scene. Left abandoned on the sink, its barrel
      still warm, its stock smeared with blood and brain matter, it is the physical
      manifestation of Alison’s guilt. Catherine spots it as she checks Alison’s pulse,
      her eyes flickering over the gore-splattered weapon before returning to the
      task at hand. The shotgun is not just evidence; it is a symbol of the violence
      that has torn this family apart. Its presence looms over the scene, a reminder
      that this is not just a medical emergency but a murder investigation. When Catherine
      radios in about the red Peugeot, the shotgun becomes part of a larger narrative—one
      that ties Daryl’s death to Tommy Lee Royce’s criminal network.
    status_before_event: Loaded, recently fired, lying on the sink, covered in blood
      and gore.
    status_after_event: Secured as evidence by Shafiq Shah, tagged for CSI analysis,
      its role in the crime now documented.
    global_id: ger_object_b16e7f614143
  - object_uuid: ger_object_50e03ca35342
    description_of_involvement: Catherine Cawood’s handheld police radio is her lifeline
      to the system, the tool that keeps her connected to the world beyond Far Sunderland
      Farm. Clutched in her hand, its static-filled voice crackling with updates from
      dispatch, it is the embodiment of institutional support. She uses it to call
      for backup, report the red Peugeot, and coordinate the arrival of CID and CSI.
      The radio is not just a communication device; it is a symbol of her dual role—as
      a police officer bound by duty and as a human being driven by compassion. When
      she radios in the Peugeot’s details, she crosses a threshold, shifting from
      crisis management to criminal investigation. The radio’s voice is the counterpoint
      to the paramedic’s, a reminder that this scene is not just about saving a life
      but about solving a crime.
    status_before_event: Attached to Catherine’s belt, fully charged, unused.
    status_after_event: Clutched in Catherine’s hand, battery draining from prolonged
      use, still transmitting updates.
    global_id: ger_object_50e03ca35342
  - object_uuid: ger_object_ea4ed1c76f26
    description_of_involvement: Catherine’s SOCO gloves are the thin barrier between
      her and the crime scene, a physical and psychological divide. She pulls them
      on with practiced efficiency, the latex snapping into place as she kneels beside
      Alison. The gloves allow her to touch Alison without contaminating the evidence,
      to induce vomiting without leaving her own fingerprints at the scene. They are
      a reminder that, even in the midst of a medical emergency, Catherine is first
      and foremost a police officer. The gloves also symbolize her professionalism,
      her ability to compartmentalize her emotions and focus on the task at hand.
      When she holds Alison’s hand, the gloves are a stark contrast to the warmth
      of her touch, a reminder that this moment is as much about justice as it is
      about compassion.
    status_before_event: Folded in Catherine’s pocket, unused.
    status_after_event: Worn, slightly soiled from inducing vomiting, later removed
