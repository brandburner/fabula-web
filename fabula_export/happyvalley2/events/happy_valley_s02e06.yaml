  description: Under the dual pressures of a medical emergency and Catherine’s relentless
    interrogation, Alison Garrs—disoriented from a diazepam, whisky, and vodka overdose—collapses
    outside Far Sunderland Farm. Catherine, balancing the urgency of preserving a
    crime scene with saving Alison’s life, forces her to vomit to counteract the overdose
    while simultaneously pressing for answers about her son Daryl’s death. Alison’s
    fragmented, delirious responses initially suggest denial, but as Catherine persists,
    Alison abruptly admits, ‘I shot Daryl,’ in a moment of raw, unfiltered confession.
    The revelation is triggered not just by Catherine’s questioning but by Alison’s
    own physical collapse and the sight of the red Peugeot—a vehicle tied to Operation
    Syracuse—reinforcing the farm’s connection to Tommy Lee Royce’s violent network.
    Catherine, stunned, hesitates before formally arresting Alison, her professional
    duty clashing with the human cost of the moment. The confession shifts the investigation’s
    trajectory, linking Daryl’s murder to broader criminal operations and deepening
    the farm’s role in the unfolding conspiracy. The scene underscores Catherine’s
    moral and emotional burden as she enforces justice while grappling with the depravity
    of those around her, including Alison’s desperate act of maternal violence.
