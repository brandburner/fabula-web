      uncover the truth about her identity or her grooming of Ryan.
    - Find validation for her actions, even from an adversary, to justify her delusional
      loyalty to Royce.
    what_happened: 'Frances steps out of the taxi with the wariness of someone who
      knows she is being watched. When Catherine knocks, she tries to shut the door
      immediately, her body language screaming terror—her smaller stature and frantic
      movements contrast sharply with Catherine’s imposing calm. Catherine’s reassurances
      (‘I know you’ve never had a criminal record’) briefly pause her panic, but her
      hesitation reveals a fractured psyche: she wants to believe Catherine’s offer
      of understanding, yet fears the consequences of letting her in. Her eventual
      compliance is not surrender but a calculated risk, driven by a desire to justify
      her actions to someone who might—just might—understand her devotion to Royce.'
