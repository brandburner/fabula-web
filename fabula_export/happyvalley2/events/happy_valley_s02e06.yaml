  global_id: null
  title: Catherine corners John in a deadly chase
  description: John Wadsworth flees the police station in a panic after Catherine
    Cawood confronts him, his erratic driving nearly causing a collision as he attempts
    to escape. Catherine pursues him on foot, banging on his car window and shouting
    in frustration, but he reverses recklessly into traffic. With no viable escape
    route, John is forced into a dead-end alley near the railway station. Catherine,
    realizing his desperation, flags down a patrol car and radios in a frantic but
    damning accusation—implicating John in Vicky Fleming’s murder. The scene escalates
    from a personal confrontation to a full-blown police pursuit, exposing John’s
    guilt and forcing Catherine to take drastic action to stop him. The moment marks
    a turning point in the investigation, as Catherine’s suspicions are confirmed
    and John’s complicity in the crime is laid bare, setting the stage for his eventual
    suicide and the unraveling of Tommy Lee Royce’s influence over the case.
