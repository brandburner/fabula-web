  - character_uuid: ger_agent_eba286353a62
    emotional_state: A fractured state of guilt and terror, his emotions teetering
      between remorse for his actions and sheer survival instinct. He is a man pushed
      to the brink, his usual composure shattered by the consequences of his crimes.
    goals:
    - Escape Catherine’s pursuit to avoid facing the consequences of Vicky Fleming’s
      murder.
    - Avoid confrontation with the truth of his actions, even as his guilt threatens
      to consume him.
    what_happened: John Wadsworth flees in a panic along the railway tracks, his movements
      erratic and desperate as he crashes through foliage toward the viaduct. His
      actions reflect a man unraveling under the weight of guilt over Vicky Fleming’s
      murder, his panic amplifying the danger of the chase. He is physically disheveled,
      his breathing labored, and his focus solely on escape—until Catherine’s relentless
      pursuit corners him at the viaduct’s edge.
    observed_status: John Wadsworth flees in a panic along the railway tracks, his
