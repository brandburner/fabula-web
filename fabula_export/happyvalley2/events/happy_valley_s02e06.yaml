- fabula_uuid: act_6272caf4e6e33155
  number: 2
  summary: 'Following the horrific discovery at Far Sunderland Farm, the H-MIT office
    buzzes with activity, reassessing the Vicky Fleming murder. John Wadsworth, visibly
    unsettled by the news that Daryl Garrs did not commit the Vicky Fleming murder,
    begins to exhibit heightened anxiety, his internal struggle palpable. His colleagues,
    including Jodie, discuss the possibility of an "inside" killer, unknowingly intensifying
    John''s panic. Concurrently, Mike delivers crucial intelligence to Catherine:
    Tommy Lee Royce''s Scottish visitor is Frances Drummond, a pharmacist who has
    stolen the identity of a deceased teaching assistant, Cecily Wealand, to gain
    access to Ryan. Catherine, now fully aware of Frances''s calculated deception,
    informs Clare, who expresses profound concern for Ryan''s safety. Detectives swiftly
    move to arrest Frances at school for fraud by false representation, a moment of
    public humiliation for her but a vindication of Catherine''s instincts. Later,
    Catherine, dressed in plain clothes, confronts Frances at her home. She attempts
    to break through Frances''s delusional infatuation with Tommy, revealing the brutal
    truth of Tommy''s crimes against her daughter, Becky, and his psychopathic nature.
    Frances, however, remains steadfast in her belief in Tommy''s innocence and their
    impending marriage, shocking Catherine. The news reports on the farm discovery,
    further highlighting the ongoing search for Vicky Fleming''s killer, pushes John
    to a breaking point, culminating in a public, hysterical outburst in his car.
    The act concludes with Neil Ackroyd, Clare''s partner, revealing to Catherine
    that he knew Vicky Fleming, who blackmailed him years prior, providing a vital
    new lead in the investigation and inadvertently tightening the net around John.'
