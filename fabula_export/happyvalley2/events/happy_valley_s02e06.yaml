  object_involvements:
  - object_uuid: ger_object_930b98825fc4
    description_of_involvement: The empty diazepam packs are the most damning evidence
      of Alison Garrs’ suicide attempt. Scattered across the kitchen floor like confetti
      at a funeral, they are the physical proof of her intent to die. Catherine spots
      them as she kneels beside Alison, her gloved fingers brushing against the crumpled
      blister packs. The diazepam is the linchpin of the overdose, the drug that pushed
      Alison over the edge. Its presence is a stark reminder that this is not just
      a crime scene but a suicide scene, a place where a mother tried to erase herself
      after erasing her son. The packs are also critical for toxicology reports, their
      emptiness a testament to Alison’s desperation.
    status_before_event: Full, placed on the kitchen table, later scattered as Alison
      collapses.
    status_after_event: Empty, secured as evidence, counted and logged for toxicology
      analysis.
    global_id: ger_object_930b98825fc4
  - object_uuid: ger_object_583de0d1fb57
    description_of_involvement: 'The empty whisky bottle is another piece of the puzzle
      in Alison Garrs’ overdose. It rests beside the vodka bottle, its label smudged
      with fingerprints, its contents long since consumed. Like the vodka, it is a
      symbol of Alison’s desperation, her attempt to drown her sins in alcohol. When
      Catherine sees it, she understands the gravity of the situation: Alison didn’t
      just take a few pills; she drank herself into a stupor, mixing substances in
      a deadly cocktail. The whisky bottle is also a forensic clue, its fingerprints
      and residue potential evidence in the murder investigation. It is a silent witness
      to the unraveling of a mother’s mind, a physical record of her descent into
      madness.'
    status_before_event: Half-empty, placed on the kitchen table, fingerprints visible.
    status_after_event: Secured as evidence, its contents and prints analyzed for
      toxicology and fingerprint matching.
    global_id: ger_object_583de0d1fb57
  - object_uuid: ger_object_9f971013fda5
    description_of_involvement: The empty vodka bottle is a grim testament to Alison
      Garrs’ desperate attempt to escape her guilt. It sits on the kitchen table,
      its glass surface catching the light, a silent accuser amid the carnage. The
      bottle is not just a prop; it is a narrative device, a physical manifestation
      of Alison’s self-destruction. When Catherine spots it, she understands the full
      extent of Alison’s overdose—the diazepam, the whisky, and now the vodka, a lethal
      cocktail designed to erase her from the world. The bottle’s emptiness is a metaphor
      for Alison’s own hollowed-out state, her love for her son twisted into something
      monstrous. It is also critical evidence, linking her to the crime scene and
      her attempted suicide.
    status_before_event: Full, uncapped, placed on the kitchen table beside Alison.
    status_after_event: Empty, secured as evidence, its contents analyzed for toxicology
      reports.
    global_id: ger_object_9f971013fda5
  - object_uuid: ger_object_cf4ddb64d007
    description_of_involvement: Alison’s lethal cocktail of diazepam, whisky, and
