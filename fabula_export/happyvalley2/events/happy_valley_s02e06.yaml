  - 'CATHERINE: Odd. The other day. Talking to Alison in the hospital.'
  - 'CATHERINE: She told me her story. You know—her dad. He interfered with her. Daryl
    was his son, not his grandson. She brought up this kid, this child, this aberration.
    That she loved and hated. Because... what else could she do. And she was terrified
    of him finding out, so... she tried to stop him bothering with the local lads.
    So they picked on him. And they knew anyway. Somehow. So they became like... outcasts,
    pariahs. Something to poke fun at.'
  - 'CATHERINE: Did he ever know? And she said she thought he’d worked it out. Although
    they never talked about it. She said, ‘Because I never had the language.’ I said,
    ‘Yeah.’ I know.'
