  global_id: null
  title: Catherine confronts farmhouse carnage
  description: 'Catherine Cawood and PC Shafiq Shah arrive at Far Sunderland Farm
    to discover a scene of brutal violence: Daryl Garrs lies dead from a shotgun wound
    to the back of his head, his body slumped across a blood-splattered table, while
    his mother, Alison, clings to life after a near-fatal overdose of alcohol and
    Diazepam. The kitchen is a grotesque tableau of violence—blood and brain matter
    coating the walls, ceiling, and door—indicating a murder-suicide attempt. Catherine
    immediately shifts into crisis mode, prioritizing Alison’s survival over preserving
    the crime scene. She radios for urgent medical and forensic support, directs Shaf
    to secure the scene, and attempts to extract information from Alison, who is barely
    conscious but visibly traumatized. The discovery forces Catherine into a high-stakes
    balancing act: stabilizing a dying woman while confronting the escalating brutality
    of Tommy Lee Royce’s influence. The scene underscores the fragility of those caught
    in Royce’s web and the moral compromises Catherine must make to protect the vulnerable,
    even as the investigation into Vicky Fleming’s murder takes a darker turn. The
    visceral horror of the farmhouse serves as a stark reminder of the human cost
    of Royce’s manipulations and the lengths to which his followers will go to fulfill
    his twisted desires.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e06
  scene_sequence: 12
  sequence_in_scene: 17
  key_dialogue: &id011
  - 'CATHERINE: Alison? Alison? Can you hear me? Alison, it’s Catherine Cawood. Sergeant
    Cawood.'
  - 'CATHERINE: Alison, listen love, listen to me - (nothing. CATHERINE turns to SHAF)
    - I want you to squeeze my hand if you can hear me.'
  - 'CATHERINE: (struggling) Man up, Princess. Use your initiative.'
  - 'ALISON: (seeing DARYL) Oh - ! (becomes tearful, overwhelmed by the sight of her
    son''s body)'
  - 'CATHERINE: (on radio) Bravo November four-five. Urgent assistance required. Far
    Sunderland Farm up Wainstalls, on Cold Edge Road. I need an ambulance, there’s
    a forty-something woman - Alison Garrs - suspected overdose. Diazepam, not sure
    how many, and it looks like she’s washed ‘em down with vodka and whisky. Her pulse
    is weak, she’s conscious and breathing. There’s also a male. I’m fairly certain
    it’s her son, Daryl Garrs. Fatal shotgun injury to the back of his head. Possible
    weapon at the scene.'
