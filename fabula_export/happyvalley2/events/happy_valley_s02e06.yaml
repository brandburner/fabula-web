  - object_uuid: ger_object_03be5b91952b
    description_of_involvement: Shafiq’s blanket is a thin but vital layer of comfort
      in the midst of chaos. Fetched from the police van, it is draped over Alison’s
      shivering body as she collapses into agonizing cramps. The blanket traps her
      body heat, steadying her as Catherine grips her hand and delivers the arrest.
      It is a small mercy in an otherwise brutal scene, a reminder that even in the
      face of violence and death, there is still room for humanity. The blanket is
      also a practical tool, helping to stabilize Alison’s core temperature and prevent
      hypothermia as her body fights the overdose. Its presence is a silent acknowledgment
      of Alison’s suffering, a gesture of compassion that contrasts sharply with the
      cold reality of the crime scene.
    status_before_event: Folded in the police van, unused.
    status_after_event: Drape over Alison’s shoulders, slightly soiled from contact
