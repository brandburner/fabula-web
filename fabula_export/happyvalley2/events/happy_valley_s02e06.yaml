  title: Andy plants seeds of paranoia in Jodie
  description: "\n  Andy and Jodie discuss the Vicky Fleming case, with Andy pushing\
    \ the unsettling theory that the killer might be someone within their own team.\
    \ He reveals that Vicky’s phone contained John Wadsworth’s number, suggesting\
    \ a possible connection to the investigation. Jodie, initially dismissive, grows\
    \ increasingly uneasy as Andy forces her to confront the possibility that anyone—even\
    \ a colleague—could be capable of such violence. The conversation leaves Jodie\
    \ unsettled, her trust in the team shaken, while John Wadsworth, overhearing fragments,\
    \ reacts with growing panic. The exchange serves as a calculated manipulation\
    \ by Andy, exploiting Jodie’s vulnerability to sow distrust and pressure her into\
    \ questioning those around her, including John. This moment deepens the narrative\
    \ tension by framing the investigation as a potential internal threat, while also\
    \ foreshadowing John’s eventual unraveling.\n  "
  episode_uuid: ep_sea_ser_happy_valley_s02_e06
  scene_sequence: 21
  sequence_in_scene: 33
  key_dialogue:
  - 'ANDY: "I’m looking at who’s here... all doing their jobs. And I’m thinking about
    everybody there, everybody on the team, my team, in the office. Might not be a
    man! Which one of ‘em would do that? Which one of ‘em’d be capable of it?"'
  - 'ANDY: "Vicky Fleming had John Wadsworth’s number on her mobile. He accounted
    for it. He did an investigation at the building society three years ago when he
    was with the economic crime unit, and it isn’t even like the number was ever used.
    But people use secret shagging phones, don’t they? That they could destroy. In
    a fire."'
  - 'JODIE: "Well there are other explanations." ANDY: "Yes. But. Address the question."'
