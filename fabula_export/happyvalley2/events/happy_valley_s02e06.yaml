- fabula_uuid: cand_evt_scene_81b0d663d6f78bb7_01
  global_id: null
  title: Catherine and Clare question Frances’ innocence
  description: 'In Catherine’s kitchen, Clare’s lingering unease about leaving Ryan
    with Frances forces Catherine to confront her own doubts about the woman’s true
    intentions. Catherine initially dismisses Frances as naive and harmless, but Clare’s
    cautious reminder—‘Poison comes in little bottles’—exposes the unspoken fear that
    Frances’ apparent innocence might mask something far more sinister. The exchange
    reveals a shared but unspoken suspicion: could Frances, despite her meek demeanor,
    be connected to Tommy Lee Royce? The tension escalates when Catherine’s attempt
    to rationalize the coincidence of Frances visiting Royce in prison (‘Surely. Surely.’)
    fails to convince either of them, leaving the threat to Ryan’s safety hanging
    unresolved. Meanwhile, at St. Mark’s Junior School, Frances’ sudden exclusion
    from one-on-one sessions with students—orchestrated by Mrs. Beresford—signals
    that Catherine’s investigation is already having tangible consequences, further
    raising the stakes in the silent battle between the two women. The scene underscores
    the growing paranoia and the fragility of trust as the women grapple with the
    possibility that Frances is not who she seems.'
