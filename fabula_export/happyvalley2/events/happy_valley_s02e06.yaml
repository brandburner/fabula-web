  title: Mrs. Beresford deflects with Ryan’s progress
  description: 'Outside St. Marks Junior School, Catherine Cawood confronts Mrs. Beresford
    about the urgent need to address Ryan’s father—Tommy Lee Royce—whose violent legacy
    looms over the boy’s safety. Catherine, visibly distressed, admits the moral dilemma
    of how to explain Ryan’s conception to him: either the brutal truth of his mother’s
    rape or a sanitized version that would betray the reality of Royce’s monstrous
    nature. Mrs. Beresford, initially sympathetic, hesitates before abruptly shifting
    the conversation to Ryan’s recent academic improvements, praising his progress
    in reading and writing. The deflection is subtle but deliberate, a calculated
    move to avoid the harder truths while offering superficial reassurance. The exchange
    underscores the institutional tension between addressing systemic threats (Royce’s
    influence) and the performative optimism of school-based support. Catherine’s
    frustration lingers unspoken, highlighting the gap between institutional care
    and the deeper, unresolved dangers Ryan faces.'
