  title: Catherine confronts Frances Drummond’s fabricated identity
  description: In Mike’s office, Catherine examines a security photo of the woman
    she knows as Miss Wealand—Frances Drummond—visiting Tommy Lee Royce in prison.
    The revelation that Frances has invented her own identity forces Catherine to
    question the reliability of Mrs. Beresford’s reference checks, deepening her suspicion
    that Frances’s presence near Ryan is part of a calculated, manipulative scheme.
    The discovery triggers Catherine’s emotional distress, as the confirmation of
    Frances’s deception directly ties her to Tommy Lee Royce’s influence, escalating
    the threat to Ryan’s safety. The scene underscores Catherine’s growing paranoia
    and the systemic failure of safeguards meant to protect her grandson, while also
    exposing the fragility of the school’s vetting process. Mike’s blunt assessment—‘she’s
    invented her’—contrasts with Catherine’s lingering doubt, highlighting her reluctance
    to fully accept the extent of Frances’s deception and the danger it poses. The
    moment serves as a turning point, shifting Catherine’s focus from passive concern
    to urgent, proactive investigation into Frances’s true motives and connections
    to Royce’s criminal network.
