  global_id: null
  title: Frances Arrested at St. Marks School
  description: "\n  In Mrs. Beresford’s office at St. Marks Junior School, Frances\
    \ Drummond—posing as teaching assistant Miss Wealand—is abruptly confronted by\
    \ two detectives who arrest her for fraud by false representation. The moment\
    \ unfolds with tense precision: Mrs. Beresford, visibly furious but composed,\
    \ confirms Frances’s deception to the officers while Frances clings to her justification,\
    \ insisting her actions were for Ryan Cawood’s emotional well-being. The detectives\
    \ methodically process the arrest, ignoring her pleas, while Frances’s defiance\
    \ masks her terror. Her repeated invocation of Ryan—‘Think about Ryan’—reveals\
    \ her delusional conviction that her manipulation of him was altruistic, not predatory.\
    \ The scene escalates Catherine Cawood’s investigation into Tommy Lee Royce’s\
    \ influence, as Frances’s arrest exposes the depth of his reach into Ryan’s life.\
    \ The confrontation also forces Mrs. Beresford to confront the fallout of her\
    \ school’s compromised trust, while Frances’s unshaken belief in her mission underscores\
    \ her psychological entanglement with Royce’s cult-like control. The arrest serves\
    \ as a turning point: it removes Frances as an immediate threat to Ryan but confirms\
    \ the broader conspiracy Catherine is unraveling.\n  "
