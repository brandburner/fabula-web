  title: Beresford agrees to monitor Ryan
  description: "\n  In Mrs. Beresford’s office, Catherine Cawood urgently confronts\
    \ the headteacher with evidence that someone at St. Marks Junior School—likely\
    \ the new teaching assistant, Miss Wealand—is manipulating Ryan into viewing Tommy\
    \ Lee Royce as a sympathetic figure. Catherine presents CCTV footage linking Wealand\
    \ to the purchase of a birthday gift left on Ryan’s doorstep with a card claiming\
    \ to be from his father, along with Ryan’s recent behavior at home. Though Beresford\
    \ initially resists the accusation, Catherine’s insistence and the weight of the\
    \ circumstantial evidence—combined with her own professional respect for Beresford—compel\
    \ the headteacher to take action. Beresford agrees to personally supervise Ryan’s\
    \ reading sessions and monitor Wealand’s interactions with him, effectively inserting\
    \ herself as a protective buffer between Ryan and potential manipulation. The\
    \ exchange underscores Catherine’s desperation to shield her grandson while navigating\
    \ the institutional constraints of the school, and it marks a critical shift in\
    \ the school’s role from passive observer to active participant in the investigation.\
    \ The scene also highlights the tension between Catherine’s emotional investment\
    \ and Beresford’s professional skepticism, as well as the broader theme of institutional\
    \ complicity in enabling Royce’s influence.\n  "
