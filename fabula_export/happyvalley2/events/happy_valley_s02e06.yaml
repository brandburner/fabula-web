      groans, Catherine’s commands, and the **crackling radio**. The **chilled air**
      contrasts with the **heat of the crisis**, and the **open sky** feels **oppressive**,
      as if the farm is **cut off from the world**. The **red Peugeot** adds a **sinister
      note**, its **damaged frame** a **visual echo of the violence** that has unfolded.
    functional_role: The **primary site of the medical emergency and confession**,
      serving as a **transition zone** between the **crime scene (interior)** and
