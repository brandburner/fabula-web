      \ overdose. Without their expertise, the narrative of what happened in the kitchen\
      \ would remain incomplete, and the connection to Tommy Lee Royce’s influence\
      \ might be obscured.\n      "
    active_representation: "\n      Through their physical presence at the scene,\
      \ their collection of evidence, and their adherence to forensic protocols. The\
