  title: Ann reveals Wadsworth’s suspicious behavior
  description: 'After a briefing at Norland Road Police Station, Ann Gallagher hesitantly
    approaches Catherine Cawood to share her concerns about John Wadsworth’s erratic
    behavior during a house-to-house investigation weeks earlier. She describes his
    furtive phone calls and desperate request for £1,000, suggesting he may be involved
    in blackmail—possibly tied to Vicky Fleming’s disappearance. Before Catherine
    can fully process this, Joyce interrupts to inform her that Graham Tattersall
    is waiting to speak with a detective, creating an immediate conflict: Catherine
    must now decide whether to prioritize Ann’s insider suspicions or the urgent external
    lead. The scene underscores the erosion of institutional trust as Catherine’s
    professional duty clashes with her personal loyalty to a colleague, setting up
    a critical turning point in the investigation. Ann’s revelation forces Catherine
    to confront the possibility that the killer could be someone within the police
    force, while the abrupt shift to Graham Tattersall’s arrival introduces a new
    variable that could either corroborate or contradict Ann’s suspicions. The tension
    lies in Catherine’s reluctance—she knows Ann’s claims lack concrete evidence,
    yet the pattern of behavior is damning. This moment marks the beginning of her
    institutional distrust, where the line between ally and suspect blurs, and her
    focus on protecting Ryan must now compete with uncovering the truth, no matter
    the cost to her colleagues or the force itself.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e06
  scene_sequence: 38
  sequence_in_scene: 62
  key_dialogue: &id037
  - 'ANN: Sorry, this is... probably mad. But when we were doing house-to-house. Weeks
    ago. Me and John Wadsworth. And I’m not just saying this because he stood me up.
    He was never off his phone, making these furtive phone calls. And I remember saying
    to Shaf, ‘He’s having an affair.’ And then like... a couple of days later. Week
    after my mother died. He was asking me how he could get his hands on a thousand
    pounds. And he looked like shit. And I know they’re all busy thinking outside
    the box. But the fact does remain it’d make a lot more sense if it was someone
    inside the investigation. I mean like he was being blackmailed.'
  - 'JOYCE: Catherine. There’s a fella. I’ve put him in there— (she nods in the direction
    of another room) Graham Tattersall.'
  - 'ANDY: He says he’s got some information, wants to talk to a detective, but they
    must still be in the briefing upstairs ‘cos nobody’s answering the phone and he’s
    itching to get off to work. Could you—?'
