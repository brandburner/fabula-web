  title: Ann reveals Wadsworth’s suspicious behavior
  description: After the briefing, Ann Gallagher hesitates before confiding in Catherine
    Cawood about John Wadsworth’s erratic behavior during a house-to-house investigation
    weeks earlier—furtive phone calls and a desperate plea for £1,000 shortly after
    her mother’s death. Ann’s suspicion that Wadsworth might be blackmailed (or worse,
    involved in the Fleming case) hangs in the air as Joyce interrupts to announce
    Graham Tattersall’s arrival with urgent information. Catherine, torn between professional
    loyalty and mounting evidence, reluctantly agrees to speak with Tattersall, marking
    a critical shift from internal suspicion to external corroboration. The abrupt
    transition underscores the escalating pressure on Catherine to act despite the
    personal cost of implicating a colleague.
  episode_uuid: ep_sea_ser_happy_valley_s02_e06
  scene_sequence: 38
  sequence_in_scene: 61
  key_dialogue: &id035
  - 'ANN: Sorry, this is... probably mad. But when we were doing house-to-house. Weeks
    ago. Me and John Wadsworth. And I’m not just saying this because he stood me up.
    He was never off his phone, making these furtive phone calls. And I remember saying
    to Shaf, ‘He’s having an affair.’ And then like... a couple of days later. Week
    after my mother died. He was asking me how he could get his hands on a thousand
    pounds. And he looked like shit. And I know they’re all busy thinking outside
    the box. But the fact does remain it’d make a lot more sense if it was someone
    inside the investigation. I mean like he was being blackmailed.'
  - 'JOYCE: Catherine. There’s a fella. I’ve put him in there—Graham Tattersall.'
  - 'ANDY: He says he’s got some information, wants to talk to a detective, but they
    must still be in the briefing upstairs ‘cos nobody’s answering the phone and he’s
    itching to get off to work. Could you—?'
