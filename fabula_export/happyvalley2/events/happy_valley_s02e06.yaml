  global_id: null
  title: Frances rejects Catherine’s evidence of Tommy’s crimes
  description: In Frances Drummond’s sparse, religiously adorned sitting room, Sergeant
    Catherine Cawood attempts a measured but urgent confrontation to dismantle Frances’s
    delusional belief in Tommy Lee Royce’s redemption. Catherine methodically lists
    Tommy’s documented crimes—rape, murder, and attempted murder—while Frances clings
    to a narrative of childhood trauma and inherent goodness, dismissing forensic
    evidence and court verdicts as distortions. The exchange escalates as Catherine
    exposes Frances’s grooming, her age disparity with Tommy, and the psychological
    manipulation at play, but Frances remains defiant, insisting she sees no evil
    in Tommy’s eyes. The scene underscores Frances’s deep denial, her complicity in
    shielding a predator, and Catherine’s growing desperation to protect Ryan from
    Tommy’s influence. The tension peaks when Frances accuses Catherine of jealousy,
    revealing her emotional investment in Tommy’s narrative. The confrontation ends
    unresolved, with Frances’s delusion intact and Catherine’s warnings unheeded,
    setting up Frances’s eventual arrest and the unraveling of her facade.
