    emotional_state: A fragile mix of distrust and desperate longing—she wants to
      believe in Catherine’s kindness but is terrified of being manipulated again.
      Her grief is raw, her mental state precarious, and Catherine’s offer feels both
      dangerous and necessary.
    goals:
    - To assess whether Catherine’s offer is genuine or another form of control.
    - To cling to the fragile hope of connection without fully surrendering to vulnerability.
    what_happened: Alison lies in the hospital bed, pale and dejected, attached to
      medical monitors that beep steadily in the quiet room. She is initially uncertain
      whether to trust Catherine, her body language closed off—arms slightly crossed,
      gaze averted. As Catherine speaks, Alison’s expression flickers with a mix of
      wariness and reluctant curiosity, her fingers twitching slightly as if resisting
      the urge to reach out.
    observed_status: Alison lies in the hospital bed, pale and dejected, attached
      to medical monitors that beep steadily in the quiet room. She is initially uncertain
