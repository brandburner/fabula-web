  global_id: null
  title: Catherine exposes Frances’s identity fraud
  description: 'In Mike’s office, Catherine reveals the devastating truth about Frances
    Drummond’s identity fraud—she impersonated a deceased woman, Cecily Wealand, to
    gain access to Tommy Lee Royce in prison. The discovery exposes Frances’s grooming
    by Royce and her reckless devotion to him, despite her otherwise unblemished professional
    record. Mike immediately mobilizes an arrest team for Frances while Catherine
    contacts the prison liaison to warn them about Royce’s manipulative influence.
    The scene underscores the corrosive reach of Royce’s control, the fragility of
    trust in Catherine’s professional circle, and the urgent need to protect Ryan
    from further threats. Catherine’s emotional reaction—calling the situation ‘sad’—hints
    at her conflicted feelings: professional duty clashes with personal dismay over
    how a respected colleague could be so thoroughly exploited. The moment marks a
    critical escalation in the investigation, as Frances’s arrest becomes inevitable,
    and Royce’s network of influence is further exposed.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e06
  scene_sequence: 19
  sequence_in_scene: 30
  key_dialogue:
  - 'CATHERINE: So Cecily Wealand. Was her sister. Forty-eight years old, she had
    a stroke nine months ago. Her partner, her husband, thinks when she died—he was
    in pieces, and Frances helped with a lot of practical stuff—and he thinks that’s
    when she might have got her hands on various bits of personal documentation.'
  - 'CATHERINE: Then I’ll get onto the prison liaison officer. They need to let Gravesend
    know he’s been grooming this woman. Sad. Isn’t it? No criminal record. She’s held
    down a perfectly respectable job for upward of fifteen years. Then—she does this
    mad thing. And for what? Forty-five minutes once a fortnight with a psychopath.'
  - 'MIKE: Right—let’s send ‘em in to make the arrest. Have you got a number for this
    Mrs. Beresford? I’ll ring her and warn her they’re coming.'
