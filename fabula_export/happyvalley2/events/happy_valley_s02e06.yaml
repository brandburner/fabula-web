  global_id: null
  title: Catherine Exposes Tommy’s Crimes to Frances
  description: 'Catherine Cawood enters Frances Drummond’s home with calculated restraint,
    noting the absence of Tommy Lee Royce’s and Ryan’s photos—a deliberate erasure
    hinting at Frances’s shifting allegiance. She frames her approach as empathetic,
    aiming to rebuild trust by acknowledging Frances’s perceived good intentions.
    Frances, however, remains defensive, insisting on Tommy’s innocence and their
    engagement. Catherine methodically dismantles Frances’s delusions by listing Tommy’s
    documented crimes—rape, murder, and attempted murder—while Frances clings to a
    narrative of redemption, insisting Tommy is a product of trauma, not evil. The
    confrontation escalates as Catherine exposes Frances’s grooming, her age disparity
    with Tommy, and the psychological manipulation at play. Frances, though shaken,
    doubles down on her belief in Tommy’s goodness, revealing the depth of her infatuation
    and denial. The scene culminates in Catherine’s blunt warning: Frances’s scales
    will eventually fall, exposing the damage Tommy has inflicted. The exchange underscores
    the moral decay at the heart of the narrative, with Frances’s refusal to accept
    the truth positioning her as both a victim and an unwitting accomplice in Tommy’s
    schemes.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e06
  scene_sequence: 26
  sequence_in_scene: 43
  key_dialogue:
  - 'FRANCES: We’re getting married.'
  - 'CATHERINE: He’s a sex offender. He raped my daughter.'
  - 'FRANCES: He was very fond of your daughter.'
  - 'CATHERINE: Tommy Lee Royce is a psychopath. He’s a murderer and he’s a sex offender.
    And you must know—you must realise—that I think you have allowed yourself to be
    deluded by this dangerous man because you’re infatuated with him.'
  - 'FRANCES: I believe that no-one is born evil. He may have done things... but we
    all do that, we’re all human. But he isn’t evil. He’s a product of his childhood...
    With help—and kindness—I believe he will become the person he was always capable
    of being. Good and kind and gentle and thoughtful.'
  - 'CATHERINE: He’s using you. He’s used you. To get close to Ryan. He’s groomed
    you. You’ve been groomed. You’ve been picked, you’ve been chosen, for what he
    can get out of you.'
  - 'CATHERINE: On the inside... he looks exactly like them. And one day... the scales
    will fall away from your eyes. Because they always do. And you’ll realise how
    foolish he’s made you look. And how much damage he’s inflicted on you.'
