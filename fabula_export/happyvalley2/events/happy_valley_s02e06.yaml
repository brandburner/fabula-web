  description: Catherine Cawood arrives at St. Marks Junior School with Ryan, her
    expression betraying a calculated determination beneath her casual demeanor. She
    fabricates a pretext—arranging a police dog visit—to justify entering the school,
    a clear violation of protocol. Her insistence on accompanying Ryan inside, despite
    his skepticism, reveals her desperation to investigate Frances Drummond’s influence
    over Ryan’s environment. The scene underscores Catherine’s growing paranoia and
    her willingness to bend the rules, risking professional consequences for her personal
    mission. Ryan’s indifference ('Great.') contrasts sharply with Catherine’s intensity,
    highlighting the emotional distance between them and the unspoken tension driving
    her actions. The moment serves as a turning point, marking Catherine’s active
    infiltration of Ryan’s world to counter Royce’s manipulative reach, while also
    foreshadowing the potential fallout of her deception.
