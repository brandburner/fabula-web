  title: Alison confesses to murder after overdose
  description: "\n  Outside Far Sunderland Farm, Catherine Cawood struggles to keep\
    \ Alison Garrs conscious after she collapses from a self-induced overdose of diazepam,\
    \ whisky, and vodka. As Alison drifts in and out of coherence, Catherine urgently\
    \ coordinates medical assistance while extracting a critical confession: Alison\
    \ admits to shooting her own son, Daryl. The revelation is triggered when Catherine\
    \ notices the red Peugeot—a vehicle tied to Operation Syracuse—parked nearby,\
    \ implying Daryl’s involvement in Tommy Lee Royce’s criminal network. Catherine’s\
    \ professional duty clashes with her empathy as she performs a half-hearted arrest,\
    \ cautioning Alison while still holding her hand, underscoring the moral weight\
    \ of enforcing justice on a broken woman. The moment exposes the farm’s deeper\
    \ ties to Royce’s operations and forces Catherine to confront the human cost of\
    \ her investigation.\n  "
