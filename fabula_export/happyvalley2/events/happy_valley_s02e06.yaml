  key_dialogue:
  - 'FRANCES: We’re getting married.'
  - 'CATHERINE: Tommy Lee Royce is a psychopath. He’s a murderer and he’s a sex offender.
    And you must know - you must realise - that I think. That you. Have allowed yourself
    to be deluded by this dangerous man because you’re infatuated with him.'
  - 'FRANCES: I believe that no-one is born evil. He may have done things, I know
    he’s done things, and yes, he will inevitably have put his own slant on it all
    and made it seem not as bad as it might really have been. But we all do that,
    we’re all human. But. He isn’t evil. He’s a product of his childhood, and he had
    an awful childhood. But he isn’t intrinsically evil. We condemn the sin, not the
    sinner.'
  - 'CATHERINE: He’s using you. He’s used you. To get close to Ryan. He’s groomed
    you. You’ve been groomed. You’ve been picked, you’ve been chosen, for what he
    can get out of you.'
  - 'FRANCES: You’re jealous.'
