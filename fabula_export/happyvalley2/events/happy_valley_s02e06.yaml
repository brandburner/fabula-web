- fabula_uuid: cand_evt_scene_637e070e6d64d1dc_02
  global_id: null
  title: John’s Suicide and Catherine’s Collapse
  description: 'On the viaduct, John Wadsworth—already confessing to Vicky Fleming’s
    murder—spirals into self-loathing, his hands shaking as he grapples with the horror
    of his own violence. Catherine Cawood, attempting crisis intervention, mirrors
    his suicide training advice back to him, creating a fragile moment of connection.
    John, momentarily calmed, sits down on the bridge’s edge, but his despair proves
    irreversible: he lets himself fall backward, plummeting to his death on Station
    Road below. The impact is immediate and brutal—Jodie and Andy confirm his death
    while Catherine, frozen in shock, watches from above. When Gorkem finds her, she’s
    visibly shattered, her decades of experience failing to shield her from the visceral
    trauma of witnessing a colleague’s suicide. The event marks the climax of John’s
    arc, his final act of self-destruction, and a turning point for Catherine, whose
    emotional resilience is tested to its limit.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e06
  scene_sequence: 58
  sequence_in_scene: 84
  key_dialogue: &id059
  - 'JOHN: I didn’t mean to kill her, I didn’t go in there to kill her, it just -
    And so I did this ridiculous thing. To her. And God knows... That’s not me. That’s
    - not what I’m like. I’m not - I’m not a monster, I never have been.'
  - 'CATHERINE: You were blackmailed. It was provocation. That’s mitigating circumstances.
    And it sounds to me like manslaughter. Ten years - less - and you and me both
    know you could be out.'
  - 'JOHN: You should be telling me... that you’re here to make sure that I get out
    of this alive. You should use my name a lot. You’ve got to be assertive. Reassuring.
    Empathetic. Kind. And you’ve... got to listen. You’ve got to be a good listener.
    And... you tell them that even though they can’t see a way forward. You can. There
    are options other than this one. And that in twenty-four hours time, it’ll all
    seem very different. To what it might look like now. But you see... it won’t.
    This can only get worse.'
  - 'CATHERINE: Look. I’ll tell you what. John. You take your time, and I’ll just
    - I’ll just stand here. Okay? I’m not going anywhere. All right? I’ll just listen.
    Or I’ll talk. Whichever you prefer. John. You tell me.'
