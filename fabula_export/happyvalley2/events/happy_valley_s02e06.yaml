  key_dialogue:
  - 'GRAHAM: I’ve been having—a—in a—having a—relationship. With... a lady. She’s
    married. I’m married. But. And her husband was having an affair with someone else.
    But. Anyway, he was away from home one night.'
  - 'CATHERINE: So... sorry, you think. This bloke might have something to do with
    Vicky Fleming. Because he caught you in bed with his wife at one in the morning.'
  - 'GRAHAM: Yes. ... John Wadsworth.'
