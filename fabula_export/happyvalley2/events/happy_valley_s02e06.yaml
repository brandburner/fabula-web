  title: Beresford isolates Frances for interrogation
  description: 'Mrs. Beresford deliberately separates Frances from the classroom under
    the pretense of a private conversation, maintaining a controlled distance to avoid
    direct questions. The headteacher’s calculated approach—leading Frances to her
    office while keeping her at arm’s length—signals a shift from passive observation
    to active confrontation. The slightly ajar office door suggests an attempt to
    maintain plausible deniability, as if Beresford is already anticipating the need
    to justify her actions later. This moment marks the transition from Frances’s
    facade of legitimacy as a teaching assistant to the unraveling of her true motives,
    with Beresford positioning herself as the first institutional authority to challenge
    her. The tension lies in the unspoken stakes: Beresford’s actions imply she’s
    either acting on Catherine Cawood’s suspicions or has independently recognized
    Frances’s suspicious behavior, setting up a direct clash between institutional
    authority and Frances’s manipulative agenda tied to Tommy Lee Royce’s influence.'
