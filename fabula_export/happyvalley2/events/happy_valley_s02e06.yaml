  scene_sequence: 18
  sequence_in_scene: 27
  key_dialogue:
  - 'CATHERINE: You’re not gonna believe this, it’s mental. She’s mental.'
  - 'CATHERINE: Well, not Miss Wealand, because Miss Wealand, Cecily Wealand - a qualified
    teaching assistant from Linlithgow - is dead.'
  - 'CATHERINE: She is called Frances Drummond. Also from Linlithgow. A pharmacist.
    God knows, don’t ask. And she visits Tommy Lee Royce in Gravesend and now lives
    in Hebden, as Cecily Wealand.'
  - 'CATHERINE: She’s targeted him. It’s properly creepy, she’s obtained a job she’s
    not qualified for, she’s stolen a dead woman’s identity specifically because this
    woman had the right kind of qualifications to allow her to get close to Ryan so
    she could fill his head with pap about Tommy Lee Royce.'
