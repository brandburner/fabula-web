    pursuit, executes a desperate U-turn at Sowerby Bridge Railway Station. His erratic
    maneuvering—first blocked by an emerging lorry, then reversing too aggressively—results
    in a collision with a parked car, which in turn forces his patrol car directly
    into the path of Catherine and Gorkem’s approaching vehicle. The chain-reaction
    crash halts his escape and thrusts him into an immediate, unavoidable confrontation
    with the law. The moment underscores John’s unraveling mental state and the inevitability
    of his capture, while escalating the tension of the pursuit. The collision also
    serves as a physical manifestation of his guilt, as his reckless actions mirror
    the moral chaos of his recent crimes—particularly the murder of Vicky Fleming—now
    closing in on him.
