    immediately pivots to tasking him with investigating Cecily Wealand—a name linked
    to Tommy Lee Royce’s visitors—using the DIU list. The exchange reveals Catherine’s
    growing paranoia and her willingness to bypass protocol to protect Ryan, while
    Clare’s hesitation underscores the moral ambiguity of Catherine’s methods. The
    scene marks a critical turning point where Catherine’s personal stakes override
    procedural caution, foreshadowing the consequences of her unchecked pursuit of
    the truth.
