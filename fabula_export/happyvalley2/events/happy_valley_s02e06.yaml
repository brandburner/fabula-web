  description: 'The scene opens with a jarring visual: John Wadsworth, a detective
    unraveling under the weight of guilt and Tommy Lee Royce’s psychological manipulation,
    perched precariously on the edge of a bridge outside the Norland Road Police Station.
    His presence there—visible to officers Andy, Jodie, and Ann—immediately signals
    a crisis point, where his desperation has reached a breaking point. The officers’
    visceral reactions (Jodie’s expletive, Ann’s sharp intake of breath) underscore
    the gravity of the moment, as John’s suicide attempt becomes a tangible manifestation
    of the institutional and personal failures that have led him here. This event
    functions as both a climax to John’s arc of self-destruction and a turning point
    for the broader investigation, as his actions force the officers to confront the
    consequences of their own inaction and the depth of Royce’s influence. The scene’s
    tension lies not just in the immediate threat of John’s death, but in what his
    suicide—or survival—will reveal about the corruption and moral compromises that
    have defined the case so far.'
