acts:
- fabula_uuid: act_fc01fd0251cf8767
  number: 1
  summary: 'The episode opens with Sergeant Catherine Cawood initiating her personal
    investigation into Frances Drummond, a teaching assistant at her grandson Ryan''s
    school. Catherine, alongside her sister Clare and nephew Daniel, suspects Frances
    is manipulating Ryan by idealizing his incarcerated father, Tommy Lee Royce. Catherine
    contacts Mike, requesting intelligence on Tommy''s visitors, specifically mentioning
    a potential Scottish connection. She then confronts Mrs. Beresford, Ryan''s headteacher,
    presenting CCTV footage and voicing her grave concerns about Frances''s insidious
    influence, comparing it to grooming. Mrs. Beresford, initially skeptical, agrees
    to monitor Frances and Ryan. Catherine''s suspicions are solidified when she encounters
    Frances at the school, an electric moment confirming her fears. Meanwhile, John
    Wadsworth displays alarming signs of stress and anger at home, foreshadowing his
    eventual unraveling. The narrative takes a dark turn as Catherine and PC Shafiq
    Shah visit Far Sunderland Farm to check on Alison and Daryl Garrs. They discover
    a gruesome murder-suicide scene: Daryl is dead from a shotgun wound to the head,
    and Alison is barely conscious from a severe overdose. Catherine, despite the
    chaos, manages to keep Alison alive and, in a harrowing exchange, extracts a confession:
    Alison shot Daryl. This shocking revelation, coupled with Catherine''s observation
    of Daryl''s damaged red Peugeot, immediately links the scene to Operation Syracuse
    and the series of murders Catherine has been investigating, dramatically escalating
    the stakes for the police force.'
