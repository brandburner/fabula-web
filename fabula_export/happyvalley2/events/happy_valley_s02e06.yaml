  title: Catherine reveals Vicky’s blackmail scheme to John
  description: |2-

      In a tense corridor encounter at the police station, Catherine Cawood casually shares a critical lead in the Vicky Fleming investigation with John Wadsworth—unaware of his direct involvement. She reveals that Neil Ackroyd, her sister’s partner, was blackmailed by Vicky years earlier after she drugged and photographed him, then threatened to expose him unless he paid. The revelation devastates John, who visibly pales as Catherine describes Vicky’s predatory tactics and the ruin they caused. His visceral reaction—first pity for Neil, then sudden realization—exposes his own guilt. The exchange plants seeds for John’s eventual confession while reinforcing Catherine’s investigative tenacity. The moment is a turning point: Catherine’s offhand disclosure becomes the catalyst for John’s unraveling, as he sees his own fate mirrored in Neil’s downfall. The scene’s quiet tension underscores the moral rot beneath the station’s professional facade, with John’s desperation now palpable. Catherine, oblivious to his complicity, leaves him to process the revelation alone, setting the stage for his imminent breakdown.
