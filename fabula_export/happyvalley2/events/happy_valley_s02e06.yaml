  title: Jodie vents workplace sexism while Ann hints at John’s complicity
  description: 'In the back yard of Norland Road Police Station, Jodie and Ann share
    a cigarette and bond over their shared frustrations with institutional sexism.
    Jodie’s rant—laced with bitterness about being underestimated due to her father’s
    rank and the double standards women face—reveals her deep-seated professional
    insecurities. Ann, nodding in agreement, pivots the conversation to the Vicky
    Fleming case, cautiously probing whether Jodie suspects an insider. Jodie’s hesitation
    and reluctance to name John Wadsworth as a suspect underscore her internal conflict:
    she’s professionally suspicious but personally unwilling to believe a colleague
    could be complicit in murder. The scene marks a turning point where Ann’s quiet
    insinuation forces Jodie to confront the uncomfortable possibility that corruption
    may be closer to home than she wants to admit. The tension between personal loyalty
    and professional duty hangs in the air, unresolved but now impossible to ignore.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e06
  scene_sequence: 32
  sequence_in_scene: 53
  key_dialogue:
  - 'JODIE: And. The thing is. Actually. When your dad’s a high ranking officer, if
    anything, it’s a nuisance. Nobody ever believes you’ve ever actually achieved
    anything under your own steam. Hell no. They just think you’re some lightweight
    noo-noo who’s been born with a silver spoon stuck up your backside. So you’ve
    to work twice as hard as any other bugger just to prove that you’re not and weren’t.
    AND. If I was a man. Wouldn’t happen.'
  - 'JODIE: When have you ever heard anyone go, ‘Oh yeah, he slept his way to the
    top.’ No. Obviously no-one ever says that about men because men are intelligent
    and ambitious and hard-working, whereas we only get anywhere in life if we drop
    our knickers and get our assets out.'
  - 'ANN: (mouths it) Are you now looking for someone inside the investigation? As
    regards Vicky Fleming.'
