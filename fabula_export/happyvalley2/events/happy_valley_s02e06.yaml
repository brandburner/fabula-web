      \ overdose. Without their expertise, the narrative of what happened in the kitchen\
      \ would remain incomplete, and the connection to Tommy Lee Royce’s influence\
      \ might be obscured.\n      "
    active_representation: "\n      Through their physical presence at the scene,\
      \ their collection of evidence, and their adherence to forensic protocols. The\
      \ team is manifested in the documentation of the crime scene, the analysis of\
      \ physical evidence, and the preservation of the chain of custody.\n      "
    power_dynamics: "\n      Operating under the authority of the police but with\
      \ specialized expertise that gives them significant influence over the interpretation\
