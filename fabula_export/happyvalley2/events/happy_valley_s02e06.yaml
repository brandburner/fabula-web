  title: Catherine grapples with Alison’s confession
  description: 'In the quiet aftermath of a chaotic day, Catherine Cawood sits on
    her doorstep watching Ryan play, her mind still reeling from Alison Garrs’ horrifying
    confession: the woman who once vehemently defended her son’s innocence in the
    Vicky Fleming murder has herself killed her own child. The revelation forces Catherine
    into a moment of raw, unfiltered confrontation with the moral abyss of her investigation.
    She voices her disbelief to Clare—*‘Your own kid. What does it take to do that?’*—while
    gesturing the shooting motion with a hollow, almost mechanical detachment, her
    usual professional composure fractured. The scene pivots from the mundane (Clare’s
    update on Winnie’s domestic arrangements) to the grotesque (Alison’s justification:
    *‘Only he never did that fourth one’*), exposing the warped logic of a mother
    who prioritizes her son’s reputation over his life. Catherine’s stunned silence—*‘I’m
    not normally fast for words’*—underscores the emotional gut-punch of the confession,
    while her abrupt shift to the kitchen (*‘I’ll start cooking some tea’*) signals
    a desperate need to ground herself in routine. The moment marks a turning point:
    Catherine’s empathy for Alison curdles into revulsion, and her investigative focus
    sharpens on the *real* killer of Vicky Fleming, now framed as an urgent, unresolved
    question (*‘That’s the sixty-four million dollar question. Now. Isn’t it.’*).
    The subtext is clear—this case is no longer about proving innocence but exposing
    the rot beneath the surface of her community.'
