  title: Catherine manipulates Frances into trust
  description: 'Catherine Cawood arrives at Frances Drummond’s home under false pretenses,
    posing as Ryan’s grandmother rather than a police officer to exploit Frances’
    emotional vulnerability. She uses a calculated mix of reassurance and authority—highlighting
    Frances’ clean record and respectable job history—to lower her defenses, framing
    the encounter as a personal rather than professional confrontation. Frances, initially
    terrified and resistant, hesitates before reluctantly allowing Catherine inside,
    suggesting a fragile but critical shift in their dynamic. The scene hinges on
    Catherine’s strategic duality: her grandmotherly warmth masking her detective’s
    precision, while Frances’ guardedness reveals her entanglement in Tommy Lee Royce’s
    manipulation. The moment sets up a confrontation where Catherine’s true intentions
    could unravel Frances’ loyalty—or expose her complicity in Royce’s schemes.'
