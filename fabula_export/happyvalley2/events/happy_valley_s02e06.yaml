      officers are not yet on-scene, their **influence is immediate**: the dispatcher
      confirms that *‘CID’ve been informed and they’re on the way’*, **officially
      linking the farmhouse to a **larger criminal inquiry****. CID’s role is **indirect
      but transformative**—it **recontextualizes Alison’s confession**, turning a
      **personal act of violence** into a **piece of a **broader investigation****.
      The department’s **forensic and interrogative resources** will later **analyze
      the crime scene, cross-reference the Peugeot’s details, and **pursue leads**
      tied to Operation Syracuse. For Catherine, the **mention of CID** is a **reminder
      that her actions**—**saving Alison’s life, extracting a confession, preserving
      evidence**—**will soon be **scrutinized by a **higher authority**. The organization’s
      **power dynamic** is **authoritative but distant**: it **directs the investigation’s
      trajectory** without yet **interfering in the immediate crisis**.'
