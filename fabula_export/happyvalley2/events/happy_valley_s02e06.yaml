  title: John hesitates before confessing to Andy
  description: 'John Wadsworth stands at his desk, clutching Catherine Cawood’s cryptic
    post-it note—a physical manifestation of the secret he’s been carrying. He locks
    eyes on Andy, alone in his office, and for a fleeting moment, he steels himself
    to confess, to unburden himself of the truth about Vicky Fleming’s murder. The
    weight of his guilt and the moral reckoning press on him, but before he can act,
    an officer interrupts, entering Andy’s office for a casual chat. The intrusion
    shatters John’s resolve, leaving him stranded in his own indecision. The moment
    underscores his internal conflict: the desperate need to confess versus the paralyzing
    fear of the consequences. The aborted confession highlights John’s isolation and
    the suffocating pressure of his secret, which now feels inescapable. This beat
    is a turning point in John’s arc, revealing his fragility and the precariousness
    of his grip on reality as the investigation tightens around him.'
