- fabula_uuid: cand_evt_scene_0e8a8030bf556632_06
  global_id: null
  title: Catherine confronts Frances over Tommy’s manipulation
  description: 'Catherine Cawood visits Frances Drummond’s home under the guise of
    a non-confrontational conversation, but the tension escalates as she systematically
    dismantles Frances’ delusional belief in Tommy Lee Royce’s innocence. The scene
    opens with Catherine carefully observing Frances’ sparse, religiously adorned
    sitting room—now stripped of Tommy and Ryan’s photos—a visual cue of Frances’
    shifting loyalties. Catherine begins by framing Frances as a well-intentioned
    but misguided woman, only to be met with Frances’ defensive insistence that Tommy
    is a victim of circumstance, capable of redemption. The confrontation peaks when
    Catherine forces Frances to confront the grotesque reality of Tommy’s crimes (rape,
    murder, attempted murder) and the psychological grooming Frances has endured.
    Frances, however, clings to her narrative, even invoking religious absolution
    (‘we condemn the sin, not the sinner’) and accusing Catherine of jealousy. Catherine’s
    final, devastating move is to ask Frances if she’d believe Tommy if he looked
    like Ian Brady or Jimmy Savile—a rhetorical gut-punch that exposes the fragility
    of Frances’ devotion. The scene ends with Frances’ refusal to acknowledge the
    truth, but the subtext is clear: her blind faith in Tommy is crumbling, and Catherine
    has planted the seeds of doubt. This moment is a turning point in Frances’ arc,
    shifting her from a passive enabler to a potential liability for Tommy’s plans.
    For Catherine, it’s a calculated risk—she’s pushed Frances toward a breaking point,
    but the outcome remains uncertain: will Frances turn on Tommy, or double down
    on her delusion?'
  episode_uuid: ep_sea_ser_happy_valley_s02_e06
  scene_sequence: 26
  sequence_in_scene: 47
  key_dialogue:
  - 'FRANCES: We’re getting married.'
  - 'CATHERINE: He’s a sex offender. He raped my daughter.'
  - 'FRANCES: He was very fond of your daughter.'
  - 'CATHERINE: Tommy Lee Royce is a psychopath. He’s a murderer and he’s a sex offender.
    And you must know - you must realise - that you’ve allowed yourself to be deluded
    by this dangerous man because you’re infatuated with him.'
  - 'FRANCES: Do you want to know what I believe? I believe that no-one is born evil.
    He may have done things... but we all do that, we’re all human. But he isn’t evil.
    He’s a product of his childhood... With help - and kindness - I believe he will
    become the person he was always capable of being. Good and kind and gentle and
    thoughtful.'
  - 'CATHERINE: He’s using you. He’s used you. To get close to Ryan. He’s groomed
    you. You’ve been groomed. You’ve been picked, you’ve been chosen, for what he
    can get out of you.'
  - 'CATHERINE: Tell me this. If he looked like - I don’t know - Ian Brady. Or Peter
    Sutcliffe. Or Jimmy Savile. Or some other twisted bastard. Would you believe a
    single word he said?'
