  title: Graham implicates Wadsworth in Vicky’s disappearance
  description: 'In a tense, bureaucratic interrogation room at Norland Road Police
    Station, Sergeant Catherine Cawood methodically extracts information from Graham
    Tattersall, a reluctant witness whose affair with Amanda Wadsworth provides a
    critical alibi—or lack thereof—for her husband, Detective John Wadsworth. Graham’s
    stammering, evasive demeanor reveals his discomfort with the affair’s exposure,
    but Catherine’s clinical questioning cuts through his hesitation. When Graham
    finally admits he was with Amanda the night Vicky Fleming’s flat burned (the same
    night she vanished), Catherine’s professional detachment masks her growing unease:
    Wadsworth, a colleague and fellow officer, now becomes a prime suspect in a murder
    investigation. The revelation forces Catherine to confront the moral and professional
    consequences of pursuing a fellow officer, while Graham’s reluctant confession
    underscores the destructive ripple effects of infidelity and deception. The scene
    pivots from procedural routine to a moment of high-stakes tension, as Catherine’s
    duty to the truth collides with her loyalty to the force—and the man she’s now
    investigating.'
