  - character_uuid: ger_agent_e0814528bcf4
    emotional_state: 'A hollow, agonized void—she’s beyond shame or fear, her emotions
      reduced to primal sensations: pain, nausea, and the creeping realization that
      she’s lost everything. There’s a flicker of defiance when she refuses to vomit,
      but it’s short-lived, swallowed by the overwhelming physical and emotional torment.
      Her confession is not a triumph of truth but a surrender to the inevitable.'
    goals:
    - Escape the consequences of her actions (through overdose and suicide).
    - Protect her son’s memory, even as she admits to killing him.
    - Resist Catherine’s interrogation, though her body and mind betray her.
    what_happened: 'Alison Garrs is a grotesque spectacle of physical and mental collapse.
      Her body is wracked by convulsions, her skin pale and clammy, her breath shallow
      and labored. She slumps against Catherine, her limbs heavy, her movements sluggish,
      as if she’s already half-dead. Her speech is a slurred, incoherent mess—*‘I
      don’t know, nobody’*—until the confession slips out like a secret she can no
      longer keep: *‘I shot Daryl.’* The words are barely audible, her voice a rasp,
      her eyes unfocused. When Catherine presses her for answers, she dissolves into
      denial (*‘Nobody was here’*), her mind too far gone to construct a coherent
      lie. The vomiting is violent, her body heaving as Catherine holds her, and when
      the cramps hit, she curls in on herself, groaning like an animal in pain. She’s
      not just a murderer; she’s a woman undone, her love for her son twisted into
      something monstrous.'
