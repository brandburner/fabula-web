  title: Catherine Exposes Frances’ Predatory Grooming
  description: 'Catherine Cawood uncovers the full extent of Frances Drummond’s manipulation,
    revealing that the woman posing as a school counselor is actually a pharmacist
    named Cecily Wealand—whose identity she stole to infiltrate Ryan’s life. The discovery
    confirms Frances’ obsession with Tommy Lee Royce and her deliberate grooming of
    Ryan through extremist ideology. As Catherine prepares to arrest Frances for fraud,
    a sudden landline call interrupts the conversation, forcing her to abruptly shift
    focus from the immediate threat to Ryan to an unknown crisis. The moment underscores
    the dual pressures Catherine faces: protecting her family while navigating a high-stakes
    investigation. Clare’s stunned reaction—‘Shit. [Fucking] shit.’—highlights the
    chilling realization that Frances’ actions were premeditated and deeply sinister,
    while Catherine’s abrupt dismissal of Clare signals the relentless urgency of
    her professional duties. The ominous landline call looms as a potential escalation,
    leaving Frances’ arrest and Ryan’s safety in precarious limbo.'
