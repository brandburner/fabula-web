      first, as the institution where Ryan’s safety is directly threatened by Frances’
      presence, and second, as the tool Catherine uses to restrict Frances’ access
      without direct confrontation. Mrs. Beresford’s action—removing Frances from
      one-on-one sessions under the pretext of ''pupil feedback''—demonstrates how
      the school’s bureaucratic machinery can be leveraged for protective ends. However,
      the organization’s involvement also highlights its limitations: while it can
      enforce rules, it lacks the authority to fully address the root of the threat
      (Frances’ connection to Tommy Lee Royce). The school’s response is reactive,
      not proactive, reflecting its role as a mediator in a larger conflict.'
