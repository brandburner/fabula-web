      blood and gore splattered across the kitchen (noted in the scene’s context)
      are a direct result of its use. The shotgun’s role here is **symbolic and investigative**:
      it is the weapon that Alison used to kill her son, and its discovery (or lack
      thereof) will be critical for CID’s forensic analysis. Catherine’s focus on
      preserving the crime scene—avoiding contamination, ensuring evidence integrity—is
      directly tied to this object, even though it is not interacted with during the
      overdose crisis. Its absence from the immediate action makes it all the more
      ominous, a **ghostly presence** haunting the periphery of the scene.'
    status_before_event: Lying abandoned on the kitchen sink, still warm from recent
      use, covered in blood and brain matter.
    status_after_event: Remains in place, untouched but now **officially part of the
      crime scene investigation**, awaiting CSI processing.
    global_id: ger_object_b16e7f614143
