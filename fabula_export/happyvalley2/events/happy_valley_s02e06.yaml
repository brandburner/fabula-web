- fabula_uuid: cand_evt_scene_5397f3eb93b532d0_01
  global_id: null
  title: Catherine confronts Beresford over Ryan’s grooming
  description: Sergeant Catherine Cawood enters Mrs. Beresford’s office with damning
    CCTV evidence linking a school teaching assistant—likely Miss Wealand—to Tommy
    Lee Royce’s manipulative influence over Ryan. Catherine, visibly distressed but
    controlled, presents footage of Wealand purchasing the same birthday gift left
    anonymously on her doorstep with a card signed ‘from dad.’ She accuses Wealand
    of grooming Ryan, framing Royce as a misunderstood figure while undermining Catherine’s
    protective role. Beresford, initially skeptical, reluctantly agrees to monitor
    Wealand and separate her from Ryan, though she insists on meeting Wealand first
    to assess the claims. The confrontation reveals Catherine’s desperation to shield
    Ryan from Royce’s toxic reach, while Beresford’s hesitation underscores the institutional
    resistance to acknowledging such threats within the school. The scene escalates
    Catherine’s investigation, forcing her to rely on the DIU while ensuring Ryan’s
    immediate safety.
  episode_uuid: ep_sea_ser_happy_valley_s02_e06
  scene_sequence: 6
  sequence_in_scene: 7
  key_dialogue:
  - 'CATHERINE: Our Ryan. Has been coming home from school talking about Tommy Lee
    Royce as this poor misunderstood fella who we all need to forgive. Someone in
    this school is putting ideas in his head. Someone left a birthday present - an
    expensive birthday present - on our doorstep with a card ‘from dad.’ He. Is starting
    to think of that evil twisted murdering - ((she mouths it politely)) bastard as
    his father because some deluded - ((she wants to swear again)) somebody in this
    school is filling his head with - ((and again)) deeply inappropriate ideas.'
  - 'CATHERINE: People are weird, people are mad, and they don’t always have it tattooed
    on their forehead. ... This is someone he’s manipulated and -'
  - 'CATHERINE: I can’t talk to her, I can’t get involved, I’ve got to let the DIU
    deal with it, but I need you to be aware. ... Every second he spends with her,
    she - it would appear - is encouraging him to think of this man as a father. This
    psychopath, this man who’s done nothing but destroy people’s lives. This man who
    threw petrol over him eighteen months ago. Someone here - for whatever reason
    - is encouraging him to think that he is basically an okay guy, and that I am
    an angry nasty bitch for doing my damnedest to protect him from him.'
