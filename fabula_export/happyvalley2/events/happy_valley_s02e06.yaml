  global_id: null
  title: Catherine demands Wealand’s separation from Ryan
  description: 'In Mrs. Beresford’s office, Catherine Cawood presents damning evidence—CCTV
    footage and a suspicious toy purchase—that implicates Miss Wealand, the new teaching
    assistant, in grooming Ryan to idolize Tommy Lee Royce. Catherine, restrained
    but urgent, frames Wealand as a manipulative conduit for Royce’s influence, warning
    that every interaction risks normalizing the psychopath’s role in Ryan’s life.
    Mrs. Beresford, initially skeptical, reluctantly agrees to monitor Wealand and
    take over Ryan’s reading sessions, marking a critical shift from passive observation
    to active protection. The confrontation underscores Catherine’s desperation to
    shield Ryan from Royce’s toxic legacy while exposing the school’s vulnerability
    to external manipulation. The tension hinges on Catherine’s inability to confront
    Wealand directly (due to DIU protocol) and her reliance on Beresford’s cooperation—a
    fragile alliance that could unravel if Wealand’s true motives remain unproven.
    The scene’s emotional core lies in Catherine’s frustration: she’s cast as the
    villain in Ryan’s eyes, while Wealand’s perceived kindness obscures her potential
    role in grooming. The dialogue reveals Catherine’s strategic mind (leveraging
    Clare’s toy shop ID) and Beresford’s institutional caution, setting up a power
    struggle between police authority and school autonomy.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e06
  scene_sequence: 6
  sequence_in_scene: 8
  key_dialogue:
  - 'CATHERINE: Our Ryan. Has been coming home from school talking about Tommy Lee
    Royce as this poor misunderstood fella who we all need to forgive. Someone in
    this school is putting ideas in his head. Someone left a birthday present - an
    expensive birthday present - on our doorstep with a card ''from dad''. He. Is
    starting to think of that evil twisted murdering - bastard as his father because
    some deluded somebody in this school is filling his head with deeply inappropriate
    ideas.'
  - 'CATHERINE: It’s a woman, it isn’t a lad. Our Clare said it looks like Miss Wealand.
    Your new TA. That’s someone. In the toy shop. In Hebden. Buying exactly the same
    toy that was left on our doorstep. Two weeks ago - ''from dad''. Now. Obviously.
    She might have been buying it for some completely other reason. But. It’s a bit
    of a coincidence, isn’t it?'
  - 'CATHERINE: If every time they have a one-to-one reading session she’s encouraging
    him to think about his ''dad'' in some misguided, sentimental way, well then [yes]
    - it’s grooming. People are weird, people are mad, and they don’t always have
    it tattooed on their forehead. I can’t talk to her, I can’t get involved, I’ve
    got to let the DIU deal with it, but I need you to be aware.'
