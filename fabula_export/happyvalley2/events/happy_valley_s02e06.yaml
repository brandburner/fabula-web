    what_happened: 'Catherine Cawood dives out of the patrol vehicle in hot pursuit
      of John Wadsworth, her boots pounding the pavement as she closes the gap. Despite
      the chaos—Gorkem’s forgotten handbrake sending their vehicle rolling backward—she
      maintains laser focus on John, her voice sharp with frustration as she spells
      out ''b-r-a-k-e'' to Gorkem. When John leaps onto the railway tracks, she skids
      to a halt at the platform’s edge, her alarm palpable in the cry ''Oh Jesus.
      John!'' Her body language betrays the conflict: the instinct to save a colleague
      warring with the protocol drilled into her. The radio’s order to stand down
      leaves her frozen, her hands gripping the platform’s edge as John sprints toward
      the oncoming train.'
