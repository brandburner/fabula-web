  description: 'John Wadsworth, already unraveling under the weight of his guilt over
    Vicky Fleming’s murder and the mounting police investigation, arrives at a supermarket
    cash point in a state of raw panic. His hands shake as he withdraws £300—an act
    of desperation that suggests either an attempt to flee or a final, futile bid
    to cover his tracks. Once back in his car, the dam breaks: he swigs whisky, mutters
    to himself, and then erupts into a hysterical, self-pitying outburst, screaming
    *‘Why me?’* at the sky. The scene is a visceral turning point, marking the moment
    his self-control fully collapses. His rage and despair are no longer contained;
    they spill out in a public, unhinged display that foreshadows his impending recklessness.
    The breakdown underscores the high stakes of Catherine’s investigation—John’s
    guilt is now visible, his emotional state volatile, and his next actions could
    either incriminate him further or push him toward a fatal decision. The whisky,
    the shouting, the physical violence against his own car roof—all signal a man
    teetering on the edge of no return, where logic has been replaced by primal fear
    and fury.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e06
