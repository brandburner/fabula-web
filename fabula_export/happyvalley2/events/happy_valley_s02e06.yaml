  title: Catherine shares Alison’s trauma at Becky’s grave
  description: |2-

      At Becky’s grave, Catherine processes the emotional weight of Alison Garrs’ confession—the incestuous trauma she endured, the forced silence that shaped her life, and the quiet courage it took to survive. The moment becomes a turning point as Catherine’s empathy for Alison’s suffering forces her to confront the systemic cruelty that has shaped her own family’s history. Clare’s supportive presence bridges their shared understanding of family pain, while Ryan’s distant laughter with Daniel underscores the generational burden of these secrets. Catherine’s retelling of Alison’s story isn’t just a recounting of facts; it’s a reckoning with the language of trauma—how it isolates, how it distorts relationships, and how it persists across generations. The scene functions as both a cathartic release for Catherine and a narrative pivot, deepening her resolve to protect Ryan from similar cycles of abuse and manipulation. The graveyard setting amplifies the weight of the moment, framing Alison’s story as a ghost that haunts the living, demanding acknowledgment.
