  title: Tommy intercepts Ryan’s vulnerable letter
  description: "\n  In the suffocating isolation of his prison cell, Tommy Lee Royce—already\
    \ simmering with rage—is handed a stack of opened mail by a prison officer. Among\
    \ the letters, he finds a child’s handwritten note from Ryan, addressed to him\
    \ as 'Dad.' The letter, written in a shaky, earnest scrawl, reveals Ryan’s fragile\
    \ emotional state: he thanks Tommy for a gift (a Scalextrix model), expresses\
    \ hope that Tommy is 'alright,' and—most critically—includes his home address\
    \ (29 Hangingroyd Street, Hebden Bridge) with a handwritten 'Love from Ryan' added\
    \ as an afterthought. The letter’s raw vulnerability and the oversight of the\
    \ address (unseen by Granny) hand Tommy a direct, exploitable link to Ryan’s trust.\
    \ This moment escalates the manipulative threat against Catherine’s grandson,\
    \ as Tommy’s access to Ryan’s location could be weaponized through Frances Drummond\
    \ or other means. The scene underscores Tommy’s predatory instincts: his isolation\
    \ fuels his obsession, and Ryan’s letter becomes both a tool for manipulation\
    \ and a reminder of the power he wields even from behind bars. The child’s unguarded\
    \ trust contrasts sharply with Tommy’s calculated cruelty, heightening the stakes\
    \ for Ryan’s safety and Catherine’s protective mission.\n  "
