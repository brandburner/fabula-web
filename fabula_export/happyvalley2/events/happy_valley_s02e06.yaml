- fabula_uuid: cand_evt_scene_637e070e6d64d1dc_01
  global_id: null
  title: John’s Suicide and Catherine’s Failure
  description: 'On the viaduct, John Wadsworth—already unraveling from his confession
    of killing Vicky Fleming—spirals into self-loathing as Catherine Cawood attempts
    a desperate crisis intervention. His hands shake uncontrollably, his voice cracks
    with guilt as he insists he’s ‘not a monster,’ yet his desperation reveals the
    opposite: a man who has crossed a line he can’t return from. Catherine, untrained
    in suicide negotiation but armed with empathy, mirrors his own past training to
    talk him down, using his name repeatedly, reassuring him of options, and even
    invoking his children as a reason to live. For a moment, it seems to work—John
    sits back from the edge, his posture softening—but then he abruptly lets go, falling
    backward off the bridge. The impact is immediate and brutal: he lands on a van
    below, his body sprawled lifelessly in the road. Jodie confirms his death, and
    Catherine, a veteran officer hardened by decades of trauma, is visibly shattered.
    She sinks to the ground, pale and dizzy, her usual composure shattered by the
    weight of a failure she couldn’t prevent. The event marks the irreversible collapse
    of John’s arc—his guilt, his desperation, and his inability to face the consequences—while
    forcing Catherine to confront the limits of her own control and the cost of her
    profession’s moral compromises. The suicide isn’t just a personal tragedy; it’s
    a narrative turning point that exposes the systemic pressures (blackmail, corruption,
    Tommy Lee Royce’s influence) that drove John to this end, and it leaves Catherine
    grappling with the question of whether she could—or should—have done more.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e06
  scene_sequence: 58
  sequence_in_scene: 83
  key_dialogue: &id057
  - 'JOHN: I asked her to just let me go and she wouldn’t, and I begged her! And I
    didn’t mean to kill her, I didn’t go in there to kill her, it just—And so I did
    this ridiculous thing. To her. And God knows... That’s not me. That’s—not what
    I’m like. I’m not—a monster, I never have been.'
  - 'CATHERINE: You were blackmailed. It was provocation. That’s mitigating circumstances.
    And it sounds to me like manslaughter. Ten years—less—and you and me both know
    you could be out.'
  - 'JOHN: I’ll never work again. Not as a copper anyway.'
  - 'JOHN: You should be telling me... that you’re here to make sure that I get out
    of this alive. You’ve got to be assertive. Reassuring. Empathetic. Kind. And you’ve...
    got to listen. You’ve got to be a good listener. And... you tell them that even
    though they can’t see a way forward. You can. There are options other than this
    one. And that in twenty-four hours time, it’ll all seem very different. To what
    it might look like now. But you see... it won’t. This can only get worse.'
  - 'CATHERINE: How many people have you talked down? Over the years? John?'
  - 'JOHN: Seventeen. And I never lost one. Not one. One lad jumped before I got there,
    but... apart from him.'
  - 'CATHERINE: So...? What you gonna do? Mess my record up before I’ve even started?'
  - 'JOHN: I love my kids.'
  - 'GORKEM: Y’all right? Sarg?'
