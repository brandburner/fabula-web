  sequence_in_scene: 85
  key_dialogue: &id061
  - 'JOHN: "I love my kids."'
  - 'CATHERINE: "Yeah."'
  - 'JOHN: "You should be telling me... that you’re here to make sure that I get out
    of this alive."'
  - 'CATHERINE: "Well I am. I am here. For that."'
  - 'JOHN: "You’ve got to listen. You’ve got to be a good listener. And... you tell
    them that even though they can’t see a way forward. You can. There are options
    other than this one."'
  - 'JOHN: "But you see... it won’t. This can only get worse."'
