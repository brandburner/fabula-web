    global_id: ger_object_ea4ed1c76f26
  - object_uuid: ger_object_a0910b5d011a
    description_of_involvement: Catherine’s jacket is the ultimate symbol of her compassion,
      a physical manifestation of her refusal to let Alison Garrs die alone. She removes
      it without hesitation, wrapping it around Alison’s convulsing body as the woman
      groans in agony. The jacket is more than just a source of warmth; it is a shield,
      a barrier between Alison and the cold reality of her actions. It is also a gesture
      of solidarity, a reminder that Catherine sees Alison not just as a murderer
      but as a human being in pain. The jacket’s presence is a stark contrast to the
      forensic gloves and the crime scene tape, a reminder that this moment is about
      more than just justice—it is about mercy. When Alison collapses, the jacket
      is the last thing she feels before the darkness takes her.
    status_before_event: Worn by Catherine, slightly rumpled from the morning’s work.
    status_after_event: Wrapped around Alison’s shoulders, slightly soiled from contact
      with vomit and dirt.
    global_id: ger_object_a0910b5d011a
  - object_uuid: ger_object_cdd269b30734
    description_of_involvement: 'The red Peugeot is the linchpin of the scene’s narrative
      twist, the object that ties Daryl’s murder to Tommy Lee Royce’s criminal network.
      When Catherine spots it, her eyes narrow, and she understands: Alison didn’t
      just kill her son out of maternal protection. There’s something larger at play.
      The car is damaged, its presence at the farm a clue that points to a wider conspiracy.
