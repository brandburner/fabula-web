- fabula_uuid: cand_evt_scene_fc6343c5664377bc_01
  global_id: null
  title: Catherine and Frances Lock Eyes
  description: Catherine Cawood exits St. Marks Junior School just as Frances Drummond
    arrives, creating an immediate and charged confrontation. The moment their eyes
    meet, Catherine instantly recognizes Frances as the woman she saw near Tommy Lee
    Royce’s prison—her posture, her presence, the way she moves—all confirm her suspicions.
    Frances, in turn, recognizes Catherine from their earlier encounter in the backstreet,
    where Catherine had been watching her. The silent exchange is electric, a collision
    of unspoken hostility and mutual recognition. Catherine’s body language betrays
    her restraint; every instinct screams at her to confront Frances directly, but
    she holds back, knowing that any overt action could escalate the danger to Ryan.
    Frances, meanwhile, maintains a facade of calm, though her eyes betray a flicker
    of unease. This silent standoff marks a critical escalation in their hidden conflict,
    signaling that Frances is now fully aware of Catherine’s scrutiny and that Catherine’s
    investigation has just entered a far more dangerous phase. The tension between
    them is palpable, a wordless declaration of war that foreshadows the manipulative
    network Frances represents and the threat she poses to Ryan’s safety. The titles
    cut to black, leaving the weight of this moment hanging in the air.
