  title: Catherine’s fractured loyalty and moral reckoning
  description: 'In the quiet aftermath of a harrowing day, Catherine Cawood sits in
    her backyard watching Ryan play, her mind still reeling from the morning’s revelation:
    Alison Garrs, a mother who vehemently defended her son’s innocence, has murdered
    him in a fit of maternal horror. The scene opens with Catherine and Clare discussing
    Frances Drummond’s legal fate—her imminent bail and the unspoken threat of Catherine’s
