  description: 'In a tense, rapid-fire exchange from Mike’s moving car, Catherine
    forces a detour in the investigation by zeroing in on a Scottish visitor to Tommy
    Lee Royce—a detail that could confirm her worst fears about Frances Drummond’s
    true motives. Her urgency betrays escalating paranoia: she’s already convinced
    the woman Clare spotted at Ryan’s school is the same person visiting Royce in
    prison, despite no concrete proof. The conversation reveals Catherine’s operational
    mind at work—she’s not just reacting to threats but actively hunting them, even
    if it means overriding Ryan’s routine (football practice) to keep him safe. Mike’s
    casual confirmation of a Scottish visitor (‘Yeah. Yeah. There was one.’) becomes
    the spark that ignites Catherine’s next move: prioritizing the DIU’s check on
    this lead. The scene’s brevity and Catherine’s clipped dialogue underscore her
    single-minded focus, while the abrupt shift to Clare and Daniel signals her immediate
    pivot to protective action. This moment crystallizes her dual role as investigator
    and guardian, where every decision is a calculated risk to shield Ryan from Royce’s
    reach—even if it means disrupting his life.'
