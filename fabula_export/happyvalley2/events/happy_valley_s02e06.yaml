  global_id: null
  title: Catherine Prioritizes Life Over Protocol
  description: 'Catherine Cawood arrives at Far Sunderland Farm to discover a horrific
    crime scene: Daryl Garrs lies dead from a shotgun wound to the head, while his
    mother, Alison, has overdosed on a lethal cocktail of alcohol and diazepam. The
    room is drenched in blood and gore, the shotgun abandoned on the sink. Catherine
    immediately shifts into crisis mode, first checking Alison’s pulse and attempting
    to rouse her, then radioing for urgent medical and forensic backup. When Alison
    begins to stir and shows signs of distress, Catherine defies protocol by physically
    moving her out of the crime scene—despite Shaf’s objections—prioritizing the woman’s
    survival over preserving the integrity of the scene. The decision underscores
    Catherine’s growing desperation to protect the vulnerable, even at the cost of
    her professional integrity. Alison’s fragmented, tearful reaction to seeing Daryl’s
    body hints at her involvement in the murder, while Catherine’s sharp, measured
    radio communication reveals her ability to function under extreme pressure. The
    scene’s visceral brutality and Catherine’s moral dilemma—between duty and humanity—set
    the stage for the investigation’s escalation and her personal unraveling as Tommy
    Lee Royce’s influence tightens its grip.'
