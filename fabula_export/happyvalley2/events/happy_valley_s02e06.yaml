  title: Catherine dismisses Neil as suspect
  description: 'Descending the police station stairwell, Catherine Cawood abruptly
    shifts focus from John Wadsworth to Neil Ackroyd as a potential suspect in Vicky
    Fleming''s murder. The moment begins with a frosty exchange between Catherine
    and Jodie, lingering tension from their earlier confrontation about Lynn''s death.
    When Ann mentions her past encounter with John Wadsworth—a man Catherine now suspects
    of being emotionally detached from the case—Catherine dismisses the idea outright,
    instead fixating on the possibility that Neil, Clare''s partner, might be the
    blackmail victim Vicky targeted years ago. Her internal debate is brief but telling:
    a procedural reflex that momentarily disrupts her focus on Wadsworth. The fleeting
    suspicion underscores Catherine''s methodical approach to the case, revealing
    her instinct to follow every lead, no matter how personal or uncomfortable. The
    exchange with Ann, though seemingly casual, exposes Catherine''s protective instincts—she
    subtly warns Ann away from Wadsworth, framing it as concern for her romantic prospects
    rather than a professional assessment. The moment ends as they enter the briefing
    room, but the seed of doubt about Neil lingers, hinting at the web of hidden motives
    Catherine must untangle to protect Ryan and expose the truth. This beat serves
    as a narrative pivot, redirecting Catherine''s investigative focus and foreshadowing
    the personal stakes of the case as it intersects with her family''s lives.'
