  key_dialogue:
  - 'CATHERINE: So Cecily Wealand. Was her sister. Forty-eight years old, she had
    a stroke nine months ago. Her partner, her husband, thinks when she died - he
    was in pieces, and Frances helped with a lot of practical stuff - and he thinks
    that’s when she might have got her hands on various bits of personal documentation.'
  - 'CATHERINE: Then I’ll get onto the prison liaison officer. They need to let Gravesend
    know he’s been grooming this woman. Sad. Isn’t it? No criminal record. She’s held
    down a perfectly respectable job for upward of fifteen years. Then - she does
    this mad thing. And for what? Forty-five minutes once a fortnight with a psychopath.'
  - 'MIKE: Right - let’s send ‘em in to make the arrest. Have you got a number for
    this Mrs. Beresford? I’ll ring her and warn her they’re coming.'
