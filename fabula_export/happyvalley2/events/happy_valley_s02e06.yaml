  - character_uuid: ger_agent_eba286353a62
    emotional_state: Panicked and resigned—his actions suggest a man who has accepted
      his fate but cannot stop running from it, even into certain death.
    goals:
    - Escape capture and the consequences of his actions (Vicky Fleming’s murder,
      his affair, the blackmail)
    - Punish himself for his crimes, either through death or the symbolic act of running
      toward destruction
    what_happened: John Wadsworth moves like a man already dead, his escape from the
      wrecked car a series of erratic, desperate lurches. He sprints onto the westbound
      platform, muttering 'Shit shit shit' in a loop, his voice raw with panic. His
      path isn’t strategic—it’s the blind flight of a cornered animal, leading him
      straight toward the railway tracks. When he leaps down, his boots hit the gravel
      between the tracks, and he runs *toward* the oncoming train, his body language
      screaming surrender. The tracks become his confessional, his guilt manifesting
      in this suicidal dash. He doesn’t look back—there’s no negotiation left in him,
      only the need to escape the inescapable.
