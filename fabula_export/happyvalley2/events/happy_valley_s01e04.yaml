      and the systemic resources Ann needs. The act of dialing the NCA number (scribbled
      on a newspaper) is a deliberate, irrevocable step toward justice, marking the
      moment when the case transitions from a family secret to a police priority.'
    status_before_event: In Catherine’s pocket, unused but always within reach (a
      tool of her profession).
