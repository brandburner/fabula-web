  key_dialogue:
  - |-
    HELEN: *My daughter’s been kidnapped.*
      *(HELEN can’t believe she’s said it. CATHERINE can’t quite believe she’s heard it.)*
  - |-
    CATHERINE: *Most times. When something like this happens. The outcome isn’t... it’s not good. You have a much much— I can’t tell you how much— better chance of getting her back, safe, all in one piece, with the police on board.*
      *(CATHERINE’s voice is steady, but her hands tremble slightly as she dials the NCA.)*
  - |-
    CATHERINE: *I’ll talk to him. If something did happen to her, and you hadn’t acted on your instinct, you’d never forgive yourself. Would you?*
      *(A beat. HELEN’s breath hitches. CATHERINE’s question isn’t just about Ann—it’s about the ghosts Catherine carries: Becky, her own inaction, Tommy’s unchecked violence.)*
