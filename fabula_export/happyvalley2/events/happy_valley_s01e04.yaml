  key_dialogue:
  - |-
    CATHERINE: *Have you got a minute?*
    MIKE TAYLOR: *Sure.*

    *(Catherine casually admits to breaking into Royce’s property, listing the evidence—blood, gaffer tape, knickers—while Mike doesn’t look up from his computer. His silence is the permission she needs.)*

    CATHERINE: *Is that—all right?*
    MIKE TAYLOR: *Yup.*
  - |-
    MIKE TAYLOR: *M-CET’s worked out there were two vehicles involved. Pathologist says she was crushed to death. Run over. More than once.*

    *(Catherine’s reaction—emotional, visceral—reveals the H-MIT case isn’t just professional; it’s **personal**. The repetition of ‘*run over*’ underscores the **methodical brutality**.)*

    CATHERINE: *Effed off, Insecure, Neurotic and Emotional, but other than that. Yeah.*
  - |-
    MIKE TAYLOR: *They’ll want to talk to you. H-MIT. They’ll want to go through your Duty Statement with you.*

    *(A **chilling aside**: Mike’s warning isn’t just procedural—it’s a **threat**. Catherine’s illegal entry and emotional state now make her **vulnerable to scrutiny**, tying her fate to the very system she’s trying to expose.)*
