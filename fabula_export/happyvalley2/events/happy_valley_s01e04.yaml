acts:
- fabula_uuid: act_b8cfe7ac056f84e1
  number: 1
  summary: 'The episode opens with Kevin, the accountant, paralyzed by fear, unable
    to confess his knowledge of Ann''s kidnapping to Nevison, highlighting his moral
    dilemma. Meanwhile, Sergeant Catherine Cawood independently pursues a lead from
    the previous episode, investigating a property on Milton Avenue. She discovers
    suspicious items like blood and gaffer tape in the cellar, prompting her to secure
    a CSI investigation. Her inquiries lead her to Julie Mulligan, the property owner,
    who inadvertently reveals her husband, Ashley Cowgill, is involved. Ashley, alerted
    by Julie, panics upon learning of the police presence and the break-in at his
    property. He orders Lewis and Tommy Lee Royce to move Ann from the caravan, where
    she is held captive and drugged, to a new location, confirming Tommy''s willingness
    to commit murder for payment. Catherine confronts Ashley, who attempts to feign
    ignorance, but her instincts confirm his deception. The act culminates with Ashley,
    Lewis, and Tommy solidifying their grim plan: Tommy agrees to murder Ann for a
    fee, marking a significant escalation of the threat against Ann''s life. This
    act establishes the core conflict of the kidnapping and Catherine''s determined
    pursuit, while highlighting the moral decay of the perpetrators and Kevin''s crippling
    fear.'
