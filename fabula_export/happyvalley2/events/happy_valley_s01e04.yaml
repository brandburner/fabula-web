  key_dialogue: &id005
  - |-
    ASHLEY: *Who, me?*
    JULIE: *You’ve got a copper coming to see you.*
    ASHLEY: *What copper?*
    JULIE: *A police woman.*
    ASHLEY: *How d’you know?*
    JULIE: *She’s just been in here, just now.*
  - |-
    ASHLEY: *She’s been noseying around and now she’s broken in. But why? What does she know?*
    JULIE: *Right, well she’s coming. And you’re in bother y’bastard, if you’ve been up to something.*
    ASHLEY: *I don’t even know what you’re on about! Why am I ‘up to something’ just ‘cos some toe rag’s decided to break into some property?*
  - |-
    ASHLEY: *I want you to go stay in t’caravan wi’ Tommy and—* [he can’t say Ann’s name] *Her. And keep it down.*
    LEWIS: *Why?*
    ASHLEY: *There’s a police woman coming ovver, I’ll deal with her.*
    LEWIS: *What police woman?*
    ASHLEY: *You both stay in—til I come and tell you she’s been and gone. All right? I don’t want to hear a peep out of anyone.*
