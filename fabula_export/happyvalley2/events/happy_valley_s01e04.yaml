  key_dialogue:
  - '**CATHERINE**: *‘The night Kirsten died. The District Commander. Told me not
    to send it. He brought the subject up, not me. “You arrested Marcus Gascoigne,
    drop it.” I said I couldn’t, the stuff I took off him’d gone straight into the
    store at Halifax nick. He said take it out. I said I couldn’t do that.’*'
  - '**MIKE TAYLOR**: *‘Well then I suggest that’s what you do.’* **CATHERINE**: *‘But—’*
    **MIKE TAYLOR**: *‘Things get damaged in transit. He told you to drop it. So drop
    it.’* **CATHERINE**: *‘That’s—’* **MIKE TAYLOR**: *‘It’s like you telling me you’ve
    entered an address by “ways and means,” and me reckoning I haven’t heard. Sometimes
    we turn a blind eye. Don’t we.’*'
  - '**MIKE TAYLOR**: *‘D’you think you’re letting this get a bit personal?’*'
