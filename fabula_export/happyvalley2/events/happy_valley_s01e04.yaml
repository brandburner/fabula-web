  location_involvements:
  - location_uuid: ger_location_04930fe6fce1
    description_of_involvement: Upper Lighthazels Farm serves as the battleground
      for Catherine’s psychological interrogation of Ashley. The remote, sunlit isolation
      of the farm amplifies the tension, creating a claustrophobic atmosphere where
      Ashley has nowhere to hide. The rust-streaked trailers and half-finished barn
      renovation hint at hasty flights and unfinished business, mirroring Ashley’s
      own desperation to cover his tracks. The farm is not just a location but a character
      in its own right, its oppressive quiet and rural expanse contrasting with the
      sinister activities taking place within it. Catherine’s presence here is a violation
      of Ashley’s perceived safety, and the farm’s seclusion ensures that his panic
      has nowhere to escape.
    observed_atmosphere: Tense and oppressive, with a sense of looming danger. The
      rural isolation amplifies the psychological pressure, making Ashley’s lies feel
      even more fragile.
    functional_role: Interrogation site and symbolic representation of Ashley’s criminal
      empire. The farm is where his operations are centered, and its remote location
      makes it a perfect place for both kidnapping and drug trafficking—until Catherine
      arrives to disrupt it.
    symbolic_significance: 'Represents Ashley’s illusion of control and the fragility
      of his criminal enterprise. The farm is a microcosm of his world: seemingly
      in control on the surface, but rotting beneath.'
    access_restrictions: Open to Catherine as part of her investigation, but Ashley’s
      territory—until her arrival forces him to defend it.
