- fabula_uuid: cand_evt_scene_1e9773a40a5cac02_01
  global_id: null
  title: 'The System’s Betrayal: Evidence Destroyed, Justice Undone'
  description: "\n  In a moment of institutional sabotage, Catherine Cawood receives\
    \ a chilling notification from PC Griffiths: the critical drug evidence tied to\
    \ Marcus Gascoigne’s arrest—evidence she had seized as part of her broader investigation\
    \ into systemic corruption—has been *destroyed* due to 'damaged packaging.' The\
    \ letter’s clinical language ('*cannot be used as evidence*', '*drugs have been\
    \ destroyed*') belies the malice behind the act, as Griffiths’ signature looms\
    \ like a taunt. Catherine’s face darkens with fury as she processes the implications:\
    \ this isn’t just a procedural mishap—it’s a deliberate erasure of proof, a cover-up\
    \ orchestrated by those who benefit from the status quo. The destruction of the\
    \ exhibit isn’t just a setback; it’s a *declaration of war* against her pursuit\
    \ of justice. As she storms out of her office, the weight of the system’s corruption\
    \ presses down on her, forcing her to confront the fragility of her quest for\
    \ retribution. The scene marks a turning point: the institutional machinery she\
    \ once served now actively undermines her, leaving her isolated in her fight against\
    \ Tommy Lee Royce and the rot within the police itself.\n  "
