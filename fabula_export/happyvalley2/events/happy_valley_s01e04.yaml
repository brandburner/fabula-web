  key_dialogue:
  - |-
    CATHERINE: *Boss?*
    MIKE TAYLOR: *Catherine.*
    CATHERINE: *Have you got a minute?*
    MIKE TAYLOR: *((no)) Sure.*

    *(Subtext: Catherine tests Mike’s attention span, knowing his distraction will allow her to justify her illegal actions. The ‘no’/‘Sure’ exchange reveals Mike’s **divided focus**—a pattern that will later backfire on her.)*
  - |-
    CATHERINE: *I. Accessed. The property. Via... ways and means... and I found blood. In the cellar. And a chair covered in gaffer tape. Like somebody’d been tied to it.*
    MIKE TAYLOR: *Okay.*

    *(Subtext: Catherine’s **euphemistic confession** (‘ways and means’) is met with Mike’s **willful ignorance**, establishing their **unspoken pact**. The blood/gaffer tape details foreshadow **Ann Gallagher’s captivity**, while Mike’s detachment highlights the **systemic blindness** to Royce’s crimes.)*
  - |-
    MIKE TAYLOR: *They’ll want to talk to you. H-MIT. They’ll want to go through your Duty Statement with you.*

    *(Subtext: The **casual threat** in Mike’s tone marks the **institutional noose tightening**. ‘Duty Statement’ becomes a **double-edged sword**: Catherine’s **professional record** is now a liability, and her **personal vendetta** against Royce risks exposure. The line **echoes the scene’s core conflict**: her **dual investigations** are now **officially linked**.)
