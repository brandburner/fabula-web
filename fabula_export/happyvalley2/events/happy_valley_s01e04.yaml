  key_dialogue:
  - |-
    **TOMMY** *(as he kicks her):*
        *‘You bitch. You’re gonna be eating food through a straw for the rest of your life, you bitch. You’re gonna need someone to wipe your arse for yer. Oh yes—’* *(stamps on her hand)* *‘D’you like that? D’you like that, you slag? D’you want some more?’*

        *(**Context:** Tommy’s monologue is a masterclass in psychological torture, blending physical violence with dehumanizing language. His focus on Catherine’s future helplessness—*‘wipe your arse’*—reveals his desire not just to hurt her, but to *erase* her agency, reducing her to a dependent, broken shell. The repetition of *‘D’you like that?’* transforms the scene into a grotesque performance, where Tommy derives sadistic pleasure from her suffering. This dialogue underscores the personal, almost *intimate* nature of his vengeance—this is not just about Ann’s kidnapping, but about breaking the woman who has haunted him for years.)
  - |-
    **CATHERINE** *(barely able to speak, pushing Ann toward the stairs):*
        *‘Get out of here. Get out of here!’*

        *(**Context:** Catherine’s command is delivered in a voice stripped of its usual authority, reduced to a ragged, desperate whisper. The repetition—*‘Get out of here’*—mirrors Tommy’s earlier taunts, but where his words were laced with malice, hers are raw with urgency and sacrifice. This moment is the emotional and narrative climax of Catherine’s arc: her obsession with Tommy has driven her to the brink, but in this instant, she *chooses* Ann’s life over her own vengeance. The dialogue is minimal, but its subtext is devastating—Catherine is not just saving Ann; she is *surrendering* her own body and future to do so. The line also foreshadows her collapse outside the cellar, where her physical and emotional limits will finally be exposed.)
