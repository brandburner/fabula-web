    \ hurting me.’*\n\n    **CATHERINE** *(pressing, but gentle)*:\n    *‘It takes\
    \ all sorts. It’s not always easy to acknowledge things sometimes…’*\n\n    **HELEN**\
    \ *(interrupting, voice breaking)*:\n    *‘My daughter’s been kidnapped.’*\n \
    \   "
  - "**CATHERINE** *(firm, urgent)*:\n    *‘Most times, when something like this happens,\
    \ the outcome isn’t… it’s not good. You have a *much* better chance of getting\
    \ her back safe with the police on board.’*\n\n    **HELEN** *(terrified, conflicted)*:\n\
    \    *‘I don’t want him to think I’ve gone behind his back.’*\n\n    **CATHERINE**\
    \ *(cutting through, emotional)*:\n    *‘If something did happen to her, and you\
    \ hadn’t acted on your instinct, you’d never forgive yourself. Would you?’*\n\
