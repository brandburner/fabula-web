  key_dialogue:
  - 'KEVIN: *It was them. That killed that police woman. Those two yobs, those two
    idiots that work for Ashley. They were moving her. Ann. In a van, and— they got
    pulled over—yeah—by her, the police officer, the one that’s dead, and—only because
    they had a rear light out, and— they killed her, they killed— they murdered a
    police officer, Jenny! That was not part of the plan, that was never part of the
    plan!*'
  - 'JENNY: *Why did you do it? Any of it! Why?*'
  - 'KEVIN: *You know why, I’ve explained why. If he’d chosen to give me just a little
    bit more money when I asked—!*'
  - 'JENNY: *The girls, the girls, the girls! What use will you be to them in prison?
    I’m probably not going to live long enough to see them become adults—and what
    use will you be to them in prison?*'
  - 'KEVIN: *Which is why if I tell Nevison this thing and go to the police and say
    ‘I think I know who these people are’... it’s a way out of it!*'
