  title: 'The Weight of a Lie: Kevin’s Descent into Moral Ruin'
  description: |2-

      In the suffocating tension of Kevin and Jenny’s kitchen, the air thickens with the weight of P.C. McAskill’s murder—her funeral announced on the news like a death knell for their fragile alliance. Kevin, unraveling under guilt and fear, proposes a monstrous plan: framing Ashley for Ann’s disappearance to divert suspicion from himself. His desperation is raw, his logic twisted by self-preservation. When Jenny hesitates, he reveals the horrifying truth—that Ashley’s thugs murdered McAskill during Ann’s transfer, a crime Kevin knew about but concealed. The confession shatters Jenny’s last shred of trust, exposing the rot at the core of their marriage. This isn’t just a turning point; it’s a moral collapse, where survival instincts override loyalty, and the cost of Kevin’s lies becomes unbearable. The scene crackles with subtext: Jenny’s quiet fury, Kevin’s frantic justifications, and the unspoken question—how far will they fall before they hit bottom?
  episode_uuid: ep_sea_ser_happy_valley_s01_e04
  scene_sequence: 37
  sequence_in_scene: 60
  key_dialogue:
  - |-
    KEVIN: *It was them. That killed that police woman.*
    JENNY: *My God.*
    KEVIN: *Those two yobs, those two idiots that work for Ashley. They were moving her. Ann. In a van, and— they got pulled over— yeah— by her, the police officer, the one that’s dead, and— only because they had a rear light out, and— they killed her, they killed— they murdered a police officer, Jenny! That was not part of the plan, that was never part of the plan!*
  - |-
    JENNY: *Why did you do it? Any of it! Why?*
    KEVIN: *You know why, I’ve explained why. If he’d chosen to give me just a little bit more money when I asked—!*
    JENNY: *The girls, the girls, the girls! What use will you be to them in prison?*
  - |-
    KEVIN: *I go to Nevison, I say, ‘I think I know who these people are,’ and I persuade him that we should go to the police.*
    JENNY: *There’ll be something you haven’t thought of.*
