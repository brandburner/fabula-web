- fabula_uuid: cand_evt_scene_b8c264a89be48d62_01
  global_id: null
  title: 'The Bargain: Catherine’s Gambit and Mike’s Complicity'
  description: "\n  In a masterclass of psychological manipulation, **Catherine Cawood**\
    \ weaponizes her own recklessness to force **Mike Taylor’s** hand, exposing the\
    \ rot at the heart of their fractured partnership. She casually admits to breaking\
    \ into a property—an illegal act that could end her career—while framing it as\
    \ a necessary step to pursue **Tommy Lee Royce**, the man whose crimes destroyed\
    \ her family. Mike’s deliberate indifference (his refusal to look up from his\
    \ computer, his perfunctory approval) isn’t just professional detachment; it’s\
    \ a tacit acknowledgment of the unspoken rules they both operate by: *bend the\
    \ law when it suits the greater good*. The subtext is electric: Catherine isn’t\
    \ just asking for permission; she’s testing Mike’s loyalty to the system *versus*\
    \ his loyalty to her. His response—‘Yup’—is a loaded silence, a green light for\
    \ her obsession. The moment escalates when Mike pivots to the **H-MIT briefing**,\
    \ revealing the brutal details of **Kirsten McAskill’s** murder (run over *multiple\
    \ times*), a detail that mirrors Catherine’s own unraveling. His question—‘How\
    \ is everyone?’—is a thinly veiled check on her emotional state, but Catherine’s\
    \ raw admission (‘Effed off, Insecure, Neurotic and Emotional’) flips the script:\
    \ she’s not just a grieving mother or a cop on the edge; she’s a woman who’s *chosen*\
    \ this path, and she’s daring Mike to stop her. The scene ends with Mike’s ominous\
    \ warning about the **H-MIT** reviewing her **Duty Statement**, a reminder that\
    \ their complicity is a two-way street. This isn’t just about Royce; it’s about\
    \ the cost of justice when the system is as broken as the people enforcing it.\n\
    \  "
