  key_dialogue: &id031
  - |-
    LYNN: *What you doing here.*
    TOMMY: *I come to see you.*
    LYNN: *Yeah, that’s likely.*
  - |-
    TOMMY: *It’s a dog. It’s been trained up. For a fight. I said I’d look after it. Just for a few days. So when it’s here I’ll keep it muzzled, but it might make a bit o’ noise, but I wouldn’t go down there, all right? Cos it’ll have your leg off.*
    LYNN: *What, with a muzzle on?*
    TOMMY: *I can’t keep it muzzled all t’time, can I? It’d be inhuman.*
  - |-
