      slightly toward her, his brow furrowing as he processes her casual tone and
      the abrupt change in plans. His hands rest on his knees, fingers tapping once—a
      habit when he’s unsure. When he asks 'What for?', his voice is measured but
      carries an undercurrent of concern. He doesn’t challenge her outright, but his
      body language suggests he senses something is off, even if he doesn’t fully
      grasp what.
