            The chair is positioned in the center of the cellar, its arms and legs wrapped in gaffer tape, securing Ann Gallagher in place. The tape is frayed in spots, suggesting prior use (implying this is not the first time the chair has been used for restraint). The chair is sturdy but worn, its wood splintered in places, and it sits in a pool of dim light, casting long shadows that accentuate the cellar’s oppressive atmosphere.
    status_after_event: |2-

            The chair is now empty, the gaffer tape torn and hanging loosely from its arms. The struggle has left it slightly askew, one leg scraped against the concrete floor. The tape, once pristine, is now smudged with blood and dirt, a physical record of the violence that took place. The chair itself is undamaged but carries the weight of the trauma that unfolded around it—Ann’s escape and Catherine’s sacrifice.
