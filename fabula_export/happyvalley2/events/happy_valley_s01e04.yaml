- fabula_uuid: cand_evt_scene_accfe54cdd5ec826_01
  global_id: null
  title: '**"The Weight of a Detour: Vengeance vs. Duty in the Yeller Mini Hunt**"'
  description: "\n  In a moment of critical urgency—with a murdered police officer’s\
    \ case (the 'yeller mini' lead) demanding immediate attention—Catherine Cawood\
    \ abruptly diverts her focus to visit Lynn Dewhurst, Tommy Lee Royce’s mother.\
    \ The detour is framed as casual ('Fun'), but the subtext is devastating: her\
    \ obsession with Royce has warped her priorities. Shafiq’s confusion ('What for?')\
    \ underscores the unspoken tension—Catherine’s professional duty is being eclipsed\
    \ by personal vengeance. The scene exposes the fracturing of her moral compass,\
    \ as the kidnapping case (and its escalating stakes) competes with her need to\
    \ confront Royce’s lingering influence over her life. The white shirt—a subtle\
    \ but telling detail—hints at her performative professionalism, masking the chaos\
    \ beneath. This detour isn’t just a delay; it’s a turning point where Catherine’s\
    \ dual pursuits collide, forcing her (and the audience) to question which mission\
    \ she’ll ultimately betray.\n  "
  episode_uuid: ep_sea_ser_happy_valley_s01_e04
  scene_sequence: 56
  sequence_in_scene: 85
  key_dialogue: &id047
  - 'CATHERINE: What have I missed?'
  - 'SHAFIQ: Oh, just three million phone calls from people whose neighbours’ve got
    a yeller mini. How was the community meeting?'
  - 'CATHERINE: Oh, the usual suspects. Out in force. We’ve got a dead police officer,
    and they’re still more bothered about the amount of dog dirt up Smithy Clough
    Lane. Listen, I’m just gonna look in on Tommy Lee Royce’s mother again, all right?
    I shan’t be long.'
  - 'SHAFIQ: Okay. What for?'
  - 'CATHERINE: Fun.'
  is_flashback: false
  location_uuid: ger_location_034f453330d3
  theme_uuids: []
  arc_uuids: []
  participations:
  - character_uuid: ger_agent_283d6fdb0b6b
    emotional_state: Feigned nonchalance masking a storm of grief, rage, and guilt.
      Her external calm is a facade; internally, she is consumed by the need to confront
      Royce’s legacy, even as her duty to solve Kirsten’s murder pulls her in another
      direction.
    goals:
    - To visit Lynn Dewhurst under the guise of routine, while secretly probing for
      any connection to Tommy Lee Royce’s whereabouts or activities.
    - To assert control over her own narrative—proving to herself (and perhaps to
      the audience) that she is still in command, even as her priorities unravel.
    what_happened: 'Catherine sits in the driver’s seat of her patrol car, her posture
      deceptively relaxed as she steers with one hand. She’s still wearing her white
      shirt from the community meeting—a deliberate choice to appear professional,
      though the fabric now feels like a costume. Her voice is light, almost dismissive,
      as she mentions the detour to Lynn Dewhurst’s, but her fingers tighten slightly
      on the wheel when Shafiq questions her. The detour is framed as casual, but
      her body language betrays the underlying tension: this is not a social call.
      The word ''Fun'' lingers in the air, heavy with irony.'
    observed_status: 'Catherine sits in the driver’s seat of her patrol car, her posture
      deceptively relaxed as she steers with one hand. She’s still wearing her white
      shirt from the community meeting—a deliberate choice to appear professional,
      though the fabric now feels like a costume. Her voice is light, almost dismissive,
      as she mentions the detour to Lynn Dewhurst’s, but her fingers tighten slightly
      on the wheel when Shafiq questions her. The detour is framed as casual, but
      her body language betrays the underlying tension: this is not a social call.
      The word ''Fun'' lingers in the air, heavy with irony.'
    beliefs:
    - That Lynn Dewhurst holds the key to unraveling Tommy Lee Royce’s current movements
      or motives, and that confronting her will bring Catherine closer to justice
      for Becky.
    - That her personal vendetta is justified and necessary, even if it conflicts
      with her professional duties. She believes she is the only one who can deliver
      the justice the system failed to provide.
    observed_traits:
    - Deflective
    - Obsessive
