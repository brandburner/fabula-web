  key_dialogue:
  - 'RICHARD: *it would make a fantastic article, and it does need writing about.*'
  - 'CATHERINE: *Oh, I would.*'
  - 'RICHARD: *Heroin. Is imported pure, one hundred percent. Then they all cut it,
    everyone who handles it, all the way down the chain. To maximise their profits
    as they go. By the time it reaches the streets, street heroin, it’s probably no
    more than two percent pure.*'
  - 'CATHERINE: *No, really?*'
  - 'RICHARD: *And they’ll cut it with anything. Brick dust. Brick dust! Face powder,
    talcum powder, bicarbonate of soda, so when they’ve been injecting for long enough,
    if the veins haven’t collapsed, they get blocked. Then they start having to have
    their legs amputated.*'
  - 'CATHERINE: *Yup.*'
  - 'RICHARD: *Oh and up and down this chain, they’re all frightened of the person
    above. However high up they are—*'
