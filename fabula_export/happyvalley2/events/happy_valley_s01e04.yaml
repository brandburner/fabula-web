      She ends a call with Richard as she steps out of her car, then uses the phone
      to share or receive contact details with Ashley. The phone’s glow under the
      daylight underscores its role as a bridge between her personal life and her
      professional pursuit of justice. It’s a reminder that she’s always connected,
      always ready to act, and that Ashley’s lies are being documented in real time.
    status_before_event: In Catherine’s hand or pocket, used to end the call with
