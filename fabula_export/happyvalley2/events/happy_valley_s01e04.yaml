      flood of phone calls from the public. While the car itself isn’t physically
      present in this scene, its mention looms large as a symbol of the ongoing investigation
      and the urgency of the case. The object serves as a narrative counterpoint to
      Catherine’s detour: while the team is drowning in leads related to Kirsten’s
      death, Catherine is diverting her attention to a personal vendetta. The ''yeller
      mini'' represents the professional duty she is temporarily abandoning, its absence
      in the scene highlighting the tension between her roles as a police officer
      and as Becky’s avenging mother.'
