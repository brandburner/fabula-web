      cupboards (where Ryan retrieves the jigsaw) and counters (where Clare works)
      are familiar to the regulars, but the *emotional weight* of the scene transforms
      the space into something else: a *confessional*, a *war room*, and a *sanctuary*
      all at once. The mission’s volunteer-driven ethos also mirrors Catherine’s own
      *unofficial* role—she’s not on duty, but she’s still *working*, still *protecting*.'
