  key_dialogue:
  - |-
    ASHLEY: *No.*
    CATHERINE: *These lads are all in their twenties. Do you employ anyone or had contact with anyone that age who might associate with lads like that? Newly released from prison?*
    ASHLEY: *No. No.*
  - |-
    CATHERINE: *Tommy Lee Royce.*
    ASHLEY: *Should they be familiar to me?*
    CATHERINE: *Are they? Any of ‘em?*
    ASHLEY: *No.*
  - |-
    CATHERINE: *We’ve got reason to believe something a bit sinister’s gone on in there. In your house... someone’s been held in there. Against their will. And treated rather unpleasantly.*
    ASHLEY: *(a mumble) Bloody hell.*
