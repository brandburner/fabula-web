- fabula_uuid: cand_evt_scene_fcd60ed8845a0e45_03
  global_id: null
  title: '**"The Weight of a Lie: Kevin’s Descent into Moral Ruin**"'
  description: |2-

      In the suffocating tension of Kevin and Jenny’s kitchen, the weight of their complicity in Ann Gallagher’s kidnapping—and now a police officer’s murder—crushes their already fractured marriage. The news of PC Kirsten McAskill’s death plays in the background, a grim reminder of the violence spiraling beyond their control. Kevin, unraveling under guilt and fear, proposes a desperate plan: framing Ashley Cowgill while burying the ransom money to avoid blame. Jenny, horrified, demands the truth—only for Kevin to reveal the brutal reality that *he knew* about the murder but stayed silent. Their argument erupts into raw, desperate accusations: Jenny’s grief over her terminal illness and the girls’ future collides with Kevin’s self-preservation, exposing the irreparable chasm between them. This isn’t just a confrontation—it’s the moment Kevin’s moral collapse becomes irreversible, and Jenny’s last hope for redemption dies with his refusal to confess. The scene is a crucible of guilt, fear, and the cost of survival at any price.
  episode_uuid: ep_sea_ser_happy_valley_s01_e04
  scene_sequence: 37
  sequence_in_scene: 62
  key_dialogue:
  - 'KEVIN: *It was them. That killed that police woman. Those two yobs, those two
    idiots that work for Ashley. They were moving her. Ann. In a van, and— they got
    pulled over— yeah— by her, the police officer, the one that’s dead, and— only
    because they had a rear light out, and— they killed her, they killed— they murdered
    a police officer, Jenny! That was not part of the plan, that was never part of
    the plan!*'
  - |-
    JENNY: *Why did you do it? Any of it! Why?*
         KEVIN: *You know why, I’ve explained why. If he’d chosen to give me just a little bit more money when I asked—!*
         JENNY: *The girls, the girls, the girls! What use will you be to them in prison? I’m probably not going to live long enough to see them become adults— and what use will you be to them in prison?*
  - |-
    JENNY: *There’ll be something you haven’t thought of.*
         KEVIN: *Which is why if I tell Nevison this thing and go to the police and say ‘I think I know who these people are’... it’s a way out of it!*
         JENNY: *No. No. No. Kevin. No.*
