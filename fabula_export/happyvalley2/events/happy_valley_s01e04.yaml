  key_dialogue: &id049
  - |-
    **LYNN** *(dismissive, then realizing her mistake)*:
        *‘It’s— It’s just— I’ll let his fff—dog out, that’ll learn him.’*

        **CATHERINE** *(sharp, zeroing in)*:
        *‘What dog?’*

        **LYNN** *(panicked, backpedaling)*:
        *‘Ohh— It’s— It’s nothing. I shouldn’t have—’*

        **CATHERINE** *(cutting her off, stepping forward)*:
        *‘Show me, Lynn.’*
        *(**Subtext**: The shift from dialogue to physical action—Catherine’s body language now dominates. The word *‘cellar’* hangs between them, heavy with implication.)
  - |-
    **CATHERINE** *(cold, lethal)*:
        *‘He’s been here. ‘Cos you gave him my message. I know that. […] Ryan is not his son. Ryan has nothing to do with him. I would not waste my life dragging up something he’d spawned. All right?’*

        **LYNN** *(nodding, defeated)*:
        *‘Right.’*

        **CATHERINE** *(leaning in, voice dropping to a threat)*:
        *‘So you tell him. If he comes anywhere near our Ryan there’ll be bother. More bother than he knows how to handle. Right?’*
        *(**Subtext**: Catherine’s language—*‘spawned,’ ‘bother’*—reveals her disgust and her willingness to meet Tommy’s violence with her own. The threat isn’t just professional; it’s **personal, primal, and tied to her dead daughter.**)
  - |-
    **LYNN** *(bitter, exhausted)*:
        *‘Cos it’s Tuesday. ‘Cos the sun’s shining. ‘Cos he feels like it. There is no why.’*

        **CATHERINE** *(softening slightly, then hardening)*:
        *‘D’you want me to arrest him?’*

        **LYNN** *(laughs darkly)*:
        *‘Yeah. And then he’ll come back and do it worse. I don’t see him for weeks, and then…’*
        *(**Subtext**: Lynn’s resignation lays bare the **cycle of abuse**—Tommy’s violence is both random and inevitable. Her fear isn’t of Catherine’s intervention; it’s of **what comes after.** This exchange underscores the **powerlessness of women in Tommy’s orbit**, including Catherine, who is now mirroring Lynn’s desperation.)
