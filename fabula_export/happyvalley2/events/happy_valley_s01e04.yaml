  - object_uuid: ger_object_4ff2389d24f7
    description_of_involvement: 'The mug of tea Clare brings Catherine is a *symbolic
      comfort item* in an otherwise tense scene. Placed in front of Catherine as Helen
      confesses, the tea represents Clare’s silent support—a gesture of care amid
      crisis. Catherine doesn’t drink from it (her focus is on Helen and the NCA call),
      but its presence is a *tactile reassurance*: a reminder that she’s not alone
      in this. The steam rising from the mug contrasts with the *cold fear* in the
      room, offering a fleeting warmth. For Helen, the tea might also symbolize the
      *normalcy* she’s been denied for four nights; its ordinary ritual is a stark
      counterpoint to the extraordinary horror of Ann’s kidnapping. The mug’s untouched
      state by the end of the scene underscores the urgency—there’s no time for comfort,
      only action.'
    status_before_event: Full and hot, carried by Clare to Catherine’s table.
    status_after_event: Still full, cooling, untouched (a metaphor for the pause in
      emotion before the NCA call).
    global_id: ger_object_4ff2389d24f7
  - object_uuid: ger_object_54262f7b400f
    description_of_involvement: 'Clare’s pen is a *functional catalyst* in this event.
      When Catherine realizes she needs to write down the NCA number, she turns to
      Clare with urgency (*''Pen, pen, have you got a pen?''*). The pen—ordinary,
      borrowed, and immediately used—becomes the tool that *materializes* the NCA’s
      involvement. As Catherine scribbles the number on a newspaper, the pen’s scratch
      marks symbolize the *irrevocable* step toward escalating the case. Its role
      is practical but charged: without it, the number might have been forgotten in
      the heat of the moment. The pen’s temporary possession (borrowed from Clare)
      also reflects the *collaborative* nature of the mission—Catherine, Clare, and
      Helen are united in this act, even if their motivations differ. After the call,
      the pen is likely returned to Clare, its job done, but its mark (the NCA number)
      lingers as proof of the decision made.'
    status_before_event: In Clare’s pocket or on the counter, an everyday tool.
    status_after_event: Used to write the NCA number, then likely returned to Clare
      (its role fulfilled).
    global_id: ger_object_54262f7b400f
  - object_uuid: ger_object_5ea9b0f87c23
    description_of_involvement: 'Ryan’s jigsaw puzzle serves as a *narrative counterpoint*
      to the adults’ emotional crisis. While Helen confesses to the kidnapping and
      Catherine makes the NCA call, Ryan quietly sets up the puzzle at a nearby table,
      his routine a silent rebellion against the chaos. The puzzle’s scattered pieces—like
      the fragmented information about Ann’s disappearance—contrast with Ryan’s methodical
      assembly. His focus on the game (a distraction) highlights the adults’ inability
      to escape their roles: Catherine as the cop, Helen as the terrified mother.
      The puzzle also functions as a *metaphor* for the case itself: Ann’s safety
      feels like a puzzle with missing pieces, and Catherine’s call to the NCA is
      an attempt to fill in the gaps. The game’s presence is subtle but meaningful—it
      grounds Ryan in the mission’s familiarity while underscoring the adults’ unresolved
      tension.'
    status_before_event: Stored in the mission’s cupboard, untouched until Ryan retrieves
      it.
    status_after_event: Set up on the table, partially assembled, a fleeting normalcy
      amid the storm.
    global_id: ger_object_5ea9b0f87c23
  - object_uuid: ger_object_9d438a8df3a9
    description_of_involvement: 'Julie Mulligan’s mobile phone is *not* physically
