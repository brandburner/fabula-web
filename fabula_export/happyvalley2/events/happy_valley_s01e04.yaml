  title: 'The White Van and the Call: A Moment of Fragile Control and Unraveling'
  description: |2-

      In the wake of her confrontation with Tommy Lee Royce, Catherine Cawood arrives at the Milton Avenue crime scene—still visibly shaken but operating on autopilot. Shafiq reports a witness sighting of a white transit van parked outside the property four days prior, a detail that immediately snaps Catherine’s focus back to the kidnapping case. Her sharp reaction—*‘A white transit van?’*—reveals her investigative instincts cutting through her emotional turmoil, though the lead’s potential is tempered by its vagueness. As she prepares to flag the van for CCTV review, her phone rings: Clare, her estranged sister. The timing is brutal. Catherine’s weary, almost defensive greeting—*‘Hiya’*—hints at her exhaustion, but the call’s interruption forces her to confront the duality of her life: the relentless pursuit of justice and the unresolved trauma of her family. The scene pivots from procedural urgency to personal vulnerability, testing whether Catherine can maintain her fragile control or if Clare’s voice will shatter it entirely. The white van becomes a symbol of the case’s elusive truth, while Clare’s call represents the past she cannot outrun.
