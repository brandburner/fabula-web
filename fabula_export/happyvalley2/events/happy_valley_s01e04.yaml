  title: 'The Rape of the Past: Catherine’s Violent Confrontation with Tommy Lee Royce'
  description: "\n  In a volatile, emotionally charged confrontation outside Ryan’s\
    \ school, **Catherine Cawood**—already fraying under the dual pressures of the\
    \ kidnapping case and her daughter Becky’s unresolved trauma—encounters **Tommy\
    \ Lee Royce**, the man she holds responsible for Becky’s rape and death. The exchange\
    \ begins as a tense interrogation about Tommy’s whereabouts and his connection\
    \ to **62 Milton Avenue**, a critical lead in the kidnapping investigation. But\
    \ when Tommy, with chilling nonchalance, references Becky’s death and asserts\
    \ his paternity over Ryan, Catherine’s grief and rage erupt into a visceral, violent\
    \ threat. She accuses him of rape, her voice trembling with raw pain, and delivers\
    \ a chilling promise of castration if he crosses her. Tommy, though momentarily\
    \ unnerved, retaliates by banging on the car window, shouting his claim to Ryan—‘*You’re\
    \ my son! I’m your dad!*’—forcing Catherine to flee, her composure shattered.\
    \ The scene is a brutal collision of personal and professional crises, where Catherine’s\
    \ trauma is weaponized against her, and Tommy’s manipulative presence threatens\
    \ to unravel the fragile stability she’s fought to maintain. The confrontation\
    \ escalates the emotional stakes, deepens the personal vendetta between Catherine\
    \ and Tommy, and leaves Ryan—an unwitting pawn—shaken by the revelation of his\
    \ biological father’s identity. The moment is a turning point: Catherine’s unraveling\
    \ is no longer contained, and Tommy’s claim on Ryan becomes a ticking time bomb\
    \ in their fractured relationship.\n  "
