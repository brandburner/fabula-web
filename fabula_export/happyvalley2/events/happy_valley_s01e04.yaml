  description: "\n  In the squalid, nicotine-stained kitchen of Lynn Dewhurst’s home—a\
    \ place that reeks of neglect and the lingering specter of Tommy Lee Royce’s violence—Sergeant\
    \ Catherine Cawood’s carefully constructed facade begins to crack. The scene opens\
    \ with a tense, procedural interrogation: Catherine, ever the professional, presses\
    \ Lynn for information about Tommy’s whereabouts, her questions sharp but controlled.\
    \ Lynn, however, is a master of evasion, her slurred speech and half-lidded eyes\
    \ masking a cunning that Catherine underestimates. The real bomb drops when Lynn,\
    \ with the casual cruelty of someone who knows she’s holding a knife to Catherine’s\
    \ ribs, *casually* reveals that she knows Ryan is Tommy’s son—a secret Catherine\
    \ has buried deeper than her daughter’s grave.\n\n  The revelation isn’t just\
    \ a shock; it’s a *violation*. Catherine’s body language betrays her—her posture\
    \ stiffens, her voice drops to a dangerous calm—as she realizes the implications:\
    \ *someone has been talking*. Lynn’s feigned ignorance (‘*Somebody mentioned it.\
    \ Other day. I were down in Hebden*’) is a calculated taunt, forcing Catherine\
    \ to confront the fragility of the life she’s built for Ryan. The subtext is brutal:\
    \ *Tommy’s poison isn’t just in the past. It’s in your bloodline.* Catherine’s\
    \ warning—*‘Your Tommy. Has got nothing. To do with my grandson’*—is less a denial\
    \ than a desperate incantation, a plea to the universe to keep the two worlds\
    \ separate. But the damage is done. As Catherine leaves, the weight of Lynn’s\
    \ words lingers like smoke in the air, a prelude to the hallucinatory breakdown\
    \ that will follow. This isn’t just a revelation; it’s the first domino in Catherine’s\
    \ emotional collapse, a moment where the past *physically* reasserts its claim\
    \ on her present.\n\n  **Why it matters**: This scene is the narrative’s *pressure\
    \ point*—the moment where Catherine’s dual roles as detective and grandmother\
    \ collide, where her professional detachment is weaponized against her. Lynn’s\
    \ knowledge isn’t just a plot device; it’s a *threat*. The unsaid question hangs\
    \ heavy: *Who else knows?* And more terrifyingly, *what will Tommy do with this\
    \ information?* The scene’s tension lies in its quiet brutality: no raised voices,\
    \ no dramatic confrontations—just the slow, inexorable unraveling of a woman who\
    \ thought she’d built walls high enough to keep the monsters out.\n  "
