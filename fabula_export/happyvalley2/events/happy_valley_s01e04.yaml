      In the suffocating confines of the caravan, Lewis’s moral unease reaches a breaking point as he discovers Ann Gallagher in a drugged, semi-conscious state—her vulnerability a visceral reminder of the kidnappers’ descent into violence. His visceral reaction (*‘What you done to her?’*) exposes the fragile remnants of his humanity, clashing with Tommy’s cold pragmatism (*‘I’ve give her a bit of smack. Keep her docile.’*). The exchange isn’t just about Ann’s condition; it’s a microcosm of their fractured alliance, where Lewis’s hesitation (*‘She needs a gag on.’*) is met with Tommy’s chilling logic (*‘She won’t scream. She can’t.’*). The scene’s tension hinges on Ann’s silent agony—a physical and emotional counterpoint to the men’s moral decay. For Lewis, this moment is a turning point: his complicity is no longer abstract but embodied in Ann’s broken body, forcing him to confront whether he can still justify his role in Tommy’s plan. The caravan’s claustrophobia amplifies the stakes, making the air thick with the unspoken question: *How far will Lewis go before he becomes as monstrous as Tommy?*
