      cost.
    - To find another way to hold Marcus Gascoigne accountable, even if the evidence
      is gone.
    what_happened: 'Catherine Cawood receives the folded envelope from Joyce, her
      expression tightening as she reads the letter from PC Griffiths. Her fingers
      grip the papers so tightly her knuckles whiten, and her face darkens with a
      mix of livid fury and incensed betrayal. The destruction of the evidence isn’t
      just a setback—it’s a personal affront, a sabotage of her efforts to expose
      corruption. She storms out of the office, her boots pounding the linoleum floor
      as she processes the implications: the system she serves is actively undermining
      her.'
