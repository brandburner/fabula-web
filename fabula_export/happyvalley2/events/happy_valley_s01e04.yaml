  key_dialogue:
  - |-
    **PHIL CRABTREE**
    *(lowered voice, blunt)*
    Four days in. Your daughter is likely to know a lot. About the people who’ve taken her. They’ve got your money, and the reality is, they’ve got things to lose now by releasing her alive, whatever they’ve been telling you.
  - |-
    **NEVISON**
    *(grudging, defensive)*
    I know very little.
    **PHIL CRABTREE**
    You’ll be surprised.
    **NEVISON**
    *(after a beat, remembering)*
    He said, *“that irritating little twat of an accountant you’ve got.”*
  - |-
    **PHIL CRABTREE**
    *(processing, then sharp)*
    So they know Kevin. Of him, at least.
    **NEVISON**
    *(flat, exhausted)*
    Fifty thousand pounds. Cash.
