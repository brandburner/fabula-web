        *‘Kitchen, sitting room—and the upstairs upstairs. Good lad.’*
        *(Subtext: Her professionalism is a thin veneer; the repetition of ‘upstairs’ hints at her fixation on hidden spaces—like Royce’s secrets.)*
  - |-
    **CATHERINE** *(muttering to herself, vulnerable)*:
        *‘Bless.’*
        *(Subtext: A rare moment of self-compassion, revealing how deeply she’s struggling to hold herself together.)*
  - |-
    **CATHERINE** *(casual but loaded)*:
        *‘I’ve just got another house call to make. I’m popping in on Tommy Lee Royce’s mother, okay?’*
        *(Subtext: The nonchalance is a lie. This isn’t routine police work—it’s a **personal crusade**, and the shift in her tone marks the moment her vendetta overtakes the case.)
