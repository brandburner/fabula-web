- fabula_uuid: act_6b2e2f87ad36b752
  number: 2
  summary: Act Two deepens the intertwining of Catherine's professional investigation
    and her profound personal trauma. Catherine visits Lynn Dewhurst, Tommy Lee Royce's
    mother, seeking information about his whereabouts. During this tense encounter,
    Lynn shockingly reveals her knowledge that Tommy is the father of Catherine's
    grandson, Ryan. This revelation profoundly rattles Catherine, triggering a vivid
    hallucination of her deceased daughter, Becky, and highlighting the deep, unresolved
    pain Tommy inflicted upon her family. Concurrently, Helen, Ann Gallagher's mother,
    finally breaks her silence and confides in Catherine about Ann's kidnapping, driven
    by Catherine's persistent concern. Catherine immediately contacts Phil Crabtree
    of the National Crime Agency, initiating an official, high-stakes investigation.
    During their meeting, Nevison, Ann's father, reveals that his accountant, Kevin
    Weatherill, was the one delivering the ransom money, and that the kidnappers specifically
    requested him, making Kevin a prime suspect. Phil Crabtree immediately mobilizes
    resources to place Kevin under surveillance and prepares to wiretap Nevison's
    phone. Meanwhile, Tommy, after securing Lynn's cellar for a fee, moves the drugged
    Ann into the new, more secure location, revealing to Ann his discovery of having
    a son, unknowingly connecting his heinous actions to Catherine's family. Catherine
    also encounters institutional resistance when a key piece of drug evidence she
    seized from Marcus Gascoigne is deemed unusable due to "damaged packaging," suggesting
    a cover-up and further frustrating her pursuit of justice. This act effectively
    raises the stakes by bringing the police and NCA into the kidnapping case, while
    simultaneously intensifying Catherine's personal battle against Tommy and the
    systemic corruption she faces.
