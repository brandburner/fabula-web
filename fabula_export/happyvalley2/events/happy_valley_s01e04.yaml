- fabula_uuid: act_4923f32ba07221f5
  number: 3
  summary: The final act propels the narrative towards a brutal confrontation, bringing
    all the converging storylines to a head. Tommy Lee Royce, now aware of Ryan's
    existence, directly confronts Catherine at Ryan's school, asserting his paternity.
    Catherine, in a desperate attempt to protect Ryan, vehemently denies his claim
    and threatens Tommy with extreme violence, then quickly drives away, leaving Ryan
    confused. Back at home, Catherine's sister, Clare, makes a crucial connection,
    suggesting that the items Catherine found in the Milton Avenue cellar might be
    linked to the kidnapping, prompting Catherine to relay this information to Phil
    Crabtree, officially linking the two investigations. The news then broadcasts
    a report about the PC's murder, mentioning a yellow Mini, which Nevison immediately
    recognizes as Ann's, further escalating the urgency. This revelation finally pushes
    Kevin, consumed by guilt and fear, to confess to Nevison his knowledge of the
    kidnappers' identities. Armed with this new information, Catherine returns to
    Lynn Dewhurst's house. Noticing Lynn's black eye and her cryptic mention of a
    "dog" in the cellar, Catherine's suspicion peaks. She forces her way into the
    padlocked cellar and discovers Ann Gallagher, bound and gagged, in a horrific
    state. Before Catherine can radio for backup, Tommy Lee Royce arrives, headbutts
    his mother, and lunges at Catherine. A ferocious fight ensues, with Catherine
    battling the man who raped her daughter. Despite Catherine's fierce resistance,
    Tommy's superior physical strength overwhelms her, inflicting severe injuries.
    However, Ann, having managed to free herself, intervenes, striking Tommy with
    a dumbbell. Catherine, gathering her last reserves of strength, uses her CS spray
    on Tommy. She then pushes Ann towards the exit, and as she calls for an ambulance,
    collapses, seemingly succumbing to her injuries, leaving Ann to face the aftermath
    alone in a shocking cliffhanger.
