  key_dialogue:
  - |-
    **RICHARD**: *It’s more addictive than crystal meth, it’s stronger and cheaper than heroin. You have one year life expectancy once you start injecting. It’s cooked with paint thinner or petrol and it’s injected like heroin, and it’s so addictive, no-one’s been known to survive. There is no rehab.*
    **CLARE**: *Jesus.*
    **RICHARD**: *It eats flesh. From the inside out. It looks like leprosy! You can see it on the internet, kids with their bones and their tendons hanging out of their arms.*
  - |-
    **CATHERINE**: *Yeah and there’s a thousand and one unscrupulous gits round here who won’t think twice about peddling it, and thousands more who won’t think twice about shooting it up.*
    **RICHARD**: *Round here, it’s an epidemic! You talk to people on the streets—*
    **CATHERINE**: *Yeah. I do. Every day. What amazes me is you’re a journalist and it’s like you had no idea.*
    **RICHARD**: *I did know. I did know. I just hadn’t—*
    **CATHERINE**: *Engaged.*
  - |-
    **RICHARD**: *Tell me some more about Marcus Gascoigne.*
    **CATHERINE**: *There’s nothing to tell. Yet. ‘Til I get the results from the lab.*
    **RICHARD**: *Do you think he’s a dealer?*
    **CATHERINE**: *Doesn’t matter what I think. The only thing that matters is evidence.*
