  - organization_uuid: ger_organization_fb6b5e230a77
    description_of_involvement: 'The National Crime Agency (NCA) is the *institutional
      savior* in this event, though its presence is *remote* and *reactive*. Catherine’s
      call to the NCA is the *catalyst* that shifts the case from a local police matter
