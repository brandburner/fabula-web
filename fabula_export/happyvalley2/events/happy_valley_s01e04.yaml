  title: '**"The Predator’s Claim: A Mother’s Rage and the Kidnapping’s Shadow"**'
  description: "\n  In a volatile confrontation outside Ryan’s school, **Tommy Lee\
    \ Royce**—a specter of Catherine’s past—emerges to assert his paternity over Ryan,\
    \ forcing her to confront the brutal truth of his return. The scene erupts into\
    \ a **high-stakes verbal duel**, where Catherine’s **raw grief over Becky’s death**\
    \ collides with her **professional urgency** to extract information about **62\
    \ Milton Avenue**, a critical lead in the kidnapping case. Tommy’s **manipulative\
    \ denial** and **provocative taunts** (\"*How come Becky’s dead?*\") push Catherine\
    \ to the brink, her **rage boiling over** as she **accuses him of rape**—a trauma\
    \ she’s carried for years. The exchange spirals into a **physical threat** (Catherine’s\
    \ visceral warning: *‘I’ll chop your dick off and make you swallow it’*), revealing\
    \ the **depth of her unhealed wounds**. Meanwhile, Tommy’s **desperate outburst**—*\"\
    You’re my son! I’m your dad!\"*—shatters Ryan’s fragile world, deepening the **emotional\
    \ and psychological stakes** of their fractured relationship. The scene **escalates\
    \ personal and professional crises**, as Catherine’s **dual roles as mother and\
    \ detective** clash in a moment of **uncontrollable fury**, while the **kidnapping\
    \ investigation** hangs in the balance, its resolution tied to Tommy’s secrets.\
    \ The confrontation ends with Catherine **speeding away**, her **composure shattered**,\
    \ leaving Ryan **traumatized** and the **truth about 62 Milton Avenue** still\
    \ unresolved but looming larger than ever.\n  "
