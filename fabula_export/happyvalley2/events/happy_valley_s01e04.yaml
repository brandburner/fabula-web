  - |-
    **Catherine Cawood**: *‘Kevin Weatherill came into my nick four days ago. He was agitated. He wanted to tell me something and then before he could, he disappeared.’* \
        **Phil Crabtree**: *‘That could mean Kevin’s involved or it could mean he was going to try and report it because he knew Nevison was too frightened to.’*
  - |-
    **Catherine Cawood**: *‘My daughter died. And then I had a grandson to look after, and being a detective didn’t fit the lifestyle any more, so.’* \
        **Phil Crabtree**: *‘God, I’m sorry.’*
