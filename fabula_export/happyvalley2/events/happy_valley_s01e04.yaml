        - **Ann’s physical state** (catatonic, dribbling, vomit-stained) communicates her despair more powerfully than words ever could. Her faint, dim flicker of terror as she strains to hear Tommy and Lewis outside is the only 'dialogue' she contributes—a wordless scream for help that goes unanswered.
