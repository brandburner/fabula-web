  global_id: null
  title: 'The Unseen War: Catherine’s Silent Battle with the Past'
  description: "\n  In a dimly lit café, Richard—oblivious to Catherine’s traumatic\
    \ history—casually outlines the brutal mechanics of the heroin trade, detailing\
    \ how the drug is systematically diluted with lethal additives (brick dust, talcum\
    \ powder) to maximize profits. His clinical, almost academic tone contrasts sharply\
    \ with Catherine’s rigid silence; her terse, dismissive responses ('No, really?',\
    \ 'Yup') betray a woman who knows the devastation firsthand. The subtext crackles:\
    \ Richard’s journalistic curiosity is a world away from Catherine’s visceral,\
    \ unspoken knowledge of how this process destroyed her family. The exchange isn’t\
    \ just an info-dump—it’s a pressure cooker of repressed trauma, where Catherine’s\
    \ professional composure masks the storm of memories (Becky’s overdose, the collapse\
    \ of her family) triggered by Richard’s words. The moment hinges on what *isn’t*\
    \ said: Richard’s detachment exposes the chasm between institutional awareness\
    \ (his article) and lived experience (her loss), while Catherine’s refusal to\
    \ engage becomes a silent rebellion against the very system that failed her. This\
    \ tension foreshadows her impending confrontation with Tommy Lee Royce, where\
    \ her personal and professional wars will collide.\n  "
  episode_uuid: ep_sea_ser_happy_valley_s01_e04
  scene_sequence: 13
  sequence_in_scene: 18
  key_dialogue:
  - 'RICHARD: *Heroin. Is imported pure, one hundred percent. Then they all cut it,
    everyone who handles it, all the way down the chain. To maximise their profits
    as they go. By the time it reaches the streets, street heroin, it’s probably no
    more than two percent pure.*'
  - 'CATHERINE: *((she knows all this)) No, really?*'
  - 'RICHARD: *And they’ll cut it with anything. Brick dust. Brick dust! Face powder,
    talcum powder, bicarbonate of soda, so when they’ve been injecting for long enough,
    if the veins haven’t collapsed, they get blocked. Then they start having to have
    their legs amputated.*'
  - 'CATHERINE: *Yup.*'
  - 'RICHARD: *Oh and up and down this chain, they’re all frightened of the person
    above. However high up they are—*'
