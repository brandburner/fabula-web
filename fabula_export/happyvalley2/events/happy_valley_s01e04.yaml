    he’s been dossing. No answer but I had reason to believe—y’know—so. I. Accessed.
    The property. Via... ways and means... and I found blood. In the cellar. And a
    chair covered in gaffer tape. Like somebody’d been tied to it. And a pair of knickers.
    On the floor.*'
  - 'MIKE TAYLOR: *M-CET’s worked out there were two vehicles involved. Pathologist
    says she was crushed to death. Run over. More than once.*'
  - 'CATHERINE: *Effed off, Insecure, Neurotic and Emotional, but other than that.
    Yeah.*'
