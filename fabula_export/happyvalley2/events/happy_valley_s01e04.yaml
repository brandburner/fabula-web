  scene_sequence: 34
  sequence_in_scene: 54
  key_dialogue:
  - |-
    **PHIL CRABTREE** *(handing Nevison his phone back, urgent but controlled)*:
        *'In the next hour. We’ll send someone into your home. And into your workplace. They’ll be under cover, disguised as a telecoms worker or something of that sort. We’ll duplicate the phone, I’ve got the number. If he rings you in the next half hour or so before we’ve got that up and running, whatever he wants, try and stall him. If he asks for more money, say you’re happy to do that, but you just need an hour or so to get it together.'*

        **NEVISON** *(bitter, exhausted)*:
        *'And should I? Get money together.'*

        **PHIL CRABTREE** *(firm, leaving no room for doubt)*:
        *'Yes. If you can. Everything as normal. Don’t give ‘em any reason to imagine anything different’s happened. Don’t tell anyone. Anyone. What’s going on. That does include Kevin. I know you trust him—but from our point of view, at the minute, until we can eliminate him, he’ll be treated as a suspect.'*

        ---

        **NEVISON** *(reluctant, voice breaking slightly as he admits the unthinkable)*:
        *'He sent... yesterday, he sent this.'* *(He accesses the photo on his phone, intending to pass it to Phil, but Helen intercepts it.)*

        **HELEN** *(whispering, horrified, as she studies the image)*:
        *'Oh God...'* *(Her voice trails off, the weight of the photo—Ann’s state, the confirmation of her suffering—silencing her.)
  - |-
    **PHIL CRABTREE** *(to Catherine, low and urgent, pulling her aside)*:
        *'Have you got a minute?'* *(This exchange, though brief, signals the isolation of Catherine’s parallel investigation into Tommy Lee Royce, hinting at the institutional and personal pressures mounting against her.)
  - |-
    **NEVISON** *(to Helen, voice tight with suspicion and grief)*:
        *'I keep thinking about Kevin. Why Kevin? Why did they ask for Kevin to deliver the money? He asked for that money. To put his kids through school. Four days before it happened.'*

        **HELEN** *(quietly, the implication hanging between them)*:
        *'But then you offered it to him.'*

        **NEVISON** *(remembering, voice hollow)*:
        *'He looked more worried than pleased when I offered the money.'* *(This beat reveals the creeping paranoia infecting their relationship with Kevin, a trusted figure now tainted by suspicion.)
