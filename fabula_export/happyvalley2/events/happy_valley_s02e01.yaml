  title: Ryan plays alone in the storm
  description: In a quiet, fleeting moment amid the escalating chaos of Catherine’s
    investigation, her young son Ryan is seen kicking a ball around outside their
    house. The scene is starkly ordinary—a child at play—yet it contrasts sharply
    with the surrounding violence and tension. Ryan’s innocence and joy serve as a
    poignant reminder of what Catherine stands to lose if the darkness consuming her
    world (the murder investigation, her past with Tommy Lee Royce, and the unraveling
    of her family) continues unchecked. The moment underscores the personal stakes
    of the unfolding events, framing Ryan as a symbol of vulnerability in a world
    where Catherine’s professional and personal lives are colliding. The simplicity
    of the action—just a boy playing—makes the looming threats feel even more urgent
    and personal.
