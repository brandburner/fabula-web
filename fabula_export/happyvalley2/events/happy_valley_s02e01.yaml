    between Sean and Catherine, escalating narrative tension and hinting at deeper
    connections to the unfolding mysteries. The abruptness of his departure suggests
    a deliberate evasion, while the context of his intoxication and erratic behavior
    implies a man unraveling under personal or criminal pressure. This encounter serves
    as a critical turning point, linking Sean’s unstable presence to the broader web
    of threats—including the serial killer and Tommy Lee Royce’s shadow—looming over
    Catherine’s investigation.'
