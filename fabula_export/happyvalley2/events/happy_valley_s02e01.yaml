    over tea, reminiscing about their shared past and Catherine’s role as Clare’s
    protector. Their fragile intimacy is shattered when Catherine storms in, her foul
    mood immediately displacing Neil, who leaves awkwardly. Clare, annoyed by Catherine’s
    dismissive behavior, presses her about her sour demeanor. Catherine’s emotional
    dam breaks—she bursts into tears, then reveals she’s under investigation for Lynn
    Dewhurst’s murder. The revelation stuns Clare, who struggles to reconcile the
    accusation with Catherine’s character. Catherine downplays the seriousness, calling
    it ‘routine procedure,’ but her vulnerability exposes the depth of her entanglement
    with Lynn’s death and the resurfacing threat of Tommy Lee Royce’s shadow. The
    moment ends with Clare’s bombshell confession about kissing Neil years ago, a
    distraction that underscores the unresolved tension between Catherine’s professional
    authority and her personal fragility.
