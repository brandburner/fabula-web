  title: Catherine confronts the sheep’s suffering alone
  description: Catherine arrives at a quiet garden where a mauled sheep lies dying,
    its labored breathing a visceral reminder of the violence she’s sworn to contain.
    The elderly owner offers tea and departs, leaving Catherine to face the animal’s
    suffering unassisted. She searches for a tool to end its misery, settling on a
    sharp coping stone from the garden wall—a task that forces her to confront her
    own detachment, the weight of her duty, and the quiet isolation of her role. The
    scene underscores her emotional resilience and the moral compromises inherent
    in her work, where mercy and violence blur in the face of systemic decay. The
    sheep’s agony becomes a metaphor for the unspoken burdens she carries, both as
    a police officer and as a woman navigating a world that demands pragmatism over
    sentiment.
