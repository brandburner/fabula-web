      horror, but her professional instincts kick in, confirming the discovery of
      a murder victim. The moment is charged with tension, as the setting amplifies
      the grotesque nature of the find.
    beliefs:
    - That her instincts are reliable, even when she’s physically and emotionally
      drained
    - That this discovery is not random but tied to the darker undercurrents of the
      case—and possibly her past with Tommy Lee Royce
    observed_traits:
