- fabula_uuid: cand_evt_scene_ad2f0e831e87ad7c_02
  global_id: null
  title: Catherine shields Geoffrey from chaos
  description: 'At Sowerby Bridge Station, Catherine encounters Geoffrey, an elderly
    man with dementia, disoriented and vulnerable in mismatched clothing. She attempts
    to stabilize him by establishing his identity, but Liam—a drunken bystander—interrupts
    with disruptive, mocking interjections, forcing Catherine to assert control. Her
    patience snaps when Liam undermines Geoffrey’s fragile state, prompting her to
    physically confront him with a quiet but violent threat. The moment reveals Catherine’s
    protective instincts and her struggle to balance professional duty with personal
    frustration. When radio confirmation arrives identifying Geoffrey as a missing
    person, Catherine swiftly transitions into action: she wraps him in her hi-viz
    jacket for warmth and comfort, then arranges for his care at a nearby café while
    coordinating with his daughter. The scene underscores Catherine’s dual role as
    a caretaker and enforcer, her ability to pivot from empathy to authority, and
    the fragility of those she’s sworn to protect. The interruption by Liam and the
    radio’s confirmation also highlight the precariousness of Geoffrey’s situation,
    mirroring Catherine’s own professional and personal pressures.'
