- fabula_uuid: cand_evt_scene_287ed972c07b175b_02
  global_id: null
  title: Catherine’s alibi undermines her credibility
  description: "\n  In a tense but professionally framed interview at Norland Road\
    \ Police Station, D.I. Jodie Shackleton methodically dismantles Catherine Cawood’s\
    \ alibi while probing her volatile history with Lynn Dewhurst, the murder victim.\
    \ Catherine reluctantly admits to leaving threatening messages on Lynn’s answerphone\
    \ after Lynn—Tommy Lee Royce’s mother—approached her grandson Ryan, violating\
    \ a court order. Though Catherine insists she had no further contact with Lynn,\
    \ her detailed alibi (attending a Child Sexual Exploitation seminar in Bradford\
    \ on the day she left the messages) is later exposed as placing her near the murder\
    \ scene during the two-week window when Lynn was killed. Jodie’s calm but relentless\
    \ questioning forces Catherine to confront the fragility of her position: her\
    \ professional credibility is eroded by her emotional outbursts (e.g., snapping\
    \ at Jodie’s repeated questions) and the damning coincidence of her proximity\
    \ to the crime. The scene underscores Catherine’s dual role as both a victim of\
    \ Tommy Lee Royce’s violence and a potential suspect in Lynn’s murder, deepening\
    \ the narrative’s exploration of trauma, vengeance, and the blurred line between\
    \ justice and personal retribution.\n  "
  episode_uuid: ep_sea_ser_happy_valley_s02_e01
  scene_sequence: 37
  sequence_in_scene: 46
  key_dialogue:
  - |-
    JODIE: Did you recognise her?
    CATHERINE: At the scene? No no, the face was gone, it could’ve been a lad for all I knew. Soon as I realised what I was looking at I got out of there and secured it.
  - |-
    CATHERINE: He wasn’t the father, he raped her, he raped my daughter.
    ((she goes silent and pauses until she can trust herself to pick it up again without becoming emotional))
  - |-
    JODIE: You left threatening messages on her answer machine, and you found the body. We have to eliminate you, that’s all. At the minute we’re looking at a two-week period when the pathologist believes Lynn’s death occurred. What I’d like to ask you to do is go away and look at your smart phone, your diary, your pocket book, your work rosta, look at your calendar at home, come back to us with as accurate an account— a chronological account— of what you were doing Saturday 23rd July to Saturday 6th August.
    CATHERINE: Everyone was a suspect when I was in H-MIT.
