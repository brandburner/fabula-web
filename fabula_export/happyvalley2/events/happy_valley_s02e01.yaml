  participations:
  - character_uuid: ger_agent_4e47744bac8c
    emotional_state: A mix of bewilderment and creeping dread—her questions aren’t
      just about John’s location, but about the unspoken rift between them. There’s
      a quiet fury beneath her concern, the kind that comes from loving someone who
      won’t let you in.
    goals:
    - To locate John and ensure his safety, her maternal instincts overriding her
      suspicion.
    - To understand why he’s evading her, even if she doesn’t yet articulate the fear
      that he’s hiding something irreversible.
    what_happened: Amanda’s voice, though off-screen, is a palpable force in the scene—her
      texts and the single word ‘John?’ carry the weight of a wife who has spent months
      sensing something amiss but refusing to name it. Her tone shifts from confusion
      to alarm, each unanswered call deepening her anxiety. She is the unseen architect
