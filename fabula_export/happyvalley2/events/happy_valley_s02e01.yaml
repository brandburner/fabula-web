  title: Daniel reveals Clare’s alcoholism to Ryan
  description: In a quiet moment of domestic intimacy, Daniel and Ryan play a board
    game in Catherine’s kitchen while Clare is out. When Ryan asks for a biscuit,
    Daniel casually retrieves a beer from the fridge, hinting at a covert rebellion
    against Clare’s rules. Ryan, unaware of the tension, innocently presses Daniel
    about why they don’t drink beer when Clare is present. Daniel, caught off guard,
    stumbles through an explanation, revealing Clare’s history with alcoholism—first
    by confirming she’s an ‘alcoholink’ (a childish mispronunciation of ‘alcoholic’)
    and then awkwardly clarifying the term. The exchange exposes the fragile balance
    in the household, where Clare’s past struggles are treated as a taboo subject,
    and Daniel’s discomfort underscores the unspoken weight of her recovery. Ryan’s
    confusion and Daniel’s evasive, whispered explanation highlight the generational
    gap in understanding addiction, while the scene subtly reinforces the fractured
    dynamics of Catherine’s family, where loyalty and discretion are constantly negotiated.
