  key_dialogue:
  - 'ALISON GARRS: Look what they’ve done to Daryl. This is them lads that you let
    off with a caution. He went into t’shop down Ovenden and they started pushing
    him around and making sheep noises at him.'
  - 'CATHERINE: Ask Dave to come down and take a statement. I want a crime on for
    a Section 39.'
  - 'CATHERINE: Come on, lad. We don’t bite. I’m gonna nip this in the bud. Go on
    through.'
