- fabula_uuid: cand_evt_scene_05029aed46412069_01
  global_id: null
  title: Ann reveals Lynn Dewhurst’s murder details
  description: Outside Norland Road Police Station, Catherine Cawood and Ann Gallagher
    walk to their cars after a shift. Ann casually recounts a disturbing detail from
    the Lynn Dewhurst murder investigation—how the victim was raped with a broken
    bottle and mutilated internally. Catherine’s professional demeanor fractures as
    she processes the brutality, her voice flattening with suppressed rage. She deflects
    Ann’s assumption of a male perpetrator with clinical precision, citing the weapon’s
    lack of DNA evidence and the power dynamics of rape. The exchange forces Catherine
    to confront the cyclical nature of violence, her own unresolved trauma with Tommy
    Lee Royce surfacing beneath her composed exterior. Ann, still green but determined,
    absorbs the lesson, while Catherine’s lingering silence reveals the depth of her
    disturbance. The moment underscores the show’s thematic focus on systemic brutality
    and the personal cost of Catherine’s professional resilience.
