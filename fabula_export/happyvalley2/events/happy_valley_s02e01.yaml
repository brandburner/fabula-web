    work, heightening the tension between his public persona as a police sergeant
    and his private shame. Ann’s blunt observation—‘You’ve asked me that three times
    now’—further highlights John’s disorientation, making his guilt palpable. This
    scene serves as a critical turning point, revealing John’s vulnerability and setting
    up future consequences as his affair spirals out of control.
