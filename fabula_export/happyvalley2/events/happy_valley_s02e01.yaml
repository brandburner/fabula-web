- fabula_uuid: cand_evt_scene_d29c133321879f80_01
  global_id: null
  title: Chaplain delivers news of Tommy’s mother’s murder
  description: In Tommy’s prison cell, the chaplain delivers the devastating news
    that Tommy’s mother, Lynn Dewhurst, has been murdered—strangled and sexually assaulted—her
    identity confirmed through DNA evidence. The chaplain’s measured, professional
    demeanor contrasts with Tommy’s initial shock, which quickly hardens into emotional
    detachment. Tommy’s refusal to believe the news ("You’re lying") reveals his fragile
    psychological state, while his refusal to speak further betrays his struggle to
    process the trauma. The chaplain’s presence also foreshadows an impending police
    interrogation, escalating the scene’s tension. This moment shatters Tommy’s already
    unstable equilibrium, deepening his grief and fueling his simmering hatred for
    Catherine Cawood, whom he likely blames for his mother’s death. The scene serves
    as a turning point, tying Tommy’s personal tragedy to the broader criminal investigation
    and setting up his potential unraveling in the face of loss and suspicion.
  episode_uuid: ep_sea_ser_happy_valley_s02_e01
  scene_sequence: 28
  sequence_in_scene: 35
  key_dialogue: &id019
  - 'CHAPLAIN: The body of a woman was found in a refuse area next to some flats in
    North Halifax. She’d been strangled. And she’d been sexually assaulted.'
  - 'TOMMY: You’re lying.'
  - 'CHAPLAIN: I’m sorry. I wish I was.'
  - 'CHAPLAIN: Some detectives are going to come and talk to you. Later in the day.
    To ask you some questions. About her. I assume. Her lifestyle, people she spent
    her time with, anybody she owed money to, anybody she didn’t get on with, anything
    that might indicate who would do something like that to her.'
