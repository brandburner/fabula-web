- fabula_uuid: cand_evt_scene_87f5dee8e408faf0_01
  global_id: null
  title: Catherine discovers a murder victim in the bin shed
  description: 'Catherine Cawood, already physically and emotionally drained from
    her earlier confrontation with the sheep-stealing lads, follows her instincts
    toward a foul-smelling bin shed on the housing estate. The stench—organic, unnatural—triggers
    her professional instincts, overriding her exhaustion. Inside, the scene is chaotic:
    overflowing bins, split black bags, and the detritus of neglect. Her methodical
    search is cut short when she spots something buried in the refuse—a human hand,
    or perhaps another grotesque detail—her reaction confirming the discovery of a
    murder victim. The moment is visceral, the horror compounded by the setting: a
    place of discarded waste, now a dumping ground for a human life. This discovery
    isn’t just a plot escalation; it’s a personal provocation. The victim’s connection
    to Tommy Lee Royce—her nemesis—suggests this is no random act but a deliberate
    message, forcing Catherine to confront the dark convergence of her professional
    duty and her unresolved vendetta. The scene marks a turning point, where the investigation
    into sheep thefts spirals into something far more sinister, and Catherine’s past
    collides with her present in a way that demands reckoning.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e01
