  title: Mike directs Dave to secure Lynn Dewhurst’s address
  description: "\n  In the bustling main office of Norland Road Police Station, Mike\
    \ Taylor moves with urgency toward Catherine Cawood’s office, nearly colliding\
    \ with PC Dave, who is just leaving. Mike doesn’t break stride, immediately assigning\
    \ Dave to secure 10 Bateman Street in King’s Cross—the address linked to Lynn\
    \ Dewhurst, the murdered woman found the previous day. The revelation of the address’s\
    \ significance is subtle but charged: this is the first concrete step in connecting\
    \ the sheep theft case to a homicide, and by extension, to Tommy Lee Royce, Catherine’s\
    \ long-standing nemesis. Dave, caught off-guard and still in the process of grabbing\
    \ his hi-vis jacket, admits he missed the briefing due to a phone call. Mike’s\
    \ brusque efficiency contrasts with Dave’s flustered demeanor, underscoring the\
    \ high stakes of the investigation. The exchange is brief but pivotal—it marks\
    \ the moment the case shifts from a local sheep theft to a murder inquiry with\
    \ deep personal implications for Catherine. The tension lies in what’s unsaid:\
    \ Mike’s urgency hints at the gravity of the situation, while Dave’s absence from\
    \ the briefing foreshadows potential gaps in communication or oversight that could\
    \ complicate the investigation further.\n  "
