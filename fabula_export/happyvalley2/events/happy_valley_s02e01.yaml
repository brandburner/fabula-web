  description: 'Physically and emotionally exhausted, Catherine Cawood clutches the
    coping stone—a heavy, symbolic burden—while radioing SHAF in a final, desperate
    attempt to secure a vet for the mauled sheep. Her voice cracks with frustration
    and urgency, revealing the strain of her dual crises: the professional pressure
    of the sheep theft investigation and the personal weight of her past with Tommy
    Lee Royce. The radio exchange underscores her isolation—no immediate support,
    no quick solutions—while the coping stone becomes a tangible metaphor for the
    emotional and moral weight she carries. This moment exposes her unraveling composure,
    signaling the escalation of Calderdale’s dark secrets and her own vulnerability
    in the face of them.'
