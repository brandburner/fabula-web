  title: John hides his crisis from Amanda
  description: In the rain-soaked chaos of Hebden Bridge, Frances Drummond arrives
    at the White Lion Hotel, her presence foreshadowing unseen tensions, while John
    Wadsworth deflects Amanda’s concerns about his exhaustion. When a cryptic landline
    call from Vicky disrupts their conversation, John’s immediate panic reveals the
    depth of his hidden crisis—his affair and the blackmail now threatening to unravel
    his life. Amanda, oblivious to the subtext, remains focused on his physical well-being,
    while John’s evasive behavior underscores his isolation and the escalating stakes
    of his deception. The moment highlights the fragility of his facade and the looming
    danger of Vicky’s exposure, all while Frances’ arrival in town hints at broader,
    darker forces converging on Hebden Bridge.
