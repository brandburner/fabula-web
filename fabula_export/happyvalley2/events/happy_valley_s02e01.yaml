  title: Ann’s suspicions confirmed by CID tensions
  description: Ann Gallagher, a new PCSO still adjusting to the realities of police
    work, voices her growing suspicions about John Wadsworth’s infidelity to Shaf,
    her CID colleague. Shaf dismisses her concerns with a shrug, revealing his own
    resentment toward CID’s elitism and their perceived disdain for uniformed officers.
    The exchange exposes the systemic distrust between CID and uniformed officers,
    framing Ann as a 'plastic police officer' caught between two worlds—her professional
    vulnerability heightened by her inexperience and the department’s internal divisions.
    Meanwhile, John’s clandestine phone call to Vicky, his mistress, confirms Ann’s
    suspicions, underscoring the personal stakes of his affair amid the unfolding
    murder investigation. The scene deepens Ann’s professional isolation while reinforcing
    the broader theme of institutional friction within the police force, where rank
    and perception dictate trust and collaboration.
