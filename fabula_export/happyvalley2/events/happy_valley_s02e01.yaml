  title: Catherine prepares to end the sheep's suffering
  description: 'Catherine Cawood arrives at a small garden where a mauled sheep lies
    dying, its labored breathing a visceral reminder of its agony. The elderly owner,
    oblivious to the severity of the situation, offers tea and leaves Catherine alone
    with the animal. As she surveys the scene, Catherine’s pragmatic instincts kick
    in—she knows the sheep’s suffering must end, but the act of mercy will require
    her to act decisively. Her eyes land on a sharp coping stone embedded in the garden
    wall, and she struggles to pry it loose, her physical effort mirroring the moral
    weight of what she’s about to do. The moment is a quiet but brutal foreshadowing
    of the moral compromises she’ll face in the investigation ahead, where justice
    and cruelty blur. The sheep’s suffering becomes a metaphor for the systemic violence
    she’s sworn to confront, and her struggle to free the stone underscores the cost
    of her duty: to act, even when mercy feels like complicity in the cycle of harm.
    The scene is a study in isolation—Catherine is alone, both physically and emotionally,
    as she prepares to take a life to end suffering, a choice that will haunt her
    as the investigation unfolds.'
