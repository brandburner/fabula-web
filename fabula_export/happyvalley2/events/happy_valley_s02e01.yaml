  title: Catherine reveals sheep theft aftermath
  description: 'In Catherine’s conservatory, she recounts to Clare the brutal, escalating
    consequences of the sheep theft: the botched euthanasia (where the sheep’s suffering
    was prolonged by an incomplete injection), the subsequent mauling by dogs (now
    poisoned by the pentobarbital in the sheep’s bloodstream), and her own concealed
    injuries (a bruised cheek and stitches). The scene underscores the escalating
    violence of the case, Catherine’s physical and emotional toll, and the dark humor
    of the situation—where even a routine euthanasia spirals into chaos. Clare’s reaction
    (shock, disbelief, and dark amusement) mirrors the audience’s own unease, while
    Catherine’s detached delivery hints at her growing desensitization to brutality.
    The revelation of her injuries foreshadows deeper personal stakes in the investigation,
    particularly her confrontation with Tommy Lee Royce’s influence over the events
    unfolding around her. The scene serves as both a turning point (exposing the case’s
    true savagery) and a setup (hinting at Catherine’s next investigative moves).'
  episode_uuid: ep_sea_ser_happy_valley_s02_e01
  scene_sequence: 12
  sequence_in_scene: 15
  key_dialogue:
  - 'CATHERINE: ironic. Way it turned out. Nicky Baxter - the vet from Bolton Brow
    - he’s managed to get over there sooner than he’d anticipated. So. He’s given
    the sheep a fatal injection. I thought I’d finished the poor little sod off, but
    - God knows - I mustn’t have. So. The sheep’s got pentobarbital seeping silently
    through its veins... (she takes her sunglasses off, revealing a bruised cheek
    and two stitches) and guess what. The dogs - whether they’re the same ones who’d
    mauled it in the first place, or a whole new pack - they decide to have another
    go at it. And there’s enough chemicals inside the sheep by this point in the pantomime
    to knock out half of Huddersfield, never mind a handful of feral mongrels over
    in Ovenden.'
  - 'CLARE: Oh my God.'
  - 'CATHERINE: Anyway, I’ve had a tip off by then about a couple of these lads who’d
    nicked the sheep in the first place, so -'
