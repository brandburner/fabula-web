  - 'SHAF: S’true! Same rank as us, same pay as us, we do all the work, they get all
    the glory. Just remember - who caught the Ripper? - two uniforms. And you’re not
    a woodentop. By the way. I’m a woodentop, you’re a plastic police officer.'
