  title: Serial Killer Case Upgraded to Category A
  description: In a tense, high-stakes briefing at Norland Road Police Station, Detective
    Superintendent Andy Shepherd reveals that the sheep theft case is now linked to
    two other murders, confirming the presence of a serial offender. The room erupts
    with murmurs as the investigation is officially upgraded to Category A, signaling
    increased resources and urgency. John Wadsworth, visibly shaken and struggling
    to hide his distress, sits among the officers, his personal turmoil contrasting
    with the professional gravity of the moment. Mike Taylor and DI Jodie Shackleton
    exchange a knowing glance, silently acknowledging that Catherine Cawood can no
    longer be a suspect in the murders—her alibi has been confirmed, and the focus
    shifts to the broader, darker threat at hand. The scene marks a critical turning
    point, escalating the stakes and tying the investigation to Catherine’s fraught
    history with Tommy Lee Royce, whose name looms unspoken but palpable in the room’s
    charged atmosphere.
  episode_uuid: ep_sea_ser_happy_valley_s02_e01
  scene_sequence: 50
  sequence_in_scene: 65
  key_dialogue:
  - 'ANDY: Following the meeting I had yesterday with the Assistant Chief Con and
    the S.I.O.s on the other two investigations, it’s been concluded that there is
    sufficient evidence—more than sufficient evidence—to link this operation with
    Operation Sycamore and Operation Livingston. The upshot therefore is that we are
    now looking at a serial offender.'
  - 'ANDY: What that means in practical terms is that we’re merging this investigation
    with the other two teams looking at the other two murders, and the investigation
    as a whole is now upgraded to Cat A, which means we’ll have more resources and
    quicker decisions.'
  - 'ANDY: You need to be listening, not talking!'
