  - object_uuid: ger_object_9f8fb911f7b0
    description_of_involvement: The split black garbage bags littering the floor of
      the bin shed spill their contents across the ground, creating a chaotic and
      disgusting landscape. They obscure the murder victim’s body, forcing Catherine
      to push through the mess to uncover the horrific truth. The bags symbolize the
      way violence and crime are often hidden in plain sight, buried beneath the mundane
      detritus of everyday life. Their torn and overflowing state also reflects the
      fragility of the systems meant to contain such horrors—whether institutional,
      social, or personal.
    status_before_event: Split open and strewn across the floor, spilling household
