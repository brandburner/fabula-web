  sequence_in_scene: 8
  key_dialogue: &id003
  - 'LITTLE OLD LADY: Do you take milk and sugar?'
  - 'CATHERINE: No. Yes. Milk. Thank you. And yeah, go on, sugar. Two sugars. One
    sugar. Thank you.'
  - 'CATHERINE: ((she mumbles it, like a prayer that will protect her from the consequences
    of doing this evil thing)) I’m sorry, I’m sorry, I am sorry.'
  - 'CATHERINE: ((horrible, nauseating)) It made this noise, it was like... God knows.
    So then I had to do it again. Cos it was still alive. And then... It seemed to
    be all right after that.'
  - 'CLARE: ((she can’t help smiling)) All right as in... dead?'
  - 'CATHERINE: I’m so thrilled that you’re finding this funny.'
