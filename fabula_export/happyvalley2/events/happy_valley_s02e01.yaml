  object_involvements:
  - object_uuid: ger_object_2129e3e02e62
    description_of_involvement: 'Catherine’s smart book is a critical prop in her
      defense, serving as tangible proof of her alibi. She retrieves it from her pocket
      with deliberate urgency, flipping to the page listing her attendance at the
      Child Sexual Exploitation seminar in Bradford on July 14th. The device’s digital
      entries—cold, professional, and verifiable—contrast sharply with the emotional
      chaos of her threats to Lynn. Jodie examines it closely, and while it temporarily
      deflects suspicion, the alibi’s proximity to the murder timeline (a two-week
      window) leaves room for doubt. The smart book is both a shield and a sword:
      it protects Catherine but also highlights the fragility of her position.'
    status_before_event: In Catherine’s pocket, unused until the moment she needs
      to prove her whereabouts. Its entries are up-to-date and professionally maintained.
    status_after_event: Handed to Jodie for inspection, its data now part of the investigative
      record. The seminar listing is verified, but the alibi’s timing remains suspect.
    global_id: ger_object_2129e3e02e62
  - object_uuid: ger_object_582845704006
    description_of_involvement: 'The three mugs of tea on the table create a deceptive
      sense of normalcy, their steam rising in stark contrast to the mounting tension.
      They are a symbolic prop—casual, even mundane—but their presence underscores
      the performative nature of the interview. Catherine and Jodie sip occasionally,
      but the tea does little to ease the friction. For Catherine, the mug is something
      to grip; for Jodie, it’s a tool to maintain the illusion of informality. The
      tea’s warmth belies the cold, hard questions being asked, making the objects
      a quiet but potent metaphor for the scene’s duality: professionalism masking
      personal stakes.'
    status_before_event: Full, placed on the table at the start of the interview.
      Steam rises, suggesting they were recently poured.
    status_after_event: Partially consumed, their levels lower but still present.
      The mugs remain, a silent witness to the interview’s unresolved tension.
    global_id: ger_object_582845704006
