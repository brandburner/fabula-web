  title: Catherine asserts command and integrates new recruit
  description: In a briefing room at Norland Road Police Station, Sergeant Catherine
    Cawood enters to immediate silence, commanding the room’s attention. She introduces
    Ann Gallagher as the new PCSO, pairing her with Shaf while subtly reinforcing
    her authority. The moment is disrupted by Joyce’s departure—a veiled reference
    to Ann’s prior connection to Catherine—and Gorkem’s late arrival, exposing the
    team’s fractured cohesion. Catherine announces the disruption of their deployment
    due to the ongoing murder investigation tied to the body she discovered, setting
    the stage for power dynamics and alliances to unfold. The scene establishes Catherine’s
    leadership style—pragmatic, unfiltered, and prioritizing instinct over procedure—while
    testing Ann’s resilience in the face of Norland’s chaotic reality. The exchange
    foreshadows their evolving professional bond amid the station’s underlying tensions,
    particularly as Catherine’s authority is challenged by Gorkem’s tardiness and
    Sledge’s playful protest. The team’s dynamic is further highlighted by Joyce’s
    departure, which subtly hints at Ann’s past and her connection to Catherine, adding
    layers of complexity to the new recruit’s integration.
