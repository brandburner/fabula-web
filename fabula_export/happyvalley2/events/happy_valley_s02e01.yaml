  title: Catherine spots suspicious van after warning team
  description: After issuing a directive to Annette and Leonie about reporting suspicious
    individuals—particularly those who make them feel threatened or uneasy—Sergeant
    Catherine Cawood notices a small, elderly van speeding past them on Stoneyroyd
    Lane. The vehicle’s erratic behavior and the fact that it disappears quickly trigger
    her instincts, prompting her to attempt memorizing its license plate (FL02 GDK).
    This moment underscores Catherine’s heightened paranoia and professional vigilance
    amid the unfolding criminal investigation, particularly given her past with Tommy
    Lee Royce and the recent murder tied to him. The van’s presence feels deliberate,
    as if someone is watching or lingering, reinforcing the narrative’s tension and
    foreshadowing potential danger. The scene cuts to a later, rain-soaked evening
    in Sowerby Bridge, suggesting a temporal shift that may tie this observation to
    broader, darker developments in the story.
