  title: Catherine admits euthanizing the sheep
  description: 'In the conservatory of Catherine’s home, Clare confronts her sister
    after learning Catherine euthanized a severely mauled sheep to end its suffering.
    Catherine’s blunt, pragmatic explanation—‘They’d mauled it. The dogs had. I had
    to’—reveals her moral calculus: mercy as a necessary act of violence, a choice
    that mirrors her professional life. Clare’s visceral reaction (‘You didn’t’) underscores
    the emotional chasm between them, where Catherine’s pragmatism clashes with Clare’s
    moral discomfort. The exchange exposes Catherine’s willingness to act decisively
    in the face of cruelty, a trait that defines her as both a police officer and
    a woman shaped by Yorkshire’s harsh realities. The moment also hints at the emotional
    toll of her choices, foreshadowing how her professional pragmatism may collide
    with personal consequences later in the story.'
