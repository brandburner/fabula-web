  title: Shepherd links murders and calls out Wadsworth
  description: "\n  In a packed H-MIT briefing room, Detective Superintendent Andy\
    \ Shepherd reveals unsettling parallels between the recent murder and two unsolved\
    \ cases—Ana Vasalescu in Elland and an unidentified woman in Brighouse—suggesting\
    \ a potential serial killer. He prioritizes CCTV and house-to-house searches,\
    \ emphasizing the urgency of the investigation. The briefing is disrupted when\
    \ Shepherd publicly calls out Detective Sergeant John Wadsworth for his distracted,\
    \ note-free demeanor, exposing his uncharacteristic disengagement. The tension\
    \ escalates when DI Jodie Shackleton receives a text identifying the victim as\
    \ Lynn Dewhurst, a name that immediately triggers a reaction from Inspector Mike\
    \ Taylor, who recognizes its significance. The revelation shifts the investigation’s\
    \ focus and foreshadows deeper connections to Catherine Cawood’s past, particularly\
    \ her history with Tommy Lee Royce. The moment underscores the case’s escalating\
    \ stakes, the team’s internal fractures, and the looming threat of a serial killer\
    \ operating in the region.\n  "
  episode_uuid: ep_sea_ser_happy_valley_s02_e01
  scene_sequence: 24
  sequence_in_scene: 30
  key_dialogue:
  - 'ANDY: There are some very obvious similarities between this murder and the murders
    of Ana Vasalescu in Elland five months ago, and the unidentified white adult female
    in Brighouse three months ago. ‘Til I’ve had the full report from the pathologist
    I’m not making any assumptions, but I’m in a meeting with the A.C.C. later today
    to discuss whether we should now be making a formal link.'
  - 'ANDY: John! Are you using divine inspiration over there, or are y’going to start
    taking notes?'
  - 'JODIE: We’ve got an ident from the D.N.A. The victim... is a Lynn Dewhurst. Forty-five
    years old. Address 10 Bateman Street, King Cross. Convictions for soliciting,
    shop lifting, benefit fraud.'
  - 'MIKE: Lynn Dewhurst. You know who that is, don’t you?'
