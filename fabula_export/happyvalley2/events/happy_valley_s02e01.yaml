  title: Clare mocks Catherine’s sheep theft case
  description: In the sunlit conservatory of Catherine’s house, the sisters share
    a moment of levity after a long day. Catherine, still in half-uniform, sips tea
    and smokes a cigarette with Clare, who teases her about the absurdity of investigating
    a sheep theft—especially one involving three drug-addled youths. The exchange
    reveals Clare’s dark humor and Catherine’s weary pragmatism, underscoring the
    mundane yet chaotic nature of rural policing. While the scene appears lighthearted,
    it subtly highlights Catherine’s professional frustrations and the absurdity of
    her daily duties, which contrast with the darker forces (like Tommy Lee Royce’s
    lingering threat) that will soon emerge. The banter also reinforces their sibling
    dynamic, where Clare’s playful ribbing masks deeper concern for Catherine’s well-being
    amid the escalating chaos of her job.
