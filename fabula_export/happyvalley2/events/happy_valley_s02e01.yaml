  title: Lynn Dewhurst’s name triggers Mike’s reaction
  description: "\n  During a high-stakes H-MIT briefing led by Detective Superintendent\
    \ Andy Shepherd, the team is analyzing parallels between the current murder and\
    \ two unsolved cases. The room is tense, with officers focused on CCTV and house-to-house\
    \ searches, but Detective Sergeant John Wadsworth stands out as distracted. Suddenly,\
    \ DI Jodie Shackleton receives a text confirming the victim’s identity: Lynn Dewhurst,\
    \ a 45-year-old woman with a criminal record for soliciting, shoplifting, and\
    \ benefit fraud. The name immediately snaps Mike Taylor’s attention, and his sharp\
    \ reaction—*‘You know who that is, don’t you?’*—signals a critical personal connection.\
    \ The revelation shifts the investigation’s trajectory, linking the murder to\
    \ Tommy Lee Royce’s past and forcing Catherine Cawood’s history into the spotlight.\
    \ The moment is a narrative fulcrum: professional duty collides with Mike’s unspoken\
    \ knowledge, and the room’s focus pivots from procedural details to the looming\
    \ specter of Catherine’s entangled past.\n  "
