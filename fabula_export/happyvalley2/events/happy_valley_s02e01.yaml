  title: Police establish murder investigation site
  description: The discovery of Lynn Dewhurst’s body in the housing estate’s bin shed
    escalates into a full-scale police operation, with a mobile unit and H-MIT (Homicide
    and Major Incident Team) arriving to secure the scene. Sergeant Shaf and his detective
    partner coordinate the response, their presence underscoring the case’s gravity.
    The bin shed remains cordoned off as a crime scene, guarded by a uniformed officer,
    while the arrival of high-ranking investigative personnel signals the official
    launch of the murder inquiry. This moment marks the transition from local police
    handling of a sheep theft to a major criminal investigation, with Catherine Cawood’s
    past ties to Tommy Lee Royce—Lynn’s son—adding personal stakes to the professional
    crisis. The scene’s tension lies in the contrast between the mundane housing estate
    setting and the sudden, violent disruption of a murder, setting the stage for
    deeper conflicts to emerge as the investigation unfolds.
