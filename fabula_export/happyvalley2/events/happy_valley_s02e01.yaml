- fabula_uuid: act_bcc3adf035dc697b
  number: 2
  summary: Following the shocking identification of Lynn Dewhurst, the narrative intensifies,
    focusing on the escalating personal and professional pressures on Catherine and
    John. Catherine undergoes an interview with D.I. Jodie Shackleton, where she reluctantly
    admits to leaving threatening voicemails for Lynn, stemming from Lynn's unauthorized
    contact with Catherine's grandson, Ryan. This places Catherine under official
    scrutiny, despite her history of bravery. Simultaneously, Tommy Lee Royce, incarcerated,
    receives news of his mother's death, immediately suspecting Catherine and fueling
    his deep-seated desire for retribution. In a parallel storyline, John Wadsworth
    attempts to sever ties with his mistress, Vicky Fleming, only for the situation
    to spiral into outright blackmail as Vicky reveals compromising photos and demands
    monthly payments, threatening to expose his double life. The personal stakes for
    Catherine further rise with the death of Helen, a significant emotional blow for
    Clare and Ann, and the unexpected arrival of Daniel, Catherine's son, seeking
    refuge after a marital fallout, adding strain to her already burdened household.
    The act introduces Frances Drummond, an enigmatic figure who visits Tommy in prison,
    professing her love and aligning with his animosity towards Catherine. The act
    concludes with Vicky's explicit blackmail of John, trapping him in a desperate
    situation, and Frances Drummond's ominous presence outside Catherine's home, observing
    Ryan and Daniel, signaling a direct and imminent threat to Catherine's family.
