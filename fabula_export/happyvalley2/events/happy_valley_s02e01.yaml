- fabula_uuid: cand_evt_scene_287ed972c07b175b_01
  global_id: null
  title: Catherine Admits Threatening Lynn Dewhurst
  description: |2-

      In a tense but professionally framed interview at Norland Road Police Station, Detective Inspector Jodie Shackleton methodically questions Sergeant Catherine Cawood about her connection to Lynn Dewhurst, the recently murdered mother of Catherine’s archenemy, Tommy Lee Royce. Catherine, visibly unsettled but maintaining composure, reluctantly reveals that she left two threatening voicemails on Lynn’s answerphone after Lynn—drunk and unhinged—approached Catherine’s grandson Ryan, violating a court order barring Royce’s family from contact. The admission exposes Catherine’s raw emotional vulnerability: her daughter Becky’s suicide, Royce’s rape of her, and her protective fury over Ryan’s safety. Jodie’s probing, though neutral, forces Catherine to confront her own moral compromises—her threats, while legally justified by the court order, now implicate her in the investigation. The scene escalates the narrative’s focus on Catherine’s emotional instability and her hidden ties to the victim, deepening the story’s exploration of vengeance, family, and the blurred line between justice and personal retribution. The revelation also sets up future tension, as Catherine’s alibi (a Child Sexual Exploitation seminar in Bradford) becomes a critical piece of evidence that may either exonerate or further entangle her in the case. The dialogue crackles with subtext: Catherine’s clipped responses and Jodie’s measured persistence create a psychological standoff, where the truth is extracted not through confrontation but through the quiet, relentless pressure of professional duty.

      The event serves as a turning point, shifting the investigation’s lens from Catherine as a potential suspect to a more complex figure—one whose trauma and protective instincts make her both a victim and a possible perpetrator in the eyes of the law. The scene’s emotional weight lies in Catherine’s struggle to articulate her pain without breaking, a struggle that mirrors the broader narrative’s themes of repressed grief and the cost of survival.
