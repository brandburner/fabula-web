  title: Helen’s death shatters the household
  description: 'Catherine and Clare arrive at Helen’s hospice room, their quiet conversation
    about Daniel’s marital troubles abruptly halted by the sight of an empty, neatly
    made bed—Helen is gone. The absence of her cards and flowers confirms the unspoken
    truth: she has died. Clare, closer to Helen, visibly reels from the shock, while
    Catherine’s professional composure cracks under the weight of grief and unresolved
    guilt over past words to Clare. Their fragile domestic stability fractures further
    as Catherine’s focus shifts from Daniel’s crisis to the raw vulnerability of Clare’s
    grief, exposing the household’s precarious emotional state. The orderly’s passing
    presence underscores the finality of Helen’s death, leaving the sisters in stunned
    silence, their shared loss deepening the fractures in their already strained dynamic.'
