    description_of_involvement: Lifeline, the local rehabilitation center, is invoked
      as a flawed but necessary institution in Annette’s life. Catherine references
      it as a potential lifeline, but Annette’s complaints—'It’s full o’ smackheads'
      and 'They’ll have yer sat waiting for hours for nowt'—reveal its systemic failures.
      The organization is represented indirectly through Annette’s frustration, highlighting
      how institutional neglect compounds the struggles of those it claims to help.
      Lifeline’s inefficiency and overcrowding become a barrier to Annette’s recovery,
      underscoring the gap between Catherine’s intentions (to guide Annette toward
      help) and the reality of the system’s limitations. The organization’s presence
      looms as a specter of both hope and disappointment in this moment.
    active_representation: Via Annette’s complaints and Catherine’s mention of it
      as a potential resource, the organization is a specter of institutional failure.
    power_dynamics: Exercising limited authority—Lifeline is positioned as a potential
      ally, but its flaws (overcrowding, long waits) render it nearly useless to Annette
      in her current state.
    organizational_goals:
