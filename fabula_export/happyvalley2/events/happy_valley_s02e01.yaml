    DANIEL: She’s chucked me out.
    CATHERINE: Lucy? Why?
    DANIEL: Nothing’s happened! She’s just got stupid ideas in her head, that’s all.
  - |-
    DANIEL: She reckons she wants a divorce. She won’t talk to me. I keep knocking on t’door. Her dad’s changed the locks! That’s my house. Then he’s been on t’phone making threats.
    CATHERINE: Well... why? What’s happened?
    DANIEL: Ever since Daisy was born, she’s been off her flaming trolley. But now she’s just gone... complete fruit loop.
