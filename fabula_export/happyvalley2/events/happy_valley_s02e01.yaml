      windows amplifies the atmosphere of confinement and emotional turmoil, while
      the steam from the sink (take-away containers) adds a layer of mundane realism
      to the scene. The kitchen’s layout—conservatory door, back door, table, sofa—dictates
      the flow of the event, as characters move in and out, their presence or absence
      shaping the tension.'
