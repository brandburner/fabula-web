  object_involvements:
  - object_uuid: ger_object_a9299d4692a4
    description_of_involvement: Catherine’s latex CSI gloves serve as both a practical
      tool and a symbolic barrier between her and the horrors she encounters. They
      protect her hands from the filth of the overflowing bins and split black bags,
      allowing her to methodically search the refuse without contamination. The gloves
      also underscore her professional role—she is not just a bystander but an investigator,
      compelled to engage with the grotesque to uncover the truth. Their tight, translucent
      fit highlights the tension between her personal revulsion and her duty to preserve
      the crime scene’s integrity.
