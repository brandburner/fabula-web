- fabula_uuid: cand_evt_scene_937f7a848859a625_02
  global_id: null
  title: Serial offender confirmed, case escalated
  description: 'In a packed briefing room at Norland Road Police Station, Detective
    Superintendent Andy Shepherd announces the formal escalation of the sheep theft
    investigation to **Category A**, linking it to two other murders and confirming
    the presence of a **serial offender**. The revelation sends a ripple of tension
    through the room, with officers exchanging glances and murmurs. John Wadsworth,
    visibly shaken and disheveled, struggles to mask his distress, his personal crisis
    (his affair and blackmail) now colliding with the professional urgency of the
    case. Meanwhile, Mike Taylor and DI Jodie Shackleton share a subtle, loaded look—**Catherine
    Cawood’s name is effectively cleared as a suspect** in the murder of Lynn Dewhurst,
    as the timeline and scope of the crimes now extend beyond her possible involvement.
    The scene marks a **structural pivot**: the investigation’s stakes skyrocket,
    resources are mobilized, and Catherine’s personal entanglement with Tommy Lee
    Royce becomes the investigation’s linchpin, shifting the team’s focus toward a
    more collaborative (if still fraught) dynamic with her. The tone is one of **controlled
    urgency**, with Andy’s authoritative voice cutting through the chatter to demand
    focus, underscoring the gravity of the situation and the need for immediate action.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e01
  scene_sequence: 50
  sequence_in_scene: 66
  key_dialogue:
  - 'ANDY: Following the meeting I had yesterday with the Assistant Chief Con and
    the S.I.O.s on the other two investigations, it’s been concluded that there is
    sufficient evidence—more than sufficient evidence—to link this operation with
    Operation Sycamore and Operation Livingston. The upshot therefore is that we are
    now looking at a serial offender.'
  - 'ANDY: ((calling above the din)) You need to be listening, not talking!'
