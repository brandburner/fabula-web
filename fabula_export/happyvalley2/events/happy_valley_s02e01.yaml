- fabula_uuid: cand_evt_scene_ac0e2761d1e7a747_01
  global_id: null
  title: Catherine escalates Daryl’s harassment to a crime
  description: "\n  In the Norland Road Police Station reception, Catherine Cawood—already\
    \ strained by the day’s mounting pressures—is interrupted by Alison Garrs, who\
    \ arrives with her visibly shaken son, Daryl. The boy bears a fresh contusion\
    \ on his forehead, a physical mark of the retaliation he suffered after Catherine\
    \ previously cautioned the sheep-rustling youths. Alison, a woman unaccustomed\
    \ to police stations, recounts how the same lads who were let off with a caution\
    \ ambushed Daryl in a shop, mocking him with sheep noises and pushing him around.\
    \ Catherine immediately recognizes the escalation: this is no longer a minor incident\
    \ but a targeted act of intimidation, one that demands formal intervention.\n\n\
    \  The scene hinges on Catherine’s professional instinct clashing with her personal\
    \ exhaustion. She’s acutely aware of her own mood—she doesn’t want to inflict\
    \ her stress on others—but the sight of Daryl’s bruised face and Alison’s near-tears\
    \ pushes her into decisive action. She bypasses the usual procedural hesitation,\
    \ ordering PC Dave to take a statement and escalating the case to a **Section\
    \ 39 crime** (a serious public-order offense). Her decision isn’t just procedural;\
    \ it’s a calculated escalation that drags the station deeper into the conflict\
    \ with Tommy Lee Royce’s network. By formalizing the harassment, Catherine signals\
    \ her refusal to back down, even as it risks further retaliation. The moment also\
    \ deepens Daryl’s entanglement in the station’s orbit, transforming him from a\
    \ passive victim into a reluctant participant in the unfolding power struggle.\
    \ The subtext is clear: Catherine’s commitment to justice is now a direct challenge\
    \ to Royce’s influence, and the station’s resources will be stretched to defend\
    \ it.\n  "
  episode_uuid: ep_sea_ser_happy_valley_s02_e01
