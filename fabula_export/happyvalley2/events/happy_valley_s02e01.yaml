  title: Ann’s Resolve Amid Grief
  description: In the quiet, emotionally charged atmosphere of her mother Helen’s
    hospice room, Ann Gallagher sits alone, her tears reflecting both profound sorrow
    and quiet strength. The camera lingers on her face, capturing the tension between
    her grief and an unspoken determination—she is resolved to begin her new job as
    a PCSO the next day, despite the weight of her mother’s impending death. This
    moment underscores Ann’s resilience, framing her personal struggle as a counterpoint
    to the larger professional and moral crises unfolding around her, particularly
    Catherine’s investigation into Tommy Lee Royce. The scene subtly foreshadows Ann’s
    potential role as a stabilizing force amid the chaos, while her grief humanizes
    the broader narrative’s stakes, emphasizing the cost of duty in the face of loss.
    The visual contrast between Ann’s vulnerability and her steely resolve creates
    a poignant tension, reinforcing her character’s complexity and the emotional stakes
    of the story.
