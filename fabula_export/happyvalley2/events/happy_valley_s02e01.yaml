  title: Catherine’s no-nonsense initiation of Ann
  description: Sergeant Catherine Cawood escorts rookie PCSO Ann Gallagher down the
    station stairs, delivering a rapid-fire, darkly humorous crash course in Norland’s
    unspoken rules. Her advice—ranging from protocol shortcuts ('Forget everything
    they taught you at training school') to personal dynamics ('Sledge fancies himself
    with the ladies')—blends streetwise mentorship with a sarcastic team dynamic,
    establishing Catherine’s leadership style as pragmatic, unfiltered, and instinct-driven.
    The exchange subtly tests Ann’s resilience, foreshadowing their evolving professional
    bond amid the station’s underlying tensions. Catherine’s reference to Ann’s past
    bravery ('the way you refused to leave that cellar without me') reveals her awareness
    of Ann’s character, while her emphasis on 'trust your instincts' frames their
    relationship as one built on mutual respect for grit over procedure. The moment
    also underscores Norland’s chaotic reality, where survival depends on adaptability
    and quick judgment—qualities Ann will need as she navigates her first day amid
    personal grief and professional scrutiny.
  episode_uuid: ep_sea_ser_happy_valley_s02_e01
  scene_sequence: 22
  sequence_in_scene: 27
  key_dialogue:
  - 'CATHERINE: Forget everything they taught you at training school because none
    of it works in the real world. Don’t call me Catherine in front of the others,
    it’s just Sarg. Not Ma’am.'
  - 'CATHERINE: If you don’t understand something ask me, ask her, ask anyone, but
    if you get an answer you don’t like don’t go asking twenty other people. Trust
    your instincts. In my book there’s two instincts - flight or fight - and I know
    which one you’ve got from the way you refused to leave that cellar without me
    eighteen months since, so have faith in yourself.'
  - 'CATHERINE: Good morning! You lucky people.'
