  title: Grief fractures and binds the group
  description: 'In the sterile, emotionally charged atmosphere of the hospice visitor’s
    room, the raw weight of Helen’s death forces the group into a moment of unguarded
    vulnerability. Ann, overwhelmed by grief, collapses into Catherine’s arms, her
    sobs a release of the pain she couldn’t express in front of her father. Catherine,
    usually composed, is visibly moved—her own tears reveal the depth of her care
    for Ann and the shared burden of loss. Meanwhile, Nev, struggling with his own
    grief, offers Clare a hesitant but meaningful hug, acknowledging the bond she
    shared with Helen. The scene underscores the fragility of the group’s connections:
    Ann’s dependence on Catherine as a surrogate emotional anchor contrasts with Nev’s
    quiet, self-conscious attempt to comfort Clare, exposing how grief reshapes even
