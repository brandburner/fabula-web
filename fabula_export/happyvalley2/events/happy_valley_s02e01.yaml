      five weeks prior. The diary symbolizes her struggle to piece together her past,
      mirroring her broader attempts to maintain control over her life amid professional
      and personal chaos. Its gaps—''inevitably there are gaps, days off when there’s
      nothing written anywhere''—reflect her own fragmented state, as well as the
      unreliability of memory under stress. The diary’s role is twofold: it grounds
      the scene in Catherine’s immediate concerns (her alibi reconstruction) and foreshadows
      the larger narrative of unresolved trauma and the need for truth.'
