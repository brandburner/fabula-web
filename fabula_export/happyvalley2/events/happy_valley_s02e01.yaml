  title: Ryan’s unfiltered language reveals Catherine’s influence
  description: During a lighthearted game of *King of Tokyo*, Ryan’s playful repetition
    of Catherine’s crude phrase—*‘Eat shit and die’*—exposes how deeply her unfiltered,
    confrontational manner has seeped into his world. Daniel’s reaction—first amused,
    then mildly reproachful—highlights the tension between Ryan’s admiration for Catherine’s
    toughness and the unspoken concern over her toxic legacy. The moment isn’t just
    about the words; it’s a subtle reminder of how Catherine’s absence still shapes
    Ryan’s behavior, even in her son’s presence. The exchange underscores the generational
    ripple effect of Catherine’s influence, where her bluntness becomes normalized,
    and the line between bonding and corruption blurs. The scene’s casual setting
    contrasts with the darker implications of Ryan’s language, reinforcing the story’s
    theme of inherited trauma and the difficulty of breaking free from familial patterns.
