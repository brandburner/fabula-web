- fabula_uuid: cand_evt_scene_3c1790933492a6ea_01
  global_id: null
  title: Catherine Warns Vulnerable Women
  description: 'During a detour home, Sergeant Catherine Cawood encounters two drug-addicted
    women—Annette (older, weary) and Leonie (younger, cheerful)—loitering near the
    railway viaduct. Recognizing them, she approaches with a bag of sandwiches, offering
    food while casually checking on Annette’s progress at Lifeline, a rehab center.
    The women, though wary, are familiar with Catherine’s pragmatic but compassionate
    demeanor. Leonie’s playful hunger and Annette’s protective fondness for her contrast
    with their shared vulnerability. Catherine abruptly shifts tone, warning them
    about a serial killer targeting women like them—three victims already, with brutal
    details left to their imagination. Her urgency underscores the escalating threat,
    while her blunt delivery reveals her dual role: a cop hardened by duty but still
    capable of quiet care for the marginalized. The moment subtly contrasts her professional
    rigidity with this rare, unguarded compassion, reinforcing her complexity as a
    character caught between duty and humanity in a darkening world.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e01
  scene_sequence: 65
  sequence_in_scene: 82
  key_dialogue:
  - 'CATHERINE: Hello ladies.'
  - 'ANNETTE: Oh... I don’t like going. It’s full o’ smackheads.'
  - 'CATHERINE: Are you hungry? ((holds open the supermarket bag))'
  - 'CATHERINE: Listen. You need to know. We’ve got a bit of a weirdo doing the rounds.
    He’s killed three girls. Women. One in Elland, one in Brighouse, then another
    one two days ago up Ovenden. There’s going to be an announcement later this aft.
    He’s targeting vulnerable people like yourselves. All right? And he’s not just
    killing ‘em, he’s doing stuff to ‘em - I can’t really tell you what, I’ll leave
    it to your imagination - but it’s not much fun, so you need to be aware, all right?'
