  global_id: null
  title: Deployment Threatened by Murder Investigation
  description: 'The briefing room falls silent as Sergeant Catherine Cawood enters,
    immediately asserting her authority by introducing the new PCSO, Ann Gallagher,
    and pairing her with Shaf. The team’s casual camaraderie shifts abruptly when
    Catherine reveals the murder investigation tied to the body she discovered—now
    involving H-MIT (Homicide and Major Investigation Team)—has disrupted their deployment
    plans. The team’s frustration surfaces as Catherine announces they may be pulled
    into house-to-house searches with the Operational Support Unit (OSU), a task that
    clashes with their usual duties. Gorkem’s late arrival, attributed to his teething
    baby, briefly lightens the tension, but Catherine’s blunt delivery underscores
    the gravity of the situation: the case’s personal stakes (linked to her archenemy,
    Tommy Lee Royce) and the team’s forced collaboration with OSU create friction.
    The scene pivots from routine introductions to a high-stakes operational crisis,
    exposing the team’s internal dynamics and Catherine’s dual role as both leader
    and suspect in the unfolding investigation.'
