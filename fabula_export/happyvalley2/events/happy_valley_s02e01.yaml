- fabula_uuid: cand_evt_scene_63733c266b80035f_01
  global_id: null
  title: Tommy’s Grief Turns to Accusation
  description: "\n  In the sterile visiting room of Gravesend Prison, Tommy Lee Royce—already\
    \ shattered by the news of his mother’s murder—unleashes his raw grief and rage\
    \ at Catherine Cawood, whom he blames for orchestrating the killing. His accusations\
    \ are laced with paranoia and a twisted logic: he claims Catherine threatened\
    \ his mother over the phone, then had her murdered in a way that would deflect\
    \ suspicion from a woman. Frances Drummond, present throughout, listens intently,\
    \ her empathy for Tommy deepening as his vulnerability exposes the depth of his\
    \ trauma. When Tommy breaks down, Frances seizes the moment to declare her love\
    \ for him, a confession that feels both genuine and calculated—her alignment with\
    \ his hatred for Catherine now complete. The scene marks a critical pivot: Tommy’s\
    \ emotional collapse forces Catherine’s role as a suspect into sharper focus,\
    \ while Frances’s confession introduces a fragile, humanizing counterpoint to\
    \ the escalating violence, hinting at her own dangerous devotion to Tommy’s cause.\n\
    \  "
