  title: Catherine refuses alibi demands
  description: Catherine Cawood enters Mike Taylor’s office expecting to be cleared
    of suspicion in Lynn Dewhurst’s murder, only to learn the case has been reclassified
    as a serial killer investigation. Mike, now acting as a bureaucratic intermediary,
    asks her to provide alibis for the other victims to eliminate her as a suspect.
    Catherine’s initial sarcasm—‘So I take it I’m off the hook’—quickly curdles into
    outrage as she realizes she’s still being treated as a person of interest. Mike’s
    procedural justifications (‘It’s routine, it’s procedure’) clash with her visceral
    reaction (‘It’s wank, it’s toss’), exposing the institutional distrust eroding
    her authority. Her refusal to engage (‘No’ to the dates, ‘No’ to the email) isn’t
    just defiance—it’s a rejection of the system’s dehumanizing logic, reinforcing
    her isolation and the moral tension between her professional duty and her personal
    integrity. The scene escalates her professional tension and underscores her growing
    disillusionment with the police force’s priorities.
