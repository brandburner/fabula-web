  global_id: null
  title: John’s panicked cover-up after a missing night
  description: John Wadsworth jolts awake in his car outside the police station, disoriented
    and panicked, with no memory of how he arrived there. His phone reveals a cascade
    of missed calls and increasingly frantic texts from Amanda, exposing his absence.
    As colleagues arrive for the morning briefing, John scrambles to call home, his
    voice laced with guilt and desperation. The scene underscores his moral unraveling—his
    affair with Vicky, the blackmail, and the professional chaos of the sheep theft/murder
    case—all converging in this moment of raw vulnerability. His frantic attempts
    to conceal his whereabouts reveal a man drowning in lies, where every word to
    Amanda deepens the chasm between his public persona and private collapse. The
    tension between his personal crisis and the unfolding investigation heightens,
    foreshadowing the unraveling of both his marriage and his career.
  episode_uuid: ep_sea_ser_happy_valley_s02_e01
