  title: Amanda Confronts John’s Alibi
  description: 'In the Wadsworth kitchen, Amanda—dressed for her midwifery shift—interrogates
    John about his unexplained absence overnight. The children bustle around them,
    oblivious to the tension. John’s flimsy excuse—that he fell asleep at his desk
    after working late—is met with Amanda’s skeptical silence. Though she outwardly
    accepts his explanation to avoid escalating conflict, her hesitation reveals her
    lingering doubt. The scene underscores the fragility of their marriage, with John’s
    deception (known to the audience) creating a charged undercurrent. His physical
    and emotional disorientation—contrasting with his attempt to project normalcy—hints
    at the deeper crisis unfolding in his personal life, which may later intersect
    with the broader criminal investigation. The moment serves as a microcosm of the
    series’ central tension: the erosion of trust in both personal and professional
    spheres.'
