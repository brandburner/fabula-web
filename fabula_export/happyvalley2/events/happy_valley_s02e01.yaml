  title: John’s disoriented collapse in the inn
  description: John Wadsworth regains consciousness in an unfamiliar inn bedroom,
    naked and disoriented, with no memory of how he arrived. His panic escalates as
    he searches for his clothes and finds only a pink feather on the bed—a subtle
    but ominous clue to his lost night. When he attempts to leave, his physical and
    mental state collapses again, leaving him unconscious. The scene underscores his
    vulnerability, the consequences of his affair with Vicky, and the looming threat
    of exposure. His inability to function highlights the unraveling of his carefully
    constructed double life, while the inn setting—impersonal and transient—mirrors
    his moral disintegration. The collapse isn’t just physical; it’s a narrative turning
    point, foreshadowing the professional and personal reckoning to come as his lies
    catch up with him.
