      engaging with it.
    institutional_impact: Reinforces the theme of systemic failure—even well-intentioned
      organizations like Lifeline are stretched thin, leaving individuals like Annette
      and Leonie with few viable options.
    internal_dynamics: Overcrowding and underfunding create a cycle of frustration
      for users, making recovery feel like an unattainable goal.
