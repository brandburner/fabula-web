    emotional_state: A mix of visceral horror and professional resolve—her exhaustion
      is momentarily overridden by the adrenaline of discovery, but the weight of
      what she’s found lingers beneath the surface, hinting at deeper personal stakes.
    goals:
    - To identify the source of the unnatural stench and determine if it’s related
      to her ongoing investigation
    - To preserve the integrity of the potential crime scene while assessing the severity
      of the discovery
    what_happened: Catherine Cawood, visibly exhausted from her earlier confrontation,
      is drawn to the bin shed by an unnatural stench. She pulls open the door, recoils
      slightly at the foul odor, and snaps on latex CSI gloves before stepping into
      the chaotic mess of overflowing bins and split black bags. Her methodical search
      through the refuse is cut short when she spots something horrific—a human hand
      or another grotesque detail—buried in the garbage. Her reaction is one of visceral
      horror, but her professional instincts kick in, confirming the discovery of
      a murder victim. The moment is charged with tension, as the setting amplifies
      the grotesque nature of the find.
    observed_status: Catherine Cawood, visibly exhausted from her earlier confrontation,
