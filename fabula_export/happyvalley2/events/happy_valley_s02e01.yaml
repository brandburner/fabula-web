  title: Sheep theft reveals rural ignorance
  description: 'In the grimy, timeworn living room of Far Sunderland Farm, Catherine
    Cawood questions Alison Garrs and her son Daryl about recent sheep thefts. Alison,
    a hardened farmer, assumes the thieves—likely drug-addled youths from the nearby
    estate—are stealing the sheep for meat or resale. Her dismissive tone (''Sell
    ''em. Eat ''em. God knows how.'') underscores her worldview: rural life is a constant
    battle against ignorance and exploitation. Daryl, usually reticent, interjects
    with technical precision, correcting his mother by identifying the stolen sheep
    as ''gimmers''—young breeding ewes, not meat animals. His quiet assertion (''They’re
    stupid'') reveals both his frustration with outsiders'' ignorance and his own
    quiet competence. The exchange exposes a deeper tension: the theft isn’t just
    petty crime, but a symptom of systemic disconnect between rural communities and
    urban outsiders. Catherine’s probing questions (''And... what d’you think it is
    they do with ‘em when they’ve got ‘em?'') serve dual purposes—gathering facts
    for her investigation while subtly testing the Garrs’ knowledge of their own livelihood.
    The scene foreshadows the broader criminal dynamics at play, where exploitation
    (of land, animals, and people) is the norm, and where Catherine’s role as a mediator
    between these worlds will be tested. The Garrs’ reactions—Alison’s weary cynicism,
    Daryl’s reluctant expertise—hint at the farm’s precarious position: a place where
    survival depends on both resilience and vulnerability to outside forces.'
