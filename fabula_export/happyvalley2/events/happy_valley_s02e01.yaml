  title: John deflects Vicky’s call under Ann’s scrutiny
  description: Outside Oswald’s Department Store, John Wadsworth takes a tense phone
    call from his mistress Vicky during his workday. His clipped, evasive responses—‘Can
    I ring you back? I’m right in the middle of something’—betray his guilt, while
    his repeated assurances (‘I will. I will, I will’) ring hollow, revealing his
    desperation to control the conversation. Ann Gallagher, observing from nearby,
    picks up on the personal, strained tone, her suspicion deepening as John abruptly
    ends the call. His immediate deflection—‘D’you fancy a cup o’ tea?’—serves as
    a transparent attempt to redirect attention, underscoring his fragility under
    pressure. The moment exposes the unraveling of his double life, where professional
    composure and personal secrecy collide, and Ann’s growing awareness of his deception
    becomes a ticking time bomb for both their careers. The exchange also foreshadows
    the escalating consequences of his affair, as Vicky’s insistent tone (‘Make sure
    you do’) hints at her own unraveling patience and the blackmail threat looming
    over him.
