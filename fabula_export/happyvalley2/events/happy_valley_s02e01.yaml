  description: During a routine house-to-house inquiry with Ann, John Wadsworth’s
    professional composure unravels when a text from his mistress Vicky interrupts
    their conversation. His delayed response, visible discomfort, and apologetic glance
    at Ann betray his moral conflict, exposing the fragility of his dual life. The
