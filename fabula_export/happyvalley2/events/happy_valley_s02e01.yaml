  title: Catherine processes Lynn Dewhurst’s murder
  description: After parting ways with Ann outside the Norland Road Police Station,
    Catherine is left alone with the visceral details of Lynn Dewhurst’s brutal murder—rape
    and mutilation with a broken bottle. Ann’s graphic description triggers Catherine’s
    suppressed memories of Tommy Lee Royce’s violence, forcing her to confront the
    cyclical nature of brutality. Though she maintains a professional demeanor, her
    flat, distant tone reveals her deep disturbance at being even peripherally linked
    to the crime. The moment marks a turning point where Catherine’s past trauma resurfaces,
    threatening to derail her professional composure and personal stability. Her lingering
    presence outside the station, lost in thought, underscores the emotional weight
    of the revelation and her internal struggle to reconcile the horror with her duty
    as a police officer.
