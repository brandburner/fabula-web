  description: 'In the NGA boardroom, Nev confronts Sean Balmforth, a belligerent
    employee who damaged property during a job. Nev delivers a firm but weary dismissal,
    citing Sean’s repeated failures to take accountability and his destructive behavior.
    Sean’s attempt to justify his actions—blaming the clients for provoking him—falls
    flat, and Nev’s frustration boils over into a lecture on basic humility. The exchange
    reveals Nev’s exhaustion with Sean’s defiance, but the moment shifts when Sean,
    in a rare display of genuine concern, asks about Helen Gallagher. The question
    momentarily disarms Nev, who hesitates, his resolve wavering as he recalls Helen’s
    kindness and Sean’s unexpected connection to her. The pause underscores Nev’s
    moral conflict: his duty to uphold professional standards clashes with the fragility
    of Helen’s deteriorating health and the unexpected humanity Sean briefly reveals.
    Ultimately, Nev reaffirms his decision to fire Sean but leaves the boardroom visibly
    shaken, his thoughts returning to Helen’s bedside, where his own emotional vulnerabilities
    lie unaddressed. The scene exposes the tension between institutional rigor and
    personal compassion, with Sean’s fleeting humanity complicating Nev’s black-and-white
    judgment and foreshadowing the emotional toll Helen’s condition will take on him.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e01
  scene_sequence: 36
  sequence_in_scene: 44
  key_dialogue: &id031
  - 'NEV: What am I going to do with you, Sean lad? Eh? I’ve thought about this long
    and hard, and the upshot is, I’m sorry, but I’m going to have to let you go.'
  - 'SEAN: It were them that started off being rude and swearing, not me—'
  - 'NEV: You damaged their wall, you churned up their garden with a seven-ton truck,
    d’you think they’re going to come out and say thank you? Just a bit of humility
    when you’ve done something like that. Is all that’s required.'
  - 'SEAN: How’s Mrs. Gallagher?'
