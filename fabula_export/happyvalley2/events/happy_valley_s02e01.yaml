acts:
- fabula_uuid: act_b145f2761ad1296d
  number: 1
  summary: The episode opens with Sergeant Catherine Cawood reflecting on a mundane
    yet grim sheep rustling case, which quickly escalates from a single mauled sheep,
    which she is forced to humanely dispatch, to the unsettling discovery of three
    poisoned dogs. This initial sequence efficiently establishes Catherine's pragmatic,
    resilient character and highlights the harsh, often unpleasant realities of her
    job in the rural Calder Valley. Concurrently, the narrative introduces Sergeant
    John Wadsworth, whose seemingly normal, bustling family life is immediately undercut
    by the revelation of a clandestine affair. This secret life is exposed through
    a threatening text message from his mistress, Vicky Fleming, hinting at a dangerous
    and unstable personal entanglement that contrasts sharply with his public persona.
    The central conflict ignites when Catherine, following a disturbing and pervasive
    smell, discovers a severely decomposed body in a bin shed. This gruesome find
    becomes the episode's inciting incident, immediately propelling the plot forward
    and raising the stakes. The act culminates in the shocking revelation that the
    victim is Lynn Dewhurst, the mother of Catherine's archenemy, Tommy Lee Royce.
    This news immediately transforms a routine murder investigation into a deeply
    personal and unsettling ordeal for Catherine, linking the present crime directly
    to her traumatic past and setting a foreboding tone for the unfolding events of
    the series. The introduction of Ann Gallagher as a new PCSO and the ongoing decline
    of Helen's health also begin to weave additional personal threads into the narrative
    tapestry, foreshadowing future emotional developments.
