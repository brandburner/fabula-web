    JODIE: Did you recognise her?
    CATHERINE: At the scene? No no, the face was gone, it could’ve been a lad for all I knew. Soon as I realised what I was looking at I got out of there and secured it.
  - 'CATHERINE: He wasn’t the father, he raped her, he raped my daughter. ... Lynn
    found this out about eighteen months ago - that Royce was Ryan’s biological...
    [whatever]. Then four, five, six weeks ago down in Hebden, Ryan came home saying
    he’d met this woman, this drunk woman, outside the shop telling him that she was
    his grandmother. ... I knocked on at her address - with the intention of warning
    her off - but she wasn’t in, so - or she wasn’t opening the door - so I left a
    couple of messages. On her answer machine. Messages which may have sounded threatening,
    and which I assume you’ve got hold of.'
  - |-
    JODIE: What did you say in these messages?
    CATHERINE: Warned her to keep away from him. I said if she didn’t stay away from him, she’d regret it. I said if she came anywhere near Ryan again, there’d be consequences. Which there would be - as I say - there’s a court order.
