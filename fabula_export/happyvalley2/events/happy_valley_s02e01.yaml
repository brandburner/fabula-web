  title: Vet delay frustrates sheep theft investigation
  description: "\n  Catherine Cawood’s investigation into the sheep theft hits a critical\
    \ procedural snag when Constable Shaf delivers frustrating news: the only available\
    \ vet, Mr. Baxter, cannot examine the stolen animals until 16:00 due to a packed\
    \ surgery schedule. This delay forces Catherine to confront the tension between\
    \ bureaucratic constraints and the escalating urgency of her case, where forensic\
    \ evidence could be lost or compromised. The bureaucratic hurdle underscores the\
    \ precarious balance between routine police work and the darker, more personal\
    \ stakes of the unfolding mystery. Catherine’s internal reaction—expressed through\
    \ a muttered expletive—reveals her mounting frustration and the pressure she feels\
    \ to resolve the case before evidence deteriorates or the perpetrators cover their\
    \ tracks. The delay also highlights the fragility of her professional composure,\
    \ as she grapples with the emotional weight of the investigation while navigating\
    \ institutional limitations.\n  "
