    evasive, defensive demeanor immediately signals trouble—he’s been kicked out by
    Lucy, who wants a divorce. Though he dismisses her claims as irrational, his refusal
    to elaborate and his emotional volatility (embarrassment, anger, wretchedness)
    betray deeper issues, likely tied to his infidelity (later revealed to involve
    Laura Robertshaw). Catherine’s guarded acceptance of his stay—banishing him to
    the sofa—exposes her own reluctance to engage with his problems, while the arrival
    of Clare and Ryan transforms the private marital crisis into a public family spectacle.
    The scene underscores Daniel’s fragility, Catherine’s strained maternal role,
    and the Cawoods’ fractured unity, foreshadowing how this domestic rupture will
    intersect with the looming professional chaos (e.g., Tommy Lee Royce’s threats,
    John Wadsworth’s collapse). The moment’s tension lies in what’s *unsaid*: Daniel’s
    affair, Lucy’s justified anger, and Catherine’s inability to confront her son’s
    flaws without enabling them.'
