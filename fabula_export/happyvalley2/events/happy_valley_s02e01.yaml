  object_involvements:
  - object_uuid: ger_object_7fe09743645b
    description_of_involvement: 'Catherine’s elderly Ford serves as both a practical
      tool and a symbolic extension of her character. Its arrival marks her detour—a
      deliberate choice to engage with Annette and Leonie rather than heading straight
      home. The car’s worn condition mirrors Catherine’s own resilience: it’s not
      flashy or reliable in the conventional sense, but it gets her where she needs
      to go, just as she does for those she protects. Its presence underscores her
      role as an intermediary between the institutional world (the police station)
      and the marginalized (the women by the viaduct). The car remains running in
      the background, a silent witness to the exchange, its engine a low hum of urgency
      beneath the conversation.'
    status_before_event: Parked outside Norland Road Police Station, engine off, carrying
      Catherine and her supermarket bag of sandwiches.
    status_after_event: Still parked by the viaduct, engine idling, as Catherine delivers
      her warning and prepares to leave.
    global_id: ger_object_7fe09743645b
  - object_uuid: ger_object_bde75579d796
    description_of_involvement: 'The sandwich packs are a tangible manifestation of
      Catherine’s compassion—a small, practical act of care in a world that offers
      these women little. She doesn’t ask which they prefer or engage in polite negotiation;
      she simply offers them all, recognizing that their hunger is immediate and their
      choices are limited. The sandwiches become a catalyst for the interaction, breaking
      the ice and allowing Catherine to transition from casual conversation to her
      urgent warning. Leonie’s playful critique of the tuna and sweetcorn filling
      humanizes the moment, turning a mundane object into a symbol of both their shared
      vulnerability and Catherine’s quiet defiance against the system that ignores
      them. The sandwiches are consumed, but their impact lingers: a fleeting sense
      of care in an otherwise uncaring world.'
    status_before_event: Sealed in a supermarket carrier bag, untouched, carried by
      Catherine from the police station.
    status_after_event: Partially consumed, the remaining sandwiches left with Annette
      and Leonie as Catherine departs.
    global_id: ger_object_bde75579d796
  location_involvements:
  - location_uuid: ger_location_0056366b521d
    description_of_involvement: The Stoneyroyd Lane Railway Viaduct looms over the
      interaction like a silent sentinel, its towering brick arches a physical manifestation
      of the women’s isolation. The viaduct’s height and scale dwarf the characters,
      emphasizing their smallness in the face of larger, indifferent systems (the
      police, society, the serial killer). The trains passing overhead create a rhythmic,
      almost ominous backdrop, their distant roars a metaphor for the world moving
      on while these women are left behind. The viaduct’s shadows stretch long and
      dark, mirroring the threats that lurk just out of sight. It’s a place of transient
      refuge, where Catherine’s warning feels even more urgent—there’s nowhere to
      hide here, no escape from the dangers she describes.
    observed_atmosphere: Oppressive and isolating—the viaduct’s scale makes the women
      feel exposed, while the train noises create a sense of inevitable motion, as
      if time and danger are always approaching.
    functional_role: Backdrop and metaphor for the women’s vulnerability, a place
      where they are visible to predators but invisible to help.
    symbolic_significance: Embodies the structural neglect these women face—they are
      literally and figuratively in the shadows of society’s infrastructure.
    access_restrictions: Open to anyone, but offers no protection or privacy. The
      women are exposed to both Catherine’s care and the killer’s gaze.
    key_environmental_details:
    - The towering brick arches of the viaduct, their shadows stretching across the
      pavement.
    - The distant, rhythmic roar of trains passing overhead, a constant reminder of
      a world in motion.
    - The worn, graffiti-marked walls, a canvas for the invisible marks of those who
      pass through.
    - The cold, hard ground where Annette and Leonie sit, a far cry from any sense
      of comfort.
    global_id: ger_location_0056366b521d
  organization_involvements:
