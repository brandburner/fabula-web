  global_id: null
  title: Catherine learns victim is Tommy Royce’s mother
  description: "\n  After a routine briefing at Norland Road Police Station, Mike\
    \ Taylor intercepts Catherine Cawood on the stairs to deliver a devastating revelation:\
    \ the murder victim she discovered during the sheep theft investigation is Lynn\
    \ Dewhurst, the mother of Tommy Lee Royce—Catherine’s long-standing archenemy.\
    \ The news visibly unsettles Catherine, whose reaction suggests a deeper, unresolved\
    \ connection to the Royce family beyond professional animosity. Mike casually\
    \ mentions that H-MIT (Homicide and Major Investigation Team) will need to revisit\
    \ her initial account, subtly pressuring her to disclose any prior knowledge of\
    \ the victim. Catherine’s follow-up question about the time of death reveals her\
    \ growing unease, as the timeline implicates her indirectly in the case’s timeline.\
    \ The scene lingers on her disturbed expression, signaling that this revelation\
    \ will force her to confront buried history and potentially compromise her professional\
    \ integrity. The moment marks a critical turning point, where personal and professional\
    \ stakes collide, setting up Catherine’s internal conflict over whether to disclose\
    \ her past with the Royces to her colleagues.\n  "
