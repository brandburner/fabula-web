  title: John’s Clandestine Call to Vicky
  description: 'While Ann and Shaf exchange cynical banter about CID’s elitism and
    Ann’s growing suspicions about John’s infidelity, John slips away to make a covert
    phone call to Vicky. His evasive tone—‘It’s wall-to-wall. Honestly. I’ve not had
    two minutes to myself’—confirms Ann’s fears and underscores his professional unraveling.
    The call is brief but loaded: John’s desperation to maintain secrecy mirrors the
    broader narrative tension between personal betrayal and institutional distrust,
    while Vicky’s terse ‘Hello’ hints at her own simmering resentment. This moment
    solidifies Ann’s resolve to investigate John’s behavior, deepening the parallel
    between his marital crisis and the murder investigation’s moral decay. The scene’s
    duality—Ann’s professional vulnerability and John’s personal corruption—reinforces
    Catherine’s world as one where personal and professional failures intertwine.'
