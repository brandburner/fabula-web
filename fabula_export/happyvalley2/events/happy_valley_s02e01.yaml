    that had his mind on higher things. Apparently. Lynn Dewhurst. He hadn’t just
    strangled her, whoever did it. He’d raped her. With a bottle. A broken bottle.
    Like... mutilated her. Internally.'
  - 'CATHERINE: Why do you assume it’s a man? It’s not as uncommon as you might imagine,
    doesn’t leave any DNA, a bottle. And you know rape isn’t about sex, it’s about
    power. And it usually is a man, to be fair. In case I’ve just put the wrong idea
    in your head. There’s some sick little bastards out there. But you know that.'
