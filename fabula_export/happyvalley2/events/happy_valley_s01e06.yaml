  key_dialogue: &id059
  - |-
    TOMMY: *You’ve probably heard loads of bad stuff about me, but not all of it’s true.*
    RYAN: *Me Granny said you was off your head on drugs.*
    TOMMY: *No I’m not.*
    RYAN: *And that people say anything when they’re off their head on drugs.*
    TOMMY: *I’m not off my head on drugs. I am your dad. Ryan.*
  - |-
    TOMMY: *I’m your dad. I’ve been watching you. For weeks. When you leave school.*
    RYAN: *Not today there isn’t.*
    TOMMY: *How’s fings?*
    RYAN: *Not so bad.*
    TOMMY: *How long have you got?*
    RYAN: *I’m not supposed to talk to strangers.*
    TOMMY: *No. I know. But I’m not a stranger, I’m your dad.*
  - |-
    RYAN: *At school. Somebody does something. Like today. Max Higgins pulls all t’paper towels out o’ t’machine in t’toilets, ‘cos he thought it were funny, then when Miss Muckherjee comes in he goes—* (pointing) *‘It were Ryan Cawood!’ and I’m t’one that gets done.*
    TOMMY: *Yeah. Exactly. Exactly.*
