- fabula_uuid: cand_evt_scene_02ccc820db5c6a77_03
  global_id: null
  title: '**"The Art of the Deflection: Tommy’s Gaslighting Gambit and Ryan’s Unwitting
    Complicity"**'
  description: "\n  In a masterclass of psychological manipulation, Tommy Lee Royce—his\
    \ face gaunt and feverish—intercepts Ryan on Hebden Bridge, exploiting the boy’s\
    \ vulnerability with calculated precision. Disguising his identity as the escaped\
    \ serial rapist, Tommy positions himself as a wronged father, not a predator,\
    \ while weaponizing Ryan’s own schoolyard analogy (Max Higgins’ scapegoating)\
    \ to invert accountability. When Ryan asks for his *real* name, Tommy hesitates\
    \ before admitting it’s ‘Tommy,’ a moment of raw tension where the audience (but\
    \ not Ryan) recognizes the chilling truth. The scene’s tension lies in Tommy’s\
    \ chameleonic ability to pivot from vague admissions of ‘mistakes’ to a shared-victim\
    \ narrative, recruiting Ryan into his delusion. Ryan’s naive question—*‘So where\
    \ yer living?’*—becomes a narrative hook, foreshadowing Tommy’s elusive control\
    \ over the investigation. This moment reveals Tommy’s psychological mastery: he\
    \ doesn’t just evade guilt—he *recruits* his accuser into his delusion, laying\
    \ the groundwork for deeper manipulation. The subtext crackles with danger: Ryan’s\
    \ trust is a ticking bomb, and Tommy’s influence may corrode Catherine’s investigation—or\
    \ her grandson’s trust—from within.\n  "
  episode_uuid: ep_sea_ser_happy_valley_s01_e06
  scene_sequence: 45
  sequence_in_scene: 63
  key_dialogue: &id057
  - 'TOMMY: *I’m your dad. I am your dad. I’ve been watching you. For weeks. When
    you leave school.*'
  - 'RYAN: *I’ve never had a dad.*'
  - 'TOMMY: *I just wanted to say hello. But there was never a good time. ‘Cos there’s
    always someone with you.*'
  - 'RYAN: *Not today there isn’t.*'
  - 'TOMMY: *I made some mistakes, that’s all. I got caught up in this thing—and I
    didn’t start it—but I’m the one who’s ended up in the most bother.*'
  - 'RYAN: *That happens to me. At school. Somebody does something… then when Miss
    Mukherjee comes in he goes—‘It were Ryan Cawood!’ and I’m the one that gets done.*'
  - 'TOMMY: *Yeah. Exactly. Exactly.*'
