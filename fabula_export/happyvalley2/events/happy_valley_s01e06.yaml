  - object_uuid: ger_object_f6c87f1faf7d
    description_of_involvement: Tommy’s cigarette serves as the first symbolic gift
      in his grooming of Ryan. Initially denied (‘No.’), it is offered as a conditional
      concession (‘One drag.’), mirroring the toxic paternalism Tommy extends to the
      boy. The act of sharing the cigarette—Ryan’s nervous inhale, the ember glowing
      in the dim boat—becomes a metaphor for Ryan’s initiation into Tommy’s world
      of adult vices and secrets. The cigarette is not just an object; it’s a pact,
      a silent agreement that Ryan is now complicit in Tommy’s lies. Its smoke lingers
      in the air like the unspoken promises between them.
    status_before_event: Clutched in Tommy’s hand, half-smoked, a prop for his calculated
      nonchalance. The boat’s air is already thick with the scent of tobacco, a sign
      of Tommy’s long-term presence.
    status_after_event: Extinguished or passed to Ryan, its ember fading as the boy
      leaves. The ashtray (if present) now holds the remnants of their transaction—a
      physical trace of Ryan’s complicity.
    global_id: ger_object_f6c87f1faf7d
  - object_uuid: ger_object_548ee5904959
    description_of_involvement: The narrowboat is the claustrophobic stage for Tommy’s
      psychological manipulation of Ryan. Its peeling paint, rusted fixtures, and
      gentle rocking create an oppressive yet oddly intimate atmosphere, amplifying
      the power imbalance between them. The boat’s confined space forces Ryan into
      physical proximity with Tommy, making escape—both literal and emotional—difficult.
      The lager bottle, passed between them, and the cigarette smoke curling in the
      air become rituals of false camaraderie, binding Ryan to Tommy’s world. The
      boat’s isolation on the canal mirrors Ryan’s emotional isolation, as he is cut
      off from Catherine, Clare, and the safety of Hebden Bridge.
    status_before_event: Moored along the Hebden Bridge canal towpath, its interior
      dimly lit, smelling of stale lager, tobacco, and damp wood. The door is barricaded,
      the radio silent—Tommy’s refuge and prison.
    status_after_event: Unchanged physically, but now imbued with the weight of Ryan’s
      promise. The air is thicker with tension, the lager bottle emptier, and the
      ashtray holds the evidence of their transaction. The boat’s rocking feels more
      like a swaying cage.
