  key_dialogue:
  - 'NEWSREADER: *One of the two bodies found today at a flat in West Yorkshire has
    been confirmed as that of Lewis Whippey, one of the men wanted in connection with
    the murder two months ago of PC Kirsten McAskill. It’s also now known that Tommy
    Lee Royce—also wanted in connection with the murder of the 24-year-old police
    officer—had been at the same flat in Sowerby Bridge. Detectives believe Tommy
    Lee Royce is still in the area and have asked members of the public to be extra
    vigilant. They’ve also reiterated that he may be armed, and is dangerous.*'
  - '*[Tommy’s urge is to laugh at that last bit. Armed with a copy of War and Peace.
    But he ends up crying.]*'
