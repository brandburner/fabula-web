- fabula_uuid: act_cb8053b6e82584a4
  number: 3
  summary: The final act ignites with Catherine's frantic race to the canal, spurred
    by Clare's revelation that Ryan is with Tommy Lee Royce. Disregarding police protocol
    and direct orders to await backup, Catherine's singular focus is to save her grandson.
    She contacts Shaf, urgently requesting armed response and a helicopter, conveying
    the gravity of the situation and her terrifying suspicion that Tommy has Ryan.
    Inside the narrow boat, Tommy, now visibly intoxicated and delusional, reveals
    his sinister plan to Ryan. He douses the boat and Ryan with petrol, intending
    a murder-suicide, a "different sort of journey." Ryan, terrified, attempts to
    flee, but Tommy shoves him back, producing a lighter. Catherine, arriving just
    as Tommy prepares to ignite the fuel, kicks in the boat door. A violent confrontation
    ensues where Catherine, fueled by adrenaline and a deep-seated rage, disarms Tommy,
    rescues Ryan, and then brutally assaults him, delivering a series of kicks and
    stamps reminiscent of his attack on her. Uniformed officers arrive to pull Catherine
    off Tommy, who is then apprehended and stretchered away, handcuffed and under
    armed guard. In the aftermath, Catherine receives her epaulets back from Praveen
    Badal, a tacit acknowledgment that her actions, though extreme, are understood
    and forgiven. The immediate threat resolved, Catherine seeks a measure of personal
    peace, reconciling with her son Daniel. She apologizes for past emotional wounds,
    expresses her love and pride, and acknowledges the impossible choices she faced.
    The series concludes with Kevin Weatherill's acquittal on blackmail charges, and
    Catherine standing on the moors, looking across the valley, a profound sense of
    closure and the possibility of finally moving on with her life.
