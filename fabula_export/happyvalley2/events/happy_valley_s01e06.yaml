  title: '**"Catherine’s Obsession Overrides Protocol: The Ghost of Brett McKendrick"**'
  description: "\n  In the claustrophobic confines of her office, **Catherine Cawood**—her\
    \ exhaustion etched into the shadows under her eyes—presses **Twiggy** to breach\
    \ the flat of **Brett McKendrick**, a name surfacing in the periphery of the Tommy\
    \ Lee Royce investigation. The team’s house-to-house inquiries have yielded nothing:\
    \ no neighbors recognize McKendrick, no family or girlfriend has reported him\
    \ missing, and the station’s records reveal only a ghostly absence. Catherine’s\
    \ frustration boils over as she demands an **Ovenden door key**—a tool for forced\
    \ entry—ignoring procedural safeguards. The exchange is terse, charged with unspoken\
    \ urgency: Twiggy’s hesitation (\"*Have you not got anything on t’box?*\") contrasts\
    \ with Catherine’s single-minded focus, her voice tight with the weight of Royce’s\
    \ lingering threat. This moment isn’t just about accessing a flat; it’s a **pivot\
    \ from passive investigation to aggressive, rule-bending action**, revealing Catherine’s\
    \ willingness to **sacrifice protocol for progress**—a choice that foreshadows\
    \ her later moral compromises. The scene’s tension lies in the **silence between\
    \ the lines**: Twiggy’s reluctance hints at the team’s growing unease with Catherine’s\
    \ descent into obsession, while her insistence underscores the **fragility of\
    \ her grip on reality** as Royce’s shadow looms larger. The flat’s key becomes\
    \ a metaphor for the **unlocking of something darker**—both in the case and within\
    \ Catherine herself.\n  "
  episode_uuid: ep_sea_ser_happy_valley_s01_e06
  scene_sequence: 42
  sequence_in_scene: 58
  key_dialogue:
  - |-
    **CATHERINE** *(leaning forward, voice low and urgent)*:
        *'Can you get in?'*

        **TWIGGY** *(hesitant, glancing at Shaf)*:
        *'We’ve knocked on a few doors. The lad that lives here is called Brett McKendrick? But nobody seems to know much about him.'*

        **CATHERINE** *(shaking her head, eyes scanning the screen)*:
        *'We did house-to-house there four weeks ago...'* *(beat, then sharper)* *'We need a key. What about any family? What about a girlfriend? Or his mother?'*

        **TWIGGY**:
        *'Have you not got anything on t’box?'*

        **CATHERINE** *(ignoring the question, decisive)*:
        *'Okay. Have you got an Ovenden door key in your car?'*
      ],

