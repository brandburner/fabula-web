- fabula_uuid: act_d69829e2d63726da
  number: 2
  summary: Three weeks later, Catherine returns to work, her physical wounds healing,
    but her emotional scars remain. She immediately confronts her superiors, Mike
    Taylor and District Commander Praveen Badal, expressing profound frustration with
    the perceived lack of progress in the Tommy Lee Royce investigation. Catherine
    offers specific, actionable leads, but her suggestions are largely dismissed,
    fueling her disillusionment with the system. Concurrently, Tommy Lee Royce, despite
    his lingering illness, continues to solidify his manipulative hold over Ryan.
    Ryan, unaware of Tommy's true dangerous nature, visits the narrow boat, even bringing
    his friend Cesco, further normalizing the illicit meetings. The criminal underworld
    continues its violent machinations, as Nevison Gallagher visits Kevin Weatherill
    in prison, only to be confronted by Kevin's assertion that Nevison's past refusal
    of a raise directly led to Ann's kidnapping. This encounter adds a layer of moral
    complexity and personal responsibility to Nevison's suffering. Catherine's professional
    frustration reaches a breaking point during a trivial police call, leading her
    to dramatically resign from the force by throwing her epaulets on the floor, a
    powerful statement of her defiance and despair. The act rapidly escalates when
    Clare discovers Ryan's secret visits to Tommy from Cesco's mother, triggering
    an urgent and terrifying crisis that directly sets up the climax.
