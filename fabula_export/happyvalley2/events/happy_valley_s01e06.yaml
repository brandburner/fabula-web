  key_dialogue:
  - |-
    TOMMY: *Dad. Call me dad again.*
    RYAN: *I do have to go now. Dad.*
    TOMMY: *I liked it when you called me dad. Yesterday. But I were a bit surprised. I have to be honest wi’ yer. When yer turned up wi’ yer little buddy.*
  - |-
    TOMMY: *I think the time has come. When I have to... yup. Move on.*
    RYAN: *Not because I told him?*
    TOMMY: *Yeah. Yeah. Exactly because of that.*
  - 'TOMMY: *(producing a green plastic canister of fuel, sucking deep on his cigarette)*
    *I found some petrol. And I thought what might be nice is if I took you with me.
    Like you wanted. Cos I really don’t want to leave you here with your granny.*'
