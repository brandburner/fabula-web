- fabula_uuid: cand_evt_scene_40b581baf80f97af_01
  global_id: null
  title: 'The Narrowboat’s Descent: Tommy’s Delirious Reckoning'
  description: "\n  In the claustrophobic confines of a derelict narrowboat—its peeling\
    \ paint and rusted fixtures mirroring his own decay—**Tommy Lee Royce** barricades\
    \ himself inside, his movements sluggish with exhaustion but sharp with paranoia.\
    \ The bolted door is a flimsy shield against the world closing in, yet the boat’s\
    \ isolation offers a cruel irony: this is where his obsession for **Ryan** festers\
    \ unchecked, where his fractured psyche spirals into a delirious collage of memory\
    \ and delusion. As he collapses onto the bunk, the boat’s gentle rock on the canal\
    \ becomes a metronome for his unraveling mind. The script cuts to a **flashback**\
    \ of his earlier confrontation with **Catherine**—a moment of twisted intimacy\
    \ before violence erupted—revealing how his fixation on Ryan is both a perverse\
    \ attempt at connection and a weapon to wound her. This retreat isn’t just about\
    \ hiding; it’s the precipice of his transformation from predator to cornered animal,\
    \ where desperation curdles into something far more volatile. The narrowboat,\
    \ once a refuge, now feels like a coffin, and Ryan’s face—haunting in his mind’s\
    \ eye—becomes the only thing anchoring him to a future he’s determined to control,\
    \ no matter the cost.\n  "
  episode_uuid: ep_sea_ser_happy_valley_s01_e06
  scene_sequence: 9
  sequence_in_scene: 9
  key_dialogue: &id009
  - |-
    *(Tommy’s internal monologue, delirious/whispered, as he collapses onto the bunk)*
        **TOMMY:** *‘Ryan… Ryan, Ryan, Ryan…’* *(breathing ragged, fingers digging into the mattress)* *‘She can’t have you. Not like she had Becky. Not like she took everything.’* *(A beat. His voice drops, almost tender.)* *‘You’re mine. You’re the only thing left that’s mine.’*
