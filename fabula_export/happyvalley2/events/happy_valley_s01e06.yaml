  - '*(No dialogue. The scene is wordless, relying entirely on visuals and subtext.
    Catherine’s internal monologue is conveyed through her body language—the way she
    clutches her coat tighter, the way her breath fogs in the cold air, the way her
    eyes narrow as she stares into the distance. The moors themselves "speak" through
    the wind, the vastness, the isolation, all amplifying her emotional state.)*'
