    KEVIN: *Is that I have to understand that my actions have consequences for people other than myself?*
      (He lowers his voice)
      *You think it’s my fault your daughter was raped. And humiliated.*
  - 'KEVIN: *I asked you for a rise. So I could send one of my daughters to a better
    school. Considering how comprehensively you ripped my father off, I would’ve thought
    that wasn’t too much to ask. It would never have occurred to me. To suggest kidnapping
    your daughter to those animals. If you’d just said yes. When I asked. So you’re
    right, Nevison. Your actions have had consequences for people other than yourself.*'
  - |-
    NEVISON: *(a murmur)* *You bastard.*
      KEVIN: *You can go now.*
