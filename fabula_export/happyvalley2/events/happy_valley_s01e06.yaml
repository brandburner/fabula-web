- fabula_uuid: cand_evt_scene_acc13c35b551509b_04
  global_id: null
  title: '**"The Unraveling: A Family’s Wounds Exposed"**'
  description: "\n  In the suffocating tension of Catherine’s kitchen—where the remnants\
    \ of a birthday celebration lie scattered like the shards of her fractured family—Daniel’s\
    \ drunken rage erupts into a brutal confrontation, forcing Catherine to confront\
    \ the devastating truth: years ago, in the raw grief of Becky’s death, she once\
    \ wished *he* had died instead. The revelation, hurled with venomous precision,\
    \ shatters the fragile facade of their domestic stability. As Daniel’s accusations\
    \ spiral—accusing Richard of complicity, Catherine of delusion, and Becky of being\
    \ a ‘stupid selfish little bitch’—the kitchen becomes a pressure cooker of repressed\
    \ guilt, resentment, and unhealed wounds. The door, closed to shield the guests\
    \ from the spectacle, cannot contain the emotional fallout: Lucy’s hollow apology,\
    \ Richard’s silent complicity, and the Gallaghers’ awkward retreat all underscore\
    \ Catherine’s isolation. By the scene’s end, she is left battered, her emotional\
    \ armor cracked, her past sins weaponized against her—just as Tommy Lee Royce’s\
    \ looming threat casts a shadow over the chaos. This moment is not merely a domestic\
    \ explosion; it is the unraveling of Catherine’s carefully constructed defenses,\
    \ leaving her vulnerable to the hunt for Tommy and the consequences of her choices.\n\
    \  "
