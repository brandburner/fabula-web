acts:
- fabula_uuid: act_dd88f1d2ee27b384
  number: 1
  summary: Tommy Lee Royce, visibly injured and in pain, arrives in Hebden Bridge,
    seeking refuge after his escape. He procures painkillers and finds a secluded
    narrow boat, establishing a temporary hideout. Meanwhile, Sergeant Catherine Cawood,
    still recovering from her own injuries, returns to duty. She delivers devastating
    news to Nevison Gallagher, revealing that his daughter Ann was not merely kidnapped
    but brutally raped by Tommy, profoundly impacting Nevison. The investigation into
    Tommy's whereabouts gains a critical lead when police discover the decomposed
    bodies of Lewis Whippey and Brett McKendrick in a Sowerby Bridge flat, along with
    evidence of Tommy's blood, indicating he sustained a serious injury. Tommy, now
    aware of his exposed location, makes direct contact with his son, Ryan, after
    school. He preys on Ryan's longing for a father figure, manipulating the boy into
    secrecy. The act culminates in Catherine's strained birthday celebration, where
    a drunken Daniel confronts her about past emotional wounds related to his deceased
    sister, Becky, and Ryan's presence. This painful exchange pushes Catherine into
    a deep state of despair, highlighting her personal struggles and the profound
    impact of Tommy's actions on her family. She lashes out at Clare, suggesting she
    find her own place, marking a significant low point for Catherine.
