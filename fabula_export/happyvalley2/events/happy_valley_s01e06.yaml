    emotional_state: A volatile mix of raw terror, guilt, and unyielding resolve—her
      fear for Ryan’s safety is a live wire, but her determination to save him burns
      just as fiercely. She is a mother pushed to the brink, her emotions a storm
      of grief and fury.
    goals:
    - Reach Ryan before Tommy Lee Royce can harm him.
    - Secure Shaf’s help to intervene, bypassing the failed police bureaucracy.
    what_happened: Catherine Cawood is in a state of raw, unraveling terror as she
      races down the winding Yorkshire roads, her car swerving slightly with the urgency
      of her mission. She grips her mobile phone tightly, her voice a razor’s edge
      of desperation as she pleads with Shaf for help. Her face is a mask of determination
      and fear, her knuckles white on the steering wheel, her focus split between
      the road and the call. She is a woman on the edge, her every action driven by
      the visceral need to protect her grandson and exorcise the ghosts of her daughter’s
      death.
    observed_status: Catherine Cawood is in a state of raw, unraveling terror as she
