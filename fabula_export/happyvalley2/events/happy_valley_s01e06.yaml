- fabula_uuid: cand_evt_scene_df15f9c4b6f1f147_01
  global_id: null
  title: '**"The Predator’s Gambit: Ryan as the Bait"**'
  description: "\n  The moment Tommy Lee Royce materializes in front of Catherine’s\
    \ car—his gaze locked not on her but on Ryan—is a calculated ambush, a predator’s\
    \ gambit to exploit the one vulnerability he knows will unravel her. The scene\
    \ unfolds through Ryan’s POV, heightening the tension as Catherine’s maternal\
    \ instincts erupt in a violent, instinctive reaction: she yanks Ryan into the\
    \ car, her grip brutal with fear. Tommy’s opening line, *‘You wanted to see me,’*\
    \ is a taunt, a deliberate misdirection—he’s not here for Catherine, but for Ryan,\
    \ his son, the pawn he’s now weaponizing. The confrontation crystallizes the escalating\
    \ stakes: Ryan is no longer collateral but the deliberate target of Tommy’s obsession,\
    \ forcing Catherine into a defensive posture where her past trauma (Becky’s death)\
    \ and present duty (protecting Ryan) collide in a single, explosive beat. The\
    \ moment is a turning point, where Tommy’s fixation on Ryan becomes the linchpin\
    \ of his strategy, and Catherine’s protective ferocity reveals the raw, unhealed\
    \ wound of her grief. The air crackles with the unspoken threat: this is no longer\
    \ a hunt for a fugitive—it’s a battle for Ryan’s soul, and Tommy has just declared\
    \ war on Catherine’s last shred of stability.\n  "
