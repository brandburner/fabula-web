  key_dialogue: &id063
  - |-
    RYAN: Can we go for a ride?
    TOMMY: We could. Only I’m a bit low on petrol at the minute.
    RYAN: How long have you lived here?
    TOMMY: It’s not mine. I just borrow it.
    RYAN: Can I have a cigarette?
    TOMMY: No.
    RYAN: Why?
    TOMMY: Bad for yer.
    RYAN: You do.
    TOMMY: ((he offers his)) One drag.
  - |-
    TOMMY: Tell me about your mum.
    RYAN: We go see her sometimes. Up Heptonstall.
    TOMMY: How d’yer mean?
    RYAN: That’s where she’s buried.
    TOMMY: When did she die?
    RYAN: When I was born.
    TOMMY: How did she die?
    RYAN: (it does seem to sadden TOMMY. Maybe he did like BECKY. Even if his misguided way of showing that was to rape her) I don’t know. But. I’ve got me granny and me Auntie Clare. So.
    TOMMY: Where were you?
    TOMMY: Oh. I was away. And nobody thought to tell me. That she’d died. But... I did love her. Your mum. If anyone ever tries to tell you different.
  - |-
    TOMMY: So promise me. You won’t say owt. Even to her. Especially to her.
    RYAN: I do promise. If you did get some petrol could we go for a ride?
    TOMMY: That’s - she’s - thing is. You know I said I’m in trouble? And it wasn’t my fault, I didn’t start it, but - ... They’d never believe me. Never. They never do.
