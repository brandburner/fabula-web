    **RYAN**
    *Can I have some sweets?*
    **CATHERINE**
    *Have you been good?*
    **RYAN**
    *Yeah.*
    **CATHERINE**
    *All day?*
    **RYAN**
    *Yes.*
  - |-
    *[Subtext: Catherine’s questions are not just about sweets—they’re a litmus test for Ryan’s honesty, a desperate attempt to detect any hint of Tommy’s influence. Ryan’s quick, eager responses betray his need for her approval, but the camera’s cut to Tommy—watching, calculating—hints at the deeper game being played. The groceries in his hands are a sick joke: a man who preys on children, playing at fatherhood.]"*
