    what_happened: 'Ryan enters the narrowboat with wide-eyed curiosity, fascinated
      by the unfamiliar setting. He naively requests a cigarette and a ride, revealing
      his eagerness to please and his hunger for paternal connection. When Tommy brings
      up Becky, Ryan’s voice trembles with sadness, but he quickly deflects to his
      granny and aunt, showing his coping mechanism: redirecting grief to the safety
      of family. His promise of silence is given with sincerity, his hope for a ‘father-son
      ride’ betraying his desperate need for normalcy. Physically, he’s small and
      slight, dwarfed by the boat’s confines and Tommy’s presence, his body language
      oscillating between hope and submission.'
