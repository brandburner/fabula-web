  description: "\n  In this emotionally charged café confrontation, Clare—still raw\
    \ from Catherine’s near-fatal attack and the family’s collective trauma—attempts\
    \ to mend fractured bonds by proposing a birthday gathering that includes Daniel’s\
    \ estranged father, Richard, and his partner, Ros. The moment begins with cautious\
    \ warmth, as Clare and Daniel share a rare moment of mutual understanding about\
    \ Catherine’s survival and the impending birth of Daniel’s child. However, Clare’s\
    \ revelation that Catherine has resumed a sexual relationship with Richard triggers\
    \ Daniel’s visceral disgust, exposing the family’s unresolved grief over Becky’s\
    \ death and the toxic legacy of their parents’ failed marriage.\n\n  The tension\
    \ escalates when Clare, desperate to justify her invitation, cites Richard and\
    \ Ros’s support for Ryan during Catherine’s hospitalization—a detail that immediately\
    \ sets Daniel on edge. His reaction isn’t just about his parents’ rekindled intimacy;\
    \ it’s a visceral rejection of Ryan’s existence, a living reminder of the sister\
    \ he lost and the family he feels has abandoned him. Clare’s well-intentioned\
    \ attempt to unite the family instead lays bare the systemic fractures: her own\
    \ need for control, Daniel’s repressed rage, and the specter of Tommy Lee Royce\
    \ looming over their fragile stability. The scene ends with Daniel’s cold withdrawal,\
    \ leaving Clare’s fragile truce in tatters and the family’s wounds more exposed\
    \ than ever.\n\n  **Narrative Function**: This is a *revelatory turning point*—a\
    \ moment where Clare’s attempt at reconciliation backfires, forcing Daniel to\
    \ confront the depth of his unresolved grief and resentment. It also serves as\
    \ a *setup* for future conflicts, particularly around Ryan’s safety and the family’s\
    \ ability to function under pressure. The subtext—Clare’s guilt over her role\
    \ in the family’s dysfunction, Daniel’s self-loathing for his inability to forgive—drives\
    \ the emotional stakes, while the mention of Tommy Lee Royce ties the personal\
    \ drama to the larger investigative arc.\n  "
