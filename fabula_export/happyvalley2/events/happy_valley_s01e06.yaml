- fabula_uuid: cand_evt_scene_960b2ba89f51ef09_03
  global_id: null
  title: '**"The Bike’s Omen: Catherine’s Collapse at the Canal’s Edge"**'
  description: "\n  In a frantic, breathless chase along Hebden Bridge’s canal, Catherine\
    \ and Clare scramble toward Tommy’s boat—only for Catherine to stumble over Ryan’s\
    \ abandoned bike, a chilling confirmation of her worst fears. The discovery triggers\
    \ a visceral, wordless panic: her grandson is *here*, in the hands of a predator.\
    \ Clare’s desperate pleas for restraint—*‘He’s been coming home safely for days’*—only\
    \ sharpen Catherine’s terror, as the distant thrum of a helicopter (law enforcement?\
    \ Tommy’s escape?) amplifies the dread. The bike, a symbol of Ryan’s innocence,\
    \ now lies discarded like a discarded life, forcing Catherine to confront the\
    \ brutal truth: her family’s safety is no longer a given. The scene crackles with\
    \ tension—Catherine’s restraint fraying, Clare’s logic drowning in the roar of\
    \ the helicopter, and the canal’s still waters hiding a monster. This is the moment\
    \ Catherine’s professional unraveling becomes personal annihilation.\n  "
