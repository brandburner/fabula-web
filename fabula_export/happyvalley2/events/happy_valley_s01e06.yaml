    - The **clatter of Shaf’s discarded mobile phone**, **a sharp, final sound** that
      **marks the end of hesitation**.
    - The **ticking clock on the wall**, **each second a hammer blow** against Catherine’s
      sanity.
    - The **scent of stale coffee and sweat**, **the smell of a room where people
      have been **working too hard for too long**—and now, **facing their worst nightmare**.
