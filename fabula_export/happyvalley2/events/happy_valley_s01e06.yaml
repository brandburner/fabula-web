  title: '**"The Weight of Epaulets: A Silent Bargain with the System"**'
  description: |2-

      In the chaotic aftermath of Tommy Lee Royce’s capture—his stretchered, handcuffed form disappearing into an ambulance under armed escort—the scene pulses with the tension of unresolved justice. Catherine, physically and emotionally drained, sits on the ground cradling Ryan, her grandson, while Clare is tended to for shock. The air is thick with the unspoken: the violence Catherine unleashed on Tommy, the institutional complicity in her vigilante actions, and the hollow victory of legal closure. Praveen Badal approaches, delivering Inspector Taylor’s directive for *three weeks’ forced leave*—a thinly veiled suspension—but his return of Catherine’s epaulets is the real message: *the system approves of what you’ve done*. The gesture is heavy with implication: her badge, once a symbol of duty, now feels like a bribe, a tacit acknowledgment that her descent into brutality has been *useful*. When Clare weakly offers, *“You got him,”* Catherine’s flat *“Yup”* reveals the cost of this ‘victory’—not triumph, but the erosion of her moral compass. The ambulance’s departure isn’t closure; it’s a reminder that the system she once served has now *absorbed* her, and the only thing left to sever is her own complicity. The wide shot of the scene—helicopters, tape, flashing lights—frames her isolation: a woman who thought she was hunting a monster, only to realize she’s become its mirror.
