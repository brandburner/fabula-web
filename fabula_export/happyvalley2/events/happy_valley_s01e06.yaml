  title: 'The Kitchen’s Unspoken Truth: A Grief Explosion'
  description: |2-

      In the suffocating tension of Catherine’s kitchen, Daniel’s drunken grief erupts into a brutal confrontation, forcing Catherine to confront the devastating truth: she once wished *he* had died instead of Becky. The scene begins with Daniel’s escalating accusations—first directed at Richard for 'replacing' Becky with Ryan, then at Catherine for her perceived hypocrisy in mourning a daughter she allegedly despised. When Ryan enters, Daniel’s venomous outburst ('the thing that shouldn’t exist') exposes the family’s fractured dynamics, with Clare and Catherine rushing in to contain the damage. The confrontation peaks when Daniel screams the unspoken truth: *‘WHY DIDN’T YOU DIE, DANIEL? WHY WASN’T IT YOU?’*—a line Catherine denies but cannot fully refute, given Richard’s silent confirmation. The kitchen door, closed to shield the party from the chaos, becomes a symbol of containment, but the damage is irreparable: Daniel storms out, Lucy offers a hollow apology, and Catherine is left emotionally shattered, her grief and guilt laid bare. The scene functions as a **turning point**, revealing the family’s unresolved trauma and forcing Catherine to confront the consequences of her past words, which now threaten to unravel her fragile alliance with Daniel as the hunt for Tommy Lee Royce looms. The emotional fallout leaves her isolated, her authority as a mother and police sergeant both questioned, and her ability to protect Ryan further compromised by her own unhealed wounds.
