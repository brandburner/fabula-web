  title: Catherine’s predawn grief in the car
  description: 'In the suffocating quiet of her car at 05:35, Catherine Cawood pauses
    after a call with Andy Shepherd, her hands gripping the steering wheel as she
    confronts the emotional weight of Ryan’s birthday—a day forever shadowed by Becky’s
    suicide and the trauma of her own unresolved grief. The rearview mirror becomes
    a silent witness as she briefly expects to see Becky’s reflection, only to be
    met with absence, which triggers a sudden, raw surge of tears. The juxtaposition
    of professional urgency (the rape case) and personal devastation (Becky’s death)
    leaves her momentarily vulnerable, but she quickly composes herself, wiping away
    the tears before starting the engine. This private moment underscores the dual
    burdens she carries: the institutional failures she’s fighting against and the
    personal ghosts she can’t outrun. The scene serves as a turning point, marking
    the transition from the procedural urgency of the rape investigation to the deeply
    personal stakes of Ryan’s birthday, where Tommy Lee Royce’s influence looms like
    a specter. The silence of the car amplifies her isolation, making her grief feel
    both intimate and inescapable.'
