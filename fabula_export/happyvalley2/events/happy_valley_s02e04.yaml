    emotional_state: A volatile mix of simmering rage and deep exhaustion, masked
      by a facade of professional detachment. Her emotional state is a pressure cooker—ready
      to explode at the slightest provocation, yet held in check by years of training
      and the need to maintain control in a space where vulnerability is a liability.
    goals:
    - To assert her authority and ensure Leonie’s case is handled with the urgency
      and care it deserves, despite institutional apathy.
    - To uncover the truth behind Ryan’s birthday gift, which feels like a sinister
      thread connecting to Royce’s influence from prison.
    what_happened: Catherine Cawood enters the locker room with a physical presence
      that belies her emotional turmoil. Still in civilian clothes—jeans, a rumpled
      sweater, and a coat—she moves with the purposeful stride of someone who has
      spent a night navigating trauma, yet her disheveled appearance and the faint
      scent of adrenaline clinging to her betray the weight of her dual roles. Her
      face is a mask of controlled intensity, but her eyes flicker with the unresolved
      tension of Leonie’s assault, Ryan’s mysterious gift, and the ever-present shadow
      of Tommy Lee Royce. She is both an outsider in this space—her off-duty attire
      marking her as separate from the uniformed officers—and an insider, her authority
      as a sergeant demanding attention even in her civilian state.
    observed_status: Catherine Cawood enters the locker room with a physical presence
