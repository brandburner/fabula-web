  title: Catherine confronts rape victim and negligent officers
  description: 'Catherine Cawood arrives at Annette’s house in the early hours to
    find Leonie, a rape victim, physically and emotionally shattered. Leonie recounts
    the brutal assault in graphic detail—how the attacker, a client, refused to pay,
    overpowered her, and threatened her with a broken bottle while choking her. The
    trauma is compounded by the dismissive treatment from two Special Constables (Steph
    and Bryony), who mocked Leonie’s distress and failed to document the attack. Catherine,
    visibly enraged by their incompetence, shifts into investigative mode: she comforts
    Leonie, secures the attacker’s partial registration number (SP55), and vows to
    personally address the officers’ negligence. The scene establishes Catherine’s
    dual role as a protector of victims and a disciplinarian of systemic failures,
    while the attacker’s white van (SP55 UMV) subtly links to Sean Balmforth—a known
    sex offender and potential suspect. The emotional weight of Leonie’s testimony
    and Catherine’s controlled fury set the stage for a confrontation with the negligent
    officers and a deeper investigation into the case’s connections to Balmforth and
    Tommy Lee Royce’s shadowy influence.'
