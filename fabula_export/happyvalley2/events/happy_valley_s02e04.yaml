  description: "\n  The scene opens with Ryan’s childlike excitement as he bursts\
    \ into the kitchen, celebrating the return of his favorite TV show. Clare, preparing\
    \ tea, casually mentions a birthday card left on the mantelpiece—one she found\
    \ in Ryan’s gift box. Catherine’s immediate question about the sender’s identity\
    \ introduces tension, as the card’s origin is unknown. The moment shifts from\
    \ domestic warmth to unease when Catherine’s focus locks onto the card, her professional\
    \ instincts overriding the birthday celebration. Clare’s offhand remark—‘I didn’t\
    \ open it, it wasn’t addressed to me’—underscores the card’s ominous ambiguity,\
    \ while Catherine’s abrupt pivot to investigate it foreshadows the threat it represents.\
    \ The scene’s emotional core lies in the contrast between Ryan’s innocence and\
    \ Catherine’s growing dread, as the card’s presence disrupts the family’s fragile\
    \ normalcy and hints at Tommy Lee Royce’s lingering influence.\n  "
