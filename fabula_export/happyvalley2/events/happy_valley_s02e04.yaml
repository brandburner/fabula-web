      increasingly tense debate with Jodie. He begins with dismissive humor (joking
      about Vicky’s Prada skirt and CSI obsession), but his tone shifts as Jodie’s
      arguments gain traction. By the end, he concedes ground ('I’m ruling nothing
      out'), showing a rare moment of professional humility. His body language suggests
      he’s both the authority figure and a participant in the team’s dynamic, though
      his jokes about class ('Harvey Nicks') reveal his own biases.
