  title: Catherine destroys Tommy’s gift in a violent confrontation
  description: 'Ryan’s excitement over his mysterious birthday Scalextric set shatters
    when Catherine reads the card—signed ‘Love from Dad’—revealing it as a taunt from
    Tommy Lee Royce. Her immediate, visceral reaction (ripping the track apart, shouting
    orders to bin it) triggers a physical confrontation with Ryan, who clings to the
    gift as his own. Clare’s discovery of the card’s message escalates the tension,
    forcing Catherine to confront Ryan with the brutal truth: Tommy’s manipulation
    is deliberate, designed to fracture their relationship. The scene peaks when Catherine’s
    rage spills over into a raw confession—recounting Tommy’s past violence (petrol,
    hospitalization, murder) to make Ryan understand the threat. The confrontation
    ends with Ryan subdued but shaken, the gift destroyed, and Catherine’s emotional
    vulnerability exposed. This moment marks a turning point in Ryan’s understanding
    of his father’s danger and Catherine’s fragile control over her past trauma.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e04
  scene_sequence: 23
  sequence_in_scene: 41
  key_dialogue:
  - 'CATHERINE: Right! That’s - ! Get that dismantled, now, right now, get it back
    in that box. It’s going in the bin! Straight in the bin!'
  - 'RYAN: You can’t throw away my things! It’s mine!'
  - 'CATHERINE: He’s not allowed to have any contact with you! This is illegal. It’s
    bad, it’s wrong, it’s evil. He’s trying to mess about with us! (She prods her
    head.) He’s trying to mess about with our heads.'
  - 'CATHERINE: This is the man that terrified you, that traumatised you, that poured
    petrol over you, that put me in hospital for four weeks, that murdered Kir[sten]
    - ! This is what he wants. He wants you and me fighting. He wants you to hate
    me.'
