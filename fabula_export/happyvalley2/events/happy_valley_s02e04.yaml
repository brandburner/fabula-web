  title: Catherine probes Ann about Knezevics and Ryan’s gift
  description: After the morning briefing, Catherine isolates Ann on the police station
    stairs, subtly interrogating her about a hangover while probing her knowledge
    of Sean Balmforth—a man who works for Ann’s father, Nevison Gallagher. The exchange
    reveals Catherine’s suspicion of systemic corruption and her protective instincts
    toward Ryan, whose mysterious birthday gift (later revealed to be from Tommy Lee
    Royce) has already become a source of tension. When Mike interrupts to praise
    their work and reveal Goran Dragovic’s death is now a murder investigation, Catherine’s
    visceral reaction—her barely contained satisfaction—hints at a personal vendetta
    against the Knezevics, a powerful crime family she compares to the Sopranos. The
    moment escalates when she abruptly accuses Ann (or her father) of sending Ryan
    the expensive gift, forcing Ann into a defensive position. The scene underscores
    Catherine’s growing paranoia, her strategic use of personal connections to gather
    intelligence, and the looming threat of the Knezevics’ influence, which now intersects
    with her family’s safety. The revelation about Goran’s murder also raises the
    stakes, suggesting Catherine’s investigation into the Knezevics may be deeply
    personal and potentially dangerous.
