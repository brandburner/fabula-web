  title: Clare reveals Catherine’s role in arrest
  description: 'Neil sits transfixed by the news of Sean Balmforth’s arrest for the
    serial murders, his tension palpable as Clare enters and confirms Catherine’s
    direct involvement in the breakthrough. Their shared concern escalates when Clare—still
    processing the emotional fallout of Neil’s earlier confession about Vicky Fleming—asks
    him to stay the night, a request laden with unspoken vulnerability. The moment
    exposes the raw edges of their fractured relationship: Clare’s need for stability
    clashes with Neil’s guilt, while the TV’s grim updates about the case underscore
    the personal stakes of Catherine’s work. The scene hinges on what’s left unsaid—Clare’s
    fear of isolation, Neil’s complicity in the broader corruption, and the unspoken
    question of whether they can trust each other amid the unfolding crisis. The news
    serves as a stark backdrop, reminding them both that the investigation’s consequences
    extend far beyond the professional into their own lives.'
