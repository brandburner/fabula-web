  title: Mike reveals Goran’s death is murder
  description: "\n  After a tense stairwell confrontation where Catherine subtly probes\
    \ Ann about her hangover and her father’s connection to Sean Balmforth—a known\
    \ sex offender—their exchange is abruptly interrupted by Mike, who arrives to\
    \ praise their recent work. His casual mention of Goran Dragovic’s death being\
    \ reclassified as murder triggers a visceral reaction in Catherine, whose barely\
    \ concealed satisfaction reveals her deep personal investment in the case. The\
    \ revelation escalates the stakes, implicating the Knezevics family and suggesting\
    \ systemic corruption. Catherine’s follow-up question about the Knezevics’ involvement\
    \ hints at her awareness of their criminal operations, while Ann’s ignorance about\
    \ them underscores her relative inexperience. The moment also reintroduces the\
    \ unresolved mystery of Ryan’s birthday gift, which Catherine briefly revisits\
    \ before Mike departs. This event serves as a turning point, linking Goran’s death\
    \ to broader systemic failures and potentially to Tommy Lee Royce’s influence\
    \ from prison, while reinforcing Catherine’s role as a relentless investigator\
    \ with hidden motives.\n  "
