    description_of_involvement: 'The DNA kit is the instrument of institutional control
      in this scene. Catherine snaps on sterile gloves and cracks open the kit with
      clinical precision, extracting the long-stemmed swab that will be forced into
      Daryl’s mouth. The kit’s sterile, clinical nature contrasts sharply with the
      raw emotion of the confrontation—it’s a tool of science, but its use here is
      an act of coercion. The swab itself becomes a symbol of the police’s power:
      it doesn’t just collect evidence; it subjugates Daryl, reducing his defiance
      to a physical struggle. The kit’s presence in the room is a silent threat before
      the struggle begins, and its successful use marks the police’s victory over
      Daryl’s resistance.'
    status_before_event: Stored in Catherine’s gear, unused but ready for deployment.
      The kit is sterile, sealed, and symbolically represents the police’s authority
      to extract evidence by any means necessary.
    status_after_event: 'The DNA swab has been used—Daryl’s saliva is collected, and
      the kit is now evidence in the case. The swab itself may be bagged and labeled
      for forensic analysis, while the gloves are discarded (contaminated by the struggle).
      The kit’s role is fulfilled, but its use has left emotional residue: Daryl is
      humiliated, and Catherine’s authority is reinforced, albeit at a moral cost.'
