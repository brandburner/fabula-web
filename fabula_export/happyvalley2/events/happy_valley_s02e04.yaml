    \ Balmforth’s claims and the forensic trail—sets up a confrontation where the\
    \ suspect’s credibility will be tested against the cold, unassailable facts. The\
    \ scene underscores the team’s shift from broad inquiry to targeted focus, with\
    \ John’s internal conflict (knowing Balmforth is innocent of Vicky’s murder) creating\
