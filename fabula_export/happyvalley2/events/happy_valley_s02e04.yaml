  title: Ryan hides his letter to Tommy
  description: 'Ryan, alone in his bedroom, secretly composes a heartfelt letter to
    his imprisoned father, Tommy Lee Royce, expressing fragile trust in his remorse.
    The letter—*Dear Dad, Thank you for sending me that Scalextrix. I know you are
    probably sorry about what you did*—reveals Ryan’s childlike vulnerability and
    his desperate need to believe in Tommy’s redemption, a belief likely planted by
    Frances’ manipulative influence. When Catherine enters, Ryan quickly conceals
    the letter inside a graphic novel, masking his emotional labor behind a facade
    of compliance. Catherine, still raw from her earlier outburst, offers a belated
    apology for her ‘wound-up’ behavior, framing it as maternal love. Her physical
    gesture—taking the book (and unknowingly the letter) from Ryan and placing it
    on the floor—becomes an unintentional narrative bomb: the fragile bridge Ryan
    is building to his father now rests in her possession, foreshadowing future revelations
    about her complicity in the family’s fractured trust. The scene underscores the
    generational trauma at play: Ryan’s letter is a plea for connection, while Catherine’s
    guilt (over her role in Tommy’s imprisonment, her daughter Becky’s suicide, and
    her inability to protect Ryan) manifests as smothering control. The moment is
    a quiet turning point, where Catherine’s love and Ryan’s longing collide, setting
    up the eventual collision of their truths.'
