  object_involvements:
  - object_uuid: ger_object_7fe09743645b
    description_of_involvement: Catherine’s car, though not physically present in
      the locker room, is a symbolic artifact of her fractured state. The fading roar
      of its engine as she speeds away from Leonie’s home and arrives at the station
      underscores the urgency and chaos of her night. The car represents both her
      mobility as an officer—able to move swiftly between crises—and her isolation,
      as she often operates outside the structured support of the force. Its absence
      in the locker room is notable; she has transitioned from the role of protector
      (driving Leonie to safety) to that of challenger (confronting the institution),
      and the car’s echo is a reminder of the external world she’s left behind, if
      only temporarily.
    status_before_event: Parked outside Annette’s home at 4:00 AM, engine still warm
      from the drive to Leonie’s aid. The car is a tool of urgency, its presence a
      silent witness to Catherine’s nocturnal mission to support Leonie and document
      her statement.
    status_after_event: Speeding away from Norland Road Police Station, its departure
      marking Catherine’s transition from the role of caregiver to that of institutional
      provocateur. The car’s absence in the locker room symbolizes her shift from
      external action to internal confrontation.
