  description: "\n  In the empty aisles of Neil’s shop, Clare confronts him about\
    \ his confession regarding Vicky Fleming’s blackmail. She argues that the police\
    \ need to know Vicky’s death might not fit the serial killer profile, suggesting\
    \ it could be a separate crime. Neil resists, fearing ridicule and the emotional\
    \ toll of reliving the trauma. His refusal stems from shame and self-preservation,\
    \ while Clare’s persistence reveals her moral urgency—she’s not just protecting\
    \ Neil but ensuring justice for Vicky. The tension escalates subtly, with Neil’s\
    \ distress over the prospect of police scrutiny exposing his fragility. The moment\
    \ ends with Clare’s olive branch—a dinner invitation—softening the conflict, but\
    \ the unresolved issue lingers. This exchange underscores the institutional failure\
    \ to protect vulnerable women and the personal cost of Neil’s silence, while foreshadowing\
    \ the broader consequences of buried evidence in the investigation.\n  "
  episode_uuid: ep_sea_ser_happy_valley_s02_e04
  scene_sequence: 36
  sequence_in_scene: 61
  key_dialogue:
  - 'CLARE: I was thinking. You know, what you told me last night. / NEIL: Yeah. /
    CLARE: I’ve said I won’t say anything to our Catherine, and I shan’t, I’ve promised.
    But. Don’t you think you should tell the police? I’m just thinking... that whoever
    killed her. She might have been blackmailing him.'
  - 'NEIL: But... isn’t this bloke a serial killer? / CLARE: Yeah. But. On the news
    they’re saying she didn’t fit same profile as the others. It might be a different
    killer to the others and they need to know that. / NEIL: Well the police obviously
    don’t think that, they’ve linked ‘em. And they’ve got this fella in custody now
    anyway, so -'
  - 'NEIL: If I went down there and offered information, first of all they’d think
    I was a crank. And they’d be laughing at me. And then I’d have to go through it
    all. Again and again and again and you don’t know what that does to me, Clare.
    / CLARE: Sorry. / NEIL: No. It’s fine. It’s just - and if I thought for a minute
    it could be useful to ‘em, I would. But I don’t. I think she was the victim of
    a random weirdo whose mistaken her for a prostitute.'
