  key_dialogue:
  - 'RYAN: "Last week. In assembly. Mrs. Beresford was on about forgiveness."'
  - 'CATHERINE: "Ryan. You’ve got to stop calling him your dad, you’ve got to stop
    thinking about this man as your dad. A dad is someone who’s there. Every day.
    Someone who cares about you, who loves you, who helps you... tie your laces and
    pump up your tyres, someone who takes you places, someone who knows who you are.
    It’s not someone who lies to you about living on a narrow boat and pours petrol
    over you and kicks the living daylights out of your grandmother."'
  - 'CLARE: "Yes but Ryan. Perhaps if he was the kind of man who cared about other
    people enough. He’d never have been in prison in the first place."'
