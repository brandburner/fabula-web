    \ bloodshot-eyed, and barely holding herself together. Annette, visibly shaken\
    \ but sobering up from drink, recounts how the Special Constables dismissed Leonie’s\
    \ report as trivial, fueling Catherine’s quiet fury. Leonie, struggling to speak\
    \ without breaking down, recounts the brutal assault in harrowing detail: the\
    \ attacker’s violence, his refusal to pay, and her desperate attempt to trigger\
    \ the van’s horn to scare him off. The moment pivots when Leonie reveals she secretly\
    \ wrote the attacker’s license plate number (SP55) in lipstick on her arm—a detail\
    \ that immediately triggers Catherine’s memory of Sean Balmforth’s white van from\
    \ their earlier encounter. This discovery not only confirms Catherine’s suspicions\
    \ about Balmforth’s involvement but also underscores Leonie’s resilience and the\
    \ systemic failure of the Special Constables. The revelation tightens the noose\
    \ around Balmforth while deepening Catherine’s moral imperative to pursue justice,\
    \ both for Leonie and against the institutional neglect that enabled the attack.\n\
    \  "
