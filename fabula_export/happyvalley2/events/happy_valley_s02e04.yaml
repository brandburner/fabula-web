    the generational trauma of Tommy’s legacy, as Clare voices the delicate tightrope
    Catherine walks: shielding Ryan from the full horror of his father’s crimes while
    preparing him for the truth he may one day face. The scene ends with Catherine
    rushing to Ryan’s side, her protective instincts momentarily overriding her investigative
    fury, while Daniel remains trapped in the unspoken weight of his mother’s past.'
