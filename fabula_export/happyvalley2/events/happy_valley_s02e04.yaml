  key_dialogue: &id001
  - 'LEONIE: Just. I was down on Stoneyroyd Lane. And there were three of us. And
    he come along in his van. And I said - I told him - it’s five pound with, and
    without, it’s double. So he knew. And he said he were fine with that, so I got
    in and we went down to t’cricket club. Car park. He stank, he’d been drinking,
    [but] - ... And then anyway when he gets going, he decides he wants to do it without.
    ... So I said well I need t’money up front if that’s what’s happening and he goes
    ''I’ll pay y’after'', but they only ever say that - when they haven’t enough.
    ... So I said well it’s not happening then. But he were - you know - and he just.
    And I couldn’t stop him. So I was struggling and then he had his hand on my throat.
    Pressing down on me and he’s inside me - without a condom - and I can’t breathe,
    and he’s a big fella and I could feel meself going red in t’face. And he goes
    ''If y’don’t stop wriggling I’ll shove a brocken bottle up yer ffff...'''
  - 'ANNETTE: They didn’t ask. ... They didn’t take a statement, they didn’t write
    owt down. Basically they’re goin’ - ''Oh has he not paid yer, love? Boo hoo.'''
  - 'CATHERINE: No. No, Leonie. It won’t be them two. ... I’ll be dealing wi’ them
    two.'
