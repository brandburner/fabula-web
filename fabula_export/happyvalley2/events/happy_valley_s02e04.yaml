    description_of_involvement: The corridor to the cells is a liminal space in this
      event, serving as both a physical and symbolic transition from the custody desk
      to confinement. As the Custody Sergeant grips Sean’s elbow and marches him down
      the corridor, the narrow, fluorescent-lit passage amplifies Sean’s screams and
      struggles, turning his resistance into a futile, echoing ritual. The corridor
      is not just a path to the cells; it is a metaphor for the inevitability of the
      system’s judgment. Sean’s shouts—'I don’t even know who them people are!'—bounce
      off the bare walls, underscoring his isolation and the futility of his protests.
