  title: Catherine probes Nev’s hidden pain
  description: 'In a rushed café meeting, Catherine Cawood cuts through Nev’s evasive
    small talk to uncover his unspoken fears: his daughter Annie’s drinking relapse
    and the looming anniversary of his wife Becky’s death. By acknowledging these
    raw emotional triggers—tied to Ryan’s birthday—Catherine subtly positions herself
    as a potential ally, offering to intervene with Annie. The moment reveals Nev’s
    fragility, deepens their bond, and foreshadows the emotional toll of the upcoming
    birthday, while reinforcing the shadow of Tommy Lee Royce’s influence. Catherine’s
    own vulnerability surfaces when she confides in Nev about Ryan’s birthday, creating
    a rare moment of mutual exposure between two guarded professionals. The exchange
    underscores Nev’s reluctance to confront Annie’s struggles directly, his lingering
    grief over Helen, and Catherine’s instinctive protective role—both personally
    and professionally—toward those she cares about. The scene serves as a quiet turning
    point, shifting the dynamic between Catherine and Nev from collegial to confessional,
    while embedding the emotional stakes of the season’s central conflicts (family
    trauma, institutional failure, and the lingering threat of Tommy Lee Royce).'
