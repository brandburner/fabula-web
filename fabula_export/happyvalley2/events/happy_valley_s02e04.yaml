  title: Catherine weaponizes Tommy’s gift
  description: Catherine’s guilt over revealing Tommy’s card to Ryan curdles into
    action when she rejects Clare’s suggestion to discard the Scalextric set. Instead,
    she proposes a forensic test of the gift and card—exposing Tommy’s lingering manipulation
    while weaponizing her own expertise to dismantle his psychological hold. The scene
    crystallizes her refusal to be a passive victim, transforming self-blame into
    a tactical strike against the past. Clare’s attempt to rationalize the situation
    ("We’re going round in circles") underscores Catherine’s obsessive fixation, while
    Daniel’s quiet observation of Ryan’s unspoken need for her reveals the emotional
    toll on the household. Catherine’s decision to take the evidence to work for ninhydrin
    testing marks a shift from reactive trauma to proactive investigation, framing
    her as both protector and detective in the face of Tommy’s ghostly influence.
    The moment also deepens Daniel’s understanding of Catherine’s long-term struggle,
    reinforcing the generational weight of Tommy’s crimes.
