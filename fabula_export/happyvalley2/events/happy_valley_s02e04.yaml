  title: Alison discovers Daryl’s wrecked car
  description: Alison returns from tending the sheep to find the family’s only reliable
    vehicle—the red Peugeot—severely damaged, with the front driver’s side and wing
    dented and scratched. The sight immediately triggers financial panic, as she knows
    repairs will be costly and the car’s failure to pass its MOT could leave them
    stranded. Her initial shock gives way to a sharp, unspoken calculation of how
    this will further strain their already precarious household budget. The damage
    suggests reckless driving, likely while intoxicated, which aligns with Daryl’s
    recent pattern of irresponsibility. Alison’s reaction is a quiet, visceral confrontation
    with the fragility of their survival in Sunderland’s harsh landscape, where even
    small setbacks can unravel their stability. The moment foreshadows an inevitable
    confrontation with Daryl, where her fear and frustration will collide with his
    defensiveness, exposing deeper tensions about trust and accountability within
    the family.
