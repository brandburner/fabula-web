    Of course she wanted to put it in the bin. When she knew it was from you, and
    she did put it in the bin, and of course that made him angry. And upset.'
  - 'TOMMY: I don’t understand how - okay. Am I...? Being thick. Or are you not getting
    the fact that there’s been a development? This bitch. This nasty ugly whore. Sorry,
    but. She killed my mother. And you think buying him expensive toys is some kind
    of solution?'
  - 'TOMMY: Nothing. Is illegal. It’s just a word people use to control other people
    with. She’s stolen my son and she’s murdered my mother. That’s illegal but nobody’s
    raised an eyebrow. Believe me, it’s not this lad they’ve arrested that’s killed
    these women. Frances. If you’re not on my side, who is?'
  - 'TOMMY: I’d like you to use your imagination.'
  - 'FRANCES: What would you like me to do?'
  - 'TOMMY: You know what I want. You know what I want, Frances.'
