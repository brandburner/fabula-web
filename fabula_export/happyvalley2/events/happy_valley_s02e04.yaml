acts:
- fabula_uuid: act_657d01e3dc73d21b
  number: 1
  summary: 'The episode opens with Sergeant Catherine Cawood responding to a brutal
    rape, driving her personal car in the pre-dawn hours. She finds Leonie, the victim,
    deeply shaken and bruised, and Annette, Leonie''s friend, reveals that two Special
    Constables dismissed the assault as trivial. Catherine''s immediate concern for
    Leonie and her swift, decisive action to gather details and arrange proper care
    highlight her unwavering dedication, contrasting sharply with the negligence of
    her part-time colleagues. The revelation of the attacker''s white van and the
    partial registration "SP55" immediately connects the rape to Sean Balmforth, a
    known sex offender already under suspicion for a series of murders, thus escalating
    the stakes of the investigation. Catherine then confronts the two Special Constables,
    Steph and Bryony, berating them for their apathy and dereliction of duty, underscoring
    her commitment to justice and setting an internal conflict within the police force.
    Simultaneously, Catherine''s personal life is overshadowed by Ryan''s tenth birthday,
    a day fraught with the painful memory of her daughter Becky''s suicide. A large,
    glittery, mysteriously delivered parcel for Ryan appears on her doorstep, addressed
    in happy capitals. This unsettling gift, later revealed to be an expensive Scalextric
    set, becomes the inciting incident for Catherine''s personal battle. When Clare
    discovers a card hidden within the box, signed "Love from Dad x," Catherine''s
    deepest fears are confirmed: Tommy Lee Royce, Ryan''s father and her daughter''s
    rapist, is attempting to manipulate Ryan from prison. Her furious reaction to
    confiscate the gift and her subsequent fight with Ryan over it encapsulate the
    enduring trauma Tommy inflicts on her family, directly launching the central conflict
    of her storyline.'
