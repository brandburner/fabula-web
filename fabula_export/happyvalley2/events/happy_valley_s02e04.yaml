      in the very fact that she’s making an unsanctioned late-night call to a superior.
      The force is both the tool Catherine is trying to wield and the obstacle she’s
      navigating around. This moment is a microcosm of the organization’s contradictions:
      it’s a machine designed to deliver justice, but its gears are often clogged
      by politics, negligence, and red tape. Catherine’s call is an act of defiance
      against that machine, while Shepherd’s response will determine whether the machine
      will *help* her or *hinder* her.'
    active_representation: Via the institutional hierarchy it enforces (Shepherd’s
      rank over Catherine) and the protocols it demands (official channels, chain
      of command). Catherine’s call is a direct challenge to both.
    power_dynamics: Catherine is exerting *tactical* power (using her knowledge of
      the case and Shepherd’s respect for her to bypass the system), while the force
      exerts *structural* power (its rules, ranks, and bureaucracy). Shepherd is caught
      in the middle, representing the force’s authority but also its potential to
      adapt.
    organizational_goals:
    - To maintain control over the investigation’s direction (implied by Shepherd’s
      cautious response).
    - To uphold the appearance of procedural integrity, even as Catherine’s actions
      threaten to expose its failures.
    influence_mechanisms:
    - Through Shepherd as its proxy—his decisions will either greenlight Catherine’s
      lead or shut it down.
    - Through the threat of disciplinary action (if Catherine’s call is seen as insubordination).
    - Through the slow, grinding machinery of bureaucracy (which could delay or derail
      the lead if Shepherd doesn’t act swiftly).
    institutional_impact: This call is a pressure point in the organization’s ability
