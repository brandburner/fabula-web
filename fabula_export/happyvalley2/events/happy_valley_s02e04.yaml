  title: Unclaimed Scalextric Gift Disrupts Birthday
  description: "\n  The celebratory mood of Ryan’s tenth birthday breakfast is abruptly\
    \ disrupted when the family unwraps an extravagant, unclaimed Scalextric set—a\
    \ gift far beyond the family’s usual means. Catherine’s initial unease about the\
    \ mysterious package (found on the doorstep at 6:30 AM) escalates as the gift’s\
    \ origin remains unknown, despite Daniel’s transparent lie about it being from\
    \ him. Clare’s suggestion that Nevison Gallagher might be the sender is met with\
    \ skepticism, and the gift’s opulence (valued at £150) feels ominously deliberate.\
    \ Ryan’s excitement contrasts sharply with Catherine’s growing tension, as the\
    \ gift’s anonymity triggers her professional instincts—especially given Tommy\
    \ Lee Royce’s recent threats. The moment underscores the family’s fractured dynamics\
    \ (Daniel’s evasion, Clare’s sharp observation) while foreshadowing the gift’s\
    \ sinister implications, which will later tie to Royce’s manipulation from prison.\
    \ The scene pivots from joy to foreboding, with Catherine’s frustration ('I’m\
    \ gonna start speaking Urdu') revealing her fraying patience as the family’s normalcy\
    \ unravels under unseen threats.\n  "
