  title: Ryan Defends Tommy’s Gift
  description: "\n  During a tense family dinner, Ryan—unprompted—introduces the topic\
    \ of forgiveness, referencing a school assembly about extending it even to those\
    \ who’ve wronged us. He then pivots to Tommy Lee Royce, suggesting the Scalextric\
    \ set (revealed earlier as a gift from Tommy) might have been an attempt at apology.\
    \ The room freezes. Catherine reacts viscerally, rejecting the idea of Tommy as\
    \ a father figure with a raw, emotional outburst, listing the ways a real father\
    \ *should* behave. Clare steps in to soften the blow, but her argument—that Tommy’s\
    \ crimes preclude any claim to fatherhood—only deepens the divide. Ryan, sensing\
    \ the adults’ resistance, withdraws into silence, but his quiet persistence signals\
    \ a growing defiance. The exchange exposes the family’s unresolved trauma over\
    \ Tommy’s legacy, forcing Catherine to confront her grandson’s burgeoning attachment\
    \ to a man she despises. The scene crystallizes the moral and emotional stakes\
    \ of Tommy’s lingering influence, with Ryan’s quiet defiance hinting at future\
    \ conflict.\n  "
