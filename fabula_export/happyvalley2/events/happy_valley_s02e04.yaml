  title: Catherine’s forensic counterattack
  description: 'Catherine spirals into self-recrimination over revealing Tommy’s birthday
    card to Ryan, fixating on how her honesty has exposed the boy to his father’s
    manipulative reach. Clare attempts to reassure her, but Catherine’s guilt curdles
    into action—she decides to weaponize her police resources, proposing forensic
    testing of the gift and card to trace Tommy’s influence. The moment crystallizes
    her shift from passive victim to tactical aggressor, using her professional expertise
    to dismantle Tommy’s psychological hold. Meanwhile, Daniel’s quiet presence underscores
    the generational trauma of Tommy’s legacy, as Clare voices the delicate tightrope
    Catherine walks: shielding Ryan from the full horror of his father’s crimes while
    preparing him for the truth he may one day face. The scene ends with Catherine
    rushing to Ryan’s side, her protective instincts momentarily overriding her investigative
    fury, while Daniel remains trapped in the unspoken weight of his mother’s past.'
