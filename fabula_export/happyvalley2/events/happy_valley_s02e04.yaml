      marking her as separate from the uniformed officers—and an insider, her authority
      as a sergeant demanding attention even in her civilian state.
    beliefs:
    - The police force is failing victims like Leonie, and she must be the one to
      force accountability.
    - Ryan’s safety is inextricably linked to her ability to outmaneuver Royce’s reach,
      even from behind bars.
