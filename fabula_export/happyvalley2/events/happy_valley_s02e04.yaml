    description_of_involvement: 'Catherine’s phone is the catalyst of this moment—a
      bridge between the chaos of the night’s events and the institutional machinery
      of the police force. It’s not just a tool for communication; it’s a symbol of
      her defiance against systemic failures. The phone number scribbled on her hand
      (a detail that feels almost *desperate*, as if she couldn’t trust herself to
      remember it otherwise) transforms a mundane object into a lifeline. When she
      dials, the phone becomes an extension of her will, a way to bypass the red tape
      that has already failed Leonie once. The act of tapping the number—written in
      lipstick, no less—hints at the improvisation and urgency driving her, as well
      as the personal stakes: this isn’t just police work; it’s *her* fight.'
