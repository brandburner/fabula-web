- fabula_uuid: act_87f1ae2aad0e240b
  number: 2
  summary: 'Following the discovery of Tommy''s gift, the narrative expands to reveal
    the deepening complexities of the murder investigation and the insidious nature
    of Tommy''s manipulation. Detective Inspector Andy Shepherd confronts John about
    Vicky Fleming''s mobile number found on her phone, a direct link to the ongoing
    murder case. John, visibly shaken, fabricates a professional connection from years
    prior, a lie Andy accepts, further entangling John in his web of deceit and increasing
    the dramatic irony for the audience. Subsequently, Sean Balmforth is officially
    arrested and charged with the four murders, including Vicky Fleming''s. John''s
    internal turmoil intensifies, as he knows Sean is innocent of Vicky''s murder,
    creating a profound moral dilemma that he must suppress for fear of exposing his
    own secret. Meanwhile, Catherine, still navigating her professional duties, is
    called to deal with Daryl Garrs, who, after being provoked by bullies, retaliates
    with a hammer, leading to his arrest. Catherine also receives a crucial piece
    of information from Nevison Gallagher, who confirms his daughter, Ann, is drinking
    again, adding another personal concern to Catherine''s already heavy burden. The
    true orchestrator of Ryan''s gift is revealed when Frances Wealand visits Tommy
    Lee Royce in Gravesend Prison. Frances proudly recounts delivering the Scalextric
    and subtly suggesting to Ryan that Tommy sent it as an apology. Tommy, however,
    dismisses her "apology" narrative, making his true, chilling intentions clear:
    he wants Frances to "remove" Catherine and aid his revenge, establishing Frances
    as his active, deluded agent. This revelation confirms Catherine''s deepest fears
    about Tommy''s manipulative power, even from behind bars, and sets a dangerous
    trajectory for future events.'
