  title: Andy probes John about Vicky Fleming’s phone
  description: |2-

      During the morning murder team briefing, Andy Shepherd reveals that John Wadsworth’s name and number were found on Vicky Fleming’s phone—a detail that immediately raises suspicion. Andy pulls John aside for a private interrogation, where John fabricates a connection to Vicky from a past fraud investigation, downplaying their interaction as minor and professional. His body language (nervous, shattered) and evasive responses (hesitation, over-explaining) betray his unease, though Andy appears to accept his explanation at face value. The exchange subtly tests John’s credibility, hinting at deeper fractures in the team’s trust. Andy’s closing question about John’s domestic well-being—delivered with uncharacteristic softness—suggests he senses something amiss beneath John’s professional facade. The moment serves as a critical turning point: John’s lie about Vicky Fleming sets in motion a chain of deception that will later unravel, while Andy’s probing establishes him as a perceptive leader who notices but doesn’t yet challenge his team’s vulnerabilities. The tension between professional duty and personal guilt lingers, foreshadowing John’s eventual unraveling.
  episode_uuid: ep_sea_ser_happy_valley_s02_e04
  scene_sequence: 9
  sequence_in_scene: 16
  key_dialogue: &id011
  - 'ANDY: Sean Balmforth. Date of birth seventeen eleven eighty-five. Twenty-nine
    years old. Address thirty-four Burley Road, Illingworth. He has a string of convictions
    and he’s on the sex offenders’ register. Unlawful Sexual Intercourse. With a fourteen
    year old. That was ten years ago. His van’s been seized in connection with the
    assault and rape of this girl in the early hours. Forensics are across it, I’ve
    spoken to the supervisor and they’re aware we’re looking at him for other things.
    On an initial visual inspection they’ve told me they’ve found rope in the back.
    Nylon rope. Three separate lengths. There was also a couple of bags of rubbish
    in there, containing - amongst other things - a number of beer bottles, some of
    which were the same brand as ones found at the site where Ana Vasalescu was found
    and where Vicky Fleming was found.'
  - 'ANDY: Telecoms found your name and number on Vicky Fleming’s mobile phone.'
  - 'JOHN: D’you know. I had a funny feeling. I wasn’t certain. But. Two years, eighteen
    months since? I was working on a fraud investigation - up at t’building society
    - and she was [just] - she was the point of contact. So - yeah. Yeah. Yeah, I’d
    have given her my number. Blimey. Mind you, who haven’t I given my number to?
    Over the years. I don’t think I spoke to her more than once or twice.'
  - 'ANDY: You shoulda said.'
  - 'JOHN: I wasn’t convinced it was her. I couldn’t have told you her name if you’d
    been asking me to remember. Perhaps if she’d been working at the building society
    now it’d have rung a bell, but - Good heavens.'
  - 'ANDY: So that’s the only contact you’ve ever had with her?'
  - 'JOHN: Yeah. Yeah.'
  - 'ANDY: John. Is everything all right at home? I’ve kept meaning to ask.'
  - 'JOHN: Yeah. Well. You know. The slings and arrows.'
