  title: Catherine blocks Steph’s resignation
  description: 'Catherine Cawood intercepts Steph, who is visibly distressed and dressed
    in civilian clothes, as she descends the station stairs. Steph immediately confesses
    her intention to resign, citing guilt over her role in mishandling Leonie’s rape
    case—particularly her failure to prevent Sean Balmforth’s potential escape. Catherine
    swiftly dismantles Steph’s self-recrimination, pinpointing Bryony as the true
    source of negligence and framing Steph’s mistake as a product of inexperience
    and poor leadership. She reframes the situation as an opportunity for growth,
    urging Steph to trust her instincts and challenge apathy like Bryony’s. The exchange
    reveals Catherine’s strategic empathy: she doesn’t just reject Steph’s resignation—she
    weaponizes the moment to reinforce her own moral authority and expose systemic
    failures within the force. By positioning herself as a mentor figure, Catherine
    ensures Steph’s loyalty remains tied to her vision of justice, while subtly reinforcing
    her own role as the station’s moral compass. The confrontation also underscores
    the broader tension between institutional inertia and individual accountability,
    a theme central to Catherine’s arc as she battles corruption from within and without.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e04
  scene_sequence: 37
  sequence_in_scene: 62
  key_dialogue:
  - |-
    STEPH: Have you got a minute?
    CATHERINE: Hello Steph.
    STEPH: I think - I think - I’ve decided I should resign. I’ve spoken to the Specials liaison officer, and -
  - |-
    CATHERINE: I don’t think you should resign.
    STEPH: Well. It looks like they’re gonna charge this bloke -
    CATHERINE: Does it?
    STEPH: Well they’ve had him in custody for two days and I’ve just heard they’re applying to the magistrate for a three day lie down now, and I’d have let him slip through my fingers, so -
  - |-
    CATHERINE: Steph, how long have you been in the job?
    STEPH: Specials? Six months.
    CATHERINE: You made a mistake. I suspect you listened to Bryony, who is a lazy sod, and whose first and last instinct is to do the minimum. She’s the one who should be offering to resign. Not you. She’s been in the job five years and she knows no more now than she did then. I suspect you wanted to do more, but you let yourself be lead by her. Yeah?
    STEPH: (nods, she’s embarrassed. CATHERINE’s kind, but brisk and decisive - )
    CATHERINE: Go with your own instincts in future, stick your neck out now and again. Yeah, Leonie’s a prostitute, she’s also a vulnerable nineteen year-old, who is where she is because she’s had a shit life.

    CATHERINE: Don’t resign. I’ll be really pissed off if you resign.
