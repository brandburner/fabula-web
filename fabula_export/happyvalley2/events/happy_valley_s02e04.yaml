- fabula_uuid: cand_evt_scene_bcace2f00280e185_01
  global_id: null
  title: Catherine Confronts Negligent Constables
  description: Catherine Cawood storms into the Norland Road locker room, where Special
    Constables Steph and Bryony are casually unwinding after a shift. She feigns pleasantry
    at first, lulling them into complacency before unleashing a brutal critique of
    their dismissive handling of a rape victim—Leonie, a 19-year-old left abandoned
    at a hospital entrance, too traumatized to seek help. Catherine’s rage is visceral,
    exposing the systemic failure to protect vulnerable women while the serial killer
    investigation looms. She details the victim’s bruised face and neck, the hour-and-a-half
    Leonie spent freezing in the cold, and the constables’ refusal to take a statement.
    Steph offers a half-hearted apology, but Bryony remains defiant, citing institutional
    skepticism toward ‘prostitutes’ and a ‘busy night’ as excuses. Catherine’s fury
    isn’t just about procedural failure—it’s a moral reckoning with the rot undermining
    the force. Though she threatens to report them, she ultimately spares them, prioritizing
    her grandson’s birthday over institutional accountability. The confrontation forces
    Steph to confront her complicity, while Bryony’s unrepentant silence reveals the
    depth of the problem. The scene ends with Catherine storming out, her decision
    to withhold punishment hinting at her own moral compromise as she races to Ryan’s
    birthday, the weight of Tommy Lee Royce’s shadow looming over her personal and
    professional life.
  episode_uuid: ep_sea_ser_happy_valley_s02_e04
  scene_sequence: 4
  sequence_in_scene: 7
  key_dialogue:
  - 'CATHERINE: "Shall I tell you what I’ve been doing? I’ve just briefed the night
    crew on an arrest strategy for a fella that’s raped and assaulted a nineteen-year-old.
    She’s gone off to the Opal Unit in Bradford so we can get her properly examined
    and now I’m going to wake Mr. Shepherd up and tell him I think he might want to
    look at this bloke because he might—just might—be the twisted little bastard that’s
    been killing prostitutes."'
  - 'CATHERINE: "You dropped her at the hospital doors. You didn’t even see her inside.
    She didn’t go in. After you’d left her. She was too upset, she was too frightened.
    She’s stood in the cold for an hour and a half frozen daft waiting for a bus to
    get home."'
  - 'CATHERINE: "They’? Prostitutes? We’re talking about a vulnerable nineteen-year-old.
    Her face was bruised. Her neck was bruised. That isn’t someone crying wolf."'
  - 'BRYONY: "It was dark."'
  - 'CATHERINE: "You’ve got a torch, haven’t you?"'
  - 'STEPH: "Sorry. Catherine."'
  - 'CATHERINE: "Right. I’m going home for forty minutes to say Happy Birthday to
    my grandson, get changed, then straight back here in time for the eight o’clock
    shift. I’m not reporting you to professional standards although God knows why,
    I should be doing. But please. Just. Learn something from it."'
  is_flashback: false
  location_uuid: ger_location_3684884826e6
  theme_uuids: []
  arc_uuids:
  - arc_9f1473909bbc
  participations:
  - character_uuid: ger_agent_fce00b04e4af
    emotional_state: Defiant and irritated, her initial nonchalance curdling into
      resentment as Catherine’s accusations hit home. She’s not just unrepentant—she’s
      offended, as if Catherine’s moral outrage is an unwarranted attack on her competence.
      Her silence at the end is a refusal to engage, a stubborn adherence to the status
      quo that enables systemic failure.
    goals:
    - Defend her and Steph’s actions by invoking institutional norms and excuses (e.g.,
      ‘busy night,’ ‘prostitutes’).
    - Resist Catherine’s authority by refusing to apologize or acknowledge negligence,
      preserving her self-image as a capable officer.
    what_happened: Bryony is initially casual, offering Catherine pizza and setting
      up the pool game, her body language relaxed and dismissive. As Catherine’s critique
      escalates, Bryony’s demeanor hardens—she becomes defensive, her arms crossed,
