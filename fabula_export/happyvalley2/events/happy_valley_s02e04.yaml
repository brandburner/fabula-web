  global_id: null
  title: Frances manipulates Ryan’s memory of Tommy
  description: 'Frances strategically distorts Ryan’s perception of his father, Tommy
    Lee Royce, by reframing the discarded Scalextric set as an act of remorse rather
    than a manipulative gesture. She exploits Ryan’s emotional vulnerability—his desire
    to play with the gift and his confusion about his father’s intentions—by suggesting
    Tommy’s kindness and regret. Frances’ manipulation is calculated: she first establishes
    rapport by asking about Ryan’s birthday, then subtly undermines Catherine’s authority
    by questioning her decision to throw away the gift. The conversation reveals Frances’
    agenda—she’s not just probing Ryan’s feelings but actively shaping his memory
    of Tommy, planting seeds of doubt about his guilt. This moment deepens the narrative
    tension around Tommy’s influence, blurring the line between truth and emotional
    manipulation in the investigation’s aftermath. For Ryan, it’s a turning point:
    he begins to question his grandmother’s narrative about his father, and Frances’
    influence over him grows.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e04
  scene_sequence: 31
  sequence_in_scene: 54
  key_dialogue:
  - 'FRANCES: Did you have a nice birthday? Yesterday.'
  - 'RYAN: Yep. It were okay. / FRANCES: What did you get? / RYAN: Skateboard. Elbow
    pads, knee pads, helmet. New football. Twenny quid off me Uncle Daniel, thirty
    quid off me Grandad and me Auntie Ros, that’s fifty quid. Winnie across made me
    a cake as well as me Auntie Clare, so that’s two cakes. And I got a Scalextric.
    But. Me Granny put it in t’bin.'
  - 'FRANCES: Why? / RYAN: Cos it were from me dad. / FRANCES: Oh no. / FRANCES: And
    how do you feel? About that. / RYAN: I dunno. I really wanted to play with it.
    But I could see how upset she was.'
  - 'FRANCES: Perhaps. I don’t know. It’s his way of trying to tell you all how sorry
    he is. About what happened. / RYAN: D’you think he is? / FRANCES: Well why else
    would he send it? I don’t think they get very much money. In prison. It must have
    meant a lot to him to do that. / FRANCES: - after that last conversation we had.
    I googled your dad. And I can’t believe he was responsible for half the things
    he was sent to prison for. / RYAN: Why? / FRANCES: Because he has such a kind
    face.'
