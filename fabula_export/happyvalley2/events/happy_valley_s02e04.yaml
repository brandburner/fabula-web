  title: John’s violent breakdown at home
  description: John, locked out of his own home by Amanda, escalates from desperate
    pleading to a violent outburst after she refuses to let him in. His children—Amber
    and Ben—witness his unraveling as he smashes a brick against a reinforced window,
    only for it to bounce back. The failed attempt forces him into a screaming match
    with Amanda through the glass, their expletive-laden exchange revealing the depth
    of their fractured relationship. The scene’s tension peaks when John notices a
    neighbor shielding her toddler from the confrontation, momentarily snapping him
    out of his rage. His haunted expression and the implied PTSD flashback (of a bloodied
    hand discarding a broken bottle) underscore his psychological instability—a direct
    consequence of his past actions and the unraveling of his family. The moment serves
    as a brutal character study of John’s desperation, the irreversible damage to
    his household, and the broader narrative stakes of his moral compromises in the
    Tommy Lee Royce investigation.
