  title: Catherine confronts systemic failure
  description: Catherine Cawood arrives at Annette’s house in the early hours to find
    Leonie, a rape victim, physically and emotionally shattered. Leonie recounts the
    brutal assault in harrowing detail—how the attacker choked her, raped her without
    a condom, and threatened her with a broken bottle—while Annette reveals the Special
    Constables’ callous dismissal of her report. Catherine shields Leonie from further
    trauma by softening the clinical details of the medical examination and station
    visit, but her restrained demeanor masks a simmering rage. She meticulously documents
    Leonie’s account, including the attacker’s partial registration number (SP55),
    which she recognizes as matching Sean Balmforth’s van from their earlier encounter.
    The scene underscores Catherine’s protective instinct toward victims and her growing
    resolve to dismantle institutional negligence, foreshadowing her confrontation
    with the negligent officers. The moment also deepens the narrative’s critique
    of systemic failures in law enforcement, particularly the dismissive treatment
    of vulnerable women by part-time Specials. Catherine’s quiet vow to ‘deal with’
    the officers signals a turning point in her moral authority and her willingness
    to challenge the status quo, even as the specter of Tommy Lee Royce’s influence
    looms over the case through the partial plate number’s connection to Balmforth.
