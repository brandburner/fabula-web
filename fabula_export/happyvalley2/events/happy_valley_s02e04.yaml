              Symbolizes the lawlessness of Ovenden’s estates, where even public spaces like parking lots are controlled by packs of aggressive youth. The lot represents the town’s broken social contract—there are no consequences for bullying, no authority to intervene, and no safety for those like Daryl who are targeted. It is a microcosm of the larger world of Happy Valley, where violence is the only language some understand.
