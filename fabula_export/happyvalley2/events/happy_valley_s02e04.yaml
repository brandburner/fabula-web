  title: Jodie dismantles Sean’s alibi with forensic evidence
  description: "\n  In a high-stakes interrogation, Detective Jodie Cawood systematically\
    \ dismantles Sean Balmforth’s carefully constructed alibi by presenting irrefutable\
    \ forensic evidence. She begins by administering a special warning, legally obligating\
    \ Sean to explain discrepancies in his testimony or risk adverse inferences in\
    \ court. When confronted with DNA evidence—strands of Ana Vasalescu’s hair in\
    \ his van—Sean’s initial shock betrays his guilt, but he adheres to his solicitor’s\
    \ advice and invokes ‘no comment.’ Jodie then reveals Lynn Dewhurst’s phone number\
    \ in Sean’s contacts, further contradicting his earlier denials. The tension escalates\
    \ as Sean’s silence under solicitor guidance becomes a damning admission in itself,\
    \ forcing the narrative toward a critical juncture where his guilt is no longer\
    \ deniable. The scene hinges on Jodie’s methodical pressure and Sean’s unraveling\
    \ composure, with the solicitor’s presence acting as a passive but critical barrier\
    \ to direct confrontation. This moment is pivotal: it shifts the investigation\
    \ from circumstantial suspicion to forensic certainty, tightening the noose around\
    \ Sean’s neck while exposing the fragility of his defenses.\n  "
  episode_uuid: ep_sea_ser_happy_valley_s02_e04
  scene_sequence: 34
  sequence_in_scene: 57
  key_dialogue:
  - |-
    JODIE: I know you’re exercising your right to no comment, Sean. But. As we move forward. I’d you like you to bear in mind that your solicitor’s advice is simply that: advice. I’m going to give you what we call a special warning now, Sean, before I ask you the next question. Do you know what a special warning is?

    JODIE: It’s when I’m going to ask you a very particular question. Based on evidence we’ve found. And if you continue to no comment—which you’re perfectly entitled to do—or if you don’t offer an explanation whilst you’ve got the opportunity to do so, the court—when we get there—may draw an adverse inference from the fact that you’ve remained silent or failed to offer an explanation. Do you understand?
  - 'JODIE: Because you’ll be the one standing in the dock having to explain yourself.
    Not him, not your solicitor. So. I need you to explain why—two things we’ve uncovered—yesterday
    you told us that you have never met Ana Vasalescu. D’you remember? You also told
    us that no-one else has driven your van in the last six months. Yeah? So—Sean—can
    you tell me what your response is if I tell you that our forensic people have
    found strands of Ana Vasalescu’s hair—her DNA—in your van?'
  - 'JODIE: And yesterday. You told us that you don’t know Lynn Dewhurst. Do you remember?
    Could you explain to me why then, Sean, you’ve got Lynn Dewhurst’s mobile phone
    number in your contacts on your mobile phone?'
