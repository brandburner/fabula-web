  title: Catherine’s grief surfaces at dawn
  description: At dawn, Catherine returns home after responding to a rape case, only
    to find an unmarked, glittery birthday gift for her grandson Ryan on the doorstep—a
    discovery that immediately unsettles her. Inside, Clare, already awake and concerned,
    confronts her about her absence, assuming she had gone to visit Becky’s memorial,
    a place Catherine often retreats to on Ryan’s birthday. The exchange reveals Clare’s
    deep, unspoken empathy for Catherine’s annual grief, which surfaces when Clare
    admits she always thinks of her on this day. Catherine, exhausted and emotionally
    raw, breaks down in a quiet, restrained way, her vulnerability exposed in the
    dim hallway. Their shared moment—marked by Clare’s quiet support and Catherine’s
    reluctant acknowledgment of their shared pain—marks a rare, unguarded connection
    between them, underscoring the weight of Ryan’s birthday as a day haunted by Becky’s
    suicide and the fragility of Catherine’s emotional armor. The gift’s ominous presence
    lingers as an unspoken threat, foreshadowing deeper disruptions to come.
