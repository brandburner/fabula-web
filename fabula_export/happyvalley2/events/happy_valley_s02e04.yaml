  title: Sean’s murder charges derail his rape trial
  description: "\n  In the custody suite, Sean Balmforth—already charged with Leonie’s\
    \ rape and assault—is mid-processing when Jodie Shackleton (H-MIT) abruptly arrests\
    \ him for the murders of four women: Ana Vasalescu, Aurelija Petrovic, Lynn Dewhurst,\
    \ and Vicky Fleming. Sean’s defiant denial (‘I paid her, she’s a prostitute’)\
    \ collapses into panic as Jodie recites the formal charges, his solicitor visibly\
    \ stunned. The revelation exposes a systemic failure: Sean’s guilt for Leonie’s\
    \ rape is now overshadowed by a far graver accusation, one he insists is fabricated.\
    \ John Wadsworth, present but silent, knows Sean is innocent of Vicky’s murder—a\
    \ fact that deepens the moral crisis of the investigation. The scene pivots from\
    \ a routine rape charge to a high-stakes murder inquiry, forcing Catherine Cawood’s\
    \ team to confront the possibility of a serial predator operating within their\
    \ own ranks. The tension hinges on Sean’s raw desperation and John’s complicit\
    \ silence, both of which underscore the institutional rot Cawood is fighting to\
    \ expose.\n  "
