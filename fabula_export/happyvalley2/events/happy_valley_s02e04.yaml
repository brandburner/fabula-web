      are manipulated.
    - Through **institutional protection** of Catherine, which Tommy uses to fuel
      his narrative of a ‘rigged system.’
    institutional_impact: The scene reinforces the **theme of institutional distrust**,
      portraying the police as either complicit or incompetent—either way, unable
      to provide justice for Tommy or protect Ryan from his influence.
    internal_dynamics: Tommy implies **factional corruption** within the force, suggesting
      that Catherine’s allies are actively covering up crimes to protect her.
