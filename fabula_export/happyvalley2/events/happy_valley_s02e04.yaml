  title: Night Patrol Begins Under Unspoken Threat
  description: "\n  The Norland Road Police Station’s night shift begins with a quiet\
    \ but charged departure: two uniformed officers and the night duty constable exit\
    \ the station and climb into their patrol vehicle, their movements routine yet\
    \ heavy with unspoken tension. The scene is framed by the lingering shadow of\
    \ Tommy Lee Royce’s influence—his presence felt even from prison—and the unresolved\
    \ weight of the rape investigation. Catherine Cawood’s absence from this moment\
    \ is notable; her confrontation with the Special Constables over their dismissive\
    \ handling of Leonie’s case has left the station’s atmosphere fractured. The patrol\
    \ car’s engine turning over signals the start of a shift that will inevitably\
    \ collide with the escalating threats of the case, the institutional neglect Catherine\
    \ is fighting against, and the personal reckoning she faces with Ryan’s mysterious\
    \ gift. The departure is not just a procedural beat but a visual metaphor for\
    \ the precarious balance of order and chaos, where the night’s potential for violence\
    \ looms as large as the station’s failing systems.\n  "
