  title: Catherine calls Shepherd with breakthrough
  description: 'At 05:33 in the dead of night, Sergeant Catherine Cawood—still processing
    the fallout from Leonie’s rape case and the institutional failures she’s just
    confronted—interrupts Detective Andy Shepherd’s sleep with an urgent call. Her
    voice is controlled but charged with the weight of new evidence: the partial registration
    number Leonie provided has led to a critical development in their investigation.
    This isn’t just a procedural update; it’s a turning point that escalates the case
    from routine police work to a high-stakes confrontation with Tommy Lee Royce’s
    shadowy influence. Catherine’s call underscores her relentless professionalism,
    even as she’s emotionally raw from the day’s traumas—her grandson’s birthday,
    the rape victim’s suffering, and the moral compromise of not reporting the negligent
    Special Constables. The moment marks a shift in the investigation’s urgency, as
    the connection to Royce looms like an unspoken threat, forcing Shepherd to engage
    with a case that now feels personal and dangerous.'
