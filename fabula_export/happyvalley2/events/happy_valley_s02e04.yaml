    This fella we picked up last night. He works for your dad. / ANN: Does he? I dunno.
    I don’t know half the people who work for me dad.'
  - 'CATHERINE: You and your dad— or just your dad— didn’t send our Ryan a ridiculously
    expensive birthday present this morning, did he? / ANN: Not that I know of.'
