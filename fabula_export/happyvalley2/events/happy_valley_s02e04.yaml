  title: Neil confesses his affair and blackmail
  description: 'In the intimate, vulnerable setting of Clare’s bedroom, Neil—visibly
    tormented—finally admits to Clare that he had a brief but destructive affair with
    Vicky Fleming, a colleague from his past. The confession unfolds in halting, agonized
    bursts, revealing how Vicky’s relentless emotional manipulation and blackmail
    (demanding £100 weekly payments or she’d expose him to his wife) spiraled into
    a calculated act of humiliation: she drugged him, photographed him in a compromised
    state, and distributed the images to everyone in his phone book. The fallout shattered
    his marriage, career, and self-respect, leaving him an alcoholic and consumed
    by rage. His raw, visceral admission—‘I would’ve liked to have killed her. And
    now someone has’—not only exposes his moral fragility but also implicates him
    in the broader web of Vicky’s murder, while deepening Clare’s complicity in the
    secret and the tension between personal loyalty and professional duty in Catherine’s
    investigation. The scene’s emotional rawness and Neil’s physical distress (shaking,
    nausea, inability to meet Clare’s eyes) underscore the psychological toll of his
    betrayal and the irreversible consequences of his choices.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e04
  scene_sequence: 28
  sequence_in_scene: 49
  key_dialogue:
  - 'NEIL: I knew Vicky Fleming. That woman... Yeah. Yeah. It was her I... had a fling
    with. When everything went wrong for me. I used to work with her. At the building
    society. So that’s big.'
  - 'NEIL: She’d go on about wanting me to leave Sue and the kids. And I... I couldn’t.
    Which—I should never have started it in the first place, I know that—but I wasn’t
    ready to leave my family for her. But she kept pushing and pushing and eventually...
    I said no; if it came to the crunch I’d be stopping with Sue and the kids. And...
    So she blackmailed me.'
  - 'NEIL: She humiliated me... She’d drugged me. I don’t know for a fact, but I think
    that’s what she did. I think she laced a drink I had with something like—that
    date rape drug I assume, I don’t know—and then... and I have no memory of this.
    She took pictures. Of me. Looking... Compromised. Ridiculous... Sexually. And
    then—she sent them to everyone in my phone book, she’d downloaded my phone book.
    Everyone. Everyone. I lost my family, I lost my job. A lot of friends. And I became
    an alcoholic. And I would’ve liked to have killed her. And now someone has.'
