  - object_uuid: ger_object_5121df2225eb
    description_of_involvement: 'The £100 weekly blackmail payments Neil made to Vicky
      are a tangible, rhythmic symbol of her control over him. His admission—‘She
      wanted a hundred quid a week. Every week. Or she’d tell Sue’—reveals the financial
      and psychological toll of her extortion. The payments are a failed attempt to
      buy silence, a bandage on a bleeding wound. When Neil stops paying, Vicky escalates
      to the photographs, showing that money alone could never satisfy her thirst
      for vengeance. The payments become a dark irony: Neil’s attempt to ‘live like
      this’ only delayed his ruin.'
    status_before_event: Cash payments made by Neil to Vicky for several weeks, depleting
