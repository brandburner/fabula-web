  title: Catherine forces DNA from defiant Daryl
  description: Catherine enters the interrogation room where Daryl Garrs, in tears
    and visibly distressed, refuses to cooperate with DNA and fingerprint collection.
    She immediately asserts control by donning gloves and preparing the DNA kit, making
    it clear the procedure will proceed regardless of his consent. Daryl, still seething
    over the bullying that led to his violent retaliation, accuses Catherine of failing
    to protect him, while she acknowledges the limitations of the system. When he
    resists, she and Shaf forcibly take the swab, escalating the confrontation into
    a physical struggle. The scene underscores Catherine’s ruthless pragmatism—her
    willingness to bypass consent when stakes demand it—while exposing the raw tension
    between institutional authority and individual desperation. Daryl’s defiance and
    Catherine’s unyielding approach reveal the systemic fractures in trust between
    the police and vulnerable young men like him, foreshadowing the moral compromises
    she’ll face in the investigation.
