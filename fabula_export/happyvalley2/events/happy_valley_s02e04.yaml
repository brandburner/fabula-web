  title: Tommy manipulates Frances into escalation
  description: In a tense prison visitation, Tommy Lee Royce escalates his psychological
    manipulation of Frances, shifting from frustration to outright coercion after
    she reveals her attempt to undermine Catherine by sending Ryan a birthday gift
    under Tommy’s name. Tommy dismisses her efforts as naive, doubling down on his
    conspiracy theory that Catherine murdered his mother and is orchestrating a cover-up.
    When Frances hesitates to commit to his violent demands, Tommy weaponizes emotional
    blackmail—threatening to end their relationship unless she aligns fully with his
    agenda. The scene culminates in a chilling nonverbal cue (Tommy miming a throat-slitting
    gesture) that suggests he’s pushing Frances toward direct, illegal action against
    Catherine. The exchange deepens the narrative’s web of distrust, framing Frances
    as a vulnerable pawn in Tommy’s vendetta while reinforcing his role as a masterful
    orchestrator of chaos from behind bars. The moment also foreshadows Frances’ potential
    moral unraveling, as her idealism clashes with Tommy’s ruthless pragmatism.
