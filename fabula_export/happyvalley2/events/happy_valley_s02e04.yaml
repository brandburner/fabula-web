  title: Jodie challenges Balmforth’s guilt in the car
  description: "\n  Inside the car en route to Halifax Nick, Jodie and Andy debate\
    \ Sean Balmforth’s forensic awareness and the personal nature of Vicky Fleming’s\
    \ murder, while John Wadsworth—seen through the camera’s lingering focus—remains\
    \ conspicuously detached. Jodie argues that Balmforth’s chaotic lifestyle contradicts\
    \ the meticulous crime scene, suggesting Vicky’s murder was personal, unlike the\
    \ other victims. Andy dismisses her concerns, citing circumstantial evidence (Balmforth’s\
    \ phone records) and class-based assumptions about Vicky’s perceived vulnerability.\
    \ The exchange reveals Jodie’s methodical skepticism and Andy’s reliance on institutional\
    \ assumptions, while John’s silence and the camera’s focus on him hint at his\
    \ hidden connection to Vicky. The scene underscores the team’s fractured investigative\
    \ approaches and foreshadows deeper conflicts over evidence and bias.\n  "
  episode_uuid: ep_sea_ser_happy_valley_s02_e04
  scene_sequence: 32
  sequence_in_scene: 55
  key_dialogue: &id029
  - 'JODIE: I’m suggesting it’s odd - John? For somebody with such a disorganised
    lifestyle, who lives in chaos and squalor and spends half his life pissed out
    of his tiny f[ucking] skull, not to leave any DNA at any of the sites. Are we
    really believing this lad is that forensically aware? And that capable?'
  - 'JODIE: That aside though boss. What I still can’t square. Is Vicky Fleming. Vicky
    wasn’t a prostitute. There were significant differences, and we’ve made this leap,
    we’ve made this assumption—'
  - 'JODIE: He. Must have been in that flat. He must have burnt the flat out - I don’t
    care what the fire service said - that is just too much of a coincidence - to
    be an oil lamp she’s left on. He was burning evidence. That is so different from
    - that’s someone who knows her. It’s personal, the others weren’t personal.'
  - 'ANDY: We don’t know that. This lad’s got Lynn Dewhurst’s number in his contacts
    on his phone.'
