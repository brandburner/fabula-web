  title: Catherine Finds Tommy’s Gift
  description: 'At dawn, Catherine returns home to find a glittery, ominously wrapped
    birthday gift for Ryan on her doorstep—no sender listed. The parcel’s cheerful
    exterior ("HAPPY 10th BIRTHDAY RYAN!") clashes with the threat it implies, given
    Tommy Lee Royce’s prison influence. Inside, she places it among Ryan’s other presents,
    her exhaustion from the rape case compounding her unease. Clare, already awake
    and attuned to Catherine’s grief, confronts her about her absence, assuming she’d
    visited Becky’s memorial. The exchange reveals Clare’s quiet vigilance over Catherine’s
    emotional state, while Catherine’s terse admission of the rape case exposes the
    institutional failures she’s battling. When Clare mentions Becky, Catherine’s
    stoic facade cracks—her silent tears and whispered reassurances ("We’ll get through
    today") underscore the raw, unspoken grief they share. The scene pivots from the
    external threat (Tommy’s gift) to the internal one (Becky’s memory), deepening
    the tension between Catherine’s professional burdens and her personal trauma.
    The gift becomes a ticking clock, its glittery surface masking the violence of
    its origin, while Clare’s empathy forces Catherine to confront emotions she usually
    suppresses. The moment is a turning point: the gift’s discovery sets up the Royce
    vendetta, but Clare’s presence ensures the scene’s emotional core isn’t just about
    threat—it’s about the cost of survival for both women.'
