  title: Catherine forces DNA from defiant Daryl
  description: "\n  Catherine enters a tense interrogation room where Daryl Garrs,\
    \ visibly distressed, refuses to cooperate with DNA collection—a direct consequence\
    \ of her earlier promise to protect him from bullies. The scene escalates as Daryl,\
    \ still seething from his violent retaliation against his tormentors, accuses\
    \ Catherine of failing him. She responds with cold pragmatism, making it clear\
    \ the DNA will be taken by force if necessary. The power dynamic shifts as Shaf\
    \ assists in restraining Daryl, underscoring the systemic coercion of the police\
    \ state. Daryl’s defiance isn’t just about the DNA—it’s a protest against the\
    \ very system Catherine represents, one that failed to shield him from violence.\
    \ The struggle becomes a microcosm of the series’ themes: institutional betrayal,\
    \ the cost of justice, and the blurred line between victim and perpetrator. Catherine’s\
    \ willingness to bypass consent reveals her moral compromises, while Daryl’s resistance\
    \ exposes the raw desperation of those trapped in cycles of violence.\n  "
