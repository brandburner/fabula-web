  title: Neil refuses to report Vicky’s blackmail
  description: In the quiet of an empty shop, Clare presses Neil to report Vicky Fleming’s
    blackmail to the police, arguing it contradicts the serial killer profile. Neil
    resists, fearing professional ridicule and the emotional toll of reliving his
    trauma. His decision to dismiss her death as a random attack—buried evidence—deepens
    the case’s ambiguity and underscores institutional failure to protect vulnerable
    women. The exchange reveals Neil’s fragility, Clare’s moral urgency, and the systemic
    gaps in the investigation. The moment ends with a fragile reconciliation, as Clare
    invites Neil to dinner, marking a tentative thaw in their fractured relationship
    amid the broader chaos of the case.
  episode_uuid: ep_sea_ser_happy_valley_s02_e04
  scene_sequence: 36
  sequence_in_scene: 60
  key_dialogue:
  - |-
    CLARE: I was thinking. You know, what you told me last night.
    NEIL: Yeah.
    CLARE: I’ve said I won’t say anything to our Catherine, and I shan’t, I’ve promised. But. Don’t you think you should tell the police? I’m just thinking... that whoever killed her. She might have been blackmailing him.
  - 'NEIL: If I went down there and offered information, first of all they’d think
    I was a crank. And they’d be laughing at me. And then I’d have to go through it
    all. Again and again and again and you don’t know what that does to me, Clare.'
  - 'CLARE: I’m doing spaghetti bolognese if you’re coming for your tea.'
