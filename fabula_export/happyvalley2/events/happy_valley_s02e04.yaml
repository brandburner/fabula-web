  title: Catherine and Frances probe Tommy’s gift
  description: 'Catherine, visibly shaken, confides in Mike about her fear that Tommy
    Lee Royce orchestrated Ryan’s Scalextric gift from prison, revealing her lingering
    trauma. Mike reassures her while promising to investigate the gift’s origin. Meanwhile,
    Frances subtly interrogates Ryan about the discarded gift, exploiting his emotional
    vulnerability to reframe Tommy’s actions as an act of remorse. She plants doubt
    in Ryan’s mind by questioning Tommy’s guilt and emphasizing his ‘kind face,’ strategically
    undermining Catherine’s authority and deepening the narrative tension around Tommy’s
    influence. The scene splits into two parallel investigations: Catherine’s search
    for reassurance and Frances’ calculated manipulation of Ryan’s perception, both
    advancing the mystery of the gift’s significance and its ties to the ongoing case.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e04
  scene_sequence: 31
  sequence_in_scene: 53
  key_dialogue: &id027
  - 'CATHERINE: Am I overreacting?'
  - 'MIKE: He tried to kill you, Catherine. You’re not overreacting. We’ll send it
    all off for fingerprints, and I’ll ring the prison liaison officer to talk to
    someone at Gravesend. Let’s find out who visits him, who he writes to, who he
    has phone calls with. If he is behind it, he’ll be dealt with. And if it is a
    crank, it’s a shame they’ve got nothing better to do.'
  - 'FRANCES: Perhaps. I don’t know. It’s his way of trying to tell you all how sorry
    he is. About what happened.'
  - 'FRANCES: I googled your dad. And I can’t believe he was responsible for half
    the things he was sent to prison for. Because he has such a kind face.'
