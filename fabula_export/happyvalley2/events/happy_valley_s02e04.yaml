- fabula_uuid: cand_evt_scene_bcace2f00280e185_02
  global_id: null
  title: Catherine Confronts Negligent Officers
  description: 'In the locker room of Norland Road Police Station, Sergeant Catherine
    Cawood intercepts Special Constables Steph and Bryony as they return from a pizza
    break, their casual demeanor clashing with the gravity of the night’s events.
    Catherine, seething beneath a deceptively calm exterior, exposes their dereliction
    of duty in handling a rape victim—Leonie—a 19-year-old left bruised and traumatized,
    abandoned at a hospital entrance without even a statement taken. She dismantles
    their excuses (a busy night, skepticism toward prostitutes) with brutal precision,
    forcing them to confront their complicity in systemic failure. Steph shows remorse,
    but Bryony’s defiance reveals a deeper institutional rot: officers who treat victims
    as liars and their own roles as optional. Though Catherine threatens professional
    standards, she ultimately withholds reporting them, prioritizing her grandson’s
    birthday over institutional accountability—a choice that underscores her exhaustion
    and the moral compromises demanded by her dual roles as cop and grandmother. The
    confrontation leaves Steph chastened and Bryony resentful, while Catherine’s decision
    to leave temporarily masks her unresolved conflict between justice and personal
    reprieve, all under the looming shadow of Tommy Lee Royce’s influence.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e04
  scene_sequence: 4
  sequence_in_scene: 8
  key_dialogue:
  - 'CATHERINE: Shall I tell you what I’ve been doing? I’ve just briefed the night
    crew on an arrest strategy for a fella that’s raped and assaulted a nineteen-year-old.
    She’s gone off to the Opal Unit in Bradford so we can get her properly examined
    and now I’m going to wake Mr. Shepherd up and tell him I think he might want to
    look at this bloke because he might - just might - be the twisted little bastard
    that’s been killing prostitutes.'
  - 'CATHERINE: You dropped her at the hospital doors. You didn’t even see her inside.
    She didn’t go in. After you’d left her. She was too upset, she was too frightened.
    She’s stood in the cold for an hour and a half frozen daft waiting for a bus to
    get home.'
  - 'CATHERINE: You know - you lot - you come in and you give us four hours a week.
    If we’re lucky, if you can be bothered. The least you could do when you get here
    is engage.'
