  title: Catherine’s fractured return to duty
  description: 'Catherine Cawood bursts into the Norland Road Police Station locker
    room still in civilian clothes, her abrupt arrival punctuated by the fading roar
    of a speeding car—a lingering echo of the chaos she’s left behind. The scene underscores
    her duality: physically present but emotionally raw, as the weight of Leonie’s
    rape case and the unsettling mystery of Ryan’s birthday gift collide with the
    institutional indifference she’s about to confront. Her entrance is not just a
    return to duty but a collision of personal and professional crises, where the
    past (Becky’s suicide, Tommy Lee Royce’s shadow) and present (Leonie’s trauma,
    the Scalextric gift) demand immediate reckoning. The locker room, a space of routine
    and camaraderie, becomes a battleground for Catherine’s fractured psyche, where
    every glance and interaction will test her ability to compartmentalize—or force
    her to confront the cracks in her armor.'
