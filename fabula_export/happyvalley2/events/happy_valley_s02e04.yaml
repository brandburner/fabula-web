- fabula_uuid: cand_evt_scene_0086af2e2ab8b1d9_02
  global_id: null
  title: Andy probes John’s domestic strain
  description: "\n  In a tense, off-the-record exchange, Andy Shepherd pulls John\
    \ Wadsworth aside after the morning briefing to address a critical detail: John’s\
    \ number was found on Vicky Fleming’s phone. John deflects with a plausible explanation—a\
    \ minor professional interaction from a past fraud case—but his evasive body language\
    \ and fragmented responses betray deeper unease. Andy, sensing something amiss,\
    \ pivots to John’s personal life, asking if everything is ‘all right at home.’\
    \ John’s reaction—a sudden shift to subdued, self-conscious vulnerability—reveals\
    \ the cumulative toll of the investigation and his own hidden burdens. The moment\
    \ underscores the fragility of John’s professional facade and hints at the unraveling\
    \ of his personal life, which will later intersect with Neil’s confession about\
    \ Vicky. Meanwhile, Jodie’s teasing about John’s ‘date with a pissed PCSO’ adds\
    \ a layer of levity that contrasts with the underlying tension, exposing the team’s\
    \ fractured dynamics and John’s uncharacteristic defensiveness. The exchange serves\
    \ as both a setup for John’s eventual breakdown and a subtle foreshadowing of\
    \ the domestic chaos to come.\n  "
  episode_uuid: ep_sea_ser_happy_valley_s02_e04
  scene_sequence: 9
  sequence_in_scene: 17
  key_dialogue: &id013
  - 'ANDY: Sean Balmforth. Date of birth seventeen eleven eighty-five. Twenty-nine
    years old. Address thirty-four Burley Road, Illingworth. He has a string of convictions
    and he’s on the sex offenders’ register. Unlawful Sexual Intercourse. With a fourteen-year-old.
    That was ten years ago.'
  - 'ANDY: Telecoms found your name and number on Vicky Fleming’s mobile phone.'
  - 'JOHN: D’you know. I had a funny feeling. I wasn’t certain. But. Two years, eighteen
    months since? I was working on a fraud investigation - up at t’building society
    - and she was [just] - she was the point of contact. So - yeah. Yeah. Yeah, I’d
    have given her my number.'
  - 'ANDY: You shoulda said.'
  - 'JOHN: I don’t think I spoke to her more than once or twice.'
  - 'ANDY: So that’s the only contact you’ve ever had with her?'
  - 'JOHN: Yeah. Yeah.'
  - 'ANDY: John. Is everything all right at home? I’ve kept meaning to ask.'
  - 'JOHN: Yeah. Well. You know. The slings and arrows.'
  - 'ANDY: Well you know this door’s always open, don’t you?'
  - 'JOHN: Yeah.'
  - 'JODIE: ((wry)) How was your date? With your little job pissed PCSO?'
  - 'JOHN: What date? What date?'
