  title: John’s violent confrontation at home
  description: John returns home to find his belongings discarded on the driveway
    and the locks changed by Amanda, a brutal act of finality that shatters his denial.
    His initial disbelief turns to rage as he tries the door, confirming the locks
    have been altered. When Amanda disappears from an upstairs window—clearly having
    waited to witness his reaction—John’s anger explodes. He pounds on the door, shouting
    her name, his desperation and fury escalating into a physical confrontation. The
    scene exposes the depth of his emotional collapse, marking the irreversible end
    of his relationship with Amanda and foreshadowing his unraveling. The violence
    of his reaction underscores how far he’s willing to go to reclaim control, revealing
    the fragility of his grip on reality as his personal life fractures alongside
    his professional unraveling. The event serves as a turning point, pushing John
    further into isolation and desperation, while also highlighting the consequences
    of his past actions (or inaction) on those around him.
