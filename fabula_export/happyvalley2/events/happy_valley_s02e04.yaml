  title: Catherine’s obsessive fixation on Tommy’s gift
  description: In the kitchen, Catherine spirals into self-recrimination over her
    handling of Ryan’s birthday gift from Tommy, convinced it’s a deliberate provocation.
    Clare attempts to soothe her with rationalizations—suggesting it might be a random
    act—but Catherine’s paranoia persists, fixating on the idea that someone close
    to them is complicit. The tension escalates when Daniel enters, delivering Ryan’s
    silent request for Catherine’s presence, a moment that underscores the boy’s unspoken
    need for her. Clare’s observation about Catherine’s delicate balancing act—protecting
    Ryan from the truth while preparing him for it—reveals the emotional toll of Tommy’s
    lingering influence. The scene culminates with Clare’s failed attempt to distract
    Neil with tea, leaving Daniel alone to process the weight of his mother’s long-standing
    trauma. The moment highlights the suffocating atmosphere of the household, where
    even small gestures (like a birthday gift) become loaded with menace, and superficial
    comforts (like tea) cannot ease the deeper wounds of the past.
