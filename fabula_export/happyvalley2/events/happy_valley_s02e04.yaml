    Sean, we’re investigating the deaths of four women. Ana Vasalescu, Aurelija Petrovic,
    Lynn Dewhurst and Victoria Fleming.'
  - 'SOLICITOR: Sean’s prepared a statement. If I could read it out.'
  - 'SOLICITOR: I have been asked to account for my whereabouts at four different
    periods of time across several days. I cannot at this moment in time verify my
    exact whereabouts on any of the dates and times in question, particularly the
    first three, as they are all some considerable time ago. But I would like to state
    clearly that I do not know Ana Vasalescu, Aurelia Petrovic, Lynn Dewhurst or Victoria
    Fleming—and to my knowledge have never met or come into contact with them in the
    past.'
  - 'SEAN: No comment.'
