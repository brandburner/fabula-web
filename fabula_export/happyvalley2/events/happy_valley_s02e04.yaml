  title: Catherine probes Ann about Ryan’s gift
  description: On the police station stairs after an 8am briefing, Catherine Cawood
    notices Ann Gallagher’s hungover state but chooses not to confront her directly—yet.
    Instead, she subtly tests Ann’s knowledge of Sean Balmforth, a suspect linked
    to Ann’s father, Nevison Gallagher. When Mike interrupts to praise their recent
    work, Catherine seizes the moment to pivot to the unexplained Scalextric gift
    Ryan received from Tommy Lee Royce. Ann denies involvement, but Catherine’s probing
    reveals her growing suspicion that Ann’s family—or Tommy’s influence—is manipulating
    events behind the scenes. The exchange underscores Catherine’s investigative instincts
    and her distrust of Ann’s loyalty, while Ann’s evasiveness hints at deeper secrets
    tied to Nevison’s business and Tommy’s reach from prison. The tension escalates
    as Catherine’s paranoia about Ryan’s safety clashes with Ann’s defensive posture,
    setting up a future confrontation over Ann’s potential complicity in Tommy’s schemes.
