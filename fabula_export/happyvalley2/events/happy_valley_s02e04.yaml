  title: Catherine probes Ann’s evasive behavior
  description: After the morning briefing, Catherine Cawood isolates Ann Gallagher
    on the station stairs, noting her pale, hungover appearance. While feigning concern
    for Ann’s health, Catherine subtly tests her loyalty by asking about her father’s
    connection to Sean Balmforth—a known sex offender now in custody. Ann deflects
    with vague denials, but her discomfort reveals deeper unease. The exchange escalates
    Catherine’s suspicion that Ann may be hiding something tied to the investigation,
    particularly given Ann’s father’s criminal associations. The tension is briefly
    interrupted by Mike’s praise for their work, but Catherine quickly pivots back
    to probing Ann about a mysterious birthday gift sent to her grandson Ryan, further
    probing Ann’s potential complicity. The scene marks a turning point in their professional
    dynamic, with Catherine’s instincts sharpening against Ann’s evasive behavior,
    hinting at Ann’s possible involvement in the case’s darker layers.
