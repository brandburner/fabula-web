  key_dialogue:
  - 'DARYL: You said you were gonna deal with em, you said you were gonna nip it in
    the bud. I shouldn’t even be here.'
  - 'CATHERINE: They were arrested and charged and they’ll be up in court in the next
    few weeks, and I’ll go up there and speak to ‘em again but - you know, with the
    best will in the world - there’s only so much we can do, and frankly this sort
    of silly business doesn’t help, it just perpetuates the bad feeling.'
  - 'DARYL: They’re animals.'
  - 'CATHERINE: Yup.'
  - 'DARYL: They shouldn’t be allowed to walk, they shouldn’t be allowed to exist,
    they shouldn’t be allowed to breathe.'
  - 'CATHERINE: And now you’ve shattered one of their collar bones with a lump hammer.
    Are you gonna let me do this?'
