      Her emotional state is one of grim determination, the kind that comes from knowing
      this is the only way to protect herself and her children from further pain.
      The upstairs window is her throne, and John’s rage below is the confirmation
      she needed that her decision was the right one.
    goals:
    - To ensure John understands the marriage is over—no negotiations, no second chances—by
      making the end as undeniable and public as his infidelity was private.
    - To reclaim her agency and her home, to assert that she is no longer a passive
      participant in her own life, but the one who dictates the terms of its next
      chapter.
    what_happened: Amanda is the unseen puppeteer of this moment, her presence felt
      only in the discarded belongings, the text message, and the fleeting glimpse
      of her at the upstairs window. She has orchestrated John’s humiliation with
      surgical precision, ensuring he arrives home to a scene that leaves no room
      for denial. Her disappearance from the window after witnessing his reaction
      is the ultimate power move—she doesn’t need to engage, to explain, or to justify.
      The locks, the text, and her absence speak for her. This is not a woman seeking
      confrontation; it’s a woman who has already made her decision and is now watching
