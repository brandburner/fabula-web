      directive: photograph Ann in the cellar, ‘not looking like she’s having a right
      lot in the way of fun.’ The phone glows ominously, its screen a portal to Ashley’s
      authority. Lewis recoils at its content, the device becoming a physical manifestation
      of the group’s cruelty. Tommy uses it to silence Lewis, framing the photograph
      as an order that must be obeyed. The phone’s compact, unremarkable design contrasts
      with the horrific act it enables, making it a chilling symbol of bureaucratic
      evil.'
    status_before_event: In Tommy’s pocket, unused but ready to be deployed as leverage.
    status_after_event: Displayed to Lewis, then presumably used to take the photograph
      of Ann (off-screen), its role in the crime now active.
