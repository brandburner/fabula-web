- fabula_uuid: cand_evt_scene_860aa445871b9028_01
  global_id: null
  title: '**"Cawood’s Unflinching Collar: The Ice Cream Van Raid and the Cost of Justice"**'
  description: "\n  In a high-stakes, chaotic takedown, **Sergeant Catherine Cawood**\
    \ leads a coordinated police raid on a drug-dealing ice cream van, where the facade\
    \ of innocence (a playground, children) masks a thriving criminal operation. As\
    \ the van is boxed in by patrol cars, the dealers attempt to flee, but Cawood—driven\
    \ by her relentless pursuit of justice—locks onto **Alfie Tyson**, rugby-tackling\
    \ him to the ground despite the risk. The takedown is brutal: Tyson retaliates\
    \ with a vicious kick to her eye, yet Cawood remains eerily composed, calmly arresting\
    \ him while uncovering a stash of cash and his ID. The scene underscores her **self-destructive\
    \ dedication to the job**, her **physical and emotional resilience**, and the\
    \ **blurring of professional and personal stakes**—especially as her obsession\
    \ with Tommy Lee Royce looms in the background. **Shafiq’s assistance** in subduing\
    \ Tyson hints at a fragile but critical partnership, while the raid’s **controlled\
    \ chaos** mirrors the escalating tension of the larger investigation. The moment\
    \ is a **microcosm of Cawood’s world**: a place where violence is met with cold\
    \ professionalism, where every arrest feels like a step closer to reckoning, and\
    \ where the line between justice and vengeance grows ever thinner.\n  The event\
    \ serves as both a **tactical victory** (securing a dealer and evidence) and a\
    \ **psychological warning**—Cawood’s unshaken demeanor in the face of pain suggests\
    \ she’s in too deep, and the audience is left questioning how much more she can\
    \ take before she breaks.\n  "
