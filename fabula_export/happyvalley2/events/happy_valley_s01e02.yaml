        *Lewis’ terrified scramble to escape speaks volumes—his fear of Tommy outweighs any lingering guilt over abandoning Ann. Meanwhile, Ann’s paralysis in the face of Tommy’s return underscores her **total submission to his power**, a dynamic that will only escalate into further violence. The absence of dialogue between Tommy and Ann is itself a weapon: his silence is a **tool of psychological domination**, while her inability to even scream reveals the depth of her trauma and the futility of resistance.
