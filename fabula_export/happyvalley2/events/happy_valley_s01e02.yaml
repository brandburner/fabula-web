    precision**, but also a glimpse into her **relentless focus**: once she locks
    onto a target, nothing else matters. The urgency in her voice underscores the
    **stakes of the moment**—this isn’t just another arrest; it’s part of a larger,
    personal crusade.}'
  - '{speaker: CATHERINE, dialogue: Stop wriggling, you’re not going anywhere., context:
    Delivered with **chilling calm** *immediately after being kicked in the eye*,
    this line is a masterclass in **Cawood’s emotional detachment**. The contrast
    between her **physical vulnerability** (the kick) and her **psychological dominance**
    (the arrest) is striking. It’s not just about subduing Tyson—it’s about **asserting
