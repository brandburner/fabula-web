  scene_sequence: 58
  sequence_in_scene: 76
  key_dialogue: &id079
  - |-
    ASHLEY: *Kevin. Why’ve I got police knocking on my door down Milton Avenue?*
    KEVIN: *Where?*
    ASHLEY: *The house! Where I’m keeping her! I’ve had police knocking on it!*
  - |-
    ASHLEY: *Has Nevison been to the police?*
    KEVIN: *No. No! Not that I... no. No, he hasn’t. Not that I [know of]—*
    ASHLEY: *Well why they knocking on the door then?*
    KEVIN: *((terrified)) I’ve got no idea. Shit. Shit.*
  - |-
    ASHLEY: *Don’t worry, they went away again, I’m moving her, but why are they knocking on that door? What do they know?*
    KEVIN: *((at a loss)) I - I - I’ve absolutely no idea.*
