  title: 'The Call That Splits Her Focus: Catherine’s Crossroads of Duty and Instinct'
  description: "\n  In the tense aftermath of her emotionally charged confrontation\
    \ with Richard, Catherine Cawood—still raw from his rejection of Ryan—finds herself\
    \ unexpectedly face-to-face with Kevin Weatherill, Richard’s visibly nervous neighbor.\
    \ Kevin’s evasive body language (scurrying toward his house, avoiding eye contact)\
    \ immediately triggers Catherine’s instincts, but before she can press him further,\
    \ her phone rings. The call from Mickey Yip at the *Chef Imperial* delivers a\
    \ critical lead: Tommy Lee Royce, the fugitive rapist at the heart of her personal\
    \ vendetta, has been spotted nearby. The interruption forces Catherine into a\
    \ split-second decision—pursue Kevin’s cryptic behavior (which could tie to Richard’s\
    \ disappearance or the kidnapping plot) or abandon the lead to chase Royce, whose\
    \ whereabouts could mean the difference between life and death for Ann Gallagher.\
    \ The moment crystallizes Catherine’s fractured focus: her professional duty to\
    \ protect the public, her personal obsession with Royce, and her lingering concern\
    \ for Richard’s safety all collide in a single, high-stakes hesitation. Her choice\
    \ here will determine whether she remains a step behind the kidnappers or finally\
    \ gains the upper hand in a case that’s spiraling beyond her control.\n  "
