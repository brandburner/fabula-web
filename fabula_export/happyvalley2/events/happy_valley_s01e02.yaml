  object_involvements:
  - object_uuid: ger_object_4d83ced13ec3
    description_of_involvement: 'Ann Gallagher’s underwear (knickers) becomes a potent
      symbol of her dehumanization and Lewis’s fragile moral rebellion. Lewis insists
      on returning them to her, framing it as a small act of dignity: ‘I’ve give her
      her knickers back. And it might be best to leave it that way from now on.’ The
      underwear represents the last shred of her autonomy, and Lewis’s attempt to
      restore it—however futile—marks his first open defiance of Tommy’s sadism. The
      object is never seen but is central to the dialogue, its absence in the cellar
      a silent accusation of the men’s complicity.'
    status_before_event: Removed from Ann by Tommy (implied), likely discarded or
      used as a tool of humiliation in the cellar.
    status_after_event: Returned to Ann (implied), though its symbolic power is overshadowed
      by the looming threat of Tommy’s violence and Ashley’s orders.
    global_id: ger_object_4d83ced13ec3
  - object_uuid: ger_object_b90ed6f58f27
    description_of_involvement: 'The van keys, offered by Tommy to Lewis as a means
      of escape, become a symbol of the group’s manipulation. Tommy dangles them as
      a test: ‘Ashley wants you.’ The keys represent both a way out for Lewis and
      a trap—compliance means abandoning Ann to Tommy’s mercy. Lewis’s refusal to
      take them, despite his fear, is a turning point. The keys are a physical manifestation
      of the organization’s power to coerce and control, but in this moment, they
      also represent Lewis’s last chance to walk away. His rejection of them signals
      his (however fragile) moral stand.'
    status_before_event: In Tommy’s possession, used as leverage.
    status_after_event: Rejected by Lewis, remaining with Tommy—symbolizing Lewis’s
      entrapment in the moral dilemma.
    global_id: ger_object_b90ed6f58f27
  - object_uuid: ger_object_009d9969aa3c
    description_of_involvement: 'Tommy Lee Royce’s throat-slitting gesture is the
      scene’s most visceral moment, a physical manifestation of his psychopathy. He
      draws his finger slowly across his throat while casually remarking that the
      ‘safest thing’d be to’ kill Ann post-ransom. The gesture is accompanied by a
      suitably unpleasant noise, amplifying its threat. Lewis’s horrified reaction
      (‘That—that isn’t—that was never the plan’) underscores the gesture’s power
      as a conversation-ender. It’s not just a threat; it’s a statement of Tommy’s
      worldview: violence is the solution to all problems. The gesture lingers in
      the air, a silent promise of what’s to come if Lewis doesn’t fall in line.'
    status_before_event: A potential action, unspoken but implied in Tommy’s sadism.
    status_after_event: Executed as a physical threat, now a tangible part of the
      standoff—Lewis’s refusal to leave Ann alone is a direct response to this gesture.
    global_id: ger_object_009d9969aa3c
  - object_uuid: ger_object_69c70d923959
    description_of_involvement: 'The phone given by Ashley to Tommy is the ultimate
      tool of control in this scene. Tommy draws it from his pocket to display Ashley’s
      directive: photograph Ann in the cellar, ‘not looking like she’s having a right
      lot in the way of fun.’ The phone glows ominously, its screen a portal to Ashley’s
      authority. Lewis recoils at its content, the device becoming a physical manifestation
      of the group’s cruelty. Tommy uses it to silence Lewis, framing the photograph
      as an order that must be obeyed. The phone’s compact, unremarkable design contrasts
      with the horrific act it enables, making it a chilling symbol of bureaucratic
      evil.'
    status_before_event: In Tommy’s pocket, unused but ready to be deployed as leverage.
    status_after_event: Displayed to Lewis, then presumably used to take the photograph
      of Ann (off-screen), its role in the crime now active.
    global_id: ger_object_69c70d923959
