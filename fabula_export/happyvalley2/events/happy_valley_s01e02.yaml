    KEVIN: *I know.*
    KEVIN: *Except... I can’t.*
  - |-
    JENNY: *So you could... is there anything—this was all verbal? No emails, no—*
    KEVIN: *I phoned him. This morning. And just now. Calls are traceable.*
    JENNY: *But not the content, not what you say.*
    KEVIN: *No. No. I don’t know, I don’t think so.*
  - |-
    JENNY: *So you could just deny everything. You deny putting the idea in his head. You say those conversations never happened. It was all him.*
    JENNY: *People like that never escape consequences.*
