- fabula_uuid: cand_evt_scene_645b55d85c303c2f_01
  global_id: null
  title: '**"Cawood’s War Room: The Ice-Cream Van Hunt Commences"**'
  description: "\n  In a **high-octane, adrenaline-fueled sequence**, Sergeant Catherine\
    \ Cawood **abandons procedural caution** and **mobilizes her entire team** for\
    \ an immediate, high-stakes operation to apprehend the elusive 'ice-cream man'—a\
    \ drug-dealing van linked to Norland Road’s escalating chaos. The scene opens\
    \ with **Kirsten and another PC already prepped and buzzing**, their urgency mirroring\
    \ Cawood’s own **relentless drive**, as she barks orders with **military precision**.\
    \ Her **motherly but firm** reminder to Kirsten—*'And you make sure you’re tooled\
    \ up properly this time, lady'*—reveals her **protective instinct** even amid\
    \ chaos, while her **radio coordination with Shafiq** (positioned near the wharf)\
    \ **expands the operation’s scope**, turning a routine tip into a **multi-pronged\
    \ tactical strike**.\n\n  The **visual rhythm**—Cawood **grabbing gear, keys,\
    \ and her team in rapid succession**—**escalates tension**, signaling this isn’t\
    \ just another bust but a **critical escalation** in her **personal and professional\
    \ war** against the city’s underbelly. The **radio chatter** (*'Four-five to nine-two-four-two.\
    \ What’s your location, Shaf? One of us’ll pick y’up, it’s all hands on deck'*)\
    \ **underscores the urgency**, while her **physicality** (vest, helmet, belt)\
    \ **reinforces her role as a leader who leads from the front**. This moment **transforms\
    \ a fragmented investigation into a coordinated manhunt**, raising the narrative’s\
    \ stakes while **deepening Cawood’s arc**—her **leadership is tested**, her **vulnerabilities\
    \ exposed**, and the audience is reminded that **every tactical decision carries\
    \ human consequences**, especially as the kidnapping plot’s noose tightens.\n\n\
    \  **Narratively**, this event serves as a **catalyst**: it **sets up the ice-cream\
    \ van takedown** (a **payoff to Joyce’s tip-off**) while **foreshadowing the wharf\
    \ rendezvous with Shafiq**, where the **kidnapping plot’s next move** may unfold.\
    \ The **collision of personal and professional stakes**—Cawood’s **obsession with\
