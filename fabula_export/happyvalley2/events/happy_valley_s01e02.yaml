    description_of_involvement: 'Ann Gallagher’s underwear (knickers) becomes a potent
      symbol of her dehumanization and Lewis’s fragile moral rebellion. Lewis insists
      on returning them to her, framing it as a small act of dignity: ‘I’ve give her
      her knickers back. And it might be best to leave it that way from now on.’ The
      underwear represents the last shred of her autonomy, and Lewis’s attempt to
      restore it—however futile—marks his first open defiance of Tommy’s sadism. The
      object is never seen but is central to the dialogue, its absence in the cellar
      a silent accusation of the men’s complicity.'
