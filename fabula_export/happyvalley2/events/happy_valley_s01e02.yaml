    \ and the police’s proximity threatens to expose their entire operation. The stakes\
    \ escalate as Ashley’s authority wavers, revealing the fragility of his leadership\
    \ and the precariousness of Ann’s fate. The dialogue is terse, laced with subtext—Ashley’s\
    \ commands mask his own fear, while Lewis’s reluctance underscores the gang’s\
    \ crumbling cohesion. The scene is a masterclass in escalating tension, where\
    \ every line and gesture amplifies the urgency and danger of the situation.\n\
