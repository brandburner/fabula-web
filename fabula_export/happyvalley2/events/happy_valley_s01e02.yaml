    NEVISON: *We’re going to have to take it out of the business.*
    KEVIN: *I won’t. I won’t.*
    NEVISON: *And they must be watching me, because they know things.*
    KEVIN: *These people are often very—very highly organised.*
  - |-
    NEVISON: *Pay the money, get her back—safe and sound—then find out who the little—gits are and choke ‘em with it.*
    KEVIN: *Absolutely, absolutely.*
  - |-
    NEVISON: *I’ve got maybe two hundred grand I can lay my hands on immediately, but even then, are they going to let me withdraw that much in cash? Without asking bloody questions.*
    KEVIN: *It’s your money.*
    NEVISON: *They’re gonna start thinking I’m laundering money, then they’re gonna ring the police!*
