    description_of_involvement: 'The £200,000 cash is the tangible manifestation of
      Nevison’s love for Ann—and the instrument of his moral ruin. Though it does
      not yet exist in this moment (it is merely a promise, a sum to be extracted),
      its presence looms large over the scene. Nevison grips the edge of Kevin’s desk
      as he speaks of it, his voice cracking with the weight of what it represents:
      not just money, but the price of Ann’s life, the cost of his compliance, and
      the seed of his future vengeance. The cash is both a lifeline and a noose, the
      thing that will buy Ann’s freedom and bind Nevison to the kidnappers’ will.
      Its absence in this moment makes it all the more potent—a specter haunting every
      word, a promise that will change all their lives forever.'
    status_before_event: Nonexistent, but its promise hangs heavy in the air, a sum
      to be extracted from Nevison’s business and personal accounts.
    status_after_event: Now a concrete reality, its acquisition will mark the point
      of no return for Nevison and Kevin.
