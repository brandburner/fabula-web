    Ann Gallagher, her grief over Becky). The line also **foreshadows her self-destructive
    streak**: she’s willing to endure pain if it means getting her man.}'
  - '{speaker: CATHERINE, dialogue: Those are well expensive ice creams you’ve been
    flogging, Alfie., context: A **darkly ironic** remark that **undercuts the absurdity
    of the situation**. The ice cream van—a symbol of childhood innocence—has been
    weaponized for drug trafficking. Cawood’s **sarcasm** here isn’t just about mocking
