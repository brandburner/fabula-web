  key_dialogue: &id029
  - |-
    KEVIN: *Is he...? Not in?*
      *(A beat. His voice cracks slightly, the question loaded with unspoken dread.)*
      JUSTINE: *No, he’s popped home.*
      KEVIN: *Wh—*
      *(He cuts himself off, the aborted syllable hanging like a confession he can’t bring himself to finish.)*
  - |-
    JUSTINE: *Probably catch him on his mobile. If it’s important.*
      KEVIN: *Yeah. Yeah. Sure.*
      *(His agreement is hollow, a man already retreating into himself. The subtext is deafening: *It’s not just important. It’s life or death. And I’m too late.*)
