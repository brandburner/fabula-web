  key_dialogue:
  - |-
    KEVIN: ((his pulse is racing, he’s terrified)) No! God, no! These people... The thing is. The thing I didn’t know. Helen’s ill. Really ill. I mean—
    JENNY: ((awed silence)) Oh my God.
  - |-
    JENNY: Nevison must know someone. In the police. Surely, he’s—he must—
    KEVIN: Jenny. Jenny. It’s not an option. Not until he’s got her back, and then—
  - |-
    JENNY: ((something and nothing, compared to all this)) Oh, Ashley rang. From the farm.
    KEVIN: ((alarm, tries not to show it)) Ashley?
