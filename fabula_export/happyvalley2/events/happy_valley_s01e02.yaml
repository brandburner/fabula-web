  title: 'Catherine’s Moral Line in the Sand: The Fall of a Corrupt Councilor'
  description: |2-

      In the wake of a chaotic morning traffic accident, **Sergeant Catherine Cawood** confronts **Council Member Marcus Gascoigne**—a man whose political influence and personal rapport with her have historically shielded him from accountability. When Marcus refuses a breathalyzer test after a DUI incident, Catherine’s unyielding insistence on protocol exposes his hypocrisy and the fragility of his power. The tension escalates as she discovers a **plastic bag of white powder** hidden in his Porsche, forcing her to arrest him despite his threats and protests. This moment isn’t just about enforcing the law; it’s Catherine’s **defiant assertion of moral authority** in a system riddled with corruption. Her refusal to bend—even when Marcus leverages their past relationship—underscores her role as a **guardian of justice**, while his panic reveals the **rot beneath Todmorden’s polished surface**. The arrest isn’t just a procedural victory; it’s a **symbolic blow against the entitlement of the powerful**, setting up future conflicts where Marcus’s influence could retaliate against her. The scene crackles with **subtextual power dynamics**—Catherine’s quiet fury, Marcus’s desperate bluster, and the unspoken question: *How far will she go to clean up this town?*
