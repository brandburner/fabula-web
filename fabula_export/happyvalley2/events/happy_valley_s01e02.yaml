  key_dialogue:
  - "KEVIN: ((his pulse is racing, he’s terrified)) \nNo! God, no! These people...\
    \ The thing is. The thing I didn’t know. Helen’s ill. Really ill. I mean—\nJENNY:\
    \ Helen?\nKEVIN: Liver cancer. She’s dying, she’s..."
  - |-
    JENNY: Nevison must know someone. In the police. Surely, he’s—he must—
    KEVIN: Jenny. Jenny. It’s not an option. Not until he’s got her back, and then—
  - "JENNY: ((something and nothing, compared to all this)) \nOh, Ashley rang. From\
    \ the farm.\nKEVIN: ((alarm, tries not to show it)) \nAshley?\nJENNY: Something\
    \ about the rental on the site, he said could you ring him. When you got in."
