  key_dialogue: &id041
  - |-
    **RYAN**: *Granny’s been in a fight.*
    **CLARE**: *My God.*
    **CATHERINE**: *Is it bad?*
    **RYAN**: *She was chasing this scrote, and he kicked her in t’face.*
    **CLARE**: *Did he get away?*
    **RYAN**: *Hell, no.*
  - |-
    **CLARE**: *Daniel rang. We’ve been invited round for tea tomorrow.*
    **CATHERINE**: *All of us?*
    **CLARE**: *I said—‘I’ll see if Ryan can go round to his friend’s house’—and he didn’t say, ‘No, that’s fine, you bring him with you.’ So... I’m—yeah—assuming it’s just you and me.*
    **CATHERINE**: *So... he rang you. His aunty. He didn’t ring me, his mother.*
  - '**CATHERINE**: *(something she doesn’t do often)* *Have y’got any fags?*'
