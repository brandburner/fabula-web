    \ His visceral reaction (*‘Me? No. I—’*) betrays the fracture in his professional\
    \ loyalty, as Nevison’s cold repetition (*‘Yes.’*) underscores the transactional\
    \ nature of their relationship. This moment isn’t just about disposal; it’s a\
    \ litmus test for Kevin’s moral spine. The abrupt cut to black (*‘KEVIN’s appalled.\
    \ CUT TO:’*) leaves his internal conflict unresolved but charged—will he cross\
