  title: '**"Catherine’s High-Stakes Gambit: Mobilizing the Ambush on Cemetery Road"**'
  description: |2-

      In a **high-pressure tactical pivot**, Sergeant Catherine Cawood confirms Jonno’s location with Shafiq via radio, her voice clipped with urgency as she orchestrates a **covert backup operation** on Cemetery Road. The scene crackles with **military precision**—Catherine barks orders into her radio, coordinating a **double-crewed mobile unit** for silent approach, while Kirsten and another officer scramble into a patrol car. The **stakes are visceral**: this is no routine raid but a **desperate gambit** to intercept Jonno before the kidnapping plot spirals further. Catherine’s **strategic ruthlessness** is on full display—she’s not just hunting a drug dealer; she’s **racing against time** to dismantle a network that could lead her to Tommy Lee Royce, the escaped rapist who haunts her. The **tension is palpable**: every second counts, and the **fragile timeline** before the kidnappers’ next move hangs in the balance. This moment isn’t just about **tactical execution**—it’s a **defining test** of Catherine’s leadership, her **emotional resilience**, and her **willingness to bend rules** in the name of justice. The **radio chatter** and **rapid deployment** underscore the **urgency**, while the **silent determination** of her team hints at the **high cost** of failure.
  episode_uuid: ep_sea_ser_happy_valley_s01_e02
  scene_sequence: 12
  sequence_in_scene: 10
  key_dialogue: &id023
  - |-
    **CATHERINE** *(into radio, urgent)*:
        *'Is Jonno with you?'*

        **SHAFIQ** *(confirming)*:
        *'Yep, he’s here.'*

        **CATHERINE** *(barking orders)*:
        *'Two minutes. Bravo November Four-five to Control... Have we a mobile unit—double-crewed? I need ‘em for a back-up job on Turnpike Street in Elland. Silent approach, rendezvous on Cemetery Road.'*
  - |-
    **CONTROL** *(acknowledging)*:
        *'Go ahead four-five.'*
  - |-
    **CATHERINE** *(to team, low and intense)*:
        *'Move. Now.'* *(dives into patrol car, engine roaring to life)
