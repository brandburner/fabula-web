      take them, despite his fear, is a turning point. The keys are a physical manifestation
      of the organization’s power to coerce and control, but in this moment, they
      also represent Lewis’s last chance to walk away. His rejection of them signals
      his (however fragile) moral stand.'
    status_before_event: In Tommy’s possession, used as leverage.
    status_after_event: Rejected by Lewis, remaining with Tommy—symbolizing Lewis’s
      entrapment in the moral dilemma.
    global_id: ger_object_b90ed6f58f27
  - object_uuid: ger_object_009d9969aa3c
    description_of_involvement: 'Tommy Lee Royce’s throat-slitting gesture is the
      scene’s most visceral moment, a physical manifestation of his psychopathy. He
      draws his finger slowly across his throat while casually remarking that the
      ‘safest thing’d be to’ kill Ann post-ransom. The gesture is accompanied by a
      suitably unpleasant noise, amplifying its threat. Lewis’s horrified reaction
      (‘That—that isn’t—that was never the plan’) underscores the gesture’s power
      as a conversation-ender. It’s not just a threat; it’s a statement of Tommy’s
      worldview: violence is the solution to all problems. The gesture lingers in
      the air, a silent promise of what’s to come if Lewis doesn’t fall in line.'
    status_before_event: A potential action, unspoken but implied in Tommy’s sadism.
    status_after_event: Executed as a physical threat, now a tangible part of the
      standoff—Lewis’s refusal to leave Ann alone is a direct response to this gesture.
    global_id: ger_object_009d9969aa3c
  - object_uuid: ger_object_69c70d923959
    description_of_involvement: 'The phone given by Ashley to Tommy is the ultimate
