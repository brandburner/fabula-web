    \ her torment. The hesitation in his voice betrays his guilt, but the *need* to\
    \ ask reveals his complicity: he’s already complicit enough to fear the answer.\
    \ Ashley’s dismissive response (‘She’s fine’) isn’t reassurance; it’s a taunt,\
    \ a reminder that Kevin’s moral concerns are now irrelevant. The subtext: *You\
    \ don’t get to care anymore.*}"
  - "{speaker: ASHLEY, dialogue: There you go. That’s yours., analysis: \n      Delivered\
    \ with the casual cruelty of a predator offering a treat, Ashley’s line is the\
    \ scene’s emotional gut-punch. The possessive *‘yours’* isn’t generosity—it’s\
    \ ownership. Kevin isn’t being paid; he’s being *branded*. The plastic bag, a\
    \ mundane prop, becomes a noose. Ashley’s tone suggests this is the first of many\
    \ such transactions, each eroding Kevin further. The dialogue’s brevity amplifies\
    \ its menace: no negotiation, no room for refusal. Just the cold mechanics of\
    \ corruption.}"
