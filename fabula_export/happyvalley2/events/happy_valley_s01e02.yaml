  key_dialogue: &id035
  - |-
    **LEWIS** *(hesitant, probing)*:
        *‘Are we allowed to fuck her?’*

        **ASHLEY** *(amused, bemused)*:
        *‘You’re a sick little bastard, aren’t yer?’*

        **LEWIS** *(defensive, then horrified)*:
        *‘No, no, it isn’t me. It’s—he’s had her. In t’cellar.’*

        **ASHLEY** *(calm, calculating)*:
        *‘Sounds to me like he was just using his initiative.’*
  - |-
    **LEWIS** *(panicked, desperate to absolve himself)*:
        *‘If this goes tits up, I’m not the noncy little weirdo bastard that’s getting done for rape.’*

        **ASHLEY** *(dismissive, amused)*:
        *‘Right.’* *(pause, then coldly)* *‘I wasn’t asking you to, Lewis.’*
  - |-
    **LEWIS** *(hanging up, muttering to himself, unraveling)*:
        *‘Right. Right. Right.’* *(cut to Ashley, watching Tommy—troubled, then amused, then troubled again.)*
