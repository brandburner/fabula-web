      culmination of the raid and the beginning of Tyson’s legal troubles. The cuffs
      also serve as a physical reminder of the power dynamics at play—Cawood’s strength
      and resolve overpowering Tyson’s desperation.
    status_before_event: Attached to Catherine Cawood’s duty belt, ready for use during
      the raid. She has likely used them countless times before, but this arrest carries
      personal significance given her obsession with justice.
