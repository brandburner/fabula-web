- fabula_uuid: act_31f49dab7124b151
  number: 2
  summary: Kevin's initial complicity in the kidnapping plot deepens as he confesses
    the entire ordeal to his wife, Jenny. Jenny, horrified, urges him to go to the
    police, but Kevin, terrified of repercussions from Ashley and his crew, refuses,
    highlighting his powerlessness. Meanwhile, Lewis Whippey's discomfort with Tommy
    Lee Royce's predatory behavior escalates when he attempts to protect Ann from
    further harm, leading to a brutal assault by Tommy. Tommy savagely beats Lewis,
    demonstrating his unhinged violence and reinforcing the danger Ann faces. This
    internal conflict among the kidnappers underscores the volatile environment Ann
    is trapped in. Concurrently, Catherine Cawood, still nursing her bruised eye,
    demonstrates her unwavering commitment to justice. She confronts and arrests Marcus
    Gascoigne, a local councilor, for drunk driving and drug possession, despite his
    attempts to use his social standing to intimidate her. This incident reinforces
    Catherine's core principles and her refusal to compromise. Later, Catherine attends
    a family dinner where her son, Daniel, and his wife, Lucy, announce Lucy's pregnancy.
    This happy news is overshadowed by Catherine's poignant confrontation with her
    ex-husband, Richard, about their grandson, Ryan. Catherine asks Richard to be
    a grandfather to Ryan, a request he coldly rejects, citing Becky's trauma and
    the painful reminder Ryan represents. This deeply personal interaction reveals
    Catherine's emotional vulnerability beneath her tough exterior, connecting her
    personal grief to her relentless pursuit of justice. The act culminates with Ashley
    pressuring Kevin to deliver the initial ransom payment, further entrenching Kevin
    in the criminal enterprise.
