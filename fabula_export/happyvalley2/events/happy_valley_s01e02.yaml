    - Damp concrete floors
    - Discarded underwear (evidence of sexual assault)
    - A bucket (used as a makeshift toilet)
    - Dim, flickering lighting (enhancing the oppressive atmosphere)
    - Echoing footsteps (amplifying the tension)
