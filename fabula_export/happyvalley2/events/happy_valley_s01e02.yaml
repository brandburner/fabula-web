  key_dialogue: &id033
  - |-
    LEWIS: (silence) Are we allowed to fuck her?
    ASHLEY: Why would y’be asking me that, Lewis?
    LEWIS: I’m just asking.
    ASHLEY: ((light, amused/bemused)) You’re a sick little bastard, aren’t yer?
    LEWIS: No, no, it isn’t me. It’s— (dries up)
  - |-
    ASHLEY: No. No, I didn’t. Sounds to me like he was just using his initiative.
    LEWIS: Right well I’m not—I don’t wanna—that’s— (dries up) I’m not doing that.
    ASHLEY: I wasn’t asking you to, Lewis.
    LEWIS: Good. If this goes tits up, I’m not the noncy little weirdo bastard that’s getting done for rape.
  - |-
    ASHLEY: (thinking, to himself) Well. Lewis. I don’t want you to feel that it’s obligatory.
    (LEWIS, misinterpreting) You mean you told him to do that?
