      \ the horror unfolding within. The air is thick with the scent of lager, Doritos,\
      \ and the metallic tang of blood. Ann’s chair is centered in the space, a makeshift\
      \ throne of captivity, while the bucket in the corner serves as a grim reminder\
      \ of her dehumanization. The cellar’s confined walls echo with Ann’s muffled\
      \ screams and Lewis’s groans, trapping the sound of violence within. Footsteps\
      \ from upstairs—Tommy’s accomplices, perhaps—add to the sense of inescapable\
      \ dread. This is not just a prison; it is a battleground where morality is stripped\
      \ away, and power is asserted through brutality.\n      "
    observed_atmosphere: "\n        Oppressively claustrophobic, with a tension so\
      \ thick it’s almost tangible. The dim light casts long shadows, turning the\
      \ cellar into a liminal space where humanity is suspended. The air is stale,\
      \ the sounds of violence muffled yet unmistakable, and the cold seeps into the\
      \ bones of everyone present. It is a place where time feels distorted, where\
      \ each second of torment stretches into eternity.\n      "
