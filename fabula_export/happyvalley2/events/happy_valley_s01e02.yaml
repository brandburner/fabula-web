  - 'MICKEY: *That fella you were looking for’s been in. Just now. I came outside
    for a smoke when he left so I could keep an eye on him, and I saw where he went.
    I saw which gate he went in.*'
  - 'CATHERINE: *(to KEVIN, abrupt)* *I’ve got to go.* *(on the phone to MICKEY)*
    *I’ll be with you in five minutes.*'
