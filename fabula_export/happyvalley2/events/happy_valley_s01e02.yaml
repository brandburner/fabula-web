- fabula_uuid: cand_evt_scene_cf52248d73d29113_01
  global_id: null
  title: '**"Clare’s Tactical Retreat: The Blind Spot of Obsession"**'
  description: "\n  In the sterile, fluorescent-lit confines of Norland Road Police\
    \ Station, **Clare** confronts **Catherine** with quiet but escalating urgency\
    \ about her fixation on **Tommy Lee Royce**. The exchange begins as a seemingly\
    \ routine challenge—*How do you know it was him?*—but quickly reveals the depth\
    \ of Clare’s concern. Catherine’s defensive, almost combative response (*‘Because\
    \ I’m not blind?’*) exposes her raw emotional investment, while Clare’s measured,\
    \ empathetic tone (*‘I think you’ve got it on your brain. A bit.’*) underscores\
    \ her fear that Catherine’s judgment is compromised. The tension peaks when Catherine\
    \ doubles down (*‘It was him.’*), leaving Clare momentarily speechless. Rather\
    \ than escalate the confrontation, Clare abruptly pivots to mundane logistics\
    \ (*‘What time’s your dinner break?’*), a tactical retreat that underscores her\
    \ growing alarm. The abrupt shift in topic isn’t just a change of subject—it’s\
    \ a calculated move to de-escalate while signaling her inability to reach Catherine.\
    \ The moment is a microcosm of their fractured partnership, revealing how Catherine’s\
    \ obsession has become a blind spot that threatens both the investigation and\
    \ their relationship. The subtext is clear: Clare is no longer just worried about\
    \ Catherine’s mental state—she’s bracing for the fallout of her sister’s unchecked\
    \ pursuit of Tommy Lee Royce.\n  The scene foreshadows the personal and professional\
    \ consequences of Catherine’s fixation, particularly in light of Clare’s later\
    \ clandestine actions (e.g., the allotment shed confrontation) and the looming\
    \ threat of Tommy’s violence. It’s a turning point where the fragility of their\
    \ alliance is laid bare, and the stakes of Catherine’s obsession become undeniable.\n\
    \  "
