- fabula_uuid: cand_evt_scene_f5318d13d93e2a70_01
  global_id: null
  title: 'Lewis’s Moral Breaking Point: The Rape Revelation and Ashley’s Calculated
    Complicity'
  description: |2-

      In a tense, morally fraught phone call, Lewis—already unsettled by Tommy’s predatory behavior—confronts Ashley with the horrifying suspicion that Tommy has sexually assaulted Ann. The exchange begins with Lewis’s blunt, almost clinical question—*‘Are we allowed to fuck her?’*—a moment of raw, unfiltered disgust that exposes his own moral panic. Ashley, ever the manipulator, deflects responsibility with chilling nonchalance, framing Tommy’s actions as ‘initiative’ rather than criminal assault. The subtext is devastating: Ashley isn’t just indifferent to Ann’s suffering; he’s calculating how to weaponize it. Lewis, initially bewildered by Ashley’s amusement, realizes the depth of the gang’s moral decay—Ashley isn’t just complicit; he’s *exploiting* the situation. The call ends with Lewis’s desperate attempt to distance himself (*‘I’m not the noncy little weirdo bastard that’s getting done for rape’*), but the damage is done. Ashley, left alone, oscillates between amusement at Lewis’s discomfort and unease about Tommy’s unchecked violence, hinting at the fragility of their alliance. This scene is a turning point: Lewis’s moral line is crossed, Ashley’s true nature is revealed, and the kidnapping plot spirals into something far darker—where rape isn’t just a crime but a *tactic*. The power dynamics shift irrevocably, with Lewis’s fragile loyalty to the gang now hanging by a thread, and Ashley’s control over the situation slipping into chaos.
