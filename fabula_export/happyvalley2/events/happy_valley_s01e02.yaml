  key_dialogue: &id039
  - |-
    **CLARE**: *Daniel rang. We’ve been invited round for tea tomorrow.*
    **CATHERINE**: *(preparing to be arsy)* *All of us?*
    **CLARE**: *Well. I said—‘I’ll see if Ryan can go round to his friend’s house’, and he didn’t say, ‘No that’s fine, you bring him with you’. So. I’m—yeah—assuming it’s just you and me.*
  - |-
    **CATHERINE**: *So... he rang you. His aunty. He didn’t ring me, his mother.*
    **CLARE**: *Well he rang on t’house line.*
    **CATHERINE**: *When he knows I’m at work.*
    **CLARE**: *You work shifts, Catherine. You coulda been here.*
  - '**CATHERINE**: *(something she doesn’t do often)* *Have y’got any fags?*'
