  - '**CATHERINE**: *‘He asked. If I would drive him over here one day, one Saturday.
    So you could play football with him. You see... it doesn’t occur to him. That
    you—being his Grandad—wouldn’t want to do that. Wouldn’t want to play with him.’*'
  - '**RICHARD**: *‘I’m not his Grandad. You shouldn’t have told him that.’*'
  - '**CATHERINE**: *‘She killed herself because she’d been raped, not because of
    him!’* **RICHARD**: *‘It’s the same thing!’* **CATHERINE**: *‘It isn’t! It is
    not.’* **RICHARD**: *‘He was there to remind her. Every day. That’s why she—’*
    **CATHERINE**: *‘That is not his fault!’*'
  - '**RICHARD**: *‘I can’t look at him.’*'
