- fabula_uuid: act_7f8550c3a8691fc0
  number: 3
  summary: Following the emotional family dinner, Catherine Cawood visits Richard
    and Ros, continuing her attempt to bridge the gap for Ryan, but Richard remains
    steadfast in his refusal to acknowledge Ryan as his grandson. As Catherine leaves,
    she encounters Kevin Weatherill, her ex-husband's neighbor, who appears visibly
    nervous. Catherine, sensing something amiss from their previous brief encounter,
    questions Kevin about his earlier abrupt departure from the police station, but
    he dismisses her concerns, claiming it was not a police matter. Moments later,
    Catherine receives a crucial tip from Mickey Yip, the Chinese takeaway owner,
    who identifies Tommy Lee Royce's recent presence and the specific gate he entered.
    This intelligence immediately shifts Catherine's focus, leading her to the dilapidated
    Milton Avenue house where Ann is being held. Unaware of the imminent danger, Catherine
    investigates the seemingly deserted property, knocking on the door while Ann,
    bound and gagged in the cellar, desperately tries to alert her. Tommy, hidden
    inside, panics as Catherine narrowly misses discovering their operation. After
    Catherine leaves, Tommy immediately contacts Ashley Cowgill, informing him of
    the police presence. Ashley, overseeing a delivery at his farm, becomes alarmed
    and orders Lewis to move Ann immediately, deepening the sense of urgency and danger.
    Ashley then calls Kevin, confronting him about the police at Milton Avenue. Kevin,
    completely unaware of how the police found the location, is left terrified and
    bewildered, realizing the full extent of his precarious situation. The episode
    concludes with Kevin trapped between the ruthless kidnappers and the encroaching
    police investigation, as Ann is prepared for relocation, leaving her fate and
    Kevin's future hanging precariously.
