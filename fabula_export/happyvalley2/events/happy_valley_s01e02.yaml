acts:
- fabula_uuid: act_c2f94a9fd9ac53d6
  number: 1
  summary: The episode opens with Sergeant Catherine Cawood's relentless pursuit of
    an ice cream van used for drug dealing, culminating in her smashing its window
    and a high-speed chase. She fails to apprehend the suspects but gathers crucial
    details. Simultaneously, Nevison Gallagher, distraught, confides in his accountant,
    Kevin Weatherill, about his daughter Ann's kidnapping and the million-pound ransom
    demand. Nevison fears involving the police due to threats against Ann. Catherine's
    personal life intertwines with her professional drive as her sister, Clare, expresses
    concern about Catherine's renewed obsession with Tommy Lee Royce, the man who
    raped her daughter, Becky. Undeterred, Catherine continues her investigation into
    Tommy's whereabouts. A second tip leads Catherine and her team to another confrontation
    with the drug dealers, resulting in a successful arrest but also Catherine sustaining
    a kick to the face. The narrative then shifts to Ann Gallagher, held captive in
    a desolate cellar, her bruised face reflecting her terror. Tommy Lee Royce and
    Lewis Whippey, her captors, are introduced, with Lewis already displaying unease
    about Tommy's unsettling presence. Lewis later discovers Ann's discarded knickers,
    confirming his suspicions of Tommy's sexual assault, a realization that deeply
    disturbs him. Ashley Cowgill, the mastermind, is revealed as he manipulates Kevin,
    who is now fully entangled in the kidnapping plot, his initial complicity deepening
    with each interaction. Kevin's first call with Ashley establishes the power dynamic
    and the higher ransom, solidifying Kevin's unwilling involvement and setting the
    stage for escalating complications.
