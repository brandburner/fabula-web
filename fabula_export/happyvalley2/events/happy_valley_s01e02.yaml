      as an innocent business while functioning as a front for drug sales. When the
      police arrive, the van becomes the focal point of the takedown, with dealers
      attempting to flee and officers boxing it in with patrol cars. Catherine Cawood
      smashes the driver’s window during the chase, and the van’s interior is later
      searched, revealing wraps of dope hidden in ice cream cones. Its presence in
      a family-friendly setting underscores the moral hypocrisy of the operation and
      the high stakes of the raid.
    status_before_event: Parked near the playground, operating as a front for drug
