    - A **sleeping bag** wrapped around Ann, offering **minimal warmth** against the
      **damp cold**
    - The **discarded underwear**, torn and **carelessly tossed** several feet away
      from Ann
    - The **sound of footsteps** from upstairs (Tommy or others), a **constant reminder**
      of the kidnappers’ presence
