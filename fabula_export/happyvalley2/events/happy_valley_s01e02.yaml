    also **reinforces her role as a moral arbiter**: she sees through the facade and
    calls out the hypocrisy. Thematically, it ties into the **larger narrative of
    betrayal and hidden darkness** (e.g., Tommy Lee Royce’s violence, the kidnapping
    plot).}'
