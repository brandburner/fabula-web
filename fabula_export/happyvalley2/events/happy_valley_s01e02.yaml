      the cellar’s dehumanizing grip. The bedroom remains an unused space, its door
      a barrier to the kitchen’s tension and the cellar’s horrors. It represents what
      little dignity Ann might have been afforded, had the men not been so far gone
      in their moral decay. Its emptiness is a silent rebuke to their cruelty.
