  title: 'Tommy’s Descent: Blood, Whisky, and the Weight of a Father’s Regret'
  description: "\n  In a claustrophobic, blood-soaked sitting room, Tommy Lee Royce—wounded,\
    \ enraged, and bleeding out—unravels before Brett’s horrified eyes. The scene\
    \ opens with Brett’s oblivious kindness (offering warmth, beer, and small talk)\
    \ clashing violently with the reality of Tommy’s self-destructive spiral. Tommy’s\
    \ wounds, both physical and psychological, are laid bare as he rages against Lewis’s\
    \ betrayal, his own fading chances of escape, and the crushing weight of his abandoned\
    \ son, Ryan. His bitter monologue—laced with self-pity and delusions of grandeur—reveals\
    \ a man who once dreamed of power but now clings to whisky and painkillers as\
    \ his only solace. The moment Brett discovers Lewis’s corpse, the tension explodes:\
    \ Tommy’s desperation turns lethal. What follows is a brutal, wordless struggle—Tommy\
    \ strangling Brett to silence him—culminating in a chilling act of survival that\
    \ underscores Tommy’s moral decay. This isn’t just a murder; it’s the death of\
    \ any lingering humanity in Tommy, a man now fully consumed by his own violence.\
    \ The scene foreshadows his inevitable collision with Catherine and Ryan, while\
    \ Brett’s fate serves as a grim reminder of the collateral damage Tommy leaves\
    \ in his wake. The dialogue crackles with subtext: Tommy’s rants about Ashley\
    \ Cowgill’s ‘small fry’ ambitions mask his own envy, and his sudden confession\
    \ about Ryan exposes the fragility beneath his hardened exterior. The whisky and\
    \ pills aren’t just requests—they’re a suicide pact with himself, a man who’d\
    \ rather die than face the consequences of his choices.\n  "
