  key_dialogue: &id017
  - 'KEVIN: *I pretended I hadn’t [seen the cannabis]. But... they made threats. Ashley.
    Made threats. Well no, first of all he pretended he didn’t know what it was, and
    I—stupidly—said, ‘We should call the police’, and then. That’s when things got
    weird and strange and ugly.*'
  - 'KEVIN: *I tried to! I went to a police station! On the morning I knew they were
    going to grab her, I walked into the police station in Sowerby Bridge, and I—I
    nearly told someone. A woman, a sergeant. But then I left. I was a coward, I couldn’t.*'
  - 'KEVIN: *—they told me it was them that’d killed Kirsten McAskill.*'
