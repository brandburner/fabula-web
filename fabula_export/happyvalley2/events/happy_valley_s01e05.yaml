    PHIL: *Ann’s told us she was held in a caravan for two nights after they removed her from Milton Avenue. She was in Milton Avenue. I fast-tracked the swabs you authorised. We found DNA from Ann, Tommy Lee Royce, and the blood... is from a lad called Lewis Whippey.*

    CATHERINE: *Lewis Whippey. I collared him for nicking a motor when he was fifteen.*
  - 'PHIL: *Ann Gallagher’s identified them both in the viper suite as the men who
    abducted her. Back to Cowgill. He’s the registered owner of a white van. The same
    make, model and year that’d been at the scene where Kirsten died.*'
