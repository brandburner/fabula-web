      protective love for his family, a rare unguarded moment in his otherwise controlled
      demeanor. As the conversation progresses, his relief quickly gives way to suspicion
      and anger, particularly when he realizes the kidnappers’ knowledge of Ann’s
      location implies a deeper conspiracy. His emotional state oscillates between
      overwhelming relief, paranoia, and a simmering rage at the unresolved threat.
