    KEVIN: *It’s - I may be wrong - but. You know. You do rack your brain. When something like this happens, and...*
  - |-
    KEVIN: *Ashley. Ashley C[ow] - (his voice fails) Ashley Cowgill.*
    PHIL: *Who else? You said these people.*
