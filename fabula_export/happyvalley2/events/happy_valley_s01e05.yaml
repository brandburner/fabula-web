  key_dialogue: &id011
  - '{speaker: JULIE, dialogue: You’ve been at it again. After everything that’s been
    said., significance: Julie’s murmured accusation is the emotional gut-punch of
    the scene. Her tone—disgusted, resigned, *sickened*—reveals the depth of her disillusionment.
    This isn’t just about Ashley’s renewed criminal activity; it’s the death knell
    for the fragile trust between them. The subtext is devastating: *I knew. I always
    knew. And now it’s here.*}'
  - '{speaker: ASHLEY, dialogue: I might. I might pop out. For a bit., significance:
    Ashley’s stammering, evasive response is a masterclass in guilty body language.
    The repetition (*‘I might’*) betrays his panic, while the vague excuse (*‘pop
    out’*) underscores his desperation to delay the inevitable. His hands are shaking;
    his voice is distant. This is a man who knows the noose is tightening—and he’s
    already calculating how to lie his way out.}'
  - '{speaker: CHRISTINE (Detective Constable Whittaker), dialogue: Ashley Cowgill?
    I’m Detective Constable Christine Whittaker. Can I come in?, significance: Christine’s
    introduction is a study in controlled aggression. The lack of a question mark
    in *‘Can I come in?’* isn’t a request—it’s a statement of power. Her syndicate’s
    silent entry behind her amplifies the threat: *This isn’t a conversation. This
    is an occupation.* The subtext is clear: *You don’t have choices anymore.*}'
