    emotional_state: Guilt-ridden tenderness with a desperate hope for reconnection.
      Her actions are a silent apology, but beneath the surface, she’s acutely aware
      of the fragility of this moment and the unresolved pain that still lingers between
      them.
    goals:
    - To bridge the emotional chasm between her and Ryan through physical intimacy
      and shared attention.
    - To validate Ryan’s creativity and individuality as a way to show she *sees*
      him beyond his role as her grandson.
    what_happened: Catherine enters Ryan’s bedroom with deliberate quietness, her
      presence an unspoken intrusion into his private sanctuary. She moves with a
      mix of hesitation and resolve, her body language softening as she approaches
      Ryan, who is engrossed in his zombie comic. Without preamble, she wraps her
      arms around him in a tight, almost desperate hug, pressing a kiss to the top
      of his head. Her actions are tender but laced with guilt—her grip lingers, as
      if she’s afraid to let go. As she pulls back slightly to examine his drawing,
      her eyes reflect a mix of pride and sorrow, a silent acknowledgment of the distance
      she’s allowed to grow between them.
