    *How mad is that? Eh? What kind of life is that for a lad? Living with an old woman. And no dad. It’s not... that’s not...*
    *Shit. It’s shit. It’s no life, not for a lad.*
  - |-
    TOMMY: *I coulda been someone, me. I coulda done stuff.*
    *BRETT: You still can, Tommy.*
    *TOMMY: Ashley Cowgill. He’s nothing. Compared to what I coulda done. I had ideas, I had plans, I coulda rocked the world. He’s chicken shit, he’s small fry, he doesn’t even think straight.*
  - |-
    TOMMY: *You’re not gonna go weird. On me. Brett. Are yer? Come on, you’re not chicken shit like him. Are yer?*
    *(BRETT panics, tries to flee. TOMMY strangles him.)
