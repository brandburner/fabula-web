  - '**CLARE:** *Yeah. Physically, she’s— and oh my God do Helen and Nevison love
    you! I had a phone call, he said, ‘If ever there’s anything we can do,’ I said,
    ‘Well if you fancied paying off the mortgage!’*'
  - '**CATHERINE:** *I got him though, eh? I got the bastard.*'
  - '**CLARE:** *You just need to take things steady for a few days, that’s all.*
    **CATHERINE:** *Why? Have I died?*'
