        *'Hi Mike! How’re you?'*

        **MIKE TAYLOR**:
        *'Clare. How’re you?'*

        **CLARE** *(avoiding the real question, her voice tight with unspoken worry)*:
        *'Not so bad. Is Catherine not up?'*

        **CLARE** *(lying by omission, her tone forcedly bright)*:
        *'Yeah! She should be. I took her up a cup of tea before I left, and she’s under strict instructions not to wallow in bed all day.'*
      ],

