    I’ll tear his hair out by its roots, I’ll—* (she screams, four days of terror
    and anger exploding out of her) *AAAAAARGH!*'
  - |-
    PATROL OFFICER 2ND: *What’ve you done to her?*
    ANN: *Me? I—it’s him! It’s him!* (she’s pointing at the house) *He’s done it! Not me!*
  - |-
    MIKE TAYLOR: *Who’s he? Who’re you?*
    ANN: *Who am I?* (her voice cracks with disbelief) *Don’t you bloody touch me! Where’ve you bloody well been?*
