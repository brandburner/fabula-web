- fabula_uuid: act_00aa006a7cd7720d
  number: 2
  summary: Following the initial arrests and Tommy's escape, the narrative shifts
    to the profound emotional and psychological toll on the characters three weeks
    later. Ann Gallagher, grappling with the trauma of her rape, confides in Catherine,
    entrusting her with the difficult task of informing her father. Catherine, now
    physically recovering but deeply depressed, isolates herself, avoiding contact
    and expressing indifference to a Queen's Police Medal nomination. Mike Taylor's
    visit brings news of Kevin's brutal assault in prison and Ashley Cowgill's imminent
    bail, hinting at a deal with authorities. Meanwhile, Kevin, in a prison visit
    with Jenny, displays a disturbing lack of remorse, attempting to blame her and
    Nevison for his predicament, revealing his moral decay. Tommy Lee Royce and Lewis
    Whippey, increasingly stir-crazy in their hiding place, narrowly evade detection
    during a police door-to-door search, intensifying the pressure on their fragile
    alliance. Catherine's emotional state deteriorates further during a harsh confrontation
    with Ryan, where she expresses profound resentment, culminating in a bitter argument
    at home. Her subsequent lunch with Richard exposes the raw depth of her grief
    for Becky and her inability to reconcile with Ryan, whom she confesses she 'can't
    stand,' linking his existence to Tommy Lee Royce and her past trauma. Richard's
    attempts to defend Ryan and challenge Catherine's self-pity only deepen her despair.
