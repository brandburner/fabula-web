  key_dialogue: &id007
  - 'PHIL: Nev. We’ve got her. She’s safe.'
  - 'NEVISON: (he grabs his phone to ring HELEN, and then realises -) Jesus. / So
    he knew where she was?'
  - 'PHIL: No, I’ve just had a phone call. / D’you want to ring Helen? She’s asking
    for her mother apparently. / Local. They’re taking her to hospital. In Halifax.
    For a check up. It’s routine.'
  - 'NEVISON: And have they caught the bastards? / So he didn’t know?'
  - 'PHIL: We’re still having the conversation.'
  - 'NEVISON: ((suddenly)) Helen! They’ve found her! She’s safe!'
