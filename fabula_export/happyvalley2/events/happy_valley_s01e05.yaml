- fabula_uuid: cand_evt_scene_94469f9af27389f0_01
  global_id: null
  title: '**"The Moorland’s Fragile Peace: A Call That Shatters Isolation**"'
  description: "\n  In a moment of raw, unguarded grief, Catherine sits alone on the\
    \ moorland, her tears a silent testament to the private war she wages with Becky’s\
    \ memory—a space where sorrow is both unbearable and sacred. The vast, indifferent\
    \ landscape mirrors her emotional state: exposed, yet somehow protected by solitude.\
    \ This is the rare, unfiltered Catherine, the one who doesn’t perform resilience\
    \ or suppress her pain. The buzz of her phone disrupts the fragile equilibrium,\
    \ jolting her back to the world of the living. Phil Crabtree’s call, though mundane\
    \ in its delivery, carries the weight of an inevitability: the investigation,\
    \ the threat of Tommy Lee Royce, the unrelenting pull of duty. His offer to ‘bring\
    \ her up to speed’ isn’t just an update—it’s a summons, a reminder that her self-imposed\
