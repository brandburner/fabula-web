  - |-
    PHIL: *Ashley Cowgill was let out on bail this morning.*
    CATHERINE: *((she nods: she’d heard. It sickens her, but - )) What’s the story?*
    PHIL: *Can I trust you?*
    CATHERINE: *I dunno. What d’you think?*
  - |-
    PHIL: *He’s thrown a light on a drugs operation our lot knew nothing about. [...] It’s big. It’s international. [...] Twenty-five kilos of cocaine coming into the UK up to four times a week.*
    CATHERINE: *And how do you know this isn’t all tales from the Arabian nights?*
    PHIL: *We’re confident he hasn’t made the whole thing up. [...] Ashley Cowgill might have bought himself a reduced sentence, but him and his family’ll be on the witness protection programme forever. He’ll be looking over his shoulder for the rest of his life.*
