  title: 'The Facade Cracks: A Moment of Forced Normalcy'
  description: "\n  Outside the school, Catherine stands as a specter of controlled\
    \ devastation—her physical wounds still healing, her emotional state a fragile\
    \ dam against the flood of trauma. She projects an aura of deliberate detachment,\
    \ her body language a silent warning to others to keep their distance, yet one\
    \ well-meaning mother breaches her defenses with a simple, 'How are you?' The\
