    CATHERINE: *I can’t stand him.*
    RICHARD: *Sorry?*
    CATHERINE: *Ryan. I can’t stand looking at him.*
  - 'CATHERINE: *Do you not know how perverse it is? That people think you want to
    celebrate your own existence, when you’ve got a child who’s dead? No offence,
    but I carried her. For nine months. In here. Her flesh was my flesh, and she’s
    dead, part of me is dead. Physically. Dead.*'
  - |-
    CATHERINE: *We should never’ve got back into bed together, it was stupid.*
    RICHARD: *You don’t have to do that.*
    CATHERINE: *I have to go.*
