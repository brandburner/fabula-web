- fabula_uuid: act_a0975bcfb8009389
  number: 3
  summary: 'Emerging from her emotional nadir, Catherine receives a call from Phil
    Crabtree, who reveals the details of Ashley Cowgill''s deal: Ashley has provided
    information about a vast international drug operation. This revelation shifts
    Catherine''s perspective, offering a new avenue for justice and a sense of purpose
    beyond her personal vendetta against Tommy. The consequences of Ashley''s deal
    become clear as he and Julie face a future of perpetual danger and witness protection.
    Inspired by this development and a desire to move forward, Catherine reconciles
    with Clare and Ryan, embracing him with affection and agreeing to celebrate her
    birthday and inform Nevison about Ann''s rape. However, the fragile alliance between
    Tommy and Lewis shatters when Tommy discovers Lewis''s attempt to kill him. In
    a brutal act of self-preservation, Tommy murders Lewis, then strangles Brett to
    silence him after Brett discovers the body and panics. Now completely isolated
    and desperate, Tommy adopts a new identity, disguising himself as a student with
    glasses and a book. His new, terrifying plan forms: he will find Ryan. The episode
    concludes with Tommy boarding a bus to Hebden Bridge, setting him on a direct
    collision course with Catherine''s family, leaving his ultimate objective and
    the impending danger chillingly clear.'
