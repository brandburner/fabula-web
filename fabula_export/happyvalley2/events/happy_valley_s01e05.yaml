  title: '**"Tommy’s Blind Gamble: A Desperate Call to Ashley"**'
  description: |2-

      **Tommy Lee Royce**, blinded and disoriented after Catherine’s pepper spray assault, crouches behind a coal hole in a desperate bid to evade capture. His vision reduced to a burning, tear-blurred haze, he fumbles with his phone—each second a torment—as he dials the only number left that might offer salvation: **Ashley Cowgill**. The call is a last-ditch effort, a raw, unfiltered plea from a man stripped of his usual menace, reduced to a cornered animal. His voice cracks with pain and fury, betraying the full extent of his vulnerability. This moment isn’t just about survival; it’s a **psychological turning point**—Tommy’s first acknowledgment that his empire of control has crumbled. Ashley’s response (or lack thereof) will determine whether Tommy’s next move is calculated or reckless, and whether Ashley’s deal with the NCA has already sealed Tommy’s fate. The call’s outcome hinges on **trust, betrayal, and the cost of loyalty**—themes that will ripple through the season’s climax as Tommy’s hunt for Ryan intensifies and Ashley’s family faces the consequences of his choices.
