      Kevin’s office becomes a pressure cooker of dread as he sits at his desk, his nervous energy palpable. Through the glass walls of the open-plan NGA office, he spots two suited men—Phil Crabtree and an NCA detective—entering Nevison’s office. The sight triggers a visceral reaction: his mounting paranoia crystallizes into a silent, unspoken realization that the net is closing. This moment is a turning point, where Kevin’s carefully constructed facade of control begins to fracture under the weight of dual threats—Ann’s kidnapping fallout and Tommy Lee Royce’s relentless pursuit. The tension is thick with the promise of confrontation, forcing Kevin to confront the fragility of his position. The scene is a masterclass in subtext, where Kevin’s internal panic is mirrored by the ominous presence of the detectives, whose very arrival signals the inevitability of his unraveling. The air hums with the unspoken: *they know something*, and Kevin’s world is about to collapse.
