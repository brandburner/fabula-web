acts:
- fabula_uuid: act_4fff51ad0548a518
  number: 1
  summary: The episode opens in the immediate, chaotic aftermath of Ann Gallagher's
    rescue, with Catherine Cawood found critically injured. While Catherine undergoes
    emergency surgery, the police quickly move to apprehend those involved. Kevin
    Weatherill, initially attempting to minimize his complicity in the kidnapping,
    faces intense interrogation from Phil Crabtree. His lies quickly unravel under
    scrutiny, leading to his swift arrest when ANPR evidence contradicts his fabricated
    alibi. Concurrently, Tommy Lee Royce, blinded by Catherine's spray, manages a
    desperate escape from the cellar. He attempts to contact Ashley Cowgill for aid,
    but Ashley, prioritizing self-preservation, abandons him, leading Tommy to seek
    refuge with Lewis Whippey. Ashley's calculated betrayal, however, does not spare
    him; police arrest him for abduction and demanding money with menaces. As Catherine
    regains consciousness in the hospital, she receives the devastating news that
    Tommy Lee Royce remains at large, a revelation that profoundly impacts her, transforming
    her physical recovery into a new, urgent emotional and mental battle against the
    ongoing threat.
