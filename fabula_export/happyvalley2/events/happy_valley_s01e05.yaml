  key_dialogue: &id003
  - |-
    LEWIS: (hesitant, turning to BRETT) D’yer know anyone who’s got a car I can borrer?
      *(Subtext: Lewis is testing the waters, gauging Brett’s willingness to get involved—his hesitation reveals his fear of being dragged deeper into Tommy’s world.)*
  - |-
    TOMMY: (urgent, desperate) It’s Tommy. I need a lift. I need picking up. Have y’got a car y’can use?
      *(Subtext: Tommy’s voice betrays his unraveling state—no longer the commanding figure, he’s reduced to begging, his desperation making him vulnerable for the first time.)*
  - |-
    TOMMY: (sharp, transactional) I’ll pay yer.
      *(Subtext: The offer of money is both a bribe and a threat—Tommy is buying silence as much as transportation, and the implication is clear: refusal isn’t an option.)
