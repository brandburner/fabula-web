    status_before_event: Worn tightly over Lewis’s face, slightly askew from his nervous
      fidgeting. The fabric is damp with sweat, betraying his internal turmoil.
    status_after_event: Still in place but loosened slightly, as Lewis’s emotional
      state causes him to subconsciously tug at it. The dampness has increased, reflecting
      his heightened anxiety.
    global_id: ger_object_9d86da8b3ae2
  - object_uuid: ger_object_d5055da6dc22
    description_of_involvement: 'The water Lewis offers Ann is a basic necessity twisted
      into a psychological weapon. It is both a gesture of humanity and a tool of
      control—Lewis uses it to quiet her, but Ann uses the moment to turn the tables,
      demanding answers and leverage. The way she drinks greedily, water dripping
      from her chin, contrasts with Lewis’s hesitation, highlighting the power dynamic:
      he holds the resources, but she holds the moral high ground. The act of drinking
      becomes a metaphor for their fractured exchange—she takes what she can, while
      he withholds the truth.'
    status_before_event: Contained in a plastic bottle, slightly warm from the caravan’s
      stale air. Lewis holds it like a peace offering, though his grip is uncertain.
    status_after_event: Mostly consumed, with a few drops spilled onto the caravan
      floor. The bottle is now empty, a physical marker of the fleeting trust between
      captor and captive.
    global_id: ger_object_d5055da6dc22
  - object_uuid: ger_object_c6918b2d8beb
    description_of_involvement: The chains binding Ann to the caravan’s fixtures are
      a brutal reminder of her captivity, limiting her movement and amplifying her
      desperation. They rattle faintly as she strains against them, a sound that underscores
      her helplessness. Lewis avoids looking at them directly, as if their presence
      reinforces his complicity. Ann, however, uses her restricted reach to her advantage,
      leaning forward to press Lewis with her questions—her physical confinement becomes
      a perverse advantage, forcing him into closer proximity and making his guilt
      harder to ignore.
    status_before_event: Tightly secured around Ann’s wrists and ankles, the metal
      cold and unyielding. They dig into her skin, leaving faint marks.
    status_after_event: Still in place, but Ann has shifted slightly, testing their
      limits. The chains are a constant, oppressive presence, their rattle a backdrop
      to her pleas.
    global_id: ger_object_c6918b2d8beb
  - object_uuid: ger_object_d5dc1588ca46
    description_of_involvement: 'The gag, removed by Lewis, is a temporary reprieve
      for Ann but a symbol of her continued captivity. Its absence allows her to speak,
      drink, and plead—but its presence on the floor of the caravan is a constant
      reminder of her vulnerability. Lewis handles it with reluctance, as if the act
      of removing it is a small rebellion against Tommy’s brutality. Ann’s immediate
      use of her voice to probe Lewis’s guilt turns the gag into a narrative pivot:
      its removal enables the psychological battle that follows.'
    status_before_event: Tightly secured around Ann’s mouth, muffling her whimpers
      and screams. The fabric is slightly damp from her breath and tears.
    status_after_event: Discarded on the floor of the caravan, a silent witness to
      Ann’s desperate pleas. Its removal is a fleeting victory, but its presence nearby
      underscores the temporary nature of her reprieve.
    global_id: ger_object_d5dc1588ca46
