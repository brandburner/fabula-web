- fabula_uuid: cand_evt_scene_7c9a0b0930cc5d52_01
  global_id: null
  title: '**"Catherine’s Blood-Stained Refusal: The Weight of Unspoken Duty**"'
  description: |2-

      Under the harsh glow of arc lights and the thrum of a helicopter overhead, Catherine Cawood stands at the epicenter of a crime scene that has just claimed the life of her colleague, Kirsten McAskill. The area is a frenzy of forensic activity—CSI officers, CID, and H-MIT personnel swarming like insects over the body, the patrol car, the road. Catherine, still in her blood-smeared uniform, is visibly unraveling: shivering, her face streaked with Kirsten’s blood, her hands trembling as she strips off her contaminated clothing for evidence collection. When Praveen Badal, the District Commander, orders her to go home—*‘You’ve done all you can’*—she doesn’t flinch. Instead, she seizes on the one task she can still control: delivering the death notification to Kirsten’s parents. Her insistence isn’t just professional obligation; it’s a self-imposed penance, a way to confront the horror she’s failed to prevent. Praveen’s reluctant concession—*‘Would you like me to come with you?’*—reveals the unspoken truth: this isn’t about protocol. It’s about Catherine’s need to *witness* the fallout of her leadership, to let the grief of others carve into her own guilt. The moment is a turning point, where her grief curdles into something harder, more defiant. She won’t walk away. Not yet. Not when the case—and her complicity in it—still demands her presence. The scene ends with her standing in the cold, half-dressed, her resolve as unyielding as the blood drying on her skin.
