acts:
- fabula_uuid: act_cbb094e20d5a410c
  number: 1
  summary: This act opens with PC Kirsten McAskill on a routine patrol, engaged in
    a lighthearted radio conversation with Sergeant Catherine Cawood. The camaraderie
    quickly dissolves when Kirsten pulls over a white van driven by Lewis, who is
    transporting the kidnapped Ann Gallagher. Unbeknownst to Kirsten, Tommy Lee Royce
    is nearby in a Mini, observing the traffic stop. Fearing exposure of the kidnapping
    plot, Tommy makes a ruthless decision, deliberately running Kirsten down, crushing
    her beneath the vehicles, and then reversing over her repeatedly to ensure her
    death before fleeing with Lewis. Catherine receives the urgent distress call and
    races to the scene, but arrives too late to save her colleague. The entire police
    force is plunged into mourning. Catherine, devastated and guilt-ridden, takes
    command of the grim crime scene, directing her stunned officers to secure evidence
    and close the road. Later, at home, Catherine confides in her sister, Clare, expressing
    profound grief and questioning what horrific event Kirsten might have stumbled
    upon that warranted such a brutal killing. The act also introduces Catherine's
    personal struggles, including a brief, unsettling hallucination of her deceased
    daughter, Becky, triggered by the trauma. Superintendent Praveen Badal attempts
    to send Catherine home, but also subtly pressures her to drop a drug possession
    case against local councillor Marcus Gascoigne, hinting at institutional compromises.
    Catherine's initial resistance to Praveen's request sets up a conflict between
    her unwavering moral compass and the political realities of her job, while her
    internal turmoil over Kirsten's death and her past with Becky begins to manifest
    psychologically. The act establishes the episode's central tragedy and Catherine's
    immediate, visceral response, setting the tone for her relentless pursuit of justice.
