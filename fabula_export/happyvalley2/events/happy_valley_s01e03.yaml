- fabula_uuid: cand_evt_scene_e3dc7035c1b6fd23_03
  global_id: null
  title: '**"The Weight of Routine: A Fractured Leader’s Hollow Approval"**'
  description: |2-

      In the emotionally raw aftermath of Praveen Badal’s team-wide address—where grief, institutional support, and the specter of Kirsten McAskill’s murder hang heavy—Catherine Cawood is left to rally her officers for another day of duty. The scene opens with Praveen’s measured but somber speech, offering resources (a doctor, a chaplain) and reassurances about the funeral, while subtly acknowledging the team’s collective trauma. Catherine, however, is visibly unraveling internally: mid-speech, she suffers a hallucinatory flashback of her deceased daughter, Becky, hanged and grotesque—a visceral, disorienting reawakening of her deepest grief. The moment is private, unnoticed by her colleagues, but it leaves her visibly shaken, her composure a brittle facade.

      When the room clears, Catherine delivers her own address to the team, a mix of professional pragmatism and quiet desperation. She urges compassion for the public ("*whatever’s going on inside your head, you treat people with the compassion and respect they deserve*") while simultaneously arming them with protective gear ("*I want you with your stab-proof vests on, your batons, your CS gas*"). The juxtaposition underscores her fractured state: she’s both a leader and a woman drowning in grief, her instructions a mechanical checklist rather than a heartfelt rallying cry.

      The moment’s turning point arrives when Twiggy, oblivious to Catherine’s turmoil, seeks her approval for a routine sectioning case. Catherine’s response—*"Oh. Yeah. Thanks."*—is distracted, hollow, a perfunctory nod that betrays her emotional detachment. The scene’s power lies in its mundanity: a procedural request in the wake of a murder, a leader too broken to engage. It’s a microcosm of Catherine’s unraveling, where the weight of routine (the sectioning, the shift, the *business as usual*) clashes with the crushing grief she can’t outrun. The event serves as both a **character revelation** (her inability to lead effectively) and a **narrative pivot** (her detachment foreshadows her later failures to connect with key witnesses and allies).
