      drawn curtains sealing in the stale air, sweat, and fear. The space is cramped,
      forcing Lewis and Ann into an intimate proximity that heightens the tension.
      The caravan’s metal walls amplify every shallow breath, every rattling chain,
      and every evasive response, turning the exchange into a suffocating psychological
      duel. The lack of natural light casts a grim pallor over the scene, mirroring
      the moral darkness at its core. It is both a prison for Ann and a confessional
      for Lewis, where his guilt has nowhere to hide.
