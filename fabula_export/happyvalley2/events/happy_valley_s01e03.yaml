- fabula_uuid: cand_evt_scene_611bc8d16e331cb0_02
  global_id: null
  title: '**"The Cellar’s Silent Confession: Evidence of the Beast"**'
  description: |2-

      In the suffocating stillness of Tommy Lee Royce’s abandoned Milton Avenue home, **Sergeant Catherine Cawood** moves with the precision of a woman who has seen too much but refuses to look away. The house itself is a graveyard of neglect—grunge in the sitting room, abandoned takeaway in the kitchen, beer in the fridge—all signs of a recent, transient presence. But it’s the *absence* that gnaws at her: the emptiness of the bedrooms, the eerie quiet of a space that feels both lived-in and forsaken. Then, a draught. A door, slightly ajar, whispers to her. The cellar.

      Descending into the damp, the torchlight reveals a scene that doesn’t just *suggest* horror—it *confesses* to it. A lone chair, pristine amid the mildew, sits like an altar. Blood spatters—small but deliberate—speckle the floor and walls, their presence a silent scream. And then, the final, gutting detail: **Ann Gallagher’s knickers**, discarded like an afterthought. The masking tape fragments, the chair’s isolation, the blood—each piece is a breadcrumb leading to a truth Catherine already fears but now *knows*. This isn’t just a crime scene. It’s a *confession*. The cellar doesn’t just implicate Tommy Lee Royce; it *accuses* him. And in this moment, Catherine’s grief for Kirsten McAskill hardens into something sharper, colder. The evidence isn’t just a lead. It’s a *mandate*. The weight of what she’s found isn’t just professional—it’s *personal*. She’s no longer just hunting a killer. She’s confronting the monster that haunts her waking nights, the one that murdered her colleague and now holds Ann Gallagher’s life in its hands. The cellar’s silence is deafening. And Catherine? She’s done listening.
