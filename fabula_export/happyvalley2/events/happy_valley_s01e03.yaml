- fabula_uuid: cand_evt_scene_f1d99df87c9469f2_01
  global_id: null
  title: 'The Distress Call: Duty Shatters Grief’s Stasis'
  description: "\n  In the sterile, fluorescent-lit confines of her office, **Catherine\
    \ Cawood** is trapped in bureaucratic limbo—her fingers mechanically typing incident\
    \ reports, her tea growing cold beside her. The rhythmic *beep-beep-beep* of the\
    \ radio suddenly pierces the air, a sound so primal it jolts her from her administrative\
    \ trance. This is no routine dispatch: it’s the **emergency distress signal**\
    \ of an officer in peril, a sonic alarm that bypasses protocol and speaks directly\
    \ to her instincts. The script doesn’t need to spell it out—Catherine’s **physical\
    \ reaction** (the way her body tenses, her breath catches) tells us everything:\
    \ this is the moment her grief-stricken paralysis is **shattered by duty’s siren\
    \ call**.\n\n  The radio’s insistent beeping isn’t just a plot device; it’s a\
    \ **narrative fulcrum**, the auditory equivalent of a gut-punch. It forces Catherine\
    \ to confront the **duality of her existence**: the woman drowning in guilt over\
    \ Kirsten’s death, and the sergeant who cannot—*will not*—turn away from another\
    \ officer in danger. The beeping **escalates in urgency**, mirroring the ticking\
    \ clock of Tommy Lee Royce’s violence, which looms just beneath the surface. This\
    \ isn’t just a call to action; it’s a **summons to reckoning**. The scene’s power\
    \ lies in its **subtext**: the radio’s beeps are the **sound of Catherine’s grief\
    \ being interrupted by the inescapable demand of her badge**—a demand that will\
    \ soon collide with the raw, unfiltered horror of what Tommy has already done.\n\
    \  "
