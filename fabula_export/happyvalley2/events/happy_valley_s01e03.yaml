- fabula_uuid: act_70245b45b73aaa9e
  number: 3
  summary: 'The final act accelerates the various plotlines towards a series of critical
    revelations and escalating tensions. Ashley contacts Nevison, demanding an additional
    fifty thousand pounds and sending a photo of Ann as proof of life, which leaves
    Nevison both relieved and horrified by his daughter''s condition. Nevison then
    pressures a reluctant Kevin to deliver the new ransom payment. Catherine, still
    reeling from the day''s events, meets her ex-husband Richard, who expresses a
    desire to reconnect and suggests playing a more active role in Ryan''s life, though
    Catherine remains skeptical of his sincerity. Upon returning home, Catherine learns
    Helen Gallagher failed to show up at Clare''s house. When Catherine calls Helen,
    she senses Helen''s fear and evasiveness, particularly when Helen mentions being
    "with her husband," raising Catherine''s suspicions of domestic abuse or coercion.
    Clare''s offhand comment about Tommy Lee Royce reminds Catherine of her initial
    concern about his release. Driven by this renewed focus, Catherine takes matters
    into her own hands, breaking into Tommy''s abandoned house. There, she discovers
    disturbing evidence in the cellar: a solitary chair, blood spatters, fragments
    of masking tape, and, most chillingly, Ann Gallagher''s knickers. This discovery
    confirms Catherine''s gravest fears: Tommy is directly involved in something horrific,
    and Ann was held there. Catherine contacts Clare, who reluctantly admits Tommy
    had visited the Mission after his release, further implicating him. As Kevin prepares
    for the ransom drop, he visits Ashley, receiving another payment and learning
    Ann has been moved. The episode culminates in a tense confrontation between Kevin
    and Lewis outside Ashley''s farm. Lewis, traumatized and enraged, shoves Kevin
    and reveals the shocking truth: Kirsten was murdered because she pulled over their
    van, directly linking Kevin''s initial scheme to the brutal death of a police
    officer. Kevin is left appalled, finally understanding the full, horrifying consequences
    of his actions, as Catherine''s investigation into Tommy Lee Royce gains a terrifying
    new dimension.'
