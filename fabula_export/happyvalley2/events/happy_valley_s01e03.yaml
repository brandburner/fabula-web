  key_dialogue:
  - 'RYAN: *I hate you.*'
  - |-
    CATHERINE: *Ring her.*
    CLARE: *What?*
    CATHERINE: *Ring her.*
    CLARE: *I can’t ring her. At home.*
    CATHERINE: *She’s supposed to be here and she isn’t. She was distressed about something and wanted to talk to a police officer. I want to know that she’s all right.*
  - |-
    RYAN: *Did y’ask him?*
    CATHERINE: *Yes. I did. And he’s—he’s—he’s thinking about it.*
    RYAN: *What is there to think about?*
