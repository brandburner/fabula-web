    \ that immediately evokes the unresolved tension of Kirsten McAskill’s kidnapping\
    \ and murder. His disdainful reaction to the manual labor underscores his class\
    \ privilege and detachment from the physical consequences of his actions. The\
    \ scene’s tension explodes when Tommy Lee Royce, the ruthless criminal Kevin believed\
    \ he had distanced himself from, answers the door. The shock on Kevin’s face isn’t\
