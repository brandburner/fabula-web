- fabula_uuid: cand_evt_scene_ffbde5956ef42bf6_01
  global_id: null
  title: '**"The Weight of a Witness: Royce’s Calculated Erasure"**'
  description: "\n  In a moment of chilling premeditation, **Tommy Lee Royce**—his\
    \ face a mask of cold calculation—reverses his vehicle over **PC Kirsten McAskill**,\
    \ crushing her beneath the wheels with deliberate, methodical force. The act is\
    \ executed off-screen, its horror conveyed through **Lewis’s** visceral reaction:\
    \ his face contorts in revulsion, his body recoils as blood sprays across him,\
    \ and the sickening, wet *thud* of impact lingers in the air. This isn’t impulsive\
    \ violence; it’s a calculated elimination of a witness, a brutal assertion of\
    \ control over the kidnapping plot’s unraveling. The scene’s stark absence of\
    \ visual gore makes the act more monstrous—Royce’s willingness to cross this line\
    \ without hesitation signals his descent into irredeemable depravity. For **Lewis**,\
    \ the witness, this moment shatters his complicity; his trauma becomes a ticking\
    \ clock, foreshadowing his eventual confrontation with **Kevin** and the unraveling\
    \ of their fragile alliance. The event serves as a **causal turning point**: it\
    \ directly triggers **Catherine Cawood’s** radio transmission shock, her discovery\
    \ of Kirsten’s body, and the force’s collective grief—each a domino in the collapse\
    \ of Royce’s empire and Catherine’s unraveling. The subtext is devastating: Royce’s\
    \ violence isn’t just about survival; it’s a **statement of dominance**, a warning\
    \ to anyone who might stand in his way.\n  "
