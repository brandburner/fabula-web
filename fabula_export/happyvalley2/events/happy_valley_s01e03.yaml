      of violence in the line of duty. The road’s desolation mirrors the emotional
      emptiness of the team, while its functional role as a thoroughfare underscores
      the contrast between the mundane and the catastrophic.
    access_restrictions: Restricted to authorized personnel only. Twiggy and Shafiq
