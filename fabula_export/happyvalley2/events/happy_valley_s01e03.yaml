    JOYCE: *Aww...*
    SHAFIQ: *Aw, that’s really kind, Liam. Don’t cry.*
    LIAM: *I nicked ‘em from outside Aldi’s but it’s the thought that counts, int it?*
    SHAFIQ: *Course it is. Course it is.*
