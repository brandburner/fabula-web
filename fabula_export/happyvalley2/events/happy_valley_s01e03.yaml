- fabula_uuid: cand_evt_scene_c202b52adc7c0a63_01
  global_id: null
  title: 'The Transmission That Shatters: Catherine’s Grief Ignites'
  description: "\n  In the suffocating silence of her office, **Catherine Cawood**\
    \ is paralyzed by the garbled but unmistakable final transmission from **Kirsten\
    \ McAskill**—her colleague’s dying words, *\"I think they’ve killed me,\"* cutting\
    \ through the static like a blade. The radio’s crackling voice, raw with terror\
    \ and resignation, collides with Catherine’s own breathless disbelief, her hands\
    \ trembling as she clutches the receiver. The weight of Kirsten’s murder—its brutality,\
    \ its finality—crashes over her, unraveling the fragile composure she’s maintained\
    \ since the investigation began. This moment is not just a confirmation of loss;\
