  key_dialogue:
  - |-
    JUSTINE: Have you heard the news? Kevin?
    KEVIN: ((terrified)) What...? News?
    JUSTINE: On the telly, this police woman.
    KEVIN: ((dismissive, relieved)) Oh - !
    KEVIN: ((then trying to sound more equanimious)) Yeah. Terrible.
  - 'KEVIN: ((he knows it’s ridiculous and impossible)) I can’t destroy it. I - want
    to give it back. To Nevison.'
  - |-
    JUSTINE: We wondered about having a whip round. For the family. D’you think that’s appropriate? To ask people. For money. Or not? Nevison’s not in this morning, otherwise I’d ask him.
    KEVIN: ((mechanical, distracted)) Sure.
