- fabula_uuid: act_23255fdb4cc00940
  number: 2
  summary: The second act delves deeper into the aftermath of Kirsten's murder and
    the escalating complexities of the kidnapping. The police station becomes a site
    of collective grief, marked by an outpouring of public sympathy and the arrival
    of flowers. Superintendent Praveen Badal delivers a somber address to the team,
    emphasizing support but also the need for resilience. During this speech, Catherine
    experiences a second, more vivid hallucination of Becky, highlighting her deepening
    psychological distress and the resurfacing of past trauma. Despite her internal
    turmoil, Catherine delivers a resolute speech to her officers, urging them to
    maintain professionalism, compassion, and vigilance in the face of danger. Meanwhile,
    the kidnappers, Ashley and Tommy, discuss the implications of Kirsten's murder.
    Tommy, asserting his dominance, demands a significantly higher ransom from Nevison
    Gallagher and insists that Ann, having overheard crucial information, cannot be
    released alive. This conversation reveals Tommy's ruthlessness and Ashley's growing
    unease. Kevin, guilt-ridden, confesses to his wife, Jenny, about taking a portion
    of the initial ransom money, leading Jenny to suggest they launder it in small
    amounts, further entangling them in the crime. Helen Gallagher, increasingly distressed
    by her daughter's disappearance and the news of Kirsten's murder, seeks solace
    and guidance at the Christian Mission, where she cautiously approaches Clare,
    Catherine's sister, hinting at a secret she wishes to share with a discreet police
    officer. In a raw display of grief and rage, Catherine confronts a group of teenagers,
    particularly Brett, who mocked Kirsten's death, physically asserting her authority
    and delivering a chilling warning. The act concludes with Catherine cleaning out
    Kirsten's locker, discovering personal items and a touching newspaper clipping,
    which triggers another intense hallucination of Becky, pushing Catherine to her
    emotional limits just as she receives a text from her ex-husband, Richard, signaling
    further personal complications.
