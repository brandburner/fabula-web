        - **The busy main street outside**, a **metaphor for the indifference of the world** to the **personal tragedies unfolding within**. The **mission’s isolation**—despite its central location—hints at **how easily suffering can be overlooked**.
        - **The implied cut to interior**, where **Clare’s search** and **Helen’s desperation** will soon unfold, **tying the mission’s physical space to the emotional and narrative stakes** of the episode.
