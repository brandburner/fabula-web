- fabula_uuid: cand_evt_scene_cbd816b6e5a8a8df_01
  global_id: null
  title: 'Clare’s Subterfuge: The Hidden Search for a Witness in Plain Sight'
  description: "\n  In the bustling, chaotic sanctuary of the **Huddersfield Christian\
    \ Mission**, Clare—Catherine’s sister and a volunteer—operates with quiet urgency\
    \ beneath the veneer of her routine duties. The mission, a liminal space where\
    \ the desperate and broken seek solace, serves as the perfect cover for her covert\
    \ search. While the café hums with the low murmur of troubled patrons and the\
    \ clatter of cutlery, Clare’s movements betray a focused intent: she slips away\
    \ from the counter mid-conversation, her colleague’s casual ‘Course it is, love’\
    \ masking the gravity of her mission. Her path is deliberate—she checks the darkened\
    \ church, then a side room—suggesting she’s searching for someone specific, likely\
    \ tied to the kidnapping or Tommy Lee Royce’s web of violence. The subtext is\
    \ thick: Clare, though not a police officer, is actively participating in the\
    \ investigation, her actions a testament to her loyalty to Catherine and her own\
    \ moral courage. The scene underscores the mission’s duality: a place of refuge\
    \ *and* a potential nexus for the unfolding crisis, where faith and danger intersect.\
    \ Clare’s search is a silent but critical beat, hinting at her role as an unwitting\
    \ (or willing?) ally in Catherine’s hunt for justice, while the mission’s clientele—vulnerable,\
    \ forgotten souls—serve as a stark reminder of the human cost of the chaos unfolding\
    \ around them.\n  "
