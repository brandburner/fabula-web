  key_dialogue: &id019
  - 'PRAVEEN: *It’s going to be tough few days. It’s going to be a tough few weeks.
    I can’t pretend, an incident like this—this close to home—you don’t get over it.
    You learn to live with it.*'
  - 'CATHERINE: *Okay. You heard him. We have to go out there and do what we do best.
    Be patient with people... So whatever’s going on inside your head, you treat people
    with the compassion and respect they deserve. At the same time... I want you with
    your stab-proof vests on, I want you with your batons, I want you with your CS
    gas.*'
  - |-
    TWIGGY: *Sarg? Did you want me to help out wi’ that lad that’s being sectioned this morning?*
    CATHERINE: *(distracted) Oh. Yeah. Thanks.*
