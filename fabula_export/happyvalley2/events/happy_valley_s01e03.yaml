  title: 'Catherine’s Hallucinatory Collapse: The Ghost of Becky and the Weight of
    Unfinished Grief'
  description: "\n  In the sterile, fluorescent-lit locker room of Norland Road Police\
    \ Station, Sergeant Catherine Cawood performs the grim ritual of clearing out\
    \ Kirsten McAskill’s locker—a task that forces her to confront the brutal finality\
    \ of her colleague’s murder. The act of methodically packing away Kirsten’s personal\
    \ effects (photos of Ollie, their pets, their family, a half-eaten bag of sweets,\
    \ a handwritten thank-you note from an elderly citizen) becomes a visceral reminder\
    \ of the life cut short. The moment Catherine uncovers a newspaper clipping of\
    \ Kirsten smiling with schoolchildren—her face alight with the joy of helping\
    \ others—her composure fractures. The image triggers a hallucination: Becky, her\
    \ deceased daughter, hanging from the locker room door, a grotesque echo of her\
    \ past failure. The flashback is fleeting but devastating, plunging Catherine\
    \ into a panic attack. Her terror isn’t just of the vision—it’s of her own unraveling\
    \ mind, her inability to escape the past. The moment is interrupted by a text\
    \ from Richard, her ex-husband, whose intrusion only deepens her isolation. Her\
    \ muttered rejection—‘No, you can piss off’—reveals the depth of her emotional\
    \ withdrawal, a defense mechanism that risks sabotaging both the investigation\
    \ and her own stability. This scene is a turning point: Catherine’s trauma, long\
    \ suppressed, now threatens to consume her, forcing the audience to question whether\
    \ she can outrun her ghosts long enough to stop Royce—or if they’ll drag her under\
    \ first.\n  "
