- fabula_uuid: cand_evt_scene_571b492252d02e1c_02
  global_id: null
  title: 'The Weight of Empty Lockers: Catherine’s Collapse Under Grief and Hallucination'
  description: "\n  In the sterile, fluorescent-lit locker room of Norland Road Police\
    \ Station, Sergeant Catherine Cawood performs the grim ritual of clearing out\
    \ Kirsten McAskill’s locker—a task that forces her to confront the brutal finality\
    \ of her colleague’s murder. The act of methodically packing away Kirsten’s personal\
    \ effects (photos of Ollie, their pets, a half-eaten bag of sweets, a handwritten\
    \ thank-you note) becomes a visceral confrontation with the life stolen too soon.\
    \ The discovery of a newspaper clipping—Kirsten beaming among schoolchildren for\
    \ a ‘People Who Help Us’ project—shatters Catherine’s fragile composure, triggering\
    \ a hallucination of her deceased daughter Becky hanging from the locker room\
    \ door. This flashback, a manifestation of her unresolved trauma, sends her into\
    \ a panic attack, her body and mind betraying her in equal measure. Just as she\
    \ begins to regain control, a text from Richard—her ex-husband—offers a fleeting,\
    \ unwanted connection, which she rejects with a venomous ‘No, you can piss off.’\
    \ The moment underscores Catherine’s emotional isolation: her grief is a fortress,\
    \ her trauma a prison, and her refusal to lean on anyone (even Richard) risks\
    \ not only her own stability but the investigation itself. The scene is a turning\
    \ point—her hallucination foreshadows her unraveling, while her rejection of Richard\
    \ signals a deepening of her self-imposed exile from human connection.\n  "
