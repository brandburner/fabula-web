- fabula_uuid: cand_evt_scene_3f9bd17ebe4474fd_02
  global_id: null
  title: '**"The Fingerprint Question: A Paranoia Bomb in the Kitchen""'
  description: |2-

      In the frenetic, domestic chaos of a school-morning kitchen—where packed lunches and rushed routines mask the family’s unraveling—Jenny’s seemingly casual question about fingerprints on the stolen money detonates like a psychological landmine. Kevin, already frayed by his complicity in the kidnapping, confesses to hiding £2,000 in the car, his guilt and panic palpable. Jenny’s horror at his recklessness escalates into a whispered argument: *‘Destroy it. Burn it.’* Kevin resists, clinging to the money’s value, but the revelation of his fingerprints on the bag—*‘Yes, they are’*—hangs in the air like a noose. The tension is abruptly severed by Melissa’s return, her complaint about tuna sandwiches a grotesque contrast to the adult crisis unfolding. This moment isn’t just a plot escalation; it’s a psychological turning point where trust erodes, the stakes of secrecy become visceral, and the audience is forced to confront the fragility of Kevin’s moral collapse. The unanswered question lingers: *Will the fingerprints lead the police to their door?*
  episode_uuid: ep_sea_ser_happy_valley_s01_e03
  scene_sequence: 32
  sequence_in_scene: 41
  key_dialogue: &id031
  - |-
    JENNY: *Are your fingerprints on it?*
    KEVIN: *No.*
    JENNY: *On the bag?*
    KEVIN: *I— Yes, they are.*
  - |-
    JENNY: *What did you do with it?*
    KEVIN: *It’s in the car.*
    JENNY: *In the car?*
    KEVIN: *Under the— in with the spare wheel. It’s hidden.*
  - |-
    JENNY: *Destroy it. Burn it.*
    KEVIN: *No! It’s money.*
    JENNY: *Leave it somewhere.*
    KEVIN: *No.*
