  title: '**"Code Zero: The Station Shatters"**'
  description: |2-

      The fragile calm of Norland Road Station explodes into chaos as **Sergeant Catherine Cawood**—still raw from Kirsten McAskill’s murder—receives the **Code Zero** alert over the radio. The station’s evening shift, already winding down (Shafiq and Twiggy joking about drinks, coats on), is jolted into frantic motion. Catherine’s face drains of color as she processes the call: *‘It’s Kirsten.’* The weight of those two words—loaded with grief, guilt, and the unspoken fear that this is Tommy Lee Royce’s work—immediately shifts the room’s energy from camaraderie to crisis. Shafiq and Twiggy’s laughter dies mid-breath; their radios, turned off for the night, are fumbled back on as they scramble after Catherine. The **beeping emergency signal** (a chilling detail—if Kirsten had survived, she’d have deactivated it by now) underscores the urgency. Catherine’s commands are razor-sharp: *‘Shafiq, you come wi’ me. Twiggy, take the other car.’* The scene is a **masterclass in narrative compression**—personal grief collides with professional duty, the station’s usual rhythm is shattered, and the hunt for Royce is reignited with brutal immediacy. This isn’t just a response to a crime; it’s the moment Catherine’s **personal torment becomes operationalized**, her trauma weaponized into action. The **tonal whiplash** (from warmth to horror) mirrors the series’ central tension: how do you chase a monster when you’re already bleeding?
