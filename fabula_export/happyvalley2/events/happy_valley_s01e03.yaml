  key_dialogue:
  - 'NEVISON: *They want another fifty grand. Tomorrow. Then he says they might start
    to think about letting go of her. Will you deliver it again? If that’s what they’re
    asking for?*'
  - 'KEVIN: *I—* (hesitates, unable to say yes)'
  - 'NEVISON: *Kevin?*'
  - 'KEVIN: *Why me?*'
  - 'NEVISON: *I don’t know! I’m just asking. I think he meant it. About letting her
    go.*'
