    ASHLEY: *Did you stay and watch him crush ‘em?*
    TOMMY: *Yes.*
    ASHLEY: *Both of ‘em.*
    TOMMY: *Yes.*
  - |-
    TOMMY: *Have you rung Nev?*
    ASHLEY: *I’m not saying I won’t. I just… I want to think it through.*
    TOMMY: *You do realise. Either way. We can’t just let her go. Don’t you.*
