  title: '**"The Uniform in the Road: A Grief That Hardens Into Purpose"**'
  description: "\n  The moment Catherine Cawood and Shafiq arrive at the crime scene,\
    \ the world narrows to a single, horrifying detail: a body in uniform, sprawled\
    \ in the road. For a suspended second, both officers freeze—Catherine’s breath\
    \ catches, her mind racing to the worst possibility: *Kirsten*. The unspoken terror\
    \ hangs between them, a shared dread that this could be the colleague they’ve\
    \ already lost. Shafiq’s whispered confirmation—*‘That isn’t Kirsten’*—doesn’t\
    \ bring relief, only a grim, hollow shift: the victim is someone else’s tragedy,\
    \ but the violence is the same. Catherine’s grief and guilt, already raw, harden\
    \ into something sharper. She doesn’t collapse; she *acts*. With a clipped demand\
    \ for the torch, she steps into the scene, her professional instincts overriding\
    \ the emotional storm inside her. The torchlight sweeps over the body, not just\
    \ illuminating a crime scene but casting a new, brutal clarity on the hunt for\
    \ Tommy Lee Royce. This isn’t just another murder—it’s a declaration of war. The\
    \ officer’s death forces Catherine to confront the escalating stakes: Royce isn’t\
    \ just a criminal anymore; he’s a predator who leaves bodies in his wake, and\
    \ she is the only one who can stop him. The scene marks the point where her grief\
    \ becomes a weapon, her trauma a fuel. The hunt begins in earnest, and Catherine\
    \ will not—*cannot*—look away.\n  "
