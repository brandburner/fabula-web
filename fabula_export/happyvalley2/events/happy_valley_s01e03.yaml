  description: |2-

      In a moment of raw, paralyzing terror, Lewis—already unraveling under the weight of his complicity in Ann Gallagher’s kidnapping—finds himself trapped in a high-stakes confrontation with the very institution he’s betrayed. As a police car’s headlights and siren pierce the darkness, Lewis’s instinctive compliance (pulling over to let the officer pass) backfires catastrophically when the patrol car slows and blocks his path. The van’s interior becomes a pressure cooker of dread: Lewis’s face drains of color, his breath shallow, his mind racing in blind panic. This is not just a traffic stop—it’s a moment where the fragility of his cover, the precariousness of his alliance with Tommy Lee Royce, and the moral weight of his actions collide. The police car’s presence forces Lewis to confront the inescapable truth: his choices have placed him on a collision course with the law, and his next move could unravel everything. The scene is a masterclass in tension, where the mundane (a routine police maneuver) becomes a harbinger of doom, escalating the stakes for Ann’s safety, Lewis’s survival, and the broader investigation into Royce’s crimes. The audience is left with a chilling question: *How far will Lewis go to protect himself—and what will it cost Ann?*
