  title: '**"The Siren’s Call: Duty Overwhelms Grief"**'
  description: "\n  In the suffocating aftermath of Kirsten McAskill’s murder—a crime\
    \ that has left Catherine Cawood drowning in guilt and rage—the radio crackles\
    \ with an urgent distress call: *‘Officer requires urgent assistance, Scammonden\
    \ Road, Ripponden.’* The words slice through her paralysis. Without hesitation,\
    \ Catherine *bolts* from her office, her body moving before her mind can protest.\
    \ The corridor blurs past her as she sprints, her boots pounding the linoleum\
    \ in a rhythm that mirrors her racing pulse. This isn’t just a response to duty;\
    \ it’s a visceral rejection of her own helplessness. The call isn’t just about\
    \ saving another officer—it’s about *proving* she can still act, still *matter*,\
    \ in a world where Tommy Lee Royce has already taken too much. The radio’s static\
    \ lingers in her ears like a taunt: *‘Bravo November four-five, responding.’*\
    \ Her voice is steady, but her hands tremble. The scene is a microcosm of her\
    \ arc: grief and obsession colliding, duty and trauma intertwined. The officer\
    \ in distress could be anyone—another Kirsten, another victim of Royce’s escalating\
    \ violence. And Catherine? She’s running *toward* the danger, not away. Because\
    \ in this moment, the hunt for Royce isn’t just about justice. It’s about *survival*—hers,\
    \ and the next officer who might not make it out alive.\n  "
