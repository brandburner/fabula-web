- fabula_uuid: cand_evt_scene_e3dc7035c1b6fd23_02
  global_id: null
  title: 'Catherine’s Fractured Leadership: Grief, Hallucination, and the Weight of
    Command'
  description: |2-

      In the wake of Kirsten McAskill’s brutal murder, Sergeant Catherine Cawood stands in the Norland Road Police Station’s main office, her professional facade barely concealing the emotional storm raging beneath. Praveen Badal delivers a measured, compassionate address to the team—acknowledging their grief, offering institutional support, and reinforcing the need for unity. Yet as Praveen speaks, Catherine’s trauma resurfaces violently: she hallucinates her deceased daughter, Becky, hanged in the next room, a grotesque and visceral flashback that triggers a silent panic attack. The hallucination—blue lips, swollen tongue, dilated pupils—is a brutal reminder of her unresolved guilt and loss, forcing her to relive the moment she first discovered Becky’s suicide. While Praveen’s speech is a call for collective strength, Catherine’s internal collapse underscores the fragility of her leadership. When the room clears, she steps into the void left by Praveen’s departure, delivering a speech of her own: a mix of compassion for the public and a stark reminder of the dangers they face. Her instructions—stab-proof vests, batons, CS gas—are a grim acknowledgment of their vulnerability, while her plea for team cohesion reveals her own desperation to hold the station together. The scene is a turning point: Catherine’s leadership is tested not just by external threats (Tommy Lee Royce’s escalating violence, the kidnapping case) but by her own unraveling psyche. Her distracted response to Twiggy’s question about the sectioning case further exposes her detachment, a fracture in her authority that mirrors the chaos of the investigation. The event serves as both a setup—hinting at Catherine’s potential collapse—and a payoff, revealing the depth of her trauma and the institutional pressures she faces. It’s a moment where grief, duty, and survival collide, and Catherine’s ability to steady the ship is as much about suppressing her own demons as it is about guiding her team.
