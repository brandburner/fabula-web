  key_dialogue: &id033
  - |-
    JENNY: ((quietly)) What’s the matter?
    KEVIN: He made me take some of the money. Ashley. Yesterday. He split it up. He gave me two thousand pounds. In a bag. And what could I do? I couldn’t say ‘No thanks’, he’d have been suspicious, I couldn’t—
  - |-
    JENNY: What did you do with it?
    KEVIN: It’s in the car.
    JENNY: In the car?
    KEVIN: Under the— in with the spare wheel. It’s hidden. I—
    JENNY: Destroy it. Burn it.
    KEVIN: No! It’s money.
    JENNY: Leave it somewhere.
    KEVIN: No.
    JENNY: Don’t bring it in the house.
    KEVIN: I’m not going to.
    JENNY: Put it in a bin.
    KEVIN: ((shaking his head))
  - |-
    JENNY: Are your fingerprints on it?
    KEVIN: No.
    JENNY: On the bag?
    KEVIN: I—
    Yes, they are.
