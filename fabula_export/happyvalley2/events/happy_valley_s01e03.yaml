    \ trauma of Kirsten McAskill’s murder, as the weight of her professional failure\
    \ and personal complicity presses down on her. The scene is a turning point: Catherine’s\
    \ emotional armor cracks, revealing the depth of her unresolved grief and the\
    \ escalating threat Royce poses. Her physical posture (walking toward her car,\
    \ phone pressed to her ear) mirrors her psychological state—moving forward while\
    \ being pulled back by the past. The moment is a setup for her next confrontation\
    \ with Royce, but it’s also a revelation of her own fragility, underscoring the\
