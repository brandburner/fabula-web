  key_dialogue:
  - 'CATHERINE: I had to give her a bit of a talking to. Yesterday morning. I said,
    ‘I’m not your mother. You’re a police officer, nobody bullies you.’ So she’d be
    out to prove something. She said, ‘This is all I wanted to do, all my life, and
    I’m shit at it,’ and I should’ve said *No you’re not. You’re fantastic, you’re
    lovely*, but I didn’t. I just let her dwell on it, so she’d be thinking I’d be
    thinking she was shit at it, and I didn’t, I don’t think that, she wasn’t.'
  - 'CATHERINE: ((CONT''D))'
