  key_dialogue: &id037
  - |-
    CATHERINE: *What did you say?*
    BRETT: *Nothing, I—*
    CATHERINE: *No, I heard you. You said something. I’d like you to repeat it.*
    BRETT: *I just—I said—I didn’t mean it, I didn’t mean anyfin, I was just sing[ing]—*
    CATHERINE: *What were you singing?*
    BRETT: *Nothing. I—*
  - |-
    CATHERINE: *Do you think it’s funny?*
    BRETT: *No.*
    CATHERINE: *Cos I got the distinct impression that you thought it was funny.*
    BRETT: *I don’t know what you mean.*
    CATHERINE: *So you think I’m stupid?*
    BRETT: *No.*
    CATHERINE: *Do I look stupid?*
    BRETT: *No.*
  - |-
    CATHERINE: *Don’t you ever. Ever. Make fun of someone’s death. You ignorant rancid infinitesimal speck of dirt.*
    BRETT: *I’m sorry.*
    CATHERINE: *(twisting his testicles again) There’s no CCTV cameras in here, sunbeam. It’s your word against mine.*
