      Avenue home is a shabby space of squalor, littered with discarded takeaway containers
      and the remnants of daytime TV. This is where Tommy and Lewis Whippey lounged,
      where threats and mockery filled the air, and where the kidnapping operation
      was planned. The room is a contrast to the cellar below—where violence was unleashed—it
      is the space of relative normalcy, where the kidnappers could pretend, even
      for a moment, that they were not monsters. The grunge and chaos of the sitting
      room are a reminder that even criminals have mundane lives, that their crimes
      are not committed in a vacuum but are part of a broader, squalid existence.
      Catherine moves through it with detachment, her focus already drawn to the cellar
      and the horrors it holds.
