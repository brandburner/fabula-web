    PRAVEEN: *Right, well we’ll visit the parents then I’m dropping you off at the nick and then you’re going home. You’ve got to let other people do their jobs now.*
  - |-
    CATHERINE: *I’ve got to write a duty statement. The S.I.O.’ll need it.*
    PRAVEEN: *And then you’re going home.*
