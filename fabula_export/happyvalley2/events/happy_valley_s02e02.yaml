  title: Catherine interrupted at Becky’s grave
  description: Catherine stands at her daughter Becky’s grave, processing the emotional
    aftermath of confronting Tommy Lee Royce at his mother’s funeral. The scene is
    a rare moment of quiet reflection, where she allows herself to acknowledge the
    vindication she felt in facing him—even if she didn’t fully articulate her motives
    beforehand. The graveyard setting amplifies her vulnerability, a space where grief
    and guilt intertwine. Her solitude is abruptly shattered when Mike Taylor calls,
    his voice cutting through the stillness like a summons. Catherine’s initial defiance—her
    refusal to disclose her location—hints at her reluctance to re-enter the professional
    chaos of the trafficking investigation. The call forces her to shift from personal
    reckoning to operational urgency, underscoring the inescapable tension between
    her duty and her need for closure. The interruption isn’t just a plot device;
    it’s a thematic reminder of how her work consumes her, even in moments of private
    mourning. The contrast between the serene graveyard and the abrupt, tense phone
    call highlights the collision of her personal and professional lives, a dynamic
    that defines her character arc.
