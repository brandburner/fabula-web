  key_dialogue:
  - 'SEAN: Mr. Gallagher. Sorry. Nev. To interrupt. I just wanted to say how sorry
    I am. I had a lot to be grateful to Mrs. Gallagher for. And... I tried to catch
    your eye at the crem but obviously you had a lot on your mind, and I realise you
    probably might not want me here, but I just wanted to say sorry. Again. About
    that other business.'
  - 'CATHERINE: I was down Stoneyroyd Lane a coupla days ago. Warning the girls to
    be extra vigilant wi’ this bastard out there doing what he’s doing and this van
    came creeping along, and then when whoever it was saw me they sped off. So I PNC’d
    the vehicle, and... that was the name that came up as the owner. Sean Balmforth.'
  - 'CLARE: You see that were the thing with Helen. Just occasionally there’d be someone
    come along, and you’d think, ''I wouldn’t touch that bastard with a barge pole.''
    But she never thought like that. About anyone. Ever. No-one was beyond the pale.'
