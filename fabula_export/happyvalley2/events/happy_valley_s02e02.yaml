  title: Catherine notices Neil’s suspicious presence
  description: 'Catherine returns home late at night to an empty living room, where
    Neil’s belongings—his coat and shoes—are strewn about in an uncharacteristic mess.
    The house feels off, and the distant sound of a man’s voice and giggling from
    upstairs immediately plants a seed of suspicion. Though exhausted, Catherine’s
    instincts are piqued by the unusual disarray and the muffled voices, hinting at
    Neil’s potential betrayal or deception. The moment is subtle but charged, foreshadowing
    deeper domestic instability amid her already fraught professional and personal
    crises. The scene underscores Catherine’s vulnerability—both physically and emotionally—as
    she stands in the quiet living room, too tired to confront the situation but unable
    to ignore it entirely. The tension lies in what she *doesn’t* do: no confrontation,
    no investigation, just a weary acknowledgment that something is wrong. This beat
    serves as a quiet but critical turning point, shifting Catherine’s focus from
    external threats (like Tommy Lee Royce) to the unraveling of her own household,
    where trust is now in question.'
