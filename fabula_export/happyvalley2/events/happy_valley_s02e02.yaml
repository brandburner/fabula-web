    Eight of ‘em in every room at this last place. She’s been working a ten-hour shift
    six days a week—for ten pounds a week—at Bowen’s biscuit factory up Rastrick.'
  - 'ILINKA: Moram razgovarati sa svojom obitelji! Treba mi telefon. (I need to talk
    to my family, I need a telephone.)'
  - 'CLARE: Nine years old, and he’s telling him stuff he never needed to know.'
