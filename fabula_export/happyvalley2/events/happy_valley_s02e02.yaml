  title: Catherine reveals trafficking realities
  description: 'In Catherine’s office, Winnie—frustrated by bureaucratic exclusion—presses
    Catherine to explain how Ilinka and other trafficked women end up in their predicament.
    Catherine, initially reluctant, lays bare the systemic manipulation: false promises
    of work, stolen passports, withheld wages, and fabricated family correspondence
    to keep victims compliant. She describes Ilinka’s escape as a desperate, serendipitous
    act—a factory worker’s hesitation during a cigarette break allowing her to scale
    a wall and flee blindly, guided only by strangers’ directions to the police station.
    The exchange underscores the Knezevics’ operational cleverness, the victims’ isolation,
    and the fragile, accidental nature of liberation. Winnie’s outrage (‘It’s evil’)
    contrasts with Catherine’s weary pragmatism, highlighting the institutional failures
    that enable trafficking. The dialogue deepens Winnie’s emotional investment in
    Ilinka’s plight while reinforcing Catherine’s moral conflict: she knows the perpetrators’
    identities but lacks the evidence to act, a frustration mirrored in her professional
    and personal life (e.g., Tommy Lee Royce’s impending release). The scene also
    foreshadows Ilinka’s vulnerability—her escape was pure luck, and the Knezevics’
    reach remains unchecked.'
