- fabula_uuid: cand_evt_scene_1addbf2b5eb9604b_01
  global_id: null
  title: Vicky escalates blackmail into emotional extortion
  description: 'John arrives at Vicky’s flat with £1,000—money stolen from his mother’s
    emergency stash—to buy his way out of her blackmail. Vicky, however, rejects the
    cash outright, exposing her true motive: she doesn’t want money, she wants *him*—fully,
    irrevocably. The confrontation spirals as John, desperate to reclaim the incriminating
    phone, realizes Vicky’s obsession has crossed into psychological manipulation.
    She justifies drugging him and taking compromising photos as ‘love,’ framing her
    actions as a twisted attempt to ‘save’ him from his miserable marriage. John’s
    pleas for reason only deepen her conviction, revealing the toxic core of their
    relationship: Vicky’s emotional leverage isn’t just about leverage anymore—it’s
    about ownership. The scene ends with John trapped between Vicky’s delusional devotion
    and his own self-loathing, the phone still missing, and his marriage hanging by
    a thread. The stakes aren’t just financial now; they’re existential. Vicky’s refusal
    to let go forces John into a corner where the only ‘clean’ exit is violence—or
    surrender.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e02
  scene_sequence: 17
  sequence_in_scene: 26
  key_dialogue:
  - |-
    VICKY: Oh, that would’ve been a mistake.
    JOHN: Please. Take this. And then, let’s call it a day. Please give me the phone, whatever you took those pictures on, anything else you’ve downloaded it onto, you keep that—and then... let’s just call it a day. Where is it?
  - |-
    JOHN: You drugged me! You drugged me and you took those ridiculous pictures of me! You ff... mad bitch! How the hell could you start to imagine I’d want to come and live with you now?
    VICKY: I did that [because]—
    JOHN: You’re unhinged, you’re—! God! I don’t know what you are!
    VICKY: I did that. Because I love you.
  - |-
    JOHN: Please let me go. Please. Give me the phone—you keep that money—and please let me go.
    VICKY: In the end you’ll thank me.
