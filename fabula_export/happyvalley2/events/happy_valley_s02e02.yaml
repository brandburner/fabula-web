  title: John’s desperate call to his mother
  description: John exits a newsagent’s clutching a lottery scratch card, his hands
    trembling as he scratches it—only to lose. The failure compounds his desperation,
    and he fixates on the blackmail photos of himself, unable to escape their damning
    weight. Ann’s earlier suggestion about buying a lottery ticket echoes in his mind,
    a cruel irony. In a moment of guilt-ridden panic, he calls his mother under the
    flimsy pretext of fixing a light bulb, his overly deliberate speech betraying
    his unease. The call isn’t just about the light bulb; it’s a subconscious plea
    for connection, a man drowning in shame reaching for the one person who might
    still see him as decent. His voice is unnaturally loud, as if he’s trying to convince
    himself—or her—that everything is normal, when in reality, his moral collapse
    is fracturing every relationship he touches. The scene underscores his isolation
    and the fragility of his facade, foreshadowing the violent confrontation with
    Vicky that will soon follow.
