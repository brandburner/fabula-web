  title: Aurelia Petrovic’s trafficking link exposed
  description: "\n  In a high-stakes H-MIT briefing, Jodie reveals Aurelia Petrovic’s\
    \ true identity—her Croatian origins, her family in Ivanec, and her likely trafficking\
    \ history—as Ilinka’s testimony connects her to the Knezevics syndicate. Andy\
    \ Shepherd escalates the investigation, ordering a full sweep of her movements,\
    \ the Hibernia Street crime scene, and NCA liaison to expose the trafficking network.\
    \ The room’s urgency reflects the case’s expansion from local murder to organized\
    \ crime, with Andy’s directives framing Aurelia as a victim whose past holds the\
    \ key to unraveling the syndicate’s operations. Mike Taylor observes silently,\
    \ underscoring the stakes as the team pivots toward a broader, more dangerous\
    \ inquiry.\n  "
  episode_uuid: ep_sea_ser_happy_valley_s02_e02
  scene_sequence: 32
  sequence_in_scene: 49
  key_dialogue: &id041
  - 'JODIE: At the time of her death Aurelia Petrovic was living at 58, Hibernia Street
    in Boothtown. She was—according to Ilinka—thirty-four years old. Ilinka told us
    that she came from a village called Ivanec in Northern Croatia, and that she has
    a mother and a sister there. So let’s make contact with Europol. Their ground
    officer should be able to help us trace her family.'
  - 'ANDY: I want as much information on the family as possible. When did they last
    have any contact with Aurelia? I want detail. The Hibernia Street address has
    been secured as a potential crime scene and CSI are on route so let’s see what
    that throws up. Let’s liaise with the ops room for the Peveril Lane raid because
    they should be colating full profiles on all the women found there and this could
    be crucial to our investigation. If Aurelia was trafficked I want to know when,
    who by, and what she’s been doing since she entered the UK. Who lived at 58, Hibernia
    Street? Who visited? Who owns it? I want a full picture of the movements at and
    around that address. I want CCTV, I want you liaising with local beat bobbies.
    I want house to house. Let''s get everything we can on the Knezevics. Contact
    NCA. See if they have any operations going on connected to the Knezevics.'
