  title: Catherine watches Tommy at funeral
  description: "\n  Catherine arrives at Lynn Royce’s funeral, parking discreetly\
    \ to observe from a distance. The scene is heavily policed—marked and unmarked\
    \ cars, plainclothes officers, and prison guards escorting Tommy Lee Royce in\
    \ handcuffs. Tommy, visibly uncomfortable in a suit, exchanges a covert glance\
    \ with Frances Drummond, both aware they cannot interact. As Lynn’s coffin is\
    \ wheeled into the crematorium, Catherine’s reaction is visceral: her pulse quickens,\
    \ her anger flares, and the weight of unresolved trauma surfaces. The funeral\
    \ party enters the building, leaving Catherine alone in the car park. She waits\
    \ until the vehicles depart before stepping out, her presence unnoticed but her\
    \ tension palpable. The moment underscores her obsession with Tommy, her professional\
    \ vulnerability, and the unspoken threat he poses—not just to her investigation,\
    \ but to her personal stability. The scene also reinforces Frances’ persistent,\
    \ unsettling role as an observer, her connection to Tommy hinting at deeper, unresolved\
    \ dynamics.\n  "
