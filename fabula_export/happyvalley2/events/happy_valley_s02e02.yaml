  global_id: null
  title: Vicky rationalizes blackmail amid murder news
  description: Vicky prepares for work in her flat, mentally justifying her blackmail
    scheme against John Wadsworth as she applies makeup and perfumes herself. The
    radio reports on a serial killer’s escalating murders in Calderdale, but she dismisses
    the news, revealing her moral detachment and prioritization of her own schemes
    over collective danger. Her nervousness about the illegality of her actions is
    briefly visible before she suppresses it, heading out with cold resolve. The juxtaposition
    of her personal scheming with the broader crisis underscores her isolation and
    the story’s mounting tension, while foreshadowing the violent consequences of
    her manipulation. Meanwhile, at the police station, Mike confronts Catherine about
    her involvement in house-to-house searches, exposing her status as a prime suspect
    in the murder investigation. Catherine deflects with sarcasm, masking her frustration
    at being sidelined from the case, while Jodie’s whispered remark to Andy—‘That’s
    Catherine Cawood’—reinforces her growing paranoia and the eroding trust within
    the team. The scene contrasts Vicky’s self-serving detachment with Catherine’s
    professional and personal stakes, deepening the narrative’s thematic tension between
    individual greed and collective responsibility.
