  global_id: null
  title: Catherine tasers attacker in trafficking raid
  description: 'During a coordinated police raid on a squalid house holding trafficked
    Croatian women, Catherine and her team force entry through both front and rear
    doors. While reassuring terrified victims in a downstairs room—speaking in broken
    Croatian to calm them—Catherine is ambushed by a massive, enraged attacker emerging
    from the cellar wielding a baseball bat. The man lunges at her with violent intent,
    shouting a Croatian obscenity, but Catherine reacts swiftly, drawing her taser
    and firing. In a moment of dark irony, her shot misses his leg (the intended target)
    and instead strikes him directly in the groin, incapacitating him instantly. The
    accidental shot—while effective—exposes her vulnerability in the face of brute
    force and underscores the raw, chaotic nature of the operation. The incident also
    reveals her instinctive, almost visceral response to threats, a trait that will
    later clash with her professional judgment and personal demons, particularly as
    Tommy Lee Royce’s release looms. The tasering becomes a pivotal moment: it demonstrates
    her capability under pressure but also hints at the unchecked aggression simmering
    beneath her controlled exterior, foreshadowing future confrontations where her
    instincts may override protocol.'
