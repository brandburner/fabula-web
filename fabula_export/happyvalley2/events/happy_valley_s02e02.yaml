- fabula_uuid: cand_evt_scene_8eccf7a178662d94_02
  global_id: null
  title: Catherine’s Alibi Collapse Under Fire
  description: "\n  In a tense, high-stakes confrontation at Norland Road Police Station,\
    \ Mike Taylor—Catherine’s superior—publicly challenges her lack of an alibi for\
    \ Tommy Lee Royce’s murder, escalating her legal vulnerability. The scene unfolds\
    \ in the report room, where Mike, visibly frustrated, accuses Catherine of reckless\
    \ behavior, including her unapproved attendance at Royce’s mother’s funeral. Catherine,\
    \ initially defiant, admits she has no verifiable alibi, despite her insistence\
    \ that she *shouldn’t* need one. Her refusal to cooperate—rooted in her instinctive\
    \ distrust of bureaucratic scrutiny and her emotional investment in Royce’s downfall—deepens\
    \ the rift between her and Mike. The exchange reveals Catherine’s stubbornness,\
    \ her disregard for procedural boundaries, and her growing isolation as the investigation\
    \ tightens around her. Meanwhile, Tommy Lee Royce, freshly returned from the funeral,\
    \ seethes in the back of a police car, his rage palpable, foreshadowing further\
    \ confrontation. The scene serves as a turning point: Catherine’s defiance, while\
    \ morally justified in her mind, now actively undermines her credibility, forcing\
    \ her into a corner where her professional survival hinges on proving her innocence—despite\
    \ her lack of concrete evidence.\n  "
