- fabula_uuid: cand_evt_scene_8eccf7a178662d94_01
  global_id: null
  title: Mike accuses Catherine of murder
  description: "\n  In a tense, escalating confrontation at the Norland Road Police\
    \ Station, Mike Taylor publicly accuses Catherine of Tommy Lee Royce’s murder,\
    \ leveraging her discovery of the body, her threatening phone calls, and her revenge\
    \ motive as evidence. The accusation forces Catherine into a defensive position,\
    \ exposing her lack of an alibi and undermining her professional credibility.\
    \ Mike’s frustration with her reckless attendance at Royce’s funeral—seen as a\
    \ gross misjudgment—clashes with Catherine’s defiant refusal to justify her actions.\
    \ The exchange reveals Catherine’s emotional detachment from the legal consequences\
    \ of her behavior, her lingering obsession with Royce, and Mike’s growing desperation\
    \ to contain the fallout of her actions. The scene heightens the stakes of the\
    \ murder investigation while deepening the professional and personal rift between\
    \ Catherine and Mike, whose authority she openly undermines. The confrontation\
    \ also underscores Catherine’s isolation: her inability to provide an alibi suggests\
    \ either a deliberate cover-up or a dangerous lack of awareness of her own movements,\
    \ both of which threaten her standing and safety. The tension peaks when Mike,\
    \ exasperated, demands she eliminate herself from suspicion, only for Catherine\
    \ to admit she has no verifiable alibi—a revelation that leaves Mike bewildered\
    \ and Catherine unrepentant, her defiance hinting at deeper, unresolved conflicts.\n\
    \  "
  episode_uuid: ep_sea_ser_happy_valley_s02_e02
  scene_sequence: 43
  sequence_in_scene: 63
  key_dialogue:
  - 'MIKE: I do do my best for you. You know. Catherine. What the hell did you go
    there for?'
  - 'CATHERINE: Just... I dunno. To make sure.'
  - 'MIKE: To make sure...? What?'
  - 'MIKE: You’ve still not alibied yourself, and turning up there - at the victim’s
    funeral - has not helped your case one jot, one iota, one... Tiny little bit.'
  - 'CATHERINE: I haven’t got a case.'
  - 'MIKE: This is really serious, Catherine. You have got a case to answer! You found
    the body, you made threatening phone calls, you had a motive, and now you’ve turned
    up at the victim’s funeral!'
  - 'CATHERINE: What motive?'
  - 'MIKE: Revenge. Against Tommy Lee Royce.'
  - 'CATHERINE: I can’t. I’ve checked everything, my calendar, my pocket book, my
    smart phone, the rosta, everything. And there’s nothing. I wasn’t doing anything
    with anybody who can give me an alibi on any of those days.'
  - 'MIKE: Right well stop pissing about and get yourself eliminated.'
