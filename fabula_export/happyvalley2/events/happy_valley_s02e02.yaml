      with bureaucratic exclusion and Catherine’s weary pragmatism collide. The office’s
      role is twofold: it is a sanctuary for private reckonings and a space where
      the systemic failures of the police and the cruelty of the Knezevics are laid
      bare.'
    observed_atmosphere: Confinement with a sense of weary urgency—The office is small
      and functional, its walls muting the noise of the police station outside. The
      atmosphere is one of tension and emotional weight, as Catherine and Winnie grapple
      with the realities of trafficking and the limitations of institutional response.
