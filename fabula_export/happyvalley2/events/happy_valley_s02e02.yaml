    through her disbelief that such trafficking could happen in a 'civilised' society—clashes
    with Catherine’s pragmatic optimism. Catherine counters that the very existence
    of a 'civilised' country is why victims seek refuge here, revealing her dual role
    as both a protector and a realist. The tension between their worldviews underscores
    the emotional toll of their work. The moment is abruptly interrupted by Andy Shepherd,
    who enters to thank Winnie for her help in the investigation. His presence shifts
    the scene’s focus from personal reflection to institutional pressure, as he signals
    a need for a private conversation with Catherine. This interruption reinforces
    the precarious balance between Catherine’s personal convictions and the demands
    of her professional role, while also highlighting the institutional scrutiny she
    faces amid the ongoing crisis.
