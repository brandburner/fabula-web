  title: Catherine reasserts control after public humiliation
  description: "\n  In the Norland Road police station report room, Catherine is recounting\
    \ her taser incident with dark humor, using the anecdote to project unshakable\
    \ authority. The moment is interrupted when Gorkem Tekeli makes a crude joke about\
    \ her tasering a suspect in the groin, exposing her as a target of workplace scrutiny.\
    \ The room falls silent, and Catherine—realizing the team knows she’s been questioned\
    \ in the murder investigation—must act decisively to reassert dominance. She publicly\
    \ humiliates Gorkem with a sarcastic dressing-down, sending him to perform menial\
    \ tasks, then isolates Ann for a private reckoning. The exchange underscores Catherine’s\
    \ precarious grip on leadership amid simmering distrust, while her calculated\
    \ intimidation and strategic exclusion reaffirm her control. The scene also foreshadows\
    \ the looming threat of Tommy Lee Royce’s return, as Catherine’s authority is\
    \ tested from multiple fronts.\n  "
