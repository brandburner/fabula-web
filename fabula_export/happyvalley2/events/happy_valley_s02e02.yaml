  title: Family fractures under Ilinka’s trauma
  description: Catherine arrives home with Ilinka, a traumatized trafficking victim,
    hoping to enlist Winnie’s help in communicating with her. The scene immediately
    collapses into a volatile family argument when Clare and Daniel’s unresolved conflict
    over Clare’s alcoholism erupts—Daniel having inadvertently revealed Clare’s past
    to Ryan. Catherine, distracted by Ilinka’s needs, fails to mediate the tension
    until Winnie’s arrival forces a temporary pause. The clash underscores Catherine’s
    struggle to balance her professional duty (protecting Ilinka) with her family’s
    unraveling dynamics, while Ilinka’s presence becomes a silent witness to the family’s
    dysfunction. The scene’s emotional core lies in the contrast between Ilinka’s
    desperate need for safety and the family’s inability to provide it, as their own
    crises overshadow her trauma. Winnie’s arrival offers a fragile lifeline for Ilinka
    but does little to resolve the family’s fractures, leaving Catherine’s support
    system further strained.
