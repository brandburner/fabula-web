      sneering, then dissolving into tears as her desperation for a drink overtakes
      her. She leans into Catherine’s space, her voice cracking between accusation
      and pleading, her fingers twitching with the need for alcohol. The car’s confined
      space amplifies her volatility, her words laced with blame and self-pity as
      she oscillates between anger and vulnerability. Her admission of need is both
      a cry for help and a defiant challenge to Catherine’s authority.
