  title: Catherine’s Suspicion Escalates Through Delegation
  description: |2-

      In a tense hallway confrontation at Norland Road Police Station, Mike Taylor intercepts Catherine Cawood as she prepares to leave for a minor arrest, revealing his growing suspicion of her involvement in the house-to-house searches. Catherine deflects with sarcasm, masking her frustration at being sidelined from the major investigation while still being treated as a suspect. Her annoyance at being assigned a trivial task—arresting a 15-year-old for dealing skunk—is palpable, underscoring her professional pride and the precariousness of her position. The moment is further compounded when Jodie, a junior officer, casually identifies her to Andy Shepherd as *‘Catherine Cawood’* in a tone that reinforces her suspect status, deepening her isolation and paranoia. The exchange highlights Catherine’s eroding authority, the investigation’s tightening grip on her, and the personal stakes of Tommy Lee Royce’s impending release, which looms over her family’s unresolved trauma. The scene serves as a microcosm of Catherine’s professional and personal unraveling, where even routine tasks feel like punishments and every interaction reinforces her outsider status.
