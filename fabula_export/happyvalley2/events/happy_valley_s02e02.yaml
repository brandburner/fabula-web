  title: Catherine prepares for unseen threats
  description: Catherine enters her conservatory dressed for bed but layered in protective
    clothing—jumper, thick socks, and a woolly hat—signaling her heightened state
    of alert. She drops a sleeping bag, pillow, and an old cricket bat onto the settee,
    transforming the space into a makeshift vigil post. The cricket bat, a weapon
    of last resort, underscores her paranoia, not just about Tommy Lee Royce’s imminent
    return but also the unresolved dangers tied to her investigation. This deliberate
    act of self-protection marks a turning point where her professional vigilance
    bleeds into personal survival, foreshadowing a night where preparation may not
    be enough. The scene is quiet but charged, with Catherine’s actions speaking louder
    than words—her exhaustion is palpable, yet her resolve to defend herself and her
    home is unshaken. The cricket bat, an object of childhood nostalgia repurposed
    for survival, becomes a symbol of her dual role as protector and potential victim,
    blurring the lines between her professional and personal worlds.
