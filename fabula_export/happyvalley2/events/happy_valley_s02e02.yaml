acts:
- fabula_uuid: act_42bc35db10b04eda
  number: 1
  summary: 'Catherine returns home with Ilinka, a trafficked woman, introducing her
    to a tense domestic scene. Daniel has revealed Clare''s past alcoholism to Ryan,
    causing friction between Clare and Daniel. Catherine, initially unaware of the
    family drama, focuses on Ilinka''s well-being and explains the horrific details
    of the trafficking operation. Later, Catherine''s neighbor, Winnie, helps Ilinka
    identify clothes in a newspaper photo as belonging to her friend Aurelia, a victim
    of the ongoing serial killer. This revelation connects the trafficking ring to
    the murder investigation, but Ilinka, terrified of the Knezevics crime family,
    refuses to cooperate with the police, fearing deadly retaliation. Meanwhile, John,
    a police officer, struggles with financial demands from his mistress, Vicky, who
    blackmails him with incriminating photos. He obtains money from his mother under
    false pretenses, highlighting his desperation. The narrative also reveals Frances
    Drummond, Tommy Lee Royce''s obsessive admirer, has infiltrated Ryan''s school
    as a teaching assistant, maintaining a covert presence near Catherine''s family.
    The act concludes with Catherine learning of Tommy Lee Royce''s temporary release
    from prison to attend his mother''s funeral, a development that deeply unsettles
    her and Ann, another of Tommy''s victims. This act establishes the core conflicts:
    Catherine''s personal and professional entanglements, John''s escalating crisis,
    and the ominous return of Tommy Lee Royce, all against the backdrop of a complex
    murder investigation linked to human trafficking.'
