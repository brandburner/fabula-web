  - object_uuid: ger_object_843120c03050
    description_of_involvement: 'The front door key is the literal and symbolic tool
      that grants Ilinka entry into the Cawood home—and, by extension, into the family’s
      fractured world. Catherine slides it into the lock with practiced ease (*‘she
      turns it smoothly’*), but the act is anything but smooth: the door swings open
      to reveal Clare and Daniel mid-argument, their tension spilling into the hallway.
      The key’s role is functional (unlocking the door), but its narrative weight
      lies in what it *unlocks*: the family’s inability to present a united front,
      the immediate suspension of their conflict for Ilinka’s sake, and the temporary
      illusion of safety. The key also highlights Catherine’s authority—she controls
      access to her home, but not the emotions within it.'
    status_before_event: In Catherine’s hand as she approaches the front door, unused.
    status_after_event: Inserted into the lock, turned, and left in the door (implied
      by the open back doors later in the scene).
    global_id: ger_object_843120c03050
  - object_uuid: ger_object_ea1bd2475b9d
    description_of_involvement: 'The kitchen chair, pulled out by Catherine for Ilinka,
      is a physical manifestation of the family’s reluctant hospitality. Its wooden
      frame is sturdy, but Ilinka’s emaciated body makes it seem oversized, emphasizing
      her vulnerability. The chair’s placement—between Catherine and the arguing Clare/Daniel—positions
      Ilinka as a literal and figurative wedge in the family dynamic. When Winnie
      arrives, the chair becomes the stage for Ilinka’s emotional breakdown (*‘Moram
      razgovarati sa svojom obitelji!’*), its four legs grounding her in a room where
      she understands nothing. The chair’s simplicity contrasts with the complexity
      of the scene: a mundane object bearing the weight of trauma, translation, and
      temporary refuge.'
    status_before_event: Pushed under the kitchen table, unused.
    status_after_event: Pulled out, Ilinka seated in it, now a focal point for the
      family’s divided attention.
    global_id: ger_object_ea1bd2475b9d
  - object_uuid: ger_object_f5426e4a356e
    description_of_involvement: 'The kettle, already boiled by Clare, becomes a silent
      witness to the scene’s dualities: the mundane (tea for a guest) and the monumental
      (Ilinka’s trauma). Catherine’s question (*‘Is there any tea?’*) is a lifeline—practical,
      comforting, and a distraction from the heavier truths being unveiled. The kettle’s
      readiness (*‘Clare: I’ve just boiled t’kettle’*) contrasts with the family’s
      emotional state: while the water is hot and ready, their relationships are lukewarm
      and unresolved. Ilinka’s mumbled *‘Jako ste ljubazni’* in response to the offered
      tea is a poignant moment—the first time she feels seen, even if the gesture
      is small. The kettle’s steam, unseen but implied, mirrors the unspoken tensions
      in the room.'
    status_before_event: Boiling on the stove, steam rising, water ready for tea.
    status_after_event: Still on the stove, now cooling slightly, unused tea bags
      or cups nearby (implied by the shift to Winnie’s arrival).
    global_id: ger_object_f5426e4a356e
  - object_uuid: ger_object_8430113fe87c
    description_of_involvement: 'Winnie’s telephone is the object that bridges Ilinka’s
      past and present. Its offer (*‘You can come over to my house and use my telephone’*)
      is an act of defiance against the system that silenced her for four years. The
      phone’s physical presence—clutched tightly by Ilinka as she cries—symbolizes
      her desperation to reconnect with her family, while its ringtone (implied) would
      be the first familiar sound she’s heard in years. For Winnie, the phone is a
      tool of empowerment; for Ilinka, it’s a lifeline. The telephone’s role is functional
      (communication), but its narrative role is redemptive: it restores Ilinka’s
      agency, even if only for a moment. The fact that it’s Winnie’s phone, not Catherine’s,
      underscores the importance of cultural trust over institutional help.'
    status_before_event: In Winnie’s house, on a table or hook, unused.
    status_after_event: Offered to Ilinka, likely held in her hands as she prepares
      to call her family (end of scene).
