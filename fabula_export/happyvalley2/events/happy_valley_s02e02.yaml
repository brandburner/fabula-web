  - object_uuid: ger_object_721407bf8e76
    description_of_involvement: Fabricated wage transfer records are a psychological
      tool used by the Knezevics to maintain compliance among trafficked women. Catherine
      describes these documents as part of the system that convinces victims their
      wages are being sent home to their families, even though this is a lie. The
      records are never shown in the office but are referenced as part of the broader
      pattern of deception that traps women like Ilinka in cycles of exploitation.
      Their absence in the physical space underscores their role as an abstract but
      potent form of control.
    status_before_event: Forged by the Knezevics and shown to trafficked women to
      maintain the illusion of financial support for their families.
    status_after_event: Continued use by the Knezevics to manipulate other victims,
      with no evidence of their falsity available to law enforcement.
    global_id: ger_object_721407bf8e76
  - object_uuid: ger_object_f41d840cbfb2
    description_of_involvement: Stolen passports are central to the Knezevics’ control
      over trafficked women like Ilinka. Catherine explains that the Knezevics seize
      passports upon arrival, depriving victims of their identity and legal status.
      This tactic is described as a cornerstone of their manipulation, ensuring victims
      cannot seek help or escape without risking severe consequences. The passports
      are not physically present in the office but are invoked as a symbol of the
      systemic oppression Ilinka and others endure.
    status_before_event: Stolen from Ilinka and other trafficked women upon their
      arrival in the UK, held by the Knezevics to prevent escape or outside contact.
    status_after_event: Still in the possession of the Knezevics, continuing to serve
      as a tool of control over Ilinka and other victims.
    global_id: ger_object_f41d840cbfb2
  - object_uuid: ger_object_9c1dbbda3707
    description_of_involvement: The Knezevics’ minibus is described by Catherine as
      the vehicle used to transport trafficked women like Ilinka between their living
      quarters and Bowen’s biscuit factory. The minibus is framed as a tool of confinement,
