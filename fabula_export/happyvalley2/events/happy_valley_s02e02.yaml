  title: Clare’s desperate plea for alcohol
  description: "\n  In the claustrophobic confines of Catherine’s car, Clare’s sudden,\
    \ raw admission—*I need a drink*—ignites a volatile confrontation that exposes\
    \ the fragility of their relationship and Clare’s spiraling addiction. Catherine’s\
    \ refusal to enable her triggers Clare’s defensiveness, with Clare lashing out\
    \ by blaming Catherine for her relapse (*If you hadn’t left me there I probably\
    \ wouldn’t have even started!*). The exchange escalates as Clare’s desperation\
    \ turns to tears, revealing her emotional unraveling just days before Helen’s\
    \ funeral. Catherine’s firm but weary response (*Get a grip, Clare*) underscores\
    \ her exhaustion with Clare’s cycles of self-destruction, while Clare’s accusation\
    \ (*One day! And I’m not allowed to be upset*) lays bare the unspoken grief and\
    \ resentment simmering beneath their sibling dynamic. The scene foreshadows Clare’s\
    \ imminent relapse, framing her struggle as both a personal crisis and a test\
    \ of Catherine’s emotional limits as she juggles family obligations with her high-stakes\
    \ investigation. The tension peaks when Clare’s fidgety desperation (*demons are\
    \ strong, and they’ve still got CLARE gripped*) signals her inability to resist\
    \ the pull of alcohol, setting up her inevitable fall off the wagon despite Catherine’s\
    \ efforts to intervene.\n  "
  episode_uuid: ep_sea_ser_happy_valley_s02_e02
  scene_sequence: 51
  sequence_in_scene: 76
  key_dialogue: &id059
  - 'CLARE: "I need a drink."'
  - 'CATHERINE: "No you don’t."'
  - 'CLARE: "Yeah well I do. So."'
  - 'CATHERINE: "Even if I had you’d have to fight me for it, and you know as well
    as I do that you wouldn’t win."'
  - 'CLARE: "If you hadn’t left me there I probably wouldn’t have even started!"'
  - 'CATHERINE: "I had things to do, and I needed the car!"'
  - 'CLARE: "One day! And I’m not allowed to be upset."'
  - 'CATHERINE: "You’re allowed to be upset. Do you really want to remember Helen’s
    funeral as the day you fell off the wagon?"'
