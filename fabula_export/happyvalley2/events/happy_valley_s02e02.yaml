- fabula_uuid: cand_evt_scene_3bb91aacddbe9329_01
  global_id: null
  title: Catherine confronts Clare’s relapse
  description: 'At Helen’s wake, Catherine stumbles upon Clare and Ann drunk in the
    garden, shattering her fragile hope that Clare had overcome her addiction. The
    confrontation escalates as Catherine’s protective fury clashes with Clare’s defensiveness,
    forcing Ann to confront the reality of Clare’s relapse. Catherine’s blunt accusation—*‘Clare’s
    an alcoholic’*—exposes the family’s unspoken fractures at a moment of collective
    grief, while Clare’s defiance and Ann’s guilt reveal the depth of their dysfunction.
    The scene culminates in Clare’s reluctant surrender of her drink, but the damage
    is done: Catherine’s authority as both sister and police officer is tested, and
    the family’s instability threatens to derail her focus on the ongoing investigation.
    The moment underscores Clare’s self-destructive spiral and Catherine’s struggle
    to balance professional duty with personal crisis, all while Ann’s ignorance of
    Clare’s addiction highlights the family’s fractured communication.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e02
  scene_sequence: 49
  sequence_in_scene: 72
  key_dialogue: &id055
  - |-
    CATHERINE: What’s going on?
    CLARE: Okay. Calm down. I just - I just... needed something to blur the edges.
  - |-
    CATHERINE: D’you want to get in the car?
    CLARE: Why don’t you chill? Out.
    CATHERINE: You know... today of all days to fall off the wagon. Helen would’ve been really proud of you.
  - |-
    CATHERINE: Clare’s an alcoholic.
    ANN: I didn’t know that.
    CLARE: Yeah that’s right, go on, embarrass me.
