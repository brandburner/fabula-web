  description: John arrives at Vicky’s flat with £1,000 in cash, desperate to buy
    his way out of her blackmail. The exchange quickly spirals into a volatile confrontation
    when Vicky rejects the money and demands he leave his wife, exposing the depth
    of her emotional manipulation. John’s fury erupts when he realizes she drugged
    him to take compromising photos, but Vicky twists the act into a twisted justification
    of love, insisting she only wanted to 'save' him from his unhappy marriage. The
    scene lays bare the toxic core of their relationship—her obsession, his desperation—and
    ends with Vicky’s chilling insistence that he’ll 'thank her' someday. The confrontation
    forces John to confront the irreversible damage to his marriage and his own complicity
    in the affair, while Vicky’s unhinged behavior foreshadows her capacity for escalating
    violence. The scene serves as a turning point in John’s arc, pushing him toward
    a breaking point where his choices will have catastrophic consequences.
