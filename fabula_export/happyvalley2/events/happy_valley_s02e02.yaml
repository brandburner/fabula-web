- fabula_uuid: cand_evt_scene_875a18965d5b368f_02
  global_id: null
  title: Catherine reveals trafficking realities
  description: 'In Catherine’s office, Winnie—frustrated by bureaucratic exclusion—presses
    Catherine to explain how Ilinka and other trafficked women end up in their predicament.
    Catherine, initially reluctant, lays bare the systemic manipulation: false promises
    of work, stolen passports, withheld wages, and fabricated family correspondence
    to keep victims compliant. She describes Ilinka’s escape as a desperate, serendipitous
    act—a factory worker’s hesitation during a cigarette break allowing her to scale
    a wall and flee blindly, guided only by strangers’ directions to the police station.
    The exchange underscores the Knezevics’ operational cleverness, the victims’ isolation,
    and the fragile, accidental nature of liberation. Winnie’s outrage (‘It’s evil’)
    contrasts with Catherine’s weary pragmatism, highlighting the institutional failures
    that enable trafficking. The dialogue deepens Winnie’s emotional investment in
    Ilinka’s plight while reinforcing Catherine’s moral conflict: she knows the perpetrators’
    identities but lacks the evidence to act, a frustration mirrored in her professional
    and personal life (e.g., Tommy Lee Royce’s impending release). The scene also
    foreshadows Ilinka’s vulnerability—her escape was pure luck, and the Knezevics’
    reach remains unchecked.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e02
  scene_sequence: 18
  sequence_in_scene: 30
  key_dialogue: &id027
  - |-
    WINNIE: How do they get into a pickle like this?
    CATHERINE: They promise them a better life. And a job. Then when they get here they take their passport and their papers, syphon off their wages, tell ‘em they’re sending it all home to the family, along with any letters they write—which of course they aren’t—and they don’t know any better. Penny only drops months later when they’ve never had any letters back from their families. And then when the penny does drop there’s very little they can do about it.
  - |-
    WINNIE: How did she escape?
    CATHERINE: She was on a fag break. At Bowen’s biscuit factory. They don’t run—normally—because they’ve got no idea where they are, and they can’t speak any English, and they’re terrified. So effectively they’re trapped. All they know is where they live and where they work. They’re taken there and back in a minibus. Every day. That’s their life, it’s all they know. She got over the wall and she just ran and ran and ran. She had no idea where she was going and if they’d caught her they’d have beaten her black and blue.
  - |-
    WINNIE: It’s evil.
    CATHERINE: Yup.
    WINNIE: Well if you know damned well it’s these Knezevics doing it, why don’t you arrest ‘em?
    CATHERINE: Oh, Winnie. They’re clever. They’re clever bastards. It’s one thing knowing somebody’s done something, it’s a different kettle of fish having the evidence to arrest ‘em for it.
