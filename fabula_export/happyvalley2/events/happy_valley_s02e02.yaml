    underscores Clare’s self-destructive patterns, Catherine’s exhausted vigilance,
    and the family’s inability to intervene effectively. The moment serves as a microcosm
    of their collective powerlessness amid Clare’s unresolved trauma and Catherine’s
    professional crisis, deepening the tension between maternal duty and personal
    helplessness.
