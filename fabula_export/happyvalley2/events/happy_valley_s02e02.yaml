  - 'CATHERINE: The Home Office are letting Tommy Lee Royce out for his mother’s funeral.
    Which... is tomorrow. Your F.L.O.’ll be in touch to tell you all this, but I heard,
    so. I thought you ought to know.'
  - 'ANN: Where? Where’s his mother’s funeral?'
  - 'CATHERINE: Elland.'
  - 'ANN: Before my mum?'
  - 'CATHERINE: No. After. Later in the afternoon.'
