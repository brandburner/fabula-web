  title: Ilinka’s desperate plea for protection
  description: At the Norland Road Police Station front desk, Ilinka—disheveled, terrified,
    and speaking rapidly in Croatian—pleads for help, warning that her traffickers
    will kill her if they find her. Her frantic, emotional outburst ('You have to
    help me! If they get hold of me now they’ll kill me!') forces Catherine and Joyce
    into immediate action. Catherine, recognizing the urgency, subtly directs Joyce
    to arrange a translator via Language Line, ensuring Ilinka’s testimony can be
    documented while minimizing her exposure. The scene underscores the precarious
    balance between law enforcement’s procedural constraints and the visceral, life-or-death
    stakes for a vulnerable victim. Ilinka’s desperation and Catherine’s calculated
    response highlight the tension between institutional protocol and the need for
    swift, compassionate intervention in human trafficking cases. The moment also
    reinforces Catherine’s role as a protector, even as she navigates her own personal
    and professional pressures.
