  title: Clare’s unobserved relapse decision
  description: In the quiet of Catherine’s backyard at 11 PM, Clare stands smoking,
    visibly agitated as she digs through her pockets to find crumpled banknotes and
    coins. The camera lingers on her internal conflict—her fingers hesitate over the
    money, symbolizing the choice between sobriety and surrender. The tension escalates
    as she abruptly makes her decision, slipping away from the house with uncharacteristic
    speed toward the Jockey’s pub, signaling her relapse into alcoholism. The moment
    is unobserved by Catherine and Daniel inside the kitchen, who remain unaware of
    her departure, underscoring the fragility of her sobriety and the unspoken pressures
    she’s been concealing beneath her composed exterior. This scene serves as a turning
    point, revealing Clare’s vulnerability and forcing Catherine to confront her family’s
    crises amid the ongoing investigation.
