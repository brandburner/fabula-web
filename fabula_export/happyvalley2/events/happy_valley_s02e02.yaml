  title: John’s violent unraveling with Vicky
  description: John’s paranoia and rage reach a breaking point during a tense confrontation
    with Vicky in her flat. Despite her attempts to reassure him that the incriminating
    photos have been deleted, his distrust festers, culminating in a physical altercation
    when he tries to destroy her computer. Vicky’s defiance and John’s escalating
    violence—triggered by his perceived betrayal—lead to a brutal struggle. In a frenzied
    state, John strangles Vicky with a computer cable, repeating the mantra 'You shouldn’t’ve
    done it' as he tightens his grip. The scene exposes the depth of John’s psychological
    collapse, his inability to escape his own guilt, and the irreversible consequences
    of his actions. The violence is raw and unglamorous, reflecting the chaos of real-life
    desperation rather than cinematic spectacle. This moment marks a turning point
    in John’s arc, as his moral and emotional unraveling culminates in murder, setting
    up the investigative fallout to come.
