      the private and the public, the personal and the professional. Winnie’s entrance
      through this door is unannounced but expected, her arrival a reminder that the
      family’s crises are never truly contained. The door’s state—open, inviting—contrasts
      with the closed-off nature of Clare and Daniel’s argument, which is hushed and
      defensive. It’s a symbol of the family’s inability to keep their problems to
      themselves, as well as their reliance on outsiders (like Winnie) to help them
      navigate their chaos. The door’s wood may be weathered, but it’s sturdy, much
      like Catherine, holding together a household that’s one strong wind away from
      collapse.
