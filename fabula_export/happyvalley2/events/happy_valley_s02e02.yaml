  title: Mike reveals Royce’s funeral release to Catherine
  description: 'In a quiet moment at the Norland Road Police Station, Mike Taylor
    approaches Catherine with deliberate caution, his tone measured but his intent
    clear: he’s delivering news he knows will unsettle her. The revelation—that Tommy
    Lee Royce has been granted temporary release to attend his mother’s funeral—lands
    like a physical blow. Catherine’s immediate, visceral reaction (a gut-punched
    silence, her body language tightening) underscores the personal and professional
    stakes of Royce’s return, even briefly. The timing of Mike’s disclosure—before
    the news becomes public—is strategic, positioning him as both a messenger and
    a tactical ally, while forcing Catherine to confront her unresolved trauma and
    the immediate threat Royce’s presence poses to her investigation, her family,
    and her own stability. The scene’s brevity amplifies its impact, leaving Catherine’s
    emotional and operational response hanging in the air as the implications ripple
    outward.'
