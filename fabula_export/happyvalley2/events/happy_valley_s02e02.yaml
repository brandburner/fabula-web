  title: Catherine’s public moralizing backfires
  description: Catherine publicly humiliates a handcuffed 15-year-old cannabis dealer
    in front of arriving students, delivering a graphic, moralistic lecture about
    the dangers of skunk—including its cultivation in feces-laden terraced houses—while
    parading him toward her patrol car. Her performance is calculated to deter other
