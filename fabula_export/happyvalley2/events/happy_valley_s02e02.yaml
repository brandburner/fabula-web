    a visual shorthand for her late return after a grueling day. The quiet night—contrasting
    with the chaos of her professional and personal life—underscores her exhaustion
    and the weight of unresolved burdens. This moment serves as a narrative pause,
    a brief respite where the audience is reminded of Catherine’s dual roles: a dedicated
    police sergeant and a woman carrying the emotional toll of family crises (Clare’s
    relapse, Tommy Lee Royce’s looming release, and the investigation into human trafficking).
    The stillness of the exterior shot foreshadows the tension between her duty and
    her fragility, hinting at the instability lurking beneath her composed exterior.
    The lack of dialogue or action here is deliberate; the silence speaks volumes
    about her mental state, reinforcing the theme of isolation that defines her character
    arc.'
