  title: Catherine infiltrates Tommy’s funeral
  description: 'Catherine secretly enters Tommy Lee Royce’s mother’s funeral service,
    slipping into the chapel unnoticed by the mourners but not by Frances Drummond,
    who recognizes her. The hymn’s emotional weight triggers Tommy’s visible grief—his
    tearful struggle to sing contrasts sharply with Catherine’s irritation at his
    apparent well-being. Frances, alarmed by Catherine’s presence, avoids eye contact,
    while Catherine’s fixation on Tommy reveals her unresolved conflict: a mix of
    compulsion and resentment. The vicar’s invocation of repentance forces Tommy to
    confront his past, deepening the tension between his public display of grief and
    Catherine’s private judgment. The scene underscores Catherine’s investigative
    obsession and Frances’ hidden connection to Tommy, while the funeral’s solemnity
    amplifies the personal stakes of their confrontation.'
