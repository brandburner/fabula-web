  title: John searches for photos while Vicky probes Amanda’s reaction
  description: In Vicky’s flat, John arrives visibly tense, his distrust of her exposed
    by the threat of incriminating photos. Vicky, playing the gracious host, serves
    wine and prepares dinner while subtly interrogating him about his confession to
    Amanda—whether she knows Vicky’s identity and how she reacted. John deflects,
    focusing instead on vague plans for their future, but his evasiveness reveals
    the fragility of their alliance. Meanwhile, Vicky’s calculated resistance (e.g.,
    tossing him her phone with a smile) underscores her strategic advantage in their
    power struggle. The scene escalates when John, left alone, frantically searches
    for hidden backups, only to be caught off-guard by Vicky’s return. His relief
    at receiving her phone is short-lived, as he suspects she may have already secured
    copies elsewhere. The tension between them deepens, foreshadowing the violent
    confrontation to come and highlighting the looming threat of Amanda’s involvement
    in their dangerous dynamic.
