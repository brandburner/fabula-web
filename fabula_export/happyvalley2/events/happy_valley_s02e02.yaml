      highlights a critical failure: the system that rescued her cannot house her.
      The trafficking unit’s involvement is represented through Catherine’s authority
      (she *‘speaks to’* them) and the lack of immediate solutions (Ilinka is left
      in limbo). The organization’s power dynamics are complex—it has the resources
      to raid trafficking houses but not to provide long-term care, leaving Catherine
      to improvise.'
