  object_involvements:
  - object_uuid: ger_object_a60912e0f30c
    description_of_involvement: The factory wall at Bowen’s biscuit factory serves
      as both a physical and psychological barrier to Ilinka’s escape. Catherine describes
      how Ilinka scaled the wall during a factory worker’s cigarette break, seizing
      a fleeting opportunity to flee. The wall is framed as a symbol of the confinement
      and desperation experienced by trafficked women, who are otherwise trapped in
      a cycle of forced labor. Its height and the lack of supervision during the break
      are critical to Ilinka’s escape, highlighting the fragility of her freedom and
      the sheer luck involved in her break for liberty.
    status_before_event: A sturdy perimeter wall surrounding Bowen’s biscuit factory,
      regularly patrolled and rarely unguarded, serving as a deterrent to escape attempts.
    status_after_event: Unchanged physically, but now associated with Ilinka’s daring
      escape—a momentary weakness in the Knezevics’ control that she exploited.
    global_id: ger_object_a60912e0f30c
  - object_uuid: ger_object_ab38fe77dc04
    description_of_involvement: 'The factory worker’s cigarette serves as the catalyst
      for Ilinka’s escape. Catherine explains that during a brief, unsupervised moment—a
      worker’s hesitation to smoke—the opportunity arose for Ilinka to scale the factory
      wall. The cigarette break is framed as a rare and fleeting interruption in the
      otherwise tightly controlled routine of the factory. Its significance lies in
      the serendipity of the moment: a small, human action (the worker’s pause to
      smoke) created the conditions for Ilinka’s freedom, however temporary or fragile.'
    status_before_event: Held by the factory worker during a brief, unsupervised break,
      creating a momentary lapse in surveillance.
    status_after_event: Consumed, but its role in Ilinka’s escape is now part of the
