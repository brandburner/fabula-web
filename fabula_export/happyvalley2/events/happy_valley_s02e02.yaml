  title: Ilinka’s arrival disrupts family conflict
  description: Catherine returns home with Ilinka, a traumatized trafficking victim,
    interrupting Clare and Daniel’s heated argument about Clare’s alcoholism and Ryan’s
    knowledge of her past. The family’s dysfunctional dynamics collide with Ilinka’s
    urgent need for safety, forcing Catherine to navigate both crises simultaneously.
    Ilinka’s arrival exposes the Hebdens’ unresolved tensions—Clare’s shame, Daniel’s
    guilt, and Catherine’s overstretched protective instincts—while Winnie’s intervention
    provides temporary relief. The scene underscores the family’s fragility and Catherine’s
    struggle to balance professional duty with personal chaos, as Ilinka’s trauma
    becomes a catalyst for confronting long-buried truths.
