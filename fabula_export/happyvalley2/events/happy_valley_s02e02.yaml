  location_involvements:
  - location_uuid: ger_location_7dbe1312dd9f
    description_of_involvement: 'The stairwell of Norland Road Police Station is the
      epicenter of this event, a liminal space where the private and professional
      collide. Its enclosed, vertical design—steep steps, fluorescent lighting, echoing
      footsteps—creates a sense of inevitability and tension, as if the characters
      are trapped in a cycle of institutional distrust. The stairwell functions as
      a microcosm of the police force itself: hierarchical, confined, and prone to
      echoes (both literal and metaphorical). It is here that Catherine’s professional
      pride and personal resentment are laid bare, her confrontation with Mike and
      the muttered identification by Jodie serving as a public reckoning of her suspect
      status. The stairwell’s role is to amplify the emotional and institutional stakes,
      turning a private grievance into a public spectacle.'
    observed_atmosphere: Claustrophobic and tense, with a sense of inevitable confrontation.
      The fluorescent lighting casts a sterile, institutional glow, while the echoing
      footsteps underscore the weight of the characters’ words and the collective
      judgment of the team.
