  title: John’s decisive call to Vicky
  description: 'John emerges from the police station restroom visibly agitated but
    with a newfound resolve, clutching his two phones. He immediately dials Vicky
    on his secret phone, his excitement palpable as he seizes what he perceives as
    a rare opportunity to escape his stagnant marriage. The call represents a critical
    turning point in his moral unraveling—his emotional capitulation to Vicky’s blackmail
    is framed as a long-overdue decision, though his justification (''I shoulda left
    her years ago'') reveals his deep-seated resentment toward Amanda. The moment
    is charged with subtext: John’s sudden enthusiasm masks his desperation, while
    his promise to ''get my stuff and that’s it'' signals the irreversible nature
    of his choice. This call isn’t just about leaving Amanda; it’s John’s surrender
    to Vicky’s psychological dominance, a surrender that will later spiral into violence.
    The scene’s brevity amplifies its impact, as John’s impulsive decision sets in
    motion the collapse of his family and the escalation of Vicky’s control over him.'
