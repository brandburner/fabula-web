  key_dialogue:
  - |-
    CUSTODIAL OFFICER: Good morning.
    TOMMY: ((wary)) Morning boss.
    CUSTODIAL OFFICER: I’ve come to let you know that you’ve been given permission by the Home Office to attend your mother’s funeral.
  - |-
    TOMMY: When?
    CUSTODIAL OFFICER: Today. (TOMMY had no idea) You’ll be leaving in the next half hour. You’ll be driven there under armed escort. You’ll be handcuffed at all times. Okay?
  - |-
    TOMMY: Yeah. Yeah. But they took it off me [when] -
    PERSONAL OFFICER: I’ve sorted that out.
