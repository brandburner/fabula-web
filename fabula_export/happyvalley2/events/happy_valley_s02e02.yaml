  title: Winnie bridges Ilinka’s isolation with language
  description: Catherine arrives home with Ilinka, a traumatized Croatian trafficking
    victim, and attempts to integrate her into the household. The tension between
    Clare and Daniel over Ryan’s knowledge of Clare’s alcoholism is momentarily suspended
    as Catherine explains Ilinka’s situation—her four years of forced labor, exploitation,
    and escape. Catherine calls Winnie, her Croatian-speaking neighbor, to help translate.
    Winnie’s arrival creates an intimate, exclusionary moment as she and Ilinka communicate
    in their native language, sharing empathy and comfort. Ilinka’s plea to call her
    family and Winnie’s reassurance highlight her isolation and the family’s inability
    to connect with her. The scene underscores Winnie’s role as a cultural and emotional
    translator, foreshadowing her potential to unlock Ilinka’s trauma and aid the
    investigation. Meanwhile, the unresolved family conflict lingers, reinforcing
    Catherine’s dual burden of professional and personal crises.
