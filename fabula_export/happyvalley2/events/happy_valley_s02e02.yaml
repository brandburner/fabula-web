  title: Winnie confronts Catherine on trafficking failures
  description: 'In Catherine’s office at Norland Road Police Station, Winnie—frustrated
    by bureaucratic exclusion—presses Catherine to explain how human trafficking operations
    like the Knezevics’ evade justice. Catherine, visibly weary, outlines the systemic
    manipulation of victims: stolen passports, fabricated wage transfers, and psychological
    isolation that render them powerless. Winnie’s horror at the mechanics of exploitation—‘It’s
    evil’—escalates into a pointed challenge: *‘If you know damned well it’s these
    Knezevics doing it, why don’t you arrest ‘em?’* Catherine’s raw admission—‘They’re
    clever bastards’—reveals the institutional paralysis: knowledge without evidence,
    victims too terrified to act, and a cycle of impunity. The exchange underscores
    the fragility of Ilinka’s escape (a ‘fag break’ over a factory wall) and the serendipity
    of her reaching safety, while Winnie’s insistence forces Catherine to confront
    the moral cost of systemic failure. The scene deepens the narrative’s critique
    of institutional complicity, framing Winnie as an unlikely but vital catalyst
    for Catherine’s reckoning with her own constraints.'
