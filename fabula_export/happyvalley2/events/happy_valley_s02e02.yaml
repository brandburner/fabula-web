    interrupting Clare and Daniel’s heated argument about Clare’s alcoholism and Ryan’s
    knowledge of her past. The family’s dysfunctional dynamics collide with Ilinka’s
    urgent need for safety, forcing Catherine to navigate both crises simultaneously.
