  title: Ilinka spots fleeing VW Golf driver
  description: "\n  Outside the Norland Road Police Station, Ilinka stands in the\
    \ yard smoking a cigarette when a battered VW Golf with a middle-aged driver slows\
    \ near the entrance. The moment Dave—another officer—steps outside in uniform,\
    \ the driver abruptly accelerates and speeds away. Ilinka’s sharp observational\
    \ skills catch the reaction, while Dave remains oblivious. This fleeting but deliberate\
    \ response from the driver suggests criminal awareness, reinforcing Ilinka’s earlier\
    \ fear of being followed to the station. The moment underscores her heightened\
    \ vigilance as a trafficked survivor and hints at the Knezevics’ operational reach,\
    \ even in supposed safe zones. The contrast between Ilinka’s alertness and Dave’s\
    \ unawareness also highlights her trauma-informed perception, a skill honed by\
    \ her ordeal.\n  "
