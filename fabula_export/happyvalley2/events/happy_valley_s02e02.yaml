      labor and a place of incarceration for trafficked women. Its high walls and
      controlled environment ensure that victims remain trapped, both physically and
      psychologically.
    symbolic_significance: Represents the dehumanizing and exploitative nature of
      the trafficking system—The factory’s industrial setting contrasts sharply with
      the human suffering it conceals, symbolizing how systemic oppression can operate
      in plain sight, disguised as legitimate business.
    access_restrictions: Heavily guarded and restricted—Victims are transported to
