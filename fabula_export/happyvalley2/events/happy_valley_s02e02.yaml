  title: John searches for Vicky’s phone
  description: John arrives at Vicky’s flat, visibly tense and distracted by the threat
    of incriminating photos she holds over him. While Vicky probes him about Amanda’s
    reaction to his confession—testing his honesty and the stability of his marriage—John
    deflects, insisting on trust and demanding the return of her phone. His desperation
    becomes apparent as he covertly searches the room for the device while Vicky is
    in the kitchen. When she returns, she casually tosses him the phone, but her calculated
    nonchalance and the lingering suspicion of backups underscore her strategic advantage
    in their power struggle. The scene reveals John’s vulnerability, Vicky’s manipulative
    control, and the fragility of their alliance, all while foreshadowing the escalating
    consequences of his affair.
