  title: Tommy’s Funeral Outburst and Catherine’s Defiance
  description: "\n  At Lynn Royce’s funeral, Catherine deliberately attends to witness\
    \ Tommy Lee Royce’s humiliation—handcuffed, guarded, and forced to grieve under\
    \ the weight of his conviction. When Tommy spots her, his grief curdles into explosive\
    \ rage, and he publicly accuses her of killing his mother, screaming obscenities\
    \ that disrupt the solemnity of the service. The outburst forces prison guards\
    \ to drag him out, while Frances Drummond slips away unnoticed. Andy Shepherd’s\
    \ withering glare at Catherine signals the professional fallout to come, but her\
    \ unflinching stare back reveals her refusal to back down. The scene crystallizes\
    \ the mutual hatred between Catherine and Tommy, escalates the tension of their\
    \ unresolved conflict, and foreshadows the consequences of Catherine’s provocative\
    \ presence. The funeral, meant to be a moment of closure, instead becomes a battleground\
    \ where personal vendettas and institutional power collide.\n  "
