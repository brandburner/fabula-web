    guilt, and Catherine’s overstretched protective instincts—while Winnie’s intervention
    provides temporary relief. The scene underscores the family’s fragility and Catherine’s
    struggle to balance professional duty with personal chaos, as Ilinka’s trauma
    becomes a catalyst for confronting long-buried truths.
