  global_id: null
  title: Andy Reprimands Catherine Over Winnie’s Risk
  description: 'In a tense, private confrontation at the police station, Andy Shepherd
    delivers a blunt reprimand to Catherine for unknowingly endangering Winnie by
    bringing Ilinka—a traumatized trafficking victim—into her home. Andy reveals Ilinka
    spotted a suspicious driver near the station, raising the possibility she was
    followed to Winnie’s house, where she’s now vulnerable to retaliation from the
    Knezevics crime family. While Andy acknowledges Catherine’s good intentions, he
    stresses the severity of the situation: the traffickers won’t hesitate to harm
    Winnie if they believe Ilinka has compromised them. He orders a security alarm
    installed at Winnie’s home and urges Catherine to finalize her alibi for the murders
    to clear her name. The exchange underscores Catherine’s professional vulnerability—her
    reputation as a respected officer is now tied to both her investigative competence
    and her personal judgment. Andy’s tone balances frustration with reluctant understanding,
    but his insistence on the alibi reveals the institutional pressure mounting against
    her. Catherine, though defensive, suppresses an apology, knowing it would only
    weaken her position further. The scene forces her to confront the collision of
    her protective instincts and her professional obligations, with Winnie’s safety
    now a direct consequence of her actions.'
