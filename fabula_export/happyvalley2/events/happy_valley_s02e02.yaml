  - 'JOHN: "She said she knew. She said she’d known for a while. Well, suspected."'
  - 'VICKY: "Did she want to know who I was?"'
  - 'JOHN: "Yeah."'
  - 'VICKY: "Did you tell her?"'
  - 'JOHN: "No."'
  - 'VICKY: "I know you’re worried about the children. But we can make it work. You
    can bring them here."'
  - 'JOHN: "There’s not room."'
  - 'VICKY: "Yeah. Obviously. We’d have to get somewhere bigger."'
  - 'JOHN: "At some point. You will have to give me the phone, and anywhere you’ve
    backed ‘em up. I mean... we have to have that trust back. Don’t we? I have to."'
