  title: Catherine’s desperate plea for Clare
  description: In a tense, emotionally charged confrontation outside her home at night,
    Catherine pursues Clare after learning of her relapse into drinking. Clare, already
    defensive and resentful, rejects Catherine’s warnings about Neil’s volatility
    and the dangers of her own self-destructive behavior. Catherine escalates from
    pleading to veiled threats, even warning Clare about the serial killer targeting
    vulnerable women, but Clare remains defiant. When Catherine threatens to lock
    Clare out of the house, Clare dismisses her, forcing Catherine to abandon her
    own safety and follow Clare into the night—a moment that exposes the depth of
    Catherine’s fear for her sister and the irreversible fracture in their relationship.
    The scene crystallizes Clare’s defiance as a turning point, potentially derailing
    Catherine’s focus on the trafficking investigation at a critical moment. Clare’s
    ultimatum—‘Get out of my life’—marks a shift in their dynamic, leaving Catherine
    emotionally exposed and Clare’s safety in jeopardy.
