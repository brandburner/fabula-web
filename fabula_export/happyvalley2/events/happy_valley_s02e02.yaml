      indirectly through her insistence on reporting Ilinka’s lead. The organization’s
      presence is felt in the police photo on the table, the newspaper articles about
      the serial killer investigation, and Catherine’s references to ‘the team working
      on the murders.’ While the police are not physically present, their authority
      and protocols shape the confrontation: Catherine’s professional duty to report
      the lead is non-negotiable, and her role as a sergeant binds her to the institution’s
      goals. However, the organization’s involvement is also a source of conflict,
      as Ilinka’s fear of the police reflects a deeper distrust of institutional protection—especially
      given the Knezevics’ ability to operate with impunity. The police’s role here
      is paradoxical: they are both the potential solution to the trafficking ring’s
      crimes and a reminder of the system’s failures.'
    active_representation: Through Catherine’s professional authority and the physical
