  title: Catherine’s ultimatum collapses into pursuit
  description: 'After Clare rejects Catherine’s desperate pleas to stay away from
    the Jockey’s pub—where she’ll inevitably drink and spiral—Catherine issues a final
    threat: she’ll lock Clare out of the house and abandon her to the streets, where
    a serial killer is targeting vulnerable women. The threat is a last-ditch attempt
    to assert control, but it backfires. Clare’s defiance ("Whatever.") and Catherine’s
    inability to follow through expose the depth of her emotional dependency. The
    moment Clare walks away, Catherine’s resolve crumbles. Despite her earlier ultimatum,
    she abandons her own safety and the investigation’s urgency to chase after Clare
    into the night, signaling the irreversible fracture in their relationship and
    the prioritization of Clare’s well-being over everything else—even logic. The
    scene escalates the narrative tension by placing Clare in greater physical danger
    while simultaneously revealing Catherine’s emotional vulnerability and the limits
    of her authority as a protector.'
