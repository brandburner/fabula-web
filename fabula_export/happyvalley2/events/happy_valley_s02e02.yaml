  title: Frances Probes Ryan’s Family Secrets
  description: "\n  In a quiet classroom corner, Ryan’s halting reading session with\
    \ Frances Drummond reveals his vulnerability and pride in Catherine’s police work,\
    \ while Frances subtly probes his family dynamics. When Ryan mentions his grandmother’s\
    \ police career and dismisses questions about his absent father, Frances deflects\
    \ with a ‘lucky guess’—a lie that hints at her preexisting knowledge of Ryan’s\
    \ family. Her black attire and mention of attending a funeral later that day trigger\
    \ Ryan’s offhand remark about Catherine and Clare attending Helen’s funeral, causing\
    \ Frances’ visible distress. The exchange exposes Ryan’s emotional investment\
    \ in his family, Frances’ obsessive interest in Catherine’s life, and the looming\
    \ threat of Tommy Lee Royce’s release, all while maintaining the facade of a benign\
    \ teaching assistant. The moment underscores the tension between personal concern\
    \ and professional boundaries, as well as the fragility of Ryan’s emotional world.\n\
    \  "
