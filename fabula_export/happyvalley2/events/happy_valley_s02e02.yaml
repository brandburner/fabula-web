  title: John packs an overnight bag
  description: 'In a quiet, methodical act of betrayal, John Wadsworth packs an overnight
    bag in his bedroom, his movements deliberate and tense. The scene is sparse—no
    dialogue, no witnesses—just the visual weight of his decision. This solitary moment
    marks the collapse of his marriage, a turning point where his financial desperation
    and blackmail by Vicky finally push him toward separation. The overnight bag,
    a symbol of his impending abandonment, is packed with quiet urgency, signaling
    his irreversible choice to leave Amanda and his children. The act is both a private
    confession and a public declaration, one that will ripple through the investigation
    and his relationship with Catherine, who remains unaware of his personal unraveling.
    The scene’s tension lies in its silence: no confrontation, no explanation, just
    the cold reality of a man choosing self-preservation over his family.'
