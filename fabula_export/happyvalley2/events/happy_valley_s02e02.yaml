  title: Team speculates on officer’s exclusion
  description: In a tense stairwell exchange, Ann, Shaf, Sledge, and Gorkem dissect
    the sudden removal of a fellow officer from the Lynn Dewhurst murder investigation.
    Sledge reveals the officer was questioned for leaving threatening messages on
    Dewhurst’s answerphone days before her death, sparking skepticism about her potential
    involvement. The team speculates whether this exclusion is due to suspicion or
    procedural caution, with Gorkem noting the officer’s absence from house-to-house
    duties and her deployment on a separate trafficking raid. The conversation exposes
    institutional distrust, the team’s growing awareness of the case’s darker connections,
    and the possibility of an insider threat—hinting at systemic corruption while
    reinforcing the team’s camaraderie and shared unease about the investigation’s
    direction. Ann’s blunt dismissal of the idea as 'stupid' contrasts with Sledge’s
    measured speculation, underscoring the team’s fractured perspectives on the case’s
    integrity.
