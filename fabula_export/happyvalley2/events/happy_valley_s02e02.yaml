    finding the front door inexplicably left ajar. Her cautious entry—hesitant yet
    deliberate—marks a shift from the public grief of the funeral to a private, solitary
    investigation. The unlocked door suggests either negligence or an invitation,
    heightening her suspicion that something is amiss. Her decision to step inside,
    despite the absence of other guests, signals her instinct-driven need to uncover
    hidden truths, whether about Clare’s whereabouts, Nevison’s secrets, or the unresolved
    tensions tied to Tommy Lee Royce’s release. The scene’s tension lies in the contrast
    between the house’s emptiness and the lingering emotional weight of the day, as
    well as Catherine’s unspoken fear that she may stumble upon something she wasn’t
    meant to see—whether related to the case or her fractured family.
