  title: Trafficking trauma eclipses family conflict
  description: Catherine returns home with Ilinka, a traumatized trafficking victim,
    interrupting a tense confrontation between Clare and Daniel over Clare’s alcoholism.
    The family’s personal drama is momentarily eclipsed as Ilinka’s harrowing story—four
    years of forced labor, confinement with 25 other women, and near-slavery conditions—unfolds.
    Catherine’s urgency to secure Ilinka’s safety and Winnie’s arrival to translate
    create a fragile alliance, but the family’s unresolved tensions simmer beneath
    the surface. The scene pivots from domestic conflict to the moral weight of the
    trafficking investigation, forcing Catherine to balance her professional duty
    with her family’s instability. Ilinka’s plea to contact her family underscores
    the human cost of the case, while Clare and Daniel’s unresolved argument lingers
    as a reminder of Catherine’s dual burdens.
