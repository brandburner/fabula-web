  key_dialogue: &id057
  - 'CLARE: Oh shit, she’s here.'
  - |-
    CATHERINE: D’you want to get in the car?
    CLARE: Why don’t you chill? Out.
    CATHERINE: You know... today of all days to fall off the wagon. Helen would’ve been really proud of you.
  - |-
    CATHERINE: Clare’s an alcoholic.
    ANN: I didn’t know that.
    CLARE: Yeah that’s right, go on, embarrass me.
  - |-
    CATHERINE: I don’t want to embarrass you, Clare, I just want you to not let this go any further than it has done already. I want you to put that down and I want you to get into the car.
    CATHERINE: Do you want me to treat you like I’m your sister and I love you. Or do you want me to treat you like I’m a police officer? Which I will do if I have to.
