  title: Clare defends Neil’s redemption to skeptical Catherine
  description: 'In the conservatory of Catherine’s house, Clare—still glowing from
    a heartfelt conversation with Neil—tries to convince her sister that Neil’s past
    breakdown and infidelity don’t define him. She reveals Neil’s history: a high-pressure
    job, an affair that spiraled into blackmail, a nervous breakdown, and the loss
    of his family and career. Clare frames him as a reformed man, now sober and remorseful,
    but Catherine remains guarded, her skepticism rooted in professional instinct
    and personal distrust. The tension escalates as Clare seeks Catherine’s approval,
    only to be met with cold pragmatism. Meanwhile, Catherine’s mind is elsewhere—distracted
    by Tommy Lee Royce’s impending release and the unresolved threat he poses. The
    scene underscores the clash between Clare’s desperate need for connection and
    Catherine’s professional paranoia, while hinting at the deeper fractures in their
    relationship. Clare’s idealism collides with Catherine’s cynicism, exposing how
    their differing worldviews strain their bond.'
