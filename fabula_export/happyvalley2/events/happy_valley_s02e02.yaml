  title: Mike confronts Catherine’s evasion
  description: "\n  In a tense hallway confrontation at Norland Road Police Station,\
    \ Mike Taylor intercepts Catherine Cawood as she prepares to leave for a minor\
    \ arrest, revealing his growing suspicion about her involvement in the house-to-house\
    \ searches. Catherine deflects with sarcasm and vague excuses—‘That would be unethical.\
    \ What with me being prime suspect. Etcetera’—avoiding direct answers and reinforcing\
    \ Mike’s unease. The exchange underscores the eroding trust between them, with\
    \ Catherine’s frustration over being sidelined from the investigation (and her\
    \ subsequent assignment to a trivial task) clashing with Mike’s professional caution.\
    \ Her frostiness toward Jodie and Andy, who identify her as the ‘prime suspect,’\
    \ further isolates her, while Mike’s abrupt departure signals his reluctance to\
    \ engage in deeper scrutiny. The scene highlights Catherine’s defensive posture,\
    \ her professional pride, and the mounting pressure of her suspect status, all\
    \ while hinting at her divided loyalties—both to the investigation and to her\
    \ personal vendetta against Tommy Lee Royce.\n  "
