      to set a romantic mood—casts long shadows over the struggle, illuminating the
      horror of the murder. The candles are atmospheric props, but their presence
      is *narratively loaded*: they suggest intimacy and trust, which are violently
      shattered. As John tightens the cable around Vicky’s neck, the candles continue
      to burn steadily, their light reflecting off the sweat on John’s face and the
      tears in Vicky’s eyes. The candles do not *cause* the event, but they frame
      it, turning a domestic setting into a stage for tragedy. Their steady flame
      contrasts with the chaos, making the violence feel even more surreal and inevitable.'
    status_before_event: Lit and placed strategically around the living room, casting
