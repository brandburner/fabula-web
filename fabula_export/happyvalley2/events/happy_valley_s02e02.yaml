    emotional_state: A toxic cocktail of desperation, resentment, and self-loathing—Clare
      is drowning in her craving, her emotions a whirlwind of blame (toward Catherine),
      shame (over her relapse), and grief (for Helen). Her tears are as much about
      her inability to resist as they are about the pain of being judged, even by
