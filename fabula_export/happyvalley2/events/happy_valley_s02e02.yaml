    banter. Shaf’s playful interrogation and the offering of a bacon butty frame the
    moment as both camaraderie and a test of her emotional state. Catherine’s visceral
    satisfaction in describing the takedown (‘Good. Given that one minute there’s
    this eighteen stone bloke coming at you with a baseball bat, and the next he’s
    flat on the floor quivering’) exposes her unfiltered aggression, which the team
    accepts with uneasy amusement. The exchange underscores their uneasy acceptance
    of her violent tendencies, while her visceral satisfaction hints at deeper unresolved
    aggression tied to her personal and professional struggles. The scene also serves
    as a microcosm of the team’s dynamic: Shaf’s gesture of solidarity (the bacon
    butty) contrasts with Sledge’s gossipy tone, revealing how Catherine’s actions
    are both celebrated and scrutinized within the unit. The flashback to the tasering
    itself—cut in swiftly—reinforces the brutality of the raid and Catherine’s instinctive,
    unapologetic response to threat, which foreshadows her potential for escalation
    in future confrontations (e.g., with Tommy Lee Royce).'
