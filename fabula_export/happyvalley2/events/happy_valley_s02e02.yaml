  title: Sean’s Suspicious Reappearance at the Wake
  description: "\n  At Helen’s wake, Sean Balmforth—a convicted ex-con with a history\
    \ tied to Nevison and Helen—reappears, injecting tension into the already fraught\
    \ gathering. His nervous demeanor and emotional apology to Nevison suggest lingering\
    \ guilt, but Catherine’s sharp instincts are immediately piqued. When Clare identifies\
    \ Sean as a former Mission beneficiary with a criminal past, Catherine connects\
    \ him to a suspicious van she encountered near a murder victim’s home, raising\
    \ her suspicions. The revelation forces Catherine to abruptly leave the wake,\
    \ prioritizing her investigation over Clare’s emotional needs, leaving Clare isolated\
    \ and frustrated. This moment deepens the investigation’s stakes while exposing\
    \ the friction between Catherine’s professional duties and her family obligations.\n\
    \  "
