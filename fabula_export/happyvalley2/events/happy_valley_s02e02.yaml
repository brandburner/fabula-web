  key_dialogue:
  - |-
    FRANCES: What does your granny look like?
    RYAN: She’s a policeman. Woman.
    FRANCES: Is she?
    RYAN: She chases scrotes and druggies and nutters.
  - |-
    FRANCES: What about your other granny?
    RYAN: I haven’t got another one.
    FRANCES: Your dad’s mum.
    RYAN: We don’t talk about me dad. And anyway... How do you know that my granny isn’t me dad’s mum? I didn’t tell you that.
  - |-
    FRANCES: I’m dressed up because I’m going to a funeral this afternoon.
    RYAN: So is my Granny! And my Auntie Clare.
    FRANCES: ((worried)) Is she? Are they?
