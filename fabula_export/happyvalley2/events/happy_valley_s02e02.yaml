      as a place where 25 women were locked in, forced into endless shifts on production
      lines for pennies. The factory’s machinery, dim halls, and stale flour dust
      create an oppressive atmosphere, symbolizing the hidden brutality of the trafficking
      operation. Ilinka’s escape—scaling the wall during a cigarette break—is framed
      as a desperate act of defiance against this environment of confinement and exploitation.
      The factory’s role in the event is dual: it is both the prison from which Ilinka
      flees and the backdrop for the systemic control exerted by the Knezevics.'
    observed_atmosphere: Oppressive and claustrophobic—Catherine’s description of
      the factory evokes a sense of inescapable confinement, with dim lighting, the
      drone of machinery, and the ever-present dust of forced labor. The atmosphere
      is one of despair and exhaustion, reinforcing the dehumanizing conditions under
      which Ilinka and other women toil.
