- fabula_uuid: act_331290ce2da89d64
  number: 2
  summary: John, burdened by Vicky's blackmail, struggles through a tense morning
    with his family, who sense his underlying stress. Vicky, meanwhile, plans her
    next move, dismissing news of the serial killer. At the police station, Catherine
    faces scrutiny as a "prime suspect" in the murders, leading her to take on menial
    tasks like arresting a student for drug dealing. During this, she receives the
    official news of Tommy Lee Royce's funeral release, which profoundly affects her.
    John, paired with Ann Gallagher for house-to-house inquiries, expresses his desperate
    need for a thousand pounds, revealing the depth of his financial and emotional
    strain. Ann, also grieving her mother, offers a casual suggestion to ask his rich
    father, inadvertently giving John an idea. Later, John calls his mother under
    false pretenses to secure the money. At the police station, officers gossip about
    Catherine being a murder suspect, which she deflects before privately informing
    Ann about Tommy's funeral, acknowledging the shared trauma. Ann, though stoic,
    is visibly affected by the news that Tommy's funeral will be at the same crematorium
    as her mother's. Nevison, Helen's widower, confides in Ann about firing an employee,
    Sean Balmforth, who later appears at Helen's wake. Catherine, observing Balmforth,
    recognizes his van from a suspicious encounter near a murder victim's home, raising
    her suspicions. Driven by a complex mix of anger and unresolved trauma, Catherine
    abruptly leaves the wake to attend Tommy Lee Royce's mother's funeral. She deliberately
    positions herself to be seen by Tommy, provoking a furious outburst from him.
    This calculated act of defiance leads to a sharp reprimand from Mike Taylor, who
    reminds Catherine of her unresolved alibi for the murders, highlighting her precarious
    professional standing.
