- fabula_uuid: act_1eb5f551bbfb7d1f
  number: 3
  summary: John, having lied to Amanda about being called away for police observations,
    arrives at Vicky's flat with flowers and his overnight bag, signaling his intention
    to leave his wife. Despite the romantic setting Vicky creates, John expresses
    his discomfort and distrust, demanding the return of the incriminating phone.
    Vicky, after some prodding, hands over a phone, but John remains suspicious, questioning
    if she has backups or sent the photos to anyone else. Their conversation quickly
    devolves into a heated argument, with John accusing Vicky of being unhinged and
    dangerous for drugging him. The tension escalates as John attempts to take Vicky's
    computer, believing it holds more copies of the photos. Vicky resists, striking
    him, and John retaliates violently, slapping her repeatedly. The fight culminates
    with John strangling Vicky to death with an electric cable, a shocking and definitive
    act that plunges him into terror and disbelief. Simultaneously, back at Nevison's
    house, Catherine finds Clare and Ann drunk in the garden. Catherine confronts
    Clare about her relapse, which Clare initially dismisses with belligerence and
    defiance. Despite Catherine's pleas, threats, and warnings about the dangers of
    the streets, Clare, fueled by alcohol and resentment, leaves the house to go to
    the pub. The episode concludes with Catherine, after a moment of desperate resignation,
    pursuing Clare into the night, the family's fragile stability shattering amidst
    the ongoing crises.
