      witness to the scene’s dualities: the mundane (tea for a guest) and the monumental
      (Ilinka’s trauma). Catherine’s question (*‘Is there any tea?’*) is a lifeline—practical,
      comforting, and a distraction from the heavier truths being unveiled. The kettle’s
      readiness (*‘Clare: I’ve just boiled t’kettle’*) contrasts with the family’s
      emotional state: while the water is hot and ready, their relationships are lukewarm
      and unresolved. Ilinka’s mumbled *‘Jako ste ljubazni’* in response to the offered
      tea is a poignant moment—the first time she feels seen, even if the gesture
      is small. The kettle’s steam, unseen but implied, mirrors the unspoken tensions
      in the room.'
    status_before_event: Boiling on the stove, steam rising, water ready for tea.
    status_after_event: Still on the stove, now cooling slightly, unused tea bags
      or cups nearby (implied by the shift to Winnie’s arrival).
