  global_id: null
  title: Catherine confronts Clare’s relapse
  description: At Helen’s wake, Catherine discovers Clare and Ann drunk in the garden,
    their laughter a fragile mask over grief. Clare’s defensiveness and Catherine’s
    protective fury collide when Catherine realizes Clare has relapsed into alcoholism.
    The confrontation escalates as Catherine demands Clare surrender her drink, exposing
    Clare’s self-destructive spiral and Ann’s guilt over missing the signs. Clare’s
    mocking surrender of the can—‘like she can take it or leave it’—reveals her deep-seated
    resistance to help, while Ann’s horrified apology underscores the family’s fractured
    trust. The moment forces Catherine to balance her role as a police officer (threatening
    legal consequences) with her role as a sister (pleading for Clare’s sobriety),
    marking a turning point in Clare’s unraveling and Catherine’s struggle to protect
    her family amid professional crises. The scene’s tension lies in Clare’s refusal
    to acknowledge her addiction and Catherine’s desperate attempt to intervene before
    Clare’s behavior escalates further, threatening to derail both the family and
    Catherine’s focus on the ongoing investigation.
