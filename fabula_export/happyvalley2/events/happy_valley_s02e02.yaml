  - 'VICKY: I did that. Because I love you.'
  - 'JOHN: You drugged me! You drugged me and you took those ridiculous pictures of
    me! You ff... mad bitch! How the hell could you start to imagine I’d want to come
    and live with you now?'
  - 'VICKY: In the end you’ll thank me.'
