  title: Ann deflects grief with dark humor
  description: Ann and John conduct a house-to-house investigation on Bateman Street,
    where Ann is visibly unsettled by the boarded-up house where she was once held
    captive. Their awkward, tension-filled exchange reveals Ann’s emotional detachment—she
    deflects John’s sincere condolences about her mother’s funeral with dark humor,
    suggesting he buy a lottery ticket instead of addressing her grief. John’s financial
    desperation surfaces when he asks Ann how she’d acquire £1,000, exposing the class
    divide between them. Ann’s stoic facade cracks only briefly when she admits she’d
    go mad at home, underscoring her avoidance of vulnerability. The moment deepens
    their professional dynamic, revealing Ann’s unresolved trauma and John’s growing
    awareness of her pain beneath her sharp wit.
