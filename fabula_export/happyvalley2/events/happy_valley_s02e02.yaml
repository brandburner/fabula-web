      paranoia. When John accuses Vicky of buying it online and using it to drug him,
      the drug becomes a metaphor for the *uncontrollable forces* at play in his life.
      It symbolizes the modern dangers of digital anonymity, the ease with which secrets
      can be weaponized, and the way John’s professional knowledge (as a police officer)
      makes him hyper-aware of these risks. The drug is the *absent inciter*: it doesn’t
      appear in the scene, but its mention fuels John’s rage, reinforcing his belief
      that Vicky is not just blackmailing him but *actively trying to destroy him*.
      Its absence makes it more sinister, a reminder of the unseen threats that have
      brought John to this breaking point.'
