    her mid-investigation with an urgent, unspoken plea—his single word, *‘Mum,’*
    loaded with the weight of Clare’s relapse. The abruptness of his tone and Catherine’s
    immediate, instinctive reaction (grabbing her coat and fleeing out the back door)
    signal a crisis: Clare’s vulnerability has reached a breaking point, demanding
    Catherine’s attention despite the looming threat of Tommy Lee Royce and the unresolved
    trafficking case. The moment is a fracture in Catherine’s professional focus,
    forcing her to confront the cost of her divided loyalties—her family’s unraveling
    and her duty to the victims she’s sworn to protect. The cut to black underscores
    the urgency, leaving the stakes unresolved but undeniable: Clare’s relapse is
    a ticking clock, and Catherine’s hesitation could mean the difference between
    saving her sister or losing her forever.'
