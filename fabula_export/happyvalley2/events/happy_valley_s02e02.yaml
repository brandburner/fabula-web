  title: Ryan resists help, Winnie’s urgent summons
  description: The kitchen scene opens with Clare preparing supper while Ryan, visibly
    frustrated, rejects his new Scottish teaching assistant’s attempts to help with
    his reading. His defiance—‘I don’t need any help’—reveals deeper resistance, possibly
    tied to his grandfather’s recent absence or his own insecurities about school.
    Clare’s gentle but firm pushback (‘You need all the help you can get’) underscores
    the family’s tension around Ryan’s struggles, while his mimed self-hanging gesture
    hints at his emotional overload. Catherine’s arrival interrupts the exchange,
    but the conflict lingers in Ryan’s dismissive remark about the assistant’s ‘funny’
    accent, exposing his discomfort with change. The scene pivots abruptly when Clare
    delivers Winnie’s cryptic summons—‘Winnie wants you. Before you start pouring
    yourself any tea’—which disrupts Catherine’s routine and signals an impending
    crisis. The urgency in Clare’s tone and the lack of context suggest Winnie’s message
    is tied to the investigation, forcing Catherine to confront the collision of her
    professional and personal worlds in real time. The beat’s emotional core lies
    in the contrast between Ryan’s childish defiance and the looming adult threat,
    reinforcing the family’s fractured state and Catherine’s divided loyalties.
