    description_of_involvement: The Christian Mission is mentioned by Catherine as
      a temporary housing option for five of the trafficked women, including Ilinka’s
      peers, while they await repatriation flights. Its role in the event is to highlight
      the role of faith-based organizations in filling gaps left by government and
      police efforts. The Mission’s presence in the conversation is a reminder of
      the patchwork of support available to survivors, as well as the reliance on
      volunteers and goodwill to keep the system running. Catherine’s mention of it—‘five
      of ‘em are at The Mission waiting for the council to sort out the flights back
      home’—underscores the bureaucratic hurdles survivors face, as well as the Mission’s
      role as a last resort. The Mission’s influence here is to emphasize the precarity
      of Ilinka’s situation and the broader reliance on community and faith-based
      organizations to address systemic failures.
