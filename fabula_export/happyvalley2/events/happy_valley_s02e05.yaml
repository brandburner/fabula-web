      hopeful and the devastating. Its fluorescent lighting casts a sterile, almost
      clinical glow, stripping away warmth and amplifying the rawness of the characters’
      emotions. The tight quarters force Catherine and John into close proximity,
      making their exchange feel intimate despite its professional context. The hum
      of the station’s morning bustle (footsteps, distant voices) creates a white
      noise that underscores the isolation of their moment. The corridor is neither
      a private sanctuary nor a formal setting; it’s a space of transit, where unguarded
      reactions slip through. Here, the institutional mask of the police station cracks,
      revealing the human cost of the investigation.
