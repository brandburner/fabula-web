  title: Frances’s House as a Beacon of False Safety
  description: 'The exterior of Frances’s house glows warmly against the encroaching
    night, its golden light creating a stark visual contrast with the surrounding
    darkness. This moment serves as a potent metaphor for Catherine’s precarious emotional
    state—her home and family appear secure, but unseen threats (both external, like
    Tommy Lee Royce’s influence, and internal, like her unresolved trauma) lurk just
    beyond the light. The scene underscores the fragility of her equilibrium, where
    the comfort of her surroundings is undercut by the looming danger of Frances’s
    manipulation and the resurfacing of her past. The tension hinges on the unspoken
    question: *How long can the light hold back the dark?* This visual setup foreshadows
    the impending disruption of Catherine’s fragile peace, as Frances’s actions (later
    revealed to include constructing a petrol bomb and manipulating Ryan) will soon
    shatter the illusion of safety. The house’s glow becomes a symbol of Catherine’s
    denial, while the night represents the inescapable forces of her past and the
    violence she cannot yet see coming.'
