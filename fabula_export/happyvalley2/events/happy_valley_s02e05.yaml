      signaling the shift from preparation to execution. The backyard is a liminal
      space, neither fully domestic nor public, where Frances's resolve hardens as
      she prepares to act.
    observed_atmosphere: Cool and enclosed, with a sense of impending action. The
      backyard is a private space where Frances can move unobserved, its fences creating
      a barrier between her and the outside world. The night air would feel crisp,
      heightening the contrast with the kitchen's stifling tension.
    functional_role: Transition zone between preparation and action, where Frances
      moves from the private assembly of her weapon to the public (or semi-public)
      space where she will use it. The backyard's enclosure allows her to act without
      immediate witnesses, bridging the gap between her isolated planning and the
      broader conflict in Hebden Bridge.
    symbolic_significance: Represents the threshold between Frances's internal world
      of obsession and the external world she seeks to disrupt. The backyard is a
      space of liminality, where her private vendetta begins to spill into the public
      sphere, foreshadowing the escalation of violence in Hebden Bridge.
    access_restrictions: Restricted to Frances; the backyard is her private space,
      accessible only to her and those she invites (or those who intrude). The fences
      ensure her actions go unobserved.
    key_environmental_details:
    - Enclosed by fences, creating a sense of privacy and isolation.
