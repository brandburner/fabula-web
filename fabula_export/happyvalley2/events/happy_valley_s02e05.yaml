- fabula_uuid: cand_evt_scene_657dd659cc089df7_01
  global_id: null
  title: John forces Amanda’s affair confession
  description: 'John ambushes Amanda in their kitchen, backed by their son Jack, and
    publicly exposes her infidelity in front of their children, Ben and Amber. He
    weaponizes his knowledge of her affair with Graham, a man from Mirfield, to deliver
    an ultimatum: she must leave the house immediately while he stays with the children.
    Amanda resists, but John escalates the confrontation by threatening to confront
    Graham and his wife, revealing his intent to destroy her relationship and expose
    her lies. The children witness the volatile exchange, caught between their parents’
    crumbling marriage and John’s calculated cruelty. The scene culminates in John
    storming out to drive to Mirfield, leaving Amanda panicked and the children distressed,
    while Jack defensively justifies his father’s presence. The confrontation forces
    Amanda into a corner, where her affair is no longer a secret but a weapon used
    against her, deepening the family’s fracture and setting up John’s next destructive
    move against Graham.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e05
  scene_sequence: 18
  sequence_in_scene: 24
  key_dialogue:
  - 'JOHN: So! Hello. Good morning. How are we all? Good. So I’ve got a little proposal
    I’d like to put to you. Contrary to what you think, I’m not the one that’s been
    having some sort of sordid little fling with some sad sod from Mirfield who drives
    a Skoda, no, that’ll be you. So. What I’m proposing is, you move out, you gather
    your bits and pieces, you move in with lover-boy, you feel free to do whatever
    you have to do. I - me - the one who hasn’t been mucking about - will stay here
    in our house with our children. How about that?'
  - 'AMANDA: I’m not leaving the children. JOHN: Yeah. Well. Newsflash. Neither am
