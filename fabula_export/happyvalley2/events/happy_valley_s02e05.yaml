- fabula_uuid: act_85f1dd47beacc84e
  number: 3
  summary: The final act swiftly moves towards a shocking climax, bringing the serial
    killer storyline to a definitive, albeit tragic, conclusion, while leaving Catherine's
    personal battle unresolved. The morning after Daryl's confession, Catherine, Daniel,
    and Clare discuss Ryan's unsettling questions about his parents. Daniel reiterates
    his theory that Ryan is being influenced at school. Catherine then shows Clare
    the indistinct CCTV footage from the toy shop, and Clare, with her glasses, definitively
    identifies the woman buying the Scalextric as Miss Wealand, the new teacher at
    Ryan's school. This revelation confirms Frances's direct and manipulative involvement
    in Ryan's life, escalating the personal threat to Catherine's family. Simultaneously,
    at Far Sunderland Farm, Alison attempts to cope with the horrifying truth of her
    son's actions. Over a breakfast she prepares for Daryl, she presents him with
    a desperate "plan" to escape to America, painting a vivid picture of adventure
    in Las Vegas, Florida, and California. Daryl, seemingly oblivious to the true
    nature of her intentions, embraces the fantasy, discussing hiring a car and visiting
    Disneyland. As Alison describes cycling across the Golden Gate Bridge, she quietly
    retrieves an old shotgun from the next room. Returning behind Daryl, she points
    the gun at the back of his head, maintaining a calm facade while continuing to
    discuss their fantastical trip. The tension builds to an unbearable peak as Daryl,
    still dreaming of Disneyland, remains unaware of his impending doom. The act culminates
    in a sudden, brutal gunshot, signaling Alison's ultimate, desperate act to protect
    her son from prison and perhaps from himself, and to protect others from him.
    This shocking climax resolves the immediate threat of the serial killer but leaves
    a profound emotional impact and sets the stage for the aftermath, while Catherine's
    confrontation with Frances remains a looming threat for the future.
