      of the event. She moves with quiet purpose, her hands steady as she picks up
      the old shotgun, her breath controlled. The act of retrieving the weapon is
      methodical, devoid of hesitation, as if she has rehearsed it in her mind a hundred
      times. The shotgun becomes an extension of her resolve, a tool to sever the
      last thread of their fractured bond. Her silence in this moment is louder than
      any word she has spoken.
