  participations:
  - character_uuid: ger_agent_90dc6f12c776
    emotional_state: A conflicted resolve—surface-level calm masking deep anxiety
      and moral ambiguity. Her hesitation suggests internal struggle, but her actions
      reveal a hardened commitment to her destructive path, fueled by resentment and
      obsession.
    goals:
    - To complete the assembly of the petrol bomb as a symbolic and practical weapon
      against Catherine and her world.
    - To assert her agency and power through an act of sabotage, aligning herself
      with Tommy Lee Royce's influence.
    what_happened: Frances stands alone in her kitchen, her movements deliberate and
      ritualistic as she assembles a petrol bomb. She pours petrol through a funnel
      into a milk bottle, folds a cloth into a stopper, and soaks it in fuel, her
      actions betraying a mix of precision and hesitation. The close-up on her eyes
      reveals a fleeting moment of doubt before she grabs matches and exits into the
      backyard, signaling her readiness to act. Her physical presence is tense yet
      controlled, her silence amplifying the gravity of her actions.
    observed_status: Frances stands alone in her kitchen, her movements deliberate
      and ritualistic as she assembles a petrol bomb. She pours petrol through a funnel
      into a milk bottle, folds a cloth into a stopper, and soaks it in fuel, her
