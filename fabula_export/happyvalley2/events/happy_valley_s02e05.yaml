    about Clare’s sobriety and Neil’s erratic behavior, which he links to the recent
    murder of another woman. His unease escalates when he reveals Ryan has been asking
    unsettling, probing questions about his mother Becky’s relationship with Tommy
    Lee Royce—specifically after school hours. Daniel suspects someone at school is
    planting these ideas in Ryan’s head, hinting at external manipulation. Catherine
    initially dismisses the connection to Neil but is visibly troubled by the implications
    of Ryan’s questions, which suggest a deeper, sinister influence targeting her
    family. The exchange underscores the fragility of Catherine’s stability and foreshadows
    the resurfacing of Tommy Lee Royce’s shadow over Ryan’s life. The scene serves
    as a turning point, shifting focus from Clare’s personal struggles to the broader
    threat of manipulation and the unresolved trauma tied to Becky’s past.
