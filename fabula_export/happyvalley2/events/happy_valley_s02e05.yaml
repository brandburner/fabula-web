    description_of_involvement: The passports, like the money, are a deceptive prop
      in Alison’s performance, used to sell the illusion of their escape. She describes
      them as ready and waiting, detailing the trips they will take—Las Vegas, Disneyland,
      San Francisco—as if they were real. Daryl, eager and trusting, buys into the
      fantasy, his excitement a stark contrast to the shotgun Alison soon retrieves.
      The passports are never shown; they exist only in her words, a cruel tease that
      deepens the betrayal. Their role is to reinforce the lie, to make the escape
      feel imminent and real, lulling Daryl into a false sense of security before
      the violence.
    status_before_event: Nonexistent; purely a verbal construct in Alison’s deception,
      part of the elaborate lie she weaves to keep Daryl compliant.
    status_after_event: Revealed as a fabrication, their absence underscoring the
      hollow nature of Alison’s promises. The passports’ nonexistence is a bitter
      irony, as Daryl’s hopes are shattered by the shotgun’s cold reality.
