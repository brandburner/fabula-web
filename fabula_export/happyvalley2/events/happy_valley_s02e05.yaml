  global_id: null
  title: Alison executes Daryl to end his crimes
  description: 'In a moment of brutal maternal desperation, Alison—confronted with
    the irreversible horror of her son Daryl’s serial killings—makes a final, irreversible
    choice. After Daryl tearfully confesses his crimes and begs for her help, Alison
    feigns a plan to escape the farm together, only to retrieve a shotgun and shoot
    him dead. The act is framed as a mercy killing, sparing him from public exposure,
    legal punishment, or the dark forces manipulating him. The gunshot echoes as a
    final, devastating punctuation to their fractured relationship, underscoring the
    moral decay of their world, where violence becomes the only language left to protect
    the innocent from the guilty. The event serves as a tragic climax to Alison’s
    arc, revealing the depths of her love and the lengths she will go to preserve
    what little remains of her son’s humanity—even if it means destroying him herself.
    The shot also functions as a narrative turning point, forcing the police investigation
    to confront a new layer of complexity: a killer who was already dead when the
    latest victim was found, suggesting deeper, unseen forces at play.'
