  title: Tommy’s vengeful prison obsession
  description: In the suffocating isolation of his prison cell, Tommy Lee Royce lies
    motionless on his bunk, his mind consumed by a toxic cocktail of rage and paranoia.
    The television flickers in the background, ignored—its noise a mere distraction
    from the destructive thoughts spiraling through his head. His fixation on Catherine
    is visceral, a relentless loop of imagined retribution that fuels his obsession.
    The scene underscores his powerlessness, trapped behind bars yet still manipulating
    events from afar through Frances. His internal monologue reveals a man teetering
    on the edge of unraveling, where vengeance and control are the only things keeping
    him from collapsing entirely. This moment is a critical snapshot of Tommy’s psychological
    state, illustrating how his imprisonment has not dampened his malice but instead
    sharpened it into a weapon wielded through proxies. The tension here is palpable,
    a quiet storm of resentment that foreshadows the chaos he will unleash once his
    influence over Ryan and Frances fully takes hold.
