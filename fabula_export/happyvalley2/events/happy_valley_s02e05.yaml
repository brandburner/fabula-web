- fabula_uuid: cand_evt_scene_8a53a80180d35cde_01
  global_id: null
  title: Team Receives Victim Linkage Revelation
  description: "\n  In a tense H-MIT briefing, Andy reveals the latest victim, Elise\
    \ May Hughes, is confirmed as the fourth murder victim—killed *after* Sean Balmforth’s\
    \ arrest, definitively proving he was not the serial killer. The team reacts with\
    \ shock, particularly John, whose emotional turmoil over the case’s collapse is\
    \ palpable. Andy introduces Superintendent Gillespie’s review team, signaling\
    \ external scrutiny of their botched investigation. A potential lead—a hit-and-run\
    \ near the body dump site—offers a fragile thread of progress, but the revelation\
    \ of a coordinated killer forces the team to confront their failure and the possibility\
    \ of a more sinister, fragmented pattern. The scene underscores the psychological\
    \ toll on the detectives, especially John, whose personal stakes in the case are\
    \ now laid bare as the investigation spirals into uncharted territory.\n  "
  episode_uuid: ep_sea_ser_happy_valley_s02_e05
  scene_sequence: 35
  sequence_in_scene: 50
  key_dialogue:
  - 'ANDY: When you’re ready! Thank you. Most of you will know Superintendent Gillespie.
    He’s heading up the review team. Before we go through everything with Mr. Gillespie
    there’s a few bits and pieces from this afternoon. We’ve got an ident on the victim.
    She is Elise May Hughes. Twenty years of age. Address 27 Conway Drive, Dewsbury.
    Last seen three days ago. After we arrested Sean Balmforth.'
  - 'ANDY: The pathologist is telling me she’s confident it’s the same killer as—certainly
    the first three victims.'
  - 'ANDY: The good news! For once. Is we might have a bit of a lead. The night Elise
    May Hughes’s body was left at the site in Rastrick. Two hundred yards away, just
    further down the road that same night. A parked vehicle was hit by another vehicle.
    Hit and run. I’ve got forensics onto it, it won’t be long before we can identify
    the make and the model from fragments left on the vehicle that was hit. I want
    to know who was driving that vehicle.'
