- fabula_uuid: cand_evt_scene_6d7768a991a32ed7_02
  global_id: null
  title: Sean’s Fractured Memory Under Fire
  description: "\n  In a high-stakes interrogation, Jodie methodically dismantles\
    \ Sean’s defenses by probing his fragmented memories of Lynn Dewhurst, a victim\
    \ whose number he inexplicably retains. Sean’s evasive, self-contradictory explanations—ranging\
    \ from vague furniture-moving favors to his inability to recall street names—paint\
    \ him as either a liar or a man so deep in denial he can’t distinguish truth from\
    \ blackout. The tension peaks when he admits his alcohol-fueled memory gaps might\
    \ conceal violence, a moment that electrifies the detectives (Andy and John, observing\
    \ off-screen) as potential evidence of guilt. Jodie’s calculated silence after\
    \ his confession forces Sean to confront the unthinkable: his possible role in\
    \ Leonie Farrell’s attack. His whispered 'No'—a denial that rings hollow even\
    \ to him—becomes the pivotal piece of 'evidence' the team needs to justify charging\
    \ him, despite the mounting inconsistencies. The scene’s tension lies in its ambiguity:\
    \ is Sean a killer who can’t remember, or a desperate man being railroaded by\
    \ a system that needs a scapegoat? His solicitor’s absence from the dialogue underscores\
    \ his isolation, while the detectives’ off-screen reactions (glimpsed in brief\
    \ cuts) reveal their eagerness to close the case, regardless of the truth.\n  "
