  title: Alison’s lethal deception of Daryl
  description: Alison lures Daryl into a false sense of security by proposing an elaborate
    escape plan to America, painting a vivid picture of their shared fantasy—Las Vegas,
    Disneyland, and the Golden Gate Bridge—while he remains oblivious to her true
    intentions. As she details their itinerary, she slips into the next room, retrieves
    a shotgun, and returns to point it at the back of his head, maintaining a calm,
    maternal facade throughout. The abrupt shift from warmth to lethal threat underscores
    the irreversible collapse of their trust, exposing Alison’s calculated ruthlessness
    and the depth of her desperation to protect herself from the consequences of Daryl’s
    crimes. The moment serves as both a turning point in their relationship and a
    foreshadowing of the violent escalation to come, where maternal love curdles into
    lethal pragmatism.
