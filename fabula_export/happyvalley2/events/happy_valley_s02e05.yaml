  title: Catherine deflects Daniel’s probing about Ann
  description: The scene opens with Catherine and Clare discussing the Knezevics threat
    and the unsettling Scalextric gift, revealing Catherine’s lingering paranoia and
    Clare’s pragmatic dismissal of her fears. When Daniel arrives, his playful teasing
    about Catherine’s late night and her impulsive purchase of the Scalextric set—something
    Ryan never asked for—exposes her emotional fragility. Her abrupt deflection of
    his question about Ann Gallagher’s presence upstairs, delivered with sarcastic
    dismissal, underscores her unresolved tension with Ann and hints at the looming
    confrontation between them. The exchange reveals Catherine’s preoccupation with
    Ann’s danger while simultaneously masking her own vulnerability, deepening the
    scene’s undercurrent of unease and foreshadowing their inevitable clash. The moment
    also highlights Daniel’s role as an unwitting catalyst, his lighthearted probing
    inadvertently exposing the fractures in Catherine’s carefully constructed composure.
