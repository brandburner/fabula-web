  title: Clare Identifies Miss Wealand in CCTV
  description: In Catherine’s kitchen, the family gathers for breakfast, where Daniel
    casually mentions the mysterious woman from Catherine’s phone footage—Miss Wealand,
    Ryan’s new teacher. Catherine, already suspicious of the teacher’s probing questions
    about Ryan’s father, shows Clare the indistinct CCTV footage. After a tense pause,
    Clare confirms the woman in the footage is indeed Miss Wealand, despite the poor
    quality. The revelation sends a chill through the room, as it implicates the teacher
    in the conspiracy surrounding Ryan’s father, Tommy Lee Royce. The moment forces
    Catherine to confront the terrifying possibility that the threat to her family
    is far closer than she realized, and that Frances (Miss Wealand) has been manipulating
    Ryan from within his school environment. The scene shifts abruptly to an exterior
    shot of Far Sunderland Farm, where the front door stands ominously ajar, hinting
    at the escalating danger and the need for immediate action.
