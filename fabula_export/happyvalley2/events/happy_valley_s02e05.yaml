- fabula_uuid: cand_evt_scene_761335bf1c1e095c_01
  global_id: null
  title: Andy and Jodie confront their fatal error
  description: "\n  In the CID car, Andy and Jodie process the devastating revelation\
    \ that their prime suspect, Sean Balmforth, could not have committed the latest\
    \ murder—Elise May Hughes—since she died while he was in custody. The news forces\
    \ a brutal reckoning: their investigation has failed, and worse, they may have\
    \ wrongfully charged an innocent man. Jodie’s admission that she would have avoided\
    \ charging Sean over Vicky Fleming’s murder exposes their differing instincts\
    \ and the team’s collective guilt. The moment is heavy with professional shame\
    \ and personal tension, as Andy acknowledges the impending disciplinary fallout\
    \ (including a dressing-down from Jodie’s father, Superintendent Gillespie) and\
    \ the need for a review team to salvage the case. Their grim humor barely masks\
    \ the weight of their failure, signaling a turning point where the investigation\
    \ must now correct course before the real killer strikes again. The scene underscores\
    \ the stakes of their oversight: not just a miscarriage of justice, but the risk\
    \ of further victims if they don’t act swiftly.\n  "
  episode_uuid: ep_sea_ser_happy_valley_s02_e05
  scene_sequence: 30
  sequence_in_scene: 42
  key_dialogue:
  - 'ANDY: Bollocks.'
  - 'JODIE: Really?'
  - 'ANDY: Shit.'
  - 'ANDY: She thinks she’s not been dead more than forty-eight hours. She’ll be more
    specific at the post-mortem, but it’s looking like she died after we had Sean
    in custody.'
  - 'JODIE: Oh fuck.'
  - 'ANDY: I know.'
  - 'JODIE: Could it be a copycat?'
  - 'ANDY: Well, again, we’ll know more after the P.M., but...'
  - 'ANDY: So! We’ll be getting the review team in. And to restore public confidence
    in the investigation, I’ll be getting my arse kicked down the stairs. In the traditional
    manner. No doubt. By your dad.'
  - 'JODIE: I can only apologise.'
  - 'JODIE: Who is she?'
  - 'ANDY: White. Between twenty and thirty. Poor teeth, poor clothes.'
  - 'JODIE: The only thing. I’da done differently from you on Saturday... sorry, do
    you want to hear this?'
  - 'ANDY: You wouldn’t have charged him with Vicky Fleming.'
