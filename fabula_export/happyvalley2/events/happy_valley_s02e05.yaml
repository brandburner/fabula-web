  title: Frances ignites a hidden fire ritual
  description: Frances steals a moment of unobserved solitude in her back yard, her
    movements deliberate yet furtive. She scans the surrounding houses—only a few
    windows glow with light—before crouching near the garbage to retrieve a discarded
    bottle top. With practiced precision, she fills the tiny lid with petrol, then
    strikes a match and tosses it into the liquid. The sudden flare of flame captivates
    her, her expression locked in rapt fascination as the fire burns. This private,
    ritualistic act reveals her repressed obsession with fire, a fixation that hints
    at deeper psychological instability. The scene foreshadows her potential role
    in the unfolding violence, suggesting her connection to the murders Catherine
    is investigating. The moment is charged with tension, as her hidden compulsion
    contrasts sharply with the quiet suburban night, underscoring the darkness lurking
    beneath Hebden Bridge’s surface calm.
