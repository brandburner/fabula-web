  title: Andy confronts the forensic mistake
  description: 'Andy and the Pathologist exit the crime scene’s inner cordon, their
    grim expressions betraying the weight of their findings. Andy’s body language—slumped
    shoulders, slow movements—signals his dawning realization that Sean Balmforth,
    the man they charged, cannot be the killer. The Pathologist’s silent departure
    underscores the professional and personal stakes: a high-profile case is unraveling,
    and Andy’s judgment is now in question. When he joins Jodie in the CID car, the
    symbolic removal of his SOCO suit marks a transition from forensic certainty to
    the messy reality of a flawed investigation. The moment is heavy with unspoken
    tension, as the team braces for the fallout of their error and the need to reopen
    the case. This scene bridges forensic closure with the looming specter of doubt,
    setting the stage for Andy’s collaboration with Jodie to address the systemic
    and personal consequences of their mistake.'
