  title: Catherine’s Scalextric Lead Dismissed as Irrelevant
  description: "\n  In Mike’s office at Norland Road Police Station, Catherine attempts\
    \ to leverage her investigative instincts by presenting CCTV footage of Frances\
    \ purchasing a Scalextric toy—the same model left at her doorstep. Mike, distracted\
    \ and dismissive, immediately misgenders Frances as a boy, undermining Catherine’s\
    \ lead before it can be properly assessed. The exchange reveals Mike’s blind spot\
    \ toward Catherine’s methods and his institutional skepticism, while the Scalextric’s\
    \ symbolic weight (a childhood relic tied to Ryan’s manipulation by Tommy Lee\
    \ Royce) goes unrecognized. The tension escalates when Mike reveals a new body\
    \ has been found in Rastrick, suggesting Sean Balmforth’s arrest may have been\
    \ premature. This moment underscores the friction between Catherine’s instinct-driven\
    \ pursuit of truth and Mike’s bureaucratic caution, while the Scalextric’s significance\
    \ as a potential clue is buried under gender bias and procedural inertia.\n  "
