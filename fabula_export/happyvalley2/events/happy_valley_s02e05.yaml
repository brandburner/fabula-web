  number: 2
  summary: 'This act immediately unravels the false resolution of the previous act,
    plunging the characters into renewed uncertainty and escalating personal stakes.
    Catherine arrives at Norland Road Police Station, where she attempts to get information
    from Mike about Tommy Lee Royce''s visitors, only to be rebuffed. She shows him
    CCTV footage of Frances buying a Scalextric, but Mike dismisses its significance.
    Crucially, Mike then drops a bombshell: another body has been found in Rastrick,
    and the victim died *after* Sean Balmforth was already in custody. This revelation
    sends shockwaves through the police department, particularly impacting John Wadsworth,
    whose brief relief over Sean''s charging turns to dread. Andy Shepherd and Jodie
    investigate the new crime scene, quickly confirming that the latest murder could
    not have been committed by Sean, forcing them to confront the grim reality that
    they may have charged the wrong person. Meanwhile, Frances, now aware of Ryan’s
    longing for his father, subtly manipulates him at school, encouraging him to write
    a letter to Tommy Lee Royce and providing him with the prison address. This insidious
    manipulation deepens Tommy''s influence over Ryan, bypassing Catherine''s protective
    barriers. Catherine''s professional duties lead her to a call at The Moorings,
    where she discovers Neil, Clare’s new partner, in a severely drunken and disorderly
    state. She arrests him, a moment of profound humiliation for Neil, but later warns
    him against dragging Clare down. Back at Catherine''s house, Daniel expresses
    his concern about Clare and Neil''s relationship, and, more significantly, raises
    a troubling observation: Ryan’s questions about his parents consistently arise
    after school, suggesting external influence. This prompts Catherine to consider
    that someone at school might be feeding Ryan information. The act culminates in
    a tense confrontation at Far Sunderland Farm, where Alison, having heard news
    reports about a red car linked to the new murder, presses Daryl about his damaged
    vehicle. Daryl, distressed and tearful in the middle of the night, confesses to
    Alison that he has "done things" and "hurt someone," implicitly confirming he
    is the serial killer. Alison''s dawning horror and realization of her son''s monstrous
    actions set the stage for a desperate and tragic choice.'
