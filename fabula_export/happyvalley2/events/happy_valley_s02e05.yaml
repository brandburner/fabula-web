  title: Alison and Daryl confront prison inevitability
  description: "\n  In the dead of night, Alison and Daryl sit in stunned silence\
    \ at the farmhouse kitchen table, both visibly shaken. Alison probes Daryl’s involvement\
    \ in the murders with a mix of desperation and denial, her questions revealing\
    \ her struggle to reconcile her son’s crimes with the reality of his impending\
    \ imprisonment. Daryl, emotionally broken, confirms his guilt through evasion\
    \ and tears, while Alison grapples with the practical and moral consequences—losing\
    \ the farm, facing isolation, and the horror of Daryl’s vulnerability in prison.\
