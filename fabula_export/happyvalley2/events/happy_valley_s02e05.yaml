  global_id: null
  title: Catherine Offers Ann Protection
  description: After a night of emotional unraveling, Catherine drives Ann home in
    a rare moment of quiet intimacy. The tension between them lingers—Ann’s drunken
    vulnerability the night before, Catherine’s frustration over Tommy Lee Royce’s
    lingering influence—until Catherine, with characteristic bluntness, produces a
    morning-after pill from her pocket. The gesture is both practical and deeply protective,
    a silent acknowledgment of Ann’s recklessness and Catherine’s role as a reluctant
    guardian. Ann’s embarrassed reaction (‘Oh Jesus’) underscores the awkwardness
    of the exchange, but Catherine’s matter-of-fact delivery (‘I just thought’) reveals
    her instinct to shield those under her care, even when she’s emotionally stretched
    thin. The moment is a fragile counterpoint to the looming chaos of the murder
    investigation and Ryan’s growing connection to his father’s darkness. It’s a quiet
    act of care that contrasts sharply with the violence and instability surrounding
    them, reinforcing Catherine’s dual role as both protector and a woman haunted
    by her own unresolved traumas.
