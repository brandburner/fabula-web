      reveals a fleeting moment of doubt before she grabs matches and exits into the
      backyard, signaling her readiness to act. Her physical presence is tense yet
      controlled, her silence amplifying the gravity of her actions.
    beliefs:
    - That her actions are justified by her grievances against Catherine and her desire
      to protect Ryan from Catherine's influence.
    - That the petrol bomb is a necessary tool to disrupt the fragile peace in Hebden
      Bridge and force a confrontation.
    observed_traits:
    - Methodical
