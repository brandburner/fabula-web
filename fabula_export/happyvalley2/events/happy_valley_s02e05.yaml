- fabula_uuid: cand_evt_scene_6543d52989aec1e4_02
  global_id: null
  title: CPS Approves Charging Sean for All Murders
  description: 'In a tense corridor outside Andy’s office, John and Jodie await the
    Crown Prosecution Service’s decision on charging Sean Balmforth for the four murders.
    John, desperate for closure, seeks reassurance from Jodie, who remains skeptical
    about the Vicky Fleming case. When Andy emerges with the CPS’s approval to charge
    Sean for all four murders—despite lingering inconsistencies—he frames it as a
    team victory. Jodie’s hesitation over including Vicky Fleming’s murder exposes
    the team’s fractured confidence, while John’s reaction reveals his internal conflict:
    relief at the apparent resolution, guilt over potential miscarriage of justice,
    and fear that the case might unravel. The scene underscores the tension between
    procedural triumph and moral ambiguity, as the team’s unity fractures under the
    weight of circumstantial evidence and unanswered questions. Andy’s exhausted but
    triumphant declaration—‘Well done. Team.’—feels hollow, foreshadowing the impending
    collapse of their case when a new body is discovered.'
