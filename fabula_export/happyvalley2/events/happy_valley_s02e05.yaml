  description: "\n  In a volatile, alcohol-withdrawal-fueled moment, Sean Balmforth\
    \ interrupts the formal interview to confess to frequenting prostitutes—including\
    \ Ana Vasalescu—when confronted with DNA evidence in his van. His solicitor visibly\
    \ reacts with unease, while Jodie and John process the admission as a potential\
    \ motive or connection to the murders. The confession, delivered with raw desperation,\
    \ shifts the investigation’s focus from circumstantial evidence to Sean’s personal\
    \ habits and possible involvement in the crimes. The tension escalates as Sean’s\
    \ reckless honesty exposes his vulnerability and deepens the detectives’ suspicions,\
    \ forcing them to reconsider their approach to the case.\n  "
