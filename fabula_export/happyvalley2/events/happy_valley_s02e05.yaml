- fabula_uuid: cand_evt_scene_2118cfb2c1f56f4d_01
  global_id: null
  title: Daryl Confesses to Alison in the Night
  description: "\n  In the dead of night, Daryl wakes Alison with a tearful, fragmented\
    \ confession, his face streaked with tears and his voice trembling as he avoids\
    \ direct admission of his crimes. Alison, initially groggy, quickly realizes the\
    \ gravity of his distress when he resists discussing his car with the police,\
    \ instead mumbling about 'things' he's done. As she presses him, Daryl's evasive\
    \ language—'I’ve done things,' 'I think you’ll be cross,' 'It’s what I do'—confirms\
    \ her worst fears: he is responsible for the harm done to the missing women. The\
    \ moment is a turning point in their relationship, exposing Daryl’s fractured\
    \ psyche and Alison’s complicit role in his unraveling. Though she forces reassurance\
    \ ('Come here. What a silly thing to do'), her bewilderment and the silence that\
    \ follows reveal the depth of her horror and the moral ambiguity of her response.\
    \ The scene foreshadows catastrophic consequences, as Daryl’s admission of his\
    \ DNA being on file and his fear of capture set the stage for Alison’s desperate,\
    \ violent resolution later. The emotional architecture of the moment—Daryl’s childlike\
    \ vulnerability, Alison’s maternal instinct clashing with her complicity—deepens\
    \ the story’s exploration of moral decay and the lengths to which people will\
    \ go to protect those they love, even from themselves.\n  "
  episode_uuid: ep_sea_ser_happy_valley_s02_e05
  scene_sequence: 43
  sequence_in_scene: 60
  key_dialogue:
  - 'DARYL: Mum? Mum? Mum. Mum. Mum. I need to talk to you. Mum.'
  - |-
    ALISON: Have you hurt someone?
    DARYL: Yeah.
    ALISON: With your car.
    DARYL: No.
    ALISON: ((she hardly dare say it)) Is it...? Is it to do with those women?
  - |-
    DARYL: If it was. Would you tell the police?
    ALISON: ((struggling for the next line, the next thought)) Well - Would you want me to?
    DARYL: No. I just... I don’t know what I’d do. If they’re came looking. For me. The thing is. They’ve got my DNA now. Cos o’ that fight. Other day. And I’d not get far. If I set off. So I don’t know what I’d do.
