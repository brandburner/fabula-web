    observing the revelry while Catherine remains vigilant about Ann’s well-being.
    Joyce, more attuned to the atmosphere, suggests Catherine leave if she’s tired,
    but Catherine insists on staying to honor her promise to Nev to watch over Ann,
    who is still grieving. Their conversation reveals Catherine’s protective instincts—she
    explains that Ann’s grief might not be immediately visible but could surface unexpectedly.
    Joyce, nodding along, abruptly shifts the focus by asking where Ann is, exposing
    a critical gap in their oversight. The tension between Catherine’s dutiful care
    and Joyce’s implied concern for Ann’s absence foreshadows the fragility of their
    support network and hints at the encroaching threat of the dark presence through
    Ryan’s connection to Tommy Lee Royce. The scene underscores the contrast between
    Catherine’s emotional labor and Joyce’s more detached perspective, while the abrupt
    question about Ann’s whereabouts introduces a note of unease that disrupts the
    pub’s festive atmosphere.
