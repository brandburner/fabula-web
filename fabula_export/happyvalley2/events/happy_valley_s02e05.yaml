      framed as an unassailable verdict. The CPS is not present in person but is invoked
      as an institutional force, its authority absolute.
    power_dynamics: Exercising authority over the police team, dictating the terms
      of the case’s progression. The CPS’s decision is treated as final, silencing
      the team’s doubts and forcing them to accept the charges, despite their reservations.
    organizational_goals:
    - To approve the charges against Sean Balmforth based on the evidence presented,
      ensuring the case meets legal thresholds for prosecution.
    - To balance the need for justice with the practical realities of prosecutable
      cases, even when evidence is circumstantial.
    influence_mechanisms:
    - Through legal thresholds and evidentiary standards, which the team must navigate
      to secure charges.
    - Via institutional pressure, where the CPS’s approval is treated as a mandate,
      overriding internal doubts.
    - By setting the tone for the team’s morale, where the CPS’s decision is framed
      as a victory, despite its flaws.
    institutional_impact: The CPS’s involvement reinforces the system’s prioritization
      of prosecutable cases over moral certainty. It creates a feedback loop where
      the team’s doubts are suppressed in favor of institutional efficiency, setting
      a precedent for future cases where evidence may be similarly flawed.
    internal_dynamics: 'The CPS’s internal processes are not visible, but its decision
      reflects a broader institutional dynamic: the tension between the need for closure
      and the ethical responsibility to pursue only airtight cases. The approval of
      this case suggests a willingness to accept risk in the name of justice.'
