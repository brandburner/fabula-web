  organization_involvements:
  - organization_uuid: ger_organization_e501815d156f
    description_of_involvement: 'The **Homicide and Major Investigation Team (H-MIT)**
      is at the heart of this event, grappling with the fallout of their investigative
      failures. Led by Andy Shepherd, the team is forced to confront the revelation
      that Elise May Hughes was murdered after Sean Balmforth’s arrest, proving their
      prime suspect was innocent. The briefing becomes a moment of collective reckoning,
      where the team’s professional confidence is shattered, and their emotional responses—particularly
      John’s distress—are laid bare. H-MIT’s role in this event is to absorb the new
      evidence, acknowledge their mistakes, and pivot their investigation under the
      looming threat of the review team’s scrutiny. The team’s dynamic is strained,
      with each member processing the implications in their own way, but their shared
      goal remains: to find the true killer before another victim is claimed.'
    active_representation: Through the collective presence of the detectives in the
      briefing room, their reactions to Andy’s disclosure, and their engagement with
      the hit-and-run lead as a potential path forward.
    power_dynamics: Operating under constraint, as the review team’s involvement limits
      the team’s autonomy and introduces external judgment. H-MIT must now justify
      its actions and demonstrate a renewed commitment to investigative rigor.
