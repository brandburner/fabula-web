  object_involvements:
  - object_uuid: ger_object_305afe5a2e47
    description_of_involvement: The green plastic petrol can is the primary fuel source
      for Frances's petrol bomb. She grips it firmly, pouring its contents through
      a funnel into the milk bottle with steady hands, the liquid fuel serving as
      the volatile core of her weapon. Its presence in the kitchen underscores the
      domestication of violence—an ordinary household item repurposed for destruction.
      The can is nearly empty by the end of the event, its contents transferred into
      the bomb, symbolizing the irreversible commitment to her plan.
    status_before_event: Full or partially full, placed on the kitchen counter, ready
      for use.
    status_after_event: Nearly empty, its contents transferred into the milk bottle,
      now a spent vessel of its original purpose.
    global_id: ger_object_305afe5a2e47
  - object_uuid: ger_object_b148f2a21980
    description_of_involvement: The petrol-soaked cloth wick is the critical component
      that turns the milk bottle into a functional petrol bomb. Frances folds it neatly
      and tightly, soaks it in petrol, and inserts it into the bottle's neck, ensuring
      a snug fit. The cloth's absorption of fuel creates the wick that will ignite
      the bomb when lit, making it the linchpin of her weapon. Its preparation is
      a moment of ritualistic care, highlighting the deliberate and calculated nature
      of her actions. The close-up of her hands testing the fit underscores the gravity
      of her intent.
    status_before_event: A clean, unfolded cloth, lying on the kitchen counter, an
      innocuous household item.
    status_after_event: Folded, soaked in petrol, and inserted into the milk bottle
      as a functional wick, now a critical part of the assembled petrol bomb.
    global_id: ger_object_b148f2a21980
  - object_uuid: ger_object_c20dff4eef28
    description_of_involvement: The plastic funnel is a tool Frances uses to pour
      petrol from the can into the milk bottle with precision, avoiding spills and
      ensuring the fuel is evenly distributed. Its clear plastic material allows the
      audience to see the petrol flowing into the bottle, emphasizing the methodical
      nature of her actions. The funnel is a mundane object that becomes complicit
      in her violent plan, its practical use underscoring the domestication of her
      destructive intent.
    status_before_event: Clean and unused, placed on the kitchen counter alongside
      the other materials.
    status_after_event: Used and set aside, now a tool that has facilitated the assembly
      of a weapon.
    global_id: ger_object_c20dff4eef28
  location_involvements:
  - location_uuid: ger_location_cdced8beeb6e
    description_of_involvement: Hebden Bridge serves as the contextual backdrop for
      Frances's actions, its deceptive tranquility masking the simmering violence
      beneath. The town's warm lights and laughter contrast sharply with the petrol
      bomb being assembled in Frances's kitchen, highlighting the disconnect between
      its surface appearance and the dark forces at play. Hebden Bridge is not just
      a setting but a character in its own right, its fragile peace a target for Frances's
      sabotage. The town's streets and homes, framed in the scene's description, underscore
      the stakes of her actions—they are not just personal but threaten to shatter
      the fragile stability of the community.
    observed_atmosphere: Deceptively tranquil, with warm lights and laughter masking
      the underlying tension. The town's ordinary facade contrasts with the violence
      brewing in Frances's kitchen, creating a sense of foreboding. The night casts
      long shadows, symbolizing the unseen threats lurking beneath Hebden Bridge's
      surface.
    functional_role: Contextual backdrop and target of Frances's sabotage. Hebden
      Bridge represents the fragile peace that Frances seeks to disrupt, its streets
      and homes a microcosm of the stability she resents. The town's setting amplifies
