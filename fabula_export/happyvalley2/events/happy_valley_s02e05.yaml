- fabula_uuid: cand_evt_scene_6ac93c86704cd563_01
  global_id: null
  title: Catherine Delivers the Bad News
  description: "\n  In a tense hallway exchange at Norland Road Police Station, Catherine\
    \ intercepts John Wadsworth as he arrives for work, their near-collision underscoring\
    \ the precarious balance of their investigation. John, still riding the momentum\
    \ of Sean Balmforth’s arrest, eagerly congratulates Catherine—only for her to\
    \ abruptly deflate his optimism by revealing a new body has been discovered. Her\
    \ delivery is clinical, almost detached, but the subtext is clear: the case is\
    \ far from closed, and their earlier breakthrough was built on shaky ground. John’s\
    \ visceral reaction—‘oh shit’—exposes the fragility of their progress, while Catherine’s\
    \ calm demeanor masks her own frustration. The moment serves as a brutal pivot,\
    \ shifting the narrative from false hope to escalating dread, and forces the audience\
    \ to confront the relentless, unresolved threat of the killer. The exchange also\
    \ highlights Catherine’s role as the bearer of bad news, a burden she carries\
    \ with quiet resilience, while John’s shock reveals his emotional investment in\
    \ the case’s resolution.\n  "
  episode_uuid: ep_sea_ser_happy_valley_s02_e05
  scene_sequence: 28
  sequence_in_scene: 40
  key_dialogue:
  - 'JOHN: Sorry!'
  - 'CATHERINE: Morning!'
  - 'JOHN: Oh, congratulations. He’s been charged, you’ll have heard. That fella you
    tipped us off about.'
  - 'CATHERINE: Oh, [but] - ((she gets closer to be confidential)) Have you not heard?
    Apparently another body’s turned up.'
  - 'CATHERINE: ((clearly not)) Did you not know?'
  - 'CATHERINE: It’s what I’ve just been told.'
