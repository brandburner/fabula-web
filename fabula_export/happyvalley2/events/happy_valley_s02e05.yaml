    signaling his unannounced return. The forceful parking—‘very robustly’—immediately
    establishes his volatile state of mind, a man operating on raw emotion rather
    than restraint. This moment is a physical manifestation of his desperation to
    reclaim control, a theme that has been building since his earlier confrontation
    with Amanda. The car’s sudden stop and his direct movement toward the door suggest
    urgency, even aggression, foreshadowing the explosive confrontation that will
    follow. The scene’s brevity heightens its tension; the audience is left anticipating
    the fallout of his arrival, knowing it will disrupt the fragile equilibrium of
    his household and force unresolved conflicts into the open. The visual emphasis
    on the car’s movement underscores John’s lack of subtlety—he is not here to negotiate,
    but to assert dominance, a dynamic that will clash with Catherine’s own struggles
    for control in the broader narrative.
