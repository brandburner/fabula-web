  title: Catherine dispatched to Sowerby Bridge disturbance
  description: "\n  Catherine, already on edge from the escalating violence in Sowerby\
    \ Bridge and the lingering threat of Tommy Lee Royce’s influence over Ryan, receives\
    \ a radio dispatch about a semi-naked man causing a public disturbance outside\
    \ a pub. The call’s bizarre nature—a man stripped to the waist, banging on doors,\
    \ and refusing to leave—immediately sets off alarm bells, given the town’s recent\
    \ murders and the unsettling supernatural undertones permeating the investigation.\
    \ Catherine’s sarcastic response ('Oh lovely, a semi-naked man at lunch time in\
    \ Sowerby Bridge, how could I stay away?') masks her professional detachment,\
    \ but the subtext is clear: this isn’t just another routine call. The radio operator’s\
    \ mention of CCTV monitoring the man and the promise of back-up from Halifax hint\
    \ at the escalating chaos, while the location—Sowerby Bridge—ties directly to\
    \ the darker forces at play, including Ryan’s resurfacing connection to his father.\
    \ The event forces Catherine to confront the blurring line between her professional\
    \ duties and the creeping supernatural threat, reinforcing her role as the town’s\
    \ reluctant protector while underscoring the fragility of the peace she’s fought\
    \ to maintain.\n  "
