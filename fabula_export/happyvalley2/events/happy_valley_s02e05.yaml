    \ She then shows him CCTV footage of Frances buying a Scalextric set, but Mike\
    \ dismisses it as irrelevant, assuming Frances is male. The exchange underscores\
    \ Mike’s bureaucratic caution and Catherine’s instinct-driven persistence. The\
    \ tension escalates when Mike reveals a new body has been found in Rastrick—post-dating\
    \ Sean Balmforth’s arrest—suggesting the police may have charged the wrong suspect.\
    \ This revelation forces a narrative backtrack, deepening the case’s unresolved\
    \ tension and reinforcing the killer’s continued threat. The moment also highlights\
    \ Catherine’s marginalization within the investigation, as her leads are ignored\
    \ while the team grapples with a critical error.\n  "
