  title: Ann’s Rejection and Vulnerability Exposed
  description: In a shadowed alley behind a pub, Ann—drunk and emotionally unmoored—aggressively
    pursues a young man, escalating their physical encounter with a sudden, uninvited
    grope. His startled rejection ('Not ere!') halts the moment, forcing Ann to confront
    her own desperation and the fragility of her self-control. The Lad’s resistance
    isn’t just about physical boundaries; it exposes the deeper tension between Ann’s
    unspoken longing for connection and her inability to navigate it without self-destruction.
    The scene underscores her vulnerability, which Catherine has been trying to shield,
    while hinting at the darker forces (like Frances’ manipulation) that may exploit
    this moment of exposure. The rejection isn’t just personal—it’s a narrative turning
    point, revealing Ann’s instability as a liability in the larger web of threats
    closing in on Catherine’s world.
