    and she’s my priority, and I won’t watch her get dragged down. Not by anyone.
    I’m sorry if you think I’ve not been very friendly. I am sorry. She’s very fond
    of you. And I want to respect that. All right? But please don’t mess her about.'
  - 'NEIL: I won’t.'
