  key_dialogue: &id015
  - 'DANIEL: There y’go.'
  - 'ANN: Ohh...'
  - 'DANIEL: We have met before. It was me mother’s birthday, year before last. D’you
    remember? I got a bit pissed and went off in a strop.'
  - 'ANN: Yeah. Yeah. Yeah, I do.'
  - 'DANIEL: Still. They’re smiling. It’s funny, a bloke going off in a strop.'
  - 'ANN: So you’ve...? You and... your wife, you’ve...? Split up?'
  - 'DANIEL: It’s all a bit mad. Life is a bit mad though, isn’t it? Older you get.
    I think... looking back, I only married Lucy to get away from here. I liked her.
    Y’know. I do like her. But. Everything has to be so neat and tidy and nothing
    out of place. It’s like living in a little dolly house.'
  - 'ANN: Is that ‘cos of what happened with Becky? Wanting to get away from here.'
  - 'DANIEL: It was an odd time. After she died. Becky. Me mum did go a bit mental.
    Me dad couldn’t stand it either. He left.'
  - 'ANN: How old were you?'
  - 'DANIEL: Twenty. She said some really stupid things. Hurtful things. But. Y’know.
    She was ill.'
  - 'ANN: I think she’s fantastic - Oh God.'
  - 'DANIEL: What?'
  - 'ANN: I just remembered something I said last night. To her. (she deals with it,
    centres herself, breathes) Moving on.'
  - 'DANIEL: How was last night? Did it do the trick?'
  - 'ANN: What trick?'
  - 'DANIEL: Cheer you up.'
  - 'ANN: Cheer me up?'
  - 'DANIEL: Yeah. (ANN clearly didn’t know) Have I put me foot in it?'
