  title: John’s intoxicated demand for entry
  description: John, still riding the adrenaline of evading justice, drives home in
    a state of manic exhilaration, his emotions oscillating between disbelief and
    euphoria. He fidgets with the radio—first blasting celebratory music, then abruptly
    silencing it—as if the noise itself is too loud for his guilt. His instability
    surfaces when he impulsively calls his estranged son Jack, demanding entry into
    the house with a tone that blends arrogance and desperation. The call isn’t just
    about physical access; it’s a brazen attempt to reassert control over a life he’s
    been slipping from, exposing the cracks in his facade of normalcy. The scene foreshadows
    his impending confrontation with Amanda, where his psychological unraveling will
    collide with her infidelity, escalating the household’s tension. His reckless
    demand underscores his crumbling authority and the looming threat of Catherine’s
    investigation, which will soon expose his deeper involvement in the murders.
