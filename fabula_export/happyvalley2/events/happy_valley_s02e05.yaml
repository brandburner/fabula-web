- fabula_uuid: cand_evt_scene_af88da260cded0ad_01
  global_id: null
  title: Frances constructs a petrol bomb
  description: Frances meticulously assembles a petrol bomb in her kitchen, pouring
    petrol into a milk bottle through a funnel and fashioning a cloth stopper soaked
    in fuel. Her deliberate, methodical actions—folding the cloth with precision,
    testing the stopper’s fit—reveal a calculated, almost ritualistic approach to
    violence. The close-up on her eyes captures her hesitation, a fleeting moment
    of doubt before she grabs a box of matches and exits into her backyard, signaling
    her readiness to act. This scene marks a turning point in Frances’s character
    arc, as her repressed obsession with fire and sabotage now manifests in a tangible,
    destructive weapon. The act foreshadows her role in escalating the tension in
    Hebden Bridge, where Catherine’s investigation and personal struggles are converging.
    The silence and isolation of the kitchen amplify the gravity of her decision,
    underscoring the irreversible nature of her descent into premeditated violence.
    The petrol bomb becomes a symbol of the latent danger lurking beneath the town’s
    fragile stability, tying directly to Tommy Lee Royce’s influence and the broader
    threat looming over Catherine’s world.
