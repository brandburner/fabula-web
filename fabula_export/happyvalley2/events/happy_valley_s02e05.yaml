acts:
- fabula_uuid: act_7fc2aec74d2fcdce
  number: 1
  summary: The episode opens with Catherine, Joyce, and Ann on a lively night out,
    where Catherine and Joyce humorously recount the sexism they faced as early female
    police officers, much to Ann's horror. Ann's subsequent passionate encounter behind
    a pub and public vomiting in the market square reveal her vulnerability, with
    Catherine offering comfort and the morning-after pill, highlighting Catherine's
    protective nature. Simultaneously, a sinister undercurrent emerges as Frances
    meticulously constructs a petrol bomb, hinting at her dark intentions. The ongoing
    murder investigation takes a dramatic turn when Sean Balmforth, during his interview,
    admits to picking up prostitutes and having no memory of certain events due to
    heavy drinking, leading to a perceived confession. This prompts Andy Shepherd
    to secure CPS approval, and Sean is formally charged with four murders, including
    Vicky Fleming’s, despite Jodie’s lingering doubts. John Wadsworth, relieved by
    this apparent resolution, returns home to confront his wife, Amanda, about her
    infidelity, demanding she leave and threatening to expose her lover. Back at Catherine’s
    house, she and Clare discuss the unsettling Scalextric left on their doorstep,
    with Catherine dismissing Clare’s theory about its non-aggressive nature. Catherine,
    driven by a desire to appease Ryan, buys him a new Scalextric, only for him to
    reject it outright, insisting he wanted "the one me dad sent." This moment shatters
    Catherine’s fragile peace, revealing Tommy Lee Royce's continued influence and
    deepening her resolve to find whoever left the gift. Frances, meanwhile, covertly
    observes Catherine’s home, her focus shifting from the petrol bomb to a more insidious
    form of manipulation. This act establishes the various personal and professional
    conflicts, culminating in a false sense of closure regarding the murders and a
    heightened personal threat to Catherine and her family.
