  title: Ryan forces Daniel to confront Becky’s past
  description: 'Ryan, seated on the settee while Daniel lounges on the floor near
    the Scalextric set, abruptly shifts the conversation from casual play to a probing
    interrogation about his mother, Becky. His questions—*When she was going out with
    me dad? Did she love him?*—reveal his growing fixation on his parents’ fractured
    history, particularly his father’s role in her life. Daniel, visibly uncomfortable,
    reluctantly discloses Becky’s youthful infatuation with Tommy Lee Royce, her vulnerability
    at seventeen, and the exploitative nature of their relationship. The tension escalates
    when Ryan presses further, asking if her death was tied to her unpreparedness
    for motherhood. Daniel deflects with vague reassurances (*Some times it just happens*),
    but the subtext lingers: Ryan’s questions aren’t just about the past—they’re a
    mirror of his own unresolved grief and the manipulative influence of Frances,
    who has been grooming him to seek answers from his father. The scene ends with
    Daniel retreating to the kitchen, leaving Ryan alone with his unanswered questions,
    the Scalextric set abandoned—a symbol of the fractured family legacy he’s being
    forced to confront.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e05
  scene_sequence: 37
  sequence_in_scene: 53
  key_dialogue:
  - |-
    RYAN: Tell me about me mum.
    DANIEL: What about her?
    RYAN: When she was going out with me dad.
  - |-
    RYAN: Did she love him?
    DANIEL: She was infatuated with him. And he... took advantage of her.
    RYAN: How?
    DANIEL: I don’t think she [wanted]... She was a bit young. To get pregnant.
  - |-
    RYAN: Is that why she died? ‘Cos she wasn’t ready.
    DANIEL: What’s Granny said?
    RYAN: She just... said she died when I was born. But it wasn’t my fault.
