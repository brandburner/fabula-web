  title: Ryan Rejects Catherine’s Scalextric Gift
  description: "\n  The scene opens with Frances covertly observing Catherine’s backyard,\
    \ where Ryan, Daniel, and Ann are engaged in playful bike balancing. Catherine\
    \ returns from a toy shop with a Scalextric set—a gift intended to replace the\
    \ one Ryan received from his imprisoned father, Tommy Lee Royce. Ryan’s immediate\
    \ and visceral rejection of the gift (‘I don’t want it’) triggers a tense confrontation.\
    \ Catherine, initially confused, presses him for an explanation, only for Ryan\
    \ to insist that the new set isn’t the same as the one from his father, revealing\
    \ his unresolved attachment to Tommy. Daniel attempts to mediate by offering to\
    \ set up the track and inviting Ryan’s friend Cesco for a race, but Ryan remains\
    \ firm in his refusal. Catherine, visibly frustrated, threatens to return the\
    \ gift, exposing the depth of her grief over Ryan’s connection to Tommy and the\
    \ fragility of her own attempts to bridge their fractured bond. The exchange foreshadows\
    \ the darker forces—both psychological and external—threatening their fragile\
    \ peace, as Frances, hidden but attentive, witnesses the emotional fallout from\
    \ a distance.\n  "
