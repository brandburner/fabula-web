  title: Catherine tends to Ann’s drunken collapse
  description: 'In the quiet of Hebden Bridge’s market square at night, Catherine
    finds Ann in a drunken, vulnerable state—echoing Clare’s earlier collapse in Episode
    2. While Ann slurs philosophical musings about Catherine’s inherent goodness,
    Catherine pragmatically assesses the fallout of Ann’s reckless night: a passionate
    but rejected kiss with a young man, unprotected sex, and a blackout. Ann’s intoxication
    forces Catherine to step into a caretaker role, deflecting Ann’s drunken confessions
    while probing for the consequences of her behavior. The scene exposes Ann’s fragility
    and Catherine’s protective frustration, deepening their fraught dynamic. Ann’s
    physical and emotional unraveling forces Catherine to confront the fragility of
    the stability she’s fought to preserve, especially as darker forces loom over
    her investigation. The moment underscores Catherine’s role as a reluctant guardian,
    balancing her professional duties with the emotional weight of those under her
    care.'
