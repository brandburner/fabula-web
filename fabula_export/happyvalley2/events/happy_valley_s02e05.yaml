  title: Frances’s fragile facade unravels
  description: Frances sits alone in her makeshift home, surrounded by the remnants
    of her transient life—suitcases still unpacked from episode one, a meager supper
    of beans on toast, and the *Guardian*'s Family section, a desperate anchor to
    normalcy. The juxtaposition of her domestic routine with the petrol bomb resting
    beside framed photos of Jesus, Tommy, and Ryan exposes the violent duality of
    her psyche. She sips tea, her gaze flickering between the newspaper and the bomb,
    as if weighing the weight of her devotion against the destructive impulses she
    can no longer suppress. The scene underscores her role as a ticking clock in the
    broader narrative, a figure torn between her religious devotion and her complicity
    in Tommy’s vengeful schemes. The petrol bomb, a silent but ominous presence, foreshadows
    the violence to come, while her fixation on the Family section hints at her fractured
    sense of belonging and her desperate need to cling to something resembling stability.
    This moment is a turning point, revealing the depth of her internal conflict and
    her growing instability, which will inevitably collide with Catherine’s investigation
    and Ryan’s vulnerability.
