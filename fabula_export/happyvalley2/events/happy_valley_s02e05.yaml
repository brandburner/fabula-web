  title: Hit-and-run evidence links to murder case
  description: 'In a tense H-MIT briefing, Andy reveals the latest victim—Elise May
    Hughes—was killed after Sean Balmforth’s arrest, confirming the serial killer
    remains at large. The team reacts with unease, particularly John, whose emotional
    distress underscores the case’s escalating stakes. Andy pivots to a critical lead:
    a hit-and-run incident near the body dump site, where forensic evidence from the
    damaged vehicle may identify the killer or a witness. The revelation forces the
    team to reconsider their assumptions, deepening the investigation’s urgency while
    exposing their collective vulnerability. This moment shifts the case from a presumed
    resolution to a renewed hunt, with Andy’s cautious optimism contrasting the team’s
    mounting dread.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e05
  scene_sequence: 35
  sequence_in_scene: 51
  key_dialogue: &id039
  - 'ANDY: When you’re ready! Thank you. Most of you will know Superintendant Gillespie.
    He’s heading up the review team. Before we go through everything with Mr. Gillespie
    there’s a few bits and pieces from this afternoon. We’ve got an ident on the victim.
    She is Elise May Hughes. Twenty years of age. Address 27 Conway Drive, Dewsbury.
    Last seen three days ago. After we arrested Sean Balmforth.'
  - 'ANDY: The pathologist is telling me she’s confident it’s the same killer as—certainly
    the first three victims. And Vicky Fleming if we accept that he was disturbed
    before he’d finished doing what he wanted to do to her. Although I think now more
    than ever we’d be wise to keep an open mind.'
  - 'ANDY: The good news! For once. Is we might have a bit of a lead. The night Elise
    May Hughes’s body was left at the site in Rastrick. Two hundred yards away, just
    further down the road that same night. A parked vehicle was hit by another vehicle.
    Hit and run. I’ve got forensics onto it, it won’t be long before we can identify
    the make and the model from fragments left on the vehicle that was hit. I want
    to know who was driving that vehicle.'
