  global_id: null
  title: Catherine arrests Neil after pub brawl
  description: 'Catherine arrives at a chaotic pub disturbance to find Neil, Clare’s
    volatile new partner, drunk and violently confronting the manager over a stolen
    phone and food. Despite her attempts to de-escalate—using calm authority and procedural
    warnings—Neil’s aggression escalates, forcing Catherine to physically restrain
    him. She arrests him for public order offenses, delivering the caution while Neil
    lashes out with personal insults, revealing their strained history and his resentment
    toward her. The arrest underscores Neil’s instability, its impact on Clare, and
    Catherine’s professional dilemma: balancing her duty to uphold the law with her
    concern for her sister’s safety. The scene’s tension stems from Neil’s defiance,
    the crowd’s reactions (horrified onlookers and phone-wielding bystanders), and
    Catherine’s struggle to maintain control without escalating the situation further.
    The arrest becomes a turning point, exposing Neil’s darker side and foreshadowing
    the fallout for Clare’s relationship.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e05
  scene_sequence: 32
  sequence_in_scene: 46
  key_dialogue: &id033
  - 'NEIL: I want my phone back! You give me my phone back, you little tosser, and
    then we’ll discuss whether I’m stopping or not. Get out here! Come on, get out
    here, you! Y’little runt, I’m talking to you!'
  - 'CATHERINE: You’re being arrested for Section 5 Public Order. You don’t have to
    say anything—'
  - 'NEIL: You hate me! Any excuse! First time you saw me you talked to me like shit.'
  - 'CATHERINE: That’s not true, Neil. You’ve had too much to drink, and you need
    to be listening not talking.'
  - 'NEIL: You’re loving this. AAAAAARGHHH!'
