- fabula_uuid: cand_evt_scene_f44078039e998225_01
  global_id: null
  title: Catherine confronts Mike over Royce’s list
  description: 'Catherine enters Mike’s office at Norland Road Police Station, probing
    for information about Tommy Lee Royce’s visitors from Gravesend. Mike resists,
    citing protocol, but Catherine counters by showing him CCTV footage of Frances
    purchasing a Scalextric set—a potential link to the threats against Ryan. Mike
    dismisses the lead, assuming Frances is male, exposing his blind spot. The tension
    escalates when Mike reveals a critical flaw in the investigation: a new body in
    Rastrick, found after Sean Balmforth’s arrest, suggesting the wrong man was charged.
    This revelation forces Catherine to confront the systemic failure of the case
    while reinforcing her distrust of institutional caution. The exchange sharpens
    the conflict between her relentless pursuit of truth and Mike’s bureaucratic restraint,
    while the new evidence escalates the stakes of the investigation and her personal
    reckoning with justice.'
  episode_uuid: ep_sea_ser_happy_valley_s02_e05
  scene_sequence: 27
  sequence_in_scene: 37
  key_dialogue:
  - 'CATHERINE: Have you heard owt from Gravesend?'
  - 'MIKE: Yes! I did. Late on Friday night, they sent a list. Visitors, phone calls,
    people he writes to.'
  - 'CATHERINE: Y’being funny? / MIKE: No. I can’t have you taking the law into your
    own hands.'
  - 'MIKE: They’re playing it down ‘til it’s confirmed but... there’s another body
    turned up in Rastrick. So that’s a biggie. / CATHERINE: When? / MIKE: Early hours,
    this morning. And depending on when she died... it could mean they’ve charged
    the wrong fella.'
