  key_dialogue: &id005
  - 'SEAN: I didn’t know her. As such. But... I think... I helped shift some furniture.
    Coupla years ago. For her. As a favour. She was a friend of a friend, and I had
    a van, so... I didn’t know her. But - and I don’t remember doing, but - maybe
    I just took her number just incase there were any problems. In case I couldn’t
    find the house. Or whatever. And then I’ve never deleted it. ‘Cos I never delete
    numbers. Do you?'
  - 'SEAN: I’m worried that... because I drink a lot. And I can’t always remember
    stuff that’s happened - and I don’t believe I did kill these women - but perhaps
    I got so drunk that I’ve done stuff... and I can’t remember doing it. Look I’m
    being as honest with you as I can be. I’m sure something like that, you would
    remember. However off your head you was. But - if it was me - I honestly have
    no memory of it.'
  - 'JODIE: Do you have any memory of attacking Leonie Farrell? Four nights ago. SEAN:
    ((eventually, a tiny voice)) No.'
