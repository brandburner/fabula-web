  title: Catherine’s ultimatum to Neil over Clare’s safety
  description: 'In the dimly lit corridor of Halifax Nick police station, Catherine
    confronts Neil after his drunken arrest, probing his relapse with a mix of concern
    and controlled urgency. She begins by asking about his past relapses, revealing
    his admission of two prior falls from sobriety, which she meets with pragmatic
    support rather than judgment. Catherine’s tone shifts when she pivots to Clare’s
    vulnerability, making it clear that Clare’s well-being is non-negotiable. She
    frames her warning as a plea—acknowledging Clare’s fondness for Neil but insisting
    he not ‘mess her about.’ The subtext is unmistakable: Neil’s actions have consequences,
    and Catherine will not tolerate Clare being dragged into his instability. Neil’s
    hollow reassurance—‘I won’t’—carries the weight of an alcoholic’s fragile resolve,
    leaving the audience to question whether his promise can withstand the pressures
    of his addiction. The scene ends with their tense departure, the unresolved tension
    hanging like a threat over Clare’s safety and the fragile trust between them.'
