    emotional_state: Feigned professionalism masking deep frustration and a quiet,
      simmering anger at the case’s relentless setbacks. Her emotional labor is evident
      in the way she carries the news—like a weight she’s grown accustomed to, but
      one that still presses down.
    goals:
    - To swiftly communicate the critical update about the new body, ensuring John
      (and by extension, the team) understands the investigation is far from closed.
    - To maintain her composure as the steady hand in the storm, even as she privately
      grapples with the frustration of another obstacle.
    what_happened: Catherine Cawood moves with purpose down the corridor toward the
      briefing, her posture rigid but controlled. She intercepts John Wadsworth mid-stride,
      their near-collision a physical metaphor for the investigation’s collision with
      reality. Leaning in conspiratorially, she delivers the news of the new body
      with clinical precision—her voice steady, her gaze unflinching—but the slight
