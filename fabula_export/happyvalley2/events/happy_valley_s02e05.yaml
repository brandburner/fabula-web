  title: Ryan secretly mails a letter to Tommy Lee Royce
  description: "\n  Catherine and Clare discuss Neil’s drunken arrest at the police\
    \ station, with Catherine reassuring Clare that Neil will face only a fixed penalty\
    \ notice and likely keep his job if he sobers up. Clare’s distress over Neil’s\
    \ emotional state hints at deeper issues, but she avoids betraying his confidence.\
    \ Meanwhile, Ryan—unnoticed—steals a postage stamp from the notice board, then\
    \ slips outside to affix it to a pre-addressed envelope for Tommy Lee Royce. The\
    \ letter’s contents remain unseen, but its destination (Graves End Prison) and\
    \ Ryan’s covert actions signal a deliberate, ominous act of betrayal. The scene\
    \ juxtaposes Catherine’s protective role as a stabilizer with Ryan’s quiet, predatory\
    \ defiance, foreshadowing the resurfacing of Catherine’s repressed trauma through\
    \ Tommy Lee Royce’s influence. The stolen stamp and the letter’s dispatch mark\
    \ a turning point: Ryan’s agency in reigniting a dormant threat, while Catherine\
    \ remains oblivious to the danger unfolding under her roof.\n  "
