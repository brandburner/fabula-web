      the windows create a sense of intimacy that contrasts sharply with the violence
      to come. As Alison returns from the next room with the shotgun, the kitchen
      transforms into a battleground, where the weight of Daryl’s crimes and Alison’s
      desperation hang heavier than the weapon itself.
