    DANIEL: We’ve been saying this for years. Behind your back. Haven’t we Clare?
    CATHERINE: ((ignoring that)) Ann Gallagher’s upstairs. Just to warn you.
    DANIEL: Why, is she dangerous?
    CATHERINE: ((heading upstairs)) Funny! You’re so funny, Daniel.
