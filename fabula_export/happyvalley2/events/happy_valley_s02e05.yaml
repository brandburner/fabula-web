  title: Catherine and Joyce Reveal Sexist Policing Past
  description: "\n  In a rare moment of camaraderie during a night out at Grappollo’s\
    \ Restaurant, Catherine and Joyce—two of the first female officers in their force—share\
    \ their experiences of systemic sexism in the 1980s. Catherine recounts how women\
    \ were issued handbags instead of truncheons and forced to wear skirts, while\
    \ Joyce describes the humiliating gauntlet of harassment they endured daily, including\
    \ colleagues twanging their suspenders to see if they were 'sharp or flat.' The\
    \ tone shifts from dark humor to visceral outrage when Catherine reveals how she\
    \ finally retaliated against Inspector Leonard Stott, who repeatedly groped her.\
    \ She mimics his leering advances before describing how she floored him with a\
    \ single punch—a defiant act that silenced him permanently. The story ends with\
    \ Ann’s laughter, a fleeting moment of levity that contrasts with the gravity\
    \ of their shared history. This exchange humanizes Catherine’s professional resilience,\
    \ foreshadows her unyielding stance against abuse, and underscores the institutional\
    \ sexism she continues to confront. The moment also serves as a setup for Catherine’s\
    \ broader struggle for agency in a male-dominated world, particularly as she navigates\
    \ the current investigation and her protective role over Ann and Ryan.\n  "
  episode_uuid: ep_sea_ser_happy_valley_s02_e05
  scene_sequence: 1
  sequence_in_scene: 1
  key_dialogue:
  - 'CATHERINE: No, the best thing when I joined up—this is like three hundred years
    ago in the nineteen eighties—you didn’t get a truncheon. If you were a woman.
    You got a handbag. Thanks.'
  - 'JOYCE: They were big enough to keep a brick in, them handbags. ((a wink)) Just.'
  - 'CATHERINE: And skirts. There were no trousers. You don’t know you’re born, you
    lot. We used to freeze our knackers off on a night shift.'
  - 'JOYCE: Stockings or tights? You’d run the gauntlet every time you walked through
    t’CID office. They’d have their hands up your skirt twanging your suspenders to
    see if you were sharp or flat.'
  - 'CATHERINE: ((appalled at the memory of their own naivety)) And you just took
    it!'
  - 'JOYCE: You did! You had to.'
  - 'CATHERINE: ((a groping-at-boobs gesture, both hands, leery Les Dawson face))
    He used to come up to me—every time he saw me—he used to come up to me like this—
    ((she smacks her fist into the palm of her other hand: thud)) Oooh, Cathy, he
    used to call me Cathy—it’s Catherine, you twat—Oooh, Cathy—and I was like whatever
    for long enough and then one day I just thought bollocks to this, and the next
    time he did it— ((Right in his face. I floored him, I decked him, and I’d only
    been out of training school four weeks. He never did it again. In fact... ((like
    she’s only now realising)) he used to avoid me after that.'
