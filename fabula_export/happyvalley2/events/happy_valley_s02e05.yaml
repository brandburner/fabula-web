  key_dialogue:
  - |-
    ANN: I’m sorry if I was talking shite last night.
    CATHERINE: You weren’t. You were happy. Oh—
    CATHERINE: I got you this for you. From the chemist.
    ANN: What is it?
    CATHERINE: Morning after pill.
  - |-
    ANN: ((a mumble)) Oh Jesus.
    CATHERINE: I mean, I don’t know that you need it, I don’t know what you did, but
    CATHERINE: I just thought—
  - |-
    ANN: Bastard.
    CATHERINE: Don’t. Don’t get me started.
