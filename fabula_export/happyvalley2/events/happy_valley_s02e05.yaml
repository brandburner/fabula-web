    DANIEL: Good morning Mother! Late night was it?
    CATHERINE: Hiya, and then I’m going to go - yes it was - and then I’m going to go and spend a hundred and fifty quid that I haven’t got on the famous bloody toy that Ryan never asked for in the first place. I must need my head examined.
