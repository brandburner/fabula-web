  title: John’s guilt theory unravels
  description: 'John and Jodie wait outside Andy’s office, where Andy is finalizing
    the CPS decision to charge Sean Balmforth with all four murders. John, desperate
    for reassurance, presses Jodie about inconsistencies—particularly Vicky Fleming’s
    case—while masking his unease. Jodie’s skepticism about the evidence (e.g., Lynn’s
    number on Sean’s phone but no calls) subtly undermines the case’s solidity. When
    Andy emerges to confirm the charges, Jodie’s pointed question about including
    Vicky Fleming exposes the team’s fractured confidence. John’s internal conflict—relief
    at the resolution clashing with dread over its shaky foundation—mirrors the broader
    narrative tension: the investigation’s rush to closure risks overlooking critical
    flaws. The scene’s undercurrent of moral ambiguity and procedural doubt sets up
    the eventual collapse of the case, while John’s visceral reaction (hearing ‘well
    done’ as ‘you just got away with murder’) foreshadows his later reckoning with
    complicity.'
