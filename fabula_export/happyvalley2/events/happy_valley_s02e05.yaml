  title: Daniel’s teasing exposes Catherine’s guilt over Ryan’s gift
  description: 'Catherine, still hungover from the previous night’s events, engages
    in a tense, circular conversation with Clare about the Scalextric set left on
    their doorstep—an impulsive purchase Ryan never requested. Her paranoia about
    the Knezevics family and the conservatory’s dark history gives way to a deeper,
    unspoken anxiety about the gift’s subtext: a symbol of her lingering guilt, fear,
    or unmet expectations tied to Ryan’s relationship with his father, Tommy Lee Royce.
    When Daniel arrives, his playful teasing about her late night and the Scalextric
    purchase forces her to confront the emotional weight of her actions. Her defensive
    admission—‘I must need my head examined’—reveals her self-awareness of the gift’s
    psychological aggression, even as she deflects Daniel’s concern about Ann Gallagher’s
    presence upstairs. The exchange underscores Catherine’s isolation in recognizing
    the threat Ryan faces, while Daniel’s humor masks his own unease about the family’s
    fragile stability. The moment serves as a microcosm of Catherine’s emotional state:
    reactive, guilt-ridden, and increasingly unmoored by the resurfacing of Tommy’s
    influence through Frances’ manipulation.'
