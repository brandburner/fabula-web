- fabula_uuid: organization_15009111199f
  global_id: null
  canonical_name: Academic Community
  description: Scholars like Professor Henry Jones Sr. form the Academic Community,
    pursuing deep research into historical artifacts such as the Holy Grail. Indy
    calls his father an academic and bookworm, underscoring ties to this world of
    meticulous study. Henry's ransacked house, filled with Grail diary and legend
    paintings, points to urgent searches by intruders possibly linked to this group,
    drawing academia into the violent Grail hunt alongside figures like Marcus Brody.
  sphere_of_influence: Scholarly Research on Mythological Artifacts
- fabula_uuid: organization_58cca6814885
  global_id: null
  canonical_name: Barnett College
  description: Academic institution in *The Adventures of Indiana Jones* animated
    series (1992), operating in a separate continuity from the live-action films.
  sphere_of_influence: Archaeological Education and Academic Administration
- fabula_uuid: organization_69236cc8031a
  global_id: null
  canonical_name: Boy Scouts
  description: The Boy Scouts troop marches into the American Southwest desert on
    horseback, their uniforms and saddles mimicking Army Cavalry precision until dismounting
    exposes their youth and self-serious demeanor. Scoutmaster Havelock leads, issuing
    warnings about miles-long passageways in the cliff pueblo. Herman vomits, drawing
    mockery from peers until a blond scout comforts him. Two scouts scale the cliff
    base, cracking group unity. They project fragile frontier order amid looming wilderness
    chaos.
  sphere_of_influence: Youth Scouting and Wilderness Exploration
- fabula_uuid: organization_582252858748
  global_id: null
  canonical_name: British Colonial Administration (1935 India)
  description: A *bureaucratic governing body* of British colonial rule in 1935 India,
    portrayed as **indifferent and unresponsive** to indigenous crises (e.g., famine,
    drought, theft of the Sivalinga). Unlike the military, it lacks **operational
    power** and is **symbolic of colonial neglect**, referenced in **multiple scenes**
    as a distant, ineffective institution.
  sphere_of_influence: Colonial Administration in India
- fabula_uuid: organization_b3dc231c07b1
  global_id: null
  canonical_name: British Colonial Military (Pankot Palace)
  description: Operates exclusively within the British colonial administration in
    1935 India, with no ties to Japanese military forces or Chinese territories. Focused
    on ceremonial and bureaucratic functions rather than direct security operations.
  sphere_of_influence: Colonial Military Authority in British India
- fabula_uuid: organization_fea6ee0a3229
  global_id: null
  canonical_name: Brotherhood of the Cruciform Sword
  description: The Brotherhood of the Cruciform Sword operates as a secret society
    sworn to protect the Holy Grail's secrets for a thousand years. Led by figures
    like Kazim, who commands armed men bearing the cruciform sword symbol, they employ
    ruthless tactics—igniting catacomb fires to trap intruders, ambushing Nazi convoys,
    attacking perceived looters like Indiana Jones and Elsa Schneider, and spying
    on negotiations—to thwart selfish quests. Their mission targets threats including
    Nazis and grave robbers, as seen in Kazim's dying warning to Donovan. The Grail
    Knight represents their ancient guardian legacy, enforcing the Grail's trials
    against the unworthy.
  sphere_of_influence: Secret Protection of the Holy Grail
- fabula_uuid: organization_87ffefca5244
  global_id: null
  canonical_name: College of Archaeology’s Museum of Spanish Colonial Artifacts
  description: Academic repository affiliated with a college, specializing in the
    preservation of **legally recovered Spanish colonial-era relics** (e.g., the Cross
    of Coronado). Serves as a **neutral custodian** for expedition finds and a bridge
    between **adventure archaeology and scholarly research**. **No ties to Nazi propaganda
    or occult artifacts.**
  sphere_of_influence: Cultural Artifact Curation and Historical Preservation
- fabula_uuid: organization_d4827355c332
  global_id: null
  canonical_name: Crusaders (Byzantium Sack)
  description: Generic medieval Christian warriors whose sack of Byzantium led to
    the installation of marble columns in the Venetian library. Their stained-glass
    depiction (with Roman numerals) serves as a **separate clue** from the Alexandretta
    siege, guiding Indy and Brody to the Grail’s hiding place in Venice.
  sphere_of_influence: Medieval Crusades and Holy Grail Origins
- fabula_uuid: organization_f2a5896ffc45
  global_id: null
  canonical_name: Donovan Corporation
  description: Walter Donovan's **Donovan Corporation** (also referred to as 'Donovan
    Corporate') funds and supplies private airliners marked with its logo to transport
    Indiana Jones, Marcus Brody, and allies to Venice for the Grail quest. The organization
    provides financial backing, logistical support, and strategic resources, including
    a dedicated apartment in Venice for mission operations. While publicly positioned
    as a mission enabler, the corporation conceals deeper ties to Nazi collaboration,
    functioning as a front that masks antagonistic intentions amid the race for the
    Holy Grail. The entity's operations are directed by Walter Donovan and are intertwined
    with Nazi-aligned activities, including the deployment of resources for Grail
    retrieval and prisoner capture operations.
  sphere_of_influence: Private Funding and Logistics for Artifact Quests
- fabula_uuid: organization_cd4ae68711f7
  global_id: null
  canonical_name: Donovan's Nazi-Aligned Grail Pursuit Convoy
  description: A joint Nazi-Turkish expedition force led by American financier Walter
    Donovan, archaeologist Elsa Schneider, and Nazi Colonel Vogel. This heavily armed,
    militarized task force operates as an armored convoy through desert canyons, deploying
    tanks and superior firepower to aggressively pursue, capture, and engage in combat
    during the Grail quest. The group suffers losses from ambushes by Kazim's Brethren
    of the Cruciform Sword and sabotage by Indiana Jones during the tank battle, while
    targeting allies such as Marcus Brody and Professor Henry Jones Sr.
  sphere_of_influence: Grail Retrieval and Prisoner Capture Operations
- fabula_uuid: organization_40a38f654899
  global_id: null
  canonical_name: Donovan’s Grail Tablet Excavation Team (Mountains North of Ankara)
  description: Non-combat, engineer-led archaeological team responsible for recovering
    the Grail Tablet in the mountains north of Ankara. Their work precedes the militarized
    pursuit phase and provides the initial clues for Donovan’s Grail quest. Operates
    in a pre-combat, intellectual context.
  sphere_of_influence: Archaeological Excavation and Artifact Recovery in Anatolia
- fabula_uuid: organization_2b7f31f2c7b8
  global_id: null
  canonical_name: Donovan’s Nazi-Aligned Grail Pursuit Convoy (Desert Canyons)
  description: Heavily armed, militarized task force deployed for aggressive pursuit,
    capture, and combat during the Grail quest. Operates in desert canyons with tanks
    and superior firepower, engaging in ambushes and firefights against Indy’s allies
    and Kazim’s Brethren. Represents the combat phase of Donovan’s Grail quest, succeeding
    the Excavation Team.
  sphere_of_influence: Desert Warfare and Grail Quest Escorts
- fabula_uuid: organization_2507c8ae7ece
  global_id: null
  canonical_name: Fedora's Gang
  description: A **morally ambiguous, opportunistic treasure-hunting crew** operating
    in **New Mexico (USA) during the 1930s**, specializing in **plundering sacred
    Native American sites** (e.g., Kiva chamber) and **historical relics** (e.g.,
    Cross of Coronado) for **personal profit**. Led by **Fedora**, a **boisterous,
    greedy treasure hunter**, the gang consists of a small, **loosely structured crew**
    (**Roscoe, Halfbreed, Rough Rider**) who **collude with local authorities** (e.g.,
    Sheriff) to achieve their goals. Their operations are characterized by **chaotic,
    opportunistic violence** rather than organized criminal structure. The gang ultimately
    **hands off loot to the Man in the Panama Hat**, a shadowy patron, rather than
    controlling illicit trades directly. Key activities include **pursuing young Indiana
    Jones aboard a circus train and through town streets**, seizing relics via **Sheriff
    collusion**, and operating as **artifact thieves for shadowy patrons**.
  sphere_of_influence: Artifact Looting and Treasure Hunting
- fabula_uuid: organization_da154e1df014
  global_id: null
  canonical_name: Hovitos
  description: The Hovitos (also referred to as the Hovito Tribe) are a fierce Peruvian
    indigenous group that patrols jungle territories around the Chachapoyan temple
    and the Urubamba River. They use poisoned darts and spears to defend their sacred
    lands and artifacts, including the golden idol, from intruders like Indiana Jones
    and Belloq. The tribe plays a dual role as both a territorial antagonist and a
    cultural force exploited by Belloq, who manipulates their beliefs by posing as
    divine. Their aggressive pursuit of Indy's party forces him to flee into the Urubamba
    River and board Jock's plane. The Hovitos' actions serve as a moral and physical
    obstacle in the quest for the Ark of the Covenant.
  sphere_of_influence: Tribal Defense of Jungle Territories and Sacred Relics
- fabula_uuid: organization_e9a4bb2bcee0
  global_id: null
  canonical_name: Institute of Aryan Culture
  description: The Institute of Aryan Culture hosts Nazi rallies that demand attendance
    from key figures like Elsa Schneider, summoned directly from Berlin at the 'highest
    level' for platform appearances. This underscores its central role in the regime's
    ideological machinery, promoting Aryan supremacy through public spectacles and
    cultural propaganda. Vogel relays the urgent message amid castle interrogations,
    positioning the institute as a symbol of Nazi political control and Elsa's elevated
    status within their hierarchy.
  sphere_of_influence: Nazi Cultural Propaganda and Ideological Rallies
- fabula_uuid: organization_bdc0fbded65d
  global_id: null
  canonical_name: Knights of the First Crusade
  description: Critical to the Grail’s origin narrative; their siege of Alexandretta
    (Iskenderun) is the first marked location on Henry Jones Sr.’s reconstructed map,
    directly linking medieval conquest to the modern quest. Distinct from broader
    Crusader references in the Venetian library.
  sphere_of_influence: Crusader Military Sieges and Holy Grail Historical Guardianship
- fabula_uuid: organization_8042f08c5598
  global_id: null
  canonical_name: Lao She’s Crime Syndicate
  description: Operates from **Shanghai’s The Dragon nightclub**, specializing in
    **illicit artifact trades** (e.g., Nurhachi’s ashes) and **large-scale criminal
    operations** (e.g., ambushes, blockades, aerial pursuits). Led by **Lao She**,
    a **ruthless crime lord**, with a **hierarchical structure** including his **sons
    (Chen, Kao Kan)** and **henchmen/staff (doorman, waiters)**. **Violent and politically
    connected**, engaging in **premeditated betrayals** (e.g., poisoned champagne,
    gunning down Wu Han) and **sparking brawls with gunfire**. **Controls Shanghai’s
    underworld** and is a **major antagonist in *Indiana Jones and the Temple of Doom*
    (S1E2)**.
  sphere_of_influence: Shanghai Underworld Criminal Operations
- fabula_uuid: organization_760f66fc9399
  global_id: null
  canonical_name: Local Law Enforcement (Sheriff's Office)
  description: The Local Law Enforcement (Sheriff's Office) upholds rural authority
    but turns corrupt when the Sheriff colludes with Fedora to seize the Cross of
    Coronado from Indiana Jones at his father's house. Posing as legitimate enforcers,
    they confiscate the artifact and hand it directly to the Man in the Panama Hat,
    prioritizing theft over justice. This betrayal exposes a structure where the Sheriff
    wields badge-backed power for criminal ends, allying with artifact collectors
    against young Indy.
  sphere_of_influence: Corrupt Rural Law Enforcement
- fabula_uuid: organization_2fa0cf0a0df3
  global_id: null
  canonical_name: Looters and Corrupt Local Authorities
  description: Looters and Corrupt Local Authorities form an informal criminal alliance
    led by the Sheriff and Fedora Man, with Roscoe and Herman as key accomplices.
    They target the Cross of Coronado, betraying young Indiana Jones after his pursuit
    on the train. The group executes the theft through coordinated ambush and seizure
    at Professor Henry Jones Sr.'s house, blending the Sheriff's official position
    with opportunistic looting to claim the artifact.
  sphere_of_influence: Artifact Theft and Local Law Enforcement Corruption
- fabula_uuid: organization_89eba30adf2a
  global_id: null
  canonical_name: Luftwaffe
  description: Nazi Germany's Luftwaffe deploys Messerschmitt pilots who pursue Indiana
    Jones and Henry Jones Sr. in fighter planes. The pilots chase their car through
    a mountain tunnel, bomb the road to force a crater landing, and attack on a deserted
    beach until seagulls swarm and crash the aircraft. These operations support the
    regime's aggressive quest to seize the Holy Grail amid World War II.
  sphere_of_influence: Aerial Warfare and Pursuit in Holy Grail Acquisition
- fabula_uuid: organization_4e05c0618045
  global_id: null
  canonical_name: Marshall College
  description: Academic institution in *Indiana Jones and the Last Crusade* (1989
    live-action film), operating in a separate continuity from the animated series.
  sphere_of_influence: University Education and Archaeology Scholarship
- fabula_uuid: organization_af1cd11bfaae
  global_id: null
  canonical_name: Nang Tao Airfield Imperial Japanese Military Police
  description: Operates under **Imperial Japanese military command** in Chinese-occupied
    territory, with a focus on **airfield security and direct conflict resolution**.
    Directly involved in the central plot of *Temple of Doom* through interactions
    with Indiana Jones and Willie Scott.
  sphere_of_influence: Airfield Security and Law Enforcement
- fabula_uuid: organization_e81c74f3be42
  global_id: null
  canonical_name: Nazi Brownshirts (SA - Sturmabteilung)
  description: Nazi Brownshirts, or Sturmabteilung (SA), act as paramilitary enforcers
    at Berlin rallies. They organize book-burnings to destroy forbidden texts, control
    crowds to prevent disruptions, and position themselves beside Adolf Hitler on
    the podium. Their presence bolsters Nazi authority, projects disciplined hierarchy,
    and intimidates onlookers including disguised opponents like Indiana Jones.
  sphere_of_influence: Nazi Rally Security and Propaganda Enforcement
- fabula_uuid: organization_969a73c6cc14
  global_id: null
  canonical_name: Nazi Germany (Nazi Regime)
  description: A macroscopic political and military entity encompassing all Nazi-affiliated
    operations, leadership, and ideological frameworks across multiple timelines (e.g.,
    1912 relic hunts, WWII-era operations). The regime deploys agents—including the
    Sinister Man, Second Man, and high-ranking officers like Shliemann, Gobler, and
    Belzig—to capture key figures (e.g., Marcus Brody) and secure occult artifacts
    (e.g., the Ark of the Covenant) through tactics such as ambushes, interrogations,
    and chases. Affiliated units include the Nazi Military Tank Crew and Infantry,
    with operations spanning dig sites, museums, and global conflicts to achieve military
    dominance and supernatural power.
  sphere_of_influence: Relic Pursuit Operations and Authoritarian Military Coordination
- fabula_uuid: organization_61f1f97f8906
  global_id: null
  canonical_name: Nazi Tank Convoy (Desert Siege)
  description: A **specialized tactical unit** consisting of tank crew and infantry,
    operating under Colonel Vogel’s command during the desert tank siege in *Indiana
    Jones and the Last Crusade*. This unit is a **subset of the broader Nazi Regime
    (organization_969a73c6cc14)** and is deployed as part of Walter Donovan’s armored
    convoy to assault Indiana Jones and his allies.
  sphere_of_influence: WWII Armored Convoy Assault and Close-Quarters Combat
- fabula_uuid: organization_694e4d8ce474
  global_id: null
  canonical_name: Nazi-Aligned College Students
  description: Nazi-aligned college students actively participate in the book-burning
    at Berlin's Nazi rally, chanting amid flames and swastikas to purge literature
    deemed un-German. Their fervor demonstrates deep indoctrination into the regime's
    ideology, positioning them as youthful supporters who amplify fascist propaganda
    through public destruction and spectacle. They operate as an informal group within
    the rally's crowd, endorsing the Third Reich's cultural purge alongside figures
    like Adolf Hitler.
  sphere_of_influence: Nazi Propaganda and Youth Indoctrination
- fabula_uuid: organization_ededff951e09
  global_id: null
  canonical_name: Portuguese Cargo Ship Crew
  description: The Portuguese Cargo Ship Crew mans a cargo vessel navigating stormy
    Atlantic waters at night. Sailors including two Portuguese sailors and additional
    crew members follow orders from the Man in the Panama Hat. They ambush Indiana
    Jones on deck, grapple with him in physical combat, and attempt to hurl him overboard
    during his chase to reclaim the Cross of Coronado. Their coordinated hostility
    aids the Panama Hat's escape with the artifact, turning the ship into a battleground
    amid crashing waves and exploding fuel drums. This crew enforces loyalty through
    brute force against intruders threatening their commander's prize.
  sphere_of_influence: Maritime Cargo Operations and Onboard Enforcer Duties
- fabula_uuid: organization_bb1f70e3f582
  global_id: null
  canonical_name: Reich Museum of Occult Artifacts (Nazi Propaganda Repository)
  description: Central repository for **Nazi-acquired occult artifacts**, including
    those tied to the **Holy Grail quest**. Serves as a **tool for cultural propaganda
    and occult legitimization** of the Nazi regime. **Key site for Elsa Schneider’s
    delivery of the Grail Diary**, a critical plot point in the Nazi occult subplot.
  sphere_of_influence: Nazi Cultural Propaganda and Occult Artifact Display
- fabula_uuid: organization_a32a7ce5f40e
  global_id: null
  canonical_name: Republic of Hatay
  description: The Republic of Hatay governs the region that includes the mosque and
    surrounding territories key to the Holy Grail quest. It frames the political environment
    where Indiana Jones navigates Nazi incursions, Brotherhood operations, and his
    own movements. Though absent from direct action, its authority shapes the geopolitical
    tensions driving the narrative, underscoring local sovereignty amid international
    relic hunts.
  sphere_of_influence: Regional Governance and Political Authority
- fabula_uuid: organization_1b60c3acd608
  global_id: null
  canonical_name: Tengtu Hok’s Palace Imperial Japanese Ceremonial Security
  description: Imperial Japanese Army soldiers providing neutral ceremonial security
    at Tengtu Hok’s palace during the Nazi-Allied standoff over the Ark of the Covenant
    in *Raiders of the Lost Ark*. Their role is purely geopolitical and non-combatant,
    with no involvement in espionage or artifact recovery.
  sphere_of_influence: Ceremonial Security and Local Force Protection
- fabula_uuid: organization_f42022192010
  global_id: null
  canonical_name: Thuggee Cult
  description: The Thuggee Cult worships Kali through heart-ripping human sacrifices
    led by High Priest Mola Ram in Pankot Palace's Temple of Death. Members abduct
    Mayapore children, enslave them in hidden mines to extract Sankara Stones, and
    hypnotize the young Maharajah Zalim Singh to seize palace control. Chattar Lal
    serves as their agent. Guards ambush intruders, activate deadly traps like spike
    chambers and insect pits, and pursue heroes through tunnels and rope bridges.
    Their rituals corrupt victims with 'blood of Kali,' fueling quests for supernatural
    power to overthrow religions. Villagers suffer droughts and starvation from the
    cult's curse, which heroes shatter by reclaiming the stones.
  sphere_of_influence: Kali Worship, Human Sacrifice, and Child Enslavement in Pankot
    Palace
- fabula_uuid: organization_048d9e0d443e
  global_id: null
  canonical_name: Turkish Soldiers
  description: Turkish Soldiers support Walter Donovan’s convoy in a desert valley
    ambush by charging on camels against attackers from Kazim’s men in the Brotherhood
    of the Cruciform Sword. They fire on enemies and bolster the Nazi-led group's
    defense during the chaotic multi-sided battle. Indiana Jones kills or incapacitates
    several soldiers amid his assault on the tank, highlighting their role as local
    muscle in the escalating Grail quest.
  sphere_of_influence: Desert Convoy Escort and Combat Support
- fabula_uuid: organization_5a8ee4e38cc0
  global_id: null
  canonical_name: U.S. Army Intelligence (Army Intelligence Division)
  description: U.S. military intelligence division specializing in supernatural artifact
    recovery and Nazi counterintelligence during World War II. Key personnel (Colonel
    Musgrove, Major Eaton, Buzz Kehoe, and partner Bang Chow) deploy officers to track
    targets like Abner Ravenwood, interrogate experts such as Indiana Jones on Ark
    lore, and delay Nazi agents pursuing biblical superweapons (e.g., the Staff of
    Ra and Ark of the Covenant). Operations blend formal briefings (e.g., lecture
    halls) with field tactics (e.g., airport interventions) to block Axis acquisition
    of artifacts. Indy joins reluctantly after recruitment reveals intercepted Nazi
    plans for Tanis. Distinct from neutral security forces like the Japanese Military.
  sphere_of_influence: U.S. Military Intelligence Operations
- fabula_uuid: organization_324270414d68
  global_id: null
  canonical_name: U.S. Army Intelligence (Army Intelligence Division)
  description: U.S. military intelligence division specializing in supernatural artifact
    recovery and Nazi counterintelligence during WWII. Key personnel (Colonel Musgrove,
    Major Eaton) recruit Indiana Jones, obstruct Nazi progress, and manage high-risk
    artifacts like the Ark of the Covenant—distinct from neutral security forces like
    the Japanese Military.
  sphere_of_influence: Military Intelligence and Classified Artifact Management
- fabula_uuid: organization_8843bdcf5b30
  global_id: null
  canonical_name: U.S. Government
  description: Agents of the U.S. Government track Indiana Jones and confront him
    outside a college building after his escape. Three men arrive in a black Packard
    sedan, encircle him with synchronized precision, and address him as 'Doctor Jones,'
    revealing detailed surveillance of his identity and actions linked to his father's
    research. Their coordinated professionalism projects bureaucratic authority and
    systemic control, marking the organization as a shadowy antagonist in Indy's quest.
  sphere_of_influence: Federal Surveillance and Bureaucratic Control
