  episode_count: 1
- fabula_uuid: ger_organization_30ac94953f2b
  global_id: ger_organization_30ac94953f2b
  canonical_name: Nang Tao Airfield Passenger Flight Service
  description: Private commercial passenger flight service operated by Weber from
    Nang Tao Airfield. Known for tolerating delays for Indiana Jones and facilitating
    escapes, as demonstrated by the delayed DC-3 flight to Siam. Distinct from the
    airfield's military police.
  sphere_of_influence: Commercial Passenger Aviation and Airfield Operations
  season_appearances:
  - 1
  local_uuids:
    1: org_fca95dce15cd
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_8af6470e3f54
  global_id: ger_organization_8af6470e3f54
  canonical_name: Nazi Brownshirts (Berlin Book-Burning Rally)
  description: Paramilitary enforcement unit deployed at the 1933 Berlin book-burning
    rally in *Indiana Jones and the Last Crusade* (1989). Functions as intimidation
    tools for the regime, with no command authority or strategic role.
  sphere_of_influence: Nazi Rally Enforcement and Cultural Suppression
  season_appearances:
  - 1
  local_uuids:
    1: org_adb76491047e
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_f860b4ccc1d9
  global_id: ger_organization_f860b4ccc1d9
  canonical_name: Nazi Flying Wing Crew (Tanis airstrip)
  description: Scene-specific operational crew (mechanics and pilot) at the Tanis
    airstrip who service the flying wing, load the Ark, and directly engage Indiana
    Jones and Marion Ravenwood to protect the aircraft in that scene.
  sphere_of_influence: Nazi Aircraft Maintenance and Cargo Security
  season_appearances:
  - 1
  local_uuids:
    1: org_32813eedef7d
