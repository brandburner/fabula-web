- fabula_uuid: ger_organization_e85358569bbe
  global_id: ger_organization_e85358569bbe
  canonical_name: Donovan’s Nazi Forces (Convoy & Combat Unit)
  description: |-
    Donovan’s Nazi Forces, a militarized unit led by Walter Donovan and Colonel Vogel with Dr. Elsa Schneider present, serve as the primary antagonists in the Grail quest. They operate in two distinct but interconnected capacities:
      1. **Convoy Defense**: During the desert ambush, they form Donovan’s Convoy, deploying machine guns, grenades, and a tank to repel Kazim’s Brethren fighters. Their disciplined firepower and armored support allow them to retain control, capture Marcus Brody, and torture him via water immersion on Vogel’s order.
      2. **Offensive Assaults**: In a separate desert valley firefight, they lead assaults to capture the Holy Grail, hurling hand grenades to kill Kazim’s Brethren and provide cover during intense combat. Donovan and Vogel direct operations from the front lines, targeting Indiana Jones for elimination while battling the Brethren in a chaotic three-way clash.

      Their tactics reveal brutal interrogation methods, disciplined firepower, and ruthless militancy, all aimed at safeguarding assets and advancing the Grail quest.
  sphere_of_influence: Desert Convoy Security and Counterinsurgency Operations
  season_appearances:
  - 1
  local_uuids:
    1: org_b4b23ce290ec
  first_appearance_season: 1
  tier: asteroid
