  canonical_name: Black African Pirates (crew of the Bantu Wind)
  description: 'The crew of the Bantu Wind are the personnel who man Katanga''s smuggling
    vessel, the Bantu Wind. In the narrative they appear in multiple scenes and roles:
    during the Ark handover they are overpowered and held at gunpoint by Nazis on
    the bridge and used by Captain Katanga as victimized leverage to barter Marion''s
    custody; in a separate naval confrontation they cluster on the ship''s bow—standing
    defiantly and being labeled a pirate crew—drawing aggressive attention from the
    German U‑boat Wurrfler and heightening the stakes of that standoff. These descriptions
    represent the same organization (the vessel''s crew) across distinct episodes
    of action.'
