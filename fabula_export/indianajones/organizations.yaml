  canonical_name: Boy Scouts of America (Havelock's Troop)
  description: A Boy Scouts of America troop led by Scoutmaster Havelock, featuring
    young members such as Indiana Jones and Herman. The troop operates in the American
    Southwest, emphasizing discipline, adventure, and civic duty. Key activities include
    formation marching, outdoor expeditions, and community protection (e.g., rallying
    authorities to stop grave robbers). The troop's dynamics highlight tensions between
    obedience, curiosity, and group values, with members like Herman facing peer pressure
    and unnamed scouts occasionally disobeying orders (e.g., climbing rocks). The
    troop is positioned as a source of moral authority in the community.
  sphere_of_influence: Youth Outdoor Training and Discipline
