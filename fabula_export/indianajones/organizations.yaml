  canonical_name: Institute of Aryan Culture
  description: The Institute of Aryan Culture hosts Nazi rallies in Berlin, functioning
    as a central venue for the regime's ideological propaganda and cultural promotion.
    Elsa Schneider receives a direct request to attend one such event, which positions
    the institute within the Nazi hierarchy's political maneuvering and highlights
    its role in reinforcing Aryan supremacy through public gatherings and symbolic
    displays of regime power.
  sphere_of_influence: Nazi Cultural and Ideological Propaganda
  season_appearances:
  - 1
  local_uuids:
    1: org_c1f1dd9a4eda
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_a2d6caa73527
  global_id: ger_organization_a2d6caa73527
  canonical_name: Japanese
  description: Brody flags the Japanese as a dangerous group tied to General Hok,
    the Wild Boar, a tough Shanghai operator. This affiliation threatens Indy's plan
    to seize the Ark headpiece from Hok before Nazis track Marion Ravenwood to the
    Well of the Souls. Indy shrugs off the warning, prioritizing the Nazi race. The
    Japanese emerge as a shadowy foreign faction amplifying risks in the Shanghai
    leg of the quest.
  sphere_of_influence: Foreign Alliances in Shanghai Intrigue
  season_appearances:
  - 1
  local_uuids:
    1: org_b1417179f568
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_521e8f70f957
  global_id: ger_organization_521e8f70f957
  canonical_name: Japanese Soldiers
  description: Japanese Soldiers act as uniformed military escorts and guards for
    General Tengtu Hok. They flank him during bombastic entrances into his palace
    entry hall, performing ceremonial bows alongside a robed Chinese advisor. Their
    presence enforces Hok's dominance, compels foreign dignitaries like the three
    Germans to join the ritual, and underscores his blend of cultural theater and
    brute authority in diplomatic encounters.
  sphere_of_influence: Palace Ceremonial Escort and Security
  season_appearances:
  - 1
  local_uuids:
    1: org_feeee3a5c840
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_ceaab7d84c27
  global_id: ger_organization_ceaab7d84c27
  canonical_name: Kali Worshippers
  description: Kali Worshippers chant in the temple's rear chamber during a sacrificial
    ritual on the altar, where Mola Ram extracts hearts and suspends victims over
    lava. They act as cult supporters and ritual participants under Thuggee priests
    like Chattar Lal. When Short Round burns Indiana Jones to break his hypnotic trance,
    sparking a battle that saves Willie Scott and dooms Chattar Lal, the worshippers
    notice the chaos and signal their ritual's disruption.
  sphere_of_influence: Thuggee Cult Rituals and Sacrifices
  season_appearances:
  - 1
  local_uuids:
    1: org_1199ee46df33
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_efb5d6f30d8e
  global_id: ger_organization_efb5d6f30d8e
  canonical_name: Lao Che's Ballroom Entourage
  description: A **small, scene-specific group** of four suited men who flank Lao
    Che during the Ark negotiation in his nightclub ballroom, serving as silent intimidators
    during the tense exchange that culminates in Wu Han's death.
  sphere_of_influence: Criminal Intimidation and Gang Enforcement
  season_appearances:
  - 1
  local_uuids:
