- fabula_uuid: ger_organization_3d66fd19f141
  global_id: ger_organization_3d66fd19f141
  canonical_name: Donovan Corporation
  description: Donovan Corporation, led by executive Walter Donovan, is a private
    firm that sponsors archaeological expeditions, including the Holy Grail Quest
    Project. The corporation provides logistical support—such as a private airliner,
    a Venice apartment as an operational base, and Dr. Elsa Schneider as a local contact—while
    funding the recovery of the Holy Grail. Donovan’s backing is accompanied by ambiguous
    motives, as evidenced by private warnings to Indiana Jones about distrusting others.
    The project follows clues from an Anatolian stone tablet, leading to the Canyon
    of the Crescent Moon, and is initially led by Henry Jones Sr. before his disappearance
    stalls progress. Indiana Jones is later recruited to resume the quest amid Nazi
    threats.
