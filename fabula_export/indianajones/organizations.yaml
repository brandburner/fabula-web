  canonical_name: British Colonial Authority (British Empire/Military)
  description: The British Colonial Authority, embodied by Captain Blumburtt, represents
    the British Empire's military and administrative presence in India during the
    1930s. Stationed at Pankot Palace, this authority conducts inspection tours, dismisses
    local superstitions (e.g., Thuggee cult resurgence, supernatural threats), and
    positions itself as a neutral but obstructive force. Its skepticism toward Indiana
    Jones's warnings highlights the tension between colonial oversight and indigenous
    beliefs, while its pragmatic dismissal of local horrors isolates protagonists
    amid escalating supernatural threats. The authority's actions reflect broader
    imperial policies of suppression and indifference to cultural/religious practices.
