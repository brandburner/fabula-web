  episode_count: 0
- fabula_uuid: ger_organization_a038e5c73ebc
  global_id: ger_organization_a038e5c73ebc
  canonical_name: Lao Che's Crime Syndicate
  description: A broad criminal organization encompassing all of Lao Che's armed enforcers,
    including but not limited to the ballroom entourage, street-level thugs, and his
    sons Chen and Kao Kan. Operates across Shanghai with tactics ranging from poisonings
    to high-speed chases.
  sphere_of_influence: Shanghai Underworld Criminal Enforcement and Pursuit
  season_appearances:
  - 1
  local_uuids:
    1: org_e012f9544dd3
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_9f6030001e1f
  global_id: ger_organization_9f6030001e1f
  canonical_name: Local Arabs
  description: Local Arabs are the indigenous population encountered around Tanis
    and in Cairo in the narrative. They appear as dig workers at the Nazi excavation
    (providing manual labor, hauling dirt, operating ropes, and with a small group
    directly assisting Sallah), as bystanders at the airstrip who witness the Flying
    Wing crash and Ark transport, and as bar patrons in Cairo who generally avoid
    involvement unless directly threatened. Sallah and other characters note that
    the occupying forces struggle to distinguish among these local groups.
  sphere_of_influence: Civilian Labor and Neutral Observation in Egyptian Excavations
  season_appearances:
  - 1
  local_uuids:
    1: org_db4bc6c7444a
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_c2b73afbe968
  global_id: ger_organization_c2b73afbe968
  canonical_name: Marcus Brody's Museum
  description: The museum institution represented by Curator Marcus Brody that acquires
    archaeological artifacts from Indiana Jones. The institution functions as an institutional
    beneficiary and buyer—providing academic legitimacy and a formal repository for
    recovered items, and framing expeditions as preservation-driven rather than private
    collection.
  sphere_of_influence: Archaeological Artifact Acquisition and Cultural Preservation
  season_appearances:
  - 1
  local_uuids:
    1: org_6aaa56c59328
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_a32d5260c5e6
  global_id: ger_organization_a32d5260c5e6
  canonical_name: Mountain Climbers
  description: International mountain climbers patronize the Raven Saloon in Patan,
    Nepal, alongside Sherpas, locals, and fugitives. They populate Marion Ravenwood's
    rough bar, establishing a Himalayan outpost vibe. Climbers carry ice axes and
    gear that Marion and fighters wield as weapons during brawls to clear the house.
    This group underscores the perilous mix of adventurers Marion manages amid tense
    negotiations and personal vendettas.
  sphere_of_influence: Nepalese Saloon Patrons and Mountaineering Equipment Users
  season_appearances:
  - 1
  local_uuids:
    1: org_768c1d0b4540
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_80876bcff324
  global_id: ger_organization_80876bcff324
  canonical_name: Museum of Antiquities
  description: The Museum of Antiquities serves as a fabricated front deployed by
    Nazi agents, including the Sinister Man, to lure Marcus Brody under the pretense
    of providing transport at Iskenderun's train station. Sinister Man claims the
    organization sent a car for Brody, but Sallah exposes the deception, sparking
    a violent escape attempt that ends with Brody's accidental capture in a Nazi troop
    truck. This ruse exploits Brody's scholarly connections and isolation, highlighting
    Nazi tactics that mimic legitimate archaeological institutions to ensnare targets
    in chaotic environments. No real structure or staff appear; it exists solely as
    a verbal ploy in the Nazis' abduction scheme.
  sphere_of_influence: Nazi Deception and Target Acquisition
  season_appearances:
  - 1
  local_uuids:
    1: org_b4d45aa290b6
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_736ff6267a13
  global_id: ger_organization_736ff6267a13
  canonical_name: Nang Tao Airfield Military Police
  description: Government/military law enforcement unit responsible for securing Nang
    Tao Airfield and enforcing access control during night operations. Their actions
    are adversarial toward Indiana Jones' group initially but later facilitate the
    protagonists' escape by confronting Lao Che's armed forces.
  sphere_of_influence: Airfield Security and Access Control
  season_appearances:
