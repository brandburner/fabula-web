  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_11268fb82cc3
  global_id: ger_organization_11268fb82cc3
  canonical_name: Nazi High Command (Berlin)
  description: Central Berlin-based strategic leadership body for Nazi operations,
    distinct from frontline units. Directs high-ranking officers (e.g., Shliemann,
    Gobler) and issues orders for critical missions (e.g., Ark recovery). Operates
    in *Raiders of the Lost Ark* (1981).
  sphere_of_influence: Nazi Central Command and Strategic Enforcement
  season_appearances:
  - 1
  local_uuids:
    1: org_937606ae245d
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_6682f9dc20cf
  global_id: ger_organization_6682f9dc20cf
  canonical_name: Nazi Regime (Military & Political Apparatus)
  description: "\n  The Nazi Regime represents the overarching political and military\
    \ apparatus of Nazi Germany, functioning as the primary antagonist force in the\
    \ quest for the Holy Grail. It operates through:\n  - **Political Structures**:\
    \ Controls institutions like the Reich Museum, Institute of Aryan Culture, and\
    \ Berlin rallies, leveraging ideological campaigns and propaganda (e.g., leaflets\
    \ for identification).\n  - **Military Operations**: Deploys soldiers, guards,\
    \ officers (e.g., Vogel), radiomen, tank crews, and infantry across strongholds\
    \ (e.g., Castle Brunwald) and desert convoys. Uses mechanized weaponry (tanks,\
    \ troop carriers, zeppelins) and coordinated brute-force tactics.\n  - **Tactics**:\
    \ Engages in psychological taunting, hostage-taking (e.g., Marcus Brody, Henry\
    \ Jones Sr.), and aggressive swarming of targets. Directly clashes with protagonists\
    \ through searches, chases, and assaults.\n  - **Key Figures**: Includes military\
    \ leaders (Vogel), political agents (Elsa Schneider), and collaborators (Walter\
    \ Donovan), all aligned under the regime's sinister ideological campaign.\n  "
  sphere_of_influence: Military Occupation and Holy Grail Acquisition in Europe
  season_appearances:
  - 1
  local_uuids:
    1: org_b593dc525347
  first_appearance_season: 1
  tier: planet
  episode_count: 2
- fabula_uuid: ger_organization_2d54265ef402
  global_id: ger_organization_2d54265ef402
  canonical_name: Nepalese Native Patrons
  description: Nepalese natives patronize The Raven saloon in Patan, Nepal, as one
    distinct demographic within a diverse crowd that includes Sherpa guides, smugglers,
    fugitives, and climbers. Marion Ravenwood violently clears them from the bar amid
    her confrontation with Indiana Jones, scattering the locals during a tense negotiation
    over a bronze sun medallion. Their presence fills the saloon, amplifying the chaotic
    atmosphere of this remote outpost.
  sphere_of_influence: Local Saloon Patronage in Rural Nepal
  season_appearances:
  - 1
  local_uuids:
    1: org_72313366c37b
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_9a763e26821e
  global_id: ger_organization_9a763e26821e
  canonical_name: Omar's Men
  description: Omar leads this group of local diggers who ally with Indiana Jones
    and Sallah during the dig-site operation. They park their truck at the desert
    dune ridge and stand ready to deliver transport across the sands and provide cover
    against pursuers. Their arrival accelerates the shift from reconnaissance to extraction,
    bolstering Indy's team with essential local manpower and vehicles in a high-stakes
    pivot.
  sphere_of_influence: Local Desert Transport and Expedition Security
  season_appearances:
  - 1
  local_uuids:
    1: org_a9133e3bf64c
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_03645675527a
  global_id: ger_organization_03645675527a
  canonical_name: Pan Am
  description: Pan Am runs the Clipper aircraft that flies Indiana Jones across the
    Pacific Ocean. This single flight compresses day into night over ocean and clouds,
    linking distant action sites and speeding the shift from planning to Nazi pursuit.
    The airline brands the plane and delivers transpacific passenger transport, marking
    reliable commercial aviation in the adventure's global chase.
  sphere_of_influence: Commercial Aviation and Transpacific Passenger Transport
  season_appearances:
  - 1
  local_uuids:
    1: org_e24a3850bdfa
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_47e0127f350d
  global_id: ger_organization_47e0127f350d
  canonical_name: Pankot Palace (Symbolic Antagonist)
  description: The palace as a **mythic and symbolic force of evil**, blamed by villagers
    in Mayapore for stealing the sacred Sankara Stone (sivalinga). This act is declared
    the root cause of regional suffering (drought, famine, childlessness, death),
    and the shaman mandates Indiana Jones to infiltrate the palace to retrieve the
    artifact. The palace functions as a **passive, almost supernatural antagonist**,
    driving the quest through its association with divine retribution.
  sphere_of_influence: Regional Despotic Authority and Sacred Artifact Theft
  season_appearances:
  - 1
  local_uuids:
    1: org_c39d73cf9df3
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_b1177555eae7
  global_id: ger_organization_b1177555eae7
  canonical_name: Pankot Palace Ruling Court
  description: The administrative and political body governing Pankot Palace, consisting
    of the Maharajah (Zalim Singh), Prime Minister Chattar Lal, and their ministers.
    This entity is responsible for the palace's operations, including the Pleasure
    Pavilion, and serves as the primary antagonist in Indiana Jones's quest, deflecting
    blame for Thuggee cult activities and Sankara Stone theft while masking its complicity
    in regional atrocities.
  sphere_of_influence: Regional Palace Governance and Thuggee Cult Complicity
  season_appearances:
  - 1
  local_uuids:
    1: org_c39d2b3cf9df3
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_8093ebcc95a6
  global_id: ger_organization_8093ebcc95a6
  canonical_name: Rajput Guards
  description: Rajput guards line the marble bridge to Pankot Palace, spears at rest.
    They snap to attention in a domino sequence as Indiana Jones, Willie Scott, and
    Short Round cross, projecting the palace's rigid discipline. This coordinated
    display enforces ceremonial protocol on arrivals, blending security with theatrical
    authority to set expectations for encounters inside.
  sphere_of_influence: Pankot Palace Ceremonial Security and Protocol Enforcement
  season_appearances:
  - 1
  local_uuids:
    1: org_759490c7b576
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_3abeffcae980
  global_id: ger_organization_3abeffcae980
  canonical_name: Reich Museum (Berlin)
  description: The Reich Museum in Berlin serves as the central Nazi repository for
    artifacts tied to the Holy Grail quest. Established as a state-controlled collection
    under the Nazi regime, it functions as a repository for supernatural relics and
    historical treasures central to Nazi ideological pursuits. Elsa Schneider delivers
    Henry Jones Sr.'s Grail Diary to the museum to prove progress in the Holy Grail
    search to Nazi leaders like Walter Donovan and Vogel. The museum is guarded by
    Nazi personnel and symbolizes the regime's authority over historical and supernatural
    artifacts, including those tied to the quest for immortality and the Grail's secrets.
  sphere_of_influence: Nazi Artifact Acquisition and Mythological Exploitation
  season_appearances:
  - 1
  local_uuids:
    1: org_f8630618047d
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_a2864c9241ce
  global_id: ger_organization_a2864c9241ce
  canonical_name: Sallah's Household
  description: Sallah's household gathers in Old Cairo's crowded dining room, where
    Fayah quiets nine boisterous children and a pet monkey that charms guests Marion
    and Indy. Sallah steers hospitality, turning chaos into respite that softens Marion's
    wariness and builds communal bonds. This family unit acts as ally and safe haven,
    humanizing outsiders amid peril.
  sphere_of_influence: Domestic Hospitality and Safe Haven in Cairo
  season_appearances:
  - 1
  local_uuids:
    1: org_b589163c2429
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_b0ff96021c2c
  global_id: ger_organization_b0ff96021c2c
  canonical_name: Shanghai Airport Customs
  description: Government-run border control authority at Shanghai Airport, responsible
    for screening international travelers and detaining threats. Operates in the legal
    domain and interacts with Indiana Jones and Nazi agents in *Raiders of the Lost
    Ark* (S01E01).
  sphere_of_influence: Airport Border Control and Traveler Detention
  season_appearances:
  - 1
  local_uuids:
    1: org_5448d194deee
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_75b6aa14c4ab
  global_id: ger_organization_75b6aa14c4ab
  canonical_name: Sherpa Mountain Guides
  description: Sherpa mountain guides gather as patrons in Marion Ravenwood's saloon
    in Patan, Nepal, alongside Nepalese natives, smugglers, fugitives, and climbers.
    They contribute to the bar's rowdy atmosphere, with one Sherpa joining a brawl
    as Marion clears the room. This loose group of rugged locals and expedition experts
    frequents the remote outpost, blending guiding expertise with participation in
    saloon scraps and daily transactions.
  sphere_of_influence: Mountain Guiding and Saloon Patronage in Nepal
  season_appearances:
  - 1
  local_uuids:
    1: org_8db260326ca3
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_48d8ff3b7c5f
  global_id: ger_organization_48d8ff3b7c5f
  canonical_name: Sleazy International Smugglers and Fugitives
  description: This patron group populates The Raven saloon in Patan, Nepal, as rough
    clientele of international smugglers and fugitives. They generate menace in the
    background crowd during tense negotiations, like Indy's deal with Marion Ravenwood
    for her father's medallion. Their presence marks the saloon as a seedy hub for
    shadowy figures—Sherpa, Climber, Mahdlo—where fists fly and deals turn personal
    amid constant threat.
  sphere_of_influence: Criminal Patronage in Nepalese Smuggler Saloons
  season_appearances:
  - 1
  local_uuids:
    1: org_287dc2a6f297
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_3d41ca6a4293
  global_id: ger_organization_3d41ca6a4293
  canonical_name: Small Eastern College
  description: Indy teaches here; college provides his office, stocked with Peruvian
    trinkets, as workplace hub. Teaching assistant Phil delivers reference books and
    fields student queries; two coeds appear routinely. It anchors academic duties
    amid intrusions like Army Intelligence summons for Abner Ravenwood, blending campus
    normalcy with external pressures.
  sphere_of_influence: Higher Education and Academic Instruction
  season_appearances:
  - 1
  local_uuids:
    1: org_ad3f8344076d
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_62d2e032ce38
  global_id: ger_organization_62d2e032ce38
  canonical_name: The Bad Guys
  description: The Bad Guys control a Nazi-directed basket and rush it through crowded
    urban streets, slipping past Indy's pursuit amid narrow alleys and human tides.
    They drive the chase antagonism, forcing Indy to abandon direct runs for high-ground
    pivots and intercepts. Their coordinated speed and crowd leverage maintain escape
    momentum against his resourcefulness.
  sphere_of_influence: Urban Evasion and Antagonistic Pursuit Operations
  season_appearances:
  - 1
  local_uuids:
    1: org_db5a59930b92
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_4600e879d578
  global_id: ger_organization_4600e879d578
  canonical_name: The Dragon Nightclub
  description: An opulent nightclub called The Dragon (The Dragon Nightclub) that
    stages extravagant, choreographed performances centered on a massive Chinese gong
    and an art‑deco pagoda stage. Signature set pieces include the Silver Stairway
    spectacle (women in lamé gowns descending in choir‑like harmony) and a dramatic
    gong sequence that anchors action — in one sequence the gong smashes through glass
    and sends characters across the roof into the street. The venue functions as a
    site of social display, power negotiation, seduction, and sudden violence; patrons
    in key scenes include Indiana Jones and Willie Scott.
  sphere_of_influence: Exotic Nightclub Performances and Social Power Venue
  season_appearances:
  - 1
  local_uuids:
    1: org_21eb7d663d30
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_8013babf3685
  global_id: ger_organization_8013babf3685
  canonical_name: Third Reich (Nazi Party)
  description: The Third Reich (Nazi Party) is the totalitarian regime ruling Germany,
    characterized by its enforcement of ideological purity through public spectacles
    like the Berlin book-burning rallies. High-ranking officers, Brownshirts, and
    Adolf Hitler orchestrate these events, where swastika banners dominate and crowds
    cheer the destruction of books. The regime stations guards at airfields to secure
    territory, projects omnipresence through silent sentinels, and aggressively pursues
    the Holy Grail diary as part of its quest for ancient power. Elsa Schneider aligns
    with its goals, positioning the Third Reich as the central antagonist force against
    Indiana Jones, Henry Jones Sr., and their allies. The regime's actions—blending
    propaganda, ideological suppression, and aggressive quests—create a hostile backdrop
    for the protagonists' confrontation with its ideology.
  sphere_of_influence: Totalitarian Regime and Ideological Enforcement
  season_appearances:
  - 1
  local_uuids:
    1: org_9f264291e03b
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_d9c3995d2b2f
  global_id: ger_organization_d9c3995d2b2f
  canonical_name: Thuggee Cult
  description: Mola Ram leads the Thuggee Cult in Kali worship through human sacrifices
    in Pankot's Temple of Death, brainwashing converts like the Maharajah and Indiana
    Jones to extract Sankara Stones from child slaves in hidden mines. Guards ambush
    intruders with rifles, arrows, and traps like spike chambers; priests chant to
    ignite stones' power. They steal artifacts from villages, send assassins to palaces,
    and pursue heroes in mine carts and bridge battles, aiming to unleash Kali's dominion
    worldwide.
  sphere_of_influence: Kali-Devoted Rituals, Human Sacrifice, and Sankara Stone Acquisition
  season_appearances:
  - 1
  local_uuids:
    1: org_4364bfaace4a
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_a371c40463b6
  global_id: ger_organization_a371c40463b6
  canonical_name: Turkish Soldiers
  description: Turkish Soldiers charge on horseback into the desert valley battle
    pitting Kazim’s Brethren against Donovan’s Nazi forces. They function as neutral
    combatants, possibly aligned with the Brethren, providing cavalry support amid
    the chaos. Indy targets one, dismounting the rider to seize his horse for escape.
    Their presence heightens the skirmish's desperation, clashing with mounted Nazis
    and rifle-armed Brethren in a fight over the Grail convoy.
  sphere_of_influence: Regional Military Cavalry in Desert Conflicts
  season_appearances:
  - 1
  local_uuids:
    1: org_8eafdd90cbb1
  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_18e54783c8ff
  global_id: ger_organization_18e54783c8ff
  canonical_name: Wurrfler Crew
  description: Crew of the Nazi U-boat Wurrfler responsible for manning the conning
    tower, periscope, turrets, and dive procedures during the submarine's covert transport
    of the Ark of the Covenant. Under their captain's direction they prioritize evasion
    (ordering dives and departure) over unprovoked attacks, execute radioman and aide
    duties during engagements and docking at the sub base, and participate in Ark
    unloading operations—events during which they nearly detect Indiana Jones. The
    unit's actions are described across the same sea-encounter scenes (including interactions
