    a voodoo doll, from the dinner table in the Pleasure Pavilion. He turns it over
    in his hands while questioning Chattar Lal and Captain Blumburtt about Thuggee
    practices. Short Round, Willie Scott, and the others watch as Indy sets it down,
    its crude features highlighting the cult's occult rituals amid the grotesque feast
    of eels, eyeballs, and monkey brains.
  purpose: Thuggee cult tool to exert power over enemies through voodoo-like manipulation
  significance: Serves as a physical clue to the Thuggee cult's resurgence in Pankot
