  description: Indiana Jones hunches over Abner Ravenwood’s journal in the dim, rattling
    cabin of a DC-3 flying west at night. The meager seat light casts long shadows
    across its pages as Indy studies its contents intently, brow furrowed, piecing
    together clues to the Ark’s location. The journal pairs with a Nepalese map, both
    critical to his mission amid the unseen gaze of a trenchcoated European spy watching
    from nearby rows.
  purpose: Deciphering clues about the Ark’s location
  significance: Links Indy’s personal history with mentor Abner Ravenwood to the high-stakes
