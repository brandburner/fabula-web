  global_id: ger_object_a81767b92130
  canonical_name: Scraped Cliff Wall in Tank Chase
  description: Sheer rock cliff wall looms ahead as the Nazi tank surges forward during
    the high-speed pursuit. Its massive gun barrel grinds against the rugged face,
    dislodging loose stones that cascade down onto Indiana Jones, who hangs precariously
    from the treads below. Vogel looms nearby, exploiting the chaos, while the scrape
