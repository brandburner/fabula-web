  canonical_name: Tanis Dig Concealment Tent
  description: A tent stands amid the chaotic Tanis excavation site under morning
    light. Indiana Jones and Sallah, disguised as Arab diggers, ride in the back of
    Sallah's truck. The truck passes behind the tent, shielding the pair from Nazi
    guards' view. They vanish completely, slipping past scrutiny into the camp's heart
    without detection.
  purpose: Concealment and hiding during covert infiltration
  significance: Transforms reconnaissance into infiltration for Indy and Sallah. Positions
    them inside Nazi lines at Tanis, escalates the Ark quest, and highlights their
    bold improvisation and mutual trust.
