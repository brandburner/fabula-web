  description: Canvas tents pack the cramped Nazi camp at the Tanis dig site. Indy
    hugs their taut sides for shadow cover, reads seams to slip through flaps into
    one, dodging two chatting officers. He and Marion duck behind a flap for concealment.
    Sallah runs their lines evading patrols. Indy darts between them pursuing the
    Ark truck, then bursts from their fringe on a white stallion, horse pounding sand.
  purpose: Supply narrow passages, cover, concealment, and movement corridors amid
