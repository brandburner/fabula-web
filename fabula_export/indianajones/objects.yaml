  description: Massive stone elephants perch atop columns lining the edges of a molten
    lava crevasse in the Thuggee Temple of Death. Indiana Jones latches his bullwhip
    onto one statue's protruding tusk, swings across the glowing abyss, and lands
    on the far side amid the ritual's chaos. The statues loom as ancient sentinels,
    their tusks offering precarious grips amid the heat-shimmering rock and cult chants.
  purpose: Architectural supports doubling as improvised swing anchors over lava crevasses
  significance: Bridge the deadly gap between vantage points and the Sankara Stones
    altar, enabling Indy's infiltration amid the heart-ripping ritual and escalating
    the trio's fight against Thuggee fanaticism
