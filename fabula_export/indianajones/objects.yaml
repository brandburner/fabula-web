  description: A ceremonial flame urn used in Thuggee rituals, located in the Kali
    shrine chamber amid skulls and snakes. Maharajah Zalim Singh dips voodoo dolls
    (e.g., of Indiana Jones) into its fire to ignite them and channel supernatural
    pain through black magic. The urn's steady flames enable the ritual's torment,
    witnessed by chained victims (e.g., Indy, Short Round) and cult members (Mola
    Ram, Nainsukh). Its purpose is to inflict remote burning pain on targets during
    brainwashing rituals.
