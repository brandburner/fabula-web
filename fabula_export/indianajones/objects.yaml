  potential_owner_uuid: null
- fabula_uuid: object_87cfc7042747
  global_id: null
  canonical_name: Castle Hallway Glass
  description: A glass prop rests amid the shadowed tension of the castle hallway
    during the standoff between Indiana Jones, Henry Jones Sr., Elsa Schneider, and
    Colonel Vogel. It stands unused as Elsa slips the Grail Diary from Indy's pocket,
    heightening the betrayal's stark intimacy without drawing direct interaction from
    the characters locked in confrontation.
  purpose: ''
  significance: ''
  potential_owner_mention: ''
