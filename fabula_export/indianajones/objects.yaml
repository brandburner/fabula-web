- fabula_uuid: ger_object_25301d840abb
  global_id: ger_object_25301d840abb
  canonical_name: Stuff on the Tunnel Floor
  description: Unidentified objects litter the tunnel floor, prompting Willie's sharp
    cry of 'Ohh! What’s that?! There’s stuff all over the floor!' as she hesitates
    at the entrance. Her fear and disgust spike, amplifying her reluctance to descend
    into the dark passage while Indiana Jones urges her forward from off-screen. The
    clutter turns the threshold into an immediate obstacle, blending physical hindrance
    with psychological dread amid the dirt and shadows.
  purpose: Obstacle impeding passage through the tunnel
  significance: Triggers Willie's visceral fear, exposing her vulnerability and self-centeredness
    against the mission's urgency; foreshadows deeper perils and catalyzes her evolving
    trust in Indiana Jones.
  potential_owner_mention: ''
  potential_owner_uuid: null
