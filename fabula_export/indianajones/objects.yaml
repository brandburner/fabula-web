    Saloon bar. The glass appears during Indy’s interaction with Marion—he holds or
    has it set before him while brawls and a heated negotiation occur; Marion grabs
    and refills it at one point and thrusts it back toward him. The prop functions
    as a non-alcoholic beverage and a visual anchor that underscores Indy’s relative
    calm amid the saloon’s chaos.
