  canonical_name: Nazi Dock Sentry's Bunker and Mounted Machine Gun
  description: A makeshift bunker constructed from coarse burlap sacks filled with
    seeds, positioned at the dock's end of the tracks. This bunker conceals a Nazi
    sentry and his mounted machine gun. The sentry perches atop the sacks in disguise
    until he throws the covering aside to fire a panicked barrage at Indiana Jones
    and Marion Ravenwood's hurtling mine car. Bullets rake the area, forcing Indy
    and Marion to huddle together for cover. The mine car smashes through the bunker,
    crushing the gun, sentry, and sacks in a violent debris explosion. The destruction
    eliminates the Nazi sentry's defense, highlighting human fragility against the
    Ark's path and turning resistance into accidental mercy through chaos.
  purpose: Firing suppressive bursts at the approaching mine car to halt Indiana Jones
    and Marion Ravenwood's escape.
  significance: Its destruction in the collision eliminates the Nazi sentry's defense,
    highlighting human fragility against the Ark's path and turning resistance into
    accidental mercy through chaos.
  potential_owner_mention: Nazi Sentry
  potential_owner_uuid: agent_e66cd60d137d
- fabula_uuid: object_632d4aa0a0b1
  global_id: null
  canonical_name: Nazi Dock's Large Box
  description: Static obstacle in the Nazi underground harbor, destroyed by the Joneses'
    motorbike to reveal the escape route. Unlike the harbor's boats, this is a non-motorized,
    inanimate object serving as a barrier.
  purpose: Obstacle and cover for motorbike escape from Nazi dock
