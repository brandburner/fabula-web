    her neck to threaten execution. Indiana Jones surrenders his own weapon in response,
    lowering his guard as Elsa feigns distress nearby.
  purpose: Threaten and execute hostage in standoff
  significance: Forces Indy's disarmament, enabling Elsa to steal the Grail Diary
