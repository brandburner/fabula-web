    desert convoy during the tank chase. Indiana Jones turns the tank around, forcing
    the Kubelwagon to collide with its side. The tank crew fires a shell that obliterates
    the vehicle, killing its occupants and clearing the path ahead amid flying debris
    and chaos.
  purpose: Transport Nazi personnel through desert terrain as part of armored convoy
    operations.
  significance: Its destruction after colliding with the redirected tank underscores
    Indy's disruption of Nazi pursuit, produces casualties that highlight convoy vulnerabilities,
    and propels the high-stakes chase forward.
  potential_owner_mention: Colonel Vogel
  potential_owner_uuid: agent_4f38fa02fcdb
