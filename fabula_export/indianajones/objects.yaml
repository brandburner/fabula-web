  global_id: ger_object_9bcb35ba8691
  canonical_name: Henry Jones Sr.'s Pictures, Charts, and Maps
  description: Pictures, charts, and maps cover the walls of Henry Jones Sr.'s claustrophobic,
    book-packed study, underscoring his immersion in Medieval and Grail scholarship.
    They backdrop his ritual—hunched sketching of ancient symbols on parchment, Greek
    murmurs ignored—as Indiana Jones pleads urgently, then loom during the trumpet-blaring
    arrival of Herman and two men, shifting focus from obsession to threat.
  purpose: Visual references for Grail cipher decoding and Medieval research
  significance: Crystallize the clash between Henry's scholarly detachment and Indy's
    survival instincts, their presence amplifying the study's tense atmosphere as
    family rift meets external danger
  potential_owner_mention: Henry Jones Sr.
  potential_owner_uuid: ger_agent_0d242065c61a
