  canonical_name: Indiana Jones' Silk-Wrapped Food Bundle
  description: A silk-wrapped bundle of breads and fruits prepared by Indiana Jones
    for Willie Scott. The smooth silk cloth securely packages the contents, which
    Indiana presents to Willie during the lantern-lit feast in the palace's Pleasure
    Garden. The bundle contrasts with the unnatural meats served at the feast, offering
    familiar provisions that delight Willie and spark flirtatious banter between them.
    The scene occurs amid tense palace interactions involving Short Round, Maharajah
    Zalim Singh, Chattar Lal, and Capt. Blumburtt, with Indiana handling the wrapping
    during the whip demonstration and cult revelations.
  purpose: Gift of familiar provisions contrasting the bizarre dinner
  significance: Highlights Indiana's care for Willie; underscores the palace's eerie
    hospitality; ignites their flirtation amid rising Thuggee tension
