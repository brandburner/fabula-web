  canonical_name: Wrapping Cloth for the Cross of Coronado
  description: Indiana Jones unwraps this protective cloth in the lecture hall to
    reveal the Cross of Coronado to Marcus Brody. He handles the fabric with reverence
    after his lecture on archaeological skepticism, drawing attention from watching
    students and a pretty coed. The cloth shields the gold artifact during transport
    and unveiling, marking Indy's hard-won prize.
  purpose: protective wrapping
  significance: Tangible proof of Indy's triumphant recovery of the Cross; its careful
    unwrapping underscores his passion for preserving history and foreshadows the
    artifact's role in drawing relic hunters while strengthening his bond with Brody.
