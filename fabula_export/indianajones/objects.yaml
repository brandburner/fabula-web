    deputy) and the Man in the Panama Hat (Fedora) during the theft of the Cross of
    Coronado. The transaction occurs as Roscoe surrenders the relic to the gang leader,
    finalizing the betrayal of young Indy. The money—handed directly from Fedora to
    Roscoe—seals the deal that strips Indy of the artifact, with Roscoe pocketing
    the cash without hesitation amid Indy's protests. This payment symbolizes the
    corruption of local law enforcement and the gang's control over the relic's fate.
