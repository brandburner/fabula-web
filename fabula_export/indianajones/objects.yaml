  canonical_name: Belzig's Heated Iron Poker
  description: A heavy iron poker Belzig heats in The Raven's fireplace until its
    tip glows red-hot; he uses it to threaten Marion while demanding the medallion.
    Indy cracks his whip to yank the poker free, sending it into the curtains where
    it ignites the bar's fire.
  purpose: Torture tool to burn and extract information through intense heat
  significance: Belzig wields it to break Marion's resistance, but Indy's intervention
