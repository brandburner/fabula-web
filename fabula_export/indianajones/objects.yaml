- fabula_uuid: ger_object_253876361601
  global_id: ger_object_253876361601
  canonical_name: Loose Stone from Tunnel Wall
  description: "\n      Willie Scott dislodges this loose stone from the tunnel wall\
    \ during her panic in the claustrophobic passage. Its removal exposes a hidden\
    \ hole swarming with insects, revealing the lever inside. The stone rolls free\
    \ as the group faces deadly spikes nearby, turning Willie's terror into action.\
    \ Indy shouts encouragement while Short Round pleads, heightening the moment's\
    \ desperation.\n      **Additional Context**: The stone is a *structural element*\
    \ of the tunnel, distinct from generic debris or loose rocks in other contexts\
    \ (e.g., temple walls). Its dislodgment is a *critical plot beat* that directly\
    \ enables the group's escape by activating the lever mechanism.\n      "
  purpose: Triggers discovery of the hidden lever in the insect-filled hole
  significance: Sparks Willie's courageous act of reaching into the bug nest to pull
    the lever, which opens the door and retracts spikes saving Indy and Short Round.
    Marks her shift from bystander to survivor amid escalating temple perils.
  potential_owner_mention: ''
