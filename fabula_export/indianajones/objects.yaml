  description: Indy barrels his truck through the open door into the garage; it slams
    shut behind him, sealing his entry. Omar's allies immediately unfurl tents over
    it, plant fruit carts and baskets, while two boys sweep away tire tracks—erasing
    all signs as Belloq and Shliemann roar past undetected.
  purpose: Conceals vehicles and activity from pursuers by slamming shut and enabling
    rapid camouflage.
  significance: Buys Indy crucial escape time during the Tanis chase, powered by Omar's
    network loyalty that outmaneuvers Nazi hunters and flips pursuit dynamics.
