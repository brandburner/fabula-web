  canonical_name: Forrestal's Remains
  description: Half-fleshed, half-skeletal corpse of explorer Forrestal impaled on
    the chamber's giant spikes. After Indy triggers the trap with a thrown stick (or
    similar action), the spikes retract; Indy pries the remains free, seats the body
    against the wall, and identifies the victim as Forrestal while Satipo recoils
    in horror.
