  description: A huge Arabian sword hides in the cramped sunlit aisle of the small
    bazaar, rigged as a mechanical trap that swings down abruptly to slash at Indy.
    He ducks under the descending blade with sharp reflexes, then delivers a groin
    kick to the Bad Arab Swordsman who triggered it. The sword embodies the chase's
    improvised perils amid market chaos.
  purpose: Mechanical trap that swings down to maim or kill intruders
  significance: Highlights Indy's animal reflexes and brutal efficiency in combat,
    sustains chase tension, and reveals the lethal, trap-laden environment surrounding
    the Ark hunt
