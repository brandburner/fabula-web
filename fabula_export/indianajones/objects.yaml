    Indy, Willie and Short Round climb aboard, the co-pilot slams this heavy cabin
    door shut, sealing the fugitives inside as engines rev and the neon-lit city falls
    away. Later in flight the same doorway is opened and used as a firing aperture
    when Short Round hauls a machine gun to the opening while Willie feeds the ammunition
    belt, exposing the occupants to wind and enemy fire as they defend against pursuing
    fighters.
  purpose: Seals the passenger cabin to secure occupants during takeoff
