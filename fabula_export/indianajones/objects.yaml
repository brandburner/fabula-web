  description: Heavy metal hatch atop the conning tower of the Nazi U-boat The Wurrfler
    seals the deck from the interior compartments. The Captain and his aides descend
    through it as water floods the deck during dive preparations. An aide pulls the
    hatch shut with a clang, isolating the bridge crew below while Indiana Jones fights
    to board from outside, lashing himself to the exposed periscope.
  purpose: Grants access between the conning tower deck and the submarine's lower
    decks for crew entry and exit.
  significance: Marks the crew's final withdrawal below as the sub submerges, trapping
    Indy in a desperate scramble and shifting the scene from open confrontation to
    covert infiltration.
