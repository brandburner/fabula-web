  global_id: ger_object_aa28ead9ef68
  canonical_name: Second Attacking Fighter Plane
  description: This sleek enemy fighter plane dives sharply at the DC-3 during an
    intense aerial pursuit. Short Round fires an improvised machine gun from the cargo
    hold, aiming to down it amid the chaos in the passenger cabin. His shots miss
    the agile attacker and rip into the DC-3's engine instead, sparking a catastrophic
    explosion. Willie cowers nearby as the assault heightens the peril for all aboard.
  purpose: Pursues and attacks the DC-3 to shoot it down
  significance: Transforms Short Round's brief triumph into disaster through friendly
    fire, shredding trust among Indy’s crew and forcing an emergency crash landing
