- fabula_uuid: ger_object_241b8f5259eb
  global_id: ger_object_241b8f5259eb
  canonical_name: Spike Chamber's Hidden Door Mechanism
  description: 'A two-part escape mechanism in the Spike Chamber: (1) A **hidden door**
    embedded in the wall, activated by a lever within a bug-infested hole, which retracts
    deadly spikes to reveal an escape tunnel; and (2) A **pushable rock** on the chamber
    wall, triggered by Indiana Jones immediately after the lever pull, that swings
    open the door to complete the escape route. Together, these components form a
    critical barrier between the spike chamber and the tunnel, requiring coordinated
    actions (Willie pulling the lever, Indy pushing the rock) to unlock. The mechanism
    is tied to the insect nest lever and gusts with ominous wind upon activation,
    heightening tension as the group is forced deeper into peril.'
  purpose: Push-activated mechanism to open hidden escape door
  significance: Provides critical escape route post-spike crisis, marking team progression
    from trapped victims to active explorers while hinting at deeper temple dangers
