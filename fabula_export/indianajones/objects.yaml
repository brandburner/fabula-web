  description: Thick crimson cord suspending the massive three-meter brass gong above
    Lao Che's nightclub ballroom floor. The cord is integral to the gong's mechanical
    support, and its slashing during Wu Han's assassination triggers the gong's release,
    transforming it into an improvised shield that ricochets bullets and enables Indiana
    Jones and Willie Scott's escape through a stained-glass window. Earlier, the gong
    is struck by a muscular slave to spotlight Indiana Jones's dramatic entrance during
    the tense exchange over Nurhachi's ashes and the diamond.
  purpose: Ceremonial instrument struck during nightclub performances to punctuate
    dramatic moments
  significance: Boom signals Indy's arrival in the high-stakes deal, heightens tension
    before betrayal and gunfire erupt, transforming the opulent ballroom into chaos
