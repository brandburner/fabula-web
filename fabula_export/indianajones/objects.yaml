- fabula_uuid: ger_object_260610da01c4
  global_id: ger_object_260610da01c4
  canonical_name: Indy's Bazooka
  description: Indiana Jones shoulders a bazooka as he bursts into the Tabernacle,
    aims it directly at the Ark, and demands Marion's release under threat of destruction.
    Nazis swiftly overpower him, wrench the weapon away, and disarm the standoff.
    The heavy tube becomes instant leverage, halting executions and forcing Belloq
    to invoke ritual protections amid gold robes and solemn chants.
  purpose: Threaten and destroy the Ark to force release of Marion Ravenwood
  significance: Interrupts Belloq's sacred invocation, pits Indy's desperation against
    Nazi ambition and religious awe, transforms Indy from intruder to protected bargaining
    chip, and escalates the Ark's moral jeopardy toward public spectacle
  potential_owner_mention: Indiana Jones
