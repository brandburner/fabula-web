  description: Donovan unlocks the steamer trunk in the sunlit courtyard, revealing
    gold and silver objects alongside stolen artifacts. These ornate treasures gleam
    as he offers them to the Sultan to buy military support, including escorts and
    tanks. Vogel stands by while Nazi soldiers guard the display. The Sultan glances
    past them, fixated on the Rolls-Royce's chrome curves and mechanical specs, dismissing
    the bribe outright.
