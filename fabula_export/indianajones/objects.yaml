    water spraying upward as the inflatable raft smashes through it. Indiana Jones
    steers from the prow while Willie Scott and Short Round grip the sides; the collision
    jolts the craft, scatters water over the passengers, and shifts their path downward
    into jagged rocks. This brief crossing amplifies the chaos of the descent.
  purpose: Act as a water hazard that disrupts the raft's trajectory during high-speed
    mountainside escape
  significance: Intensifies the peril in the runaway raft sequence, forcing Indiana's
