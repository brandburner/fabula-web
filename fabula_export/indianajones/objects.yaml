  description: Indy swims to Jock's amphibious plane skimming the Urubamba River at
    dusk and grabs the metal strut as a handhold. He pulls himself aboard with its
    aid while the engines roar and water churns, steadying against the rocking fuselage
    amid the chase. Jock pilots steadily as Indy hauls up, the strut bearing his desperate
    grip.
