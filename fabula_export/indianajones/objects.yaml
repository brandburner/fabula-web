  global_id: ger_object_7e2b98e51327
  canonical_name: Thuggee Quarry Bucket-Chain
  description: A heavy metal chain suspended in the Thuggee quarry cavern, linked
    to a series of mining buckets used for ore transport. The chain serves as an improvised
    climbing aid, dangling from the upper balcony where the Maharajah's ritual takes
    place. Short Round seizes this chain during the climactic battle, using it as
    a makeshift elevator to ascend hand-over-hand to the elevated platform. His ascent
    disrupts the voodoo doll ritual controlling Indiana Jones, while the chain clanks
    and sways under his weight amid the chaos of mine carts, Thuggee guards, and the
    looming Thuggee giant below.
  purpose: Climbing aid to access elevated balcony
  significance: Short Round's climb breaks Kali's spell on Indy by stabbing the voodoo
    doll, freeing him to defeat the giant and fueling the group's desperate escape
    through the mines.
