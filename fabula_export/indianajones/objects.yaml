  global_id: ger_object_9d003f026fde
  canonical_name: Indiana Jones' Speedboat (Harbor Chase)
  description: "\n  A speedboat used by Indiana Jones and Elsa Schneider during a\
    \ high-speed harbor chase to escape Kazim and Turkish agents. The vessel is relentlessly\
    \ pursued, sustaining heavy machine gun fire that riddles its hull. The chase\
    \ culminates in a dramatic collision between two massive freighters, crushing\
    \ the speedboat between them. The rear of the boat bursts into flames as it drifts\
    \ toward the spinning propellers of a steamer. Indy and Elsa are forced to abandon\
    \ the wrecked vessel mid-collapse, with Indy leaping to the enemy boat while grappling\
    \ Kazim in a desperate struggle. Elsa later intervenes to pull them to safety.\n\
    \  "
  purpose: Evade pursuit during high-speed harbor chase
  significance: Serves as initial escape vehicle and site of initial damage, propelling
    Indy into direct combat on Kazim's boat and triggering revelations about his father's
    location
