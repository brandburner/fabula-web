  canonical_name: Hanging Lamp Bowl in Sallah's Truck Cab
  description: A decorative bowl-shaped fixture suspended from the ceiling of Sallah's
    truck, distinct from the truck's central table. It serves no functional role beyond
    a brief comic interaction (Indy tossing a date into it).
  purpose: Overhead lighting for the truck interior; catches thrown objects to trigger
    comic beats
  significance: Delivers brief humor that underscores life's persistence—echoing Sallah's
    words on grief—while the poisoned dates it receives heighten espionage tension
    and resolve against the Nazis.
  potential_owner_mention: Sallah
