  description: Sturdy wooden poles that Indy and Sallah pull from a crate and thread
    through rings on the Ark of the Covenant and its wooden shipping crate. The group
    rigs them into a hoist system to lift the crated Ark upward from the snake-choked
    Well of the Souls. Belloq, Shliemann, and Gobler join the effort at the rim, securing
    the poles to haul the artifact free as torches flicker and asps surge forward.
  purpose: Rigging and lifting the crated Ark out of the Well of the Souls
  significance: Enables extraction of the humming, snake-repelling Ark from the pit,
    shifts the scene from reverent discovery to coordinated labor under Nazi oversight,
    and strands Indy below as the poles carry away his prize.
