  canonical_name: Fayah's Food Tray (in Sallah's truck)
  description: A single tray of food—loaded with dates, cheese, bread (also described
    with a chicken leg and grapes in some accounts)—carried into Sallah's crowded
    truck by Fayah and set out for Indy, Sallah, Amir, and Fayah. During the tense
    discussion a monkey snatches and eats the dates, convulses, and dies; Sallah removes
    the remaining date and identifies the dates as poisoned.
  purpose: Provides food and drink to the group during planning
  significance: Exposes Nazi poisoning plot when dates kill the monkey, shifting mood
    from hope to alert
