  description: Fresh snow caps the jagged mountain summit, where the DC-3's wings
    scrape it loose in a inches-from-disaster clearance, sending flakes flying. Downslope,
    it blankets the steep mountainside in slick layers that hide logs and form deceptive
    drifts, accelerating the inflatable raft's plunge while Indy steers with ropes
    amid bounces over streams and rocks. Willie screams in terror; Short Round grips
    tight as the snow heightens every jolt.
  purpose: Coats steep terrain to create slick, fast descents that conceal hazards
    like logs and rocks
  significance: Signals the plane's narrow escape over the peak and transforms the
    trio's raft flight into a punishing survival gauntlet, amplifying Willie's panic
    against Indy's command and Short Round's resolve
