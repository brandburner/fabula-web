  description: The shaman extracts and drips this clear liquid water drop by drop
    onto the little boy's cracked lips inside the shadowed hut. The boy, gaunt from
    poisoning, stirs and revives under the elders' gaze as Indy and Short Round watch.
    This targeted application revives him fully, prompting his Sankara whisper and
    shifting the story's course.
  purpose: Revive poisoned villagers through ritual dripping onto lips
  significance: Triggers the little boy's recovery and revelation of 'Sankara,' linking
