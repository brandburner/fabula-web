  description: Opulent marble corridors and ivory courtyards within Pankot Palace,
    dazzling visitors with inlays of mirrors, semi-precious stones, and cascading
    water fountains that evoke 'liquid wealth.' The group—Indiana Jones, Willie Scott,
    Short Round, Chattar Lal, and two female servants—walks these labyrinthine halls,
    where Willie examines the Portraits of the Pankot Princes (her awe turning to
    disillusionment) and Indy fields Chattar Lal's probing questions. The fountains
    serve as a symbolic centerpiece of the palace's opulence, amplifying its visual
    splendor before tensions escalate.
  purpose: Architectural passageways escorting guests through the palace
  significance: These halls mask Pankot Palace's dangers as a gilded trap. Their beauty
    contrasts Willie's naive fantasies with Indy's distrust, heightening tension before
    the evening ambush. Mirrors reflect the duality of charm hiding Thuggee brutality.
  potential_owner_mention: Pankot Palace
  potential_owner_uuid: agent_0e1e6227ac79
