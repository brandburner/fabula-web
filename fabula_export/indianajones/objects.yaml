  description: Door in a remote Himalayan hut where Indiana Jones and Short Round
    take shelter; serves as a breach point for cult danger, framed by intruding wind
    and shadows. Contrasts with the cabin door in *Raiders* by emphasizing isolation
    and peril over intimacy.
  purpose: Barrier and access point to the hut
  significance: Heightens Indy's vigilance, signaling the cult's threat invading their
    refuge and escalating the Sankara Stone hunt
