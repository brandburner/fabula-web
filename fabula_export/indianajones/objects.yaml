  description: 'A titanic zeppelin that appears in multiple scenes of the episode:
    it moors outside the German terminal where passengers (including Indiana Jones
    and Professor Henry Jones Sr.) queue to board, and later rises from an airfield
    tarmac—at one point carrying a small airplane lashed to its underbelly as it ferries
    fugitives away. The airship functions as a passenger transport and as the narrative
    escape vehicle whose departure inflicts humiliation on Nazi forces.'
