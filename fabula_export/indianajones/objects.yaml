  canonical_name: German Boarding Rafts
  description: Rafts launch from a semicircle of ten German wolf submarines on the
    horizon, their deck guns trained forward. Multiple heavily-armed boarding parties
    ride these rafts as they close on Captain Katanga's ship. Katanga spots them from
    the bridge, grabs Indy's arm, and orders him and Marion below decks to evade capture.
  purpose: Transport heavily-armed boarding parties from submarines to target vessel
  significance: Signal overwhelming Nazi naval force and imminent capture, halting
    Indy's action and forcing concealment; underscore Katanga's protective command
    amid existential threat
