  global_id: ger_object_73c4f9a53808
  canonical_name: Secluded Book-Lined Aisle
  description: Shadows cloak this narrow aisle in the library stacks, its walls lined
    floor-to-ceiling with books that form a natural barrier. Kazim and his armed men
    drag Marcus Brody's unconscious body deep into its recesses after knocking him
    out, exploiting the confined space to conceal the abduction from immediate view
    amid the echoing marble floors and spiral stairs.
  purpose: Hiding spot for concealing an abducted body during extraction
  significance: Transforms the library's scholarly quiet into a site of violence;
    Brody's concealment here forces Indy into a personal rescue mission, heightening
    the Nazis' threat through targeted capture of his ally.
