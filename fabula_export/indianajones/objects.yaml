  description: Indy opens the Grail Diary aboard the airliner and traces the stained-glass
    window sketch's worn edges. Below it lie the numbers, their tight arrangement
    hinting at encoded meaning. He studies them intently amid the flight's hum, marking
    his shift to active questing.
  purpose: Code or map unlocking the Grail's location
  significance: Transforms the diary from family relic to active compass, providing
    first concrete Grail steps and heightening race against Nazis.
