  description: Indy and Henry cram the motorcycle—with Henry in the sidecar—inside
    this large wooden crate amid the underground harbor docks. Nazis storm past it
    unnoticed in their rage over the missing motorboat. Indy ignites the engine from
    within, splintering the crate apart in a burst of debris as the bike roars free,
    clipping soldiers into the river.
  purpose: Conceals escape vehicle and occupants from pursuers
  significance: Powers Indy's improvisational escape, catches Nazis off-guard for
