  global_id: ger_object_6aae6f6db78d
  canonical_name: Indy's $5,000 Cash
  description: Indy slaps a stack of crisp American bills totaling five thousand dollars
    onto the bar amid the chaos of Marion's saloon brawl purge. Marion leans close,
    sniffs the money to savor its scent and confirm Indy's commitment, then pockets
    it as down payment for her medallion piece. The cash gleams under dim lights,
    drawing eyes from lingering patrons like Mahdlo and the brawlers.
  purpose: Down payment securing Marion Ravenwood's cooperation for the quest medallion
    piece
  significance: Tests Indy's trust through upfront payment and Marion's ritual sniff,
    forging their tense alliance from past grief into Ark pursuit stakes
