  global_id: ger_object_c2040e8dbd9c
  canonical_name: Indy's Bread
  description: Bread rests on the food spread inside Sallah's truck under night skies
    outside the Arab bar. Indy selects it during headpiece triumph, while the monkey
    grabs poisoned dates and drops dead. Sallah, Amir, and Fayah share the moment;
    the bread stays safe and untouched, a simple prop as alarm replaces levity.
  purpose: Snack for the group during their roadside pause
  significance: Highlights peril by contrast—safe bread vs. lethal dates—signals Nazis'
    ruthless proximity without targeting Indy directly
