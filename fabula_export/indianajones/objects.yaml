  canonical_name: Fedora's Crew's Shovels and Pick-Axes
  description: Used for the physical labor of excavating the Pueblo kiva's chamber,
    including striking stone and soil to unearth the Cross of Coronado. These tools
    are wielded by Fedora's men (Roscoe, Rough Rider) and later abandoned in favor
    of hand-digging, while Indiana Jones observes their use from hiding.
  purpose: Excavating the Pueblo kiva's buried chamber to access and unearth the Cross
    of Coronado
  significance: These tools enable the grave robbers' plunder of the sacred artifact,
    igniting young Indiana Jones's moral outrage and prompting his first bold attempt
    to reclaim the Cross for preservation.
