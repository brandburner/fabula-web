  global_id: ger_object_b9f1c3a7bdbe
  canonical_name: Crashed Biplane
  description: Wreckage of the biplane scatters across a field after skidding through
    a goat corral and smashing into a farmhouse. Twisted fuselage and exposed cockpits
    fill with dust as Indiana Jones and Henry Jones Sr. climb out amid panicked goats
    and strafing runs from Nazi Messerschmitts. The battered airframe, damaged from
    mid-air combat and botched landing, forces the pair to dive for cover behind a
    stone wall while bullets tear divots in the earth nearby.
  purpose: Escape vehicle for Indiana Jones and Henry Jones Sr. during Nazi pursuit,
    providing short-range flight until combat damage causes uncontrolled crash.
  significance: Ignites chaos that exposes fractures in Indy and Henry's relationship—Indy's
    calm reflexes contrast Henry's shock—while propelling them into a desperate ground
    escape under fire.
