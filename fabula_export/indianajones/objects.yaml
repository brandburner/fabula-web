  description: Permanent textual artifact painted on the tunnel wall beneath a prince's
    portrait, discovered by Short Round and translated by Indiana Jones to reveal
    the Thuggee cult's clues. Glows faintly and ties to the Mayapore villagers' curse.
  purpose: Conveys a directive to follow Shiva's path without betrayal, serving as
    a navigational clue within the cult's hidden tunnels.
  significance: Echoes the fragment from the Mayapore boy, confirming Thuggee cult
    infiltration into the palace suite and spurring Indiana Jones to venture deeper
    despite risks to the group.
