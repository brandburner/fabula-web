  description: Short Round grabs a vine from an overhanging tree branch in the lower
    jungles, pulls it down to reach clusters of wild fruit, and feeds the ripe produce
    to the baby elephant he has climbed onto. Indiana Jones, Willie Scott, Sajnu,
    and the group watch Short Round's resourcefulness and warmth. The vine serves
    as a tool for harvesting the fruit, which fuels a cheerful moment of bonding amid
    the trek before giant bats swarm overhead, shattering the mood into terror.
  purpose: Tool to reach and acquire wild fruit from high branches
  significance: Sparks a brief moment of levity and bonding amid the caravan trek,
