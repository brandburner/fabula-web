  description: Charts and maps paper over tables and walls in the cramped Tanis command
    tent. Shliemann jabs at Belloq's miscalculations traced on them; Gobler scans
    operational details as tensions mount; Belzig arrives amid the fray. They reveal
    excavation shortfalls, turning professional dispute into threats.
  purpose: Planning aids tracking Tanis excavation progress and site analysis
  significance: Expose dig delays to ignite Nazi team fractures, isolate Belloq, and
