  global_id: ger_object_6debbac810c2
  canonical_name: False Grail Goblet (Donovan’s Cursed Selection)
  description: A *portable, man-made decoy* crafted to exploit the greed of Grail
    seekers. Unlike the Grail chamber well, this goblet is an *active instrument of
    death*, embedded with a curse that triggers rapid aging when drunk from by an
    unworthy individual (e.g., Donovan).
  purpose: Decoy vessel designed to lethally punish incorrect Grail selections by
    inducing rapid aging upon drinking
  significance: Donovan's gruesome death exposes the Grail trials' merciless judgment,
    contrasts the humble true Grail, and heightens the stakes as Indy races to save
    his father, shattering illusions of easy immortality
