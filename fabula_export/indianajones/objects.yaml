  global_id: ger_object_17a85c31ad17
  canonical_name: Sallah's Five Camels
  description: Sallah leads five camels into the desert valley amid the tank chase
    chaos. He offers them as compensation for his brother-in-law's destroyed car.
    Indy dismisses the gesture as unnecessary, urging immediate action to rescue his
    father from the Nazi tank. The camels mill about in the dust while Indy and Sallah
    charge forward, underscoring the shift to desperate personal stakes.
  purpose: Transportation
  significance: Highlights Sallah's resourcefulness in replacing lost vehicles during
    crisis, adding to the scene's frenzy as family peril overrides practical aid.
