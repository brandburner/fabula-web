  global_id: ger_object_18271b1127b1
  canonical_name: Indy's Canvas Drawstring Bag
  description: Indy pulls a small plain canvas drawstring bag from his jacket pocket
    in the domed sanctuary. He scoops loose dirt from the altar floor, packs it tightly
    to match the jeweled idol's weight, cinches the strings shut, and sets it on the
    pedestal as a decoy during the swap. Satipo watches closely as the bag holds the
    weight briefly before the pedestal drops and mechanisms rumble to life.
  purpose: Holds packed dirt to mimic the golden idol's weight on the pedestal, delaying
    trap activation during the theft.
  significance: Enables Indy's precise idol swap but fails to fully counter the temple's
    balance trap, sparking the mechanism's awakening and forcing immediate flight
    amid betrayal risks.
