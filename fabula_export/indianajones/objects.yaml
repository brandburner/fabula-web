  canonical_name: Nazi Tank (Vogel's Command Tank)
  description: The hulking armored Nazi tank, commanded by Arnold Toht (later Vogel),
    thunders across the desert valley during the pursuit of Donovan's convoy. Equipped
    with a main cannon, machine guns, treads, periscope, and crew compartments, it
    serves as both a pursuit vehicle and a mobile prison. Indy Jones leaps aboard
    from horseback, engaging in a chaotic battle atop its hull—wrestling Lugers from
    soldiers, striking another under the treads, and fighting Vogel hand-to-hand.
    Inside, Henry Jones Sr. and Marcus Brody are held captive amid the tank's claustrophobic,
    gunpowder-scented interior. The tank ultimately plunges over a cliff into flames
    after Vogel is defeated.
  purpose: Pursue enemies across desert terrain, transport Nazi personnel including
    Vogel, and destroy targets with cannon fire and crushing treads
  significance: Transforms desert ambush into full chase warfare; hosts Indy’s first
    mass killing and chain fight with Vogel, forcing his shift from scholar to survivor.
    Embodies Nazi technological terror, catalyzing horse/camel thefts and Brethren
    defeat while exposing moral costs of Grail race.
