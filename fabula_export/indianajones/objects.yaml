  description: Short Round slams a jagged rock against this metal chain binding him
    in the Pankot mines' suffocating darkness. The links snap under the blow, freeing
    his small frame for a daring escape up a collapsing ladder to the altar above.
    Chattar Lal, Indiana Jones, Willie Scott, and Mola Ram stand unaware as this pivotal
    break shifts Short Round from captive child slave to agile rescuer amid the Thuggee
    ritual.
  purpose: Restrains child laborers in the Pankot Palace mines
  significance: Snapping the chain sparks Short Round's escape from the mines, propelling
    him to the altar where he disrupts Mola Ram's Kali Ma sacrifice of Willie Scott
    and confronts the corrupted Indiana Jones, flipping victim dynamics into heroic
    intervention.
