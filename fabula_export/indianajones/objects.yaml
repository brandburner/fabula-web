  global_id: ger_object_3d41bd6adce4
  canonical_name: Indiana Jones's Quarry Rocks and Boulders
  description: A collection of loose rocks and boulders scattered across the quarry
    cavern floor, used by Indiana Jones as improvised weapons during his brutal fight
    against the Thuggee giant. The rocks are hurled with force to strike the colossal
    foe, while the larger boulders serve as heavier projectiles. These quarry materials
    also function as environmental hazards, rolling unpredictably amid the chaos of
    mine carts and cult pursuit. The rocks shatter upon impact, while the boulders
    are too heavy for Indy to lift when incapacitated by the voodoo doll's pain.
  purpose: Improvised weapons thrown by Indy to attack the Thuggee giant; quarry excavation
    debris
  significance: Turn the quarry's raw materials into tools of rebellion, enabling
    Indy's victory over the giant and fueling the group's shift from captivity to
    high-speed flight down the tunnels
