  global_id: ger_object_5ef0e1b619e7
  canonical_name: Sallah's Egyptian Mail Newspaper
  description: Sallah grabs the *Egyptian Mail* newspaper amid the chaotic bustle
    of Iskenderun's train station. He initially uses it as a distraction before forcefully
    ramming the Second Man through its flimsy pages, tearing and crumpling the sheets
    in the process. The scattered fragments mark the moment as Brody and Sallah flee
    the scene, highlighting Sallah's resourcefulness in improvising weapons against
    armed assailants.
  purpose: Distraction and improvised weapon for punching through an assailant
  significance: Sallah's brutal improvisation thwarts the Nazi trap momentarily, exposing
    Brody's vulnerability and propelling the duo into a desperate flight that ends
    in capture, underscoring Sallah's streetwise combat skills against Brody's scholarly
    disorientation.
