  canonical_name: Sacrificial Lava Crevasse
  description: A massive, glowing chasm of bubbling molten lava located in the rear
    chamber of the Kali Thuggee temple, serving as the central sacrificial pit for
    ritual offerings. The crevasse dominates the temple floor, radiating intense heat
    that scorches the air. Willie Scott is suspended above it via chains during the
    Thuggee ritual sacrifice, with Indiana Jones and Short Round battling to prevent
    her immolation. Chattar Lal falls into the crevasse after his defeat, his body
    instantly consumed by the flames. The High Priest oversees the descent of the
    sacrificial frame, while the chanting crowd witnesses the proceedings. The crevasse's
    purpose is to incinerate bound victims as part of the Kali Thuggee ceremonies.
  purpose: Sacrificial pit where bound victims burn alive during Kali Thuggee ceremonies
  significance: Drives the scene's terror as Willie's death nears, exposes Indiana
    Jones's cult indoctrination, and spurs Short Round's swing-in rescue to shift
    the story's momentum
