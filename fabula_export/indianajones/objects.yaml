  canonical_name: The Raven Saloon Fireplace
  description: The fireplace blazes in Marion Ravenwood's Nepalese saloon, its coals
    hot enough to heat an iron poker to a glowing red. Belzig positions himself before
    it as a focal point while interrogating Marion, drawing the searing tool from
    the flames to threaten her over the medallion. It anchors one wall near the brawl's
    outbreak, flames leaping as a threatening prop when Indy intervenes and the fire
    spreads to curtains amid gunfire and fists.
  purpose: Heating metal pokers to glowing for intimidation and providing fire that
    ignites surroundings
  significance: Heights the Nazi thugs' menace during Marion's torture; its flames
    erupt into saloon-wide inferno during Indy's rescue, amplifying chaos and forcing
    Marion's alliance amid the medallion's supernatural burn on Belzig
