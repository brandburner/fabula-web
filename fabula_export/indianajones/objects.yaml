  global_id: ger_object_51a5cbc59ea5
  canonical_name: Fat Guard's Leather Whip (Thuggee Mine Tunnels)
  description: A leather strap used by the Fat Guard to punish enslaved children digging
    for Sankara Stones in the suffocating Thuggee mine tunnels. Its use on Short Round
    triggers his epiphany about pain breaking Kali's trance.
  purpose: Whip to punish and control child slaves during mining labor
  significance: Employs the Thuggee cult's sadism to torment captives, its use on
    Short Round underscoring the physical agony that reveals pain's power to shatter
    hypnotic control and fuels his escape plan.
  potential_owner_mention: Fat Guard
