  description: Permanent stone feature of the Grail chamber, serving as the sacred
    source of water for the final trial. Unlike the false Grail goblet, this well
    is not an object that can be selected or cursed—it is the neutral medium through
    which the true/false nature of the Grail is tested.
  purpose: Supplies water to fill and test candidate Holy Grails for healing properties
  significance: Exposes the true Grail's life-giving power and false ones' lethal
    curse, forcing Indy to choose wisely under time pressure to save his dying father
