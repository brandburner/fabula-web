  description: 'A makeshift flaming landing strip created by Indy, Sallah, and their
    crew in the Well of Souls: torches lowered and lines of oil spread and ignited
    to burn a path across the snake‑choked pit, driving back thousands of Egyptian
    asps and allowing access to the altar. The fires later gutter and die when Nazis
    seal the chamber, restoring darkness and serpents.'
  purpose: Combines with torches to repel asps and form a fire-cleared landing strip
    into the snake-filled chamber
  significance: Transforms Indy's paralyzing fear of snakes into actionable strategy,
    enabling access to the Ark on the protected altar and marking the quest's pivot
