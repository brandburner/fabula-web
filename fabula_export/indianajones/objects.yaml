  canonical_name: Breached Catacombs Wall
  description: Ancient stone wall in the Venice catacombs blocks access to a hidden
    chamber. Indiana Jones smashes it open with a knight's coffin amid fire and rats,
    exposing oil-slick water and skeletons below. Kazim and his men later direct flashlights
    through the jagged hole to spot the survivors.
