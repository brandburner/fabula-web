  global_id: ger_object_d69c776b6b70
  canonical_name: Front Door of The Raven Saloon
  description: Marion Ravenwood shoves unruly patrons out the front door to violently
    clear her saloon, transforming the crowded space into an arena for her raw confrontation
    with Indiana Jones. Mahdlo enters through this door and later exits it. Indy departs
    through the same front door after their tense bargain and kiss. A door behind
    the bar slams open as Marion storms into the main room, underscoring the venue's
    chaotic entries and exits.
  purpose: Serves as primary entrance and egress point for patrons, owner, and visitors
    in Marion Ravenwood's saloon
  significance: Powers Marion's aggressive clearing of the bar, isolates her emotional
    clash with Indy over the bronze sun piece, and channels Mahdlo's movements to
    amplify interpersonal threats and negotiation stakes
