  global_id: ger_object_d4790d5b9324
  canonical_name: Gangplank's Single Pool of Light
  description: A single pool of light bathes the top of the gangplank on the mist-shrouded
    Cairo docks at night. It spotlights Indiana Jones and Marion's prolonged embrace,
    Sallah's paternal farewell between them, and Captain Simon Katanga's watchful
    gaze from the Bantu Wind's rail. Pirates hustle final stores beneath its glow,
    sharpening focus on the tender moment amid the steamer's departure.
  purpose: Illuminate the gangplank summit and highlight the characters' farewell
    embrace
  significance: Heightens emotional intimacy of the respite, contrasts fragile warmth
    against impending voyage dangers, and draws viewer attention to key relationships
  potential_owner_mention: ''
