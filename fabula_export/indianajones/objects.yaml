  canonical_name: Indy's Shoulder Bag
  description: Indiana Jones' shoulder bag serves as a versatile utility container
    for his gear across multiple high-stakes scenarios. In the Shanghai Duesenberg
    chase, it holds his pistol, enabling precise return fire against Lao Che's pursuers.
    Later, during the biplane attack, Short Round retrieves the holstered pistol from
    this bag to arm Indy. In the Thuggee mines, it contains the Sankara Stones, which
    become pivotal in Indy's decision to revolt against the temple's oppressive regime.
    The bag's contents adapt to the narrative needs—firearms for combat, sacred artifacts
    for moral purpose—while remaining consistently associated with Indy's preparedness
    and resourcefulness.
  purpose: Container for Indy's pistol holster and Sankara Stones
  significance: Safeguards Indy's weapons through aerial combat, then carries the
    Sankara Stones as Indiana abandons mere retrieval for using them to spark child
    uprising and raze the evil cult's lair.
