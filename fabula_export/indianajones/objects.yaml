  global_id: ger_object_f5fef04bb503
  canonical_name: Wooden Crate (Well of the Souls) / Ark Transport Crate
  description: Large, sturdy wooden crate lowered by rope into the torchlit Well of
    the Souls. It serves first as a stable platform for Indiana Jones and Sallah—anchoring
    their improvised crossing, allowing Indy to swing down, pour parallel oil lines,
    and ignite a pathway across the serpent-filled floor—and then as the container
    used to secure and transport the Ark of the Covenant after they pry it free from
    the stone chest. Fitted with poles and ropes for hauling, the lid is fastened
    before the crate is pulled upward; later the Nazis seize the sealed crate at the
    dig site and guard it beside the command tent during nearby explosions.
  purpose: Stable platform and supply base for rigging oil-and-torch fire barriers
    to cross snake-infested floor
  significance: Enables desperate advance to Ark's altar despite Indy's snake phobia;
    fragile flames heighten stakes amid multiplying infestation of eggs, hatchlings,
    and feeding adults
