    Grail Clue)
  description: A handwritten sequence of ink-scrawled numbers embedded in Henry Jones
    Sr.’s Grail Diary, distinct from the Pencil-Drawn Grail Path Map. Decrypted by
    Indy aboard an airliner, this sequence serves as a puzzle-solving mechanism linked
    to the Grail’s location, interacting with Walter Donovan and Elsa Schneider. Functions
    as a complementary clue to the visual map, not a navigational tool.
  purpose: Decoding clues for the Holy Grail quest
  significance: Emotional link to missing father Henry Jones Sr.; pivotal quest clue
