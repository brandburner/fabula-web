  canonical_name: Short Round's DC-3 Cargo Machine Gun (with Tripod and Ammunition)
  description: A heavy, belt-fed machine gun mounted on a **compact tripod**, originally
    stored in the DC-3's cargo compartment. During the biplane attack, Short Round
    hauls it into the passenger cabin, positions it by the open door, and fires sustained
    bursts at pursuing enemy aircraft. Willie Scott assists by feeding the ammunition
    belt. The gun's recoil and swiveling barrel down an enemy plane before accidentally
    striking the DC-3's engine, causing catastrophic damage. The **tripod stabilizes
    the weapon**, enabling accurate fire, while **hot brass shell casings** scatter
    across the cabin floor during the firefight. The gun and tripod remain in the
    cabin afterward, warm and spent, amid the chaos.
