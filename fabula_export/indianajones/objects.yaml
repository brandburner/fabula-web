  canonical_name: Two-Foot Square Hole in Library Floor
  description: Indiana Jones smashes a library floor tile, exposing a two-foot square
    hole that drops into darkness below. Cold, rancid air surges upward, thick with
    the tomb's ancient decay and foreshadowing traps ahead. Dr. Elsa Schneider peers
    in, then descends first with eager resolve; Jones follows, staff in hand, committing
    the group to the perils beneath. Marcus Brody and the Librarian watch from above
    as the passage swallows the seekers.
  purpose: Hidden entrance from library floor into ancient catacombs and Grail tomb
  significance: 'Ignites the quest''s physical dangers: Indy''s clues crack open the
    floor''s secrets, turning abstract scholarship into a visceral race against Nazis;
    Elsa''s priority descent hints at hidden motives, while rising stench signals
    deadly trials below'
