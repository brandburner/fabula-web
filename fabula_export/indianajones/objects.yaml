  global_id: ger_object_a110052dca4f
  canonical_name: Tanis Well
  description: The Well marks the primary excavation target at the Tanis dig site,
    the underground chamber Nazi archaeologists have chased all day through sand and
    stone. Belloq defends slow mapping precision around it, while Shliemann and Gobler
    demand faster progress, their command tent debate exposing team fractures over
    this buried prize. Belzig's arrival underscores its stakes as a path to the Ark.
  purpose: Central excavation objective for the Tanis dig team seeking the Ark
  significance: Drives Nazi plot momentum; sparks conflict between Belloq's scholarship
    and Shliemann's impatience, pivoting the team toward Marion's interrogation for
    clues
