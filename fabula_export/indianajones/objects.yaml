  description: Worn rug covers the dirt floor in the open thatch-roofed shelter of
    Mayapore village. Indiana, Willie, Short Round, the shaman, and chieftain sit
    tensely on its frayed surface during dusk. The group shares meager plates of gruel
    amid poverty that prompts Willie's refusal to eat and primes Indy's acceptance
    of the quest for the Sankara Stone.
  purpose: Seating surface in village shelter
  significance: Anchors the tense gathering where villagers' misery becomes visceral,
