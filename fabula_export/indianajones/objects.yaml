- fabula_uuid: object_9ee28cb37fa6
  global_id: null
  canonical_name: 100-Foot Chasm (Great Abyss)
  description: 'This massive 100-foot chasm blocks the temple corridor, dropping sharply
    into darkness and forcing travelers to confront an apparent dead end. Indiana
    Jones hesitates at its edge, eyes tracing the sheer drop, until his father''s
    dying words spur him forward. He spots the optical illusion: Crusaders painted
    a stone bridge to blend seamlessly with the floor. Indy steps out blindly, landing
    solid on the camouflaged path. Henry Jones Sr., Donovan, Elsa Schneider, and Sallah
    watch from behind as Indy crosses alone.'
  purpose: Trap intruders by disguising a narrow stone bridge as an uncrossable void,
    traversable only through blind faith in the painted camouflage.
  significance: Indy's leap cements his shift from rational skeptic to man of faith,
    rescues his wounded father, thwarts Donovan's pursuit, and unlocks the path to
    the Grail Chamber amid betrayal.
  potential_owner_mention: ''
  potential_owner_uuid: null
