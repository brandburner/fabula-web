  canonical_name: Kubelwagon
  description: This light military vehicle carries critical intelligence or possibly
    the Holy Grail itself. Vogel spots it and orders the tank gunner to destroy it
    with the command 'Den Kubelwagon sprengen!' The gunner loads a shell, fires, and
    the blast hurls the Kubelwagon skyward. It plummets back to earth in flames, then
    the tank rolls over it, crushing the wreckage under massive treads. Vogel watches
    the methodical erasure with cold precision.
  purpose: Transport vehicle for critical intelligence or the Grail
  significance: Its destruction showcases Nazi ruthlessness and efficiency, serving
    as a brutal warning that they will eliminate any obstacle in their Grail quest.
    The event heightens mission urgency for Indiana Jones and his allies, spurring
    their resolve against such tactical brutality.
