  global_id: ger_object_59894509007b
  canonical_name: Spike Chamber's Deadly Spikes
  description: Massive spikes that burst from the walls and descend from the ceiling
    of the spike chamber, thrusting inward with lethal force toward Indiana Jones
    and Short Round. These spikes are part of a booby-trapped chamber mechanism that
    contracts the space while the spikes advance, forcing victims to dodge frantically.
    The spikes halt their victims mid-escape until Willie Scott activates a hidden
    lever in an adjacent insect-choked tunnel, triggering their full retraction and
    clearing the path. This mechanism is tied to the hidden door between the spike
    chamber and the escape tunnel.
  purpose: Impale trapped victims as walls and ceiling close in, executing the chamber's
    lethal trap mechanism.
  significance: Drives Indy to shout for Willie Scott's aid, breaking stealth and
    exposing them to pursuing cultists; underscores his raw desperation to save Short
    Round and strained reliance on Willie amid escalating peril.
