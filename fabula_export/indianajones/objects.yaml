  canonical_name: Indiana Jones' Thuggee Sword
  description: A *curved steel Thuggee sword* seized from a disarmed guard during
    a tunnel skirmish, used for *close-combat parrying* and *rope-severing* (e.g.,
    collapsing the Bridge of No Return). Unlike the silk death-cord, it is a *combat
    weapon* with no ritualistic or assassination functions.
  purpose: Close-combat weapon; tool for severing ropes
  significance: Instrument of Indy's bold gambit that collapses the Bridge of No Return,
    shifts the battle's momentum against Mola Ram's forces, and forces a supernatural
    confrontation over the Sankara Stones amid plummeting debris and fanatic screams.
