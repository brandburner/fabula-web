  global_id: ger_object_b825dd29fa29
  canonical_name: Indy's Glasses
  description: Indy slips on his reading glasses in the lecture hall after class to
    inspect the Cross of Coronado up close. Surrounded by students, a pretty coed,
    and Marcus Brody, he adjusts them for detailed scrutiny of the artifact's fine
    features, then removes them swiftly amid the reverent reveal, shifting focus to
    direct conversation. This personal item recurs in his office for similar document
    examination with Brody.
  purpose: Reading aid for close inspection of documents and artifacts
  significance: Bridges Indy's scholarly precision with his adventurous pursuits;
    removal marks transitions from meticulous analysis to personal engagement and
    storytelling about discoveries like the Cross.
