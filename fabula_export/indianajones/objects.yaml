  description: Stolen motorcycle with an attached sidecar, hidden in a crate in the
    underground harbor of *The Last Crusade*. Used as an escape vehicle during a frantic
    chase with Henry Jones Sr. in the sidecar, featuring high-speed driving through
    docks, roads, and rough terrain. Central to father-son tension and Nazi pursuit.
  purpose: Escape vehicle during Nazi pursuit; high-speed transportation across docks,
    roads, and rough terrain
  significance: Powers Indy and Henry's breakout from the underground harbor and fuels
    their evasion chase, showcasing Indy's cool resourcefulness against Nazi fury.
    Heightens father-son tension—Indy's thrill clashes with Henry's terror—and delivers
    a psychological win, positioning the Joneses ahead in the Grail race while ramping
    pursuit stakes.
