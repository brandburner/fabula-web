  description: Teaching Assistant Phil barges into Indy's office carrying an arm-load
    of thick reference books under one arm. Indy takes the stack and shelves them
    amid the clutter, handling the heavy volumes with practiced efficiency. The books
    ground the intrusion in academic routine, their worn covers and dense pages underscoring
    campus demands as Phil complains about a checked-out volume.
  purpose: Research materials for academic use in Indy's office
  significance: Interrupts Indy and Brody's private exchange, deflating adventure
    tones and refocusing pace on everyday obligations before Brody mentions Army Intelligence
    seeking Abner Ravenwood
