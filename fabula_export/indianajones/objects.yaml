  description: The aircraft cockpit control panels (instrument panel) crammed with
    dials, switches, gauges, and instruments. Under dim cabin lights the controls
    blink and hum while the plane shudders under enemy fire; Indy drops into the pilot's
    seat, rapidly surveying the dense complexity as Willie watches and questions his
    ability to command. These panels serve to monitor and operate aircraft systems—navigation,
    engines, and flight controls—during the chaotic, combat condition depicted.
  purpose: Operate and monitor aircraft systems, providing instrumentation for navigation,
    engine control, and flight management
  significance: Exposes Indy's piloting inexperience when Willie challenges him, turning
    the panels into an obstacle that deflates his bravado and forces responsibility
