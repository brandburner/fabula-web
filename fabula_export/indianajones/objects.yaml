  global_id: ger_object_2c02cb758a5f
  canonical_name: Indy's Binoculars
  description: Indiana Jones raises the binoculars to scan Donovan's Nazi convoy snaking
    through the desert valley from a concealed rocky vantage point. Sunlight glints
    off the lenses, creating a bright reflection that Vogel spots in his mirror and
    alerts Donovan to their position. Indy, Henry Jones Sr., and Sallah watch the
    procession of trucks, camels, and tank until the tank fires a shell that obliterates
    their nearby supply car, forcing retreat. The binoculars enable distant surveillance
    but directly trigger the violent escalation.
  purpose: Observe distant convoy movements and enemy positions
  significance: Betrays the heroes' hidden position via lens reflection, prompting
    Donovan to order a tank shell that destroys their supplies and forces desperate
    flight, marking the shift from stealthy pursuit to open warfare
  potential_owner_mention: Indiana Jones
