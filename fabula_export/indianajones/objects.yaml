    weight, triggering a deep mechanical rumble that awakens the temple's traps. Satipo
    watches from nearby, eyes wide as the switch exposes the raid's peril.
  purpose: Supports the jeweled idol at the altar and acts as a weight-sensitive trigger
    that activates temple defenses when disturbed.
  significance: Transforms Indy's precise theft into frantic escape, underscoring
    the deadly ingenuity of ancient traps and Satipo's dawning fear amid the sanctuary's
    hush.
