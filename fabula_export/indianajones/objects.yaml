    with a sudden roar that propels the stolen craft sharply from the dock into Venice's
    canals. The engine drives their frantic evasion as a Turkish agent leaps aboard,
    igniting a brutal fight. Elsa grabs the wheel to steer through lurching swerves
    and near-capsizes, the engine fueling the chaos of punches, grapples, and survival
    amid pursuing enemies.
