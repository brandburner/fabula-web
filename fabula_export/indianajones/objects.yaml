  description: Sturdy horses tied up below the cliffs wait as Indiana Jones bursts
    into daylight and lunges for one. He misses the saddle, crashes down hard, then
    scrambles aboard amid gasps and dirt. Indy spurs the horse into a thundering gallop
    down the rugged slope, dodging boulders while Fedora's truck and car close in
    with screeching tires. The beasts power his desperate flight, hooves kicking up
    dust in the chaotic chase.
