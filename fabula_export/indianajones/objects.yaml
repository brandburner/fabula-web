  global_id: null
  canonical_name: Old Man's Hubcap
  description: The Old Man clutches a round metal hubcap, its chrome dulled by road
    grime, as he kneels beside his stalled car to repair a flat tire. He loosens lug
    nuts with a wrench nearby. Indy's car suddenly accelerates forward, startling
    the Old Man and sending the hubcap clattering onto the dusty roadside amid the
    chaos of their evasion.
  purpose: Wheel cover removed to access and change a flat tire during roadside repair
  significance: Comic relief prop that underscores Indy's urgent haste; the Old Man's
    startled drop highlights the heroes' desperate flight from pursuing Nazis
  potential_owner_mention: Old Man
  potential_owner_uuid: agent_82991728e072
