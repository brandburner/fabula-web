  canonical_name: Knight's Shield
  description: A weathered metal shield resting atop a decomposed knight's coffin
    in Venice's flooded catacombs. The shield bears an engraved symbol that precisely
    matches the rubbing from Henry Jones Sr.'s Grail Tablet, confirming the knight's
    tomb as the second waypoint in the Grail quest. Indiana Jones and Elsa Schneider
    discover it during their search, briefly celebrating the find before being forced
    to topple the coffin and shield into the water by Kazim's men, creating an air
    pocket amid fire and rats. The shield's engraving serves as critical confirmation
    of the Grail Tablet clues and reveals the next location in the quest.
  purpose: Second marker confirming Grail Tablet clues and revealing the quest's next
    location
  significance: Links the Grail quest to the Ark of the Covenant through shared symbols,
