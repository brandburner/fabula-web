    Aircraft)
  description: A Nazi Messerschmitt fighter plane circles low over a desolate Mediterranean
    beach, its shadow sweeping across Indiana Jones and Henry Jones Sr. as they stand
    exposed with no ammunition. The pilot dives for a strafing run, bullets kicking
    up sand around the pair. Henry's scream scatters a flock of seagulls into the
    propeller; blades shred the birds into a feathery blizzard that clogs the engine.
    The plane stalls, crashes offshore, and erupts in a fireball.
  purpose: Conduct aerial strafing runs to eliminate ground targets
  significance: Immediate lethal threat Henry defeats by weaponizing seagulls, transforming
