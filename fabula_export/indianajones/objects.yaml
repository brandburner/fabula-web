  canonical_name: Indy's Stolen Horses
  description: Indy and Sallah seize horses from Donovan's convoy amid the desert
    ambush chaos, knocking soldiers aside to claim them. The group later rides these
    dust-kicking mounts through the collapsing Secret Canyon, dodging rockfalls and
    Nazi gunfire during a desperate escape. At the mountain temple entrance, the horses
    carry Indy, Henry, Sallah, and Brody away from the ruins, their hoofbeats marking
    departure amid father-son reconciliation.
  purpose: Transportation and escape from Nazi pursuit
  significance: Enable the heroes' survival and mobility against Nazis, from ambush
