  global_id: ger_object_16200e8d957c
  canonical_name: Henry's Ancient Parchment Volume
  description: This ancient parchment volume lies open on Henry Jones Sr.'s desk amid
    the cluttered books of his study. It displays a beautifully illuminated picture
    of a stained-glass window marked with Roman numerals. Henry hunches over it, copying
    the image into his notebook while murmuring a Greek invocation. Indiana Jones
    bursts in but ignores the volume as Henry dismisses him to count to twenty in
    Greek. Herman and two men arrive outside, their trumpet blast interrupting the
    ritual.
  purpose: Source for copying Grail-related illustrations and symbols during illumination
    rituals
  significance: Anchors Henry Jones Sr.'s obsessive scholarly pursuit of Grail secrets,
    highlighting the clash between his ritualistic focus and Indiana Jones's urgent
    warnings of real danger from approaching intruders
