    daylight. Withered women line its edges, their hollow stares fixed on Short Round
    as he shrinks against Indiana. A dry well stands nearby, surrounded by scavenging
    dogs and patient vultures amid collective mourning. Indiana and Short Round traverse
    it upon arrival, confronting the village's silent devastation.
