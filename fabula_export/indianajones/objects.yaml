  global_id: null
  canonical_name: Indiana Jones's Surveyor's Instrument (Desert Mapping Tool)
  description: A portable, lens-equipped surveying tool used in the desert to draw
    precise lines from coordinates to hidden burial sites, critical for locating the
    Ark's excavation site.
  purpose: Tracing exact lines from map coordinates to pinpoint remote desert locations
  significance: Indy’s tool turns academic precision into a tactical edge, spotting
    the Ark’s dune before Nazis arrive and fueling the frantic dig under nightfall’s
    pressure
  potential_owner_mention: Indiana Jones
  potential_owner_uuid: agent_9b8a52b10449
