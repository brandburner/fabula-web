  global_id: ger_object_af2522de52e8
  canonical_name: Indy's Boots
  description: Indy kicks off his dirt-streaked boots upon entering the cabin, letting
    them drop beside the cot as he settles wearily with Marion nearby. The act bares
    his stockinged feet and peels away the day's perils—temple traps, chases, betrayals—paving
    the way for raw banter, apology, and a tentative kiss in the night's quiet intimacy.
  purpose: Rugged footwear for perilous expeditions and escapes
  significance: Removal marks Indy's shift from armored adventurer to vulnerable man,
    deepening emotional reconciliation with Marion amid unresolved debts
