  global_id: ger_object_e3ee46a42df2
  canonical_name: Jeweled Idol
  description: Indiana Jones approaches the altar in the booby-trapped sanctuary,
    torch in hand, after testing deadly tiles and spotting a poison-riddled bird.
    He crafts a dirt-filled bag matching the idol's weight and swaps out the tiny
    jeweled figurine—small, golden, and intricately detailed—from the polished stone
    pedestal. Satipo watches tensely as the pedestal sinks, the idol now in Indy's
    grip, unleashing a deep rumble that awakens the temple's traps.
  purpose: Altar centerpiece balanced on a weight-sensitive pedestal to secure the
    sanctuary; removal activates defensive mechanisms
  significance: Transforms Indy's precise heist into frantic survival, highlights
    his trap expertise against Satipo's fear, and launches the escape sequence with
    betrayal looming
