    These flattened bones mark the locations of deadly traps, including the vined
    landing where Indiana Jones and Satipo step directly on the remains to cross safely.
    The skeletons also function as triggering mechanisms underfoot, warning of the
    temple's lethal history and foreshadowing Satipo's impalement. Their presence
    underscores the fatal consequences of greed in raiding sacred sites, tying directly
    to Forrestal's death.
  purpose: ''
  significance: These remains mark the temple traps' lethal history and guide Indy's
    path—stepping on them reveals the safe route amid betrayal and danger, underscoring
    his expertise against Satipo's impatience and foreshadowing the cost of greed
    in the idol quest.
  potential_owner_mention: ''
