  global_id: ger_object_b3f4d49d970b
  canonical_name: Tank's Revolving Tread
  description: Linked metal plates form the tank's massive revolving tread, grinding
    forward with mechanical relentlessness. SS Officer Vogel chains Indiana Jones'
    neck directly to it, yanking his head inches from the crushing gears as the track
    advances, turning the vehicle's propulsion into a visceral torture device amid
    the dusty chase.
  purpose: Propel the tank over rough terrain by rotating linked metal plates; weaponized
    to drag and threaten chained victims with crushing force.
  significance: Vogel deploys it to break Indiana Jones physically and psychologically,
    embodying Nazi efficiency in brutality and raising quest stakes as Indy faces
    mechanical death while his father's fate hangs in the balance.
