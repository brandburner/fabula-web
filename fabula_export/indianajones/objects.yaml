  canonical_name: Bantu Wind
  description: The Bantu Wind is an old tramp steamer used as an escape vessel in
    the Cairo sequence and the subsequent nocturnal crossing. Moored at a mist-locked
    Cairo pier, its deck is alive with pirates loading final stores while Sallah,
    Indy and Marion interact and Captain Simon Katanga stands on the rail giving orders
    and spotting enemy submarines. Later the same vessel powers through the flat Mediterranean
    under a cold moon, its hull carving steady wakes as it carries characters on a
    night voyage that momentarily halts the immediate chase and heightens the passengers'
    tense, confined atmosphere in the hold.
  purpose: Transport vessel for escaping Cairo; provides concealment in hold during
    Nazi pursuit
  significance: Offers a tense emotional respite that bonds Indy, Marion, and Sallah
    before Nazi submarines shatter the calm, thrusting the group into hiding and amplifying
    the voyage's peril
