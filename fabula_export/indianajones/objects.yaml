  description: Indy lunges for the cockpit yoke amid roaring flames from the ruptured
    fuel line and blazing engine. He wrests control from Short Round, yanks the yoke
    back hard, forcing the DC-3 into a desperate climb toward the mountain. The controls
    shake under his grip as the plane punches from clouds, survival hanging on his
    pull.
