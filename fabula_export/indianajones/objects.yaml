  global_id: null
  canonical_name: Panama Hat Collector's Cash Payment (Cross of Coronado Transaction)
  description: Bundle of cash exchanged by the Man in the Panama Hat to Roscoe in
    *Indiana Jones and the Last Crusade* (S01E03) as payment for the Cross of Coronado,
    overseen by Fedora. This transaction occurs in Professor Henry Jones Sr.'s house
    and involves young Indiana Jones' protests.
  purpose: Payment for the stolen Cross of Coronado
  significance: Enables the betrayal of young Indy, underscoring corruption among
