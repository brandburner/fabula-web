  canonical_name: Rhino Boxcar (Nazi Train Chase)
  description: A cramped, reinforced wooden boxcar transporting a massive black rhinoceros
    as part of the Nazi-seized circus train during the high-speed pursuit sequence
    in *Raiders of the Lost Ark*. Indiana Jones tumbles onto its roof after being
    tripped by Roscoe, landing in a chaotic interior filled with rafters and dim lighting.
    The rhino, enraged by the chaos, thrashes violently—splintering walls, scattering
    equipment, and punching its horn through the roof—while Indy fights for survival
    in the claustrophobic, unstable space. The boxcar's interior is further destabilized
    when a heavy hanging lamp crashes onto the rhinoceros, intensifying its fury and
    the perilous conditions for Indy and his adversaries.
  purpose: Transports the black rhinoceros as part of the Nazi-seized circus train
  significance: Transforms from mere transport into a deadly arena; its breached roof
    forces Indiana Jones to weaponize the rhino's fury against Roscoe, embodying chaos
    harnessed for survival in the high-stakes chase
