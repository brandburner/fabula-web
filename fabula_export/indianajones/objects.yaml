  description: Indiana Jones grabs the serving cart from the ballroom floor amid gunfire
    and chaos. He pushes it forward as rolling cover against Lao Che's gunmen, its
    trays clattering with remnants of hors d'oeuvres and glasses. Indy rams the cart
    into a shooter, toppling him, then rides it briefly as an improvised vehicle to
    dodge bullets and close distance during the brawl.
