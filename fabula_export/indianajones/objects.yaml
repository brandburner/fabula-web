  description: Sleek black Mercedes limousine used exclusively in the Tengtu Hok palace
    heist sequence; destroyed as a failed distraction during Indy's rooftop escape
    from the museum. Operates in an earlier narrative thread and has no connection
    to the Ark of the Covenant.
  purpose: Transports Nazi agents to Hok's palace; deploys as distraction amid escape
