  description: Indy clutches his improvised leather air bubble in the narrowing underwater
    tunnel after the submarine rips him free. The six-inch pocket traps scant air
    against the rock; he smashes through vines, jams his head into the stone, and
    gulps desperate breaths amid blind, cold currents that slap and threaten to tear
    it away. This fragile life-support prop buys seconds to regroup before he presses
    deeper.
