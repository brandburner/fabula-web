  description: Indiana Jones and Elsa Schneider speed through the harbor in this vessel,
    slipping between two closing freighters. Kazim rams it from behind and rakes it
    with machine gun fire, igniting the deck in flames. Indy grapples with Kazim hand-to-hand
    atop the burning boat as it drifts helplessly toward a steamer's churning propellers.
  purpose: Escape vehicle during high-speed boat chase and hand-to-hand combat platform
