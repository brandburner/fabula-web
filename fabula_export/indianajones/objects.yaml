  global_id: ger_object_f4fd89d5675a
  canonical_name: Vendor's Tower of Pots and Pans
  description: Indy flicks his whip to sever a vendor's support pole, sending a tall
    stack of metal pots and pans crashing down in a thunderous clatter. The heavy
    debris pile slams into a Bad Arab and a German agent, burying them under cookware
    and scattering the bazaar crowd into panicked flight. The avalanche reshapes the
    chase, buying Indy precious seconds amid the metallic din and flying shards.
  purpose: Generate noise and physical debris to disorient pursuers and scatter bystanders
    during escape
  significance: Turns environmental clutter into an instant weapon, highlighting Indy's
    resourcefulness in combat; creates a chaotic pivot that halts the pursuit and
    clears his path
