- fabula_uuid: ger_object_b64bfcbe7ffd
  global_id: ger_object_b64bfcbe7ffd
  canonical_name: Indy's Disguise Tuxedo
  description: Indiana Jones wears this formal black tuxedo to impersonate a wealthy
    aristocrat amid the Shanghai nightclub's gilded ballroom. The sleek outfit lets
    him navigate opulent crowds and match Lao Che's gangster elite during the deadly
    exchange over Nurhachi's ashes. He keeps it on through poison threats, knife standoffs,
    and brawl chaos before bundling it for the plane escape, where he later drops
    its jacket for Willie Scott.
  purpose: Disguise as high-society aristocrat for infiltration and negotiations
  significance: Anchors Indy's gambit against Lao Che, blending him into the ballroom's
    power players; exposes Willie's sabotage when she grabs the antidote amid the
    tuxedo-clad frenzy; foreshadows its transition to survival gear on Willie, contrasting
    urban deceit with jungle peril.
