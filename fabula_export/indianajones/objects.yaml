  global_id: null
  canonical_name: Pankot Palace Suite Clock
  description: Willie Scott grabs this silent clock from the Pankot Palace suite wall
    and shakes it hard, demanding to know if it works amid her mounting frustration.
    Indiana Jones knocks it to the floor in a surge of impatience during their flirtatious
    standoff, the crash amplifying their unresolved tension as danger closes in.
  purpose: Timekeeping
  significance: Marks the characters' fraying patience and stalled desire, heightening
    the shift from flirtation to the palace's lurking threats.
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_d5c484c438b2
  global_id: null
  canonical_name: Pankot Palace Suite Secret Door to Thuggee Tunnels
  description: Concealed entrance in Willie Scott's Pankot Palace suite, leading to
    underground Thuggee cult tunnels. Serves as a narrative device to expose the cult's
    hidden horrors, with Willie stumbling through it in terror and Indiana Jones later
    emerging unharmed, undermining her warnings. Symbolizes the invisible, creeping
    threat of the Thuggee.
  purpose: Secret passageway connecting palace suite to underground tunnels
  significance: Exposes Thuggee horrors through Willie's terrified arrival but undermines
