    amid the fight, exposing the interior. Moments later, it snaps tightly shut above
    Marion, sealing her inside the enclosed space while the jammed throttle revs the
    engines and fuel spills across the ground. Indy battles mechanics and propellers
    to reach the trapped cockpit.
  purpose: Encloses the pilot during flight and seals the cockpit from external access
  significance: Traps Marion during the Nazi ambush, shifts the stakeout into a deadly
    takeoff sequence, and tests Indy and Marion's partnership under immediate mechanical
    threat
