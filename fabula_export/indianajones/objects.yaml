  global_id: ger_object_23454727a006
  canonical_name: Indy's Cabin Cot
  description: Narrow sleeping cot in Indiana's cramped cabin (against a corner/wall).
    Serves as the primary sleeping surface and the location for a private, intimate
    exchange between Indy and Marion—Marion waking or sitting in a white nightgown
    while Indy perches on the edge, the pair exchanging apologies and old debts before
    sinking onto the cot/bed for a decisive kiss that rekindles their bond.
  purpose: Serves as sleeping surface and site for intimate reconciliation
  significance: Hosts Indy and Marion's emotional reckoning and rekindled romance,
    transforming vulnerability into deepened narrative stakes before external threats
    intrude
