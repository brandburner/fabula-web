  description: 'A sturdy metal flagpole (8–10 feet long) snapped free from a Nazi
    road barricade during a high-speed motorcycle chase. Indiana Jones repurposes
    it as an improvised weapon: first thrusting it like a lance to unseat a pursuing
    Nazi motorcyclist, then jamming its end into the spokes of a second Nazi''s motorcycle,
    causing the bike to flip violently. The flagpole bears dents and grime from the
    chaotic combat, playing a critical role in the Joneses'' narrow escape.'
