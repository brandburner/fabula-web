  description: Central platform in the Temple of Death where Mola Ram performs heart
    extractions during the ritual, distinct from the Thuggee Ritual Drum used for
    auditory signaling.
  purpose: Platform for iron frame holding sacrificial victims during Thuggee heart-extraction
    rituals
  significance: Hosts the brutal sacrifice that exposes the Sankara Stones' glow,
    fueling Indiana Jones's obsession to claim them despite Willie's terror and pleas
    to escape
  potential_owner_mention: Mola Ram
  potential_owner_uuid: agent_a38c0a48f398
- fabula_uuid: object_043a50e142a5
  global_id: null
  canonical_name: Thuggee Sacrificial Hoist (Temple of Doom)
  description: Mechanical device (including iron frame restraints) operated by Mola
    Ram and cultists to lower bound victims into a lava crevasse during Thuggee rituals
    in the Temple of Doom's lava chamber. Central to the cult's heart-ripping ceremony,
    witnessed by Indiana Jones, Willie Scott, and Short Round. Distinct from the ceremonial
    dagger used in Pankot Palace.
  purpose: Lowers bound victims into lava crevasse during Thuggee human sacrifices
  significance: Exposes Thuggee cult's brutality, unveils Sankara Stones' power to
    protagonists, shocks Willie into flight pleas while fueling Indiana Jones's resolve
    to descend and retrieve the artifacts
  potential_owner_mention: Mola Ram
  potential_owner_uuid: agent_a38c0a48f398
