  canonical_name: Omar's Truck
  description: Omar's truck is the vehicle that transports Omar's crew to the desert
    dig site. In the convoy it pulls up beside Sallah's vehicle and drives toward
    the dunes carrying several diggers and workers; the open rear/truck bed conceals
    additional manpower (three diggers are specifically noted as crouching in the
    bed). At times the truck parks on the far side of a dune ridge and serves as a
    visible marker of allied presence with Omar and his men standing ready nearby.
  purpose: Transports Omar's diggers and workers to sweep the desert for the Well
    of Souls dig site
  significance: Signals reliable local alliance for Indy's covert operation, shifts
    momentum from reconnaissance to execution, and underscores dependence on Omar's
    crew amid the Nazi threat
