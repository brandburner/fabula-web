  global_id: ger_object_5d6cefc55e01
  canonical_name: Indy's Bedroom Door and Mattress (Ransacked Scene Elements)
  description: Structural elements symbolizing the breach of Indy's sanctuary; the
    door represents the violated threshold, while the mattress anchors the physical
    chaos of the ransacking. Together, they frame the scene's emotional impact but
    do not contain the narrative's personal stakes (unlike the drawers).
  purpose: Bedding in Indy's private bedroom
  significance: Marks the breach of Indy's home sanctuary by unknown agents hunting
    specific targets, shifts abstract peril into personal threat, and propels him
    into urgent action for the Grail and his missing father.
