  canonical_name: Indy and Sallah's Rescue Horses (Three)
  description: Three pre-arranged horses used by Indiana Jones and Sallah during the
    desert chase to rescue Henry Jones Sr. from the Nazi tank. These mounts are part
    of a coordinated team effort, emphasizing speed and mobility for the rescue operation
    rather than individual combat tactics.
  purpose: Transportation for high-speed pursuit and rescue
  significance: Powers Indy's reckless charge against the tank, transforming the Grail
    hunt into a personal fight to save his father and Marcus Brody from Nazi captivity.
