  canonical_name: Biplane (Last Crusade - Indy and Henry's Escape Aircraft)
  description: The open-cockpit, two-seat biplane used by Indiana Jones and Professor
    Henry Jones Sr. as their escape vehicle. Initially suspended from the Zeppelin's
    outer skin by a hook-and-crane mechanism for launch, it is subsequently piloted
    with Indy in the forward cockpit and Henry in the rear/tail-gunner seat, pursued
    by Messerschmitt fighters, and ultimately loses control—skidding across a field,
    smashing through a goat corral, and slamming into a farmhouse wall, leaving Indy
    and Henry to stagger from the wreckage under strafing fire.
  purpose: Escape vehicle and defensive platform during aerial pursuit by Nazi fighters;
    equipped with rear machine gun for counterattack.
  significance: Catalyzes father-son reconciliation through role assignment and intimate
    exchange; Indy's self-deprecating humor foreshadows crash peril and elevates escape
    stakes from tactical to deeply personal
