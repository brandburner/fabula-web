  global_id: ger_object_cf0fcd76508f
  canonical_name: Crusader-era Secrets
  description: Hidden inside the converted church overlooking Venice's Piazza San
    Marco, these Crusader-era secrets fill a vault-like library. Elsa Schneider leads
    Indiana Jones and Marcus Brody across its threshold, her confident stride contrasting
    Indy's blunt skepticism about its library disguise. Brody notes the repurposed
    sacred structure. The secrets promise weaponized clues on the Holy Grail and Henry
    Jones Sr.'s disappearance, their presence humming with unspoken danger amid encroaching
    Nazi pursuit.
  purpose: Supply clues guiding searches for the Holy Grail and Henry Jones Sr.
  significance: Serve as narrative hook thrusting characters into revelations of betrayal,
    legacy, and peril; transform the church from forgotten relic into active threat
    drawing Indy, Brody, and Elsa into Grail hunt collision course.
