- fabula_uuid: ger_object_0275cdc94c4b
  global_id: ger_object_0275cdc94c4b
  canonical_name: Front Door of Professor Henry Jones' House
  description: Indiana Jones and Marcus Brody climb the porch of Professor Henry Jones'
    house and spot the front door standing ajar. This unsecured state jolts them;
    Indy betrays raw anxiety over his father's disappearance while Brody notes their
    decades-long friendship. They exchange urgent glances, the door's condition transforming
    quiet worry into suspicion of foul play.
  purpose: Primary entrance to Professor Henry Jones' house
  significance: Acts as a crucial clue signaling possible intrusion or danger tied
    to Professor Henry Jones' disappearance, driving Indy and Brody from emotional
    concern into active investigation.
  potential_owner_mention: Professor Henry Jones
