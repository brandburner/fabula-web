  global_id: ger_object_692e0b9bdbd0
  canonical_name: Long Skewer of Roasted Pigeons (Flambé)
  description: A long metal skewer threaded with roasted pigeons arrives flaming at
    Lao Che's banquet table in the Shanghai nightclub ballroom. A waiter flambés the
    dish amid rising tensions from poisoned champagne and failed artifact exchange.
    Indiana Jones snatches the burning skewer after Chen shoots Wu Han, hurls it across
    the table, and impales Chen's chest, igniting his clothes and fueling the erupting
    brawl as Indy fights for the antidote.
  purpose: Serves roasted pigeons flambé style during the banquet; repurposed by Indiana
    Jones as improvised flaming spear against Chen.
  significance: Triggers violent chaos after Wu Han's death, underscoring Indy's resourcefulness
    despite poison effects, Willie's sabotage, and Lao Che's betrayal, propelling
    the frantic antidote pursuit and mission collapse.
