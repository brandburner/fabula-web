- fabula_uuid: ger_object_8645ce639723
  global_id: ger_object_8645ce639723
  canonical_name: Little Boy's Tattered Sankara Cloth Fragment
  description: The dying boy clutches this small, tattered cloth fragment—a remnant
    of an ancient miniature painting etched with cryptic markings and the name 'Sankara'—before
    pressing it into Indiana Jones' hand with his final breath. Indy grips the fragile
    piece tightly, his face darkening as he instantly recognizes its connection to
    the artifact he pursues. Short Round and Willie Scott watch in silence from the
    shaman's hut, where the boy's mother cradles his body moments later.
  purpose: Clue linking to the Sankara artifact through its inscribed name and markings
  significance: Transforms Indy's role from observer to hunter; the boy's sacrifice
    delivers this omen, binding personal loss to the cult's atrocities and escalating
    the quest's stakes amid village horror.
