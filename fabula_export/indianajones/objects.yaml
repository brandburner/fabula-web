  description: Table stands in the shadowed castle hallway during the standoff. Indiana
    Jones drops his machine gun onto its surface to surrender to Colonel Vogel. The
    weapon slides across, strikes glasses, and shatters them in a clatter. Henry Jones
    Sr. watches warily, Elsa Schneider stands nearby, and Vogel holds her at gunpoint.
    The incident exposes the room's tension before Elsa steals the Grail Diary.
  purpose: Holds glassware and serves as surface for surrendered weapons
  significance: Marks Indy's disarmament, amplifies standoff volatility, and precedes
