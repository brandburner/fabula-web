  description: Servants carry gleaming silver platters heavy with horrors—snakes writhing
    with live eels, steaming eyeball soup, monkey brains in cracked skulls—into the
    torchlit Pleasure Pavilion. They set the platters before Indiana Jones, Willie
    Scott, Short Round, Chattar Lal, and Captain Blumburtt. Willie recoils in horror,
    her disgust peaking as the metallic gleam contrasts the vile contents.
  purpose: Carry and present the abhorrent feast dishes to the dinner guests
  significance: Escalate Chattar Lal's psychological warfare, provoke Willie's visceral
