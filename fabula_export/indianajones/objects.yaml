  global_id: ger_object_98557127f069
  canonical_name: Underwater Tunnel Ceiling Rock
  description: A submerged, solid rock ceiling forming the narrowing cliff tunnel.
    During the sequence Indy is swept through black water, rockets upward, and repeatedly
    smashes his head on this unyielding rock while searching for a tiny trapped air
    pocket (roughly six inches) pressed against its surface. The ceiling both blocks
    access to larger air spaces and serves as a hazardous surface that temporarily
    traps him and forces desperate, painful attempts to gulp scant air.
  purpose: Forms structural ceiling trapping a vital air pocket for survival
  significance: Delivers Indy's desperate breath in crushing odds, underlining vulnerability
    amid the submarine escape and propelling his improbable survival into the truck
    chase
