  description: Two revolvers drawn by Nazis in the cramped radio room during Indy
    and Henry Sr.'s escape, distinct from the Lugers used in the tank ambush.
  purpose: Firearm to shoot and kill intruders like Indiana Jones and Henry Jones
    Sr.
  significance: Instantly ramps up the castle escape's lethality, forcing Indy and
