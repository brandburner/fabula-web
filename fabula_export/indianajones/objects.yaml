  description: 'This massive gong booms a deafening clang when Indy smashes the display
    case with a samurai sword and grabs the Staff of Ra headpiece. The sound rips
    through Hok’s museum and palace, instantly halting Hok mid-run on the second-floor
    walkway. It triggers lethal defenses: a ceremonial hammer crashes behind Indy,
    and the footbridge explodes after Hok crosses. Characters react with frozen alarm—Indy
    bolts into escape, Hok grabs his Thompson submachine gun and presses the chase.'
  purpose: Sounds as an alarm to signal theft and activates chained mechanical traps
    across the museum and palace.
  significance: Turns Indy's swift grab into a frantic survival sprint, exposes the
    artifact's sacred peril, and reveals Hok’s domain as a fortress rigged for instant
    retaliation.
