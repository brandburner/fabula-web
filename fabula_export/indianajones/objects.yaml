  description: Indiana Jones snatches a large piece of wooden lumber from the quarry
    cavern floor during his fight with the Thuggee giant. He first grabs a smaller
    piece of wood but drops it immediately for this heavier lumber, swinging it as
    an improvised weapon in close-quarters combat. The giant charges, but Indy maneuvers
    him toward the rock crusher as the board splinters in the fray.
  purpose: Improvised weapon against the Thuggee giant
  significance: Frees Indiana Jones to counterattack after Short Round breaks Kali's
