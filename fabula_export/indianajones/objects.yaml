  canonical_name: Jock's Amphibious Plane
  description: Jock's amphibious plane — a single small seaplane capable of water
    and land operations — is piloted by Jock to extract Indiana Jones from hostile
    territory. In one scene it bobs on the Urubamba River as Indy climbs aboard via
    the pontoon and the craft lifts from the water; in another it departs a Peruvian
    airstrip and climbs over the jungle canopy. The aircraft's role is as Jock's personal
    aerial escape/transport vehicle used to flee immediate danger.
  purpose: Water-launched escape vehicle for rapid takeoff and flight
  significance: Delivers Indy's narrow getaway from Barranca trackers, pairs his frantic
    improvisation with Jock's steady piloting, and shifts the chase from jungle foot
    pursuit to airborne flight
