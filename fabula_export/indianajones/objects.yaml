- fabula_uuid: ger_object_0fbc844d80a5
  global_id: ger_object_0fbc844d80a5
  canonical_name: Monkey Brain Dessert (Severed Monkey Heads with Chilled Brains)
  description: A grotesque dessert course at the Maharajah's feast, where live monkeys
    are brought to the table, their skulls cracked open with cleavers to expose raw
    brains. The brains are served chilled in the monkeys' own skulls, with guests
    (including the Maharajah and Chattar Lal) spooning directly into the exposed contents.
    This dish is served as the final course during the palace banquet in the Pleasure
    Pavilion, alongside other horrifying dishes like roasted boars, live eels in snakes,
    and eyeball soup. The presentation shocks Willie Scott (who faints/vomits into
    Short Round's hat) and horrifies Indiana Jones and his companions, while Chattar
    Lal and Captain Blumburtt react with varying degrees of discomfort. The dish is
    designed to horrify guests and demonstrate the opulence, cruelty, and depravity
    of the Maharajah's hospitality, embodying the Thuggee cult's cultural excesses
    and clashing with Western sensibilities.
  purpose: Dessert dish at the Maharajah's feast
  significance: The brains embody the Thuggee cult's depravity and Pankot Palace's
    cultural excesses, clashing Western sensibilities against Eastern mysticism. Willie's
    collapse marks her breaking point, while Indy's probing amid the feast exposes
    the Maharajah's complicity in the cult's revival.
  potential_owner_mention: Maharajah Zalim Singh
  potential_owner_uuid: null
  season_appearances:
