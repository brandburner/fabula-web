  description: A low steel ventilation grate sits near the floor on the rear wall
    of Hok’s museum. Indiana Jones moves it open to slip inside covertly, then peers
    through into the immaculate exhibition hall. He catalogs priceless artifacts from
    this vantage, senses traps and security, and notes the hall’s eerie emptiness
    before advancing. The grate conceals his entry amid the tension of potential pursuit.
  purpose: Provides covert entry point and initial concealment for infiltrating the
    museum’s exhibition hall
  significance: Enables Indy’s reconnaissance of Hok’s artifacts and traps, heightening
    stakes around theft, rival forces, and preservation risks in the empty hall
