  canonical_name: Zeppelin Internal Metal Framework (Exposed Catwalk)
  description: Girders and struts expose the Zeppelin's internal skeleton, with narrow
    catwalks spanning the gaps. Indiana Jones grips the railing as he urges Henry
    Jones Sr. down the precarious path toward hatchway doors. The metal creaks faintly
    under their steps amid engine drone and closing Nazi footsteps. They traverse
    it urgently after Germans spot the dead radio, funneling escape toward the biplane
    suspended beyond opened doors.
  purpose: Offers narrow walkways for movement through the framework to reach exterior
    access points like biplane moorings.
