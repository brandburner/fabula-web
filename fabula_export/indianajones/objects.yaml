  canonical_name: Henry Jones Sr.'s House Telephone
  description: Indiana Jones directs Marcus Brody to use the telephone amid the wreckage
    of Henry Jones Sr.'s ransacked living room—torn books, shattered furniture, and
    scattered mail everywhere. The device stands as the lone conduit to the outside
    world, its ring or dial untouched by the intruders, enabling the call that commits
    them to the Grail chase.
  purpose: Placing calls to secure travel arrangements and external support
  significance: Triggers Indy's pursuit of the Grail clues after finding his father's
    diary, marking the point of no return from skepticism to action
