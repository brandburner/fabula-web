  description: Ancient coffins constructed from oak wood and bound with brass straps
    crowd the burial chamber in the catacombs beneath the Venice library. Indiana
    Jones and Elsa Schneider inspect them amid walls etched with pagan symbols and
    crusader skeletons wrapped in rotting linen. Indy overturns one during Kazim's
    fire attack, creating a tight air pocket where he and Elsa gasp for breath as
    flames lick the edges and rats swarm outside.
  purpose: Burial containers that Indy and Elsa repurpose as shelter against fire
    and rodents
  significance: Offers Indy and Elsa desperate refuge amid the catacombs' horrors,
