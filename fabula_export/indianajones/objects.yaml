  global_id: ger_object_741cf2b310b2
  canonical_name: Nazi Cannon
  description: 'The Nazi tank''s large-caliber main cannon (referred to as both a
    ''six-pound cannon'' and the ''main gun'' in different contexts), mounted on the
    rotating turret. The barrel has a limited pivot arc, creating exploitable blind
    spots. During the high-speed chase, Indiana Jones disrupts its operation twice:
    first by kicking the periscope handle (throwing the crew into disarray and causing
    wild misfires), and later by ramming a Kubelwagon into the tank''s path (jamming
    the turret and blocking the barrel). These actions halt the cannon''s fire, forcing
    Nazi troops to scramble inside the armored hull to spot targets through ports.'
  purpose: Fire explosive shells at pursuing targets like Indy during the desert chase
  significance: Indy disables it through collision, stalling the Nazi pursuit and
    securing his escape. The cannon embodies brute mechanical force outmatched by
    his ingenuity, turning the tank's strength into vulnerability.
  potential_owner_mention: Nazi Troops
