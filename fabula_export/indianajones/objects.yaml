  global_id: null
  canonical_name: Castle Room Window Drapes (Brunwald)
  description: Heavy floor-length drapes in the Nazi-occupied castle room, creating
    oppressive darkness during Henry Jones Sr. and Indiana Jones' interrogation (Last
    Crusade).
  purpose: Cover windows to block light and create a dark, confining atmosphere
  significance: Heighten claustrophobia and desperation during interrogation, violence,
