  global_id: ger_object_50052fba9bc9
  canonical_name: Belloq's Drink
  description: Belloq pours himself a drink in the command tent at Tanis digs during
    a tense night meeting. The glass catches lamplight as Shliemann, Gobler, Shliemann’s
    Aide, and the arriving Belzig debate Marion’s interrogation. Belloq sips wearily,
    his action punctuating fatigue amid undermining arguments and the shift to brute
    force.
  purpose: Refreshment to combat Belloq's fatigue during confrontation
  significance: Belloq's drink underscores his isolation as Nazi officers prioritize
    coercion over his caution, marking a pivot to violence in the Ark pursuit
