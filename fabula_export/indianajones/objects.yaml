  description: Willie Scott stands before the mirror in her opulent palace suite,
    checking her appearance to project seductive confidence aimed at Indiana Jones.
    She adjusts her look meticulously, the reflection capturing her calculated staging
    of allure amid growing unease over his absence. The mirror anchors her ritual
    of self-presentation in the room's lavish isolation.
