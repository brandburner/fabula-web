- fabula_uuid: ger_object_c8ad795834cf
  global_id: ger_object_c8ad795834cf
  canonical_name: Friar’s Grail Manuscript
  description: A **historical textual artifact** distinct from all other props in
    the scene. Unlike modern objects (e.g., champagne flutes, furniture), this manuscript
    is a **primary source** from the Crusader era, written by a Franciscan friar.
    It is the **only known record** of the Grail knight’s journey and contains critical
    clues (Grail Tablet, Venice marker) that drive the plot. Its **brittle, leather-bound**
    nature and **reverential handling** by characters emphasize its importance as
    a **narrative linchpin**, not a prop.
  purpose: Historical record identifying Grail markers to guide the quest
  significance: Pairs with the tablet as the quest's incomplete foundation, heightens
    personal stakes by linking to Henry Jones Sr.'s disappearance, and propels Indy
    from skepticism to action against Nazi threats
  potential_owner_mention: Walter Donovan
