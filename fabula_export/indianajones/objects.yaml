  global_id: ger_object_059005373325
  canonical_name: Mongolian's Mauser Pistol
  description: The Mongolian draws his compact Mauser pistol from hiding amid the
    Raven bar's collapse, leveling it at Indy through thick smoke and roaring flames.
    Marion cuts him down with her Beretta before he fires, leaving the handgun as
    a discarded threat in the chaos. Its sudden appearance spikes the fight's lethality,
    underscoring the bar's deadly brawl.
  purpose: Sidearm to shoot at close-range enemies
  significance: Escalates the bar fight's peril, aims directly at Indy to force a
    desperate defense, and falls silent with its owner's death, bolstering Marion's
    claim as vital partner by proving her timely marksmanship.
