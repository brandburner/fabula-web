  description: A functional artifact within Pankot Palace, distinct from the palace
    itself; serves as a mechanical trigger for hidden passages.
  purpose: Conceals the entrance to an underground tunnel
  significance: Triggers the protagonists' descent into the Thuggee lair, shifting
