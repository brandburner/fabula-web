  canonical_name: Altar of Chalices
  description: A vast stone altar in the temple sanctum (Grail Chamber) displays hundreds
    of ornate chalices—gold goblets encrusted with jewels, silver cups etched with
    symbols, and humble clay vessels—among them the True Grail, simple and carpenter-made.
    Indiana Jones reaches it after surviving pendulum blades, word puzzles, and a
    leap of faith. The Grail Knight guards it, issuing the warning to 'choose wisely'
    as observers including Henry Jones Sr., Walter Donovan, Dr. Elsa Schneider, and
    Sallah watch from afar. This altar serves as the final trial of selecting the
    True Grail through faith and wisdom, marking the culmination of the temple's deadly
    trials.
  purpose: Holds chalices for the final trial of selecting the True Grail through
    faith and wisdom
  significance: Serves as the quest's ultimate goal and moral test; Indy's choice
    determines the Grail's power, his father's survival, and the defeat of Donovan
    and Elsa's greed, marking his shift from skepticism to belief
  potential_owner_mention: ''
  potential_owner_uuid: null
