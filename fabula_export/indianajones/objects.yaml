  potential_owner_uuid: null
- fabula_uuid: object_e48581426048
  global_id: null
  canonical_name: DC-3 Cockpit Controls
  description: Indiana Jones lunges at the DC-3 cockpit's control panels, dials, and
    switches after the co-pilot abandons the helm. Flames engulf the cabin as he deciphers
    the unfamiliar array—levers, gauges, throttles—gripping them tightly to yank the
    burning plane upward. His hands twist dials and flip switches instinctively, dodging
    strafing biplanes and scraping past a looming mountain peak amid engine fire and
    chaos.
  purpose: Operate flight controls to steer, navigate, and stabilize the DC-3 airplane
  significance: Indy masters these controls through sheer grit, transforming a plummeting
    death trap into a fighting chance, exposing his raw piloting skill under fire
