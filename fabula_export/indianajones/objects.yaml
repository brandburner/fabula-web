  global_id: ger_object_0ebdb58e38c2
  canonical_name: Sand from Mayapore Well Buckets
  description: Villagers haul up buckets from the Mayapore well, dumping dry sand
    instead of water onto the parched ground. The fine grains sift through fingers
    as women clutch the empty pails, their hollow stares fixed on Short Round amid
    the hunger-stricken silence. Indy witnesses this proof of utter dryness, the sand
    underscoring the village's desperation.
  purpose: ''
  significance: Exposes the well's failure and the curse's grip on Mayapore, shifting
    Indy's pursuit from relic to rescue amid childless grief and vulture-shadowed
    decay.
