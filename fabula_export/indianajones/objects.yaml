  global_id: ger_object_6457980db094
  canonical_name: Heavy Earthen Pot
  description: Marion vaults a wall in a narrow alley and grabs a heavy earthen pot
    from the surroundings, smashing it down onto a Bad Arab pursuer's head to knock
    him out cold. The rough clay vessel shatters on impact, turning an everyday alley
    object into a decisive improvised weapon that clears her path amid closing threats
    from more Bad Arabs, a German agent, and a watching monkey.
  purpose: Improvised blunt weapon for incapacitating pursuers
  significance: Gives Marion a split-second escape window, reveals her street-smart
    reflexes under pressure, and heightens tension as she ducks into a rattan basket
    with enemies still closing in.
