  canonical_name: Veiled Black Gowns of Cairo
  description: Black veiled gowns worn by women in Cairo's narrow streets and packed
    bazaars. The garments combine full-coverage gowns and face-veils that obscure
    individual features, producing social anonymity in crowded urban spaces. Cinematically
    they are shown alongside minarets, men in tattered galabiyas, and barefoot children,
    and serve both as traditional modest attire and a narrative device that enables
    concealment and deception in pursuit sequences.
  purpose: Traditional attire for women in Cairo's markets, providing modesty and
    blending into the urban crowd
  significance: These gowns populate the establishing montage, immersing viewers in
    Cairo's dense, anonymous atmosphere that enables pursuit, concealment, and deception
    during the Ark hunt
