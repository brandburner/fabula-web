  description: Marcy Brody rings the doorbell at midnight outside Indiana Jones's
    well-kept Tudor house. The chime announces her arrival and prompts tuxedo-clad
    Indy to open the front door. Brody stands on the stoop with urgent news, her insistence
    piercing Indy's polite refusal to engage.
