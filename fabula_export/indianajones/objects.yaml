  canonical_name: Indiana Jones's Mercedes-Benz
  description: The sleek Mercedes-Benz slices through mist in the jagged Austrian
    Alps, its engine humming like a ticking clock as Indiana Jones drives Henry Jones
    Sr. along the winding road. It later rolls into Castle Brunwald's shadowed courtyard
    with Indiana Jones and Dr. Elsa Schneider amid churning storm clouds and thunder.
  purpose: Transportation
  significance: Marks the narrative threshold from Venetian intrigue to Nazi confrontation
    at Brunwald, its precise path through the Alps underscoring the quest's urgency
    and escalating stakes.
