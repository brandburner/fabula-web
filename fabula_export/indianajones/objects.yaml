- fabula_uuid: ger_object_cc6c478c2dbe
  global_id: ger_object_cc6c478c2dbe
  canonical_name: Grail Knight's Shield Rubbing
  description: A water-soaked paper rubbing taken from the Grail Knight’s shield in
    the Venice apartment, revealing faint shield impressions and the inscription 'Alexandretta'
    (modern Iskenderun). Brody, nursing a head wound from his clash with Kazim, deciphers
    the inscription while pressing the rubbing against the table. Indy leans in, connecting
    the revealed location to Henry Sr.’s incomplete map and the Grail Tablet’s verse,
    as sunlight filters through the room and urgency mounts. This clue directly links
    to the next step in the Grail quest.
  purpose: Revealing the city name (Alexandretta/Iskenderun) that completes the Grail
    path
  significance: Unlocks the missing piece of Henry Jones Sr.'s map, shifts scattered
    clues into a clear route, and forces Indy to split the team—Brody to Iskenderun
    with Sallah, Indy to rescue his father—against closing Nazi pursuit
  potential_owner_mention: Marcus Brody
  potential_owner_uuid: ger_agent_8f6d40510b85
  season_appearances:
