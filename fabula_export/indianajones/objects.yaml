  canonical_name: Footbridge Over the Moat to Museum Entrance
  description: Narrow footbridge spans the moat from Hok’s Palace second-floor walkway
    to the museum entrance, serving as an exposed chokepoint. General Tengtu Hok leads
    German soldiers in a brisk rush toward it, their helmets and rifles filling the
    crossing with tension. Patrols tighten security here, blocking easy access and
    forcing intruders into open confrontation amid the heightened alert.
  purpose: Connects palace walkway across moat to museum entrance; acts as strategic
    route and defensive bottleneck
  significance: Escalates conflict by closing escape routes for Indiana Jones and
    allies; marks shift from ceremonial palace to militarized battlefield under Hok's
    command
