  global_id: ger_object_5cfad9da7c1e
  canonical_name: Indiana Jones' Scrap of Paper with Roman Numerals (Grail Diary Clue)
  description: A crumpled, handwritten scrap of paper inscribed with the Roman numerals
    III, VII, and X, derived from Henry Jones Sr.'s Grail Diary. Indiana Jones uses
    this paper to decode the corresponding markings on the Venetian Library's marble
    columns and stained-glass windows, ultimately leading him to the Grail tomb. This
    object is portable, owned by Indy, and functions as the 'key' in the puzzle-solving
    sequence.
  purpose: Guide sequence of Roman numerals to pinpoint the hidden tile marking the
    Grail tomb entrance
  significance: Confirms the path to the Grail's physical tomb, links Indy's quest
    to his father's diary, and escalates the race against Nazis by exposing the library's
    secret
