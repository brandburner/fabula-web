  global_id: ger_object_530a825be640
  canonical_name: Jagged Stalactites
  description: Jagged stalactites jut from the ceiling of the tight, wet inclined
    passage and narrowing corridors in the ancient temple. Torchlight catches their
    razor-sharp tips amid dripping plants and scurrying creatures as Indy and Satipo
    ascend warily below. The boulder later slams through, dislodging chunks that fly
    like shrapnel, forcing Indy to dodge amid the collapse.
  purpose: Form overhead hazards that break loose as deadly projectiles during structural
    failure.
  significance: 'Amplify the temple''s hostility: they set a claustrophobic mood early,
    then escalate the boulder chase into a barrage of flying debris, testing Indy''s
    survival instincts.'
