  description: Radio equipment occupies the cramped Nazi command tent at Tanis digs,
    enabling direct communiques to Berlin. Shliemann invokes its authority during
    arguments with Belloq, Gobler aligns with the impatient call, and Belzig's arrival
    amplifies the threat. The device hangs in the background as tensions shift from
    scholarly debate to political coercion, its presence isolates Belloq and targets
    Marion for interrogation.
  purpose: Transmits reports and orders between Tanis dig site and Berlin command
  significance: Imposes Nazi oversight on the Ark search, escalates professional disagreements
    into charges of insubordination, and precipitates Marion's brutal interrogation
