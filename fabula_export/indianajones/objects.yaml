  global_id: ger_object_487ea57865a9
  canonical_name: Hidden Passage
  description: Concealed underground tunnel accessed by smashing an 'X'-marked tile
    in the library floor. Cold, rancid air rushes from the opening as Indiana Jones,
    Marcus Brody, Dr. Elsa Schneider, and the Librarian witness the reveal; Indiana
    Jones and Dr. Elsa Schneider descend inside. Separately, a rotating fireplace
    hearth in the castle room swings open to drop Indiana Jones and Henry Jones Sr.
    into another such passage while escaping flames.
  purpose: Escape route and gateway to underground secrets
  significance: Unlocks physical progression in the Grail quest, shifts from decoding
    clues to confronting perils, and reveals layered protections around the Holy Grail's
    hiding places
