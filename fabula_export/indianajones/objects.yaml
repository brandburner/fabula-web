  description: Long, low table sits in the Pankot Palace's Pleasure Pavilion, surrounded
    by colorful pillows for seating. Guests including Indiana Jones, Willie Scott,
    Chattar Lal, Captain Blumburtt, and Maharajah Zalim Singh move toward it as drums
    signal dinner. The table anchors the shift from tense conversation to formal dining
    in the opulent pavilion.
  purpose: Seating and serving dinner for palace guests
  significance: Marks transition to formal gathering, building tension amid colonial
