- fabula_uuid: ger_object_b21c45c405ab
  global_id: ger_object_b21c45c405ab
  canonical_name: Hanging Plants in Inclined Passage
  description: Thick tendrils of wet vegetation drape from the ceiling and walls of
    the tight, inclined temple corridor, forming hanging plant life that turns the
    wet, dark cavern into a breathing antagonist. Torchlight flickers across tangled,
    dripping foliage as Indiana Jones and Satipo push upward, brushing leaves aside
    amid jagged stalactites, echoing drips, whistling drafts, and scurrying creatures.
    Plants narrow sightlines, heighten sensory paranoia, and crowd the space to amplify
    suffocating pressure during ascent.
  purpose: ''
  significance: Transforms neutral cavern into living threat that sets mood and stakes,
    externalizes Indy's isolation, primes audience for traps, pursuit, and betrayal
    by magnifying every sound into potential danger.
  potential_owner_mention: ''
