  global_id: ger_object_90542d2e7f2a
  canonical_name: Headpiece of the Staff of Ra
  description: A golden medallion headpiece that caps the Staff of Ra. The artifact
    is typically described as a welded headpiece which Indy removes from his robes
    and fits onto the top of the Staff; it aligns with mosaic receptacles and seasonal
    symbols. When properly seated it channels a time-sensitive shaft of sunlight (via
    the map room's crystal) to illuminate the miniature Tanis model and reveal the
    Well of the Souls. Narrative provenance notes one half of the medallion is in
    China while the other was held by Abner Ravenwood; the object is the focus of
    Nazi intelligence and is immediately recognized as significant by Marcus Brody.
  purpose: Focuses sunlight through its medallion to pinpoint locations on the Tanis
    map room model when mounted on the Staff of Ra
  significance: Key to finding the Ark in the Well of the Souls; Indy steals it as
    the quest's objective, its decoding and use shift the plot from rivalry to supernatural
    peril, vindicating Indy's expertise over Belloq and the Nazis
  potential_owner_mention: Abner Ravenwood
