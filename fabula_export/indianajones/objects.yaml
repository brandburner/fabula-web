  canonical_name: Huge Mysterious Temple Mechanism
  description: Buried deep in the Chachapoyan temple sanctuary, this massive unseen
    mechanism rumbles to life with a low growl that builds to a thunderous roar when
    Indy swaps the idol and the pedestal drops five inches. The escalating chain of
    mechanical sounds signals poison darts and collapsing floors activating in sequence.
    Indy freezes with torch raised mid-escape; Satipo glances nervously as the chamber
    turns from tense heist to deadly pursuit.
  purpose: Triggers the temple's trap systems and broadcasts alarms through rising
    rumbles when the idol pedestal lowers
  significance: Transforms the sanctuary from intellectual puzzle to survival gauntlet,
    heightening jeopardy after the idol swap and foreshadowing betrayal as Indy and
    Satipo flee
