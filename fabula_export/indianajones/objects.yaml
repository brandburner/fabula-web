- fabula_uuid: ger_object_685b41921fe6
  global_id: ger_object_685b41921fe6
  canonical_name: Flower from Dancing Girl’s Hair
  description: Indiana Jones cracks his bullwhip across the lantern-lit Pleasure Garden
    and snags the flower from a dancing girl’s dark hair. The delicate bloom, pinned
    as an ornament amid her flowing tresses and rhythmic movements, flies precisely
    into his grasp. The Maharajah watches intently, Short Round cheers, and guests
    murmur approval as the trick highlights Indy's command amid dinner tension.
  purpose: Target and prop for Indiana Jones's whip precision demonstration
  significance: Captures Indy's showmanship to charm the Maharajah and guests, masking
    unease while the Thuggee cult's shadow looms; the snatch underscores his control
    in a palace rife with hidden threats.
