  canonical_name: German Bulldozers at Tanis Dig
  description: Heavy bulldozers rumble across the vast Tanis dig site under Nazi control,
    their blades gouging earth in relentless excavation. One machine lumbers toward
    a distant digging area, kicking up dust clouds as Arab diggers and workers scatter
    nearby. German supervisors direct the operation while Indy and Sallah observe
    from a rise above, spotting the machines' misguided assault on the wrong location
    for the Well of the Souls.
  purpose: Heavy machinery tears up soil to excavate the Tanis site in search of the
    Well of the Souls
  significance: These machines drive the Nazi excavation effort, digging in the wrong
    spot and creating urgency as Indy races to beat them to the map room before the
    sun beam at eight
