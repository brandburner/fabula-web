  canonical_name: Box Containing the Bejeweled Cross of Coronado
  description: Young Indiana Jones steals the gleaming gold Cross of Coronado from
    Pueblo ruins and tucks it into his belt, where it dangles during a chaotic horseback
    chase across cliffs and a frantic train-top fight against Fedora's gang—Halfbreed,
    Rough Rider, and Roscoe. Indy clutches it tightly bursting into his father's study,
    pleading its importance, but the sheriff betrays him, handing it over amid Fedora's
    taunts. In 1938, adult Indy guards it on a storm-tossed ship until the Man in
    the Panama Hat yanks it free, pockets the relic, and orders his crew to throw
    Indy overboard.
  purpose: Container for the Bejeweled Cross of Coronado
  significance: Ignites Indy's first moral stand against grave robbers, fuels relentless
