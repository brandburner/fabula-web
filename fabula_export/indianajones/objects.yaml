  description: A **temporary, chaotic burst of silvery water** created when the inflatable
    raft **slams into a rushing mountain stream** during the snowline descent in *Indiana
    Jones and the Temple of Doom*. This is a **natural phenomenon**, not a man-made
    object, and serves to **drench characters** (Willie Scott and Short Round) and
    **intensify the peril** of the raft escape. The spray is **passive** (does not
    interact with the plot mechanically) and **contrasts with the raft’s bounce onto
    jagged rocks**.
  purpose: Generates drenching spray hazard when raft impacts stream at high speed
  significance: Intensifies immediate physical peril in the runaway raft escape, contrasts
    Willie's terror with Short Round's resilience, and marks the shift from mountainside
    chaos to river survival under Indy's command
