  description: Mesh screen door in the front room of a 1912 home, used by young Indy
    to peer through and spot the Man in the Panama Hat and Fedora’s gang lurking outside.
    Acts as a porous barrier, heightening tension during the confrontation over the
    Cross of Coronado.
