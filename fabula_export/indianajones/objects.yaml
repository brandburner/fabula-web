  global_id: ger_object_5907f928b4cb
  canonical_name: Indiana Jones' Oversized Nazi Soldier Uniform
  description: Dark wool Nazi soldier uniform with insignia, several sizes too large
    for Indiana Jones, worn as a disguise to infiltrate the Berlin book-burning rally.
    The baggy fit—with loose sleeves and trousers—strains against his frame as he
    navigates chanting crowds, ambushes Elsa Schneider to retrieve the Grail Diary,
    and escapes past Hitler's entourage amid flaming books and podium fervor. The
    uniform's oversized nature is a recurring visual motif, emphasizing the tension
    between disguise and identity.
  purpose: Disguise for blending into Nazi rally crowds and accessing restricted areas
  significance: Enables Indy's theft of the Grail Diary from Elsa amid the rally chaos,
    heightens tension in their violent standoff, and positions him for the ironic
    encounter with Hitler, who autographs the recovered diary
  potential_owner_mention: Indiana Jones
