  canonical_name: Crumbling Pillar of the Well of the Souls
  description: Indiana Jones loops his whip around this tall, unstable stone pillar
    rising from the snake-infested floor of the Well of Souls. He climbs its carved
    height under dawn light filtering through cracks, then shoves hard to topple it.
    The pillar crashes into the wall, shattering stone to reveal a hidden escape chamber.
    Surrounded by recoiling serpents and the Ark's humming energy, it shifts from
    obstacle to lifeline amid crumbling ancient masonry.
  purpose: Structural support in the ancient Egyptian tomb; improvised demolition
