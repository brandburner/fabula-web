    Jones, Henry Jones Sr., and Sallah as transport and logistical support during
    their pursuit of the Holy Grail. Parked on a desert rise overlooking a Nazi convoy,
    the car is destroyed when a tank shell strikes it, exploding into jagged metal
    shards and twisted panels. The debris scatters across the sand, leaving the trio
    stranded and vulnerable without supplies or transport.
