  canonical_name: Venetian Library's Crusader-Era Marble Columns (Roman Numeral Markings)
  description: Four immovable, carved marble columns in the Venetian Library, looted
    from the sack of Byzantium. Each column bears a distinct Roman numeral (III, VII,
    or X) that, when decoded using Henry Jones Sr.'s clues (e.g., the scrap of paper),
    reveals the location of the Grail tomb. These columns are a fixed part of the
    library's architecture and serve as the physical puzzle mechanism in Indy's quest.
  purpose: Structural supports bearing engraved Roman numerals that serve as puzzle
    clues
  significance: Key elements unlocking the Grail tomb's location, linking Indy's quest
    to his father's notes and escalating the Nazi pursuit
