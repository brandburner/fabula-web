  description: Indiana Jones grabs this steward's uniform—hat and jacket—from the
    onboard steward inside the zeppelin's passenger compartment. He pulls it on to
    pass as crew, striding the aisle to inspect tickets and buy seconds of safety.
    Passengers ignore him until Vogel locks eyes on Henry Jones Sr., ripping away
    the facade. The crisp uniform contrasts Indy's battered adventurer look, underscoring
    his frantic shift to deception.
  purpose: Disguise as zeppelin steward for blending in and checking tickets
  significance: Provides momentary cover after Nazis board, but quick exposure by
