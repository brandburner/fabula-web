  global_id: ger_object_505610a8e38d
  canonical_name: Tall Vine-Covered Jungle Trees
  description: Tall trees wrapped in thick vines tower over the jungle path, swaying
    in the wind and framing the dense foliage. Elephants shove through this tangled
    overgrowth as Short Round shouts from within, spotting Pankot Palace perched high
    above. Indy nods in confirmation while Willie gapes at the structure rising beyond
    the verdant screen.
  purpose: Obstruct passage through jungle and frame distant views
  significance: Mark the transition from wilderness pursuit to palace confrontation;
    heighten awe as Short Round first sights the white Moghul structure above the
    canopy
  potential_owner_mention: ''
