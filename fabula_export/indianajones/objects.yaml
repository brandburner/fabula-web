  global_id: ger_object_2b46a1186b44
  canonical_name: Indy's Escape Car Throttle
  description: Indy jams this throttle lever down hard, surging the car's engine to
    top speed as a low-flying Messerschmitt roars overhead, spraying bullets that
    detonate around them. Henry grips his seat in open panic beside him, yelling about
    the assault, while Indy's focused push keeps them ahead in the desperate chase.
    The control jams forward under his grip amid the chaos.
  purpose: Accelerates the car engine to maximum speed during aerial pursuit evasion
  significance: Powers Indy's steady control against the Messerschmitt's gunfire,
