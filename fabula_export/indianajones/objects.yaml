  global_id: ger_object_6b48e15cfab1
  canonical_name: Mirror Reflecting Assassin's Glowing Eyes
  description: A mirror captures the supernatural assassin's face, which distorts
    into a reflective surface showing glowing yellow eyes. Indiana Jones stares into
    it while pinned and struggling against the Thuggee cult assassin in his suite.
    Short Round watches groggily nearby. The reflection symbolizes the cult's psychological
    manipulation as Indy fights to break free.
  purpose: Reflect images and faces, here distorted by the supernatural assassin to
    reveal glowing yellow eyes.
  significance: Exposes the Thuggee cult's insidious psychological grip on Indy, shattering
    his sense of safety in the suite and foreshadowing brainwashing threats. Heightens
    vulnerability during the ambush.
