- fabula_uuid: ger_object_08494adf29b7
  global_id: ger_object_08494adf29b7
  canonical_name: Farmhouse (Biplane Crash Site)
  description: Biplane wreckage skids through a goat corral and smashes into the farmhouse,
    buckling its walls and hurling up thick dust clouds. Indiana Jones and Henry Jones
    Sr. pull free from the cockpit debris amid splintering timbers and strafing bullets
    that gouge the nearby field earth. The structure stands amid the chaos as they
    dive for cover behind a stone barricade.
  purpose: ''
  significance: Crash site escalates Nazi pursuit into ground assault, forcing Indy
    and Henry into desperate scramble that exposes their clashing responses to danger—Indy's
    reflexes versus Henry's raw shock—testing their fragile alliance under fire.
