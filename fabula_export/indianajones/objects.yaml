  global_id: ger_object_eb152b6d28aa
  canonical_name: Indy's Crowbar
  description: Adult Indy grabs the crowbar during the chaotic ship brawl against
    the Man in the Panama Hat and his sailors. He swings it fiercely amid crashing
    waves and exploding fuel drums, prying leverage in close combat and fending off
    multiple attackers. The heavy metal tool dents with impacts, its hooked end catching
    limbs as Indy fights for control of the Cross of Coronado before escaping with
    a life preserver.
  purpose: Improvised weapon for close-quarters combat against attackers
  significance: Enables Indy's survival in the 1938 ship confrontation, reclaiming
    the Cross of Coronado and closing the loop on his 1912 betrayal. It embodies his
    resourcefulness, turning ship cargo into a tool for defiance against relic thieves.
