    Ark from the wrecked Flying Wing. Shliemann orders soldiers to load the crate
    aboard for transport to Cairo. Indy charges on horseback, vaults onto the cab
    and ejects the driver, then drives the truck wildly up mountain roads and through
    crowded Cairo alleys—scraping tunnel walls to hurl back attackers, slamming the
    brakes (wheels screeching and burning rubber) to fling boarders off the vehicle,
    and ramming a pursuing staff car amid gunfire and explosions.
