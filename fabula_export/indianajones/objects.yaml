    the shadowed hallway of Castle Brunwald. Indiana Jones spots it amid the oppressive
    silence broken by distant Nazi chatter, instantly recognizing it as proof of activity—and
    his father Henry's captivity—beyond the door. His grip tightens on his revolver;
    Elsa Schneider glances at it skeptically, questioning his deduction before he
    explains.
  purpose: Supplies electricity to the Nazi-occupied room where Henry Jones Sr. is
    held
  significance: Alerts Indiana Jones to his father's location, sparking a pivotal
