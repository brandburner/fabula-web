  global_id: ger_object_1c66111cd5c5
  canonical_name: Indy's Cabin Wall Hook
  description: A sturdy wall hook in Indy's cramped ship cabin suspends his coiled
    bullwhip and leather jacket within arm's reach. Indy yanks both free as unnatural
    silence jolts Marion awake from bed; he straps on his holster alongside, shifting
    swiftly from rest to readiness amid rising threat.
  purpose: Stores Indy's whip and jacket for instant access during emergencies
  significance: Triggers Indy's transformation into investigator, arming him with
    signature tools as shipboard silence hints at sabotage and propels pursuit
