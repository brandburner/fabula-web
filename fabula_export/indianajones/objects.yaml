    given to Indiana Jones. Lao Che places it on the ballroom table as a bargaining
    chip for Nurhachi's remains. Indy reaches for it amid negotiations, but violence
    erupts—Chen shoots Wu Han, sparking a brawl. The vial rolls across the floor;
