- fabula_uuid: ger_object_9d0346431661
  global_id: ger_object_9d0346431661
  canonical_name: Mayapore Village's Sankara Stone
  description: The sacred sivalinga, known as the Sankara Stone, embodies Mayapore
    Village's spiritual core. Stolen by the Thuggee cult from Pankot Palace, its absence
    triggered drought, famine, and child abductions. Indiana Jones reveals it from
    his pocket atop the cliff, its hidden diamond core glinting in sunlight. Willie
    Scott cradles it in wonder before the shaman returns it to the village shrine,
    instantly transforming barren hills into lush, fertile land amid family reunions.
  purpose: Channels mystical energy to restore life, fertility, and prosperity to
    Mayapore Village when placed in its shrine
  significance: Drives the central quest as the Thuggee cult's power source and the
    key to breaking their curse; its recovery defeats Mola Ram, frees captive children,
    and heals the land, marking the heroes' triumph while underscoring the artifact's
    dual role as hope and burden
