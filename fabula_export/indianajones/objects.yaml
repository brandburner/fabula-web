  global_id: ger_object_78a3b045fe1f
  canonical_name: Belloq's Engraved Ivory Rod
  description: A roughly five-foot-long, sturdy ivory rod—elaborately engraved and
    pale—kept in a wooden case and presented to Belloq during the Tabernacle ceremony.
    Belloq grasps the rod and intends to place it into a notch beneath the Ark's lid
    to conduct the ritual invocation; its smooth surface catches torchlight as surrounding
    soldiers watch, creating a moment of ceremonial tension.
  purpose: Place in notch under Ark's lid to conduct ritual invocation
  significance: Transforms Nazi dig site into sacred ceremony; Belloq's use asserts
    ritual authority over military aggression, stalling execution of Indy and preserving
    the Ark's power for opening
