  description: Lush vines snake through the dense, labyrinthine university gardens
    surrounding the college building. Indiana Jones grabs them for cover and leverage
    during his frantic escape from Nazi agents, darting between thick tangles that
    obscure his movements and slow pursuers. The greenery shifts from serene backdrop
    to tactical barrier as he vaults hedges and statues intertwined with the foliage.
  purpose: Provide cover, handholds, and obstacles to evade pursuers
  significance: Facilitate Indy's transformation from professor to fugitive, repurposing
    academic sanctuary elements into survival tools amid the chase
