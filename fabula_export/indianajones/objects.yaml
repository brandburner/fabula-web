  canonical_name: DC-3 Escape Plane (Nang Tao Airfield, Sabotaged)
  description: Two-engine Douglas DC-3 passenger plane used for a frantic escape from
    Lao Che's men in Shanghai. Parked and revving on Nang Tao Airfield tarmac, it
    carries Indiana Jones, Willie Scott, Short Round, the pilot, and co-pilot. The
    plane is sabotaged (engine failure) during takeoff, leading to a mid-air pursuit
    by Lao Che's biplanes, which strafe its fuselage. Indy takes control, dodging
    a mountain peak, before ordering the inflation of the forward life raft. The group
    abandons the plane as it plummets, crashing into the Mayapore hills (previously
    described as snowy Indian mountains), drawing villagers who foresaw the event.
    The sabotage, biplane attack, and crash sequence are key narrative beats in the
    escape from Shanghai, transforming the Shanghai showdown into an airborne pursuit
    and crash, thrusting protagonists into the Indian village crisis and Pankot Palace
    quest. Lao Che watches the takeoff impotently while Kao Kan hardens his resolve
    for revenge.
  purpose: Rapid passenger transport to evade ground pursuit from Shanghai airfield
  significance: Carries the trio from Shanghai's gangster violence into aerial peril,
    its takeoff caps the Duesenberg chase while foreshadowing biplane attack and crash
    that strands protagonists in Pankot territory, reshaping their quest.
