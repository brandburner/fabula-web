    the Well of the Souls, then ignites them with torches to produce a six-foot-wide
    path of roaring flames. The fire clears serpents ahead, forms a burning barrier
    at the edges, and illuminates the crossing as Sallah follows close behind. Eggs
    hatch and hatchlings emerge nearby, cannibals devour each other, intensifying
    the hazard.
