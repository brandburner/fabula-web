  canonical_name: Vogel's Shovel
  description: Sturdy metal shovel gripped by Nazi officer Vogel during the chaotic
    tank pursuit. Vogel swings it with force against Indiana Jones' hands as Indy
    clings to the gun barrel, knocking him loose to dangle from his satchel strap
    over a deadly drop. Indy later seizes the same tool in their brutal fistfight
    atop the tank, landing a decisive strike that topples Vogel and aids the rescue
    of Henry Jones Sr. and Marcus Brody amid gunfire and the vehicle's wild motion.
  purpose: Improvised bludgeoning weapon to strike opponents and dislodge them from
    precarious holds
  significance: Escalates the visceral brutality of the tank chase fight between Indy
    and Vogel, forcing life-or-death improvisations that test Indy's resolve to protect
    his father and ally while highlighting Nazi ruthlessness in the Grail quest.
