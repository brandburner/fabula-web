  description: Acts as a tool for Indy's precise maneuvers during the high-speed chase,
    contrasting with Henry's panic. Unlike the windshield, this entity is actively
    used to evade bullets and navigate the car, embodying Indy's focus and skill.
  purpose: Directs the car's path during high-speed evasion from aerial strafing attack
  significance: Enables Indy's precise maneuvers that save their lives, sharpening
    the contrast between his battlefield focus and Henry's unraveling panic during
    their tense father-son flight
