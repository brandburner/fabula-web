    crated Ark of the Covenant. The truck appears in two key scenes: (1) at the Nazi
    encampment near Tanis, where the Ark is loaded under Belloq''s supervision and
    guarded by armed soldiers, and (2) in the desert convoy where Indy, Marion, and
    Sallah observe its departure. The truck''s canvas flaps billow in the wind as
    it joins an armored convoy, symbolizing the Ark''s high-stakes relocation and
    Indy''s subsequent pursuit.'
  purpose: Transport the Ark of the Covenant from the Tanis airstrip to Cairo
  significance: Forces Indy, Marion, and Sallah into a desperate desert chase, shifting
