  description: Indiana Jones perches on a high dune and sights through the surveyor's
    instrument, twisting its dials to capture exact bearings from the map-room coordinates.
    He extends the line across the Nazi camp to a smooth, untouched sand ridge. Nazis
    stand nearby, but Indy alone operates the compact, brass-framed tool under blazing
    daylight, its lenses catching glints as he pinpoints the Well of the Souls.
  purpose: Capturing precise readings to triangulate and map the true location of
    the Well of the Souls from known coordinates
  significance: Exposes the Nazis' error in excavation, redirects the search to the
    correct dune, and thrusts Indy ahead in the race for the Ark while highlighting
    his field expertise
