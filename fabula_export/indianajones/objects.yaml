    water amid skeletal remains and swarming rats. The ignition unleashes a roaring
    fireball that surges through narrow catacomb passages, scorching air and driving
    thousands of rats into a stampede. Indiana Jones grabs Elsa Schneider, topples
    a knight's coffin for cover, and submerges them both beneath it, trapping a pocket
    of air as flames rage overhead.
  purpose: Ignite petroleum to create pursuing fireball and environmental hazard
  significance: Catalyzes inferno that transforms scholarly discovery into survival
