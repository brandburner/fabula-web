  description: Tail-mounted fin assembly on the biplane that Henry Jones Sr. accidentally
    damages with a wild swing of the rear machine gun during a mid-air chase. The
    component, a critical rear stabilizer, is sliced in half by bullets, causing metal
    to shear apart and spark as the severed section dangles. This damage robs the
    plane of directional control, sending it into an uncontrollable spiral and a steep
    dive toward the ground. The stabilizer's failure is a pivotal moment in the mid-air
    chase, forcing Indiana Jones to fight for control of the crippled aircraft.
  purpose: Stabilizes the biplane's tail during flight, ensuring straight-line control
    against yaw and turbulence
  significance: Henry's blunder escalates the dogfight from comedy to catastrophe,
    fractures father-son trust mid-crisis, and forces Indy to wrestle failing controls
    while evading Messerschmitts
