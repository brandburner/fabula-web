  description: A massive woven rattan basket large enough to fully conceal Marion.
    She first climbs inside and pulls the lid shut to hide in a shadowed alcove during
    a chase; later the same basket is carried by two abductors across a deserted square,
    thrown into a truck bed while a German agent provides machine-gun cover. The basket
