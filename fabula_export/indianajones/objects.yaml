  description: Portable oil lamp affixed to the chamber wall, pried free by Indiana
    Jones and used to illuminate the insect-infested floor. Its light draws swarms
    of bugs, creating tension and revealing hidden levers. Discarded or forgotten
    after serving its purpose in the escape sequence.
  purpose: Illuminate dark tunnels and chambers
  significance: Pierces blackness to aid lever hunts and reveal dangers in Thuggee
