    forming a searing barrier that divides the altar from the worshippers' area. Flames
    erupt from its surface, creating intense heat that warps the air above. Indiana
    Jones tests a makeshift wooden bridge spanning the pit, but the flames ignite
    the plank mid-crossing, causing it to collapse and strand the heroes (Indiana
    Jones, Willie Scott, Short Round, the Big Guard, and rebellious slave children)
