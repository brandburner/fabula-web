  canonical_name: Indy's Appointment Schedule
  description: A *temporary document* listing Indy's student appointments, handed
    to him by Irene in the outer office chaos of *Last Crusade*. Unlike permanent
    fixtures, this prop is scene-specific and disappears after its narrative purpose
    is served.
  purpose: Organize student appointments by arrival order for sequential meetings
  significance: Symbolizes the administrative burden of Indy's university life, contrasting
    academic chaos with the emerging Grail quest triggered by the Venice letter
