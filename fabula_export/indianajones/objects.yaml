  description: Chewed date pits scatter across the floor of Sallah’s truck around
    the dead spy monkey. The messy pile of remnants shows the monkey stole and ate
    poisoned dates meant for Indy. Sallah spots the pits, tastes a date, and spits
    it out, confirming the poison after the monkey convulses and dies in Amir's arms.
  purpose: Remains proving consumption of poisoned dates
  significance: Exposes Nazi treachery through the monkey's death, shifts hope back
    to peril, and prompts Sallah's warning about contaminated food
