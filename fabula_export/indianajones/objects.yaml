  global_id: ger_object_d6faa088b828
  canonical_name: Ark of the Covenant
  description: The Ark of the Covenant — an ancient, sacred artifact described in-universe
    as surrounded by death and (per Sallah) unfit for human disturbance. Belloq frames
    it as a transmitter that can speak to God, raising its stakes. Narrative scenes
    show Nazis crating and transporting the Ark (e.g., secured in a wooden crate outside
    the Tanis command tent; loaded into canvas-topped troop trucks and aboard transports
    such as the Wurrfler), where it drives key plot action.
  purpose: Serves as a transmitter to communicate with God
  significance: Drives the plot as the central MacGuffin, converting a treasure hunt
    into an existential threat with moral warnings from Sallah and apocalyptic promises
    from Belloq; Nazis treat it as their ultimate strategic prize, guarding it fiercely
    amid chaos.
