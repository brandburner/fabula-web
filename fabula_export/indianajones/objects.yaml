  global_id: ger_object_a7883f46b65f
  canonical_name: Indy's Boot
  description: Indiana Jones yanks off one rugged boot and hurls it at the clock in
    his suite, spiking it with frustration amid interrupted rest. He later slips the
    boot back on as he readies to leave, pulling himself together after the supernatural
    assassin's ambush exposes his vulnerability.
  purpose: Rugged footwear for expeditions and daily wear
  significance: Channels Indy's raw frustration and signals his shift from disheveled
    repose to action against the Thuggee cult's invasion of his sanctuary.
  potential_owner_mention: Indiana Jones
