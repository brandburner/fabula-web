    museum. Thousands of fine threads radiate from the hammer, spiderwebbing across
    the ceiling and linking to every display case to form a delicate trip mechanism:
    any disturbed thread activates the hammer to strike the gong and sound a loud
    alarm. Indiana Jones studies the arrangement closely, tracing triggers and blind
    spots and mentally mapping an escape route through a high window.'
  purpose: Strikes the golden gong to sound a loud alarm if any thread disturbs the
    mechanism, securing the museum's artifacts.
