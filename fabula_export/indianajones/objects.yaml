  description: Large taxidermied raven mounted behind the bar in Marion Ravenwood's
    tavern, The Raven. The prop conceals a hidden Beretta automatic pistol within
    its body; during the Nazi raid/ barroom brawl Marion reaches toward it but does
    not draw it, and the raven is later struck and splintered amid bullets, exploding
    bottles, fire, and hand‑to‑hand chaos.
  purpose: Conceals a Beretta pistol behind the bar
  significance: Thematic centerpiece matching the tavern's name; its destruction marks
    escalating violence as Belzig's henchmen clash with Indy and Marion, confirming
