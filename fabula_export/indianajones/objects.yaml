  canonical_name: General Hok's Gilded Headpiece
  description: 'A gilded headpiece—ornately carved with a round hollow at its base
    to mount atop a staff—kept in General Tengtu Hok''s museum in Shanghai (resting
    on purple velvet inside a glass case). In the narrative, Indiana Jones identifies
    this artifact as the crucial first objective in his plan to outpace the Nazis:
    he intends to retrieve it from General Hok as leverage toward finding Ravenwood
    and the Well of the Souls. The object is subsequently the focus of an attack in
    the museum, where samurai protectors clash with Indy during his attempt to inspect/recover
    it.'
  purpose: Serves as a clue or lead to Ravenwood's location and the Well of the Souls
  significance: Marks the starting point of Indy's two-step strategy, shifting the
    scholarly study into a high-stakes global pursuit and underscoring his prioritization
    of Nazi competition over local threats
