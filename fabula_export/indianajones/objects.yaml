  canonical_name: Indy's DC-3
  description: Propeller plane slices through blood-orange dusk skies west toward
    Nepal, its silhouette underscoring Indiana Jones's solitary chase for the Ark.
    Indy rides aboard during the compressed flight; later, it origins the trench-coated
    European spy who shadows him streetside outside The Raven.
  purpose: Transports Indiana Jones across geography toward Nepal, compressing travel
    time.
  significance: Bridges action beats, heightens isolation against pursuit, and establishes
    spy surveillance chain.
  potential_owner_mention: Indy
