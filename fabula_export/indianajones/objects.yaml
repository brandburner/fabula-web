  description: Indy cracks his bullwhip through the cramped bazaar, toppling tables
    laden with market wares. Goods scatter as tables overturn and skid across the
    square, slamming into fighters and piling into barriers that tangle attackers.
    Marion dodges the flying debris during her escape amid the frenzy.
