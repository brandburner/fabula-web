  global_id: ger_object_77ef7af1b044
  canonical_name: Biplane Cockpit
  description: 'Indiana climbs into the cramped forward cockpit of the improvised
    biplane and grips the controls. Henry settles into the rear tail-gunner seat.
    Their tight space frames a candid exchange: Henry praises Indy''s flying ability,
    and Indy jokes he cannot land. After the crash into a farmhouse, Indy and Henry
    pull themselves from the battered compartment amid strafing Messerschmitts and
    scattering goats.'
  purpose: Serves as the biplane's forward control station where the pilot directs
    flight during Nazi pursuit
  significance: Hosts the father-son dialogue that rebuilds their partnership through
    trust and humor, then survives the crash to eject them into fresh danger from
    strafing fighters
