  canonical_name: Hok's Bullets
  description: Hok fires bullets inside his museum gallery, cutting off Indy's escape.
    Indy rolls a massive ceremonial gong as a shield. The bullets strike the gong,
    walls, and surfaces, ricocheting to produce loud ringing echoes that disorient
    Hok and mask Indy's leap onto a marble bench and dive through the skylight. They
    maintain lethal hazard amid the chaos.
  purpose: Injure or kill targets through direct fire and ricochet
  significance: Ricochets off the gong generate acoustic cover, transforming a desperate
    defense into resourceful escape that heightens tension and emphasizes Indy's improvisation
    under fire.
