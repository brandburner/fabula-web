  canonical_name: Henry Jones Sr.'s Desk
  description: Marcus Brody picks up Henry’s opened mail from this cluttered desk
    in the ransacked house, its strewn papers and disarray signaling intruders’ search
    or Henry’s hasty exit. Indiana Jones takes in the chaos under late afternoon light
    amid shattered furniture and torn books, the desk anchoring the scene’s violent
    disorder before the Grail Diary surfaces nearby.
  purpose: Holds personal mail and research papers
  significance: Signals Henry Jones Sr.’s abduction through ransack evidence, heightens
