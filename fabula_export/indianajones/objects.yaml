  global_id: null
  canonical_name: Carpet of Writhing Insects in Pankot Palace Tunnel System
  description: A localized environmental hazard *exclusively* within the Pankot Palace
    Tunnel System, encountered *after* the group enters the palace. This obstacle
    forces Indy and Short Round to crawl through a mass of arachnids and hexapods
    in darkness, serving as a tactile challenge tied to the palace’s interior dangers.
  purpose: Forms a physical barrier and psychological hazard in the Thuggee cult's
    underground trap
  significance: Escalates claustrophobia and dread, testing Indy and Short Round's
    bond and wits as the cult seals them inside. Shifts pursuit to visceral survival,
    separating them from Willie and deepening the palace's threat.
