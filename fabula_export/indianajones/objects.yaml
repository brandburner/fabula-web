  global_id: ger_object_8d993ac4c017
  canonical_name: Chaise Lounge in Indiana Jones's Suite
  description: Chaise lounge in Indiana Jones's private suite, positioned in front
    of his bed. Serves as Short Round's makeshift sleeping spot during the nighttime
    ambush by the Thuggee cult. The chaise anchors Short Round's resting position
    amid the chaos, with its cushions absorbing nearby impacts as Indy grapples with
    the Thuggee assassin. The piece symbolizes the false security of Indy's personal
    sanctuary, where the supernatural assassin materializes from a wall painting to
    ambush Indy. Short Round stirs groggily on the chaise as Indy silences the alarm
    clock, and the furniture remains a fixed element of the room's tense domesticity
    during the attack.
  purpose: Reclining seat for sleeping
  significance: Highlights Short Round's vulnerability in the suite sanctuary; Indy's
    throw positions the dying assassin beside it, forcing the boy to confront the
    intrusion and deepening their protective bond amid cult violence.
