  description: Two massive freighters drift together in the crowded harbor, their
    steel hulls closing the gap with unstoppable force. Indy and Elsa steer their
    speedboat through the narrowing space to escape crushing. Kazim's speedboat slams
    between them, shreds apart, and bursts into flames from the impact.
