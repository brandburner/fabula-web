  canonical_name: Indiana Jones' Iron Rod (Mechanical Sabotage Tool)
  description: A sturdy iron rod snatched by Indiana Jones during the Thuggee ritual,
    used to jam the crankwheel's gears and halt Willie Scott's sacrificial descent
    into the lava pit. Distinct from Short Round's flaming torch; serves a mechanical
    rather than psychological function.
  purpose: Jam the crankwheel gears to halt the sacrificial frame's descent into lava
  significance: Indiana Jones deploys the rod immediately after Short Round burns
    away his hypnotic trance, enabling him to save Willie and shift momentum against
    the cult in the ritual's climax
