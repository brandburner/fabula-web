  canonical_name: Indy's Shovel
  description: Indiana Jones seizes a shovel amid the quarry cavern's chaos and swings
    it hard against a track switch. The blow redirects the empty mine cart carrying
    Willie Scott and Short Round into the wrong tunnel, accelerating their frantic
    escape from Thuggee guards and gunfire. Dust flies as the tool clangs metal-on-metal,
    buying precious seconds in the high-stakes chase.
  purpose: Striking a switch to divert mine cart tracks
  significance: Propels the protagonists' getaway from the quarry but sends them down
    the incorrect tunnel, intensifying pursuit by Mola Ram's forces and underscoring
    Indy's quick improvisation under pressure.
