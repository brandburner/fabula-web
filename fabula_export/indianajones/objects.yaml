- fabula_uuid: ger_object_0511371e0f3d
  global_id: ger_object_0511371e0f3d
  canonical_name: Grail Diary Pages
  description: Donovan grips the Grail Diary pages—torn sheets from Henry Jones's
    journal—and displays them to the Sultan amid a trunk of looted treasures in the
    sunlit Iskenderun courtyard. These fragile pages map the Grail's location, serving
    as proof of Nazi intelligence. The Sultan glances past them toward the Rolls-Royce,
    while Vogel and two Nazi soldiers witness the offer. Donovan uses the pages to
    bargain for military aid, but Elsa's arrival with news of the Joneses' escape
    cuts the exchange short.
  purpose: Provide clues to the Holy Grail's location and act as a bargaining tool
    to secure the Sultan's military support
  significance: Demonstrates Nazi control over stolen scholarly knowledge, enabling
    negotiations for armed escorts, provisions, and tanks; their presentation underscores
    the antagonists' confidence before the Jones escape disrupts plans
  potential_owner_mention: Walter Donovan
