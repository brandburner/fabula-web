  global_id: ger_object_12ee4ec07396
  canonical_name: Curtains Dividing Hall from Sitting Room
  description: Heavy curtains separate the hall from the sitting room in Henry Jones
    Sr.'s ransacked house. Indiana Jones pulls one half aside, exposing shattered
    furniture, torn books, and scattered papers in the devastated space. Marcus Brody
    then opens the other half, revealing the full scale of the destruction as late
    afternoon light filters through. The action underscores the violent intrusion
    into Henry's home.
  purpose: Divide hall from sitting room and frame dramatic reveal of ransacked interior
  significance: Heighten tension by unveiling the extent of the break-in, signaling
