  description: The gong triggers and propels Indiana Jones and Willie Scott down the
    Dragon Nightclub's sloping roof in a violent escape. It crashes through a flimsy
    awning and a second-floor mattress before they plunge from it into a parked Duesenberg's
    backseat. Deafening reverberations mix with shattering glass and their screams
    during the chaotic tumble.
