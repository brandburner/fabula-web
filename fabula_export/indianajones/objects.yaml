    for escape. The truck's **heavy metal rear doors** slam shut behind him, trapping
    him inside as Sallah lunges futilely with a newspaper-shielded punch. Sinister
    Man and Second Man, Nazi agents, oversee the capture while a street vendor watches
    amid the crowd. The doors seal Brody's fate, enabling the truck to rumble away
    with its captive. The truck is involved in the abduction of Brody, separating
    him from Sallah and escalating stakes by thrusting him into Nazi custody.
  purpose: Troop transport and prisoner abduction vehicle
