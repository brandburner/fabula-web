    music. Indiana Jones, Short Round, and Willie Scott stand amid the light as they
    enter, the flames enhancing the space's intoxicating beauty and illusion of paradise
    during their brief respite from cult dangers.
  purpose: Provide illumination and amplify the pavilion's paradise-like atmosphere
  significance: Heighten the fragile beauty of the moment, contrasting prior brutality
    with fleeting warmth that draws Willie's wonder and Indy's rare compliment, underscoring
