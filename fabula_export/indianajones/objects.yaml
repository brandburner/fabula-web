  canonical_name: Ark of the Covenant's Wooden Transport Crate
  description: A heavy wooden crate used by the Nazis to transport the Ark of the
    Covenant in a convoy, guarded by armed personnel. Constructed on-site and later
    seized by Belloq. Distinct from the medieval painting of the Ark shown in Indiana
    Jones’ lecture and the stone chest in the Well of Souls. This crate is the permanent
    transport container for the Ark, distinct from temporary tools like wooden poles
    used for extraction.
  purpose: Container and transport vessel for the Ark of the Covenant
  significance: Secures the Ark's extraction from its ancient tomb, its capture by
    Nazis delivers a crushing setback to Indy, and its anonymous storage buries the
    relic's divine power in wartime bureaucracy, shifting the artifact from awe-inspiring
    prize to forgotten cargo.
  potential_owner_mention: ''
