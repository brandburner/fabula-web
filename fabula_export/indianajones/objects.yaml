  description: Weathered signpost stands at a dusty daytime crossroads, arrows clearly
    marking routes to VENICE and BERLIN. Indiana Jones and Henry Jones Sr. skid their
    motorcycle to a halt here after spearing Nazi pursuers with a flagpole. The sign
    prompts their explosive argument—Henry demands Berlin for his Grail Diary, Indy
    pushes Venice to save Marcus Brody—ending with Henry slapping Indy in frustration
    over the Grail's sanctity.
  purpose: Directional marker guiding travelers to Venice and Berlin
  significance: Catalyzes father-son confrontation over quest priorities, forcing
    Indy to grapple with his father's obsession, personal grief, and the Grail's deeper
    stakes beyond relic hunting
