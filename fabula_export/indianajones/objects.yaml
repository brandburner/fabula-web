  global_id: ger_object_3ee0ae6decdb
  canonical_name: Guardians' Samurai Sword
  description: Japanese samurai in Hok’s Museum wield the curved blade to charge Indy
    and raise it for a killing strike; a second guardian swings it to knock Indy's
    pistol from his grip, nearly severing fingers. Indy counters in whip-versus-sword
    duel, then grabs the sword to smash a glass display case and seize the Staff of
    Ra headpiece, triggering alarms and a massive hammer trap.
  purpose: Close-quarters combat weapon; improvised tool to break glass cases
  significance: Embodies lethal protection of museum artifacts; escalates artifact
    hunt into personal combat, forcing Indy to improvise from guardian's own weapon
  potential_owner_mention: Japanese Samurai
