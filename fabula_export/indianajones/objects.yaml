  description: A camouflaged pathway stretches across a sheer chasm, painted to blend
    into the rocks below and mimic a solid stone bridge. Indiana Jones tosses dirt
    onto it, watches the particles fall into the void, exposing the illusion, then
    leaps forward in faith and lands safely on the hidden surface, advancing toward
    the Grail chamber.
  purpose: Disguises an invisible bridge over a chasm as an impassable gap, testing
    the quester's faith to cross safely.
  significance: Embodies the 'leap of faith' trial in the Grail quest, where Indy
    heeds his father's urging to believe despite visible evidence of danger, contrasting
    Donovan's fatal greed.
