    baseline and sliding sunlight, tracing Nazi precision in calculating the Ark’s
    position. Belloq set it in place during his own analysis.
  purpose: Measures exact distances between key points on the scale model to pinpoint
    the Ark's location.
  significance: Serves as damning proof that Belloq and Nazis decoded the map room's
