    reporting Henry Jones Sr.'s sudden vanishing and the loss of his Grail research
    diary. Donovan receives the message in his artifact-filled penthouse and shares
    its contents with Indiana Jones, who grips the arms of his chair as the news hits.
    The cable arrives as folded telegram paper, typed in crisp black ink, stamped
    with origin marks, and carries the weight of interrupted scholarly pursuit turning
    perilous.
  purpose: Transmit report of Henry Jones Sr.'s disappearance and missing research
