  canonical_name: Cobweb-Covered False Floor Pit Trap
  description: A deadly trap in the temple's inclined passage, where thin floorboards
    disguised as solid stone conceal a deep, cobweb-choked pit. Indiana Jones tests
    the floor with his whip before swinging across, urging Satipo to follow. Satipo
    crosses recklessly, later dropping Indy's whip into the pit during his betrayal,
    leaving it dangling over the abyss. The trap claims Satipo's life when he steps
    on it, his scream revealing its deadly nature. Forrestal's skeletal remains also
    dangle in the webs, serving as a grim warning of prior victims. The pit is bottomless,
    and the cobwebs thicken the illusion of safety. This trap is triggered by weight
    pressure on the false floor, causing it to collapse and drop victims into the
    pit below.
  purpose: Trap intruders by disguising a bottomless pit under cobwebs, causing them
    to fall to their deaths.
  significance: Exposes Satipo's impatience against Indy's methodical caution, killing
    Satipo and reinforcing the temple's lethal tests that demand reverence and preparation
    over reckless greed.
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_477c5a578e59
  global_id: null
