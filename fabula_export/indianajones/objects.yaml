  canonical_name: Indiana Jones's Formal University Professor Outfit
  description: A coordinated formal outfit worn by Indiana Jones during his university
    professor disguise at Pankot Palace, consisting of a tweed jacket, necktie, and
    other academic attire. The ensemble marks his transformation from rugged adventurer
    to polished academic during the palace dinner, with the necktie specifically completing
    his polished look during banter with Willie Scott. Later, in his suite, Indy removes
    the entire outfit (jacket and necktie) to reveal his relaxed state amid playful
    banter about whips and palace slaves, symbolizing his return to personal vulnerability
    after public civility.
  purpose: Formal academic outerwear for university professor disguise
  significance: Marks Indiana Jones's transformation from rugged adventurer to polished
    academic during palace dinner, then his return to private defiance when removed
    in the suite—contrasting public civility with personal vulnerability before Thuggee
    threats escalate.
