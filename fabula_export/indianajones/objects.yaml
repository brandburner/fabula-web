- fabula_uuid: ger_object_9b8338b9f6d1
  global_id: ger_object_9b8338b9f6d1
  canonical_name: Grail Temple Jehovah Cobblestone Path
  description: A **word-based puzzle trap** spanning a **bottomless chasm** in the
    Grail Temple, where cobblestones engraved with letters (I-E-H-O-V-A in Latin)
    form an **invisible bridge** visible only as painted stone. Requires **precise
    execution** (stepping only on the correct sequence spelling 'Jehovah') and **scriptural
    knowledge** to cross safely. **Follows** the Pendulum Blade trap in the temple's
    sequence and is solved under duress (Walter Donovan holding Henry Jones Sr. at
    gunpoint).
  purpose: Enable safe crossing of the chasm by stepping only on cobblestones forming
    the word 'Jehovah' in Latin letters
  significance: Serves as the 'Word of God' trial, demanding scriptural wisdom and
    humility from the penitent man; Indy solves it under duress to reach the Grail
    chamber and save his father, highlighting the quest's spiritual stakes amid greed-driven
    peril
  potential_owner_mention: ''
  potential_owner_uuid: null
  season_appearances:
