  global_id: ger_object_d989180bc134
  canonical_name: Little Boy's Blanket
  description: Simple blanket spread across the floor of the shaman's hut, serving
    as a bed for the unconscious little boy during his revival. The emaciated child
    lies upon it, his body trembling from the cult's poison, as the shaman tends to
    him. Bruised fingers stir; he reaches up to slip a tattered Sankara cloth fragment
    into Indiana Jones's hand while Short Round, Willie Scott, and the shaman witness
    the moment. The boy's mother later embraces him atop it during his final moments.
    This blanket anchors the tender scene of the boy's recovery, framing the whispered
    'Sankara' clue that links village suffering to the stones and propels Indy's mission.
  purpose: Bedding and support for the unconscious boy during revival ritual
  significance: Holds the boy steady for his dying gift of the Sankara clue to Indy,
    catalyzing Indy's resolve against the Thuggee cult and revealing the stones' location
    amid village tragedy
