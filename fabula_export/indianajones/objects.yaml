  global_id: null
  canonical_name: Indiana Jones, Willie Scott, and Short Round's Nang Tao Airfield
    Boarding Tickets
  description: Critical documents seized by Weber and the stewardess to facilitate
    the trio's escape from Lao Che's enforcers at Nang Tao Airfield. Symbolize their
    fragile passage to safety amid chaos.
  purpose: Boarding passes and documentation to authorize plane access
  significance: Enable the trio's frantic departure from Lao Che's reach, turning
