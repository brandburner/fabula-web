  description: Acts as a transparent visual barrier framing Henry's perspective of
    the incoming Messerschmitt fighter, emphasizing his vulnerability and the escalating
    danger. Unlike the steering wheel, this entity is passive and observational, not
    a tool for control.
  purpose: Provides forward visibility for the driver during high-speed evasion.
  significance: Channels Henry's shift from adrenaline-fueled relief to raw terror
