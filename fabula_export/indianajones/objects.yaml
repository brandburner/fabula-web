  description: The submarine's periscope protrudes from the conning tower, its top
    three feet exposed above surging water. Indy scrambles onto the turret, lashes
    his bullwhip around it as a lifeline during submersion, and clings with legs locked
    while marine weeds tear at him. Sharks circle the tip at night; Nazis nearly spot
    his dangling whip at the dock as he hides inches from discovery.
  purpose: Submarine viewing device; improvised anchor and concealment point for boarding
    and survival
  significance: Anchors Indy's desperate infiltration of the Nazi U-boat, sustains
