  global_id: null
  canonical_name: Indiana Jones’ Sidecar Motorbike (Venice/Berlin Chase)
  description: Two-seater motorcycle with an attached sidecar, colloquially referred
    to as 'Henry’s Sidecar.' Used for a high-speed escape through Nazi-occupied territory,
    carrying Indy and Henry Sr. to the crossroads confrontation.
  purpose: Escape vehicle to evade Nazi pursuers and navigate barricades
  significance: Carries Indy and Henry to safety from Nazis, positioning them at the
    crossroads where their clashing priorities over Venice and Berlin ignite a violent
    father-son confrontation.
  potential_owner_mention: Indiana Jones
  potential_owner_uuid: agent_aedc86bb8523
- fabula_uuid: object_41aa6028e79c
  global_id: null
  canonical_name: Indiana Jones’ Temporary Nazi Bayonet Rifle
  description: Temporarily wielded by Indiana Jones to slice Marion Ravenwood’s ropes
    in the Tabernacle; discarded post-use for faster weapons. Originates from a fallen
    Nazi escort and is distinct from static scene elements like the restraint posts.
  purpose: Firing weapon in combat; bayonet for slashing restraints
  significance: Turns chaos into rescue, letting Indy free Marion and unite for Ark
    escape—marks shift from lone survival to partnership against Nazi pursuit.
  potential_owner_mention: Indiana Jones (Indy)
  potential_owner_uuid: null
- fabula_uuid: object_04538d82e8f7
  global_id: null
  canonical_name: Indiana Jones’s Improvised Motorbike with Sidecar (Nazi Cavern Escape)
  description: Seized from a concealed Nazi underground harbor and used as a weapon
    to smash through barricades, knocking over soldiers during a frantic escape from
    Colonel Vogel. The bike’s engine echoes off cavern walls, emphasizing the claustrophobic,
    underground setting. This is a separate vehicle from the later Venice/Berlin chase
    bike.
  purpose: Escape vehicle that doubles as an improvised weapon to evade Nazis and
    breach barricades
  significance: Powers Indy and Henry's improvised flight from the underground Nazi
    harbor, heightening chase tension and exposing their clashing survival styles—Indy's
    bold action against Henry's caution—while escalating the quest's stakes against
    industrialized Nazi ambition
  potential_owner_mention: Indiana Jones
  potential_owner_uuid: agent_aedc86bb8523
