- fabula_uuid: ger_object_8c8b56357f51
  global_id: ger_object_8c8b56357f51
  canonical_name: Flying Wing (Nazi prototype aircraft)
  description: 'A sleek Nazi prototype aircraft (the Flying Wing) circles and lands
    on the Tanis airstrip near fuel trucks. Its rear-mounted propellers reverse and
    spin wildly after a jammed throttle sends the engines to full power, the blades
    whipping like guillotines and threatening combatants during the brawl. Indy and
    Marion fight mechanics beside the aircraft; Marion knocks the pilot dead and becomes
    trapped as the cockpit snaps shut. The plane plows into a tank truck, spilling
    aviation fuel; the hazard from the thrashing propellers and fuel ultimately contributes
    to its crash, leaving a smoking wreck. Purpose: transports the Ark on an urgent
    flight from the dig site.'
  purpose: Transports the Ark on an urgent flight from the dig site
  significance: Anchors the brutal airstrip fight where Indy and Marion confront Nazis;
    Marion's cockpit trap tests their partnership amid spinning death; its fiery crash
    destroys the Ark's air evacuation plan, forcing truck transfer to Cairo and igniting
    Indy's pursuit.
  potential_owner_mention: Gobler
  potential_owner_uuid: ger_agent_2592dfd073af
