  description: 'A luxury Duesenberg convertible with a fabric top, initially parked
    outside the Dragon nightclub in Shanghai. After Indiana Jones and Willie Scott
    fall from the rooftop and crash through its top, landing in the backseat, the
    car cushions their impact and becomes their escape vehicle. Short Round later
    steals it to drive recklessly through neon-lit streets, tunnels, and highways
    during a high-speed pursuit by Lao Che''s henchmen. The car sustains heavy damage:
    gunfire from pursuing sedans shatters its windows and shreds the convertible top,
    while Indiana Jones returns fire from the passenger seat and Willie Scott huddles
    inside amid flying glass and chaos.'
  purpose: Cushions falls into backseat and functions as getaway vehicle during pursuit.
  significance: Transforms from static parking spot into chaotic safe haven and narrative
    bridge, forcing Indiana Jones and Willie Scott into alliance against cult pursuers.
