  description: Dozens of small books gripped tightly by enthusiastic college students
    posing as children swarm Adolf Hitler at the Berlin book-burning rally. They thrust
    the open pages forward, shouting for his signature in a frenzied rush that engulfs
    the dictator and blocks sightlines through the crowd. This mob action shields
    Indiana Jones, allowing him to slip close and shake Hitler's hand unnoticed amid
    the chaos.
