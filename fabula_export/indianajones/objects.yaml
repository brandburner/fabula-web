  description: A set of paper plane tickets (originally contained in an envelope)
    authorizing passage to Siam, produced by Indiana Jones inside the speeding Duesenberg
    during a frantic chase through Shanghai. Short Round initially clutches the envelope,
    tosses it to Indy, who rips it open amid gunfire and chaos. Indy verifies the
    Siam destination, Short Round counts the tickets, and notes Wu Han's death leaves
    a spare ticket. Willie Scott snatches the extra ticket to secure her place in
    the escape. Weber and the stewardess later collect the tickets at Nang Tao airfield
    to expedite boarding of the DC-3 during the escape. The envelope and its contents
    enable the desperate escape from Lao Che's gangsters, with the spare ticket marking
    Wu Han's absence and forcing Willie's reluctant inclusion in the trio's leadership
    shift.
  purpose: Authorize boarding of passenger plane bound for Siam
