  global_id: ger_object_c0a1f406a8aa
  canonical_name: Fedora's Vintage Truck
  description: Rugged vintage truck summoned by Fedora's sharp whistle from the cliffs.
    A gang member drives it hard along dusty trails, engine roaring and tires screeching
    as it pursues young Indiana Jones on horseback. The truck barrels forward with
    Rough Rider, Halfbreed, and Roscoe aboard, closing the gap in a chaotic chase
    toward railroad tracks.
  purpose: Pursuit vehicle to chase and capture Indiana Jones after he steals the
    Cross of Coronado
  significance: Transforms Indy's solo escape into a high-stakes vehicular hunt, exposing
    his inexperience against Fedora's organized gang and foreshadowing the deadly
    perils of artifact theft
  potential_owner_mention: Fedora
