    of the Thuggee sanctum, **mechanically linked to the sacrificial frame via a pulley
    chain**. It is the **control device** used by priests and Indiana Jones to raise
    or lower the frame over the lava crevasse. Its operation is central to the ritual’s
    climax and Indy’s rescue of Willie Scott.
