- fabula_uuid: ger_object_2cd59bb2ffba
  global_id: ger_object_2cd59bb2ffba
  canonical_name: Grail Temple's Triple Razor-Sharp Pendulum Blade
  description: A **mechanical death trap** consisting of three massive razor-sharp
    pendulum blades suspended from the ceiling, swinging in lethal arcs across a **stone
    chamber** in the Grail Temple. Requires **physical agility** (dropping to knees)
    and **mechanical intervention** (jamming the gears) to disable. Triggered by stepping
    into its path, with blood spraying the floor upon activation. **Precedes** the
    Cobblestone Path in the temple's sequence of traps.
  purpose: Decapitate intruders who fail to kneel in penitence
  significance: Launches the Grail trials; with Henry Jones Sr. shot and dying, it
    compels Indiana Jones to prove humility under Nazi gunpoint, heightening betrayal
    and survival stakes
  potential_owner_mention: ''
  potential_owner_uuid: null
