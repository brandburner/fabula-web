  description: 'Volatile payload of dynamite, firearms, and German munitions loaded
    into the *cargo bed* of the Nazi truck during the high-speed Cairo chase. The
    explosion—triggered by sparks after the truck crashes into a wall—convincingly
    fakes Marion Ravenwood’s death and fractures Indy’s emotional detachment. *Note:
    Previously split into two entities (object_a23cbb11f810 and object_521372a8f495),
    but both describe the same explosive payload in the cargo bed.*'
  purpose: Explosives and weapons transported by Nazi convoy for military operations
  significance: Truck's munitions erupt after Indy's shot fells the driver, engulfing
    the vehicle in flames and convincing Indy that Marion died inside, which fractures
    his detachment and fuels a personal vendetta alongside the Ark pursuit
  potential_owner_mention: German Agent (Driver)
