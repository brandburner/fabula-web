    collapsing its supports under Mola Ram's orders. The roaring wall of water floods
    the quarry tunnels, chasing Indiana Jones, Willie Scott, and Short Round in their
    frantic escape. They dive into a narrow side passage seconds before the deluge
    slams past, shaking the stone walls and drenching the air with spray.
  purpose: Flood tunnels to drown enemies during Thuggee pursuit
  significance: Mola Ram deploys it as a ruthless weapon, amplifying the cult's destructive
