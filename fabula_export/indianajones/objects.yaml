  description: The dry well in Mayapore sits amid the silent, gutted village, its
    depths filled with sand instead of water. Indiana, Short Round, the little Chinese
    boy, and clusters of emaciated villagers peer into it during their search, confirming
    the total failure of the water source. Scavenging dogs circle nearby while vultures
    wait patiently overhead, amplifying the scene's atmosphere of hunger and collective
    grief.
  purpose: Village water source
  significance: Signals severe drought and resource scarcity, turning Indy's quest
    into a direct humanitarian crisis as villagers fix hypnotic, grief-stricken stares
    on Short Round amid the absence of children.
