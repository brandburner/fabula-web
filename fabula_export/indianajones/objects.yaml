  canonical_name: Hairpin Turn Guard Rail
  description: The guard rail lines the mountain road's hairpin turn. The lead staff
    car slams into it and bends a section outward. Moments later, Indy's truck bumper
    catches and shears off a fragment, hurling it over the cliff. This roadside metal
    barrier buckles under high-speed impacts from pursuing vehicles.
  purpose: Blocks vehicles from plunging off road edges
  significance: 'Amplifies chase peril: staff car crash distracts driver, truck ram
    clears path amid flying debris'
  potential_owner_mention: ''
