- fabula_uuid: ger_object_df9d51be1238
  global_id: ger_object_df9d51be1238
  canonical_name: DC-3 Emergency Life Raft
  description: The DC-3 Emergency Life Raft is an inflatable survival craft deployed
    during the DC-3's crash in the Mayapore hills. Indiana Jones grabs the emergency
    life raft inside the sabotaged DC-3 as biplanes attack and the plane spirals toward
    a snowy mountain. Ejected from the open door, it inflates mid-air, slams against
    the escarpment, and survives the crash to carry Indy, Willie Scott, and Short
    Round down a punishing mountainside slide, through churning rapids, and along
    a river into India. The raft surges through scrub brush and hurtles off a low
    bluff, soaring briefly before crashing into the slow-moving river with a churning
    splash. Passengers cling inside as the violent drop disorients them, shifting
    the frantic chase from cliffside scramble to turbulent river pursuit under Indy's
    relentless command. The trio clings inside during the brutal ride, emerging soaked
    and exhausted on the shore where a shaman greets them.
  purpose: Deploys as inflatable flotation and transport from a crashing aircraft,
    enabling survivors to navigate mountainside terrain and river rapids to safety
  significance: Transforms aerial ambush into ground survival ordeal, forcing the
    trio's arrival in India amid Thuggee cult threats. Their desperate huddle inside
    underscores emerging bonds and reliance on chance amid escalating supernatural
    stakes
  potential_owner_mention: Indiana Jones
  potential_owner_uuid: ger_agent_56cddffbba1c
