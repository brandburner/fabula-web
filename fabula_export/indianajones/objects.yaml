  description: Indy pins Elsa Schneider against this stone column in Berlin's city
    square amid the Nazi book-burning rally at night. He searches her jacket for the
    Grail Diary, pressing her back to the pillar as a makeshift restraint during their
    heated standoff. The column absorbs their struggle, standing firm under torchlight
    and amid chanting crowds, while Henry Sr. and others watch from nearby.
  purpose: Improvised restraint and physical barrier in confrontation
  significance: Anchors Indy and Elsa's tense clash over the Grail Diary, amplifying
