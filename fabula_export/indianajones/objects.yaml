  canonical_name: Flying Wing's Second Fuel Tank
  description: Amid the smoking wreck of the Flying Wing, this fuel tank detonates
    in a second, powerful explosion. The blast unleashes a concussion wave that flattens
    Belloq, Shliemann, Gobler, Sallah, and Indy, scattering them across the airstrip
    rise. Shliemann and Belloq react with hardened focus, prioritizing Ark evacuation
    amid the heightened chaos.
  purpose: Stores aviation fuel; ignites and explodes when exposed to fire from the
    burning aircraft.
  significance: Triggers urgent military orders to truck the Ark to Cairo, escalates
    logistical stakes, and launches Indy's pursuit after Sallah's reveal.
  potential_owner_mention: Shliemann
