  canonical_name: The Sun
  description: Positioned in the afternoon sky over the open ocean, the sun beats
    down on the narrow dry sliver of Indy's body clinging to the submarine periscope.
    Amid relentless cold spray and trailing submersion, it delivers vital warmth to
    his exposed skin, easing physical strain as he holds position for concealment.
    Indy maneuvers to maximize this natural relief, his exhausted grip tightening
    against the elements.
  purpose: Delivers warmth to Indy's partially dry body during periscope cling
  significance: Emphasizes Indy's resourceful endurance and improvisation for survival,
    turning environmental exposure into a tactical advantage while amplifying tension
    ahead of submarine infiltration
