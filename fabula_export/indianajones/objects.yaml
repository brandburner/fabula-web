  global_id: ger_object_fa5ff54b2aff
  canonical_name: Young Indiana Jones' Snake
  description: A live snake slithers across Herman's lap in the shadowed Pueblo kiva,
    freezing him in terror until young Indiana Jones grabs it casually and tosses
    it aside to calm his companion. Indy keeps the snake tucked in his shirt during
    the ensuing chase; it wriggles free against his skin atop the reptile car, prompting
    him to rip it off and hurl it away amid Roscoe's ambush. Later on the circus train
    rooftop, the snake emerges from Indy's sleeve, coils around Roscoe's hand, and
    panics the grave robbers, creating an escape window.
  purpose: Distraction and improvised defense against pursuers
  significance: Serves as harbinger of danger and unexpected intervention; underscores
    young Indy's resourcefulness and comfort with reptiles, contrasting his adult
    phobia while symbolizing chaotic fortune in the Cross of Coronado chase
