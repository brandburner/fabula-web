  global_id: ger_object_9997e254caab
  canonical_name: Tank Gunner's Shell
  description: Gunner loads this high-explosive shell into the tank's main gun at
    Vogel's command. He fires it at the Kubelwagon, striking with precision. The detonation
    hurls the vehicle skyward in a fireball, paving the way for the tank to crush
    the wreckage under its treads.
  purpose: High-explosive anti-vehicle ammunition to destroy the Kubelwagon
  significance: Vogel's order and the gunner's execution showcase Nazi brutality,
    obliterating an obstacle in their Grail quest and amplifying tension for Indy
    by proving the enemy's willingness to erase any threat.
