  canonical_name: Catacomb Oil-Slick Petroleum Water
  description: A viscous, flammable petroleum slick coating the knee-deep, rat-infested
    water in the waterlogged catacombs. The slick pools amid ancient stone passages
    and skeletal remains, exhibiting extreme flammability when exposed to fire. Indiana
    Jones scoops petroleum from its surface to create an improvised torch, using it
    to light their path past a knight's coffin. Later, Kazim ignites the slick with
    a match or thrown fire, causing a catastrophic chamber-wide blaze that forces
    Indy and Elsa underwater beneath an overturned coffin. The slick's high viscosity
    allows it to cling to debris, intensifying the fire's ferocity and filling the
    tunnels with smoke and flames as oxygen is consumed.
  purpose: Fuel for Indy's improvised torch; ignites into deadly chamber-wide blaze
