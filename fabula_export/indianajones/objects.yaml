  description: The shaman soaks a coarse rag in liquid and presses it against the
    emaciated boy's forehead inside the dimly lit hut. Indiana Jones holds the collapsing
    child as Short Round and Willie Scott watch; the damp cloth cools his fevered
    skin and aids revival long enough for him to whisper 'Sankara' and press a tattered
    cloth fragment into Indy's hand amid the elders' gaze.
  purpose: Wet the little boy's forehead to aid his revival from poisoning
  significance: Triggers the ritual climax, enabling the boy to deliver the Sankara
