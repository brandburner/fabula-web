  canonical_name: Fuel-Flooded Airstrip Pavement
  description: The pavement encircles the German Flying Wing at the Tanis airstrip.
    Fuel gushes from a ruptured tank and floods its surface, turning it slick. Indy
    skids across it while battling Gobler and mechanics, dodging reversed propellers
    to reach Marion trapped in the cockpit. Marion fights nearby after downing the
    pilot.
  purpose: Forms the ground for aircraft operations, troop movement, and the chaotic
    brawl amid spilling fuel.
  significance: Transforms into a slippery hazard that intensifies the fight, tests
    Indy's footing during his dash to save Marion, and underscores the exploding stakeout's
    peril.
