    train tracks, used by Indiana Jones as a swinging/gripping tool during his escape
    from Nazi pursuers on the train roof.
  purpose: Swing point to propel Indiana Jones back onto the circus train
  significance: Transforms a near-fatal drop into a resourceful escape maneuver, heightening
