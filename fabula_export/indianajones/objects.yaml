  canonical_name: Vogel's Restraint Chain (Desert Tank Chase)
  description: Vogel grabs a heavy metal chain during the desert tank chase and wraps
    it tightly around Indiana Jones's neck. He chokes Indy into submission atop the
    tank, yanks him toward the tank's interior while Indy drops a gun to his father,
    drags him away from the entrance, and later secures the chain to the tank's revolving
    tread, forcing Indy's head toward the crushing gears. German soldiers witness
    the assault as Indy struggles against the restraint amid the chaos of combat.
  purpose: Restrain and choke captives during combat
  significance: Vogel wields the chain to dominate Indy physically and psychologically,
    marking Indy's shift from pursuer to survivor and symbolizing Nazi brutality in
    the Grail quest
