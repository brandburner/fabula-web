  description: A disorienting, panic-inducing wind that occurs during a nighttime
    escape in the Mayapore Hills, accompanied by an unseen figure's heavy breathing
    and chaotic camerawork. It heightens urgency and tension as the figure flees lurking
    dangers toward the village.
  purpose: ''
  significance: Amplifies primal terror and foreshadows the Thuggee cult's supernatural
