  global_id: null
  canonical_name: Rajput Guards' Ceremonial Curved Swords
  description: Melee weapons carried by Rajput guards in Pankot Palace’s outer courtyard,
    used for intimidation rather than combat. Never drawn or wielded; their presence
    contributes to the scene’s tension.
  purpose: Intimidation and combat readiness for palace guards
  significance: The swords transform the courtyard into a gauntlet of veiled threats,
    signaling Thuggee cult influence and shattering the trio's cover story before
    Chattar Lal's recognition escalates the danger.
  potential_owner_mention: Rajput guards
  potential_owner_uuid: null
