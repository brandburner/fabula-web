- fabula_uuid: ger_object_afba5e206c3b
  global_id: ger_object_afba5e206c3b
  canonical_name: Optical Illusion Painted Pathway
  description: Forced-perspective painting disguises a 100-foot chasm as a solid stone
    path across the Grail Temple floor. Indiana Jones tests the illusion by tossing
    dirt, which falls into the void, then crosses by stepping precisely on the Latin
    letters spelling Iehova amid tiled Roman alphabet stones. Wrong tiles trigger
    collapses, plunging victims into the abyss. Henry Jones Sr., Walter Donovan, Elsa
    Schneider, and Sallah watch tensely as Indy navigates this deadly trial.
  purpose: Traps unwary seekers by mimicking a safe crossing over a deep chasm; safe
    passage demands stepping only on tiles forming the divine name Jehovah in Latin.
  significance: Tests wisdom and faith in the Grail quest's second trial, echoing
    the penitent man's humility; Indy's success heals his father and advances the
    narrative toward the chalice chamber, underscoring spiritual discernment over
    brute force.
