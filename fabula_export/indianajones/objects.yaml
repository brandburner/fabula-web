  potential_owner_uuid: null
- fabula_uuid: object_c2b39b57be0d
  global_id: null
  canonical_name: Castle Room Chimney Shaft (Fireplace Grill Mechanism)
  description: A narrow, soot-choked vertical passage behind the **fireplace grill**
    in the burning castle room, used by Indy and Henry as a *concealment point* and
    *ambush vantage* during their escape from the Nazis. The **metal grill** covering
    the fireplace, when dislodged by Indy's accidental kick, triggers the hidden rotating
    wall mechanism, grinding stone as it shuttles them into the adjacent Nazi radio
    room. The grill, blackened by flames, conceals the activation point amid rising
    inferno and chaos.
  purpose: Concealment and ambush vantage during escape from Nazi pursuers
  significance: Shifts Indy and Henry from trapped victims to attackers, exposes Nazi
    Grail transmission, and forces their tense collaboration amid rotating flames
    and reinforcements.
  potential_owner_mention: Nazis
  potential_owner_uuid: agent_351a02f64e45
- fabula_uuid: object_78e63c092e5d
  global_id: null
  canonical_name: Castle Room Inferno
  description: A raging fire that engulfs the castle room, creating a hazardous environment
    that forces characters into the fireplace and drives the narrative tension (e.g.,
    Indy dodging flames, Henry protesting the heat).
  purpose: Environmental hazard blocking escape routes and forcing improvised maneuvers
  significance: The inferno escalates peril, exposes Nazi Grail transmissions, and
    compels Indy and Henry into urgent collaboration amid gunfire and rotating traps,
    marking a turning point in their quest.
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_0cc4095cc01b
  global_id: null
  canonical_name: Castle Room Rug
  description: Henry Jones Sr. fumbles a lit cigarette lighter while bound back-to-back
    with Indiana Jones, dropping it onto the thick rug covering the Nazi castle room
    floor. Flames erupt instantly on the carpet, spreading fast across its fibers
    and filling the chamber with smoke. Indy and Henry twist against their ropes amid
    the growing blaze, using the distraction to break free as Elsa Schneider and Colonel
    Vogel react to the sudden inferno.
  purpose: Floor covering
  significance: Ignition turns the rug into an environmental hazard that forces urgent
    escape, distracting Nazis and propelling Indy and Henry from captivity into desperate
    flight during the Grail quest.
  potential_owner_mention: ''
  potential_owner_uuid: null
