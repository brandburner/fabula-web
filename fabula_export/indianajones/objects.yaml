    as a narrative threshold for Indy’s entry into the Command Map Room.
  purpose: Controls access to an adjacent room in the castle hallway
  significance: Triggers Indy's instinct-driven risk to find Henry, pitting his family
    loyalty against Nazi surveillance and Elsa's caution, amplifying infiltration
    tension
  potential_owner_mention: Nazi Soldiers
