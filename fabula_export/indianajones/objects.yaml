    boxes that sway and shift with the train's motion. Indiana Jones leaps aboard
    from his galloping horse, stumbling on the unstable cargo before regaining balance.
    Halfbreed and Rough Rider follow, using the boxes for grip as they evade pursuing
    Nazis across the volatile surface. The boxes serve as both cargo and unstable
    terrain during the frantic chase sequence.
  purpose: Carries covered cargo across the train; provides unstable footing during
