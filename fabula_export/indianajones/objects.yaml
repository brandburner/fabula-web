  description: Rear-mounted machine gun aboard the biplane during a desperate mid-air
    firefight. Gripped and fired by Henry Jones Sr., who struggles to operate it after
    misinterpreting Indiana Jones's 'eleven o'clock' directional cue as a time check.
    Wild shots accidentally sever the pursuing Messerschmitt's rear stabilizer, causing
    both aircraft to spiral into chaos. The weapon's recoil nearly dislodges Henry
    from his seat, highlighting his inexperience with firearms.
  purpose: Fire on pursuing enemy aircraft during mid-air dogfight
  significance: Henry's botched handling shifts the skirmish from comedy to catastrophe,
