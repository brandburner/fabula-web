    materializes from the sky right after a close crash, amplifying the chaos of ground
    pursuit into aerial assault.
  purpose: Pursues and attacks Henry Jones Sr.'s car from the air
  significance: Shatters Henry's brief relief post-crash with sudden terror, marks
