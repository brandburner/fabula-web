  global_id: ger_object_f1163b04bf0e
  canonical_name: Flock of Seagulls
  description: Henry Jones Sr. charges a flock of seagulls on a desolate Mediterranean
    beach, umbrella flailing to provoke the birds into a chaotic swarm. The Messerschmitt
    fighter slices into the mass; propeller blades shred gulls into a feathery blizzard
    that clogs the engine. Indy watches as the plane stalls overhead, then crashes
    and explodes distant.
  purpose: Clogs pursuing Messerschmitt propeller and engine to force crash
  significance: Henry weaponizes the flock through quick intellect, saving himself
    and Indy from strafing death. Indy nods in rare pride, their bond forged as equals
    blending bookish cunning with daring action.
