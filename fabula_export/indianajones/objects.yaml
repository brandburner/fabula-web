  global_id: ger_object_bbf00ee1192e
  canonical_name: Indiana Jones' Improvised Bone Torch
  description: Indiana Jones fashions this crude torch in the petroleum-soaked catacombs
    beneath Venice by combining a bone shaft (yanked from skeletal remains) with cloth
    rags (torn from decomposed skeletons). He dips the cloth-wrapped bone into flammable
    liquid, ignites it, and uses the sputtering flame to illuminate dark, rat-choked
    passages. The torch serves as both a light source and a tool for navigation, revealing
    etched symbols and looming threats as Indy and Elsa Schneider traverse crumbling
    tunnels toward a knight's burial chamber. The torch's flame battles thinning air
    and rising water, repelling rats and marking their path until pursuers ignite
    the oil behind them, forcing a desperate escape.
  purpose: Illumination for navigating dark, flooded catacombs
  significance: Demonstrates Indy's resourcefulness in turning skeletal remains into
    a survival tool, enabling escape through rat-infested tunnels and discovery of
    the Grail-marked shield amid escalating pursuit by Kazim and his men
