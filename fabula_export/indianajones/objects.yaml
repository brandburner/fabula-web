  description: A functional hanging lamp in Sallah’s truck during *Raiders of the
    Lost Ark* (1936). Provides flickering light for a nighttime huddle where Indy
    flicks a date into its bowl, sparking laughter before tension erupts. Unlike the
    lamp in the Nazi rhino boxcar, this fixture is part of Sallah’s personal vehicle
    and serves a comedic/atmospheric role.
  purpose: Interior illumination in Sallah's truck
  significance: Sparks brief levity through Indy's clumsy flick amid triumph over
