- fabula_uuid: ger_object_0a610a0c228d
  global_id: ger_object_0a610a0c228d
  canonical_name: Grail Knight's Broadsword
  description: The Grail Knight's ancient broadsword, a massive two-handed blade wielded
    during the temple trials. The knight grips it with trembling hands and swings
    it feebly at Indiana Jones in the Grail chamber, testing the intruder's worthiness.
    His strength, diminished after centuries of guardianship, renders the attack symbolic
    rather than lethal. The blade is dropped to the stone floor after the brief challenge,
    observed by witnesses including Henry Jones Sr., Walter Donovan, Elsa Schneider,
    and Sallah. The sword serves as a ceremonial weapon for defending the Grail chamber
    against unworthy intruders.
  purpose: Weapon for defending the Grail chamber against unworthy intruders
  significance: Embodiments the Knight's final duty as guardian; his weak attack forces
    Indy to prove restraint and worthiness, marking the handover of the Grail's protection
    before the Knight dies
  potential_owner_mention: Grail Knight
  potential_owner_uuid: ger_agent_001a307abed6
