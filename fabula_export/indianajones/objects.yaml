  description: Gaunt shaman wears the loincloth as he looms over the exhausted trio
    in the misty river clearing. The simple garment clings to his emaciated frame
    during the silent salute, marking his ritual authority. Indy nods recognition;
    Short Round eyes him warily; Willie recoils in disbelief.
  purpose: Garment worn by the shaman for ritual greeting and cultural presentation
  significance: Establishes uncanny ceremony upon arrival in India, signaling mystical
