  canonical_name: Restraints Binding Indiana Jones and Henry Jones Sr. in Castle Brunwald
  description: Coarse ropes or ties secure Indiana Jones and Henry Jones Sr. to wooden
    chairs inside Castle Brunwald's dimly lit chamber during Nazi captivity. The restraints
    are initially lashed by Nazi guards (Vogel and Elsa) during interrogation. Henry
    Jones Sr. later burns through the thick fibers using Indy's dropped cigarette
    lighter, but the flames ignite a rug, triggering a fire that forces their escape
    toward the fireplace. The restraints hold firm until Henry's desperate actions
    free them, allowing their escape from the burning chamber at dawn.
  purpose: Restrain and immobilize prisoners during Nazi interrogation and captivity
  significance: Trigger the chaotic escape sequence; Henry's burning of the ropes
