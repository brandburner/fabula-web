  description: A thatched roof spans the overhead of an open-walled spartan shelter
    in Mayapore village at dusk. Villagers place three meager plates of grey gruel
    and one withered fruit beneath it for Indiana, Willie, Short Round, the Shaman,
    and Chieftain. The rough thatch shelters this desperate offering amid poverty,
    where Willie returns her plate in shame and eyes fix on Short Round, priming Indy's
    resolve.
  purpose: Shelters communal gatherings and meager meals from the elements
  significance: Frames the village's destitution during the moral turning point, where
