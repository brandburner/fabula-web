  description: A falsified administrative document central to the episode's moral
    conflict, symbolizing the British military's complicity in covering up the Thuggee
    cult's atrocities. Distinct from Captain Blumburtt's ceremonial open car, which
    serves as a visual metaphor for the empire's detached grandeur.
  purpose: Record and submit falsified inspection findings to the Maharajah
  significance: Conceals the Thuggee cult's atrocities and child slavery, enabling
