- fabula_uuid: ger_object_787e0245f835
  global_id: ger_object_787e0245f835
  canonical_name: Halfbreed and Rough Rider's Pursuit Truck
  description: A Nazi pursuit truck races parallel to the speeding circus train during
    Indiana Jones's desperate escape. Halfbreed and Rough Rider launch from its rear,
    leaping onto the moving boxcars and flatcars to chase Indy across the chaotic
    rooftops. The truck keeps pace amid the high-stakes showdown, its position enabling
    the airborne assault that forces Indy to dodge and fight mid-motion.
  purpose: Chase Indiana Jones alongside the circus train and launch pursuers onto
    the cars
  significance: Transforms the ground pursuit into a deadly train-top battle, escalating
    danger and showcasing Indy's agility against Nazi determination in the quest for
    his father and the Grail
  potential_owner_mention: Halfbreed and Rough Rider
