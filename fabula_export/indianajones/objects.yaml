    the dark Mediterranean at night. Soldiers cram aboard with rifles and gear, paddling
    silently to hook onto the Bantu Wind's hull. They swarm the deck in coordinated
    assault, seizing control amid gunfire and chaos while Indy and Marion scramble
    below.
  purpose: Transporting Nazi boarding party to assault and board the Bantu Wind freighter
  significance: Enable rapid Nazi capture of the Ark and Marion Ravenwood, shattering
