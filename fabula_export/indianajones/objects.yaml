    him from the treads amid whipping wind and gunfire. The gesture cuts through chaos,
    marking Sallah's steadfast aid.
  purpose: Headwear; tipped in salute during rescue
  significance: Embodied Sallah's chivalry and loyalty in saving Henry, a bright flourish
    against the tank's destruction and quest setback.
