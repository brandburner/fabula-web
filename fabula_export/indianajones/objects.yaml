  global_id: ger_object_2ab37ad74c27
  canonical_name: Indiana Jones' Fedora (snap‑brim hat)
  description: Indiana Jones' well‑worn fedora (a snap‑brim hat) worn in the DC‑3
    passenger cabin. Indy uses it to cover his eyes—tipping the brim to feign sleep
    while shedding his tuxedo and reclaiming adventurer gear, and later pulled low
    when he's unconscious during the biplane ambush. The hat anchors his shift from
    nightclub performer to rugged explorer and functions narratively to conceal his
    awareness, delay intervention, and heighten tension.
  purpose: Headwear that Indy uses to cover his eyes and signal withdrawal
  significance: Reestablishes Indy's core adventurer identity after the tuxedo charade
    and sets firm boundaries against Willie's advances, pivoting the group dynamic
    toward survival amid banter
