  global_id: ger_object_d27153b0855b
  canonical_name: Knight's Coffin with Grail Engravings
  description: Ancient oak caskets reinforced with brass straps line the waterlogged
    catacombs. Indy and Elsa inspect one knight's coffin, its lid engraved with symbols
    matching Henry Jones Sr.'s Grail Tablet, confirming the second marker. Indy topples
    this coffin to form an air pocket amid flaming oil and swarming rats, diving beneath
    it with Elsa to survive Kazim's arson attack. Skeletal remains tumble out during
    the chaos.
  purpose: Contains knight's remains and protective Grail engravings as a historical
    clue; doubles as improvised shelter creating an air pocket for underwater escape
    from fire.
  significance: Bears the shield engraving as the quest's second Grail marker, shifting
    the narrative from scholarly discovery to visceral survival. Indy overturns it
    under duress, forging trust with Elsa amid rising Nazi threats and testing their
    endurance.
