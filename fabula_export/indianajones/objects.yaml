  description: Indiana Jones glances into this exterior side mirror on his and Henry
    Jones Sr.'s speeding car to spot the Nazi Messerschmitt dive-bomber closing in
    from behind. The mirror captures the plane's strafing runs amid shredded countryside
    roads, feeding Indy real-time intel for sharp evasive swerves while Henry clutches
    the dashboard in terror.
  purpose: Track pursuing Messerschmitt dive-bomber's position and attacks during
    high-speed escape
  significance: Delivers Indy vital rear visibility for life-saving maneuvers; underscores
