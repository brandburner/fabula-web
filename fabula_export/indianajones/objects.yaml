  description: A large tree trunk blocks the snow-slick mountainside path, its flank
    piled with snow drifts. The runaway inflatable raft races toward it; Indiana yanks
    the perimeter rope and shifts his weight to swerve, sending the craft to carom
    off the trunk's snow-covered side and dodge direct impact. This near-miss batters
    Willie and Short Round while highlighting the descent's hazards.
