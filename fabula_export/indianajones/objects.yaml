  description: Central to the Temple of Death’s sacrificial ritual, used by Mola Ram
    to synchronize the Thuggee cult’s actions and build supernatural dread. Distinct
    from restraints or tools used in other Thuggee activities (e.g., prison cell chains).
  purpose: Signals ritual stages and sets ceremonial rhythm
  significance: Builds dread and synchronizes the Thuggee cult's sacrifice to Kali,
    drawing observers into the escalating supernatural terror of the Sankara Stones'
    revelation
  potential_owner_mention: Mola Ram
  potential_owner_uuid: agent_a38c0a48f398
- fabula_uuid: object_76d85edf4898
  global_id: null
  canonical_name: Thuggee Ritual Offerings to Kali (Jungle Clearing)
  description: Passive symbolic tributes left by Thuggee cultists in the jungle clearing,
    examined by Indiana Jones and Sajnu as a prelude to the Temple of Death's horrors.
  purpose: Sacrificial tributes to Kali during Thuggee cult ceremonies
  significance: Visceral proof of the Thuggee cult's nearby presence; terrifies Sajnu
