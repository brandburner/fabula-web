  description: A Luger pistol wrestled from a German soldier during the desert tank
    chase, fired once (ricocheting through three soldiers), and left empty afterward.
  purpose: Firearm for close-quarters combat
  significance: Triggers Indy's first accidental mass killing, shattering his detachment
