  global_id: ger_object_ae67bedba3c4
  canonical_name: Ornate Trigger Chair
  description: Henry Jones Sr. sits in this ornate chair during their stalled search
    in the claustrophobic secret room. It tips back under his weight, strikes the
    wall, and activates a hidden mechanism. The floor beneath Indiana Jones collapses
    into a spiral staircase, launching him downward. The chair's elegant design conceals
    its pivotal mechanical role until triggered.
  purpose: Tips back to strike wall and activate floor mechanism revealing spiral
    staircase
  significance: Henry's calculated use reveals his prior knowledge of the castle's
    puzzles, heightening tension in their father-son dynamic and advancing the Grail
    quest into concealed passages
  potential_owner_mention: Henry Jones Sr.
