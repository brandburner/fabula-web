  canonical_name: Herman's Scout Scarf
  description: Young Indiana Jones grabs Herman's scout scarf in the dim, spider-webbed
    passageway and yanks him close to deliver urgent instructions to fetch Havelock
    and the sheriff. Indy uses the scarf as a physical anchor to stress the moment's
    gravity while distracting the grave robbers, highlighting his command amid Herman's
    reluctance.
