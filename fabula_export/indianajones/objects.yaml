  canonical_name: Wu Han's Pistol
  description: Wu Han conceals this pistol under a towel while posing as a waiter
    in Lao Che's Shanghai ballroom. He draws it abruptly to press against Lao Che,
    aiming to force the handover of the antidote to poisoned Indiana Jones. Present
    characters—Indiana Jones, Willie Scott, Lao Che, and Chen—witness the bold move
    before Chen shoots Wu Han dead from behind, ending the threat without a shot fired
    from the pistol.
  purpose: Hold targets at gunpoint to coerce antidote release
  significance: Wu Han's desperate weapon marks his sacrificial loyalty to Indiana
    Jones, igniting the ballroom shootout and Indy's vengeful rampage after Wu Han
    dies in his arms
