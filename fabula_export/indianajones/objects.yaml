  description: A Nazi U-boat known as the Wurrfler that navigates narrow underwater
    cliff tunnels and later surfaces at the cavernous Nazi sub base dock to offload
    the Ark. Its periscope is used by Indiana Jones as a precarious handhold—he locks
    legs and wraps his whip around it to create a small air pocket before vegetation
    bursts the bubble and the vessel surges, wrenching him into the water. The sub
    later becomes the platform for Belloq's ceremonial transfer of the Ark.
  purpose: Transport the Ark to the Nazi sub base
  significance: Provides Indy's vantage for observation and evasion, heightening discovery
    tension; facilitates the Ark's public unloading, amplifying Nazi rivalry and ceremonial
    stakes.
