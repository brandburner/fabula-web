  global_id: ger_object_43901c770861
  canonical_name: Henry's Case
  description: Henry secures his leather case by sliding his umbrella through its
    straps during the Nazi storm of the Castle Brunwald room, protecting belongings
    that include Grail research materials. Indy later snatches the same case from
    the zeppelin radio room table amid gunfire, grabs his whip and sack too, then
    thrusts it back to Henry with a command to run. The hurried exchanges underscore
    father-son tension under threat.
  purpose: Container for Grail diary and research materials
  significance: Holds essential quest artifacts that drive the Grail hunt; its protection
    amid fights highlights Henry and Indy's clashing approaches to danger, from caution
    to action.
  potential_owner_mention: Professor Henry Jones
