  description: The Radioman clamps the headset over his ears on the Wurrfler's conning
    tower amid tense commands between Shliemann and the captain. He speaks sharp communications
    into the microphone, coordinating the hold fire order and submersion. Voices crackle
    through as the U-boat dives, water surging around Indy lashed to the periscope.
    The Radioman yanks it off and follows the crew down the hatch, leaving the device
    behind in the chaos.
  purpose: Facilitate real-time radio communications for submarine crew during tactical
