  canonical_name: Belloq's Pith Helmet
  description: Belloq wears the pith helmet atop his safari outfit as he confronts
    exhausted Indy at the temple entrance. It crowns his head while he cajoles Jones
    into surrendering the golden idol and revolver, then speaks Hovitos to command
    worship from the warriors. The helmet frames his smug authority during Indy's
    public humiliation and escape into the jungle.
  purpose: Headwear in Belloq's colonial safari ensemble
  significance: Marks Belloq as an imposing explorer figure, amplifying his control
