    efforts**, emerging **scorched and red-hot** after lava exposure. The frame’s
    descent is halted by Indy, breaking the ritual’s momentum.
  purpose: Binds and lowers living sacrifices into molten lava to complete Thuggee
    blood rituals
  significance: Embodiments cult fanaticism, horrifies protagonists, reveals Sankara
