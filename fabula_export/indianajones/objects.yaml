  description: Indiana Jones yanks the DC-3's emergency life raft from its storage
    during the plane's fiery dive toward the mountains. The fabric deploys as he leaps
    with Willie Scott and Short Round gripping tight. It billows against the wind,
    slowing their freefall like a makeshift parachute and cushioning their slide across
