  canonical_name: The Raven Saloon's Drinking Glasses
  description: Marion sweeps drinking glasses from the bar top during her violent
    purge of rowdy patrons in The Raven. Servers clear additional glasses amid the
    chaos of fleeing drinkers and a halted brawl between Mahdlo, Sherpa, and the Australian
    climber. One patron huddles over his remaining glass, unnoticed at first, anchoring
    the bar's gritty drinking atmosphere until Marion spots him.
  purpose: Hold drinks for saloon patrons
  significance: Mark the cluttered, chaotic bar Marion reclaims through force, heightening
