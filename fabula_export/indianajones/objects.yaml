  global_id: ger_object_fd9e4e73f178
  canonical_name: Grail Tablet Wrapping Cloth (Donovan's Penthouse)
  description: A fabric sheet used to conceal the 12th-century Grail Tablet on Walter
    Donovan's penthouse table until a dramatic reveal. Its removal amplifies tension
    during a cocktail party scene with key characters, including Indiana Jones and
    Elsa Schneider.
  purpose: Covers and protects the Grail Tablet prior to dramatic unveiling
  significance: Heightens the reveal of the tablet as one of two Crusader markers,
    hooking Indiana Jones into the quest by tying it to his father's vanishing and
    the promise of eternal life
  potential_owner_mention: Walter Donovan
