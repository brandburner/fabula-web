- fabula_uuid: ger_object_45081b4d1938
  global_id: ger_object_45081b4d1938
  canonical_name: Hok’s Museum Display Cases
  description: Rows of glass display cases line the immaculate exhibition hall of
    Hok’s Museum, securing priceless artifacts under lights. Many cases are linked
    by thousands of fine threads that spiderweb up to a seven‑foot golden gong overhead,
    forming an elaborate alarm system. Indy peers through a vent grate and scans the
    aisles, mapping triggers, blind spots, and a possible escape through a high window.
    During the ambush near the gilded headpiece, charging samurai turn these cases
    into barriers and pathways.
