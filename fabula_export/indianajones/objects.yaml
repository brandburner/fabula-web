  global_id: ger_object_490e3dae55bc
  canonical_name: Herman's Trumpet
  description: Herman blows this trumpet from the arriving car outside Henry Jones
    Sr.'s book-lined study, its loud blare slicing through Indy's desperate plea and
    Henry's ancient ritual chant, instantly signaling the approach of Herman and two
    men as an ominous threat. Indy interprets the sound as a harbinger of danger,
    pivoting from family tension to peril. In the 1912 front room, it doubles as a
    prop that Herman uses to set a mocking tone during young Indy's humiliation at
    the hands of the Sheriff and Fedora gang.
  purpose: Blown to announce arrivals, issue warnings, indicate threats, or heighten
    humiliation
  significance: Serves as auditory cue interrupting personal rituals and scholarly
    focus, foreshadows Nazi gang intrusion in 1938 while echoing 1912 betrayal motifs;
    ties Indy's youthful defeats to adult Grail quest dangers through Herman's gang
    signature
  potential_owner_mention: Herman
