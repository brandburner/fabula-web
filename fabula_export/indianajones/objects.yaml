  canonical_name: Indy's Fifth of Bourbon
  description: Indiana Jones drains this fifth of bourbon at a smoke-filled Cairo
    bar counter while confronting Belloq, its near-emptiness marking his drunken grief
    over recent losses. The Arab bartender responds by placing a fresh bottle before
    him amid rising tension with German henchmen and indifferent Arab patrons watching.
