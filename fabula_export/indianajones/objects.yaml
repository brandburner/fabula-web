  description: A meticulously curated collection of priceless museum-quality ancient
    artifacts displayed in Walter Donovan's opulent Art Deco penthouse. The collection—comprising
    stone carvings, bronze relics, and other antiquities—lines the walls and display
    areas, gleaming under soft lighting. Indiana Jones examines the artifacts intently
    upon arrival, recognizing specific pieces Donovan had previously donated to the
    museum. The collection symbolizes Donovan's immense wealth, deep obsession with
    antiquities, and the rising tension between his private acquisitions and their
    historical significance.
