  canonical_name: Flaming Nazi Aircraft Fuselage
  description: The detached, scorched fuselage of a Nazi pursuit aircraft, torn free
    during a high-speed chase, hurtles uncontrollably through a narrow tunnel. Flames
    engulf its metal frame, scraping against stone walls and spraying sparks as it
    emits a deafening roar. The wreckage serves as a deadly, fast-moving hazard during
    Indiana Jones and Henry Jones Sr.'s escape, illuminating the tunnel with jagged,
    shifting shadows while threatening to crush them.
  purpose: Fuselage section of Nazi pursuit aircraft
  significance: Immediate physical threat forces Indy and Henry into desperate evasion;
    embodies Nazis' mechanized, unyielding chase and foreshadows escalating confrontation
    over the Grail.
