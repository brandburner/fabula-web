    palace itself as a narrative and physical entity.
  purpose: Circulate air in palace suites
  significance: Transforms into an accidental weapon during Indy's fight, reeling
    the assassin to his death and underscoring the palace's hidden lethality. The
    improvised kill shifts the scene from flirtation to survival, propelling the trio
    toward the cult's tunnels.
  potential_owner_mention: Maharajah of Pankot
  potential_owner_uuid: agent_8aa18dc1d347
