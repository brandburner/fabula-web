  global_id: ger_object_b788e9467012
  canonical_name: Indy's Holster
  description: 'Indiana Jones''s leather holster, used to secure his revolver at his
    hip. Appears in two key contexts: (1) In the cabin''s morning light, Indy fastens
    the holster around his waist after engines stop, pairing it with his whip and
    jacket before heading out to investigate (Marion watches from the bed); (2) During
    a biplane attack, Short Round pulls the holster from Indy''s bag, removes the
    pistol, fires wildly at attackers, and discards the spent weapon. Sturdy leather
    construction holds the revolver securely, marking Indy''s transition between vulnerable
    respite and armed readiness.'
