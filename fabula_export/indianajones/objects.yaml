  description: The Monkey Man, posing as a shabby beggar on a Cairo street, wears
    a dirty turban that completes his ragged disguise. He catches the stolen pet monkey,
    ducks into a building for a hurried exchange with German agents, and both salute
    Heil Hitler before he resumes tailing Indiana and Marion behind market stalls.
    The turban signals his downtrodden appearance while masking his role as a Nazi
    spy.
  purpose: Disguise element concealing the Monkey Man's identity as a Nazi operative
    posing as a beggar
  significance: Exposes the pet monkey's role in coordinated Nazi surveillance; transforms
    a seemingly harmless beggar into a confirmed threat, heightening tension around
    personal betrayal and pursuit in the bazaar
