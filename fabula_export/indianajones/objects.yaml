  global_id: ger_object_54cb5102f689
  canonical_name: Sallah's Kettle
  description: A battered steaming metal kettle Sallah uses to serve water to breakfasting
    German soldiers in the Tanis camp. In the scene he pours clear water from this
    kettle for the occupying soldiers until it is drained; a soldier's shout for "more
    water" draws Sallah away during Indy's escape attempt. The empty kettle and the
    act of serving underline Sallah's exhausted, subservient role under occupation.
  purpose: Dispense water to occupying soldiers
  significance: Exposes the petty humiliations and physical toll of occupation on
    locals like Sallah, grounding the Ark quest in everyday oppression
