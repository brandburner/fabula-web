  global_id: ger_object_196083efc743
  canonical_name: TNT Crate on Storm-Lashed Cargo Ship (Last Crusade)
  description: Single crate of TNT explosives in the cargo hold of a ship during a
    brawl between Indiana Jones and the Man in the Panama Hat over the Cross of Coronado.
    Detonates when struck by a fuel drum, destroying the ship and forcing Indy’s escape.
  purpose: Transports TNT explosives; detonates to destroy the ship
  significance: Ignites the catastrophic explosion that destroys the ship and thwarts
    the Panama Hat man's pursuit, allowing Indy to reclaim the Cross of Coronado and
    linking his past betrayal to present triumph
