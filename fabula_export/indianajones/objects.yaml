    Indy and Henry, engaging in a dogfight with machine-gun fire until Henry''s misfire
    causes their plane to crash; (3) A pursuit of Indy and Henry''s car through a
    narrow mountain tunnel, scraping walls before crashing in flames, and a bombing
    run that craters the road ahead, forcing their vehicle off course. The planes
    demonstrate versatility as Nazi war machines, capable of ground-attack and air-combat
    operations.'
  purpose: Pursuing and attacking ground vehicles with machine guns and bombs during
