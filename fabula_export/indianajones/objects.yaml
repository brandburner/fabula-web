  global_id: ger_object_62c49bb78a31
  canonical_name: First Castle Room Table
  description: Sturdy table stands in the Nazi-occupied castle's first room during
    the hostage standoff. Indiana Jones drops his machine gun onto it, sending the
    weapon sliding across the surface and shattering glass items in the impact. The
    clatter punctuates the chaos as Vogel holds Elsa at gunpoint, Henry shouts warnings,
    and Indy hesitates before complying.
  purpose: Surface for placing or dropping objects amid confrontation
  significance: Catches Indy's surrendered machine gun, its slide and the resulting
    glass shatter amplify the tension of disarmament. This prop sets up Elsa's betrayal—she
    steals the Grail Diary from Indy's pocket in the distraction—shattering his trust
    and handing Nazis the quest's key artifact.
