  global_id: ger_object_409f289a5e81
  canonical_name: Indy's Car
  description: Indy grips the wheel of his battered car and races it down a dusty
    mountain road toward a narrow tunnel entrance. The pursuing Messerschmitt's bullets
    tear through the air and ping off its frame as Indy executes precise maneuvers
    to position the vehicle as bait. The car's speed and positioning force the plane
    into the tunnel, where it crashes catastrophically, wings sheared off against
    the rock walls.
  purpose: Escape vehicle that Indy drives to outrun the Messerschmitt and lure it
    into a fatal tunnel trap
  significance: Embodiment of Indy's improvisational tactics against Nazi precision;
    its role in the crash victory highlights the hero's resourcefulness and escalates
    the Grail quest's survival stakes
  potential_owner_mention: Indiana Jones
