  canonical_name: Lion’s Head Carving (Leap of Faith Launch Point)
  description: Massive stone lion’s head carved into the rock face high above the
    Great Abyss in the Grail Temple’s final trial chamber. This ancient sentinel marks
    the precise launch point for the Leap of Faith trial, where Indiana Jones stands
    beneath it, aligns with his father’s Grail diary clue, and steps forward onto
    the invisible bridge spanning the 100-foot chasm. The carving is visible to challengers
    (including Nazis like Donovan and Elsa) and serves as the critical starting point
    for the trial’s perilous leap across the abyss.
  purpose: Designates the exact launch point for the Leap of Faith trial across the
    abyss.
