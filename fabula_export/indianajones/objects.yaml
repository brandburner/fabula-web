  canonical_name: Long Black Packard Sedan
  description: A sleek, long black Packard sedan glides to a deliberate halt in front
    of Indiana Jones outside the college building. Its polished surface gleams with
    menacing precision, mirroring the threat of the three suited G-Men who emerge.
    The car halts abruptly after Indy's classroom escape, transforming the sidewalk
    into a zone of tension as the men address him from behind.
  purpose: Transportation for the three G-Men to summon Indiana Jones
  significance: Delivers the inciting summons that shatters Indiana Jones's academic
    normalcy, introducing extraordinary forces through its intimidating arrival and
