  global_id: ger_object_0393455bf4fe
  canonical_name: Hitler's Elimination Order (Radio Transcript)
  description: The Radio Operator delivers a terse written transcript to Donovan outside
    the castle, capturing Hitler's direct command to eliminate Indiana Jones and his
    team. Donovan clutches the paper, reads its contents aloud in a cold, bureaucratic
    tone to Vogel, Elsa Schneider, the Lieutenant, and Nazi soldiers, then declares
    Germany's war on the 'Jones boys.' His fingers tighten around the sheet as satisfaction
    hardens his expression.
  purpose: Relay Fuhrer's personal order to kill Indiana Jones and allies
  significance: Transforms Nazi Grail quest into personal death hunt, escalates stakes
    from artifact race to survival fight, and marks Donovan's shift to executioner
    role
  potential_owner_mention: Walter Donovan
