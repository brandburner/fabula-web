    the weapon through the chaos, only to drop it later when Colonel Vogel holds Elsa
    Schneider at gunpoint.
  purpose: Fire rapid bursts to kill or suppress multiple enemies in close quarters
  significance: Sparks Indy's explosive defense during the father-son reunion, saving
