  canonical_name: Nazi Messerschmitt Dive-Bomber
  description: A Nazi Messerschmitt dive-bomber roars low over the French countryside,
    executing repeated strafing runs on Indiana Jones and Henry Jones Sr.'s fleeing
    car. Machine gun bullets shred the air and plow divots into fields and road inches
    from the chassis. Indy swerves sharply to evade, gripping the wheel tight, while
    Henry clutches the dashboard, eyes wide in terror, and shouts 'This is intolerable!'
    The plane's dives and gunfire fill the cabin with deafening noise and dread.
  purpose: Execute low-level strafing attacks with machine guns to eliminate ground
    targets like vehicles and personnel
  significance: Amplifies Nazi pursuit pressure on the Grail quest, shatters Henry's
