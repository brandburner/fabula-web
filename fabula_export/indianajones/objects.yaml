  description: Moonlight spills into Pankot Palace corridors and Willie's suite at
    night. It lights opulent spaces with billowing curtains and golden perches, casting
    a pale glow that spotlights Willie Scott's disheveled clothes, clinging remnants
    of temple horrors, and insect-covered state. Chattar Lal and Captain Blumburtt
    stand within its reach as she grabs his arm in desperation, the light amplifying
    the grotesque clash between palace splendor and her trauma.
  purpose: Illuminates palace interiors
  significance: Sharpens visual contrast between opulent surroundings and Willie's
    traumatized appearance, heightening her isolation as pleas fall on disbelieving
    ears
