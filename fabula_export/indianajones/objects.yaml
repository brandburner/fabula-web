  description: A crudely fashioned voodoo doll resembling Indiana Jones, created by
    Maharajah Zalim Singh as part of the Thuggee cult's supernatural rituals. The
    doll is used to inflict physical and psychological pain on Indiana Jones by burning
    or manipulating it, with the victim experiencing the same agony remotely. The
    ritual occurs in a skull-lined chamber, witnessed by Short Round, and demonstrates
    the cult's supernatural control over Indy's body. The doll embodies the Thuggee
    cult's belief in the link between the effigy and its target, enabling remote torture
    without direct contact.
  purpose: Inflict physical and psychological pain on Indiana Jones through burning
