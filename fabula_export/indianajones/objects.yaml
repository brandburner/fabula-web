  description: Ten German Wolf submarines array in a rough semicircle around the Bantu
    Wind. Deck guns stand manned and trained on the freighter, while heavily-armed
    boarding parties prepare to close in. Captain Katanga spots them first and halts
    Indy and Marion, barking orders to hide belowdecks as the vessels lock the ship
    in an inescapable naval trap.
  purpose: Surround targeted ships, train deck guns for bombardment, and deploy boarding
