  global_id: ger_object_6b0e4c53d180
  canonical_name: Eel-Filled Boa Constrictor (Pankot Feast)
  description: A grotesque culinary dish served as the second course at the Maharajah's
    banquet in the Pleasure Pavilion during the Pankot Feast. Servants slit open a
    whole boa constrictor lengthwise on platters, exposing a squirming mass of live
    baby eels packed inside the carcass. The eels writhe visibly as the slit skin
    falls away, heightening the horror of the cult's hospitality. Willie Scott recoils
    in disgust, while Indiana Jones, Short Round, Chattar Lal, and Captain Blumburtt
    observe the escalating grotesquery of the feast. The dish serves as a shocking
    second course designed to provoke and test the guests' composure, underscoring
    the palace's embrace of grotesque customs and sharpening the cultural clash between
    Western visitors and Thuggee-influenced Indian aristocracy.
  purpose: Served as the second course in the Maharajah's banquet to shock and impress
    guests
  significance: Escalates Willie's revulsion at Pankot cuisine, sharpening the cultural
    clash between Western visitors and Thuggee-influenced Indian aristocracy while
    foreshadowing the story's descent into barbaric horrors
