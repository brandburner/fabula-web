    the Ark of the Covenant and its surrounding wooden crate. These carrying rings
    are designed to receive wooden poles; Indiana Jones and Sallah thread poles through
    them to hoist and rig the Ark into a stout crate while extracting it from the
    snake-filled Well of the Souls. The rings function as attachment points enabling
    the lift and conveyance of the crated Ark, with nearby snakes reacting to the
    Ark's charged presence.
