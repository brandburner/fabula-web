  canonical_name: Field Stone Barricade
  description: Indy and Henry vault over a rugged stone barricade in the open field
    near the crashed plane's wreckage and demolished farmhouse. Bullets from strafing
    Messerschmitts tear up the earth around them as they scramble behind the weathered
    stones for cover. The low wall, part of the rural landscape, shields them amid
    flying debris and chaos.
