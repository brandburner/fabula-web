  canonical_name: Bazaar Vendor Booth
  description: A vendor booth stands amid the small bazaar, its key support pole propping
    a towering stack of pots and pans. Indy snaps his whip to sever the support; the
    unstable tower topples in a deafening crash of metal, burying a Bad Arab and German
    agent under the heap. The collapse scatters panicked crowds, reshaping the chase
    into confusion as pursuers struggle amid the debris.
  purpose: Displays and stacks pots and pans for bazaar sale; doubles as improvised
    obstacle when support fails
  significance: Indy's whip target that triggers chaotic collapse, shielding his escape
    amid the chase by disorienting enemies and scattering bystanders
