  global_id: ger_object_37ecec984a9d
  canonical_name: Indy's Classroom Chalk
  description: Indiana Jones picks up the piece of chalk and scrawls 'FACT' across
    the lecture hall blackboard in bold strokes. White dust scatters as he punctuates
    his lecture, dismissing truth for empirical facts. Students laugh, drawn into
    his authoritative style.
  purpose: Write words on blackboard to underscore archaeology's search for facts
    over abstract truth
  significance: Establishes Indy's no-nonsense worldview and classroom charisma, framing
    his approach to relic hunts and winning student buy-in
