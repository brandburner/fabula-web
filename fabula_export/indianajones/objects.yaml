    of the Souls chamber at Indy''s dig site. They stand intermittently around the
    altar-surrounded pit teeming with writhing asps. One of these pillars—rising near
    the entry hole—is used by Indiana Jones: he wraps his bullwhip around its base,
    climbs amid the hissing snakes, braces the top against the wall, and yanks it
    loose; the pillar topples forward, punching a hole through the stone wall to reveal
    an adjoining chamber and an escape route.'
  purpose: Support the chamber roof and define the perimeter of the snake-filled pit
  significance: Heighten the dread of descent into the viper-infested Well, where
