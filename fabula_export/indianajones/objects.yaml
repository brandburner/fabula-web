  description: Slit-open snakes reveal wriggling live baby eels inside, served as
    the opening course at the Maharajah's lavish dinner in the Pleasure Pavilion.
    The eels twist and squirm on platters amid gold domes and torches, prompting revulsion
    from Willie Scott and serving as Chattar Lal's first culinary shock to unnerve
    Indiana Jones, Short Round, and their companions during the tense feast.
  purpose: Served as a grotesque appetizer to test guests' endurance
  significance: Embodies the Thuggee cult's depravity through visceral horror, escalating
    psychological warfare and exposing the palace's sinister underbelly as Indy probes
    deeper into the cult's secrets.
