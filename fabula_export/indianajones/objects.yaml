  global_id: ger_object_41e100d20416
  canonical_name: Fedora's Gang Kerosene Lanterns (Set)
  description: Used exclusively for illuminating the excavation site and artifact;
    positioned near the Cross of Coronado to highlight its jewels and aid Fedora's
    gang in their plunder. Unlike the digging tools, these lanterns are not interacted
    with directly by characters and serve a purely environmental role in the scene.
  purpose: Illumination in dark underground passages and kiva
  significance: Highlights the Cross's jewels, sparking Indy's outrage and resolve
    to reclaim it; frames the tense discovery and pursuit that forges his guardian
    instincts
