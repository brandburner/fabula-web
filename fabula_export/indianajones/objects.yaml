    by the cult's sabotage. The torrent expels Indiana Jones, Willie Scott, and Short
    Round onto a sheer cliffside ledge overlooking a 300-foot gorge filled with thrashing
    crocodiles. It drives a wedge between the trio, floods Indy's path to the swaying
    rope bridge above, and erodes the crumbling rock beneath their feet, compelling
    split-second survival choices amid deafening roar and relentless spray.
  purpose: Blocks escape routes and separates targets through engineered flood surge
  significance: Tests Indiana Jones's leadership as he flanks the hazard alone, exposes
    alliance fractures with Willie's vertigo and Short Round's bravado, and symbolizes
    the cult's pursuit alongside nature's fury.
  potential_owner_mention: cult
  potential_owner_uuid: null
