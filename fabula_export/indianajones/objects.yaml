  description: An elaborate tile floor in the Crusader-era library features Roman
    numerals III, VII, and X integrated into columns and tiles, forming a large 'X'
    pattern visible only from higher angles. The **center tile** of this 'X' design—bearing
    a distinct 'X' mark—is smashed by Indiana Jones to reveal a two-foot square hole
    dropping into a dark passage that exhales cold, rancid air. Dr. Elsa Schneider
