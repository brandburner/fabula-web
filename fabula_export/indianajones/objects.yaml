  global_id: null
  canonical_name: Nepalese Map
  description: Critical navigational artifact used by Indiana Jones in the DC-3 cabin
    to locate the Ark’s hidden coordinates, cross-referenced with Abner Ravenwood’s
    journal. Distinct from physical tools like ropes or equipment.
  purpose: Deciphering the Ark of the Covenant's location through geographic clues
    and paths combined with Abner Ravenwood’s journal.
  significance: Key clue driving Indiana Jones's quest, symbolizing the collision
    of personal history with global stakes; its use under the Nazi spy's hidden gaze
    turns scholarly pursuit into a deadly race, amplifying dramatic irony and suspense.
  potential_owner_mention: Indiana Jones
  potential_owner_uuid: agent_9b8a52b10449
- fabula_uuid: object_6ea939039749
  global_id: null
  canonical_name: Nepalese Thug's Luger Pistol
  description: A compact Luger pistol wielded by the Nepalese thug during the Nazi
    raid on The Raven saloon. Its sleek German design is drawn in close-quarters threats,
    including the saloon firefight (where Indy kills the thug before it is fired),
    the Tanis airstrip confrontation (where a Nazi pilot attempts to shoot Indy with
    it), and the flaming Tabernacle scene (where Nazis grip it tightly during Indy's
    Ark rescue). The weapon embodies the lethal intent of Nazi collaborators and is
    consistently countered by Indy and Marion, never successfully fired in the protagonists'
    presence.
  purpose: Firearm to shoot enemies at close range during the saloon shootout
  significance: Heightens the peril of Belzig's ambush, embodying the thug's lethal
    intent in a brawl that tests Indy and Marion's survival and forges their partnership
    amid the burning saloon
  potential_owner_mention: Nepalese
  potential_owner_uuid: agent_147daa31a915
- fabula_uuid: object_a692c04912ba
  global_id: null
  canonical_name: New York to Venice Flight Path Map
  description: Graphical overlay (animated visual narrative device) superimposed on
    the private airliner's cabin, depicting the flight route from New York City to
    Venice, Italy. Tracks the plane's progress across the Atlantic as Indiana Jones,
    Marcus Brody, Walter Donovan, and Dr. Elsa Schneider travel together. The map
    highlights their advance toward the Italian destination, syncing with the cabin's
    engine hum and Indy's study of the Grail Diary. Serves as both a physical object
    (visual aid) and a transitional narrative device to emphasize the journey's urgency
    and the race for the Grail amid Nazi pursuit.
  purpose: Visual aid that depicts the flight trajectory to transition the scene from
    airfield to Venice arrival
  significance: Marks the group's airborne shift to Europe, amplifying tension from
    Donovan's 'Don’t trust anybody' and foreshadowing Elsa's deceptive introduction
    amid the quest's escalating intrigue
  potential_owner_mention: ''
  potential_owner_uuid: null
