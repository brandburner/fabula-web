    cockpit in terror as flames and debris threaten the plane, flipping triumph over
    the first fighter into chaos while the second attacker presses the assault.
  purpose: Powers propulsion for the DC-3 during aerial evasion
  significance: Detonation shreds tactical edge, endangers Willie and Short Round,
