  canonical_name: Indiana Jones' Fedora (Indy's Hat)
  description: Indiana Jones' signature battered fedora — a crumpled felt hat that
    recurs as his trademark headwear across perilous set-pieces. It is described both
    as singed and snatched from the burning 'The Raven' bar and elsewhere as vanishing
    into ocean waves when Indy emerges from the sea onto a submerging conning tower.
    The hat functions as iconic personal gear and a recurring visual motif that anchors
    his adventurer identity.
  purpose: Headwear for protection during expeditions and gesture of shedding travel
