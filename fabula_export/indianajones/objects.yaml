  description: Metal railing lines the edge of the spiral staircase that emerges when
    the secret room floor collapses. Indiana Jones lunges for it during his sudden
    plunge, fingers clamping tight in a frantic bid to arrest his momentum, but sweat-slicked
    hands betray him and he loses purchase, hurtling down the twisting stone steps
    into darkness below. Henry Jones Sr. observes from the chamber above as the railing
    proves useless against the trap's lethal drop.
  purpose: Safety barrier to halt falls along the spiral staircase
  significance: Emphasizes the ancient temple's deadly mechanisms and Indy's raw vulnerability,
    marking the moment his action-hero instincts fail against the structure's unforgiving
    design and amplifying father-son tension as Henry remains safely above.
