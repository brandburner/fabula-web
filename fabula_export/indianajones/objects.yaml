  description: Dozens of heavy trucks dot the Tanis dig site and stretch into the
    desert, kicking up dust as they haul dirt and supplies for the Nazi operation.
    Indy and Sallah spot them from a high vantage, amid tents and machinery, where
    Arab diggers and German supervisors direct the chaos. The vehicles signal the
    excavation's vast scale but misguided focus.
  purpose: Hauling earth, equipment, and supplies across the Tanis dig site
  significance: Expose the Nazi team's massive but erroneous excavation effort, alerting
    Indy to the correct Well of the Souls location and igniting his urgent countermove
