  global_id: ger_object_6cc7f5f222f7
  canonical_name: Indiana Jones's Mine Cart (Temple of Doom)
  description: A **mine cart** used by Indiana Jones, Willie Scott, and Short Round
    during their escape from Thuggee cultists in the underground tunnels of the Temple
    of Doom. The cart is **commandeered** from the quarry, where it was originally
    used by enslaved children to haul ore. The trio repurposes it as a **high-speed
    escape vehicle**, accelerating through tunnels under gunfire. The cart's **brake
    lever** (a critical component) snaps during the chase, forcing Indiana to manually
    slow it. The cart is central to the **mine cart chase sequence**, including collisions,
    sabotage, and near-disaster at a dead-end wall. This entity **includes the quarry
    mine carts** as the same vehicles repurposed for escape.
  purpose: Escape vehicle and ramming weapon during tunnel pursuit by Thuggee guards
  significance: Powers the desperate chase that pits heroes' improvisation against
    cult forces; its brake failure and flooding climax force a shift to underground
    flight, building to Mola Ram's defeat
