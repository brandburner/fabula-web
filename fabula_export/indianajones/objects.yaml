  canonical_name: Nazi Flying Wing Aircraft (with Lethally Spinning Propellers)
  description: The Nazi Flying Wing, a sleek, experimental prototype aircraft, serves
    as the primary air transport for the Ark of the Covenant from the Tanis airstrip.
    Its defining feature is the **massive, lethally spinning propellers** at the rear
    of its wings, which pose a deadly hazard during Indy's brawl with German mechanics.
    These propellers slice the air with relentless speed, embodying Nazi mechanical
    precision and raising survival stakes during the Ark's transport chaos. The aircraft's
    cargo hold is central to the film's climax, where Indy's sabotage triggers a catastrophic
    explosion, destroying the plane and stranding the Ark. Earlier, Marion Ravenwood
    climbs its wing, kills the pilot, and traps herself in the cockpit, causing the
    plane to surge uncontrollably toward a fuel truck, resulting in the explosion.
    Belloq and Shliemann abandon their air evacuation plans and switch to truck transport
    to Cairo amid the chaos.
  purpose: Air transport for the Ark of the Covenant from the Tanis airstrip
  significance: Ignites chaos through brutal propeller fight and Marion's cockpit
    entrapment, turning stealth infiltration into desperate survival and foreshadowing
    the Ark's catastrophic power via the fuel spill explosion
  potential_owner_mention: Nazis
  potential_owner_uuid: agent_351a02f64e45
