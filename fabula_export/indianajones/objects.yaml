  canonical_name: Henry Jones Sr.'s Pencil-Drawn Grail Map
  description: Brody pulls Henry Jones Sr.'s pencil-drawn map from the Grail Diary
    and spreads its two pages across the table in the Venice apartment. The lines
    trace the Grail's path from an unnamed starting oasis east through desert, river,
    and mountains to the Canyon of the Crescent Moon. Brody runs his finger along
    the route while explaining to Indy, who leans in as they supply the missing city—Alexandretta.
    The map's incomplete state yields to revelation after matching the Grail Knight's
    shield rubbing.
  purpose: Plots the Grail's route across desert, river, and mountains to guide the
    quest once the starting city is identified
  significance: Serves as the pivotal clue uniting fragmented hints; its completion
    with Alexandretta sparks the race against Nazis, forces team split, and heightens
    stakes between rescue and relic hunt
  potential_owner_mention: Henry Jones Sr.
