  canonical_name: Indy's Bedroom Drawers
  description: The drawers in Indiana Jones's bedroom stand emptied and upturned,
    their contents scattered across the floor in disarray from a thorough intruder
    search. Indy surveys the violation with frustration upon entering, a stark sign
    of Nazi intrusion that immediately fuels tension with Elsa Schneider as they confront
    the shared threat.
  purpose: Storage for personal bedroom items
  significance: Signals invasive ransacking that exposes Indy and Elsa's fragile trust,
    escalating their argument over secrecy and the Grail Diary into passionate confrontation.
  potential_owner_mention: Indiana Jones
  potential_owner_uuid: agent_aedc86bb8523
- fabula_uuid: object_aafb73dc4ef3
  global_id: null
  canonical_name: Indy's Car
  description: Used exclusively in the Alpine Road Chase scene, where it is destroyed
    by a bomb blast, stranding Indy and Henry on a deserted Mediterranean beach.
  purpose: Escape vehicle to evade Nazi Messerschmitt pursuit through treacherous
    mountain terrain.
  significance: The car's high-speed tunnel evasion showcases Indy and Henry's teamwork
    under fire, but its crater stranding heightens desperation, setting up Henry's
    seagull swarm improvisation that saves them and deepens their mutual respect amid
    the Ark quest's perils.
  potential_owner_mention: Indiana Jones (Indy)
  potential_owner_uuid: null
- fabula_uuid: object_6e9c4cbe9668
  global_id: null
  canonical_name: Indy's Chicken Leg
  description: A roasted chicken leg sits on the food tray amid dates and other snacks
    in Sallah's candlelit house. Indiana Jones grabs it absentmindedly during their
    heated discussion of the Ark's headpiece and the Nazis' 7.5-inch excavation error.
    He holds it casually as triumph mixes with tension, oblivious to the poisoned
    dates nearby that soon kill the monkey.
  purpose: Sustenance
  significance: This casual snack underscores the brief celebration after Indy's breakthrough,
    heightening the contrast when the monkey's death from poisoned dates turns joy
    to dread and signals Nazi sabotage.
  potential_owner_mention: Indiana Jones (Indy)
  potential_owner_uuid: null
- fabula_uuid: object_44f7d2123ffb
  global_id: null
  canonical_name: Indy's Desert Binoculars
  description: Handheld optical device used by Indiana Jones for long-range surveillance
    of the Nazi convoy. Its reflective lenses accidentally reveal his position to
    the tank crew, triggering the attack that destroys the supplies car.
  purpose: Scan distant enemy movements during reconnaissance
  significance: The lens glare alerts the Nazis, destroys the heroes' cover and vehicle,
    and thrusts Indy into a brutal tank assault to save his father Henry and Brody,
    transforming a moment of caution into raw confrontation.
  potential_owner_mention: Indiana Jones (Indy)
  potential_owner_uuid: null
- fabula_uuid: object_27df8793223e
  global_id: null
  canonical_name: Indy's Emergency Stash for Marion Ravenwood (Raven Saloon)
  description: Stash of American cash left by Indiana Jones with Marion Ravenwood
    in the Raven saloon (*Raiders of the Lost Ark*, S01E01) as financial support during
    his absence. The cash is kept alongside the Ark medallion headpiece and destroyed
    in the saloon fire during the Nazi raid.
  purpose: Currency for payments and as a financial resource for Marion while abandoned
  significance: Indy entrusts the cash to Marion as practical support, highlighting
    his concern for her survival amid Nazi pursuit. Its destruction in the Raven's
    blaze marks the raid's total devastation and forces Marion's partnership with
    Indy.
  potential_owner_mention: Indiana Jones
  potential_owner_uuid: agent_9b8a52b10449
- fabula_uuid: object_2e0f258433d0
  global_id: null
  canonical_name: Indy's False Zeppelin Boarding Papers
  description: Used exclusively at the Berlin airfield to board a zeppelin; distinct
    from other disguises or props used in the rally scene.
  purpose: Enable Indiana Jones and Henry Jones Sr. to board the zeppelin as legitimate
    passengers without arousing Nazi suspicion
  significance: Powers the duo's high-stakes escape from Berlin, forcing rare trust
    between father and son amid capture risks that threaten their quest
  potential_owner_mention: Indiana Jones
  potential_owner_uuid: agent_aedc86bb8523
- fabula_uuid: object_dda74ed8b63e
  global_id: null
  canonical_name: Indy's Fedora
  description: Indiana Jones' signature fedora—a weathered brimmed felt hat crowned
    with a distinctive feather—anchors his adventurer look from Peruvian jungles to
    castle infiltrations. He hands it to Elsa Schneider, who tugs it low to complete
    her assistant disguise as they bluster past the butler at Castle Brunwald, its
    brim shadowing her face until the ruse cracks.
  purpose: Headwear for expeditions and temporary disguises
  significance: Symbolizes Indy's rugged identity; its exchange with Elsa underscores
    their alliance and the deception's fragility amid Nazi threats.
  potential_owner_mention: Indiana Jones (Indy)
  potential_owner_uuid: null
- fabula_uuid: object_f0b72f396146
  global_id: null
  canonical_name: Indy's Flapped Holster (with Revolver)
  description: "\n        Indiana Jones wears a *flapped leather holster* on his hip\
    \ during the Peruvian jungle expedition, which *conceals and protects his revolver\
    \ sidearm*. The holster is a *tactical accessory* that:\n        1. **Covers the\
    \ grip** of his revolver, as described in the flapped holster’s embedded context\
    \ (*\"covers the grip of his concealed sidearm\"*).\n        2. **Symbolizes restrained\
    \ readiness**, evident when Indy *restrains Barranca’s pistol draw without touching\
    \ his own holster*.\n        3. **Is surrendered to René Belloq** during the temple\
    \ raid (as described in the revolver’s embedded context), leaving Indy defenseless\
    \ before the Hovitos warriors. This act marks a *humiliating defeat* and *power\
    \ shift* in the narrative.\n        The holster’s *leather construction* and *flapped\
    \ design* are consistent with its function as both a *protective cover* for the\
    \ revolver and a *symbol of Indy’s armed discipline*.\n      "
  purpose: Carries and conceals Indy's sidearm for quick access in jungle perils.
  significance: Reinforces Indy's pragmatic leadership and preparedness; he asserts
    control without drawing, contrasting Barranca's rash violence and underscoring
    eroding trust among guides and porters.
  potential_owner_mention: Indiana Jones (Indy)
  potential_owner_uuid: agent_9b8a52b10449
- fabula_uuid: object_472a64c8399c
  global_id: null
  canonical_name: Indy's Group's Weapons
  description: Nazi soldiers seize the guns and weapons from Indiana Jones, Professor
    Henry Jones Sr., Marcus Brody, and Sallah during their capture inside the ancient
    temple. The confiscation happens swiftly after the Turkish soldier's decapitation,
    leaving the group disarmed and vulnerable to Donovan's ambush and the temple's
    lethal trials.
  purpose: Self-defense and combat against enemies
  significance: Confiscation strips Indy's group of firepower, heightens tension by
    forcing reliance on intellect and faith through the pendulum blades, Word path,
    and leap, and underscores Donovan's control as he shoots Henry Jones Sr.
  potential_owner_mention: Indy's group
  potential_owner_uuid: null
- fabula_uuid: object_21c0749df54e
  global_id: null
  canonical_name: Indy's Improvised Dirt-Revealing Tool
  description: A handful of loose temple floor dirt used by Indiana Jones to scatter
    and reveal an invisible, camouflaged bridge in a canyon-spanning trial, demonstrating
    his resourcefulness in solving puzzles.
  purpose: Test the solidity of the invisible bridge before crossing
  significance: Confirms the 'leap of faith' trial, forcing Indy to trust the path
    spelled by God's word; Donovan's group observes the reveal, heightening the stakes
    of the Grail quest and Indy's wounded resolve after his father's shooting
  potential_owner_mention: Indiana Jones
  potential_owner_uuid: agent_aedc86bb8523
- fabula_uuid: object_a6a19c445c4d
  global_id: null
  canonical_name: Indy's Khaki Shirt
  description: Worn during the *DC-3 flight through the Himalayas* in Episode 2, symbolizing
    Indy's shift from nightclub negotiator to aerial survivor amid gunfire and crash.
  purpose: Upper-body clothing for travel and action
  significance: Reveals Indy's adventurer roots amid crisis, underscoring his vulnerability
    without usual gear as the group fights for survival against ambush and crash.
  potential_owner_mention: Indiana Jones
  potential_owner_uuid: agent_9b8a52b10449
- fabula_uuid: object_5b8a77dadfad
  global_id: null
  canonical_name: Indy's Office Window
  description: Fixed architectural feature in Indy's office; serves as an escape route
    to the adjacent garden during chaotic moments.
  purpose: Escape route from office to garden
  significance: Triggers Indy's departure from academic routine upon reading the Venice
    letter, marking the shift to his father's Grail quest and shattering his scholarly
    detachment
  potential_owner_mention: Indiana Jones
  potential_owner_uuid: agent_aedc86bb8523
- fabula_uuid: object_2d3f0ceb5da8
  global_id: null
  canonical_name: Indy's Overcoat
  description: Worn by Indiana Jones during his Scottish lord disguise in Castle Brunwald;
    serves as a visual prop emphasizing his wet, disheveled state and the tension
    of the scene.
  purpose: Shields wearer from rain during outdoor approach to castle
  significance: Signals harsh external weather, bolsters hasty lord disguise, builds
    tension before Indy's violent turn against the butler
  potential_owner_mention: Indiana Jones (Indy)
  potential_owner_uuid: null
- fabula_uuid: object_868b3f431245
  global_id: null
  canonical_name: Indy's Oversized Nazi Soldier Uniform
  description: Used exclusively at the Nazi rally to disguise Indy as a soldier; distinct
    from other props or documents used in the airfield scene.
  purpose: Disguise for infiltrating the Nazi rally
  significance: Grants Indy access to confront Elsa over her betrayal and witness
    Hitler autograph the Grail Diary, but the sloppy fit exposes his cover's fragility,
    ratcheting tension in the lovers' violent standoff and forcing a desperate nighttime
    escape with his father.
  potential_owner_mention: Indiana Jones
  potential_owner_uuid: agent_aedc86bb8523
- fabula_uuid: object_9d1eb41a8675
  global_id: null
  canonical_name: Indy's Pendulum Blade-Jamming Rope (Last Crusade)
  description: Used by Indiana Jones alone in the Temple of the Cross to wedge and
    halt the pendulum's rotating scythe blades, enabling his escape during the Grail
    quest. Distinct from other ropes or tools used in Raiders of the Lost Ark.
  purpose: Jam and halt the pendulum blades to allow safe passage through the temple
    trap
  significance: Enables Indy to survive the physical trial and reach the Grail altar,
    heightening stakes for the moral choice amid his father's peril and Nazi pursuit
  potential_owner_mention: Indiana Jones (Indy)
  potential_owner_uuid: null
- fabula_uuid: object_1fe9ce9b7369
  global_id: null
  canonical_name: Indy's Reading Glasses
  description: Used exclusively in Indy's cluttered office; marks his transition from
    scholar to adventurer.
  purpose: Aid close-up reading of fine print in books and scholarly materials
  significance: Embody Indy's academic identity in his office sanctuary, contrasting
    the tweed-clad professor with the adventurer; their removal signals shifts from
    routine study to high-stakes revelations about Nazis and the Ark
  potential_owner_mention: Indiana Jones (Indy)
  potential_owner_uuid: null
- fabula_uuid: object_15eb2ac74c29
  global_id: null
  canonical_name: Indy's Revolver
  description: A firearm carried by Indiana Jones, drawn in desperation on the deserted
    Mediterranean beach but found empty, symbolizing his vulnerability in the face
    of the Nazi threat.
  purpose: Fire bullets at threats for defense
  significance: Indy's failed grasp for the revolver underscores his vulnerability
    without ammo, forcing reliance on Henry's umbrella trick with seagulls and sparking
    admiration that shifts their father-son dynamic toward mutual respect amid Nazi
    pursuit.
  potential_owner_mention: Indiana Jones (Indy)
  potential_owner_uuid: null
- fabula_uuid: object_03c07186312a
  global_id: null
  canonical_name: Indy's Rumpled Tweed Jacket
  description: Portable clothing item worn by Indy; conceals the Venice letter and
    embodies his academic-adventurer duality.
  purpose: Serves as professor's daily outerwear for lectures and office work; conceals
    documents in its pocket during hasty escape.
  significance: Embodies Indy's academic facade masking his adventurer instincts.
    Stuffing the Venice letter inside it marks the pivot from scholarly routine to
    quest, as the concealed message ties his father's disappearance to a larger threat
    and launches the plot.
  potential_owner_mention: Indiana Jones
  potential_owner_uuid: agent_aedc86bb8523
- fabula_uuid: object_7225c025ba0c
  global_id: null
  canonical_name: Indy's Sacrificial Spike Trap Test Stick (Chamber of Light)
  description: Deliberately thrown onto pressure-sensitive tiles in the **Chamber
    of Light** to trigger ceiling spikes, demonstrating the trap’s instant lethality.
    Destroyed in the process.
  purpose: Test ceiling spike trap mechanism
  significance: Proves trap deadliness before idol retrieval, amplifies peril, highlights
    Indy's cautious expertise amid fragile alliances and prior fatalities like Forrestal's.
  potential_owner_mention: Indiana Jones (Indy)
  potential_owner_uuid: null
- fabula_uuid: object_002a91964bba
  global_id: null
  canonical_name: Indy's Scholarly Book on His Office Shelf
  description: A physical book that is part of Indiana Jones' permanent collection
    in his personal office. This book is pored over by Indy amid cluttered artifacts
    on his desk, highlighting his scholarly routine and serving as a visual anchor
    in his workspace. It is shelved and interacted with in a way that underscores
    his dual life as both an academic and an adventurer.
  purpose: Academic reading and reference
  significance: Highlights Indy's split focus between scholarly routine and looming
    adventure threats, acting as a brief distraction in the collision of his dual
    lives.
  potential_owner_mention: Indiana Jones
  potential_owner_uuid: agent_9b8a52b10449
- fabula_uuid: object_1cd289a6e8b0
  global_id: null
  canonical_name: Indy's Short Leather Jacket
  description: Worn exclusively during the Peruvian jungle expedition; functions as
    protective gear and a symbol of Indy's adventurer authority.
  purpose: Protective clothing and concealment for adventuring gear during jungle
    trek
  significance: Defines Indy's pragmatic adventurer identity, marking him as leader
    amid eroding trust with guides like Barranca and Satipo; endures as constant amid
    chaos of superstition and betrayal
  potential_owner_mention: Indiana Jones (Indy)
  potential_owner_uuid: null
- fabula_uuid: object_2ba22b443296
  global_id: null
  canonical_name: Indy's Stolen Truck
  description: Indiana Jones grips the wheel of a battered stolen truck, barreling
    through Cairo's narrow alleys at high speed while Nazi pursuers in a staff car
    close in. Pedestrians and vendors scatter as the truck weaves wildly, then skids
    into Omar’s garage with brakes screeching. Locals slam the door shut, drop tents
    to hide the entrance, and set up fruit carts and baskets to erase tire tracks,
    transforming the square into a bustling market that fools the arriving Nazis.
  purpose: Escape vehicle to evade Nazi pursuit while transporting concealed cargo.
  significance: Drives the high-stakes chase sequence, enables Indy's narrow escape,
    and demonstrates Omar’s network's quick camouflage tactics, preserving the Ark's
    secrecy amid rising Nazi frustration.
  potential_owner_mention: Indiana Jones (Indy)
  potential_owner_uuid: null
- fabula_uuid: object_b305a133d0fc
  global_id: null
  canonical_name: Indy's Tank Cannon-Jamming Stones
  description: Indiana Jones scoops jagged desert rocks from the sun-baked valley
    floor during the frantic tank chase. He crams them deep into the tank's side cannon
    barrel (and later forces one into the barrel amid hand-to-hand combat with Colonel
    Vogel). The gunner fires; rocks block the shell, sparking a catastrophic backfire
    that shreds him inside and belches thick smoke from the turret, crippling the
    weapon. The stones also prevent a point-blank shot, giving Indy time to rescue
    Henry Jones Sr. and Marcus Brody.
  purpose: Improvise sabotage by jamming tank cannon to prevent firing
  significance: Turns the tide in Indy's desperate assault on the Nazi tank, showcasing
    his resourcefulness amid gunfire and explosions; its success delays Vogel's counterattack
    but fails to secure the full rescue, heightening the mission's peril
  potential_owner_mention: Indiana Jones
  potential_owner_uuid: agent_aedc86bb8523
- fabula_uuid: object_15907dca2ec5
  global_id: null
  canonical_name: Indy's Temporary Phone Messages
  description: A stack of written communication slips handed to Indiana Jones by his
    secretary, Irene, in the outer office. These messages are temporary, ephemeral
    items that serve as a narrative device to highlight Indy's academic responsibilities
    and the chaos of his daily life. They are not owned by Indy but are delivered
    to him in the moment and likely discarded or filed afterward.
  purpose: Relay details of incoming phone calls to Indiana Jones
  significance: Capture the drag of everyday administrative tasks on Indy, heightening
    tension between his scholar's routine and the urgent call to action from Brody's
    news and the Venice letter
  potential_owner_mention: Indiana Jones
  potential_owner_uuid: agent_aedc86bb8523
- fabula_uuid: object_78d450904f4d
  global_id: null
  canonical_name: Indy's Tweed Jacket and Necktie
  description: Worn during the *Palace of the Peacock* sequence in Episode 1, marking
    Indy's transition from formal nightclub attire to a vulnerable state before the
    Thuggee ambush.
  purpose: Semi-formal outerwear and neck accessory for palace attire
  significance: Marks Indy's relaxed, unguarded state amid flirtation with Willie,
    contrasting his casual confidence against the palace's hidden Thuggee threats
    and foreshadowing the sudden ambush.
  potential_owner_mention: Indy
  potential_owner_uuid: agent_1106f9a4eeee
- fabula_uuid: object_5405bded7bdd
  global_id: null
  canonical_name: Indy's Weighted Decoy Bag (Canvas/Leather Pouch)
  description: A temporary prop created by Indiana Jones to mimic the weight of the
    Chachapoyan Fertility Idol. Initially described as a canvas bag filled with dirt
    and stones, later shown as a leather pouch in the idol-swap sequence. Used as
    a decoy to trigger the temple's trap mechanism during the idol-theft sequence,
    holding the pedestal's balance for mere seconds before the defenses activate.
    Satipo watches hungrily as Indy prepares it, his impatience mounting amid the
    traps.
  purpose: Weighted decoy to substitute for the Chachapoyan Fertility Idol on the
    trap pedestal, allowing safe removal before weight-sensitive collapse.
  significance: Enables Indy's expert retrieval of the idol, showcasing his improvised
    survivalism against temple traps; Satipo's betrayal follows immediately, costing
    Indy the idol and igniting the boulder pursuit that tests his lone resolve.
  potential_owner_mention: Indiana Jones
  potential_owner_uuid: agent_9b8a52b10449
- fabula_uuid: object_7a0d9c21c7e0
  global_id: null
  canonical_name: Indy's White Arabian Stallion (Raiders of the Lost Ark Chase)
  description: A *white Arabian stallion* with exceptional stamina, used in the desert/mountain
    chase to pursue the Nazi convoy. Indy leaps from its back onto a truck cab during
    the high-stakes pursuit.
  purpose: Mount for cross-country pursuit and launching attacks on moving vehicles
  significance: Powers Indy's daring leap onto the convoy truck, enabling his assault
    on the Nazis and advance toward securing the Ark amid the escalating chase
  potential_owner_mention: Indiana Jones (Indy)
  potential_owner_uuid: null
- fabula_uuid: object_5b381f176a4a
  global_id: null
  canonical_name: Indy's Wooden Chair
  description: Wooden chair from The Raven saloon, used as a weapon in a chaotic brawl
    during *Raiders of the Lost Ark*.
  purpose: Improvised weapon to incapacitate opponents
  significance: Empowers Indy's rescue of Marion, escalating the saloon fight and
    marking the destruction of her bar as Nazis pursue the medallion
  potential_owner_mention: Indiana Jones (Indy)
  potential_owner_uuid: null
- fabula_uuid: object_1fe42cadc021
  global_id: null
  canonical_name: Indy-Elsa Escape Motorboat (Venice Canal Chase)
  description: A commandeered, high-speed motorboat used exclusively by Indiana Jones
    and Elsa Schneider for a dramatic escape through Venice's canals. Sustains heavy
    damage (bullets, flames, propeller near-misses) and is destroyed in a climactic
    chase sequence, serving as a **narrative battleground** that tests the Indy-Elsa
    alliance and raises the stakes of their quest.
  purpose: Escape vehicle during canal chase
  significance: Serves as battleground that tests Indy-Elsa alliance, with Elsa's
    piloting earning Indy's trust amid life-or-death combat and deepening their quest's
    stakes.
  potential_owner_mention: Indiana Jones and Elsa Schneider
  potential_owner_uuid: null
- fabula_uuid: object_f4efbcca5f98
  global_id: null
  canonical_name: Indy-Marion Ark Lifting Poles (Raiders of the Lost Ark)
  description: Used exclusively in the Well of Souls to lift the Ark of the Covenant
    from its altar, triggering divine wrath and enabling its removal by Indy and Marion.
    Distinct from other poles used in the ship ambush sequence.
  purpose: Lift and transport the Ark by insertion through its rings and shouldering
  significance: Empowers Indy and Marion to seize the Ark post-divine wrath, shifting
    from Nazi control to protagonists' defiant escape and protection of the relic
    against pursuing forces.
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_b9f13acfcb4f
  global_id: null
  canonical_name: Indy’s Catacombs Grail Tablet Rubbing
  description: A portable, paper-based rubbing of Donovan’s Grail Tablet, created
    by Indiana Jones in the catacombs. Used to verify the alignment with the Crusader
    Knight’s Shield, confirming the second Grail marker. Physically distinct from
    the original tablet and water-damaged.
  purpose: Portable clue to verify and complete the second marker for the Holy Grail's
    location by overlaying on the Crusader Knight's shield
  significance: Confirms the path to the Grail by linking Donovan's incomplete tablet
    to the catacombs' shield discovery, heightening the quest's stakes amid fire,
    rats, and Nazi pursuit
  potential_owner_mention: Indiana Jones
  potential_owner_uuid: agent_aedc86bb8523
- fabula_uuid: object_3069f5b2f077
  global_id: null
  canonical_name: Intercepted Nazi Communiqué
  description: Colonel Musgrove pulls a single sheet of paper from his briefcase and
    slides it across the table to Indiana Jones. The document details Nazi excavation
    progress at Tanis, their hunt for the headpiece to the Staff of Ra, and direct
    references to Abner Ravenwood's research. Army Intelligence officers watch Indy's
    reaction closely as he scans the typed report, its stark intelligence format underscoring
    the urgency of Hitler's occult ambitions.
  purpose: Conveys intercepted intelligence on Nazi operations targeting the Ark of
    the Covenant via the Tanis digsite.
  significance: Exposes the Nazi threat to seize the Ark, forcing Indy to link his
    past with Ravenwood to the mission and revealing the artifact's biblical destructive
    power through his explanation.
  potential_owner_mention: Colonel Musgrove
  potential_owner_uuid: null
- fabula_uuid: object_b41472baca80
  global_id: null
  canonical_name: Ivory Rod
  description: René Belloq grips the slender ivory rod and slides it into a notch
    beneath the Ark of the Covenant's lid. He levers it to pry the lid open with a
    creak, unleashing a blinding storm of electric light and energy. The rod triggers
    the Ark's power, which incinerates nearby Nazis and courses through Belloq in
    a spectral illumination of white, blue, and green.
  purpose: Unlocks the Ark of the Covenant by fitting into a notch under the lid and
    acting as a lever to open it
  significance: Initiates the Ark's cataclysmic release of divine power, destroying
    Belloq and the Nazis while affirming the artifact's untouchable nature and warning
    against human attempts to control it
  potential_owner_mention: René Belloq
  potential_owner_uuid: agent_0b2049c8bad4
- fabula_uuid: object_6142f770526f
  global_id: null
  canonical_name: Jagged Ominous Hills
  description: Distant landmark observed from elephant-back during the group's initial
    approach to the Mayapore region; symbolizes the foreboding journey ahead and serves
    as a visual contrast to the later, grueling rutted path.
  purpose: ''
  significance: Mark the destination and symbolic threshold to the Thuggee cult’s
    domain, heightening unease as the party leaves palace safety for wilderness peril.
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_4a715125bbf6
  global_id: null
  canonical_name: Jock's Amphibious Plane
  description: Jock's amphibious plane, a dual-environment aircraft capable of both
    water landings and takeoffs, floats in the Urubamba River during a desperate escape
    sequence. The plane's hull slices through churning waters amid the Peruvian jungle
    as Indiana Jones leaps from a cliff, swims desperately, and boards it to evade
    Hovito warriors' poisoned darts and spears. **Inside the cabin, Indiana Jones
    collapses onto the passenger seat, exhausted after his jungle pursuit, before
    spotting the coiled boa constrictor Reggie.** Jock pilots the aircraft skyward
    for escape, with the plane's engines roaring to life to propel it forward. The
    cabin contains **a passenger seat** (where Indy briefly rests) and a **massive
    boa constrictor named Reggie**, sparking Indiana Jones' primal terror. The plane's
    wings, engines, and interior seating serve as critical components for both river-based
    navigation and aerial escape.
  purpose: Escape vehicle enabling water landing and takeoff from the Urubamba River
  significance: Delivers Indy from Hovitos but conceals Reggie, unleashing his snake
    phobia and exposing vulnerability beneath his bravado
  potential_owner_mention: Jock
  potential_owner_uuid: agent_d984a864f3cf
- fabula_uuid: object_1e2046412589
  global_id: null
  canonical_name: Jock's Seaplane Pontoon Strut
  description: A load-bearing metal strut extending from the underside of Jock's amphibious
    seaplane, positioned low over the Urubamba River. Serves as a handhold for Indiana
    Jones during his escape, enabling him to pull himself aboard the plane while evading
    Hovito warriors.
  purpose: Handhold for boarding the seaplane from the river
  significance: Enables Indiana Jones's narrow escape from Hovito warriors after leaping
    from a jungle cliff, turning desperate flight into momentary safety aboard Jock's
    plane and exposing his vulnerability amid the chase.
  potential_owner_mention: Jock
  potential_owner_uuid: agent_d984a864f3cf
- fabula_uuid: object_8ac0ae3c2464
  global_id: null
  canonical_name: Jungle Canopy Giant Bats (En Route to Pankot Palace)
  description: A *swarm of monstrous bat-like creatures* encountered *during the group’s
    trek through the jungle* toward Pankot Palace. This aerial threat establishes
    the jungle’s dangers, foreshadows chaos, and tests the group’s resilience *before*
    they reach the palace.
  purpose: ''
  significance: These bats shatter the group's sense of security, escalate tension
    as an immediate natural threat, expose Willie's vulnerability, and foreshadow
    the cult's darker forces and impending chaos in the jungle.
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_2f70f4b7a6df
  global_id: null
  canonical_name: Kali Statue's Necklace of Pierced Human Fingers
  description: Ritual necklace made of pierced human fingers, draped around a Kali
    statue in a jungle clearing; symbolizes the Thuggee cult's macabre practices and
    serves as a visceral catalyst for terror and foreshadowing.
  purpose: Ritual adornment on Kali statue
  significance: Serves as visceral proof of Thuggee cult activity, terrifies the guide
    into abandoning the party, and signals rising supernatural dread that strands
    the group and foreshadows horrors at Pankot Palace.
  potential_owner_mention: Thuggee cult
  potential_owner_uuid: null
- fabula_uuid: object_4b5d021418bb
  global_id: null
  canonical_name: Kazim's Handgun
  description: A handgun carried by Kazim into the catacombs beneath the library.
    Kazim uses it to pistol-whip Marcus Brody unconscious by striking him with the
    weapon's butt. During the subsequent chase through the rat-infested, flame-lit
    tunnels, Kazim and his men repeatedly draw and brandish the gun to threaten Indiana
    Jones and Elsa Schneider, forcing them to flee through the flooding petroleum
    and collapsing catacombs. The weapon symbolizes the Brotherhood's violent guardianship
    of the Grail's path, its cold metal contrasting with the surrounding chaos, and
    its presence escalates the tension and danger, driving the characters' survival
    choices as they uncover the Grail Tablet Shield amid the chaos.
  purpose: Handgun for pistol-whipping foes unconscious and threatening intruders
  significance: Kazim's gun turns scholarly discovery into deadly standoff, trapping
    Indy and Elsa under fire while Brody lies stunned, amplifying the clash between
    relic hunters and the Brotherhood's sworn defenders.
  potential_owner_mention: Kazim
  potential_owner_uuid: agent_48106a5b77c2
- fabula_uuid: object_fab16ac04dd5
  global_id: null
  canonical_name: Kazim's Match (Catacombs Inferno Trigger)
  description: Kazim strikes the match and drops it into knee-deep, petroleum-slick
    water flooding the labyrinthine catacombs beneath the library. Flames surge upward,
    forming a towering wall of fire that races toward Indiana Jones and Elsa Schneider.
    The blaze sparks a stampede of rats and forces the pair to cram under an overturned
    coffin, gasping in a dwindling air pocket while heat closes in.
  purpose: Ignition source to set oil-slick water ablaze, creating a fiery barrier
    and hazard
  significance: Kazim deploys it to halt Indiana Jones and Elsa Schneider's advance
    after their Grail marker discovery, flipping scholarly triumph into primal survival
    and underscoring the Brotherhood's fierce guardianship of the Grail path
  potential_owner_mention: Kazim
  potential_owner_uuid: agent_9b8a52b10449
- fabula_uuid: object_598758ac2327
  global_id: null
  canonical_name: Kazim’s Machine Gun (Venice Boat Chase)
  description: A mounted machine gun aboard Kazim’s speedboat, used to fire on Indiana
    Jones and Elsa Schneider’s vessel during the Venice canal chase. Distinct from
    the speedboat itself; survives the chase scene and is referenced in additional
    events.
  purpose: Automatic weapon to disable and sink Indiana Jones and Elsa Schneider's
    escaping motorboat
  significance: Escalates the Venice canal pursuit into a deadly gauntlet, damaging
    Indy's boat and forging reluctant trust between Indy and Elsa through shared peril;
    highlights the Brotherhood of the Cruciform Sword's fierce guardianship of Grail
    secrets, pivoting Indy's quest toward moral confrontation after Kazim's later
    confession.
  potential_owner_mention: Kazim
  potential_owner_uuid: agent_48106a5b77c2
- fabula_uuid: object_ff251d1110e4
  global_id: null
  canonical_name: Kehoe's Trash Bin
  description: A trash bin repurposed by Buzz Kehoe as an improvised barrier to conceal
    a hole in Hok's museum wall, distinct from other vehicles or objects associated
    with Kehoe (e.g., the dilapidated Ford used for transportation in Shanghai Airport).
  purpose: Conceal the hole in Hok's museum rear wall
  significance: Kehoe positions the bin to enable covert infiltration of Hok's palace,
    contrasting Allied stealth with Nazi aggression and foreshadowing the factions'
    collision over the Ark.
  potential_owner_mention: Buzz Kehoe
  potential_owner_uuid: agent_95699b80015f
- fabula_uuid: object_596d73eb00fc
  global_id: null
  canonical_name: Kehoe’s Dilapidated Ford (Shanghai Airport Briefing)
  description: Battered Ford sedan used by Buzz Kehoe for high-speed transportation
    during the Shanghai Airport briefing with Indiana Jones and Bang Chow; remains
    intact throughout the scene and is distinct from the vehicle used in Hok’s museum.
  purpose: Rapid transportation through airport traffic
  significance: Serves as the stage for a pivotal briefing that thrusts Indy into
    the race against Nazis for the Ark, amplifying global stakes through Kehoe's erratic
    driving and blunt exposition.
  potential_owner_mention: Buzz Kehoe
  potential_owner_uuid: agent_95699b80015f
- fabula_uuid: object_a61edc78208e
  global_id: null
  canonical_name: Kehoe’s Ford Sedan (Hok’s Museum Escape)
  description: Intact Ford sedan used by Buzz Kehoe during Indiana Jones’s escape
    from Hok’s museum; destroyed when Indy crashes through its roof during a pursuit
    by Nazis and samurai guardians.
  purpose: Escape vehicle for Indiana Jones from Hok’s museum
  significance: Enables Indy’s survival in the rooftop chase, marks the collapse of
    his alliance with Hok, and escalates the mission into open warfare with Nazis
    and Hok’s forces.
  potential_owner_mention: Buzz Kehoe
  potential_owner_uuid: agent_95699b80015f
- fabula_uuid: object_905362892194
  global_id: null
  canonical_name: Kiva Chamber Wooden Box (Cross of Coronado Container)
  description: Temporary, neutral container for the Cross of Coronado in *Indiana
    Jones and the Last Crusade* (1989); abandoned after the cross is removed with
    no further narrative role.
  purpose: Container for transporting and storing the Cross of Coronado
  significance: Holds the priceless Cross that ignites young Indiana Jones's moral
    stand against plunder, marking his first act as an artifact guardian amid the
    looters' greed and foreshadowing his lifelong battles over history's treasures.
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_79d9f10cd21a
  global_id: null
  canonical_name: Labyrinth of Pressure-Sensitive Stones
  description: Indiana Jones navigates the labyrinth of pressure-sensitive stones
    in the shadowed mosque ruins during the second Grail trial. He steps with exact
    precision on the ancient floor tiles, each one a potential trigger for deadly
    traps. The mechanism demands humility, forcing careful progress amid crumbling
    stone and rising tension, as missteps threaten instant death.
  purpose: Test worthiness through precision and humility by activating deadly traps
    on incorrect steps
  significance: Forms the second of three sacred trials guarding the Holy Grail; challenges
    Indy's scholarly skepticism against emerging faith, links to his father's legacy
    and anti-Nazi defiance, heightens stakes for his survival and guardianship role
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_1bd3b9e3f075
  global_id: null
  canonical_name: Lao Che and Kao Kan's Concealed Weapons
  description: Lao Che and Kao Kan screech to a halt in their sedans at Nang Tao Airfield
    and hastily conceal their weapons upon spotting airport military police. The arms
    stay hidden amid the chaos of revving plane engines and sprinting escapees, preserving
    the duo's threat level without drawing official attention. Indiana Jones delivers
    his defiant salute from the plane steps, oblivious to the concealed danger below
    as prop wash buffets Lao Che's furious glare.
  purpose: Pursue and threaten Indiana Jones, Willie Scott, and Short Round covertly
    amid police presence
  significance: These hidden weapons mark the spark of Lao Che's vengeance, turning
    escape into a declared war and launching a relentless global hunt
  potential_owner_mention: Lao Che
  potential_owner_uuid: agent_68d30cf50ec6
- fabula_uuid: object_8b22ccd0a7e7
  global_id: null
  canonical_name: Lao Che's Antidote Vial
  description: Lao Che sets the slender glass vial of clear antidote liquid on the
    nightclub table as leverage after poisoning Indiana Jones's champagne during negotiations
    over Nurhachi's ashes. Indiana Jones snatches it amid gunfire chaos sparked by
    Chen shooting Wu Han. He and Willie Scott scramble desperately to secure it while
    dodging bullets and debris, with Short Round witnessing the betrayal. The vial
    nearly gets kicked away in the brawl but remains Indy's lifeline.
  purpose: Counteracts poison in Indiana Jones's champagne
  significance: Serves as bargaining chip that shatters trust, triggers nightclub
    battle and escape; lifesaving clue ensuring Indy's survival amid betrayal, Wu
    Han's death, and chaotic flight through window
  potential_owner_mention: Lao Che
  potential_owner_uuid: agent_68d30cf50ec6
- fabula_uuid: object_2e9bb7512959
  global_id: null
  canonical_name: Lao Che's Attack Biplanes
  description: Pair of open-cockpit biplanes operated by Lao Che's forces; deployed
    to strafe and destroy the DC-3 during aerial pursuit; both are destroyed (one
    shot down by Short Round, the other collides with a mountain).
  purpose: Strafe and destroy the target airplane during aerial pursuit
  significance: Escalates Lao Che's vendetta beyond Shanghai, forces desperate bailout
    and raft escape, spotlights Short Round's sharpshooting and Indy's quick command
    amid crisis
  potential_owner_mention: Lao Che
  potential_owner_uuid: agent_68d30cf50ec6
- fabula_uuid: object_73a272fe9f34
  global_id: null
  canonical_name: Lao Che's Diamond and Ruby on Rice Paper
  description: Lao Che unfolds delicate rice paper on the nightclub table, revealing
    a large diamond and a ruby nestled within. He offers these gems to Indiana Jones
    as additional payment to secure Nurhachi's ashes amid escalating tension. Indy
    inspects the jewels closely while insults fly and caviar insults Lao's pride,
    but gunfire erupts before any handoff, leaving the gems abandoned amid the chaos.
  purpose: Bribe and bargaining chip to finalize the exchange for Nurhachi's ashes
  significance: These jewels heighten the stakes in the collapsing negotiation, symbolizing
    Lao Che's desperation to acquire the ashes and underscoring the betrayal that
    ignites the brawl, Wu Han's death, and Indy's poisoned escape.
  potential_owner_mention: Lao Che
  potential_owner_uuid: agent_68d30cf50ec6
- fabula_uuid: object_0fab03fc48d3
  global_id: null
  canonical_name: Lao Che's Silver Cigarette Case
  description: Indiana Jones snaps open Lao Che's silver cigarette case amid the smoke-filled
    Dragon nightclub, pulls out a cigarette, and lights it to reveal his face clearly
    for the first time. He later grinds the lit cigarette into the caviar plate as
    a pointed insult to Lao Che, watched by Short Round, Wu Han, Willie Scott, and
    Lao's men. The case gleams on the negotiation table, fueling the standoff's rising
    hostility.
  purpose: Dispenses cigarettes
  significance: Triggers Indy's identity reveal and delivers the cigarette for his
    disrespectful stub into caviar, directly provoking Lao Che and accelerating the
    negotiation into violence.
  potential_owner_mention: Lao Che
  potential_owner_uuid: agent_68d30cf50ec6
- fabula_uuid: object_c5a20f1ddcb7
  global_id: null
  canonical_name: Lao Che's Wad of Cash
  description: Lao Che slaps a thick wad of cash onto the table in the smoke-choked
    Dragon nightclub during tense negotiations for Nurhachi’s ashes. Indiana Jones
    inspects it, deems it insufficient, and rejects it outright. Short Round, Wu Han,
    and Willie Scott watch as this dismissal enrages Lao Che, paving the way for poisoned
    champagne and erupting violence.
  purpose: Payment and bargaining chip for Emperor Nurhachi's ashes
  significance: Indy's rejection escalates the deal into betrayal, poisoning, and
    a deadly nightclub brawl, marking the collapse of trust.
  potential_owner_mention: Lao Che
  potential_owner_uuid: agent_68d30cf50ec6
- fabula_uuid: object_e50f833b7ed0
  global_id: null
  canonical_name: Lao Che’s Betrayal Poisoned Champagne
  description: A single glass of champagne laced with lethal toxin, served by Lao
    Che during a high-stakes negotiation at the Dragon nightclub. Its consumption
    by Indiana Jones triggers a chain reaction of betrayal, violence, and chaos, revealing
    Lao Che’s true intentions. Distinct from other Lao Che-associated objects by its
    role in the poisoning subplot and lack of connection to the pursuit sequence.
  purpose: Poison Indiana Jones covertly during Nurhachi ashes exchange
  significance: Triggers betrayal revelation, Wu Han's death, brawl, and Indy's escape;
    tests moral flexibility amid cult threat
  potential_owner_mention: Lao Che
  potential_owner_uuid: agent_68d30cf50ec6
- fabula_uuid: object_27a1b900dd31
  global_id: null
  canonical_name: Lao Che’s Black Sedans (Pursuit Vehicles)
  description: Two black sedans used exclusively for the high-speed pursuit of Indiana
    Jones and his companions through Shanghai’s streets, culminating in a confrontation
    at Nang Tao Airfield. Distinct from other Lao Che-associated objects by their
    role in the action sequence and lack of connection to the nightclub betrayal plot.
  purpose: Transportation for pursuing Indiana Jones to the airfield
  significance: Their screeching arrival forces Lao Che to suppress rage temporarily
    under police scrutiny, but Indy's defiant salute from the plane ignites unrelenting
    vengeance, launching the antagonists' global hunt.
  potential_owner_mention: Lao Che
  potential_owner_uuid: agent_68d30cf50ec6
- fabula_uuid: object_ae957be8bd58
  global_id: null
  canonical_name: Lao Che’s Silver Snuff Bottle
  description: Chen tips over the silver snuff bottle on the negotiation table after
    Indiana Jones drinks the poisoned champagne, spilling white powder that reveals
    the poison's nature. The finely crafted vessel rests amid champagne flutes and
    caviar plates in the smoke-filled Dragon nightclub. Indiana Jones and allies react
    sharply as it exposes the treachery; Lao Che observes while Short Round, Willie
    Scott, Wu Han, and others witness the spill amid escalating chaos.
  purpose: Deliver poison powder disguised as snuff
  significance: Confirms the champagne poison after Indy's sip, shattering the negotiation
    and sparking demands for antidote, Wu Han's death, and the nightclub brawl.
  potential_owner_mention: Lao Che
  potential_owner_uuid: agent_68d30cf50ec6
- fabula_uuid: object_9d95f97f9bef
  global_id: null
  canonical_name: Lao She's Gold Coins
  description: Lao She tosses gold coins onto the negotiation table in Shanghai's
    Dragon nightclub after Indiana Jones demands higher payment for Nurhachi's ashes.
    The coins join champagne flutes and caviar plates amid smoke and hostility, eyed
    by Short Round, Wu Han, Willie Scott, and others, but left behind as gunfire erupts.
  purpose: Payment and bargaining chip for Nurhachi's ashes
  significance: Heightens stakes in collapsing deal, underscoring Lao She's wealth
    and failed bid to buy the ashes before poison and violence intervene
  potential_owner_mention: Lao She
  potential_owner_uuid: agent_b1532ae8a6e9
- fabula_uuid: object_3b1cabeec25c
  global_id: null
  canonical_name: Lava Crevasse
  description: A wide chasm filled with roiling molten lava cuts through the floor
    of the Temple of Death. Mola Ram lowers the sacrificial victim's body into its
    fiery depths after ripping out the still-beating heart, flames consuming the remains
    as cult chants echo. Indiana Jones, Willie Scott, and Short Round watch from the
    wind tunnel overlook; the lava's glow illuminates the Sankara Stones, mesmerizing
    Indy amid the horror.
  purpose: Incinerates bodies of sacrificial victims during Thuggee blood rituals
    dedicated to Kali
  significance: Amplifies the Thuggee cult's fanatical brutality, triggers revelation
    of the Sankara Stones' supernatural glow, and propels Indiana Jones to descend
    into the temple despite Willie Scott's pleas, marking his commitment to retrieving
    the artifacts.
  potential_owner_mention: Mola Ram
  potential_owner_uuid: agent_a38c0a48f398
- fabula_uuid: object_d03e544f9f29
  global_id: null
  canonical_name: Leaflets Bearing Henry Jones Sr.'s Photograph
  description: 'Printed leaflets featuring Henry Jones Sr.''s photograph, distributed
    by Nazi agents for identification and capture purposes. These leaflets are used
    in two key contexts: (1) at the Berlin airfield, where plainclothes agents distribute
    them to soldiers and boarding guards to identify Henry as a wanted fugitive, and
    (2) aboard the Zeppelin, where Colonel Vogel brandishes one during interrogations
    to demand recognition of Henry and pinpoint his location. The leaflets serve as
    a visual aid in the Nazi manhunt, creating tension as Indy and Henry navigate
    the risk of exposure. The leaflet brandished by Colonel Vogel aboard the Zeppelin
    is a specific instance of this broader category of distributed propaganda.'
  purpose: Identifying Henry Jones Sr. as a wanted fugitive for capture
  significance: Marks Henry as a target due to his Grail obsession, heightens escape
    tension, and forces Indy to rely on false papers and family trust under Nazi eyes
  potential_owner_mention: Plainclothes Agent
  potential_owner_uuid: agent_4f38fa02fcdb
- fabula_uuid: object_fafd156facbd
  global_id: null
  canonical_name: Library Catacombs Rats
  description: Thousands of rats swarm through knee-deep water flooding the narrow
    passageways of the library catacombs. Indiana Jones slips into a rat-choked hole,
    his paralyzing fear forcing him to carry Elsa Schneider piggyback through the
    teeming mass. The rodents press in amid suffocating darkness and crumbling stone,
    their furred bodies brushing skin as torches flicker.
  purpose: Overwhelm explorers in flooded passages, creating a physical and psychological
    barrier
  significance: Expose Indiana Jones's vulnerability to rats, compel reluctant physical
    contact with Elsa Schneider, and intensify the claustrophobic desperation of their
    flight from Kazim's men
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_edbb15a87c3a
  global_id: null
  canonical_name: Lion's Head Leap of Faith Marker
  description: Carved lion's head inscription etches into the rock ledge high above
    Indiana Jones, pinpointing the exact spot for the temple's Leap of Faith trial.
    Indy stands beneath it, facing the yawning abyss, and steps forward from this
    marker into empty air, revealing the camouflaged bridge below. The carving commands
    the challenger's blind trust amid the canyon's roar and his father's fading life.
  purpose: Designates the launch point for the Leap of Faith, where the quester jumps
    into the void to activate the invisible path across the chasm
  significance: Forces Indy to confront doubt under pressure from Henry's gunshot
    wound, embodying the Grail quest's core trial of faith without proof, and unlocks
    the final chamber where Donovan meets his doom
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_a70f8ac19fd9
  global_id: null
  canonical_name: Locked Exterior Door of Willie Scott's Suite
  description: Permanent, structural entry/exit point for Willie's suite, locked from
    the outside by the Thuggee cult to trap her inside. Contrasts with the suite's
    hidden internal features like the loose wall panel.
  purpose: Entry and exit for Willie's suite
  significance: The locked door isolates Willie amid Kali's supernatural hold on Indy,
    forcing her to face betrayal alone before Thuggee guards ambush her, embodying
    the palace's inescapable traps and the cult's shadowy control.
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_bce972dbbe87
  global_id: null
  canonical_name: Loose Brick Trigger (Spike Chamber Wall)
  description: False escape mechanism in the spike chamber wall; removing this single,
    protruding brick activates the closing spikes, revealing the trap's deadly design.
  purpose: Trap trigger disguised as escape mechanism
  significance: Short Round's mistake with the brick locks Indiana Jones and him in
    mortal peril, compelling Willie Scott's reluctant heroism in the insect-filled
    tunnel to activate the true release lever.
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_da36c4b96a3b
  global_id: null
  canonical_name: Looted Peruvian Temple Relics (Indy’s Office)
  description: Intricate, **non-functional relics looted from the Peruvian temple**
    and later **scattered on Indiana Jones’s office desk**. Examined by **Marcus Brody**,
    these artifacts symbolize **Indy’s moral conflict, betrayal, and the chaos of
    his recent adventure**. They serve as a **narrative catalyst** for threats from
    **Army Intelligence and Abner Ravenwood**, **distinct from the functional navigation
    artifacts used during the temple heist**.
  purpose: ''
  significance: These artifacts anchor Indy to his recent Peruvian adventure, marked
    by betrayal and near-death. Brody's examination underscores their illicit nature
    and the chaos they represent, pulling Indy from scholarly life toward looming
    threats tied to Army Intelligence and Abner Ravenwood.
  potential_owner_mention: Indiana Jones
  potential_owner_uuid: agent_9b8a52b10449
- fabula_uuid: object_cfe80c9e586b
  global_id: null
  canonical_name: Looters' Kerosene Lanterns
  description: Used to illuminate the Kiva chamber and the unearthed Cross of Coronado,
    creating a tense atmosphere as young Indiana Jones observes the looters from the
    shadows. Positioned on rocks beside the artifact, their flickering light contrasts
    with the darkness of the sacred space.
  purpose: Illuminate the dark Kiva chamber during the looting
  significance: The lanterns expose the Cross of Coronado to the looters' greed, drawing
    Indy's attention and sparking his first stand against artifact theft. Their light
    sharpens the tension between sacred history and exploitation.
  potential_owner_mention: Fedora
  potential_owner_uuid: agent_2d328f80964c
- fabula_uuid: object_2fb89161793e
  global_id: null
  canonical_name: Looters' Shovels and Pick-Axes
  description: Wielded by Fedora’s gang to violently hack through earthen walls in
    the Kiva chamber, breaching the sacred space to access the buried Cross of Coronado.
    Their frantic clanging echoes through the chamber, drawing young Indiana Jones's
    attention and sparking his declaration to reclaim the artifact.
  purpose: Digging through soil and walls to access and loot buried artifacts from
    the Kiva chamber
  significance: The tools unearth the Cross of Coronado, igniting young Indiana Jones's
    declaration that the artifact belongs in a museum and launching his first theft
    to reclaim it from the looters
  potential_owner_mention: Fedora
  potential_owner_uuid: agent_2d328f80964c
- fabula_uuid: object_2c27123c55e5
  global_id: null
  canonical_name: Maharajah of Pankot's Ritual Flaming Urn
  description: A small urn filled with flickering flames, used exclusively by the
    Maharajah in Mola Ram's chamber to ignite voodoo dolls and channel supernatural
    agony into victims. Embodying the Thuggee cult's dark power, it remains under
    the cult's control throughout the scene and is not repurposed.
  purpose: Burns voodoo dolls to inflict remote supernatural pain on victims
  significance: Emphasizes the Maharajah's corruption by Kali's cult and escalates
    Indy's torment during the blood ritual, marking the shift from theft accusation
    to forced conversion and apocalyptic threat
  potential_owner_mention: Maharajah of Pankot
  potential_owner_uuid: agent_8aa18dc1d347
- fabula_uuid: object_ac27873112c3
  global_id: null
  canonical_name: Maharajah of Pankot's Sapphire Turban Pin
  description: A slender, sapphire-topped pin yanked from the Maharajah's turban,
    initially used to stab voodoo dolls and inflict pain, later repurposed by Short
    Round to break the Maharajah's Thuggee trance and restore his free will. Symbolizes
    the duality of power—both oppression and liberation.
  purpose: 'Supernatural needle for voodoo curses: inflicts remote pain on doll''s
    target and breaks hypnotic control when stabbed into the victim''s flesh'
  significance: Thuggee cult deploys it to torture Indiana Jones and puppeteer the
    Maharajah; Short Round's reversal frees both, turning cult sorcery against itself
    and enabling the trio's escape from the quarry death trap
  potential_owner_mention: Maharajah of Pankot
  potential_owner_uuid: agent_8aa18dc1d347
- fabula_uuid: object_12c31dcb3392
  global_id: null
  canonical_name: Maharajah's Clay Voodoo Doll of Indiana Jones
  description: Maharajah of Pankot clutches a small clay doll sculpted to resemble
    Indiana Jones. He jabs its torso with a sapphire-tipped turban pin, channeling
    supernatural agony directly into Indy far below in the quarry. Short Round spots
    the doll, scales a bucket chain, and yanks out the pin to shatter the curse.
  purpose: Inflict remote physical pain on a targeted individual through voodoo stabbing
  significance: Torments Indiana Jones during quarry escape, spurring Short Round's
    climb and intervention; underscores Thuggee cult's mystical powers pursuing the
    trio
  potential_owner_mention: Maharajah of Pankot
  potential_owner_uuid: agent_8aa18dc1d347
- fabula_uuid: object_98a2c1d0afef
  global_id: null
  canonical_name: Marble Bench Near High Window (Hok's Museum)
  description: Positioned near a high window in Tengtu Hok's museum; used in Indy's
    gong-based escape sequence (Episode 1, Scene 3).
  purpose: seating in museum
  significance: Blocks Indiana Jones's path during his gong-shield escape, prompting
    a critical leap to the roof that advances his flight from Nazi pursuers and Hok's
    forces.
  potential_owner_mention: Tengtu Hok
  potential_owner_uuid: agent_5458ae9dfc87
- fabula_uuid: object_bb334b206779
  global_id: null
  canonical_name: Marble Bridge to Pankot Palace
  description: Indiana Jones, Willie Scott, and Short Round cross this marble bridge
    en route to Pankot Palace. Rajput guards stand like statues along its span, snapping
    to attention in sequence with gleaming lances as the trio passes. Willie startles
    at the first motion then grins; Indy scans the rigid display warily; Short Round
    grips his satchel tightly. The bridge frames a choreographed welcome that masks
    underlying threats.
  purpose: Pathway connecting the external approach to Pankot Palace entrance
  significance: Marks the threshold into the cult's domain, where guards' obedience
    signals control and power designed to unnerve intruders; exposes character reactions
    amid rising tension
  potential_owner_mention: Rajput guards
  potential_owner_uuid: null
- fabula_uuid: object_f13be1d74715
  global_id: null
  canonical_name: Marcus Brody's Fedora
  description: A recurring accessory symbolizing Brody's vulnerability (doffed during
    deception) and survival instinct (clutched during the canyon collapse). Distinct
    from temporary medical props like the ice pack.
  purpose: Headwear for protection and courteous greetings
  significance: Emphasizes Brody's academic detachment and naivety—doffed in naive
    trust at the station, clutched in reluctant panic during the canyon escape—mirroring
    the team's fragile unity against Nazi pursuit.
  potential_owner_mention: Marcus Brody
  potential_owner_uuid: agent_10a98fa6b4d3
- fabula_uuid: object_bf7920fdbcbe
  global_id: null
  canonical_name: Marcus Brody's Grail Map
  description: Critical navigational artifact tied to the Holy Grail quest, originally
    owned by Marcus Brody. Indiana Jones invokes it during a tense roadside standoff
    as a ready alternative to Henry Jones Sr.'s Grail Diary, arguing its clues make
    a Berlin detour unnecessary. The map is central to the slap-punctuated clash between
    Indy and his father, with Brody's possession linking it to rescue imperatives
    in Venice. It serves as a navigational tool distinct from other artifacts like
    magnifying lenses or inspection devices in Brody's possession.
  purpose: Guides pursuers from current location to the next Grail clue site in Venice
  significance: Triggers violent clash between Indy and Henry, pitting personal loyalty
    against scholarly fixation and steering the quest's divergent paths
  potential_owner_mention: Marcus Brody
  potential_owner_uuid: agent_10a98fa6b4d3
- fabula_uuid: object_c1f16d470e8c
  global_id: null
  canonical_name: Marcus Brody's Head Ice Pack
  description: A temporary medical cold compress used once to treat Brody’s head wound
    after the Nazi confrontation in Venice. Distinct from his personal accessories
    like the fedora.
  purpose: Apply cold therapy to head wound and reduce swelling
  significance: Marks the physical aftermath of the Nazi fight, letting Brody persist
    with scholarly analysis despite injury and heightening the scene's urgency around
    map reconstruction and rescue plans
  potential_owner_mention: Marcus Brody
  potential_owner_uuid: agent_10a98fa6b4d3
- fabula_uuid: object_5aaa0bb2384a
  global_id: null
  canonical_name: Marcus Brody's Jeweler's Eyepiece
  description: Handheld magnifying tool used for scholarly inspection of artifacts,
    distinct from navigational tools like maps or diaries in Brody's collection.
  purpose: Magnified inspection of small artifacts and fragments
  significance: Highlights Brody's expertise in artifact evaluation, contrasting scholarly
    examination with the escalating geopolitical threats tied to the idol and the
    Ark
  potential_owner_mention: Marcus Brody
  potential_owner_uuid: agent_10a98fa6b4d3
- fabula_uuid: object_70267d7893f3
  global_id: null
  canonical_name: Marion Ravenwood's Amber Liquor Glass (Submarine Scene)
  description: A glass of amber liquor used by Marion Ravenwood to steady her nerves
    during a private, emotionally charged conversation with Belloq in the submarine.
    This is a personal prop distinct from Belloq’s liquor bottle used later in the
    Nazi command tent.
  purpose: Consuming liquor to steady nerves during conversation
  significance: Heightens Marion's vulnerability and the couple's rekindled tension,
    providing a brief sanctuary shattered by the Nazi seizure of the ship and Ark
  potential_owner_mention: Marion Ravenwood
  potential_owner_uuid: agent_c252127271d9
- fabula_uuid: object_ade8aee56b8c
  global_id: null
  canonical_name: Marion Ravenwood's Cash Box (The Raven Saloon)
  description: Symbolic of Marion's financial independence and livelihood; destroyed
    in the saloon fire, marking a turning point in her alliance with Indy.
  purpose: Container for cash
  significance: Holds Indy's payment to Marion, symbolizing her practical choice to
    sever ties despite their shared past. Its destruction in the saloon fire erases
    her financial independence and coincides with the forging of her alliance with
    Indy.
  potential_owner_mention: Marion Ravenwood
  potential_owner_uuid: agent_c252127271d9
- fabula_uuid: object_b87abb3bd7d3
  global_id: null
  canonical_name: Marion Ravenwood's Execution Restraints (Gag and Ropes)
  description: A brutal Nazi execution device consisting of two tall upright wooden
    posts positioned in the burning Tabernacle, with thick ropes securing Marion Ravenwood's
    wrists and ankles in a spread-eagle position. The ropes—coarse and tightly bound—also
    include a cloth gag that silences her mouth, leaving her completely helpless.
    The posts are anchored in a river of ignited oil, causing flames to climb their
    bases and threaten Marion's life. Indiana Jones arrives moments after the Nazis
    position her there, swiftly slashing through the ropes and removing the gag with
    his knife to free her just seconds before the posts burn away completely amid
    collapsing ruins, gunfire, and the Tabernacle's destruction. The device serves
    as both a restraint and a method of execution, exploiting the encroaching flames
    for maximum psychological and physical torment. The gag and ropes are recurring
    symbols of Marion's vulnerability and the Nazis' brutality, with their removal
    marking critical narrative turning points (e.g., the Tabernacle rescue).
  purpose: Silences captives to prevent screams or alerts
  significance: Triggers Indy's agonizing choice to abandon Marion for the Ark, exposes
    his moral compromises, and underscores her vulnerability amid Nazi captivity
  potential_owner_mention: Nazis
  potential_owner_uuid: agent_351a02f64e45
- fabula_uuid: object_202c8b74bb13
  global_id: null
  canonical_name: Marion Ravenwood's Improvised Axe Handle (Raven Saloon Brawl)
  description: Temporary, non-lethal weapon grabbed from the Raven Saloon bar during
    the Nazi confrontation; used exclusively in the saloon brawl to incapacitate a
    thug before being discarded. Functionally and narratively distinct from Marion's
    personal accessories.
  purpose: improvised bludgeon
  significance: Marion uses it to fight back against Nazis, reclaiming agency in the
    chaos and paving her path to partnering with Indy as her bar burns.
  potential_owner_mention: Marion Ravenwood
  potential_owner_uuid: agent_c252127271d9
- fabula_uuid: object_e0d787e7c603
  global_id: null
  canonical_name: Marion Ravenwood's Improvised Weapon (Cairo Bazaar Pot)
  description: Temporarily wielded by Marion Ravenwood as an improvised weapon during
    the Cairo bazaar ambush; not a personal possession but a prop from the market
    stall. Used once to incapacitate a mercenary before being discarded or broken.
  purpose: Improvised weapon to incapacitate attackers
  significance: Marion wields it in a split-second act of defiance amid the monkey-led
    Nazi ambush, buying her precious seconds before capture and underscoring her grit
    against overwhelming odds.
  potential_owner_mention: Marion Ravenwood
  potential_owner_uuid: agent_c252127271d9
- fabula_uuid: object_f07fa03b659f
  global_id: null
  canonical_name: Marion Ravenwood's Medallion Necklace Chain
  description: Permanent jewelry accessory securing the Ark's medallion headpiece;
    symbolizes Marion's bond with Indy and her father's legacy. Worn consistently
    throughout the episode, distinct from improvised weapons like the axe handle used
    in the saloon brawl.
  purpose: Secures the medallion headpiece for wear as a necklace
  significance: Serves as accessory symbolizing Marion's bond with Indy and her father's
    legacy; Marion's removal of the medallion from it marks her shift from bystander
    to partner in the Ark's pursuit
  potential_owner_mention: Marion Ravenwood
  potential_owner_uuid: agent_c252127271d9
- fabula_uuid: object_994a774c1846
  global_id: null
  canonical_name: Marion Ravenwood's Restraint Chair
  description: Used in Belloq’s tent, where Marion Ravenwood is immobilized with ropes
    and a gag, serving as the focal point for her emotional confrontation with Indiana
    Jones.
  purpose: Immobilization and restraint of captives
  significance: Anchors the pivotal reunion where Indy betrays Marion for the Ark,
    her bonds amplifying her fury and his anguish while raising stakes for her survival
    against the Nazis.
  potential_owner_mention: Nazis
  potential_owner_uuid: agent_351a02f64e45
- fabula_uuid: object_d284890c9279
  global_id: null
  canonical_name: Marion Ravenwood's Tattered Nightgown
  description: Marion Ravenwood's nightgown, worn during her captivity in the Tabernacle's
    inferno. The garment is bound and gagged between flaming posts as burning oil
    surges around her, enduring the blaze until Indy cuts her free. Post-rescue, the
    nightgown hangs in tatters, blackened with soot from the flames and chaos, clinging
    to her soot-streaked form as they flee with the Ark of the Covenant. The nightgown
    symbolizes Marion's vulnerability and resilience during her ordeal, as well as
    the intense, high-stakes nature of the escape sequence.
  purpose: Clothing worn by Marion during captivity
  significance: Emphasizes Marion’s physical ordeal and defiance amid the Ark’s supernatural
    destruction of Nazis; its ruined state underscores the intensity of her rescue
    and their partnership-forging reunion.
  potential_owner_mention: Marion Ravenwood
  potential_owner_uuid: agent_c252127271d9
- fabula_uuid: object_b81b2b56075f
  global_id: null
  canonical_name: Marion's Concealed Baretta Pistol
  description: A compact metal automatic pistol hidden behind the stuffed raven on
    Marion’s saloon shelf. Used for self-defense during the Nazi raid, symbolizing
    her resourcefulness and shift from passive saloon owner to active participant
    in Indy’s quest.
  purpose: Last-resort self-defense and combat against attackers
  significance: Marion grabs it to fight back, proving her resourcefulness and defiance;
    marks her shift from saloon owner to active partner in Indy's quest as her bar
    burns.
  potential_owner_mention: Marion Ravenwood
  potential_owner_uuid: agent_c252127271d9
- fabula_uuid: object_1cff02a0398f
  global_id: null
  canonical_name: Marion's White Nightgown
  description: A symbolic prop representing Marion's physical vulnerability and the
    couple's rekindled intimacy, visually contrasting with the Nazi invasion's violence
    through its white color and clinging fabric.
  purpose: Marion uses it as sleepwear for private rest and intimacy.
  significance: The nightgown marks Marion's rare vulnerability and the couple's fragile
    reconciliation, shattered by the Nazi ambush. It symbolizes intimacy's collision
    with brutality, deepening the emotional stakes as the Ark and Marion fall into
    enemy hands.
  potential_owner_mention: Marion Ravenwood
  potential_owner_uuid: agent_c252127271d9
- fabula_uuid: object_b86a197e6251
  global_id: null
  canonical_name: Massive Macaw (Jungle Distraction)
  description: 'A massive, vibrant macaw that erupts from the dense Peruvian jungle
    undergrowth near the temple approach, its sudden squawk and flapping wings startling
    Indian #2 into panicked flight. The bird distracts Indiana Jones, Satipo, Barranca,
    and the Indians, amplifying the group''s paranoia and superstitions about temple
    guardians amid poisoned darts and suffocating mist. Its appearance heightens the
    jungle''s hostile atmosphere as the group nears the temple entrance, serving as
    a sudden distraction that foreshadows the perils and betrayals ahead.'
  purpose: ''
  significance: 'Acts as an omen of supernatural threats, confirming the guides''
    fears of the temple''s curse and prompting flight among Indian #2 while Indy dismisses
    it as mere wildlife.'
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_91b6c71122ef
  global_id: null
  canonical_name: Mattress in Indiana Jones's Ransacked Bedroom
  description: The mattress lies flipped onto the floor amid the wreckage of Indiana
    Jones's bedroom, drawers yanked open and furniture upended by Nazi intruders.
    Dust clings to its rumpled surface, exposed springs visible through torn fabric.
    Indiana Jones and Elsa Schneider tumble onto it in a surge of passion after their
    argument, their bodies pressing into the displaced bedding as clothes loosen and
    hands explore urgently before they pull apart.
  purpose: Sleeping surface in Indiana Jones's hotel bedroom
  significance: Signals the depth of the Nazi search through its upheaval; becomes
    the improvised stage for Indy and Elsa's charged kiss, fusing betrayal's tension
    with sudden desire and exposing their alliance's volatility.
  potential_owner_mention: Indiana Jones
  potential_owner_uuid: agent_aedc86bb8523
- fabula_uuid: object_b8c722e3182a
  global_id: null
  canonical_name: Mayapore Shrine's Carved Niche (Empty Sivalinga Cradle)
  description: Sacred architectural feature within the Mayapore village shrine, designed
    to house the missing Sivalinga stone and directly tied to the village's curses
    (dry wells, dead crops, stolen children).
  purpose: Houses the sacred Sivalinga stone central to village rituals
  significance: Serves as stark proof of the artifact's theft, linking it directly
    to the village's curses—dried wells, barren crops, starvation, and stolen children—forcing
    Indiana Jones to accept the moral urgency of recovery
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_686d444c5ade
  global_id: null
  canonical_name: Mayapore Village Shabby Rug
  description: Villagers spread this worn, shabby rug on the dusty ground of Mayapore
    Village under a blood-red twilight sky. Indiana Jones, Willie Scott, Short Round,
    the chieftain, and shaman sit on it while sharing a meager meal of sparse rations.
    Its threadbare fabric underscores the community's starvation and desperation,
    as the group confronts the curse's toll during the shaman's prophecy.
  purpose: Communal seating mat for village meals
  significance: Embodies the village's impoverishment and suffering, amplifying the
    emotional stakes of the shaman's divine mandate and Indy's reluctant entanglement
    in their fate
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_084949d10cae
  global_id: null
  canonical_name: Mayapore Village Shrine Torches
  description: Villagers wield flaming torches to light the path to their empty shrine
    and spotlight the vacant niche where the Sivalinga once rested. Flames flicker
    against the twilight, casting eerie shadows over the gathered group—Indiana Jones
    probes the niche skeptically, Willie Scott stands unmoored by the desperation,
    Short Round absorbs the sorrow, while the Chieftain and Shaman press their prophetic
    claims. The torches heighten the ominous mood of curse and loss.
  purpose: Illuminate the village shrine and empty Sivalinga niche during the nighttime
    gathering
  significance: Amplify the eerie, supernatural atmosphere underscoring the village's
    curse from the stolen Sivalinga; draw the protagonists into the moral weight of
    the villagers' starvation, drought, and missing children
  potential_owner_mention: Mayapore villagers
  potential_owner_uuid: agent_90a394304083
- fabula_uuid: object_f945b5d17556
  global_id: null
  canonical_name: Mayapore Village Thatched Roof
  description: Outdoor communal shelter lacking walls, symbolizing the villagers'
    impoverishment and used as a setting for character interactions (e.g., the meager
    meal scene).
  purpose: Provides minimal overhead shelter during outdoor gatherings
  significance: Emphasizes the villagers' poverty and vulnerability, framing the protagonists'
    encounter with starvation and desperation under the blood-red sky
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_92641c35355d
  global_id: null
  canonical_name: Mayapore Village's Sacred Mound
  description: The Sacred Mound rises in Mayapore Village as the ancient repository
    for the Sankara Stone. The shaman kneels before its niche and slides the restored
    stone back into place during the village's celebration. Indiana Jones, Willie
    Scott, Short Round, and the chieftain stand witness as streams revive and crops
    green around it, confirming the curse's end.
  purpose: Houses the Sankara Stone in its sacred niche
  significance: Restoring the stone here reverses the Thuggee curse, revives barren
    land, and fulfills the prophecy of Indiana Jones's arrival as savior, healing
    the village and its children
  potential_owner_mention: Mayapore Village
  potential_owner_uuid: agent_90a394304083
- fabula_uuid: object_fc96c41d7d67
  global_id: null
  canonical_name: Mayapore Village's Scraggly Trees
  description: Twisted, barren trees line Mayapore village paths and rise above fleeing
    figures at night. Winds whip their sparse branches against the full moon, casting
    eerie shadows. Vultures perch among them by day, their presence amplifying decay
    amid dry wells and skeletal dogs. Indiana Jones, Short Round, Willie Scott, and
    villagers move past or beneath them, the trees heightening dread as silent witnesses
    to the cult's curse.
  purpose: ''
  significance: These trees manifest the village's suffocating horror, their scraggly
    forms and vulture companions foreshadowing stolen children and Thuggee depravity.
    They mark Mayapore as a threshold to Mola Ram's abyss, intensifying Short Round's
    unease and Willie's moral stirrings.
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_2388f8cf0014
  global_id: null
  canonical_name: Mayapore's Decrepit Village Huts
  description: Villagers inhabit these crumbling, dilapidated huts in Mayapore, their
    decayed walls and sagging roofs underscoring the village's desolation. The trio
    passes them upon arrival, where hollow stares from residents amplify the eerie
    silence left by stolen children. Skeletal dogs prowl nearby, vultures circle overhead,
    marking the huts as stark symbols of the cult's lingering horror.
  purpose: Shelter for Mayapore villagers
  significance: Huts embody the cult's destructive reach—physical proof of suffering
    from child abductions, heightening dread as the trio grasps the stakes before
    Pankot Palace.
  potential_owner_mention: villagers (Mayapore)
  potential_owner_uuid: agent_90a394304083
- fabula_uuid: object_b7d49713b4e9
  global_id: null
  canonical_name: Mayapore's Dying Fields
  description: The unseen figure crashes through these brittle, decayed fields en
    route to Mayapore village under cover of night. Withered stalks snap underfoot
    as heavy breathing and howling wind amplify the chaos. Parched earth crumbles,
    exposing roots starved by curse or drought, their desolation visible in disorienting
    POV shots that plunge viewers into primal flight.
  purpose: ''
  significance: These fields signal the Thuggee cult's blight on Mayapore, priming
    dread for the village's horrors and the heroes' arrival. Their decay blurs natural
    decay with supernatural terror, immersing the audience in the story's occult peril.
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_695a30ad4f3e
  global_id: null
  canonical_name: Medieval Painting of the Ark
  description: A medieval artwork depicting the Ark of the Covenant in a biblical
    battle, used by Indiana Jones during his lecture to illustrate its apocalyptic
    power. Distinct from the physical crate used to transport the Ark in the Nazi
    convoy.
  purpose: Visual aid to demonstrate the Ark of the Covenant's destructive capabilities
  significance: Escalates the briefing from academic discussion to global crisis,
    revealing the Ark as a biblical superweapon and foreshadowing the race against
    Nazis; cements Indy's expertise while exposing his ties to Ravenwood
  potential_owner_mention: Indiana Jones
  potential_owner_uuid: agent_9b8a52b10449
- fabula_uuid: object_eaf1b9477824
  global_id: null
  canonical_name: Messerschmitt Bf 109 Machine Gun Bullets
  description: The *projectiles* fired from the Messerschmitt fighters' machine guns
    during the strafing run, serving as the *immediate threat* that forces Indiana
    Jones and Henry Jones Sr. to dive for cover. The bullets rip through the earth,
    explode near the characters, and turn the field into a death trap.
  purpose: Ammunition to strafe and kill Indiana Jones and Henry Jones Sr.
  significance: The barrage forces father and son into cover, contrasting Indy's flippant
    'It happens to me all the time' with Henry's panicked 'Those people are trying
    to kill us!', exposing their fractured dynamic amid shared danger.
  potential_owner_mention: Messerschmitts
  potential_owner_uuid: null
- fabula_uuid: object_b6b87606df30
  global_id: null
  canonical_name: Metal Side Door (Reptile Car Lateral Escape Hatch)
  description: A sturdy **metal door at the end/side** of the Reptile Boxcar, serving
    as a **lateral emergency exit**. Indy pries it open after using the floor trap
    door, transitioning the chase from the reptile car to the next train segment.
    Its slamming shut **symbolically seals off the reptilian threat**, marking the
    end of the boxcar phase of the pursuit. This door is **distinct from the wooden
    floor hatch** and enables the second phase of Indy’s escape.
  purpose: Escape route from reptile boxcar
  significance: Propels Indy's survival through the circus train gauntlet, shifting
    from reptilian peril to human confrontations with Roscoe and Fedora, while underscoring
    his resourcefulness against compounded dangers.
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_8c466b3939bb
  global_id: null
  canonical_name: Military-Grade Nails Securing the Ark’s Crate Lid
  description: Fasteners specifically used to affix the wooden lid to the Ark’s crate
    during the sealing process in the U.S. government warehouse. Distinct from the
    lid itself, these nails are purely functional and do not share the lid’s symbolic
    or visual properties (e.g., stenciling, glow concealment).
  purpose: Fasten the lid of the wooden crate to conceal its contents
  significance: Reduce the Ark from divine relic to anonymous bureaucratic cargo,
    its power erased by indifferent wartime machinery and hidden in plain sight among
    countless crates
  potential_owner_mention: Little Old Government Warehouseman
  potential_owner_uuid: agent_c741f1db7efb
- fabula_uuid: object_5a4e87797a05
  global_id: null
  canonical_name: Mine Car Brake Pad
  description: Short Round grips the lever to engage this rusted metal pad, which
    scrapes fiercely against the spinning wheels to slow their runaway mine car amid
    Thuggee gunfire and tunnel hazards. Its screech echoes through the dim shafts
    as sparks fly. Later sabotage renders it useless, forcing Indy to dangle beneath
    and brake with his boots grinding the rims.
  purpose: Slow or stop the mine car by friction against its wheels
  significance: Its application buys time in the firefight; failure unleashes uncontrollable
    speed, heightens chase desperation, and forces Indy's body-risking improvisation
    amid tidal wave pursuit
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_aa14d7e32ba9
  global_id: null
  canonical_name: Mine Cars (Nazi Expedition)
  description: 'Rattling metal carts on rails used by the Nazi expedition to transport
    the Ark of the Covenant through the narrow, lantern-lit train tunnel. Low clearance
    forces occupants (including Shliemann and Belloq) to duck under support beams
    as they ride amid claustrophobic confines. The mine cars serve two distinct but
    connected narrative functions: (1) transporting the Ark toward its ritual opening
    (as seen in the tunnel scene with Belloq and Shliemann), and (2) pursuing Indiana
    Jones and Marion Ravenwood through the tunnel (as seen in the chase scene where
    Shliemann''s mine car is destroyed by a fireball). The slow progress and confined
    space amplify tension during disputes and chases.'
  purpose: Pursuit vehicle during high-speed mine tunnel chase
  significance: Tool of Nazi aggression destroyed by the Ark's unleashed power, highlighting
    their fatal overreach and the artifact's wrath
  potential_owner_mention: Dr. Shliemann
  potential_owner_uuid: null
- fabula_uuid: object_96def1c5ed03
  global_id: null
  canonical_name: Mine Tunnel (Nazi Island Stronghold)
  description: Broad underground passage system in the Nazi island base, serving as
    a munitions storage and access point. Becomes the epicenter of the Ark's destructive
    power, triggering explosions that collapse the stronghold.
  purpose: Underground passage for munitions storage and access in the Nazi island
    base
  significance: Marks the precise origin of the Ark's uncontrollable destructive force,
    channeling apocalyptic explosions that obliterate the Nazi operation and affirm
    the artifact's terrifying power beyond human control.
  potential_owner_mention: Belloq
  potential_owner_uuid: agent_0b2049c8bad4
- fabula_uuid: object_011c1db2b783
  global_id: null
  canonical_name: Mine Tunnel Low Cross Beams
  description: Structural wooden beams lining the ceiling of the Mine Tunnel, intentionally
    placed low to disrupt Nazi pursuers' movement and aim during the mine car chase
    sequence.
  purpose: Provide structural support while creating obstacles that disrupt movement
    and gunfire in the confined tunnel during the chase.
  significance: Tunnel low cross beams turn the pursuit into chaos for the Nazis,
    buying Indy and Marion precious seconds to escape the inferno and collapsing tunnel,
    amplifying the Ark's wrath through environmental peril.
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_8a9246885f06
  global_id: null
  canonical_name: Mine Tunnel Wooden Support Beams (Temple of Doom)
  description: Rough-hewn wooden beams in the claustrophobic mine tunnels of the Thuggee
    temple, used as tactical cover during Indy’s escape. Distinct from steel train
    tunnel beams in Raiders of the Lost Ark.
  purpose: Support tunnel ceilings; compel ducking to avoid decapitation during high-speed
    transit
  significance: Amplify escape tension by enabling Indy's tactical shots against pursuers,
    who misjudge the hazards; underscore physics-driven survival and team's coordination
    under pressure
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_b31aed7204dc
  global_id: null
  canonical_name: Missing Grail Diary Pages (Canyon of the Crescent Moon Map)
  description: Torn sheets from Henry Jones Sr.'s Grail Diary containing **intricate
    drawings and directions** to the **Canyon of the Crescent Moon**, distinct from
    the Venetian Library sketch. Physically removed by Indiana Jones and passed to
    Marcus Brody, triggering a subplot involving Walter Donovan and Elsa Schneider.
  purpose: Provides exact map and directions to the Canyon of the Crescent Moon, the
    Holy Grail's hiding place
  significance: Indy's safeguard thwarts Nazi pursuit, sparks Donovan's rage and Elsa's
    insight, exposes betrayal, and endangers Brody—turning a family rift into a race
    against time
  potential_owner_mention: Marcus Brody
  potential_owner_uuid: agent_10a98fa6b4d3
- fabula_uuid: object_80822fee3f30
  global_id: null
  canonical_name: Mola Ram's Dagger
  description: Mola Ram grips this dagger tightly as he advances across the rope bridge
    toward Willie Scott and Short Round, its blade poised to strike and trap them
    between the weapon's edge and the gorge's abyss. Indiana Jones spots the glinting
    threat from the bridge's center, fueling his desperate decision to cut the ropes.
    The dagger embodies the High Priest's immediate menace in the standoff.
  purpose: Weapon for threatening and killing enemies
  significance: Escalates the bridge climax by placing Willie and Short Round in direct
    peril from Mola Ram, forcing Indiana Jones to sever the ropes and plunge the Thuggee
    forces into chaos.
  potential_owner_mention: Mola Ram
  potential_owner_uuid: agent_a38c0a48f398
- fabula_uuid: object_cbe294bf0989
  global_id: null
  canonical_name: Mola Ram’s Thuggee Guards’ Pistols
  description: Firearms used by Mola Ram’s guards during the quarry cavern mine car
    chase. Actively fired at Indiana Jones and his companions; one pistol is seized
    by Indy for self-defense.
  purpose: Firearm to shoot at escaping prisoners
  significance: Guards' volley intensifies the deadly pursuit after the voodoo ordeal
    and Thuggee giant fight, forcing Indiana Jones to capture a pistol and counterattack,
    which buys the trio precious seconds in their gambit down the wrong tunnel.
  potential_owner_mention: Mola Ram's guards
  potential_owner_uuid: null
- fabula_uuid: object_bddd2e7b6347
  global_id: null
  canonical_name: Mongolian Thug's Mauser Pistol
  description: A standard-issue Nazi Mauser semi-automatic pistol wielded by the Mongolian
    thug during the chaotic firefight in the burning Raven saloon. The thug revives
    amid the flames, draws the weapon, and attempts to target Indiana Jones or Marion
    Ravenwood, but is fatally shot by Marion before firing a single round. This compact
    sidearm, characteristic of Nazi-issued firearms, serves as a symbol of the thug's
    violent intent and the escalating danger of the scene. The pistol remains unused
    in his lifeless grip as the saloon collapses around him.
  purpose: Firearm for close-quarters combat
  significance: Escalates the saloon brawl's peril; Marion's fatal shot neutralizes
    the threat it poses, highlighting her marksmanship and decisive role in securing
    their escape with the medallion.
  potential_owner_mention: Mongolian
  potential_owner_uuid: agent_57a51c07b161
- fabula_uuid: object_191d992b99b8
  global_id: null
  canonical_name: Mongolian Thug’s Submachine Gun (and Second Nazi’s Submachine Gun)
  description: Compact submachine guns carried into The Raven saloon by the Mongolian
    thug and a Second Nazi. The Mongolian’s gun is wrestled by Marion Ravenwood and
    used to collapse the ceiling during the firefight, while the Second Nazi’s gun
    remains unused. Both guns are destroyed in the saloon’s collapse, contributing
    to the destruction of Marion’s livelihood and catalyzing her alliance with Indiana
    Jones. The Mongolian’s gun is explicitly described as a submachine gun used in
    close-quarters combat, while the Second Nazi’s gun is mentioned but not used.
  purpose: Firing rapid bursts of bullets to target enemies in close-quarters combat
  significance: Marion wields it to reverse the fight's momentum, downing the ceiling
    on Belzig's men and securing escape with Indy. The act reveals her fighting skill
    and cements her as his partner against the Nazis.
  potential_owner_mention: Mongolian
  potential_owner_uuid: agent_57a51c07b161
- fabula_uuid: object_97777f7c65b4
  global_id: null
  canonical_name: Mountain Temple Grecian Facade
  description: Indiana Jones, Henry Jones Sr., Sallah, Marcus Brody, and Elsa Schneider
    emerge through the Mountain Temple's Grecian facade after escaping the collapsing
    interior. Dust and smoke billow from the opening as the group steps into afternoon
    sunlight. The carved stone front stands as the threshold between deadly traps
    inside and open air outside, framing their survival.
  purpose: Serves as exit point and architectural transition from temple interior
    to exterior world
  significance: Backdrops the cathartic aftermath of escape, where Henry Sr. teases
    Indy's full name ('Henry Jones, Junior'), Sallah laughs, and Brody urges departure—reinforcing
    group bonds amid rumbling collapse
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_891cd9d6fece
  global_id: null
  canonical_name: Mountainside Rocky Ground
  description: Part of the mountainside descent sequence after the raft crossing,
    where the group transitions from water to land amid violent jolts—distinct from
    the later cliffside escape.
  purpose: ''
  significance: Amplifies peril in the raft's white-knuckle plunge, testing Indy's
    steering reflexes and the trio's grip as passengers endure relentless shaking,
    forging reluctant trust through shared survival strain.
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_37357c28a03a
