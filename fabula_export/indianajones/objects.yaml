  description: The door behind the bar in The Raven Saloon slams open with force,
    announcing Marion Ravenwood's arrival during a night of tense reunions and barbs
    with Indy. Mahdlo, Sherpa, and Climber witness the dramatic entrance alongside
    the front door's use to herd patrons out amid rising chaos. Indy passes through
    these entrances during negotiations over the medallion, marking the saloon's thresholds
    as sites of conflict and departure.
  purpose: Serves as entrance and exit for the bar area
  significance: Heights the scene's drama as Marion bursts in and patrons flee, framing
    personal stakes between Indy and Marion while escalating threats from intruders,
    turning the saloon into a contested intimate space.
