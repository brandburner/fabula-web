    the ceiling fan, artifacts, and characters such as the Thuggee cult.
  purpose: Lair and seat of power for the Thuggee cult
  significance: Marks pivot from jungle chaos to ordered menace; harbinger of Thuggee
    horrors that Indy knows from study, Willie senses instinctively, and Short Round
    glimpses ahead of their approach
  potential_owner_mention: Thuggee cult
  potential_owner_uuid: null
- fabula_uuid: object_2004cede1854
  global_id: null
  canonical_name: Pankot Palace Approach Complex
  description: |-
    A multi-component approach system to Pankot Palace, including:
          1) A steep, uneven rock-paved road serving as the final obstacle before reaching the palace, designed to drain protagonists' physical and emotional reserves.
          2) A towering stone boundary wall marking the physical/visual transition from jungle to palace grounds, functioning as a narrative threshold.
          The complex symbolizes the transition from external chaos (jungle) to the ordered menace of the Thuggee cult's lair, with the road amplifying exhaustion and the wall marking the final barrier before the palace's horrors.
  purpose: Demarcates the boundary between outer approach road and palace grounds,
    serving as a visual and physical barrier.
  significance: Anchors the narrative threshold to Pankot Palace, evoking Willie's
    awe amid exhaustion and signaling duality of grandeur over hidden horrors; amplifies
    shift in group dynamics from conflict to fragile care.
