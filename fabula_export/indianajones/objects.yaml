  global_id: ger_object_f13f2178cc1b
  canonical_name: Belloq's Model Mosaic Baseline
  description: A precise mosaic pattern marks the baseline on Belloq's detailed scale
    model of the map room area. Indy leans close to examine it, tracking sunlight's
    slow slide across the miniature tiles and structures. The etched lines align with
    a red-painted marker and taut white tape stretching to a tiny building, revealing
    the Nazis' exact calculations for the staff placement.
  purpose: Aligns the staff's headpiece with sunlight beams to pinpoint the Ark's
    location on the scale model
  significance: Confirms Belloq and the Nazis solved the map room puzzle ahead of
    Indy, heightening his urgency to reach Tanis first and raising the stakes in the
    race for the Ark
