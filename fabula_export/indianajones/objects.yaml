  description: Strategically positioned by Omar’s resistance to conceal the stolen
    truck and block the garage door, serving as a recurring misdirection tactic against
    Nazi occupiers.
  purpose: Misdirection props that conceal the truck’s arrival and garage by creating
    a bustling market illusion.
  significance: Thwarts Nazi pursuit, buys time for the Ark’s hiding, and showcases
