  description: Sturdy wooden chair seized by Indy from the floor of The Raven during
    the brutal brawl. He smashes it over the Giant Sherpa's head to fell the hulking
    attacker amid gunfire and flames. Burning amid the inferno of toppled tables and
    falling beams, another or the same scatters as hazard; Marion kicks it aside to
    plunge hand into ashes and reclaim the searing sun medallion.
  purpose: Improvised weapon to disable attackers; burning debris navigated during
    escape
  significance: Turns bar furniture into tool of survival, neutralizing the Giant
    Sherpa so Indy aids Marion's medallion recovery. Fuels chaotic flight from the
    collapsing tavern, forging their tense partnership with shared stakes in the artifact.
