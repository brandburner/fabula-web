  description: Indiana Jones pulls the frayed piece of cloth from Mayapore from his
    pocket and holds it against the Sanskrit inscription on the tunnel wall behind
    the Ganesha statue. The cloth displays a matching image of Shiva Sankara and the
    same inscription, its worn fabric stark against the carved stone. Short Round
    peers close while Willie stands frozen, the fragment bridging the village's curses
    to the palace's hidden Thuggee threat.
  purpose: Reference for comparing Sanskrit inscriptions and images
  significance: Confirms Thuggee cult's link to Mayapore's droughts and child thefts,
