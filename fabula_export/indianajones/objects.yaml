    Well of Souls chamber. The altar functions as the sanctuary and only safe ground
    amid thousands of writhing Egyptian asps (which never cross onto the platform)
    and holds quest-critical artifacts (stone chest / jeweled idol). Raiders (Indy
    and Sallah) reach it by crossing burning oil-and-torch paths while navigating
    temple traps, smoke, and fragile pillars.
  purpose: Holds quest-critical artifacts like the jeweled idol; provides the secure,
    central destination for raiders navigating temple traps.
