  description: Plush throne cushion positions General Tengtu Hok at the center of
    his palace tea room, where he sits enthroned amid ceremonial service to three
    German officers. He crushes and devours handfuls of tiny exotic delicacies with
    predatory satisfaction, his elevated seat reinforcing dominance as the short display
    captures his excess against Indy's distant urgency.
  purpose: Elevates the host above guests to project authority during formal gatherings
  significance: Underlines Tengtu Hok's entitlement and hubris, providing a decadent
