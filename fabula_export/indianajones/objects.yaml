  description: Man-made ancient stone spiral staircase concealed beneath a secret
    room’s floor, designed as a weight-triggered trap (activated by Henry sitting
    in an ornate chair). Serves as a hidden descent route to lower chambers, later
    used by Nazis in pursuit. Unlike natural hazards, this is a deliberate mechanical
    puzzle tied to the Grail’s protection.
  purpose: Connects upper secret room to lower chambers as a hidden descent route
    activated by weight on the trigger chair
  significance: Exposes Indy and Henry's clashing approaches—action versus thought—through
