  description: Sturdy brass stand (cordon holder) located under the stained-glass
    window in the Venice Library. Indiana Jones uses it as an improvised tool to time
    and mask the sound of smashing an X-marked floor tile, synchronizing the strike
    with the Librarian's book stamp. The metallic clink blends into the ambient noise,
    concealing the break that reveals a hidden passage below. Brody and Elsa witness
    the action as the shattered tile exposes a dark void, confirming the entrance
    to a hidden tomb amid Crusader columns.
  purpose: Improvised tool to break the concealed floor tile
  significance: Unlocks access to the Grail Knight's tomb, shattering Indy's assumptions
