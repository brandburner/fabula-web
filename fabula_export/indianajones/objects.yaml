    crowded dining room, crumbs falling amid childish chaos from his nine children.
    This simple, fresh household staple props up the animal's casual presence; Indy,
    Marion, Sallah, and Fayah watch as the monkey's antics disarm tension after it
    bows to Marion and kisses her cheek.
