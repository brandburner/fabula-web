  global_id: ger_object_cbed64a61ba6
  canonical_name: Halfbreed and Rough Rider's Bullet
  description: A single bullet fires from inside the reptile car during daylight.
    Halfbreed and Rough Rider discharge it to strike the wooden trap door. The impact
    detonates the door in a spray of splinters, propelling the captives outward into
    open air. They hurry free, their sudden emergence shattering containment and sparking
    chaos.
  purpose: Detonate wooden trap door to break out of reptile car
  significance: Triggers escape that flips tension into violent momentum, turning
    captives into threats and driving pursuit
  potential_owner_mention: Halfbreed and Rough Rider
