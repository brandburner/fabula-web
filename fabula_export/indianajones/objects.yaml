  canonical_name: Blue Airplane Wheel Chocks
  description: Blue wooden blocks (wheel chocks) placed under the tires of the Nazi
    flying wing plane to hold it steady during refueling at the Tanis airstrip. German
    mechanics initially position them around the landing gear. Marion Ravenwood grabs
    one and uses it to violently strike the pilot's head, knocking him unconscious.
    His body slumps onto the throttle, causing the plane to lurch forward and triggering
    a chain reaction of chaos. Additionally, other chocks are used to prop open the
    cockpit canopy, which later slams shut, trapping Marion inside. The chocks serve
    their intended purpose of stabilizing the aircraft during refueling but are repurposed
    as an improvised weapon and structural tool in the unfolding disaster.
  purpose: Blocking aircraft tires to prevent movement during fueling and propping
    open the cockpit canopy
  significance: Marion wields one as an improvised weapon to disable the pilot, sparking
    the cockpit struggle that leads to her entrapment as the plane lurches forward,
    heightening the airfield brawl's desperation
  potential_owner_mention: German Mechanics
  potential_owner_uuid: null
