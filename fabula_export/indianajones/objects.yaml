- fabula_uuid: ger_object_5004ddf9b395
  global_id: ger_object_5004ddf9b395
  canonical_name: Indiana Jones' Poisoned Champagne Glass (Containing White Powder
    Poison)
  description: Clear crystal champagne flute used during tense negotiations between
    Indiana Jones and Lao Che in Shanghai's opulent nightclub ballroom. Chen secretly
    slips white powder poison into the glass while Indy is distracted. The poison
    dissolves unseen into the champagne, which Indy consumes during a toast. The poison
    activates rapidly, causing heavy sweats and tremors in Indy as Lao Che exposes
    the betrayal and demands Nurhachi's urn for the antidote. The glass serves as
    both a drinking vessel and a critical plot device revealing Chen's treachery.
    Key visual details include chandelier light glinting off the crystal, and Short
    Round observing from hiding as chaos erupts around the betrayal. Willie Scott
    later spills the remaining liquid to limit further exposure, though the damage
    is already done. The glass is central to the betrayal that ignites violence after
    Wu Han's death and forces Indy into desperate survival amid gunfire and grief.
  purpose: Drinking vessel for champagne during banquet negotiations
  significance: Delivers poison to Indiana Jones, sparking his realization of betrayal,
    reversing the negotiation's power balance, igniting ballroom violence, and fueling
    his vengeance after Wu Han's death.
  potential_owner_mention: Indiana Jones
