- fabula_uuid: ger_object_3b74eedaad01
  global_id: ger_object_3b74eedaad01
  canonical_name: Ganesha Statue in Willie's Suite (Hidden Passage Entrance)
  description: A Ganesha statue occupying a niche on the wall in Willie Scott's suite
    at Pankot Palace. The statue conceals a hidden passage behind it, which slides
    open after Indiana Jones investigates a vanishing insect. The passage reveals
    a dark, narrow tunnel entrance with a crunching floor swarming with insects, leading
    downward to a Sanskrit inscription on the wall—'Follow in the footsteps of Shiva.
    Do not betray his truth.'—before opening into a trap-filled chamber. Willie Scott's
    terrified scream from a grotesque bug crawling on her draws attention to the anomaly,
    prompting Indy's discovery. The panel slams shut behind them, sealing the trio
    from escape and thrusting Indy and Short Round into the cult's insect-swarmed
    trap. The statue bears the same inscription as the Mayapore boy's clue, confirming
    the Thuggee cult's infiltration of the palace.
  purpose: Conceals entrance to secret Thuggee cult tunnel; lifting activates hidden
    panel
  significance: Exposes cult's infiltration into palace sanctuary; inscription confirms
    broader conspiracy and propels Indiana and Short Round into inescapable descent,
    fracturing team dynamics as obsession overrides caution
  potential_owner_mention: ''
  potential_owner_uuid: null
