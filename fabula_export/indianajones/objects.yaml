  description: Enemy fighter plane dives on the DC-3 during aerial pursuit. Short
    Round fires an improvised machine gun from the cargo hold with Willie's help.
    Bullets rip into the fighter; it trails smoke, veers wildly off course, and explodes
    mid-air. Pilots Willie and Short Round witness the hit amid cabin chaos.
  purpose: Pursues and attacks the protagonists' DC-3 aircraft as antagonist vehicle.
  significance: Short Round and Willie's shot destroys it for brief triumph, but the
    swivel fire then shreds their own engine, detonating it and plunging the group
    into catastrophe.
