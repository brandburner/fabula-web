  canonical_name: Wurrfler Captain's Cigarette
  description: The Wurrfler Captain lights this cigarette while leaning against the
    periscope in the sub's docking bay turret, eyes on the Ark unloading below. Flame
    flares briefly as Nazis bustle nearby with Belloq, Shliemann, and Marion disembarking.
    Indy dangles silently above, whip coiled tight around the periscope—seconds from
    exposure as the captain exhales smoke into the humid air, oblivious to the stowaway's
    tension.
  purpose: Provides casual smoke break amid watch duty
  significance: Heightens suspense; captain's lean and light nearly reveals Indy's
    hidden whip, marking razor-edge evasion in Nazi sub base infiltration
