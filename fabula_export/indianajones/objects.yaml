- fabula_uuid: ger_object_63929966ba84
  global_id: ger_object_63929966ba84
  canonical_name: Indiana Jones's Revolver
  description: "\n  Indiana Jones's signature revolver, a critical tool in his confrontations\
    \ with Nazi forces. The weapon appears in multiple high-stakes scenarios:\n  1.\
    \ **Castle Brunwald Hallway**: Clutched with a vise-like grip in shadowed corridors,\
    \ symbolizing Indy's readiness for sudden violence amid distant soldier chatter.\n\
    \  2. **Desert Pursuit**: Fired at Vogel and German soldiers during a galloping\
    \ chase after a Nazi tank, though bullets run out mid-exchange, forcing Indy to\
    \ abandon the gun and transition to hand-to-hand combat.\n  3. **Mediterranean\
    \ Beach**: Snapped open to reveal empty cylinders, leaving Indy defenseless against\
    \ a strafing Messerschmitt.\n\n  The revolver's recurring failure (running out\
    \ of ammunition at critical moments) underscores its narrative role as a flawed\
    \ but iconic tool, often forcing Indy to rely on improvisation and physical combat.\n\
    \  "
  purpose: Handheld firearm for close-range defense and confrontation
  significance: Amplifies tension during castle infiltration as Indy's primary weapon
    against Nazis; its sudden uselessness on the beach strips firepower, compelling
    Henry Jones Sr.'s improvised bird distraction and deepening their father-son alliance.
  potential_owner_mention: Indiana Jones
