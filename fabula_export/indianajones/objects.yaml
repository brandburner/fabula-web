- fabula_uuid: object_9db977b0618d
  global_id: null
  canonical_name: Pankot Palace Spike Chamber
  description: "\n  A deadly trap system within Pankot Palace designed to crush intruders\
    \ through inward-moving spiked walls and ceiling, combined with swarming insects\
    \ and viscous slime. The chamber features:\n  - **Claustrophobic, mucus-filled\
    \ insect hole**: A revolting opening in the tunnel walls where oozing mucus coats\
    \ squirming insects. This hole conceals a release lever (fulcrum mechanism) that\
    \ halts the spike chamber's crushing walls. Willie Scott's desperate act of thrusting\
    \ her hand into this hole—despite the insects crawling over her skin—triggers\
    \ the lever, saving Indiana Jones, Short Round, and herself from impalement.\n\
    \  - **Mechanical trap**: The spike chamber's walls and ceiling close inward,\
    \ forcing victims into the insect hole or the adjacent wind tunnel overlook as\
    \ their only escape routes.\n  - **Narrative function**: Serves as a high-stakes\
    \ obstacle in the Pankot Palace tunnels, linking the underground labyrinth to\
    \ the Temple of Death above. The trap's design reflects the palace's lethal defenses,\
    \ blending biological horror (insects/slime) with mechanical brutality (spikes).\n\
    \  "
  purpose: Trap and kill intruders through inward-moving spiked walls and ceiling
    combined with insect swarms and viscous slime
  significance: Near-death ordeal heightens the trio's vulnerability upon witnessing
    the Thuggee human sacrifice ritual, propelling Indiana Jones toward obsession
    with the Sankara Stones and marking their plunge into the cult's deadly core
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_bd4b5ac5be71
  global_id: null
  canonical_name: Pankot Palace Spike Chamber Entrance Door
  description: Permanent, heavy-duty door mechanism designed to seal victims inside
    the spike chamber. Operated via an external fulcrum release lever, highlighting
    Thuggee engineering. Central to the group's escape sequence and Willie Scott's
    emotional arc.
  purpose: Seal victims inside spike chamber; unlock via external fulcrum release
    lever
  significance: Forces Willie Scott past her phobias to rescue the group, exposing
    tensions in her relationship with Indy. Marks a narrow escape that propels them
    deeper into cult territory, emphasizing mechanical traps over brute force.
  potential_owner_mention: ''
  potential_owner_uuid: null
- fabula_uuid: object_8e12cd1d6c24
  global_id: null
