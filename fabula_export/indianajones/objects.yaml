- fabula_uuid: ger_object_46068c7ca635
  global_id: ger_object_46068c7ca635
  canonical_name: Indy's Cigarette Lighter
  description: Indy snaps open his compact metal lighter and sparks its flame to ignite
    a petroleum-soaked femur bone, fashioning an improvised torch that cuts through
    the pitch-black catacombs. He wields the lighter repeatedly to relight the torch
    amid dripping water and rat squeals, sharing its glow with Elsa as they navigate
    flooded passages and evade pursuing flames. The tiny device proves indispensable
    in the oil-slicked darkness.
  purpose: Ignition tool to light improvised torches from petroleum and bone
  significance: Accidentally sparks a room-filling fire that distracts captors and
    propels Indy and Henry's chair-bound escape, shifting desperate captivity into
    improvised survival.
  potential_owner_mention: Indiana Jones
