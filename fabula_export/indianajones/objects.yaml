    gorge, spanning sheer cliffs as the sole escape from pursuing Thuggee cultists.
    Indiana Jones spots it first and shouts for Willie Scott and Short Round to climb
    toward safety. Short Round tests its creaking stability before it becomes a trap:
    Indy severs the support ropes with his sword during battle with Mola Ram and guards,
    collapsing the span. The trio clings to dangling sections amid plummeting enemies,
    rocks, and flaming arrows.'
  purpose: Crosses the gorge as escape route between cliffs; doubles as battleground
    in standoff
  significance: Tests trio's interdependence amid vertigo, fear, and overconfidence;
    climactic site where Indy gambles lives to defeat Mola Ram, reclaim Sankara Stone,
    and end cult threat
