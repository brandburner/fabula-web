  global_id: null
  canonical_name: Omar's Bazaar Camouflage System
  description: Tactical camouflage system deployed in Omar's Cairo square garage to
    conceal Indy's truck from Nazi forces. Includes a heavy garage door that crashes
    shut to block pursuit, combined with tents, fruit carts, and sweeping boys erasing
    tire tracks to create a bazaar mirage. Enables the deception that preserves Indy's
    lead in the Ark chase and highlights Omar's resistance network efficiency against
    Nazi forces.
  purpose: Conceals Indy's truck and garage entrance from pursuing Nazis
  significance: Triggers the bazaar mirage deception that thwarts the Nazis, highlights
    Omar's resistance network efficiency, and extends Indy's escape in the Ark pursuit
  potential_owner_mention: Omar
  potential_owner_uuid: agent_591f63e8f6ec
- fabula_uuid: object_48e67b094fd5
  global_id: null
  canonical_name: Omar's Men's Digging Tools
  description: Indiana Jones, Sallah, and Omar's men use heavy digging tools (pickaxes
    and shovels) to excavate the Well of the Souls in the desert. The tools are wielded
    with desperate force under moonlit skies, breaking up packed earth as workers
    sweat and blister, creating a deepening pit toward the buried Ark of the Covenant.
    The tools are essential to the frantic race against time as the team battles exhaustion
    and the looming Nazi threat.
  purpose: Break up and excavate hard-packed desert sand during the nighttime dig
  significance: Drive the frantic physical labor of the race against Nazi excavators,
    embodying exhaustion and human resolve as Indy pushes his team to unearth the
    Ark before dawn
  potential_owner_mention: Omar's men
  potential_owner_uuid: agent_f655be10ff95
