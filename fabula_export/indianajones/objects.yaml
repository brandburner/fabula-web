  global_id: null
  canonical_name: Omar’s Sweeping Boys’ Brooms
  description: Coarse straw brooms clutched by young Arab boys loyal to Omar. They
    sprint across the dusty square, sweeping in frantic strokes to obliterate tire
    tracks from Indiana Jones’ stolen truck. Their quick work erases all signs of
    the chase just as Belloq, Shliemann, and the Nazis screech into view.
  purpose: Sweeping away tire tracks to hide evidence of the truck
  significance: Critical instruments in Omar’s resistance network’s instant bazaar
