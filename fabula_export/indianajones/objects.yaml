  canonical_name: Pleasure Garden Whip Target Candle
  description: A servant lights this candle in the lantern-lit Pleasure Garden at
    night, positioning its steady flame as a precise target. Indiana Jones snaps his
    bullwhip at it with a sharp crack, extinguishing the light in a display of skill
    that captivates Maharajah Zalim Singh, Short Round, Capt. Blumburtt, and Chattar
    Lal. The act underscores Indy's control amid rising tension.
  purpose: Target for Indiana Jones's bullwhip demonstration
