  description: The Maharajah clutches the small clay doll modeled after Indiana Jones
    on the quarry balcony. He stabs its torso with a sapphire-tipped turban pin, forcing
    Indy to convulse in pain below amid the chaos. Short Round climbs the bucket chain,
    snatches the doll, and pierces it with the same pin, snapping the magic and restoring
    Indy's control.
  purpose: Inflict remote pain and exert magical control over Indiana Jones through
    sympathetic stabbing
  significance: Breaks Kali’s hypnotic spell on Indiana Jones, freeing him to defeat
    the Thuggee giant and launch the group's mine cart escape; symbolizes the cult's
    crumbling supernatural dominance and Short Round's pivotal heroism
