- fabula_uuid: ger_object_fbebf2c99a42
  global_id: ger_object_fbebf2c99a42
  canonical_name: Grail Tablet Rubbing (Catacombs)
  description: A paper rubbing created by Indiana Jones in the catacombs, used to
    reproduce missing inscriptions from the Grail Tablet by pressing it against a
    knight's shield engraving. Critical for solving the Grail's puzzle amid life-threatening
    peril.
  purpose: Reference for comparing and completing Grail Tablet inscriptions against
    physical markers like the knight's shield
  significance: Confirms the shield as the quest's second marker, linking Henry's
    research to live discoveries amid escalating perils from Kazim's ambush and inferno
  potential_owner_mention: Indiana Jones
