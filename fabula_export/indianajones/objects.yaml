    pursuit in Raiders of the Lost Ark. Fired from blowguns or launched through foliage
    during Indy’s flight/fleeing sequence (after the idol is taken), these fast-moving
    projectiles whistle past him and force evasive maneuvers amid spears and arrows,
    increasing the immediacy and danger of the tribal attack.
