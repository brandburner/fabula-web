- fabula_uuid: ger_object_78bb93eaaa5b
  global_id: ger_object_78bb93eaaa5b
  canonical_name: Indy's Bathrobe
  description: Indy wears this loose bathrobe in the Venice apartment after the flooded
    tomb escape. Damp fabric clings slightly as he huddles with Brody over the water-soaked
    Grail Knight’s shield rubbing. He tucks the deciphered map—revealing Alexandretta
    as the path to the Canyon of the Crescent Moon—into its pocket, securing the clue
    while dispatching Brody to Sallah.
  purpose: Container for safeguarding maps and clues
  significance: Holds the critical shield rubbing that pinpoints the Grail’s location,
    enabling Indy to split the team and pursue Henry amid Nazi pursuit.
  potential_owner_mention: Indiana Jones
