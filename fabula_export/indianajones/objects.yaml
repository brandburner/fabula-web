  canonical_name: Venice Boat Landing
  description: Indy and Brody step off their boat onto the sunlit Venice boat landing,
    a stone or wooden pier extending into the canal. Dr. Elsa Schneider approaches
    with a firm handshake for Brody and flirtatious grin for Indy, while gondoliers
    stand nearby amid the lapping water and distant calls. The landing anchors their
    arrival, where Elsa drops Henry Jones's name and sparks Indy's first doubts.
  purpose: Disembarkation point for boats arriving in Venice canals
  significance: Marks Indy and Brody's entry into Venice, site of Elsa Schneider's
    introduction and first deception about her knowledge of Henry Jones, cracking
    Indy's confidence
