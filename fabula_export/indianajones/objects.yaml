  description: Steel-linked treads churn relentlessly on the Nazi tank barreling toward
    a cliff, forming a lethal grinding surface. Arnold Vogel hurls Henry Jones Sr.
    onto them, dragging the older man toward doom as the motion pulls him across the
    links. Indiana Jones snags Henry's ankle with his whip to halt the slide, while
    Sallah reaches from alongside to aid the rescue amid the chaos.
