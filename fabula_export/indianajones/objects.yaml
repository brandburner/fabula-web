  canonical_name: Heavy Hanging Lamp in Nazi Rhino Boxcar (Last Crusade)
  description: A sturdy, industrial-grade hanging lamp in a Nazi rhino boxcar during
    *Indiana Jones and the Last Crusade* (1938). Dislodged by Indiana Jones, it shatters
    on a black rhinoceros, triggering a destructive rampage. Unlike the lamp in Sallah's
    truck, this fixture is part of a Nazi transport vehicle and serves as a plot device
    for chaos rather than levity.
  purpose: Overhead lighting for the boxcar interior
  significance: Triggers rhinoceros rampage during Indy's desperate fight, redirecting
    animal fury from Nazis toward destruction that aids his survival in the high-stakes
    chase.
