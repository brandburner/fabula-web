- fabula_uuid: ger_object_112427f38b0a
  global_id: ger_object_112427f38b0a
  canonical_name: Group's Jungle Transport Elephants
  description: Massive elephants carry Indiana Jones, Short Round, and Willie through
    thick jungle foliage toward Pankot Palace. They lumber steadily, parting dense
    undergrowth with their bulk as Short Round shouts in excitement upon sighting
    the distant white palace, Indy confirms the destination, and Willie stares in
    awe.
  purpose: Transport characters through dense jungle terrain
  significance: Reveals Pankot Palace as next destination, shifts narrative from jungle
    survival to civilized confrontation, and highlights character contrasts through
    their reactions atop the mounts
  potential_owner_mention: ''
