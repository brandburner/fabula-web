  global_id: ger_object_b967a41eddcd
  canonical_name: Indiana Jones's Private Office Window to the Garden
  description: Indiana Jones slides this operable window open in his private office,
    steps through, and drops into the garden below. Students clamor outside as he
    escapes the academic mob delegated to Irene. The sash window, standard for university
    buildings, provides quick access outward, its frame marking the boundary between
    cluttered interior and green escape route.
  purpose: Exit point from private office to adjacent garden
  significance: Triggers Indy's departure from university chaos toward the Venice
    envelope's mystery, symbolizing his shift from professor handling student demands
    to Grail quest adventurer confronting his father's disappearance
