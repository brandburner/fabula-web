- fabula_uuid: ger_object_7816f40b2d23
  global_id: ger_object_7816f40b2d23
  canonical_name: Fedora's Vintage Automobile
  description: Fedora whistles sharply to summon this rugged vintage automobile, which
    a gang member—likely Rough Rider, Halfbreed, or Roscoe—drives at high speed along
    the cliffs. It carries the Man in the Panama Hat, whose olive-skinned hand grips
    the side. The car roars with screeching tires beside the vintage truck, closing
    in on Indiana Jones as he spurs his horse to escape. Its presence turns a foot
    chase into a mechanized pursuit, engines thundering against thundering hooves.
  purpose: Pursue and capture Indiana Jones during his escape with the Cross of Coronado
  significance: Transforms Indy's solitary horseback flight into a high-stakes vehicular
    chase, amplifying the gang's threat and forcing him toward the railroad tracks.
    Embodies Fedora's command over reinforcements, marking Indy's shift from boyish
    theft to adult peril.
  potential_owner_mention: Fedora
  potential_owner_uuid: ger_agent_0151c95abeaa
