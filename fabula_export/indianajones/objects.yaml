- fabula_uuid: ger_object_d62de7c0e5ec
  global_id: ger_object_d62de7c0e5ec
  canonical_name: Sankara Stones
  description: The Sankara Stones are a set of five sacred artifacts, each containing
    a diamond core, that glow with supernatural light after absorbing smoke from Thuggee
    human sacrifices in the Temple of Death. They are central to the Thuggee Cult's
    rituals, placed before Kali’s statue to channel dark energy. Indiana Jones steals
    them from the altar during a ritual, but Mola Ram reclaims them. The stones are
    later recovered by Indy and Short Round, playing a pivotal role in defeating Mola
    Ram and restoring the Sankara Stone to Mayapore Village. The stones are also wrapped
    in cloth bundles during rituals, as seen in the Temple of Death.
  purpose: Absorb sacrificial smoke to glow and channel Kali's destructive power;
    uniting all five unleashes the goddess for world domination
  significance: Core MacGuffin propels Indy's quest from village retrieval and diamond
    greed to cult destruction and child liberation; pits rational adventure against
    supernatural fanaticism, forcing Indy to prioritize morality over treasure
