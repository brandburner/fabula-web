  global_id: null
  canonical_name: Chattar Lal's Fresh Clothes for Guests
  description: Offered during Chattar Lal’s deceptive hospitality at Pankot Palace;
    contrasts with the cult’s later violence at the Temple of Death.
  purpose: Replacement attire for guests during their palace stay
  significance: Marks the hosts' calculated hospitality, which conceals the palace
    as a Thuggee trap and foreshadows the evening's ambush in the Pleasure Pavilion
  potential_owner_mention: Chattar Lal
  potential_owner_uuid: agent_3c92549204ad
- fabula_uuid: object_aba4596fc606
  global_id: null
  canonical_name: Cheese and Bread (Sallah’s Late-Night Ark Discussion)
  description: Part of a late-night celebratory discussion about the Ark’s dimensions,
    where it is **contrasted with poisoned dates** that kill the monkey. Signals the
    shift from triumph to dread and foreshadows Nazi sabotage.
