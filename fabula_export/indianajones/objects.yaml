  description: Indiana Jones carries a small gold and enamel box holding the cremated
    remains of Emperor Nurhachi into Lao Che's Shanghai nightclub ballroom. He sets
    it on the negotiation table as trade for a diamond and later an antidote after
    Lao poisons his champagne. Wu Han lifts the lid to verify the ashes' authenticity
