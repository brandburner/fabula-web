  description: Walter Donovan's compact 1930s military-issue pistol, used to fatally
    wound Henry Jones Sr. in the Grail Temple. The weapon is a metallic sidearm that
    Donovan draws from his jacket to coerce Indiana Jones into retrieving the Holy
    Grail as the only means to save Henry's life. The pistol plays a critical role
    in the temple's climactic confrontation, where Donovan's desperate act forces
    Indy into the deadly trials while Sallah and Elsa Schneider stand by in shock.
