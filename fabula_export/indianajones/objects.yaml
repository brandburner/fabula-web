  description: The niche carved into Mayapore Village's sacred mound serves as the
    Sankara Stone's rightful resting place. The shaman kneels before it and ceremonially
    inserts the retrieved artifact, restoring the village's spiritual balance amid
    joyous reunions of families and children. Indiana Jones, Willie Scott, Short Round,
    and villagers witness the act that ends the curse's drought and famine.
  purpose: Holds the Sankara Stone in its designated sacred position
  significance: Marks the quest's climax by receiving the stone, breaking the Thuggee
    cult's curse, reviving the land, and enabling family reunions that counterpoint
    the adventure's horrors
