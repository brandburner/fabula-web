  global_id: ger_object_ff626abca14b
  canonical_name: Indy's Discarded Wooden Lumber
  description: Indiana Jones grabs a piece of wooden lumber from the quarry cavern
    floor during his desperate fight against the Thuggee giant. He assesses it as
    a potential improvised weapon while bound by the Maharajah's voodoo doll curse,
    gripping it tightly before discarding it for a larger piece. Short Round, Willie
    Scott, and the Maharajah witness the moment amid the chaos of cult pursuit and
    rock crusher rumble.
  purpose: Improvised weapon against the Thuggee giant
  significance: Highlights Indiana Jones's quick tactical thinking and resourcefulness
    in a life-or-death brawl, bridging his vulnerability under supernatural control
    to physical counterattack as Short Round frees him.
