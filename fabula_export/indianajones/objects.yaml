- fabula_uuid: ger_object_11108e4ffe27
  global_id: ger_object_11108e4ffe27
  canonical_name: Hand-Drawn Map of Nepal
  description: Hand-drawn map of Nepal rests under the dim seat lamp aboard the DC-3.
    Indiana Jones hunches over it next to Abner Ravenwood's journal article, his finger
    tracing routes as he plots the Ark's next lead. A trench-coated European spy watches
    intently from across the aisle, turning Indy's private study into a monitored
    ritual.
  purpose: Navigation aid and clue for plotting pursuit routes in the Ark search
  significance: Captures Indy's transformation of grief into action, exposes his vulnerability
    to surveillance, and sets stakes for the Nepal chase
  potential_owner_mention: Indiana Jones
