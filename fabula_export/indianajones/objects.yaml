  canonical_name: Stone Elephant Statues on Altar Column (Thuggee Temple Lava Chamber)
  description: Carved stone elephant statues perched atop a column *near the altar*
    in the Thuggee temple's lava chamber, serving as the *bullwhip anchor* for Indiana
    Jones' swing across the molten crevasse. Observed by Willie Scott and Short Round
    from the wind tunnel above.
  purpose: Anchor point for bullwhip to cross lava crevasse
  significance: Enables Indiana Jones to seize the glowing Sankara Stones from the
    altar, escalating his confrontation with Mola Ram and the Thuggee cult amid heart-ripping
    sacrifice.
