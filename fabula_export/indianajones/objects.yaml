  global_id: null
  canonical_name: Indiana Jones’ Improvised Trap Booth (Cairo Bazaar)
  description: A one-time tactical prop used by Indiana Jones to disable Nazi pursuers
    in the Cairo bazaar, not affiliated with Omar’s resistance network.
  purpose: Display and sale of cookware
  significance: Transforms from static vendor stall into improvised weapon during
    the bazaar ambush, enabling Indy to neutralize two attackers and aid his escape
