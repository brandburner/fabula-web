  canonical_name: Stained-Glass Window Depicting a Crusader Knight (Venetian Library
    Crusader Church)
  description: A prominent stained-glass window set high in the vaulted walls of the
    Venetian Library's repurposed Crusader church, depicting a Knight of the Crusades
    amid vibrant, colorful panes. The window contains Roman numerals III, VII, and
    X etched into its design, which align with entries from Henry Jones Sr.'s Grail
    Diary. Indy's discovery of these numerals—mirroring a sketch in his father's diary—triggers
    the realization that the library's architecture conceals an encoded map to the
    Grail Tomb below. The window serves as a critical visual clue, prompting Indy's
    urgent actions to expose the tomb. Elsa and Brody stand nearby during Indy's examination,
    while the librarian is also present in the scene.
  purpose: Delivers visual clues—knight image matching diary sketch, numerals decoding
    tomb location
  significance: Shatters Indy's Grail-as-book assumption, confirms hidden tomb in
    library, fuels Nazi race and father-son reconciliation drive
