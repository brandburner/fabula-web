    - fabula_uuid: ep_sea_ser_the_adventures_of_indiana_jone_s01_e02
      episode_number: 2
      title: Indiana Jones and the Temple of Doom
      logline: In 1935, adventurous archaeologist Indiana Jones, his young sidekick
        Short Round, and a glamorous nightclub singer, Willie Scott, find themselves
        battling a sinister cult beneath an Indian palace to recover a stolen artifact
        and rescue enslaved children.
      high_level_summary: "In Shanghai, 1935, Indiana Jones finds himself double-crossed\
        \ by Lao Che, a crime boss, after acquiring the ashes of Nurhachi. Poisoned\
        \ and desperate, Indy escapes with nightclub singer Willie Scott and a resourceful\
        \ orphan, Short Round, finding refuge on a cargo plane bound for Siam. However,\
        \ Lao Che's henchmen attack the plane, forcing Indy, Willie, and Short Round\
        \ to bail out, crash-landing in India.\n\nThey stumble upon Mayapore, a village\
        \ deprived of its sacred stone and its children abducted. Compelled by the\
        \ villagers' plight, Indy, Willie, and Short Round embark on a journey to\
        \ Pankot Palace, believed to be the source of the village's woes. Welcomed\
        \ by the seemingly hospitable Prime Minister Chattar Lal, they soon discover\
        \ dark secrets within the palace walls.\n\nA lavish dinner turns sinister\
        \ as Indy notices Thuggee artifacts and suspects foul play concerning the\
        \ Maharajah. Exploring hidden passages, they uncover a massive underground\
        \ temple where the Thuggee cult, led by Mola Ram, practices human sacrifice\
        \ and enslaves children to mine for Sankara Stones. They also witness enslaved\
        \ children. Mola Ram seeks to harness the stones' power to conquer the world.\
        \ Indy is captured and subjected to a dark ritual, brainwashing him into the\
        \ cult's service. \n\nWillie escapes and returns to rescue Indy, but finds\
        \ him hostile, due to the effects of the blood of Kali. But Short Round, through\
        \ courage and pain, manages to break Indy free from the cult's influence.\
        \ Indy, Willie, and Short Round escape, determined to thwart Mola Ram's plans\
        \ and free the enslaved children. A harrowing mine car chase ensues, culminating\
        \ in a confrontation on a rope bridge high above a deep gorge.\n\nAs the bridge\
        \ collapses, Indy battles Mola Ram, ultimately causing the High Priest to\
        \ fall to his death. Afterward, Short Round, Willie, and Indy return to Mayapore,\
        \ reuniting the children with their families and restoring hope to the devastated\
        \ village. With the sacred stone returned and the village revived, Indy, Willie,\
        \ and Short Round return to civilization, forever changed by the terrors they\
        \ faced in the Temple of Doom."
      dominant_tone: Darkly Hopeful
