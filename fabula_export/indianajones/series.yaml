    - fabula_uuid: ep_sea_ser_the_adventures_of_indiana_jone_s01_e03
      episode_number: 3
      title: Indiana Jones and the Last Crusade
      logline: When Indiana Jones's estranged father, a renowned Grail scholar, goes
        missing, Indy must team up with a mysterious woman to find him and stop the
        Nazis from obtaining the Holy Grail, risking their lives and relationship.
      high_level_summary: "In 1938, Indiana Jones, a seasoned archaeologist and professor,\
        \ finds himself caught in a race against the Nazis to locate the Holy Grail.\
        \ The adventure begins when Walter Donovan, a wealthy art collector, informs\
        \ Indy that his father, Professor Henry Jones Sr., an expert on the Grail,\
        \ has disappeared while searching for its location. Donovan enlists Indy's\
        \ help, providing him with a stone tablet that is rumored to lead to the Grail\
        \ and revealing that his father was last seen in Venice pursuing a lead on\
        \ a missing marker of the Grail's location. \n\nIndy travels to Venice, where\
        \ he meets Dr. Elsa Schneider, his father's colleague, and together they discover\
        \ a hidden catacomb beneath a library. They find a clue left by Henry that\
        \ points to Alexandretta as the starting point of the map that leads to the\
        \ grail. However, they are pursued by the Brotherhood of the Cruciform Sword,\
        \ a secret society dedicated to protecting the Grail. During a boat chase,\
        \ Indy learns the Brotherhood's mission from Kazim before releasing him. \n\
        \nLearning his mission is now to save his father, Indy sends Marcus Brody\
        \ to meet Sallah in Iskenderun with the map from his father’s diary, while\
        \ Indy heads to Austria to rescue his father from a Nazi-occupied castle.\
        \ Indy infiltrates the castle, where he discovers that Elsa is working with\
        \ the Nazis and that Donovan is also after the Grail for personal glory, not\
        \ for the benefit of mankind. He rescues his father, and they escape the castle,\
        \ but Donovan and the Nazis capture Brody and the map in Iskenderun. \n\n\
        Indy and Henry pursue Donovan to the Canyon of the Crescent Moon, as indicated\
        \ by the map, where they encounter booby traps guarding the Grail's location.\
        \ They are met with a deadly challenge to get through the canyon of the crescent\
        \ moon; “Only the penitent man shall pass”, they are forced to kneel for a\
        \ razor sharp pendulum to advance. “Only in the footsteps of God shall he\
        \ proceed”; as Indy deciphers ancient texts, he is forced to walk on stones\
        \ which spell out Jehovah, some stones crumbling beneath his feet if he steps\
        \ on the incorrect stone. “Only in the leap from the lion's head shall he\
        \ prove his worth”; a seemingly deadly chasm forces a leap of faith, where\
        \ the ancient pathway is difficult to see from one side. Donovan, meanwhile,\
        \ forces Indy to undergo a series of trials to reach the Grail. \n\nIndy faces\
        \ the final trial: choosing the true Grail from a collection of ornate cups.\
        \ Donovan is impatient and chooses a jeweled goblet, drinking from it, only\
        \ to age rapidly and die, revealing the cup was a false Grail. He is warned\
        \ The true grail cannot leave this location and is a test of faith to protect\
        \ the grail. Elsa ignores the warnings and attempts to cross the Great Seal\
        \ with the Grail, causing the temple to collapse and she plummets to her death.\
        \ Indy almost falls into an abyss himself but is saved when Henry commands\
        \ him to let go of the Grail and give him his hand. Finally reconciled, Indy\
        \ and Henry escape the collapsing temple with Sallah and Brody. As the four\
        \ ride off into the sunset, Indy and Henry’s relationship has been rebuilt,\
        \ and they both gained a newfound respect and love for each other."
      dominant_tone: Hopeful
