  description: The cramped, shadowed wooden interior of the circus train’s stockcar,
    shaking violently from the train’s motion and the roars of a prowling lion. Indiana
    Jones crashes through the collapsing roof (from the rooftop above) and battles
    the beast with a lion tamer’s whip, while the Cross of Cortes tumbles inside,
    heightening the stakes. Fedora demands the whip from the rooftop hole above, creating
    a vertical standoff.
