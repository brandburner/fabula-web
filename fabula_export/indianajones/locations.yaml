  episode_count: 1
- fabula_uuid: ger_location_871a904867b6
  global_id: ger_location_871a904867b6
  canonical_name: Podium in Berlin City Square
  description: Elevated platform dominates Berlin's city square during a nighttime
    Nazi rally. Hitler and high-ranking officers stand atop it, surveying the book-burning
    pyres that cast flickering shadows and fill the air with acrid smoke. Swastika
    banners flap overhead as chants rise from the crowd below. Indy spots Elsa nearby,
    sparking their tense confrontation. Hitler descends from here to sign books amid
    the frenzy, unknowingly autographing the stolen Grail Diary for Indy.
  location_type: Rally Podium
  parent_location_uuid: null
