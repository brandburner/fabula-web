  global_id: ger_location_8428527791ac
  canonical_name: Corridor Beyond the Pendulum
  description: 'A narrow, claustrophobic temple corridor that serves as the immediate
    passageway after Indiana Jones disables the Pendulum Chamber''s razor-sharp blade.
    Unlike the Pendulum Chamber itself, this space contains no traps but instead amplifies
    narrative tension through distant echoes of Nazi shouts and Henry Jones Sr.''s
    fading breaths, propelling Indy toward the next trial: the cobblestone Word of
    God path.'
