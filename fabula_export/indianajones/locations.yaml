  canonical_name: Black Pit Beneath the False Floor
  description: A deep, silent black pit opens beneath the dust-covered cobwebs masking
    the false floor in the Sanctuary Foyer. Indy tests the void by dropping a stone
    that produces no sound, confirming its bottomless depth. He anchors his whip to
    a beam overhead, swings across the chasm, and extends the line as a lifeline.
    Satipo crosses gripping the whip while dust motes drift in faint sunlit shafts
    above the lethal drop, where a fall promises certain death. This central hazard
    forces quick improvisation and tests trust amid the temple's traps.
