  global_id: ger_location_9c220949b6cc
  canonical_name: Scraggly Trees near Mayapore
  description: Wind moans through scraggly trees as they whip against the full moon's
    silver glow. Branches twist and lash in the night breeze, casting erratic shadows
    across dying fields. A breathless runner sprints past, every limb looming as a
    threat in the moonlit panic. This eerie thicket heightens urgency, its sounds
    and shapes bridging spiritual warnings to physical assault on the village ahead.
  location_type: Villageside Scraggly Trees
