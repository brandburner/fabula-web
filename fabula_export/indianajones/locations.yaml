- fabula_uuid: ger_location_792728fd00a5
  global_id: ger_location_792728fd00a5
  canonical_name: Delhi
  description: Delhi serves as Indiana Jones's initial destination from Mayapore,
    a sprawling Indian capital city with airports and crowds that promise a swift
    flight west to escape the village's poverty and curse. Indy identifies it as the
    direct route until the shaman redirects the group to Pankot Palace. Willie Scott
    insists on heading there instead, seeking its comfort and safety over the rural
    hardships and palace uncertainties. Concrete streets and urban bustle contrast
    sharply with the villagers' despair.
  location_type: Indian Capital City
