  global_id: ger_location_e33dc7f346d4
  canonical_name: Lao Che's Ballroom Stained-Glass Window
  description: This stained-glass window anchors one end of Lao Che's smoky ballroom,
    its vibrant panels framing an escape amid betrayal and gunfire. Indy rams a massive
    rolling gong into it as an improvised shield, shattering the glass in a cascade
    of sharp, multicolored fragments. He and Willie burst through, tumbling from the
    chaos of Wu Han's murder, Chen's stabbing, and henchmen's bullets into precarious
    freedom outside.
  location_type: Nightclub Ballroom Window
