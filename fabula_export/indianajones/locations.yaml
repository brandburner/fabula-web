  global_id: ger_location_39289305ff4d
  canonical_name: Secret Room
  description: Indiana Jones and Henry Jones Sr. pace this claustrophobic, windowless
    chamber, its walls etched with ancient carvings that close in like a dead end.
    Indy scrapes stone in frustration while Henry sits in the ornate chair, which
    triggers the floor to drop away, revealing a spiral staircase plunging into darkness.
    Nazi soldiers under Vogel later force the sealed door, their torches cutting through
    thick air as they descend the stairs toward the Grail sanctum, boots echoing in
    pursuit.
  location_type: Hidden Temple Trap Chamber
