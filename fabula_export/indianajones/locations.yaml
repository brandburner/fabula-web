  episode_count: 0
- fabula_uuid: ger_location_c3ae46353962
  global_id: ger_location_c3ae46353962
  canonical_name: The Duesenberg
  description: The battered interior of the stolen Duesenberg convertible traps Indiana
    Jones, Willie Scott, and Short Round in a cramped space during their high-speed
    flight from Lao Che's gunmen through Shanghai's neon streets. Short Round drives
    from the front seat, Indy retrieves antidote from Willie's dress and fires back
    through shattered rear windows, while bullets shred the top and tear upholstery.
    Neon flashes over bloodied leather as Willie's complaints about her ruined dress
    mix with grief over Wu Han and desperate navigation toward the airfield.
  location_type: Convertible Car Interior
  parent_location_uuid: null
  season_appearances:
  - 1
  local_uuids:
    1: location_ebc2bf358cac
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_location_7d07e311969a
  global_id: ger_location_7d07e311969a
  canonical_name: The Gorge (Below the Rope Bridge)
  description: A 300-foot-deep jungle chasm carved through cliffs, featuring jagged
    rocks and a murky river teeming with crocodiles. The gorge lies directly below
    a precarious rope bridge, where Thuggee guards, Mola Ram, and the Sankara Stones
    plummet to their deaths amid screams and frenzied crocodile attacks. Indy and
    Willie witness the carnage from the bridge or dangling ropes, with the gorge embodying
    instant death and raw survival terror. Tidal waves crash into the river, sending
    spray upward and churning the waters with blood and debris.
  location_type: Jungle Chasm
  parent_location_uuid: null
  season_appearances:
  - 1
  local_uuids:
    1: location_d32dcd204c84
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_location_44b31075ab14
  global_id: ger_location_44b31075ab14
  canonical_name: The Library of San Marco (Former Crusader Church)
  description: A grand Gothic library in Venice’s Piazza San Marco, originally a Crusader-era
    church repurposed as a scholarly repository. Towering Crusader-era columns rise
    amid shelves of ancient books, their stained-glass windows depicting knights clutching
    chalices with hidden Roman numerals (III, VII, X). The floor tiles bear carved
    markers, including an X that Indy smashes to reveal a hidden tomb’s damp void.
    The space shifts from a hushed scholarly refuge to a gateway for peril as Elsa,
    Brody, and Indy stand at its threshold, uncovering secrets tied to Henry Jones
    Sr., the Grail, and Nazi threats. The library’s facade and soaring arches overlook
    the sunlit Piazza San Marco cobbles, blending sacred history with scholarly pursuit
    amid mounting tension.
  location_type: Historical Library in Repurposed Crusader Church
  parent_location_uuid: null
  season_appearances:
  - 1
  local_uuids:
    1: location_9d8bb81eceeb
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_location_9fb1c1692511
  global_id: ger_location_9fb1c1692511
  canonical_name: The Mines (Pankot Underground Slave Mines)
  description: A sprawling network of damp stone tunnels and vast caverns beneath
    the Thuggee temple in Pankot, where enslaved children toil under dim torchlight
    amid the echoes of picks and chains. The mines consist of claustrophobic passages
    and open caverns, including a high-ceilinged cavern where Short Round performs
    a daring ladder stunt to escape. Guards patrol the area, enforcing brutal labor
    conditions. Indiana Jones, Willie Scott, and Short Round navigate these tunnels,
    severing pursuit paths and hiding amid the shadows of human misery. The mines
    serve as a central location for the narrative's themes of oppression, defiance,
    and escape.
  location_type: Underground Slave Mines
  parent_location_uuid: null
  season_appearances:
  - 1
  local_uuids:
    1: location_4b9ea2111e10
  first_appearance_season: 1
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_location_1677f40bed45
  global_id: ger_location_1677f40bed45
  canonical_name: The Periscope
  description: Steel periscope juts from the surfaced submarine into choppy Mediterranean
    waters. Indy grips its slick surface through afternoon sun that warms his upper
    body against relentless cold spray, dusk exhaustion where wet whip bites skin,
    and night peril with shark fins circling the hull. He peers through the eyepiece
    amid cramps and fatigue before the sub dives, turning this precarious perch into
    a hinge of survival and vulnerability.
  location_type: Submarine Periscope Exterior
  parent_location_uuid: null
  season_appearances:
  - 1
  local_uuids:
