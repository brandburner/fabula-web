  global_id: ger_location_0a8dc3c3c3e0
  canonical_name: Gardens of Pankot Palace
  description: 'Elaborate gardens of Pankot Palace stretch toward the Pleasure Pavilion,
    where Indiana Jones, Willie Scott, and Short Round cross lush paths to reach the
    Maharajah''s dinner. Nighttime opulence defines the space: manicured plantings
    frame torchlit walkways that link palace interiors to the pavilion''s gold-domed
    allure and exotic music. These grounds heighten tension as cultural decadence
    looms ahead, blending serenity with the palace''s underlying menace.'
  location_type: Ornamental Palace Gardens
