- fabula_uuid: ger_location_18e57097a9ec
  global_id: ger_location_18e57097a9ec
  canonical_name: Professor Henry Jones Sr.'s House
  description: Late afternoon light spills into Professor Henry Jones Sr.'s ransacked
    suburban home, where shattered furniture, torn books, and scattered mail betray
    a frantic search by intruders. A half-open front door admits Indiana Jones and
    Marcus Brody into eerie silence, broken only by Indy's anxious calls of 'Dad?'
    and the agitated barking of the family husky. The house contains twisted paintings
    depicting Grail chalices and Crusaders, as well as the discovered Grail Diary
    resting on the floor—key artifacts that pull Indy into his father's obsessive
    legacy and the looming Nazi threat. The chaotic scene reflects both personal desperation
    and the urgency of the historical peril ahead.
  location_type: Suburban Residential Exterior and Porch
  parent_location_uuid: null
