  description: Sunlit corridor in the Venetian hotel leads to Elsa Schneider's bedroom
    door. Indiana Jones strides down the hall, knocks sharply, and calls her name
    in mounting urgency. Silence answers; his hesitation fades as desperation pushes
    him to enter uninvited. The space bridges public hotel areas and private quarters,
