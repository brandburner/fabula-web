  global_id: ger_location_d2f437e3b7e5
  canonical_name: Thuggee Quarry Suspension Catwalk
  description: A narrow, elevated metal walkway suspended high above the quarry’s
    machinery, where Indiana Jones engages in sword fights, whip combat, and acrobatic
    swings. Serves as a platform for his physical confrontations with Mola Ram’s guards.
  location_type: Quarry Mine Catwalk
  parent_location_uuid: null
