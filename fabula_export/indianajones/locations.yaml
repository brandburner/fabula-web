- fabula_uuid: ger_location_de3fb01a4dc2
  global_id: ger_location_de3fb01a4dc2
  canonical_name: Western Sky at Dawn
  description: Ragged white clouds stretch across the vast western sky at first light.
    A passenger plane banks westward through them as the rising sun flashes above
    the horizon. This crisp morning expanse carries the protagonists from Shanghai's
    chaos toward Pankot, compressing vast distances into a quiet panoramic hinge.
    Passengers sense escape and building purpose in the forward rush and fleeting
    sunlight.
  location_type: Open Aerial Sky
