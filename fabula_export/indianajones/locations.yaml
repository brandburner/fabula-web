  global_id: ger_location_c0c87d4e396b
  canonical_name: Indy's Lecture Hall
  description: 'Tiered amphitheater seats slope toward a wooden lectern flanked by
    chalkboards scrawled with diagrams and ancient scripts. Shelves brim with books,
    maps, and artifacts. Sunlight slices through windows, stirring chalk dust as desks
    creak under jostling student elbows. Indy commands with voiceover and paces, declaring
    archaeology the search for fact amid chaos and laughter. Post-lecture, the emptying
    hall turns intimate: Indy unwraps the gleaming Cross of Coronado for Marcus Brody''s
    proud gaze, champagne-ready triumph bridging scholarship and adventure.'
  location_type: University Lecture Hall
