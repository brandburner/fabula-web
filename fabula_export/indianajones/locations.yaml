- fabula_uuid: ger_location_deea7e6467c6
  global_id: ger_location_deea7e6467c6
  canonical_name: Open Sky (Daytime Aerial Skirmish)
  description: Vast daytime sky stretches around the fragile biplane as two Messerschmitts
    streak through scattered clouds in pursuit. Gunfire cracks and tracers whip past,
    the open expanse letting the slower craft dodge as enemies overshoot. Indy shouts
    directions amid engine roar and wind shear; Henry fumbles the gun, severing the
    tail in panic. Blue vault shifts from freedom's promise to deadly crucible, amplifying
    father-son friction amid spiraling descent toward peril.
  location_type: Open Aerial Sky
  parent_location_uuid: null
