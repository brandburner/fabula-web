  global_id: ger_location_e08fdfdd52b2
  canonical_name: Dark Passageway to the Crusader's Tomb
  description: Indy and Elsa traverse this narrow, dark corridor deep in the catacombs
    below the library. After examining sixth-century pagan symbols carved into the
    walls, Indy ignites Elsa's lighter; its flame pierces the gloom, casting flickering
    shadows across damp stone amid foul, clinging air. The passage tightens as they
    descend toward the suspected Crusader's tomb, amplifying the dank oppression of
    forbidden history.
  location_type: Catacomb Passageway
