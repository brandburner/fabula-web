- fabula_uuid: ger_location_7ea98eaa3115
  global_id: ger_location_7ea98eaa3115
  canonical_name: Stormy Atlantic Ocean off the Portuguese Coast (1938)
  description: Gale-force winds and storm-driven waves churn off Portugal's rugged
    Atlantic coastline in 1938, where Indiana Jones leaps from an exploding cargo
    ship amid bursts of flame and debris. Clutching the Cross of Coronado atop a life
    preserver, he battles towering waves, churning surf, and jagged rocks as salt
    spray and loose sand-laced gusts test his endurance. The heaving expanse—marked
    by cold swells, relentless currents, and fiery debris—turns his escape into a
    life-or-death ordeal, isolating him amid fading shouts and the sea's raw force.
  location_type: Stormy Coastal Waters
  parent_location_uuid: null
  season_appearances:
