  global_id: ger_location_fa71b61fdfe7
  canonical_name: Steamer’s Stern (with Giant Propellers)
  description: Speedboats hurtle toward massive turning propellers at the steamer's
    stern, water foaming white as suction drags them into blade range. Indy grapples
    Kazim on the rocking deck edge, engines thundering below, forcing split-second
    choices amid spray and roar. Elsa grabs Indy at the last moment, blades whipping
    inches away—harbor air thick with diesel fumes and betrayal's edge.
  location_type: Ocean Steamer Stern
  parent_location_uuid: null
