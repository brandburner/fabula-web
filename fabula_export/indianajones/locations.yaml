- fabula_uuid: ger_location_ef36decd80d1
  global_id: ger_location_ef36decd80d1
  canonical_name: The Pleasure Pavilion
  description: A sub-location within Pankot Palace, specifically a torchlit pavilion
    in the palace gardens used for feasting, cultural clashes, and dialogue (e.g.,
    Indy’s interrogation of Chattar Lal, Willie Scott’s fainting).
  location_type: Torchlit Garden Pavilion
