- fabula_uuid: ger_location_5def854f55b4
  global_id: ger_location_5def854f55b4
  canonical_name: DC-3 Cockpit
  description: Narrow cockpit of the DC-3 packs pilot and co-pilot seats amid glowing
    panels and shuddering yokes as biplanes strafe relentlessly. Alarms blare from
    ruptured fuel lines; co-pilot panics with calls for parachutes while pilot orders
    evacuation through terse commands and dives into clouds. Crew abandons abruptly,
    leaving empty seats that amplify horror. Indy barrels in, seizes controls despite
    admitting no flying skills, with Short Round feeding ammo amid gunfire echoes
    and engine roar. Confined space heightens raw survival tension, snap decisions,
    and desperate maneuvers.
  location_type: Propeller Airplane Cockpit
