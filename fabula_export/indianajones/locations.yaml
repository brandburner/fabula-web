  global_id: ger_location_5ddf882ea2bc
  canonical_name: Cult's Inner Sanctum
  description: Flaming torches line the walls of this Thuggee cult chamber, casting
    shadows across a central altar and rocky platform suspended over a glowing lava
    crevasse. A crankwheel mechanism controls the chains holding sacrificial victims
    above the molten pit. Priests chant and lunge amid the heat and sulfur stench
    as Indiana Jones breaks free from hypnotic trance, fights Chattar Lal, and reclaims
    the Sankara Stones in brutal hand-to-hand chaos.
