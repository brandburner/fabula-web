  global_id: ger_location_8c4de0bc5148
  canonical_name: Outside Henry Jones Sr.'s House (Near the Study Window)
  description: Exterior residential space directly outside Henry Jones Sr.'s study
    window, distinct from the interior study. Serves as the acoustic and visual bridge
    between the indoor ritual and the external threat, where the car arrives carrying
    Herman and the unnamed men.
  location_type: Residential Home Exterior
