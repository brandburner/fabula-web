- fabula_uuid: ger_location_2990fd0ebc46
  global_id: ger_location_2990fd0ebc46
  canonical_name: Dark Tunnel Between Pankot Mines and Rope Bridge
  description: A narrow, shadow-cloaked passage connecting the Thuggee-controlled
    Pankot mines to the rope bridge over the crocodile-choked gorge. The tunnel serves
    as a strategic choke point where Thuggee guards ambush intruders, creating a confined
    kill zone for brutal hand-to-hand combat. Damp stone walls swallow light and sound,
    amplifying the ritual menace of the cult's domain. The tunnel's mouth at the mine
    entrance becomes a sudden ambush point, while its exit onto the rope bridge offers
    a desperate escape route. The confined space heightens the desperation of combatants,
    with echoes of shouts and clashing blades adding to the tension.
  location_type: Rock-Cut Mine Tunnel
