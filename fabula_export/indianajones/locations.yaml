  canonical_name: Cliffside Railroad Tracks (Perilous Chase Location)
  description: Sheer cliffside railroad tracks outside the small town, where Indy’s
    horse veers onto active rails during the chase. The tracks are twisted by debris,
    and an oncoming train serves as the primary threat. This location embodies **isolation,
    speed, and raw danger**, distinct from the suburban street.
