- fabula_uuid: ger_location_812b9e00a2fb
  global_id: ger_location_812b9e00a2fb
  canonical_name: Overhanging Tree Branch
  description: Short Round reaches from the baby elephant's back to pluck a vine of
    ripe wild fruit dangling from this overhanging tree branch in the sunlit lower
    jungles. Thick foliage sways gently over the path, ripe clusters brush close as
    the elephant passes underneath. The branch frames Short Round's tender feeding
    of the animal, a pocket of calm amid humid green density. Giant bats soon blot
    the sky overhead, their shadows sweeping the idyllic overhang into sudden threat.
  location_type: Jungle Canopy Overhang
