- fabula_uuid: ger_location_f629292d3f8b
  global_id: ger_location_f629292d3f8b
  canonical_name: Indy's Venetian Bedroom
  description: Indy's Venetian bedroom provides a tight, private space overlooking
    a canal where Indy and Elsa drop defenses in a heated kiss. Daytime light bathes
    the room as the gondolier's serenade drifts in from below—romantic notes that
    snag Indy's attention and split his focus between Elsa's pull and the Grail quest's
    demands. She grips him harder, body and will, to hold the vulnerable instant against
    encroaching peril. The room frames their raw clash of passion and distraction
    amid Venice's shadowed intrigue.
  location_type: Private Hotel Bedroom
