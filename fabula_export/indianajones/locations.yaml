- fabula_uuid: ger_location_e7fec8c42034
  global_id: ger_location_e7fec8c42034
  canonical_name: Wired Door in Castle Brunwald Hallway
  description: Indy crouches in Castle Brunwald's shadowed hallway, eyes locked on
    a closed door where an electrical wire snakes underneath—the clear clue to his
    father's cell. Distant Nazi soldiers chatter over maps, their voices echoing off
    stone walls as Indy's revolver grip tightens with hatred. He debates forcing entry
    but knocks the adjacent door, turning the wired threshold into a taut pivot of
    stealth versus desperate rescue. Oppressive air thickens every footstep and murmur
    into looming threat.
  location_type: Nazi-Occupied Castle Doorway
