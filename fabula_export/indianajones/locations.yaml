  description: Indy swings open the doorways in the Zeppelin's exposed framework,
    revealing a vast blue sky filled with billowing clouds. A biplane dangles from
    the underbelly below, framed against the high-altitude expanse. Engine drone fills
    the air as whipping winds promise escape yet threaten a deadly plunge. Henry hesitates
    while Indy urges him forward, the view marking their shift from trapped pursuit
