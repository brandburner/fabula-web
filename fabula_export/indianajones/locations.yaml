  global_id: ger_location_488d4ae448ea
  canonical_name: Indiana's Hut
  description: Night wraps the sparse interior of Indiana's hut in a village outpost.
    Rough walls crack under cold winds that slip inside, breaking suffocating stillness.
    Shadows pulse along edges as Indiana Jones wakes beside sleeping Short Round,
    rises silently, and pads to the door with honed caution. Rough-hewn refuge turns
    tense vantage for sensing encroaching danger amid the cult's distant threat.
