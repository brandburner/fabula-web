  description: The open doorway frames a ragged breach between the DC-3's passenger
    cabin and the roaring sky during aerial combat. Short Round drags a machine gun
    here, forcing Willie to feed the belt as bullets rake enemy fighters. Wind blasts
    through, whipping clothes and amplifying engine roar, while the narrow firing
    lane delivers a fleeting triumph before Short Round's wild swivel rips into their
    own engine, hurling the plane toward catastrophe. This exposed threshold turns
    the cabin into a frantic gun turret, blending raw exposure with desperate improvisation.
  location_type: Aircraft Cabin Doorway
