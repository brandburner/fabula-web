- fabula_uuid: ger_location_79d0431e6dcb
  global_id: ger_location_79d0431e6dcb
  canonical_name: Iskenderun Marketplace Streets
  description: Sun-drenched streets of Iskenderun's marketplace teem with vendors
    hawking water and food amid dense crowds near the train station. The chaotic urban
    environment serves as the primary setting for Sallah's frantic escape with Brody,
    where toppling stalls, panicked crowds, and dust-filled bottlenecks create a high-stakes
    chase. Key narrative moments include a newspaper punch sparking a brawl and a
    misinterpreted sprint leading into a Nazi truck's path. The location's crowded,
    marketplace-specific details (e.g., vendors, stalls, produce) distinguish it from
    generic city streets, while its proximity to the train station and the urgency
    of the Grail race amplify its thematic weight.
  location_type: Crowded Urban Marketplace
