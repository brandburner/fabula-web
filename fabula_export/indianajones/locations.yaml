- fabula_uuid: ger_location_5e0be0464729
  global_id: ger_location_5e0be0464729
  canonical_name: Lao Che's Ballroom (including Stage)
  description: |-
    Opulent Shanghai nightclub ballroom owned by Lao Che, featuring a raised stage at its heart where Willie Scott performs under chandeliers and a dragon backdrop. The space includes a giant brass gong (struck by a muscular slave/attendant) that signals cues during performances. The ballroom hosts patrons in silk attire, caviar/champagne service, and pulsating music. Key narrative events include:
      1. Willie Scott's sultry performance on the raised stage
      2. Indiana Jones' chaotic entrance (vaulting onstage, retrieving a golden broadsword from a Chinese warrior statue)
      3. Indy's violent escape (using the gong as a shield, smashing through stained glass)
      The stage and ballroom function as a unified space where these events occur sequentially.
  location_type: Nightclub Ballroom
