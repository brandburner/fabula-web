  episode_count: 1
- fabula_uuid: ger_location_645023e6b86e
  global_id: ger_location_645023e6b86e
  canonical_name: The Trail
  description: Narrow jungle trail cuts through dense foliage where the elephant caravan
    advances amid clinging humidity and the shuffle of porters and beasts. Willie
    Scott dabs perfume behind her elephant's ears to fight the stench, but the animal
    trumpets in disgust, recoils violently, and halts progress. Porters scatter as
    chaos erupts, underscoring the raw clash between urban refinement and wilderness
    indifference. The path marks the group's grueling transition from city comfort
    to jungle harshness.
  location_type: Jungle Expedition Trail
  parent_location_uuid: null
  season_appearances:
