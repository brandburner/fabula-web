- fabula_uuid: ger_location_b558e2798c3d
  global_id: ger_location_b558e2798c3d
  canonical_name: Tool Shack
  description: Cramped Tool Shack squats on the quarry platform amid clanging mine
    carts and enslaved children's toil. Indy slips inside its shadowed confines, tools
    scattered on rough shelves and dust thick in the stale air. He crouches there,
    breath held, plotting the kids' breakout and signaling their dash to freedom while
    Thuggee guards prowl the cavern below. Flickering lantern light casts jittery
    shadows; every rustle risks exposure in this tight pocket of temporary sanctuary.
  location_type: Quarry Platform Shack
  parent_location_uuid: null
