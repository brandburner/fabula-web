  description: Sun-drenched arches and domes of the Grand Mosque in Hatay cast long
    shadows across its exterior. Towering minarets rise sharply against the sky, their
    intricate stonework detailed in the daylight. This open space blends Islamic and
    Byzantine architecture, marking Hatay's fractured history between empires. The
    camera sweeps the facade as a quiet threshold, heightening tension between sacred
