  description: Jock's plane climbs through twilight, revealing the dark jungle as
    a brooding, impenetrable expanse below. Dense canopy swallows light and hides
    perils like venomous creatures and treacherous terrain. Indiana Jones leaves this
    hazardous wilderness behind after the temple's traps, its shadowy vastness amplifying
