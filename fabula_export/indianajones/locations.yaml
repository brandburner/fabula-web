  canonical_name: Salzburg
  description: Salzburg looms as the journey's endpoint beyond the jagged Austrian
    Alps. A map overlay traces the Mercedes from Venice's canals through mist-veiled
    peaks to this Nazi-threatened city, where intrigue yields to danger. Peaks rise
    like sentinels along sharp curves; cold air bites as the engine drones onward,
    compressing the Grail quest into urgent peril.
  location_type: Nazi-Occupied Austrian City
