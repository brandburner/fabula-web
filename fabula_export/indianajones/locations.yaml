  description: Indiana Jones pauses at the bathroom door inside Elsa Schneider’s ransacked
    bedroom. He knocks sharply and calls her name, clinging to hope amid the surrounding
    chaos. The door swings open to emptiness—no trace of Elsa, only lingering steam
    or damp tiles hinting at recent use. This private space of vulnerability and routine
    now stands as a hollow void, its silence confirming her forced absence and signs
