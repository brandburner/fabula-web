  global_id: ger_location_0bfe78cc2912
  canonical_name: Desolate Countryside Plain
  description: Elephants plod across a barren plain under harsh daylight, heavy steps
    stirring dust on cracked earth as the group heads toward distant hazy hills and
    Pankot Palace. The empty expanse isolates the caravan after the village farewell,
    compressing days of travel into silent forward motion that heightens the foreboding
    isolation and underscores the expedition's physical burden alongside the moral
    stakes of confronting the Thuggee cult.
  location_type: Desolate Rural Plain
