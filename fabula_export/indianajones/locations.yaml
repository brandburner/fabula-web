  canonical_name: Desert Boulder Gap (Raiders of the Lost Ark Chase)
  description: Narrow passage formed by two tall boulders along a sun-scorched desert
    road, used as tactical cover during a horseback chase in *Raiders of the Lost
    Ark*. Serves as a launch point for Indiana Jones' vault onto a Nazi truck.
