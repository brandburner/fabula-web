  global_id: ger_location_2afaefcefd8d
  canonical_name: Cliff Overlooking Lower Jungles
  description: Short Round perches precariously on the baby elephant's back at this
    elevated jungle cliff edge, overlooking the lower jungles where the caravan plods
    through dense green foliage and vines of wild fruit under bright daylight. From
    here, he first spots giant bats swarming the sky, blotting the sun. The sheer
    drop heightens the group's isolation and vulnerability; humid air carries distant
    calls from the canopy as the moment shifts from tender observation to looming
    peril.
  location_type: Jungle Cliff Overlook
