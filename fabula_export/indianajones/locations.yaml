- fabula_uuid: ger_location_eaf921e6443b
  global_id: ger_location_eaf921e6443b
  canonical_name: Dawn Sky over Indy's Dig
  description: The dawn sky over Indy's dig lightens from pre-dawn murk, washing pale
    clarity across rolling dunes and the well's entrance. This gradual brightening
    turns a thin smoke column into a blatant beacon, sharpening visibility for Omar's
    distant crew. What lingered unseen in darkness now screams exposure, spiking tension
    as the site's hidden activity betrays its position in the open desert expanse.
  location_type: Desert Dawn Sky
  parent_location_uuid: null
  season_appearances:
