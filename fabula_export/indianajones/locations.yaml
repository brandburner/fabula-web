  global_id: ger_location_a144907815d3
  canonical_name: Professor Henry Jones' House (Jones Family Home)
  description: 'The family residence of Professor Henry Jones: a small-town house
    marked by a mailbox stamped ''JONES'' facing the street. Daylight and an ajar
    front door frame scenes where Indiana Jones and Marcus Brody arrive breathless,
    mounting the porch in urgent search for Professor Henry Jones. Serves as the narrative
    anchor for family-focused emotional beats and the site of arrival/appeal in the
