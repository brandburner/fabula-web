  global_id: ger_location_3a6d9fcd01a5
  canonical_name: Darkened Doorway (Nazi Troop Truck Rear) with Loading Ramp
  description: A deceptive, shadowed doorway at the rear of a Nazi troop truck, accessed
    via an inclined metal ramp. Located in the chaotic Iskenderun train station, the
    doorway is framed by a partially drawn canvas curtain, creating the illusion of
    a safe hiding place. Brody, urged by Sallah, charges up the ramp and through the
    doorway, only to be trapped inside as the truck's rear doors slam shut, stranding
    him in darkness amid crates and enemies. The ramp's vibrations and the truck's
    engine roar underscore the horror of his mistaken escape route.
  location_type: Military Truck Rear Doorway
  parent_location_uuid: null
  season_appearances:
