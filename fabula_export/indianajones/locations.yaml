  episode_count: 1
- fabula_uuid: ger_location_a61c66d93df1
  global_id: ger_location_a61c66d93df1
  canonical_name: The Sky - Day
  description: Daytime sky expanse hosts the DC-3's desperate fight against pursuing
    biplanes. Fighters dive in strafing runs, tracers stitching blue air as passengers
    bail out, parachutes snapping open against whipping winds. Indy grabs ropes amid
    engine roars, ricochets, and vertigo plunge, with the plane banking toward jagged
    snowy peaks before erupting in flames.
  location_type: Open Aerial Sky
  parent_location_uuid: null
  season_appearances:
