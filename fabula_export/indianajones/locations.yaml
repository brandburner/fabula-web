  canonical_name: Cut-Off Hallway
  description: Indy bursts from this narrow cut-off hallway into the inclined passage
    at the boulder chase's outset, then dives back through its tight exit as the massive
    stone seals the collapsing temple behind him. Choking dust fills the cramped stone
    confines amid thunderous impacts and flying debris, turning the space into a frantic
    refuge that underscores his solitary survival amid ancient ruin's wrath.
