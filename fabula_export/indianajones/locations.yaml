  canonical_name: Courtyard Archway (Sultan’s Palace)
  description: Ornate stone archway piercing the sun-drenched courtyard of the Sultan’s
    palace in Iskenderun. Donovan and the Sultan stride through it during heated negotiations
    over treasures, the car, and military aid, transitioning from the open main area.
    Warm daylight bathes the passage, shadows linger from nearby watchers, and the
    air carries tension from shifting alliances and abrupt news of escapes.
