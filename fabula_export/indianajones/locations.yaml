- fabula_uuid: ger_location_acdd14087844
  global_id: ger_location_acdd14087844
  canonical_name: Thuggee Mine Tunnels (Including the Kali Bridge Passage)
  description: |-
    A network of claustrophobic underground tunnels beneath the Thuggee temple, where chained children labor to mine Sankara Stones amid brutal conditions. The tunnels include:
      1) **Main mining passages**: Where children claw at rock walls, guards patrol with whips, and lava fissures erupt, creating a suffocating atmosphere of heat, dust, and despair.
      2) **The Kali Bridge Passage**: A narrow section where Indy hurls a guard into chained children, triggering a revolt. The trio rips down a Kali-decorated wooden panel to form a makeshift bridge over a fiery chasm, with flames licking upward from lava below as they escape.

      The tunnels serve as both a site of oppression (slave labor, whips, hypnotic trances) and rebellion (chain-smashing, revolt, liberation). The Kali Bridge Passage is a critical junction where the narrative shifts from despair to action.
  location_type: Thuggee Slave Mine Tunnels
  parent_location_uuid: null
  season_appearances:
