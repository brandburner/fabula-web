  canonical_name: Dr. Fantasy’s Magic Caboose
  description: The caboose gleams mysteriously at the end of the speeding circus train,
    its door framed by a sign reading 'Dr. Fantasy’s Magic Caboose.' Indy leaps onto
    its roof and slips inside, gaining a brief sanctuary from Fedora's gang. Dust
    whips past as the train rattles onward; the space feels unnaturally still, its
    otherworldly aura hinted by the name and Indy's desperate plunge into the unknown.
    Tension hangs thick—pursuers lurk outside, but the interior promises a fleeting
    pause amid supernatural stakes.
