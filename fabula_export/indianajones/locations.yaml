  global_id: ger_location_7c282add7cdf
  canonical_name: Professor Henry Jones' House Front Walkway
  description: Daylit walkway stretches from the street to the porch of Professor
    Henry Jones' house. Indiana Jones and Marcus Brody race along it, breathless after
    parking the car. Brody recalls his decades-long friendship with Henry, heightening
    Indy's raw anxiety over his father's disappearance. They climb the porch steps
    together, spot the ajar front door, and exchange urgent glances that shift worry
    into suspicion.
  location_type: Residential Front Walkway
