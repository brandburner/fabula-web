  canonical_name: Above the Map Room
  description: Exposed rooftop perches high over the Map Room at the Tanis dig site,
    daylight beating down on scattered ropes and oil drums amid swirling dust. Sallah
    fingers a line here, feigning calm as German soldiers bark orders and yank him
    toward a stuck jeep, his fearful glance piercing back through the skylight to
    the action below. Indy emerges gasping from that same skylight, ducks behind cover
    while Sallah hauls in their escape rope, both men edging toward enemy tents under
    constant threat of detection. Tension crackles in the open air, every shout from
    guards forcing split-second subservience and improvisation.
