  description: This narrow passage links directly to the Chamber in the temple's underground
    labyrinth. Willie's desperate voice—'Hey—where are you?!'—echoes sharply through
    its confines, pinpointing her in a nearby but isolated spot. The sound cuts through
    Indy's and Short Round's frantic efforts at the sealed door, heightening claustrophobia
    and the cult's calculated separation. Damp stone walls amplify every cry, turning
    proximity into torment amid the oppressive dark.
