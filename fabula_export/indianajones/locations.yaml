- fabula_uuid: ger_location_906332befb08
  global_id: ger_location_906332befb08
  canonical_name: Deserted Worshippers' Area (Abandoned Underground Escape Area)
  description: A deserted area on the far side of a fiery chasm in the Pankot Mines,
    reached by freed children via a makeshift wooden bridge. Shadows cloak the empty
    space, free of Thuggee guards, as bare feet pound toward unseen exits promising
    liberation. Crumbling stone walls loom under faint torchlight, vines twist through
    ancient cracks, and stale air carries echoes of dripping water from the mines
    beyond. Dust motes dance in shafts of dim glow, marking the threshold from Thuggee
    oppression to hard-won freedom. This area serves as a silent refuge where the
    children disperse into shadowed alcoves, their breaths easing for the first time
    amid the cult's abandoned sanctum.
  location_type: Abandoned Underground Temple
