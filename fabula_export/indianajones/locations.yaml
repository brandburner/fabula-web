  global_id: ger_location_2a5438f3576f
  canonical_name: Deserted Alley
  description: Narrow cobblestone alley lies exposed under daylight, channeling frantic
    pursuit through its tight confines. Two Arabs dash down its length clutching a
    woven basket until Indy's whip cracks across their path, halting them cold. The
    lid flies off, scattering pistols, rifles, and ammunition across the stones in
    a metallic clatter that unmasks the decoy. Marion's scream echoes sharply from
    around the corner, spiking urgency and diverting Indy from retribution to rescue
    amid hanging dust and raw tension.
  location_type: Urban Cobblestone Alley
