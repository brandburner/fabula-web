  canonical_name: Bridge over the Venice Canal
  description: Sunlight dapples a narrow stone bridge spanning one of Venice's winding
    canals, where clear water laps against weathered walls amid the city's labyrinthine
    paths. Indiana Jones, Marcus Brody, and Dr. Elsa Schneider cross on foot during
    a daytime stroll. Indy plucks a flower from nearby stonework and hands it to Elsa
    with a grin, their flirtation blooming in the warm light—Elsa notes its inevitable
    fade by tomorrow, prompting Indy's promise of another. Gentle splashes rise from
    below, the bridge cradling their charged banter until Brody interrupts with news
    of Henry Jones Sr.'s disappearance, turning charm to mission urgency.
