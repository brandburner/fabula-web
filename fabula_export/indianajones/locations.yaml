  global_id: ger_location_0054fb03834c
  canonical_name: Lao Che's Negotiation Table
  description: Smoke drifts over this polished central table in Lao Che's ballroom,
    piled high with stacks of cash, glittering jewels, a poison vial, its antidote,
    and the black urn of Nurhachi's ashes. Indiana Jones, Lao Che, Willie Scott, Chen,
    and Kao Kan crowd around it, hands darting during tense haggling. Betrayal ignites
    when Chen shoots Wu Han here; objects scatter as Indy fights for the antidote
    amid gunfire and spilled champagne.
  location_type: Nightclub Ballroom Table
