  canonical_name: Omar's Cairo Safehouse (Bazaar Garage)
  description: A hidden, multi-functional safehouse disguised as a garage within Cairo’s
    bazaar, serving as a refuge and operational base for Indy and his allies. Features
    include a heavy roll-up door (for Indy’s truck), camouflaged market stalls, and
    interior space for hiding fugitives and planning. Accessed via the narrow alley
    leading to Omar’s Square.
  location_type: Cairo Safehouse
