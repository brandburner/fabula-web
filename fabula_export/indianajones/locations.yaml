  canonical_name: Dining Room - Sallah’s House (Old Cairo)
  description: Crowded dining room in Sallah’s Old Cairo house hums with family bustle
    as Indy and Marion receive a boisterous welcome. A mischievous monkey steals the
    show, doffing its turban, bowing low, and kissing Marion’s cheek to spark her
    rare laughter and melt her wariness. Fayah commands instant silence amid the children’s
    chaos, while Sallah layers on gracious hospitality in this tight, lively domestic
    heart that eases gathering tension.
