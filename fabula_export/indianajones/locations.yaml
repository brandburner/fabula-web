  global_id: ger_location_dbea5d1adac0
  canonical_name: Terminal Stairs
  description: Indy hurries down these stairs inside the crowded terminal building,
    steps quick amid the press of passengers and Nazi soldiers patrolling the space.
    Echoes bounce off concrete walls as leaflets with Henry's photo circulate quietly,
    sharpening the air with threat. Below stretches the boarding area, where Henry
    leans in a doorway reading his newspaper, papers ready for guards at the zeppelin
    line. Tension mounts with each descending footfall, escape hanging on swift reunion.
  location_type: Terminal Building Stairwell
  parent_location_uuid: null
