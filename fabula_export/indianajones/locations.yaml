  global_id: ger_location_35e89be6b215
  canonical_name: Pankot Palace Courtyard
  description: Willie stumbles into this empty courtyard inside Pankot Palace and
    stops, her desperate calls for help echoing off the surrounding walls. No one
    answers—servants or guards stay hidden—leaving her alone under the moonlit sky.
    The vast open space amplifies her isolation, its silence a stark reminder of the
    cult's total control over the palace grounds.
  location_type: Palace Courtyard
  parent_location_uuid: null
  season_appearances:
