  global_id: ger_location_5f61ac664e43
  canonical_name: DC-3 Mid-Flight Battle Cabin
  description: The DC-3's passenger cabin during the biplane strafe attack, where
    the space shifts from uneasy intimacy to a panicked battleground. This scene includes
    **bullet scars on walls, extinguisher foam, open doors with wind rushing in, and
    Indy unconscious under his hat**. Short Round drags a machine gun to the door
    for Willie to feed belts, and the Chinese Co-Pilot is described as giving a fearful
    glance. The cabin is damaged and chaotic, serving as the **climax of the flight**
    before evacuation.
