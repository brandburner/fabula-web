  canonical_name: Jungle River Near Mayapore Village (India)
  description: Fictionalized river in India, central to the survival sequence in *Indiana
    Jones and the Temple of Doom*. Features treacherous rapids, a muddy clearing,
    and a shaman waiting on the bank. Distinct from the Urubamba River in *Raiders
    of the Lost Ark*.
