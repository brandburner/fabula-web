  global_id: ger_location_74ea0dd42677
  canonical_name: College Side Garden
  description: Sunlit garden runs along the college building's side, directly accessible
    from Indiana Jones's private office window. Brick exterior meets dense hedges
    and winding dirt paths that offer immediate cover. Indy slips through the window
    to escape student chaos and launch his quest, footsteps hushing on paths. Later,
    he sprints down pavement into foliage, branches snagging clothes as he evades
    pursuers. Daylit calm hides tension, blending academic refuge with urgent flight.
  location_type: Campus Side Garden
