- fabula_uuid: ger_location_1bf584f5f4d5
  global_id: ger_location_1bf584f5f4d5
  canonical_name: Mayapore Village
  description: A desolate village in India serving as the primary setting for Indiana
    Jones's investigation, featuring impoverished homes, barren fields, and a dry
