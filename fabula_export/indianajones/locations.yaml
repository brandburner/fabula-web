  global_id: ger_location_2a1e006770ca
  canonical_name: Iskenderun Bazaar Streets (Last Crusade Chase Sequence)
  description: A sunbaked, labyrinthine network of streets in **Iskenderun, Turkey**,
    central to the *Last Crusade*’s frantic pursuit sequence. Unlike the Cairo alley
    in *Raiders*, these streets are characterized by their **tactical use of vendor
    stands as obstacles**, the presence of **camels and dense crowds**, and their
    role in **Brody’s capture**—a pivotal plot turn. The layout emphasizes **chaos
    and cover** rather than physical tightness.
  location_type: Crowded Bazaar Streets
