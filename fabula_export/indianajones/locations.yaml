  global_id: ger_location_1683230da11f
  canonical_name: Mayapore Hills
  description: The rutted path twists through the Mayapore Hills, first kicking up
    dust under a blazing sun as Indiana Jones, Willie Scott, and Short Round trudge
    its uneven surface amid barren slopes and weary isolation. After the Sankara Stones
    restore the land, the same route guides their return to the village, now flanked
    by lush green cliffs and flowing rivers. Freed children follow in a joyous procession,
    their steps light on the transformed earth thick with new life and relief.
