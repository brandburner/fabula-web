  canonical_name: Zeppelin Passenger Compartment
  description: Enclosed airship cabin lined with passenger seats and small tables
    beside large windows that frame the daytime sky. Indy and Henry settle here in
    false security, but Vogel and a Gestapo agent board, turning the space into a
    tense trap. Indy dons a steward uniform to collect tickets, yet scrutiny exposes
    him; he punches Vogel and hurls him through a window. Stunned passengers fall
    silent as the compartment seals their doom amid floating pursuit.
