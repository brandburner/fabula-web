  global_id: ger_location_2a3de53151df
  canonical_name: Command Tent (Nazi excavation camp)
  description: 'The command tent at the Nazi desert excavation: interior furnished
    tent where Marion is held (tied to a chair, gagged) and where Indy enters, frees
    her briefly and then slips out; the tent’s exterior/entrance is guarded by armed
    Nazi sentries with the wooden crate holding the Ark positioned nearby. The site
    is a focal point during the camp’s chaotic evacuation and airstrip explosion,
    tying interior captivity and exterior military security into a single physical
    location.'
  location_type: Nazi Camp Tent
