  description: Mist locks the Cairo Docks pier at night, cloaking the dark waterfront
    in haze. The tramp steamer Bantu Wind prepares to cast off under a single pool
    of light, where pirates load final stores. Indiana Jones and Marion embrace warmly,
    Sallah stands between them with a paternal send-off, and Captain Simon Katanga
