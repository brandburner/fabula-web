- fabula_uuid: ger_location_b43384509235
  global_id: ger_location_b43384509235
  canonical_name: Jetty at the Edge of the Canal
  description: Sunlit wooden jetty juts into the canal's murky edge amid Venice harbor
    waters, where Elsa steers the motorboat to a halt after the freighter propeller
    chaos. Kazim steps ashore onto weathered planks, dusts off his robes, and reveals
    Henry Jones Sr.'s imprisonment at Castle Brunwald before departing. Lapping waves
    and distant ship horns frame the tense resolution; Indy and Elsa watch him go,
    the air thick with saltwater spray and the weight of new intel.
  location_type: Canal Jetty
  parent_location_uuid: null
