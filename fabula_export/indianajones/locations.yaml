  global_id: ger_location_b38c7074fa00
  canonical_name: Suburban Street Leading to Jones Family Home
  description: Paved residential street with clapboard houses and picket fences, where
    Indy transitions from the perilous train tracks to reach his childhood home. Serves
    as a contrast to the wild, cliffside tracks, representing the 'safe' suburban
    path interrupted by the chase.
  location_type: Small Town Residential Street
