  global_id: ger_location_9327af5d46a0
  canonical_name: Pendulum Chamber (Center of the Temple)
  description: A lethal trap chamber within the Grail Temple, distinguished by its
    **swinging razor-sharp pendulum** that decapitates intruders. Unlike the Corridor
    Beyond the Pendulum, this space is **actively dangerous**, requiring Indy to either
    dodge the blade or disable the mechanism via a stone release. The chamber is defined
    by its **mechanical trap, ancient carvings, and divine judgment theme**, and it
    **precedes** the Corridor Beyond the Pendulum in the temple’s sequence of trials.
  location_type: Ancient Temple Trap Chamber
