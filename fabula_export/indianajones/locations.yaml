  global_id: ger_location_b1bad8e2e915
  canonical_name: Jungle Path to Pankot Palace
  description: Elephants force a path through thick tropical foliage as jungle sounds
    envelop the party. Short Round's shout pierces the din, spotting the white Pankot
    Palace crowning the distant canopy. Indy affirms their goal with steady focus
    while Willie gapes at the sight. This humid green corridor bridges raw wilderness
    to palace intrigue, heightening anticipation amid rustling leaves and humid air.
