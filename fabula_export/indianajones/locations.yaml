  global_id: ger_location_0546b0317310
  canonical_name: Window Ledge of the Castle
  description: Narrow ledge on the castle's storm-lashed exterior marks Indiana Jones's
    infiltration target. Wooden shutters bar the window until his boots crash through
    during a thunderclap that swallows the noise. Daylight pierces the jagged opening
    as he swings in on his bullwhip, transforming the exposed perch into a tense breach
    point between raging weather and Nazi-held shadows inside.
  location_type: Castle Exterior Window Ledge
