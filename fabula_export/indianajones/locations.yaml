  canonical_name: Cairo
  description: 'Cairo: a bustling Egyptian metropolis whose soaring minarets and ancient
    domes pierce the skyline and then give way to narrow alleys choked with chaotic
    bazaars. Fierce men in galabiyas jostle veiled women and barefoot children through
    dense crowds, creating anonymity that hides pursuits and deceptions. In this narrative
    the city is also the site of Nazi operations—communiqués to Berlin, the trucking
    and loading of the Ark, and planning for flights out—so its visual panoramas (the
    ancient skyline) and claustrophobic streets jointly establish atmosphere and plot
    logistics.'
