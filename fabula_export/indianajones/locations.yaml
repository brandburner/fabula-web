- fabula_uuid: ger_location_2ad425e112aa
  global_id: ger_location_2ad425e112aa
  canonical_name: Quarry Cavern
  description: |2-

          A **vast underground quarry cavern** combining:
          1. **Mechanical Systems**: A **massive waterfall** plunging into a **cistern pool**, powering conveyor belts and mine carts via chutes. Includes a **bucket chain** for climbing/escape and a **guard platform** overlooking the cistern.
          2. **Narrative Spaces**: **Balconies** for rituals/overseers, **branching tunnels** for escapes, and **snaking mine tracks** where enslaved children push carts toward a rock crusher. The cavern’s **humid, echoing expanse** amplifies industrial brutality (e.g., gunfire, giants, pulleys).
          **Key Distinction**: While the target (‘Quarry Cavern’) lacks explicit waterfall/cistern details, its **embedded context** (e.g., ‘roaring waterfall,’ ‘bucket chains,’ ‘balconies’) aligns perfectly with the source’s mechanics. The source’s **cistern and waterfall** are **sub-components** of the broader cavern described in the target. Merging consolidates these into a **unified quarry cavern** with mechanical and narrative layers.
