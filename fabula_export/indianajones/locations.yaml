  canonical_name: Great Abyss (Leap of Faith Chamber)
  description: A yawning 100-foot chasm within the Grail Temple's inner sanctum, marked
    by sheer stone walls dropping into shadowed depths from a carved lion's head ledge.
    The chasm serves as the 'Leap of Faith Chamber,' where ancient First Crusaders
    painted an optical illusion bridge across the void—an invisible path until approached,
    demanding absolute faith to traverse. Indiana Jones confronts this trial after
    prior challenges (pendulum, word puzzles), stepping into the void to land on the
    deceptive but solid path amid echoing winds and palpable dread. The abyss embodies
