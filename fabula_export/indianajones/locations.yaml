- fabula_uuid: ger_location_4339c60690ae
  global_id: ger_location_4339c60690ae
  canonical_name: Pankot Palace Main Entrance
  description: Pankot Palace's main entrance rises at the end of the marble bridge,
    where Rajput guards snap lances to attention in domino precision as Indiana Jones,
    Willie Scott, and Short Round cross the approach. This grand threshold shifts
    travelers from sunlit ceremonial pomp to the shadowed interior, guards' salute
    enforcing the palace's rigid discipline and heightening the trio's entry under
    scrutiny. Marble surfaces gleam under daylight, blending opulence with militarized
    formality.
  location_type: Palace Main Entrance
