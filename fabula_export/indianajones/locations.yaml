  global_id: ger_location_b849a3551698
  canonical_name: Crossroads (Berlin/Venice Sign)
  description: Dust covers cracked asphalt at this sunlit roadside junction where
    a weathered signpost points to Venice and Berlin. Indiana Jones skids the car
    to a halt after spearing a Nazi pursuer with a flagpole lance. He turns toward
    Venice to rescue Marcus Brody, but Henry Jones Sr. demands they retrieve his Grail
    Diary from Berlin instead. Their argument builds to a slap, the silent markers
    underscoring the clash between loyalty and obsession.
  location_type: Roadside Crossroads
