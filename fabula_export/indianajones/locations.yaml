- fabula_uuid: ger_location_a6ff9d65c173
  global_id: ger_location_a6ff9d65c173
  canonical_name: Temple of Death Balcony
  description: High stone balcony jutting over the cavernous floor of the Temple of
    Death, where a central crevasse glows with molten lava and an altar holds the
    pulsing Sankara Stones. This narrow, precarious vantage point—framed by sheer
    edges and oppressive shadows—serves as a critical staging area for Indiana Jones,
    Willie Scott, and Short Round. From here, they witness Mola Ram's brutal ritual
    sacrifices below, endure howling winds from adjacent tunnels, and observe the
    temple's supernatural dread. Indy uses this balcony as a launch point, uncoiling
    his bullwhip to swing across the fiery pit toward the altar in a desperate attempt
    to steal the Sankara Stones, while faint ritual chants and the rumbling depths
    of the temple underscore the scene's tension.
  location_type: Underground Temple Balcony
