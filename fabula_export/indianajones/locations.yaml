- fabula_uuid: ger_location_a4215bd8f839
  global_id: ger_location_a4215bd8f839
  canonical_name: Private Airliner Cabin
  description: Cabin of the private airliner flying from New York City to Venice under
    daytime skies. Indiana Jones hunches over his father's Grail Diary, fingers tracing
    a stained-glass window sketch and scanning numbers below that hint at coded directions.
    Engines hum steadily, receding as his focus tightens into quiet intensity amid
    the push to rescue Henry Sr. and halt the Nazis. Exterior shots frame the fuselage
    against clouds with a route map overlay, marking steady progress toward Europe.
  location_type: Private Airliner Cabin
  parent_location_uuid: null
