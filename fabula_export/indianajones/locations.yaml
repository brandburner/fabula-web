  global_id: ger_location_0f3cb92c6cb8
  canonical_name: Thuggee Shrine
  description: Hidden below Pankot Palace, the Thuggee shrine anchors the cult's resurgence.
    Indiana Jones names it during the Pleasure Pavilion dinner as proof of active
    Thuggee threat, linking palace leaders to stolen Sankara Stones and village woes.
    Chattar Lal's denial sharpens suspicion, casting the unseen chamber as a shadowed
    core of deception and ritual danger beneath the opulent surface.
  location_type: Subterranean Cult Shrine
  parent_location_uuid: null
