- fabula_uuid: ger_location_3c99745b3991
  global_id: ger_location_3c99745b3991
  canonical_name: Cavern Underground Harbor (German Command Center)
  description: |-
    Vast three-story subterranean cavern hollowed into coastal rock, serving as a dual-purpose **underground harbor and Nazi command post**. The cavern houses:
      - **Docks**: One end of the cavern features docks for a surfaced submarine, lined with wooden piers and crates.
      - **Military Infrastructure**: Stacked crates conceal motorcycles (including Indy’s escape bike) and ammunition; radio racks hum with orders. A **central white silk tent** holds the Ark of the Covenant amid military gear.
      - **Escape Route**: Rough stone walls echo with Vogel’s shouts, splashing water, and roaring engines as Indy and Henry Jones speed through on a motorcycle, topple Nazi soldiers into the dark river below, and vanish into shadowy tunnels. The space blends a **tactical hub** with a **high-speed escape route**, perpetually under dim light and pursuit threat.

      **Key Narrative Moments**:
      - Indy’s explosive emergence from a hidden crate onto his motorcycle, followed by a chaotic escape across the docks.
      - The Ark of the Covenant is temporarily housed here in the white silk tent.
      - Vogel’s furious screams and the splashing of soldiers into the river during the escape.
  location_type: Subterranean Military Harbor Cavern
