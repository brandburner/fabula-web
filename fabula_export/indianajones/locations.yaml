  canonical_name: Dark Dirt Path to Mayapore
  description: A dark dirt path snakes through moonlit, dying fields toward the black
    silhouette of Mayapore village at night. Wind moans through scraggly trees as
    a hidden POV runner sprints along it, breath urgent, silvered light twisting every
    shadow into a lurking threat. This racing route delivers raw motion and immediacy,
