  canonical_name: Swarm of Giant Bats in the Lower Jungles Sky
  description: A temporary, hostile phenomenon consisting of hundreds of giant bats
    that blot out daylight and plunge the lower jungles into shadow, forcing the group
    into survival mode. Occurs in the sky above the jungle, distinct from the ground-level
    terrain.
  location_type: Jungle Afternoon Sky
