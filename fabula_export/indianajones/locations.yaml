  canonical_name: Farmhouse
  description: Sturdy rural farmhouse sits at the edge of an open field, fronted by
    a wooden goat corral. An out-of-control plane skids through the corral fence and
    slams into the building, splintering wood and kicking up thick clouds of dust.
    Indiana Jones and Henry Jones Sr. scramble from the wreckage into the field as
    low-flying Messerschmitts strafe them, bullets tearing into the earth. They dive
    behind a nearby stone barricade. The site turns from quiet farmland into a debris-strewn
    crash zone pulsing with immediate danger and enemy fire.
