- fabula_uuid: ger_location_9d795094378a
  global_id: ger_location_9d795094378a
  canonical_name: Desert Road
  description: Morning light stretches across the narrow desert road as two trucks
    grind forward through drifting sand. Indiana Jones drops from Sallah's cab to
    meet Omar at the dusty pull-off, where the men confer in low voices and gesture
    toward distant dunes. Omar peels away with his crew of hidden diggers tucked in
    truck beds, kicking up gravel as they head to sweep the sands. Indy climbs back
    aboard, the convoy pressing on amid the vast, sun-baked emptiness that masks the
    race to the dig site.
  location_type: Desert Road
