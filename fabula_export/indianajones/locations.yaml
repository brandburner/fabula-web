  canonical_name: Chamber of a Thousand Skulls
  description: Indy and Marion pass through this catacomb chamber where walls bristle
    with a thousand stacked human skulls, their hollow gazes amplifying the underground
    horror. Scarabaeid beetles skitter across the surfaces, heightening the suffocating
    dread amid mummies and sarcophagi. Marion's nerves fray in the tableau, but Indy
    presses on, spotting a sunlight crack that shifts fear to escape.
  location_type: Catacomb Skull Chamber
