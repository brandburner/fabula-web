  global_id: ger_location_50e227fd1b60
  canonical_name: Piazza San Marco
  description: Sun-drenched Piazza San Marco pulses with crowds under the bright Venetian
    day. Elsa Schneider strides ahead, guiding Indiana Jones and Marcus Brody across
    the bustling square toward a Gothic church with weathered stone arches looming
    at its edge. The piazza's lively tourists and ordinary energy contrast sharply
    with the repurposed building's hidden secrets—Crusader vaults, Grail clues, and
    Nazi threats. Indy's blunt skepticism cuts the air as they near the threshold,
    marking the square as a deceptive gateway to danger.
  location_type: Historic City Square
