- fabula_uuid: ger_location_9ba93a7f2341
  global_id: ger_location_9ba93a7f2341
  canonical_name: The Chute (Underground Descent Passage)
  description: Narrow, steep underground chute serving as Indy's shortcut to the larger
    tunnel system. The trio's descent here is followed by the tidal wave surge, trapping
    them in claustrophobic darkness before propelling them toward the tunnel exit.
  location_type: Underground Chute
  parent_location_uuid: null
  season_appearances:
