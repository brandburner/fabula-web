  description: Sunbaked far corner of a deserted town square under harsh daylight.
    Indy dives behind cover here as two thugs drag a canvas-covered trunk toward a
    waiting Nazi truck; machine-gun bursts rake the pavement and tires screech. The
    truck careens into the corner wall, flips, and detonates — a cargo blaze and shockwave
    hurl Indy across the square as dust and flames engulf nearby buildings while Marion's
    muffled screams echo.
