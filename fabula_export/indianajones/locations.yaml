  description: 'Shanghai''s Dragon Nightclub dazzles with opulent art-deco interiors:
    a massive gong booms to summon a silver stairway where ethereal women in lamé
    gowns descend, their haunting melody ensnaring Indiana Jones, Willie Scott, and
    Short Round in hypnotic awe. The Thuggee cult weaponizes this seductive glamour
    to mask sinister rituals. Outside, a sloping green-tiled roof propels escapes;
    Indy and Willie crash through third-floor awnings, second-floor balconies, and
    mattresses before hitting a parked Duesenberg amid clattering tiles and night
    wind.'
