- fabula_uuid: location_c7f428341bde
  global_id: null
  canonical_name: Chachapoyan Temple (Peru)
  description: A claustrophobic, ancient Chachapoyan temple nestled in Peru's high
    jungle, renowned for its labyrinthine inclined passageways and lethal booby traps.
    The temple's exterior is a round, open black void shaped like a gaping maw of
    stone and shadow, surrounded by elaborate friezes and tangled vegetation, which
    terrifies the Yagua porters and serves as the expedition's destination. Its deadly
    mechanisms—collapsing floors, impaling spikes, poison darts, and a massive boulder
    chase—are triggered by haste or greed. Giant tarantulas and cobwebs drape bottomless
    pits, while skeletons litter the spiked floors. The sanctuary features a golden
    idol pedestal, lifting which incorrectly activates the temple's traps. The temple's
    traps are meticulously described, including torchlit passages, swarming tarantulas,
    and the final boulder chase that seals the exit. The temple's entrance is a round,
    open black void, and its grim history foreshadows the deadly traps ahead.
  location_type: Ancient Booby-Trapped Temple
  parent_location_uuid: null
- fabula_uuid: location_3d6f5ce78087
  global_id: null
  canonical_name: Chachapoyan Temple Stairway to Vined Landing
  description: Narrow stone stairway plunging into the Chachapoyan Temple's depths,
    culminating at a landing strewn with flattened human skeletons crushed by ancient
    traps. The stairway is framed by dead vines that coil around the entry like a
    trap, their brittle tendrils swaying in stale air. Indy halts Satipo with a sharp
    warning not to touch them, as the grim remains and oppressive gloom signal imminent
    peril amid cobwebs, darts, and collapsing floors. The steps are scattered with
    bones from failed trespassers, and every tread is a gamble against the temple's
    lethal mechanisms. The landing's bones crunch underfoot, and the air is dust-choked,
    echoing with the screams of past victims.
  location_type: Booby-Trapped Temple Stairway
  parent_location_uuid: null
- fabula_uuid: location_f3d3bac53b71
  global_id: null
  canonical_name: Chamber of Skulls
  description: Thousands of human skulls line the walls of this catacombs chamber,
    their empty sockets staring from the dim light and amplifying the macabre dread.
    The air hangs thick with decay, scarabs skitter across decayed mummies nearby,
    and the oppressive weight crushes forward momentum. Marion recoils visibly, her
    disturbance underscoring the space's role as a visceral peak of terror before
    a sunlight crack hints at escape.
  location_type: Catacombs Ossuary Chamber
  parent_location_uuid: null
- fabula_uuid: location_9792a1ecb9cd
  global_id: null
  canonical_name: Circus Train (Animal Car Interior)
  description: A speeding circus train (comprising multiple linked cars) barrels across
    open plains, its animal car interior forming a brutal gauntlet for Indiana Jones.
    The dimly lit stockcar interior is filled with wooden slats, scattered straw,
    and the musky scent of animals. Indy crashes through the collapsing roof during
    a high-speed chase, dodging an African lion's fangs and claws while retrieving
    the Cross of Coronado. The train's relentless speed shakes the car, and debris
    swirls from the jagged hole above. Other cars include a reptile boxcar teeming
    with snakes and an anaconda, rhino cars with knife fights, and lion dens with
    clawing threats. Interiors choke with beast musk and sweat; exteriors howl with
    speed and chaos. Fedora yanks Indy to safety through a breach in the animal car,
    transforming the cage from a deadly trap into a frantic exit point.
  location_type: Train Animal Car Interior
  parent_location_uuid: null
