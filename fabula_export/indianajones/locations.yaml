  global_id: ger_location_6d00cd69529d
  canonical_name: Pendulum Chamber (Grail Temple)
  description: Part of the Grail Temple in *Indiana Jones and the Last Crusade* (1989),
    this chamber features a **single pendulum blade** as its primary trap, testing
    intruders' humility. Unlike the Spike Chamber, it lacks retractable spikes or
    grinding walls and is thematically tied to medieval Christian mythology.
  location_type: Ancient Temple Trap Corridor
