- fabula_uuid: ger_location_445d3ae3365f
  global_id: ger_location_445d3ae3365f
  canonical_name: Ladder to the Mines
  description: A rope ladder plunges from the rear chamber of the Thuggee temple into
    the dark, twisting tunnels of the underground mines. Indiana Jones, Willie Scott,
    and Short Round scramble down after Indy's trance breaks, Chattar Lal burns in
    lava, and they reclaim the Sankara Stones. Ropes creak under their weight in stifling
    air thick with mine dust and heat from distant fires. Echoes carry slave chants
    and cart rumbles as the group flees the altar platform toward Mola Ram's pursuit.
  location_type: Rope Ladder to Underground Mines
