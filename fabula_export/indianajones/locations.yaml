- fabula_uuid: ger_location_ba972613c3f7
  global_id: ger_location_ba972613c3f7
  canonical_name: Willie's Chambers
  description: Willie's chambers in Pankot Palace offer a private guest space where
    she greets Indiana in a seductive nightgown, sharing grapes and engaging in flirtatious
    banter and kisses at the threshold. She leaves the door ajar as a teasing invitation
    amid hallway tension. Later the same night, her bloodcurdling scream pierces from
    within during Indy's nearby fight, marking the cult's intrusion into this fragile
    sanctuary. Servants once escorted her here for shaken recovery after violence,
    underscoring its role as intimate refuge turned site of terror.
  location_type: Palace Guest Chambers
