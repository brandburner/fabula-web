- fabula_uuid: ger_location_9d91cb313858
  global_id: ger_location_9d91cb313858
  canonical_name: Willie's Suite Verandah
  description: Indiana Jones, Blumburtt, and Chattar Lal walk toward this verandah
    after exiting Willie's suite, its adjacent position—likely open to palace air—marking
    a brief transition from interior drama. They stride here post-reunion and after
    inspecting the hidden doorway, the space channeling their movement and building
    tension ahead of the possession horror. Shadows stretch across stone floors and
    railings as night envelops Pankot Palace, the verandah exposing the group to cooling
    breezes amid mounting unease.
  location_type: Palace Suite Verandah
