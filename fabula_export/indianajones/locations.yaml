  description: Short Round darts into the DC-3's rear cargo compartment amid violent
    aerial maneuvers, grabs a stowed machine gun amid jostling crates and coiled ammunition
    belts, then hauls it forward to the passenger cabin. The confined space pitches
    with the plane's desperate banks, lit by stray cockpit glow and punctuated by
    distant engine roar and enemy gunfire echoes, turning stored gear into urgent
    weaponry during the dogfight.
  location_type: Transport Plane Cargo Hold
