  global_id: ger_location_827b9e918aec
  canonical_name: Cliff Overlooking the Rope Bridge Gorge (Temple of Doom)
  description: Sheer jungle cliff edge where Indy, Willie Scott, and Short Round stand
    after escaping the Thuggee mines via a burning rope bridge. Smoke rises from the
    gorge as British troops subdue remaining Thuggees, and the Maharajah bows to Short
    Round in gratitude. The Sankara Stone’s hidden diamond is revealed here, marking
    a shift from despair to awe and supernatural hope.
  location_type: Jungle Gorge Cliff Edge
