  canonical_name: Boarding Gates
  description: Guards scrutinize Indy and Henry's forged papers at this checkpoint,
    stern faces probing for flaws amid the terminal's press. The pair stands exposed
    in line, every second amplifying escape's fragility as the zeppelin waits beyond.
    Nazi oversight looms; one wrong glance unravels their flight from Berlin. Tension
    coils in the shuffle forward, disguises stretched thin under daylight glare.
