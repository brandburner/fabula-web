- fabula_uuid: ger_location_0bde8b7cd55c
  global_id: ger_location_0bde8b7cd55c
  canonical_name: Pankot Mine Tunnels (Including Mine Cart Chase)
  description: |-
    Claustrophobic network of narrow rock passages beneath the Pankot quarry, featuring both rail tracks for mine cart chases (e.g., the high-speed escape from Thuggee cultists) and broader mining operations. The tunnels include:
          1) **Mine Cart Chase Section**: A labyrinthine network of narrow, low-ceilinged mine tunnels with clattering rail tracks guiding rickety mine carts through sharp curves and under low-hanging beams. This section is the site of a high-speed chase where Indiana Jones, Willie Scott, and Short Round hurtle through dim passages while dodging gunfire. A dead-end stone wall forces a desperate manual brake, and a sabotaged cistern unleashes a tidal wave, flooding the tunnels and driving the trio into a narrow side passage for survival.
          2) **General Mining Passages**: Wet floors littered with debris and swarming with insects, where Willie crawls in terror while groping for hidden levers. Rails guide clanking mine carts through darkness, and low-hanging beams force ducks during frantic chases. Guards pursue blindly down confined shafts, heightening vulnerability until revolts erupt—children swarm from shadows to overwhelm captors. Echoes amplify shouts, breaths, and distant labor, turning every corner into a trap of fear and defiance.
  location_type: Underground Mine Tunnel Network
  parent_location_uuid: null
  season_appearances:
  - 1
  local_uuids:
