- fabula_uuid: ger_location_6e961ab822d4
  global_id: ger_location_6e961ab822d4
  canonical_name: Sultan’s Palace Courtyard, Iskenderun
  description: Sun-drenched open courtyard inside the Sultan’s palace in Iskenderun,
    serving as the high-stakes negotiation site for Donovan, Vogel, and the Sultan.
    The courtyard is adorned with trunks of looted gold and silver, and the gleaming
    Nazi Rolls-Royce Phantom II captivates the Sultan’s attention. Key narrative beats
    include tense negotiations, Kazim’s hidden vigilance, and Elsa’s dramatic descent
    with news of Indy and Henry’s escape, which disrupts the Nazi triumph. The space
    transitions from a scene of power and deal-making to one of crisis, framed by
    broad stairs and shadows that conceal unseen watchers.
  location_type: Palace Courtyard
