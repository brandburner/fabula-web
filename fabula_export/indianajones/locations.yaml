  canonical_name: Framework of the Zeppelin
  description: Exposed skeletal girders and struts form the Zeppelin's internal framework,
    resembling ribs of a colossal metal beast under the constant hum of engines. Indy
    and Henry burst from a hatchway onto a narrow catwalk, breaths ragged, faces urgent
    as they race toward doorways framing vast sky, clouds, and a crane-suspended biplane.
    Claustrophobic and precarious, the space drives their desperate escape amid looming
    Nazi pursuit and shrinking time.
