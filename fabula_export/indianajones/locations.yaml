  description: 'Indiana Jones enters his bedroom and faces stark destruction: the
    mattress lies gutted on the floor, drawers stand upended with contents spilled
    across surfaces, personal papers and belongings scatter in the chaos. Daylight
    streams through, highlighting the Nazi intruders'' methodical ransacking. This
    private retreat turns into a violated crime scene, its silence amplifying the
