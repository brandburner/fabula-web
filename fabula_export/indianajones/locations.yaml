- fabula_uuid: ger_location_43108b0143e1
  global_id: ger_location_43108b0143e1
  canonical_name: The Dragon Main Ballroom
  description: Central, opulent ballroom at the heart of The Dragon nightclub, where
    the club's nightlife unfolds. This space is characterized by swelling music, glittering
    decorations, and packed revelers engaged in dancing and conversations. Short Round
    targets this area as a scout, his street-worn presence clashing with the luxury
    and sophistication of the patrons. Unlike the Entrance Hall, this location is
    the **core of the nightclub's social and entertainment activities**.
  location_type: Nightclub Ballroom
  parent_location_uuid: null
  season_appearances:
