- fabula_uuid: ger_location_7bfa36785ecb
  global_id: ger_location_7bfa36785ecb
  canonical_name: Deck of a Portuguese Cargo Ship
  description: Waves crash across the slick deck as adult Indiana Jones battles the
    Man in the Panama Hat and his sailors amid a violent storm. Fuel drums roll wildly,
    slamming into fighters, while towering seas threaten to sweep all overboard. Chaos
    peaks in an explosion that rips the ship apart, forcing Indy to dive into the
    churning ocean below. The exposed space turns brawl into survival struggle, salt
    spray stinging as peril mounts.
  location_type: Cargo Ship Deck
  parent_location_uuid: null
  season_appearances:
