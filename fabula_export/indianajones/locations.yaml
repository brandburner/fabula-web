  description: The *correct fork* in the quarry’s mine cart tracks, revealed by the
    Maharajah after Short Round breaks Kali’s spell. Indy swings in on a pulley to
    join Willie’s cart, leading to a high-speed escape pursued by Mola Ram’s guards.
