- fabula_uuid: ger_location_87adee03b9a7
  global_id: ger_location_87adee03b9a7
  canonical_name: Pankot Palace Hallway
  description: A moonlit palace hallway within Pankot Palace where Willie races past
    ornate wall paintings, still disheveled from the temple tunnels. She halts in
    horror after glimpsing Chattar Lal's face in a mirror, then clutches Blumburtt's
    arm to drag him down the corridor, her pleas for help ignored. Later, women servants
    steady the fainting Willie through this dimly lit corridor after the grotesque
    feast, guiding her toward her chambers. Shadows deepen the space as Indiana and
    Short Round hurry toward their rooms, with Short Round recounting the Maharajah's
    supernatural details. The hallway bridges opulent public spaces to private guest
    quarters, echoing the palace's unease and serving as a key transit point for both
    dramatic and mundane interactions.
  location_type: Palace Corridor
