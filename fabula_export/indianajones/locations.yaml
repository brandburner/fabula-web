  canonical_name: Cliffside Tunnel Exit (Sheer Cliff Face)
  description: Sheer cliff face at the exit of a tunnel, plunging 300 feet into a
    gorge filled with thrashing crocodiles and rapids. The tunnel's violent geyser
    eruption hurls Indiana Jones, Willie Scott, and Short Round onto a narrow, crumbling
    ledge midway up the cliff. The cliff face is perilous to scale, with scarce footholds
    and rock flaking away under pressure. A rope bridge sways higher up, and the constant
    roar of water and whipping wind amplify the exposure, forcing Indy to scale the
    face alone while directing the others amid chaos. The cliff serves as a critical
    bottleneck, splitting the group and forcing desperate survival choices.
  location_type: Cliffside Tunnel Exit
  parent_location_uuid: null
