- fabula_uuid: ger_location_ef51df625a6b
  global_id: ger_location_ef51df625a6b
  canonical_name: Pleasure Garden
  description: A moonlit garden within Pankot Palace, featuring hundreds of lanterns,
    manicured paths, and a central ornate stone fountain. The space serves as a setting
    for lavish after-dinner gatherings with guests reclining on cushions, enjoying
    drinks, cigars, and hookah pipes. Beneath its opulent facade, the garden hosts
    clandestine meetings (e.g., Chattar Lal's secret exchange with a Thuggee cultist
    behind the fountain) and reveals supernatural threats (e.g., the Maharajah's glowing
    yellow eyes and hissing voice). The fountain itself becomes a focal point for
    covert observation and tension, particularly during Indiana Jones' confrontation
    with Short Round and the ruler's eerie revelations.
  location_type: Ornamental Garden Fountain
  parent_location_uuid: null
  season_appearances:
