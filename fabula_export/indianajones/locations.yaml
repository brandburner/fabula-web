    bears an engraved letter. Indy steps only on tiles spelling 'Jehovah'—the Latin
    name for God—to cross safely. Wrong steps trigger deadly pitfalls, swallowing
    victims into darkness. Tension mounts as Donovan watches and Indy's wounded father
