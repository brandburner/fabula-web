  description: Indy shadows the steward up these narrow stairs inside the zeppelin,
    the air thick with engine hum and takeoff rumble. Metal steps creak underfoot
    as he closes in for the impersonation, snatching the uniform in shadowed haste.
    Tension coils from below—Nazis storming the cabin shatter any relief, turning
    the stairwell into a tight corridor of desperate improvisation amid passenger
    murmurs and swaying motion.
