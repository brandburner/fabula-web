  description: Shanghai in 1935 frames Indiana Jones's deadly nightclub negotiation.
    Lao Che's ballroom packs with smoke-hazed tables of caviar and champagne where
    Indy swaps Nurhachi's ashes amid rising tension. Poison slips into drinks; Chen
    shoots Wu Han dead. Indy ignites a skewer fight, rolls a gong as shield through
    gunfire, and crashes stained-glass windows with Willie to flee. The city breeds
    black-market deals and warlord schemes that trap Indy in rivalries.
