  description: Guards shove Indiana Jones and Short Round through narrow, dimly lit
    rock walls toward Mola Ram's chamber. Thudding footsteps and barked orders echo
    off the rough stone, tightening the Thuggee cult's grip on their captives. The
    passage funnels dread, marking the final approach to Kali's ritual horrors in
