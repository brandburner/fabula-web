  canonical_name: Cistern Behind the Waterfall (Quarry Cavern)
  description: Hidden reservoir sits behind the quarry cavern's thundering waterfall,
    where water surges through channels to power the rumbling conveyor belt far below.
    A rattling bucket chain snakes upward, carrying runoff back to the cistern's overflowing
    lip. Short Round hauls himself along the slick, spray-lashed links amid echoing
    machinery roars and distant gunfire, the damp stone walls amplifying peril as
    Thuggee pursuit closes in during the frantic mine car escape.
  location_type: Water-Powered Cistern Reservoir
  parent_location_uuid: null
