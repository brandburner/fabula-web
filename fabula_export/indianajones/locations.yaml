  global_id: ger_location_76de5a5d4d14
  canonical_name: Post-Tunnel Mountain Gauntlet Road (Last Crusade)
  description: A steep, winding road emerging from a tunnel during the Grail quest,
    where Indy and Henry Jones Sr. fishtail their car at high speed. The Messerschmitt
    crash occurs *immediately after exiting the tunnel*, blocking the road and creating
    a climactic, high-stakes chase. The road's jagged terrain and sharp curves amplify
    the danger, making it a deadly gauntlet. Appears exclusively in *The Last Crusade*.
  location_type: Winding Mountain Road
  parent_location_uuid: null
