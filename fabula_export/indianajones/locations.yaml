  canonical_name: Fire Pit Chasm (The Pit)
  description: A gaping chasm filled with roaring flames and molten lava, known colloquially
    as *The Pit*, divides the altar from the worshippers' area in the underground
    temple tunnels. Intense heat radiates upward as flames lick at a makeshift wooden
    bridge spanning the gap. This location plays a critical role in the escape sequence
    during the revolt, where children dash across the smoldering plank before it ignites
    and collapses, stranding Indiana Jones, Willie Scott, and Short Round.
