  canonical_name: Cliff Edge (Nazi Tank Wreckage Precipice)
  description: 'The sheer cliff edge overlooking the smoldering wreckage of a Nazi
    tank far below, where Henry Jones Sr. stands in grief, confessing his regrets
    to Marcus Brody about his son, Indiana Jones. This location serves as a dramatic
    threshold for reconciliation: Indy staggers up battered from the wreckage, prompting
    a desperate father-son embrace before collapsing from exhaustion. The relentless
    desert wind sweeps in his fedora, scattering dust amid thick smoke rising from
    the inferno. The stark drop underscores the emotional weight of the scene, marking
    a pivotal moment of loss and reunion under the relentless sun. The location is
    central to the emotional climax of *Indiana Jones and the Last Crusade* (S1E3).'
  location_type: Cliff Precipice
  parent_location_uuid: null
- fabula_uuid: location_c70cfe69a486
