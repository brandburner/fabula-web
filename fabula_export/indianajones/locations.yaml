  canonical_name: Indy's Private Office
  description: Indy's private office stands as a hushed refuge adjacent to the outer
    office's student pandemonium. Indiana Jones slips inside for solitude, sifting
    mail at his desk until the cryptic Venice-postmarked envelope surfaces—a vital
    clue to his father's vanishing and the Grail mystery. Daytime light pours through
