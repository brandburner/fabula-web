  canonical_name: Colonel Musgrove's Office, The Pentagon
  description: Military office in the Pentagon, Washington, D.C., symbolizing institutional
    bureaucracy and the U.S. government's role in the Ark's fate. Contrasts with Indy's
    academic office in tone and function.
  location_type: Military Colonel's Office
  parent_location_uuid: null
- fabula_uuid: location_f207ecb2fad1
  global_id: null
  canonical_name: Conveyor Belt (Quarry Cavern)
  description: Horizontal conveyor belt *receiving* rocks from the ramp’s peak, transporting
    them toward the rock-crushing cylinder. Site of Indy’s wrestling match with the
    Thuggee giant across its shuddering surface.
  location_type: Quarry Conveyor Belt
  parent_location_uuid: null
- fabula_uuid: location_d97313e85033
  global_id: null
  canonical_name: Country Highway Outside Shanghai
  description: Trees line this rural highway beyond Shanghai's edges, their branches
    blurring past as the Duesenberg surges forward in the chase's final stretch. Lao
    Che's sedans close in, engines roaring through the night. The road carries Indy,
    Willie, and Short Round away from the squalid port and fading city lights, wind
    whipping through the open car amid the whine of tires and pursuit.
  location_type: Rural Highway
  parent_location_uuid: null
- fabula_uuid: location_ab03a8f0a7c2
  global_id: null
  canonical_name: Courtyard - Sallah’s House (Old Cairo)
  description: Residential courtyard at Sallah’s home in Old Cairo, Egypt; serves
    as a private meeting space for Indy and Sallah during the Ark’s assembly. Distinct
    from palace archways in other episodes.
  location_type: Residential Courtyard
  parent_location_uuid: null
- fabula_uuid: location_b7f5a7e0cca6
  global_id: null
  canonical_name: Courtyard of the Sultan's Palace, Iskenderun (Including Stairs and
    Archway)
  description: |-
    Private courtyard within the Sultan’s palace in Iskenderun, site of high-stakes negotiations over looted treasures between Donovan and the Sultan. The courtyard features:
          1. **Broad stone stairs** leading down into the sunlit space, where Elsa Schneider rushes to deliver news of Indiana Jones and Henry Jones Sr.'s escape. The stairs overlook the bargaining, where the Sultan rejects treasures for a Rolls-Royce, with guards and Kazim's watchful presence adding tension. Dust motes dance in the daylight, footsteps echo sharply, and the air carries voices of alliance forged amid Grail pursuit urgency.
          2. A **transitional archway**, serving as a key structural and narrative element during the Grail quest negotiations. The archway frames the scene and is distinct from residential courtyards in other episodes, emphasizing its role in the palace's power dynamics.

          The courtyard is distinct from the public Iskenderun Train Station and is a closed, private space central to the episode's climax.
  location_type: Palace Courtyard
  parent_location_uuid: null
- fabula_uuid: location_5bdc7d70ea8b
  global_id: null
  canonical_name: Crankwheel Mechanism Platform
  description: Narrow platform suspended above a glowing lava pit in the Temple of
    Death's altar chamber. A massive crankwheel dominates the space, turning to raise
    or lower the adjacent sacrificial frame toward flames below. Indiana Jones fights
    Thuggee priests here, dodges Chattar Lal's dagger strikes, and cranks the wheel
    to pull Willie Scott from certain death. Heat scorches the air, chants echo off
    stone walls, and torchlight casts frantic shadows amid the chaos of combat and
    ritual horror.
  location_type: Temple Altar Control Platform
  parent_location_uuid: null
- fabula_uuid: location_e4f93fd24e24
  global_id: null
  canonical_name: Crocodile-Infested Gorge Below the Cliff
  description: A perilous 300-foot-deep chasm filled with geysers and thrashing crocodiles,
    central to the escape sequence in *Indiana Jones and the Temple of Doom*. Characters
    observe it from above while escaping via mine cart, emphasizing its role as a
    source of danger.
  location_type: Crocodile-Infested Jungle Gorge
  parent_location_uuid: null
- fabula_uuid: location_07200c962059
  global_id: null
  canonical_name: Crowded Streets Near Iskenderun Train Station
  description: Sun-drenched, vendor-packed streets adjacent to Iskenderun's train
    station, where Sallah and Brody execute a desperate escape through pressing crowds.
    The chaotic scene features toppled market stalls, rising dust clouds, and frantic
    shouts as Nazis pursue from the nearby station. This urban environment serves
    as both an obstacle course and a potential sanctuary—highlighted by a shadowed
    doorway concealing the open rear of a troop truck—before becoming a fatal trap
    for the fugitives. The relentless heat and disorienting crowds amplify the tension
    of the botched escape.
  location_type: Urban Street Adjacent to Train Station
  parent_location_uuid: null
- fabula_uuid: location_1c3bf8d9aaaf
  global_id: null
  canonical_name: Culvert
  description: Narrow stone culvert lines the desert valley floor, offering Indy fleeting
    cover during the tank chase. He ducks behind its crumbling walls, scoops loose
    stones and rocks from the sandy bed and crevices, and jams them into the tank's
    side cannon. Dust kicks up from churning treads, hot wind carries echoes of gunfire
    off canyon walls, and the structure's low profile shields him just long enough
    for sabotage amid the chaos.
  location_type: Desert Culvert
  parent_location_uuid: null
- fabula_uuid: location_e4796fde3205
  global_id: null
  canonical_name: DC-3 Airplane Cockpit
  description: Distinct from the passenger cabin; this is the **pilot compartment**,
    containing flight controls (yokes, throttles, dials), where Indy attempts to pilot
    the plane during the biplane attack.
  location_type: Airplane Cockpit
  parent_location_uuid: null
- fabula_uuid: location_f584252fba73
  global_id: null
  canonical_name: DC-3 Airplane Passenger Cabin
  description: Distinct from the cockpit; this is the **main passenger area**, where
    chaos unfolds during the biplane attack, including gunfire, shattered windows,
    and passengers scrambling for parachutes.
  location_type: Propeller Airplane Cabin
  parent_location_uuid: null
- fabula_uuid: location_6bd4b43dae39
  global_id: null
  canonical_name: DC-3 Cabin
  description: A functional passenger aircraft cabin aboard a DC-3, characterized
    by rows of seats, dim seat lamps, and an overhead light. Serves as a tense, surveillance-driven
    workspace for Indiana Jones, where he deciphers Abner Ravenwood’s journal under
    the watchful gaze of a Nazi spy.
  location_type: Vintage Aircraft Cabin
  parent_location_uuid: null
- fabula_uuid: location_20484026103c
  global_id: null
  canonical_name: DC-3 Cargo Hold (Temple of Doom Ambush)
  description: Cramped rear storage compartment of a DC-3 airplane during the aerial
    ambush in *Indiana Jones and the Temple of Doom*. Serves as a battleground where
    Short Round and Indy defend against pursuing biplanes, filled with crates, machine
    guns, and emergency gear. Physically transforms from storage to a frantic defensive
    outpost amid fire and chaos.
  location_type: Aircraft Cargo Hold
  parent_location_uuid: null
- fabula_uuid: location_a283da79c441
  global_id: null
  canonical_name: Darkened Doorway with Curtain (Nazi Troop Truck Rear)
  description: Sunlight pierces the chaos of Iskenderun's train station, casting this
    darkened doorway in deceptive shadow. A heavy curtain drapes the entrance, swaying
    as Sallah points Brody inside for cover from pursuing Nazis. Brody charges through,
    expecting refuge, only for the fabric to part and reveal the truck's canvas interior.
    Engine rumbles mix with station din as doors clang shut, turning the feigned sanctuary
    into a mobile trap that hauls Brody away.
  location_type: Camouflaged Troop Truck Rear Entrance
  parent_location_uuid: null
- fabula_uuid: location_bcc82dfd1fd1
  global_id: null
  canonical_name: Deck and Bridge of the Vazquez de Coronado
  description: 'The Vazquez de Coronado is a cargo ship featuring two key locations:
    (1) its storm-lashed main deck (location_bcc82dfd1fd1), where Indiana Jones pursues
    the Man in the Panama Hat during a violent nighttime storm, and (2) its elevated
    command center (formerly location_d0c35077492c), reached by a rain-slicked ladder.
    The deck pitches violently under waves crashing over railings, fuel drums tumbling
    chaotically, while the enclosed bridge offers a false promise of control amid
    the chaos. The ship ultimately explodes in flames, forcing Indy to leap into the
    churning ocean below.'
  location_type: Cargo Ship Deck
  parent_location_uuid: null
- fabula_uuid: location_5270927d305b
  global_id: null
  canonical_name: Deep Pit Shaft of the Thuggee Mines
  description: A vertical shaft in the suffocating depths of the Thuggee mines, where
    enslaved children toil under brutal guards. Site of Indiana Jones' moral intervention
    and his plummet into the abyss after triggering a landslide.
  location_type: Underground Slave Mining Pit
  parent_location_uuid: null
- fabula_uuid: location_71b105a80c2a
  global_id: null
  canonical_name: Delhi
  description: Delhi emerges as the safe, familiar destination Willie Scott expects
    after the village hardships, a colonial hub where British Captain Blumburtt offers
    escort amid dawn negotiations at Pankot Palace. Characters view it as respite
    from Pankot's perils—urban order contrasts jungle dangers and Thuggee threats.
    Willie's protests highlight its role as civilized retreat, pulling against Indy's
    urgent mission shift.
  location_type: Colonial Indian City
  parent_location_uuid: null
- fabula_uuid: location_410785c363a3
  global_id: null
  canonical_name: Desert Canyon Overlook (Donovan Convoy Reconnaissance)
  description: Rocky, elevated hills overlooking a desert valley and canyon walls,
    where Indiana Jones, Henry Sr., and Sallah observe Donovan’s tank-led convoy.
    Serves as a tactical vantage point during a chase scene in *The Last Crusade*,
    with return fire and imminent pursuit.
  location_type: Desert Hills Overlook
  parent_location_uuid: null
- fabula_uuid: location_081c23744cd2
  global_id: null
  canonical_name: Desert East of Iskenderun (Nazi Escape Route)
  description: Initial desert expanse east of Iskenderun where the Nazis gain their
    head start in the afternoon, marked by endless dunes and distant canyons. This
    is the starting point of the chase, where the convoy departs the city and begins
    its race for the relic.
  location_type: Desert Route
  parent_location_uuid: null
- fabula_uuid: location_ae38b424b29f
  global_id: null
  canonical_name: Desert Railroad Tracks (Pueblo Ruins Chase)
  description: Part of a desert chase scene in *The Adventures of Indiana Jones S01E03*,
    where Indy uses the tracks to escape Fedora’s gang on horseback. Located near
    Pueblo ruins under blinding daylight, serving as a narrow escape route amid rugged
    terrain.
  location_type: Cliffside Railroad Tracks
  parent_location_uuid: null
- fabula_uuid: location_44aa2e4ec763
  global_id: null
  canonical_name: Desert Road Convoy Junction (Tanis Race Split)
  description: A narrow mountain road descending into a sun-scorched desert, serving
    as a critical **convoy convergence/divergence point** during the race against
    Nazis. Sallah’s lead truck continues forward with Indy, while Omar’s truck veers
    off with additional workers, marked by dust clouds and arid silence.
  location_type: Desert Roadway
  parent_location_uuid: null
- fabula_uuid: location_e2269c7a0190
  global_id: null
  canonical_name: Desert Valley (Box Canyon) [Kazim's Ambush Site]
  description: Confined desert canyon serving as the episode's **primary combat sequence**,
    where Kazim's forces ambush Donovan's convoy. Defined by **violence, tactical
    movement, and enclosed geography** (tank blasts, swirling dust). Directly precedes
    the group's journey to the Secret Canyon.
  location_type: Desert Box Canyon
  parent_location_uuid: null
- fabula_uuid: location_818512927b6b
  global_id: null
  canonical_name: Deserted Alley
  description: Indiana Jones ducks through adjacent buildings into this narrow, shadowed
    alley off Cairo's crowded streets. He intercepts two Arab collaborators carrying
    baskets, cracks his whip to disarm them, and exposes caches of hidden weapons
    inside. Dust settles in the sudden silence broken by violence, turning hoped-for
    rescue into brutal deception amid the ongoing chase.
  location_type: Urban Alleyway
  parent_location_uuid: null
- fabula_uuid: location_8e1f75a2576a
  global_id: null
  canonical_name: Deserted Cairo Square (Raiders of the Lost Ark)
  description: Primary urban plaza in Cairo where Indy witnesses Marion Ravenwood's
    abduction by Nazis and a truck explosion. Serves as the central setting for the
    sequence, distinct from the surrounding buildings that are destroyed in the blast.
  location_type: Abandoned Urban Square
  parent_location_uuid: null
- fabula_uuid: location_896abfd114fd
  global_id: null
  canonical_name: Deserted Mediterranean Beach (Last Crusade)
  description: Deserted coastal beach in the Mediterranean with bomb craters, serving
    as the setting for Henry Jones Sr.'s seagull-assisted downing of a Messerschmitt
    plane in *The Last Crusade* (S1E3). Daytime, land-based, and focused on aerial
    combat.
  location_type: Deserted Coastal Beach
  parent_location_uuid: null
- fabula_uuid: location_7c6be6889aa7
  global_id: null
  canonical_name: Desolate Indian Countryside (Temple of Doom's Barren Expanse)
  description: A thematically oppressive, lifeless desert landscape in *Indiana Jones
    and the Temple of Doom* (Episode 2), where Indiana Jones, Short Round, and Willie
    Scott travel under a sense of impending peril. Distinct from other deserts in
    the series by its lack of trees, water, or wildlife, and its role as a psychological
    amplifier of the group's unease.
  location_type: Arid Rural Plains
  parent_location_uuid: null
- fabula_uuid: location_61eb7716bf69
  global_id: null
  canonical_name: Distant Hills
  description: Rolling hills rise above the jungle treeline, breaking the dense canopy
    to reveal Pankot Palace in the distance—a stark white Moghul fortress dominating
    the horizon. Short Round climbs here to survey the vista and first spots the palace,
    while Indiana Jones and Willie Scott take in its ominous silhouette. The elevated
    terrain offers eerie clarity after the suffocating jungle, elephants halt nearby,
    and silence falls as tension mounts before their approach.
  location_type: Jungle Hillside Overlook
  parent_location_uuid: null
- fabula_uuid: location_3bd52c2bc5ba
  global_id: null
  canonical_name: Dogleg - Approach to Cairo
  description: Part of *Raiders of the Lost Ark* (1981), this mountain road hairpin
    turn is the final dogleg before Cairo, featuring a high-speed chase where Indy’s
    truck slams a Nazi staff car off the embankment.
  location_type: Mountain Road Hairpin Turn
  parent_location_uuid: null
- fabula_uuid: location_46112dab934b
  global_id: null
  canonical_name: Donovan Private Airfield (Venice Airfield)
  description: Sunlit tarmac at Donovan's private airfield in Venice, where a black
    limousine is parked beside a private airliner marked with the Donovan Corporate
    Logo. The group gathers under clear skies as Indy, Brody, and Donovan prepare
    for departure. Jet fuel scents the air, engines idle with low rumble, and the
    open expanse conveys poised departure tension. This departure point crackles with
    unease, the airfield's stark functionality underscoring the mission's fragile
    start and hidden threats. Indy listens intently as Donovan delivers his stark
    warning—'Don’t trust anybody'—before boarding the private airliner.
  location_type: Private Corporate Airfield
  parent_location_uuid: null
- fabula_uuid: location_b13fa111ee3c
  global_id: null
  canonical_name: Donovan’s Penthouse Apartment
  description: Opulent Art Deco penthouse owned by Walter Donovan, filled with museum-quality
    artifacts. Serves as a high-society setting where Donovan unveils the Grail Tablet,
    creating tension amid a cocktail party.
  location_type: Luxury Penthouse Apartment
  parent_location_uuid: null
- fabula_uuid: location_b0cc639c15e8
  global_id: null
  canonical_name: Donovan’s Penthouse Cocktail Party Room
  description: Adjacent sub-room of Donovan’s Penthouse Apartment, where guests mingle
    during the cocktail party. Linked to the main penthouse space by a door, this
    room serves as the public facade to Donovan’s private Grail intrigues.
  location_type: Penthouse Reception Room
  parent_location_uuid: null
- fabula_uuid: location_beb03956552a
  global_id: null
  canonical_name: Dr. Fantasy's Magic Caboose
  description: Indiana Jones reaches this caboose as the final car on the speeding
    circus train, spotting the sign 'Dr. Fantasy's Magic Caboose' above its door after
    dodging snakes, rhinos, lions, and Fedora's demand for the Cross. He steps inside,
    the train's rumble shaking the frame, offering hinted escape from Nazi pursuit
    and betrayal. Circus flair clashes with chase tension, turning the space into
    a threshold of mystery and looming challenge.
  location_type: Circus Train Caboose
  parent_location_uuid: null
- fabula_uuid: location_61240c27c54c
  global_id: null
  canonical_name: Dump Ramp (Quarry Cavern)
  description: Steep, sloped ramp *preceding* the conveyor belt, where mine cars ascend
    and rocks spill onto the belt’s surface. Critical transition point for Indy’s
    fight with the Thuggee giant atop a mine car.
  location_type: Underground Mine Dump Ramp
  parent_location_uuid: null
- fabula_uuid: location_e4eef35d9326
  global_id: null
  canonical_name: Elsa's Bathroom
  description: Secondary intimate space where Indy **bursts in unannounced**, catching
    Elsa in a vulnerable moment post-shower. The compact, steam-filled bathroom with
    soft music creates tension before the interaction spills into the adjacent bedroom.
  location_type: Private Bathroom
  parent_location_uuid: null
- fabula_uuid: location_a256f7e146f0
  global_id: null
  canonical_name: Elsa’s Private Bedroom
  description: Primary setting for the emotional and physical climax of Indy and Elsa’s
    confrontation, featuring a ransacked state and a bed as central props. Adjacent
    to Elsa’s Bathroom, where their interaction begins but is interrupted.
  location_type: Private Guest Bedroom
  parent_location_uuid: null
- fabula_uuid: location_9d9277f13bc8
  global_id: null
  canonical_name: Escape Route Outside the Spike Chamber (Pankot Palace)
  description: Indiana Jones shoves open a large door from the spike chamber, revealing
    this narrow escape route in Pankot Palace's tunnels. A soft wind howls through
    the passage, brushing their sweat-slicked faces with cool air that promises safety
    after the crushing spikes. Dim walls close in under flickering torchlight, guiding
    Indy, Willie, and Short Round's frantic steps deeper into the labyrinth away from
    Thuggee traps.
  location_type: Subterranean Escape Tunnel
  parent_location_uuid: null
- fabula_uuid: location_fc360837ecdc
  global_id: null
  canonical_name: Exterior Entrance to Grail Temple (Canyon of the Crescent Moon)
  description: Grecian facade entrance to the Grail Temple in the Canyon of the Crescent
    Moon, marking the transition from collapsing interior to exterior. Symbolizes
    survival and family renewal, associated with the escape of Indiana Jones, Henry
    Jones Sr., Sallah, and Marcus Brody from temple destruction.
  location_type: Ancient Temple Entrance
  parent_location_uuid: null
- fabula_uuid: location_29d8e8cde62d
  global_id: null
  canonical_name: Exterior Mosque (Republic of Hatay)
  description: Public mosque in the Republic of Hatay with exterior domes, minarets,
    and stone courtyards. Site of Walter Donovan's deal with the Sultan for excavation
    rights. Adjacent to but distinct from the canyon ruins and hidden temple where
    the Grail trials occur.
  location_type: Mosque
  parent_location_uuid: null
- fabula_uuid: location_f2e7c2ecdbf6
  global_id: null
  canonical_name: Exterior Window Ledge (Castle Brunwald - Henry's Room Access)
  description: Part of *Castle Brunwald*'s exterior, directly adjacent to Henry Jones
    Sr.'s room. Used during the *rescue sequence* where Indy climbs the ledge to enter
    the castle, interacting with Nazis, Elsa Schneider, and Henry Sr. Distinct from
    the Zeppelin's exterior framework.
  location_type: Castle Exterior Window Ledge
  parent_location_uuid: null
- fabula_uuid: location_3842490cebc5
  global_id: null
  canonical_name: Far End of the Rope Bridge (Thuggee Side)
  description: Thuggee forces claim this precarious cliffside terminus at the rope
    bridge's far end, where rotting planks meet sheer rock over a crocodile-infested
    gorge. Mola Ram flanks guards here, dagger gleaming as he threatens Willie and
    Short Round across the swaying span. Winds howl up the abyss while archers later
    notch flaming arrows from this elevated perch, raining fire on dangling survivors
    amid echoing roars and snapping jaws below. Tension coils in the exposed stone
    perch, turning it into standoff ground zero.
  location_type: Rope Bridge Cliff Endpoint
  parent_location_uuid: null
- fabula_uuid: location_5aa0a90e96af
  global_id: null
  canonical_name: Foyer of the Sanctuary (Chachapoyan Temple)
  description: A 50-foot-long, narrow hallway antechamber leading to the Sanctuary,
    featuring a floor disguised as cobwebs concealing a bottomless pit and a whip-swinging
    sequence. Satipo’s betrayal occurs here, dropping Indy’s whip into the pit.
  location_type: Ancient Temple Foyer
  parent_location_uuid: null
- fabula_uuid: location_74877196ecb0
  global_id: null
  canonical_name: Gangplank of the Bantu Wind
  description: A narrow walkway lit by a single small light juts from the weathered
    tramp steamer Bantu Wind into Cairo's night-shrouded docks. Indy, Marion, and
    Sallah huddle in a tight embrace here, salt air mingling with diesel fumes and
    Sallah's cigarette smoke. Captain Katanga observes from the rail, pipe smoke curling
    upward, as crew tension and distant engine hum underscore the fragile divide between
    fleeting safety and Nazi pursuit.
  location_type: Ship Gangplank
  parent_location_uuid: null
- fabula_uuid: location_9b7a914826d6
  global_id: null
  canonical_name: German Agent Hideout
  description: Shadows cloak the interior where Monkey Man delivers the monkey's bazaar
    sighting to stern German agents. They huddle over maps, plotting the ambush amid
    cigarette smoke and urgent whispers. Cairo's distant clamor filters through cracked
    walls, heightening the stakes of their covert coordination against Indiana Jones.
  location_type: Urban Safehouse
  parent_location_uuid: null
- fabula_uuid: location_215cc1f36e18
  global_id: null
  canonical_name: Government Warehouse (Main Storage Aisle)
  description: A vast, labyrinthine government warehouse filled with towering stacks
    of identical wooden crates, forming narrow aisles that vanish into dim infinity.
    The space is characterized by bureaucratic anonymity, where sacred power (e.g.,
    the TOP SECRET-crated Ark or ARMY INTEL crates) is buried among thousands of indistinguishable
    crates. A lone warehouseman (the Little Old Government Warehouseman) navigates
    the aisles, pushing crates on a dolly, their wheels rumbling faintly. Dust motes
    drift in the still air, pierced occasionally by faint forklift hums. The warehouse
    embodies the theme of sacred objects dissolving into indifferent, war-machine
    bureaucracy. The aisles are indistinguishable from one another, creating a maze-like
    environment where the Ark of the Covenant and other relics are lost amid the war's
    machinery.
  location_type: Government Storage Warehouse
  parent_location_uuid: null
- fabula_uuid: location_cf3b47895767
  global_id: null
  canonical_name: Grail Chamber
  description: This compact inner sanctum anchors the temple's deepest mystery. An
    altar dominates the space, burdened with a vast array of ornate chalices that
    gleam under faint, ethereal light—decoy vessels surrounding the true Grail. The
    ancient Grail Knight stands guard in weathered armor, his blade ready. He challenges
    Indiana Jones to combat, testing resolve before offering the sacred duty of guardianship.
    Dust motes hang in still air; the chamber hums with millennia-old reverence and
    peril.
  location_type: Ancient Temple Sanctum
  parent_location_uuid: null
- fabula_uuid: location_42c89759e55f
  global_id: null
  canonical_name: Green-Tiled Roof (Outside The Dragon Nightclub)
  description: Slippery green tiles cover this steeply sloped roof directly outside
    The Dragon Nightclub's rear stained-glass window. The massive gong tumbles down
    first after shattering glass, followed by Indy and Willie who crash onto it and
    slide wildly through snapping awnings and a taut mattress. Night wind lashes them
    during the three-story plunge; they narrowly dodge death before ripping into the
    Duesenberg below. This precarious ledge turns nightclub chaos into a hurtling
    escape.
  location_type: Sloped Nightclub Roof
  parent_location_uuid: null
- fabula_uuid: location_33b6201cb71b
  global_id: null
  canonical_name: Grove of Trees (Plateau Above the Gorge in *Temple of Doom*)
  description: Rocky plateau location in *Indiana Jones and the Temple of Doom* (S01E02),
    where Thuggee archers fire flaming arrows at a rope bridge below. Sheer cliffs
    and whipping winds characterize the setting, distinct from other jungle groves
    in the series.
  location_type: Plateau Overlook Grove
  parent_location_uuid: null
- fabula_uuid: location_f9fca5719640
  global_id: null
  canonical_name: Hall of Shadows
  description: Twisting hallway burrowed deep in the ancient temple, narrow and dark
    with echoing drips and scuttling sounds. Giant tarantulas swarm from niches and
    ledges, forcing Indy to whip them away while he plucks small artifacts. Claustrophobia
    grips the space as he and Satipo edge forward, every shadow hiding arachnid peril
    amid dripping stone walls.
  location_type: Insect-Infested Temple Corridor
  parent_location_uuid: null
- fabula_uuid: location_b7217ee68a14
  global_id: null
  canonical_name: Hallway Between Indy’s and Elsa’s Bedrooms
  description: A narrow, dimly lit transitional space explicitly designed to emphasize
    the physical and emotional proximity—and fragility—of Indy’s and Elsa’s relationship.
    Unlike the private interiors of their bedrooms, this hallway serves as a liminal
    zone where tension builds before their confrontation.
  location_type: Guest Bedroom Corridor
  parent_location_uuid: null
- fabula_uuid: location_eaf8873d8af5
  global_id: null
  canonical_name: Henry Jones Sr.'s House (Jones Family Residence)
  description: A suburban family home featuring multiple rooms, including a study
    where Henry Sr. works, a front hall (entryway), a private research library, a
    front porch (exterior), a front room (interior entry space), and a sitting room.
    The house is ransacked by intruders, marking a violation of its sanctuary status.
    This is the primary residential space for the Jones family. The front room is
    the interior entry space where antagonists (Sheriff, Fedora, Roscoe) burst in
    to seize the Cross of Coronado. Young Indy witnesses the betrayal from the nearby
    study, marking the climax of the scene's invasion arc. The house's mailbox is
    labeled 'JONES'.
  location_type: Suburban Family Home
  parent_location_uuid: null
- fabula_uuid: location_2c0e16995c58
  global_id: null
  canonical_name: Henry's Room - Castle Brunwald
  description: Interior prison chamber *accessible via* the exterior window ledge,
    where Henry is held captive and the climax confrontation occurs.
  location_type: Castle Prisoner Quarters
  parent_location_uuid: null
- fabula_uuid: location_572b7e5bab2e
  global_id: null
  canonical_name: Hidden Chamber
  description: Escape chamber revealed in the Well of Souls (Raiders of the Lost Ark);
    leads to surface via dawn-lit path. Distinct from trap chambers in other Indy
    narratives.
  location_type: Ancient Escape Chamber
  parent_location_uuid: null
- fabula_uuid: location_c106252eac10
  global_id: null
  canonical_name: Hidden Temple Sanctum (Canyon of the Crescent Moon)
  description: The sacred inner chambers of the Grail Temple in the Canyon of the
    Crescent Moon, housing the Holy Grail and the trials of faith (kneeling idols,
    pressure stones, chasm leap). This is where Elsa Schneider’s greed breaches the
    Great Seal, triggering the temple’s collapse and unleashing its protective wrath.
    Also the site where Indiana Jones chooses the true Grail and heals his father,
    guarded by the Grail Knight.
  location_type: Ancient Temple Sanctum
  parent_location_uuid: null
- fabula_uuid: location_dc5332d95bad
  global_id: null
  canonical_name: High Platform Next to the Waterfall (Quarry Cavern)
  description: A narrow, elevated stone platform jutting beside the quarry cavern's
    waterfall, used by Mola Ram and guards as a sniper’s perch to ambush the mine
    car below. Physically part of the Quarry Cavern but functionally distinct as a
    tactical overwatch point.
  location_type: Elevated Firing Platform (Underground Quarry)
  parent_location_uuid: null
- fabula_uuid: location_094046d6f0f7
  global_id: null
  canonical_name: Himalayan Crash Site Peak (Indy’s DC-3 Wreckage)
  description: Snow-covered Himalayan mountain peak in *Indiana Jones and the Temple
    of Doom*, serving as the crash site for Indy’s DC-3 and Kao Kan’s biplane. Marks
    the transition from aerial combat to frozen survival, with jagged escarpments,
    whipping winds, and powdery snow descents.
  location_type: Snow-Capped Mountain Peak
  parent_location_uuid: null
- fabula_uuid: location_5c4d5d56bc1e
  global_id: null
  canonical_name: Hok's Museum
  description: Interior grand hall of Tengtu Hok's palace compound, housing ancient
    artifacts and secured by elite samurai. Serves as the primary setting for the
    heist and conflict, featuring ventilation shafts, high windows, and a rear stone
    wall as access points. The massive gong functions as an alarm system, triggered
    when cases shatter during intrusions.
  location_type: Guarded Palace Museum
  parent_location_uuid: null
- fabula_uuid: location_ed22251fe2e4
  global_id: null
  canonical_name: Hok's Palace - Entry Hall
  description: German officers stand in this magnificent foyer, flanked by Japanese
    soldiers and a Chinese advisor, as they wait impatiently for Tengtu Hok's greeting.
    Gold-draped pomp fills the space during his prolonged ceremonial bows, forcing
    the Nazis into visible submissiveness that underscores Hok's absolute control
    over visitors in his palace domain. Tension builds from their glares and stiff
    postures amid the opulent entryway.
  location_type: Palace Entry Hall
  parent_location_uuid: null
- fabula_uuid: location_241570945953
  global_id: null
  canonical_name: Hok's Palace Compound
  description: High walls encircle Hok's Palace Compound, a modest yet grand fortress
    that radiates Tengtu Hok's authority in the bustling city streets. The front gate
    halts screeching Nazi limousines, where German officers endure Hok's slow ceremonial
    bows amid gold-draped pomp. Bang Chow slips toward the entrance with his suitcase,
    unnoticed, while Kehoe carves a hidden breach in the rear wall, positioning a
    trash bin to mask the gap. Tension crackles as Allied stealth collides with Nazi
    impatience in this volatile battleground for the Ark.
  location_type: Walled Palace Compound
  parent_location_uuid: null
- fabula_uuid: location_0dcc3991f8e8
  global_id: null
  canonical_name: Hok's Palace Second-Floor Footbridge
  description: Elevated exterior footbridge connecting Hok's Palace to the adjacent
    museum, distinct from interior chambers like the tea room. Site of the chase sequence
    and explosive destruction.
  location_type: Elevated Palace Walkway
  parent_location_uuid: null
- fabula_uuid: location_d50831e86ee3
  global_id: null
  canonical_name: Hok's Palace Tea Room
  description: Intimate interior chamber within Hok's Palace, distinct from exterior
    walkways or bridges. Serves as the setting for the tea ceremony and initial alarm
    trigger, preceding the chase sequence.
  location_type: Palace Tea Room
  parent_location_uuid: null
- fabula_uuid: location_4156e86912be
  global_id: null
  canonical_name: Hok’s Museum Roof
  description: Exposed rooftop atop Hok's Museum, serving exclusively as an escape
    route for Indiana Jones. Lacking cover, it is a flat surface where German soldiers
    on the palace walkway unleash immediate gunfire. The roof is accessed via high
    windows from the museum interior and is the site of Indiana Jones' vault over
    the edge onto a speeding car below.
  location_type: Museum Rooftop
  parent_location_uuid: null
- fabula_uuid: location_35b019416426
  global_id: null
  canonical_name: Hold of the Bantu Wind
  description: Crated Ark of the Covenant sits stored amid stacked cargo in this dim,
    confined hold aboard the Bantu Wind. Nazis smash through during the night ambush,
    rifles ready, their faces breaking into satisfied grins at the prize. They muscle
    the heavy crate out past clutter and shadows, transforming the tight space from
    quiet storage into a flashpoint of conquest and departure amid echoing shouts
    from the decks above.
  location_type: Ship's Cargo Hold
  parent_location_uuid: null
- fabula_uuid: location_7bb3ab37d602
  global_id: null
  canonical_name: India
  description: The trio's raft surges through brutal rapids before drifting into calm
    waters along a muddy bluff. It halts at the feet of a painted Shaman who stands
    silent under stark sunlight, his eerie gesture met by Indy's knowing nod. Howling
    winds cut the stillness, signaling entry into supernatural dangers. Willie clutches
    her ripped dress amid the mud, her complaints underscoring the shift from physical
    peril to ancient, ominous forces that govern this riverside threshold.
  location_type: Riverside Bluff
  parent_location_uuid: null
- fabula_uuid: location_4421a7ed0e74
  global_id: null
  canonical_name: Indiana Jones' Lecture Hall
  description: Amphitheater-style lecture hall where Indiana Jones delivers archaeology
    lectures, distinguished by tiered seating, a lectern, academic artifacts (e.g.,
    bones, maps, charts), and towering stacks of reference books. The space serves
    as both a classroom and a war room, where scholarly chaos (e.g., chalk dust, relics
    of forgotten expeditions) transforms into tense discussions about global threats
    like the Ark of the Covenant. Functions as a narrative bridge between Indy’s academic
    life and adventuring past (e.g., Cross of Coronado handoff, Army Intelligence
    briefings).
  location_type: University Lecture Hall
  parent_location_uuid: null
- fabula_uuid: location_bf0ed7542c6c
  global_id: null
  canonical_name: Indiana's Hut
  description: A smoke-filled hut where the Shaman performs healing rituals, involving
    Nainsukh's recovery, the Sankara revelation, and interactions with elders and
    Willie Scott. Distinct from Indiana's Hut by its ritualistic purpose and character
    interactions.
  location_type: Village Hut
  parent_location_uuid: null
- fabula_uuid: location_792946384c39
  global_id: null
  canonical_name: Indiana's Suite
  description: Opulent guest suite in Pankot Palace boasting wall paintings of palace
    scenes, Rajput princes, landscapes, and armed guards. A Thuggee assassin emerges
    from behind one painting to ambush Indiana Jones at night. Indy turns the room's
    whirring ceiling fan against the killer, snagging his cord in a fatal snare. The
    magnificent decor cloaks the palace's lurking dangers, blending luxury with sudden
    violence.
  location_type: Palace Guest Suite
  parent_location_uuid: null
- fabula_uuid: location_ba0cae4df9a5
  global_id: null
  canonical_name: Indy's Cabin on the Bantu Wind
  description: A private, intimate cabin aboard the tramp steamer Bantu Wind, featuring
    a narrow cot, paneled walls, and close quarters. Serves as a sanctuary for Indy
    and Marion’s emotional reconciliation, where past betrayals are addressed and
    their relationship is briefly shielded from external threats before being disrupted
    by Nazi shouts.
  location_type: Tramp Steamer Cabin
  parent_location_uuid: null
- fabula_uuid: location_83a78ac39c80
  global_id: null
  canonical_name: Indy's Office, Small Eastern College (Outer Reception)
  description: 'University professor''s office at Small Eastern College, consisting
    of two distinct but connected spaces: (1) a **private inner office** (cramped,
    cluttered with academic papers, bookshelves, and mail, where Indy reads the cryptic
    letter from Venice and transitions into adventure) and (2) an **outer reception
    area** (administrative chaos, stacks of mail/messages, and Irene’s desk, serving
    as a transitional space reflecting Indy’s distracted state before diving into
    crises). The private office serves as the core space reflecting Indy’s dual identity
    as an academic and adventurer, while the outer office acts as a transitional buffer.
    Together, they contrast with Musgrove''s Pentagon office in ownership, location,
    and narrative function.'
  location_type: University Professor's Office
  parent_location_uuid: null
- fabula_uuid: location_efb79fe8bf68
  global_id: null
  canonical_name: Indy’s Private Bedroom
  description: Ransacked bedroom belonging to Indiana Jones, where the emotional climax
    with Elsa occurs. Distinct from Elsa’s bedroom, as implied by possessive ownership
    and contradictory descriptions of the same event.
  location_type: Private Bedroom
  parent_location_uuid: null
- fabula_uuid: location_675fbf91c9b8
  global_id: null
  canonical_name: Interior Entry Chamber (Castle Brunwald - Connected to Henry's Room)
  description: Transitional interior chamber in Castle Brunwald, lacking furniture
    or characters. Serves as the space Indy enters *after* climbing the exterior window
    ledge. Connected to Henry's Room via the ledge but lacks described interactions
    or events.
  location_type: Castle Interior Chamber
  parent_location_uuid: null
- fabula_uuid: location_666d8706b042
  global_id: null
  canonical_name: Interrogation Chamber - Castle Brunwald
  description: Torture and interrogation room within Castle Brunwald, distinct from
    the Command Map Room; contains bound prisoners, Nazi interrogators, and a fireplace
    with a hidden rotating wall used for the escape sequence.
  location_type: Castle Interrogation Chamber
  parent_location_uuid: null
- fabula_uuid: location_cf3e1243942b
  global_id: null
  canonical_name: Iskenderun Train Station
  description: Public transit hub in Iskenderun where Marcus Brody is ambushed by
    Nazi operatives; distinct from the Sultan's palace courtyard.
  location_type: Urban Train Station
  parent_location_uuid: null
- fabula_uuid: location_f2355c3c7c0a
  global_id: null
  canonical_name: Ivory Courtyards
  description: Nestled within Pankot Palace's interior, the Ivory Courtyards showcase
    spraying fountains that arc water through afternoon light, drawing gazes from
    Indiana Jones, Willie Scott, and Short Round. Pale stone surfaces gleam amid marble
    corridors and inlaid mirrors, their ornate splendor masking the palace's gilded
    dangers. Liquid displays underscore the space's deceptive luxury, where opulence
    veils Thuggee threats during the group's tense escort.
  location_type: Palace Courtyards
  parent_location_uuid: null
- fabula_uuid: location_c147f34d89bf
  global_id: null
  canonical_name: Jetty (Canal Edge)
  description: Weathered wooden jetty juts into the narrow Venice canal, its planks
    slick with canal water and spray from the nearby steamer's churning propellers.
    Kazim climbs ashore here, soaked and spent after Indy's life-saving pull from
    the blades, to reveal Henry Jones Sr.'s location at Castle Brunwald. Indy stands
    firm amid lapping waves and fading echoes of the boat chase, tension breaking
    into wary truce as the Brotherhood's mission hangs in the damp air. This canal
    edge marks confrontation's end and the quest's moral turn.
  location_type: Canal Jetty
  parent_location_uuid: null
- fabula_uuid: location_82b9c4c137f2
  global_id: null
  canonical_name: Jock's Amphibious Plane
  description: Indy scrambles aboard Jock's amphibious plane, a tight cabin floating
    on the Urubamba River in the Peruvian jungle. Reggie, a massive boa constrictor,
    coils on the floor, igniting Indy's snake phobia and freezing him in terror. Jock
    calls from the cockpit with a shrug—'Wouldn’t hurt a soul'—as engines rumble to
    life. The humid confines shift from desperate sanctuary to airborne getaway, air
    thick with river mist and raw fear.
  location_type: Amphibious Plane Cabin
  parent_location_uuid: null
- fabula_uuid: location_d5a1af11c098
  global_id: null
  canonical_name: Jungle Clearing
  description: A hushed clearing amid dense Indian jungle vegetation holds a grotesque
    statue of Kali, the goddess decked in human fingers and severed heads. Ritual
    offerings—dead birds, turtles, scattered leaves—circle its base, infusing the
    air with decay and menace. Sajnu the guide freezes in primal terror, abandons
    the group, and flees, stranding Indiana Jones, Willie Scott, and Short Round.
    Indy brushes off the supernatural aura yet pockets a ritual stone, while Willie
    vents frustration and Short Round grieves the lost elephants. The space pulses
    with Thuggee cult omens, heightening the trio's isolation and dread as they press
    toward Pankot Palace.
  location_type: Jungle Clearing
  parent_location_uuid: null
- fabula_uuid: location_f848b17b3be0
  global_id: null
  canonical_name: Jungle Rapids River (Temple of Doom Rafting Scene)
  description: The treacherous, supernatural-infused river system in the jungle, featuring
    violent rapids and a shaman’s clearing. Includes the upriver riverbank (boa constrictor
    scene) as part of its geography but functions as a distinct, larger-scale obstacle
    for the group.
  location_type: Jungle River Rapids
  parent_location_uuid: null
- fabula_uuid: location_ba2cece6fdaf
  global_id: null
  canonical_name: Kiva Chamber (Secret Chamber)
  description: Deep within the pueblo lies this hidden sacred kiva chamber, its ancient
    walls draped in spider webs and plunged into claustrophobic darkness. Kerosene
    lanterns flicker, casting jittery shadows as looters smash through to unearth
    a wooden box holding the Cross of Coronado. Young Indiana Jones confronts the
    gang here, snatching the artifact amid rising tension and the faint scuttle of
    spiders, his bold stand igniting in the sacred gloom.
  location_type: Pueblo Sacred Chamber
  parent_location_uuid: null
- fabula_uuid: location_b69e7095d64b
  global_id: null
  canonical_name: Lava Crevasse (Temple of Death)
  description: The lava crevasse cuts a wide gulf across the Temple of Death floor,
    bubbling with molten rock that blocks worshippers from the altar. Bound victims
    dangle above its searing depths before priests release them to burn alive, flames
    devouring flesh amid cult chants. Glowing heat rises, casting hellish light on
    the ritual and filling the air with sulfurous dread.
  location_type: Sacrificial Lava Chasm
  parent_location_uuid: null
- fabula_uuid: location_474bb6a1910a
  global_id: null
  canonical_name: Leap of Faith Chamber (Painted Abyss)
  description: |-
    A towering temple chamber bisected by a 100-foot chasm, its floor painted with an optical illusion to mimic a sheer drop into empty void. The chamber serves as the 'Leap of Faith' trial, where Indiana Jones must overcome skepticism and trust in the unseen Crusader bridge hidden beneath the painted surface. The space is characterized by:
      - A painted floor illusion disguising a camouflaged stone bridge
      - Wind rising from the depths carrying faint echoes of stone and distant trials
      - Dim light filtering through cracks, creating heavy atmosphere
      - Echoes of dripping water amplifying tension
      - Shadow-draped walls and humming tension from the temple's ancient mechanisms
      The chamber tests faith by demanding a blind leap across the hidden path, with the illusion giving way to solid ground only upon commitment. Indiana Jones pauses at the edge, wind rising from depths below carrying faint echoes of stone and distant trials, before leaping forward in blind faith.
  location_type: Temple Trial Chamber (Leap of Faith)
  parent_location_uuid: null
- fabula_uuid: location_72673361fbaf
  global_id: null
  canonical_name: Library Loft (Spiral Staircase Area)
  description: Indy ascends the spiral staircase to this elevated loft overlooking
    the Venetian library floor. From the height, he scans numbered columns and stained-glass-lit
    tiles, spotting the hidden 'X' that marks the passage entrance. Shadows shift
    across ancient stone and bookshelves, heightening the thrill of discovery amid
    echoing silence and rising tension.
  location_type: Library Loft
  parent_location_uuid: null
- fabula_uuid: location_1eccb9d74851
  global_id: null
  canonical_name: Lower Deck of the Bantu Wind
  description: Maritime freighter interior in *Raiders of the Lost Ark* (Episode 1),
    distinct from any jungle or terrestrial locations in the series.
  location_type: Freighter Lower Deck
  parent_location_uuid: null
- fabula_uuid: location_2f103f148019
  global_id: null
  canonical_name: Lower Jungles
  description: Terrestrial jungle sub-region in *Temple of Doom* (Episode 2), distinct
    from any maritime or shipboard locations in the series.
  location_type: Overgrown Jungle Lowlands
  parent_location_uuid: null
- fabula_uuid: location_69dc17dc4856
  global_id: null
  canonical_name: Maharajah's Quarry Overlook Balcony (Rock-Cut Observation Balcony)
  description: A precarious, naturally carved rock-cut balcony elevated above the
    quarry cavern, serving as the Maharajah's vantage point for supernatural torment
    via voodoo dolls and ritualistic activities. Accessible via rattling bucket chains
    and set against a chaotic industrial backdrop of mine cars, Thuggee guards, and
    grinding machinery. Central to the Maharajah’s confrontation with Indiana Jones,
    featuring supernatural elements like voodoo dolls and lava fissures. Distinct
    from the metal catwalk due to its rock construction and static, thematically charged
    narrative role.
  location_type: Rock-Cut Mine Overlook Balcony
  parent_location_uuid: null
- fabula_uuid: location_2b821183cd46
  global_id: null
  canonical_name: Main Deck of the Wurrfler
  description: Indy pulls himself aboard the Wurrfler's main deck after swimming through
    dark Mediterranean waves from the Bantu Wind. Salt spray coats the steel gratings
    under night sky as distant gunfire fades. The submarine submerges; cold seawater
    floods to knee depth, sloshing with each lurch. He struggles forward over slippery
    surfaces amid hull groans and mounting ocean pressure, waves crashing over railings.
  location_type: Submarine Main Deck
  parent_location_uuid: null
- fabula_uuid: location_c3e465a7c642
  global_id: null
  canonical_name: Main Street Outside The Raven (Patan, Nepal)
  description: The open thoroughfare directly in front of The Raven saloon, where
    Indy parks his car and the European Spy surveils his movements. Dust kicks up
    from tires, and distant flames/gunfire create tension, emphasizing Indy’s narrow
    escape.
  location_type: Town Street
  parent_location_uuid: null
- fabula_uuid: location_e53190a7037d
  global_id: null
  canonical_name: Map Archive Section (Venetian Library)
  description: A specialized subsection of the Venetian Library dedicated to ancient
    city maps and plans, where Henry Jones Sr. conducted research and where Elsa Schneider
    was sent to retrieve a document before his disappearance. Physically distinct
    from the library's main Crusader-era features (e.g., stained-glass windows, numbered
    columns) and focused on scholarly resources tied to the Grail quest.
  location_type: Library Map Archive
  parent_location_uuid: null
- fabula_uuid: location_aa89874da110
  global_id: null
  canonical_name: Marble Bridge to Pankot Palace
  description: This exterior marble bridge serves as the grand entryway to Pankot
    Palace. Rajput guards line both sides, snapping to rigid attention in sequence
    as Indiana Jones, Willie Scott, and Short Round cross. Lances gleam under sunlight
    during their choreographed display, designed to intimidate intruders. Willie grins
    at the spectacle, Indy scans for threats, and Short Round grips his satchel tightly.
    The bridge's polished surface amplifies footsteps, heightening tension at the
    threshold to the palace's cult domain.
  location_type: Ceremonial Palace Bridge
  parent_location_uuid: null
- fabula_uuid: location_ca67869b3bbc
  global_id: null
  canonical_name: Marshall College Building (Last Crusade)
  description: Single college building in *Indiana Jones and the Last Crusade* (S1E3),
    where Indiana Jones emerges during a chase sequence and is ambushed by government
    agents. Part of the broader 'Marshall College' campus (implied by series lore),
    but distinct from the New England College Campus in *Raiders of the Lost Ark*.
  location_type: College Building Exterior
  parent_location_uuid: null
- fabula_uuid: location_076ba4d6c06d
  global_id: null
  canonical_name: Mayapore Hills (Barren → Revitalized)
  description: Wind-scoured hills stretching across barren soil dotted with skeletal
    vegetation, initially baked under suffocating heat that drains the group's strength
    and sharpens tensions over faith and doubt. Indiana Jones, Willie Scott, and Short
    Round trudge through this desolation, their exhaustion etched into every step.
    Later, streams carve fresh paths, golden crops sway in fields, and sunlight bathes
    the revitalized terrain as the trio descends with freed children, their silhouettes
    marking victory and renewal against the horizon. The transformation reflects the
    Sankara Stone's power, blending triumph with subtle loss.
  location_type: Reborn Rural Hillside
  parent_location_uuid: null
- fabula_uuid: location_977de5612f68
  global_id: null
  canonical_name: Mayapore River (Plane Crash Site)
  description: Symbolic threshold location tied to the village's prophecy and the
    plane crash site, marking the transition from the outside world to the village's
    ancient destiny. Not the setting for direct character action but a narrative backdrop.
  location_type: Mountain River
  parent_location_uuid: null
- fabula_uuid: location_3c7a02e89de6
  global_id: null
  canonical_name: Mayapore Village (Base of the Hills)
  description: |-
    Mayapore Village, located at the base of rugged hills, serves as the entry point to the Thuggee cult's shadowed domain. The village is characterized by sun-baked earth, parched wells, and dead crops—symptoms of a curse tied to the stolen Sivalinga stone. Key features include:
          1. **The Empty Sivalinga Niche Shrine**: A humble pile of rocks forming a sacred shrine, topped by a carved niche that once cradled the sacred Sivalinga stone but is now empty. This shrine anchors the villagers' collective despair and symbolizes the theft that triggered the curse. After sunset, dim torchlight casts eerie shadows over the rough stones as key characters (Indiana Jones, Willie Scott, Short Round, the shaman, and the chieftain) gather here.
          2. **Village Layout and Atmosphere**: Emaciated villagers, skeletal dogs, and vultures create an oppressive atmosphere of despair. The village's thatched-roof shelters lack walls, hosting meager meals on shabby rugs. The atmosphere is bathed in blood-red twilight or a looming nighttime silhouette pulsing with supernatural dread.
          3. **Transformation After the Curse**: After the Sivalinga stone's return, the village undergoes a transformation: streams rush anew, families reunite with rescued children, and joy displaces despair as homes are rebuilt. The dusty path leading into the village (Mayapore Village Road) becomes a site of celebration, where Indiana Jones and Willie Scott share a charged kiss and Short Round reunites with his baby elephant.
  location_type: Remote Indian Village
  parent_location_uuid: null
- fabula_uuid: location_e7be9808df95
  global_id: null
  canonical_name: Mayapore Village Road
  description: Central triumphant arrival route during the day, symbolizing renewal
    and victory after the Sankara Stone's restoration. Contrasts sharply with the
    nighttime 'Dark Dirt Path' used in a panicked escape sequence.
  location_type: Rural Village Road
  parent_location_uuid: null
- fabula_uuid: location_db4900adb97c
  global_id: null
  canonical_name: Metal Catwalk Above the Quarry Conveyor Belt (Quarry Cavern)
  description: A narrow, elevated metal walkway suspended above the quarry's conveyor
    belt and rock crusher, serving as the primary setting for Indiana Jones' high-speed
    chase and fight sequence against Thuggee guards. Distinct from objects like the
    tool bin or rock-cut balcony.
  location_type: Mine Catwalk
  parent_location_uuid: null
- fabula_uuid: location_64c14c79a290
  global_id: null
  canonical_name: Mine Car Tracks
  description: Rusted tracks wind through the shadowy quarry cavern, channeling empty
    mine cars at breakneck speeds during Indiana Jones, Willie Scott, and Short Round's
    frantic escape from Thuggee guards. Willie freezes midway, her heels catching
    as an oncoming car barrels toward her; Indy dives, yanking her clear amid screeching
    metal and ricocheting bullets. The rails amplify every jolt, crash, and near-miss,
    turning the cavern into a gauntlet of crushing peril and raw survival instinct.
  location_type: Quarry Mine Tracks
  parent_location_uuid: null
- fabula_uuid: location_a884b4748ded
  global_id: null
  canonical_name: Mine Train Tunnel (Including Long Straightaway Section)
  description: "\n        A jagged tunnel hewn from solid rock deep within the Nazi\
    \ submarine base, comprising multiple sections including a *long straightaway*\
    \ where the mine train accelerates and Nazis pursue Indy and Marion. The tunnel\
    \ plunges into the base's hidden core, with dim lights flickering along damp walls,\
    \ amplifying the rumble of machinery. It serves as a transport route for the mine\
    \ train carrying the Ark of the Covenant, Belloq, Shliemann, and Marion, while\
    \ also featuring a straight stretch where Shliemann fires his pistol and fuel\
    \ drums ignite, creating a roaring fireball.\n      "
  location_type: Rock-Cut Mine Tunnel
  parent_location_uuid: null
- fabula_uuid: location_34801e2b3c0d
  global_id: null
  canonical_name: Mine Tunnel Exit to Daylight (Raiders of the Lost Ark)
  description: Exterior mine tunnel exit leading to daylight, featured in the mine
    cart escape sequence of *Raiders of the Lost Ark*.
  location_type: Mine Tunnel Exit
  parent_location_uuid: null
- fabula_uuid: location_b224f8e344f6
  global_id: null
  canonical_name: Mines Beneath the Temple of Death
  description: Twisting underground tunnels beneath the Temple of Death echo with
    pickaxe strikes and child slaves' labored breaths as they unearth Sankara Stones.
    The Fat Guard's whip cracks across emaciated backs, driving the hypnotized workers
    through dust-choked passages. A sudden lava vein scorches the guard, his eyes
    clearing from the cult's yellow glow—pain breaks the spell. Short Round seizes
    this revelation, dodging chains and guards to scramble up ladders and ropes, racing
    through unstable shafts toward the altar above amid rumbling rock and desperate
    cries.
  location_type: Subterranean Slave Mines
  parent_location_uuid: null
- fabula_uuid: location_3ca74f25d3dd
  global_id: null
  canonical_name: Mola Ram's Chamber
  description: Deep in the Thuggee cult's stronghold, this chamber forms a nightmarish
    altar to Kali, walls lined with human skulls, live snakes coiling amid occult
    yantras, ritual statues, and grisly icons. Glowing Sankara Stones cast eerie light
    over blood rituals and torture of Indiana Jones and Short Round. The ground cracks
    open with a fissure of crimson lava as Mola Ram invokes apocalyptic power, filling
    the air with chants, incense, and the sharp scent of blood.
  location_type: Thuggee Cult Ritual Chamber
  parent_location_uuid: null
- fabula_uuid: location_00a5e052d7d2
  global_id: null
  canonical_name: Moonlit Corridors of Pankot Palace
  description: Deserted interior halls of Pankot Palace, glowing under moonlight with
    huge wall paintings that cast oppressive shadows. These corridors serve as a labyrinthine
    maze where Willie Scott races in terror, shouting for help that never comes, her
    frantic footsteps echoing off the opulent yet isolating stone walls. The space
    traps her fear, turning the palace's grandeur into an environment of abandonment
    and unseen threats. Chronological portraits of Pankot Princes line the walls,
    their stern gazes tracking visitors like Willie, whose royal fantasies crumble
    amid the gilded splendor and rising tension.
  location_type: Palace Corridors
  parent_location_uuid: null
- fabula_uuid: location_714c7ff466f7
  global_id: null
  canonical_name: Mountain Region North of Ankara
  description: Located in Anatolia (modern-day Turkey), north of Ankara. Central to
    Donovan’s excavation of the Grail Tablet and Indy’s investigation into the Holy
    Grail. Geographically and narratively distinct from European Alpine locations.
  location_type: Mountainous Excavation Site
  parent_location_uuid: null
- fabula_uuid: location_ebf0a36c8f75
  global_id: null
  canonical_name: Mountain Road (Hairpin Turn, Nazi Convoy Chase)
  description: A treacherous mountain road featuring razor-sharp hairpin turns perched
    on sheer cliffs, where a flimsy guard rail strains against high-speed impacts.
    This road serves as the site of a frantic Nazi convoy chase, where Indy exploits
    the terrain to sideswipe foes into oblivion and ram the staff car off the path.
    The lead staff car bends the guard rail first, screeching past, while the pursuing
    truck obliterates it entirely, hurling the rear staff car into the abyss—Gobler
    and Belzig perish in the plunge amid twisted wreckage, roaring engines, and swirling
    dust. The road also includes a dark tunnel where Indy grinds Nazi trucks against
    walls, flinging cars over edges.
  location_type: Winding Mountain Road
  parent_location_uuid: null
- fabula_uuid: location_89482142b2d1
  global_id: null
  canonical_name: Mountain Road Precipice (Canyon of the Crescent Moon)
  description: Donovan and Elsa stand at the mountain road's sheer edge, a dusty precipice
    dropping sharply to the Canyon of the Crescent Moon below. Sunlight bathes the
    vast chasm as Donovan lowers his binoculars, naming the canyon with quiet reverence.
    Elsa peers through them next, her gaze sharp amid the dry mountain air. Tension
    simmers here, the overlook framing their quest's goal and straining their alliance.
  location_type: Mountain Road Overlook
  parent_location_uuid: null
- fabula_uuid: location_50c5f237e8be
  global_id: null
  canonical_name: Mountain Tunnel Entrance (Alpine Road Chase)
  description: Located in the Alps (Europe), specifically on a winding mountain road.
    Serves as the crash site for a Messerschmitt fighter during Indy and Henry Sr.’s
    car chase. No connection to Anatolia or the Grail Tablet.
  location_type: Mountain Road Tunnel
  parent_location_uuid: null
- fabula_uuid: location_db4055f5c241
  global_id: null
  canonical_name: Mountainside Timberline (Raft Descent)
  description: |-
    Treacherous demarcation along the Himalayan mountain slope where snow blankets the upper mountainside and dense forest claims the lower slopes. This boundary marks the chaotic descent of Indy, Willie, and Short Round as they barrel downhill in a raft, transitioning from snowy peril to forested chaos. The descent includes:
          1. **Snowy Upper Slope**: Initial icy terrain with powdery snow and jagged rocks, where the DC-3 crashes and explodes against a nearby peak.
          2. **Timberline Transition**: The critical boundary where snow gives way to dense forest, characterized by fallen logs, uprooted timber, and jagged rocks.
          3. **Forested Lower Slope**: A treacherous forested mountainside below the timberline, where the raft hurtles through dense trees, mud-slick rocks, and water-spraying streams. The steep terrain forces Indy to swerve sharply while gripping a rope, with Short Round and Willie clinging tightly amid the chaos. The forest's tight confines amplify every near-miss and jolt, marking the transition from snowy peril to forested chaos.
  location_type: Mountainside Timberline Boundary
  parent_location_uuid: null
- fabula_uuid: location_6b65a4e66a9b
  global_id: null
  canonical_name: Nang Tao Airfield
  description: Remote airfield featuring a small terminal building, cargo area, and
    floodlit tarmac. During the night escape sequence, the airfield serves as the
    chaotic setting for Indy, Willie, and Short Round's boarding of a departing plane.
    Military police under Officer Weber patrol the area, halting pursuits from vehicles
    like the Duesenberg and Lao Che's sedans. The terminal remains a distant silhouette
    as the group bypasses it entirely, sprinting toward the idling plane amid rising
    tension and dawn's approach. Key features include the floodlit tarmac, prop wash
    from aircraft, and the airfield's remote location contributing to the urgent atmosphere
    of the escape.
  location_type: Remote Airfield
  parent_location_uuid: null
- fabula_uuid: location_5ec19f405eca
  global_id: null
  canonical_name: Narrow Bazaar Alley (Marion’s Ambush Site)
  description: Tight, **confined alleyway** off Cairo’s bazaar streets where Marion
    Ravenwood is **cornered and ambushed** by Nazi agents and mercenaries during her
    desperate flight. Features a **five-foot wall, shallow alcove, and dead-end snare**,
    with **shadows, monkey chatter, and distant shouts** heightening the tension.
  location_type: Cairo Bazaar Alleyway
  parent_location_uuid: null
- fabula_uuid: location_797d70084131
  global_id: null
  canonical_name: Narrow Pass (British Cavalry Arrival Point)
  description: Confined mountain defile on the cliff edge above the crocodile-choked
    gorge, where British cavalry thunders into view after the rope bridge collapses.
    Hooves pound the rocky ground, raising dust clouds as soldiers fire rifles at
    Thuggee archers on the opposite side. Flames lick the dangling bridge wreckage
    below, and screams echo from plummeting guards, transforming this overlook into
    the pivotal site that rescues Indy, Willie, and Short Round by shattering the
    cult's advantage.
  location_type: Cliffside Mountain Pass
  parent_location_uuid: null
- fabula_uuid: location_c6f5b44860b3
  global_id: null
  canonical_name: Narrow Trail Across the Canyon
  description: Located in Peru’s high Andes (jungle environment) during the *Raiders
    of the Lost Ark* plotline, this trail is a liminal space tied to the Chachapoyan
    Temple and the betrayal by the Yagua porters.
  location_type: Jungle Canyon Trail
  parent_location_uuid: null
- fabula_uuid: location_789435765bbc
  global_id: null
  canonical_name: Nazi Chase Gauntlet (S-Curve Mountain Road)
  description: Serpentine, steep mountainside road in a temperate climate, used for
    a high-speed chase between Indy’s hijacked Ark truck and Nazi staff cars. Features
    tight S-curves, sheer drops, and rifle fire from the Tough Sergeant, distinct
    from the Himalayan crash site.
  location_type: Serpentine Mountain Road Curves
  parent_location_uuid: null
- fabula_uuid: location_cfe812a4dc73
  global_id: null
  canonical_name: Nazi Command Map Room - Castle Brunwald
  description: Strategic planning hub within Castle Brunwald, distinct from the Interrogation
    Room; equipped with maps, rifles, and harsh lighting, and serving as a high-tension
    location Indy and Elsa must avoid to proceed undetected.
  location_type: Castle Command Room
  parent_location_uuid: null
- fabula_uuid: location_a1b5b53aaab2
  global_id: null
  canonical_name: Nazi Flying Wing Cockpit (Raiders of the Lost Ark)
  description: Cockpit of the Nazi Flying Wing aircraft in *Raiders of the Lost Ark*
    (1981); used in a ground-level Nazi airfield infiltration scene where Marion Ravenwood
    and Indiana Jones (disguised) disable the pilot, leading to a fuel truck explosion.
  location_type: Aircraft Cockpit
  parent_location_uuid: null
- fabula_uuid: location_4133d6d3fa22
  global_id: null
  canonical_name: Nazi Island Exterior Command Post (Including Mine Train Escape Tracks
    and Dock)
  description: |-
    Fortified coastal stronghold of the Nazi island operation, located near the docks and cliffs. Serves as the final defensive position before the island's destruction, collapsing into rubble as the Ark's power is unleashed. The site includes:
          1) A small, weathered dock extending over choppy waters at the island's edge (where a lone fishing boat pulls away amid destruction)
          2) Exterior rusted train tracks and dock where a runaway mine car collides with a Nazi bunker
          Witnessed from escaping boats during the island's final collapse.
  location_type: Island Military Command Center
  parent_location_uuid: null
- fabula_uuid: location_24e715a7fa9b
  global_id: null
  canonical_name: Nazi Submarine Base (Island Fortress)
  description: Fortified Nazi stronghold in the Mediterranean, serving as the *destination*
    for the Wurrfler submarine and its cargo (the Ark and Marion Ravenwood); distinct
    from the Wurrfler as the *receiving facility* with concrete bunkers, machine-gun
    watchtowers, and unloading operations.
  location_type: Secret Submarine Base
  parent_location_uuid: null
- fabula_uuid: location_fcc5a939e654
  global_id: null
  canonical_name: Nazi Tank (Interior and Exterior)
  description: Mobile Nazi military vehicle used in a desert canyon chase sequence,
    distinct from static rally locations in Berlin.
  location_type: Armored Military Tank
  parent_location_uuid: null
- fabula_uuid: location_1660e722142f
  global_id: null
  canonical_name: Nazi Underground Harbor (Watery Cavern)
  description: Enormous subterranean cavern beneath the mountain fortress, housing
    a full-scale Nazi boat dock (also referred to as 'Nazi Cavern Boat Dock') crammed
    with motorboats, gunboats, and supply vessels. The cavern's dim waters reflect
    flickering lights off damp stone walls, creating an atmosphere of tension as engines
    rumble and waves lap against concrete piers. Indiana Jones and Henry Jones Sr.
    navigate the humid space amid Nazi soldiers swarming catwalks and piers in pursuit.
    The harbor serves as a chaotic launchpad for desperate escape attempts, with stacked
    crates and oily water adding to the industrial military atmosphere. The cavern
    connects to a secret room and is a key location in the Last Crusade episode.
  location_type: Underground Cavern Dock
  parent_location_uuid: null
- fabula_uuid: location_413740f7e77c
  global_id: null
  canonical_name: Nazi-Occupied Tanis Dig Site (Including Tent Areas)
  description: A sprawling Nazi excavation site in the Tanis desert, where laborers
    under Nazi command dig massive pits in pursuit of the Ark of the Covenant. The
    site is mislocated by 7.5 inches due to Belloq's miscalculated staff height, creating
    a false dig that contrasts with Indy's precise location. The site includes **tents
    and cramped spaces**, where Indy crouches to avoid detection by patrolling German
    officers. The map room here yields coordinates leading to Indy's hidden dig site
    nearby. The site is marked by harsh floodlights, rumbling machinery, barked orders,
    and the looming threat of Nazi presence, as evidenced by the poisoned dates that
    later reveal their proximity to Indy and Sallah.
  location_type: Archaeological Dig Site
  parent_location_uuid: null
- fabula_uuid: location_964ca1ca031f
  global_id: null
  canonical_name: New England College Campus (Raiders of the Lost Ark)
  description: Broad campus setting in *Raiders of the Lost Ark* (S1E1), including
    lecture halls, office buildings, and public paths. Serves as the primary academic
    backdrop for Indy's life before the adventure begins. **Distinct from the garden
    sub-location in *Last Crusade*.**
  location_type: College Campus
  parent_location_uuid: null
- fabula_uuid: location_97f8198be7ca
  global_id: null
  canonical_name: New England College Garden (Last Crusade)
  description: Outdoor garden space adjacent to Indiana Jones's private office, serving
    as a liminal threshold for his personal transitions (e.g., receiving the letter
    from Venice). Contrasts with indoor academic spaces like corridors.
  location_type: Campus Garden
  parent_location_uuid: null
- fabula_uuid: location_17e73ffa3153
  global_id: null
  canonical_name: Niche-Carved Walls with Skeletal Remains
  description: Walls line niches with decomposing crusader corpses and skeletal remains
    wrapped in rotting linen. Indiana Jones and Elsa Schneider trace pagan symbols
    carved here, linking to the Ark and Grail. Indy snaps a bone free from one skeleton
    to spark his torch amid oily, rat-choked water. Claustrophobia grips the space;
    decay stench fills thick air as fire later scorches the stone, forcing refuge
    nearby.
  location_type: Catacomb Ossuary Walls
  parent_location_uuid: null
- fabula_uuid: location_689559f2582f
  global_id: null
  canonical_name: Nighttime Escape Path to Mayapore Village
  description: A **temporary, high-stakes escape route** used at night, characterized
    by **darkness, disorientation, and panic**. Contrasts with the daytime 'Mayapore
    Village Road' used in the triumphant climax.
  location_type: Village Approach Path
  parent_location_uuid: null
- fabula_uuid: location_6823e8ac6772
  global_id: null
  canonical_name: Omar’s Garage (Omar’s)
  description: "\n  **Omar’s Garage** (also known as **Omar’s**) is a dual-purpose\
    \ urban resistance hub and safe haven located on the outskirts of Cairo, anchoring\
    \ **Omar’s Square**. It serves as both:\n  1. **A Concealed Resistance Garage**:\
    \ The wide door slams shut to swallow Indiana Jones’s stolen truck during a frantic\
    \ Nazi chase, masking its entrance with dropping tents, fruit carts, baskets,\
    \ and sweeping boys to mimic a chaotic bazaar. Dust swirls as vendors shout and\
    \ pedestrians scatter, hiding tire tracks and the hideout’s true purpose amid\
    \ the square’s clamor.\n  2. **A Critical Safe Haven**: Indy directs Sallah and\
    \ Marion to rendezvous here after his solo pursuit of the Nazi convoy carrying\
    \ the Ark. It offers swift passage to England via plane, serving as their lifeline\
    \ to regroup, rearm, and chase the Ark before it reaches Hitler’s hands. The air\
    \ is thick with tension, urgency, and the mingled scents of desert winds and aviation\
    \ fuel.\n\n  **Key Functions**:\n  - **Resistance Operations**: Conceals vehicles\
    \ and personnel from Nazi pursuit.\n  - **Logistical Hub**: Provides resources\
    \ (e.g., planes, supplies) for Indy’s team.\n  - **Strategic Rendezvous Point**:\
    \ Central to the Ark recovery mission.\n\n  **Narrative Role**:\n  The garage’s\
    \ dual identity—appearing as a bustling bazaar while hiding a resistance network—embodies\
    \ the film’s themes of **deception, urgency, and the blurred lines between public\
    \ and private resistance** in occupied Cairo.\n  "
  location_type: Cairo Safehouse and Airfield
  parent_location_uuid: null
- fabula_uuid: location_df43b01b9565
  global_id: null
  canonical_name: Open Sea - The Mediterranean
  description: Open sea setting for the *Bantu Wind* freighter ambush by Nazi wolf
    submarines in *Raiders of the Lost Ark* (S1E1). Nighttime, moonlight, and submarine
    activity define this location, distinguishing it from land-adjacent Mediterranean
    settings.
  location_type: Open Sea Waters
  parent_location_uuid: null
- fabula_uuid: location_4a26ce9999af
  global_id: null
  canonical_name: Overhanging Tree Branch
  description: An overhanging tree branch stretches low over the jungle path in the
    lower jungles, heavy with vines bearing clusters of wild fruit. Short Round leans
    from the baby elephant's back to pluck the ripe bounty and toss it down with a
    cheerful call, capturing a fleeting moment of resourcefulness and play amid the
    dense canopy. Shadows shift overhead as giant bats emerge, turning the branch's
    accessibility from playful perch to stark reminder of the jungle's lurking threats.
  location_type: Jungle Tree Branch
  parent_location_uuid: null
- fabula_uuid: location_efd6129d5cf2
  global_id: null
  canonical_name: Pacific Ocean
  description: Symbolic, vast expanse of the Pacific Ocean viewed from the Pan Am
    Clipper during the opening sequence, representing the liminal threshold between
    safety and the unknown dangers of the Ark’s quest. **Distinct from the shark-infested
    section encountered during the submarine escape.**
  location_type: Oceanic Expanse
  parent_location_uuid: null
- fabula_uuid: location_cddaf7aa02da
  global_id: null
  canonical_name: Palace Hall of Pankot Palace
  description: Servants with precise, silent movements guide the trembling Willie
    Scott through this gilded hall deep within Pankot Palace. Gold and marble walls
    stretch into a labyrinthine maze, their ornate surfaces closing in to heighten
    her physical exhaustion and emotional unraveling. The space presses with oppressive
    grandeur, its beauty masking danger as vulnerability surfaces amid the palace's
    dehumanizing efficiency.
  location_type: Palace Interior Hall
  parent_location_uuid: null
- fabula_uuid: location_4bd56f2de5a7
  global_id: null
  canonical_name: Pankot Palace
  description: 'Fortified royal palace with a dual nature: opulent public spaces (gilded
    halls, fountains) conceal a sinister underbelly (hidden tunnels, Thuggee traps,
    child abduction caverns). *Externally adjacent to the British cavalry encampment
    but spatially and narratively distinct.*'
  location_type: Fortified Royal Palace
  parent_location_uuid: null
- fabula_uuid: location_34278ec87116
  global_id: null
  canonical_name: Pankot Palace Entrance (Including Rock-Paved Approach)
  description: |-
    The **Pankot Palace Entrance** is a two-part location in *Indiana Jones and the Temple of Doom* (1984), comprising:
          1. A **rock-paved approach road** marking the final stretch of the jungle trek, serving as a quiet character moment for Indiana Jones, Short Round, and Willie Scott.
          2. A **grand exterior gateway** transitioning from the rugged approach to the palace’s opulent interior, where guards are present and Willie’s emotional shift from exhaustion to awe is highlighted.
          The location is pivotal for its narrative function: bridging the external jungle journey with the palace’s interior, while emphasizing the contrast between the characters’ physical and emotional states. The scene occurs in afternoon light.
  location_type: Palace Entrance
  parent_location_uuid: null
- fabula_uuid: location_0a80a2ab691e
  global_id: null
  canonical_name: Pankot Palace Guest Quarters (Including Willie Scott's Suite)
  description: Servants escort Willie, Indy, and Short Round through Pankot Palace's
    marble corridors to these private guest quarters, where fresh clothes await in
    ornate chambers. The complex includes **Willie Scott's Suite**—a lavish room featuring
    dimmable lights, mosquito netting arranged for a romantic setting, and a hidden
    passage behind a Ganesha statue connecting to the Thuggee tunnels. The suite becomes
    a site of both romantic anticipation (between Indy and Willie) and terror (e.g.,
    Indy possessed by Kali, guards ambushing from the hidden passage). Other guest
    quarters offer similar respite amid the palace's gilded splendor, but the attentive
    service hints at watchful eyes. Footsteps echo softly as the group enters, marking
    a tense pause before the evening's dangers unfold, including the Maharajah's dinner
    trap and lurking Thuggee threats.
  location_type: Palace Guest Quarters
  parent_location_uuid: null
- fabula_uuid: location_d98f4c18cad9
  global_id: null
  canonical_name: Pankot Palace Outer Courtyard (Including Dark Archway Entrance)
  description: The **Pankot Palace Outer Courtyard** is a vast glittering marble expanse,
    deserted and foreboding under enveloping silence. The trio steps through the **Dark
    Archway (Pankot Palace Outer Courtyard Entrance)**, their voices echoing sharply
    off towering facades that amplify tension. Towering Rajput guards with curved
    swords materialize as silent sentinels, and Chattar Lal emerges from shadows to
    confront them. This space functions as both a physical threshold (via the dark
    archway) and a narrative gauntlet, where power dynamics shift under the watchful
    eyes of the palace's guardians.
  location_type: Palace Courtyard
  parent_location_uuid: null
- fabula_uuid: location_7a1e0bfd3276
  global_id: null
  canonical_name: Pankot Palace Pleasure Gardens
  description: |-
    The opulent **Pleasure Gardens** at **Pankot Palace**, a sprawling, lantern-lit landscape of winding paths, exotic plants, and golden torchlight under night skies. This space serves as both a **pleasure pavilion** (where guests indulge in after-dinner drinks, cigars, and hookah pipes) and a **veiled battleground** for Thuggee cult influence. Key narrative moments include:
      - **Indiana Jones** demonstrating his whip for the **Maharajah**, whose yellow-glowing eyes and hissing voice reveal Thuggee corruption.
      - **Chattar Lal** meeting a robed figure amid the garden’s opulence, hinting at hidden power struggles.
      - **Beauty and seduction** masking the garden’s darker purpose, as hospitality turns into a **power struggle** under cult tension.
      - **Short Round, Indy, and Willie Scott** walking through the gardens, experiencing a **sensory haze** of music and excess that contrasts with the looming menace of Pankot Palace.
      The gardens function as a **paradisiacal illusion**, offering fleeting respite while underscoring the fragility of escape from the palace’s threats.
  location_type: Palace Pleasure Garden
  parent_location_uuid: null
- fabula_uuid: location_279946dd2746
  global_id: null
  canonical_name: Pankot Palace Tunnel System
  description: |-
    A subterranean network beneath Pankot Palace, including:
          1) The **initial tunnel entrance** (triggered by Willie Scott's scream), where Indiana Jones and Short Round fall into claustrophobic darkness filled with writhing insects and arachnids. The narrowing walls force them to crawl on hands and knees, with Indy's match briefly illuminating the horror.
          2) The **sealed chamber at the tunnel's end**, where a massive door crashes shut behind them, trapping them in pitch-black isolation. The space is stale with decay and engineered terror, testing their bond as Short Round freezes in panic while Indy gropes the walls.
          This system serves as a Thuggee cult trap, designed to induce visceral dread and separate victims from the palace above.
  location_type: Secret Underground Tunnel
  parent_location_uuid: null
- fabula_uuid: location_4b4daca283f5
  global_id: null
  canonical_name: Pankot Palace Verandah
  description: Moonlit interior verandah connected to guest suites within Pankot Palace,
    where Indiana Jones guides Captain Blumburtt and Chattar Lal for discreet talks.
    Described as opulent (gilded arches) but tense, blending palace splendor with
    veiled Thuggee threats. Serves as a private space for conversation, distinct from
    the public entrance.
  location_type: Palace Verandah
  parent_location_uuid: null
- fabula_uuid: location_561e67ba058f
  global_id: null
  canonical_name: Parked Duesenberg
  description: This luxury Duesenberg convertible sits parked on the Shanghai street
    directly below The Dragon Nightclub. Indiana Jones and Willie Scott plummet three
    stories through a window, smash the fabric top, and land inside amid crumpling
    metal and shattered glass. The sudden impact jars them on leather seats and dashboard
    wreckage, turning the elegant car into a battered refuge where they recover from
    the fall's shock before fleeing.
  location_type: Parked Luxury Convertible
  parent_location_uuid: null
- fabula_uuid: location_ae3ee10d6846
  global_id: null
  canonical_name: Pendulum Blade Corridor (Grail Temple)
  description: |-
    A narrow, claustrophobic **corridor** (not chamber) in the **Grail Temple**, serving as the first deadly trial for Indiana Jones. A massive razor-sharp pendulum blade swings from the ceiling in lethal arcs, decapitating Turkish soldiers (their severed heads serving as grim warnings). Indy navigates the trap by dropping to his knees on his father Henry Jones Sr.'s urging, ducking under the blade's path, and jamming its chain mechanism to halt the swing. The space is characterized by:
      - **Stone walls** closing in, slick with dust and gore
      - **Whooshing air** and faint echoes of dripping water
      - **Metallic tang of blood** and grinding stone
      - **Narrative function**: First of the temple's traps, marking Indy's entry into the Grail trials.
      *Note: The term 'corridor' is preferred over 'chamber' as the space is described as a passage blocking the path rather than a self-contained room. This is the iconic trap sequence from *Indiana Jones and the Last Crusade* (1989).
  location_type: Temple Trap Chamber
  parent_location_uuid: null
- fabula_uuid: location_812c7b1bbc3b
  global_id: null
  canonical_name: Pentagon Steps
  description: Broad stone steps front the Pentagon's massive facade under daylight.
    Indiana Jones, Marion Ravenwood, and Marcus Brody climb out here after a briefing.
    Marion grabs Indy for a sudden, fierce kiss that snaps him from Ark obsession,
    earning his wry quip and mutual laughter. Tension eases briefly before they descend
    arm in arm, the building's shadow underscoring the clash between urgent peril
    and human connection.
  location_type: Military Headquarters Steps
  parent_location_uuid: null
- fabula_uuid: location_2568fef013f6
  global_id: null
  canonical_name: Peru - High Jungle (Eastern Slopes of the Andes, 'The Eyebrow of
    the Jungle')
  description: Dense rainforest blankets the high jungle on Peru's eastern Andean
    slopes, dubbed 'The Eyebrow of the Jungle.' The expedition picks its way along
    a narrow trail spanning a deep canyon, where thick mists veil jagged walls and
    muffle distant calls. Porters abandon supplies in curse-driven panic, dropping
    packs amid fleeing footsteps. Indy grips Barranca's arm to halt gunfire, as betrayal
    flickers in glares between guides. The Chachapoyan Temple emerges through foliage
    ahead, its silhouette sharpening the air with foreboding isolation and fraying
    trust.
  location_type: Andean Jungle Canyon Trail
  parent_location_uuid: null
- fabula_uuid: location_f4c8e78e383d
  global_id: null
  canonical_name: Peruvian Jungle (Hovito Chase Scene)
  description: Dense jungle terrain in Peru, featured in *Raiders of the Lost Ark*
    (S01E01), where Indiana Jones is pursued by Hovito warriors. Leads to a cliff
    above the Urubamba River, with a focus on ambushes and escape.
  location_type: Tropical Jungle Terrain
  parent_location_uuid: null
- fabula_uuid: location_0b39c92a27e1
  global_id: null
  canonical_name: Private Airliner Cabin
  description: The cabin hums with the steady drone of engines during the flight to
    Venice. Indiana Jones sits alone, poring over his father’s Grail Diary. His fingers
    trace a pencil sketch of a stained-glass window and a sequence of numbers below
    it. Light from seat lamps falls on the worn pages while the vast sky stretches
    outside the window. This confined space provides a brief sanctuary for deciphering
    clues, heightening the quiet urgency of the quest amid isolation and motion.
  location_type: Private Aircraft Cabin
  parent_location_uuid: null
- fabula_uuid: location_063502a1c6f3
  global_id: null
  canonical_name: Pueblo Passageway
  description: Young Indiana Jones and Herman push through this dark, claustrophobic
    passageway in hidden pueblo ruins. Spider webs snag their clothes, cold air bites
    deeper with each step, and shadows hide the path to the sacred Kiva chamber where
    looters dig. Tension mounts during exploration; later, Indy climbs a dangling
    rope here to escape pursuit, heart pounding in the narrow confines.
  location_type: Pueblo Ruin Passageway
  parent_location_uuid: null
- fabula_uuid: location_53787150df7e
  global_id: null
  canonical_name: Pueblo Ruins
  description: Dark shadows fill the ancient stone chambers of the Pueblo Ruins, where
    Indiana Jones bursts into blinding daylight clutching the Cross of Coronado. Dust
    hangs thick in the air as he mounts his horse amid the chase. Fedora's gang surges
    from behind the crumbling walls in a truck and automobile, engines roaring across
    the rugged cliffside terrain. The ruins stand as a shadowed threshold between
    concealment and exposure, amplifying Indy's isolation and the pursuers' relentless
    advance.
  location_type: Cliffside Pueblo Ruins
  parent_location_uuid: null
- fabula_uuid: location_88410c6e9ec2
  global_id: null
  canonical_name: Quarry Cavern
  description: A sprawling underground mining complex housing the High Platform Next
    to the Waterfall, as well as mine cars, conveyor belts, and enslaved laborers.
    Serves as the primary setting for the escape sequence.
  location_type: Underground Mining Cavern
  parent_location_uuid: null
- fabula_uuid: location_0825efe0b2b0
  global_id: null
  canonical_name: Radio Room (Baronial Room Connection)
  description: 'A tight Nazi radio operations chamber connected to the Baronial Room
    via a concealed rotating wall behind the fireplace. This space serves dual narrative
    functions: 1) As the Baronial Room''s adjacent chamber where Indy and Henry face
    Donovan and Elsa during the betrayal reveal, and 2) As the operational radio center
    where Nazi communications occur. The room''s fireplace is the critical connection
    point - firelight from this fireplace casts shadows in the Baronial Room while
    also housing the mechanism for the rotating wall. Nazi radiomen operate crackling
    transmitters here, plotting Grail coordinates on maps. Indy and Henry tumble in
    accidentally through the rotating wall, sparking gunfire as Indy retrieves his
    whip, leather sack, and Henry''s Grail diary case before jamming the wall mechanism
    with a bust of Hitler to trap pursuing Nazis.'
  location_type: Castle Radio Room
  parent_location_uuid: null
- fabula_uuid: location_7d74c98255ab
  global_id: null
  canonical_name: Rat-Infested Narrow Passageway
  description: Indy and Elsa push through knee-deep, oily water in this claustrophobic
    catacomb stretch beneath the Venice library, rats swarming their legs as they
    slip and struggle forward. Indy overcomes his phobia to carry Elsa amid the squealing
    horde. Kazim's men ignite the petroleum, spawning a stampeding rodent wave and
    roaring fire wall that chases them into a coffin air pocket, blending discovery
    peril with raw survival in the Grail hunt.
  location_type: Flooded Catacomb Passageway
  parent_location_uuid: null
- fabula_uuid: location_83dfa47aa1ab
  global_id: null
  canonical_name: Reptile Boxcar (Circus Train) - Interior
  description: Enclosed space of the circus train boxcar containing vats of alligators,
    crocodiles, snakes, and a massive anaconda in murky water. Features a low clean-out
    door for Indy’s escape and a ceiling-mounted catwalk (a separate structural element).
    The catwalk collapses under combined weight, dumping Indy into the pit below during
    combat.
  location_type: Circus Train Boxcar
  parent_location_uuid: null
- fabula_uuid: location_09e5f0124a96
  global_id: null
  canonical_name: Rhino Boxcar (Circus Train)
  description: Confined black rhino; roof breached during Indy's fight with Roscoe,
    creating an unstable battleground. Adjacent to the lion's enclosed stockcar.
  location_type: Circus Train Animal Boxcar
  parent_location_uuid: null
- fabula_uuid: location_50274523dbb2
  global_id: null
  canonical_name: Rise Above Airstrip (Tanis Ark Evacuation Site)
  description: Large sun-scorched airstrip at Tanis where the wrecked Flying Wing
    plane lies strewn across the tarmac. Site of the Ark’s evacuation to Cairo, with
    Germans and Arabs clustering amid debris as Belloq shouts orders. Indy, Marion,
    and Sallah reunite here before fleeing into the desert.
  location_type: Desert Airstrip
  parent_location_uuid: null
- fabula_uuid: location_9ce064c37e09
  global_id: null
  canonical_name: Riverside Bluff
  description: Steep natural drop-off where the raft smashes through dense bushes
    before launching airborne, hurtling into the churning river below. This rugged
    bluff marks the chaotic shift from solid ground to violent rapids, amplifying
    the trio's peril as Indy's group endures whipping foliage, sudden freefall, and
    crashing waters amid India's unforgiving terrain. The site's raw power strips
    away pretense, launching them into a gauntlet of white-water survival.
  location_type: Riverside Bluff
  parent_location_uuid: null
- fabula_uuid: location_7876c7bb1077
  global_id: null
  canonical_name: Road Station Checkpoint
  description: Dusty country road checkpoint featuring a wooden barricade and squat
    guardhouse, where a uniformed guard attempts to halt Indiana Jones and Henry Jones
    Sr. on their motorcycle during a high-speed chase. The barricade is smashed through
    by Indy's motorcycle, followed by a Nazi soldier's bike, marking the chase's first
    chaotic hurdle. The guardhouse serves as a rural outpost for Nazi road control,
    with the guard diving aside as debris scatters from the collision. This location
    is part of the Venice/Berlin Crossroads and involves the same motorcycle chase
    sequence where Indy and Henry flee with the Grail Diary.
  location_type: Roadside Guardhouse Checkpoint
  parent_location_uuid: null
- fabula_uuid: location_a45228e8c5da
  global_id: null
  canonical_name: Rocky Base of the Cliff
  description: Jagged, sun-baked terrain at the **foot of the cliff**, serving as
    the **climbable base** for the Scouts' ascent. **Contrast with the Ancient Cliff
    Pueblo (location_9a3485b6a657)**, the destination atop the cliff where the narrative
    climax occurs. This location is defined by its **physical challenge** and role
    as the **starting point** of the defiance sequence.
  location_type: Desert Cliff Base
  parent_location_uuid: null
- fabula_uuid: location_fb613cdce454
  global_id: null
  canonical_name: Sacred Mound (Mayapore Village)
  description: The Sacred Mound rises in Mayapore Village as a natural altar central
    to the community's spiritual life. The shaman presses the restored Sankara Stone
    into its weathered niche atop the mound, triggering the land's revival—dry streams
    rush with water, barren fields sprout green crops, dust settles amid villagers'
    tears and cheers. Indy, Willie, and Short Round witness this renewal from the
    village outskirts, the site's quiet power contrasting their own tangled emotions.
  location_type: Village Sacred Mound
  parent_location_uuid: null
- fabula_uuid: location_979cc37bae78
  global_id: null
  canonical_name: Sacrificial Altar of the Temple of Death
  description: A stone platform juts from the cavern wall in the Temple of Death,
    isolated by a lava crevasse from chanting worshippers. Mola Ram rips beating hearts
    from victims here during rituals, casts bodies into the fiery pit below, and reveals
    the glowing Sankara Stones amid swirling smoke from urns. The massive Kali statue
    looms behind, its presence amplifying the space's dread and supernatural charge
    as wind howls from overlooks above.
  location_type: Temple Ritual Platform
  parent_location_uuid: null
- fabula_uuid: location_4b29ce64dcd0
  global_id: null
  canonical_name: Sallah's House (Old Cairo)
  description: |-
    A private residence in Old Cairo where Sallah and his family live. The house contains multiple distinct spaces, including a dining room where Sallah's family hosts guests like Indiana Jones, Marion Ravenwood, and scholar Amir. Key events include:
          1. A dinner scene where a trained spy monkey interacts with the guests, creating playful chaos
          2. A later scene where Indiana Jones, Sallah, and Amir huddle over the headpiece of the Staff of Ra, only for the monkey to die after eating poisoned dates
          The space shifts from warm hospitality to shadowed foreboding as the group's advantage sours into urgent peril.
  location_type: Private Residence
  parent_location_uuid: null
- fabula_uuid: location_f8e683a4f87b
  global_id: null
  canonical_name: Sallah’s Truck Interior (Cab and Back)
  description: Night envelops the cramped cab of Sallah’s truck, engine rumbling like
    a heartbeat underfoot. Indy slumps into the passenger seat beside Sallah, their
    silence thick with grief over Marion’s death. Children pile into the open back,
    their laughter clashing sharply with the men’s sorrow. Sallah’s firm touch and
    words ignite purpose; the truck lurches forward, its motion carrying them from
    paralysis into defiant action against the Nazis, the tight space amplifying every
    raw emotion.
  location_type: Truck Interior (Cab and Bed)
  parent_location_uuid: null
- fabula_uuid: location_3936cea31cd8
  global_id: null
  canonical_name: Sanctuary (Chachapoyan Temple)
  description: "\n      **Innermost domed chamber** of the Chachapoyan Temple, containing:\n\
    \      1. A **jeweled idol on a central pedestal** (retrieved by Indy, triggering\
    \ temple collapse).\n      2. A **tiled floor with booby-trapped black squares**\
    \ (interacted with by Satipo and Forrestal).\n      3. A **dart-release mechanism**\
    \ (lethal trap).\n      4. The **Sanctuary Booby-Trap Chamber (Sunlight Beam)**\
    \ (a sub-chamber where a single shaft of sunlight triggers impaling spikes, killing\
    \ Satipo and Forrestal).\n      **Distinct from**: The catacombs escape chamber\
    \ (non-trapped) and the mine tunnel exit.\n      "
  location_type: Booby-Trapped Temple Chamber
  parent_location_uuid: null
- fabula_uuid: location_4b3bedf07990
  global_id: null
  canonical_name: Scarab-Infested Chamber (Catacombs Horror Chamber)
  description: A deeply unsettling chamber in the Chachapoyan Temple catacombs, characterized
    by its wall of writhing scarabs and skull-lined passages. This chamber serves
    as a psychological obstacle for Marion Ravenwood, testing her resolve and reinforcing
    the tomb’s themes of decay and danger. It is distinct from the Catacombs Escape
    Chamber by its lack of sunlight, absence of Indy’s involvement, and focus on horror
    rather than hope.
  location_type: Beetle-Infested Catacomb Chamber
  parent_location_uuid: null
- fabula_uuid: location_c0b70e70a23c
  global_id: null
  canonical_name: Secret Tunnel from Willie's Suite (Pankot Palace) / Hidden Stone
    Tunnel Behind Ganesha Statue
  description: Terrestrial passage in *Indiana Jones and the Temple of Doom* (Episode
    2), accessed via a loose baseboard panel behind a Ganesha statue in Willie's Pankot
    Palace suite. Features rough stone walls with Sanskrit inscriptions, musty air,
    and echoes leading to the Thuggee cult's lair. Thematically tied to ancient curses
    and supernatural dread. Captain Blumburtt raises an oil lamp to reveal the tunnel's
    dark mouth behind the secret door, where Indiana Jones steps out unexpectedly.
    Willie points into its depths, describing it as burrowing to the Thuggee temple's
    sacrificial heart, where Short Round vanished amid screams and blood rites.
  location_type: Hidden Palace Tunnel
  parent_location_uuid: null
- fabula_uuid: location_24041a271c3e
  global_id: null
  canonical_name: Shanghai
  description: '1935 Shanghai pulses with underworld intrigue, cradling opulent nightclubs
    like The Dragon amid its dense urban fabric. Here, Indiana Jones confronts crime
    lord Lao Che in smoke-choked ballrooms, where poison, betrayal, and gunfire propel
    escapes: victims tumble through windows, rip across awnings and balconies, and
    crash into cars on the streets three stories down.'
  location_type: Metropolis
  parent_location_uuid: null
- fabula_uuid: location_0bf70321a118
  global_id: null
  canonical_name: Shanghai
  description: Overarching 1930s port city setting for the Staff of Ra’s hiding place,
    Tengtu Hok’s stronghold, and broader Nazi activities. **Does not include transient
    sub-locations like Shanghai Airport, which serve isolated narrative functions.**
  location_type: Chinese Port City
  parent_location_uuid: null
- fabula_uuid: location_f1e350d90317
  global_id: null
  canonical_name: Shanghai Airport (Indiana Jones Briefing Scene)
  description: A **transient, functional sub-location** within Shanghai, used exclusively
    for the high-speed briefing between Indiana Jones and Kehoe in *Raiders of the
    Lost Ark*. **Distinct from the broader narrative of the city of Shanghai.**
  location_type: International Airport
  parent_location_uuid: null
- fabula_uuid: location_340d9e8b10c9
  global_id: null
  canonical_name: Shanghai Square
  description: Bustling nighttime square in 1935 Shanghai packs coolies and prostitutes
    under strings of lanterns that sway and shatter during the Duesenberg's tear through
    its center. Pedestrians dive for cover as the car drags lanterns behind it, pursued
    by Lao Che's sedans. Chaos erupts with crashing lights and scattering crowds,
    transforming the crowded public space into a deadly obstacle course amid the neon
    glow of the city's streets.
  location_type: City Square
  parent_location_uuid: null
- fabula_uuid: location_f9c0806a9d57
  global_id: null
  canonical_name: Shanghai Streets
  description: Crowded avenues pulse with life under neon lights at night. Rickshaws
    clatter alongside pedestrians who scatter from the Duesenberg's path. Glowing
    lanterns sway as gunfire erupts, shattering glass from pursuing sedans. The trio
    weaves through tunnels and squares, bullets whizzing past shredded convertible
    tops amid chaotic swerves and desperate speed.
  location_type: Crowded Urban Streets
  parent_location_uuid: null
- fabula_uuid: location_5cc15a13567a
  global_id: null
  canonical_name: Shanghai Urban Car Chase Tunnel
  description: Surface-level urban road tunnel in Shanghai, featured in the opening
    Duesenberg car chase sequence with Lao Che’s men as antagonists. Part of the episode’s
    early action setpiece.
  location_type: Urban Road Tunnel
  parent_location_uuid: null
- fabula_uuid: location_d33ef3fada08
  global_id: null
  canonical_name: Shark-Infested Ocean (Submarine Escape)
  description: A **localized, perilous section of the Pacific Ocean** during Indiana
    Jones' escape from the Nazi submarine *Wurrfler*, explicitly characterized by
    **shark activity and immediate physical danger**. **Distinct from the symbolic
    Pacific Ocean viewed from the Pan Am Clipper.**
  location_type: Shark-Infested Open Ocean
  parent_location_uuid: null
- fabula_uuid: location_16ff3cfeed08
  global_id: null
  canonical_name: Sharp Curve and Siding in the Thuggee Mine Tunnels
  description: A critical section of the Thuggee mine tunnels featuring a razor-tight
    curve and a narrow side track. The curve is a razor-tight bend where centrifugal
    force derails pursuing Thuggee mine cars, hurling them into the adjacent siding
    where they crash and twist into wreckage. Debris from the wreckage scatters across
    the path, blocking the tunnel and slamming into subsequent Thuggee cars amid sparks,
    dust clouds, and ricocheting metal. This section serves as a pivotal escape route
    for Indiana Jones, Short Round, and Willie Scott, where Indy's mine car nearly
    derails before they correct course, while the pursuing Thuggee car fails to navigate
    the curve and crashes into the siding.
  location_type: Mine Tunnel Railway Bend
  parent_location_uuid: null
- fabula_uuid: location_48faa08aeb07
  global_id: null
  canonical_name: Side Tunnel Chute (Mine Tunnels)
  description: A narrow, precipitous side tunnel branching from the main mine passage,
    used as an escape route by Indy and the trio during a tidal wave surge. The chute
    is steep, dark, and claustrophobic, with slick walls and a tight passage that
    forces the trio to slide and tumble headfirst into a larger tunnel below. Water
    roars past the chute's mouth, briefly shielding them from the flood before the
    surge continues, driving them deeper into the suffocating mine depths. The tunnel
    is characterized by frantic shouts, echoing chaos, and a sense of desperate urgency
    as pursuit resumes.
  location_type: Narrow Mine Chute
  parent_location_uuid: null
- fabula_uuid: location_1a9dfaedf41f
  global_id: null
  canonical_name: Side Tunnels of the Quarry Cavern (Including Left Tunnel Escape
    Route)
  description: Cramped stone passages branching off the vast Quarry Cavern, including
    the **Left Tunnel (Escape Route)**—the sole safe exit named by the Maharajah amid
    crashing mine cars and Thuggee gunfire. These tunnels are choked with dust, echoing
    with distant mine car rumbles and Thuggee shouts, and serve as a desperate escape
    route for Indiana Jones, Willie Scott, and Short Round during their frantic flight
    from the cavern. The Left Tunnel's shadowed mouth promises swift passage from
    voodoo curses, rock crushers, and pursuing guards, though Indy ultimately veers
    right, leaving the safer path untaken. Flickering torchlight reveals slick walls
    and unstable floors, amplifying the peril of flight from cult guards. Enslaved
    children also scramble into these dark tunnels during the chaos.
  location_type: Underground Mine Tunnels
  parent_location_uuid: null
- fabula_uuid: location_a02fac8b4576
  global_id: null
  canonical_name: Six-Inch Air Pocket
  description: Indy breaks the surface into this cramped six-inch pocket of stale
    air trapped in the ceiling of a narrow underwater tunnel. Lungs burning from near-drowning,
    he gasps desperately for breath, chin pressed against jagged rock, water lapping
    at his face. The dim light filters through, revealing suffocating darkness and
    the sub's distant rumble. This fleeting sanctuary offers momentary relief amid
    the chaos of the Nazi sub base approach, where vegetation shredded his jacket
    air bubble moments before.
  location_type: Underwater Tunnel Air Pocket
  parent_location_uuid: null
- fabula_uuid: location_730fde48086a
  global_id: null
  canonical_name: Sky (Exterior)
  description: Vast open sky stretches endlessly as the battleground for Indy and
    Henry's desperate biplane escape from the zeppelin. Clouds fill the expanse where
    the fragile aircraft hangs suspended before Messerschmitt fighters swarm in pursuit.
    Machine gun bursts echo through the thin air, the biplane dodges and weaves amid
    the vulnerability of open heights, contrasting the boundless blue with spiraling
    peril and crashing descent after Henry severs the tail stabilizer.
  location_type: Open Airspace
  parent_location_uuid: null
- fabula_uuid: location_1d27876c4794
  global_id: null
  canonical_name: Slag Heap in Quarry Cavern
  description: Indiana Jones pulls Willie Scott and Short Round behind the jagged
    slag heap as empty mine cars thunder past on twisting tracks. Dust swirls thick
    in the cavern air, pierced by gunfire from Thuggee guards and the grind of rock
    crushers. The pile of quarry debris offers fleeting cover amid voodoo agony, giant
    brawls, and pulley swings—trio's desperate shield in the cult's industrial hell.
  location_type: Quarry Slag Heap
  parent_location_uuid: null
- fabula_uuid: location_1335380a1705
  global_id: null
  canonical_name: Smoke-Shrouded Corner Table
  description: Tucked in the corner of a dim, smoke-choked Arab bar, this secluded
    table hides Belloq amid swirling cigarette haze and deep shadows. Indy approaches
    through the haze to face him here, their psychological duel unfolding in tense
    isolation from other patrons' eyes. The intimate space amplifies Belloq's control,
    with bourbon fumes and ominous whispers heightening the confrontation's stakes.
    Smoke partially veils the pair, creating a claustrophobic nook where veiled threats
    and theological taunts echo amid the bar's distant clamor.
  location_type: Secluded Bar Table
  parent_location_uuid: null
- fabula_uuid: location_a137c9372149
  global_id: null
  canonical_name: Snow Bank Near The Raven’s Entrance (Patan, Nepal)
  description: A localized pile of snow adjacent to the flaming entrance of The Raven
    saloon, used by Belzig to relieve his medallion-burned hand. Contrasts with the
    dusty street outside, emphasizing the saloon’s inferno and the medallion’s curse.
  location_type: Himalayan Snow Bank
  parent_location_uuid: null
- fabula_uuid: location_39e81bb08a22
  global_id: null
  canonical_name: Spike Chamber
  description: Mechanical death trap in Pankot Palace (Temple of Doom); requires release
    lever activation via adjacent tunnel. Distinct from escape chambers in other Indy
    narratives.
  location_type: Spike Trap Chamber
  parent_location_uuid: null
- fabula_uuid: location_b7e19a776a0f
  global_id: null
  canonical_name: Stormy Ocean off the Portuguese Coast (Vazquez de Coronado Wreck
    Site)
  description: A violent, storm-tossed ocean off the Portuguese coast where Indiana
    Jones leaps from the exploding deck of the *Vazquez de Coronado* cargo ship at
    night. The chaotic waters—marked by violent waves, churning foam, and debris from
    the wreckage—test Indy’s survival instincts as he battles to stay afloat, gripping
    a life preserver while thunder and lightning rage overhead. This scene encapsulates
    the high-stakes climax of the chase, where betrayal and desperation drive Indy
    into the storm. The location is defined by its proximity to the wreck of the *Vazquez
    de Coronado* and its role as the final battleground before Indy’s escape.
  location_type: Storm-Tossed Ocean Waters
  parent_location_uuid: null
- fabula_uuid: location_708f2a4b604c
  global_id: null
  canonical_name: Street Below The Dragon Nightclub (Shanghai, 1935)
  description: The narrow, shadowed street directly below The Dragon Nightclub's towering
    facade in 1935 Shanghai, where a sleek parked Duesenberg convertible serves as
    a crash landing site for Indiana Jones and Willie Scott after their three-story
    plummet through stained-glass windows and awnings. The scene unfolds amid evening
    crowds, bouncers ejecting Short Round, and chaotic urban clamor—including screeching
    tires, honking horns, and gunfire—following the impact. This location is a critical
    narrative hub for the Shanghai sequence, featuring both the dramatic crash and
    earlier skulking by Short Round.
  location_type: Shanghai Urban Nightclub Street
  parent_location_uuid: null
- fabula_uuid: location_bb66c6328fac
  global_id: null
  canonical_name: Street Fronting Hok's Palace
  description: 'The street directly fronting Tengtu Hok''s palace compound, where
    two distinct but temporally sequential events occur: (1) Kehoe''s car arrives
    via a narrow alley, Bang Chow disembarks with a heavy suitcase, and a Nazi Mercedes
    limousine brakes sharply at the front gate amid tense ceremonial bows; (2) Later,
    the same street erupts in chaos when the Germans'' Mercedes limousine explodes
    in a fireball of twisted metal and leaping flames, pulling Hok and the Nazis''
    focus from their pursuit. Thick black smoke billows across the pavement, shrapnel
    peppers the surroundings, and the deafening blast pulls Hok and the Nazis'' focus
    from their pursuit. Gunfire cracks through the haze as Indiana Jones slips away,
    the acrid stench of burning fuel hanging heavy in the frantic air. This location
    serves as a critical nexus for both the Allied-Nazi standoff and the explosive
    climax involving Indiana Jones.'
  location_type: Palace Compound Street
  parent_location_uuid: null
- fabula_uuid: location_b6a355a35aa7
  global_id: null
  canonical_name: Subterranean Thuggee Prison Cell
  description: A dark, rocky cave-like prison cell deep within the Thuggee mine complex,
    where Indiana Jones wakes chained alongside Short Round and the trembling boy
    Nainsukh. Iron bars separate the cell from adjacent mine tunnels, where the muffled
    sobs and clanks of enslaved children echo through the suffocating gloom. Armed
    guards and a robed Thuggee Cult priest approach from outside, torches cutting
    through the darkness as they prepare to seize Nainsukh for the blood of Kali ritual.
    The cell serves as a holding area for prisoners awaiting cult rituals, connected
    to the broader network of Thuggee mines.
  location_type: Subterranean Prison Cell
  parent_location_uuid: null
- fabula_uuid: location_78ab19bc7a4c
  global_id: null
  canonical_name: Tabernacle
  description: Sacred stone chamber within the Nazi command center on their island
    base; destruction caused by the Ark of the Covenant's unleashed power (supernatural
    fire).
  location_type: Sacred Underground Chamber
  parent_location_uuid: null
- fabula_uuid: location_483da921eb5b
  global_id: null
  canonical_name: Tanis (Buried Lost City)
  description: The **overarching buried city** of Tanis, encompassing all excavation
    sites, the Well of Souls, and the ruins where the Ark of the Covenant is hidden.
    Serves as the **primary destination** and **climactic location** for the narrative,
    distinct from specific scene-level settings within its borders.
  location_type: Lost Ancient City
  parent_location_uuid: null
- fabula_uuid: location_119e0ed13f05
  global_id: null
  canonical_name: Tanis Airstrip Supply Tent (Mechanics’ Cover)
  description: Small canvas tent at the Tanis airstrip, used by Indy and Marion as
    cover during a fight with Nazi mechanics. Located near the mechanics’ area, filled
    with stacked crates and expedition gear, its flaps snap in the hot wind amid engine
    roars.
  location_type: Airstrip Supply Tent
  parent_location_uuid: null
- fabula_uuid: location_79cf97bacd1c
  global_id: null
  canonical_name: Tanis Desert Airstrip
  description: A crude, makeshift airstrip carved into the desert sands near the Tanis
    digs, serving as a chaotic Nazi excavation outpost. The strip is dominated by
    a Nazi Flying Wing aircraft, with tents forming a supply depot beside two fuel
    trucks. Key events include Indy battling German mechanics near the plane's propellers,
    Marion climbing the wing to knock out the pilot, and a subsequent explosion involving
    a fuel truck that traps Marion in the cockpit. The airstrip is characterized by
    militarized tension, with trucks rumbling, bulldozers gouging trenches, and soldiers
    patrolling under floodlights.
  location_type: Makeshift Desert Airstrip
  parent_location_uuid: null
- fabula_uuid: location_f8432bd7d8cd
  global_id: null
  canonical_name: Tanis Dig Site Overlook (Surveying Ridge)
  description: 'Elevated desert vantage point adjacent to the Tanis excavation zone,
    used by Indiana Jones, Omar, and Sallah to survey and triangulate the Ark’s location
    using map coordinates prior to Nazi occupation. Comprises two sub-locations: the
    exposed sand dunes (used for pre-infiltration navigation) and a hidden sandy rise
    (used for tactical observation of Nazi activities). Serves as a pre-infiltration
    navigation point and scouting vantage for planning the infiltration of Tanis.'
  location_type: Desert Overlook
  parent_location_uuid: null
- fabula_uuid: location_cf9218e6b4f5
  global_id: null
  canonical_name: Tanis Excavation Command Bunker
  description: Subterranean military command post carved into the Tanis excavation
    site, directly adjacent to the Tabernacle. Serves as the operational nerve center
    during the Ark's ritual phases, where flames from the Tabernacle trigger chaos
    and Indy/Marion escape with the Ark.
  location_type: Subterranean Military Command Post
  parent_location_uuid: null
- fabula_uuid: location_199314fa0406
  global_id: null
  canonical_name: Tanis Sand Dunes (Ark Excavation Site)
  description: Flat, pristine desert dunes where Indiana Jones and Sallah excavate
    the Ark of the Covenant in *Raiders of the Lost Ark*. Serves as the primary dig
    site for the Ark, with associated events involving Omar's crew and Nazi threats.
  location_type: Desert Dig Site Dunes
  parent_location_uuid: null
- fabula_uuid: location_ea0bd6f5cbd2
  global_id: null
  canonical_name: Temple Booby-Trap Exit Passage
  description: Interior tunnel within the Chachapoyan Temple, featuring a massive
    boulder chase sequence and symbolic sealing of the temple's entrance. Distinct
    from the mine tunnel exit.
  location_type: Ancient Temple Escape Passage
  parent_location_uuid: null
- fabula_uuid: location_a58d268ef5e3
  global_id: null
  canonical_name: Temple Entry Inclined Passage
  description: Initial entry corridor into the Chachapoyan Temple, characterized by
    dampness, stalactites, and eerie sounds—distinct from the later exit passage where
    the boulder chase occurs.
  location_type: Ancient Temple Entrance Passage
  parent_location_uuid: null
- fabula_uuid: location_193d73d6ed78
  global_id: null
  canonical_name: Temple of Death
  description: Colossal subterranean temple carved from solid rock, its vaulted cathedral-like
    ceiling rises high, supported by stone columns and balconies. Dark side chambers
    open off the main space, where Thuggee worshippers chant to Kali around a central
    altar. A wide crevasse splits the floor, molten lava bubbling below for heart-ripping
    sacrifices. Statues of elephants, lions, and demi-gods line the walls. The Sankara
    Stones glow with supernatural light here, pulling Indiana Jones from a wind tunnel
    overlook into the ritual's horror amid beating hearts, flames, and fanatic devotion.
  location_type: Subterranean Ritual Temple
  parent_location_uuid: null
- fabula_uuid: location_80be8163dd95
  global_id: null
  canonical_name: Temple of Death Crevasse Balcony
  description: A narrow stone balcony edging the Temple of Death's fiery crevasse,
    overlooking the temple's shadowy interior with bubbling lava below. Illuminated
    by orange flickers from the lava, this perch is where Indiana Jones coils his
    whip before launching across the pit, with chants echoing and Kali's statue towering
    in the distance.
  location_type: Subterranean Temple Balcony
  parent_location_uuid: null
- fabula_uuid: location_a6362747954e
  global_id: null
  canonical_name: Temple of the Chachapoyan Warriors (Peru)
  description: A 2000-year-old temple shrouded in thick vegetation, revealed in the
    Peruvian high jungle beyond a dense stand of trees. Its sudden emergence terrifies
    the Yagua porters, who abandon supplies and flee in superstition-fueled panic,
    perceiving it as the source of a deadly curse. The temple serves as the expedition's
    destination, where ancient traps and supernatural threats await amid oppressive
    mist and isolation. The temple's entrance is a round, open black void shaped like
    a gaping maw of stone and shadow, surrounded by elaborate friezes and tangled
    vegetation. Its interior features claustrophobic, labyrinthine inclined passageways
    with lethal booby traps (collapsing floors, impaling spikes, poison darts, and
    a massive boulder chase), giant tarantulas, and bottomless pits. The sanctuary
    includes a golden idol pedestal, and the temple's traps are meticulously described,
    including torchlit passages and swarming tarantulas.
  location_type: Ancient Jungle Temple
  parent_location_uuid: null
- fabula_uuid: location_0eceb31c8664
  global_id: null
  canonical_name: The Catacombs
  description: A suffocating labyrinth of winding, claustrophobic chambers beneath
    ancient ruins packs decaying mummies, skull-lined walls, writhing scarabs, and
    swarms of bats. Thick air carries the stench of rot and weight of ancient curses.
    Indy and Marion push through the oppressive darkness, their fears sharpening amid
    the hunt and a race toward a sliver of sunlight cracking one wall.
  location_type: Ancient Catacomb Labyrinth
  parent_location_uuid: null
- fabula_uuid: location_c1160728a489
  global_id: null
  canonical_name: The Cliff Overlooking the Gorge
  description: A crumbling cliffside ledge serving as the final escape point for Indiana
    Jones, Willie Scott, and Short Round after their mine cart chase. This is the
    stable platform where characters perform actions (collapsing, saluting, observing
    the gorge below) and where the narrative transitions from peril to relative safety.
  location_type: Cliff Edge Overlooking River Gorge
  parent_location_uuid: null
- fabula_uuid: location_dda52408c668
  global_id: null
  canonical_name: The Cliffs
  description: A rugged cliffside near Pueblo ruins, used for a high-stakes chase
    scene in *Indiana Jones and the Last Crusade*. The cliffs overlook a desert valley
    and serve as a vantage point for Fedora's gang and Kazim's ambush, with no mention
    of crocodiles or geysers.
  location_type: Rugged Cliffside
  parent_location_uuid: null
- fabula_uuid: location_5f423c4ce7f8
  global_id: null
  canonical_name: The Dragon Nightclub (Shanghai, Interior Venue)
  description: A glamorous Art Deco nightclub in Shanghai, featuring a central ballroom
    with a paper-mâché dragon, silver stairways, and stained-glass windows. Serves
    as the primary setting for Indy’s negotiations with Lao Che, Wu Han’s poisoning,
    and the flaming pigeon skewer brawl. The **Third-Floor Balcony** is an exterior
    extension of this venue, used for the escape sequence.
  location_type: Shanghai Nightclub
  parent_location_uuid: null
- fabula_uuid: location_a94e6678192c
  global_id: null
  canonical_name: The Dragon Nightclub Exterior Entrance (Art Deco Pagoda)
  description: Ground-level decorative gateway serving as the controlled threshold
    for patrons, contrasting glamour with the nightclub’s interior violence.
  location_type: Nightclub Exterior Entrance
  parent_location_uuid: null
- fabula_uuid: location_8da382673033
  global_id: null
  canonical_name: The Hills (Western Route)
  description: Oppressively silent hills stretch westward, where Indiana Jones grips
    the reins atop the lead elephant, scanning the horizon with determination undercut
    by unease. Short Round clings nearby, eyes wide with awe and dread, while Willie
    shifts uncomfortably as her poise frays. A blood-red sunset bathes the barren
    slopes, its dying light mirroring the enslaved children's fading hope in Pankot
    Palace. The elephants' slow, relentless pace through this stark terrain drives
    home the pull of fate drawing the group onward.
  location_type: Arid Hills Route
  parent_location_uuid: null
- fabula_uuid: location_d91bbbfb6163
  global_id: null
  canonical_name: The Raven Saloon
  description: Indoor Nepalese saloon in Patan; distinct from outdoor snow bank located
    just beyond its entrance.
  location_type: Nepalese Saloon
  parent_location_uuid: null
- fabula_uuid: location_1bfabeba4c7d
  global_id: null
  canonical_name: The Rope Bridge (and Bottomless Gorge)
  description: A precarious rope bridge spanning a bottomless chasm filled with crocodile-infested
    rapids. The bridge sways violently over the abyss, its rotting planks splintering
    underfoot as Indy races across it. Thuggee guards swarm from both ends while Mola
    Ram chants dark rites amid a hail of Thuggee arrows. Indy severs the frayed ropes,
    causing the bridge to drop vertically into a flaming tangle. Willie and Short
    Round cling desperately as flames spread and the abyss beckons. The chasm itself
    is a sheer drop into shadowed depths, its narrow river teeming with hungry crocodiles
    that snap at falling bodies. Jagged walls amplify screams, and flaming arrows
    ignite the air above this pit of primal dread and gruesome death, where Thuggee
    guards and Mola Ram meet their end after the Sankara Stones scorch his flesh.
  location_type: Rope Suspension Bridge over Ravine
  parent_location_uuid: null
- fabula_uuid: location_e0c89969190d
  global_id: null
  canonical_name: The Shaman's Hut
  description: A cramped shelter used by Indiana Jones and Short Round for rest, located
    in Mayapore Village. Distinct from the Shaman's Hut by its lack of ritualistic
    elements and focus on tension/vigilance rather than healing.
  location_type: Village Shaman's Hut
  parent_location_uuid: null
- fabula_uuid: location_294166ebe1b3
  global_id: null
  canonical_name: The Trail (Indian Wilderness) (Willie’s Emotional Journey Scene)
  description: A rugged, sun-scorched trail winding through India’s wilderness, where
    Indiana Jones, Willie Scott, and Sajnu travel on elephant mounts. Willie’s tenderness
    with her elephant (dabbing perfume) and her vulnerability are central to this
    scene, marking a shift in her character arc. Distinct from the barren countryside
    scene, which lacks a defined path and focuses on environmental tension.
  location_type: Wilderness Trail
  parent_location_uuid: null
- fabula_uuid: location_65157e9b268c
  global_id: null
  canonical_name: Thick Stand of Trees (Peruvian High Jungle in *Raiders of the Lost
    Ark*)
  description: Dense jungle thicket in *Raiders of the Lost Ark* (S01E01) that obscures
    the Chachapoyan Temple. Mist and tangled branches create an atmosphere of isolation
    and betrayal, with porters fleeing in panic.
  location_type: Highland Jungle Thicket
  parent_location_uuid: null
- fabula_uuid: location_b4669cc50c69
  global_id: null
  canonical_name: Third-Floor Balcony (Exterior, The Dragon Nightclub, Shanghai)
  description: Critical escape route during the climactic sequence, located three
    stories above Shanghai’s streets and distinct from the nightclub’s ground-level
    entrance.
  location_type: Nightclub Balcony
  parent_location_uuid: null
- fabula_uuid: location_2db26a4237ce
  global_id: null
  canonical_name: Thuggee Mine Escape Tunnel
  description: "\n      Wider, rough-hewn mine tunnel in the Thuggee complex where\
    \ Indy, Willie, and Short Round flee a tidal wave, featuring damp floors and faint\
    \ daylight. **Terminates at a solid stone wall (dead-end) where the mine cart\
    \ halts before a tidal wave crashes in**, marking the climax of the escape sequence.\
    \ Part of the later mine escape sequence, distinct from earlier obstacle-course\
    \ sections (e.g., the mine cart tunnel with beams/boulders).\n      "
  location_type: Mine Escape Tunnel
  parent_location_uuid: null
- fabula_uuid: location_9fe5818fe4a9
  global_id: null
  canonical_name: Thuggee Mine Tunnels
  description: |-
    A labyrinthine network of narrow, claustrophobic mine tunnels beneath the Thuggee prison, characterized by:
      - **Cramped passages** branching from concentric paths around a central mining pit, where enslaved children crawl through tight shafts to haul heavy sacks of rock.
      - **Harsh working conditions**: Dust-choked air, whips cracking, chains rattling, and unstable walls prone to collapse, fueling Indy’s rage against the guards.
      - **Narrative function**: Serves as a critical escape route for Indy and his group, who race through mine cars, ducking beams and navigating sharp curves to derail pursuing Thuggee guards. The tunnels become deadly when a collapsing cistern floods the passages, forcing frantic sprints for survival.
      - **Architectural features**: Low ceilings, dead-ends, side passages, and a labyrinthine layout designed for enslaved labor but repurposed for high-stakes pursuit sequences.
  location_type: Underground Mine Tunnels
  parent_location_uuid: null
- fabula_uuid: location_be439061870d
  global_id: null
  canonical_name: Thuggee Mines Abyss
  description: A vast, dark pit yawns beneath the chamber behind Kali's altar, pierced
    by a cylindrical shaft of rising light that exposes enslaved Mayapore children
    toiling in the Thuggee mines far below. Indy crosses a narrow stone bridge to
    its edge, where clinking picks on rock and faint cries echo upward through suffocating
    darkness. The glow illuminates his shocked face, transforming a treasure hunt
    into a confrontation with cult depravity.
  location_type: Temple Mine Abyss
  parent_location_uuid: null
- fabula_uuid: location_7ef355f386dc
  global_id: null
  canonical_name: Thuggee Ore Quarry and Flood Zone
  description: A surface-level quarry above the mine tunnels, where Thuggee guards
    push mine cars loaded with ore. Site of the dynamite-triggered flood that cascades
    into the tunnels, igniting the high-speed pursuit sequence.
  location_type: Underground Mining Quarry
  parent_location_uuid: null
- fabula_uuid: location_ff742f88f871
  global_id: null
  canonical_name: Thuggee Temple Low Mine Obstacle Course Tunnel
  description: Claustrophobic internal section of the Thuggee Temple mine system,
    designed as a **deadly obstacle course** with collapsing beams, boulders, and
    rising floodwaters. Here, Indiana Jones, Short Round, and Willie Scott navigate
    a mine cart while being directly confronted by Mola Ram and Thuggee guards, setting
    up the subsequent escape sequence. This tunnel is **deeper within the mine system**
    and appears later in the episode.
  location_type: Claustrophobic Mine Tunnel Section
  parent_location_uuid: null
- fabula_uuid: location_7ae24640aa33
  global_id: null
  canonical_name: Thuggee Temple Mine Tunnel Exit (Daylight)
  description: Final escape threshold of the mine system, marked by piercing daylight
    and the transition from underground claustrophobia to open sky. Serves as the
    climactic moment where Indiana Jones, Short Round, and Willie Scott sprint to
    survival as a tidal wave pursues them, with Thuggee antagonists absent but their
    wrath symbolically lingering.
  location_type: Mine Tunnel Exit
  parent_location_uuid: null
- fabula_uuid: location_8a44f1afe521
  global_id: null
  canonical_name: Thuggee Temple Mines Entrance Tunnel
  description: Narrow, shadowy passage marking the threshold between the surface and
    the subterranean mine system, where Indiana Jones fights two Thuggee guards in
    brutal close quarters before proceeding to the rope bridge. This tunnel is the
    first subterranean location encountered and serves as a narrative gateway to the
    deeper challenges of the mine.
  location_type: Underground Mine Tunnel
  parent_location_uuid: null
- fabula_uuid: location_9f8b56427047
  global_id: null
  canonical_name: Tool Bin on the Quarry Conveyor Belt (Quarry Cavern)
  description: A movable container of mining tools (pick-axes) attached to the quarry's
    conveyor belt, used by the Thuggee giant to arm himself during the fight with
    Indiana Jones. Distinct from structural elements like the catwalk or balcony.
  location_type: Quarry Conveyor Belt Section
  parent_location_uuid: null
- fabula_uuid: location_9aab9dcfa117
  global_id: null
  canonical_name: Tool Shack
  description: Cramped shack on a quarry platform, stacked with picks, shovels, and
    mining gear amid hanging dust and the constant rumble of carts below. Indiana
    Jones slips inside to scan Thuggee operations, dodge the pursuing giant, and plot
    his breakout. He grabs a child from here to rally enslaved kids, turning the dim
    refuge into a spark for rebellion under flickering torchlight and echoing shouts.
  location_type: Quarry Platform Tool Shack
  parent_location_uuid: null
- fabula_uuid: location_7098ca51beed
  global_id: null
  canonical_name: Tunnel Behind the Altar (Temple of Death)
  description: Shadowy tunnel opens behind the stone altar in the Temple of Death,
    its confines lit faintly by distant torchlight amid the cavern's sulfurous heat.
    A haunting wind rushes through, shifting direction abruptly as Thuggee guards
    move within the darkness, signaling their ambush. Willie Scott and Short Round
    stand exposed here, caught off-guard as two guards emerge—one grabs Short Round
    by the throat, the other slams Willie against the damp wall. Desperate kicks and
    screams echo off jagged stone, the eerie draft amplifying their vulnerability
    before capture fractures the group.
  location_type: Subterranean Temple Tunnel
  parent_location_uuid: null
- fabula_uuid: location_6a4bb3138d69
  global_id: null
  canonical_name: Tunnels (Left and Right) in Quarry Cavern
  description: Mine car tracks in the quarry cavern split into two shadowed tunnels
    branching from the chaos of crashing carts, Thuggee gunfire, and dust-filled frenzy.
    The **left tunnel** offers the correct escape route, urgently advised by the redeemed
    Maharajah to Short Round, while the **right tunnel** (incorrectly chosen by Indy)
    plunges the trio into cool darkness and unknown dangers. Pursuers collide behind
    as the paths diverge, with the left tunnel promising safety and the right leading
    to peril.
  location_type: Quarry Escape Tunnel Branch
  parent_location_uuid: null
- fabula_uuid: location_dacb4d188276
  global_id: null
  canonical_name: Tunnels Adjacent to Spike Chamber
  description: Dark, narrow tunnels snake into the Spike Chamber deep beneath Pankot
    Palace, walls slick with slime and crawling with swarms of insects amid scattered
    litter. Willie Scott crawls through this claustrophobic horror, bugs tangling
    in her hair and clothes, her hand plunging into a revolting mucus-filled hole
    to seize the hidden release lever. Screams of disgust echo as she battles revulsion
    to halt the chamber's deadly spikes, the fetid air thick with Thuggee trap's psychological
    torment.
  location_type: Subterranean Trap Tunnels
  parent_location_uuid: null
- fabula_uuid: location_0bb1c5cf2129
  global_id: null
  canonical_name: Undergrowth
  description: 'Dense, tangled jungle foliage cloaks this perilous thicket near the
    Chachapoyan temple''s misty approach. Indian #1 stumbles upon a demon sculpture
    and bolts in terror. Indian #2 startles at a macaw''s shriek before vanishing.
    Slithering motions ripple through the vines, signaling hidden threats that prey
    on the unwary and heighten the guides'' dread of the temple ahead.'
  location_type: Jungle Undergrowth
  parent_location_uuid: null
- fabula_uuid: location_49aa441303b4
  global_id: null
  canonical_name: Underwater Tunnel to Nazi Submarine Base
  description: Submerged access passage in *Raiders of the Lost Ark* (Episode 1),
    leading to a Nazi submarine base. Features dense marine vegetation, drowning hazards,
    and is traversed via the *Wurrfler* submarine. Thematically tied to Nazi industrial
    might and Indy's physical survival.
  location_type: Submerged Access Tunnel
  parent_location_uuid: null
- fabula_uuid: location_feca46a4ac4c
  global_id: null
  canonical_name: University of Chicago
  description: The University of Chicago emerges in dialogue as the academic forge
    where Indiana Jones trained under his mentor Abner Ravenwood. Characters invoke
    it during a tense classroom briefing to explain Indy's deep knowledge of ancient
    artifacts and his strained mentor relationship. This off-screen institution carries
    the aura of rigorous scholarship—lecture halls filled with debate, libraries stacked
    with forbidden texts, and rivalries that birthed expertise on relics like the
    Ark. Its mention pulls the past into the present, grounding Indy's reluctant heroism
    in years of intellectual combat amid the lecture hall's clutter of maps and bones.
  location_type: University Campus
  parent_location_uuid: null
- fabula_uuid: location_880ac6476d6c
  global_id: null
  canonical_name: Upper Deck of the Bantu Wind (Open-Air)
  description: Exposed, open-air section of the Bantu Wind's upper structure, used
    for running and evasion during the Nazi ambush. Contrasts with the enclosed Bridge
    below.
  location_type: Freighter Upper Deck
  parent_location_uuid: null
- fabula_uuid: location_7286da2eec8b
  global_id: null
  canonical_name: Upriver Riverbank (Boa Constrictor Attack Scene)
  description: A specific, shallow section of the jungle riverbank where Willie Scott
    bathes and is attacked by a boa constrictor. Characterized by sunset lighting,
    muddy shores, and dripping foliage; distinct from the treacherous rapids downstream.
  location_type: Jungle River and Riverbank
  parent_location_uuid: null
- fabula_uuid: location_f3a35b091096
  global_id: null
  canonical_name: Urubamba River
  description: Churning waters of the Urubamba River rush below sheer cliffs in the
    Peruvian jungle, a turbulent lifeline for Indiana Jones. He plunges into the foaming
    current to escape Hovito warriors' spears and darts, then swims to Jock's amphibious
    plane moored nearby. Day fades to dusk amid the roar of rapids and overhanging
    jungle canopy, blending raw peril with fleeting salvation.
  location_type: Jungle River
  parent_location_uuid: null
- fabula_uuid: location_fd71ad4ee82a
  global_id: null
  canonical_name: Venetian Catacombs Labyrinth
  description: Subterranean **labyrinthine complex** beneath the Venetian Church,
    **accessed via the hidden passage in the Venetian Library**. Serves as the **primary
    adventure space**, containing Sir Richard’s tomb, swarming rats, and an oppressive
    atmosphere. **Extends beyond the immediate entrance**, hinting at a larger underground
    network.
  location_type: Ancient Underground Catacombs
  parent_location_uuid: null
- fabula_uuid: location_f08f6940a69b
  global_id: null
  canonical_name: Venetian Library (Converted Church)
  description: Above-ground Crusader-era library within a converted church, serving
    as the **intellectual and visual hub** for Indy and Elsa’s quest. Contains Grail
    clues (e.g., stained-glass windows, numbered columns, 'X'-marked floor tile) and
    is the **starting point** for their descent into the catacombs. **Distinct from
    the subterranean Catacombs Hidden Passage**, which is a physical entrance revealed
    within this library.
  location_type: Historic Converted Church Library
  parent_location_uuid: null
- fabula_uuid: location_134004a5c8b0
  global_id: null
  canonical_name: Venice Canal Steamer (Propeller Hazard)
  description: Docked steamer vessel in Venice canals whose churning propellers at
    the stern become a deadly hazard during Indy and Kazim’s hand-to-hand fight. The
    vessel’s propellers create a whirlpool of foam and spray, sucking their drifting
    boat into a near-death trap. The stern area later becomes the site of their tense
    alliance formation amid chase debris and engine thunder.
  location_type: Venetian Canal Dockside
  parent_location_uuid: null
- fabula_uuid: location_388a16698c4b
  global_id: null
  canonical_name: Venice Disembarkation Landing (Boat Landing)
  description: Specific disembarkation hub in Venice with stone steps, gondolas, and
    a crowded waterfront, serving as the narrative threshold for Indy and Brody's
    arrival and Elsa Schneider's first flirtatious greeting ('You have your father’s
    eyes'). Distinct from broader canal areas by its functional role as a transition
    point from travel to the Grail quest.
  location_type: Canal Boat Landing
  parent_location_uuid: null
- fabula_uuid: location_a9e4bfb1328e
  global_id: null
  canonical_name: Venice Grand Canal (Scenic Waterway)
  description: Broader, ambient waterway in Venice serving as a picturesque backdrop
    for romantic interactions (e.g., Indy/Elsa’s romance) and character moments (e.g.,
    Brody’s scrap revelation). Emphasizes the city’s romantic and historical atmosphere,
    lacking the functional specificity of a disembarkation point.
  location_type: Venetian Canal
  parent_location_uuid: null
- fabula_uuid: location_cba178f3353a
  global_id: null
  canonical_name: Venice Harbor Chase Dock
  description: Outdoor wooden dock structure in Venice Harbor where Indy, Elsa, and
    Kazim’s agents board motorboats to initiate the high-speed canal chase. Serves
    as the starting point for the action sequence.
  location_type: Harbor Dock
  parent_location_uuid: null
- fabula_uuid: location_fb0141a66fe1
  global_id: null
  canonical_name: Venice Safehouse Apartment
  description: Indoor scholarly workspace in Venice where Indy and Marcus Brody analyze
    Grail-related artifacts (e.g., Grail Diary, shield rubbing) to reconstruct the
    map. Daytime setting focused on mission planning and research.
  location_type: Urban Apartment
  parent_location_uuid: null
- fabula_uuid: location_aff62a5e0896
  global_id: null
  canonical_name: Venice Water Bus
  description: Indy and Brody board the water bus at their arrival point in Venice,
    engines rumbling as it cuts through lagoon waters toward the boat landing. Canal
    spray mists passengers amid the slap of waves against the hull and distant calls
    of gondoliers. Ancient facades slide past, sunlight glinting off ripples, while
    the vessel ferries them into the city's watery maze for their rendezvous with
    Elsa. The cramped deck buzzes with travelers, blending urgency and everyday Venetian
    rhythm.
  location_type: Canal Water Bus
  parent_location_uuid: null
- fabula_uuid: location_c1607fa586aa
  global_id: null
  canonical_name: Venice, Italy
  description: Venice, Italy is a pivotal location in the Holy Grail quest, serving
    as both the destination marked by a roadside signpost at a rural crossroads (where
    Indy and Henry clash over prioritizing Marcus Brody's rescue) and the historic
    coastal city housing the second Grail marker. The city's watery streets, ancient
    vaults, and Renaissance architecture are central to the narrative. Sun-drenched
    Venice Piazza hums with midday life, where pedestrians weave through the open
    square, some pausing at cafe tables arrayed before the library's imposing facade.
    Elsa leads Indiana Jones and Marcus Brody across the flagstones, the crowd's murmur
    and clink of cups underscoring their arrival. This vibrant threshold bridges Venice's
    canals to the library's shadowed secrets, where the Grail quest ignites amid everyday
    bustle.
  location_type: Historic Coastal City
  parent_location_uuid: null
- fabula_uuid: location_b21f97f1343e
  global_id: null
  canonical_name: Venice/Berlin Crossroads (Dusty Tree-Lined Escape Route)
  description: 'A sun-drenched rural country road crossroads under daylight skies,
    where Indiana Jones and Henry Jones Sr. skid to a halt during a frantic motorcycle
    chase from pursuing Nazi soldiers. The junction features a wooden signpost with
    paths to Venice (Marcus Brody''s captivity site) and Berlin (home of Henry''s
    Grail Diary), marking the climax of their escape. The narrow road, lined with
    trees and kicking up thick dust clouds, twists toward a barricade before opening
    to this crossroads. The scene captures a pivotal moment of tension: engines idle
    amid settling dust and gravel as Henry demands a detour to Berlin, leading to
    a heated confrontation—culminating in a slap—over clashing priorities (rescuing
    Marcus vs. pursuing the Grail). The open fields and distant hills amplify the
    raw emotions of their unresolved rift, blending urgency, family conflict, and
    the weight of their quest.'
  location_type: Rural Road Crossroads
  parent_location_uuid: null
- fabula_uuid: location_5e68a645bf05
  global_id: null
  canonical_name: Wang Poo Bridge
  description: Shanghai's neon lights flash across rain-slicked streets as Indiana
    Jones shouts directions to Short Round, urging the Duesenberg toward the Wang
    Poo Bridge. Bullets from Lao Che's sedans whip past while tires scream around
    corners. The bridge stands as their targeted escape route—a narrow span promising
    evasion amid the chase's chaos—though the trio never crosses it before the scene
    cuts. High stakes charge the air with urgency and uncertainty.
  location_type: City Bridge
  parent_location_uuid: null
- fabula_uuid: location_824e65e93e1f
  global_id: null
  canonical_name: Washington, D.C. Cityscape (Viewed from Pentagon Office Window)
  description: Sunlight pours through the window of Colonel Musgrove’s sterile Pentagon
    office, illuminating the expansive cityscape of Washington, D.C. below. Monumental
    buildings rise amid wide avenues and green expanses under clear daylight skies.
    The view frames the federal government's vast machinery, its streets and structures
    underscoring the bureaucratic weight pressing on Indiana Jones, Marion Ravenwood,
    and Marcus Brody as they confront evasive military officials over the Ark of the
    Covenant’s hidden destiny.
  location_type: Capital City Panorama
  parent_location_uuid: null
- fabula_uuid: location_935f579136ad
  global_id: null
  canonical_name: Water Tank Alongside the Track
  description: A stationary water tank rises beside the train tracks, its long spout
    whipping wildly in the wind as the circus train barrels past at high speed. Indiana
    Jones leaps from his galloping horse, grabs the spinning spout, and swings in
    a broad arc back onto the train roof and stockcar. Gravel dust kicks up under
    churning wheels, engine roars drown out hoofbeats, and pursuit shouts echo across
    the open countryside, transforming this rural rail fixture into Indy's desperate
    pivot point.
  location_type: Trackside Water Tank
  parent_location_uuid: null
- fabula_uuid: location_4c92d36d51ce
  global_id: null
  canonical_name: Well of Souls
  description: A vast, snake-infested chamber beneath Tanis, serving as the primary
    setting for the Ark's retrieval and the climactic confrontation between Indy,
    the Nazis, and the supernatural. Distinct from the altar platform it contains,
    as it encompasses the entire environment, including crumbling pillars, a massive
    stone door, and the space where Marion is shoved into the abyss.
  location_type: Ancient Subterranean Tomb
  parent_location_uuid: null
- fabula_uuid: location_903a3564ca6e
  global_id: null
  canonical_name: White Water Rapids
  description: Raft surges through treacherous currents jammed with jagged rocks;
    violent, rock-swollen waves pound the craft, nearly capsizing it amid deafening
    roar and icy spray. Indy steers with grim focus as Willie screams and Short Round
    clings white-knuckled, their terror palpable in the chaos. Mud cakes clothes,
    illusions shatter—the rapids demand total surrender to survival.
  location_type: River Rapids Stretch
  parent_location_uuid: null
- fabula_uuid: location_116ee9d1cf10
  global_id: null
  canonical_name: Wind Tunnel Overlook
  description: A high, narrow opening within the Temple of Death serves as a concealed
    vantage point above the cavernous ritual chamber. Indiana Jones, Willie Scott,
    and Short Round crouch here after escaping the spike chamber, peering down at
    the Thuggee cult's human sacrifice to Kali. Roaring wind surges through the tunnel,
    generating an eerie, musical howl that mingles with the worshippers' chants below.
    The gusts heighten the scene's dread, whipping at the observers as Mola Ram rips
    out a victim's beating heart and the Sankara Stones glow amid rising smoke from
    the lava pit.
