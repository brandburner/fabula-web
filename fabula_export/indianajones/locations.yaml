  description: The rotating fireplace floor in the Nazi-occupied castle room swings
    open to reveal this concealed passage, dropping Indiana Jones and Henry Jones
    Sr. into shadowy depths. Cool air rushes up from below, carrying faint echoes
    of the castle's stone bowels. Nazis pound on the hearth above as the pair escapes,
    the tunnel's sudden emergence hinting at layered castle secrets and the Holy Grail's
