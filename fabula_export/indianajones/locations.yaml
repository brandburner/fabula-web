  global_id: ger_location_7eee0d8faa88
  canonical_name: Pankot Palace Marble Bridge
  description: The marble bridge forms the grand approach to Pankot Palace, its polished
    stone expanse lined with Rajput guards gripping lances. Indiana Jones, Willie
    Scott, and Short Round cross under daylight as guards snap to attention in a rippling,
    domino-like salute that enforces the palace's iron discipline. Willie startles
    with a jump before flashing a flirtatious grin, merging rigid ceremony with the
    trio's casual intrusion into this formal threshold.
  location_type: Palace Approach Bridge
