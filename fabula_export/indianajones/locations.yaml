  global_id: ger_location_c8bdd6e92152
  canonical_name: Stern of a Steamer
  description: Massive propellers at the stern of a passing steamer churn harbor waters
    into a frothing, deadly maelstrom. Indy and Kazim's speedboat hurtles toward the
    giant rotating blades during their brutal fight, the suction pulling them inexorably
    into shredding range. Engine roar drowns out shouts, waves crash against the hull,
    and foaming wake marks the zone of instant destruction where Kazim meets his end.
  location_type: Steamer Stern
