- fabula_uuid: ger_location_b5b3118e3f2a
  global_id: ger_location_b5b3118e3f2a
  canonical_name: Dead-End Wall (Mine Tunnel)
  description: Solid rock wall terminates the narrow mine tunnel's rusted tracks,
    where Indiana Jones dangles beneath the runaway cart to manually press the brake
    pad, screeching it to a halt inches from impact. The trio scrambles out amid swirling
    dust and heavy breaths, the wall's unyielding face forcing them to abandon the
    vehicle as the deafening roar of Mola Ram's unleashed tidal wave echoes closer.
    Damp stone gleams faintly under lantern light, turning momentary relief into desperate
    flight down a side passage.
  location_type: Underground Mine Dead-End
  parent_location_uuid: null
  season_appearances:
