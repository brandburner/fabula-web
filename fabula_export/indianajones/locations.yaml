  global_id: ger_location_7422257d082a
  canonical_name: Large Tunnel
  description: Trio slides from chute into this vast underground passage, stone walls
    echoing faint water drips and distant rumbles. Brief relief hits as roar fades,
    daylight glimmers ahead at the mouth—their sole exit. Explosion triggers massive
    tidal wave; water surges in, slamming walls, forcing desperate sprint through
    rising foam and debris. Space shifts from refuge to deathtrap, amplifying panic
    and bonds under flood's roar.
  location_type: Underground Escape Tunnel
