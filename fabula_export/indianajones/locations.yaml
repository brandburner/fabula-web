- fabula_uuid: ger_location_b57f7f52b007
  global_id: ger_location_b57f7f52b007
  canonical_name: The Secret Canyon (Collapsing Sandstone Passage)
  description: A later, more perilous canyon where Indiana Jones, Henry Jones Sr.,
    Sallah, and Elsa Schneider flee Nazi forces amid catastrophic rockslides, distinguished
    by its unstable sandstone walls and role as an escape route rather than an observation
    point.
  location_type: Narrow Desert Canyon
  parent_location_uuid: null
  season_appearances:
  - 1
  local_uuids:
