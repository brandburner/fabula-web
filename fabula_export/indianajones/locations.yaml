- fabula_uuid: ger_location_bd4b8cbdb970
  global_id: ger_location_bd4b8cbdb970
  canonical_name: Desert of the American Southwest
  description: Vast arid expanse bakes under daytime sun, cracked earth stretches
    toward a dominant mountain peak and ancient cliffside Pueblo. Boy Scouts ride
    horseback through the barren landscape, hooves kicking dust as Scoutmaster Havelock
    halts the troop and warns of labyrinthine passageways snaking miles inside the
    rocky settlement. Young Indiana Jones stands apart, eyes fixed on the Pueblo's
    mysteries; the isolating terrain sharpens curiosity against looming dangers of
    trespass.
  location_type: Arid Desert Basin
