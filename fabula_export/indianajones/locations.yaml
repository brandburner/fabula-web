  canonical_name: Germany
  description: Germany draws the zeppelin into a sharp bank as sunlight shifts across
    the compartment table, betraying the course reversal. Indy spots the turn first
    and calls it out amid his father's Grail talk, marking the Nazi homeland as a
    site of capture with guards, prisons, and regime control. The distant country
    halts their escape, mirroring the father-son deadlock and forcing stalled emotions
    into urgent action under the engines' steady drone.
  location_type: Country
