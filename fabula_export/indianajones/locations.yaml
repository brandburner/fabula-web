  description: Sunset bathes the canyon entrance in golden light as Indiana Jones,
    Henry Jones Sr., Marcus Brody, and Sallah ride away from the Well of Souls on
    horseback. Long shadows stretch across the dusty expanse, their silhouettes sharp
    against the horizon. Dust rises from hooves, the air warm and still, while the
