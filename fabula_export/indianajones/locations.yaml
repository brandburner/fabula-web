  description: Polished marble steps drop sharply from the ballroom's edge to the
    dance floor below. A three-meter gong barrels down them, gaining destructive speed
    as it smashes railings and scatters panicked patrons. Indy hunkers behind the
    rolling metal shield, deflecting bullets while guiding Willie through the chaos
    of gunfire, screams, and splintering fixtures.
