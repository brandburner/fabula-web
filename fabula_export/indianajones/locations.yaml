  global_id: ger_location_a1646d504e19
  canonical_name: India
  description: India receives the battered trio as their raft scrapes into a river
    clearing. Indy names the country while sprawled in exhaustion, fingers trailing
    shallow water. Short Round scans the banks warily, Willie groans in disbelief.
    A gaunt shaman with painted face leans in, palms pressed in ritual salute; Indy
    returns the gesture, bridging survival to cultural rite. Jungle edges frame the
    spot, charging the air with village expectations and Sankara Stone mysteries.
  location_type: South Asian Country
