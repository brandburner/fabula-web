  global_id: ger_location_ee4756f7409f
  canonical_name: Wurrfler Conning Tower (submarine turret)
  description: The conning tower / turret of the Nazi submarine Wurrfler — the raised
    periscope-and-bridge structure that both protrudes into the sub base docking bay
    during Ark unloading and later serves as Indy's precarious hold as the sub dives.
    The feature is characterized by an exposed periscope that Indy uses to hide and
    secure himself with his whip, the captain and bridge crew (including tensions
    with Shliemann) immediately below, and the changing conditions around it (ceremonial
    unloading/dockside bustle versus dive klaxons, flooding decks, and rolling seas).
  location_type: Submarine Conning Tower
