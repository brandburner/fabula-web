- fabula_uuid: ger_location_52582e2d71d8
  global_id: ger_location_52582e2d71d8
  canonical_name: Circus Train
  description: The rooftop of a speeding circus train's stockcar pitches and sways
    violently, exposing Indy to whipping winds and the peril of open rails below.
    Fedora corners him here with Halfbreed, Rough Rider, and Roscoe; they drag him
    toward a jagged hole in the roof while he clutches the Cross of Coronado. Taunts
    fly amid the roar of wheels on tracks. Chaos breaks when a snake uncoils from
    Indy's sleeve onto Roscoe's hand, sparking panic that lets Indy leap to Dr. Fantasy’s
    Magic Caboose next door. Every grip and jump tests survival against height, speed,
    and gang pursuit.
  location_type: Circus Train Stockcar Rooftop
