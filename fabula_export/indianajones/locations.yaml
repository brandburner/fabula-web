  global_id: ger_location_0989ab4895bf
  canonical_name: Wurrfler's Aft Main Deck Rail
  description: Indy grabs the aft rail first, slick with seawater as the Wurrfler
    dives. Flooding deck surges around his legs; he hauls his soaked body aboard,
    hat lost to waves, metal bites into hands amid the sub's tilt. This rear edge
    serves as desperate foothold, channeling raw survival against Nazi U-boat's plunge—salt
    spray stings, water roars, every grip tests resolve before he climbs to turret.
  location_type: Submarine Main Deck Rail
