- fabula_uuid: ger_location_bcf0ca80625f
  global_id: ger_location_bcf0ca80625f
  canonical_name: Potted Palm in the Ballroom
  description: A tall potted palm anchors one corner of Lao Che's opulent nightclub
    ballroom, its broad fronds quivering under gunfire. Indiana Jones drops behind
    it for cover as Lao Che's gunmen advance, bullets snapping through thickening
    smoke. He shouts at Willie Scott to hold the antidote vial and stay put while
    patrons scream and scatter. The plant offers fleeting protection in the chaos,
    leaves rustling with each desperate shift.
  location_type: Nightclub Ballroom Cover Spot
  parent_location_uuid: null
