  episode_count: 1
- fabula_uuid: ger_location_4b480e0e2d4b
  global_id: ger_location_4b480e0e2d4b
  canonical_name: The Cavern
  description: Indiana Jones lures a raging Thuggee guard into this dark, enclosed
    cavern tunnel, where shadows swallow sight and stone walls hurl back every shout
    in mocking echoes. Claustrophobia grips the space, twisting the guard's disorientation
    into blind fury and exposing the cult's paranoia to Indy's cold trap. Tense air
    thickens with the promise of violence, turning the passage into a psychological
    kill zone where instinct devours ideology.
  location_type: Cult Cavern Tunnel
  parent_location_uuid: null
  season_appearances:
  - 1
  local_uuids:
    1: location_b37013dc099b
  first_appearance_season: 1
