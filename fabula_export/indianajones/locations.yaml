    Brody huddle after the Brotherhood''s interrogation. Brody nurses a head wound
    as they spread the waterlogged Grail Knight’s shield rubbing, Henry Sr.’s incomplete
    map, and recall the Grail Tablet’s verse. Alexandretta—Iskenderun—emerges from
    the clues, transforming the cramped space into an urgent planning hub. Tactical
    decisions crackle here: Brody heads to rendezvous with Sallah while Indy races
    to rescue his father, blending scholarly breakthrough with high-stakes resolve.'
