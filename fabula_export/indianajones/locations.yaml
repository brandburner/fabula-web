  description: Open rural roads snake through fields under clear day skies. A Nazi
    Messerschmitt dive-bomber screams down, machine guns rattling—bullets stitch the
    ground, shredding air and erupting dirt geysers around the speeding car. Indy
    wrenches the wheel in tight evasions; Henry white-knuckles the dash, shouting
