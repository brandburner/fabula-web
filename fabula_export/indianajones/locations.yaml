- fabula_uuid: ger_location_0d7d751db302
  global_id: ger_location_0d7d751db302
  canonical_name: Pueblo Kiva and Passageway
  description: A subterranean complex beneath an ancient Cliff Pueblo, consisting
    of a sacred **kiva** (ceremonial chamber) and a narrow, **underground passageway**
    connecting to it. Young Indy and Herman descend into the **kiva’s spider-webbed
    depths**, where lantern light reveals grave robbers unearthing the **Bejeweled
    Cross of Coronado** from packed earth. The space is claustrophobic, with **slithering
    snakes**, **damp stone walls**, and **echoing footsteps** heightening tension.
    Indy snatches the artifact amid shouts, then climbs a rope through the **tight
    passageway** (a confined, echoing corridor) as the crew led by Fedora pursues.
    The **passageway** is distinct from the **kiva** itself but functionally linked—both
    are part of the same subterranean system beneath the Pueblo.
  location_type: Underground Pueblo Passageway
  parent_location_uuid: null
