- fabula_uuid: ger_location_2e0ce5fc1dee
  global_id: ger_location_2e0ce5fc1dee
  canonical_name: Wind Tunnel
  description: Narrow cavernous passage carved into the rock above the Temple of Death,
    where roaring winds howl eerily and intermittently blast through. Indiana Jones,
    Willie Scott, and Short Round enter from the spike chamber and crouch at its mouth
    as a hidden perch, overlooking Mola Ram's heart-ripping sacrifice and the glowing
    Sankara Stones below. The sinister gales amplify tension, foreshadowing the Thuggee
    guards' ambush that pins Willie and Short Round in desperate hand-to-hand combat
    amid whipping gusts and shadowed chaos.
  location_type: Cavernous Underground Wind Tunnel
