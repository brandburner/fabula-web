- fabula_uuid: ger_location_ddd705fa4823
  global_id: ger_location_ddd705fa4823
  canonical_name: The Dragon Club Entrance Hall
  description: Narrow, smoke-hazed threshold at the front of The Dragon nightclub,
    serving as the exclusive gateway between the street and the club's interior. This
    space is characterized by high-society patrons in silk gowns and tuxedos, a doorman
    enforcing exclusivity, and a maitre d' managing apologies for intrusions. Short
    Round's collision with the Tuxedo Man and subsequent ejection by the doorman occur
    here, emphasizing the contrast between street-level chaos and the club's glamour.
  location_type: Nightclub Entrance
  parent_location_uuid: null
  season_appearances:
