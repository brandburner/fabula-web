  global_id: ger_location_987fb1a9d21d
  canonical_name: Country Highway (Shanghai Outskirts)
  description: Straight asphalt stretches through the night beyond Shanghai's city
    lights. The Duesenberg speeds along the highway, pulling away from urban glow
    as Lao Che's sedans race past in close pursuit. Headlights pierce the darkness
    while engines roar and tires grip the road, turning the route into a tense chase
    toward the airfield. Indy, Short Round, and Willie brace against speed and collision
    risk in the open air.
  location_type: Rural Highway
