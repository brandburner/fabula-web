  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_location_281ae1951c31
  global_id: ger_location_281ae1951c31
  canonical_name: The Sky (Aerial Combat Zone)
  description: Vast open sky stretches endlessly during daytime as Indiana Jones and
    Henry Jones Sr. pilot their biplane in a frantic high-speed chase against two
    pursuing Messerschmitt fighters. Gunfire cracks through the air, Henry's fumbled
    machine-gun bursts sever the tail stabilizer, and the aircraft spirals toward
    earth. The sky's boundless expanse sharpens the biplane's fragility, amplifies
    Indy and Henry's desperation, and turns freedom into a deadly trap where stray
    bullets and engine roars dictate survival.
  location_type: Open Aerial Sky
  parent_location_uuid: null
  season_appearances:
  - 1
  local_uuids:
    1: location_b3f94753f3b7
  first_appearance_season: 1
