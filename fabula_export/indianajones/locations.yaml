- fabula_uuid: ger_location_9612328603fe
  global_id: ger_location_9612328603fe
  canonical_name: Sunset (Direction of the Elephants’ Return)
  description: Short Round sprints toward this sunset direction as elephants approach
    Mayapore village, the baby elephant rushing ahead with trunk raised. Golden light
    floods the horizon, dust rises from plodding feet, and joyful trumpets mix with
    villagers' cheers. The herd's return caps the village's restoration, Short Round
    wraps his arms around the baby in reunion, their embrace captures innocence amid
    the day's fading warmth and the adventure's close.
  location_type: Village Horizon Path
