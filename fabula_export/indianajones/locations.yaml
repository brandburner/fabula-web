  canonical_name: Blood-Orange Sunset
  description: The DC-3 banks west into this vivid blood-orange sunset, its glow enveloping
    the plane as it streaks toward Nepal. Warm light fades across vast skies, compressing
    hours of flight into moments that cool post-violence adrenaline. Indy sits alone
    amid the isolation, horizon underscoring his resolve against dusk's advance and
    unseen pursuers trailing the Ark.
