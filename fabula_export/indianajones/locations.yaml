- fabula_uuid: ger_location_1b57716d6335
  global_id: ger_location_1b57716d6335
  canonical_name: Cobblestone Path of Jehovah (Grail Temple Trial)
  description: A narrow, trap-filled cobblestone path spanning a chasm in the Grail
    Temple, where each stone tile is engraved with Latin and Greek letters. Indiana
    Jones must step precisely on the tiles spelling *Jehovah* (I-H-O-S in Latin) to
    avoid triggering deadly traps—wrong steps cause tiles to collapse into a fiery
    abyss below. The path is bathed in shafts of sunlight piercing dust-choked air,
    with Henry Jones Sr.'s fading guidance echoing off the stone walls. The trial
    demands ancient wisdom and precise recall under extreme urgency, serving as a
    test of knowledge and focus after the pendulum trial.
  location_type: Grail Temple Trial Path
  parent_location_uuid: null
