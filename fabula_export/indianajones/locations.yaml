  description: These stairs drop from the upper levels of the Sultan's palace in Iskenderun
    into the sun-drenched courtyard below. Elsa rushes down them, her heels striking
    stone as she bursts into view, delivering the shattering news of Indiana Jones
    and Henry Jones's escape. The descent commands attention amid Donovan and Vogel's
