- fabula_uuid: ger_location_26dd2cfc0fd9
  global_id: ger_location_26dd2cfc0fd9
  canonical_name: The Dragon Nightclub Third-Floor Balcony and Awning
  description: This third-floor balcony clings to the side of The Dragon Nightclub
    in nighttime Shanghai, anchoring a flimsy awning that Indiana Jones and Willie
    Scott shred during their uncontrolled fall from the green-tiled roof above. The
    awning, stretched taut across the third floor, snags the pair mid-plunge, its
    canvas shredding in their grip as fibers snap amid night wind. The structure buckles
    briefly, arresting their fall before they rip through to the second-floor mattress
    below. The balcony and awning together form part of the nightclub's layered facade,
    channeling chaotic momentum from the rooftop escape into lower perils, where screams
    mix with shattering echoes.
  location_type: Nightclub Balcony
  parent_location_uuid: null
  season_appearances:
  - 1
  local_uuids:
