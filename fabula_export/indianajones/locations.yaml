- fabula_uuid: ger_location_c992ad5844ca
  global_id: ger_location_c992ad5844ca
  canonical_name: Iskenderun Train Station
  description: Sun-drenched platforms and chaotic streets of Iskenderun Train Station
    swarm with vendors hawking food and water amid jostling crowds and sensory overload.
    Marcus Brody disembarks here, fumbles through language barriers that expose his
    disorientation, and falls prey to Nazi agents posing as museum reps. Sallah arrives
    amid the bustle, launches a brutal counterattack with a newspaper weapon, but
    Brody's panic drives him straight into a departing Nazi troop truck, its doors
    slamming shut on his accidental capture.
  location_type: Urban Train Station
  parent_location_uuid: null
