  global_id: ger_location_90b31946a37a
  canonical_name: DC-3 Interior
  description: Dim cabin glows from a single seat lamp as Indiana Jones hunches over
    Abner Ravenwood’s journal and a hand-drawn Nepal map, plotting his Ark pursuit
    during night flight. Seats line the narrow aisle where a trench-coated European
    spy locks eyes on him from across the way, turning solitary research into stalked
    exposure. Hushed engines hum beneath the tension of unseen pursuit.
