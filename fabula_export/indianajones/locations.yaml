  global_id: ger_location_8214c9260ae3
  canonical_name: Cliff-Ringed Island
  description: Indiana Jones spots a pristine island ringed by sheer cliffs from the
    submarine's periscope at night. The rugged coastline looms as an immediate threat—the
    sub barrels toward the rock face before diving, forcing Indy to improvise with
    his jacket for underwater protection. Sheer drops and isolated beauty underscore
    the peril, turning scenic backdrop into a deadly deadline that tests his survival
    instincts amid cold waves ahead.
