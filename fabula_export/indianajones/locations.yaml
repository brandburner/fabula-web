  global_id: ger_location_e76b58f668dd
  canonical_name: Hok’s Palace Entry Hall
  description: Servants steady shaken Willie and guide her unsteady steps through
    this grand interior hall toward her chambers. The magnificent foyer earlier hosted
    Hok's bombastic entrance in gaudy gold robe, flanked by Japanese samurai and Chinese
    advisor, as impatient Germans bowed amid prolonged ritual. Hok asserted dominance
    through spectacle, undercutting their power with theatrical humiliation. Tension
    fills the space, shifting from cultural standoffs to quiet caretaking that highlights
    Willie's vulnerability.
