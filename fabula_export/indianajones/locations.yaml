- fabula_uuid: ger_location_ee8d7ac34bd1
  global_id: ger_location_ee8d7ac34bd1
  canonical_name: White Water Rapids
  description: Surging rapids choke with rock-swollen waves and roaring torrents.
    The raft plunges through, twisting and slamming the trio—Indiana Jones at the
    prow, Willie Scott screaming in panic, Short Round clinging to the sides. Indy's
    control frays amid the chaos. Violent tossing exhausts them physically and tests
    their endurance until the waters slow.
  location_type: Whitewater Rapids
  parent_location_uuid: null
