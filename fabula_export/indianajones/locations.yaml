- fabula_uuid: ger_location_7d2ff612a253
  global_id: ger_location_7d2ff612a253
  canonical_name: Plateau Above the Gorge (Thuggee Archer Position)
  description: Elevated plateau nestled amid a grove of trees overlooking a sheer
    gorge, serving as a strategic position for Thuggee archers during the battle with
    Indiana Jones. The plateau provides commanding height and clear sightlines over
    the gorge, where Indiana Jones, Willie Scott, and Short Round cling to a collapsing
    rope bridge amid crocodiles below. Thuggee archers notch flaming arrows and unleash
    volleys downward, igniting the rope bridge and pressuring the protagonists. The
    plateau's tangled grove offers cover for the archers while British cavalry charges
    across the exposed ground, rifles cracking as they overrun the cultists' perch.
    The chaotic battlefield is marked by shouts, fire crackles, and the whistling
    of arrows through humid air, with flames licking the air and splintered branches
    scattering amid the acrid smoke of battle.
  location_type: Jungle Gorge Overlook Plateau
  parent_location_uuid: null
