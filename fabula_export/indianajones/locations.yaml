- fabula_uuid: ger_location_792ed6c50728
  global_id: ger_location_792ed6c50728
  canonical_name: Indiana Jones's Suite in Pankot Palace
  description: Indiana Jones's opulent guest suite in Pankot Palace, a site of both
    romantic tension and violent confrontation. The suite features magnificent wall
    paintings, life-size figures of Rajput princes, and hidden Thuggee assassins concealed
    behind armed guard portraits. Indy undresses here after flirting with Willie Scott,
    leaving the door ajar in anticipation, while Short Round sleeps on a chaise lounge.
    The space becomes a battleground when a Thuggee assassin materializes from a painting,
    forcing Indy to fight back—smashing a pot on the intruder's head and whipping
    him onto a ceiling fan. Willie's scream from her adjacent room reveals the cult's
    pervasive reach, framing the suite as a deceptive refuge where power struggles
    and cult threats collide against the backdrop of gilded splendor.
