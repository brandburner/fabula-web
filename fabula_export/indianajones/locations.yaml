  global_id: ger_location_eab5982fd5e6
  canonical_name: Different Dune
  description: Hot desert sun bakes the crest of this elevated dune where Indiana
    Jones perches with his surveyor's instrument. He triangulates a precise line from
    map-room coordinates across the Nazi encampment to an untouched sand swell hiding
    the Well of Souls. Wind stirs fine grains as his sharp eyes pierce the deceptive
    landscape, his triumphant 'There!' cutting the tense air and igniting the race
    against Belloq's dig. The high vantage reveals the true site amid endless dunes.
  location_type: Desert Vantage Dune
