  global_id: ger_location_803959155cf1
  canonical_name: Summit Hairpin Turn (Nazi Chase Sequence)
  description: A narrow, high-elevation hairpin turn on a mountain road near the summit,
    serving as a climactic chase pivot in the Nazi pursuit sequence. Unlike the Mountain
    Tunnel (Nazi Chase Trap), this turn's danger lies in its sheer drop and low guardrail,
    which force vehicles to skid and plunge explosively into the valley. Appears in
    the opening chase sequence of *Raiders of the Lost Ark*.
  location_type: Mountain Road Hairpin Turn
