  global_id: ger_location_653d83ca226a
  canonical_name: Wurrfler
  description: The Wurrfler looms as a Nazi transport ship moored close to the Bantu
    Wind, its deck the ordered destination for soldiers carrying the crated Ark aboard
    under Shliemann's commands. Nazi efficiency drives the transfer amid tense standoffs
    on the nearby bridge, where Belloq watches with reverent hunger and Captain Katanga
    barters Marion in defeat. Gray steel hulls and barked orders fill the air with
    cold bureaucratic triumph, the vessel claiming the artifact and escalating Indy's
    pursuit into enemy territory.
  location_type: Nazi Transport Ship
