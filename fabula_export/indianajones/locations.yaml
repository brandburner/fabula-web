  canonical_name: Breath of God Chamber
  description: Narrow corridor in the Grail Temple traps Indy with a massive razor-sharp
    pendulum blade swinging in deadly arcs across the passage. He drops to his knees
    to pass beneath its lowest sweep, the air slicing with each whoosh as stone walls
    close in. Desperation mounts; Indy jams the mechanism with a torch, halting the
    blades amid grinding metal and echoing tension. The space demands humility, testing
    his resolve to reach the healing Grail and save his dying father.
