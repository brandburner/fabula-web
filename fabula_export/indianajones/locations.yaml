- fabula_uuid: ger_location_511217017fa0
  global_id: ger_location_511217017fa0
  canonical_name: Jagged Mountain Summit
  description: Jagged ridges crown this high mountain summit, lightly dusted with
    snow that the fleeing DC-3 skims in a close escape during the aerial pursuit.
    Kao Kan's biplane, fixed on the transport's tail, cannot recover and slams into
    the peak, bursting into flames that hurl debris down the slopes. Pilots face fierce
    winds, thin air, and sudden death here, turning the summit into the chase's deadly
    end point as the DC-3 pulls away.
  location_type: Mountain Summit
  parent_location_uuid: null
