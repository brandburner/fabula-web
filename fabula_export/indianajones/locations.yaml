  global_id: ger_location_318982826f24
  canonical_name: Dump Ramp
  description: A steep, grit-choked ramp climbs through the quarry cavern where laborers
    haul mine carts upward and tip them to dump rocks onto the grinding conveyor belt
    below. Dust swirls amid the screech of metal rails and crash of spilling stone.
    Indiana Jones ducks behind a splintered wooden post, then battles the towering
    Thuggee giant atop a lurching cart—their blows sending it barreling toward the
    rock crusher's hungry jaws. Every surface vibrates with mechanical fury and the
    threat of sudden death.
  location_type: Quarry Mine Dump Ramp
