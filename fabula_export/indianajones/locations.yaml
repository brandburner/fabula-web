- fabula_uuid: ger_location_0e4f1172179c
  global_id: ger_location_0e4f1172179c
  canonical_name: The Spike Chamber
  description: Part of the Thuggee cult’s temple in *Indiana Jones and the Temple
    of Doom* (1984), this chamber features **spikes, grinding walls, and descending
    blades**, requiring teamwork to escape. Unlike the Pendulum Chamber, it lacks
    a single pendulum and is thematically focused on **heroism under pressure**.
  location_type: Ancient Temple Trap Chamber
  parent_location_uuid: null
  season_appearances:
