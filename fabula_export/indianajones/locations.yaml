- fabula_uuid: ger_location_f190afcd59c9
  global_id: ger_location_f190afcd59c9
  canonical_name: Desert Valley
  description: Scorching sun beats down on this vast, open desert valley, turning
    it into a chaotic battleground of cliffs, rocks, and barren terrain. Kazim’s Brethren
    ambush Donovan’s Nazi convoy here amid gunfire, grenades, and exploding vehicles.
    Horses, camels, and men scramble for cover that barely exists. Indy and Sallah
    observe from high vantage points, steal mounts, then flee a pursuing tank across
    exposed sands with no escape routes. Extreme heat and lack of cover force desperate
    maneuvers, from horse chases to sabotaging cannons with stones scooped from culverts.
  location_type: Desert Valley Battlefield
