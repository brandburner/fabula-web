  description: Siam pulls Indy, Willie, and Short Round forward as their confirmed
    destination during the Duesenberg's high-speed flight from Shanghai's nightclub
    carnage. Indy pulls tickets from his pocket and names it aloud, shifting focus
    from Wu Han's death to survival logistics. Short Round masks grief with bold claims
    of protection, while Willie grabs the spare ticket and frets over her evening
    gown's inadequacy for Siam's humid streets and shadowed intrigue. The word hangs
    heavy with promise of refuge laced with fresh perils.
