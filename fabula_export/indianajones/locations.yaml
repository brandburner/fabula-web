  description: The dramatic cliff edge where the Nazi tank pursuit reaches its peak,
    serving as the backdrop for Sallah’s rescue of Henry Jones Sr. and Indy’s near-fatal
    encounter with the tank’s gun barrel. This location is defined by its role in
    the high-stakes action sequence, including Indy’s hat being ripped off and stones
