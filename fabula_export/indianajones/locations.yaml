  canonical_name: Cloudbank (daytime aerial cloudbank)
  description: 'A dense daytime aerial cloudbank that the DC-3 plunges into during
    its escape: under bright skies the plane dives into thick white vapors that erase
    visibility and muffle engines, breaking the pursuing enemy biplanes'' targeting
    lock. The concealment—used while ferrying the Sankara Stones and rescued children—briefly
    hides the DC-3 as fighters circle above; Kao Kan peers from clear air outside,
    turning the bank''s embrace into a fleeting shield that heightens pursuit tension
    before the next break.'
  location_type: Aerial Cloudbank
