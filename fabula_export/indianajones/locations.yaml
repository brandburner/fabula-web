- fabula_uuid: ger_location_abee2d5b808e
  global_id: ger_location_abee2d5b808e
  canonical_name: Alexandretta (Iskenderun)
  description: "\n  **Alexandretta (Iskenderun)** is the Grail quest's starting point,\
    \ a city historically known as Alexandretta and now the modern Turkish port of\
    \ Iskenderun. The Knights of the First Crusade destroyed the original city during\
    \ their march, and its name was deciphered by Indy and Brody from a waterlogged\
    \ shield rubbing in Venice, which they used to complete Henry Sr.'s incomplete\
    \ map and identify the Canyon of the Crescent Moon as the next destination.\n\n\
    \  **Narrative Context:**\n  - **Grail Trial City:** Alexandretta is the site\
    \ of three mythic trials requiring cunning and faith, central to the Grail quest.\n\
    \  - **Modern Setting:** The city is depicted as a sunbaked, crowded port with\
    \ narrow streets clogged with camels and pedestrians, where Sallah navigates chaotic\
    \ conditions while Indy and Henry absorb the news of Brody's abduction. The bottlenecks\
    \ and urgency of the location amplify the desperation of the Grail race.\n  -\
    \ **Key Events:** Brody travels here to meet Sallah as Nazis close in, while Indy\
    \ and Henry remain in Venice, driving the team's split and father-son resolve.\n\
    \  "
  location_type: Grail Trial City
  parent_location_uuid: null
