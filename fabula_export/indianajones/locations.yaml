    Castle Brunwald, located adjacent to both Henry Jones's electrified cell and the
    room where Nazi soldiers study maps. Indiana Jones knocks sharply on its wooden
    surface to create a diversion, the sound cutting through the tense atmosphere
    of the vaulted corridor. This action momentarily distracts the guards, allowing
    Indy to tighten his grip on his revolver and buy critical seconds for his stealthy
    pursuit of the Grail diary and his father's rescue. Elsa Schneider waits nearby,
