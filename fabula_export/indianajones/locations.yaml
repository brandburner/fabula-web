- fabula_uuid: ger_location_04e92ff4f864
  global_id: ger_location_04e92ff4f864
  canonical_name: The Dragon Nightclub Second-Floor Balcony
  description: Narrow ledge on the second floor outside The Dragon Nightclub catches
    Indiana Jones and Willie Scott mid-fall from the third-floor awning above. An
    old man's mattress absorbs their impact amid flying fabric and stuffing; night
    shadows from the club below darken the space as the thin padding shreds under
    their weight. Debris scatters over the street edge before they drop into the parked
    Duesenberg below, turning the balcony into a momentary, chaotic buffer in their
    frantic descent.
  location_type: Nightclub Balcony
  parent_location_uuid: null
  season_appearances:
  - 1
  local_uuids:
    1: location_3ad52fed5883
