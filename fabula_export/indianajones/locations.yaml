  global_id: ger_location_adcaf6710af6
  canonical_name: Kali Altar
  description: Indiana Jones and the freed children tear a wooden panel from beneath
    Kali's looming statue on this altar, dropping it as a makeshift bridge over a
    roaring fire pit. Flames separate the altar from the worshippers' area, where
    cult guards once dominated. Bare feet pound the smoldering plank amid revolt chaos,
    flames licking upward as the span ignites, stranding the heroes while securing
    the slaves' flight. The space crackles with defiance and peril, its ritual focus
    inverted into a desperate launch point.
  location_type: Thuggee Mine Altar
