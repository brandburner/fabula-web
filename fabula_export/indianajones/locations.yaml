  global_id: ger_location_1623542907b6
  canonical_name: Venetian Library (Converted Crusader Church)
  description: A hushed Venetian hall originally built as a Crusader church, now repurposed
    as a grand library. The space features stained-glass windows depicting knights,
    marble columns etched with Roman numerals (III, VII, X), and an elaborate tile
    floor. The library contains an elevated loft where Indy climbs to peer down through
    soft stained-glass light, spotting an 'X'-marked tile amid the Roman numerals
    on the floor and columns below. He descends swiftly, smashes the tile with urgent
    force, and reveals a hidden passage exhaling cold, rancid air, transforming the
    scholarly sanctuary into a gateway of peril and discovery. The hidden passage
    leads to the Grail Tomb, while Brody guards the Diary and Elsa descends first.
  location_type: Repurposed Crusader Church Library
