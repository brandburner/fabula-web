  global_id: ger_location_87d19d0aeb2c
  canonical_name: Pilgrimage Hills near Pankot Palace
  description: Hazy rolling hills stretch as the pilgrimage road to Pankot Palace.
    Elephants plod westward through dust and sun-drenched slopes, their silhouettes
    stark against a blood-orange horizon at afternoon's end. The mythic landscape
    compresses days of transit into one frame of endurance and isolation, heat bleaching
    the terrain while dust clouds mark heavy steps toward the palace's distant white
    towers. Quiet vastness underscores the caravan's burden and the adventure's growing
    stakes.
  location_type: Pilgrimage Road Hills
  parent_location_uuid: null
