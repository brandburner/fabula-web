- fabula_uuid: ger_location_662c3c0d7c87
  global_id: ger_location_662c3c0d7c87
  canonical_name: The Cliffside Tunnel Exit (Gorge Ledge)
  description: Horizontal tunnel exit carved into a sheer cliff face, spilling onto
    a narrow ledge 300 feet above a crocodile-infested gorge. The tidal wave erupts
    from the tunnel mouth here, forcing the trio to cling to the ledge and make desperate
    leaps amid vertigo and exposure.
  location_type: Cliffside Tunnel Exit
  parent_location_uuid: null
  season_appearances:
