  canonical_name: Claustrophobic Passage
  description: Willie forces herself from her suite into this narrow, oppressive corridor,
    where darkness swallows light and tight walls press close. Claustrophobia grips
    her as she dreads fresh dirt ruining her tattered dress, a sharp break from nightclub
    glamour. The space forces confrontation with grime-coated trials, turning physical
    confinement into psychological strain amid the temple's unforgiving bowels.
