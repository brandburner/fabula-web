- fabula_uuid: ger_location_25ca00359aa0
  global_id: ger_location_25ca00359aa0
  canonical_name: Kali Worshippers’ Temple
  description: A cavernous underground ritual temple dedicated to Kali, where crowds
    of worshippers gather in rhythmic chanting. The space features a central altar
    surrounded by flaming torches casting shifting shadows over priests and cultists.
    A gaping lava crevasse below the altar is controlled by crankwheels, used for
    sacrificial drops during brutal rituals. The temple serves as a dim, fiery sanctum
    pulsing with ritual tension, sudden violence, and hypnotic devotion. The Maharajah
    is observed watching battles unfold here before slipping away through the throng,
    leaving cultists in shock as chaos disrupts the sacred space.
  location_type: Underground Ritual Temple
