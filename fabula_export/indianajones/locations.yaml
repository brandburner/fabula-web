  canonical_name: Front of College Building
  description: Daylit sidewalk runs directly in front of the college building, where
    Indiana Jones strides post-class with easy confidence and a fading smile. A black
    Packard sedan pulls to a sharp halt, disgorging three men in tailored suits. They
    address him precisely as 'Doctor Jones' from behind, their synchronized emergence
    turning the pavement into a tense threshold. Academic normalcy fractures against
    the weight of their summons, street air thick with unspoken stakes.
