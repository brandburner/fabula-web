  description: Students swarm the space around Irene's cluttered desk, their voices
    rising in a clamor for Indy's time amid scattered papers and ringing phones. Indy
    strides in disheveled yet authoritative, cuts through the din to order Irene to
    list students by arrival, then retreats to his private office—leaving the air
