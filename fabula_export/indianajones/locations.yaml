- fabula_uuid: ger_location_d759e9c35f1c
  global_id: ger_location_d759e9c35f1c
  canonical_name: Pit Entrance to the Well of Souls
  description: A subterranean temple chamber known as the Well of the Souls whose
    floor is carpeted by a six-inch-deep, writhing sea of venomous snakes. The mass
    of serpents piles, broods eggs, releases hatchlings and devours one another in
    shadowed chaos. In the key narrative sequence Indy descends into the chamber,
    brushes a fragile pillar, pours parallel oil lines across the snakes and ignites
    them to blaze a narrow six-foot path toward the distant altar while Sallah follows
    through smoke and hissing reptiles.
  location_type: Ancient Temple Subterranean Vault
