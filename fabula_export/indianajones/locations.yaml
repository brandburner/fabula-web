  canonical_name: Horizontal Escape Tunnel Beyond the Spike Chamber
  description: A narrow horizontal passage discovered by shoving a small rock aside
    in the temple wall, offering an escape from the retracting spikes and insect swarms
    but leading to the ominous Pankot Mine Tunnels. Characterized by howling wind,
    black depths, and echoes of distant peril, it serves as a desperate choice between
    immediate death and unknown threats, reflecting the chaotic survival dynamics
