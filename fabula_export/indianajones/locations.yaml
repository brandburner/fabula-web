  description: Jagged rocks protrude through thick snow packs on steep, snow-scoured
    slopes forming a mountain escarpment where a crippled DC-3 streaks in trailing
    smoke. An inflated emergency life raft bounces grotesquely off outcrops, yanking
    the plane before it kisses the cliff and erupts in a fiery mushroom cloud of twisted
    metal, earth, and debris. The crash ends aerial flight and strands survivors on
    frozen, unforgiving terrain below, the site's isolation amplifying their vulnerability.
