  global_id: ger_location_59f69fa4b1b8
  canonical_name: Jock's Amphibious Plane Exterior (Twilight Ascent)
  description: Jock Lindsey’s amphibious plane rising at twilight, emphasizing isolation
    and foreboding. Dark silhouette against jungle canopy, hinting at betrayals and
    Nazi pursuits ahead.
  location_type: Small Plane Exterior
