  global_id: ger_location_8e352a57109d
  canonical_name: Country Road
  description: Sun-drenched asphalt stretches straight across open countryside under
    clear daylight skies. Indy throttles a stolen motorcycle to top speed, Henry Jones
    Sr. grips the sidecar with white knuckles amid his paralyzing fear, while Indy's
    grin betrays his thrill in the chaos. Nazi soldiers pursue on identical bikes,
    rifles spitting bullets that whip past. Dust clouds billow as Indy banks hard
    off the pavement onto rugged off-road terrain, transforming the smooth highway
    into a gateway for desperate maneuvers.
  location_type: Country Road
