  canonical_name: Stairway to Underground Harbor
  description: Stone steps plunge from the castle depths, depositing Indiana Jones
    and Henry Jones Sr. directly into the vast underground harbor's cavern. Echoing
    footfalls mark their urgent descent past damp walls into a militarized space of
    docked gunboats and flickering shadows. The passage bridges ancient stonework
    to Nazi-held docks, heightening peril as father and son emerge into confrontation
    amid salt air and distant engine hum.
  location_type: Castle Stairwell
