- fabula_uuid: ger_agent_e837e6188827
  global_id: ger_agent_e837e6188827
  canonical_name: Abner Ravenwood
  title_role: null
  description: Abner Ravenwood — Marion Ravenwood's father — was the eccentric, obsessive
    owner of The Raven saloon (noted in some accounts as located in Patan, Nepal).
    Over time he became fixated on his artifact collection, sold pieces off during
    a period described as 'snow madness,' and ultimately bequeathed the bar to Marion.
    He was also an elusive figure who drew the attention of Army Intelligence in relation
    to artifact recovery, a pursuit that links him to Indiana Jones' world. His disappearance
    and reported death in an avalanche left a tragic legacy that shaped Marion's approach
    to running the establishment and fueled continuing narrative investigations.
