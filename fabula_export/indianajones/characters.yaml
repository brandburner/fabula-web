  global_id: ger_agent_16a005d6af38
  canonical_name: Shaman
  title_role: Village Shaman
  description: The gaunt, painted-faced elder shaman of Mayapore village greets Indiana
    Jones, Willie Scott, and Short Round with palms pressed to his forehead upon their
    raft arrival in India. He leads them through barren hills, reveals a prophetic
    dream of Krishna sending Indy to reclaim the stolen Sankara Stone from Pankot
    Palace, and links the village's curse of thirst and barren crops to its absence.
    In his hut, he wets a dying boy's forehead and lips to revive him, witnessing
    the child's clue to Indy. He bids farewell with a ritual gesture as they depart
    on elephants, then reverently returns the stone to its niche after the village's
    restoration, declaring its life-giving magic.
