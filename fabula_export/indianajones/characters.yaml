  canonical_name: Chattar Lal
  title_role: Prime Minister
  description: Chattar Lal holds the position of Prime Minister to Pankot Palace's
    child ruler, Maharajah Zalim Singh. He hosts grotesque feasts to showcase hospitality
    while sparring verbally with Indiana Jones, deflecting probes into Thuggee cult
    activities and the missing Sankara Stone through condescension and veiled threats.
    His glances with the Maharajah signal complicity. Secretly a devoted Thuggee high
    priest, he bows to robed cultists like Mola Ram, dismisses Willie's warnings of
    sacrifices as opium hysteria, ties victims to ritual frames over lava pits, and
    lunges dagger-first at Indiana Jones before plummeting to his death in the fiery
    crevasse.
