    syndicate muscle in 1935 Shanghai, serving as both poised intimidators and violent
    enforcers. At the Obi-Wan nightclub, they appear as a somber, suited group during
    tense negotiations with Indiana Jones, seated watchfully at a table to amplify
    Lao Che''s authority. Their unified presence reinforces Lao Che''s control during
    the standoff, presaging violence (e.g., Wu Han''s poisoning). When chaos erupts,
    they transition seamlessly into violent action: opening fire on Indy (who counters
    with a dessert cart), stomping Indy''s hand during struggles, and joining the
    ballroom shootout. Their disciplined loyalty extends to the armed-vehicle pursuit
    through Shanghai (where they drive fast cars and open fire on the Duesenberg)
    and the standoff at Nang Tao airfield, where they back Lao Che and Kao Kan despite
    overwhelming odds. Core traits: watchful, intimidating, obedient, aggressive,
    unified, and disciplined.'
