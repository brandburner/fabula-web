    during the Holy Grail pursuit. Outside Brunwald Castle, he approaches Walter Donovan
    with a written message confirming Marcus Brody's capture and the Grail map's seizure.
    He announces the delivery in German—'Etwas Wichtiges, mein Herr'—before Donovan
    reads it amid flanking Nazi soldiers. His prompt action bolsters the Nazis' tactical
    edge as tensions rise with Hitler's elimination order against the Jones family.
    The Lieutenant embodies disciplined military protocol in high-stakes intelligence
    relay.
