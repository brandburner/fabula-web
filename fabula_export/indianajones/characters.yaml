    pockets Indiana Jones's cash but safeguards his medallion, fights Nazi henchmen
    with an axe handle during interrogation and brawl, retrieves the burning artifact
    from flames, and declares herself Indy's partner. In Cairo, she bonds with a spy
    monkey before fleeing pursuers through alleys, surviving capture, Nazi torture,
    and the snake-filled Well of the Souls. Captured again aboard a ship, she shares
    intimate moments with Indy before Nazis seize her. Her fists, pistol, and quick
    decisions drive survival amid artifact pursuit and enemy threats.
