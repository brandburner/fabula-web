    his sword to knock a pistol from Indy’s grip and nearly sever his fingers. He
    steps forward with sword raised, poised and unperturbed, trading fast, face-level
    slashes and nimble footwork against Indy''s low feints. Indy''s trap ultimately
    succeeds: the whip snaps up, wraps his neck, and strangles him dead. Skilled,
    focused, and composed, he falls to superior tactics.'
