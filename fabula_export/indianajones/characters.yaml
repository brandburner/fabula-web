    finding it, bearing stone tablets inscribed with cryptic clues to its resting
    place: one tablet survives as a 12th-century sandstone marker in Walter Donovan''s
    possession, while the other was lost with the knight who died in Venice. Their
    legend, recounted by Donovan from a leather-bound manuscript, links medieval faith
    to Indiana Jones'' modern quest, driving his pursuit amid Nazi threats. The knights''
    resolute, devout nature and sacrificial actions form the historical foundation
    of the Grail''s mythos.'
