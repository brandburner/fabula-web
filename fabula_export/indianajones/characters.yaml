  canonical_name: 50 Kids with Autograph Books
  title_role: null
  description: A group of 50 children clutches autograph books and rushes Adolf Hitler
    during the chaotic Nazi rally in Berlin's city square, amid book burnings and
    swastika banners. Their excited push for signatures surrounds the Führer, blocking
    his view and creating an ideal distraction. This allows Indiana Jones, disguised
    as a Nazi soldier alongside Henry Jones Sr., to approach unnoticed and secure
    Hitler's unwitting autograph on the stolen Grail Diary. Their youthful surge captures
    the rally's fervent atmosphere and advances Indy's urgent quest by exploiting
