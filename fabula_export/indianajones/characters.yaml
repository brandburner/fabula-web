  canonical_name: Mayapore Villagers
  title_role: null
  description: The Mayapore Villagers inhabit a remote Indian village in 1935, where
    their prosperity hinges on the sacred **Sankara Stones**, which ensure fertile
    crops and communal harmony. Devastated by **Thuggee cult raids** that steal the
    stones, abduct children, and trigger famine, they endure starvation, grief, and
    deep-seated trauma. Their tight-knit community is led by elders, a chieftain,
    and a shaman, marked by profound emotional swings—from sorrowful despair to jubilant
    relief—as they express faith through rituals, seek external aid with urgency,
    and rebuild with collective resolve. Their daily existence is marked by futile
    labor (e.g., drawing sand from dry wells), communal rituals, and a desperate reliance
    on spiritual faith to cope with their hardships. Despite their hopelessness and
    resignation, their silent suffering and eventual resilience underscore the human
    cost of ancient rites, drought, and the devastation wrought by the Thuggee cult.
    Their lives are deeply intertwined with spiritual traditions and village interdependence,
    reflecting resilience, devotion, and communal solidarity.
