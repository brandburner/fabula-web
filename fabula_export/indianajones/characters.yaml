  global_id: ger_agent_c0cfbf813a35
  canonical_name: Librarian
  title_role: null
  description: The Librarian maintains order in the Venetian library's hushed stacks,
    a former Crusader church where scholars like Indiana Jones pursue hidden truths.
    He stamps books with steady rhythm as Indy deciphers Roman numerals in stained
    glass and columns, then pounds and smashes a floor tile marked 'X' to expose a
    concealed tomb passage. The unusual sounds draw his brief, curious glance—he pauses,
    regards the disturbance, puzzles over the echoes—but he shrugs off the interruption
    and resumes stamping without question or interference. His routine anchors the
    library's calm amid the trio's urgent breakthrough, indifferent to the Grail quest
    unfolding steps away.
