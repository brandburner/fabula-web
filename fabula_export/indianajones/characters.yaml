  canonical_name: Captain Phillip Blumburtt
  title_role: Captain
  description: "\n  Captain Phillip Blumburtt serves as a British military liaison\
    \ and colonial authority figure at Pankot Palace. Initially present as a neutral\
    \ observer at the Maharajah's feast in the Pleasure Pavilion, he evolves from\
    \ dismissing Indiana Jones's warnings about the Thuggee cult as 'mumbo jumbo rubbish'\
    \ to showing subtle curiosity and engagement. His pragmatic yet skeptical demeanor\
    \ reflects imperial detachment, but his interactions with Indy and the unfolding\
    \ occult threats gradually erode his initial skepticism.\n\n  **Key Roles:**\n\
    \  - **Military Liaison:** Updates Chattar Lal on Indiana Jones's absence and\
    \ offers Willie Scott safe passage to Delhi.\n  - **Colonial Observer:** Attends\
    \ the Maharajah's feast as a representative of British oversight, embodying imperial\
    \ skepticism toward local mysticism.\n  - **Battlefield Commander:** Leads cavalry\
    \ charges against Thuggee holdouts in the gorge and ensures the survival of Indy,\
    \ Willie, and Short Round during the bridge collapse.\n  - **Narrative Bridge:**\
    \ His evolving engagement highlights the clash between colonial detachment and\
    \ emerging occult threats, serving as a pragmatic link between palace protocol\
    \ and battlefield command.\n  "
  traits:
  - skeptical
