  canonical_name: Captain Simon Katanga
  title_role: Captain
  description: Captain Simon Katanga commands the tramp steamer Bantu Wind out of
    Cairo. He is an observant, authoritative shipmaster who watches Indiana Jones
    and Marion Ravenwood before their voyage, and later, under the threat of Nazi
    pursuit and approaching submarines, orders them below for cover. Faced with armed
    boarding parties on his bridge, Katanga mixes protective quick thinking with desperate
    commercial pragmatism—declaring Jones dead and attempting to barter Marion to
    recoup losses and save his ship. His role across these scenes marks him as a composed
    but pragmatic maritime authority caught between duty to passengers and the hard
    realities of piracy and commerce.
