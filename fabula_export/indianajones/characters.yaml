- fabula_uuid: ger_agent_48e8babd8037
  global_id: ger_agent_48e8babd8037
  canonical_name: Snakes (Well of the Souls)
  title_role: null
  description: 'A vast infestation of venomous snakes (asps/serpents) that fills the
    Well of the Souls. They pile in writhing masses across the chamber floor, encircle
    the central pillar/altar, and behave both instinctually and aggressively: mothers
    lay eggs, young hatch among adults (which sometimes cannibalize), they flood darkened
    spaces when torches go out, strike at heels, and can tangle the exit rope. The
