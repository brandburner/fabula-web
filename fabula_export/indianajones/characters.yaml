    ancient temple. They produce scampering claw sounds and echoing footsteps that
    blend with dripping water and whistling drafts. Indiana Jones and Satipo hear
    these noises as they ascend the tubular corridor by torchlight, passing hanging
    plants and jagged stalactites. The creatures react to light and movement, heightening
    the sense of lurking dangers in the temple.
