  canonical_name: Amir
  title_role: null
  description: Amir serves as a local elder and script expert aiding Sallah and Indiana
    Jones in their pursuit of the Ark. In Sallah's truck outside an Arab bar, the
    raspy-voiced old man with crooked fingers closely examines the broken headpiece
    medallion. He traces its markings, deciphers the exact staff height needed to
    locate the Well of Souls, reveals Belloq's seven-and-a-half-inch miscalculation
    that sends the Nazis to the wrong dig site, and issues a grave warning against
    disturbing the Ark. His calm delivery turns grief into tactical advantage before
    he resumes sipping his wine.
