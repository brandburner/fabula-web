  canonical_name: Chieftain
  title_role: Village Chieftain
  description: Grey-haired chieftain of the impoverished Mayapore village leads with
    quiet authority despite the Sankara Stone's curse bringing thirst, barren crops,
    and desperation. He directs women to serve Indiana Jones, Willie Scott, and Short
    Round meager gruel and fruit, seats them under thatch, offers rest, and assigns
    villager Sanju as their guide to Pankot Palace. He watches solemnly among grief-stricken
    elders and villagers as the group departs with the village's sacred elephants—a
    painful sacrifice. After the stone's recovery restores the land and reunites families,
    he approaches with the shaman and elders to greet the travelers respectfully,
    his presence marking communal relief and renewed hope.
