  canonical_name: Joseph of Arimathea
  title_role: null
  description: Joseph of Arimathea is a pivotal figure in Holy Grail legend, described
    as the biblical figure entrusted with the Grail following the Crucifixion. In
    *Indiana Jones and the Last Crusade*, Walter Donovan invokes Joseph to authenticate
    the relic's path—from Christ's cup, secured by Joseph, to Crusader markers—while
    unveiling the sandstone Grail Tablet. This reference anchors the quest's mythology,
    transforming the Grail into a map for immortality amid Nazi threats. Joseph's
    role underscores themes of sacred custody passed through history, drawing Indiana
    Jones into the quest by connecting ancient faith to his father's research and
    the broader narrative of the artifact's journey. His portrayal emphasizes traits
    of piety, discretion, and legendary significance, framing him as the initial guardian
    in a chain of custodians spanning from the Crucifixion to Crusader knights and
    hidden tombs.
