- fabula_uuid: ger_agent_b49149550b39
  global_id: ger_agent_b49149550b39
  canonical_name: Elsa Schneider
  title_role: Doctor
  description: Elsa Schneider acts as Walter Donovan's Venice contact, posing as a
    scholarly ally to Indiana Jones and Marcus Brody in the Holy Grail quest. She
    sends a cable about Henry Jones Sr.'s disappearance, greets them with flirtatious
    charm, guides them through library clues to a hidden tomb, explores catacombs
    with Indy amid rats and fire, and shares romantic tension. Exposed as a Nazi double
    agent, she steals the Grail Diary, deduces Brody's role, justifies betrayal to
    Indy with a kiss, and selects a false golden Grail for Donovan, leading to his
    death. Her duplicity blends scholarly expertise, opportunism, and conflicted attraction
    to Indy and his father.
