    Patan, Nepal, owned by Marion Ravenwood. He grabs a large axe handle to help her
    clear out rowdy patrons—including Sherpas, climbers, and smugglers—herding them
    through the front door as fights erupt. He follows Marion's directions closely,
    returns briefly after the saloon empties to check on her during her talk with
    Indiana Jones, and leaves the axe handle on the bar when she sends him home. Marion
    later grabs that handle during a Nazi raid, highlighting his role in maintaining
    order in the rough establishment.
