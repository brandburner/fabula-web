- fabula_uuid: cand_evt_scene_ba49cc664a5fbfda_03
  global_id: null
  title: 'Freefall and Fire: The Sky Becomes the Battlefield'
  description: "\n  The DC-3’s midair ambush by Kao Kan’s biplanes escalates from\
    \ survival crisis to a desperate, high-stakes struggle for control—both of the\
    \ plane and of fate itself. As the cabin erupts in chaos, Willie’s paralyzing\
    \ fear and Short Round’s fierce loyalty collide over the last parachute, their\
    \ violent scuffle sending it tumbling into the abyss. Meanwhile, Indy—still groggy\
    \ from the antidote—awakens to a nightmare: the cockpit abandoned, the plane on\
    \ fire, and the mountain looming ahead. With no time to learn the controls, he\
    \ seizes the helm anyway, his instinctive piloting (and sheer luck) barely clearing\
    \ the peak as the biplanes strafe them. Short Round’s reckless but resourceful\
    \ machine-gun defense—while heroic—accidentally ignites an engine, forcing Indy\
    \ to abandon ship. In a final, desperate gamble, he deploys an emergency life\
    \ raft, leaping into the void with Willie and Short Round clinging to him as the\
    \ DC-3 crashes and explodes below. This event is a crucible: Willie’s cowardice\
    \ is exposed, Short Round’s loyalty is tested, and Indy’s leadership is stripped\
    \ bare, revealing the raw, unfiltered stakes of their survival. The sky, once\
    \ a path to escape, becomes a battleground where trust, fear, and desperation\
    \ collide—leaving them stranded, but alive, in the unforgiving Himalayas.\n  "
