  key_dialogue:
  - |-
    **WILLIE** *(desperate, gripping Blumburtt’s arm)*:
        *‘No—you can’t go! Something awful’s happened. They’ve got Short Round and I think Indy’s been—’*
        **CAPT. BLUMBURTT** *(interrupting, skeptical)*:
        *‘What?’*
        **WILLIE** *(voice breaking)*:
        *‘We found a tunnel that leads to a temple below the palace! Please, come with me, I’ll show you! I’m afraid they’ll kill them! We saw horrible things down there—they had a human sacrifice and they *ripped a man’s heart out*!’*
        *(Subtext: Willie’s trauma is raw and visceral, but her credibility is eroding. The cult’s atrocities are too grotesque to be believed—yet her physical state [insects, trembling, tears] lends urgency. The dialogue reveals the **narrative conflict**: truth vs. denial, and the **thematic stakes**: who will bear witness to horror?)*,

        "**INDIANA** *(smiling faintly, emerging from the tunnel)*:
        *‘What’re we playing, hid and seek?’*
        **WILLIE** *(relieved, rushing to him)*:
        *‘Oh, Indy, you got away! Tell them what happened, they won’t believe me—’*
        **INDIANA** *(gently, guiding her to the bed)*:
        *‘It’s okay. You’re all right now.’*
