  object_involvements:
  - object_uuid: object_b8c722e3182a
    description_of_involvement: The **Mayapore Shrine’s Carved Niche (Empty Sivalinga
      Cradle)** is the visual and symbolic centerpiece of the event. Indy kneels to
      examine it, noting the conical indentation where the sacred stone once rested.
      The niche’s emptiness is a stark reminder of the theft and its catastrophic
      consequences—dried wells, dead crops, and abducted children. The shaman gestures
      toward it with reverence, reinforcing the divine significance of the Sivalinga
      and the urgency of its return. The niche serves as a tangible symbol of the
      villagers' suffering and the moral imperative driving Indy’s potential quest.
    status_before_event: Empty, the carved niche sits atop a pile of rocks in the
      shrine, its conical indentation a silent testament to the stolen Sivalinga.
      The shrine is dimly lit by torchlight, casting eerie shadows over the gathered
      group.
    status_after_event: Remains empty, but its significance is now fully understood
      by Indy, Willie, and Short Round. The niche becomes a focal point for the trio’s
      moral dilemma—whether to retrieve the Sivalinga or continue their journey to
      Delhi.
  - object_uuid: object_084949d10cae
    description_of_involvement: The **Mayapore Village Shrine Torches** flare eerily
      as the group gathers around the empty niche, their flickering light casting
      long shadows and heightening the ominous mood. The torches illuminate the villagers'
      emaciated faces, the shaman’s gestures, and the niche itself, creating a sense
      of urgency and supernatural dread. Their light is both practical—revealing the
      shrine’s details—and symbolic, representing the villagers' fading hope and the
      divine intervention they desperately seek. The torches’ flames dance in the
      twilight, mirroring the emotional turbulence of the scene.
    status_before_event: Torches are lit and held by villagers, casting flickering
      light over the shrine and the gathered group. The flames are steady but eerie,
      reflecting the villagers' sorrow and the supernatural weight of the moment.
    status_after_event: The torches continue to burn, their light now imbued with
      the emotional weight of the revelations. The flames symbolize the villagers'
      enduring hope, even as the niche remains empty.
  - object_uuid: object_f945b5d17556
    description_of_involvement: The **Mayapore Village Thatched Roof** serves as the
      initial setting for the event, providing a sparse but symbolic backdrop to the
      meal and the villagers’ suffering. Lacking walls, it exposes the group to the
      blood-red twilight sky, reinforcing the village’s vulnerability and the encroaching
      darkness of the curse. The roof’s simplicity contrasts with the opulence of
      Pankot Palace, foreshadowing the trio’s journey from deprivation to confrontation
      with the Thuggee cult. As the group moves from beneath the roof to the shrine,
      the thatched structure represents the villagers’ humble, precarious existence—one
      that is literally and spiritually exposed to the elements and the curse.
    status_before_event: Intact but weathered, symbolizing the village’s enduring
      but fragile existence. It provides minimal shelter, emphasizing the villagers’
      exposure to hardship.
    status_after_event: Remains unchanged physically, but its symbolic role shifts
      as the trio’s understanding of the curse deepens. The roof now represents the
      villagers’ hope for restoration, tied to the return of the Sivalinga.
  - object_uuid: object_686d444c5ade
    description_of_involvement: The **Mayapore Village Shabby Rug** serves as a humble
      yet symbolic stage for the event. The trio and the villagers sit on it as they
      share the meager meal, the rug’s threadbare fabric underscoring the community’s
      deprivation. Willie’s act of returning her plate to the women occurs on this
      rug, marking a turning point in her emotional journey. The rug becomes a metaphor
      for the villagers' collective suffering and the outsiders' reluctant engagement
      with it. Its worn condition contrasts sharply with the opulence of Pankot Palace,
      reinforcing the moral stakes of the quest.
    status_before_event: Spread on the dusty ground under a blood-red twilight sky,
      the rug is already worn and faded, reflecting the villagers' chronic deprivation.
      It is a practical but poignant symbol of their hardship.
    status_after_event: The rug remains in place, now imbued with the emotional weight
      of Willie’s act of solidarity. It serves as a silent witness to the trio’s growing
      moral responsibility.
