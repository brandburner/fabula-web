  - object_uuid: object_9d2ae3c61c3a
    description_of_involvement: Indiana Jones’s **shoulder bag** is also handed to
      him by Short Round as he prepares to descend. The bag contains tools and weapons
      (e.g., his pistol), which will be critical for his survival in the temple. Its
      practical role as a utility item contrasts with its symbolic weight—it carries
      the tools of Indy’s trade (archaeology, adventure) and his determination to
      outmaneuver the cult. The bag’s transfer to Indy marks the moment he commits
