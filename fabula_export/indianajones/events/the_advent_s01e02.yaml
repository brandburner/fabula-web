  - location_uuid: location_116ee9d1cf10
    description_of_involvement: The **Wind Tunnel Overlook** is a high, narrow opening
      in the Temple of Death, serving as a concealed vantage point for Indy, Willie,
      and Short Round. The roaring wind that howls through the tunnel creates an eerie,
      musical note that mingles with the worshippers’ chants below. This location
      allows the trio to witness the ritual in horror, its height and narrowness reinforcing
      their sense of vulnerability and isolation. The wind’s gusts whip at them as
      they watch, amplifying the dread of the scene. Its role is both practical (hiding
      them from the cult) and symbolic (a liminal space between safety and danger).
    observed_atmosphere: Cold, wind-swept, and claustrophobic; the howling wind creates
