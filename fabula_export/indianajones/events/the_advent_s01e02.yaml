    status_after_event: Used to mark the ritual’s climax, now silent again.
  location_involvements:
  - location_uuid: location_193d73d6ed78
    description_of_involvement: The **Temple of Death** is the ritual’s epicenter—a
      colossal, cathedral-like cavern carved from rock, filled with chanting worshippers,
      looming statues, and the altar where Mola Ram performs the sacrifice. Its vastness
      and darkness amplify the horror, with the lava crevasse and Kali’s statue serving
      as focal points of dread. The temple’s design—balconies, side chambers, and
      the altar’s isolation—reinforces the cult’s hierarchy and the ritual’s theatricality.
    observed_atmosphere: Oppressive, suffocating, and charged with fanatical energy.
      The chanting, the drum’s booms, and the flickering torchlight create a hypnotic,
      nightmarish atmosphere. The lava’s glow casts long shadows, distorting the worshippers’
      faces into grotesque masks.
    functional_role: Stage for the ritual, battleground for the cult’s power, and
      Indy’s objective.
    symbolic_significance: Embodies the cult’s dominance over life and death, with
      Kali’s statue as its divine center. The temple’s labyrinthine design mirrors
      the cult’s moral corruption—beauty twisted into horror.
    access_restrictions: Restricted to cult members and those who survive the palace’s
      traps; the lava crevasse blocks direct access to the altar.
