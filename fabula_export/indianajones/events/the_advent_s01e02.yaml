    INDIANA: *Since I was nice enough to let you tag along, why don't you give your mouth a rest? Okay, doll?*
  - |-
    INDIANA: *No.*
    INDIANA: *Do you?* *(hopefully, to Willie about flying the plane)*
  - 'INDIANA: *Short Round, what in the hell are you doing?* *(angrily, as the plane’s
    engine explodes)*'
  - |-
    WILLIE: *Are you crazy, a lift raft?! We're not sinking, we're crashing!*
    INDIANA: *Get over here, damn it!*
