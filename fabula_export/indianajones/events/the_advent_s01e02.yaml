      poison’s effects, giving the trio a fleeting reprieve. The vial’s presence is
      a plot device that underscores the urgency of their escape and the high stakes
      of Lao Che’s betrayal. Its consumption is a moment of relief, but the chaos
      of the chase quickly reminds them that their survival is far from assured.
    status_before_event: Hidden in Willie’s dress, untouched and full of the antidote.
    status_after_event: Empty, discarded in the Duesenberg after Indy swallows its
      contents.
  - object_uuid: object_31339efebcdd
    description_of_involvement: The giant brass gong from *The Dragon Nightclub* is
      the catalyst for the trio’s escape. It crashes through the roof, followed by
      Indy and Willie, setting the stage for their plunge into the Duesenberg. The
      gong’s resonant clang amplifies the pandemonium of the moment, symbolizing the
      chaos and urgency of their situation. Its role is purely functional—clearing
      a path for their fall—but it also serves as a dramatic metaphor for the upheaval
      in their lives.
    status_before_event: Hanging in *The Dragon Nightclub*, part of the nightclub’s
