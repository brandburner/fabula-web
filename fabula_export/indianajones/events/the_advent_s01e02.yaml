  key_dialogue:
  - |-
    **SHAMAN** *(to Indiana, touching his forehead in greeting)*:
        *‘We know you are coming back—when life returns to our village.’*
        **SHAMAN** *(indicating the countryside)*:
        *‘Now you see the magic of the rock you bring back.’*
  - |-
    **WILLIE** *(dry, skeptical)*:
        *‘And they don’t even know what it really is.’*
        **INDIANA** *(smirking, unwrapping the stone)*:
        *‘Well, you didn’t get your prince, and there goes your diamond.’*
        **WILLIE** *(bitter, turning away)*:
        *‘If you think I’m going to Delhi—or anyplace else—with you, after all the trouble you’ve gotten me into…’*
  - |-
    **INDIANA** *(whip CRACKS, reeling Willie in)*:
        *(silence as he kisses her—no dialogue needed; the action speaks)*
        **WILLIE** *(after, breathless but resigned)*:
        *(implied: *‘…Fine. But this doesn’t mean I forgive you.’*)
