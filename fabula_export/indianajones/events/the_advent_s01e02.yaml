      toward the mountainside, deploying it just before impact. The raft inflates
      midair, acting as a makeshift parachute to slow their descent. Its yellow canvas
      stands out against the snowy slopes, becoming a lifeline that cushions their
      slide down the treacherous terrain. Without it, the crash would have been fatal.
    status_before_event: Folded and stored in the DC-3’s emergency compartment, unused.
