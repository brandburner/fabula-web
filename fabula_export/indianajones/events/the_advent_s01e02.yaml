    description_of_involvement: The last parachute becomes a symbol of the trio’s
      desperation and loyalty. Short Round fights Willie for it, insisting it is for
      Indy, but it slips out of the plane during their struggle. Its loss forces the
      group to rely on the emergency life raft, a last-ditch escape that underscores
      their vulnerability. The parachute’s absence is a narrative turning point—it
      removes the ‘easy’ way out and forces them into a more dangerous, improvisational
      survival strategy.
    status_before_event: Attached to the co-pilot, who is trying to force Short Round
      to use it.
    status_after_event: Lost out the door of the plane, tumbling into the void below.
