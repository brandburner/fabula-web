  location_involvements:
  - location_uuid: location_c70cfe69a486
    description_of_involvement: The cliffside tunnel exit is the violent point of
      expulsion for Indy, Willie, and Short Round, hurling them into daylight and
      onto the precarious ledge above the gorge. Its sudden eruption into chaos—triggered
      by the cult’s sabotage—sets the stage for the entire event. The tunnel’s mouth
      acts as a threshold between the confined, dark interior of the mine and the
      vast, exposed danger of the cliffside. The force of the geyser’s blast symbolizes
      the cult’s unseen but ever-present influence, a reminder that their pursuers
      are always one step ahead. The location’s role is to disorient and separate
      the characters, forcing them into individual struggles for survival while testing
      their ability to regroup.
    observed_atmosphere: Deafening, disorienting, and chaotic. The roar of the geyser
      drowns out all other sounds, while the spray of water and the crumbling rock
      create a sensory overload. The air is thick with the scent of damp earth and
      the metallic tang of the cliff’s minerals, heightening the sense of primal danger.
    functional_role: A violent catalyst that expels the characters into a life-or-death
      situation, separating them and forcing immediate, high-stakes decisions. It
      serves as the inciting incident for this event, shifting the group from relative
      safety (within the tunnel) to mortal peril (on the cliffside).
