      and every **corridor and courtyard** serves as a **stage for psychological manipulation**.
    symbolic_significance: Represents the **duality of Pankot**—beauty masking brutality,
      charm concealing cultist loyalty. The palace is a **living metaphor** for the
      **corruption of power** and the **illusion of safety** that precedes the **evening’s
      ambush**.
    access_restrictions: Restricted to those **invited by Chattar Lal**, with servants
      and guards enforcing the palace’s **oppressive protocols**. The group’s movements
      are **orchestrated**, their **freedom of exploration limited** by the **Thuggee
      cult’s control**.
