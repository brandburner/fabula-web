      event, as Mola Ram oversees the ritual, Chattar Lal translates his commands,
      and the priests enforce his will. The cult’s power is embodied in the hypnotic
      trance that controls Indy, the sacrificial frame descending into the lava, and
      the chanting worshippers filling the temple. The event marks the culmination
