      an attempt to stop the car.
    status_after_event: Broken off and useless, lying discarded in the mine tunnel.
      Its failure forces Indy into a life-or-death improvisation, underscoring the
      cult's control over the environment.
  - object_uuid: object_5a4e87797a05
    description_of_involvement: The brake-pad is the critical component that Indiana
      Jones uses to stop the mine car. After the brake lever breaks, Indy dangles
      beneath the car, kicking the brake-pad with his feet to slow the wheels. The
      pad screeches against the spinning wheel, sending up sparks and smoke as it
      gradually brings the car to a halt just inches from the dead-end wall. This
      improvised maneuver saves the group but leaves the brake-pad damaged and smoking,
      a testament to the desperation of their situation. The brake-pad's role is both
      mechanical and symbolic—it represents the thin line between life and death,
      and the group's reliance on Indy's quick thinking.
    status_before_event: Attached to the mine car's braking system, functional but
      under strain. The tension cable is loose, requiring Indy to kick it directly
      to engage the pad.
    status_after_event: Damaged and smoking from Indy's frantic kicking, no longer
      functional. The car stops just short of the dead-end wall, but the brake-pad
      is rendered useless for any further braking.
  - object_uuid: object_21f566a154a8
    description_of_involvement: The narrow side-tunnel chute is the trio's lifeline
      during the tidal wave chase. Indy spots it just as the wave is about to overtake
      them, and the group dives in headfirst, sliding down its steep, precipitous
      drop to escape the surging water. The chute is claustrophobic and dark, amplifying
      the sense of desperation and urgency. It serves as a temporary refuge, allowing
      them to catch their breath before the wave reappears, forcing them to run again.
      The chute's role is both practical (a means of escape) and symbolic—it represents
      the narrow margins between life and death in their battle against the Thuggee
      cult.
    status_before_event: A narrow, steeply sloping tunnel branching off from the main
      mine tunnel, dark and damp. It is unoccupied but serves as a potential escape
      route.
    status_after_event: Wet and slick from the side-current of water that broke off
      from the main tidal wave. The trio tumbles out of it into a larger tunnel, leaving
