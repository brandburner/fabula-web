  scene_sequence: 1
  sequence_in_scene: 3
  key_dialogue:
  - |-
    LAO: *Dr. Jones — I want Nurhachi.*
    INDIANA: *Sure, I found him. Then last night I had a little trouble. Somebody tried to slit my throat.*
    *(Indy stares pointedly at Chen’s bandaged hand.)*
    INDIANA: *It was dark, but I think one of your sons tried to get Nurhachi without paying for him.*
  - |-
    LAO: *You have insulted my son.*
    INDIANA: *Next time I’ll cut off more than his finger.*
  - |-
    WILLIE: *Look at this! He put a hole in my dress from Paris!*
    LAO: *Sit down!*
    *(Lao forces a smile at Indy and lifts his glass.)*
    LAO: *To your health, Dr. Jones.*
    *(Indy drinks. Lao watches, then reveals the poison.)*
    LAO: *There is an antidote for this poison. You give me Nurhachi — I give you the antidote.*
  - 'WU HAN: *(smiling bravely, dying)* *Not this time, my friend... I followed you
    on many adventures — but into the great Unknown Mystery, I go first, Indy...*'
  - |-
    INDIANA: *(shattered, to Lao)* *Let go of her, Lao. And give me the antidote.*
    LAO: *Don’t be sad, Dr. Jones — you will soon join him.*
