- fabula_uuid: act_31acd298984dcaf2
  number: 2
  summary: Act Two plunges Indiana Jones, Willie Scott, and Short Round into the heart
    of darkness at Pankot Palace. What begins as a lavish dinner quickly devolves
    into a grotesque display of exotic and repulsive cuisine, punctuated by Indy's
    growing suspicion about the Thuggee cult and the Maharajah's peculiar behavior.
    Indy discovers a secret passage, leading him and Short Round into a hidden subterranean
    temple where they witness the horrifying human sacrifices performed by the Thuggee
    cult, led by the malevolent Mola Ram, and the enslavement of children forced to
    mine for the remaining Sankara Stones. Indy is captured, subjected to a dark ritual,
    and brainwashed by the "blood of Kali," turning him into a loyal servant of the
    cult. Willie, having initially escaped, returns to rescue Indy, only to find him
    hostile. It is Short Round's courage and a moment of shared pain that breaks Indy
    free from the cult's influence. Reunited and determined, the trio initiates a
    daring escape, freeing the enslaved children and battling Thuggee guards through
    the treacherous mines in a thrilling mine car chase. Their desperate flight culminates
    in a narrow escape from a massive tidal wave, leaving them stranded at the mouth
    of a tunnel overlooking a deep gorge, with a rickety rope bridge as their only
    path forward.
