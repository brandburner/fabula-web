  - object_uuid: object_91197152ef47
    description_of_involvement: 'Short Round **grabs the gunny sack** in the mines
      and **uses it to rub lava off the Fat Guard’s legs**, **breaking the hypnotic
      trance**. The sack’s **rough burlap** becomes a **tool of liberation**—when
