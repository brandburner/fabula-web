      makeshift parachute, slowing their descent and cushioning their slide down the
      snowy mountainside. Its deployment is a moment of desperate ingenuity, saving
      the trio from certain death but stranding them in the harsh Himalayan wilderness.
      The raft’s yellow canvas stands out against the white snow, symbolizing their
      fragile hope amid the chaos.
    status_before_event: Folded and stored in the DC-3’s wreckage, unnoticed until
      Indy spots it.
    status_after_event: Deployed and bouncing down the mountainside, torn but functional,
      now their only means of survival in the snow.
