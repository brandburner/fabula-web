  - object_uuid: object_8b22ccd0a7e7
    description_of_involvement: Lao Che sets the slender glass vial of clear antidote
      liquid on the table as leverage after poisoning Indiana Jones’ champagne. The
      vial becomes Indy’s lifeline, but its possession is contested as the brawl erupts.
      Its rolling across the table and eventual loss symbolize the desperation and
      chaos of the moment, as well as the high cost of survival.
