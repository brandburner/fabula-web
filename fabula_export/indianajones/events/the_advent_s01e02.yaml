  key_dialogue:
  - |-
    **CHATTAR LAL** *(disdainfully, appraising the group)*:
        *‘I would say you look rather lost. But then I cannot imagine where in the world the three of you would look at home…’*
  - |-
    **INDIANA** *(smiling evenly, attempting to deflect)*:
        *‘Lost? No, we’re not lost. We’re on our way to Delhi. This is Miss Scott—and Mr. Round. My name’s Indiana Jones.’*
  - |-
    **CHATTAR LAL** *(surprised, then calculating)*:
        *‘Dr. Jones? The eminent archaeologist?’*
        **WILLIE** *(dry, undercutting the tension)*:
        *‘Hard to believe, isn’t it…?’*
  - |-
    **CHATTAR LAL** *(bowing with false warmth)*:
        *‘Welcome to Pankot Palace.’* *(subtext: ‘But you won’t leave so easily.’)*
