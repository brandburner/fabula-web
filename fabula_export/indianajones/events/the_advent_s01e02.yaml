      the **theatrical reveal** of the child ruler, turning a formal dinner into a
      moment of **dramatic confrontation**.
    symbolic_significance: "\n        Represents the **duality of Pankot Palace**:\
      \ its **surface-level glamour** hides the **rot of corruption** beneath. The\
      \ pavilion is a **microcosm of the Thuggee cult’s control**, where even the\
      \ Maharajah’s throne is a **puppet’s seat**.\n      "
    access_restrictions: Restricted to invited guests and palace officials; the Thuggee
      cult’s influence ensures that outsiders like Indiana and Willie are **carefully
      monitored** within its walls.
    key_environmental_details:
