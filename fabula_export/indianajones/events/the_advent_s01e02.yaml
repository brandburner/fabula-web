      is the climax of the chase, where Indy’s improvisation reaches its peak. The
      low clearance forces the team to work in unison, their survival dependent on
      perfect timing and teamwork.
    observed_atmosphere: A frenzied, high-stakes gauntlet. The air is thick with dust,
      the beams flash past like guillotine blades, and the protagonists’ groans as
      they lift the boulder are drowned out by the Thuggee guards’ screams of terror.
      The moment is both brutal and triumphant—Indy’s gambit pays off, but the floodwater’s
      approach means there’s no time to celebrate.
    functional_role: Climax of the chase. The low tunnel forces the protagonists to
      act in unison, and the boulder drop destroys the final Thuggee car.
    symbolic_significance: Represents the protagonists’ transformation from victims
      to aggressors. They turn the Thuggee cult’s own environment (the tunnels, the
