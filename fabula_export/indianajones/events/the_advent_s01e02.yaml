      outstretched arms and the severed heads it grips. The statue is not merely a
      decoration but an active participant in the ritual, its presence amplifying
      the cult's fanaticism and the supernatural stakes of the scene. The trembling
      of the chamber and the oozing of crimson lava from the fissure are direct reactions
