      across the snowy mountainside. Its fabric, though rickety, holds together as
      Indy steers it through obstacles, but the raft’s instability becomes a metaphor
      for the fragility of their survival. The violent bouncing and jostling as it
      smashes through the stream and skids onto rocky ground underscores the raft’s
      role as both a tool and a test of their resilience.
