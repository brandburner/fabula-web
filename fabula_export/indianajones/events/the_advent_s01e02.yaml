  object_involvements:
  - object_uuid: object_ff9299ea25a2
    description_of_involvement: The rotting rope bridge sways precariously twenty
      feet above Willie and Short Round, serving as their sole escape route from the
      collapsing ledge and the geyser’s torrent. Its frayed ropes and worm-eaten boards
      symbolize the tenuousness of their situation—one wrong move could send them
      plummeting into the crocodile-infested gorge below. Short Round and Willie must
      climb toward it, using the cliffside rocks as footholds, while Indy scales the
      cliff face to flank the geyser and reunite with them. The bridge’s instability
      mirrors the fragility of their alliance and the desperation of their escape.
    status_before_event: Swaying ominously above the ledge, its ropes frayed and boards
      rotting but still structurally intact enough to support weight—though barely.
    status_after_event: The bridge remains intact but is now the focal point of the
      group’s escape, with Short Round and Willie beginning their ascent toward it.
      Its role shifts from a distant hope to an immediate, if precarious, path to
      survival.
  - object_uuid: object_838f5a6a3152
    description_of_involvement: The narrow cliffside ledge is a crumbling, perilous
      path that Willie and Short Round must traverse to reach the rope bridge. Its
      sheer drop into the gorge amplifies Willie’s vertigo, while its instability—caused
      by the geyser’s vibrations and the cult’s sabotage—threatens to collapse beneath
      them at any moment. The ledge forces the characters into a high-stakes balancing
      act, both physically and emotionally, as they edge toward the bridge. Its precarious
      nature underscores the urgency and danger of their situation, with every step
      a gamble against gravity and the cult’s designs.
    status_before_event: A narrow, crumbling ledge midway up the cliff, barely wide
      enough for one person to stand on, with loose rocks and eroding edges. It is
      the immediate landing zone for Willie and Short Round after being expelled from
      the tunnel.
    status_after_event: The ledge is further destabilized by the geyser’s force and
      the characters’ movements, with chunks of rock breaking away as they climb toward
      the bridge. Its role shifts from a temporary refuge to a launching point for
      their ascent.
  - object_uuid: object_fc65419de60e
    description_of_involvement: The cult-triggered geyser is the primary environmental
      threat in this event, a violent torrent of water erupting from the tunnel exit
      and separating Indy from Willie and Short Round. Its sheer force blocks Indy’s
      direct path, forcing him to scale the cliff face alone. The geyser’s roar drowns
      out communication, its spray soaks the ledge, and its vibrations weaken the
      cliff’s stability. Symbolically, it represents the cult’s relentless pursuit
      and the overwhelming, almost supernatural forces arrayed against the heroes.
      The geyser’s chaos tests the group’s ability to adapt and trust one another
      amid life-or-death stakes.
    status_before_event: Dormant within the tunnel system, primed by the Thuggee cult’s
      sabotage to erupt at the opportune moment.
    status_after_event: The geyser continues to blast water into the air, its force
      unabated, but its role shifts from an immediate threat to a persistent obstacle
      that Indy must flank. The water’s spray and sound create a disorienting backdrop
      for the characters’ climb.
  - object_uuid: object_f29f790e6bd9
    description_of_involvement: The scrub brush protruding from the cliff face serves
      as Indy’s sole handhold as he scales the sheer rock wall to flank the geyser.
      Its tenuous grip reflects the desperation of his solo climb, where every foothold
      and fingerhold is a matter of life and death. The brush symbolizes the scrappy,
      improvised nature of Indy’s survival instincts—he uses whatever tools are available,
      no matter how fragile. Its presence highlights the stark contrast between Indy’s
      solitary struggle and the teamwork required by Willie and Short Round to reach
      the bridge.
    status_before_event: A rugged, overgrown scrub brush clinging to the cliff face,
      its roots embedded in a narrow crevice. It is the only vegetation visible in
      the immediate vicinity, offering a precarious but critical handhold.
    status_after_event: The scrub brush remains intact after Indy uses it to pull
      himself upward, though its roots may be further loosened by his grip. Its role
      as a lifeline is temporary but pivotal in his climb.
  - object_uuid: object_7e423c6cf35a
    description_of_involvement: 'The jagged cliffside rocks provide the footholds
      and handholds that Willie and Short Round use to climb toward the rope bridge.
      Their uneven, sharp surfaces force the characters to move carefully, testing
      their balance and resolve. For Willie, the rocks are a source of terror—each
      grip could be her last if she slips. For Short Round, they are a challenge to
      overcome with agility. The rocks’ instability mirrors the broader instability
      of the characters’ situation, where one wrong move could send them plummeting
      into the gorge. Their presence also underscores the raw, primal nature of the
