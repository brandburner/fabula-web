      The **Secret Tunnel from Willie’s Suite (Pankot Palace) / Hidden Stone Tunnel Behind Ganesha Statue** is the **climax of this event’s discovery**, a **dark, musty passage** that **unlocks the next phase of the adventure**. The tunnel is **revealed after the giant insect disappears into the wall**, **triggering Indy’s investigation**. When he **lifts the Ganesha statue**, the **wall panel opens slowly**, **revealing the tunnel’s rough stone walls and the faint glow of torchlight**. The **Sanskrit inscription**—*‘Follow in the footsteps of Shiva. Do not betray his truth.’*—**hints at the tunnel’s significance**, tying it to the **Sankara Stones and the cult’s rituals**. The tunnel’s **atmosphere is oppressive and foreboding**, with **echoes, musty air, and the sense of an ancient, cursed place**. Its **functional role** is to **propel the group forward**, but it also **symbolizes the descent into the palace’s hidden horrors**. The **tunnel’s discovery is a turning point**, as it **marks the shift from the palace’s opulence to the Thuggee Cult’s lair**, where **Mola Ram and the Sankara Stones await**.
    observed_atmosphere: Dark, **musty, and foreboding**, with **flickering torchlight**
      casting **long shadows** on the **rough stone walls**. The air is **heavy with
      the scent of ancient stone and damp earth**, and the **echoes of distant whispers**
      seem to **linger in the passage**.
    functional_role: The **gateway to the Thuggee Cult’s lair**, where the **next
      phase of the adventure**—and its **greatest dangers**—unfolds. It **symbolizes
      the group’s descent into the palace’s hidden horrors**.
    symbolic_significance: Represents the **transition from the palace’s deceptive
