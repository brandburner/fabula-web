  object_involvements:
  - object_uuid: object_12c31dcb3392
    description_of_involvement: The Maharajah’s clay voodoo doll of Indiana Jones
      is a supernatural weapon used to inflict excruciating pain on Indy by proxy.
      The doll is jabbed with a sapphire-tipped turban pin, and each strike causes
      Indy to experience the same agony in the corresponding part of his body. Short
      Round’s intervention—scaling the bucket chain to the Maharajah’s balcony and
      wresting the doll away—breaks the curse and frees both Indy and the Maharajah
      from Kali’s influence. The doll is a symbol of the Thuggee cult’s dark magic
      and the Maharajah’s possession, and its destruction marks a turning point in
      the scene.
    status_before_event: Intact and in the possession of the Maharajah, who uses it
      to torment Indiana Jones.
    status_after_event: Destroyed (the pin is removed, and the curse is broken), lying
      discarded on the rock balcony.
  - object_uuid: object_ac27873112c3
    description_of_involvement: The sapphire-tipped turban pin is the instrument of
      torture used by the Maharajah to inflict pain on Indiana Jones through the voodoo
      doll. Short Round turns the pin against the Maharajah, jabbing it into his hand
      and breaking the curse. The pin is a symbol of the Thuggee cult’s supernatural
      power and the Maharajah’s enslavement, and its removal marks the young prince’s
      redemption. The pin’s gleaming sapphire tip adds a layer of visual and thematic
      significance, representing the cult’s wealth, cruelty, and otherworldly influence.
    status_before_event: Embedded in the Maharajah’s turban, later used to jab the
      voodoo doll and inflict pain on Indy.
    status_after_event: Removed from the Maharajah’s hand (after being jabbed through
      it), lying discarded on the rock balcony.
  - object_uuid: object_84179f8c1fc4
    description_of_involvement: The Thuggee giant grabs a pick-axe from a tool bin
      on the conveyor belt and swings it at Indiana Jones, intending to split him
      in two. The pick-axe is a symbol of the quarry’s labor and the tools used by
      the enslaved children, but the giant repurposes it as a weapon of brute force.
      The pick-axe’s failed strike underscores the trio’s desperation and the high
      stakes of their escape, as Indy barely avoids the fatal blow. The pick-axe’s
      presence adds a layer of physical danger to the scene, as it represents the
      cult’s willingness to use lethal force to stop the intruders.
    status_before_event: Stored in a tool bin on the conveyor belt, ready to be grabbed
      by the Thuggee giant.
    status_after_event: Stuck in the conveyor belt after the giant’s failed attack,
      left behind as the giant is crushed by the rock-crusher.
  - object_uuid: object_38ed24b4ec73
    description_of_involvement: The Thuggee guards’ pistols are fired at the speeding
      mine car carrying Indiana Jones, Willie Scott, and Short Round. The gunfire
      adds a layer of urgency and danger to the scene, as bullets ricochet off the
      mine car and force the trio to take cover. The pistols are a symbol of the Thuggee
      cult’s modern weaponry and their willingness to use violence to maintain control.
      The gunfire underscores the high stakes of the escape and the cult’s determination
      to stop the intruders at all costs.
    status_before_event: Holstered or held by Thuggee guards, ready to be fired at
      the trio.
    status_after_event: Fired at the mine car, with some bullets hitting the car or
      ricocheting off the quarry walls.
  - object_uuid: object_a424cdeebd8c
