- fabula_uuid: cand_evt_scene_ba49cc664a5fbfda_02
  global_id: null
  title: 'Skyfall: The Cult’s Aerial Assault and Indy’s Desperate Redemption'
  description: "\n  The DC-3’s tranquil flight west is shattered when Lao Che’s biplanes\
    \ materialize from the clouds, their machine guns tearing into the fuselage in\
    \ a relentless ambush. The co-pilot’s panicked announcement—*‘Please to remain\
    \ calm. We start passing out parachutes now’*—ignites chaos as passengers bail\
    \ out, including Willie, who clings to the last parachute in a desperate struggle\
    \ with Short Round. Meanwhile, Indy, still unconscious from the antidote, sleeps\
    \ through the initial assault until a stray bullet shatters the window beside\
    \ his head, jolting him awake. With the plane crippled and the cockpit abandoned,\
    \ Indy—despite admitting he *‘doesn’t know how to fly’*—takes the controls, narrowly\
    \ averting a mountain collision as the last biplane explodes against the peak.\
    \ The scene culminates in a harrowing dive into the snowy mountainside, where\
    \ Indy deploys an emergency life raft, saving himself, Short Round, and Willie\
    \ from the DC-3’s fiery crash. This event escalates Lao Che’s vendetta into a\
    \ life-or-death pursuit, forces Indy to step into leadership under pressure, and\
    \ reveals Short Round’s unwavering loyalty—all while underscoring the cult’s relentless\
    \ reach and the group’s fragile survival.\n  "
