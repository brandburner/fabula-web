  object_involvements:
  - object_uuid: object_0fab03fc48d3
    description_of_involvement: Lao She’s silver cigarette case is used by Indy to
      light a cigarette, revealing his face for the first time. Later, Indy grinds
      the lit cigarette into a plate of caviar as a deliberate insult to Lao She,
      escalating the tension at the negotiation table. The case symbolizes the fragile
      civility of the meeting, which quickly collapses into violence.
    status_before_event: Intact and gleaming on the negotiation table, used by Lao
      She to offer Indy a cigarette.
    status_after_event: Damaged, with the cigarette ground into the caviar, reflecting
      the shattered trust and escalating hostility.
  - object_uuid: object_4bbf333394db
    description_of_involvement: Indy’s provocative cigarette, lit and used to insult
      Lao She by grinding it into the caviar, becomes a symbol of his defiance. The
      act foreshadows the negotiation’s collapse into violence, as Indy’s ruthlessness
      is on full display. The cigarette’s sizzling in the caviar mirrors the tension
      simmering beneath the surface.
    status_before_event: Unlit in Lao She’s silver cigarette case, offered to Indy
      as a gesture of false hospitality.
    status_after_event: Ground out in the caviar, extinguished but leaving a mark
      of disrespect and escalation.
  - object_uuid: object_c5a20f1ddcb7
    description_of_involvement: Lao She slaps a thick wad of cash onto the table as
      part of the negotiation, but Indy rejects it outright, deeming it insufficient.
      The cash joins the champagne flutes and caviar plates, symbolizing the materialistic
      stakes of the deal. Its rejection enrages Lao She, paving the way for the poisoned
      champagne and erupting violence.
    status_before_event: Neatly stacked on the table, offered as partial payment for
      Nurhachi’s ashes.
    status_after_event: Scattered and abandoned amid the chaos, left behind as the
      negotiation collapses into violence.
  - object_uuid: object_9d95f97f9bef
    description_of_involvement: Lao She tosses gold coins onto the negotiation table
      after Indy demands higher payment. The coins glint under the nightclub’s lights,
      joining the champagne flutes and caviar plates. Their presence underscores the
      high stakes of the deal, but they are left behind as gunfire erupts, symbolizing
      the failure of material offerings to resolve the conflict.
    status_before_event: Tossed onto the table by Lao She as additional payment, catching
      the light and drawing attention.
    status_after_event: Scattered and forgotten amid the chaos, their value meaningless
      in the face of violence.
  - object_uuid: object_73a272fe9f34
    description_of_involvement: Lao Che unfolds a delicate rice paper to reveal a
      large diamond and ruby, offering them as additional payment to Indy. The jewels
      gleam on the table, symbolizing the extravagance of the underworld’s wealth.
      However, the negotiation collapses before any handoff, leaving the gems abandoned
      as the club descends into chaos.
    status_before_event: Nestled within the rice paper, offered as a bribe to secure
      Nurhachi’s ashes.
    status_after_event: Left on the table, untouched and irrelevant as the fight erupts.
  - object_uuid: object_ae957be8bd58
    description_of_involvement: Chen tips over Lao She’s silver snuff bottle, spilling
      white powder that reveals the poison’s nature. The finely crafted vessel rests
      amid the chaos of the negotiation table, its contents exposing the betrayal.
      Indy and his allies react sharply as the spill confirms the poison, adding to
      the urgency of the moment.
    status_before_event: Intact on the table, used by Chen to reveal the poison’s
      presence.
    status_after_event: Tipped over, its contents spilled, serving as proof of the
      betrayal.
  - object_uuid: object_0600150b3894
    description_of_involvement: Indy carries the ornate gold and enamel box containing
      Nurhachi’s ashes into the nightclub and places it on the negotiation table as
      the central bargaining chip. Lao She opens it reverently, but Willie Scott knocks
      it over, spilling the ashes and igniting Lao’s fury. The box’s elegant craftsmanship
      contrasts with the erupting chaos, symbolizing the sacred and profane colliding
      in this moment.
    status_before_event: Intact and placed on the table by Indy, containing the sacred
      ashes of Nurhachi.
    status_after_event: Knocked over, its ashes spilled, becoming a catalyst for Lao
      She’s rage and the escalation of violence.
  - object_uuid: object_506bdbe0f100
    description_of_involvement: Willie Scott pulls out her small handheld mirror to
      check her makeup amid the standoff, her reflection capturing her glamorous defiance.
      The mirror serves as a stark contrast to the violence unfolding around her,
      highlighting her vulnerability and the absurdity of her situation. It is a fleeting
      moment of normalcy in the chaos, underscoring the fragility of her world.
    status_before_event: Tucked in Willie’s purse, used to check her appearance before
      the chaos erupts.
    status_after_event: Dropped or forgotten amid the violence, its purpose rendered
      irrelevant.
  - object_uuid: object_3616d6495e20
    description_of_involvement: Indy’s concealed knife is drawn during the negotiation
      and jammed against Willie Scott’s ribs, transforming her into a human shield.
      The knife’s sudden appearance escalates the standoff into a hostage crisis,
      forcing Lao She to comply with Indy’s demands. Its presence is a stark reminder
      of the violence lurking beneath the nightclub’s glamorous surface.
    status_before_event: Concealed on Indy’s person, unseen until the moment of confrontation.
    status_after_event: Jammed into the table after its use, symbolizing the collapse
      of trust and the shift to brute force.
  - object_uuid: object_8b22ccd0a7e7
    description_of_involvement: Lao She sets the slender glass vial of clear antidote
      liquid on the table as leverage after poisoning Indy’s champagne. The vial becomes
      Indy’s lifeline, but it is nearly kicked away in the brawl. Its presence is
      a cruel taunt, representing the thin line between life and death in this high-stakes
      game. Indy and Willie Scott scramble desperately to secure it amid the chaos.
    status_before_event: Placed on the table by Lao She as a bargaining chip, its
      contents the key to Indy’s survival.
    status_after_event: Kicked and rolled across the floor, nearly lost in the pandemonium
      before Indy secures it.
  - object_uuid: object_da14b873d23e
    description_of_involvement: Wu Han’s pistol-concealment towel is dropped during
      the shootout with Chen, revealing his true role as Indy’s ally. The towel, initially
      used to disguise his weapon, becomes a casualty of the violence, symbolizing
      the unraveling of the deception and the escalation into open conflict.
    status_before_event: Drape over Wu Han’s hand, concealing his pistol as he poses
      as a waiter.
    status_after_event: Dropped and forgotten as the shootout erupts, its purpose
      fulfilled but its secrecy exposed.
  - object_uuid: object_e94fa4673904de0f4
    description_of_involvement: Chen’s assassination pistol, a compact silenced firearm,
      is used to execute Wu Han point-blank. The weapon’s suppressed report allows
      the murder to go unnoticed initially, triggering the scene’s chaos. Its presence
      is a chilling reminder of the underworld’s brutality and the suddenness of death
      in this world.
    status_before_event: Concealed in Chen’s coat, unseen until the moment of the
      shooting.
    status_after_event: Used and discarded, its purpose fulfilled in the act of betrayal.
  - object_uuid: object_3a2f2e400718
    description_of_involvement: Indy grabs a flaming pigeon skewer from a passing
      waiter and hurls it across the table, impaling Chen and igniting his clothes.
      The skewer becomes a weapon of desperation, turning the negotiation into a chaotic
      brawl. Its flames symbolize the explosive nature of the conflict, as the nightclub
      descends into pandemonium.
    status_before_event: Carried by a waiter, loaded with roasted pigeons and flickering
      with flames, part of the nightclub’s culinary display.
    status_after_event: Hurled by Indy, impaling Chen and setting his clothes ablaze,
      becoming a catalyst for the escape.
  - object_uuid: object_31339efebcdd
    description_of_involvement: The massive brass gong, originally a stage percussion
      instrument, is repurposed as a defensive tool during the shootout. Short Round
      and Wu Han use it to shield themselves from bullets and breach a window, enabling
      the group’s escape. Its repurposing from entertainment to survival tool underscores
      the desperation of the moment and the improvised nature of their escape.
    status_before_event: Stationary on stage, used for musical accompaniment during
      Willie Scott’s performance.
    status_after_event: Smashed through the window and used as a shield, becoming
      a critical tool in the escape.
  - object_uuid: object_447b12c5b9ea
    description_of_involvement: The convertible top of the parked Duesenberg absorbs
      the impact as Indy and Willie Scott crash through it after plummeting three
      stories. The fabric roof crumples under their weight, cushioning the deadly
      fall and turning the elegant car into a battered refuge. The sudden impact jars
      them on the leather seats, marking the end of their frantic escape and the beginning
      of their flight from the nightclub.
    status_before_event: Intact and taut, part of the Duesenberg’s luxury design.
    status_after_event: Torn and crumpled, serving as a cushion for the fall and a
      getaway vehicle.
  - object_uuid: object_e50f833b7ed0
    description_of_involvement: Lao She’s poisoned champagne, served in an elegant
      flute, is the catalyst for the betrayal. Indy drinks it unknowingly, triggering
      a chain reaction of violence, desperation, and chaos. The champagne’s residue
      at the bottom of the glass is the first sign of the poison, setting the stage
      for the life-or-death struggle that follows.
    status_before_event: Poured into a champagne flute, appearing innocent but laced
      with lethal toxin.
    status_after_event: Spilled and abandoned amid the chaos, its contents consumed
      by Indy, who is now fighting for his life.
  - object_uuid: object_4c25c18c6d35
    description_of_involvement: The second-floor balcony mattress cushions Indy and
      Willie Scott’s fall as they tumble through the awnings. Its presence is a comedic
      yet critical plot device, slowing their descent and turning the deadly drop
      into a survivable, if bruising, escape. The mattress becomes a symbol of the
      absurdity and desperation of their situation.
    status_before_event: Stationary on the exterior balcony, part of the nightclub’s
      decor.
    status_after_event: Crushed and displaced by the impact, serving as a cushion
      for the fall.
  - object_uuid: object_ef6e989ba214
    description_of_involvement: The awnings and balconies of The Dragon nightclub
      serve as critical escape routes during the climactic sequence. Indy and Willie
      Scott crash through successive layers—including the second-floor balcony awnings
      (fabric canopies that tear and snag their bodies) and the third-floor awning
      (canvas stretched below the balcony, which briefly slows their fall). The systems
      crumple under their weight, turning the deadly drop into a frantic, slapstick
      cascade that culminates in their crash-landing into the Duesenberg below.
    status_before_event: Intact and decorative, part of the nightclub’s exterior facade.
    status_after_event: Torn and crumpled, serving as improvised brakes during the
      escape.
