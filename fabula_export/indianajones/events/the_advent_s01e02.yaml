acts:
- fabula_uuid: act_0a050004ff25fd56
  number: 1
  summary: The narrative opens in 1935 Shanghai, introducing the suave archaeologist
    Indiana Jones, his resourceful young sidekick Short Round, and the glamorous nightclub
    singer Willie Scott. A deal for Nurhachi's ashes goes awry, leading to Indy being
    poisoned by crime boss Lao Che. A frantic escape ensues, culminating in a harrowing
    plane crash in the Himalayas. The trio finds themselves in Mayapore, a desolate
    Indian village suffering from drought, famine, and the abduction of its children.
    The village shaman reveals that a sacred Sankara Stone was stolen from their shrine,
    attributing their misfortune to this loss and a growing evil at Pankot Palace.
    A young, rescued slave boy, Nainsukh, whispers "Sankara" and provides a tattered
    fragment of a painting, further compelling Indy to investigate. Despite Willie's
    protests, Indy commits to journeying to Pankot Palace, believing it holds the
    key to the village's plight and the missing children. Their arduous trek through
    the Indian wilderness is punctuated by encounters with wildlife and growing suspicions
    about their destination, setting the stage for their arrival at the seemingly
    opulent but foreboding Pankot Palace, where they are welcomed by Prime Minister
    Chattar Lal and invited to dinner.
