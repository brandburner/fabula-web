  - location_uuid: location_16ff3cfeed08
    description_of_involvement: The sharp curve in the Thuggee mine tunnels is the
      site of Indy’s first major tactical victory. As the protagonists’ mine car hurtles
      toward the curve at full speed, Indy orders Short Round to release the brake,
      exploiting centrifugal force to lift the inside wheels off the rails. The Thuggee
