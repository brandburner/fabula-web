    description_of_involvement: The Dragon nightclub serves as the primary setting
      for the high-stakes negotiation and subsequent violence. Its opulent Art Deco
      interior, filled with smoke, glamorous patrons, and exotic entertainment, contrasts
      sharply with the brutality unfolding at Lao She’s table. The club’s grandeur
      is a facade for the criminal underworld, where betrayal and violence are just
      beneath the surface. The negotiation table becomes a battleground, and the club’s
      exits are blocked by chaos as the fight erupts.
