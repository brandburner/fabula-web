  - object_uuid: object_ca51b9b7d5b8
    description_of_involvement: The **crankwheel mechanism** is the **life-or-death
      control** of the sacrificial frame. Indy **jumps onto the platform**, **yanking
      a priest off** before **grabbing the crankwheel** to **raise Willie from the
      lava**. The **grinding wood and metal** **symbolize the struggle between life
      and death**, as Indy **fights Chattar Lal** while **winding the wheel**. When
      Chattar Lal **slashes at him**, Indy **kicks the dagger away** and **dives for
      the crankwheel**, **saving Willie at the last second**. The crankwheel’s **final
      position**—**raising the frame**—**symbolizes Indy’s victory over the cult**.
      After the event, the crankwheel **lies still**, **its purpose fulfilled**—it
      **no longer serves the ritual, but freedom**.
    status_before_event: '**Lowering the sacrificial frame** toward the lava, operated
      by Thuggee priests.'
    status_after_event: '**Raised the frame to safety**, now **still and unused**—a
      **symbol of the ritual’s failure**.'
  - object_uuid: object_c10b4f105d8a
    description_of_involvement: The **sacrificial mechanism gears** are the **heart
      of the Temple of Death’s evil machinery**. Indy **jams an iron rod into the
      gears** to **stop Willie’s descent into the lava**, **halting the ritual**.
      The **grinding metal** and **screeching chains** **symbolize the cult’s desperation**
