      \ stage for **future confrontations**, as the cult’s **hidden power** becomes\
      \ increasingly difficult to ignore.\n      "
    internal_dynamics: "\n        The cult’s **hierarchy is absolute**, with Chattar\
      \ Lal as the **visible enforcer** and the Maharajah as the **symbolic figurehead**.\
      \ There is **no internal dissent** shown in this moment—only **unified control**\
