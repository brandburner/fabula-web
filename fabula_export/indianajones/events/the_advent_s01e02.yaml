  object_involvements:
  - object_uuid: object_bd2ae21c872f
    description_of_involvement: The mine car is the primary vehicle of peril and escape
      in this event. Initially, it careens out of control after the brake lever breaks,
      threatening to crash into a dead-end wall. Indiana Jones improvises a dangerous
      maneuver, dangling beneath the car to kick the brake-pad and slow it down, saving
      the group from certain death. Later, the mine car becomes a symbol of their
      fleeting safety—only for that safety to be shattered by the tidal wave. The
      car's mechanical failure (the broken brake lever) and Indy's physical intervention
      with the brake-pad are critical to the sequence, highlighting the precarious
      balance between human ingenuity and the cult's supernatural control over the
      environment.
    status_before_event: Functional but with a faulty brake lever, careening down
      the mine tunnel tracks at high speed. The car is occupied by Indiana Jones,
      Willie Scott, and Short Round, who are clinging to it for dear life.
    status_after_event: Stopped just short of the dead-end wall, its brake-pad smoking
      and damaged from Indy's frantic kicking. The car is abandoned as the trio flees
      the tidal wave, left behind as a relic of their near-death experience.
  - object_uuid: object_7fec108f1e5d
    description_of_involvement: The brake lever is the initial point of failure in
      this event. Short Round pulls it in an attempt to stop the mine car, but it
      breaks off in his hands, sending the car hurtling toward the dead-end wall.
      This mechanical failure forces Indiana to improvise a dangerous solution—dangling
      beneath the car to kick the brake-pad. The lever's breakdown is a direct result
      of the Thuggee cult's sabotage, setting the stage for the tidal wave chase that
      follows. Its failure symbolizes the cult's ability to manipulate even the most
      basic mechanical systems to their advantage.
    status_before_event: Attached to the mine car's braking mechanism, functional
