    - Psychological terror (the horror of the ritual, the wind’s howling)
    institutional_impact: The ritual reinforces the cult’s grip on the temple and
      its supernatural ambitions. The glow of the Sankara Stones signals their growing
      power, which they will use to expand their influence—unless Indy intervenes.
    internal_dynamics: The cult operates as a unified, hierarchical machine, with
      Mola Ram at the top and the worshippers as the base. There is no dissent; the
      ritual’s success is the only outcome tolerated.
