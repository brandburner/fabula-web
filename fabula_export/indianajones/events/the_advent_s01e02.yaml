    - The crash of water from the geyser, adding to the gorge’s chaotic energy.
    - The sheer, vertical walls of the gorge, offering no handholds or footholds—only
      a sheer drop into darkness.
    - The distant, echoing roar of the geyser, amplifying the gorge’s sense of vast,
      inescapable danger.
