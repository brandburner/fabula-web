    description_of_involvement: The Thuggee Cult’s presence in this event is omnipresent
      and suffocating, manifesting through the arrival of the guards and priest, the
      looming threat of the 'blood of Kali' ritual, and the distant suffering of the
      enslaved children. The cult’s influence is not just physical but psychological,
