  - location_uuid: location_42c89759e55f
    description_of_involvement: The green-tiled roof outside The Dragon nightclub
      is a slippery, precarious surface that Indy and Willie Scott crash onto after
      smashing through the stained-glass window. The tiles, slick with night moisture,
      add to the danger as they slide wildly toward the edge. The roof’s steep slope
      and the awnings below turn their fall into a hurtling escape, where every second
      counts. The tiles symbolize the fragility of their situation and the high stakes
      of their improvised descent.
    observed_atmosphere: Dangerous and precarious, with a sense of urgency and desperation.
