  title: 'The Snake and the Shattered Trust: A Moment of Raw Vulnerability'
  description: |2-

      In a fleeting moment of respite by the riverbank, Willie Scott’s playful flirtation with Indiana Jones is violently shattered when a boa constrictor—coiled among her clothes—drops onto her in the water. Indy’s initial attempt to help is derailed by his crippling phobia, leaving Willie to fend for herself. As the snake coils around her, Indy’s paralysis forces her into a desperate solo struggle, her terror escalating into fury when she realizes he won’t—or can’t—intervene. Her raw, explosive confrontation with Indy after escaping the snake marks a turning point: his betrayal of trust isn’t just about the snake, but about the deeper fear that he’ll always prioritize his own demons over her safety. The moment exposes the fragility of their alliance and forces Willie to confront her own resilience in a way that reshapes their dynamic forever. The river, once a symbol of fleeting peace, becomes a battleground for their unspoken tensions, leaving Willie’s trust in Indy irreparably fractured.
  episode_uuid: ep_sea_ser_the_adventures_of_indiana_jone_s01_e02
  scene_sequence: 20
  sequence_in_scene: 36
  key_dialogue:
  - |-
    WILLIE: *It's got me! Indy, help me!*
    INDIANA: *Don't let it pull you deeper!*
    WILLIE: *It's pulling me deeper!*
    INDIANA: *Don't let it curl around you!*
    WILLIE: *It's curling around me! Damn it, stop talking and do something!*
  - |-
    INDIANA: *Listen, Willie. Do exactly what I tell you now.*
    WILLIE: *What?!*
    INDIANA: *Can you move your arm?*
    WILLIE: *Just one arm!*
    INDIANA: *Okay, I want you to lift your hand—and pet the snake.*
    WILLIE: *PET IT??!!*
  - |-
    WILLIE: *Thanks for nothing! I hate snakes!*
    INDIANA: *I know the feeling...*
