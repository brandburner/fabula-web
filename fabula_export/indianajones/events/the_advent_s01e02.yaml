  - 'Willie Scott: *(muttering, to herself)* ''What the hell are we doing out here?
    This isn’t some sightseeing tour...'' *(she glances at Indy, her voice dropping
    to a whisper)* ''And he won’t even tell me why.'''
  - 'Short Round: *(leaning forward, voice hushed)* ''Indy, do you think those hills...
    do you think they’re *haunted*?'' *(Indy doesn’t answer, but his grip tightens
    on the reins.)'
  - 'Indiana Jones: *(under his breath, to himself)* ''No turning back now.'' *(He
    exhales sharply, as if steeling himself for what lies ahead.)'
