  location_involvements:
  - location_uuid: location_7a1e0bfd3276
    description_of_involvement: The **Pankot Palace Pleasure Gardens** (specifically,
      the Pleasure Pavilion) serves as the primary setting for this event, a space
      of gilded decadence that masks the palace’s occult undercurrents. The pavilion’s
      opulent decor—drums, ‘vinhas’ music, half-dressed dancing girls, bronze statues,
      and devotional objects—creates a sensory overload that distracts from the darker
      truths beneath. Indiana’s discovery of the *kryta* and his dialogue with Blumburtt
      expose the pavilion as a stage for colonial arrogance and ritualistic control.
      The space is both a meeting ground for the palace’s elite and a battleground
      for the coming conflict between the British Empire and the Thuggee cult.
    observed_atmosphere: Tension-filled with whispered conversations, drumbeats, and
      the scent of incense, creating a haze of opulence that barely conceals the underlying
      dread. The pavilion’s beauty is grotesque, a gilded cage for the horrors to
      come.
    functional_role: A meeting place for elite guests, a stage for diplomatic posturing,
      and a veil for the Thuggee cult’s influence. It serves as both a sanctuary of
      wealth and a battleground for ideological and occult conflicts.
    symbolic_significance: Represents the palace’s duality—surface-level hospitality
      masking ritualistic violence and colonial ignorance. The pavilion’s opulence
      is a metaphor for the British Empire’s blind authority and the Thuggee cult’s
      hidden power.
    access_restrictions: Restricted to invited guests (elite merchants, court ministers,
      British officers, and visitors like Indiana and Willie). The space is heavily
      guarded by palace protocols and the Thuggee cult’s unseen influence.
    key_environmental_details:
    - Drums and ‘vinhas’ music creating a rhythmic, hypnotic backdrop
    - Half-dressed dancing girls spinning to the music, adding to the sensory overload
    - Bronze statues and devotional objects lining the walls, including the *kryta*
    - A long, low table surrounded by colorful pillows, awaiting the guests for dinner
    - Gilded cages, lanterns, and rich fabrics reinforcing the palace’s opulence
