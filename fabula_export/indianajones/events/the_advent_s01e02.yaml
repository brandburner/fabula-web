    description_of_involvement: The interior of the DC-3 serves as the primary battleground
      for this event. Bullets shred the cabin, passengers scream and scramble for
      parachutes, and the machine gun’s recoil shakes the frame. The confined space
      amplifies the chaos—every jolt, every ricochet, every desperate shout is magnified
      by the metal walls. The cabin’s layout (narrow aisles, cramped seats) forces
      the trio to move quickly and improvise, turning the plane from a mundane transport
      into a deathtrap and, ultimately, a launching point for their escape.
