- fabula_uuid: cand_evt_scene_8d5e6148502f25e0_04
  global_id: null
  title: '**"The Descent into Madness: A Promise Before the Abyss"**'
  description: |2-

      Perched above the **Temple of Death**, Indiana Jones, Willie Scott, and Short Round witness the **Thuggee cult’s grotesque ritual**—a human sacrifice to Kali, the goddess of destruction. The ceremony’s climax reveals the **Sankara Stones**, their eerie glow confirming their legendary power. As the cult’s High Priest, **Mola Ram**, vanishes into the smoke, Indy seizes the moment: the temple is empty, the stones unguarded. Willie, horrified by the violence, begs to flee, but Indy’s resolve hardens. With a defiant promise—*'Maybe... someday. Not today.'*—he prepares to descend into the abyss, leaving Short Round to protect Willie. The scene crystallizes the **escalating stakes**: trust, fear, and the cost of obsession collide as Indy steps toward the crevasse, his whip coiled, his fate uncertain. The moment is both a **turning point** (the shift from observation to action) and a **character crucible** (Willie’s terror vs. Indy’s recklessness), setting the stage for the temple’s deadly trials ahead.
