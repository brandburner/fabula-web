  - object_uuid: object_e94fa4673904de0f4
    description_of_involvement: Chen’s assassination pistol, a compact and silenced
      firearm, is used to execute Wu Han point-blank. The weapon’s suppressed report
      allows the murder to go unnoticed initially, but its use triggers the chaotic
      brawl that follows. The pistol becomes a symbol of Lao Che’s ruthlessness and
      the sudden violence that defines the scene’s climax.
    status_before_event: Concealed in Chen’s coat, ready to be drawn if necessary.
    status_after_event: Fired, killing Wu Han, and later abandoned as the brawl erupts,
