    description_of_involvement: Bullets from the biplanes puncture the DC-3’s fire
      extinguisher, causing it to spray foam into Indy’s face. The rupture snaps him
      out of his drug-induced stupor, forcing him to take action and assume control
      of the plane. The extinguisher’s failure is a catalyst for the trio’s survival.
    status_before_event: Mounted in the DC-3’s cabin, fully functional.
    status_after_event: Punctured and spraying foam, rendered useless.
  - object_uuid: object_3f7466b5c889
    description_of_involvement: Indy deploys the emergency life raft as the DC-3 careens
      toward the mountain. The raft inflates, acting as a makeshift parachute that
      slows their freefall and cushions their slide across the snowy mountainside.
      It becomes their only lifeline, saving them from the fiery crash of the DC-3
      and the unforgiving terrain below.
    status_before_event: Stored in the DC-3’s emergency equipment, folded and unused.
    status_after_event: Deployed, inflated, and used to slide down the mountainside,
      slightly damaged but functional.
