  - object_uuid: object_66109b680c24
    description_of_involvement: The Statue of Kali looms over the ritual, its grotesque
      form a symbol of the cult’s devotion and the goddess’s power. The statue’s earrings
      of corpses, belt of hands, and severed head in one of its many arms serve as
      a visceral reminder of Kali’s bloodthirsty nature. The priests bow before it,
      and Mola Ram performs the ritual in its presence, ensuring the sacrifice is
      made in Kali’s name. The statue’s presence amplifies the horror and supernatural
      dread of the ceremony.
    status_before_event: Stationary and imposing, the centerpiece of the ritual.
    status_after_event: Unchanged, but the ritual’s completion leaves it as a silent
