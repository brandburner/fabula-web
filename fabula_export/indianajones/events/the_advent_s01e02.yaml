    - To uphold the appearance of governance, even if it is ineffective in addressing
      supernatural or local crises.
    influence_mechanisms:
    - Bureaucratic indifference (ignoring the villagers’ pleas for help).
    - Symbolic authority (Indy’s suggestion to involve them, despite knowing their
      limitations).
    - Colonial neglect (the chieftain’s resignation to their inaction).
    institutional_impact: The British Colonial Administration’s failure to address
