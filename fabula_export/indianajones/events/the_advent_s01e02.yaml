  - object_uuid: object_24c609e6d373
    description_of_involvement: Indiana Jones’s bullwhip is handed to him by Short
      Round as he prepares to descend into the temple. The whip symbolizes Indy’s
      readiness for action, his tool of choice for navigating the dangers ahead. It
      is coiled and at the ready, a physical manifestation of his determination to
      retrieve the Sankara Stones, regardless of the risks.
    status_before_event: Carried by Short Round, who holds it as Indy observes the
      ritual.
    status_after_event: In Indy’s possession, coiled and ready for use as he prepares
