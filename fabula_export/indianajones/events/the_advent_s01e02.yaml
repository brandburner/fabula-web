- fabula_uuid: act_c1d8178b5e695317
  number: 3
  summary: 'The final act begins with Indiana, Willie, and Short Round facing their
    ultimate challenge: a perilous rope bridge suspended high above a crocodile-infested
    gorge. Mola Ram, desperate to reclaim the Sankara Stones and prevent their escape,
    confronts them on the bridge. In a daring move, Indy severs the bridge, sending
    most of the Thuggee guards plummeting to their deaths. A brutal hand-to-hand combat
    ensues between Indy and Mola Ram, intensified by the High Priest''s attempt to
    use Kali''s power against Indy. Indy, invoking Shiva''s warning, causes the remaining
    Sankara Stones to burn Mola Ram, leading to his fall into the gorge and his gruesome
    demise. With the immediate threat neutralized, the British cavalry, alerted by
    the now-freed Maharajah, arrives to subdue the remaining Thuggee forces. Indy,
    having recovered one Sankara Stone, returns with Willie and Short Round to Mayapore.
    There, they reunite the liberated children with their overjoyed families and restore
    the sacred stone to its shrine, bringing life and prosperity back to the village.
    The trio, forever changed by their ordeal, bids farewell to Mayapore, with Indy
    and Willie sharing a moment of romantic tension before riding off into the sunset
    with Short Round and the elephants, having achieved fortune and glory not through
    personal gain, but through selfless heroism.'
