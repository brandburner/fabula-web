    description_of_involvement: The **Thuggee Cult** is the driving force behind the
      ritual, with Mola Ram as its high priest and the worshippers, priests, and sacrificial
      victim as its instruments. The cult’s fanatical devotion to Kali is on full
      display, with the sacrifice serving as both a religious act and a demonstration
      of power. The ritual’s success empowers the Sankara Stones, which the cult seeks
      to control for global domination. The organization’s presence is omnipotent,
      shaping every aspect of the event—from the victim’s binding to the stones’ revelation.
    active_representation: Through Mola Ram’s leadership, the priests’ actions, and
      the worshippers’ chants—collective and hierarchical.
    power_dynamics: Exercising absolute authority over the temple, the ritual, and
      the lives of those within it. The cult’s power is both spiritual (Kali’s blessing)
      and physical (the lava, the traps, the sacrifices).
    organizational_goals:
