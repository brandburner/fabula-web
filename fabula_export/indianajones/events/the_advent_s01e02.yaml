  - object_uuid: object_0600150b3894
    description_of_involvement: The gold and enamel box containing Nurhachi’s ashes
      is the central bargaining chip in the negotiation. Lao Che opens it reverently,
      but Willie Scott’s accidental spillage of the ashes enrages him, triggering
      the violent confrontation. The box’s elegant craftsmanship contrasts with the
      brutality that follows, symbolizing the sacred and the profane in the same moment.
    status_before_event: Intact and placed on the table by Indiana Jones, representing
