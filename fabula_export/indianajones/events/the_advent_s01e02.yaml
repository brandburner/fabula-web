  - object_uuid: object_043a50e142a5
    description_of_involvement: The **Thuggee Sacrificial Iron Frame** binds the victim,
      who is then lowered into the lava. Its square, unyielding design contrasts with
      the victim’s thrashing, emphasizing the cult’s control over life and death.
      The frame’s descent into the lava—followed by its re-emergence glowing red—underscores
