- fabula_uuid: cand_evt_scene_ba49cc664a5fbfda_04
  global_id: null
  title: '**"Indy’s Trial by Fire: From Sleep to Survival in the Sky"**'
  description: |2-

      **A moment of crisis forces Indy into an unfamiliar role of desperate leadership.** The DC-3’s tranquil flight is shattered when Kao Kan’s biplanes ambush the plane, forcing the pilots to abandon ship. As passengers bail out, Willie’s terror and Short Round’s loyalty collide—Shorty fights to keep the last parachute for Indy, while Willie, paralyzed by fear, nearly loses her grip on the boy. Indy, still groggy from the poison antidote, awakens to chaos: bullets shatter the cabin, the cockpit is empty, and the plane is spiraling toward a mountain. With no pilot, no plan, and a crippled engine, Indy seizes the controls despite his lack of flying skills, his confidence masking his desperation. Meanwhile, Short Round’s impulsive heroism—shooting down an attacker but crippling the DC-3’s engine—escalates their peril. The trio’s survival hinges on Indy’s quick thinking: he dives from the doomed plane with the life raft, using it as a makeshift parachute to cushion their crash-landing. This scene strips Indy of his usual competence, exposing the raw stakes of their mission and the unspoken trust his companions place in him—even when he’s at his most vulnerable. The crash leaves them stranded in the Himalayas, their journey now a fight for survival against both the elements and Lao Che’s relentless pursuit.
