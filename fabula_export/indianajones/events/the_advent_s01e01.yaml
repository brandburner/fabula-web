    - The sound of Indy’s car engine as he drives away
    - The Spy’s shadowy figure lurking in the doorway
  organization_involvements:
  - organization_uuid: organization_969a73c6cc14
    description_of_involvement: Nazi Germany is the primary antagonist force in this
      event, represented by Belzig, the Second Nazi, the Mongolian, and the Nepalese.
      Their brutal interrogation of Marion and their relentless pursuit of the medallion
