    description_of_involvement: "\n        The **Hovitos** are the **invisible, ever-present\
      \ threat** looming over the expedition, their **poisoned darts and territorial\
      \ aggression** creating a **sense of imminent doom**. Though not physically\
      \ present in this event, their **influence is palpable**—Satipo’s warning about\
      \ the **fresh poison on the darts** (three days old) **haunts the group**, and\
      \ the **slithering sounds in the undergrowth** could easily be **Hovito scouts**\
      \ tracking their movements. The Hovitos’ **role is as the temple’s first line\
      \ of defense**, a **tribal force** that **enforces the Ark’s curse** by driving\
      \ intruders toward the temple’s traps. Their **absence in this moment is deceptive**—they\
      \ are **always watching**, always waiting, and their **darts are a constant\
      \ reminder** that the jungle itself is **hostile territory**. Barranca’s betrayal,\
      \ driven by **fear of the Hovitos and desperation for the floorplan**, is a\
      \ **direct consequence of their presence**, proving that the **real enemy is\
      \ not the temple, but the men’s own fears**.\n      "
    active_representation: "\n        **Through the lingering threat of their poisoned\
      \ darts** (mentioned by Satipo) and the **audible slithering in the undergrowth**\
      \ (implied to be Hovito scouts). Their influence is **tactical and psychological**,\
      \ driving the group’s **paranoia and haste**.\n      "
    power_dynamics: "\n        **Exercising indirect authority** over the expedition—their\
      \ **presence (or absence) dictates the group’s movements and decisions**. The\
      \ Hovitos **do not need to attack directly**; their **reputation and the freshness\
      \ of their poison** are enough to **control the intruders’ fear**. Barranca’s\
      \ betrayal is a **direct result of their influence**, as he **acts out of desperation**\
      \ to escape their pursuit.\n      "
    organizational_goals:
    - Drive the intruders toward the temple’s traps (forcing them into the Ark’s curse)
    - Protect the temple’s sacred artifacts (the golden idol, the floorplan) from
      thieves
    - Maintain tribal dominance over the jungle (expelling or killing those who violate
      their lands)
    influence_mechanisms:
    - Psychological intimidation (fresh poison on darts, slithering sounds in the
      undergrowth)
    - Tactical harassment (forcing the group to move quickly, increasing the risk
      of traps)
    - Cultural manipulation (exploiting local superstitions about the temple’s curse)
    institutional_impact: "\n        The Hovitos’ **indirect control** over the expedition\
      \ **accelerates the group’s unraveling**, proving that the **real battle is\
      \ not against the temple, but against the jungle’s living will**. Their **absence\
      \ in this scene is a narrative trick**—they are **always there**, a **constant,\
      \ unseen force** shaping the characters’ fates.\n      "
    internal_dynamics: "\n        **Unified in their purpose**—there is no internal\
      \ conflict, only **collective action** to defend their sacred lands. Their **hierarchy\
      \ is strict**, with **elders or shamans** likely guiding their strategies, but\
      \ this is **not visible to the intruders**. Their **tactics are ruthless but\
      \ efficient**, relying on **terrain, poison, and fear** rather than direct confrontation.\n\
      \      "
