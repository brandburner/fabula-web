  object_involvements:
  - object_uuid: object_90d49ff9cae7
    description_of_involvement: Indy’s bullwhip is indispensable in this event, serving
      as both a tool and a weapon. After the torches dwindle and the snakes close
      in, Indy uses the whip to scale the crumbling pillar, wrapping it around the
      stone to pull himself upward. The whip’s precision and strength allow him to
      reach the top, where he pushes against the wall to topple the pillar and smash
      through to the hidden escape route. The whip’s versatility is on full display—it’s
      used for climbing, striking at snakes, and even as a makeshift harness in earlier
      parts of the scene. Without it, Indy would have no way to reach the pillar or
      create the opening in the wall, making the whip the key to their escape.
    status_before_event: Attached to Indy’s belt, fully functional and ready for use.
    status_after_event: Slightly worn from use (e.g., wrapping around the pillar,
      striking at snakes) but still intact and functional.
  - object_uuid: object_b87abb3bd7d3
    description_of_involvement: Marion’s gag is a symbol of her captivity and the
      Nazis’ control. Belzig removes it briefly, allowing her to scream as she is
      pushed into the Well, but Indy jams it back in to silence her before he slips
      away. The gag is a constant reminder of her vulnerability and the Nazis’ brutality,
      but it also becomes a tool for Indy to ensure their survival. Without the gag,
      Marion’s screams might have drawn more attention (or panic) during their escape.
    status_before_event: Removed by Belzig, then reinserted by Indy to silence Marion.
    status_after_event: Removed by Indy during their escape, allowing Marion to speak
      freely.
  - object_uuid: object_6a33eb167887
    description_of_involvement: The oil canisters are critical to Indy and Marion’s
      survival in the Well of Souls. After the torches begin to dwindle and the snakes
      encroach, Indy uses the canisters to create a ring of fire around them, buying
      precious time to devise an escape plan. He later splashes oil in a path toward
      the wall, lighting it to clear a route for their movement. The canisters transform
      from mundane tools into lifelines, their flammable contents repelling the snakes
      and illuminating the darkness. Without them, Indy and Marion would have been
      overwhelmed by the snakes long before escaping. The oil’s role is both practical
      (creating barriers) and symbolic (a literal and metaphorical light in the darkness).
    status_before_event: Scattered among the debris in the Well of Souls, partially
      used but still containing enough oil to create barriers.
    status_after_event: Exhausted; the remaining oil is spent creating the final path
      to the broken wall, leaving the canisters empty and useless.
  - object_uuid: object_6a33eb167887
    description_of_involvement: The oil canisters are critical to Indy and Marion’s
