  object_involvements:
  - object_uuid: object_2cd0977a7789
    description_of_involvement: The Staff of Ra's headpiece is the linchpin of the
      event. Indy removes it from his robes, attaches it to the staff, and aligns
      it with the sun's beam to reveal the Well of Souls' true location. After confirming
      Belloq's error, Indy detaches the headpiece, hides it in his robes, and breaks
      the wooden staff to evade detection. The headpiece's golden light interaction
      with the miniature city model is the narrative and visual climax of the event,
      symbolizing Indy's triumph over Belloq's flawed scholarship.
    status_before_event: Attached to Indy's robes as a pendant, removed from the Staff
      of Ra during a prior confrontation with Marion.
    status_after_event: Hidden in Indy's robes, separated from the broken wooden staff
      and secured for the next phase of the mission.
  - object_uuid: object_ced42cc5ef0b
    description_of_involvement: The miniature city model of Tanis is the focal point
      of Indy’s discovery. Sunlight passing through the Staff of Ra’s headpiece illuminates
      a specific building in the model, revealing the true location of the Well of
      Souls—a foot and a half beyond Belloq’s marked spot. The model’s ancient artistry
      ensures only the correct building glows, underscoring the precision of Indy’s
      method.
    status_before_event: Untouched, with Belloq’s red paint marks and white calibrated
      tape indicating his incorrect location.
    status_after_event: Indy’s correction is visible; the true location is now known
      to him.
  - object_uuid: object_9add7118dda5
    description_of_involvement: Sallah’s original rope, tied to an oil drum, is Indy’s
      initial means of descent into the map room. However, the Jeep German confiscates
      it to pull a stuck jeep, stranding Indy below. This object’s loss forces Sallah
      to improvise a new escape rope from a Nazi flag and diggers’ clothing, adding
      urgency and creativity to their escape plan. The rope’s dual role—as both a
      tool for excavation and a lifeline—symbolizes the precarious balance of their
      mission.
    status_before_event: Tied securely to the oil drum, ready for Indy’s descent.
    status_after_event: Confiscated by the Jeep German and used to pull the stuck
