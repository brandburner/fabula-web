    - Psychological pressure (threats, intimidation, fear)
    institutional_impact: The Nazis’ involvement in this event highlights the fragility
      of their institutional power and the cost of their ambitions. Their failure
      to secure the Ark and their inability to stop Indy and Marion serve as a microcosm
      of their broader downfall, driven by hubris, disorganization, and the uncontrollable
      force of the Ark’s power.
    internal_dynamics: Internal debate over response strategy (e.g., Shliemann’s panic
      vs. the Tall Captain’s discipline), chain of command being tested (e.g., Shliemann’s
      accidental killing of the Tall Captain), and factional disagreement emerging
      (e.g., the disciplined officers attempting to salvage the situation amid chaos).
