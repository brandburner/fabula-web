  key_dialogue:
  - 'BELLOQ: *Do you realize what the Ark is? It''s a transmitter. A radio for talking
    to God! And now it is within my grasp.*'
  - 'BELLOQ: *We have always done the same kind of work. Our methods have not differed
    as much as you pretend. I am a shadowy reflection of you. But it would have taken
    only a nudge to make you the same as me, to push you out of the light.*'
  - |-
    INDY: *Tell me, did you get away with the idol?*
    BELLOQ: *I was lucky to get away with my life. The Hovitos proved quite narrow-minded about the whole matter.*
