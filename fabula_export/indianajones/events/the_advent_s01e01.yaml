    emotional_state: Adrenaline-fueled determination with a steely resolve, masking
      any physical pain or fear. Indy operates in a state of hyper-focus, where every
      action is calculated yet instinctive, driven by the urgency of his mission and
      the high stakes of the Nazi pursuit.
    goals:
    - Secure the golden headpiece of the Staff of Ra at all costs
    - Escape Tengtu Hok’s museum alive and unharmed
    - Reach Buzz Kehoe’s car for extraction to continue the mission to Nepal
    what_happened: Indiana Jones begins the event by smashing the glass case containing
      the golden headpiece of the Staff of Ra with a samurai sword, grabbing the artifact,
      and triggering the museum’s alarm gong. He then engages in a whip-versus-sword
      duel with two samurai, dispatching them with lethal precision. Cornered by Tengtu
      Hok’s Thompson submachine gun fire, Indy improvises by unhooking the massive
      gong and using it as a shield, rolling it across the museum floor while bullets
      ricochet off its surface. As the gong slows near a marble bench, he leaps through
      a high window onto the museum roof, where he is immediately fired upon by German
      agents. Indy sprints to the rear of the building and makes a daring jump onto
      the speeding Ford sedan driven by Buzz Kehoe, crashing through the car’s roof
      in the process. Throughout, Indy exhibits a combination of physical agility,
      tactical improvisation, and unshakable focus on his mission.
