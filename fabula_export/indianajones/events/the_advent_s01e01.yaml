    what_happened: "\n        The Yagua porters, already nervous, reach their breaking\
      \ point when the temple comes into view. Their whispered Quechua conversations\
      \ escalate into terror as three of them drop their packs and flee into the jungle.\
      \ The remaining two are herded forward by Satipo, their wide-eyed fear palpable.\
      \ Their abandonment of supplies is a physical manifestation of their belief\
      \ in the curse—they’d rather risk the jungle’s dangers than face the temple’s\
      \ wrath. Their departure leaves the expedition vulnerable, both logistically\
      \ and morally, as Indy’s pragmatic decision to press on without them underscores\
      \ the fracture in the group’s trust.\n      "
