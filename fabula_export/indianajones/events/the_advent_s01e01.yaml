  - object_uuid: object_95c033891758
    description_of_involvement: The Ark of the Covenant’s wooden transport crate is
      not physically present in this event, but its absence is a driving force behind
      Indy’s actions. The crate was seized by the Nazis earlier in the scene and loaded
      onto the *Wurrfler*, making it the primary reason Indy risks his life to stay
      aboard. The Ark symbolizes the ultimate prize—both for the Nazis and for Indy—and
      its presence on the submarine is the catalyst for his desperate gamble. While
      the crate itself is not seen here, its influence is omnipresent, as Indy’s refusal
      to let it (or Marion) go drives his every move. The Ark’s power and the Nazis’
      obsession with it create the high-stakes tension that defines this moment.
    status_before_event: Securely loaded onto the *Wurrfler* after being seized from
      the *Bantu Wind*’s hold. It is the primary cargo of the submarine, guarded and
      prioritized by the Nazis.
    status_after_event: Still aboard the *Wurrfler*, now submerged and en route to
      the Nazi base. Its presence is implied, as Indy’s actions are entirely motivated
      by his need to stay close to it—and to Marion.
  - object_uuid: object_1cff02a0398f
    description_of_involvement: 'Marion’s white nightgown, borrowed from the *Bantu
      Wind*’s wardrobe, becomes a symbol of her vulnerability and the fragility of
      the moment before the Nazi ambush. The high-necked, prim design contrasts with
      her defiant resistance when the Nazis capture her—still wearing it. The nightgown’s
      role is twofold: it represents the intimacy she shares with Indy, and it underscores
      the brutality of her capture, as Belloq claims her while she is still clad in
      it. Its white color also foreshadows her later association with the Ark’s divine
      power.'
    status_before_event: Worn by Marion in Indy’s cabin, modeling it playfully.
    status_after_event: Still worn by Marion as she is dragged away by the Nazis,
      symbolizing her transition from vulnerability to defiance.
  - object_uuid: object_515cc744d0f0
    description_of_involvement: The Nazi Ship-to-Submarine Transport Poles are used
      by the boarding parties to carry the Ark’s crate from the *Bantu Wind* to the
      *Wurrfler*. Their improvised nature (long, wooden, and likely hastily assembled)
      highlights the Nazis’ efficiency in adapting to the situation. The poles are
      a practical solution to moving a heavy, valuable object quickly, and their use
      underscores the Ark’s physical weight and the Nazis’ determination to secure
      it. Their presence in this event is fleeting but critical—without them, the
      Ark’s transfer would be far more difficult.
    status_before_event: Stored on the *Wurrfler* or brought by the boarding parties.
    status_after_event: Left on the *Bantu Wind* or discarded after the Ark is loaded.
  - object_uuid: object_9146ce326c17
    description_of_involvement: The *Wurrfler* submarine is the primary vessel of
      the event, serving as both the setting and the antagonist in Indy’s struggle
      for survival. As the submarine begins to submerge, the *Wurrfler*’s main deck
      floods with water, forcing Indy to race against the rising tide. The conning
      tower becomes his lifeline, and the periscope—initially a structural component—transforms
      into a makeshift anchor as he ties himself to it with his bullwhip. The submarine’s
      forward motion and the ocean’s pressure create a high-stakes environment where
      Indy’s physical endurance is tested to the limit. The *Wurrfler* is not just
      a location but an active force in the scene, its mechanical systems and the
      Captain’s orders driving the tension.
    status_before_event: Fully operational, surfaced, and preparing to submerge after
      the ambush on the *Bantu Wind*. The main deck is dry, and the conning tower
      is accessible. The periscope is extended and functional, though not yet a critical
      element in the action.
    status_after_event: Submerged, with the conning tower and periscope now underwater.
      The main deck is flooded, and the submarine is in motion. Indy is tied to the
      periscope, clinging to it as the only means of staying aboard. The *Wurrfler*
      is now a hostile, waterlogged environment, but Indy’s presence on the periscope
      makes it a symbol of his defiance.
