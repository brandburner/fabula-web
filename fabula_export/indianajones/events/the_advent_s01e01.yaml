    cowardice and the Nazis’ disdain for direct confrontation. The line also foreshadows
    his later arrogance in handling the Ark’s power.}'
  - '{speaker: INDY, dialogue: Don’t panic. There’s plenty of time for that later.,
    context: Indy’s dark humor in the face of certain death reveals his coping mechanism—defiance
    through gallows wit—but also his protective instinct toward Marion, whom he’s
    just caught mid-fall. The line sets the tone for their trapped dynamic: Indy as
    the reluctant leader, Marion as the vulnerable but resilient partner.}'
  - '{speaker: INDY, dialogue: We’re going through this wall., context: Spoken as
    Indy drags Marion toward the pillar, this line marks the shift from despair to
    action. His determination to escape—despite the snakes, the collapsing structure,
    and Marion’s skepticism—embodies his archetypal role as the hero who refuses to
    accept defeat. The line also hints at the Well’s hidden secrets, tying into the
    Ark’s supernatural guardianship.}'
  - '{speaker: MARION, dialogue: Whatever you’re doing, do it faster., context: Marion’s
    panicked plea, delivered as the torches dim and the snakes close in, humanizes
