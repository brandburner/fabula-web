- fabula_uuid: cand_evt_scene_b98dd6c90a4f95f0_01
  global_id: null
  title: '**"The Basket’s Cruel Revelation: Indy’s Desperation and the Nazis’ Ruthless
    Gambit"**'
  description: "\n  In a frantic, labyrinthine foot chase through Cairo’s teeming\
    \ streets, Indiana Jones pursues a basket he believes contains Marion Ravenwood—only\
    \ to uncover a brutal deception. After outmaneuvering two Nazi collaborators in\
    \ a deserted alley, Indy’s whip disarms them, revealing the basket’s contents:\
    \ not Marion, but a cache of contraband weapons. The moment of triumph curdles\
