  - character_uuid: agent_aedc86bb8523
    emotional_state: Tense, determined, and resourceful—shifting from a rare moment
      of vulnerability during intimacy with Marion to a state of heightened alertness,
      urgency, and defiance as he faces the Nazi ambush. His emotional state is a
      mix of fear for Marion’s safety, anger at the Nazis, and a steely resolve to
      survive and fight back.
    goals:
    - Protect Marion from the Nazis at all costs.
    - Recover the Ark of the Covenant to prevent it from falling into Nazi hands.
    - Survive the ambush and stow away on the *Wurrfler* to continue the pursuit.
    what_happened: Indy begins the event in a rare moment of vulnerability, sharing
      an intimate and tender exchange with Marion in his cabin. His instincts quickly
      kick in as he notices the ship’s stalled engines, leading him to investigate.
      He discovers the Nazi ambush, narrowly evades capture by slipping into the ship’s
      corridors, and witnesses Marion’s brutal capture. In a desperate gambit, he
      stows away on the *Wurrfler* by clinging to the periscope during submersion,
      enduring near-drowning to pursue the Ark and Marion. His resourcefulness, determination,
      and willingness to risk everything define this pivotal moment.
    observed_status: Indy begins the event in a rare moment of vulnerability, sharing
