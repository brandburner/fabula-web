  - object_uuid: object_2cd0977a7789
    description_of_involvement: 'The medallion (headpiece of the Staff of Ra) is the
      MacGuffin at the heart of the conflict. It lies partially hidden on the bar,
      exposed when the Second Nazi takes a swig of whiskey. Belzig attempts to steal
      it but is burned by its searing heat, a physical manifestation of the Ark’s
      curse. Marion retrieves it from the ashes of *The Raven*, wrapping it in her
      blouse to protect her hands. The medallion’s journey—from hidden artifact to
      object of torture, to symbol of Marion’s defiance—mirrors the larger narrative:
      it is not just a relic, but a catalyst for transformation. Its scorched state
      reflects the cost of the alliance between Indy and Marion: their old lives are
      burned away, and their future is now inextricably linked.'
