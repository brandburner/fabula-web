acts:
- fabula_uuid: act_fea2cb1c4275a5b0
  number: 1
  summary: Indiana Jones, an archaeology professor, embarks on a perilous expedition
    in Peru to retrieve a golden idol, narrowly escaping a series of booby traps and
    betrayal by his guides, only to lose the artifact to his rival, Belloq. Back in
    the academic world, Indy is recruited by Army Intelligence to locate the Ark of
    the Covenant before the Nazis can weaponize its power. He learns the Nazis seek
    the headpiece of the Staff of Ra, an artifact crucial for pinpointing the Ark's
    hiding place, and that his former mentor, Abner Ravenwood, possessed the other
    half. Indy travels to Nepal to find Abner's estranged daughter and his former
    lover, Marion Ravenwood, who now holds the complete headpiece. Their reunion is
    fraught with tension and unresolved history. A Nazi raid on Marion's saloon forces
    them to fight together, solidifying their reluctant partnership. Marion, having
    lost her bar to the fire, declares herself Indy's partner, securing the headpiece
    and committing to the dangerous quest. This act establishes the central conflict,
    introduces key characters and their relationships, and sets Indy on his global
    mission.
