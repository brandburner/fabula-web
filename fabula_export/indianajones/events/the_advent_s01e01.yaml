      his physical exertions.
    status_after_event: Crushed flat against the wall by the boulder, left behind
      as Indy escapes.
  - object_uuid: object_f4b53060cd73
    description_of_involvement: The jeweled idol is the macguffin driving the entire
      sequence. Indy retrieves it with precision, swapping it for a weighted bag to
      avoid triggering the temple's mechanisms. Satipo's greed leads him to steal
      the idol, but his haste ensures he never escapes with it. The idol's exchange
      sets off the temple's collapse, turning the sanctuary into a deathtrap. Its
      retrieval is both the goal and the catalyst for the event's climax—Indy's survival
      hinges on outmaneuvering the traps it unleashes.
    status_before_event: Resting on the polished stone pedestal in the Sanctuary,
      untouched and secure.
    status_after_event: Retrieved by Indy from Satipo's pocket after his death, now
      in Indy's possession as he escapes the temple.
  - object_uuid: object_90d49ff9cae7
    description_of_involvement: Indy's bullwhip is the lifeline that allows him to
      navigate the temple's deadliest obstacles. He uses it to test the false floor
      by cutting through the cobwebs, swings across the pit to avoid the bottomless
      drop, and even attempts to retrieve Satipo after the betrayal. When Satipo drops
      the whip, Indy is left stranded—symbolizing the fragility of trust in this lethal
      environment. The whip's loss forces Indy into a desperate, physical escape,
      clawing his way to safety as the temple collapses.
    status_before_event: Coiled at Indy's hip, ready for use. Intact and fully functional.
    status_after_event: Discarded by Satipo on the floor of the Foyer of the Sanctuary,
      rendering Indy temporarily stranded.
  - object_uuid: object_bcb4aa3f6dfe
    description_of_involvement: The Chamber of Light's spike trap is the temple's
      most visceral threat. Indy tests it with a stick, confirming its lethality,
      and later navigates its shaft of light with his back pressed against the retracted
      spikes. Satipo, in his panicked escape, triggers the trap, impaling himself
      on the spikes in a gruesome death. The trap's design—triggered by light, retracting
      only when inactive—symbolizes the temple's unforgiving nature. It punishes haste
      and rewards precision, reinforcing Indy's survival and Satipo's fate.
    status_before_event: Retracted and dormant, with Forrestal's remains still impaled
      from a prior activation.
    status_after_event: Activated by Satipo's misstep, impaling him and retracting
      with his corpse still skewered.
  - object_uuid: object_5405bded7bdd
    description_of_involvement: The weighted canvas bag is Indy's tool to outsmart
      the temple's mechanisms. He fills it with dirt to match the idol's weight, performing
      a flawless swap that delays the traps' activation. The bag's precision is critical—had
      it been even slightly off, the pedestal would have triggered immediately. Its
      use underscores Indy's scholarly expertise, blending archaeology with practical
      ingenuity. The bag's role is purely functional, but its success highlights the
      difference between Indy's methodical approach and Satipo's reckless greed.
    status_before_event: Empty and unused, carried in Indy's jacket.
    status_after_event: Left on the pedestal in the Sanctuary, triggering the temple's
      collapse as Indy escapes.
  - object_uuid: object_6bb8950eee6f
    description_of_involvement: The giant rolling boulder is the temple's final, inescapable
      threat. Dislodged by the pedestal's activation, it thunders down the inclined
      passage, crushing everything in its path. Indy's hat is flattened against the
      wall as he dives clear, the boulder sealing the temple's entrance behind him.
      The boulder's pursuit is both literal and metaphorical—it embodies the temple's
      wrath, the consequences of Satipo's betrayal, and the inescapable force of ancient
      justice. Its arrival marks the event's climax, leaving no room for hesitation
      or error.
    status_before_event: Stationary, part of the temple's structure, awaiting activation.
    status_after_event: Dislodged and rolling, sealing the temple's entrance after
      Indy's escape.
  - object_uuid: object_039cd8725222
    description_of_involvement: 'The polished stone pedestal is the heart of the temple''s
      trap. It senses weight discrepancies and, when the idol is removed without proper
      replacement, initiates the collapse sequence. Indy''s careful swap buys him
      time, but the pedestal''s mechanism is inexorable—once triggered, it sets off
      a chain reaction of darts, spikes, and the boulder chase. Its role is purely
      functional, yet it embodies the temple''s merciless logic: disturbance equals
      destruction. The pedestal''s design reflects the ancient builders'' intent to
      protect their secrets at any cost.'
    status_before_event: Stable and inactive, cradling the jeweled idol.
    status_after_event: Activated, dropping five inches to trigger the temple's collapse.
      The weighted bag remains in place as Indy flees.
