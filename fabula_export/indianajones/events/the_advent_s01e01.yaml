  object_involvements:
  - object_uuid: object_dda74ed8b63e
    description_of_involvement: 'Indy''s brimmed felt hat with a weird feather is
      a symbol of his adventuring identity. It is crushed by the boulder as he escapes,
      a casualty of the temple''s fury. The hat''s destruction is a small but poignant
      detail—it represents the cost of survival in this lethal environment. Indy''s
      indifference to its loss (he doesn''t look back) underscores his focus on the
      greater stakes: escaping with his life and the idol. The hat''s absence in the
      aftermath reinforces the temple''s power to erase even the most iconic trappings
      of its victims.'
