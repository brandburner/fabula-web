  - object_uuid: object_90d49ff9cae7
    description_of_involvement: "\n        Indy’s bullwhip is the decisive weapon\
      \ in this event. Initially coiled beneath his leather jacket, it becomes an\
      \ extension of his body as he draws it with fluid precision. The whip’s fall\
      \ (the unplaited strip at the end of the lash) wraps around Barranca’s hand\
