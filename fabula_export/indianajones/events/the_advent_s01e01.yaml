    institutional_impact: The convoy’s departure reinforces the Nazis’ institutional
      dominance in the region, sending a message to both allies and enemies that their
      power is absolute. It also underscores the urgency of Indy’s mission—if the
      Ark reaches Hitler, the balance of the war could shift irrevocably in the Nazis’
