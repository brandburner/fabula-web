  - object_uuid: object_4a715125bbf6
    description_of_involvement: 'Jock’s amphibious plane is the **fleeting sanctuary**
      that Indy fights to reach, a floating escape pod from the Hovitos’ pursuit.
      Its **wing** serves as a handhold for Indy’s desperate climb aboard, while the
      **passenger compartment** becomes the stage for his psychological undoing. The
