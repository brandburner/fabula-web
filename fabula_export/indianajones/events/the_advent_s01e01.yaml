  - '{speaker: BELLOQ, dialogue: Indiana Jones... *adieu*., context: Belloq’s final,
    almost respectful farewell is laced with condescension, framing Indy’s entombment
    as a foregone conclusion. The French pronunciation of ''*adieu*'' (a nod to Belloq’s
    cultural identity) adds a layer of irony—his sophistication is undermined by his
    complicity in Nazi brutality. The line serves as a thematic bookend to their rivalry,
    setting up Belloq’s eventual downfall at the Ark’s hands.}'
