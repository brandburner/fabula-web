    description_of_involvement: 'Barranca’s pistol is the catalyst for the event’s
      violence. Initially drawn in a moment of desperation, it represents his greed
      and the expedition’s unraveling trust. The gun’s role is brief but pivotal:
      its muzzle is aimed at Indy’s back, a cowardly betrayal. Indy’s whip intervenes,
      wrapping the pistol and Barranca’s hand, rendering the weapon useless. Barranca’s
      attempt to cock and fire it again seals his fate—Indy’s whip spin causes the
      gun to discharge involuntarily, the bullet striking Barranca. The pistol’s final
      act is a tragic irony: it becomes the instrument of Barranca’s death, not Indy’s.
      Its presence underscores the expedition’s descent into violence and the fragility
      of alliances.'
