      for the entire disaster. When the pilot is knocked unconscious by Marion, his
      body slumps onto the throttle, revving the engines to full power and causing
      the plane to lurch forward uncontrollably. This single action sets off a chain
      reaction: the plane’s movement shears its wing into the fuel truck, igniting
      the gasoline, and traps Marion in the cockpit. The throttle’s role is purely
      functional but narratively pivotal—it turns Marion’s act of selflessness into
      a life-threatening situation and forces Indy into a desperate rescue attempt.
      Its design (sensitive to pressure) and placement (within easy reach of the pilot)
      make it a critical weak point in the plane’s operation, exploited by the chaos
      of the moment.'
    status_before_event: In a neutral position, engines idling, pilot’s hand resting
      nearby.
    status_after_event: Jammed in the "full power" position by the pilot’s unconscious
      body, causing the plane to surge forward.
  - object_uuid: object_c4d0057a8472
    description_of_involvement: The Flying Wing Cockpit becomes Marion’s prison after
      she climbs inside to free herself from the wing. The pilot’s body jams the throttle,
      causing the plane to lurch forward and the cockpit canopy to slide shut, trapping
      her inside. Marion struggles to open the canopy, but it is stuck, leaving her
      vulnerable to the encroaching fire. The cockpit’s confined space amplifies her
      desperation, while its mechanical failure (the stuck canopy) underscores the
      fragility of her situation. The cockpit also serves as a symbolic space—representing
      Marion’s emotional entrapment in her relationship with Indy and her need for
      redemption. Its role in the event is both literal (a physical trap) and metaphorical
      (a reflection of her internal conflict).
    status_before_event: Canopy open, pilot at the controls, engines idling.
    status_after_event: Canopy shut and stuck, Marion trapped inside, pilot unconscious,
      throttle jammed, plane moving uncontrollably.
  location_involvements:
  - location_uuid: location_79cf97bacd1c
    description_of_involvement: 'The Tanis Desert Airstrip is the primary setting
      for this high-stakes event, serving as a chaotic battleground where Indy’s fight
      with the mechanics spirals into disaster. The airstrip’s crude, improvised layout—with
      its fuel trucks, supply tents, and the Nazi Flying Wing—creates a dangerous
      environment where every object (propellers, fuel, crates) becomes a potential
      hazard. The space is tightly confined, forcing characters into close quarters
      and amplifying the tension. The airstrip’s role is both practical (as the site
      of the Nazi operation) and symbolic (representing the precariousness of Indy
      and Marion’s mission). The sounds of roaring engines, crumpling metal, and Indy’s
      shouts fill the air, while the heat and dust add to the oppressive atmosphere.
      The airstrip’s layout also dictates the flow of the action: the fight near the
      propellers, Marion’s climb onto the wing, and the plane’s collision with the
      fuel truck all unfold in a tightly choreographed sequence.'
    observed_atmosphere: Chaotic, oppressive, and high-stakes—filled with the roar
      of engines, the clash of metal, and the acrid smell of gasoline. The confined
      space amplifies the danger, while the heat and dust create a sense of urgency
      and desperation.
    functional_role: Battleground for Indy and Marion’s fight with the mechanics,
