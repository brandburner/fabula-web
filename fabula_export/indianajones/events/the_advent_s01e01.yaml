      \ Belloq, and Gobler**. Their **collective authority** is on full display as\
      \ they **seal Indy and Marion in the Well of Souls**, demonstrating the regime’s\
      \ **ruthless efficiency** and **single-minded obsession with the Ark**. The\
      \ Nazis’ actions are **bureaucratic yet brutal**—they **discard human life**\
      \ (Marion) as **expendable**, and their **taunting farewell** ('*adieu*') reinforces\
      \ their **contempt for Indy’s struggle**. The regime’s **influence** is **absolute**\
      \ in this moment, as the Nazis **control the Well’s entrance**, the Ark’s transport,\
      \ and the fate of Indy and Marion. Their **decisions are final**, and their\
      \ **power is unchallenged**—until Indy’s escape.\n      "
