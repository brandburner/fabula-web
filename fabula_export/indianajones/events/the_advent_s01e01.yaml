      \ forcing him to fire his own weapon. The bullwhip symbolizes Indy’s resourcefulness,\
      \ his ability to turn everyday tools into lethal instruments, and his moral\
      \ ambiguity—he doesn’t hesitate to use force when necessary.\n      "
