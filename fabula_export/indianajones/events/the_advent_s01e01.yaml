      \ (Barranca’s attempt to enforce order) to a symbol of the group’s fracturing\
      \ trust. When Indy restrains Barranca’s arm, the pistol is lowered, but the\
      \ tension remains. Later, Barranca’s silent mime of slitting Indy’s throat with\
      \ it foreshadows its eventual role in his death. The pistol is more than a weapon;\
      \ it’s a barometer of the expedition’s descent into chaos.\n      "
    status_before_event: Holstered at Barranca’s hip, unused but accessible.
    status_after_event: Still in Barranca’s possession, but its potential for violence
      is now a looming threat.
  - object_uuid: object_abf72aac6733
    description_of_involvement: "\n        The Yagua porters’ packs are the first\
      \ casualties of the expedition’s unraveling. As the porters flee in terror,\
      \ they drop their supplies—heavy bundles of ropes, rations, and tools—into the\
      \ muddy trail. Indy’s decision to leave them behind is pragmatic but symbolic:\
      \ it’s a rejection of the porters’ labor, their cultural beliefs, and the very\
      \ idea of relying on others. The discarded packs become a literal and metaphorical\
      \ weight the group sheds, but at the cost of self-sufficiency. Their abandonment\
      \ foreshadows the expedition’s later vulnerabilities, particularly in the temple’s\
      \ traps, where every resource will matter.\n      "
    status_before_event: Carried by the Yagua porters, intact and fully packed.
    status_after_event: Scattered on the trail, contents spilled into the mud, abandoned.
  - object_uuid: object_e0199c8cf256
    description_of_involvement: "\n        The two heavily-packed llamas represent\
      \ the expedition’s last logistical lifeline after the porters flee. Unlike the\
      \ discarded packs, the llamas are too valuable to abandon—they carry the bulk\
      \ of the remaining supplies, and their loss would cripple the group’s ability\
      \ to reach the temple and return. Satipo’s quick action to get them moving behind\
      \ Indy ensures they aren’t lost in the chaos. Their presence is a stark contrast\
      \ to the porters’ desertion: where the porters are driven by fear, the llamas\
      \ are passive, their fate tied to the humans’ decisions. Their survival becomes\
      \ a test of the expedition’s resilience.\n      "
    status_before_event: Laden with supplies, being wrangled by the Yagua porters
      at the rear of the group.
    status_after_event: Still packed and moving, now under Satipo’s indirect control
      as the remaining porters are herded forward.
