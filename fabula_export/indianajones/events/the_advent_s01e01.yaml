  - object_uuid: object_95c033891758
    description_of_involvement: The Ark of the Covenant’s wooden transport crate is
      the primary object of the Nazi’s obsession and the catalyst for the ambush.
      The crate is heavily guarded and prized by Belloq and Shliemann, who recognize
      its immense power and strategic value. The Nazis go to great lengths to secure
      the crate, using long poles to carry it from the hold of the Bantu Wind to the
      Wurrfler submarine. The crate’s seizure marks a turning point in the narrative,
      as it shifts the balance of power in favor of the Nazis and sets the stage for
      the high-stakes chase that follows. Its presence is a constant reminder of the
      stakes involved in the conflict between Indy and the Nazis.
    status_before_event: Securely stored in the hold of the Bantu Wind, surrounded
      by cargo and guarded by the crew. It is a heavy, imposing crate that draws the
