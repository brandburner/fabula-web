  key_dialogue:
  - |-
    **KEHOE** *(startled, as Indy crashes through the car roof)*:
        *'Jesus! Are you all right?'*

        **INDY** *(breathless, adrenaline-fueled, clutching the headpiece)*:
        *'((he's felt better)) Great. Got it.'*

        **KEHOE**:
        *'What now?'*

        **INDY** *(firm, already plotting the next move)*:
        *'I’ve got to get to Nepal.'*
  - |-
    **[Subtextual Exchange: The Whip vs. the Sword]**
        *(No spoken dialogue, but the visual and physical language is loaded:)*
        - **Samurai #1** *(grunting, charging with sword raised)*: **[Action speaks louder than words—his attack is a statement of superiority, a belief in the sword’s purity.]**
        - **Indy** *(cracking the whip, then wrapping it around the samurai’s neck)*: **[His weapon is an extension of his adaptability; the whip’s flexibility mirrors his own survivalist mindset. The kill is clinical, not triumphant—it’s a necessity, not a victory lap.]**
        - **Samurai #2** *(eyeing the whip with curiosity before engaging)*: **[His hesitation is telling—he respects the whip as a weapon, but underestimates its lethality. His death is a lesson in hubris.]**
