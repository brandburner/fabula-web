- fabula_uuid: cand_evt_scene_bc74e9925f4f06cc_02
  global_id: null
  title: 'The Bantu Wind’s Fall: Ambush, Capture, and Indy’s Desperate Gamble'
  description: "\n  The *Bantu Wind*’s fragile peace shatters when Nazi forces ambush\
    \ the ship under the cover of night, seizing the Ark of the Covenant and capturing\
    \ Marion Ravenwood in a brutal, high-stakes raid. The scene opens with a rare\
    \ moment of intimacy between Indy and Marion—her playful vulnerability in a prim\
    \ nightgown, their shared laughter, and a kiss that hints at reconciliation—before\
    \ Indy’s instincts alert him to the ship’s stalled engines. His investigation\
    \ reveals a chilling sight: ten German Wolf Submarines encircling the *Bantu Wind*,\
    \ their deck guns trained on the vessel, while boarding parties swarm the decks.\
    \ Marion is dragged from her cabin, still in her nightgown, as Indy barely evades\
    \ capture, slipping into the ship’s labyrinthine corridors. On the bridge, Captain\
    \ Katanga lies to the Nazis, claiming Indy is dead, but Belloq intervenes, claiming\
    \ Marion as his ‘compensation’—a decision that spares her life but ensures her\
    \ suffering. As the Nazis depart with the Ark, Indy makes a desperate, life-or-death\
    \ choice: he clings to the sinking *Wurrfler*, enduring a harrowing near-drowning\
    \ to stow away on the submarine. The event marks a brutal turning point—Indy’s\
    \ presumed death becomes a lie, Marion’s fate is sealed in Belloq’s grasp, and\
    \ the Ark’s capture shifts the narrative into a relentless, high-stakes pursuit\
    \ where survival hinges on cunning and luck. The scene’s tension escalates from\
    \ quiet intimacy to chaos, then to Indy’s solitary, defiant struggle against the\
    \ odds, setting the stage for his race against time to reclaim the Ark and save\
    \ Marion.\n  "
