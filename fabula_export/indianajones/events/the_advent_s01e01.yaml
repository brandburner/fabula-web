  object_involvements:
  - object_uuid: object_0556040998df
    description_of_involvement: "\n        Barranca’s pistol is the **catalyst for\
      \ betrayal and the instrument of his downfall**. Initially drawn in a moment\
      \ of **desperate greed**, it is aimed at Indy’s back—a cowardly but calculated\
      \ move. The pistol’s **cocked hammer and trembling grip** reflect Barranca’s\
      \ unraveling nerves, but its true role is **symbolic**: it represents the **fragility\
      \ of trust** in the expedition. When Indy’s whip ensnares Barranca’s hand, the\
      \ pistol becomes **trapped in his own grip**, its muzzle forced downward. The\
      \ first discharge is harmless, firing into the dirt, but the second—triggered\
      \ by Indy’s final jerk of the whip—**fires fatally into Barranca’s body**. The\
      \ gun does not kill directly; instead, it **becomes an extension of Barranca’s\
      \ fate**, his own weapon turning against him. After his death, the pistol remains\
      \ clutched in his stiffening fingers, a **silent testament to his betrayal and\
      \ the temple’s curse**.\n      "
    status_before_event: "\n        Holstered at Barranca’s side, loaded and ready.\
      \ Symbolizes his **latent threat** and **desperation**.\n      "
    status_after_event: "\n        Discharged twice (once into the dirt, once into\
      \ Barranca’s body). Clutched in his dead hand, now a **memento of his failure**.\n\
      \      "
  - object_uuid: object_dda74ed8b63e
    description_of_involvement: Indy’s brimmed felt hat with a weird feather serves
      as a practical storage device for the floorplan half. Its concealment adds a
      layer of intrigue to the scene, as Barranca and Satipo exchange a knowing glance
      when Indy retrieves the parchment. The hat is a signature part of Indy’s adventuring
      attire, symbolizing his preparedness and the blend of academic and rugged traits
      that define him.
    status_before_event: Worn by Indy, concealing the floorplan half in its band.
    status_after_event: Still worn by Indy, now with the floorplan half removed and
      in hand.
  - object_uuid: object_90d49ff9cae7
    description_of_involvement: "\n        Indy’s bullwhip is the **decisive instrument\
      \ of justice** in this event, transforming from a tool of utility to a weapon\
      \ of lethal precision. Initially curled and concealed beneath Indy’s leather\
      \ jacket, it is drawn with **fluid, unhurried grace**, uncoiling to its full\
      \ ten-foot length in a single motion. The whip’s **fall (the unplaited strip\
      \ at the end of the lash)** wraps around Barranca’s hand and pistol with **surgical\
      \ accuracy**, immobilizing him. Indy uses the whip to **jerk Barranca’s arm\
      \ down**, forcing the gun to discharge harmlessly into the dirt, then **spins\
      \ him in a wide arc**, ensnaring his body. The final jerk **triggers the fatal\
      \ shot**—Barranca’s own gun fires into his body as he is trapped in the whip’s\
      \ embrace. The whip’s role is **both functional (disarming) and symbolic (justice)**—it\
      \ does not kill directly but **forces Barranca’s hand (literally and figuratively)**,\
      \ making his death a consequence of his own actions. Afterward, Indy frees the\
      \ whip from Barranca’s corpse with **practical efficiency**, treating it once\
      \ again as a tool rather than a weapon.\n      "
    status_before_event: "\n        Curled and concealed beneath Indy’s short leather\
      \ jacket, its handle accessible but hidden. Functionally ready but not yet in\
      \ use.\n      "
    status_after_event: "\n        Uncoiled, used to disarm and kill Barranca, then\
      \ freed from his body. Returned to its curled state, now carrying the **metaphorical\
      \ weight of justice**—a tool that has drawn blood.\n      "
  - object_uuid: object_c4b0c9cb81c0
    description_of_involvement: "\n        The **Chachapoyan Temple Floorplan Half**\
      \ is the **macguffin of this confrontation**, the object of Barranca’s desire\
      \ and the reason for his betrayal. Indy reveals it from the **feather of his\
      \ fedora**, unrolling it to align with Satipo’s matching half—a moment of **false\
      \ unity** before Barranca’s greed shatters it. The floorplan is **not just a\
      \ map but a promise**: of treasure, of survival, of power. Barranca’s eyes **shine\
      \ with avarice** as he stares at it, his **quick glance at Satipo** betraying\
      \ his intent to seize it. The floorplan’s **physical fragility** (a rolled parchment)\
      \ contrasts with its **immense value**, making it a **temptation no weaker man\
      \ could resist**. After Barranca’s death, the floorplan remains **intact and\
      \ aligned**, a **symbol of Indy’s control** and the **cost of betrayal**. Its\
      \ revelation earlier in the scene had **triggered Barranca’s impulse**; now,\
      \ it is the **prize he died trying to claim**.\n      "
    status_before_event: "\n        Rolled and concealed within the feather of Indy’s\
      \ fedora. Known to Satipo and Barranca but not yet revealed in its entirety.\n\
      \      "
    status_after_event: "\n        Unrolled and aligned with Satipo’s half, now **secure\
      \ in Indy’s possession**. Its value has been **proven in blood**.\n      "
