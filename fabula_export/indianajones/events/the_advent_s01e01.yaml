  object_involvements:
  - object_uuid: object_9e681580cd8a
    description_of_involvement: "\n      Belloq’s liquor serves as both a prop and\
      \ a symbol of his unraveling composure. He pours himself a drink early in the\
      \ scene, a gesture that suggests he is trying to steady his nerves or assert\
