- fabula_uuid: act_61b3ba169f41c5ec
  number: 2
  summary: Indy and Marion arrive in Cairo, seeking assistance from Indy's friend,
    Sallah, to decipher the headpiece and locate the Ark. They discover Belloq is
    collaborating with the Nazis in Cairo, intensifying the urgency of their mission.
    While navigating the bustling streets, Marion is seemingly captured and killed
    in a truck explosion orchestrated by the Nazis, leaving Indy grief-stricken and
    more determined than ever. Indy confronts Belloq, who reveals the Ark's true nature
    as a "transmitter to God" and taunts Indy about Marion's death. With Sallah's
    help, Indy deciphers the full inscription on the headpiece, realizing the Nazis
    are digging in the wrong location due to an incorrect staff measurement. Indy
    and Sallah infiltrate the Nazi dig site, locate the true Well of Souls, and discover
    the Ark amidst a pit of venomous snakes. Belloq and the Nazis capture them, sealing
    Indy and Marion inside the snake-infested chamber. They escape through a hidden
    passage, emerging near the Nazi airstrip. A desperate attempt to reclaim the Ark
    leads to a chaotic battle involving a Flying Wing, which explodes, again leading
    Indy to believe Marion is dead. Indy, consumed by grief and resolve, pursues the
    Ark, engaging in a high-stakes truck chase across the desert, battling Nazis to
    reclaim the artifact. He successfully seizes the Ark, escaping the Nazi convoy.
