      a signature tool of Indy’s, is not just a functional object but a symbol of
      his resourcefulness and adaptability. Its use here underscores his ability to
      improvise under extreme pressure, turning a tool of combat and exploration into
      a lifeline. The whip’s versatility is on full display, as it transitions from
      a weapon to a survival aid in a matter of seconds.
    status_before_event: Wet but intact, coiled and ready for use. Indy has it on
      his person as he pulls himself onto the *Wurrfler*’s deck, though it is not
