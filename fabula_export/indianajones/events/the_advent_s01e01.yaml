  key_dialogue:
  - |-
    AMIR: *Come. Look.*
    *(points to markings on the headpiece)*
    This is a warning... not to disturb the Ark of the Covenant.
    INDY: *Just what I need.*
  - |-
    AMIR: *It says it is... ten jamirs high... About seventy-five inches. Wait! I am not finished... And one jamir to honor the Hebrew God whose Ark this is.*
    INDY: *You said their top section was blank. Are you absolutely sure?*
    SALLAH: *(nods)*
    INDY: *Belloq's staff is seven and a half inches short. They're digging in the wrong spot!*
  - |-
    SALLAH: *(holding the date, motioning to the dead monkey)*
    Bad dates.
