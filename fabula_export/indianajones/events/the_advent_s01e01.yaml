- fabula_uuid: cand_evt_scene_c385e88c5a8b810b_02
  global_id: null
  title: 'The Raven Burns: Marion’s Defiance and Indy’s Rescue'
  description: "\n  In the dimly lit *Raven* saloon, Marion Ravenwood—left behind\
    \ by Indy with the Ark’s headpiece and a stash of money—faces a brutal interrogation\
    \ by Nazi archaeologist **Arnold Toht (posing as Belzig)** and his men. After\
    \ a tense standoff, Belzig escalates from threats to physical violence, brandishing\
    \ a burning poker to force Marion to reveal the headpiece’s location. The scene\
    \ erupts into chaos as Indy arrives, his whip disarming Belzig and igniting a\
    \ fiery shootout. Marion, resourceful and defiant, fights back with a hidden pistol\
    \ and a submachine gun, while Indy battles a giant Sherpa and the Nazis. The saloon\
    \ burns around them as Marion secures the headpiece, declaring herself Indy’s\
    \ partner. The event underscores the Nazis’ ruthlessness, Marion’s resilience,\
    \ and the escalating stakes of the Ark’s quest, while foreshadowing their uneasy\
    \ alliance ahead.\n  "
