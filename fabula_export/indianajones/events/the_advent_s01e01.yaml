    what_happened: "\n        Barranca’s fear and frustration reach a boiling point\
      \ as the Yagua porters flee. He yells at them in Quechua, his anger a thin veneer\
      \ for his own terror of the curse, then draws his pistol to shoot the fleeing\
      \ men. Indy’s intervention—*‘No.’*—pauses him, and his glare at Indy’s restraining\
      \ hand is pure venom. When Indy releases him, Barranca’s defiance surfaces:\
      \ *‘I do not carry supplies.’* His silent exchange with Satipo afterward is\
      \ a dark promise: he mimes slitting Indy’s throat, and Satipo’s restrained response\
      \ (*‘Be patient, you idiot’*) suggests this isn’t the first time Barranca’s\
      \ violent impulses have been checked. His body language is tense, coiled, ready\
      \ to strike—but for now, he bides his time.\n      "
