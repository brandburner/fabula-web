    must be received with the proper reverence.’*'
  - '(German Officer, muttering under his breath to his companion): *‘This fat pig
    thinks he can make us wait like dogs. We should remind him who holds the real
    power here.’*'
  - '(Hok’s Advisor, translating with a smirk): *‘The Master of the House requests
    that you observe the traditions of this land. Patience is a virtue even the mighty
    must cultivate.’*'
