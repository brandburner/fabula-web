- fabula_uuid: cand_evt_scene_07bd07f7ced09ac0_01
  global_id: null
  title: 'The Race Against the Sun: Indy and Sallah Infiltrate Tanis'
  description: "\n  In a high-stakes infiltration of the Nazi-occupied Tanis dig site,\
    \ Indiana Jones and Sallah—disguised as Arab diggers—navigate the chaotic, militarized\
    \ excavation under the watchful eyes of German soldiers. Their mission: to reach\
    \ the ancient map room before the sun’s precise angle reveals the Ark’s location,\
    \ beating Belloq and the Nazis to the prize. The scene crackles with tension as\
    \ Indy descends into the map room, where the Staff of Ra’s alignment with the\
    \ sunlight exposes the true location of the Well of Souls—a discovery that undermines\
    \ Belloq’s calculations and shifts the balance of the race. Meanwhile, Sallah’s\
    \ improvisational survival above ground (repurposing a Nazi flag as an escape\
    \ rope) underscores the duo’s resourcefulness, but their narrow escape from German\
    \ suspicion highlights the escalating danger. This moment is a masterclass in\
    \ *archaeological heist tension*, where every second counts, and the stakes are\
    \ nothing less than the fate of the Ark—and the world.\n  "
