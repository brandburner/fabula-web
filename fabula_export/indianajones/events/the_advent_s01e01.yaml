  - character_uuid: agent_aedc86bb8523
    emotional_state: A mix of primal terror (of snakes), protective urgency (for Marion),
      and adrenaline-fueled determination to escape. His fear is palpable, but his
      focus on survival overshadows it, revealing a deeper resilience.
    goals:
    - Escape the Well of Souls alive with Marion
    - Repel the snakes using fire and improvised tools
    - Break through the Well’s wall to find an escape route
    what_happened: 'Indy is trapped in the Well of Souls after the Nazis seal the
      entrance, leaving him and Marion to face a swarm of venomous asps. He catches
      Marion as she is pushed into the pit, their shared terror of snakes momentarily
      bonding them. With dwindling torches and encroaching snakes, Indy devises a
      desperate escape plan: he creates a ring of fire using oil canisters, then climbs
      a crumbling pillar, toppling it to smash through the Well’s wall. His actions
      are driven by urgency, resourcefulness, and a deep-seated fear of snakes, which
      he overcomes through sheer willpower and improvisation.'
    observed_status: 'Indy is trapped in the Well of Souls after the Nazis seal the
      entrance, leaving him and Marion to face a swarm of venomous asps. He catches
