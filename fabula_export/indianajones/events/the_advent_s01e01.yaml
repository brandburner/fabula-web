    \ to secure his own mythic status, foreshadowing his later hubris with the Ark.\
    \ The moment crystallizes the Nazi-Ark race’s stakes: Indy’s survival now hinges\
    \ on outrunning both the Hovitos *and* the consequences of Belloq’s ruthless pragmatism.\n\
