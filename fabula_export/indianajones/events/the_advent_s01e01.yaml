      \ (who **defers to Shliemann** despite his personal attachment to Marion). Gobler’s\
      \ **silent presence** reinforces the **collective nature** of Nazi power. The\
      \ regime is represented **not just by individuals but by its institutional protocols**—the\
      \ **sealing of the tomb**, the **transport of the Ark**, and the **abandonment\
      \ of prisoners** are all **standard operating procedures** for the Nazis.\n\
