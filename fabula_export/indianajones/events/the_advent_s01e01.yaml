      chaos. The street’s role as a transition point from the bazaar’s chaos to the
      Nazis’ extraction underscores the ambush’s success: Marion is no longer a participant
      in the action but a prize being carried to an unknown fate.'
    observed_atmosphere: Tense and hasty, with the sound of Marion’s screams and the
