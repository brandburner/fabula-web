  description: "\n  In a high-stakes gambit of deception and desperation, Indiana\
    \ Jones executes a meticulously calculated swap—replacing the sacred idol with\
    \ a bag of sand to trigger the temple’s ancient escape mechanism. The moment the\
    \ idol is lifted, the temple awakens with a deafening, mechanical roar, its walls\
    \ trembling as if alive. Indy’s survival instincts kick in as he races back through\
    \ the booby-trapped sanctuary, his earlier caution now a frantic sprint against\
    \ time. The temple’s defenses activate in a cascade: poison darts fill the air,\
    \ the floor collapses into bottomless pits, and the very walls seem to conspire\
    \ against him. Meanwhile, Satipo, Indy’s cowardly guide, seizes the opportunity\
    \ to betray him, demanding the idol in exchange for the whip—only to meet a gruesome\
    \ fate as the temple’s spikes impale him mid-escape. Indy, left without his whip\
    \ and facing a crushing boulder hurtling toward him, must rely on sheer physicality\
    \ and wit to survive, diving clear just as the temple seals itself shut behind\
    \ him. The event is a masterclass in tension, blending Indy’s resourcefulness\
    \ with the temple’s lethal precision, while Satipo’s betrayal and demise serve\
    \ as a brutal reminder of the fragility of alliances in the face of greed and\
    \ fear. The temple’s wrath isn’t just a physical threat—it’s a moral reckoning,\
    \ forcing Indy to confront the cost of his choices and the inescapable consequences\
    \ of disturbing the sacred.\n  "
