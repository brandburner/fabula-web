    \ words striking a nerve in Indy, who is already grappling with guilt over Marion’s\
    \ fate. Just as the tension reaches its peak, Sallah’s nine children burst in,\
    \ disrupting the standoff. Their arrival shifts the dynamic entirely: the Arab\
    \ patrons, previously indifferent, now bristle with protective hostility, forcing\
