- fabula_uuid: act_2bcaceb566d00b14
  number: 3
  summary: 'Indy and Marion, having narrowly escaped the Nazi convoy with the Ark,
    board a tramp steamer, the Bantu Wind, for safe passage to England. Their journey
    is interrupted when a fleet of Nazi U-boats intercepts the ship, seizing the Ark
    and capturing Marion. Indy, believed dead by the Nazis, secretly stows away on
    Belloq''s submarine by clinging to its periscope. The submarine transports them
    to a hidden Nazi island base, where Belloq prepares for a ceremonial opening of
    the Ark. Indy infiltrates the base, attempting to stop the ritual with a bazooka,
    but is subdued. Belloq, dressed in ceremonial robes, begins the ritual to open
    the Ark, believing he will communicate with God. As the Ark opens, terrifying
    supernatural forces are unleashed: blinding light, fire, and spirits of divine
    wrath emerge, incinerating Belloq and all the Nazis present in a spectacular display
    of judgment. Indy and Marion, having averted their gaze as instructed by Indy,
    survive the Ark''s destructive power. In the aftermath, they return to Washington
    D.C., where the U.S. government takes possession of the Ark. However, Indy and
    Brody learn the Ark will not be studied but instead stored away in a vast, secret
    government warehouse, its immense power and mysteries indefinitely concealed from
    the world.'
