- fabula_uuid: cand_evt_scene_a118de40fb9351fe_02
  global_id: null
  title: '**"The Temple’s Cruel Lesson: Trust, Traps, and the Cost of Greed"**'
  description: "\n  In a masterclass of tension and betrayal, Indiana Jones and Satipo\
    \ navigate the temple’s lethal labyrinth, where every step could be their last.\
    \ Indy’s expertise—his whip, his caution, his ability to read traps—contrasts\
    \ sharply with Satipo’s reckless impatience, foreshadowing the Peruvian’s fatal\
    \ flaw. The sequence escalates from eerie discovery (the tarantulas, the spiked\
    \ chamber, the skeletons) to high-stakes survival (the false floor, the dart trap,\
    \ the boulder chase), culminating in Satipo’s betrayal and gruesome demise. Indy’s\
    \ resourcefulness is tested to its limits: he deciphers the dart trap’s pattern,\
    \ executes a flawless idol swap, and barely escapes the temple’s collapsing fury—only\
    \ to be abandoned by Satipo, who steals the idol and meets a poetic, violent end.\
    \ The event underscores Indy’s lone-wolf resilience, the temple’s merciless logic,\
    \ and the theme that greed and haste are the surest paths to destruction. The\
    \ rumbling boulder sealing the temple isn’t just a chase climax; it’s a metaphor\
    \ for the inescapable consequences of Satipo’s choices—and a warning to Indy about\
    \ the cost of trusting the wrong people.\n  "
