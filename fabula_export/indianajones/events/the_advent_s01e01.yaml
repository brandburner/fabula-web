      Ark’s power. The home, once a symbol of **domestic stability**, becomes a **metaphor
      for the characters’ vulnerability**. The candlelight, which initially symbolized
      warmth, now casts **ominous shadows**, reflecting the **unseen dangers** lurking
      in the dark.
    access_restrictions: Open to the characters but **compromised by Nazi sabotage**.
      The poisoned dates indicate that the Nazis have **infiltrated even this private
      space**, making it a **contested zone** between safety and threat.
