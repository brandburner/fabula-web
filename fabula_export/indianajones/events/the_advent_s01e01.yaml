      safety—but not before Reggie the boa constrictor, coiled on the cabin floor,
      **shatters Indy’s relief**. The plane’s dual role as **lifeline and psychological
      minefield** underscores the duality of Indy’s journey: physical survival and
      emotional exposure.'
    status_before_event: Moored in the Urubamba River, engines off, Jock seated on
      the wing awaiting Indy’s arrival. The cabin interior is dimly lit, with Reggie
      coiled on the floor—an unseen threat.
    status_after_event: The plane is airborne, soaring over the jungle at dusk. The
      cabin remains the same, but Indy’s perception of it has shifted from **safe
      haven** to **a space of vulnerability**, with Reggie now a looming presence
      in his mind.
  - object_uuid: object_4a715125bbf6
    description_of_involvement: 'The wing of Jock’s amphibious plane is Indy’s **last
      physical obstacle** before safety. He grabs it with **desperate strength**,
      hauling himself aboard as the Hovitos’ darts fall short. The wing’s **slick,
      unyielding surface** is a **metaphor for the thin line between life and death**—one
      misstep, and Indy would be lost. Its **practical role** (a handhold) is underscored
      by its **symbolic weight**: it is the **bridge between chaos and (temporary)
      safety**, a **threshold** that Indy crosses only to face a new kind of danger.'
    status_before_event: Extended over the Urubamba River, stable and ready for Indy’s
      grip. The metal is cool and damp from the river mist.
    status_after_event: 'Now bearing the **imprint of Indy’s struggle**—his hands
      have left their mark, but the wing itself is unchanged. Its **narrative role**
      is fulfilled: it has delivered Indy to the plane, where the **real battle**
      begins.'
  - object_uuid: object_4a715125bbf6
    description_of_involvement: 'The passenger seat in Jock’s plane is the **brief
