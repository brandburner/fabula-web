  key_dialogue:
  - |-
    **INDY** *(grabbing Sallah’s hand as he reaches for the Ark)*:
        *'Don’t touch it! Never touch it!'*
  - |-
    **INDY** *(to Marion, as snakes close in)*:
        *'Don’t panic. There’s plenty of time for that later. Wave that at anything that slithers.'*
        **MARION** *(panicked)*:
        *'Whatever you’re doing, do it faster.'*
        **INDY** *(spotting the pillar)*:
        *'There!'*
  - |-
    **INDY** *(as Marion clings to him, terrified)*:
        *'Just keep your eyes open and get ready to run. No matter what happens to me.'*
        **MARION** *(panicked)*:
        *'What do you mean?'* *(Indy is already gone, sprinting toward the pillar.)
