  - object_uuid: object_9146ce326c17
    description_of_involvement: The *Wurrfler* submarine is the primary vessel of
      the Nazi expedition and the destination for the Ark and Marion. Its presence
      looms large in this event, as it is part of the wolfpack of submarines that
      ambushes the *Bantu Wind*. The *Wurrfler*’s deck guns are trained on the *Bantu
      Wind*, and its boarding parties swarm the ship to seize the Ark and captives.
      Indy’s desperate stowaway maneuver—clinging to the periscope as the submarine
      submerges—is a climactic moment that highlights the *Wurrfler*’s role as both
      a threat and a means of pursuit. The submarine’s conning tower becomes a symbol
      of Indy’s tenacity and the high stakes of the chase, as he refuses to let go
      even as the ocean rises around him. The *Wurrfler*’s design and functionality
      (e.g., the periscope, the submerging mechanism) are critical to this event,
      as they enable Indy’s survival and set the stage for the next phase of the chase.
