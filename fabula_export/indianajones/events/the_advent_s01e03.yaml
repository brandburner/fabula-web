      of Henry’s lifelong research—a **reconstructed map** pieced together from scattered
      clues. The diary’s torn pages (removed by Indy to mislead the Nazis) are implied
      but not seen, creating a **narrative tension** between what is known and what
      is still hidden. The map’s completion, made possible by Indy’s revelation of
      Alexandretta, validates Henry’s genius and accelerates the quest. The diary’s
      role is **multilayered**: it is a **scholarly artifact**, a **personal legacy**,
      and a **strategic tool** in the race against the Nazis. Indy’s act of pocketing
      it signals his assumption of leadership and his determination to protect his
      father’s work.'
