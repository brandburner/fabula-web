  object_involvements:
  - object_uuid: object_99c81dfe788e
    description_of_involvement: 'The Grail Tablet is the narrative and emotional linchpin
      of this event. Physically, it is a two-foot-square sandstone slab inscribed
      with Christian symbols and early Latin text, its surface worn by time but still
      legible. Donovan unveils it with theatrical flair, using it as both a scholarly
      artifact and a psychological weapon. Indy’s initial examination is purely academic—he
      identifies the material (sandstone), the era (mid-12th century), and the language
      (early Latin)—but his demeanor shifts when he translates the inscription, particularly
      the phrase *‘the cup that holds the blood of Jesus Christ’*. The tablet’s incompleteness
      (missing its top portion) becomes a narrative device, as Donovan reveals that
      a second ‘marker’—entombed with a Crusader knight in Venice—is needed to complete
      the Grail’s location. Indy’s use of champagne to reveal hidden inscriptions
      demonstrates the tablet’s dual role: as a physical artifact and as a catalyst
      for emotional revelation. The tablet’s symbolic weight is immense; it bridges
      the gap between myth and reality, between Indy’s skepticism and his reluctant
      belief, and between his father’s academic pursuit and the dangerous quest that
      has consumed him.'
    status_before_event: Wrapped in cloth on a table in Donovan’s penthouse, its inscriptions
      hidden from view. It is a newly acquired artifact, excavated by Donovan’s team
      in the mountains north of Ankara, and serves as the first tangible clue to the
      Grail’s location.
    status_after_event: Unwrapped and examined by Indy, with its inscriptions partially
      revealed through the use of champagne. It remains in Donovan’s possession, but
      its role as a ‘marker’ and the implications of its incompleteness have been
      made clear. The tablet is now a focal point of Indy’s internal conflict and
      the driving force behind his decision to pursue the Grail.
  - object_uuid: object_b8ededbbdc4d
    description_of_involvement: 'Donovan’s fluted champagne glasses serve a dual purpose
      in this event: as a social prop and as a functional tool for revealing hidden
      inscriptions. Donovan pours champagne into the glasses as Indy translates the
      tablet, a gesture that appears casual but is calculated. When Indy pauses, Donovan
      offers him a glass, which Indy accepts but does not drink from immediately.
      Instead, he uses the champagne to moisten his finger, rubbing it over the tablet
      to reveal additional text. This improvisational use of the glass transforms
      it from a mere accessory of high society into an active participant in the unraveling
      of the Grail’s mystery. The glasses symbolize the tension between the opulent,
      performative world of Donovan’s penthouse and the raw, intellectual pursuit
      of the Grail. Their fluted design and the way they catch the light during the
      revelation underscore the moment’s theatricality, as if the Grail’s secrets
      are being coaxed into the open by the very trappings of Donovan’s wealth.'
    status_before_event: Filled with champagne and placed on a table or tray in Donovan’s
      penthouse, part of the cocktail party’s ambiance. They are pristine, untouched,
      and serve their intended social function.
    status_after_event: One of the glasses is used by Indy to moisten his finger and
      reveal hidden inscriptions on the Grail Tablet. The glass remains in the room,
      now imbued with a narrative significance beyond its original purpose. Its role
      in the event elevates it from a mundane object to a symbol of the intersection
      between scholarly curiosity and the supernatural.
  - object_uuid: object_e8998315fb9b
    description_of_involvement: 'While the Grail Tablet is the primary artifact in
      this event, Donovan’s broader artifact collection—including the Friar’s Manuscript—serves
      as a visual and thematic backdrop that reinforces the stakes of the Grail quest.
      The manuscript, an ancient leather-bound volume, is produced by Donovan to corroborate
      the Knight’s story and the existence of the two ‘markers.’ Though Indy does
      not handle the manuscript directly, its presence in the room adds layers of
      historical authenticity to Donovan’s claims. The collection as a whole—displayed
      on shelves and walls, gleaming under soft lighting—creates an atmosphere of
      intellectual rigor and wealth, contrasting with the dangerous, almost mythic
      nature of the Grail. The artifacts symbolize Donovan’s dual identity: a man
      of culture and refinement on the surface, but one driven by a desperate, almost
      fanatical desire for immortality. Indy’s initial examination of the collection
      before the tablet is unveiled hints at his respect for antiquities, but the
      Grail Tablet’s revelation shifts his focus from admiration to urgency.'
    status_before_event: Displayed throughout Donovan’s penthouse, including the Friar’s
      Manuscript on a table or shelf. The collection is static, serving as a decorative
