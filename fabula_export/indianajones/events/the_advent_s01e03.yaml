- fabula_uuid: cand_evt_scene_b170bbb9acd27152_02
  global_id: null
  title: '**"The Vase That Wasn’t: A Father’s Obsession and a Son’s Rage"**'
  description: "\n  In a high-stakes moment of father-son reunion, Indiana Jones crashes\
    \ through a window into his estranged father Henry’s room—only to be immediately\
    \ blindsided by a vase hurled at his head. The attack isn’t personal; Henry, paranoid\
    \ and armed, mistakes Indy for a Nazi intruder. But the real tension erupts when\
    \ Henry, still clutching the shattered porcelain, reveals his true fixation: not\
    \ Indy’s safety, but the vase’s authenticity. With cold precision, he smashes\
    \ it against the wall, declaring it a fake. The act is a microcosm of their fractured\
    \ relationship—Henry’s obsessive detachment from material (and emotional) consequences,\
    \ Indy’s simmering resentment at being treated as an afterthought. Their bickering\
    \ escalates as Henry, oblivious to Indy’s bruised head, fixates on the ‘late Fourteenth\
    \ Century, Ming Dynasty’ forgery, while Indy seethes over the physical and emotional\
    \ blows. The moment crystallizes their generational divide: Henry’s scholarly\
    \ detachment as a shield against vulnerability, Indy’s impulsive defiance as a\
    \ cry for recognition. When Nazis burst in, the scene’s climax—Indy’s violent\
    \ retaliation—isn’t just about survival; it’s a cathartic explosion of years of\
    \ unspoken fury, culminating in his snarled rejection of the childhood nickname\
    \ *‘Junior.’* The vase, the diary, the machine gun fire—all symbols of their broken\
    \ bond, now shattered beyond repair… or so it seems.\n  "
  episode_uuid: ep_sea_ser_the_adventures_of_indiana_jone_s01_e03
  scene_sequence: 21
  sequence_in_scene: 49
  key_dialogue:
  - |-
    HENRY: ((referring to the vase)) I'll never forgive myself—
         INDY: ((surprised, misunderstanding)) Don't worry—I'm fine.
         HENRY: Thank God!
         *(beat)*
         HENRY: ...it's fake. See, you can tell by the cross section.
  - |-
    HENRY: ((points towards the Nazis)) So it wouldn't fall into their hands!!
         INDY: I came here to save you.
         HENRY: Oh yeah? And who's gonna come to save *you*, Junior??
         *(Indy rips a machine gun from a soldier and mows down the Nazis.)*
         INDY: I told you— *(turns, sprays the room)* —Don't call me Junior!
  - |-
    HENRY: ((trembling with anticipation)) And his shield... the inscription on Sir Richard's shield...?
         INDY: Alexandretta.
         HENRY: ((joyful)) Oh, Junior... you did it.
         INDY: No, Dad. *You* did. Forty years.
