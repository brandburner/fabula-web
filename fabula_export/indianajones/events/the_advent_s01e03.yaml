      demise.
    symbolic_significance: Represents the fragility of Henry’s scholarly world and
      the intrusion of Indy’s adventurous, violent reality. The room’s destruction
      mirrors the fracturing of their relationship, as well as the broader theme of
      legacy and the cost of obsession.
    access_restrictions: Initially restricted to Henry as a prisoner, but Indy’s entry
      and the Nazis’ arrival turn it into a contested space. The broken shutters and
      open window make it vulnerable to further intrusions.
    key_environmental_details:
    - Rain lashing through the broken shutters, creating a sense of exposure
    - Dim lamplight casting long shadows, emphasizing the emotional distance between
