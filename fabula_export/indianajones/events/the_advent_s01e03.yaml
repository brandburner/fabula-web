    description_of_involvement: Flaming torches dot the Berlin city square, gripped
      by College Students and Nazi Brownshirts. Their steady flames cut through the
      darkness, casting harsh shadows on Indy’s disguised face as he pins Elsa against
      a column. The torches amplify the rally’s fascist menace, their flickering light
