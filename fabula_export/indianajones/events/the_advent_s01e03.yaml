acts:
- fabula_uuid: act_648731bcc6c3071c
  number: 1
  summary: 'The narrative opens in 1912, introducing a young Indiana Jones as he attempts
    to recover the Cross of Coronado from looters in the American Southwest. This
    prologue establishes Indy''s core motivation: artifacts belong in a museum. After
    a thrilling chase, he loses the Cross but gains his iconic fedora, a gift from
    the "Fedora" man. The story then jumps to 1938, where a grown Indiana Jones, now
    a respected archaeology professor, finally reclaims the Cross of Coronado in a
    violent storm at sea. Back at his university, he is approached by the wealthy
    art collector Walter Donovan, who reveals that Indy''s estranged father, Professor
    Henry Jones Sr., has vanished while searching for the Holy Grail. Donovan presents
    a crucial stone tablet and enlists Indy''s help, providing him with his father''s
    Grail Diary, which Henry had mailed to him. Indy, accompanied by Marcus Brody,
    travels to Venice, where they meet Dr. Elsa Schneider, his father''s colleague.
    Together, they decipher clues from the diary and a stained-glass window, leading
    them to a hidden catacomb beneath a library. Inside, they discover the tomb of
    a Grail Knight and a shield that completes the missing portion of the Grail Tablet,
    confirming its authenticity. Their discovery is interrupted by the Brotherhood
    of the Cruciform Sword, a secret society dedicated to protecting the Grail. A
    high-stakes boat chase ensues, during which Indy captures Kazim, a member of the
    Brotherhood. Kazim, believing Indy''s quest is to save his father rather than
    exploit the Grail, reveals that Henry Sr. is being held captive in Castle Brunwald
    on the Austrian-German border. This revelation shifts Indy''s mission from archaeological
    pursuit to a personal rescue, marking the end of the first act.'
