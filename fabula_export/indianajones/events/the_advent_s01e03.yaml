  object_involvements:
  - object_uuid: object_b08960fbc4e5
    description_of_involvement: The Cross of Coronado is the symbolic artifact at
      the heart of the conflict, representing both Indy’s moral convictions and Fedora’s
      greed. Indy clings to it throughout the chase, refusing to surrender it even
      as he faces life-threatening dangers. The Cross serves as a catalyst for the
      action, driving the pursuit and the moral stakes of the scene. Its presence
      forces Indy to confront the clash between preservation and exploitation, embodying
      the broader narrative conflict.
    status_before_event: Lodged securely in Indy’s belt as he leaps onto the circus
      train.
    status_after_event: Still in Indy’s possession as he escapes to the 'Magic Caboose,'
      though Fedora and Roscoe attempt to seize it.
  - object_uuid: object_3a419f1b9fd7
    description_of_involvement: Roscoe’s knife is a weapon used in the brutal rooftop
      struggle with Indy atop the rhino boxcar. Roscoe pulls the knife during the
      fight, flashing it as he and Indy grapple perilously close to the edge. The
      knife represents the violent, desperate nature of the chase, escalating the
