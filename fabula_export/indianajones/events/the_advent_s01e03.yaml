      Brotherhood’s attack. The cliffs echo with gunfire, and the dust kicked up by
      the tank and vehicles obscures vision, creating a disorienting, high-stakes
      environment where survival depends on quick thinking and adaptability.
    observed_atmosphere: Chaotic, dust-choked, and deafening with gunfire, grenades,
      and exploding vehicles. The confined space of the canyon amplifies the desperation
      and urgency of the battle.
    functional_role: Battleground and tactical bottleneck, forcing both sides into
      close-quarters combat.
    symbolic_significance: Represents the inescapable conflict between those who seek
      the Grail and those who protect its secrets, with the valley’s walls symbolizing
      the moral and physical boundaries of their struggle.
    access_restrictions: Open to all combatants, but the confined geography limits
      escape routes and amplifies the danger.
