    observed_atmosphere: Authoritative and oppressive, with the guard’s shouts cutting
      through the engine roar. The guardhouse feels like a small but menacing outpost
      of Nazi control in an otherwise open countryside.
    functional_role: A symbolic barrier representing Nazi authority, which Indy and
      Henry defy in their escape. It marks the transition from the chase to the crossroads,
