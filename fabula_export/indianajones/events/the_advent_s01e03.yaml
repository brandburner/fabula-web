  key_dialogue:
  - |-
    DONOVAN: *These pages are taken from Professor Jones' diary, Your Highness. And they include a map that pinpoints the exact location of the Grail.*

    *(Subtext: Donovan is leveraging Henry Jones Sr.’s work to justify the Nazis’ claim, framing the Grail as a prize to be seized rather than a sacred relic. His tone is confident, almost proprietary, as if the Grail is already theirs.)
  - |-
    SULTAN: *Rolls-Royce Phantom Two. 4.3 litre, 30 horsepower, six cylinder engine, with Stromberg Downdraft carburetor. Can go from zero to 100 kilometres an hour in 12.5 seconds. And I even like the color.*

    *(Subtext: The Sultan’s obsession with the car’s mechanical details reveals his true priorities—luxury, speed, and modern power—over ancient relics. His dismissal of the Grail’s significance is a stark contrast to the Nazis’ fanatical pursuit of it, highlighting the absurdity of the transaction.)
  - |-
    DONOVAN: *The keys are in the ignition, Your Highness.*

    *(Subtext: Donovan’s resignation is chilling. He is willing to sacrifice a symbol of Nazi prestige—a car that represents wealth and authority—to secure the Grail. This moment cements the Nazis’ desperation and their willingness to trade anything, no matter how valuable, to achieve their goals.)
  - |-
    ELSA: *We have no time to lose. Indiana Jones and his father have escaped.*

    *(Subtext: Elsa’s arrival with this news injects urgency into the scene. The escape of Indy and Henry forces the Nazis to accelerate their plans, turning the Grail hunt into a race against time. Her tone is sharp, almost panicked, revealing the stakes: if Indy reaches the Grail first, the Nazis’ quest for immortality—and their control over its power—is in jeopardy.)
