    institutional_impact: The alliance’s actions highlight the erosion of trust in
      institutions and the moral decay of the town, where law enforcement and criminals
      operate as a unified force. This institutional complicity underscores the broader
      narrative of greed and betrayal, where even those sworn to protect the community
      are willing to participate in theft and corruption.
    internal_dynamics: The alliance is characterized by a loose but effective partnership
      between the Sheriff and Fedora’s gang, driven by mutual self-interest. The Sheriff
