  - object_uuid: object_661df66c5d62
    description_of_involvement: The tail stabilizer is the biplane’s critical weak
      point, and its destruction seals Indy and Henry’s fate. When Henry swings the
      machine gun around to fire at the Messerschmitts, his wild shots inadvertently
