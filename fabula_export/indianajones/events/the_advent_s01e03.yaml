    symbolic_significance: Represents the collision of personal and political threats.
      The compartment’s luxury contrasts with the violence and emotional rawness,
      symbolizing the fragility of civility in the face of danger. The turning Zeppelin
      mirrors the characters’ own unresolved journeys—Indy’s confrontation with his
      father, Henry’s obsession with the past, and the inescapable pull of their shared
      history.
    access_restrictions: Open to all passengers, but the tension restricts movement
      and freedom. Vogel’s interrogation creates a sense of surveillance, while Indy’s
      disguise allows him temporary authority over the space.
    key_environmental_details:
