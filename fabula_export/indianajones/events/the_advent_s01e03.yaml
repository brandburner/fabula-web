      symbolizes the unpredictable forces at play in Indy’s journey, forcing him to
      adapt and improvise. Its use underscores the high-speed, high-stakes nature
      of the chase and Indy’s physical prowess.
    status_before_event: Stationary alongside the train tracks, spinning rapidly as
