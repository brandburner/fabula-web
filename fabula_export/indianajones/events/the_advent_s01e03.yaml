  - |-
    **INDY** *(rising, decisive)*:
        *‘Marcus, get hold of Sallah. Tell him to meet you in Iskenderun.’*

        **BRODY** *(hesitant, concerned)*:
        *‘What about you?’*

        **INDY** *(firm, already moving)*:
        *‘I’m going after Dad.’*

        *(The line is a **narrative scalpel**—it severs Indy’s path from Brody’s, foreshadowing the **fragmented trust** that will define the second act. The Grail’s quest is no longer a shared academic pursuit; it is now a **personal crusade.**)
