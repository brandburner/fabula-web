      to move freely, while Vogel’s walking stick and leaflets turn the space into
      an interrogation room. The sunlight streaming through the windows creates a
      dramatic contrast, casting long shadows as the Zeppelin banks sharply back toward
      Germany. The compartment’s atmosphere is one of mounting dread, where every
      glance from a passenger or gesture from Vogel feels like a threat.'
