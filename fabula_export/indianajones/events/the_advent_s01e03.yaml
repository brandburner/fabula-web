  key_dialogue:
  - |-
    **Indy (to Vogel, after punching him):**
        *‘No ticket.’*
        *(Subtext: Indy’s violence is justified by the stakes, but the flippant delivery underscores his moral ambiguity—he’s not above brutality when cornered. The line also serves as dark humor, contrasting the gravity of the moment.)*
  - |-
    **Indy (to Henry, during their confrontation):**
        *‘We didn’t talk. We never talked.’*
        *(Subtext: Indy’s regret isn’t just about lost time—it’s about the emotional neglect that defined his childhood. The repetition of ‘talk’ frames their relationship as a failure of communication, not just distance.)*
  - |-
    **Henry (to Indy, deflecting blame):**
        *‘Actually, I was a wonderful father. When? Did I ever tell you to eat up? Go to bed? Wash your ears? No. I respected your privacy and I taught you self-reliance.’*
        *(Subtext: Henry’s justification reveals his emotional detachment. He equates absence with ‘respect,’ and ‘self-reliance’ with neglect. The list of mundane parental duties—‘eat up,’ ‘wash your ears’—highlights what Indy *didn’t* get: normalcy. His tone is defensive, but the subtext is guilt.)
