      are its visible representatives aboard the Zeppelin, the regime’s influence
      extends to every aspect of the scene: the leaflets with Henry’s photograph,
      the airplane attached to the Zeppelin, and the tarmac below. The regime’s power
      is institutional, relentless, and inescapable. Even after Vogel is ejected,
      the Zeppelin’s course reversal demonstrates that the Nazis’ control is absolute—the
      airship is not a neutral vessel but an extension of their authority. The regime’s
      presence is felt in the fear of the passengers, the tension in Indy’s actions,
      and the emotional detachment of Henry, who is more concerned with the Grail
      than the immediate threat.'
