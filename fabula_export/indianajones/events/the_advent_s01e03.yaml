    - Surveillance and intimidation (leaflets, Vogel’s walking stick, Gestapo presence)
    - Leveraging fear (passengers’ compliance, Indy’s desperation, Henry’s detachment)
    - Symbolic displays of power (the airplane attached to the Zeppelin, Vogel’s threats)
    institutional_impact: The Nazi Regime’s involvement in this event reinforces its
      role as an inescapable antagonist. The Zeppelin, which should be a symbol of
      freedom and escape, becomes a tool of the regime, turning the tables on Indy
      and Henry. The course reversal is a stark reminder that no matter how far they
      run, the Nazis’ power will always catch up to them. This event also highlights
