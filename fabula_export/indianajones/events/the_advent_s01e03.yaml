- fabula_uuid: cand_evt_scene_403191e854069dcb_01
  global_id: null
  title: 'The Sultan’s Obsession: A Car for the Grail (The Art of the Deal)'
  description: "\n  In a high-stakes negotiation that exposes the Sultan’s mercurial\
    \ priorities, Walter Donovan attempts to bribe the ruler of Iskenderun with a\
    \ trove of Nazi-looted treasures and Henry Jones Sr.’s Grail diary—only for the\
    \ Sultan to dismiss them with disdain. His attention is instead hijacked by the\
    \ sleek Nazi Rolls-Royce Phantom II, a symbol of modern power that eclipses ancient\
    \ relics in his eyes. Donovan, ever the opportunist, pivots instantly, trading\
    \ the car for the Sultan’s permission and resources to search for the Grail. The\
    \ exchange underscores the Sultan’s capricious nature (a man who values a machine\
    \ over history) and Donovan’s ruthless pragmatism (a man who will sacrifice anything—even\
    \ a priceless artifact—to secure his mission). Meanwhile, Kazim’s covert surveillance\
    \ and Elsa’s urgent arrival with news of Indy’s escape escalate the stakes, framing\
    \ this transaction as a critical turning point: the Nazis’ alliance with local\
    \ power is now formalized, and the race for the Grail has begun in earnest. The\
    \ scene’s dark humor—gold and silver ignored for a car—contrasts with the life-and-death\
    \ urgency of the Grail quest, reinforcing the story’s central tension: the past’s\
    \ sacred mysteries are being weaponized by those who see only their own desires\
    \ reflected in them.\n  "
  episode_uuid: ep_sea_ser_the_adventures_of_indiana_jone_s01_e03
  scene_sequence: 37
  sequence_in_scene: 89
  key_dialogue:
  - |-
    DONOVAN: *These pages are taken from Professor Jones' diary, Your Highness. And they include a map that pinpoints the exact location of the Grail.*

    SULTAN: *What have you brought?*

    VOGEL: *Bring den Schatz!*

    *(Nazi soldiers open a trunk filled with gold and silver. The Sultan walks past it, eyes locked on the Rolls-Royce.)*

    SULTAN: *Rolls-Royce Phantom Two. 4.3 litre, 30 horsepower, six cylinder engine, with Stromberg Downdraft carburetor. Can go from zero to 100 kilometres an hour in 12.5 seconds. And I even like the color.*
  - |-
    DONOVAN: *The keys are in the ignition, Your Highness.*

    SULTAN: *You shall have camels, horses, an armed escort, provisions, desert vehicles—and tanks!*

    DONOVAN: *You're welcome.*
  - 'ELSA: *We have no time to lose. Indiana Jones and his father have escaped.*'
