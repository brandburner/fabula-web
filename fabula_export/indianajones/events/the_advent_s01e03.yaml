      nightmare for Indy. Suspended above vats of alligators, crocodiles, giant lizards,
      and a massive anaconda, the narrow catwalk collapses under the combined weight
      of Indy, Halfbreed, and Rough Rider. The reptiles’ hissing and thrashing create
      a symphony of terror, forcing Indy to act quickly to avoid being engulfed. The
      location’s damp, musky air and the anaconda’s gaping maw turn the car into a
      primal gauntlet, testing Indy’s survival instincts and resourcefulness.
    observed_atmosphere: Damp, musky, and oppressive—filled with the sounds of slithering
      snakes, hissing reptiles, and the groans of the collapsing catwalk. The air
      is thick with the scent of swamp and decay, amplifying the primal terror of
      the space.
