  key_dialogue:
  - 'BRODY: *Your father and I have been friends since time began. I''ve watched you
    grow up, Indy. And I''ve watched the two of you grow apart. I''ve never seen you
    this concerned about him before.*'
  - 'INDY: *Do you believe, Marcus? ... Do you believe the Grail actually exists?*'
  - 'BRODY: *The search for the Cup of Christ is the search for the divine in all
    of us. ... But if you want facts, Indy, I have none to give you. At my age, I''m
    prepared to take a few things on faith.*'
  - 'INDY: *Call Donovan, Marcus. Tell him I''ll take that ticket to Venice now.*'
