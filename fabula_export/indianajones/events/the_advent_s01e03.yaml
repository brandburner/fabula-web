    observed_status: "\n        Indy enters the ransacked house with a mix of urgency\
      \ and dread, his calls for his father going unanswered. He physically reacts\
      \ to the chaos—pushing open curtains to reveal the destruction, then zeroing\
      \ in on the torn mail and the Venice-postmarked envelope. His discovery of the\
      \ *Grail Diary* is a visceral moment: he clutches it like a lifeline, flipping\
      \ through pages with a blend of awe and frustration. His dialogue reveals his\
      \ internal conflict: the diary forces him to confront his father’s obsession,\
      \ his own skepticism, and the fear that Henry’s life’s work might be ‘real.’\
      \ His question to Brody—*‘Do you believe the Grail actually exists?’*—is the\
      \ emotional climax, laying bare his vulnerability. By the end, his decision\
      \ to take Donovan’s ticket to Venice is not just pragmatic but symbolic: a surrender\
      \ to the quest, and to the idea that his father’s faith (and their relationship)\
      \ might be worth pursuing.\n      "
    beliefs:
    - That his father’s obsession with the Grail is a harmless academic pursuit (challenged
      by the ransacked house)
    - That the supernatural (like the Grail) is a myth, not a tangible force (shaken
      by the diary’s contents)
    - That his role is to be the ‘practical’ one, grounding his father’s fantasies
      (tested by Brody’s response)
    observed_traits:
    - Protective (of his father’s legacy)
    - Skeptical (of the supernatural)
    - Vulnerable (emotionally exposed)
    - Determined (to act despite uncertainty)
    - Introspective (questioning his own beliefs)
