  - object_uuid: object_d5d0272550dc
    description_of_involvement: The mounted machine gun is the catalyst for the biplane’s
      downfall. Henry, gripping its twin handles with perplexed hesitation, misinterprets
      Indy’s frantic directions as a time cue, leading to a wild burst of gunfire.
      His errant shots not only fail to hit the Messerschmitts but inadvertently sever
      the biplane’s tail stabilizer, dooming their escape. The gun’s recoil and the
      rat-a-tat-tat of its fire amplify the chaos, while its placement in the tail
      gunner’s seat forces Henry into a role he is utterly unprepared for. The machine
      gun, meant to be their defense, becomes the instrument of their defeat, a dark
      irony that underscores Henry’s scholarly ineptitude in the face of physical
      danger.
    status_before_event: Fully operational and loaded, mounted in the tail gunner’s
