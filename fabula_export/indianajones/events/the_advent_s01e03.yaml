  object_involvements:
  - object_uuid: object_74db66dbedac
    description_of_involvement: 'While Elsa’s ivory four-leaf clover cigarette lighter
      is not directly involved in this event, its earlier use in the catacombs (as
      a makeshift torch) foreshadows the role of fire as a tool and a threat in the
      Grail quest. The lighter’s absence here underscores the improvisational nature
      of Indy and Henry’s escape—Henry’s fumbling with Indy’s lighter, rather than
      Elsa’s, highlights their reliance on their own resources rather than external
      aid. The lighter’s symbolic connection to Elsa also adds a layer of irony: the
      fire that forces Indy and Henry together is ignited by their own actions, not
      by Elsa’s manipulation.'
    status_before_event: Not present in this scene, but its earlier use (in the catacombs)
      sets a precedent for fire as a dual-edged tool—both a means of illumination
      and a source of destruction.
    status_after_event: Still absent, but its symbolic resonance lingers. The fire
      in this scene, though unintentional, echoes the controlled flames Elsa used
      earlier, reinforcing the theme of fire as an inescapable force in their quest.
  - object_uuid: object_b2b5089ef1b2
    description_of_involvement: The back-to-back restraint chairs are the primary
      mechanism for Indy and Henry’s escape attempt. Bound tightly, they must coordinate
      their movements to rock the chairs across the floor, away from the spreading
      fire. The chairs’ design—sturdy but mobile—allows for this desperate maneuver,
      turning their restraint into a tool for survival. The chairs’ back-to-back configuration
      is a literal and metaphorical representation of their forced proximity, symbolizing
      the emotional alignment they’ve resisted for years. Their successful rocking
      of the chairs toward the door marks a turning point in their relationship, as
      physical collaboration becomes the foundation for their renewed bond.
    status_before_event: Two chairs lashed back-to-back, securing Indy and Henry in
      a seated position. The ropes are tight, but the chairs themselves are sturdy
      and capable of movement across the stone floor.
    status_after_event: The chairs remain intact but are now positioned near the door,
      having been rocked across the room by Indy and Henry. The ropes are still binding
      them, but their coordinated effort has created an opportunity for further escape
      attempts.
  - object_uuid: object_0cc4095cc01b
    description_of_involvement: The castle room rug is the catalyst for the fire that
      forces Indy and Henry into action. Henry, fumbling with Indy’s cigarette lighter,
      drops it onto the rug, igniting the flames. The rug’s quick combustion—due to
      its dry, ancient fibers—spreads the fire rapidly, creating an immediate, life-threatening
      situation. The rug’s role is both functional (as kindling) and symbolic, representing
      the unintended consequences of Indy and Henry’s desperation. Its destruction
      mirrors the burning away of their estrangement, forcing them into physical and
      emotional proximity.
    status_before_event: A thick, ancient rug covering the stone floor of the castle
      room, dry and highly flammable. Untouched and intact, contributing to the room’s
      oppressive atmosphere.
    status_after_event: Engulfed in flames, spreading rapidly across the floor. The
      rug’s destruction becomes a metaphor for the irreversible escalation of the
      conflict, both physical and emotional, between Indy and Henry.
  - object_uuid: object_93f573dadfe2
    description_of_involvement: The heavy floor-length drapes in the castle room contribute
      to the oppressive, suffocating atmosphere of the scene. While not directly involved
      in the fire’s ignition, they symbolize the darkness and secrecy of the Nazis’
      operations. Their presence reinforces the claustrophobic tension of the room,
