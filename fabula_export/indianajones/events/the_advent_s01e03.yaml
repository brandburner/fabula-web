  - organization_uuid: organization_969a73c6cc14
    description_of_involvement: "\n        The *Nazi Regime* is the unseen but omnipresent\
      \ force behind the ransacking of Henry’s home. While not directly represented\
      \ in this scene, its influence is palpable: the torn mail, the overturned furniture,\
      \ and the missing *Grail Diary* all point to a systematic search by Nazi agents.\
      \ The organization’s goal—to secure the Grail for its promise of immortality—is\
      \ implied through the violence of the intrusion. The ransacked house serves\
      \ as a warning of the Nazis’ reach and ruthlessness, propelling Indy toward\
      \ action. The scene’s tension stems from the knowledge that this is not a random\
      \ break-in but a targeted assault by a global power.\n      "
    active_representation: "\n        Through the *physical traces of their actions*\
      \ (ransacked home, torn mail, implied theft of the diary). The Nazis are represented\
