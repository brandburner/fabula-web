  object_involvements:
  - object_uuid: object_93dad403e7b5
    description_of_involvement: "\n        **Henry Jones Sr.’s Grail Diary** is the\
      \ catalyst for the confrontation in this scene. Donovan flips through its pages,\
      \ revealing the jagged tears where Indy removed the map to the **Canyon of the\
      \ Crescent Moon**. Elsa’s examination of the diary confirms the missing pages,\
      \ leading to her deduction that Brody now possesses them. The diary’s physical\
      \ state—torn and incomplete—symbolizes the fractured trust between Indy, Henry,\
      \ and their allies, as well as the desperation driving the Grail quest. Its\
      \ presence in Donovan’s hands underscores the Nazis’ obsession with the Grail\
      \ and their willingness to exploit any advantage, no matter how morally reprehensible.\n\
      \      "
    status_before_event: "\n        Intact but with pages torn out by Indy, hidden\
      \ in the castle before being retrieved by the Nazis. The diary is in Donovan’s\
      \ possession, having been taken from Henry’s research.\n      "
    status_after_event: "\n        Remains in Donovan’s hands, but its damaged state—now\
      \ publicly exposed—becomes a point of contention. The missing pages are the\
      \ focus of the Nazis’ immediate hunt, as they seek to recover them from Brody.\n\
      \      "
  - object_uuid: object_b31aed7204dc
    description_of_involvement: "\n        The **Missing Grail Diary Pages (Canyon\
      \ of the Crescent Moon Map)** are the invisible but all-consuming focus of this\
      \ scene. Though physically absent, their presence is felt through Elsa’s deduction\
      \ and Donovan’s fury. Indy’s bluff about Brody’s possession of the pages elevates\
      \ their importance, framing them as the key to the Grail’s location and the\
      \ Nazis’ ultimate goal. The pages represent not just a map, but a **symbol of\
      \ hope and desperation**: hope for Indy and Henry to outmaneuver the Nazis,\
      \ and desperation for Donovan and Elsa to recover them at any cost. Their absence\
      \ drives the entire confrontation, as the characters’ dialogue revolves around\
      \ their whereabouts and the implications of their loss.\n      "
    status_before_event: "\n        Torn out by Indy and passed to Brody, now in his\
      \ possession as he flees the Nazis. Their location is unknown to Donovan and\
      \ Elsa, though Indy’s bluff suggests Brody is already far ahead.\n      "
    status_after_event: "\n        The pages remain with Brody, but their existence\
      \ is now confirmed by Elsa’s deduction. Donovan’s vow to hunt Brody down ensures\
      \ that the pages—and Brody’s survival—are now the primary targets of the Nazis’\
      \ pursuit.\n      "
  - object_uuid: object_f6a948ad337f
    description_of_involvement: "\n        **Donovan’s High-Backed Chair** serves\
      \ as a dramatic prop, concealing Donovan’s identity until he rises to reveal\
      \ himself. The chair’s tall back and strategic placement facing the fireplace\
      \ create a moment of theatrical reveal, heightening the tension as Indy and\
      \ Henry realize the true nature of Donovan’s betrayal. The chair symbolizes\
      \ Donovan’s **hidden power and authority**, as well as the **illusion of safety**\
      \ that Indy and Henry initially feel upon entering the room. Once Donovan stands,\
      \ the chair becomes a relic of the deception, its emptiness a reminder of the\
      \ shifting alliances in the Grail quest.\n      "
    status_before_event: "\n        Occupied by Donovan, its high back concealing\
      \ him from Indy and Henry as they enter. The chair is positioned facing the\
      \ fireplace, its opulence reflecting Donovan’s status as a wealthy collaborator.\n\
      \      "
    status_after_event: "\n        Empty, as Donovan rises to confront Indy and Henry.\
      \ The chair’s symbolic role as a hiding place is now exposed, and it becomes\
      \ a silent witness to the betrayal and the escalating conflict.\n      "
  - object_uuid: object_58ebc43d2486
    description_of_involvement: The **fireplace** in the Baronial Room is more than
      a source of light—it is a metaphor for the escalating conflict and the heat
      of the confrontation. Its dancing firelight casts ominous shadows, mirroring
