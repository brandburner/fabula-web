  - object_uuid: object_fffb4f35631a
    description_of_involvement: The two Messerschmitt fighter bombers are the relentless
      antagonists of this sequence, their sleek forms streaking out of the clouds
      to ambush the biplane. Their speed and firepower force Indy into a desperate
      defensive maneuver, while their presence amplifies the high-stakes tension of
