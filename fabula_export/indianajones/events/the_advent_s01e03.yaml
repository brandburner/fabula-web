      weapons and fire at Indy and Henry, the guns represent the brutal efficiency
      of the Nazi machine. However, their use backfires when Indy’s trap forces the
      radiomen into the burning room, rendering the revolvers useless against the
      flames. The guns’ involvement is a reminder of the Nazis’ reliance on force—and
      their inability to adapt when faced with Indy’s unconventional tactics. The
      revolvers’ failure to save the radiomen is a narrative commentary on the limits
      of brute power.
