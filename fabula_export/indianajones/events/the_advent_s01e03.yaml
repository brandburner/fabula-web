- fabula_uuid: cand_evt_scene_403191e854069dcb_02
  global_id: null
  title: 'The Sultan’s Bargain: A Rolls-Royce for the Grail – And the Nazis’ Growing
    Shadow'
  description: "\n  In a courtyard of the Sultan’s palace, Walter Donovan and Colonel\
    \ Vogel attempt to secure the Sultan’s permission—and resources—to search for\
    \ the Holy Grail. Donovan presents the Grail Diary pages as proof of the Grail’s\
    \ proximity, while Vogel parades a trunk of stolen Nazi-looted treasures as a\
    \ bribe. Yet the Sultan, a man of unexpected priorities, dismisses the artifacts\
    \ entirely, his attention instead captured by the sleek Rolls-Royce Phantom II\
    \ parked nearby. His obsession with the car—its speed, its color, its mechanical\
    \ precision—becomes the true currency of the exchange. In a moment of dark irony,\
    \ Donovan concedes, offering the keys to the Rolls in exchange for the Sultan’s\
    \ armed escort, camels, and tanks. Meanwhile, Kazim, a spy for the Brotherhood\
    \ of the Cruciform Sword, watches from the shadows, his presence a silent warning\
    \ of the growing Nazi threat. The scene’s tension escalates as Elsa Schneider\
    \ arrives with urgent news: Indiana Jones and his father have escaped, forcing\
    \ Donovan and Vogel to accelerate their quest. The exchange underscores the Nazis’\
    \ ruthless pragmatism—they will trade anything, even a priceless car, to secure\
    \ the Grail—and the Sultan’s indifference to the sacred, revealing how easily\
    \ power and greed can corrupt even the most mundane transactions. This moment\
    \ is a turning point: the race for the Grail is no longer just a scholarly pursuit\
    \ but a desperate, high-stakes conflict where time, resources, and lives are at\
    \ risk.\n  "
  episode_uuid: ep_sea_ser_the_adventures_of_indiana_jone_s01_e03
