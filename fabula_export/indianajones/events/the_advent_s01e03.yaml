    description_of_involvement: The Nazi regime’s influence is omnipresent in this
      event, even in its absence. The fire, ignited by Indy and Henry’s desperation,
      is a direct consequence of the Nazis’ brutal tactics—Vogel’s punch, Elsa’s betrayal,
      and Donovan’s collaboration all set the stage for this moment. The room itself
