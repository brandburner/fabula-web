- fabula_uuid: cand_evt_scene_822338420b3ceb55_03
  global_id: null
  title: 'The Grail’s Final Test: Wisdom Over Greed'
  description: "\n  In the shadowed heart of a hidden mosque, Indiana Jones and Walter\
    \ Donovan stand before the Grail Knight, the ancient guardian of the Holy Grail.\
    \ The Knight, clad in tattered robes and wielding a staff, presents them with\
    \ a choice: two goblets—one ornate and jeweled, the other plain and unassuming.\
    \ Donovan, consumed by greed and the promise of eternal life, seizes the jeweled\
    \ cup without hesitation. The moment his lips touch the rim, his body disintegrates\
    \ into dust, his hubris exposed as the ultimate sin. Indy, guided by his father’s\
    \ teachings and his own scholarly humility, selects the carpenter’s cup—the true\
    \ Grail. The Knight’s eyes gleam with approval as he declares Indy worthy, his\
    \ choice proving that wisdom and reverence, not power or avarice, are the keys\
    \ to the Grail’s power. The moment is both a triumph and a warning: the Grail’s\
    \ divine judgment is absolute, and only the pure of heart may wield it. This climactic\
    \ test cements Indy’s moral fiber and sets the stage for his final confrontation\
    \ with the Nazis, as well as his emotional reckoning with his father.\n  "
