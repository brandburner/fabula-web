      \ them in their panic, a detail that reinforces Indy’s tactical superiority.\
      \ Their failure to hit Indy or Henry is a narrative beat: the Joneses’ survival\
      \ hinges on the Nazis’ overconfidence in their systems (like the rotating wall)\
      \ over adaptability.\n      "
