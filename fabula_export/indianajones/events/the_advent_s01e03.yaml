      \ orders and the soldiers' disciplined obedience highlight the regime's control\
      \ and the urgency of their mission.\n      "
    active_representation: "\n        Through Colonel Vogel's strategic leadership\
      \ and the disciplined action of the Nazi Expeditionary Forces. The organization\
      \ is also represented by the industrialized infrastructure of the underground\
      \ harbor, a tangible manifestation of its power and resources.\n      "
    power_dynamics: "\n        The Nazi regime exerts overwhelming power in this event,\
      \ using its military might, strategic planning, and industrial resources to\
      \ pursue Indy and Henry. The Joneses are outnumbered and outgunned, forced to\
      \ rely on their wits and improvisation to escape. The power dynamic is one of\
      \ relentless pursuit and desperate evasion, with the Nazis holding the upper\
      \ hand in terms of resources and manpower.\n      "
    organizational_goals:
