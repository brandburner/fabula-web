- fabula_uuid: act_cdd3da62501f2092
  number: 2
  summary: 'Following Kazim''s revelation, Indy sends Marcus Brody to Iskenderun with
    the Grail Diary''s map, while he heads to Castle Brunwald in Austria to rescue
    his father. Indy and Elsa infiltrate the formidable Nazi-occupied castle under
    false pretenses. Inside, Indy discovers his father imprisoned and learns a shocking
    truth: Elsa Schneider is a Nazi collaborator, and Walter Donovan is also working
    with the Nazis, driven by his desire for eternal life rather than academic preservation.
    A tense reunion between Indy and Henry Sr. highlights their strained relationship,
    marked by Henry''s single-minded obsession with the Grail and his disapproval
    of Indy''s methods. After a chaotic escape from the burning castle, during which
    Indy uses a machine gun to dispatch Nazi soldiers and Henry reveals his disdain
    for Indy''s "Junior" nickname, they find themselves pursued by German forces.
    They narrowly escape a biplane attack and a Messerschmidt fighter bomber in a
    stolen car, with Henry Sr. comically (and effectively) using a flock of seagulls
    to down the second plane. They then learn that Brody has been captured in Iskenderun,
    along with the crucial map pages from the Grail Diary. Indy and Henry, now reunited
    with Sallah, embark on a desperate mission to rescue Brody and retrieve the map.
    This leads to a spectacular tank chase through the desert canyon. During the intense
    battle, Henry Sr. is nearly killed, falling from the tank''s treads, prompting
    Indy to risk his life to save him. This harrowing experience forces a rare moment
    of genuine emotional connection and reconciliation between father and son, as
    Henry embraces Indy, expressing profound relief and affection. The act concludes
    with their escape from the tank, which plunges over a cliff, and the four heroes
    standing together, ready for the final leg of their quest, their relationships
    profoundly altered.'
