  key_dialogue:
  - |-
    INDY: Dad! *(bursting into the study, breathless)*
         HENRY: Out! *(without looking up)*
         INDY: It's important!
         HENRY: Then wait—count to twenty. *(holds up a finger)*
         INDY: *(switching to Greek, exasperated)* One... two... three... four...
  - |-
    FEDORA: *(to Indy, after the Cross is stolen, placing the fedora on Indy’s head)*
         You lost today, kid, but that doesn’t mean you have to like it.
  - |-
    SHERIFF: *(to Indy, revealing his betrayal)*
         The rightful owner of this Cross won’t press charges... if you give it back. *(hands the Cross to Fedora, who then lets Roscoe take it.)
