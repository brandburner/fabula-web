    description_of_involvement: 'The Nazi regime is not directly present in this event,
      but its shadow looms over the entire sequence. The Cross of Coronado is a relic
      tied to the broader Nazi obsession with occult artifacts, and Fedora''s gang—while
      not explicitly Nazi—operates in a world where such artifacts are highly sought
      after by the regime. Indy''s determination to protect the Cross for a museum
      (rather than let it fall into the hands of thieves like Fedora) aligns with
      his broader mission to keep such artifacts out of Nazi hands. The event is a
      microcosm of the larger conflict: Indy as the protector of history, Fedora''s
      gang as opportunistic thieves, and the Nazis as the ultimate antagonists waiting
      in the wings.'
    active_representation: Through the implied stakes of the Cross of Coronado (a
      relic that the Nazis would seek to exploit for their occult goals).
    power_dynamics: Indirect but influential. The Nazis are not physically present,
      but their desire for the Cross drives the urgency of Indy's mission. Fedora's
      gang, while not Nazi, operates in a world where such artifacts are valuable
      precisely because of the Nazis' interest.
    organizational_goals:
    - To acquire occult artifacts (like the Cross of Coronado) for their supernatural
      and propagandistic purposes.
    - To eliminate or co-opt individuals (like Indy) who stand in the way of their
      goals.
    influence_mechanisms:
    - Creating a climate of fear and urgency around artifacts like the Cross, making
      them highly sought after by groups like Fedora's gang.
    - Exerting indirect pressure through the black market and networks of thieves
      who know the Nazis will pay top dollar for such relics.
    - Shaping the broader narrative of the story, where Indy's mission is not just
      personal but part of a larger fight against fascism.
    institutional_impact: The Nazis' influence is felt in the high stakes of the Cross's
      possession. Indy's refusal to hand it over to Fedora is not just about personal
      principle—it's about denying the Nazis another tool for their dark ambitions.
    internal_dynamics: The Nazis' internal factions (e.g., the Sinister Man, Gobler,
      Belzig) would likely compete for control of an artifact like the Cross, but
      this is not directly relevant to this event. Their broader institutional goals,
      however, are a constant threat.
