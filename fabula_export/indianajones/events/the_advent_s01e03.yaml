  global_id: null
  title: '**"The Cross of Coronado: Indy’s First Stand Against Plunder (1912)"**'
  description: "\n  In the shadowy, spider-webbed kivas of a pueblo, young Indiana\
    \ Jones (12 years old) witnesses a group of ruthless treasure hunters—led by the\
    \ enigmatic **Fedora Man**—looting the sacred **Cross of Coronado**, a priceless\
    \ 16th-century artifact stolen from its rightful place in history. While his cowardly\
    \ friend Herman panics over a harmless snake, Indy’s moral compass ignites: *‘That\
    \ Cross is an important artifact. It belongs in a museum.’* Seizing the moment,\
    \ he dispatches Herman to fetch reinforcements (Havelock and the sheriff) before\
    \ executing a reckless but determined heist of his own. As the robbers dig frantically,\
    \ Indy snatches the Cross, tucks it into his pants, and attempts a stealthy escape\
    \ up a rope—only for his clumsiness (breaking a beam) to trigger a violent chase.\
    \ The scene crystallizes Indy’s **core conflict**: his adventurous spirit clashes\
    \ with his burgeoning sense of responsibility to protect history from exploitation.\
    \ Fedora’s calm, almost amused pursuit foreshadows their future dynamic—a moral\
    \ foil who respects Indy’s audacity even as he embodies the very plunder Indy\
    \ despises. This moment isn’t just a heist gone wrong; it’s the **inciting incident**\
    \ of Indy’s lifelong crusade against artifact thieves, planting the seed for his\
    \ future battles with Nazis, grave robbers, and his own father’s obsession with\
    \ the Grail.\n  "
