  key_dialogue:
  - |-
    INDY: ((quietly to Henry)) She ransacked her own room and I fell for it. How did you know she was a Nazi?
    HENRY: She talks in her sleep.
    INDY: ...
    HENRY: I didn’t trust her. *Why did you?*
  - |-
    DONOVAN: ((suddenly erupting)) Doctor Schneider. There’re pages torn out of this!
    ELSA: This book contained a map—a map with no names—precise directions from the unknown city to the secret Canyon of the Crescent Moon.
    INDY: So it did.
    DONOVAN: Where are these missing pages? *This map we must have these pages back.*
    HENRY: ((pained)) Marcus?! You didn’t drag poor Marcus along, did he? He’s not up to the challenge.
  - |-
    INDY: The hell you will. He’s got a two-day head-start on you, which is more than he needs. Brody’s got friends in every town and village from here to the Sudan. He speaks a dozen languages, knows every local custom. He’ll blend in. Disappear. You’ll never see him again. *With any luck, he’s got the Grail already.*
    HENRY: ((amazed)) ...
