- fabula_uuid: act_4ca1fcc5c10ff44c
  number: 3
  summary: 'Indy, Henry, Sallah, and Brody arrive at the Canyon of the Crescent Moon,
    discovering Donovan and the Nazis already present at the hidden temple entrance.
    Donovan, impatient and ruthless, forces the issue by shooting Henry Sr., gravely
    wounding him. He declares that only the Grail''s healing power can save Henry,
    compelling Indy to face the deadly trials. Indy, guided by his father''s diary,
    courageously navigates the three booby-trapped challenges: first, kneeling to
    avoid a razor-sharp pendulum ("The Breath of God"); second, carefully stepping
    on stones spelling "Jehovah" (using the Latin "I" for "J") across a crumbling
    path ("The Word of God"); and third, taking a "leap of faith" across a seemingly
    impassable chasm, revealing a camouflaged bridge ("The Path of God"). Upon reaching
    the inner sanctum, Indy encounters the ancient Grail Knight, the last guardian,
    who has waited 700 years. The Knight explains the rules: "Choose wisely, for as
    the True Grail will bring you life, the False Grail will take it from you." Donovan,
    eager for immortality, ignores the Knight''s warning and, at Elsa''s suggestion,
    chooses an ornate, jeweled goblet. He drinks from it, rapidly aging and disintegrating
    into dust, a horrifying demonstration of choosing "poorly." Indy, understanding
    the Grail''s true nature, selects a simple, earthenware cup—"the cup of a carpenter."
    He drinks from it, and his minor wounds heal, confirming it as the true Grail.
    He then uses its water to heal his father, saving Henry Sr.''s life and further
    solidifying their bond. However, Elsa, consumed by greed, attempts to carry the
    Grail beyond the Great Seal, violating the Knight''s final warning. The temple
    begins to collapse around her. As she clings precariously to the edge of an abyss,
    reaching for the Grail, Indy tries to save her. Henry Sr., witnessing Indy''s
    struggle, commands him, "Indiana... let it go." Indy, choosing his father over
    the artifact, releases the Grail and is pulled to safety. The Grail and Elsa are
    lost to the abyss, and the temple crumbles. The four heroes—Indy, Henry, Sallah,
    and Brody—escape the collapsing temple, their journey culminating in a ride into
    the sunset. Indy and Henry''s relationship is fully reconciled, marked by mutual
    respect and affection, as they finally acknowledge their shared identity and experiences,
    even if one of them is named after a dog.'
