- fabula_uuid: cand_evt_scene_1f8525710fdc1b46_01
  global_id: null
  title: 'The Cross of Coronado: Indy’s First Moral Stand Against Looting'
  description: "\n  In the claustrophobic darkness of a hidden pueblo passageway,\
    \ young Indiana Jones and his reluctant companion Herman stumble upon a gang of\
    \ looters—led by the enigmatic Fedora—who have just unearthed the legendary **Cross\
    \ of Coronado** from a sacred Kiva chamber. The moment Indy recognizes the artifact,\
    \ his moral compass ignites: he declares it belongs in a museum, not in the hands\
    \ of thieves, foreshadowing his lifelong conflict with exploitation of history.\
    \ His decisive action—stealing the Cross back and sending Herman for reinforcements—marks\
    \ the birth of his role as a guardian of artifacts, while Fedora’s measured pursuit\
    \ hints at a future rivalry. The scene crackles with tension: Indy’s reckless\
    \ bravery (climbing a rope while pursued) contrasts with Herman’s paralyzed fear,\
    \ and the looters’ greed underscores the stakes of Indy’s mission. This confrontation\
    \ isn’t just about a stolen relic; it’s Indy’s first defiance of those who treat\
    \ history as a commodity, a theme that will echo through his battles with Nazis\
    \ and his estranged father’s scholarly integrity.\n  "
  episode_uuid: ep_sea_ser_the_adventures_of_indiana_jone_s01_e03
  scene_sequence: 2
  sequence_in_scene: 3
