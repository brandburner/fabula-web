  object_involvements:
  - object_uuid: object_93dad403e7b5
    description_of_involvement: 'Henry’s Grail Diary is mentioned but not physically
      present during this event. However, its absence looms large in the father-son
      argument. When Henry opens the Diary to read the Grail’s challenges, it becomes
      a symbol of his emotional detachment—he prioritizes ancient riddles over his
      son’s pain. The Diary’s role here is thematic: it represents the obsession that
      has driven a wedge between Indy and Henry. While the object itself is not interacted
      with in this scene, its influence is palpable, shaping Henry’s responses and
      Indy’s frustrations. The Diary is the reason they’re on this quest, and its
      presence (even off-screen) underscores the cost of Henry’s priorities.'
    status_before_event: Carried by Henry in his satchel. It is not opened until the
      argument, when he uses it to deflect Indy’s emotional complaints.
    status_after_event: Closed and set aside after Henry reads the Grail’s challenges.
      It remains a point of contention, symbolizing the unresolved tension between
      father and son.
  - object_uuid: object_d03e544f9f29
    description_of_involvement: The leaflets bearing Henry’s photograph are distributed
      by plainclothes agents at the Berlin airfield and used by Vogel to interrogate
      passengers aboard the Zeppelin. They serve as a visual tool of identification,
      turning the airship’s compartment into a hunting ground. The leaflets symbolize
      the inescapable reach of the Nazi regime—Henry’s face is everywhere, making
      concealment nearly impossible. When Vogel shows the leaflet to passengers, it
      creates a palpable sense of dread, as even innocent bystanders are complicit
      in the search. The leaflets’ role is purely functional, but their narrative
      impact lies in how they amplify the tension and urgency of the pursuit.
    status_before_event: Clutched in Vogel’s hand as he boards the Zeppelin. He unfolds
      one to show passengers, using it to demand information about Henry’s whereabouts.
    status_after_event: Scattered on the floor of the Zeppelin after Vogel is ejected.
      Some may remain in passengers’ hands, but their purpose is fulfilled—they’ve
      served to heighten the stakes of the confrontation.
  - object_uuid: object_770985fe0283
    description_of_involvement: 'The bowl of nuts sits untouched on the table between
      Indy and Henry, a mundane detail that contrasts sharply with the life-or-death
      tension of the scene. It serves as a symbolic reminder of the ordinary world
      the two men are fleeing—luxury travel, casual comforts, and the illusion of
      safety. The nuts remain ignored throughout the confrontation, from Vogel’s interrogation
      to Indy’s ejection of him, and even during the father-son argument. Their presence
      underscores the absurdity of the situation: here they are, discussing ancient
      Crusader trials and decades of emotional neglect, while a bowl of snacks goes
      uneaten. The nuts are a silent witness to the collision of the mundane and the
      extraordinary.'
    status_before_event: Placed on the table by the steward, full of mixed nuts. It
      sits between Indy and Henry, untouched as they settle into their seats.
    status_after_event: Still untouched and forgotten on the table after the Zeppelin
      turns back toward Germany. The nuts have become a metaphor for the unresolved
      tension between Indy and Henry—something that should have been shared but was
      left untended.
  - object_uuid: object_5de31bb829b7
    description_of_involvement: Colonel Vogel’s walking stick is a tool of intimidation
      and control, used to lower passengers’ newspapers and punctuate his demands.
      He grips it firmly, jabbing it toward Henry and Indy to assert dominance. The
      stick symbolizes the Nazi regime’s authoritarianism—it is an extension of Vogel’s
      power, used to cow civilians and enforce compliance. When Indy violently ejects
      Vogel, the stick clatters to the floor of the Zeppelin, abandoned in the chaos.
      Its presence underscores the physical threat Vogel poses, but its loss during
      the ejection marks a momentary reversal of power.
    status_before_event: Clutched in Vogel’s hand as he boards the Zeppelin. He uses
      it to tap passengers’ shoulders and lower newspapers, reinforcing his authority.
    status_after_event: Dropped and forgotten on the Zeppelin’s floor after Vogel
      is ejected. It lies abandoned, a symbol of his defeated power.
