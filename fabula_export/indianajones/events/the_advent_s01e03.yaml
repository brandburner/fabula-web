    - Shattered vase fragments scattered across the floor, symbolizing the broken
      trust between father and son
    - The acrid scent of gunpowder and the sight of the slain Nazis, underscoring
      the violence of the confrontation
    - The thunderous crash of Indy’s entry, disguised by a clap of thunder, adding
