      reach extends far beyond one man. The tarmac is a liminal space, neither fully
      safe nor fully threatening, but a reminder of the larger forces at play.'
    observed_atmosphere: A stark, wind-swept expanse under daylight, where the roar
      of the Zeppelin’s engines drowns out Vogel’s shouts. The tarmac is a place of
