  sequence_in_scene: 85
  key_dialogue:
  - 'GRAIL KNIGHT: (voice echoing) *Choose... but choose wisely.*'
  - 'DONOVAN: (smirking, reaching for the jeweled goblet) *This one. It’s clearly
    the Grail of legend.*'
  - 'GRAIL KNIGHT: (solemn) *Then drink, and know the truth.* (Donovan’s body crumbles
    to dust.)'
  - 'GRAIL KNIGHT: (to Indy, nodding) *You have seen the folly of greed. Now, choose.*'
  - 'INDY: (picking the plain cup) *This one. It’s... unassuming. Like the man it
    belonged to.*'
  - 'GRAIL KNIGHT: (smiling faintly) *Wisdom is its own reward, Indiana Jones. The
    Grail is yours.*'
