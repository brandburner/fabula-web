    INDY: *What?!*
  - |-
    ELSA: *Indy, please! Do what he says!*
    HENRY: *And don’t listen to her!*
    VOGEL: *Enough! She dies!*
  - |-
    ELSA: *I'm sorry.*
    INDY: *No, don’t be.*
    ELSA: *But you should have listened to your father.*
