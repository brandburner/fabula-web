      culverts, and open desert floor—creates a claustrophobic, high-stakes environment
      where every movement is visible and every explosion echoes. The valley’s terrain
      forces the Nazis and Brethren into close quarters, escalating the chaos and
      giving Indy opportunities to exploit the tank’s limitations. The dust kicked
      up by the tank’s treads and the smoke from explosions obscure vision, adding
      to the disorienting atmosphere. The valley’s role in the event is both practical
      (limiting escape routes) and symbolic (a crucible for the clash between brute
      force and ingenuity).
