      Portuguese sailors, his arms pinned behind his back as he’s punched in the face.
      He breaks free using the sailors as leverage to kick open a fuel drum clamp,
      then engages in a brutal fistfight across the storm-lashed deck. Indy reclaims
      the Cross of Coronado but is knocked down by a wave; he uses a crowbar to fend
      off attackers, swings across the deck via a stevedore’s hook, and leaps into
      the ocean as the ship explodes, emerging with the Cross still in hand and a
      life preserver marking the *Vazquez de Coronado*’s fate.
    observed_status: Indiana Jones is ambushed by the Man in the Panama Hat and two
      Portuguese sailors, his arms pinned behind his back as he’s punched in the face.
      He breaks free using the sailors as leverage to kick open a fuel drum clamp,
      then engages in a brutal fistfight across the storm-lashed deck. Indy reclaims
