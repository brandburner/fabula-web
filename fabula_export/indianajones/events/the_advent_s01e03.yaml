  organization_involvements:
  - organization_uuid: organization_969a73c6cc14
    description_of_involvement: "\n        The Nazi regime is represented through\
      \ Colonel Vogel and the Nazi Expeditionary Forces, who pursue Indy and Henry\
      \ with ruthless efficiency. The organization's presence in the underground harbor\
      \ exposes the vast resources and strategic planning behind their quest for the\
      \ Grail. The harbor itself is a manifestation of the regime's industrialized\
