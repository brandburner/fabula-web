  object_involvements:
  - object_uuid: object_b08960fbc4e5
    description_of_involvement: The Cross of Coronado is the central artifact of this
      event, symbolizing the conflict between historical preservation and greed. Unearthed
      by Roscoe from a wooden box in the Kiva chamber, the Cross is a 16th-century
      gold artifact given to Coronado by Cortes in 1521. Its discovery ignites the
      looters' excitement, as they see it as a ticket to wealth. Fedora appraises
      it with a mix of reverence and calculation, while Indy recognizes its historical
      significance and declares it belongs in a museum. The Cross becomes the catalyst
      for Indy's theft and the subsequent chase, embodying the themes of exploitation
      versus protection that define his character arc.
    status_before_event: Buried in a wooden box within the Kiva chamber, undiscovered
      and untouched for centuries. Its historical and cultural value is unknown to
      the looters until Roscoe uncovers it.
    status_after_event: Stolen by Indy and hidden in his pants as he climbs the rope
      to escape. Its possession shifts from the looters to Indy, setting the stage
      for future conflicts over its ownership and significance.
  - object_uuid: object_905362892194
    description_of_involvement: The wooden box serves as the temporary container for
      the Cross of Coronado, unearthed by Roscoe from the Kiva chamber. It is placed
      on a rock beside a kerosene lantern, where Fedora opens it to reveal the artifact.
      The box is a neutral vessel, its significance lying in what it holds rather
      than its own properties. Once the Cross is removed, the box is abandoned, its
      role in the event complete.
    status_before_event: Buried alongside the Cross of Coronado in the Kiva chamber,
      its contents unknown until Roscoe digs it up.
    status_after_event: Left empty on the rock beside the lantern after the Cross
      is removed. It is no longer relevant to the action once the artifact is stolen
      by Indy.
  - object_uuid: object_cfe80c9e586b
    description_of_involvement: The kerosene lanterns provide the only source of light
      in the dark Kiva chamber, casting flickering shadows that heighten the tension
      of the scene. Placed on rocks beside the unearthed box, their glow illuminates
      the Cross of Coronado as Fedora appraises it. The lanterns create an eerie,
      almost sacred atmosphere, contrasting with the looters' greedy excitement. Their
      light is crucial for Indy to see the artifact and recognize its significance,
      as well as for the looters to spot him when he breaks the wooden beam during
      his escape.
    status_before_event: Positioned on rocks within the Kiva chamber, providing dim
      but essential illumination for the looters' excavation.
    status_after_event: Remain in the chamber, their light still flickering as the
      looters pursue Indy. Their role in the event is passive but critical, as they
      enable the visibility of key actions and objects.
  - object_uuid: object_2fb89161793e
    description_of_involvement: The rope hanging in the narrow passageway serves as
      Indy's escape route after he steals the Cross of Coronado. He climbs hand-over-hand,
      his feet breaking a wooden beam and alerting the looters to his theft. The rope
      is taut and stable, allowing Indy to ascend quickly, though the noise of the
      breaking beam betrays his position. Its presence is crucial to Indy's plan,
      providing a means to evade the looters and continue his mission to protect the
      artifact.
    status_before_event: Hanging in the narrow passageway, unused and unnoticed until
      Indy seizes it as an escape route.
    status_after_event: Left dangling in the passageway after Indy's ascent, its role
      in the event complete. The looters may use it later to pursue him, but its primary
      function is fulfilled in facilitating Indy's escape.
  - object_uuid: object_2f9240a78522
    description_of_involvement: The **Pueblo Passageway Climbing Rope** is Indy’s
      lifeline and the key to his escape. Hanging taut in the narrow passageway, it
      allows him to climb hand-over-hand away from the looters’ pursuit. The rope’s
      stability contrasts with the chaos of the chase, symbolizing Indy’s resourcefulness
      and the thin margin between success and failure. When his feet break a wooden
      beam during his ascent, the sound alerts the looters, adding urgency to his
      escape. The rope is not just a physical object but a metaphor for Indy’s determination
      to rise above the looters’ greed and protect the cross.
    status_before_event: Hanging securely in the narrow pueblo passageway, unused
      and unnoticed until Indy seizes it as his means of escape. Its position is strategic,
      offering a clear path to the surface.
    status_after_event: Left dangling in the passageway, now a silent witness to the
      looters’ failed pursuit. Its role in the event is complete, but it may serve
      as a reminder of Indy’s cunning in future scenes.
  - object_uuid: object_25a8ee1e009f
    description_of_involvement: The wooden beam in the narrow passageway plays a pivotal
