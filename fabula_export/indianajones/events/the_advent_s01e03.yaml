  key_dialogue:
  - 'INDY: ((wryly)) Ah, Venice!'
  - 'INDY: Are you crazy?! You don''t go between them!'
  - 'ELSA: Go between them? Are you crazy?!'
  - 'INDY: I said don''t go between them!'
  - 'INDY: Why are you trying to kill us?'
  - 'KAZIM: Because you''re looking for the Holy Grail.'
  - 'INDY: My father was looking for the Holy Grail. Did you kill him too?'
  - 'KAZIM: No.'
  - 'INDY: Where is he? Talk -- or you''re dead. Damn it, tell me! Tell me!'
  - 'KAZIM: If you don''t let go, Doctor Jones, we''ll both die.'
  - 'INDY: Then we''ll die.'
  - 'KAZIM: My soul is prepared. How''s yours?'
  - 'KAZIM: The secret of the Grail has been safe for a thousand years. And for all
    that time the Brotherhood of the Cruciform Sword has been prepared to do anything
    to keep it safe.'
  - 'KAZIM: Ask yourself, why do you seek the Cup of Christ? Is it for His glory,
    or for yours?'
  - 'INDY: I didn''t come for the Cup of Christ. I came to find my father.'
  - 'KAZIM: In that case, God be with you in your quest. Your father is being held
    in the Castle of Brunwald on the Austrian-German border.'
