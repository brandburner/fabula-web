  - object_uuid: object_58ebc43d2486
    description_of_involvement: The rotating wall mechanism is the linchpin of the
      escape sequence, functioning like a lazy susan that shuttles Indy and Henry
      between the burning castle room and the Nazi radio room. Indy accidentally triggers
      it by kicking the fireplace grill, and the mechanism becomes a critical tool
      for evading the Nazis. Later, Indy jams the mechanism with a bust of Hitler,
      trapping the radiomen in the burning room and halting their pursuit. The mechanism’s
      grinding stone movement heightens the tension and chaos of the escape, serving
      as both a physical obstacle and a narrative device that propels the action forward.
