      running.
    - Settling dust clouds adding to the tense, suspended atmosphere.
  - location_uuid: location_7876c7bb1077
    description_of_involvement: The road station guardhouse is a brief but critical
      location in the chase sequence. It serves as a checkpoint for the Nazis, manned
      by the Guard who attempts to halt Indy and Henry. The guardhouse’s squat, utilitarian
