- fabula_uuid: organization_536ee8d95f4d
  global_id: null
  canonical_name: Benedict Canyon Police Department
  description: |-
    The local police force in Benedict Canyon, led by Lieutenant Elliott, Detective Benoit Blanc, and Trooper Wagner, investigating Harlan Thrombey's murder. Officers engage in high-speed pursuits, arrests, evidence collection, and witness protection during volatile family confrontations. Their actions reveal procedural rigor but also class biases (e.g., dismissing Marta Cabrera as 'the help'). Key roles include:
      - **Lieutenant Elliott**: Directs investigations, coordinates family containment, enforces investigative protocols, and orders the Thrombey family to remain in town.
      - **Detective Benoit Blanc**: Leads evidence collection, interrogations, and witness protection (e.g., escorting Marta Cabrera and shielding her from physical threats).
      - **Trooper Wagner**: Observes confrontations and provides silent but authoritative presence.
      The department operates across multiple locations (Thrombey estate, streets, police station) and collaborates with external investigators (e.g., Blanc’s partnership with the family’s legal team). Their combined presence curbs family chaos while overseeing the murder investigation.
  sphere_of_influence: Local Homicide Investigation and Suspect Apprehension
