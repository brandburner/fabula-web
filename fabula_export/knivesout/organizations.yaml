  canonical_name: The Flock (Wicks’s Inner Circle / Radicalized Online Following)
  description: The Flock, also referred to as Wicks’s Inner Circle or (later) a radicalized
    online community, functions as the core congregation of the church under Monsignor
    Jefferson Wicks. Initially a tightly-knit group receiving book club reading lists
    and moral lessons, the Flock evolves into a politically mobilized following after
    Cy Draven’s manipulation. Key members include Martha Delacroix, Jud, Grace Wicks,
    Doctor Nat Sharp, Lee Ross, Vera Draven, Simone Vivane, and Cy Draven. The group’s
    blind loyalty to Wicks fractures due to internal scandals (e.g., Grace’s pregnancy,
    Vera’s revelation about Wicks being Cy’s father, Nat’s alcoholism, Lee’s failed
    book, Simone’s weak faith) and later transforms into a radicalized base supporting
    Wicks’s presidential ambitions. The Flock embodies the church’s hypocrisy, judgmental
    tone, and communal enforcement of ethical standards, serving as both the audience
    for moral lessons and the subject of Wicks’s and Cy’s manipulative control.
  sphere_of_influence: Church Congregation and Moral Instruction
- fabula_uuid: organization_49c73339569b
  global_id: null
  canonical_name: Thrombey Family
  description: |-
    The Thrombey Family (also referred to as the 'Thrombey Clan') is a wealthy, dysfunctional extended family centered around patriarch Harlan Thrombey. Key members include Linda, Walt, Richard, Joni, Donna, Ransom, Meg, and Jacob. The family is characterized by:
      1. **Wealth Dependency**: Their collective identity revolves around Harlan's fortune, which they aggressively seek to reclaim after his death.
      2. **Xenophobic Behavior**: Multiple members (notably Richard Drysdale and Donna) engage in targeted anti-immigrant rhetoric, particularly against Marta Cabrera, an outsider named as Harlan's sole heir.
      3. **Collective Outrage**: The family unites in hostility toward Marta, accusing her of manipulation and exploiting her mother's undocumented status to pressure her into renouncing the inheritance.
      4. **Internal Divisions**: Despite their united front against Marta, the family fractures under exposed hypocrisies, resentments, and legal leverage, revealing deep-seated privilege clashes and internal power struggles.
      5. **Narrative Role**: Their actions drive the central tensions of the investigation, prioritizing the reclamation of wealth over truth and serving as a microcosm of systemic prejudice and familial dysfunction.
  sphere_of_influence: Familial Wealth Preservation and Inheritance Conflicts
