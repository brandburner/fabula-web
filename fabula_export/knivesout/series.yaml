    - fabula_uuid: ep_sea_ser_knivesout_s01_e01
      episode_number: 1
      title: Knives Out
      logline: When renowned crime novelist Harlan Thrombey is found dead after his
        85th birthday, a master detective arrives to investigate, uncovering a web
        of family secrets, hidden motives, and unexpected twists among the eccentric
        Thrombey clan.
      high_level_summary: |-
        After the death of wealthy mystery novelist Harlan Thrombey, Detective Benoit Blanc is mysteriously hired to investigate. Harlan's dysfunctional family, gathered for his 85th birthday, becomes the prime suspects. Among them are Harlan's children – Linda, a successful businesswoman, Walt, who manages Harlan's publishing empire, and Joni, a lifestyle guru and widow. Also present are their respective families, including Linda's son Ransom, Walt's wife and son, and Joni's daughter Meg.

        The night of the party, Marta Cabrera, Harlan's kind-hearted nurse, administers his medication. However, she mistakenly injects him with a lethal dose of morphine instead of his usual medication. Unable to find the antidote and knowing the paramedics wouldn't arrive in time, Harlan instructs Marta on an elaborate plan to establish her alibi, ensuring she won't be suspected of his murder and protecting her undocumented mother from deportation.

        As Blanc investigates, he uncovers a series of secrets and lies within the Thrombey family. Richard is revealed to be having an affair, Joni is stealing money from Harlan, and Walt is desperate to secure film rights for Harlan's books. Ransom, the black sheep of the family, was cut out of Harlan's will. The family's dynamics become increasingly volatile, and their desperation to inherit Harlan's fortune intensifies. Blanc focuses on Marta, noticing her tells when she lies.

        Fran, the housekeeper, discovers Ransom tampering with Marta's medical bag on the night of Harlan's death. She sends blackmail notes to Ransom, threatening to expose him with evidence from her medical examiner cousin. Ransom, in turn, brutally murders Fran to protect his secrets. Marta receives the email, and in an effort to protect herself, she races to the location in the email. There she finds Fran, dying, after being attacked by Ransom.

        Ultimately, Blanc exposes Ransom and his attempts to frame Marta for Harlan's death. At the climax, Ransom attempts to kill Marta with a prop knife, but she is unharmed. Marta then vomits on Ransom and is thus revealed to be a liar because she asserted that Fran was still alive. However, both his plot and the confession are overheard by police, which confirms Ransom’s guilt - and also Marta’s innocence in both deaths. After much back and forth, the case is resolved, and Marta inherits Harlan's fortune. She watches with compassion from the balcony of the house now hers as the police take Ransom away The film concludes with Marta standing on the balcony of the Thrombey estate holding Harlan's coffee mug surveying her new kingdom. This position implies that Marta truly won Harlan's game and is the rightful heir to his legacy.
      dominant_tone: Cynical
