    - fabula_uuid: ep_sea_ser_knivesout_s01_e03
      episode_number: 3
      title: WAKE UP DEAD MAN
      logline: When a priest is framed for the murder of a polarizing Monsignor, he
        enlists the help of famed detective Benoit Blanc to unearth a conspiracy involving
        a hidden fortune, a dark secret, and a flock of wicked wolves.
      high_level_summary: "Father Jud Duplenticy, a former boxer with a troubled past,\
        \ is sent to a small parish in Chimney Rock to assist the controversial Monsignor\
        \ Jefferson Wicks. Jud quickly finds himself at odds with Wicks's fiery sermons\
        \ and manipulative methods, as Wicks attacks newcomers and drives people away,\
        \ testing the tolerances and hardening his core followers by complicity. Jud\
        \ attempts to offer balance, starting a prayer group, but fails when the flock\
        \ sides with Wicks. \n\nDuring Holy Week, the tension escalates. After Wicks\
        \ punches Jud in the stomach, Jud prepares to fight back, but Wicks is always\
        \ one step ahead. On Good Friday, Wicks is found dead in the church storage\
        \ closet, a devil head knife in his back. Jud, who argued with Wicks, had\
        \ possession of the murder weapon, and was alone with Wicks before his death,\
        \ becomes the prime suspect. Desperate to clear his name, Jud seeks the help\
        \ of renowned detective Benoit Blanc, who arrives to solve the impossible\
        \ locked-room mystery and quickly determines he is dealing with the theatrical.\n\
        \nBlanc begins investigating the members of Wicks's inner circle of congregants:\
        \ Vera Draven, a lawyer, and her adopted son Cy; Doctor Nat Sharp, reeling\
        \ from his wife leaving him; Lee Ross, a washed-up science fiction author,\
        \ and Simone Vivane, a new-age cellist seeking healing. Blanc employs his\
        \ deductive methods, examining the crime scene, murder weapon, and interviewing\
        \ the suspects. He learns that Wicks planned to close the church and had tormented\
        \ each member of his flock, creating multiple motives for murder. The investigation\
        \ takes a turn towards the bizarre when the townspeople claim Wicks is risen.\n\
        \      \nAs the investigation continues, Jud is shown in flashbacks to have\
        \ had his own secret: spiking Wicks's flask with tranquilizers. When the flask\
        \ goes missing, and Blanc declares that he can't solve the case, Jud tries\
        \ to confess being party to the events that led to Wicks's death. However,\
        \ in a surprise turnaround, Blanc reveals that there was a partner to the\
        \ events that took his life. He identifies Dr Nat as the killer of the late\
        \ Monsignor. Before the police can make the arrest, Dr Nat goes into hiding\
        \ and it is revealed a second body has surfaced. Now the chase focuses on\
        \ Dr Nat when it becomes apparent another member of the inner flock has helped\
        \ him with the events that took place.\n\nAs it turns out it was Martha! Marth\
        \ explains that she wanted to use Dr Nat to kill Wick and make it seem there\
        \ was a message sent from Satan himself. Wick's would remain in history the\
        \ holy priest that was sent to die by the hands of the wicked but she never\
        \ accounted for all the events. After helping in the murder of Week's, Dr\
        \ Nat went on to take the jewelry the Priest kept on himself for 80 years\
        \ and he was discovered. A conflict ensues and ultimately Wick's ends up poisoning\
        \ and killing Dr Nat. As Martha explains that her plan had gone sour, she\
        \ kills her self explaining her sins to father jud in her dying breath. \n\
        \nThe case concludes with Jud absolving Martha as she dies. Jud becomes the\
        \ new priest in town, but struggles with the weight of the events and his\
        \ own past. Later, a new couple enters Our Lady of Perpetual Grace and Father\
        \ Jud welcomes them in."
