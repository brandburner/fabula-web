- fabula_uuid: ser_knivesout
  title: Knives Out
  description: When a celebrated mystery novelist is found dead at his own birthday
    party, **Benoit Blanc**, a brilliant but unconventional detective, is called in
    to unravel the truth behind the murder. The Thrombey family—each with their own
    secrets, grudges, and motives—becomes the prime suspect, but nothing is as it
    seems in this sharp, witty whodunit. With razor-sharp dialogue, eccentric characters,
    and a labyrinth of lies, *Knives Out* blends dark humor and suspense into a high-stakes
    puzzle where every clue could be a red herring. As **Benoit** digs deeper, he
    uncovers a web of betrayal, hidden fortunes, and family dysfunction, forcing him
    to question who among the Thrombeys is truly innocent—and whether justice can
    ever be served in a world of knives, secrets, and deadly games.
