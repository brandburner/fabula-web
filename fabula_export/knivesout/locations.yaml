  canonical_name: Sanctuary Storage Closet (Church)
  description: |-
    A small, concrete storage closet adjacent to the church sanctuary, serving as a private space for Wicks's post-homily recovery rituals and a key location in the investigation of his murder. The confined space contains a closed steel breaker box on the wall and is described as chilly and isolated. Key narrative events include:
          - Wicks collapsing here after ingesting drugged contents
          - Jud discovering his corpse
          - Nat stabbing Wicks amid the clutter
          - The space also contains blood-soaked vestments, a devil-head figurine, and a missing flask stashed in the breaker box
          - Investigators (Blanc, Geraldine, and Jud) probe the breaker panel and back wall for hidden mechanisms
          - Jud hides Wicks's flask behind the door
          - The confined walls amplify the horror and chaos of the events unfolding within it, including flashbacks and desperate searches
          The closet's secrecy and tension make it central to both the murder and its investigation, with its confined space serving as a microcosm of the church's hidden corruption.
  location_type: Church Storage Closet
