    to send him back up. The next morning, amid family fractures in the living room,
    Ransom slips into the kitchen and grabs pinwheel cookies, his brief absence amplifying
    his disruptive presence before he returns. Adjacent to stairs and living room,
    this stocked domestic space pulls characters for impulsive grabs during tense
    household moments.
