  canonical_name: Thrombey Estate Front Porch
  description: Walt and Jacob sit side by side on the Thrombey Estate Front Porch
    under night-party shadows, eyes tracking Marta's car as it pulls away at midnight.
    Walt checks his watch, locking their alibi for Harlan's murder window. The wooden
    structure overlooks the drive, party noise fading into tense silence where family
    suspicion sharpens and timelines anchor the investigation. Cool air carries distant
    laughter, heightening their detached watchfulness.
