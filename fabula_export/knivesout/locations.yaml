    threshold. The diversion clears the way for Nat to stab Monsignor Wicks undetected
    inside, the ajar door framing faint light and shadows amid clutter. Concrete walls
    echo the outburst, blending sacred stillness with abrupt chaos and enabling the
    conspiracy's lethal pivot. Tension grips the adjoining area as footsteps likely
    stir toward the sound, leaving the killer brief seconds of cover.
