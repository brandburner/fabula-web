  canonical_name: Thrombey Estate Trellis (Third-Floor Window Access)
  description: Wooden lattice structure clinging to the Thrombey Estate manor wall,
    serving as the primary covert access point to the boarded third-floor window.
    The trellis offers shaky handholds and footrungs, enabling clandestine climbs
    (e.g., Marta Cabrera's nighttime ascent during Harlan Thrombey's murder investigation).
    Wanetta Thrombey's parking-lot testimony initially implicates Ransom Drysdale
    here, though Marta later corrects the record by revealing her own climb. Physical
    evidence includes mud-slicked base, barking dogs, and broken slats from repeated
    use under cover of darkness. The structure's instability (buckling under weight)
    and strategic location make it both a path to hidden rooms and a critical alibi-shattering
    element in the investigation.
  location_type: Manor Wall Trellis
  parent_location_uuid: location_00563caeee7f
