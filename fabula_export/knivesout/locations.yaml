  canonical_name: Thrombey Estate Front Drive (Private Road Access)
  description: The wide paved drive leading to the Thrombey manor, also referred to
    as the private road to the estate. This location serves as the primary vehicular
    access point where Marta's modest car arrives under police scrutiny, Wagner's
    prowler arrives amid the estate's grandeur, and family cars cluster during chaotic
    moments. Key events include Marta's stalled vehicle being mobbed by the family,
    Ransom's Porsche arrival for their escape, and later police cruisers/ambulance
    activity during Ransom's arrest. The road's seclusion and contrast between Marta's
    modest vehicle and the Thrombeys' luxury rides create tension, symbolizing privilege
    vs. intrusion. This location is also where Linda steps aside to reveal Harlan's
    hidden message via cigarette flame.
  location_type: Private Estate Driveway
