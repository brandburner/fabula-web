    There’s G-O-D in DOGE, Racism Doesn’t Exist in God’s Kingdom (USA)—unfold before
    him, twisting Monsignor Wicks’ sermons into extremist propaganda. The private
    space sharpens his dismay and moral turmoil as betrayal sinks in, loyalty to Wicks
    clashing against Cy’s manipulation in this secluded clerical retreat.
