  canonical_name: Third-Floor Landing (Exterior Platform)
  description: "\n      The **Third-Floor Landing** of the Thrombey Estate is a **dual-purpose\
    \ space** serving as both an *interior hallway* (outside Harlan's attic office)\
    \ and an *exterior platform* (where Marta stands alone after his murder). Key\
    \ features:\n      1. **Interior Function**: A narrow hallway outside Harlan Thrombey's\
    \ attic office door, marking the threshold between public and private zones. It\
    \ contains a hidden door behind a painting leading to Harlan's bedroom. Joni pauses\
    \ here before knocking, and Marta traverses it to reach the secret door (preparing\
    \ a hidden needle nearby).\n      2. **Exterior Function**: An exposed platform\
    \ where Marta stands alone after Harlan's murder, her isolation amplified by the\
    \ open air. She steels her posture here before descending the stairs with hardened\
    \ purpose.\n      **Narrative Role**: This landing is a *liminal space* tying\
    \ Harlan's secrets (interior) to Marta's emotional arc (exterior). It appears\
    \ in flashbacks and the party, heightening tension as a threshold where family\
    \ members skirt Harlan's concealed world.\n      "
  location_type: Mansion Landing
