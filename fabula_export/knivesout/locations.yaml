  canonical_name: Forest Near Church Graveyard (Woods Adjacent to Church Grounds)
  description: |-
    Dense trees bordering the church grounds and graveyard, providing cover for clandestine activities and concealment of objects (e.g., coffin assembly in Samson's cottage garage). The forest serves as a liminal space where characters transition between secrecy and exposure—Nat Sharp emerges disguised as Samson Holt from its rainy shadows at night, while Samson patrols its fringes during disturbances. The woods' seclusion amplifies tension, deception, and the plot's mounting suspense, particularly during stormy conditions and moments of violence (e.g., shattered church windows, confrontations). Key functions include:
          - **Cover for hidden activities**: Conceals Samson's cottage, garage, and coffin assembly from distant observers (e.g., Jud).
          - **Transition zone**: Characters move between the forest, graveyard, and church grounds, often under cover of darkness or rain.
          - **Witness to key events**: Hosts patrols, disturbances (e.g., lantern-snapping crashes), and interactions with authorities or other characters (e.g., Sam, Benoit Blanc).
          The forest's atmospheric qualities—darkness, rain, and dense foliage—enhance its role as a crucible for secrecy and violence.
  location_type: Secluded Woodland Edge
  parent_location_uuid: null
