    guidance.
  location_type: Private Estate Pedestrian Gate
  parent_location_uuid: location_d1d01c4003e6
- fabula_uuid: location_574647797481
  global_id: null
  canonical_name: Thrombey Estate Side Porch
  description: Elevated wooden porch adjacent to the Thrombey Estate's side yard,
    serving as a vantage point for tense standoffs (e.g., Greatnana vs. Blanc) and
    covert actions (e.g., Marta kicking a trellis fragment beneath bushes). The porch
    is characterized by wooden railings, muddy ground, and proximity to the side yard
    where Blanc stands below. It is also the site of a nighttime encounter between
    Marta and Blanc, where cigar smoke curls into the cool darkness, intensifying
    their intimate tension. Key features include its role in amplifying isolation
    amid unraveling alibis and hidden tracks, as well as its use in high-stakes confrontations
    (e.g., Blanc's calculated questions press Marta into reluctant alliance).
  location_type: Manor House Side Porch
  parent_location_uuid: location_d1d01c4003e6
- fabula_uuid: location_d433aba0d27d
  global_id: null
  canonical_name: Thrombey Estate Trellis (Third-Floor Window Access)
  description: Wooden lattice structure clinging to the Thrombey Estate manor wall,
    serving as the primary covert access point to the boarded third-floor window.
    The trellis offers shaky handholds and footrungs, enabling clandestine climbs
    (e.g., Marta Cabrera's nighttime ascent during Harlan Thrombey's murder investigation).
    Wanetta Thrombey's parking-lot testimony initially implicates Ransom Drysdale
    here, though Marta later corrects the record by revealing her own climb. Physical
    evidence includes mud-slicked base, barking dogs, and broken slats from repeated
    use under cover of darkness. The structure's instability (buckling under weight)
    and strategic location make it both a path to hidden rooms and a critical alibi-shattering
    element in the investigation.
  location_type: Manor Wall Trellis
  parent_location_uuid: location_00563caeee7f
- fabula_uuid: location_d1d262d4243d
