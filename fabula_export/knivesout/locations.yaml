  canonical_name: Thrombey Estate Foyer Stairs
  description: |-
    The central staircase of the Thrombey Estate, connecting the foyer (ground level) to upper floors, including the third-floor landing. This staircase serves as a critical passage for dramatic confrontations and character movements, including:
          - **Linda Thrombey Drysdale** descending to corner **Joni** in the foyer, using her elevated position to assert dominance.
          - **Marta Cabrera** descending from the third-floor landing on the night of Harlan's murder, her bloodstained sneaker marking the treads as she moves from the murder site toward the lower levels.
          - **Benoit Blanc, Marta Cabrera, and Ransom Drysdale Thrombey** climbing from the living room, their deliberate steps drawing attention from **Elliott, Wagner, and Ransom** below.
          The staircase amplifies tension, scrutiny, and maneuvering, channeling the mansion's social and narrative conflicts through its vertical passage. Its design—overlooking the foyer and adjoining the living room—turns height into a subtle but powerful dynamic tool.
