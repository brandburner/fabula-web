- fabula_uuid: location_d1d01c4003e6
  global_id: null
  canonical_name: Thrombey Estate Manor House
  description: The Thrombey Estate Manor House, a decaying New England manor, serves
    as the primary setting for the Thrombey family's dysfunction and secrets. Its
    crumbling grandeur—marked by overgrown gardens, peeling paint, and oppressive
    silence—contrasts with the vibrant yet sinister gatherings it hosts, such as Harlan
    Thrombey's 85th birthday party. The estate's architecture includes distinct interior
    spaces like the **Living Room** (central to family gatherings) and **Upstairs**
    (bedrooms and halls where family members retreat late at night, e.g., Meg's arrival
    at 12:30 AM). Exterior features like the trellis and covert entry points facilitate
    both celebration and clandestine activity, while the **stairs** connecting these
    spaces (e.g., Harlan's frail climb) underscore the manor's role as a microcosm
    of the family's hidden tensions and the detective's investigation into Harlan's
    death.
  location_type: New England Manor House
  parent_location_uuid: null
- fabula_uuid: location_78d8c04b9a1e
  global_id: null
  canonical_name: Thrombey Estate Patio
  description: |-
    Outdoor patio adjacent to the Thrombey estate's foyer, accessible through glass doors that carry muffled voices and cigar smoke from inside. This space serves as a neutral yet exposed arena for high-stakes confrontations, where Blanc interrogates Marta, triggering her vomiting tell and exposing family lies about affairs, allowances, and firings. The patio blends privacy for deductions with public exposure, marking Marta's transition from outsider to investigation insider under Blanc's scrutiny. Key events include:
      - Marta's interrogation and subsequent retreat indoors due to nausea.
      - Blanc, Lieutenant Elliott, and Trooper Wagner debating suicide rulings, alibis, and back staircases.
      - The space's transformation into a neutral arena for theory clashes and evidence scrutiny, fracturing family deceptions.
  location_type: Private Estate Patio
  parent_location_uuid: location_d1d01c4003e6
- fabula_uuid: location_7a05d8d399c1
  global_id: null
  canonical_name: Thrombey Estate Second-Floor Landing
  description: 'The dimly lit Second-Floor Landing of the Thrombey Estate, a narrow
    wooden platform overlooking the stairwell, where the creaking floorboards and
    thick air bear witness to pivotal moments in Harlan''s final hours. This threshold
    between the family''s public spaces and Harlan''s private quarters becomes a charged
    space during the party''s aftermath: Marta guides frail Harlan up the stairs to
    his third-floor bedroom, her hands steady on his arm during the fatal medication
    handoff, while Richard, Linda, and Joni drift off to their rooms without a glance.
    Later, Joni charges up these same stairs in urgent pursuit to check Harlan''s
    condition after his death, her footsteps echoing in the emotionally charged air.
    The worn wood groans faintly—a sound Lieutenant Elliott later recalls—as this
    passage transforms from a routine family route into a symbolic and literal threshold
    between life and death, routine and murder.'
  location_type: Mansion Stair Landing
  parent_location_uuid: location_d1d01c4003e6
