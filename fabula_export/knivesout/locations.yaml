  canonical_name: Rectory - Jud's Bedroom
  description: Jud's private bedroom in the rectory, a space of both refuge and tension.
    The room is sparsely furnished, with a nightstand holding a copy of the *Catholic
    Chronicle* (symbolizing Jud's isolation under institutional scrutiny). Daylight
    streams through the window overlooking church grounds, where Jud observes Samson's
    predatory behavior toward Martha Delacroix, fueling his suspicion of hypocrisy
    within the church hierarchy. Later, the room becomes a site of violation when
    Jud returns to find his drawers ransacked and his hidden flask stolen, shattering
    his sense of security. Blanc confronts him here about the conspiracy, and the
    space grows heavy with distrust as Blanc reviews a murder video on Jud's iPad.
    The room serves as a microcosm of Jud's outsider perspective and the festering
    corruption he uncovers.
