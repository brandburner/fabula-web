  canonical_name: Thrombey Estate Lawn
  description: Outdoor lawn area flanking the primary Thrombey residence, used as
    a setting for early dialogue and investigation in Episode 1 ('Knives Out'). Serves
    as a neutral ground for Blanc, Elliott, and Wagner to discuss the suicide narrative,
    distinct from the Thrombey mansion's interior.
