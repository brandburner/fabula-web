  canonical_name: Miles Bron Compound Courtyard
  description: The expansive courtyard at the heart of Miles Bron's private villa
    compound, where guests first gather after entering the estate. This open-air space
    serves as the symbolic and functional centerpiece of the compound, featuring tiered
    landings leading to a broad courtyard framed by the towering glass orb villa.
    The courtyard is the setting for Miles Bron's introductory speech on the compound's
    life-phase symbolism, the distribution of chakra-based room assignments via glowing
    wristbands, and the dismissal of staff for a 'creative commune.' The space is
    characterized by its blend of Mediterranean villa elegance and Bond villain lair
    extravagance, with ritualistic chimes (likely Philip Glass-inspired), robot dogs
    hauling luggage, and a pool area. Key narrative moments include skepticism from
    Blanc, tension hinted at by Andi's silence, and the exchange of glances between
    guests, all under the open Mediterranean sky. The courtyard is surrounded by chakra-named
    villas and other compound amenities, making it the primary gathering and ceremonial
    space for the weekend's events.
  location_type: Luxury Compound Courtyard
  parent_location_uuid: null
