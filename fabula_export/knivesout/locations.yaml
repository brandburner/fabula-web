  canonical_name: Thrombey Estate Grounds
  description: "\n        The **Thrombey Estate Grounds** encompass the overgrown\
    \ natural and semi-natural spaces surrounding the Thrombey Manor, including:\n\
    \        - **Wooded areas**: Tangled underbrush, Harlan Thrombey's *Menagerie\
    \ Tragedy* statues, and paths snagging at investigators' feet. This space serves\
    \ as a liminal zone for the murder probe, where Marta pockets fridge magnets,\
    \ passes a VHS tape to Wagner, and the 'whimsy of art sharpens the murder probe's\
    \ edge.' **Dark woods at night** (as described in the target) are a subset of\
    \ these wooded areas, where Marta follows Harlan's garbled instructions, and shadows\
    \ deepen the flashback's tension.\n        - **Lawns**: Moonlit expanses where\
    \ Marta races at night (avoiding Greatnana's gaze) and the family gathers in daylight,\
    \ their collective suspicion transforming the open stretch into an 'exposed arena\
    \ of accusation.'\n        - **Peripheral paths**: Used for covert movements (e.g.,\
    \ Marta's exit toward the side gate under Harlan's posthumous guidance).\n\n \
    \       The grounds function as a **symbolic and investigative backdrop**, contrasting\
    \ the manor's architectural decay with the wild, untamed nature of the Thrombey\
    \ family's secrets. Shadows deepen isolation, and the estate's art (e.g., statues)\
    \ mirrors the intellectual haze clashing with police scrutiny.\n      "
