- fabula_uuid: location_153a63eea05d
  global_id: null
  canonical_name: Yacht Lower Deck
  description: Daylit lower deck of the yacht slicing through open sea exposes Andi
    Cabrera to relentless horizon and spray. She stands alone at the rail, figure
    dwarfed by waves, as Blanc and Lionel observe from the upper deck above. Salt
    air carries isolation's sting; her position below them sharpens group tensions
    and past conflicts with Miles, turning the deck into a stage of quiet defiance
    amid the voyage to his island.
  location_type: Superyacht Lower Deck
