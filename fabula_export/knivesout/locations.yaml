  location_type: Private Estate Gardens
  parent_location_uuid: null
- fabula_uuid: location_83be6ecac51c
  global_id: null
  canonical_name: Glass Onion (Mansion and Exterior Grounds)
  description: "\n      The **central complex and exterior grounds** of the Glass\
    \ Onion, a towering mansion on Miles Bron's private island. The **mansion** serves\
    \ as the primary gathering place for Bron's guests, featuring **towering architecture,\
    \ lavish art installations, and high-security features**, while the **exterior\
    \ grounds** are an open space where violent events (sniper attacks, Helen's sprint,\
    \ staged death) unfold. Key themes include **isolation, danger, and improvised\
    \ ruses**, with the mansion's grandeur reflecting Bron's dominance and control.\
    \ The structure emerges as the group's destination after their beach arrival,\
    \ drawing them from the open shoreline to an enclosed space of luxury and tension.\n\
    \n      **Mansion Features**:\n      - Towering architecture, lavish art installations,\
    \ high-security features.\n      - Site of Bron's declaration: 'the reclamation\
    \ of everything I’ve ever accomplished.'\n      - Interior gatherings (e.g., power\
    \ dynamics among guests: Birdie, Claire, Duke, Whiskey, Lionel, Blanc, Andi).\n\
    \n      **Exterior Grounds Features**:\n      - Pitch-black windows that loom\
    \ ominously during tense confrontations.\n      - Moonlit open spaces where sniper\
    \ bullets shatter glass (killing Andi, wounding Helen).\n      - Helen sprints\
    \ across these grounds toward the glowing mansion during her frantic escape.\n\
    \      - Blanc and Helen stage Helen's death with hot sauce amid echoing gunshots.\n\
    \n      **Narrative Role**: The mansion and its exterior grounds serve as the\
    \ **focal point for Helen's mission**, amplifying themes of **isolation, danger,\
    \ and improvised ruses**.\n      "
  location_type: Private Island Mansion Grounds
  parent_location_uuid: null
- fabula_uuid: location_05e22d31941b
  global_id: null
  canonical_name: Glass Onion Complex Interior Hallway
  description: Miles Bron strides through this narrow hallway just inside the Glass
    Onion complex doors, his path blocked momentarily by a gun lying on the floor.
    The space connects the building's interior to the exterior grounds where Andi’s
    body sprawls on the steps. Tension grips the air as Miles pauses, eyes flicking
    to the weapon, before pushing outward to confront Blanc. Hard floor echoes his
    steps; dim light casts long shadows, amplifying the shift from sheltered opulence
    to exposed chaos after the murder reveal.
  location_type: Compound Entry Hallway
  parent_location_uuid: location_e2906275a863
- fabula_uuid: location_57202d86dbdc
  global_id: null
  canonical_name: Glass Onion Complex Overlook Windows
  description: Modern overlook windows in the Glass Onion complex, part of a larger
    location, where guests witness Andi Brand's murder. Serves as a dramatic vantage
    point for the murder investigation, not the original bar.
  location_type: Complex Overlook Windows
  parent_location_uuid: location_e2906275a863
- fabula_uuid: location_2577423f2ce1
  global_id: null
  canonical_name: Glass Onion Compound Atrium/Lounge Area
  description: |-
    Central social hub of the Glass Onion Compound, featuring an open-plan atrium/lounge area where Miles Bron's guests gather for drinks, conversations, and escalating tensions. The space is characterized by its open design (sofas, coffee tables, bar cart), which fosters both intimacy and vulnerability among the guests. Key narrative moments include:
          1. Miles's unraveling paranoia (shouts, silenced phone, physical confrontation) culminating in the 10 PM blackout
          2. Duke's convulsive episode during a toast
          3. Blanc's investigative pacing and revelations
          4. Helen's rampage where she torches Miles's possessions, sparking a fire
          The power failure at 10 PM plunges the area into darkness, stripping illusions of safety and forcing reliance on voices and physical movements amid murder fears. The space serves as both a gathering point and a pressure cooker for the compound's mysteries.
  location_type: Private Island Complex Atrium
  parent_location_uuid: null
- fabula_uuid: location_d774dbd9d36a
  global_id: null
  canonical_name: Glass Onion Island (The Glass Onion)
  description: |-
    A private island estate and opulent mansion complex known as **Glass Onion Island** (also referred to as **The Glass Onion**), owned by Miles Bron. The location is a self-sustaining, high-security enclave powered entirely by KLEAR, where Miles hosts exclusive gatherings for elite guests. The estate features:
      - **Architectural grandeur**: Towering structures, lavish art installations (e.g., the *Mona Lisa* in the atrium), and high-security design elements, including the **grand staircase leading to the glass orb**—a central feature of the compound.
      - **Guest villas**: Individual luxury villas that erupt in bursts of fire and flying debris during the KLEAR-fueled finale explosion, symbolizing the engineered fragility of Miles' empire.
      - **Technological control**: All systems (lights, heaters, coolers, fax machines) operate on KLEAR without backup, symbolizing Miles' dominance and the fragility of his empire.
      - **Narrative function**: A stage for unveilings, power displays, and psychological tension. The opulence and isolation amplify Miles' control over his guests, blending luxury with dread. The estate’s dual identity—**Glass Onion Island** (its formal, systemic name) and **The Glass Onion** (its colloquial, personal moniker)—reflects its role as both a physical space and a metaphor for Miles' ego and vulnerabilities.
  location_type: Private Island Estate
  parent_location_uuid: null
- fabula_uuid: location_3aae70c16871
  global_id: null
  canonical_name: Glass Onion Island Infrastructure
  description: Vents, ducts, heating systems, and appliances weave through Glass Onion
    Island's compound, all reliant on volatile Klear for power. Fire from the lounge
    races through these hidden networks, metal warping under intense heat as flames
    leap between conduits. Smoke chokes the air, sparks shower down, and distant explosions
    rumble, collapsing the island's engineered backbone into chaos and stranding guests
    amid systemic failure.
  location_type: Island Utility Infrastructure
  parent_location_uuid: null
- fabula_uuid: location_db4ea2e35254
  global_id: null
  canonical_name: Greatnana's Room
  description: Blanc enters this dimly lit room to find Greatnana seated near an open
    window where sheer curtains shift in the breeze. The space holds a quiet intimacy
    that heightens the psychological tension of his interrogation disguised as condolences.
    Harlan's elderly, possibly senile mother reacts with subtle eye movements and
    silences amid the charged atmosphere, her fragmented awareness poised to reveal
    key details about the night of Harlan's death.
  location_type: Private Mansion Bedroom
  parent_location_uuid: null
- fabula_uuid: location_9dcd9e499b2a
  global_id: null
  canonical_name: Grecian Port Town
  description: "\n      A *picturesque Grecian coastal town* characterized by hills\
    \ dotted with rustic homes rising behind a charming harbor. The town features:\n\
    \      1. A **prominent hotel on the water's edge** and a **long jetty extending\
    \ into the sea**, serving as a gathering point for key characters (Benoit Blanc,\
    \ Lionel Toussaint, Claire Debella, and Birdie Jay) before their departure to\
    \ Miles Bron’s island.\n      2. **Narrow coastal streets** that snake through\
    \ the town, where Duke Cody and Whiskey arrive on a motorcycle, firing a pearl-handled\
    \ pistol into the sky. The tight lanes amplify the noise and spectacle, disrupting\
    \ the town's midday calm.\n      3. A **distant explosion** (described as a 'deep,\
    \ guttural boom like a gunshot') that draws attention toward the town, signaling\
    \ imminent danger and foreshadowing escalating threats across the island. The\
    \ explosion's impact is felt both visually and narratively, injecting urgency\
    \ into the scene.\n\n      The town's idyllic appearance contrasts with the disruption\
    \ caused by the explosion and Duke Cody's brash entrance, highlighting its role\
    \ as a *microcosm of tension* before the characters' departure.\n      "
  location_type: Grecian Coastal Port Town
  parent_location_uuid: null
- fabula_uuid: location_99c27d1ea9c0
  global_id: null
  canonical_name: Greek Mainland Jetty (Departure Point)
  description: Coastal location in mainland Greece where Miles Bron's guests gather
    at a seaside jetty before boarding a boat to his private island. Serves as the
    departure point for the boat trip and is where the Efficient Man sprays guests
    and Andi arrives unexpectedly.
  location_type: Coastal Mainland
  parent_location_uuid: null
- fabula_uuid: location_e2906275a863
  global_id: null
  canonical_name: Grounds Near Villa (Miles Bron's Compound)
  description: Dense bushes line these grounds adjacent to the villa's bedroom, offering
    cover as Duke sprints across open turf, crouches to spy on Whiskey kissing Miles
    Bron, and snaps a branch in jealous rage. Blanc conceals himself nearby, tracking
    Duke's breakdown with concern. Close sightlines pierce the villa window amid island
    tension, broken by the Glass Onion's hourly chimes echoing over the foliage.
  location_type: Private Compound Grounds
  parent_location_uuid: null
- fabula_uuid: location_003b75ef5fca
  global_id: null
  canonical_name: Groundskeeper’s Cottage (Church Grounds)
  description: Private residence and site of grief/conspiracy adjacent to the church;
    contrasts with the public sanctuary in its intimate, cluttered, and emotionally
    charged atmosphere.
  location_type: Church Groundskeeper’s Cottage
  parent_location_uuid: null
- fabula_uuid: location_0a2ca9f61974
  global_id: null
  canonical_name: Guard House
  description: 'Proofroc mans this cramped, dusty guard house filled with security
    relics no newer than 1988: a bulky VCR, flickering CRT monitor, and preserved
    VHS tapes. Investigators squeeze inside alongside the family to review grainy
    footage from Harlan Thrombey''s death night. Frustration builds as outdated equipment
    slows their progress, heightening tension while Marta spots a crucial detail on
    the gardener''s road, masking her alarm behind a poker face.'
  location_type: Private Estate Guard House
  parent_location_uuid: location_f374c7b4d46e
- fabula_uuid: location_270b08958adb
  global_id: null
  canonical_name: Guests' Private Rooms
  description: A set of **multiple secluded bedrooms** within the villa, each belonging
    to individual guests. These rooms are the focus of a **covert search** for an
    incriminating envelope, with their **intimacy and personal belongings** heightening
    the stakes of discovery. The tension arises from **invading privacy** and revealing
    hidden secrets among the suspects.
  location_type: Villa Guest Rooms
  parent_location_uuid: null
- fabula_uuid: location_aa1146cc85d0
  global_id: null
  canonical_name: Gym
  description: Empty, gorgeous gym equipped with a large fitness training video screen
    and an incongruous fax machine. Blanc and Helen debate alibis and timelines here,
    their analysis interrupted by the fax spitting out Lionel's incriminating email
    to Miles. They hide as Duke enters for a tense phone call pressuring an intermediary,
    his voice echoing in the isolated space. Tension builds amid whirring machines
    and flickering screens, turning the fitness area into a clandestine hub of revelations
    and evasion.
  location_type: Private Compound Gym
  parent_location_uuid: null
- fabula_uuid: location_c1c8fcfaba94
  global_id: null
  canonical_name: Hair Salon
  description: The hair salon hums with life near 1209 Columbus Road. Dryers whir,
    scissors click through hair, and patrons exchange small talk amid sharp chemical
    scents. This bustling public spot shields Marta's entry; she announces a quick
    visit to maintain cover, then scans the vacant storefront across the street. The
    everyday chaos grants her plausible deniability for reconnaissance tied to the
    Thrombey case, her tension hidden amid the routine bustle.
  location_type: Neighborhood Hair Salon
  parent_location_uuid: null
- fabula_uuid: location_b9de97f76ee2
  global_id: null
  canonical_name: Hallway Threshold Outside Blanc's Apartment
  description: Narrow, exposed transitional space immediately outside Blanc's black-painted
    door, serving as a liminal zone between the island's paranoia and Blanc's private
    sanctuary. Defined by its role in the box delivery scene and its contrast to the
    apartment's interior.
  location_type: Private Residence Entry Hall
  parent_location_uuid: null
- fabula_uuid: location_064c0b3b3411
  global_id: null
  canonical_name: Harlan Thrombey's Study
  description: 'A small, private study within Harlan Thrombey''s mansion, serving
    as a dimly lit sanctuary for late-night Go games, tense family confrontations,
    and violent confrontations. The room contains a desk with drawers concealing letters,
    personal effects (including a prized baseball smashed in rage), medical supplies,
    vials, and an ornamental dagger. A Go board, landline phone, small window, and
    soft rug (where items scatter during chaos) complete the furnishings. The study
    is the site of Harlan''s throat-slashing suicide, leaving a dark bloodstain, and
    later becomes a preserved crime scene. Key events include: Harlan''s arguments
    with Ransom and Richard (whose shouts silence the living room), Ransom storming
    out in fury, Richard rifling through drawers for blackmail notes, Marta administering
    final medication, Ransom later swapping vials in the medical bag past police tape,
    and the room''s psychological manipulation and vulnerability during Harlan''s
    death.'
  location_type: Private Home Study
  parent_location_uuid: null
- fabula_uuid: location_704b86fe9c07
  global_id: null
  canonical_name: Harlan Thrombey's Third-Floor Bedroom (Crime Scene)
  description: Upper-floor private bedroom in the Thrombey mansion, isolated by a
    single staircase, where Harlan Thrombey's body is discovered. Serves as a crime
    scene (blood splatter patterns) and a space of secrecy (Marta's disguise, Ransom's
    sabotage of medications).
  location_type: Private Mansion Bedroom
  parent_location_uuid: null
- fabula_uuid: location_556ae28f59cb
  global_id: null
  canonical_name: Herb Garden
  description: Helen stands alone in this outdoor herb garden, frustration etched
    on her face as she sips kombucha amid the island's mounting tensions. The space
    provides a fleeting private haven for introspection until a gunshot rips through
    the air. She spits her drink in shock, whips her head toward the sound, and freezes—her
    detachment crumbling as the crisis turns visceral and immediate.
  location_type: Private Herb Garden
  parent_location_uuid: location_708e02d06fd2
- fabula_uuid: location_b000f76ff8d1
  global_id: null
  canonical_name: Hill Crest
  description: Blanc spots Duke Cody jogging along this elevated crest amid the island's
    rolling grounds near the Zen Garden. Sunlight bathes the open path where Duke
    pounds out his routine, muscles flexing under casual athletic wear. Blanc observes
    from a distance, the vantage point framing Duke's solitary exertion against lush
    greenery and distant sea views. The spot blends natural elevation with manicured
    estate landscaping, heightening Blanc's awareness of guests' routines under Miles
    Bron's watchful island regime. Tension simmers in the daylight calm as Blanc connects
    this glimpse to broader power plays.
  location_type: Private Island Hilltop
  parent_location_uuid: null
- fabula_uuid: location_bfd37fbefb90
  global_id: null
  canonical_name: Hospice
  description: Quiet hospice rooms hold Barbara through her final days, monitors beeping
    softly amid hushed corridors and drawn curtains. Louise carries this space's weight
    in her voice, her pleas for prayer revealing fractured bonds and looming loss
    that stall the investigation from afar.
  location_type: Hospice Facility
  parent_location_uuid: null
- fabula_uuid: location_42fa0c72e077
  global_id: null
  canonical_name: Hospital Hallway
  description: Fluorescent lights hum overhead, bathing linoleum floors and pale walls
    in sterile glare. Jud slams into the wall, chest heaving with guilt after the
    autopsy shocks him. Blanc drops to one knee beside him, voice steady as he pitches
    redemption through the case. Geraldine bursts in, her sharp warnings about suspect
    status slicing the thick air. This narrow corridor traps raw breakdowns against
    clinical indifference, forcing clashes between personal torment, manipulative
    persuasion, and legal caution.
  location_type: Hospital Corridor
  parent_location_uuid: null
- fabula_uuid: location_283814cf670f
  global_id: null
  canonical_name: Hospital Morgue
  description: Fluorescent lights buzz harshly over steel autopsy tables in this sterile
    hospital morgue. Morgue attendant Tammy flips Wicks’s corpse with a wet slap,
    its jello-like jiggle reducing the body to dehumanized meat and exposing knife
    wounds. Cold air thickens the tension as Blanc’s clinical questions strip Jud’s
    mythologized rage bare, triggering his hyperventilating flight amid Geraldine’s
    discomfort. The space forces raw confrontation between vengeance and mortality.
  location_type: Hospital Morgue
  parent_location_uuid: null
- fabula_uuid: location_89326d2b79d6
  global_id: null
  canonical_name: Hospital Waiting Room
  description: Fluorescent lights cast a harsh glow over plastic chairs and beige
    walls in this sterile hospital waiting room. Marta hunches forward, face buried
    in her hands, shock pinning her as Blanc fields calls on Fran's overdose. Silence
    thickens until her guilt erupts in demands for confession, marking the unraveling
    of secrets.
  location_type: Hospital Waiting Room
  parent_location_uuid: null
- fabula_uuid: location_5db141feaf6f
  global_id: null
  canonical_name: Hotel Exterior (Glass Onion Island)
  description: Night envelops the hotel exterior, its facade glowing under sharp floodlights
    against the dark sky. This space serves as a threshold between past revelations
    and looming betrayals, hosting key conversations that pivot the narrative. Helen
    stands here with Miles Bron, tracing Alpha's rise and Miles' fixation on hydrogen
    fuel, while later engaging in a Clue-style suspect grid discussion with Benoit
    Blanc. The distant hum of traffic and island's glow underscore the tension, marking
    a staging ground for flashbacks and investigative pushes. The hotel's exterior
    is a recurring location where critical character interactions occur, bridging
    the gap between the partnership's unraveling and the mystery's unfolding.
  location_type: Hotel Exterior
  parent_location_uuid: null
- fabula_uuid: location_b9b76af6e65a
  global_id: null
  canonical_name: Hotel on the Water
  description: A full-fledged hotel property serving as a logistical and narrative
    hub for guests transitioning between the mainland and the island, featuring internal
    operations like bellhop services and golf cart shuttles to the jetty. Operates
    during daytime hours and lacks explicit ties to specific episodes or characters
    beyond generic roles (e.g., Birdie Jay, Nikos).
  location_type: Waterfront Hotel
  parent_location_uuid: null
- fabula_uuid: location_a1c97f688830
  global_id: null
  canonical_name: Il Diavolo Pizza
  description: Il Diavolo Pizza operates as a devil-themed pizza bar crammed with
    kitschy red-and-horned decor that mocks the gravity of confessions, outbursts,
    and investigations inside. The exterior, bathed in neon, serves as a stark contrast
    to the interior chaos, where customers crowd barstools and booths amid clinking
    glasses and pizza scents. Key moments include Blanc examining the repainted murder
    weapon on the scarred bar top, Doctor Nat abandoning his bag before exploding
    in drunken rage, and Nikolai griping about infernal trinkets in flashbacks. Outside,
    neon bathes the 'devil’s den' facade as Jud pedals away in distress under night
    skies, the spot pulsing with ironic chaos and conspiracy shadows. The exterior
    is particularly notable for its role in Jud’s emotional retreat, amplifying his
    isolation and the finality of his departure from conspiracy pressures.
  location_type: Devil-Themed Pizza Bar
  parent_location_uuid: null
- fabula_uuid: location_1c748e2a1f1f
  global_id: null
  canonical_name: Indoor Threshold Outside Harlan's Attic Office Door
  description: Confined indoor space adjacent to Harlan's attic office door, where
    Marta experiences a pivotal moment of guilt and resolve. Part of the Thrombey
    House interior, distinct from exterior porches.
  location_type: Residential Attic Landing
  parent_location_uuid: null
- fabula_uuid: location_00bc63b06524
  global_id: null
  canonical_name: Infinity Pool (Private Island)
  description: A high-perched, architecturally distinctive infinity pool with a vanishing
    edge that blends into the sky, serving as a public gathering space for social
    tension, dramatic entrances (e.g., Whiskey), and external disturbances (e.g.,
    gunshots). Contrasts with the Deep End’s submerged, private sub-location.
  location_type: Private Island Infinity Pool
  parent_location_uuid: null
- fabula_uuid: location_dfea200b968f
  global_id: null
  canonical_name: Interrogation Room
  description: Top-lit overheads cast harsh shadows in this tense interrogation room,
    where Chief Geraldine Scott questions Jud across a metal table. She lays out the
    wolf-head figurine from his prior possession and plays the viral video *WICKS'S
    WOKE MURDERER*, capturing his threat to 'cut you out like a cancer.' Isolation
    presses in as public opinion convicts him before trial; Jud sits stunned while
    Geraldine delivers weary warnings, the space amplifying digital evidence's crushing
    weight and his reputation's collapse.
  location_type: Police Interrogation Room
  parent_location_uuid: null
- fabula_uuid: location_fdb0a63e39ae
  global_id: null
  canonical_name: Island Compound Hallways
  description: "\n        The interior hallways of the island compound, a **maze-like\
    \ network of claustrophobic corridors** designed to disorient and trap intruders.\
    \ These hallways are a **psychologically charged liminal space** where:\n    \
    \    - **Paranoia and hypervigilance dominate**: Security searchlights sweep overhead,\
    \ casting shifting shadows that distort walls and corners. Every footfall and\
    \ flicker of light amplifies the sense of potential betrayal.\n        - **Navigation\
    \ is disorienting**: Dead ends and maze-like turns confound characters (e.g.,\
    \ Miles Bron evading detection under night cover), integrating the layout into\
    \ the island’s defenses.\n        - **Tension and distrust peak**: Moments like\
    \ Andi freezing in place as Blanc’s call echoes, or Helen dodging obstacles while\
    \ distant voices reveal the island’s deadly 'game,' demonstrate the hallways’\
    \ role in fracturing trust.\n        - **Violence erupts**: Miles firing Duke’s\
    \ gun through a window, isolating himself in the dim expanse, exemplifies the\
    \ sudden, explosive danger lurking in these corridors.\n        The hallways serve\
    \ as a **catalyst for the island’s central conflict**, forcing characters into\
    \ vulnerability and amplifying the stakes of survival. Their design—integral to\
    \ the island’s defenses—traps intruders both physically and psychologically.\n\
    \      "
  location_type: Island Compound Hallways
  parent_location_uuid: null
- fabula_uuid: location_3e3b4e4cb90c
  global_id: null
  canonical_name: Island Dock
  description: Visible from approaching boats, this exterior dock captures Lionel's
    attention as a possible Banksy installation, its Greek lettering fueling speculation
    about the island's name. Captain Andino grunts dismissively while Lionel decodes
    aloud. Sunlit and mysteriously artistic, the dock marks the tense transition from
    sea to island, blending intellectual curiosity with pragmatic arrival amid brewing
    guest tensions.
  location_type: Private Island Dock
  parent_location_uuid: null
- fabula_uuid: location_0390bbc5865c
  global_id: null
  canonical_name: Island Grounds
  description: Night envelops the island grounds in pitch darkness when the Glass
    Onion power fails, the lighthouse beam slicing across the expanse in rhythmic
    arcs to expose guests' raw vulnerability and the estate's precarious isolation.
    Lush greenery defines the area where Helen, disguised as Andi, walks with Whiskey
    toward the nearby pool, their guarded exchange forging a tense solidarity amid
    overgrown paths and shadowed tension.
  location_type: Private Island Grounds
  parent_location_uuid: null
- fabula_uuid: location_a9026e67f8f6
  global_id: null
  canonical_name: Island Mansion Guest Rooms
  description: Private guest rooms within Miles Bron's island mansion, serving as
    locked sanctuaries during the escalating crisis. Blanc directs the panicked group
    to retire here after Duke's poisoning and the 10 PM blackout, instructing them
    to bolt doors until 5:30 AM. These rooms offer scant refuge through the night,
    with isolation amplifying every creak and shadow in the blackout-darkened compound.
    Each door becomes a thin shield between survival and the next strike, heightening
    paranoia as suspects brace for the killer's next move amid missing evidence and
    trapped circumstances.
  location_type: Private Island Guest Rooms
  parent_location_uuid: null
- fabula_uuid: location_764dbf6cd903
  global_id: null
  canonical_name: Jacob's Half Bath (Thrombey Estate Vent Room)
  description: Half bath in the Thrombey Estate with a vent that carries voices from
    nearby rooms, used by Jacob Thrombey to eavesdrop on Harlan and Ransom's argument
    about the will. This space is integral to the mystery plot and is distinct from
    other half baths in the estate due to its acoustic properties and plot-critical
    function.
  location_type: Mansion Half-Bath
  parent_location_uuid: null
- fabula_uuid: location_b06ef3e394d6
  global_id: null
  canonical_name: Jetty
  description: A long wooden jetty thrusts into the crystal blue sea from a sunlit
    Grecian port town. Guests like Lionel, Claire, Birdie, Duke, and Blanc gather
    here, their insular dynamics excluding the detective until his identity sparks
    recognition. The Efficient Man forces a mysterious throat spray on each, gagging
    them before boat departure to Miles Bron’s island. Andi’s taxi arrival shocks
    the group into silence. Distant explosions cut through rising tension, turning
    the pier into a fraught threshold between mainland normalcy and island peril.
  location_type: Seaside Jetty
  parent_location_uuid: null
- fabula_uuid: location_73455a7609da
  global_id: null
  canonical_name: Joni and Meg's Guest Room
  description: Joni retreats here amid Harlan Thrombey's party chaos, silk drapes
    and flickering candles creating a meditative sanctuary that starkly contrasts
    family tensions. A rhythmic thump from above shatters her calm. Later, dogs' barking
    pierces the quiet; Meg rises, uses the bathroom, and returns to bed unobserved
    while Joni sleeps. The space offers brief privacy, hinting at unease over the
    night's secrets.
  location_type: Mansion Guest Bedroom
  parent_location_uuid: location_a9026e67f8f6
- fabula_uuid: location_6a6a0315bafa
  global_id: null
  canonical_name: Joni's Bedroom
  description: Joni waves to Marta and Harlan from the second-floor landing, then
    retires to her bedroom as the family disperses for the night. The room provides
    her private refuge on the creaking upstairs level of the Thrombey home, where
    she maintains her bedtime routine. This detachment shields her from the quiet
    tension of Harlan's final ascent and the oblivious family's drift toward hidden
    tragedy. Night settles over the post-party hush, the space echoing her focus on
    normalcy amid encroaching catastrophe.
  location_type: Second-Floor Private Bedroom
  parent_location_uuid: null
- fabula_uuid: location_cae87cdd6003
  global_id: null
  canonical_name: Kitchen
  description: Blanc pushes into the darkened kitchen at night, phone flashlight cutting
    through shadows to reveal the island countertop where a butcher's block sits,
    one knife slot glaringly empty. Footsteps fade as an unseen figure bolts, their
    shadow flicking past the window into the night. Tension grips the space; domestic
    tools turn sinister, the missing blade and fleeing silhouette marking the shift
    from game to deadly pursuit. Blanc mutters alarm, the air thick with threat.
  location_type: Compound Kitchen
  parent_location_uuid: null
- fabula_uuid: location_25574bed98ec
  global_id: null
  canonical_name: Large Urban Church (Including Breezeway)
  description: |-
    The large urban church serves as the central location for the murder of Monsignor Wicks and the unfolding conspiracy. It features:
          - **Nave and Sanctuary**: Crime scene where Monsignor Wicks was murdered (blood spilled, knife lodged in window). Detectives retrieve the weapon from shattered glass, turning the space into a nexus of violence and hidden motives.
          - **Breezeway**: Exterior walkway where Jud punches the Deacon after an inflammatory sermon, contrasting sacred architecture with raw aggression. The space echoes with sermon remnants and the metallic tang of violence.
          Shattered panes in the nave let wind whistle through, carrying the scent of old incense mixed with fresh betrayal. The church grounds and interior spaces (including the breezeway) are intertwined in the narrative, with events spanning from the murder to investigations and confrontations.
  location_type: Urban Parish Church
  parent_location_uuid: null
- fabula_uuid: location_24165546103b
  global_id: null
  canonical_name: Lee Ross's House
  description: Lee Ross digs a shallow trench around his house, channeling water into
    it to form a makeshift moat. Two suits of armor stand guard on either side of
    the property, eccentric sentinels amid overgrown grounds. Jud cites the moat as
    proof of Lee's paranoia under Wicks's influence. The yard traps stagnant water
