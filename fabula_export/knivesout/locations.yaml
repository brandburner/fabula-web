  canonical_name: Thrombey Estate Guard Gate
  description: Marta steers her subcompact through the Thrombey Estate Guard Gate
    under night cover, Harlan's garbled voice urging turns before or after the carved
    elephant statue to skirt surveillance. Confusion stalls her—hesitation yields
    to sudden detour—as implied controls enforce the estate's edge. Darkness amplifies
