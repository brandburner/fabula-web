    as the stone slab crashes open. This proximity turns the shack's security feature
    into a stark revealer, piercing storm darkness to expose Wicks staggering from
    the depths. Mud clings to the scene; the shack stands as a weathered sentinel,
    its beam cutting through sheets of rain to amplify the raw shock of survival amid
    church shadows.
