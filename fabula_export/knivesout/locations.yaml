- fabula_uuid: location_f84c6ad71884
  global_id: null
  canonical_name: Thrombey Mansion Hallway
  description: A narrow corridor within the Thrombey Mansion that serves as a critical
    passage linking Harlan Thrombey's study to the living room. This hallway is a
    site of heightened tension and family drama, where key interactions occur during
    the Thrombey family's 85th birthday party. Ransom storms through this corridor,
    brushing past Greatnana, while Marta later slips in alone to regain composure.
    The space also serves as a conduit for eavesdropping on family secrets, as evidenced
    by Harlan Thrombey's raised voice cutting through a closed door during the party.
  location_type: Mansion Hallway
  parent_location_uuid: null
- fabula_uuid: location_4f7f1d6f97bc
  global_id: null
  canonical_name: Vera Draven's Deck (Outside Kitchen)
  description: A residential deck attached to Vera Draven's home, accessed directly
    from her kitchen. This open platform serves as a threshold space where Cy frequently
    retreats during emotionally charged family interactions (e.g., tense discussions
    between Vera and Father Jud). The deck's physical characteristics—wooden surface,
    exposure to daylight, and proximity to the kitchen door—create a liminal space
    where Cy processes his emotional detachment from the Draven family's legacy and
    Vera's sacrifices. The setting is consistently described as a place of solitude
    and avoidance, where Cy's internal conflict manifests through physical separation
    from indoor family dynamics.
  location_type: Residential Deck
  parent_location_uuid: null
- fabula_uuid: location_938466e3c53f
  global_id: null
  canonical_name: Vera Draven’s Kitchen
  description: Vera Draven’s kitchen hosts the Draven family's raw emotional fractures.
    During the day, Vera sips tea with Father Jud at the table, a framed photo of
    her father and young Monsignor Wicks looming as they probe loyalties and hidden
    paternities; Cy lingers dismissively on the adjacent deck. At night, Vera sits
    alone smoking—relapsed under revelation's weight—phone face-down from Lee's call,
    until Cy bursts in demanding truths before fleeing. Sunlight yields to shadows;
    domestic surfaces capture resentment, self-sacrifice, and unraveling deceptions
    in tight quarters.
  location_type: Residential Kitchen
  parent_location_uuid: location_4f7f1d6f97bc
