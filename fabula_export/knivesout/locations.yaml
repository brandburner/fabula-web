  description: Security cameras capture the Sanctuary Stage as Doctor Nat, Lee, and
    Martha approach and gather there immediately after Jud enters the nearby closet.
    This elevated church platform marks the first clear line of sight, framing the
    critical nine-second gap in the murder timeline. Dim night lighting shadows the
    space, heightening the tension of obstructed views and rushed witness movements
    that Geraldine weaponizes against Jud's alibi.
  location_type: Church Sanctuary Stage
