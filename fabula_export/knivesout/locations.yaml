  canonical_name: Church Grounds (Including Graveyard)
  description: 'A sprawling outdoor space encompassing both the misty green church
    grounds and the graveyard, where tombstones and crypts dot the open churchyard.
    The area serves multiple functions: morning dew soaks grass under soft light,
    while moonlight silvers the church at night. Woods border the grounds, hiding
    Samson''s cottage, garage, and patrol paths. The graveyard features tombstones
    and crypts where congregants carry coffins past assembled mourners toward hidden
    doors like Prentice’s vandalized Lazarus mechanism or Wicks’s pine box burial
    site. Rain soaks the ground during Nat’s deceptive texts from the forest edge,
    while storms lash Grace’s screaming collapse at the crypt. Eerie stillness frames
    Simone’s wheelchair vigil amid Wicks’s disembodied sermon echoes, and solemn tension
    grips funerals disrupted by revelations. Whitewashed graffiti scars reveal desecrations,
    and murder discoveries shatter resurrection ecstasies. Characters navigate its
    liminal paths amid faith’s erosion, conspiracy’s shadows, and death’s raw grip.
    The grounds also host morning rituals, confession sessions, and tense confrontations,
    with predatory undercurrents, raw faith, violent outbursts, and moral clashes
    defining this multifunctional outdoor space.'
  location_type: Churchyard Cemetery
