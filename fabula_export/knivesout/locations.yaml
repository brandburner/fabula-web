    to God. Her fervor cuts against the shattered empty coffin within, the storm's
    chill and roar sharpening the clash between raw faith and cunning deception. Soaked
    earth grips her posture, turning the space into a raw stage for myth-making amid
    elemental fury.
  location_type: Church Crypt Exterior
  parent_location_uuid: null
