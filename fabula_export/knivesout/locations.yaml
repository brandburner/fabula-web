  canonical_name: The Glass Onion (Miles Bron's Island Estate)
  description: |-
    The Glass Onion is the central location of Miles Bron's private island estate, featuring a glass-domed office and opulent mansion. This space serves as the primary setting for key interactions in the narrative, including:

      1. **Miles Bron's Glass-Walled Office (Central Dome)**: A vast, architecturally daring office perched in the central dome of the estate, where Miles confronts Benoit Blanc over the forged blue invitation card. The transparent walls enclose Miles' private domain, where he displays relics from his past—including a faded napkin and Polaroid from his bar days with Andi at the original Glass Onion. This space serves as a pressure chamber of revelations, where Blanc dismantles Miles's murder-mystery facade, exposing his manipulations over guests (Lionel, Claire, Birdie, and Duke) and forcing him to confront his lost authenticity. The office's stark clarity mirrors Miles's vulnerability, amplifying his unraveling defenses and buried regrets.

      2. **Mansion and Exterior Vistas**: The broader estate, which Miles describes as 'the reclamation of everything I’ve ever accomplished.' The mansion includes lavish art installations, grand halls, and exterior vistas designed to assert dominance and intimidate visitors. The curated excess of the estate reflects Miles' obsession with image and control. Key exterior features include:
         - **Front-Facing Window**: A tall window offering a commanding perch to survey the chaos below, where Miles stands framed in the glass, face detached and unreadable, eyes locked on Blanc beside Andi’s bloodied body as spotlights sweep and guests react in horror from nearby panes. The elevation isolates him, amplifying his role as aloof overseer amid the shattering facade of the island's deadly game.

      The Glass Onion functions as a symbolic and narrative hub, framing Miles' character, his relationships with guests, and the unfolding mystery. Its dual role as both a private office and a grand mansion underscores its significance in the story.
  location_type: Glass-Domed Villa Office
  parent_location_uuid: null
- fabula_uuid: location_9938e07d2428
  global_id: null
  canonical_name: The Glass Onion Bar (Nostalgic Haunt)
