    phones shrill, voices clash in overlapping shouts, and movement swallows arrivals
    whole. Automatic doors hiss open as bloodied, battered Father Jud stumbles through,
    dazed and unnoticed amid the frenzy. Blanc strides out purposefully but halts
    sharp at the sight, grabs Jud''s arm, and steers him back outside, dodging cops
    to shield his traumatized charge. The din and shadows heighten vulnerability,
    turning the entry space into a high-stakes threshold between safety and exposure.'
