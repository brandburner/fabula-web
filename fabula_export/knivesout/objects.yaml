  canonical_name: Samson Holt's VCR
  description: Samson Holt's VCR sits in the isolated Groundskeeper’s Cottage, running
    a flashback feed that suddenly flickers with static. The disruption interrupts
    the playback, creating an eerie break in the mundane rhythm. Samson remains present
    as the anomaly hints at external interference invading his private space.
  purpose: Plays video tapes to display flashback content
  significance: The static disruption foreshadows conspiracy and hidden forces, underscoring
    Samson's vulnerability and the fragility of his reality amid deception tied to
