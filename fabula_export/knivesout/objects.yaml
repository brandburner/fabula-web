  description: Large tank in Doctor Nat Sharp's basement holds corrosive liquid that
    dissolves flesh to bone. Blanc turns the valve to drain it, revealing Monsignor
    Wicks' skeletal arms locked around Doctor Nat Sharp's neck. Nat's bolt-shaped
    wedding ring identifies his corpse. Blanc, Jud, and Chief Geraldine Scott watch
    the liquid flow out, exposing the double murder tableau.
  purpose: Dissolves human remains in corrosive liquid
  significance: Draining exposes Wicks' murder of Nat and Nat's death in retaliation,
    confirming decades-old conspiracy and hidden fortune stakes. Blanc declares case
