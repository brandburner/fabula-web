    crews to beach them on the island shore if needed. The group—Blanc, Peg, Miles,
    Whiskey, Lionel—pins survival hopes on these incoming vessels as island protocols
    collapse and murders escalate. No physical details appear yet; they remain off-screen
    lifelines amid rising panic.
  purpose: Transport the group off the island during emergency evacuation
  significance: Blanc's order for these boats overrides Miles's protocols, shifting
