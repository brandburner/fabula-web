  potential_owner_uuid: null
- fabula_uuid: object_3e3652f9d4ed
  global_id: null
  canonical_name: Harlan Thrombey's Pre-Inserted Catheter
  description: A medical catheter sits pre-inserted in Harlan Thrombey's arm, providing
    direct venous access in his dimly lit study. Marta Cabrera attaches a syringe
