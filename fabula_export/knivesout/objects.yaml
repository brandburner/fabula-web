    of excess morphine in his system, conclusively proving his death was self-administered
    suicide rather than accidental overdose. **Key narrative roles:** (1) Fran initially
    clutches it as evidence to exonerate Marta Cabrera, (2) Ransom steals and burns
    it to frame Marta for Fran's murder, (3) Blanc later produces a duplicate/reconstructed
    version to publicly clear Marta's name during the family confrontation. Marta
