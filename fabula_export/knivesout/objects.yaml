    The injection pen (auto-injector device) and syringes are functionally linked
    in Marta's kit, with the syringes facilitating the vial swap that Ransom performs
    using the pen's vials. This sabotage is central to Ransom's plot to secure his
    inheritance and frame Marta.
  purpose: Draw and transfer liquids between medical vials
  significance: Ransom uses them to sabotage Marta's painkillers, swapping Toradol
    and morphine to create lethal injectables that frame her for Harlan's death and
