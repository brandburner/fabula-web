  canonical_name: Red-Painted Devil Head Weapon (Concealed Blade Figurine/Lamp Knife)
  description: |2-

          A **dual-purpose weapon** disguised as a decorative devil head, appearing in **three distinct forms** across the narrative:
          1. **Il Diavolo Pizza Ornament (Source Entity)**: A red-painted devil head ornament snatched by Jud and hurled at the church window, shattering into jagged shards. This is the **physical manifestation** of the weapon in its **ornament form**, later revealed to be part of a larger conspiracy.
          2. **Church Closet Version**: A red-painted devil head figurine lodged in Monsignor Wicks’s back, concealing a blade. Identical in design to the shattered ornament, it serves as the **murder weapon**.
          3. **Il Diavolo Pizza Lamp Version**: A devil-head lamp fixture at Il Diavolo Pizza, later modified into a weapon by embedding a blade within its base. Jud admits to hurling this weapon (or a replica) at the church window.

          **Key Narrative Role**: The weapon links the pizza parlor, church, and murder, serving as both a **murder tool** and a **symbol of the devilish motif** driving the conspiracy. Its **shattered remnants** (from the source entity) and **dual forms** (figurine/lamp) reinforce its centrality to the plot.
  purpose: Stabbing weapon disguised as harmless ornament
  significance: Exposes Wicks's death as deliberate murder, not accident; its Satanic
    design fuels Martha's accusations of demonic forces, shatters church calm, and
    pulls Jud deeper into the unfolding conspiracy as he records the horror.
  potential_owner_mention: ''
  potential_owner_uuid: null
