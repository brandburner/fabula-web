    to the crime. The devil head emblem, first observed in a Good Friday flashback
    by Benoit Blanc, is later torn from the vestments by Nat Sharp (using a handkerchief
    to avoid fingerprints) as evidence of premeditated murder. The emblem''s removal
    occurs amid Martha''s scream and Blanc''s presence, tying the church hierarchy
    to darker, ritualistic patterns and exposing Wicks as a victim of conspiracy rather
    than a suspect.'
  purpose: Liturgical garments for Monsignor Wicks to wear during church rituals and
