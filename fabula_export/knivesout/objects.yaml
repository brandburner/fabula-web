- fabula_uuid: object_ae62316756d4
  global_id: null
  canonical_name: Harlan Thrombey's Ornate Dagger
  description: Ornate dagger with decorative detailing gleams as Harlan Thrombey presses
    its blade against his own throat in his study. Marta Cabrera rushes in and lunges
    to stop him, but he slashes deeply across his neck, spraying blood across the
    room. The dagger's elegant craftsmanship enables the swift, fatal cut that horrifies
    Marta into silence, her hands clamped over her mouth.
  purpose: Slashing weapon
  significance: Harlan wields it for suicide, severing his bond with Marta in a traumatic
