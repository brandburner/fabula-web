  potential_owner_uuid: null
- fabula_uuid: object_bd8b6594f235
  global_id: null
  canonical_name: Samson's Cottage TV (Old Tube TV)
  description: An old tube TV (topped with rabbit ears) in Samson's groundskeeper's
    cottage, broadcasting a baseball game that serves as both background ambiance
    and a narrative clue. Jud spots the flickering screen during a speed-bag workout,
    leading to the discovery that Samson recorded the game (via VCR) during the murder
    window—providing a technical alibi. The TV's broadcast also creates a neutral
    topic that eases Jud and Samson into revelations about church tensions, while
    its outdated design (rabbit ears, flickering screen) contrasts with the modern
    VCR's role in the alibi.
  purpose: Broadcasts live baseball game, contrasting with VCR recording
  significance: Triggers Jud's realization about the VCR tape, shifting suspicion
