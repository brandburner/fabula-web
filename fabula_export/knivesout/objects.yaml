  potential_owner_uuid: null
- fabula_uuid: object_fbca16c7d87b
  global_id: null
  canonical_name: Harlan Thrombey's Study Couch
  description: Harlan Thrombey reclines across this couch in his study, grips an ornate
    dagger at his throat, then slashes deep, spraying blood over the room. Marta Cabrera
    bursts in, clamps hands over mouth in horror steps away. The couch holds his body
