  potential_owner_mention: Samson
  potential_owner_uuid: null
- fabula_uuid: object_88937ec2852a
  global_id: null
  canonical_name: Samson's Speed Bag
  description: This speed bag hangs in Samson’s groundskeeper’s cottage, a compact
    punching target that absorbs Jud’s furious blows. Jud attacks it immediately upon
    entering, his fists pounding rhythmically to unleash pent-up aggression from the
    locked-room murder puzzle. Punches slow as his mind clears, with Samson watching
    silently from nearby.
  purpose: Physical outlet for venting frustration and aggression through punching
  significance: Triggers Jud’s shift from raw fury to analytical deduction, paving
