- fabula_uuid: object_6ebb5280b2a7
  global_id: null
  canonical_name: Lounge Lighting System
  description: 'The lounge lighting system illuminates the opulent lounge area during
    key scenes involving Miles, Lionel, Claire, Benoit Blanc, Birdie, and Andi. It
    abruptly shuts off at exactly 10 PM (or during a night flashback), plunging the
    room into total darkness. This blackout serves multiple narrative functions: it
    jolts the group into heightened tension, sharpens Miles''s paranoia (particularly
    after Duke''s death), underscores Blanc''s calm observation of missing items (gun/phone),
    and exposes raw power dynamics as Miles feigns panic to scan for vulnerabilities.
    The outage creates a tactical edge for Miles while heightening chaos in the space.'
  purpose: Illuminates the lounge area
  significance: Sudden failure escalates tension, amplifies Miles's desperation to
    buy protection, and fractures group trust amid suspicions of orchestrated chaos
  potential_owner_mention: Miles
  potential_owner_uuid: null
- fabula_uuid: object_23c3ed9f8355
  global_id: null
  canonical_name: Lucite and Glass Surfaces in Miles Bron's Office
  description: Helen Brand darts through Miles Bron's pristine office, where lucite
    and glass surfaces dominate. These transparent materials reflect light and her
    urgent movements, offering no containers or crevices for hiding. The design strips
    away shadows and spots, forcing her search into the open and amplifying her desperation
    to conceal the large red envelope.
  purpose: Furnish a sterile, transparent office environment that prevents concealment
  significance: The surfaces block Helen Brand's efforts to hide evidence, expose
    her frantic state to plain view, and reinforce Miles Bron's controlling aesthetic
    amid rising stakes from Benoit Blanc's voiceover.
