  potential_owner_mention: Marta Cabrera
  potential_owner_uuid: null
- fabula_uuid: object_b161e39f44a4
  global_id: null
  canonical_name: Marta's Laptop
  description: Marta hunches over her laptop in the Cabrera kitchen, fingers moving
    listlessly as she scrolls job listings. The screen glows with employment opportunities,
    a futile anchor amid her numbness after Harlan Thrombey's death. Her mother scolds
    Alice nearby, the family's tension peaking until Marta's sobs erupt. Walt Thrombey's
    call soon pulls her away, the device abandoned.
  purpose: Browsing online job listings
  significance: Marta clings to the laptop as a distraction from grief, its job search
    underscoring her instability and need for stability post-Harlan. It marks her
