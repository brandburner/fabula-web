  global_id: null
  canonical_name: Harlan Thrombey's Last Will and Testament (and Envelope)
  description: "\n    **Multi-page legal document** serving as Harlan Thrombey's last\
    \ will and testament, which systematically disinherits the entire Thrombey family\
    \ (including Ransom) and bequeaths the full estate—comprising the publishing company,\
    \ copyrights, family home (2 Deerborn Drive), and financial assets—to nurse Marta\
    \ Cabrera.\n    **Physical manifestation**: The will exists in two forms:\n  \
    \  1) A **multi-page document** (likely the full legal draft) stored in the Thrombey\
    \ estate, which is referenced in Harlan's prior verbal disinheritance of Ransom\
    \ in the small study.\n    2) A **single-page revision** (the 'final page') contained\
    \ in a **plain envelope** received by attorney Alan Stevens from his assistant\
    \ Sally just before the library reading. This revision explicitly names Marta\
    \ as the sole heir and is the version read aloud during the explosive family confrontation.\n\
    \    **Narrative function**: The will's public reading in the library (via the\
    \ envelope's contents) triggers immediate family outrage, physical confrontation\
    \ with Marta, and subsequent legal scheming (e.g., the slayer rule). The document\
    \ becomes pivotal evidence in Detective Blanc's investigation, revealing financial\
    \ motives and Marta's potential leverage over her undocumented status. The envelope's\
    \ delivery and the will's dual forms (full draft vs. single-page revision) create\
    \ a narrative arc of escalating conflict over inheritance, with Harlan's prior\
    \ verbal disinheritance of Ransom setting the stage for the will's dramatic reveal.\n\
    \  "
  purpose: Distributes Harlan Thrombey's estate after his death, naming Marta Cabrera
    sole beneficiary and excluding all Thrombey family members.
  significance: Ignites family chaos, exposes hypocrisies and resentments, and drives
    the murder investigation as Blanc uncovers manipulations tied to its contents
    and timing.
  potential_owner_mention: Harlan Thrombey
  potential_owner_uuid: null
