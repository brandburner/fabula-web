  description: Unspecified physical or digital proof ties Marta directly to Harlan
    Thrombey's death. Ransom demands its destruction over the phone as she sits in
    her car, her hands gripping the wheel while Benoit Blanc and Lieutenant Elliott
    close in. Panic surges through her; she knows holding it implicates her in the
    murder cover-up. The evidence drives her split-second choice to flee, tires screeching
    against pavement.
  purpose: Incriminate Marta in Harlan Thrombey's death
  significance: Ransom wields it to manipulate Marta into deepening the cover-up,
    forcing her flight from Blanc and isolating her further in the Thrombey family's
