    Envelope)
  description: A stack of envelopes containing legal documents linked to Harlan Thrombey's
    inheritance, including one plain white envelope with no postage stamp or return
    address that stands out as suspicious. Marta grips the stack tightly during a
    hallway standoff with Walt Thrombey, who dismisses most as junk mail from local
    lawyers and accountants. The suspicious envelope's blank exterior marks it as
    a key mystery element amid the inheritance conflict. The stack is later clutched
    by Marta as she retreats into her apartment, slamming the door on Walt's threats.
    Multiple parties—Marta Cabrera, Walt Thrombey, Harlan Thrombey, Marta's Mom, and
    Meg Thrombey—encounter these envelopes during confrontations over family resources
    and inheritance claims.
  purpose: Hold and transport legal documents concerning Harlan Thrombey's inheritance
    and related claims
  significance: Act as leverage and evidence in Marta and Walt's confrontation; Walt
