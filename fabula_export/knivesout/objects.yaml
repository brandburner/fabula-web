- fabula_uuid: object_5e939efc85b2
  global_id: null
  canonical_name: Marta's Car
  description: Marta's unassuming sedan serves as her primary mode of transportation
    and a critical narrative device throughout the investigation. She drives it through
    tense night flashbacks, yanking the wheel in panic to veer off-road before a carved
    elephant statue as Harlan's garbled instructions fail her. The car is parked off-road
    in the dark woods during a flashback, where Marta abandons it with the engine
    off and lights dimmed before proceeding on foot to the Thrombey estate. It later
    pulls through the Thrombey estate gates during the investigation's start, is abandoned
    stalled on the front drive during the family's mob attack, and is used to speed
    inside with Ransom to evade Blanc and police cruisers on Norfolk backroads, with
    Marta swerving sharply amid wailing sirens. The car's state (abandoned, stalled,
    or in motion) reflects Marta's escalating desperation and the tightening noose
    of the investigation.
  purpose: vehicle for transportation and high-speed evasion
  significance: Serves as Marta's refuge amid panic, symbolizing her entrapment and
    fleeting autonomy; it stalls during family confrontation, hosts urgent huddles
    with Ransom post-bombing, and enables desperate flights from Blanc and police,
    amplifying her isolation and moral peril in the conspiracy.
  potential_owner_mention: Marta Cabrera
  potential_owner_uuid: null
- fabula_uuid: object_41d6438e5b86
  global_id: null
  canonical_name: Marta's Dashboard Clock
  description: 'Mounted in the dashboard of Marta''s car, this digital clock shows
    precise times: 9:32 AM when Marta first checks it after receiving the blackmail
    email, confirming just 28 minutes until the 10 AM deadline. Later, during the
    drive with Blanc, she glances at it repeatedly—at 9:55 then 9:58—her eyes locking
    on the advancing numbers as tension stiffens her posture. Ransom sits nearby during
    the initial check, but Marta fixates on it alone.'
  purpose: Displays current time to inform the driver of deadlines and travel duration
  significance: Heightens Marta's panic and urgency as the blackmailer's 10 AM deadline
    looms; her repeated glances externalize internal desperation, contrasting Blanc's
    casual theorizing and foreshadowing her impulsive exit from the car.
  potential_owner_mention: Marta
  potential_owner_uuid: null
- fabula_uuid: object_a44cef1c597a
