  canonical_name: Lounge Area Sprinklers
  description: Ceiling-mounted sprinklers in the lounge area activate during Helen's
    fire but spray water ineffectively against the Klear-infused flames. Water streams
    down amid shattering glass and spreading fire, drenching Lionel, Miles, Helen,
