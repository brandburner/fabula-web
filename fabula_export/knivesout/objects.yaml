  description: A concealed door disguised as a dead-end wall behind a large painting
    on the third-floor landing. The door swings open to reveal a window and the entrance
    to Harlan Thrombey's private bedroom—a space excluded even from his family. Its
    seamless camouflage allows covert entry, as demonstrated when Marta Cabrera and
    Ransom Drysdale Thrombey navigate the passage during the party, leaving muddy
    footprints as incriminating evidence. The painting itself serves as the visual
    facade for this hidden entrance, reinforcing the mansion's secretive architecture.
    Harlan's voice-over underscores its role in maintaining absolute secrecy, while
    its silent operation and strategic placement highlight the deliberate exclusion
    of family members from this private space.
