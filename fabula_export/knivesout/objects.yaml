- fabula_uuid: object_0ff72481497e
  global_id: null
  canonical_name: Chief Geraldine Scott's Phone
  description: Chief Geraldine Scott grips her smartphone in the dimly lit interrogation
    room and thrusts the screen toward Jud, playing a viral YouTube video titled *WICKS'S
    WOKE MURDERER*. The footage captures Jud's furious clash with Monsignor Jefferson
    Wicks, where he vows to 'cut you out like a cancer.' Cy Draven and Wicks watch
    as the video loops, its harsh audio filling the space. Jud freezes, face paling
    under the phone's glow, while Geraldine stands firm, her exhaustion evident in
    tight jaw and steady hand.
  purpose: Displaying viral YouTube video as evidence during interrogation
  significance: Exposes Jud's public threat against Monsignor Wicks, confirming his
    guilt in the court's eye and the town's frenzy before trial. Drives home digital
    evidence's speed and inescapability, unraveling Jud's reputation amid the conspiracy's
