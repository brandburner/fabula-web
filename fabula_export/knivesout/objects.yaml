    chaos in the Thrombey living room. These sturdy briefcases hold legal documents
    for Harlan's will, their presence marking the shift from heated arguments to formal
    inheritance proceedings. Walt, Donna, Jacob, Linda, and Richard eye them tensely
    as Sally manages the cases, amplifying anticipation for the explosive revelation
    ahead.
  purpose: Contain and transport legal documents for Harlan Thrombey's will reading
  significance: Symbolize the impending legal proceedings and the family's brewing
