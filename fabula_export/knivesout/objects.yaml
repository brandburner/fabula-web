  description: Peg delivers an unmarked wooden box to Birdie Jay outside The Dakota,
    a card attached to it displays Miles Bron's name as sender. Birdie snatches the
    card, reads it quickly, and leans in with recognition and keen interest—her usual
    boredom vanishes amid surrounding models, dancers, and Claire Debella. The card
