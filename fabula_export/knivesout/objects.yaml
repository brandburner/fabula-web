  canonical_name: Sam's Tools
  description: Jud borrows these tools from Sam to repair the faded crucifix mounted
    on the church wall. Perched on a ladder, he measures dimensions for a replacement,
    gripping the implements with steady hands that reveal his hands-on expertise.
    Wicks halts his apple bite to denounce the effort as sacrilege, while Grace and
    Sam watch the tense exchange unfold.
  purpose: Measuring and repairing the church crucifix
  significance: Jud wields the tools to express quiet devotion and redemption, but
    Wicks condemns their use as defiling a symbol of family shame tied to Grace's
    pregnancy. The tools ignite conflict between Jud's practical piety and Wicks's
    punitive control.
  potential_owner_mention: Sam
  potential_owner_uuid: null
- fabula_uuid: object_b47d53220af1
  global_id: null
  canonical_name: Samson Holt's Body
  description: Samson Holt's lifeless body sprawls on the forest grove floor, pale
    and still under night shadows. Martha Delacroix stumbles upon it, collapses across
    his chest, clutches his face, and unleashes guttural screams of 'no' that crack
    the silence. Blanc grips her shoulders to pull her back as she resists, trembling.
    Geraldine watches from the entrance. Later, Blanc references the body in church
    interrogation, pressing Martha on her knowledge when she found it.
  purpose: ''
  significance: Triggers Martha's raw grief into vengeful outburst, foreshadows her
    conspiracy role, serves as murder clue unraveling alibis for Jud and Martha, shifts
    Blanc's suspicion toward church inner circle.
  potential_owner_mention: Martha Delacroix
  potential_owner_uuid: null
- fabula_uuid: object_f4b3b023e186
  global_id: null
  canonical_name: Samson Holt's Garage Door Remote/Mechanism
  description: Handheld remote control (or garage door mechanism) used by Samson Holt
    to operate the garage door at his cottage on church grounds. When Jud spots Samson
    assembling a pine coffin inside the open garage, Samson abruptly activates the
    remote, causing the garage door to slam shut and block the view. This action is
    accompanied by static interference on a nearby TV screen, suggesting anomalous
    electronic effects tied to the church grounds investigation. The entity serves
    both a functional purpose (garage access) and a narrative one (concealing suspicious
    activity).
  purpose: Closes the garage door remotely
  significance: Exposes Samson's haste to conceal coffin construction, heightening
    suspicion of his role in the Monsignor’s murder or 'Eve’s Apple' conspiracy; TV
    fuzz suggests hidden wiring or interference mechanism linking to broader secrets.
  potential_owner_mention: Samson Holt
  potential_owner_uuid: null
- fabula_uuid: object_0b6c2c4a96c5
  global_id: null
  canonical_name: Samson Holt's Hooded Rain Slicker
  description: Samson Holt pulls the hooded rain slicker over his frame as he lurks
    in the church grounds' background, its waterproof fabric and deep hood casting
    shadows that amplify his eerie, ominous presence during Jud's confession to Blanc.
    In a rain-lashed graveyard flashback, Doctor Nat Sharp dons the slicker to impersonate
    Samson, hood obscuring his face while he sends a text to Martha, advancing their
    diamond heist conspiracy.
  purpose: Waterproof outerwear for rain protection, repurposed as disguise
  significance: Enhances Samson's menacing aura amid the investigation's moral crisis;
