  canonical_name: Samson's Shack Motion-Sensing Camera
  description: Mounted on Samson's shack, this motion-sensing camera detects activity
    near the crypt entrance. It clicks on abruptly as the stone slab splits open and
    falls, flooding the dark interior with harsh light. The illumination catches Samson
    holding his lamp high, reveals Monsignor Wicks staggering out alive and disoriented,
    and exposes Jud sprinting through mud and rain toward the unfolding violence.
  purpose: Detects motion and activates floodlight to illuminate the crypt area for
    security
  significance: Triggers sudden light that exposes Monsignor Wicks's survival, shatters
