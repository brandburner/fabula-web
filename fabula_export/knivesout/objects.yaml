- fabula_uuid: object_f9a4dc1dc646
  global_id: null
  canonical_name: Marta Cabrera's 100mg Toradol IV Push
  description: Marta Cabrera administers a 100 milligram intravenous push of Toradol,
    a non-narcotic analgesic, to Harlan Thrombey for his shoulder injury. In her testimony
    to Lieutenant Elliott and Trooper Wagner, she recites the exact dosage amid probing
    questions that treat it as a potential investigative clue. Her slight hesitation
    draws Benoit Blanc's attentive gaze, heightening the scene's tension as the medication's
    details risk exposing her rehearsed account.
  purpose: Intravenous delivery of non-narcotic pain relief for shoulder injury
  significance: Key element in Marta Cabrera's testimony scrutinized by Lieutenant
    Elliott as a clue in Harlan Thrombey's death investigation, underscoring her deception
    and guilt under Blanc's watchful eye
  potential_owner_mention: Marta Cabrera
  potential_owner_uuid: null
- fabula_uuid: object_56c276421482
  global_id: null
  canonical_name: Marta Cabrera's Anonymous Blackmail Envelope
  description: 'A single, mysterious envelope containing torn photocopies of a toxicology
    report header (from the ''OFFICE OF THE CHIEF MEDICAL EXAMINER''), a photocopied
    medical examiner’s tag with Marta’s name, and a handwritten threat: ''I KNOW WHAT
    YOU DID.'' This envelope is the catalyst for Marta’s panic and the subsequent
    investigation, lacking ''actual evidence'' but designed to induce fear and urgency.'
  purpose: Threaten Marta Cabrera by suggesting the sender knows her involvement in
    Harlan Thrombey's morphine overdose
  significance: Drives Marta’s desperation and reveals Ransom’s clinical analysis,
    acting as a cryptic clue from a precise blackmailer who withholds full evidence
    to build tension and expose family vulnerabilities
  potential_owner_mention: Marta Cabrera
  potential_owner_uuid: null
