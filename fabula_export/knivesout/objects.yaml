  description: Investigative tool used by Samson to illuminate dark outdoor areas
    (woods, crypts); reveals hidden truths and heightens suspense.
  purpose: Illuminate dark outdoor areas for investigation
  significance: Reveals Samson's position and readiness, interrupts Jud's escape,
    and ties the disturbance to the church's sacred grounds amid hints of conspiracy
