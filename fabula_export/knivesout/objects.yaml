    Simone grips the small metal device, her action exposing her faked disability
    and shattering the room's fragile faith in Wicks' divine claims.
  purpose: Produce a flame for lighting cigarettes or similar items
  significance: Catalyzes Simone's revelation of her mobility and Wicks' fraud, pivoting
