  potential_owner_mention: Samson Holt
  potential_owner_uuid: null
- fabula_uuid: object_4cdbf767d1c7
  global_id: null
  canonical_name: Samson Holt's Short-Handled Sickle (Murder Weapon)
  description: A short-handled sickle used by Samson Holt for cutting weeds on the
    church grounds, later repurposed as the murder weapon in Samson's death. The blade's
    curve catches light during its initial use, while its violent potential is realized
    when Jud's hand clenches the handle white-knuckled, sinking it into Samson's chest.
    The sickle's dual purpose—groundskeeping tool and murder weapon—serves as a key
    investigative clue, blurring lines between Samson's physical labor and the dark
    conspiracy surrounding his death.
  purpose: Cutting weeds
  significance: Highlights Samson's physical strength and groundskeeper role while
    foreshadowing violence amid the church's hidden corruption
  potential_owner_mention: Samson Holt
  potential_owner_uuid: null
