- fabula_uuid: object_c6646ce66af7
  global_id: null
  canonical_name: Marta's Medical Kit/Bag
  description: "\n      **Marta's Medical Kit/Bag** is a portable medical container\
    \ used by Marta Cabrera to administer Harlan Thrombey's daily medications (including\
    \ morphine and Toradol) and provide emergency medical response. It contains critical\
    \ medications (e.g., morphine, Toradol) and is central to both Harlan's care and\
    \ the narrative's medical/legal tension. The kit appears in two key contexts:\n\
    \      1. **Bedroom Scene**: Marta grabs the kit from Harlan's bedroom shelf while\
    \ trailing his unsteady climb up the stairs. Later, in the study after the morphine\
    \ overdose, she frantically opens it to search for Naloxone (finding only the\
    \ fatal morphine), confirming the irreversible error that precipitates Harlan's\
    \ suicide plan.\n      2. **Crime Scene Scene**: The bag is missing from Harlan's\
    \ study (the preserved crime scene), prompting discussion about its routine presence\
    \ and potential removal by police as evidence. Marta's tension rises during questioning\
    \ about its absence, highlighting its role in her nightly medication routine.\n\
    \n      **Key Contents**:\n      - **Toradol Vial**: A clear glass vial of Toradol\
    \ painkiller intended for Harlan's care. Ransom Drysdale switches its contents\
    \ with morphine using syringes in Harlan's bedroom, planting lethal poison under\
    \ the familiar label. Blanc later tapes over its label and pairs it with the swapped\
    \ morphine vial in the library.\n      - **Morphine**: Used for Harlan's daily\
    \ medication and later weaponized in his suicide plan.\n      - **Naloxone (Missing)**:\
    \ Intended for emergency response but absent during the overdose crisis.\n\n \
    \     The kit's contents are central to the narrative's medical/legal tension,\
    \ including Ransom's framing of Marta and Blanc's demonstration of her subconscious\
    \ skill in selecting the true Toradol.\n      "
  purpose: Administer daily medications like morphine and provide emergency medical
    response for Harlan's health needs
  significance: Emphasizes Marta's role as Harlan's caretaker amid his physical decline;
    its lack of antidote turns overdose into plot pivot, compelling the cover-up and
    exposing family fractures
  potential_owner_mention: Marta Cabrera
  potential_owner_uuid: null
