  canonical_name: Jud Duplenticy
  title_role: Priest
  description: Jud Duplenticy (also known as 'Father Jud'), a priest in his 30s, bears
    the physical scars of his boxing past—taut muscles and a neck tattoo visible above
    his clerical collar. He channels disciplined strength into his spiritual role
    while battling a latent capacity for violence that erupts under provocation, particularly
    from church figures like Deacon Clark. Immediate remorse follows his outbursts,
    revealing a man torn between redemptive faith and destructive impulses. Jud serves
    under Monsignor Wicks in a local church, maintaining intimate knowledge of the
    Draven family's secrets, including Cy Draven's true parentage and Vera's role
    in the deception. He probes loyalties, confronts moral dilemmas, and acts decisively
    in crises—concealing evidence or intervening swiftly—while forging ties with outsiders
    like Benoit Blanc. His motivations center on balancing ecclesiastical duty, personal
    conscience, and protection of those entangled in church scandals. His tense interactions
    expose institutional frictions that test his fragile self-control.
