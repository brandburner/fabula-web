  canonical_name: Nat Sharp
  title_role: Doctor
  description: Nat Sharp (also known as 'Nat') is a physician practicing medicine
    in a tight-knit church community under Monsignor Jefferson Wicks' leadership.
    As one of Wicks' trusted inner circle—alongside Jud, Martha Delacroix, Lee Ross,
    Cy, Samson, and others—he serves as both the parish doctor and a reluctant participant
    in the congregation's secrecy. His emotional stability hinges on his relationship
    with his wife, Darla, whose abandonment triggers alcoholism, desperation, and
    aggressive outbursts. While authoritative in crises and skilled in medical emergencies,
    his personal failures, greed for hidden fortunes, and complicity in betrayals
    erode his restraint. Torn between duty and fear of institutional fallout, he voices
    unease over the group's deceptions but remains entangled in their web of lies,
    reflecting a man bound by loyalty yet fraying under paranoia and exposure.
