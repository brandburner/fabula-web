  canonical_name: Donna Thrombey (née Gumley)
  title_role: null
  description: Donna Thrombey (née Gumley) anchors Walt Thrombey's family as his wife
    and Jacob's mother within the fractious Thrombey clan. Walt calls her his rock,
    relying on her quiet support amid tensions over Harlan's publishing empire. She
    navigates social gatherings with nervousness, clings to Walt during crises, and
    occasionally unleashes nativist fervor when alcohol loosens her restraint. Her
    passivity in conflicts masks emotional volatility, from startled yelps to hyperventilating
    shock, while her loyalty to Walt and Jacob defines her amid the family's unraveling.
    Donna invests deeply in the family's wealth and legacy, expecting continued access
    to Harlan's estate, and maintains poise amid entitlement until shocks expose her
    vulnerability. Her motivations are tied to preserving privilege and status within
    the Thrombey family circle.
