  canonical_name: Benoit Blanc
  title_role: Private Investigator
  description: Benoit Blanc is a private investigator hired anonymously to probe Harlan
    Thrombey's death. He operates independently while shadowing the official police
    investigation led by Lieutenant Elliott, employing psychological tactics, deductive
    reasoning, and cryptic metaphors to dismantle alibis and expose secrets. Known
    for his unflappable calm, Southern drawl, and distinctive habits—such as flipping
    a silver dollar and lighting cigars—Blanc disarms suspects and allies with Marta
    Cabrera, Harlan's nurse, to uncover the Thrombey family's greed and lies. His
    methodical approach and relentless determination position him as the pivotal force
    in exposing the family's tangled loyalties and institutional blind spots, despite
    attempts by figures like Ransom Drysdale to downplay his acuity.
  traits:
