  description: During a tense gathering in the atrium, Helen Brand—under Benoit Blanc’s
    guidance—orchestrates a calculated emotional collapse to distract the group. Blanc
    subtly warns her away from a potentially poisoned whiskey soda, signaling the
    high stakes of their covert search for a critical envelope. When Duke Cody, a
