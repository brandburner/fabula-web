    exposure. Miles’s stealth is not just physical but psychological, a man navigating
    a world where trust is a liability and secrets are currency. The darkness amplifies
    the stakes—if caught, his carefully constructed facade could collapse, revealing
    the truth behind the murder mystery and his own complicity in the unfolding chaos.'
