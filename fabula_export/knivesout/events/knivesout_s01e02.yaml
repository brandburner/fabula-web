  global_id: null
  title: Blanc withholds the killer’s identity
  description: 'In the atrium’s charged aftermath of Whiskey’s accusation against
    Andi, Blanc seizes control of the group’s panic, ordering Peg to radio the mainland
    for immediate evacuation despite Miles’s objections. His dismissal of Whiskey’s
    theory—‘No’—signals a deliberate shift from reactive blame to a calculated, systemic
    investigation. Blanc’s refusal to reveal the killer’s identity (‘only one person
    can tell us’) isn’t just obstruction; it’s a tactical maneuver to force the group
    to confront their complicity in the game’s design. His line ‘I can peel back the
    layers’ frames the mystery as an onion, where each revelation exposes deeper corruption,
    not just a single culprit. The hard cut underscores the abruptness of his authority,
    leaving the group—and the audience—hanging on the unspoken question: *Who holds
    the truth?* This moment pivots the narrative from emotional chaos to strategic
    revelation, with Blanc as the orchestrator of the group’s next move.'
