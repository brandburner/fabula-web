  global_id: null
  title: Helen’s rebellion ignites the island’s fragility
  description: |2

    Helen’s defiance escalates from controlled rage to outright destruction after Miles burns the napkin—their sole physical evidence of Andi’s murder. Blanc’s impotent apology and withdrawal leave her isolated, but her smashing of priceless objects and igniting the bar cart with Miles’s lighter transforms the lounge into a warzone. The fire spreads uncontrollably, revealing the island’s reliance on volatile Klear—a substance embedded in its infrastructure. Miles’s smirking indifference collapses into horror as the flames consume the crystal-laced environment, exposing the guests’ complicity and the island’s precarious stability. The scene shifts from cathartic rebellion to existential threat, forcing the group to confront the real stakes of their game: their lives depend on a system as unstable as the man who built it.
