    staring me right in the face. Like everyone in the world I assumed that Miles
    Bron was a complicated genius. But why? Look into the clear center of this glass
    onion: Miles Bron is an idiot!'
  - 'BLANC: You handed Duke your own glass. Clear as crystal. Right in front of our
    eyes. All of us. Then told a bald-faced fabrication. And it worked!'
  - 'BLANC: Nobody tried to kill you, you vainglorious buffoon.'
