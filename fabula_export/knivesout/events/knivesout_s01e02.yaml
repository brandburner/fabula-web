  object_involvements:
  - object_uuid: object_f1ffd626b6c0
    description_of_involvement: The *authentic* Mona Lisa serves as the centerpiece
      of Miles' power display, its revelation a calculated shock to awe his guests
      and underscore his ability to defy conventions. The painting's authenticity
      is demonstrated through Miles' manipulation of its protective glass case—first
      via a red button on a pedestal, then with a silver lighter, and finally with
      a hidden jester boy figurine. The painting symbolizes Miles' desire for immortality
      and legacy, its layered brushstrokes mirroring the complexity of his own ambitions.
      The guests' reactions—ranging from awe to horror—highlight the painting's role
      as both a masterpiece and a weapon in Miles' psychological games.
    status_before_event: Encased in a protective glass case, displayed prominently
      in the atrium as a framed print, its true identity concealed.
    status_after_event: Exposed and vulnerable after Miles demonstrates the override
      mechanisms, its authenticity confirmed and its symbolic power weaponized.
  - object_uuid: object_480585917ba5
    description_of_involvement: 'The Mona Lisa''s security glass case is a critical
      narrative device, its sleek design and high-tech functionality reflecting Miles''
      obsession with control and spectacle. The case slides away at the press of a
      red button, exposing the painting, and re-engages instantly when triggered by
      Miles'' silver lighter or the jester boy figurine. Its sensitivity—reacting
      even to a phone ding—underscores the precariousness of Miles'' power and the
      fragility of the island''s security. The case''s override mechanisms are a metaphor
      for Miles'' own recklessness: flashy, unpredictable, and ultimately dangerous.'
    status_before_event: Sealed and locked, protecting the Mona Lisa from view and
      tampering, its true contents unknown to the guests.
    status_after_event: Temporarily opened to reveal the painting, then re-engaged,
      its mechanisms demonstrated as part of Miles' power play.
