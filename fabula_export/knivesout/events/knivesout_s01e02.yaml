  global_id: null
  title: Andi’s Body Discovered Under Spotlight
  description: 'The scene opens with a dramatic reveal: Andi’s lifeless body lies
    sprawled on the steps, her chest bloodied, illuminated by a sweeping light that
    abruptly cuts out. Blanc stands over her, his expression shifting from shock and
    regret to cold resolve. The lights in the complex flicker back on, revealing the
    guests—Claire, Lionel, Birdie, Peg, and Whiskey—staring in horror from the windows
    of the glass onion. Miles Bron watches from above, detached and unreadable. When
    the group rushes outside, their reactions are visceral: Claire gasps in shock,
    Birdie shrieks and hides behind Peg, and Whiskey sits numbly on the steps. Blanc,
    now hardened, barks orders to move inside, dismissing Claire’s attempt to address
    the body. His final line—*‘It’s time to finish this’*—signals a shift from investigation
    to confrontation, marking the moment the game’s facade shatters and the stakes
    become deadly real. The body is no longer a puzzle piece but a catalyst for reckoning,
    forcing the guests to confront the violence they’ve ignored or enabled. Miles’s
    silent observation from the glass onion hints at his role as orchestrator, deepening
    the tension between control and chaos.'
