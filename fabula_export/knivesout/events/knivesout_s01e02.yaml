- fabula_uuid: cand_evt_scene_eff98784868ee214_02
  global_id: null
  title: Blanc Accuses Birdie of Murder
  description: "\n  In a sudden escalation of tension, Benoit Blanc publicly accuses\
    \ Birdie Jay of murdering Miles Bron using a remote-controlled crossbow, tying\
    \ the crime to the stolen Wren Diamond. Blanc’s accusation unfolds as a theatrical\
    \ performance, revealing meticulously planted clues—from the seating arrangement\
    \ triangulating Birdie to the crossbow’s vintage Jayhawk brand, the 1998 *The\
    \ Face* magazine cover, and the locket containing the diamond. The group’s fragile\
    \ trust fractures as Blanc’s accusation gains momentum, culminating in Miles dramatically\
    \ revealing the entire scenario was part of the game’s deception. The revelation\
    \ defuses the immediate crisis but deepens the mystery of who is truly orchestrating\
    \ the events, leaving the guests unsettled and questioning the boundaries between\
    \ the game and reality. Blanc’s childlike excitement over the iPad prize contrasts\
    \ sharply with the gravity of his accusation, underscoring the absurdity and danger\
    \ of the situation.\n  "
