  title: Helen reveals Andi’s murder and the red envelope
  description: 'Helen Brand, posing as a grieving sister, confronts Benoit Blanc with
    the truth about her twin Cassandra ‘Andi’ Brand’s death—revealing it was no suicide
    but a calculated murder. She exposes Andi’s final email, sent to Miles Bron’s
    inner circle (Birdie Jay, Duke Cody, Claire Debella, and Lionel Toussaint), threatening
    to expose their secrets with a damning red envelope. Blanc, intrigued by the puzzle-like
    setup, initially resists Helen’s plea to impersonate Andi on Miles’s island but
    ultimately proposes a dangerous ruse: Helen will infiltrate the group as Andi,
    while Blanc investigates. The plan hinges on the killer’s ignorance of Andi’s
    death, but Blanc warns Helen she’ll be in mortal peril. Helen, consumed by vengeance,
    agrees despite the risks, setting the stage for a high-stakes deception that could
    unravel the conspiracy—or get her killed. The scene pivots from emotional confession
    to tactical planning, with Blanc’s cigar-lit epiphany marking the shift from passive
    mourning to active revenge.'
