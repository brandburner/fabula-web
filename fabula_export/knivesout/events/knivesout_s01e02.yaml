  title: Duke’s facade shattered by his mother
  description: "\n  Duke Cody’s live-streamed performance of hyper-masculine bravado\
    \ is violently interrupted when his mother storms in, slaps him, and publicly\
    \ humiliates him by rejecting his performative persona. The confrontation exposes\
    \ the stark contrast between Duke’s curated online image—filled with expensive\
    \ props, greenscreen backdrops, and contrived rhetoric—and the reality of his\
    \ cluttered, chaotic home. His mother’s Jersey-accented rebuke ('You tell your\
    \ mother to shut up?') forces him into a moment of raw vulnerability, stripping\
    \ away his carefully constructed facade. The scene underscores the dysfunctional\
    \ family dynamics fueling his behavior, while the abrupt shift from his stream\
    \ to the kitchen delivery hints at the broader mystery unfolding on Miles Bron’s\
    \ island. The slap isn’t just a physical act; it’s a symbolic dismantling of Duke’s\
    \ fraudulent identity, leaving him exposed and the audience questioning how much\
    \ of his persona is real.\n  "
