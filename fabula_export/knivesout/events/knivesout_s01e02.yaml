    dropping her gaze and storming out in tears. The staged breakdown, though humiliating,
    provides the cover Blanc needs to search unobserved. As she exits, Helen delivers
    a veiled warning to Whiskey, urging her to leave Duke, revealing her protective
    instincts and hinting at deeper tensions. The scene underscores Helen’s strategic
    compliance with Blanc’s plan while exposing the fragility of her emotional facade
    and the high-stakes tension of their investigation.
