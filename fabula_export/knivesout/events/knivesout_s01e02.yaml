- fabula_uuid: act_999150e49795153b
  number: 2
  summary: Helen, disguised as her deceased twin sister Andi, infiltrates Miles Bron's
    island with Benoit Blanc to uncover the truth behind Andi's murder and retrieve
    a crucial red envelope containing incriminating evidence. Helen meticulously snoops,
    gathering information that exposes the other disruptors' deep financial and reputational
    dependencies on Miles, revealing their motives to protect him. She learns of the
    dangerous, untested Klear fuel project, Birdie's sweatshop scandal, and Duke's
    desperate bid for an Alpha News position. The investigation intensifies with Helen
    navigating dangerous conversations and near-discoveries of her true identity.
    She uncovers a fax from Lionel to Miles containing Andi's incriminating email,
    directly linking Lionel to the cover-up. Duke's death further complicates the
    situation, and Helen is subsequently shot, though Andi's journal in her pocket
    miraculously saves her life. This close call provides a crucial cover for her
    continued investigation. Blanc then devises a plan for Helen to use the ensuing
    chaos to search Miles's central Glass Onion structure for the elusive red envelope.
