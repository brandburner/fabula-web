- fabula_uuid: cand_evt_scene_03ea4b3ed7ddb175_01
  global_id: null
  title: Miles destroys evidence and ignites rebellion
  description: "\n  Helen confronts Miles with the original napkin—Andi’s handwritten\
    \ proof of his involvement in her murder—only for Miles to burn it in front of\
    \ everyone, erasing the sole physical evidence. His smug dismissal of the act,\
    \ framed as a game, exposes the fragility of Helen’s case and the complicity of\
    \ the guests, who refuse to contradict him. Blanc, bound by procedural limits,\
    \ offers Helen a whiskey and a cryptic reminder of Andi’s reasons for leaving\
    \ before walking away. Helen’s grief and rage escalate into a destructive rampage,\
    \ smashing Miles’s prized possessions and setting the bar cart ablaze. The fire\
    \ spreads uncontrollably, revealing the island’s reliance on unstable Klear—a\
    \ moment of reckoning where Miles’s arrogance and the guests’ cowardice collide\
    \ with Helen’s defiance. The scene culminates in a flashback to Blanc’s subtle\
    \ nod, hinting at a hidden plan, as the fire consumes the room and the island’s\
    \ infrastructure begins to fail.\n  "
  episode_uuid: ep_sea_ser_knivesout_s01_e02
  scene_sequence: 124
  sequence_in_scene: 194
  key_dialogue:
  - 'HELEN: Recognize this? Andi''s handwriting. Gotcha, you son of a bitch.'
  - 'MILES: But second— ((ignites lighter)) ((napkin burns)) I don''t see anything?
    Everyone looks at each other, then back to him. They aren''t going to contradict
    him.'
  - 'MILES: You wanna take this to the cops? The courts? Pick your poison. Anywhere
    you go. It''s your version of the truth against mine. Let''s see how that goes.
    Probably about how it went for Andi.'
  - 'HELEN: (in tears) Blanc? I need you to do something.'
  - 'BLANC: I''m very sorry Helen. But this is where my jurisdiction ends. I have
    to answer to the police, to the courts. The system. There is nothing I can do.
    But maybe offer you courage. ((hands her the drink)) And a reminder of why your
    sister walked away in the first place.'
  - 'MILES: What do you want?'
  - 'HELEN: Yeah. ((places Klear crystal on the table)) With a reminder of why my
    sister walked away in the first place.'
