  title: Blanc exposes Helen’s poison plot
  description: 'Benoit Blanc’s revelation about Duke Cody’s pineapple allergy—exploited
    by Helen Brand to poison his drink—shatters the group’s fragile trust. Blanc’s
    outburst (''Duke does not dance with pineapple!'') triggers a cascade: Lionel,
    Claire, and Peg connect the dots to Helen’s identity as Cassandra Brand’s twin
    sister, exposing her hidden motive. The accusation isn’t just about murder; it’s
    a personal vendetta, and Blanc’s blunt assessment (''It''s just DUMB!'') underscores
    the recklessness of Helen’s plan. Birdie’s delayed realization (''Oh, you told
    me about Helen once...'') highlights the group’s collective denial, while the
    news article’s confirmation (''Survived by her sister Helen'') seals Helen’s guilt.
    The scene pivots from mystery to confrontation, with Blanc’s detective instincts
    forcing Helen into a corner. The lights cutting out mid-revelation amplifies the
    tension, leaving the group—and the audience—hanging on the precipice of Helen’s
    next move.'
