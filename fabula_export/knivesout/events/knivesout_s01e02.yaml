- fabula_uuid: act_8d762c6185857f2d
  number: 3
  summary: With the physical evidence of Andi's original napkin in hand, Blanc exposes
    Miles Bron as a fraud and an "idiot" who stole his ideas and committed murder.
    He reveals Miles's role in Duke's death, explaining that Miles poisoned Duke after
    Duke discovered Miles's presence at Andi's house on the night of her murder. Miles
    defiantly burns the original napkin, destroying the physical evidence and asserting
    his impunity. Faced with this blatant injustice, Helen, subtly encouraged by Blanc,
    unleashes a destructive rampage, setting fire to Miles's Klear-powered Glass Onion.
    The other disruptors, witnessing Miles's true nature and Helen's righteous fury,
    join her in destroying Miles's possessions and finally turn against him, confirming
    his lies and complicity. The climax culminates in the complete destruction of
    Miles's island empire and the Mona Lisa, ensuring his public downfall and Helen's
    vindication. The disruptors provide testimony against Miles, and Helen and Blanc
    leave the island, having achieved justice for Andi and dismantled Miles's empire
    of lies.
