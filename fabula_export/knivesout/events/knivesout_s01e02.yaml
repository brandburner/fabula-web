  title: Helen and Blanc refine Andi’s deception plan
  description: 'On the hotel terrace at night, Helen—disguised as Andi—approaches
    Blanc with palpable tension, her discomfort with the impersonation immediately
    evident. Blanc, methodical and detached, outlines a high-stakes strategy for her
    late arrival the next day, ensuring he can observe the guests’ reactions. Helen’s
    vulnerability surfaces when she admits her fear of boats, a detail Blanc dismisses
    as irrelevant, though it hints at deeper fragility that could undermine the deception.
    Their exchange reveals Blanc’s analytical precision and Helen’s desperate resolve,
    while her adoption of Andi’s ‘rich bitch’ voice and posture underscores the psychological
    toll of the impersonation. The scene pivots from logistical planning to emotional
    exposure when Helen presses Blanc about Miles Bron’s potential guilt, forcing
    him to confront the gap in their theory: why would anyone kill Andi to protect
    Miles? The tension escalates as Blanc redirects her to Andi’s journals, shifting
    focus to the past—specifically a decade-old bar where the guests’ shared history
    might hold the key to the present mystery. The moment is a microcosm of the story’s
    central conflict: deception as both tool and trap, where every calculated move
    risks unraveling under the weight of unspoken fears.'
