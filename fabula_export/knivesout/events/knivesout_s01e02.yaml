  title: Andi Delivers a Mysterious Box to Blanc
  description: 'The scene opens with an insistent knock at Blanc’s black-painted front
    door, disrupting the detective’s apparent lethargy (implied by Phillip’s teasing
    about his bath). When Phillip answers, he finds Andi—masked, visibly burdened
    by a heavy, unmarked box, and speaking with a softer, southern-accented voice
    that subtly contrasts with her usual demeanor. Her urgency and the box’s ominous
    weight immediately signal a critical development. Phillip’s guarded reaction—masking
    up and questioning her purpose—hints at the island’s heightened paranoia, while
    Andi’s physical strain and emotional vulnerability (slouched posture, pleading
    tone) suggest the box’s contents are not just heavy but *dangerous*. The exchange
    escalates tension by withholding answers: Andi’s insistence on seeing Blanc directly,
    her refusal to explain the box’s purpose, and Phillip’s abrupt summons of Blanc
    all imply this delivery is a turning point. The box’s familiarity (matching Miles
    Bron’s puzzle boxes) ties it to the larger mystery, while Andi’s altered appearance
    and voice foreshadow her true identity (Helen Brand) and her role as a catalyst
    for the unfolding crisis. The scene functions as a *revelation setup*: the box’s
    contents will force a confrontation, and Andi’s presence—both as a courier and
    a potential liar—will challenge Blanc’s investigative control.'
