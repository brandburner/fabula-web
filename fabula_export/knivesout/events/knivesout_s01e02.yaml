    thing, the real thing that this group has in common? ... Everybody knows who Lionel
    works for, that''s no secret, and we know who bankrolled Claire''s campaign. But
    when nobody would touch Birdie with a ten foot pole because she went on Oprah
    and compared herself to Harriet Tubman... can you guess who stepped up as an angel
    investor in Sweetie Pants? Or when Duke got banned from Twitch for hawking rhino
    horn boner pills to teenage boys... Who do you think set him up on YouTube and
    used his media empire to promote his stream? That''s the real common thread here.
    Every single one of you is holding on for dear life to Miles Bron''s golden titties.
    And every one of you will stab a friend in the back to hold on. That is what I
    believe.'
  - 'BLANC: It''s a dangerous thing isn''t it, to mistake speaking without thought
    for speaking the truth.'
