  title: Miles's public downfall and betrayal
  description: Outside the burning Glass Onion, Miles Bron—still reeling from Helen
    Brand’s destruction of his prized *Mona Lisa*—faces a devastating public confrontation.
    Helen delivers the final blow by exposing his criminal empire, stripping him of
    his power and legacy in front of his own allies. As the fire rages behind him,
    Birdie, Claire, and Lionel—each revealing damning evidence against him—turn their
    backs on Miles, leaving him isolated and broken. The moment marks the irreversible
    erosion of his control, both over his empire and the narrative of his life, as
    his carefully constructed facade crumbles under the weight of his own secrets.
    The betrayal is swift and brutal, underscoring the fragility of his alliances
    and the consequences of his actions. Helen’s departure solidifies his ruin, while
    the disruptors’ revelations ensure there is no escape from the truth he has spent
    years burying.
