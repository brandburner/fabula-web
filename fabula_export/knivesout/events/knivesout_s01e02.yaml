  title: Helen records Claire and Lionel’s confessions
  description: 'Helen covertly eavesdrops on Claire and Lionel’s private conversation
    at the pool’s deep end, where both admit to morally compromising decisions: Claire’s
    approval of a politically damaging power plant and Lionel’s authorization of the
    dangerous Klear substance for a manned mission. Their admissions reveal a pattern
    of mutual complicity, deepening the tension between personal ambition and the
    consequences of their actions. Meanwhile, Helen—disguised as Andi—slips a voice
    recorder into Birdie’s pool bag, exploiting Birdie’s distracted nostalgia to execute
    her surveillance. Blanc’s presence nearby, wading in the pool, subtly acknowledges
    Helen’s actions without interference, reinforcing the island’s web of distrust.
    The scene underscores Helen’s investigative determination and the fragility of
    the guests’ public personas, all while advancing the mystery’s central theme of
    hidden motives and shared guilt.'
