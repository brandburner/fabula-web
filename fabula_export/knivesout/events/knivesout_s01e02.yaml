  scene_sequence: 73
  sequence_in_scene: 127
  key_dialogue:
  - 'HELEN: That''s everything she said, I think.'
  - 'BLANC: Wow. I think maybe you should... take up drinking? You are just killing
    it.'
  - 'HELEN: Claire and Lionel were never there alone - but Duke came early and Birdie
    came late.'
  - 'BLANC: But they could have gotten there early, killed your sister then circled
    away and waited for the other to arrive.'
  - 'HELEN: Shit.'
  - 'BLANC: Something... something is teasing the edge of my brain. This case confounds
    me.'
  - 'HELEN: Well we don''t have motives for Duke or Birdie so -'
  - 'BLANC: One number... all his machines...'
  - 'HELEN: Holy shit...'
  - 'BLANC: From that afternoon, just minutes after she sent the email.'
  - 'HELEN: Lionel! It was Lionel!'
  - 'BLANC: Now hold on - this doesn''t mean he killed your sister, necessarily -'
  - 'DUKE: (into phone) Now. Right now, you go to him, do what you have to do, but
    push that son of a bitch. Get an answer from him. Babe. We need this. Do this
    one last time. Ok. Love you -'
