  title: Blanc delivers Duke’s death news to Andi
  description: 'Benoit Blanc, mid-pursuit of a fleeing figure, nearly collides with
    Cassandra ''Andi'' Brand in the dark island grounds. The abrupt physical encounter
    escalates into a verbal confrontation when Blanc—still breathless from the chase—immediately
    presses Andi about Duke Cody’s missing gun, his tone sharp with suspicion. Before
    she can fully react, Blanc delivers the devastating news of Duke’s murder with
    clinical precision, cutting off her protest mid-sentence. The revelation lands
    like a physical blow: Andi’s stunned exclamation (''What?!'') underscores the
    abruptness of the disclosure, while Blanc’s calculated timing suggests he’s using
    the shock value to gauge her reaction. The scene’s tension stems from the contrast
    between Blanc’s methodical interrogation and Andi’s visible unraveling, hinting
    at deeper layers of guilt, knowledge, or manipulation beneath her surface composure.
    The exchange also serves as a narrative pivot, shifting the investigation from
    speculative threats to confirmed violence and forcing Andi into a reactive, vulnerable
    position.'
