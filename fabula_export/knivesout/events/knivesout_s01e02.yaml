- fabula_uuid: cand_evt_scene_75d9fcd5a32cf963_02
  global_id: null
  title: Blanc Takes Command After Murder
  description: 'The discovery of Andi’s corpse—staged under dramatic lighting—shatters
    the illusion of a game, forcing the group into a moment of collective horror.
    Blanc, initially stunned, quickly shifts from shock to cold authority, his expression
    hardening as he surveys the scene. The lights flicker back on, revealing the guests—Claire,
    Lionel, Birdie, and Whiskey—rushing out to witness the body, their reactions ranging
    from revulsion to numbness. Miles Bron observes from above, detached, before Blanc
    seizes control, cutting off Claire’s instinctive concern for the body with a blunt
    declaration: *She’s not going anywhere.* His shift from methodical detective to
    decisive leader marks a turning point, as he herds the group inside, abandoning
    procedural caution for direct confrontation. The body becomes secondary; the truth
    must now be wrested from the guilty by force of will, signaling the escalation
    from mystery to survival. The scene underscores Blanc’s frustration with the game’s
    artifice and his growing suspicion that Miles is orchestrating the chaos, setting
    the stage for a confrontation that will test the group’s alliances and secrets.'
