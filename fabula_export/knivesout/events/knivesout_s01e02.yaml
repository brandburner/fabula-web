  sequence_in_scene: 111
  key_dialogue:
  - |-
    CLAIRE: I did it. Two weeks ago I did it.
    LIONEL: You signed off on the power plant?
    CLAIRE: Yeah. God help me. When this breaks, poof, my base is gone, all my grass roots, lefties. Gone.
  - |-
    LIONEL: I did it too.
    CLAIRE: Did what?
    LIONEL: I signed off on putting Klear in the manned mission. My staff doesn't know yet.
    CLAIRE: Goddammit. Let's hope Andi was wrong about this Klear stuff.
    LIONEL: No, she was right. You put its gas form into household pipes, you get massive leakage into the air, the hydrogen particles are too small.
    CLAIRE: Hydrogen gas—You're telling me it's gonna literally turn everyone's house into the Hindenburg.
  - 'BIRDIE: I''ll take care of him. Don''t worry. There was a time you know, back
    when I was the one who''d been on magazines, he was nobody, he couldn''t believe
    he was talking to me. He was this little thing in my hand. I preferred that.'
