  title: Helen and Blanc deduce the envelope’s hiding place
  description: "\n  Helen’s frustration with the guests’ misaligned motives in *Clue*—where\
    \ every player had reason to protect Miles—spurs a critical deduction: the killer\
    \ wouldn’t destroy the incriminating envelope but would instead hide it as a twisted\
    \ loyalty test for Miles. Blanc, pacing in thought, realizes the envelope must\
    \ be too large to carry undetected, narrowing its location to the guests’ private\
    \ rooms. Helen, now fully invested in the investigation, presses Blanc for a plan,\
    \ setting up their covert search during dinner. The exchange reveals Helen’s growing\
    \ trust in Blanc’s detective instincts while underscoring the personal stakes\
    \ of the investigation for her. The deduction shifts the mystery’s focus from\
    \ abstract clues to the intimate, secret-laden spaces of the guests’ villas, where\
    \ hidden motives and vulnerabilities may be exposed.\n  "
