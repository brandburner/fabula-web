- fabula_uuid: cand_evt_scene_eff98784868ee214_01
  global_id: null
  title: Blanc solves the murder mystery game
  description: "\n  In a scene that blurs the line between playful fiction and ominous\
    \ foreshadowing, Miles Bron reveals the weekend’s murder mystery game—a fabricated\
    \ crime where guests must individually solve his staged murder to win an iPad.\
    \ The reveal is met with mixed reactions: Claire and Lionel appear visibly uneasy,\
    \ Birdie and Peg sulk, and Duke seethes over the seating arrangement. Blanc, however,\
    \ seizes the moment with childlike enthusiasm, probing for a prize and then—with\
    \ a detective’s instinct—immediately solving the game’s puzzle before Miles can\
    \ even finish explaining the rules.\n\n  Blanc’s solution is a masterclass in\
    \ misdirection and deduction: he accuses Birdie of murdering Miles using a remote-controlled\
    \ crossbow, tying the crime to the stolen Wren Diamond. His evidence is meticulous—the\
    \ seating arrangement, the vintage Jayhawk crossbow, the 1998 *The Face* magazine,\
    \ and the locket around Miles’s neck containing the diamond. The table gasps as\
    \ Miles, visibly unnerved, opens the locket to reveal the diamond, confirming\
    \ Blanc’s theory. The scene ends with a theatrical crossbow bolt flipping from\
    \ Miles’s shirt, fake blood dripping, and the Mona Lisa’s glass sliding shut—a\
    \ moment that feels like a joke but lingers as an eerie premonition of the real\
    \ violence to come. The game’s solo nature and Blanc’s outsider status foreshadow\
    \ the isolation and distrust that will define the actual murders, while Miles’s\
    \ insistence on non-participation hints at his role as both orchestrator and potential\
    \ victim.\n  "
  episode_uuid: ep_sea_ser_knivesout_s01_e02
  scene_sequence: 27
  sequence_in_scene: 51
  key_dialogue:
  - 'MILES: Okay gang. It''s been a memorable weekend, already. And now the real fun
    starts. We''ve got three days we will be basking in the sun, the pool, swim in
    the Ionian Sea, great food and wine and each other''s company. But alongside and
    underneath the party, you''ve been charged with a serious task. Because tonight,
    in this very room, a murder will be committed. My murder. You will have to observe
    the crime carefully, use your knowledge of each other, and keep your eyes sharp—I''ve
    planted clues throughout the grounds. Some may be helpful. Some may misdirect.
    It''s up to you to decide. If by the end of the weekend somebody is able to name
    the murderer, tell how they accomplished it and what their motive was, you will
    win the game! Any questions?'
  - 'BLANC: What do we win?'
  - 'MILES: I - what do you mean what do you - what do you want? / BLANC: Oh no. Nothing.
    I thought maybe there was a prize or something. I don''t know. An iPad, or.'
  - 'BLANC: It was Birdie, who planted a remote device on the crossbow in revenge
    for you stealing her signature wren diamond. / See the seating arrangement, it
    triangulates Birdie perfectly to that thing— / which is loaded with a dummy bolt
    and aimed straight at Mr. Bron. I believe close inspection will reveal some sort
    of remote triggering device, but more damning, that''s a vintage Jayhawk brand
    crossbow... Jayhawk, Birdie Jay!'
  - 'BLANC: Mr. Bron! The large pendulous locket which has not left your neck, it''s
    a bit out of keeping with your breezy island style... would you kindly open it
    for us?'
  - 'BIRDIE: And so to be clear, back then I didn’t even know what a ''blood diamond''
    was—so'
