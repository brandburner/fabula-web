      state mirrors the emotional toll of the night: battered, but still holding secrets.'
  - object_uuid: object_67bdb6e47db1
    description_of_involvement: 'While Duke Cody’s gun is referenced as a potential
      tool for Helen and Blanc, its absence in this event is telling. Blanc’s question—''Did
      you take Duke’s gun?''—highlights its relevance as a weapon of last resort,
      but its unavailability forces them to improvise with the hot sauce and the staged
      death. The gun’s role here is negative: its absence raises the stakes, making
      Blanc’s ruse not just clever, but necessary. The mention of Duke’s death and
      the gun’s potential use underscores the killer’s escalation and the desperation
      of Blanc and Helen’s situation. The gun’s symbolic weight lies in what it represents—Duke’s
      strength, his impulsivity, and his ultimate vulnerability—all of which are now
      beyond reach.'
    status_before_event: Presumably in Duke’s possession or nearby, but inaccessible
      due to his death. Its whereabouts are unknown, but its potential as a weapon
      is a fleeting consideration in Blanc’s mind.
    status_after_event: Unchanged in physical state, but its symbolic role shifts.
      Its absence becomes a catalyst for Blanc’s improvisation, reinforcing the theme
      that the guests are now fighting with whatever tools they can scavenge—even
      hot sauce—rather than relying on brute force.
  - object_uuid: object_fb5c846c1f74
    description_of_involvement: 'The shattered glass window outside the Glass Onion
      is the event’s inciting incident, its fracture a visceral marker of the killer’s
      violence. The bullet that strikes it sends shards flying, amplifying the chaos
      and drawing the guests’ attention. The window’s role is purely environmental,
      but its destruction is critical: it creates the distraction Blanc needs to stage
      Helen’s death and the noise that masks her movement. The glass’s fracture pattern
      marks the bullet’s path, offering a forensic clue (though unnoticed in the moment),
      and its jagged shards crunch underfoot as Blanc herds the guests inside. The
      window’s destruction is a metaphor for the unraveling of the group’s facade—once
      pristine, now broken and irreparable.'
    status_before_event: Intact, a dark pane of glass reflecting the night sky. Its
      surface is smooth, unbroken, and ominous—a barrier between the guests and the
      unknown.
    status_after_event: Shattered, with jagged shards scattered across the ground.
      The frame is empty, the glass’s absence a physical reminder of the violence
      that unfolded. The window’s destruction is permanent, mirroring the irreversible
      nature of the night’s events.
  - object_uuid: object_1681b1cf6d8f
    description_of_involvement: 'The Glass Onion building looms as the ultimate prize
      in this event, its doors the threshold Helen must cross to retrieve the envelope.
      Blanc’s plan hinges on her ability to slip inside unnoticed while the guests
      are distracted by the staged death. The building’s role is twofold: first, as
      a symbol of Miles Bron’s control (the envelope is hidden within, a final layer
      of his game), and second, as the site of Helen’s desperate search. The Glass
      Onion’s windows, where the guests gather to react to Helen’s ''death,'' become
      a stage for their horror, while its interior remains a mystery—until Helen dashes
      inside. The building’s atmosphere is one of foreboding and urgency, its shadows
      hiding both the envelope and the killer’s next move.'
    status_before_event: Locked and unoccupied, save for the envelope hidden within.
      Its doors are closed, its interior dark, and its presence is ominous—a structure
      separate from the villa, with its own secrets.
    status_after_event: Helen’s entry disrupts its stillness. The envelope’s location
      is now the focus of her search, and the building’s role shifts from a distant
      threat to the heart of the action. Its doors are ajar, its interior explored,
      and its secrets on the verge of being uncovered.
  - object_uuid: object_14085da07395
    description_of_involvement: 'The broken glass from the shattered window becomes
