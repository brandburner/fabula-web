  title: Andi’s napkin sketch shifts group dynamics
  description: "\n  In a flashback to the Glass Onion bar, Andi subtly validates Miles’s\
    \ unorthodox ideas by sketching one on a napkin—a moment that draws the group’s\
    \ attention and marks a turning point in their dynamic. Lionel and Birdie initially\
    \ mock Miles’s past failures (Moviefone for foot massages), but Andi’s quiet endorsement\
    \ ('Let's just roll with it') signals her belief in his potential. Helen’s narration\
    \ (O.C.) reveals the ripple effects: Miles’s influence grows as he secures Birdie\
    \ a design show, publishes Lionel, boosts Duke’s Twitch career, and helps Claire’s\
    \ political rise. The napkin sketch—later revealed as the origin of Alpha—becomes\
    \ the symbolic catalyst for their collective transformation, from skepticism to\
    \ loyalty, foreshadowing the moral compromises that will define their future.\
    \ The scene underscores Andi’s role as the group’s moral compass and Miles’s manipulative\
    \ charm, while the flashback’s framing (Helen’s narration) adds layers of irony:\
    \ what began as playful indulgence became a billion-dollar empire built on betrayal.\n\
