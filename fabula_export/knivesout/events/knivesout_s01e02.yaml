  title: Blanc slaps Miles in blackout panic
  description: "\n  The lounge erupts into chaos as Miles Bron spirals into paranoia\
    \ after realizing Duke Cody drank from his poisoned glass—a revelation that implicates\
    \ him as the intended target. Blanc attempts to restore order, but Miles's escalating\
    \ panic (triggered by the 10 PM deadline from his murder game) forces Blanc to\
    \ physically intervene with a sharp slap to snap him out of it. Just as Blanc\
    \ demands answers—*What happens at ten o’clock?*—the island’s power fails, plunging\
    \ the room into total darkness. The blackout isn’t just a technical failure; it’s\
    \ a narrative pivot, stripping away control and forcing the characters (and audience)\
    \ into uncharted territory where secrets may finally surface—or danger may strike.\
    \ The slap and the lights-out sequence together create a duality of power and\
    \ vulnerability, marking a turning point in the investigation’s stakes.\n  "
