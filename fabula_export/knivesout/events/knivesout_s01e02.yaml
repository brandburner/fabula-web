    her fatal overconfidence. Miles, seated across from her at her kitchen table,
    speaks softly while she listens with cold detachment, unaware of the poison already
    working through her system. Blanc’s voiceover reveals Andi’s fatal flaw: her arrogance
    blinded her to the obvious threat—Miles himself—until the moment her consciousness
    fades. The irony deepens as Miles, distracted by a spider, gently releases it
    out the window, oblivious to her collapse. Her head strikes the table with finality,
    underscoring the tragic irony of her intelligence being her undoing. The scene
    serves as a turning point, revealing Andi’s complicity in the game’s deadly mechanics
    and Miles’ calculated betrayal, while foreshadowing the consequences of underestimating
    one’s adversary.'
