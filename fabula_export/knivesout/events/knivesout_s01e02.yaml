  title: Helen’s frantic chase redirected by Blanc
  description: 'Helen, disoriented and desperate, races through the darkened hallways
    in pursuit of Miles Bron, her twin sister’s suspected killer. Her frantic movement—blind,
    erratic—reveals the unraveling of her composure, a stark contrast to her earlier
    restrained demeanor. When Blanc’s voice cuts through the tension, calling out
    ‘Andi!’ (the alias Helen has used to infiltrate the island), she halts abruptly,
    her body language shifting from frenzied pursuit to momentary confusion. The moment
    exposes her duality: the grieving sister and the calculated investigator. Blanc’s
    intervention isn’t just a redirection—it’s a strategic interruption, forcing Helen
    to abandon her impulsive chase and engage with the detective’s agenda. Lionel’s
    silent emergence afterward, observing from the shadows, hints at his complicity
    or awareness of the deeper game being played. The beat underscores the shifting
    power dynamics: Helen’s desperation is now tethered to Blanc’s control, while
    Lionel’s presence suggests an unspoken alliance or hidden motive that could reshape
    the investigation’s trajectory.'
