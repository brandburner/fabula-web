  title: Andi’s Destructive Rage Over Stolen Idea
  description: 'In a flashback to Andi’s cluttered living room, she sits numbly on
    her couch, staring at an iPad displaying a Forbes article about Miles Bron’s sudden
    success with the ‘idea napkin’—a concept she recognizes as her own. The article’s
    headline and accompanying imagery confirm her worst fears: Miles has not only
    stolen her work but has profited from it, erasing her contribution entirely. The
    weight of this betrayal snaps something in her. With a sudden, violent outburst,
    she hurls the iPad across the room, then escalates into a frenzied destruction
    of her own space—flipping the coffee table, sweeping books off shelves, and reducing
    her living room to chaos. The scene is a raw, unfiltered display of her emotional
    collapse, revealing the depth of her humiliation, the fragility of her self-worth,
    and the extent to which Miles’s betrayal has unraveled her. This moment serves
    as a turning point in her psychological unraveling, marking the beginning of her
    descent into a place where rage and grief blur into a single, consuming force.
    The destruction is not just physical; it symbolizes the shattering of her trust,
    her identity as a creative force, and her faith in the people she once considered
    allies. Helen’s voiceover later contextualizes this as the moment Andi’s worldview
    irrevocably shifted, setting the stage for her later actions on the island and
    her eventual confrontation with Miles.'
