  key_dialogue:
  - 'BLANC: Mr. Bron, the truth is, I ruined your game on purpose, and for a very
    good reason. I like the glass onion as a metaphor, an object that seems densely
    layered, but in reality the center is in plain sight. Your relationships with
    these people may seem complex but look at the center, look at what you''ve done
    this weekend, it''s crystal clear: you have taken seven people, each of whom has
    a real life reason to wish you harm, gathered them together on a remote island,
    and placed the idea of your murder in their heads. It''s like putting a loaded
    gun on the table and turning off the lights.'
  - 'MILES: Oh Andi. Andi used to tell me the truth. Nobody does that now. Nobody
    does. It''s all fake smiles and agendas, people wanting what they think they''re
    owed. Hating you for not giving it to them, cause that''s what you''re there for.'
  - 'BLANC: Yes. Andi.'
