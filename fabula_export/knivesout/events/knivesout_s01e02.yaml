  scene_sequence: 26
  sequence_in_scene: 49
  key_dialogue:
  - 'MILES: Welcome gang. Some pre-murder drinks, I''ve mixed everyone''s favorites.
    And we''ve got tamales.'
  - 'CLAIRE: Ok. I know your whole thing with it, but... but this place is like the
    Tate Modern, why would you hang a framed print of the Mona Lisa front and center?
    It''s like a Che poster in a dorm room.'
  - 'MILES: Or?'
  - 'LIONEL: No. No. Because I was clear with you. I told you, I need two years minimum
    to test the stuff and even see if this stuff is safe or even viable, Claire and
    I are NOT going to be responsible for putting something out in the world before
    it is tested...oh no...'
  - 'MILES: Oh yeah.'
  - 'LIONEL: No.'
  - 'MILES: You''re not getting out, it''s already happening. Love you. Let''s eat.'
