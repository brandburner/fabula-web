- fabula_uuid: cand_evt_scene_ce5572c8d2294acb_01
  global_id: null
  title: Blanc exposes Miles' lethal game design
  description: "\n  In Miles Bron’s glass-walled office, Benoit Blanc—initially giddy\
    \ from dismantling the murder mystery game—drops his playful demeanor to deliver\
    \ a brutal assessment of Miles’ reckless orchestration. Blanc reveals he sabotaged\
    \ the game intentionally, framing Miles’ weekend as a dangerous psychological\
    \ experiment: seven guests, each with real-life motives to harm him, isolated\
    \ on an island with murder as the central premise. Blanc methodically exposes\
    \ Miles’ leverage over the guests—blackmailing Lionel over a rocket project, pressuring\
    \ Claire’s election, exploiting Birdie’s labor practices, and implicating Duke\
    \ in a hidden conflict—while Miles deflects with feigned indifference. The confrontation\
    \ pivots to a faded napkin and Polaroid from a decade earlier, capturing Miles\
    \ and Andi Brand at the original Glass Onion bar, where Alpha Cosmetics was conceived.\
    \ The photo’s nostalgic weight contrasts with Blanc’s warning: *‘For at least\
    \ one person on this island, this is not a game.’* Miles’ vulnerability surfaces\
    \ as he laments the loss of authenticity in his relationships, his bitterness\
    \ revealing the emotional core of his manipulations. The scene escalates from\
    \ a game’s collapse to a revelation of Miles’ self-destructive patterns, foreshadowing\
    \ the real violence to come.\n  "
  episode_uuid: ep_sea_ser_knivesout_s01_e02
  scene_sequence: 28
  sequence_in_scene: 53
  key_dialogue:
  - 'BLANC: "Mr. Bron, the truth is, I ruined your game on purpose, and for a very
    good reason. I like the glass onion as a metaphor, an object that seems densely
    layered, but in reality the center is in plain sight. Your relationships with
    these people may seem complex but look at the center, look at what you''ve done
    this weekend, it''s crystal clear: you have taken seven people, each of whom has
    a real life reason to wish you harm, gathered them together on a remote island,
    and placed the idea of your murder in their heads. It''s like putting a loaded
    gun on the table and turning off the lights."'
  - 'BLANC: "Birdie. Bangladesh. Sweetie Pants are manufactured there, in a sweat
    shop. You''re making Birdie take the fall, to cover your ass as the main investor.
    And Duke. Well. We all know why Duke wants to kill you."'
  - 'MILES: "Oh Andi. ... Andi used to tell me the truth. Nobody does that now. Nobody
    does. It''s all fake smiles and agendas, people wanting what they think they''re
    owed. Hating you for not giving it to them, cause that''s what you''re there for."'
  - 'BLANC: "Take my presence as a sign—something is happening here beneath the surface.
    For at least one person on this island, this is not a game."'
