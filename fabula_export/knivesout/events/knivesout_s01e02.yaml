    body of her identical twin sister, Andi, whose suicide is confirmed by the coroner.
    The coroner lifts the sheet to reveal Andi’s face—identical to Helen’s but with
    the shorter hair seen in the present timeline—exposing the raw, unfiltered grief
    Helen has suppressed. Her whispered confirmation ('My sister committed suicide')
    and physical retreat ('Helen nods, mouths 'yes' and steps away quickly') underscore
    the trauma of this moment, which serves as the emotional anchor for Helen’s vulnerability
    in the present. The flashback solidifies the tragic bond between the twins and
    primes Helen’s unresolved grief, which will later unravel her composure during
    the investigation. The scene’s stark visual contrast—Helen’s living presence versus
    Andi’s stillness—heightens the emotional weight, reinforcing the stakes of Helen’s
    deception and her desperate need to uncover the truth behind Andi’s death.
