      bar cart, transforming the scene from controlled destruction into an uncontrollable
      inferno. The lighter, a symbol of Miles’s power and casual arrogance, becomes
      the instrument of his undoing. Its blue flame—initially used to destroy the
      napkin—now reveals the island’s hidden vulnerability, as the fire spreads through
      Klear-infused vents and ducts. The lighter’s role is dual: it is both a tool
      of destruction and a metaphor for the volatile, unstable systems Miles has built.'
