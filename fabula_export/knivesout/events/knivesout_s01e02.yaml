  title: Andi’s execution cuts Blanc’s interrogation short
  description: 'Benoit Blanc, desperate to extract a final critical truth from Cassandra
    ''Andi'' Brand, presses her in a tense confrontation outside the Glass Onion.
    Their exchange is abruptly terminated when a sniper’s bullet shatters a window
    and strikes Andi in the chest, killing her instantly. The violence is sudden,
    brutal, and silent—only the sound of the gunshot and the splintering glass betray
    the attack. Blanc is left stunned, the interrogation unresolved, as the island’s
    murder mystery game transforms into a lethal reality. The moment forces Blanc
    to confront that the stakes have escalated beyond a puzzle: someone is willing
    to kill to keep secrets buried. The event serves as a brutal turning point, eliminating
    a key witness and escalating the narrative from psychological tension to physical
    survival. The lack of foreshadowing or visual cues about the sniper’s presence
    makes the violence feel even more jarring, reinforcing the theme of hidden threats
    lurking beneath the island’s veneer of civility.'
