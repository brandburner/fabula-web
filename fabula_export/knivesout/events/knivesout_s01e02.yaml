  title: Miles panics and buys Blanc’s loyalty
  description: After discovering Duke’s death and the boat’s delayed departure, Miles
    spirals into paranoia when he realizes Duke drank from his poisoned glass—a flashback
    confirms the accidental swap. Terrified of being the next target, Miles offers
    Blanc a billion-dollar bribe to protect him, exposing his moral decay and fracturing
    the group’s fragile trust. Blanc silences Miles’s phone, but the detective’s methodical
    approach (noting Duke’s missing gun and phone) contrasts sharply with Miles’s
    unraveling. The lights suddenly cut out at 10 PM, plunging the room into darkness
    and escalating the tension. Miles’s panic reveals his desperation to control the
    situation, even as his actions alienate the others and deepen the mystery of who—or
    what—is orchestrating the chaos on the island.
