  title: Blanc exposes Miles' deliberate murder of Duke
  description: "\n  In a devastating flashback sequence, Benoit Blanc dismantles Miles\
    \ Bron's carefully constructed alibi by forcing the group to confront the unvarnished\
    \ truth: Miles *intentionally* handed Duke the poisoned glass. The revelation\
    \ comes through two key flashbacks—first, the false memory Miles planted (Duke\
    \ accidentally grabbing the wrong glass), and second, the *actual* footage (Miles\
    \ deliberately passing his glass to Duke). Blanc's surgical deconstruction of\
    \ the moment—'You handed Duke your own glass. Clear as crystal. Right in front\
    \ of our eyes.'—exposes Miles' premeditation and forces the group to question\
    \ their own complicity in accepting his lies. The scene pivots from Miles' smug\
    \ denial ('Oh please. Just tell us, who tried to kill me?') to Blanc's brutal\
    \ indictment ('Nobody tried to kill you, you vainglorious buffoon'), transforming\
    \ Miles from host to prime suspect. The flashback's stark visual contrast (Miles'\
    \ overt, deliberate action vs. the group's false recollection) underscores the\
    \ theme of perception vs. reality, while Blanc's line—'Like everyone in the world\
    \ I assumed that Miles Bron was a complicated genius. But why?'—hints at the broader\
    \ narrative of how Miles' fraudulent persona enabled his crimes. The moment shatters\
    \ the group's trust in Miles and accelerates the investigation's focus on his\
    \ motives, particularly his role in Andi's death.\n  "
