    the garden’s disorienting red lights and mechanical voice, her usual composure
    shattered. The robotic reprimands—*‘This is a smokeless garden... Please keep
    our water clean’*—only heighten her confusion as she takes a defensive stance,
    scanning the foliage. When she spots Benoit Blanc emerging from the trees, her
    raw, unguarded cry of *‘Blanc!’* marks a critical fracture in her controlled demeanor.
    This moment reveals her vulnerability and the escalating stakes of the island’s
    deadly game, as her plea for help or answers underscores her desperation and the
    urgency of their shared mission. The scene pivots from physical chaos to emotional
    exposure, forcing Blanc to confront Helen’s fragility and the deeper threat lurking
    beneath the island’s veneer of civility.
