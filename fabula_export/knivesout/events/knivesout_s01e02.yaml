  title: Andi’s fatal realization and death
  description: 'In a flashback to Andi’s final moments, Blanc’s narration reveals
    her tragic underestimation of Miles Bron. As they sit at her kitchen table, Miles
    speaks softly, almost pleadingly, while Andi watches him with cold detachment,
    unaware of the poison already working through her system. Blanc’s voiceover underscores
    her fatal flaw: her intelligence blinded her to the obvious threat—Miles himself.
    The moment of realization hits her too late, her eyes widening in horror as consciousness
    slips away. Miles, oblivious, is distracted by a spider on the table, gently releasing
    it out the window before Andi’s head collapses onto the table with a final, irreversible
    thud. The scene underscores the irony of her downfall—her brilliance was her undoing—and
    the chilling indifference of her killer, who remains unaware of her death until
    it’s too late. This moment serves as both a turning point in the mystery and a
    thematic commentary on arrogance and vulnerability.'
