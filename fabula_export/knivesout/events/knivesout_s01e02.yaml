    description_of_involvement: The jetty serves as a fraught threshold between the
      mainland’s normalcy and Miles Bron’s island of isolation. Its wooden planks
      stretch into the crystal blue sea, a liminal space where the group’s insular
      dynamics are first tested by Blanc’s arrival and Andi’s spectral return. The
      jetty’s exposed position—bathed in sunlight but surrounded by the vast ocean—creates
      a sense of vulnerability, as if the group is already adrift before boarding
      the boat. The distant explosions heard during the event add a layer of unease,
      hinting at unseen dangers beyond their control. The jetty’s role in this event
      is to strip away the group’s illusions of safety, forcing them to confront the
      uncertainties ahead.
    observed_atmosphere: Tension-filled with whispered conversations and collective
      shock, the jetty’s open expanse amplifies the group’s unease and the weight
      of their unspoken histories.
    functional_role: A transitional space where the group’s dynamics are tested and
      their submission to Bron’s protocols begins.
    symbolic_significance: Represents the threshold between the known (mainland) and
      the unknown (Bron’s island), as well as the group’s fragile stability before
      it is shattered by Andi’s return.
    access_restrictions: Open to the group and the Efficient Man, but the arrival
      of the Greek taxi (and Andi) disrupts the controlled environment.
