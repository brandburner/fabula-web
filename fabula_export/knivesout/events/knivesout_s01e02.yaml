    in a state of heightened paranoia, his movements erratic as he listens for unseen
    threats. The sweeping beam of a flashlight cuts through the blackness, briefly
    illuminating his panicked figure before he disappears around a corner. Meanwhile,
    Andi—Cassandra Brand—stands motionless in the foreground, her sharp instincts
    immediately locking onto Miles’s retreat. The tension escalates when Blanc’s voice
    cuts through the silence, calling out to her: ''Andi!'' The moment crystallizes
    their proximity, with Blanc’s voice acting as a tether between them. Andi’s hesitation—her
    head turning toward Blanc’s call—reveals her divided focus: she is torn between
    pursuing Miles (whose behavior suggests guilt or fear) and acknowledging Blanc’s
    presence. The suffocating darkness amplifies the stakes, as every shadow could
    conceal a threat or a revelation. This encounter is a turning point, forcing Andi
    to choose between her own agenda and the detective’s growing suspicion, while
    Miles’s disappearance deepens the mystery of his involvement in the unfolding
    chaos.'
