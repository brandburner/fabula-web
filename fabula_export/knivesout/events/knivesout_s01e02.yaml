  title: Helen confronts Claire over Andi’s last night
  description: Helen, still processing the events of Andi’s death, presses Claire
    for answers about their group’s actions the night Andi died. Claire’s evasive
    responses—particularly her refusal to confirm or deny whether they intended to
    stop Andi from using the red envelope—betray their complicity. Helen’s dawning
    realization, fueled by Claire’s silence, escalates into a charged standoff. The
    confrontation ends with Helen storming off, her suspicions now confirmed by Claire’s
    refusal to deny the truth. The scene underscores the group’s fractured trust and
    Helen’s growing isolation as she seeks answers about her sister’s death. Claire’s
    lingering unease and Lionel’s observation of the exchange hint at deeper tensions
    simmering beneath the surface, foreshadowing further conflict among the guests.
