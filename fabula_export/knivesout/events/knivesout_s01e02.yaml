    guests, but Miles insists only five boxes were made—none for Blanc. The revelation
    forces Blanc into a state of heightened suspicion, while Miles, dismissing it
    as a prank, formally invites him to stay anyway. The exchange underscores the
    fragility of the weekend’s facade: Blanc’s presence, though now sanctioned, is
    no longer a welcome surprise but a disruptive variable in Miles’ meticulously
    controlled game. The moment marks a shift from playful intrigue to genuine unease,
    as Blanc’s detective instincts override his initial enthusiasm, and Miles’ casual
    authority begins to unravel under scrutiny.'
