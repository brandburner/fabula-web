- fabula_uuid: cand_evt_scene_3864483567988e1a_02
  global_id: null
  title: Birdie’s Forced Humiliation and Andi’s Reckoning
  description: |2

    This scene exposes the fragility of the group’s alliances and Miles’ manipulative control over his so-called 'disruptors.' The poolside gathering begins with superficial camaraderie—Birdie’s performative charm, Claire’s quiet defiance, and Duke’s reckless gunfire—but quickly devolves into a power play when Peg forces Birdie to beg Miles for financial aid, revealing her precarious social and economic position. Birdie’s flashback to her past with Miles underscores her resentment and the group’s parasitic dependence on him. The tension escalates when Andi, Miles’ former business partner, arrives unannounced and publicly dismantles the group’s self-mythology, exposing their shared reliance on Miles’ money and influence. Her outburst—'golden titties leeches'—strips away the veneer of their 'disruptive' identities, leaving them exposed as opportunists clinging to Miles’ favor. Blanc’s quiet observation about Birdie’s 'truth-telling' and Andi’s explosive confrontation mark a turning point, fracturing the group’s fragile unity and setting up deeper conflicts to come.
