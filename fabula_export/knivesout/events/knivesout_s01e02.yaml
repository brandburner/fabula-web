- fabula_uuid: cand_evt_scene_ce5572c8d2294acb_02
  global_id: null
  title: Blanc exposes the guests' true motives
  description: "\n  In Miles Bron’s glass-enclosed office, Detective Benoit Blanc\
    \ deliberately dismantles the carefully orchestrated murder mystery game Miles\
    \ had designed, revealing his true intent: to expose the guests’ hidden motives\
    \ and the dangerous reality beneath the facade. Blanc systematically accuses Miles\
    \ of manipulating each guest—Lionel with threats to his reputation, Claire with\
    \ election interference, Birdie with labor exploitation, and Duke with a personal\
    \ vendetta—while Miles, initially defensive, grows increasingly unsettled. The\
    \ confrontation escalates when Blanc spots a framed napkin and Polaroid from Miles’s\
    \ past, triggering a raw, unguarded confession about Andi Brand, the only person\
    \ who ever saw him as more than a weapon. The moment forces Miles to confront\
    \ the fragility of his present identity and the deadly consequences of his manipulations,\
    \ while Blanc’s revelations shatter the illusion of control Miles had over the\
    \ weekend’s events. The tension peaks as Blanc’s accusations force Miles to acknowledge\
    \ the real danger he’s created: a group of people with genuine reasons to harm\
    \ him, now primed to act.\n  "
  episode_uuid: ep_sea_ser_knivesout_s01_e02
  scene_sequence: 28
  sequence_in_scene: 54
  key_dialogue:
  - 'BLANC: Mr. Bron, the truth is, I ruined your game on purpose, and for a very
    good reason. I like the glass onion as a metaphor, an object that seems densely
    layered, but in reality the center is in plain sight. Your relationships with
    these people may seem complex but look at the center, look at what you''ve done
    this weekend, it''s crystal clear: you have taken seven people, each of whom has
    a real life reason to wish you harm, gathered them together on a remote island,
    and placed the idea of your murder in their heads. It''s like putting a loaded
    gun on the table and turning off the lights.'
  - 'MILES: Oh Andi. Andi used to tell me the truth. Nobody does that now. Nobody
    does. It''s all fake smiles and agendas, people wanting what they think they''re
    owed. Hating you for not giving it to them, cause that''s what you''re there for.
    I know. Hard to have sympathy for the poor tortured billionaire.'
  - 'BLANC: Take my presence as a sign—something is happening here beneath the surface.
    For at least one person on this island, this is not a game.'
