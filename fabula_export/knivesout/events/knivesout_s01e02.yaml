- fabula_uuid: cand_evt_scene_7d761dd132e12b57_02
  global_id: null
  title: Duke’s Humiliation and the Box Arrives
  description: "\n  The scene opens with Duke Cody mid-live YouTube broadcast, spouting\
    \ his signature misogynistic rhetoric in a carefully staged garage setup that\
    \ belies the shabby reality behind him. His girlfriend Whiskey plays along, reinforcing\
    \ his toxic persona, but the illusion shatters when his mother storms in, slaps\
    \ him, and publicly humiliates him for dismissing her. The confrontation forces\
    \ Duke into a rare moment of submission, his bravado crumbling under her Jersey-accented\
    \ authority. Just as the tension peaks, his mother abruptly shifts gears, informing\
    \ him of a delivery in the kitchen—an interruption that feels deliberate, as if\
    \ the universe itself is mocking his fragility. The scene cuts away before the\
