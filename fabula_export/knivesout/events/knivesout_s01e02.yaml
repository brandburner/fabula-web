  title: Helen’s confrontation with Claire
  description: Helen, visibly agitated, ambushes Claire on the island grounds, accusing
    her of evasion and cowardice over their unresolved courtroom history. Claire,
    initially composed, counters with a chillingly precise dissection of Helen’s own
    unreliability—her unanswered calls, her new phone number, and Duke’s revelation
    that he visited her home when she was unreachable. The exchange escalates from
    personal recrimination to a raw exposure of Helen’s inconsistencies, forcing her
    into a defensive spiral. Duke’s silent presence as a witness amplifies the tension,
    while Claire’s political caution (‘I never email anything I wouldn’t want on the
    front page’) underscores the high stakes of their fractured trust. The confrontation
    lays bare Helen’s desperation to control the narrative, but Claire’s strategic
    calm and Duke’s corroboration undermine her, deepening the mystery of her true
    motives and her connection to the island’s secrets. The scene pivots from Helen’s
    offensive to her defensive exposure, shifting the power dynamic and reinforcing
    the theme of hidden agendas among the guests.
