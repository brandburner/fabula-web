  description: "\nThis scene at the pool reveals the brittle dynamics of Miles Bron’s\
    \ inner circle while Blanc subtly begins dismantling their facades. The surface-level\
    \ camaraderie—Birdie’s performative confidence, Duke’s machismo, Miles’ self-mythologizing—collapses\
    \ under Andi’s explosive truth-telling, which lays bare their parasitic relationship\
    \ with Miles. Blanc’s quiet observation of Birdie’s unraveling (triggered by Peg’s\
    \ urgent plea for her to beg Miles) and his razor-sharp psychological probe (‘mistake\
    \ speaking without thought for speaking the truth’) expose her as a woman clinging\
    \ to a past glory she can’t reclaim. Meanwhile, Andi’s outburst—‘golden titties\
    \ leeches’—destroys the illusion of mutual respect, forcing Claire to confront\
    \ her own complicity. The scene’s tension escalates from Duke’s gunfire stunt\
    \ to Andi’s unhinged intensity, culminating in a moment where Miles’ ‘disruptor’\
    \ philosophy is revealed as a hollow justification for his control. Blanc’s role\
    \ shifts from passive observer to active investigator, while the group’s fractures\
    \ deepen, setting up the evening’s confrontation.\n  "
