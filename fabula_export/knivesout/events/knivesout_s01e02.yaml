      being laid bare. The terrace is where Helen confronts Blanc with the evidence,
      where the impersonation plan is born, and where the weight of their decision
      hangs in the air. Its shimmering water (described in the cut to night) reflects
      the duality of the island—beauty and danger, allure and peril. The terrace is
      a threshold: the place where Helen’s old life ends and her new role as Andi
      begins. Its atmosphere is charged with tension, the air thick with the scent
      of Blanc’s cigar and the unspoken fear of what’s to come.'
    observed_atmosphere: Tension-filled with whispered conversations and unspoken
      fears, the air thick with the scent of cigar smoke and the weight of the decision.
      The shimmering water at the scene’s end adds a layer of foreboding, its beauty
      masking the danger beneath.
    functional_role: Neutral ground for confrontation and planning, a place of revelation
      and commitment. The terrace is where Helen’s grief is transformed into action,
      and Blanc’s intellect is put to the test.
