  - object_uuid: object_3c4b70b87334
    description_of_involvement: 'The Efficient Man’s gun-shaped throat-spray device
      is the centerpiece of the ritual, symbolizing Miles Bron’s control over the
      group. He uses it to administer a burst of compressed mist into each guest’s
      throat, forcing gags and discomfort. The device’s clinical, almost violent design
      (resembling a gun) reinforces the coercive nature of the ritual, while the white
      rubber wristbands distributed afterward serve as a mark of compliance. Blanc’s
      skepticism about the spray (‘So is it, was that a disinfectant, some sort of
      -’) highlights its unexplained purpose, adding to the tension. The device’s
      role is twofold: it enforces Miles’ authority and prepares the group for the
      psychological unraveling to come.'
    status_before_event: Stored in the Efficient Man’s possession, fully charged and
      ready for use. The device is a tool of institutional control, designed to be
      intimidating and efficient.
    status_after_event: Discharged after use on all guests, including Andi. The device
      is returned to the Efficient Man’s possession, its purpose fulfilled for now,
      though its long-term implications remain unclear.
