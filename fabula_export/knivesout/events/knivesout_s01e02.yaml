  global_id: null
  title: Duke’s Death Reveals the Game’s Deadly Stakes
  description: |2

    The lounge’s festive veneer shatters when Duke Cody collapses mid-toast, his violent death immediately ruled a homicide by Detective Blanc. The scene escalates from tense social maneuvering—where Duke weaponizes his online success to extort Miles Bron and Andi Brand is publicly humiliated—to a murder investigation. Blanc’s clinical assessment that Duke was poisoned transforms the gathering from a high-stakes social game into a deadly reality, forcing the guests to confront their own secrets and the killer’s unseen agenda. The revelation halts the party, exposing the ‘game’ as a lethal facade and trapping the guests between their own vulnerabilities and the island’s growing threat. Miles’s shock and the group’s panic underscore the irreversible stakes, while Blanc’s intervention shifts the dynamic from playful deception to a high-stakes murder inquiry.
