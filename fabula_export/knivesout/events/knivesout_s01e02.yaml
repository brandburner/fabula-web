    forthcoming revelation lands with maximum weight. This moment isn’t just about
    information—it’s about control. By withholding the next beat, Blanc forces the
    characters (and the audience) to confront the gravity of the situation, making
    the eventual disclosure feel like a turning point rather than mere exposition.
