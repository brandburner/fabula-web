- fabula_uuid: cand_evt_scene_4209903711eac62f_01
  global_id: null
  title: Fax Reveals Lionel’s Hidden Link
  description: 'In the gym, Blanc and Helen’s meticulous suspect analysis hits a wall
    as they debate alibis for Claire, Lionel, Duke, and Birdie—Helen’s frustration
    mounting when Blanc suggests they lack clear motives for Duke or Birdie. Their
    exchange is abruptly interrupted when a fax machine spits out a critical document:
    a copy of Andi’s incriminating email to Miles Bron, this time with Lionel Toussaint’s
    name as the sender. The discovery forces Blanc to confront a suspect he may have
    overlooked, while Helen’s investigative rigor proves decisive in unmasking a hidden
    truth. The moment is charged with tension as Blanc realizes the fax’s implications,
    only to be distracted by Duke’s covert phone call—revealing his own hidden coercion—before
    Helen’s exhaustion causes her to doze off mid-investigation. The event pivots
    from analytical frustration to a revelatory breakthrough, underscoring the case’s
    labyrinthine complexity and the fragility of their collaboration.'
