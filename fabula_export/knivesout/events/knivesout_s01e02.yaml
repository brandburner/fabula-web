  - |-
    LIONEL: I did it too.
    CLAIRE: Did what?
    LIONEL: I signed off on putting Klear in the manned mission. My staff doesn't know yet.
    CLAIRE: Goddammit. Let's hope Andi was wrong about this Klear stuff
    LIONEL: No she was right. You put its gas form into household pipes you get massive leakage into the air, the hydrogen particles are too small.
