  title: Blanc and Andi bond over shared discomfort
  description: As the group disembarks onto Miles Bron’s private island, the ostentatious
    welcome—marked by Miles’ theatrical guitar performance and effusive greetings—creates
    an immediate contrast with Benoit Blanc’s quiet unease. Blanc’s discomfort with
    the spectacle is mirrored by Cassandra 'Andi' Brand, whose cold demeanor and blunt
    assessment of the situation ('This rich people shit is weird') serve as a catalyst
    for their first meaningful exchange. While the other guests eagerly follow Miles
    into the compound, Blanc lingers, visibly relieved when Andi acknowledges his
    discomfort with a dry observation about his untied shoelace. Their brief, understated
    conversation—rooted in mutual skepticism—hints at a potential alliance between
    the two outsiders, both of whom seem ill at ease with the island’s performative
    luxury and Miles’ manipulative charm. The moment underscores their shared status
    as outsiders, setting up a dynamic where their distrust of the situation (and
    each other) could either isolate them or bind them together in the unfolding mystery.
