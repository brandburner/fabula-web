  title: Helen’s search interrupted by Cassandra’s death
  description: Helen’s frantic, exhausted search through Duke’s ransacked villa for
    a critical envelope is abruptly derailed when she discovers news of her twin sister
    Cassandra’s death. The revelation—initially dismissed as a distraction—shifts
    her focus from the physical hunt to the escalating stakes of the murder mystery.
    Her emotional shock is compounded when Whiskey, Duke’s volatile girlfriend, misinterprets
    Helen’s callous remark about Duke’s death as a confession and violently attacks
    her with a spear gun. The scene escalates from tense investigation to life-threatening
    chaos, forcing Helen to flee as the lights cut out and the spear misses her by
    inches. The dual revelations (Cassandra’s death and Whiskey’s violent outburst)
    heighten the urgency of Helen’s investigation, confirming that the game has turned
    deadly real. The moment also underscores Helen’s vulnerability—caught between
    grief, guilt, and the need to act—while exposing Whiskey’s unstable, reactive
    nature as a potential threat.
