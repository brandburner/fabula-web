    the tragic death of Andi—Miles Bron’s late wife—to coerce him into a collaboration
    with *Alpha News*. The revelation of Andi’s death, displayed on Duke’s phone,
    catches Miles off-guard, exposing his raw grief beneath his usual composed demeanor.
    Duke leverages the moment, demanding Miles’s compliance in exchange for his silence,
    while Miles—masking his distress—pours himself a drink, a mundane act that underscores
    his vulnerability. The exchange establishes Duke’s manipulative leverage over
    Miles, while Miles’s physical retreat to the bar cart reveals the depth of his
    unresolved pain and the precarious power dynamic now at play. This moment is a
    turning point, shifting the dynamic between the two men and setting up Miles’s
    future actions as he grapples with the emotional fallout of Andi’s death and Duke’s
    ruthless exploitation of it.
