acts:
- fabula_uuid: act_3b95070734fbb2c2
  number: 1
  summary: Miles Bron, an eccentric tech billionaire, sends elaborate puzzle boxes
    to his closest friends—Governor Claire Debella, scientist Lionel Toussaint, fashion
    designer Birdie Jay, and streamer Duke Cody—inviting them to a murder mystery
    weekend on his private Greek island. Famed detective Benoit Blanc also receives
    an unexpected invitation, raising his suspicions. The group gathers at the jetty,
    where the sudden arrival of Cassandra "Andi" Brand, Miles's former business partner
    whom he publicly ousted, creates immediate tension among the disruptors. On the
    island, Miles initiates his murder mystery game. However, the game quickly turns
    deadly when Duke Cody is poisoned after drinking from Miles's glass. Chaos erupts,
    and in the ensuing darkness, "Andi" is shot. Blanc immediately declares these
    are real murders, not a game, and locks down the compound. The narrative then
    flashes back to Alabama, revealing Helen Brand, Andi's identical twin sister,
    who, suspecting foul play in Andi's reported suicide, hires Blanc to investigate,
    setting the true stakes of the story.
