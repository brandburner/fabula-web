  global_id: null
  title: Helen’s staged death and Glass Onion breach
  description: Benoit Blanc and Helen Brand, frantic after learning Duke Cody is dead,
    devise a desperate plan to retrieve the critical envelope from the Glass Onion.
    When Helen is shot—only for the bullet to lodge in Andi’s journal—Blanc seizes
    the opportunity, staging Helen’s death with hot sauce to create a diversion. While
    Blanc feigns distress and herds the guests inside, Helen seizes the moment to
    slip into the Glass Onion unnoticed, exploiting the chaos to search for the envelope.
    The ruse hinges on the killer’s assumption of Helen’s death, giving Blanc and
    Helen a fleeting advantage to uncover the truth before the deception unravels.
    The scene escalates tension by weaponizing misdirection, blending physical danger
    with psychological manipulation as the stakes of the mystery reach a breaking
    point.
