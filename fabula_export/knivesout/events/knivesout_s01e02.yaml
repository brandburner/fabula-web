    full responsibility—but only because Miles Bron has offered her a $30 million
    payout in exchange. The confrontation escalates when Peg discovers Birdie’s secret
    phone, containing an incriminating email where Birdie casually approved the use
    of a notorious Bangladesh sweatshop, replying with a dismissive ‘dab me-moji.’
    Peg’s horror deepens as she realizes Birdie genuinely didn’t understand the term
    ‘sweatshop’—a moment of grotesque ignorance that underscores the transactional,
    morally bankrupt core of Birdie’s worldview. The scene exposes Birdie’s willful
    detachment from the human cost of her actions, her reliance on Miles as a ‘lifeline,’
    and the exploitative dynamics that bind them. Peg’s fury and disbelief contrast
    with Birdie’s cold pragmatism, highlighting their fractured relationship and the
    moral rot at the heart of Miles’s empire.
