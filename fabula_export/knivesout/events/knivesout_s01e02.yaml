  title: Helen’s staged exit and veiled warning
  description: In a calculated maneuver orchestrated by Blanc, Helen allows Duke to
    publicly humiliate her, feigning emotional collapse to create a diversion. As
    she storms out in tears, she passes Whiskey outside the atrium and delivers a
    cryptic warning—'He's a son of a bitch, Whiskey. Leave his ass.'—revealing her
    protective instincts toward Whiskey while subtly undermining Duke’s influence.
    The exchange underscores Helen’s strategic compliance with Blanc’s plan to search
    for the envelope, her moral disdain for Duke, and the fragility of Whiskey’s loyalty
    to him. The moment also deepens the mystery of Helen’s true motives, as her veiled
    warning hints at a deeper, unspoken bond with Whiskey and foreshadows the instability
    of Duke’s control over her. The scene’s tension lies in the contrast between Helen’s
    controlled performance and the raw emotion she briefly allows to surface, reinforcing
    her duality as both a grieving sister and a tactical ally in Blanc’s investigation.
