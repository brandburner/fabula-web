- fabula_uuid: cand_evt_scene_fe35e96ffaaa28a8_02
  global_id: null
  title: Duke’s death exposes the game’s stakes
  description: 'The scene opens with lingering tension after Andi’s public humiliation
    and exit, where Duke’s callous rejection of her victimhood leaves the group complicit
    in their collective cruelty. Miles returns with Blanc, attempting to revive the
    party’s mood with forced charm and a toast to ‘disruptors,’ but Duke—now emboldened
    by viral success—uses the moment to leverage his newfound influence, demanding
    a deal for Alpha News. The group reluctantly toasts, but the celebration is cut
    short when Duke collapses mid-drink, dying violently in front of everyone. Blanc
    immediately suspects foul play, declaring it a potential homicide and treating
    the scene as a crime. The guests’ reactions reveal their true priorities: Claire
    panics over political fallout, Miles freezes in shock, and Lionel’s professional
    composure cracks under the weight of the moment. The event transforms the weekend’s
    ‘game’ into a deadly reality, forcing the guests to confront their complicity
    in a system where power, leverage, and survival now dictate their every move.
    The death isn’t just a shock—it’s a catalyst that shatters the illusion of control,
    exposing the fragility of their alliances and the lethal consequences of their
    past actions.'
