  title: Andi’s Ghostly Reappearance at the Jetty
  description: The group of guests—Duke Cody, Birdie Jay, Lionel Toussaint, and Claire
    Debella—arrive at the jetty for their annual trip to Miles Bron’s island, where
    they are met by an Efficient Man who administers a mysterious throat spray to
    each of them. The moment is tense but routine until a taxi pulls up, revealing
    Cassandra 'Andi' Brand, Miles Bron’s former business partner, who was presumed
    absent or dead. The group’s collective shock—Birdie’s hollow greeting, the others’
    stunned silence—signals Andi’s return is far from welcome. Blanc, the outsider,
    observes the reaction with detective’s precision, noting the unspoken dread her
    presence evokes. The scene establishes Andi as a destabilizing force, her arrival
    foreshadowing the unraveling of secrets and the escalation of conflict on the
    island. The spray ritual, though unexplained, adds an eerie layer of control,
    hinting at Miles Bron’s manipulative influence over the group.
