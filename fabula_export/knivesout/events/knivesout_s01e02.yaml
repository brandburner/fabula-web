  global_id: null
  title: Blanc’s Invitation Revealed as a Forgery
  description: "\n  Benoit Blanc arrives at Miles Bron’s estate, visibly awestruck\
    \ by its grandeur and eager to participate in the murder mystery game. His enthusiasm\
    \ quickly sours when Miles bluntly denies sending him an invitation, despite Blanc\
    \ producing a physical blue card identical to those sent to the other guests.\
    \ Miles dismisses the discrepancy as a prank—someone resetting a puzzle box and\
    \ sending it to Blanc as a joke—but Blanc’s detective instincts immediately flag\
    \ the inconsistency. His demeanor shifts from delighted guest to wary investigator\
    \ as he probes Miles about the number of boxes created (five, all accounted for)\
    \ and whether they could be reset. Miles, initially dismissive, pivots to overcompensating\
    \ hospitality, formally inviting Blanc to stay while downplaying his concerns.\
    \ The exchange exposes a critical tension: Blanc’s professional skepticism clashes\
    \ with Miles’s performative control, hinting that the ‘game’ may already be rigged.\
    \ Blanc’s lingering unease—‘an anonymous invitation is not to be trifled with’—foreshadows\
    \ his role as the only guest who recognizes the gathering’s potential for real\
    \ danger.\n  "
  episode_uuid: ep_sea_ser_knivesout_s01_e02
  scene_sequence: 22
  sequence_in_scene: 39
  key_dialogue:
  - 'BLANC: I''m so happy to be included, and if there''s some role you''d like me
    to play in this murder mystery game as the detective, I''m happy to oblige.'
  - |-
    MILES: What are you doing here?
    BLANC: You invited me.
    MILES: No I didn't.
    BLANC: You. You sent me a box.
  - |-
    BLANC: How many of these boxes did you create?
    MILES: Five. One for each of my guests.
    BLANC: No test boxes or prototypes or -
    MILES: No. My puzzle guy barely got the five done in time... Someone reset the box and sent it to you as a gag.
    BLANC: I'm mortified.
    MILES: Why? I've got the world's predefinite detective at my murder mystery party, that is so legit.
    BLANC: Mr. Bron. I've learned through bitter experience that an anonymous invitation is not to be trifled with.
