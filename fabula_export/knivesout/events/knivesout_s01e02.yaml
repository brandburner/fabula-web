  title: Blanc’s environmental violation exposes island’s control
  description: 'Benoit Blanc, still processing the volatile confrontation between
    Peg and Miles Bron over Birdie Jay’s forced public statement, wanders the Zen
    Garden in contemplation. His attempt to smoke a cigar triggers the island’s hyper-sensitive
    environmental systems—blinking lights, alarms, and robotic reprimands—revealing
    the oppressive, surveillance-driven infrastructure Miles has imposed. Blanc’s
    panic (tossing the cigar into a pond, which then lights up red) underscores the
    island’s rigid, punitive control over its inhabitants, forcing him to retreat.
    The incident serves as a microcosm of the broader power dynamics at play: Miles’s
    manipulation of his guests is mirrored in the island’s own mechanical enforcement
    of rules, hinting at deeper systemic secrets tied to the murder mystery. Blanc’s
    observation of Peg’s fury earlier now takes on added weight—this is a place where
    even small acts of defiance are met with immediate, automated consequences, reinforcing
    the guests’ vulnerability and the host’s absolute authority.'
