  title: Ransom sabotages Marta’s painkillers
  description: 'In the dim quiet of Harlan’s bedroom, Ransom methodically sabotages
    Marta’s medical supplies by switching the Toradol and morphine vials using syringes
    from her own kit. This deliberate act—exploiting Marta’s trust and her professional
    role as Harlan’s nurse—transforms her prescribed medications into lethal substitutes.
    Ransom’s cold precision is underscored by his final move: stealing the Naloxone
    antidote, ensuring no chance of reversal. Blanc’s voice-over later reveals this
    as a calculated maneuver to frame Marta for Harlan’s death, exposing Ransom’s
    ruthless strategy to reclaim his inheritance by weaponizing her vulnerability.
    The scene underscores the escalating stakes of the Thrombey family’s hidden conflicts,
    where even medical care becomes a tool of manipulation and betrayal.'
