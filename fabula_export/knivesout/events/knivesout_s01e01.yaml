  title: Marta’s hidden needle and Harlan’s final Go game
  description: "\n  Joni’s late-night visit to Harlan’s attic office reveals Marta\
    \ secretly preparing a hypodermic needle behind him, her back turned to conceal\
    \ the act. The moment is fleeting but loaded: Marta’s surreptitious preparation—likely\
    \ the fatal overdose she later administers—hints at premeditation or desperation,\
    \ while Harlan’s calm demeanor (as recounted by Lieutenant Elliott) masks the\
    \ tension beneath. The spilled Go board on the floor, a recurring symbol of their\
    \ nightly ritual, underscores their fractured dynamic: Harlan’s insistence that\
    \ ‘they play it every night’ contrasts with the chaos of the moment, suggesting\
    \ their relationship is built on routine but strained by unspoken conflicts. Joni’s\
