    when Trooper Wagner arrives to initiate formal police interviews, marking the
    official start of Harlan Thrombey’s murder investigation. Linda Drysdale, sharp
    and controlling, immediately asserts her authority by insisting the process conclude
    before the evening’s memorial—revealing her discomfort with scrutiny and the family’s
    resistance to external interference. Her husband Richard, gruff and dismissive,
    hangs up on their estranged son Ransom mid-conversation, exposing the family’s
    fractured dynamics. Wagner’s polite but firm interruption underscores the investigation’s
    urgency and the Thrombeys’ reluctance to cooperate, setting the stage for a power
    struggle between the detectives and the family’s defensive posturing. The moment
    establishes Marta’s outsider status as she stands awkwardly in the foyer, caught
    between the family’s hostility and the investigation’s looming pressure.
