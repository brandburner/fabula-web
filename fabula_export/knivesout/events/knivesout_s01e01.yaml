  - character_uuid: agent_82dbfec72515
    emotional_state: 'A facade of calm pragmatism masking a storm of regret, urgency,
      and dark humor. His surface-level detachment (‘Jesus there’s so much me in that
      kid’) belies a man who is acutely aware of his failures as a father and is now
      racing to ‘fix’ them—even if it means manipulating Marta into complicity. There’s
      a flicker of remorse when he mentions ‘closing the book with a flourish,’ but
      his primary emotion is control: he will not let death strip him of agency.'
    goals:
    - Ensure Marta is not legally culpable for his death (to protect her and her family).
    - Stage his death as a suicide to preserve his legacy and avoid a murder investigation.
    - Extract a final act of loyalty from Marta, reinforcing his role as her protector
      (even in death).
    what_happened: 'Harlan transitions from a man casually reflecting on his life’s
      regrets to a cold strategist orchestrating a cover-up with surgical precision.
      Upon realizing the overdose is fatal, he immediately shifts from victim to architect,
      blocking Marta’s attempts to call for help and physically restraining her to
      force compliance. His dialogue is measured, his actions deliberate: he uses
      the study’s objects (the phone, the dagger, the vials) as props in his performance,
      ensuring the scene reads as a suicide. He leverages Marta’s guilt and fear for
      her mother, framing the cover-up as an act of mercy—for both of them. His emotional
      range is striking: he moves from wry humor (‘So if someone switched the meds
      on purpose I’d be dead in ten minutes’) to grim determination (‘We have to make
      this look ironclad’), revealing a man who has spent a lifetime controlling narratives—now
      extending that control to his own death.'
