  title: Marta’s desperate high-speed evasion
  description: "\n  Marta flees in a reckless, high-speed chase through Norfolk’s\
    \ backroads, her car swerving erratically as police cruisers close in from a quarter-mile\
    \ behind. The erratic driving—sharp turns, sudden accelerations—betrays her panic,\
    \ but the precision of her route suggests a calculated attempt to lose pursuers\
    \ rather than blind flight. The tension escalates as she navigates tight curves,\
    \ her knuckles white on the wheel, her breath shallow. This moment forces a confrontation\
    \ between her guilt over Harlan’s death and her survival instinct, while the police’s\
    \ relentless pursuit underscores the stakes: if caught, she faces not just legal\
    \ consequences but the unraveling of her carefully constructed alibi. The chase\
    \ becomes a physical manifestation of her internal conflict—her desperation to\
    \ escape both the law and the truth.\n  "
