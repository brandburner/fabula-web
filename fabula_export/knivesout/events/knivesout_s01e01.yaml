  description: "\n  In a calculated maneuver to manipulate Walt’s perception of Marta’s\
    \ departure, Harlan directs her via voiceover to exit the party with exaggerated\
    \ noise and urgency. Marta complies, loudly announcing her departure to Walt—who\
    \ is smoking on the porch with Jacob—before checking her watch and emphasizing\
    \ the time as midnight. Harlan’s instructions ensure Walt witnesses the exact\
    \ moment of her leaving, a deliberate misdirection that will later serve as a\
    \ false alibi. This staged exit is part of Harlan’s broader plan to protect Marta\
    \ from suspicion after the overdose, framing her departure as a public, time-stamped\
    \ event to divert attention from the true timeline of his death. The exchange\
    \ underscores Harlan’s control over Marta’s actions and foreshadows how his orchestration\
    \ will entangle her in a web of deception.\n  "
