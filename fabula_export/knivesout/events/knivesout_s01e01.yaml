    dynamic at the heart of the Thrombey family’s dysfunction. The scene serves as
    both a turning point in Walt’s arc—revealing his motive for later actions—and
    a critical piece of evidence for Blanc’s investigation, as it underscores the
    depth of Walt’s resentment and the potential for violence.
