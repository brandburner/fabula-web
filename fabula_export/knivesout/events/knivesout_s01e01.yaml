- fabula_uuid: cand_evt_scene_a9cbb93bb2aac1d5_01
  global_id: null
  title: Marta flees Blanc’s pursuit in her car
  description: 'Marta, already on edge from Ransom’s frantic demands to destroy evidence,
    spots Detective Blanc approaching her car with Lieutenant Elliott in tow. The
    moment Blanc locks eyes on her, Marta’s panic escalates—she knows her presence
    at the morgue implicates her further in Harlan’s death. Ransom’s voice cuts through
    the tension, urging her to act: if she destroys the evidence, she’ll be in the
    clear. With Blanc closing in fast, Marta makes a split-second decision. She throws
    her car into gear and peels away, her desperate escape not only avoiding immediate
    capture but also signaling her deep entanglement in the cover-up. The scene underscores
    her vulnerability: cornered between Blanc’s relentless investigation and Ransom’s
    manipulative pressure, she has no choice but to flee, further isolating herself
    from the truth and deepening her moral compromise. The high-speed evasion also
    raises the stakes—Blanc’s pursuit now has a clear target, and Marta’s reckless
    maneuver exposes her as a fugitive in her own right, not just a reluctant participant
    in the Thrombey family’s schemes.'
