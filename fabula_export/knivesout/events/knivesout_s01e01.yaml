    the unidentified man in a linen suit as the renowned investigator Benoit Blanc.
    The family’s distrust of the investigation’s methods escalates as Blanc’s presence
    is revealed, forcing Elliott to disclose his unofficial but influential role.
    Blanc’s cryptic admission that he is working for an unnamed client and will act
    as a ‘passive observer’ of the truth deepens the family’s unease, exposing their
    collective paranoia and the investigation’s shifting dynamics. The moment forces
    the Thrombeys to confront the possibility that someone outside the family—and
    with unknown motives—is manipulating the narrative of Harlan’s death. Blanc’s
    calm demeanor and subtle probing about Marta’s presence at the party further heighten
    tension, signaling his role as a wildcard in the case and a potential threat to
    the family’s carefully constructed lies. The exchange underscores the family’s
    fractured trust and Blanc’s strategic advantage as an outsider with access to
    their secrets.
