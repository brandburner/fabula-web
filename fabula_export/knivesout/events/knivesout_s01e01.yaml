  title: Marta Faces Family Judgment
  description: In the foyer of the Thrombey estate, Linda—Harlan’s eldest daughter—greeted
    Marta with thinly veiled disapproval for missing Harlan’s funeral, framing it
    as a family decision she was 'outvoted' on. Her tone is laced with passive-aggressive
    reproach, reinforcing Marta’s outsider status within the Thrombey clan. Richard,
    Linda’s husband, arrives mid-conversation, abruptly ending a call with Ransom
    (who skipped the funeral) and echoing Linda’s judgment with a dismissive 'Little
    shit.' The exchange underscores the family’s collective disapproval of Marta’s
    absence, which they interpret as betrayal, while also exposing their own fractured
    dynamics—Linda’s need for control, Richard’s blunt disdain for Ransom, and the
    unspoken tension that Marta’s presence stirs. The moment solidifies Marta’s isolation
    and hints at the deeper rifts within the Thrombey family, where loyalty is performative
    and absence is met with punishment.
