  title: Ransom’s Failed Knife Attack on Marta
  description: In a moment of unraveling control, Ransom—cornered and frantic—grabs
    a prop knife from the library’s wall display and lunges at Marta, his face twisted
    with hatred. The blade retracts harmlessly into the handle, exposing the inauthenticity
    of his violence and the performative nature of his aggression. The failed assault
    reveals Ransom’s escalating desperation and the fragility of his grip on the situation,
    while Marta’s involuntary physiological reaction—vomiting in response to his confession—unmasks
    his guilt in Fran’s murder. The scene escalates from verbal confrontation to physical
    violence, only for the knife’s theatrical nature to undercut Ransom’s threat,
    leaving him exposed and Marta physically unharmed but emotionally shattered. Blanc
    and Elliott intervene, but the moment underscores Ransom’s self-destructive impulsivity
    and Marta’s resilience in the face of his unraveling schemes. The event serves
    as a turning point, revealing Ransom’s true capacity for violence while highlighting
    Marta’s involuntary tell as a narrative device that forces truth to surface despite
    her attempts to conceal it.
