  title: Ransom silences Fran with a syringe
  description: 'In a tense flashback confrontation at 1209 Columbus Road, Fran accuses
    Ransom of orchestrating Harlan’s murder, her voice trembling with conviction.
    Ransom, cold and calculating, admits her suspicions are correct before violently
    subduing her—clamping a hand over her mouth and injecting her with a syringe.
    As Fran collapses, Ransom methodically searches her pockets, retrieves the tox
    report (evidence of Marta’s accidental overdose), and burns it to frame her. The
    act is a calculated betrayal: Ransom not only eliminates Fran as a witness but
    ensures Marta takes the fall for both murders. Blanc’s voiceover later reveals
    this as the final piece of Ransom’s scheme, where Marta’s fate is sealed by a
    single, deliberate act of arson and deception. The scene underscores Ransom’s
    ruthlessness and the family’s moral decay, with Fran’s death serving as both a
    cover-up and a catalyst for Marta’s impending arrest.'
