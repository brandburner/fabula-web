    \ driving—swerving into side streets and alleys—exploits the agility of her small\
    \ car to outmaneuver the pursuing officers. The chase underscores her guilt (or\
    \ fear of exposure) while escalating the mystery: why is she fleeing, and what\
    \ does she know that the authorities—or the Thrombey family—don’t? The scene ends\
    \ with her pulling into a secluded back lot, temporarily free but now more entangled\
    \ in the investigation’s web. Her actions reveal both her resourcefulness and\
    \ the unraveling pressure of her situation, foreshadowing her eventual confrontation\
    \ with the truth.\n  "
