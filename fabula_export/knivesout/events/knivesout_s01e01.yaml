    \ estate, a detail that could directly implicate her in Harlan’s murder. Ransom’s\
    \ initial reaction is one of controlled alarm, but he quickly shifts to a calculated\
    \ reassurance, downplaying the threat posed by Detective Blanc’s investigation.\
    \ His insistence that the case will ‘putter out’ and that Marta only needs to\
    \ ‘ride the next few days out’ exposes his manipulative role: he’s not offering\
    \ genuine comfort but rather maintaining his own narrative control, ensuring Marta\
    \ remains compliant with his scheme. The exchange underscores Marta’s vulnerability—her\
    \ physical and emotional state is fragile, her guilt palpable—and Ransom’s duality\
    \ as both her protector and her exploiter. The moment also serves as a narrative\
    \ pivot, reinforcing the precariousness of their position as the investigation\
    \ tightens, while hinting at Ransom’s underlying desperation to keep Marta from\
    \ unraveling his own carefully constructed lies.\n  "
