  title: Ransom rescues Marta from the family
  description: After the will reading exposes Marta as Harlan’s sole heir, the Thrombey
    family descends into chaos, surrounding her car with a cacophony of accusations,
    pleas, and confusion. Marta, overwhelmed and desperate to escape, fumbles with
    her car’s ignition—only for it to fail repeatedly. Ransom, observing the scene,
    intervenes by pulling up in his Porsche and offering her an exit. Marta, with
    no other options, abandons her car and flees with him, leaving the family stunned
    and Blanc watching intently. Ransom’s taunting farewell to the family—‘I think
    this could be the best thing to happen to all of you!’—hints at his manipulative
    motives, while Blanc’s darkening expression upon receiving a phone notification
    suggests an unseen escalation tied to Ransom’s escape. The moment underscores
    Marta’s isolation, Ransom’s ambiguous role as both ally and antagonist, and Blanc’s
    growing suspicion of deeper family secrets.
