  global_id: null
  title: Ransom manipulates Marta’s guilt into a pact
  description: 'In a dimly lit restaurant, Ransom—initially stunned by Marta’s confession
    about Harlan’s death—twists her vulnerability into a calculated alliance. He reveals
    Harlan’s hidden admiration for Marta (her skill at GO, a game Ransom believed
    was his exclusive bond with his grandfather) and frames their collaboration as
    a way to honor Harlan’s final wishes while punishing the Thrombey family. Ransom’s
    offer to protect Marta from Blanc and the law is laced with self-interest: he
    demands a cut of the inheritance in exchange for his silence, positioning himself
    as both savior and exploiter. The moment is interrupted by Meg’s phone call, where
    her emotional plea—revealing Joni’s financial ruin and Meg’s potential dropout—further
    pressures Marta. Ransom’s smirking silence during the call underscores his control
    over the situation, forcing Marta to choose between moral integrity and survival.
    The scene exposes Ransom’s ruthless opportunism and Marta’s moral crossroads,
    deepening the family’s corruption while setting up their twisted partnership.'
