  title: Harlan forces Marta into moral surrender
  description: In a private, late-night confrontation in Harlan’s study, the aging
    novelist—already aware of his impending death—pressures Marta to act decisively
    in a morally compromised situation. His tone is urgent yet paternal, framing her
    compliance as a test of loyalty to *him* rather than a choice of her own. Marta
    resists, her refusal rooted in both moral instinct and fear of the irreversible
    consequences, but Harlan’s emotional leverage—‘for me, right now’—erodes her resistance.
    The scene culminates with Marta’s reluctant departure, the door shutting behind
    her like a final judgment. This moment reveals Harlan’s calculated manipulation
    of Marta’s guilt and devotion, while foreshadowing the moral compromises she will
    later face. The exchange underscores Harlan’s control over Marta’s agency, even
    as he orchestrates his own death to protect her. The closed door symbolizes the
    point of no return, both for Marta’s moral integrity and for Harlan’s plan.
