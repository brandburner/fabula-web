  title: Greatnana’s Confusion Reveals Ransom’s Presence
  description: "\n  In the side yard of the Thrombey estate during the party, Marta\
    \ encounters Greatnana, who—due to her senility—mistakes Marta for Ransom, repeating\
    \ the phrase 'Are you back again already?' This moment is later revealed to be\
    \ a flashback to an earlier interaction between Greatnana and Ransom himself,\
    \ who had secretly returned to the estate that night. The cut to Ransom hopping\
    \ down from a trellis and shushing Greatnana before blowing a kiss underscores\
    \ his covert, suspicious movements, confirming his uninvited presence at the party.\
    \ This exchange serves as a critical piece of evidence linking Ransom to the estate\
    \ on the night of Harlan’s death, reinforcing his role as a prime suspect in the\
    \ murder investigation. The scene also highlights Greatnana’s unreliable but pivotal\
    \ testimony, which Blanc will later use to piece together the timeline of events.\n\
    \  "
