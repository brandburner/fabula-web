  title: Alice Forces Marta to Confront Inheritance Chaos
  description: 'The scene opens with Marta jolted awake by her sister Alice’s frantic
    intrusion into her bedroom at dawn. Alice’s panicked demeanor—combined with her
    cryptic questions about sudden wealth and an unidentified man in their home—immediately
    signals that Marta’s life has been upended overnight. Marta’s groggy, evasive
    response (''Maybe, I dunno'') reveals her emotional detachment, a coping mechanism
    for the overwhelming fallout of Harlan’s death and the inheritance she never anticipated.
    The 28 missed calls on her phone underscore the external pressure mounting around
    her, while Alice’s insistence that Marta ''get her ass up'' frames this as a moment
    of forced reckoning. The confrontation exposes the sisters’ fractured relationship:
    Alice’s blunt, self-centered urgency contrasts with Marta’s quiet desperation,
    hinting at deeper family tensions and Marta’s isolation in the Thrombey scandal.
    This event serves as a turning point, where Marta can no longer ignore the public
    and familial scrutiny triggered by her inheritance, setting up her inevitable
    collision with the Thrombey family’s hostility and the investigation’s intensifying
    scrutiny.'
