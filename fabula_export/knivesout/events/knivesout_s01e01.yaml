  title: Ransom physically attacks Harlan over will change
  description: During Harlan’s 85th birthday party, Ransom confronts his grandfather
    in a private study after learning Harlan has rewritten his will to leave his entire
    fortune to Marta, his nurse. Ransom’s initial disbelief escalates into a verbal
    assault, calling Harlan insane and questioning his sanity. Harlan, unshaken, confirms
    the will change is finalized, triggering Ransom’s violent outburst. In a fit of
    rage, Ransom shoves Harlan into a wall vent, marking a physical escalation of
    his desperation to prevent the inheritance shift. The confrontation reveals Ransom’s
    ruthless determination to maintain his claim to the Thrombey fortune, while also
    exposing Harlan’s resolve to protect Marta—even at the cost of his own safety.
    This violent act foreshadows Ransom’s later manipulation of Marta and his role
    in the cover-up, as well as the family’s hidden conflicts over wealth and legacy.
