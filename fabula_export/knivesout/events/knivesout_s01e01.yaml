  description: "\n  Detective Blanc systematically dismantles the Thrombey family's\
    \ alibis and lies, exposing a pattern of deception that implicates multiple members.\
    \ He reveals that someone within the household anonymously hired him to investigate\
    \ Harlan's death, suggesting an internal cover-up. Marta, visibly distressed by\
    \ the revelations, retreats inside, while Blanc shifts the investigation's focus\
    \ from external suspects to the family's hidden motives. His disclosure of an\
    \ anonymous cash payment—delivered with a news clipping of Harlan's death—underscores\
    \ the urgency and complexity of the case, compelling Lieutenant Elliott to verify\
    \ everyone's alibis. The scene marks a critical turning point, as Blanc's strategic\
    \ interrogation forces the family to confront their secrets under scrutiny, while\
    \ his own anonymity becomes a central mystery.\n  "
