  key_dialogue:
  - 'MARTA: I took him upstairs. We played our nightly game of GO, at some point he
    knocked the board over and Joni came up to check on us. Then I gave him pain medication,
    he pulled his shoulder last week, and left him in his study. At midnight. Said
    bye to Walt, went home.'
  - 'LIEUTENANT ELLIOTT: What medication did he get?'
  - 'MARTA: Since his injury I''ve been giving him a 100 milligram IV push of Toradol,
    a non narcotic analgesic. And to help him sleep, 3 milligrams of morphine.'
  - 'LIEUTENANT ELLIOTT: Anything unusual about his demeanor?'
  - 'MARTA: No.'
  - 'BLANC: Well that sounds about right. Thank you Ms. Cabrera.'
