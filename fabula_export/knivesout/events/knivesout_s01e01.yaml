    is driven away in a police cruiser—his accusatory gaze lingering on her through
    the window. The Thrombey family, gathered on the lawn, turns in unison to fix
    their collective attention on her. Their silence is deafening, their stares heavy
    with unspoken accusation. The moment marks a seismic shift: Marta’s role in the
    family’s eyes transforms from grieving nurse to primary suspect in Harlan’s murder.
    The weight of their suspicion is palpable, and the scene underscores the fracture
    of alliances, the hardening of distrust, and the beginning of Marta’s public unraveling.
    The family’s unified front—once a source of comfort—now feels like a wall of judgment,
    leaving her exposed and vulnerable as the investigation’s focus narrows on her.'
