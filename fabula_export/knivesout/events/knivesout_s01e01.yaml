- fabula_uuid: cand_evt_scene_495d13c55433a3ea_01
  global_id: null
  title: Blanc Uncovers Ransom’s Alibi Flaw
  description: 'In the parking lot after a botched car chase, Lieutenant Elliott dismisses
    Ransom’s reckless behavior as incompetent, but Detective Blanc reveals a critical
    witness—Wanetta Thrombey (Greatnana)—who places Ransom at the scene of Harlan’s
    murder by describing someone climbing the trellis to the third floor. Ransom,
    unaware of the accusation, is led away by police, while Marta realizes with horror
    that Greatnana’s senile testimony mistakenly implicates *her* instead of Ransom.
    Blanc, sensing Marta’s panic, presses her to confirm whether Ransom asked her
    to drive when he saw the police approaching. Marta lies by omission, spitting
    into a soda cup to conceal her involuntary physiological reaction to deception.
    Blanc then insists on riding with her to the police station, where he plans to
    extract a full account of Ransom’s statements—effectively tightening the noose
    around both suspects. The scene pivots from procedural skepticism to damning circumstantial
    evidence, accelerating the narrative’s shift toward Ransom as a prime suspect
    while deepening Marta’s reluctant entanglement in the investigation. The moment
    also underscores Blanc’s methodical approach: he doesn’t just follow leads; he
    exploits psychological pressure points to force confessions or contradictions.'
