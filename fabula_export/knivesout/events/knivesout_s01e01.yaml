  key_dialogue:
  - 'BLANC: Why. Was. I. Hired? Why would someone hire me? I was hired before the
    sealed will was read. Yes, the person must have known the contents of the will.
    But one step further—that same person must have known a crime was committed, and
    further, if the intent was to reverse Marta''s inheritance, they must have known
    that Marta was responsible.'
  - 'BLANC: Now with the entire solution in my field of view, the arc of this case
    is a tragedy of errors. And Marta, it will not be easy to hear. But there is at
    least one truly guilty party behind it all, guilty in the true sense of acting
    with malice, and committing a heinous crime with selfish intent.'
  - 'RANSOM: Marta I''m sorry. I told them everything, I figured it was all up. I''m
    sorry.'
  - 'BLANC: Not exactly everything though.'
