  title: Marta’s Private Physical Collapse
  description: Marta retreats to the half bath during a moment of extreme emotional
    and physical distress, triggered by the mounting pressure of the investigation
    and her own moral conflict. The act of vomiting—her involuntary physiological
    tell for deception—occurs in isolation, with the running water masking the sound.
    This intimate, unguarded moment underscores her psychological fracture, the weight
    of secrets she can no longer suppress, and her growing inability to maintain control.
    The scene serves as a visceral turning point, revealing the depth of her internal
    struggle and foreshadowing her eventual breakdown under the scrutiny of the investigation.
    Her physical collapse mirrors her emotional state, reinforcing the narrative’s
    focus on the consequences of guilt and the fragility of human resilience.
