  object_involvements:
  - object_uuid: object_fd741c9ff755
    description_of_involvement: The glass door serves as both a physical barrier and
      a narrative threshold in this event. Initially, it acts as a conduit for Marta’s
      eavesdropping, allowing the muffled voices of Elliott and Blanc to reach her
      while maintaining the illusion of separation. The door’s transparency, however,
      betrays her presence, as Blanc’s face suddenly materializes on the other side,
      his gaze cutting through the distorted glass to lock onto hers. The door’s role
      shifts from a tool of secrecy to a catalyst for revelation, as Marta’s startled
      reaction exposes her vulnerability. Symbolically, the glass door represents
      the fragile boundary between Marta’s internal world of guilt and paranoia and
      the external investigation, which is inching closer to the truth. Its sudden
      shattering of her privacy mirrors the unraveling of her composure.
    status_before_event: Closed but unlocked, with cigar smoke drifting past its surface
      from the patio side. The glass is slightly distorted, warping the view of the
      patio but not obscuring it entirely.
    status_after_event: Physically unchanged but now imbued with new significance
      as a site of Marta’s exposure. The door remains a point of tension, as Blanc’s
      silent appearance has marked it as a space where secrets are no longer safe.
  - object_uuid: object_ba3491e2977d
    description_of_involvement: Lieutenant Elliott’s cigar smoke, drifting lazily
      past the glass door, serves as a sensory bridge between the interior foyer and
      the exterior patio. The hazy tendrils of smoke curl against the pane, carrying
      the acrid scent of Elliott’s habit into the foyer where Marta stands. While
      the smoke itself is incidental to the dialogue, it reinforces the atmosphere
      of tension and unease, acting as a visual and olfactory reminder of the investigation’s
      presence. The smoke’s intrusion into the foyer—Marta’s temporary sanctuary—symbolizes
      the inescapable reach of the police inquiry, blurring the lines between private
      and public spaces. Its presence also underscores the contrast between Elliott’s
      dismissive, smoke-filled skepticism and Blanc’s silent, smoke-free observation.
    status_before_event: Drifting in tendrils from the patio, curling against the
      glass door and permeating the foyer air with a sharp, acrid scent.
    status_after_event: Dispersed slightly after Marta’s startled movement, but the
      lingering haze and scent remain, a persistent reminder of the investigation’s
      intrusion.
