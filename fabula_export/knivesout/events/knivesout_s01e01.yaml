  title: Elliott confirms party alibis in flashback
  description: 'In a flashback to Harlan Thrombey’s 85th birthday party, Lieutenant
    Elliott’s voiceover interrogation of Linda Drysdale establishes key alibis and
    timelines. Linda casually confirms the presence of Fran, Marta, and Wanetta while
    dismissively noting Ransom’s early departure—an offhand detail that subtly undermines
    his later claims of innocence. The scene’s visual contrast between the lively
    party and Elliott’s methodical questioning underscores the investigation’s tension:
    what appears routine (a family gathering) becomes a grid of potential lies. Ransom’s
    unnoticed exit past Greatnana plants early doubt about his whereabouts, while
    Linda’s detached tone hints at her own guardedness. The flashback’s warmth (classic
    rock, food, laughter) clashes with the cold precision of Elliott’s voiceover,
    reinforcing the story’s central irony: the Thrombeys’ secrets fester beneath their
    polished facades. This exchange tightens the noose around Ransom while foreshadowing
    Marta’s later vulnerability as an outsider in this insular world.'
