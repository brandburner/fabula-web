  title: Harlan teaches Marta strategic truth
  description: 'In the dimly lit intimacy of Harlan Thrombey''s study, Marta Cabrera—already
    burdened by her involuntary physiological reaction to deception—confesses her
    inability to lie without physical consequences. Harlan, ever the master of psychological
    manipulation, seizes this moment to impart a crucial lesson: instead of outright
    lies, Marta must wield ''fragments of the truth'' as weapons, carefully omitting
    just enough to control perceptions. This exchange reveals the dark alliance forming
    between them, where Marta''s compliance becomes complicity in Harlan''s intricate
    web of deception. The moment foreshadows Marta''s future role in the family''s
    downfall, as she begins to internalize the Thrombey way of operating—where truth
    is malleable and morality is secondary to survival. Harlan''s instruction isn''t
    just about evasion; it''s about inheritance—a passing down of his manipulative
    genius that will later define Marta''s actions under pressure.'
