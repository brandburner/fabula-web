  description: 'In the library, Detective Blanc corners Richard Drysdale with a blunt
    ultimatum: reveal his affair to Linda or Blanc will do it himself. The threat
    hangs in the air as Richard hesitates, his discomfort palpable. Blanc’s phrasing—''You
    tell her. Or I will. Bells ringing?''—implies he already knows the truth and is
    weaponizing it. The moment is a pressure point, exploiting Richard’s fear of exposure
    and Harlan’s posthumous control over the family’s secrets. The flashback triggered
    by Richard’s hesitation (though not shown in this script excerpt) would later
    reveal the violent confrontation between Harlan and Richard at the party, where
    Harlan confronted him with irrefutable evidence of the affair. This scene serves
    as both a setup for Richard’s eventual confession and a demonstration of Blanc’s
    tactical precision in dismantling the family’s lies. The subtext is clear: Blanc
    isn’t just investigating a murder—he’s exposing the rot beneath the Thrombeys’
    polished facade.'
