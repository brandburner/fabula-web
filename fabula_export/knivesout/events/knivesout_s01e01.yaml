- fabula_uuid: act_06f6c8155253ead4
  number: 2
  summary: 'Following Marta''s harrowing confession to herself, the narrative shifts
    to Blanc''s official investigation of the Thrombey estate, with Marta reluctantly
    serving as his "Watson." During their inspection, Marta experiences several close
    calls, nearly exposing her staged alibi through footprints in the mud and a broken
    trellis piece, both of which Blanc keenly observes. The tension escalates dramatically
    during the reading of Harlan''s will, where the family discovers Marta has been
    named the sole heir to his vast fortune and estate, completely disinheriting them
    all. This revelation ignites a furious backlash from the Thrombeys, who turn their
    collective rage and accusations on Marta. Amidst the chaos, Ransom, the family''s
    black sheep, surprisingly offers Marta his support, revealing he knows Harlan
    didn''t commit suicide and is aware of her vomiting tell. He proposes an alliance:
    they will work together to expose the "real" killer, and Marta will give him a
    cut of the inheritance. Marta, still reeling, is then confronted by Walt, who
    attempts to blackmail her by threatening to expose her mother''s undocumented
    status if she doesn''t renounce the will. Marta, emboldened by her new position,
    defiantly refuses. A mysterious blackmail note arrives, leading Marta and Ransom
    to the site of an explosion at the medical examiner''s office, which destroyed
    all evidence of Harlan''s toxicology report. They then race to a new rendezvous
    point specified in an email, narrowly escaping Blanc''s pursuit. At the new location,
    they discover Fran, the housekeeper, dying, having been attacked. Despite the
    immense personal risk and the potential to further incriminate herself, Marta''s
    inherent kindness prevails; she calls 911 and attempts CPR on Fran, demonstrating
    her unwavering moral compass.'
