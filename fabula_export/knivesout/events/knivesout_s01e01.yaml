  - object_uuid: object_3e3652f9d4ed
    description_of_involvement: 'Harlan’s pre-inserted catheter is the direct enabler
      of the overdose. It provides intravenous access, allowing Marta to inject the
      morphine with lethal efficiency. The catheter’s presence—a routine medical accommodation
      for Harlan’s frailty—becomes the vehicle for his death. Harlan notes its convenience
