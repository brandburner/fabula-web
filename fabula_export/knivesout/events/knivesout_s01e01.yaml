    deliberately avoids the main entrance of the 85th birthday party and instead scales
    the side trellis to enter the estate unnoticed. His stealthy approach—climbing
    the trellis rather than walking through the front gate—signals his outsider status
    and his calculated intent to observe the family without being observed. This moment
    foreshadows his manipulative scheme to regain his inheritance by exploiting Marta’s
    accidental overdose, as well as his distrust of the Thrombeys’ public facade.
    Blanc’s narration later confirms this was a deliberate move, underscoring Ransom’s
    investigative motives and his role as a hidden antagonist in the unfolding mystery.
    The act of sneaking in also highlights his familiarity with the estate’s layout,
    suggesting a deeper, more personal connection to Harlan’s death than initially
    apparent.
