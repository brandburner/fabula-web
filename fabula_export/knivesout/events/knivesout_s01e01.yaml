  title: Blanc challenges the official ruling
  description: Lieutenant Elliott formally closes Harlan Thrombey’s case as a suicide,
    citing matched alibis and uninterrupted blood splatter patterns that rule out
    outside interference. Blanc immediately undermines this conclusion by questioning
    the family’s stated movements, specifically the existence of alternative staircases
    to Harlan’s room—a detail Elliott dismisses as irrelevant. The exchange exposes
    Elliott’s frustration with Blanc’s persistence and foreshadows the detective’s
    methodical dismantling of the Thrombey family’s collective lies. Blanc’s skepticism,
    framed as a philosophical observation about evidence’s unreliability, signals
    his commitment to uncovering the truth despite institutional resistance. The moment
    also highlights the tension between procedural certainty (Elliott’s reliance on
    physical evidence) and narrative complexity (Blanc’s focus on human deception).
    Wagner’s offhand remark about Meg’s timeline subtly reinforces the family’s interconnected
    alibis, while Blanc’s cryptic comment about ‘almost everyone’ lying plants the
    seed for Marta’s eventual revelation as the sole truthful figure in the investigation.
