- fabula_uuid: cand_evt_scene_137da79225e93f19_02
  global_id: null
  title: Blanc’s client and Marta’s role exposed
  description: "\n  The Thrombey family’s simmering distrust of the investigation\
    \ erupts when Joni and Richard publicly challenge the presence of Benoit Blanc,\
    \ the renowned private investigator, whose involvement was previously undisclosed.\
    \ Blanc’s calm, deliberate demeanor contrasts sharply with the family’s agitation,\
    \ particularly when Joni recognizes him from a *New Yorker* profile and Linda—grieving\
    \ and defensive—demands to know why he’s there. Blanc’s cryptic admission that\
    \ he’s acting on behalf of an unnamed client and will remain a 'passive observer'\
    \ only deepens the family’s unease, framing him as an outsider with hidden motives.\
    \ The tension escalates when Blanc pivots to Marta, Harlan’s nurse, probing her\
    \ presence at the party with a subtle but deliberate manipulation of a silver\
    \ dollar—a telltale sign of his investigative focus. The moment forces the family\
    \ to confront the reality that the investigation is no longer confined to the\
    \ police but now includes an independent, highly skilled outsider with his own\
    \ agenda. Blanc’s refusal to disclose his client and his pointed interest in Marta\
    \ suggest a deeper layer of deception, one that implicates not just the family’s\
    \ secrets but also the integrity of the investigation itself. The scene serves\
    \ as a turning point, shifting the narrative from a family’s internal conflicts\
    \ to an external threat—Blanc’s unseen client—and foreshadowing Marta’s central\
    \ role in unraveling the truth.\n  "
