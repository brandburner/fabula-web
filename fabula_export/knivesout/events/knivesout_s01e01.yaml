  title: Ransom rejects Blanc’s theory about Marta
  description: In the library, Benoit Blanc presents his speculative theory that Marta’s
    actions—particularly her alleged conversation with Harlan—were driven by Harlan’s
    advice to 'make do for herself.' Ransom, visibly defensive, dismisses Blanc’s
    timeline as 'heavy duty conjecture,' refusing to entertain the idea that Marta’s
    motives were anything but pure. Blanc presses the point, recounting Ransom’s own
    account of storming out after Harlan’s will reading and later relaying Harlan’s
    supposed words to Marta. Ransom’s refusal to engage exposes his emotional investment
    in protecting Marta’s reputation, revealing a deeper conflict between his personal
    loyalty to her and Blanc’s methodical investigation. The exchange underscores
    the fragility of truth in the Thrombey family, where perceptions are carefully
    curated and secrets are currency. Blanc’s persistence forces Ransom to confront
    the possibility that his own narrative of events may be incomplete or self-serving,
    deepening the divide between his personal biases and the detective’s objective
    pursuit of facts.
