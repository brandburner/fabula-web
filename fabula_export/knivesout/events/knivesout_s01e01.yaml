  title: Marta ignores Blanc’s call during chase
  description: In the high-tension chaos of a police pursuit, Marta and Ransom flee
    in her car, their dynamic strained by mutual distrust. Ransom’s flippant remark
    about regretting his choice of vehicle underscores his self-centeredness, while
    Marta’s deliberate silence when Blanc calls reveals her deepening suspicion of
    him. The unanswered ringtone becomes a symbolic threshold—her refusal to engage
    signals not just distrust but a potential turning point in her investigation,
    where alliances may be shifting. The moment underscores Marta’s isolation and
    the fragility of her trust in Blanc, whose role in the Thrombey family’s secrets
    grows increasingly ambiguous. The chase itself amplifies the urgency, forcing
    Marta to confront her own complicity in the unfolding conspiracy.
