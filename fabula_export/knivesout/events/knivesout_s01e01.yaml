  object_involvements:
  - object_uuid: object_0c7dabf784f3
    description_of_involvement: Harlan’s will is the catalyst for the family’s eruption.
      Alan Stevens reads it aloud, revealing that Marta Cabrera is the sole heir to
      Harlan’s entire estate, including his publishing company (*Blood Like Wine*),
      copyrights, and the family home. The will’s contents—particularly Harlan’s handwritten
      statement—trigger the Thrombeys’ fury, as it explicitly cuts them out and justifies
      the decision. The document’s legal authority and Harlan’s condescending tone
      toward Ransom make it undeniable, forcing the family to confront their disinheritance.
    status_before_event: Sealed in an envelope, unread by the family until Alan Stevens
      opens it. Harlan’s handwritten statement is attached, but its contents are unknown
      to everyone except Alan and Sally.
    status_after_event: Publicly read and physically grabbed by Walt Thrombey, who
      denies its validity. The will remains in the room, but its authority is now
      in dispute, and its existence has shattered the family’s dynamic. The handwritten
      statement is now a focal point for the family’s rage, particularly Ransom’s
      laughter.
