  object_involvements:
  - object_uuid: object_a1e02fdca541
    description_of_involvement: 'The Go board is a catalyst for the accident and a
      symbol of the fragility of life amid routine. Harlan shakes the table to distract
      Marta during their game, causing the board—and the vials—to spill onto the rug.
      This chaotic moment sets the stage for Marta’s mistake: in the disarray, she
      grabs the wrong vial. The Go board’s overturned state mirrors the upheaval of
      the event, its black and white stones scattered like the pieces of Harlan and
      Marta’s lives. Later, Blanc will tip the board to mimic the sound of the fall,
      using it as a prop to probe Marta’s story—a dark echo of its role here as the
      unwitting trigger for disaster.'
    status_before_event: The Go board is set up on the table, its stones arranged
      for the game between Harlan and Marta. It is a focal point of their nightly
      ritual, a symbol of their intellectual rapport.
    status_after_event: The Go board is overturned, its stones and the vials spilled
      across the rug. It remains in disarray, a physical manifestation of the chaos
      that has unfolded.
  - object_uuid: object_c6646ce66af7
    description_of_involvement: Marta’s medical kit is a failed lifeline and a symbol
      of the inevitability of Harlan’s death. After realizing her mistake, she grabs
      the kit from the shelf and frantically searches its contents for the Naloxone
      antidote, which is critically missing. The kit’s absence of Naloxone—an emergency
      staple—seals Harlan’s fate and becomes a key detail in his cover-up plan. He
      notes the missing antidote as ‘proof’ that his death was unavoidable, using
      it to justify staging the suicide. The kit’s disarray (contents spilled onto
      the rug) mirrors the chaos of the moment, but its emptiness is what truly dooms
      Harlan, turning a medical error into a narrative Harlan can control.
    status_before_event: The medical kit is fully stocked and organized, placed on
      a shelf in Harlan’s study. It contains vials, syringes, and other supplies,
      including the missing Naloxone (which should be present for emergency overdoses).
    status_after_event: The kit is emptied onto the rug, its contents scattered in
      Marta’s desperate search. The absence of Naloxone is confirmed, and the kit
      is left in disarray as part of the staged scene, its emptiness serving as ‘evidence’
      of Harlan’s fatalistic choice.
  - object_uuid: object_1ca6d0899cce
    description_of_involvement: 'The two vials—one containing 100mg of morphine and
      the other a 3mg dose of another medication—are the catalyst for the entire event.
      Marta, in her haste and the dim light of the study, mistakes the 100mg vial
      for the 3mg dose and injects Harlan with the lethal quantity. The vials’ similar
      appearance (and Harlan’s later observation that this would make an ‘efficient
      method for murder’) underscores the fragility of life and the ease with which
      tragedy can strike. After the overdose, the vials become key evidence in Harlan’s
      cover-up plan: he ensures they are left in a way that supports the suicide narrative,
      turning a medical error into a deliberate act.'
    status_before_event: Both vials are placed on the GO board by Marta, labeled but
      visually similar. The 100mg morphine vial is intended for Harlan’s pain management
      (though he refers to it as the ‘good stuff’), while the 3mg vial contains his
      routine medication. Neither vial is secured; they are part of the chaotic spill
      when Harlan knocks over the table.
    status_after_event: The 100mg morphine vial is empty (its contents injected into
      Harlan), and both vials are left in the study as part of the staged suicide
      scene. Harlan ensures they are positioned to imply he intentionally overdosed
      himself, using them as props in his final performance.
  - object_uuid: object_c4993f4a3da1
    description_of_involvement: The pill box is a contextual prop that grounds the
      scene in medical routine. Marta places it on the Go board alongside the vials,
