      of the mistake transforms the vials from mundane medical tools into weapons
      of manipulation. He uses the overdose as leverage, forcing Marta into a cover-up
      by exploiting her fear of the consequences. The vials thus become symbols of
      Harlan’s control, as even in death, he dictates the terms of his legacy.
    status_before_event: Neatly placed on the Go board, labeled and distinguishable
      but close enough in appearance to be mistaken under stress.
    status_after_event: One vial (morphine) is empty, the other (3mg dose) remains
