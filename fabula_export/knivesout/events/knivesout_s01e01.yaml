  title: Blanc Manipulates Marta Into the Car
  description: "\n  In the parking lot, Blanc deliberately escalates pressure on Marta\
    \ by revealing Ransom’s compromised alibi—Wanetta Thrombey’s eyewitness testimony\
    \ placing him at the trellis the night of Harlan’s death. Marta’s physical tell\
    \ (spitting into a soda cup) betrays her panic as she realizes Ransom’s guilt\
    \ implicates her own cover-up. Blanc exploits her vulnerability, forcing her into\
    \ the car for a police-station interrogation under the guise of collaboration.\
    \ The scene marks a critical shift: Marta’s passive role as a reluctant witness\
    \ collapses into active complicity, her silence now a liability Blanc can weaponize.\
    \ The enclosed space of the car becomes a pressure cooker, trapping Marta between\
    \ Blanc’s deductive net and her own guilt.\n  "
