    redirects them to the living room. Meg lingers, guilt-ridden over betraying Marta’s
    secret about her mother, and apologizes tearfully. Marta forgives her, but the
    moment reveals Meg’s emotional fragility and Marta’s capacity for compassion amid
    her own crisis. After Meg leaves, Marta seizes the opportunity to assert control,
    telling Blanc she knows the location of the toxicology report—a critical piece
    of evidence that could exonerate her or implicate others. The revelation shifts
    the power dynamic, forcing Blanc into a precarious negotiation and exposing Marta’s
    strategic cunning in a high-stakes game of truth and deception. The exchange underscores
    Marta’s desperation and Blanc’s reluctant acknowledgment of her leverage, setting
    up a pivotal confrontation over the report’s contents and its implications for
    the investigation.
