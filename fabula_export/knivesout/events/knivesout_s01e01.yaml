- fabula_uuid: cand_evt_scene_8d10e4b5a18d5d83_01
  global_id: null
  title: Family erupts over Marta’s inheritance
  description: 'In the library, Harlan Thrombey’s attorney Alan Stevens reveals the
    shocking contents of the patriarch’s recently altered will: Marta Cabrera, the
    family’s housekeeper and Harlan’s nurse, inherits his entire estate—including
    his publishing company, copyrights, and the family home. The Thrombey family,
    already on edge from Harlan’s death, reacts with explosive outrage, accusing Marta
    of manipulation and demanding answers. Ransom’s unhinged laughter cuts through
    the chaos, while Walt and Linda lead the charge against Marta, who stands stunned
    and vulnerable. Blanc intervenes, physically shielding Marta as the family mobs
    her, marking a critical shift in alliances and exposing the family’s deep-seated
    resentments and hypocrisy. The scene culminates in Linda’s violent outburst, forcing
    Blanc to escort Marta to safety while the family’s fragile unity shatters entirely.'
  episode_uuid: ep_sea_ser_knivesout_s01_e01
