  global_id: null
  title: Marta’s Physiological Betrayal Exposes Ransom
  description: 'In the library, Ransom’s facade of control shatters when Marta’s involuntary
    physiological reaction—projectile vomiting—exposes her lie about Fran’s survival.
    Ransom, cornered and desperate, violently confesses to Fran’s murder, only for
    Marta to reveal the truth: Fran is dead, and his admission implicates him. His
    subsequent knife attack on Marta (with a prop blade) fails, but the moment crystallizes
    his unraveling and Marta’s resilience. The scene pivots from psychological tension
    to physical confrontation, forcing Ransom’s guilt into the open while underscoring
    Marta’s role as the catalyst for his downfall. Blanc’s presence ensures the confession
    is witnessed, sealing Ransom’s fate despite his attempts to manipulate the narrative.
    The event marks a turning point: Ransom’s violence backfires, Marta’s vulnerability
    becomes her strength, and the truth—however brutal—begins to surface.'
