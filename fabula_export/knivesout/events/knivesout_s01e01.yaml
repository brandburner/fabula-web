  scene_sequence: 8
  sequence_in_scene: 11
  key_dialogue:
  - 'LIEUTENANT ELLIOTT: We are just going to reintroduce ourselves as a formality,
    I''m Detective Lieutenant Elliott, and this is Trooper Wagner. Now, I''m going
    to record, just makes it easier.'
  - 'TROOPER WAGNER: We''re sorry for your loss.'
  - 'LINDA: (dry as chalk) Thank you that means a lot.'
  - 'LIEUTENANT ELLIOTT: So we understand that night the family had gathered to celebrate
    your father''s eighty fifth birthday. How was that?'
  - 'LINDA: Yes. The party? Pre my dad''s death? It was great.'
