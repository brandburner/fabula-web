acts:
- fabula_uuid: act_19edd97792c7703f
  number: 1
  summary: 'The narrative opens with the grim discovery of renowned crime novelist
    Harlan Thrombey''s body, his throat slit, by his housekeeper Fran. The immediate
    aftermath introduces Marta Cabrera, Harlan''s compassionate nurse, who awakens
    from a nightmare, hinting at her deep involvement. A week later, as the police
    investigate, the eccentric and dysfunctional Thrombey family—Linda, Richard, Walt,
    Joni, and Meg—are paraded before Detective Benoit Blanc. Each family member, interviewed
    in turn, paints a self-serving picture of the night of Harlan''s 85th birthday
    party, while subtly revealing their underlying greed and animosities. Blanc, a
    renowned private investigator mysteriously hired, observes Marta''s unique physiological
    tell: she vomits when she lies. This quirk becomes central as Blanc subtly probes
    the family''s secrets, exposing Richard''s affair, Joni''s financial misdealings,
    and Walt''s professional frustrations with Harlan. The act culminates in a pivotal
    flashback from Marta''s perspective, revealing the true circumstances of Harlan''s
    death: an accidental overdose of morphine administered by Marta, followed by Harlan''s
    desperate, elaborate plan to help her establish an alibi and protect her undocumented
    mother from deportation. Harlan, believing he has only minutes to live, instructs
    Marta to stage his suicide, including a complex escape and re-entry into the house.
    Marta, against her nature, successfully executes the plan and lies to Blanc without
    vomiting, a feat that both reassures and deeply troubles her. The act concludes
    with Marta''s final, harrowing flashback, revealing that Harlan, upon realizing
    the antidote was missing, took his own life to ensure her alibi, cementing her
    profound guilt and setting the stage for the unfolding investigation.'
