  global_id: null
  title: Family debates legal tactics to challenge will
  description: In the Thrombey living room, the family gathers around Alan Stevens,
    their lawyer, to strategize how to contest Harlan’s will, which leaves everything
    to Marta Cabrera. The scene opens with Alan dismissing their emotional objections—Richard
    and Linda argue Harlan’s mental state was unsound, while Walt and Joni propose
    undue influence or the 'slayer rule' as legal loopholes. Joni’s suggestion of
    the slayer rule, though legally irrelevant (since Harlan died by suicide), exposes
    the family’s desperation to discredit Marta. The tension escalates when Detective
    Blanc, who has been silently observing, confirms he suspects foul play, sending
    the family into chaos. Richard lashes out at Blanc’s credibility and Alan’s perceived
    incompetence, while Walt and Linda push to pressure Marta into renouncing the
    inheritance. Meg, torn between loyalty to her grandfather’s wishes and her mother’s
    financial desperation, quietly defends Marta’s right to the inheritance, only
    for Joni to counter with emotional manipulation, reminding Meg that Harlan’s wealth
    was meant to fund her education. The scene underscores the family’s fractured
    alliances, their moral flexibility in the face of financial loss, and Blanc’s
    growing influence as an outsider who disrupts their carefully constructed narratives.
    Alan’s weary exit marks the collapse of their legal strategy, leaving the family
    exposed and vulnerable to Blanc’s scrutiny.
