  global_id: null
  title: Blanc Recruits Marta as Confidante
  description: "\n  Detective Blanc deliberately overrules Trooper Wagner’s dismissal\
    \ of Marta, instead inviting her into the investigation’s inner circle by acknowledging\
    \ her unique relationship with Harlan. He reveals his knowledge of her involuntary\
    \ physiological tell—vomiting when lying—and immediately weaponizes it by asking\
    \ about Richard’s affair, triggering a flashback that exposes Marta’s suppressed\
    \ knowledge of the family’s secrets. Blanc’s strategic trust in Marta redefines\
    \ her role from a marginalized nurse to a critical insider, while his manipulation\
    \ of her vulnerability underscores his investigative ruthlessness. The moment\
    \ also signals Marta’s reluctant complicity in the investigation, as Blanc positions\
    \ her as both a witness and a potential ally against the Thrombey family’s lies.\
    \ The exchange establishes Marta’s duality: a compassionate outsider now entangled\
    \ in the family’s deceit, and Blanc’s growing reliance on her as an unwitting\
    \ asset.\n  "
