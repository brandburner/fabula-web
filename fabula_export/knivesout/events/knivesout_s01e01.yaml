  global_id: null
  title: Linda asserts her bond with Harlan
  description: Lieutenant Elliott interrogates Linda Drysdale about her arrival time
    at Harlan’s party, probing her relationship with her father. Linda immediately
    corrects Elliott’s assumption that she and Richard work *together* for their real
    estate firm, asserting her independence by clarifying it’s *her* company—a subtle
    but pointed assertion of her autonomy. When Elliott asks about her closeness with
    Harlan, Linda reveals their unique, game-like dynamic, framing their relationship
    as a rare, earned intimacy. The exchange underscores her ambition, her need to
    be seen as Harlan’s equal (not just his daughter), and her emotional vulnerability.
    The cut to Richard’s statement, where he dismissively claims ‘everyone idolizes
    their dad,’ contrasts sharply with Linda’s reverence, exposing the family’s fractured
    perceptions of Harlan. This moment deepens the audience’s understanding of Linda’s
    motivations and hints at her potential blind spots regarding her father’s true
    nature.
