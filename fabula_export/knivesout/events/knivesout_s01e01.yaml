    - Avoid confronting the full weight of her involvement in Harlan’s death (and
      the evidence that ties her to it)
    what_happened: Marta is visibly shaken, her body language betraying her panic
      as she ducks down in the driver’s seat upon seeing Blanc. Her hands tremble
      as she grips the steering wheel, her breath shallow and rapid. Ransom’s voice
      on the phone cuts through her paralysis, and she peeks up again—Blanc is now
      just twenty paces away, his purposeful stride leaving no room for doubt. With
      a sudden, adrenaline-fueled surge, she sits up, throws the car into gear, and
      floors the accelerator, her knuckles white against the wheel. The car’s violent
      lurch forward is her only response, a physical manifestation of her desperation
      to escape the closing net of Blanc’s investigation.
