  global_id: null
  title: Blanc demands alibi verification
  description: 'Detective Blanc escalates the investigation by forcing Lieutenant
    Elliott to cross-examine the Thrombey family’s alibis, exposing their collective
    deception. Marta’s involuntary physical reaction to lying (nausea) confirms Blanc’s
    suspicion that multiple family members—including Joni, Walter, and Linda—have
    fabricated their accounts of the night Harlan died. Blanc’s revelation that he
    was anonymously hired with a cash payment (and his refusal to disclose the source)
    introduces a critical layer of intrigue: someone within the household *wants*
    the truth uncovered but remains hidden. The scene pivots from passive observation
    to active interrogation, with Blanc’s directive to ‘walk me through everyone’s
    whereabouts’ marking the official launch of a formal inquiry. Marta’s retreat
    indoors—grateful for the reprieve—underscores her precarious position as both
    a witness and a suspect, while Elliott’s reluctant compliance signals the police’s
    growing reliance on Blanc’s methods. The dialogue reveals Blanc’s strategic mind:
    he doesn’t just seek answers; he *provokes* them, using the family’s lies as leverage
    to unravel the case. The scene’s tension stems from the contrast between Blanc’s
    methodical control and the Thrombeys’ unraveling facades, setting up the alibi-checking
    process as a high-stakes game of truth and deception.'
