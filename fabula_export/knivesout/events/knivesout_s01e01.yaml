  global_id: null
  title: Blanc exposes Ransom’s orchestrated conspiracy
  description: In the library, Blanc interrupts Marta’s confession to reveal the investigation
    was deliberately manipulated by an unseen hand. Using his donut-hole metaphor,
    he deduces the case’s hidden layers—including the client’s foreknowledge of both
    Harlan’s will and Marta’s guilt—exposing a calculated scheme behind the murder
    inquiry. Ransom is brought in, and Blanc forces him to admit he hired the detective,
    setting up the revelation of his malicious intent. The scene pivots from Marta’s
    guilt to Ransom’s premeditated betrayal, shifting the narrative’s focus from accident
    to conspiracy. Blanc’s deduction reveals Ransom’s role as the true architect of
    the family’s downfall, while Marta’s stunned reaction underscores the depth of
    the deception. The confrontation establishes Ransom as the primary antagonist,
    not just a opportunist but a manipulator who weaponized Harlan’s death for personal
    gain. The scene’s tension escalates as Blanc methodically dismantles Ransom’s
    alibis, foreshadowing the full unraveling of his scheme in the next act.
