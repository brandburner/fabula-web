    questioning her professional role at the party. His calculated use of a silver
    dollar—a ritualistic gesture—signals his focus on her as a potential person of
    interest. The shift from family infighting to Marta’s isolation underscores Blanc’s
    investigative strategy: he exploits the family’s distraction to probe the one
    outsider whose presence at the party may not align with her stated function. The
    moment foreshadows Marta’s vulnerability, as Blanc’s passive observation is revealed
    as a deliberate tactic to unnerve her and expose inconsistencies in her story.
    The family’s confusion about Blanc’s motives (and his refusal to name his client)
    heightens the tension, framing Marta as both a witness and a potential target
    of the investigation. Blanc’s southern lilt and measured tone contrast with the
    family’s defensiveness, reinforcing his role as an outsider with hidden agendas.'
