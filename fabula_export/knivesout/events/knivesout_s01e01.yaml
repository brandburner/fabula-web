    \ upstairs underscores her secrecy and the high stakes of her deception, reinforcing\
    \ the narrative tension around her hidden role in the crime. This evasive action\
    \ foreshadows the later revelation of her alibi’s collapse, as Harlan’s voiceover\
    \ will later expose the timeline discrepancy (her early departure vs. Walt’s claim\
    \ of seeing Harlan alive). The scene functions as a subtle but critical setup,\
    \ hinting at Marta’s complicity and the family’s interconnected lies.\n  "
