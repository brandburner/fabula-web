  global_id: null
  title: Marta escapes xenophobic harassment
  description: 'During Harlan Thrombey’s 85th birthday party, the family’s xenophobic
    tensions erupt in the living room while Marta—already an outsider—is forced into
    a humiliating interrogation by Richard. As the argument escalates, Harlan and
    Ransom’s explosive confrontation in the study provides Marta with a critical distraction,
    allowing her to slip away unnoticed. The scene underscores the Thrombey family’s
    toxic underbelly, their casual bigotry, and Marta’s precarious position as both
    a witness to their dysfunction and a target of their prejudice. Her escape marks
    a turning point: she is no longer just a passive observer but an active participant
    in the family’s unraveling, setting up her later alliance with Benoit Blanc and
    her role in exposing their secrets. The moment also highlights the fragility of
    the Thrombey facade—behind closed doors, their civility collapses into cruelty,
    revealing the rot at the core of their wealth and privilege.'
