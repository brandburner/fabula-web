- fabula_uuid: cand_evt_scene_65075e90a5cd1a2a_02
  global_id: null
  title: Blanc’s suspicion fractures family trust
  description: In the Thrombey living room, the family’s desperate legal maneuvering
    to contest Harlan’s will collapses when Joni proposes the 'slayer rule'—a legal
    loophole that could invalidate Marta’s inheritance if she’s deemed responsible
    for Harlan’s death. Alan, the family lawyer, dismisses the idea, but the tension
    escalates when Blanc, who has been silently observing, confirms his suspicion
    of foul play. His refusal to eliminate any suspects—including Marta—ignites Richard’s
    fury, leading him to publicly distrust Blanc and Alan. The scene reaches a breaking
    point when Meg, emotionally shattered by Joni’s revelation that Harlan’s inheritance
    was funding her education, defends Marta’s right to the will, only for Joni to
    expose the family’s financial dependency on Harlan. Blanc’s unyielding stance
    and the family’s fractured alliances mark a critical escalation in the investigation’s
    tension, deepening the distrust and exposing the Thrombeys’ desperation to control
    Harlan’s legacy.
