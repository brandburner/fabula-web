  title: Richard undermines Linda’s idealization of Harlan
  description: In the library, Lieutenant Elliott interrogates Linda and Richard about
    their arrival times at Harlan’s birthday party, probing their relationship with
    the deceased. Linda proudly asserts her independence and the unique bond she shared
    with her father, describing their secretive, game-like dynamic as a source of
    closeness. When Elliott shifts to Richard, he initially deflects with a dismissive
    remark—‘Everyone idolizes their dad, right?’—before abruptly correcting himself
    and exposing Linda’s reverence for Harlan as misplaced. His abrupt pivot (‘But
    Linda does’) reveals a deeper, unspoken resentment toward Harlan, undermining
    Linda’s idealized narrative and hinting at the fractured nature of the Thrombey
    family’s facade. The moment fractures their unified front, exposing Richard’s
    disdain for Harlan and forcing Linda to confront the possibility that her adoration
    was one-sided or even delusional. The exchange serves as a microcosm of the family’s
    dysfunction, where public admiration masks private disillusionment and rivalry.
