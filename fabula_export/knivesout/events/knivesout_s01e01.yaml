  global_id: null
  title: Blanc reveals Ransom’s premeditated sabotage
  description: Benoit Blanc interrupts a tense confrontation between Lieutenant Elliott
    and Trooper Wagner in the library, seizing control of the conversation to expose
    Ransom Drysdale’s meticulously planned scheme. Blanc deduces that Ransom tampered
    with Marta’s medical vials *before* Harlan’s death, ensuring the house would be
    empty after the funeral—creating the perfect opportunity to frame Marta for murder.
    The revelation forces the investigation to pivot from family secrets to an external,
    calculated threat, undermining the assumption that the killer was among the Thrombey
    clan. Blanc’s deduction hinges on Ransom’s absence from the funeral, a detail
    that implicates him in the sabotage. The moment shifts the narrative’s focus,
    exposing Ransom’s premeditation and forcing the group to confront the possibility
    that the killer was never part of the family at all. Elliott’s skepticism contrasts
    with Wagner’s rapt attention, underscoring the divide between institutional skepticism
    and Blanc’s deductive brilliance. The scene’s tension escalates as the truth about
    Ransom’s role in the murder unfolds, redefining the investigation’s trajectory.
