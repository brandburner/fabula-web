- fabula_uuid: act_6cfcd318ee48e369
  number: 3
  summary: 'The climax begins with Marta, resigned to her fate, preparing to confess
    the full truth of Harlan''s death to the assembled Thrombey family. However, Blanc
    dramatically intervenes, revealing that he has pieced together the entire elaborate
    scheme. He exposes Ransom as the true mastermind, detailing how Ransom, upon learning
    of his disinheritance, switched Harlan''s medication vials, stole the antidote,
    and then anonymously hired Blanc to expose Marta, believing she would be implicated
    in Harlan''s death. Blanc then delivers the ultimate twist: Marta, due to her
    intimate knowledge of the medications'' appearance, had unknowingly switched the
    vials back, administering the *correct* medication to Harlan. This means Harlan''s
    death was, in fact, a suicide, as he believed he had been lethally poisoned and
    took his own life to protect Marta. Marta''s act of saving Fran''s life, despite
    the risk to her inheritance and freedom, becomes the final piece of evidence,
    as Fran is revealed to be alive and able to confirm Ransom''s attack. Enraged
    and cornered, Ransom launches a desperate, final assault on Marta with a prop
    knife, a futile act that only serves to further incriminate him. He is apprehended
    by the police. In the aftermath, Linda discovers a hidden message from Harlan,
    hinting at deeper family secrets. The film concludes with Marta, now the rightful
    owner of the Thrombey estate, standing on the balcony, holding Harlan''s coffee
    mug. She has won, not by playing Harlan''s game, but by adhering to her own unwavering
    moral code, embodying the legacy Harlan truly intended.'
