  title: Ransom’s Unnoticed Exit During Party
  description: 'During the flashback to Harlan Thrombey’s 85th birthday party, Lieutenant
    Elliott’s voiceover interrogation with Linda Drysdale establishes the guest list—Fran,
    Marta, and Wanetta—while subtly highlighting Ransom’s early departure. The scene
    cuts to Ransom himself, casually leaving through the side door past Greatnana,
    who briefly acknowledges his exit. This moment is pivotal: Ransom’s unnoticed
    departure (only witnessed by a senile Greatnana) plants early doubt about his
    alibi, foreshadowing his later role in the investigation’s twists. The framing
    emphasizes his manipulative nature—his exit is smooth, unchallenged, and calculated,
    reinforcing his status as a suspect whose movements are deliberately obscured.
    The contrast between the lively party atmosphere and Ransom’s quiet, unremarked-upon
    exit underscores the narrative’s focus on hidden motives and the fragility of
    alibis.'
