  description: 'With police sirens wailing in pursuit, Marta and Ransom speed away
    in her car, their tenuous alliance tested by the escalating chaos. Marta’s question—*You
    regret helping me yet?*—cuts through Ransom’s usual bravado, exposing his self-interest
    as he deflects with a dark joke about preferring a more luxurious escape. The
    ignored call from Blanc underscores Marta’s growing distrust of the investigation
    while Ransom’s evasion reveals the fragility of their partnership. The scene amplifies
    their divergent priorities: Marta’s desperation to survive, Ransom’s opportunism,
    all while the noose of the law tightens around them. The moment serves as a microcosm
    of their fractured collaboration, where survival and self-preservation override
    any semblance of trust or shared purpose.'
