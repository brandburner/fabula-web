    not an accident. This destruction of evidence isn’t just a setback for Marta;
    it’s a systemic erasure of truth, exposing the depth of corruption in the Thrombey
    investigation. The flames reflect off the glass case, symbolizing how the investigation
    itself has been manipulated to obscure justice. This moment underscores that Marta’s
    presumed innocence was never accidental but a deliberate fabrication, with far-reaching
    implications for the entire case.
