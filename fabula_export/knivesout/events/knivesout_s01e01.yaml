    \ earlier. Blanc reveals Fran’s dual motives: her obsessive love for Harlan and\
    \ her seething hatred for Ransom, which drove her to blackmail him. Marta’s discovery\
    \ of Fran’s cousin’s access to the toxicology report explains how Fran obtained\
    \ the report, while Blanc clarifies that the blackmail note was *never* meant\
    \ for Marta—it was always targeted at Ransom. This moment exposes Fran’s personal\
    \ vendetta, reshapes the investigation’s focus, and confirms Ransom as the primary\
    \ suspect in Harlan’s death. The revelation also underscores Fran’s resourcefulness\
    \ and the depth of her emotional investment in the Thrombey family’s secrets.\n\
