  title: Marta flees after legal threats
  description: 'Marta’s mother confronts her with a stack of official legal documents
    and business cards left by unknown visitors, signaling escalating external pressure.
    The mother’s unease—expressed in rapid, worried Spanish—triggers Marta’s visceral
    panic. She immediately recognizes the implications: the Thrombey investigation
    is closing in, and her family’s undocumented status is now a weapon. Without explanation,
    Marta bolts through the back door, urgently instructing her mother to stay silent.
    The abrupt flight underscores her escalating fear and the precariousness of her
    situation, while the unspoken threat of deportation looms over the family’s fragile
    stability. The scene functions as a turning point, forcing Marta into defensive
