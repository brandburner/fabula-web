  key_dialogue:
  - |-
    RANSOM: I always thought I was the only one who could beat Granddad at GO. I always thought that meant something.
    MARTA: I know you did.
    RANSOM: At the party, that night, my last conversation with him, our last fight, that's what he told me, about you. That you beat him nearly every time. More than me. And I thought what a strange thing to tell me. But I think I get it now. I think it did mean something.
    RANSOM: I'm not telling the family shit. You're not going to jail. That detective is not going to catch you. And you're not giving up the family fortune.
  - 'RANSOM: Because fuck my family. They don''t deserve any of this. I can help you
    and we can fool them all and get away with it... and then you will give me my
    cut of the inheritance. The perfect ending, we all win. You, me and Harlan. Deal?'
  - |-
    MEG: (ON PHONE) Marta, mom's broke, she says I'll have to drop out of school.
    MARTA: No, no. I won't let that happen. Whatever money you need Meg, I'll help you.
