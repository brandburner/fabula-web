  global_id: null
  title: Harlan exposes Joni’s embezzlement and cuts ties
  description: "\n  In the small study during Harlan’s birthday party, Joni attempts\
    \ to deflect blame for a missing tuition check, claiming administrative confusion.\
    \ Harlan methodically dismantles her lie by revealing transaction records proving\
    \ she’s been embezzling Meg’s tuition funds—siphoning $100,000 annually for four\
    \ years. The confrontation escalates when Harlan, cold and decisive, writes a\
    \ final tuition check but declares it the last money Joni or Meg will ever receive\
    \ from him. Joni’s stunned silence underscores the severity of the betrayal, while\
    \ Harlan’s calculated detachment reveals his long-standing disdain for her financial\
    \ irresponsibility. This moment not only strips Joni of her financial lifeline\
    \ but also forces her into a precarious position where her survival—and Meg’s\
    \ future—now hinge on her own resources or the mercy of others. The scene serves\
    \ as a turning point in Joni’s arc, exposing her as both a victim of her own greed\
    \ and a casualty of Harlan’s ruthless control over the family’s finances.\n  "
