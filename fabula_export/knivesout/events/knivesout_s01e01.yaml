  global_id: null
  title: Walt discourages Harlan’s late-night movement
  description: 'After the party, Walt and Jacob linger on the front porch, smoking.
    Through the glazed glass, Walt spots Harlan descending the stairs toward the kitchen—likely
    for a midnight snack. Walt immediately intervenes, barking an order for Harlan
    to return to bed. The exchange reveals Walt’s unspoken authority over his father,
    a dynamic that underscores Harlan’s passive compliance and the family’s power
    imbalances. Lieutenant Elliott’s voiceover later clarifies the forensic significance:
    the medical examiner’s estimated time of death (12:15–2 AM) aligns with this moment,
    as Meg arrives home at 12:30 AM and Walt and Jacob retire shortly after. The scene
    tightens the alibi timeline, forcing a reassessment of the Thrombey family’s movements
    during the critical window of Harlan’s death. Meg’s silent, hurried entrance—ignoring
    Walt and Jacob—hints at her own tensions within the family, further complicating
    the narrative’s web of secrets.'
