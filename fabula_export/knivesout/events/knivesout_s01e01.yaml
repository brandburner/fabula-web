  title: Walt redirects Harlan upstairs
  description: 'During the party’s late-night aftermath, Walt—standing on the front
    porch with his son Jacob—spots Harlan descending the stairs toward the kitchen.
    Through the glazed glass, Walt’s voice cuts sharply: *‘Dad, go to bed!’* Harlan,
    already frail and compliant, retreats without protest. This brief but telling
    exchange underscores Walt’s unspoken authority over his father, a dynamic that
    contrasts with Harlan’s later defiance in orchestrating his own death. The moment
    also serves as a forensic anchor: Lieutenant Elliott’s narration later ties it
    to the medical examiner’s time-of-death estimate (12:15–2 AM), tightening the
    alibi timeline. Meg’s arrival shortly after—ignoring Walt and Jacob—adds to the
    household’s fractured energy, while Walt’s lingering presence on the porch hints
    at his own unresolved tensions with Harlan’s control. The scene’s subtext reveals
    Walt’s resentment simmering beneath his dutiful facade, foreshadowing his later
    attempts to manipulate Marta for financial gain.'
