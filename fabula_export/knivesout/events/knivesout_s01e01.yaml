    both liquid and otherwise, I leave in their entirety to Marta Cabrera. My entire
    ownership of Blood Like Wine publishing I leave in its entirety to Marta Cabrera."'
  - 'LINDA: "You little bitch. Did you know about this? What did you do to him to
    make this happen, were you two what were you boinking my father?"'
  - 'RANSOM: [LAUGHING, tears down his cheeks]'
  - 'WALT: "No. What? That can''t be—this isn''t what dad wanted, this isn''t fair
    but we can work this out."'
  - 'BLANC: "I think heads have to cool a little, and in the meanwhile I''d maybe
    run."'
