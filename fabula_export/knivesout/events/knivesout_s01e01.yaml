      of words is the punchline: Harlan knew exactly how to wound him, and the empty
      envelope is his postmortem middle finger. The card’s blankness is a taunt, a
      reminder that Richard was never worthy of Harlan’s respect, that he’s always
      been an outsider. The envelope and card become physical manifestations of Richard’s
      humiliation, their emptiness a mirror to his own perceived worthlessness in
      the Thrombey family. He drops them onto the desk with a snarl, the blank card
      a silent scream of defeat.'
