  title: Marta’s Eavesdropping and Blanc’s Sudden Appearance
  description: Marta, already emotionally fragile from the investigation into Harlan’s
    death, sits alone in the foyer, staring at a portrait of her late employer. The
    muffled voices of Lieutenant Elliott and Benoit Blanc on the patio—discussing
    the case—draw her attention. Overcome by paranoia and the need to understand the
    investigation’s direction, she creeps toward the glass door and presses her ear
    against it, eavesdropping on Elliott’s dismissive remarks about the Thrombey family’s
    lack of motive. Just as Elliott questions Blanc’s insistence on further questioning,
    Blanc’s face suddenly materializes on the other side of the glass, startling Marta
    into a yelp as she stumbles backward. The moment exposes her growing distrust
    of the family and her own desperation to stay informed, while Blanc’s silent,
    unnerving appearance reinforces his role as an unpredictable observer who sees
    far more than he lets on. The encounter deepens the tension between Marta’s guilt
    and Blanc’s methodical scrutiny, setting up future confrontations where her secrets—and
    his deductions—will collide.
