  title: Ransom’s Violent Confession and Collapse
  description: "\n  Ransom’s carefully constructed facade of control shatters when\
    \ Marta receives confirmation that Fran is alive—directly implicating him in her\
    \ disappearance. Blanc’s revelation that Fran will corroborate the truth triggers\
    \ Ransom’s explosive breakdown, where he violently admits to orchestrating Fran’s\
    \ attempted murder while vehemently denying her death. His confession is a mix\
    \ of defiance and desperation, revealing his guilt and deepening the mystery of\
    \ Fran’s fate. Marta’s involuntary physiological reaction—vomiting on Ransom—exposes\
    \ her lie about Fran’s survival, forcing Ransom to confront the consequences of\
    \ his actions. In a final act of unhinged aggression, Ransom lunges at Marta with\
    \ a prop knife, only for the blade to retract harmlessly, leaving him exposed\
    \ and defeated. The scene marks a critical turning point: Ransom’s facade of control\
    \ is destroyed, his guilt is confirmed, and the investigation shifts toward unraveling\
    \ the full truth of Fran’s disappearance and Harlan’s death.\n  "
