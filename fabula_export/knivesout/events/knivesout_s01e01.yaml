  title: Blanc isolates Ransom as suspect
  description: In the library, Detective Blanc abruptly shifts his interrogation focus
    to Ransom Drysdale, physically and psychologically cornering him to test his reactions.
    The move is strategic—Blanc has likely gathered enough circumstantial evidence
    (Ransom’s disinheritance, his manipulation of Marta, his financial desperation)
    to suspect him as either a key decision-maker or accomplice in Harlan’s death.
    By singling him out, Blanc forces Ransom into a reactive position, where his defensiveness
    or evasiveness could reveal cracks in his carefully constructed alibi. The tension
    escalates as Ransom’s usual bravado is met with Blanc’s unshakable scrutiny, hinting
    at deeper family dynamics (e.g., Ransom’s resentment toward Harlan, his rivalry
    with Walt, or his role in the inheritance scheme). The moment serves as a narrative
