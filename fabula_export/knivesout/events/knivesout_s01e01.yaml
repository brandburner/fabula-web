    crumbling as Walt and Jacob’s muffled voices rise from below. The weight of her
    guilt and the chaos unfolding in the house below freeze her in place. She turns
    back to the door, her hand hovering—can she go through with it? The silence from
    within feels like judgment. After a beat of agonizing indecision, she exhales
    sharply, curses under her breath, and pushes back into the office. This moment
    of hesitation is the pivot where her moral compromise becomes irreversible, foreshadowing
    the consequences of her inaction and the unraveling of Harlan’s carefully orchestrated
    plan. The scene underscores Marta’s internal conflict: her loyalty to Harlan wars
    with her self-preservation, and the door—both literal and symbolic—represents
    the threshold she cannot yet cross without breaking.'
