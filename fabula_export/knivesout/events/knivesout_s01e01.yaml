  title: Linda discovers Harlan’s hidden sentimental note
  description: "\n  In a private moment of grief, Linda lingers in Harlan’s small\
    \ study, carefully replacing his old baseball—a cherished relic of their shared\
    \ past—when her attention snags on a pink envelope resting on the desk. She picks\
    \ it up, extracts the blank note inside, and her expression shifts from curiosity\
    \ to quiet recognition. The note’s emptiness carries weight; her sad smile suggests\
    \ it’s not the words that matter, but the unspoken bond it represents. This discovery\
    \ subtly foreshadows deeper secrets tied to Harlan’s death, as Linda’s quiet recognition\
    \ implies the note is more than a keepsake—it’s a fragment of a father-daughter\
    \ relationship that existed beneath the family’s public facade. The moment underscores\
    \ Linda’s role as both a grieving daughter and a keeper of Harlan’s legacy, hinting\
    \ at unresolved tensions between her public strength and private vulnerabilities.\n\
    \  "
