  title: Marta Replays the Evidence
  description: 'Marta sits in her car outside Thrombey Manor, replaying the damning
    audio evidence of Fran’s accusations and her own frantic 911 call—the moment that
    sealed her guilt. The recording forces her to confront the irreversible consequences
    of her actions: the accidental overdose, the cover-up, and the web of lies that
    now entangle her. Her physical stillness belies the storm inside; she turns off
    the engine, her breath shallow, as she stares at the imposing house where the
    truth will soon be extracted. Blanc’s quiet question—*Are you ready?*—hangs in
    the air, a challenge and a test. This moment crystallizes Marta’s emotional breaking
    point: she is no longer just a nurse caught in a tragedy but a woman about to
    face the reckoning she’s spent weeks evading. The scene serves as the narrative
    fulcrum before the final confrontation, where her confession will either free
    her or destroy her.'
