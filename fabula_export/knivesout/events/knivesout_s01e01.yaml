  description: "\n  In a pivotal flashback moment, Marta initially hesitates to help\
    \ Fran—who lies dying from Ransom’s manipulation—reflecting her fear of further\
    \ entanglement in the Thrombey family’s schemes. However, Blanc’s unseen narration\
    \ (a narrative device framing her moral reckoning) compels her to act. Against\
    \ her self-preservation instincts, Marta turns back, calls 911, and performs life-saving\
    \ CPR on Fran. This impulsive act of mercy defies Ransom’s control over her, exposing\
    \ her buried compassion and moral agency. The scene underscores Marta’s capacity\
    \ for defiance, even as it highlights the fragility of her position within the\
    \ Thrombey family’s web of lies. The contrast between her initial reluctance and\
    \ her eventual intervention reveals the tension between survival and conscience,\
    \ a theme central to her character arc. The moment also foreshadows the consequences\
    \ of her choice: saving Fran will later cost her the inheritance and risk her\
    \ freedom, but it reaffirms her humanity in a family that has repeatedly exploited\
    \ her.\n  "
