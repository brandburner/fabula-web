    housekeeper, seemingly dead in a chair, her body eerily still with a spider crawling
    across her face. After a moment of shock, Marta realizes Fran is still alive but
    barely breathing. Fran, in a weakened state, gasps out fragmented accusations—'copy...
    stashed... you did this... won’t get away with this'—implying Marta’s involvement
    in something hidden. Marta hesitates, torn between suspicion and compassion, but
    ultimately chooses to save Fran’s life by calling 911 and administering mouth-to-mouth
    resuscitation. The scene underscores the fragility of trust between Marta and
    the Thrombey family, foreshadowing deeper secrets tied to Harlan’s death and Marta’s
    own entanglement in the cover-up. The empty envelope in Fran’s lap and the charred
    paper on the floor hint at evidence that may implicate Marta further, raising
    the stakes of the investigation and the moral conflict she faces.
