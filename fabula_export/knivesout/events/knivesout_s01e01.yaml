  description: 'During Harlan Thrombey’s 85th birthday party, Jacob—Walt’s politically
    active son—finds himself trapped in the half-bath, where he accidentally overhears
    a heated argument between Harlan and Ransom through a vent. Though the conversation
    is muffled, two critical words break through the noise: *‘my will’*—a phrase that
    immediately signals the argument’s explosive stakes. This moment is pivotal: Jacob’s
    reluctant testimony later becomes a linchpin in the investigation, as his eavesdropping
    reveals Ransom’s disinheritance, a secret that fuels the family’s unraveling.
    The scene underscores Jacob’s passive yet consequential role in the mystery, positioning
    him as an unwitting witness to the Thrombey family’s most volatile secrets. His
    discomfort and evasiveness in subsequent interactions (e.g., with Linda) suggest
    he’s grappling with the moral weight of what he knows, even if he doesn’t yet
    understand its full implications. The event serves as both a setup for Ransom’s
    later rage and a foreshadowing of the will’s explosive revelations, tying directly
    to the family’s fractured dynamics and the investigation’s central conflict.'
