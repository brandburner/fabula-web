- fabula_uuid: cand_evt_scene_535393ed1afa7971_02
  global_id: null
  title: Marta’s Moral Crossroads with Ransom and Meg
  description: "\n  In a dimly lit restaurant, Marta—already emotionally raw from\
    \ confessing her role in Harlan’s death to Ransom—faces a brutal moral reckoning.\
    \ Ransom, initially stunned by her revelation, pivots from shock to calculated\
    \ manipulation, offering a twisted alliance: he’ll protect her from Blanc and\
    \ the family if she shares the inheritance with him, framing it as a victory over\
    \ the Thrombeys’ corruption. His motive isn’t loyalty but vengeance—he wants to\
    \ dismantle his family’s privilege from within. Marta’s hesitation is shattered\
    \ when Meg calls, her voice trembling as she reveals Joni’s financial ruin and\
    \ the threat of dropping out of school. Meg’s plea—‘you should give it back to\
    \ us’—exposes the family’s hypocrisy: they’ve exploited Marta’s labor and compassion\
    \ for years, yet now demand her sacrifice. The moment forces Marta to choose between\
    \ her guilt, Meg’s future, and Ransom’s cynical deal. Her refusal to surrender\
    \ the inheritance—despite Meg’s emotional blackmail—reaffirms her moral integrity,\
    \ while Ransom’s smirking offer underscores the Thrombeys’ moral rot. The scene\
    \ crystallizes Marta’s isolation: she’s caught between a family that sees her\
    \ as a tool and a blackmailer who weaponizes her desperation.\n  "
