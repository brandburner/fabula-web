  title: Marta’s futile attempt to stop Harlan
  description: 'In the late-night aftermath of Harlan’s 85th birthday party, Marta—exhausted
    but dutiful—tries to guide him to bed after his prolonged social exertion. Harlan,
    however, refuses to rest, stubbornly insisting on climbing the narrow stairs to
    his office despite his frailty. The physical struggle (Marta’s exasperated pleas,
    Harlan’s labored ascent) underscores his unyielding devotion to work, even as
    his body betrays him. Marta’s frustration reveals her growing role as his reluctant
    caretaker, while Harlan’s defiance foreshadows his later orchestration of his
    own death to protect her. The scene’s tension lies in the contrast between Marta’s
    protective instincts and Harlan’s self-destructive drive—both of which will later
    collide tragically. The medical kit she grabs hints at the looming health crisis,
    while the late-night urgency amplifies the stakes: Harlan’s mind remains sharp,
    but his body is failing, and his secrets are about to unravel.'
