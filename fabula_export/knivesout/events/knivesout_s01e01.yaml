      engine is a deliberate, symbolic gesture: it’s as if she’s shutting out the
      world, creating a pocket of time where the truth can surface. The car’s interior,
      dimly lit by the dashboard, becomes a liminal space where secrets are shared
      and alliances are tested. The car’s confinement amplifies the tension, making
      Marta’s confession feel intimate yet inescapable. It’s also a metaphor for her
      position: she’s trapped between the Thrombeys’ accusations and Blanc’s scrutiny,
      with no easy exit.'
    status_before_event: The car is parked outside the Thrombey estate, engine running,
      a temporary refuge for Marta as she grapples with Fran’s accusation. The interior
      is tense, the air thick with unspoken words.
    status_after_event: The car is now silent, the engine off, a physical manifestation
      of Marta’s resolve—or her surrender. The moment of confession has passed, but
      the car remains a charged space, a battleground of emotions that will follow
      her into the estate.
  - object_uuid: object_0c7dabf784f3
    description_of_involvement: 'Harlan’s will is the unseen but all-powerful force
      driving this moment. Marta’s mention of *‘the copy’* stashed away is a direct
      reference to the document that has upended the Thrombey family’s expectations
      and turned Marta into a target. Fran’s accusation—*''you did this''*—is inextricably
      linked to the will’s contents: did Marta know about its terms? Did she play
      a role in Harlan’s death to secure her inheritance? The will is the elephant
      in the room, the unspoken subtext that gives Fran’s words their venom and Marta’s
      guilt its weight. Blanc, ever the detective, will use this information to probe
      deeper, knowing the will is the key to unraveling the family’s motives.'
    status_before_event: The will exists as a legal document, its contents known only
      to Harlan, Marta, and potentially Fran. It is the catalyst for the family’s
      suspicion and Marta’s guilt.
    status_after_event: The will remains a ticking time bomb, its implications now
      out in the open. Marta’s admission about *‘the copy’* suggests it is hidden
      somewhere, a clue Blanc will undoubtedly pursue.
