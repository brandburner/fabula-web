  title: Richard’s Desperate Search and Destructive Outburst
  description: 'Richard, already on edge from Linda’s probing questions about his
    whereabouts, seizes a private moment in Harlan’s study to search for the incriminating
    letter Harlan had threatened him with during their last confrontation. His frantic
    rifling through drawers—including forcing open a locked compartment—reveals a
    blank card inside the pink envelope, a deliberate taunt from Harlan that confirms
    his father-in-law’s psychological manipulation. The discovery triggers a violent
    outburst: Richard, consumed by rage and humiliation, hurls Harlan’s prized baseball
    out the window, a symbolic act of defiance that exposes his festering resentment
    toward the Thrombey family’s control over his life. The scene underscores Richard’s
    psychological fragility, the toxic legacy of his relationship with Harlan, and
    the family’s capacity for psychological warfare, foreshadowing deeper conflicts
    in the investigation as his actions may later be discovered by Blanc or the police.'
