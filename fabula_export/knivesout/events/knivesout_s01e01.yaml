  title: Marta’s Xenophobia Confrontation
  description: During a heated family gathering, the Thrombey clan’s xenophobic tensions
    erupt as Richard singles out Marta, forcing her to defend her progressive views
    under pressure. Donna’s anti-immigrant tirade escalates into a confrontation with
    Joni, exposing the family’s deep-seated divisions. Marta, already on edge, is
    cornered by Richard, who demands she publicly endorse his nativist rhetoric. The
    tension peaks when Harlan and Ransom’s explosive argument in the study provides
    Marta a brief escape, allowing her to slip away—visibly shaken—while the family’s
    hostility lingers. The scene underscores Marta’s vulnerability as an outsider
    in the Thrombey household and foreshadows the family’s capacity for cruelty, which
    will later be weaponized against her in Ransom’s scheme. The moment also highlights
    the family’s fractured moral compass, where privilege and prejudice collide, setting
    the stage for Marta’s eventual betrayal by those she trusted.
