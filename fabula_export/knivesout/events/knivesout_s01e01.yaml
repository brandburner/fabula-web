  title: Marta erases evidence under Blanc’s scrutiny
  description: "\n  Marta discovers her muddy footprints—clear evidence of her earlier\
    \ trespass—near the Thrombey estate’s pedestrian gate. As Blanc and the police\
    \ prepare to examine the area, she methodically retraces her steps, ensuring her\
    \ prints overlap perfectly, obscuring their original path. When Blanc orders everyone\
    \ to freeze, Marta feigns ignorance, trotting back through the gate while stepping\
    \ into her own tracks, further muddying the forensic trail. The distraction of\
    \ barking dogs and arriving family members provides cover as she subtly kicks\
    \ a broken trellis fragment—a second piece of incriminating evidence—under nearby\
    \ bushes while Blanc is momentarily distracted by Greatnana. The scene escalates\
    \ tension between Marta and Blanc, as her calculated deception contrasts with\
    \ his sharp observational skills. Blanc’s line of sight never fully leaves her,\
    \ and his later request for her to handle the study suggests he’s testing her\
    \ further, deepening the cat-and-mouse dynamic. The moment underscores Marta’s\
    \ desperation to protect her mother while Blanc’s quiet persistence signals his\
    \ growing suspicion of her involvement in Harlan’s death.\n  "
