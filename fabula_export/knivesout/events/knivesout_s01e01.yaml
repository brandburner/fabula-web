    ragged and her body tense—a visceral reaction to the trauma of Harlan Thrombey’s
    death. The moment she opens her eyes, the weight of guilt and fear is palpable,
    her movements jerky as she stumbles to the window, as if searching for something
    (or someone) outside. This isn’t just grief; it’s the unspoken terror of a woman
    who knows she’s entangled in a crime she didn’t intend to commit. The scene foreshadows
    her role as both a victim and a key player in the unfolding mystery, her physical
    distress (a precursor to her involuntary vomiting when lying) hinting at the psychological
    unraveling to come. The stark contrast between her modest surroundings and the
    opulence of the Thrombey estate underscores her vulnerability, while her frantic
    glance outside suggests she’s already anticipating the investigation that will
    soon trap her.
