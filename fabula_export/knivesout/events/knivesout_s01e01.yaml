  global_id: null
  title: Blanc reveals Marta’s bloodstain clue
  description: 'In a private moment after her police statement, Marta—wrapped in a
    blanket, visibly shaken—confronts Blanc about his suspicions. He reveals he knew
    of her involvement from the start, pointing to a faint bloodstain on her shoe,
    a physical clue linking her to Harlan’s death. Instead of pressing charges, Blanc
    pivots to a moral lesson: he urges Marta to trust her own judgment over the Thrombey
    family’s expectations, framing her dilemma as a choice between compliance and
    self-reliance. The exchange underscores Blanc’s strategic empathy—he doesn’t accuse
    but instead manipulates Marta’s guilt into a tool for her own agency. Through
    the window, Marta glimpses the Thrombey family outside, reinforcing her internal
    conflict between loyalty and self-preservation. Blanc’s wink and departure leave
    her with the unspoken weight of her decision, deepening the tension between individual
    conscience and familial obligation in the investigation.'
