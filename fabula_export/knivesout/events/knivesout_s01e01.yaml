      by life-or-death stakes. The board’s disarray symbolizes the disruption of their
      dynamic, marking the transition from mentor-protégé to co-conspirators.
    status_before_event: Intact and neatly arranged on the study table, with black
      and white stones in place, symbolizing the balance of Harlan and Marta’s relationship.
    status_after_event: Overturned and scattered across the rug, stones spilled, representing
      the shattered trust and the chaos of the overdose crisis.
  - object_uuid: object_c6646ce66af7
    description_of_involvement: Marta’s medical kit is the failed emergency resource
      in this event. After realizing her mistake, she frantically searches its contents
      for the Naloxone antidote, only to find it missing. The kit’s absence of the
      critical medication seals Harlan’s fate and becomes a pivotal detail in his
      manipulation of Marta. The kit, meant to be a lifeline, instead becomes a tool
      of Harlan’s control, as its failure to provide a solution forces Marta into
