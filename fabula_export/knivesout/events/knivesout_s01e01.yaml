    the night of Harlan’s death—one he saved from deletion. As the group struggles
    with the antiquated equipment, Marta notices the security feed captures the gardener’s
    road, a detail Harlan had explicitly instructed her to avoid that evening. Her
    realization triggers alarm, suggesting a deliberate connection between Harlan’s
    final instructions and the circumstances of his death. The moment underscores
    Marta’s growing unease and the tape’s potential as critical evidence, while also
    highlighting the family’s reliance on outdated systems and the investigator’s
    frustration with technological limitations. Marta’s abrupt takeover of the tape
    signals her determination to control the investigation’s direction, masking her
    own involvement.
