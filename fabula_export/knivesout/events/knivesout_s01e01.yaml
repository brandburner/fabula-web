    \ before she can speak. Her voice trembles as she begins, 'She said—', but the\
    \ scene cuts abruptly, leaving her confession dangling. This interruption is not\
    \ accidental; it mirrors the larger narrative tension, where truths are always\
    \ just out of reach. The aborted confession marks a critical turning point: Marta’s\
    \ guilt is no longer abstract, and the detective’s next move will hinge on whether\
    \ to press her or let the silence fester. The library, a symbol of Harlan’s intellectual\
    \ dominance, becomes a stage for Marta’s vulnerability, her physical tell (vomiting\
    \ when she lies) looming as an unspoken threat. The unresolved confession now\
    \ hangs over the investigation like a sword, forcing Blanc to decide how to exploit—or\
    \ protect—this moment of weakness.\n  "
