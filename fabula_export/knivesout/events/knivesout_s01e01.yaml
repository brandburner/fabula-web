  title: Marta seizes control of the security tape
  description: "\n  In the cramped, outdated guard house, Marta and the investigators\
    \ examine the security tape from Harlan Thrombey’s death night. Proofroc, the\
    \ aging security guard, proudly demonstrates the archaic VHS system, revealing\
    \ a tape he saved from deletion. As the grainy footage plays, Marta notices a\
    \ critical detail: the camera angle captures the gardener’s road, which Harlan\
    \ had explicitly instructed her to avoid that evening—a clue that suggests his\
    \ death was premeditated. When Blanc and Wagner propose digitizing the tape for\
    \ easier review, Marta abruptly intervenes, physically taking control of the tape\
    \ herself. Her action is a calculated power move, signaling her determination\
    \ to dictate the investigation’s terms while concealing her own involvement. The\
    \ tension escalates as Marta’s poker face masks her alarm, underscoring her hidden\
    \ motives and the fractured trust among the group. The scene highlights Marta’s\
    \ growing influence and the family’s fractured dynamics, setting up her future\
    \ manipulations as the investigation unfolds.\n  "
