  key_dialogue:
  - 'BLANC: I am here because this morning someone dodged one very important question.
    Linda asked who hired me. So who hired you? I. Do. Not. Know. An envelope of cash
    showed up at my apartment yesterday, with the news clipping of Thrombey''s death.'
  - 'BLANC: But there was something else. Harlan had turned Walter down before regarding
    film rights, but that night something Harlan said shook him. We look at the pattern,
    Harlan was cleaning house. I wonder... did he plan to fire Walter?'
  - 'LIEUTENANT ELLIOTT: We know, the party broke up at 11:30. [Blanc leans back,
    closes his eyes.] Walk me through everyone''s whereabouts at the time of death.'
