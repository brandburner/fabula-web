  title: Harlan reveals Joni’s embezzlement to Marta
  description: In a private study, Harlan Thrombey discovers damning financial records
    proving Joni has been embezzling funds—specifically Meg’s tuition money—from his
    accounts. His reaction is one of quiet devastation, a sigh escaping him as he
    processes the betrayal of someone he trusted. When Marta enters and asks what’s
    wrong, Harlan hands her the evidence without explanation, his silence speaking
    volumes about the depth of his disappointment. This moment isn’t just about the
    financial deception; it’s a fracture in the family’s fragile trust, one that will
    later force Marta into an impossible position when she must choose between loyalty
    to Harlan and protecting Joni’s secret. The scene underscores Harlan’s role as
    the family’s moral compass, even as his own actions (like orchestrating his death)
    complicate that legacy. The revelation also foreshadows the broader theme of hidden
    motives, as Joni’s financial desperation becomes a potential motive for Harlan’s
    murder—though the truth is far more complex.
