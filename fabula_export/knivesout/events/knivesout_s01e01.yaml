  title: Ransom plants blackmail note to frame Marta
  description: In a calculated act of deception, Ransom Drysdale—Harlan Thrombey’s
    disinherited grandson—creeps down the dimly lit hallway of Marta Cabrera’s apartment
    building under the cover of night. With deliberate precision, he slips a pre-written
    blackmail note into the letter slot of Marta’s door, ensuring it will be discovered
    by her the following morning. This act is a critical maneuver in Ransom’s broader
    scheme to manipulate the investigation into Harlan’s death, framing Marta as the
    culprit to divert suspicion from himself. The note’s contents—likely referencing
    Marta’s accidental overdose of Harlan—are designed to exploit her vulnerability
    and force her into a position where she must either confess or be exposed. Blanc’s
    later voiceover confirms this as a premeditated step in Ransom’s ruthless orchestration
    of the Thrombey family’s unraveling, revealing his willingness to destroy an innocent
    woman to regain his inheritance. The scene underscores Ransom’s manipulative nature
    and sets up Marta’s eventual confrontation with the note, which will further entangle
    her in the investigation’s web of lies.
