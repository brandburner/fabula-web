    about his whereabouts during the afternoon of Harlan’s death. Blanc reveals that
    a caterer overheard Harlan engaged in a heated argument with a man—likely Richard—in
    his study, contradicting Richard’s earlier claim that he was helping set up the
    party. Richard deflects by suggesting Joni might have been involved, but Blanc
    counters that the voices were male, exposing Richard’s evasion. The exchange underscores
    Blanc’s relentless precision in uncovering inconsistencies while revealing Richard’s
    desperation to conceal his true involvement in the events leading to Harlan’s
    death. The scene serves as a turning point, shifting the investigation’s focus
    from Marta to Richard’s hidden motives and potential guilt.
