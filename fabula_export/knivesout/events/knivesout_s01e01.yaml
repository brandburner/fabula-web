  key_dialogue:
  - 'MARTA: "You ever notice how the light hits the fields here? Like it’s trying
    to tell you something. My abuela used to say—well, never mind what she said. Point
    is, there was this time, back when I was nursing in the city, I had a patient—old
    man, sharp as a tack, but he’d tell these stories. Wild stories. And you’d think,
    *This can’t be real*, but then he’d drop some detail—like the way the rain sounded
    on his window that night—and suddenly you *believed* him. Even if it was all made
    up."'
