  title: Walt’s cryptic call disrupts Marta’s grief
  description: Marta sits numbly in the Cabrera kitchen, scrolling through job listings
    while her mother and sister Alice bicker over a crime show playing on an iPad.
    The show’s murder-related dialogue triggers an emotional breakdown in Marta, who
    laughs then sobs as her mother scolds Alice for insensitivity. The tension breaks
    when Marta’s phone rings—it’s Walt Thrombey, Harlan’s estranged son. His call,
    delivered in a cryptic, unsettling tone, immediately shifts Marta’s demeanor from
    grief to confusion. The unspoken subtext of Walt’s words (implied by Marta’s reaction)
    suggests he knows something about Harlan’s death or Marta’s involvement, forcing
    her to confront an unacknowledged connection to the Thrombey investigation. The
    call acts as a catalyst, pulling Marta back into the orbit of the Thrombey family’s
    secrets and setting up her defiant return to the estate.
