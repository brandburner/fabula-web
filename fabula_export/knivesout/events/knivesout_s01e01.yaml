  global_id: null
  title: Harlan disinherits Ransom in private
  description: 'During Harlan Thrombey’s 85th birthday party, Ransom confronts his
    grandfather in the small study, demanding answers about his future inheritance.
    Harlan, cold and resolute, delivers a devastating blow: he will leave *nothing*—no
    money, no literary rights—to Ransom or any other family member. The exchange is
    charged with unspoken resentment, revealing Harlan’s long-simmering disdain for
    Ransom’s entitlement and the family’s greed. This private confrontation foreshadows
    Ransom’s later desperation to reclaim his inheritance, setting up his motive for
    murder and framing Marta. The scene underscores Harlan’s control over his legacy
    and his willingness to weaponize it, while Ransom’s reaction—shock, then simmering
    rage—hints at his capacity for violence. The dialogue’s brevity amplifies its
    impact, leaving no room for negotiation or appeal.'
