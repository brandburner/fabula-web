  - object_uuid: object_c8bf73239652
    description_of_involvement: 'The small window in Harlan’s study serves as a contextual
      detail that underscores the isolation of the event. Harlan closes it sharply
      to block out Walt’s cigar smoke, a small but telling action that frames the
      study as a sealed-off space where the overdose and cover-up will unfold. The
