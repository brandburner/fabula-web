  title: Marta and Ransom decode blackmail threat
  description: Marta, panicked after receiving an anonymous blackmail letter containing
    a photocopied medical examiner’s tag with her name and a torn toxicology report
    header, seeks Ransom’s help. The letter implicates her in Harlan’s morphine overdose,
    but its cryptic nature—sending a photocopy rather than the actual evidence—suggests
    a calculated, almost theatrical threat. Ransom, initially dismissive, reveals
    his past as Harlan’s research assistant, exposing his intimate knowledge of the
    case. Their exchange reveals Marta’s raw fear of exposure and Ransom’s analytical
    detachment, while the letter’s odd specificity (the tag, the torn report) hints
    at a blackmailer who knows *exactly* what they’re doing—but isn’t ready to strike
    yet. The tension escalates as Marta’s desperation clashes with Ransom’s clinical
    dissection of the threat, foreshadowing deeper vulnerabilities in both characters
    as the family scandal tightens its grip.
