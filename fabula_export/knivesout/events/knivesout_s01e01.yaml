- fabula_uuid: cand_evt_scene_373e0b4f48aaef59_01
  global_id: null
  title: Elliott challenges Blanc’s break-in theory
  description: 'In the overgrown woods surrounding the Thrombey estate, Lieutenant
    Elliott openly questions Detective Blanc’s theory that Harlan’s murder might have
    involved a staged break-in, dismissing it as unlikely. The skepticism underscores
    Elliott’s procedural mindset and his reluctance to embrace Blanc’s more speculative
    approach. Meanwhile, Trooper Wagner’s distracted admiration for the estate’s literary-themed
    statues—inspired by Harlan’s *Menagerie Tragedy* series—contrasts sharply with
