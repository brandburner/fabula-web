  title: Linda overhears Marta’s midnight departure
  description: 'Linda, exhausted from the party’s emotional toll, finally drifts into
    a fragile sleep in the guest room. Her rest is abruptly shattered by the unmistakable
    creaking of floorboards—Marta’s hurried, clandestine exit. The sound is followed
    by Marta’s muffled but urgent whisper to Walt, confirming her departure. This
    moment is a quiet but critical turning point: Linda, already suspicious of Marta’s
    motives, now has tangible evidence of her secretive behavior. The timing—midnight,
    during a family crisis—heightens the implication that Marta’s actions are deliberate
    and potentially incriminating. The exchange underscores the Thrombey family’s
    fractured trust, as Linda’s groggy awareness forces her to confront the possibility
    that Marta’s presence in their home is far more complicated than it appears. The
    scene’s tension lies in its silence: no direct confrontation, just the creeping
    realization that secrets are being kept in plain sight, and that Linda’s own role
    as an observer may soon demand action.'
