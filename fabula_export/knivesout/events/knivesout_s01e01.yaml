  title: Harlan’s Suicide and Marta’s Trauma
  description: "\n  In a flashback to Harlan Thrombey’s study, Marta Cabrera rushes\
    \ in to find him reclining on a couch, an ornate dagger pressed to his throat.\
    \ Despite her desperate pleas for medical intervention, Harlan insists everything\
    \ will be fine if she follows his instructions. When she attempts to stop him,\
    \ he swiftly slashes his own throat, spraying blood across the room. The brutal,\
    \ irreversible violence of his death leaves Marta in stunned silence, her hands\
    \ clamped over her mouth in horror. She flees the room, closing the door behind\
    \ her—a moment that marks the irreversible rupture of their relationship and the\
    \ unraveling of the family’s secrets. This act of self-destruction is both a final\
    \ act of control for Harlan and a psychological breaking point for Marta, whose\
    \ trauma will later shape her actions under Blanc’s investigation.\n  "
