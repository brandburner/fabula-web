    \ Marta’s confession to Blanc’s authoritative ruling disrupts the emotional and\
    \ narrative momentum, forcing the family to confront their complicity while Marta\
    \ is forcibly removed from the room. The scene ends with Linda noticing Harlan’s\
    \ old baseball left behind by Blanc, a subtle but significant detail that hints\
    \ at deeper, unresolved connections between Harlan’s past and the family’s present\
    \ tensions.\n  "
