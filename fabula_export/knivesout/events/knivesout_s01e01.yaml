  global_id: null
  title: Marta’s Emotional Collapse and Walt’s Call
  description: "\n  In the Cabrera kitchen, Marta sits numbly scrolling through job\
    \ listings, her grief over Harlan’s death palpable. Her mother, sensing her distress,\
    \ demands Alice turn off her crime show—an act of insensitivity that triggers\
    \ Marta’s emotional unraveling. The tension escalates as Alice resists, forcing\
    \ their mother to shout about the inappropriateness of murder TV in the wake of\
    \ Harlan’s death. Marta’s laughter at the absurdity curdles into sobs, exposing\
    \ her raw vulnerability. Alice, realizing her mistake, apologizes and hugs her\
    \ sister, but the moment is interrupted by a call from Walt Thrombey. Marta’s\
    \ confusion at his cryptic message—delivered with an unsettling tone—hints at\
    \ deeper family secrets and sets up her inevitable return to the Thrombey estate.\
    \ The scene functions as both a cathartic release of Marta’s repressed grief and\
    \ a narrative pivot, linking her personal breakdown to the unfolding investigation.\n\
    \  "
  episode_uuid: ep_sea_ser_knivesout_s01_e01
  scene_sequence: 4
  sequence_in_scene: 4
  key_dialogue:
  - |-
    MOM: Alice, turn that off now.
    ALICE: Why it's almost over, what— they're finding out who did it and the wifi sucks in my room so it doesn't play it's like two minutes left what there isn't even anything bad on it, it's just normal tv and they're just talking ok ok goddddd whatever ok whatever.
    MOM: Now please just turn it off. Turn it off. Now. Alice. Off. They're talking about murder on it, your sister just had a friend she loves slit his throat open she doesn't need to be hearing that right now let's be sensitive!
  - |-
    MARTA: Alice you can keep watching your show it's alright.
    ALICE: No, I guessed who did it anyway. I'm sorry Marta.
  - |-
    MARTA: It's Harlan's son.
    [listens, face shifting in confusion]
    MARTA: What?
