  title: Ransom manipulates Marta into confession
  description: 'In a dimly lit restaurant booth, Ransom—ever the calculating outsider—exploits
    Marta’s physical vulnerability (her involuntary vomiting when lying) to force
    a confession about Harlan’s death. He begins with feigned concern, ordering food
    for her and probing her emotional state, but quickly pivots to psychological pressure.
    Ransom reveals his own disinheritance and the generational trauma of the Thrombey
    family, creating a false sense of camaraderie before dropping the trap: he knows
    she lied about Harlan’s death. When Marta’s physiological tell (her empty plate)
    confirms his suspicion, he demands the truth. The scene escalates from manipulation
    to raw emotional confrontation, with Marta’s tears and Ransom’s sudden tenderness
    suggesting a twisted empathy beneath his cruelty. This moment exposes the family’s
    fractured legacy and sets up Ransom’s role as both antagonist and reluctant ally
    in uncovering the truth.'
