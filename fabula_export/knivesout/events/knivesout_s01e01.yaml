  title: Harlan blackmails Richard with affair evidence
  description: During the party, Harlan ambushes Richard in the small study with irrefutable
    proof of his affair—long-lens photos of Richard kissing another woman and a sealed
    letter addressed to Linda. Harlan weaponizes his knowledge, threatening to expose
    Richard unless he confesses to Linda himself. The confrontation escalates physically
    when Harlan slams a baseball onto the desk, underscoring his ruthless control
    over the family’s secrets. Richard’s defiance crumbles under Harlan’s ultimatum,
    revealing his desperate vulnerability and the fragility of his marriage. This
    moment exposes Harlan’s manipulative dominance and Richard’s complicity in the
    family’s web of deceptions, directly tying into Blanc’s later interrogation about
    Richard’s buried guilt and the broader Thrombey family’s pattern of emotional
    suppression. The scene serves as both a turning point in Richard’s arc and a setup
    for Linda’s eventual discovery of the affair, deepening the family’s unraveling
    dynamics.
