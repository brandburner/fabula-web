  title: Blanc challenges Marta’s loyalty
  description: 'In the library, Blanc confronts Marta with a blunt accusation—‘You
    are not going to give up the money’—exposing his suspicion that her hesitation
    to confess Harlan’s death stems from self-interest rather than guilt. The line
    cuts through Marta’s emotional turmoil, forcing her to confront the moral conflict
    between her financial desperation (her mother’s undocumented status) and her ethical
    duty to reveal the truth. Blanc’s phrasing is deliberately provocative, testing
    whether Marta will prioritize her family’s survival over her own conscience. The
    tension escalates as Marta’s physical reaction (vomiting) becomes a silent counterpoint
    to Blanc’s verbal challenge, underscoring the high stakes of her silence. This
    moment serves as a narrative fulcrum: Blanc’s accusation isn’t just about the
    inheritance—it’s a probe into Marta’s character, her capacity for deception, and
    whether she’ll break under pressure. The exchange also deepens the mystery of
    Blanc’s motives: is he protecting someone, manipulating Marta, or simply pushing
    her to reveal the truth?'
