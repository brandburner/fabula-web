  title: Marta’s Unconscious Medical Precision Revealed
  description: "\n  In the library, Blanc methodically dismantles Marta’s guilt by\
    \ demonstrating that her medication mix-up was not accidental but an instinctive\
    \ act of nursing expertise. He reveals he taped over the labels of two identical\
    \ vials—morphine and Toradol—and had Marta select one without hesitation. When\
    \ she instinctively picks the correct vial, Blanc exposes the truth: her subconscious\
    \ competence saved Harlan from the lethal doses Ransom had planted. The tox report\
    \ confirms Harlan’s death was suicide, not poisoning, absolving Marta of culpability.\
    \ Yet the revelation underscores Harlan’s premeditated plan to protect her and\
    \ deepens the mystery of his motives. Marta’s physical collapse—white as a ghost,\
    \ shuddering—signals the emotional weight of this twist: her actions were never\
    \ the cause of his death, but her presence in the room that night remains inextricably\
    \ tied to the family’s secrets. Blanc’s cryptic closing line hints at unresolved\
    \ layers, shifting the investigation’s focus from Marta’s guilt to the Thrombeys’\
    \ hidden agendas.\n  "
