  canonical_name: Kahlest
  title_role: null
  description: 'Kahlest anchors the Khitomer trauma in living memory: a severely wounded
    Klingon who survived the massacre and later served as Worf''s nurse before being
    separated from him at Starbase 24. Broken and withdrawn by grief, she nonetheless
    retains fierce loyalty to Mogh and a personal connection to High Council elder
    K''mpec. Initially refusing to testify and claiming she is ''dead'' inside, Kahlest
    later intervenes lethally to save Picard and forces open a council hearing with
    a single, decisive declaration — "Mogh was innocent" — shifting the political
    balance and exposing the Council''s cover-up.'
