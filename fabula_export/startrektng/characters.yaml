  canonical_name: Two Duty Nurses (USS Enterprise-D Sickbay)
  title_role: Nurse
  description: Pair of unnamed duty nurses stationed aboard the USS Enterprise-D,
    serving under Chief Medical Officer Beverly Crusher. They handle routine patient
    monitoring, support during medical crises, and assist with specific tasks such
    as monitoring laboring patients' contractions, paging the doctor for urgent cases
    (e.g., imminent births), and directing senior officers to newborns in the nursery.
    Competent, low-profile, and reliable, they execute standard procedures amid shipboard
    emergencies, embodying Starfleet's enlisted medical personnel. Their professionalism
    and efficiency ensure seamless medical operations, interacting with crew families,
    android observers like Data, and command figures such as Picard. They prioritize
    duty over personal recollection, maintaining operational continuity in high-traffic
    medical environments. One nurse is particularly observant and expressive, reacting
    openly to crew members' unusual personal requests, while the other operates with
    a more low-profile demeanor. Together, they form a reliable backbone for sickbay
    operations.
