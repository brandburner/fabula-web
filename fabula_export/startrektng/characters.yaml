  canonical_name: Nicholas 'Nick' Locarno
  title_role: Cadet First Class
  description: Nicholas 'Nick' Locarno commands Nova Squadron as Cadet First Class
    at Starfleet Academy. A charismatic and well-built leader, he wields strong influence
    over cadets like Wesley Crusher, binding them through shared ambition and pressure
    to uphold group loyalty. Cadets regard him as a surrogate father, coach, and best
    friend, following his directives without hesitation—even when reckless. His drive
    for glory pushes boundaries, prioritizing squadron unity and recognition over
    institutional rules or personal accountability. Relationships with authority figures
    like Admiral Brand and Captain Picard highlight tensions between his defiant independence
    and Starfleet's demands for truth. His influence, while strengthening squadron
    cohesion, risks catastrophic outcomes by overriding caution and common sense.
