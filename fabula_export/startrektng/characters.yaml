  canonical_name: Chorus
  title_role: Communication Conduit
  description: The Chorus serves as mediator Riva's vital communication conduit, collectively
    translating his thoughts and emotional intent through synchronized vocalization.
    Three distinct members—Scholar/Artist, Warrior/Adonis, and Cultured Woman—each
    embody facets of Riva's personality while maintaining rigorous ceremonial discipline.
    Their centuries-old attunement to Riva's silent communication forms the backbone
    of his mediation technique, though their total dependence becomes crippling when
    severed from his guidance. During diplomatic engagements, they project Riva's
    words with controlled neutrality, though individual members occasionally reveal
    personal flair—notably the Warrior/Adonis's flirtations with Troi. Their harmonious
    functioning contrasts sharply with their disintegration when technological failure
    leaves them directionless and terrified, exposing the fragility of Riva's entire
    mediation system.
