  description: Alexander Rozhenko is the son of Lieutenant Worf and Ambassador K'Ehleyr.
    This half-Klingon, half-human child grapples with his dual heritage, balancing
    human tendencies against Klingon warrior ideals. Raised largely by his mother
    on Starfleet ships, he resists his father's strict expectations, shows interest
    in Klingon customs yet shuns violence, and challenges authority on family and
    cultural issues. Strained ties with Worf center on honor and absence, while K'Ehleyr
    protects him from prejudice. Alexander pursues belonging through independence
    amid Klingon imperial tensions.
