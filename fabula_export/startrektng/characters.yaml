  title_role: Barber
  description: V'Sal works as the alien barber aboard the USS Enterprise-D. He trims
    hair with steady hands and shares playful, good-natured jabs with customers like
    Geordi La Forge. His banter builds rapport and eases tensions in the barbershop,
