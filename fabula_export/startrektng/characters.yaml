  canonical_name: Romulan Warbird Crew
  title_role: Crew Members
  description: Romulan naval personnel staffing perimeter stations on warbird bridges
    (notably under commanders like Toreth). They execute routine operations (e.g.,
    orbital insertion), maintain vigilant surveillance, and display subtle reactions
    that reveal factional tensions—particularly between military personnel and the
    Tal Shiar. Disciplined and loyal to their commanders, they exhibit grim amusement
    at intelligence mockery and keen attention to command clashes, embodying the wary
    loyalty of subordinates who prioritize ship functions amid internal rivalries.
    Their presence amplifies cultural divides within the Star Empire. **Note:** This
    entity encompasses all general Romulan warbird/warship crew roles, including bridge
    and non-bridge personnel, unless context specifies otherwise.
