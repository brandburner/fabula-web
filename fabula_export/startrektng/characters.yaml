  canonical_name: Three Gatherers
  title_role: null
  description: The Three Gatherers operate as a small, coordinated trio of hostile
    locals who execute a premeditated ambush against Riker's away team. Concealed
    in the Gatherer camp, they open phaser fire to pin the team and then attempt to
    deny the team's escape by pouring sand on a noranium pile to smother a smoke screen.
