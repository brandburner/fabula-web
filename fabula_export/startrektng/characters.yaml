  canonical_name: Antedian Delegates
  title_role: Delegates
  description: 'Two Antedian Delegates arrive aboard the Enterprise in a self‑induced,
    catatonic state, shrouded in hooded crimson robes and accompanied by a medium
    container of writhing, vermicular food. Medically inert on arrival, they function
    as diplomatic cargo and a latent biohazard: Pulaski conducts clinical examinations
    while Starfleet secures them in Sickbay. Their grotesque, catfish‑like physiology
    and ritualized stillness combine ceremonial mystery with rising medical activity—one
    delegate blinks as metabolic rates climb—forcing command to treat them as both
    diplomatic actors and emergent threats.'
