  canonical_name: Security Man
  title_role: Security Officer
  description: A shipboard security officer who asserts immediate control during sudden
    transport-room crises, issuing concise, commanding orders to contain threats.
    He functions as a procedural first responder on the Enterprise, coordinating with
    bridge and engineering personnel and acting under tactical cues from senior officers.
    His presence stabilizes chaotic moments long enough for senior security to intervene,
    reflecting a duty-first posture and readiness to enforce shipboard protocol against
    unpredictable combatants.
