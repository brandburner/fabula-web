  canonical_name: Jeremiah Rossa
  title_role: null
  description: Jeremiah Rossa, known to Talarians as Jono, is a human teenager abducted
    as a child and raised by Captain Endar in strict military culture. Endar treats
    him as a son, conditioning him to hide human traits under gloves and reject biological
    origins. Fiercely loyal to his adoptive father, he performs Talarian rituals and
    parrots warrior norms. Encounters with Captain Picard expose repressed memories
    of his parents' deaths, cracking his defiant facade and revealing vulnerability
    beneath the discipline.
