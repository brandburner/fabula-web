  canonical_name: Duffy
  title_role: Engineering Technician
  description: Duffy works as an engineering technician on the USS Enterprise-D, reporting
    to Geordi La Forge. He moves nitrogen canisters in Cargo Bay 5, spots a broken
    seal leaking Invidium that contaminates him and spreads ship malfunctions. In
    Ten Forward, he mocks Reginald Barclay as 'Broccoli' until his glass liquefies
    from the contaminant. In Main Engineering, he pitches magnetic quenches and diagnostic
    sweeps, questions Barclay's tests, links injector jams, anti-grav crashes, and
    transporter glitches, recalls his cargo bay role, nods to the Invidium theory,
    and directs Wesley on power routing to purge the threat.
