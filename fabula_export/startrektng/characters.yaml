  canonical_name: Fang-lee
  title_role: null
  description: Fang-lee served as a Starfleet officer and close comrade to Lieutenant
    Worf and Commander Riker aboard the USS Enterprise-D. When illness struck, she
    battled death with fierce determination, clinging to life for about a week. Her
    struggle highlighted the raw human drive to survive, forging a memory that Riker
    later wielded to affirm life's value among shipmates. Known for her tenacity amid
    personal loss, Fang-lee embodied the bonds and sacrifices defining Starfleet service.
    Her example shaped Worf's circle, underscoring perseverance over fatalism.
