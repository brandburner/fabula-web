  canonical_name: Suna
  title_role: Administrator
  description: Lieutenant Suna serves as a Starfleet officer aboard the USS Enterprise.
    She weathers psychological strain from intense missions, emerging shaken yet stable
    enough for colleagues to affirm her readiness. Riker checks on her condition with
    Troi, revealing her place in the crew's tight-knit support system where mental
    resilience matters as much as duty. Her recovery reflects the demands of service
    under Picard, balancing vulnerability with professional endurance amid blurred
    realities of covert operations.
