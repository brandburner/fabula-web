    legislative authority and the immediate political face of Prime Minister Nayrok.
    Habitually deferential to executive power, they move between procedural formality
    and instinctive self-preservation when confronted with the engineered veterans’
    return. In the rotunda they respond to breach and violence with alarm and raised
