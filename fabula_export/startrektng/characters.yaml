  canonical_name: Kivas Fajo
  title_role: Trader
  description: Kivas Fajo runs a Zibalian trading operation specializing in rare commodities
    like hytritium. He orchestrates Data's kidnapping by staging a shuttle explosion,
    faking the android's death to acquire him as the crown jewel of his collection
    of unique artifacts and sentients. Fajo manipulates Picard with feigned concern
    and scarce supply threats, directs Varria to enforce demands, dissolves Data's
    Starfleet uniform to erase his identity, and showcases the android to buyers like
    Toff. Captured aboard the Enterprise, he defies captivity from his cell, pacing
    and lamenting his lost treasures.
