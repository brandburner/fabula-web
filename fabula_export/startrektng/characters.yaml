  canonical_name: Crewwoman
  title_role: null
  description: 'She sits at a three-dimensional chess set in Ten-Forward, absorbed
    in the geometry of play while the senior officers conduct louder business nearby.
    Functioning as background yet telling texture, the crewwoman anchors the scene’s
    everyday life: crew leisure, quiet focus, and informal social ritual. Her measured
    concentration and casual companionship with a fellow player reinforce the ship’s
    normal rhythms, offering a lived-in counterpoint to Wesley’s turning point and
    the senior staff’s urgent responsibilities. Appearing neutral and focused, she
    contributes atmosphere rather than plot-driving action, but her presence signals
    the Enterprise’s communal culture and the crew’s need for strategic play and downtime.'
