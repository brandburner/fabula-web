  description: Farek operates as Daimon Tog's subordinate scientist aboard a Ferengi
    marauder, enforcing cultural misogyny by denying clothing to captured Betazoid
    women Lwaxana and Deanna Troi and threatening Deanna's life to force compliance.
    He interrupts Lwaxana's seductive manipulation of Tog, exposes her deception,
    blackmails Tog with exposure of his weakness, and compels surrender of Lwaxana
    for risky neural scans and mind probes. Farek adjusts experimental devices, obeys
    Riker's phaser command under duress, panics at the Enterprise's hail, and expresses
    disgust at Tog's 'oo-mox' bargain, prioritizing scientific exploitation amid Ferengi
    power struggles.
