          **Bridge Operations**: A subset of the crew, including the 'N.D. Mercenary,' staffs the bridge, operating weapons consoles, viewscreens, and security duties. They guard prisoners (e.g., captured Starfleet officers) under direct orders from leaders like Baran, execute tactical commands during combat, and work alongside specialists (e.g., engineer Narik, Romulan agent Tallera). Their disciplined, obedient nature ensures the ship's battle readiness and supports raids on targets like Federation outposts.
          **Internal Dynamics**: The crew operates amid division and distrust, reflecting the anarchic nature of frontier zones. Their competence and loyalty to Baran enable illicit archaeological pursuits and artifact smuggling.
