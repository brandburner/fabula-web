- fabula_uuid: ger_agent_1009bd141a29
  global_id: ger_agent_1009bd141a29
  canonical_name: Varria
  title_role: null
  description: 'Varria acts as Kivas Fajo''s key associate aboard the Jovis. She executes
    Data''s abduction by handing him a sabotaged PADD, triggering a neural overload,
    scanning his components, and coordinating transport. She delivers Fajo''s orders,
    including civilian clothes for Data and revelations of the staged shuttle explosion
    to erode his hope. Her interactions reveal internal conflict: she covers for Fajo
    during Data''s passive resistance, shows admiration for his defiance, apologizes
    for her role, attempts seduction on command, and confesses a 14-year secret alliance.
    She aids Data''s escape by opening Fajo''s safe and leading him to a shuttle pod,
    only for Fajo to murder her.'
  traits: &id833
