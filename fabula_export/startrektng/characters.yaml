  canonical_name: Corey's Alien Dom-Jot Opponent
  title_role: null
  description: An alien gambler who frequents interstellar gambling dens like the
    Bonestell Facility, where he challenges patrons—particularly Starfleet cadets
    like Corey—to high-stakes Dom-Jot matches. Known for his competitive yet intemperate
    demeanor, he grips his cue stick with mounting frustration during play, erupting
    in disgust upon losing. His poor sportsmanship is evident as he hurls gold ingots
    across the table and storms away, embodying the facility's rough-and-tumble culture.
    Observes Starfleet figures (e.g., Picard, Marta) nearby, highlighting tensions
    between casual interstellar betting and professional conduct. His behavior reflects
    a mix of pride, frustration, and resentment toward defeat.
