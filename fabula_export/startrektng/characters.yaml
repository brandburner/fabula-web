- fabula_uuid: ger_agent_9d2d8aef5d91
  global_id: ger_agent_9d2d8aef5d91
  canonical_name: Sela
  title_role: Commander
  description: Sela is a Romulan intelligence officer and covert operative who directs
    Romulan covert operations to sway Klingon politics. As the daughter of Tasha Yar
    from an alternate timeline, she uniquely fuses human insight with Romulan discipline,
    positioning herself as the architect of schemes against Federation interests.
    She partners with the Duras family (Lursa, B'Etor, Toral) and allies like General
    Movar, operating from obscurity with precise authority and unyielding focus. Her
    commanding presence radiates calm assurance, masking lethal intent, while her
    perceptive and composed demeanor allows her to counter overconfidence by stressing
    threats like Picard's unpredictability. Driven by Romulan strategic dominance,
    she targets key figures like Picard to reshape power balances.
