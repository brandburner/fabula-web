  canonical_name: Edo Harpists
  title_role: Music Group
  description: The Edo Harpists form a distinctive music group performing sporadic,
    lilting harp melodies within the Edo council chambers on Rubicun Three. Their
    unusual harps and lighthearted playing contribute to the warm, joyful atmosphere
    of the Edo society, embodying the community's carefree spirit and sensual hospitality.
    Rather than formal musicians, they act as cultural emissaries of the Edo’s openhearted
    nature and zest for life, providing a soothing auditory backdrop that contrasts
    vividly with the darker themes that follow. Their presence highlights the Edo's
    celebration of pleasure and communal ease.
