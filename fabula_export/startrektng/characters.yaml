  title_role: Lieutenant Commander
  description: Data serves as Lieutenant Commander and operations officer aboard the
    USS Enterprise-D. He delivers precise technical analysis during sensor enhancements,
    subspace anomaly investigations, and crisis responses, partnering closely with
    Geordi La Forge on engineering tasks and reporting findings to Captain Picard
    and Commander Riker. An android exploring human expression, Data recites poetry
    with mechanical perfection but emotional flatness, seeks feedback on his creative
    efforts, and maintains composure amid abductions and ruptures. His logic and curiosity
    anchor crew decisions through escalating threats. In the episode 'Schisms', Data
    is temporarily possessed by the Ux-Mal entity, which alters his behavior and emotional
    responses, though his core identity and role as a crew member remain unchanged.
