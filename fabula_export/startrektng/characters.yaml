  global_id: ger_agent_16a3e04e1c88
  canonical_name: William Shakespeare
  title_role: null
  description: 'William Shakespeare, the Elizabethan playwright and poet, appears
    as an invoked cultural authority when Data quips ''let us kill all the lawyers''
    to express frustration with legal barriers to artificial personhood. Absent from
    action, Shakespeare operates here as a rhetorical touchstone and moral provocateur:
    his aphoristic voice supplies the crew with a concise critique of legal institutions,
    sharpens Picard''s strategic framing, and punctuates Data''s ironic self-reflection
    during the personhood deliberations.'
