  canonical_name: Wrenn
  title_role: Leader of the Tarellian Survivors
  description: Wrenn commands the last surviving Tarellians aboard a dying plague
    ship, bearing the weight of his people's desperate fate with solemn dignity and
    sorrow. As their patriarch and spokesperson, he pleads gently yet resolutely with
    the Enterprise crew for a peaceful resting place near Haven, while firmly refusing
    to endanger the planet with their contagion. His interactions reveal deep respect
    towards Captain Picard and a hopeful reverence for Wyatt, whom he recognizes as
    the prophesied healer destined to save his people. Throughout, Wrenn embodies
    leadership tempered by grief, resilience, and unwavering commitment to his people's
    welfare amid hopeless circumstances.
