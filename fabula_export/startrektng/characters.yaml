  canonical_name: Radue
  title_role: First Appointee of Aldea
  description: Radue serves as the First Appointee of Aldea and stands as a central
    figurehead of the Aldean leadership. He commands the delegation that first contacts
    the USS Enterprise, wielding authority to negotiate the planet's desperate terms.
    Despite a dignified and authoritative presence, he reveals physical frailty, underscored
    by a trembling hand. Radue coldly exposes Aldea’s sterility crisis, proposing
    a harrowing exchange of kidnapped Federation children for Aldean knowledge. Throughout
    tense negotiations, he balances pragmatic ruthlessness with a veneer of regal
    hospitality, confronting Wesley Crusher directly and attempting to co-opt him
    as a leader within Aldea’s imposed social order. Radue’s actions reveal a conflicted
    figure—resolute yet burdened by his world’s desperate plight—who enforces a rigid
    social system and coldly enforces Aldea’s demands while occasionally showing moments
    of reluctant honesty.
