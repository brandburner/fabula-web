  canonical_name: Kurt Mandl
  title_role: Project Director
  description: Kurt Mandl serves as the Project Director overseeing the terraforming
    initiative on Velara III, bearing the weight of a faltering operation. His disheveled,
    evasive demeanor cracks under the pressure of mounting sabotage and loss, revealing
    a man caught between duty and fear. Mandl's defensiveness and brusque urgency
    emerge as he manages a crisis marked by deadly sabotage, the death of key personnel,
    and concealed knowledge of an alien life form jeopardizing the project. His reluctant
    compliance with Picard's investigative command underscores a fractured leadership,
    as Mandl struggles to maintain control amidst escalating danger and suspicion
    aboard the base.
