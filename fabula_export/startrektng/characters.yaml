    friend Isabella, turning to Counselor Troi for reassurance on her emotional health.
    Practical and duty-minded, he nudges Clara toward real responsibilities like helping
    Keiko with plants, while valuing psychological insights that affirm her stability.
    His concerns reflect the tensions of family life on a starship, balancing parental
    instincts with service demands.
