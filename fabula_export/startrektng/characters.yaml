    biological experiments on abducted humanoid subjects (e.g., Starfleet officers
    like William Riker and Ensign Rager). They manipulate subspace fields using tetryon
    emissions, connecting victims to consoles via neural tubes to induce physiological
    transformations. These figures communicate through rapid clicks, chattering, and
    screeches while coordinating at alien instrumentation. Highly vigilant sentinels,
    they aggressively pursue escapees and adapt quickly to technological counters
    but exhibit panicked reactions during direct confrontations, system failures,
    or phaser threats. Their precise, methodical research remains driven by unknown
    motives, prioritizing experimental security over direct combat during Starfleet
    incursions. Antagonistic toward Enterprise officers including Riker and Data,
