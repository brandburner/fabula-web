  global_id: null
  canonical_name: Q
  title_role: null
  description: Q emerges as an omnipotent, capricious cosmic entity wielding absolute
    power over the USS Enterprise and its crew. Manifesting in shifting guises—from
    a shimmering cosmic grid and a menacing serpent to a Starfleet admiral and a Napoleonic
    marshal—Q halts a critical rescue mission to impose a rigged survival game. Taunting,
    mocking, and isolating Captain Picard by vanishing the crew, Q challenges humanity's
    fragility and loyalty, while tempting Commander Riker with godlike power. His
    cruel arbitrariness punishes defiance, notably banishing Tasha Yar to a limbo
    'penalty box.' Through philosophical battles invoking Shakespearean despair, Q
    tests human resilience and moral resolve, embodying a divine trickster whose games
    elevate the stakes to existential and cosmic proportions.
