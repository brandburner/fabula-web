- fabula_uuid: ger_agent_8284906f5a96
  global_id: ger_agent_8284906f5a96
  canonical_name: Williams
  title_role: Tactical Officer
  description: Michael Williams functions as a minor but thematically significant
    holodeck soldier within a staging of Henry V. He voices quiet skepticism about
    the causes of battle and reflects on the imminence of death, offering a human
    counterpoint to staged heroics and the lesson Data pursues about leadership. Williams
    repeatedly engages with fellow soldier John Bates and with the King figure, anchoring
    the simulation’s moral register and reinforcing the episode’s interrogation of
    duty, fear, and obedience under command.
  traits:
