  canonical_name: Laura Manheim
  title_role: null
  description: Laura Manheim emerges as the desperate and emotionally fragile wife
    of the long-missing scientist Paul Manheim. Having disappeared alongside her husband
    over fifteen years ago, she reappears with a haunting distress call for aid when
    Paul falls unconscious on the violet-hued, forcefield-shielded planet Vandor.
    Through frantic pleas over hailing frequencies and intimate moments by Paul's
    bedside, Laura reveals fierce loyalty and deep fear as she navigates the harrowing
    rescue mission, embodying the personal stakes behind the scientific crisis. Her
    interactions, particularly with Captain Picard, reveal a woman torn between hope
    and panic, whose courage fuels the crew's resolve to save her husband and uncover
    the mysteries of his dimensional experiments.
