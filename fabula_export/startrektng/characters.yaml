  canonical_name: Sito Jaxa
  title_role: Cadet First Class
  description: Sito Jaxa, a Bajoran Cadet First Class at Starfleet Academy, pilots
    the rear position in Nova Squadron under leader Nick Locarno. She maintains tight
    bonds with cadets Jean Hajar, Nicholas Locarno, and Wesley Crusher through intense
    flight maneuvers and shared responsibilities. Fiercely loyal to her squadron,
    Sito wrestles with moral unease over concealing a fatal accident, often displaying
    tension and hesitation under pressure. Her role as a mediator between peers and
    her discomfort with deception mark her as a conflicted team player driven by group
    survival, fear of expulsion, and a growing sense of duty. She faces scrutiny from
    Admiral Brand and Commander Albert, balancing personal honesty with peer loyalty
    as pressure reveals her internal struggle—hesitation yielding to quiet resolve
    when truth demands it.
