  description: Victoria Miller embodies the poised and traditional Earth values of
    the Miller family as they arrive aboard the Enterprise. She carries a prim and
    proper demeanor, frequently expressing emotional vulnerability and critical opinions
    on gifts, ceremonies, and cultural decorum, especially in contrast to the flamboyant
    Betazoid customs brought by the Troi family. Throughout tense interactions, Victoria
    defends Earth traditions fiercely, becoming visibly angry and embarrassed when
    Mrs. Troi's provocations escalate during the formal pre-joining dinner. Her cautious
    yet emotionally charged stance highlights the cultural fault lines and personal
    stakes woven into the unfolding Betazoid-Earth union.
