  canonical_name: Cardassian Troopers
  title_role: Troopers
  description: "\n        Cardassian troopers form frontline infantry units in the\
    \ Cardassian military, deployed to enforce occupation on disputed colony worlds\
    \ like Dorvan V. Armed with disruptors, they patrol tense border regions, clashing\
    \ with Federation personnel and resistant settlers. Disciplined and resilient,\
    \ they uphold Cardassian territorial claims through direct confrontation, their\
    \ capture highlighting vulnerabilities in isolated operations. They answer to\
    \ central command while navigating local hostilities from colonists and Starfleet\
    \ officers.\n        **Note**: The deprecated entity 'Cardassian #1' appears to\
    \ be a **specific instance** of this broader unit, as evidenced by:\n        -\
    \ The source entity's description explicitly mentions 'Cardassian troopers' as\
    \ a **collective military unit**.\n        - 'Cardassian #1' lacks context but\
    \ is **numbered**, suggesting it refers to an individual trooper within the unit.\n\
    \        **Resolution**: Merged into the broader 'Cardassian Troopers' entity,\
    \ as the numbered entity is a **subset** of the collective.\n      "
