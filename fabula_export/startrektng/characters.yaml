  canonical_name: Mikey D
  title_role: null
  description: Mikey D functions as the hotel's brutal enforcer and the narrative's
    climactic antagonist. He manifests as a feared, violent lothario in the novel
    the hotel reproduces, described by staff and extras as someone who punishes transgressions
    without mercy. He strides into the Royale with murderous intent, draws a pistol
    and executes the bellboy exactly as the book dictates, then leaves with cold remorselessness.
    His presence crystallizes the hotel's literal enactment of pulpy plotlines and
    propels the away team's shift from investigation to survival strategy, making
    him both a personal threat and a structural fulcrum in the episode's escalation.
