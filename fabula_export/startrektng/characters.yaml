- fabula_uuid: ger_agent_9dc0b550fc6c
  global_id: ger_agent_9dc0b550fc6c
  canonical_name: Wild West Townsfolk
  title_role: null
  description: Holographic civilians who populate the streets, saloons, and public
    spaces of a Wild West holodeck town. They embody frontier life through casual
    mingling, porch-sitting, saloon gatherings, and hurried movement, serving as an
    observant backdrop that grounds the simulation in 19th-century Western atmosphere.
    Their reactions—ranging from curiosity to alarm—heighten tension and reflect the
    communal, anonymous backbone of frontier settlements, though they do not directly
    advance central conflicts. The townsfolk appear in both the intact and corrupted
    versions of the holodeck town, maintaining consistent roles as passive observers
