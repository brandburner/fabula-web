    her as a possession at Ten Forward, sparking obsession after her rejection. Tog
    abducts Lwaxana, Deanna Troi, and William Riker, strips the women for humiliation
    via Dr. Farek, then isolates Lwaxana to exploit her talents for profit. He leverages
    Deanna's safety in negotiations, succumbs to Lwaxana's oo-mox ear massage into
    a trance, and nearly reveals ship codes before intervening. Tog holds a phaser
    standoff with Riker, accepts Lwaxana's bargain for her captivity, but capitulates
    to Picard's bluff and beams her back to the Enterprise.
