  canonical_name: Donna Reed
  title_role: null
  description: 'Donna Reed functions here as a invoked cultural archetype rather than
    a diegetic participant: an idealized postwar "happy homemaker" shorthand used
    to frame Manua''s practiced domestic comportment. The episode borrows that mediated
    persona to compress social meaning — warmth, hospitality, and conventional feminine
    domesticity — into a single recognizable sign. The reference shapes how other
    characters read Manua (comforting, protective) and seeds narrative friction when
    sexualized attention contradicts the archetype''s presumed safety. This entry
    records the archetype''s narrative role in the episode rather than asserting an
    in‑world character presence.'
