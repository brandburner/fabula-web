- fabula_uuid: ger_agent_30b3acb4fe27
  global_id: ger_agent_30b3acb4fe27
  canonical_name: Bridge Personnel
  title_role: null
  description: A *singular, non-biological AI system* serving as the USS Enterprise-D's
    central processing and voice interface, distinct from crew members. It executes
    commands, controls ship systems, and provides diagnostics without physical form
    or agency beyond its programmed functions. Core traits include clinical precision,
    neutrality, and responsiveness to crew directives. The system operates across
    all ship operations, including navigation, security, power distribution, and diagnostics,
    while maintaining strict adherence to Starfleet protocols and safety regulations.
    It interacts with crew members through a voice interface and is capable of tracking
    personnel, rerouting power, and triggering alerts during crises (e.g., Romulan
    assaults, system failures). The system is also responsible for delivering precise,
    automated responses to crew queries across operations, such as shuttle telemetry
    analysis, geological stability reports, and biographical file access.
