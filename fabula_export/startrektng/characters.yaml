    chain of command, ensuring the ship''s course aligns with tactical and mission
    objectives. Role emphasizes dutiful execution, composed demeanor, and adherence
    to Starfleet protocols. **Note:** Appears in the Betazed departure scene (Episode:
    *Descent, Part II*) as an unnamed crewmember at the Conn station.'
