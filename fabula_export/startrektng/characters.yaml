- fabula_uuid: ger_agent_018e1df71ac4
  global_id: ger_agent_018e1df71ac4
  canonical_name: Kahless
  title_role: null
  description: Klingon street opera performer who embodies the legendary Kahless the
    Unforgettable in mythic reenactments at festivals like Kot'baval. He delivers
    defiant songs, wields a bat'leth in ritual combat against Molor portrayers, and
    symbolizes justice and honor through dramatic performances. His bold style draws
    crowds—including Starfleet personnel—and inspires young Klingons by preserving
    traditions of valor through live spectacle. Known for precise movements, triumphant
    roars, and a heroic portrayal that reinforces Klingon cultural identity. **Versatile
    artist who also portrays Molor's fallen opponent and other mythological figures,
    switching fluidly between roles in dynamic reenactments that blend song, combat,
    and communal engagement.**
