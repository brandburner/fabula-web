    details like crew celebrations. Blackwell balances stern professionalism with
    dry humor, fostering command discipline through direct transmissions and quick
    assessments. She prioritizes operational secrecy and rapid response, anchoring
    Starfleet's hierarchical structure amid high-stakes directives.
