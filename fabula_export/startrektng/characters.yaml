- fabula_uuid: ger_agent_0ce27ed2627f
  global_id: ger_agent_0ce27ed2627f
  canonical_name: William Riker Clone
  title_role: null
  description: A nascent, non-autonomous biological replica discovered inside a smoke-filled
    artificial womb at the Mariposa cloning laboratory. The specimen is visibly undeveloped,
    non-sentient, and bears a recognizably Riker-like visage. Its discovery provokes
    visceral outrage in Commander William Riker, who destroys the developing unit;
    narratively the copy functions as a symbolic and catalytic artifact that foregrounds
    ethical violations of bodily autonomy and escalates the scene into an armed confrontation.
