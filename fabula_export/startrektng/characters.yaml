    Across the episode it appears as Beverly Crusher’s institutional employer and
    the logistical source of medical supplies, and it engages in diplomatic negotiations
    to secure her release. Finn frames the Federation’s negotiating posture and local
    police actions as political collusion, turning the organization’s humanitarian
    and law-enforcement reach into a contested lever of power in local conflict. The
    Federation therefore operates as both provider and political actor in the story’s
