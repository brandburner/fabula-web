  canonical_name: Ben Prieto
  title_role: Lieutenant
  description: Ben Prieto serves as the pilot of Shuttlecraft Thirteen during a critical
    emergency mission. He communicates urgent system failures and distress signals
    while the shuttle spirals out of control near the planet Vagra Two. Despite strained
    efforts to maintain control, the shuttle crashes, leaving Prieto unconscious and
    severely injured alongside Counselor Deanna Troi. Trapped within the damaged shuttle
    enveloped by the malevolent entity Armus, Prieto's precarious condition heightens
    the life-or-death stakes of the rescue operation. His role underscores the vulnerability
    and sacrifice involved in the mission, linking his fate closely to the psychological
    and physical torment endured by his fellow crewmembers.
