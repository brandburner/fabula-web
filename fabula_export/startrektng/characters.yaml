    to cancel ceremonies citing Sarek's fatigue, insists on seclusion, and supports
    protocol demands in the conference room. Mendrossen dismisses Picard's Bendii
    Syndrome concerns in the ready room, demands irrefutable proof before the Legarans
    arrive, and issues a career threat to silence interference. He stands grimly by
    Sarek during confrontations, acknowledges the illness's irreversibility, and exchanges
    tense glances with Perrin, revealing his protective loyalty to Sarek's legacy
    amid unraveling control.
