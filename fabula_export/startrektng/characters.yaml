    Bonestell Facility. He is the primary aggressor in the knife attack on young Jean-Luc
    Picard, driving a serrated blade through Picard''s back while a companion restrains
    him. His role is defined by ruthless violence and physical dominance, embodying
    the Nausicaan code of honor-through-combat. He coordinates with the trio''s leader
    (Nausicaan #1) and another member (Nausicaan #3) to provoke and escalate brawls,
    leaving lasting trauma on Federation recruits. This entity is critical to Picard''s
    backstory, as his actions directly cause Picard''s heart damage and subsequent
    transplant.'
