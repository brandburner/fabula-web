  global_id: ger_agent_fa14f59556e5
  canonical_name: Woman's Com Voice
  title_role: null
  description: The Woman's Com Voice transmits from the doomed research vessel S.S.
    Tsiolkovsky, her chaotic broadcasts oscillating between intoxicated taunts and
    hysterical provocations. Her voice cuts sharply through Starfleet communications,
    mixing sardonic humor with panic and madness. This erratic transmission climaxes
    in a violent blast and chilling silence, signaling a catastrophic decompression
    aboard the ship. Serving as an eerie harbinger of the contagion and disaster unfolding,
    her disembodied presence thrusts the Enterprise crew into urgent crisis response
    and a deadly mystery.
