    \ with Federation personnel and resistant settlers. Disciplined and resilient,\
    \ they uphold Cardassian territorial claims through direct confrontation, their\
    \ capture highlighting vulnerabilities in isolated operations. They answer to\
    \ central command while navigating local hostilities from colonists and Starfleet\
    \ officers.\n        **Note**: The deprecated entity 'Cardassian #1' appears to\
