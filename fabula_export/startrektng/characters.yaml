    control during tense negotiations. Their vigilance and silent menace prioritize
    protocol and order, forming physical barriers to prevent escalations. While their
    primary role is to protect Seronia's diplomatic security apparatus, their actions
    often reflect the manipulative agendas of their commanding leaders (e.g., Alkar's
