  canonical_name: Harry Bernard
  title_role: null
  description: Harry Bernard is a young boy abducted to the dying planet Aldea, where
    he struggles against imposed expectations and grapples with his identity. Initially
    defiant and frustrated, especially toward his schoolwork and calculus, Harry resists
    being molded into Aldea’s artistic unit but gradually discovers his innate sculpting
    talent under the mentorship of Aldean artists Accolan and Leda. His emotional
    journey reveals vulnerability linked to his family, particularly his longing and
    fear of abandonment by his father, Dr. Bernard Sr. Throughout his captivity, Harry
    vacillates between resistance and reluctant acceptance, ultimately participating
    in a passive resistance movement alongside other abducted children. His interactions
    with peers Wesley and Katie, and with Aldean figures Rashella and Radue, showcase
    his conflicted but evolving role within the group and the alien society’s strict
    social order.
