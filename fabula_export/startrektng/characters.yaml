  global_id: ger_agent_4d588b263516
  canonical_name: Wong
  title_role: Lieutenant
  description: Lieutenant Wong serves as a trusted and competent engineering officer
    aboard the USS Enterprise, charged specifically with resolving critical technical
    problems within the quarantine area's climate control systems during a viral outbreak
    crisis. Under the emergency command of Lieutenant Geordi La Forge and amid the
    rapid deterioration of senior leadership due to illness, Wong receives direct
    assignment and technical command of engineering operations targeting the containment
    and stabilization of environmental controls essential to the ship's health protocols.
    Wong's role highlights a vital operational pivot amid the crew's vulnerability,
    demonstrating reliability and technical expertise under pressure.
