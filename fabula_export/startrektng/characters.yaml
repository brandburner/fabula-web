- fabula_uuid: ger_agent_c9593f045d52
  global_id: ger_agent_c9593f045d52
  canonical_name: Nagilum
  title_role: Cosmic Entity
  description: Nagilum is an omnipotent, enigmatic cosmic entity encountered by the
    USS Enterprise in the depths of space. Manifesting as a colossal human eye within
    the void, it conducts cold, detached experiments on the crew with clinical precision.
    Its motives are purely scientific curiosity, devoid of empathy or moral consideration—demonstrated
    horrifically when it kills Ensign Haskell mid-conversation to study death, casually
    declaring intentions to exterminate up to half the crew for further research.
    Nagilum operates with godlike authority, effortlessly manipulating the Enterprise's
    environment and defying all attempts at escape. It directly engages key crew members—Data,
    Picard, Pulaski—with unsettling specificity, naming them individually while reducing
    their existence to mere specimens. This entity represents an existential threat
    beyond conventional conflict, forcing Captain Picard to contemplate self-destruction
    as the only means of preserving autonomy against an adversary that views life
    as disposable data.
  traits:
