  canonical_name: Ben
  title_role: null
  description: Ben serves as a civilian waiter in Ten Forward, the Enterprise-D's
    lounge. Roughly the same age as the junior officers, he joined the ship seeking
    adventure and excitement, unbound by Starfleet discipline. His easy smile and
    quick wit define him; he teases friends like Lavelle, Taurik, Sito, and Ogawa
    about their career stresses while providing subtle encouragement and gossip that
    eases tensions. Observant and bold, he navigates crew dynamics from outside the
    hierarchy, fostering camaraderie through banter and support.
