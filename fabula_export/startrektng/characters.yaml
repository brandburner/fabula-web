  canonical_name: Sarah MacDougal
  title_role: Chief Engineer
  description: Sarah MacDougal commands the engineering deck with steadfast resolve
    amid escalating chaos aboard the Enterprise. Summoned repeatedly by Captain Picard,
    she moves dutifully between the bridge and Engineering, attempting to execute
    orders to remove Wesley Crusher from control. Despite confusion over conflicting
    commands during a contagion-induced crisis, MacDougal strives to maintain operational
    control, coordinating with Riker to circumvent Wesley’s tractor beam blockade
    by attempting power bypasses. She wrestles physically and mentally with sabotaged
    systems, kneeling amidst scattered isolinear chips while trying to restore critical
    functions. Her actions ground the ship’s technical response amid fracturing command,
    anchoring the crisis with pragmatic engineering expertise and loyalty to Starfleet
    command.
