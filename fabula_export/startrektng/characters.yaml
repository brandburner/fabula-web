    and allied Ferengi adversaries on a storm-wracked clouded planet, issuing severe
    challenges and testing their courage, wisdom, and composure through lethal combat
    trials and intense philosophical interrogation. Initially wrathful and suspicious,
    Portal condemns humanity’s deception and barbarism yet ultimately respects Riker's
    calm resolve and strategic insight, invoking the wisdom of Sun Tzu. Portal's judgment
    culminates in restoring power to the Enterprise and Ferengi starships, establishing
    a tenuous truce that underscores themes of legacy, honor, and the perpetual challenge
    of civilization’s worthiness.
