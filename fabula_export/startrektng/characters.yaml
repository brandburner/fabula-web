  canonical_name: Joey (Bringloidi elder)
  title_role: null
  description: 'Joey is an elderly Bringloidi patient whose crippling rheumatoid arthritis
    receives an unexpected cure in Sickbay. He reacts with delighted astonishment,
    experimentally wiggling newly flexible fingers, then responds with playful, flirtatious
    behavior—pinching Dr. Pulaski—before hobbling away. Joey functions as a humanizing
    presence: his physical transformation and cheeky gratitude catalyze a tender alliance
    between Pulaski and Brenna and mark a small cultural moment that shifts the emotional
    tone of the scene.'
