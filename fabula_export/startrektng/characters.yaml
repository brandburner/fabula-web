  canonical_name: USS Enterprise
  title_role: Galaxy-class starship
  description: The USS Enterprise-D (NCC-1701-D) is the flagship of Starfleet's Galaxy-class
    fleet, commanded by Captain Jean-Luc Picard. It serves as a multipurpose vessel
    for deep-space exploration, scientific surveys, diplomatic missions, and defensive
    operations. Equipped with advanced warp propulsion, phaser banks, transporters,
    and sophisticated sensors, the Enterprise-D accommodates over 1,000 crew members
    from diverse Federation worlds. Key personnel include Chief Engineer Geordi La
    Forge, Counselor Deanna Troi, and Lieutenant Commander Data, alongside other iconic
    figures like Worf and Dr. Beverly Crusher. The ship is renowned for its resilience,
    versatility, and adherence to the Prime Directive, while its bridge coordinates
    crew efforts across labs, medical bays, and engineering decks. The Enterprise-D
    is a central hub for Starfleet's most critical missions, fostering a multicultural
    environment and navigating cosmic hazards with distinction.
