- fabula_uuid: ger_agent_1f018657c6e3
  global_id: ger_agent_1f018657c6e3
  canonical_name: Transporter Officer
  title_role: Transporter Officer
  description: 'Starfleet non-commissioned officer (typically an NCO rank such as
    Chief Petty Officer) who oversees and operates the USS Enterprise-D transporter
    room. **Known by the name Collins in canonical records.** Commands the transporter
    console for beaming senior officers, away teams, and diplomatic parties. Responds
    directly to orders from senior officers (including Captain Picard, Counselor Troi,
    Commander Riker, Lieutenant Worf, Lieutenant Commander Data, and Lieutenant Commander
    La Forge). Executes emergency lock-ons, beam-outs, and extractions with precise
    confirmations over comms, even under crisis conditions. Escorts arriving or departing
    guests through tense encounters, maintaining composure during disruptions and
    prioritizing protocol. Coordinates with bridge personnel and away teams to manage
    signal challenges and ensure operational safety. **Note:** Previously referred
    to as ''Transporter Room Operator'' in some records, but this is the canonical
    role for transporter room oversight, including both console operation and room
    management. **Canonical name: Collins.**'
  traits: &id751
  - focused
