  canonical_name: Bridge Science Specialist
  title_role: Science Technician
  description: A routine Starfleet bridge operator responsible for handling technical
    inputs and playback hardware during high‑pressure diagnostics. Across the recovered
    Promellian evidence sequence the operator performs procedural tasks—installing
    recovered coils, initiating log playback, and routing analysis feeds to senior
    officers—while maintaining a neutral, operative demeanor. The role supports command
    decision‑making, interfaces with science and engineering leads, and stabilizes
    the bridge workflow during crisis. The operator acts as a practical conduit for
    data rather than a decision agent, enabling others to interpret and act on recovered
    alien artifacts.
