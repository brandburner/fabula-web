- fabula_uuid: ger_agent_a601b00ab944
  global_id: ger_agent_a601b00ab944
  canonical_name: Klingon High Council
  title_role: High Council
  description: The Klingon High Council serves as the supreme legislative body of
    the Klingon Empire, governing through votes on succession, war, treaties, and
    internal honor disputes. Composed of representatives from the Great Houses, the
    Council convenes under the authority of the Chancellor (e.g., Gowron) in the Great
    Hall, where factional loyalties—particularly to houses like Duras, Lursa, B'Etor,
    and Toral—fuel corruption, division, and political opportunism. While traditionally
    dominated by older male warriors, younger, ambitious members also influence its
    decisions. Loyalists such as K'Tal often stand apart from majorities swayed by
    challenges or external pressures. The Council arbitrates internal crises, receives
    critical intelligence (e.g., Khitomer records), and balances Klingon sovereignty
    with alliances (e.g., the Federation), reflecting the Empire's emphasis on honor,
    strength, and shifting alliances. Its decisions shape imperial stability, though
    factional rivalries and pragmatic politics frequently undermine unity.
  traits: &id381
