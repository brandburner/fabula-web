- fabula_uuid: ger_agent_17d746b8e0fc
  global_id: ger_agent_17d746b8e0fc
  canonical_name: 'Romulan Reunification Agent (Romulan #1)'
  title_role: Footsoldier
  description: A dual-role operative in the Romulan Star Empire, this agent functions
    as both a low-ranking enforcer in the imperial security apparatus and a key liaison
    in the underground reunification movement. Publicly, he conducts street patrols,
    scans civilians for infiltration risks, and detains suspects at disruptor point,
    embodying the Empire's doctrine of unyielding vigilance and absolute chain-of-command
    obedience. Privately, he serves as a critical messenger between Senator Pardek
    (Proconsul Pardek), Vulcan diplomat Spock, and dissident D'Tan, relaying discreet
    signals and urgent intelligence to advance the pro-unity cause. His alignment
    with Pardek's circle amid clandestine activities reflects the tension between
    imperial loyalty and ideological passion, operating under constant surveillance
    while navigating the fragile alliances between Romulus and Vulcan. Core traits
    include cautiousness, nervousness, enthusiasm, and a defensive yet passionate
    advocacy for reunification.
  traits: &id597
  - vigilant
