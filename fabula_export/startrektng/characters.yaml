  canonical_name: Luisa Kim
  title_role: Botanist
  description: Luisa Kim stands as the warm, enthusiastic botanist spearheading the
    terraforming project on Velara III. She greets the Enterprise away team with open
    optimism and detailed explanations of the planet’s transformation phases, embodying
    a hopeful vision of ecological renewal. Yet beneath her passionate engagement
    lies a vulnerable awareness of the project’s deepening troubles, revealed in her
    emotional responses to the sabotage, the death of engineer Malencon, and the revelation
    of the inorganic microbrain life form threatened by the terraformers’ actions.
    Luisa’s interactions with colleagues and crew show her as an idealistic yet emotionally
    affected scientist, torn between scientific ambition and the tragic consequences
    unfolding around her.
