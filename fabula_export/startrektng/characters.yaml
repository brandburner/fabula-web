  canonical_name: Klingon Street Opera Musicians
  title_role: null
  description: Ensemble of Klingon musicians who supply loud, rhythmic accompaniment
    to street operas during cultural festivals such as Kot'baval. They produce a harsh
    din tailored to Klingon sensibilities, punctuating singers' chants and mock combats
    with clashing sounds that heighten the ritual's intensity. Positioned amid crowds
