  canonical_name: Tebok
  title_role: Commander
  description: Tebok serves as the commanding officer of a Romulan cruiser who confronts
    the Enterprise on the Neutral Zone, presenting a stern, disciplined face of Romulan
    policy. He explains that Romulan border outposts suffered the same inexplicable
    destruction, refuses Federation provocation, and negotiates a limited, conditional
    cooperation with Picard while issuing a veiled threat before departing. Tebok
    functions to avert immediate hostilities, reframe the crisis as a mutual threat,
    and assert Romulan dignity and deterrence in the face of uncertainty. His presence
    redirects the mission from war toward joint investigation while reinforcing Romulan
    pride and guarded diplomacy.
