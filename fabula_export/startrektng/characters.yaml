  canonical_name: Haskell
  title_role: Ensign
  description: Ensign Haskell serves as a bridge operations officer aboard the Enterprise
    during the harrowing encounter with Nagilum. His technical skills are immediately
    tested during the crisis, struggling to maintain a tractor beam lock on the vanishing
    USS Yamato—a task made impossible by the cosmic entity's manipulations of reality
    itself. Haskell's final tragic moments underscore the crew's vulnerability when
    he becomes Nagilum's first experimental victim, brutally killed mid-task as the
    entity clinically studies death. His quick death—confirmed by Dr. Pulaski's futile
    attempts at resuscitation—serves as the chilling turning point where scientific
    curiosity reveals itself as cosmic cruelty. Though his screen time is brief, Haskell's
    fate crystallizes the existential threat facing the Enterprise, transforming abstract
    danger into visceral loss.
