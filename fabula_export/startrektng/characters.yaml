  description: The USS Sutherland crew members operate the Nebula-class starship under
    Lieutenant Commander Data's direct command. They include both senior officers
    and unnamed crew members staffing bridge stations, weapons systems, and sensor
    arrays during fleet operations. Precise and disciplined, they execute complex
    tactical orders, coordinate with ships like the Enterprise-D, and maintain operational
    readiness amid interstellar tensions. Their reliability bolsters Starfleet's defensive
    networks, adapting to innovative strategies from android leadership while upholding
    protocol. The crew handles routine tasks such as system monitoring, tool handling,
    and position holding, supporting bridge functions under divided authority during
    ship preparations, yellow alerts, and power crises.
