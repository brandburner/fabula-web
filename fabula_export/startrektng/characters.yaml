  canonical_name: Black Guards
  title_role: Ceremonial Guards
  description: The Black Guards serve as the elite ceremonial protectors escorting
    Lieutenant Tasha Yar and the Ligonian delegation aboard the Enterprise cargo deck.
    They operate with disciplined vigilance, one actively scanning the arriving Ligonians
    with a tricorder, embodying a menacing yet controlled presence. Restrained by
    Lutan from escalating conflict, they form protective formations around key figures,
    balancing cultural honor-bound customs with Starfleet’s protocol. Their poised
    alertness marks the tension between diplomatic engagement and the underlying threat
    of violence amid the vaccine exchange negotiations, underscoring their role as
    both guardians and enforcers of Ligonian tradition.
