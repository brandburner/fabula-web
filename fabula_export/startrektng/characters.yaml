  canonical_name: Beata
  title_role: The Elected One
  description: Beata serves as the commanding and unyielding matriarchal leader of
    Angel One, presiding as The Elected One and head of its Parliament. She wields
    authoritative power with cold dismissal and guarded hostility, rejecting Federation
    diplomatic overtures and denying recognition of survivors from the lost freighter
    Odin. Her leadership style emphasizes strict control and adherence to Angel One's
    rigid female-led societal order, marked by suspicion toward male fugitives who
    threaten political stability. Beata engages in ideological and political confrontations
    with the Starfleet away team, especially Commander Riker, blending stern warnings
    with calculated manipulation and even moments of personal intrigue. She exercises
    sovereign authority to order death sentences and exile, defending harsh justice
    systems to maintain her planet's delicate social balance, while projecting cultural
    pride and ideological rigidity that clash with Federation values.
