  canonical_name: Arthur Malencon
  title_role: Hydraulics Specialist
  description: Arthur Malencon serves as the Hydraulics Specialist at the Velara III
    terraforming base, tasked with managing the hydraulic systems crucial to the terraforming
    project. Under mounting pressure from erratic power surges affecting the hydraulics,
    his demeanor shifts from guarded and tense to visibly disturbed, revealing his
    growing unease. Reluctantly following Director Mandl's orders, Malencon moves
    to attend the hydraulics chamber where he faces a fatal sabotage attack. His death
    at the hands of the microbrain's lethal defense marks a tragic turning point that
    escalates the mission from hopeful exploration to urgent crisis. Malencon's role
    highlights the vulnerability of the station's infrastructure and the personal
    cost of the hidden inorganic threat underlying the terraforming effort.
