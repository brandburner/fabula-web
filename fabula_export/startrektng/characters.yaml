  canonical_name: Bhavani
  title_role: Premier of Barzan
  description: Bhavani commands Barzan’s delegation as an elder stateswoman who treats
    the newly discovered wormhole as her planet’s ticket to survival. She negotiates
    with a measured, unyielding pragmatism—demanding technology and independence rather
    than patronizing aid—and uses procedural authority to steer fractious talks. Bhavani
    reads opportunists and ostentation with calm disdain, weighs competing bids against
    Barzan’s long-term interests, and ultimately privileges neutral guardianship that
    preserves her people’s sovereignty. Her decisions pivot the episode’s political
    stakes and define Barzan’s path between exploitation and self-determination.
