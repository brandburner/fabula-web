- fabula_uuid: ger_agent_c5733346bb42
  global_id: ger_agent_c5733346bb42
  canonical_name: Worf's Father
  title_role: Klingon Warrior
  description: Mogh is the honorable Klingon warrior and patriarch of the House of
    Mogh, father to Worf and Kurn. Falsely accused of treason in the Khitomer massacre
    through Duras family manipulation, his discommendation became a defining tragedy
    for his lineage. His unwavering commitment to truth and Klingon values—particularly
    honor, loyalty, and martial prowess—serves as the moral anchor for Worf's quest
    to restore his family's name. Mogh's innocence, though proven posthumously, remains
    central to the political and personal conflicts between the House of Mogh and
    the Duras family, embodying the tension between institutional corruption and individual
    integrity in Klingon society.
