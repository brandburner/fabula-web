  global_id: ger_agent_cefdafefb596
  canonical_name: Dark
  title_role: null
  description: Dark functions as a named but non-participatory figure within Dr. Paul
    Stubbs' internalized mental baseball lineup. The reference places Dark among Stubbs'
    mnemonic cast—an indexing device Stubbs uses to structure memory and attention
    during moments of cognitive strain. Dark offers no independent actions or dialogue
    in the episode; their narrative role is symbolic and atmospheric, helping to humanize
    Stubbs by revealing the obsessive, ritualized ways he orders information and faces
    crisis. Dark remains a minimal, scene-specific identity rather than an established
    interpersonal actor in the wider series continuity.
