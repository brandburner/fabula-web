  canonical_name: Tayna
  title_role: Research Assistant
  description: 'Tayna functions as Dr. Apgar''s young, deferential research assistant
    and primary laboratory aide. She manages experimental records, escorts visiting
    technicians through the condenser arrays, and articulates the technical workings
    of the Lambda Field generator. Tayna becomes a crucial witness: her shaken deposition
    supplies the factual basis for multiple holodeck reconstructions and her holographic
    testimony is replayed during the investigation. Though cooperative and businesslike
    in the lab, the pressure of the inquiry visibly unsettles her; she remains tied
    narratively to Apgar''s research and the contested sequence of events under scrutiny.'
