  canonical_name: N.D. Shuttlebay Crewman (Enterprise-D)
  title_role: Crewman
  description: "\n        N.D. Shuttlebay Crewman represents enlisted Starfleet personnel\
    \ aboard the *USS Enterprise-D*, specializing in **shuttlebay operations**. Their\
    \ primary duties include **crate packing, shuttle loading/unloading, and coordination\
    \ with senior officers** (e.g., Commander Riker, Geordi La Forge) during high-activity\
    \ operations, particularly when transporters are unavailable. They hand off tools\
    \ like **PADDs**, monitor surroundings for hazards, and react quickly to emergencies.\
    \ Their role is critical for **relief missions and exploration deployments**,\
    \ embodying the disciplined efficiency required to uphold operational flow under\
    \ the command hierarchy.\n        **Key Traits**: Efficient, alert, dutiful, professional.\n\
    \        **Sphere of Influence**: Shuttlebay Two (USS Enterprise-D), Overhang\
    \ Near Control Booth.\n      "
