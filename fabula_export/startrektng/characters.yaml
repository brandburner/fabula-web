- fabula_uuid: ger_agent_fa10eda8010e
  global_id: ger_agent_fa10eda8010e
  canonical_name: Admiral Thomas Henry
  title_role: Admiral, Starfleet Security
  description: Admiral Thomas Henry is a senior Starfleet Security officer and flag
    officer who commands respect through his principled leadership. He holds the rank
    of admiral and wields authority over judicial proceedings on starships, including
    the *Enterprise*, where he acts as a stabilizing force in fleet command. Known
    for his decisive yet fair-minded approach, Henry prioritizes due process and institutional
    fairness, often counterbalancing aggressive inquiries led by peers like Admiral
    Norah Satie. His presence underscores tensions between security imperatives and
    Starfleet principles, positioning him as an institutional check on overreach.
    Henry’s body language and actions—such as maintaining silence during proceedings
    or withdrawing support—reveal his firm commitment to ethical boundaries, reinforcing
    his role as a stabilizing force in Starfleet Command.
