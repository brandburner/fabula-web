    stance, they pursue defection to Federation space for asylum. The group includes
    **sympathizers and active resistors**, such as the **Romulan Engineer (Sympathizer)**,
    who aids their extraction by sabotaging warbird systems (e.g., cloak nullifiers)
    and coordinating with defectors like N'Vek. Bound by shared opposition to regime
    policies, they prioritize undetected transit over personal safety, embodying internal
    fracture within Romulan society through clandestine alliances and high-stakes
    gambits. **Key members** operate covertly aboard Romulan warbirds, leveraging
    technical expertise (e.g., engineering) to facilitate defections.
