  canonical_name: Sigmund Freud
  title_role: Doctor
  description: Sigmund Freud founded psychoanalysis as an Austrian physician in early
    20th-century Vienna. He developed theories on the unconscious mind, dream symbolism,
    and psychosexual drives, viewing dreams as pathways to hidden mental processes.
    Freud maintains close ties to intellectual successors and appears in holodeck
    programs for therapeutic consultations. Precise yet dogmatic, he scrutinizes patient
    narratives through ego-id conflicts and symbolic interpretations like knives for
    aggression. He engages clients with animated curiosity, scribbling notes while
    wielding a cigar, and persists despite resistance by labeling objections as transference.
