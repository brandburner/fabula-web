- fabula_uuid: ger_agent_d5c7637e19eb
  global_id: ger_agent_d5c7637e19eb
  canonical_name: Aaron
  title_role: Admiral
  description: Admiral Aaron stands as a senior Starfleet officer whose cold, piercing
    gaze and lean, hollow-cheeked visage mask a ruthless and duplicitous nature. He
    aggressively interrogates Captain Picard about the sudden cancellation of the
    Pacifica stop, co-hosting a formal yet hostile dinner invitation that conceals
    a sinister trap. Aaron taunts Picard with cynical, sarcastic remarks about the
    USS Horatio tragedy, revealing gleeful contempt for Starfleet’s losses. At the
    dining room confrontation, he grotesquely consumes living worms, exposing his
    monstrous parasitic infection and openly mocks the captain’s horror. Aaron identifies
    the counterfeit parasite splinter on Riker’s neck, signaling betrayal within Picard’s
    inner circle before attempting a desperate escape during the ensuing firefight.
    His actions embody cold calculation, unyielding hostility, and a dangerous blend
    of bravado and desperation, marking him as a pivotal antagonist within Starfleet’s
    corrupt upper echelon.
