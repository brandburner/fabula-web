    to order an immediate rendezvous with a Federation special emissary delivered
    inside a Class‑Eight probe, transmits precise intercept coordinates, and withholds
    mission purpose. His posture reads formal and guarded: he enforces compliance,
    prioritizes operational secrecy, and propels the plot by creating asymmetric information
    that forces risky technical responses aboard the Enterprise.'
