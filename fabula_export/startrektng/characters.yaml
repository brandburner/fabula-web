  canonical_name: Robert Picard
  title_role: null
  description: Robert Picard is the brother of Starfleet Captain Jean-Luc Picard,
    embodying a complex blend of familial loyalty, resentment, and traditionalist
    values. He owns and maintains the Picard family vineyard in rural France, upholding
    the agricultural and cultural traditions established by their father. His relationship
    with Jean-Luc is marked by deep sibling rivalry—including playful defiance, physical
    altercations, and mutual understanding—rooted in their shared upbringing under
    their father's strict discipline. While Robert resents Jean-Luc's choice of a
    spacefleet career over the family heritage, he ultimately yields to familial authority
    with resignation, reflecting a loyalty to both brother and home. His life is shared
    with his wife, Marie Picard, and nephew René, as well as his friend Louis. Traditional
    values define him, prioritizing the preservation of the land and confronting those
    who abandon it, all while navigating the domestic tensions that contrast Jean-Luc's
    exploratory path.
