  canonical_name: L. Q. "Sonny" Clemonds
  title_role: null
  description: 'L. Q. "Sonny" Clemonds is a forty‑seven‑year‑old, twenty‑first‑century
    musician recovered from cryonic suspension and revived aboard the Enterprise.
    His archival file is fragmented: decades of alcohol and drug use plus cosmetic
    self‑alteration have left him chemically ruined and medically fragile, with a
    severely limited attention span (noted at roughly twenty‑eight seconds). In Sickbay
    Dr. Beverly Crusher assumes custody, confronting Sonny’s dazed, distractible behavior
    while trying to stabilize an adaptable, streetwise survivor whose presence raises
    medical, ethical, and social challenges for the crew.'
