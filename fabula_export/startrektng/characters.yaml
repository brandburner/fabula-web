  canonical_name: Victor Frankenstein
  title_role: Doctor
  description: 'Victor Frankenstein, the Gothic scientist from Mary Shelley’s novel,
    endures as a cultural emblem of creative ambition undone by negligence. His biography
    compresses invention, obsession, and the failure to accept responsibility for
    a sentient creation. On the Enterprise, his name operates as an ethical shorthand:
    invoked to compel creators to face the consequences of their experiments rather
    than hide from them. Guinan summons Frankenstein as a moral lever, transforming
    literary myth into a prompt for accountability when unintended life and danger
    escape containment.'
