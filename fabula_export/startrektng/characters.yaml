  canonical_name: Sheliak Director
  title_role: Director
  description: The Sheliak Director functions as the Sheliak delegation's senior legal
    and diplomatic arbiter, enforcing the Sheliak Corporate Directive with clinical,
    hyper-legal rigor. Addressed directly by Captain Picard during negotiation, the
    Director privileges statute over persuasion, dismissing human entreaties and ordering
    transporter expulsion when procedural criteria are unmet. Their formal contempt
    for biological claims and bureaucratic finality constrict diplomatic flexibility,
    transforming attempts at compromise into a juridical impasse and hastening the
    colony's descent toward desperate action.
