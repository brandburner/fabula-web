  title_role: null
  description: Langor is a composed and pragmatic female Brekkian survivor from the
    freighter Sanction, involved in a high-stakes dispute aboard the USS Enterprise
    over the ownership and economic value of Felicium, a rare and vital medicine.
    She stands firmly alongside fellow Brekkian Sobi, supporting their claims against
    the desperate Ornarans, and actively participates in negotiations and confrontations
    regarding the cargo. Langor exhibits calm, calculating behavior, managing tensions
    by restraining Ornarans during altercations and advocating a measured, firm stance
    on the Brekkians' rights and interests. Her interactions with key figures like
    Captain Picard, Sobi, and others reveal her role as a Brekkian representative
    protector of her people’s economic assets, balancing a detached demeanor with
    clear pragmatism amidst escalating ethical and medical crises.
