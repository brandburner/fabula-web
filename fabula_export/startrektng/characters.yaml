    between clinical systems command and fierce personal loyalty. She runs an expanded
    Tactical station with steady hands, rapidly interprets damaged sensor data, and
    directs shields, phasers, and auxiliary power under fire. Yar moves from crisp
    professional assessments to brief, guarded intimacies—mentoring and protecting
    newly displaced officers while carrying the emotional costs of combat. Her actions
    anchor urgent operational decisions and humanize the episode’s moral stakes, establishing
    her as a decisive tactical presence and a sympathetic, duty‑driven officer.
