    force responsible for maintaining order, protecting the crew, and handling internal
    threats aboard the USS Enterprise-D. Led by Chief of Security Lieutenant Worf,
    they coordinate with senior officers (including Captain Jean-Luc Picard) to execute
    emergency containment, secure restricted areas, and support tactical investigations
    during shipboard crises. Disciplined, vigilant, and procedural, they prioritize
