  canonical_name: Sarek
  title_role: Ambassador
  description: Vulcan Ambassador Sarek arrives on the Enterprise with wife Perrin
    and aides Mendrossen and Sakkath to lead Legaran negotiations. Bendii Syndrome
    unleashes his suppressed emotions, infecting the crew and fueling agitation. He
    inspects the conference room with rising demands, rebuffs Perrin's worry during
    failed meditation, and silences concerns about his health. Confronted by Picard,
    Sarek resists then consents to a mind-meld, flooding Picard with love, regret,
    and despair for Perrin and past wife Amanda. Restored, he directs Riker on diplomacy,
    salutes Picard, clasps Perrin's hand, and beams away.
