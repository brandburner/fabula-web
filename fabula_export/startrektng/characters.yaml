  canonical_name: Maddy Calloway
  title_role: Ensign
  description: Ensign Maddy Calloway serves as a medical technician in the *USS Enterprise-D*'s
    Sickbay, where she demonstrates sharp technical competence in quarantine protocols,
    DNA sequencing, and forensic analysis (e.g., bone fragment analysis). A junior
    officer with a profound romantic connection to Lieutenant Kwan, she grapples with
    his sudden death through raw grief and a fierce insistence that his death was
    not suicide, driven by both personal loss and a need to impose order on chaos
    through investigation. Her professional focus is laced with subtle affection toward
    Worf and guarded vulnerability around Counselor Troi, reflecting her role in the
    crew's emotional fabric. Kwan’s personal logs describe her as 'remarkable,' and
    Troi views her as deserving of truth and closure amid tragedy. Her drive stems
    from a blend of technical skill, emotional resilience, and a steadfast loyalty
    to those she loves.
