  canonical_name: Ramsey
  title_role: Doctor
  description: Ramsey stands as the resolute leader of the four male survivors from
    the lost freighter Odin stranded on Angel One. Branded a fugitive by the planet’s
    matriarchal authorities and facing a death sentence, he embodies defiance and
    quiet strength amid exile. Ramsey calmly welcomes the Enterprise away team into
    his hidden sanctuary, revealing a sentimental pendant that anchors his enduring
    connection to Starfleet. He recounts the survivors’ harrowing five-month ordeal
    adrift and their disillusionment with Angel One’s gender hierarchy, explaining
    their deliberate choice to remain despite Starfleet’s rescue efforts. His steadfast
    refusal to abandon his followers challenges the away team’s mission, exposing
    a complex cultural and moral impasse rooted in autonomy, identity, and political
    friction.
