  canonical_name: Valeda Innis
  title_role: First Electorine
  description: Valeda Innis commands the viewscreen with serene yet resolute authority
    as Haven's First Electorine. Draped in a sheer, kimono-like garment reflecting
    her world’s elegance, she delivers a formal, grave warning to Captain Picard about
    an unidentified hostile vessel violating Haven's treaty. With no defenses of her
    own, she places her people's fragile peace in Starfleet’s hands, embodying a calm
    composure that masks the urgency of a diplomatic crisis. Her presence positions
    her as a pivotal political leader, carrying the heavy burden of safeguarding Haven
    through tense interstellar diplomacy.
