  canonical_name: Second Mediator
  title_role: Mediator
  description: Second Mediator serves as the solemn enforcer of the Edo's absolute
    justice system, executing punishment with a somber dignity. Throughout the intense
    conflict surrounding Wesley Crusher's forbidden trespass, this mediator supports
    the First Mediator by confirming the punishment zone's validity, attempting to
    physically restrain Wesley, and warning Captain Picard of divine retribution.
    Their demeanor blends calm resolve with genuine sorrow, embodying the unyielding
    cultural adherence to a lethal, ritualistic law that challenges Starfleet's principles.
    The Second Mediator's actions amplify the moral tension, representing the strict,
    fearful obedience to the Edo's sacred laws and their godlike protector, the Edolord.
