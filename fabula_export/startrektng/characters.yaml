  canonical_name: Cultured Woman
  title_role: Member of Riva's Chorus
  description: The Cultured Woman serves as a vital component of Riva's Chorus, acting
    as his voice and emotional conduit during diplomatic engagements. With refined
    manners and intellectual grace, she embodies the sophisticated aspects of Riva's
    personality, offering hospitality and explaining his unique communication method
    to outsiders. Her role becomes particularly crucial during tense negotiations
    on Solais Five, where her attempts to maintain calm highlight both the Chorus's
    utility and vulnerability. When Riva's technology fails, she experiences profound
    disorientation, revealing the Chorus's absolute dependence on their mediator.
    This cultured interpreter demonstrates how Riva's mediation system blends individual
    specialization with collective harmony, making her collapse without Riva's guidance
    all the more devastating.
