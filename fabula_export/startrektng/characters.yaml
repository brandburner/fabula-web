  canonical_name: Krag
  title_role: Chief Investigator
  description: Krag serves as Chief Investigator for the Tanugan security force, dispatched
    to the Enterprise to pursue criminal charges against Commander William Riker.
    He enforces Tanugan jurisdictional claims with procedural certainty, assembling
    witnesses, laboratory telemetry, and holodeck reconstructions to press for extradition.
    Krag privileges evidence-driven demonstrations—curating and freezing holographic
    simulations to lock causal timelines—and maintains a poker-faced, reserved posture
    while interrogating. His dealings with Picard reveal pragmatic willingness to
    trade custody for technical proof; he withdraws extradition only after formal
    investigative avenues are exhausted.
