  canonical_name: USS Brattain Crew
  title_role: null
  description: Starfleet personnel assigned to the USS Brattain, a science vessel
    trapped in the Tyken's Rift ahead of the Enterprise-D. Isolation and sleep deprivation
    eroded their sanity, sparking paranoia, mutiny, and mass psychological breakdown,
    leading to deaths in solitude. Only the counselor survived. Their stasis-preserved
    corpses—now central to Enterprise investigations—offer direct evidence of the
    rift's neurological devastation, representing the human cost of uncharted spatial
    phenomena. Starfleet views their collapse as a grim benchmark for the rift's mental
    hazards, where discipline crumbles under unrelenting strain.
