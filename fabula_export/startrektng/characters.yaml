  title_role: Commander
  description: Tryla Scott commands one of the frigates orbiting Dytallix B, rapidly
    promoted to captaincy faster than most in Starfleet history. She emerges as a
    confident, scornful figure deeply involved in a covert alliance of Starfleet officers
    warning Captain Picard of a parasitic infiltration corrupting Starfleet command.
    Initially an ally who flanks Captain Keel in a tense identity verification and
    warns of strange Starfleet behavior, she ultimately reveals her true colors as
    an infected conspirator. In a brutal betrayal within Starfleet Headquarters, Tryla
    mocks Picard, attacks him and Riker with a phaser, and is swiftly cut down by
    Riker, exposing the parasite's escape from her mouth. Her arc epitomizes duplicity
    and menace, embodying the insidious internal threat facing the Federation.
