  canonical_name: N.D. Nurse
  title_role: Nurse
  description: A female Devidian operative who adopts the guise of a 19th-century
    aristocratic nurse (referred to as 'N.D. Nurse' in some contexts) to facilitate
    neural energy harvesting from humanoid victims. She partners closely with the
    Devidian Doctor (Alien Doctor) in covert operations across timelines, deploying
    phase-shifting technology and specialized harvesting devices. Her cold, calculating
    demeanor and deceptive Victorian-era appearance mask a predatory drive to sustain
    Devidian survival. Encounters with Starfleet officers (e.g., *Enterprise* crew)
    reveal her role in temporal disruptions, culminating in resigned candor upon defeat,
    where she discloses the Devidians' biological imperative and warns of timeline
    annihilation. Resilient and loyal, she embodies the species' survival instinct
    through targeted attacks on human victims.
