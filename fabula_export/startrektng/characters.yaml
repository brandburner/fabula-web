  canonical_name: Stompie Kayden (Will Kayden)
  title_role: null
  description: Stompie Kayden, also known as Will Kayden (nicknamed 'Stompie' by comrades),
    was a Starfleet crewman who served alongside Captain Benjamin Maxwell and Chief
    Miles O'Brien during the Setlick conflict. He died in the Cardassian attack on
    Setlick City, leaving a profound legacy of brotherhood and loss. His memory is
    honored through the ballad *The Minstrel Boy*, which encapsulates the bonds forged
    in battle and the enduring grief of those who survived. Kayden embodies the human
    cost of frontier conflicts, his quiet heroism shaping the resolve and regrets
    of his comrades.
