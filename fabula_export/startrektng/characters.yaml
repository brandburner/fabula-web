  canonical_name: Klim Dokachin
  title_role: Quartermaster
  description: Klim Dokachin holds the position of quartermaster at Surplus Depot
    Zed-One-Five, a Zakdorn-operated facility overseeing decommissioned vessels in
    Klingon-controlled space. He enforces access protocols with unyielding bureaucratic
    rigor, restricting logs and files to authorized personnel only. Dokachin's self-assured
    manner hides a vanity responsive to flattery, allowing him to bend rules when
    his ego receives validation. Starfleet officers encounter his initial resistance
    before his cooperation emerges under diplomatic pressure, marking him as a key
    gatekeeper in salvage operations amid interstellar tensions.
