  description: The Emperor of the Klingon Empire functions as the supreme sovereign
    whose authority defines loyalty, honor, and political legitimacy across Klingon
    society. In this episode the Emperor does not appear but operates as the decisive
    referent for figures such as Mogh, whose declared devotion to the Emperor reshapes
    inquiries into Khitomer and reframes accusations of treachery. The office exerts
    distant yet concrete influence, structuring allegiance, sanction, and the ritual
    codes that govern Klingon responses to scandal and accusation.
