    that serves as the central reproductive and control hub for a parasitic swarm
    infiltrating Starfleet personnel. It exhibits high mobility and cunning, evacuating
    host bodies to infest new ones, as demonstrated when it leaves Admiral Aaron and
    merges into Commander Remmick. The core’s presence within Remmick reveals a terrifying
    symbiosis, as it controls the host while feigning peaceful intent. Under phaser
    fire, the parasitic core violently reveals its true monstrous form before being
    destroyed. This entity embodies the insidious threat of parasitic infestation,
    escalating the narrative stakes through its parasitic invasion and the shattering
    of trust within Starfleet ranks.
