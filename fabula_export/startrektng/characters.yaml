    normal humans. Their presence aboard the Enterprise converts scientific curiosity
    into a medical emergency; in the current episode their associated organisms infiltrate
    and impair Commander Riker's neural functions, producing erratic vitals even as
    growth of the infective agent slows to seven percent under treatment. The group
