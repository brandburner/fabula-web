  canonical_name: Boreth Klingons
  title_role: null
  description: A collective of Klingon attendants, pilgrims, and ritual participants
    at the Boreth shrine and monastery, including both named figures (Torin, Divok,
    Koroth) and unnamed subordinates. They serve as spiritual guardians, patrolling
    sacred caves, participating in rituals (e.g., fire pits, smoke-thickening ceremonies),
    and responding to disturbances with cohesion. Their roles encompass ceremonial
    duties, vigilance over holy sites, and unwavering devotion to Klingon prophecy—particularly
    the return of Kahless. The group’s actions reflect reverence for tradition, unity
    in faith, and loyalty to spiritual leaders, often amplifying pivotal religious
    moments (e.g., duels, visions, messianic claims). Their interactions with figures
    like Worf, Gowron, and Data highlight tensions between skepticism and devotion,
    as well as the political/spiritual fractures within Klingon society.
