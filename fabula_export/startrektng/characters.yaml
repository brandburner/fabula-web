- fabula_uuid: ger_agent_e491a89b6ea8
  global_id: ger_agent_e491a89b6ea8
  canonical_name: Corlina
  title_role: null
  description: Corlina knew Jean-Luc Picard during his early Starfleet days at Starbase
    Earhart. She pursued a romantic connection with the young officer, whom she later
