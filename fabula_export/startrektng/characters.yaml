  canonical_name: J'naii Society
  title_role: null
  description: The J'naii Society is an androgynous civilization that enforces strict
    cultural uniformity, viewing biological sex and gender distinctions as pathological
    deviations. Their society criminalizes nonconformity, employing psychotectic therapy
    and social vigilance to suppress individual desires and maintain collective cohesion.
    Advanced technology enables null space travel and Federation contact, while their
    culture sustains unity through shame, ridicule, and constant monitoring of public
    spaces. The society prioritizes asexual conformity, enforcing decorum through
    punitive measures and collective preservation.
