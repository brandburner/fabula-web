    effects, and escalating seizures; she remains critically ill and ultimately succumbs
    despite resuscitation attempts. Warren’s arc ties her professional competence
    and frontline duties to the episode’s medical and Prime Directive crises, and
    she is closely linked to Barron, Beverly, and Picard during her treatment.
