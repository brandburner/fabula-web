  title_role: null
  description: 'Slade Bender arrives as a hulking, taciturn gangster who forces Captain
    Picard—playing Dixon Hill—into a dangerous, personal transaction: locate his missing
    sister Alva. He seizes Picard to demand action, presents a photograph as proof,
    and later reappears at Rex''s bar, reaching under his coat in a defensive, threatening
    gesture but stopping short of violence. His single-minded insistence converts
    the Holodeck noir from escapist diversion into a concrete lead that propels the
    episode''s plot and anchors the captain to a real-world moral obligation.'
