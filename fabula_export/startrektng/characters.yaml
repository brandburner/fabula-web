  description: Kayron acts as a loyal, aggressive Ferengi subordinate operating under
    the leadership of Letek. He participates actively in ambushing the Starfleet away
    team on a hostile planet surface, dragging prisoners such as Worf, fighting fiercely
    alongside Mordoc, and wielding a deadly whip in attempts to kill crewmembers.
