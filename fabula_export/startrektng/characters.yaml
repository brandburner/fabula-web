  title_role: Guard
  description: Romulan Security Guards are disciplined military personnel who maintain
    security aboard Romulan warships, assisting officers like Taibak in sensitive
    operations. They function as a pair of subordinates in the Romulan chain of command,
    executing physical restraints, equipment handling, and security protocols with
    mechanical precision. Their actions reflect strict military obedience, characterized
    by absolute loyalty to superiors, adherence to mission protocols, and a complete
    absence of personal initiative or emotional variance. They embody the disciplined
    efficiency and control-oriented values of the Romulan military.
