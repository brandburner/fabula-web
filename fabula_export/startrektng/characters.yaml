- fabula_uuid: ger_agent_8bf358b8da76
  global_id: ger_agent_8bf358b8da76
  canonical_name: Rina
  title_role: Specialist Trainee
  description: Rina is a striking and intellectually formidable Specialist Trainee
    aboard the Enterprise, whose technical prowess in engineering mechanics and warp
    theory quickly establishes her as a promising addition to the crew. She navigates
    professional interactions with a blend of confidence and wariness, deftly deflecting
    Commander Riker's flirtations with a sharp reminder of protocol while engaging
    earnestly in technical discourse with Geordi. Her fascination with cosmic phenomena,
    mirrored even by Captain Picard, hints at a deep-seated curiosity that drives
    her scientific inquiries. Rina's technical acumen shines when she troubleshoots
    exotic equipment and validates high-stakes transporter modifications to save Dr.
    Pulaski, demonstrating both her engineering instincts and her ability to thrive
    under pressure. Her dynamic with Geordi evolves from initial defensiveness to
    a tentative mentorship, marked by an emotional apology and handshake that bridges
    their mutual understanding of feeling like outsiders. Rina's blend of technical
    brilliance, professional boundaries, and emotional vulnerability positions her
    as a compelling new presence in the Enterprise's engineering corps.
