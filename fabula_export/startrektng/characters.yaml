  canonical_name: Accolan
  title_role: null
  description: Accolan emerges as a nurturing and encouraging figure within Aldea's
    artistic unit, dedicated to mentoring Harry during his forced assimilation. He
    repeatedly affirms Harry's innate sculpting talent, guiding him through the creative
    process and offering emotional support that contrasts with the cold systemic restructuring
    imposed on the abducted children. Accolan's role extends beyond mentorship as
    he embodies Aldea’s cultural values of artistic expression, celebrating Harry’s
    emergent identity and providing moments of joy and hope amid isolation and uncertainty.
    His interactions with Harry and Leda reveal a compassionate embodiment of Aldean
    traditions, while his symbolic gifting of a dolphin sculpture underscores a tender
    farewell and the complex emotional landscape surrounding the children’s separation
    and rescue.
