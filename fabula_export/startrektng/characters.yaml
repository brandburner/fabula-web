    psychological director within Angosia''s militarized recruitment system. Identified
    only through Danar''s testimony as the ''first instructor'' who began his training
    and self-identified as a counselor, this figure embodies institutional grooming:
    shaping recruits'' moral frameworks, normalizing violence as obedience, and passing
    judgment in service of state goals. The counselor operates with clinical detachment
    and authority, producing operatives whose actions reflect systematized conditioning
    rather than isolated criminality, and who thereby implicate Angosia''s institutions
    in culpability.'
