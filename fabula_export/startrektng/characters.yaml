  global_id: ger_agent_dcba11acffe3
  canonical_name: Conn Officer
  title_role: Conn Officer
  description: Starfleet officer stationed at the conn on the USS Enterprise-D bridge,
    responsible for navigation and helm functions. Executes Captain Picard's commands
    during critical operations, including shuttle launches, tactical maneuvers, and
    high-speed intercept courses (e.g., warp nine for Trill vessels). Coordinates
    with senior staff such as Commander Data (tactical coordination), Lieutenant Worf
    (shield timings), and Doctor Beverly Crusher (bridge operations) to ensure precise,
    mission-critical navigation. Represents the disciplined junior officers who maintain
    ship control under pressure, balancing professionalism with adaptability during
    crises (e.g., medical/diplomatic emergencies). Duty-driven and highly competent,
    this officer’s role is pivotal in supporting the Enterprise’s operational readiness
    amid rising tensions.
