- fabula_uuid: ger_agent_a7b751d8ee75
  global_id: ger_agent_a7b751d8ee75
  canonical_name: Sev Maylor
  title_role: null
  description: 'Sev Maylor is the Lumarian mother of Ambassador Alkar, a woman of
    intense empathic power and volatile emotional instability. Physically characterized
    by white hair, a craggy face, and a stooped posture, she radiates suppressed rage
    and malignancy in every word and gesture. Her role as Alkar''s mother is defined
    by a complex, psychically bonded relationship: she absorbs his excess negative
    emotions through a ritualistic process, enabling his diplomatic composure while
    accelerating her own physical and emotional deterioration. Fiercely protective
    of her son, Sev confronts perceived romantic rivals with venomous accusations,
    cryptic warnings, and direct threats, driven by deep jealousy and vengeful instincts.
    Her unstable outbursts and malevolent demeanor mark her as a volatile yet devoted
    figure in both Lumerian society and the diplomatic circles surrounding Alkar.
    Her eventual death underscores the human cost of Alkar''s serene mediation style
    and the familial duty she carries in interstellar affairs.'
  traits:
  - protective
  - vengeful
  - malevolent
  - unstable
  - rageful
  aliases:
