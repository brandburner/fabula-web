  title_role: Biomolecular Physiologist
  description: A specialist in clinical biomolecular systems who arrives as the acute
    diagnostic authority during Captain Picard's life-threatening surgical crisis
    aboard Starbase 515. Calm and technically focused under extreme pressure, they
    rapidly call out failing metabilation and heterocyclic responses, acknowledge
    the surgeon's limits, and immediately summon an outside expert by engaging the
    communications panel. Their intervention reframes the emergency—shifting the team
    from procedural escalation to targeted, specialist-led remediation—and raises
    the emotional and logistical stakes for the surgical team and command.
