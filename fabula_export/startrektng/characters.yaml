  global_id: ger_agent_87fd94fa13d4
  canonical_name: Transport Pilot
  title_role: Transport Pilot
  description: A shuttle transport pilot who nervously hails the Starship Enterprise
    to report an onboard V.I.P., briefly begins to identify the passenger under direct
    orders, and then immediately yields the transmission to the passenger herself.
    The pilot's relief at stepping aside and willingness to defer signal strict adherence
    to protocol and chain-of-command when faced with an authoritative or disruptive
    VIP. Functionally minimal in screen time, the pilot initiates the communicative
    action that forces the bridge crew into an unexpected diplomatic and procedural
    confrontation, supplying necessary exposition while embodying professional reticence.
