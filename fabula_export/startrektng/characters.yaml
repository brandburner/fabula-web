  description: Logan emerges as a strongly confident and competent Chief Engineer
    aboard the Enterprise, displaying sharp technical acumen and assertive leadership
    during a dire crisis. He repeatedly challenges Lieutenant Geordi La Forge's temporary
    command decisions, invoking his greater rank and experience to advocate for a
    more cautious strategy focused on preserving the ship. Despite his insistence
    on breaking orbit and reluctance to abandon the away team, Logan ultimately defers
    to Geordi’s command but retains a critical, questioning stance. He accepts delegated
    command of the Saucer Section during ship separation with visible internal conflict,
    highlighting his dedication to crew survival yet frustration at tactical choices.
    His urgent communication from Engineering underlines his technical responsibility
    and pivotal role in attempting to stabilize failing power systems amid relentless
    enemy assault.
