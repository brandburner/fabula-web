    their civilization's entire digital essence, preserving their knowledge against
    impending doom on their homeworld. Initially agitated and evasive, their actions
    reveal a profound commitment to survival over confrontation. When confronted,
    they appear pale, fearful, and inert, underscoring their nonviolent intent and
    tragic plight. They accept Starfleet's authority and the prospect of a formal
    hearing with composed logic, embodying a species whose survival hinges on intricate
