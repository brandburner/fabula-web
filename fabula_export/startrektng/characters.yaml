  canonical_name: Bennett
  title_role: Ensign
  description: Ensign Bennett mans the conn station on the Enterprise bridge. He receives
    Captain Picard's direct order to break orbit from Gemaris V and set course for
    Starbase 12, executing it without comment. Bennett holds his post during tense
    moments, including Riker's congratulations to Picard and the first officer's later
    hail from orbit around Risa. He stands ready amid crew concerns over Picard's
    exhaustion but remains unobtrusive, focused on helm duties. His presence supports
    smooth navigation transitions as the ship departs the negotiation site.
