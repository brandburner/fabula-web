  canonical_name: Emergency Teams
  title_role: null
  description: 'Emergency Teams function as organized Starfleet response units deployed
    to shipboard crises. In the processed material, Riker refers to them as boarding
    parties sent to assist triage, casualty recovery, and systems assessment on the
    ravaged Enterprise‑C. The cluster names a collective capability rather than a
    single person: rotating crews of specialists who act under shipboard command to
    stabilize situations, evacuate survivors, and support medical and engineering
    leads. Because references are plural and operational, the cluster represents an
    organizational element, not an individual agent with a personal identity.'
