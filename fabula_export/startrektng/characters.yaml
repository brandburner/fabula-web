  canonical_name: Nova Squadron
  title_role: Starfleet Academy Flight Team
  description: Nova Squadron is Starfleet Academy's elite cadet flight team, renowned
    for precision aerobatics and high-stakes maneuvers under the leadership of Nicholas
    Locarno. The squadron's core members—including Wesley Crusher, Sito Jaxa, and
    Hajar—prioritize group loyalty, competitive excellence, and a protective code
    that demands unity in adversity. Their dynamic fosters ambition but often tests
    Starfleet regulations with bold risks, creating tensions between innovation and
    discipline. The squadron's collective drive shapes critical Academy proceedings,
    with members navigating internal divisions and external pressures while maintaining
    a reputation for skill and reckless determination.
