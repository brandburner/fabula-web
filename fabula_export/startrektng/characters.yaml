  global_id: ger_agent_8107491da2bd
  canonical_name: Worf's Mother
  title_role: null
  description: 'Worf''s Mother is the deceased Klingon matriarch whose murder during
    the Khitomer Outpost assault anchors the emotional and ethical conflicts of her
    sons. Remembered across recollection and accusation, she operates narratively
    as the family''s moral touchstone: her loss forges Worf''s honor-driven rage and
    shapes Kurn''s protective duty and fraught loyalty. The current material reaffirms
    her concrete placement at Khitomer and her failure to return, underscoring her
    enduring role as a posthumous catalyst for family reputation, political fallout,
    and the trial that follows.'
