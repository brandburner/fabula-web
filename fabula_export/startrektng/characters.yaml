  canonical_name: Lwaxana Troi
  title_role: Betazoid Ambassador
  description: Lwaxana Troi storms aboard the Enterprise with flamboyant grandeur,
    dragging her imposing luggage and shadowed by her silent valet Mr. Homn. She shatters
    Starfleet decorum with sharp telepathic barbs and brazen cultural provocations,
    especially targeting her daughter Deanna and Captain Picard. Her uncompromising
    candor and dramatic flair ignite tension during family gatherings, where she fiercely
    defends ancient Betazoid traditions, even using a telepathic vine to humiliate
    Earth custom adherents. Beneath her theatrical exterior, she reveals deep empathy
    and unyielding commitment to Betazoid genetic bonding vows, pushing Deanna to
    confront complex emotions amid cultural clashes and looming crises. Lwaxana embodies
    Betazoid cultural pride, maternal assertiveness, and unfiltered honesty that disrupts
    but ultimately strengthens family bonds.
