  canonical_name: Benjamin Maxwell
  title_role: Captain
  description: Captain Benjamin Maxwell commands the USS Phoenix in Starfleet. A decorated
    veteran of Federation-Cardassian conflicts, he lost his family in the Setlik Three
    raid, an event that fuels his unyielding distrust of Cardassians. Maxwell suppresses
    his grief behind a facade of duty, yet his conviction in their duplicity drives
    rogue actions that challenge peacetime accords. He maintains a profound loyalty
    bond with Chief Miles O'Brien, his former chief engineer, forged through shared
    wartime trials.
