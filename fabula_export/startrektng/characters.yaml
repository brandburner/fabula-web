    secretive technological and social order. She participates prominently alongside
    Radue and Rashella in greeting and managing the Federation children abducted to
    Aldea, projecting a composed yet cautious authority. Acting as a gatekeeper, she
    registers Wesley Crusher's voice for restricted Custodian computer access, guiding
    him through limited interactions while defensively guarding Aldea's forbidden
    technological secrets. Duana supports Radue's enforcement of leadership roles
    among the children, encouraging assimilation and compliance with Aldea's rigid
    'unit' structure. Her watchful presence at Wesley's quarters during Beverly Crusher's
    visit reveals growing nervousness and suspicion about potential subversion. Though
    outwardly calm, Duana embodies the fragile, controlled veneer of Aldean society,
    balancing hope for survival with defensive preservation of its concealed vulnerabilities.
