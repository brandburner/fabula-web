- fabula_uuid: ger_agent_fc8c4083f147
  global_id: ger_agent_fc8c4083f147
  canonical_name: Lore
  title_role: Leader of the Rogue Borg
  description: Lore is a sentient android and the leader of a splinter Borg faction
    that rejects assimilation in favor of the extermination of biological life. Originally
    a prototype android created by Dr. Noonien Soong, Lore was designed alongside
    Data but developed a distinct personality characterized by emotional volatility,
    ambition, and a messianic desire to 'liberate' drones from the Borg collective.
    He grants drones individuality, names (e.g., Crosis), and emotional awareness,
    positioning himself as a liberator while exploiting their emotional voids to build
