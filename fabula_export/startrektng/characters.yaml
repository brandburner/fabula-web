- fabula_uuid: ger_agent_19acdc33b723
  global_id: ger_agent_19acdc33b723
  canonical_name: Shelby
  title_role: First Officer
  description: Elizabeth Shelby is a Starfleet officer specializing in Borg countermeasures,
    known for her tactical precision, ambition, and pragmatic approach to command.
    Initially serving as a tactical expert, she is promoted to acting First Officer
    of the *Enterprise-D* by Commander William Riker after demonstrating exceptional
    competence during high-stakes operations. Shelby coordinates bridge operations,
    leads away teams, and assists in critical engineering repairs, often clashing
    with senior staff like Riker, Data, and Worf due to her results-driven philosophy.
    She commands a dedicated Starfleet task force focused on rapid intelligence dissemination
    and aggressive countermeasures against the Borg Collective. Her professional bearing
    and unwavering determination under pressure make her a reliable liaison in high-stakes
    operations, though her blunt demeanor and prioritization of results over protocol
    occasionally create tension. Her career is driven by a fusion of personal ambition
    and a deep sense of duty to halt Borg assimilation.
