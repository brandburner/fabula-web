  canonical_name: Sarjenka
  title_role: null
  description: Sarjenka is an alien child from Drema Four whose four‑word distress
    call — "Is anybody out there?" — ignites a forbidden, intimate correspondence
    with the android Data. Her frightened live transmissions and eventual materialization
    aboard the Enterprise convert abstract Prime Directive debate into an immediate
    humanitarian crisis. She clings to Data, trusts him instinctively, and becomes
    the personal focal point that compels Starfleet officers to choose compassion
    over strict non‑interference. Her presence drives the episode’s ethical stakes
    and catalyzes consequential rescue and medical decisions.
