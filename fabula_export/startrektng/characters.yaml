  title_role: null
  description: 'Kyril Finn operates as a pragmatic Ansata field operative whose conduct
    alternates between awkward courtesy and uncompromising violence. In private detention
    he approaches captives with tentative, rueful politeness—offering food and identifying
    himself—yet in shipboard combat he fights ruthlessly, wounds a senior officer,
    and employs advanced dimensional technology to abduct a high-value target. He
    projects a dual presence: a man who performs small, humanizing gestures when useful
    and a resolute tactical aggressor when the mission demands it, marking him as
    a dangerous, adaptable agent within the terror cell’s operational cadre.'
