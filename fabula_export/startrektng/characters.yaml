  canonical_name: Vanessa
  title_role: null
  description: 'Vanessa operates as a desperate, high‑stakes gambler at the Royale
    Casino whose fortunes swing between ruin and sudden windfall. She repeatedly risks
    scarce resources—explicitly fearing loss of shelter—and submits to scripted prompts
    from the table (hit/stand), collapsing into shame and despair when forced to bust.
    Her emotional volatility and dependence on Texas reveal personal vulnerability
    and a small network of protection. Narratively, she functions as a living example
    of the hotel''s deterministic players: her losses and later gains help the away
    team detect and exploit the casino’s manufactured mechanics.'
