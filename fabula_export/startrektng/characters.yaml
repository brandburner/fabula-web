  canonical_name: Keiko O'Brien
  title_role: Botanist
  description: Represents Keiko O'Brien in her childhood and early formative years,
    characterized by her tactile curiosity, precise movements, and immersion in Japanese
    family traditions. This entity encompasses both her literal childhood (as seen
    in recovered memories) and her early adult years (as a young botanist on the *USS
    Enterprise-D*), where her cautious yet exploratory nature bridges cultural heritage
    and scientific inquiry. Her interactions with objects—whether chipped cups, ink
    brushes, or botanical specimens—reflect the continuity of her precision and sensory
    awareness across time. Themes of lost innocence and telepathic intrusion (e.g.,
    in recovered memories) contrast with her later role as a steadfast scientist and
    mother.
