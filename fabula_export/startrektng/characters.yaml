- fabula_uuid: ger_agent_20b2959e558a
  global_id: ger_agent_20b2959e558a
  canonical_name: Kova Tholl
  title_role: Public Servant
  description: 'Kova Tholl (alias: Tholl) is a Mizarian public servant abducted into
    an alien holding bay experiment alongside Picard, Haro, and Esoqq. Initially unconscious
    for twelve days, he awakens skeptical and distrustful of his captors and fellow
    prisoners. Tholl asserts Mizarian intellectual superiority, verbally clashes with
    Esoqq over cultural differences, and panics at threats of cannibalism. He challenges
    Picard''s leadership, questions Federation conflicts, and deflects accusations
    of collaboration by blaming others. Tholl reluctantly participates in escape attempts
    (e.g., door-prying) but demands proof of loyalty amid rising group paranoia. His
    traits include arrogance, intellectual condescension, fear, skepticism, and manipulation.
    His narrative role spans captivity survival dynamics and public service on Mizar
    II.'
