  canonical_name: Kyle Riker
  title_role: Primary School Teacher
  description: Kyle Riker functions as William Riker's estranged father and a civilian
    strategist who once advised Starfleet. New material frames him as the sole survivor
    of a Tholian attack on a starbase whose survival hardened him into a duty-driven,
    stoic figure. He taught Will domestic routines such as cooking and surfaces now
    as a proud, awkwardly conciliatory paternal presence who seeks rapprochement but
    bears deep trauma. Pulaski's intimate recollection that she once loved him recasts
    his apparent arrogance as the product of grief and obligation, and his transporter-room
    approach crystallizes the personal stakes that complicate William Riker's command
    decisions.
