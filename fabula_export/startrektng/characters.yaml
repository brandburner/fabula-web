    caution with bold, unorthodox maneuvers—earning the label 'cowboy diplomacy'—as
    he coordinates defections and messages that bridge Federation and Romulan interests.
    Principled and introspective, Spock navigates political perils with steadfast
    commitment to logic and peace.
