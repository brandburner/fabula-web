  canonical_name: Temple
  title_role: Nurse
  description: Nurse Temple works in the USS Enterprise-D's Sickbay under Dr. Beverly
    Crusher. She supports John Doe's rehabilitation therapy, monitoring his progress
    amid his rapid recovery. When John suffers intense pain and his body emits a yellowish
    glow, she enters his room, assesses his torment, alerts Crusher via combadge,
    and offers to fetch pain medication. Her actions reveal a nurse who spots distress
    quickly and acts decisively, even as John's transformation stuns her. She coordinates
    with Crusher during crises, upholding Sickbay protocols while facing the unknown.
