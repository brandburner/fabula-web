- fabula_uuid: ger_agent_cdeac733d791
  global_id: ger_agent_cdeac733d791
  canonical_name: Security Supernumerary
  title_role: Security Officer (Bridge Detail)
  description: An anonymous Starfleet security enlistee assigned as a visible bridge
    security presence during an altered, militarized watch. Posted with sidearms near
    turbolifts, this supernumerary enforces order, projects deterrence, and reinforces
    a hardened command atmosphere without individual distinction. The figure performs
    steady, alert sentry duties, responding to shifting tactical needs and the chain
    of command while remaining functionally backgrounded in shipboard life. The role
    embodies institutional militarization more than personal biography, anchoring
    the bridge’s changed tone and immediate operational readiness.
