  canonical_name: Hester Dealt
  title_role: Lieutenant Commander
  description: Lieutenant Commander Hester Dealt commands the Federation Medical Collection
    Station as its medical trustee, a role that places him at the lethal intersection
    of medical ethics and interstellar quarantine protocol. When the Enterprise arrives
    to transport plague specimens, Dealt's holographic projection on the bridge viewscreen
    becomes the voice of bureaucratic caution made flesh. His disposable lab coat
    and pushed-up medical mask frame weary eyes that have witnessed too much contagion,
    while his measured insistence on pre-transfer inspections transforms procedural
    anxiety into life-or-death protocol. He offers total transparency—complete manifest
    access to the Enterprise's computer banks—yet withholds trust until every containment
    seal proves worthy, embodying the Federation's desperate balance between scientific
    cooperation and species self-preservation.
