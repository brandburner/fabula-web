  canonical_name: Medical Assistant
  title_role: Medical Supernumerary
  description: The Medical Assistant serves as a calm, professional Medical Technician
    aboard the Enterprise, conducting precise medical scans on Data during critical
    moments in Sickbay. Exhibiting focused neutrality and responsiveness, the Assistant
    adapts seamlessly to the entrance of senior officers, withdrawing upon request
    to respect command protocols. This role highlights the essential support function
    within Starfleet’s medical team, facilitating the clinical assessment of advanced
    android crew members under tense conditions without emotional interference. Additionally,
    this Medical Assistant mobilizes swiftly within Sickbay, coordinating under Chief
    Medical Officer Beverly Crusher's direction to prepare medical supplies and portable
    equipment for urgent deployment, embodying Starfleet's dedication to rapid, professional
    medical response during crises including the escalating situation at Farpoint.
    This medical professional also serves as a critical support figure assisting Dr.
    Beverly Crusher during high-stakes medical emergencies, acting with focused urgency
    and responding promptly to deteriorating patient conditions, particularly during
    politically sensitive crises involving Klingon patients.
