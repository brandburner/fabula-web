  title_role: Consul
  description: 'Kol serves as one of DaiMon Goss''s consuls and principal aides within
    the Ferengi delegation. Kol performs ceremonial duties—delivering Goss''s sack
    of gold—while also operating in close partnership on covert plans, silently endorsing
    biochemical sabotage devised by Arridor and Goss. When operations turn kinetic,
    Kol demonstrates technical competence, piloting the Ferengi pod that escorts the
    Enterprise shuttle. Kol''s presence ties Ferengi spectacle to practical execution:
    a subordinate who converts Goss''s ostentation into actionable support without
    overtly speaking for himself.'
