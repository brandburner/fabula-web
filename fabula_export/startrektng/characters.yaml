  global_id: ger_agent_a04456de1e13
  canonical_name: Vash
  title_role: Archaeologist
  description: Vash is a brilliant, unconventional archaeologist who pursues ancient
    artifacts with adventurous zeal and little regard for rules. She shares a deep
    romantic history with Captain Jean-Luc Picard from their time on Risa, a connection
    that persists in teasing flirtations and emotional confrontations. Bold and independent,
    she disrupts Picard's disciplined world with her cunning charm and strategic wit,
    challenging his emotional reserve. Her relationships with Enterprise senior staff
    like Riker and Crusher reveal her familiarity with their dynamics and her frustration
    at Picard's secrecy about her. Vash prioritizes personal freedom and passion over
    institutional loyalty.
