  canonical_name: Van Doren
  title_role: Doctor
  description: 'Van Doren stands as the credited originator of a surgical technique
    that Jean-Luc Picard cites to normalize the risk of his planned cardiac replacement.
    Cited specifically for driving mortality down to two point four percent, Van Doren
    functions as an off-screen medical authority whose innovation and reputation allow
    a senior patient to frame a high-stakes procedure in clinical terms. In the episode,
    the name carries clinical weight: Picard''s invocation uses Van Doren''s benchmark
    to reassure, assert control, and contain vulnerability.'
  traits:
