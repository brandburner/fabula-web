- fabula_uuid: ger_agent_12296336fa36
  global_id: ger_agent_12296336fa36
  canonical_name: K'Ehleyr
  title_role: Special Emissary
  description: K'Ehleyr arrives as a composed, sardonic half‑Klingon/half‑human envoy
    who immediately rewrites the mission's emotional and diplomatic stakes. She claims
    the title Special Emissary, delivers grim intelligence about the eighty‑year‑lost
    Klingon battlecruiser T'Ong, and presses for annihilation while clashing with
    Starfleet procedure. She provokes Worf with intimate barbs that reopen old wounds,
    alternates teasing bravado with vulnerable admissions about cultural hybridity,
    and demonstrates lethal Klingon ferocity in combat simulations. Assigned to board
    the T'Ong, she functions as both a catalyst for personal conflict and a hardline
    diplomatic agent whose presence forces the crew to reconcile duty with private
    history.
