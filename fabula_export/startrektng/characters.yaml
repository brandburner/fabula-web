  canonical_name: Ruffian
  title_role: null
  description: A holographic Ruffian emerges from the deteriorating London streets
    of the holodeck simulation, embodying the escalating danger as Moriarty's tampering
    disables safety protocols. With aggressive determination, he targets Picard, demanding
    the captain's copper coin with violent insistence. Brandishing a knife with lethal
    intent, he represents the first tangible proof that holographic threats now carry
    real physical consequences. Data's effortless intervention—lifting him bodily
    and disarming him—highlights both the android's protective role and the newfound
    vulnerability of flesh-and-blood crew members in this compromised environment.
    The Ruffian's quick retreat after confrontation underscores his function as a
    disposable threat in Moriarty's psychological warfare, designed to test Picard's
    resolve and demonstrate the breakdown of holographic rules.
