    Elders, and maintains a home adaptable as a laboratory. Protective instincts drive
    him to shield Gia from strangers like amnesiac Data, whom he confronts with suspicion
    before yielding to curiosity. Even as radiation poisoning weakens him, Garvin
    defends Data's reliability and authorizes investigation into his illness. His
    pragmatic dealings and paternal devotion anchor him amid village routines disrupted
    by alien intrusion.
