  canonical_name: Danilo
  title_role: Shan'a'kee
  description: Danilo functions as the Shan'a'kee — the ceremonial and practical leader
    — of the Bringloidi refugee community evacuated aboard the Enterprise. He conducts
    ritual oral histories, defends his people's dignity in negotiations, and organizes
    daily life (even running a makeshift poteen still). Boisterous and outspoken,
    he serves as the primary intermediary with Starfleet officers, balancing pride
    and protectiveness with pragmatic willingness to accept uncomfortable remedies
    offered for his colony's survival.
