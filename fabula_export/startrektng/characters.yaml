- fabula_uuid: ger_agent_bfe62704a608
  global_id: ger_agent_bfe62704a608
  canonical_name: Erik Pressman
  title_role: Admiral
  description: Erik Pressman is a Starfleet officer whose career spans commanding
    roles from the USS *Pegasus* (as captain) to high-ranking admiralty positions.
    Known for his **paternal yet authoritative leadership**, he forges deep personal
    bonds with subordinates—most notably with William Riker, his former first officer—while
    navigating the ethical tensions of Starfleet’s experimental programs (e.g., cloaking
    technology). Pressman’s **pragmatic resolve** and **unwavering commitment to operational
    secrecy** often clash with broader Federation protocols, reflecting a **dual legacy
    of mentorship and moral ambiguity**. His career is defined by **high-stakes trials**,
    **loyalty-driven crises**, and a **mentor-mentee dynamic** that shapes Riker’s
    trajectory.
