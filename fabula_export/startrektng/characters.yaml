  canonical_name: Albert
  title_role: Lieutenant Commander
  description: Lieutenant Commander Albert holds rank in Starfleet as father to Cadet
    Joshua Albert. He confronts superiors with direct questions about his son's death,
    blending raw grief with demands for accountability. His exchanges with Wesley
    Crusher expose paternal pride in Joshua's admiration for the cadet, while vulnerability
    surfaces in abrupt emotional withdrawals. Albert nods silent acceptance during
    confessions that absolve his son, revealing dignity amid unrelenting sorrow. He
    embodies the clash between personal loss and Starfleet's rigid procedures.
