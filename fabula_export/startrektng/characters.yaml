  description: Jean-Luc Riker is the illusory adolescent son of William Riker, created
    within Barash's fabricated reality aboard the USS Enterprise-D. Named after Captain
    Jean-Luc Picard, he embodies a potential future where Riker has a son with Min
    Riker, serving as an aspiring stellar cartographer. This projection tests Riker's
    attachments to family and duty, highlighting emotional openness and technical
    curiosity. His presence underscores themes of imagined legacy and paternal duty,
    blending everyday rituals (e.g., trombone practice) with the emotional weight
    of a constructed future. The character appears in both the simulated reality of
    'Future Imperfect' and as a ten-year-old in the constructed future of the same
    episode, representing a narrative exploration of Riker's personal life and aspirations.
