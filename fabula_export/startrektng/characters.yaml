  canonical_name: Romulan Peace Envoy
  title_role: Peace Envoy
  description: Romulan diplomat appointed as peace envoy to advance reunification
    efforts with Vulcan, spearheaded by Spock. Represents Romulan leadership in outreach
    across the Neutral Zone, traveling under Vulcan escort to conduct high-stakes
