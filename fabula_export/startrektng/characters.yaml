- fabula_uuid: ger_agent_58876d92afc3
  global_id: ger_agent_58876d92afc3
  canonical_name: Duras's Lieutenant
  title_role: Romulan Guard
  description: Duras's lieutenant serves as a personal guard, aide, and tactical operative
    for Klingon High Council member Duras during high-stakes diplomatic missions aboard
    the USS Enterprise. He is entrusted with Duras's immediate security, monitoring
    secure communications, and alerting his superior to priority messages from the
    homeworld. Known for his vigilance, loyalty, and readiness, he also employs calculated
    provocations and feigned indignation—rooted in Klingon honor codes—to create diversions
    and facilitate Duras's strategic objectives. His actions often prioritize House
    Duras's ambitions over ship protocols, embodying the fierce devotion and strategic
    guile characteristic of Duras's warriors. He is distinguished by his sharp focus,
    tactical resourcefulness, and unwavering commitment to his leader's schemes, even
    in moments of crisis.
