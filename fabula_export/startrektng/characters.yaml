  canonical_name: Geordi's Com Voice
  title_role: Shipboard Communications Interface
  description: Geordi's Com Voice functions as the Enterprise's automated communications
    and notification interface tied into Lieutenant Commander Geordi La Forge's engineering
    and console subsystems. It issues terse acknowledgments, procedural status reports,
    and hard system warnings—thermal limits, power adjustments, and subsystem faults—acting
    as a neutral operational actor that shapes command choices during crises. In the
    current episode it answers Castillo's request with a concise "Aye, sir...," reaffirming
    its role as an immediate, rule-bound conduit between bridge officers and ship
    systems.
