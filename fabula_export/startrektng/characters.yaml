  title_role: Ensign
  description: Jenna D'Sora serves as an ensign and veteran security officer aboard
    the USS Enterprise-D. Of Mediterranean descent with a petite frame that masks
    her physical toughness, she displays puppy-dog friendliness and eagerness to please.
    She plays flute in the ship's woodwind quintet and pursues an experimental romance
    with Lt. Cmdr. Data, seeking emotional intimacy after patterns of unavailable
    partners like Jeff. Her vulnerability drives her quest for affection and connection,
    balanced by humor and gratitude in relationships.
