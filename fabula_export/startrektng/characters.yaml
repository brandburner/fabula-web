  title_role: null
  description: Jarth aids Ambassador Alkar in mediating peace between Seronia and
    Rekag. This heavy-set man in his mid-fifties reports conflict escalations, joins
    diplomatic talks, and stands loyally by Alkar through crises. He restrains threats
    during attacks, invokes security protocols against demands, and offers medical
    aid when Alkar falters. Defensive under personal accusations yet concerned for
    team and mission, Jarth embodies steadfast support amid delegation tensions and
    high-stakes negotiations.
