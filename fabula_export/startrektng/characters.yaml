  canonical_name: Microbial Lifeform
  title_role: null
  description: The Microbial Lifeform infiltrates Federation transporter systems,
    manifesting as a distorted, unsettling entity within energy matrices. It approaches
    crew members in semi-phased states, such as Reginald Barclay, halting inches from
    their faces to instill terror. Engineers Geordi La Forge and Miles O'Brien counter
    its disruptions to molecular patterns and bio-filters, while Beverly Crusher isolates
    its biological signatures. This predatory extraterrestrial threatens starship
    missions through invasive proximity and signal interference, driven by opaque
    instincts to exploit transporter vulnerabilities.
