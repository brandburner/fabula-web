  canonical_name: Meribor
  title_role: null
  description: Meribor serves as daughter to Kamin and Eline on Kataan. She matures
    from a joyful six-year-old into a mid-thirties family pillar amid planetary decay.
    She bonds closely with brother Batai, son Young Batai, grandson Kamie, and parents.
    Meribor mediates her father's denial of catastrophe, urges participation in key
    rituals like the probe launch, and voices optimism about life's richness despite
    doom. Her actions reveal steady compassion, resolve to cherish the present, and
    commitment to family unity and cultural memory.
