    to repair hull breaches, suppress fires, and isolate failing systems to preserve
    ship integrity. Drawn from enlisted specialists across the Enterprise‑D, they
    convert command directives into hands‑on fixes, emergency patches, and system
    isolations that keep critical sections functional amid battle. Trained to operate
    within Starfleet protocols and under direct bridge supervision, these teams perform
    the pragmatic, often unseen work that sustains vessel survivability—most recently
    being directed to deck fourteen to tackle concentrated battle damage during a
    high‑stakes engagement.
