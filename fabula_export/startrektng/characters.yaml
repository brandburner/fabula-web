  canonical_name: Thomas Riker
  title_role: Lieutenant
  description: Thomas Riker is a Starfleet lieutenant and transporter duplicate of
    Commander William T. Riker, created during a transporter malfunction on Nervala
    IV. He shares the original's appearance, memories, and skills up to their divergence
    point but develops distinct traits—resourcefulness, boldness, and independence—due
    to eight years of isolation. Thomas forges ties with Enterprise-D officers (including
    Data, Worf, Picard, La Forge, Crusher, and Troi) while asserting his separate
    identity through high-risk assignments and a drive to prove his individuality
    amid his replicated origins. His character is marked by resilience, introspection,
    and a determination to carve his own path in Starfleet.
