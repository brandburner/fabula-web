  canonical_name: Stellar Physicists
  title_role: null
  description: Stellar Physicists form a team of specialized researchers aboard the
    USS Enterprise-D. They analyze cosmic phenomena using advanced tools like thermal
    imaging arrays. Competitive disputes with fellow scientists, such as the planetary
    evolution team, mark their pursuit of scarce resources during crises. Geordi La
    Forge and Data mediate their conflicts, highlighting tensions within the science
    division. Data oversees their access to equipment, while Beverly Crusher's interruptions
    underscore broader shipboard pressures. Driven by empirical rigor, they advance
    Starfleet's grasp of stellar threats through direct competition and collaboration.
