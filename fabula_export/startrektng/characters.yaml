  canonical_name: Cyrano de Bergerac
  title_role: null
  description: Cyrano de Bergerac is the protagonist of Edmond Rostand's 1897 play.
    A Gascon cadet, peerless duelist, and gifted poet, he bears a massive nose that
    sharpens his wit and isolates him romantically. Cyrano loves Roxane deeply but
    woos her by writing love letters for the handsome Christian de Neuvillette. Fiercely
    honorable and independent, he defends his ideals with sword and verse, concealing
    his passion until his dying breath. His character fuses bravado, vulnerability,
    and intellectual fire.
