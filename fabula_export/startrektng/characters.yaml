  canonical_name: Romulan Footsoldiers
  title_role: null
  description: 'Romulan soldiers serve under field captains during away missions to
    archaeologically significant planetary sites. They carry disruptor rifles into
    multi-faction standoffs alongside Klingons and Cardassians, positioning for tactical
    advantage behind natural cover. Alert and obedient, they track multiple threats,
    raise weapons on command, and execute orders without hesitation. Their actions
    reflect Romulan military doctrine: rigid hierarchy, combat discipline, and readiness
    to escalate in pursuit of strategic objectives like ancient DNA samples. These
    soldiers operate as armed escorts for senior officers, maintaining absolute silence
    and projecting threat without provocation, functioning as both a visible deterrent
    and a disciplined security detail under direct Romulan captain command.'
