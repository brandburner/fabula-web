  canonical_name: Savar
  title_role: Starfleet Admiral
  description: Savar serves as a Vulcan Starfleet admiral who commands authority within
    Starfleet's upper echelon during a critical internal crisis. Exhibiting the trademark
    Vulcan calm and rationality, he leads arrival contacts with the USS Enterprise,
    extending invitations to Captain Picard and Commander Riker to a formal dinner
    under seemingly cordial yet subtly hostile circumstances. Savar participates in
    psychological warfare, bluntly accusing others of negligence and dismissing conspiracy
    concerns as paranoid delusions. However, his composed exterior shatters in the
    dining room where he reveals his true parasitic nature by consuming live worms
    and engaging in violent combat, ultimately being killed by Picard’s phaser fire.
    Throughout, Savar embodies the chilling betrayal embedded within Starfleet command,
    wielding menace masked by Vulcan stoicism and calculated duplicity.
