- fabula_uuid: ger_agent_6ab06208aed5
  global_id: ger_agent_6ab06208aed5
  canonical_name: Worf, son of Mogh
  title_role: Lieutenant
  description: Worf, son of Mogh, holds the position of chief of security and tactical
    officer aboard the USS Enterprise-D under Captain Jean-Luc Picard. This Klingon
    Starfleet officer mans the bridge's tactical console, leads security teams, and
    joins away missions. He coordinates with Commander Riker on operations, assists
    Lieutenant Commander La Forge in diagnostics, supports Doctor Crusher in investigations,
    and interacts with Chief O'Brien and Lieutenant Barclay during transporter crises.
    Stoic and evidence-driven, Worf balances Klingon warrior instincts with Starfleet
    discipline, expressing measured skepticism toward unproven claims while executing
    orders with precision. His lineage as the son of Mogh is a defining aspect of
    his identity and cultural heritage.
