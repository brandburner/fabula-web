  canonical_name: USS Enterprise-D Bridge Crew
  title_role: null
  description: Starfleet personnel aboard the USS Enterprise-D (NCC-1701-D), a Galaxy-class
    starship, execute bridge operations, ship functions, and away missions under the
    command of Captain Jean-Luc Picard. The crew includes senior officers such as
    Commander William Riker (First Officer), Lieutenant Commander Data (Second Officer),
    Lieutenant Commander Geordi La Forge (Chief Engineer), Lieutenant Worf (Tactical
    Officer), and Chief Miles O’Brien (Chief of Operations), as well as Counselor
    Deanna Troi, Doctor Beverly Crusher, and Guinan (Ten Forward). They maintain order
    during crises, respond to commands with precision, and prioritize vessel integrity
    while balancing exploration, diplomacy, and defense. Discipline, cohesion, and
    rapid response define their approach to high-stakes interstellar threats, reflecting
    Starfleet’s emphasis on duty, teamwork, and Federation principles. The crew is
    divided into bridge operations and away teams, with the bridge crew handling ship
    functions and the away team conducting external missions.
