  canonical_name: Chang
  title_role: TAC Officer
  description: Chang serves as the authoritative TAC Officer overseeing the rigorous
    Starfleet Academy entrance examinations on Relva 7. He controls the competitive
    environment with stern formality, setting high expectations that emphasize leadership,
    courage, integrity, and cultural adaptability beyond mere intellect. Chang delivers
    blunt briefings that crystallize the brutal challenge candidates face, personally
    intervenes to reveal unannounced tests of character, and evaluates candidates
    with an observant, approving gaze, notably praising Wesley Crusher’s cultural
    insight. Ultimately, Chang announces the final selection, recognizing Mordock’s
    narrow victory while acknowledging the virtue and sacrifice displayed by others.
    Throughout, he embodies the strict gatekeeper role ensuring Starfleet’s future
    officers meet demanding standards both in skill and character.
