  canonical_name: Kazago
  title_role: First Officer
  description: Kazago stands as the Ferengi First Officer deeply enmeshed in the unfolding
    power struggle aboard the Ferengi vessel. He emerges as a pragmatic, skeptical
    figure who rigorously scrutinizes Data and questions the Ferengi leadership's
    plans, especially opposing DaiMon Bok's extreme tactics. Kazago balances cautious
    diplomacy with undercurrents of hostility, granting reluctant permission for the
    Enterprise to claim the derelict Stargazer while reacting sharply to Riker's jests.
    His demeanor oscillates between defensive evasiveness and resolute assertion,
    especially as he reveals DaiMon Bok's confinement and subsequent removal from
    command, signaling a pivotal fracture in Ferengi command. Throughout the tense
    negotiations and psychological warfare surrounding Picard and the Stargazer, Kazago
    acts as a gatekeeper and reluctant interlocutor between Ferengi interests and
    Starfleet, embodying internal dissent and cultural friction within the Ferengi
    faction.
