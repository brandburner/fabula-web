  canonical_name: Bela Tyken
  title_role: Captain
  description: Bela Tyken commands a Melthusian starship and holds renown as the first
    captain to encounter Tyken’s Rift, a spatial anomaly that drains shipboard energy.
    He names the rift after himself and records precise logs detailing its properties
    and an escape via controlled explosion using anicium and yurium. Tyken's documentation
    and ingenuity offer vital precedent for crews trapped in similar rifts, marking
    him as a resourceful explorer whose actions shape interstellar anomaly response.
