  canonical_name: Brand
  title_role: Admiral
  description: Admiral Brand directs Starfleet Academy inquiries into cadet training
    accidents. She presides over hearings alongside Captain Satelk, questioning witnesses
    with precision and consulting PADDs for technical data. Brand coordinates with
    Captain Picard, approving Enterprise access to evidence while asserting institutional
    control. She extends measured sympathy to grieving families like Commander Albert's,
    yet prioritizes procedure, deflecting demands and demanding cadet transparency.
    Frustrated by inconsistencies and deceptions, she enforces accountability through
    reprimands, adjournments, and reopened probes, embodying Starfleet's commitment
    to truth amid pressure.
