  canonical_name: T'Jon
  title_role: Captain
  description: T'Jon commands the freighter Sanction, a vessel caught in a deadly
    orbit around the volatile Delos sun. Despite holding the formal title of Captain,
    he displays a detached, skeptical, and sometimes confused demeanor when communicating
    with the USS Enterprise crew. His ignorance of essential ship systems and inability
    to direct repairs reveal a crew in disarray. Throughout the crisis, T'Jon becomes
    frantic and panicked over the fate of the freighter's cargo, specifically a barrel
    containing Felicium, a critical and addictive medicine for his people from Ornara.
    His desperation escalates to a point where he takes Commander Riker hostage to
    secure the medicine for his planet, exposing his vulnerability and the dire stakes
    involved. T'Jon's emotional journey swings from calm detachment to anxious urgency,
    reflecting the pressure of leadership amid catastrophe and addiction. His aggressive
    defense of cargo ownership leads to physical altercations, highlighting deep cultural
    and personal conflicts. Ultimately, T'Jon embodies the desperate struggle to protect
    his people’s survival against overwhelming natural and political forces.
