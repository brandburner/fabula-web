  canonical_name: Malcorian Medical Staff
  title_role: null
  description: The Malcorian medical staff—comprising doctors, nurses, and support
    personnel—operate within the planetary medical facility under senior physicians
    such as Doctor Berel, Tava, and Nilrem. While primarily responsible for delivering
    patient care and administering medical treatments (including sedatives), their
    actions are deeply influenced by Malcorian society's cultural distrust of outsiders
    and rising xenophobia. Quick to fear unknown physiologies, they risk amplifying
    panic during crises, particularly when confronted with extraterrestrial patients
    (e.g., Riker). Their behavior oscillates between dutiful professionalism (e.g.,
    following lockdown protocols) and reactive mob-like violence (e.g., forming violent
    groups wielding improvised weapons against perceived threats). This duality reflects
    broader societal fractures during first contact, as their collective paranoia
    often overrides professional oaths, mirroring Malcorian society's instability.
