  canonical_name: Aquiel Uhnari
  title_role: Lieutenant
  description: Aquiel Uhnari stations at Relay Station 47 as a Starfleet lieutenant,
    handling communications near the Klingon border alongside Keith Rocha. A Hahlian,
    she maintains cultural ties through songs and rituals shared with her sister Shianna.
    Family trauma from her abusive father and mother's death fuels recurring nightmares
    and panic, which she confesses in private logs. Defiant and resourceful under
    pressure, she balances professional tensions with emotional vulnerability, forming
    intimate bonds marked by trust and dark humor. She also serves as a proactive
    Starfleet officer aboard the USS Enterprise-D, handling operational duties including
    beam-outs to relay stations critical to Federation communications, and intersecting
    with senior officers like Captain Picard, Commander Riker, Lieutenant Worf, and
    Dr. Crusher during threat assessments.
