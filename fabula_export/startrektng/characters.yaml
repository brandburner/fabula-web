  canonical_name: N.D. Security Guards
  title_role: Security Officer
  description: "\n      Pair of USS Enterprise-D security officers who serve dual\
    \ roles in both *away team operations* (planetary surface deployments under Lt.\
    \ Worf's command) and *starship security* (corridor patrols, high-risk area guarding).\
    \ They handle tactical perimeter setups on planetary surfaces, deploy confinement\
    \ beams, and enforce Starfleet protocols during forced relocations and rising\
    \ tensions with colonists. Simultaneously, they patrol starship corridors, guard\
    \ high-risk areas (e.g., transporter rooms), and provide rapid armed backup to\
    \ senior staff (Riker, Worf, Picard). Disciplined and obedient, they execute commands\
    \ with precision, whether containing intruders (e.g., Romulans) or supporting\
    \ command personnel during crises. Their professional demeanor and quick compliance\
    \ enforce Starfleet protocols in both starship and away mission contexts.\n  \
    \    "
