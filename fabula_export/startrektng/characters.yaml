  canonical_name: Julian Bashir
  title_role: Chief Medical Officer
  description: 'Julian Bashir serves as a Starfleet medical officer with dual roles:
    Chief Medical Officer aboard *Deep Space Nine* (DS9) and a medical officer aboard
    the *USS Enterprise-D*. Known for his relentless curiosity in exotic medicine
    and bio-cybernetics, he bends protocols for scientific breakthroughs while maintaining
    professionalism and safety standards. Bashir collaborates with senior staff across
    both ships, including Captain Picard, Geordi La Forge, and Noonian Soong, and
    plays a key role in inquiries tied to artificial life (e.g., Data) and frontier
    healing. His work spans both *The Next Generation* and *Deep Space Nine* timelines,
    balancing impulsive ambition with Starfleet’s ethical standards. Aliases reflect
    his formal title (''Doctor Bashir'') and informal address (''Bashir'').'
