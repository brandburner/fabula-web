- fabula_uuid: ger_agent_52876f7cb513
  global_id: ger_agent_52876f7cb513
  canonical_name: Mark Jameson
  title_role: Admiral
  description: Mark Jameson is a seasoned Starfleet Admiral commanding a critical
    hostage rescue mission on Mordan IV. Despite his advanced age and debilitating
    Iverson's Disease, which confines him to a physical support chair and later causes
    rapid physical deterioration due to a risky experimental rejuvenation therapy,
    Jameson exerts unwavering authority and strategic insight. He commands respect
    through his assertiveness, deep understanding of the intricate political and honor-bound
    tensions involving Governor Karnas, and a personal history laden with moral complexity
    and past violations of the Prime Directive. Throughout the mission, Jameson balances
    a fragile physical condition with an iron will, concealing vulnerabilities to
    maintain control and protect his wife Anne and the mission's success. His rapid
    de-aging and agonizing decline culminate in a poignant sacrifice to save hostages,
    underscoring his complex blend of ambition, determination, and tragic resolve.
  traits:
