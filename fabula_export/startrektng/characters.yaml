    tactical orders and explosions that conjure vivid reliving of a catastrophic starship
    battle. Orchestrated by the antagonist DaiMon Bok as a psychological weapon, these
    voices erode Picard's grip on reality, driving him toward mental collapse and
    threatening his command authority. Their presence acts as a spectral tormentor
    embodying trauma, manipulation, and the breakdown of identity within the crucible
    of war and betrayal. Included within this are specific manifestations such as
