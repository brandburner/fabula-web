  canonical_name: Selay Delegates
  title_role: Delegation
  description: The Selay Delegates arrive aboard the USS Enterprise as a hostile reptilian
    delegation, embodying deep-seated mistrust and enmity toward their traditional
    enemies, the Anticans. Led by Ssestar, they assert their demands with blunt suspicion
    and insist on strict separation from their rivals, forcing diplomatic tensions
    to the forefront. Their reptilian appearance and cold demeanor underscore their
    wariness and entrenched hostility, complicating the fragile Federation-led peace
    mission and foreshadowing intense political and interpersonal challenges aboard
    the starship.
