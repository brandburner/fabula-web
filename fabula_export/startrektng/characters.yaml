    severe consequences. When confronted by Captain Picard, he accepts responsibility
    with remorse and pledges to repair the shuttle as a form of atonement. Jake embodies
    youthful struggle under pressure, torn between failure, loyalty, and the hope
    for redemption within the disciplined Starfleet environment.
