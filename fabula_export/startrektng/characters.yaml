  canonical_name: Etana Jol
  title_role: null
  description: Etana Jol is a Ktarian agent specializing in psychological infiltration
    and subversion of Starfleet. She operates under the guise of a seductive, playful
    alien woman—often encountered on Risa—where she employs addictive neural stimulation
    games to seduce targets (e.g., William Riker) and implant control devices. Her
    dual nature blends mischievous allure with ruthless strategic calculation, enabling
    her to exert remote control over infected crews, including senior officers like
    Picard. Motivated by territorial expansion and dominance, her command style reveals
    suppressed fury when plans falter. Her methods combine physical seduction, technological
    manipulation, and psychological dominance to achieve Ktarian objectives.
