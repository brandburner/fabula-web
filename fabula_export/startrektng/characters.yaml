  canonical_name: Enterprise-D Away Team Security Guards (Four)
  title_role: Security Guards
  description: Four Starfleet security officers from the USS Enterprise-D form a tactical
    away team detail. They accompany senior officers like Riker and Worf to planetary
    surfaces during high-threat operations. Phasers drawn, they establish outward-facing
    defensive circles, secure perimeters against potential hostiles such as Borg,
    and hold position until scans confirm safety. Their coordinated vigilance and
    rapid deployment uphold Starfleet protocols for officer protection in hostile
    environments.
