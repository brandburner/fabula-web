    of tens of millions. Picard invokes him in temporal ethics debates as the ultimate
    cautionary figure—a tyrant who might emerge from a seemingly benevolent historical
    intervention, such as saving a single child. His legacy underscores the perilous
    butterfly effects of time travel, where minor changes risk unleashing catastrophic
    evil.
