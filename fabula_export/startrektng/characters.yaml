  canonical_name: Security Guards
  title_role: Security Guards
  description: Security Guards on the USS Enterprise-D handle immediate responses
    to onboard disturbances. They report to senior officers like Data and Counselor
    Troi, detaining erratic crew members such as Ensign Peeples and securing locations
    like Engineering and personal quarters. Disciplined and alert, they arrive promptly
    to calls, assess situations, and defer to de-escalation by specialists, maintaining
    order during psychological crises induced by anomalies like the Tyken's Rift.
