  canonical_name: Berlinghoff Rasmussen
  title_role: Professor
  description: Berlinghoff Rasmussen poses as a 26th-century historian to study Captain
    Picard but operates as a rogue 22nd-century inventor from New Jersey who stole
    a time pod for profit. He targets the USS Enterprise-D crew, using flattery, evasion,
    and condescension to distract Picard, Data, Riker, Worf, Geordi, and Beverly Crusher
    while stealing PADDs, tricorders, isolinear chips, and schematics. Greed drives
    his thefts and scheme to dissect Data; exposure leaves him stranded, desperate,
    and pleading.
