  description: USS Brattain operates as a Starfleet science vessel that encountered
    Tyken's Rift, a spatial anomaly blocking sensor scans and propulsion. Its crew
    experienced hallucinations and erratic behavior from REM sleep deprivation, resulting
    in total loss. The ship drifts powerless, its logs offering the sole record of
    the rift's dangers. Starfleet dispatches vessels like the Enterprise to investigate,
    towing attempts risk extending the anomaly to rescuers.
