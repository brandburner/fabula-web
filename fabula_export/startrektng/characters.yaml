    La Forge. His agony manifests in screams and a fixed, accusatory stare that pierces
    through pain, revealing raw vulnerability and unspoken intensity. Embodies the
    perils faced by engineering support staff, where routine tasks expose personnel
    to explosive hazards amid the demands of starship operations.
