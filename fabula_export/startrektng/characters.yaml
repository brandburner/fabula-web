- fabula_uuid: ger_agent_729db80d954f
  global_id: ger_agent_729db80d954f
  canonical_name: Korris
  title_role: Commander
  description: Korris emerges as a Klingon commander leading a faction of renegades
    aboard the Batris and later aboard the Enterprise. He asserts fierce authority
    and cultural pride, personally carrying wounded comrades and performing solemn
    Klingon death rituals. Korris challenges Starfleet officers, especially Worf,
    provoking a clash of loyalties and cultural identity. He reveals the betrayal
    and corruption behind the Klingon political situation motivating their rebellion.
    Despite moments of grim pragmatism, such as dismissing the dead as 'empty shells',
    Korris embodies a hardened warrior ethos, willing to escalate violence to pursue
    honor and glory. His volatile actions culminate in a hostage threat, weaponizing
    the Enterprise’s engineering, and a final fatal confrontation with Worf, underscoring
    the tragic fracturing of Klingon honor and alienation from Federation order.
