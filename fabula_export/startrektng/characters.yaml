  canonical_name: Connor Rossa
  title_role: null
  description: Connor Rossa, the biological father of Jeremiah Rossa (known among
    Talarians as Jono), is a Starfleet officer and son of Admiral Connaught Rossa.
    He dies in the Talarian raid on Galen Four while fighting as Federation ground
    forces to enable his family's escape. His final acts of fierce family loyalty
    and combat resolve anchor the human heritage that conflicts with his son's Talarian
    upbringing. Connaught later invokes his memory and physical likeness to reclaim
    Jeremiah from Talarian captivity, positioning him as the enduring symbol of Rossa
    heritage, duty, and lost potential.
