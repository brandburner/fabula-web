  canonical_name: Salia
  title_role: Head of State
  description: 'Salia emerges as a grieving orphan thrust into power: a wide‑eyed
    sixteen‑year‑old elevated to head‑of‑state status for Daled Four and expected
    to unite warring factions. She moves between curiosity and restraint—flirting
    openly with Wesley, yearning for freedom, yet bound by Anya’s rigid protection
    and political obligation. Raised off‑world on Klavdia Three, Salia carries both
    the hope of reconciliation and the weight of an imposed destiny. Her narrative
    arc pivots on defiance, intimate vulnerability, and a startling protean nature
    that both saves and complicates her fate, forcing the Enterprise crew to balance
    diplomatic protocol with personal attachment.'
