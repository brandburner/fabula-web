  title_role: null
  description: Sheliak are an uncompromising alien authority that enforces strict
    territorial and treaty terms without moral compromise. Acting as a legalistic
    external power, they assert absolute control over their planet and treat human
    settlement as a breach requiring removal by force. Their posture in the episode
    functions as a decisive, immovable constraint on colonial ambitions, forcing negotiators
    to weigh ethical persuasion against impending coercion. Interactions center on
    the Sheliak's refusal to accommodate humans and their readiness to apply force
    to uphold their mandates, reshaping local politics and catalyzing desperate diplomatic
    tactics.
