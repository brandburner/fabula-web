  canonical_name: Felix Leech
  title_role: null
  description: Felix Leech bursts into the Dixon Hill Holodeck simulation as a volatile,
    menacing figure whose confused, nasal voice clashes sharply with his sudden, aggressive
    actions. Initially perplexed and intrusive, Leech rapidly escalates into a violent
    antagonist, wielding a gun to threaten Picard and his crew in a desperate quest
    for a mysterious object. His paranoia and hostility intensify as he confronts
    the crew and their android companion Data, whose logical explanations only fan
    Leech's rage. Leech's erratic, fearful trembling during a brutal holodeck glitch
    reveals a fragile psyche under pressure, alternating between menace and panic.
    Ultimately, his lethal desperation culminates in a chilling ultimatum, holding
    Picard at knifepoint and threatening Beverly Crusher's life, embodying the raw
    danger and collapsing boundary between simulation and reality.
