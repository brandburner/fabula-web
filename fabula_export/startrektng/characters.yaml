  global_id: ger_agent_226bbde1db9a
  canonical_name: Sobi
  title_role: null
  description: Sobi stands as a composed and well-groomed Brekkian merchant deeply
    entrenched in the high-stakes dispute over the Felicium cargo—a rare and addictive
    medicine critical to two worlds. From the moment of rescue aboard the Enterprise,
    he maintains a cold, calculating demeanor, prioritizing economic ownership over
    humanitarian concerns. Sobi asserts strict Brekkian contractual rights, fiercely
    defending their monopoly and financial investment in the Felicium shipment. His
    bioelectric ability ignites a dangerous physical confrontation with the desperate
    Ornaran survivor T'Jon, revealing a volatile power dynamic that threatens to destabilize
    the fragile peace. Throughout tense negotiations, Sobi manipulates dialogue to
    reinforce Brekkian dominance while feigning civility and benevolence. He embodies
    the exploitative merchant archetype, whose actions complicate the Enterprise crew's
    ethical challenges amid a deadly plague and interspecies conflict.
