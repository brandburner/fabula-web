  canonical_name: Temarek
  title_role: null
  description: Temarek functions as a junior Gatherer operative who embodies the group's
    predatory, scavenger instincts and brittle social hierarchy. He takes part in
    coordinated ambushes against off-world salvage teams, answers to stronger local
    figures such as Brull, and follows group cues even when morally compromised. Temarek
    submits to public humiliation to preserve standing, then quickly converts death
    into material gain by claiming a corpse's possessions. His actions complicate
    diplomatic efforts and expose fissures between Gatherer ritual, opportunism, and
    the fragile negotiations pursued by the Enterprise delegation.
