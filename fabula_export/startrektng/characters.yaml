    transporter room. He handles emergency beam-outs and coordinates rescues under
    direct orders from acting captain Beverly Crusher. Technical skill lets him adjust
    lock times during crises, pushing transporter limits to save stranded teams. He
    reports counts and timelines precisely, maintains steady focus amid Borg threats
    and crew losses, and builds trust through clear responses with bridge officers
    like Barnaby and Taitt. Competence and composure define his support for high-stakes
    extractions.
