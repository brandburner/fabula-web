  global_id: ger_agent_e42e3b839828
  canonical_name: Willie Potts
  title_role: null
  description: Willie Potts is the younger brother of Jake Potts, a civilian child
    aboard the USS Enterprise-D. During shore leave on Ogus II, he ingests cove palm
    fruit after fleeing a prank, contracting a parasitic infection that requires quarantine
    in Sickbay under Dr. Beverly Crusher's care. He endures physical weakness and
    faces death, channeling fear into anger toward Jake and resentment at his plight.
    His motivations center on survival and processing betrayal by family, revealing
    vulnerability beneath outbursts.
