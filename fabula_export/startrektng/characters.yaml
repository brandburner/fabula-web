    of Gonal Four, revealing analytical focus. With peers Marissa and Patterson, he
    faces crisis trapped in a turbolift, shifting from fatalistic despair to responsible
    action as Picard's appointed science officer. His adult-like demeanor and quick
    adaptation mark him as thoughtful and resilient.
