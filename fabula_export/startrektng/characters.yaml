  global_id: ger_agent_eb3fa03c416c
  canonical_name: Mitena Haro
  title_role: Cadet
  description: Mitena Haro poses as a Bolian Starfleet cadet captured with Picard,
    Esoqq, and Tholl in an alien psychological experiment. She starts anxious and
    deferential to Picard, nervously introducing herself from Bolarus Nine, defending
    Federation values against Tholl's attacks, and gasping in shock at Esoqq's violent
    admissions and cannibalism threats. She seeks Picard's guidance, assists in examining
    and sabotaging circuitry to open the holding bay door, warns of electrical risks,
    and strains to force it despite frustration at the solid wall revelation. Her
    loyalty wavers into suspicion of Picard under group paranoia, but she complies
    with escape efforts. Ultimately, she transforms into three alien entities, exposing
    her role as one of the captors.
