- fabula_uuid: ger_agent_d312f1e03082
  global_id: ger_agent_d312f1e03082
  canonical_name: 73 Bersallis III Colonists (Including Six Evacuees)
  title_role: null
  description: The 73 Bersallis III Colonists comprise a human civilian settlement
    on the storm-ravaged planet Bersallis III, including a subgroup of six evacuees
    rescued via Starfleet transporters aboard the USS Enterprise-D. Stranded amid
    encroaching firestorms, the colonists rely entirely on Enterprise-D rescue operations
    for survival. Their precarious position forces command decisions that balance
    evacuation priorities against on-site scientific risks, embodying the human cost
    of colonial expansion into hostile environments. The six evacuees, while a specific
    subset, represent the broader group's vulnerability and communal bond forged in
    isolation. Key ties link the colonists to Captain Picard, whose choices determine
    their fate, and Nella Daren's deflector team, whose efforts shield the broader
    rescue.
