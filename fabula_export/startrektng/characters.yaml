  canonical_name: Wolfgang Amadeus Mozart
  title_role: null
  description: Wolfgang Amadeus Mozart stands as the 18th-century composer whose music
    functions as a recurring cultural touchstone within the series. Crewmembers and
    ship environments employ his works to supply refinement, emotional counterpoint,
    and a sense of human tradition; in the captain’s dining room his sound blankets
    formal ritual and heightens the contrast between decorum and cultural friction.
    Mozart operates primarily as audible authority and atmospheric presence, anchoring
    scenes in shared cultural memory rather than acting as an on-screen protagonist.
