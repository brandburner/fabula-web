- fabula_uuid: ger_agent_bcb01152d93f
  global_id: ger_agent_bcb01152d93f
  canonical_name: Telaka
  title_role: Captain
  description: 'Captain Telaka appears only in death—a withered, skeletal corpse sprawled
    across his desk, still clutching a communicator when discovered by Worf, Data,
    and Riker. His biologically aged remains provide the Enterprise crew with their
    first visceral evidence of the temporal contagion''s horrifying effects: a Starfleet
    officer in his prime reduced to a centuries-old husk in moments. The gruesome
    contrast between his youthful appointment and rapid decay catalyzes the crew''s
    shift from investigation to crisis response. Though his career and personality
    remain undefined, the extremity of his fate marks him as a symbol of the unseen
    threat''s lethality.'
