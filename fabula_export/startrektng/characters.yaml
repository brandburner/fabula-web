    invoked under interstellar treaty law. Their verdicts carry binding procedural
    force; bureaucratic invocation of their name freezes contested clauses and buys
    legally mandated pauses in hostilities. In the current episode, Picard exploits
    that institutional authority by naming the Grizzelas to stall the Sheliak, and
    the Grizzelas’ hibernation status explains their temporary unavailability. The
