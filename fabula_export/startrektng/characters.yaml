  title_role: Crew
  description: The crew of Baran's mercenary vessel, responsible for navigation, weapons,
    and systems operations. They operate under shifting captains (Baran and later
    Picard) and prioritize ship function, payment, and profit over personal loyalty.
    The crew includes both the bridge team (specialized in command operations) and
    general crew (specialized in smuggling and combat). They react to crises with
    initial shock but comply with new orders to sustain operations, maintaining cohesion
    through pragmatic subordination and tactical discipline. Their actions include
    transporting stolen artifacts, countering Starfleet pursuits with heavy phaser
    barrages, and protecting illicit cargo through hostile space.
