  canonical_name: Mirasta Yorath
  title_role: Minister of Science
  description: Mirasta Yorath, Minister of Science on Malcor, is a passionate advocate
    for warp drive development and accelerated technological progress. Her idealism
    drives her to champion Federation first contact and humane treatment of captives,
    such as Commander Riker, while her political acumen allows her to navigate the
    tensions between Chancellor Durken’s diplomatic reforms and Security Minister
    Krola’s xenophobic stance. Yorath’s childhood fascination with space fuels her
    ambition for interstellar connection, though her pragmatism tempers her idealism,
    prioritizing measured progress and alliance stability over rash disclosures. She
    frequently debates Krola, favoring bold innovation over caution, and maintains
    principled relationships with Durken, Picard, and Berel amid Malcor’s political
    fractures.
