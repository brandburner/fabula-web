- fabula_uuid: ger_agent_dbde2e577309
  global_id: ger_agent_dbde2e577309
  canonical_name: Avel Durken
  title_role: Chancellor
  description: Avel Durken serves as Chancellor of Malcor III, guiding his planet
    through technological leaps and first-contact tensions with the Federation. Thoughtful,
    brilliant, and pragmatic, he balances Mirasta Yale's scientific drive with Minister
    Krola’s security warnings, prioritizing political stability amid public unrest.
    His reformist vision favors cautious progress, as seen in private dealings with
    Captain Picard, where he probes Federation intentions while weighing internal
    stability against interstellar ties. Gentle yet authoritative, Durken forges pragmatic
    decisions that reconcile idealism and realism, navigating ideological rifts within
    his cabinet. Introspective, he contrasts leadership burdens with family routines,
    favoring gradual societal preparation over rushed integration to protect his people.
