  description: Lieutenant Keith Rocha stations at Relay Station 47 near the Klingon
    border, overseeing operations alongside subordinate Aquiel Uhnari. His irritable,
    egomaniacal, and authoritarian command style sparks constant friction with her
    defiance of his orders, as documented in her logs and personnel files. Rocha's
    rude, arrogant, and condescending demeanor—described as abrasive and volatile—drives
    tensions that erupt into violence, marking him as a rigid officer whose personal
    flaws undermine remote Starfleet duties. His conduct influences station dynamics
    and draws scrutiny from Enterprise officers like Geordi La Forge and William Riker,
    positioning him as a foil to collaborative ideals in isolated assignments.
