    Clutching at their clothes and uttering pitiable appeals ('A few coppers, mate...'),
    he represents one of many programmatic obstacles now weaponized against the Enterprise
    officers. Data briskly moves him aside, showcasing both the predicament's urgency
    and his own unemotional pragmatism.
