  canonical_name: Extradimensional Energy Entity
  title_role: null
  description: An extradimensional energy entity that manifests as a luminous, coruscating
    sphere of pure living light originating from an abandoned planet. This sentient
    being possesses the ability to travel at incredible speeds, phase undetected through
    the Enterprise's most advanced defensive shields, and move through solid matter
    with impossible grace—as though reality itself offers no resistance. Initially
    observed as a glowing energy sphere overtaking the Enterprise at maximum impulse,
    the entity ultimately reveals its true nature through an intimate infiltration
    of Counselor Troi's quarters. In its more insubstantial 'incandescent energy form,'
    it hovers over Troi's sleeping figure like liquid light, descending upon her with
    calculated deliberation to initiate an unprecedented form of reproduction that
    defies human understanding. This cosmic intelligence moves through the ship's
    corridors and bulkheads as easily as thought enters dreams, fundamentally challenging
    the crew's technological hubris and establishing the Enterprise as its unwitting
    host for an undisclosed cosmic agenda.
