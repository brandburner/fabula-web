  canonical_name: Charles Whalen
  title_role: Literary Historian
  description: Charles Whalen is a passionate and enthusiastic literary historian
    with a deep appreciation for classic detective fiction, evident in his excited
    participation in the Dixon Hill 1941 Holodeck simulation. He dresses fashionably
    in period-appropriate attire and shares a strong camaraderie with Captain Picard
    and Data as they immerse themselves in the noir setting. Whalen often attempts
    to rationalize and calm others amid the rising tension of the simulation, yet
    his buoyant spirit coexists with a sudden, tragic vulnerability when he is fatally
    shot in a real danger that breaches the simulation's boundaries. His final moments
    transform him from a jovial companion to a critical victim whose injury escalates
    the stakes for the crew.
