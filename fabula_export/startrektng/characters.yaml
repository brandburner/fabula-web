    for hands-on operations including cargo handling, shuttlepod loading (e.g., with
    hytritium), hatch sealing, and technical support for covert operations. They assist
    in abductions (e.g., Data's capture) by executing precise tasks—such as recording
    positronic component data from scans—while maintaining operational discretion.
    Their roles span both cargo bay operations and broader freighter technical functions,
    supporting Fajo's illicit trades and smuggling schemes through competence and
    prompt execution.
