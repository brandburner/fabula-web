  canonical_name: Krayton Computer Voice
  title_role: null
  description: The Krayton Computer Voice serves as the primary automated interface
    for the Ferengi marauder *Krayton*, managing core ship functions including security
    protocols, transporter operations, and communications. During the abduction crisis
    involving William Riker, Lwaxana Troi, and Deanna Troi, it enforces strict access
    controls, denying Riker's repeated attempts to contact the *Enterprise* without
    Daimon Tog's authorization code. The system also facilitates transporter operations,
    materializing Lwaxana and Deanna naked in Dr. Farek's lab and later relocating
    Deanna. Characterized by its impersonal, protocol-bound, and unyielding nature,
    the computer upholds Ferengi operational integrity through terse denials and automated
    responses, interacting with both captives and crew alike. Its mechanical precision
    underscores the Ferengi reliance on automation to secure operations against Starfleet
    interference.
