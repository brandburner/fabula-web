  global_id: ger_agent_410fd7708d16
  canonical_name: Kurak
  title_role: Warp Field Specialist
  description: Kurak ranks among Qo'noS's top warp field specialists. She joins scientific
    panels aboard Federation starships to scrutinize experimental technologies, applying
    Klingon rigor to unproven claims. Fiercely skeptical of outsiders like Ferengi
    inventor Reyga, she demands ironclad proof and impartial tests. Her warrior heritage
    fuels blunt challenges, defensive outbursts, and physical confrontations when
    honor stands questioned. Volatile yet principled, Kurak prioritizes empirical
    validation over diplomacy, navigating tense collaborations with Vulcan theorists,
    human doctors, and Takaran physicists while upholding Klingon scientific pride.
