  global_id: ger_agent_b667fc96b53e
  canonical_name: Cyrus Redblock
  title_role: null
  description: Cyrus Redblock dominates the collapsing boundary between fiction and
    reality as the ruthless, imposing antagonist who leads a violent hostile takeover
    within the malfunctioning Holodeck's 1941 Dixon Hill simulation. Clad in a white
    Panama suit and carrying a clipped British accent, he enforces brutal control
    over his volatile henchmen, notably restraining the murderous Felix Leech to negotiate
    with Picard for a mysterious 'item.' His cold civility masks a calculating greed
    and strategic mind, intrigued by Data's android nature while maintaining deadly
    threats to Picard's crew. His fatal hubris propels him beyond the Holodeck into
    the real Enterprise, where delirious excitement morphs into horror as his body
    vaporizes, underscoring the lethal consequences of transgressing fictional limits.
