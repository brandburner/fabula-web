  canonical_name: Amanda Grayson
  title_role: Starfleet Intern
  description: Amanda Rogers (also known as Amanda Grayson) is an eighteen-year-old
    Starfleet Academy intern and academic prodigy with expertise in neurobiology,
    plasma dynamics, and eco-regeneration. Orphaned young and raised by adoptive human
    parents on Earth (one of whom was a Q entity in human form), she unknowingly carries
    Q Continuum heritage from her biological parents. Aboard the USS Enterprise-D
    under Dr. Beverly Crusher's mentorship, she forms bonds with senior officers including
    Captain Picard, Commander Riker, Lt. Commander La Forge, and Counselor Troi. Shy
    yet driven by boundless curiosity, she wrestles with career indecision, human
    desires for family and service, and the terror of her awakening godlike powers,
    forcing a choice between mortal limits and cosmic potential.
