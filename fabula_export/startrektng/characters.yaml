  canonical_name: Endorphin-Sensitive Organism
  title_role: null
  description: A microscopic, neurochemical-responsive lifeform that colonizes human
    hosts and modulates proliferation in direct proportion to the emotional chemistry
    their memories generate. Growth accelerates with patterns that release brain endorphins
    and decelerates when those signals change; certain memories therefore feed it
    while others repel it. Its behavior converts psychotherapeutic stimulation into
    a medical liability, forcing clinicians such as Pulaski and Troi to reprogram
    neural stimulation as an active countermeasure and tactical treatment variable.
