  global_id: ger_agent_7425d0ebf185
  canonical_name: Wind Dancer
  title_role: null
  description: Wind Dancer functions as the primary guardian of Shiralea VI, a holodeck-simulated
    colony of free spirits. It appears as a glowing, bouncing sphere with an alien
    face, greeting entrants who carry joyous hearts and blocking others. This entity
    enforces the colony's entry requirement of unbridled merriment, interacting through
    playful bounces or aggressive pops. Loyal to Shiralea VI's chaotic ethos, Wind
    Dancer embodies the barrier between rigid outsiders and the inner world of spontaneous
    delight, responding to threats with defensive force.
