  canonical_name: Mariposan Progenitors
  title_role: null
  description: 'Five survivors who founded the Mariposan colony after a ship hull
    breach three centuries earlier. Two women and three men pooled scientific skill
    to preserve the settlement through cloning, outlawing sexual reproduction and
    embedding a small, closed gene pool into Mariposa’s cultural and legal fabric.
    Their pragmatic turn to reproductive cloning solved immediate survival needs but
    seeded an intergenerational crisis: centuries of copy‑of‑a‑copy cloning produced
    replicative fading and a collapsing genetic legacy. Remembered as scientist‑survivors
    whose replication choices underlie the colony’s population and political dilemmas,
    their legacy now drives urgent requests for fresh DNA and difficult ethical decisions.'
