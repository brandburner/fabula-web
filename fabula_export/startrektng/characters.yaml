- fabula_uuid: agent_13c215fae5f4
  global_id: null
  canonical_name: Q
  title_role: null
  description: Q stands as an omnipotent member of the Q Continuum who targets Captain
    Jean-Luc Picard with relentless tests of character. He invades Picard's life through
    disguises, reality alterations, and psychological prods, especially around Picard's
