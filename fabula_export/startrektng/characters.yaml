  canonical_name: Duras Family
  title_role: Klingon High Councilor
  description: The Duras Family commands a powerful faction on the Klingon High Council,
    challenging chancellors like Gowron through military might and intrigue. Descended
    from traitor Ja'rod, they hide their dishonor—tied to the Khitomer conspiracy
    and Romulan collaboration—by framing rivals such as Mogh, Worf's father. They
    control much of the Klingon fleet, launch attacks with Birds-of-Prey, and prop
    up figureheads like Toral to seize leadership. Ruthless operators reject arbitration,
    wield violence and sabotage, and exploit succession crises to dominate the Empire.
