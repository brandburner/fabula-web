  title_role: null
  description: 'A composite presence of diplomats, guards, and bystanders assembled
    around the Gatherer summit table. They operate as collective witnesses whose frozen,
    stunned reactions register the moral weight of Riker’s revelation and the lethal
    choice that follows. Their simultaneous shock and motionless silence refract authority
    and vulnerability: the summit’s political choreography breaks, the human cost
    of vengeance becomes visible, and the attendees’ reaction converts private trauma
    into a public rupture that will echo through subsequent diplomatic fallout.'
