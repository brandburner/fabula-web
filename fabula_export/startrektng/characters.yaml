  canonical_name: Jeremy Aster
  title_role: null
  description: Jeremy Aster is a twelve-year-old orphaned shipboard civilian on the
    USS Enterprise. He is the bereaved son of Lieutenant Marla Aster (mother killed
    by an explosive; father deceased earlier) whose guarded, stoic behavior masks
    grief, anger, and vulnerability. He becomes the focus of adult care and cultural
    conflict when Lieutenant Worf attempts to claim him through a Klingon R'uustai
    bond and Counselor Deanna Troi warns against rushed emotional interventions. Technicians
    discover he is the intended target of a parasitic manifestation attempting abduction
    via the transporter, placing him in acute physical danger and anchoring the crew's
    protective and therapeutic response.
