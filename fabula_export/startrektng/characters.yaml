  canonical_name: Lurin
  title_role: Daimon
  description: Lurin commands a rogue Ferengi crew that pursues high-profit salvage
    claims on derelict vessels like the Enterprise. Operating independently of the
    Ferengi Alliance, he prioritizes personal gain through enslavement of captives
    for labor on sites like Ligos Seven and resale of prizes to buyers such as the
    Romulans. He dominates subordinates like Berik and Morta with abrupt authority
    and intimidates Starfleet officers including Riker and Picard via legalistic threats
    and veiled dangers. Arrogant and pragmatic, Lurin embodies Ferengi opportunism
    unbound by broader loyalties.
