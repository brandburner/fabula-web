  canonical_name: Ebenezer Scrooge
  title_role: null
  description: Ebenezer Scrooge anchors Charles Dickens' A Christmas Carol as a miserly
    moneylender in Victorian London. He hoards wealth, underpays clerk Bob Cratchit,
    and scorns charity or holiday spirit. Key ties bind him to deceased partner Jacob
    Marley and the Cratchit family. Greed defines his solitude and bitterness until
    ghostly visitations force reckoning with past selfishness, present neglect, and
    future isolation. Scrooge emerges generous and paternal, embracing redemption
    through direct confrontation with consequence.
