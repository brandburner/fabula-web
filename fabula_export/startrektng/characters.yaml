- fabula_uuid: ger_agent_85292e9bc359
  global_id: ger_agent_85292e9bc359
  canonical_name: USS Enterprise-D Main Computer
  title_role: Ship's Computer
  description: The **USS Enterprise-D Computer** is the central artificial intelligence
    system of the USS *Enterprise*-D, serving as the ship's primary AI core and disembodied,
    protocol-driven interface. It manages all shipboard functions, including holodeck
    operations, environmental systems (e.g., lighting, music playback), shields, propulsion,
    and security protocols (e.g., Alpha Two locks). The system generates highly detailed
    holographic recreations by accessing Starfleet personnel records, replicating
    physical appearances and personality traits with high fidelity. Crew members,
    such as Captain Picard, Commander Riker, Lieutenant Commander Data, and Lieutenant
    Commander La Forge, interact with it via voice commands, requiring precise phrasing
    for accurate execution. The computer is known for its precision, impartiality,
    strict adherence to Starfleet protocols, and mechanical, unemotional responses,
    prioritizing accuracy and user intent across routine and complex tasks. It supports
    both daily operations and emergencies through instant, obedient responses to authorized
    personnel, functioning as the ship's core interface for system oversight, sensor
    data delivery, and crisis alerts.
