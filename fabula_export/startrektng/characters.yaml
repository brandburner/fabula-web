  global_id: ger_agent_98f7d14c08d4
  canonical_name: Kushell
  title_role: Secretary of the Legation of Unity
  description: Kushell emerges as a formidable diplomat from Straleb, wielding his
    authority with aggressive determination during a high-stakes confrontation aboard
    the Enterprise. He demands the surrender of Captain Okona, accusing him of stealing
    the Jewel of Thesia—a national treasure—and leveraging familial betrayal into
    a matter of planetary honor. His interactions reveal deep personal investment
    beyond political duty, as his enraged demands unmask a father's protective fury
    intertwined with diplomatic posturing. Kushell's arc transforms from aggressive
    accuser to stunned participant when revelations about his son Benzan's secret
    relationship with Yanar force a dramatic shift in his stance, showcasing his capacity
    to adapt when faced with irrefutable emotional truths.
