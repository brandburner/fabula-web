  title_role: Captain
  description: Endar commands the Talarian warship Q'Maire. He adopted the human boy
    Jono—originally Jeremiah Rossa—after rescuing him from the Galen Four massacre,
    claiming him as a son under Talarian tradition. Endar raises Jono through harsh
    warrior rituals that build resilience but leave scars, which he defends as cultural
    necessities. Proud of his society's survivalist ethos, he confronts Federation
    officers like Picard with defiance, demanding Jono's return and threatening war
    when denied. His actions blend paternal affection with unyielding loyalty to Talarian
    customs and military honor.
