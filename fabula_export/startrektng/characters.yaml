- fabula_uuid: ger_agent_fc5d13b84d5f
  global_id: ger_agent_fc5d13b84d5f
  canonical_name: USS Enterprise-D Engineering Crew
  title_role: null
  description: |-
    The **USS Enterprise-D Engineering Crew** is the dedicated team responsible for maintaining the ship's propulsion, shields, and core systems under the direction of **Lt. Commander Geordi La Forge**. Comprising **unnamed personnel** and specialized technicians, they operate within the **Starship Engineering** sphere, playing a critical role in crisis response and ship-wide operations.

      During the **Borg assault** on the *Enterprise-D*, the Engineering Crew demonstrates **prompt, disciplined execution** of evacuation protocols. Following **Commander Riker’s orders** after hull breach warnings and decompression alarms, they rapidly abandon Engineering to avoid catastrophic decompression—an action that saves lives as the Borg target the ship’s core systems. Their coordinated departure highlights their **trained responsiveness** under existential threats, working in tandem with senior officers (including **Riker, Worf, Data, and Captain Picard**) to mitigate losses despite the Borg’s overwhelming tactical advantage.

      **Key Traits**: Dutiful, team-disciplined, urgent under pressure.
      **Narrative Role**: Represents the **operational backbone** of the *Enterprise-D*, embodying Starfleet’s reliance on specialized crews during high-stakes emergencies.
  traits: &id775
  - methodical
  - professional
  - prompt under pressure
  - unobtrusive
  - dutiful
  - efficient
  - team-disciplined
  - disciplined
  - responsive
  - coordinated
  aliases: &id776
