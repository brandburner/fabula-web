  canonical_name: Hagan
  title_role: Science Advisor
  description: Hagan holds the position of Science Advisor aboard the USS Brattain.
    As a Betazoid, his empathic abilities expose him acutely to psychic disturbances.
    He survives his crew's self-destructive frenzy amid the Tyken's Rift, emerging
    catatonic yet sporadically responsive to Counselor Troi's telepathic probes. His
    fragmented utterances—references to doubles, twins, and eyes in the dark—hint
    at trapped intelligence broadcasting distress. Plagued by unrelenting psychological
    trauma, Hagan embodies the rift's toll on telepathic minds, his condition alerting
    rescuers to the anomaly’s insidious threat.
