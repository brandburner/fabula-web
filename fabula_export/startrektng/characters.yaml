- fabula_uuid: ger_agent_7b1278f902b8
  global_id: ger_agent_7b1278f902b8
  canonical_name: Holo-Geordi La Forge
  title_role: Hologram
  description: Holo-Geordi La Forge functions as a holographic stand-in for the Enterprise's
    chief engineer in Reginald Barclay's holodeck programs. He asserts authority by
    ordering Barclay to duty, only to retreat in fear from threats and physical displays.
    Dressed as a musketeer, he duels Barclay with determination before defeat, later
    draws his sword to threaten real crew intruders alongside holographic allies,
    and expresses puzzlement at their non-violence. At Barclay's farewell, he offers
    warm reassurance, affirming perpetual welcome. These roles highlight Barclay's
    idealized yet vulnerable perception of La Forge as both enforcer and supportive
    comrade.
