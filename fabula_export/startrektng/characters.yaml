    arrives interference-filled and desperate, forcing Starfleet officers to weigh
    humanitarian duty against tactical risk. Setal''s broadcast functions as a catalyst:
    it transforms a neutral-zone sensor blip into a moral-diplomatic dilemma and draws
    immediate attention from Picard, Riker, Worf, and the ship''s command team. The
    voice remains ambiguous—genuine refugee or possible provocation—shaping subsequent
    command decisions.'
