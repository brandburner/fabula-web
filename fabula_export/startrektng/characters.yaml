  canonical_name: Lal
  title_role: null
  description: Lal is the emergent humanoid android Data assembles by transferring
    positronic neural structures from his own matrix. Presented as Data's child, she
    learns by close imitation—acquiring speech, motor coordination, social behaviors,
    and a nascent sense of identity—while remaining emotionally and technically dependent
    on Data. Lal's existence provokes a Starfleet custody and ethical dispute over
    synthetic personhood and autonomy. Her accelerating curiosity and dawning feelings
    expose fragility in her design, culminating in catastrophic neural failure and
    the reintegration of her programs into Data's matrix.
