- fabula_uuid: ger_agent_f2c5f532ddd2
  global_id: ger_agent_f2c5f532ddd2
  canonical_name: Deanna Troi
  title_role: Counselor
  description: Deanna Troi serves as the empathic counselor aboard the USS *Enterprise*-D
    under Captain Jean-Luc Picard. As a half-Betazoid, she possesses powerful empathic
    and telepathic abilities, enabling her to sense and interpret emotions with precision.
    Her role spans psychological support, strategic advice (particularly during interrogations
    and security crises), and maintaining professional boundaries amid speculation
    about her abilities. Troi collaborates closely with senior staff—including William
    T. Riker (her former lover), Worf, Data, Geordi La Forge, Beverly Crusher (her
    close friend), and Wesley Crusher—while navigating the tension between her intuitive
    gifts and Starfleet’s protocols. Known for her composure, discretion, and adaptability,
    she plays a pivotal role in fostering trust and resolving tensions aboard the
    *Enterprise*. As the daughter of Ambassador Lwaxana Troi, she balances familial
    obligations with her Starfleet duties, often mediating her mother's eccentricities
    while upholding Starfleet protocol. Reserved in personal matters, she prioritizes
    emotional clarity and support, helping others confront vulnerability and doubt
    through her therapeutic guidance and relational insight. Her strong bonds with
    the senior staff—particularly Riker, Data, and Crusher—are central to her character,
    though she maintains professionalism even amid personal history.
