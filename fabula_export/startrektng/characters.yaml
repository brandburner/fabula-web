  canonical_name: Mr. Homn
  title_role: Mister
  description: Mr. Homn is the silent, stoic valet and loyal attendant to Lwaxana
    Troi, embodying an imposing yet passive presence. He demonstrates remarkable physical
    strength and unwavering discretion while managing Mrs. Troi's belongings and accompanying
    her through various settings aboard the Enterprise. From silently carrying heavy
    luggage to acting as a steadfast sentinel at formal events—such as ringing a ceremonial
    bell after Mrs. Troi's bites—he reinforces his role as a devoted, watchful aide
    who balances Betazoid tradition with Starfleet protocol. His ghostly, deliberate
    movements and silent comportment underscore a cultural role deeply rooted in tradition
    and service, highlighting the dramatic tension between Betazoid customs and his
    loyalty to Mrs. Troi.
