    whose isolated work produced the M‑5 control system and precipitated a catastrophic
    failure that reshaped Starfleet''s approach to emergent intelligences. Remembered
    in later episodes as the cautionary precedent for solitary experimentation, Daystrom''s
    legacy functions as both a technical milestone and an ethical warning: brilliant
    innovation entangled with personal obsession, institutional neglect, and unforeseen
    social consequences. His shadow influences debates over custody, oversight, and
    the rights of created minds.'
