  global_id: ger_agent_70c83624ed89
  canonical_name: K'Temoc
  title_role: Captain
  description: 'K''Temoc commands the eighty‑year‑lost Klingon battlecruiser T''Ong
    and functions as an immediate antagonist whose actions force the Enterprise crew
    into a cultural and tactical crisis. Named in the ship''s library records and
    invoked by K''Ehleyr as a captain who would scuttle a disabled vessel rather than
    surrender, he appears on the T''Ong''s bridge during the intercept. He opens fire
    under claimed standing orders, challenges Worf''s authority, then recoils and
    yields when Worf leverages Klingon ritual authority and shame by appearing in
    full regalia. The yield averts bloodshed: K''Temoc orders shields lowered and
    accepts escort. His presence dramatizes Klingon honor‑driven doctrine, catalyzes
    Worf''s first decisive command moment, and resolves the confrontation through
    cultural leverage rather than force.'
