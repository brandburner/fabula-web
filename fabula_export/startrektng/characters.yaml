  canonical_name: Ro Laren
  title_role: Ensign
  description: Ensign Ro Laren is a Bajoran officer aboard the USS Enterprise-D, serving
    under Captain Picard and Commander Riker. She balances her Bajoran cultural independence,
    skepticism of adversaries, and deep-seated spirituality with Starfleet discipline.
    Ro handles technical operations, conn duties, and away team assignments, often
    partnering with Geordi La Forge on engineering assessments and collaborating with
    Worf, Data, and Chief Brossmer during missions. Known for her tactical instincts,
    persistence, and resilience, she voices doubts about high-risk orders but executes
    them competently, drawing strength from her personal beliefs while confronting
    vulnerability in crises. Her approach to command structures is defined by decisiveness
    amid uncertainty and isolation.
