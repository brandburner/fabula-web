  canonical_name: Jim Shimoda
  title_role: Assistant Chief Engineer
  description: Jim Shimoda serves as the Assistant Chief Engineer aboard the Enterprise,
    tasked with supporting Engineering operations during a critical crisis. Left alone
    in Engineering as the Chief Engineer MacDougal is summoned to the bridge, Shimoda
    wrestles with uncertainty and hesitation about his responsibilities. He shares
    a tense but cooperative interaction with Wesley Crusher, who steps in to assist
    and ultimately asserts control over Engineering systems. Throughout the episode,
    Shimoda oscillates between diligent technical focus and distracted play, assembling
    isolinear optical chips in a fragile attempt to restore engine power. His vulnerability
    emerges amid the chaos, especially when MacDougal forcefully breaches Engineering,
    scattering his careful work. Shimoda’s arc captures the fracturing command structure
    and growing internal crisis as the ship faces impending destruction.
