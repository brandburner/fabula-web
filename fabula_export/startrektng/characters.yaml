    tensions with diplomatic neutrality, sharing lighthearted banter and quiet support.
    Father to young Batai, he reveals knowledge of the probe meant to carry Kataan's
    memory forward, joining Eline and Meribor in solemn farewells. His warmth and
    steady concern bolster community bonds amid encroaching doom.
