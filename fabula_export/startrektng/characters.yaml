  canonical_name: Rana IV Entity
  title_role: null
  description: A singular, powerful intelligence left behind on Rana IV after a fraught
    encounter with the Enterprise crew. The entity possesses near-omnipotent capability
    yet exhibits a moral interior—remorse and conscience—that unsettles Starfleet
    judgment. Picard elects mercy over execution, consigning the being to isolation
    and forcing the crew to carry the ethical burden. The Rana IV Entity functions
    as an enigmatic moral actor whose presence reshapes the crew's decision-making
    and leaves unresolved questions about culpability, redemption, and the limits
    of Starfleet jurisdiction.
  traits:
