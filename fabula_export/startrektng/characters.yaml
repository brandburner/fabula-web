- fabula_uuid: ger_agent_3781fa16a55f
  global_id: ger_agent_3781fa16a55f
  canonical_name: Jean Hajar
  title_role: Cadet Second Class
  description: 'Jean Hajar (alias: Hajar) ranks as Cadet Second Class at Starfleet
    Academy, flying advanced maneuvers in Nova Squadron under Nicholas Locarno alongside
    Sito Jaxa and Wesley Crusher. Her character is defined by a tension between fierce
    loyalty to her squadron and a principled core that struggles with accountability.
    Initially silent about the illegal Kolvoord Starburst that killed Joshua Albert,
    she later shifts toward moral integrity, particularly under pressure. Her conflicted
    nature—marked by guilt, hesitation, and quiet affirmation—reveals a reserved but
    evolving sense of duty. Locarno highlights her reluctance to confess during Wesley''s
    interrogation, underscoring her investment in squadron solidarity, though her
    eventual prioritization of truth demonstrates her principled growth.'
  traits: &id323
  - loyal
  - compliant
  - reserved
  aliases: &id324
