    intelligent, non-physical entities. They seek contact with visiting spacecraft
    crews by mimicking humanoid forms drawn from targets' memories, such as lost relatives.
    This psychic interface overwhelms humanoid minds, causing fatal overloads, yet
    reveals the beings' deep isolation and grief. Starfleet officers like Geordi La
    Forge encounter their desperate outreach, which blends tragic longing with unintended
    lethality. Their existence hinges on subspace stability, vulnerable to altitude
    shifts during orbital maneuvers.
