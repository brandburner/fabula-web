  canonical_name: Guy of Gisbourne
  title_role: Sir
  description: Guy of Gisbourne, also known as Sir Guy, is a knight and enforcer loyal
    to the High Sheriff of Nottingham. He commands soldiers in relentless hunts through
    Sherwood Forest, leading charges on horseback and wielding a sword against outlaws
    like Robin Hood. His role centers on enforcing the Sheriff's authority through
    direct combat, relentless tracking, and aggressive pursuit into dense underbrush.
    Beyond his military duties, Guy pursues Maid Marian as a bride to advance his
    status, displays fierce protectiveness toward her, and collaborates with the Sheriff
    on traps and executions. Known for his arrogance, vengeful ambition, and grim
    humor, he is Nottingham's finest fighter and Robin Hood's chief antagonist among
    the Sheriff's forces.
