- fabula_uuid: ger_agent_868446276ca7
  global_id: ger_agent_868446276ca7
  canonical_name: Worf
  title_role: Lieutenant, Chief of Security / Tactical Officer
  description: Worf functions as the Enterprise's tactical and security officer who
    prioritizes crew protection, rapid response, and clear-cut tactical judgment.
    He initiates interventions from the bridge, volunteers for risky retrievals, and
    accompanies Data into alien derelicts where he uncovers preserved cryo-victims
    and deduces third-party tampering. Worf repeatedly urges a readiness posture—arguing
    Romulan culpability, calling for battle stations, and emphasizing the risk of
    being out-matched—while also providing visible security presence in Sickbay and
    escorting survivors. His actions shape both immediate rescue efforts and the ship’s
    strategic posture during the Neutral Zone crisis, aligning him closely with command
    and medical teams while foregrounding a warrior’s imperative to defend the crew.
