  canonical_name: Yareena
  title_role: First One
  description: Yareena serves as the fiercely loyal and passionate First One to Lutan,
    the Ligonian leader, embodying the intense cultural traditions of Ligonia. She
    appears as a radiant but emotionally volatile figure who not only reassures Starfleet
    representatives about Lieutenant Yar's treatment but also vehemently challenges
    Lutan’s authority and the external interference of the Enterprise crew. Yareena's
    mastery and lethal skill in ritual combat are starkly demonstrated as she trains
    and later engages Lieutenant Yar in a deadly duel governed by ancient Ligonian
    codes. Her possessive love for Lutan fuels her defiant and confrontational stance,
    culminating in a dramatic renunciation of her bond with Lutan and the crowning
    of a new First One, signaling a significant power shift within the Ligonian social
    hierarchy. Throughout, Yareena embodies the brutal fusion of honor, passion, and
    violence that defines her society's strict codes of loyalty and status.
