  global_id: ger_agent_fac2eadd554f
  canonical_name: Nibor
  title_role: null
  description: Nibor serves as a crewman aboard Daimon Tog's Ferengi vessel Krayton.
    In Ten Forward, he challenges William Riker to three-dimensional chess, loses
    twice, and blames background music for his defeats. He later guards the holding
    tank, monitors Riker, Deanna Troi, and Lwaxana Troi after their abduction, alerts
    Tog when they awaken, and ignores Riker's questions about the women's whereabouts.
    Riker exploits Nibor's ego in a rematch, feigning disinterest to provoke him into
    lowering the forcefield. Riker knocks Nibor unconscious, takes his phaser, and
    leaves him as an obstacle during the escape.
  traits: &id521
