- fabula_uuid: ger_agent_d92eb4a0bfe2
  global_id: ger_agent_d92eb4a0bfe2
  canonical_name: Edolord
  title_role: null
  description: Edolord appears as a godlike, powerful alien entity manifesting both
    as a tiny swirling light and an immense, glowing vessel. It exerts overwhelming
    authority, shaking the USS Enterprise physically and psychologically with a booming
    voice that demands the return of its 'child'. Edolord interrogates the crew with
    thunderous commands, engages in a dangerous information exchange with Data, and
