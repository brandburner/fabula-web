  canonical_name: Miles Edward O'Brien
  title_role: Chief Petty Officer, Transporter Chief
  description: Miles O'Brien serves as the senior chief petty officer and Transporter
    Chief aboard the USS Enterprise-D, overseeing transporter operations and handling
    critical engineering tasks. Known for his sharp technical skill, pragmatic problem-solving,
    and unflinching reliability, he directs beaming procedures with precision in both
    routine and emergency situations. A non-commissioned officer, he works directly
    under Commander Riker and Captain Picard, providing bridge command with steady,
    dependable updates. His professionalism and calm demeanor under pressure make
    him a cornerstone of the Enterprise crew, ensuring crew safety and mission continuity.
    Husband to botanist Keiko O'Brien, he balances Starfleet demands with family life,
    embodying a blend of Irish pragmatism and deep Starfleet experience.
