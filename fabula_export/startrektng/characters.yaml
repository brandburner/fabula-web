  canonical_name: Sir Guy's Enforcers
  title_role: null
  description: |-
    Sir Guy's Enforcers serve as his personal military force within the feudal hierarchy of Nottingham, operating as both his elite guard and disciplined enforcers. They function across two primary roles:
      1) **Field Operations**: Act as mobile enforcers, executing arrests, securing prisoners, and providing armed support to Sir Guy's authority. They operate in disciplined formations, overpowering targets efficiently and escorting captives without deviation.
      2) **Fortress Security**: Guard Sir Guy's medieval fortress and courtyard, chaining prisoners (e.g., Picard and Vash), dragging them to executions, and repelling attackers with physical force. Their aggressive combat tactics clash with rescuers, though they ultimately fall to coordinated opposition.

      Their loyalty is unwaveringly centered on Sir Guy, distinguishing them from rival outlaw bands. Traits include obedience, forcefulness, discipline, and aggression in combat scenarios. Their sphere of influence spans both feudal enforcement and fortress security, reflecting Sir Guy's dual need for mobile authority and static defense.
