  canonical_name: Sighing Voice
  title_role: null
  description: The Sighing Voice serves as the telepathic projection of a starship
    crew trapped in Tyken's Rift. This disembodied entity delivers fragmented distress
    signals through a throaty, raspy tone that taunts and lures empathic recipients
    like Deanna Troi. It targets Betazoid frequencies, exploiting REM sleep vulnerabilities
    to broadcast cryptic pleas amid the crew's psychological collapse. Driven by raw
    survival instinct, the voice masks desperation with foreboding menace, forging
    tenuous links to potential rescuers despite its incoherent delivery.
