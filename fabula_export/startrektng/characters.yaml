  canonical_name: Mercenary Vessel
  title_role: null
  description: Mercenary vessels operate as independent contractors in contested space,
    transporting high-risk cargoes for paying clients across neutral zones and borders.
    Crews maintain loose discipline, favoring quick profits and evasion over prolonged
    engagements. They exploit perceived weaknesses in superior forces but crumble
    under sudden, precise attacks. These ships navigate gray areas of interstellar
    law, serving extremists who evade official channels. Direct clashes with Starfleet
    vessels like the Enterprise expose their tactical limitations and drive crews
    into desperate maneuvers.
