    a master of subtle manipulation, deploying polished manners and sharp intellect
    to sway rivals and secure advantages in high society. His reputation endures as
    an archetype for tacticians who blend courtesy with cunning, often cited in drawing-room
    debates on diplomacy and deception. Loyalties center on personal ambition amid
    aristocratic intrigues, marking him as both admired and distrusted.
