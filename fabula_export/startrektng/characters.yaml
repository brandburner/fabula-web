  title_role: null
  description: 'John Bates is a programmed holodeck infantryman who appears as a supporting
    soldier in a Henry V staging. He voices fear, obedience, and the moral cost of
    battle, functioning as a pedagogical foil when Data rehearses leadership and empathy.
    Bates occupies theatrical space rather than operational command: his scripted
    resignation and candid admissions externalize the human toll of war and sharpen
    lessons about duty versus conscience. Writers employ Bates to surface emotional
    truth inside simulated history and to mirror the episode’s larger questions about
    command under uncertainty.'
