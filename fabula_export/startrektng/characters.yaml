    with disabling fire. Opportunistic and ruthless, they pursue strategic assets
    like genetic data through direct aggression rather than negotiation. Their activities
    span information brokerage and salvage disputes, often clashing with Starfleet
    over intel or salvage rights. Key relationships center on adversarial encounters
    with the USS Enterprise-D, highlighting their boldness in high-stakes interstellar
    ventures. They embody the quadrant-wide threats that test Federation resolve,
