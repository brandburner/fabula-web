  canonical_name: Mavik (Mavek)
  title_role: Attendant
  description: Mavik (also referred to as Mavek) works as an attendant in the Tilonian
    asylum, enforcing patient compliance through escorts, meal distribution, and psychological
    taunts. He coordinates with Doctor Syrus and hospital guards to manage resistant
    inmates like Riker, using deceptive charm to mask sadistic intent. Mavik derives
    pleasure from provoking violent reactions through fabricated horrors, then sedating
    targets to reassert control. His actions blend false hospitality with calculated
    manipulation, exploiting memory gaps and institutional dominance to sustain the
    asylum's fabricated realities. Dismissive of guards, he operates with unchecked
    authority in common areas, embodying the dual role of caregiver and enforcer while
    deriving pleasure from emotional control.
