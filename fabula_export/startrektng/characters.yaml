  title_role: Lieutenant
  description: Lieutenant Kwan serves as a Starfleet engineering officer aboard the
    USS Enterprise-D, working in nacelle control. His mixed Asian and Napean heritage
    grants partial empathic sensitivity from his mother. Kwan pursues a loving relationship
    with Ensign Calloway, expresses optimism about his projects and future plans in
    personal logs, and enjoys a promising career marked by stable psychological profile
    and positive crew interactions. Professional tension exists with Lieutenant Nara,
    yet colleagues view him as cheerful and well-adjusted.
