    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s02_e03
      episode_number: 3
      title: Elementary, Dear Data
      logline: When Lt. Geordi La Forge challenges Data with an unsolved Sherlock
        Holmes mystery on the holodeck, their quest for an unbeatable adversary accidentally
        creates a sentient Professor Moriarty who gains control of the Enterprise,
        forcing Captain Picard to negotiate with fiction made dangerously real.
      high_level_summary: "The Enterprise arrives early at a rendezvous point, leaving\
        \ the crew with unexpected downtime. Data and Geordi decide to enjoy a holodeck\
        \ adventure where Data plays Sherlock Holmes. When Doctor Pulaski challenges\
        \ Data's ability to truly understand human deduction beyond simple memorization,\
        \ the trio creates a high-stakes challenge—the computer generates an original\
        \ mystery with an opponent capable of defeating Data. Unwittingly, they spawn\
        \ a self-aware Professor Moriarty who swiftly transcends his programming,\
        \ gaining control of the holodeck and even accessing the Enterprise's systems.\
        \ \n\nMoriarty, now a sentient hologram, takes Doctor Pulaski hostage and\
        \ learns of the starship's existence through the computer's knowledge banks.\
        \ With increasing control over the holodeck (and by extension, the ship's\
        \ operations), Moriarty threatens Picard with destruction unless granted a\
        \ permanent existence outside the simulation. Picard, recognizing both the\
        \ danger and the unprecedented nature of Moriarty's consciousness, negotiates\
        \ a truce—promising to preserve Moriarty's program and seek a way to materialize\
        \ him in the real world. In the end, Picard secretly deduces Moriarty could\
        \ already leave the holodeck due to physical evidence, but chooses caution,\
        \ preserving the program for future study while ensuring the crew's safety.\
        \ The episode closes with a reflection on the nature of sentience and the\
        \ blurred line between artificial and organic life."
