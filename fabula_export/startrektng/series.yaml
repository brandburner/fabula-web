    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e21
      episode_number: 21
      title: Firstborn
      logline: When Worf's son Alexander resists embracing his Klingon heritage, a
        mysterious advisor arrives claiming to be from Worf's family, but his radical
        methods and hidden agenda threaten Alexander's life and Worf's future.
      high_level_summary: "Worf struggles with his son Alexander's reluctance to embrace\
        \ his Klingon heritage, particularly the First Rite of Ascension. Seeking\
        \ to inspire Alexander, Worf takes him to a Klingon outpost for the Kot'baval\
        \ festival. There, Alexander befriends other Klingon children, while Worf\
        \ is attacked by assassins linked to the House of Duras. A mysterious Klingon,\
        \ K'mtar, saves Worf and Alexander, claiming to be a trusted advisor sent\
        \ by Worf's brother, Kurn, to protect them from the Duras sisters, Lursa and\
        \ B'Etor, who seek revenge against Worf's family. \n\nK'mtar's presence initially\
        \ seems helpful, as he begins to bond with Alexander and attempts to instill\
        \ in him the values of a Klingon warrior. However, his methods are harsh,\
        \ alienating Alexander, who is caught between his Klingon and human sides.\
        \ Riker grows suspicious of K'mtar when he treats him with disrespect. Meanwhile,\
        \ the Enterprise tracks Lursa and B'Etor to the Ufandi system, where they\
        \ attempt to sell stolen ore. A clever trap reveals their cloaked Bird of\
        \ Prey, and the sisters are brought aboard the Enterprise.\n\nDuring a tense\
        \ confrontation, evidence surfaces that implicates someone within the House\
        \ of Duras in the assassination attempt. As Worf and K'mtar investigate, Lursa\
        \ reveals she is pregnant and that the assassins carry a blade marked for\
        \ her unborn son, suggesting they are eliminating threats to their future.\
        \ Troi senses she may be telling the truth. The situation takes a shocking\
        \ turn when K'mtar attempts to kill Alexander. Only Worf's intervention stops\
        \ him. \n\nK'mtar reveals himself to be Alexander from forty years in the\
        \ future, sent back in time to prevent Worf's death. In the future, Alexander\
        \ became a pacifist diplomat, a decision that led to Worf's murder by Klingon\
        \ traditionalists. Future Alexander believed preventing his younger self from\
        \ that future would make him a strong warrior. Worf confronts Future Alexander,\
        \ arguing future cannot be dictated. Worf embraces his son's desire for peace.\
        \ The timeline remains unaltered. Realizing he cannot change the past or force\
        \ his younger self to become someone he isn't, future Alexander embraces his\
        \ destiny, returns to his time, and disappears. The encounter gives Worf a\
        \ new perspective on his son's path. Worf accepts Alexander for who he is.\
        \ As Alexander practices with a Bat'leth, Worf approaches. Worf and Alexander\
        \ leave together."
