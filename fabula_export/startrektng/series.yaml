      episode_number: 6
      title: Loud as a Whisper
      logline: When the Enterprise transports a deaf mediator with a unique communication
        method to negotiate peace on a war-torn planet, his sudden loss of translating
        technology forces him to rediscover his true mediating power.
      high_level_summary: The USS Enterprise is sent on a diplomatic mission to transport
        the famed mediator Riva to negotiate peace between warring factions on Solais
        Five. Riva communicates through a chorus of three interpreters representing
        different facets of his personality, making him a uniquely effective mediator.
        During the mission, the device that allows Riva to communicate with his chorus
        fails, leaving him unable to speak or mediate. Riva is devastated, as his
        entire identity and effectiveness rely on this method of communication. Captain
        Picard and the crew attempt various solutions, including teaching Riva sign
        language and trying to repair the device, but Riva initially resists, feeling
        that without his chorus, he cannot effectively mediate. The situation becomes
        dire as the warring factions grow impatient, threatening to resume hostilities.
        Through Picard's encouragement, Riva ultimately realizes that he can turn
        his disadvantage into an advantage by teaching the warring factions sign language,
        thus integrating the learning process into the peace negotiations themselves.
        This innovative approach not only restores Riva's confidence but also fosters
        mutual understanding between the factions, setting the stage for lasting peace.
        The episode concludes with the Enterprise departing Solais Five, leaving Riva
        to his mission, and reflecting on themes of communication, resilience, and
        the value of embracing one's uniqueness.
