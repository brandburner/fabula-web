    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e12
      episode_number: 12
      title: The Pegasus
      logline: When Admiral Pressman arrives on the Enterprise seeking the lost starship
        Pegasus, Riker must confront his past and choose between loyalty to his former
        captain and upholding the Federation's treaty regarding cloaking technology.
      high_level_summary: "The Enterprise, under Captain Picard, is diverted from\
        \ a scientific survey to rendezvous with the starship Crazy Horse, where they\
        \ are to meet Admiral Pressman. Pressman informs Picard and Commander Riker\
        \ that Starfleet Intelligence has learned that a Romulan warbird has located\
        \ debris from the long-lost starship Pegasus, Pressman's former command, on\
        \ which Riker served as a young officer. The Pegasus was supposedly destroyed,\
        \ leading to a mission to locate and salvage or destroy the ship before the\
        \ Romulans can. As the Enterprise enters the Devolin system, they encounter\
        \ a Romulan warbird commanded by Commander Sirol, initiating a tense cat-and-mouse\
        \ game as both ships search for the Pegasus amidst a debris field. Pressman's\
        \ presence and the mission stir up unresolved issues for Riker, who seems\
        \ disturbed by something related to the Pegasus's fate. \n\nThe Enterprise\
        \ locates the Pegasus embedded within a large asteroid. Pressman insists on\
        \ a risky plan to enter the asteroid with the Enterprise to salvage the ship.\
        \ Aboard the Pegasus, Riker and Pressman find the ship fused with rock and\
        \ discover a Federation cloaking device, a violation of the Treaty of Algeron.\
        \ Pressman reveals that the Pegasus was testing the device when it was lost,\
        \ and he intends to retrieve it to continue the experiment, with the backing\
        \ of Starfleet Security. Riker confronts Pressman, revealing his growing unease\
        \ and his belief that the cloaking device research is unethical and a violation\
        \ of Federation principles. He refuses to help Pressman, leading to a tense\
        \ standoff. \n\nAs the Romulans seal the Enterprise inside the asteroid, Riker\
        \ reveals the existence of the cloaking device to Picard, despite Pressman's\
        \ orders. Picard is shocked and dismayed to learn of the existence of the\
        \ illegal technology, but with no other option to escape, he orders Data and\
        \ La Forge to adapt the device, with Riker's guidance, for the Enterprise.\
        \ The Enterprise successfully phases through the asteroid using the adapted\
        \ cloaking device. Upon exiting the asteroid, Picard confronts Pressman and\
        \ places him under arrest for violating the Treaty of Algeron. Riker submits\
        \ himself for arrest as well, acknowledging his past complicity and loyalty\
        \ to Pressman. In the final scene, Picard visits Riker in the brig and assures\
        \ Riker that his service and the correct decision to expose the truth ensure\
        \ continued trust, despite the mistakes he may have done in the past."
      dominant_tone: Tragic
      raw_credits_block: Written by Ronald D. Moore
      has_complete_credits: true
    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e13
      episode_number: 13
      title: Homeward
      logline: When Worf's estranged brother Nikolai violates the Prime Directive
        to save a doomed pre-warp civilization, Worf must reconcile his duty with
        his loyalty as the Enterprise attempts a desperate and ethically fraught rescue.
      high_level_summary: "The USS Enterprise, responding to a distress call, arrives\
        \ at Boraal Two, a planet experiencing rapid atmospheric decay. Worf discovers\
        \ his estranged brother, Nikolai Rozhenko, a cultural observer, has intervened\
        \ to save a group of Boraalans from certain death, violating the Prime Directive\
        \ by sheltering them in a hidden cavern with a deflector shield. \n\nWorf,\
        \ surgically altered to resemble a Boraalan, confronts Nikolai. Nikolai believes\
        \ the only solution is for the Enterprise to create an atmospheric shield,\
        \ an idea Picard firmly rejects. Instead, Picard orders Nikolai's research\
        \ logs preserved. Defying Picard's orders, Nikolai transports the Boraalans\
        \ to a Holodeck simulation of their home within the Enterprise. \n\nPicard,\
        \ upon learning of Nikolai's actions, is furious but realizes he has few options.\
        \ The crew searches for a suitable M-class planet to relocate the Boraalans.\
        \ They decide on Vacca Six, but the Holodeck simulation is becoming unstable.\
        \ Picard orders Worf to accompany Nikolai to the Holodeck to maintain order.\
        \ As they prepare the Boraalans for their \"journey\", Vorin, a Boraalan,\
        \ accidentally discovers the Holodeck's true nature. \n\nVorin escapes the\
        \ Holodeck and ends up in Ten Forward, terrified and confused, where Troi\
        \ and Riker attempt to help him. Beverly is unable to erase his memory, and\
        \ Picard speaks with him, offering him the choice to return or stay on the\
        \ Enterprise. Vorin, unable to reconcile the truth with his former reality,\
        \ chooses to take his own life. \n\nMeanwhile, the Holodeck simulation continues\
        \ to degrade. Worf and Nikolai argue about Nikolai's actions and his relationship\
        \ with Dobara, a Boraalan woman. As the simulation begins to visibly fail,\
        \ Nikolai convinces the Boraalans that the storms have returned. Worf, following\
        \ Nikolai's lead, tells them he can end the storms if they take shelter. The\
        \ Enterprise crew transports the Boraalans and Nikolai to Vacca Six. \n\n\
        Picard reflects on the ethical complexities and the Prime Directive. Worf\
        \ confronts Nikolai about his choices. Nikolai asserts his love for Dobara,\
        \ who is carrying his child, and his commitment to building a life with the\
        \ Boraalans. Worf, seeing Nikolai’s resolve and happiness, accepts his brother’s\
        \ decision. Worf takes a Boraalan scroll depicting their journey, promising\
        \ to explain everything to their parents, highlighting Nikolai's happiness\
        \ as justification for his actions and absolution for his transgressions.\
        \ The Enterprise departs, leaving the Boraalans to their new home."
      dominant_tone: Tragic (with undercurrents of hope and moral ambiguity)
