    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e05
      episode_number: 5
      title: Remember Me
      logline: When Dr. Beverly Crusher's mentor vanishes and ship records deny his
        existence, she must prove her sanity as the crew disappears one by one, battling
        a collapsing alternate reality linked to her son's experiment and her deepest
        fears.
      high_level_summary: "Chief Medical Officer Beverly Crusher welcomes her mentor,\
        \ Dr. Dalen Quaice, aboard the Enterprise at Starbase 133. However, Quaice\
        \ mysteriously disappears, and the ship's computer has no record of him. Beverly's\
        \ concern grows when she discovers that other members of her medical staff\
        \ have also vanished, with all traces of their existence erased. The crew,\
        \ including Captain Picard, begins to doubt Beverly's sanity as ship records\
        \ now indicate a much smaller crew complement than she remembers. \n\nDesperate\
        \ to validate her perceptions, Beverly seeks answers. Wesley, her son, reveals\
        \ his warp field experiment which briefly created a flash of light and a unique\
        \ bubble of energy when Beverly was watching him work in Engineering. Beverly\
        \ begins to believe that Wesley's experiment may be responsible for altering\
        \ reality. As Beverly investigates, she experiences a terrifying vortex in\
        \ her office.\n\nPicard, acting on Beverly's insistence, orders the Enterprise\
        \ to return to Starbase 133 for a full diagnostic. However, even more of the\
        \ crew vanishes, including key personnel like Riker, Data, Troi and Worf,\
        \ and the ship seemingly travels without them. Beverly finds herself alone\
        \ with Picard but determines something measurable must be taking place. She\
        \ convinces Picard to allow her to use the ship's computer to monitor his\
        \ life functions, hoping to catch the moment he disappears. However, she is\
        \ cut off mid-sentence when he, too, is taken and all that remains is empty\
        \ space.\n\nBeverly realizes she must accept the likelihood of her own perceptions,\
        \ and she also recognizes that this warped reality first expressed itself\
        \ when she was near Wesley's experiment thinking of long-lost loved ones and\
        \ those who've passed. Facing the facts gives her the will to fight and she\
        \ recognizes that something has to be done to change the circumstances. \n\
        \nThe vortex reappears, and Beverly realizes she is now in a collapsing alternate\
        \ reality. The Traveler reappears through Wesley, and explains that she created\
        \ her own reality due to being caught in the strange static warp bubble that\
        \ Wesley created. He says that if Wesley can harness his innermost potential\
        \ and help create a gateway, she can walk back out. Beverly and Picard are,\
        \ as usual, at odds, with Picard questioning how much longer he will humor\
        \ her. Beverly, still alone on the bridge of the ship, determines Wesley used\
        \ his thoughts to alter warp fields and those thoughts became reality. Perhaps,\
        \ as a person now trapped in a warp field, her thoughts can change this universe,\
        \ too. Beverly dives deeper into herself to discover what she was thinking\
        \ when the bubble was first formed, and with her epiphany, she sees the path.\n\
        \nBeverly and the Traveler work to open a gateway between realities to help\
        \ her return; Beverly leaps through a vortex and finds herself back in the\
        \ real Enterprise. She embraces Wesley when she sees him. He and the Traveler,\
        \ acting together harmoniously, have set things right. Picard confirms all\
        \ one thousand fourteen members are onboard, including Dr. Quaice, much to\
        \ Beverly's relief. Balance is restored, order is preserved, and a sense of\
        \ equilibrium has settled back onto the starship Enterprise."
      dominant_tone: Haunting
