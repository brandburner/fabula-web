    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e20
      episode_number: 20
      title: Journey's End
      logline: Captain Picard faces a moral dilemma when Starfleet orders him to forcibly
        relocate Native American colonists from Dorvan Five to honor a treaty with
        the Cardassians, while Wesley Crusher questions his Starfleet path during
        a vision quest.
      high_level_summary: "The Enterprise arrives at Starbase Three One Zero, where\
        \ Wesley Crusher rejoins the crew for a break from Starfleet Academy. However,\
        \ his return is marked by distance and discontent. Simultaneously, Admiral\
        \ Necheyev briefs Captain Picard on a new treaty with the Cardassians, dictating\
        \ that the Federation must evacuate its colony on Dorvan Five, a group of\
        \ North American Indians, as the planet is now designated Cardassian territory.\
        \ Picard is morally conflicted, given the historical parallels to the forced\
        \ displacement of Native Americans. \n\nUpon arriving at Dorvan Five, Picard\
        \ and Troi meet with the Tribal Council, led by Anthwara, to discuss the relocation.\
        \ The tribal leaders express their deep spiritual connection to the planet\
        \ and their unwillingness to leave. Frustrated with Wesley's attitude, Beverly\
        \ confronts her son where he expresses a desire to no longer live up to other\
        \ peoples expectations and storms out. Meanwhile, Lakanta, one of the Indians,\
        \ tells Wesley that he foresaw his coming and that he will find answers on\
        \ Dorvan Five. Picard hosts a reception for colonist leaders on the Enterprise.\
        \ Wesley meets Lakanta, who speaks of a vision quest and spiritual guidance.\n\
        \nAs negotiations stall, Picard confides in Beverly about the gravity of the\
        \ situation and his concerns about using force,. Beverly speaks to Admiral\
        \ Brand and learns that Wesley's grades are falling and his attitude shifting.\
        \ Picard and Beverly discuss Wesley's unhappiness and Beverly suggests Picard\
        \ speak to Wesley which Picard declines, suggesting Wesley work this out for\
        \ himself. Wesley seeks guidance from Lakanta and undergoes a vision quest\
        \ in the Habak, a sacred chamber, where he encounters a vision of his deceased\
        \ father, Jack Crusher. His father tells him to stop trying to follow in his\
        \ footsteps and to find his own path.\n\nPicard informs the Tribal Council\
        \ that they must leave Dorvan Five. Anthwara reveals to Picard that his ancestor\
        \ was responsible for horrible acts committed against the Pueblo Indians and\
        \ that Picard must now clear the stain of his family's past. Tension escalates\
        \ when Gul Evek and Cardassian troops arrive on Dorvan Five, sparking conflict\
        \ with the Indians, who take them hostage. Wesley, witnessing Worf preparing\
        \ to forcibly remove the colonists, defies Starfleet orders and alerts the\
        \ villagers, causing a standoff.\n\nPicard confronts Wesley about his insubordination,\
        \ but Wesley resigns from Starfleet, disillusioned with the Academy. He admits\
        \ to Beverly that a vision had aided his decision, while Beverly confides\
        \ in Picard about her own concerns. Wesley returns to the village, seeking\
        \ to help the Indians. As tensions rise, a Cardassian trooper fires a disruptor,\
        \ igniting open conflict. The events create a dangerous powder keg as the\
        \ Enterprise crew can do little to deescalate the escalating turmoil. Wesley\
        \ soon after encounters Lakanta, who reveals himself to be the Traveller.\
        \ He invites Wesley to travel with him, as Wesley has evolved to a higher\
        \ level and is able to see a more true and full version of reality.\n\nUltimately,\
        \ Picard brokers an agreement where the Indians relinquish their Federation\
        \ citizenship for the right to stay on Dorvan Five, under Cardassian protection.\
        \ Gul Evek, reminded of the cost of war and his lost sons, agrees to the terms,\
        \ preventing further bloodshed. Wesley chooses to stay behind with the Indians\
        \ and embark on a new path under the guidance of the Traveller. The Enterprise\
        \ departs, leaving Wesley behind in pursuit of his destiny, guided by forces\
        \ beyond Starfleet."
      dominant_tone: Tragic (with undercurrents of hope in defiance and self-discovery)
