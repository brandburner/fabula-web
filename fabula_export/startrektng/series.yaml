    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e04
      episode_number: 4
      title: Silicon Avatar
      logline: When the Crystalline Entity destroys a colony, survivor Commander Riker
        and xenologist Dr. Marr, who lost her son in a previous attack, must decide
        whether to communicate with the entity or destroy it, as Marr's desire for
        revenge threatens the mission.
      high_level_summary: "On a seemingly idyllic colony world, Melona, Commander\
        \ Riker, Data, and Dr. Beverly Crusher oversee preparations for new infrastructure.\
        \ Their peaceful work is shattered by the sudden arrival of the Crystalline\
        \ Entity, a massive space-borne lifeform that consumes entire planets. Despite\
        \ Riker's attempt to lead the colonists to safety, many, including a woman\
        \ named Carmen with whom he shared a burgeoning connection, are consumed by\
        \ the Entity.\n\nThe Enterprise, commanded by Captain Picard, arrives to find\
        \ the colony devastated. They are joined by Dr. Kila Marr, a xenologist who\
        \ has dedicated her life to studying the Crystalline Entity after losing her\
        \ son on Omicron Theta, a planet previously destroyed by the Entity. Marr's\
        \ arrival complicates matters, as she harbors a deep-seated desire for revenge\
        \ and an open distrust of Data because the android Lore helped lead the Crystalline\
        \ Entity to Omicron Theta.\n\nAs the Enterprise tracks the Entity, tensions\
        \ rise between Marr and Data. Marr openly dismisses Data's contributions despite\
        \ his extensive knowledge, which includes information gleaned from the memories\
        \ of the colonists of Omicron Theta. Picard insists that they work together,\
        \ hoping to find a way to communicate with the Entity rather than destroy\
        \ it. Data, with his emotionless logic, attempts to bridge the gap with Dr.\
        \ Marr, even as she accuses him of being an accomplice to the Entity.\n\n\
        Through sustained investigation, Data uncovers a method of communication involving\
        \ graviton pulses. Marr, haunted by the death of her son and the screams of\
        \ the dying colonists, gradually warms to Data. She is even willing to accept\
        \ his help and knowledge, uncovering the existence of antiprotons with a unique\
        \ gamma radiation signature that it leaves behind as it travels through space.\
        \ During this time, Data shares memories of Marr's son with her, gleaned from\
        \ data of the colonists of Omicron Theta that were downloaded into his memory.\
        \ \n\nThe Enterprise intercepts a distress call from a transport ship, the\
        \ Kallisko, which is swiftly destroyed by the Entity, rekindling Marr's vengeful\
        \ feelings. Picard, however, remains steadfast in his belief that communication\
        \ is possible and preferable. When the Enterprise finally intercepts the Entity,\
        \ Data and Marr attempt to communicate with it using graviton pulses. The\
        \ Entity responds, showing signs of understanding.\n\nHowever, Marr, consumed\
        \ by her grief and thirst for revenge, sabotages the communication attempt.\
        \ She isolates the access code, prevents Data from stopping the transmission,\
        \ and overloads the Entity with a continuous graviton beam disrupting and\
        \ destabilizing its crystalline structure. The Crystalline Entity explodes,\
        \ destroying itself. Marr, now devoid of purpose, expresses relief to Data,\
        \ believing she has avenged her son.\n\nPicard, horrified by Marr's actions,\
        \ orders her confined to quarters; Data accompanies her. In her final moments,\
        \ Marr's grip on reality crumbles, requesting that Data speak to her in the\
        \ voice of her son, Renny, again. Data complies, but his rational and logical\
        \ response fails to offer her any comfort, leaving her lost in her grief and\
        \ madness."
      dominant_tone: Tragic with moments of quiet resolve
      raw_credits_block: |-
        STAR TREK: THE NEXT GENERATION
        Silicon Avatar

