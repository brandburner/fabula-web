    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e03
      episode_number: 3
      title: Interface
      logline: When the Enterprise responds to a distress call, Geordi La Forge uses
        an experimental interface to locate the stranded ship, only to confront the
        mystery surrounding his missing mother and a desperate alien entity.
      high_level_summary: "The USS Enterprise, led by Captain Picard, responds to\
        \ a distress signal from the science vessel Raman, trapped within a turbulent\
        \ gas giant's atmosphere. Geordi La Forge utilizes an experimental neural\
        \ interface to remotely pilot a probe and locate the crew. However, Geordi\
        \ is reeling from the recent disappearance of his mother, Captain Silva La\
        \ Forge, and her ship, the Hera. As Geordi interfaces with the probe, he experiences\
        \ vivid sensory input, making the virtual environment feel incredibly real.\
        \ During the search, he discovers the dead crew of the Raman, but also encounters\
        \ what appears to be his mother who urgently claims the Hera is also stranded\
        \ on the planet's surface and needs help.\n\nDriven by hope and grief, Geordi\
        \ becomes convinced his mother is alive, despite Data's skepticism and the\
        \ lack of evidence. He proposes a risky theory: that the Hera was pulled into\
        \ a subspace funnel created by experimental warp drive modifications. As Geordi\
        \ pushes the limits of the neural interface, he defies Picard's orders and\
        \ re-enters the probe against his better judgment. He locates his mother again,\
        \ and she urges him to bring the Raman, still remotely operated by the probe,\
        \ into the lower atmosphere to rescue her. Data reluctantly assists, fearing\
        \ for Geordi's life. \n\nAs Geordi descends further, the connection intensifies,\
        \ and he begins to lose the ability to distinguish reality from the interface.\
        \ He discovers the truth: the entity he perceives as his mother is an alien\
        \ lifeform native to the lower atmosphere desperate to return to its home.\
        \ The aliens had inadvertently killed the Raman crew while trying to communicate.\
        \ When Geordi resists taking the ship into the lower atmosphere, the alien\
        \ attacks him through the interface, causing a dangerous neural overload.\
        \ Picard orders Data and Beverly to disconnect Geordi, but he risks further\
        \ damage by disconnecting without a safe reduction of stimulation. Data realizes\
        \ they must trick Geordi's brain into thinking the simulation is complete\
        \ and stabilizes him.\n\nPicard confronts Geordi about endangering himself\
        \ and disobeying orders but expresses sympathy for his emotional turmoil.\
        \ Ultimately, Geordi accepts that his mother is likely lost. He acknowledges\
        \ that the interface experience, though a hallucination, gave him a sense\
        \ of closure. The Enterprise continues on its course to Starbase 495, leaving\
        \ behind the gas giant and the mysteries it holds."
      dominant_tone: Tragic
      raw_credits_block: Written by Joe Menosky
