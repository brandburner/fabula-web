    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e06
      episode_number: 6
      title: True Q
      logline: When a Starfleet intern, Amanda Rogers, discovers she possesses the
        powers of the Q Continuum, she must choose between a normal human life and
        embracing her destiny as an omnipotent being, a decision complicated by Q's
        manipulative influence.
      high_level_summary: "The USS Enterprise welcomes Amanda Rogers, a promising\
        \ Starfleet intern, but her arrival is soon followed by strange occurrences.\
        \ Amanda unknowingly causes objects to move and even prevents a falling tool\
        \ case from hitting Commander Riker. Counselor Troi tries to help Amanda adjust,\
        \ but Amanda struggles to understand her changing desires and abilities.\n\
        \nDuring an engineering crisis, Amanda instinctively prevents a warp core\
        \ breach from destroying the ship, revealing her latent powers to the crew.\
        \ Q appears, claiming Amanda is a Q and reveals her human parents were Q in\
        \ disguise. He intends to take her to the Q Continuum to train her as one\
        \ of them. Captain Picard is wary of Q's motives and insists Amanda has a\
        \ right to choose her own future. \n\nAs Amanda grapples with her newfound\
        \ identity, Q attempts to entice her with demonstrations of her powers, while\
        \ Picard urges her to consider the responsibilities that come with such abilities.\
        \ Amanda uses her powers to see what her deceased biological parents looked\
        \ like. Picard investigates and learns Amanda's parents may have been executed\
        \ by the Q Continuum for choosing to remain human. Q gives Amanda a choice:\
        \ join the Q Continuum or remain human but suppress her powers indefinitely,\
        \ a choice her parents struggled with.\n\nQ's lessons become manipulative;\
        \ Amanda's abilities grow stronger. Her infatuation with Riker leads her to\
        \ create a romantic fantasy against his will, showing her the emptiness of\
        \ forced affection. Tagra Four desperately needs the Enterprise's help. Amidst\
        \ a reactor crisis threatening the Tagran people, Amanda makes a choice, and\
        \ uses her near-limitless power to restore Tagra Four's ravaged ecosystem,\
        \ demonstrating her Q abilities. She acknowledges she is a Q and must learn\
        \ to use her powers. Despite her desire for a human life, Amanda chooses to\
        \ leave with Q, hoping someday she can visit her friends on the Enterprise,\
        \ leaving the crew to reflect on the extraordinary young woman and her impossible\
        \ choice."
      dominant_tone: Hopeful
