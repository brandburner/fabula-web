    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e02
      episode_number: 2
      title: Realm of Fear
      logline: When Lieutenant Barclay develops a paralyzing fear of the transporter,
        he inadvertently discovers a new lifeform living within the transporter beam
        itself, endangering the Enterprise and its crew sent to rescue a stranded
        science vessel.
      high_level_summary: "The USS Enterprise responds to a distress call from the\
        \ USS Yosemite, a science vessel lost near a dangerous plasma streamer. Initial\
        \ attempts to contact the Yosemite fail, and scans cannot penetrate the plasma\
        \ field. Riker suggests a shuttle, but Picard deems it too risky. Geordi offers\
        \ to use the transporter, but warns that beaming back might be impossible\
        \ due to interference.\n\nReginald Barclay, a systems engineer, proposes bridging\
        \ the Enterprise's transporter with the Yosemite's to cut through the ionic\
        \ field. Geordi agrees and selects Barclay for the away team comprised of\
        \ Riker, Dr. Crusher, and Worf. Barclay, who harbors a deep-seated fear of\
        \ transporters, tries to avoid going, but is forced to comply. During the\
        \ transport process, he grows increasingly panicked. Unable to contain his\
        \ fear, Barclay backs out at the last second, leaving Geordi and O'Brien surprised.\
        \ \n\nBarclay confesses his fear to Counselor Troi, revealing a lifelong terror\
        \ of dematerialization. She suggests relaxation techniques to desensitize\
        \ him. Barclay gains a burst of confidence and attempts to transport, this\
        \ time successfully beaming to the Yosemite. On the science ship, the team\
        \ discovers evidence of an explosion centered in the transporter room and\
        \ Lieutenant Kelly's body. Meanwhile, Admiral Hayes reports on the Ferengi\
        \ accusing Cardassians of attacking in the sector. Back on the Enterprise,\
        \ as Troi is assisting Barclay she recommends relaxation techniques that might\
        \ help, Reg declares he is ready to be transported. \n\nReturning to the Enterprise,\
        \ Barclay experiences a disturbing vision within the transporter beam: a moving\
        \ shape, an amorphous cloud of energy with a distorted mouth. He tries to\
        \ report this to Geordi, but is hesitant for fear of ridicule. Geordi, though\
        \ skeptical, agrees to run a transporter diagnostic. The diagnostic reveals\
        \ nothing, but O'Brien performs extra checks to reassure Barclay. Beverly\
        \ performs an autopsy on Lieutenant Kelly and becomes reanimated briefly.\
        \ Later, Barclay again sees the vision during transport. Concerned, Barclay\
        \ researches \"Transporter Psychosis\" and becomes convinced he has it, exhibiting\
        \ several symptoms. \n\nTroi relieves Barclay of duty due to his erratic behavior.\
        \ Desperate, Barclay seeks O'Brien's help in analyzing transport logs. Then,\
        \ Barclay persuades O'Brien to help him recreate the ionic fluctuations he\
        \ experienced during his transport in order to determine what might be causing\
        \ his visions. His experience then helps him find the senior staff. The crew\
        \ assembles and are dismissive of Barclay's claims. Picard orders a full investigation.\
        \ Beverly confirms residual ionization in Barclay's arm, the same as in Lieutenant\
        \ Kelly. Recreating the conditions from the Yosemite, the container explodes,\
        \ revealing glowing energy particles; Barclay collapses unconscious. \n\n\
        Data determines that quasi-energy microbes exist within the plasma streamer's\
        \ distortion field. Geordi deduces that the microbes caused the explosion\
        \ and that one or more are now in the transporter system, explaining Barclay's\
        \ visions. Beverly realizes these are also in Lieutenant Kelly's body. To\
        \ eliminate the microbes, they plan to suspend Barclay in mid-transport at\
        \ a point where matter loses molecular cohesion. Barclay confronts his ultimate\
        \ fear. Then, Barclay ends up grabbing the person who was lost to molecular\
        \ dispersement, and the people in the station at the time get saved and retrieved\
        \ from the plasma field.\n\nDuring the procedure, Barclay sees the life form\
        \ again and realizes they are other crewmembers trying the same technique.\
        \ He grabs one of the creatures as he rematerializes. This resolves the mystery\
        \ of the missing crew and the cause of all he has seen. The crewmembers go\
        \ back to their correct selves again. The biohazard is then safely handled."
      dominant_tone: Tense, introspective, and cautiously hopeful
