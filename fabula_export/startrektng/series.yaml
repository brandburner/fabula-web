    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e05
      episode_number: 5
      title: Disaster
      logline: When the Enterprise is crippled by a quantum filament, Counselor Troi
        must take command and make life-or-death decisions, while Picard, injured
        and trapped with three children, struggles to survive a turbolift plummet.
      high_level_summary: "The USS Enterprise, enjoying a period of respite, is suddenly\
        \ struck by a quantum filament, causing widespread damage and chaos. Captain\
        \ Picard, giving a tour to three young science fair winners, is trapped in\
        \ a turbolift when it plummets down the shaft. Injured and struggling, Picard\
        \ must protect the children, including a shy girl named Marissa, as they face\
        \ imminent danger and declining hope of rescue, and as he tries to inspire\
        \ them to work together to escape. At the same time, on the bridge, with most\
        \ of the senior officers incapacitated or dead, Counselor Troi finds herself\
        \ in command. Despite her lack of tactical experience and the doubts of Ensign\
        \ Ro, Troi must make critical decisions to save the ship and its crew. She\
        \ relies on the expertise of O'Brien to navigate the crisis. \n\nThroughout\
        \ the ship, other crew members face their own battles. Riker and Data venture\
        \ into the ship's Jeffries tubes to attempt to reach engineering and repair\
        \ the damage while dealing with coolant leaks and energy arcs. In cargo bay,\
        \ Geordi and Beverly discover a plasma fire that threatens to ignite a store\
        \ of volatile quaratum. They race to evacuate the bay despite the dangers\
        \ of radiation exposure and limited time.\nAs the situation deteriorates,\
        \ Troi is faced with the agonizing choice of separating the saucer section\
        \ to save the majority of the crew, potentially sacrificing those in the drive\
        \ section, including Riker and Data. Ensign Ro argues for the separation,\
        \ while O'Brien desperately hopes for a rescue. Troi, believing there are\
        \ still survivors in engineering, decides to divert power to their monitors,\
        \ giving them a chance to respond. \n\nMeanwhile, in Ten Forward, Keiko O'Brien\
        \ goes into labor, and Worf, with limited medical experience, is forced to\
        \ assist her. Despite his discomfort and lack of knowledge, Worf manages to\
        \ successfully deliver the baby. Riker and Data, having risked their lives,\
        \ finally reach engineering and, with Data's positronic brain functioning\
        \ as a makeshift computer, manage to stabilize the warp core and avert disaster.\
        \ Picard and the children find a way out of the turbolift and are rescued.\n\
        \nIn the aftermath, the Enterprise is en route to Starbase Sixty-seven for\
        \ repairs. The children, grateful to Picard for his courage and leadership,\
        \ present him with a commemorative plaque. Marissa, once shy and withdrawn,\
        \ has found her voice and confidence, and Worf finds connection. Troi who\
        \ had to wrestle leadership from Ro, reflects on the challenges of command,\
        \ realizing while she may be a great counselor, she finds peace as only a\
        \ first officer. The ship continues on its journey, the crew forever changed\
        \ by the disaster they faced."
      dominant_tone: Gritty yet redemptive
      raw_credits_block: |-
        STAR TREK: THE NEXT GENERATION
        Disaster

        Story by Phil Scorza & Ron Jarvis
