    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e22
      episode_number: 22
      title: Suspicions
      logline: When Dr. Crusher champions a Ferengi scientist's dangerous experiment
        to fly a shuttle into a star, the mission's fatal consequences and a suspicious
        death lead her to uncover a conspiracy and a surprising saboteur.
      high_level_summary: "Dr. Beverly Crusher, seeking a new area of research, attends\
        \ the Altine Consortium and becomes intrigued by Doctor Reyga, a Ferengi scientist\
        \ ostracized for his unorthodox metaphasic shield technology. Believing in\
        \ his potential, Beverly invites Reyga aboard the Enterprise, gathering scientists\
        \ from various cultures to evaluate his invention. Despite skepticism, Reyga\
        \ convinces Kurak (a Klingon), T'Pan (a Vulcan) and her human husband Doctor\
        \ Christopher, that his device can withstand a star's corona. Jo'Bril (a Takaran)\
        \ volunteers to pilot the modified shuttle into the Vaytan star's corona to\
        \ prove its viability. During the demonstration, elevated neutrino levels\
        \ suddenly appear in the cabin, causing Jo'Bril to lose consciousness. The\
        \ Enterprise crew can't beam him out of the craft until it exits the corona,\
        \ but he dies shortly after arriving in Sickbay.\n\nCrushed by the mission's\
        \ failure and Jo'Bril's death, Beverly becomes obsessed with uncovering what\
        \ went wrong. Her investigation leads her to discovers inconsistencies in\
        \ Jo'Bril's physiology, and she suspects foul play after Reyga dies in a plasma\
        \ surge. When Picard informs her that Reyga's family refuses an autopsy, Beverly\
        \ secretly performs one against orders, furthering her suspicions but finding\
        \ no immediate answers. Despite Picard's warnings, she questions the scientists\
        \ aboard, learning that Kurak and Reyga argued not long before his death.\
        \ \n\nBeverly eventually discovers the shield was deliberately sabotaged when\
        \ Data helps her understand that a tetryon field could disrupt the shield.\
        \ After enlisting Ogawa to help her access logs, she determines that Jo'Bril's\
        \ body shows traces of it. Defying Picard's direct order, Beverly launches\
        \ the shuttle modified with Reyga's shield into the sun's corona herself to\
        \ prove that the invention works. While inside the corona, Jo'Bril appears,\
        \ revealing that he faked his death. He claims his species can manipulate\
        \ their physiology to enter a state of 'physio-stasis'. Further, he admits\
        \ to sabotaging the initial flight (with him as pilot) so that only he would\
        \ pursue the technology to weaponize it.\n\nJo'Bril severs communications\
        \ with the Enterprise to make it appear that the shuttle was destroyed, but\
        \ Beverly subverts his plans, triggering a violent collision. During the chaos,\
        \ Beverly retrieves a phaser and vaporizes the Takaran after he reveals a\
        \ gaping hole in his chest (showing just how much his species' physiology\
        \ differs from most races). With the ship about to fail, she quickly reroutes\
        \ a course back to Enterprise, who had begun to search for wreckage. Back\
        \ on the Enterprise, Beverly is reinstated and reflects on the events that\
        \ transpired. As a thank you for Guinan's advice to become involved, Beverly\
        \ presents her with a state-of-the-art tennis racquet only to discover Guinan\
        \ has never played tennis. The Enterprise then travels to warp."
