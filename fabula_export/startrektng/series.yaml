    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e11
      episode_number: 11
      title: Parallels
      logline: Upon returning from a Bat'leth competition, Worf finds his memories
        and reality shifting, leading him on a quest to uncover a quantum anomaly
        that threatens to merge infinite parallel universes and rewrite his existence.
      high_level_summary: "Worf returns to the Enterprise from a Bat'leth competition,\
        \ but his homecoming is marred by disorientation and shifting realities. Initially\
        \ dismissed as concussion-induced memory loss by Dr. Crusher, Worf finds his\
        \ personal logs altered, his relationships changed, and key events unfolding\
        \ differently than he remembers. As Worf struggles to convince his crewmates\
        \ of his sanity, he and Data investigate the anomalies. Their search leads\
        \ them to uncover evidence of Cardassian involvement, a fact that is soon\
        \ erased, furthering Worf's confusion. With Troi's support, Worf eventually\
        \ convinces Data that something is amiss, and they discover a quantum fissure—a\
        \ fixed point across the space-time continuum that intersects many different\
        \ quantum realities. \n\nThe investigation takes a dark turn when Geordi,\
        \ who was present during key moments of Worf's shifting realities, suddenly\
        \ dies, intensifying concerns about what is happening to Worf's memories.\
        \ Data determines that Worf's quantum signature does not match that of their\
        \ universe. Data and Worf pinpoint the start of the shifts to his return trip,\
        \ and Wesley finds the Quantum Fissure in near proximity to the course he\
        \ took back to the Enterprise. The crew discovers that the VISOR intensified\
        \ the quantum flux and pushed Worf into another reality whenever Geordi was\
        \ near him.\n\nAs they prepare to find a way to restore Worf to his original\
        \ reality, the Enterprise encounters a Cardassian ship, then another shift\
        \ changes Worf's uniform and rank. Data finds a quantum flux in Worf's RNA\
        \ and then the team discusses the infinite number of realities. Data theorizes\
        \ that Worf was thrown into a state of quantum flux, and began to shift to\
        \ realities because his shuttlecraft touched a quantum fissure. A solution\
        \ is proposed: scan the fissure using a subspace differential pulse and use\
        \ the signature to get him back. \n\nDuring this, Worf and Troi's relationship\
        \ intensifies, but it is short lived. The Enterprise discovers that there\
        \ are million of quantum states within the fissure. It's determined that other\
        \ realities are merging with their own. Data believes that if Worf re-enters\
        \ the fissure, and emits a broad-spectrum warp field it may be enough to seal\
        \ the fissure and restore the realties. The Enterprises then send a general\
        \ hail asking for the ship with a particular quantum signature. They get a\
        \ hit from Picard on another Enterprise. As he prepares to re-enter the fissure\
        \ in his shuttlecraft, another Enterprise attacks to avoid returning to their\
        \ Borg dominated reality. The attacking Enterprise is destroyed, and Worf\
        \ finally enters the quantum fissure. Emerging back into his original reality,\
        \ Worf finds his relationships and Enterprise restored, but with a newfound\
        \ appreciation for his friends."
      dominant_tone: Tragic
