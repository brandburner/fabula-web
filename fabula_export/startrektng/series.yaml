    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e20
      episode_number: 20
      title: Cost of Living
      logline: When Lwaxana Troi's impending marriage to a man she's never met disrupts
        life on the Enterprise, a swarm of metal-eating parasites threatens to devour
        the ship, forcing the crew to fight for survival while confronting personal
        chaos.
      high_level_summary: "The Enterprise is en route to the Moselina system when\
        \ it destroys an asteroid to save Tessen Three. Unbeknownst to the crew, the\
        \ ship becomes infested with microscopic metal-eating parasites from the asteroid.\
        \ Meanwhile, Counselor Troi's mother, Lwaxana Troi, arrives on board to announce\
        \ her engagement to Campio, a Kostolain minister whom she has never met in\
        \ person, intending to hold the wedding on the Enterprise. Adding to the ship's\
        \ domestic unrest, Worf seeks Deanna's counsel on dealing with his unruly\
        \ son, Alexander, who chafes under his strict rules.\n\nLwaxana's disruptive\
        \ presence quickly affects everyone, especially Deanna, who is skeptical about\
        \ her mother's impulsive decision. Lwaxana, in turn, encourages Alexander\
        \ to embrace joy and freedom, undermining Worf's attempts to instill discipline.\
        \ As Lwaxana prepares for her wedding, Geordi and Data discover that the ship's\
        \ systems are malfunctioning due to the parasites consuming the nitrium alloy,\
        \ a crucial component in various systems. The malfunctions start with the\
        \ replicators and quickly spread to critical systems such as the inertial\
        \ dampers and life support. They trace the infestation back to the asteroid\
        \ destroyed earlier. \n\nAs the parasites multiply and consume vital systems,\
        \ the Enterprise loses speed and life support, endangering the crew. Picard\
        \ orders a course change to the Pelloris asteroid field, the parasites' natural\
        \ habitat, hoping to lure them away from the ship. Data devises a plan to\
        \ project a beam of concentrated nitrium to attract the parasites to a nearby\
        \ asteroid. Meanwhile, Lwaxana's wedding preparations proceed, and Campio\
        \ arrives, accompanied by his protocol master, Erko, who enforces strict and\
        \ alien customs. Lwaxana grows increasingly uncomfortable with Campio's rigidness.\n\
        \nWith time running out and the Enterprise teetering on the brink of collapse,\
        \ Data executes the plan, successfully drawing the parasites away. The crew\
        \ manages to restore the ship's systems, narrowly avoiding disaster. Lwaxana,\
        \ however, realizes the incompatibility between her free-spirited nature and\
        \ Campio's rigid adherence to protocol. At the wedding ceremony, Lwaxana appears\
        \ fully nude, shocking Campio and Erko, who promptly call off the wedding\
        \ and leave the ship. In the end, Lwaxana, Deanna, Worf, and Alexander find\
        \ themselves together in a mudbath on the holodeck, having all learned something\
        \ about living life, and mutual understanding."
      dominant_tone: Gritty yet introspective
