    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e09
      episode_number: 9
      title: Final Mission
      logline: When Picard and Wesley's shuttle crashes on a desolate moon after a
        mission to Pentarus Five is interrupted, they must overcome a deadly alien
        sentry, lack of resources and a treacherous companion while Riker races against
        time to save the Enterprise crew from a radiation leak.
      high_level_summary: "Captain Picard prepares for a mediation mission to Pentarus\
        \ Five, accompanied by Ensign Wesley Crusher, who has just been accepted into\
        \ Starfleet Academy. Their departure is interrupted by a distress call from\
        \ Gamelan Four, who are threatened by an unidentified spacecraft emitting\
        \ dangerous radiation. Picard sends Riker and the Enterprise to investigate,\
        \ while he and Wesley board a shuttle piloted by Captain Dirgo to continue\
        \ to Pentarus Five.\n\nEn route, the shuttle malfunctions and crashes on Lambda\
        \ Paz, a desolate moon of Pentarus Three. Stranded with limited supplies and\
        \ no communication, Picard, Wesley, and Dirgo salvage what they can from the\
        \ wreckage. They soon discover that Dirgo has been hoarding alcohol instead\
        \ of water, creating tension within the group. Picard, injured in the crash,\
        \ faces the challenge of leading them to safety. They set out across the desert\
        \ towards distant mountains, hoping to find shelter.\n\nMeanwhile, the Enterprise\
        \ discovers that the source of the radiation threatening Gamelan Four is an\
        \ ancient, unmanned waste vessel caught in the planet's orbit. Riker attempts\
        \ to move the vessel but faces escalating radiation levels that threaten the\
        \ Enterprise crew. As casualties mount, Riker makes the difficult decision\
        \ to tow the waste vessel through the Meltasion Asteroid Belt, risking further\
        \ damage to the ship and crew. \n\nBack on Lambda Paz, the trio finds a cave,\
        \ but Dirgo's recklessness unleashes a dangerous energy sentry guarding the\
        \ only water source, a subterranean fountain. Picard is severely injured during\
        \ the encounter. Wesley confronts Dirgo's selfishness and takes responsibility\
        \ for their survival. With Picard incapacitated, Wesley must face Dirgo's\
        \ opposition and the energy sentry alone.\n\nAs the Enterprise narrowly averts\
        \ disaster by ejecting the waste vessel into the sun, Wesley discovers a way\
        \ to manipulate the sentry's energy pattern using the tricorder. Dirgo, impatient\
        \ and desperate, attempts to bypass Wesley's plan, but is killed. Wesley manages\
        \ to neutralize the sentry, secure water, and keep Picard alive until the\
        \ Enterprise, having completed its mission, arrives to rescue them. Picard\
        \ is saved and acknowledges Wesley's courage and resourcefulness. Wesley prepares\
        \ to leave the Enterprise for Starfleet Academy, forever changed by his experiences.\
        \ The crew of the Enterprise reflects on the value of leadership, sacrifice\
        \ and Picard says his goodbyes to Wesley."
