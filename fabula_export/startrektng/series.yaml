    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e23
      episode_number: 23
      title: Rightful Heir
      logline: When Worf's faith is tested by the apparent return of Kahless, the
        Klingon messiah, the Enterprise crew must determine if he is genuine and prevent
        a catastrophic civil war within the Klingon Empire, with Worf caught between
        his beliefs and duty.
      high_level_summary: "The Enterprise is en route to the Gariman system when Worf's\
        \ unusual behavior raises concerns. Riker finds him in a ceremonial trance,\
        \ and Worf confesses to a spiritual crisis stemming from his efforts to teach\
        \ young Klingons about their heritage. His faith shaken, Worf takes leave\
        \ to Boreth, a sacred site where followers await Kahless's return. There,\
        \ Worf seeks a vision but remains unfulfilled until a figure claiming to be\
        \ Kahless materializes during a ritual. \n\nThe sudden return of Kahless creates\
        \ a sensation, with many Klingons believing in his authenticity. The Enterprise\
        \ is ordered to transport Kahless to the Klingon homeworld. Picard and his\
        \ crew, however, are skeptical of this sudden return. Gowron, the Klingon\
        \ leader, arrives on the Enterprise, suspecting a fraud. He intends to test\
        \ Kahless's identity with a blood sample from an ancient knife, said to be\
        \ stained with Kahless's blood. A genetic match is confirmed, further solidifying\
        \ belief in Kahless. Despite the evidence, Gowron remains suspicious and distrustful.\
        \ Worf initially embraces the return of Kahless, hoping for a spiritual revival,\
        \ but grows uneasy as the new Kahless demonstrates ignorance of key Klingon\
        \ traditions. \n\nGowron publicly challenges Kahless, resulting in a fight\
        \ which Kahless loses. This event triggers Worf to realize that this Kahless\
        \ is not who he claims to be. Confronting Koroth, Worf discovers the truth:\
        \ this Kahless is a clone, created by the Guardians of Kahless using genetic\
        \ material and implanted with memories from sacred texts. Despite being a\
        \ clone, Koroth argues that this Kahless can still unite the Klingon people\
        \ and end the corruption plaguing the Empire. Worf acknowledges that Kahless,\
        \ even as a clone, fulfills the need for a symbol of hope and unity. \n\n\
        Worf proposes placing Kahless as a spiritual figurehead, an Emperor without\
        \ political power, to guide the Klingon people morally. Gowron, recognizing\
        \ the potential for civil war, reluctantly agrees. Kahless accepts this role,\
        \ and the Klingon Empire averts disaster. In the end, Worf is left grappling\
        \ with his faith, but receives words of wisdom and comfort from Kahless before\
        \ his departure. The experience leaves Worf with a renewed understanding that\
        \ the message and teachings of Kahless are fundamentally more important than\
        \ the man himself."
      dominant_tone: Tragic
