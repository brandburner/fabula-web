    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e15
      episode_number: 15
      title: Lower Decks
      logline: Junior officers on the U.S.S. Enterprise grapple with career ambitions,
        interpersonal dynamics, and dangerous missions, as Ensign Sito Jaxa volunteers
        for a perilous undercover operation that tests her courage and challenges
        Picard's judgment.
      high_level_summary: "On the USS Enterprise, junior officers Sito Jaxa, Sam Lavelle,\
        \ Taurik, and Alyssa Ogawa navigate the complexities of their Starfleet careers,\
        \ friendships, and personal lives, all while serving on one of the Federation's\
        \ flagship vessels. The story opens with Riker and Troi conducting crew evaluations,\
        \ a process that causes anxiety for Lavelle who seeks promotion and a better\
        \ room. He and Sito are both up for the same position, creating tension between\
        \ them, but they support each other. Taurik frequently demonstrates his superior\
        \ intellect, straining his interactions with his peers and superiors, while\
        \ Ogawa deals with relationship issues, unsure if her boyfriend Andrew Powell\
        \ is losing interest. \n\nDuring a drill, Sito hesitates, Worf notices and\
        \ Riker expresses his lack of confidence in her tactical capabilities causing\
        \ her confidence to waver. Meanwhile, Lavelle is too eager to impress Riker\
        \ while being shadowed by the more skilled Sito. Later, the Enterprise is\
        \ dispatched to the Cardassian border to retrieve an escape pod, leading to\
        \ speculation and intrigue among the lower decks crew. Geordi and Taurik work\
        \ together in Engineering, where Taurik's innovative ideas challenge Geordi's\
        \ authority but ultimately improve warp-field efficiency. Ogawa confides in\
        \ Beverly about her relationship concerns, as she had a date cancelled and\
        \ has become doubtful of Andrews feelings for her.\n\nAs the mystery surrounding\
        \ the escape pod deepens, Sito is summoned by Picard, who harshly criticizes\
        \ her past actions at the Academy, leaving her shaken and questioning her\
        \ worthiness as an officer. Later, it is revealed the pod contains a Cardassian\
        \ defector, Joret Dal, with vital intelligence. Starfleet requests Ensign\
        \ Sito to risk her life in an undercover mission to get him home so he will\
        \ share invaluable intelligence about the Cardassian's strategic intentions.\
        \ Despite the inherent dangers and Picard's initial reservations, Sito volunteers\
        \ for the mission, agreeing to pose as Joret's prisoner to help him safely\
        \ cross the Cardassian border.\n\nDuring the operation, Sito and Joret are\
        \ successful at tricking the Cardassians along the border, but Sito is later\
        \ reported as killed in action aboard the escape pod when trying to return\
        \ to Federation space. The crew mourns her loss, with Lavelle struggling with\
        \ the guilt of potentially receiving the promotion Sito may have been in line\
        \ for. In the end, Lavelle receives the promotion and Worf joins Sito's friends\
        \ at their usual table in Ten Forward."
      dominant_tone: Tragic (with undercurrents of hope and moral complexity)
