    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e15
      episode_number: 15
      title: Tapestry
      logline: When Captain Picard dies from a Lenarian attack, Q grants him the chance
        to alter a youthful mistake, but Picard discovers that changing his past has
        dire consequences on the man he is today.
      high_level_summary: "Captain Picard dies after a surprise attack and finds himself\
        \ face to face with Q. Q explains that Picard is dead and offers him the chance\
        \ to go back and change a past regret, specifically his reckless youth that\
        \ led to him needing an artificial heart. Picard initially refuses to believe\
        \ it, but Q shows him a vision of his disapproving father. Intrigued, Picard\
        \ agrees and is sent back to his early days as an Ensign on Starbase Earhart,\
        \ two days before a fateful fight with Nausicaans. \n\nPicard finds himself\
        \ struggling to adapt to his younger body and the presence of his old friends,\
        \ Corey and Marta. He tries to avoid repeating his past mistakes, leading\
        \ to awkward encounters. He rebuffs the advances of a woman he was supposed\
        \ to meet, causing her to throw a drink in his face. Picard attempts to dissuade\
        \ Corey from seeking revenge against a cheating Nausicaan gambler, but his\
        \ newfound caution alienates his friend. He also confronts Marta, with whom\
        \ a romantic spark ignites, but their night together negatively alters their\
        \ friendship.\n\nThe next day, Picard's attempts to steer clear of his original\
        \ choices unravel: Corey, ignoring Picard’s advice, prepares to cheat the\
        \ Nausicaan at Dom-Jot. Picard resolves to stop him, further straining their\
        \ friendship. When the Nausicaan confronts them, Picard intervenes to prevent\
        \ Corey from starting a fight, but in doing so, destroys his friendships with\
        \ both Corey and Marta and forever changes their shared history.\n\nPicard\
        \ finds himself in an alternate timeline as a Lieutenant junior grade, an\
        \ assistant astrophysics officer aboard the Enterprise, under the command\
        \ of a different Captain. He lacks the respect and authority he once held.\
        \ Approaching Riker and Troi, he learns that his cautious nature has held\
        \ him back and his prospects for command are nonexistent. Realizing the profound\
        \ impact his changed past has had, Picard confronts Q, who explains that by\
        \ removing the youthful recklessness that led to his injury, he also erased\
        \ the experiences that shaped him into a great leader. Faced with the choice\
        \ between a safe but unfulfilling life and embracing his past, Picard asks\
        \ Q to restore his original timeline.\n\nPicard is thrust back to the moment\
        \ before the bar fight where he punches the Nausicaan, triggering the brawl\
        \ that leads to his stabbing. Back in sickbay, Picard embraces a joyful end,\
        \ knowing he is who he is because of the good and the bad. Recovering, Picard\
        \ reflects on the experience with Riker. Both changed and more at peace, Picard\
        \ shares tall tales from his vibrant youth. The Enterprise continues its voyage—leaving\
        \ Picard to cherish his life with renewed appreciation."
