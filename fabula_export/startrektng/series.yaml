    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e14
      episode_number: 14
      title: Sub Rosa
      logline: Dr. Beverly Crusher returns to her family home after her grandmother's
        death where she becomes entangled in a passionate, centuries-old romance with
        a seductive ghost, threatening her life and the safety of the Enterprise crew.
      high_level_summary: "Following the death of her grandmother, Felisa Howard,\
        \ Beverly Crusher returns to the Caldos Colony, a planet modeled after the\
        \ Scottish Highlands. At the funeral, she notices a mysterious man who looks\
        \ to be in his thirties at the service. Once back in her grandmother's home\
        \ a warm Scottish country home, Beverly is intrigued by Felisa's journal,\
        \ which reveals a secret love affair with a man named Ronin, who, according\
        \ to the writings, is thirty-four years old. She also finds a family heirloom\
        \ a candle that the 'enduring spirit of the Howards' and has been in the family\
        \ for twenty generations and keeps it lit. That night, Beverly experiences\
        \ an erotic dream featuring an unseen presence and hears a seductive voice\
        \ calling her name. \n\nMeanwhile, the Enterprise, at Picard's command, decides\
        \ to delay course to help the Caldos Colony. The colony's weather control\
        \ system is malfunctioning, leading to unusual weather patterns. Data and\
        \ Geordi work to stabilize the systems. The colony’s governor, Maturin, is\
        \ worried that the malfunctions will prevent the caber toss scheduled for\
        \ the next day. While the engineers are at work, Beverly recounts her dream\
        \ to Deanna Troi with whom she’s going over personnel reports. That night\
        \ she meets the man from the funeral and believes his name is Ronin.  She\
        \ experiences him when she is alone at the house. While there, she meets Ned\
        \ Quint who encourages her to get rid of the candle because the candle is\
        \ a curse on her family. She doesn’t, and he angrily washes his hands of the\
        \ situation.  \n\nAs the malfunctions worsen, the weather brings a storm to\
        \ the Caldos colony, and fog rolls through the Enterprise because the engineering\
        \ team is having difficulty getting a handle on the problems. Further complicating\
        \ matters, they discover Ned Quint sabotaging the weather control systems,\
        \ leading to his accidental death by plasma discharge. Beverly is confused\
        \ by the science and it's soon discovered that his death was not caused by\
        \ the plasma, but from anaphasic energy. Beverly, meanwhile, falls deeper\
        \ under Ronin's spell, seeing him regularly. Encouraged by her therapist,\
        \ Beverly admits knowing him to Deanna Troi who can sense her feelings.  However,\
        \ she leaves out important details; she seems to be holding information back.\
        \ \n\nAs Beverly grows enmeshed with Ronin, Picard becomes concerned about\
        \ her behavior. Beverly’s change in behavior concerns Picard, who presses\
        \ the issue, causing her to angrily defend herself and Ronin. Data and Geordi\
        \ trace the anaphasic energy signature to Felisa Howard's coffin, suspecting\
        \ something supernatural is at play. Picard confronts Ronin, who appears to\
        \ him, but refuses to answer basic questions about his life, increasing Picard's\
        \ suspicion. Data and Geordi discover the energy is around her grandmother’s\
        \ body. Soon, Beverly plans to leave Starfleet to be with Ronin, leaving Picard\
        \ very suspicious.\n\nWith Maturin's permission, Data and Geordi exhume Felisa's\
        \ coffin, but Felisa Howard rises from the coffin, possessed by Ronin’s force\
        \ and attacks the pair which is stopped by Picard. Picard is injured in the\
        \ process, by the couple, shocking Beverly, but it helps her break free from\
        \ Ronin's control. He hopes to infuse Beverly for good, giving her green eyes.\
        \ Discovering Ronin is not what he seems, she fights back to save her and\
        \ other people’s lives, rejecting him and his promises. Beverly confronts\
        \ him in the cemetery and vaporizes the candle to weaken Ronin. In a final\
        \ confrontation, Beverly uses a phaser to destroy Ronin, freeing herself from\
        \ his influence. In the end, Beverly reflects on her experience with Troi,\
        \ acknowledging the happiness Ronin brought to her grandmother. With the crisis\
        \ averted, the Enterprise leaves the Caldos Colony."
