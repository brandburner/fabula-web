    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e12
      episode_number: 12
      title: The Wounded
      logline: Captain Picard must stop rogue Starfleet Captain Benjamin Maxwell,
        a decorated officer consumed by a vendetta against the Cardassians, from reigniting
        a devastating war, even as evidence suggests Maxwell's accusations of Cardassian
        rearmament may be true.
      high_level_summary: "Captain Jean-Luc Picard and the crew of the Enterprise\
        \ are tasked with locating and apprehending Captain Benjamin Maxwell, whose\
        \ ship, the Phoenix, has been attacking Cardassian targets, violating a fragile\
        \ peace treaty. Picard is ordered to preserve the peace at all costs, even\
        \ if it means confronting a highly respected officer. To ensure transparency,\
        \ Picard is forced to host a Cardassian delegation aboard the Enterprise,\
        \ led by Gul Macet, adding tension to the mission. Picard learns that Maxwell\
        \ lost his family in a Cardassian raid, fueling his hatred. Picard seeks insights\
        \ from Chief O'Brien, who served under Maxwell. Keiko tries to understand\
        \ O'Brien's feelings about the Cardassians.\n\nThe Enterprise tracks the Phoenix\
        \ to a Cardassian supply ship. Maxwell refuses hails, and, despite Riker's\
        \ objections, Picard reluctantly provides the transponder codes to a Cardassian\
        \ warship in order to stop Maxwell from destroying the supply ship, though\
        \ they're too late to save the warship the Phoenix destroys. O'Brien confronts\
        \ Daro about ingrained hatreds that prevent peace. Worf arrests Glinn Telle\
        \ for accessing restricted computer files. Picard confronts Maxwell, who believes\
        \ the Cardassians are rearming. Maxwell insists the Cardassians are a threat\
        \ and the peace treaty is a ruse. Maxwell refuses to stand down, believing\
        \ his actions are preventing a future war. \n\nThe Enterprise intercepts the\
        \ Phoenix as it targets another Cardassian freighter. O'Brien volunteers to\
        \ transport to the Phoenix to reason with his former captain. O'Brien finds\
        \ Maxwell consumed by grief and hatred, clinging to past glories. Realizing\
        \ O'Brien cannot be swayed, Maxwell orders his crew to stand down. Maxwell\
        \ is confined to quarters and the Enterprise escorts the Phoenix back to Federation\
        \ space. Despite his actions, Picard acknowledges Maxwell's distinguished\
        \ service record. Picard understands Maxwell's motivations stem from his personal\
        \ tragedy. Before departing, Picard confronts Macet and warns the Cardassians\
        \ that the Federation is aware of their activities and will be watching. The\
        \ lasting peace is precarious. Picard and Macet are left with the weight of\
        \ preserving it."
      dominant_tone: Tragic
      raw_credits_block: |-
