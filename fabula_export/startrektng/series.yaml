    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e20
      episode_number: 20
      title: The Chase
      logline: Captain Picard, reunited with his archeology mentor, embarks on a galaxy-spanning
        quest to decipher a four-billion-year-old DNA message, racing against Klingons
        and Cardassians, to uncover a profound truth about the shared ancestry of
        humanoid life.
      high_level_summary: "Captain Picard and the crew of the Enterprise become embroiled\
        \ in an archeological mystery when Picard's former professor, Richard Galen,\
        \ arrives with a fragment of an ancient Kurlan artifact and a proposition\
        \ to discover the meaning of code hidden in the DNA of races throughout the\
        \ galaxy. Picard is torn between his duty to Starfleet and his desire to follow\
        \ Galen's lead on a historical expedition.\n\nGalen's shuttle is attacked\
        \ by Yridians, and Galen dies but not before the Enterprise retrieves key\
        \ files. Picard, driven by guilt and a thirst for knowledge, sets the Enterprise\
        \ on a new course to find answers to the clues left behind in the wake of\
        \ Galen's research, putting them behind schedule for a critical diplomatic\
        \ summit.\n\nThe crew discovers Galen had been studying DNA fragments from\
        \ nineteen different worlds and these fragments, when properly aligned, form\
        \ a circuit-like computer program. Picard then decides they must visit two\
        \ planets that Galen visited before his death: Ruah Four and Indri Eight.\
        \ The visit to Indri Eight reveals that it has been destroyed, seemingly to\
        \ prevent anyone from obtaining clues from that area. \n\nThe crew continues\
        \ to study the data taken from Galen's shuttle. They discover that one of\
        \ the missing DNA fragments is from the Kurlan system, specifically from Loren\
        \ Three. But the Enterprise is not the only organization pursuing this information.\
        \ Cardassians and Klingons also enter the Chase. These three ships converge\
        \ above Loren Three. Picard meets with the Klingon and Cardassian captains\
        \ and coordinates the sharing of information.\n\nData determines that the\
        \ fragments are distributed in a pattern and that this pattern could imply\
        \ that the missing DNA fragment is in the Rahm-Izad system. Gul Ocett betrays\
        \ the Enterprise, using her newfound knowledge to travel to the Rahm-Izad\
        \ system alone. The Enterprise then determines that the real destination is\
        \ not the Rahm-Izad system, but the Vilmoran System. The Enterprise beams\
        \ to the surface of Vilmoran system with the Klingons in tow. Cardassians\
        \ and Romulans. converge on the planet. In the chaos of battle and squabbling,\
        \ Picard and Beverly uncover a clue that triggers the completion of the code\
        \ which projects a humanoid, left an eternal message of the humanoid species\
        \ scattered throughout the galaxy. The message suggests that life evolved\
        \ on its planet before all others in this part of the galaxy and the species\
        \ seeded the primordial oceans of many worlds with their DNA. Each galaxy\
        \ is now a reflection of that one species. \n\nThough the discovery is profound,\
        \ the Klingons and Cardassians are unimpressed. The Romulan Captain, however,\
        \ seems to show a spark of introspection, and at the end of the episode seems\
        \ to appreciate life in a new way."
      dominant_tone: Melancholic yet hopeful
