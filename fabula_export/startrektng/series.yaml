    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e25
      episode_number: 25
      title: In Theory
      logline: When Ensign Jenna D'Sora initiates a romantic relationship with Data,
        the android seeks guidance from his crewmates and develops a computational
        model for love, leading to unforeseen consequences and emotional complexities
        within their experimental romance.
      high_level_summary: "The Enterprise encounters a nebula where reality itself\
        \ is unstable, causing matter to randomly disappear and reappear, while Data\
        \ finds himself in an unexpected romantic entanglement with Ensign Jenna D'Sora.\
        \ Jenna, fresh from a disappointing relationship, expresses her affection\
        \ for Data, intrigued by his unique qualities. Data, incapable of emotion,\
        \ approaches the situation as an experiment, seeking advice from his crewmates\
        \ on the nuances of human relationships.\n\nHe consults Guinan, Geordi, Troi,\
        \ Worf, Riker, and Picard, each offering different perspectives on love and\
        \ relationships. Guided by their advice, Data creates a program to simulate\
        \ a romantic relationship, incorporating various elements from literature\
        \ and cultural sources. He presents Jenna with flowers (selected based on\
        \ Riker's advice) and redecorates his quarters to be more inviting.\n\nHowever,\
        \ his calculated approach feels artificial to Jenna, and she recognizes that\
        \ Data's actions are based on external programming rather than genuine emotion.\
        \ As the Enterprise faces increasing danger from the spatial distortions of\
        \ the nebula, the crew struggles to find a way out. Picard pilots a shuttlecraft\
        \ ahead of the Enterprise, manually guiding the ship through the unstable\
        \ space, but the shuttle is damaged and Picard must be rescued. \n\nMeanwhile,\
        \ Jenna confronts the reality of her relationship with Data. She realizes\
        \ that despite his kindness and attentiveness, he is incapable of truly connecting\
        \ with her on an emotional level. She ends their relationship, acknowledging\
        \ that she has repeated a pattern of seeking connection with unemotional men.\
        \ In the end, Data accepts Jenna's decision, deleting the program he created\
        \ for their relationship, and is left contemplating the limits of his own\
        \ understanding of humanity."
