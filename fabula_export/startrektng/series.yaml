    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e05
      episode_number: 5
      title: Gambit, Part II
      logline: Captain Picard and Commander Riker, undercover on a mercenary ship,
        must stop a Vulcan extremist from reassembling a telepathic weapon while maintaining
        their cover and preventing a galactic incident that could ignite interstellar
        war.
      high_level_summary: "Picking up where Part I left off, Commander Data commands\
        \ the Enterprise while Picard and Riker remain undercover on Baran's mercenary\
        \ ship. Data, Troi, and Worf decipher a hidden message from Riker to discover\
        \ the mercenaries' next target: the Hyralan Sector, where they plan to meet\
        \ a Klingon transport. On the mercenary ship, tensions rise as Picard spars\
        \ with Riker and raises suspicions with his questioning of the mission. \n\
        \nData confronts Worf about his insubordination, leading to a strained but\
        \ repaired friendship. Meanwhile, Riker gains Baran's trust by seemingly betraying\
        \ Picard and agreeing to kill him. Picard, however, is making his own plans,\
        \ attempting to recruit Narik to mutiny against Baran.\n\nThe Enterprise intercepts\
        \ the Klingon transport, but the Klingon, Koral, refuses to cooperate. Data\
        \ uses a loophole to bring the shuttle aboard for inspection, during which\
        \ Picard, Riker, and a mercenary boarding party materialize and stun Worf\
        \ and Crusher. They proceed to the Observation Lounge, where they confront\
        \ Data, Troi, and Koral.\n\nRiker \"kills\" Picard and retrieves the second\
        \ artifact. However, upon returning to the mercenary ship, Picard reveals\
        \ Baran's duplicity and incites a mutiny, manipulating events to his advantage.\
        \ Baran attempts to use his neural servo to kill Picard, but Picard has switched\
        \ the transponder codes, resulting in Baran's own death.\n\nCommanding the\
        \ ship, Picard sets course for Vulcan where the artifacts are to be delivered.\
        \ He discovers that the artifacts form the Stone of Gol, a powerful psionic\
        \ resonator. Tallera reveals herself to be a Vulcan Security agent, T'Paal,\
        \ tasked with stopping the isolationist movement aiming to reassemble the\
        \ weapon.\n\nOn approach to Vulcan, Picard becomes suspicious of \"T'Paal\"\
        , and engineers a confrontation that exposes her. She intends to use the weapon\
        \ herself. She, Picard, and others materialize in a Vulcan cavern. Riker,\
        \ Worf, and a security team arrive, having tracked Picard's neural implant.\
        \ Picard, realizing the weapon responds to aggression, orders them to drop\
        \ their weapons and clear their minds. \"T'Paal\" attempts to use the resonator,\
        \ but the Vulcans' peace of mind renders it useless, and she is defeated.\n\
        \nIn the aftermath, it is revealed that Minister Satok did not know about\
        \ \"T'Paal\". Satok takes her into custody, and Picard, Riker, and Data discuss\
        \ the events. Riker warns Satok about the mercenary ship possibly heading\
        \ to Vulcan. The incident concludes with Picard joking about Riker and Data's\
        \ adherence to regulations, before Picard heads off for some much needed rest."
      dominant_tone: Gritty yet hopeful
      raw_credits_block: |-
        STAR TREK: THE NEXT GENERATION
        Gambit, Part II

