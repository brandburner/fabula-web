    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e03
      episode_number: 3
      title: Ensign Ro
      logline: Captain Picard must navigate a delicate situation involving a Bajoran
        terrorist group, a suspicious Starfleet Admiral, and the assignment of the
        controversial Ensign Ro, whose divided loyalties threaten the mission and
        the Federation's relationship with the Cardassians.
      high_level_summary: "When a Bajoran terrorist group claims responsibility for\
        \ the destruction of a Federation colony, the Enterprise is sent to negotiate\
        \ a peaceful resolution. Admiral Kennelly assigns Ensign Ro Laren, a Bajoran\
        \ with a troubled past, to the mission, raising concerns with Captain Picard\
        \ due to her history and questionable loyalties. Picard reluctantly accepts\
        \ Ro, and they head to the Valo system, where many Bajorans have resettled,\
        \ to contact Bajoran leaders and negotiate. They meet with Keeve Falor, who\
        \ is initially uncooperative but eventually directs them to Orta, the terrorist\
        \ leader. \n\nGuinan befriends Ro, offering counsel. Kennelly secretly orders\
        \ Ro to arm Orta, promising weapons and ships in exchange for ending terrorist\
        \ attacks. However, Ro becomes suspicious when Orta reveals that Bajorans\
        \ did not attack the colony. Ro confesses Kennelly's plan to Picard, and becomes\
        \ embroiled in a conspiracy involving the Cardassians. Kennelly orders Picard\
        \ to leave the Bajorans to the Cardassians, hinting at an alliance to eliminate\
        \ the Bajoran \"terrorist\" threat. \n\nPicard implements a covert plan with\
        \ Ro's help. They stage the transport of Orta, and swap the real ship carrying\
        \ Orta with a remotely controlled ship supplied by Starfleet which avoids\
        \ bloodshed while revealing the alliance between the Cardassians and Admiral\
        \ Kennelly. Picard confronts Kennelly, exposing his treachery. In the end,\
        \ Kennelly faces a hearing for his actions. Picard acknowledges Ro's potential\
        \ and invites her to continue serving in Starfleet. Ro expresses gratitude\
        \ but remains uncertain about her future, though she subtly embraces her Bajoran\
        \ heritage by wearing her earring once more."
      dominant_tone: Cynical yet hopeful
      raw_credits_block: |-
        STAR TREK: THE NEXT GENERATION
        Ensign Ro
