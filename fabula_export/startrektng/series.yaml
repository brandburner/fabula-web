    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s03_e18
      episode_number: 18
      title: Allegiance
      logline: Captain Picard is abducted and replaced by an alien replica while he
        and three disparate individuals are subjected to a series of psychological
        tests designed to study the dynamics of authority, leadership, and obedience.
      high_level_summary: "The USS Enterprise, under the command of Captain Jean-Luc\
        \ Picard, is en route to assist the USS Hood when Picard is suddenly abducted\
        \ from his quarters by an unknown force. Simultaneously, on the bridge, Data\
        \ detects an unusual energy surge in the captain's quarters.  Picard awakens\
        \ in a strange, windowless room with minimal furnishings, occupied by Mitena\
        \ Haro, a young Starfleet cadet, and Kova Tholl, a Mizarian public servant.\
        \ They soon realize they've been kidnapped.  \n\nBack on the Enterprise, a\
        \ perfect replica of Picard emerges, deceiving the crew and second-in-command\
        \ Riker, who only senses a slight change in the captain's behavior. The false\
        \ Picard orders a course change toward the Lonka pulsar, delaying their rendezvous\
        \ with the Hood, and enforces unusual restrictions on ship-wide communication.\
        \  These actions raise Riker's suspicions, and he attempts to understand the\
        \ change in plans, only to be rebuffed. Compounding the strangeness, the false\
        \ Picard engages in behavior wholly uncharacteristic -- attempts to seduce\
        \ Dr. Beverly Crusher and leads an impromptu sing-along in Ten-Forward, further\
        \ arousing the crew's suspicions.\n\nIn the holding cell, Picard attempts\
        \ to understand their abduction, deducing they've been chosen for a specific\
        \ reason. A fourth captive, Esoqq of Chalna, a bellicose warrior, arrives,\
        \ bringing immediate conflict. Picard faces the challenge of maintaining order\
        \ and encouraging cooperation among the prisoners, particularly when Esoqq\
        \ threatens violence against Tholl, the Mizarian, for being a coward.  They\
        \ attempt to escape, which ends in failure and painful consequences.\n\nSuspicion\
        \ grows among the captives, fostered by their captors by preventing the bloodthirsty\
        \ Esoqq to ingest the common \"food\". Esoqq accuses Tholl of collaborating\
        \ with their abductors, and the group descends into mutual distrust. The real\
        \ Picard finds himself having to defend not only his actions, but his very\
        \ identity. The replica aboard the Enterprise attempts to seduce Beverly,\
        \ an agenda which further alerts her to his unusual behavior.\n\nMeanwhile,\
        \ Riker convenes a secret meeting with key members of the senior staff --\
        \ Data, Troi, Beverly, Geordi, and Worf -- to discuss the captain's behavior.\
        \ They conclude an outside influence must be at work, and Riker resolves to\
        \ confront the captain. This confrontation leads nowhere, and the replica\
        \ attempts to relieve Riker of duty, but Riker defies the false Picard and\
        \ moves the ship away from the pulsar. \n\nBack in the cell, Picard reveals\
        \ his theory: They are subjects in an experiment designed to test the dynamics\
        \ of leadership and obedience.  Just as he is explaining that, Haro reveals\
        \ herself to be one of the alien captors in disguise. The Haro-alien explains\
        \ that they have been studying alien interaction and now she along with Picard,\
        \ Esoqq, and Tholl vanish. Simultaneously on the Enterprise bridge Picard\
        \ and the alien Haro appear where the alien Haro's replica was. The real Picard\
        \ orders Riker and Worf to take them into custody. Picard then engages the\
        \ aliens in conversation to distract them so that Data and Worf can set up\
        \ a forcefield to secure them. With the aliens held Picard chastises them,\
        \ but recognizing this has been a learning experience as much as a violation\
        \ he releases them from their captivity and orders them off the ship. Finally,\
        \ with Picard back in command, the Enterprise resumes her mission to rendezvous\
        \ with the USS Hood."
