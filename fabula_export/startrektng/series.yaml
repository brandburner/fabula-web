    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e16
      episode_number: 16
      title: Ethics
      logline: After a debilitating accident leaves Worf paralyzed, he requests Riker's
        assistance in a Klingon ritual suicide, forcing Riker to confront his friend's
        cultural beliefs and Worf to reconsider his honor-bound decision.
      high_level_summary: "On the Enterprise, Worf suffers a severe spinal injury\
        \ during a cargo bay accident, leaving him paralyzed from the waist down.\
        \ Considering himself a burden and unable to fulfill his duties as a warrior,\
        \ Worf requests Commander Riker's help in performing the Hegh'bat, a Klingon\
        \ ritual suicide. Riker is torn between his friendship and his own moral objections.\
        \ Beverly Crusher, meanwhile, seeks a medical solution, bringing in Dr. Toby\
        \ Russell. Russell proposes an experimental genetronic replication to regenerate\
        \ Worf's spinal cord, a risky procedure Starfleet Medical has repeatedly rejected\
        \ for humanoid use.\n\nRiker grapples with Worf's request, seeking counsel\
        \ from Captain Picard, who emphasizes respecting Worf's beliefs. Simultaneously,\
        \ Worf refuses to see his son, Alexander, ashamed of his condition; Counselor\
        \ Troi confronts Worf about his selfishness and the impact on his son. Reluctantly,\
        \ Worf agrees to consider neural implants offering partial mobility, but rejects\
        \ them after a painful demonstration. Russell then reveals the genetronic\
        \ replication as an alternative, giving Worf hope, but alarming Beverly due\
        \ to its experimental nature and ethical implications.\n\nAs the Enterprise\
        \ responds to a distress call from the Denver, Beverly and Russell treat the\
        \ injured. Russell uses an experimental treatment, leading to a patient's\
        \ death. Beverly confronts her, accusing her of prioritizing research over\
        \ patient care. Meanwhile, Riker researches the Hegh'bat, discovering it should\
        \ be performed by a family member, preferably the eldest son. He confronts\
        \ Worf, challenging his motives and reminding him of his responsibilities\
        \ to his friends and the Klingon Empire. Riker reveals the law and says that\
        \ Alexander must be the one to assist Worf.\n\nWorf reconsiders and asks to\
        \ see Alexander, telling him of his initial decision to die but that he has\
        \ now decided to live, and hands the knife back to Alexander marking his break\
        \ from his traditions. Beverly gets approval to perform the genetronic procedure.\
        \ The operation commences, but Worf dies during the procedure, after which\
        \ one of his redundant organs kicks in and starts functioning, bringing him\
        \ back to life. Russell states there were no anomalies during the replication\
        \ or signs of rejection. \n\nIn the aftermath, Beverly confronts Russell,\
        \ condemning her reckless approach to medicine. Worf begins his recovery,\
        \ struggling with physical therapy. Finally, he asks Alexander to help him\
        \ walk, embracing his son's support and accepting his new reality."
      dominant_tone: Tragic (with moments of quiet hope)
