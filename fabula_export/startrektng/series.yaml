    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e04
      episode_number: 4
      title: Suddenly Human
      logline: Captain Picard must reconcile his discomfort around children when he
        becomes responsible for Jeremiah, a human boy raised as a Talarian, whose
        loyalties and identity are caught between two warring cultures, risking a
        diplomatic incident.
      high_level_summary: "The Enterprise responds to a distress call from a Talarian\
        \ vessel and discovers a human boy, Jono, among the Talarian crew. Jono identifies\
        \ as Talarian and wishes to return to his captain, Endar. Starfleet identifies\
        \ Jono as Jeremiah Rossa, the presumed-dead son of colonists killed in a Talarian\
        \ raid, and Admiral Rossa's grandson. Picard is tasked with helping Jono reconnect\
        \ with his human heritage, but Jono resists, clinging to his Talarian identity.\
        \ Tensions rise as the Enterprise prepares to hand over the Talarian survivors,\
        \ and Captain Endar arrives, demanding Jono's return, claiming him as his\
        \ son under Talarian custom, which allows him to adopt the child of a slain\
        \ enemy to replace his own lost son. Picard learns that Jono suffered injuries\
        \ in the past while under Endar's care, raising the possibility of abuse,\
        \ yet Jono remains fiercely loyal to Endar. \n\nStarfleet orders Jono's return\
        \ to his grandmother, Admiral Rossa, to maintain the Rossa family. Despite\
        \ Picard's efforts to connect with Jono by sharing his quarters and activities,\
        \ Jono remains conflicted, torn between his loyalty to Endar and his burgeoning\
        \ memories of his human past. A message from Admiral Rossa further complicates\
        \ matters, stirring Jono's emotions and triggering fragmented memories of\
        \ his parents' deaths during the Talarian raid.  In a racquetball session,\
        \ the sounds trigger traumatic memories of his parents' deaths, causing him\
        \ great distress, so he remembers his mother. Ultimately, the night after\
        \ playing racquetteball, in a moment of confliction Jono attacks Picard with\
        \ a Klingon dagger, an act stemming from his fear of betraying Endar by embracing\
        \ his human identity. The attack leads to a diplomatic crisis, with Talarian\
        \ warships converging on the Enterprise. \n\nPicard realizes that he and his\
        \ crew have been trying to force Jono to make a choice, rather than allowing\
        \ him to determine who he is. He decides to send Jono back to Endar, acknowledging\
        \ Jono's deep-seated connection to and identity as a Talarian. The decision\
        \ averts war with the Talarians. In a touching farewell, Jono expresses his\
        \ gratitude to Picard with a traditional Talarian gesture, which represents\
        \ solidarity. Picard is left to reflect on the experience, recognizing what\
        \ he has learned from his interactions with Jono. He removes Jono's hammock.\
        \ Picard now understands the weight of his decision to return Jono to the\
        \ Talarians."
