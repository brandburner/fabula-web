    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e13
      episode_number: 13
      title: Devil's Due
      logline: Captain Picard must prove a charismatic, seemingly all-powerful woman
        claiming to be Ardra, an ancientVentaxian devil, is a fraud before she enslaves
        the population as stipulated in a thousand-year-old contract.
      high_level_summary: "The Enterprise responds to an emergency transmission from\
        \ the Ventax Two science station, finding the planet in chaos as the Ventaxians\
        \ believe their world is ending with the return of Ardra, a figure from their\
        \ past who promised peace for a millennium in exchange for their servitude\
        \ upon her return. Captain Picard, skeptical, investigates after beaming up\
        \ Dr. Howard Clark, the science station director. \n\nPicard learns that Ardra's\
        \ arrival is supposedly heralded by geological tremors and visions, both of\
        \ which have occurred, fueling mass hysteria. When Picard, Data, Worf, and\
        \ Troi materialize on the planet, they encounter Ardra, a stunning woman who\
        \ asserts her claim to the Ventaxians' souls. She displays seemingly supernatural\
        \ powers, reinforcing the Ventaxians' belief in her. \n\nPicard remains unconvinced,\
        \ suspecting trickery. He challenges Ardra's legitimacy and demands to see\
        \ the ancient contract. Data examines the scrolls and confirms the contract's\
        \ existence and its legally binding terms. Ardra then claims ownership of\
        \ the Enterprise itself as part of the contract, which Data confirms is a\
        \ valid interpretation. Picard, determined to expose Ardra as a fraud, studies\
        \ confidence games and seeks a loophole in the contract while Ardra continues\
        \ to taunt him, even invading his private quarters.\n\nPicard finds a legal\
        \ precedent that allows for an arbitration. He proposes the arbitration and\
        \ Ardra accepts, choosing Data, who is impartial, as the arbiter. During the\
        \ hearing, Ardra presents historical evidence and witnesses to support her\
        \ claim, but Picard argues that the Ventaxians achieved their advancements\
        \ themselves. With Geordi's help, Picard discovers Ardra is using a cloaked\
        \ ship to create illusions of her powers. \n\nDuring the final moments of\
        \ the arbitration, Picard exposes Ardra's ruse. He reveals that Ardra has\
        \ no real powers. With assistance from the Enterprise crew, he replicates\
        \ her magical acts, demonstrating they are technologically based. Ardra's\
        \ past is exposed, revealing her history of deceiving people for petty schemes.\
        \ With her deception revealed, the Ventaxians reject Ardra, nullify their\
        \ contract, and reclaim their autonomy. Ardra departs, leaving Picard to reflect\
        \ on the Ventaxians' capacity for self-determination."
      dominant_tone: Thoughtful
      raw_credits_block: |-
        STAR TREK: THE NEXT GENERATION
        Devil's Due

