    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e26
      episode_number: 26
      title: Redemption
      logline: As Gowron faces a challenge to his leadership of the Klingon High Council,
        Worf must choose between his duty to Starfleet and his allegiance to his Klingon
        heritage, while Picard navigates the complexities of Federation non-interference.
      high_level_summary: "Captain Picard and the Enterprise travel to the Klingon\
        \ Home World to oversee Gowron's installation as the new leader of the High\
        \ Council. However, their arrival is met with political turmoil as the sisters\
        \ of the deceased Duras, Lursa and B'Etor, introduce Toral, Duras's alleged\
        \ son, as a challenger to Gowron's claim. This throws the Klingon Empire into\
        \ a potential civil war. Picard is forced to arbitrate, while Worf is torn\
        \ between his Starfleet duty and his Klingon heritage.\n\nGowron reveals to\
        \ Picard that the Duras family has been amassing support and may have Romulan\
        \ allies. Picard, bound by his role as arbiter, refuses to interfere directly\
        \ but begins monitoring Romulan activity. Worf, seeking to restore his family's\
        \ honor, confronts Gowron, who rejects his plea due to political considerations.\
        \ Guinan attempts to help Worf reconcile his inner turmoil. Worf requests\
        \ a leave of absence, which Picard grants.\n\nWorf joins his brother Kurn\
        \ aboard a Klingon ship, where he learns of Kurn's plan to overthrow Gowron,\
        \ which Worf rejects. Worf insists they support Gowron, seeing it as their\
        \ duty. Back on the Klingon Home World, Picard presides over the Council as\
        \ Toral formally challenges Gowron's leadership, backed by Lursa and B'Etor.\
        \ A genetic scan confirms Toral's lineage, and the Council accepts the challenge.\n\
        \nPicard is visited by Lursa and B'Etor, who seek his support for Toral. They\
        \ subtly threaten the Federation-Klingon alliance if he rules against them.\
        \ Picard announces his decision: he rejects Toral's claim, citing Toral's\
        \ lack of honor and experience. Gowron is declared the leader, however most\
        \ of the council members turn to Toral in defiance, pledging their support\
        \ to him and beginning the civil war. \n\nGowron, recognizing his weak position,\
        \ requests Worf's aid. Worf offers the support of four Klingon squadrons led\
        \ by Kurn in exchange for the restoration of his family honor. As they speak,\
        \ a Bird of Prey attacks Gowron's ship, and the Enterprise is forced to withdraw\
        \ to avoid further conflict. Worf sides with Gowron and fights off his attackers,\
        \ led by the Duras sisters. After the battle and after Kurn arrives, Picard\
        \ attends the installation ceremony, where Gowron publicly restores Worf's\
        \ family honor. Gowron requests the Federation's assistance in fighting the\
        \ Duras family. Picard refuses as it is an internal Klingon conflict and Worf\
        \ resigns his commission to serve with Gowron. Picard bids farewell to Worf,\
        \ recognizing both his Klingon heart and very human traits before Worf departs\
        \ the Enterprise."
      dominant_tone: Tragic
