    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e08
      episode_number: 8
      title: Attached
      logline: When Picard and Crusher are kidnapped by the xenophobic Prytt, neural
        implants force them to share their innermost thoughts, dredging up long-buried
        feelings and testing the limits of their friendship as they struggle to escape.
      high_level_summary: "Captain Picard and Beverly Crusher find themselves in dire\
        \ straits when a routine transport to Kesprytt Three goes awry, and they are\
        \ kidnapped by the isolationist Prytt. Imprisoned in a dark cell, they discover\
        \ neural implants that link their minds, forcing them to experience each other's\
        \ thoughts and emotions. This unwelcome intimacy resurfaces long-repressed\
        \ feelings, particularly Picard's enduring love for Beverly, complicated by\
        \ his friendship with her late husband, Jack. \n\nWhile Picard and Beverly\
        \ grapple with their shared consciousness and navigate a treacherous escape,\
        \ Commander Riker and the Enterprise crew work to unravel the mystery of their\
        \ disappearance. Their investigation leads them to Ambassador Mauric, who\
        \ reveals that the Prytt oppose the Federation's potential alliance with the\
        \ Kes. As Riker navigates the delicate diplomatic landscape, Data discovers\
        \ that a tractor beam originating from Prytt territory hijacked the transport,\
        \ confirming their involvement in the kidnapping. \n\nEscaping their cell\
        \ with the help of a map discreetly provided by a Kes agent, Picard and Beverly\
        \ face numerous challenges, from navigating methane-filled caves to evading\
        \ Prytt patrols. Their mental link intensifies, blurring the lines between\
        \ their thoughts and forcing them to confront long-avoided truths. They share\
        \ laughter, embarrassment, and even a sense of shared danger, strengthening\
        \ their bond even as it tests their individual boundaries.\n\nMeanwhile, growing\
        \ suspicious of Ambassador Mauric's true intentions, Riker confronts him along\
        \ with Minister Lorin of the Prytt in a tense meeting aboard the Enterprise.\
        \ Riker skillfully manipulates the situation, promising to deny the Kes Federation\
        \ membership while threatening the Prytt with unwanted Starfleet scrutiny\
        \ if they do not cooperate in rescuing Picard and Crusher. Under pressure,\
        \ Lorin reveals their location and allows their transport back to the ship,\
        \ but Beverly is initially left behind and rescued later.\n\nBack on the Enterprise,\
        \ Picard and Beverly reflect on their shared ordeal. Though they are relieved\
        \ to be free of the implants, the experience leaves them vulnerable and forces\
        \ them to confront the depth of their feelings. Picard acknowledges his long-held\
        \ love for Beverly and the guilt he felt after Jack's death. They tentatively\
        \ address the possibility of a deeper relationship but ultimately decide to\
        \ proceed with caution, their bond forever changed by the intimate journey\
        \ they have shared."
      dominant_tone: Melancholic
