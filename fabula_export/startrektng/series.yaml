    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e06
      episode_number: 6
      title: The Game
      logline: When Commander Riker brings a seemingly innocent game back from Risa,
        it unknowingly infects the Enterprise crew with an addictive mind-control
        device, leaving Data and Wesley to fight for the ship's freedom.
      high_level_summary: "Commander Riker returns from Risa, bringing with him a\
        \ new game that quickly spreads throughout the Enterprise crew. This game\
        \ provides intense pleasure to the players, and the crew quickly grows addicted.\
        \ As the crew becomes more engrossed in the game, Data experiences what Dr.\
        \ Crusher diagnoses as a malfunction and is decommissioned. Wesley Crusher\
        \ arrives on the Enterprise for a visit from the Academy, and finds himself\
        \ reconnecting with his mother and coming on to a new specialist in engineering,\
        \ Robin Lefler. Wesley finds that his mother and the rest of the crew are\
        \ obsessed with this new game, causing him to investigate along with the new\
        \ specialist. \n\nWesley and Robin run tests on the game, discovering that\
        \ the game is affecting the pleasure center of the brain, and the higher reasoning\
        \ centers as well. Wesley attempts to inform Captain Picard of the dangers\
        \ of the game, however, Picard quickly ends the conversation so that he can\
        \ play it himself. With the Captain also addicted, Wesley and Robin realize\
        \ they are the only ones unaffected by this game, and must find a way to help\
        \ the crew and ship. The two begin to suspect that Data’s malfunction may\
        \ be tied into the game, and while everyone is distracted, they sneak to Data,\
        \ and Robin discovers that Data’s positronic links have been neatly severed.\n\
        \nWesley shares that only his mother and Geordi are the only ones on the ship\
        \ who know Data well enough to perform this. With everyone else useless, Wesley\
        \ decides to feign addiction to the game, and Robin and he put on an act.\
        \ Robin informs Wesley that Riker and Worf are coming for him, and he decides\
        \ to flee. Through the use of his wits and knowledge of the ship, Wesley is\
        \ able to make it to Engineering and is about to get away when he sees Robin\
        \ look past him, alerted, he attempts to flee but is apprehended by Riker\
        \ and Worf. Wesley is dragged to the bridge where Picard forces the game on\
        \ him, ignoring Wesley’s pleas.\n\nBefore he could play for long Data comes\
        \ out of the turbolift and stops the crew with a modified palm beacon. Data\
        \ reveals there is an alien ship beaming them, and it's revealed that Etana,\
        \ the woman from Risa is now in control of the crew. She has plans to continue\
        \ to expand control throughout Starfleet. While Data takes control of the\
        \ bridge, Wesley reveals that he reconnected Data’s positronic matrix, and\
        \ they programmed pulse to all displays in the ship to reverse the effects.\
        \ The crew recovers, and Data brings the ship back under control.\n\nWesley\
        \ prepares to leave the Enterprise and return to the academy, where he shares\
        \ a heartfelt goodbye with Robin, now friends, and possibly more. As Wesley\
        \ leaves he asks about law 103, to which Robin responds ‘a couple of light\
        \ years can’t keep good friends apart.’"
      dominant_tone: Tragic with redemptive undertones
      raw_credits_block: |-
        STAR TREK: THE NEXT GENERATION
        The Game

