    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e10
      episode_number: 10
      title: New Ground
      logline: When Worf's adoptive mother brings his troubled son Alexander aboard
        the Enterprise, Worf struggles to connect with the boy and teach him Klingon
        values, while the ship races to stop a runaway Soliton wave from destroying
        a colony.
      high_level_summary: "The Enterprise arrives at Bilana Three to witness the first\
        \ test of the Soliton Wave, a new propulsion method. Geordi is excited, but\
        \ Data and Worf remain stoic. Worf receives a surprise visit from his adoptive\
        \ mother, Helena, who brings his son, Alexander, with her. Helena reveals\
        \ that she and Worf's father are unable to care for Alexander any longer,\
        \ leaving him in Worf's care. Alexander expresses his desire to stay, which\
        \ Worf finds difficult, given his duties and lack of parenting experience.\n\
        \nWorf enrolls Alexander in school, but faces challenges as Alexander displays\
        \ disobedient behavior. Ms. Kyle, Alexander's teacher, brings to Worf's attention\
        \ that Alexander lied and stole a model during a class field trip. Worf, shocked,\
        \ confronts Alexander about dishonoring the family. Worf confines him to his\
        \ quarters to consider how to handle the behavioral issues. Deanna Troi attempts\
        \ to counsel Worf, who remains resistant to considering Alexander's emotional\
        \ state.\n\nMeanwhile, the Enterprise participates in the Soliton Wave test.\
        \ During the test, the wave becomes unstable and increases in velocity. The\
        \ test ship explodes, causing damage to the Enterprise. It is discovered that\
        \ the wave's energy level is increasing and will destroy a colony on Lemma\
        \ Two. The Enterprise decides to intercept the wave, requiring them to pass\
        \ through it, risking significant damage.\n\nWorf contemplates sending Alexander\
        \ to a Klingon school. Troi confronts Worf about his feelings of abandonment\
        \ after his parents died and K'Ehleyr's death, and how those feelings may\
        \ be influencing Alexander. Seeing that Worf isn't budging, she points out\
        \ Alexander might also feel abondoned after losing both of his parents, and\
        \ then being sent away by Worf to live with his adoptive parents.\n\nAs the\
        \ Enterprise prepares to pass through the wave, Alexander packs his belongings,\
        \ believing he is to be sent away. An alarm sounds, indicating a fire in Biolab\
        \ Four, where Alexander is located. Riker and Worf race against time to rescue\
        \ Alexander. Alexander, concerned about the animals that were in the lab with\
        \ him, pleads with his father and Riker to save them as well. Worf, prompted\
        \ by Alexander's genuine concern for the Gilvos, realizes his son is not beyond\
        \ saving. They escape just as the Enterprise fires torpedoes to disrupt the\
        \ wave. \n\nAlexander recovers in sickbay. Worf offers Alexander a choice:\
        \ attend a Klingon school or stay aboard the Enterprise and face challenges\
        \ together. Alexander chooses to stay, demonstrating to Worf that he can change\
        \ and is loyal to Worf. They agree to face the challenges together, the two\
        \ finally forging a strong bond."
      dominant_tone: Tragic (with moments of quiet hope)
