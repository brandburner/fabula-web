    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e19
      episode_number: 19
      title: The Nth Degree
      logline: When a probe transforms Lieutenant Barclay into a hyper-intelligent
        being who enhances the Enterprise's capabilities, Picard must decide whether
        to risk Barclay's life to regain control of the ship and prevent a potentially
        dangerous journey to the center of the galaxy.
      high_level_summary: "The Enterprise arrives at the Argus Array, a remote subspace\
        \ telescope, to investigate why it mysteriously stopped relaying data. Geordi\
        \ and Barclay take a shuttle to examine an unidentified probe near the array,\
        \ but the probe emits a blinding flash of light, knocking Barclay unconscious\
        \ and disabling the shuttle's computer. Back on the Enterprise, Barclay begins\
        \ to exhibit signs of enhanced intelligence. He impresses Beverly with medical\
        \ knowledge and quickly implements modifications to save the ship from the\
        \ probe. Picard and the crew are initially impressed with Barclay's newfound\
        \ abilities. He proposes fixing all eighteen reactors of the Array simultaneously.\
        \ \n\nAs Barclay's intelligence grows, he becomes increasingly confident,\
        \ even making a pass at Troi. Geordi becomes concerned over Barclay's behavior,\
        \ finding him in the holodeck consulting with a holographic Einstein on complex\
        \ theories. Beverly's medical scans reveal Barclay's brain activity is off\
        \ the charts, making him the most advanced human ever. Picard and the senior\
        \ staff debate how to handle Barclay, balancing the need to repair the Array\
        \ with the potential risks of his alien-influenced intellect. \n\nBarclay's\
        \ increased intelligence allows him to interface directly with the Enterprise's\
        \ computer systems to expedite repairs to Argus Array. He explains that his\
        \ brain functions have expanded so much that he requires operating from within\
        \ the computer. Picard orders Barclay to disconnect, but he claims doing so\
        \ would kill him as his higher brain functions are now operating almost entirely\
        \ from within the computer disrupting subspace and altering the Enterprise's\
        \ course, accelerating the ship to warp speeds never before imagined. The\
        \ ship hurtles towards the center of the galaxy. \n\nPicard orders Worf to\
        \ disconnect Barclay from the computer, but a force field protects him. Troi\
        \ attempts to reason with Barclay, but fails to convince him to stop. As the\
        \ Enterprise is drawn into the warp tunnel Worf reports his inability to retrieve\
        \ Barclay due to a forcefield. He cannot be disconnected. Picard orders emergency\
        \ measures while Data warns of imminent bio-cellular disruption. The senior\
        \ staff brace for disaster. The ship races to the center of the galaxy.\n\n\
        The Enterprise arrives at the center of the galaxy, where they encounter the\
        \ Cytherians. The Cytherians, beings who explore the galaxy by bringing others\
        \ to them, had sent the probe to initiate contact. Barclay, now returned mostly\
        \ to his former self, explains that the Cytherians only wish for an exchange\
        \ of knowledge. The Cytherians reintegrate Barclay and return the Enterprise\
        \ to Federation space. In Ten-Forward, Barclay struggles with the loss of\
        \ his enhanced intellect, realizing a melancholy outcome. Troi and Geordi\
        \ reassure him that the experience has changed him in ways he may not yet\
        \ realize. Troi also tells him the Cytherians want to know us. As they exit\
        \ Ten-Forward, Barclay demonstrates an unusual ability, predicting checkmate\
        \ in a chess game, before acknowledging almost in surprise that he does not\
        \ play. "
      dominant_tone: Tragic with a haunting undercurrent of existential questioning
