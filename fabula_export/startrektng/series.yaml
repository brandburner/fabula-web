    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e17
      episode_number: 17
      title: Night Terrors
      logline: When the Enterprise investigates a derelict ship whose crew mysteriously
        murdered each other, the crew finds themselves trapped in a Tyken's Rift where
        they are deprived of REM sleep, leading to madness and terror as they try
        to solve the mystery and escape.
      high_level_summary: "The USS Enterprise, under the command of Captain Jean-Luc\
        \ Picard, investigates the USS Brattain, a Federation science vessel that\
        \ disappeared after sending a distress call. They find the Brattain adrift\
        \ near a binary star system. Upon entering the ship, the crew discovers the\
        \ entire crew dead, seemingly having killed each other in a frenzy of violence.\
        \ Only one survivor remains: a Betazoid science advisor named Andrus Hagan,\
        \ who is in a catatonic state. Counselor Deanna Troi attempts to make contact\
        \ with his mind, and gleans only fragmented phrases filled with terror. \n\
        \nAs the Enterprise attempts to unravel the mystery, they become trapped in\
        \ a Tyken's Rift, a spatial anomaly that drains energy. Geordi La Forge and\
        \ Data try to restart the Brattain's engines without success. Beverly Crusher's\
        \ autopsies reveal the crew of the Brattain killed each other, and Captain\
        \ Zaheva's logs speak of paranoia and mutiny. Troi experiences a terrifying\
        \ nightmare of a voice calling out about \"eyes in the dark\" and \"one moon\
        \ circling.\"\n\nSoon, members of the Enterprise crew begin to exhibit strange\
        \ behavior. Ensign Rager forgets how to enter coordinates, O'Brien becomes\
        \ irrationally jealous of Keiko, and crew members report hallucinations and\
        \ strange occurrences. Picard, Beverly, and Troi realize that the events on\
        \ the Brattain are being mirrored on the Enterprise -- the crew is slowly\
        \ losing their minds. Data determines that the Tyken's Rift is preventing\
        \ the ship's energy from functioning normally. Beverly discovers that the\
        \ crew is suffering from REM sleep deprivation.\n\nAs the crew descends further\
        \ into madness, Worf nearly commits suicide, plagued by fear. Picard experiences\
        \ hallucinations in a turbolift, and Riker finds his bed filled with snakes.\
        \ Troi, through her Betazoid abilities, remains the only one who can dream,\
        \ but her dreams are filled with terrifying messages. Beverly and Data work\
        \ to find a solution, while Picard relies on Data to make critical decisions,\
        \ as he himself is suffering from the effects of sleep deprivation.\n\nTroi\
        \ realizes that her nightmares are not just dreams, but a telepathic message\
        \ from another ship trapped on the other side of the Tyken's Rift. The beings\
        \ are calling for help. Data discovers that a concentrated burst of energy\
        \ might disrupt the Tyken's Rift. Communicating through dreams, Troi exchanges\
        \ information that reveals that they must find a suitable means of combining\
        \ available resources, and the call for “one moon circling” is finally translated\
        \ to Hydrogen. The Enterprise and the other ship work together to combine\
        \ hydrogen and a volatile substance to create an explosion. The Enterprise\
        \ ejects hydrogen into the Rift near the other vessel. Troi, through a final\
        \ contact, transmits the signal ‘now’ at the critical moment. United in purpose,\
        \ the aliens achieve an explosion which frees both ships from the Tyken's\
        \ Rift. With the Enterprise freed, life support returns, and Data orders a\
        \ return to Starbase and mandates rest for the crew."
      dominant_tone: Tragic (with glimmers of resilience)
