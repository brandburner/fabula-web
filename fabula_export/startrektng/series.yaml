    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e17
      episode_number: 17
      title: Masks
      logline: When the Enterprise encounters an ancient alien archive hidden within
        a comet, Data becomes a conduit for multiple alien personalities, forcing
        Captain Picard to confront these entities and find a way to save Data and
        the ship from complete transformation.
      high_level_summary: "The Enterprise encounters a rogue comet, and during a sensor\
        \ scan, Data experiences an intense sensor echo. Soon after, Troi discovers\
        \ a strange artifact in her quarters, and Riker, Worf, and Geordi notice odd\
        \ changes in the replicated food and drinks in Ten Forward. Geordi discovers\
        \ alien symbols being downloaded into the ship's computer systems via the\
        \ sensor beam, and Data inexplicably recognizes them. Investigations reveal\
        \ an ancient, massive geometric structure of alien technology hidden within\
        \ the comet. When the crew uses phasers to reveal the object, the ship begins\
        \ experiencing system anomalies; the archive is using the sensor beam to transmit\
        \ information into the Enterprise's systems. \n\nData determines the object\
        \ is an informational archive. Later, while Geordi examines Data's positronic\
        \ net, Data begins experiencing an 'impulse' and fears he is losing his mind.\
        \ Suddenly, alien circuitry appears within Data's head, and the compass design\
        \ appears on his face, a ceremonial neckplate also appearing. He announces,\
        \ “Masaka is waking.” Data begins to transform, with different alien personalities\
        \ emerging and taking control and the ship altering to reflect the alien culture.\
        \ Picard seeks to figure out WTF is going on.\n\nPicard learns that Data is\
        \ hosting multiple personalities from the archive, with his original personality\
        \ suppressed. He consults with Data, as Ihat, through Data as a sacrificial\
        \ “Victim” persona to Masaka. The ship is increasingly being transformed by\
        \ the archive. The archive activates a tractor beam, drawing the Enterprise\
        \ in, the ship is actively being transformed as this happens turning portions\
        \ of the ship into tropical foliage. Engineering is transformed into hell-scape\
        \ with snakes in the photon torpedoes. Picard seeks to access and commune\
        \ with Masaka to stop the transformation. Worf states they have only 2 hours\
        \ before the ship will be totally transformed. \n\nPicard enters Data's quarters\
        \ and finds him in the form of an old man, and seeks to find a way to reach\
        \ the old entity. Ihat returns and tells him about Masaka's temple. Picard\
        \ needs to get the “sign” for Masaka’s Temple. He finds the symbol on the\
        \ Stone Column. The key is animal gods, it is determined. Then, a Data wearing\
        \ a mask steps out and disable the security guards. The image of the symbol\
        \ has Data’s face on the throne. Korgano’s moon symbol ends up being the only\
        \ entity that can stop the goddess entity. They input the symbol of Korgano\
        \ and a sliver mask appears. Data’s moon symbol appears as Korgano instead\
        \ of Masaka in this final vision.\n\nPicard as Korgano tells Masaka she needs\
        \ him as well. Back on the bridge, Geordi disables the alien transformation.\
        \ Starfleet will come study it further. Picard learns that the mask was something\
        \ Data had made initially. In the end the civilization has used the entire\
        \ ship, and thousands are all one civilization."
