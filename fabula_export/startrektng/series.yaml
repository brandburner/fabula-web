    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e12
      episode_number: 12
      title: Violations
      logline: When members of an Ullian telepathic delegation, who retrieve memories,
        arrive on the Enterprise, Counselor Troi and Commander Riker fall into comas,
        leading Picard to uncover a dark secret about one of the Ullians.
      high_level_summary: "The Enterprise hosts an Ullian delegation, telepathic historians\
        \ who retrieve memories. Counselor Troi volunteers for a memory exercise,\
        \ which seems successful, but she later falls into a coma, a state baffling\
        \ Dr. Crusher. Commander Riker succumbs to the same unexplained ailment the\
        \ following day. Picard suspects a connection to the Ullians when Dr. Crusher\
        \ finds abnormal memory activity. \n\nGeordi, while running a ship-wide diagnostic,\
        \ confirms that there are no known non-medical causes for the coma-like electropathic\
        \ patterns in Troi and Riker's brains. Picard confronts the Ullians but is\
        \ met with indignation by the elder Ullian, Tarmin, who claims he and his\
        \ group have nothing to hide. Eventually, Dr. Crusher is also attacked, which\
        \ intensifies suspicions toward the Ullians. \n\nData and Geordi cross-reference\
        \ the Ullians' visited planets with instances of unexplained comas, and they\
        \ find similar cases diagnosed as Iresine Syndrome, a condition Dr. Crusher\
        \ had initially dismissed due to normal histamine levels. Picard asks the\
        \ Ullians to confine themselves to quarters for the safety of everyone on\
        \ board, but Jev offers to perform a memory probeon Troi to retrieve the missing\
        \ memories she had before falling unconscious. Troi agrees, resulting in the\
        \ shocking revelation that Tarmin was responsible for the attacks; the telepathic\
        \ intrusions left the victims in a coma-like state. Data and Geordi discover\
        \ that Tarmin was not present for another attack.\n\nAs the Enterprise prepares\
        \ to offload the Ullians at a starbase, Jev attempts to say goodbye to Troi\
        \ and expresses his wishes to be friends, however, he assaults her in her\
        \ quarters. Troi fights back until Data and Worf subdue him. Finally, Data\
        \ finds other cases of memory invasion linked to Jev instead of Tarmin. It\
        \ is revealed that Jev, not Tarmin, committed the assaults by invading the\
        \ memories of others, and implanting images of himself assaulting her. The\
        \ Ullians are disembarked, and it is confirmed that both Dr. Crusher and Commander\
        \ Riker will recover, though the healing process is slow. Picard reflects\
        \ on the seed of violence inherent in everyone after Tarmin expresses his\
        \ shock at the revelation of Jev's actions."
