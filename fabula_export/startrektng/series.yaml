    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e23
      episode_number: 23
      title: Emergence
      logline: When the Enterprise inexplicably develops a self-aware intelligence
        that commandeers the ship to create a mysterious lifeform, Picard and his
        crew must decide whether to fight it or trust that the emergent entity has
        honorable intentions.
      high_level_summary: "The USS Enterprise inexplicably begins to behave erratically,\
        \ exhibiting autonomous functions by suddenly engaging warp drive and altering\
        \ course, puzzling Captain Picard and his crew. Data and Geordi discover the\
        \ ship's systems are being manipulated by a network of strange nodes that\
        \ seem to be creating a neural matrix, suggesting the ship is developing its\
        \ own intelligence. These nodes all intersect within Holodeck Three. \n\n\
        As the crew investigates, they find the Holodeck running multiple programs\
        \ simultaneously, creating a bizarre composite reality centered around a train\
        \ journey. They realize actions within the Holodeck directly influence the\
        \ ship. The ship is commandeered to fly towards a white dwarf star, while\
        \ the Holodeck train becomes a literal journey to Vertiform City, and Troi\
        \ senses an almost infant-like intelligence at play. She feels they are trying\
        \ to understand themselves through the crew's experiences and Holodeck programs.\
        \ \n\nDiscovering how the crew are running out of oxygen, Data takes control\
        \ of the Holodeck train, guiding it to New Vertiform city and to a faster\
        \ path to new nebula. Further, Geordi figures out that the ship diverted all\
        \ systems to maximize propulsion and is using Vertion particles to create\
        \ an object in the cargo bay, an almost organic process. \n\nThe crew cooperate\
        \ with the ship's emergent intelligence, helping it achieve its goal. They\
        \ modify a photon torpedo to generate vertion particles from a nearby nebula,\
        \ providing the energy needed for the object's completion. In the end, the\
        \ object—a unique lifeform, which materialized on the ship, and vanished into\
        \ space, its purpose served. With the ship under control and systems returning\
        \ to normal, Picard reflects on the experience, recognizing the intelligence\
        \ stemmed from the sum of the crew's experiences and decides to trust this\
        \ sum.\n\nData, staging a scene from The Tempest, meets with Picard and explains\
        \ that this test could have been very dangerous. Picard considers the situation\
        \ and trusts the sum of the experiences that were instilled within the ship,\
        \ which calms Data's concerns."
      dominant_tone: Cognitive Dread
      raw_credits_block: |-
