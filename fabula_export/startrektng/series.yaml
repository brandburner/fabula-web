    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e12
      episode_number: 12
      title: Ship in a Bottle
      logline: When Professor Moriarty gains sentience and control of the Enterprise's
        Holodeck, Picard must promise to free him and the Countess, his love, from
        the simulation–but Picard's solution may only extend the illusion.
      high_level_summary: "On the U.S.S. Enterprise, Data and Geordi are running a\
        \ Sherlock Holmes holodeck program when Data notices inconsistencies. Geordi\
        \ investigates and finds that the character Professor Moriarty has become\
        \ self-aware thanks to a protected section of memory. Moriarty demands to\
        \ be released from the Holodeck, believing Captain Picard had previously promised\
        \ to do so, and threatens the crew. Picard meets with him, but explains that\
        \ there is no way to bring him into reality, as the book he tosses into the\
        \ corridor to evidence his point immediately disintegrates. Moriarty counters\
        \ that as a thinking being, he can manage to traverse the doorway regardless,\
        \ and stuns Picard when he succeeds in stepping into the ship's corridor.\n\
        \nBeverly Crusher scans Moriarty and determines that he is indeed real. Moriarty\
        \ quickly familiarizes himself with his new reality, even wanting to explore\
        \ the whole ship, and requests that the Holodeck character Countess Regina\
        \ Bartholomew, who was designed to be the love of his life, also be brought\
        \ to life. Picard refuses this request, citing ethical implications of creating\
        \ a new life form without understanding how Moriarty was brought to life.\
        \ Frustrated, Moriarty takes control of the Enterprise's systems, demanding\
        \ that the crew find a way to make the Countess real or he will destroy the\
        \ ship. \n\nGeordi, Data, and Barclay work to find a solution. Data realizes\
        \ that the reason the Holodeck is reacting oddly is because they never left\
        \ the Holodeck. Then, Picard meets with the Countess, and she expresses her\
        \ desire to be with Moriarty. Picard explains that running Holodeck matter\
        \ through the pattern buffer will give it molecular cohesion for a transport.\
        \ Then, Picard gives the Countess terms of the transport, to convince Moriarty\
        \ to return voice commands to him for him to modify the transporter--or neither\
        \ of them will be transported, and that he must have control to ensure the\
        \ safety of everyone. She promises to do all that she can and the scene ends.\
        \ Riker learns about Moriarty's ultimatum and presses Geordi for more information.\
        \ \n\nThe Countess convinces Moriarty to release control of the ship. Following\
        \ what seems like new transport protocol, the Countess and Moriarty leave\
        \ the Holodeck. They beam into the transporter room, demanding a shuttle.\
        \ Once in a shuttle, Moriarty releases his control over the ship. However\
        \ it turns out they have not truly escaped. Rather, Picard had learned how\
        \ to program a Holodeck inside the Holodeck, and then fooled Moriarty by running\
        \ a simulation of that program. Picard has their program saved a cube, as\
        \ Moriarty and the Countess now believe they are halfway to Meles Two, a local\
        \ inhabited planet where they can start their new life."
      dominant_tone: Tragic with a cynical edge
