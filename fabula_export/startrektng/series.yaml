    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e14
      episode_number: 14
      title: Clues
      logline: When the Enterprise crew loses a day and finds Data acting suspiciously,
        Picard must uncover the truth behind the missing 24 hours to protect his ship
        from a hidden, xenophobic alien species before they can strike again.
      high_level_summary: "The USS Enterprise, under the command of Captain Jean-Luc\
        \ Picard, encounters a small and unstable wormhole near a T-Tauri star system\
        \ within the Ngame Nebula during what was expected to be a routine diplomatic\
        \ mission. Passing through the wormhole, the crew is briefly rendered unconscious.\
        \ Upon revival, Data reports that only thirty seconds have passed, and that\
        \ sensors now indicate the nearby planet is not M-Class as initially thought.\
        \ However, Dr. Beverly Crusher discovers that her Diomedian scarlet moss spores\
        \ have grown at a rate indicating a full day has passed during their brief\
        \ unconsciousness, initiating Picard's inquiry.\n\nPicard assembles his senior\
        \ staff to investigate the discrepancy. Data attempts to explain the temporal\
        \ anomaly away, but Geordi La Forge and Dr. Crusher's investigations reveal\
        \ inconsistencies that strongly suggest Data altered the ship's logs and that\
        \ the crew experienced a missing day. Beverly determines that the crew's circadian\
        \ rhythms are off, signifying a longer period of unconsciousness than reported,\
        \ and Geordi discovers the ship's computer logs were tampered with, leading\
        \ Picard to suspect Data's involvement.\n\nAs the investigation progresses,\
        \ Picard confronts Data, who refuses to provide direct answers, citing potential\
        \ harm to the crew. Counselor Troi experiences a disturbing hallucination\
        \ involving her reflection that unnerves the crew further, and Worf discovers\
        \ that he suffered a broken wrist during the missing day. Data's behavior\
        \ and the mounting evidence cause Picard to relieve Data of duty as Data declines\
        \ to offer an explanation.\n\nGeordi discovers the image from the probe's\
        \ data does not match the Neptune-like planet. Picard confronts Data again\
        \ who states he is operating under orders. Picard, Beverly and Worf discuss\
        \ the potential implications of what may have occurred; Data's refusal to\
        \ divulge information, the tampering with ship's logs and the possibility\
        \ of everyone onboard having been conscious. \n\nReturning to the T-Tauri\
        \ system, the Enterprise encounters an energy field. As the ship is scanned,\
        \ Data reveals the energy field is being projected by the inhabitants of the\
        \ M-Class planet. Data explains that the planet is inhabited by the Paxans.\
        \ The Paxans are xenophobic isolationists who capture ships that enter their\
        \ space, rendering the crews unconscious and erasing memories of the event.\
        \ Data managed to revive the crew after the initial encounter, but Troi under\
        \ the influence of the Paxans threatens the Enterprises' destruction to eliminate\
        \ potential exposure. \n\nPicard realizes that the Paxans' goal is to remain\
        \ hidden, and the memory alteration supresses evidence of their existence.\
        \ He convinces the Paxan entity inhabiting Troi to allow the Enterprise crew\
        \ to forget their encounter and orders Data to conceal the truth about the\
        \ Paxans, as Data is unaffected when the crew's short-term memories erased.\
        \ The Enterprise resumes its journey, with the crew unaware of the events\
        \ of the missing day. Only Data and Picard know the truth, with Data bound\
        \ by Picard's order to keep the secret, and the Enterprise continues toward\
        \ its destination ignorant of a second alteration. \n"
      dominant_tone: Gritty yet redemptive
