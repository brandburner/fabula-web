      high_level_summary: The Enterprise investigates the USS Lantree, finding its
        crew rapidly aged to death. Tracing the ship's last stop to a genetic research
        station, they discover the outbreak stems from engineered children whose hyper-immune
        systems attack human DNA as foreign pathogens. Dr. Pulaski exposes herself
        to the contagion to study it, accelerating her own aging process. With the
        station quarantined, Picard must defy Starfleet protocols and harness unproven
        transporter technology to filter out the genetic alterations and save Pulaski.
        The crisis forces the crew to reconcile scientific ambition with ethical responsibility,
        while cementing Pulaski's place on the Enterprise through her self-sacrifice
        and Picard's risky leadership. Subplots explore workplace dynamics as Geordi
        mentors a brilliant but disruptive engineer and Riker's flirtations create
        professional complications. The resolution demonstrates the franchise's core
        themes of humanity's potential and perils when manipulating biology.
