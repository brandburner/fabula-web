    episodes:
    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e01
      episode_number: 1
      title: Redemption II
      logline: Captain Picard, suspecting Romulan aid to the Duras family in the Klingon
        civil war, risks a confrontation by establishing a blockade, while Worf grapples
        with divided loyalties and Data confronts prejudice as he commands a starship.
      high_level_summary: "As the Klingon civil war escalates, Captain Picard suspects\
        \ Romulan involvement and convinces Starfleet to establish a blockade along\
        \ the Romulan-Klingon border. Picard assembles a fleet, including the Excalibur\
        \ under Riker's command and the Sutherland, captained by Data, who faces prejudice\
        \ from his first officer, Hobson. Worf, torn between his Starfleet duty and\
        \ loyalty to his brother Kurn, aids Gowron, but becomes entangled with the\
        \ Duras sisters, Lursa and B'Etor, who seek to exploit him. \n\nPicard's strategy\
        \ involves using a tachyon detection grid to expose cloaked Romulan ships.\
        \ Sela, the Romulan commander and daughter of Tasha Yar, appears, demanding\
        \ the Federation withdraw. Picard learns from Guinan that Tasha Yar traveled\
        \ back in time aboard the Enterprise-C and became Sela's mother after being\
        \ captured by the Romulans, creating a personal connection to the conflict.\n\
        \nSela attempts to break the blockade by disabling part of the tachyon net,\
        \ targeting Data's ship. Data, defying orders to retreat, uses innovative\
        \ sensor techniques to detect the cloaked Romulan ships, revealing their presence.\
        \ Sela orders the Romulans to retreat, abandoning the Duras sisters. Back\
        \ on the Klingon homeworld, Worf is captured by the Duras family but is later\
        \ rescued by Kurn. Gowron defeats the Duras forces, securing his position\
        \ as leader. He gives Worf the opportunity to execute Toral, the son of Duras,\
        \ but Worf chooses to spare his life, rejecting the Klingon code of vengeance.\
        \ Picard commends Data for his actions, acknowledging the importance of independent\
        \ judgment. The Federation fleet returns to Federation territory, having exposed\
        \ Romulan interference and allowed the Klingons to resolve their conflict."
      dominant_tone: Tragic (with moments of quiet triumph)
      raw_credits_block: |-
