    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e18
      episode_number: 18
      title: Eye of the Beholder
      logline: When Counselor Troi investigates a crewmember's suicide, she taps into
        a dark psychic residue within the Enterprise, forcing her to relive a tragic
        murder from the ship's construction and nearly driving her to self-destruction.
      high_level_summary: Following the shocking suicide of Lieutenant Kwan, Picard
        tasks Troi and Worf with investigating the cause behind his desperate act.
        Kwan's suicide is especially baffling because his personal logs and interactions
        with colleagues paint a picture of a content and well-adjusted officer. As
        Troi delves deeper, she experiences overwhelming emotions of fear, rage, and
        panic while in the nacelle control room where Kwan died. Beverly finds elevated
        levels of psilosynine, a neuro-transmitter involved in telepathy. Worf's scans
        yield nothing, they determine that Kwan's death left an empathic echo, Troi
        being partially Betazoid. She decides to re-enter the nacelle control room
        with Worf as an escort. Troi experiences a vision of two figures in terror,
        not recognizing their significance until later. She also sees another figure
        standing in the room. Picard orders Troi to look over the personnel files
        from Utopia Planitia to see if she can identify any of the faces she saw.
        Beverly synthesizes an inhibitor to mitigate Troi's empathic abilities, allowing
        her to investigate without being overwhelmed. Troi and Worf narrow their search
        and identify Lt. Walter Pierce. Troi struggles to perceive if he is being
        honest. Troi and Worf enter a period of emotional intimacy and share a passionate
        kiss. Troi then takes the inhibitor to enter the nacelle control room, scans
        reveal bone fragments. The fragments matched Ensign Maria Finn. Finn had been
        reported missing. Through a vision, Troi perceives the vision as being that
        of Lt. Walter Pierce. Finn was trying to get away from him. As Troi connects
        with Finn's memories, she finds herself in a hallucinatory state, where Worf
        and Ensign Calloway are having an affair and mocking her. Troi then kills
        Worf in the hallucination. Back in the real world, Worf saves Troi from throwing
        herself into the plasma stream. Further investigation reveals that Pierce,
        Finn, and another man were killed in a plasma discharge. Troi suggests that
        Pierce found out Finn and the other man were having an affair and murdered
        them before ending his own life. Geordi finds empathic signatures. The empathic
        pattern had been transferred when Lt. Pierce was struck. Troi realizes that
        in her hallucination, her mind was trying to paralleling events from Pierce's
        life. Troi mentions she killed Worf in her hallucination. Hell hath not fury
        like a woman scorned, leaving Worf to question what happened.
      dominant_tone: Haunting
