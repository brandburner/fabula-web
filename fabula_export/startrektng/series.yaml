    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e03
      episode_number: 3
      title: Man of the People
      logline: When Counselor Troi becomes the target of Ambassador Alkar, an empathic
        mediator who secretly disposes of his negative emotions onto others to maintain
        his serene facade, Captain Picard and the crew of the Enterprise must race
        to save her before she succumbs to a fatal overload.
      high_level_summary: "The Enterprise is called to assist a transport ship under\
        \ attack near Rekag-Seronia, a planet embroiled in conflict. The transport\
        \ is carrying Ambassador Alkar, a Lumarian mediator, and his imposing mother,\
        \ Sev Maylor, en route to peace negotiations. During transport to the Enterprise,\
        \ Maylor confronts Counselor Troi, exhibiting a disturbing, almost malevolent\
        \ intensity, foreshadowing future conflict.\n\nOnboard, Admiral Simons insists\
        \ Alkar continue to Seronia aboard the Enterprise, despite Alkar's desire\
        \ to travel on a less conspicuous vessel. Throughout the journey, Troi spends\
        \ time with Alkar, and finds the man intriguing. Maylor confronts Troi once\
        \ again. Commander Riker finds himself comforting Troi. An emergency involving\
        \ Maylor leads to her death and adds to the mystery surrounding Alkar and\
        \ his mother.\n\nAs Troi and Alkar prepare for a Lumarian funeral meditation,\
        \ Troi begins to display strange behavior: impatience erupts from her usually\
        \ calm demeanor. Beverly Crusher cannot determine Maylor’s cause of death,\
        \ further compounding the unsettling events. Furthermore, Troi shows increased\
        \ skin damage, signs of aging, during a mirror exercise. Troi becomes increasingly\
        \ assertive, making advances toward Alkar but is rejected. Rejected, Troi\
        \ engages in casual sexual behavior with one of the ship's officers, ensign\
        \ Janeway. Throughout each interaction, Troi's behavior becomes increasingly\
        \ erratic, resulting in emotional outbursts and a physical altercation with\
        \ Riker, shocking those around her.\n\nArriving at Seronia, Alkar's team meets\
        \ with Jarth and Liva, two existing negotiators. Picard suggests Darthen as\
        \ a place for negotiations to begin. A session with Ensign Janeway leads to\
        \ Troi exhibiting erratic, unprofessional behavior. Crusher finds a discrepancy\
        \ between the filter bio readings after Maylor's death further compounding\
        \ issues. As Alkar prepares to go to the surface, Troi's instability culminates\
        \ in a violent attack when she attempts to stab Alkar in the transporter room.\
        \ Crusher stops her, but Picard is injured in the process. \n\nAs Troi is\
        \ placed in confinement, Crusher's investigation reveals inconsistencies with\
        \ Maylor's identity and cause of death, linking her condition to Alkar's unique\
        \ ability to transfer his negative emotions to others. Racing against time\
        \ and Federation protocols, Picard confronts Alkar who freely admits he has\
        \ transferred his negative emotions to others. As Alkar prepares to die, Riker\
        \ and Beverly successfully reverse the flow of transferred emotions. The feedback\
        \ kills Alkar, but not before Liva reverses the conditions. With Alkar eliminated,\
        \ Troi is restored to normal, and the Enterprise continues its mission"
      dominant_tone: Tragic
