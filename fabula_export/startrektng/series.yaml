    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e19
      episode_number: 19
      title: The First Duty
      logline: When a Starfleet Academy training exercise ends in tragedy, Wesley
        Crusher must choose between loyalty to his squadron and revealing the truth
        about a dangerous, forbidden maneuver that led to a classmate's death.
      high_level_summary: "Captain Picard and Beverly Crusher arrive at Starfleet\
        \ Academy where Picard is scheduled to give a commencement address. Their\
        \ visit is overshadowed by a recent accident involving Nova Squadron, Wesley\
        \ Crusher's flight team, which resulted in the death of Cadet Joshua Albert.\
        \ An inquiry is convened to investigate the cause of the accident, led by\
        \ Admiral Brand and Captain Satelk. The initial testimony from the surviving\
        \ members of Nova Squadron, led by Cadet Nicholas Locarno, suggests that Albert\
        \ was responsible for the accident due to his inexperience and a mistake in\
        \ judgement.\n\nAs the inquiry progresses, Picard grows increasingly suspicious\
        \ of the cadets' statements, particularly after navigational satellite data\
        \ contradicts their account of the events. Beverly staunchly defends her son's\
        \ innocence. Picard turns to Boothby, an Academy groundskeeper, for insight\
        \ into Nova Squadron and Locarno's leadership. Boothby reveals Locarno is\
        \ highly admired and capable of influencing his team.\n\nGeordi La Forge and\
        \ Data conduct an independent analysis of the flight recorder, uncovering\
        \ anomalies that Wesley did not report. Picard confronts Wesley with his suspicions,\
        \ accusing him of covering up the truth to protect his squadron. Picard gives\
        \ Wesley an ultimatum: reveal the truth or he will. Wesley is torn between\
        \ his loyalty to Locarno and his duty as a Starfleet cadet.\n\nUnder pressure,\
        \ Wesley confesses to his mother that he has not been forthcoming. Beverly\
        \ vows to defend Wesley, but Wesley insists she stay out of it. \n\nWesley\
        \ ultimately decides to tell the truth. He admits that Nova Squadron attempted\
        \ a dangerous and forbidden maneuver, the Kolvoord Starburst, which led to\
        \ the accident and Albert's death. His testimony reveals that Locarno instigated\
        \ the maneuver and pressured the others to participate and maintain their\
        \ silence. Sito and Hajar corroborate that Wesley is telling the truth about\
        \ the situation. Locarno denies the account and assumes full responsibility,\
        \ preventing any further damage to his teams careers. \n\nAs a result of the\
        \ inquiry, Locarno is expelled from Starfleet Academy and his official records\
        \ are permanently altered. Wesley and the remaining members of Nova Squadron\
        \ receive formal reprimands, lose flight privileges, and Wesley loses all\
        \ of his academic credits from the past year.. Despite the consequences, Wesley\
        \ embraces his actions, accepting the penalties to make up for his mistakes.\
        \ Picard acknowledges Wesley made the appropriate decision."
