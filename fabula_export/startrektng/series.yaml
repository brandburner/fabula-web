    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e07
      episode_number: 7
      title: Reunion
      logline: When Ambassador K'Ehleyr arrives on the Enterprise with her son, Alexander,
        Worf must confront his past relationship and his Klingon honor as Captain
        Picard is drawn into a deadly game of succession, where he must identify which
        of the two, Gowron or Duras, murdered K'mpec.
      high_level_summary: "The Enterprise investigates radiation anomalies when a\
        \ Klingon attack cruiser decloaks and hails them. Ambassador K'Ehleyr requests\
        \ permission to come aboard to discuss an urgent matter. She brings with her\
        \ a young Klingon boy, Alexander, who is revealed to be Worf's son. K'Ehleyr\
        \ informs Captain Picard that the Klingon Empire is at a critical juncture\
        \ and may be facing civil war because K'mpec, the head of the council, is\
        \ dying, and he wishes to meet with Picard alone. \n\nK'mpec tells Picard\
        \ that he has been poisoned and that after he dies, Picard must act in his\
        \ name to arbitrate the struggle for power between Gowron and Duras. K'mpec\
        \ tasks Picard to discover which one of them killed him, stating that the\
        \ assassin must not lead the Empire. Picard reluctantly accepts. Worf struggles\
        \ with the revelation of his son and his dishonor among Klingons, while also\
        \ grappling with his attraction to K'Ehleyr. He witnesses Alexander's lack\
        \ of Klingon ways, which frustrates him.\n\nDuras and Gowron arrive on separate\
        \ Birds-of-Prey, and Picard holds the Rite of Succession. During the ceremony,\
        \ an explosion occurs from where Duras' men are standing. Picard decides to\
        \ hold the first ja'chuq to determine who will succeed K'mpec. Worf connects\
        \ with Alexander, showing him a bat'telh that belonged to his father. Gowron\
        \ attempts to persuade K'Ehleyr to side with him, offering her a seat on the\
        \ Council. Geordi and Data discover that the bomb used during the ceremony\
        \ had a molecular-decay detonator, implying Romulan involvement.\n\nPicard,\
        \ Riker, Data, Worf, K'Ehleyr, and Geordi discuss the possibility of a Klingon\
        \ alliance with the Romulans, and Worf insists that Duras cannot be allowed\
        \ to lead the council. K'Ehleyr attempts to access restricted High Council\
        \ records regarding the Khitomer massacre but is denied access by Duras. She\
        \ confronts Duras, accusing him of betraying his people to the Romulans. He\
        \ threatens her as a result. Beverly determines that one of Duras' men was\
        \ implanted with the bomb. Worf and Alexander arrive at K'Ehleyr's quarters,\
        \ finding her fatally wounded. With her dying breath, K'Ehleyr confirms that\
        \ Duras is responsible. Enraged, Worf declares the right of vengeance, removes\
        \ his Starfleet insignia, and transports to Duras' ship. Worf confronts and\
        \ kills Duras in a duel, avenging K'Ehleyr's death.\n\nPicard reprimands Worf\
        \ for his actions but acknowledges that the High Council considers the matter\
        \ closed. He gives Worf the chance to resign, which Worf declines. Finally\
        \ Picard urges Worf to reveal the truth about his father's innocence now that\
        \ Duras is dead. Worf explains that each member of the Klingon high council\
        \ shared in that lie, and they will not be so willing to admit their own dishonor.\
        \ Worf tells Alexander that he is sending him to live with his human parents\
        \ on Starbase Seventy-Three and finally accepts him as his son, embracing\
        \ him as the *Enterprise* warps off into space."
