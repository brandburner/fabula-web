    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e24
      episode_number: 24
      title: Second Chances
      logline: When a transporter accident duplicates Commander Riker, his life is
        upended by the emergence of his lost twin, who rekindles old flames with Deanna
        Troi, forcing Riker to confront past choices and the road not taken.
      high_level_summary: "The USS Enterprise, under the command of Captain Jean-Luc\
        \ Picard, arrives at Nervala Four to retrieve scientific data from an abandoned\
        \ research station. Commander William Riker leads an away team consisting\
        \ of Data and Worf to the surface, where they encounter a startling discovery:\
        \ a second William Riker, a lieutenant who had been left behind during an\
        \ evacuation eight years prior. This second Riker, weathered and more rugged,\
        \ claims he was the last one to leave the station when the transporter beam\
        \ failed to bring him back to the Potemkin. However, Commander Riker remembers\
        \ making it safely back to the ship.\n\nThe crew of the Enterprise is baffled\
        \ by the existence of two identical Rikers. Dr. Beverly Crusher conducts thorough\
        \ medical and genetic tests, confirming that the two men are virtually indistinguishable,\
        \ with identical brain patterns shaped by the same childhood experiences.\
        \ Geordi La Forge analyzes the Potemkin's transport logs and uncovers a massive\
        \ energy surge in the distortion field around the planet at the moment Riker\
        \ beamed out. The Transporter Chief attempted to compensate with a second\
        \ containment beam, which was reflected back to the surface, materializing\
        \ another Wil Riker.\n\nAs the two Rikers adjust to their shared existence,\
        \ old feelings resurface as Lieutenant Riker encounters Deanna Troi, with\
        \ whom he had a romantic relationship before his ill-fated mission. Their\
        \ reunion stirs up unresolved emotions, further complicating the dynamic between\
        \ the two Rikers. Meanwhile, the Enterprise must retrieve the station's database,\
        \ but the station's computer is only partially operational, requiring the\
        \ assistance of one of the Rikers.\n\nCaptain Picard seeks Counselor Troi's\
        \ assistance to evaluate his counterpart's readiness for duty, triggering\
        \ more complicated emotions. He admits his desire to rekindle their romance,\
        \ challenging the evolved friendship between Troi and Commander Riker. During\
        \ a mission to the station to repair the station's computer, the two Rikers\
        \ clash over their differing approaches and past decisions, culminating in\
        \ a moment where Commander Riker must save Lieutenant Riker's life. This shared\
        \ experience helps them find a measure of understanding and respect for each\
        \ other. Lieutenant Riker, wanting to create his own identity adopts his middle\
        \ name and goes by Thomas or \"Tom\". \n\nUltimately, Lieutenant Riker secures\
        \ a posting on the USS Gandhi, a terraforming vessel, and he prepares to leave\
        \ the Enterprise. Troi and Tom acknowledge the strong connection between them,\
        \ but he prepares to leave the Enterprise. After a poker game where the two\
        \ Rikers lock horns competitively, Riker realizes that Tom will be leaving.\
        \ Tom makes the decision for it, offering the position to Tom.\nOn the eve\
        \ of his departure, Commander Riker gifts him his beloved trombone, a poignant\
        \ symbol of their shared history. Lieutenant Riker, now going by the name\
        \ Thomas, departs from the Enterprise with the hope of a future with Deanna"
      dominant_tone: Melancholic yet hopeful
      raw_credits_block: |-
        STAR TREK: THE NEXT GENERATION
        Second Chances

