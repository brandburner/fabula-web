    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e14
      episode_number: 14
      title: Face of the Enemy
      logline: When Counselor Troi awakens aboard a Romulan warbird surgically altered
        to look like a Romulan, she must maintain her cover while working with a dissident
        sub-commander to help high-ranking Romulan defectors escape to the Federation,
        risking war between the two powers.
      high_level_summary: "Counselor Deanna Troi is abducted and surgically altered\
        \ to resemble a Romulan. She awakens aboard a Romulan warbird, the Khazara,\
        \ and is told by Sub-Commander N'Vek that she is now Major Rakal of the Tal\
        \ Shiar, the Romulan intelligence agency. N'Vek explains that she must give\
        \ the order to Commander Toreth to proceed to the Kaleb sector, course one-oh-two\
        \ mark four. Troi learns she is part of a plan to help Vice Proconsul M'ret,\
        \ a high-ranking Romulan government official, and his aides defect to the\
        \ Federation. M'ret has questioned the Romulan government's repressive policies.\
        \ N'Vek is part of an underground movement led by Ambassador Spock to help\
        \ Romulan dissidents escape. \n\nCaptain Picard and the crew of the Enterprise\
        \ arrive at Research Station seventy-five to pick up Ensign Stefan DeSeve\
        \ to get information about a Corvallen freighter arriving in the Kaleb sector.\
        \ DeSeve tells him that Spock wants the Enterprise to rendezvous with the\
        \ freighter and take its cargo back to Federation space. \n\nTroi, as Major\
        \ Rakal, orders Commander Toreth to change course to the Kaleb sector. When\
        \ the Khazara rendezvous with the Corvallen freighter, Troi realizes the captain\
        \ is lying. Commander N'Vek destroys the freighter at Troi's insistence, killing\
        \ all eighteen people aboard. News of the freighter's destruction reaches\
        \ the Enterprise. DeSeve reveals the freighter is an old Antares-class vessel,\
        \ advising Picard that it must be within fifteen light years of their current\
        \ location. Picard orders a search, during which Data detects a polarized\
        \ magnetic distortion that may be linked to a cloaked Romulan warship.\n\n\
        Troi pressures N'Vek to implement a plan to allow the Enterprise to track\
        \ the Khazara. N'Vek reveals a plan to misalign one of the ship's nullifier\
        \ cores. The Enterprise begins to track the magnetic disturbance created by\
        \ the Khazara. Fearing detection, Toreth prepares to attack the Enterprise,\
        \ but Troi relieves her of duty, assuming command of the warbird. Troi then\
        \ hails the Enterprise stating she is Major Rakal. She proposes discussing\
        \ the destruction of an unidentified freighter so the event won't be exaggerated.\
        \ She requests the shields be lowered so she can beam aboard to discuss matters.\
        \ \n\nAs the Enterprise lowers its shields, Troi orders N'Vek to activate\
        \ the forward disruptor array, but he purposely sabotages the beam. Meanwhile,\
        \ the three Romulan dissidents are transported from the Khazara's cargo bay\
        \ to the Enterprise. Toreth realizes that N'Vek and Troi are traitors. N'Vek\
        \ is killed, and Troi is once again a prisoner. Toreth prepares to execute\
        \ Troi. As the Khazara warps away, Troi is beamed to the Enterprise. Back\
        \ on the Enterprise, Troi explains what happened and reveals that the dissidents\
        \ are safe.\n"
      dominant_tone: Tragic (with elements of moral ambiguity and quiet resilience)
