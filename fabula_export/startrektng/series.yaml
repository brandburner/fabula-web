    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e25
      episode_number: 25
      title: All Good Things...
      logline: As Captain Picard begins erratically leaping through time, he must
        unravel the mystery behind a dangerous spatial anomaly that threatens to erase
        humanity from existence, forcing him to rely on his future and past selves.
      high_level_summary: "Admiral Nakamura alerts Captain Picard to Romulan activity\
        \ and a spatial anomaly appearing in the Devron System, setting off a chain\
        \ of events where Picard begins to move between three different time periods:\
        \ the present, his early days as captain of the Enterprise, and a future twenty-five\
        \ years later. In the past, Picard's crew views him as erratic as he orders\
        \ them to the Neutral Zone, while in the future, he is an old man struggling\
        \ with Irumodic Syndrome. As Picard grapples with his time shifting, he learns\
        \ from Q that humanity is on trial and that he is responsible for their impending\
        \ destruction. \n\nSeeking answers, Picard consults with Data, now a professor\
        \ at Cambridge, and enlists the help of a retired Geordi. Picard must also\
        \ seek help and passage from his former love, Beverly, now captaining a medical\
        \ ship, to enter Klingon space to assess the Devron anomaly. The away team\
        \ is faced with a moral struggle as they meet Worf, now a shell of his former\
        \ self, but Worf agrees to assist them because Picard is clever, as always.\
        \ While Beverly and Picard find warm affection with one another, the events\
        \ take a turn for the worse when they are attacked by Klingon cruisers, resulting\
        \ in damage to the ship's warp core and Beverly's death, but Picard is beamed\
        \ back to the future onto the USS Enterprise. \n\nBack in the present, Picard\
        \ and the crew struggle to find a solution to both the temporal problem and\
        \ the anomaly as it sends temporal waves across the universe. While visiting\
        \ an injured LaForge in Sickbay, Picard visits with Beverly, and she discusses\
        \ recent discoveries about the effects of the temporal anomaly, and then Ogawa\
        \ loses her unborn child, becoming the next victim. Picard also revisits his\
        \ past, entering Q's courtroom; Q explains it's been Picard all along, and\
        \ now the trial has ended; mankind is guilty and has been sentenced to demise.\
        \ Returning to the present once more, Picard is able to reason with his present\
        \ crew and get all three time periods working together to find the source\
        \ of the anomaly. All three Enterprises are able to converge in the Devron\
        \ System to collapse the anomaly and restore the natural flow of time, and\
        \ Q tells Picard the test wasn't about what he did to save them as a species,\
        \ but the potential for expanding his mind. When Picard returns to the moment\
        \ he first began time-shifting, his relationships with the crew shift, and\
        \ he even attends a poker game with his crew--finally showing his humanity\
        \ in a way he'd never attempted."
      dominant_tone: Tragic with redemptive undertones
