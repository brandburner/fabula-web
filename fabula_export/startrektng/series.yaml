      episode_number: 7
      title: Rascals
      logline: When Captain Picard and a shuttle crew are transformed into children
        by a mysterious energy field, they must outwit Ferengi pirates who seize control
        of the Enterprise, all while grappling with the complexities of their altered
        states.
      high_level_summary: "Captain Picard, Guinan, Keiko O'Brien, and Ensign Ro return\
        \ to the Enterprise after a visit to Marlonia. En route, a bright flash engulfs\
        \ their shuttle, causing a sudden jolt and malfunction. As the Enterprise\
        \ attempts to beam them aboard, a transporter malfunction transforms Picard,\
        \ Guinan, Keiko and Ro into twelve-year-old children, while somehow turning\
        \ the plants Keiko carried into mere seedlings. Dr. Crusher confirms that\
        \ their DNA structures now match pre-adolescents, though their minds remain\
        \ adult. \n\nYoung Picard insists on continuing their mission to Ligos Seven,\
        \ where a Starfleet science team sent a distress signal. Despite Beverly's\
        \ concerns, Picard temporarily relinquishes command to Riker. Meanwhile, Young\
        \ Ro and Young Guinan grapple with their youth, while Keiko and O'Brien struggle\
        \ with the implications for their marriage. Geordi and O'Brien discover the\
        \ shuttle was caught in a molecular reversion field, explaining the transformation.\
        \ Beverly believes the Transporter can reverse the damage if the field is\
        \ absent. \n\nArriving at Ligos Seven, the Enterprise is ambushed by Klingon\
        \ ships and boarded by Ferengi pirates led by Daimon Lurin. The Ferengi seize\
        \ control, planning to exploit the planet's Vendarite mineral resources. Riker\
        \ initiates a command lockout, but the Ferengi capture senior officers, including\
        \ Riker and Geordi, and begin transporting the adult crew to the surface to\
        \ be used in the Vendarite mines. All but the children; they are kept aboard\
        \ the ship. \n\nIn the school room, Young Picard, Ro, Guinan, and Keiko plan\
        \ to retake the ship. Guinan suggests they exploit their childish appearance.\
        \ When Berik guards the school room, Young Picard feigns a tantrum, demanding\
        \ to see his \"father\" Riker. Riker, held captive in the observation lounge,\
        \ is forced to play along. Young Picard pleads with Riker to restore access\
        \ to the children's computer, so they may play games. While Riker returns\
        \ to the Bridge, he subtly restores ship control to the crew. Elsewhere, Alexander\
        \ distracts the ferengi guards so that the senior staff can carry out their\
        \ plan. \n\nExploiting the chaos and naivete of the Ferengi, the children\
        \ use a toy with an attached combadge to trick Ferengi guards into the transporter\
        \ room, where they're trapped. Ro and Guinan place combadges on other Ferengi,\
        \ who are consequently beamed away. Finally, with ship control regained and\
        \ Beverly's help, Picard, Guinan, Keiko and Ro are restored to their adult\
        \ forms. Lurin and his crew are apprehended, ready to face Federation justice.\
        \ As the senior staff are returned to normal, both Guinan and Ro reflect on\
        \ their time as children, finding it a little less terrible than either thought\
        \ it would be."
      dominant_tone: Hopeful
