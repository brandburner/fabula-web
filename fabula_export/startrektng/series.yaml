    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e18
      episode_number: 18
      title: Identity Crisis
      logline: When members of a past mission to Tarchannen Three begin transforming
        into a mysterious alien species and disappearing, Geordi La Forge and Susanna
        Leijten must uncover the cause before Geordi succumbs to the same horrifying
        fate.
      high_level_summary: "Five years after the unexplained disappearance of forty-nine\
        \ people from a Federation outpost on Tarchannen Three, Lieutenant Susanna\
        \ Leijten seeks Captain Picard's help when members of her original away team\
        \ start vanishing. The investigation begins with Ensign Hickman, who steals\
        \ a shuttle and heads toward Tarchannen Three, only to crash into the planet's\
        \ atmosphere. Picard, Riker, Data, Worf, Geordi, and Leijten venture to the\
        \ planet's surface, where they find another shuttle and non-human footprints.\
        \ Susanna exhibits strange behavior and is taken back to the Enterprise where\
        \ Doctor Crusher discovers that her blood chemistry is off. Picard orders\
        \ Susanna to remain on the ship. \n\nBack on the Enterprise, Data discovers\
        \ alien skin cells on the torn uniform found on the planet and the away team\
        \ works to identify the source. During their investigation, Susanna's hand\
        \ starts trembling, and she reveals that whatever happened to the others is\
        \ happening to her. Data and Beverly study the data on the monitor, trying\
        \ to find a match to the DNA found. Geordi and Susanna review the old mission\
        \ records, trying to find a commonality between the team members, hoping to\
        \ stop whatever is turning Leijten into something else. Beverly expresses\
        \ concerns about Geordi's safety, and Geordi attempts to analyze the mission\
        \ records to uncover the mystery. Picard and Beverly watch a magnified image\
        \ of a single cell, where Beverly determines that the people who disappeared\
        \ from Tarchannen Three were transformed into another species, not abducted\
        \ from it. Then, Susanna exhibits new physical symptoms, and the transformation\
        \ accelerates. \n\nBeverly and Nurse Ogawa note that Commander Leijten's skin\
        \ starts simulating the light so that a phosphorous trail is left on the skin\
        \ and her body temperature is dropping, as if she if generating a disruptive\
        \ field. Geordi, determined to find a link, discovers a mysterious shadow\
        \ in the old visual record from the original away team. In the holodeck, he\
        \ recreates the scene and isolates the shadow in the recording to pinpoint\
        \ the source. Geordi has a sudden, intense jab of internal pain and sees that\
        \ his middle fingers have fused together. He soon realizes he is also transforming.\
        \ Riker, Worf, and Data search the ship for Geordi, who has left to the planet.\n\
        \nBeverly discovers the way they reproduce is to plant a DNA strand in a living\
        \ host, causing metamorphosis. Susanna, now partially recovered, insists she\
        \ can locate Geordi because now that she's been partially transformed, she\
        \ understands the process. On the planet, Susanna aids the away team, but\
        \ asks to turn off the palm beacons since the light frightens them, and says\
        \ to only use UV light. Susanna coaxes Geordi out of hiding, using her bond\
        \ with him to allow the away team to transport them back to Sickbay, just\
        \ as the changes are about to overtake him entirely. Back on the Enterprise,\
        \ Dr. Crusher cures Geordi, just in time. The threat is over, but the rest\
        \ who were turned into the Tarchannen species will not be able to be turned\
        \ back into humans. Picard orders warning beacons placed in orbit and on the\
        \ surface of the planet, so no one else will have to go through what Geordi,\
        \ Susanna, and the rest experienced."
