    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e23
      episode_number: 23
      title: I, Borg
      logline: When the Enterprise crew discovers a crashed Borg ship and a lone,
        injured adolescent Borg, Captain Picard confronts his traumatic past while
        the crew grapples with questions of compassion and the potential to use the
        Borg's collectivity against them.
      high_level_summary: "The Enterprise investigates a distress signal from a crashed\
        \ Borg scout ship and discovers a severely injured adolescent Borg. Dr. Beverly\
        \ Crusher insists on providing medical aid, leading to ethical and strategic\
        \ dilemmas for the crew. Captain Picard, still haunted by his assimilation\
        \ into the Borg Collective as Locutus, reluctantly agrees to bring the Borg\
        \ aboard the Enterprise. The crew, particularly Geordi La Forge, begins to\
        \ study the Borg, hoping to find a way to introduce a virus into the Borg's\
        \ network that will disable the entire Collective. \n\nAs Geordi works with\
        \ the Borg, whom they name Hugh, he begins to see him as an individual rather\
        \ than a member of a collective. Hugh demonstrates signs of individuality\
        \ himself, learning about concepts like friendship and loneliness. This leads\
        \ Geordi to question the morality of using Hugh as a weapon to destroy the\
        \ Borg. Commander Guinan, a survivor of a Borg assimilation, has her own reservations\
        \ about Hugh, but also recognizes hints of individuality within him.\n\nPicard\
        \ struggles with his own feelings, avoiding direct contact with Hugh until\
        \ Guinan confronts him. Picard and Hugh meet, and Hugh recognizes Picard as\
        \ Locutus. This encounter further complicates Picard's feelings toward Hugh,\
        \ who shows that he has developed a sense of self and rejects his Borg identity,\
        \ and refuses to assist Picard in assimilating the Enterprise. Realizing that\
        \ Hugh is an individual, Picard abandons the original plan to use him as a\
        \ bio-weapon.\n\nThe Enterprise detects a Borg vessel approaching, intent\
        \ on retrieving Hugh. Picard decides to allow Hugh to choose whether to return\
        \ to the Borg or stay with the Enterprise crew. Hugh, understanding the danger\
        \ his presence poses to the Enterprise, decides to return to the Borg. Geordi\
        \ accompanies Hugh back to the crash site and witnesses his re-assimilation\
        \ into the Borg Collective. Before being transported away, Hugh shares a meaningful,\
        \ longing look with Geordi, leaving the crew hopeful that some part of his\
        \ individuality will remain and potentially spread within the Borg Collective,\
        \ thus altering them forever. Picard and the crew decide the most ethical\
        \ choice is to allow Hugh to return to his people unchanged, and to trust\
        \ that the experience of individuality he gained on the Enterprise will subtly\
        \ influence the Borg collective's consciousness."
