    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e18
      episode_number: 18
      title: Starship Mine
      logline: Captain Picard, stranded on the evacuating Enterprise, must stop a
        group of terrorists from stealing trilithium resin while dealing with the
        baryon sweep, all before a mysterious ship arrives to extract them.
      high_level_summary: "As the Enterprise undergoes a baryon sweep at the Remmler\
        \ Array, the crew evacuates, but Captain Picard remains behind to enjoy a\
        \ moment of solitude. This is quickly interrupted by technicians who have\
        \ arrived to install additional field diverters, raising Picard's suspicions.\
        \ Data attempts small talk with Picard, practicing a new subroutine, and Worf\
        \ and LaForge seek permission to avoid a boring reception. \n\nPicard attends\
        \ the reception at Arkaria Base hosted by Commander Hutchinson, where Data\
        \ observes Hutchinson's social techniques. Picard tries to escape Hutchinson's\
        \ chatter by claiming he needs his saddle. Aboard the Enterprise, Picard discovers\
        \ an open junction box and confronts Devor, one of the technicians, leading\
        \ to a fight. Picard learns the technicians are not who they seem when he\
        \ hears them communicating about by-passing the magnetic containment conduit.\
        \  He is trapped as the baryon sweep begins, rendering the transporter useless.\n\
        \nBack at Arkaria Base, Data continues to engage Hutchinson while Riker tries\
        \ to find out what happened to Picard. Geordi notices a suspicious energy\
        \ reading from a table at the reception, and an attack ensues. The Arkarian\
        \ waiter and Orton reveal themselves to be part of the conspiracy, taking\
        \ the crew hostage and killing Hutchinson. \n\nAboard the Enterprise, the\
        \ terrorists, led by Kelsey, take over Main Engineering and plan to steal\
        \ trilithium resin. Picard, posing as a barber named Mott, is captured but\
        \ uses his wits to sabotage their plans, including destroying a field diverter\
        \ designed to protect them from the baryon sweep. He overhears their plan\
        \ to transport the trilithium and tries to stop them, all the while evading\
        \ capture and dealing with the baryon sweep. \n\nAt Arkaria Base, Riker, Troi,\
        \ and Beverly plan a counterattack. Beverly modifies Geordi's VISOR to emit\
        \ a hypersonic pulse. Riker distracts Orton, Beverly activates the VISOR,\
        \ incapacitating everyone except Data who works to stop the incoming ship.\
        \  \n\nPicard continues to thwart the terrorists' plans, using his knowledge\
        \ of the Enterprise and his cunning to outwit them, including creating a diversion\
        \ using chemical compounds. He tries to reason with Kelsey but fails. In Ten\
        \ Forward, Picard sets a trap, incapacitating one of the terrorists, but Kelsey\
        \ escapes with the trilithium. As they are beamed off the ship, Picard removes\
        \ a safety pin from the transport mechanism. Data stops the baryon sweep.\
        \ After the terrorists beam away, their ship explodes, due to the removed\
        \ safety pin. The baryon sweep ends and the Enterprise is safe. Picard's saddle,\
        \ which started the adventure, is returned to him."
