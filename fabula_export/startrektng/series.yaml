    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e22
      episode_number: 22
      title: Imaginary Friend
      logline: When a nebula-dwelling energy being infiltrates the Enterprise and
        manifests as Clara Sutter's imaginary friend, Isabella, Captain Picard must
        convince the alien that humanity's protective nature isn't cruelty before
        it drains the ship's energy.
      high_level_summary: "The Enterprise arrives at the FGC-four-seven nebula, and\
        \ a point of light enters the ship. Meanwhile, Counselor Troi holds a session\
        \ with Clara Sutter, a young girl who has an imaginary friend named Isabella.\
        \ Troi assures Clara's concerned father, Daniel, that imaginary friends are\
        \ normal. The point of light travels around the ship, interacting with various\
        \ objects. In the arboretum, it merges with a flower, creating a duplicate,\
        \ and then enters Clara's head. Suddenly, Isabella materializes as a real\
        \ girl who resembles Clara’s description. Clara is overjoyed, but a change\
        \ occurs within Isabella that slowly becomes known. \n\nClara and Isabella\
        \ begin to spend time together, but Isabella insists on exploring the ship,\
        \ even against Clara's better judgment. They visit Engineering, disrupting\
        \ the work being done by Geordi, Data, and Daniel Sutter. The ship experiences\
        \ strange disturbances, including a drop in forward velocity that returns\
        \ to normal just as mysteriously.\n\nPicard, Riker, Data, and Geordi discuss\
        \ the strange happenings and decide to continue investigating the nebula.\
        \ Clara and Isabella continue their explorations, with Isabella becoming increasingly\
        \ serious and demanding. She is shown to dislike adults and engineers a situation\
        \ that forces Clara to defend the people and rules she knows. \n\nData and\
        \ Guinan observe the nebula in Ten Forward, discussing the human tendency\
        \ to find patterns in randomness. Clara enters, bringing Isabella with her.\
        \ Guinan is the first adult that does not dismiss Isabella outright. Troi\
        \ arrives and takes Clara for a walk, then explains to Sutter that she is\
        \ growing concerned by Isabella's influence. Troi tries to suggest that Clara\
        \ play with “real” friends instead. After Troi leaves, Isabella manipulates\
        \ Clara, attempting to sway her back to her side. Troi then invites Clara\
        \ to join a ceramics class. Angered by Clara's departure, Isabella experiences\
        \ a surge of rage, her eyes glowing red.\n\nAs the Enterprise moves deeper\
        \ into the nebula, the ship begins to tremble. Geordi and Sutter discover\
        \ that the ship is running into strands of plasma that exist due to the unique\
        \ nature of the nebula. Picard orders them to illuminate any additional strands,\
        \ resulting in the discovery of an incredible latticework of energy. Troi\
        \ talks to Guinan about her concerns regarding Clara and Isabella. Again,\
        \ Isabella's anger flares, and events start happening to create conflict and\
        \ discord. Clara attempts to join the children in their art projects, but\
        \ Isabella ruins the effort and lashes out at Clara. Frightened and confused,\
        \ Clara runs to the arboretum, where a now enraged Isabella confronts her,\
        \ revealing her true alien nature and threatening the safety of the ship.\n\
        \nTroi and Susanna return to the Sutter’s quarters. There they seek the young\
        \ girl out, but Isabella is waiting behind them and attacks Troi with a strand\
        \ of energy. Troi is knocked unconscious. Worf confirms he saw Isabella near\
        \ Engineering days before, and a security alert is raised. After Clara explains\
        \ that Isabella's feelings were hurt, Picard seeks Isabella out in the arboretum.\
        \ She appears and explains she was determining whether the crew were a threat.\
        \ Picard and Isabella debate humanity’s good and ill will. Picard makes a\
        \ case that the crew aren’t intentionally malicious, but attempting to create\
        \ safe boundaries for all, and Isabella releases the Enterprise from the influence\
        \ of the energy strands. Clara and Isabella say goodbye. In the end, the Enterprise\
        \ exits the nebula, and the crew continues on its mission."
