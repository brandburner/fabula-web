    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e26
      episode_number: 26
      title: Descent, Part I
      logline: When the Enterprise investigates a brutal attack, they discover a horrifying
        new breed of Borg, leading Data to experience his first emotion, a violent
        rage, and setting in motion a chain of events that culminates in Data joining
        forces with his evil twin, Lore.
      high_level_summary: "The USS Enterprise responds to a distress call from a Federation\
        \ outpost only to find it decimated by a new type of Borg, exhibiting individuality\
        \ and heightened aggression. During the encounter, Data experiences his first\
        \ emotion: anger, which arises when he brutally defeats a Borg in hand-to-hand\
        \ combat. Disturbed by this development, Data requests temporary leave to\
        \ understand his newfound emotions.\n\nMeanwhile, Starfleet, led by Admiral\
        \ Nechayev, prepares for further Borg incursions. Nechayev confronts Picard\
        \ about his past decision to release Hugh, a Borg who had developed individuality,\
        \ emphasizing the need to prioritize the Federation's safety above all else.\
        \ Picard grapples with the moral implications of his decision, questioning\
        \ if he made the right choice.\n\nData consults with Counselor Troi, attempting\
        \ to understand his anger and explore other emotions. Despite his efforts,\
        \ he finds himself drawn to the darker side of emotion, specifically the satisfaction\
        \ derived from violence. The Enterprise investigates the Borg's escape method\
        \ and discovers a network of transwarp conduits. Another attack happens, and\
        \ the Enterprise rushes to intercept. \n\nWhile scanning a Borg in custody,\
        \ Data experiences a shift, influenced by the Borg's words. Data's cat, Spot,\
        \ hisses and runs away from him, and Data seems pleased by this reaction.\
        \ Data disables the tractor beam and leaves the ship with Crosis in a shuttle.\
        \ Geordi analyzes a conduit that the Borg used. The Enterprise follows them\
        \ into one of these conduits, traveling an immense distance. The crew discovers\
        \ the shuttle's energy signature leading to a planet, and they find evidence\
        \ of destruction. Riker leads an away team to search for Data, while Picard,\
        \ Troi, and Geordi split off.\n\nAs different teams search the planet surface,\
        \ Picard's team discovers a mysterious, well-maintained building that turns\
        \ out to be shielded from sensors. Inside, they are ambushed by the new Borg,\
        \ with Data appearing on a platform, now aligned with his evil twin brother,\
        \ Lore. Lore reveals that they will destroy the Federation, and Data states\
        \ that the Sons of Soong are together, sending the Borg into a screaming approval.\
        \ The episode ends on a cliffhanger, with Picard facing the corrupted Data\
        \ and Lore, leaving the fate of the Federation uncertain."
      dominant_tone: Tragic
      raw_credits_block: |-
        STAR TREK: THE NEXT GENERATION
        Descent, Part I

