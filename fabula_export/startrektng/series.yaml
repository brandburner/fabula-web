    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e06
      episode_number: 6
      title: Phantasms
      logline: When Data's nightmares begin to manifest in the real world, endangering
        the Enterprise crew, he must delve into the meaning of his dreams to uncover
        and combat a hidden interphasic threat that is consuming the ship.
      high_level_summary: "The Enterprise is preparing to test its new warp core when\
        \ Data begins experiencing disturbing nightmares, a first for the android.\
        \ These nightmares involve dismemberment, strange workmen, and a menacing\
        \ ringing sound. Simultaneously, Captain Picard is reluctantly preparing to\
        \ attend an annual Starfleet Admiral's banquet. The new warp core malfunctions\
        \ during its initial test, delaying the Enterprise and preventing Picard from\
        \ attending his engagement. Data consults with Counselor Troi about his nightmares,\
        \ and she encourages him to explore them further. He later seeks guidance\
        \ from a holodeck simulation of Sigmund Freud, which proves unhelpful. \n\n\
        As the Enterprise remains stranded, Data's nightmares intensify, bleeding\
        \ into reality. He experiences waking dreams where he sees disturbing images\
        \ on his crewmates, such as a mouth on Troi's shoulder and a straw in Riker's\
        \ head. He attacks Troi, driven by an uncontrollable urge to eliminate what\
        \ he perceives as a threat. After being subdued, Data is confined to his quarters\
        \ while the crew tries to understand what is happening to him. Dr. Crusher\
        \ discovers that the crew is being infested by interphasic creatures that\
        \ are slowly causing cellular degradation. \n\nPicard and the crew realize\
        \ that Data's waking dreams are somehow connected to the creatures. They link\
        \ Data's neural net to the holodeck to observe his dreams in real-time. Inside\
        \ Data's dream, Picard and Geordi witness the bizarre imagery and try to decipher\
        \ its meaning. They discover that the dream elements symbolize the interphasic\
        \ creatures and their method of extracting cellular peptides. Picard figures\
        \ out they must respond to the dream and Data's shriek, hurting the workmen\
        \ in his dreams, as they represent the creatures attacking the ship. Data\
        \ then emits a high-frequency interphasic pulse, which eliminates the creatures\
        \ from the crew. \n\nThe crew traces the origin of the creatures to a warp\
        \ plasma conduit manufactured with a new interphasic fusion process. With\
        \ the threat resolved, the Enterprise prepares for warp again. Picard, no\
        \ longer needing to delay, resigns himself to attending the Admiral's banquet.\
        \ Data, having confronted his nightmares and contributed to saving the ship,\
        \ reflects on his experience with Troi and begins to consider the implications\
        \ of his own evolving psyche."
      dominant_tone: Tense, with moments of quiet vulnerability and hard-won resolve
      raw_credits_block: |-
