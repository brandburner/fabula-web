    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e04
      episode_number: 4
      title: Relics
      logline: When the Enterprise discovers a Dyson Sphere and the long-lost USS
        Jenolan, they revive Captain Montgomery Scott from a 75-year stasis in a transporter
        buffer, only to find he struggles to adapt to the 24th century and his own
        obsolescence.
      high_level_summary: "The Enterprise, while traveling at warp speed, discovers\
        \ a distress signal originating from the U.S.S. Jenolan, a Federation transport\
        \ ship missing for seventy-five years. The signal leads them to an enormous\
        \ Dyson Sphere. Upon investigation, they find the crashed Jenolan and revive\
        \ Captain Montgomery Scott, who had ingeniously kept himself alive in the\
        \ ship's transporter buffer since the crash. \n\nScott is initially excited\
        \ and fascinated by the advanced technology of the Enterprise, but soon feels\
        \ out of place. He tries to assist Geordi La Forge in Engineering, but his\
        \ old-fashioned methods clash with the modern systems, leading to friction\
        \ and feelings of inadequacy. Counselor Troi attempts to help Scott adjust,\
        \ but he rebuffs her efforts, feeling misunderstood. Seeking solace, Scott\
        \ tries a synthetic drink in Ten Forward, then retreats to a holodeck simulation\
        \ of the original Enterprise bridge, where Captain Picard finds him. Picard\
        \ empathizes with Scott's feelings of displacement, sharing his own longing\
        \ for his first command. \n\nRecognizing Scott's need to feel useful, Picard\
        \ asks Geordi to work with him to retrieve data from the Jenolan's damaged\
        \ computer core. Initially hesitant because of their earlier conflict, Geordi\
        \ agrees. While working on the Jenolan, they deduce that the Dyson Sphere\
        \ is drawing energy from its star in an unstable way. When the Enterprise\
        \ is pulled inside the sphere by an automated system, Scott and Geordi work\
        \ together, combining old and new technologies to devise a risky plan that\
        \ that allows the Enterprise to escape. Scott uses the Jenolan to trigger\
        \ a response from a communications array, opening a hatch and attempting to\
        \ hold it open long enough for the Enterprise to exit.  During the mission,\
        \ Scott and Geordi develop a newfound respect for each other's engineering\
        \ skills and approaches. \n\nIn the end, the Enterprise escapes the Dyson\
        \ Sphere, but the Jenolan is destroyed in the process. Picard offers Scott\
        \ a shuttlecraft. Scott decides to postpone his retirement and explore the\
        \ galaxy anew, carrying with him a renewed sense of purpose and the understanding\
        \ that his experience and ingenuity still have value. The episode closes with\
        \ Scott embarking on a solo journey, ready to face the challenges of a future\
        \ he now feels more equipped to handle."
      dominant_tone: Hopeful
