    - fabula_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e24
      episode_number: 24
      title: The Mind's Eye
      logline: When Geordi La Forge returns from a Risa vacation seemingly refreshed,
        the Enterprise investigates Federation weapons found in rebel hands, unaware
        that Geordi has been brainwashed by Romulans to trigger a war between the
        Federation and the Klingon Empire.
      high_level_summary: "Geordi La Forge returns from a relaxing vacation on Risa,\
        \ seemingly refreshed, while the Enterprise is ordered to mediate a dispute\
        \ between the Klingon Empire and a rebellious colony, Krios. Klingon Ambassador\
        \ Kell accompanies the Enterprise, investigating claims that the Federation\
        \ is secretly aiding the Kriosian rebels. Governor Vagh of Krios presents\
        \ evidence: Federation medical supplies and phaser rifles found in rebel hands.\n\
        \nAs Geordi reintegrates into the crew, Data detects strange energy fluctuations,\
        \ dubbed E-band emissions, originating from within the Enterprise and from\
        \ the planet's surface. The investigation into the phaser rifles reveals that\
        \ they are Romulan replications using stolen Federation technology, charged\
        \ with Romulan energy sources, hinting at a Romulan plot to destabilize the\
        \ Federation-Klingon alliance.\n\nMeanwhile, Geordi experiences unsettling\
        \ events. In Ten Forward, he is compelled to attack Chief O'Brien in a holodeck\
        \ simulation under the control of Romulans. It becomes clear that Geordi is\
        \ being manipulated. Picard receives Governor Vagh and Ambassador Kell to\
        \ discuss the evidence. Geordi, seemingly normal, is present during the meeting,\
        \ but the Romulan influence remains undetected.\n\nAs the Enterprise investigates\
        \ the energy emissions, they trace a power surge back to Cargo Bay Four, where\
        \ unauthorized modifications to the transporter system have occurred, resulting\
        \ in weapons being beamed to the planet. Geordi is initially involved in the\
        \ investigation, but the evidence also points to him as a suspect. Worf is\
        \ ordered to intercept Geordi. Data discovers that the E-band emissions match\
        \ human neural frequencies, further realizing that they're being used to directly\
        \ control Geordi through his VISOR.\n\nAmbassador Kell's quarters are found\
        \ to be the origin point of the E-band transmissions. Kell is transporting\
        \ to the planet with Governor Vagh. Geordi is ordered to assassinate Vagh\
        \ to further destabilize the Federation-Klingon alliance. Geordi attempts\
        \ to follow through with the assassination, but Worf intervenes, saving Vagh's\
        \ life. Data reveals that Geordi was abducted and conditioned by the Romulans.\
        \ Data determines that both Picard and Kell were in close proximity to Geordi\
        \ when E-band transmissions were recorded and that one of them must be an\
        \ accomplice, and possess an E-band transmitter. \n\nVagh orders his guards\
        \ to seize Kell, to be subjected to a search, to which Kell requests asylum,\
        \ which Picard denies until Kell can prove he is absolved of the crime. Kell\
        \ is taken into Klingon custody, therefore proving his guilt and allegiance\
        \ to the Romulans. The episode concludes with Deanna Troi counseling Geordi,\
        \ who struggles to reconcile his real memories with the implanted ones, unsure\
        \ of his own mind, in an attempt to reconstruct and reconcile what he experienced."
