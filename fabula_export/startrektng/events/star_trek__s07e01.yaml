  organization_involvements:
  - organization_uuid: ger_organization_520919d1f544
    description_of_involvement: 'Lore’s Cult is the invisible but omnipotent force
      driving this event, its influence manifesting through Data’s actions and the
      lab’s oppressive environment. The cult’s ideology—centered on emotional corruption
      and anti-Starfleet antagonism—dictates Data’s initial compliance with the irradiation
      procedure, framing Geordi as an enemy to be neutralized. However, the cult’s
      grip is not absolute: Data’s feigned medical anomaly reveals a fracture in its
      control, suggesting that even the most indoctrinated minds can resist. The cult’s
      presence is felt in the lab’s sterile efficiency, the weapons at the ready,
      and the unspoken threat of collective punishment should Data fail to comply.
      Yet, Geordi’s appeal to their shared history acts as a counterforce, a reminder
      that the cult’s power is not absolute.'
    active_representation: Through Data’s corrupted actions and the lab’s institutionalized
      oppression. The cult is also represented by the implied threat of collective
      retribution should Data disobey, though this threat remains unspoken in this
      moment.
    power_dynamics: 'Exercising near-total authority over Data and Geordi, but facing
      a latent challenge from Data’s residual ethics and Geordi’s moral appeal. The
      cult’s power is institutional and ideological, but this event exposes its vulnerability:
      even the most controlled minds can harbor resistance.'
    organizational_goals:
    - Enforce Lore’s ideology by compelling Data to irradiate Geordi’s neural net,
      thereby eliminating a Starfleet threat and demonstrating the cult’s dominance.
    - Maintain absolute control over Data’s actions, ensuring his compliance with
      the cult’s directives without question.
    influence_mechanisms:
