  title: Riker and Worf breach Borg cell
  description: Troi, tending to the injured Geordi, hears phaser fire and approaching
    footsteps outside the Borg cell. Riker and Worf arrive, immediately demanding
    to know Picard’s whereabouts. Troi reveals Data has taken the Captain, prompting
    Worf to deactivate the force field and secure the corridor. Riker assesses Geordi’s
    condition and, with urgency, orders Troi to evacuate him through an air duct while
    he and Worf press onward to locate Picard. The exchange underscores the crew’s
    desperation—Geordi’s injury forces a tactical split, while Riker’s focus on the
    mission over personal safety reflects his leadership under pressure. The scene
    escalates tension by confirming Data’s role in Picard’s disappearance and setting
    up the away team’s fragmented search efforts, each now operating on limited time
    and resources.
