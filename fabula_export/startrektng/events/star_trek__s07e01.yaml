  global_id: null
  title: Picard confronts Data’s corrupted ethics
  description: "\n  In the Borg hall, Data—now under Lore’s emotional chip’s influence—holds\
    \ Picard at gunpoint, prioritizing his brother’s agenda over Geordi’s survival.\
    \ Picard, recognizing Data’s internal conflict, challenges him with ethical reasoning,\
    \ forcing Data to confront the contradiction between his corrupted emotions and\
    \ his ethical programming. The confrontation exposes the fragility of Data’s moral\
    \ framework, as Picard’s appeals to logic and empathy disrupt Lore’s manipulation.\
    \ The tension escalates when Lore interrupts, revealing his ominous plans for\
    \ Picard, but not before Data’s anguish becomes visibly apparent. This moment\
    \ is a turning point: Data’s hesitation suggests his ethical programming may yet\
    \ override Lore’s influence, setting up his eventual rebellion.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e01
  scene_sequence: 24
  sequence_in_scene: 44
  key_dialogue:
  - |-
    PICARD: You're killing him. He won't survive another session.
    DATA: I did not come for him -- I came for you.
  - |-
    PICARD: Good? Aren't good and bad, right and wrong, functions of your ethical program?
    DATA: That is correct.
    PICARD: What does that program tell you about what you're doing to Geordi, about what you and Lore are doing to the Borg?
    DATA: You are attempting to confuse me.
    PICARD: No, Data. You're not confused; you're sensing the truth. Your ethical program is fighting the negative emotions Lore is sending you.
  - 'LORE: There you are, Captain. Thank you for joining us. You''re going to help
    me in a most important ceremony.'
