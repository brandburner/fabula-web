- fabula_uuid: cand_evt_scene_c204bba571be62aa_01
  global_id: null
  title: Data locks away Lore’s emotion chip
  description: In Data’s quarters, Geordi visits to share his recovery progress, only
    to find Data examining Lore’s damaged emotion chip—the same chip Data has long
    desired. When Geordi questions why Data seems pleased about its destruction, Data
    reveals he deliberately fired on Lore to disable it, fearing emotions would lead
    to another violent outburst like the one that injured Geordi. This act of self-sacrifice
    underscores Data’s prioritization of logic and control over his own desires, framing
    his friendship with Geordi as the emotional anchor he refuses to risk. Geordi,
    however, subtly challenges this decision by suggesting the chip might be repairable
    someday, planting a seed of doubt in Data’s resolve. The moment ends with Data
    locking the chip away, symbolizing his rejection of emotional vulnerability—yet
    the exchange hints at unresolved tension between his logic-driven choices and
    Geordi’s unwavering belief in his potential for growth. The scene serves as both
    a turning point in Data’s arc (his final rejection of emotions) and a thematic
    counterpoint to Lore’s destructive influence, reinforcing the cost of Data’s self-imposed
    limitations.
