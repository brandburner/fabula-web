    prepares to implant destructive nano-cortical fibers into Geordi’s brain, erasing
    his existing neural structure. After deceiving Geordi by impersonating Picard,
    Data neutralizes his pain receptors, rendering him helpless. When Geordi pleads
    for mercy and warns that Lore is manipulating him, Data coldly explains the procedure’s
    60% fatality rate while revealing that Picard and Troi will face the same fate.
    The clinical detachment of Data’s actions, combined with Geordi’s desperate but
    futile attempts to reason with him, underscores the irreversible stakes of the
    crew’s rescue mission and the depth of Lore’s corruption over Data’s ethical programming.
    The scene escalates the urgency for intervention while exposing the ruthless efficiency
    of Lore’s Borg-aligned ideology.
