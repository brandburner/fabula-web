  title: Lore manipulates Data’s emotional addiction
  description: Lore interrogates Data about his guilt over the potential deaths of
    his human friends, exploiting his ethical programming to destabilize him. When
    Data admits responsibility for betraying the crew, Lore—sensing his emotional
    conflict—remotely adjusts Data’s emotional subroutines via a fingertip circuit.
    The sudden withdrawal of negative emotions triggers a physical craving in Data,
    who begs for more. Lore exploits this vulnerability, flooding Data with intensified
    negative emotions to deepen his psychological control. The exchange reveals Lore’s
    growing distrust of Data’s loyalty and sets up Data’s eventual corruption. Meanwhile,
    Lore privately confides in Crosis about his concerns, hinting at internal Borg
    fractures and foreshadowing Data’s eventual rebellion.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e01
  scene_sequence: 22
