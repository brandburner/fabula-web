  title: Borg threat forces emergency evacuation
  description: "\n  The scene opens with Riker and Worf on the planet's surface, unable\
    \ to raise Picard’s team via comms—a critical failure that immediately raises\
    \ tension. Back on the *Enterprise*, Beverly Crusher, now acting captain, attempts\
    \ to contact Picard but receives no response, prompting Taitt to confirm the absence\
    \ of any comm signals from the away team. The situation escalates when Taitt detects\
    \ an incoming Borg ship, triggering a Red Alert. Beverly’s leadership is tested\
    \ as she must balance the urgency of the Borg threat with the need to rescue stranded\
    \ crew. She orders Salazar to initiate emergency evacuations via transporter,\
    \ prioritizing the safety of the away teams. Meanwhile, Riker, recognizing the\
    \ severity of the situation, makes a decisive call: he orders Armstrong’s team\
    \ to prepare for transport while he and Worf remain behind to search for Picard.\
    \ Beverly reluctantly agrees to depart orbit, though she is visibly conflicted,\
    \ underscoring the high-stakes moral dilemma of leaving crew behind. The scene\
    \ culminates with Taitt’s nervous report that the Borg ship is powering up its\
    \ weapons, leaving the *Enterprise* with mere seconds to act. This moment marks\
    \ a turning point, shifting the narrative from investigation to survival as the\
    \ Borg threat becomes an immediate, existential danger.\n  "
