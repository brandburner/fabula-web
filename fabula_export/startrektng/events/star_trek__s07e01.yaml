  global_id: null
  title: Hugh disarms Lore to save Data
  description: In the Borg Hall, Lore orders Data to execute Picard as a test of loyalty,
    but Data refuses, declaring the act 'wrong.' Lore, disappointed, prepares to kill
    Data himself, only for Hugh—a previously antagonistic Borg—to intervene at the
    last moment, physically disarming Lore and halting the execution. The act sparks
    chaos as Riker and Worf, hidden in the hall, open fire, triggering a melee among
    the Borg. Hugh’s defiance exposes Lore’s fragility and fractures the Borg’s unity,
    marking a turning point in the conflict between emotion and logic. Data, momentarily
    spared, is left stunned as Lore vanishes into the chaos, setting up a desperate
    pursuit. The scene underscores Hugh’s moral evolution and the fragility of Lore’s
    control over the Borg, while Riker and Worf’s intervention escalates the confrontation
    into full-scale violence.
