      conventional Starfleet tactics.
    - Exploit the sun’s electromagnetic interference to break the Borg’s pursuit and
      buy time for survival.
    influence_mechanisms:
    - Through Beverly’s leadership and the crew’s disciplined execution of orders,
      even in the face of extreme risk.
    - Via Starfleet’s emphasis on personnel recovery and resilience, which shapes
      Beverly’s refusal to abandon the survivors.
    institutional_impact: The crew’s actions reflect Starfleet’s core values—loyalty,
      adaptability, and a willingness to take extreme measures to protect lives—but
      also highlight the limitations of protocol in the face of an existential threat
      like the Borg.
    internal_dynamics: The crew’s trust in Beverly’s leadership is tested, but their
      discipline and loyalty to Starfleet’s principles ultimately hold. There is no
      internal debate or factional disagreement—only a unified front in the face of
      the Borg’s assault.
