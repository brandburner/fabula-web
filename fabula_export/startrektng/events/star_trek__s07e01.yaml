      \ worth a try.’ But the moment is shattered as Data enters. She watches, horrified,\
      \ as he takes Geordi, her body tensing as if she could intervene through sheer\
      \ force of will. When the forcefield reactivates, trapping her and Picard, her\
      \ expression darkens with a mix of fear and determination. She knows, as an\
      \ empath, that Data is lost to them—for now. But she also knows that Lore’s\
      \ hold isn’t permanent. There’s still a chance to reach him.\n      "
    beliefs:
    - Data’s emotional core is still intact; Lore’s programming is a layer that can
      be peeled back.
    - The kedion pulse is their best shot, but they’ll need to act fast before Lore
      tightens his grip.
    observed_traits:
