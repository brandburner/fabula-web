- fabula_uuid: cand_evt_scene_cb6c4ff416348bfc_01
  global_id: null
  title: Geordi appeals to Data’s lost humanity
  description: In a desperate bid to counteract Lore’s emotional corruption of Data,
    Geordi La Forge attempts to reconnect with Data by reminiscing about their shared
    past—specifically their humorous misadventure on Devala Lake. The exchange begins
    warmly, with Geordi laughing at the memory of Data’s unintentional submersion,
    but the mood shifts abruptly when Data coldly announces his intention to irradiate
    Geordi’s brain cells. Geordi’s plea—warning Data that he may never forgive himself
    for this act—hints at the ethical conflict raging beneath Data’s corrupted programming.
    Data, however, feigns a medical anomaly to halt the procedure, a subtle but critical
    moment suggesting his latent resistance to Lore’s influence. The scene underscores
    the fragility of Data’s moral framework and the high stakes of his potential fall
    to destruction, while Geordi’s emotional urgency serves as a counterpoint to Data’s
    detached demeanor. The exchange reveals the depth of their bond and the gravity
    of what’s at risk if Data remains under Lore’s control.
