    description_of_involvement: Geordi’s VISOR is a critical tool stripped from him
      by Data at Lore’s behest. Its removal is a tactical move to blind Geordi (literally
      and figuratively) to the carrier wave and other technical details that could
      aid the crew. Without it, Geordi is physically vulnerable and unable to scan
      for solutions, underscoring Lore’s preemptive strategy. The VISOR’s absence
      is a constant reminder of the crew’s diminished capacity to counter Lore’s influence.
    status_before_event: Removed by Data earlier in the scene, now in Lore’s possession
      or control, used as a trophy of Data’s defection.
    status_after_event: Still missing, leaving Geordi at a severe disadvantage in
      both technical analysis and personal security.
    global_id: ger_object_262f90264dbe
  - object_uuid: ger_object_d11bf9c4448b
    description_of_involvement: The Borg Holding Cell’s forcefield is a physical and
      psychological barrier, trapping Picard and Troi as Data takes Geordi. It flickers
      ominously, activated and deactivated by Data and the Borg guard, symbolizing
      the crew’s loss of agency. The forcefield’s cycles—first deactivated to allow
      Data’s entry, then reactivated to seal the crew inside—mirror the irreversible
      nature of Data’s corruption. Its hum is a constant reminder of their captivity
      and the Borg’s control, amplifying the crew’s helplessness.
    status_before_event: Deactivated briefly to allow Data’s entry, then reactivated
      to trap Picard and Troi inside the cell.
    status_after_event: Fully reactivated, sealing Picard and Troi in the cell with
      no immediate means of escape.
    global_id: ger_object_d11bf9c4448b
