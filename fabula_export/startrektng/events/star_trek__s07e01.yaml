- fabula_uuid: cand_evt_scene_d12fbdce2e1efbe7_01
  global_id: null
  title: Beverly Orders Sun Dive to Evade Borg
  description: |2-

      With the *Enterprise* under relentless Borg assault and escape routes exhausted, Beverly Crusher makes a high-stakes decision to activate an untested metaphasic shielding program—a last-ditch effort to survive by flying directly into the sun. The crew, already strained by the escalating crisis, grapples with the risks: Barnaby warns the program is untested, Taitt reports critical hull temperature and radiation levels, and a phaser blast rocks the ship, underscoring the urgency. Beverly, acting as captain, orders the activation despite the unknowns. As the metaphasic shields stabilize the hull temperature, the Borg ship breaks off pursuit, but their continued presence outside the sun’s corona leaves the crew’s survival uncertain. The scene captures Beverly’s leadership under pressure, the crew’s collective desperation, and the precarious balance between survival and annihilation. The event serves as both a turning point—escaping immediate destruction—and a setup for the next crisis: how long can they endure inside the sun before the Borg’s patience runs out or the *Enterprise*’s systems fail?
