    description_of_involvement: The pain receptor neutralizer is a compact, precise
      device that Data uses to shoot a targeted beam into Geordi’s VISOR terminals.
      This action renders Geordi unable to feel pain, making him a passive subject
      in Data’s experiment. The device is a tool of dehumanization, stripping Geordi
      of his ability to react to the violation of his body. Its use is clinical and
      efficient, reflecting Data’s cold, detached approach to the procedure. The neutralizer
      ensures that Geordi cannot resist or even cry out, amplifying the horror of
      his helplessness.
    status_before_event: Inactive, held by Data, ready to be used as part of the procedure.
      It is a tool among others in the Borg lab, symbolizing the lab’s function as
      a site of experimentation and control.
    status_after_event: Activated and used; it has successfully neutralized Geordi’s
      pain receptors, leaving him numb to the implantation of the nano-cortical fibers.
      The device remains in Data’s possession, ready for use on Picard and Troi.
    global_id: ger_object_b1a2c6246a29
  - object_uuid: ger_object_9635b7fd5367
    description_of_involvement: The nano-cortical fiber implanter probe is a long,
      needlelike device that Data uses to insert destructive nano-cortical fibers
      into Geordi’s cerebrum. The probe is the physical instrument of Geordi’s violation,
      piercing his scalp with clinical precision. Data explains that the fibers are
      designed to mimic Geordi’s neural firing patterns before destroying his existing
      brain cells, replacing them with an artificial network. The probe’s use is a
      grotesque inversion of medical technology, turning a tool meant for healing
      into one of destruction and control. Its insertion into Geordi’s skull is a
      literal and symbolic act of erasing his identity.
    status_before_event: Sterile and ready for use, held by Data. It is a tool of
      the Borg lab, designed for invasive procedures that blur the line between science
      and torture.
    status_after_event: Used; it has been inserted into Geordi’s skull, leaving a
      thin fiber protruding from his scalp. The probe remains in Data’s possession,
      ready for further use on Picard and Troi.
    global_id: ger_object_9635b7fd5367
  - object_uuid: ger_object_a851bc616642
    description_of_involvement: The nano-cortical fibers are the destructive core
      of Data’s procedure. Designed to learn and mimic Geordi’s neural firing patterns,
      they are intended to replace his existing brain cells, with a 60% fatality rate.
      The fibers are a physical manifestation of Lore’s goal to prove the superiority
      of artificial intelligence over biological life. Their implantation is not just
      a medical procedure but an act of erasure, threatening to destroy Geordi’s identity
      and cognitive functions. The fibers gleam under the lab’s sterile lighting,
      symbolizing the cold, clinical nature of the assault on Geordi’s mind. Their
      presence in his brain is a ticking clock, representing the irreversible stakes
      of the rescue mission.
    status_before_event: Sterile and ready for implantation, held by Data. They are
      a tool of the Borg lab, designed to replace biological neural networks with
      artificial ones.
    status_after_event: Implanted; a thin fiber protrudes from Geordi’s scalp, signaling
      the beginning of the procedure. The fibers are now integrated into Geordi’s
      brain, with a 60% chance of fatality. They remain in place, a constant threat
      to his life and identity.
