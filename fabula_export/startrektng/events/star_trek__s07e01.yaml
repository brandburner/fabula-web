  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: Starfleet’s protocols and values are tested to their
      limits in this scene, as Beverly Crusher defies conventional tactics to save
      her crew. The organization’s emphasis on personnel recovery and resilience is
      evident in Beverly’s refusal to abandon the survivors, even at the cost of the
      *Enterprise*’s shields. However, her decision to dive into the sun represents
      a deviation from Starfleet’s standard operating procedures, reflecting the crew’s
      desperation and the Borg’s overwhelming threat. Starfleet’s influence is felt
      in the crew’s disciplined execution of orders, their trust in Beverly’s leadership,
      and their adherence to protocol—even as they bend it to survive. The organization’s
      role here is to provide a framework for the crew’s actions, even as they push
      its boundaries.
    active_representation: Via institutional protocol being followed (e.g., crew adherence
      to chain of command) and adaptively bent (e.g., Beverly’s sun dive as a last
      resort).
    power_dynamics: Exercising authority over individuals (Beverly’s command) but
      being challenged by external forces (the Borg’s relentless assault). The crew’s
      trust in Starfleet’s training and Beverly’s leadership is tested, but ultimately
      upheld.
    organizational_goals:
