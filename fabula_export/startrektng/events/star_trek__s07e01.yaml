- fabula_uuid: act_6bc732b3b72f16b4
  number: 6
  summary: 'Trapped within the sun''s corona, the Enterprise''s metaphasic shielding
    begins to fail. Ensign Taitt, demonstrating remarkable ingenuity and confidence,
    proposes a daring plan: to induce a solar fusion eruption that would destroy the
    waiting Borg ship. Despite Lieutenant Barnaby''s skepticism, Beverly approves
    the plan, trusting Taitt''s expertise from her senior thesis. Taitt successfully
    targets the sun''s surface, triggering an enormous solar flare that engulfs and
    obliterates the Borg vessel, securing the Enterprise''s escape. On the planet,
    Data confronts Picard, who, sensing Data''s reactivated ethical program, presses
    him on the morality of his actions against Geordi and the Borg. Data, visibly
    anguished, struggles with the conflict between Lore''s influence and his core
    programming, admitting his actions are wrong. Lore enters, intending to force
    Data to kill Picard as a test of loyalty. Data, after a tense moment, refuses,
    declaring the act "wrong." Crosis attempts to disarm Data, but Hugh, inspired
    by Data''s resistance, intervenes, knocking Lore''s weapon away. Riker and Worf,
    having infiltrated the hall, provide covering fire, initiating a chaotic melee.
    Data pursues Lore to the Borg lab, where Lore attempts to escape and manipulate
    Data with the promise of Soong''s complete emotion chip, including memories. Lore
    secretly cuts off Data''s emotions, causing withdrawal, then attacks. Data, left
    with no choice, fires, fatally wounding Lore. Data deactivates his dying brother,
    who utters a distorted "I love you, Brother." With Lore defeated, Hugh steps up
    to lead the liberated Borg, envisioning a future of cooperation. The Enterprise
    rescues the remaining crew. Data, reflecting on the destructive potential of unchecked
    emotions, decides to relinquish the emotion chip, prioritizing his friendship
    with Geordi and the safety of others over his lifelong dream.'
