  key_dialogue:
  - |-
    LORE: There you are, Brother. Have you made any progress with La Forge?
    DATA: It is too early to tell if the nano-cortical fibers have performed their function.
    LORE: I suspect none of the humans will survive the process... but it's their own fault, isn't it? They should never have come here. What were they thinking?
    DATA: ((quiet)) They came looking for me.
    LORE: Humans are so sentimental.
    DATA: ((firm)) I betrayed them. If they die... I am responsible.
  - |-
    LORE: Why are you talking like this? Is something wrong with your programming? Perhaps I should check your systems.
    DATA: ((firm)) I do not want you to check my systems. I must resolve these issues myself.
    LORE: I think I've made a mistake. I don't believe you can tolerate the amount of emotion I've been giving you.
    DATA: ((after adjustment)) I... do not like it...
    LORE: Ah. Then you prefer having more emotions... ?
    DATA: Yes... Please... I want more...
  - 'LORE: I am concerned about my brother, Crosis. I don''t believe he really wants
    to be a part of our great future.'
