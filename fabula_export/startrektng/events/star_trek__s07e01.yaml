    description_of_involvement: The *Enterprise*’s shields are the crew’s first line
      of defense, but Beverly’s delay in raising them—buying time for the transporter
      chief—proves fatal. When the Borg strike, the shields drop to 70%, and the direct
      hit cripples the port nacelle, leaving the ship exposed. The shields’ failure
      is a narrative turning point, symbolizing the crew’s sudden loss of protection
      and the Borg’s overwhelming power. Their collapse forces Beverly to rely on
      evasive maneuvers and impulse power, a desperate but ultimately futile strategy
      in the face of the Borg’s relentless pursuit.
    status_before_event: At 100% capacity but delayed in activation by Beverly’s order,
      leaving the ship vulnerable during the critical window for the transporter operation.
    status_after_event: Dropped to 70% after the Borg attack, then overwhelmed by
      the direct hit on the port nacelle. The shields flicker and fail, leaving the
      *Enterprise* defenseless against further assaults.
