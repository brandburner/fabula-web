  title: Riker interrupts bridge with urgent comms
  description: 'As Beverly Crusher moves toward the command area on the *Enterprise*
    bridge—having just validated Ensign Taitt’s sensor modifications—a sudden, urgent
    transmission from Riker cuts through the comms. The interruption halts Beverly’s
    momentum, redirecting the crew’s focus from tactical adjustments to the away team’s
    status. Riker’s voice, strained and direct, signals an escalation in the crisis:
    either a tactical update, an emergency, or a deliberate attempt to reassert control
    over the fractured crew’s attention. The timing is critical, as the Borg threat
    looms and the Enterprise’s skeleton crew remains vulnerable. This beat marks a
    narrative pivot, shifting the scene’s focus from internal ship operations to the
    broader, unfolding disaster on the planet’s surface. The interruption underscores
    the crew’s precarious position—isolated, understaffed, and now forced to react
    to external demands while still grappling with their own limitations.'
