- fabula_uuid: act_76c9ef5d6f4c8335
  number: 4
  summary: In the underground caverns, Hugh explains the devastating impact of individuality
    on the Borg collective. He recounts how the voices in their heads became discordant,
    leading to internal conflict, self-shutdowns, and starvation. Hugh blames the
    Enterprise for initiating this chaos, which allowed Lore to appear as a savior,
    promising clarity and purpose through artificial evolution. He shows Riker and
    Worf two horribly disfigured Borg, victims of Lore's "experiments" to remake them
    in his image, solidifying his bitterness. Despite his anger, Hugh, prompted by
    Riker's query about Geordi, reluctantly agrees to show them tunnels beneath the
    compound that connect to the environmental control ducts, offering a potential
    infiltration route. Concurrently, in the Borg lab, Data begins his horrific experiments
    on Geordi, implanting nano-cortical fibers in his cerebrum. Data, emotionless,
    explains the procedure will destroy Geordi's existing brain cells with a 60% chance
    of death, revealing Lore's cold calculation to use humans as test subjects. In
    their cell, Picard and Troi execute a plan to disable a Borg guard, obtaining
    a transceiver from his interlink system. Geordi, briefly returned to their cell,
    identifies it as a potential device to generate the kedion pulse needed to reboot
    Data's ethical program. The Enterprise, meanwhile, returns to orbit, facing the
    Borg ship. Beverly, under fire, initiates evasive maneuvers, but the ship loses
    warp engines. She then sets a desperate course directly into the sun, a move Taitt
    questions, indicating a drastic, high-stakes gamble.
