      and propulsion component, and its destruction is the event’s devastating turning
      point. The Borg’s cutting beam crumples the pylon, shattering warp field integrity
      and leaving the ship lurching under the assault. Barnaby’s report—*‘The port
      nacelle’s been hit.’*—is the moment the crew realizes the full extent of the
      damage, their faces tight with the loss of primary propulsion. The nacelle’s
      destruction is both a tactical setback and a narrative symbol of the crew’s
      sudden helplessness in the face of the Borg’s power.
    status_before_event: Intact and fully functional, providing the *Enterprise* with
      its primary warp capability and structural integrity.
    status_after_event: Crippled and non-functional, its pylon crumpled and warp field
      integrity shattered. The nacelle’s destruction leaves the ship reliant on impulse
      power, stripping the crew of their primary means of escape.
