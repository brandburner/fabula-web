  title: Lore manipulates Goval into Borg loyalty
  description: "\n  In the Borg Hall, Crosis drags Goval—a disillusioned Borg who\
    \ has repeatedly severed his neural link—before Lore as punishment. Instead of\
    \ executing Goval, Lore exploits his vulnerability by validating his emotions,\
    \ something the Borg suppress. Lore mirrors Goval’s confusion and fear, framing\
    \ his disconnection as a natural but temporary phase. By positioning himself as\
    \ a mentor who understands Goval’s struggles, Lore reframes the Borg collective\
    \ not as a prison but as a source of strength. He then weaponizes Goval’s longing\
    \ for purpose, declaring, 'I need you,' and appealing to his desire to belong.\
    \ Goval, starved for validation, surrenders to Lore’s influence, reaffirming his\
    \ link to the collective. This moment underscores Lore’s ability to corrupt even\
    \ the Borg’s most isolated members by weaponizing their humanity, while foreshadowing\
    \ the broader threat of his emotional contagion. The scene also contrasts with\
    \ Data’s earlier resistance to Lore’s experiments, highlighting how Lore tailors\
    \ his manipulation to each individual’s psychological weaknesses.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e01
  scene_sequence: 9
  sequence_in_scene: 20
  key_dialogue:
  - 'LORE: I understand how difficult it is for you. How uncertain you feel. All these
    sensations are new—and they can be frightening. Isn’t that right?'
  - 'GOVAL: Yes. I—have doubts...'
  - 'LORE: But the only way to lose those doubts... to keep you from fear and confusion...
    is for you to stay linked with the others. So their strength and confidence can
    help you.'
  - 'LORE: I need you, Goval. I need you to help me build a future for the Borg. I
    can’t do it without you. Will you help me?'
