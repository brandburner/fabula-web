  title: Salazar reports missing crew members
  description: "\n  The transporter room aboard the *Enterprise* is a scene of controlled\
    \ chaos as the last away teams materialize from the botched extraction mission.\
    \ Salazar, the transporter chief, delivers the grim news: six personnel remain\
    \ unaccounted for. His voice is steady but carries the weight of the failure,\
    \ underscoring the mission’s catastrophic outcome. The officers stepping off the\
    \ pad exchange tense glances, their expressions a mix of relief at their own survival\
    \ and dread for their missing comrades. This moment marks the abrupt transition\
    \ from tactical execution to a desperate recovery effort, with the missing crew\
    \ serving as a ticking clock and a moral imperative. The urgency is palpable—Lore’s\
    \ influence over the Borg looms larger, and the crew’s next move must address\
    \ both the immediate threat and the ethical responsibility to rescue their stranded\
    \ colleagues.\n  "
