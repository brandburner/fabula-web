- fabula_uuid: cand_evt_scene_0024d34ebd98018d_01
  global_id: null
  title: Crusher Delays Shields for Survivors
  description: "\n  Beverly Crusher, acting captain of the *Enterprise*, prioritizes\
    \ rescuing 73 stranded survivors over raising shields against the approaching\
    \ Borg ship. She orders Salazar to continue transporting personnel until the last\
    \ possible moment, despite the escalating threat. When the Borg fire, the *Enterprise*\
    \ takes heavy damage (shields dropping to 70%), but Beverly immediately retaliates\
    \ with a frequency-shift firing pattern—only to discover the Borg’s defenses are\
    \ impenetrable. Forced into a desperate retreat, she orders maximum warp toward\
    \ the conduit, underscoring the crew’s vulnerability against the Borg’s relentless\
    \ efficiency. The scene highlights Beverly’s moral dilemma: compassion vs. survival,\
    \ and the crew’s frustration at their inability to fight back effectively.\n  "
