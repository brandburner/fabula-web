  global_id: null
  title: Hugh Reveals Lore’s Atrocities and Reluctant Aid
  description: In the cavern’s dim light, Hugh’s simmering resentment toward the Enterprise
    crew erupts as he blames Riker and Worf for the Borg’s collapse—his individuality,
    granted by the *Enterprise*, fractured the collective and left them vulnerable
    to Lore’s manipulation. His visceral account of the Borg’s descent into chaos—starvation,
    infighting, and Lore’s brutal experiments—exposes the depth of their suffering,
    forcing Riker to confront his role in their plight. Though Hugh’s bitterness lingers,
    his fear for Geordi’s fate softens his stance. When Riker presses for help infiltrating
    the compound, Hugh reluctantly reveals the cavern’s hidden tunnels, marking a
    fragile shift from hostility to reluctant cooperation. The exchange underscores
    the moral weight of the crew’s actions and the high stakes of their rescue mission,
    as Hugh’s divided loyalty becomes a critical asset in the fight against Lore’s
    tyranny.
