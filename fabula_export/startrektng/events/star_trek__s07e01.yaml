  title: Lore reveals his emotional manipulation
  description: In the Borg Hall, Lore taunts Picard by exposing his possession of
    Hugh’s original emotional program and his orchestration of the Enterprise’s arrival,
    revealing his manipulative control over both Data and the Borg. The confrontation
    escalates as Lore asserts his dominance, claiming to have given the Borg purpose
    and individuality after their collective collapse. Picard challenges Data’s loyalty,
    probing his corrupted state, while Troi senses Data’s emotional turmoil. Lore’s
    revelations deepen the conflict between Data’s loyalty to his brother and his
    ethical programming, setting up the psychological stakes of Data’s internal struggle.
    The scene underscores Lore’s destructive influence and the fragility of the Borg’s
    newfound individuality, while Geordi’s horror at Lore’s staged attacks highlights
    the moral cost of his manipulations. The exchange culminates in Lore ordering
    Data to take Picard and the others away, solidifying his control over the situation
    and the Borg’s allegiance to his vision of artificial supremacy.
