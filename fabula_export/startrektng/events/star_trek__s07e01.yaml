  - 'TAITT: Sir, the Borg ship is powering up its forward weapons array. They''ll
    be in firing range in... in twenty seconds.'
  - 'RIKER: ((firm)) Pull as many people off the surface as you can and get back to
    the transwarp conduit. The Captain''s orders were to get the *Enterprise* to Federation
    space.'
