- fabula_uuid: cand_evt_scene_44c5e78cc92541e3_01
  global_id: null
  title: Data embraces Lore’s ideology and rejects humanity
  description: Picard and Troi attempt to reason with Data, now fully under Lore’s
    influence, as he dismisses his past life on the *Enterprise* and embraces only
    anger and hatred. Geordi accuses Lore of weaponizing Data’s emotions, exposing
    the depth of Data’s transformation. The confrontation escalates when Data, now
    wielding a Borg weapon, forcibly takes Geordi’s visor—a symbolic rejection of
    his former self and a violent assertion of his new allegiance. The scene culminates
    in Data’s declaration that he is no longer their ‘puppet,’ marking his irreversible
    break from the crew and his descent into Lore’s destructive ideology. The emotional
    and thematic stakes are heightened as Data’s moral reasoning is revealed to be
    a corrupted echo of his former ethical programming, now twisted to justify extreme
    sacrifices for a ‘greater good.’
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e01
  scene_sequence: 6
  sequence_in_scene: 11
  key_dialogue:
  - 'PICARD: You must realize that something has happened to you. The Data I know
    would not be a willing party to Lore''s plan.'
  - 'DATA: I now realize that my life aboard the Enterprise was a waste. My quest
    to become human was misguided, an evolutionary step in the wrong direction.'
  - 'TROI: Data, all I''m sensing from you is anger... hatred -- have you felt any
    other emotions?'
  - 'DATA: There are no other emotions.'
  - 'GEORDI: Just because you haven''t experienced certain emotions doesn''t mean
    they don''t exist. Lore is just feeding you the negative ones.'
  - 'DATA: Counselor Troi herself told me that feelings are not positive or negative,
    it is how we act on them that becomes good or bad.'
  - 'PICARD: Fine. Then what about the things Lore is proposing? What about the lives
    that have already been lost?'
  - 'DATA: You do not understand. In a quest such as ours, sacrifices must be made.
    It is regrettable. But the greater good must be served.'
  - 'DATA: Give me your Visor.'
  - 'GEORDI: Why?'
  - 'DATA: Give it to me or I will take it by force.'
  - 'DATA: I am not your puppet anymore.'
