  title: Data kills Lore in self-defense
  description: 'In the Borg lab, Data confronts Lore—who is frantically working a
    console—with a weapon drawn. Lore, sensing Data’s hesitation, manipulates him
    with a false promise: the emotional chip their father created, now offering it
    as a way out. When Data remains unmoved, Lore surreptitiously disables Data’s
    emotions via a hidden fingernail mechanism, leaving him vulnerable. Seizing the
    moment, Lore lunges for a weapon, forcing Data to fire in self-defense. The blast
    critically damages Lore, exposing his flickering circuitry. As Lore lies dying,
    he pleads with Data, confessing love and warning that without him, Data will never
    feel emotion again. Despite his conflicted hesitation, Data deactivates Lore entirely,
    leaving him lifeless. The act shatters Data’s fragile trust in connection and
    forces him to confront the irreversible consequences of his choice—both as a killer
    and as a being now severed from his last familial tie.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e01
  scene_sequence: 27
  sequence_in_scene: 51
  key_dialogue:
  - 'DATA: Lore...'
  - 'LORE: Be careful with that, Brother. Somebody could get hurt.'
  - 'LORE: I have a way out of here. I''m willing to forget about what happened back
    there and take you with me. We don''t need anyone else. We''re Brothers.'
  - 'LORE: I''ll give you the chip our father made. It contains more than just emotions—it
    has memories. Memories our Father wanted you to have.'
  - 'LORE: Without me, you will never feel emotion again.'
  - 'DATA: You leave me no other choice.'
  - 'LORE: I... love you... Brother...'
