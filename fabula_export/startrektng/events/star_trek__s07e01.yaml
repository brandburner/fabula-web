      time from one minute to 45-50 seconds under Beverly’s orders, pushing the system
      to its limits. The transporters hum with energy as they prepare to beam out
      the away team, their success hinging on Barnaby’s orbital maneuver buying the
      critical extra seconds. Without them, Data and the team would be stranded on
      the planet, vulnerable to the Borg.
