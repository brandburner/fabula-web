  object_involvements:
  - object_uuid: ger_object_ca48daf150a7
    description_of_involvement: "\n      The transporters in Transporter Room Three\
      \ and the cargo bays are the lifeline for the 73 stranded survivors, their energized\
      \ beams pulling the away teams from the planet’s surface in the final moments\
      \ before the Borg’s attack. Salazar operates the consoles with precision, ensuring\
      \ the beam-outs are completed despite the Borg ship’s approach. The transporters\
      \ symbolize the crew’s determination to save lives, even at great risk, and\
      \ their efficiency is critical to the rescue’s success.\n      "
    status_before_event: "\n      Fully operational, locked onto the away teams’ coordinates,\
      \ with Salazar and his team ready to initiate the final beam-outs.\n      "
    status_after_event: "\n      Deactivated after the last survivor is beamed aboard,\
      \ the pads now empty as the *Enterprise* prepares for its desperate retreat.\n\
      \      "
    global_id: ger_object_ca48daf150a7
  - object_uuid: ger_object_b6382767d215
    description_of_involvement: "\n      The *Enterprise*’s shields are deliberately\
      \ left down by Beverly to allow the final survivors to be beamed up, leaving\
      \ the ship vulnerable to the Borg’s attack. When the Borg fire, the shields\
      \ drop to 70%, exposing the crew to further danger. The shields represent the\
      \ crew’s vulnerability and the high cost of Beverly’s compassionate gamble.\
      \ Their failure to fully protect the ship underscores the Borg’s overwhelming\
      \ power and the crew’s desperation.\n      "
    status_before_event: "\n      Lowered to allow the transporters to function unimpeded,\
      \ with the Borg ship closing in.\n      "
    status_after_event: "\n      Damaged and at 70% capacity after the Borg’s attack,\
      \ forcing Beverly to order a retreat.\n      "
    global_id: ger_object_b6382767d215
  - object_uuid: ger_object_2bf5d528273b
    description_of_involvement: "\n      The frequency-shift firing pattern is Beverly’s\
      \ retaliatory tactic against the Borg after their initial attack. Taitt executes\
      \ the order, but the Borg’s defenses prove impenetrable, and the phasers fail\
      \ to inflict any damage. This object symbolizes the crew’s futile attempt to\
      \ fight back against an unstoppable enemy, highlighting their technological\
      \ inferiority and the desperation of their situation.\n      "
    status_before_event: "\n      Pre-programmed into the tactical systems, ready\
      \ to be deployed on Beverly’s command.\n      "
    status_after_event: "\n      Deemed ineffective after the failed attack, with\
      \ the crew forced to abandon offensive measures in favor of retreat.\n      "
    global_id: ger_object_2bf5d528273b
