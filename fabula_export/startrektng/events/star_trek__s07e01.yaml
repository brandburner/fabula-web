  - 'GEORDI: You know, Data—I''ve been thinking... about some of the times we''ve
    had together. Like that time we went sailing on Devala Lake. Remember that? You
    decided to take a swim... but when you jumped out of the boat you sank straight
    to the bottom. It took two weeks to get the water out of your servos...'
  - 'GEORDI: ((quiet)) Data... if you ever go back to being the way you were, you
    may not be able to forgive yourself for what you''re about to do to me.'
  - 'DATA: I am getting some anomalous readings from your neural net. I will have
    to do further tests before I proceed.'
