- fabula_uuid: cand_evt_scene_ca7c0c2787fd7d6e_03
  global_id: null
  title: Riker and Worf disrupt Borg Hall execution
  description: "\n  The Borg Hall erupts into chaos when Lore, having failed to coerce\
    \ Data into killing Picard, prepares to execute Data himself as a 'sacrifice'\
    \ to the Borg collective. Hugh intervenes at the last second, disarming Lore,\
    \ but the moment triggers a violent melee as Riker and Worf—hidden in the stage\
    \ area—open fire to protect Picard. The sudden violence fractures the Borg ranks,\
    \ physically separating Data and Lore amid the fighting. Data, momentarily stunned,\
    \ loses sight of his brother in the pandemonium, forcing him to push through the\
    \ chaos in pursuit. The scene marks a critical turning point: Lore’s control over\
    \ the Borg is exposed as fragile, while Data’s internal conflict—between loyalty\
    \ to his brother and his ethical programming—reaches a breaking point. The tactical\
    \ disruption by Riker and Worf not only saves Picard but also accelerates the\
    \ collapse of Lore’s authority, setting the stage for Data’s eventual confrontation\
    \ with his brother.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e01
  scene_sequence: 26
  sequence_in_scene: 50
  key_dialogue:
  - 'LORE: It''s time to put your doubts aside, Brother. It''s time to close the door
    on your past and commit yourself to the great work that lies ahead of us. I need
    to know that I can count on you. As proof, I want you to kill Captain Picard.'
  - 'DATA: No... It would be wrong.'
  - 'LORE: I didn''t think you''d be able to do it. You''ve spent too many years among
    humans.'
  - 'LORE: I''ve asked many sacrifices of you—sacrifices I knew were necessary in
    order to build a better future. I want you to know that I ask no more of you than
    I am prepared to give myself. I am willing to make the greatest sacrifice of all—my
    own dear brother.'
  - 'HUGH: No -'
