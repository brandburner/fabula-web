- fabula_uuid: cand_evt_scene_59e1b5165df92483_03
  global_id: null
  title: Lore asserts ideological dominance over Picard
  description: "\n  In the Borg Hall, Lore systematically dismantles Picard’s moral\
    \ authority by demonstrating his absolute control over Data and the Borg collective.\
    \ The confrontation begins with Lore taunting Picard about his 'followers,' who\
    \ now exhibit violent, emotion-driven behavior—something Picard condemns as mere\
    \ bloodlust. Data, now emotionally corrupted by Lore’s influence, defends his\
    \ brother’s actions, revealing that Lore has reactivated the emotional chip Soong\
    \ designed for him. Lore then reveals the horrifying truth: he orchestrated the\
    \ attacks on Federation outposts solely to lure Data to him, sacrificing countless\
    \ lives for his own ends. When Picard attempts to appeal to Data’s past, Lore\
    \ physically interrupts him, asserting his dominance and framing himself as the\
    \ Borg’s savior. He describes how he found the Borg lost and disoriented after\
    \ Hugh’s individuality spread through the collective, and how he gave them a new\
    \ purpose—one that aligns with his vision of artificial life forms replacing biological\
    \ ones. The scene culminates with Lore ordering Data to take Picard and the others\
    \ away, marking Data’s complete alignment with his brother’s ideology and the\
    \ escalation of Lore’s control over the Borg. The exchange underscores Lore’s\
    \ manipulative genius, his disdain for biological life, and the irreversible corruption\
    \ of Data under his influence.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e01
  scene_sequence: 4
  sequence_in_scene: 9
  key_dialogue:
  - |-
    LORE: What do you think of my followers, Picard? Impressive, aren't they?
    PICARD: I'm not particularly impressed. You've simply taught them to enjoy killing.
    DATA: You are wrong, Captain. My brother and I serve a much higher purpose.
  - |-
    LORE: I told you—I will tell you what you need to know.
    PICARD: How do you like that, Data? He won't even let you talk.
    DATA: Do not try to drive a wedge between us, Captain. I am loyal to my brother.
  - |-
    LORE: The reign of biological life forms is coming to an end. You and those like you are obsolete, Picard.
    LORE: Take them, Brother.
