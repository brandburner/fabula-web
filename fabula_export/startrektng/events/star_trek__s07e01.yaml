  title: Beverly approves Barnaby’s high-risk orbital maneuver
  description: 'With the transporter window closing and the Borg closing in, Beverly
    Crusher orders a desperate orbital maneuver to buy critical seconds for the rescue.
    Salazar estimates 45-50 seconds to lock onto the away team, but Beverly demands
    15 more. Barnaby proposes a high-risk tactic: entering orbit behind the planet’s
    far side and delaying warp drop until the last possible moment. Taitt warns of
    catastrophic atmospheric collision if calculations are off, but Barnaby’s confidence
    pushes Beverly to approve. The crew executes the maneuver, escalating tension
    as the ship’s structural integrity hangs in the balance. This moment underscores
    Beverly’s leadership under pressure and the crew’s willingness to gamble on Barnaby’s
    tactical brilliance—even as Taitt’s skepticism lingers as a subtextual warning
    of potential disaster. The decision directly impacts the rescue’s success and
    sets up the orbital confrontation with the Borg.'
