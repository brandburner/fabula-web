  title: Riker splits forces under Borg threat
  description: "\n  With the Borg ship closing in and Picard’s team unresponsive,\
    \ Riker makes a critical tactical decision to divide his forces. He orders Armstrong’s\
    \ team to evacuate immediately while he and Worf remain behind to search for Picard,\
    \ despite Beverly’s protests. On the *Enterprise*, Beverly reluctantly prepares\
    \ to depart orbit, leaving Riker and Worf stranded on the surface as the Borg’s\
    \ weapons systems activate. The scene escalates tension by forcing a high-stakes\
    \ choice between mission and survival, with Riker prioritizing the Captain’s safety\
    \ over his own. Beverly’s hesitation underscores the moral weight of the decision,\
    \ while Taitt’s nervous but accurate detection of the Borg threat adds urgency.\
    \ The moment sets up a thematic parallel to Lore’s later utilitarian logic, where\
    \ difficult choices justify sacrifice for a greater purpose. Riker’s firmness\
    \ contrasts with Beverly’s reluctance, revealing their differing leadership styles\
    \ under pressure: Riker’s tactical pragmatism versus Beverly’s protective instinct.\n\
    \  "
