  title: Barnaby proposes high-risk orbital maneuver
  description: "\n  Under extreme pressure to shave critical seconds off the transporter\
    \ lock time, Beverly Crusher orders Salazar to reduce the lock from one minute\
    \ to 45-50 seconds. When she demands an additional 15 seconds to ensure a successful\
    \ rescue, Barnaby proposes a high-risk orbital tactic: entering behind the planet\
    \ to delay warp drop, buying precious seconds while risking atmospheric collision.\
    \ Taitt voices sharp warnings about the perilous odds, but Barnaby’s unshaken\
    \ confidence—framed as a response to her skepticism—pushes the crew toward the\
    \ gamble. Beverly, recognizing the stakes, authorizes the maneuver, escalating\
    \ tension as the clock ticks toward disaster. The scene underscores the crew’s\
    \ desperation, Barnaby’s calculated boldness, and the high cost of their mission’s\
    \ urgency.\n  "
