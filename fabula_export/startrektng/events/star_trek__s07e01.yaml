  global_id: null
  title: Data seizes Geordi under Lore’s control
  description: "\n  In a critical escalation of Lore’s dominance, Data—now fully subsumed\
    \ by his brother’s emotional programming—ignores Picard’s pleas and forcibly takes\
    \ Geordi as a hostage. The moment begins with Geordi, Picard, and Troi strategizing\
    \ a plan to reboot Data’s ethical subroutines using a kedion pulse, but their\
    \ discussion is abruptly cut short when Data enters the Borg cell. Without hesitation,\
    \ Data seizes Geordi, dismissing Picard’s desperate attempts to reason with him.\
    \ As Data exits with Geordi, the forcefield reactivates, isolating Picard and\
    \ signaling the irreversible shift in Data’s allegiance. This act marks the tipping\
    \ point where Data’s autonomy is lost, raising the stakes for his rescue and deepening\
    \ the crisis for the Enterprise crew. The scene underscores Lore’s growing influence\
    \ and the urgency of the situation, as the team’s last hope for a peaceful resolution\
    \ evaporates.\n  "
