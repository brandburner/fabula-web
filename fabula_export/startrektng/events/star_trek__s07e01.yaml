  title: Beverly gambles on transporter timing
  description: "\n  Under extreme pressure to execute a time-sensitive rescue, Beverly\
    \ Crusher initiates a high-stakes negotiation with Salazar to reduce the transporter\
    \ lock time from one minute to 45-50 seconds. When Salazar concedes, Beverly pivots\
    \ to the bridge crew, demanding an additional 15 seconds to ensure the operation's\
    \ success. Barnaby proposes a dangerous orbital maneuver—entering behind the planet\
    \ and delaying warp drop—to buy the critical seconds, despite Taitt's warnings\
    \ about the risks of atmospheric collision. Beverly, recognizing the desperation\
    \ of the situation, approves the gambit, escalating the tension as the crew prepares\
    \ for a high-risk extraction. This moment underscores the crew's willingness to\
    \ defy conventional protocols when lives are on the line, reflecting their growing\
    \ desperation to counter Lore's threat and rescue Data.\n  "
