- fabula_uuid: cand_evt_scene_8d6fb82d5e11e3b8_02
  global_id: null
  title: Beverly accelerates rescue amid Borg threat
  description: "\n  Beverly Crusher, acting captain of the *Enterprise*, defies Starfleet\
    \ protocol by abandoning the planned warp jump to safety and instead orders a\
    \ return to the planet to rescue stranded crew. She promotes Ensign Taitt to Science\
    \ Officer on the spot, recognizing her competence under pressure, and tasks her\
    \ with launching an emergency buoy to transmit logs to Starfleet. Meanwhile, Beverly\
    \ demands a scan for Borg ships, learning the crew has a critically narrow window—potentially\
    \ as little as thirty seconds—before interception. The tension escalates as Beverly\
    \ coordinates with Salazar to extract the remaining crew from the planet’s surface,\
    \ knowing the Borg could arrive at any moment. The scene underscores Beverly’s\
    \ leadership under duress, her refusal to abandon her people, and the precarious\
    \ timeline now governing the mission. The revelation of the Borg interception\
    \ window forces the crew to act with desperate urgency, raising the stakes for\
    \ Data’s rescue and the confrontation with Lore.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e01
  scene_sequence: 7
  sequence_in_scene: 14
  key_dialogue: &id009
  - 'TAITT: ''Sir, we''ve reached the coordinates of the conduit. The tachyon matrix
    is energized and ready to go.'''
  - 'BEVERLY: ''I''m not leaving those people stranded back there. An emergency buoy
    can transmit a copy of our log entries to Starfleet just as easily as we can.'''
  - 'TAITT: ''We have to assume the ship that attacked us is still in orbit.'''
  - 'BEVERLY: ''How long will we have before they can detect us and intercept?'''
  - 'TAITT: ''If their sensors function as well as ours—it could be as little as thirty
    seconds.'''
