- fabula_uuid: cand_evt_scene_1d68fc0f37f5cb31_02
  global_id: null
  title: Riker divides the team for survival
  description: 'With Geordi injured and the Borg cell under siege, Riker and Worf
    breach the cell to find Troi tending to Geordi. Riker immediately assesses the
    situation, prioritizing survival over the mission. He orders Troi to evacuate
    Geordi through an air duct while he and Worf press onward to locate Picard. This
    tactical decision reflects Riker’s leadership under pressure—balancing the crew’s
    well-being with the urgency of rescuing Picard. The moment underscores the escalating
    danger of the Borg environment and reinforces Troi’s dual role as both counselor
    and operative. Worf’s vigilance at the door ensures their brief window of safety,
    while Riker’s concise instructions reveal his trust in Troi’s abilities. The split
    of the team creates immediate narrative tension: will Troi and Geordi escape unharmed,
    and can Riker and Worf navigate the Borg compound to reach Picard before Lore’s
    influence solidifies further?'
