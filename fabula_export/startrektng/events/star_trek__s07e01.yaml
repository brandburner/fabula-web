  key_dialogue: &id019
  - 'HUGH: You gave me a sense of individuality -- changed me and sent me back to
    the collective. You must have known that change would be passed on to others.'
  - 'HUGH: Before my experience on the Enterprise, the Borg were a singleminded collective.
    The voices in our heads were smooth and flowing. But after I returned, the voices
    began to change. They became uneven... discordant. For the first time, individual
    Borg had differing ideas about how to proceed. We couldn''t function. Some Borg
    fought each other. Others simply shut themselves down. Many starved to death.'
  - 'HUGH: This is the result of my encounter with the Enterprise, Commander. So you
    can see I don''t particularly welcome your presence here.'
  - 'RIKER: I''m sorry you feel that way.'
  - 'HUGH: Tell me... about my friend. The human called Geordi.'
  - 'HUGH: I cannot help you... I cannot risk our being discovered. ... These caverns
    lead to tunnels which run beneath the compound. Some of them connect with the
    environmental control ducts.'
