  title: Lore manipulates Data and Goval with emotional logic
  description: 'In the Borg Hall, Lore tests Data’s emotional vulnerability by examining
    Geordi’s VISOR, subtly probing his brother’s capacity for human-like feelings.
    When Data questions the ethical implications of experimenting on Geordi, Lore
    reframes the procedure as a means to reduce Borg casualties, exploiting Data’s
    logical framework to justify cruelty. Meanwhile, Crosis drags in Goval, a disillusioned
    Borg, and Lore manipulates him into re-embracing the collective by validating
    his fears and offering purpose. Lore’s calculated empathy—mirroring Goval’s emotions
    back at him—reveals his ability to weaponize vulnerability, deepening Data’s moral
    conflict while consolidating his control over the Borg. The scene underscores
    Lore’s dual strategy: corrupting Data through logic and Goval through emotional
    manipulation, both serving his broader goal of evolving the Borg through destructive
    means. The moment also foreshadows Data’s eventual alignment with Lore’s logic,
    setting up the moral crisis that will define their fractured relationship.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e01
  scene_sequence: 9
  sequence_in_scene: 19
  key_dialogue:
  - 'LORE: I thought it might look good on me. What do you think?'
  - 'DATA: All the Borg you have experimented on so far have suffered extensive brain
    damage.'
  - 'LORE: Using the humans to perfect the procedure would allow us to prevent any
    further Borg deaths.'
  - 'LORE: I understand how difficult it is for you. How uncertain you feel. All these
    sensations are new—and they can be frightening. Isn’t that right?'
  - 'LORE: I need you, Goval. I need you to help me build a future for the Borg. I
    can’t do it without you. Will you help me?'
