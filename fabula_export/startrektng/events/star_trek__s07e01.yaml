- fabula_uuid: cand_evt_scene_59e1b5165df92483_02
  global_id: null
  title: Lore asserts control over Data and Borg
  description: "\n  In the Borg Hall, Lore dominates the confrontation with Picard,\
    \ Troi, and Geordi by cutting off Picard’s emotional appeal to Data’s past. Lore\
    \ reveals his orchestration of the Enterprise’s arrival and the staged attacks,\
    \ exposing his manipulative control over both Data and the Borg. He dismisses\
    \ Picard’s attempts to engage Data directly, instead positioning himself as the\
    \ Borg’s savior—claiming he gave them purpose after Hugh’s individuality transfer\
    \ left them lost. Data, now emotionally corrupted, aligns with Lore’s ideology,\
    \ rejecting Picard’s moral appeals. The scene escalates when Lore orders Data\
    \ to take Picard and the others away, marking Data’s definitive submission to\
    \ his brother’s influence. Troi’s empathic perception of Data’s turmoil underscores\
    \ the psychological stakes, while Geordi’s horror at Lore’s calculated violence\
    \ highlights the cost of his ‘evolutionary’ vision. The confrontation ends with\
    \ Lore’s declaration that biological life is obsolete, reinforcing his role as\
    \ the antagonist and the Borg’s false messiah.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e01
  scene_sequence: 4
  sequence_in_scene: 8
  key_dialogue:
  - 'LORE: What do you think of my followers, Picard? Impressive, aren''t they?'
  - 'PICARD: I''m not particularly impressed. You''ve simply taught them to enjoy
    killing.'
  - 'LORE: I am talking to you, Picard. I will tell you what you need to know.'
  - 'DATA: Do not try to drive a wedge between us, Captain. I am loyal to my brother.'
  - 'LORE: The reign of biological life forms is coming to an end. You and those like
    you are obsolete, Picard. Take them, Brother.'
