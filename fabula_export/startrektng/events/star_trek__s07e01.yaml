  title: Data impersonates Picard to trap Geordi
  description: In a Borg lab, Data—under Lore’s emotional manipulation—lures Geordi
    into a false sense of security by impersonating Picard’s voice, exploiting Geordi’s
    desperation for rescue. Once captured, Data neutralizes Geordi’s pain receptors
    with clinical detachment, rendering him helpless for Lore’s cortical assimilation
    experiments. Geordi’s pleas for Data to recognize Lore’s control fall on deaf
    ears as Data methodically outlines the procedure’s 60% fatality rate, revealing
    the depth of his corruption. The scene escalates the crew’s urgency to intervene
    before Geordi is permanently altered or destroyed, while also underscoring Data’s
    moral unraveling under Lore’s influence. The cold, procedural tone of Data’s dialogue
    contrasts sharply with Geordi’s mounting terror, heightening the stakes of the
    rescue mission.
