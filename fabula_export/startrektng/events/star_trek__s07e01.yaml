  title: Data seizes Geordi as hostage
  description: "\n  Picard, Troi, and Geordi analyze Lore’s manipulation of Data,\
    \ deducing that Lore is using Noonien Soong’s emotional chip to transmit negative\
    \ emotions while disabling Data’s ethical programming. Geordi proposes a risky\
    \ kedion pulse reboot to restore Data’s ethical subroutines, but before they can\
    \ act, Data—now fully under Lore’s control—enters the cell and forcibly takes\
    \ Geordi as a hostage. Picard pleads with Data to stop, but Data ignores him,\
    \ reactivates the forcefield, and exits with Geordi, leaving Picard trapped. This\
    \ moment marks the tipping point where Data’s corruption becomes irreversible\
    \ without immediate intervention, escalating the crisis and forcing the crew into\
    \ desperate action.\n  "
