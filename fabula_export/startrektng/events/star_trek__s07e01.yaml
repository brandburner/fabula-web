- fabula_uuid: act_db394559d6648184
  number: 2
  summary: On the Borg planet, Lore holds Captain Picard, Counselor Troi, and Geordi
    La Forge captive amidst his individualized Borg followers. Lore proudly displays
    Data, who now exhibits intense negative emotions, explaining he enabled Data to
    experience feelings through Doctor Soong's emotional chip. Lore reveals he orchestrated
    the outpost attacks to lure the Enterprise and Data to him, asserting his role
    as the Borg's "savior" from the chaos of newfound individuality, which he claims
    nearly destroyed them. Picard attempts to reason with Data, reminding him of his
    past self and Hugh's influence, but Data remains fiercely loyal to Lore, dismissing
    his life aboard the Enterprise as a misguided quest. Data expresses only anger
    and hatred, claiming love and joy are unsubstantial concepts. He defends Lore's
    destructive plans as necessary for a "greater good." Data then demands Geordi's
    VISOR, threatening force, and exits the cell, leaving Picard, Troi, and Geordi
    deeply concerned by his transformation. Concurrently, Riker and Worf continue
    their search on the planet's surface, detecting faint residual thermal traces
    and energy readings that indicate human presence, suggesting they are on the correct
    path to locate Picard's team. This act firmly establishes Lore's manipulative
    control over Data and the corrupted Borg, deepening the central conflict and highlighting
    Data's disturbing transformation, while Riker and Worf's parallel narrative provides
    a sense of urgency and a glimmer of hope for a rescue.
