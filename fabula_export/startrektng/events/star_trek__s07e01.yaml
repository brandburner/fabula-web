  title: Lore manipulates Data’s emotions and confides in Crosis
  description: Lore, observing Data’s internal conflict over his ethical programming
    and guilt about human lives lost, remotely adjusts Data’s emotional subroutines
    via a fingertip circuit. The manipulation triggers a withdrawal-like response
    in Data, who begs for more negative emotions—revealing his growing addiction to
    the heightened emotional state Lore has forced upon him. Afterward, Lore privately
    expresses concern to Crosis about Data’s instability, hinting at deeper fractures
    within the Borg collective’s hierarchy and suggesting Lore’s growing distrust
    of his brother’s loyalty. The scene underscores Lore’s psychological control over
    Data while foreshadowing his eventual betrayal or elimination of Data as a liability.
    The exchange with Crosis also reinforces Lore’s authoritarian leadership style,
    positioning him as a ruthless figure willing to purge dissent within his ranks.
