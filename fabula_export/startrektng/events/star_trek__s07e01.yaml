      desperate need to escape. The Borg’s threat is the driving factor behind Riker’s
      decision to split the team—Geordi’s injury and the crew’s vulnerability are
      direct results of the Borg’s cruelty. The Collective’s power dynamics are clear:
      they control the environment, and the crew must navigate it carefully to survive.
      Their influence mechanisms include the Borg drones patrolling the corridors,
      the forcefields securing the cells, and the very architecture of the compound,
      which the crew repurposes for their escape.'
