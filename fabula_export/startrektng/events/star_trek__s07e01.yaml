- fabula_uuid: act_b22bafaf20de6aa1
  number: 5
  summary: The Enterprise, pursued by the Borg ship, plunges into the sun's corona.
    Beverly orders Lieutenant Barnaby to activate Commander La Forge's untested metaphasic
    shielding program. Despite rising hull temperatures and radiation, the shields
    engage successfully, allowing the Enterprise to survive within the corona while
    the Borg ship breaks off pursuit, waiting for them to emerge. Beverly recognizes
    their precarious situation, trapped and vulnerable. Simultaneously, in the Borg
    cell, Picard and Troi activate the modified Borg transceiver, generating the phased
    kedion pulse. In the Borg lab, Data, preparing to irradiate Geordi's brain cells,
    experiences a subtle, involuntary head tilt as the pulse hits, unnoticed by both.
    Geordi attempts to appeal to Data's past memories, but Data's response remains
    cold and factual. However, Data unexpectedly delays the procedure, citing "anomalous
    readings," a sign his ethical program is subtly reasserting itself. He sends Geordi
    back to his cell. On the compound's exterior, Data confronts Lore, expressing
    guilt over betraying his friends and responsibility for their potential deaths.
    Lore, recognizing a flaw in Data's programming, subtly adjusts the emotional input
    he transmits to Data, causing Data to shudder from withdrawal, then crave more
    negative emotions. Lore, increasingly wary of Data's internal conflict, exchanges
    an ominous look with Crosis, indicating his growing suspicion of his brother's
    loyalty. This act marks a turning point for Data's internal struggle and the Enterprise's
    desperate survival, setting the stage for the climax.
