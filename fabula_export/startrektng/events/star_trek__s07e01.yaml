- fabula_uuid: act_ee0fc9041539d5a8
  number: 3
  summary: The Enterprise drops out of warp, and Beverly, defying Starfleet orders,
    decides to return to the planet to rescue the stranded crew. She promotes Ensign
    Taitt to Science Officer, recognizing her potential and boosting her confidence.
    The ship launches an emergency buoy to transmit log entries, then sets a course
    back to the planet. Beverly devises a daring plan with Lieutenant Barnaby to use
    the planet as a shield and drop out of warp at the last possible moment, buying
    precious seconds for transport, despite Taitt's concerns about the extreme precision
    required. Meanwhile, Lore continues his manipulative reign over the Borg. He plans
    to use Geordi's implants for his experiments, justifying potential human deaths
    as a means to prevent further Borg casualties. Lore demonstrates his persuasive
    power by calming Goval, a Borg who disconnected from the collective, reassuring
    him and solidifying his loyalty. In their cell, Picard, Troi, and Geordi deduce
    Lore is manipulating Data through a carrier wave transmitting negative emotions
    from Soong's chip. Geordi proposes generating a phased kedion pulse to reboot
    Data's ethical program. Data interrupts their planning, taking Geordi away for
    experimentation, leaving Picard and Troi trapped. On the surface, Riker and Worf
    encounter Hugh, the individualized Borg, who greets them with bitterness, blaming
    the Enterprise for the Borg's current plight. This act intensifies the rescue
    efforts, reveals Lore's insidious methods, and introduces Hugh as a conflicted
    but potentially crucial ally.
