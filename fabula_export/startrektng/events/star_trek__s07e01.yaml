acts:
- fabula_uuid: act_20003ac46caccf76
  number: 1
  summary: Acting Captain Beverly Crusher commands a skeleton crew aboard the Enterprise,
    orbiting a planet where an intense EM field severely disrupts sensors, rendering
    the ship vulnerable. Ensign Taitt, a young and initially nervous tactical officer,
    works diligently to modify the sensor array, demonstrating nascent competence
    under pressure. A Borg ship is detected, rapidly closing on their position. Riker,
    Worf, and several other away teams remain on the planet's surface, desperately
    searching for Captain Picard's team amidst the interference. Beverly orders the
    immediate transport of all personnel, but Riker, prioritizing the Enterprise's
    escape to Federation space and the safety of the majority, firmly instructs Beverly
    to leave him and Worf behind to continue the search for Picard. Beverly, facing
    an impossible choice, reluctantly complies. The Enterprise executes a daring,
    last-second shield activation and evasive maneuver, narrowly escaping the Borg
    ship's initial assault. As the Enterprise retreats, Riker, Worf, and 47 other
    crew members are left stranded on the desolate planet. Riker acknowledges their
    dire circumstances, realizing they face stiff odds and isolation until Starfleet
    can dispatch reinforcements, which will take days. This act establishes the immediate,
    life-threatening peril confronting both the Enterprise and the stranded away teams,
    underscoring Beverly's difficult command decisions and the extreme vulnerability
    of the crew. It sets a desperate and urgent tone for the unfolding narrative,
    emphasizing themes of sacrifice and survival.
