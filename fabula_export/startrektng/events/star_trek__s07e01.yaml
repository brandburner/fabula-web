  title: Borg strike cripples Enterprise
  description: 'With the Borg vessel closing in, Beverly Crusher orders evasive maneuvers
    and shields raised, but a direct hit cripples the port nacelle and disables warp
    engines, forcing the *Enterprise* onto impulse power. The attack escalates the
    immediate threat, stripping the crew of their primary means of escape or pursuit
    while Lore’s corrupted Borg remain at large. Beverly’s desperate commands—first
    to raise shields, then to execute evasive maneuvers—reveal the crew’s dwindling
    options, as Barnaby’s grim report of the nacelle damage confirms the ship’s vulnerability.
    The scene underscores the escalating stakes: the *Enterprise* is now trapped,
    its crew stranded in a high-risk situation where survival hinges on improvisation
    and quick thinking. The loss of warp capability isn’t just a tactical setback;
    it’s a narrative turning point, heightening the urgency of the crisis and forcing
    Beverly to confront the reality that her crew’s fate now rests on impulse power
    alone—an inadequate defense against the Borg’s relentless pursuit.'
