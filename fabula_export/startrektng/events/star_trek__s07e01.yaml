  sequence_in_scene: 16
  key_dialogue: &id011
  - 'SALAZAR: One minute should do it.'
  - 'BEVERLY: We don''t have one minute. How much can you shave off that?'
  - 'SALAZAR: If I can get a good lock on them quickly... I might be able to do it
    in forty-five or fifty seconds.'
  - 'BEVERLY: We need to buy ourselves fifteen seconds. Is there any way we can use
    the planet as a barrier... to keep the Borg from realizing we''re in orbit?'
  - 'BARNABY: We can enter orbit while they''re on the far side of the planet.'
  - 'BARNABY: And if we delayed dropping out of warp until the last possible instant
    -- we could gain a few more seconds.'
  - 'TAITT: If your calculations are even slightly off... we''d hit the atmosphere...'
  - 'BARNABY: Then I''ll have to be sure my calculations are accurate.'
  - 'BEVERLY: Let''s go for it. Helm, hard about.'
