  title: Data’s ideological rupture and violent defiance
  description: "\n  In the Borg cell, Data—now fully aligned with Lore’s ruthless\
    \ ideology—rejects Picard’s moral appeals, dismissing his past life on the *Enterprise*\
    \ as a 'waste' and his quest for humanity as 'misguided.' When Troi probes his\
    \ emotional state, Data insists he feels only anger and hatred, framing love and\
    \ joy as meaningless abstractions. Geordi challenges Lore’s manipulation, but\
    \ Data, armed with a Borg weapon, seizes Geordi’s visor at gunpoint, marking his\
    \ irreversible break from the crew. The scene culminates in Data’s cold declaration—'I\
    \ am not your puppet anymore'—as he exits with the Borg guard, leaving Picard,\
    \ Troi, and Geordi trapped and the crew’s moral crisis escalating. The act ends\
    \ with Data’s violent defiance, signaling his descent into Lore’s destructive\
    \ vision and setting up the crew’s desperate rescue mission.\n  "
