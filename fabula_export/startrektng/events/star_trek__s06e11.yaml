- fabula_uuid: cand_evt_scene_f6176b8df91b3093_01
  global_id: null
  title: Picard reclaims command from Jellico
  description: "\n  The bridge of the *Enterprise* is tense as Picard and Riker arrive,\
    \ their presence immediately shifting the power dynamic. Jellico, standing at\
    \ command, formally acknowledges Picard’s return with a calculated mix of professionalism\
    \ and subtle defensiveness—his gesture ('Just the way you left it. Maybe a little\
    \ better') is both a concession and a veiled challenge, hinting at his belief\
    \ that his command improved the ship’s efficiency. The computer’s voice confirmation\
    \ of the command transfer ('USS *Enterprise* now under command of Captain Jean-Luc\
    \ Picard') is a mechanical but symbolic moment, stripping Jellico of authority\
    \ in front of the crew. His final address to the bridge—'It's been an honor serving\
    \ with you'—is met with cold stares, underscoring the crew’s rejection of his\
    \ leadership. The silent hostility is a quiet rebellion, reinforcing their loyalty\
    \ to Picard. Jellico’s exit is a quiet surrender, while Picard’s immediate assumption\
    \ of command ('You have the Bridge, Number One') restores the ship’s hierarchy\
    \ and signals the return of his vision for the *Enterprise*. The exchange between\
    \ Picard and Troi, though unspoken, hints at the emotional weight of his ordeal\
    \ and the unspoken questions about what he endured.\n  "
