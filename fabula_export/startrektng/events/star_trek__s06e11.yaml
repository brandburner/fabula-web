      sovereignty. While the Federation does not directly intervene in this scene,
      its policies and priorities shape every action taken by the *Enterprise*’s crew,
      from Geordi’s analysis to Jellico’s order to set course for Minos Korva.'
    active_representation: Through the Federation’s strategic priorities, which are
      embodied in Starfleet’s mission parameters and the crew’s sense of duty to protect
      civilian populations.
    power_dynamics: The Federation’s authority is absolute in this context, as the
      *Enterprise* operates under its direct command. However, the organization’s
