- fabula_uuid: cand_evt_scene_f7ec0f2d7faea276_01
  global_id: null
  title: Shuttlecraft navigates blind in deadly nebula
  description: "\n  In the cramped, shuddering confines of a crippled shuttlecraft,\
    \ Commander Riker and Lieutenant Geordi La Forge face escalating danger as their\
    \ systems fail one by one while navigating the McAllister Nebula. The loss of\
    \ primary navigation, sensors, and inertial dampers forces them to rely on a primitive\
    \ proximity detector—a relic of early 20th-century technology—whose limited range\
    \ (500 meters) exposes their vulnerability. Riker’s sarcastic remark about the\
    \ detector’s limitations underscores the crew’s precarious situation, where improvisation\
    \ and split-second decisions now determine their survival. When a Cardassian warship\
    \ suddenly materializes on their monitor, Riker’s sharp reflexes save them from\
    \ a catastrophic collision, but the near-miss forces Geordi to prepare the anti-matter\
    \ mines for immediate deployment. The scene heightens the tension of their mission,\
    \ where every second counts and the stakes are life-or-death. Their calm professionalism\
    \ masks the urgency of their predicament, as the shuttle’s degraded systems and\
    \ the nebula’s hazards combine to create a high-stakes test of their resourcefulness\
    \ and resolve.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e11
