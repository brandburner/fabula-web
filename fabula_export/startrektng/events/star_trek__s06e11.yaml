- fabula_uuid: cand_evt_scene_f91c63f19f3bfeee_04
  global_id: null
  title: Picard resists pain induction torture
  description: "\n  Gul Madred escalates his psychological torture of Picard by activating\
    \ a pain-induction device implanted in his chest. After a deceptively simple question\
    \ about the number of lights in the room—Picard insists there are four, despite\
    \ Madred claiming five—the interrogator demonstrates the device's brutal effectiveness.\
    \ Picard endures waves of excruciating pain, gasping and perspirating, yet stubbornly\
    \ refuses to alter his answer. The scene underscores the asymmetry of power between\
    \ captor and captive, with Madred's calm, methodical cruelty contrasting sharply\
    \ against Picard's physical suffering. Meanwhile, the narrative cuts to Riker's\
    \ voiceover log aboard the *Enterprise*, highlighting the urgency of the rescue\
    \ mission and the emotional toll of Picard's ordeal on the crew. The moment serves\
    \ as both a turning point in Picard's captivity—marking the transition from psychological\
    \ to physical torment—and a thematic exploration of resistance, dignity, and the\
    \ cost of defiance under extreme duress.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e11
  scene_sequence: 3
  sequence_in_scene: 6
  key_dialogue:
  - |-
    MADRED: How many lights do you see there?
    PICARD: I see four lights.
    MADRED: Strange... I see five.
    Are you quite sure?
  - |-
    MADRED: Forgive me... I don't enjoy this, but I must demonstrate. It will make everything much clearer.
    [Picard gasps in pain as Madred activates the device.]
    PICARD: I... know... nothing... about Minos Korva.
    MADRED: But I've told you that I believe you. I didn't ask about Minos Korva... I asked you... how many lights you see there.
  - |-
    PICARD: There are four lights.
    MADRED: I don't understand how you can be so mistaken.
