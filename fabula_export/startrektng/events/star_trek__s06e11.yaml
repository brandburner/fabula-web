      framing the distant stars as a silent witness to the crew's fractured loyalties.
      The long conference table becomes a battleground of ideas, with Jellico at its
      head asserting his authority, while the crew members sit in a semicircle, their
      postures reflecting their internal conflicts. The neutral, formal space of the
      lounge—typically reserved for diplomatic negotiations or senior staff briefings—is
      repurposed for this high-stakes confrontation, amplifying the tension between
      duty and ethics. The lounge's design, with its unobstructed views of space,
      also serves as a metaphor for the crew's moral clarity (or lack thereof) as
      they grapple with the consequences of their actions.
