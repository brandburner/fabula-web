  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: 'Starfleet’s influence permeates the scene, shaping
      the crew’s actions, priorities, and emotional responses. The organization is
      represented through Jellico’s temporary command, the defense plans transmitted
      by Admiral Nechayev, and the crew’s unwavering loyalty to Picard as a fellow
      officer. Starfleet’s protocols—such as changing access codes after a capture
      and the chain of command—are implicitly referenced as the crew grapples with
      the Cardassians’ exploitation of its institutional knowledge. The organization’s
      goals (protecting operational security, rescuing Picard, countering the Cardassian
      threat) drive every decision, from Data’s promotion to the covert scan of Lemec’s
      ship. Starfleet’s power dynamics are on full display: Jellico exercises authority,
      but his orders are constrained by the need to uphold the organization’s values,
      even as he faces moral dilemmas (e.g., the possibility of Picard’s torture).'
    active_representation: Through institutional protocol (defense plans, access codes),
      chain of command (Jellico’s orders), and collective action (crew’s analysis
      and investigation).
