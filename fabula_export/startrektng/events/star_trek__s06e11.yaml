  object_involvements:
  - object_uuid: ger_object_d0e84e4ffa23
    description_of_involvement: The light fixture in the interrogation room becomes
      a prop for Madred’s psychological torture. It contains four exposed lights that
      cast a harsh, unrelenting glow over Picard as he is suspended naked. Madred
      uses the fixture to disorient Picard, asking him to count the lights while the
      pain-induction device is active. When Picard answers 'four,' Madred insists
      there are 'five,' demonstrating that even perception is now a battleground.
      The fixture’s clinical brightness amplifies Picard’s vulnerability, stripping
      away any shadows where he might hide—physically or psychologically. The lights
      hum faintly, a constant auditory reminder of his exposed state.
    status_before_event: Burning steadily, casting a clinical white light over the
      interrogation room. The four bulbs are evenly spaced, creating an oppressive
      uniformity.
    status_after_event: Still glowing, now imprinted in Picard’s mind as a symbol
      of Madred’s control. The fixture’s light flickers slightly as Madred activates
      the pain-induction device, reinforcing the connection between perception and
      agony.
    global_id: ger_object_d0e84e4ffa23
  - object_uuid: ger_object_9b93b170e1e8
    description_of_involvement: The ceiling restraint bar is a sturdy metal beam protruding
      from the interrogation room’s ceiling, used to suspend Picard with his arms
      stretched overhead. The Guards attach his manacled wrists to the bar, hoisting
      him into a position of extreme physical discomfort and psychological exposure.
      The bar forces Picard to stand on his tiptoes, his body taut and vulnerable.
      Madred circles beneath him, using the suspension to reinforce Picard’s powerlessness.
      The bar’s cold metal digs into Picard’s skin, leaving red marks that mirror
      the bruises on his wrists. Its presence looms over the room, a silent threat
      of what Madred can inflict next.
    status_before_event: Empty and waiting, a latent instrument of torture in the
      interrogation room’s sparse design.
    status_after_event: Now bearing the weight of Picard’s suspended body, the manacles
      still attached to the bar. The metal is warm from Picard’s skin, a physical
      record of his ordeal.
    global_id: ger_object_9b93b170e1e8
  - object_uuid: ger_object_bf8bde694078
    description_of_involvement: The robe is a thin, coarse garment tossed to Picard
      by the Cardassian Guards after he is removed from the ceiling suspension. Madred
      sips tea while Picard, parched and exhausted, is forced to cover himself with
      the robe—a conditional mercy that underscores his degradation. The robe is not
      an act of kindness but a tool to prolong the interrogation, allowing Madred
      to reset the psychological dynamic. Its fabric is rough against Picard’s skin,
      a constant reminder of his stripped dignity. The robe also serves as a visual
      contrast to Madred’s composed demeanor, highlighting the power imbalance between
      them.
    status_before_event: Folded and held by the Cardassian Guards, awaiting Picard’s
      suspension and subsequent humiliation.
    status_after_event: Drape over Picard’s shoulders, clinging to his sweat-slicked
      skin. It provides minimal coverage but no comfort, serving as a symbol of his
      reduced state.
    global_id: ger_object_bf8bde694078
  - object_uuid: ger_object_b14a0943c4f6
    description_of_involvement: The pain-induction device, implanted in Picard’s chest
      during his drugged state, is Madred’s ultimate tool for breaking his resistance.
      Madred demonstrates its function by activating it via his PADD, sending waves
      of agony through Picard’s body at the lowest setting. The device is invisible
      but its effects are visceral—Picard gasps, stiffens, and breaks into a sweat,
      his knuckles digging into his temples. Madred uses it not just to inflict pain
      but to prove that Picard’s perception of reality is now entirely under his control,
      even down to the number of lights in the room. The device embodies the Cardassians’
      willingness to violate the most basic tenets of human dignity in pursuit of
      their goals.
    status_before_event: Dormant but active within Picard’s chest, a latent threat
      that he is unaware of until Madred reveals its existence.
    status_after_event: Fully activated and tested, now a constant psychological and
      physical threat looming over Picard. Madred has demonstrated its capabilities,
      ensuring Picard’s compliance through fear of its reapplication.
    global_id: ger_object_b14a0943c4f6
  - object_uuid: ger_object_b01c2946cf89
    description_of_involvement: Gul Madred’s PADD is the central control device for
