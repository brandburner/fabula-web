  key_dialogue: &id021
  - 'JELLICO: I''m not going to argue with you, Gul Lemec. Every one of your ships
    has a mine on its belly, my finger''s on the button, and you''re in a very bad
    position.'
  - 'JELLICO: Mister Worf... set off Alpha-four two...'
  - 'LEMEC: What are... your terms?'
  - 'JELLICO: Your ships will leave the nebula one by one. Each ship will eject its
    primary phaser coil before setting course for the nearest Cardassian base.'
  - 'JELLICO: Oh... one more thing. I believe you''re holding a Starfleet officer
    named Jean-Luc Picard. I expect him returned. Immediately.'
