  number: 5
  summary: Act Five brings both narrative threads to their climax and resolution.
    Jellico confronts Riker in his quarters, setting aside rank to deliver a blunt
    assessment of Riker's insubordination while acknowledging his unparalleled piloting
    skills. Riker reciprocates with an equally candid critique of Jellico's command
    style. Despite their mutual dislike, Jellico asks Riker to pilot the crucial mission,
    and Riker agrees, demonstrating his commitment to Starfleet and his crew. Riker
    and Geordi successfully navigate the shuttle through the McAllister Nebula, deploying
    anti-matter mines onto the Cardassian fleet using only a primitive proximity detector.
    With the mines in place, Jellico uses the threat of detonation to force Gul Lemec
    into a humiliating withdrawal, compelling him to eject primary phaser coils and
    return Captain Picard. In the interrogation room, Madred makes one final, desperate
    attempt to break Picard, lying about the Enterprise's destruction and offering
    a life of comfort if Picard would simply say 'five lights.' Picard resists, and
    Lemec's arrival reveals Madred's deception. Picard, realizing the extent of Madred's
    manipulation, defiantly states, 'There are four lights,' earning a subtle nod
    of respect from Madred. Picard returns to the Enterprise, where Jellico formally
    transfers command back to him. Picard then confides in Troi, admitting the profound
    psychological toll of his ordeal, revealing he was on the verge of succumbing
    and beginning to believe Madred's false reality, underscoring the deep trauma
    he endured.
