  title: Jellico Rejects Cardassian Deal
  description: In the Observation Lounge, Gul Lemec weaponizes a recording of Picard’s
    torture under a truth inducer, forcing Jellico to confront the brutal reality
    of his capture. Lemec offers a Faustian bargain—Picard’s release in exchange for
    a Federation withdrawal—but Jellico coldly rejects it, prioritizing strategic
    advantage over Picard’s life. When Riker challenges this decision, invoking the
    Selonis Convention to grant Picard prisoner-of-war protections, Jellico dismisses
