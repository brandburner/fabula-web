  object_involvements:
  - object_uuid: ger_object_49e06c6f0254
    description_of_involvement: The *Enterprise*’s forward viewscreen is the visual
      conduit for the confrontation between Jellico and Lemec. It displays Lemec’s
      furious and then increasingly worried expression as the mine detonation shakes
      his ship, providing the crew with a real-time view of the Cardassian commander’s
      reactions. The viewscreen’s flickering image of Lemec’s face becomes a focal
      point for the tension on the bridge, amplifying the psychological impact of
      Jellico’s threats. It also serves as a symbolic representation of the power
      dynamic between Starfleet and the Cardassian Union, with Jellico’s ability to
      project his authority directly into Lemec’s domain.
    status_before_event: Active and displaying the void of space, awaiting Jellico’s
      command to open a channel to the *Reklar*. The viewscreen is a passive but critical
      tool for communication and intimidation.
    status_after_event: The viewscreen remains active, now showing Lemec’s reluctant
      compliance and the aftermath of the mine detonation. It has fulfilled its role
      as a tool for psychological warfare and negotiation, leaving the bridge crew
      with a visual record of Jellico’s victory.
