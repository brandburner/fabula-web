- fabula_uuid: act_109ec63f65f89711
  number: 4
  summary: Act Four details Jellico's controversial plan to preemptively strike the
    Cardassian fleet and Picard's continued psychological resilience. Jellico informs
    his senior staff of the impending Cardassian invasion of Minos Korva and his intention
    to launch a first strike into Cardassian territory, targeting their hidden fleet
    in the McAllister Nebula. Beverly Crusher and Geordi La Forge voice strong ethical
    and tactical objections to this aggressive action, questioning its justification
    and potential consequences. Jellico dismisses their concerns, asserting Starfleet
    Command's full discretionary approval and emphasizing the urgency of protecting
    Minos Korva's two million colonists. He orders Worf to prepare anti-matter mines
    and Geordi to outfit a shuttle for the dangerous mission. Back in the interrogation
    room, Madred offers Picard a live taspar egg, recounting his own childhood of
    extreme poverty and hardship. Picard uses this personal revelation to turn the
    tables, suggesting Madred's torture stems from a desire for pleasure and power
    derived from his past suffering, calling Madred a 'pitiable man.' This psychological
    attack visibly rattles Madred, who momentarily refers to Picard by name, a small
    but significant victory for Picard. Madred retaliates by intensifying the torture,
    but Picard defiantly repeats, 'There are four lights.' Geordi then informs Jellico
    that Commander Riker, despite being relieved of duty, is the only pilot skilled
    enough to execute the perilous mine-laying mission within the nebula, setting
    the stage for a critical confrontation between the two captains.
