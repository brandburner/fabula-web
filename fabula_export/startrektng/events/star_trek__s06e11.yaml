  - location_uuid: ger_location_57e9609cb764
    description_of_involvement: 'Minos Korva is the target of the Cardassian invasion
      and the destination of the *Enterprise*’s intercept course. Though not physically
      shown in this scene, its mention by Geordi triggers Jellico’s decisive action.
      The system’s strategic value—eleven light years from the McAllister Nebula and
      a former battleground during the war—makes it the perfect prize for the Cardassians.
      Its vulnerability (home to two million colonists) heightens the stakes, turning
      Geordi’s analysis into a race against time. The location’s role is catalytic:
      without Minos Korva as the likely target, Jellico’s order to intercept would
      lack urgency.'
    observed_atmosphere: Tense and foreboding, with an undercurrent of fear for the
      civilian population. The system’s history as a warzone adds a layer of dread,
      as the crew knows the Cardassians’ aggressive tactics all too well.
