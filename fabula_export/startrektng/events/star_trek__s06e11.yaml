- fabula_uuid: cand_evt_scene_f91c63f19f3bfeee_02
  global_id: null
  title: Madred’s psychological interrogation escalates
  description: "\n  Gul Madred shifts from physical torture to psychological manipulation,\
    \ exploiting Picard’s intellectual pride and exhaustion to extract Starfleet secrets.\
    \ After removing Picard’s restraints and engaging him in a deceptively academic\
    \ discussion about Cardassian archaeology—highlighting the plunder of Hebitian\
    \ burial vaults—Madred abruptly pivots to accusations of Federation criminality\
    \ and demands details on the Minos Korva defense strategy. Picard resists with\
    \ calculated ambiguity, but Madred’s true intent becomes clear: to dehumanize\
    \ Picard by stripping him of rank and dignity, culminating in his naked suspension\
    \ from the ceiling. The exchange reveals Madred’s dual tactics—intellectual provocation\
    \ and brutal humiliation—while Picard’s legal appeals are ignored, underscoring\
    \ the Cardassians’ disregard for Federation principles. The scene escalates from\
    \ psychological warfare to physical torment, setting up Picard’s prolonged resistance\
    \ and the Cardassians’ escalating desperation for intelligence.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e11
  scene_sequence: 3
  sequence_in_scene: 4
  key_dialogue:
  - 'MADRED: Captain Picard... I dislike using drugs... but it is the most efficient
    means of getting information. Unless, of course, you were given a neuro-inhibitor...
    enabling you to withhold it.'
  - 'PICARD: I can''t imagine what information I have that would be meaningful to
    you.'
  - 'MADRED: We need to know the Federation''s defense strategy for Minos Korva.'
  - 'PICARD: You''ve injected me with drugs. You must know that I have already answered
    truthfully every question put to me.'
  - 'MADRED: From this point on, you will enjoy no privileges of rank... no privileges
    of person. From now on, I will refer to you only as human. You have no other identity.'
  - 'MADRED: Are you quite sure [about the number of lights]? ... Strange... I see
    five.'
  - 'PICARD: There are four lights.'
  - 'MADRED: I asked you... how many lights you see there. ... I don''t understand
    how you can be so mistaken.'
