  - object_uuid: ger_object_7d7609a46767
    description_of_involvement: The shuttlecraft’s flight controls are Riker’s primary
      interface during the evasive maneuver, their responsiveness determining whether
      the shuttle avoids collision. His grip on the controls and the violent banking
      motion they enable demonstrate their role as the crew’s lifeline in this moment.
      The controls’ functionality under such stress highlights the shuttle’s engineering—designed
      to handle extreme conditions but pushed to its limits by the nebula and the
      Cardassian threat.
    status_before_event: Functional but degraded, with Riker relying on secondary
