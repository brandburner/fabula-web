      of internal conflicts or personal loyalties.
    influence_mechanisms:
    - Institutional protocol and mission parameters, which dictate the technical and
      logistical requirements for the deployment.
    - Command authority, as embodied by Jellico’s decisions and the crew’s adherence
      to his directives, despite personal reservations.
    - Technical expertise and adaptability, as demonstrated by Geordi’s modifications
      to the shuttlecraft’s systems and the crew’s reliance on precision and skill.
    institutional_impact: The event underscores the tension between Starfleet’s defensive
      strategies and its exploration ideals, as well as the organizational challenges
      of maintaining command authority during crises. It highlights the crew’s internal
      conflicts and the ethical ambiguities of their mission, reflecting broader institutional
      dynamics within Starfleet.
    internal_dynamics: Internal debate over response strategy (Jellico’s preemptive
      strike vs. the crew’s loyalty to Riker) and chain of command being tested (Jellico’s
      authority challenged by the crew’s personal bonds and professional judgments).
