- fabula_uuid: cand_evt_scene_22504c7f35a99112_02
  global_id: null
  title: Jellico detonates mine to force Cardassian surrender
  description: "\n  On the *Enterprise* bridge, Jellico seizes the moment after Riker\
    \ confirms the anti-matter mines are laid in the nebula. Without hesitation, he\
    \ declares a Red Alert and opens a hostile channel to Gul Lemec, immediately escalating\
    \ the standoff. When Lemec protests Starfleet’s presence in Cardassian territory,\
    \ Jellico cuts through the posturing with a blunt threat: every Cardassian ship\
    \ has a mine attached, and he’s ready to detonate them. To prove his resolve,\
    \ he orders Worf to trigger a small explosion near Lemec’s vessel, visibly rattling\
    \ the Cardassian commander. The demonstration works—Lemec, now vulnerable and\
    \ outmaneuvered, demands Jellico’s terms. Jellico dictates a humiliating surrender:\
    \ the Cardassian fleet must disarm and withdraw, ship by ship, while ejecting\
    \ their primary phaser coils. Just as Lemec reluctantly agrees, Jellico adds a\
    \ final, personal demand: the immediate return of Picard. The exchange underscores\
    \ Jellico’s ruthless pragmatism, his willingness to exploit leverage without moral\
    \ hesitation, and the stark contrast between his command style and Picard’s principles.\
    \ The moment also reveals the fragility of Lemec’s authority, as his bluster crumbles\
    \ under direct pressure. For the *Enterprise* crew, this is a turning point—Jellico’s\
    \ methods may secure their survival, but at the cost of their ethical compass.\n\
    \  "
