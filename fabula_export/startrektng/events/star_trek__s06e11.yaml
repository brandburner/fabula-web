- fabula_uuid: act_a251caca70f8f441
  number: 2
  summary: Act Two intensifies Picard's torture and deepens the conflict on the Enterprise.
    Gul Madred begins his psychological torment by forcing Picard to deny reality,
    specifically demanding he acknowledge 'five lights' when only four are present.
    Madred demonstrates a pain-inducing implant, using it to inflict severe pain and
    break Picard's will. Concurrently, Riker, Crusher, and Worf return to the Enterprise,
    having escaped Celtris Three. Jellico maintains his hardline stance, refusing
    to consider a rescue for Picard, further alienating the crew. Gul Lemec attempts
    to leverage Picard's capture by showing Jellico a recording of a drugged Picard
    and offering to release him in exchange for a complete Federation withdrawal from
    the sector. Jellico rejects this proposal, refusing to acknowledge Picard as a
    prisoner of war, effectively abandoning him to be treated as a terrorist. This
    decision sparks a heated confrontation between Jellico and Riker, culminating
    in Jellico relieving Riker of duty for insubordination, creating a significant
    rift within the command structure.
