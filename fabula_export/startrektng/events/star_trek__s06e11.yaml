  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: 'Starfleet is the institutional backbone of this event,
      guiding the *Enterprise*’s actions through its protocols, chain of command,
      and strategic priorities. Jellico’s orders—from the intercept course to the
      analysis of the Reklar’s hull—are all framed within Starfleet’s operational
      guidelines, even as he bends them to suit the urgency of the situation. The
      organization’s influence is felt in the crew’s adherence to procedure (e.g.,
      Geordi’s tricorder analysis, Data’s navigation orders) and in the high stakes
      of the mission: protecting Federation territory and civilians. Starfleet’s presence
      in this event is both a constraint (Jellico must justify his aggressive tactics)
      and an enabler (the *Enterprise*’s resources and crew expertise allow for rapid
      response).'
    active_representation: Through institutional protocols (e.g., sensor analysis,
      navigation orders) and the chain of command (Jellico’s authority, Data’s execution
      of orders).
    power_dynamics: Exercising authority over the *Enterprise*’s crew and resources,
      but operating under the constraints of Starfleet’s ethical and tactical standards.
      Jellico’s leadership is tested as he balances aggressive action with institutional
      expectations.
    organizational_goals:
    - Prevent a Cardassian invasion of Minos Korva by intercepting their fleet before
      it can strike.
    - Uphold Starfleet’s defensive posture while minimizing collateral damage and
      adhering to the principles of the Selonis Convention.
    influence_mechanisms:
    - Through the *Enterprise*’s crew, who are trained to execute Starfleet’s missions
