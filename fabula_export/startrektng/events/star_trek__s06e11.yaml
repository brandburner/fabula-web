  key_dialogue: &id009
  - 'MADRED: I remember the first time I ate live taspar... I was four years old and
    living on the streets of Lakat... there was a band of children... desperately
    trying to survive... We were thin, scrawny little animals... constantly hungry,
    always cold...'
  - 'PICARD: Unlike you, I had no pleasant refuge in my mind... gentle memories of
    family gatherings... No... I''m sure you didn''t. How rewarding it must be now
    to repay others for all those years of misery.'
  - 'PICARD: Madred, when I look at you now, I won''t see a powerful Cardassian officer...
    but a small boy weeping because he was powerless to protect himself. In spite
    of what you have done to me... I find you a pitiable man.'
  - 'PICARD: You are four years old... weak and helpless... you cannot harm me...
    ((singing)) Sur le pont... d''Avignon... on y danse... on y danse...'
