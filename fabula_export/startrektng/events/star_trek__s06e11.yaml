acts:
- fabula_uuid: act_011ca7a969e00d8a
  number: 1
  summary: 'Act One establishes Captain Picard''s initial captivity and the precarious
    diplomatic situation on the USS Enterprise. Gul Lemec confronts Captain Jellico,
    falsely accusing Picard of attacking Cardassian territory and revealing Picard''s
    capture. Jellico, demonstrating a pragmatic and detached command style, prioritizes
    strategic defense over Picard''s immediate rescue, ordering security protocols
    changed and dismissing Riker''s request for a rescue mission. Meanwhile, Picard
    endures initial psychological manipulation by Gul Madred. Madred attempts to disorient
    Picard by removing his blindfold in bright light and engaging in a seemingly innocuous
    conversation about archaeology and Cardassian history. Picard, attempting to understand
    Madred''s methods, subtly challenges Madred''s justifications for Cardassian militarism.
    Madred then reveals the true motive: Picard was lured to Celtris Three because
    the Cardassians believed he possessed Starfleet defense plans for Minos Korva.
    Madred escalates the torture by restraining Picard, stripping him naked, and declaring
    his identity nullified, leaving him vulnerable and isolated in the interrogation
    room.'
