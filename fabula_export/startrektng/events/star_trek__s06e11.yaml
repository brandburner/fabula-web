- fabula_uuid: cand_evt_scene_22504c7f35a99112_01
  global_id: null
  title: Jellico Threatens Cardassian Retreat
  description: 'After Riker confirms the successful placement of anti-matter mines
    in the nebula, Jellico immediately escalates tensions by declaring a Red Alert
    and opening a hostile channel to Gul Lemec. He leverages the mines—now attached
    to Cardassian ships—as a weapon, detonating one as a demonstration of his resolve.
    The act forces Lemec into a vulnerable position, compelling him to negotiate terms:
    disarming his fleet and surrendering Picard. Jellico’s calculated aggression reveals
    his distrust of Starfleet’s leadership and his willingness to provoke conflict,
    setting the stage for a potential confrontation with the Cardassians. The scene
    underscores the stark contrast between Jellico’s pragmatic ruthlessness and Picard’s
    principled resistance, while also exposing the fragility of diplomatic relations
    under pressure. The detonation of the mine serves as a visceral reminder of the
    high stakes, forcing Lemec to concede without further escalation—at least for
    now.'
