      imminent danger. The confined space forces intimacy between the crew, their
      actions and reactions intertwined.
    functional_role: Operational hub for the mission, where tactical decisions are
      made and executed in real-time. The shuttle’s systems and layout dictate the
      crew’s ability to respond to threats.
    symbolic_significance: Represents the fragility of Starfleet’s presence in the
      nebula—a lone craft against overwhelming odds, relying on skill and adaptability
      to survive.
    access_restrictions: Restricted to Riker and Geordi; the shuttle is a sealed environment
      with no external access during the mission.
    key_environmental_details:
    - Flickering monitors casting eerie light on the crew’s faces
