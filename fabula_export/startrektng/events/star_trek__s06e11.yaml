      create a claustrophobic atmosphere, where every sound (the hum of failing consoles,
      the groan of metal) heightens the stakes. This location is both a battleground
      and a sanctuary: it’s where the crew’s skills are tested, but also where their
      improvisation can turn the tide.'
    observed_atmosphere: Claustrophobic and electrically charged, with the hum of
