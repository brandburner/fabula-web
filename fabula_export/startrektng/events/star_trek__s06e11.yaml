  - object_uuid: ger_object_59913a0d0a64
    description_of_involvement: Riker’s anti-matter mines are the physical manifestation
      of Jellico’s leverage over Lemec. While Riker is not present on the bridge during
      this event, the mines he and La Forge laid in the nebula are the reason Jellico
