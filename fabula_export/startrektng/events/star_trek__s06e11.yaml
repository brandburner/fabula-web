  title: Jellico and Riker Confront Mutual Disdain
  description: "\n  In Riker’s quarters, Captain Jellico arrives under the pretense\
    \ of camaraderie but swiftly abandons diplomacy, bluntly admitting his disdain\
    \ for Riker—calling him insubordinate, arrogant, and a poor first officer. Riker,\
    \ unfazed, retaliates with a scathing assessment of Jellico’s leadership: controlling,\
    \ untrustworthy, and joyless. The exchange lays bare their mutual contempt, exposing\
    \ the fractured command structure aboard the *Enterprise*. Despite their animosity,\
    \ Jellico—stripped of his usual authority—swallows his pride and asks (rather\
    \ than orders) Riker to pilot a critical mission into the McAllister Nebula. Riker,\
    \ after a tense pause, agrees, marking a fragile truce born of necessity rather\
    \ than respect. The scene underscores the crew’s vulnerability amid the Cardassian\
    \ threat, where personal conflict must yield to survival.\n  "
