- fabula_uuid: act_eaceb4f2793d1291
  number: 3
  summary: Act Three shifts focus to the Enterprise's investigation and Picard's continued
    psychological battle. Data is promoted to First Officer, bringing a new dynamic
    to the command team. Geordi's initial tricorder analysis yields no immediate clues,
    but Data deduces that Picard was specifically targeted due to his unique experience
    with theta-band devices, suggesting the Cardassians are preparing for a major
    offensive. Jellico realizes the Cardassians are likely planning an attack on Minos
    Korva and orders a discreet scan of Lemec's ship. Meanwhile, Madred brings his
    young daughter, Jil Orra, into the interrogation room, using her presence to further
    manipulate Picard. Madred attempts to justify Cardassian brutality to his daughter,
    presenting himself as a hero. Picard attempts to turn this against Madred, warning
    him about the long-term psychological impact on his daughter. Madred reacts violently,
    striking Picard, but Picard scores a small victory by making Madred reveal his
    emotional vulnerability. Geordi's scan reveals hull degradation on Lemec's ship,
    leading Jellico to confirm the Cardassian fleet is hiding in the McAllister Nebula,
    poised for an invasion of Minos Korva. Madred, feigning Picard's release, then
    claims he will torture Beverly Crusher and has killed Worf. Picard, to protect
    Crusher, chooses to remain and endure further torture, demonstrating his unwavering
    resolve and self-sacrifice.
