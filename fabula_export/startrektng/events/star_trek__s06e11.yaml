  object_involvements:
  - object_uuid: ger_object_accf1b6b5b10
    description_of_involvement: The shuttlecraft’s inertial dampers, though failing
      earlier in the scene, are briefly mentioned as Riker compensates for their degradation
      during the evasive maneuver. Their partial functionality is evident as the shuttle
      lurches violently but does not break apart, allowing Riker to regain control.
      The dampers’ struggle to stabilize the ship underscores the extreme stress the
      vessel is under, as well as the crew’s reliance on its remaining systems to
      survive the nebula’s hazards.
    status_before_event: Degraded but partially functional—compensating for the shuttle’s
      shaking but unable to fully stabilize it. Riker notes their compensation as
      the ship enters the nebula.
    status_after_event: Severely strained—the evasive maneuver pushes them to their
      limits, but they hold long enough for Riker to level the shuttle. Their condition
      is precarious, with potential for total failure if further stress is applied.
    global_id: ger_object_accf1b6b5b10
  - object_uuid: ger_object_f6080114ddfb
    description_of_involvement: The primitive proximity detector, a relic of 20th-century
      technology, becomes the crew’s sole means of navigation in the nebula’s sensor-blinding
      environment. Its fuzzy, 500-meter-range display provides critical—though limited—warning
      of the Cardassian warship’s sudden appearance. The detector’s limitations are
      underscored by Riker’s sarcastic remark, but its functionality is pivotal in
      avoiding collision. Without it, the shuttle would be entirely blind to threats
      in the nebula.
    status_before_event: Functional but unreliable—operational with a 500-meter range,
      displaying a fuzzy graphic of the area ahead. It is Geordi’s primary tool for
      detecting Cardassian ships amid the nebula’s interference.
    status_after_event: Still functional but now a proven lifeline—its warning of
      the Cardassian warship’s proximity allows Riker to execute the evasive maneuver.
      The detector remains active, though its limitations are starkly evident.
    global_id: ger_object_f6080114ddfb
  - object_uuid: ger_object_dea579356176
    description_of_involvement: The shuttlecraft’s transporter system is critical
