      values should be upheld in Picard’s absence. Jellico represents the institutional
      side of Starfleet—rigid, hierarchical, and focused on operational success at
      all costs—while Riker embodies the humanistic, principled side, loyal to Picard’s
      leadership style. The mission into the McAllister Nebula is framed as a Starfleet
      directive, but the personal conflict reveals the tension between Starfleet’s
      ideals and the reality of its chain of command. The organization’s presence
      is felt in Jellico’s insistence on protocol and Riker’s quiet rebellion against
      it.
    active_representation: Through the institutional protocols Jellico invokes (e.g.,
      his initial formality, his framing of the mission as a Starfleet necessity)
      and the unspoken loyalty Riker feels to Picard’s Starfleet legacy (e.g., his
      defiance of Jellico’s authority).
    power_dynamics: Starfleet’s authority is exercised through Jellico’s temporary
      command, but Riker’s resistance—rooted in his loyalty to Picard and the *Enterprise*’s
      crew—challenges the organization’s ability to enforce unity in crisis. The power
      dynamic is unstable, with Jellico’s control fragile and Riker’s cooperation
      grudging.
