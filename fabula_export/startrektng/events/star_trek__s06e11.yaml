      of communication through which the confrontation unfolds. It allows Jellico
      to project his authority into Lemec’s domain, delivering his threats and demands
      with cold precision. The channel’s open status ensures that Lemec cannot ignore
      or evade Jellico’s words, making the psychological impact of the mine detonation
      even more effective. The com channel also serves as a symbol of Starfleet’s
      ability to insert itself into Cardassian affairs, even in their own territory.
      Its role in the event is critical, as it enables the real-time negotiation and
      coercion that leads to Lemec’s surrender.
    status_before_event: Closed, awaiting Jellico’s command to open. The channel is
      a passive tool, ready to be activated for communication.
    status_after_event: Open and active, serving as the conduit for Jellico’s demands
