  sequence_in_scene: 9
  key_dialogue:
  - |-
    LEMEC: What is your current assignment?
    PICARD: Special operations on Celtris Three.
  - |-
    LEMEC: And if we wish to execute him?
    RIKER: Under the terms of the Selonis Convention, Captain Picard must...
    LEMEC: ((hard)) The Selonis Convention applies to prisoners of war... which means you would have to acknowledge that he was captured during a mission authorized by the Federation. Do you wish to make such an admission?
    JELLICO: No.
  - |-
    RIKER: I can't believe you're going to sacrifice the Captain's life for a negotiating tactic.
    JELLICO: ((angry)) It would play right into Gul Lemec's hand. He's just waiting for some sign of weakness in our position before he starts making more demands.
    RIKER: As First Officer it's my responsibility to point out what may be mistakes in the actions of the commanding officer. Sir.
    JELLICO: Then maybe it's time you found other responsibilities. You're relieved.
