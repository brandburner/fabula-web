    JELLICO: I have every confidence that you will make an outstanding first officer.
    DATA: Thank you, sir. But I do not believe that I am more qualified than Commander Riker.
    JELLICO: I admire loyalty in an officer. But don’t let it blind you to more pressing concerns.
  - |-
    DATA: It is possible that the Cardassians were interested in specifically capturing Captain Picard.
    GEORDI: What makes you say that?
    DATA: The metagenic weapon which they were supposedly developing used a theta-band subspace delivery system. Captain Picard is one of only three Starfleet Captains with extensive experience in testing theta-band devices.
  - |-
    JELLICO: If our theory is correct, it would mean the Cardassians are preparing for an attack somewhere in this sector.
    DATA: If Captain Picard is aware of our defense plans for this sector, we could be at a serious tactical disadvantage.
    JELLICO: Admiral Nechayev just transmitted the plans to me this afternoon. Picard never saw them.
    DATA: In that case, he may be tortured for information that he does not have.
