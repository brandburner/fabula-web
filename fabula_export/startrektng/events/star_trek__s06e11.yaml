  object_involvements:
  - object_uuid: ger_object_5005ee933e9b
    description_of_involvement: "\n        The metagenic weapon is the catalyst for\
      \ the entire confrontation, though it is only referenced indirectly. Lemec’s\
      \ accusation that Picard’s team ‘attacked’ a Cardassian outpost on Celtris Three—where\
      \ they were investigating the weapon—frames the weapon as a flashpoint in the\
      \ escalating tensions. Jellico’s vague confirmation that Picard was ‘sent to\
      \ investigate reports’ of the weapon downplays its significance, but the weapon’s\
      \ existence looms as a potential casus belli. Its role in the event is symbolic:\
      \ it represents the high-stakes intelligence and military secrets at play, as\
      \ well as the moral ambiguity of Starfleet’s covert operations.\n      "
    status_before_event: A classified, potentially operational weapon on Celtris Three,
      its existence known to Starfleet but not fully understood by the Enterprise
      crew.
    status_after_event: Implied to be destroyed or secured by the Cardassians, but
      its investigation remains a point of contention in the negotiation.
    global_id: ger_object_5005ee933e9b
  - object_uuid: ger_object_e81658bb0398
    description_of_involvement: "\n        Jellico’s order to Troi to ‘change every\
      \ security code and protocol that Captain Picard might have had access to’ transforms\
      \ the Enterprise’s security systems from a passive backdrop into an active tool\
      \ of operational security. The codes are not just digital barriers; they symbolize\
      \ the trust and vulnerability of Starfleet’s infrastructure. By prioritizing\
      \ their change over Picard’s immediate safety, Jellico weaponizes protocol,\
      \ turning the codes into a shield against potential leaks—and a metaphor for\
      \ his ruthless pragmatism. The order is delivered with clinical precision, its\
      \ emotional weight lost on Jellico but not on Troi, who recognizes it as a betrayal\
      \ of Picard’s value to the crew.\n      "
    status_before_event: Active and accessible to Picard, reflecting the trust placed
      in him as captain.
    status_after_event: Compromised in Jellico’s eyes; being systematically altered
