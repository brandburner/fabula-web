  key_dialogue:
  - 'JELLICO: Starfleet now believes the Cardassians are preparing to invade Minos
    Korva. That will not be allowed to happen. The Sutherland, the Berlin, and the
    Aries have been dispatched to this sector. But they''re still three days away.
    Until they arrive, it''s up to us.'
  - 'BEVERLY: I thought the nebula was in Cardassian territory. JELLICO: That''s right.
    BEVERLY: I was just part of an undercover mission into Cardassian territory...
    I felt it was justified in order to destroy a weapon that was potentially catastrophic.
    But you''re talking about a first strike. An act of war. I can''t believe that
    Starfleet would condone it.'
  - 'TROI: But there are two million colonists on Minos Korva. If we wait until the
    Cardassians attack... tens of thousands of innocent people could be killed. JELLICO:
    ((flatly)) This discussion is moot. The plan has been approved and we''re going
    ahead.'
