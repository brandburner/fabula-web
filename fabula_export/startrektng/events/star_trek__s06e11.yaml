  - location_uuid: ger_location_57e9609cb764
    description_of_involvement: 'Minos Korva is the focal point of this event’s strategic
      urgency, serving as both the target of the Cardassian attack and the destination
      of the *Enterprise*’s intercept mission. Though the system is not physically
      present on the bridge, its mention by Geordi—eleven light years from the McAllister
      Nebula and a former Cardassian target during the war—electrifies the crew. The
      system’s vulnerability, combined with its strategic importance to the Federation,
      makes it the linchpin of Jellico’s decision to set course at maximum warp. Minos
      Korva’s role in the event is to embody the stakes: a civilian population of
      two million lives hangs in the balance, and the *Enterprise*’s intervention
      may be the only thing standing between the Cardassians and another annexation
      attempt.'
    observed_atmosphere: 'Tense and fraught with urgency. The mention of Minos Korva
      shifts the crew’s focus from analysis to action, as the abstract threat becomes
      a concrete mission: save the system at all costs.'
    functional_role: Primary target of the Cardassian invasion, representing a strategic
