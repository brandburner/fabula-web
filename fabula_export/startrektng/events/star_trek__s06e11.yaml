  global_id: null
  title: Picard resists psychological interrogation
  description: "\n  In a Cardassian interrogation room, Gul Madred escalates his psychological\
    \ manipulation of Picard after a brief legal victory. Picard, blindfolded and\
    \ restrained, invokes Federation-Cardassian legal protocols to force Madred to\
    \ remove his blindfold—a small but critical tactical win. Madred then probes Picard\
    \ about Starfleet interrogation methods, only to pivot to a deceptively academic\
    \ discussion about Cardassian archaeology, revealing his dual tactics: exploiting\
    \ Picard’s intellectual pride while probing for Starfleet vulnerabilities. When\
    \ Picard counters with moral critiques of Cardassian militarism, Madred retaliates\
    \ by stripping him of his jumpsuit, leaving him naked and vulnerable, and demonstrating\
    \ a pain-inducing device implanted in Picard’s chest. The exchange underscores\
    \ the psychological warfare at play, with Madred testing Picard’s resilience while\
    \ Picard strategically deflects and searches for Madred’s weaknesses. The scene\
    \ ends with Picard’s physical and psychological torment escalating, setting up\
    \ further resistance and the revelation of the Cardassians’ true intentions regarding\
    \ Minos Korva.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e11
