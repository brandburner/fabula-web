  title: Jellico dismisses Beverly’s grief
  description: In Sickbay, Beverly Crusher—physically and emotionally drained—relays
    the failed rescue attempt on Celtris Three, her voice laced with bitterness and
    self-recrimination. She admits they had no chance to retrieve Picard, and Jellico’s
    cold pragmatism ('You were smart not to try') only deepens her guilt. His brief,
    patronizing hand on her shoulder and abrupt dismissal ('Get some rest, Doctor')
    underscore his detachment from the crew’s emotional toll. When he turns to Riker
    with a curt 'Wil...' and exits, the scene crystallizes Jellico’s prioritization
    of mission objectives over moral or emotional consequences, leaving Beverly—and
    the audience—with a stark reminder of the human cost of his command. The moment
    also foreshadows the growing rift between Jellico’s leadership and the crew’s
    loyalty to Picard, as Riker’s silent compliance hints at his own simmering frustration.
