  object_involvements:
  - object_uuid: ger_object_accf1b6b5b10
    description_of_involvement: The shuttlecraft’s inertial dampers strain to compensate
      as Riker executes the sharp evasive maneuver, their failure to fully absorb
      the G-forces causing the craft to lurch violently. This physical stress tests
      their limits, but their partial functionality is what allows the shuttle to
      recover and stabilize after the near-miss. The dampers’ role here is passive
      but vital—without them, the maneuver could have torn the shuttle apart, making
      Geordi’s mine deployment impossible.
    status_before_event: Functioning but degraded, compensating for earlier system
      failures as the shuttle enters the nebula.
    status_after_event: Still operational but pushed to their limits; their partial
      success is evident in the shuttle’s ability to recover.
