- fabula_uuid: cand_evt_scene_5f1d92b646822ecc_01
  global_id: null
  title: Jellico promotes Data and probes Celtris Three
  description: In the Ready Room, Captain Jellico formally promotes Data to First
    Officer, dismissing Data’s objection that Riker is more qualified. Jellico’s pragmatic
    leadership style is evident as he prioritizes efficiency over tradition, signaling
    his command philosophy. When Geordi enters with the tricorder report from Celtris
    Three, Jellico quickly dismisses the findings as unremarkable, but Data’s analytical
    insight reveals the Cardassians likely targeted Picard for his theta-band subspace
    expertise. This realization shifts the narrative from a general trap to a deliberate,
    high-stakes operation, exposing the Cardassians’ strategic intent and raising
    the stakes for Picard’s survival. Jellico then orders Geordi to discreetly scan
    Gul Lemec’s ship for clues about the Cardassians’ next move, underscoring his
    focus on tactical advantage over emotional considerations. The exchange also foreshadows
    the crew’s growing unease with Jellico’s detached command style and sets up Data’s
    critical role in uncovering the Cardassians’ plans.
