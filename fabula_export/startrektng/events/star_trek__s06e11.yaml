  title: Jellico orders preemptive strike despite crew dissent
  description: "\n  In the Observation Lounge, Captain Jellico reveals Starfleet’s\
    \ belief that the Cardassians are preparing to invade Minos Korva and announces\
    \ his plan for a preemptive strike against their hidden fleet in the McAllister\
    \ Nebula. Beverly Crusher challenges the moral and tactical legitimacy of the\
    \ attack, citing her recent undercover mission into Cardassian territory as precedent\
    \ for justified risk, but Jellico dismisses her concerns, invoking Admiral Necheyev’s\
    \ approval and his own discretionary authority. Geordi La Forge questions the\
    \ assumption that the Cardassians are hostile, while Deanna Troi counters by emphasizing\
    \ the urgency of protecting the two million colonists on Minos Korva. Jellico\
    \ shuts down further debate, assigning Worf to prepare anti-matter mines and Geordi\
    \ to outfit a nebula-capable shuttle, while Beverly bitterly anticipates the casualties\
    \ to come. The scene underscores Jellico’s authoritarian leadership style, the\
    \ crew’s fractured loyalty, and the ethical cost of his command decisions in Picard’s\
    \ absence. The 17-hour deadline for the attack looms as a ticking clock, escalating\
    \ tension and foreshadowing the human cost of the mission.\n  "
