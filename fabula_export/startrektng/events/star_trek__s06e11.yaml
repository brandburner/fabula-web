      surrender, demanded by Jellico as a symbol of Cardassian disarmament. Its ejection
      from each ship is a humiliating act of compliance, stripping the Cardassian
      fleet of its primary offensive capability. The phaser coil represents the shift
      in power dynamics, with Starfleet now dictating the terms of engagement. Its
      role in the event is symbolic as well as tactical, as it underscores the Cardassians’
      vulnerability and Jellico’s dominance. The coil’s ejection is a physical manifestation
      of Lemec’s defeat, ensuring that the Cardassian fleet is left defenseless and
      unable to retaliate.
    status_before_event: Intact and operational on each Cardassian ship, providing
      the fleet with its primary phaser capability. The coils are a symbol of Cardassian
      military strength.
    status_after_event: Ejected into space as a condition of surrender, rendering
      the Cardassian ships defenseless. The coils’ removal is a tangible sign of Lemec’s
      compliance and the Cardassians’ defeat.
    global_id: ger_object_d06a66554be5
  - object_uuid: ger_object_db996ac62820
