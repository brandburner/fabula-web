    still alive. Under the circumstances, a rescue attempt would be foolhardy.'
  - 'RIKER: Shouldn''t we assume he is alive until we know otherwise? We can''t just
    abandon him.'
  - 'JELLICO: ((hard)) He''s gone. I''m sorry Wil, but you''re going to have to accept
    that.'
