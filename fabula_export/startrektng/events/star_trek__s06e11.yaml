  - object_uuid: ger_object_59913a0d0a64
    description_of_involvement: The anti-matter mines, stored in suitcase-sized containers,
      are the shuttle’s payload and the mission’s critical asset. Initially, Geordi
      is preparing them for deployment on the transporter when the Cardassian warship
