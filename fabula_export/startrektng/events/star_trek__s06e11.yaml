    in Jellico relieving Riker of duty, exposing the moral fracture in the *Enterprise*’s
    command structure and setting the stage for a potential mutiny or covert rescue
    mission. The scene underscores Jellico’s ruthless pragmatism and Riker’s unyielding
    loyalty to Picard, while Lemec’s psychological manipulation reveals the Cardassians’
    intent to exploit Federation divisions.
