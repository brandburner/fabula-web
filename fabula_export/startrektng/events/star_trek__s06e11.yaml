  key_dialogue:
  - 'PICARD: I demand to see a neutral representative... as required by the Federation-Cardassian
    peace treaty.'
  - 'MADRED: I dislike using drugs... but it is the most efficient means of getting
    information. Unless, of course, you were given a neuro-inhibitor... enabling you
    to withhold it.'
  - 'PICARD: That war cost you hundreds of thousands of lives... depleted your food
    supplies... left your population weakened and miserable... and yet you risk war
    again.'
  - 'MADRED: From this point on, you will enjoy no privileges of rank... no privileges
    of person. From now on, I will refer to you only as human. You have no other identity.'
  - 'MADRED: I asked you... how many lights you see there.'
  - 'PICARD: There are four lights.'
  - 'MADRED: Strange... I see five.'
