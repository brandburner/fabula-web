  title: Jellico rejects Picard rescue attempt
  description: In a tense corridor confrontation, Captain Jellico dismisses Commander
    Riker’s plea to mount a rescue mission for Picard, who remains presumed alive
    in Cardassian custody. Jellico’s cold pragmatism—‘He’s gone’—contrasts sharply
    with Riker’s emotional insistence on hope and loyalty, exposing the widening rift
    between Starfleet’s rigid chain of command and the crew’s moral imperative to
    save their captain. The exchange underscores Jellico’s willingness to sacrifice
    Picard for the mission’s strategic objectives, while Riker’s reluctant compliance
    signals his growing disillusionment with Jellico’s leadership. The moment crystallizes
    the conflict between duty and loyalty, foreshadowing the crew’s fracturing allegiance
    under Jellico’s command and setting up future defiance or moral compromise.
