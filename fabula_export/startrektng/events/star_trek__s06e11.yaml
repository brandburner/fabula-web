  key_dialogue:
  - 'DATA: It is possible that the Cardassians were interested in specifically capturing
    Captain Picard.'
  - 'JELLICO: Or maybe something that he was going to do in the future. In case of
    a Cardassian attack, the Enterprise will be assigned as the command ship for this
    sector. If the Cardassians got wind of that...'
  - 'DATA: If Captain Picard is aware of our defense plans for this sector, we could
    be at a serious tactical disadvantage.'
  - 'JELLICO: Admiral Nechayev just transmitted the plans to me this afternoon. Picard
    never saw them.'
  - 'DATA: In that case, he may be tortured for information that he does not have.'
