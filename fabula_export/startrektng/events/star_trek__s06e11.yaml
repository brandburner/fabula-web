      its objectives. The organization’s goals in this event are aligned with Jellico’s:
      to secure the withdrawal of the Cardassian fleet, disarm their ships, and ensure
      the return of Captain Picard. Starfleet’s influence mechanisms include its institutional
      protocols, tactical doctrine, and the authority vested in its commanding officers.'
