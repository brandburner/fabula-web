  object_involvements:
  - object_uuid: ger_object_59913a0d0a64
    description_of_involvement: 'The 500 anti-matter mines are the literal and symbolic
      weapons of Jellico''s preemptive strike, serving as both a tactical tool and
      a moral flashpoint. Their preparation is ordered with urgency, framing them
      as the means to neutralize the Cardassian threat before it can emerge from the
      nebula. The mines'' volatile nature and the magnetic targeting capabilities
      required to function in the McAllister Nebula underscore the high-risk, high-stakes
      nature of the operation. Their deployment is not just a strategic move but a
      moral gambit, one that Beverly Crusher explicitly ties to the inevitability
      of casualties. The mines thus become a tangible representation of the ethical
      dilemma at the heart of the scene: the crew''s willingness to trade potential
      Cardassian lives for the certainty of protecting Minos Korva.'
    status_before_event: Stored in the Enterprise's armory, inactive and untargeted,
      awaiting modification for nebula operations.
    status_after_event: Assigned to Worf for immediate preparation with magnetic targeting
      capabilities, slated for deployment within the 17-hour window.
    global_id: ger_object_59913a0d0a64
