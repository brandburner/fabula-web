  key_dialogue: &id003
  - 'JELLICO: The answer is no, Gul Lemec. We won''t be frightened away from a system
    which is legitimately ours.'
  - 'LEMEC: A brave stand. But I think you have an expression... something about discretion
    often being the better part of valor.'
  - 'JELLICO: Could there be Cardassian ships inside the McAllister Nebula?'
  - 'GEORDI: It''s possible... but they couldn''t stay in there very long. The particle
    flux in the nebula would begin to degrade a ship''s hull after about seventy-two
    hours.'
  - 'JELLICO: Is there a Federation system near the McAllister Nebula that might interest
    the Cardassians?'
  - 'GEORDI: Minos Korva is only eleven light years from the Nebula... and the Cardassians
    tried to annex it during the war...'
  - 'JELLICO: Data, I want to be at Minos Korva in one hour.'
