- fabula_uuid: cand_evt_scene_f7ec0f2d7faea276_02
  global_id: null
  title: Cardassian warship ambush forces mine deployment
  description: 'In the cramped, systems-degraded shuttlecraft, Commander Riker and
    Geordi La Forge navigate the McAllister Nebula using a primitive proximity detector—a
    last-resort measure after losing primary navigation and sensors. Their tense,
    professional demeanor masks the high stakes: this mission hinges on their ability
    to improvise in a hostile environment. The shuttle suddenly lurches as Riker spots
    a massive Cardassian warship materializing dangerously close on the proximity
    detector. With no time to react, Riker executes a sharp evasive maneuver, barely
    avoiding collision. The near-miss forces Geordi to abandon preparations for the
    mines and immediately begin deployment, escalating the tactical stakes. The Cardassian
    ship’s sudden appearance isn’t just a threat—it’s a strategic provocation, compelling
    the shuttle crew to take aggressive action (mine deployment) that directly challenges
    the Cardassian invasion force. The event underscores the shuttle’s vulnerability
    and the crew’s resourcefulness, while also setting up a critical confrontation
    between Starfleet and the Cardassians in the nebula. Riker’s sarcastic remark
    about the proximity detector’s limitations hints at his frustration with the mission’s
    constraints, but his quick thinking and Geordi’s technical readiness reveal their
    shared determination to execute the plan despite the odds. The mine deployment
    isn’t just a tactical move—it’s a defiant response to the Cardassians’ aggression,
    signaling that Starfleet will not yield without a fight.'
