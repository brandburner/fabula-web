  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: 'Starfleet is the institutional force driving the
      *Enterprise*’s response to the Cardassian threat. Jellico’s defiance of Lemec’s
      ultimatum and his order to intercept the Cardassians at Minos Korva are actions
      taken in Starfleet’s name, reflecting its commitment to defending Federation
      space. The organization’s protocols—such as the four-shift rotations and operational
      secrecy—are implied in Jellico’s leadership style. Starfleet’s reliance on technical
      expertise (e.g., Geordi’s analysis) and tactical precision (e.g., Data’s course
      relay) is evident, as is its willingness to act decisively in the face of aggression.
      The crew’s unity under Jellico’s command embodies Starfleet’s core values: exploration,
      diplomacy, and defense.'
    active_representation: Through the actions of Captain Jellico, the crew’s adherence
      to protocol, and the *Enterprise*’s operational readiness. Starfleet’s presence
      is felt in the bridge’s layout, the crew’s roles, and the urgency of their mission.
    power_dynamics: Exercising authority over the *Enterprise* crew and asserting
      dominance over the Cardassian threat. Starfleet’s power is both defensive (protecting
      Minos Korva) and proactive (intercepting the Cardassian fleet).
    organizational_goals:
    - Defend Federation space from Cardassian incursion, particularly the strategically
      vital system of Minos Korva.
    - Counter the Cardassians’ deception by leveraging technical intelligence (e.g.,
      Geordi’s analysis of the *Reklar*’s hull damage) to outmaneuver their hidden
      fleet.
    influence_mechanisms:
    - Through the chain of command, with Jellico issuing orders that the crew executes
      without hesitation.
    - Via institutional protocols, such as red alert procedures and tactical readiness
      drills, which ensure the *Enterprise* is prepared for action.
    - By relying on specialized expertise (e.g., Geordi’s engineering skills, Data’s
      analytical precision) to turn raw data into strategic advantage.
    institutional_impact: The event reinforces Starfleet’s role as a defensive and
      proactive force, balancing diplomatic restraint (e.g., not admitting to incursions)
      with military readiness. Jellico’s leadership style—pragmatic and forward-thinking—reflects
      Starfleet’s adaptability in the face of evolving threats.
    internal_dynamics: The crew’s unity under Jellico’s command is tested but holds
      firm, with each member contributing their specialized skills to the mission.
      There is no overt factionalism, but the tension between Jellico’s temporary
      authority and the crew’s loyalty to Picard is implied.
    global_id: ger_organization_73a4b614bde7
  - organization_uuid: ger_organization_37fde988c994
    description_of_involvement: The United Federation of Planets is the political
      entity that Starfleet serves, and its interests are at the heart of this event.
      Jellico’s rejection of Lemec’s ultimatum is an assertion of the Federation’s
      sovereignty over its systems, including Minos Korva. The Federation’s two million
      colonists in the system are a direct stake in the outcome, making this event
      not just a military confrontation but a defense of civilian lives. The organization’s
      values—exploration, diplomacy, and the protection of its citizens—are embodied
      in Jellico’s decision to intercept the Cardassians. The Federation’s reliance
      on Starfleet to act as its armed wing is evident, as is its commitment to upholding
      the principles of the Selonis Convention (e.g., the humane treatment of prisoners
      like Picard).
    active_representation: Through Starfleet’s actions on behalf of the Federation,
      particularly the *Enterprise*’s mission to defend Minos Korva. The Federation’s
      presence is felt in the strategic importance of the system and the moral imperative
      driving Jellico’s orders.
    power_dynamics: Operating under constraint, as the Federation must balance its
      defensive posture with diplomatic caution. It cannot admit to incursions (e.g.,
      Picard’s capture on Celtris III) but must still act to protect its citizens
      and territory. Starfleet serves as its primary tool for exerting influence in
      this crisis.
    organizational_goals:
    - Protect the Federation’s border systems, such as Minos Korva, from Cardassian
      annexation.
    - Uphold the principles of the Selonis Convention and other diplomatic agreements,
