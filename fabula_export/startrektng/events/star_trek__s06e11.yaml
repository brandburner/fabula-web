- fabula_uuid: cand_evt_scene_5f1d92b646822ecc_03
  global_id: null
  title: Jellico orders covert scan of Lemec’s ship
  description: 'In the Enterprise’s ready room, Captain Jellico promotes Data to first
    officer, subtly undermining Riker’s authority while acknowledging Data’s analytical
    precision. Geordi La Forge delivers Beverly Crusher’s tricorder report from Celtris
    III, revealing no anomalies—yet Data deduces the Cardassians deliberately targeted
    Picard for his theta-band subspace expertise, a rare skill among Starfleet captains.
    Jellico realizes the Cardassians likely lured Picard to extract future defense
    plans for the sector, which Picard never received. The revelation exposes a brutal
    irony: Picard is being tortured for information he doesn’t possess, while Jellico’s
    strategic maneuvering—ordering a covert scan of Gul Lemec’s ship—underscores the
    Cardassians’ calculated efficiency and Picard’s untenable position. The moment
    crystallizes the tension between Starfleet’s desperation and the Cardassians’
    ruthless precision, raising the stakes for Picard’s survival and the Enterprise’s
    response.'
