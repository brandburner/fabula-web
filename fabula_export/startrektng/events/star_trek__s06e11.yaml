    status_after_event: Still operational, though the maneuver tests their durability;
      the shuttle remains flyable post-maneuver.
    global_id: ger_object_7d7609a46767
  - object_uuid: ger_object_f6080114ddfb
    description_of_involvement: The primitive proximity detector is the shuttle’s
      sole navigation tool in the nebula, its fuzzy 500-meter range display suddenly
      revealing the Cardassian warship. Riker’s reaction to its alert—immediately
      banking the shuttle—demonstrates its critical role as a last-resort early warning
      system. The detector’s limitations (noted in Riker’s sarcastic remark) underscore
      the crew’s vulnerability, but its functionality in this moment is what prevents
      a catastrophic collision, directly enabling the mine deployment that follows.
    status_before_event: Activated and monitoring, displaying a fuzzy graphic of the
