  global_id: null
  title: Jellico demands Picard’s return
  description: 'After forcing the Cardassian fleet into submission by detonating a
    mine near their flagship, Captain Jellico seizes the moment to issue a direct
    ultimatum: Picard’s immediate release. The demand is framed as both a strategic
    necessity—tying Picard’s rescue to the broader Cardassian surrender—and a personal
    reckoning, exposing Jellico’s fractured relationship with his predecessor. His
    tone is cold and authoritative, but the insistence on Picard’s return reveals
    an unspoken tension: Jellico’s pragmatic ruthlessness clashes with the moral weight
    of abandoning a captured Starfleet officer. The Cardassian Gul Lemec’s hesitation
    underscores the high stakes, as the demand is not just about Picard’s life but
    about Jellico’s willingness to exploit leverage—even at the cost of moral compromise.
    The scene deepens the contrast between Jellico’s detached pragmatism and Picard’s
    principled resistance, while also setting up the next phase of the conflict: the
    Cardassians’ compliance or defiance.'
