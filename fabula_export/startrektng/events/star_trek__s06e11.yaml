  title: Data reveals Cardassians targeted Picard
  description: In the Ready Room, Jellico promotes Data to First Officer, signaling
    his pragmatic leadership style over tradition. Geordi reports no suspicious tricorder
    readings from Celtris Three, prompting Data to deduce the Cardassians deliberately
    lured Picard due to his theta-band subspace expertise—a revelation that escalates
    the stakes. Jellico theorizes the Cardassians may have sought future defense plans,
    while Data warns Picard could be tortured for information he doesn’t possess.
    The exchange shifts the narrative from a general trap to a targeted operation,
    forcing the crew to confront the Cardassians’ precise, high-value objectives and
    Picard’s untenable position. Jellico orders a covert scan of Lemec’s ship, setting
    up the next phase of investigation and raising the tension around Picard’s survival
    and the impending Cardassian threat.
