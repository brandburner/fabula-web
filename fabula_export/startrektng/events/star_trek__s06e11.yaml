- fabula_uuid: cand_evt_scene_3f9fd7dd5193babf_01
  global_id: null
  title: Jellico unveils preemptive strike plan
  description: In the Enterprise’s observation lounge, Captain Jellico reveals Starfleet’s
    approval of a preemptive anti-matter mine strike against the Cardassian fleet
    hiding in the McAllister Nebula—a move framed as necessary to prevent an imminent
    invasion of Minos Korva. Beverly Crusher immediately challenges the plan’s morality,
    citing its status as an unprovoked act of war, while Geordi La Forge questions
    the lack of definitive evidence. Deanna Troi counters by emphasizing the urgency
    of protecting the colonists, but Jellico shuts down further debate, asserting
    his absolute command authority. The exchange exposes the crew’s fractured loyalty—Beverly’s
    ethical objections, Troi’s pragmatic urgency, and Jellico’s detached pragmatism—while
    Data’s cold calculations (17-hour window before hull degradation forces the Cardassians
    to move) underscore the ticking clock. Jellico dispatches Worf and Geordi to prepare
    the mines and a nebula-capable shuttle, effectively silencing dissent and committing
    the Enterprise to a high-risk, morally fraught course. The scene crystallizes
    the ethical cost of Jellico’s leadership and the crew’s divided allegiances in
    Picard’s absence, setting up the immediate operational and moral consequences
    of the strike.
