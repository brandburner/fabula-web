  title: Jellico confirms Picard’s capture
  description: "\n  In the Enterprise’s observation lounge, Gul Lemec’s accusation\
    \ of a Federation attack on Celtris Three forces Jellico to acknowledge Picard’s\
    \ capture for the first time. While Riker and Troi react with shock and concern,\
    \ Jellico remains coldly pragmatic, revealing only that Picard’s team was sent\
    \ to investigate a metagenic weapon. When Troi warns of impending Cardassian torture,\
    \ Jellico’s immediate response is to order Starfleet Command to change all security\
    \ codes Picard might know—prioritizing operational security over Picard’s well-being.\
    \ The scene underscores Jellico’s ruthless calculus, the escalating stakes of\
    \ Picard’s suffering, and the growing rift between Starfleet’s mission and its\
    \ moral obligations. Riker’s departure to search for Picard and Troi’s exit leave\
    \ Jellico alone, his troubled expression hinting at the weight of his decisions.\n\
    \  "
