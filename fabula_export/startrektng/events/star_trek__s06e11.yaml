  key_dialogue: &id011
  - 'JELLICO: How are we doing?'
  - 'GEORDI: Almost done, sir. I''ve shielded the engine nacelles and the transporter
    system so they won''t be affected by the nebula''s particle flux.'
  - 'JELLICO: Been awhile since I flew one of these... you''re a pilot yourself, aren''t
    you Geordi?'
  - 'GEORDI: Yes, sir.'
  - 'JELLICO: Began my career as a shuttle pilot - on the Jovian Run. Jupiter to Saturn
    and back... once a day, every day.'
  - 'GEORDI: I was on that run for a while.'
  - 'JELLICO: Then you must''ve done Titan''s Turn.'
  - 'GEORDI: Oh, yeah... set a course directly for Titan... hold it until you''re
    just brushing the atmosphere... then throw the helm hard over and whip around
    the moon at point seven c.'
  - 'JELLICO: And pray like hell nobody saw you.'
  - 'GEORDI: Well... this trip into the nebula''s going to need someone who can do
    Titan''s Turn in their sleep. The mines will have to be laid within two kilometers
    of the Cardassian ships. But the particle flux from the nebula will blind all
    the sensors except for the proximity-detector. You''re going to need quite a pilot
    to bring that off.'
  - 'JELLICO: And is that you?'
  - 'GEORDI: No sir, it''s not. The man you want... is Commander Riker.'
  - 'GEORDI: He''s the best there is.'
