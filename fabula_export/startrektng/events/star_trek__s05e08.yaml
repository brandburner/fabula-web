      anger at the Romulans’ manipulation of his likeness and their willingness to
      sacrifice their own troops for conquest.
    goals:
    - Refuse to participate in Sela’s deception, even at the cost of his life, to
      preserve his moral integrity and Vulcan honor.
    - Collaborate with Data and Picard to create a diversion and escape, leveraging
      their access to Romulan computers to disrupt the invasion plan.
