  object_involvements:
  - object_uuid: ger_object_7f26eb3547f4
    description_of_involvement: "\n        Picard’s phaser is a constant, unspoken\
      \ threat throughout the event, its barrel fixed on Sela as she issues her defiant\
      \ warning. The weapon is a physical manifestation of Starfleet’s authority and\
      \ the team’s desperation—Picard does not fire, but the phaser’s presence ensures\
      \ Sela cannot act until Data neutralizes her. Its role is purely deterrent,\
      \ a silent promise of consequences if she resists. The phaser’s design (sleek,\
      \ functional) contrasts with the Romulan disruptors, symbolizing the Federation’s\
      \ commitment to non-lethal solutions where possible.\n      "
    status_before_event: "\n        Armed and ready in Picard’s hand, its energy cell\
      \ charged, barrel trained on Sela. The phaser is a tangible extension of Picard’s\
      \ command presence, its weight a reminder of the stakes.\n      "
    status_after_event: "\n        Holstered or lowered as Data executes the nerve\
      \ pinch, its purpose served. The phaser is no longer needed as a deterrent,\
      \ but its presence in the scene underscores the team’s readiness to use force\
      \ if diplomacy fails.\n      "
    global_id: ger_object_7f26eb3547f4
