  title: Ambush reveals Sela’s invasion ultimatum
  description: "\n  Picard and Spock execute a meticulously planned ambush on Sela\
    \ and her guards in a Romulan office, using Data’s holographic decoy of Riker\
    \ and Starfleet officers to lure them into a false sense of security. The deception\
    \ works—until Sela’s sharp instincts expose the holograms as illusions. In the\
    \ ensuing chaos, Spock and Picard emerge from hidden compartments, swiftly disarming\
    \ the guards with Vulcan nerve pinches and a precise strike. Sela, cornered and\
    \ outmaneuvered, drops her weapon but delivers a chilling revelation: Spock’s\
    \ announcement of reunification—and the Romulan invasion of Vulcan—are now imminent.\
    \ The victory is hollow; the stakes have escalated beyond their control, forcing\
    \ the trio to confront the irreversible consequences of their mission. The scene\
    \ underscores the tension between tactical triumph and strategic defeat, as Sela’s\
    \ warning reframes their struggle from evasion to survival.\n  "
