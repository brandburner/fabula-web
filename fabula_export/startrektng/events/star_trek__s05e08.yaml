      with a fabricated peace speech. He scans it briefly, then refuses to cooperate
      with Sela’s deception, declaring he will not read the statement—even at the
      cost of his life. When Sela activates a holographic duplicate of him to deliver
      the speech, Spock’s resolve hardens, and he begins strategizing with Data and
      Picard to create a diversion and escape. His posture is rigid, his voice measured
