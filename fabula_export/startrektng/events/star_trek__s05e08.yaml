  key_dialogue:
  - 'SELA: Come in, gentlemen. Take a seat, please. ... I rather enjoy writing. I
    don''t get to do it often in this job...'
  - 'PICARD: A ''peace'' envoy in a stolen Vulcan ship...'
  - 'SELA: Actually, three Vulcan ships, Captain... The Enterprise is only aware of
    the one we stole from Qualor Two. We''ve been following their investigation. It
    has forced us to make some minor changes. Including a message that was sent in
    your name, ordering them to stay where they are.'
  - 'SPOCK: I will not read this or any other statement.'
  - 'SELA: If you do not, you will die; all of you will die.'
  - 'SPOCK: It is logical to conclude that you will kill us in any event. Therefore,
    I choose not to cooperate.'
  - 'SELA: By taking advantage of holographic sampling during the last several days,
    we have created a programmable Spock...'
  - 'HOLO SPOCK: This is Ambassador Spock of Vulcan. By now, Federation sensors are
    tracking three Vulcan ships crossing the Neutral Zone. These ships carry the future
    of the Vulcan and Romulan people. Our long conflict is finally over...'
