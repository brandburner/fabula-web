  title: Riker connects stolen ships to Romulan plot
  description: "\n  On the *Enterprise* bridge, Riker reports his discovery that the\
    \ stolen Vulcan ship was delivered to Galorndon Core, immediately raising suspicions\
    \ about Romulan involvement. Picard connects this to Spock’s ongoing reunification\
    \ talks with the Romulan Proconsul, Neral, creating a tension between diplomatic\
    \ optimism and military threat. Troi questions the link, but Picard—acknowledging\
    \ the uncertainty—orders Riker to investigate Galorndon Core at warp eight. The\
    \ scene pivots from Spock’s personal mission to a potential Romulan invasion,\
    \ forcing Picard to prioritize uncovering the conspiracy despite the risk of derailing\
    \ Spock’s efforts. The urgency escalates as the Romulan carrier wave signal cuts\
    \ out, leaving the crew with more questions than answers.\n  "
