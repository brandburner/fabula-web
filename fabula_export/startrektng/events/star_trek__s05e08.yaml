    - The sound of dripping water and distant echoes, amplifying the weight of Spock’s
      words and the mind-meld’s silence.
    - Vulcan symbols and texts etched into the stone, serving as a visual reminder
      of the underground’s ideological roots.
    - The close proximity of the characters, forcing them into an almost claustrophobic
