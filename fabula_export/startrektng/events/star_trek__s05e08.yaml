  - object_uuid: ger_object_378080b0dbb9
    description_of_involvement: 'The transponder signatures of the three Vulcan ships
      are pulled up on the bridge consoles, their digital patterns sharp and unmistakable—yet
      none match the profile of the missing vessel the *Enterprise* has been tracking.
      Geordi’s report that ‘none of the signatures match up’ sends a ripple through
      the crew, as the signatures become the undeniable proof of deception. The objects’
      altered status is a silent accusation, their failure to conform to expected
      Vulcan protocols a red flag that Riker cannot ignore. The signatures are not
      just data; they are the linchpin of the crew’s decision to intercept, their
      inconsistency the catalyst for defying Picard’s orders. Their role is narrative
      and functional: they force the crew to act.'
