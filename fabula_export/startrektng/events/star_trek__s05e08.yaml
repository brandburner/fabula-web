acts:
- fabula_uuid: act_7aad8a071c748bc8
  number: 1
  summary: Captain Picard confronts Ambassador Spock in a Romulan cave, questioning
    his unauthorized presence on Romulus. Spock, initially evasive, reveals he is
    on a personal mission to foster reunification between Vulcan and Romulus, working
    with an underground movement and a new, seemingly idealistic Proconsul, Neral.
    Spock explains his secrecy stems from past experiences where his peace initiatives,
    like the one with the Klingons involving Captain Kirk, put others at risk. Picard,
    undeterred by Spock's insistence on solitude, asserts Starfleet's concern for
    Federation security and his own responsibility to remain. He delivers the news
    of Sarek's death, prompting Spock to reflect on his father's influence and their
    complex relationship. Despite Spock's desire to work alone, Picard's steadfastness
    compels Spock to reluctantly accept his presence, setting the stage for their
    joint investigation into the nascent reunification movement. This act establishes
    the core conflict between Spock's personal mission and Starfleet protocols, while
    introducing the profound stakes of potential Vulcan-Romulan unity.
