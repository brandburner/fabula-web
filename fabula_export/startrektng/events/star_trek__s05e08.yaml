- fabula_uuid: act_5aa5e80ecc3586d4
  number: 4
  summary: 'The Enterprise, under Riker''s command, receives the information about
    Galorndon Core, prompting Riker to suspect a Romulan connection due to its proximity
    to the Neutral Zone. Data, from the Klingon ship, confirms a Romulan intelligence
    transmission to a Barolian ship near Galorndon Core, solidifying the link. Picard,
    now convinced of a deeper plot, overrides Captain K''Vada''s objections with an
    aggressive display of authority, demanding an emergency transport schedule for
    his return to the surface with Data. On Romulus, Spock encounters D''Tan again,
    who shows him toys representing Vulcan language symbols, reinforcing the boy''s
    unwavering belief in reunification and the deep-seated desire within the underground
    movement. This encounter strengthens Spock''s commitment to the cause. Back in
    the caves, Picard, Data, and Spock connect the Romulan intelligence transmission
    (a sequence of numbers: ''1400'') to Proconsul Neral''s planned announcement time
    for the peace initiative, confirming the Romulan deception. The moment of revelation
    is cut short as Sela and Romulan guards capture the trio. Pardek, Spock''s long-time
    friend and confidante, is exposed as a traitor, having orchestrated Spock''s arrival.
    Sela then chillingly reveals the true Romulan plan: not reunification, but a calculated
    conquest of Vulcan, using the stolen ships as a Trojan horse. This act marks a
    dramatic turning point, as the mystery surrounding the Romulan intentions is brutally
    unveiled, and the heroes face imminent danger.'
