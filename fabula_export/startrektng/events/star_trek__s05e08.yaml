  scene_sequence: 7
  sequence_in_scene: 14
  key_dialogue:
  - 'ROMULAN#1: It''s everything we could have hoped for...'
  - 'PICARD: I can''t imagine that one rises to the position of Senate Proconsul without
    the support of the Romulan traditionalists. Then, how can he turn his back on
    them so easily? How can he endorse reunification when it is considered subversive?'
  - 'SPOCK: Captain Picard is correct. It is not logical for the Proconsul to endorse
    reunification at this time.'
  - 'PICARD: Perhaps they are hoping to use this to expose members of your movement...'
  - 'SPOCK: I came here to determine the potential for reunification. In spite of
    what has occurred, I intend to continue my efforts! I intend to meet with the
    Proconsul as planned.'
