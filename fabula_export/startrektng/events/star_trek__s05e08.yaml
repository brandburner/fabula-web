  title: Worf’s Klingon performance disrupted by Omag
  description: "\n  Worf, seeking cultural connection in the Qualor-Two bar, requests\
    \ a Klingon opera from Amarie, whose hesitation reveals her vulnerability and\
    \ the rarity of such requests. As she plays, Worf’s restraint crumbles—he hums,\
    \ then sings with growing passion, his voice filling the bar. The moment shatters\
    \ when Omag, a corpulent Ferengi arms dealer, interrupts with derisive criticism,\
    \ calling Worf’s singing 'dreadful' and comparing it to a Bardakian pronghorn\
    \ moose. The confrontation exposes the fragility of Worf’s cultural pride and\
    \ the underlying tensions between species in the bar. Amarie’s acknowledgment\
    \ of Omag as their target (via a coded rhapsody) and Worf’s discreet combadge\
    \ signal to the *Enterprise* mark this as a dual-purpose beat: a personal disruption\
    \ and a tactical setup for the mission. The scene underscores the bar’s role as\
    \ a neutral ground where cultural clashes and covert operations intersect.\n  "
