  title: Spock’s Defiance and the Holographic Deception
  description: In a high-stakes confrontation with Sela, Spock refuses to cooperate
    with her Romulan invasion plan, choosing death over complicity. His defiance triggers
    Sela’s revelation of a pre-recorded holographic duplicate of Spock—a weaponized
    deception designed to manipulate Vulcan into welcoming the Romulan invasion fleet.
    Picard and Data, now trapped, immediately begin strategizing an escape, leveraging
    Data’s access to Romulan systems to create a diversion. The scene escalates the
    conflict by exposing the Romulans’ technological sophistication and their willingness
    to exploit Spock’s likeness, while also testing the trio’s unity under pressure.
    Sela’s exit to deploy the invasion fleet leaves Picard, Spock, and Data racing
    against time to sabotage the plan before it’s too late.
