  title: Riker verifies Dulisian distress call while intercepting Vulcan ships
  description: "\n  With Picard and Data absent, Riker assumes command on the *Enterprise*\
    \ and faces a critical decision when Beverly reports a priority-one distress call\
    \ from Dulisian Four. The colony’s environmental systems have failed, requiring\
    \ immediate evacuation. Riker hesitates, his instincts warning him that the distress\
    \ call may be a Romulan deception—especially given the recent discovery of three\
    \ Vulcan ships crossing the Neutral Zone, which he suspects are carrying a Romulan\
    \ invasion force. He orders Worf to calculate an intercept course for the Vulcan\
    \ ships while simultaneously tasking Beverly to verify the authenticity of the\
    \ Dulisian distress call. The tension escalates when Spock’s scrambled holographic\
    \ message interrupts, confirming the Romulan plot and forcing Riker to act decisively.\
    \ His orders reflect his leadership under pressure: he prioritizes the potential\
    \ Romulan threat over the apparent urgency of the distress call, demonstrating\
    \ his ability to trust his instincts even in the face of incomplete information.\
    \ The scene underscores the crew’s disciplined preparation for confrontation,\
    \ foreshadowing the Romulan plot’s next move while highlighting Riker’s role as\
    \ a tactical and intuitive commander.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e08
