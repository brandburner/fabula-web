  key_dialogue: &id021
  - 'DATA: Communication lines have been terminated at the transmitter... I am quite
    certain the message was sent prior to the interruption...'
  - 'SELA: You''ll never get out of this building.'
  - 'DATA: I disagree, Commander. After studying the design of this structure, I have
    determined that our best route of escape would be the underground exit to the
    east of this wing... I have disconnected certain security scanners to assist us.'
  - 'DATA: I am afraid we cannot permit you to warn your guards.'
  - 'SPOCK: Impressive.'
