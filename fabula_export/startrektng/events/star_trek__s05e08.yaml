- fabula_uuid: act_feb769e2d7d37f6d
  number: 5
  summary: 'Riker receives a coded message from ''Picard'' ordering the Enterprise
    to maintain position at Galorndon Core, but his suspicions lead him to question
    its authenticity. Meanwhile, Sela attempts to force Spock to broadcast a holographic
    message welcoming a ''peace envoy'' to Vulcan, which is, in reality, the Romulan
    invasion force. Data, leveraging his earlier access to Romulan systems, creates
    a holographic diversion of Riker and Starfleet officers, allowing Picard and Spock
    to escape Sela''s captivity. Spock then broadcasts a genuine warning to the Federation,
    exposing the Romulan invasion plot. Simultaneously, a fake distress call to Dulisian
    Four attempts to divert the Enterprise, but Riker, trusting his instincts, intercepts
    the Vulcan ships. A Romulan warbird, guarding the invasion force, decloaks and,
    rather than allow its troops to be captured, destroys the three Vulcan ships,
    sacrificing over two thousand Romulan soldiers. With the invasion thwarted, Spock
    makes a profound decision: he chooses to remain on Romulus to guide the underground
    movement toward a peaceful, long-term reunification. He shares a mind meld with
    Picard, offering the Captain a glimpse into the deep connection Sarek felt for
    him, a bond Spock himself never fully experienced with his father. This act serves
    as the climax, resolving the immediate threat and culminating in Spock''s personal
    commitment to a future vision of unity, solidifying his unique path.'
