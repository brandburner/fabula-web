  object_involvements:
  - object_uuid: ger_object_25dd1540b003
    description_of_involvement: 'Geordi analyzes the Vulcan ships’ transponder signatures
      using the *Enterprise*’s sensors, his fingers flying over the console as he
      pulls up the digital patterns. The sensors’ real-time scans confirm the ships’
      heading and speed but fail to match any known Vulcan vessel, a critical discrepancy
      that Geordi voices with a frown. The sensors’ data—sharp, unemotional, and precise—undercuts
      the ships’ claim, their altered signatures a smoking gun for deception. The
      object’s role is dual: it provides the crew with actionable intelligence (the
      lack of a match) while also highlighting the vulnerability of even Starfleet’s
      technology to Romulan subterfuge. The sensors’ beeps and readouts fill the bridge,
      a mechanical counterpoint to the crew’s growing unease.'
    status_before_event: Scanning standard Neutral Zone traffic, with no anomalies
      detected prior to the Vulcan ships’ appearance.
    status_after_event: Locked onto the three Vulcan ships, with transponder signature
      data extracted and flagged for further investigation.
    global_id: ger_object_25dd1540b003
  - object_uuid: ger_object_924aaf5fdff1
    description_of_involvement: The science station monitor on the *Enterprise* bridge
      displays a critical grid of the Neutral Zone, its digital interface pulsing
      with three blips representing the Vulcan ships. Riker leans over the station,
      his eyes locked on the formation as Geordi cross-references sensor data. The
      monitor’s readouts—heading, speed, and transponder signatures—become the focal
      point of the crew’s investigation, their glowing data the only tangible evidence
      of the ships’ suspicious behavior. When Geordi reports that the signatures ‘don’t
      match up,’ the monitor’s display hardens the crew’s distrust, its sterile precision
      contrasting with the high-stakes tension in the room. The object serves as both
      a tool for verification and a visual manifestation of the deception unfolding.
    status_before_event: Active and displaying standard Neutral Zone sensor data prior
