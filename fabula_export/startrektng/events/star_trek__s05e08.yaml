  title: Sela discovers Picard’s holographic decoy
  description: "\n  Sela and her guards storm an empty Romulan office, only to be\
    \ ambushed by a holographic projection of Riker and Starfleet officers—part of\
    \ a meticulously planned escape by Picard, Spock, and Data. The ruse is exposed\
    \ when Sela’s disruptor fire passes harmlessly through the decoys, revealing the\
    \ fugitives’ tactical brilliance. Spock and Picard emerge from hidden passages,\
    \ disarming the guards with precision, while Data deactivates the holograms. Sela’s\
    \ revelation that Spock’s announcement of reunification—and the Romulan invasion\
    \ of Vulcan—are now imminent forces the trio to confront the escalating stakes\
    \ of their mission. The scene underscores the tension between Romulan paranoia\
    \ and the ideological fractures of the Vulcan-Romulan conflict, while highlighting\
    \ the fugitives’ resourcefulness against overwhelming odds.\n  "
