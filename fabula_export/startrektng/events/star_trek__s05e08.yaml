  title: Romulan troops sacrificed in self-destruction
  description: "\n  The *Enterprise* bridge crew processes the devastating aftermath\
    \ of the Romulan invasion attempt. Geordi La Forge delivers the grim technical\
    \ confirmation that over 2,000 Romulan troops were aboard the stolen Vulcan ships—now\
    \ destroyed by their own forces. Deanna Troi’s observation that the Romulans chose\
    \ annihilation over surrender underscores their ruthless calculus, while Riker’s\
    \ quiet order to stand down from red alert reveals the crew’s lingering tension.\
    \ The moment bridges tactical resolution with moral reckoning, forcing the audience\
    \ to confront the Romulans’ willingness to sacrifice their own soldiers to deny\
    \ Vulcan victory. Worf’s coordination with the Klingon ship for Picard and Data’s\
    \ return signals the next phase of the mission, but the weight of the Romulan\
    \ self-destruction lingers as an unspoken question: how far will this war go?\n\
    \  "
