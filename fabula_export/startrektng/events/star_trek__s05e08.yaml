- fabula_uuid: cand_evt_scene_db4de2b133e4e093_02
  global_id: null
  title: Riker chooses Dulisian distress call over Romulan threat
  description: "\n  With the *Enterprise* at warp and Beverly Crusher delivering an\
    \ urgent priority-one distress call from Dulisian IV—a catastrophic environmental\
    \ collapse threatening thousands—Riker faces a critical decision. His instincts\
    \ scream that the nearby Vulcan ships (potentially Romulan in disguise) are the\
    \ real threat, but protocol demands he respond to the distress call. After confirming\
    \ no other ships are nearby to assist, he reluctantly orders a course change to\
    \ Dulisian IV, only for Spock’s scrambled transmission to interrupt with a desperate\
    \ warning: the Vulcan ships carry a Romulan invasion force. The moment crystallizes\
    \ Riker’s dilemma—duty to the distress call versus the looming Romulan threat—while\
    \ exposing the crew’s vulnerability to deception. The event forces an immediate\
    \ choice between two crises, each with dire consequences, and underscores the\
    \ tension between Starfleet’s oath and the unseen Romulan plot.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e08
  scene_sequence: 20
  sequence_in_scene: 45
  key_dialogue: &id019
  - 'BEVERLY: We''ve just received a priority one distress call from the colony on
    Dulisian Four... a massive failure of the environmental support system. They''re
    going to require evacuation.'
  - 'RIKER: Worf, other ships in the vicinity of Dulisian Four...'
  - 'WORF: One, sir... a Rutian archaeological vessel...'
  - 'RIKER: Geordi, anything more on the Vulcan ships...?'
  - 'GEORDI: I''ve checked every sensor display backwards and forwards... if the Romulans
    altered them, they didn''t leave any fingerprints... I can''t tie any of them
    to the surplus yard.'
  - 'RIKER: Lay in a new course for Dulisian Four...'
  - 'SPOCK: This is Ambassador Spock of Vulcan. By now, Federation sensors are tracking
    three Vulcan ships crossing the Neutral Zone. These ships carry a Romulan invasion
    force and must be stopped. I repeat these ships.'
  - 'RIKER: Doctor, contact Dulisian Four... and confirm that distress call. I have
    a feeling it may prove to be a false alarm.'
