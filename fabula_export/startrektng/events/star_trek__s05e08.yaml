    emotional_state: Initially defiant and skeptical, then stunned into submission
      by Picard’s Klingon command—his pride is bruised, but he recognizes the authority
      in the moment, however grudgingly.
    goals:
    - Uphold Klingon protocol and maintain his ship’s autonomy.
    - Avoid direct confrontation with Picard, given the fragile alliance and the urgency
      of the mission.
    what_happened: K’Vada, the Klingon captain, stands his ground initially, refusing
      Picard’s order with a dismissive *‘I do not take orders from you, Picard.’*
      His posture is rigid, his expression skeptical. But when Picard suddenly barks
      at him in fluent Klingon—*‘P’tah Jol Ginquol! Katah!’*—K’Vada’s eyes widen in
      shock, and he blinks rapidly, his defiance momentarily shattered. He doesn’t
      resist further, though his body language remains tense, betraying his reluctance
      to submit to a non-Klingon’s authority. The exchange leaves him visibly unsettled,
      his pride wounded but his compliance secured.
