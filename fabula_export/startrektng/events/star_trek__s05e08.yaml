      confusion. To Data, this is a *puzzle*, and he’s simply providing the pieces.
      His lack of emotional investment makes him the most reliable witness to the
      event’s unfolding.
    goals:
    - Provide accurate, real-time technical data to support the crew’s decision-making.
    - Observe how the crew interprets and reacts to the loss of the Romulan carrier
      wave (a study in human behavior under stress).
    what_happened: 'Data is the bridge’s impartial oracle, his fingers dancing over
