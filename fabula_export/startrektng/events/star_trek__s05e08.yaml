  title: Data silences Sela with a nerve pinch
  description: In the aftermath of Spock’s broadcast exposing the Romulan invasion
    plot, Data confirms the transmission succeeded despite Sela’s sabotage. As Sela
    threatens to alert guards, Data executes a precise Vulcan nerve pinch—mirroring
    Spock’s signature technique—rendering her unconscious. The move impresses Spock,
    underscoring Data’s mastery of Vulcan protocols and his role as the team’s tactical
    asset. The trio then flees via a pre-planned escape route, exploiting disabled
    security scanners. This moment crystallizes Data’s evolving competence in human
    and Vulcan behaviors while reinforcing the fragility of the alliance between Spock
    and the Romulans, whose true intentions have now been laid bare. The nerve pinch
    also serves as a calculated, non-lethal solution to a critical threat, aligning
    with Data’s ethical programming and the mission’s need for stealth over confrontation.
