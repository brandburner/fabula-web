  object_involvements:
  - object_uuid: ger_object_98e31343f399
    description_of_involvement: The Broadcast Alcove is the recessed communication
      station where Spock delivers his announcement exposing the Romulan invasion
      plot. It hums with urgency as the team’s mission hinges on its output, drawing
      Sela’s threats and prompting swift action. The alcove symbolizes the team’s
      ability to disseminate truth in the face of deception, but its use is cut short
      as Romulan security severs the lines. Its role is both functional and symbolic,
      representing the fragile yet critical line between exposure and secrecy.
    status_before_event: Active and operational, transmitting Spock’s broadcast to
      Picard and the Enterprise. Located in the Romulan office, it is a focal point
      for the team’s mission.
    status_after_event: Inactive, with communication lines terminated by Romulan security.
      The alcove remains in the office but is now silent, its purpose for this moment
      complete.
    global_id: ger_object_98e31343f399
