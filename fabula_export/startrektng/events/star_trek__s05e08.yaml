  title: Riker’s Piano Gambit Unlocks Amarie’s Lead
  description: 'In the dim, shadowed Qualor-Two piano bar, Riker—seeking intel on
    the stolen Vulcan ship—approaches Amarie, the widow of a smuggler his crew destroyed.
    Their initial exchange is laced with tension: Amarie’s grief and bitterness clash
