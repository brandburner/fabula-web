  sequence_in_scene: 1
  key_dialogue:
  - 'SPOCK: What are you doing on Romulus?'
  - 'PICARD: That was to be my question for you, sir.'
  - 'SPOCK: It is no concern of Starfleet''s.'
  - 'PICARD: On the contrary, Starfleet is most concerned. You are in a position to
    compromise the security of the Federation...'
  - 'PICARD: If you wish to undertake a mission with potential repercussions to the
    Federation, it is appropriate to discuss it with the Federation. I am here as
    their representative. You will have to discuss it with me.'
  - 'SPOCK: This is precisely what I wanted to avoid.'
  - 'PICARD: I also have the responsibility of bearing some unhappy news.'
  - 'SPOCK: Sarek is dead.'
