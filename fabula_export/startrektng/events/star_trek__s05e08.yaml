      military actions under the guise of diplomacy.
    institutional_impact: The Guard’s involvement in the conspiracy reflects the broader
      tension between military and diplomatic factions in Romulan society, where the
      Guard’s power often supersedes the Senate’s authority in times of crisis or
      opportunity.
    internal_dynamics: The Guard’s internal hierarchy and chain of command are being
      tested by figures like Neral and Sela, who use their positions to advance personal
      and factional agendas beyond traditional military roles.
    global_id: ger_organization_ce366f4d8613
  - organization_uuid: ger_organization_9ddbcf14b02e
    description_of_involvement: The Vulcan Government is the unseen but critical target
      of the Romulan conspiracy. Though not directly referenced in this event, its
      presence looms large as the ultimate victim of Neral and Sela’s deception. The
      hollow Vulcan blessing (*Live long and prosper*) delivered by Neral to Spock
      is a direct mockery of Vulcan values and a prelude to the invasion plan, which
      aims to install a puppet government on Vulcan. The Romulans’ use of a forged
      speech and holographic duplicate of Spock to deceive Vulcan highlights their
      contempt for Vulcan sovereignty and their belief in their ability to manipulate
      Vulcan institutions. This event sets the stage for the broader conflict, where
      the Vulcan Government’s caution and distrust of Romulans will be exploited to
      justify military action.
