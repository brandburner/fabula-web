- fabula_uuid: cand_evt_scene_97c1fa6c2989be4b_01
  global_id: null
  title: Romulan warbird destroys stolen ships
  description: "\n  On the *Enterprise* bridge, Worf reports the Romulan invasion\
    \ force retreating toward the Neutral Zone, but Riker immediately suspects deception.\
    \ Geordi detects a cloaked Romulan warbird lurking near the stolen Vulcan ships.\
    \ When Riker orders the warbird to withdraw, it instead powers weapons and fires,\
    \ systematically destroying the three Vulcan vessels—then decloaks briefly before\
    \ vanishing again. The act is a calculated sacrifice: the Romulans annihilate\
    \ their own boarding troops and the stolen ships to deny Vulcan any chance of\
    \ recovery. The brutal maneuver forces the *Enterprise* crew to confront the Romulans'\
    \ ruthless pragmatism, escalating the conflict’s stakes and exposing the depth\
    \ of their willingness to destroy their own assets rather than surrender them.\
    \ The destruction also serves as a tactical victory for the Romulans, leaving\
    \ Vulcan with no tangible evidence of the invasion plot and no way to prove Romulan\
    \ involvement to the Federation.\n  "
