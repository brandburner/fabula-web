- fabula_uuid: cand_evt_scene_22ed214dfc4995db_01
  global_id: null
  title: Sela’s Ambush and Pardek’s Betrayal
  description: "\n  In a tense confrontation within the Romulan caves, Picard, Spock,\
    \ and Data decode a Romulan transmission exposing Proconsul Neral’s deception—specifically,\
    \ the coded '1400' reference to the subspace announcement time, which aligns with\
    \ the stolen Vulcan ship’s role in the invasion plot. Before they can act, Sela\
    \ and her guards ambush them, revealing Pardek as the traitor who orchestrated\
    \ Spock’s arrival to facilitate the Romulan conspiracy. Pardek’s betrayal, delivered\
    \ with cold pragmatism ('Jolan’ru, Spock'), shatters Spock’s trust and underscores\
    \ the Romulans’ ruthless manipulation of his reunification dream. Sela then reveals\
    \ the true plan: the Romulan conquest of Vulcan, framed as a twisted fulfillment\
    \ of Spock’s idealism. The scene escalates the conspiracy’s threat, forces Spock\
    \ to confront his past, and leaves Picard and Data captured, while Spock—vulnerable\
    \ and exposed—faces the collapse of his mission.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e08
  scene_sequence: 15
  sequence_in_scene: 32
  key_dialogue:
  - 'PICARD: The only communication that was sent were the numbers one-four zero zero.'
  - 'SPOCK: It means that the Proconsul has apparently been attempting to deceive
    me. For what purpose I cannot say yet. But his conversations with me have obviously
    been part of a greater plan involving the stolen Vulcan ship.'
  - 'PARDEK: How could they know of this location? Someone betrayed us...'
  - 'SPOCK: Yes. You did.'
  - 'PARDEK: Spock, we''ve been friends for eighty years...'
  - 'SPOCK: It is the only logical conclusion. You invited me to Romulus. You arranged
    the meeting with the Proconsul. And you knew that Picard and Data had returned
    to the surface with new information.'
  - 'SELA: The great Spock. Very well. Senator Pardek, your service to the Romulan
    people is noted and appreciated.'
  - 'PARDEK: Jolan’ru, Spock.'
  - 'SELA: Do not be distressed. Your dream of reunification is not dead. It will
    only take a slightly different form... the Romulan conquest of Vulcan.'
