    a feeling it may prove to be a false alarm.'
  - 'SPOCK: This is Ambassador Spock of Vulcan. By now, Federation sensors are tracking
    three Vulcan ships crossing the Neutral Zone. These ships carry a Romulan invasion
    force and must be stopped.'
