      is not physically represented in the New Caves, its ideological contrast to
      the Romulan Underground is palpable, particularly in Picard’s dialogue (‘The
      Federation will welcome that day’). The organization’s influence is felt in
      the tension between Spock’s personal choice and his obligations to Federation
      diplomacy. Picard’s acknowledgment of Spock’s resolve—without attempting to
      coercively reinstate him into Federation service—reflects the Federation’s respect
      for individual autonomy, even when it conflicts with strategic goals. The Federation’s
      power dynamics in this event are reactive rather than proactive, as it adapts
      to Spock’s decision rather than dictating it.
    active_representation: Through Picard’s diplomatic authority and his personal
      connection to Spock, as well as the implied contrast between Federation ideals
      (diplomacy, unity) and the Romulan Underground’s grassroots approach (education,
      evolution).
    power_dynamics: Exercising influence through respect and adaptation rather than
      control; the Federation’s power is tempered by its recognition of Spock’s autonomy
      and the validity of his path, even if it diverges from Federation strategy.
    organizational_goals:
