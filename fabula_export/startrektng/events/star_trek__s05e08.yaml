  title: Riker chooses Dulisian distress call over Romulan threat
  description: "\n  With the *Enterprise* at warp and Beverly Crusher delivering an\
    \ urgent priority-one distress call from Dulisian IV—a catastrophic environmental\
    \ collapse threatening thousands—Riker faces a critical decision. His instincts\
    \ scream that the nearby Vulcan ships (potentially Romulan in disguise) are the\
    \ real threat, but protocol demands he respond to the distress call. After confirming\
    \ no other ships are nearby to assist, he reluctantly orders a course change to\
    \ Dulisian IV, only for Spock’s scrambled transmission to interrupt with a desperate\
    \ warning: the Vulcan ships carry a Romulan invasion force. The moment crystallizes\
    \ Riker’s dilemma—duty to the distress call versus the looming Romulan threat—while\
    \ exposing the crew’s vulnerability to deception. The event forces an immediate\
    \ choice between two crises, each with dire consequences, and underscores the\
    \ tension between Starfleet’s oath and the unseen Romulan plot.\n  "
