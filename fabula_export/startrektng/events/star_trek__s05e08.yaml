  title: Picard’s uncharacteristic aggression surprises Data
  description: On the Klingon bridge, Data deciphers a suspicious Romulan transmission—1400—while
    Picard grows increasingly frustrated with K’Vada’s defiance. When the Klingon
    captain refuses to comply with Picard’s order to maintain emergency transport
    coordinates, Picard snaps in Klingon, using a sharp, aggressive command that shocks
    K’Vada into submission. Data, observing this uncharacteristic outburst, quietly
    notes its departure from Picard’s usual Vulcan restraint. The moment underscores
    Picard’s escalating desperation to prevent the Romulan invasion, revealing how
    the mission’s stakes are eroding his composure. Data’s detached observation serves
    as a narrative mirror, highlighting the tension between logic and emotion that
    defines the crew’s response to the crisis. The exchange also foreshadows the fractured
    communication between Picard and Riker, as Picard’s impulsive authority risks
    undermining their coordinated efforts against the Romulan plot.
