- fabula_uuid: cand_evt_scene_90365af8a9b45b38_02
  global_id: null
  title: Data proposes high-risk subspace hack
  description: "\n  On the Klingon bridge, Data—still disguised as a Romulan—returns\
    \ from the surface and immediately pivots to a high-stakes technical gambit. He\
    \ informs Captain K'Vada that he requires access to the Klingon ship's computer\
    \ to attempt a penetration of the Romulan Central Information Net, a task the\
    \ Klingons have failed at for years. Data leverages his unique capabilities as\
    \ an android, offering to reconfigure Klingon entry codes post-mission and share\
    \ any obtained Romulan data in exchange. K'Vada, though skeptical, grudgingly\
    \ agrees after Data assures him the risk is minimal. The tension escalates when\
    \ Data proposes piggybacking their signal on Romulan subspace transmissions to\
    \ communicate with the *Enterprise* without detection. K'Vada dismisses the idea\
    \ as impossible, but Data counters with meticulous analysis of the Romulan grid\
    \ and Klingon transmission array, proving compatibility. The Klingon captain,\
    \ impressed despite himself, relents. The exchange underscores Data’s strategic\
    \ adaptability and the fragile, transactional trust between Starfleet and the\
    \ Klingons, while also foreshadowing K'Vada’s later advocacy for Klingon android\
    \ research. The scene hinges on Data’s technical prowess and his ability to navigate\
    \ political and cultural barriers, all while advancing the mission’s urgency.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e08
  scene_sequence: 2
  sequence_in_scene: 3
  key_dialogue:
  - |-
    K'VADA: We have more important things to attend to than acting as your nursemaids.
    DATA: Captain Picard regrets that he must detain you but it is necessary for a while longer. In addition, I will be requiring access to your ship's computer...
    K'VADA: Access to our computer... for what purpose?
    DATA: I am going to attempt to penetrate the Romulan Central Information Net...
  - |-
    K'VADA: Don't bother. We've been trying for years.
    DATA: I have unique skills that may permit me to succeed.
    K'VADA: I cannot reveal classified Klingon entry codes to Starfleet...
    DATA: Your entry codes can be easily reconfigured after we depart. And Captain Picard has authorized me to share with you any information we obtain from the Romulan data banks...
  - |-
    DATA: We will also need to communicate with the *Enterprise* in sector two-thirteen.
    K'VADA: You do and the Romulans will instantly know our coordinates.
    DATA: Using conventional means, that would be true; however I propose that we piggy-back our signal on Romulan subspace transmissions...
    K'VADA: Piggy-back?
    DATA: A Human metaphor, pardon me. We would use a Romulan signal as a carrier for our own, thus disguising its origin.
    K'VADA: It won't work.
    DATA: I believe it will. During the last hour, I have conducted a systematic review of the entire Romulan subspace grid and compared my findings with the specifications of your transmission array. It would appear they are compatible.
