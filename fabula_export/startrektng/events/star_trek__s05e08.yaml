  key_dialogue:
  - 'WORF: Commander, sensors are picking up three vessels crossing the neutral zone...
    Vulcan ships...'
  - 'RIKER: Worf, signal them on subspace... request their status... Geordi, see if
    you can tell if one of them is the ship we''ve been looking for.'
  - 'WORF: They say they''re escorting a peace envoy from Romulus to Vulcan, sir...
    They request that we monitor Federation subspace channels. Ambassador Spock will
