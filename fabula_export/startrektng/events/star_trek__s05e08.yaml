    description_of_involvement: The Romulan Guard, though not physically present in
      this event, is the military backbone supporting Neral and Sela’s conspiracy.
      Neral’s reference to his early career as a lowly uhlan in the Guard ties his
      personal history to the organization’s traditions and values, which now inform
      his actions. The Guard’s influence is felt in the calculated nature of the deception,
      the use of military tactics to manipulate Spock, and the ultimate goal of the
      invasion of Vulcan. Sela’s presence as a high-ranking security officer further
      embodies the Guard’s role in enforcing the conspiracy, ensuring that the military’s
      objectives are met through covert operations and strategic deception.
    active_representation: Through Neral’s personal history and Sela’s role as a high-ranking
      security officer, embodying the Guard’s influence and values.
    power_dynamics: Operating under the guise of institutional authority (the Senate)
      but pursuing its own military objectives, often in opposition to diplomatic
      efforts.
    organizational_goals:
