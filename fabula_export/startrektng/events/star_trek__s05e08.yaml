  title: Spock rejects Sela’s deception
  description: 'In a tense Romulan office, Sela reveals her true plan: a Trojan horse
    invasion of Vulcan using stolen Vulcan ships, with Spock as an unwitting figurehead.
    When Spock refuses to deliver a fabricated peace speech—choosing death over complicity—Sela
    retaliates by unveiling a pre-recorded holographic duplicate of him, weaponizing
    his likeness to manipulate Vulcan. Picard realizes the deception’s scale (three
    ships, not one), while Data confirms the Romulans remain unaware of their computer
    access. The confrontation forces Spock to confront the collapse of his reunification
    dream and the Romulans’ willingness to sacrifice their own troops for war. As
    Sela exits to launch the invasion, Picard and Data immediately pivot to escape
    planning, setting up their next move against the Romulan plot.'
