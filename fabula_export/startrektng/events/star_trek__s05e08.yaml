  title: Sela reveals Romulan invasion deception
  description: "\n  In a Romulan office, Sela—posing as a reunification advocate—hands\
    \ Spock a fabricated peace speech designed to lure Vulcan into a false sense of\
    \ security. When Picard deduces the speech is a Trojan horse for a stolen-Vulcan-ship\
    \ invasion, Sela confirms the plot: three ships will cross the Neutral Zone while\
    \ Spock broadcasts a holographic message urging Vulcan to welcome them. When Spock\
    \ refuses to cooperate, Sela activates a pre-recorded hologram of Spock to deliver\
    \ the message anyway, exposing the depth of Romulan duplicity. The revelation\
    \ forces Spock to confront the collapse of his reunification dream and the looming\
    \ specter of war, while Picard and Data scramble to counter the deception before\
    \ it’s too late. The scene pivots from diplomatic pretense to outright betrayal,\
    \ escalating the conflict’s stakes and testing the crew’s ability to respond to\
    \ an enemy who weaponizes their own likeness.\n  "
