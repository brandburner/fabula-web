  title: Data secures transmission and escape
  description: "\n  In the aftermath of Spock’s broadcast exposing the Romulan invasion\
    \ plot, Data confirms the critical message was successfully transmitted to Picard\
    \ before Romulan security terminated the communication lines. This moment solidifies\
    \ the evidence needed to thwart the conspiracy. Meanwhile, Sela—now disarmed but\
    \ still dangerous—threatens to alert guards, forcing Data to act decisively. He\
    \ reveals a preplanned escape route, exploiting disabled security scanners to\
    \ ensure the team’s survival. With a precise Vulcan nerve pinch, Data neutralizes\
    \ Sela, preventing her from raising an alarm. The trio’s escape is swift and calculated,\
    \ preserving their mission while underscoring Data’s strategic foresight and adaptability.\
    \ Spock’s reaction—‘Impressive’—validates Data’s actions, reinforcing their alliance\
    \ and the team’s unity in the face of Romulan deception.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e08
