      by Toreth, its absence leaves Troi defenseless as the Commander turns the Pilot''s
      disruptor on her. The weapon''s presence—or lack thereof—underscores the power
      dynamics at play: Toreth holds the literal and metaphorical ''firepower,'' while
      Troi''s survival depends on her wit and endurance under interrogation.'
    status_before_event: Confiscated by Toreth earlier in the scene, rendering Troi
