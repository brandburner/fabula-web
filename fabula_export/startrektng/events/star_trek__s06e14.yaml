      to allow the *Enterprise* to track the ship. N'Vek explains that the device’s
      effectiveness depends on the precise balancing of radiative emissions from the
      warp engines, and any misalignment would create a detectable magnetic disturbance.
      Troi’s demand to create this disturbance forces N'Vek to reveal the vulnerability,
      turning the cloaking device from a tool of concealment into a potential beacon
      for the *Enterprise*. The object’s involvement is both a narrative and technical
      crux, as its manipulation could either save the dissidents or doom the mission.
    status_before_event: Fully operational and undetectable, maintaining the warbird’s
      stealth as it travels through space.
    status_after_event: Vulnerable to intermittent magnetic disturbances due to the
      planned misalignment of the nullifier core, though the cloaking device remains
      functionally active.
