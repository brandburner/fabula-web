    description_of_involvement: The Tal Shiar’s authority is the sword and shield
      in this confrontation, invoked by Troi to shut down Toreth’s defiance and protect
      the secret cargo. Toreth mocks the Tal Shiar’s reputation, challenging its competence
      and care for the military, but Troi’s threat to invoke its feared protocols
      forces her to retreat. The organization’s presence is felt through its institutional
      power—its reputation for brutality and secrecy is both a liability and a tool.
      Troi leverages this power to assert control, while Toreth’s resistance reflects
      the deep-seated distrust between the military and intelligence factions. The
      Tal Shiar’s influence here is intangible but overwhelming, shaping the outcome
      of the standoff and the mission’s survival.
    active_representation: Through the invocation of its protocols and the threat
      of its authority by Troi, as well as Toreth’s mockery of its competence.
    power_dynamics: Exercising authority over Toreth and the crew, despite their distrust,
      through the fear of reprisal and the weight of its institutional power.
