  object_involvements:
  - object_uuid: ger_object_d4349c67a433
    description_of_involvement: 'N’Vek presses the disruptor into Troi’s hand moments
      before Toreth’s com summons, its weight a tangible reminder of the violence
      she may need to commit to survive. The weapon is both a tool of coercion and
      a symbol of the Tal Shiar’s authority—one Troi must now embody. She clutches
      it as she follows N’Vek to the bridge, its presence forcing the crew to comply
      with her orders. The disruptor is the ultimate equalizer in this high-stakes
      deception, a physical manifestation of the moral ambiguity Troi now faces: is
      she a protector or a threat?'
    status_before_event: Holstered at N’Vek’s side, unused until this moment.
    status_after_event: Gripped firmly in Troi’s hand as she exits the quarters, its
      energy cell charged and ready for use.
    global_id: ger_object_d4349c67a433
  - object_uuid: ger_object_95fcde055f5a
    description_of_involvement: The door to Troi’s quarters serves as a threshold
      between safety and danger, privacy and exposure. It slides open to admit N’Vek,
      then again as he and Troi exit in response to Toreth’s summons. The door’s movement
      is silent but symbolic—each opening represents a step deeper into the deception,
      a moment where Troi’s fate hangs in the balance. Its angular Romulan design
      reinforces the alien, oppressive environment she must navigate, a physical barrier
      that also marks her transition from victim to participant in N’Vek’s plot.
    status_before_event: Closed, sealing Troi in her quarters.
    status_after_event: Open, then closed behind them as they exit, the door now a
      gateway to the high-stakes confrontation on the bridge.
    global_id: ger_object_95fcde055f5a
  - object_uuid: ger_object_75ef70da79e7
    description_of_involvement: 'The Tal Shiar uniform, brighter and more ornate than
      standard Romulan attire, is the physical manifestation of Troi’s false identity.
      N’Vek adjusts the fit hastily, ensuring the insignia on her shoulder is visible
      and the fabric lies correctly. The uniform is not just a costume—it is a symbol
      of authority and fear, a shield Troi must wield to command respect (and obedience)
      from Toreth and the crew. Its presence underscores the power dynamics at play:
      without it, she would be exposed as an impostor in seconds.'
    status_before_event: Draped over Troi’s body, slightly ill-fitting and unadjusted.
    status_after_event: Properly fitted and straightened, the insignia prominently
      displayed, ready for Troi’s performance on the bridge.
    global_id: ger_object_75ef70da79e7
