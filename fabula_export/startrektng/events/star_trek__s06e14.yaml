- fabula_uuid: act_9af9042890a3c1bc
  number: 4
  summary: Act Four escalates the cat-and-mouse game between the two ships, with Troi
    taking decisive action to alert the Enterprise. The Enterprise appears on the
    Khazara's viewscreen, confirming Toreth's belief that the Federation is searching
    for their 'spies.' Toreth plans to proceed cautiously to avoid detection, but
    Troi, recognizing a unique opportunity, insists on holding position to find a
    way to contact her crew. On the Enterprise, Data confirms the freighter was destroyed
    by Romulan disruptor fire, prompting Picard to raise shields and go to red alert,
    realizing a Romulan vessel is nearby. Troi, frustrated by N'Vek's reluctance,
    confronts him, threatening to expose him as a traitor if he doesn't devise a way
    for the Enterprise to track them. Under duress, N'Vek reluctantly agrees to subtly
    misalign a nullifier core, creating an intermittent magnetic distortion that Data
    subsequently detects. DeSeve confirms this distortion could indicate a cloaked
    Romulan ship, leading Picard to order an intercept course. On the Khazara, Toreth
    realizes the Enterprise is tracking them and, despite N'Vek's attempts to deflect,
    prepares for a direct attack, planning to pass under the Enterprise's hull and
    destroy it if it reacts.
  key_moments: []
