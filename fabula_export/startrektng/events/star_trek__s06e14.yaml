  key_dialogue:
  - 'TORETH: I demand an explanation.'
  - 'TROI: This gives me the right.'
  - 'TORETH: Even you must eventually answer to someone. You will be held accountable.'
  - 'TROI: I have been given broad discretionary powers. Sub-Commander N''Vek acted
    on my authority... the authority of the Tal Shiar. I assure you—this action will
    not be questioned.'
  - 'TROI: Activate the cloaking device.'
