      covert influence, highlighting the broader power struggle within the Romulan
      Star Empire.
    internal_dynamics: The confrontation between Toreth and Troi reflects the deeper
      divide between the military’s aggressive tactics and the Tal Shiar’s deceptive
      strategies. The crew’s submission to Troi underscores the military’s reliance
      on loyalty and discipline, which can be undermined by the Tal Shiar’s threats.
