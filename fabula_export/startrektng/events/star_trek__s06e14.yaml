  object_involvements:
  - object_uuid: ger_object_5868b38aa356
    description_of_involvement: 'The Romulan Warbird Bridge Main Viewscreen dominates
      the foreground, displaying the ship’s orbit around the planet as a tactical
      backdrop to Toreth’s confrontation with Troi. Its steady, unchanging display
      of the orbital track underscores the mission’s precarious position—a visual
      metaphor for the fragile balance of power aboard the ship. Toreth and the Pilot
      glance at it periodically, using it as a reference point amid the rising tension,
      while the crew’s attention remains fixed on the verbal sparring between the
      two women. The viewscreen’s presence reinforces the high stakes: one wrong move
      could send the warbird veering off course, both literally and metaphorically.'
    status_before_event: Displaying a stable orbital track around the planet, with
      no immediate threats or anomalies detected.
    status_after_event: Now showing the warbird’s new course to the Kaleb sector,
      reflecting Troi’s successful order and the ship’s compliance with the detour.
    global_id: ger_object_5868b38aa356
  - object_uuid: ger_object_0acf14e65ea5
    description_of_involvement: The Romulan Warbird Bridge Command Consoles hum with
      green holographic displays, their navigational plots and tactical overlays providing
      a technical counterpoint to the verbal power struggle unfolding. The Pilot punches
      in commands to lock the orbit and later sets the course to the Kaleb sector,
      while Toreth and Troi use the consoles as a stage for their confrontation. The
      consoles’ glow casts an eerie light on the scene, symbolizing the ship’s operational
      precision even as its command structure teeters. Their functional role is undeniable—Troi’s
      order to change course is executed through them—but their presence also underscores
      the fragility of the mission, as one wrong input could derail everything.
    status_before_event: Active and operational, displaying orbital data and cargo
      manifests, with no immediate alerts or anomalies.
    status_after_event: Now reflecting the warbird’s new trajectory to the Kaleb sector,
      with the Pilot’s course adjustment logged in the system.
    global_id: ger_object_0acf14e65ea5
  - object_uuid: ger_object_8796b1ba7a18
    description_of_involvement: The secret cargo containing Romulan defectors is the
      silent, explosive heart of this confrontation. Toreth circles Troi, demanding
      to inspect its contents, while Troi invokes her fabricated Tal Shiar authority
      to shield it. The cargo’s presence is a ticking clock—its discovery would doom
      the mission and the defectors, but its secrecy is the only leverage Troi has.
      The crew’s glances flicker toward the unseen containers, their distrust of the
      Tal Shiar amplifying the tension. The cargo’s symbolic role as both a mission-critical
      asset and a potential liability is laid bare in this moment, with Troi’s ability
      to protect it hinging on her performance as Major Rakal.
    status_before_event: Secured in the warbird’s hold, its contents unknown to Toreth
      and the crew, but its presence is the catalyst for the confrontation.
    status_after_event: Remains untouched and hidden, its secrecy preserved by Troi’s
      bluff, but the crew’s suspicion lingers.
    global_id: ger_object_8796b1ba7a18
