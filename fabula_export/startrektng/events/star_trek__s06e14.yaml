      does so rigidly, snapping to attention before relaxing slightly. The chair serves
      as a physical marker of DeSeve’s submission to Picard’s authority and the power
      dynamic between them. It also symbolizes the controlled observation of DeSeve—a
      man whose loyalty is in question and whose psychological state is fragile. The
      chair’s presence reinforces the intimacy of the confrontation, as the two men
      sit face-to-face, with DeSeve’s vulnerability laid bare. Its functional role
      is to provide a seat, but its narrative role is to underscore the tension and
      hierarchy in the room.
    status_before_event: Unoccupied and positioned against the wall of DeSeve’s quarters.
      It is part of the standard furnishings, unused until Picard directs DeSeve to
      sit.
    status_after_event: Occupied by DeSeve, who sits rigidly in it throughout the
      interrogation. The chair remains in place, but its symbolic weight has increased
