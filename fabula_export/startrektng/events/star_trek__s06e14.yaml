  key_dialogue:
  - 'PICARD: Well, Mister DeSeve. You promised me a freighter with an important cargo.
    The only thing here is empty space. Do you have an explanation?'
  - 'DESEVE: I... don''t understand...'
  - 'WORF: Sir, he has deceived us.'
  - 'DESEVE: No— I was told the ship would be at these coordinates.'
  - 'PICARD: You said the message came directly from Ambassador Spock?'
  - 'DESEVE: Yes. Well... not exactly...'
  - 'PICARD: What does that mean?'
  - 'DESEVE: Someone else relayed the message to me. But he said Spock spoke directly
    to him.'
  - 'WORF: Was he Romulan?'
  - 'DESEVE: Yes.'
  - 'DESEVE: The freighter is an old Antares-class vessel... it has limited range
    and speed. It couldn''t have taken on its cargo more than a day ago... which means
    it has to be within fifteen light years of here.'
  - 'PICARD: Why didn''t you mention this earlier?'
  - 'DESEVE: It didn''t seem necessary. And on Romulus, you learn not to volunteer
    information. It''s a hard habit to break.'
