    emotional_state: A maelstrom of terror, disbelief, and creeping horror, masked
      by a fragile attempt at control. Her surface panic (frustrated commands, physical
      stumbling) barely conceals the deeper existential dread of her transformation
      and the immediate danger of her mission. There’s a flicker of professional resolve
      beneath the shock—she *must* adapt, but the cost is visibly weighing on her.
    goals:
    - Regain control of her environment (activating the lights to orient herself)
    - Process the reality of her transformation without collapsing under the psychological
      weight (maintaining mission focus despite horror)
    - Avoid drawing attention to her disorientation (Romulan quarters imply surveillance
      risks)
    what_happened: Deanna Troi awakens in a state of extreme disorientation, her body
      still twitching from a nightmare. She sits up abruptly, her breathing heavy
      and labored, and attempts to activate the lights using voice commands, but the
      Romulan system fails to respond. Frustrated and increasingly anxious, she stumbles
      off the bed and gropes her way through the unfamiliar quarters, bumping into
      objects in the darkness. Upon locating a control panel, she manually activates
      the lights, revealing her surgically altered Romulan features in the mirror.
      Her hands tremble as she traces the ridged forehead and pointed ears, her reflection
      a source of visceral horror and disbelief. The entire sequence is marked by
      her physical vulnerability, psychological shock, and the dawning realization
      of the stakes of her mission.
