  - object_uuid: ger_object_3bf5383989bf
    description_of_involvement: 'Beverly Crusher’s medical tricorder is the tool that
      confirms the surgical reversal of Troi’s Romulan disguise, marking the physical
      restoration of her identity. The tricorder’s hum and the brief interaction it
      facilitates between Beverly and Troi serve as a transitional moment—one that
      bridges the deception of Troi’s undercover role and her return to herself. While
      the tricorder’s functional role is medical, its narrative role is symbolic:
      it represents the erasure of the physical traces of Troi’s deception, though
      the emotional and psychological residue lingers. The object is wielded with
      professional efficiency, but its presence in this scene is a reminder of the
      technology that enables both healing and transformation in the *Star Trek* universe.'
    status_before_event: Activated and held by Beverly Crusher, ready to scan Troi’s
      facial features and confirm the success of the surgical procedure.
    status_after_event: Deactivated and set aside by Beverly, its purpose fulfilled.
      The tricorder’s data confirms Troi’s restored identity, but its role in the
      scene is complete.
    global_id: ger_object_3bf5383989bf
  - object_uuid: ger_object_55addb6b9fa2
    description_of_involvement: Troi’s sickbay biobed is more than a piece of medical
      furniture in this scene—it is a liminal space where physical and emotional transformations
      occur. Troi sits on the biobed as her Romulan features are surgically reversed,
      a process that restores her to herself but leaves her still clad in the Tal
      Shiar uniform, a visual contradiction. The biobed becomes a stage for her reintegration,
      where she traces her restored face with her hands, a gesture of both relief
      and reorientation. Picard stands at the bedside, delivering his news, and the
      biobed thus also serves as a metaphorical threshold between Troi’s past deception
      and her future role. Its padded surface and sterile environment contrast with
      the emotional weight of the moment, underscoring the dissonance between the
      clinical and the personal.
    status_before_event: Occupied by Troi, who sits on it as Beverly scans her with
      the tricorder. The biobed is in a functional state, ready to support medical
      procedures.
    status_after_event: Troi remains seated on the biobed as the scene concludes,
      her physical transformation complete but her emotional state still processing
      the news of N’Vek’s sacrifice. The biobed’s role in the scene is fulfilled,
      but it remains a symbol of the transition Troi is undergoing.
    global_id: ger_object_55addb6b9fa2
