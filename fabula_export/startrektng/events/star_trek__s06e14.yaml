    description_of_involvement: 'Starfleet Command is the institutional force behind
      Riker’s arrest of DeSeve, its authority embodied in the formal order he recites.
      The command’s protocols dictate that DeSeve be treated as a traitor, confined
      to quarters, and subjected to a courts-martial—this is not Riker’s personal
      decision, but the result of Starfleet’s long-standing policies on defection.
      The command’s influence is also felt in the crew’s divided reactions: Worf’s
      Klingon honor aligns with Starfleet’s stance, while Beverly’s empathy challenges
      it. DeSeve’s plea to speak with Picard hints at a potential conflict between
      Starfleet’s rigid protocols and the nuanced realities of his defection, setting
      up a larger institutional tension.'
