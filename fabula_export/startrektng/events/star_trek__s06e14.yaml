  - organization_uuid: ger_organization_e43c84fec165
    description_of_involvement: 'The Corvallens’ role in this event is that of a neutral
      but critical third party, their mercenary freighter serving as the conduit for
      the defectors’ transfer to Federation space. N''Vek’s hiring of the Corvallens
      to transport Troi and the stasis containers to Starfleet Headquarters introduces
