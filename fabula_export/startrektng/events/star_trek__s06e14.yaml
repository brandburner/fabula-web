  global_id: null
  title: Troi and N'Vek redefine the mission
  description: 'After the freighter massacre, N''Vek confronts Troi in the warbird’s
    cargo bay, where their mutual distress masks deeper fractures. N''Vek dismisses
    her guilt over the deaths as a distraction, insisting the mission’s survival demands
    ruthlessness. When Troi challenges his leadership, he reveals a desperate contingency:
    commandeering the warbird to smuggle defectors into Federation space via a Starfleet
    base on Draken IV. The plan hinges on Troi’s betrayal of Starfleet protocols—providing
    access codes and ordering Toreth into contested territory—while N''Vek exploits
    her guilt to escalate the risk of interstellar conflict. Their tense standoff
    ends with Troi’s reluctant compliance, but the exchange underscores the moral
    erosion of their alliance and the mission’s escalating stakes. The scene pivots
    from crisis to a high-risk gambit, forcing Troi to choose between her oath and
    the lives of the defectors.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e14
  scene_sequence: 14
  sequence_in_scene: 32
  key_dialogue: &id021
  - 'N''VEK: Our plan has collapsed...'
  - 'TROI: Our plan? What about the people on that freighter? Why did you fire?'
  - 'N''VEK: There was no alternative. You told me they couldn''t be trusted. If I
    let them live... the whole mission would be in jeopardy.'
  - 'TROI: Eighteen people lost their lives...'
  - 'N''VEK: Don''t lecture me, Counselor. A number of people have died in order to
    carry out this mission. Believe me, those eighteen won''t be the last.'
  - 'N''VEK: There is a Starfleet base on Draken Four. It is two days away at maximum
    warp. That''s where we''re going.'
  - 'TROI: In a Romulan ship...'
  - 'N''VEK: Yes. It''s your job to order Toreth to proceed into Federation territory.'
