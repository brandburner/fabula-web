      to life with Toreth’s voice, its abrupt beep cutting through the tension like
      a blade. N’Vek taps it to acknowledge the summons, his movements sharp and efficient.
      The device serves as the bridge between the private quarters and the broader
      power structures of the *Khazara*, its activation marking the transition from
      preparation to performance. Toreth’s voice, cold and authoritative, is the first
      test of Troi’s ability to maintain her deception under pressure.
    status_before_event: Inactive, mounted on the wall of Troi’s quarters.
    status_after_event: Deactivated after N’Vek’s response, its role fulfilled in
      propelling the scene forward.
    global_id: ger_object_9d4f6b696060
  - object_uuid: ger_object_59d5166599a6
    description_of_involvement: N’Vek uses the Romulan scanner to verify the surgical
      alterations on Troi’s face and body, ensuring her impersonation of Major Rakal
      will hold up under scrutiny. The device hums as it sweeps over her features,
      its clinical precision contrasting with the desperation of the moment. Troi
      initially resists, pushing it away, but N’Vek’s insistence—and the looming threat
      of Toreth’s summons—force her to submit. The scanner symbolizes the cold, technological
      rigor of Romulan intelligence, a tool that both enables and endangers Troi’s
      deception.
    status_before_event: Inactive, held in N’Vek’s hand as he enters Troi’s quarters.
    status_after_event: Deactivated and tucked away after confirming Troi’s disguise,
      no longer needed in the immediate crisis.
