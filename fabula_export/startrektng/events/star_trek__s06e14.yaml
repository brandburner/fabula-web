    emotional_state: Tense and determined, with an underlying current of anxiety about
      the success of the deception and the potential consequences of failure. His
      urgency masks a calculated risk-taking mindset, driven by the stakes of the
      defection and the need to protect Troi.
    goals:
    - Ensure Troi is fully prepared for her role as Major Rakal, including verifying
      her disguise and equipping her with the necessary tools (disruptor, uniform
      adjustments).
    - Rush Troi to the bridge before Toreth's suspicions are aroused, maintaining
      the deception and protecting the defection plan.
    what_happened: Sub-Commander N'Vek enters Troi's quarters with urgent efficiency,
      his demeanor tense and evasive as he briefs her on her new identity as Tal Shiar
      Major Rakal. He scans Troi with a Romulan device to verify her surgical alterations,
      adjusts her uniform, and hands her a disruptor, all while rushing her toward
      the bridge in response to Toreth's com summons. His dialogue is clipped and
      insistent, emphasizing the urgency of their mission and the dangers of exposure.
      N'Vek's actions reflect a deep commitment to the defection plan, but his evasiveness
      hints at the personal and professional risks he is taking.
