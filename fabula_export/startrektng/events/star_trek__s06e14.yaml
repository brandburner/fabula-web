- fabula_uuid: cand_evt_scene_b63314238b7d82f6_05
  global_id: null
  title: Troi tests N'Vek's loyalty before committing
  description: 'Deanna Troi, disoriented and groggy from surgical alteration and drugs,
    awakens aboard the Romulan warbird *Khazara* to find Sub-Commander N''Vek preparing
    her for a high-stakes deception. N''Vek urgently briefs her on her new identity
    as Tal Shiar Major Rakal, insisting she must assume command to navigate the ship
    to the Kaleb sector. Troi, distrustful and still processing her predicament, probes
    N''Vek’s sincerity using her empathic abilities, confirming his defection is genuine
    despite his evasiveness. The moment is interrupted by Commander Toreth’s com summons,
    forcing Troi to make a split-second decision: trust N''Vek’s plan or risk exposure.
    With no alternatives, she arms herself and follows him toward the bridge, where
    their fragile alliance will face its first test under Romulan scrutiny. The scene
    establishes the precarious foundation of their collaboration, where one misstep
    could unravel the entire escape plan and ignite interstellar conflict. Troi’s
    hesitation and N''Vek’s urgency underscore the high stakes, while her empathic
    confirmation of his loyalty marks the first critical step in their high-risk partnership.'
