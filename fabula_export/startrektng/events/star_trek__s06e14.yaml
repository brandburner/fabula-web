- fabula_uuid: cand_evt_scene_b63314238b7d82f6_03
  global_id: null
  title: N'Vek arms Troi for her first test
  description: 'In the immediate aftermath of her forced transformation, Troi awakens
    disoriented aboard the Romulan warbird *Khazara*, her body still processing the
    drugs used to subdue her. Sub-Commander N''Vek enters her quarters with urgent
    precision, revealing she is now impersonating Major Rakal of the Tal Shiar—a cover
    that could mean her survival or her death. He briefs her on the critical mission
    parameters: she must order Commander Toreth to the Kaleb sector under false pretenses,
    a test of her loyalty to the Romulan cause. Troi, still groggy and distrustful,
    resists at first, but N''Vek’s insistence and the looming threat of exposure force
    her compliance. When Toreth’s com call interrupts, N''Vek hastily adjusts Troi’s
    uniform and arms her with a disruptor, underscoring the high-stakes nature of
    her deception. The scene establishes the precarious balance of Troi’s double-agent
    role, where one misstep could unravel the entire defection plot and cost her life.
    N''Vek’s urgency and Troi’s reluctant cooperation set the stage for her first
    direct confrontation with Toreth, where her ability to maintain her cover will
    be tested under scrutiny.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e14
  scene_sequence: 2
  sequence_in_scene: 5
  key_dialogue: &id001
  - |-
    N'VEK: Good, you're awake.
    TROI: Who... are you?
    N'VEK: Please, Counselor, there is little time. The Commander will be calling for you at any moment.
  - |-
    N'VEK: You are no longer Deanna Troi. You are Major Rakal of the Tal Shiar, the Imperial Intelligence. Commander Toreth will want to know your mission. Tell her nothing. Simply instruct her to proceed to the Kaleb sector, course one-oh-two mark four.
    TROI: The Kaleb sector...
  - |-
    N'VEK: Your only chance to get off this ship alive is to do as I say. You are an empath. You would know if I am lying. Am I?
    TROI: No.
