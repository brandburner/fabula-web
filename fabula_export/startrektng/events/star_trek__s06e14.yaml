  key_dialogue: &id015
  - 'TROI: You may wait outside. Make certain we are not disturbed.'
  - 'N''VEK: The purpose of the Tal Shiar is to ensure loyalty. To defy them is to
    invite imprisonment... or death.'
  - 'TROI: He''s one of the highest-ranking members of the Romulan government... Why
    is he doing this?'
  - 'N''VEK: M''ret had questioned the repressive activities of the government—and
    was in danger of being imprisoned. He is willing to take this risk in order to
    protest Romulan policy and support the dissident movement.'
  - 'TROI: You''ve given me the identity of a Tal Shiar officer... is there a real
    Major Rakal?'
  - 'N''VEK: There was. She was killed so that you could take her place. Only a member
    of the Tal Shiar would have the authority to alter a ship''s mission.'
  - 'TROI: Why me? You could have found a Romulan to play this role...'
  - 'N''VEK: Yes—for this part of the plan. But if anything goes wrong... we will
    need a Starfleet officer.'
  - 'N''VEK: For your own sake, Counselor—the less you know about the specifics of
    this plan, the better.'
  - 'TROI: The Corvallens are mercenaries... Do they know what''s in these containers?'
  - 'N''VEK: No. They were hired simply to take you to Federation space.'
