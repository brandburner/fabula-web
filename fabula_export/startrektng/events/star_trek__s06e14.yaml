      loyalties and violent power struggles. The curved consoles glow with green holographic
      displays, casting an eerie light on the unfolding betrayal. The forward viewscreen
      dominates, though the *Enterprise* is not visible—its absence is a silent witness
      to the chaos. The bridge’s high surveillance and disciplined hierarchy make
      it the perfect stage for Toreth’s reassertion of command. Every station is a
      potential battleground, from the tactical console (where N'Vek is exposed) to
      the helm (where the Pilot executes his orders). The air is thick with tension,
      the hum of disruptors charging, and the unspoken threat of execution.
