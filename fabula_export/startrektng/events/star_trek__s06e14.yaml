  global_id: null
  title: Troi asserts command over Toreth
  description: In the warbird’s ward room, Troi enters a tense, informal gathering
    of Toreth and her officers, immediately disrupting the relaxed camaraderie. Toreth,
    testing Troi’s cover, probes her knowledge of Romulan military history and Tal
    Shiar doctrine, exposing Troi’s ignorance and forcing her into a defensive posture.
    The exchange escalates when Toreth’s personal trauma—her father’s execution by
    the Tal Shiar—surfaces, revealing her deep-seated hatred for the agency Troi is
    impersonating. Troi, unable to show empathy, doubles down on her authority, declaring
    she only requires Toreth’s obedience, not devotion. The confrontation reaches
    a breaking point just as an alert interrupts, redirecting their focus to the bridge.
    The moment leaves Toreth’s defiance unanswered but solidifies Troi’s precarious
    grip on command, as her calculated dominance clashes with Toreth’s simmering resentment
    and the warbird’s fragile alliance. The unresolved tension ensures this power
    struggle will resurface, threatening the mission’s stability.
