  object_involvements:
  - object_uuid: ger_object_d4349c67a433
    description_of_involvement: 'Troi’s disruptor, pressed into her hand earlier by
      N''Vek, becomes a symbol of her false authority as Major Rakal—but in this moment,
      it is useless. She does not draw it during the confrontation, as doing so would
      only accelerate her execution. The weapon’s presence is a cruel irony: it was
      meant to bolster her impersonation, yet it cannot save her. The Pilot’s disruptor,
      however, is the instrument of N''Vek’s death, its energy bolt vaporizing him
      in an instant. Toreth’s disruptor, confiscated earlier, is the ultimate symbol
      of her restored power—she does not need it to command, but its absence earlier
      was a temporary vulnerability.'
    status_before_event: Clutched in Troi’s hand (useless in the face of Toreth’s
      authority), N'Vek’s disruptor is drawn but never fired (vaporized along with
      him), Toreth’s disruptor is confiscated (not in play).
    status_after_event: Troi’s disruptor remains in her possession but is irrelevant;
      N'Vek’s disruptor is destroyed; Toreth’s disruptor is reclaimed (implied, as
      she regains full command).
    global_id: ger_object_d4349c67a433
  - object_uuid: ger_object_f19a34616883
    description_of_involvement: N'Vek’s disruptor is his last, desperate gambit—a
      futile attempt to defend himself as the Pilot levels his own weapon. The disruptor
      catches the bridge lights for a split second before the Pilot fires, vaporizing
      N'Vek mid-reach. The weapon’s design (compact, energy-based) is a stark contrast
      to the lethal efficiency of the Pilot’s shot. Its presence in N'Vek’s hand is
      a final, defiant gesture, but it changes nothing.
    status_before_event: Holstered at N'Vek’s side, drawn in a final, abortive attempt
      to fire.
    status_after_event: Destroyed (vaporized along with N'Vek).
    global_id: ger_object_f19a34616883
  - object_uuid: ger_object_0acf14e65ea5
    description_of_involvement: The forward disruptor array console is the linchpin
      of the deception’s unraveling. N'Vek’s sabotage—dialing the disruptor beam to
      harmless levels to conceal the transporter beam—is exposed when Toreth inspects
      the readouts. The console’s data reveals the origin of the transporter beam
      (the cargo bay), directly implicating N'Vek and Troi. The console’s glowing
      green displays and tactical overlays become a silent accuser, laying bare the
      betrayal in cold, unassailable facts.
    status_before_event: Functioning but sabotaged (disruptor beam output reduced
      to conceal the transporter beam).
    status_after_event: Operational again, with Toreth using it to confirm the cargo
      bay as the source of the transporter beam.
    global_id: ger_object_0acf14e65ea5
  - object_uuid: ger_object_c046ed555053
    description_of_involvement: The warbird cargo bay transporter beam is the invisible
      thread connecting the warbird’s deception to the *Enterprise*. Its trace, detected
      by the Pilot, is the smoking gun that exposes N'Vek’s plan. The beam’s origin
      in the cargo bay (where the defectors were hidden in stasis) and its destination
      (the *Enterprise*) are the critical pieces of evidence that seal N'Vek’s fate.
      The beam itself is long gone by the time it is detected, but its residual signature
      is enough to unravel everything.
    status_before_event: Active (ferrying defectors to the *Enterprise*), then dormant
