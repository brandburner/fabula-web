  title: Enterprise detects Romulan cloaking signature
  description: |2-

    The Enterprise crew, still on red alert, detects an intermittent magnetic distortion—a potential sign of a cloaked Romulan vessel. Data confirms the anomaly’s erratic appearance and disappearance, while DeSeve, the Romulan defector, steps forward to explain that a malfunctioning quantum singularity could cause such a signature. Picard, recognizing the stakes, orders Data to continue scanning and sets an intercept course toward the distortion. The discovery escalates tension, as the presence of a cloaked Romulan ship could mean the defection mission is compromised or that the Federation’s covert operation has been detected. The scene shifts from passive monitoring to active pursuit, raising the stakes for Troi’s mission aboard the warbird and the safety of the defectors.
