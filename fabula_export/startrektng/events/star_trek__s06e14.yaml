  global_id: null
  title: Troi blackmails N'Vek into sabotaging the cloak
  description: 'Cornered by N''Vek’s resistance to contacting the *Enterprise*, Troi
    escalates their confrontation by weaponizing his hidden treason. She threatens
    to expose him as a traitor to Commander Toreth unless he devises a way to create
    a detectable magnetic disturbance in the warbird’s cloak—a move that risks immediate
    detection but could alert the *Enterprise* to their location. N''Vek reluctantly
    concedes, revealing a technical vulnerability (misaligning a nullifier core) that
    could intermittently disrupt the cloak’s stealth. The exchange exposes the fragility
    of their alliance, with Troi’s desperation clashing against N''Vek’s fear of exposure.
    His compliance marks a turning point: their defection plot now hinges on a dangerous
    gamble that could unravel both their covers and the mission’s secrecy. The moment
    underscores the escalating cost of their deception, as Troi’s moral compromises
    deepen and N''Vek’s loyalty to the cause is tested by the threat of violent retribution.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e14
  scene_sequence: 19
  sequence_in_scene: 40
  key_dialogue:
  - 'TROI: We''re not playing it your way any more, N''Vek. I''ve been kidnapped...
    surgically altered... put in danger... I''ve gone along with all your plans. Now,
    you are going to listen to me. You figure out how to let the Enterprise track
    us, or I will go to Toreth and tell her I''ve discovered you''re a traitor. I''ll
    order you ejected into space. Do you understand me, Sub-Commander?'
  - 'N''VEK: ((reluctantly)) There is one possibility. In order for a ship to remain
    undetectable while cloaked, the radiative emissions from the warp engines must
    be precisely balanced. The ship''s Engineer is a sympathizer. He may be able to
    slightly misalign one of the nullifier cores. It would create a small magnetic
    disturbance in space whenever we were in motion.'
  - 'TROI: It''s a risk we''ll have to take. You''re the one who outlined the stakes
    to me, N''Vek. Are you getting squeamish now, just because things are getting
    a little more dangerous?'
