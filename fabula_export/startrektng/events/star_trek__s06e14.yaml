      between Troi and N'Vek, as its policies, surveillance, and punishment protocols
      shape their actions and fears. The Empire’s distrust of the Tal Shiar and its
      harsh treatment of traitors (e.g., ejection into space) are leveraged by Troi
      to coerce N'Vek. The Empire’s secrecy and control are embodied in the warbird’s
      cloaking device, which Troi seeks to sabotage. The confrontation thus becomes
      a microcosm of the broader conflict between the Empire’s rigid authority and
      the dissidents’ desire for freedom.
    active_representation: Through institutional protocols (e.g., punishment for treason)
      and the symbolic presence of the Imperial Seal in Troi’s quarters.
