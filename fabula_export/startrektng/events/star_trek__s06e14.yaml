    what_happened: Troi stands rigidly beside N’Vek on the *Khazara*’s bridge, her
      Betazoid senses likely overwhelmed by the sudden spike of fear and adrenaline
      from the crew. She maintains her cover as Major Rakal, but her eyes flicker
      with calculated assessment—weighing whether to intervene or let Toreth’s instincts
      play out. Her silence is strategic, masking the internal conflict of balancing
      her mission’s secrecy against the immediate threat of the *Enterprise*.
