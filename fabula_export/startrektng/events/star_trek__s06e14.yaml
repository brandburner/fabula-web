- fabula_uuid: act_f1b7363374f4957c
  number: 5
  summary: Act Five delivers the climax and resolution of the mission, marked by Troi's
    boldest move and N'Vek's ultimate sacrifice. The Enterprise detects the cloaked
    Khazara on a collision course, forcing Picard to take evasive action. On the Khazara,
    as Toreth prepares to fire on the Enterprise, Troi seizes her opportunity. She
    defiantly countermands Toreth's order, accusing her of being unfit to command.
    Troi then leverages the Romulan crew's fear of the Tal Shiar, threatening their
    families, to successfully depose Toreth and assume command of the warbird. Immediately,
    Troi hails the Enterprise, posing as Major Rakal, proposing a diplomatic discussion
    and requesting to beam aboard, prompting Picard to lower shields. Picard, recognizing
    Troi, complies, instructing Worf to maintain a transporter lock. Troi then orders
    N'Vek to fire disruptors, but N'Vek, in a pre-arranged act of sabotage, purposely
    weakens the beam while simultaneously transporting the three Romulan dissidents
    to the Enterprise. Toreth quickly deduces the deception, and the Pilot kills N'Vek.
    As Toreth prepares to execute Troi, Troi is beamed aboard the Enterprise at Picard's
    command. Back on the Enterprise, Troi explains the events, confirming the dissidents
    are safe, and Picard acknowledges N'Vek's sacrifice paved the way for future rescue
    operations.
