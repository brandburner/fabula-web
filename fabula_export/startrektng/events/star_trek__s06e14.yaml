  title: N'Vek's execution and Toreth's power restored
  description: The Pilot's discovery of a transporter beam originating from the warbird's
    cargo bay exposes N'Vek's sabotage attempt to conceal the defectors' transfer
    to the *Enterprise*. Toreth, now fully aware of the betrayal, confronts N'Vek,
    who reaches for his disruptor in a desperate bid for control. Before he can act,
    the Pilot vaporizes N'Vek, eliminating the immediate threat. Toreth seizes command
    of the bridge, reasserting her authority over the crew and Troi, who is now held
    at disruptor point. The violent resolution of N'Vek's treachery shifts the power
    dynamic aboard the warbird, leaving Toreth in control and Troi's cover as Major
    Rakal fatally compromised. The scene escalates the tension between deception and
    survival, with Toreth now poised to interrogate Troi and uncover the truth about
    the defectors' escape plan—all while the warbird remains a ticking time bomb for
    the mission's success.
