    - The threat of violent retaliation for defying orders, as demonstrated by Toreth’s
      defiance.
    - The Romulan Military’s reliance on direct action and aggression as a response
      to perceived threats.
    institutional_impact: The event exposes the Romulan Military’s internal tensions,
      particularly its susceptibility to the Tal Shiar’s authority. Troi’s coup demonstrates
