  - object_uuid: ger_object_7519a1804b2a
    description_of_involvement: The *viinerine*—a distinctive Romulan dish—serves
      as the catalyst for Troi’s first critical error. Toreth uses it as a cultural
      litmus test, exploiting Troi’s unfamiliarity to probe her identity. When Troi
      misidentifies the dish, Toreth pounces, her mild smile masking a predatory satisfaction.
      The *viinerine* becomes a symbol of Troi’s vulnerability, its incorrect naming
      a chink in her armor that Toreth exploits to escalate the interrogation. The
      dish’s role is purely functional in the meal but narratively pivotal as a tool
      of deception and exposure.
    status_before_event: Intact and centrally placed on the ward room table, part
      of the meal spread.
    status_after_event: Consumed or ignored; its narrative purpose fulfilled as a
      test of Troi’s cover.
    global_id: ger_object_7519a1804b2a
  - object_uuid: ger_object_ba1032214932
    description_of_involvement: Toreth’s *viinerine* dish is the centerpiece of her
      trap. She serves it to Troi with pointed suggestion, watching for the telltale
      hesitation that confirms Troi’s ignorance. The dish’s aroma and presentation
      are designed to lure Troi into a cultural misstep, which she obliges by selecting
      the wrong option. Toreth’s subsequent remark—‘I realize it’s nothing compared
      to what you’re accustomed to on Romulus...’—is a verbal jab, reinforcing Troi’s
      outsider status. The dish thus becomes a weapon in Toreth’s arsenal, exposing
      Troi’s deception through a seemingly innocuous gesture.
    status_before_event: Filled and placed prominently on the table, part of the meal
