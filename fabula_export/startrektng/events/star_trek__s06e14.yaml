- fabula_uuid: cand_evt_scene_57e8e54cfc58c59b_03
  global_id: null
  title: Riker demands answers about Troi’s absence
  description: "\n  In the immediate aftermath of a Romulan disruptor attack on the\
    \ *Enterprise*—one that inflicts minimal damage but raises alarms—the bridge erupts\
    \ into controlled chaos. Worf reports the attack’s puzzling lack of impact, while\
    \ Picard orders shields raised and phasers prepared, his voice steady but his\
    \ posture betraying tension. The Romulan dissidents, Proconsul M'ret and his aides,\
    \ materialize on the bridge in stasis, their sudden appearance adding to the confusion.\
    \ DeSeve identifies them as key figures in the underground movement, but the crew’s\
    \ focus quickly shifts when Riker, scanning the bridge, notices Troi’s conspicuous\
    \ absence. His question—*Where’s Deanna?*—cuts through the noise, forcing Picard\
    \ to confront the unspoken stakes of her mission. The moment underscores Troi’s\
    \ critical role in the unfolding crisis, her disappearance now a glaring hole\
    \ in the Enterprise’s operational cohesion. The dissidents’ arrival and the attack’s\
    \ ambiguity create a pressure cooker of unanswered questions, with Riker’s inquiry\
    \ serving as a catalyst for the crew’s growing unease and the audience’s suspicion\
    \ that Troi’s fate is the linchpin of the Romulan defection plot.\n  "
