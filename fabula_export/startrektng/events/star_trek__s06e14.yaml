      loss with the broader goals of Starfleet’s diplomatic and humanitarian efforts.
      The *Enterprise* itself, as a symbol of Starfleet, functions as a safe haven
      where the defectors can begin to rebuild their lives, and where Troi can process
      the emotional toll of her mission. Starfleet’s influence here is both institutional
      (through Picard’s authority and Beverly’s medical expertise) and humanistic
