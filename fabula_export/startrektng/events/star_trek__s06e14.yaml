  title: Toreth risks mutual destruction to test Enterprise
  description: 'Toreth, suspicious of the *Enterprise*''s ability to track the cloaked
    warbird, orders a reckless maneuver—positioning the ship directly beneath the
    Federation vessel. When Troi protests, Toreth reveals her intent: if the *Enterprise*
    detects and evades the warbird, she will interpret it as confirmation of their
    tracking capability and open fire, risking mutual destruction. N''Vek, though
    shocked, prepares the disruptors, while Troi scrambles to counter Toreth’s escalation,
    exposing the sub-commander’s hidden agenda of provoking a confrontation. The scene
    escalates the standoff, testing Troi’s ability to maintain her cover while preventing
    an interstellar incident, and underscores Toreth’s willingness to sacrifice the
    mission for tactical certainty. The tension peaks as the warbird inches closer
    to the *Enterprise*, with Troi’s protests falling on deaf ears, setting up a high-stakes
    confrontation where diplomacy hangs by a thread.'
