  title: Troi discovers Romulan surgical disguise
  description: Deanna Troi awakens in disorienting darkness aboard a Romulan Warbird,
    her attempts to activate the lights failing as she stumbles through an unfamiliar
    space. The room’s Romulan design—marked by the Imperial Seal—contrasts sharply
    with her expectations, forcing her to confront the reality of her surgical transformation.
    When the lights finally illuminate, she stares in horror at her Romulan reflection,
    her fingers tracing the altered features of her face and ears. This moment of
    visceral revelation underscores the physical and psychological stakes of her undercover
    mission, as well as the immediate danger of her precarious cover. The scene hinges
    on her disorientation and the unspoken tension of her deception, setting up the
    high-stakes tension of maintaining her identity while navigating Romulan politics.
