  title: Picard risks Enterprise for Troi’s extraction
  description: "\n  The Romulan warbird decloaks in front of the *Enterprise*, revealing\
    \ Troi—disguised as Tal Shiar Major Rakal—on the viewscreen. Picard immediately\
    \ recognizes her but conceals his shock, playing along with her cover. Troi’s\
    \ request to beam aboard is framed as a diplomatic discussion about the destroyed\
    \ Carvallen freighter, but her subtext is clear: she needs extraction. Picard,\
    \ trusting her implicit plea, orders Worf to maintain a transporter lock on her\
    \ while lowering the *Enterprise*’s shields—a high-risk maneuver that exposes\
    \ the ship to Romulan threats. Riker’s skepticism underscores the tension, but\
    \ Picard’s decision prioritizes Troi’s safety over protocol, reinforcing their\
    \ bond and the mission’s urgency. The scene hinges on unspoken trust: Troi’s ability\
    \ to signal her need without direct revelation, and Picard’s willingness to act\
    \ on intuition despite the danger. The stakes are personal (Troi’s survival) and\
    \ strategic (avoiding escalation with Romulus), with the transporter lock serving\
    \ as a fragile lifeline between deception and rescue.\n  "
