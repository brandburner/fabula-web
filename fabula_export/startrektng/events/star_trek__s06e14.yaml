  scene_sequence: 31
  sequence_in_scene: 60
  key_dialogue:
  - 'BEVERLY: I think that does it. How does it feel to have your own face back?'
  - 'TROI: Just right. Thank you.'
  - 'PICARD: The men you helped rescue are safe. Proconsul M''ret is deeply grateful
    for your help.'
  - 'TROI: The thanks should go to N''vek... He sacrificed himself to save them...
    and me...'
  - 'PICARD: Thanks to the two of you, the way has been paved for other rescue operations.
    You can be sure that N''vek''s efforts... and his sacrifice... were not in vain.'
