  title: Troi detects freighter captain’s deception
  description: On the warbird bridge, Troi asserts authority by ordering the hailing
    of an approaching freighter, immediately triggering tension with Toreth. As the
    alien captain verbally confirms the cargo transfer agreement with Major Rakal,
    Troi’s empathic senses detect deception—her expression shifts subtly, betraying
    her unease. She discreetly warns N’Vek, who reacts with shock before making a
    decisive move to a console, suggesting he’s about to act on her suspicion. The
    moment forces Troi to confront the fragility of her cover while escalating the
    stakes of the covert operation, as the freighter’s true intentions now threaten
    to expose the defectors’ escape plan. The scene hinges on Troi’s empathic intuition
    and N’Vek’s trust in her, both of which are critical to the mission’s survival.
