  global_id: null
  title: Troi discovers Romulan defectors and Spock’s role
  description: In the warbird’s cargo bay, Counselor Troi—posing as Tal Shiar Major
    Rakal—confronts Sub-Commander N’Vek, who reveals a hidden cache of high-ranking
    Romulan defectors, including Vice Proconsul M’ret, in stasis. N’Vek explains that
    M’ret’s defection is part of Ambassador Spock’s underground movement to smuggle
    dissidents to the Federation, justifying Troi’s abduction as a necessary deception.
    Troi learns that Rakal was murdered to facilitate her impersonation, and that
    N’Vek withholds critical details about the plan’s contingency—implying a potential
    need for a Starfleet officer if the mission fails. The revelation escalates the
    stakes, tying Spock’s covert operations to the risk of interstellar conflict and
    forcing Troi to accept her role in the deception, despite her moral unease. The
    scene ends with N’Vek instructing Troi to attend a senior officers’ dinner, where
    she must maintain her cover under Commander Toreth’s scrutiny.
