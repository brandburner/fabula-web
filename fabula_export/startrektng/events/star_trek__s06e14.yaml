  title: Troi seizes command through psychological leverage
  description: In a high-stakes confrontation aboard the Romulan warbird, Counselor
    Troi directly challenges Subcommander Toreth’s authority by countermanding an
    aggressive order to fire on the *Enterprise*. She frames her objection as strategic
    caution, warning that an attack would expose the warbird’s vulnerability during
    cloak disengagement. Escalating the conflict, Troi weaponizes the crew’s fear
    of the Tal Shiar, declaring Toreth unfit for command and threatening collective
    punishment for defiance. The crew’s hesitation and Toreth’s defiance force Troi
    to escalate further—she orders N’Vek to remove Toreth at gunpoint, consolidating
    power. The moment marks a critical shift in the power dynamic, exposing Troi’s
    calculated risk-taking and the fragility of Toreth’s control. Troi’s victory is
    tactical but precarious, as she must now maintain the illusion of Tal Shiar authority
    while advancing her covert mission to aid defectors. The scene underscores her
    ability to manipulate Romulan psychology and the high stakes of her deception,
    as even a single misstep could unravel her cover and jeopardize the entire operation.
