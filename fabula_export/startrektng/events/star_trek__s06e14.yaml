      for this event, its warbird-class systems and Romulan crew creating an environment
      where one misstep could mean exposure and death. The ship’s interior—narrow
      corridors, angular design, and the ever-present hum of its engines—reinforces
      the urgency of N’Vek’s mission and the danger Troi faces. As she and N’Vek exit
      her quarters, the *Khazara* becomes a labyrinth of deception, where Troi’s survival
      depends on her ability to navigate its hierarchies and threats.
    observed_atmosphere: Oppressive and militarized, the ship’s design and crew dynamics
      create a sense of inescapable tension.
