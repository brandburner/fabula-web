      direct action and destruction of threats—clashes with Troi’s deceptive strategy,
      which she frames as a more effective approach. The military’s authority is undermined
      by Troi’s coup, as she exploits the crew’s fear of the Tal Shiar to remove Toreth
      from command. The organization’s presence is felt in the crew’s initial loyalty
      to Toreth and their reluctance to defy her, even as Troi’s threats gain traction.
    active_representation: Through Toreth’s military command and the crew’s disciplined
