  object_involvements:
  - object_uuid: ger_object_966cd7332e68
    description_of_involvement: The command station/platform on the Romulan warbird
      bridge is the physical and symbolic battleground for this power struggle. Toreth
      initially occupies it, issuing orders with the authority of her rank, but Troi
      strategically positions herself beside it during her challenge. After Toreth’s
      removal, Troi steps onto the platform and assumes command, using the station’s
      elevated position to reinforce her new authority. The platform’s design—raised
      and central—amplifies the dramatic weight of the transfer of power, making Troi’s
      takeover visually and narratively undeniable.
    status_before_event: Occupied by Toreth, the platform radiates her command authority,
      its raised position symbolizing her unchallenged control over the warbird.
    status_after_event: Now occupied by Troi, the platform becomes the seat of her
      borrowed Tal Shiar power, its symbolic weight shifted from military discipline
      to intelligence-driven deception.
    global_id: ger_object_966cd7332e68
  - object_uuid: ger_object_d4349c67a433
    description_of_involvement: Troi’s disruptor, pressed into her hand earlier by
      N’Vek, becomes the symbolic and literal tool of her coup. She levels it at Toreth
      during the standoff, using its presence to enforce compliance and remove Toreth
      from command. The weapon’s charged hum and the crew’s reaction to it underscore
      the Tal Shiar’s feared authority—its mere existence is enough to cow the bridge
      crew into submission. N’Vek later uses his own disruptor to disarm Toreth, reinforcing
      Troi’s control.
    status_before_event: Clutched in Troi’s hand, fully charged and ready to fire,
      symbolizing her borrowed Tal Shiar authority.
    status_after_event: Still in Troi’s possession, now as the undisputed commander,
