    status_after_event: Still in Toreth's possession (or the Pilot's), used to reinforce
      her dominance over Troi and the bridge crew.
    global_id: ger_object_d4349c67a433
  - object_uuid: ger_object_f19a34616883
    description_of_involvement: N'Vek's disruptor, drawn in a final act of defiance,
      becomes the catalyst for his execution. The Pilot vaporizes him mid-reach, the
      weapon dissolving along with his body. Its brief appearance—caught in the warbird's
      lights—is a fleeting symbol of N'Vek's doomed resistance. The disruptor's design,
      compact and energy-efficient, reflects the Romulan military's preference for
      precision over brute force, though in this case, it fails him utterly. Its destruction
      mirrors the collapse of the defection plan and the futility of his last stand.
    status_before_event: Holstered at N'Vek's side, drawn in a desperate attempt to
      defend himself.
    status_after_event: Vaporized along with N'Vek, leaving no trace of his defiance.
    global_id: ger_object_f19a34616883
  - object_uuid: ger_object_0acf14e65ea5
    description_of_involvement: The warbird's bridge consoles, glowing with green
      holographic displays, become the battleground where Toreth's suspicions are
      confirmed. The Pilot traces the transporter beam's origin to the cargo bay using
      these readouts, exposing N'Vek's sabotage and Troi's deception. The consoles
      symbolize the warbird's technological prowess and Toreth's reliance on data
      to uncover truth—yet they also highlight the fragility of her control, as the
      very systems she trusts reveal betrayal.
    status_before_event: Functioning normally, displaying navigational plots, orbital
      trajectories, and cargo manifests. The Pilot uses them to trace the transporter
      beam's origin.
    status_after_event: The consoles remain operational, but their data now serves
      as evidence of N'Vek's treachery and Troi's role in the defection. Toreth uses
      this information to justify her actions and tighten her grip on the bridge.
    global_id: ger_object_0acf14e65ea5
  - object_uuid: ger_object_7e0e23f09312
    description_of_involvement: Toreth's disruptors—both the one confiscated from
      her earlier and the one wielded by the Pilot—are the instruments of her restored
      authority. The Pilot's disruptor vaporizes N'Vek in a brutal display of loyalty,
      then is turned on Troi, its humming threat a constant reminder of her mortality.
      Toreth's later possession of a disruptor (implied by the Pilot's action) cements
      her control, as she presses Troi for answers at gunpoint. These weapons are
      not just tools; they are extensions of Toreth's will, enforcing her dominance
      and the warbird's military discipline.
    status_before_event: Toreth's disruptor was confiscated earlier, but the Pilot's
      disruptor is active and lethal, used to execute N'Vek.
    status_after_event: Toreth regains a disruptor (likely the Pilot's or her own
      reclaimed weapon), which she uses to interrogate Troi, reinforcing her power
      over the situation.
    global_id: ger_object_7e0e23f09312
  - object_uuid: ger_object_c046ed555053
    description_of_involvement: 'The Romulan guard''s disruptor, trained on Troi alongside
