      reflecting the Romulan Empire's discipline and the high-stakes nature of the
      defection plot. The *Khazara* is a symbol of Romulan power and authority, a
      place where Troi's deception must be maintained under the watchful eyes of the
      crew. The warbird's systems hum with activity, and its angular design reinforces
      the sense of urgency and danger that Troi faces as she prepares to impersonate
      Major Rakal.
