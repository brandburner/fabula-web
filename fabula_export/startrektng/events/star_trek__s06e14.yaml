  title: Troi Learns the Defectors' True Stakes
  description: 'N''Vek reveals the high-risk defection plan to Troi in the cargo bay,
    showing her the stasis-bound body of Vice Proconsul M''ret—a high-ranking Romulan
    dissident—and his aides. The mission''s true scale becomes clear: M''ret''s defection
    is a calculated blow against Romulan repression, orchestrated by Spock''s underground
    network. Troi grapples with the moral weight of her role, now understanding why
    she was kidnapped and surgically altered to impersonate Tal Shiar Major Rakal.
    N''Vek insists she attend a mandatory senior officers'' dinner, including the
    suspicious Commander Toreth, to maintain her cover. The tension escalates as Troi
    realizes the precarious balance between her Federation loyalties and the dissidents''
    desperate gamble for freedom. The scene underscores the mission''s urgency and
    the personal stakes for Troi, who must now navigate Romulan power dynamics while
    hiding her true identity from a crew that would execute her if they discovered
    the truth.'
