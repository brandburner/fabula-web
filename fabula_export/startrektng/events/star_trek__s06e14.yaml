  title: Enterprise detects Romulan attack
  description: On the Enterprise bridge, Data confirms the debris field is the remains
    of an Antares-class freighter destroyed by Romulan disruptor fire, raising immediate
    alarm. Picard and Riker deduce the Romulans are still nearby, triggering a red
    alert and raising shields. Picard confronts DeSeve about the freighter’s cargo,
    suspecting Romulan interference, while Data’s sensor analysis tightens the noose
    around Troi’s covert mission aboard the warbird. The discovery escalates tensions,
    confirming active Romulan aggression in Federation space and forcing the Enterprise
    into a defensive posture—directly threatening Troi’s precarious position on the
    Khazara and the defectors’ escape plan.
