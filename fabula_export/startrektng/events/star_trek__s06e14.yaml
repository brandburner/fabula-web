  - location_uuid: ger_location_038b1bd2fb94
    description_of_involvement: Troi’s quarters aboard the *Khazara* are a spartan,
      dimly lit space that amplifies her disorientation and vulnerability. The angular
      Romulan design, the Imperial Seal on the wall, and the unfamiliar hum of alien
      systems create an atmosphere of isolation and oppression. It is here that N’Vek
      forces her into the role of Major Rakal, the confined space becoming a pressure
      cooker of urgency and tension. The quarters are both a refuge and a cage—somewhere
      Troi can briefly gather her thoughts, but also a place from which she cannot
      escape her new identity.
    observed_atmosphere: Claustrophobic and tense, the air thick with the hum of Romulan
      technology and the unspoken threat of discovery.
    functional_role: Private briefing space and staging ground for Troi’s transformation
      into Major Rakal.
    symbolic_significance: Represents the moral and physical confinement Troi experiences
      as she is forced into a role that contradicts her Starfleet values.
    access_restrictions: Restricted to authorized personnel; N’Vek enters unannounced,
