    DESEVE: ((slowly)) Coffee...
  - |-
    DESEVE: I have a message. From Ambassador Spock.
    PICARD: This is why you've returned... to bring this message?
    DESEVE: Partly.
  - |-
    DESEVE: The Romulans are very... moral, Captain. They have an absolute certainty about what is right and what is wrong... who is a friend and who is an enemy. They have a strict moral compass which provides them with a clarity of purpose.
    PICARD: But not any longer...
  - 'PICARD: ((to COM)) Mister Riker. Set course for the Kaleb sector. Warp eight.'
