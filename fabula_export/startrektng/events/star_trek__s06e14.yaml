  - object_uuid: ger_object_59d5166599a6
    description_of_involvement: N'Vek grips the Romulan scanner and sweeps it over
      Deanna Troi's altered face and body in her quarters aboard the warbird *Khazara*.
      The device hums as it verifies her surgical changes to impersonate Major Rakal.
      Troi, groggy from drugs, initially pushes it away, her distrust clear, but ultimately
      relents under the pressure of the mission. The scanner serves as a critical
      tool for ensuring the authenticity of Troi's transformation, a necessary step
      before she can face Commander Toreth. Its presence underscores the high-stakes
      nature of the deception and the precision required to maintain it.
    status_before_event: Inactive, held by N'Vek, ready for use to verify Troi's transformation.
    status_after_event: Used to confirm Troi's disguise, then set aside as N'Vek prepares
      her for the confrontation with Toreth.
