- fabula_uuid: cand_evt_scene_e3c1d9c64252bc5a_01
  global_id: null
  title: Troi blackmails N'Vek into sabotaging the warbird
  description: 'In a private confrontation aboard the warbird, Troi—exhausted by deception
    and escalating danger—ultimately forces N''Vek’s compliance by weaponizing his
    hidden treason. After he dismisses her plea to contact the *Enterprise* as impossible,
    she escalates from negotiation to threat: if he refuses to misalign the nullifier
    core (creating a detectable magnetic disturbance), she will expose him to Toreth
    as a traitor. N''Vek’s reluctant admission that the Engineer is a sympathizer
    reveals the fragility of their alliance—his resistance stems not just from protocol,
    but from fear of discovery. The exchange crystallizes Troi’s growing ruthlessness
    (a departure from her counselor role) and N''Vek’s moral conflict, while the technical
    solution becomes their only viable path to Federation rescue. The moment underscores
    the mission’s high stakes: one misstep could trigger war, and trust between allies
    is now a liability.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e14
  scene_sequence: 19
  sequence_in_scene: 39
  key_dialogue:
  - 'TROI: We''re not playing it your way any more, N''Vek. I''ve been kidnapped...
    surgically altered... put in danger... I''ve gone along with all your plans. Now,
    you are going to listen to me. You figure out how to let the Enterprise track
    us, or I will go to Toreth and tell her I''ve discovered you''re a traitor. I''ll
    order you ejected into space. Do you understand me, Sub-Commander?'
  - 'N''VEK: ((reluctantly)) There is one possibility. In order for a ship to remain
    undetectable while cloaked, the radiative emissions from the warp engines must
    be precisely balanced. The ship''s Engineer is a sympathizer. He may be able to
    slightly misalign one of the nullifier cores. It would create a small magnetic
    disturbance in space whenever we were in motion.'
  - 'TROI: It''s a risk we''ll have to take. You''re the one who outlined the stakes
    to me, N''Vek. Are you getting squeamish now, just because things are getting
    a little more dangerous?'
