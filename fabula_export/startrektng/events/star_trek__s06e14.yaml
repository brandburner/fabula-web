  title: Troi asserts Tal Shiar authority over Toreth
  description: "\n  On the warbird bridge, Commander Toreth openly challenges Troi’s\
    \ fabricated Tal Shiar credentials, exposing her lack of preparation and exploiting\
    \ the crew’s deep-seated distrust of the intelligence agency. When Toreth demands\
    \ to inspect the cargo (which contains the defectors), Troi—desperate to maintain\
    \ control—invokes her fabricated authority, ordering an abrupt course change to\
    \ the Kaleb sector. Toreth reluctantly complies, but her compliance is laced with\
    \ skepticism, and N’Vek’s visible relief underscores the fragility of Troi’s cover.\
    \ The confrontation escalates the power struggle aboard the ship, deepens Toreth’s\
    \ suspicion of Troi’s motives, and raises the stakes for the mission’s success.\
    \ The scene hinges on Troi’s ability to bluff her way through a high-stakes confrontation,\
    \ where one misstep could unravel the entire operation.\n  "
