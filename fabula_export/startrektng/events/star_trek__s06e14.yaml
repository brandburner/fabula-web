- fabula_uuid: cand_evt_scene_df543fad6547fd2a_03
  global_id: null
  title: Troi learns the defection mission's stakes
  description: "\n  In the warbird's cargo bay, N'Vek reveals the high-stakes nature\
    \ of the Romulan defection mission to Troi, who is still grappling with her forced\
    \ role as Tal Shiar Major Rakal. The cargo containers hold Vice Proconsul M'ret\
    \ and his aides in stasis—a defection that could destabilize the Romulan government\
    \ and provide an escape route for dissidents. N'Vek confirms that Rakal was killed\
    \ to facilitate Troi’s impersonation, emphasizing the mission’s desperation. Troi\
    \ questions why she was chosen over a Romulan operative, but N'Vek deflects, insisting\
    \ she must accompany the defectors to Federation space via a Corvallen freighter.\
    \ The exchange underscores the moral weight of Troi’s deception and the fragility\
    \ of the plan, as she must now maintain her cover while navigating the warbird’s\
    \ hostile senior officers, including Commander Toreth. The scene escalates tension\
    \ by revealing the mission’s true scope and the risks of exposure, while Troi’s\
    \ reluctant acceptance of her role foreshadows the challenges ahead.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e14
