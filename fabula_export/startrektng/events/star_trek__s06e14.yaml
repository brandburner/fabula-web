      influence is implied through Troi's identity as a Starfleet officer and the
      broader context of the defection plan. Troi's mission to impersonate Major Rakal
      and divert the warbird to the Kaleb sector is ultimately aimed at facilitating
      the safe extraction of Romulan defectors to Federation space. The stakes of
      her deception are tied to Starfleet's diplomatic and strategic goals, as well
      as the potential for interstellar conflict if the plan fails.
    active_representation: Through Troi's identity as a Starfleet officer and the
      broader context of the defection plan, which aligns with Starfleet's diplomatic
      and strategic objectives.
    power_dynamics: Operating under constraint (Troi's undercover role and the need
      to avoid exposure), while pursuing broader diplomatic and strategic goals.
