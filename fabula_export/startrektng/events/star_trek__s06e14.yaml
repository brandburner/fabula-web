      to alter course or yield to Troi’s authority reflects the Empire’s rigid military
      hierarchy and its disdain for intelligence agencies’ secrecy. The organization’s
      influence is felt in the bridge’s disciplined atmosphere, where Toreth’s defiance
      of the Tal Shiar creates a direct challenge to the Empire’s institutional power
      dynamics.
