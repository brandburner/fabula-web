  title: Troi Orders Sabotaged Disruptor Fire
  description: Under the guise of Major Rakal, Troi commands N'Vek to fire the warbird's
    disruptors at the *Enterprise* during a staged diplomatic meeting. The order is
    a calculated risk to maintain her cover while secretly protecting the Federation
    ship. N'Vek subtly sabotages the disruptor beam, ensuring minimal damage—an act
    of quiet defiance that preserves the illusion of compliance. The exchange tests
    the fragile trust between Troi and N'Vek, with the potential to expose their defection
    plot or escalate tensions between Romulus and the Federation. The lack of visible
    damage to the *Enterprise* suggests N'Vek's sabotage was successful, but the tension
    on the bridge remains palpable as both characters navigate the high-stakes deception.
