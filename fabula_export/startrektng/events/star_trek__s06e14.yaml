- fabula_uuid: cand_evt_scene_2e2380fb24a32365_02
  global_id: null
  title: Troi asserts Tal Shiar authority over Toreth
  description: 'In the immediate aftermath of the Corvallen freighter''s destruction—a
    decision Troi indirectly enabled through her silence—Toreth confronts her on the
    warbird''s bridge, demanding accountability for the civilian casualties. Troi,
    still reeling from the moral weight of the deaths, suppresses her guilt and invokes
    her Tal Shiar authority to deflect blame onto N''Vek, falsely claiming she authorized
    the attack. The exchange escalates into a power struggle: Toreth challenges her
    right to command, while Troi, cornered, asserts dominance by ordering the warbird
    to cloak and isolating Toreth with a vague directive to ''hold position.'' The
    scene underscores the fragility of Troi''s cover, the growing tension between
    her and Toreth, and the ethical cost of her deception. By cloaking the ship, she
    buys time but deepens the crew''s distrust, while Toreth''s logged disapproval
    plants seeds for future conflict. The moment is a turning point—her lie to protect
    N''Vek solidifies her authority but erodes her moral standing, setting up her
    eventual unraveling under Toreth''s scrutiny.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e14
  scene_sequence: 10
