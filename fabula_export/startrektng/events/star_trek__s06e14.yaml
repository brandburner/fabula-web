  - object_uuid: ger_object_5fcada1021ce
    description_of_involvement: The Pilot’s COM device is the narrative pivot of the
      scene. Its sudden activation—accompanied by the Pilot’s urgent voice—interrupts
      Toreth’s interrogation at its peak, redirecting the crew’s focus to an external
      threat. The device’s beep and the Pilot’s report create a jarring contrast to
      the ward room’s tense silence, serving as a literal and metaphorical alarm.
      Its involvement is purely functional but critically timed, saving Troi from
      further exposure and shifting the dynamic from psychological to operational.
    status_before_event: Silent and inactive, mounted on the Pilot’s uniform.
    status_after_event: Deactivated after delivering the alert; its purpose in this
      event is fulfilled.
    global_id: ger_object_5fcada1021ce
