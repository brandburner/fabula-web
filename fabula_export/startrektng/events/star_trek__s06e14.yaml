    - Secrecy and deception (the need for Troi to maintain her cover and avoid detection)
    institutional_impact: The Tal Shiar's influence is felt in the high-stakes nature
      of Troi's deception and the urgency of the defection plot. Its power dynamics
      shape the interactions between characters and drive the tension of the scene,
      as Troi must navigate the precarious balance between her false identity and
      the real threat of exposure.
    internal_dynamics: The Tal Shiar's internal tensions—between its role as an intelligence
      apparatus and its reputation for brutality—are reflected in Troi's struggle
      to embody Major Rakal's authority while grappling with the moral implications
