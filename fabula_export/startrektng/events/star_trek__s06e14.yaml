  object_involvements:
  - object_uuid: ger_object_d4349c67a433
    description_of_involvement: Sub-Commander N'Vek presses a disruptor into Deanna
      Troi's hand inside her quarters aboard the *Khazara*, arming her moments before
      Commander Toreth's com summons. Troi clutches the weapon as she strides to the
      bridge, levels it at Toreth during the tense standoff, and orders N'Vek to enforce
      her command at disruptor-point. The disruptor bolsters her impersonation of
      Tal Shiar Major Rakal, its presence forcing crew compliance amid threats of
      violence. It is both a tool of deception and a tangible reminder of the lethal
      stakes involved in Troi's mission.
    status_before_event: Held by N'Vek, ready to be handed to Troi as part of her
      preparation for the confrontation with Toreth.
    status_after_event: Clutched by Troi, used to assert her false authority and maintain
      the deception during her interaction with Toreth.
    global_id: ger_object_d4349c67a433
  - object_uuid: ger_object_75ef70da79e7
    description_of_involvement: Deanna Troi wears the Romulan officer uniform of Major
      Rakal, a disguise that marks her as an elite member of the Tal Shiar. The uniform
      is brighter than standard Romulan attire and features a distinctive insignia
      on the right shoulder, symbolizing her false authority. N'Vek hastily adjusts
      the fit before Troi answers Toreth's com call, ensuring the disguise withstands
      scrutiny. The uniform is a critical prop in Troi's deception, granting her the
      symbolic and practical authority needed to command respect aboard the *Khazara*
      and interact with Toreth.
    status_before_event: Worn by Troi but slightly ill-fitting, requiring adjustments
      by N'Vek to ensure authenticity.
    status_after_event: Adjusted and worn confidently by Troi as she prepares to face
      Toreth, now serving as a visual cue of her false identity and authority.
    global_id: ger_object_75ef70da79e7
  - object_uuid: ger_object_9d4f6b696060
    description_of_involvement: N'Vek activates the com device mounted in Troi's quarters
      aboard the *Khazara* while briefing her on the Rakal impersonation. Commander
      Toreth's voice crackles through the panel, summoning Major Rakal to the Bridge
      and ordering N'Vek to escort her. The interruption halts Troi's questions, forces
      her to holster the disruptor, and propels them toward confrontation. The com
      device serves as a catalyst, accelerating the urgency of the scene and underscoring
      the high-stakes nature of Troi's deception. Its sudden activation disrupts the
      briefing, reminding all parties of the looming threat posed by Toreth's authority.
    status_before_event: Mounted in Troi's quarters, inactive until Toreth's com call
      interrupts the scene.
    status_after_event: Activated by Toreth's com call, used to relay orders and propel
      Troi and N'Vek toward the Bridge.
