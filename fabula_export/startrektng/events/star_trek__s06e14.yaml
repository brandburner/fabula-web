  title: Enterprise ambush reveals the warbird
  description: "\n  The Romulan warbird Khazara, now under Troi’s covert command as\
    \ Major Rakal, plots a course for the Draken System—a critical waypoint in the\
    \ defection mission. The tension between Troi and Toreth lingers after their earlier\
    \ confrontation, but the crew executes the order without hesitation. Just as the\
    \ ship prepares to engage warp, the bridge alarms blare, and the lights shift\
    \ to emergency red. The Pilot detects an uncloaked vessel on sensors, though the\
    \ warbird’s own cloaking device remains active, suggesting the Federation ship\
    \ has not yet identified them. Toreth’s suspicion spikes, and she orders the viewscreen\
    \ activated—revealing the USS Enterprise looming ominously above them, its presence\
    \ an immediate threat to the mission’s secrecy. The sudden appearance of the Federation\
    \ vessel forces the warbird into a precarious standoff, escalating the stakes\
    \ of the defection and exposing the dissidents’ fragile cover. The Enterprise’s\
    \ ambush position suggests premeditated surveillance, implying Picard’s crew has\
    \ been tracking the warbird’s movements, possibly due to DeSeve’s earlier intelligence\
    \ or Spock’s underground network. The moment freezes the bridge crew in a mix\
    \ of shock and dread, as the fragile alliance between Troi and Toreth now faces\
    \ its most critical test: whether to engage, flee, or attempt to bluff their way\
    \ out of the confrontation without triggering an interstellar incident.\n  "
