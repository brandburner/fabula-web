      Romulan quarters aboard the warbird *Khazara*, her disorientation amplified
      by the unfamiliar hum of alien systems and the angular design. The quarters
      serve as a temporary sanctuary, a liminal space where Troi's transformation
      from Starfleet counselor to Tal Shiar impersonator is both physical and psychological.
      The mirror confronting her with her altered Romulan features—ridged forehead,
