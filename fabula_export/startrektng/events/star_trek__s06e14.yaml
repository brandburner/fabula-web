      the raw emotions on display. The room’s layout—consoles lining the walls, the
      central transporter platform, and the exit door—creates a natural stage for
      the confrontation, with DeSeve at the center and the crew arrayed around him
      like judges. The hum of the consoles and the occasional beep of equipment provide
