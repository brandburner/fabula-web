  title: DeSeve reveals freighter’s limitations under pressure
  description: 'In the Ready Room, Picard confronts DeSeve about the missing freighter,
    forcing him to admit the message originated from a Romulan underground contact—not
    directly from Spock. Worf’s distrust escalates as DeSeve reluctantly discloses
    the freighter’s true nature: an aging, slow Antares-class vessel with limited
    range (15 light years), a detail he had withheld earlier due to Romulan secrecy
    habits. Picard seizes this new intelligence to pivot the mission toward an urgent
    pursuit, narrowing the search radius and raising the stakes. The exchange exposes
    DeSeve’s lingering Romulan conditioning while reinforcing Worf’s skepticism, but
    the tactical shift—moving from the bridge to the search—accelerates the chase
    and sets up the next phase of the operation. The moment hinges on DeSeve’s reluctant
    disclosure, which transforms passive waiting into active pursuit, while Picard’s
    strategic pivot underscores his ability to adapt under pressure.'
