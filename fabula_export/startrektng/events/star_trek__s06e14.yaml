- fabula_uuid: cand_evt_scene_b63338b7d82f6_04
  global_id: null
  title: N'Vek arms Troi for her cover
  description: 'Deanna Troi awakens disoriented aboard the Romulan warbird *Khazara*,
    her body surgically altered to impersonate Tal Shiar Major Rakal. Sub-Commander
    N''Vek—acting as her reluctant ally—rushes to brief her on her new identity and
    the immediate threat posed by Commander Toreth. As Troi struggles to process her
    situation, N''Vek forces a disruptor into her hand and insists she follow his
    instructions to the letter: she must order the *Khazara* to the Kaleb sector under
    false pretenses. The urgency of Toreth’s com summons cuts short Troi’s protests,
    leaving her no choice but to trust N''Vek’s claim that her survival depends on
    maintaining the deception. The scene establishes the high-stakes tension of Troi’s
    double-agent role, where one misstep could expose her and the defection plot,
    while N''Vek’s desperation hints at deeper Romulan fractures. The disruptor in
    her hand symbolizes the violence she may need to commit to survive, forcing her
    to confront the moral cost of her mission.'
