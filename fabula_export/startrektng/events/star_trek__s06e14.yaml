  global_id: null
  title: Troi seizes command of the warbird
  description: 'In a high-stakes power struggle aboard the Romulan warbird, Counselor
    Troi—disguised as Tal Shiar Major Rakal—exploits Toreth’s aggressive order to
    attack the *Enterprise* as an opportunity to assert her authority. By framing
    Toreth’s military approach as reckless and vulnerable, Troi leverages the Romulans’
    fear of the Tal Shiar to force Toreth’s removal from command. She then seizes
    control of the ship, using psychological intimidation (threatening the families
    of any who defy her) to solidify her dominance. The coup is executed with calculated
    precision, revealing Troi’s strategic mind and her willingness to embrace ruthlessness
    to maintain her cover. This moment marks a critical turning point: Troi’s command
    of the warbird is now absolute, but her deception is stretched thin, and the crew’s
    loyalty remains fragile. The scene foreshadows her next gambit—lowering the *Enterprise*’s
    shields under false pretenses—while deepening the tension between her covert mission
    and the looming threat of war.'
