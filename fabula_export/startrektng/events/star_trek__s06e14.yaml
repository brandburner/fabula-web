      and her open defiance of the Tal Shiar, as well as the warbird’s operational
      constraints (e.g., maneuvering speed, cloaking).
    power_dynamics: Exercising authority over the warbird’s crew and operations, but
      being challenged by the Tal Shiar’s implied power (represented by Troi). The
      Empire’s internal tensions—between military command and intelligence agencies—are
      laid bare in this exchange.
