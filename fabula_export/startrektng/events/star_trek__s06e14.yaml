  global_id: null
  title: DeSeve’s Reflexive Betrayal
  description: DeSeve’s psychological fracture is exposed in a moment of raw vulnerability
    when Picard enters his quarters. His instinctive Starfleet posture—snapping to
    attention at the sight of a superior—betrays his lingering loyalty to the Federation,
    despite his defection to Romulus. The scene forces a confrontation between his
    dissident role and his past self, as Picard probes his motivations. DeSeve’s admission
    that Romulan moral certainty once appealed to him but now feels ambiguous reveals
    his internal conflict, while Picard’s decision to act on Spock’s message escalates
    the mission’s stakes. The exchange underscores the fragility of DeSeve’s cover
    and the broader tension between Federation ideals and Romulan dogma, setting up
    the Enterprise’s intervention in the Kaleb sector.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e14
  scene_sequence: 5
  sequence_in_scene: 14
  key_dialogue:
  - |-
    DESEVE: ((to replicator)) Vorcha'ak.
    COMPUTER VOICE: There is no listing for Vorcha'ak.
    DESEVE: ((slowly)) Coffee...
  - |-
    DESEVE: Commander!
    PICARD: At ease... and it's Captain, actually.
    DESEVE: I'm... sorry, sir. Captains, not Commanders... it's been so long since I've... I'll remember.
  - |-
    DESEVE: I was... ready to come back. Romulus had... lost its appeal.
    PICARD: And yet you found something very appealing about it at one time.
    DESEVE: The Romulans are very... moral, Captain. They have an absolute certainty about what is right and what is wrong... who is a friend and who is an enemy. They have a strict moral compass which provides them with a clarity of purpose.
    DESEVE: I once found their sense of purpose, their commitment and passion, to be very compelling.
    PICARD: But not any longer...
  - 'DESEVE: As I''ve grown older, I realize that clarity of purpose is a more ambiguous
    matter than I had thought in my youth.'
