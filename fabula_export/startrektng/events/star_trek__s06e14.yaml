  title: Picard exposes DeSeve’s Romulan contact
  description: "\n  In the ready room, Picard confronts DeSeve about the missing freighter,\
    \ forcing him to admit the message originated from a Romulan underground contact—not\
    \ directly from Spock. Worf’s suspicion of a trap escalates tensions, while DeSeve’s\
    \ reluctance to disclose details (like the freighter’s limited range) reveals\
    \ his Romulan-trained habit of withholding information. Picard pivots the mission\
    \ toward tracking the vessel, exposing fractures in trust and raising the stakes\
    \ of the covert operation. The exchange underscores DeSeve’s divided loyalties\
    \ and the Enterprise crew’s growing unease about Romulan involvement.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e14
