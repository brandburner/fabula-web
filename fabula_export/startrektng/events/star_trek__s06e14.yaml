- fabula_uuid: cand_evt_scene_36639ea793d5e3f9_01
  global_id: null
  title: Troi forces Toreth into Federation space
  description: In the warbird's ward room, Troi—maintaining her Rakal persona—orders
    Toreth to plot a course through Federation space to the Draken System, where they
    will deliver the Romulan defectors. Toreth resists, citing the extreme risk of
    detection and potential war, but Troi dismisses his objections, invoking Tal Shiar
    authority and access codes to bypass Federation sensors. The confrontation escalates
