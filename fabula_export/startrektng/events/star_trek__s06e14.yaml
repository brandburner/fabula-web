    in a power struggle where Troi’s survival depends on maintaining dominance, but
    the emotional undercurrent reveals the cost of her lies and the depth of Toreth’s
    resentment toward the Tal Shiar. The interruption by the Pilot’s alert cuts short
    their confrontation, leaving their ideological clash unresolved but irrevocably
    heightened.
