      Troi and N’Vek exploit.
    institutional_impact: The event highlights the Empire’s internal fractures, particularly
      the tension between military command and intelligence agencies. Toreth’s defiance
      of the Tal Shiar risks escalating these conflicts, while Troi’s deception further
      destabilizes the power balance.
    internal_dynamics: The Romulan military’s distrust of the Tal Shiar is on full
      display, with Toreth’s refusal to cooperate serving as a microcosm of the broader
      institutional rivalry. This dynamic creates opportunities for dissidents like
      N’Vek and Troi to advance their defection plan.
