  key_dialogue:
  - |-
    TORETH: The Intelligence Officer in charge of the mission was executed.

    TROI: I don't need your devotion, Commander. Just your obedience.

    TORETH: That is all you have.
  - 'TORETH: Protection? From whom? Was the Empire threatened by the words of an old
    man, a devoted citizen who merely tried to speak his mind? How did the Tal Shiar
    protect the Empire by dragging my father from our home in the middle of the night?'
  - |-
    TROI: Clearly, your father was a traitor.

    TORETH: No. He was just an idealistic old man... and I never saw him again.
