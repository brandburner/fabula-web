- fabula_uuid: cand_evt_scene_f75da3bcfda2f5a2_03
  global_id: null
  title: Toreth interrogates Troi after N'Vek's betrayal
  description: 'Following N''Vek''s violent execution by the Pilot for his betrayal,
    Toreth seizes full control of the warbird''s bridge and turns her suspicion on
    Troi. With N''Vek''s treachery exposed, Toreth deduces that the ''mysterious cargo''
    Troi brought aboard—ostensibly as Major Rakal—was secretly transported to the
    *Enterprise* via a cloaked transporter beam. Toreth, now armed with the Pilot''s
    disruptor, interrogates Troi with lethal intent, demanding answers about the cargo''s
    contents while simultaneously ordering the ship to drop shields, cloak, and prepare
    for warp. The scene escalates from suspicion to outright threat, with Troi''s
    cover as a Tal Shiar Major collapsing under Toreth''s scrutiny. The tension peaks
    as Toreth declares Troi''s impending execution unless she cooperates, forcing
    Troi into a high-stakes gamble between survival and maintaining her mission. This
    moment marks a critical turning point: Toreth''s authority is restored, N''Vek''s
    defection is permanently silenced, and Troi''s deception is on the verge of unraveling—all
    while the warbird''s next move could trigger an interstellar incident. The dialogue
    crackles with subtext, revealing Toreth''s ruthless pragmatism and Troi''s calculated
    silence, as the scene sets up the immediate threat of execution and the looming
    decision to either comply or resist at gunpoint.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e14
  scene_sequence: 29
  sequence_in_scene: 58
  key_dialogue:
  - 'TORETH: You are lying to me. The disruptor beam was purposely sabotaged to conceal
    a transporter beam within it. Quickly... locate the transport coordinates.'
  - 'TORETH: So. The mysterious cargo... brought on board by Major Rakal of the Tal
    Shiar... has now been transported to a Starfleet vessel. It appears we have two
    traitors in our midst.'
  - 'TORETH: Well, Major... now that you can no longer take refuge behind the shield
    of the Tal Shiar... it''s time you answered a few questions. What was in those
    cargo containers? Not so sure of yourself now, are you? Well, no matter. We''ll
    soon learn all we need to know. Then we will execute you. Drop shields and cloak
    the ship. Prepare to go to warp.'
