  title: Picard reveals Federation surveillance to Mirasta
  description: |2

    Mirasta Yale, awestruck by her first experience aboard the *Enterprise*, shares her childhood dreams of space exploration with Picard and Troi. The moment of wonder quickly shifts as Picard and Troi disclose the Federation’s covert pre-contact surveillance—monitoring Malcorian broadcasts and deploying undercover observers like Riker. Mirasta’s initial enchantment fades as she grasps the ethical implications: while she understands the Federation’s need for intelligence, she warns that revealing this to Chancellor Durken would provoke backlash, particularly from xenophobic Minister Krola. The conversation pivots to Riker’s disappearance, and Mirasta urges secrecy to prevent a diplomatic crisis. Her growing unease marks the first crack in her idealized view of the Federation, foreshadowing her eventual disillusionment and the fragile state of Malcorian-Federation relations.
