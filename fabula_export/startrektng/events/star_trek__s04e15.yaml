  - character_uuid: ger_agent_50a90f15fd23
    emotional_state: Terrified and unhinged, oscillating between paranoid certainty
      ('creatures from outer space') and childlike vulnerability as Berel dismisses
      him with clinical detachment. His fear is not just of Riker but of the unknown—embodied
      by the phaser and Riker’s physiology—as if the very fabric of Malcorian normalcy
      is being violated.
    goals:
    - To alert Central Security and trigger an institutional response to what he perceives
      as an alien threat.
    - To validate his fear by forcing the medical staff to acknowledge Riker’s otherness,
      thereby justifying his panic.
    what_happened: Nilrem’s voice rises in alarm as he publicly reveals his terror
      over Riker’s alien physiology, framing it as a potential Federation infiltration.
      His panic escalates when he suggests calling Central Security, only to be silenced
      by Berel’s order for a calmative. Physically, he is visibly agitated—voice trembling,
      body tense—as he clutches at the idea of ‘space creatures’ invading Malcor.
      His outburst forces Berel into a reactive stance, exposing the fragility of
      the medical staff’s composure under pressure.
