  - object_uuid: ger_object_5483ca90ade2
    description_of_involvement: 'Riker’s phaser, confiscated by Dr. Berel earlier,
      becomes the smoking gun in Krola’s staged attack. Beverly Crusher’s analysis
      of the phaser’s stun setting—revealed through the angle of impact and the lack
      of lethal force—exposes Krola’s deception. The weapon, initially a tool of Federation
      defense, is repurposed by Krola as a prop in his martyrdom performance. Its
      non-lethal nature undermines his entire narrative, turning his supposed sacrifice
      into a desperate, failed manipulation. The phaser’s role in the event is pivotal:
      it shifts the power dynamic from Krola’s ideological defiance to Durken’s disillusionment.'
    status_before_event: Confiscated by Dr. Berel, analyzed for evidence, and later
      gripped by Krola to stage his self-inflicted wound.
    status_after_event: Confirmed as a stun-only weapon, its evidence used to debunk
      Krola’s claims and solidify Durken’s resolve to move forward with Federation
      relations.
