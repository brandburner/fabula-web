  object_involvements:
  - object_uuid: ger_object_3dc35cf885c2
    description_of_involvement: Chairs from the Malcorian hospital corridor are seized
      by the mob as improvised weapons, symbolizing the sudden transformation of a
      sterile medical environment into a battleground. The chairs are swung violently
      against Riker, contributing to his severe injuries and the escalation of the
      mob's xenophobic rage. Their use underscores the improvised and chaotic nature
      of the attack, as well as the institutional setting's complicity in the violence.
    status_before_event: Part of the hospital's standard furniture, unremarkable and
