- fabula_uuid: act_257856f550ec8ed0
  number: 5
  summary: 'Act Five serves as the climax and resolution, bringing all conflicts to
    a head. Riker, heavily drugged and in immense pain, endures Krola''s interrogation.
    Simultaneously, Mirasta urgently pleads with Durken to release Riker, warning
    that he will die without the Enterprise''s advanced medical aid. Krola, determined
    to prevent Malcor III from joining the galactic community, orchestrates a desperate
    plan: he places Riker''s hand on the phaser and fires it at himself, intending
    to frame Riker for his ''murder'' and provoke a conflict between Malcor III and
    the Federation. However, Beverly Crusher, Worf, and a Starfleet nurse beam down,
    quickly assessing the situation. Beverly discovers Krola''s deception – the phaser
    was set to stun, not kill – exposing his manipulative plot to Durken. Both Riker
    and Krola are beamed to the Enterprise Sickbay for treatment. On the Enterprise,
    Durken confronts Krola, who, even after being exposed, continues to advocate against
    relations with the Federation. In a final meeting with Picard and Mirasta, Durken,
    torn between progress and tradition, makes the difficult decision that Malcor
    III is not yet ready for first contact. He delays the warp program and asks Picard
    to leave, prioritizing his people''s internal development. Mirasta, disillusioned
    by her world''s choice, requests to join the Enterprise, embarking on a new journey
    as the ship departs Malcor III, leaving the planet to its own pace of development
    and a future uncertain.'
