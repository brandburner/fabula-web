- fabula_uuid: cand_evt_scene_d75ca8b088220899_01
  global_id: null
  title: Picard reveals Federation surveillance to Mirasta
  description: |2

    Mirasta Yale, awestruck by her first experience aboard the *Enterprise*, shares her childhood dreams of space exploration with Picard and Troi. The moment of wonder quickly shifts as Picard and Troi disclose the Federation’s covert pre-contact surveillance—monitoring Malcorian broadcasts and deploying undercover observers like Riker. Mirasta’s initial enchantment fades as she grasps the ethical implications: while she understands the Federation’s need for intelligence, she warns that revealing this to Chancellor Durken would provoke backlash, particularly from xenophobic Minister Krola. The conversation pivots to Riker’s disappearance, and Mirasta urges secrecy to prevent a diplomatic crisis. Her growing unease marks the first crack in her idealized view of the Federation, foreshadowing her eventual disillusionment and the fragile state of Malcorian-Federation relations.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e15
  scene_sequence: 8
  sequence_in_scene: 14
  key_dialogue: &id007
  - 'PICARD: We try to learn as much as possible about a planet before first contact.
    One of the things we do is monitor broadcast signals... We listen to your journalism,
    your music, your humor... try to better understand you as a people...'
  - 'PICARD: We''ve found that the most hazardous aspect of this kind of mission is
    a lack of sufficient information... We''ve had people on your planet for several
    years.'
  - 'MIRASTA: Introducing you to this world will not be an easy matter... Some will
    not want it to change. Durken will be open-minded. But cautious. I strongly suggest
    that you do not discuss your surveillance teams with him... not right away at
    least. If you tell the Chancellor about Commander Riker, it would undermine everything
    you hope to accomplish here. Durken would assign Krola, the Minister of Security,
    to find him. Krola has his own political agenda. He will perceive you as the greatest
    threat my people have ever known. And he will not hesitate to use Riker to prove
    he is correct.'
