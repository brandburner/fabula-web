    - Sterile, clinical smells of a hospital room
    - Erratic beeping of the medical monitor, reflecting Riker’s weakened state
    - Sealed window, resisting Riker’s earlier escape attempt
    - Guarded hallway outside the door, patrolled by suspicious staff
    - Lamp in the corner, destroyed by the phaser to demonstrate its lethal capability
