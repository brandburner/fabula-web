  key_dialogue: &id025
  - |-
    DURKEN: I think you know a great deal more about me than I know about you.
    PICARD: In what respect?
    DURKEN: I can't know what motivates you... how you make decisions... what value you place on life... you speak of trust and peace and working together to enter a new era... at the same time you conduct secret surveillance... posing as Malcorians...
  - |-
    PICARD: Chancellor, no starship mission is more dangerous than first contact. We never know what we face when we open the door to a new world. How will we be greeted? What are the dangers? Centuries ago, a disastrous first contact with the Klingon Empire led to decades of war. It was decided then that we must do surveillance before making contact. It was a controversial decision. But I believe it prevents more problems than it creates.
    DURKEN: I appreciate the logic of your position, Captain. But it would seem a full disclosure after contact would have been in order.
    PICARD: In time, there would have been full disclosure. I know I can only ask you to believe that. On some worlds, it is not even an issue. But here, everything our observers reported suggested the people of this world would almost certainly react negatively to our arrival. We could see our surveillance might even be interpreted as an act of aggression.
    PICARD: I was hoping that we would find Commander Riker before you did... so the matter would not complicate our introduction. And it was a mistake.
    DURKEN: A mistake I might have made in your place.
    I rather like it actually.
    PICARD: Like it?
    DURKEN: That you make mistakes like any man.
  - |-
    KROLA: Revive him.
    BEREL: ((reluctant)) Those drugs increase cardial rate and vascular pressure... that's the last thing we want to do to him right now...
    MIRASTA: It will probably be enough to kill him... you can't do it...
    KROLA: Revive him.
    BEREL: I'm just a physician, Minister. I don't know much about affairs of state. But he is a living, intelligent being. I don't care if the Chancellor himself calls down here. I have sworn an oath to do no harm. And I will not.
