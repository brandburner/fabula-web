  - object_uuid: ger_object_d7106271729b
    description_of_involvement: "\n        Riker’s Malcorian civilian garb is the\
      \ outermost layer of his disguise, designed to blend him in with the local population.\
      \ While the garb itself is not explicitly removed, its purpose is undermined\
      \ as the doctors peel back his gloves and shoes, revealing the anatomical traits\
      \ beneath. The garb’s role is deceptive—it initially allows Riker to pass as\
      \ a Malcorian, but its failure to conceal his true physiology becomes the catalyst\
      \ for the diplomatic crisis. The garb’s presence before the event is a lie;\
      \ its exposure after is the truth.\n      "
    status_before_event: Worn by Riker, providing a superficial layer of Malcorian
