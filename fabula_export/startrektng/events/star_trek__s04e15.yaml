  title: Krola’s Martyrdom Scheme Exposed
  description: "\n  In the sterile calm of the *Enterprise*’s sickbay, Beverly Crusher\
    \ delivers the critical revelation that Krola’s staged attack was a calculated\
    \ deception—his phaser was set to stun, not kill. This exposes his true motive:\
    \ a self-sacrificial false flag designed to frame Riker as a destabilizing force\
    \ and force Malcor III into isolationist panic. Durken, now aware of Krola’s betrayal,\
    \ confronts him with quiet sorrow, revealing their long-standing friendship and\
    \ the depth of Krola’s ideological extremism. The exchange underscores the fragility\
    \ of Malcorian-Federation relations, as Krola’s refusal to back down—even in defeat—hints\
    \ at the enduring resistance Picard’s mission will face. The scene pivots from\
    \ medical urgency to political reckoning, with Crusher’s forensic analysis and\
    \ Durken’s personal confrontation laying bare the manipulation at the heart of\
    \ the crisis.\n  "
