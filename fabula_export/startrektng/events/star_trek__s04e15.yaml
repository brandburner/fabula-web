- fabula_uuid: cand_evt_scene_43438949578602bf_02
  global_id: null
  title: Berel suppresses Nilrem’s panic and locks down Riker
  description: 'After Nilrem’s outburst reveals his terror over Riker’s alien physiology—framing
    it as a potential Federation infiltration—Berel swiftly moves to contain the crisis.
    He silences Nilrem with a calmative order, confiscates Riker’s phaser for ‘technical
    analysis’ (effectively disarming him), and commands a full medical records search
    to verify Riker’s story. The real stakes emerge when Berel admits his fear of
    reputational damage: if word spreads that he’s treating ‘alien creatures,’ his
    already fragile professional standing will collapse. His solution is a draconian
    lockdown—cordoning off the medical wing, posting 24/7 security, and enforcing
    secrecy. The scene underscores Berel’s desperation to control the narrative, but
    his actions also deepen the institutional paranoia that will later fuel Krola’s
    manipulation. The phaser’s confiscation is particularly telling: it strips Riker
    of his only means of self-defense, leaving him vulnerable to both Malcorian xenophobia
    and Krola’s scheming. Berel’s decision to suppress Nilrem’s alarm—rather than
    address it transparently—sets the stage for the medical staff’s complicity in
    hiding the truth, which will later backfire when rumors spread uncontrollably.'
