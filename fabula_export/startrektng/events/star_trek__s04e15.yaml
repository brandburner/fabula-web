  title: Krola seizes control of Riker’s care
  description: 'The scene opens with Berel, the Malcorian physician who had been overseeing
    Riker’s treatment, receiving a call that strips him of his authority. He exits
    without protest, leaving Nilrem—now acting director under Krola’s orders—to take
    over. Krola immediately commands Nilrem to revive Riker, signaling a deliberate
    escalation in the political power struggle. As Mirasta, the Minister of Science,
    leaves in frustration, Nilrem prepares a syringe, and the scene cuts to Riker’s
    disoriented awakening. The drugs in his system leave him in agony, his consciousness
    trapped between pain and forced alertness. When he regains enough awareness to
    see Krola and Nilrem, Krola dismisses Nilrem and begins a calculated interrogation,
    revealing that he knows Riker’s true identity as an alien. Riker, weakened and
    desperate, pleads for his people to be brought in, but Krola delays, asserting
    control over the situation. This moment marks a critical power shift: Krola’s
    manipulation of Riker’s medical care and his direct interrogation underscore his
    growing influence over the Malcorian response to the Federation, while Riker’s
    vulnerability exposes the fragility of the diplomatic mission. The scene also
    highlights the moral decay of Malcorian leadership, as Krola exploits Riker’s
    suffering for political gain, further straining the already precarious alliance
    with the Federation.'
