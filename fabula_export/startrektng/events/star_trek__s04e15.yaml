  title: Berel confronts Riker with his lies
  description: 'Berel enters Riker’s hospital room and systematically dismantles his
    fabricated identity as ''Rivas Jakara,'' exposing inconsistencies in his backstory—no
    record of a physician named ''Crusher,'' a false address, and no corroboration
    of his claimed name. The tension escalates as Berel directly accuses Riker of
    being an alien, framing the confrontation as a warning: the rumors spreading beyond
    the room could turn deadly. Riker deflects with feigned incredulity, but Berel’s
    measured persistence—rooted in professional duty and growing suspicion—undermines
    Riker’s cover. The exchange reveals Berel’s role as a reluctant truth-seeker,
    torn between his medical ethics and the political storm brewing around Riker’s
    presence. The moment marks a critical escalation, forcing Riker to confront the
    fragility of his deception and the real danger of exposure in a xenophobic society.
    Berel’s exit leaves Riker visibly unsettled, signaling the impending collapse
    of his alias and the looming crisis for Federation-Malcorian relations.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e15
  scene_sequence: 10
  sequence_in_scene: 18
  key_dialogue:
  - 'BEREL: Mister Jakara, we have been unable to confirm anything you told us. No
    physician named Crusher is on file... not on this planet... Your address in Marta
    is an eating establishment... the cook has never heard of Rivas Jakara.'
  - 'BEREL: There''s a growing number of people on the other side of that door who
    believe you are not one of us. That you''re from another planet.'
  - 'RIKER: ((laughs)) Do you realize what you''re saying?'
  - 'BEREL: I know how it sounds. And I am not anxious to make a fool of myself. Mister
    Jakara, this new era of space flight, it does fire the imagination. People see
    unidentified vessels in the sky that turn out to be weather balloons.'
  - 'BEREL: Unless you tell me the truth about yourself, this rumor will persist and
    grow and could even become dangerous. Most especially to you.'
