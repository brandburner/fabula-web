  title: Krola’s Martyrdom Scheme Exposed
  description: "\n  In a tense confrontation aboard *Enterprise*’s sickbay, Chancellor\
    \ Durken—now aware of Krola’s betrayal—visits his wounded Minister of Security,\
    \ who lies recovering from a staged attack. Beverly Crusher reveals the phaser\
    \ was set to stun, exposing Krola’s attempt to frame Riker as a violent alien\
    \ threat. Durken, holding Krola’s hand, listens as the xenophobic ideologue pleads\
    \ with him to abandon Federation relations, even in defeat. The exchange underscores\
    \ Krola’s unyielding resistance and the fragility of Malcorian unity, as Durken’s\
    \ silence signals his growing disillusionment with the alliance. The scene reveals\
    \ the depth of Malcorian political divisions and the ideological stakes of Picard’s\
    \ mission.\n  "
