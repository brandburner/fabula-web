  title: Riker’s Physiology Exposes His Cover
  description: During an emergency medical examination, Malcorian doctors Nilrem and
    Tava discover Commander Riker’s non-Malcorian physiology while treating his injuries.
    Nilrem’s stethoscope fails to locate a cardial organ in the expected location,
    prompting Tava to probe Riker’s torso and reveal missing costal struts. When Nilrem
    removes Riker’s shoes and gloves, the doctors are horrified to find prehensile
    digits on his feet and fingers on his hands—traits no Malcorian possesses. Their
    growing alarm escalates as they realize Riker is an offworlder, a revelation that
    threatens to derail Picard’s first-contact mission by shattering Malcorian trust
    in Starfleet’s transparency. The discovery forces Nilrem and Tava into a crisis
    of professional duty and xenophobic fear, setting the stage for a diplomatic meltdown.
    The scene ends with Riker’s unconscious face revealed, confirming his disguise
    has collapsed entirely.
