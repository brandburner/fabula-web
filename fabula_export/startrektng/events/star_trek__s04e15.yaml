    - Sterile medical lighting casting sharp shadows across the room
    - The hum of medical monitors providing a tense backdrop to the confrontation
    - The faint glow of the transporter beam as it materializes, cutting through the
      sterile environment
    - The stunned expressions of Tava and Nilrem, their bodies frozen in shock
