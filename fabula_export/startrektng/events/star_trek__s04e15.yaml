- fabula_uuid: cand_evt_scene_7eeec98ccd3c4c3e_01
  global_id: null
  title: Durken rejects Federation contact
  description: 'In the Enterprise’s ready room, Chancellor Durken formally terminates
    first contact with the Federation after Riker’s covert presence triggers political
    instability on Malcor III. Despite acknowledging the inevitability of interstellar
    interaction, Durken cites his people’s unpreparedness—exemplified by Krola’s xenophobic
    extremism—as justification for delaying warp development and isolating Malcor
    from galactic engagement. The decision fractures the burgeoning alliance, forcing
    Picard to withdraw while Mirasta Yale, disillusioned by her world’s retreat, defects
    to the Enterprise. Durken’s resignation underscores the fragility of diplomacy
    when cultural divisions outweigh shared progress, while Picard’s reluctant compliance
    highlights the Federation’s respect for sovereign choice. The exchange reveals
    Durken’s pragmatic idealism: he prioritizes Malcor’s internal cohesion over premature
    integration, even as he acknowledges the cost of self-imposed isolation. Mirasta’s
    defection marks the first tangible consequence of this rejection, signaling the
    collapse of diplomatic trust and the beginning of a new, uncertain chapter for
    both worlds.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e15
  scene_sequence: 26
  sequence_in_scene: 46
  key_dialogue:
  - 'DURKEN: But my people are not ready to accept what you represent. Everything
    that happened at the hospital proves it. Krola is the best evidence of all. We
    must slow down and allow all those like him to join us in the present before we
    move into the future.'
  - 'DURKEN: We are a good people, Captain. A society with much potential. Once we
    cross this threshold of space, we will have to give up the self-importance, the
    conceit that we are the center of the universe. But this is not the time. For
    now, it is better that we continue to enjoy that sweet innocence.'
  - 'MIRASTA: Captain, I have one last request... take me with you.'
