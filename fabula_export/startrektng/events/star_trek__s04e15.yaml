      out there’) and implied in Riker’s body language (his hesitation, his glance
      toward the door). The hallway serves as a barrier to freedom, its narrow confines
      and vigilant guards symbolizing the regime’s xenophobia. Riker’s inability to
      escape without Lanel’s help underscores the hallway’s role as an extension of
      the hospital’s (and Malcor’s) oppressive surveillance.
