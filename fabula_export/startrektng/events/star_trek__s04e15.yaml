- fabula_uuid: cand_evt_scene_3c023653117e3fe9_01
  global_id: null
  title: Riker’s Failed Escape and Mob Violence
  description: "\n  Nurse Lanel stages a diversion to help Riker escape the medical\
    \ facility, but their brief moment of freedom is cut short when Nilrem and other\
    \ physicians spot him in the corridor. Nilrem’s shout of 'Stop him! The alien’s\
    \ escaping!' triggers a violent mob reaction, with Malcorians armed with chairs\
    \ and bottles screaming for Riker’s capture or death. Riker fights back, knocking\
    \ Nilrem down, but the mob overwhelms him, reopening his injuries. Berel and Tava\
    \ intervene just in time, halting the violence and ordering Riker’s immediate\
    \ medical attention. The scene escalates the diplomatic crisis, exposing the deep-seated\
    \ xenophobia of Malcorian society and the fragility of Riker’s cover. Meanwhile,\
    \ Krola watches from a window, holding the phaser used in his staged attack, signaling\
    \ his continued manipulation of the situation. The event underscores the tension\
    \ between Riker’s personal survival and the broader mission, as well as the moral\
    \ cost of his deception.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e15
