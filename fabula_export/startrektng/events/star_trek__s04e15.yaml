    global_id: ger_organization_2771dbbbf561
  - organization_uuid: ger_organization_b099f7272fcc
    description_of_involvement: Malcorian Society’s general population spreads rumors
      of alien presence, fueled by xenophobic instincts. This civilian backlash endangers
      outsiders like Riker, as whispers escape the hospital and invite violent backlash.
      The mob’s formation and attack reflect the society’s collective fear, positioning
      it as an antagonist force that undermines first-contact efforts through prejudice
      and mob violence.
    active_representation: Through the actions of the mob and the spread of xenophobic
      rumors within the facility.
    power_dynamics: Undermining the medical staff’s authority and exacerbating the
