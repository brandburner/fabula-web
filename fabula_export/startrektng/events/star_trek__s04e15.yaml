  key_dialogue:
  - 'DURKEN: The warp program will have to be delayed... we will divert more resources
    into education and social development to prepare for the day when we are ready.'
  - 'MIRASTA: Chancellor, I strongly disagree.'
  - 'MIRASTA: Captain, I have one last request... take me with you.'
  - 'PICARD: We may not be back in your lifetime. And I have to believe that you are
    not fully prepared for the risks of space, Mirasta...'
  - 'MIRASTA: I have been prepared for the risks of space since I was nine years old
    sitting in a planetarium.'
