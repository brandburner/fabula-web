- fabula_uuid: cand_evt_scene_c65b699f33fdc568_02
  global_id: null
  title: Riker’s physiology betrays his disguise
  description: 'In a high-stakes medical emergency, Malcorian doctors Nilrem and Tava
    examine an unconscious Riker—disguised as a Malcorian civilian—after he’s injured
    in a riot. As they prepare to treat him, their routine scans reveal glaring anatomical
    anomalies: his heart is positioned in his chest (not his abdomen), his rib structure
    is asymmetrical, and his hands possess prehensile digits, all traits impossible
    for a native Malcorian. The doctors’ professional detachment shatters into alarm
    as they peel back his gloves to confirm his alien physiology. This irreversible
    exposure of Riker’s true form—captured in a lingering reveal of his disguised
    face—marks the moment his cover collapses, triggering a diplomatic crisis that
    threatens Picard’s first-contact mission before it can begin. The scene hinges
    on the tension between medical urgency and escalating xenophobic dread, with Nilrem
    and Tava’s reactions foreshadowing the Malcorian public’s violent response to
    offworlders.'
