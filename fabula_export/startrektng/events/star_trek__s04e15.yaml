- fabula_uuid: act_3dbcef6485b7f9fb
  number: 4
  summary: Act Four plunges the narrative into the direct political fallout of Riker's
    capture and the Federation's surveillance. Riker undergoes surgery, his alien
    physiology baffling the Malcorian doctors, while Krola, Minister of Security,
    observes, holding Riker's phaser. In Durken's office, Krola dramatically reveals
    that Malcorian forces have captured one of the Federation's 'spies,' Commander
    Riker, exposing the long-term surveillance. Durken is furious with Mirasta for
    withholding this crucial information and, under Krola's influence, orders her
    to keep silent. Krola, driven by xenophobia and a desire to protect traditional
    Malcorian ways, insists on interrogating Riker immediately, despite his critical
    condition. Dr. Berel, a man of integrity, refuses to administer dangerous drugs
    to revive Riker, citing his medical oath to do no harm, leading to his immediate
    dismissal by Krola. Picard then confronts Durken, acknowledging the Federation's
    mistake in conducting covert surveillance and explaining the historical reasons
    behind the Prime Directive. Durken appreciates Picard's honesty but remains cautious,
    not immediately agreeing to release Riker. The act concludes with Nilrem, now
    acting director, preparing to administer the dangerous drugs to Riker at Krola's
    command, pushing Riker closer to death and the relationship between the Federation
    and Malcor III to a breaking point.
