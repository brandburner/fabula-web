  title: Mob Violence Forces Riker’s Re-Injury
  description: "\n  After Lanel’s diversion allows Riker a brief escape from his hospital\
    \ room, his presence in the corridor is immediately detected by Nilrem and a passing\
    \ physician, who raise the alarm. The revelation of his alien identity triggers\
    \ a xenophobic frenzy among the medical staff and bystanders, who quickly form\
    \ a violent mob. Riker fights back, downing Nilrem with a punch, but is overwhelmed\
    \ by the sheer number of attackers, who pummel him with improvised weapons and\
    \ fists. The mob’s violence escalates to a near-fatal level before Berel and Tava\
    \ intervene, their authoritative voices cutting through the chaos. Berel’s intervention\
    \ halts the attack, but not before Riker’s injuries—particularly to his telencephalin—are\
    \ severely aggravated, necessitating emergency surgery. The scene underscores\
    \ the fragility of Riker’s cover, the deep-seated xenophobia within Malcorian\
    \ society, and the escalating diplomatic crisis as Krola watches the chaos unfold\
    \ from the shadows, phaser in hand, his intentions increasingly sinister. The\
    \ mob’s actions force the crew to confront the immediate threat to Riker’s life\
    \ while exposing the fractures in Malcorian unity, setting the stage for further\
    \ conflict and the potential collapse of first contact efforts.\n  "
