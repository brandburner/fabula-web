  title: Picard authorizes emergency medical evacuation
  description: "\n  In Durken’s office, Picard receives an urgent comlink from Beverly\
    \ Crusher, who reports Riker’s critical condition—near death but with residual\
    \ brain activity—and Krola’s phaser wound. The news forces Picard to make a high-stakes\
    \ decision under diplomatic pressure. His tacit approval of Beverly’s request\
    \ to transport both Riker and Krola to the *Enterprise* for treatment reflects\
    \ his prioritization of lives over political protocol, despite the risks. The\
    \ exchange is terse but charged: Picard’s silence speaks volumes, signaling his\
    \ trust in Beverly’s judgment while acknowledging the fragility of the Malcorian-Federation\
    \ alliance. The decision creates a precarious window where Riker’s compromised\
    \ cover could be exposed, further jeopardizing the fragile first-contact negotiations.\
    \ Durken and Mirasta react visibly, their expressions betraying the tension between\
    \ medical urgency and the potential diplomatic fallout. The moment underscores\
    \ Picard’s leadership—balancing humanity and duty—but also sets up a potential\
    \ crisis if Krola’s wound or Riker’s condition reveal Federation involvement before\
    \ the Malcorians are ready to accept it.\n  "
