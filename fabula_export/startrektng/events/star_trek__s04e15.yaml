      through the actions of Nilrem, Tava, and Berel, as well as the broader medical
      staff who participate in the mob's violent assault. The establishment's protocols—such
      as diagnostic scans, identity verification, and emergency procedures—expose
      Riker's alien traits, triggering the xenophobic backlash. Berel's attempt to
      maintain order and confidentiality reflects the establishment's struggle to
      balance professional duty with institutional pressures. The event highlights
      the establishment's role in both treating Riker and, inadvertently, enabling
      the mob's violence, as well as the ethical dilemmas faced by its members.
    active_representation: Through the actions of medical staff (Nilrem, Tava, Berel)
      and the collective behavior of the mob, as well as institutional protocols that
      expose Riker's identity.
