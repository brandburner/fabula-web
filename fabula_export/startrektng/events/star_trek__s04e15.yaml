  global_id: null
  title: Riker’s Cover Story Unravels Under Scrutiny
  description: |2

    Riker, disoriented and injured, awakens in a Malcorian medical facility under the watchful eyes of doctors Berel, Nilrem, and Tava. His fabricated identity as 'Rivas Jakara' begins to crumble as Berel—suspicious from the start—presses him with probing questions about his 'genetic defects' and lack of family. Riker’s carefully constructed lies (cosmetic surgery to explain cranial implants, a sabbatical for his 'personal physician' Beverly Crusher) are exposed as inconsistent when Berel produces a phaser found in his clothes. Riker’s desperate claim that the weapon belongs to a 'neighbor’s child' contradicts his earlier assertion of having no family, forcing him into a corner. The exchange reveals Berel’s growing skepticism and Riker’s escalating desperation, threatening to dismantle his entire deception and jeopardize the fragile Malcorian alliance. The moment marks a critical turning point: Riker’s cover is no longer tenable, and the diplomatic crisis hinges on whether his identity can be concealed long enough for Picard to secure first contact.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e15
  scene_sequence: 2
  sequence_in_scene: 4
  key_dialogue:
  - |-
    BEREL: You're in the crisis room at the Sikla Medical Facility. You've had a severe injury, but you're going to be all right.
    RIKER: I was caught in the riot when the police moved in... that's the last thing I remember.
  - |-
    BEREL: Can you tell us your name?
    RIKER: Rivas. Rivas Jakara.
    BEREL: Rivas Jakara. Where do you live?
    RIKER: In the Marta community on the southern continent...
  - |-
    BEREL: There are several... unusual things about your case, Mister Jakara... your cranial lobes, for example. They seem to be surgical implants.
    RIKER: I did have some cosmetic surgery... to correct a genetic birth defect.
    NILREM: You want us to believe that all your abnormalities are inherited genetic traits?
  - |-
    BEREL: Oh, there was one other thing... (he pulls a phaser out of his pocket) We found this curious looking device in your clothes... what is it?
    RIKER: Oh, it's just a toy I was taking home... a present.
    BEREL: I thought you didn't have any family.
    RIKER: For a neighbor's child.
