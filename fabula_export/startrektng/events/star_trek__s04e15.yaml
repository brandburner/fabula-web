- fabula_uuid: act_e07aa53d1ee849fb
  number: 2
  summary: Act Two intensifies the contrast between the Federation's diplomatic efforts
    and the escalating crisis on Malcor III. Mirasta Yale, now aboard the Enterprise,
    expresses profound wonder at the advanced technology and the vastness of space.
    Picard and Troi explain the Federation's long-standing observation of Malcor III,
    including covert surface reconnaissance, which Mirasta initially accepts but then
    realizes its potential for negative interpretation by her people. Picard then
    reveals Commander Riker's disappearance and his disguised identity, asking Mirasta
    for assistance. Mirasta, understanding the political ramifications, strongly advises
    Picard against informing Chancellor Durken about Riker or the surveillance, fearing
    Krola, the Minister of Security, would exploit the information for his own agenda.
    Simultaneously, back on Malcor III, the rumor of an alien in the medical facility
    spreads like wildfire among the staff, leading to widespread fear and speculation,
    despite Berel's attempts to contain it. Berel confronts Riker directly, revealing
    they know he is not Malcorian and warning him of the dangers of his exposure.
    The act culminates with Mirasta bringing Picard to meet Chancellor Durken, setting
    the stage for the crucial diplomatic encounter while Riker's situation grows increasingly
    precarious and the threat of xenophobia looms large.
