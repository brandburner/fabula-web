    what_happened: Krola orchestrates the entire event with cold precision, exploiting
      Riker’s weakened state to stage his own death as a Federation assassination.
      He begins by dismantling Riker’s credibility, demonstrating the phaser’s lethality
      by destroying a lamp—a symbolic act mirroring the destruction of Malcorian trust.
      His calm demeanor masks ruthless pragmatism as he forces Riker’s finger onto
