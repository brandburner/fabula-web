  title: Krola stages his own assassination
  description: 'In a calculated act of political sabotage, Krola manipulates the weakened
    Riker into firing a phaser at him, staging his own death to frame the Federation
    as aggressors. After dismantling Riker’s credibility through psychological pressure,
    Krola reveals his true intent: to force Chancellor Durken into rejecting first
    contact by making the Federation appear violent. He places the phaser in Riker’s
    hand, aims it at himself, and fires, collapsing dramatically. The act is a deliberate
    gambit to shatter the Malcorian-Federation alliance, ensuring his xenophobic agenda
    prevails. The scene escalates the diplomatic crisis, turning Riker from a spy
    into a scapegoat and Krola from a security minister into a martyr for isolationism.
    The staged assassination serves as the catalyst for the Federation’s expulsion
    from Malcorian space, fulfilling Krola’s long-term goal of preserving his people’s
    insularity at any cost.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e15
  scene_sequence: 21
  sequence_in_scene: 38
  key_dialogue:
  - 'KROLA: You have lied since the moment of your capture... and I believe you are
    lying now, Commander.'
  - 'KROLA: Why do peaceful people develop such lethal weapons? Or do you still insist
    it is a toy?'
  - 'KROLA: When they find us, I will be dead, killed by your weapon. The lines will
    be drawn. A peaceful accord will no longer be an option.'
  - 'RIKER: No...'
  - 'KROLA: For my people.'
