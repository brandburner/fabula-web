  title: Krola forces Riker to fire phaser
  description: Krola, exploiting Riker’s deteriorating physical and psychological
    state, weaponizes the phaser to dismantle Federation credibility and sabotage
    first contact. He systematically dismantles Riker’s credibility by exposing the
    hypocrisy of the Federation’s ‘peaceful’ claims, framing Riker as a liar and the
    Federation as a threat. The confrontation escalates when Krola places the phaser
    in Riker’s hand, forces his finger to fire, and stages his own death as a Federation
    assassination. This calculated move is designed to shatter Malcorian trust in
    the Federation and derail diplomatic negotiations, ensuring Durken’s isolationist
    stance prevails. The scene underscores Krola’s ruthless pragmatism and his willingness
    to sacrifice himself to maintain Malcorian sovereignty, while Riker’s helplessness
    highlights the Federation’s vulnerability in this high-stakes diplomatic crisis.
