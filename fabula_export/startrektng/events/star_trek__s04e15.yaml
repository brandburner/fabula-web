- fabula_uuid: act_90d2c7e783a8848a
  number: 3
  summary: Act Three focuses on the direct diplomatic exchange between Picard and
    Durken, juxtaposed with Riker's desperate attempt to escape. Picard beams Durken
    to the Enterprise, providing a firsthand tour of the ship's advanced technology,
    including the warp drive and the bridge, where Durken meets Data, an artificial
    lifeform. Durken maintains a cautious demeanor, questioning the Federation's intentions
    and potential for conquest, but Picard reassures him of their peaceful exploration
    and adherence to the Prime Directive. In a more intimate setting, Picard and Durken
    share a drink, beginning to build a foundation of trust, with Durken acknowledging
    the profound shift in his worldview and the implications for Malcorian society.
    Meanwhile, Riker, still recovering from his injuries in the Malcorian hospital,
    plots his escape. Nurse Lanel, fascinated by the 'alien,' offers to help him,
    leading to an awkward but successful diversion of the guard. However, Riker's
    escape is short-lived as he is quickly spotted by Nilrem and other medical personnel.
    A fearful mob forms, overwhelming and severely re-injuring Riker. Dr. Berel and
    Tava intervene to stop the violence, but Riker is left in critical condition,
    prompting the decision to call Central Security, further escalating the crisis
    and confirming Mirasta's earlier warnings.
