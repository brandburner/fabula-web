  title: Riker’s Cover Collapses Under Medical Scrutiny
  description: Riker, recovering from riot injuries in a Malcorian hospital, wakes
    to find doctors Berel, Nilrem, and Tava examining him with growing suspicion.
    His fabricated identity as 'Rivas Jakara' unravels under Berel’s probing questions
    about his 'genetic defects'—his cranial implants and finger structure—while Riker’s
    inconsistent stories (claiming no family yet carrying a child’s toy phaser) expose
    his deception. The moment Berel produces the phaser, Riker’s facade shatters;
    he panics, attempts to flee, but crippling pain forces him back into bed, physically
    and narratively cornered. The scene underscores the fragility of his mission,
    the Malcorian medical system’s xenophobic paranoia, and the ticking clock for
    Picard’s diplomacy, now hinging on Riker’s compromised presence. The doctors’
    departure leaves Riker isolated, his cover blown, and the stakes of his exposure
    crystallized.
