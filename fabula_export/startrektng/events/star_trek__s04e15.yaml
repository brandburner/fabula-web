- fabula_uuid: cand_evt_scene_79e20034d31cb8d2_01
  global_id: null
  title: Berel confronts Tava over medical hysteria
  description: Berel enters the medical facility corridor to find staff whispering
    about the alien patient—rumors of invasion, supernatural abilities, and hidden
    motives have spread uncontrollably. The hushed conversations stop abruptly as
    he passes, revealing the depth of paranoia gripping the facility. Berel confronts
    Tava, his colleague, about the breach of confidentiality, but she dismisses his
    concerns, noting Nilrem’s inability to keep secrets. Berel insists on professionalism,
    reminding Tava that the patient—regardless of origin—remains under their care.
    Tava warns that fear could spiral into violence, forcing Berel to acknowledge
    the fragility of the situation. The exchange underscores the tension between institutional
    duty and escalating xenophobia, with Berel’s authority tested as the rumors threaten
    to destabilize the facility and jeopardize Riker’s safety. The moment serves as
    a microcosm of the broader diplomatic crisis, where fear and misinformation risk
    derailing first contact before it can begin.
