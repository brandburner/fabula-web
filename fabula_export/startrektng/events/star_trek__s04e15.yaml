acts:
- fabula_uuid: act_d11e939c01f818ae
  number: 1
  summary: Act One establishes the immediate crisis and the initial attempt at first
    contact. The narrative opens with Commander Riker, disguised as a Malcorian, being
    rushed into an alien medical facility after sustaining injuries in a riot. Malcorian
    doctors, Nilrem and Tava, are immediately perplexed by his non-Malcorian physiology,
    discovering his fingers and unusual internal organ placement, leading to suspicion
    and fear. Riker attempts to maintain his cover as 'Rivas Jakara,' but Dr. Berel,
    the senior physician, quickly sees through his fabricated story, especially after
    finding Riker's phaser. The medical staff's growing alarm foreshadows widespread
    xenophobia. Concurrently, Captain Picard and Counselor Troi initiate official
    first contact with Mirasta Yale, Malcor III's Minister of Science, in her laboratory.
    Picard reveals the Federation's existence and purpose, then demonstrates their
    advanced technology by beaming Mirasta aboard the Enterprise. This moment marks
    a stark contrast between the covert, problematic presence of Riker on the surface
    and the overt, hopeful introduction of the Federation to a key Malcorian leader,
    setting up the central conflict between secrecy and transparency. The act ends
    with Mirasta's awe, but also the growing peril of Riker's exposure, as the Malcorian
    medical community becomes increasingly aware of an alien presence.
