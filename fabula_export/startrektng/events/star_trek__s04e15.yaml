- fabula_uuid: cand_evt_scene_43ecd4613c1153f0_01
  global_id: null
  title: Riker’s Cover Identity Unravels
  description: "\n  In a Malcorian medical facility, Commander Riker—disoriented and\
    \ injured—awakens under the scrutiny of Dr. Berel, Nilrem, and Tava. His fabricated\
    \ alias 'Rivas Jakara' is immediately met with skepticism as the doctors probe\
    \ his 'genetic defects,' which they recognize as unnatural. Riker’s evasive responses\
    \ (claiming a 'personal physician' named Crusher and a 'sabbatical,' then contradicting\
    \ himself about family) deepen their distrust. The breaking point comes when Berel\
    \ produces Riker’s phaser, exposing his lie about having no family. The confrontation\
    \ forces Riker to abandon his pretense, realizing his cover is collapsing. The\
    \ scene escalates the diplomatic crisis, as his deception risks derailing first-contact\
    \ negotiations before they begin, while also revealing the Malcorians’ growing\
    \ xenophobia and Berel’s sharp investigative instincts.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e15
  scene_sequence: 2
  sequence_in_scene: 3
  key_dialogue:
  - 'BEREL: There are several... unusual things about your case, Mister Jakara...
    your cranial lobes, for example. They seem to be surgical implants...'
  - 'RIKER: I did have some cosmetic surgery... to correct a genetic birth defect...'
  - 'BEREL: And these? Another birth defect?'
  - 'RIKER: Yes, isn''t that something? My father''s were the same way...'
  - 'NILREM: You want us to believe that all your abnormalities are inherited genetic
    traits?'
  - 'BEREL: Oh, there was one other thing... (he pulls a phaser out of his pocket)
    We found this curious looking device in your clothes... what is it?'
  - 'RIKER: For a neighbor''s child.'
  - 'BEREL: I thought you didn''t have any family...'
