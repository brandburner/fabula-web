    organizational_goals:
    - Restore order and contain the crisis, potentially at the expense of Riker’s
      safety.
    - Enforce institutional protocols and security measures to prevent further alien
      infiltration.
    influence_mechanisms:
    - The threat of intervention to restore order, which could lead to Riker’s detention
      or worse.
    - Institutional protocols that prioritize security over patient care in cases
      of perceived alien threats.
    institutional_impact: The invocation of Central Security signals the escalation
