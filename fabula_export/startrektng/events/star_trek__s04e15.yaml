  - 'MIRASTA: This is their warp drive, Chancellor. Do you believe it...? Our theories
    were correct...'
  - 'DURKEN: I can only imagine the sort of armaments your vessel carries, Captain
    Picard.'
  - 'PICARD: This vessel also carries families and children, Chancellor. It is not
    a warship. The Federation is dedicated to the peaceful exploration of space.'
  - 'DURKEN: And do you expect all the worlds you contact to become members of your
    federation?'
  - 'PICARD: Not at all, Chancellor. Some desire membership. Some do not. And in some
    cases the philosophical differences are so great, it is not even a consideration...'
