- fabula_uuid: cand_evt_scene_fe89bd100643d81c_01
  global_id: null
  title: Lanel’s grotesque bargain for Riker’s escape
  description: 'Riker, disoriented but determined, attempts to escape his Malcorian
    hospital room by breaking a sealed window. Before he can act, Nurse Lanel enters
    and—contrary to expectations—doesn’t raise the alarm. Instead, she reveals her
    fascination with his alien identity, which she’s deduced despite his denials.
    When Riker presses her for help, she weaponizes his desperation, demanding intimacy
    in exchange for creating a diversion. The exchange escalates from tentative curiosity
    to a grotesque power dynamic, exposing Riker’s vulnerability and the moral cost
    of his mission. Lanel’s proposition forces him into a paralyzing dilemma: submit
    to her demand or risk capture, with the clock ticking on the fragile first contact
    negotiations. The scene underscores the fragility of Riker’s cover and the ethical
    compromises demanded by his role as an undercover observer. His hesitation becomes
    a ticking clock for the diplomatic crisis unfolding beyond the hospital walls.'
