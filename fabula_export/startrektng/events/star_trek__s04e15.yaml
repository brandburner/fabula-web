  global_id: null
  title: Berel suppresses Nilrem’s panic over Riker’s alien identity
  description: 'After Nilrem’s outburst about Riker’s non-Malcorian physiology—exposing
    him as an alien—Berel swiftly moves to contain the crisis. He shuts down Nilrem’s
    escalating paranoia (ordering a sedative and dismissing his wild theories about
    "space creatures") while simultaneously tightening security around Riker’s room
    and confiscating his phaser for "technical analysis." Berel’s actions reveal his
    dual priorities: protecting his professional reputation (already under scrutiny)
