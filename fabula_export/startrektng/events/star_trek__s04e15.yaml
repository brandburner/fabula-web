  - object_uuid: ger_object_c433ed48b4f8
    description_of_involvement: Bottles are grabbed by the mob and used as weapons
      alongside chairs, adding to the improvised arsenal of the attack. Their smashing
      and swinging against Riker contribute to the frenzied and dangerous nature of
      the assault, reflecting the mob's loss of control and the escalation of their
      xenophobic violence. The bottles serve as a stark reminder of how ordinary objects
      can be repurposed for harm in moments of collective fear and hysteria.
    status_before_event: Part of the hospital's supplies, likely stored in nearby
