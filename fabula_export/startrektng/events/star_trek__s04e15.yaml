  - object_uuid: ger_object_5483ca90ade2
    description_of_involvement: Riker’s phaser is the central prop in Krola’s staged
      assassination. Initially pulled out by Krola to dismantle Riker’s claims of
      peaceful intent, the phaser is demonstrated as a lethal weapon when Krola uses
      it to destroy a lamp in the room. Krola then places the phaser in Riker’s limp
      hand, aims it at himself, and fires, collapsing dramatically to simulate a fatal
      wound. The phaser serves as both the physical tool for the staged assassination
      and the symbolic weapon that frames the Federation as violent aggressors, irreparably
      damaging the potential for first contact.
