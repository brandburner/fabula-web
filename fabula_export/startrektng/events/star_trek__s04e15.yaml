  title: Mirasta probes Data about Riker
  description: "\n  Mirasta Yale, under the guise of polite conversation with Data,\
    \ subtly interrogates him about Commander Riker’s whereabouts, revealing her foreknowledge\
    \ of Starfleet’s covert surveillance operations on Malcor III. The exchange occurs\
    \ as Data escorts her to the transporter room after Picard and Durken retreat\
    \ to the ready room for a private discussion. Mirasta’s inquiry—framed as casual\
    \ concern—exposes her dual role as both a diplomatic observer and a potential\
    \ adversary, as she already knows Riker was deployed undercover. Data’s clinical\
    \ response confirms Riker’s absence, escalating tension by underscoring the Federation’s\
    \ compromised first-contact protocol before formal negotiations even begin. The\
    \ moment highlights Mirasta’s strategic intelligence and the fragility of Starfleet’s\
    \ covert operations, setting up future conflict as her knowledge could destabilize\
    \ Malcorian-Federation relations.\n  "
