    and sabotage first contact—escalates the diplomatic crisis, forcing Starfleet
    to confront the fallout of Riker’s covert role and the Malcorians’ demand for
    justice. The event serves as a turning point, shifting the narrative from fragile
    diplomacy to outright conflict, with Krola’s death becoming the catalyst for a
    deeper rift between the Federation and Malcor III.
