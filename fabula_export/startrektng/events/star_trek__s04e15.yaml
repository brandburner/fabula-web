      reach of the medical staff. Their potency is noted but not yet a point of conflict.
    status_after_event: Untouched but now a symbol of the standoff between Krola’s
      authority and Berel’s ethics. Their presence lingers as a reminder of the unethical
      lengths to which Krola is willing to go.
