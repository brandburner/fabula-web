  title: Yale forces Durken to confront Picard
  description: "\n  Chancellor Durken is midway through a routine bureaucratic session,\
    \ reviewing documents and scheduling meetings, when Mirasta Yale interrupts with\
    \ an unannounced guest—Captain Picard. Durken’s initial resistance (attempting\
    \ to defer to a vice-chancellor) is overridden by Yale’s insistence, signaling\
    \ the urgency of the situation. His polite but dismissive tone ('Always time to\
    \ meet your friends') masks his irritation at the disruption, but Yale’s warning\
    \ to clear his schedule immediately shifts the dynamic. The scene hinges on Durken’s\
    \ reluctant acknowledgment of Picard’s presence, a moment that forces him to abandon\
    \ administrative trivialities and engage with the high-stakes diplomatic crisis\
    \ unfolding around Riker’s exposure. Yale’s authority here—backed by Picard’s\
    \ silent but commanding presence—underscores the political weight of the Federation’s\
    \ arrival and the inevitability of Durken’s involvement in the fallout. The fade-out\
    \ leaves the tension unresolved, emphasizing that this is not a social call but\
    \ a turning point in Malcorian-Federation relations.\n  "
