  - character_uuid: ger_agent_c8c702f8a0af
    emotional_state: Concerned but restrained, caught between her duty to patients
      and her loyalty to the medical establishment. Her question to Berel reveals
      a flicker of doubt about the ethics of the lockdown, but she lacks the authority—or
      perhaps the courage—to push back further. There’s a quiet resignation in her
      demeanor, as if she’s already accepted that the institution’s priorities will
      override individual welfare.
    goals:
    - To understand Berel’s plan and ensure it doesn’t harm Riker or the medical staff’s
      ethical standing.
    - To subtly advocate for transparency, even if only through a single question,
      as a counterbalance to Nilrem’s fear and Berel’s secrecy.
    what_happened: Tava stands slightly apart from the group, her posture tense but
      controlled as she listens to Nilrem’s outburst and Berel’s orders. She interjects
      only once—asking Berel, ‘What are you going to do?’—her tone laced with concern
      but not confrontation. While she doesn’t oppose Berel’s actions, her question
      hangs in the air as a quiet challenge to the escalating secrecy. Physically,
      she is the still point in the storm, her medical training keeping her grounded
      even as the situation spirals.
