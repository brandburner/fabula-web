    Riker to dismantle Mirasta’s credibility and force Durken into a hardline stance
    against the Federation. After revealing Riker’s presence as a spy—exposing Mirasta’s
    prior knowledge and the Federation’s covert surveillance—Krola demands Riker’s
    interrogation, overriding Berel’s medical objections. Meanwhile, Picard arrives
    to negotiate Riker’s release, admitting the Federation’s mistake but failing to
    secure his freedom. The scene fractures Malcorian trust in the Federation, with
    Durken’s silence and alignment with Krola marking a decisive shift in leadership.
    The tension escalates as Krola’s ruthlessness clashes with Berel’s ethics, and
    Mirasta’s disillusionment deepens, foreshadowing her eventual departure with the
    Enterprise. The event serves as a turning point, where diplomatic progress collapses
    under political manipulation and fear, leaving Riker’s fate—and Malcor’s future—uncertain.
