  - object_uuid: ger_object_3fc234410b04
    description_of_involvement: The cardiac rate and vascular pressure stimulants
      sit poised on a tray in Riker’s hospital room, their presence a tangible representation
      of Krola’s ruthlessness. These drugs are not merely medical tools but weapons
      in his interrogation strategy, designed to force Riker’s premature revival at
      the risk of fatal complications. Berel’s refusal to administer them becomes
      a moral battleground, with the drugs serving as a catalyst for his defiance.
      Their potency and danger highlight the extreme measures Krola is willing to
      take, while also underscoring the fragility of Riker’s condition and the ethical
      crisis Berel faces.
