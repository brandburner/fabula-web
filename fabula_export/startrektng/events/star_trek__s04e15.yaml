      during Riker’s emergency surgery to pull thick pools of ichor (alien blood)
      from his battered wound. The device’s hum as it clears viscous fluid underscores
      the crude and improvisational nature of Malcorian medical tools when confronted
      with unfamiliar physiology. Its use highlights the tension between the Malcorians’
      medical expertise and the challenges posed by Riker’s alien biology.
    status_before_event: Sterilized and ready for use in the surgical cubicle, part
      of the standard medical equipment.
    status_after_event: Used to clear ichor from Riker’s wound, then cleaned and returned
      to the surgical supplies.
    global_id: ger_object_024e25419de4
  - object_uuid: ger_object_84d1769cebf7
    description_of_involvement: The three-point-six aspiration drill is handed to
      Berel during Riker’s emergency surgery to relieve pressure from pooled ichor
      in his telencephalin. The drill’s high-pitched whine as it cuts into Riker’s
      cranium underscores the urgency and improvisation of the procedure, as the Malcorians
      struggle to treat a physiology they do not understand. Its use symbolizes the
      ethical and practical dilemmas faced by the medical staff, as they balance their
      duty to save a life with the unknown risks of alien anatomy.
    status_before_event: Sterilized and stored in the surgical cubicle, part of the
