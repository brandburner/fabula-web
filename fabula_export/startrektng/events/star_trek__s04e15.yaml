- fabula_uuid: cand_evt_scene_d75ca8b088220899_03
  global_id: null
  title: Mirasta warns Picard of Krola’s political trap
  description: "\n  In a private exchange at Ten Forward, Mirasta Yorath—initially\
    \ awestruck by the Enterprise and the prospect of first contact—shifts abruptly\
    \ into strategic caution when Picard reveals Riker’s disappearance. She warns\
    \ that disclosing Starfleet’s covert surveillance teams or Riker’s true identity\
    \ to Chancellor Durken would be catastrophic, as it would hand Krola, the xenophobic\
    \ Minister of Security, the perfect pretext to sabotage the fragile diplomatic\
    \ alliance. Mirasta’s urgency stems from her deep understanding of Malcorian politics:\
    \ Krola would exploit Riker’s exposure to stoke fear of Federation ‘infiltration,’\
    \ using it to discredit Durken’s reformist agenda and justify isolationism. The\
    \ moment forces Picard to confront a brutal choice—transparency risks destabilizing\
    \ the alliance, while secrecy could entangle the Federation in a cover-up. Mirasta’s\
    \ plea isn’t just about Riker’s safety; it’s a plea to preserve the fragile hope\
    \ of peaceful first contact before Krola’s hardline faction can weaponize the\
    \ crisis. The tension escalates as Picard grapples with whether to trust Mirasta’s\
    \ insider perspective or adhere to Starfleet’s principles of openness, with the\
    \ fate of the mission hanging in the balance.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e15
  scene_sequence: 8
  sequence_in_scene: 16
  key_dialogue:
  - 'PICARD: We’ve found that the most hazardous aspect of this kind of mission is
    a lack of sufficient information...'
  - 'MIRASTA: You don’t have to explain. I understand. But not everyone on my planet
    would. They’d think you were trying to infiltrate our society.'
  - 'MIRASTA: ((interrupting)) Captain Picard, you must trust me on this. If you tell
    the Chancellor about Commander Riker, it would undermine everything you hope to
    accomplish here. Durken would assign Krola, the Minister of Security, to find
    him. Krola has his own political agenda. He will perceive you as the greatest
    threat my people have ever known. And he will not hesitate to use Riker to prove
    he is correct.'
