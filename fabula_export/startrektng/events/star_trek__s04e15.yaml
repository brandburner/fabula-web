      its lethal capability.
    status_after_event: Fired by Krola (with Riker’s finger on the trigger), the phaser
      is now the instrument of a staged assassination. It lies on the floor near Krola’s
      collapsed body, serving as evidence to frame Riker and the Federation for the
      'murder.'
