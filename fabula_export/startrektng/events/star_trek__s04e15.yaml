    status_after_event: Intact but rendered meaningless as Riker’s alien traits are
      exposed.
    global_id: ger_object_d7106271729b
  - object_uuid: ger_object_2050fda9e19b
    description_of_involvement: "\n        Riker’s mittens (gloves) are a critical\
      \ part of his disguise, concealing his prehensile fingers—a trait impossible\
      \ for a Malcorian. When Tava and Nilrem peel them off during the examination,\
      \ the revelation of his fingers is the second major anatomical anomaly to shatter\
      \ his cover. The gloves’ removal is a deliberate, almost ritualistic act, symbolizing\
      \ the stripping away of his false identity. Their presence before the event\
      \ is deceptive; their absence after is damning, confirming Riker’s alien nature.\n\
      \      "
    status_before_event: Worn by Riker, concealing his prehensile fingers and maintaining
      his Malcorian disguise.
    status_after_event: Removed and discarded on the treatment table or nearby tray,
      exposing Riker’s true hands.
    global_id: ger_object_2050fda9e19b
  - object_uuid: ger_object_b676f7fdce70
    description_of_involvement: "\n        Riker’s shoes and socks are part of his\
