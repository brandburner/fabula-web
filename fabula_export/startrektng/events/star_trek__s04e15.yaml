- fabula_uuid: cand_evt_scene_d75ca8b088220899_02
  global_id: null
  title: Mirasta Warns of Riker’s Exposure Risks
  description: 'In Ten Forward, Picard and Troi reveal to Mirasta that Starfleet has
    conducted covert surveillance of Malcor III for years, including Riker’s undercover
    mission as a tourist. Mirasta’s initial wonder at first contact shifts to alarm
    when she learns Riker is missing—his true identity, if discovered, could trigger
    Malcorian xenophobia and Krola’s opportunism, shattering the fragile alliance.
    She urges Picard to conceal Riker’s disappearance from Chancellor Durken, warning
    that Krola would exploit it to undermine Federation trust. The scene pivots from
    diplomatic optimism to a high-stakes crisis, where Riker’s fate becomes a ticking
    time bomb for interstellar relations. Mirasta’s growing disillusionment with Federation
    secrecy foreshadows her later ethical conflict, while Picard faces a critical
    choice: transparency or strategic silence.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e15
  scene_sequence: 8
  sequence_in_scene: 15
  key_dialogue: &id009
  - 'PICARD: We’ve found that the most hazardous aspect of this kind of mission is
    a lack of sufficient information... We also do on-surface reconnaissance.'
  - 'MIRASTA: You’ve had people on our planet?'
  - 'PICARD: We’ve found that the most hazardous aspect of this kind of mission is
    a lack of sufficient information... We also do on-surface reconnaissance.'
  - 'MIRASTA: We’ve got to find him before someone realizes what he really is... if
    this gets out prematurely, it will seriously complicate matters.'
  - 'MIRASTA: Introducing you to this world will not be an easy matter... Some will
    not want it to change.'
  - 'MIRASTA: ((interrupting)) Captain Picard, you must trust me on this. If you tell
    the Chancellor about Commander Riker, it would undermine everything you hope to
    accomplish here. Durken would assign Krola, the Minister of Security, to find
    him. Krola has his own political agenda. He will perceive you as the greatest
    threat my people have ever known. And he will not hesitate to use Riker to prove
    he is correct.'
