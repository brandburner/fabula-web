  title: Mirasta’s desperate plea for Riker’s life
  description: Mirasta enters Durken’s office already under his disapproval, her actions
    in hiding the Federation’s presence now exposed. Durken’s disappointment is personal—he
    trusted her judgment, and her secrecy has fractured that trust. She attempts to
    justify her actions as serving Malcor’s best interests, but Durken shuts down
    her defense, asserting his authority as Chancellor. The tension shifts when Mirasta
    reveals Riker’s critical condition, exposing Krola’s dangerous interrogation tactics.
    Durken’s pragmatic refusal to release Riker immediately forces Mirasta to escalate
    her plea, framing Riker’s survival as the only path forward for Malcorian-Federation
    relations. The scene becomes a high-stakes negotiation where Mirasta’s loyalty
    to Picard and the Federation collides with Durken’s political caution, raising
    the stakes for Riker’s life and the fragile diplomatic alliance.
