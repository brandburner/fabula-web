- fabula_uuid: act_6857ccf82967fea9
  number: 5
  summary: Act Five opens with Riker, under pressure to act, preparing to return to
    the 19th century for Picard, despite Worf's logical argument to prioritize the
    mission and destroy the alien habitat immediately. Troi reluctantly supports Worf's
    position, forcing Riker to order photon torpedoes prepared. Simultaneously, in
    the Medical Lab, Geordi struggles to reactivate Data. A diagnostic reveals intermittent
    contact in the input polarizers caused by a tiny iron filing. In the 19th-century
    cavern, Picard, examining Data's severed head, has an epiphany. He finds a flat-head
    nail and meticulously uses it to remove the iron filing from Data's head, mirroring
    Geordi's discovery. On the Bridge, Worf confirms the torpedoes are ready to fire.
    Back in the Medical Lab, with the obstruction removed, Geordi successfully reactivates
    Data. Data immediately begins processing a binary message from Picard, warning
    against firing the torpedoes due to the risk of catastrophic temporal effects.
    Geordi relays this urgent message to Riker, who halts the firing sequence. Data
    explains they must re-phase the explosion into the aliens' time continuum to safely
    destroy their habitat, a modification Geordi estimates will take a couple of hours.
    This delay provides Riker a window to rescue Picard. Beverly informs Riker that
    the temporal rift will only be stable enough for one person to return. Overhearing
    this, Samuel Clemens, profoundly changed by his glimpse of the future, volunteers
    to remain in the 19th century, allowing Picard to return. He expresses gratitude
    to Data for opening his eyes and inspiring him to write more books. In the 19th-century
    cavern, Clemens unexpectedly returns, surprising Picard. He delivers instructions
    from Geordi on how to activate the ophidian. Picard and Guinan share poignant
    goodbyes, with Guinan looking forward to their future reunion. On the Bridge,
    Data detects massive triolic wave activity but no human life signs, leading Riker
    to believe it's the aliens and order the torpedoes fired. As the torpedoes launch,
    Data detects a temporal distortion and human life signs, confirming Picard's presence.
    On the planet surface, Picard is caught in the resulting explosion, which briefly
    reveals the aliens' phased world. O'Brien beams Picard aboard just as the explosion
    intensifies, ensuring his safe return. Worf confirms the target's destruction
    and the cessation of triolic activity. The Enterprise then warps away. In Ten
    Forward, Picard and Guinan share a silent, meaningful reunion, their shared experience
    unspoken but deeply felt. Picard's log confirms the timeline is restored, Data
    is whole, and Clemens will fulfill his literary destiny. In the 19th-century cavern,
    Clemens ensures Guinan receives medical attention. He finds his watch, but understanding
    the need to preserve history, he leaves it behind, along with Data's head, to
    be discovered centuries later. This act resolves the immediate crisis, restores
    the timeline, and brings the character arcs to a satisfying conclusion.
