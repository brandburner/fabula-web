  - object_uuid: ger_object_b8f4d72d328a
    description_of_involvement: "\n        Clemens’ Colt Forty-Five is a symbol of\
      \ his defiance and skepticism, held tightly in his hand as he threatens the\
      \ crew. The force of the rift’s activation flings him backward, knocking the\
      \ gun from his grasp. The Colt Forty-Five skitters across the cavern floor,\
      \ rendered useless in the chaos. Its loss underscores Clemens’ vulnerability\
      \ and the sudden shift in power dynamics, leaving him unarmed and impulsively\
      \ leaping through the rift as it closes.\n      "
    status_before_event: "\n        Held by Clemens, loaded and ready to fire. The\
      \ Colt Forty-Five is a 19th-century firearm, a symbol of Clemens’ defiance and\
      \ his skepticism toward the crew’s claims of time travel.\n      "
    status_after_event: "\n        Knocked from Clemens’ hand by the force of the\
      \ rift, lying useless on the cavern floor. Its loss leaves Clemens unarmed and\
