- fabula_uuid: cand_evt_scene_158d06b1d8a7ad1d_03
  global_id: null
  title: Data’s decapitation and the cane’s activation
  description: "\n  In a violent escalation, the Alien Doctor and Nurse phase into\
    \ the cavern and seize the cane from Troi. As Data lunges at super-speed to intervene,\
    \ the cane activates, tearing a temporal rift through his body—his head is violently\
    \ severed and sent flying across the cavern floor. The force of the rift’s opening\
    \ flings Guinan unconscious against a rock and disarms Clemens, whose gun and\
    \ watch are knocked away. The Alien Doctor, now in possession of the cane, hesitates\
    \ only briefly before plunging through the rift, followed by Riker, Geordi, Troi,\
    \ and Beverly. Picard, torn between pursuing the aliens and tending to Guinan,\
    \ chooses to stay, leaving him stranded in the 19th century as the rift closes.\
    \ Clemens, driven by curiosity or defiance, impulsively leaps through the rift\
    \ just before it vanishes, further fracturing the crew’s cohesion and leaving\
    \ Picard isolated with an injured Guinan. The event marks a brutal turning point:\
    \ Data’s destruction eliminates a critical ally, the cane’s activation accelerates\
    \ the Devidians’ timeline manipulation, and the crew’s separation forces Picard\
    \ into a desperate, solitary struggle to preserve history and save his team.\n\
    \  "
