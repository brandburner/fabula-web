      \ two-hour delay that complicates the rescue. The warning serves as a narrative\
      \ bridge between Picard’s plight in 1893 and the crew’s desperate strategizing\
      \ in the present. Its contents are both a clue and a constraint, driving the\
      \ event’s tension as the crew grapples with its implications.\n      "
    status_before_event: Decoded and displayed on the bridge consoles, its binary
      code analyzed by Data and Geordi; the phase differential details are now known
      but not yet acted upon.
    status_after_event: Its contents inform the crew’s technical solution (phase discriminators)
      and the moral dilemma (Clemens’ sacrifice); the warning’s role is fulfilled,
      but its legacy lingers in the stakes of the mission.
    global_id: ger_object_1b83f3877469
  - object_uuid: ger_object_08ae5f1ed732
    description_of_involvement: "\n        The USS *Enterprise* Photon Torpedoes are\
