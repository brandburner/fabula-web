- fabula_uuid: act_00581e0bc5aaf8fd
  number: 3
  summary: The Enterprise crew examines the confiscated snake-head cane, which briefly
    transforms into a writhing ophidian, generating small, unstable time distortions.
    Data explains the aliens' ability to concentrate these distortions, and Geordi
    theorizes the cavern where Data's head was found acts as a focusing mechanism.
    Their discussion is interrupted by Mrs. Carmichael, again demanding rent. Picard
    orchestrates a theatrical performance of "A Midsummer Night's Dream," casting
    Mrs. Carmichael as Titania to distract and appease her, successfully buying more
    time. Meanwhile, the Alien Doctor and Nurse locate the crew's carriage, confirming
    their presence in San Francisco. Guinan informs Data and Picard that she has secured
    access to the high-security Presidio mines, the location of the cavern. Picard
    and Guinan share a poignant "first meeting," with Picard acknowledging their future
    friendship and the paradox of her not yet knowing him. Samuel Clemens, gathering
    information from a young reporter, deduces that the "outlaws" are Data and his
    "accomplices" from the future, interpreting their presence as an "invasion." He
    resolves to expose them and heads to the Presidio. In the cavern, Geordi confirms
    its walls are selectively polarized to focus space-time distortions, making it
    a critical alien transport site. Picard decides to use the ophidian to destroy
    the alien habitat on Devidia Two, despite Geordi's concerns about phaser compatibility.
    Clemens then confronts the crew in the cavern, armed with a Colt Forty-Five. The
    Alien Doctor and Nurse phase in, snatch the cane, and activate it. Data heroically
    dives for the snake, but the resulting time shift tears his head from his body.
    Guinan is knocked unconscious, and Clemens's gun and watch are flung away. The
    Alien Doctor plunges through the time hole, followed by Riker, Geordi, Troi, and
    Beverly. Picard remains behind to tend to Guinan, now trapped in the 19th century.
    Clemens, after a moment's hesitation, also leaps through the closing time hole,
    leaving Picard and Guinan stranded. This act marks the catastrophic midpoint,
    with Data's apparent demise, Picard's separation from his crew, and Clemens's
    unexpected journey to the future.
