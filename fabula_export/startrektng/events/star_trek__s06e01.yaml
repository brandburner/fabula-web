  title: Beverly witnesses Apollinaire’s systemic biases
  description: 'Disguised as a 19th-century nurse, Beverly Crusher shadows Doctor
    Apollinaire during his rounds at the Sisters of Hope Infirmary, observing his
    dismissive treatment of women and marginalized patients. Apollinaire’s condescension
    toward female nurses and his outright refusal to consider Beverly’s medical suggestions—despite
    her superior knowledge—expose the entrenched sexism and racial hierarchies of
    19th-century medicine. The scene underscores the crew’s broader conflict with
    temporal integrity: their presence risks altering societal norms they cannot directly
    challenge, forcing Beverly to suppress her frustration while gathering critical
    intelligence about the Devidians’ operations. Apollinaire’s suspicion of Beverly’s
    "unorthodox" methods also heightens the crew’s exposure, as his growing distrust
    could jeopardize their covert mission.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e01
  scene_sequence: 8
  sequence_in_scene: 17
  key_dialogue:
  - 'APOLLINAIRE: (to Beverly) ''Nurse, fetch me some laudanum for this patient. And
    do try to keep up—your notes are sloppy.'''
  - 'BEVERLY: (under her breath) ''Her pulse is erratic. She’s in active labor.'''
  - 'APOLLINAIRE: (ignoring her) ''Mr. Whitmore, your diagnosis?'' (to Beverly) ''Nurse,
    attend to the gentleman’s request for water.'''
  - 'BEVERLY: (to herself) ''He hasn’t even examined her.'''
