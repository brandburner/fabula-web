  title: Riker’s Five-Minute Gamble for Picard
  description: 'On the *Enterprise* bridge, Riker faces the agonizing decision of
    whether to fire on the Devidian energy source or delay in the hope that Picard—still
    missing in 19th-century San Francisco—might return to resolve the crisis. Worf
    confirms the torpedoes are ready, but Riker hesitates, his voice tight with tension.
    He acknowledges the uncertainty of Clemens’s mission but orders a five-minute
    delay, betting on Picard’s return despite the mounting temporal threat. The silence
    between Riker and Worf underscores the weight of the choice: a tactical gamble
    that risks the timeline for the sake of leadership and faith in his captain. The
    moment tests Riker’s command in Picard’s absence, revealing his struggle between
    protocol and loyalty.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e01
  scene_sequence: 34
  sequence_in_scene: 59
  key_dialogue:
  - 'WORF: Sir, Commander La Forge has completed the re-configuration of the photon
    torpedoes.'
  - 'RIKER: If Clemens got back, the Captain should have been here by now.'
  - 'WORF: We have no way of knowing if Mister Clemens was successful.'
  - 'RIKER: Re-establish your firing pattern, Mister Worf. We''ll wait five more minutes.'
