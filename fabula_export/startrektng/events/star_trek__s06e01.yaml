  title: Aliens confirm crew’s location
  description: 'The Alien Doctor and Nurse, disguised as 19th-century medical professionals,
    approach the boarding house where Picard’s crew is hiding. Their slow, deliberate
    inspection of the crew’s carriage—exchanging knowing glances—confirms the Enterprise
    team’s presence in the area. This moment marks a critical escalation: the aliens
    shift from passive surveillance to active pursuit, narrowing the distance between
    hunters and prey. The crew remains unaware of their proximity, heightening the
    tension as the Devidians prepare to close in on their targets. The scene underscores
    the aliens’ methodical, predatory nature and the fragility of the crew’s cover,
    setting up an imminent confrontation.'
