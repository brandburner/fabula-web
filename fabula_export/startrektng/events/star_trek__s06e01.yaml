    - Tactical coordination (following Picard’s orders and acting as a unified team)
    - Emotional resilience (overcoming the shock of Data’s destruction to pursue the
      mission)
    institutional_impact: The event forces the away team to split, testing their loyalty
      to Picard and their commitment to the mission. Their pursuit of the Devidians
      into the unknown era reflects Starfleet’s willingness to adapt and sacrifice
      for the greater good.
    internal_dynamics: The crew’s internal bonds are strained but not broken. Picard’s
