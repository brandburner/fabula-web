  title: Clemens questions Troi about technology’s cost
  description: 'During a tour of the *Enterprise*, Samuel Clemens—already unsettled
    by the alien presence he witnessed—uses a casual conversation with Deanna Troi
    to voice his deep skepticism about 24th-century technology. His critique begins
    with a seemingly trivial complaint about replicated cigars, but quickly escalates
    into a broader indictment of the Federation’s reliance on machinery, automation,
    and military power. Troi defends the ship’s mission as one of exploration and
    peace, but Clemens’ probing questions reveal his underlying distrust: he sees
    the *Enterprise* as a weaponized vessel, its advanced systems a facade for conquest.
    The exchange underscores Clemens’ role as a moral counterweight to the crew’s
    futuristic optimism, while his fixation on the alien passing them hints at his
    growing suspicion that the crew’s true motives in 19th-century San Francisco are
    far darker than they claim. The tension peaks as they enter the turbolift, Clemens’
    unease palpable, setting up his later confrontation with Troi’s idealism and foreshadowing
    his eventual discovery of the crew’s hidden agenda.'
