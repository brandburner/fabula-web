  title: Clemens sabotages Data’s device
  description: "\n  Samuel Clemens, still distrustful of Data and the Enterprise crew\
    \ despite his growing alliance with them, acts on his paranoia about the time-traveling\
    \ aliens’ technology. He bribes Jack the Bellboy to gain access to Data’s room\
    \ under the pretense of delivering a message, then steals a critical transceiver\
    \ component from Data’s time-shift device. Clemens believes the device is a threat\
    \ to the timeline and that removing it will protect history. When Data and Guinan\
    \ later discover the theft, Clemens is found hiding in the boarding house’s storage\
    \ closet, clutching the stolen part. The confrontation forces Clemens to confront\
    \ his lingering skepticism and the fragility of his trust in the crew, while Data\
    \ and Guinan must decide whether to press charges or appeal to his reason—revealing\
    \ how Clemens’s fear of the unknown still undermines their mission. The stolen\
    \ component also creates a technical hurdle for Data’s ability to communicate\
    \ with the Enterprise, escalating the crew’s operational challenges in 19th-century\
    \ San Francisco.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e01
  scene_sequence: 3
  sequence_in_scene: 7
  key_dialogue:
  - 'CLEMENS: (muttering, as he pockets the component) ''Can’t trust a man who ain’t
    even a man. Not when the whole damn timeline’s at stake.'''
  - 'DATA: (calm but firm, upon discovering Clemens) ''Samuel, this component is essential
    for maintaining temporal synchronization. Without it, my ability to assist the
    crew is severely compromised.'''
  - 'CLEMENS: (defensive, backing away) ''And what if that thing’s the very reason
    those devils are here? What if it’s *calling* them? You lot play fast and loose
    with time—well, I ain’t risking history for your experiments!'''
  - 'GUINAN: (stepping between them, voice low) ''Samuel, you’ve seen what’s at stake.
    This isn’t about trust in *us*—it’s about trust in the future you’ve already helped
    shape.'''
