  title: Clemens volunteers to replace Picard
  description: "\n  After Data and Geordi reveal that modifying photon torpedoes to\
    \ safely destroy the Devidian habitat will take two hours—leaving a narrow window\
    \ for rescue—Riker impulsively declares he will return to 19th-century San Francisco\
    \ to retrieve Picard. Beverly warns that the temporal rift will only allow one\
    \ person to return, forcing Riker to accept a one-way mission. Clemens, who has\
    \ been silently observing, overhears the dilemma and interrupts, offering himself\
    \ as the solution: he will return to the past in Picard’s place, ensuring the\
    \ captain can complete the mission in the present. His decision is framed as selfless,\
    \ driven by his newfound belief in the future (inspired by Data) and his recognition\
    \ that Picard’s role is irreplaceable. The moment marks a turning point in Clemens’\
    \ arc, shifting him from skeptic to reluctant ally, while also escalating the\
    \ crew’s moral dilemma: trusting an outsider with the timeline’s fate. Geordi\
    \ is tasked with briefing Clemens on the logistics, and the two depart, leaving\
    \ Riker and the crew to focus on the technical solution. The exchange underscores\
    \ the mission’s urgency and the high stakes of temporal interference, as well\
    \ as Clemens’ quiet transformation from antagonist to a key player in preserving\
    \ history.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e01
  scene_sequence: 32
  sequence_in_scene: 57
  key_dialogue:
  - 'RIKER: There''s time now... I''m going back to the nineteenth century for the
    Captain.'
  - 'CLEMENS: I''m the one who should return to the nineteenth century, Commander...
    and remain there so your Captain can return.'
  - 'CLEMENS: For starting me on the greatest adventure a man''s ever had. For helping
    a bitter old man open his eyes... so he can see that the future turns out pretty
    well, after all.'
