  title: Riker demands answers Guinan refuses
  description: 'In Ten Forward, Riker confronts Guinan after her cryptic silence about
    Picard’s fate in the cavern. His frustration escalates as he presses her for details,
    arguing that withholding information could be as dangerous as revealing it. Guinan
    remains resolute, insisting that history must unfold as it should, even if it
    means Picard’s peril. Riker’s desperation to act—his refusal to accept passivity—clashes
    with Guinan’s temporal fatalism, exposing the core tension between human agency
    and the inevitability of time. The scene ends with Riker storming out, his determination
    to defy her warnings now sharpened by her refusal to help, setting up his future
    defiance of temporal rules to save Picard. The exchange underscores Riker’s leadership
    instincts and his emotional investment in Picard, while Guinan’s silence reinforces
    her role as a guardian of time’s fragile balance. The unresolved conflict leaves
    Riker’s next move uncertain but inevitable: he will act, consequences be damned.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e01
  scene_sequence: 21
  sequence_in_scene: 40
  key_dialogue:
  - 'GUINAN: History has to fulfill itself. Even Picard knew that.'
  - 'RIKER: You were there, in the cavern. You know what happened. What am I supposed
    to do?'
  - 'GUINAN: If I tell you what happened in that cavern, it would affect any decision
    you''re about to make. I can''t do that. I won''t do that.'
  - 'RIKER: Not telling me might affect my decision, too... did you think of that?'
  - 'RIKER: We''re talking about Jean-Luc Picard. I''m not going to sit around and
    hope it all works out... I''ve got to do something...'
