- fabula_uuid: cand_evt_scene_53f1b6326ae748fa_01
  global_id: null
  title: Geordi discovers sabotage in Data’s neural polarizers
  description: In the Medical Lab, Geordi La Forge attempts to reactivate Data’s severed
    head using standard Starfleet protocols, but the android remains unresponsive.
    Frustrated, Geordi runs a deeper diagnostic and discovers an iron filing lodged
    in Data’s neural polarizers—a deliberate sabotage that disrupts his neural pathways.
    The finding shifts the crew’s focus from temporal interference to a targeted attack
    on Data, revealing the Devidians’ strategic precision and raising the stakes for
    his survival. Geordi’s technical expertise and growing concern for Data’s condition
    drive the scene, while the discovery underscores the aliens’ ability to exploit
    the crew’s vulnerabilities. The moment also foreshadows the need for a more aggressive
    diagnostic approach to restore Data’s functionality and uncover the full extent
    of the sabotage.
