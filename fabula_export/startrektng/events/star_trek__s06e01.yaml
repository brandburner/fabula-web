  title: Time rift divides the crew violently
  description: The cavern’s crystalline structure—revealed by Geordi’s VISOR as a
    space-time focusing mechanism—becomes the battleground for a brutal confrontation.
    As the crew debates destroying the Devidian habitat using the ophidian, Clemens
    brandishes his Colt Forty-Five, forcing them toward the time hole. The Alien Doctor
    and Nurse phase in, seizing the cane and activating it, triggering a catastrophic
    explosion that decapitates Data mid-lunge. The blast flings Guinan unconscious
    against a rock and sends Clemens’ pistol and watch flying. The Alien Doctor escapes
    through the destabilizing rift, prompting Picard to order the others to follow.
    Riker, Geordi, Troi, and Beverly leap through the closing portal, but Picard hesitates,
    torn between pursuit and Guinan’s injury. Clemens, driven by curiosity or defiance,
    impulsively follows the crew into the unknown. The rift seals shut, stranding
    Picard in 19th-century San Francisco with an injured Guinan and no means to intervene.
    The event fractures the team at the story’s highest stakes, forcing Picard into
    a desperate solo mission while the others face the Devidians’ full power in an
    unfamiliar era.
