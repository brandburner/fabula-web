  title: Data detects alien temporal anomaly
  description: 'Data’s advanced temporal detection device emits an urgent alarm, its
    readings spiking like a seismograph as it registers a sudden anomaly. The android
    immediately reacts with precision, unfurling a map of 19th-century San Francisco
    and cross-referencing the device’s coordinates to pinpoint the aliens’ new location.
    His movements are swift and deliberate—no hesitation, no wasted motion—as he recognizes
    the gravity of the situation. The anomaly confirms the Devidians have phase-shifted
    again, this time to a new site in the city, and Data’s mission parameters override
    all else. He abandons his current task without hesitation, his focus narrowing
    to the critical need to track and intercept the aliens before they can harvest
    more neural energy. The urgency of the moment is palpable: every second the Devidians
    remain undetected risks further destabilization of the timeline, and Data’s actions
    reflect the high stakes of the crew’s covert operation. His departure from the
    room is not just a physical exit but a narrative pivot—shifting the story’s momentum
    toward the next phase of the chase.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e01
  scene_sequence: 11
  sequence_in_scene: 21
  key_dialogue:
  - 'DATA: (to himself, analyzing the device) ''Temporal displacement detected. Coordinates:
    37.7749° N, 122.4194° W. Probability of alien origin: 98.7%.'''
