- fabula_uuid: cand_evt_scene_aa9450cc0c6f2091_02
  global_id: null
  title: Picard Improvises to Delay Eviction
  description: "\n  With the crew preparing to investigate the Sisters of Hope Infirmary—a\
    \ critical Devidian target—Picard is abruptly interrupted by Mrs. Carmichael,\
    \ their landlady, who demands overdue rent. Caught off-guard, Picard improvises\
    \ a cover story, posing as a struggling Shakespearean actor to buy time. He claims\
    \ his troupe is rehearsing *A Midsummer Night’s Dream* and promises payment with\
    \ a bonus, though the crew has no means to secure funds. The confrontation forces\
    \ Picard to prioritize an immediate financial crisis alongside their mission to\
    \ stop the Devidians, adding urgency to their already precarious situation. The\
    \ scene underscores the crew’s vulnerability in 19th-century San Francisco, where\
    \ their advanced technology and resources are useless against mundane but pressing\
    \ human problems. Mrs. Carmichael’s skepticism and Picard’s quick thinking reveal\
    \ the tension between their covert mission and the need to maintain plausible\
    \ deniability in the past. The reprieve is temporary, but the threat of eviction\
    \ now looms as a secondary deadline, complicating their efforts to preserve the\
    \ timeline.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e01
  scene_sequence: 4
  sequence_in_scene: 9
  key_dialogue:
  - 'MRS. CARMICHAEL: Mister Picard! One o''clock of a Thursday. I''m sure I made
    it clear to you the rent is always due, payable in full, by one o''clock on Wednesdays.'
  - 'PICARD: Mrs. Carmichael, my troupe is even now in rehearsals for a new production.
    It''s—*A Midsummer Night''s Dream*. We''ve performed in London... Paris... Milan...
    all to sold-out houses. I assure you, we''ll be able to pay the rent... with a
    bonus.'
  - 'MRS. CARMICHAEL: No, no, no... I''ve heard you silver-tongued devils before...
    I''ll have the rent in full... tomorrow... by one o''clock—or you''ll be performing
    on the street.'
