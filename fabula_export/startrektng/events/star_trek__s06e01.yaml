- fabula_uuid: cand_evt_scene_1398d7866ae057e8_01
  global_id: null
  title: Clemens exposes Guinan’s fabricated identity
  description: "\n  Samuel Clemens, freshly exposed for sabotaging Data’s time-shift\
    \ device, pivots to a direct assault on Guinan’s credibility by revealing a judge’s\
    \ denial of her claimed lineage. Guinan deflects with a vague explanation about\
    \ a family feud, but Clemens presses harder, exposing his growing paranoia and\
    \ his role as an active disruptor. The confrontation forces Guinan into a defensive\
    \ posture while revealing Clemens’ investigative depth—he’s traced Data’s movements\
    \ across multiple 19th-century institutions, linking him to suspicious inquiries\
    \ about mining and technology. Clemens’ escalating accusations (including a direct\
    \ challenge about 'time shifts') frame him as a relentless skeptic, while Guinan’s\
    \ evasiveness underscores her hidden past. The exchange leaves both characters\
    \ exposed: Clemens as a threat to the mission, Guinan as a figure with secrets,\
    \ and Data as a liar by omission. The tension peaks when Clemens declares his\
    \ intent to stop them, setting up his future interference and the crew’s need\
    \ to neutralize his threat before he derails the timeline.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e01
  scene_sequence: 6
  sequence_in_scene: 13
  key_dialogue:
  - |-
    CLEMENS: Madame Guinan... Mister Data... good day.
    GUINAN: Mister Clemens... shame on you.
    CLEMENS: Shame, madame? I think not. I find no shame in my efforts to uncover your plot.
    GUINAN: I keep telling you, there is no plot.
  - |-
    CLEMENS: Then... I wonder... why the Judge says he's never heard of you? That's what his telegram to me indicated...
    GUINAN: There's been a blood feud between two branches of the family. He doesn’t acknowledge me.
  - |-
    CLEMENS: You've come to this century and brought your infernal technology with you... for God only knows what purpose... but I have no doubt that it will be the people of this century who will suffer for it.
    GUINAN: Mister Clemens, I think we've had quite enough of this. Mister Data's business is his own, and I'd thank you to leave.
    CLEMENS: Pardon me, Madame, but it is my business... it is the business of all humanity, I believe, to stop both of you from whatever it is you are doing here. And that is what I intend to do.
