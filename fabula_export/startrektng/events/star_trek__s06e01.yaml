  title: Clemens accuses Data of time-travel conspiracy
  description: "\n  In Data’s quarters, Samuel Clemens escalates his investigation\
    \ into the crew’s activities by directly confronting Data and Guinan. After Guinan\
    \ dismisses his earlier accusations, Clemens reveals he’s uncovered inconsistencies\
    \ in her claimed identity—specifically, that Judge Truman Williams denies any\
    \ relation to her, contradicting her earlier story about a family blood feud.\
    \ Clemens then pivots to Data, exposing his suspicious inquiries into 19th-century\
    \ mining operations and geological records, which he frames as evidence of a hidden\
    \ agenda. When Data deflects by claiming his device is a 'horseless carriage'\
    \ invention, Clemens explodes, accusing him of introducing 'infernal technology'\
    \ to the past—a charge that forces Data into evasive half-truths. The confrontation\
    \ ends with Clemens vowing to expose their 'plot,' leaving Data and Guinan wary\
    \ of his growing interference. The scene heightens the tension between Clemens’\
    \ 19th-century skepticism and the crew’s need for secrecy, while reinforcing his\
    \ role as an active threat to the timeline.\n  "
