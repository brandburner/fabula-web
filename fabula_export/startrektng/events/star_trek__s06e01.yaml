- fabula_uuid: cand_evt_scene_53d59b6c511e0822_01
  global_id: null
  title: Picard plants sensor while Geordi detects triolic waves
  description: "\n  Picard, disguised as a workman, plants a covert sensor in the\
    \ infirmary’s gas lamp to monitor the Devidian aliens, but his ruse risks exposure\
    \ when Doctor Apollinaire questions his presence. Meanwhile, Geordi’s visor detects\
    \ residual triolic waves near a deceased patient’s bed, confirming the aliens’\
    \ recent neural energy harvesting. Troi reveals the victim’s cryptic final words\
    \ about a 'strange doctor and nurse,' deepening the crew’s urgency to act before\
    \ the Devidians strike again. Beverly stalls the aliens with medical jargon while\
    \ secretly signaling the team via communicator, but their presence is exposed\
    \ when Riker and the others burst in—leading to a phaser standoff and the aliens’\
    \ abrupt phase-shift escape. The confrontation escalates the mission’s stakes,\
    \ forcing the crew to abandon subtlety and confront the Devidians directly.\n\
    \  "
