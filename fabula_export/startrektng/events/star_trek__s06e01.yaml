  title: Riker deceives and assaults policeman
  description: In the aftermath of the aliens' phasing event, the crew attempts to
    cover up their involvement by misleading Doctor Apollinaire, who arrives suspicious
    of the commotion. Riker and Troi fabricate a story about a distraught relative
    to explain the disturbance, but their deception is interrupted by a legitimate
    policeman investigating reports of gunfire. The policeman grows increasingly skeptical,
    particularly when he notices Geordi holding the alien cane—a key artifact tied
    to the Devidian threat. As the policeman prepares to confiscate the cane and take
    the crew in for questioning, Riker escalates the situation by striking the officer,
    reclaiming the cane, and allowing the crew to escape. The scene underscores the
    crew's desperation to protect the timeline, even at the cost of violating 19th-century
    law, while also raising the stakes of their covert mission. The policeman's whistle
    blow signals the escalation of their conflict with local authorities, adding another
    layer of urgency to their efforts to stop the Devidians before further temporal
    contamination occurs.
