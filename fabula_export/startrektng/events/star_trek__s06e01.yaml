  key_dialogue:
  - |-
    CLEMENS: Madame Guinan... Mister Data... good day.
    GUINAN: Mister Clemens... shame on you.
    CLEMENS: Shame, madame? I think not. I find no shame in my efforts to uncover your plot.
  - |-
    CLEMENS: This contraption... very unusual. It looks quite - futuristic. Tell me - might it have something to do with time shifts?
    DATA: In a sense. The time shift is a new gearing system that I have invented... for a horseless carriage.
    CLEMENS: Do not insult me.
  - |-
    CLEMENS: You've come to this century and brought your infernal technology with you... for God only knows what purpose... but I have no doubt that it will be the people of this century who will suffer for it.
    GUINAN: Mister Clemens, I think we've had quite enough of this. Mister Data's business is his own, and I'd thank you to leave.
    CLEMENS: Pardon me, Madame, but it is my business... it is the business of all humanity, I believe, to stop both of you from whatever it is you are doing here. And that is what I intend to do.
