      unconscious. The rock’s presence is a cruel reminder of the cavern’s natural
      hostility, a contrast to the Devidians’ phased technology. Its role is passive
      but devastating—an inanimate object that becomes the instrument of Guinan’s
      injury and Picard’s dilemma. The outcropping’s sharp edge symbolizes the unforgiving
      nature of the 19th century, a world where even the environment can be a threat.
    status_before_event: Protruding from the cavern wall, its jagged edge unnoticed
      until the explosion. The rock is a natural feature, its danger latent but real.
    status_after_event: Guinan lies unconscious at its base, her blood staining the
      rock. The outcropping remains unchanged, a silent witness to the event’s violence.
