acts:
- fabula_uuid: act_b92447925f229640
  number: 1
  summary: The narrative opens with Dr. Beverly Crusher in a 19th-century San Francisco
    morgue, investigating cholera victims. She quickly discerns that the deceased
    suffered from neural energy depletion, not the epidemic, confirming the Devidian
    aliens' method of sustenance. The Enterprise crew, disguised in period attire,
    convenes at a boarding house. They identify Sisters of Hope Infirmary as a likely
    alien hunting ground due to the high number of victims originating there. Picard
    strategizes how to identify the shapeshifting aliens, while Geordi works on a
    detection system. Their clandestine efforts are interrupted by Mrs. Carmichael,
    their formidable landlady, who demands overdue rent. Picard, improvising, claims
    they are a traveling Shakespearean troupe, buying them a temporary reprieve. Meanwhile,
    Samuel Clemens, still suspicious of Data, infiltrates Data's hotel room with the
    help of a bellboy. Clemens, feigning interest in Data's "engine," surreptitiously
    removes the transceiver assembly from Data's time-shift device, believing it to
    be "infernal technology." He hides in a closet as Data and Guinan return, discussing
    the newly located cavern entrance within the Presidio. Data discovers the missing
    component and Guinan immediately suspects Clemens. Data reveals the device's toxicity
    to human tissue. A muffled "thump" from the closet confirms Clemens's presence,
    leading to his sheepish but defiant discovery by Data and Guinan. This act establishes
    the immediate threat, the crew's operational challenges, and Clemens's determined,
    if misguided, interference.
  key_moments: []
  scene_numbers:
