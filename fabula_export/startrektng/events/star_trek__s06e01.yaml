  title: Picard learns Devidian destruction risks annihilation
  description: 'In a cavern on 19th-century Earth, Picard confronts the mortally wounded
    Alien Nurse, who phases erratically between human and Devidian forms. He attempts
    to negotiate, offering alternatives to their neural-energy harvesting, but she
    reveals their predation is a biological imperative with no substitute. When Picard
    discloses Starfleet’s plan to destroy the Devidian transport site on Devidia Two,
    the Nurse warns that their weapons will amplify time distortion, risking the annihilation
    of Earth’s timeline. Her cryptic warning—delivered with grim certainty—leaves
    Picard grappling with the moral and tactical consequences of their mission. The
    exchange forces him to confront the paradox: stopping the Devidians may require
    sacrificing the very timeline they’re trying to preserve. The Nurse’s disappearance
    underscores the urgency of the dilemma, as Picard is left to process the existential
    stakes of their next move.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e01
  scene_sequence: 26
  sequence_in_scene: 46
  key_dialogue:
  - 'PICARD: Can you communicate?'
  - 'ALIEN NURSE: Yes...'
  - 'PICARD: Are you injured?'
  - 'ALIEN NURSE: Why have you interfered?'
  - 'PICARD: You hunt us... you kill us. We cannot allow that.'
  - 'ALIEN NURSE: We need your energy...'
  - 'PICARD: Perhaps we could find a substitute...'
  - 'ALIEN NURSE: No... there is none... we must continue.'
  - 'PICARD: We cannot allow that. We know how you move back and forth through time...
    my crew has returned to the twenty-fourth century to destroy your transport site
    on Devidia Two—'
  - 'ALIEN NURSE: Destroy it?'
  - 'ALIEN NURSE: Your weapons will only amplify the time distortion... you will annihilate
    your own world...'
