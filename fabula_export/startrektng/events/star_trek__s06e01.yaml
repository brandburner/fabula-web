  description: With police closing in on the infirmary after Riker’s violent confrontation
    with the officer, the *Enterprise* crew flees into the streets of 19th-century
    San Francisco. Data, arriving in a horse-drawn carriage, provides an unexpected
    but timely escape route. The group quickly piles in, evading the pursuing officers
    as Data urges them to prioritize their mission over discretion. The high-speed
    chase underscores the crew’s vulnerability in this era and the escalating threat
    posed by the Devidians, whose interference with the timeline is tightening around
    them. The moment also highlights Data’s resourcefulness and the crew’s reliance
    on his unique abilities, even in a setting where he is physically limited. The
    carriage’s departure marks a turning point, shifting the crew from reactive defense
    to proactive evasion as they race to regroup and counter the Devidians’ plans.
