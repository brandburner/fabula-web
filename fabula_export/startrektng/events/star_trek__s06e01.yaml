  title: Crusher discovers Devidian neural harvesting
  description: "\n  In the dimly lit morgue of 19th-century San Francisco, Beverly\
    \ Crusher examines cholera victims using a tricorder, only to uncover a horrifying\
    \ pattern: their neural systems have been systematically drained of electrochemical\
    \ energy. Riker, standing beside her, immediately connects this to the Devidians'\
    \ predatory feeding habits, realizing the aliens are exploiting the cholera epidemic\
    \ as cover for their harvest. The revelation confirms the crew's worst suspicions—that\
    \ the Devidians are not just time travelers but active predators, using historical\
    \ suffering to sustain themselves. The discovery shifts the mission from investigation\
    \ to urgent intervention, as the crew now understands the full scale of the Devidians'\
    \ exploitation and the immediate threat to the timeline. The grim setting and\
    \ the clinical precision of Beverly's findings heighten the stakes, framing the\
    \ Devidians as a parasitic force that thrives on human misery across time.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e01
  scene_sequence: 2
  sequence_in_scene: 3
  key_dialogue:
  - 'RIKER: The coroner said this room contained all the cholera victims...'
  - 'BEVERLY: It doesn’t make sense that so many people are dying of cholera—it just
    isn’t that virulent.'
  - 'BEVERLY: The cerebral cortex... the cerebellum... the brain stem... the entire
    nervous system—has been drained of electrochemical energy.'
  - 'RIKER: Drained... and taken to Devidia Two... for those aliens to ingest.'
  - 'BEVERLY: I’d travel back to times when there were plagues and epidemics... when
    I could murder—and use disease as a cover.'
