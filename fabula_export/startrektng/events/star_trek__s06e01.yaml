  title: Data’s irreversible loss and Clemens’ reckoning
  description: "\n  In the medical lab, Geordi confirms Data’s restart units are permanently\
    \ damaged by time decay, rendering his recovery impossible with 24th-century technology.\
    \ The revelation forces Clemens to confront the fragility of both technology and\
    \ human memory—his own pocket watch, recovered from the cavern, is equally ruined\
    \ after centuries. The moment becomes a turning point for Clemens, whose skepticism\
    \ crumbles as he realizes the irreversible consequences of the Devidians’ temporal\
    \ predation. Troi’s empathic observation of his reaction underscores the emotional\
    \ weight of the scene: Clemens’ misjudgment of Data mirrors his broader failure\
    \ to grasp the stakes of the timeline’s collapse. The exchange is quiet but devastating,\
    \ marking the point where Clemens fully accepts the crew’s mission as his own.\n\
    \  "
