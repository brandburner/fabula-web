  global_id: null
  title: Beverly stalls aliens while covertly alerting the team
  description: "\n  In the infirmary, Beverly Crusher maintains a facade of professional\
    \ calm while secretly monitoring the alien Doctor and Nurse through her tricorder.\
    \ When a patient’s distress provides a natural distraction, she subtly signals\
    \ the away team via communicator after noticing the gas lamp’s blinking red light—a\
    \ prearranged distress signal. Her clinical demeanor masks urgency as she stalls\
    \ the aliens with medical jargon (citing Doctor Apollinaire’s diagnosis of a patient’s\
    \ ‘algid stage’) while covertly observing their suspicious artifacts: the Alien\
    \ Nurse’s satchel and the Alien Doctor’s snake-headed cane. The tension escalates\
    \ when the Nurse raises the satchel toward Beverly, but Riker’s timely arrival\
    \ with phasers forces the aliens into a desperate phase-shift escape. The confrontation\
    \ reveals the Devidians’ presence in the infirmary and confirms their neural energy\
    \ harvesting, but their sudden disappearance leaves the team stunned and the mission’s\
    \ urgency heightened. Beverly’s dual role as medic and covert operative underscores\
    \ the crew’s precarious balance between stealth and action in 19th-century San\
    \ Francisco.\n  "
