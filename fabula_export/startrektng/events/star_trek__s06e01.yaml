- fabula_uuid: cand_evt_scene_212e506c7bdb7e23_01
  global_id: null
  title: Riker Proposes One-Way Rescue Mission
  description: "\n  On the *Enterprise* bridge, Data and Geordi analyze Picard’s temporal\
    \ warning, revealing that modifying photon torpedoes to safely destroy the Devidian\
    \ habitat will require a two-hour delay. Riker seizes the opportunity to propose\
    \ a reckless one-way mission back to 19th-century San Francisco to rescue Picard,\
    \ despite Beverly’s warning that the temporal rift will only allow a single return.\
    \ The moment escalates when Samuel Clemens—having overheard the plan—volunteers\
    \ to take Picard’s place, sacrificing his future to ensure the captain’s survival.\
    \ Clemens’ decision, framed as the ‘right choice,’ underscores the crew’s moral\
    \ dilemma: preserving history or saving their captain. The exchange between Clemens\
    \ and Data reveals his transformation from skeptic to ally, while Riker’s impulsive\
    \ leadership exposes the crew’s desperation and the fragility of their timeline\
    \ intervention.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e01
  scene_sequence: 32
  sequence_in_scene: 56
  key_dialogue:
  - 'DATA: The binary message left by the Captain is not entirely clear. He seemed
    to be concerned about the phase differential of our photon torpedoes... that firing
    them might produce a catastrophic effect.'
  - 'RIKER: Fine. That''ll give me time to go get him.'
  - 'BEVERLY: My analysis of the phasers suggests you''d be able to open a rift...
    but it won''t be stable enough to transport more than one person.'
  - 'CLEMENS: I''m the one who should return to the nineteenth century, Commander...
    and remain there so your Captain can return.'
  - 'CLEMENS: For starting me on the greatest adventure a man''s ever had. For helping
    a bitter old man open his eyes... so he can see that the future turns out pretty
    well, after all.'
