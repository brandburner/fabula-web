  title: Riker begins covert alien surveillance
  description: "\n  Commander Riker, disguised as a 19th-century policeman, initiates\
    \ a low-key patrol outside the Sisters of Hope Infirmary to monitor for suspicious\
    \ activity linked to the Devidian aliens. His presence serves as the crew's first\
    \ direct attempt to gather intelligence on the aliens' movements while maintaining\
    \ their undercover presence in San Francisco. The patrol is a calculated risk—Riker's\
    \ uniform provides plausible cover, but any misstep could draw unwanted attention\
    \ from both the Devidians and the local authorities. His cordial interactions\
    \ with passersby mask his true purpose, reinforcing the crew's need to blend in\
    \ while gathering critical information. This moment establishes the tension between\
    \ overt surveillance and the necessity of remaining undetected, as the crew's\
    \ mission hinges on their ability to observe the Devidians without revealing their\
    \ own presence or altering the timeline.\n  "
