  key_dialogue: &id003
  - 'CLEMENS: Any place that doesn''t stock a good cigar doesn''t rank high in my
    book.'
  - 'TROI: If you must have one, I''m sure we could replicate it for you.'
  - 'CLEMENS: You think one of those—imitations—could take the place of a hand-wrapped
    Havana?'
  - 'TROI: I wouldn''t know...'
  - 'CLEMENS: That''s the problem I see here... all this technology... it only serves
    to take away life''s simple pleasures. You don''t even let a man open a door for
    a lady.'
  - 'TROI: I think what we''ve gained outweighs anything that might have been lost...'
  - 'CLEMENS: Oh? I''m not so impressed with this future... huge starships... weapons
    that can no doubt destroy entire cities... military conquest as a way of life.'
  - 'TROI: Is that what you see here?'
  - 'CLEMENS: Oh, I know what you say... this is a vessel of exploration... your mission
    is to discover new worlds...'
