- fabula_uuid: act_005d17b44bac6529
  number: 2
  summary: Act Two opens with Data retrieving the transceiver assembly from Clemens,
    who remains defiant, accusing Data and Guinan of a plot. Clemens reveals his extensive
    investigation into their false identities, exposing their inconsistencies and
    reaffirming his belief that they are dangerous time travelers intent on disrupting
    his era. He vows to stop them, exiting in a huff. Concurrently, Riker, Beverly,
    Troi, and Geordi infiltrate the Sisters of Hope Infirmary. Beverly, posing as
    a nurse, faces the condescending Dr. Apollinaire, who dismisses her advanced medical
    suggestions. Troi and Geordi, disguised as charity workers, gather intelligence
    from patients, learning of a "very bad doctor" and nurse who ignored suffering
    and frequented the bed of a recently deceased patient. Picard, disguised as a
    workman, plants a sensor device within a gas lamp. Geordi's VISOR detects residual
    triolic waves, confirming recent alien activity. The Alien Doctor and Nurse, the
    aristocratic couple, enter the ward, their ominous presence immediately signaled.
    Beverly, alerted by the blinking sensor light, attempts to stall them. Riker,
    Picard, Geordi, and Troi then confront the aliens, who phase out in a flash of
    blue energy, causing a commotion. Data, in his hotel room, registers the time
    shift on his device, pinpointing the aliens' new location. A legitimate policeman
    arrives at the infirmary, questioning the Enterprise crew's presence and Riker's
    identity. The policeman confiscates the alien's snake-head cane as evidence. Riker,
    prioritizing the mission, punches the officer, and the crew makes a hasty escape
    in Data's horse-drawn carriage, which Data has driven to their rescue, evading
    the converging authorities. This act escalates the conflict, forces the crew into
    direct confrontation, and highlights the immediate consequences of their interference
    with the timeline.
