  title: Crusher and Troi Uncover Infirmary Conspiracy
  description: "\n  Beverly Crusher and Deanna Troi infiltrate the Sisters of Hope\
    \ Infirmary undercover, posing as a nurse and a patient to investigate whispers\
    \ of a 'very bad doctor' linked to the Devidian neural-energy harvesters. Beverly’s\
    \ confrontation with the condescending Dr. Apollinaire exposes the stark contrast\
    \ between 19th-century medical practices and her advanced knowledge, creating\
    \ tension and suspicion. Meanwhile, Troi uses her empathic abilities to detect\
    \ the emotional signatures of the disguised Devidian nurse and doctor, uncovering\
    \ their sinister influence over the infirmary’s patients. The scene deepens the\
    \ crew’s understanding of the aliens’ local operations while raising the stakes\
    \ for their covert mission, as the Devidians’ presence becomes increasingly tangible\
    \ and threatening.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e01
  scene_sequence: 14
  sequence_in_scene: 25
  key_dialogue:
  - 'DR. APOLLINAIRE: ''Madam, your suggestions are not only unorthodox but border
    on the hysterical. Women have no place in the practice of medicine beyond tending
    to the sickbed.'''
  - 'BEVERLY CRUSHER: ''Doctor, I’ve seen more in my lifetime than you could imagine.
    Your methods are killing patients faster than the diseases you claim to treat.'''
  - 'DEANNA TROI: ''Geordi, did you hear that? The patients are terrified of someone
    called the "very bad doctor." It’s not just superstition—there’s real fear here.'''
  - 'GEORDI LA FORGE: ''And that nurse who just passed us? She’s not human. I’d bet
    my tricorder on it.'''
