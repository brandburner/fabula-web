  title: Data and Guinan uncover Clemens’ sabotage
  description: "\n  In Data’s hotel room, Samuel Clemens—using Jack the Bellboy’s\
    \ unwitting assistance—gains entry under the pretense of retrieving a fictional\
    \ 'Letter of Intent.' While Jack distracts Clemens with a plea to write his life\
    \ story, Clemens examines Data’s neural transceiver device, then surreptitiously\
    \ removes its critical assembly, disabling it. Moments later, Data and Guinan\
    \ arrive, with Guinan having secured access to the Presidio’s hidden cavern. Data\
    \ discovers the sabotage and deduces Clemens’ involvement, leading to a confrontation\
    \ where Clemens is exposed hiding in the armoire. The exchange reveals Clemens’\
    \ escalating interference in the crew’s mission, while Guinan’s reluctant but\
    \ vital role as a temporal bridge becomes clearer. The scene underscores Data’s\
    \ methodical urgency, Clemens’ defiant skepticism, and the crew’s race against\
    \ time to disrupt the Devidian harvest before the timeline is irreparably altered.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e01
  scene_sequence: 5
  sequence_in_scene: 11
  key_dialogue:
  - 'DATA: ''That is strange... I left this device activated... but the transceiver
    assembly has been removed... without it I will be unable to track the time shifts.'''
  - 'GUINAN: ''Clemens.'''
  - 'DATA: ''Samuel Clemens?'''
  - 'GUINAN: ''He''s been driving me crazy. He watches the house, follows me down
    the street asking questions—I''d bet you anything he got in here and took your—whatever
    you said.'''
  - 'DATA: ''If you are correct, he must be told that the device has been modified
    in such a way that prolonged contact with human tissue would be highly toxic.'''
