  title: Riker defies orders to save Picard
  description: 'In the Observation Lounge, Riker announces his intent to lead a rescue
    mission for Picard, overriding Beverly’s medical warnings about phaser risks and
    Worf’s tactical argument to prioritize destroying the Devidian habitat. The confrontation
    reveals Riker’s unwavering loyalty to Picard, but also exposes a fracture in the
    crew’s command structure. When Worf insists the mission’s priority is stopping
    the aliens, Riker hesitates—until Troi silently supports Worf’s stance, forcing
    Riker to reluctantly authorize photon torpedoes while still preparing to beam
    down. The moment underscores the crew’s moral dilemma: duty to the mission versus
    loyalty to their captain, with Riker’s decision revealing his struggle between
    leadership and personal devotion.'
