  title: Riker and Beverly report infirmary threat
  description: "\n  Riker and Beverly brief Picard, Troi, and Geordi on their discovery\
    \ that the Sisters of Hope Infirmary is a critical Devidian target, with over\
    \ half of the neural-energy-drained victims originating from there. This revelation\
    \ shifts the team’s focus to surveilling the location, as the aliens must be operating\
    \ in human disguise. Meanwhile, Riker’s attempt to contact Data via Geordi’s tricorder\
    \ fails due to limited range, exposing a critical operational constraint—the crew’s\
    \ inability to communicate with Data or the *Enterprise* in real time. The tension\
    \ escalates when Mrs. Carmichael interrupts, demanding overdue rent, forcing Picard\
    \ to improvise a cover story about a Shakespearean production to buy time. The\
    \ scene underscores the crew’s dual challenges: identifying the Devidians’ human\
    \ disguises and securing resources in 19th-century San Francisco, all while maintaining\
    \ their cover. The failure to contact Data also highlights the fragility of their\
    \ mission, as they lack critical intelligence and support from their android ally.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e01
  scene_sequence: 4
  sequence_in_scene: 8
  key_dialogue:
  - 'BEVERLY: Over half the victims who''d been drained of neural energy came from
    a place called Sisters of Hope Infirmary.'
  - |-
    RIKER: Any luck contacting Data?
    GEORDI: None. The tricorder is broadcasting random emissions... but the range is pretty limited. Almost anything could interfere...
  - |-
    MRS. CARMICHAEL: Mister Picard... I'd be remindin' you that it's one o'clock of a Thursday. The rent is always due, payable in full, by one o'clock on Wednesdays.
    PICARD: Mrs. Carmichael, my troupe is even now in rehearsals for a new production.
    MRS. CARMICHAEL: No, no, no... I'll have the rent in full... tomorrow... by one o'clock -- or you'll be performing on the street.
