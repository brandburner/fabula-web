- fabula_uuid: cand_evt_scene_1fdd2dad9b01a9d1_02
  global_id: null
  title: Data’s Body Discovered on Devidia
  description: "\n  After the violent transport to Devidia II, the away team—Riker,\
    \ Beverly, Troi, and Clemens—regains their bearings, only for Geordi to make a\
