    description_of_involvement: The Sisters of Hope Infirmary is the battleground
      where the Devidians’ predation and the away team’s intervention collide. Its
      gas lamps cast long shadows over rows of patient beds, creating an atmosphere
      of tension and urgency. The infirmary’s historical setting—carbolic acid, ether,
      and the scent of sickness—contrasts sharply with the crew’s advanced technology,
      grounding the confrontation in a time and place where they are outsiders. The
      location’s neutrality is compromised by the Devidians’ presence, turning a place
      of healing into a hunting ground. Patients’ reactions to the phaser blast and
      phase-shift amplify the chaos, making the infirmary a microcosm of the larger
      temporal conflict.
    observed_atmosphere: Tension-filled with whispered conversations, the scent of
      carbolic acid, and the flickering gas lamps casting long shadows. The air is
      thick with the weight of hidden threats and the crew’s urgent mission.
    functional_role: Battleground and covert operations hub—where the Devidians hunt,
      the away team intervenes, and the timeline hangs in the balance.
    symbolic_significance: Represents the fragility of human life and the moral dilemma
      of interfering in history to save it. The infirmary’s role as a place of healing
      is perverted by the Devidians’ predation, forcing the crew to confront the cost
      of their actions.
    access_restrictions: Open to patients and medical staff, but the away team’s presence
      is covert and unauthorized. The Devidians move freely, disguised as doctors
      and nurses.
    key_environmental_details:
    - Flickering gas lamps casting eerie shadows
    - Rows of iron bedframes with rumpled sheets
    - The scent of carbolic acid and ether
    - Whispers and labored breathing from patients
    - Broken glass from the Devidians’ phase-shift
    global_id: ger_location_73361b9ea26b
