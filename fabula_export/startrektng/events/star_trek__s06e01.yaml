    methods is most irregular."'
  - 'BEVERLY: "Doctor, I’ve seen cases like this before. The patient’s symptoms suggest
    a condition far beyond what 19th-century medicine can address. You must trust
    me."'
  - 'PICARD: (whispering into his comm badge) "La Forge, the sensor just spiked—we’ve
    got them. Stand by."'
  - 'ALIEN NURSE: (hissing, as blue energy flickers) "You meddle in affairs you do
    not understand. This will not end well for you."'
