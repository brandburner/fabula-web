  title: Riker’s Violent Confrontation with Police
  description: "\n  Outside the Victorian boarding house, Riker’s patience finally\
    \ snaps when a suspicious policeman challenges his identity and seizes alien evidence—likely\
    \ the Devidian cane or other incriminating tech. The confrontation escalates violently\
    \ as Riker punches the officer, a decision driven by his instinct to protect the\
    \ mission and the crew’s cover. The abrupt violence forces the team to abandon\
    \ their boarding house hideout immediately, fleeing in Data’s carriage to avoid\
    \ further exposure. This moment marks a critical turning point: the crew’s discretion\
    \ is now compromised, and their presence in 19th-century San Francisco is no longer\
    \ covert. The incident risks deeper timeline disruption, as the policeman’s injuries\
    \ and the crew’s sudden departure could alter historical records. Riker’s impulsive\
    \ action reflects his frustration with the mission’s constraints and his willingness\
    \ to prioritize the greater goal—stopping the Devidians—over short-term consequences.\
    \ The scene underscores the tension between the crew’s need for secrecy and their\
    \ urgency to act, while also foreshadowing the escalating stakes of their temporal\
    \ interference.\n  "
