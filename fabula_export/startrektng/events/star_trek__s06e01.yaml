      \ modification into phase-discriminator-equipped weapons introduces a critical\
      \ two-hour delay. This delay creates the narrow window for Riker’s impulsive\
      \ rescue plan and, ultimately, Clemens’ sacrifice. The torpedoes are not physically\
      \ present in this scene, but their absence—represented by the crew’s urgent\
