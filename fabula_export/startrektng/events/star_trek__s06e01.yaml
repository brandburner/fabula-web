    description_of_involvement: 'The **transceiver assembly** lies discarded on the
      floor at the scene’s outset, a silent testament to Clemens’ earlier sabotage.
      Though not directly handled during this confrontation, its absence looms large—symbolizing
      the crew’s severed link to the *Enterprise* and their vulnerability in 19th-century
      San Francisco. Clemens’ theft of this component earlier in the episode (off-screen)
      is the catalyst for his current investigative aggression, as he now wields his
      knowledge of its importance to pressure Data and Guinan. The object’s physical
      state—scattered, inert—mirrors the crew’s precarious position: cut off, exposed,
      and at the mercy of Clemens’ paranoia.'
    status_before_event: Lying on the floor of Data’s room, detached from the time-shift
      device (stolen earlier by Clemens).
    status_after_event: Remains on the floor, unchanged but symbolically critical—its
      absence is the reason the crew cannot call for help.
    global_id: ger_object_482682a9cd0a
  - object_uuid: ger_object_cf3225e52bb5
    description_of_involvement: 'The **time-shift device**—or what remains of it—serves
      as the focal point of Clemens’ accusations, the ''infernal technology'' he claims
      will harm the 19th century. Though physically intact (minus its stolen transceiver),
      its presence in Data’s room is damning evidence. Clemens circles it like a predator,
      his finger hovering near its gears as he demands an explanation. Data’s desperate
      rebranding of it as a ''horseless carriage'' gearing system only fuels Clemens’
      skepticism, as the device’s advanced design clashes violently with the era’s
      technological norms. The object’s role is twofold: as a **MacGuffin** driving
      the confrontation and as a **symbol of anachronistic danger**, embodying Clemens’
      fear of progress and the crew’s desperation to conceal their origins.'
    status_before_event: Partially dismantled (transceiver stolen), sitting in Data’s
      room as a half-functional prototype.
    status_after_event: Physically unchanged but now explicitly labeled as 'infernal'
