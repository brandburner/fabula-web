  title: Picard excludes Data from away team
  description: On the *Enterprise* bridge, Data detects triolic waves and temporal
    disturbances matching the Devidia II cavern signature, confirming a direct link
    to his severed head’s discovery. Picard orders an away team to investigate, but
    Riker deliberately omits Data, signaling unspoken concerns about his vulnerability.
    Data, sensing the exclusion, challenges Picard’s decision, forcing a private confrontation
    where Picard’s paternalistic fears surface—his refusal stems not from protocol
    but from a deep-seated need to shield Data from harm tied to his own past. The
    moment exposes the tension between Picard’s emotional protectiveness and Data’s
    logical insistence on facing his predetermined fate, setting up their later conflict
    in the ready room. The scene underscores the crew’s growing unease about Data’s
    role in the temporal anomaly and Picard’s struggle to reconcile command with personal
    attachment.
