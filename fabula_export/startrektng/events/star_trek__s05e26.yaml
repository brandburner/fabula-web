      the crew’s *contained* but *intense* deliberations. The space is both a sanctuary
      (protected from the planet’s chaos) and a pressure cooker, where every word
      and glance is amplified. The bridge’s *sterility* contrasts with the emotional
      weight of Riker’s report, making the human crisis feel even more urgent. Picard’s
      chair is the fulcrum of the scene, the point where logic (Data) and emotion
      (Riker/Troi) collide. The bridge’s *isolation* from the planet’s surface also
      mirrors the crew’s dilemma: they are *removed* from the suffering but *responsible*
      for it.'
