- fabula_uuid: cand_evt_scene_3fc2649eacd015f7_03
  global_id: null
  title: Data's severed head reveals temporal paradox
  description: "\n  In a dimly lit underground cavern on Devidia II, Picard and Data\
    \ follow a scientist through a tunnel lined with mining lights. The scientist\
    \ reveals a collection of late 19th-century artifacts—bifocals, a pocket watch,\
    \ a pistol—suggesting human presence in the cavern centuries earlier. Data identifies\
    \ the items with precision, confirming their era. The scientist then reveals the\
    \ source of interference with their equipment: triolic waves, an alien energy\
    \ signature. As Picard questions why the *Enterprise* was summoned for this discovery,\
    \ the scientist leads them to a second tarp, which he pulls back to reveal Data’s\
    \ own severed head—aged, broken at the neck, and preserved for centuries. The\
    \ discovery forces Picard into stunned silence and Data into a moment of detached\
    \ curiosity, while the scientist’s grim expression underscores the gravity of\
    \ the temporal paradox now confronting them. This revelation not only exposes\
    \ the alien threat but also sets up Data’s inevitable confrontation with his own\
    \ mortality and the crew’s emotional reckoning with time and fate.\n  "
