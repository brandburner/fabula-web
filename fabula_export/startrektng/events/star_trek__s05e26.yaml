  title: Picard excludes Data from away team
  description: On the *Enterprise* bridge, Data detects triolic waves and temporal
    anomalies matching the Devidian signature, confirming a direct link to his own
    severed head found in the 19th-century cavern. Picard orders an away team to investigate
    the planet’s surface, but Riker deliberately omits Data from the mission—an exclusion
    that immediately signals tension. Data, sensing the unspoken rationale, requests
    a private conversation with Picard, forcing the captain to confront his paternalistic
    concerns about Data’s vulnerability. The moment underscores the crew’s growing
    unease about Data’s predetermined fate and the mission’s escalating stakes, while
    also revealing Riker’s protective instincts and Picard’s reluctance to acknowledge
    Data’s agency in his own crisis. The scene pivots from scientific discovery to
    interpersonal conflict, setting up Data’s eventual confrontation with his own
    mortality and the crew’s fractured responses to it.
