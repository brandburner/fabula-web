  title: Aliens Consume Human Life Essence
  description: "\n  The away team—Riker, Troi, Geordi, Worf, and Beverly—finalizes\
    \ the setup of a subspace field generator on Devidia II’s surface, preparing to\
    \ phase into an alien dimension. As Geordi activates the field, the team is bathed\
    \ in blue light, revealing a group of silver-gray, featureless aliens arranged\
    \ in a circle around a translucent chamber. The chamber dispenses glowing energy\
    \ segments, which the aliens ingest through blowholes in their foreheads. Troi,\
    \ overwhelmed by empathic impressions, realizes the energy is derived from human\
    \ life essence, imprinted with terror. The revelation is cut short when two additional\
    \ aliens arrive through a temporal vortex, delivering more stolen human energy\
    \ and a live ophidian specimen. The team, horrified, watches as the aliens feed\
    \ before Picard leads them into the vortex in pursuit, marking a critical escalation\
    \ in the mission’s stakes and urgency.\n  "
