- fabula_uuid: cand_evt_scene_4a6525eb5b3e2780_02
  global_id: null
  title: Data forces entry to confront Guinan
  description: "\n  Data, disguised as a 19th-century gentleman, attempts to enter\
    \ a literary reception to speak with Guinan, but the doorman blocks his access\
    \ due to his absence from the guest list. When Data insists on entry, the doorman\
    \ threatens to call the police, prompting Data to physically overpower him—dragging\
    \ the man inside despite his protests. The violent disruption draws the attention\
    \ of Guinan and Samuel Clemens, who are mid-conversation about humanity's place\
    \ in the cosmos. Data, undeterred by social norms, approaches Guinan and declares\
    \ their urgent need to speak, revealing his true identity as an android from the\
    \ 24th century. Guinan, initially confused, quickly recognizes the gravity of\
    \ his claims and the need for discretion, pulling him aside to continue their\
    \ conversation privately. Clemens, however, overhears their exchange, leaving\
    \ him suspicious and intrigued by Data's impossible assertions. The scene escalates\
    \ from a social confrontation to a moment of temporal revelation, foreshadowing\
    \ the alien threat and the disruption of time itself.\n  "
