  title: Data’s Transmission Vanishes Mid-Report
  description: "\n  The away team on Devidia II watches as Data activates a cloaking\
    \ device to investigate the silver-gray energy-consuming aliens. His voice transmits\
    \ real-time observations—describing the creatures’ appearance, their feeding apparatus,\
    \ and the ophidian lifeform they’ve captured—until a sudden temporal disturbance\
    \ disrupts the signal. A sonic boom and swirling vortex erupt, cutting off Data’s\
    \ transmission mid-sentence. When the crew rushes to his last known coordinates,\
    \ they find only his abandoned generator and hand control, confirming his abrupt\
    \ and unexplained disappearance. The moment marks the first tangible evidence\
    \ of temporal displacement, escalating the mystery of Data’s fate and the alien\
    \ threat’s true nature. Picard’s reaction—silent but charged with urgency—signals\
    \ the crew’s shift from investigation to crisis mode, while Geordi’s whispered\
    \ plea for Data’s return underscores the personal stakes beneath the scientific\
    \ inquiry.\n  "
