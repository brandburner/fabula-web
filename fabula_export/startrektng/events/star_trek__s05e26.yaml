    without...'
  - 'DATA: Emotion, sir?'
  - 'DATA: I am quite certain that it is, Captain.'
  - 'DATA: At some future date, I will be transported back to nineteenth century Earth...
    where I will die. It has occurred. It will occur.'
  - 'RIKER: Not if we can help it.'
  - 'DATA: There is nothing anyone can do to prevent it, sir.'
