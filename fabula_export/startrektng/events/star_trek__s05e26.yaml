  scene_sequence: 4
  sequence_in_scene: 8
  key_dialogue:
  - |-
    GEORDI: So... do you feel like talking about it?
    DATA: Are you referring to the foreknowledge of my death?
    GEORDI: Yeah.
    DATA: I have no particular desire to discuss the matter. Do you feel like talking about it?
    GEORDI: Yeah.
    DATA: Why?
    GEORDI: Data... it's gotta bother you a little...
  - |-
    GEORDI: They found Data's head a mile below San Francisco... been down there for five centuries...
    GUINAN: That's why the Enterprise was sent back to Earth... I didn't realize...
    GEORDI: Yeah, something, isn't it?
    GUINAN: Full circle.
  - |-
    DATA: I find it rather... comforting.
    GEORDI: Comforting...
    DATA: I have often wondered about my own mortality as I have seen others age around me... Until now, it has been theoretically possible that I would live an unlimited period of time. And although some might find this attractive, to me it only reinforces the fact that I am... artificial.
