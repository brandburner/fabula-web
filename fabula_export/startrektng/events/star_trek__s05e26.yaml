  title: Data conceals strength while bonding with Jack
  description: 'Data, now fully immersed in 19th-century San Francisco, tests the
    limits of his human disguise when the bellboy Jack delivers an anvil to his hotel
    room. Data casually lifts the anvil with android strength—only to feign strain
    and drop it, realizing his mistake. Jack, initially exhausted from hauling the
    anvil, becomes fascinated by Data’s mysterious device, mistaking it for a horseless
    carriage motor. Their exchange reveals Jack’s entrepreneurial ambition and his
    belief in the American Dream, while Data’s calculated responses expose his duality:
    an alien observer pretending to be human. The moment plants the seeds for a future
    partnership, as Jack eagerly proposes they collaborate to sell Data’s invention.
    Meanwhile, Data’s discovery of Guinan’s photograph in the newspaper—hidden beneath
    the pastry—hints at a deeper temporal paradox, though the revelation is deferred
    until the next scene. The interaction underscores Data’s struggle to navigate
    human ambition while concealing his true nature, setting up future conflicts and
    alliances in his mission to stop the alien threat.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e26
  scene_sequence: 18
  sequence_in_scene: 31
  key_dialogue:
  - |-
    BELLBOY: Sorry it took so long, Mister Data.
    DATA: An apology is not required.
    BELLBOY: You alright?
    DATA: I appear to have overexerted myself...
  - |-
    BELLBOY: What are you gonna do with the anvil?
    DATA: I require a low intensity, magnetic field core. The iron mass of the anvil will provide that.
    BELLBOY: What's it gonna be when it's finished?
    DATA: What do you think it is... 'gonna be'... ?
    BELLBOY: If I were to guess... maybe a new kind of motor for one of those horseless carriages...
  - |-
    BELLBOY: Some day my ship's gonna come in... I'm just biding my time til it gets here... raising a stake any way I can... Can't stay in one place too long... I'm always looking for the angle, you know... say, maybe you and I could go into business selling your horseless carriage... you invent 'em, I sell 'em... I can sell anybody anything, whattaya say?
    DATA: I believe your plan is a bit premature.
