      actions. The organization’s protocols—specifically the expectation that the
      second officer accompany the away team—are the catalyst for Data’s challenge.
      Starfleet’s emphasis on logic, procedure, and the greater good is embodied in
      Data’s arguments, while Picard’s deviation from protocol reflects the human
      element that Starfleet often struggles to accommodate. The tension between these
      two approaches mirrors Starfleet’s own internal conflict: the balance between
      rigid structure and adaptive humanity.'
    active_representation: Via institutional protocol (Starfleet’s established procedures
      for away team assignments) and through the collective values of its officers
      (Data’s adherence to logic vs. Picard’s emotional attachment).
