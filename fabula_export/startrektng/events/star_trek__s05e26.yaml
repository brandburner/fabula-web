- fabula_uuid: cand_evt_scene_5afd39fd7940ef1f_01
  global_id: null
  title: Data confronts Guinan at literary reception
  description: "\n  Disguised as a 19th-century gentleman, Data forcibly enters a\
    \ literary reception in San Francisco, where he locates Guinan—his future crewmate\
    \ from the *Enterprise*—amidst a gathering of intellectuals. Their exchange is\
    \ charged with unspoken tension: Data reveals his android nature and their shared\
    \ future, while Guinan responds with cryptic warnings about the 'ophidian' threat\
    \ and the fragility of human life. Their conversation is overheard by Samuel Clemens,\
    \ who grows increasingly skeptical of Data's impossible claims, foreshadowing\
    \ the escalating distrust between the time-displaced crew and the era's inhabitants.\
    \ The scene underscores Data's desperation to alter his predetermined fate while\
    \ highlighting Guinan's role as a temporal anchor. The confrontation also introduces\
    \ Clemens as a potential antagonist, whose cynicism could disrupt the crew's mission.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e26
  scene_sequence: 21
  sequence_in_scene: 38
  key_dialogue: &id029
  - 'DATA: "Guinan. I have traveled a long way to find you."'
  - 'GUINAN: "And yet, you are not where you belong. The threads of time are tangled,
    Data. You must not unravel them further."'
  - 'SAMUEL CLEMENS: "Forgive me, but I couldn’t help overhearing. You claim to be
    from the future, sir? And this... lady... knows of it?"'
