  key_dialogue:
  - |-
    DATA: Pardon me. I am searching for two individuals with an ophidian.
    ROUGHNECK: ((to partner; re: Data)) Frenchman.
  - |-
    DATA: I would be happy to do so. However, I am presently in need of information.
    BEGGAR: A snake? You're an odd fellow, aren't you?
  - |-
    DATA: You require medical attention. I will find a doctor.
    BEGGAR: No. It's too late for that...
