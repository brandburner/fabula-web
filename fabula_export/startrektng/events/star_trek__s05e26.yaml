    what_happened: 'Data moves through the 1893 San Francisco street with deliberate,
      unnatural precision, his golden eyes scanning the crowd as he attempts to gather
      intelligence about the ophidian aliens. His inquiry—phrased in clinical, anachronistic
      terms—immediately draws mockery from the dock workers, who laugh at his ''Frenchman''
