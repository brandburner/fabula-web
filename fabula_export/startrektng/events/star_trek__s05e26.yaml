    they have four limbs... no eyes or ears are noticeable... there is a single orifice
    where a humanoid forehead would ordinarily be. They are reclined against the rockface...
    surrounding an apparatus of some sort... approximately one-point-five meters in
    height...'
  - 'DATA: ((breaking up)) ...temporal... massive... the ophidian is capable of...
    Caught... attempting to...'
