  title: Data reveals his android nature to Guinan
  description: At a 19th-century literary reception in San Francisco, Data—disguised
    as a human—confronts Guinan, who recognizes him as a crewmate from the *Enterprise*.
    Their conversation begins with Guinan’s initial skepticism, but Data’s precise,
    unemotional revelations about his android nature and future origins force her
    to acknowledge the truth. The exchange escalates when Samuel Clemens, a cynical
    observer, overhears Data’s claims and grows increasingly suspicious, creating
    a direct threat to the mission’s secrecy. Guinan’s recognition of Data as a crewmate
    from the *Enterprise* is a pivotal moment, as it confirms the temporal paradox
    and raises the stakes for Data’s concealment in this era. The scene hinges on
    the tension between Data’s logical detachment and Guinan’s intuitive understanding
    of the temporal anomaly, while Clemens’ skepticism introduces an external threat
    to the mission’s secrecy. The event serves as a turning point, as it forces Data
    to confront the consequences of his presence in the past and sets up future conflicts
    with Clemens, who now questions Data’s sanity and the nature of his claims.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e26
  scene_sequence: 19
  sequence_in_scene: 33
  key_dialogue:
  - 'DATA: ''Guinan, I am Data. I am an android from the 24th century. I serve aboard
    the starship *Enterprise*.'''
  - 'GUINAN: ''You’re telling me you’re from the future? And that I know you?'''
  - 'DATA: ''Yes. You are a crewmate. You serve aboard the *Enterprise* as well. You
    are a bartender.'''
  - 'CLEMENS: ''An android? From the future? My dear sir, you must think me a fool.'''
  - 'GUINAN: ''Samuel, he’s telling the truth. I don’t know how, but I *know* him.'''
