- fabula_uuid: cand_evt_scene_5afd39fd7940ef1f_03
  global_id: null
  title: Picard leads team into temporal vortex
  description: "\n  The away team—Picard, Riker, Troi, Geordi, and Beverly—stands\
    \ on the surface of Devidia II, having just witnessed the horrifying truth: the\
    \ aliens are systematically harvesting human life essence, consuming terrified\
    \ biomagnetic imprints of victims. The scene is charged with visceral dread as\
    \ Troi’s empathic senses confirm the suffering of countless souls trapped in the\
    \ alien dimension. Geordi’s equipment reveals the temporal vortex as a swirling,\
    \ unstable gateway, its edges flickering with the same triolic energy that once\
    \ consumed Data’s head. Picard, his face set in grim resolve, recognizes this\
    \ as the only path forward—the aliens must be confronted directly to stop their\
    \ temporal predation. He dismisses Worf from the team, a calculated move to minimize\
    \ risk, and orders the others to prepare for insertion. The team hesitates—Riker’s\
    \ jaw tightens, Beverly’s fingers twitch toward her medical tricorder—but Picard’s\
    \ authority brooks no argument. As Geordi activates the subspace field, the vortex\
    \ pulses violently, its maw widening like a living thing. The team steps forward,\
    \ their silhouettes swallowed by the shimmering distortion. The moment they cross\
    \ the threshold, the scene cuts to static—then silence. The Enterprise crew is\
    \ now fully committed to the temporal crisis, their fates intertwined with the\
    \ aliens’ harvest and the ophidian’s arrival. The stakes could not be higher:\
    \ failure means not just their deaths, but the erasure of countless human souls\
    \ from time itself.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e26
  scene_sequence: 21
  sequence_in_scene: 40
  key_dialogue:
  - 'PICARD: "We go in. Now."'
  - 'RIKER: "Jean-Luc, we don’t even know what’s on the other side of that thing."'
  - 'PICARD: "We know enough. They’re taking lives. Human lives. And we’re going to
    stop them."'
  - 'TROI: "Captain… I can still feel them. The ones they’ve already taken. They’re
    terrified. Trapped."'
  - 'GEORDI: "Subspace field is stable. But I can’t guarantee it’ll stay that way
    once we’re through."'
  - 'PICARD: "Then we move fast. Worf, you’re dismissed. Return to the *Enterprise*."'
  - 'WORF: "Captain, with respect—"'
  - 'PICARD: "That’s an order, Lieutenant."'
