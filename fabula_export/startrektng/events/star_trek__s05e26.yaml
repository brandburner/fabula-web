- fabula_uuid: cand_evt_scene_8d76d0b2a52ae5f2_02
  global_id: null
  title: Data’s return interrupts Troi’s revelation
  description: 'In a quiet corridor, Deanna Troi attempts to process Riker’s repressed
    grief over Data’s severed head by framing their bond through Data’s own abstract
    definition of friendship—‘sensory input patterns’ that become ‘missed when absent.’
    Her impersonation of Data’s voice and the emotional weight of her analogy (‘like
    finding out someone you love has a terminal illness’) force Riker to confront
    his denial. Just as Troi reaches the crux of her point, the turbolift doors open
    to reveal Data standing inside, alive and unharmed. The abruptness of his appearance
    halts the conversation mid-breath, leaving an uneasy silence. Riker’s quick, awkward
    greeting (‘Data…’) and Data’s measured response (‘Counselor. Commander.’) underscore
    the narrative’s instability: Data’s return is unexplained, his survival unaddressed,
    and the crew’s unresolved trauma now collides with his physical presence. The
    moment forces characters and audience alike to question the timeline’s integrity
    and the emotional cost of Data’s existence—both as a friend and as a paradox.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e26
  scene_sequence: 5
  sequence_in_scene: 11
  key_dialogue: &id007
  - |-
    TROI: I heard about Data.
    RIKER: Yeah.
    TROI: It's having an unusually traumatic effect on everyone.
    RIKER: Yeah.
    TROI: Maybe it reminds us all of our own mortality.
  - |-
    TROI: (Data impression) As I experience certain sensory input patterns my mental pathways become accustomed to them. The inputs eventually are anticipated and even 'missed' when absent.
    RIKER: You do that very well. So what's the point?
    TROI: He's 'used' to us... and we're 'used' to him... it's like finding out someone you love has a terminal illness and...
  - |-
    RIKER: Data...
    DATA: Counselor. Commander.
