      design.
    goals:
    - Sustain operational integrity despite temporal interference
    - Serve as a stable platform for the crew’s efforts to resolve the crisis
    what_happened: "\n        The Enterprise itself is a silent but vital participant,\
      \ its systems humming with latent power as it hovers in orbit. The ship’s sensors\
      \ strain against the temporal interference, their readings flickering like a\
      \ dying signal. The bridge’s ambient noise—the beeps of consoles, the murmur\
      \ of crew chatter—creates a symphony of controlled chaos. The ship’s presence\
      \ is both a shield and a reminder: it is the crew’s home, their last tether\
      \ to the future they know. Yet its very existence in this moment is a paradox,\
      \ a relic of a timeline that may no longer be stable. The Enterprise does not\
      \ ‘act’ in a conventional sense, but its operational state—disrupted yet functional—mirrors\
      \ the crew’s own struggle to maintain coherence in the face of temporal collapse.\n\
      \      "
