- fabula_uuid: cand_evt_scene_3fc2649eacd015f7_01
  global_id: null
  title: Data’s Head Discovered in 19th-Century Cavern
  description: "\n  In a dimly lit underground cavern on Devidia II, Picard and Data\
    \ follow a scientist who reveals a collection of 19th-century artifacts—bifocals,\
    \ a Colt pistol, and a pocket watch engraved with the date 1889—suggesting a direct\
    \ temporal link to Data’s past. The scientist explains that triolic waves, an\
    \ alien energy signature, have altered the cavern’s rockface, confirming extraterrestrial\
    \ interference. When Picard questions why the *Enterprise* was summoned, the scientist\
    \ leads them to a tarp-covered object. As it’s uncovered, Picard and Data react\
    \ with shock: it’s Data’s severed head, preserved and dusty, its neck broken.\
    \ The discovery implicates the cavern as a nexus of alien temporal manipulation,\
    \ deepening the mystery of how Data’s head ended up in the 19th century and foreshadowing\
    \ his impending temporal displacement.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e26
  scene_sequence: 2
  sequence_in_scene: 2
  key_dialogue:
  - 'SCIENTIST: The crew was having a problem with the regulators... something in
    the cavern was interfering with the phase conditioners... it turned out to be
    the cavern itself... do you have a tricorder, Commander?'
  - 'DATA: The composition of the exposed rockface has been altered by exposure to
    triolic waves...'
  - 'SCIENTIST: Which you''re not going to find on Earth... in either the nineteenth
    or twenty-fourth century...'
  - 'PICARD: I''m curious, Doctor. There are far greater experts on Earth who could
    investigate your mystery. Why bring the *Enterprise* all the way home?'
  - 'SCIENTIST: As we continued our excavation, we found one other thing I haven''t
    shown you yet...'
  is_flashback: false
  location_uuid: ger_location_1f36e9ea9a2a
  theme_uuids: []
  arc_uuids:
  - ger_conflictarc_2e9b3fab8d10
  participations:
  - character_uuid: ger_agent_34d1672d75c4
    emotional_state: A weary resolve—he has already processed the shock of this find
      and is now focused on ensuring Picard and Data grasp its significance, his demeanor
      a mix of grim duty and intellectual detachment.
    goals:
    - To ensure Picard and Data fully comprehend the temporal and extraterrestrial
      implications of the severed head, tying it to the triolic waves and 19th-century
      artifacts.
    - To maintain his professional composure, even as he confronts the unsettling
