      his closest friends.
    - To communicate his emotional attachment to Riker, despite the crew's ambivalence
      about his humanity.
    what_happened: "\n        Data stands motionless in the confined turbolift, his\
      \ golden eyes reflecting the dim overhead lighting as he turns to face Riker\
      \ and Troi. His posture is erect, hands clasped behind his back—a posture of\
      \ quiet authority, but his voice carries an unusual hesitance as he frames his\
      \ inquiry as 'personal.' When Troi and Riker's reactions confirm his observation,\
