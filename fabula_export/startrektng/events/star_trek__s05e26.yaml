      \ with dust that swirls as the tarp is pulled back, adding to the sense of unease.\
      \ The cavern’s isolation amplifies the horror of the discovery, reinforcing\
      \ that this is a place untouched by time, where the laws of nature have been\
      \ suspended. Its role is to contain the mystery, to force the characters to\
      \ confront the impossible in a space that feels both ancient and alien.\n  \
