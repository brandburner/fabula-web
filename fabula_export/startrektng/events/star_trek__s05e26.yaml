  title: Data discovers Guinan in newspaper
  description: In his 19th-century hotel room, Data—now fully immersed in his disguise—works
    on a phaser prototype built from scavenged materials when Jack, the bellboy, delivers
    an anvil and a newspaper. Data’s android strength is accidentally revealed when
    he lifts the anvil effortlessly, forcing him to feign injury to maintain his human
    facade. Jack, oblivious to Data’s true nature, reveals his entrepreneurial ambitions
    and hints at a shared future business venture, exposing Data’s unintended influence
    on the boy’s aspirations. As Data dismisses the idea, Jack leaves the newspaper
    behind, which Data casually moves aside—only to freeze upon seeing Guinan’s photograph
    in a literary reception announcement. The discovery triggers a profound, silent
    reaction, marking the first tangible evidence of her existence in this timeline
    and forcing Data to confront the paradox of her presence. The moment shifts the
    narrative from survival and invention to a deeper existential crisis, as Guinan’s
    impossible existence threatens to unravel Data’s understanding of time, causality,
    and his own mission.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e26
  scene_sequence: 18
  sequence_in_scene: 32
  key_dialogue:
  - |-
    BELLBOY: Sorry it took so long, Mister Data.
    DATA: An apology is not required.
  - |-
    BELLBOY: You alright?
    DATA: I appear to have overexerted myself...
  - |-
    BELLBOY: Some day my ship's gonna come in... I'm just biding my time til it gets here... raising a stake any way I can... I've been a newsie, cut fish at a cannery, I've even been an oyster pirate...
    DATA: That is a considerable spectrum of occupations.
  - |-
    BELLBOY: Maybe you and I could go into business selling your horseless carriage... you invent 'em, I sell 'em... I can sell anybody anything, whattaya say?
    DATA: I believe your plan is a bit premature.
