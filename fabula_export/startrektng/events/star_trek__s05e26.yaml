  key_dialogue:
  - 'DATA: Sir, it is established procedure that the second officer accompanies the
    away...'
  - 'PICARD: I see no reason why we shouldn''t take reasonable precautions...'
  - 'DATA: Captain, no disrespect intended, but there is no rational justification
    for such a course...'
  - 'PICARD: Then, I shall be irrational.'
  - 'DATA: It is possible, sir, that the events leading to my death may not begin
    for years... even centuries.'
  - 'PICARD: I hope that''s true, Data. Nevertheless, this investigation began with
    your death... I am simply trying to see that it doesn’t end the same way.'
  - 'DATA: While I appreciate your concern, sir, if I may employ an aphorism, one
    cannot cheat fate.'
  - 'PICARD: Cheat fate...? Perhaps we can''t, Mister Data. But, to be honest, I don’t
    think I could forgive myself... if we didn’t at least give it a try.'
