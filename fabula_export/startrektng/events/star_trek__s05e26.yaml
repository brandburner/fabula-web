acts:
- fabula_uuid: act_f676463b1c9fbdda
  number: 0
  summary: 'The Enterprise is recalled to Earth for a priority mission concerning
    extraterrestrial activity five centuries prior. Captain Picard and Commander Data
    investigate an underground cavern where mining crews discovered remarkable 19th-century
    artifacts. Data identifies the items, including a pistol and a pocket watch engraved
    with ''To S.L.C., with love. 30 November, 1889.'' The scientist leading the excavation
    explains that triolic waves, a byproduct of an energy source harmful to humanoids,
    were interfering with their equipment, indicating a non-Earth origin for the activity.
    The cavern has been sealed for centuries, deepening the mystery. The scientist
    then reveals the most shocking discovery: Data''s own severed head, dusty and
    aged, broken at the neck. This revelation immediately establishes the central
    conflict and the personal stakes for Data, setting up a temporal paradox where
    his future demise is already a historical fact.'
  key_moments: []
  scene_numbers:
  - 1
  - 2
  - 3
- fabula_uuid: act_735be9aa6c42e6e6
  number: 1
  summary: Following the discovery, the Enterprise crew analyzes Data's head. Data
    confirms it is his, noting decomposition consistent with a five-hundred-year termination,
    and dispassionately accepts his predetermined death, finding a sense of completion
    in mortality, which unnerves Geordi. Geordi's analysis of the triolic waves suggests
    the aliens possess microcentrum cell membranes, potentially making them shapeshifters.
    He also identifies a unique cellular fossil, LB-10445, native only to Devidia
    Two, prompting Picard to set a course for that system. Picard, concerned for Data's
    safety, explicitly excludes him from the away team, despite Data's protests about
    standard procedure. Data argues against Picard's 'irrational' decision to try
    and 'cheat fate,' but Picard insists on taking precautions. On the planet's surface,
    the away team (Riker, Troi, Worf, Geordi) encounters a natural rockface environment
    emanating triolic waves. Troi senses dozens, possibly hundreds, of terrified human
    lifeforms, out of phase with their reality, intensifying the mystery and the immediate
    threat.
  key_moments: []
  scene_numbers:
  - 4
  - 5
  - 6
- fabula_uuid: act_18cdcffb06aeff64
  number: 2
  summary: On the planet, the away team reports their findings to Picard. Data explains
    that the lifeforms are experiencing a synchronic distortion, making them invisible
    and out of phase by a fraction of a second. Geordi realizes they need an incredibly
    sensitive phase discriminator, and Data reveals his positronic decompiler contains
    the necessary device. Data insists on joining the away team, and Picard, recognizing
    the futility of trying to prevent Data's destiny, reluctantly agrees. On the surface,
    Data prepares his equipment, creating a subspace forcefield that renders him invisible
    but allows verbal communication via a delayed com system. He enters the distorted
    area, observing silver-gray entities, two to three meters tall, ingesting energy
    fragments from a glowing holding facility. He also spots an ophidian restricted
    by a forcefield. Suddenly, a massive temporal disruption occurs with a sonic boom
    and swirling noise. Data's voice breaks up, and he vanishes. The away team finds
    only his generator and hand control, confirming his disappearance. Data then materializes
    in a quiet alley, disoriented, only to discover he is in 1890s San Francisco,
    confirming his temporal displacement.
  key_moments: []
  scene_numbers:
  - 7
  - 8
  - 9
- fabula_uuid: act_5c64730c7210f9f2
  number: 3
  summary: Data navigates the bustling streets of 19th-century San Francisco, learning
    the date is August 13, 1893, from a newspaper. He attempts to find 'two individuals
    with an ophidian,' but his precise speech and unusual appearance are met with
    amusement and confusion by locals, including a dying beggar. Lacking money, Data
    seeks lodging and employment at a hotel. He quickly demonstrates his exceptional
    mental and physical capabilities by winning a poker game against seasoned gamblers,
    earning a significant sum. He befriends the bellboy, Jack, and uses his winnings
    to acquire various materials for an unknown invention, commissioning Jack to procure
    them. Later, Jack passes the same dying beggar Data encountered earlier. An elegantly
    dressed, aristocratic couple, revealed to be the silver-gray aliens in human form,
    approach the beggar. Using a valise, the woman extracts the beggar's life energy,
    leaving him cold and dead. This confirms the aliens' malevolent purpose and their
    connection to the events that brought Data to the past.
  key_moments: []
  scene_numbers:
  - 10
  - 11
  - 12
- fabula_uuid: act_c59d351e424b7250
  number: 4
  summary: Back on the Enterprise, Picard addresses the emotional toll of Data's presumed
    death, asserting that the mission's priority is to understand and counter the
    alien threat to 19th-century Earth. Riker, however, argues that Data is likely
    investigating the situation in the past and finding him could be crucial to the
    mission. Geordi begins the challenging task of constructing a new subspace field
    generator, acknowledging its limitations compared to Data's. Picard insists on
    a field large enough for a full away team, preventing anyone from going alone.
    Later, Guinan approaches Picard in Ten Forward, exhibiting unusual urgency. She
    insists that Picard *must* accompany the next away team, implying a critical temporal
    link to their past interactions by demonstrating a complex drink instantly boiling
    away, signifying that if he doesn't go, their meeting 'didn't' happen. Meanwhile,
    in 1890s San Francisco, Data, now in period clothing, works on his invention using
    the acquired materials. He accidentally reveals his android strength by effortlessly
    lifting a heavy anvil, startling Jack, the bellboy. Jack, impressed, proposes
    a business partnership, revealing his entrepreneurial spirit and past as an 'oyster
    pirate.' Data then discovers a newspaper advertisement for a literary reception,
    featuring a photograph of Guinan, stunning him with her unexpected presence in
    the past, setting the stage for their reunion.
  key_moments: []
  scene_numbers:
  - 13
  - 14
  - 15
- fabula_uuid: act_9de388562af85e1c
  number: 5
  summary: Data attends the literary reception, now dressed as a 19th-century gentleman.
    He confronts Guinan, who does not recognize him, forcing Data to reveal his origins
    from the future and their shared service on the Enterprise. Samuel Clemens, present
    at the reception, overhears their conversation, becoming a suspicious witness
    to Data's extraordinary claims. Meanwhile, on the planet, the Enterprise away
    team (Picard, Riker, Troi, Geordi, Beverly) prepares the subspace field. Picard,
    convinced by Guinan's warning, dismisses Worf to the bridge, asserting his imperative
    presence on the team. Geordi activates the field, bringing them into phase with
    the aliens. They observe the silver-gray entities consuming biomagnetic energy
    segments from a translucent holding chamber. Troi realizes these segments are
    not lifeforms, but 'imprints' of terrified human life essence. Two more aliens
    arrive through a swirling white temporal vortex, bringing a canister of new 'segments'
    and the ophidian. Riker realizes they are delivering more human essences for consumption.
    Picard, understanding the full horror and the immediate threat, leads the away
    team into the swirling white light of the temporal vortex, following the aliens
    and the ophidian, disappearing with a 'To Be Continued' message, setting up the
    next part of the adventure.
