  title: Away team discovers alien life essence harvest
  description: |2-

    The Away Team materializes on Devidia II and immediately encounters a cavernous chamber where translucent, serpentine aliens are consuming terrified human life essences—delivered through a temporal vortex. The chamber is bathed in eerie bioluminescent light, and the air hums with the energy of the vortex, which pulses like a living organism. Picard, driven by moral outrage and the urgency of stopping the temporal threat, orders the team to prepare for pursuit. Troi senses the agony of the trapped life essences, confirming the aliens are feeding on human suffering. Geordi’s scans reveal the vortex is unstable, but Picard dismisses Worf from the final away team, insisting on leading the charge himself. The team’s discovery of this ritualistic consumption escalates the stakes, tying the alien threat to Data’s temporal mission and forcing Picard to confront the moral weight of his leadership. The scene ends with the team poised to enter the vortex, creating a cliffhanger that underscores the immediacy of the threat and the high cost of failure.
