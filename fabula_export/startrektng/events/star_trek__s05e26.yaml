  title: Troi forces Riker to confront Data’s loss
  description: In a quiet corridor, Deanna Troi intercepts Riker as he attempts to
    avoid the turbolift, sensing his repressed grief over Data’s severed head. She
    gently probes his emotional state, first meeting his denial with patience before
    naming his anger—an admission he resists but ultimately concedes. Troi then shifts
    the conversation to Data’s abstract definition of friendship, framing it as a
    metaphor for human attachment and loss. The moment is abruptly interrupted when
    Data himself materializes in the turbolift, his sudden reappearance cutting off
    Troi’s analogy mid-sentence. The tension lingers in the silence that follows,
    as Riker’s forced acknowledgment of his emotions clashes with Data’s physical
    presence, underscoring the unresolved trauma and the crew’s collective denial
    of mortality. This exchange marks a turning point in Riker’s arc, where his avoidance
    of grief gives way to raw vulnerability, setting the stage for his eventual confrontation
    with Data’s fate.
