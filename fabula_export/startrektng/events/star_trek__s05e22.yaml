  title: Geordi reassures Sutter about nomadic childhoods
  description: In Engineering, Geordi La Forge and Sutter collaborate on nebula sample
    collection when Sutter tentatively broaches Geordi’s Starfleet upbringing, revealing
    his concern about Clara’s stability amid her bond with Isabella. Geordi shares
    his own nomadic childhood—shuttling between his exozoologist father’s fieldwork
    and his mother’s command postings—framing it as an adventure rather than disruption.
    His reassurance (‘Kids are tougher than you think’) subtly addresses Sutter’s
    unspoken fear that Clara’s imaginary friend (now revealed as an alien threat)
    is destabilizing her. The exchange humanizes Geordi’s professionalism, contrasts
    his rooted Starfleet identity with his transient upbringing, and foreshadows the
    crew’s protective instincts toward Clara, which will later prove critical in resolving
    the alien’s misunderstanding of human nature. The moment also underscores Geordi’s
    empathy, positioning him as a bridge between Sutter’s parental anxiety and the
    broader crew dynamic.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e22
  scene_sequence: 14
  sequence_in_scene: 22
  key_dialogue:
  - 'SUTTER: I understand... that you had a parent in Starfleet.'
  - 'GEORDI: Two of them, as a matter of fact. My father was an exozoologist... my
    mother a command officer. They were always on the move... some of the time together,
    some times separately... I never knew if I was going to be stationed with my dad
    while he studied invertebrates in the Modean system... or with my mom on some
    outpost near the Neutral Zone.'
  - 'GEORDI: I guess there were things about my childhood that weren''t ideal... but
    to me, it was like one long adventure. Kids are tougher than you think. As long
    as they know you love them... they can handle just about anything life throws
    at them.'
