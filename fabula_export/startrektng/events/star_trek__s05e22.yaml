  title: Troi proposes real-world socialization for Clara
  description: 'In Sutter’s quarters, Counselor Troi confronts Lieutenant Sutter about
    Clara’s escalating reliance on Isabella, the alien entity posing as her imaginary
    friend. Troi reveals her concern that Clara is blaming inappropriate behavior—like
    visiting engineering unsupervised—on Isabella, signaling the alien’s growing psychological
    influence. Troi suggests a practical intervention: enrolling Clara in a ceramics
    class at the Children’s Center to foster real-world socialization. Sutter, initially
    alarmed by Clara’s actions, warms to the idea, expressing gratitude for Troi’s
    guidance. The exchange underscores the urgency of separating Clara from Isabella’s
    manipulative presence, setting up the alien’s inevitable reaction to Clara’s absence
    and foreshadowing the energy crisis that will follow. Troi’s proposal also subtly
    critiques Sutter’s passive parenting, urging him to be more emotionally available
    to his daughter rather than relying on external solutions like Isabella.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e22
  scene_sequence: 18
  sequence_in_scene: 29
  key_dialogue:
  - 'TROI: I''m a little concerned about the turn this is taking. It seems Clara is
    starting to do inappropriate things... and she''s blaming them on Isabella.'
  - 'SUTTER: She came into engineering today... and said it was Isabella''s idea.'
  - 'TROI: I don''t think it''s too serious yet. But we should make more of an effort
    to get her involved with real friends her own age. The Children''s Center is having
    a ceramics class this afternoon. Why don''t I take Clara?'
  - 'TROI: In the meantime, make yourself available to Clara. Let her know she doesn''t
    have to rely on Isabella when she needs someone to talk to.'
