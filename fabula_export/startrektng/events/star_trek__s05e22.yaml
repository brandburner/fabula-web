acts:
- fabula_uuid: act_a289173cf032b1cb
  number: 1
  summary: 'Clara Sutter, a seven-year-old girl, maintains an imaginary friend named
    Isabella, a detail her concerned father, Daniel, discusses with Counselor Troi.
    Troi reassures Daniel that such imaginary play is normal, suggesting it might
    be a coping mechanism for Clara''s frequent moves between starships. Concurrently,
    the Enterprise arrives at the FGC-four-seven nebula, and an energy being in the
    form of a tiny point of light infiltrates the ship. This light explores various
    sections, observing crew members like Data, Geordi, Beverly, and Ogawa, before
    merging with a flower in the arboretum, creating a duplicate. The light then enters
    Clara''s head, and Isabella materializes as a real girl, exactly as Clara described
    her, albeit with an unsettling, expressionless demeanor. Isabella immediately
    displays a demanding and persuasive nature, leading Clara to explore the ship
    against rules, even disrupting Engineering. Simultaneously, the Enterprise experiences
    unexplained impacts and drops in forward velocity, which mysteriously correct
    themselves, baffling the crew. This act establishes the dual narrative threads:
    the growing influence of the alien Isabella on Clara and the mysterious, unsettling
    phenomena affecting the ship, hinting at a deeper connection between the two.
    The act concludes with Isabella''s casual acknowledgment of her actions, further
    cementing her manipulative nature and the mystery surrounding her true purpose.'
  key_moments: []
