  title: Troi questions severing Clara’s bond
  description: 'In Ten Forward, Troi sits alone with an untouched slice of chocolate
    cake, visibly distracted as she traces absentminded patterns on the table. Guinan
    interrupts her reverie, noting Troi’s preoccupation and gently probing the source:
    Clara’s imaginary friend, Isabella. Troi confesses her moral dilemma—whether separating
    Clara from Isabella will protect the child or rob her of something irreplaceable,
    a fragment of childhood innocence. Guinan counters with a personal revelation:
    her own enduring bond with a Tarcassian razor beast, an imaginary friend that
    evolved from a tangible presence into a quiet, internalized source of comfort.
    The exchange forces Troi to confront her fear of severing Clara’s connection,
    framing the act not as a loss but as a natural transition. Their conversation
    is abruptly cut short when Sutter pages Troi to his quarters, signaling an escalation
    in Clara’s crisis. The scene crystallizes Troi’s conflict between professional
    duty and emotional intuition, with Guinan’s wisdom serving as a catalyst for Troi’s
    reckoning with vulnerability and trust.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e22
  scene_sequence: 28
  sequence_in_scene: 48
  key_dialogue:
  - 'GUINAN: Something wrong with the cake?'
  - 'TROI: I''m just... wondering... if I''m doing the right thing.'
  - 'GUINAN: I don''t know about that. I was just telling Clara about my imaginary
    friend.'
  - 'GUINAN: You don''t ever have to lose your imaginary friend. If it''s something
    you need in your life -- it''ll be there. It just might not be called an imaginary
    friend anymore.'
  - 'SUTTER''S COM VOICE: Ensign Sutter to Counselor Troi. Would you come to my quarters?
    I''m having a problem with Clara.'
