  description: "\n  In the corridor outside Engineering, Clara exits alone, her curiosity\
    \ about the ship’s systems still lingering. Isabella abruptly materializes behind\
    \ her, startling Clara with her sudden appearance. Clara confronts Isabella about\
    \ her erratic disappearances, and Isabella reveals the precarious nature of her\
    \ existence: she can only manifest when no adults are present, as their disbelief\
    \ renders her invisible. This admission underscores Isabella’s vulnerability—her\
    \ reality is contingent on Clara’s belief—and hints at the alien’s growing desperation\
    \ to avoid detection. When Isabella senses Sutter’s approach, she vanishes abruptly,\
    \ leaving Clara alone. The exchange deepens Clara’s understanding of Isabella’s\
    \ alien nature while reinforcing the fragility of their bond, which now hinges\
    \ entirely on Clara’s unwavering belief.\n  "
