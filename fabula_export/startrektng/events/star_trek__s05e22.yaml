    \ directly challenging Isabella’s influence. Clara’s physical reactions (leaning\
    \ in to listen, whispering to avoid Isabella overhearing) reveal the entity’s\
    \ psychological grip on her, while Troi’s escalating concern (from mild reproach\
    \ to urgent insistence) underscores the growing threat. The moment crystallizes\
    \ Isabella’s hostility toward adults and Clara’s complicity in the alien’s manipulation.\
    \ Troi’s failure to assert control here foreshadows the crew’s broader vulnerability\
    \ to Isabella’s influence, while Clara’s discomfort highlights the child’s internal\
