  participations:
  - character_uuid: ger_agent_163ed2a7fc49
    emotional_state: A whirlwind of raw, childlike terror and heartbreak—Clara’s trust
      in Isabella, the one constant in her young life, is shattered, leaving her emotionally
      exposed and physically frozen in place. Her fear is not just for herself but
      for the entire crew, amplifying her helplessness.
    goals:
    - To understand why Isabella has turned against her and hurt her friend, seeking
      some semblance of logic or fairness in the betrayal.
    - To survive the confrontation and escape Isabella’s wrath, though her fear paralyzes
      her ability to act.
    what_happened: Clara enters the arboretum in a state of emotional turmoil, her
      small frame trembling as she collapses into the clearing where she had been
      planting seeds—a place once associated with hope and simplicity. She curls into
      herself, crying softly, her tear-streaked face a canvas of confusion and betrayal.
      When Isabella approaches, Clara’s initial anger at the alien’s cruelty toward
      her friend quickly gives way to fear as Isabella’s demeanor grows increasingly
      menacing. Clara recoils physically as Isabella looms over her, the child’s wide-eyed
      terror palpable as the alien’s true nature is revealed through glowing red eyes
      and a voice laced with malice. Clara’s emotional state oscillates between disbelief,
      anger, and sheer terror as Isabella delivers her death threat, leaving Clara
      stunned and paralyzed by the horror of the moment.
