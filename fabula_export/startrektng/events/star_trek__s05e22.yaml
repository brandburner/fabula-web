    - To overcome her fear enough to re-enter her room and confront Isabella, with
      Troi’s support
    what_happened: Clara sits pale and quiet in her nightclothes, her small frame
      radiating fear. She shivers at the memory of Isabella’s threats, confirming
      to Troi that the entity is no longer imaginary but physically present and has
      threatened to bring 'others' to kill the crew. Though visibly terrified, she
      agrees to enter her room with Troi, showing fragile trust in the counselor’s
      protection. Her childlike sincerity and the specificity of her claims ('they
      were going to come and kill everyone') force Troi to confront the reality of
      the threat.
