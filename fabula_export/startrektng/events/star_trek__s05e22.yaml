  title: Troi confirms Isabella’s violent nature
  description: 'In Sickbay, a weakened Troi describes her attacker—a blonde girl matching
    Isabella’s appearance—to Picard and Sutter. Beverly reveals Troi’s bioelectrical
    energy was drained, confirming the alien’s hostile capabilities. Sutter discloses
    Clara’s earlier warnings about Isabella’s threats and the arrival of ''others''
    who intend to kill the crew. Picard, now certain of the entity’s physical presence
    and violent intent, escalates the alert by contacting Worf, who confirms seeing
    the same girl near Engineering. The exchange shifts the narrative from psychological
    speculation to concrete threat, forcing the crew to acknowledge the alien’s dual
    nature as both Clara’s imaginary friend and a lethal force. This moment bridges
    Troi’s personal trauma with the ship’s broader crisis, while Sutter’s revelation
    about Clara’s foreknowledge adds urgency: the child has been aware of the danger
    all along, yet no one listened until now.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e22
  scene_sequence: 31
  sequence_in_scene: 55
  key_dialogue:
  - 'TROI: She was eleven, maybe twelve... with blonde hair... Clara...'
  - 'SUTTER: Captain... Clara told me her imaginary friend was making threats. She
    claimed that others were on the way... and that they were going to kill everyone
    on the ship.'
  - 'BEVERLY: Her bioelectrical processes were severely disrupted. It''s like the
    energy was pulled right out of her body.'
  - 'WORF: ... and a blue dress? Yes sir, I have seen her.'
