  title: Isabella materializes in the arboretum
  description: "\n  Clara, alone in the arboretum, plants seeds while humming to her\
    \ imaginary friend Isabella. A sentient point of light—an energy being from the\
    \ nebula—enters Clara’s head, scanning her mind before materializing as a physical\
    \ manifestation of Isabella. The alien appears identical to Clara’s childhood\
    \ memories but with an unsettling, expressionless demeanor. Clara, astonished,\
    \ recognizes her immediately, but Isabella’s cold, insistent presence quickly\
    \ reveals her otherworldly nature. When Clara hesitates to leave the arboretum,\
    \ Isabella takes her hand and persuades her to abandon her task, steering her\
    \ toward exploring the ship. The exchange underscores Isabella’s alien intelligence\
    \ and her ability to manipulate Clara’s trust, foreshadowing the energy being’s\
    \ growing influence over the ship and its crew.\n  "
