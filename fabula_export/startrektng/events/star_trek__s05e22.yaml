  key_dialogue:
  - 'RIKER: Any luck?'
  - 'GEORDI: Yeah -- take a look at this... We tried radiating the matter sample with
    just about everything we could think of. We didn’t find anything... until we subjected
    it to a high frequency warp field...'
  - 'GEORDI: This may be what we’ve been running into...'
  - 'RIKER: Anything like this on record?'
  - 'GEORDI: No.'
  - 'RIKER: Any idea how many more of these there might be?'
  - 'GEORDI: No. But if we run the warp field generators through the deflector grid,
    we could radiate a field outside the ship.'
  - 'RIKER: ... and we’d see for ourselves. Let’s do it.'
