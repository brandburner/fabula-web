  title: Isabella sabotages Clara’s friendship
  description: "\n  In the daycare center, Clara and Alexander—who have just finished\
    \ crafting a clay cup together—are bonding over shared stories. Their moment of\
    \ connection is abruptly shattered when Isabella, Clara’s invisible alien companion,\
    \ sabotages their work by knocking over a block of clay into the cup, destroying\
    \ it. Alexander, believing Clara is responsible, accuses her of lying and cruelty.\
    \ When Clara insists Isabella did it, Alexander dismisses the claim as impossible.\
    \ Isabella’s hostility escalates when she hurls a lump of clay at Alexander, physically\
    \ striking him. Clara, horrified and defensive, flees the room as the confrontation\
    \ spirals, marking a turning point in Isabella’s growing hostility toward human\
    \ relationships and Clara’s struggle to reconcile her loyalty to her alien friend\
    \ with her need for human connection.\n  "
