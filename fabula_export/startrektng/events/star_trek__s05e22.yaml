    the alien entity the moment she materializes in the *Enterprise*’s corridor. Isabella’s
    evasive response—‘There was something I had to do’—hints at her growing autonomy
    and hidden agenda, while her immediate physical claim on Clara (seizing her hand)
    underscores the alien’s manipulative control over their relationship. The abrupt,
    wordless departure of the pair signals Isabella’s escalating dominance and Clara’s
    passive compliance, foreshadowing the alien’s predatory influence over the ship’s
    systems and crew. This moment crystallizes the tension between Clara’s vulnerability
    and Isabella’s enigmatic, potentially hostile nature, marking a turning point
    where the alien’s presence shifts from mysterious to actively threatening. The
    fade-out reinforces the unresolved stakes, leaving the crew—and the audience—unaware
    of Isabella’s true intentions or the extent of her power.
