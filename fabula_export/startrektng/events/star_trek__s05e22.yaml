- fabula_uuid: cand_evt_scene_2bc354e024fb9c47_02
  global_id: null
  title: Isabella Judges Humanity’s Cruelty
  description: "\n  In the *Enterprise*’s arboretum, Picard and the adults confront\
    \ Isabella—the alien energy being manifesting as Clara’s imaginary friend—after\
    \ she materializes in response to Clara’s plea. The ship’s shields are failing\
    \ under Isabella’s energy drain, and Picard, recognizing her as the source of\
    \ the attack, attempts to reason with her. Isabella reveals her mission: to assess\
    \ humanity’s worthiness by examining their treatment of Clara, which she deems\
    \ cruel due to the restrictions placed on the child. Picard reframes these restrictions\
    \ as protective, arguing that human rules for children stem from care, not malice.\
    \ Clara’s heartfelt plea—‘Please don’t hurt us’—and her offer of friendship soften\
    \ Isabella, who wavers before dematerializing, leaving the ship’s fate momentarily\
    \ uncertain. The exchange forces Isabella to confront the gap between her alien\
    \ perspective and human values, while Picard’s appeal stakes the *Enterprise*’s\
    \ survival on the idea that humanity’s protective instincts define its worth.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e22
  scene_sequence: 34
  sequence_in_scene: 62
  key_dialogue: &id035
  - 'PICARD: We know you''ve been on the ship for some time now. We know you''ve been
    posing as Clara''s friend—and that you''ve been threatening her... We can only
    assume there''s a connection between you and the life-forms attacking our ship.'
  - 'ISABELLA: You should be destroyed. You are cruel, uncaring creatures.'
  - 'PICARD: The way you treat Clara. In what way did we mistreat her? ISABELLA: You
    wouldn''t let her do what she wanted to... or go where she wanted to... PICARD:
    You mean where *you* wanted her to. ISABELLA: Why does that make a difference?'
  - 'PICARD: As adults, we don''t always stop to realize how everything we say and
    do shapes the impressions of young people. But if you are to judge us as a people
    by the way we treat our children... you must understand how deeply we care for
    them.'
  - 'CLARA: Please don''t hurt us. If you still want to be my best friend, I''d like
    it very much.'
