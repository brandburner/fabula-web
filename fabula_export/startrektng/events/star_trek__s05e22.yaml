    have a nice ring to it.'
  - 'SUTTER: Why don’t we call it... ''Sutter’s Cloud?'''
  - 'GEORDI: I was thinking more along the lines of ''The La Forge Nebula. Sounds
    sort of majestic, don’t you think?'''
  - 'DATA: Based on those selections, I would prefer FGC-four-seven.'
  - 'SUTTER: What was that?'
  - 'GEORDI: It felt like we hit something.'
  - 'DATA: Shields have registered an impact. But the sensors show nothing in the
    vicinity.'
