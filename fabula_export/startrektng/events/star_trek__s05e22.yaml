      \ patterns (fish, ship, bunny rabbit) sets up the scene’s central tension: *What\
      \ is real, and what is perceived?* The windows frame the nebula’s energies as\
      \ a backdrop to Clara’s emotional journey, its swirling forms echoing the unseen\
      \ nature of Isabella. The nebula’s randomness (to Data) vs. its meaningfulness\
      \ (to Guinan) mirrors the crew’s divided responses to the alien threat, while\
      \ the windows themselves become a metaphor for perception—what we choose to\
      \ see, and what we choose to believe in.\n      "
