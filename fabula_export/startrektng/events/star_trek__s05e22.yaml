  title: Clara reveals Isabella’s threat
  description: 'In Sutter’s quarters, Troi and Sutter discuss Clara’s escalating fear
    of Isabella, who has now threatened to bring ''others'' to harm the crew. Clara,
    visibly shaken, confirms the threat—''they were going to come and kill everyone''—while
    insisting Isabella is no longer imaginary but physically present. Troi, initially
    dismissive of the threat as a child’s imagination, is unsettled by Clara’s conviction
    and agrees to accompany her into her room to confront the entity. The exchange
    marks a critical shift: Troi’s professional skepticism collapses as Clara’s fear
    becomes tangible, forcing her to acknowledge the alien’s growing influence. The
    scene bridges psychological reassurance and physical danger, setting up the crew’s
    urgent need to address the threat before it escalates further.'
