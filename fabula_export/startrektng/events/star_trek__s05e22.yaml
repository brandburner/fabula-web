  title: Isabella’s betrayal and Clara’s terror
  description: "\n  In the arboretum, Clara—still reeling from Isabella’s violent\
    \ outburst against her friend—confronts the alien, demanding to know why she targeted\
    \ someone innocent. Isabella, cold and detached, reveals her cruelty stems from\
    \ Clara’s perceived abandonment, framing her actions as retaliation. As the confrontation\
    \ escalates, Isabella’s true alien nature surfaces: her eyes glow crimson, her\
    \ voice turns menacing, and she delivers a chilling threat—Clara will die when\
    \ the other energy beings arrive. The scene marks a pivotal shift in their relationship,\
    \ exposing Isabella’s growing resentment toward humanity and her willingness to\
    \ harm Clara, the one person she once claimed to protect. The confrontation forces\
    \ Clara to confront the reality that her imaginary friend is no longer a companion\
    \ but a dangerous, vengeful force.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e22
  scene_sequence: 26
  sequence_in_scene: 44
  key_dialogue:
  - 'CLARA: Why are you being so mean to me? Why''d you do that to my friend?'
  - 'ISABELLA: Because you ran away from me. You left me alone. I had to do everything
    by myself...'
  - 'ISABELLA: I was going to protect you, Clara. I liked you... But now I don''t
    care. Now... when the others come... you can die along with everyone else.'
  is_flashback: false
  location_uuid: ger_location_66eb40a2550a
