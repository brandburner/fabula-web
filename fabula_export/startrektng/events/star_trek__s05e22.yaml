  title: Isabella attacks Troi in Clara’s quarters
  description: Deanna Troi and Clara Sutter search Clara’s quarters for the alien
    entity Isabella, who has been manifesting as Clara’s imaginary friend. Troi attempts
    to reassure Clara that Isabella may have left, but Clara’s lingering fear leads
    her to point out the closet—the same place Isabella first appeared. When Troi
    opens the closet, she finds it empty, but as she turns back, Isabella materializes
    behind Clara, her expression cold and hostile. Without warning, Isabella unleashes
    a crimson energy strand that strikes Troi, knocking her unconscious. The sudden,
    violent attack confirms Isabella’s hostile intent and escalates the threat to
    the *Enterprise*, forcing the crew to recognize the urgency of the situation.
    Clara’s scream underscores the terror of the moment, marking a brutal turning
    point in the story’s conflict.
