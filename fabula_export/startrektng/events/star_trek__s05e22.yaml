      but calculated move—one that buys time but does not address the root cause.
      The engines'' strain to counteract the drag mirrors the crew''s own struggle:
      they can react, but they cannot yet understand or defeat the threat. The temporary
      stabilization of forward velocity is a pyrrhic victory, highlighting the nebula''s
      persistent, malevolent influence.'
