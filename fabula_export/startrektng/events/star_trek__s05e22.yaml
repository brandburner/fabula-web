  title: Picard confronts Isabella’s alien judgment
  description: "\n  In the *Enterprise*’s arboretum, Picard and the adults search\
    \ for Isabella after Clara’s desperate calls go unanswered. When the alien entity\
    \ finally materializes, she reveals her mission: to assess humanity’s threat level\
    \ and drain the ship’s energy. Picard challenges her cold assessment, arguing\
    \ that humanity’s protective instincts—like restricting Clara’s movements—are\
    \ rooted in care, not cruelty. The ship’s failing shields and flickering lights\
    \ underscore the urgency as Isabella accuses the crew of mistreating Clara. Picard\
    \ counters by framing adult rules as a continuum of protection, while Clara’s\
    \ plea—‘Please don’t hurt us’—and her offer of friendship soften Isabella’s resolve.\
    \ The alien’s hesitation and eventual dematerialization suggest a shift in her\
    \ judgment, though the ship’s instability lingers as a reminder of the unresolved\
    \ threat.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e22
