- fabula_uuid: cand_evt_scene_e7d7d12af5c06110_03
  global_id: null
  title: Clara and Troi bond over Isabella
  description: In Clara’s quarters, Counselor Troi engages the seven-year-old in a
    tea party for two—Clara and her invisible friend, Isabella. Troi skillfully validates
    Clara’s imaginary companion, describing her as 'real for you,' which reassures
    Clara while subtly probing the nature of their bond. Clara eagerly describes Isabella’s
    appearance (blonde hair, blue dress, pierced ears) and defends her taste in food
    (rejecting grape-juice omelettes). When Troi suggests drawing Isabella, Clara’s
    hesitation reveals her fear of being dismissed as childish. The exchange ends
    with Isabella ‘speaking’ to Troi through Clara, a moment that humanizes the alien
    entity before its true nature is revealed. Meanwhile, Clara’s father, Sutter,
    watches anxiously, voicing his concern that Clara isn’t making ‘real’ friends.
    Troi reframes Isabella as a stabilizing force in Clara’s transient Starfleet life,
    easing Sutter’s worry. This scene establishes the emotional core of Clara’s relationship
    with Isabella—one that will later collide with the alien’s hostile reality—while
    foreshadowing Troi’s eventual confrontation with the entity’s true nature. The
    nebula’s appearance in the background (via Picard’s log) ties the domestic moment
    to the looming external threat, creating narrative tension between Clara’s innocence
    and the danger Isabella represents.
