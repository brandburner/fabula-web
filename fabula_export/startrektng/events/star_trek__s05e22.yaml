  - location_uuid: ger_location_6997dd1e7cc4
    description_of_involvement: 'Ten Forward serves as a liminal space in this event—a
      place where the emotional and the rational, the childlike and the adult, converge.
      The lounge’s warm lighting, panoramic views of the nebula, and casual seating
      create an atmosphere of safety and openness, making it an ideal setting for
