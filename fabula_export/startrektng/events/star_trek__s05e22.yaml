      symbolizes the *Enterprise* as a microcosm of Starfleet—organized, disciplined,
      and under immense strain.
    access_restrictions: Restricted to senior officers and essential crew members
      during Red Alert. Ensign Felton's presence suggests that even junior personnel
      are expected to contribute in a crisis, though his role is secondary.
