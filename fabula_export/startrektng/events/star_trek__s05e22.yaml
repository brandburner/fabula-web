- fabula_uuid: act_5b376a32a09c31fd
  number: 3
  summary: 'As the Enterprise ventures deeper into the FGC-four-seven nebula, the
    ship experiences increasingly severe tremors and significant drops in forward
    velocity, indicating a worsening external threat. Geordi and Sutter, through their
    diligent investigation, discover the cause: the ship is running into highly cohesive
    plasma strands. By illuminating these strands, they reveal an incredible, complex
    latticework of energy surrounding the ship, confirming a pervasive, physical obstacle.
    Concurrently, Isabella''s alien rage, first glimpsed at the end of Act Two, intensifies
    and manifests as deliberate acts of sabotage and discord. She invisibly spills
    Troi''s hot chocolate, disrupting her work, and then, more dramatically, destroys
    Alexander''s ceramic cup at the Daycare Center, making it appear as if Clara is
    responsible. This act directly creates conflict between Clara and Alexander, leading
    to Alexander accusing Clara of lying and causing Clara to flee in distress. Frightened
    and confused, Clara retreats to the arboretum, where an enraged Isabella confronts
    her. During this confrontation, Isabella sheds her guise of a friendly imaginary
    companion, revealing her menacing true alien persona with glowing red eyes and
    explicitly threatening Clara and the entire ship, stating that ''when the others
    come... you can die along with everyone else.'' This climactic moment in the act
    fully exposes Isabella''s hostile intent and the immediate danger she poses.'
