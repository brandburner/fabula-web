  key_dialogue: &id029
  - 'SUTTER: She won''t even go into her room. She''s terrified ''Isabella'' is going
    to hurt her.'
  - 'CLARA: She said they were going to come and kill everyone. The others... like
    her.'
  - 'CLARA: But she''s not imaginary anymore. She''s real now. I can see her...'
