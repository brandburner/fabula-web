  title: Enterprise encounters invisible nebula threat
  description: The *Enterprise* detects escalating helium and trionium energy spikes
    within shield tolerance as it navigates the FGC-47 nebula. A violent, unexplained
    tremor rocks the ship, causing shields to register an impact despite no visible
    external cause. Forward velocity drops abruptly, forcing Picard to order an impulse
    engine power surge to stabilize the vessel. Data confirms the disturbance originates
    from the nebula, while Worf reports the drag coefficient has stabilized but remains
    unexplained. Picard directs Riker to consult Geordi about the nebula matter sample,
    signaling a shift from reactive measures to targeted investigation as the crew
    races to understand the alien entity's nature before it drains the ship's energy.
    The scene establishes the nebula's hostile, invisible threat and sets up the crew's
    scientific and strategic response to the escalating crisis.
