  title: Troi challenges Clara’s Isabella dilemma
  description: 'Deanna Troi, walking with Clara toward Ten Forward, subtly probes
    the girl’s relationship with Isabella, revealing the alien entity’s growing influence
    over Clara’s actions. Troi frames Isabella’s demands as morally questionable—‘wrong’—but
    Clara’s defensive response (‘I tried to. But she wouldn’t listen’) exposes the
    child’s helplessness in the face of Isabella’s dominance. The exchange underscores
    the precarious power dynamic between Clara and the entity, while Troi’s professional
    concern (mentioning Ten Forward’s adult-only policy) foreshadows the crew’s broader
    unease about Isabella’s destabilizing presence. The turbolift doors opening mark
    a physical transition but also a narrative threshold: Clara’s compliance with
    Isabella’s wishes is now being questioned by an authority figure, setting up future
    conflict over the entity’s control.'
