- fabula_uuid: cand_evt_scene_734512512335d0f4_01
  global_id: null
  title: Enterprise trapped in alien energy web
  description: |2

    The *Enterprise* slows to a near-stop as it becomes ensnared in a dense, previously undetected energy web—a phenomenon that disrupts its systems and triggers alarms. Picard arrives on the bridge to find the crew already in crisis: Riker reports a 22% speed reduction, Geordi warns of exponentially increasing strand density, and Worf detects an approaching object. The viewscreen reveals a swarm of crackling energy balls—later identified as sentient lifeforms—converging on the ship. As the first energy being makes contact, the shields begin draining rapidly, dropping from 75% to 64% in seconds. Data confirms the creatures are feeding off the shields, and remodulation attempts fail. The crew realizes this is no longer a scientific anomaly but a direct, hostile encounter with an alien intelligence. The tension escalates as Worf estimates eight minutes until total shield collapse, forcing Picard to confront the immediate threat while the crew scrambles for solutions. This moment marks the transition from passive observation to active defense, with the alien energy beings now positioned as an existential threat to the ship and crew.
