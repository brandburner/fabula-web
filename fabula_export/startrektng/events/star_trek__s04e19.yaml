  title: Barclay’s high-risk gambit cripples the ship
  description: Under extreme pressure, Barclay—now hyper-intelligent but unstable—unilaterally
    reroutes warp power to shields and orders a full spread of maximum-yield photon
    torpedoes to destroy the alien probe. Geordi, stunned by Barclay’s rapid calculations
    and unauthorized actions, confirms the shields can withstand the attack. Picard
    approves the maneuver, and the Enterprise fires, obliterating the probe but crippling
    the ship in the process. Barclay immediately apologizes for overstepping, but
    Geordi dismisses his self-recrimination, underscoring the crew’s fractured trust
    and the lingering threat of the probe’s destruction. The scene escalates the crisis
    by demonstrating Barclay’s newfound confidence and control, while also revealing
    the cost of his actions—both to the ship and to his relationship with Geordi.
    The tension between Barclay’s brilliance and his instability becomes a central
    conflict, as the crew grapples with the consequences of his decisions.
