- fabula_uuid: act_9a97d2ff1984bb5d
  number: 5
  summary: As the Enterprise is pulled into the rapidly forming warp tunnel, Picard
    orders Worf to take a security team to Holodeck Three and disconnect Barclay,
    implicitly accepting the risk to his life. Worf and his team are met with a powerful
    force field protecting Barclay, rendering their phasers useless. The ship is violently
    buffeted, and the Bridge crew experiences physical and auditory distortion as
    they hurtle through space. Data warns of imminent bio-cellular disruption. Suddenly,
    the ship bursts through the distortion, and all systems normalize. The crew discovers
    they have traveled thirty thousand light-years to the center of the galaxy. An
    alien holographic image appears on the viewscreen, observing and describing the
    crew. Barclay, now seemingly returned to his normal self, arrives on the Bridge,
    explaining that the Cytherians, the beings who sent the probe, have reintegrated
    him. He clarifies that the probe was an instruction device for contact, and the
    Cytherians, explorers who bring others to them, only desire an exchange of knowledge.
    With the crisis resolved, the Enterprise is returned to Federation space. In Ten-Forward,
    Barclay expresses a poignant melancholy over the loss of his enhanced intellect,
    feeling 'smaller.' Troi and Geordi reassure him that the experience has changed
    him in subtle ways he may not yet realize. As they leave, Barclay demonstrates
    a lingering effect of his transformation by accurately predicting checkmate in
    a chess game, despite claiming he does not play, hinting at a permanent, albeit
    understated, shift in his abilities.
