    - Through the ship’s institutional protocols and chain of command, which guide
      the crew’s response to the crisis.
    institutional_impact: The *Enterprise*’s involvement in this event highlights
      the tension between institutional duty and ethical responsibility. The crew’s
      failure to disconnect Barclay underscores the ship’s vulnerability to external
      threats and the moral dilemmas that arise when institutional protocols conflict
      with individual lives. The event forces the crew to confront the consequences
      of their actions and the high stakes of their choices, both for the ship and
      its mission.
    internal_dynamics: The internal dynamics of the *Enterprise* are characterized
      by a struggle between duty and ethics, as the crew grapples with the moral implications
      of their actions. Worf’s rigid adherence to protocol contrasts with Barclay’s
      detached acceptance of his fate, highlighting the ethical tensions within the
