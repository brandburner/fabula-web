- fabula_uuid: act_77a28352c7f9f18b
  number: 4
  summary: Picard, Riker, Geordi, and Worf confront Barclay in the holodeck, where
    he explains his higher brain functions and memory have transferred to the starboard
    computer core. He asserts that disconnecting him would result in his death, as
    his expanded consciousness can no longer fit within his human brain. The senior
    staff, now in a secure observation lounge, discusses the intolerable situation.
    Geordi confirms that separating Barclay from the computer would be fatal. Data
    proposes an ODN bypass to the Bridge to regain propulsion control, allowing them
    to reach a Starbase. Picard approves the plan, deciding against informing Barclay.
    As Geordi works on the bypass in a Jeffries Tube, Barclay's voice contacts him,
    describing his new perception of the universe as a single, simple equation, and
    expressing a belief that he has been 'chosen to fulfill a great purpose.' He reveals
    his intention to take the Enterprise to new, distant worlds by altering subspace.
    On the Bridge, Worf detects a subspace distortion emanating from the ship's nacelles.
    Barclay confirms he is responsible, overriding Picard's direct order to cease
    his experiment. Troi attempts to reason with him in the holodeck, but Barclay
    dismisses her concerns, stating she must trust his superior understanding. As
    Geordi completes the bypass, Barclay blocks it, and the Enterprise begins to be
    drawn into the rapidly intensifying subspace distortion, inexorably heading towards
    an unknown destination.
