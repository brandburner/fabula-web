    BARCLAY: Begin new program. Create as follows: Work station chair.
  - |-
    BARCLAY: Tie both consoles into the Enterprise main computer core, utilizing a neural scan interface.
    COMPUTER VOICE: There is no such device on file.
    BARCLAY: No problem. Here's how you build it...
  - 'BARCLAY: ... Now, an iconic display console positioned for right hand.'
