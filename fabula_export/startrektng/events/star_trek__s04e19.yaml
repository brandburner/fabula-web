      A full spread of maximum-yield photon torpedoes is fired at the alien probe, a high-risk maneuver given the close proximity of the *Enterprise*. The torpedoes detonate against the probe, destroying it in a cataclysmic explosion. However, the blast rocks the *Enterprise* violently, leaving the ship severely damaged. The torpedoes represent the crew's last resort, a gamble that pays off but at a significant cost. Their use underscores the desperation of the situation and the crew's willingness to risk everything to survive.
