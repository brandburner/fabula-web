  title: Picard conceals the ODN bypass plan
  description: In the Observation Lounge, Geordi La Forge reveals the irreversible
    fusion of Barclay’s consciousness with the *Enterprise*’s starboard computer core,
    making disconnection fatal. The senior staff—Picard, Riker, Worf, and Data—debate
    options, with Data proposing a risky ODN bypass to regain propulsion control.
    Picard, prioritizing the ship’s survival over Barclay’s life, orders the bypass
    without consulting Barclay, a decision that underscores the moral weight of command
    and the crew’s growing distrust of their transformed colleague. The scene escalates
    tension by framing Barclay as both a threat and a victim, while Picard’s secrecy
    foreshadows the ethical dilemmas of sacrificing one life for many.
