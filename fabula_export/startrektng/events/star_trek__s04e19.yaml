    description_of_involvement: The Argus Array is the distant but critical infrastructure
      at the heart of this crisis, its subspace antenna clusters and fusion reactors
      vulnerable to the cascading failure triggered by the probe. While not physically
      present in Engineering, its status is constantly monitored and referenced by
      the crew, particularly through Larson's reports of overload indications on generators
      Five, Seven, and Fourteen. The Array's instability serves as a metaphor for
      the *Enterprise*'s own fragility, as both systems are pushed to their limits
      by forces beyond the crew's immediate control. Barclay's frustration with the
      *Enterprise*'s computer systems is directly tied to his inability to stabilize
      the Array's reactors, highlighting the interconnectedness of the two infrastructures
      and the crew's desperate struggle to maintain order.
    status_before_event: The Argus Array is in a state of critical instability, with
      fusion reactors surging toward overload and subspace antenna clusters at risk
      of cascading failure. The crew's attempts to transmit shutdown commands and
      adjust liquid helium three intake have thus far failed to contain the crisis,
      and the Array's systems are teetering on the brink of catastrophic collapse.
    status_after_event: The Argus Array remains in a state of critical instability,
      with the cascade failure continuing unabated. The crew's efforts to stabilize
      the reactors have proven ineffective, and the Array's vulnerability is now directly
      threatening the *Enterprise*'s mission. The unnoticed departure of Barclay further
      exacerbates the situation, as his enhanced intellect could have been a critical
      resource in mitigating the crisis.
