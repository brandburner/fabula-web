    point two terawatts, and increasing.'
  - 'WORF: Sir, the shuttlecraft shields did not provide sufficient protection for
    its computer. Our computer may also be vulnerable. I recommend withdrawal to a
    safe distance.'
  - 'PICARD: Ensign Anaya, full about, go to one-half impulse.'
