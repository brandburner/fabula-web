      force field. Worf orders the team to fire at maximum setting, targeting the
      interface conduits above Barclay’s head. However, the force field absorbs the
      phaser blasts without effect, highlighting the futility of their efforts and
      the probe’s overwhelming control over the ship’s systems. The phasers serve
      as a symbolic representation of the crew’s desperate attempt to regain control,
      only to be thwarted by an unstoppable force.
    status_before_event: Functional and ready for use, stored in the phasers carried
      by Worf and the security officers. The phasers are fully charged and set to
      standard settings, awaiting deployment.
    status_after_event: Discharged and ineffective, as the force field absorbs all
      phaser fire without any visible damage. The phasers remain in the possession
      of Worf and the security officers but are rendered useless against the probe’s
      defenses.
