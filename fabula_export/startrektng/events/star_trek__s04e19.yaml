  title: Enterprise fails to evade rogue probe
  description: The *Enterprise* detects an unknown probe on a collision course with
    the ship, its propulsion system defying Starfleet’s understanding of physics.
    When Riker orders evasive maneuvers, the ship remains paralyzed—its systems locked
    in place by the probe’s interference. Picard’s command authority is immediately
    tested as the crew realizes the probe’s unnatural influence, forcing a confrontation
    with the ship’s sudden vulnerability. The moment underscores the crew’s helplessness
    against an unknown threat, setting up Barclay’s later role as the only potential
    solution to regain control of the ship. Worf’s tactical warning and Data’s analytical
    confusion heighten the tension, while Picard’s silent reaction reveals his growing
    unease about the probe’s origins and intentions. The scene shifts from routine
    alert to existential crisis as the crew grapples with the ship’s paralysis, a
    direct challenge to their ability to protect themselves and complete their mission.
