  global_id: null
  title: Reactor failure forces emergency warp jump
  description: |2-

      The bridge crew reacts to the catastrophic failure of the Argus Array reactors, with Geordi's dire warning over comms confirming the impending chain reaction. Data provides precise timing (10:43 until critical failure), while Riker and Picard immediately shift into crisis mode: Riker orders Red Alert and Worf triggers the ship-wide emergency protocols, while Picard commands Ensign Anaya to prepare for an emergency warp jump to warp 2. The scene escalates tension through rapid-fire commands and the visual/auditory impact of the Red Alert klaxons, establishing the stakes of the reactor crisis and the crew's coordinated but desperate response. The moment serves as both a turning point (the crew can no longer contain the problem) and a setup (forcing Barclay's later defiance and the ship's reckless departure).
