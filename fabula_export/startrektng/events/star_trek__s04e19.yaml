  key_dialogue: &id029
  - 'ALIEN: ((re: Worf''s action)) Emotive. Electro-chemical stimulus-response. Cranial
    plate.'
  - 'PICARD: I am Jean-Luc Picard, Captain of the Federation Starship Enterprise.'
  - 'ALIEN: ((aha!)) Hierarchical collective command structure!'
  - 'BARCLAY: The probe was designed to instruct outsiders on how to reach this system.
    But the technologies aren''t always compatible. It failed with the Argus computer,
    and with the computer on the shuttle. But it was able to reprogram... me.'
  - 'PICARD: What do you want of us?'
  - 'ALIEN: The same as you.'
  - 'BARCLAY: The Cytherians are exploring the galaxy just as we are... The difference
    is they never leave their home -- they bring others here. They only wish an exchange
    of knowledge... They want to know us.'
