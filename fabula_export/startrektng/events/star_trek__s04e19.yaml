    description_of_involvement: |2-

      The *Enterprise*'s main phasers are fired at maximum power in a desperate attempt to disable the alien probe. The beams strike the probe at point-blank range, but its energy field absorbs the attack completely, leaving the probe unscathed. This failure underscores the crew's technological inferiority and forces them to reconsider their approach. The phasers, typically a reliable weapon, become symbolic of the crew's vulnerability in the face of an unknown threat.
