  object_involvements:
  - object_uuid: ger_object_b7e2333e3f9f
    description_of_involvement: Barclay’s communicator insignia is the tool through
      which he bypasses the chain of command, directly contacting Picard to propose
      the photon torpedo strike. The compact device chirps to life as he taps it,
      its signal cutting through the chaos of the bridge. His use of the insignia—typically
      a symbol of Starfleet’s hierarchical structure—becomes a tool of insubordination
      in this moment, underscoring the urgency and desperation of the situation. The
      insignia’s compliance with his unauthorized hail highlights the fragility of
      the ship’s communication protocols and the potential for misuse in high-pressure
      scenarios.
