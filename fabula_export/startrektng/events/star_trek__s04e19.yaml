    what_happened: "\n        Ensign Anaya sits at the helm, her hands moving swiftly\
      \ to execute Riker’s order for evasive maneuvers. Her face tightens as the *Enterprise*\
      \ fails to respond, her fingers hovering over the controls in disbelief. She\
      \ glances briefly at Riker, then back to her console, as if willing the systems\
      \ to obey. Anaya’s role as the helm officer is reduced to a test of her patience\
      \ and professionalism, as she is forced to confront the ship’s sudden and inexplicable\
      \ paralysis. Her confusion is palpable, but she remains at her post, ready for\
      \ the next command.\n      "
