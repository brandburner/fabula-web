  global_id: null
  title: Barclay reveals irreversible fusion with the ship
  description: 'In the holodeck, Barclay—now a hybrid human-machine entity—confesses
    to Picard, Riker, Geordi, and Worf that his consciousness has permanently fused
    with the *Enterprise*’s starboard computer core. His higher brain functions and
    memory are irretrievable, and any attempt to disconnect him would be fatal. The
    revelation forces Picard to confront an impossible choice: prioritize the ship’s
    survival by risking Barclay’s life or preserve his crewman’s existence at the
    cost of losing control of the vessel. The scene underscores the moral weight of
    command, as Barclay’s transformation—once a potential solution—now becomes a crisis
    that threatens both the mission and the crew’s humanity. The tension escalates
    as Barclay’s refusal to comply exposes the irreversible nature of his fusion,
    leaving Picard with no clear path forward.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e19
  scene_sequence: 25
  sequence_in_scene: 35
  key_dialogue:
  - 'BARCLAY: It''s me...'
  - 'BARCLAY: My body is as you see it here. But much of my higher brain functions
    and memory have been transferred to the starboard computer core.'
  - 'PICARD: Mister Barclay, please remove yourself from the computer system and leave
    the holodeck.'
  - 'BARCLAY: I''m afraid I can''t, Sir.'
  - 'BARCLAY: My primary cerebral functions are now operating almost entirely from
    within the computer. They have expanded to such a degree that it would be impossible
    to return to the confines of my human brain.'
  - 'BARCLAY: Any attempt to do so would mean my death.'
