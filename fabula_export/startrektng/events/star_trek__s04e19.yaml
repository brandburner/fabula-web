- fabula_uuid: cand_evt_scene_dd05812515a424cd_01
  global_id: null
  title: Picard orders Barclay's forced disconnection
  description: "\n  With the *Enterprise* locked in an unstoppable trajectory toward\
    \ the galactic core disturbance, Picard’s attempts to regain control of the ship’s\
    \ systems fail as Barclay—now hyper-intelligent and interfaced with the holodeck\
    \ computer—remains unresponsive. The bridge crew watches helplessly as the viewscreen\
    \ reveals the ship’s inexorable descent into the distortion, its edges warping\
    \ into a tunnel-like structure. Picard’s frustration escalates as Barclay ignores\
    \ repeated commands, forcing the captain to make a critical decision: prioritize\
    \ the ship’s survival over Barclay’s life. With no other options, Picard orders\
    \ Worf to lead a security team to Holodeck Three and forcibly sever Barclay’s\
    \ connection to the computer. The command is given with quiet urgency, underscoring\
    \ the moral weight of the choice—sacrificing a crew member to save the ship. Worf’s\
    \ immediate compliance signals the gravity of the situation, as the ship’s fate\
    \ now hinges on this violent intervention. The scene hinges on the tension between\
    \ duty and humanity, with Picard’s order serving as a turning point that forces\
    \ the crew to confront the consequences of Barclay’s transformation.\n  "
