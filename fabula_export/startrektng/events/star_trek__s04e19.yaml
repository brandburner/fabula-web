      a performance of Cyrano de Bergerac’s death scene that is nothing short of transcendent.
      He begins in full character, his voice and body language embodying Cyrano’s
      poetic despair and unrequited love with a vulnerability and precision that contrast
      sharply with his usual insecurities. His physicality—raising himself dramatically,
      then collapsing into the chair—mirrors Cyrano’s fading strength, while his final
      lines are delivered with a direct, intimate gaze into Beverly’s eyes. The performance
      is so immersive that it blurs the line between acting and confession, revealing
      Barclay’s own emotional and intellectual transformation. After breaking character,
      he confirms the next class session with Beverly, his smile betraying a newfound
      confidence that feels both earned and unsettling.
