    general relativity without adjusting the cosmological constant a lot more than
    you''re doing here.'
  - 'EINSTEIN: If we increase the value as you suggest, we must face the possibility
    of twenty-six dimensions, instead of ten!'
  - 'BARCLAY: But if this semiset was curved into the subatomic, the infinities might
    cancel each other out.'
  - 'EINSTEIN: Gruss Gott. They just might.'
  - 'GEORDI: We had a meeting at Oh-seven hundred...'
  - 'BARCLAY: I''m sorry, Commander.'
