  title: Troi’s failed appeal to Barclay’s humanity
  description: Deanna Troi enters the holodeck to find Barclay fully integrated with
    the ship’s systems, his voice emanating from the computer rather than his body.
    She attempts to appeal to his residual humanity, referencing their planned walk
    in the Arboretum and expressing concern over his actions. Barclay dismisses her
    emotional reasoning, comparing the crew to frightened children and insisting they
    must trust his enhanced judgment. Troi counters that trust requires obedience
    to orders, but Barclay remains unyielding, repeating his demand for trust without
    offering reciprocity. The exchange reveals the irreversible gulf between Barclay’s
    transformed intellect and the crew’s values, forcing Troi to acknowledge that
    her empathy cannot bridge the divide. Her exit marks the failure of diplomacy,
    leaving Picard no choice but to proceed with forceful intervention.
