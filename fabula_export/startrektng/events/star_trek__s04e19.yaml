      \ sudden darkness and silence after the flash mirror Barclay’s collapse, symbolizing\
      \ the shuttle’s (and by extension, the crew’s) loss of control. Its role is\
      \ purely functional, but its failure is narratively pivotal, marking the shift\
      \ from investigation to crisis.\n      "
    status_before_event: "\n        Active and responsive, with glowing panels displaying\
