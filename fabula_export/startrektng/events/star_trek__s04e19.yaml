  key_dialogue:
  - |-
    TROI: You've come a long way, Reg.
    BARCLAY: After... more rehearsals than I can count.
    TROI: I don't just mean your acting ability. It takes a great deal of courage to put yourself on display like that.
  - |-
    BARCLAY: I still feel more... more comfortable playing somebody else. Maybe all this is no better than escaping into a holodeck fantasy.
    TROI: I disagree. This isn't fantasy—it's theatre. You used to withdraw into the holodeck. You isolated yourself inside your own imagination, avoiding contact with real people. Look at yourself now... and look at all the other people you're with... you're not just acting, you're inter-acting. Give yourself some credit, Mister Barclay!
  - 'BARCLAY: Maybe... you''re right.'
