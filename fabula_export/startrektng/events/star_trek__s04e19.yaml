      the surfaces with unnatural speed and precision, isolating phasers, rerouting
      warp power, and preparing the photon torpedoes—all in a matter of seconds. The
      panels flicker and glow under the strain of his commands, their readouts flashing
      warnings as systems are pushed to their limits. Geordi and Larson watch in stunned
      silence as Barclay seizes control, his actions a stark contrast to the usual
      methodical pace of engineering operations. The panels become a symbol of the
      ship’s vulnerability and the crew’s reliance on Barclay’s enhanced intellect,
      even as his methods raise ethical questions.
