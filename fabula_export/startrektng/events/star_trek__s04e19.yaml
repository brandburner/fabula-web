      Worf and the security officers act as representatives of the ship’s institutional
      protocols, attempting to regain control by forcibly disconnecting Barclay. The
      ship’s violent shaking and entry into the warp tunnel underscore the stakes
      of their failure, as the *Enterprise*’s fate hangs in the balance. The organization’s
      involvement is both practical and symbolic, representing the clash between institutional
      duty and the ethical implications of the crew’s actions. The ship’s systems,
      including the force field and the probe’s interface, are under the probe’s control,
      highlighting the crew’s powerlessness in the face of an external threat.
    active_representation: Through the actions of Worf and the security officers,
