    description_of_involvement: The *Enterprise*’s propulsion systems are the ultimate
      stake in this high-stakes debate. Locked under Barclay’s fused control, they
      represent the crew’s desperate need to regain autonomy over the ship’s movement.
      The propulsion systems are not merely a technical challenge but a symbol of
      the crew’s agency, now threatened by Barclay’s transformation. Geordi’s explanation
      that the bypass would grant access to these systems—‘enough to get us to the
      nearest Starbase’—frames the propulsion systems as both a lifeline and a point
      of contention. The crew’s focus on restoring propulsion control reveals their
      prioritization of survival over moral consistency, a choice that will have lasting
      consequences for their relationship with Barclay and their own sense of ethics.
