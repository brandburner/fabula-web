      from the *Enterprise*. It is caused by Barclay’s unauthorized modifications
      to the warp nacelles, which generate a highly charged graviton field. The distortion
      worsens over the course of the scene, fracturing the subspace continuum and
      threatening the ship’s structural integrity. Its escalation forces the crew
