    global_id: ger_object_95c13798c65d
  - object_uuid: ger_object_1cc4e719d121
    description_of_involvement: Barclay reroutes warp plasma from the *Enterprise*’s
      nacelles through the engineering conduits, surging power to the phaser emitters
      in a last-ditch attempt to penetrate the probe’s defenses. The emitters glow
      intensely as the plasma courses through them, but the beams dissipate harmlessly
