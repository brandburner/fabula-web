- fabula_uuid: act_3c3aa7af30a9cd27
  number: 3
  summary: 'The senior staff convenes to discuss the implications of Barclay''s extraordinary
    intelligence, debating whether to confine him due to potential alien influence.
    Picard, however, decides to allow Barclay to continue his work, judging his recent
    actions, including teaching violin and making a pass at Troi, as unusual but not
    threatening. Back in Engineering, the Argus Array reactors begin to cascade towards
    failure, and the Enterprise''s computer proves too slow to manage the rapidly
    changing parameters. Frustrated by the computer''s limitations, Barclay slips
    away unnoticed. He enters Holodeck Three and quickly programs a sophisticated
    neural interface, connecting his brain directly to the Enterprise''s main computer
    core. As the Argus reactors approach critical overload and Picard orders the Enterprise
    to warp away, the ship''s helm suddenly becomes unresponsive. Barclay, now speaking
    through the ship''s computer, announces his successful intervention: he has secured
    the Array by creating the neural interface, taking control of the ship''s systems
    to expedite repairs. The crew is left stunned as Barclay, physically present in
    the holodeck with a massive scanner over his head, confirms he is now the voice
    of the Enterprise computer.'
