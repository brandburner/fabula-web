      command. The *Enterprise*’s computer voice is also implied to be under Barclay’s
      control, reflecting the probe’s influence over the ship’s systems.
    power_dynamics: The *Enterprise* is under the probe’s control, with Barclay acting
      as an intermediary. Worf and the security officers represent the ship’s institutional
      resistance to this control, but their efforts are thwarted by the force field
      and the probe’s overwhelming power. The power dynamics are characterized by
      a struggle between human agency and external influence, with the crew’s attempts
      to intervene ultimately failing.
