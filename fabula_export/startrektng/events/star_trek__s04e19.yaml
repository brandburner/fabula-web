  title: Picard dispatches La Forge and Barclay to probe
  description: |2-

      On the *Enterprise* bridge, Data confirms the Argus Array’s fusion reactors are critically unstable, while Worf detects an unidentified probe near the array—a likely cause of the damage. Picard orders Geordi La Forge to investigate the probe directly, suspecting it may hold answers to the array’s failure. Geordi, already suspicious of Barclay’s recent erratic behavior, summons him to the shuttlebay for the mission. The scene establishes the probe as a potential threat and sets up Barclay’s direct exposure to it, which could either restore ship control or accelerate his unstable transformation. Picard’s decision reflects his command instincts: prioritizing immediate action over caution, given the escalating crisis. The tension lies in whether this probe interaction will reveal a solution or deepen the danger.
