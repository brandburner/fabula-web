      for every action in this scene. Data’s countdown and Geordi’s warning are direct
      responses to the Array’s impending chain reaction, while Picard’s order to prepare
      for warp two is a desperate gambit to escape its destruction. The Array functions
      as an invisible antagonist, its presence felt through the crew’s frantic efforts
      to outrun its collapse. Its fusion reactors, mentioned in passing, are the ticking
      time bomb at the heart of the crisis.
