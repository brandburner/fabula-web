- fabula_uuid: act_b58ba4e3d09d0178
  number: 6
  summary: On Nervala Four, the two Rikers, Data, and Worf embark on their final attempt
    to retrieve the database. Commander Riker, asserting his authority, insists Lieutenant
    Riker accompany him into the unstable caverns beneath the station, despite Lieutenant
    Riker's visible reluctance. In the cavern, Lieutenant Riker attempts to lead,
    but Riker quickly takes charge, efficiently resolving a critical radiation leak
    that Lieutenant Riker had previously deemed insurmountable, showcasing his leadership
    and problem-solving skills. While crossing a precarious, bridge-like scaffolding,
    a segment collapses under Lieutenant Riker's feet. Commander Riker instinctively
    grabs his hand, holding him suspended over the abyss. Lieutenant Riker, believing
    Riker cannot hold them both, tells him to let go, but Commander Riker steadfastly
    refuses, risking his own life to save his double. He manages to hook his foot
    for leverage and offers his other hand, pulling Lieutenant Riker to safety. This
    shared life-or-death experience forges a profound moment of mutual understanding
    and respect between them. Back on the Enterprise, Picard's log confirms the successful
    database retrieval and their course to rendezvous with the USS Gandhi. Lieutenant
    Riker packs his few belongings. Troi visits him, confirming her decision not to
    join him on the Gandhi, but softens the blow by clarifying it's "not yet," implying
    a future possibility for their relationship. Commander Riker then arrives, gifting
    Lieutenant Riker his beloved trombone, a poignant symbol of their shared history
    and a gesture of acceptance. Lieutenant Riker reveals he will now go by "Thomas,"
    his middle name, to forge his own distinct identity. He asks Commander Riker to
    "take care of her" (Troi) and shares a tender, hopeful kiss with Troi, promising
    to wait for her. Thomas departs the Enterprise, embarking on his new life with
    the hope of a future with Deanna.
