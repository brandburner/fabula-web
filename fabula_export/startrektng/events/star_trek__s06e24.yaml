      \ to her dominance, but the kiss—initiated by her—transforms the moment into\
      \ one of mutual surrender. His emotional state shifts from playful curiosity\
      \ to stunned realization, then to reciprocal passion. The kiss is a turning\
      \ point for him, as it forces him to confront his own identity separate from\
      \ Commander Riker.\n      "
