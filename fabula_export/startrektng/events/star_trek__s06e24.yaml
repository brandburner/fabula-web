  title: Riker’s interrupted solo performance
  description: 'During a relaxed Jazz Night in *Ten Forward*, Riker performs a trombone
    solo in a quartet, his civilian attire and the casual setting underscoring a rare
    moment of personal expression. Troi’s playful challenge—daring him to attempt
    the notoriously difficult *Night Bird* solo—reveals their deep camaraderie and
    the unspoken tension of their unresolved history. As Riker prepares to tackle
    the solo, Data’s urgent bridge summons interrupts the moment, forcing him to abandon
    the performance mid-preparation. His wry remark to Troi and Beverly—*Saved by
    the bell*—hints at his ambivalence: relief at avoiding failure, but frustration
    at duty once again intruding on his personal space. The interruption underscores
    the central conflict of the story: Riker’s struggle to reconcile his artistic
    longing for self-expression with the inescapable demands of his Starfleet identity,
    a tension that will only intensify as his duplicate’s presence forces him to confront
    past choices and the road not taken. The scene also serves as a narrative pivot,
    transitioning from the lighthearted setup of the jazz night to the mission-critical
    urgency of the Nervala IV retrieval, while reinforcing the thematic tension between
    personal fulfillment and professional duty.'
