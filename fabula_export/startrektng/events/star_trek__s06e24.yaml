  object_involvements:
  - object_uuid: ger_object_0aa6834e065d
    description_of_involvement: The poker chips function as both the literal stakes
      of the game and a metaphor for the intangible rewards of rank, love, and opportunity
      that the two Rikers are truly competing over. Lieutenant Riker’s aggressive
      bets—first 50, then 100, then 300—mirror his frustration with Riker’s ‘better
      hand’ in life. When Riker matches the bet and raises, the chips become a physical
      manifestation of their rivalry, clattering into the pot as the emotional temperature
      rises. By the end, Lieutenant Riker’s surrender—*‘Take it. You win.’*—turns
      the chips into a hollow victory, emphasizing that the real prize was never the
      game.
    status_before_event: Stacked in the center of the table, accumulating as Worf
      and Data fold their hands.
    status_after_event: Pushed into a single pile in front of Riker, their clatter
      the only sound as Lieutenant Riker exits.
    global_id: ger_object_0aa6834e065d
