    - Through *access to resources* (e.g., Troi’s ability to task Riker with the database,
      the quarters as a private but Starfleet-issued space).
    institutional_impact: The scene underscores Starfleet’s role as both *disruptor*
      (the transporter accident that created the duplicate) and *stabilizer* (the
      mission to salvage the database, which reintegrates Riker). It also highlights
      the tension between *personal desire* and *institutional obligation*, a central
      theme of the episode.
    internal_dynamics: 'The internal debate over how to handle Riker’s duplicate—whether
      to integrate him, study him, or treat him as a liability—is implied in Troi’s
      professionalism and the mission’s urgency. The scene reflects Starfleet’s *adaptive
      bureaucracy*: it can be rigid (protocol) but also flexible (redirecting Riker’s
