  - location_uuid: ger_location_4a048392568e
    description_of_involvement: "\n      Sickbay is the crucible of this event, a\
      \ space designed for healing but repurposed for interrogation. Its clinical\
      \ sterility—gleaming instruments, humming equipment, the antiseptic scent—clashes\
      \ with the emotional charge of the moment, creating a disorienting tension.\
