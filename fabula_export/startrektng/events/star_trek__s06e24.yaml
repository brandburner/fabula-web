              The comparative brain scans are the *visual manifestation* of the crew’s existential crisis. When Beverly overlays the Lieutenant’s neural patterns against Commander Riker’s established scans, the glowing, identical structures on the display become a Rorschach test for the crew: *Which one is real?* The minor differences Beverly notes are less important than the *overwhelming sameness*—a visual echo of the Lieutenant’s claim to be the 'original.' Picard leans in, his reflection flickering in the screen, as if searching for a flaw, a *tell* that will break the illusion. But the scans offer no easy answers. Instead, they force the crew to confront the *philosophical* horror of duplication: if two men share the same mind, the same memories, the same trauma, how do you choose which one gets to live?
    status_before_event: |2-

              *Archived and inert*: Commander Riker’s brain scans are stored in the *Enterprise*’s medical database, a routine record of a routine officer. The Lieutenant’s scans don’t exist yet; he is, in this moment, an *unknown variable*. The display is dark, waiting to be activated, its surface a blank canvas for the revelation to come.
    status_after_event: |2-

              *Activated and haunting*: The scans now *coexist* on the display, a side-by-side comparison that feels like a funeral dirge for the concept of a 'single self.' Beverly doesn’t close the overlay immediately; she lets it linger, as if the crew needs time to absorb the weight of what they’re seeing. The scans become a *symbol* of the larger conflict: the Lieutenant’s insistence that he is the 'original' is now *visualized*, but the proof is also his undoing—because if he is the original, then the Commander Riker they all know is the *copy*. The display hums softly, a white noise of uncertainty.
