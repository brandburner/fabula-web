- fabula_uuid: cand_evt_scene_90e0ad8270dd1efd_01
  global_id: null
  title: Riker Confronts Picard’s Preference for His Duplicate
  description: 'In the ready room, Commander Riker is summoned by Picard, who reveals
    that Lieutenant Riker (his transporter-created duplicate) has already proposed
    a high-risk mission plan to retrieve critical data from Nervala IV. Picard, aware
    of the seismic instability, sides with the Lieutenant’s approach, citing its higher
    probability of success. Riker, though initially resistant, accepts the decision
    without overt challenge, masking his discomfort with professional deference. The
    exchange underscores the Lieutenant’s growing influence over Picard and forces
    Riker to confront the unsettling reality that his duplicate is not only being
    taken seriously but may be *preferred*—a threat to his authority and identity.
    The scene escalates the central tension: Riker’s struggle to assert his legitimacy
    as the ‘original’ while his duplicate gains traction as the more decisive leader.
    Picard’s implicit trust in the Lieutenant’s judgment further erodes Riker’s footing,
    setting up a power dynamic where the duplicate’s past experiences (e.g., his recent
    familiarity with the caverns) are valued over Riker’s current command role. The
    moment is a turning point, as Riker’s internal conflict—between pride, insecurity,
    and duty—becomes externally visible, compelling him to engage with his duplicate
    on unequal terms.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e24
  scene_sequence: 11
  sequence_in_scene: 29
  key_dialogue:
  - 'PICARD: Lieutenant Riker came to see me about the away mission. He believes the
    only way to retrieve the database is by directly accessing the main core underneath
    the station.'
  - 'RIKER: Seismic activity has made the caverns very unstable. In my opinion, it''s
    too risky.'
  - 'PICARD: He said he''d been down there quite recently; he seems confident it can
    be done safely.'
  - 'RIKER: Lieutenant Riker''s plan is more dangerous, but I''ll admit, it has a
    better chance of succeeding.'
  - 'PICARD: Given the importance of this data, I think it''s worth the risk.'
  - 'RIKER: ((even)) I''ll talk to him.'
