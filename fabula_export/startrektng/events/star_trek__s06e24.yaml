      \ a man who is genetically and neurologically identical to his first officer,\
      \ yet insists he is the *original*. His order to check the *Potemkin*’s logs\
      \ is a rare admission of uncertainty, betraying his usual confidence. The lieutenant’s\
      \ grin—so like Riker’s—briefly unsettles him, but he masks it with professionalism,\
      \ offering reassurance while maintaining authority. His exit with Beverly leaves\
      \ an unspoken tension: *What does this mean for the man we already have?*\n\
      \      "
    beliefs:
    - Identity is not reducible to genetics or memory alone—context and circumstance
      must align for truth
    - Starfleet protocol requires rigorous investigation of anomalies, even those
      that defy logic
    observed_traits:
