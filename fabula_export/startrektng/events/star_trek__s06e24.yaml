      lives. Lieutenant Riker’s insistence that Commander Riker is bluffing (''You
      didn’t take any cards—you must be holding something'') reflects his belief that
      Commander Riker’s confidence is a facade, just as his own aggression masks his
      insecurities. The cards themselves are never revealed, but their absence is
      telling: the real ''hand'' each Riker holds is the life they’ve lived (or didn’t).
      Data’s folding (''The dealer folds'') removes the neutral party from the equation,
      leaving the Rikers to face each other without intermediaries.'
    status_before_event: Dealt to each player in five-card draw hands, with some cards
      exchanged during the draw phase.
    status_after_event: Left face-down on the table, their secrets—and the secrets
      of the Rikers’ lives—unrevealed.
