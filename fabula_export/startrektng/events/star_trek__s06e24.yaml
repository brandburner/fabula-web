    description_of_involvement: 'Starfleet’s presence in this scene is subtle but
      pervasive, acting as the unspoken framework for the Rikers’ conflict. The poker
      game itself is a microcosm of Starfleet’s values: strategy, competition, and
      the calculated management of risk. However, the Rikers’ rivalry exposes the
      cracks in that framework—Lieutenant Riker’s bitterness stems from his belief
      that Starfleet (and Commander Riker) have denied him his rightful place, while
      Commander Riker’s defensiveness reflects his own internalized pressure to uphold
      Starfleet’s ideals. The organization’s protocols (rank, chain of command, transporter
      ethics) are the invisible rules governing their interaction, yet the personal
      stakes of their conflict threaten to override them. Data’s neutral role as dealer
      reinforces Starfleet’s ideal of impartiality, while Worf’s stoic withdrawal
      highlights the organization’s expectation of discipline even in the face of
      emotional turmoil.'
