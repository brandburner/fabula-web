      \ close during the scan, their eyes meeting in a silent acknowledgment of the\
      \ uncanny, while Picard looms nearby, his presence a reminder of the institutional\
      \ weight of the situation. The turbolift doors hissing in the corridor outside\
      \ serve as a metronome, counting down the seconds until the lieutenant’s fate\
      \ is decided. Here, identity is not just examined; it is dissected.\n      "
