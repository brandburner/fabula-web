  title: Troi chooses Thomas, Riker gifts trombone
  description: 'In Lieutenant Riker’s quarters, Deanna Troi arrives to deliver her
    decision: she will not accompany Riker to the *Gandhi*, choosing instead to remain
    with Thomas (Riker’s duplicate). The rejection is softened by her implication
    that their relationship might resume in the future—‘not yet’—but the moment is
    charged with unspoken grief. As Thomas prepares to depart, Riker arrives unannounced,
    presenting him with a trombone, a symbolic gesture of reluctant acceptance. The
    gift, once Riker’s own, now represents the irrevocable fracture between the two
    men. Thomas’s decision to adopt the name ‘Thomas’ (his middle name) further underscores
    their divergence, while his parting kiss with Troi and request for Riker to ‘take
    care of her’ solidifies the emotional and narrative stakes. The scene closes with
    Riker’s silent vigil over Troi, marking the end of an era and the beginning of
    an uncertain future for all three characters.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e24
  scene_sequence: 19
  sequence_in_scene: 44
  key_dialogue:
  - |-
    TROI: I won't be going with you.
    LT. RIKER: I guess I'm not surprised.
    TROI: I'm not ready to give up my life here. Not yet.
  - |-
    RIKER: My quarters are full of things that used to be yours. I figured you should at least have this.
    LT. RIKER: Thanks.
    RIKER: Good luck, Wil.
  - |-
    LT. RIKER: Actually... I was thinking of going with the name Thomas.
    TROI: Your middle name.
    RIKER: I guess we are different. I never really cared for it.
    LT. RIKER: I've always kind of liked it.
  - |-
    LT. RIKER: Take care of her.
    RIKER: (nods)
