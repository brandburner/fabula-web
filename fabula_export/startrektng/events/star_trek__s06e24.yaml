  object_involvements:
  - object_uuid: ger_object_89c90d6e077a
    description_of_involvement: 'Lieutenant Riker’s Nervala IV Retrieval Plan is the
      linchpin of this scene, though it exists only as a concept relayed through Picard’s
      dialogue. The plan’s high-risk nature—directly accessing the main core beneath
      the unstable caverns—is positioned as the superior option, not only because
      of its higher probability of success but also because of the Lieutenant’s recent
      familiarity with the terrain. Riker’s objections (''Seismic activity has made
      the caverns very unstable'') highlight the plan’s dangers, but Picard’s counter
      (''it''ll be eight years before we get another chance'') frames it as the only
      viable path forward. The plan’s implicit endorsement by Picard transforms it
      from a proposal into a directive, forcing Riker to concede and setting the stage
      for their uneasy collaboration. Its existence as a ''duplicate’ of Riker’s own
      experience adds a layer of irony: the plan is both a challenge to his authority
      and a reflection of his own capabilities.'
    status_before_event: Proposed by Lieutenant Riker and presented to Picard; endorsed
      as the preferred approach for the mission.
    status_after_event: Officially adopted as the mission plan, with Riker tasked
      to review the schematics and formalize it in collaboration with the Lieutenant.
    global_id: ger_object_89c90d6e077a
  - object_uuid: ger_object_24a7898f8de5
    description_of_involvement: 'The Research Station Computer is referenced indirectly
      in this scene as the source of the critical database that the away team must
      retrieve. While not physically present in the ready room, its existence and
      the urgency of accessing its data drive the entire exchange. Picard’s insistence
      on the mission’s importance—''Given the importance of this data''—ties directly
      to the computer’s role as the repository of eight years’ worth of scientific
      research. The object’s damaged state (implied by the need for a high-risk retrieval)
      and its location beneath the unstable caverns create the central conflict: whether
      to attempt a safer but less reliable retrieval from the station’s consoles or
      to risk the caverns for a guaranteed success. The computer thus serves as both
      the narrative prize and the catalyst for the power struggle between the two
      Rikers.'
    status_before_event: Partially operational but inaccessible due to seismic instability
      in the caverns; located beneath the research station on Nervala IV.
    status_after_event: Remains inaccessible, but the decision to proceed with the
      Lieutenant’s plan sets the stage for its eventual retrieval.
    global_id: ger_object_24a7898f8de5
  - object_uuid: ger_object_02e4fa948818
    description_of_involvement: 'The Nervala IV Station and Cavern Schematics are
      the tangible tools that will guide the away team’s mission, but in this scene,
      they serve as a symbolic battleground for the two Rikers’ competing approaches.
      Picard’s endorsement of the Lieutenant’s plan—''He said he''d been down there
      quite recently''—implies that the schematics (or the Lieutenant’s firsthand
      knowledge of them) give him an advantage. Riker’s reluctant agreement to ''look
      over the schematics and draw up a mission plan'' frames the objects as a neutral
      arbiter, though their role in the Lieutenant’s favor underscores the duplicate’s
      growing influence. The schematics’ crisp lines and unstable passages (as described
      in the canonical entry) mirror the tension in the room: precise, but fraught
      with risk.'
    status_before_event: Available for review in the ready room or on the Enterprise;
      contain detailed maps of the station and caverns, including notes on seismic
      instability.
    status_after_event: Designated as the foundation for the mission plan, with Riker
      tasked to review them in collaboration (or competition) with the Lieutenant.
