      Riker
    what_happened: "\n        Lieutenant Riker enters the gymnasium as an observer,\
      \ initially content to stretch in the background while Troi and Beverly converse.\
      \ His demeanor is curious and open, but his presence alone disrupts the dynamic—Beverly’s\
      \ departure is a direct response to his arrival, leaving him and Troi in a charged,\
      \ private space. He engages Troi in the martial arts exchange with genuine enthusiasm,\
      \ matching her movements and reveling in the similarities between Klingon and\
