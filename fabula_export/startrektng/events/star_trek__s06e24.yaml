  title: Riker accelerates Nervala IV mission
  description: "\n  On the night-shift bridge, Riker is summoned by Data, who reveals\
    \ that transporter modifications—derived from the Potemkin’s evacuation logs—now\
    \ allow for immediate transport to Nervala IV despite the planet’s distortion\
    \ field. Riker’s immediate reaction is one of urgency, his voice tightening as\
    \ he recalls his near-fatal escape eight years prior. The discovery of a viable\
    \ transport window (lasting just 26 minutes) triggers a chain of command decisions:\
    \ Riker orders Data to notify the Away Team while he personally informs Picard,\
    \ effectively advancing the mission timeline without full transparency. The scene\
    \ underscores Riker’s impulsive drive to confront his past, using Data’s technical\
    \ breakthrough as a catalyst. His clipped dialogue and physical movement (heading\
    \ straight for the Turbolift) signal his emotional investment, while Data’s clinical\
    \ precision contrasts with Riker’s barely contained intensity. The exchange sets\
    \ up a high-stakes mission with a tight deadline, where Riker’s personal history\
    \ collides with operational necessity.\n  "
