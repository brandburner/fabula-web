  title: Riker calls Lieutenant Riker’s bluff
  description: 'The poker game between Commander Riker, Lieutenant Riker, Worf, and
    Data escalates into a high-stakes psychological duel. Lieutenant Riker, frustrated
    by his own failures and the Commander’s success, aggressively raises the stakes,
    testing his counterpart’s resolve. Commander Riker, recognizing the bluff, calls
    it with a bold counter-bet, forcing Lieutenant Riker to fold and exit in humiliation.
    The confrontation crystallizes their irreconcilable differences—Commander Riker’s
    confidence in his choices versus Lieutenant Riker’s bitterness over his own path.
    The moment marks the definitive end of Lieutenant Riker’s attempt to reclaim what
    was never his, underscoring the permanence of their divergent lives. The tension
    between them is no longer about rank or opportunity but about identity itself—who
    they are and who they could have been. The scene serves as a turning point, pushing
    Lieutenant Riker toward his next desperate act: proposing to Deanna Troi in a
    final bid for validation.'
