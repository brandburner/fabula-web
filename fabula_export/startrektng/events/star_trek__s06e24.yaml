- fabula_uuid: cand_evt_scene_9a12abfc1f545bf7_03
  global_id: null
  title: Riker’s Twin Confronts Lost Love
  description: In Riker’s quarters, Lieutenant Riker—emotionally raw after eight years
    stranded—reunites with Deanna Troi, who gently but firmly clarifies that their
    past romance is over. Though she reveals she and Commander Riker never rekindled
    their relationship after his career took priority, her rejection still stings.
    When she asks for his technical expertise to salvage the station’s database, he
    agrees, masking his disappointment with professionalism. The moment ends with
    his unrequited confession, leaving him vulnerable and her conflicted. This scene
    underscores the twin’s fractured identity and the irreversible nature of time,
    while Troi’s agency in defining their past contrasts with his lingering attachment.
    The exchange sets up his future struggle to reconcile duty with personal desire,
    especially as his duplicate’s presence forces him to confront the life he lost.
