  participations:
  - character_uuid: ger_agent_9eb476aa9a78
    emotional_state: 'A storm of conflicting emotions: resentment toward Riker for
      ''saving'' him (which feels like another assertion of dominance), fear of the
      abyss (both literal and metaphorical—his own irrelevance, his borrowed life),
      and a reluctant, shameful gratitude. His surface defiance masks a deeper terror
      of being left behind, of proving himself unworthy even of survival. The moment
      of physical contact—clawing his way up Riker''s body—is a brutal, wordless admission
      of his dependence, and it leaves him raw.'
    goals:
    - To assert his independence, even in the face of death (refusing help at first
      as a rejection of Riker's authority).
    - To survive, despite his initial resistance, because some primal instinct overrides
      his resentment.
    - To avoid owing Riker anything, yet secretly hoping Riker won't let go.
    what_happened: Lieutenant Riker is trapped, his body dangling over the abyss as
      the scaffolding segment collapses beneath him. His initial reaction is one of
      resignation, his voice tight with desperation as he urges Riker to let go, arguing
      that 'one of us has to make it out of here.' Physically, he is a dead weight
      at first, his muscles locked in fear, but as Riker refuses to release him, he
      reluctantly begins to climb, his movements jerky and uncertain. His face is
      a study in conflict—resentment wars with survival instinct, and for a moment,
      his grip on Riker's wrist is limp, as if testing whether Riker will truly hold
      on. When he finally reaches up to grasp Riker's other hand, it's with a mix
      of defiance and relief, his breathing ragged as he hauls himself to safety.
