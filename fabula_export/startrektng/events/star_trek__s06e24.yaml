      expectations that shape the Rikers' initial responses, as well as the unspoken
      code of conduct that drives Riker's refusal to abandon Lieutenant Riker, regardless
      of the personal cost.
    power_dynamics: Starfleet operates as an invisible but potent force in the background,
      its protocols and expectations influencing the Rikers' actions even as the event
      forces them to transcend those constraints. The organization's power is both
      enabling (providing the skills and equipment that got them this far) and limiting
