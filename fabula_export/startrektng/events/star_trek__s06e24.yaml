- fabula_uuid: cand_evt_scene_6cbfe33e67736134_01
  global_id: null
  title: Riker orders Nervala Four mission
  description: 'In the transporter room, Riker oversees final preparations for the
    Nervala Four mission with clinical precision, his urgency betraying a personal
    stake in the planet’s unresolved history. Geordi confirms the transport window
    is open, and Riker—without hesitation—orders the away team (Data, Worf, and an
    unnamed technician) into position. His command to energize the transporter is
    decisive, but the scene’s tension lies in what’s unspoken: Riker’s eagerness to
    depart immediately, despite the mission’s potential risks, suggests he’s using
    the mission to confront (or escape) his past. The moment marks a turning point,
    as Riker’s impulsive leadership alters the mission’s timeline and sets the crew
    on a course that will test their loyalty and his own unresolved conflicts. The
    transporter’s hum underscores the irreversible nature of his decision, while Data’s
    and Worf’s silent compliance highlights the crew’s trust in his command—even as
