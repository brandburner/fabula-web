- fabula_uuid: cand_evt_scene_4826b14cb27a52ff_03
  global_id: null
  title: Riker calls his duplicate’s bluff
  description: The poker game between Commander Riker and his duplicate escalates
    into a psychological standoff when Lieutenant Riker, sensing vulnerability, aggressively
    raises the stakes to test his counterpart’s resolve. Commander Riker, recognizing
    the bluff, calls it with a calculated raise, forcing Lieutenant Riker into a humiliating
    retreat. The exchange reveals their divergent life choices—Commander Riker’s confidence
    in his path versus Lieutenant Riker’s bitterness over his own failures. The trombone,
    a shared relic from their past, earlier symbolized their fractured legacy, but
    here, the poker game becomes the battleground for their rivalry. Worf folds early,
    Data observes with detached fascination, and the tension peaks when Lieutenant
    Riker, unable to match the Commander’s boldness, concedes the hand and the unspoken
    contest of their identities. His exit—‘You were dealt the better hand, Commander...
    all the way around’—underscores the irreconcilable divide between them, with the
    Commander’s victory marking the definitive end of the duplicate’s attempt to reclaim
    what was never his to begin with. The scene serves as a turning point, crystallizing
    their rivalry and setting up the final confrontation where their paths diverge
    permanently.
