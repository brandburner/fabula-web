              The Sickbay examination table is the *stage* for this identity crisis, a neutral ground where the Lieutenant’s claim to be Riker is put under a microscope. Its padded surface is where he sits, perched between vulnerability and defiance, his posture shifting with every revelation. When Beverly scans him, the table becomes a *threshold*—a place where the Lieutenant is neither fully accepted nor rejected, but *examined*. His hopping off at the end ('*Doctor...*') is a small victory, a moment of agency in a scene where he’s otherwise at the crew’s mercy. The table’s role is to *contain* the Lieutenant, to keep him in one place while his fate is decided. Yet, its very neutrality makes it a *symbol* of the crew’s indecision: they don’t know where to put him—literally or metaphorically—so they keep him here, in limbo.
    status_before_event: |2-

              *Empty and ready*: The table is pristine, its surface unmarked by the day’s previous patients. It sits in the center of Sickbay, a silent invitation to the Lieutenant to take his place under Beverly’s scanner. Its padding is firm but not uncomfortable, a reminder that this is a place of *care*—but also of *judgment*. The Lieutenant eyes it with a mix of resignation and defiance, knowing that what happens here will determine his future.
    status_after_event: |2-

              *Abandoned but charged*: The table is left unoccupied, but its role in the scene lingers. The Lieutenant’s departure marks the end of the examination, but the table itself becomes a *metaphor* for the crew’s dilemma: where do they *put* a duplicate? The table’s emptiness is a void, a space waiting to be filled by either acceptance or rejection. Beverly and Picard exchange a look as the Lieutenant exits, and in that silence, the table’s purpose shifts from *diagnosis* to *decision*: what happens next?
