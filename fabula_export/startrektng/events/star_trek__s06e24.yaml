  title: Thomas claims his identity and departs
  description: 'In Lieutenant Riker’s quarters, Thomas (Riker’s duplicate) prepares
    to leave the *Enterprise* for a terraforming mission aboard the *Gandhi*. Deanna
    Troi arrives to deliver her decision: she won’t accompany him, though she leaves
    open the possibility of a future reunion. The moment is charged with unspoken
    tension—Thomas’s disappointment is palpable, but he accepts her choice with quiet
    dignity. Their exchange is interrupted by Commander Riker’s arrival, who gifts
    Thomas his old trombone, a symbolic gesture of reluctant acceptance and shared
    history. Thomas reveals his intention to adopt the name ‘Thomas’—a deliberate
    assertion of his autonomy—before kissing Troi tenderly and departing. The scene
    underscores the bittersweet finality of his exit, marked by his request for Riker
    to care for Troi in his absence, while also signaling his emotional and narrative
    independence from his original counterpart. The act closes with a fade-out, leaving
    Troi and Riker in a moment of shared silence, their own unresolved dynamics lingering
    in the aftermath of Thomas’s departure.'
