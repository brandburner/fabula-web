  global_id: null
  title: Riker’s Gift and Troi’s Unspoken Longing
  description: Deanna Troi discovers a slate etched with the Janaran Falls—a poignant
    gift from Lieutenant Riker—while exploring Ten Forward. The gift, a handcrafted
    etching of a waterfall from their shared past, immediately evokes nostalgia and
    unspoken history between them. When Lieutenant Riker approaches, their conversation
    begins with polite acknowledgment of the gift but quickly shifts to deeper emotional
    territory. He reveals his longing to reconnect with her, confessing how he imagined
    her waiting for him during his isolation. Troi, though initially guarded, reciprocates
    by admitting her own lingering disappointment over Riker’s absence and her unfulfilled
    fantasies about their relationship. The exchange lays bare the fragility of their
    reconnection, as both grapple with the weight of what might have been and the
    uncertainty of their present dynamic. The moment underscores the emotional complexity
    of their relationship, caught between memory and reality, while also hinting at
    the unresolved tension between Lieutenant Riker’s romantic intentions and Troi’s
    lingering attachment to Commander Riker. The clink of their glasses signals a
    fragile truce, but the subtext of their conversation reveals deeper, unspoken
    conflicts that will shape their future interactions.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e24
  scene_sequence: 10
  sequence_in_scene: 26
  key_dialogue:
  - 'LT. RIKER: "The Janaran falls..."'
  - 'LT. RIKER: "I wanted to remember... our last night together."'
  - 'TROI: "The other day, when I told you how Commander Riker and I didn''t meet
    on Risa... what I didn''t say was how disappointed I was."'
  - 'TROI: "I started hearing from him less and less... I knew his career was taking
    him away from me, but I didn''t want to believe it was over. I spent a lot of
    time thinking about him, wondering where he was, what he was doing."'
  - 'TROI: "Who knows? Maybe one night... you and I were both looking up at the same
    star. You were thinking about me... and in a way, I was thinking about you."'
