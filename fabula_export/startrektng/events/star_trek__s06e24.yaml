  - object_uuid: ger_object_9304c07b19cc
    description_of_involvement: 'The station’s database is the *pivot object* that
      shifts the scene from personal to professional. Troi introduces it as a task
      for Riker, leveraging his technical expertise to redirect his emotions. The
      database symbolizes *unrecovered knowledge*—both the scientific data from Nervala
      IV and the ''lost'' years of Riker’s life. His agreement to help salvage it
      is a *bittersweet acceptance* of his role: he is no longer Troi’s lover, but
      he can still be useful to the crew. The object also reinforces the *institutional
      backdrop* of Starfleet, reminding Riker (and the audience) that his identity
      is now tied to his skills, not his past.'
