  title: Riker encounters his duplicate on the station
  description: "\n  The away team materializes on the research station’s transporter\
    \ pad, only to find the facility eerily pristine—contradicting Riker’s memory\
    \ of its chaotic evacuation. Data’s observation of a hastily patched hole in the\
    \ ceiling immediately suggests recent, unauthorized activity, planting suspicion\
    \ that the station’s order is a facade. Worf theorizes a crashed vessel may have\
    \ brought survivors, but Data’s tricorder detects an approaching humanoid. As\
    \ the team takes defensive positions, the door opens to reveal a man who is Riker’s\
    \ exact double. The moment of recognition is electric: both Rikers stand frozen\
    \ in mutual shock, the revelation of a duplicate shattering Riker’s sense of reality\
    \ and setting the stage for the central conflict of the story. The scene ends\
    \ with the two men locked in silent confrontation, the implications of their existence\
    \ hanging in the air.\n  "
