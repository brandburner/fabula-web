      salvage), thereby mitigating the disruption caused by his duplicate’s existence.
    - To maintain institutional stability by ensuring that personal conflicts (e.g.,
      Riker’s unrequited love) do not interfere with mission-critical objectives.
    influence_mechanisms:
    - Through *professional roles* (Troi as Counselor, Riker as technical expert),
      which dictate behavior and redirect emotions.
    - Through *mission objectives* (database salvage), which provide a productive
      outlet for Riker’s vulnerability and anchor his utility to the crew.
    - Through *institutional memory* (e.g., Riker’s knowledge of the Potemkin and
