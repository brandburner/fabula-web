  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: 'Starfleet’s influence permeates this event, shaping
      the power dynamics, the characters’ goals, and the emotional stakes. The organization
      is *indirectly* present through Troi’s role as Counselor, the mission to salvage
      the database, and the institutional backdrop of Riker’s quarters. Starfleet’s
      protocols dictate Troi’s professional boundaries (she cannot indulge Riker’s
      romantic longing) and provide the *mission objective* (database salvage) that
      redirects his emotions. The organization’s power dynamics are evident in Riker’s
      desperation to prove his value—his technical expertise is his only remaining
      link to Starfleet, and thus to Troi. The scene highlights Starfleet’s *dual
      role*: it is both the institution that fractured Riker’s life (through the transporter
      accident) and the structure that may now reintegrate him.'
    active_representation: Via institutional protocol (Troi’s professional boundaries)
      and mission objectives (database salvage).
    power_dynamics: Exercising authority over individuals’ personal lives (Troi’s
