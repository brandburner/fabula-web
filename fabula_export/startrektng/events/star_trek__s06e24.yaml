      he is heading back toward it to inform Picard. The turbolift is more than a
      mere conveyance; it represents the flow of information and authority on the
      *Enterprise*, as Riker uses it to relay critical updates up the chain of command.
      Its role is functional but also narrative, as it underscores the mission’s accelerated
      timeline.
    status_before_event: Idle and available, ready for use by bridge personnel during
