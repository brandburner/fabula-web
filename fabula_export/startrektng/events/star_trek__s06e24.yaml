  title: Riker and Troi confront past choices
  description: In a quiet, emotionally charged moment at Ten Forward, Deanna Troi
    approaches Will Riker to discuss her rekindled feelings for his duplicate. Riker,
    sensing her conflict, immediately grants her permission to pursue the relationship
    without hesitation, revealing his deep understanding of her emotional state. Their
    conversation becomes a reflective examination of their shared history, with Riker
    acknowledging the parallel paths their lives might have taken. The exchange is
    marked by unspoken intimacy—Riker takes Troi’s hand, a rare physical gesture between
    them—while he warns her to be cautious, not out of jealousy but from a place of
    protective friendship. The moment underscores the fragility of their present dynamic
    and the lingering weight of past decisions, particularly Riker’s own regrets about
    the choices that shaped their relationship. The dialogue reveals Riker’s self-awareness
    and Troi’s vulnerability, setting up future tensions as the specter of the duplicate
    looms over their unresolved connection.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e24
  scene_sequence: 13
  sequence_in_scene: 33
  key_dialogue:
  - |-
    TROI: Hello, Wil.
    RIKER: Deanna...
    TROI: I wanted to talk to you about something.
    RIKER: If you want to be with him... you don’t have to ask my permission.
  - |-
    RIKER: Ever since he came aboard... I keep finding myself thinking about... the choices you and I made.
    TROI: Me too.
    RIKER: Just do one thing for me... be careful.
    TROI: Wil... I know you and he have had some problems -
    RIKER: We have. But that’s not what I’m talking about. If he’d made it off that planet instead of me... don’t you think he would have made the same choices I did?
  - 'RIKER: I just don’t want you to get hurt... again.'
