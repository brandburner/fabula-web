    global_id: ger_object_229be41a89dd
  - object_uuid: ger_object_c6b08ca04699
    description_of_involvement: 'The phasers carried by both Rikers remain holstered
      throughout the event, serving as a silent counterpoint to the physical struggle.
      Their presence underscores the futility of technology in this moment—there is
      no target to fire at, no enemy to stun, only the raw, unmediated challenge of
      survival. The phasers symbolize the Rikers'' shared Starfleet identity, their
      training, and the tools they rely on in crises. Yet here, in the cavern, those
      tools are useless, and the event forces them to confront a problem that cannot
      be solved with equipment or protocol. The phasers'' inactivity highlights the
      primal, human nature of the moment: this is a test of strength, trust, and will,
      not of technology.'
    status_before_event: Holstered at the Rikers' sides, charged and ready for use,
