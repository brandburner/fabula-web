  title: Riker’s Gift and Troi’s Unspoken Longing
  description: In Ten Forward, Lieutenant Riker presents Deanna Troi with a hand-etched
    slate depicting the Janaran Falls—a poignant gift symbolizing their shared past.
    Their conversation reveals his renewed ambition to reclaim his Starfleet career,
    tinged with regret over lost time and unfulfilled promises. Troi, moved by his
    vulnerability, reciprocates with raw honesty, confessing her lingering disappointment
    in Commander Riker and the fantasies of connection that persisted during his absence.
    The moment lays bare the emotional fault lines between them, forcing both to confront
    the weight of what might have been—and what still lingers. The exchange deepens
    their bond while underscoring the unresolved tension between past and present,
    setting the stage for future confrontations with Commander Riker and the duplicate’s
    interference.
