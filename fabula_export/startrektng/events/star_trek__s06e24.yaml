    description_of_involvement: Starfleet’s influence permeates this scene, not through
      overt representation but through the institutional frameworks that govern the
      characters’ actions. The mission to retrieve the database from Nervala IV is
      framed as a Starfleet priority, with Picard’s decision to endorse the Lieutenant’s
      high-risk plan reflecting the organization’s pragmatic approach to high-stakes
      operations. The away mission itself is a product of Starfleet protocol, requiring
      careful planning, risk assessment, and adherence to chain of command—though
      the duplicate’s presence introduces a destabilizing element. The organization’s
      goals are implicitly aligned with the mission’s success, even if it means challenging
      the status quo or testing the loyalty of its officers. Picard’s role as the
      final arbiter of the plan underscores Starfleet’s hierarchical structure, where
      authority is vested in the captain but must also account for the competence
      and initiative of subordinates—even those who are, technically, duplicates.
    active_representation: Via institutional protocol being followed (away mission
