- fabula_uuid: act_34b67179edd8953a
  number: 5
  summary: Troi approaches Commander Riker in Ten Forward, who, having empathetically
    sensed her feelings, gently tells her she doesn't need his permission to pursue
    a relationship with Lieutenant Riker. They discuss their past choices and complicated
    history, with Commander Riker warning her to be careful, expressing a fear that
    she might get hurt again if Lieutenant Riker, like himself, prioritizes career
    over personal relationships. Later, Commander Riker, Data, and Worf play poker
    in Riker's quarters. Lieutenant Riker joins them, and a symbolic moment occurs
    when he picks up Commander Riker's trombone, recognizing it as his own, highlighting
    their shared past and separate present. The poker game quickly transforms into
    a competitive clash between the two Rikers, escalating into a metaphor for their
    rivalry and differing life philosophies. Lieutenant Riker accuses Commander Riker
    of "playing it safe" and settling for second, while Commander Riker asserts he
    has never settled, understanding what he wants. Commander Riker calls Lieutenant
    Riker's bluff, winning the game. Lieutenant Riker angrily concedes, stating Commander
    Riker "was dealt the better hand... all the way around," and leaves, his resentment
    palpable. Shortly after, Lieutenant Riker visits Troi, excitedly revealing he
    secured a posting on the USS Gandhi, a terraforming vessel. He proposes marriage
    and asks her to join him, but Troi hesitates, admitting she's not ready to abandon
    her life on the Enterprise and expressing her fear of being hurt again. She acknowledges
    their strong connection but needs time to think, leaving their future uncertain
    and his plans for a shared life in limbo.
