- fabula_uuid: act_cb23d8913e50523d
  number: 4
  summary: Troi receives a series of cryptic notes leading her on a romantic "treasure
    hunt" across the Enterprise, culminating in Ten Forward. There, Lieutenant Riker
    awaits her, presenting a slate etching of the Janaran Falls, a place significant
    to their shared romantic past. They engage in a heartfelt conversation where Lieutenant
    Riker admits the challenges of readapting to Starfleet discipline but expresses
    his unwavering determination to restart his career and pursue his desires, subtly
    implying his renewed pursuit of Troi. He recounts his profound isolation on Nervala
    Four, his fantasies of her, and his belief that she might have sensed his presence
    across the vast distance. Troi reciprocates, admitting her own disappointment
    with Commander Riker and her thoughts of him during his absence, suggesting a
    deep, possibly empathic, connection that transcended their physical separation.
    Meanwhile, Captain Picard informs Commander Riker that he has overruled Riker's
    safety concerns, approving Lieutenant Riker's dangerous plan to access the core
    directly. Commander Riker confronts Lieutenant Riker in Engineering, asserting
    his authority and warning him about insubordination, explicitly stating that if
    he cannot follow orders, he has no place on the away team. Later, Troi and Beverly
    discuss Troi's complex feelings for Lieutenant Riker, with Beverly encouraging
    her to explore the new relationship. Lieutenant Riker joins them in the gym, and
    he and Troi engage in a slow, controlled martial arts exchange that quickly evolves
    into an intimate dance, culminating in a passionate kiss that confirms the rekindling
    of their romance.
