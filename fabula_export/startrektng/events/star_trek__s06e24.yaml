  description: 'The away team materializes on the abandoned research station, where
    Riker immediately notices discrepancies in the station’s state—neatness where
    he remembers chaos. Data detects an approaching humanoid, and as the team prepares
    for potential danger, the door opens to reveal a man who is Riker’s exact double.
    The two Rikers stand frozen in mutual recognition, the silence between them charged
    with unspoken questions about identity, choice, and the fractures in Riker’s past.
    The moment shatters the illusion of singularity, forcing both men to confront
    the implications of their shared existence. The scene ends on this existential
    confrontation, setting up the central conflict of the story: whose version of
    reality is true, and what it means for the present.'
