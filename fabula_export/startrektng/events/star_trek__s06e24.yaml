      creating a structured space for their conversation. The furniture frames their
      interaction: Riker sits heavily, his body language betraying vulnerability,
      while Troi maintains a composed posture. The arrangement reinforces the *inequality
      of their emotional states*—Riker is unraveling, while Troi is contained. The
      objects also ground the scene in intimacy, making the rejection feel more personal
      and raw.'
