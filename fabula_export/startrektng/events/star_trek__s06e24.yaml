- fabula_uuid: cand_evt_scene_4826b14cb27a52ff_01
  global_id: null
  title: Riker tests his twin’s poker bluff
  description: 'In Riker’s quarters, Commander Riker dominates a poker game with Data
    and Worf, his confidence unshaken even as Lieutenant Riker—his duplicate—enters
    unannounced. The moment Lieutenant Riker recognizes Riker’s trombone, a shared
    relic from their divergent pasts, the air thickens with unspoken tension. Riker
    invites him to join, framing the game as a test: can the duplicate hold his own
    in *his* world? The stakes escalate as Lieutenant Riker pushes aggressive bets,
    his tone laced with resentment over Riker’s rank and choices. Riker counters with
    a smirk, calling the bluff not just on the cards but on their fractured dynamic.
    When Lieutenant Riker folds in frustration—‘You were dealt the better hand, Commander...
    all the way around’—the subtext is clear: this rivalry isn’t just about poker.
    It’s about Deanna, command, and the life Riker chose while his twin was stranded.
    The door slamming behind Lieutenant Riker leaves the room charged with the unspoken
    question: *Who really won?*'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e24
  scene_sequence: 14
  sequence_in_scene: 35
  key_dialogue:
  - 'LT. RIKER: I thought -- you''d be alone. Excuse me.'
  - 'RIKER: Why don''t you join us?'
  - 'LT. RIKER: You were dealt the better hand, Commander... all the way around.'
  - 'RIKER: I''ve never settled for anything in my life. I''ve made choices that some
    people may not understand, but I know what I want -- and I know what I''ve got.
    You''d be lucky to do as well.'
  - 'LT. RIKER: If there''s one thing I thought would be clear by now, it''s that
    you and I play things a little differently.'
