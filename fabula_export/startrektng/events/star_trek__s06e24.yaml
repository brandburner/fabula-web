  title: Riker’s Proposal and Troi’s Ambivalence
  description: 'In Troi’s quarters, Lieutenant Riker—his duplicate—arrives with news
    of a posting on the *Gandhi*, a fresh start he envisions sharing with her. His
    enthusiasm masks desperation as he proposes marriage, framing it as a solution
    to their shared past and his exclusion from the *Enterprise*. Troi, caught between
    nostalgia and self-preservation, rejects the idea outright, invoking her unresolved
    pain from Commander Riker’s earlier abandonment. Their exchange reveals her fear
    of repeating history and her hard-won independence, while his insistence exposes
    his fragility and need for validation. The scene ends in limbo: Troi neither accepts
    nor rejects him outright, leaving their relationship—and his future—unresolved.
    The confrontation forces both to confront the fragility of their bond and the
    irreconcilable differences between Riker’s idealism and Troi’s need for autonomy.
    The emotional weight lies in Troi’s quiet admission that she’s only just begun
    to heal, and in Riker’s unspoken fear that he’s losing her to the man he once
    was.'
