- fabula_uuid: act_54442af0e0f6ef3a
  number: 3
  summary: Troi gently disengages from Lieutenant Riker's passionate embrace, clarifying
    that her relationship with Commander Riker evolved into a deep friendship rather
    than romance. Lieutenant Riker, initially devastated, finds hope in her words,
    though he is stopped from another embrace, indicating the complexity of their
    rekindled connection. Troi recounts the trajectory of her relationship with Commander
    Riker, explaining how his rapid career advancement on the Potemkin and subsequent
    posting to the Enterprise led to their romantic feelings changing over time. Lieutenant
    Riker reveals that thoughts of her were his primary motivation for survival during
    his eight years of isolation, underscoring the profound depth of his enduring
    love. Despite his disappointment, he agrees to help repair the station's computer,
    demonstrating his commitment to rejoining Starfleet. Later, as Commander Riker,
    Data, and Worf prepare for the second transport window to the station, Lieutenant
    Riker arrives late. Commander Riker, though initially lighthearted, makes a subtly
    pointed comment about Lieutenant Riker's adjustment to Starfleet discipline. On
    the station, the two Rikers work together on the damaged computer. A conversation
    about their estranged father reveals Commander Riker's efforts to reconcile, contrasting
    sharply with Lieutenant Riker's continued resentment and refusal to engage. When
    they discover a damaged servo-link preventing database access, Lieutenant Riker
    insists on a dangerous solo mission into unstable caverns beneath the station,
    disregarding Commander Riker's direct order to return to the Enterprise. Commander
    Riker's anger flares, and he physically restrains Lieutenant Riker, firmly asserting
    his authority and command, creating a palpable tension and open conflict between
    the two men, highlighting their differing approaches to command and obedience.
