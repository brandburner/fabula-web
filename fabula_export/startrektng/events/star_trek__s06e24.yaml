- fabula_uuid: act_57b0f1ba9fa8f4e2
  number: 2
  summary: 'The newly discovered Lieutenant Riker, weathered and in civilian clothes,
    confronts Commander Riker, each man asserting his identity and recounting a conflicting
    version of the Potemkin evacuation eight years ago. Lieutenant Riker claims he
    was stranded on Nervala Four when the transporter beam failed, while Commander
    Riker insists he made it back to the ship safely. This immediate conflict establishes
    the central mystery and the profound personal stakes involved. Dr. Beverly Crusher
    conducts extensive medical and genetic tests, confirming that Lieutenant Riker
    is genetically indistinguishable from Commander Riker. Crucially, their brain
    patterns are identical, a finding that rules out cloning and suggests a shared
    early childhood, further deepening the enigma. Commander La Forge''s analysis
    of the Potemkin''s transport logs provides the scientific explanation: a massive
    energy surge during the original evacuation caused Riker''s pattern to be duplicated.
    One pattern rematerialized on the Potemkin, while the second was reflected back
    to the planet''s surface, creating the second Riker. Captain Picard clarifies
    that both men are "real," having originated from a complete pattern, but acknowledges
    their divergent lives over the past eight years have made them distinct individuals.
    The Enterprise requires Lieutenant Riker''s unique knowledge to repair the partially
    operational station computer and retrieve the scientific database. Picard, hesitant
    to send him back immediately, tasks Counselor Troi with evaluating his readiness
    for duty. Lieutenant Riker, now cleaned up and in a Starfleet uniform, researches
    Commander Riker''s service record, learning of his double''s career progression.
    When Troi visits him, he greets her with the intimate term "Imzadi" and passionately
    kisses her, revealing the depth of his long-held affection and the immediate complication
    this new Riker poses for Troi''s existing relationships.'
