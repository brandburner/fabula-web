acts:
- fabula_uuid: act_d26f19e8ea81fd18
  number: 1
  summary: 'The USS Enterprise orbits Nervala Four, a planet shrouded by a distortion
    field that has hindered Starfleet''s efforts to retrieve vital scientific data.
    Commander Riker, in a moment of leisure, plays the trombone during Jazz Night
    in Ten Forward, a scene of casual camaraderie. His performance, particularly a
    challenging solo, is playfully highlighted by Counselor Troi and Dr. Crusher,
    hinting at Riker''s personal life and aspirations beyond his Starfleet duties.
    This domestic tranquility is abruptly interrupted when Data summons Riker to the
    Bridge. Data and Commander La Forge report a breakthrough: they have modified
    the transporters using old logs from the USS Potemkin, allowing them to penetrate
    the planet''s distortion field. Riker, recalling his own narrow escape from Nervala
    Four eight years prior, expresses eagerness to begin the mission. The away team,
    consisting of Riker, Data, and Worf, beams down to the abandoned research station.
    The station''s pristine condition surprises Riker, contradicting his memory of
    its chaotic evacuation. Data''s tricorder then detects an approaching humanoid.
    The team takes defensive positions, and a figure emerges from the shadows. The
    figure is revealed to be an exact duplicate of Commander Riker, leaving the original
    Riker stunned and the narrative poised for an unprecedented confrontation.'
