- fabula_uuid: cand_evt_scene_30f130c3b3532a26_02
  global_id: null
  title: Riker Orders Riker to Stand Down
  description: 'The scene opens with the away team materializing in the research station,
    where Lieutenant Riker—having survived alone for years—immediately takes charge
    of the technical repairs. His familiarity with the station’s systems contrasts
    sharply with Commander Riker’s authority, creating an unspoken tension. Their
    first private exchange reveals Lieutenant Riker’s bitterness toward their estranged
    father, a wound Commander Riker has only recently begun to heal. When Data and
    Worf report the EPS coupling is fused, Lieutenant Riker insists on repairing the
    damaged servo-link in the unstable caverns below, arguing he knows the terrain.
    Commander Riker, bound by Starfleet protocol and the mission’s urgency, orders
    him to stand down. Lieutenant Riker, unaccustomed to taking orders after years
    of isolation, dismisses the command and begins to leave. Commander Riker’s frustration
    erupts—he physically stops his duplicate, asserting his rank with a firm *‘I gave
    you an order, Lieutenant.’* The confrontation freezes time: two identical men,
    one a commander, one a lieutenant, locked in a power struggle that mirrors their
    deeper conflict over duty, survival, and the life each represents. The scene ends
    with their standoff, the air thick with unspoken resentment and the weight of
    their fractured relationship. This moment is a turning point, forcing both Rikers
    to confront the irreconcilable roles they now occupy—one bound by duty, the other
    by instinct—and the trust between them fractures further, setting the stage for
    the broader narrative question of which version of Riker will define the future.'
