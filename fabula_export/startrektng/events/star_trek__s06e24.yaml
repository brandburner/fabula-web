    what_happened: "\n      Seated on the Sickbay examination table, Lieutenant Riker\
      \ projects a mix of urgency and exhaustion, his body language tense but controlled.\
      \ He recounts his past with raw honesty—the rockslide, the isolation, the self-set\
      \ fracture—his voice carrying the weight of eight years of survival. When Picard\
      \ enters, he straightens, addressing him with military precision, but his insistence\
      \ that *he* is the original Riker betrays a deeper desperation: *I am not the\
      \ copy. I am the man who was left behind.* His fleeting grin, so like Commander\
      \ Riker’s, is a calculated attempt to humanize himself, to bridge the unbridgeable.\
      \ As he’s escorted out, his relief at the promise of a meal is tinged with the\
      \ unspoken fear: *Will they ever believe me?*\n      "
