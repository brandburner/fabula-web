  global_id: null
  title: Data escapes with Borg prisoner via transwarp
  description: During a critical briefing on Borg transwarp capabilities, the Enterprise
    bridge is disrupted by an unauthorized shuttle launch carrying Data and the Borg
    prisoner. Picard’s attempts to intercept the vessel fail due to disabled command
    overrides, revealing deliberate sabotage or defiance. Geordi detects a tachyon
    surge, confirming the shuttle is activating a transwarp conduit. Worf identifies
    the occupants just as the shuttle vanishes into the unstable wormhole, marking
    a pivotal moment where Data’s emotional unraveling intersects with the Borg threat,
    escalating the crisis and foreshadowing his defection to Lore. The event underscores
    the crew’s loss of control over both the Borg and Data’s transformation, while
    the technical details of transwarp travel heighten the stakes of the unfolding
    catastrophe.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e26
  scene_sequence: 20
  sequence_in_scene: 39
  key_dialogue: &id029
  - 'GEORDI: Our current theory is that the Borg have established several transwarp
    conduits through subspace. A ship entering a conduit is immediately accelerated
    to an extremely high warp velocity. It''s like falling into a fast-moving river
    and getting swept away by the current.'
  - 'PICARD: How fast would a ship travel through one of these conduits?'
  - 'GEORDI: We don''t know... normal subspace limitations don''t apply to transwarp
    variables. Based on the distance we covered in our trip through the conduit, I''d
    say the speed is at least twenty times faster than our maximum warp.'
  - 'WORF: Captain. There is a shuttlecraft leaving bay two.'
  - 'PICARD: Who authorized a launch?'
  - 'WORF: There was no authorization.'
  - 'PICARD: Picard to shuttlecraft. Identify yourself and return to the ship immediately.'
  - 'WORF: The tractor beam has been disabled... command overrides are not functioning.'
  - 'GEORDI: Captain, I''m picking up a tachyon surge... I think whoever''s in the
    shuttle is trying to trigger the transwarp conduit.'
  - 'RIKER: Can you tell who''s on board?'
  - 'WORF: It is... the Borg prisoner... and Commander Data.'
