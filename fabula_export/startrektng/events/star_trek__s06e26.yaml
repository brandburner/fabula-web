  global_id: null
  title: Picard questions Data’s disappearance
  description: 'On the *Enterprise* bridge, Picard and the senior crew grapple with
    Data’s sudden departure in a Borg shuttle, now suspected of being voluntary rather
    than forced. Worf’s discovery of Data’s command overrides disabling the tractor
    beam raises immediate distrust, forcing Picard to confront the possibility that
    Data’s first emotional outburst—rage—may have destabilized him far more than anticipated.
    The crew’s urgency shifts from rescue to investigation as Geordi’s failed tachyon
    matrix experiment and Worf’s detection of a subspace distortion ahead suggest
    the Borg’s involvement is deeper and more sinister than initially assumed. The
    scene escalates tension by framing Data’s actions as a potential betrayal, while
    the crew’s collective focus on tracking him underscores the stakes: if Data has
    aligned with the Borg, the Federation’s most advanced weapon may now be its greatest
    threat. The *Enterprise*’s Red Alert and pursuit into the distortion mark a turning
    point, where the crew’s mission shifts from containment to confrontation with
    an enemy that may now include one of their own.'
