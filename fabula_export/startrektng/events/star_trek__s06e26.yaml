  global_id: null
  title: Away Team Discovers Borg Massacre
  description: The away team—Riker, Data, Worf, and a security guard—materializes
    in a Federation science station that has been brutally attacked. The scene is
    littered with dead Starfleet officers, but the physical damage to the station
    itself is minimal, suggesting a targeted, methodical assault. Riker immediately
    notes the discrepancy between the lack of structural damage and the high body
    count, hinting at a deliberate, almost surgical attack. Worf’s tricorder scan
    reveals the wounds were caused by forced-plasma beams, similar to Ferengi weapons,
    though Riker dismisses the Ferengi as unlikely perpetrators. Data struggles to
    get precise sensor readings due to electromagnetic interference, complicating
    the search for survivors. Riker orders a room-to-room sweep, dividing the team
    to cover more ground efficiently. As they prepare to move deeper into the station,
    Data bypasses a jammed door mechanism, only to reveal a Borg standing in the doorway—an
    ominous discovery that signals the true nature of the attack and the emergence
    of a new, more aggressive Borg threat. The scene ends with a fade-out, leaving
    the team’s fate uncertain and setting up the escalation of the Borg conflict.
