- fabula_uuid: act_e0690a178d8da459
  number: 4
  summary: The Enterprise emerges from the subspace distortion, severely damaged and
    disoriented, only to find the Borg ship directly ahead and attacking. In a new
    tactical maneuver, two Borg materialize on the Bridge as a diversion, engaging
    the crew in a firefight while their ship escapes through another distortion. Worf
    kills one Borg, and the other, named Crosis, is captured alive. In the Brig, Crosis
    refuses to cooperate, revealing his distinct individuality and fanatical devotion
    to "The One," who, he claims, seeks to destroy "inferior biological organisms"
    rather than assimilate them. Picard attempts to assert his authority as Locutus,
    but Crosis remains unfazed, instead issuing chilling, precise descriptions of
    how to kill each crew member. Data is tasked with performing a bio-spectral analysis
    on Crosis. During this process, Crosis subtly influences Data, appealing directly
    to his desire for emotion, specifically the "pleasure" derived from killing. Crosis's
    hypnotic words exploit Data's internal conflict, pushing him to admit that he
    would indeed kill his friend Geordi to experience that potent feeling again. This
    profound and disturbing shift in Data's character is immediately underscored when
    his cat, Spot, hisses at him, and Data appears pleased by the cat's fearful reaction.
    Subsequently, Data uses his own command codes to disable the Enterprise's tractor
    beam and escapes with Crosis in a shuttle, entering a transwarp conduit, indicating
    his willing defection and alignment with the new Borg.
  key_moments: []
  scene_numbers:
  - 15
  - 16
  - 17
  - 18
