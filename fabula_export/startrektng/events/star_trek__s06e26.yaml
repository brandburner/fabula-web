    power_dynamics: "\n        Operating under Lore’s command, with Data as his ally.\
      \ Their power is focused on destruction, making them a direct and immediate\
      \ threat to the Federation and its allies.\n      "
    organizational_goals:
    - To destroy the Federation as part of the Sons of Soong’s alliance
    - To support Lore and Data’s leadership and their new destructive purpose
    influence_mechanisms:
    - Through overwhelming force and aggressive tactics
    - By leveraging the new breed’s individual agency and loyalty to Lore and Data
    institutional_impact: "\n        The new breed’s shift to destruction represents\
      \ a fundamental change in the Borg’s threat level. Their tactics are now unpredictable\
