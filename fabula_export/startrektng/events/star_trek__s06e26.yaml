- fabula_uuid: cand_evt_scene_04b8e2cd28615ba3_01
  global_id: null
  title: Geordi seeks Holodeck refuge after Data’s breakdown
  description: 'Geordi La Forge, visibly burdened by the psychological fallout of
    Data’s violent emotional awakening and the crew’s growing unease, deliberately
    retreats to the Holodeck—a rare sanctuary where he can process his trauma in private.
    His deliberate, solitary walk toward the doors signals his need for isolation,
    a stark contrast to his usual role as the crew’s moral compass and technical anchor.
    The Holodeck represents both a place of solace and a potential workspace for unobserved
    research, hinting at his dual motivations: personal recovery and a quiet, desperate
    attempt to understand—or even counteract—Data’s dangerous emotional spiral. The
    scene underscores Geordi’s growing isolation as the only crew member who might
    still reach Data, while foreshadowing his potential role in either stabilizing
    his friend or being drawn deeper into the conflict with Lore. The quiet, methodical
    act of entering the Holodeck carries weight, as it marks a turning point where
    Geordi’s internal struggle becomes as critical to the story as Data’s external
    descent.'
