  title: Data and Crosis escape via transwarp conduit
  description: "\n  The bridge crew of the *Enterprise* is mid-discussion about the\
    \ Borg's transwarp conduits—Geordi explaining their mechanics, Picard probing\
    \ their limitations—when Worf detects an unauthorized shuttle launch. Picard attempts\
    \ to hail the vessel, then orders a tractor beam lock, but both fail due to command\
    \ overrides. Geordi identifies a tachyon surge, confirming the shuttle is activating\
    \ a transwarp conduit. Worf reveals the occupants: Data and the Borg prisoner,\
    \ Crosis. The shuttle vanishes into the unstable wormhole-like passage, marking\
    \ a critical escalation in the Borg threat and Data's emotional unraveling. The\
    \ event underscores Data's growing defiance, the Borg's technological superiority,\
    \ and the crew's helplessness as the crisis spirals beyond their control.\n  "
