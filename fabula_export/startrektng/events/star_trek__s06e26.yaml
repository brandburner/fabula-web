- fabula_uuid: cand_evt_scene_e871e961a147ed0c_01
  global_id: null
  title: Crosis manipulates Data’s emotional vulnerability
  description: In the Enterprise brig, Picard orders Beverly to revive the captured
    Borg drone, Crosis, despite her medical warnings. Crosis awakens as a fanatical
    individualist, rejecting assimilation in favor of annihilation, and taunts the
    crew with graphic, species-specific threats of violence. Picard’s attempt to interrogate
    him fails, revealing Crosis’s allegiance to 'The One'—a genocidal Borg faction.
    Frustrated, Picard delegates further analysis to Data and Beverly, leaving Data
    alone with Crosis. Crosis shifts tactics, abandoning Borg rhetoric to adopt a
    seductive, almost hypnotic tone, probing Data’s nascent emotions. He exploits
    Data’s memory of rage on Ohniaka III, forcing him to confront the unethical pleasure
    he derived from killing. Through relentless psychological manipulation, Crosis
    compels Data to admit he would kill Geordi to experience emotion again, marking
    the first step in Data’s emotional unraveling and eventual defection. The scene
    establishes the new Borg’s ideological extremism, foreshadows Data’s descent into
    darkness, and underscores the moral stakes of the conflict to come.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e26
  scene_sequence: 18
  sequence_in_scene: 35
  key_dialogue:
  - |-
    PICARD: What is your designation?
    CROSIS: I do not have a designation. My name is Crosis.
    PICARD: Crosis...? How did you get that name?
    CROSIS: It was given to me by the One.
    PICARD: Who is that?
    CROSIS: The One who will destroy you.
  - |-
    CROSIS: You enjoyed it... the surge of emotion inside you as you watched the life drain from your victim... it was unlike anything you've ever known...
    DATA: It was... a very... potent experience...
    CROSIS: You'd like to feel that way again...
    DATA: Yes.
    CROSIS: You'd do anything to feel that way again... even if it meant killing someone.
    DATA: No. That would not... be ethical.
    CROSIS: You don't sound very sure of yourself. Is your ethical program functioning?
    DATA: ...
    CROSIS: If it meant that you could feel emotions again... would you kill your friend... would you kill Geordi?
    DATA: Yes. I would.
  - |-
    PICARD: I am Locutus of Borg. You will respond to my questions.
    CROSIS: Human. Sever the spinal cord at the third vertebrae. Death is immediate.
