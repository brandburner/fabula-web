- fabula_uuid: cand_evt_scene_190f7c963d26de78_01
  global_id: null
  title: Data’s first rage erupts in Borg ambush
  description: The Enterprise crew is ambushed at Ohniaka Three Outpost by a rogue
    Borg faction exhibiting unprecedented individuality and hostility. Unlike traditional
    Borg, these drones display hatred, tactical cunning, and even vengeful speech—one
    explicitly naming a fallen comrade and vowing retaliation. The attack escalates
    into chaotic hand-to-hand combat, with Worf and Riker trading phaser fire while
    a Security Guard is killed. Data, targeted by name, engages in a brutal fight
    with a Borg drone, where his normally neutral expression twists into rage. He
    shouts 'Stop!' repeatedly while violently slamming the drone against the wall,
    marking his first emotional outburst. The Borg dematerialize abruptly, leaving
    the crew stunned by Data’s transformation. This moment fractures the Borg’s collective
    facade and foreshadows Data’s emotional awakening and eventual defection to Lore,
    as his violent reaction mirrors the Borg’s own fractured individuality.
