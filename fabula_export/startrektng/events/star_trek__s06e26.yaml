  object_involvements:
  - object_uuid: ger_object_2e3ad27def6a
    description_of_involvement: "\n        The Security Guard’s phaser rifle is drawn\
      \ and fired in a single, futile shot before the Borg kill him. The rifle symbolizes\
      \ the away team’s initial resistance, but its use is cut short by the Borg’s\
      \ overwhelming force. The weapon’s failure underscores the team’s helplessness\
      \ in the face of the new Borg threat.\n      "
    status_before_event: Loaded and ready, carried by the Security Guard as he enters
      the Borg hall.
    status_after_event: Dropped and abandoned as the Security Guard is killed, left
      on the floor of the Borg hall.
    global_id: ger_object_2e3ad27def6a
  - object_uuid: ger_object_0833ddc9244b
    description_of_involvement: "\n        The dim lights in the Borg hall pierce\
      \ the gloom, casting an eerie glow over the ambush. Geordi’s tricorder scan\
      \ reveals that they emit no detectable energy signature, confirming the presence\
      \ of a dampening field. The lights contribute to the hall’s oppressive atmosphere,\
      \ symbolizing the away team’s blindness to the true nature of the threat they\
      \ face.\n      "
    status_before_event: Functional and casting a dim glow over the Borg hall as the
      away team enters.
    status_after_event: Still functional, their eerie light lingering as the scene
      fades to black.
    global_id: ger_object_0833ddc9244b
  - object_uuid: ger_object_4774bdd489ef
    description_of_involvement: "\n        Geordi scans the Borg hall with his tricorder,\
      \ detecting the dampening field that shields the structure from sensors. The\
      \ tricorder’s readings confirm the away team’s vulnerability, revealing that\
      \ they are trapped with no hope of calling for reinforcements. Its failure to\
      \ detect energy signatures from the lights is a critical clue to the Borg’s\
      \ technological superiority.\n      "
    status_before_event: Functional and in Geordi’s possession as he enters the Borg
      hall.
    status_after_event: Still in Geordi’s possession, but its readings are irrelevant
      as the away team is ambushed.
    global_id: ger_object_4774bdd489ef
  - object_uuid: ger_object_f2fd0aea7a52
    description_of_involvement: "\n        Lore’s military uniform sets him apart\
      \ from the Borg drones and Data, symbolizing his role as their leader. The uniform’s\
      \ design reinforces his authority, making it clear that he is the architect\
      \ of the Borg’s new destructive purpose. It is a visual cue to his power and\
      \ the irreversible shift in the Borg’s tactics.\n      "
    status_before_event: Worn by Lore as he stands on the platform, commanding the
      Borg drones.
    status_after_event: Still worn by Lore as he and Data stand triumphantly over
      the away team.
    global_id: ger_object_f2fd0aea7a52
  - object_uuid: ger_object_9baaf3bf7f8c
    description_of_involvement: "\n        Picard, Troi, and Geordi grip their phasers\
      \ tightly as the Borg close in, preparing for a final stand. The phasers symbolize\
      \ their last line of defense, their humming energy a stark contrast to the Borg’s\
