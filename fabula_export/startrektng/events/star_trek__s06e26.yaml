  global_id: null
  title: Picard orders heightened security after Borg anomaly
  description: In the aftermath of an encounter with a new, aggressive Borg faction,
    the senior officers of the *Enterprise* convene in the observation lounge to analyze
    the Borg’s unprecedented behavior—acting as individuals, displaying concern for
    one another, and prioritizing destruction over assimilation. Riker reports that
    the Borg referred to themselves in the first person and showed emotional responses,
    a stark deviation from their collective nature. Beverly suggests Hugh, the previously
    individualized Borg, may be connected to this change. Picard, visibly troubled
    by the implications, orders heightened security protocols and a full analysis
    of the Borg ship and subspace distortion. His abrupt decision to report to Starfleet
