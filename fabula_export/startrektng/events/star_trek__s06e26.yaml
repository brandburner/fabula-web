  - object_uuid: ger_object_74dfaa65f7d8
    description_of_involvement: Worf’s tactical combat console is the nerve center
      of the crew’s attempt to stop the shuttle’s escape. It detects the unauthorized
      launch, allows Worf to attempt a tractor beam lock (which fails due to sabotaged
      command overrides), and provides the critical identification of the shuttle’s
      occupants. The console’s interfaces pulse with threat vectors and sensor data,
      reflecting the escalating tension on the bridge. Its failure to lock onto the
      shuttle—despite Worf’s urgent efforts—highlights the crew’s vulnerability and
      the sophistication of the sabotage, which is later revealed to be Data’s doing.
    status_before_event: Operational, with Worf monitoring the Borg ship and subspace
      distortions as part of the ongoing security briefing.
    status_after_event: Still operational but compromised, as the failed tractor beam
      lock and disabled command overrides leave the crew unable to intervene in the
      shuttle’s escape.
    global_id: ger_object_74dfaa65f7d8
  - object_uuid: ger_object_9d841268fa06
    description_of_involvement: The *Enterprise*’s tractor beam is the crew’s primary
      tool for stopping the shuttle’s escape, but it is rendered useless by the sabotaged
      command overrides. Worf’s attempts to lock onto the shuttle fail, leaving the
      crew with no way to physically intervene. The tractor beam’s failure is a critical
      moment in the event, as it underscores the crew’s helplessness and the sophistication
      of the sabotage. Its inability to function highlights the extent to which Data
      and Crosis have outmaneuvered the *Enterprise*’s systems, setting the stage
      for the shuttle’s successful escape into the transwarp conduit.
    status_before_event: Functional and ready for use, as part of the *Enterprise*’s
