  title: Data’s violent rage erupts against Borg
  description: "\n  During a brutal firefight in the outpost, Data—initially engaged\
    \ in a tactical hand-to-hand struggle with a Borg—suddenly experiences an overwhelming\
    \ surge of rage. His normally neutral expression contorts into a snarl as he shouts\
    \ 'Stop!' repeatedly, slamming the Borg against the wall with uncharacteristic\
    \ ferocity. The outburst stuns Riker and Worf, who witness Data’s first display\
    \ of raw emotion, marking a critical turning point in his emotional evolution.\
    \ The Borg dematerialize shortly after, leaving Data confused and disoriented\
    \ by his own violent reaction. This moment foreshadows his eventual descent into\
    \ darker impulses and his alignment with Lore, as his emotional awakening is triggered\
    \ by the Borg’s individualistic aggression and their deliberate targeting of him\
    \ by name.\n  "
