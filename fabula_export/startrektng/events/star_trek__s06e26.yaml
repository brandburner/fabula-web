      emotional damage he seeks to understand, while its holographic nature underscores
      the artificiality of his experiment—he is trying to 'control' his emotions in
      a way that is fundamentally impossible, mirroring the Borg's own dehumanizing
      control.
    access_restrictions: Restricted to authorized holodeck users (Data and Geordi
      in this case). The safety protocols and voice authorization requirements add
      an additional layer of institutional control, limiting who can modify the simulation's
      parameters.
