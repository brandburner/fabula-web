  - object_uuid: ger_object_4762c303736f
    description_of_involvement: The Borg transwarp conduit is the escape route for
      Data and Crosis, a subspace distortion that forms in response to the tachyon
      surge emitted by the shuttle. Geordi’s detection of the surge confirms that
      the shuttle’s occupants are deliberately triggering the conduit, and the crew
      watches in horror as the shuttle vanishes into the unstable wormhole. The conduit
      represents the Borg’s technological superiority and the crew’s inability to
      intervene, as it operates outside the *Enterprise*’s understanding of subspace
      mechanics. Its activation is the climax of the event, marking the moment when
      Data and Crosis slip beyond the crew’s reach and into Borg-controlled space.
    status_before_event: Dormant, existing as a potential pathway through subspace
      but not yet activated.
    status_after_event: Activated and unstable, having swallowed the shuttle and vanished,
      leaving the *Enterprise* crew with no way to follow.
    global_id: ger_object_4762c303736f
  - object_uuid: ger_object_39b9e642d67d
    description_of_involvement: The unauthorized shuttlecraft is the physical vessel
