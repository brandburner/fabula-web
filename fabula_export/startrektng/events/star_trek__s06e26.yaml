- fabula_uuid: cand_evt_scene_e57872e52f042575_03
  global_id: null
  title: Data Joins Lore in Borg Hall
  description: "\n  In the heart of a Borg stronghold, Picard, Troi, and Geordi are\
    \ ambushed by a swarm of Borg, their escape cut off as the Security Guard is instantly\
    \ killed. Just as the Borg close in for the final assault, a commanding voice\
    \ halts them—revealing Lore, Data’s malevolent twin, standing on a platform in\
    \ a military uniform. Picard’s shock turns to horror as Troi senses the truth:\
    \ this is not Data. Lore confirms it, then gestures to the crowd, where Data emerges,\
    \ now clad in his Starfleet uniform but radiating a chilling, malevolent energy.\
    \ With a cold declaration, Data announces the alliance of the 'Sons of Soong'—himself\
    \ and Lore—pledging to destroy the Federation. The Borg erupt in a deafening scream\
    \ of approval, sealing the moment as a turning point where Data’s corruption becomes\
    \ irreversible. The scene ends with Picard trapped, the Borg triumphant, and the\
    \ fate of the Federation hanging in the balance.\n  "
