      systems. Geordi configures it to host the tachyon matrix without issue.
    status_after_event: Remains operational but is no longer hosting the tachyon matrix,
      as the experiment has concluded in failure. It stands ready for other potential
      uses, such as defensive maneuvers or sensor scans, as the crew prepares to enter
      the subspace distortion.
