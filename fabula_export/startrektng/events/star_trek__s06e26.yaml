  global_id: null
  title: Crew reveals Borg behavioral anomaly
  description: In the observation lounge, the senior officers of the *Enterprise*
    debrief on their encounter with a new breed of Borg—ones who act as individuals,
    express concern for fallen comrades, and prioritize destruction over assimilation.
    Riker’s report that one Borg referred to itself as 'I' and showed emotional reactions
    shocks the crew, particularly Picard, who connects this to his past decision to
    release Hugh. The revelation forces Picard to escalate security protocols to Condition
    Two, order sensor scans of the Borg ship, and prepare to report to Starfleet Command.
    The scene marks a critical shift in the crew’s understanding of the Borg, foreshadowing
    deeper threats and setting up Data’s emotional turmoil and eventual confrontation
    with Lore. Picard’s abrupt departure signals his personal investment in the situation,
    while the crew’s collective unease underscores the unprecedented nature of the
    threat.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e26
  scene_sequence: 8
  sequence_in_scene: 15
  key_dialogue:
  - 'RIKER: They were fast, aggressive—almost vicious... it was more like fighting
    Klingons than Borg. No offense.'
  - 'WORF: None taken.'
  - 'RIKER: There was another difference. I don’t think they were part of the Borg
    collective... they acted more like individuals.'
  - 'PICARD: ((shocked)) What?'
  - 'RIKER: One of them referred to himself as ''I''.'
  - 'WORF: That Borg also showed concern for a fallen comrade... and called him by
    name.'
  - 'TROI: The only Borg who ever had a name... was Hugh. And we gave it to him.'
  - 'PICARD: Did they show any interest in... assimilating you... or your technology?'
  - 'RIKER: They seemed more concerned with the death of their colleague... and with
    destroying us... I didn’t see anything that suggested they wanted to assimilate
    anyone.'
  - 'PICARD: The Borg’s entire existence was centered around the acquisition of technology
    and cultures... if that is no longer the case... then they must have a new objective.
    We have to find out what it is.'
