      \ personal obsession to institutional responsibility. The location is functional\
      \ but charged with narrative weight—it marks the end of one conflict and the\
      \ beginning of another, pulling the characters from the holodeck’s controlled\
      \ chaos into the unpredictability of the Borg threat.\n      "
