- fabula_uuid: cand_evt_scene_3efea9e0674a73e0_02
  global_id: null
  title: Riker orders tactical search for hidden threat
  description: "\n  The Enterprise away team—Riker, Data, Worf, and a security guard—materializes\
    \ into a Federation science outpost ravaged by a recent attack. The scene is eerily\
    \ underwhelming in physical destruction: bodies of Starfleet officers litter the\
    \ floor, but the structural damage is minimal, suggesting a targeted, methodical\
    \ assault rather than indiscriminate destruction. Riker immediately reacts to\
    \ the brutality of the massacre, noting the lack of structural damage as a clue\
    \ that the attackers were focused on eliminating personnel rather than the station\
    \ itself. Worf scans the bodies with his tricorder and identifies the wounds as\
    \ caused by forced-plasma beams, similar to Ferengi hand phasers, though Riker\
    \ dismisses the Ferengi as unlikely perpetrators given the scale of the violence.\n\
    \n  Data attempts to use his tricorder to detect survivors, but electromagnetic\
    \ interference complicates the readings. Riker, recognizing the need for a systematic\
    \ approach, divides the team: Worf and the security guard are tasked with searching\
    \ the north wing, while Riker and Data take the south. As they prepare to move,\
    \ Data encounters a jammed door mechanism. His attempt to bypass it reveals a\
    \ lone Borg drone standing in the doorway—a chilling first encounter with the\
    \ new, aggressive Borg variant. This moment marks a turning point, as the Borg’s\
    \ presence triggers an unprecedented emotional reaction in Data, setting the stage\
    \ for his subsequent descent into rage and defection.\n  "
