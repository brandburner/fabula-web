acts:
- fabula_uuid: act_e27836a2eef653d4
  number: 1
  summary: 'The USS Enterprise responds to a distress call from the Ohniaka Three
    Outpost, finding it brutally decimated by a new, aggressive breed of Borg. An
    away team, led by Riker and including Data and Worf, beams down to the ravaged
    outpost. They discover numerous dead Starfleet officers and note minimal structural
    damage, indicating the attackers were focused on the personnel. During their investigation,
    they are ambushed by these new Borg, who exhibit unprecedented individuality,
    cunning, and raw hatred, a stark contrast to the calm, collective automatons previously
    encountered. The Enterprise simultaneously fends off an attack from the alien
    Borg ship. In a fierce hand-to-hand confrontation with one of these new Borg,
    Data experiences his first emotion: a violent, uncontrollable rage that manifests
    as he brutally defeats and kills the Borg. This unsettling development leaves
    Data profoundly confused, yet marks a pivotal and disturbing shift in his character.
    The Borg ship then demonstrates advanced escape capabilities by utilizing a rapidly
    forming subspace distortion, vanishing before the Enterprise can intercept. Back
    on the outpost, Riker confronts Data about his actions, and Data, in a state of
    stunned realization, reveals, "I got angry." This act establishes the immediate,
    terrifying threat of the evolved Borg and introduces Data''s nascent, and deeply
    troubling, emotional awakening, setting a dark trajectory for his character arc.'
  key_moments: []
  scene_numbers:
  - 1
  - 2
