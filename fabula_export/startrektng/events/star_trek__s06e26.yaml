      its role is critical: it enables Geordi’s experiment, even if the experiment
      ultimately fails. The deflector’s involvement highlights the crew’s reliance
      on the Enterprise’s advanced technology to counter the Borg’s threats, as well
      as the ship’s dual role as both a scientific research vessel and a combat-ready
      starship.'
