  key_dialogue:
  - 'NEWTON: Do not patronize me, sir! I invented physics. The day that apple fell
    on my head was the most momentous day in the history of science.'
  - 'DATA: I am in. When I play poker with my shipmates, I often find that it is a
    useful forum for exploring different facets of humanity. I was curious to see
    how three of history''s greatest minds would interact in this setting. So far
    it has proved most illuminating.'
  - 'EINSTEIN: The uncertainty principle will not help you now, Stephen. All the quantum
    fluctuations in the universe won''t change the cards in your hand. I call. You
    are bluffing and you will lose.'
  - 'HAWKING: Wrong again, Albert.'
