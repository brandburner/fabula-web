- fabula_uuid: cand_evt_scene_e57872e52f042575_01
  global_id: null
  title: Lore Reveals Himself and Data Defects
  description: "\n  The Enterprise away team—Picard, Troi, Geordi, and a Security\
    \ Guard—infiltrates a shielded Borg meeting hall, only to be ambushed by a horde\
    \ of screaming, aggressive Borg. The Security Guard is instantly killed in the\
    \ attack, leaving Picard, Troi, and Geordi trapped and outnumbered. Just as the\
    \ Borg close in for the kill, Lore—Data’s malevolent twin—intervenes, halting\
    \ the assault. Picard initially mistakes Lore for Data, but Troi’s empathic senses\
    \ immediately detect the malevolence, confirming Lore’s true identity. Moments\
    \ later, Data emerges from the Borg ranks, his demeanor now dark and hostile,\
    \ declaring his allegiance to Lore and their shared mission to destroy the Federation.\
    \ The Borg’s deafening screams of approval underscore the irreversible shift in\
    \ Data’s loyalties, marking a pivotal turning point in the story. The scene ends\
    \ with Lore and Data standing triumphantly as the Borg cheer, leaving Picard and\
    \ the crew in stunned horror.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e26
  scene_sequence: 28
  sequence_in_scene: 53
  key_dialogue: &id047
  - 'TROI: It seems to be some kind of meeting hall.'
  - 'PICARD: A dampening field. The whole structure could be shielded from our sensors.
    Let''s go.'
  - 'LORE: Stop!'
  - 'PICARD: Data...?'
  - 'TROI: That''s not Data...'
  - 'LORE: You should listen to her, Captain. She''s way ahead of you.'
  - 'PICARD: Lore...'
  - 'DATA: The Sons of Soong have joined together... and together, we will destroy
    the Federation.'
