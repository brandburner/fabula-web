  title: Data confronts his disturbing emotional truth
  description: In Troi’s office, Data confesses his failed attempts to replicate positive
    emotions—opera, humor, erotic stimuli—all yielding nothing. Troi challenges his
    avoidance of anger, the only emotion he’s experienced, and he reluctantly admits
    his post-Borg-killing sensation wasn’t just rage but *pleasure*, a revelation
    that unsettles him. Troi reassures him of his inherent goodness, but Data’s self-doubt
    lingers, foreshadowing his vulnerability to Lore’s manipulation. The scene pivots
    from intellectual curiosity to moral crisis, marking a critical juncture in Data’s
    arc as he grapples with the possibility that his emotions may not align with human
    virtue—or his own self-image.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e26
  scene_sequence: 10
  sequence_in_scene: 21
  key_dialogue:
  - 'DATA: For the past six hours, I have attempted to produce an emotional response
    by subjecting myself to various stimuli. I listened to several operas known to
    be uplifting, I watched three Holodeck programs designed to be humorous, and I
    made four attempts to induce sexual desire by subjecting myself to erotic imagery.'
  - 'TROI: Feelings aren''t positive or negative, Data. They simply exist. It''s what
    we do with those feelings that becomes good or bad.'
  - 'DATA: When I was fighting the Borg, I felt angry... but as I think back on that
    incident, I realize that I also experienced another sensation. It was not the
    same as anger, but I think it was an emotion. It was just after I had killed the
    Borg. I looked down at his body and I... felt something. I believe it was pleasure.'
