    and tell them to read it this time.'
  - 'PICARD (V.O.): Captain''s Log: Supplemental. We have been on patrol for seventeen
    hours, and there are still no reports of any further Borg activity. But tensions
    continue to run high on the colonies and outposts in this sector.'
