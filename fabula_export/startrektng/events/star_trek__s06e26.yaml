- fabula_uuid: cand_evt_scene_ac3b910aa750c73f_01
  global_id: null
  title: Enterprise discovers Borg devastation
  description: "\n  The *Enterprise* emerges from a violent subspace distortion into\
    \ a star system ravaged by a recent Borg attack. Geordi La Forge detects the remnants\
    \ of two advanced civilizations obliterated by plasma weapons, confirming the\
    \ Borg’s presence and their escalated destructiveness. Riker traces the shuttle’s\
    \ energy signature to a planet below, but sensor interference—likely natural—blocks\
    \ further scans, forcing Picard to authorize a high-risk away team deployment.\
    \ The crew’s discovery of the Borg’s new, more aggressive tactics (destruction\
    \ over assimilation) and the shuttle’s trail to the planet surface sets the stage\
    \ for Data’s emotional awakening and the crew’s confrontation with this terrifying\
    \ new threat. The scene underscores the Borg’s evolving menace while establishing\
    \ the mission’s urgency and danger.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e26
  scene_sequence: 23
  sequence_in_scene: 45
  key_dialogue: &id033
  - 'GEORDI: Captain, you should take a look at this. I''ve scanned three star systems
    within sensor range... there''s evidence of at least two advanced civilizations...
    but I''m reading no life signs. And there are indications that plasma weapons
    have been fired in those systems recently.'
  - 'PICARD: The Borg have been busy.'
  - 'RIKER: I think we''ve found the shuttle''s energy signature.'
  - 'GEORDI: It looks more like a natural phenomenon... there''s an unusually high
    amount of EM activity in the planet''s magnetosphere.'
  - 'PICARD: Can we transport through the interference?'
  - 'GEORDI: I think so... but there could be fifty Borg down there waiting for us
    and we''d have no way of knowing it.'
  - 'RIKER: I''d say it''s a risk we have to take.'
  - 'PICARD: Agreed. Take a well-armed Away Team and beam down to those coordinates.
    Have the Transporter Chief maintain a continuous lock on your signals so we can
    get you out of there at the first sign of trouble.'
