      coordinated formation around the Large Alien Building, their phasers drawn and
      their movements synchronized. They maintain a defensive circle, ensuring that
      all angles are covered as they follow Picard’s lead. Their silence is deliberate,
      their focus absolute, as they prepare for the possibility of an ambush or encounter
      with an unknown threat. The guards’ presence is a tangible reminder of the team’s
      vulnerability in this unfamiliar and potentially hostile environment.
