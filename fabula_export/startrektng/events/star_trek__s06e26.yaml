  title: Enterprise investigates mysterious distress call
  description: "\n  The *Enterprise* responds to a distress signal from the strategically\
    \ irrelevant Ohniaka Three Outpost, a decision that disrupts routine operations\
    \ and immediately raises suspicion. Upon arrival, the crew detects an unidentified\
    \ vessel orbiting the planet—one that refuses all hails and exhibits a menacing\
    \ design, suggesting deliberate concealment or hostile intent. Picard, puzzled\
    \ by the outpost's lack of strategic value, orders an investigation, while Data's\
    \ sensor readings reveal electromagnetic interference obscuring life signs on\
    \ the surface. The tension escalates as Riker, Data, and Worf prepare to beam\
    \ down, setting the stage for a potential confrontation or revelation tied to\
    \ the larger Borg threat. The scene establishes a critical turning point: the\
    \ crew's transition from intellectual curiosity (as seen in Data's holodeck poker\
    \ game) to real-world urgency, where the horrors of the new Borg breed will soon\
    \ force Data to confront his first emotion—rage—and begin his descent toward Lore.\n\
    \  "
