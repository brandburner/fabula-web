  key_dialogue:
  - 'DATA: "For the past six hours, I have attempted to produce an emotional response
    by subjecting myself to various stimuli. I listened to several operas known to
    be uplifting, I watched three Holodeck programs designed to be humorous, and I
    made four attempts to induce sexual desire by subjecting myself to erotic imagery."'
  - 'TROI: "Feelings aren''t positive or negative, Data. They simply exist. It''s
    what we do with those feelings that becomes good or bad. For example, feeling
    angry about an injustice could lead someone to take a positive action to correct
    it."'
  - 'DATA: "I also experienced another sensation. It was not the same as anger, but
    I think it was an emotion. [...] I believe it was pleasure."'
