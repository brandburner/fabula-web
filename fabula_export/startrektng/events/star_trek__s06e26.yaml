  global_id: null
  title: Data's first emotion analyzed
  description: "\n  In the aftermath of Data's violent malfunction during the Borg\
    \ encounter, Geordi La Forge conducts a diagnostic examination in Main Engineering\
    \ to determine the cause of Data's erratic behavior. After ruling out hardware\
    \ or software issues, Data reveals his hypothesis: he believes he experienced\
    \ his first emotion—anger. Geordi, skeptical but engaged, struggles to articulate\
    \ what anger feels like without referencing other emotions, highlighting the inherent\
    \ complexity of human feeling. Data, unable to describe his own experience beyond\
    \ 'I simply felt angry,' mirrors Geordi's difficulty, suggesting a fundamental\
    \ gap in his understanding of emotional states. Their conversation foreshadows\
    \ Data's existential journey as he grapples with the implications of his newfound\
    \ emotional capacity, particularly the fear that anger may be the only emotion\
    \ within his reach. The scene underscores the tension between Data's analytical\
    \ nature and the messy, indefinable reality of human emotion, setting the stage\
    \ for his eventual descent into darker feelings and defection to Lore.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e26
  scene_sequence: 9
  sequence_in_scene: 17
  key_dialogue:
  - 'DATA: Geordi, I believe I experienced my first emotion.'
  - 'GEORDI: Data... no offense, but how would you know an actual flash of anger from
    some kind of odd power surge?'
  - 'DATA: I simply... felt angry.'
  - 'GEORDI: Let''s say that you''re right... and this was an emotion. How is that
    possible?'
  - 'DATA: Perhaps I have evolved to the point where emotions are within my reach.
    Perhaps I will experience other emotions as time goes on.'
