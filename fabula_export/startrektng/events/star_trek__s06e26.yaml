  - 4
  - 5
- fabula_uuid: act_481c5cc809b88e1e
  number: 2
  summary: 'Following Data''s unprecedented emotional outburst, the Enterprise crew
    convenes to discuss the alarming new Borg behavior. Riker describes them as fast,
    aggressive, and individualistic, showing concern for fallen comrades and using
    personal pronouns, leading to speculation that Hugh, the individualized Borg Picard
    released, might be connected. Picard grapples with the moral implications of his
    past decision, particularly when Admiral Nechayev arrives, harshly criticizing
    his choice to spare Hugh. Nechayev issues a direct, unyielding order: if presented
    with another opportunity to destroy the Borg, Picard must take it, regardless
    of his conscience, prioritizing Federation security above all else. This confrontation
    weighs heavily on Picard, highlighting his internal conflict between duty and
    morality. Concurrently, Data consults Geordi and Troi, attempting to understand
    his anger and induce other emotions. He struggles to define anger without referring
    to other feelings, and despite trying to evoke positive emotions through various
    stimuli, he admits to Troi that he experienced "pleasure" after killing the Borg
    on Ohniaka Three. This confession reveals a darker, more disturbing aspect of
    Data''s nascent emotional development, troubling both him and the Counselor, and
    deepening his internal struggle with the ethical implications of his newfound
    feelings.'
  key_moments: []
  scene_numbers:
