    description_of_involvement: Starfleet is represented in this event through Picard’s
      authority, the crew’s adherence to protocol, and the brig’s institutional safeguards.
      The organization’s influence is felt in Picard’s decision to revive Crosis despite
      medical warnings, his delegation of analysis to Data and Beverly, and the Security
      Guard’s strict adherence to forcefield protocols. Starfleet’s protocols and
      resources (e.g., tricorders, hyposprays, forcefields) are leveraged to manage
      the threat, but Crosis’s individualism and psychological tactics expose the
      limitations of those systems. The event highlights Starfleet’s reliance on logic
      and technology, which are ultimately insufficient against emotional manipulation.
    active_representation: Through institutional protocol (revival against medical
      advice), delegation of analysis (Picard to Data/Beverly), and security measures
      (forcefield, armed guards).
    power_dynamics: Exercising authority over the situation but operating under constraint
      (Crosis’s unpredictability). Starfleet’s power is challenged by the new Borg’s
      ideological extremism and psychological tactics.
    organizational_goals:
    - Extract intelligence about the new Borg faction and 'The One.'
    - Contain the threat posed by Crosis while minimizing risk to the crew.
