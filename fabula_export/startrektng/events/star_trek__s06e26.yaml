- fabula_uuid: act_819c6e71065ced21
  number: 3
  summary: The Federation sector experiences heightened tensions as multiple false
    distress calls strain resources and nerves, prompting Picard to reflect on his
    contentious decision to release Hugh. He confides in Riker, questioning if his
    moral choice was ultimately the "right" one, acknowledging the immense risk taken
    for the sake of an individual's rights over the safety of the Federation. Meanwhile,
    Data, driven by a disturbing curiosity, attempts to recreate his violent anger
    in the holodeck, repeatedly engaging in combat with a simulated Borg. His experiments
    escalate to dangerous levels when he requests to disable the holodeck's safety
    protocols, seeking to replicate the genuine jeopardy of the original encounter.
    Geordi, alarmed by Data's casual disregard for his own safety and his growing
    obsession with the potent experience of rage, firmly refuses to authorize such
    a dangerous experiment. Before Data can pursue other means, another Borg attack
    occurs at the MS One colony, and Picard notes the suspicious pattern of the Enterprise
    always being the nearest ship. The Enterprise pursues the Borg vessel, but it
    once again escapes through a subspace distortion, this time pulling the Enterprise
    into the unknown, leaving its fate uncertain. This act significantly raises the
    external stakes with the Borg's escalating attacks and deepens Data's internal
    descent into a dangerous fascination with the darker aspects of emotion.
