  title: Borg diversion and Data's discovery
  description: "\n  After the *Enterprise* is violently shaken by a Borg attack and\
    \ forced into normal space, the crew regroups only to realize the Borg ship has\
    \ vanished. Worf confirms the vessel escaped via a distortion field, revealing\
    \ the two drones that materialized on the bridge were a deliberate diversion.\
    \ The crew's relief is short-lived when Data discovers the fallen Borg drone named\
    \ Crosis is still alive—a shocking deviation from standard Borg behavior. Riker\
    \ notes the drones were left behind rather than vaporized, signaling a tactical\
    \ shift in Borg strategy. The scene ends with Picard speculating on the Borg's\
    \ evolving methods, while Data's examination of the living drone foreshadows his\
    \ impending emotional rupture. The event underscores the Borg's newfound cunning\
    \ and sets up Data's critical confrontation with the collective's unyielding nature.\n\
    \  "
