      Berlin, reinforcing the expectation that colonies adhere to Starfleet guidelines.
      The organization’s power dynamics are on full display: it exercises control
      over the Enterprise’s response, the Crazy Horse and Agamemnon’s standby status,
      and the colony’s reprimand. Starfleet’s goals in this event are twofold: to
      maintain operational efficiency (by standing down from false alarms) and to
      uphold institutional standards (by enforcing protocol compliance). Its influence
      mechanisms include direct orders (Picard to Worf), procedural documentation
      (ship recognition protocols), and hierarchical accountability (the colony’s
      chastisement).'
