    global_id: ger_object_b6382767d215
  - object_uuid: ger_object_4762c303736f
    description_of_involvement: "\n        The Borg transwarp conduit is the narrative\
      \ and technical climax of this event. Activated by the shuttle’s tachyon surge,\
      \ it accelerates the vessel to twenty times maximum warp speed and swallows\
      \ it whole, vanishing instantly. The conduit’s appearance on the viewscreen\
      \ is a visual manifestation of the Borg’s power and the crew’s helplessness.\
      \ Its activation foreshadows the escalating crisis and Data’s defection to Lore,\
      \ while also demonstrating the Borg’s evolving tactics—prioritizing destruction\
      \ and emotional subversion over assimilation.\n      "
    status_before_event: Dormant, undetected by Enterprise sensors until triggered
      by the tachyon surge.
    status_after_event: Active, having swallowed the shuttle; now vanished, leaving
      no trace.
    global_id: ger_object_4762c303736f
