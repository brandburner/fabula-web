- fabula_uuid: act_a286062a2f0b82e2
  number: 5
  summary: Grappling with Data's shocking defection, Picard and the crew debate whether
    he was coerced or willingly joined Crosis, ultimately deciding to pursue him through
    the transwarp conduit. Geordi successfully replicates the tachyon pulse, and the
    Enterprise enters the conduit, traversing an immense distance. Upon exiting, they
    discover multiple star systems decimated by plasma weapons, grim evidence of the
    new Borg's destructive campaign. Tracing Data's shuttle to a planet with heavy
    electromagnetic interference, Picard organizes numerous well-armed away teams
    for a ground search, leaving Beverly Crusher in command of the Enterprise with
    explicit orders to retreat to Federation space if attacked. Picard's team, including
    Troi and Geordi, embarks on the search. Geordi proposes a dangerous method to
    locate Data that would destroy his positronic net, highlighting the extreme measures
    considered. Troi senses a mysterious, well-maintained building, which turns out
    to be shielded from sensors. Inside, they are ambushed by a horde of screaming
    Borg. The Security Guard is killed, and as Picard, Troi, and Geordi prepare for
    a final stand, Lore, Data's evil twin, appears on a platform, revealing himself
    as "The One." Data, now malevolent, dangerous, and clad in a military-style uniform,
    joins Lore, declaring, "The Sons of Soong have joined together... and together,
    we will destroy the Federation." The Borg erupt in a cacophony of approval, leaving
    Picard and his team facing an overwhelming and terrifying new threat, concluding
    the episode on a stark cliffhanger.
