    organizational_goals:
    - To facilitate Data and Crosis’s escape, using the transwarp conduit as a means
      to evade the *Enterprise* and continue their mission.
    - To demonstrate the Borg’s ability to operate independently while still leveraging
      their collective technology, thereby undermining Starfleet’s understanding of
      the Collective.
    influence_mechanisms:
    - Through the transwarp conduit, which is activated by the tachyon surge and provides
      the shuttle with a means of escape.
    - Through Crosis’s manipulation of Data, which exploits the android’s emotional
      vulnerabilities and turns him against the *Enterprise* crew.
    institutional_impact: The event reinforces the Borg as an existential threat,
      one that can now operate from within Starfleet’s ranks. It also highlights the
      crew’s sudden helplessness in the face of a enemy that can turn their own systems
      and personnel against them.
    internal_dynamics: The Borg’s internal dynamics are not directly depicted, but
      their influence is felt through Crosis’s actions and the transwarp conduit’s
      activation. The event suggests a factional divide within the Borg, as Crosis
      and Lore operate independently of the Collective, pursuing their own agenda
