      manipulation of Data, which are both direct extensions of Borg influence.
    power_dynamics: Exercising dominance over the *Enterprise* crew, as their technology
      and Crosis’s actions render the crew’s systems useless and their attempts to
      intervene futile. The Borg’s power in this event is insidious, operating through
