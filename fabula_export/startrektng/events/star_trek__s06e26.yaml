- fabula_uuid: cand_evt_scene_ac3b910aa750c73f_02
  global_id: null
  title: Picard authorizes high-risk away team deployment
  description: "\n  The *Enterprise* emerges from an unexpected transwarp jump into\
    \ a devastated star system, where Geordi La Forge’s scans reveal the remnants\
    \ of two advanced civilizations obliterated by plasma weapons—clear evidence of\
    \ the Borg’s destructive handiwork. With the shuttle’s energy signature traced\
    \ to a planet wracked by electromagnetic interference, Picard and Riker debate\
    \ the risks of beaming down an armed away team. Geordi warns that the interference\
    \ could mask a Borg ambush, but Picard, recognizing the urgency of the situation,\
    \ overrides safety protocols and orders Riker and Worf to lead a well-armed team\
    \ to the surface. The decision underscores the mission’s desperation: the Borg\
    \ threat has evolved into something far more aggressive and unpredictable, and\
    \ Data’s disappearance—along with the Borg—hints at a deeper, more personal danger.\
    \ Picard’s insistence on maintaining a continuous transporter lock reflects his\
    \ awareness of the stakes, foreshadowing the escalating conflict and the emotional\
    \ turmoil that awaits the crew as they confront this new enemy variant.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e26
  scene_sequence: 23
  sequence_in_scene: 46
  key_dialogue: &id035
  - 'GEORDI: Captain, you should take a look at this. I''ve scanned three star systems
    within sensor range... there''s evidence of at least two advanced civilizations...
    but I''m reading no life signs. And there are indications that plasma weapons
    have been fired in those systems recently.'
  - 'PICARD: The Borg have been busy.'
  - 'GEORDI: I think so... but there could be fifty Borg down there waiting for us
    and we''d have no way of knowing it.'
  - 'RIKER: I''d say it''s a risk we have to take.'
  - 'PICARD: Agreed. Take a well-armed Away Team and beam down to those coordinates.
    Have the Transporter Chief maintain a continuous lock on your signals so we can
    get you out of there at the first sign of trouble.'
