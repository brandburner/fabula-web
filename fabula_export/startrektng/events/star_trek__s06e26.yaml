    description_of_involvement: 'Starfleet is centrally involved in this event through
      the away team’s investigation of the outpost attack. The team’s actions—searching
      for survivors, analyzing forensic evidence, and confronting the Borg drone—reflect
      Starfleet’s protocols for responding to distress signals and threats. The discovery
      of the new Borg variant challenges Starfleet’s understanding of the Borg Collective,
      foreshadowing the episode’s central conflict: a Borg faction that operates with
      individual agency and destructive intent. Starfleet’s presence is embodied in
      the away team’s professionalism, their reliance on technology (tricorders, phasers),
      and their commitment to uncovering the truth behind the attack.'
    active_representation: Through the actions and protocols of the away team, who
      represent Starfleet’s investigative and defensive capabilities.
    power_dynamics: Exercising authority over the investigation but operating under
      the constraint of an unknown and adaptive threat (the new Borg variant). The
      team’s actions are guided by Starfleet’s protocols, but the revelation of the
      Borg drone introduces a challenge that tests their preparedness.
    organizational_goals:
