      vulnerable. His logical defenses crumble under Crosis’s probing, forcing him
      to confront suppressed memories of rage on Ohniaka III. By the end, Data is
      emotionally compromised, admitting he would kill Geordi to experience emotions
      again—a confession that marks the beginning of his moral descent.
