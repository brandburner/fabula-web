  title: Picard authorizes away team to investigate outpost
  description: "\n  The *Enterprise* arrives at the Ohniaka system in response to\
    \ a distress call from a strategically insignificant outpost, only to find an\
    \ unidentified, menacing vessel orbiting the planet. Picard, Riker, and the bridge\
    \ crew analyze the situation, noting the ship’s unfamiliar configuration and lack\
    \ of response to hails. Data’s sensor scans reveal overwhelming electromagnetic\
    \ interference, obscuring whether life signs remain on the outpost’s surface.\
    \ After a brief strategic discussion, Picard authorizes an away team—Riker, Data,\
    \ and Worf—to physically investigate the site, marking a critical escalation in\
    \ the crew’s response to the emerging Borg threat. The decision underscores the\
    \ urgency of the situation, as the crew transitions from passive observation to\
    \ direct confrontation with an unknown, potentially hostile force. This moment\
    \ also sets the stage for Data’s first exposure to the horrors of the new Borg,\
    \ foreshadowing his emotional awakening and the darker trajectory that follows.\n\
    \  "
