- fabula_uuid: cand_evt_scene_5167f06fdec10465_03
  global_id: null
  title: Data’s reckless experiment interrupted by red alert
  description: 'In the holodeck, Data relentlessly recreates his violent encounter
    with the Borg, escalating the simulation’s danger to replicate the life-threatening
    conditions of the original incident. His detached repetition of ''Stop. Stop.
    Stop.''—now devoid of emotion—contrasts sharply with the raw rage he experienced
    earlier, revealing his desperate attempt to force another emotional breakthrough.
    Geordi, alarmed by Data’s recklessness, confronts him, refusing to authorize the
    safety override that would put Data’s life at risk. Their tense standoff exposes
    the fracture in their friendship: Geordi’s moral objection clashes with Data’s
    single-minded pursuit of emotion, even at the cost of his own existence. Just
    as the conflict reaches a breaking point, Riker’s red alert interrupts, forcing
    them to abandon the confrontation and rush to their duty stations. The abrupt
    interruption underscores the escalating Borg threat’s urgency while leaving Data’s
    emotional crisis unresolved, his vulnerability now entangled with the larger narrative
    stakes of the Borg attack.'
