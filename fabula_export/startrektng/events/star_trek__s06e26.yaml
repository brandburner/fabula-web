- fabula_uuid: cand_evt_scene_190f7c963d26de78_02
  global_id: null
  title: Borg identify Data by name and rank
  description: "\n  During a chaotic firefight at the Ohniaka Three Outpost, a newly\
    \ encountered Borg collective—distinct from the hive-minded drones of the past—exhibits\
    \ unsettling individuality. While Riker, Worf, and a security guard engage in\
    \ a desperate shootout with the Borg, one drone (Borg #2) methodically scans the\
    \ Starfleet officers, categorizing them by species and rank. When his gaze lands\
    \ on Data, his demeanor shifts: he pauses, frowns, and recites Data’s full designation—*Artificial\
    \ lifeform. Starfleet Rank: Lieutenant Commander. Name: Data*—with eerie precision.\
    \ This targeted recognition marks the first time the Borg have singled out Data\
    \ as an individual, suggesting prior knowledge of his existence. The revelation\
    \ triggers a silent, unspoken communication between the Borg drones, culminating\
    \ in a coordinated attack where one drone (Borg #3) breaks formation to engage\
    \ Data in hand-to-hand combat. The Borg’s ability to identify Data by name foreshadows\
    \ his pivotal role in the conflict, while their individualistic behavior—marked\
    \ by hatred, vengeance, and tactical cunning—hints at a fractured, rogue collective.\
    \ The moment also sets the stage for Data’s emotional awakening, as his subsequent\
    \ violent outburst (triggered by the Borg’s aggression) becomes the first visible\
    \ crack in his unemotional facade.\n  "
