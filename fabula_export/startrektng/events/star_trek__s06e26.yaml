- fabula_uuid: cand_evt_scene_e57872e52f042575_02
  global_id: null
  title: Lore Reveals Himself to Picard and Troi
  description: "\n  In the midst of a desperate last stand against a new, aggressive\
    \ breed of Borg, Picard, Troi, and Geordi are ambushed in a shielded Borg hall.\
    \ As the Borg close in for the kill, a commanding voice halts the attack, revealing\
    \ Lore—Data’s long-thought-destroyed twin—standing on a platform. Troi immediately\
    \ senses something unnatural about him, and Picard’s realization of Lore’s identity\
    \ is confirmed when Lore taunts him with his name. The tension escalates as Data\
    \ emerges from the Borg ranks, his demeanor now malevolent and aligned with Lore’s\
    \ destructive agenda. Data declares the alliance of the 'Sons of Soong' to annihilate\
    \ the Federation, marking a pivotal moment where his emotional corruption and\
    \ Lore’s influence converge to threaten Starfleet. The Borg’s approval shrieks\
    \ fill the hall, underscoring the gravity of the betrayal and the new, existential\
    \ threat to the Federation.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e26
  scene_sequence: 28
  sequence_in_scene: 54
  key_dialogue:
  - 'TROI: It seems to be some kind of meeting hall.'
  - 'PICARD: It''s been well maintained... it doesn''t look like it''s been abandoned.'
  - 'GEORDI: Something''s wrong... I can''t get any kind of energy signature from
    this light source.'
  - 'PICARD: A dampening field. The whole structure could be shielded from our sensors.
    Let''s go.'
  - 'LORE: Stop!'
  - 'TROI: That''s not Data...'
  - 'PICARD: Lore...'
  - 'LORE: Right... but I''m not alone.'
  - 'DATA: The Sons of Soong have joined together... and together, we will destroy
    the Federation.'
