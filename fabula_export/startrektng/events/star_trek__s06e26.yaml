- fabula_uuid: cand_evt_scene_ce7bd07433793fdb_01
  global_id: null
  title: Data confronts emotional repression with Troi
  description: In Troi’s office, Data admits to systematically avoiding negative emotions—particularly
    anger—after experiencing violent rage during a Borg encounter. Troi challenges
    his emotional suppression, arguing that emotions are neutral tools and that his
    fear of moral corruption is misplaced. Data reveals he also felt *pleasure* after
    killing the Borg, a confession that unsettles Troi and foreshadows his descent
    into darker emotional territory. The exchange exposes Data’s self-doubt about
    his capacity for humanity and his growing fixation on emotions as a means to sentience,
    setting up his later defection to Lore. Troi’s reassurance contrasts with Data’s
    escalating internal conflict, where his intellectual curiosity about emotions
    collides with his fear of becoming something monstrous.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e26
  scene_sequence: 10
