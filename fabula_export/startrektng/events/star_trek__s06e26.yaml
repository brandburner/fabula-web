  - object_uuid: ger_object_4762c303736f
    description_of_involvement: The Borg transwarp conduit is the escape route for
      Data and Crosis, a subspace distortion that forms in response to the tachyon
      surge emitted by the shuttle. Geordi’s detection of the surge confirms that
      the shuttle’s occupants are deliberately triggering the conduit, and the crew
