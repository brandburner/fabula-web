      escape, and their collective shock at Data’s betrayal. The organization’s values—loyalty,
      duty, and the protection of its members—are tested by the events unfolding on
      the bridge. The crew’s failure to prevent the escape reflects a broader institutional
      vulnerability, as the *Enterprise*’s systems are compromised by an insider (Data)
      working in collaboration with an external threat (Crosis). Starfleet’s protocols,
      which rely on trust and hierarchical authority, are undermined by this betrayal,
      leaving the crew—and by extension, the organization—exposed.
    active_representation: Through the actions and reactions of the *Enterprise* crew,
      who embody Starfleet’s values of duty, loyalty, and crisis response.
