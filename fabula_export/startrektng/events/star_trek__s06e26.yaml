      of Data enable the shuttle’s escape. Though physically absent from the bridge,
      their influence is palpable, as the crew watches helplessly while the shuttle
      vanishes into the conduit. The Borg’s role in this event is twofold: they provide
      the means for Data and Crosis’s escape (the transwarp conduit), and they represent
      the broader threat that the *Enterprise* crew is now forced to confront. The
      Borg’s technological superiority and Crosis’s psychological manipulation of
      Data underscore the crew’s vulnerability and the escalating danger they face.'
