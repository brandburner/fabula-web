    global_id: ger_object_a53b982ee1e4
  - object_uuid: ger_object_5e35d9a9c943
    description_of_involvement: "\n        The holodeck’s safety protocols are the\
      \ institutional barrier that Data seeks to overcome, representing the conflict\
      \ between his desire for emotional authenticity and the ship’s rules designed\
      \ to protect its crew. When Data commands a 30% increase in the Holo-Borg’s\
      \ strength, the computer refuses, citing safety limits, and demands authorization\
      \ from two senior officers. This moment exposes the tension between personal\
      \ exploration and institutional safeguards, as well as the moral weight of Geordi’s\
      \ refusal. The protocols are not just a technical obstacle but a symbolic representation\
      \ of the constraints Data must navigate to pursue his goals.\n      "
    status_before_event: Active and enforcing a 20% strength cap on the Holo-Borg
      after Data’s first reset. The system is locked, requiring senior officer authorization
      for further adjustments.
    status_after_event: Unchanged—Data and Geordi are pulled away by the red alert
      before the protocols can be disabled. The safety limits remain in place, the
      experiment unresolved.
    global_id: ger_object_5e35d9a9c943
  - object_uuid: ger_object_9fd853b82f71
    description_of_involvement: "\n        The holodeck chamber is the battleground\
      \ for Data’s experiment, a digital reconstruction of the Borg-ravaged outpost\
      \ where he seeks to replicate his traumatic past. The environment is cluttered\
      \ with debris, plasma scars, and jammed doors, creating a visceral setting that\
      \ mirrors the chaos of his original encounter. The holodeck’s safety protocols,\
      \ however, act as a barrier to Data’s goals, refusing to escalate the Holo-Borg’s\
      \ strength beyond 30% without senior authorization. This limitation becomes\
      \ the crux of the conflict, as Data’s insistence on disabling the protocols\
      \ clashes with Geordi’s refusal. The holodeck thus serves as both a tool for\
      \ Data’s self-experimentation and a stage for the moral dilemma at its core.\n\
      \      "
    status_before_event: "\n        The holodeck is fully operational, running a simulation\
      \ of the Borg outpost with safety protocols active. The Holo-Borg is set to\
      \ 20% increased strength after Data’s first reset, but the computer blocks further\
      \ escalation without authorization. The environment is tense, the air thick\
      \ with the aftermath of Data’s repeated battles.\n      "
    status_after_event: "\n        The holodeck remains active but is abruptly abandoned\
      \ as Riker’s red alert pulls Data and Geordi away. The Holo-Borg resets to its\
      \ default state, the simulation frozen mid-cycle. The chamber is left in disarray,\
      \ the experiment unresolved, and the safety protocols still intact—though the\
      \ conflict between Data and Geordi lingers unresolved.\n      "
    global_id: ger_object_9fd853b82f71
