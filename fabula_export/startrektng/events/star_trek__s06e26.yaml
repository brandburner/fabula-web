- fabula_uuid: cand_evt_scene_27e836ff0df65d38_01
  global_id: null
  title: Picard orders Borg intercept amid subspace anomaly
  description: "\n  The Enterprise responds to a confirmed Borg attack on the MS One\
    \ colony, with Picard immediately suspicious of the ship's proximity to two recent\
    \ Borg incidents. Worf locates the retreating Borg vessel, and Picard orders an\
    \ intercept course with phasers prepared, escalating the crew's tactical response.\
    \ As the Enterprise closes in, Data detects an anomalous subspace distortion forming\
    \ around the Borg ship, which then vanishes into it. The sudden energy surge traps\
    \ the Enterprise in an unknown field, forcing an abrupt shift from offensive action\
    \ to defensive crisis. This moment marks the first direct confrontation with the\
    \ new Borg threat, revealing their advanced evasive capabilities and setting up\
    \ the crew's vulnerability to their unpredictable tactics. The event also underscores\
    \ Picard's strategic instincts and the crew's growing unease about the Borg's\
    \ evolving behavior, particularly their refusal to assimilate and their focus\
    \ on destruction.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e26
  scene_sequence: 15
  sequence_in_scene: 29
  key_dialogue: &id025
  - 'RIKER: It''s confirmed. The MS One colony is under attack.'
  - 'PICARD: Doesn''t it seem strange that there have been two Borg attacks... and
    the Enterprise was the nearest ship in both instances?'
  - 'DATA: Captain... sensors detect a subspace distortion forming directly ahead
    of the Borg ship.'
  - 'PICARD: They''re not going to get away this time.'
