      methodically battling a simulated Borg drone with detached precision. His mechanical
      repetition of 'Stop. Stop. Stop.'—devoid of the earlier rage—reveals his desperation
      to force another emotional breakthrough. He escalates the simulation’s danger,
      demanding Geordi’s help to override safety protocols, arguing that replicating
      life-threatening conditions is necessary for his experiment. His neutral expression
      and calculated actions mask a deep, unresolved emotional void, culminating in
      a tense standoff with Geordi that is abruptly interrupted by Riker’s red alert.
