  global_id: null
  title: Picard escalates search for Data and Borg
  description: After Riker and Worf confirm the abandoned shuttlecraft holds no trace
    of Data or the Borg, Picard shifts the Enterprise from passive investigation to
    active pursuit. He orders Geordi to prepare shuttlecraft for low-altitude reconnaissance
    while assembling four-person Away Teams to expand the search across the planet's
    surface. The urgency of the mission is underscored by Picard’s decision to delegate
    command to Beverly, instructing her to retreat through the transwarp conduit if
    the Borg attack. This moment marks a critical escalation in the crew’s response
    to the crisis, reflecting their growing desperation to recover Data before the
    Borg exploit his unique vulnerabilities. The scene also highlights Picard’s trust
    in Beverly and the high stakes of the operation, as the crew prepares to face
    an unknown and potentially deadly threat on the planet’s surface.
