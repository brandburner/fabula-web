  title: Data escapes with Borg prisoner via transwarp
  description: During a critical briefing on Borg transwarp capabilities, the Enterprise
    bridge is disrupted by an unauthorized shuttle launch carrying Data and the Borg
    prisoner. Picard’s attempts to intercept the vessel fail due to disabled command
    overrides, revealing deliberate sabotage or defiance. Geordi detects a tachyon
    surge, confirming the shuttle is activating a transwarp conduit. Worf identifies
    the occupants just as the shuttle vanishes into the unstable wormhole, marking
    a pivotal moment where Data’s emotional unraveling intersects with the Borg threat,
    escalating the crisis and foreshadowing his defection to Lore. The event underscores
    the crew’s loss of control over both the Borg and Data’s transformation, while
    the technical details of transwarp travel heighten the stakes of the unfolding
    catastrophe.
