- fabula_uuid: cand_evt_scene_6a8d42a7f9383318_03
  global_id: null
  title: Picard entrusts Beverly with command
  description: |2-

      In a high-stakes moment of escalating crisis, Captain Picard prepares to lead an away team to the planet's surface in search of Data and the new Borg threat. After coordinating the deployment of multiple search teams and shuttlecraft reconnaissance, Picard turns to the critical question of who will command the *Enterprise* in his absence. The weight of the decision is palpable—Beverly Crusher, though not a line officer, is the only senior officer remaining aboard. Picard’s choice reflects both his trust in her judgment and the dire urgency of the situation. The moment is charged with unspoken tension: Picard’s departure could mean the difference between recovering Data and losing the *Enterprise* to the Borg. When Beverly asks for final orders, Picard delivers a stark directive: if the Borg attack, she must retreat through the transwarp conduit without waiting for the away teams. The order underscores the mission’s peril and the crew’s precarious position. Their shared smile and Picard’s use of 'Captain'—a title Beverly has never held—elevates the moment from a logistical necessity to a symbolic passing of the torch, reinforcing the stakes and the crew’s deep mutual respect. The scene closes with Picard exiting, leaving Beverly in command, her expression a mix of resolve and the weight of responsibility.
