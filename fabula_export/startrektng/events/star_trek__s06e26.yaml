- fabula_uuid: cand_evt_scene_5167f06fdec10465_02
  global_id: null
  title: Data demands Geordi disable holodeck safety
  description: "\n  In the holodeck, Data recreates his violent encounter with the\
    \ Borg, methodically escalating the simulation's danger to replicate the original\
    \ threat. When the computer refuses to increase the Borg's strength beyond safety\
    \ limits, Data turns to Geordi, requesting his authorization to disable the protocols—a\
    \ move that would put his own existence at risk. Geordi refuses, arguing that\
    \ no experiment justifies endangering Data's life, exposing a fracture in their\
    \ trust. The confrontation underscores Data's growing obsession with experiencing\
    \ emotion, even at the cost of his own safety, while Geordi's resistance highlights\
    \ the moral dilemma at the heart of Data's transformation. The standoff foreshadows\
    \ Data's emotional instability and his eventual defection, as his pursuit of humanity\
    \ begins to override his logical programming.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e26
  scene_sequence: 14
  sequence_in_scene: 27
  key_dialogue: &id021
  - 'DATA: The computer will require the voice authorizations of two senior officers
    in order to disable the safety routine. Will you help me?'
  - 'GEORDI: Whoa, wait a minute. That thing could kill you.'
  - 'DATA: This experiment may hold the key to something which I have sought all of
    my life.'
  - 'GEORDI: This is crazy. There''s got to be another way. Why don''t you try something
    else to make yourself angry...'
  - 'DATA: I have tried other stimuli, but they have been unsuccessful. I understand
    your objections, but it is my life and I have the right to risk it if I choose.'
