  title: Data requests relief from duty
  description: "\n  In the aftermath of Data’s violent emotional outburst on Ohniaka\
    \ III—his first experience of rage—the android voluntarily removes himself from\
    \ the Enterprise’s investigation of the altered Borg. Picard, observing the anomaly\
    \ in Data’s behavior, formally logs the incident in his captain’s log, effectively\
    \ sidelining Data from the mission. This moment marks the first fracture in Data’s\
    \ self-control, foreshadowing his eventual descent into instability and his fateful\
    \ alliance with Lore. The log entry underscores the severity of the situation,\
    \ framing Data’s emotional turmoil as a critical threat to both the mission and\
    \ his own stability. The scene serves as a turning point, shifting Data from a\
    \ trusted officer to a potential liability, while also highlighting Picard’s leadership\
    \ dilemma: balancing the crew’s needs with Data’s fragile emotional state.\n  "
