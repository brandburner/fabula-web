  object_involvements:
  - object_uuid: ger_object_b6382767d215
    description_of_involvement: The Enterprise’s main bridge viewscreen dominates
      the scene, its glow casting long shadows as the crew regroups. Initially, it
      displayed the Borg ship’s ominous approach, but now it shows only an empty starfield—the
      Borg vessel’s sudden disappearance. The viewscreen’s shift from threat to void
      mirrors the crew’s transition from active combat to strategic analysis. Its
      blankness is unsettling, a visual representation of the unknown tactics the
      Borg have just employed. The screen’s flickering light also highlights the physical
      toll of the ambush, with crew members’ faces half-lit in the dim emergency lighting.
    status_before_event: Displaying the Borg ship’s approach and firing sequence,
      casting intense light on the bridge.
    status_after_event: Showing an empty starfield, the Borg ship vanished, leaving
      only the aftermath of the attack.
    global_id: ger_object_b6382767d215
  - object_uuid: ger_object_b86e5091e3f6
    description_of_involvement: The biologically active Borg drone lies sprawled on
      the Enterprise bridge deck, its pale flesh and black armor scarred from Worf’s
      phaser blast. Its chest rises and falls faintly, defying Borg death protocols
      and confirming Data’s tricorder readings. The drone’s survival is a physical
      manifestation of the Borg’s new individualism—a corpse that refuses to stay
      dead. Its presence is a silent threat, a harbinger of Lore’s influence, and
      a catalyst for Data’s emotional awakening. The drone’s tubules dangle limply,
      and its face is frozen in a rictus of pain, yet its biological activity suggests
      it is not truly inert.
    status_before_event: Functional Borg drone, materialized on the bridge, firing
      disruptors at the crew before being wounded by Worf.
    status_after_event: Apparently inert but biologically active, lying on the bridge
      deck, becoming the focus of Data’s examination.
    global_id: ger_object_b86e5091e3f6
  - object_uuid: ger_object_7607cc45baa3
    description_of_involvement: Worf pulls up the sensor logs on his tactical console,
      the displays confirming the Borg ship’s entry into the distortion field 30 seconds
      prior. The data streams anchor the crew’s grasp of the vanished threat, providing
      tangible evidence of the Borg’s diversionary tactic. The logs’ cold, clinical
      readouts contrast with the emotional weight of the security officer’s death
      and the crew’s lingering tension. They serve as a bridge between the chaos of
      the ambush and the crew’s strategic reassessment, grounding their discussions
      in hard data.
    status_before_event: Functioning but overwhelmed by the Borg ambush, displaying
      erratic sensor readings.
    status_after_event: Stable, providing clear logs of the Borg ship’s escape via
      the distortion field.
    global_id: ger_object_7607cc45baa3
  - object_uuid: ger_object_ef25412ad647
    description_of_involvement: Worf’s phaser, still warm from the firefight, lies
      in his hand as he reports the Borg ship’s disappearance. The weapon’s orange
      energy residue lingers in the air, a testament to its recent use. It was the
      instrument of Crosis’s wounding and the killing of the other Borg drone, but
