    global_id: ger_object_a53b982ee1e4
  - object_uuid: ger_object_5e35d9a9c943
    description_of_involvement: "\n        The holodeck’s safety protocols are the\
      \ institutional barrier that Data seeks to overcome, representing the conflict\
      \ between his desire for emotional authenticity and the ship’s rules designed\
      \ to protect its crew. When Data commands a 30% increase in the Holo-Borg’s\
      \ strength, the computer refuses, citing safety limits, and demands authorization\
      \ from two senior officers. This moment exposes the tension between personal\
      \ exploration and institutional safeguards, as well as the moral weight of Geordi’s\
      \ refusal. The protocols are not just a technical obstacle but a symbolic representation\
      \ of the constraints Data must navigate to pursue his goals.\n      "
    status_before_event: Active and enforcing a 20% strength cap on the Holo-Borg
      after Data’s first reset. The system is locked, requiring senior officer authorization
      for further adjustments.
    status_after_event: Unchanged—Data and Geordi are pulled away by the red alert
      before the protocols can be disabled. The safety limits remain in place, the
      experiment unresolved.
    global_id: ger_object_5e35d9a9c943
