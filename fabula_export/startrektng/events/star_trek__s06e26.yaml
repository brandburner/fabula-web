  global_id: null
  title: Abandoned shuttle reveals Data and Borg vanished
  description: The Enterprise away team materializes on a planet surface to find Data’s
    shuttlecraft abandoned in a desolate, vegetation-covered expanse. Riker confirms
    no immediate signs of Data or the Borg, while Worf’s tricorder is rendered ineffective
    by electromagnetic interference, limiting the search radius to 100 meters. Picard,
    monitoring from the bridge, calculates a 20km search radius based on Geordi’s
    estimate of Data’s speed, prompting the deployment of additional away teams and
    shuttlecraft for low-altitude reconnaissance. The escalation from passive investigation
    to active pursuit underscores the urgency of recovering Data before the Borg exploit
    his unique vulnerabilities. Meanwhile, Picard entrusts Beverly with command of
    the *Enterprise*, ordering her to retreat to Federation space if the Borg attack—an
    act that reveals his growing concern for the crew’s safety and the mission’s high
    stakes. The scene marks a critical turning point, shifting the narrative from
    discovery to desperate search, with Data’s fate now inextricably linked to the
    emergence of a new, more terrifying Borg threat.
