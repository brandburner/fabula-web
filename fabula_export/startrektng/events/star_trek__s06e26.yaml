  title: Data confesses his first violent emotion
  description: After the Enterprise investigates a mysterious alien ship disappearance,
    Riker finds Data in a state of profound shock following their brutal encounter
    with the new Borg variant. Data, visibly shaken, admits to Riker that he experienced
    'anger'—an emotion he has never processed before. This moment marks a seismic
    shift in Data's emotional development, introducing instability and foreshadowing
    his eventual descent into darker territory. The confession is delivered with stunned
    disbelief, underscoring the gravity of Data's emotional awakening and its potential
    consequences for his relationship with the crew and his own identity. Riker's
    gentle but probing approach contrasts with Data's uncharacteristic vulnerability,
    highlighting the fragility of Data's self-control and the beginning of his emotional
    unraveling.
