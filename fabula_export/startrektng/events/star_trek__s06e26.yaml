- fabula_uuid: cand_evt_scene_5167f06fdec10465_01
  global_id: null
  title: Data pushes Geordi to disable holodeck safety
  description: "\n  In the holodeck, Data meticulously recreates his traumatic Borg\
    \ encounter, methodically defeating a simulated Borg while repeating the phrase\
    \ 'Stop' with robotic detachment. Geordi enters, interrupting the experiment,\
    \ and questions Data's actions. Data reveals he is attempting to replicate the\
    \ conditions of his first emotional experience—rage—by increasing the Borg's strength\
    \ and disabling safety protocols. Geordi protests, arguing that the experiment\
    \ is reckless and unnecessary, but Data insists, citing his right to risk his\
    \ life for the sake of understanding his emotions. Their confrontation escalates\
    \ as Data appeals to Geordi's friendship, demanding his authorization to override\
    \ the holodeck's safety limits. The tension is abruptly cut short by Riker's red\
    \ alert, forcing them to abandon the discussion. This scene marks a critical moment\
    \ in Data's emotional unraveling, as his obsession with replicating his first\
    \ burst of rage reveals his growing instability and foreshadows his eventual defection\
    \ to Lore. Geordi's refusal to comply underscores the moral and ethical dilemmas\
    \ the crew faces as Data's transformation accelerates.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e26
  scene_sequence: 14
  sequence_in_scene: 26
  key_dialogue: &id019
  - 'DATA: I am attempting to recreate the experience which led to my initial burst
    of anger.'
  - 'GEORDI: ((angry)) Data, We''re talking about an experiment. You can''t put your
    life on the line just to prove a theory.'
  - 'DATA: This experiment may hold the key to something which I have sought all of
    my life.'
  is_flashback: false
  location_uuid: ger_location_546bdfdfc9dc
  theme_uuids: []
  arc_uuids: []
  participations:
  - character_uuid: ger_agent_de939a7b5559
    emotional_state: None (as a simulation). The Holo-Borg operates as a hollow vessel
      of aggression, its 'emotional state' limited to the parameters of its program.
      However, its role in the scene is to embody the inescapable, mechanical nature
      of Data's trauma—a force that cannot be reasoned with, only endured or defeated.
      Its repeated resets and increasing strength reflect the escalating stakes of
      Data's experiment, as well as the futility of his attempt to 'control' his past.
    goals:
    - To serve as a controlled threat in Data's experiment, testing the limits of
      his emotional response.
    - To adapt to Data's commands (within safety protocol constraints) to escalate
      the simulation's danger.
    what_happened: 'The Holo-Borg functions as a programmed adversary in Data''s simulation,
      initially defeated with ease but growing in strength as Data commands incremental
      increases (20%, then 30%). It slumps to the ground after each defeat, its aggression
      reset by the holodeck''s safety protocols. When Data demands a 30% strength
      increase, the computer blocks the command, leaving the Holo-Borg at its last
      authorized level. Its presence serves as a silent, relentless force—neither
      sentient nor sympathetic—reflecting the Borg Collective''s indifference to individual
      suffering. The drone''s repeated defeats and resets underscore Data''s obsession:
      no matter how many times it is ''killed,'' it returns, mirroring the inescapable
      nature of his trauma.'
    observed_status: 'The Holo-Borg functions as a programmed adversary in Data''s
      simulation, initially defeated with ease but growing in strength as Data commands
      incremental increases (20%, then 30%). It slumps to the ground after each defeat,
      its aggression reset by the holodeck''s safety protocols. When Data demands
      a 30% strength increase, the computer blocks the command, leaving the Holo-Borg
      at its last authorized level. Its presence serves as a silent, relentless force—neither
      sentient nor sympathetic—reflecting the Borg Collective''s indifference to individual
      suffering. The drone''s repeated defeats and resets underscore Data''s obsession:
      no matter how many times it is ''killed,'' it returns, mirroring the inescapable
      nature of his trauma.'
    beliefs:
    - N/A (as a simulation, it has no beliefs).
    - Its 'purpose' is to replicate the Borg's threat, reinforcing Data's need to
      confront his trauma.
    observed_traits:
    - Relentless
    - Programmed
    - Indifferent
    - Adaptive (within safety limits)
    - Symbolic of the Borg Collective
    importance: secondary
    global_id: ger_agent_de939a7b5559
  - character_uuid: ger_agent_0e5c114935a9
    emotional_state: A paradoxical state of emotional detachment masking deep obsession.
      Data's flat affect and insistence on replicating danger suggest a desperate,
      almost compulsive need to recapture the rage he once felt—yet his logical arguments
      reveal a calculated, almost clinical approach to self-destruction. There is
      a quiet desperation beneath his calm, as if he is willing to risk everything
      to bridge the gap between what he is and what he longs to be.
    goals:
    - To replicate the conditions of his first emotional experience (rage) by escalating
      the Borg simulation's lethality.
    - To convince Geordi to override holodeck safety protocols, arguing it is his
      right to risk his life for understanding.
    what_happened: 'Data stands in the holodeck''s ruined outpost, methodically defeating
      a simulated Borg drone with detached precision. His face remains neutral as
      he repeats ''Stop'' in a flat monotone, devoid of the emotional weight it once
      carried. When Geordi interrupts, Data reveals his experiment: he is attempting
      to replicate the conditions of his first emotional experience—rage—by increasing
      the Borg''s strength and disabling safety protocols. He argues for his right
      to risk his life, insisting this is the only way to achieve his lifelong goal
      of understanding human emotion. His insistence turns to urgency as he pleads
      with Geordi for authorization, only to be cut off by Riker''s red alert.'
    observed_status: 'Data stands in the holodeck''s ruined outpost, methodically
      defeating a simulated Borg drone with detached precision. His face remains neutral
      as he repeats ''Stop'' in a flat monotone, devoid of the emotional weight it
      once carried. When Geordi interrupts, Data reveals his experiment: he is attempting
      to replicate the conditions of his first emotional experience—rage—by increasing
      the Borg''s strength and disabling safety protocols. He argues for his right
      to risk his life, insisting this is the only way to achieve his lifelong goal
      of understanding human emotion. His insistence turns to urgency as he pleads
      with Geordi for authorization, only to be cut off by Riker''s red alert.'
    beliefs:
    - That the only way to understand human emotion is to recreate the exact conditions
      that triggered his first emotional response.
    - That his life is his own to risk, and that Geordi (or Starfleet) has no right
      to interfere with his self-experimentation.
    observed_traits:
    - Obsessive
    - Detached
    - Insistent
    - Logically rigid
    - Emotionally detached (yet seeking emotion)
    - Defiant of safety protocols
    importance: primary
    global_id: ger_agent_0e5c114935a9
  - character_uuid: ger_agent_f1a913dda0ad
    emotional_state: 'Neutral but commanding. Riker''s tone is all business—there
      is no room for personal dilemmas when the ship is under threat. His interruption
      is not malicious, but it is final, reinforcing the idea that duty always comes
      first, even in moments of personal crisis. His voice is the embodiment of Starfleet''s
      priorities: the mission above all else.'
    goals:
    - To issue a red alert, signaling an immediate threat to the *Enterprise* and
      requiring all hands to battle stations.
    - To disrupt Data and Geordi's personal conflict, redirecting their focus to the
      larger crisis.
    what_happened: Riker's voice interrupts the holodeck via the comms system, issuing
      a red alert that halts Data and Geordi's confrontation. His command is abrupt
      and authoritative, pulling them both away from the experiment and into the larger
      crisis unfolding on the *Enterprise*. Though physically absent, his voice carries
      the weight of Starfleet protocol and the urgency of the Borg threat, serving
      as an external force that overrides personal conflicts. The red alert acts as
      a narrative fulcrum, shifting the scene from introspective experimentation to
      immediate, collective action.
    observed_status: Riker's voice interrupts the holodeck via the comms system, issuing
      a red alert that halts Data and Geordi's confrontation. His command is abrupt
      and authoritative, pulling them both away from the experiment and into the larger
      crisis unfolding on the *Enterprise*. Though physically absent, his voice carries
      the weight of Starfleet protocol and the urgency of the Borg threat, serving
      as an external force that overrides personal conflicts. The red alert acts as
      a narrative fulcrum, shifting the scene from introspective experimentation to
      immediate, collective action.
    beliefs:
    - That personal conflicts must be subordinated to the ship's safety and Starfleet
      duty.
    - That the Borg threat is the highest priority, requiring immediate action.
    observed_traits:
    - Authoritative
    - Urgent
    - Disruptive (of personal conflicts)
    - Representative of Starfleet duty
    importance: secondary
    global_id: ger_agent_f1a913dda0ad
  object_involvements:
  - object_uuid: ger_object_a53b982ee1e4
    description_of_involvement: Riker's comlink serves as the narrative device that
      interrupts Data and Geordi's confrontation, its sharp transmission of the red
      alert acting as an external force that overrides their personal conflict. The
      comlink's crackling voice is the embodiment of Starfleet's authority, pulling
      the crew back into the larger crisis. Its sudden activation cuts off Geordi's
      refusal to authorize the safety override, freezing their standoff and redirecting
      their focus to the Borg threat. The comlink thus functions as both a practical
      tool (communication) and a symbolic representation of duty calling the crew
      to action, reinforcing the idea that personal struggles must yield to the greater
      mission.
    status_before_event: Inactive but ready, part of the holodeck's standard comms
      system linked to the *Enterprise*'s bridge.
    status_after_event: Activated and transmitting Riker's red alert, its message
      delivered and its purpose fulfilled. The comlink remains functional but is no
      longer the focus of the scene, as Data and Geordi rush to respond to the alert.
    global_id: ger_object_a53b982ee1e4
  - object_uuid: ger_object_5e35d9a9c943
    description_of_involvement: The holodeck's safety protocols are the primary obstacle
      to Data's experiment, designed to prevent users from endangering themselves
      in simulations. When Data commands a 30% strength increase for the Holo-Borg,
      the computer voice intervenes, stating that this would 'exceed safety limits.'
      The protocols require the voice authorizations of two senior officers to disable,
      creating a direct conflict between Data's goals and Starfleet's protective measures.
      Geordi refuses to comply, arguing that the risk is unnecessary, while Data insists
      it is his right to override them. The protocols thus become a symbolic and literal
      barrier, representing the institutional safeguards that Data is determined to
      break—mirroring his broader struggle against the limits of his own programming.
    status_before_event: Active and enforcing a 20% strength cap on the Holo-Borg
      after Data's first defeat. The computer voice has already denied a 30% increase
      once, requiring senior officer authorization.
    status_after_event: The safety protocols remain active and unchanged, as Geordi
