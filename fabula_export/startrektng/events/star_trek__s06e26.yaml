  global_id: null
  title: Enterprise trapped in subspace distortion
  description: "\n  The *Enterprise* is violently yanked into an unexplained subspace\
    \ distortion—a phenomenon that defies Federation physics and leaves no trace of\
    \ its passage. The distortion engulfs the ship entirely, severing its connection\
    \ to known space and plunging the crew into uncharted territory. The event’s suddenness\
    \ and irrevocability mark a critical threshold, escalating the narrative from\
    \ investigation into existential peril. The distortion’s disappearance leaves\
    \ the crew isolated, vulnerable to the new, aggressive Borg threat, and cut off\
    \ from Starfleet support. This moment underscores the stakes: the *Enterprise*\
    \ is now adrift in an unknown region where the laws of the universe may no longer\
    \ apply, forcing the crew to confront forces beyond their understanding.\n  "
