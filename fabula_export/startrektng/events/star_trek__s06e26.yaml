- fabula_uuid: cand_evt_scene_3efea9e0674a73e0_03
  global_id: null
  title: Data discovers the new Borg breed
  description: "\n  The Enterprise away team—Riker, Data, Worf, and a security guard—materialize\
    \ at a Federation outpost ravaged by an attack. The scene is eerily quiet, with\
    \ dead Starfleet officers scattered across the room, but the physical damage is\
    \ minimal, suggesting a targeted assault rather than a conventional assault. Riker\
    \ notes the brutality of the attack, which doesn’t align with typical Ferengi\
    \ tactics, while Worf confirms the wounds were caused by forced-plasma beams,\
    \ similar to Ferengi hand phasers. Data attempts to scan for survivors but is\
    \ hindered by electromagnetic interference.\n\n  Riker orders a room-to-room search,\
    \ dividing the team. As Riker and Data approach a jammed door, Data bypasses the\
    \ mechanism, revealing a lone Borg drone standing in the doorway. This moment\
    \ marks the first direct encounter with the new, more aggressive Borg variant,\
    \ shattering the crew’s sense of security and setting the stage for Data’s emotional\
    \ awakening. The Borg’s presence triggers an unprecedented reaction in Data, foreshadowing\
    \ his violent response and the inciting incident of his emotional journey.\n  "
