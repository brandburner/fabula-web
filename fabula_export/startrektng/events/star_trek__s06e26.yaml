      as a simulated adversary.
    power_dynamics: The Simulated Borg has no agency or power of its own; it is entirely
      controlled by Data’s commands and the holodeck’s programming. Its strength and
      aggression are limited by the safety protocols, which Geordi refuses to override.
    organizational_goals:
