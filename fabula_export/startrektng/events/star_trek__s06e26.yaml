      without authorization. Its sudden appearance on Worf’s sensors triggers the
      bridge crew’s frantic attempts to stop it, but the shuttle’s occupants—Data
      and Crosis—have already sabotaged the command overrides, ensuring their escape.
      The shuttle’s activation of the transwarp conduit is the culmination of this
      event, as it vanishes into the unstable wormhole, leaving the *Enterprise* crew
      behind. The shuttle symbolizes Data’s defiance and the Borg’s technological
      superiority, as well as the crew’s sudden helplessness in the face of this betrayal.
    status_before_event: Parked in Shuttlebay 2, undetected until its unauthorized
      launch.
    status_after_event: Vanished into the transwarp conduit, beyond the *Enterprise*’s
      reach, with Data and Crosis aboard.
