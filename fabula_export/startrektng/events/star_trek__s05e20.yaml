    but I don''t know how much more coaxing I can do here.'
  - 'PICARD''S COM VOICE: We need more speed than that, Commander.'
  - 'GEORDI: The matter-antimatter injectors are failing... I''m rerouting to secondary
    injector power now.'
  - 'PICARD: ((to Data)) Divert emergency life support to those decks.'
  - 'DATA: Aye, Captain.'
  - 'PICARD: Mister Data. The rest of us may lose consciousness. If we do, it will
    be your job to execute the plan as discussed.'
