      a passive system into an active instrument of defense. Their role is both functional
      and symbolic: functionally, they represent the crew’s last line of defense against
      an existential threat; symbolically, they embody the ship’s capacity to fight
      back, even in the face of overwhelming odds. The phasers’ deployment is not
      just a tactical maneuver—it is a statement of defiance, a refusal to succumb
      to the parasites’ relentless advance.'
