  participations:
  - character_uuid: ger_agent_b1e9e0b6f423
    emotional_state: Tense but focused; the weight of command is palpable, but his
      training and experience keep his emotions in check. There is a quiet intensity,
      a recognition that the *Enterprise* is under existential threat, and every action
      must be precise.
    goals:
    - Reach the bridge immediately to assess and direct the crisis response.
    - Ensure Data’s technical expertise is leveraged to mitigate the parasite threat.
    what_happened: Picard moves briskly toward the turbolift with a sense of urgency
      that contrasts sharply with his usual composed demeanor. His posture is tense,
      his stride purposeful, and his voice carries the weight of command. He issues
      a single, decisive word—*‘Bridge’*—as the turbolift doors close, encapsulating
      the gravity of the moment. His focus is laser-sharp, his mind already racing
      ahead to the next critical decision.
    observed_status: Picard moves briskly toward the turbolift with a sense of urgency
