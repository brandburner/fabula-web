acts:
- fabula_uuid: act_efdef2541d916056
  number: 1
  summary: The Enterprise crew faces an immediate crisis as they race to destroy a
    massive asteroid on a collision course with Tessen Three. Despite an initial photon
    torpedo strike, the asteroid's dense nitrium core remains a threat, forcing Captain
    Picard and Data to devise a particle beam solution that successfully shatters
    the core. However, during the subsequent debris clearance, microscopic "Twinkling
    Bits" from the destroyed asteroid subtly adhere to the ship's hull, an unobserved
    inciting incident for a much larger, internal threat. Concurrently, a significant
    personal disruption unfolds as Lwaxana Troi, Counselor Troi's flamboyant mother,
    arrives on board. She immediately announces her impulsive engagement to Campio,
    a Kostolain minister she has never met in person, and insists on holding the wedding
    on the Enterprise. This news deeply unsettles Deanna, who is skeptical of her
    mother's hasty decision. Lwaxana's presence quickly impacts others, particularly
    Worf and his son Alexander, who are already at odds over Worf's strict disciplinary
    rules. Lwaxana, with her free-spirited philosophy, quickly forms a bond with Alexander,
    subtly undermining Worf's authority. The act concludes with Picard, swayed by
    Lwaxana's charm and the prospect of giving away the bride, granting permission
    for the wedding, while unseen "Twinkling Particles" are observed moving along
    a ceiling seam within the ship, hinting at the escalating, yet still unacknowledged,
    internal crisis. This act effectively sets up both the ship's impending doom and
    the personal conflicts that will drive the narrative.
  key_moments: []
  scene_numbers:
