- fabula_uuid: cand_evt_scene_95348a004a7de7ad_01
  global_id: null
  title: Troi Challenges Lwaxana’s Marriage and Discipline
  description: 'Deanna Troi confronts her mother, Lwaxana, over two escalating issues:
    Lwaxana’s sudden, unexplained marriage to a man she’s never met and her interference
    in Alexander’s discipline. Troi, frustrated by Lwaxana’s evasiveness and dismissive
    attitude, presses her on the wedding’s lack of Betazoid traditions, including
    the absence of a traditional naked ceremony. Lwaxana deflects with humor and vague
    reassurances, claiming she’s adapting to her fiancé’s cultural norms. The tension
    peaks when the replicator malfunctions, materializing a Petrokian sausage instead
    of the requested tea—a moment that briefly derails the argument but underscores
    the broader chaos Lwaxana brings to the *Enterprise*. The scene reveals Deanna’s
    exasperation with her mother’s impulsivity and Lwaxana’s reluctance to confront
    deeper emotional motivations, hinting at unresolved family dynamics and setting
    up future revelations about her marriage’s true purpose.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e20
  scene_sequence: 13
  sequence_in_scene: 19
  key_dialogue:
  - 'TROI: Mother, I''m trying to help this boy learn the value of responsibility.
    You''re not helping by giving him a lot of mixed messages.'
