  - object_uuid: ger_object_a5b0915e1e46
    description_of_involvement: The primary warp controller is the epicenter of the
      crisis in this scene, as the metal-eating parasites burrow into its circuits,
      crippling the *Enterprise*'s propulsion systems. Geordi’s frantic attempts to
      reroute power through backup controllers highlight its critical role, as the
