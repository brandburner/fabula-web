  - object_uuid: ger_object_1cc4e719d121
    description_of_involvement: 'The photon torpedoes are the *Enterprise*’s primary
      offensive weapon in this moment, their role pivotal in averting planetary destruction.
      Fired in rapid succession from the forward tubes, they streak through the void
      with deadly accuracy, their warheads detonating against the asteroid’s surface
      in a cataclysmic explosion. The torpedoes’ function here is twofold: to shatter
      the threat into harmless debris and to serve as a visual metaphor for the crew’s
      ability to act decisively. Their use is not just tactical but symbolic—a reminder
      that even in the face of personal and logistical upheaval, the *Enterprise*
      remains a force of order and protection.'
    status_before_event: Armed and ready in the *Enterprise*’s forward torpedo bays,
      fully charged and targeted at the asteroid’s coordinates.
    status_after_event: Depleted by 2-3 units (assuming standard salvo), with residual
      energy signatures dissipating in the void. Microscopic debris from the explosion
      clings unnoticed to the *Enterprise*’s hull, setting the stage for the parasites’
      later infiltration.
    global_id: ger_object_1cc4e719d121
  - object_uuid: ger_object_874fb24cde8b
    description_of_involvement: 'The asteroid is the immediate, existential threat
      in this scene—a silent, relentless force of nature hurtling toward an unsuspecting
      planet. Its destruction is not just a plot device but a narrative fulcrum, testing
      the *Enterprise*’s capabilities and the crew’s resolve. The asteroid’s fragmentation
      into debris is a visual and emotional release, a moment of triumph amid the
      ship’s broader crises. Yet its role is also ironic: while the crew celebrates
      their victory over this external threat, the true danger (the parasites) has
      already begun its insidious work, unseen and unnoticed.'
    status_before_event: Intact and on a collision course with the populated planet,
