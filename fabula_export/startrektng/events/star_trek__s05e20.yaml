      and explore identity without judgment. The glade’s wildness symbolizes the 'creatures
      within us'—untamed, diverse, and essential to wholeness.
    access_restrictions: Open to all holodeck participants, but the Learners’ seated
      observation suggests a hierarchy of engagement (active bathers vs. passive students).
      The space is inclusive but structured around the ritual’s rules.
