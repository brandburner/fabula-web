- fabula_uuid: cand_evt_scene_65bff6ac71c4c23c_02
  global_id: null
  title: Turbolift failure traps Picard and Data on bridge
  description: "\n  Picard and Data are mid-conversation in a turbolift, strategizing\
    \ a high-risk plan to lure the metal-eating parasites away from the *Enterprise*\
    \ using a nitrium beam. Their discussion is abruptly interrupted when orange goo—evidence\
    \ of the parasites' spread—begins oozing from a vent, signaling the crisis is\
    \ worsening. The turbolift's velocity fluctuates erratically before stalling,\
    \ forcing Data to manually override the doors. They discover the lift has deposited\
    \ them on the bridge, an unexpected and ominous confirmation that the ship's systemic\
    \ malfunctions are escalating. The moment underscores the crew's dwindling time\
    \ to act, blending tactical urgency with the looming existential threat to the\
    \ ship's integrity. The scene also serves as a narrative pivot, shifting focus\
    \ from theoretical solutions to immediate, life-or-death consequences.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e20
  scene_sequence: 29
  sequence_in_scene: 48
  key_dialogue: &id027
  - 'PICARD: Commander, do you have any suggestions on how we could encourage the
    parasites to leave the ship once we reach the Pelloris Field?'
  - 'DATA: If we reconfigure a particle beam with a high concentration of nitrium,
    and project it toward one of the asteroids...'
  - 'PICARD: They''ll follow the beam... like a trail of breadcrumbs. Very well -'
  - 'DATA: Turbolift velocity is beginning to fluctuate, Captain.'
