  title: Engineering collapses under parasitic strain
  description: |2-

      The *Enterprise*’s matter-antimatter injectors fail catastrophically as Geordi La Forge struggles to maintain warp speed, forcing the ship into a desperate race against time. Orange parasitic goo seeps from the walls, a visceral reminder of the infestation consuming the vessel, while alarms blare and consoles flicker with warnings. Geordi reroutes power to secondary injectors, but the strain is unsustainable—the crew is visibly exhausted, perspiring heavily, and gasping for air as atmospheric systems degrade. On the bridge, Picard orders life support shutdowns to critical decks, prioritizing evacuation while Data remains the only crew member unaffected by oxygen deprivation. The scene escalates from technical crisis to existential threat, with Picard’s command to Data—‘execute the plan as discussed’—hinting at a prearranged contingency. The crew’s physical deterioration mirrors the ship’s collapse, underscoring the urgency of their situation and the high stakes of their survival.
