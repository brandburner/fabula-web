  title: Lwaxana and Alexander defy authority
  description: "\n  In Lwaxana Troi’s quarters, Minister Campio and his protocol master\
    \ Erko attempt to assert control over the wedding preparations, insisting on a\
    \ formal discussion of details. Lwaxana, however, dismisses their demands with\
    \ playful defiance, prioritizing a promised holodeck trip with Alexander. When\
    \ Worf and Deanna Troi arrive to intervene—Worf enforcing Alexander’s dinner routine\
    \ and Deanna attempting to mediate—the tension escalates. Lwaxana mocks Erko’s\
    \ rigid decorum, undermines Worf’s authority by inviting Campio to join their\
    \ holodeck excursion, and ultimately exits with Alexander, leaving the others\
    \ frustrated and abandoned. The scene underscores Lwaxana’s refusal to conform\
    \ to Kostolain protocol, her bond with Alexander as a shared rebellion against\
    \ discipline, and the crew’s growing exasperation with her chaotic influence.\
    \ The defiant departure also foreshadows the broader conflict between personal\
    \ freedom and institutional order aboard the *Enterprise*.\n  "
