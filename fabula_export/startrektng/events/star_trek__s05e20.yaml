  - 'ALEXANDER: I wanted to say I''m sorry if I got you in trouble.'
  - 'LWAXANA: I''m alone, Alex. And when you do get older... when you can no longer
    pick and choose from whatever may come your way... Well, then you do what we call
    compromise. It keeps you from being afraid.'
