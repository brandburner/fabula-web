  global_id: null
  title: Parasites escalate as turbolift fails
  description: "\n  In the turbolift, Picard and Data strategize a high-risk plan\
    \ to lure the metal-eating parasites away from the *Enterprise* using a nitrium\
    \ beam. Their discussion is abruptly cut short when orange goo—evidence of the\
    \ parasites' destructive spread—begins oozing from a vent above them. The turbolift's\
    \ erratic movement (fluctuating velocity, sudden halts) signals worsening shipwide\
    \ systems failure, forcing Data to manually override the doors. Their discovery\
    \ that the lift has deposited them on the bridge—rather than their intended destination—confirms\
    \ the parasites' systemic threat and the crew's dwindling time to act. The scene\
    \ blends tactical urgency with the looming chaos of Lwaxana’s impending marriage,\
    \ as the ship’s structural integrity unravels around them.\n  "
