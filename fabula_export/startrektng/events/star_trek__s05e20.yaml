  title: Lwaxana undermines Worf’s parenting
  description: In Ten-Forward, Lwaxana Troi interrupts a tense father-son confrontation
    between Worf and Alexander, where Worf insists on a rigid contractual agreement
    to enforce discipline. Lwaxana immediately sides with Alexander, dismissing the
    contract as a sign of distrust and instead advocating for emotional trust and
    joy. She physically engages with Alexander—cupping his chin, grinning at him—creating
    an intimate, playful bond that contrasts sharply with Worf’s stoic Klingon discipline.
    Her intervention exposes the cultural divide between Klingon stoicism and Betazoid
    emotionalism, while also deepening the thematic tension between duty and connection.
    The moment serves as both a setup for Alexander’s growing attachment to Lwaxana
    and a turning point in Worf’s struggle to reconcile his parenting with his son’s
    emotional needs. Lwaxana’s flippant dismissal of Worf’s authority ("Mister Woof")
    and her emphasis on enjoyment over obligation ("Life’s true gift is the capacity
    to enjoy enjoyment") further escalate the conflict, framing her as a disruptive
    but liberating force in Alexander’s life.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e20
  scene_sequence: 6
  sequence_in_scene: 8
  key_dialogue:
  - 'LWAXANA: Contracts are usually for people who don''t really trust each other.
    A child who is trusted becomes worthy of that trust.'
  - 'LWAXANA: Alexander. Life''s true gift is the capacity to enjoy enjoyment. ...
    Have I arrived too late, or... Can you still smile?'
  - 'WORF: I, not perform my duty?!'
