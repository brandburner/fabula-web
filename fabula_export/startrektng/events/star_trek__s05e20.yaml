      of the crew's survival strategy. Geordi proposes luring the parasites back to
      their nitrium-rich origin, leveraging the field's abundance as a 'meal' more
      appealing than the Enterprise. Picard seizes on this idea, ordering a warp-nine
      course to the field despite the risks. The field's role shifts from a distant
      threat (the source of the parasites) to a potential savior, embodying the crew's
      gamble to turn the tables on their unseen enemy. Its nitrium richness is both
      the parasites' weakness and the key to the Enterprise's salvation.
    status_before_event: A distant, nitrium-rich asteroid field near Tessen Three,
      now a potential lifeline. The crew's prior destruction of an asteroid here released
      the parasites, but its untapped nitrium reserves offer a chance to reverse their
      course.
    status_after_event: The destination of the Enterprise's desperate warp-nine sprint.
      The crew's hope rests on the field's ability to draw the parasites away, but
      its effectiveness remains untested.
