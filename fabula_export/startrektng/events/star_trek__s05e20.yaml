- fabula_uuid: cand_evt_scene_ba7beeedc5c7527a_01
  global_id: null
  title: Picard and Data sprint to the bridge
  description: "\n  In the midst of the *Enterprise*'s escalating crisis—with metal-eating\
    \ parasites consuming the ship's infrastructure—Picard and Data abandon their\
    \ usual measured demeanor and rush toward the turbolift with uncharacteristic\
    \ urgency. Picard's sharp, authoritative command to the turbolift system—*Bridge,\
    \ maximum speed*—signals the severity of the threat, not just to the ship but\
    \ to the crew's ability to respond. The scene underscores the shift from strategic\
    \ planning to reactive survival, as the parasites' relentless destruction forces\
    \ the captain and his second officer to act with immediate, decisive action. The\
    \ contrast between their composed leadership and this moment of raw urgency highlights\
    \ the stakes: the *Enterprise* is under existential threat, and every second counts.\n\
    \  "
