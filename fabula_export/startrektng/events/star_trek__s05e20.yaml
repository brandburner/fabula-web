- fabula_uuid: cand_evt_scene_b8fe5da0258c512c_02
  global_id: null
  title: Life support collapses under parasite siege
  description: |2-

    The *Enterprise*’s engineering section is in critical collapse as the parasitic infestation accelerates. Geordi La Forge struggles to maintain warp speed, rerouting power to failing matter-antimatter injectors while orange goo oozes from the walls—a visceral sign of the parasites’ relentless consumption. On the bridge, the crew’s breathing becomes labored as atmospheric systems degrade to 27% capacity, forcing Worf to order evacuations of decks 20 through 24. Picard, recognizing the ship’s impending doom, shuts down life support to those decks to conserve energy, leaving the crew gasping for air. As consciousness wanes, Picard delegates final authority to Data, the only crew member unaffected by oxygen deprivation, to execute the contingency plan if the rest of the crew succumbs. The scene underscores the crew’s desperation, the ship’s fragility, and Data’s pivotal role in their survival. The escalating crisis forces Picard to confront the possibility of losing command—and the crew losing their lives—while Data’s immunity becomes the last line of defense.

    This moment serves as a turning point: the crew’s survival now hinges on Data’s ability to execute Picard’s contingency plan, raising the stakes for the android’s role in the crisis. The collapse of life support also mirrors the broader narrative tension between order (Picard’s leadership) and chaos (the parasites’ assault), while the crew’s physical deterioration reflects their emotional and psychological strain. The scene’s urgency is heightened by the ticking clock—two hours and twenty-three minutes until the asteroid field—leaving no room for error.
