    status_after_event: |2-

              The goo continues to ooze, now visibly coating the turbolift wall, and its presence is confirmed as a **widespread, systemic issue**. The turbolift’s malfunction and the computer’s failure further validate the parasites’ corrosive impact on the ship’s infrastructure.
