  title: Enterprise destroys asteroid with torpedoes
  description: Under Picard’s direct order, the *Enterprise* fires photon torpedoes
    at a massive asteroid hurtling toward a populated planet. The torpedoes detonate
    against the asteroid’s surface, creating a violent explosion intended to either
    shatter the threat or alter its trajectory. This high-stakes defensive maneuver
    occurs amid the ship’s broader crisis—the metal-eating parasites and Lwaxana Troi’s
    disruptive presence—serving as a moment of tactical resolution while underscoring
    the crew’s ability to act decisively under pressure. The explosion’s success or
    failure will determine whether the planet below survives, framing the event as
    a critical test of the *Enterprise*’s operational competence and Picard’s leadership
    during a period of compounded chaos. The scene’s brevity and visual impact amplify
    its narrative weight, contrasting the ship’s external threat with the internal
    disarray caused by Lwaxana’s wedding plans and the crew’s personal conflicts.
