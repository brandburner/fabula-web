- fabula_uuid: cand_evt_scene_4b6711d98a3fa264_02
  global_id: null
  title: Holodeck malfunction exposes parasite threat
  description: 'Lwaxana Troi and Alexander share a rare moment of vulnerability in
    the Shiralea VI holodeck, where Lwaxana’s forced cheer about her impending marriage
    contrasts with Alexander’s perceptive concern. Their tender exchange—culminating
    in an uncharacteristically needy embrace—is abruptly shattered when the holodeck’s
    structural grid lines rupture, oozing orange parasite goo. The intrusion of the
    ship’s physical reality into the simulated world triggers Lwaxana’s maternal instinct:
    she stiffens, grips Alexander’s hand, and hastily guides him away, masking her
    alarm with false brightness. The moment marks the first tangible confrontation
    with the parasites’ existential threat, forcing Lwaxana to confront both the fragility
    of her emotional refuge and the immediate danger to her son. The scene pivots
    from personal intimacy to systemic crisis, underscoring the story’s tension between
    illusion and reality, safety and peril.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e20
  scene_sequence: 26
  sequence_in_scene: 42
  key_dialogue:
  - 'ALEXANDER: Maybe this would be a good time to get one of those little people
    that live inside you to come out and tell you what to do; or help you, or something.'
  - 'LWAXANA: ((quietly fervent)) No... Don''t you dare be sorry.'
  - 'LWAXANA: Something''s wrong.'
  is_flashback: false
  location_uuid: ger_location_e7f13822db30
  theme_uuids: []
  arc_uuids: []
  participations:
  - character_uuid: ger_agent_f9d37e6fb85f
    emotional_state: Resigned and mournful—his forlorn state reflects the holodeck’s
      (and perhaps Shiralea VI’s) doomed idealism.
    goals:
    - To serve as a symbolic warning (through his metaphor) about the consequences
      of consuming one’s own ‘worlds’
    - To underscore the fragility of the holodeck’s illusion as a refuge
    what_happened: "\n        The Juggler sits cross-legged near Lwaxana and Alexander,\
      \ his usual manic energy replaced by forlorn stillness—no balls to juggle, no\
      \ worlds left to perform. His metaphor about ‘eating your worlds’ hangs in the\
      \ air like a prophecy, delivered with deadpan melancholy. He doesn’t interact\
      \ directly with the parasite goo’s appearance, but his presence looms: the holodeck’s\
      \ ‘fantasy’ is his domain, and its rupture is his failure. As the goo oozes,\
      \ he becomes a silent witness to the collapse of the illusion he helped create,\
      \ his earlier warning (*‘plan ahead. Don’t eat it.’*) now a darkly ironic foreshadowing.\n\
      \      "
    observed_status: "\n        The Juggler sits cross-legged near Lwaxana and Alexander,\
      \ his usual manic energy replaced by forlorn stillness—no balls to juggle, no\
      \ worlds left to perform. His metaphor about ‘eating your worlds’ hangs in the\
      \ air like a prophecy, delivered with deadpan melancholy. He doesn’t interact\
      \ directly with the parasite goo’s appearance, but his presence looms: the holodeck’s\
      \ ‘fantasy’ is his domain, and its rupture is his failure. As the goo oozes,\
      \ he becomes a silent witness to the collapse of the illusion he helped create,\
      \ his earlier warning (*‘plan ahead. Don’t eat it.’*) now a darkly ironic foreshadowing.\n\
      \      "
    beliefs:
    - That joy and chaos are inseparable (hence his earlier laughter and now his sorrow)
    - That the parasites’ intrusion is inevitable—an extension of the ‘eating’ he
      warned about
    observed_traits:
    - Tragically prophetic
    - Passively observational (no direct action)
    - Metaphorically precise (his ‘eating worlds’ mirrors the parasites’ consumption)
    - Emotionally detached yet thematically central
    importance: secondary
    global_id: ger_agent_f9d37e6fb85f
  - character_uuid: ger_agent_372ce748decb
    emotional_state: Conflictedly terrified—her surface brightness conceals a storm
      of dread (for Alexander, for the *Enterprise*, for her own illusions crumbling).
    goals:
    - To preserve the illusion of safety for Alexander (and perhaps herself) as long
      as possible
    - To suppress her telepathic senses (the ‘little people’) to avoid confronting
      the parasites’ true threat
    what_happened: "\n        Lwaxana perches on the mudbath’s edge, her usual theatrical\
      \ energy dimmed by a quiet melancholy. She mirrors the Juggler’s metaphor about\
      \ ‘eating worlds’ with eerie precision, her voice hollow—a tell that Alexander\
      \ picks up on. When he asks if she’s sad, she overcompensates with brittle cheer\
      \ (*‘Why, of course not. I’m about to be a bride.’*), but her body language\
      \ betrays her: slumped shoulders, averted gaze. The moment Alexander suggests\
      \ she ‘consult her little people,’ she freezes, then pulls him into an embrace\
      \ that’s less about comforting *him* and more about clinging to *connection*.\
      \ The parasite goo’s appearance triggers her protective instinct: she stiffens,\
      \ her grip on Alexander’s hand bordering on painful, and steers him away with\
      \ forced nonchalance (*‘Come, dear, let’s not leave everyone waiting.’*), her\
      \ eyes never leaving the oozing threat. Her performance of control is a thin\
      \ veneer over raw fear.\n      "
