  title: Parasites erupt in Engineering
  description: |2-

    Geordi La Forge and Data investigate an energy fluctuation in the dilithium chamber, initially finding no anomalies. Geordi’s tricorder detects a severe fluctuation in an access panel, prompting him to remove it—only for a violent surge of orange, metal-eating parasites ('Twinkling Stuff') to erupt through the opening. The swarm floods the area, revealing the ship’s structural vulnerability and escalating the crisis from a silent threat to an immediate, visible catastrophe. The parasites’ sudden emergence forces Geordi and Data to confront the severity of the infestation, marking a turning point where passive investigation becomes urgent action. The scene underscores the ship’s fragility and the crew’s need to respond decisively before the parasites consume critical systems. The visual and narrative shock of the eruption serves as a stark contrast to the earlier calm, emphasizing the escalation of danger aboard the *Enterprise*.
