  title: Geordi and Data uncover hidden energy threat
  description: "\n  In Engineering, Geordi La Forge and Data investigate a Level Four\
    \ diagnostic failure in the food replication system—a critical system for crew\
    \ survival—despite widespread reports of malfunctions. Data detects an unexplained\
    \ energy fluctuation in a utility corridor, prompting Geordi to prioritize its\
    \ investigation before Captain Picard’s dinner order arrives. The urgency underscores\
    \ the ship’s growing vulnerability, particularly amid the ongoing crisis with\
    \ the metal-eating parasites. This moment reveals a deeper, systemic issue that\
    \ could escalate into a catastrophic failure, forcing the crew to confront the\
    \ Enterprise’s deteriorating infrastructure. The tension between routine diagnostics\
    \ and an emerging threat highlights the precarious balance between operational\
    \ stability and looming disaster.\n  "
