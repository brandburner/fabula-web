  title: Shipwide systems collapse under parasite attack
  description: "\n  The bridge crew’s investigation into the replicator malfunctions\
    \ escalates into a full-blown crisis as the *Enterprise* suffers a catastrophic\
    \ cascade failure. Geordi and Data report that the data net interface has been\
    \ corrupted into a gelatinous mass, a sign of the metal-eating parasites spreading\
    \ through the ship’s systems. Before they can fully assess the damage, the bridge\
    \ begins shuddering violently as the inertial damping system fails, triggering\
    \ a red alert. Picard orders an emergency warp exit, but Riker reports that primary\
    \ attitude control is lost, forcing the ship to rely on secondary systems. The\
    \ tremors intensify, and Data confirms the loss of helm control, plunging the\
    \ crew into a fight for survival against both the parasites and the ship’s failing\
    \ infrastructure. The scene ends with the bridge shaking violently, leaving the\
    \ crew’s fate uncertain as the act concludes.\n\n  This event serves as the climax\
    \ of the escalating crisis, transforming a technical malfunction into a life-threatening\
    \ emergency. The failure of critical systems forces the crew to prioritize immediate\
    \ survival over Lwaxana Troi’s personal disruptions, reinforcing the tension between\
    \ personal and professional stakes. The collapse of the ship’s infrastructure\
    \ mirrors the unraveling of the crew’s sense of control, heightening the dramatic\
    \ tension as the act ends on a cliffhanger.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e20
  scene_sequence: 18
  sequence_in_scene: 27
  key_dialogue:
