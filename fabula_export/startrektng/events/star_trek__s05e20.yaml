  title: Picard delegates final command to Data
  description: 'As the *Enterprise*’s life support systems fail under the parasites’
    assault, the bridge crew—except Data—grows increasingly debilitated from oxygen
    deprivation. Picard, barely conscious, orders Worf to evacuate critical decks
    and shut down life support to conserve energy. With the crew’s collapse imminent,
    Picard delivers his final command to Data: if the crew succumbs, Data must execute
    the contingency plan to lure the parasites away. This moment underscores Picard’s
    leadership—prioritizing the ship’s survival over his own collapse—and elevates
    Data as the sole operational agent of the crew’s survival. The scene’s escalating
    tension, marked by dimming lights, labored breathing, and a crew member collapsing,
    raises the stakes for Data’s role in the crisis. Picard’s trust in Data’s capabilities
    is explicit, framing the android’s subsequent actions as the crew’s last hope.'
