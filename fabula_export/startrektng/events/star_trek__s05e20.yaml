  scene_sequence: 19
  sequence_in_scene: 28
  key_dialogue:
  - 'GEORDI: The same thing that happened to the replicator happened to the stabilizer.
    The transfers in both systems were turned into... this.'
  - 'RIKER: Some kind of corrosion?'
  - 'DATA: We have not yet identified the substance, Commander.'
  - 'GEORDI: Whatever it is, it looks like there''s been a conversion process—transforming
    some of the metal into gelatinous residue. But what caused it is a mystery.'
  - 'PICARD: The stabilizers and the replicators. Two totally unrelated systems...'
  - 'TRANSPORTER OFFICER''S COM VOICE: Transporter room one to Captain Picard. Minister
    Campio is beaming on board, sir.'
  - 'PICARD: The bridegroom.'
