- fabula_uuid: cand_evt_scene_8afe830fb339bb0c_01
  global_id: null
  title: Particle beam lures parasites to asteroid
  description: "\n  The *Enterprise* deploys a high-energy particle beam toward a\
    \ nearby asteroid, a desperate tactical maneuver to divert the metal-eating parasites\
    \ threatening the ship. The beam acts as a lure, exploiting the parasites' instinctive\
    \ attraction to the asteroid's composition. As the beam connects, masses of the\
    \ 'Twinkling Stuff'—the parasitic swarm—detach from the *Enterprise* and follow\
    \ the beam, abandoning the ship in favor of the asteroid. This moment is a critical\
    \ turning point, buying the crew precious time to stabilize the vessel and address\
    \ the escalating crisis. The success of the maneuver underscores Data's strategic\
    \ ingenuity and the crew's ability to adapt under extreme pressure, while the\
    \ parasites' relentless movement highlights the existential threat they pose.\
    \ The scene serves as a pivot: the immediate danger is averted, but the underlying\
    \ tension remains, setting up the crew's next steps to fully neutralize the threat\
    \ and restore the ship to full functionality.\n  "
