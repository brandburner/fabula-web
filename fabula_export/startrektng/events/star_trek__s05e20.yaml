- fabula_uuid: cand_evt_scene_dc48c503b61a635c_02
  global_id: null
  title: Picard delegates wedding crisis to Troi
  description: "\n  In the corridor outside the transporter room, Lwaxana Troi attempts\
    \ to bridge the cultural divide with her fiancé, Campio, by inviting him to explore\
    \ the *Enterprise* together. Campio’s rigid refusal—rooted in his obligation to\
    \ his protocol master, Erko—exposes the fragility of their arranged marriage and\
    \ forces Lwaxana into an uncharacteristically deferential posture. Deanna Troi\
    \ reacts with surprise at her mother’s sudden compliance, underscoring the deeper\
    \ interpersonal and cultural tensions at play. The moment is abruptly interrupted\
    \ when Picard is called to the bridge, leaving Troi to mediate the volatile situation\
    \ alone. This delegation underscores the crew’s divided priorities as the ship\
    \ faces both interpersonal chaos and an impending parasite threat, forcing Troi\
    \ into an unexpected leadership role amid personal stakes. The scene highlights\
    \ Lwaxana’s vulnerability, the crew’s struggle to reconcile personal disruptions\
    \ with survival, and the escalating stakes of the parasite crisis looming in the\
    \ background.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e20
  scene_sequence: 21
  sequence_in_scene: 33
  key_dialogue:
  - 'LWAXANA: Of course, it was my thinking that we might just get acquainted a bit.
    I could show you around and we could... develop a feel for each other, so to speak.'
  - 'CAMPIO: How very thoughtful of you. But I must remain in the company of Master
    Erko until the wedding ceremony itself.'
  - 'LWAXANA: ((deferential; real surrender)) No, of course not. But please try to
    bear with me until I have a little better grasp of your rules, and... ((glance
    at Erko)) ...protocols.'
  - 'PICARD: ((to Troi; not without humor)) Counselor, I''ll trust you to keep everything
    running smoothly.'
