- fabula_uuid: cand_evt_scene_cf95d54d9ba33f03_01
  global_id: null
  title: Lwaxana disrupts Shiralea’s juggler
  description: "\n  Lwaxana Troi and Alexander Rozhenko enter the holodeck’s Shiralea\
    \ VI colony, a vibrant, chaotic world of free spirits. A Wind Dancer greets them,\
    \ symbolizing the colony’s joyous entry requirement, while a Fire Artist performs\
    \ a breathtaking display of breath-based fire sculpture. Their attention shifts\
    \ to a Juggler, who invites them to join a 'laughing hour' gathering. Lwaxana,\
    \ ever impulsive, redirects the group toward a mudbath instead, demonstrating\
    \ her tactile, playful nature and her ability to disrupt structured chaos. Meanwhile,\
    \ Alexander witnesses a young couple’s absurd argument, which he later resolves\
    \ by parroting the Poet’s nonsensical phrase, 'The higher, the fewer.' This moment\
    \ marks Alexander’s growing acceptance of Shiralea’s unorthodox values, contrasting\
    \ with the rigid order of the Enterprise. Lwaxana’s delight in Alexander’s embrace\
    \ of the colony’s absurdity foreshadows her resistance to the formal expectations\
    \ of her impending marriage, while also reinforcing her role as a catalyst for\
    \ his personal growth. The scene underscores the tension between structure and\
    \ freedom, a central theme of the narrative.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e20
  scene_sequence: 10
  sequence_in_scene: 13
  key_dialogue: &id007
  - |-
    JUGGLER: A few of us were just gathering together for our laughing hour. Would you care to come laugh with us?
    LWAXANA: Actually, we were about to experience a mudbath.
    JUGGLER: Were you! What an idea! My friends and I will join you. One can always... laugh in the bath.
  - |-
    ALEXANDER: ((re: balls)) Do you ever drop one?
    JUGGLER: No, no, no. They are my worlds, and I protect them. I am a master of worlds, and they fly only as I wish.
  - |-
    POET: Hold! What is the lesson for today!?
    LWAXANA: Damned if we know. We're just here for some fun and a mudbath.
    POET: Every moment requires a purpose.
    LWAXANA: ((nicely)) No, it doesn't.
    POET: Every purpose requires a plan.
    JUGGLER: He does this every day; usually while everybody's food gets cold. Rather boring.
    POET: ((pronounces)) The higher... the fewer!
  - 'ALEXANDER: ((to Young Couple)) Excuse me! If you''re going to argue, you should
    remember... ((pronounces)) The higher, the fewer!'
  - 'LWAXANA: So, my little warrior wants to see more in life than just fighting.
    Ah, the mind opens, and in creeps wisdom.'
