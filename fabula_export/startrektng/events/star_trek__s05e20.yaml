      lush, holographic glade with its steamy mudbaths and curling vines creates an
      atmosphere of sensory overload and emotional safety, a deliberate contrast to
      the ship’s clinical environment. This location is not just a backdrop but an
      active facilitator of the characters’ emotional states: it allows Lwaxana and
