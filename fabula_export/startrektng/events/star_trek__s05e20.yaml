- fabula_uuid: act_849891a31e0cc02c
  number: 5
  summary: The holodeck environment begins to fail as the parasite infestation spreads,
    with orange goo seeping through the walls, signaling the ship's imminent collapse.
    Geordi and Data report the parasites are consuming nitrium in vital systems, including
    life support and engines. Picard orders a course to the Pelloris asteroid field,
    the parasites' natural habitat, hoping to lure them away. Data devises a plan
    to project a concentrated nitrium beam. As the ship's systems rapidly fail, life
    support plummets, and the crew loses consciousness from oxygen deprivation, Data,
    unaffected, executes the plan. He successfully draws the parasites to an asteroid,
    saving the Enterprise and allowing the crew to recover. With the ship crisis resolved,
    Lwaxana, at the wedding ceremony, appears completely nude, shocking Campio and
    Erko, who promptly call off the marriage. The episode concludes with Lwaxana,
    Deanna, Worf, and Alexander sharing a mudbath on the holodeck, having all gained
    a deeper understanding of life, freedom, and mutual appreciation. Lwaxana reflects
    on how Alexander taught her not to let go of life's joys, while Deanna acknowledges
    the need to live in the real world. Worf, still somewhat bewildered, is nonetheless
    present, signifying a new, albeit tentative, family dynamic and a shared moment
    of peace after the dual crises.
