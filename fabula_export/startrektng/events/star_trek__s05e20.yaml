  object_involvements:
  - object_uuid: ger_object_c98180c34519
    description_of_involvement: The dilithium chamber is a high-priority target for
      the parasites, as its failure would cripple the ship’s warp core and life support
      systems. The crew’s efforts to spray cold gas around it reflect its vulnerability
      and critical importance. While the chamber itself is not the focus of Geordi’s
      immediate bypass efforts, its potential compromise looms large, adding to the
      tension of the scene. The chamber’s integrity is a silent but ever-present threat,
      underscoring the ship-wide nature of the crisis.
    status_before_event: Operational but at risk of parasite infestation, given the
      parasites’ metal-eating capabilities and proximity to other compromised systems.
    status_after_event: Temporarily stabilized by the cold gas, but its long-term
      safety remains uncertain as the parasites continue to spread.
    global_id: ger_object_c98180c34519
  - object_uuid: ger_object_6cff0cb85737
    description_of_involvement: The backup warp controllers become a lifeline for
      the *Enterprise* as Geordi isolates them to bypass the compromised primary unit.
      Though they limit the ship to warp six, they provide a critical stopgap, allowing
      the crew to continue their mission despite the parasites’ sabotage. The controllers’
      activation is a testament to Geordi’s ingenuity and the ship’s redundant design,
      but their temporary solution underscores the precariousness of the situation.
      Without further intervention, the backup systems could also fall prey to the
      infestation, leaving the *Enterprise* stranded.
    status_before_event: Dormant but fully functional, ready to be activated in case
      of primary system failure.
    status_after_event: Activated and rerouted to maintain warp six, though their
      long-term reliability is uncertain given the parasites’ relentless advance.
    global_id: ger_object_6cff0cb85737
