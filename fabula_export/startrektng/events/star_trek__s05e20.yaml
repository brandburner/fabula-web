      by the same chaos afflicting the turbolift. Its red-alert lighting, visible
      through the doors, hints at the high-stakes coordination unfolding there, but
      also at the crew''s desperation. The location''s role here is dual: it''s both
      a destination and a warning, a reminder that even the ship''s nerve center is
      not immune to the parasites'' threat.'
    observed_atmosphere: Urgent and tense—though not fully visible, the red-alert
      lighting bleeding through the turbolift doors suggests a command center in crisis
      mode, where every station is alive with survival imperatives. The atmosphere
      is one of controlled chaos, where the crew's unity is tested by the parasites'
      relentless advance.
    functional_role: Unexpected refuge and command center—Picard and Data's uncommanded
