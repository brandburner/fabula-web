  global_id: null
  title: Power failure triggers emergency evacuation
  description: In the midst of a desperate strategy session to combat the metal-eating
    parasites, Engineering's primary power systems catastrophically fail, plunging
    the department into darkness. Geordi immediately springs into action, rerouting
    power to secondary generators while Picard and Data recognize the severity of
    the crisis. The sudden blackout underscores the parasites' relentless destruction
    and forces an abrupt shift from planning to survival mode. Picard, realizing the
    ship's systems are collapsing faster than anticipated, orders Data to evacuate
    with him, marking a critical escalation in the *Enterprise*'s existential threat.
    The moment transforms the crew's approach from strategic containment to reactive
    damage control, abandoning operational protocols as the parasites' destruction
    becomes undeniable and immediate. The failure also serves as a visceral reminder
    of the parasites' exponential spread, cutting short the crew's fragile hope of
    luring them back to the Pelloris Field. The scene ends with Picard and Data exiting
    Engineering, leaving Geordi to scramble against the clock to stabilize the ship's
    failing infrastructure.
