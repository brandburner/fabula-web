    - Flickering consoles and alarms, creating a sense of visual and auditory urgency.
    - Crewpersons spraying cold gas at wall panels and the dilithium chamber, adding
      to the controlled chaos.
    - Geordi hunched over his console, fingers flying across the controls as he diagnoses
      and attempts repairs.
