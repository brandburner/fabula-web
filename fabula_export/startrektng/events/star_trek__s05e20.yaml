- fabula_uuid: cand_evt_scene_1fb96507144ea126_01
  global_id: null
  title: Geordi and Data uncover nitrium depletion
  description: "\n  On the bridge’s science station, Geordi and Data investigate the\
    \ replicator and stabilizer malfunctions, discovering that nitrium—a critical\
    \ alloy—has been completely consumed from both systems. The computer confirms\
    \ no nitrium remains in the affected components, and Data’s analysis reveals the\
    \ elements have been broken down into simpler molecular structures, suggesting\
    \ organic metabolism. Geordi deduces that a living organism may be ingesting the\
    \ nitrium, leaving behind waste residue. The implication is dire: if something\
    \ is consuming the ship’s structural materials, the dilithium chamber and power\
    \ transfer conduits are now vulnerable to catastrophic failure. The urgency of\
    \ the situation prompts Geordi and Data to immediately head to engineering to\
    \ assess the threat. This moment shifts the crew’s focus from personal disruptions\
    \ (like Lwaxana Troi’s wedding chaos) to an existential crisis, as the parasites’\
    \ destructive potential becomes undeniable. The discovery also foreshadows the\
    \ need for rapid, coordinated action to prevent system-wide collapse.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e20
  scene_sequence: 22
  sequence_in_scene: 34
  key_dialogue:
  - 'GEORDI: It looks like the only alloy common to the stabilizer and the replicator
    is nitrium.'
  - 'DATA: There is none present in the residue, either.'
  - 'GEORDI: According to the mass spectrometer, the elements in the residue have
    been broken down into simpler molecular structures...'
  - 'DATA: That would suggest the nitrium has been organically metabolized.'
  - 'GEORDI: If that''s true, if something''s eating away at the nitrium on the ship...
    That means the dilithium chamber is vulnerable... and the power transfer conduits.'
