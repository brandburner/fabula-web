- fabula_uuid: cand_evt_scene_43627b3a6dd926f3_02
  global_id: null
  title: Exanogen Barrier Proposed Amid Power Crisis
  description: "\n  In the midst of a rapidly escalating crisis, Picard, Data, and\
    \ Geordi analyze the metal-eating parasites' behavior in Engineering, confirming\
    \ their origin in the destroyed Tessen Three asteroid and their preference for\
    \ nitrium-rich materials. Geordi proposes luring the parasites to the Pelloris\
    \ asteroid field—a five-hour warp-nine journey—but Data warns their exponential\
    \ spread may outpace the trip. Picard orders the course change while Data suggests\
    \ deploying an exanogen gas barrier to slow the parasites, though Geordi cautions\
    \ their rapid nitrium consumption makes containment nearly impossible. The discussion\
    \ is abruptly interrupted when primary power systems fail, forcing Geordi to reroute\
    \ to secondary generators. Picard and Data exit to address the bridge, leaving\
    \ Geordi to work frantically as the ship’s survival hangs in the balance. This\
    \ moment crystallizes the crew’s desperate gamble: a fragile scientific solution\
    \ in a race against annihilation, where every second counts and failure is not\
    \ an option.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e20
  scene_sequence: 27
  sequence_in_scene: 44
  key_dialogue: &id021
  - 'GEORDI: When we saw that photonic trail moving through the walls, we realized
    we must be dealing with a metal parasite of some kind.'
  - 'DATA: In several cases, an exanogen gas barrier has been known to slow the progress
    of metal parasites.'
  - 'GEORDI: The problem is finding them. By the time we spot an energy fluctuation,
    they''ve consumed all the nitrium and moved on.'
