    \ her role as a stabilizing force for her son. The moment is fleeting but emotionally\
    \ resonant, highlighting how her maternal bond with Alexander transcends the ship’s\
    \ collapse and her own personal turmoil over the impending arranged marriage.\
    \ The evacuation serves as a microcosm of the larger chaos on the *Enterprise*,\
    \ where personal and professional crises collide.\n  "
