- fabula_uuid: act_71404df9a40c39c1
  number: 4
  summary: 'The ship''s crisis rapidly advances as Geordi and Data, examining the
    mysterious orange goo, confirm it is metabolized nitrium residue. This crucial
    discovery leads them to the alarming conclusion that the Enterprise is infested
    with metal-eating parasites, explaining the widespread system failures. The external
    pressure on Lwaxana''s wedding also intensifies with the arrival of Minister Campio
    and his stern protocol master, Erko. Campio, a figure of rigid patrician decorum,
    immediately establishes a formal and distant dynamic, rebuffing Lwaxana''s attempts
    at warmth and familiarity. Erko strictly enforces Kostolain protocols, creating
    an atmosphere of stifling formality that clashes sharply with Lwaxana''s free-spirited
    nature. Lwaxana, initially attempting to adapt, grows increasingly uncomfortable
    and shell-shocked by Campio''s unyielding adherence to rules, foreshadowing the
    inevitable breakdown of their relationship. Meanwhile, the family conflicts continue
    unabated. Worf struggles to control Alexander, who, emboldened by Lwaxana''s influence,
    defiantly engages in his "laughing hour" and prioritizes his promise to Lwaxana
    over Worf''s commands. Lwaxana, in turn, openly defies Campio and Erko''s demands
    for immediate prenuptial discussions, choosing instead to take Alexander to the
    holodeck for another "lesson in happy wisdom." This act culminates in a dramatic
    escalation of the parasite threat: Geordi and Data discover a "flood" of orange
    goo and a much larger amount of "Twinkling Stuff" oozing from an access panel,
    confirming the rapid and pervasive spread of the infestation throughout the ship''s
    vital systems.'
