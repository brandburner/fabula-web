- fabula_uuid: cand_evt_scene_456026d547dd95e0_01
  global_id: null
  title: Troi Mediates Worf and Alexander’s Contract
  description: 'In Lwaxana Troi’s office, Counselor Troi attempts to mediate a heated
    argument between Worf and Alexander over chores, which escalates into a deeper
    conflict about discipline and emotional safety. Worf’s rigid Klingon expectations—demanding
    Alexander follow rules without flexibility—clash with Alexander’s plea for basic
    respect, culminating in his blunt demand: ''No yelling.'' Troi proposes a structured
    contract to formalize responsibilities, but the tension remains unresolved as
    Worf’s defensive aggression and Alexander’s passive resistance expose the fragility
    of their father-son bond. The scene underscores how Worf’s authoritarianism and
    Alexander’s need for autonomy are at odds, with Troi’s mediation serving as a
    temporary bandage rather than a solution. The interruption by Riker’s announcement
    of Lwaxana’s arrival cuts short the discussion, leaving the conflict hanging and
    foreshadowing the broader chaos Lwaxana’s presence will bring to the ship.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e20
  scene_sequence: 4
  sequence_in_scene: 4
  key_dialogue:
  - 'WORF: My instructions were clear!'
  - 'ALEXANDER: They were not!'
  - 'WORF: I specifically told you that!'
  - 'ALEXANDER: You told it to me yesterday; not today!'
  - 'ALEXANDER: No yelling.'
  - 'WORF: I do not yell.'
  - 'TROI: When he''s cleaned his room, for instance, then maybe he''s earned a visit
    to the holodeck to fight his alien monsters.'
  - 'WORF: You suggest bribery?'
  - 'TROI: I suggest working out an equitable system where the rules are spelled out
    as clearly as possible. For the child and the parent. You must list your responsibilities,
    too.'
