- fabula_uuid: cand_evt_scene_43627b3a6dd926f3_01
  global_id: null
  title: Pelloris solution proposed amid parasite crisis
  description: "\n  In Engineering, Geordi and Data brief Captain Picard on their\
    \ discovery that the metal-eating parasites originated from the destroyed asteroid\
    \ near Tessen Three, which was part of the nitrium-rich Pelloris field. Picard\
    \ deduces that the parasites could be lured back to the asteroid field, offering\
    \ a tactical solution to the immediate crisis. However, the crew faces a race\
    \ against time as the parasites spread rapidly through the ship's systems, threatening\
    \ critical functions like power and life support. Data proposes deploying an exanogen\
    \ gas barrier to slow the parasites' progress, while Geordi warns that their unpredictable\
    \ movement makes containment nearly impossible. The urgency of the situation is\
    \ underscored when primary power systems briefly fail, forcing Geordi to reroute\
    \ to secondary generators. Picard orders the Enterprise to set a course for the\
    \ Pelloris field at warp nine, despite the risks, while Data joins him to address\
    \ the escalating threat.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e20
  scene_sequence: 27
  sequence_in_scene: 43
  key_dialogue:
  - 'GEORDI: "When we saw that photonic trail moving through the walls, we realized
    we must be dealing with a metal parasite of some kind."'
  - 'PICARD: "Mister Data... you said the asteroid we destroyed was rich in nitrium...
    That asteroid was from the Pelloris Field... if the rest of that field is rich
    in nitrium... it would have been a natural feeding ground."'
  - 'DATA: "In several cases, an exanogen gas barrier has been known to slow the progress
    of metal parasites."'
  - 'GEORDI: "The problem is finding them. By the time we spot an energy fluctuation,
    they''ve consumed all the nitrium and moved on."'
