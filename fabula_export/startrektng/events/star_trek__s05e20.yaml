    institutional_impact: |2-

              The scene highlights Starfleet’s dual role as both a stabilizing force and a source of tension. While it provides structure and purpose, it also creates rigid expectations that clash with personal needs. The unresolved conflict between Worf and Alexander mirrors the larger narrative of the episode: the *Enterprise*’s order will be tested by external chaos (the parasites, Lwaxana’s arrival), just as Starfleet’s values are tested by the emotional realities of its crew.
    internal_dynamics: |2-

              The tension between Starfleet’s ideal of emotional regulation and the raw, unpredictable nature of human (and half-Klingon) relationships. Worf’s struggle to balance Klingon warrior values with Starfleet discipline, and Troi’s frustration with the limitations of her role as a counselor, both reflect deeper institutional challenges: how does an organization that values order and protocol accommodate the chaos of personal lives?
