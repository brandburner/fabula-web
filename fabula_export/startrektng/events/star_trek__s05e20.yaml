    description_of_involvement: Cold gas is deployed by the Engineering crew as an
      immediate countermeasure to the parasite infestation, sprayed directly at the
      wall panels and dilithium chamber. While not a permanent solution, it buys the
      crew precious time to address the larger threats posed by the parasites. The
