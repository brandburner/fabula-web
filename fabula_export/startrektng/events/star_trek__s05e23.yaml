  - object_uuid: ger_object_37a5489e6497
    description_of_involvement: 'The **Borg data processing algorithms** are the technical
      backbone of Picard’s plan, the ‘access codes’ Geordi must trace to alter the
      root command structure. They are described as ‘complicated,’ requiring study,
      but their existence is the crew’s Achilles’ heel: the Borg’s interconnectedness
