  - object_uuid: ger_object_1f68d1e068b3
    description_of_involvement: 'The **Borg root command structure** is the ideological
      and narrative heart of Picard’s plan. It is the ‘access point’ to the Collective’s
      neural network, the weak link in their armor. Geordi confirms its existence,
      but his reluctance to engage with it underscores the ethical weight of the crew’s
      choice. The structure is not just code; it is the Borg’s soul, the command center
