    description_of_involvement: 'Geordi’s portable sensor device is the tool that
      bridges the gap between Hugh’s mechanical distress and the crew’s human understanding.
      As he sweeps it over Hugh, the device’s display lights up with readings of the
      drone’s faint homing signals and subspace emissions, revealing the depth of
