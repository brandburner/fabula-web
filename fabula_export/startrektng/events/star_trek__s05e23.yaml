- fabula_uuid: cand_evt_scene_4f60794deba3af43_02
  global_id: null
  title: Picard proposes a lethal Borg virus
  description: |2-

      In the detention cell, Picard approaches Geordi, Worf, and Beverly as they monitor the injured adolescent Borg. Beverly reports the Borg’s critical condition—internal injuries and damaged brain implants—while Geordi suggests constructing new implants to sustain its life. Picard, however, pivots abruptly, probing Geordi’s technical ability to alter the Borg’s root command structure. When Geordi confirms the possibility, Picard reveals his plan: introducing an invasive programming sequence into the Borg’s biochips, designed to spread like a virus and disable the Collective’s neural network. Beverly reacts with horror, framing the proposal as a terminal disease, while Picard’s cold demeanor underscores the moral stakes. The exchange forces the crew to confront the ethical cost of weaponizing the Borg’s own technology against them, with Beverly’s objection marking the first major fracture in the crew’s unified front. The scene escalates from medical triage to a strategic gambit, exposing Picard’s lingering trauma and the crew’s divided loyalties between compassion and survival.
