- fabula_uuid: cand_evt_scene_2f30e13d36a386b4_01
  global_id: null
  title: Away Team Discovers Injured Borg Adolescent
  description: |2

    The away team—Beverly, Riker, and Worf—materializes on a frozen, wreckage-strewn moon where a derelict Borg vessel has crashed. Beverly’s medical tricorder detects a single, critically weak life sign, leading them to a partially buried survivor. As they clear debris, they reveal the face of a young Borg, its vulnerability stark against the brutal landscape. The discovery forces an immediate confrontation with the crew’s preconceptions: Beverly’s instinctive compassion clashes with Riker’s tactical caution and Worf’s visceral hostility. The moment marks a narrative pivot, shifting the mission from reconnaissance to ethical crisis as the crew grapples with the Borg’s unexpected humanity. The scene’s visual contrast—pristine snow vs. scorched metal, the childlike Borg vs. the crew’s hardened reactions—underscores the story’s central tension: can the enemy be seen as a victim, or is mercy a tactical mistake?
