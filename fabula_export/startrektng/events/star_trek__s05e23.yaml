      the Collective*. Geordi’s explanation (''This is for you'') frames the conduit
      as a gift, not a tool, and the drone’s bewildered reaction underscores its narrative
      role as a bridge between machinery and mercy.'
    status_before_event: Carried by Geordi into the detention cell, fully functional
