      the presence of Hugh—disoriented, vulnerable, and seeking connection—transforms
      it into a crucible for moral reckoning. The lab's humming equipment and flickering
      screens underscore the tension between cold analysis and the emotional stakes
      of Hugh's fate. The force field console, though untouched, looms as a reminder
      of the crew's caution, while the power conduit becomes a symbol of both sustenance
      and control.
