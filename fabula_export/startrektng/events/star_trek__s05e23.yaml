    description_of_involvement: The adolescent Borg’s brain implants are the physical
      manifestation of its assimilation, the cybernetic extensions that sustain its
      life and connect it to the Collective. Beverly examines them closely, noting
      their critical damage, while Geordi confirms they can be altered. Picard seizes
      on this, proposing to use them as the delivery system for his invasive programming
      sequence. The implants are both a medical obstacle and a strategic opportunity,
      their damaged state making them vulnerable to manipulation. They are the key
      to the Borg’s survival—and, potentially, its destruction. Their presence forces
      the crew to confront the ethical cost of using the Borg’s own technology against
      it.
    status_before_event: Damaged and flickering, sustaining the Borg’s life but barely
      functional. Beverly is in the process of assessing whether they can be salvaged
      or removed.
    status_after_event: The implants remain damaged, but their role shifts from a
      medical concern to a strategic vulnerability. Picard’s proposal hinges on their
      alterability, turning them from a patient’s lifeline into a potential weapon.
      Their condition is unchanged, but their narrative function evolves dramatically—from
      a barrier to survival to a tool of destruction.
    global_id: ger_object_00c43a69c2ce
