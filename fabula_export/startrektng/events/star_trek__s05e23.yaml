  - object_uuid: ger_object_b5c7e971a4ca
    description_of_involvement: 'The **detention cell force field** is the physical
      and symbolic barrier between the crew and the injured Borg, its shimmering energy
      a constant reminder of the threat—and the moral dilemma—contained within. It
      flares briefly to allow the Nurse entry, a momentary vulnerability that underscores
