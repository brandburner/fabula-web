  title: Troi probes Picard’s repressed trauma
  description: In the ready room, Troi initiates a private conversation with Picard
    after observing his emotional withdrawal following the crew’s discovery of the
    injured Borg. She directly challenges his claim of being 'quite recovered' from
    his assimilation as Locutus, naming the violence he endured—kidnapping, assault,
    mutilation—while he deflects with professional detachment. Though Picard insists
    he’s 'comfortable' with his decision to exploit the Borg’s technology, Troi’s
    empathic persistence exposes the unspoken tension beneath his composure. His abrupt
    shutdown of the conversation (despite polite reassurances) signals his unresolved
    trauma, while Troi’s exit underscores the crew’s moral reckoning with the Borg’s
    humanity. The scene functions as a turning point, forcing Picard to confront the
    fragility of his command and the ethical weight of his past.
