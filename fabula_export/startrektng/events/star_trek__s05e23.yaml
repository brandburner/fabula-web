  key_dialogue: &id009
  - 'PICARD: Mister La Forge... do you have enough knowledge of Borg programming to
    alter the pathways to the root command structure?'
  - 'GEORDI: I''m not sure, sir. The subroutines are pretty complicated... I''d probably
    have to study their data processing algorithms... that''s the only way I could
    trace the access codes.'
  - 'PICARD: If we could get to the root command... we could introduce an invasive
    programming sequence through its biochip system... and then return it to the hive.'
  - 'GEORDI: The Borg are so interconnected it would spread like a virus.'
  - 'PICARD: Until it infected the entire Collective. We could disable their neural
    network in one stroke.'
  - 'BEVERLY: Infected... it sounds like you''re talking about a disease.'
  - 'PICARD: Quite right, Doctor. And if all goes well, a terminal one.'
