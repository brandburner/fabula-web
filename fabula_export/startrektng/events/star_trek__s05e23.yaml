- fabula_uuid: cand_evt_scene_f420ee065195afaf_02
  global_id: null
  title: Picard reaffirms weaponization plan
  description: "\n  In the Observation Lounge, Picard and Geordi present their invasive\
    \ program proposal to the senior staff, revealing its intent to trigger total\
    \ systems failure in the Borg Collective. Beverly immediately challenges the moral\
    \ implications, framing the Borg as sentient individuals rather than a faceless\
    \ enemy. Picard and Riker defend the plan as a necessary act of war, invoking\
    \ the Borg's relentless aggression and Picard's own trauma as Locutus. The debate\
    \ escalates when Beverly insists the captured Borg—whom she treats as a vulnerable\
    \ patient—deserves compassion, not weaponization. Picard's resolve hardens as\
    \ he reaffirms the plan, only for the moment to be interrupted by a security alert:\
    \ the adolescent Borg has regained consciousness. The timing underscores the urgency\
    \ of their decision, forcing the crew to confront the immediate moral cost of\
    \ their strategy. Picard's final declaration—'We will proceed as planned'—signals\
    \ a pivotal shift, where survival logic overrides ethical hesitation, setting\
    \ the stage for Hugh's awakening and the crew's fracturing alliances.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e23
  scene_sequence: 11
  sequence_in_scene: 16
  key_dialogue:
  - 'BEVERLY: I just think we should be plain about that. We''re talking about annihilating
    an entire race...'
  - 'PICARD: Think of them as a single, collective being. Any one Borg is no more
    an individual than your arm or your leg.'
  - 'BEVERLY: When I look at my patient, I don''t see a collective consciousness...
    I see a living, breathing boy... who''s been hurt and who needs help. And we''re
    talking about sending him back to his people as an instrument of destruction.'
  - 'PICARD: We are faced with an enemy that is determined to destroy us, and with
    whom we have no hope of negotiating peace. Unless that changes, we are justified
    in doing anything we can to survive.'
  - 'PICARD: We will proceed as planned.'
