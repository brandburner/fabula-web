  - object_uuid: ger_object_b37f8530a239
    description_of_involvement: 'The **invasive programming sequence**—Picard’s proposed
      ‘terminal disease’—is the ideological and narrative centerpiece of this event.
      It is introduced not as a tool, but as a *metaphor*: a virus that will spread
      through the Borg Collective like a plague, disabling their neural network in
      one stroke. Geordi’s realization that it would ‘spread like a virus’ is the
      moment the plan becomes real, its implications horrifying in their efficiency.
      The sequence is not just a weapon; it is a moral reckoning, a test of whether
      the crew will cross the line from defense to preemptive destruction. Its name
      alone—‘invasive’—underscores the violation at its core: an attack not on the
      Borg’s bodies, but on their *minds*, their very identity as a hive.'
    status_before_event: Hypothetical, uncreated—existing only as a theoretical possibility
      in Picard’s mind and Geordi’s technical knowledge.
    status_after_event: Concretized as a plan, its feasibility confirmed by Geordi.
      It now exists as a moral dilemma, a choice the crew must either embrace or reject.
