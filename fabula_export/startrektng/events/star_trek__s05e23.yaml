      crew to see Hugh not as a faceless Borg, but as a being emitting desperate,
      unanswered calls for connection. When Geordi reports that the damping field
      is blocking both signals, the sensor becomes a metaphor: the crew is not just
      observing Hugh’s plight—they are *enabling* it by cutting him off from the only
      ‘home’ he has ever known.'
