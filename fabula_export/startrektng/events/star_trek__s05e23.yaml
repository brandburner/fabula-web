    emotional_state: "\n        Feigned composure masking deep anxiety and unresolved\
      \ trauma. Surface-level calm belies a fragile emotional state, particularly\
      \ when confronted with the specifics of his Borg assimilation. His irritation\
      \ at the interruption suggests a desire to maintain control, while his sharp\
      \ tone when Troi names his trauma reveals the raw wound beneath his professional\
      \ facade.\n      "
    goals:
    - Maintain professional detachment and control over his emotions
    - Avoid acknowledging or discussing his trauma related to the Borg assimilation
    - Reaffirm his authority and decision-making regarding the Borg adolescent
    what_happened: "\n        Picard enters the scene with a sense of controlled irritation,\
      \ his posture stiffening slightly as the door chimes. He continues to his chair\
      \ and busies himself with his monitor, using it as a physical and psychological\
      \ barrier to avoid direct engagement with Troi. His dialogue is clipped and\
      \ dismissive, though his sharp tone when Troi names his trauma ('kidnapped,\
      \ assaulted, mutilated') reveals a momentary loss of composure. He quickly regains\
      \ his professional demeanor, insisting on his 'comfort' with the decision regarding\
      \ the Borg, but his emotional withdrawal and abrupt shutdown of the conversation\
      \ signal deep unresolved trauma.\n      "
