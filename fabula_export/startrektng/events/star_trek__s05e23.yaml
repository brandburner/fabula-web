- fabula_uuid: cand_evt_scene_b2534afe097eaac4_02
  global_id: null
  title: Hugh’s First Name and Humanity’s Cost
  description: "\n  In the sterile science lab, Beverly Crusher and Geordi La Forge\
    \ transport the adolescent Borg—still referred to as 'Third of Five'—for further\
    \ examination. The Borg, disoriented but instinctively drawn to the power conduit\
    \ Geordi has set up, reveals a childlike vulnerability that unsettles Beverly.\
    \ When she introduces herself as a 'doctor' who heals the sick, the Borg responds\
    \ with confusion, stating that the sick are reabsorbed in the Collective. This\
    \ exchange exposes the stark contrast between human compassion and Borg utilitarianism,\
    \ with Beverly’s insistence on her duty to help the injured clashing with the\
    \ Borg’s alien logic.\n\n  The moment shifts when Geordi, attempting to establish\
    \ cooperation for his tests, suggests naming the Borg. After a hesitant exchange,\
    \ Geordi proposes 'Hugh,' and the Borg—now Hugh—repeats the name with cautious\
    \ curiosity. This small act of naming becomes a fragile bridge between species,\
    \ as Hugh begins to engage with the tests Beverly administers, demonstrating extraordinary\
    \ spatial awareness through his prosthetic eye. However, the warmth of the moment\
    \ is undercut by Hugh’s innocent question about his fate: 'When you have completed\
    \ these tests, what will be done with us?' Geordi’s evasive response—'We’ll send\
    \ you home'—hints at the moral dilemma the crew faces, as Hugh’s growing individuality\
    \ complicates their strategic plans. The scene ends with a charged silence, as\
    \ Beverly and Geordi exchange a glance, both grappling with the ethical weight\
    \ of their mission.\n  "
