      as a mantra, reinforcing his submission.
    institutional_impact: The Borg Collective’s influence in this scene underscores
      the broader narrative conflict between assimilation and autonomy, framing Hugh’s
      dilemma as a microcosm of the larger struggle between the Borg and the Federation.
      Its presence is a constant reminder of the cost of defiance and the fragility
      of individuality in the face of overwhelming power.
    internal_dynamics: The Collective’s internal dynamics are not directly visible,
      but its monolithic nature is implied—there is no dissent, no individual will,
      only the relentless pursuit of assimilation. Hugh’s brief rebellion is a crack
      in this facade, but one that the Collective will not tolerate.
