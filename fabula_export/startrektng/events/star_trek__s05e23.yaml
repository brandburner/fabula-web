    description_of_involvement: The Borg Collective is symbolically present in this
      event through Hugh's descriptions of his past, his longing for the 'thousands
      of voices' of the Collective, and his childlike innocence. Though physically
      absent, the Collective looms as a spectral force, shaping Hugh's identity, motivations,
      and the crew's fears. Hugh's loneliness and his instinctive reach for the power
      conduit reflect his deep-seated connection to the Borg, while his growing individuality—evidenced
      by his adoption of the name 'Hugh'—hints at the fragility of the Collective's
      control. The crew's ethical dilemma is amplified by the knowledge that Hugh's
      fate could determine the Collective's response to their actions.
    active_representation: Through Hugh's descriptions of Borg life, his longing for
      the Collective, and the crew's fears of its retaliation. The Collective is also
      represented by Hugh's cybernetic implants and his dependence on the power conduit,
      symbols of his Borg nature.
    power_dynamics: Though physically absent, the Borg Collective exerts a profound
      influence over the event, shaping Hugh's behavior, the crew's fears, and the
      ethical stakes of their mission. The crew's actions are driven by the need to
      defend against the Collective, yet Hugh's vulnerability forces them to confront
      the humanity they had denied the Borg.
    organizational_goals:
    - To reabsorb Hugh into the Collective, as evidenced by his desire to 'rejoin'
      and his belief that the crew will 'send him home.'
    - To assert its dominance through fear, as the crew's caution and security measures
      reflect their awareness of the Collective's power.
    influence_mechanisms:
    - Through Hugh's psychological dependence on the Collective, as seen in his loneliness
      and longing for the 'voices.'
    - Through the crew's strategic calculations, which are driven by the threat the
      Collective poses to the Federation.
    - Through the symbolic weight of Borg technology (e.g., the eyepiece, the power
      conduit), which remind the crew of the Collective's presence even in Hugh's
