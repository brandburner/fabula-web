- fabula_uuid: cand_evt_scene_b2534afe097eaac4_01
  global_id: null
  title: Hugh’s First Steps Toward Identity
  description: "\n  In the sterile confines of the *Enterprise*’s science lab, Geordi\
    \ La Forge and Beverly Crusher transport the injured adolescent Borg—now named\
    \ Hugh—from detention to conduct perceptual tests. The moment marks a critical\
    \ shift in the crew’s perception of the Borg, as Hugh’s childlike vulnerability\
    \ and growing curiosity challenge their preconceptions. Beverly, moved by his\
    \ innocence, explains her role as a healer, while Geordi, though focused on his\
    \ technical objectives, begins to grapple with the ethical implications of their\
    \ work. Hugh’s hesitant acceptance of the name 'Hugh' and his participation in\
    \ the tests reveal his burgeoning individuality, as he struggles to reconcile\
    \ his Borg programming with the unfamiliar concept of human compassion. The scene\
    \ underscores the moral dilemma at the heart of the story: Can the Borg be separated\
    \ from their collective identity, or is Hugh’s humanity a fleeting illusion? The\
    \ tension between Geordi’s strategic goals and Beverly’s empathy sets the stage\
    \ for the crew’s deeper conflict over whether to exploit Hugh’s vulnerability\
    \ or nurture his emerging personhood.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e23
  scene_sequence: 15
  sequence_in_scene: 24
  key_dialogue:
  - |-
    BORG: What is a doctor?
    BEVERLY: A doctor heals the sick. Repairs the injured.
    BORG: The sick and injured are reabsorbed. Others take their place.
    BEVERLY: That didn’t happen to you. When we found you, you were dying. I saved your life.
    BORG: Why?
  - |-
    GEORDI: Do you want one?
    BORG: A name...
    BEVERLY: I’m Beverly... This is Geordi... And you...
    BORG: You...
    BEVERLY: You...
    GEORDI: That’s it. Hugh. What do you think?
    BORG: Hugh.
  - |-
    BORG: When you have completed these tests, what will be done with us?
    GEORDI: We’ll send you home.
    BORG: We will rejoin the Collective.
