  global_id: null
  title: Crew debates weaponizing the Borg
  description: "\n  In the observation lounge, the senior staff gathers to discuss\
    \ Geordi’s proposal to weaponize the Borg by introducing a destructive program\
    \ into their collective. Beverly immediately challenges the plan, framing the\
    \ injured adolescent Borg as a sentient being deserving of compassion rather than\
    \ a faceless enemy. Picard and Riker counter with strategic arguments, invoking\
    \ the Borg’s relentless aggression and the Federation’s existential threat. Data\
    \ provides technical clarity, while Troi mediates the moral tension. The debate\
    \ escalates as Beverly’s ethical objections clash with Picard’s hardened resolve,\
    \ culminating in his decision to proceed with the plan despite the crew’s divisions.\
    \ The moment is interrupted by a security alert confirming the Borg’s revival,\
    \ forcing Picard to reaffirm his stance—solidifying the crew’s fracture over the\
    \ mission’s morality.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e23
  scene_sequence: 11
  sequence_in_scene: 15
  key_dialogue:
  - 'GEORDI: "If this works the way I think it will, once the invasive program starts
    spreading, it''ll only be a matter of months before the Borg suffer total systems
    failure."'
  - 'BEVERLY: "I just think we should be plain about that. We''re talking about annihilating
    an entire race..."'
  - 'PICARD: "We are faced with an enemy that is determined to destroy us, and with
    whom we have no hope of negotiating peace. Unless that changes, we are justified
    in doing anything we can to survive."'
  - 'BEVERLY: "When I look at my patient, I don''t see a collective consciousness...
    I see a living, breathing boy... who''s been hurt and who needs help. And we''re
    talking about sending him back to his people as an instrument of destruction."'
  - 'PICARD: "It comes down to this: We are faced with an enemy that is determined
    to destroy us, and with whom we have no hope of negotiating peace. Unless that
    changes, we are justified in doing anything we can to survive."'
