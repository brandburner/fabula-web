  title: Picard Rejects Weaponizing Hugh
  description: 'In the Observation Lounge, Picard admits he avoided Hugh to preserve
    the crew’s tactical plan but now acknowledges Hugh’s burgeoning individuality,
    calling him a fully realized person. Geordi and Beverly argue against erasing
    Hugh’s memories, while Riker and Worf remain skeptical. Picard proposes a radical
    alternative: returning Hugh to the Borg with his memories intact, betting that
    his newfound self-awareness could spread through the Collective like a virus.
    Beverly’s question—*What if he doesn’t want to go back?*—exposes the crew’s ethical
    blind spot, forcing Picard to confront the moral cost of their actions. The scene
    pivots from strategic pragmatism to a high-stakes gamble on compassion, redefining
    the crew’s relationship with the Borg and Picard’s own reckoning with his past
    as Locutus.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e23
  scene_sequence: 23
  sequence_in_scene: 39
  key_dialogue:
  - 'PICARD: ... I think I deliberately avoided speaking with the Borg because I didn''t
    want anything to get in the way of our plan. But now something has. As far as
    I can tell, he seems to be a fully realized individual. He has even accepted me
    as Picard, Captain of this ship, and not as Locutus.'
  - 'PICARD: Yes. If we used him in that manner, we''d be no better than the enemy
    we seek to destroy. I want other options.'
  - 'PICARD: ... in the short time before they purge those memories... the sense of
    individuality which he has gained here will be transmitted throughout the Collective.
    Every one of the Borg will have the opportunity to experience the feeling of...
    singularity. Perhaps that would be the most pernicious program of all... the knowledge
    of self, spread through the Borg Collective in that brief moment, might alter
    them forever.'
  - 'BEVERLY: What if he doesn''t want to go back?'
