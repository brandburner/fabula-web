    the contrast between Beverly’s medical compassion and Worf’s readiness for violence,
    while Riker’s measured report to Picard foreshadows the captain’s impending confrontation
    with his own trauma. The event serves as a narrative fulcrum: it shifts the story
    from passive discovery to active moral reckoning, forcing the crew—and Picard—to
    confront whether the Borg can be seen as anything other than an existential threat.'
