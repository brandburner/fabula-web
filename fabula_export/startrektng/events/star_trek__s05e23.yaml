  sequence_in_scene: 43
  key_dialogue:
  - 'GEORDI: Hello, Hugh.'
  - 'BORG: Hello, Geordi.'
  - 'PICARD: Hugh... a Borg rescue vessel is approaching. It will be here within three
    hours. We can return you to the crash site, where they will find you and take
    you home. Or... if you wish, you may remain here with us.'
  - 'BORG: What I wish... is irrelevant.'
  - 'GEORDI: It''s not irrelevant. It matters to us.'
  - 'BORG: No Borg leaves the Collective. If they find I am missing -- they will come
    for me.'
  - 'PICARD: Hugh, we''ll deal with the repercussions later. What we must know is
    what you want.'
  - 'GEORDI: Don''t you understand? We''re giving you a choice.'
  - 'BORG: Choice...'
  - 'GEORDI: Yeah. Do you want to go back with the Borg... or stay with us?'
  - 'BORG: I could stay with you... ?'
  - 'PICARD: Yes. We would grant you asylum.'
  - 'BORG: I would choose to stay with Geordi.'
  - 'BORG: But it is too dangerous. They will follow.'
  - 'BORG: Return me to the crash site. It is the only way.'
