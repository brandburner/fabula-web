- fabula_uuid: cand_evt_scene_b2534afe097eaac4_04
  global_id: null
  title: Hugh’s First Name and Hidden Truths
  description: 'In the Science Lab, Geordi and Beverly prepare to transport Hugh—the
    adolescent Borg—for perceptual tests, revealing their uneasy moral compromise.
    Geordi justifies his approach as necessary for studying Borg command pathways,
    while Beverly’s discomfort surfaces in her sharp critique: ''So he can participate
    in the destruction of his entire species.'' The tension escalates when Hugh, now
    named by Geordi, begins to grasp his isolation—''Here it is quiet. There are no
    other voices''—exposing the crew’s exploitation of his vulnerability. Beverly’s
    realization that Hugh is ''lonely'' contrasts with Geordi’s evasive response to
    Hugh’s question about his fate: ''We’ll send you home.'' The exchange forces both
    to confront the ethical cost of their mission, as Hugh’s innocence and Geordi’s
    guilt collide over the lie of ''rejoining the Collective.'''
