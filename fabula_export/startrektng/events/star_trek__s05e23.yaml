    intervene. Beverly’s insistence on treating the Borg as a living being—‘He’s not
    dead’—clashes with Riker’s strategic caution, as he warns of an incoming Borg
    response to the homing signal. Picard’s refusal to engage or countermand Beverly’s
    plea exposes his unresolved trauma, while Riker’s reluctant mediation underscores
    the crew’s moral fracture. The moment forces Picard’s indecision into the open,
    setting up a direct confrontation between compassion and command that will demand
    his leadership—and his healing.
