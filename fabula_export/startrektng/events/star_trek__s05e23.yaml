    emotional_state: Traumatized and disoriented—severed from the Collective, the
      adolescent is a shell of their former self, their pain both physical and existential.
      Their stillness is not menace, but the quiet desperation of a creature adrift.
    goals:
    - Survive the immediate threat of their injuries.
    - Unconsciously challenge the crew’s perceptions of the Borg through their vulnerability.
    what_happened: |2-

      The Borg adolescent lies buried beneath the wreckage, their pale, cybernetically enhanced form half-obscured by debris. As Riker and Worf clear the metal, the survivor’s face is revealed—young, vulnerable, and starkly out of place amid the destruction. Their breathing is shallow, their implants flickering weakly, a stark contrast to the usual relentless efficiency of the Borg. The adolescent does not speak or move, their eyes half-lidded as if on the verge of unconsciousness. Their presence is a silent accusation: this is not the faceless drone of collective propaganda, but a being on the cusp of death, their humanity laid bare by injury and isolation.
