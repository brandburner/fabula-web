    status_before_event: |2-

      **Scattered across the crash site**, a **chaotic mix of wreckage and corpses**. The debris is **still smoldering in places**, and the dead Borg lie **pallid and lifeless**, their cybernetic implants **dark and inert**. The site is **eerie and foreboding**, a **silent witness** to the Borg’s **brutality**.
