    status_before_event: |2-

      An empty, standard-issue detention cell aboard the *Enterprise*, likely used for other security purposes in the past. It’s **not yet activated or modified** for Borg-specific containment, but it’s **ready to be repurposed** based on Picard’s orders. The cell’s **force fields and monitoring equipment** are functional but not yet tailored to the drone’s unique cybernetic needs.
    status_after_event: |2-

      Now **actively prepared** for the Borg drone’s arrival, with **enhanced security protocols** (including the subspace damping field) in place. The cell is **isolated from the rest of the ship**, both physically and electronically, to prevent any subspace transmissions. Its **atmosphere is tense and clinical**, reflecting the crew’s **unease about the drone’s presence**. The cell will soon hold the drone, but its **symbolic weight**—as a place of **both protection and imprisonment**—will grow as the crew grapples with the ethical implications of their actions.
