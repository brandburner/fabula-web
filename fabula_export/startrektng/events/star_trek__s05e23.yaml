  key_dialogue:
  - 'GUINAN: Picard... I want to hear you say that you''re sure -- that what you''re
    doing is right.'
  - 'PICARD: If you''ve come here to persuade me not to use the invasive program...'
  - 'GUINAN: No -- I think I''m asking you to persuade me.'
  - 'GUINAN: If you''re going to use this person to destroy his race, don''t you think
    you should look him in the eye once before you do it?'
  - 'PICARD: It''s a Borg, damn it, not a person --!'
  - 'GUINAN: Unless you talk to him -- at least once -- you might find that decision
    harder to live with than you realize.'
