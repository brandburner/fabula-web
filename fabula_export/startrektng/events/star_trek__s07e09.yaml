  title: Rabal Defends Serova’s Conviction
  description: 'After Serova’s abrupt departure following a heated exchange with Geordi—where
    she dismisses his concerns about warp core recalibration and the potential cost
    to the *Fleming*—Rabal remains to smooth tensions. He reveals his own transformation
    from skepticism to unwavering belief in Serova’s research, framing her as a visionary
    whose work demands sacrifice. Geordi, still skeptical, challenges the idea of
    Hekaras Two abandoning warp drive entirely, forcing Rabal to articulate the existential
    stakes: isolation from the Federation. The exchange subtly shifts Geordi’s perspective,
    planting doubt about warp drive’s safety and the moral weight of his own resistance.
    Rabal’s emotional appeal and Data’s later analytical support will later erode
    Geordi’s skepticism, setting up his eventual collaboration with Serova’s research.'
