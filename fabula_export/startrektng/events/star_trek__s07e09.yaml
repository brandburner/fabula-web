  - object_uuid: ger_object_d6a39ccb22f5
    description_of_involvement: '**EPS Conduit 13** is the *physical manifestation*
      of Geordi’s pride and the scene’s central conflict. He hunches over its access
      panel, tools in hand, running diagnostics and making ‘manual adjustments’ to
      boost power conversion levels—efforts that yield ‘no improvement.’ The conduit’s
      steady glow (described as ‘electroplasma threads’) contrasts with Geordi’s growing
      frustration, as the computer confirms the levels are ‘unchanged.’ Data’s questioning
      (‘Then why are you stabilizing the EPS conduit?’) forces Geordi to admit his
      adjustments are driven by rivalry, not necessity. The conduit thus becomes a
      metaphor for Geordi’s *internal* instability: a system he can’t ‘fix’ through
      force of will, just as he can’t outrun his insecurities.'
    status_before_event: Functioning normally, but Geordi perceives it as underperforming
      relative to the *Intrepid*’s benchmarks.
    status_after_event: Unchanged in output, but Geordi abandons his adjustments,
      shifting focus to the sensors. The conduit’s ‘problem’ was never technical—it
      was Geordi’s pride.
    global_id: ger_object_d6a39ccb22f5
