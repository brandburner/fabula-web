  title: Geordi confronts Data over Spot
  description: 'In Geordi''s quarters, Data arrives to find the space in disarray—broken
    ceramics, a ruined couch, and Geordi on his hands and knees, cornering Spot under
    the bed. Geordi’s frustration boils over as he catalogs the cat’s destruction:
    shattered vases, hairballs, and clawed furniture. Data, oblivious to the severity
    of the situation, calmly notes that such behavior is typical for cats, but Geordi
    snaps, demanding Data take Spot back. Their exchange reveals a clash of priorities:
    Geordi’s exasperation with the chaos Spot brings into his meticulously ordered
    life, and Data’s detached, almost clinical approach to the animal’s behavior.
    The moment is interrupted by Riker’s summons to a mission briefing, but not before
    Spot—spooked by Geordi’s attempt to flush her out—causes yet another crash in
    the next room. The scene underscores Geordi’s rare loss of composure, a crack
    in his usual professionalism, while also highlighting Data’s struggle to grasp
    human emotional responses to unpredictability. The tension between them serves
    as a microcosm of the broader story’s themes: the friction between logic and emotion,
    control and chaos, and the unspoken burdens of responsibility—both personal and
    professional—that define their roles on the *Enterprise*.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e09
  scene_sequence: 1
  sequence_in_scene: 1
  key_dialogue:
  - 'GEORDI: I''ve got her now, Data... she''s trapped.'
  - 'GEORDI: Your demented cat.'
  - 'DATA: I do not understand. Why is Spot under the bed?'
  - 'GEORDI: Probably because she knows I''ll kill her if I get my hands on her.'
  - 'GEORDI: That''s putting it mildly. So far she''s broken a vase and a teapot,
    destroyed my couch by using it as a scratching post, and coughed up hairballs
    on my carpet.'
  - 'GEORDI: Yeah, well, I don''t think I''m ready for one. You can take her back,
    with my blessings.'
  - 'GEORDI: There, see? She needs training.'
  - 'GEORDI: Half the time I wasn''t sure if she was going to lick me or scratch my
    face off.'
