  organization_involvements:
  - organization_uuid: ger_organization_24006619a337
    description_of_involvement: '**USS Intrepid (Starfleet)** is the *absent but dominant*
      organizational force in this event, embodied by Commander Donald Kaplan and
      his engineering benchmarks. Though never physically present, the *Intrepid*
      looms over Geordi’s actions, serving as the implicit standard he feels compelled
      to surpass. The organization’s influence is felt through Geordi’s admissions
      (‘Their Chief Engineer is Commander Donald Kaplan... I kind of like to make
      sure our power conversion level is... a little higher than theirs’), which reveal
      the *Intrepid* as a symbol of institutional competition. Geordi’s rivalry with
      Kaplan is not just personal—it’s a microcosm of the broader Starfleet culture,
      where excellence is measured by quantifiable metrics and peer comparison. The
      *Intrepid*’s role here is to act as a *provocation*, forcing Geordi to confront
      the emotional cost of his ambition.'
