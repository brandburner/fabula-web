  scene_sequence: 1
  sequence_in_scene: 3
  key_dialogue:
  - |-
    GEORDI: I've got her now, Data... she's trapped.
    DATA: Who?
    GEORDI: Your demented cat.
  - |-
    GEORDI: She needs training.
    DATA: I have never found it to be necessary.
    GEORDI: Necessary? That cat is out of control.
  - |-
    GEORDI: Okay, we have to get her out from under there. I'll scare her—you grab her when she comes out.
    DATA: I do not think it would be wise to startle her—
    GEORDI: Now!
    [CRASH from the next room]
    GEORDI: Training. Definitely.
