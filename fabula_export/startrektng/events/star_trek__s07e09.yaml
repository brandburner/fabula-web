- fabula_uuid: cand_evt_scene_19cc172ea0f57f80_01
  global_id: null
  title: Federation imposes warp restrictions amid crisis
  description: 'In the Observation Lounge, Geordi La Forge and Rabal present alarming
    projections of subspace rifts expanding across the sector over the next forty
    years, demonstrating how warp drive destabilizes subspace. The crew reacts with
    concern as Picard announces Federation-wide warp restrictions—limiting all vessels
    to warp five except in emergencies. The decision sparks immediate debate: Worf
    warns the Klingons will comply but the Romulans won’t, Troi questions the Ferengi
    and Cardassians’ cooperation, and Beverly challenges the short-term solution.
    Rabal reveals Hekaras Two’s orbit is already destabilizing, forcing Picard to
    acknowledge Starfleet’s temporary weather control network as a stopgap. The mood
    is tense, with Picard privately grappling with the moral weight of restricting
    warp travel—a technology central to Federation progress. Geordi lingers afterward,
    offering cautious optimism, but Picard’s lingering doubt underscores the existential
    stakes of the crisis. The scene crystallizes the conflict between scientific urgency
    and bureaucratic caution, while exposing the crew’s divided loyalties and the
    Federation’s fragile unity in the face of an unprecedented threat.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e09
  scene_sequence: 29
  sequence_in_scene: 57
  key_dialogue:
  - 'GEORDI: Our scans have shown a lot of subspace instabilities all through the
    sector. If they''re exposed to enough warp energy, they might eventually create
    other rifts.'
  - 'PICARD: Until we can find a way to counteract the warp field effect, the Council
    feels our best course is to slow the damage as much as possible... Therefore,
    areas of space found susceptible to warp fields will be restricted to essential
    travel only... And effective immediately, all Federation vessels will be limited
    to a speed of warp five, except in cases of extreme emergency.'
  - 'PICARD: But now I can''t help but wonder if all the while I was really helping
    to destroy the very thing I hold dear.'
  - 'GEORDI: It''s not going to turn out that way, sir. We still have time to make
    it better.'
