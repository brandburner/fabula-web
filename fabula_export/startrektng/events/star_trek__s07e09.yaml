  object_involvements:
  - object_uuid: ger_object_fc11ce86103a
    description_of_involvement: The *Enterprise*’s red alert lights and klaxons blare
      throughout the ship, casting a crimson glow over the bridge and Engineering
      as the crew battles the subspace distortion wave. The urgent, pulsating lights
      and piercing alarms serve as a visceral reminder of the immediate threat, heightening
      the tension and demanding the crew’s full attention. The alarms cease only after
      Picard cancels the red alert, signaling the ship’s successful escape from the
      rift.
    status_before_event: Active—flashing red lights and blaring klaxons fill the bridge
      and Engineering, indicating a critical emergency.
    status_after_event: Deactivated—lights return to normal, and the klaxons fall
      silent as the red alert is canceled.
    global_id: ger_object_fc11ce86103a
  - object_uuid: ger_object_cebfa1da8ad1
    description_of_involvement: The *Enterprise*’s hull stress monitor displays critical
      readings as the ship is battered by the subspace distortion wave. Data and Geordi
      track the spikes in real-time, with hull stress reaching 120% above maximum—a
      level that threatens structural integrity. The monitor’s data is pivotal in
      guiding the crew’s escape maneuver, and its return to normal readings confirms
      the ship’s successful breakaway from the rift.
    status_before_event: Critical—hull stress readings spike to 120% above maximum,
      with a structural breach imminent.
    status_after_event: Stabilized—hull stress returns to normal as the *Enterprise*
      clears the rift.
    global_id: ger_object_cebfa1da8ad1
  - object_uuid: ger_object_760d2dd0fe99
    description_of_involvement: The subspace rift looms as a violent, unstable force
      threatening to tear the *Enterprise* apart. Its distortion waves wreak havoc
      on the ship’s systems, pushing hull stress to dangerous levels. Data’s scans
      confirm its tetryon emissions and structural threats, while Geordi and the crew
      work desperately to break free. The rift’s instability is both the antagonist
      of this moment and a catalyst for the broader narrative, as its existence forces
      the crew—and the Federation—to confront the risks of warp travel.
    status_before_event: Active and expanding—trapping the *Enterprise* in its grip,
      with hull stress readings spiking to 120% above maximum.
    status_after_event: The *Enterprise* breaks free, but the rift remains a looming
      threat, its implications for warp technology now undeniable.
    global_id: ger_object_760d2dd0fe99
