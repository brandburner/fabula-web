    - Via the quantifiable metrics of EPS conversion levels, which Geordi uses to
      measure his (and the *Enterprise*’s) worth.
    - By embodying the ‘flagship must be better’ ethos, which Geordi internalizes
      as a personal and professional duty.
    institutional_impact: The *Intrepid*’s influence highlights the tension between
      individual ambition and institutional accountability. While Geordi’s rivalry
      drives him to push the *Enterprise*’s systems, it also distracts him from mission-critical
      tasks, revealing the double-edged nature of competition in Starfleet.
    internal_dynamics: The *Intrepid*’s engineering team (led by Kaplan) operates
      under the same Starfleet protocols as the *Enterprise*, but their performance
      becomes a point of comparison that fuels Geordi’s insecurities. This dynamic
