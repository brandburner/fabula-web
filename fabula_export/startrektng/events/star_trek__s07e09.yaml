- fabula_uuid: cand_evt_scene_6496c0ea02c96f77_03
  global_id: null
  title: Enterprise Disabled by Verteron Pulse
  description: "\n  The *Enterprise* navigates a debris field near the Corridor, searching\
    \ for traces of the lost *Fleming*. Data detects an anomalous metallic object\
    \ emitting an unusual signal, which rapidly generates a verteron field. Picard\
    \ orders shields raised and the ship to reverse, but the verteron pulse strikes\
    \ before the crew can react. The bridge is bathed in an intense white light, accompanied\
    \ by a high-pitched sound, leaving the ship’s warp engines, shields, and subspace\
    \ systems offline—mirroring the damage suffered by the Ferengi vessel. As the\
    \ crew recovers, Data reports an unidentified vessel approaching, carrying two\
    \ lifeforms. Picard orders the vessel displayed on the viewscreen, revealing a\
    \ small alien craft facing the *Enterprise*. The scene shifts from scientific\
    \ investigation to immediate threat assessment, as the crew must now determine\
    \ whether this vessel is hostile, distressed, or something far more enigmatic.\
    \ The event serves as a critical turning point, escalating the stakes from a rescue\
    \ mission to a potential first-contact scenario under compromised conditions.\n\
    \  "
