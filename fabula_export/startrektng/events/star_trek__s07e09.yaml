    description_of_involvement: |2-

              Data's Science Officer's log is a narrative device that serves as both a record and a turning point. It functions as a bridge between the crew's scientific efforts and their impending need for action. The log's clinical tone contrasts sharply with the urgency of the situation, highlighting the disconnect between knowledge and power. By documenting their failure to find a solution, Data's log forces the crew to confront the reality that they must now act *despite* their lack of understanding, not because of it. The log is also a symbolic acknowledgment of Starfleet's protocols: even in crisis, documentation continues, reinforcing the institution's reliance on process.
    status_before_event: |2-

              The log is being recorded in real-time as Data speaks, capturing the crew's current state of knowledge. It is a work in progress, reflecting their ongoing analysis of the rift.
    status_after_event: |2-

              The log is now a permanent record of the crew's limitations, serving as both a warning and a call to action. It will be submitted to Starfleet, formalizing their admission of failure and setting the stage for higher-stakes decisions. The log's completion marks the end of the 'analysis phase' and the beginning of the 'action phase' of the crisis.
    global_id: ger_object_3b40fae97890
  - object_uuid: ger_object_760d2dd0fe99
    description_of_involvement: |2-

              The subspace rift is the silent antagonist of this moment, its existence looming over the scene like an unseen predator. Though not physically present in the lab, it is the subject of Data's log and the cause of the crew's desperation. The rift's 'unstoppable growth' is implied through Data's admission that sensor readings, while improved, offer no countermeasure. Its destabilizing effects are the unspoken threat hanging over the Enterprise crew, symbolized by the lab's flickering consoles and the ship's halted momentum in space. The rift's behavior—expanding with each warp activation—is the crux of the crisis, and Data's log marks the moment the crew realizes they are outmatched by a phenomenon they cannot control.
    status_before_event: |2-

              The rift is already active and expanding, trapping the *Fleming* and threatening the Hekaras system. Sensor readings confirm its tetryon emissions and structural threats, but no countermeasure exists. The Enterprise's attempts to stabilize it have failed, and the rift's instability is accelerating.
    status_after_event: |2-

              The rift remains unchanged in its physical state, but its narrative role shifts: it is no longer just a scientific puzzle but a looming deadline. The crew's understanding of it is now complete enough to confirm their helplessness, forcing them to consider drastic measures. The rift's presence is now a ticking clock, its destabilization a direct threat to the *Fleming* and the Enterprise's mission.
