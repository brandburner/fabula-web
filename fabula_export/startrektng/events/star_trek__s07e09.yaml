  title: Geordi demands Spot’s discipline
  description: Geordi’s quarters are in disarray—broken pottery, shredded furniture,
    and hairballs litter the space—when Data arrives to find Geordi cornered under
    the bed, attempting to trap Spot. Geordi’s frustration boils over as he catalogs
    the cat’s destructive behavior, revealing his exhaustion with the responsibility
    of caring for an untrained animal. Data, oblivious to the severity of the situation,
    calmly rationalizes Spot’s actions as typical feline behavior, prompting Geordi
    to demand training. Their exchange escalates when Geordi, ignoring Data’s warning,
    tries to scare Spot out from under the bed, only for the cat to bolt and cause
    further destruction. The scene underscores the clash between Geordi’s human emotional
    investment in order and Data’s detached, logical approach to problems, while also
    highlighting the tension between their shared living space and their differing
    priorities. The interruption by Riker’s mission briefing cuts the confrontation
    short, leaving the conflict unresolved but foreshadowing Geordi’s eventual decision
    to return Spot to Data.
