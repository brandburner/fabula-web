    description_of_involvement: 'The *Enterprise*’s transporter rooms are prepped
      for an emergency evacuation, their consoles lit up and crews standing by as
      Riker issues the order. They represent the crew’s last-ditch effort to save
      the *Fleming*’s crew, a plan that hinges on reaching transporter range before
      the rift expands. However, the *Fleming*’s warp drive activation cuts off that
      option, leaving the transporter rooms as empty symbols of a failed rescue. Their
      role is bittersweet: a reminder of what might have been, had the *Fleming*’s
      crew waited just a little longer. The rooms’ readiness contrasts sharply with
      the chaos unfolding on the bridge and in Engineering, their quiet hum a stark
      counterpoint to the alarms and shaking.'
