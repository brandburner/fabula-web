  object_involvements:
  - object_uuid: ger_object_30767ccc3f53
    description_of_involvement: "\n        The debris fields in the Hekaras Corridor\
      \ are revealed as the hiding place for Rabal and Serova’s verteron probes, their\
      \ disguise allowing them to evade detection until the *Enterprise* was crippled.\
      \ Riker exposes their tactic, framing it as a deliberate mining of the Corridor—a\
      \ violation of Starfleet’s trust and a threat to navigation. The debris fields\
      \ are not just a tactical element; they symbolize the scientists’ desperation\
      \ and the lengths to which they’ve gone to force Starfleet’s attention. Their\
      \ mention turns the debate from abstract theory to concrete deception, raising\
      \ the stakes of the confrontation.\n      "
    status_before_event: Scattered with verteron probes disguised as signal markers,
      posing a hazard to warp-driven ships in the Corridor.
    status_after_event: Picard demands their deactivation, and Rabal agrees to cooperate
      in disabling them, though their full removal remains uncertain.
    global_id: ger_object_30767ccc3f53
  - object_uuid: ger_object_67078353f29f
    description_of_involvement: "\n        The *Enterprise*’s field coils are the\
      \ direct victim of Rabal and Serova’s verteron probes, their overload requiring\
      \ 36 hours of repairs—until Serova offers to cut that time to 10 hours in exchange\
      \ for a review of their data. Geordi’s frustration with the damage is palpable,\
      \ as it forces the crew to negotiate with the very people who sabotaged them.\
      \ The coils become a symbol of the scientists’ leverage, their crippled state\
      \ a tangible consequence of the ideological clash. Picard’s priority is restoring\
      \ them, but the condition for doing so—reviewing the data—creates a fragile\
      \ alliance built on distrust. The coils’ repair is both a practical necessity\
      \ and a metaphor for the larger conflict: can Starfleet and the Hekaran scientists\
      \ find common ground, or will their differences doom them both?\n      "
    status_before_event: 'Overloaded by verteron pulses, rendering the *Enterprise*
      unable to engage warp drive; estimated repair time: 36 hours.'
    status_after_event: Serova’s offer to expedite repairs is accepted in exchange
      for a review of their data, reducing estimated repair time to 10 hours.
    global_id: ger_object_67078353f29f
  - object_uuid: ger_object_afddc7c2ef22
    description_of_involvement: "\n        Geordi cites the Federation Science Council’s\
      \ prior evaluation of Rabal and Serova’s research as evidence of its invalidity,\
      \ dismissing their claims out of hand. The evaluation is invoked as a bureaucratic\
      \ shield, representing Starfleet’s official stance on their work. Serova counters\
      \ that the evaluation was ‘preliminary and incomplete,’ framing it as a product\
      \ of institutional inertia rather than rigorous science. The document becomes\
      \ a battleground in the debate—Geordi uses it to discredit their claims, while\
      \ Serova uses it to justify their extreme measures. Its mention underscores\
      \ the tension between scientific rigor and the urgency of their warnings.\n\
      \      "
    status_before_event: Archived in Starfleet databases, cited as the definitive
      dismissal of Rabal and Serova’s warp-field theory.
    status_after_event: Picard agrees to submit their updated findings for reevaluation,
      but the Council’s prior rejection remains a point of contention.
    global_id: ger_object_afddc7c2ef22
  - object_uuid: ger_object_fd00a180545d
    description_of_involvement: "\n        Rabal and Serova’s research data is the\
      \ bargaining chip they use to negotiate with Picard. Serova offers to expedite\
      \ repairs to the *Enterprise*’s field coils in exchange for a review of their\
      \ findings, framing the data as the key to resolving the crisis. Geordi dismisses\
      \ it as discredited, but Picard acknowledges its potential significance, tasking\
      \ Data with analyzing it. The data is not physically shown in the scene, but\
      \ its presence looms large—it is the reason for the sabotage, the source of\
      \ the conflict, and the potential key to either validating their claims or discrediting\
      \ them entirely. Its review becomes the condition for their cooperation.\n \
      \     "
    status_before_event: Stored on Hekaran data pads or terminals, considered ‘incomplete’
      by the Federation Science Council but deemed urgent by Rabal and Serova.
    status_after_event: Data is tasked with reviewing it, and Picard agrees to submit
      it for reevaluation, though its validity remains unproven.
    global_id: ger_object_fd00a180545d
  - object_uuid: ger_object_01b9b06699a6
    description_of_involvement: "\n        The Security Guards’ holstered phasers\
      \ serve as a silent but potent reminder of the consequences of defiance. Their\
      \ presence flank Rabal and Serova, fingers resting near the grips, signals that\
