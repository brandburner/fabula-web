  global_id: null
  title: Picard confronts moral crisis over warp restrictions
  description: In the somber aftermath of presenting evidence of subspace instabilities,
    Picard delivers the Federation Council’s directive to restrict warp travel to
    essential use only and cap speeds at warp five. The crew reacts with concern—Worf
    warns of Klingon compliance but Romulan defiance, Troi questions non-Federation
    species’ cooperation, and Beverly challenges the short-term solution. Rabal reveals
    Hekaras Two’s climate is already destabilizing, while Riker notes their temporary
    reprieve. As the crew disperses, Picard lingers, visibly shaken, and confesses
    to Geordi his fear that warp drive—once a symbol of progress—may have been destroying
    the very fabric of space. Geordi counters with cautious optimism, grounding Picard’s
    despair in their shared responsibility to act. The exchange underscores the moral
    weight of command and the tension between scientific urgency and bureaucratic
    caution in a crisis where every decision carries existential stakes.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e09
  scene_sequence: 29
  sequence_in_scene: 58
  key_dialogue:
  - 'PICARD: Until we can find a way to counteract the warp field effect, the Council
    feels our best course is to slow the damage as much as possible... Therefore,
    areas of space found susceptible to warp fields will be restricted to essential
    travel only... And effective immediately, all Federation vessels will be limited
    to a speed of warp five, except in cases of extreme emergency.'
  - 'PICARD: But now I can''t help but wonder if all the while I was really helping
    to destroy the very thing I hold dear.'
  - 'GEORDI: It''s not going to turn out that way, sir. We still have time to make
    it better.'
