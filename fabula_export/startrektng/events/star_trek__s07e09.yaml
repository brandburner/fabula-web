  key_dialogue: &id025
  - 'PICARD: What''s the origin of this debris field?'
  - 'DATA: Unknown, sir. It does not appear on any Federation charts of the Corridor.'
  - 'PICARD: Could it be what''s left of the Fleming?'
  - 'DATA: It is a possibility. The debris consists primarily of duranium and poly-composite
    fragments which suggests it could be from a ship. Furthermore, the field contains
    sufficient mass to account for the Fleming.'
  - 'DATA: ((urgently)) I do not believe so... it is emitting an unusual signal...
    Sir, it is beginning to generate a verteron field.'
  - 'PICARD: Shields up! Full reverse, now!'
  - 'WORF: Warp engines are off-line... shields are down... all subspace systems are
    inoperative...'
  - 'RIKER: Just like the Ferengi ship.'
  - 'DATA: Captain, there is an unidentified vessel heading toward us... two life
    forms aboard...'
