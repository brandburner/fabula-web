              Starfleet's presence is felt in the lab through its protocols, institutional expectations, and the very act of Data recording his log. The log itself is a Starfleet-mandated record, reinforcing the organization's emphasis on documentation and chain of command. While Starfleet is not physically present, its influence is evident in Data's clinical delivery and the lab's focus on sensor readings—tools of the institution. The organization's goals of scientific rigor and crisis response are on full display, but the log's content reveals a critical flaw: Starfleet's reliance on data and procedure may not be enough to save the *Fleming* or the Hekaras system. This moment forces the crew to question whether Starfleet's methods are sufficient in the face of an unprecedented threat.
