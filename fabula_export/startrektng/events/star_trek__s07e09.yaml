  title: Prak accuses Federation of sabotage
  description: In the Enterprise's ready room, Daimon Prak escalates tensions by accusing
    the Federation of disabling his ship with a verteron pulse—a claim Picard dismisses
    as baseless, given Starfleet’s interest in maintaining the subspace corridor.
    The confrontation shifts when Riker reveals the disappearance of a Federation
    medical transport, prompting Prak to dangle access to his sensor logs in exchange
    for engineering assistance. The exchange exposes Prak’s opportunism and Picard’s
    strategic patience, while the missing transport introduces a critical inconsistency
    that forces the crew to question their assumptions about the subspace crisis.
    The scene functions as a turning point, where distrust and negotiation collide
    to reveal deeper stakes in the unfolding disaster.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e09
  scene_sequence: 9
  sequence_in_scene: 17
  key_dialogue:
  - 'PRAK: We detected what appeared to be a Federation signal buoy. When we approached
    it, it emitted a massive verteron pulse... our warp drive, our sensors, our communications
    systems were all disabled. We assumed we were the victims of a new Federation
    weapon.'
  - 'PICARD: Daimon Prak. The Federation established this Corridor to ensure a safe
    route through the sector. We have nothing to gain from mining it.'
  - 'RIKER: Whatever happened to your ship may not be an isolated incident. A Federation
    Medical transport was recently lost in the Corridor.'
  - 'PRAK: It''s possible that information was recorded in our sensor logs, Commander.
    Unfortunately, my entire crew is occupied with our repairs. I don’t know if there
    will be time to search our records.'
