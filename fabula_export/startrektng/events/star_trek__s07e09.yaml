- fabula_uuid: cand_evt_scene_cb950e58596afdd9_02
  global_id: null
  title: Fleming's warp drive triggers subspace disaster
  description: "\n  The *Enterprise* enters the subspace rift at warp, with Geordi\
    \ initiating a warp pulse from Engineering. As the ship accelerates, the warp\
    \ engines abruptly disengage, and the vessel begins shaking violently under increasing\
    \ hull stress. Data reports the ship is entering the rift, while Picard and the\
    \ bridge crew race to reach the stranded *Fleming* before its crew—desperate to\
    \ escape—attempts to activate their own warp drive. Worf detects power emissions\
    \ from the *Fleming*, confirming their intent, and despite Picard’s orders, the\
    \ *Fleming* initiates its warp drive, triggering a catastrophic subspace rift\
    \ expansion. A massive energy blast rocks the *Enterprise*, causing structural\
    \ damage and disabling its momentum. Data reveals the rift has grown by 2.3%,\
    \ trapping both ships. The *Fleming* is critically damaged, its life support failing,\
    \ while the *Enterprise* loses its chance to escape the rift. The event forces\
    \ a direct confrontation between the theoretical risks of warp travel and the\
    \ immediate, life-threatening consequences of subspace instability, escalating\
    \ the crisis and exposing the crew’s fractured response under pressure.\n  "
