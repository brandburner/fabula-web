  key_dialogue: &id017
  - 'PICARD: This is Captain Jean-Luc Picard of the Enterprise. Please explain your
    attack on my ship.'
  - 'PRAK: Our attack? We were defending ourselves. Do you deny that you are responsible
    for disabling my vessel?'
  - 'PICARD: Then I suppose we''ll be on our way... If you wish, I''ll relay your
    position to your government... in case you''re unable to complete repairs... and
    remain stranded here.'
  - 'PRAK: Perhaps it would be better to discuss the situation...'
