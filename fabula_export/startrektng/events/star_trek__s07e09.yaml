acts:
- fabula_uuid: act_18bbb8582b4fb3e0
  number: 1
  summary: The Enterprise begins its investigation into the disappearance of the medical
    transport Fleming within the Hekaras Corridor, a region of space known for its
    unique and hazardous tetryon fields. During a mission briefing, Data outlines
    the navigational challenges, while Geordi and Data work to enhance sensor efficiency.
    This task reveals Geordi's competitive nature, as he strives to achieve higher
    power conversion levels than a former Academy classmate, Commander Donald Kaplan
    of the USS Intrepid, highlighting his personal pride in the Enterprise's engineering
    prowess. The crew soon detects a disabled Ferengi vessel, which the Hekaran government
    previously identified as the only other ship to have passed through their system
    recently. Despite appearing completely inoperative, the Ferengi ship unexpectedly
    locks weapons and opens fire on the Enterprise, forcing Captain Picard to raise
    shields and return fire to disable their aggressor. This unprovoked attack introduces
    an immediate and perplexing conflict, setting a tense precedent for the mission.
  key_moments: []
  scene_numbers:
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
- fabula_uuid: act_4c4a00936aa6441b
  number: 2
  summary: After disabling the Ferengi weapons, the Enterprise establishes a communication
    link with Daimon Prak, who vehemently accuses the Federation of disabling his
    ship with a new, unprovoked weapon—a verteron pulse. Picard, seeking to understand
    the situation and locate the missing Fleming, offers engineering assistance to
    the Ferengi in exchange for access to their sensor logs, which might contain information
    about the lost transport. Meanwhile, Data continues his attempts to train Spot,
    showcasing a humorous, if largely unsuccessful, application of scientific principles
    to feline behavior. Geordi, driven by his rivalry, successfully boosts the Enterprise's
    power conversion levels, surpassing Kaplan's reported figures. The Enterprise
    then follows the Ferengi logs to the Fleming's last known position, near a previously
    unmapped debris field. As they approach, a metallic object emits a verteron field,
    disabling the Enterprise's warp drive and other critical systems, mirroring the
    Ferengi's experience. Two humanoid aliens, Rabal and Serova, then beam aboard,
    claiming that warp fields are causing dangerous reactions in subspace and threatening
    their home planet, Hekaras Two.
  key_moments: []
  scene_numbers:
