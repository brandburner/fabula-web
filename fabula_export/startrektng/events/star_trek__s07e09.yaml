  global_id: null
  title: Serova’s shield priority sparks ideological clash
  description: 'In the aftermath of the Enterprise’s forced shutdown, Serova restores
    the ship’s shields—prioritizing her own agenda over Geordi’s urgent need to recalibrate
    the warp core. Her dismissive attitude toward the crew’s operational needs ignites
    a heated exchange, where Geordi challenges her moral calculus: if warp drive is
    as dangerous as she claims, her actions risk lives now. Serova’s refusal to engage
    with his concerns exposes her ideological rigidity, while her abrupt departure
    leaves Rabal to defend her position. His subsequent revelation—that Hekaras Two
    would willingly abandon warp drive entirely—reveals the depth of their conviction
    and foreshadows the crew’s moral dilemma: how far should they go to prove a theory
    that could isolate an entire world? The scene underscores the tension between
    immediate survival and long-term safety, with Serova’s defiance fracturing trust
    just as the crew needs unity most.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e09
  scene_sequence: 16
  sequence_in_scene: 31
  key_dialogue:
  - |-
    SEROVA: There... shields have been restored. You'll be able to reengage your engines in approximately eight hours.
    GEORDI: ((irritated)) You know, even after we get the engines on-line, it's going to take a week to recalibrate them properly...
    SEROVA: I'm sorry you've been inconvenienced. But that's all it is—an inconvenience. Our concerns are far more important than the condition of your engines.
  - |-
    GEORDI: What if the Fleming had been transporting perishable supplies... or was on an emergency mission? Your little plan might have cost a lot of lives.
    SEROVA: That didn't happen, Commander. And saving lives is precisely what we're trying to do.
  - |-
    RABAL: Hekaras Two is the only inhabited world in this region. Without warp drive, you'd be completely isolated from the rest of the Federation. Are you really willing to take that step?
    GEORDI: Well, our Commander Data is no slouch. If there's anything there, he'll find it.
    RABAL: I hope so. Because once we persuade Starfleet to stop warp travel through the Corridor... we will have to convince our own people to give up warp drive completely.
