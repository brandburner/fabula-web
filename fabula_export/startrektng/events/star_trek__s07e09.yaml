  title: Geordi confronts Rabal over Serova’s legacy
  description: 'In the quiet, dimly lit solitude of *Ten Forward* after hours, Geordi
    La Forge seeks out Rabal, Serova’s grieving colleague, to offer condolences for
    her death. The exchange unfolds with heavy subtext: Geordi’s guilt over dismissing
    Serova’s research—his uncritical faith in warp drive now tainted by the subspace
    rift’s devastation—clashes with Rabal’s raw grief and reluctant acceptance of
    Serova’s recklessness. Rabal absolves Geordi of blame, instead attributing Serova’s
    actions to her impatience, a moment that forces Geordi to confront the existential
    threat to warp travel and his own professional identity. The scene underscores
    the human cost of scientific ambition and the fragility of trust within the *Enterprise*’s
    ranks, while Rabal’s resignation—‘we’re going to have to change’—hints at the
    paradigm shift looming over Starfleet’s future. The tension between tradition
    and survival hangs in the air, unresolved but inescapable.'
