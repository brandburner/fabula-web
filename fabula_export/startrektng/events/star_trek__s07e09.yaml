- fabula_uuid: cand_evt_scene_6c6c1b59782fce8a_01
  global_id: null
  title: Serova’s Fatal Warp Core Breach
  description: "\n  Serova, acting alone on the Hekaran ship, deliberately overloads\
    \ the warp core to create a subspace rift, defying direct orders from Rabal and\
    \ Starfleet protocol. Her final transmission—‘They wanted proof. I’m going to\
    \ give it to them’—reveals her radical conviction that warp drive destabilizes\
    \ subspace, a theory now violently validated. The explosion triggers a shockwave\
    \ that buffets the *Enterprise*, while the resulting rift—a terrifying, glowing\
    \ tear in space—traps the *Fleming* inside. Data confirms the rift’s existence,\
    \ linking it irrevocably to Serova’s experiment, while Rabal, stunned by her sacrifice,\
    \ struggles to process both her death and the ethical fallout of her actions.\
    \ Picard immediately shifts focus to rescuing the *Fleming*, but Geordi’s analysis\
    \ reveals warp travel into the rift is impossible, forcing the crew to confront\
    \ the urgent deadline of the *Fleming*’s failing shields (12 hours) and the broader\
    \ implications of Serova’s radical methods. The event escalates the conflict between\
    \ scientific urgency and Starfleet protocol, while the rift’s instability introduces\
    \ a ticking clock and a high-stakes rescue mission.\n  "
