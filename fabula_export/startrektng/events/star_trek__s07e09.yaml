    emotional_state: Focused intensity with a quiet urgency—his actions are driven
      by a deep sense of responsibility to save the ship and crew, but his exterior
      remains composed.
    goals:
    - Stabilize the *Enterprise*’s systems to prevent structural failure
    - Coordinate with Data to execute a precise escape maneuver from the subspace
      rift
    what_happened: Geordi La Forge stands at the Engineering console, his VISOR flickering
      as he rapidly adjusts EPS conduits to compensate for the subspace distortion
      wave’s destabilizing effects. His hands move with precision, his voice steady
      as he reports progress to Picard. The ship’s violent shaking tests his balance,
      but his focus remains unbroken as he works alongside Data to stabilize the *Enterprise*’s
      failing systems.
    observed_status: Geordi La Forge stands at the Engineering console, his VISOR
