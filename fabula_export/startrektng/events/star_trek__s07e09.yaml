      \ of their imminent deployment (‘ready for the Hekarans in another day’) serves\
      \ as a counterpoint to Picard’s moral crisis, grounding the discussion in tangible\
      \ action. The stabilizers represent the crew’s proactive efforts to address\
      \ the crisis, even if their solution is stopgap.\n      "
    status_before_event: Under construction or preparation in the Enterprise’s engineering
      bay, with deployment scheduled for the next day. Their existence is a point
