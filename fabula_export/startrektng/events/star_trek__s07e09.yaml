  object_involvements:
  - object_uuid: ger_object_98d5ce890bce
    description_of_involvement: The transporters are briefly referenced as having
      completed the evacuation of the *Fleming*’s crew before the escape attempt.
      Worf confirms that ‘the last of the crew has been beamed aboard,’ ensuring that
      the *Enterprise* can focus solely on its own survival. While not directly involved
      in the escape maneuver, the transporters’ role in the prior evacuation underscores
      the crew’s prioritization of rescue over self-preservation.
    status_before_event: Operational—transporters are used to beam the *Fleming*’s
      crew aboard the *Enterprise* before the escape attempt.
    status_after_event: Standby—transporters are no longer actively involved in the
      event, but their prior use ensures the crew’s focus can shift entirely to escaping
      the rift.
    global_id: ger_object_98d5ce890bce
  - object_uuid: ger_object_801d0461a979
    description_of_involvement: The deflector shield is the linchpin of Geordi’s escape
      plan. Phase-matched to the distortion wave’s electromagnetic variants, it allows
      the *Enterprise* to ‘surf’ the wave out of the rift. The first attempt fails
      due to a speed mismatch, but after adjusting to full impulse power, the shield
      successfully engages with the next wave, pulling the ship forward. The shield’s
      performance is critical to the crew’s survival, though it endures extreme stress
      during the maneuver.
    status_before_event: Primed for phase-matching—Geordi works frantically to align
      the shield’s frequency with the distortion wave’s EM variants, but the initial
      attempt fails.
    status_after_event: Functional but strained—the shield holds during the escape,
      but the ship’s structural integrity fields fail on Decks 10 through 16 due to
      the violent ride.
    global_id: ger_object_801d0461a979
  - object_uuid: ger_object_3c4b63401146
    description_of_involvement: The distortion waves are the antagonistic force driving
      the scene’s tension. Data reports their increasing intensity, and Geordi’s plan
      hinges on phase-matching the deflector shield to their electromagnetic variants.
      The waves’ unpredictable timing and violent impacts create a sense of urgency,
      forcing the crew to act quickly. The first wave fails to carry the *Enterprise*
      due to a speed mismatch, but the second wave—ridden at full impulse—successfully
      pulls the ship out of the rift, though not without causing catastrophic hull
      stress.
    status_before_event: Intensifying—distortion waves occur every 59 seconds, with
      increasing electromagnetic variance and destructive potential.
    status_after_event: Diminished in immediate threat—after the *Enterprise* escapes,
      the waves’ direct impact on the ship ceases, though their residual effects (hull
      stress, failing structural integrity fields) persist.
    global_id: ger_object_3c4b63401146
  - object_uuid: ger_object_8e933914358c
    description_of_involvement: The impulse reactor is a key factor in the *Enterprise*’s
      escape. After the first failed wave ride, Data suggests taking the ship to full
      impulse power to match the distortion wave’s speed. Picard orders the helm to
      engage full impulse, and the reactor drives the ship forward in a violent surge,
      allowing the deflector shield to finally catch the wave. The reactor’s power
      is critical to the maneuver’s success, though it also contributes to the ship’s
      structural stress during the escape.
    status_before_event: Operational but under strain—impulse power is at standard
      levels, but the ship’s systems are already taxed by the rift’s distortions.
    status_after_event: Severely taxed—full impulse power causes violent shaking and
      hull stress, but it enables the escape. The reactor holds firm, though backup
      systems are engaged to mitigate damage.
    global_id: ger_object_8e933914358c
