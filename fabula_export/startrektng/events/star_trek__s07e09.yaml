- fabula_uuid: cand_evt_scene_873daaf30b3a5d4d_02
  global_id: null
  title: Geordi’s pride derails sensor diagnostics
  description: "\n  In Engineering, Geordi La Forge obsessively tinkers with the EPS\
    \ conduit, not to address an immediate technical need but to outperform his Academy\
    \ rival, Commander Kaplan of the *Intrepid*. When Data interrupts to request sensor\
    \ diagnostics—a task directly tied to the subspace crisis—Geordi initially deflects,\
    \ insisting his EPS adjustments are 'not really' a problem. Data’s persistent\
    \ questioning exposes Geordi’s subconscious competition, revealing how personal\
    \ pride distracts him from mission-critical priorities. The moment culminates\
    \ in Geordi’s abrupt pivot to sensor work, but the exchange underscores his struggle\
    \ to balance professional rivalry with the crew’s urgent needs. The scene highlights\
    \ how even the *Enterprise*’s most disciplined engineers aren’t immune to ego,\
    \ and how Data’s analytical detachment serves as a corrective lens for Geordi’s\
    \ human flaws.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e09
  scene_sequence: 3
  sequence_in_scene: 8
  key_dialogue: &id005
  - |-
    DATA: Geordi, is there a problem with the engines?
    GEORDI: No, not really...
    DATA: Then why are you stabilizing the EPS conduit?
    GEORDI: I'm just trying to get a slightly higher power conversion level...
    DATA: That would not affect the engines in any way.
    GEORDI: I know. That's not the point.
  - |-
    DATA: Then... what is 'the point'?
    GEORDI: I just... want the best conversion level I can get.
    DATA: Why?
    GEORDI: It's the Intrepid. Their Chief Engineer is Commander Donald Kaplan. We went through the Academy together. And... I kind of like to make sure our power conversion level is... a little higher than theirs.
  - |-
    DATA: That does sound like a competitive position.
    GEORDI: It's more a matter of personal pride. I mean... these are my engines.
    DATA: But you are trying to outperform the Intrepid.
    GEORDI: Well... yeah.
