  - 11
  - 12
- fabula_uuid: act_b30edc94c3a0a9b2
  number: 3
  summary: 'Rabal and Serova present their radical theory to Picard and his senior
    staff, asserting that warp fields are creating dangerous subspace instabilities
    that threaten Hekaras Two with uninhabitable gravitational shifts. Geordi expresses
    skepticism, recalling that the Federation Science Council previously dismissed
    their preliminary research. Picard, while acknowledging the seriousness of their
    claims, condemns their aggressive methods of disabling ships. He agrees to review
    their updated research but issues a firm ultimatum: they must help restore the
    Enterprise''s systems and deactivate all remaining probes in the Corridor, or
    face imprisonment and charges. Rabal reluctantly agrees to cooperate, but Serova,
    deeply committed to her cause and frustrated by the prospect of further delays,
    abruptly exits the meeting. Shortly after, Serova steals her ship and intentionally
    overloads its warp core, creating a massive, glowing subspace rift in the Hekaras
    Corridor. This drastic act serves as undeniable proof of her theory, but at the
    cost of her own life and the creation of a terrifying cosmic anomaly.'
  key_moments: []
  scene_numbers:
  - 13
  - 14
  - 15
  - 16
  - 17
  - 18
- fabula_uuid: act_fa612c33a90dd0af
  number: 4
  summary: 'The Enterprise crew observes the immense and terrifying subspace rift,
    with Data confirming it is precisely what Rabal and Serova predicted, validating
    her dire warnings. The Fleming is located intact but now trapped within the rift,
    its shields estimated to fail within twelve hours. Geordi determines that entering
    the rift at warp speed is too dangerous, as it would accelerate the rift''s instability
    and cause it to expand further. Picard tasks Data, Geordi, and a grief-stricken
    Rabal with finding a viable rescue strategy. Data proposes a high-risk plan: initiating
    a brief, high-intensity warp pulse to coast into the rift, beam the Fleming crew
    aboard, and exit without further warp engine use. During preparations, Geordi
    reflects on his initial skepticism, realizing his personal attachment to warp
    drive and pride in its technology blinded him to Serova''s warnings. He later
    apologizes to Rabal for his lack of belief and for Serova''s death. As the Enterprise
    executes Data''s plan and enters the rift, the Fleming unexpectedly activates
    its own warp drive, causing the rift to expand further and trapping the Enterprise,
    making escape impossible with their current momentum.'
  key_moments: []
  scene_numbers:
  - 19
  - 20
  - 21
  - 22
  - 23
  - 24
- fabula_uuid: act_f58b3110e8a4bd36
  number: 5
  summary: 'Trapped within the expanding subspace rift, the Enterprise is battered
    by increasingly intense distortion waves, pushing its hull stress to critical
    levels. With conventional escape methods deemed too dangerous, Geordi proposes
    a desperate, unconventional plan: phase-matching the deflector shields to the
    EM variants of a distortion wave, effectively allowing the ship to ''surf'' out
    of the rift. The first attempt to ride a wave fails due to a speed differential,
    exacerbating hull damage. Data suggests increasing the ship''s speed to full impulse
    to lessen the impact of the next wave. With the Fleming crew safely beamed aboard,
    Picard authorizes a second, even riskier attempt. The Enterprise, at full impulse,
    successfully catches and rides a distortion wave, violently breaking free of the
    rift and returning to normal space, narrowly averting disaster. In the aftermath,
    the Federation Council issues new directives, restricting warp travel in susceptible
    areas and limiting warp speed to warp five in warp-sensitive sectors to prevent
    further damage. Picard and Geordi reflect on the profound implications of these
    events, acknowledging that their approach to space exploration must fundamentally
    change, marking a significant shift in Starfleet''s philosophy.'
