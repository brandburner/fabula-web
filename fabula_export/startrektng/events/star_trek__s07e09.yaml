  title: Rabal reveals Hekaran existential stakes
  description: In a tense post-confrontation exchange in Engineering, Rabal—Serova’s
    brother and a former skeptic—defends her radical stance against warp drive by
    recounting his own intellectual transformation. He reveals that Hekaras Two’s
    survival now hinges on abandoning warp travel entirely, framing the conflict as
    an existential choice between scientific progress and cultural isolation. Geordi’s
    skepticism wavers as Rabal’s emotional appeal and the weight of Hekaran sacrifice
    force him to confront the moral implications of Starfleet’s potential restrictions.
    The exchange escalates the stakes from a technical dispute to a civilizational
    crisis, with Rabal’s ultimatum—‘if you were in my position, I hope you’d be willing
    to do the same’—serving as a turning point that demands Geordi (and by extension,
    the crew) reckon with the consequences of their decisions on an entire civilization’s
    future. The moment crystallizes the tension between Federation priorities and
    Hekaran survival, setting up the crew’s moral dilemma in the larger arc.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e09
  scene_sequence: 16
  sequence_in_scene: 33
  key_dialogue:
  - 'RABAL: Commander... I know my sister can be somewhat -- aggravating...'
  - 'GEORDI: I''d have to agree with that...'
  - 'RABAL: But please try to understand... she believes profoundly in this cause.
    She has sworn to dedicate her life to exposing the dangers of warp drive.'
  - 'GEORDI: Warp drive has been around for three centuries. It''s a proven technology...'
  - 'RABAL: You sound like I did... about four years ago...'
  - 'GEORDI: You mean you didn''t believe her, either?'
  - 'RABAL: No. What I didn''t realize... was how brilliant my sister is. It took
    two years of study for me even to grasp the principles behind her theoretical
    models... they''re that sophisticated.'
  - 'GEORDI: Well, our Commander Data is no slouch. If there''s anything there, he''ll
    find it.'
  - 'RABAL: I hope so. Because once we persuade Starfleet to stop warp travel through
    the Corridor... we will have to convince our own people to give up warp drive
    completely.'
  - 'GEORDI: Hekaras Two is the only inhabited world in this region. Without warp
    drive, you''d be completely isolated from the rest of the Federation. Are you
    really willing to take that step?'
