  scene_sequence: 27
  sequence_in_scene: 52
  key_dialogue: &id043
  - 'RIKER: "Data, what if we forced an EPS discharge through the impulse reactor...
    would that be enough to blast us out of here?"'
  - 'DATA: "I do not believe so, sir... and the resulting explosion would most likely
    destroy the saucer section in the process..."'
  - 'GEORDI: "When''s the last time you went surfing, Commander?"'
  - 'RIKER: "A couple of months ago, on Risa... I nearly killed myself on the break
    at Kattala beach."'
  - 'GEORDI: "Feel like catching another wave?"'
  - 'PICARD: "All right, Mister La Forge. Get us out of here."'
  - 'DATA: "We were unable to maintain contact with the distortion wave, sir... we
    are still within the rift."'
  - 'RIKER: "Our hull stress is already critical... we can''t handle many more jolts
    like that one..."'
