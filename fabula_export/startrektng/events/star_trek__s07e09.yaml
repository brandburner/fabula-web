  title: Protesters Confront Geordi in Engineering
  description: In the immediate aftermath of the subspace rift crisis, Geordi La Forge
    is interrupted during a critical warp core assessment when Rabal and Serova—Hekaran
    scientists with radical claims about warp drive technology—storm Engineering.
    Their sudden appearance escalates tensions as they directly accuse the *Enterprise*
    of causing harm through its warp drive, forcing Geordi into a defensive stance.
    The confrontation is abrupt and confrontational, with Serova’s blunt accusation
    ('You are killing us') serving as both a thematic provocation and a narrative
    escalation. The arrival of Security guards with phasers drawn underscores the
    urgency and volatility of the situation, while Geordi’s stunned reaction highlights
    the crew’s unpreparedness for this direct challenge to their mission. The scene
    functions as a turning point, shifting the narrative from technical crisis management
    to ethical and diplomatic conflict, and sets up Picard’s subsequent confrontation
    with the protesters. The subtext—Geordi’s professional pride clashing with the
    protesters’ moral urgency—drives the scene’s emotional core, while the visual
    framing of the inactive warp core as a backdrop reinforces the stakes of their
    claims.
