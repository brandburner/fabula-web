- fabula_uuid: cand_evt_scene_002cc4ac0c70b9f3_02
  global_id: null
  title: Geordi confronts his blind faith in warp
  description: 'In the quiet of Engineering, Geordi La Forge—still processing Serova’s
    subspace destabilization theory—collapses into a crisis of professional identity.
    While reviewing warp field saturation calculations with Data, Geordi’s frustration
    boils over as he realizes he and the crew missed the critical connection between
    warp drive and the subspace rift. His self-examination reveals a deeper resistance:
    warp technology, his lifelong passion, may be fundamentally destructive. The moment
    forces him to confront his own stubbornness, the ethical cost of unchecked innovation,
    and the personal threat Serova’s theories posed to his worldview. His exit to
    seek Rabal signals a turning point—Geordi is no longer just an engineer defending
    his work, but a man reckoning with the consequences of his beliefs. The scene
    pivots from technical problem-solving to moral reckoning, setting up his eventual
    reconciliation with the Hekaras crisis and his role in its resolution.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e09
  scene_sequence: 23
  sequence_in_scene: 46
  key_dialogue:
  - 'GEORDI: How did we miss it? How did we miss the connection—between warp drive
    and the formation of the rift?'
  - 'GEORDI: I''ve always looked at this warp core as something... beautiful... It
