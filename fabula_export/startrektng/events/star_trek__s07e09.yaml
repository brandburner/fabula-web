- fabula_uuid: cand_evt_scene_eaac9a103b038a46_01
  global_id: null
  title: Geordi outmaneuvers Kaplan’s record
  description: In Engineering, Geordi La Forge and Data collaborate to push the *Enterprise*’s
    EPS system beyond standard limits, achieving a 97.2% power conversion efficiency—a
    marginal but psychologically significant victory over Commander Kaplan’s boasted
    97.1% record for the *Intrepid*. The moment is framed as a competitive triumph
    for Geordi, whose frustration with Kaplan’s taunting ("Maybe you should try cleaning
    your plasma grid once in a while") fuels his determination. Data, ever analytical,
    questions the practicality of the effort ("This procedure could only boost the
    conversion level by -- point-eight percent"), but Geordi’s emotional investment
    in proving his engineering prowess drives the scene. The victory is fleeting;
    as Picard’s log entry (heard in voiceover) shifts focus to the *Fleming*’s potential
    destruction, the triumphant grin on Geordi’s face fades into the larger crisis
    at hand. The event serves as a microcosm of Geordi’s professional pride and the
    *Enterprise*’s engineering superiority, while subtly reinforcing the tension between
    personal ambition and the looming subspace threat. The debris field looming outside
    Engineering underscores the fragility of their success, transitioning the narrative
    from internal crew dynamics to the mission’s existential stakes.
