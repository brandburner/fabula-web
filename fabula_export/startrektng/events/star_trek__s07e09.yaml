  - object_uuid: ger_object_70521b0f165e
    description_of_involvement: 'The *Fleming*’s life support systems are the first
      casualty of the subspace explosion. Data’s scans confirm their failure as power
      cascades through the ship’s decks, exposing the crew to vacuum breaches and
      atmospheric loss. The systems’ collapse is a death knell for the *Fleming*’s
      crew, their fate now tied to the *Enterprise*’s ability to reach them before
      it’s too late. The life support’s failure is a brutal reminder of the rift’s
      lethality: it doesn’t just trap ships, it kills their crews. Its role in the
      event is a grim metric of the disaster’s scale, a ticking clock for the *Fleming*’s
      survival.'
    status_before_event: Functional but strained, running on backup power after the
      initial rift trap. The systems are fragile but holding, giving the crew a slim
      chance of survival.
    status_after_event: Completely failed, their power grids overloaded by the subspace
      explosion. The *Fleming*’s crew is now suffocating in the void, their air supply
      gone.
