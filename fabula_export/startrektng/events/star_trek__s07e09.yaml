      forcing Geordi into a more intimate, focused space. The tube’s utilitarian design
      (‘emergency lights flicker,’ ‘electrical hums’) underscores the urgency of the
      sensor work, while its echoing acoustics amplify the weight of Geordi’s silence
      as he confronts his distraction.
    status_before_event: Accessible and empty, awaiting Geordi and Data’s entry for
