    description_of_involvement: 'Starfleet is the invisible hand guiding—and constraining—the
      *Enterprise*’s actions in this event. The organization’s protocols dictate the
      crew’s response to the subspace rift, from the initial warp pulse maneuver to
      the failed attempt to communicate with the *Fleming*. Starfleet’s emphasis on
      rescue and exploration clashes with the harsh reality of subspace instability,
      forcing the crew to confront the limits of their training and technology. The
      organization’s influence is felt in the crew’s hesitation (e.g., Picard’s reluctance
      to risk the *Enterprise* without clear data) and their desperation (e.g., Riker’s
      grim acceptance that they may not make it in time). Starfleet’s role is a double-edged
      sword: it provides the crew with the tools and training to attempt the rescue,
      but it also binds them to protocols that may not be sufficient for the crisis
      at hand.'
