- fabula_uuid: cand_evt_scene_873daaf30b3a5d4d_01
  global_id: null
  title: Geordi Admits Rivalry with Kaplan
  description: 'In Engineering, Geordi La Forge is deeply focused on tweaking the
    EPS conduit, ignoring Data’s initial request to check sensor efficiency. When
    Data presses him on the unnecessary EPS adjustments, Geordi reluctantly admits
    his motivation: outdoing Commander Kaplan of the *Intrepid*, a fellow Academy
    graduate. He frames it as ''personal pride'' rather than competition, but Data’s
    logical probing exposes the subtext—Geordi’s unspoken drive to prove the *Enterprise*’s
    superiority, revealing an underlying professional insecurity. The exchange ends
    with Geordi’s frustration over the unchanged conversion levels, marking a shift
    from personal ambition to practical problem-solving as they move to address the
    sensor diagnostics. This moment underscores Geordi’s duality: his technical brilliance
    and his human need for validation, while also foreshadowing how his rivalry might
    later influence his problem-solving under pressure during the subspace crisis.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e09
  scene_sequence: 3
  sequence_in_scene: 7
  key_dialogue: &id003
  - |-
    DATA: Geordi, is there a problem with the engines?
    GEORDI: No, not really...
    DATA: Then why are you stabilizing the EPS conduit?
    GEORDI: I'm just trying to get a slightly higher power conversion level...
    DATA: That would not affect the engines in any way.
    GEORDI: I know. That's not the point.
  - |-
    DATA: Then... what is 'the point'?
    GEORDI: It's the Intrepid. Their Chief Engineer is Commander Donald Kaplan. We went through the Academy together. And... I kind of like to make sure our power conversion level is... a little higher than theirs.
    DATA: I understand. You are in competition with Mister Kaplan.
    GEORDI: No, it's not really a competition... This is the flagship. It just seems to me -- we should be better than the rest.
  - |-
    DATA: That does sound like a competitive position.
    GEORDI: It's more a matter of personal pride. I mean... these are my engines.
