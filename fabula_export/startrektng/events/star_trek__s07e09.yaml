- fabula_uuid: cand_evt_scene_6496c0ea02c96f77_02
  global_id: null
  title: Enterprise struck by verteron pulse
  description: |2

    The *Enterprise* investigates a debris field near the Corridor, suspecting it may contain remnants of the missing *Fleming*. As Data detects an anomalous metallic object emitting a verteron field, Picard orders evasive action—but the crew reacts too late. A blinding white pulse disables warp drive, shields, and all subspace systems, plunging the bridge into dim emergency lighting. Worf confirms the damage mirrors the Ferengi vessel’s earlier report, while Data reveals an unidentified vessel approaching with two lifeforms aboard. The attack forces the *Enterprise* into a vulnerable state, directly threatening their ability to respond to the subspace rift crisis or rescue the *Fleming*. The event escalates the stakes by stripping the crew of their primary tools—warp capability and subspace communications—while introducing an immediate, unknown threat. Picard’s command decisions under pressure are tested as the ship’s core functionality collapses, mirroring the Ferengi’s earlier plight and reinforcing the narrative’s central tension: warp drive’s destabilizing effects on subspace.
