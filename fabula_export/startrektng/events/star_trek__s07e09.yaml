      levels, which Geordi cites as his motivation for tweaking the *Enterprise*’s
      systems.
    power_dynamics: Exerting indirect pressure on Geordi (and by extension, the *Enterprise*
      crew) through the culture of competition. The *Intrepid*’s benchmarks are not
      imposed by force, but internalized by Geordi as a standard he must meet—or exceed.
