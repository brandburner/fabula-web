    description_of_involvement: Geordi’s **engineering EPS console** is the battleground
      where his pride and Data’s logic collide. He hunches over it, fingers darting
      across panels as he chases marginal power gains, his frustration growing with
      each unchanged reading. The console’s screens—holding steady at low conversion
      levels—become a visual representation of his failure, forcing him to confront
      the disconnect between his efforts and their results. When Data presses him,
      Geordi’s interaction with the console shifts from defiant tweaking to resigned
      acceptance, marking his transition from personal ambition to mission focus.
      The console’s role here is to amplify the stakes of his internal conflict, making
      tangible the cost of his rivalry with Kaplan.
    status_before_event: Active, displaying unchanged EPS conversion levels despite
      Geordi’s adjustments.
