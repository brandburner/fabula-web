- fabula_uuid: cand_evt_scene_6496c0ea02c96f77_01
  global_id: null
  title: Verteron anomaly cripples the Enterprise
  description: "\n  The Enterprise investigates a debris field suspected to contain\
    \ the missing *Fleming*, with Picard and Data analyzing sensor data to determine\
    \ its origin. Data detects an anomalous metallic object emitting a verteron field—a\
    \ discovery that triggers an immediate crisis. Picard orders evasive action, but\
    \ the verteron pulse strikes before the ship can react, disabling warp drive,\
    \ shields, and subspace systems. The bridge is plunged into partial darkness,\
    \ and Worf confirms the Enterprise is now crippled, mirroring the damage suffered\
    \ by the Ferengi vessel. The event escalates the subspace rift crisis, forcing\
    \ the crew to confront a direct threat to their mission and survival. Data’s subsequent\
    \ detection of an unidentified vessel adds urgency, suggesting the anomaly may\
    \ be part of a larger, coordinated attack or sabotage.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e09
