    global_id: ger_object_6eae851a9e8e
  - object_uuid: ger_object_cc443c6d0820
    description_of_involvement: 'Geordi’s **Multi-Phase Buffers** are not directly
      interacted with in this event, but their *implied presence* looms as a symbol
      of the *Enterprise*’s technical capabilities—and Geordi’s pride in them. The
