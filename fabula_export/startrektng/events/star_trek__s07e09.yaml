- fabula_uuid: cand_evt_scene_34d19c1c48ea6151_01
  global_id: null
  title: Riker and Geordi clash over escape plan
  description: With the *Enterprise* trapped in a destabilizing subspace rift and
    distortion waves intensifying, Riker proposes a risky EPS discharge to force their
    escape, but Data rejects it due to the catastrophic potential. Geordi counters
    with a daring plan to 'surf' a distortion wave using the deflector shield, leveraging
    Riker’s surfing expertise. The tension between Riker’s boldness and Data’s caution
    exposes the crew’s fractured crisis management under Picard’s command. The first
    attempt fails, forcing a desperate second try with full impulse power, which finally
    pulls the ship free—but not without severe structural damage. The exchange reveals
    Riker’s tactical instinct, Geordi’s engineering ingenuity, and Data’s analytical
    precision, while underscoring the crew’s reliance on improvisation in Picard’s
    absence. The scene also highlights the escalating stakes of the subspace rift,
    where theoretical risks of warp travel collide with immediate survival needs.
