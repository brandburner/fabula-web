  title: Geordi’s pride derails sensor diagnostics
  description: "\n  In Engineering, Geordi La Forge obsessively tinkers with the EPS\
    \ conduit, not to address an immediate technical need but to outperform his Academy\
    \ rival, Commander Kaplan of the *Intrepid*. When Data interrupts to request sensor\
    \ diagnostics—a task directly tied to the subspace crisis—Geordi initially deflects,\
    \ insisting his EPS adjustments are 'not really' a problem. Data’s persistent\
    \ questioning exposes Geordi’s subconscious competition, revealing how personal\
    \ pride distracts him from mission-critical priorities. The moment culminates\
    \ in Geordi’s abrupt pivot to sensor work, but the exchange underscores his struggle\
    \ to balance professional rivalry with the crew’s urgent needs. The scene highlights\
    \ how even the *Enterprise*’s most disciplined engineers aren’t immune to ego,\
    \ and how Data’s analytical detachment serves as a corrective lens for Geordi’s\
    \ human flaws.\n  "
