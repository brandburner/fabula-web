  global_id: null
  title: Geordi confronts warp travel’s existential crisis
  description: 'In the quiet solitude of *Ten Forward*, Geordi La Forge seeks out
    Rabal, the grieving Hekaran scientist whose sister Serova sacrificed herself to
    prove the dangers of warp drive. Geordi offers condolences, carrying the weight
    of his own professional skepticism toward Serova’s research—a skepticism that
    now feels like complicity. Rabal, though mourning, absolves Geordi of blame, attributing
    Serova’s recklessness to her impatience rather than Geordi’s dismissal. The conversation
    shifts to the existential threat now facing Starfleet: the potential obsolescence
    of warp drive, the cornerstone of interstellar travel. Geordi grapples with the
    implications—his career, his identity as an engineer, and the future of exploration—while
    Rabal delivers a stark truth: space travel can never be the same. The exchange
    underscores the tension between tradition and survival, forcing Geordi to question
    whether innovation or sacrifice will define the path forward. This moment is a
    turning point, where personal regret collides with systemic change, setting the
    stage for the crew’s high-stakes decisions in the subspace rift crisis.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e09
  scene_sequence: 24
  sequence_in_scene: 48
  key_dialogue:
  - 'RABAL: Commander.'
  - 'GEORDI: May I join you?'
  - 'RABAL: Thank you. I''m trying to tell myself that she died for what she believed
    in... but somehow that''s not much comfort.'
  - 'GEORDI: I wish things could''ve happened differently. I should have taken a closer
    look at your research... it''s possible there was something I missed...'
  - 'RABAL: No. You didn''t miss anything. The problem was time. It would''ve taken
    time to do the proper research... and Serova wasn''t willing to wait.'
  - 'GEORDI: I guess the question now is... where do we go from here?'
  - 'RABAL: I don''t think we can look at space travel the same way anymore... we''re
    going to have to change.'
  - 'GEORDI: I''ve been in Starfleet for a long time. We depend on warp drive... I
    don''t know how easy it''ll be to change.'
  - 'RABAL: It won''t be easy at all.'
