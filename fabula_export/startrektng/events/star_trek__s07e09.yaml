  key_dialogue: &id011
  - 'WORF: We are within visual range, sir.'
  - 'PICARD: On screen.'
  - 'GEORDI: Captain, there are no emissions from their plasma vents. Their warp drive
    must be completely inactive.'
  - 'DATA: That is correct, sir. Their impulse systems appear to be down as well...
    power generation is at extremely low levels.'
  - 'PICARD: What about life signs?'
  - 'DATA: Life support is also functioning, at low levels. There are approximately
    four-hundred fifty Ferengi on board. That is a standard complement for a vessel
    of this class.'
  - 'GEORDI: Sir, the Ferengi sensors are still functioning. I could modify one of
    our deflector emitters to transmit old-style delta waves... if I modulate that
    with a com signal, the Ferengi should be able to pick it up.'
  - 'PICARD: Make it so.'
  - 'RIKER: Well, if they did hijack the Fleming, they certainly didn''t get very
    far with the cargo.'
  - 'WORF: (urgently) They are locking weapons!'
  - 'PICARD: (quickly) Raise shields -'
