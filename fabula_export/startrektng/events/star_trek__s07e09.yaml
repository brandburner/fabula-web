  title: Subspace rift confirmed and rescue deadline revealed
  description: The Enterprise crew witnesses Serova’s fatal warp core breach, which
    spawns a destabilizing subspace rift—validating her theory about warp drive risks.
    Data confirms the rift’s existence and that the *Fleming* is trapped inside, its
    shields projected to fail within 12 hours. Picard orders Geordi, Data, and Rabal
    to devise an alternative rescue plan, as warp travel is deemed too dangerous.
    The crew’s urgency escalates as they grapple with the rift’s instability and the
    ethical implications of Serova’s sacrifice, while Rabal struggles with grief and
    guilt over his sister’s actions. The scene shifts from shock to strategic problem-solving,
    with Picard’s leadership and the team’s technical expertise now critical to saving
    the *Fleming* crew before time runs out.
