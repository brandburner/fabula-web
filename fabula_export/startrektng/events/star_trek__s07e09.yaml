    percent.'
  - 'GEORDI: That''s all right... it might be enough.'
  - 'DATA: Enough?'
  - 'GEORDI: Commander Kaplan just sent me this on subspace. ((Data reads PADD)) La
    Forge. I''ve got Intrepid''s power conversion level up to ninety-seven-point-one
    percent. Maybe you should try cleaning your plasma grid once in a while.'
  - 'GEORDI: Can you believe the nerve of this guy... ?'
  - 'GEORDI: ((to computer)) Computer, what is the current power conversion level?'
  - 'COMPUTER VOICE: Power conversion level is ninety-seven-point-two percent.'
