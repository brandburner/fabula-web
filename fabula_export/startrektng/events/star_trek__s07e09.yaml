  global_id: null
  title: Picard confronts Rabal and Serova’s deception
  description: "\n  In the Observation Lounge, Picard directly challenges Rabal and\
    \ Serova’s claims that warp fields destabilize subspace, exposing their use of\
    \ disguised probes to disable ships. Geordi dismisses their research as discredited,\
    \ while Riker condemns their deception. Serova counters by offering to expedite\
    \ repairs in exchange for a review of their findings, creating a tense standoff.\
    \ Picard, though willing to listen, makes clear that their cooperation is mandatory—either\
    \ they assist in restoring the *Enterprise*’s systems and deactivating their probes,\
    \ or they will face charges. Rabal reluctantly agrees, but Serova remains defiant,\
    \ revealing the ideological and ethical divide between the crew and the scientists.\
    \ The confrontation sets up a fragile alliance, with Picard assigning Geordi and\
    \ Data to oversee the terms, while also raising stakes around the Hekaras crisis\
    \ and the crew’s trust in the scientists’ motives.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e09
  scene_sequence: 15
  sequence_in_scene: 29
  key_dialogue:
  - 'PICARD: You''ve made a very serious accusation. I want you to explain it.'
  - 'SEROVA: Neither you nor the Ferengi suffered any casualties, Commander. The actual
    damage to your vessels was negligible.'
  - 'RIKER: You can call it whatever you like. The fact remains that you deliberately
    disguised your probes. You hid them in debris fields... You mined the Corridor.'
  - 'PICARD: Because of the seriousness of your claims, I''m willing to listen to
    your case. But make no mistake. Our priority here is the recovery of the *Fleming*.
    I expect you to help us restore our systems and deactivate all your remaining
    probes in the Corridor... If you do not, I will put you both in the brig and take
    you to the nearest Starbase where you''ll face charges for what you''ve done.'
