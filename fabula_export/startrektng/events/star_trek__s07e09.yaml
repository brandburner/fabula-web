    subspace instability within the Corridor... They believe that if these regions
    continue to be exposed to warp field energy, they will rupture—subspace will extrude
    into normal space, forming a rift.'
  - 'SEROVA: That''s your response? More research? More delays? I suppose I shouldn''t
    have expected anything different.'
  - 'PICARD: I''d like you all to put together a research proposal for the Science
    Council. I''ll give it my full recommendation.'
  - 'SEROVA: Not ''we.'' You can do whatever you want, Rabal. I''ll have no part of
    this. It''s just another delay.'
