      Serova rejects this path outright, viewing it as ‘another delay’—her frustration
      with the Council reflects a broader critique of Starfleet’s *slowness and indifference*
      to immediate threats. The Council’s involvement here is *passive but pivotal*:
      it is the reason Serova storms out, symbolizing her break from institutional
      trust.'
