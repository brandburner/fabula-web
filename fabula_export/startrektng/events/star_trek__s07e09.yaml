  object_involvements:
  - object_uuid: ger_object_98d5ce890bce
    description_of_involvement: The *Enterprise*'s transporters are used to evacuate
      the crew of the *Fleming* before the escape attempt. Once the *Fleming* crew
      is safely aboard, the transporters stand by in case of further emergencies,
      though they are not directly involved in the escape maneuver itself. Their role
      underscores the crew's priority to save lives before attempting the risky escape
      plan.
    status_before_event: Active and operational, used to beam the *Fleming* crew aboard
      the *Enterprise*.
    status_after_event: Standing by but unused during the escape attempt, as the focus
      shifts to the deflector shield and impulse engines.
    global_id: ger_object_98d5ce890bce
  - object_uuid: ger_object_801d0461a979
    description_of_involvement: The deflector shield is the key to Geordi's 'surfing'
      plan, as it is phase-matched to the EM variants of the distortion wave. The
      first attempt fails due to the speed differential, but the second attempt at
      full impulse power successfully engages the shield, allowing the *Enterprise*
      to ride the wave and escape the rift. The shield's performance reflects the
      crew's ingenuity and the high stakes of their situation.
    status_before_event: Operational but not yet phase-matched to the distortion wave.
    status_after_event: Successfully phase-matched and engaged, pulling the *Enterprise*
      free from the rift but sustaining damage in the process.
    global_id: ger_object_801d0461a979
  - object_uuid: ger_object_3c4b63401146
    description_of_involvement: The distortion waves are the antagonistic force in
      this event, intensifying every 59 seconds and threatening the *Enterprise*'s
      structural integrity. Geordi's plan to 'surf' one of these waves using the deflector
      shield is the crew's only viable escape strategy. The waves' unpredictable nature
      and electromagnetic properties make them both a threat and a potential means
      of escape, highlighting the crew's ingenuity in turning danger into opportunity.
    status_before_event: Intensifying rapidly, with the next wave due to impact in
      26 seconds.
    status_after_event: The *Enterprise* successfully rides one of the waves out of
      the rift, though the ship sustains significant structural damage in the process.
    global_id: ger_object_3c4b63401146
  - object_uuid: ger_object_95e6aa7ebae0
    description_of_involvement: Geordi's bridge engineering consoles are the interface
      through which he phases the deflector shield and monitors the escape attempt.
      The consoles provide real-time data on the distortion waves, shield status,
      and structural integrity, allowing Geordi to make critical adjustments during
      the maneuver. Their role is central to the crew's ability to execute the escape
      plan and survive the rift.
    status_before_event: Active and displaying real-time data on the distortion waves
      and ship status.
    status_after_event: Still operational but showing signs of strain from the escape
      maneuver.
    global_id: ger_object_95e6aa7ebae0
  - object_uuid: ger_object_8e933914358c
    description_of_involvement: The impulse reactor is proposed by Riker as a means
      to blast the *Enterprise* free from the rift, but Data rejects the idea due
      to the high risk of destroying the saucer section. Instead, the reactor is later
      used to take the ship to full impulse power, which lessens the shock when the
      distortion wave hits. This maneuver is critical to the ship's successful escape,
      though it places immense strain on the hull and structural integrity fields.
    status_before_event: Operational but not yet engaged at full power.
    status_after_event: Engaged at full impulse power, contributing to the ship's
      escape but causing significant structural stress.
    global_id: ger_object_8e933914358c
