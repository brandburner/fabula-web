  global_id: null
  title: Picard reveals survival to Riker
  description: In a tense, clandestine confrontation aboard the mercenary ship, Picard—operating
    undercover as 'Galen'—reveals his survival to Riker, who has been hunting his
    presumed killers. Picard explains his capture by the mercenaries, his infiltration
    of their crew, and his covert investigation into the theft of Romulan artifacts.
    He tasks Riker with infiltrating Baran’s inner circle by exploiting the mercenary’s
    distrust of Starfleet, while secretly orchestrating the ship’s engine failure
    to advance their shared objective. The moment pivots Riker’s vengeance into a
    calculated mission, reshaping the power dynamics between the two men. The scene
    ends abruptly when Baran enters, forcing Picard to violently maintain his cover
    by assaulting Riker, underscoring the high stakes of their deception and the brutal
    consequences of failure in this hostile environment.
