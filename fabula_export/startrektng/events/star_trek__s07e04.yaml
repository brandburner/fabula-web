      weapon in this event, initially ordered by Baran to fire a full barrage against
      the outpost. Picard intervenes, reconfiguring the array to emit a phase-resonant
      pulse—a non-lethal tactic to disable the shields without causing destruction.
      When the shields reactivate mid-transport, Baran demands the array be used for
      a full barrage, forcing Picard to comply. The array’s dual role as both a tool
      for precision and an instrument of destruction underscores the moral ambiguity
      of the mercenaries’ mission and Picard’s internal conflict.
    status_before_event: Charged and ready for a full barrage, under the control of
      an N.D. mercenary at the weapons console. The array is a standard ship-mounted
      energy weapon, capable of both targeted strikes and widespread destruction.
    status_after_event: Fired a phase-resonant pulse (successfully disabling the shields)
      and later a full barrage (after the shields reactivated), leaving the outpost
      vulnerable to attack. The array remains operational but is now a symbol of the
      mercenaries’ escalating violence.
    global_id: ger_object_c379b65e996f
  - object_uuid: ger_object_d8e19806a789
    description_of_involvement: The mercenary bridge communications console is used
      by Riker to attempt a bluff, contacting Lieutenant Sanders on the outpost and
      demanding that the shields be lowered. His transmission is abruptly cut off
      by Baran, leaving the outpost unaware of the impending attack. The console serves
      as a failed last-ditch effort to avert violence, highlighting the mercenaries’
      disregard for diplomacy and Riker’s constrained role as an undercover operative.
      Its use in this event exposes the power imbalance between the mercenaries and
      the outpost, as well as the ethical dilemmas faced by Riker and Picard.
    status_before_event: Active and linked to the outpost’s communications system,
      allowing Riker to establish contact with Lieutenant Sanders.
    status_after_event: Severed by Baran, leaving the outpost isolated and vulnerable.
      The console remains operational but is now a symbol of the mercenaries’ hostility
      and Riker’s inability to intervene.
    global_id: ger_object_d8e19806a789
  - object_uuid: ger_object_a2e49f7f0ad3
    description_of_involvement: The phase-resonant pulse is Picard’s technical solution
      to disable the outpost’s shields without causing civilian casualties. He configures
      the disruptor array to emit this precise energy pulse, targeting the shield
      generator at a frequency that knocks it offline with a single shot. The pulse
      succeeds, temporarily lowering the shields and allowing Tallera to begin transporting
      the Romulan artifacts. However, the outpost’s shields reactivate mid-transport,
      rendering the pulse ineffective in the long term and forcing Picard to comply
      with Baran’s demand for a full barrage. The pulse represents Picard’s moral
      pragmatism—using technology to minimize harm while still operating within the
      constraints of his undercover role.
    status_before_event: A theoretical tactic in Picard’s mind, untested but grounded
      in his technical expertise and knowledge of Starfleet shield technology.
    status_after_event: Successfully deployed, disabling the shields for a critical
      window but ultimately failing to prevent the outpost’s destruction. The pulse’s
      temporary success highlights the fragility of Picard’s moral compromises in
      this high-stakes environment.
    global_id: ger_object_a2e49f7f0ad3
  - object_uuid: ger_object_83218c8258b0
    description_of_involvement: The two Romulan artifacts are the primary objective
      of the mercenaries’ mission. After Tallera scans and locks onto their coordinates,
      they are successfully transported to the mercenary ship’s transporter pad. However,
      the outpost’s shields reactivate mid-transport, causing the beam to abort and
      leaving the artifacts’ fate uncertain. Their retrieval is critical to the mercenaries’
      success, and their temporary acquisition—followed by the failed transport—heightens
      the tension and stakes of the event. The artifacts serve as a tangible representation
      of the mercenaries’ goals and the moral cost of their actions.
    status_before_event: Located in small structures on the outpost’s surface, undisturbed
      and awaiting retrieval.
    status_after_event: Partially transported to the mercenary ship but lost when
      the transporter lock is shattered. Their status is unresolved, adding to the
      mercenaries’ frustration and the outpost’s peril.
    global_id: ger_object_83218c8258b0
  - object_uuid: ger_object_5adf5cef6f26
    description_of_involvement: Tallera’s transporter console is critical to the mercenaries’
      mission, as it is used to lock onto and retrieve the Romulan artifacts from
      the outpost. After Picard disables the shields with the phase-resonant pulse,
      Tallera initiates the transport sequence, successfully beaming the artifacts
      onto the transporter pad. However, the outpost’s shields reactivate mid-transport,
      shattering the transporter lock and aborting the beam. This failure triggers
      Baran’s rage and the subsequent demand for a full disruptor barrage. The console’s
      role in the event underscores the mercenaries’ reliance on technology and the
      precarious nature of their mission—one misstep can unravel their carefully laid
      plans.
    status_before_event: Active and operational, scanning for the artifacts’ coordinates
