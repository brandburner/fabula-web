  title: Enterprise shifts to defensive action
  description: "\n  After the away team regains communications, Geordi reports Riker's\
    \ capture and a casualty, while Worf identifies the mercenaries' likely escape\
    \ route via a nearby vessel. On the bridge, Data processes this intel and detects\
