  title: Data overrides Worf on shields
  description: On the *Enterprise* bridge, the crew grapples with Riker’s inexplicable
    betrayal—his attempt to disable the ship’s shields using outdated access codes.
    Worf, alarmed by the vulnerability this creates, protests Data’s order to lower
    the shields, arguing it would leave the ship defenseless. Data, however, remains
    resolute, trusting Riker’s unspoken motives despite the apparent illogic of the
    situation. The tension escalates as Worf reluctantly complies, exposing the crew’s
    fractured cohesion under Picard’s absence and Data’s untested leadership. The
    moment hinges on Data’s ability to read subtext and prioritize mission integrity
    over surface-level conflict, forcing Worf to confront his own rigid adherence
    to protocol in a crisis where trust—not tactics—is the deciding factor.
