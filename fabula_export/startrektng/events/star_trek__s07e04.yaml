  - object_uuid: ger_object_ca94402276be
    description_of_involvement: The alarm klaxons on the mercenary ship’s bridge blare
      continuously during the engine malfunction, their relentless wail signaling
      the critical plasma pressure buildup and the imminent threat of a warp core
      breach. The alarms create a sense of urgency and chaos, driving the crew to
      act quickly to stabilize the ship. Their sound underscores the high-stakes nature
      of the crisis and the fragility of the mercenaries’ situation, as well as the
      crew’s reliance on Riker’s technical expertise to survive.
    status_before_event: Silent until the antimatter flow regulator locks open, triggering
