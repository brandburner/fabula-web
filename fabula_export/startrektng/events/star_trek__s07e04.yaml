    description_of_involvement: Baran’s neural servo is a patch-like device attached
      to Riker’s neck, used to inflict precise pain as a means of interrogation and
      control. During this event, Baran activates the device to punish Riker for his
      defiance, demonstrating the crew’s brutal methods of enforcement. The neural
