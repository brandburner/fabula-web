- fabula_uuid: cand_evt_scene_3648ee01e080c59e_01
  global_id: null
  title: Riker Proposes Shield Sabotage Gambit
  description: 'Under Baran’s watchful gaze, Riker—still reeling from his forced betrayal
    of the *Enterprise*—shifts tactics to regain control of the situation. He cuts
    off a tense transmission with Data, where he’d just ordered the ship to retreat,
    and pivots to Baran with a calculated lie: he claims he can use his command codes
    to lower the *Enterprise*’s shields, a move that would expose the ship to attack.
    Baran, suspicious but desperate, orders Riker to proceed. Riker moves to a console,
    his fingers flying over the controls as he feigns compliance. The moment is a
    high-stakes gamble—Riker is betting that Baran’s distrust of Starfleet will override
    his skepticism, forcing the mercenary to either accept the risk or reveal his
    own vulnerability. The scene tests Riker’s ability to manipulate his adversary
    while maintaining the illusion of loyalty to both sides, deepening the tension
    between his undercover role and his Starfleet instincts. The stakes are clear:
    if Baran suspects deception, Riker’s life—and the mission—are forfeit. If he succeeds,
    he buys time for Picard’s plan to unfold, but at the cost of further damaging
    his crew’s trust in him.'
