  - organization_uuid: ger_organization_d835461b7967
    description_of_involvement: Tallera’s mercenaries are represented in this event
      through Baran’s authoritarian presence and the brutal tools of control he wields,
      such as the neural servo. Their organization is a loose but tightly controlled
      group of outlaws, united by profit and the thrill of raiding archaeological
      sites for valuable artifacts. Baran’s sudden entrance and violent assertion
      of authority serve as a reminder of the mercenaries’ power dynamics and the
      consequences of defying their leader. The organization’s influence is felt through
      the fear it instills in its members and the strategic use of pain and intimidation
      to maintain discipline. Their goals in this event are to protect their operations
      from outsiders and to ensure that no one—including Picard—acts without Baran’s
      permission.
    active_representation: Through Baran’s physical presence and the use of the neural
      servo to enforce his authority, as well as the implied threat of the mercenary
      crew’s collective brutality.
    power_dynamics: Exercising authority over individuals through fear, pain, and
      intimidation. Baran’s power is absolute on the ship, and his actions in this
      event reinforce his control over the crew and the consequences of disobedience.
    organizational_goals:
    - Maintain absolute control over the ship and its crew through fear and punishment
