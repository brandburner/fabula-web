  title: Riker’s Team Discovers Romulan Artifacts
  description: "\n  The away team—Riker, Geordi, Worf, and two security officers—lands\
    \ on Barradas Three to investigate the planet’s ruins, which bear strange, circular\
    \ indentations in the ground. Geordi’s tricorder readings are disrupted by unlocalized\
    \ interference, and he notes micro-crystalline damage matching the pattern found\
    \ in the Dessica Two bar, linking the site to Picard’s disappearance. Worf discovers\
    \ two Romulan artifacts lying in the grass, seemingly abandoned. Before Riker\
    \ can examine them, the team is ambushed by three mercenaries—Tallera, Vekor,\
    \ and Narik—who open fire, killing one security officer and forcing the team into\
    \ cover. Tallera seizes the artifacts, escalating the conflict and revealing the\
    \ mercenaries’ direct involvement in the conspiracy surrounding Picard’s fate\
    \ and the stolen Romulan technology. The ambush forces Riker’s team into a defensive\
    \ position, cutting off communication with the *Enterprise* and leaving them vulnerable.\n\
    \  "
