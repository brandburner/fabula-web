  title: Riker exploits Yranac’s warrants for Barradas lead
  description: 'Cornered in his quarters, Yranac initially deflects Riker’s questions
    about the mercenaries with feigned ignorance and a demand for a shuttlecraft as
    payment. Riker, recognizing Yranac’s greed and evasion, shifts tactics by threatening
    to extradite him to the Klingon Empire for outstanding fraud warrants—a punishment
    Yranac fears far more than Federation imprisonment. The power dynamic collapses
    as Yranac, now desperate, reveals the mercenaries’ likely destination: the Barradas
    system. Riker immediately acts on the intel, ordering the *Enterprise* to set
    course, while Yranac is left broken and powerless. The scene underscores Riker’s
    ruthless pragmatism and Yranac’s self-serving cowardice, advancing the plot toward
    Picard’s trail while exposing the mercenaries’ next move.'
