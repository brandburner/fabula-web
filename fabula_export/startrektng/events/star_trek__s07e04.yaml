    organizational_goals:
    - Retrieve the Romulan artifacts from the outpost at any cost, prioritizing the
      mission over the lives of Federation personnel.
    - Maintain crew cohesion and operational efficiency, even in the face of Baran’s
      volatile leadership and the external threat posed by the outpost’s defenses.
    influence_mechanisms:
    - Baran’s authoritarian control, enforced through the neural servo device, which
      ensures compliance and suppresses dissent.
    - The crew’s technical expertise (e.g., Tallera’s scanning and transporting skills,
      Narik’s engineering knowledge), which is critical to the mission’s success.
    - The mercenaries’ shared self-interest, as they rely on each other for survival
