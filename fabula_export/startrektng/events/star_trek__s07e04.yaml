  title: Riker proves tactical competence under fire
  description: "\n  After being captured and subjected to Baran’s neural servo torture,\
    \ Riker is thrust into a crisis when the mercenary ship’s warp core destabilizes.\
    \ Baran, initially dismissive of Riker’s value, reluctantly allows him to intervene\
    \ after Picard—posing as the mercenary 'Galen'—suggests killing Riker outright.\
    \ Riker, recognizing Picard’s covert manipulation, seizes the opportunity to demonstrate\
    \ his technical expertise. He collaborates with Narik to stabilize the core, his\
    \ decisive actions saving the ship and earning Baran’s grudging respect. The moment\
    \ marks a turning point: Baran’s perception of Riker shifts from liability to\
    \ potential asset, while Picard’s hidden agenda deepens the tension between the\
    \ two men. The scene underscores Riker’s adaptability and tactical brilliance,\
    \ contrasting with Baran’s ruthless pragmatism and Picard’s calculated deception.\
    \ The crew’s fractured loyalty is further exposed as Vekor and Narik challenge\
    \ Baran’s authority, revealing the mercenaries’ internal divisions. Riker’s survival\
    \ hinges on his ability to outmaneuver both Baran’s brutality and Picard’s cryptic\
    \ directives, setting the stage for his eventual infiltration of the mercenary\
    \ ranks.\n  "
