  title: Riker captured, Enterprise under attack
  description: "\n  The away team—Geordi, Worf, and N.D. #2—regains communications\
    \ just as they reach the site where Riker was ambushed and abducted by mercenaries.\
    \ Geordi reports the attack and Riker’s capture to Data, while Worf demands sensor\
    \ scans for the mercenaries’ escape route. On the *Enterprise*, Giusti detects\
    \ an unidentified vessel powering weapons and departing orbit, confirming the\
    \ mercenaries’ retreat. Data’s immediate response—raising shields and declaring\
    \ red alert—signals the crew’s shift from investigation to active defense, as\
    \ the dual threats of Riker’s abduction and the armed vessel force the *Enterprise*\
    \ into a high-stakes confrontation. The scene escalates tension by linking Riker’s\
    \ vulnerability to the broader Romulan conspiracy, while Data’s decisive command\
    \ underscores the crew’s transition from grief to combat readiness.\n  "
