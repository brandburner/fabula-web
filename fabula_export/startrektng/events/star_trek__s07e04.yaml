  title: Enterprise’s failed attack exposes mercenary defenses
  description: With Riker still missing and presumed aboard the mercenary vessel,
    Data orders a targeted strike on their aft deflector—only for the attack to fail,
    revealing the ship’s advanced hull shielding. Giusti’s sensor scan confirms the
    Enterprise’s inability to penetrate the mercenaries’ defenses, forcing Data to
    abandon tactical maneuvering and escalate to a direct hail. The failed strike
    underscores the mercenaries’ technological superiority and the crew’s growing
    desperation, while Data’s measured but firm demand for surrender marks a critical
    shift from covert operations to open confrontation. The scene heightens tension
    by exposing the Enterprise’s vulnerability and the mercenaries’ advantage, setting
    the stage for Riker’s forced surrender and Picard’s covert intervention.
