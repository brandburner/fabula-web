  title: Baran orders full disruptor barrage
  description: After Lieutenant Sanders refuses Riker’s demand to lower the outpost’s
    shields, Baran—convinced the Federation has been warned—escalates the conflict
    by ordering a full disruptor barrage against the outpost. Picard, posing as Galen,
    intervenes, proposing a phase-resonant pulse to disable the shields instead of
    outright destruction. His plan succeeds, temporarily lowering the shields and
    allowing Tallera to begin transporting the Romulan artifacts. However, when the
    outpost’s shields reactivate mid-transport, Baran’s patience evaporates. He demands
    a full barrage, forcing Picard to comply while the ship is suddenly struck by
    an external attack, heightening the tension and urgency of the confrontation.
    The scene marks a critical shift from tactical maneuvering to all-out warfare,
    raising the stakes for both the mercenaries and the Federation outpost’s survival.
