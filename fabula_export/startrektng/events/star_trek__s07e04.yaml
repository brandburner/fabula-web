  object_involvements:
  - object_uuid: ger_object_518325857253
    description_of_involvement: 'Baran’s control device is the *invisible sword* hanging
      over the scene. Though never seen, its presence is invoked by Tallera as a *threat*—‘Baran
      can kill you in an instant if he activates his control device.’ The device embodies
      the crew’s fear and Baran’s absolute authority, making Picard’s defiance all
      the more dangerous. Its absence in the scene *heightens* the tension: the audience
      (and Picard) knows it exists, but its potential activation looms like a guillotine.
      Picard’s challenge to Baran’s leadership—‘He wouldn’t be captain for five minutes
      if he didn’t have the control device’—directly confronts this power dynamic,
      turning the object into a *symbol of the crew’s oppression*.'
    status_before_event: Clipped to Baran’s belt (off-screen), fully functional and
