  key_dialogue:
  - |-
    BARAN: What were you doing on Barradas Three -- Commander?
    RIKER: We were studying the ruins. It was a scientific expedition.
    BARAN: Don't patronize me. Those ruins have been studied for centuries. There's nothing new to learn from them.
    RIKER: Then what were you doing there?
  - |-
    PICARD: If he has nothing to give us, then we should kill him now and be done with it. Everyone seems to recognize that fact except you.
    BARAN: I don't need a consensus to run this ship, Galen.
  - |-
    RIKER: Let me do it.
    BARAN: Go!
    RIKER: If you want to make sure that doesn't happen again, you'd better re-initialize the regulator subprocessors. A full diagnostic on the intermix chamber wouldn't hurt either.
    BARAN: ((to Narik and Vekor)) Do it.
