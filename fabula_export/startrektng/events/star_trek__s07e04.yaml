- fabula_uuid: cand_evt_scene_2dbef482541ee5de_02
  global_id: null
  title: Data Orders Return to Barradas Three
  description: "\n  After the Enterprise fails to lock onto the fleeing mercenary\
    \ ship—despite its initial pursuit at warp nine—the bridge crew realizes the vessel\
    \ has vanished from sensors due to advanced stealth technology. Data, now acting\
    \ as temporary first officer, methodically dismisses alternative tracking strategies\
    \ (sensor remodulation, shuttlecraft pursuit) as ineffective, instead prioritizing\
    \ a forensic investigation of the archaeological site on Barradas Three. His decision\
    \ shifts the crew’s focus from direct confrontation to methodical deduction, raising\
    \ the stakes for uncovering the conspiracy tied to Picard’s disappearance. The\
    \ moment underscores Data’s analytical precision and the mission’s escalating\
    \ urgency, while also highlighting the crew’s frustration at the mercenaries’\
    \ evasion. The return to Barradas Three becomes the only remaining lead, forcing\
    \ the team to adapt their approach from pursuit to investigative deduction.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e04
  scene_sequence: 12
  sequence_in_scene: 21
  key_dialogue: &id011
  - 'DATA: Damage report.'
  - 'GIUSTI: Minor hit on the port deflector... no damage. They''re running, sir...
    their speed is warp eight-point-seven and holding. I think they''re at their maximum.'
  - 'DATA: Take us to warp nine and pursue. Lock phasers on target.'
  - 'GIUSTI: Aye, sir... we should be within phaser range in twenty-three seconds.'
  - 'GIUSTI: Switching to long-range scanners... (off console, concerned) Commander...
    the sensor image of that ship is extremely weak... it''s fading...'
  - 'GIUSTI: The ship doesn''t register on the long range sensors. I''m sorry, sir...
    we''ve lost them.'
  - 'DATA: Plot a course and take us back to Barradas Three. Notify the Away Team
    to be ready for transport.'
