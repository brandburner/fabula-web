  title: Picard proposes Riker as tactical alternative
  description: 'On the mercenary bridge, Picard strategically undermines Baran’s assault
    plan by exposing the risks of a direct attack on Calder Two’s Starfleet-defended
    outpost. Leveraging his fabricated past as a smuggler, he warns of Starfleet’s
    defenses—phaser banks, photon torpedoes, and jamming vulnerabilities—while subtly
    planting doubt among the crew. When Baran dismisses the threats, Picard pivots
    to exploit the mercenaries’ fear of casualties, proposing Riker’s Starfleet credentials
    as a nonviolent infiltration tactic. Tallera and Narik’s skepticism erodes Baran’s
    authority, forcing him to concede. The scene hinges on Picard’s dual agenda: protecting
    the outpost while maintaining his cover, and it reveals the mercenaries’ desperation
    (and Baran’s hidden employer) as a critical vulnerability. The shift from brute-force
    assault to deception marks a turning point in the crew’s cohesion and Baran’s
    control, while Riker’s impending role as a pawn deepens the moral stakes of Picard’s
    deception.'
