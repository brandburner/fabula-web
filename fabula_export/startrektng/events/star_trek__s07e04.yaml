  title: Yranac reveals Picard’s vaporization
  description: In a tense confrontation at a frontier bar, Riker and his team—disguised
    as civilians—coerce Yranac, a nervous informant, into revealing the fate of Picard.
    After Beverly’s forensic scan confirms Starfleet fiber traces and distorted human
    cellular debris at the scene, Yranac admits Picard was vaporized by a high-energy
    weapon during an ambush. The revelation triggers a visceral reaction in Yranac,
    who now recognizes the team’s lethal capabilities and the gravity of their mission.
    Riker’s relentless interrogation, combined with Beverly’s clinical confirmation,
    deepens the conspiracy around Picard’s disappearance and escalates the stakes
    for the crew’s investigation. The scene pivots from physical intimidation to psychological
    leverage, exposing the ruthlessness of those involved and the high cost of uncovering
    the truth.
