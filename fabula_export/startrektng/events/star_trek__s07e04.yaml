  global_id: null
  title: Data orders shields lowered despite Riker’s betrayal
  description: On the *Enterprise* bridge, the crew grapples with Riker’s inexplicable
    actions—his use of outdated command codes to disable the ship’s shields, an act
    that should be impossible after his capture. Data, assuming temporary command,
    deduces that Riker’s behavior is deliberate rather than coerced, despite the lack
    of logical explanation. Worf protests vehemently, warning of the ship’s vulnerability,
    but Data overrides him with a calculated order to drop the shields. The moment
    tests the crew’s trust in Riker’s unspoken motives and Data’s ability to prioritize
    mission integrity over immediate security. Troi’s empathic assessment fails to
    detect coercion, deepening the mystery of Riker’s true intentions and the broader
    Romulan conspiracy. The scene underscores the crew’s fractured cohesion under
    Picard’s absence and the high-stakes gamble of trusting Riker’s deceptive strategy.
