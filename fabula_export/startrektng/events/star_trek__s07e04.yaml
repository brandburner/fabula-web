- fabula_uuid: cand_evt_scene_810e5fac5cc3920c_01
  global_id: null
  title: Enterprise Loses Contact with Away Team
  description: "\n  The bridge crew of the *Enterprise*—led by Data in Riker’s absence—receives\
    \ a frantic, garbled distress call from Geordi La Forge, who reports the away\
    \ team is under attack. The transmission cuts off abruptly, replaced by static,\
    \ as Romulan jamming disrupts all communications. Data immediately orders a transporter\
    \ lock to extract the team, but the interference is too severe, leaving the crew\
    \ powerless to intervene. The failure to establish contact or effect a rescue\
    \ escalates the tension, deepening the mystery of Picard’s fate and the away team’s\
    \ vulnerability. The scene underscores the crew’s helplessness and the escalating\
    \ stakes of the mission, as the bridge crew is forced to confront their inability\
    \ to protect their colleagues on the surface.\n  "
