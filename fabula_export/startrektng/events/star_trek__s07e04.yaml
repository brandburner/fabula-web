  title: Riker Orders Enterprise Retreat Under Duress
  description: 'Riker, appearing on the *Enterprise*’s viewscreen under Baran’s coercion,
    delivers a direct order to Data to withdraw the ship—a command that contradicts
    Starfleet protocol and Data’s duty-bound programming. The order fractures trust
    among the bridge crew, forcing Data to confront an impossible ethical dilemma:
    obey a superior’s order or uphold Starfleet’s principles. Worf and Data exchange
    a tense, unspoken look, signaling their shared confusion and suspicion. The moment
    escalates the mission’s stakes, as Riker’s apparent betrayal risks exposing the
    *Enterprise* to attack while Picard’s fate remains uncertain. The scene hinges
    on Riker’s calculated gamble to manipulate Baran’s distrust of Starfleet, testing
    the limits of his crew’s loyalty and the android’s moral framework.'
