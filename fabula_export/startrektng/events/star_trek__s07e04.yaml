  title: Picard proposes Riker’s infiltration plan
  description: 'On the mercenary bridge, Picard—posing as ''Galen''—exploits his Starfleet
    knowledge to undermine Baran’s reckless assault on the Calder Two outpost, warning
    of its Starfleet defenses and the risk of civilian casualties. When Baran dismisses
    the threat, Picard pivots to a high-risk deception: using Riker’s Starfleet identity
    to infiltrate the outpost undetected. He argues that Riker’s loyalty to Starfleet
    will force him to cooperate to prevent bloodshed, while Tallera and Vekor’s skepticism
    forces Baran to reluctantly approve the plan. The exchange reveals Picard’s strategic
    mind, Tallera’s pragmatic caution, and Baran’s desperation, while escalating the
    tension between the mercenaries’ ruthlessness and Riker’s impending moral dilemma.
    The scene also hints at deeper Romulan involvement, as Baran’s refusal to disclose
    their employer underscores the mission’s hidden stakes. Picard’s proposal not
    only shifts the mercenaries’ tactics but also sets up Riker’s forced complicity
    in a deception that could destroy his reputation—or worse, his life.'
