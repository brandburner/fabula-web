  title: Riker forced to surrender under duress
  description: 'On the mercenary bridge, Data’s hail demanding surrender triggers
    Baran’s paranoia, who immediately accuses Riker of betrayal. With no evidence,
    Baran resorts to psychological coercion, threatening Riker with a pain control
    device set to kill. Forced in front of the viewscreen, Riker is compelled to order
    the *Enterprise* to disengage—a command that fractures his moral resolve and escalates
    the mission’s stakes, as Picard’s fate remains unknown. The moment exposes Riker’s
    vulnerability under duress and forces Data to confront an impossible ethical dilemma:
    obey a superior’s order or uphold Starfleet’s principles. The mercenaries’ technological
    advantage is further emphasized, while the crew’s desperation to reclaim the stolen
    Romulan artifacts (and Picard) reaches a breaking point.'
