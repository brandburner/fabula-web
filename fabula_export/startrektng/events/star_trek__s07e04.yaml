  key_dialogue: &id017
  - |-
    TALLERA: Baran wants to see the analysis of the last lot. He thinks you're moving a little slowly.
    PICARD: Tell Baran if he wants the analysis done faster, he can do it himself. If he wants it done correctly, he can wait.
  - |-
    PICARD: I don’t like operating in the dark. If I knew what the point of this mission were... why I'm scanning these relics... TALLERA: If Baran felt it were wise to let the crew know that, I'm sure he would have.
    PICARD: Do you know what this is all about?
    TALLERA: What Baran knows, I know...
  - |-
    PICARD: He wouldn’t be captain for five minutes if he didn’t have the control device. The crew follows him because they have no choice. Baran’s power is based only on fear and intimidation.
    TALLERA: That almost sounds like a prelude to mutiny... PICARD: If someone were to challenge Baran—the crew would follow.
    TALLERA: I was right. You do like living dangerously...
