  key_dialogue:
  - |-
    DATA: Barradas Three is the only M-class planet in this system, and it is listed as unpopulated. However, sensors have detected intermittent energy signals emanating from its surface.
    RIKER: What's the source?
    GEORDI: The signals are difficult to localize, but... they might be emissions from some kind of power converter...
    WORF: Which could indicate a base or a ship.
  - |-
    DATA: As Acting First Officer, I must question your decision to accompany the Away Team. If Captain Picard were here -
    RIKER: ((tightly)) He's not.
    DATA: I realize that, sir. But if he were, and he wanted to lead an Away Team, you would tell him that the Captain's place is -
    RIKER: On the Bridge. I know. But not this time.
  - 'RIKER: Mister Worf, I want a security detail to accompany the Away Team to the
    surface. I''ll lead the team. Geordi, you''re with me... Mister Data, you have
    the Bridge.'
