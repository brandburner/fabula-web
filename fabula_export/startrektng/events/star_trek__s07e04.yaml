      fingers flying across the controls as she tracks the mercenary ship’s fading
      sensor signature. She reports the ship’s speed, the weakening signal, and ultimately
      its disappearance with growing frustration, her voice tightening as she admits
      failure. Physically, she leans forward in her seat, her posture rigid with concentration,
      her eyes darting between consoles as she attempts futile adjustments to reacquire
      the target.
