- fabula_uuid: cand_evt_scene_d52cc6d19317a7f2_04
  global_id: null
  title: Picard sabotages ship to test Riker
  description: "\n  Picard, disguised as the mercenary *Galen*, deliberately triggers\
    \ a warp core malfunction on Baran’s ship to force Riker into a high-stakes leadership\
    \ test. After Baran’s crew debates executing Riker, Picard—with cold detachment—publicly\
    \ undermines Riker’s reputation by fabricating a history of insubordination, planting\
    \ seeds of distrust in Baran. When the ship’s engines destabilize, Picard subtly\
    \ cues Riker to fix the crisis, revealing his true intent: to prove Riker’s competence\
    \ under pressure while simultaneously isolating him from Baran’s crew. The exchange\
    \ exposes Picard’s strategic manipulation of both factions, deepening the tension\
    \ between the mercenaries and testing Riker’s loyalty under duress. Riker, recognizing\
    \ Picard’s gambit, plays along, securing temporary safety while Baran’s crew fractures\
    \ further under suspicion and fear. The event pivots from a power struggle to\
    \ a high-stakes engineering challenge, where Riker’s survival hinges on his ability\
    \ to outmaneuver the mercenaries and trust Picard’s hidden agenda.\n  "
