- fabula_uuid: act_6337177bf9cade0f
  number: 2
  summary: The Enterprise arrives at Barradas Three, an unpopulated M-class planet
    dotted with ancient Debrune ruins, where intermittent energy signals hint at the
    mercenaries' presence. Despite Data's professional objection regarding a commanding
    officer's place, Riker, driven by his personal vendetta, leads an away team (Geordi,
    Worf, two security officers) to the planet's surface. The team quickly discovers
    strange, perfectly circular indentations in the ground, exhibiting micro-crystalline
    damage identical to the traces found at Picard's supposed death site, strongly
    suggesting a unique energy signature associated with the mercenaries. Worf then
    locates two distinct artifacts, confirming the mercenaries' specific objective.
    Without warning, the away team is ambushed by three armed mercenaries—Tallera,
    Vekor, and Narik—resulting in the immediate death of a security officer and the
    swift theft of the discovered artifacts. During the chaotic firefight, communications
    are effectively jammed, isolating the away team from the Enterprise. Riker, attempting
    a tactical maneuver to create a crossfire, is hit by a phaser blast and rendered
    unconscious. The mercenaries then swiftly transport Riker away, leaving Geordi,
    Worf, and the remaining security officer to arrive too late at the scene, realizing
    Riker has been captured. This act escalates the conflict, demonstrates the mercenaries'
    ruthlessness, and leaves Riker in a perilous situation, deepening the mystery
    surrounding their motives.
  key_moments: []
  scene_numbers:
