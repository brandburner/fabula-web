  title: Enterprise loses mercenary ship
  description: "\n  The *Enterprise* pursues the mercenary vessel at high warp after\
    \ it fires on the ship and flees Barradas Three. Data orders a relentless chase\
    \ at warp nine, but the mercenary ship's sensor signature abruptly vanishes, leaving\
    \ the crew unable to track it. Giusti's attempts to reacquire the signal fail,\
    \ forcing Data to abandon the pursuit and return to Barradas Three. The loss of\
    \ the mercenaries—who hold the stolen Romulan artifacts and may know Picard's\
    \ fate—escalates the mission's tension, as the crew's only lead slips away. Data's\
    \ logical but frustrated response underscores the stakes: without the ship, they\
    \ have no direct path to uncovering the conspiracy or confirming Picard's survival.\
    \ The event marks a critical turning point, shifting the crew's focus from active\
    \ pursuit to investigative deduction, with the archaeological site now their sole\
    \ remaining lead.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e04
  scene_sequence: 12
  sequence_in_scene: 20
  key_dialogue: &id009
  - 'DATA: Damage report.'
  - 'GIUSTI: Minor hit on the port deflector... no damage. They''re running, sir...
    their speed is warp eight-point-seven and holding. I think they''re at their maximum.'
  - 'DATA: Take us to warp nine and pursue. Lock phasers on target.'
  - 'GIUSTI: Switching to long-range scanners... Commander... the sensor image of
    that ship is extremely weak... it''s fading...'
  - 'GIUSTI: The ship doesn''t register on the long-range sensors. I''m sorry, sir...
    we''ve lost them.'
  - 'DATA: Plot a course and take us back to Barradas Three. Notify the Away Team
    to be ready for transport.'
