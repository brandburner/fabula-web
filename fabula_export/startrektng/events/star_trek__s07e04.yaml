  title: Riker proves command under fire
  description: "\n  The mercenary ship’s bridge erupts into crisis when a deliberate\
    \ warp core destabilization—orchestrated by Picard—threatens to destroy the vessel.\
    \ Baran, the ruthless mercenary captain, initially dismisses Riker as a liability,\
    \ but when the ship’s systems fail, Picard subtly engineers Riker’s opportunity\
    \ to prove his worth. Riker, recognizing Picard’s hidden manipulation, swiftly\
    \ takes charge, collaborating with the reluctant Narik to stabilize the core.\
    \ His technical expertise and decisive leadership not only avert disaster but\
    \ also force Baran to reconsider Riker’s value. The moment marks a turning point:\
    \ Baran’s grudging respect for Riker’s competence begins to shift the crew’s perception\
    \ of him, while Picard’s calculated betrayal deepens the tension between the two\
    \ men. The scene underscores Riker’s growth as a leader under pressure and exposes\
    \ the fractured loyalties within the mercenary crew, where self-interest and distrust\
    \ dominate.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e04
