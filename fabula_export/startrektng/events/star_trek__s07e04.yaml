  title: Riker breaks Yranac’s silence with Klingon threats
  description: 'In Yranac’s quarters, Riker confronts the Yridian informant—who initially
    deflects with feigned ignorance and demands for better accommodations—by exposing
    his outstanding Klingon arrest warrants. The threat of Klingon justice (which
    includes brutal punishments for fraud) shatters Yranac’s defiance, forcing him
    to admit the mercenaries who killed Picard are a dangerous group operating in
    the Barradas system. The revelation escalates the mission’s urgency, but Yranac’s
    evasiveness and Riker’s ruthless leverage reveal a deeper pattern: the truth about
    Picard’s disappearance is being actively suppressed, and the mercenaries are willing
    to kill to keep it buried. The scene ends with Riker ordering the *Enterprise*
    to warp six toward Barradas, shifting the investigation from interrogation to
    direct confrontation.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e04
  scene_sequence: 6
  sequence_in_scene: 9
  key_dialogue:
  - 'YRANAC: You can''t turn me over to the Klingons. They don''t just imprison you...
    Do you know what the punishment is for fraud?'
  - 'RIKER: Yes. I certainly do.'
  - 'YRANAC: If I tell you what I know, you must promise you won''t give me to the
    Klingons.'
  - 'RIKER: I''ll think about it.'
  - 'YRANAC: The aliens were some kind of mercenary group. They''ve been operating
    in this sector for the last six months... I heard one of them mention the Barradas
    system... I think they were headed there.'
