    authority. The moment underscores the precariousness of Picard’s deception, the
    brutal consequences of failure, and the high personal cost of Riker’s undercover
    mission. The scene also exposes Baran’s paranoia and control over his crew, while
    Picard’s calculated violence—though necessary—reveals the moral compromises demanded
    by their shared objective.
