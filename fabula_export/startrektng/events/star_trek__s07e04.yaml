  title: Troi and Riker extract smuggler intel through coercion
  description: "\n  In a seedy frontier bar, Deanna Troi uses her Betazoid empathy\
    \ and calculated charm to probe the bartender about a smuggler tied to Romulan\
    \ relic trafficking. The bartender resists direct answers, forcing Troi to navigate\
    \ a delicate balance of psychological pressure and flirtation—each deflection\
    \ revealing the smuggling network's paranoia. Meanwhile, Riker and Worf manipulate\
    \ a nervous Yridian informant, Yranac, by fabricating a story about a 'sister'\
    \ to pressure him for information about Picard's disappearance. The informant\
    \ initially demands latinum but escalates his price to safe passage off-world\
    \ when Beverly Crusher intervenes with a phaser. Yranac reveals that Picard was\
    \ attacked by a group of dangerous aliens, thrown against a wall, and ultimately\
    \ 'vaporized' by an unknown weapon. Troi confirms the truth of his account, leaving\
    \ the team stunned by the revelation of Picard's apparent death. The scene serves\
    \ as a critical intelligence-gathering moment, hinting at the larger conspiracy\
    \ while underscoring the crew's desperation to uncover Picard's fate. The tension\
    \ between deception and coercion highlights the moral compromises the crew is\
    \ willing to make in their pursuit of justice.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e04
  scene_sequence: 1
  sequence_in_scene: 1
  key_dialogue:
  - |-
    BARTENDER: Tell me... why is it so important that you find this man?
    TROI: We had some business dealings... he owes me money.
  - |-
    YRANAC: The only reason I'm talking to you... is that I have a sister, too.
    RIKER: You can imagine how much this means to me.
    YRANAC: Family honor is important... If someone had defiled my sister... I would do anything... pay anything... to find the one responsible.
  - |-
    YRANAC: He was vaporized.
    TROI: He's telling the truth.
