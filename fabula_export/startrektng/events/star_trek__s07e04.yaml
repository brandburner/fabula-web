acts:
- fabula_uuid: act_b8602203675fb7cc
  number: 1
  summary: 'The act opens with an undercover away team (Troi, Riker, Worf, Beverly)
    on Dessica Two, investigating Captain Picard''s disappearance. They employ deceptive
    tactics, including a fabricated story about Riker''s ''sister'' (Beverly) and
    a ''pregnant sister'' (Worf''s cover), to extract crucial information from a nervous
    Yridian informant, Yranac. Yranac reluctantly reveals that Picard was ''vaporized''
    by dangerous mercenaries during a bar fight weeks prior. Beverly''s subsequent
    DNA analysis on the Enterprise grimly confirms Picard''s death, leaving her deeply
    distraught while Riker maintains a stoic, almost unreadable demeanor, suppressing
    his own profound grief. Riker, consumed by a fierce desire for justice rather
    than mourning, vehemently refuses to deliver Picard''s eulogy, leading to a tense
    confrontation with Troi, who implores him to embrace his new command responsibilities
    and provide guidance to the grieving crew. Defying standard Starfleet protocol
    and his original mission, Riker secures Admiral Chekote''s reluctant permission
    to personally lead an unauthorized investigation into Picard''s death, emphasizing
    his unwavering determination to find those responsible. He then aggressively interrogates
    Yranac again, leveraging the Yridian''s extensive criminal record and the threat
    of Klingon extradition to coerce him into revealing the mercenaries'' likely destination:
    the Barradas system. This pivotal act establishes Riker''s profound emotional
    conflict, his resolute commitment to avenging Picard, and sets the Enterprise
    on a rogue mission of pursuit, driven by personal grief and a quest for retribution.'
  key_moments: []
  scene_numbers:
  - 1
