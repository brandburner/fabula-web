    global_id: ger_object_ca94402276be
  - object_uuid: ger_object_9141dd64490d
    description_of_involvement: The engineering panel on the mercenary ship’s bridge
      is pried open by Riker during the engine malfunction, allowing him to bypass
      the control logic lockout in the regulator subsystem. This action is a turning
      point in the crisis, as it enables Riker to take direct control of the ship’s
      systems and stabilize the warp drive. The panel’s access to the ship’s critical
      components symbolizes Riker’s technical prowess and his ability to turn the
      situation in his favor, despite being a prisoner. Its role in the repair process
      highlights the crew’s desperation and their reliance on Riker’s skills to avert
      disaster.
    status_before_event: Sealed and locked, with no immediate signs of tampering.
    status_after_event: Opened by Riker, with the internal wiring and control logic
      exposed and temporarily modified to stabilize the warp drive.
    global_id: ger_object_9141dd64490d
  - object_uuid: ger_object_40354c59bfd4
    description_of_involvement: The antimatter flow regulator is a critical component
      of the ship’s warp drive, and its sabotage by Picard triggers the engine malfunction.
      When the regulator locks open, it causes plasma pressure to rise to dangerous
      levels, forcing the crew into a desperate race to stabilize the system. Riker
      identifies the regulator as the source of the problem and works with Narik to
      run an active bypass through the plasma flow converter, restoring the ship’s
      stability. The regulator’s failure is a pivotal moment, revealing Picard’s hidden
      agenda and giving Riker the chance to demonstrate his value.
    status_before_event: Functioning normally until Picard sabotages it, locking it
      open and causing the plasma pressure to spike.
    status_after_event: Repaired by Riker and Narik, but its previous failure highlights
      the ship’s vulnerabilities and the crew’s reliance on technical expertise.
    global_id: ger_object_40354c59bfd4
