  - 'PICARD: We don''t have much time... I hardly expected to see you here, Wil.'
  - 'RIKER: I was trying to find the people who killed you. A witness in that bar
    saw you vaporized.'
  - 'PICARD: These mercenaries use weapons which activate their Transporter. It allows
    them to beam away objects quickly, by simply firing at them. That''s what they
    did to me.'
  - 'PICARD: These aren''t common thieves. They''re stealing Romulan artifacts from
    archaeological sites throughout this sector... Baran has me analyzing each one
    for a particular particle signature. They''re looking for a specific artifact...'
  - 'PICARD: I want you to try to get close to Baran... gain his confidence. He also
    believes you''re a less than perfect Starfleet officer... you''ll have to play
    into that role.'
  - 'PICARD: Getting some answers. Just because you couldn''t get him to talk—'
  - 'BARAN: No one conducts an interrogation on this ship without my permission. Is
    that understood?'
