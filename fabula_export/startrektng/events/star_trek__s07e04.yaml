      Picard’s undercover role as 'Galen' is a direct extension of Starfleet’s investigative
      protocols, as he seeks to uncover the mercenaries’ operations and the significance
      of the stolen Romulan artifacts. Riker, though operating outside official Starfleet
      channels, is driven by his loyalty to the Federation and his desire to protect
      its interests. The organization’s values—loyalty, justice, and the pursuit of
      truth—are reflected in their willingness to endure physical and emotional hardship
      for the mission. However, their actions also highlight the moral ambiguities
      of operating undercover, as they must navigate a world of brutality and deception
      that clashes with Starfleet’s ideals.
    active_representation: Through the actions and values of Picard and Riker, who
      embody Starfleet’s principles of loyalty, justice, and investigative diligence,
      even in the face of extreme adversity.
