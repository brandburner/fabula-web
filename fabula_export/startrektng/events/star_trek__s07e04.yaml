- fabula_uuid: act_5e35d98194274c7e
  number: 4
  summary: 'Riker, despite his profound shock at seeing Captain Picard alive and disguised
    as a mercenary, quickly regains his composure, intuitively realizing Picard is
    operating undercover. Picard, meticulously maintaining his ''Galen'' persona,
    aggressively feigns animosity towards Riker, portraying him as a disloyal and
    insubordinate Starfleet officer with a fabricated history of disciplinary issues.
    This elaborate ruse is a critical step in Picard''s plan to infiltrate Baran''s
    inner circle and gain his trust. The mercenary ship then experiences a critical
    engine malfunction, secretly orchestrated by Picard, which Riker, now understanding
    Picard''s subtle cues, offers to fix. Displaying his impressive engineering prowess
    and quick thinking, Riker successfully repairs the engine, earning Baran''s grudging
    respect and demonstrating his unexpected value to the mercenary crew. Concurrently,
    on Barradas Three, Data''s diligent investigation of the looted Romulan archaeological
    sites leads him to a crucial deduction: the mercenaries are systematically targeting
    specific Romulan artifacts, and Calder Two, a vulnerable Federation outpost, is
    their next logical objective. Picard later seizes a private moment to explain
    his undercover mission to Riker, revealing he was captured while investigating
    the raids and assumed the identity of ''Galen'' to uncover Baran''s true motives.
    He instructs Riker to further gain Baran''s confidence by continuing their feigned
    animosity, a strategy dramatically reinforced when Baran interrupts their conversation,
    and Picard punches Riker to maintain his cover, subsequently enduring pain from
    Baran''s neural servo as a consequence of his ''insubordination.'''
