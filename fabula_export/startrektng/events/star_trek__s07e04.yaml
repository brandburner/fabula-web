  title: Picard undermines Riker’s authority with tactical precision
  description: On the mercenary bridge, Riker fails to compel Lieutenant Sanders to
    lower the outpost’s shields, exposing his vulnerability as a Starfleet officer
    in a lawless environment. Baran, impatient and ruthless, orders a full disruptor
    barrage to destroy the outpost, but Picard intervenes with a phase-resonant pulse—a
    solution that disables the shields without collateral damage. The maneuver not
    only saves lives but subtly asserts Picard’s strategic dominance, leaving Riker’s
    leadership further eroded and Picard’s true motives ambiguous. The moment underscores
    the shifting power dynamics between the two officers and the precariousness of
    Riker’s mission, as Baran’s frustration escalates and Picard’s calculated defiance
    goes unchallenged. The event also foreshadows the mercenaries’ desperation to
    retrieve the Romulan artifacts, setting up the next obstacle in their mission.
