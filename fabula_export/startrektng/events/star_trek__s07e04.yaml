  title: Ambush Claims Life and Artifacts
  description: "\n  The away team—Riker, Geordi, Worf, and two unnamed security officers—examines\
    \ a clearing on Barradas Three, where strange circular indentations in the ground\
    \ suggest recent activity. Geordi detects crystalline damage matching the Dessica\
    \ Two bar, linking the site to Picard’s disappearance. As the team investigates,\
    \ three mercenaries—Tallera, Vekor, and Narik—ambush them from the treeline. A\
    \ security officer is killed instantly, and Tallera seizes the newly discovered\
    \ Romulan artifacts before retreating. The team is pinned down, unable to return\
    \ fire effectively, while Geordi’s desperate combadge call to the *Enterprise*\
    \ is cut short by Romulan jamming. The ambush escalates the mission’s stakes,\
    \ forcing Riker to confront both the immediate loss of life and the stolen artifacts’\
    \ connection to Picard’s fate and the Romulan conspiracy.\n  "
