  global_id: null
  title: Riker breaks Yranac with Klingon threat
  description: Riker corners Yranac in his quarters, where the Yridian informant is
    feigning indifference while hoarding information. Riker initially probes with
    polite questions, but Yranac deflects with vague answers and a smug request for
    better accommodations. Recognizing Yranac’s bargaining tactics, Riker shifts to
    psychological pressure, revealing Yranac’s outstanding Klingon arrest warrants.
    The threat of Klingon justice—implied to be brutal—shatters Yranac’s composure,
    forcing him to admit the mercenaries are a group operating in the sector for months
    and likely heading to the Barradas system. Riker immediately acts on the lead,
    ordering Data to set course for Barradas, marking a critical pivot from vengeance
    to targeted pursuit. The scene underscores Riker’s ruthless pragmatism and Yranac’s
    self-serving desperation, while advancing the plot with a concrete destination
    for the investigation into Picard’s disappearance.
