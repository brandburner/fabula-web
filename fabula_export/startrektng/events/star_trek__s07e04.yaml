  global_id: null
  title: Riker forces Yranac’s confession under threat
  description: "\n  In a tense escalation inside a frontier bar, Riker and Worf manipulate\
    \ Yranac—a nervous Yridian informant—by fabricating a false pretext about a 'sister'\
    \ to exploit his greed and fear. When Yranac demands latinum in exchange for information,\
    \ Beverly Crusher intervenes with a phaser, forcing the bartender to release Yranac\
    \ and allowing Riker to escalate the interrogation. Yranac reveals that Picard\
    \ was attacked by mercenaries, thrown against a wall, and then vaporized by an\
    \ unknown high-energy weapon. Beverly’s tricorder scan confirms Starfleet fiber\
    \ traces and distorted cellular debris, confirming the weapon’s lethal efficiency.\
    \ The revelation terrifies Yranac, who now recognizes the team’s lethal capabilities\
    \ and the gravity of their mission. The scene pivots from psychological manipulation\
    \ to physical intimidation, exposing the ruthlessness of those involved and deepening\
    \ the conspiracy around Picard’s disappearance. Riker’s relentless pursuit of\
    \ the truth, combined with Beverly’s forensic evidence, solidifies the team’s\
    \ resolve to uncover the full scope of the conspiracy, regardless of the risks.\n\
    \  "
