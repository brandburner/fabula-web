- fabula_uuid: cand_evt_scene_6ad30ff1d615dcf8_01
  global_id: null
  title: Riker secures Enterprise for Picard investigation
  description: "\n  In the hollow silence of Picard’s abandoned Ready Room, Riker’s\
    \ grief crystallizes into resolve as he confronts Admiral Chekote for permission\
    \ to investigate his captain’s presumed death. The moment begins with Riker’s\
    \ deliberate choice to sit at Picard’s desk—a symbolic act of assuming command—before\
    \ activating the terminal to receive Chekote’s transmission. The admiral’s condolences\
    \ are met with Riker’s blunt request to lead an unauthorized investigation, which\
    \ Chekote initially resists on jurisdictional grounds. Riker counters by framing\
    \ his personal grief as an asset, not a liability, arguing that his determination\
    \ outweighs any lack of objectivity. The subtext is clear: Riker is not just seeking\
    \ justice but asserting his leadership in Picard’s absence. Chekote, recognizing\
    \ the stakes, reluctantly grants the *Enterprise* detached duty, setting the stage\
    \ for a mission that will unravel both a conspiracy and the truth behind Picard’s\
    \ fate. The scene hinges on Riker’s emotional architecture—his grief as fuel,\
    \ his resolve as a weapon—and establishes the narrative’s central tension: a personal\
    \ vendetta colliding with a larger, unseen threat.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e04
  scene_sequence: 5
  sequence_in_scene: 8
  key_dialogue:
  - 'RIKER: Sir. I have a request, sir. I''d like to conduct an investigation into
    Captain Picard''s death.'
  - 'CHEKOTE: The Dessican authorities have jurisdiction in this case, Commander.'
  - 'RIKER: Sir, the Captain''s death has hit me pretty hard. I may not be completely
    objective... but no one is more determined than I am. I won''t quit until we find
    out who''s responsible.'
