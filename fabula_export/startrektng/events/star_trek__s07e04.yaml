  title: Riker defies protocol to lead Barradas mission
  description: In the Observation Lounge, Riker—now acting captain—overrules Data’s
    objections to lead the away team to Barradas Three, where anomalous energy signals
    suggest a hidden base or ship. Data, citing Starfleet protocol, questions Riker’s
    decision to leave the *Enterprise* without a senior officer, but Riker dismisses
    the concern, his grief and urgency overriding logic. The exchange underscores
    Riker’s emotional state and the crew’s shifting dynamics in Picard’s absence,
    while Geordi and Worf prepare for the mission. The scene sets up the away team’s
    departure and foreshadows the risks of Riker’s impulsive leadership.
