      codes after a capture—are challenged by Riker’s use of outdated access codes.
      Data’s decision to lower the shields, despite Worf’s protests, reflects a tension
      between Starfleet’s rigid tactical guidelines and the crew’s personal trust
      in Riker. The organization’s influence is felt in the crew’s adherence to (or
      defiance of) protocol, as well as in the high stakes of their actions. Starfleet’s
      authority is both a constraint and a source of legitimacy for Data’s order.
