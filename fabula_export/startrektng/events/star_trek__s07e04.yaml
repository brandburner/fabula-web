  title: Picard sabotages disruptor barrage to save outpost
  description: After Lieutenant Sanders refuses Riker’s order to lower the outpost’s
    shields—citing Federation regulations—Baran escalates by ordering a full disruptor
    barrage to destroy the facility. Picard intervenes, using a phase-resonant pulse
    to disable the shields instead, allowing Tallera to begin transporting the Romulan
    artifacts. However, the outpost reactivates its defenses mid-transport, aborting
    the retrieval and forcing Baran to threaten total destruction. The exchange reveals
    Picard’s tactical brilliance and his hidden agenda to protect the outpost’s personnel,
    while Baran’s escalation underscores his ruthlessness and the mission’s escalating
    stakes. The ship’s sudden impact suggests an external threat, further complicating
    the crew’s precarious position.
