- fabula_uuid: act_b28bf20e1752c1fb
  number: 3
  summary: Following Riker's capture, communications are miraculously restored, and
    Geordi reports the dire situation to Data, who has assumed command of the Enterprise.
    The mercenary ship, utilizing an advanced energy-absorbing sheath, makes a swift
    escape from Barradas Three, proving frustratingly undetectable to the Enterprise's
    long-range sensors despite Data's aggressive pursuit tactics. Unable to track
    the cloaked vessel, Data, against the mounting frustration of Troi, Geordi, and
    Worf who yearn to immediately rescue Riker, makes a calculated, pragmatic decision
    to return to Barradas Three. His objective is to meticulously investigate the
    mercenaries' purpose by thoroughly examining the archaeological site, believing
    this will yield crucial clues to their next move and overall mission. Meanwhile,
    aboard the mercenary ship, Riker awakens as a helpless prisoner, fitted with a
    sinister neural servo that allows Baran, the ruthless mercenary leader, to inflict
    excruciating pain at will. Baran subjects Riker to an intense interrogation about
    his presence on Barradas Three, brutally showcasing his absolute authority. Internal
    friction among the mercenary crew, particularly from Vekor and Narik, regarding
    Riker's fate, highlights the precarious and distrustful dynamics within the group.
    The act culminates with the shocking and bewildering appearance of Captain Picard,
    disguised as a mercenary named 'Galen,' who coldly and unexpectedly suggests killing
    Riker, leaving Riker utterly stunned and confused by this apparent betrayal.
  key_moments: []
  scene_numbers:
