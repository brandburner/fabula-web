- fabula_uuid: act_2d7f95709366a894
  number: 5
  summary: 'Baran briefs his mercenary crew on the impending attack on Calder Two,
    a Federation outpost. Picard, still deeply undercover, attempts to subtly dissuade
    Baran from a direct, violent assault by highlighting the outpost''s robust defenses
    and the high risk of Starfleet intervention, discreetly trying to protect the
    Federation personnel. He then proposes an alternative: using Riker''s Starfleet
    credentials to gain peaceful access to the outpost, arguing it would prevent unnecessary
    casualties and allow for the swift retrieval of artifacts without a costly battle.
    Tallera, recognizing the pragmatic advantages and recalling past losses, supports
    this plan, ultimately swaying Baran, who reluctantly agrees to the ruse. While
    Picard continues his meticulous artifact analysis in the cargo bay, he engages
    Tallera in a probing conversation, attempting to uncover the true purpose of the
    mission and subtly sow discord against Baran, but Tallera remains elusive, warning
    him against any thoughts of mutiny. As the mercenary ship approaches Calder Two,
    Riker''s attempt to bluff Lieutenant Sanders into lowering the outpost''s shields
    fails, forcing Baran to order an immediate attack. Picard, in a desperate, last-minute
    maneuver, sabotages the disruptors to fire a phase-resonant pulse, temporarily
    disabling the outpost''s shields, allowing some artifacts to be beamed aboard
    before the Enterprise arrives. Data, having successfully tracked the mercenaries,
    orders them to stand down. Baran, wielding the neural servo, brutally forces Riker
    to order the Enterprise to disengage. Riker, understanding the deeper manipulation
    at play, provides false access codes, seemingly to lower the Enterprise''s shields.
    Data, exhibiting profound trust in Riker''s underlying intent despite the apparent
    betrayal, orders the shields dropped. Under intense duress from Baran, Picard
    fires on the now-defenseless Enterprise, critically damaging its warp nacelles,
    leaving its fate uncertain and setting up a dramatic cliffhanger.'
