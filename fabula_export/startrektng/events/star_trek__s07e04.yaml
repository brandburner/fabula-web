- fabula_uuid: cand_evt_scene_50abad0f83115fef_01
  global_id: null
  title: Riker rejects memorial for vengeance
  description: 'In Riker’s quarters, Deanna Troi attempts to rally him to deliver
    Picard’s eulogy and fulfill his command responsibilities, but he refuses, his
    grief hardening into a single-minded pursuit of vengeance. The confrontation reveals
    Riker’s emotional fracture—his refusal to heal, his dismissal of Starfleet’s moral
    framework, and his prioritization of personal justice over collective mourning.
    Troi’s frustration exposes the crew’s shared grief, while Riker’s insistence on
    ‘justice’ before mourning marks a critical turning point: his abandonment of duty
    for a path of retribution, setting him on a collision course with Starfleet’s
    values and the story’s central conflict. The scene underscores the tension between
    individual pain and institutional responsibility, with Riker’s choice to weaponize
    his grief foreshadowing his descent into moral ambiguity.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e04
  scene_sequence: 3
  sequence_in_scene: 6
  key_dialogue:
  - |-
    TROI: How are you doing?
    RIKER: I'm all right.
    TROI: The crew is pretty shaken up... I'm arranging a memorial service... I think you should be the one to deliver the eulogy.
    RIKER: You'd be better at something like that. Or Beverly. She knew him the longest...
  - |-
    TROI: I know it won't be easy... but it's important for all of us to face what's happened. You're in command now. The crew will be looking to you for guidance -
    RIKER: You don't understand. I can't give the eulogy because I won't be at the service.
    TROI: A memorial service helps to give everyone a sense of completion. Helps them begin the healing process...
    RIKER: That's exactly the point. I don't want to heal.
  - |-
    TROI: You're angry...
    RIKER: You're damn right. And I intend to stay angry -- until I find whoever's responsible for the Captain's death.
    TROI: That's pretty selfish, Wil.
    RIKER: ((harshly)) That's enough, Counselor.
    RIKER: ((continuing, softer)) I'm sorry. Deanna. This isn't about revenge. It's about justice. The Captain died in a bar fight... for nothing. Somebody has to answer for that. Then I can mourn.
