  title: Picard manipulates Riker’s survival
  description: "\n  Picard, disguised as the mercenary *Galen*, makes a calculated\
    \ reappearance on the bridge of Baran’s ship, abruptly proposing Riker’s execution—a\
    \ move that destabilizes the crew’s power dynamics and forces a reckoning with\
    \ Picard’s true motives. The revelation of his survival, cloaked in cold detachment,\
    \ reframes the mission’s stakes by exposing the fragility of Riker’s vengeance\
    \ narrative. Picard’s strategic manipulation of Baran’s distrust (e.g., fabricating\
    \ Riker’s insubordination) tests Riker’s loyalty under pressure while subtly sabotaging\
    \ the mercenaries’ plans. The scene culminates in a high-stakes engine malfunction,\
    \ which Picard orchestrates to give Riker an opportunity to prove his value, thereby\
    \ securing his temporary survival. The tension between Picard’s hidden agenda\
    \ and Riker’s confusion underscores the shifting alliances and the precarious\
    \ balance of power on the ship.\n  "
