  title: Baran asserts control through psychological brutality
  description: The scene opens on the mercenary ship's bridge, where Baran immediately
    establishes his dominance by dismissing Narik’s technical warnings about the warp
    drive—undermining his crew’s competence and prioritizing his own agenda. His psychological
    torment of Riker begins with a neural servo interrogation, demonstrating his ruthless
    leadership style and forcing Riker into a position of vulnerability. The tension
    escalates as Vekor challenges Baran’s decision to keep Riker alive, only for Baran
    to silence her with a brutal display of his control device. The power struggle
    reaches a climax when Picard (disguised as 'Galen') intervenes, advocating for
    Riker’s execution—a calculated move that forces Riker to play along while subtly
    sabotaging the mercenaries’ systems. The scene culminates in a manufactured warp
    core crisis, where Picard orchestrates Riker’s temporary reprieve by exploiting
    his engineering skills, revealing a deeper alliance between the two while reinforcing
    Baran’s volatile authority. The interplay of psychological manipulation, crew
    dissent, and Picard’s covert strategy sets the stage for future conflicts and
    underscores the high stakes of resistance aboard the mercenary ship.
