  object_involvements:
  - object_uuid: ger_object_222d8c76896f
    description_of_involvement: The mercenaries’ transporter weapons are mentioned
      by Picard as the tools used to capture him in the bar on Dessica Two. These
      handheld devices fire at targets, instantly activating the ship’s transporter
      to beam victims away. Picard’s explanation to Riker serves as a critical piece
      of backstory, illustrating the mercenaries’ advanced technology and their ruthless
      efficiency in capturing and controlling their targets. The weapons symbolize
      the mercenaries’ ability to strike quickly and disappear without a trace, making
      them a formidable and unpredictable adversary.
    status_before_event: Stowed away on the mercenary ship, used previously to capture
      Picard and other targets.
    status_after_event: Not directly involved in this event, but their existence remains
      a looming threat and a reminder of the mercenaries’ capabilities.
    global_id: ger_object_222d8c76896f
  - object_uuid: ger_object_9141dd64490d
    description_of_involvement: The mercenary ship’s warp drive is subtly referenced
      as a strategic tool in Picard’s plan. He reveals to Riker that he orchestrated
      the engine’s failure to create an opportunity for Riker to prove his value to
      Baran and gain his trust. The warp drive’s malfunction is a calculated move,
      designed to facilitate Riker’s integration into the crew while also creating
      a sense of urgency and dependency. Its role in the event highlights Picard’s
      ability to manipulate the ship’s systems to advance his mission objectives,
      even at the risk of endangering the crew.
    status_before_event: Functioning normally, though Picard has already sabotaged
      it to create the planned failure.
    status_after_event: Malfunctioning, with Narik reporting fluctuations from the
      bridge, and Baran forced to address the issue under guard.
    global_id: ger_object_9141dd64490d
  - object_uuid: ger_object_518325857253
    description_of_involvement: Baran’s neural servo is a compact, patch-like device
      fastened to Picard’s neck, used to inflict excruciating pain as a means of control
      and punishment. During this event, Baran activates the servo on Picard after
      catching him conducting an unauthorized interrogation, sending jolts of pain
      that force Picard to gasp and writhe. The device serves as a brutal reminder
      of Baran’s authority and the high stakes of maintaining the undercover operation.
      Its use underscores the mercenary ship’s culture of fear and the physical toll
      of deception.
    status_before_event: Attached to Baran’s belt, inactive but ready for use as a
