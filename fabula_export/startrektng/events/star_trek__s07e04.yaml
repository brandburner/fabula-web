  title: Picard executes Baran’s order
  description: In a moment of brutal moral reckoning, Baran commands Picard to fire
    on a defenseless Federation outpost—its shields compromised by Riker’s sabotage.
    Picard hesitates, locking eyes with Riker in a silent exchange of complicity and
    conflict before reluctantly executing the command. The outpost’s destruction is
    instantaneous, its shields collapsing under the barrage. The act deepens the crew’s
    moral compromise, forcing Picard to confront the irreversible consequences of
    his actions under duress. The tension between duty and vengeance escalates, with
    Riker’s sabotage now directly enabling Picard’s forced betrayal of Starfleet principles.
    The scene underscores the crew’s fractured loyalty and the escalating stakes of
    their vengeful mission, as Picard’s moral line is crossed in full view of his
    former first officer.
