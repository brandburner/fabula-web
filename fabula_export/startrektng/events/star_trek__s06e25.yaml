- fabula_uuid: cand_evt_scene_485657bc28592a89_01
  global_id: null
  title: Temporal narcosis diagnosis and mission adjustments
  description: "\n  After recovering from a disorienting temporal episode, Picard\
    \ sits exhausted in the Runabout’s living section while Geordi examines the transporter\
    \ armbands. Geordi reveals that Picard’s erratic time skips are symptoms of *temporal\
    \ narcosis*—a condition caused by incomplete protection from the space-time continuum’s\
    \ destabilizing effects. Drawing a parallel to nitrogen narcosis in deep-sea diving,\
    \ Geordi explains the danger: Picard’s exposure to temporal anomalies has left\
    \ him vulnerable to disorientation, memory gaps, and potential neurological damage.\
    \ The revelation forces Picard to confront his physical and mental limitations,\
    \ a stark contrast to his usual unshakable leadership. Geordi warns that further\
    \ exposure could escalate the risks, urging the team to limit their time in the\
    \ frozen timeline to ten minutes per trip and stay together for safety. Picard,\
    \ though reluctant, accepts the medical advice and delegates the next phase of\
    \ the investigation—uncovering why the *Enterprise* was transferring power to\
    \ the Romulan ship—to Troi and the others. His momentary physical vulnerability\
    \ underscores the high stakes of their mission and the fragility of their temporal\
    \ situation, while also setting up the team’s next steps in the Romulan engine\
    \ room. The scene shifts from medical diagnosis to strategic planning, with Picard’s\
    \ leadership tested by both his condition and the need to adapt their approach.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e25
  scene_sequence: 23
  sequence_in_scene: 38
  key_dialogue:
  - 'GEORDI: It looks like you weren''t completely protected from the effects of the
    other time continuum... The neuro-physical stress must''ve been overwhelming.'
  - 'DATA: In much the same way that deep sea divers can experience nitrogen narcosis
    -- you experienced a form of temporal narcosis.'
  - 'PICARD: Can we modify the subspace isolators to give us better protection?'
  - 'GEORDI: I don''t think so. All we can do right now is be careful -- limit our
    exposure to their time frame. We probably shouldn''t stay any longer than ten
    minutes per trip. And we should stick together while we''re there... just in case.'
  - 'TROI: Captain. It might be better if you stayed here this time and gave yourself
    a chance to recover.'
