- fabula_uuid: act_2a84feb07c77609f
  number: 5
  summary: 'With the Enterprise''s warp core breach rapidly approaching its critical
    point, Picard, Data, and Troi face a seemingly impossible situation. Data confirms
    they cannot beam the core into space from the Runabout. Picard, recalling Data''s
    tricorder''s effect, proposes a daring plan: reverse time to a point before the
    warp core breach, then act swiftly to prevent the power transfer from happening
    again. Data, despite the radical nature of the idea, agrees to modify his tricorder
    to manipulate the temporal aperture. Picard, Data, and Troi strategically position
    themselves on the Enterprise—Data in Engineering, Picard on the Bridge, and Troi
    in Sickbay near Dr. Crusher. Data initiates the modified tricorder emissions,
    and time dramatically reverses, undoing the warp core breach and the disruptor
    blast on Beverly. However, the second Romulan-bodied alien, previously unseen
    by them, attacks Data, preventing him from stopping the power transfer. An Ensign,
    now unfrozen, inadvertently re-initiates the transfer, which cannot be disengaged.
    Data activates a containment field, but it will fail, making a core breach imminent
    once more. With no other options, Picard takes a desperate gamble. He flies the
    Runabout directly between the Enterprise and the Romulan Warbird, severing the
    power transfer beam. The Runabout explodes, and the Romulan Warbird, along with
    the aliens, vanishes as time returns to normal. The Enterprise is saved, and space-time
    is restored. In the aftermath, Data, ever the scientist, studies human perceptions
    of time, concluding he cannot personally experience it differently from his internal
    chronometer, a poignant reflection on the unique events and the limits of his
    artificial understanding.'
