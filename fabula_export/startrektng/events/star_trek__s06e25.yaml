  title: Temporal anomaly first manifests
  description: "\n  The scene opens with the crew of the runabout—Picard, Geordi,\
    \ Troi, and Data—relaxing after a conference, sharing lighthearted banter about\
    \ their experiences. Troi recounts an awkward encounter with a Ktarian researcher,\
    \ while Geordi enthusiastically describes his hands-on experience with a plasma\
    \ field. The mood is casual, almost domestic, until time abruptly freezes for\
    \ everyone except Troi. The crew remains motionless mid-action—Picard with a teacup\
    \ halfway to his lips, Geordi mid-gesture—while Troi, the only one unaffected,\
    \ reacts with shock and confusion. When time resumes, the crew continues as if\
    \ nothing happened, unaware of the anomaly. Troi, visibly shaken, struggles to\
    \ articulate what occurred, prompting Geordi to scan them with a tricorder and\
    \ Data to initiate a ship-wide diagnostic. Picard presses Troi for details, but\
    \ she can only describe the brief, inexplicable pause in time. The scene pivots\
    \ from mundane conversation to urgent investigation, marking the first tangible\
    \ evidence of the temporal crisis threatening the *Enterprise* and Romulan warbird.\
    \ Data’s departure to the cockpit hints at a technical countermeasure, while Troi’s\
    \ isolation in perceiving the anomaly foreshadows her pivotal role in unraveling\
    \ the mystery.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e25
  scene_sequence: 4
  sequence_in_scene: 7
  key_dialogue: &id005
  - 'TROI: So just as I''m leaving the reception, a Ktarian walks up to me and says...
    So Diane... I understand you''re an empath. I''m a very... sensitive man myself.
    I''m doing a thesis on interspecies mating rituals. Would you care to join me
    in some empirical research?'
  - 'GEORDI: Don''t tell me -- Doctor Mizan.'
  - 'TROI: ((awkward)) Yes... but...'
  - 'PICARD: I''ll explain it to you later, Data.'
  - 'TROI: I''m... not sure...'
  - 'GEORDI: Is there something wrong, Counselor?'
  - 'PICARD: How long did it appear to you that we were... frozen?'
  - 'TROI: I don''t know... four, maybe five seconds. You just... stopped... and then
    started again...'
  - 'DATA: My memory record does not indicate a pause or disruption during that period
    of time.'
  - 'GEORDI: Data -- let''s run a ship-wide diagnostic. Maybe there''s something we
    missed...'
