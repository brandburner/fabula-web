  - object_uuid: ger_object_95f42525c80b
    description_of_involvement: The runabout cockpit console is the nerve center of
      the operation, where Geordi finalizes the critical adjustments to the subspace
      fields and transporter coordinates. Its panels flicker with stability readouts,
      transporter locks, and chroniton field alerts, providing real-time data on the
