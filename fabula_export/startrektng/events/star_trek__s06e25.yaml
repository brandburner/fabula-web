  title: Picard discovers Worf’s Romulan transporter logs
  description: 'In the frozen transporter room, Picard examines the console and uncovers
    evidence that Worf secretly beamed three Romulans aboard the *Enterprise*—one
    injured, two assisting—while simultaneously transporting others to Sickbay. Troi
    enters, visibly shaken from her own discovery in Sickbay, but Picard is too absorbed
    in the logs to notice her distress. The scene reveals a breach in protocol and
    trust: Worf’s actions contradict standard Starfleet procedure during a battle,
    raising urgent questions about his motives and the Romulans’ presence. The frozen
    tableau underscores the temporal anomaly’s eerie hold over the ship, while Picard’s
    methodical investigation contrasts with Troi’s emotional state, foreshadowing
    deeper fractures in the crew’s cohesion. The discovery sets up a critical confrontation
    over Worf’s loyalty and the Romulans’ true intentions in the frozen timeline.'
