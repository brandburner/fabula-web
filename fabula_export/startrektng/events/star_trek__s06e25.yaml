  title: Troi discovers Beverly mortally wounded in frozen Sickbay
  description: 'Counselor Troi enters Sickbay to find the entire medical bay frozen
    in time, with Dr. Beverly Crusher fatally wounded by a Romulan disruptor blast.
    The grotesque juxtaposition of the frozen environment and Beverly''s fatal injury—her
    body still warm but her condition irreversible—triggers Troi''s visceral horror,
    underscoring the immediate stakes of the temporal anomaly. The Romulan attacker
    is also frozen mid-fire, his weapon''s beam suspended in mid-air, while two medical
    personnel remain locked in urgent expressions. Troi''s emotional reaction to Beverly''s
    condition—her helplessness and shock—reinforces the personal cost of the time
    disruption, forcing her to confront the fragility of life and the urgency of reversing
    the anomaly. As she exits, she notices a Romulan woman by the door who is *not*
    frozen, her unreadable gaze following Troi, hinting at hidden knowledge or agency
    amid the chaos. This moment crystallizes the crisis: the Enterprise''s crew is
    trapped in a fractured timeline, and every second counts before more lives are
    lost.'
