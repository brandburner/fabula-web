  global_id: null
  title: Picard uncovers the 47-day fuel anomaly
  description: "\n  The *Runabout* suffers a sudden, violent engine failure as the\
    \ starboard nacelle cuts out without warning, forcing the crew to scramble for\
    \ stability. Picard demands a report while Geordi confirms the antimatter pod\
    \ is completely drained—an impossible scenario given the vessel’s operational\
    \ limits. Data’s analysis reveals the starboard engine has been running continuously\
    \ for 47 days, a physical impossibility that contradicts the ship’s known operational\
    \ history. Picard immediately moves to cross-check the fuel consumption logs,\
    \ setting the stage for a confrontation with the temporal anomaly’s physical evidence.\
    \ The discovery forces the crew to acknowledge that the *Runabout* has been caught\
    \ in a temporal distortion, escalating the mystery of the frozen *Enterprise*\
    \ and Romulan warbird. This moment shifts the investigation from speculative theory\
    \ to concrete, inexplicable proof of spacetime disruption, compelling Picard to\
    \ take decisive action.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e25
  scene_sequence: 6
  sequence_in_scene: 10
  key_dialogue: &id009
  - 'DATA: We have an engine failure warning in the -'
  - 'GEORDI: The starboard antimatter pod is completely drained. The fuel reserves
    are empty.'
  - 'PICARD: Is there a containment leak?'
  - 'GEORDI: No sir. The containment field is intact... all engine systems are operational...
    The fuel is just gone.'
  - 'DATA: Geordi -- I believe I have an explanation. According to the plasma conversion
    sensor, the starboard engine has been in continuous operation for over forty-seven
    days.'
  - 'GEORDI: Forty-seven days? Let''s take a look at that sensor -- it must be malfunctioning.'
