    status_before_event: Operational, displaying standard runabout diagnostics and
      system statuses, with no anomalies detected.
    status_after_event: Displaying data on the temporal disturbance, fuel consumption
      anomalies, and hull integrity scans, now serving as a hub for the crew's crisis
      response.
    global_id: ger_object_2be158be083f
  - object_uuid: ger_object_88d7acbd32ff
    description_of_involvement: "\n        The bowl of fruit serves as the initial\
      \ catalyst for the event, its rapid decay from fresh to rotted to dust acting\
      \ as a visceral indicator of the temporal anomaly. Picard's attempt to touch\
      \ it triggers his accelerated aging, linking the fruit's fate to his physiological\
