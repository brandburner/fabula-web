- fabula_uuid: cand_evt_scene_0cd853ef48a5340c_01
  global_id: null
  title: Frozen Bridge Investigation Begins
  description: "\n  Picard, Data, and Troi materialize on the *Enterprise* bridge\
    \ to find the entire crew—including Riker—frozen in a suspended temporal state,\
    \ alongside armed Romulan intruders. The bridge is locked in mid-crisis: consoles\
    \ flash in frozen alerts, scorch marks mar the walls, and crewmembers are caught\
    \ in postures of alarm or defense. A dead crewmember lies near the Conn station,\
    \ while Riker is pinned against a wall by a Romulan disruptor. Picard immediately\
    \ assesses the scene, noting the absence of security officers and the Romulans'\
    \ tactical positions, suggesting a surprise attack. He tests the environment's\
    \ interactivity by moving a console, confirming that objects can be manipulated\
    \ despite the temporal freeze. Data analyzes the Ops console, revealing a catastrophic\
    \ power surge in Engineering as the likely cause of the anomaly. Troi, distressed\
    \ by Riker's vulnerable state, urges action, but Picard cautions against altering\
    \ the timeline without understanding its rules. He assigns tasks: Troi to Sickbay,\
    \ Data to Engineering, and himself to Transporter Room Three, where security teams\
    \ were last deployed. The crew splits up to investigate, with Geordi warning over\
    \ comms that limited power restricts beaming options, forcing them to use the\
    \ Jefferies Tubes instead. The scene establishes the immediate stakes—crew lives\
    \ hang in the balance, the ship is under Romulan control, and the temporal anomaly’s\
    \ cause remains unknown—while setting up parallel investigations into the bridge’s\
    \ crisis, Engineering’s power surge, and Sickbay’s condition.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e25
  scene_sequence: 14
  sequence_in_scene: 23
  key_dialogue:
  - 'PICARD: Three Romulans... all armed with disruptors... one at Conn... There are
    none of our security officers on the Bridge. They must''ve taken us by surprise....'
  - 'TROI: (re: Riker) Maybe we can do something to help Wil...'
  - 'PICARD: I''m wary about making changes in this time continuum until we understand
    more about what''s going on.'
  - 'DATA: None of the equipment is functioning. However, the information currently
    displayed indicates that there was a massive power surge in Engineering.'
  - 'PICARD: Security teams had just been sent to Transporter Room Three... and Sickbay.'
