- fabula_uuid: cand_evt_scene_454322caf77b27d5_01
  global_id: null
  title: Tricorder triggers temporal resonance
  description: "\n  In Engineering, Picard orders Data to activate a tricorder near\
    \ the Romulan warbird’s frozen engine core. Data complies, and the device emits\
    \ a blinking signal that triggers a reciprocal flash from the warbird’s core—revealing\
    \ an unexpected temporal link between the two vessels. The exchange of energy\
    \ suggests a deeper, unseen connection between the Enterprise and the Romulan\
    \ ship, one that may be tied to the broader time anomaly threatening the crew.\
    \ The moment marks a critical turning point: what was initially perceived as a\
    \ static, frozen threat now becomes an active, interactive force, demanding immediate\
    \ investigation. The resonance implies the warbird’s core is not just a victim\
    \ of the temporal disruption but a participant in it, potentially holding the\
    \ key to reversing the anomaly—or accelerating its destruction.\n  "
