      states a metaphor for the crew’s own vulnerability. The warp core’s breach cloud
      dominates the space, its eerie glow casting long shadows and reinforcing the
      sense of impending doom. The pool table read-outs and console displays, usually
      symbols of control, now feel like relics of a world that no longer exists, their
      data offering no real solutions.'
