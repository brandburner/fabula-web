- fabula_uuid: cand_evt_scene_0cd853ef48a5340c_02
  global_id: null
  title: Picard assigns teams to investigate time freeze
  description: "\n  Picard, Data, and Troi materialize on the *Enterprise* bridge\
    \ to find the entire crew—including Riker—frozen in time alongside Romulan intruders,\
    \ the ship locked in a state of mid-crisis. The bridge is damaged, with scorch\
    \ marks and motionless crew members, while Romulans stand poised in hostile stances.\
    \ Picard immediately assesses the situation, noting the absence of Starfleet security\
    \ and the presence of armed Romulans, suggesting a surprise attack. Data confirms\
    \ that the ship’s systems are nonfunctional but identifies a massive power surge\
    \ in Engineering as a potential cause of the temporal anomaly. Picard, cautious\
    \ about altering the frozen timeline, assigns Troi to investigate Sickbay (where\
    \ her earlier symptoms originated) and Data to examine Engineering for the power\
    \ surge’s source. He also directs Geordi to avoid beaming them due to limited\
    \ power, opting for the Jefferies Tubes instead. The scene marks a critical shift\
    \ from passive observation to active investigation, with each team’s assignment\
    \ reflecting Picard’s strategic prioritization of the anomaly’s likely origins\
    \ and his trust in his crew’s specialized skills.\n  "
