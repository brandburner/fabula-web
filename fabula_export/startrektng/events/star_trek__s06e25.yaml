- fabula_uuid: act_a485cbb7a959c686
  number: 3
  summary: 'Picard''s investigation in Transporter Room Three reveals Romulans being
    beamed aboard the Enterprise, unarmed and some injured, contradicting the initial
    assumption of an invasion. He deduces they were being transported *onto* the Enterprise,
    not attacking it. Troi arrives, delivering the devastating news of Dr. Crusher''s
    critical condition. Data then urgently summons them to Engineering, where he reveals
    the horrifying truth: a warp core breach is in progress, frozen at its inception
    but slowly expanding, threatening to destroy the ship in approximately nine hours.
    Data explains that time, while seemingly suspended, is actually moving forward
    at an infinitesimal rate within the fragment. He also discovers that a power transfer
    was underway from the Enterprise to the Romulan vessel at the moment time decelerated,
    explaining the second energy beam between the ships. Overwhelmed by the temporal
    anomalies, Picard experiences temporal narcosis, manifesting as uncontrollable
    laughter and disorientation, forcing a retreat to the Runabout. Back on the Runabout,
    Picard recovers, and they decide to investigate the Romulan Warbird, limiting
    their exposure to ten minutes. Beaming into the Warbird''s Engineering, they find
    the ship on evacuation alert, not battle stations, and discover the Romulans were
    attempting to *stop* the power transfer. Geordi opens the engine core, revealing
    a highly intense temporal aperture filled with organic ''dark spots'' – alien
    eggs. Data''s tricorder scan inadvertently causes time to briefly resume in the
    Warbird, leading to chaos and the appearance of a Romulan-bodied alien. Simultaneously,
    from the Runabout, Picard witnesses the Enterprise explode, only for time to dramatically
    reverse, returning everything to its original frozen state, leaving them stunned
    by the power of the anomaly.'
