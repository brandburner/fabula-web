- fabula_uuid: cand_evt_scene_c6b14c59c5cece91_01
  global_id: null
  title: Picard's accelerated cellular decay
  description: "\n  Picard discovers a localized temporal anomaly aboard the runabout\
    \ when he reaches for a bowl of fruit, only to find it rotted beyond recognition.\
    \ As he touches the table, his hand suddenly ages at an unnatural rate—his fingernails\
    \ growing half an inch in seconds—while his cells metabolize fifty times faster\
    \ than normal. The crew rushes to his side as Troi scans him, confirming the accelerated\
    \ decay before his metabolism stabilizes. Data identifies the anomaly as a spherical\
    \ temporal disturbance extending beyond the ship, explaining the runabout's inexplicable\
    \ fuel consumption. The crew realizes the anomaly's scope threatens the starboard\
    \ nacelle, forcing Geordi to attempt moving the vessel away from the disturbance.\
