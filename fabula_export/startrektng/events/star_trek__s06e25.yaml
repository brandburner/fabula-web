  - 'DATA: Captain. I am detecting a temporal disturbance which intersects the table.
    It would appear that within this disturbance, time is moving at a highly accelerated
    rate—approximately fifty times faster than normal.'
  - 'GEORDI: ((realizing)) That would cover the starboard nacelle. No wonder it used
    up all its fuel.'
  - 'PICARD: Check the hull integrity.'
  - 'DATA: It does not appear to be affected.'
  - 'PICARD: See if you can move us away from the disturbance, Mister La Forge.'
