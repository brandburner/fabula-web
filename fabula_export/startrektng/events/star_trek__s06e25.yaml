- fabula_uuid: cand_evt_scene_c758f55f58b62dcd_01
  global_id: null
  title: Data reports alien sabotage and core breach
  description: 'In the midst of the *Enterprise*''s temporal crisis, Picard demands
    an urgent status update from Data, who reveals a critical failure: an alien entity
    ambushed him during a power transfer, compromising the warp core. Data, working
    rapidly at a console, confirms the power transfer cannot be disengaged and that
    the containment field will fail in seventeen seconds, making a core breach imminent.
    This escalates the ship''s existential peril, forcing the crew to confront both
    the alien intrusion and the unraveling of their timeline. The moment underscores
    Data''s technical expertise and the relentless, escalating threat posed by the
    alien entity, which now directly endangers the *Enterprise*''s survival. The urgency
    of the situation is heightened by Data''s precise, unemotional delivery of the
    dire prognosis, contrasting with the high stakes of the crisis.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e25
