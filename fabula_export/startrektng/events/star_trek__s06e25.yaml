  title: Alien reveals Romulan sabotage and temporal threat
  description: "\n  In the Runabout’s living section, Picard, Data, and Troi interrogate\
    \ the Romulan host—now revealed to be an alien entity—who explains the desperate\
    \ circumstances behind the temporal anomaly. The alien’s species mistakenly used\
    \ the Romulan warbird’s artificial singularity as a nest for their offspring,\
    \ triggering the power transfer that destabilized spacetime. As the alien’s molecular\
    \ structure destabilizes, it warns that another of its kind remains active, escalating\
    \ the crisis. The revelation forces Picard to confront the alien’s preemptive\
    \ attack on the *Enterprise* as a defensive measure to protect its young, while\
    \ Data’s analysis confirms the Romulan engine core’s role in the temporal rupture.\
    \ The alien’s sudden disappearance leaves the crew with a dire warning: stopping\
    \ the power transfer is now a matter of survival for both species.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e25
  scene_sequence: 27
  sequence_in_scene: 46
  key_dialogue:
  - 'ROMULAN: "This body is... not mine... it was necessary to assume it... to exist
    in your... time..."'
  - 'ROMULAN: "We had to come... to save them... they were... in danger... Our young...
    are trapped... We must get them out... return them to our time..."'
  - 'PICARD: "Was it you who attacked the Enterprise?" ROMULAN: "Yes... we had to
    stop the power transfer..."'
  - 'ROMULAN: "One other..." PICARD: "Do you know where he is? Can he help us restore
    normal time?"'
