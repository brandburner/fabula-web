- fabula_uuid: cand_evt_scene_d5e6c4fd710932c2_01
  global_id: null
  title: Temporal fragments trap the runabout
  description: "\n  The runabout crew—Geordi at the helm, Data analyzing sensors,\
    \ and Picard overseeing—attempts to evade a destabilizing temporal anomaly using\
    \ Data’s precalculated course corrections. Just as they clear the initial disturbance,\
    \ a second anomaly materializes directly astern, trapping the vessel in an escalating\
    \ space-time crisis. Geordi’s sensors reveal the region is now littered with dozens\
    \ of fragmented temporal disturbances, each with its own localized time flow.\
    \ The discovery forces Picard to confront the fragility of their temporal defenses\
    \ and the urgency of reaching the *Enterprise* before the anomalies consume it\
    \ entirely. The crew’s momentary relief at escaping the first disturbance is shattered\
    \ by the realization that they are now surrounded by unpredictable, potentially\
    \ lethal temporal shards—each one a potential death trap. The scene underscores\
    \ the aliens’ ability to manipulate time unpredictably, raising the stakes for\
    \ the broader conflict and the crew’s survival.\n  "
