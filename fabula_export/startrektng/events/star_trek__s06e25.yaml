      and Data's detection of it marks a turning point in the scene. The core's unstable
      state symbolizes the fragility of the ship's existence and the urgency of resolving
      the crisis before it escalates.
    status_before_event: Operational but unstable, with a breached chamber emitting
      a violent blue-white gas cloud. The core is frozen mid-explosion due to the
