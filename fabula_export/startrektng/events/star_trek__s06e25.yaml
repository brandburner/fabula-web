  title: Picard orders transporter use despite energy crisis
  description: After materializing on the frozen Enterprise bridge—where Romulans
    have overtaken the crew and Riker is trapped in a defensive standoff—Picard assesses
    the situation and prioritizes investigating the temporal anomaly. He orders Geordi
    to use the transporter to beam Troi to Sickbay, but Geordi refuses due to the
    ship's critical power reserves. This exchange highlights the escalating energy
    crisis and the crew's desperate measures to navigate it, while also revealing
    Picard's command urgency and Geordi's engineering pragmatism. The decision to
    use the Jefferies Tubes instead underscores the fragility of their situation and
    the need for alternative solutions. The frozen bridge, with its signs of struggle
    and Romulan presence, serves as a stark visual reminder of the stakes and the
    urgency of their mission.
