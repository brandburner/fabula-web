- fabula_uuid: act_32dd7224d3f236eb
  number: 4
  summary: Following the unexpected time reversal, Data explains that his tricorder
    emissions activated the temporal aperture, causing the temporal flux. They learn
    that the Romulans were attempting to eject their engine core and stop the power
    transfer, further solidifying the idea that the Romulans were not hostile. While
    investigating, Geordi is suddenly attacked by the Romulan-bodied alien seen during
    the brief time resumption. The alien's contact with Geordi's isolation field causes
    him to go into neural shock, rapidly deteriorating. In a desperate move to save
    his life, Troi removes Geordi's armband, freezing him in time, preserving him
    for a potential future rescue. Data scans the unconscious alien, confirming it
    is not Romulan, but an unknown species with a molecular structure in temporal
    flux. Back aboard the Runabout, the alien, now conscious but struggling to maintain
    its form, explains its species mistook the Romulan artificial quantum singularity
    for a natural black hole, intending to use it to incubate their young. The power
    transfer from the Enterprise, however, 'ruptured time' and endangered their offspring.
    The alien confesses to attacking the Enterprise to stop this power transfer, confirming
    their defensive, rather than aggressive, intentions. As the alien's molecular
    structure destabilizes, it reveals there is 'one other' of its kind present before
    fracturing into a kaleidoscope effect and vanishing completely, leaving Picard
    and Troi with more questions than answers and a rapidly dwindling timeframe to
    prevent the Enterprise's destruction.
