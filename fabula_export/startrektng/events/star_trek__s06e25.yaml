  title: Picard sacrifices runabout to sever time lock
  description: 'In a desperate, high-stakes maneuver, Captain Picard remotely pilots
    a Starfleet runabout directly into the alien transfer beam connecting the *Enterprise*
    and the Romulan warbird. The runabout detonates on impact, severing the beam and
    triggering a catastrophic kaleidoscopic fracture in the Romulan vessel. The warbird
    vanishes entirely—erased from frozen time—while the *Enterprise* is freed from
    the temporal anomaly. The explosion is a calculated gamble: Picard risks the runabout
    (and potentially his own life if the plan fails) to restore the ship to normal
    spacetime, demonstrating his willingness to sacrifice resources and personal safety
    to protect his crew and resolve the crisis. The moment underscores the stakes
    of the temporal anomaly and Picard’s leadership under extreme pressure, while
    also serving as the climactic resolution to the immediate threat posed by the
    alien entities and their temporal disruption.'
