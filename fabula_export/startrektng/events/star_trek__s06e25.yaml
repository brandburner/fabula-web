  title: Picard collapses from temporal narcosis
  description: "\n  In Engineering, Data confirms the warp core breach is expanding\
    \ despite the frozen timeline, revealing time is advancing imperceptibly. The\
    \ discovery of a power transfer between the *Enterprise* and the Romulan warbird\
    \ suggests a deeper connection between the ships. As Picard studies the breach,\
    \ he begins laughing uncontrollably, drawing a smiling face in the gaseous cloud—a\
    \ sign of temporal narcosis. Troi and Data rush to his aid as he stumbles, dizzy\
    \ and panicked, before collapsing. The scene underscores the escalating temporal\
    \ distortions and Picard’s vulnerability, marking a critical turning point in\
    \ the crisis. The power transfer hints at unresolved tensions between the ships,\
    \ while Picard’s breakdown foreshadows the crew’s growing instability under the\
    \ anomaly’s effects.\n  "
