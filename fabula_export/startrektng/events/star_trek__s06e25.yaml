  title: Data questions his perception of time
  description: "\n  In a rare moment of vulnerability, Data invites Riker into his\
    \ quarters to reveal his ongoing experiment with human time perception. After\
    \ sixty-two trials of boiling water, he admits his internal chronometer prevents\
    \ him from experiencing time subjectively—unlike humans, who describe time as\
    \ 'slow' or 'fast' depending on context. Riker, recognizing Data's existential\
    \ frustration, playfully suggests disabling his chronometer to 'see what happens.'\
    \ The exchange underscores Data's growing curiosity about human experience while\
    \ foreshadowing his future attempts to bridge the machine-human divide. The scene\
    \ contrasts Data's scientific precision with Riker's intuitive understanding of\
    \ human subjectivity, reinforcing the android's isolation even as he seeks connection.\
    \ The kettle's whistle—both a literal and symbolic marker of time—serves as a\
    \ recurring motif, highlighting Data's struggle to reconcile objective measurement\
    \ with subjective experience. The moment is quiet but charged, revealing Data's\
    \ quiet desperation beneath his usual composure.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e25
  scene_sequence: 42
  sequence_in_scene: 63
  key_dialogue:
  - 'DATA: Recent events have compelled me to study how humans perceive the passage
    of time. For example, I have often heard people comment that time seems to pass
    more ''slowly'' in one instance, or more ''quickly'' in another. Yet in reality,
    the actual passage of time remains fixed.'
  - 'RIKER: Why don''t you turn it off? Data... people don''t have internal chronometers.
    See what happens when you turn yours off.'
  - 'DATA: Thank you, Commander. I will try that.'
