  title: Runabout’s impossible fuel drain reveals temporal anomaly
  description: 'The *Runabout* suffers a sudden, violent engine failure mid-flight,
    forcing Data to stabilize the ship while Geordi discovers the starboard antimatter
    pod has been completely drained—an impossible scenario given the vessel’s operational
