- fabula_uuid: act_55dbf299a8268e22
  number: 2
  summary: 'Observing the frozen Enterprise and Warbird, Picard''s team determines
    both ships are trapped within a converging temporal fragment, preventing life
    sign scans. Realizing they cannot simply beam aboard without being frozen themselves,
    Picard challenges Data and Geordi to devise a solution. They ingeniously reconfigure
    transporter armbands to create localized, skin-tight subspace fields, allowing
    them to move freely within the frozen timeframe. Equipped with these experimental
    devices, Picard, Data, and Troi beam onto the Enterprise bridge, which is a tableau
    of frozen chaos: Romulans and Starfleet crew locked in a standoff, consoles flashing,
    and some damage visible. Picard notes the absence of security officers and the
    presence of unarmed Romulans, raising questions about the nature of the conflict.
    Data discovers evidence of a massive power surge in Engineering, while Picard
    finds security teams were dispatched to Transporter Room Three and Sickbay. Splitting
    up, Troi heads to Sickbay, Data to Engineering, and Picard to Transporter Room
    Three. Troi''s investigation in Sickbay yields a grim discovery: Dr. Crusher has
    been hit by a disruptor blast, frozen mid-death. As Troi leaves, she notices a
    Romulan woman, previously thought frozen, whose eyes follow her, revealing that
    at least one Romulan is not affected by the temporal stasis, adding a layer of
    intrigue and danger to their mission.'
  key_moments: []
