  title: Gowron defeats Kahless in ritual duel
  description: "\n  In the holodeck temple, Gowron challenges Kahless to a ritual\
    \ duel after questioning his authenticity. Kahless, though initially confident,\
    \ is physically and tactically outmatched by Gowron, who exploits his superior\
    \ strength and combat experience. The duel escalates until Gowron disarms Kahless\
    \ and pins him, moments from delivering a fatal blow. Worf intervenes, stopping\
    \ Gowron's strike—an act that inadvertently validates Gowron's claim that Kahless\
    \ is an imposter. The defeat shatters Kahless's divine aura, exposing his vulnerability\
    \ and forcing Worf to confront the painful truth: Kahless is not the legendary\
    \ warrior he claimed to be. The scene culminates in Worf's violent confrontation\
    \ with Koroth, who confesses that Kahless is a genetically engineered clone with\
    \ implanted memories, collapsing the mythos and fracturing Worf's faith. The revelation\
    \ sets the stage for a civil war rooted in shattered belief and forces Worf to\
    \ choose between loyalty to the Empire and devotion to a false messiah.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e23
  scene_sequence: 26
  sequence_in_scene: 44
  key_dialogue:
  - 'GOWRON: I oppose you. I say you are not Kahless... and I will not bend my knee
    to you as long as I can draw a breath or pick up a blade.'
  - 'KAHLESS: You have no joy, Gowron. Is your heart so filled with distrust and suspicion
    that you have forgotten what it is to be truly Klingon.'
  - 'WORF: There is no future here... no glorious new era for our people. Gowron was
    right, you don''t know the name of the man who faced the storm... you don''t even
    know what real Warnog tastes like... and you certainly are not the greatest warrior
    of all.'
  - 'KOROTH: The problems with your memory... are a result of... the way you returned.
    We -- the Guardians -- have been awaiting your return for centuries. But we did
    not have the technology to bring you back until now. We were able to use an organic
    sample of the first Kahless to... give you life.'
  - 'WORF: A clone. He is a clone. A being created in a laboratory... from genetic
    material taken from another being. You are a copy... a fraud.'
