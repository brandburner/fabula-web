- fabula_uuid: act_7bd5e7ead0a243a0
  number: 5
  summary: 'Act Five resolves the immediate crisis of Kahless''s identity and establishes
    a new path for the Klingon Empire. Worf, his faith shattered by Kahless''s defeat,
    confronts Kahless and Koroth, declaring Kahless a fraud. Under Worf''s deadly
    threat, Koroth confesses the truth: Kahless is a clone, created by the Guardians
    using genetic material and implanted memories from sacred texts. Kahless is shocked
    by this revelation. Koroth defends their actions, arguing that a symbol of Kahless
    is desperately needed to unite the corrupt Empire. Worf, disgusted, initially
    intends to expose the truth to Gowron, but Koroth warns that doing so would destroy
    Kahless and plunge the Empire into civil war. Worf, conflicted, observes two Klingons
    who still believe in Kahless despite his defeat, and Data shares his own ''leap
    of faith'' story regarding his identity. These insights lead Worf to a new understanding.
    He returns to Gowron and Koroth, revealing Kahless is a clone but arguing that
    his symbolic power is real and necessary. Worf proposes a radical solution: Kahless
    should become a spiritual figurehead, an Emperor without political power, to morally
    guide the Klingon people. He emphasizes that this will avert civil war, threatening
    Gowron with conflict if he refuses. Gowron, recognizing the precarious situation,
    reluctantly agrees, kneeling before Kahless. Worf and Koroth follow suit, establishing
    a new era for the Klingon Empire. In a poignant farewell, Worf expresses his continued
    spiritual emptiness. Kahless, demonstrating a newfound wisdom and leadership,
    offers Worf comfort: the message and teachings of Kahless are more important than
    the man himself. Worf departs with a renewed understanding, leaving Kahless to
    embrace his new role as a spiritual leader.'
