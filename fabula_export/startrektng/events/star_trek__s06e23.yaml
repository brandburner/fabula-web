    \ declares the crew’s role is neutral transport, but the exchange leaves Worf’s\
    \ loyalty and conviction unsettled. The scene underscores the tension between\
    \ tradition and duty, setting up Worf’s internal struggle as the crew prepares\
    \ to deliver Kahless to the Home World.\n  "
