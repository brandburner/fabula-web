  title: Picard learns of Worf’s uncharacteristic instability
  description: 'In the ready room, Riker reports Worf’s alarming behavioral shifts—uncharacteristic
    sloppiness in duty reports, distracted maintenance checks, and a recent episode
    where he abruptly ended a personal ritual without explanation. Picard, initially
    unaware of the severity, is visibly surprised by Riker’s admission that this isn’t
    an isolated incident. The revelation forces Picard to bypass protocol and intervene
    personally, signaling the gravity of Worf’s emotional turmoil. Riker’s confession
    that he confined Worf to quarters underscores the crew’s growing concern over
    his reliability, particularly as the Kahless crisis looms. Picard’s immediate
    decision to leave the bridge and address the issue directly marks a turning point:
    Worf’s spiritual crisis is no longer a private struggle but a mission-critical
    vulnerability that demands the captain’s attention as both a leader and a mentor.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e23
  scene_sequence: 4
  sequence_in_scene: 5
  key_dialogue:
  - 'PICARD: He had no explanation at all?'
  - 'RIKER: Not a word. He just got dressed and then reported for duty as if nothing
    had happened. Captain, this isn''t the first... problem I''ve had with Worf lately.'
  - 'RIKER: Until now, it wasn''t anything serious so I didn''t bring it to your attention.
    But, to be blunt, he''s been getting... sloppy. His duty reports have been incomplete,
    he''s fallen behind in maintenance checks, he just seems... distracted.'
  - 'PICARD: Where''s Worf now?'
  - 'RIKER: I confined him to quarters.'
