      as Koroth’s recitation of *The Promise* invokes the very flames Worf once sat
      before in vain. The firepit’s memory acts as a silent counterpoint to the star
      on the wall, a reminder that Worf’s spiritual journey has been marked by silence
      where others have heard divine voices. Its absence in this scene underscores
      the finality of his departure—there are no more fires to sit before, no more
      rituals to endure.
    status_before_event: Extinguished in the lava cave after Divok’s vision, its embers
      cold. The firepit’s role in the earlier ritual has already been fulfilled, leaving
      Worf with nothing but ashes.
    status_after_event: Irrelevant to this moment, as Worf has moved beyond the physical
      space of the cave. Its symbolic weight, however, remains as a ghost of his failed
      quest.
