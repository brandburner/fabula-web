- fabula_uuid: cand_evt_scene_72f5f9a27aaacdbd_01
  global_id: null
  title: Worf’s Faith Fractures on Boreth
  description: "\n  Worf’s prolonged spiritual drought on Boreth reaches a breaking\
    \ point after ten days of ritual fasting and meditation yield no visions of Kahless.\
    \ While other Klingons—including the young warrior Divok—experience profound mystical\
    \ encounters, Worf remains unanswered, his frustration palpable. Divok’s ecstatic\
    \ vision of Kahless, where the messiah beckons him to Sto-Vo-Kor, contrasts sharply\
    \ with Worf’s silence, deepening his sense of failure. When Koroth, the Head Cleric,\
    \ challenges Worf’s resolve by invoking the ancient *Promise* of Kahless’s return,\
    \ Worf’s doubt hardens into disillusionment. Koroth’s rebuke—‘Is the son of Mogh\
    \ really so easily discouraged?’—exposes the chasm between Worf’s personal crisis\
    \ and the unshakable faith of his people. The scene crystallizes Worf’s existential\
    \ fracture: his Klingon identity is tied to a faith he can no longer access, and\
    \ his Starfleet duty feels increasingly distant. His decision to pack his belongings\
    \ signals a turning point—either toward abandonment of his quest or a reckoning\
    \ with the consequences of his doubt. The tension between Worf’s internal collapse\
    \ and the fervor of the other Klingons foreshadows the ideological schism that\
    \ will divide the Empire, with Worf’s disillusionment threatening to undermine\
    \ the crew’s mission to verify Kahless’s authenticity.\n  "
