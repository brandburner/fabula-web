  key_dialogue:
  - |-
    KAHLESS: What is it you are doing?
    WORF: I was getting my tricorder.
    KAHLESS: Tri-Corder? Is it a weapon?
    WORF: No. It is a tool. I was going to use it to see if you were...
  - |-
    KAHLESS: We have met before. I appeared to you in a vision... in the caves of No'Mat... you were a child then... and I told you... that you would do something... no Klingon had ever done before.
    WORF: ((stunned)) Yes...
    KAHLESS: Was I ... correct?
    WORF: ((nods)) I... am the first Klingon to serve in Starfleet.
  - |-
    WORF: Why did you appear when I was in the cave? Why not appear to Koroth, or Torin?
    KAHLESS: Perhaps it is because you have the heart of a true warrior.
    KAHLESS: You still do not believe it is me, do you Worf?
    WORF: I... want to believe.
    KAHLESS: That is a ... beginning...
