- fabula_uuid: cand_evt_scene_72f5f9a27aaacdbd_02
  global_id: null
  title: Koroth Challenges Worf’s Faltering Faith
  description: "\n  Worf, exhausted and disillusioned after ten days of failed visions\
    \ on Boreth, prepares to abandon his spiritual quest. Koroth, the Head Cleric,\
    \ intercepts him and forces a confrontation by invoking the Klingon prophecy of\
    \ Kahless’s return. Through a recitation of *The Promise*—a foundational myth\
    \ about Kahless’s departure and eventual return—Koroth exposes Worf’s self-doubt,\
    \ framing his crisis not as a personal failure but as a test of his lineage and\
    \ devotion. The exchange escalates from frustration to existential confrontation,\
    \ with Koroth’s final ultimatum—*‘Open your heart to Kahless… or return to your\
    \ starship’*—laying bare the stakes: Worf’s faith is not just a private struggle\
    \ but a defining choice between his Klingon heritage and his Starfleet identity.\
    \ The scene pivots from Worf’s quiet resignation to a charged moment where his\
    \ next decision will determine whether he remains a warrior of belief or a soldier\
    \ of duty.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e23
  scene_sequence: 6
  sequence_in_scene: 9
  key_dialogue: &id009
  - 'WORF: It has been ten days, Koroth. But I have had no visions... I have received
    no insight. There is nothing for me here.'
  - 'KOROTH: What is the story of *The Promise*, Worf?'
  - 'WORF: When Kahless united the people and gave them the laws of honor, he saw
    that his work was done. So one night he gathered his belongings and went to the
    edge of the city to say good-bye... The people wept... they did not want him to
    go. And Kahless said, ''You are Klingons. You need no one but yourselves. I will
    go now... to Sto-Vo-Kor. But I promise one day I will return.'' Then Kahless pointed
    to a star in the sky and said, ''Look for me there... on that point of light.'''
  - 'KOROTH: So here we are... on a world circling that distant point of light. It
    has been over fifteen centuries since he made that promise... and still we wait.
    What are ten days in the life of one Klingon compared to that? Is the son of Mogh
    really so easily discouraged?'
  - 'KOROTH: You came to us seeking answers... but this is a place of questions. Open
    your heart to Kahless... ask him your questions... let him speak to you with your
    mind unclouded by doubt or hesitation. Only then can you find what you are looking
    for. If you cannot do that... then perhaps you should return to your starship.'
