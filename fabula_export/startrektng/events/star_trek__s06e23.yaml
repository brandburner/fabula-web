  title: Worf Asserts Authority Over Koroth
  description: Worf deliberately bypasses Koroth’s authority by arranging a Holodeck
    meeting with Kahless—approved by Kahless himself—without Koroth’s knowledge or
    consent. The confrontation outside the Holodeck doors reveals Koroth’s unease,
    as Worf’s growing influence and loyalty to Kahless begin to eclipse Koroth’s traditional
    role as spiritual guardian. The exchange underscores the shifting power dynamics
    between them, with Worf’s ambition and faith in Kahless now superseding Koroth’s
    institutional authority. This moment foreshadows Worf’s eventual betrayal of Koroth’s
    trust and sets up the broader conflict over Kahless’s legitimacy within the Klingon
    Empire. The tension is palpable as Koroth’s controlled response—‘Yes. Yes, of
    course he did.’—hints at his simmering resentment and the fragility of their alliance.
