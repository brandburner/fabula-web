    others just like them... not everyone... but enough to plunge the Empire into
    civil war if you oppose them.'
  - 'WORF: Real power is in the heart. You would have the power to mold the Klingon
    heart... you could return them to honorable ways... according to the original
    teachings of Kahless, which are within you.'
  - 'KAHLESS: It is acceptable.'
  - 'GOWRON: Vorcha-doh-baghK... Kahless.'
