  global_id: null
  title: Worf confronts blind faith in Kahless
  description: "\n  Worf enters the holodeck temple to find two anonymous Klingons\
    \ in silent devotion to Kahless, their faith unshaken despite his recent defeat\
    \ at Gowron's hands. Their steadfastness triggers Worf's contempt—he dismisses\
    \ them as fools, revealing his own wavering belief. Data observes this exchange\
    \ and probes Worf's spiritual crisis, revealing that even an android must make\
    \ 'leaps of faith' to define his identity. The moment forces Worf to confront\
    \ the fragility of his convictions and the ideological divide within Klingon society,\
    \ where blind devotion clashes with rational doubt. The scene underscores the\
    \ tension between tradition and pragmatism, setting up Worf's eventual reckoning\
    \ with Kahless's authenticity and his own role in the Empire's future.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e23
  scene_sequence: 28
  sequence_in_scene: 48
  key_dialogue:
  - 'WORF: Then they are fools.'
  - 'DATA: Does that mean you no longer believe this is the real Kahless?'
  - 'WORF: Yes.'
  - 'DATA: I understand your dilemma. I once had what could be considered a crisis
    of the spirit... I chose to believe that I was a person, that I had the potential
    to become more than a collection of circuits and subprocessors. It is a belief
    that I still hold.'
  - 'DATA: I believe I made a... ''leap of faith.'''
