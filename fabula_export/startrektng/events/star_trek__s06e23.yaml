  global_id: null
  title: Gowron fears Kahless’s ideological threat
  description: 'Gowron storms into the *Enterprise* corridor with Picard, his aggression
    barely concealing his existential dread of Kahless’s return—not as a man, but
    as a destabilizing *idea*. He demands immediate medical analysis to expose Kahless
    as a fraud, revealing his paranoia that the legend’s power could unravel the Klingon
    Empire’s political order. Picard’s calm resistance forces Gowron to articulate
    his fear: that faith in Kahless could replace loyalty to Gowron’s rule, leaving
    him vulnerable. The exchange exposes Gowron’s fragility as a leader, his reliance
    on force over ideology, and the latent danger Kahless’s myth poses to the Empire’s
    hierarchy. The moment crystallizes the ideological divide between traditionalists
    and believers, with Worf’s loyalty now the fulcrum of the Empire’s future.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e23
  scene_sequence: 20
  sequence_in_scene: 35
  key_dialogue:
  - 'GOWRON: What have you learned about him so far? What kind of medical analysis
    have you done? Do you have any theories about his true origin?'
  - 'PICARD: We haven''t done any analyses.'
  - 'GOWRON: What kind of fools do you have working for you, Picard? The imposter''s
    been aboard for nearly a day.'
  - 'PICARD: If you wanted to run tests on Kahless, you should''ve sent a Klingon
    vessel for him.'
  - 'GOWRON: And have him begin spreading his poisonous lies through a ship of loyal
    Klingons? Never.'
  - 'PICARD: If he''s really an imposter you shouldn''t have anything to worry about.'
  - 'GOWRON: Kahless has been dead for a thousand years... but the idea of Kahless
    is still alive. Have you ever fought an idea, Picard? It has no weapon to destroy,
    no body to kill. The idea of Kahless return must be stopped here. Now. Or it will
    travel through the Empire like a wave... and leave nothing but destruction behind.'
