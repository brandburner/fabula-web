acts:
- fabula_uuid: act_743ef94d7e38cd9b
  number: 1
  summary: Act One establishes Worf's profound spiritual crisis and sets the stage
    for the central conflict. The Enterprise is en route to the Gariman system when
    Riker discovers Worf in his quarters, engaged in a highly unusual and intense
    Klingon ceremonial trance. Worf's uncharacteristic tardiness and disheveled state
    alarm Riker and Picard, prompting a confrontation. Worf, initially reticent, reveals
    his inner turmoil stems from his attempts to teach young Klingons about their
    heritage, particularly the legend of Kahless. He feels his own faith is lacking
    and seeks a vision of the legendary warrior. Picard, understanding Worf's unique
    position as a Starfleet Klingon, grants him leave to Boreth, a sacred Klingon
    site where followers await Kahless's return. On Boreth, Worf joins other Klingons
    in a ritualistic quest for a vision. While others claim to see Kahless, Worf remains
    unfulfilled, deepening his disappointment. Koroth, the Head Cleric, encourages
    Worf to persist, reminding him of Kahless's ancient promise to return. Worf, renewed
    in his resolve, returns to the lava cave. During a subsequent ritual, a figure
    claiming to be Kahless materializes, visible to all present, culminating in Kahless's
    declaration of his return, leaving Worf in a state of awe and disbelief.
