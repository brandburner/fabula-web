  title: Riker detects Worf’s unexplained absence
  description: "\n  Riker relieves Data on the bridge during a routine shift change,\
    \ but immediately notices Worf’s conspicuous absence from his post at Tactical—a\
    \ deviation from his disciplined routine. The Ensign on duty, Torigan, remains\
    \ unrelieved, and Data confirms Worf’s uncharacteristic tardiness. Riker’s concern\
    \ escalates when the computer locates Worf in his quarters, an unusual location\
    \ for this time of day. The exchange between Riker and Data is terse but loaded\
    \ with subtext: Riker’s frown and abrupt decision to investigate signal his suspicion\
    \ that Worf’s faith in Kahless’ return is compromising his judgment. The moment\
    \ marks a critical escalation in the crew’s efforts to contain Worf’s emotional\
    \ and ideological crisis before it destabilizes the mission. Riker’s decision\
    \ to dispatch Security to Worf’s quarters underscores the urgency of the situation,\
    \ framing this as a turning point where Worf’s personal turmoil begins to threaten\
    \ the Enterprise’s neutrality in the Klingon political crisis.\n  "
