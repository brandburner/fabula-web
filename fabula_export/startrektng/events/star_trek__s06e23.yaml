- fabula_uuid: act_bfaef4161e0e8a4f
  number: 2
  summary: Act Two details the immediate aftermath of Kahless's appearance and the
    initial efforts to verify his identity, while also introducing the political implications
    of his return. Kahless enters the Temple on Boreth, commanding attention. Koroth,
    the Head Cleric, initially questions Kahless's authenticity. Kahless, however,
    silences doubts by recounting the secret, unwritten story of how his bat'leth
    was forged, a detail known only to the High Clerics. This revelation convinces
    Koroth and the assembled Klingons, who kneel in reverence. Worf, still uncertain,
    scans Kahless with a tricorder, confirming his biological Klingon nature. Kahless
    then reveals a shared 'vision' from Worf's childhood, further solidifying Worf's
    desire to believe. Meanwhile, Starfleet Command orders the Enterprise to transport
    Kahless to the Klingon Homeworld, at Gowron's request, raising suspicions about
    Gowron's motives. Back on Boreth, a celebration ensues. Kahless and Worf engage
    in a public debate about leadership, culminating in a bat'leth fight. Kahless,
    rather than fighting to the death, transforms the duel into a joyful expression
    of Klingon spirit, embracing Worf and seemingly winning his full acceptance, despite
    Worf's earlier doubts.
