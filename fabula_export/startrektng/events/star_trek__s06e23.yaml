    description_of_involvement: Kahless’s shuttlecraft serves as the Klingons’ transport
      to the *Enterprise*, symbolizing their arrival from Boreth and their separation
      from Klingon space. Its rugged design and functional aesthetic contrast with
      the sleek, advanced technology of the shuttlebay, reinforcing the cultural divide.
      The shuttlecraft’s doors hiss open to reveal Kahless striding out first, followed
      by Koroth, Torin, and Worf, framing their entrance as a deliberate and regal
      procession. Its presence underscores the Klingons’ self-sufficiency and their
      reluctance to fully integrate with Starfleet technology.
    status_before_event: Docked on Boreth, fully operational and prepared for the
      journey to the *Enterprise*.
    status_after_event: Parked in the *Enterprise* shuttlebay, doors open, with Kahless
      and his entourage disembarked. The shuttle remains under the *Enterprise*’s
      control but is treated as Klingon territory by Koroth.
