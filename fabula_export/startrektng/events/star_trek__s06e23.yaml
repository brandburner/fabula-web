  global_id: null
  title: Worf’s Faith Crisis and Kahless’ Challenge
  description: "\n  Worf’s private confrontation with Kahless in his quarters escalates\
    \ from skepticism to raw emotional vulnerability. After Kahless catches Worf scanning\
    \ him with a tricorder—an act of quiet defiance against the messiah’s claims—the\
    \ scene pivots when Kahless reveals intimate knowledge of Worf’s childhood vision,\
    \ a memory Worf has never shared. The revelation forces Worf to confront his buried\
    \ desire to believe, even as his rational mind resists. Kahless’s refusal to answer\
    \ Worf’s direct question—*‘Why me?’*—instead pivots to praise Worf’s warrior’s\
    \ heart, creating a moment of emotional disarmament. Worf’s admission that he\
    \ *wants* to believe becomes the turning point, bridging his crisis of faith and\
    \ setting the stage for their shared mission. The exchange underscores Kahless’s\
    \ psychological insight and Worf’s internal conflict, while the tricorder scan\
    \ (which confirms Kahless’s Klingon biology) serves as a narrative fulcrum: it\
    \ neither proves nor disproves Kahless’s divinity, but instead forces Worf to\
    \ choose between faith and doubt. The scene’s intimacy and emotional stakes make\
    \ it a critical juncture in Worf’s arc and the broader Klingon civil war narrative.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e23
  scene_sequence: 10
