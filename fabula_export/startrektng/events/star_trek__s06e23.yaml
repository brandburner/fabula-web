- fabula_uuid: cand_evt_scene_9c29a1254c41ce99_04
  global_id: null
  title: Worf confronts Kahless' artificial origins
  description: "\n  In the Holodeck temple, Worf—consumed by disillusionment after\
    \ Kahless' defeat by Gowron—publicly accuses the messiah of being a fraud. Under\
    \ Worf's violent threat, Koroth confesses that Kahless is a genetically engineered\
    \ clone with implanted memories, collapsing Kahless' self-perception and the Klingon\
    \ Empire's sacred mythos in a single stroke. The revelation fractures Worf's faith\
    \ and forces him to confront an impossible choice: expose the deception and risk\
    \ destroying Klingon hope, or uphold the lie to preserve the Empire's survival.\
    \ The scene becomes a turning point where Worf's loyalty to truth clashes with\
    \ his duty to the Empire, with Kahless' very existence now a weapon of moral dilemma.\
    \ Koroth pleads with Worf to reconsider, warning that exposing the truth will\
    \ destroy the last hope for the Klingons, while Worf—disgusted by the deception—exits,\
    \ leaving the fate of the Empire hanging in the balance.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e23
  scene_sequence: 26
  sequence_in_scene: 46
  key_dialogue:
  - 'WORF: ((hard)) There is no future here... no glorious new era for our people.
    (moves to Kahless) Gowron was right, you don''t know the name of the man who faced
    the storm... you don''t even know what real Warnog tastes like... and you certainly
    are not the greatest warrior of all. Whoever you are... you''re not Kahless.'
  - 'KOROTH: ((to Kahless)) You are not ''just'' a copy. We gave you more than the
    body of Kahless. TORIN: We found a way to imprint specific information into your
    neurosynaptic patterns... we gave you memories. And not just any memories... we
    gave you the experiences of Kahless as written in the sacred texts.'
  - 'WORF: ((disgusted)) A being created in a laboratory... from genetic material
    taken from another being. You are a copy... a fraud. KOROTH: ((defensive)) You
    are twisting the truth. WORF: You talk to me about the truth? You, who have brought
    this... lie to life and then called it Kahless? KOROTH: It is not a lie! Genetically,
    he is Kahless. And he is needed by our people. You know better than anyone the
    corruption and dishonor that is destroying the Empire. They need him.'
