- fabula_uuid: cand_evt_scene_ba294bef32ed0af7_02
  global_id: null
  title: Data shares his leap of faith
  description: 'In the holodeck temple, Worf discovers two Klingon followers still
    waiting for Kahless despite his defeat, their unwavering faith provoking Worf''s
    disdain. Data reveals they refused transport, choosing to remain in devotion.
    When Worf admits his own faltering belief in Kahless''s return, Data confesses
    to his own existential crisis—his struggle to define himself beyond his programming.
    He describes his ''leap of faith'' in choosing to believe he is more than a machine,
    a revelation that forces Worf to confront the fragility of his own convictions
    and the possibility that faith, like truth, may be a spectrum rather than an absolute.
    The exchange underscores Worf''s spiritual crisis while offering a counterpoint:
    even an android must embrace uncertainty to define his identity. This moment becomes
    a turning point for Worf, as Data''s vulnerability challenges his rigid Klingon
    worldview and plants the seed for his eventual confrontation with Koroth and Gowron
    over Kahless''s authenticity.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e23
  scene_sequence: 28
  sequence_in_scene: 49
  key_dialogue:
  - 'DATA: They have been here for three minutes. They refused to transport back to
    the ship with the rest of Gowron''s men. They insisted on waiting here until they
    see Kahless again. Their faith appears to be unaffected by his inability to defeat
    Gowron. They still believe.'
  - 'WORF: Then they are fools.'
  - 'DATA: Does that mean you no longer believe this is the real Kahless?'
  - 'WORF: Yes.'
  - 'DATA: I am curious. Do you still believe that the real Kahless will return someday?
    Or has this experience only deepened the spiritual crisis which originally sent
    you to Boreth?'
  - 'WORF: I... do not know.'
  - 'DATA: I understand your dilemma. I once had what could be considered a crisis
    of the spirit. The Starfleet officers who first activated me on Omicron Theta
    told me that I was an android—nothing more than a very sophisticated machine in
    human form. However, I realized that if I were simply a machine, then I could
    never be anything else—I could not grow beyond my programming. I found that difficult
    to accept. I chose to believe that I was a person, that I had the potential to
    become more than a collection of circuits and subprocessors. It is a belief that
    I still hold.'
  - 'WORF: How did you come to your decision?'
  - 'DATA: I believe I made a... ''leap of faith.'''
