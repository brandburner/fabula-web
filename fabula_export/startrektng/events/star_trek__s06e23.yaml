  title: Kahless Manifests in the Lava Caves
  description: "\n  In the sacred lava caves of Boreth, Worf undergoes a ritual to\
    \ summon Kahless, his faith pushed to its limits. As he chants the sacred words—Torva,\
    \ Luk, Do, Shell—smoke and light coalesce into the physical form of Kahless, the\
    \ long-dead Klingon messiah, standing before him. Worf, overwhelmed by awe, reaches\
    \ out and clasps hands with Kahless, only to realize others—including Divok and\
    \ Torin—can also see him. The moment shatters the Klingons present, with Divok\
    \ fleeing in terror, while Kahless declares his return in a voice of unshakable\
    \ authority. This manifestation is not just a personal revelation for Worf but\
    \ a seismic event that forces the Klingon Empire to confront the reality of Kahless’s\
    \ return, setting the stage for a civil war. The scene marks the first public\
    \ confirmation of Kahless’s existence, forcing Worf to reconcile his faith with\
    \ the political chaos that will follow.\n  "
