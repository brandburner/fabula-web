- fabula_uuid: cand_evt_scene_bd218e01282110d5_01
  global_id: null
  title: Kahless challenges Worf’s skepticism in public
  description: "\n  In the midst of a raucous Klingon celebration honoring Kahless’s\
    \ return, Torin warns Kahless of Gowron’s potential opposition, but Kahless dismisses\
    \ the threat with unshakable confidence, declaring the dawn of a new era. Worf,\
    \ seated apart from the revelry, remains visibly skeptical, his reserved demeanor\
    \ drawing Kahless’s attention. Kahless publicly taunts Worf for his persistent\
    \ questioning, framing it as a betrayal of Klingon spirit—escalating their ideological\
    \ clash into a physical confrontation. The two engage in a ritualized bat’leth\
    \ duel, evenly matched, until Kahless abruptly breaks the tension with laughter,\
    \ reframing the fight as a celebration of Klingon joy rather than mere bloodlust.\
    \ The crowd, initially stunned, erupts into exultant cheers, and Kahless—now arm-in-arm\
    \ with Worf—leads the gathering in a rousing affirmation of their shared identity.\
    \ The moment forces Worf to confront whether his critical thinking is a strength\
    \ or a flaw in the face of divine authority, deepening his internal conflict between\
    \ duty and belief while reinforcing Kahless’s charismatic hold over the Klingon\
    \ faithful.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e23
  scene_sequence: 13
  sequence_in_scene: 22
  key_dialogue:
  - 'TORIN: Gowron is the Leader of the Council... he commands the entire Defense
    Force... if he chooses to oppose you...'
  - 'KAHLESS: But do not forget that a leader need not answer questions from those
    he leads... it is enough that he says to do a thing... and they will do it. If
    he says to run, they run... if he says to fight, they fight... if he says to die...
    they die.'
  - 'WORF: Yes. If the... commander is worthy of their trust.'
  - 'KAHLESS: What is wrong? Is there only anger and bloodlust in your souls? Is that
    all that is left in the Klingon heart? We do not fight merely to spill blood,
    but to enrich the spirit.'
  is_flashback: false
