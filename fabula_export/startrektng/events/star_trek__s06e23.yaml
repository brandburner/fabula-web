  title: Gowron challenges Kahless to a duel
  description: "\n  The Holodeck temple becomes the stage for a volatile confrontation\
    \ between Gowron and Kahless, as the Klingon Chancellor publicly challenges the\
    \ returned messiah's legitimacy. Gowron, skeptical of Kahless's authenticity,\
    \ demands historical details about Kahless's past—specifically the name of a man\
    \ who defied a storm—only to be met with evasive answers. This exchange escalates\
    \ into a ritual duel, where Gowron's tactical superiority quickly overpowers Kahless,\
    \ exposing his physical limitations. Worf's desperate intervention to save Kahless\
    \ inadvertently validates Gowron's claim of fraud, deepening the crisis of faith.\
    \ The scene culminates in Kahless's defeat and Worf's subsequent confrontation\
    \ with Koroth, who confesses to cloning Kahless to unite the Klingon Empire. This\
    \ revelation fractures Worf's loyalty, forcing him to choose between duty and\
    \ devotion as the political and spiritual future of the Klingon Empire hangs in\
    \ the balance.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e23
  scene_sequence: 26
  sequence_in_scene: 43
  key_dialogue:
  - |-
    GOWRON: What was his name?
    KAHLESS: What?
    GOWRON: If you were really there, you should be able to tell us the name of the man outside the walls.
  - 'KAHLESS: You have no joy, Gowron. Is your heart so filled with distrust and suspicion
    that you have forgotten what it is to be truly Klingon.'
  - 'WORF: There is no future here... no glorious new era for our people. Gowron was
    right, you don''t know the name of the man who faced the storm... you don''t even
    know what real Warnog tastes like... and you certainly are not the greatest warrior
    of all. Whoever you are... you''re not Kahless.'
