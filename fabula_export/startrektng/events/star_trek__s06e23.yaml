    description_of_involvement: The Knife of Kirom, a sacred relic stained with the
      blood of the original Kahless, is brought into the room by Gowron’s order—a
      direct challenge to Klingon tradition. Its presence is a catalyst for the conflict,
      symbolizing the clash between faith and science. Koroth and Torin react with
      horror at its removal from the sacred vault, while Picard frames it as the key
      to Gowron’s genetic test. The knife is not just an object; it is a battleground
      for the souls of the Klingon people. When a medical scanner is waved over it,
      the blood—once a symbol of divine legacy—becomes mere evidence, foreshadowing
      Beverly Crusher’s impending analysis and the potential unraveling of Koroth’s
      deception.
    status_before_event: Secured in the sacred vault on Boreth, untouched and revered
      as an inviolable relic of Klingon faith.
    status_after_event: Removed from the vault and brought aboard the *Enterprise*,
      its blood sampled for genetic analysis. The act of scanning it marks the first
      step in its transformation from sacred object to empirical evidence.
