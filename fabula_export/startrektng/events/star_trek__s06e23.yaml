- fabula_uuid: cand_evt_scene_9c29a1254c41ce99_03
  global_id: null
  title: Worf forces Koroth to reveal Kahless' truth
  description: 'After Kahless is humiliated by Gowron in a brutal duel—exposed as
    physically inferior and unable to answer Gowron’s probing questions about his
    past—Worf’s faith shatters. He confronts Kahless, accusing him of being an imposter,
    and when Koroth attempts to silence him, Worf violently threatens the cleric,
    forcing Koroth to confess the truth: Kahless is a genetically engineered clone
    with implanted memories, created by the Guardians to restore Klingon faith. The
    revelation fractures Kahless’ self-perception, exposes the Guardians’ deception,
    and sets Worf on a path to expose the fraud, regardless of the consequences for
    the Empire. The scene escalates from physical confrontation to psychological unraveling,
    with Worf’s rage and disillusionment driving the climax. Koroth’s desperate plea
    for Worf to consider the greater good—preserving hope for the Klingon people—fails
    to sway him, leaving the future of the Empire in jeopardy and Worf’s loyalty to
    Starfleet and truth irrevocably tested.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e23
  scene_sequence: 26
  sequence_in_scene: 45
  key_dialogue:
  - 'WORF: "There is no future here... no glorious new era for our people. Gowron
    was right, you don''t know the name of the man who faced the storm... you don''t
    even know what real Warnog tastes like... and you certainly are not the greatest
    warrior of all. Whoever you are... you''re not Kahless."'
  - 'WORF: "You are using the name of Kahless in some twisted game... for that alone
    you should die... and if you do not tell me what you have done, I will kill you
    right here."'
  - 'KOROTH: "The problems with your memory... are a result of... the way you returned.
    We -- the Guardians -- have been awaiting your return for centuries. But we did
    not have the technology to bring you back until now. We were able to use an organic
    sample of the first Kahless to... give you life."'
  - 'WORF: "A clone. He is a clone."'
  - 'WORF: "You talk to me about the truth? You, who have brought this... lie to life
    and then called it Kahless?"'
  - 'KOROTH: "All right. I won''t tell you what to do. But consider this: Do you want
    Gowron''s corruption to infect every corner of the Empire? Do you want our people
    to continue sacrificing their honor until they are no different from Romulans?
    If you tell Gowron what we have told you, it will destroy -- him... and with him
    the last chance to restore hope to our people."'
