  - location_uuid: ger_location_bae898ca75e9
    description_of_involvement: Boreth is the desolate, mountainous planet where Worf's
      spiritual crisis unfolds. Its barren surface and single temple perched on the
      tallest peak create an atmosphere of isolation and reverence, reinforcing the
      idea that this is a place of pilgrimage and testing. The planet's stark beauty
      is also its cruelty—there is no distraction here, no escape from the silence
      of the void or the weight of expectation. For Worf, Boreth is both a sanctuary
      and a prison, a place where he must confront his faith or abandon it entirely.
      The planet's role in the event is to amplify the tension between Worf's internal
      struggle and the external pressure of Klingon tradition.
    observed_atmosphere: Oppressively spiritual, with a sense of ancient, unyielding
      tradition. The air is thick with the weight of prophecy, the howling wind echoing
      the voices of the past. The isolation of Boreth makes every doubt feel louder,
      every silence more deafening.
    functional_role: A site of spiritual testing and pilgrimage, where Klingons come
      to seek visions of Kahless and prove their faith. For Worf, it is a place of
      reckoning—either he will find his answers here, or he will leave broken.
    symbolic_significance: 'Represents the unbridgeable gap between Worf''s doubt
      and the unshakable faith of his people. Boreth is a microcosm of the Klingon
      Empire itself: harsh, uncompromising, and demanding absolute commitment.'
    access_restrictions: Restricted to those on a spiritual quest or those serving
      the temple. Worf is here by choice, but his presence is now tenuous—he is no
      longer a seeker but an outsider.
    key_environmental_details:
    - The sheer, jagged mountains that make Boreth feel like a fortress of faith
    - The single temple on the tallest peak, its spartan design reflecting the austerity
