- fabula_uuid: cand_evt_scene_99b38b5d85daec83_01
  global_id: null
  title: Worf Rejects Gowron’s Unity Plea
  description: 'In the observation lounge, Worf—radiant with conviction—defends Kahless’s
    legitimacy as the returned messiah, insisting his presence will unify the Klingon
    Empire and restore its warrior spirit. Gowron, seated across from him, dismisses
    the claim as a political maneuver by the Guardians of the Sacred Order, warning
    that Kahless’s arrival will instead spark civil war. The Chancellor appeals to
    their shared history, urging Worf to renounce Kahless and stand with him to preserve
    the Empire’s stability. Worf, however, remains steadfast, urging Gowron to open
    his heart to Kahless’s message. The exchange exposes the ideological chasm between
    them: Worf’s faith in tradition and spiritual redemption clashes with Gowron’s
    pragmatism and fear of losing power. The moment marks a turning point in their
    relationship, as Worf’s loyalty to Kahless now supersedes his bond with Gowron,
    foreshadowing the Empire’s impending fracture and the Enterprise crew’s role in
    mediating the crisis.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e23
  scene_sequence: 24
  sequence_in_scene: 40
  key_dialogue:
  - 'WORF: ... it will be glorious.'
  - 'GOWRON: It will be war.'
  - 'WORF: He is Kahless. Your own test proved it.'
  - 'GOWRON: I will not hand over the Empire to Koroth because of one test.'
  - 'WORF: It is not Koroth, it is Kahless. Listen to him, Gowron... open your heart
    and hear his words as I have. He will restore your faith... as he has restored
    mine.'
  - 'GOWRON: We fought together once... side by side to keep the Empire from being
    torn apart... will you stand by and let these impostors destroy all that we fought
    so hard to protect? Renounce him, Worf. Stand with me and we can hold the Empire
    together.'
