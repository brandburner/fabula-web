  title: DNA confirms Kahless—Worf’s faith triumphs
  description: "\n  In Sickbay, Beverly Crusher performs a genetic scan comparing\
    \ Kahless’s blood sample to the ancient tissue from the ceremonial knife. The\
    \ computer confirms an identical match, stunning Gowron and validating Worf’s\
    \ belief in Kahless’s messianic return. Worf’s face shifts from skepticism to\
    \ unbridled joy, while Gowron’s disbelief exposes the political and religious\
    \ fault lines threatening the Klingon Empire. The moment forces Worf to confront\
    \ the tension between his personal faith and the Empire’s stability, setting up\
    \ a crisis of loyalty that will test his allegiance to both Kahless and Gowron.\n\
    \  "
