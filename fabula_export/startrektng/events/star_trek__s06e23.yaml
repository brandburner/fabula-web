- fabula_uuid: cand_evt_scene_067a5c6f49a41c61_01
  global_id: null
  title: Worf tests Kahless with science and faith
  description: 'In Worf’s private chambers, Kahless catches Worf attempting to verify
    his identity with a tricorder—a moment of raw skepticism that Kahless not only
    permits but encourages. The scan confirms Kahless’s biological Klingon heritage,
    yet Worf’s lingering doubts persist, forcing Kahless to deploy a far more potent
    weapon: intimate knowledge of Worf’s childhood vision in the caves of No’Mat.
    This revelation—an impossible secret Worf has never shared—shatters his rational
    defenses, leaving him suspended between duty and belief. Kahless’s final question,
    *‘You still do not believe it is me, do you Worf?’*, exposes the core of Worf’s
    crisis: his desire to believe is not the same as belief itself. The exchange ends
    with Worf’s admission, *‘I... want to believe,’* a fragile admission that marks
    the beginning of his spiritual unraveling. The scene pivots from scientific verification
    to existential confrontation, with Kahless’s gentle but unyielding presence forcing
    Worf to confront the limits of logic in matters of faith. The moment also sets
    up Worf’s future role as a bridge between Kahless’s divine claim and the Klingon
    Empire’s political reality, as his internal conflict mirrors the broader struggle
    for the Empire’s soul.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e23
  scene_sequence: 10
  sequence_in_scene: 14
  key_dialogue:
  - |-
    KAHLESS: What is it you are doing?
    WORF: I was getting my tricorder.
    KAHLESS: Tri-Corder? Is it a weapon?
    WORF: No. It is a tool. I was going to use it to see if you were...
  - |-
    KAHLESS: We have met before. I appeared to you in a vision... in the caves of No'Mat... you were a child then... and I told you... that you would do something... no Klingon had ever done before.
    WORF: Yes...
    KAHLESS: Was I ... correct?
    WORF: I... am the first Klingon to serve in Starfleet.
  - |-
    KAHLESS: You still do not believe it is me, do you Worf?
    WORF: I... want to believe.
    KAHLESS: That is a ... beginning...
