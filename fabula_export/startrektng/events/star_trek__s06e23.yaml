      force shaping every action in this event. The rituals of fasting, meditation,
      and vision-seeking are not just personal quests but sacred duties tied to the
      ancient *Promise* of Kahless's return. Koroth's challenge to Worf is not just
      a personal rebuke but an enforcement of religious doctrine, and Divok's vision
      is treated as divine confirmation of that doctrine. The organization's involvement
      in this event is to assert its authority over Worf's spiritual crisis, demanding
      that he either conform or be cast out. The tension between Worf's doubt and
      the unshakable faith of the others is a microcosm of the ideological schism
      threatening the Klingon Empire.
    active_representation: Through Koroth's role as Head Cleric and the communal rituals
      of the Boreth monastery. The organization is manifested in the rituals, the
      artifacts, and the collective belief of the Klingons present.
    power_dynamics: Exercising absolute authority over the spiritual lives of the
      Klingons on Boreth. Worf's doubt is not just a personal failing but a challenge
      to the organization's teachings, and Koroth's response is designed to reassert
      control. The power dynamic is hierarchical, with Koroth as the enforcer of doctrine
      and Worf as the potential heretic.
    organizational_goals:
    - To uphold the *Promise* of Kahless's return and the unshakable nature of Klingon
      faith
    - To ensure that Worf either commits fully to the spiritual quest or leaves, as
      his doubt is a distraction to the others and a potential threat to the organization's
      unity
    influence_mechanisms:
    - Through ritual and tradition, which create a sense of communal obligation and
      shared purpose
    - Through Koroth's authority as Head Cleric, which allows him to challenge Worf's
      faith and demand conformity
    - Through the collective belief of the Klingons, which reinforces the idea that
      doubt is unacceptable and visions are divine truths
    institutional_impact: The event highlights the fragility of Klingon Religion in
      the face of skepticism and the high stakes of maintaining faith amid political
      and spiritual upheaval. Worf's crisis is not just personal—it is a test of the
      organization's ability to enforce its doctrines and preserve its unity.
    internal_dynamics: The organization is united in its belief in Kahless's return,
      but Worf's doubt exposes a potential fracture. Koroth's challenge to Worf is
      also a test of his own authority, as his ability to enforce the faith is being
      questioned by Worf's silence. The internal tension is between the need to uphold
      tradition and the reality of Worf's struggle, which cannot be ignored.
