- fabula_uuid: act_01ca8c71173ac434
  number: 4
  summary: Act Four introduces significant cracks in Kahless's facade and deepens
    the conflict between Worf's faith and emerging doubts. Worf, now content and eager,
    seeks Kahless, who dismisses Koroth and Torin to speak with Worf alone. During
    their conversation, Kahless admits to having forgotten many things, including
    the taste of Klingon Warnog, which subtly disturbs Worf. More critically, when
    Worf asks about death and Sto-Vo-Kor, Kahless confesses he does not have those
    answers, claiming to be merely a 'traveler' who only knows this world in his current
    form. Despite these inconsistencies, Kahless expresses a desire for Worf to join
    him in forging a new Empire, which initially overwhelms Worf with enthusiasm.
    Worf, optimistic about Kahless's vision, attempts to sway Gowron, but Gowron remains
    deeply skeptical, accusing Koroth of a power play and warning of impending civil
    war. Gowron urges Worf to renounce Kahless, but Worf steadfastly refuses, believing
    Kahless is the key to the Klingon future. A meeting is arranged in the Holodeck,
    where Kahless again attempts to assert his authority through parables. Gowron,
    however, challenges Kahless with a specific question about a story detail, which
    Kahless cannot answer. This failure, coupled with Gowron's open defiance, leads
    to a knife fight. Kahless, unlike his previous encounter with Worf, is outmatched
    by Gowron. Gowron disarms and knocks down Kahless, poised to deliver a fatal blow.
    Worf, in a moment of instinct, intervenes and saves Kahless, but the spectacle
    of Kahless's defeat leaves Worf stunned, forcing him to confront the painful reality
    that this Kahless is not the legendary warrior he believed him to be.
