  global_id: null
  title: Picard forces Worf to confront his faith crisis
  description: 'In Worf’s disheveled quarters—still littered with the remnants of
    a failed ritual to summon Kahless—Picard arrives unannounced, his sharp command
    (''On your feet, Lieutenant'') cutting through Worf’s apathy. The scene reveals
    Worf’s uncharacteristic instability: his recent failure to uphold Klingon values
    on Carraya has left him spiritually hollow, his belief in Sto-Vo-Kor crumbling.
    Picard, balancing authority with rare compassion, presses Worf to explain his
    erratic behavior, uncovering the Klingon’s shame over his wavering faith and his
    desperate attempt to reconnect with his heritage through a vision quest. Worf’s
    admission—''I am not sure I ever had a true belief''—exposes the depth of his
    crisis, while Picard’s pragmatic suggestion (''Boreth'') reframes the pilgrimage
    as a necessary step toward reclaiming his duty. The exchange elevates the stakes:
    Worf’s personal turmoil now directly threatens his reliability as an officer,
    while his spiritual reckoning becomes inextricably tied to the Kahless crisis
    looming over the Klingon Empire. The scene’s emotional core lies in Picard’s dual
    role—both as a commanding officer addressing a performance issue and as a mentor
    acknowledging the cost of Worf’s cultural isolation. The resolution (Picard granting
    leave) sets up Worf’s journey to Boreth, where his faith will be tested by Kahless’
    return and Koroth’s deception.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e23
  scene_sequence: 5
  sequence_in_scene: 6
  key_dialogue:
  - 'PICARD: On your feet, Lieutenant.'
  - 'WORF: Ever since I returned from the Carraya system I have felt... empty...'
  - 'PICARD: Have you lost your... faith in Sto-Vo-Kor?'
  - 'WORF: To lose something, one must first possess it... I am not sure I ever had
    a true belief.'
  - 'PICARD: It may be that what you seek cannot be found on the Enterprise. You may
    need to immerse yourself in Klingon beliefs before you can discover whether they
    hold any truths for you.'
