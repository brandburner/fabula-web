  title: Worf rejects Gowron’s plea for unity
  description: "\n  In the *Enterprise*’s observation lounge, Gowron makes a final,\
    \ desperate appeal to Worf, invoking their shared history and the threat of civil\
    \ war to persuade him to abandon Kahless. Gowron frames Kahless’s return as a\
    \ political maneuver by the Guardians—specifically Koroth—to undermine his leadership,\
    \ warning that the Empire will fracture if Worf aligns with the messiah. Worf,\
    \ however, remains steadfast, dismissing Gowron’s pragmatism as a failure of faith.\
    \ He urges Gowron to open his heart to Kahless’s teachings, framing the messiah’s\
    \ return as the only path to spiritual redemption and unity. The exchange crystallizes\
    \ Worf’s ideological fracture: his devotion to Kahless now supersedes even his\
    \ bond with Gowron, raising the stakes for the Empire’s future. Gowron’s bitterness\
    \ and Worf’s unshakable conviction foreshadow the coming civil war, as Worf’s\
    \ loyalty to Kahless—rather than tradition or duty—becomes the linchpin of the\
    \ conflict. The scene underscores the tension between faith and pragmatism, with\
    \ Worf’s rejection of Gowron’s plea marking a turning point in their relationship\
    \ and the broader Klingon crisis.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e23
  scene_sequence: 24
  sequence_in_scene: 41
  key_dialogue:
  - 'GOWRON: It will be war.'
  - 'WORF: He is Kahless. Your own test proved it.'
  - 'GOWRON: Don’t you see? This is exactly why they want you to join them... because
    your brother sits on the Council and your voice carries weight in the Empire.
    They want you to influence others to follow them.'
  - 'WORF: You do not understand. Kahless is our future... only with his help can
    we revive the pure warriors within ourselves. Listen to him, Gowron... open your
    heart and hear his words as I have. He will restore your faith... as he has restored
    mine.'
