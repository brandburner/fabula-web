    has journeyed back and forth between this world and the next. While I am in this
    form, I know only about this world...'
  - 'KAHLESS: It was your purity of heart that summoned me back from Sto-Vo-Kor...
    and Koroth has told me about the respect you have earned in the Federation and
    the Empire. I want you to have a place at my side as we restore honor to our people.'
  - 'WORF: Kahless, may I ask you about... death... and Sto-Vo-Kor? Tell me what awaits
    us beyond this life.'
