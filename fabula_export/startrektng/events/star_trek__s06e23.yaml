- fabula_uuid: cand_evt_scene_528c9fd2c6bbb530_02
  global_id: null
  title: Picard confronts Worf’s spiritual crisis
  description: "\n  In the aftermath of Worf’s failed ritual to summon Kahless, Picard\
    \ enters his quarters to find him in a state of emotional and spiritual collapse.\
    \ The room is in disarray—evidence of Worf’s desperate attempts to reconnect with\
    \ his Klingon heritage through fire, lava rocks, and ritual implements. Picard,\
    \ balancing firm command with compassion, forces Worf to confront his uncharacteristic\
    \ apathy and the root of his turmoil: a crisis of faith triggered by his experiences\
    \ on Carraya. Worf admits he has lost his belief in Sto-Vo-Kor, having never truly\
    \ possessed it, and confesses his guilt over letting his personal struggles interfere\
    \ with his duties. Picard, recognizing Worf’s need for immersion in Klingon culture\
    \ rather than isolated study, suggests a pilgrimage to Boreth. The exchange reframes\
    \ Worf’s spiritual quest as a necessary detour for his readiness to return to\
    \ Starfleet, setting the stage for his eventual reckoning with Kahless’ return\
    \ and the Klingon Empire’s fate. The scene underscores the tension between Worf’s\
    \ dual identities—Klingon warrior and Starfleet officer—and establishes Picard’s\
    \ role as both a commanding officer and a mentor who understands the cost of faith\
    \ and duty.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e23
  scene_sequence: 5
  sequence_in_scene: 7
  key_dialogue:
  - 'PICARD: ((hard)) On your feet, Lieutenant.'
  - 'WORF: It is... difficult to explain.'
  - 'PICARD: Does this have something to do with the Klingons you... rescued from
    Carraya Four?'
  - 'WORF: They were young... they knew nothing of their heritage. So while I was
    there, I tried to... teach them... teach them about their people, their culture.
    I told them about Kahless... how he united our people long ago... how he promised
    to return one day and lead us again.'
  - 'PICARD: Is that what you were doing here? Trying to recapture those feelings?'
  - 'WORF: I was trying to summon a vision of Kahless. But all this was for nothing...
    he did not come to me.'
  - 'WORF: To lose something, one must first possess it... I am not sure I ever had
    a true belief.'
  - 'PICARD: It may be that what you seek cannot be found on the Enterprise. You may
    need to immerse yourself in Klingon beliefs before you can discover whether they
    hold any truths for you. Is there anything you could do... any place you could
    go... to explore your faith more fully?'
