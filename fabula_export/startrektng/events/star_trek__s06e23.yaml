    despite the crew’s skepticism, Data privately presses Worf on his reliance on
    faith over empirical evidence. The exchange exposes Worf’s internal conflict:
    his Klingon devotion clashes with Starfleet’s analytical rigor, leaving him unable
    to articulate a defense. Data’s probing—rooted in his own android limitations—reveals
    the fragility of Worf’s conviction, foreshadowing his eventual crisis when Kahless’s
    legitimacy is later disproven. The moment underscores the broader narrative tension
    between tradition and truth, with Worf’s silence speaking louder than any argument.'
