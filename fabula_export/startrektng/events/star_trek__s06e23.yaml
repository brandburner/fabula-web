- fabula_uuid: cand_evt_scene_abae32f5f1bf3367_01
  global_id: null
  title: Kahless proves his divinity through sacred knowledge
  description: "\n  In the sacred temple, Kahless silences Koroth’s challenge by revealing\
    \ the secret, unwritten history of the bat’leth’s forging—a test of divine knowledge\
    \ only the true messiah could possess. His detailed account of cutting his hair\
    \ into molten rock, quenching it in the lake of Lusor, and naming the sword after\
    \ slaying the tyrant Molor forces Koroth to kneel in reverence, his skepticism\
    \ shattered. The crowd follows suit, chanting 'Vorcha-doh-baghk, Kahless!' in\
    \ unison, their faith reignited. Worf, however, remains standing apart, his conflicted\
    \ expression underscoring the tension between blind devotion and the rational\
    \ doubt that gnaws at him. The moment solidifies Kahless’s divine legitimacy,\
    \ but Worf’s hesitation foreshadows the ideological fracture that will soon divide\
    \ the Klingons. The revelation also sets the stage for Kahless’s crusade to unite\
    \ the Empire, while Koroth’s submission signals the beginning of a spiritual and\
    \ political realignment that could destabilize Gowron’s rule.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e23
  scene_sequence: 9
  sequence_in_scene: 13
  key_dialogue:
  - 'KAHLESS: I went into the mountains... all the way to the Kri''stak Volcano. I
    cut off a lock of my hair and thrust it into the river of molten rock which poured
    from the summit. The hair began to burn, but then I plunged it into the lake of
    Lusor and twisted it into a sword. And after I used it to kill the tyrant Molor
    I gave it a name: bat''leth, the sword of honor.'
  - 'KOROTH: You know... The story of the sword is known only to the High Clerics...
    it was never written down, so that if he returned, we could be sure it was Kahless.'
  - 'KAHLESS: I have returned because there is a great need in my people... they fight
    among themselves in petty wars and corrupt the glory of the Klingon spirit. They
    have lost their way. But it is not too late. I have returned and I will lead my
    people again!'
