  key_dialogue: &id007
  - 'DIVOK: Kahless! I see Kahless! He is standing before me... holding a sword...
    he wants something... me, he wants me! He wants me to go with him!'
  - |-
    KOROTH: What is the story of The Promise, Worf?
    WORF: When Kahless united the people and gave them the laws of honor, he saw that his work was done. So one night he gathered his belongings and went to the edge of the city to say good-bye.
    KOROTH: The people wept... they did not want him to go.
    WORF: And Kahless said, 'You are Klingons. You need no one but yourselves. I will go now... to Sto-Vo-Kor. But I promise one day I will return.' Then Kahless pointed to a star in the sky and said, 'Look for me there... on that point of light.'
    KOROTH: So here we are... on a world circling that distant point of light. It has been over fifteen centuries since he made that promise... and still we wait. What are ten days in the life of one Klingon compared to that? Is the son of Mogh really so easily discouraged?
  - 'WORF: It has been ten days, Koroth. But I have had no visions... I have received
    no insight. There is nothing for me here.'
