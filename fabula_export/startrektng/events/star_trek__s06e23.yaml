  global_id: null
  title: Riker detects Worf’s absence and mobilizes security
  description: During a routine shift change on the Enterprise’s bridge, Riker arrives
    to relieve Data and immediately notices Worf’s conspicuous absence from his post
    at Tactical—a deviation from his disciplined routine. Data confirms Worf’s uncharacteristic
    tardiness, triggering Riker’s concern. After a brief exchange, Riker queries the
    computer to locate Worf, learning he is in his quarters. The tension escalates
    as Riker and Data exchange a loaded glance, signaling their shared unease. Riker’s
    decision to abandon his command duties and mobilize Security to Deck 7, Section
    25 Baker, marks a critical escalation in the crew’s intervention to address Worf’s
    deteriorating state, which they suspect is tied to his spiritual crisis over Kahless’
    return. The scene underscores the crew’s growing alarm over Worf’s instability
    and the potential consequences for the Klingon Empire’s stability, setting up
    a direct confrontation to reclaim him from his self-imposed seclusion.
