  global_id: null
  title: Kahless’s Legacy Overrides His Return
  description: 'In the *Enterprise*’s transporter room, Worf—still grappling with
    the collapse of his faith—confesses to Kahless that his spiritual crisis persists
    despite the messiah’s apparent return. Kahless, sensing Worf’s despair, delivers
    a pivotal lesson: the enduring value of his teachings transcends his physical
    presence. He argues that the essence of Kahless lies not in his return but in
    the wisdom and honorable actions he inspired. This moment forces Worf to confront
    whether his faith hinges on a literal messiah or on the principles Kahless embodied.
    The exchange culminates with Kahless’s dematerialization, leaving Worf to internalize
    the weight of this revelation as the Klingon civil war looms. The scene serves
    as a thematic turning point, shifting Worf’s focus from blind devotion to the
    active embodiment of Kahless’s legacy—a choice that will define his role in the
    Empire’s future.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e23
  scene_sequence: 30
  sequence_in_scene: 52
  key_dialogue:
  - 'WORF: I went to Boreth to find my faith... and for a time I thought I did...
    but now, my heart is empty again. I do not know what to believe...'
  - 'KAHLESS: Kahless left us -- all of us -- a powerful legacy... a way of thinking
    and acting that makes us Klingon. If his words hold wisdom and his philosophy
    is honorable... then does it really matter if he returns? What is important is
    whether we follow his teachings... perhaps the words are more important than the
    man.'
  - 'KAHLESS: Q''apla, son of Mogh.'
