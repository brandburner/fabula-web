- fabula_uuid: act_39f326eef620d425
  number: 3
  summary: 'Act Three escalates the political and personal stakes surrounding Kahless''s
    return, culminating in a seemingly irrefutable proof of his identity. Kahless,
    Koroth, Torin, and Worf board the Enterprise. Kahless''s regal demeanor masks
    his ignorance of Federation customs, leading to awkward moments, such as his offer
    of Troi as a ''gift.'' Koroth expresses discomfort with the Federation ship. Picard
    and his senior staff discuss Kahless''s origins, with Beverly Crusher noting the
    lack of medical data makes it impossible to rule out possibilities like a clone
    or bioreplicant. Worf, however, continues to advocate for the possibility of Kahless
    being genuine, emphasizing the importance of faith. Kahless further solidifies
    Worf''s belief by praising his dedication to Klingon traditions while living among
    ''aliens,'' declaring Worf a true Klingon warrior. Gowron, the current Klingon
    leader, arrives on the Enterprise, openly hostile and convinced Kahless is an
    imposter. He confronts Picard, expressing deep concern that the ''idea'' of Kahless
    could destabilize the Empire. Gowron proposes a definitive test: a genetic comparison
    between Kahless and a blood sample from the ancient ''Knife of Kirom,'' said to
    be stained with the original Kahless''s blood. Kahless agrees to the test to settle
    doubts. In Sickbay, Dr. Crusher performs the analysis, and the computer confirms
    the genetic patterns are identical. This scientific validation overwhelms Worf
    with pure joy, seemingly confirming his faith and the authenticity of Kahless.'
