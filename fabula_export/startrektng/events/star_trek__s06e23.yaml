- fabula_uuid: cand_evt_scene_bd218e01282110d5_03
  global_id: null
  title: Kahless unites Klingons through ritual combat
  description: "\n  In the midst of a raucous temple celebration, Kahless and Worf\
    \ engage in a ritualized bat'leth duel that escalates from physical confrontation\
    \ to a moment of spiritual revelation. Kahless, sensing Worf's lingering doubt,\
    \ provokes the fight to expose the deeper conflict within the Klingon people—one\
    \ of lost purpose and hollow tradition. The duel, initially tense and evenly matched,\
    \ abruptly shifts when Kahless breaks into laughter, reframing the combat as a\
    \ celebration of Klingon identity rather than mere bloodshed. His rousing speech—'We\
    \ are Klingons!'—ignites a collective emotional surge, transforming the crowd's\
    \ energy from aggression to exultation. Worf, initially resistant, is drawn into\
    \ the moment, his smile signaling a temporary resolution of his internal struggle.\
    \ The scene serves as a turning point, where Kahless's charismatic leadership\
    \ and Worf's reluctant participation symbolize the potential for reunification,\
    \ even as the political stakes with Gowron loom. The ritual combat becomes a metaphor\
    \ for the Klingon Empire's need to reclaim its spiritual core, with Kahless as\
    \ its catalyst.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e23
  scene_sequence: 13
  sequence_in_scene: 24
  key_dialogue:
  - 'KAHLESS: "But do not forget that a leader need not answer questions from those
    he leads... it is enough that he says to do a thing... and they will do it. If
    he says to run, they run... if he says to fight, they fight... if he says to die...
    they die."'
  - 'WORF: "Yes. If the... commander is worthy of their trust."'
  - 'KAHLESS: "What is wrong? Is there only anger and bloodlust in your souls? Is
    that all that is left in the Klingon heart? We do not fight merely to spill blood,
    but to enrich the spirit. Look at us... two warriors locked in battle, fighting
    for honor. How can you keep from... singing... out for all to hear, ''We are Klingons!''"'
