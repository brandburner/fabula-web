  title: Kahless’s First Steps on the Enterprise
  description: Kahless the Unforgettable arrives on the *Enterprise* with the unshakable
    confidence of a warrior-king, immediately clashing with Federation norms. His
    first interaction with Picard—marked by a physically jarring Klingon greeting—sets
    the tone for cultural friction, while his assumption that Troi is a 'gift' exposes
    the vast gulf between Klingon tradition and Starfleet values. Worf, caught between
    his faith and duty, intervenes to clarify the crew’s customs, but Kahless’s curiosity
    about the ship’s weapons and his insistence on exploring the *Enterprise* reveal
    his deeper fascination with power and technology. Koroth’s discomfort aboard the
    Federation vessel underscores the Klingons’ unease, while Picard’s diplomatic
    response (offering a tour) subtly frames the crew’s cautious engagement with a
    figure whose authenticity could destabilize the Klingon Empire. The scene establishes
    Kahless as a disruptive force—charismatic yet alien—and forces Worf to confront
    the tension between his spiritual devotion and his role as a Starfleet officer.
