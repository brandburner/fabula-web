  title: Kahless Undermines Worf’s Faith with Ambiguity
  description: 'In a private audience with Kahless, Worf—initially euphoric after
    the DNA confirmation—seeks spiritual guidance about Sto-Vo-Kor, only to have Kahless
    deflect with cryptic ambiguity. Kahless admits he lacks answers about the afterlife,
    framing himself as a mere ''traveller'' between worlds rather than the divine
    messiah Worf worships. The moment fractures Worf’s faith, as Kahless pivots abruptly
    to political promises, offering Worf a place in a ''new Empire'' while sidestepping
    the existential questions that define Klingon belief. The scene’s tension lies
    in Kahless’s calculated evasion: is he testing Worf’s loyalty, or revealing a
    truth too dangerous to voice? Koroth and Torin’s uneasy departure underscores
    the political stakes, while Worf’s visible disillusionment foreshadows his crisis
    of faith. The exchange plants seeds for a fracture in the Klingon Empire, as Worf’s
    devotion to Kahless—and by extension, his cultural identity—begins to unravel
    under the weight of unanswered questions.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e23
  scene_sequence: 23
  sequence_in_scene: 38
  key_dialogue:
  - 'WORF: Kahless, may I ask you about... death... and Sto-Vo-Kor? Tell me what awaits
    us beyond this life.'
  - 'KAHLESS: I do not have those answers. I am merely a... traveller... someone who
    has journeyed back and forth between this world and the next. While I am in this
    form, I know only about this world...'
  - 'KAHLESS: It was your purity of heart that summoned me back from Sto-Vo-Kor...
    and Koroth has told me about the respect you have earned in the Federation and
    the Empire. I want you to have a place at my side as we restore honor to our people.'
