    power_dynamics: The Klingon Empire is represented as a fractured entity, torn
      between the spiritual revival led by Kahless and the political stability maintained
      by Gowron. Kahless’s claim to messianic authority challenges the Empire’s existing
      power structures, while Worf’s skepticism—rooted in his Starfleet training—serves
