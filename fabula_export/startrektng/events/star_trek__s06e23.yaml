      crusade and the backdrop against which this event’s significance unfolds. The
      crowd’s chanting and Koroth’s submission reflect the Empire’s spiritual longing
      for unity and honor, which Kahless promises to restore. The Empire’s internal
      divisions—petty wars, corruption, and a loss of glory—are the very issues Kahless
      addresses in his proclamation. This event marks the beginning of a ideological
      fracture within the Empire, as Kahless’s return threatens Gowron’s political
      stability and offers an alternative path forward.
    active_representation: Through the collective action of the crowd, who embody
