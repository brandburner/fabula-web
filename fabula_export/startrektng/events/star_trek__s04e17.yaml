  title: Engines fail without explanation
  description: "\n  On the *Brattain*'s bridge, Geordi La Forge confidently asserts\
    \ that the ship's engines—his area of expertise—are fully functional and capable\
    \ of restarting. His optimism is met with cautious approval from Riker, who orders\
    \ the attempt. Geordi and Data execute the restart sequence with precision, but\
    \ the engines remain inert despite all systems showing normal operation. The failure\
    \ is immediate and absolute, leaving Geordi visibly perplexed and Riker frustrated.\
    \ The moment underscores the growing mystery of the *Brattain*'s derelict state,\
    \ as the crew's technical expertise proves insufficient to explain the malfunction.\
    \ This failure deepens the narrative tension, reinforcing the idea that the ship's\
    \ systems may not just be malfunctioning but actively resisting intervention.\
    \ The scene serves as a turning point, shifting the crew's focus from mechanical\
    \ solutions to the possibility of a deeper, more insidious force at play—one that\
    \ may be tied to the Tyken's Rift itself.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e17
  scene_sequence: 4
  sequence_in_scene: 8
  key_dialogue:
  - 'GEORDI: All engines check out perfectly, Commander. Once we get them started
    up, the Brattain can get back to Starbase under her own power.'
  - 'RIKER: Let''s give it a try.'
  - 'GEORDI: Nothing''s wrong. I don''t understand it.'
