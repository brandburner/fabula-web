  title: Rager’s cognitive collapse forces Data’s intervention
  description: 'On the Enterprise bridge, Picard orders Ensign Rager to maneuver the
    ship into tractor beam range, but she freezes mid-task, unable to recall basic
    navigation commands—a direct symptom of REM sleep deprivation. Data swiftly intervenes,
    inputting the coordinates himself, while Picard, recognizing the severity of her
    condition, immediately relieves Rager of duty and sends her to Sickbay. The incident
    underscores the escalating psychological toll of the Tyken’s Rift, forcing Picard
    to delegate critical operations to Data, whose immunity to the anomaly’s effects
    makes him the only reliable officer left. The moment also foreshadows the crew’s
    accelerating decline, as even routine tasks now require constant oversight and
    backup protocols. The tension lies in the unspoken question: *How long until the
    next officer fails?*'
