- fabula_uuid: cand_evt_scene_7dc549a99acc9fc5_01
  global_id: null
  title: Autopsy reveals Brattain’s crew madness
  description: "\n  In Sickbay, Picard and Beverly Crusher examine the aftermath of\
    \ the *Brattain*’s crew’s violent deaths, with Beverly detailing the chaotic,\
    \ self-inflicted nature of their final moments—some barricaded in rooms with weapons,\
    \ others engaged in hand-to-hand combat. The discovery of Andrus Hagan, the sole\
    \ catatonic Betazoid survivor, shifts focus to Troi’s failed telepathic probe,\
    \ which yields only fragmented, terrified whispers about 'voices' and 'both things.'\
    \ Picard urges Troi to persist, framing Hagan as the key to unraveling the *Brattain*’s\
    \ fate. The scene underscores the psychological horror of the Tyken’s Rift, where\
    \ even the dead tell a story of shared madness, and the living—like Hagan—are\
    \ left as hollow vessels of trauma. The tension between medical evidence and psychic\
    \ silence deepens the mystery: if the crew’s minds were shattered by an unseen\
    \ force, what hope does the *Enterprise* have of resisting the same fate?\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e17
  scene_sequence: 3
  sequence_in_scene: 6
  key_dialogue:
  - 'BEVERLY: We''re almost finished with the autopsies, Captain. It''s complicated—the
    dead were found everywhere... some locked in their rooms—barricaded, with weapons
    piled around them... some in corridors where they''d obviously had hand-to-hand
    combat...'
  - 'TROI: I''m not getting much, Captain... a few words, disconnected phrases. I
    can feel his terror... but I can''t seem to reach him.'
  - 'HAGAN: ((V.O.)) ... out there... voices...'
  - 'TROI: ((V.O.)) You hear voices? What do they say?'
  - 'HAGAN: ((V.O.)) ... both things... no... no...'
