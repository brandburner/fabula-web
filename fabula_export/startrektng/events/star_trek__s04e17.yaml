  title: Data orders crew rest after escape
  description: The *Enterprise* emerges from Tyken's Rift, its warp engines restored,
    marking the physical and psychological end of the crew's REM-deprived nightmare.
    Data, acting as captain, confirms their escape and immediately issues a direct
    order for all personnel—including Picard—to rest, underscoring the severity of
    their collective exhaustion. Picard, visibly moved, acknowledges Data's leadership
    with a quiet 'thank you,' a rare moment of vulnerability that highlights the crew's
    hard-won survival and the android's unexpected capacity for command. The scene
    closes with Data alone at the helm, piloting the ship toward Starbase 220, his
    final act as acting captain reinforcing the crew's transition from crisis to recovery.
    The moment serves as both a turning point (escape from the rift) and a thematic
    resolution (restoration of order and trust in leadership).
