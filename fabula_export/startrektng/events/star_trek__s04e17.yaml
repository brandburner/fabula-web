    my quarters... I''ve felt as though... there''s someone in there... waiting for
    me...'
  - 'PICARD: With everyone around us succumbing... it''s even more important that
    at least one of us stay in control of his faculties. I want you to turn in...
    take a nap. I''ll be on the Bridge and you can relieve me in four hours.'
