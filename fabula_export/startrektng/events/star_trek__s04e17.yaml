    emotional_state: Overwhelmed and paralyzed by the weight of the situation. His
      usual intellectual confidence is replaced by a gnawing sense of helplessness,
      as if the Rift has stripped him of his ability to lead. The crew’s lives depend
      on his next move, yet he cannot bring himself to act.
    goals:
    - To find a solution that does not risk the crew’s lives, even as the options
      narrow.
    - To project confidence and leadership, despite feeling utterly out of his depth.
    what_happened: Picard stands at the center of the bridge, his hands clasped behind
      his back, his expression a mask of controlled concern. He hesitates before asking
      Data if they can try the deflector again, but his voice lacks its usual authority.
      After Data’s warning about life-support, he falls silent, his gaze distant,
      unable to propose a next step. His indecision hangs heavy in the air, a rare
      moment of vulnerability for the usually decisive captain.
