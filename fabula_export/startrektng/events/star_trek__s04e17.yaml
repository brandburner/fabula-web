    - Seek temporary refuge in his quarters, despite the creeping dread
    what_happened: "\n        Riker enters the turbolift visibly strained, his usual\
      \ confidence replaced by agitation. He admits to feeling 'unlike himself,' describing\
      \ an unseen presence in his quarters—a confession that reveals his paranoia.\
      \ His body language (stopping warily in his quarters, scanning the room) mirrors\
      \ Picard's unraveling, though he lacks the captain's public facade. The snake\
      \ hallucination in his bed triggers a visceral reaction: he leaps back in alarm,\
      \ heart pounding, before the vision vanishes. His experience parallels Picard's,\
      \ reinforcing the Rift's universal psychological siege.\n      "
