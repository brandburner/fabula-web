      on the *Enterprise*. Geordi’s confirmation that they, too, are offline removes
      any last hope of conventional escape. The auxiliary systems’ failure isn’t just
      a redundancy breach; it’s a narrative escalation, signaling that the crew’s
      predicament is total. Without warp, impulse, or auxiliaries, the ship is adrift
      in every sense of the word, leaving the crew to confront the Rift’s true threat:
      not the lack of propulsion, but the lack of sleep—and the madness that follows.'
