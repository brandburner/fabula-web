      collapses.
    status_before_event: Calibrated and ready for use in Sickbay, with Beverly preparing
      to attach the electrodes to Troi’s temples.
    status_after_event: Activated and maintaining Troi’s REM sleep, with Beverly monitoring
      its effectiveness amid her own physical decline.
    global_id: ger_object_23882ade9a19
  - object_uuid: ger_object_53026a047505
    description_of_involvement: The cortical scanner electrodes are the physical link
      between the device and Troi’s brain. Beverly affixes them to Troi’s temples
      and scalp, ensuring the scanner’s electrical frequencies are accurately transmitted.
      Their placement is meticulous, a testament to Beverly’s medical precision, but
      also a visual reminder of the procedure’s invasiveness. Troi’s compliance—lying
      still as the electrodes are attached—highlights the trust between the two women
      and the stakes of the moment.
    status_before_event: Sterile and ready for use, lying beside the cortical scanner
