  - character_uuid: ger_agent_f2c5f532ddd2
    emotional_state: "\n        **Surface:** Panicked, disoriented, and frantic—her\
      \ movements are erratic, her voice strained.\n        **Internal:** A deep,\
      \ gnawing dread undercuts her determination, as if she senses the voice’s pleas\
      \ are not just a threat but a warning. There’s also a flicker of professional\
      \ duty: she *must* understand the voice, even as it terrifies her.\n      "
    goals:
    - Locate the source of the Sighing Voice to understand its distress (empathic
      duty)
    - Resist the void’s disorientation to regain control (survival instinct)
    what_happened: "\n        Troi is physically and psychologically unmoored, her\
      \ body floating helplessly in the murky void as her mind races to locate the\
      \ source of the Sighing Voice. She reaches out blindly, her arms trembling,\
      \ her voice betraying a mix of fear and determination. Her empathic senses are\
      \ overwhelmed, leaving her vulnerable to the voice’s taunts. When she awakens,\
      \ she is drenched in sweat, her chest heaving—her body still reacting to the\
      \ nightmare’s terror.\n      "
    observed_status: "\n        Troi is physically and psychologically unmoored, her\
      \ body floating helplessly in the murky void as her mind races to locate the\
      \ source of the Sighing Voice. She reaches out blindly, her arms trembling,\
