  title: Beverly confronts REM-deprivation hallucinations
  description: 'In the Enterprise’s morgue, Beverly Crusher orders autopsies on the
    Brattain crew’s brain tissue, searching for scientific answers to their mass murder-suicide.
    As she examines the corpses, REM sleep deprivation triggers a hallucination: the
    bodies’ eyes snap open, and their torsos sit upright, fixating on her. Beverly,
    recognizing the psychological unraveling, forces herself to regain control by
    dismissing the vision as a delusion. The moment underscores the Tyken’s Rift’s
    insidious effect on the crew’s sanity, mirroring the Brattain’s fate and foreshadowing
    Beverly’s own vulnerability to the anomaly’s influence. Her struggle to reclaim
    control highlights the crew’s collective descent into madness, reinforcing the
    urgency of escaping the Rift before their faculties collapse entirely.'
