- fabula_uuid: cand_evt_scene_33e59073974acba6_01
  global_id: null
  title: Worf's suicide attempt and Troi's intervention
  description: "\n  Worf, consumed by the psychological torment of the Tyken's Rift,\
    \ retreats to his quarters in a state of existential despair. He handles a Klingon\
    \ dagger with lethal intent, muttering a Klingon phrase—likely a farewell or invocation—before\
    \ Deanna Troi bursts in, interrupting his attempt. Troi’s sudden presence forces\
    \ Worf to confront his vulnerability, though he initially resists her intervention,\
    \ insisting no one can stop him. His admission of fear—something alien to his\
    \ warrior identity—reveals the depth of his psychological unraveling. Troi’s empathetic\
    \ confrontation and physical presence (she touches his hand, guides him) dismantle\
    \ his resolve, leading him to lower the dagger. The moment underscores the Rift’s\
    \ insidious effect on even the strongest minds, while Troi’s actions highlight\
    \ the fragile bond between logic and emotion in the face of the unknown. Her dismissal\
    \ of security guards and her offer to escort him to Sickbay signal her role as\
    \ both a confidante and a stabilizing force, though her own resilience is untested\
    \ under the Rift’s strain.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e17
  scene_sequence: 28
  sequence_in_scene: 42
  key_dialogue:
  - 'WORF: lujpu'' jiH''e, Alexandrijn.'
  - 'TROI: Worf, no!'
  - 'WORF: You will not stop me...'
  - 'TROI: Why, Worf? What is it?'
  - 'WORF: I am no longer a warrior... I am no longer strong... I feel...'
  - 'WORF: I feel... fear.'
  - 'TROI: Worf... to admit that you are afraid... gives you strength.'
  - 'WORF: Something is waiting for us... I am not strong enough to fight it...'
  - 'TROI: No, Worf. It is just an illusion. It is not real. Please... put down the
    knife.'
