  - object_uuid: ger_object_3a2454a2d6e4
    description_of_involvement: 'The warp core collectors are the mechanical heart
      of Data’s plan. By diverting life-support power to them, the *Enterprise* generates
      the hydrogen stream—a controlled explosion of energy that creates the 2-minute
      window for Troi’s communication. Their activation is a calculated risk: the
      crew’s REM deprivation accelerates, but the stream becomes the thread connecting
      the *Enterprise* to the derelict vessel. The collectors’ role is both technical
      and symbolic, embodying the crew’s willingness to sacrifice stability for survival.'
    status_before_event: Operational but underutilized, with power reserves available
      for diversion.
    status_after_event: Discharging energy to emit the hydrogen stream, their activation
      marking the point of no return for the crew’s REM deprivation.
    global_id: ger_object_3a2454a2d6e4
  - object_uuid: ger_object_69494cf8404e
    description_of_involvement: 'Hydrogen, though not physically present in Sickbay,
      is the invisible catalyst of the plan. Data confirms its properties and the
      explosive reaction with calendenium, linking it to Troi’s nightmares and the
      derelict crew’s distress call. The hydrogen stream—emitted for a mere 2 minutes—becomes
      the crew’s lifeline, a fragile bridge between the *Enterprise* and the trapped
      vessel. Its role is both scientific and symbolic: the key to escape, but also
      a reminder of the Rift’s volatile nature.'
    status_before_event: Identified as a critical substance through Troi’s nightmares
      and Data’s analysis, but not yet emitted.
    status_after_event: Emitted as a stream from the warp core collectors, creating
      a 2-minute window for Troi’s telepathic contact.
    global_id: ger_object_69494cf8404e
  - object_uuid: ger_object_80fc0a57d6b8
    description_of_involvement: The *Enterprise*’s life-support systems are the linchpin
