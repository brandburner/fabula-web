      \  "
    goals:
    - To identify and neutralize the source of the unexplained chimes/knocks (initially
      treated as a technical anomaly).
    - To assess and mitigate the crew’s reported hallucinations and erratic behavior
      before they escalate (shift after Beverly and Troi’s arrival).
    - To complete the tow mission of the *Brattain* despite the mounting psychological
      threat, upholding Starfleet protocol and his duty as captain.
    what_happened: "\n        Picard begins the event immersed in work at his desk,\
      \ dismissing the initial door chime as a trivial interruption. His annoyance\
      \ grows as the chimes persist without explanation, culminating in a physical\
      \ confrontation with the door—only to find no one there. The arrival of Beverly\
      \ and Troi shifts his focus from the unexplained phenomenon to the crew’s deteriorating\
      \ mental state. His demeanor hardens as he processes their reports, his voice\
      \ sharpening with command authority. Despite Beverly’s panicked plea for retreat,\
      \ Picard remains resolute, prioritizing the tow mission over immediate escape,\
      \ though his clenched jaw betrays underlying tension.\n      "
