      \ at the weapons’ use in her final, paranoid moments. The objects are a grim\
      \ reminder: *even the most disciplined Starfleet crew can become monsters under\
      \ the right conditions.*\n      "
    status_before_event: Scattered around the bodies of the *Brattain* crew, abandoned
      after the violence. Some may still be clutched in the hands of the dead.
