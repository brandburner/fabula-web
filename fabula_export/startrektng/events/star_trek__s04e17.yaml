- fabula_uuid: cand_evt_scene_7dc549a99acc9fc5_02
  global_id: null
  title: Troi probes Hagan’s fractured mind
  description: "\n  In Sickbay, Picard and Beverly Crusher review the grim results\
    \ of the *Brattain* crew’s autopsies—evidence of violent, self-inflicted deaths\
    \ and barricaded rooms suggesting a shared psychological collapse. Picard turns\
    \ his attention to the sole survivor, Andrus Hagan, a catatonic Betazoid science\
    \ advisor, and urges Counselor Troi to probe his mind telepathically. Troi, already\
    \ sensing Hagan’s overwhelming terror, attempts to establish a connection, but\
    \ his responses are fragmented and incoherent: 'voices... out there... both things...\
    \ no... no...'. The exchange reveals the depth of Hagan’s psychological unraveling\
    \ and the insidious effect of the Tyken’s Rift, while also highlighting Troi’s\
    \ empathy as both a tool and a risk—her ability to uncover truth is tempered by\
    \ the danger of absorbing his fear. Picard’s insistence underscores the urgency\
    \ of the mystery, as Hagan may hold the only clues to what drove the *Brattain*’s\
    \ crew to madness and murder. The scene serves as a critical turning point, shifting\
    \ focus from forensic evidence to the psychological horror at the heart of the\
    \ crisis, while foreshadowing the *Enterprise* crew’s own descent into paranoia\
    \ and hallucination.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e17
  scene_sequence: 3
  sequence_in_scene: 7
  key_dialogue:
  - 'BEVERLY: We''re almost finished with the autopsies, Captain. It''s complicated
    -- the dead were found everywhere... some locked in their rooms -- barricaded,
    with weapons piled around them... some in corridors where they''d obviously had
    hand-to-hand combat... I''ll have to sort through and analyze the details.'
  - 'PICARD: Don''t give up on him, Counselor. We''re examining the *Brattain* for
    clues -- but this man is the only one left who knows what happened there.'
  - 'TROI: I can feel his terror... but I can''t seem to reach him.'
  - 'HAGAN: ... out there... voices...'
  - 'TROI: You hear voices? What do they say?'
  - 'HAGAN: ... both things... no... no...'
