      \ room like a grim relic, its screen displaying toxicological reports and autopsy\
      \ scans that confirm the crew’s health was otherwise perfect—making their violence\
      \ all the more inexplicable. The PADD is not just a tool; it is a *catalyst\
      \ for dread*. When Beverly programs it into Picard’s computer and plays Zaheva’s\
      \ log, the device becomes a conduit for the *Brattain*’s terror, forcing Picard\
      \ to *see and hear* the unraveling firsthand. The PADD’s data is the first concrete\
      \ evidence that the *Enterprise*’s crew may face the same fate.\n      "
    status_before_event: In Beverly’s possession, containing raw autopsy data and
      Zaheva’s final log, untouched by Picard.
    status_after_event: Transferred to Picard’s computer, its contents now part of
      the *Enterprise*’s official record—and a looming threat to morale.
    global_id: ger_object_408b93e26e78
  - object_uuid: ger_object_086157395e39
    description_of_involvement: "\n        The *Brattain Crew Weapons*—phasers, knives,\
      \ and even bare hands—are referenced by Beverly as the tools of the crew’s mutual\
      \ slaughter. She describes them as evidence of a *desperate, close-quarters\
      \ violence*, where officers turned on each other without external provocation.\
      \ The weapons are not just objects; they are *symbols of the crew’s psychological\
      \ unraveling*. Their mention in the autopsy report forces Picard to confront\
