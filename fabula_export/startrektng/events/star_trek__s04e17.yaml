- fabula_uuid: act_48be964d70b46bf4
  number: 5
  summary: 'With Data now acting Captain, the Enterprise faces imminent collapse as
    life support systems falter and many crew members are incapacitated. Troi experiences
    a breakthrough, realizing that Hagan''s phrases and her nightmares are not random
    dreams but a telepathic distress call from another ship trapped on the opposite
    side of the Tyken''s Rift. Data corroborates the plausibility of a second vessel.
    Troi proposes ''directed dreaming'' to communicate with these beings, a method
    that allows her to consciously control her dreams and transmit information. Through
    this unique telepathic channel, Troi and Data decipher the recurring phrase ''one
    moon circles'' as a reference to hydrogen. They formulate a desperate plan: the
    Enterprise will eject a stream of hydrogen into the Rift, and the other ship,
    if they possess a volatile substance, will detonate it simultaneously. Data orders
    all non-essential personnel to shelter areas, leading to a final, tense confrontation
    in Ten-Forward where Guinan again prevents a panicked stampede with a show of
    force. As Troi enters REM sleep and telepathically transmits the crucial signal
    ''Now!'' at the precise moment the Enterprise releases hydrogen, a massive explosion
    erupts within the Rift, successfully freeing both ships. Life support is restored,
    and Data, in his final act as Acting Captain, orders a return to Starbase and
    mandates rest for the exhausted crew, bringing a harrowing ordeal to a close.'
