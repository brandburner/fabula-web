  title: Troi’s Routine Hides the Rift’s Onset
  description: "\n  Deanna Troi exits Sickbay after checking on Andrus Hagan, her\
    \ professional demeanor masking the psychological strain of the Tyken’s Rift.\
    \ She instructs a supernumerary to notify her of any changes in Hagan’s condition,\
    \ her voice steady but her subconscious already unraveling. As she walks the corridor—passing\
    \ crew members who appear normal but are soon to succumb to paranoia—her movements\
    \ are unhurried, her smiles automatic. The mundane bustle of the ship contrasts\
    \ sharply with the unseen horror: her REM-deprived mind is slipping into a distorted\
    \ dream state, though she remains unaware. The scene’s realism belies its narrative\
    \ significance: this is the threshold where the Rift’s psychological assault begins,\
    \ and Troi’s empathic vulnerability makes her the first to fracture. Her entry\
    \ into her office marks the transition from reality to nightmare, a shift that\
    \ will soon warp the *Enterprise*’s collective perception of truth.\n  "
