- fabula_uuid: act_178deadc8fb8e38b
  number: 2
  summary: The Enterprise prepares to tow the Brattain, but unsettling incidents begin
    to plague the crew, signaling a mirroring of the previous ship's fate. Ensign
    Peeples experiences vivid auditory hallucinations on the Brattain, hearing phantom
    sounds of someone alive on board, causing him alarm and confusion. Back on the
    Enterprise, Chief O'Brien exhibits uncharacteristic and irrational jealousy towards
    his wife, Keiko, accusing her of infidelity without logical basis, highlighting
    a severe emotional imbalance. Other crew members report strange occurrences and
    hallucinations, with Chief Gillespie relaying stories of phantom figures and inexplicable
    events, indicating a widespread psychological deterioration across the vessel.
    Ensign Rager, at the Conn, suddenly suffers a severe cognitive failure, unable
    to input basic navigation coordinates, underscoring the rapid decline in mental
    faculties. The situation culminates dramatically when the Enterprise unexpectedly
    loses all engine power, becoming adrift and helpless, mirroring the exact state
    of the Brattain. Picard, Beverly, and Troi make the chilling realization that
    the events on the Brattain are not merely being investigated, but are actively
    being mirrored on their own ship. The crew is slowly, inexorably, losing their
    minds, and the Enterprise is now trapped in the same mysterious predicament as
    the ill-fated science vessel, with no apparent means of escape or understanding
    of the underlying cause. The physical and mental integrity of the crew and ship
    are now directly under threat, escalating the stakes significantly.
  key_moments: []
