- fabula_uuid: act_9d1b9cce806d950e
  number: 4
  summary: The crew's mental state continues to deteriorate rapidly, pushing them
    to the brink. Counselor Troi, despite her own exhaustion, persists in trying to
    communicate with Andrus Hagan, who offers more fragmented, yet still cryptic,
    clues about 'double' and 'twin.' In Ten-Forward, the pervasive fear and paranoia
    ignite near-mutiny, with Chief Gillespie attempting to rally crew members to confront
    Picard, only to be forcefully, though non-lethally, subdued by Guinan wielding
    a powerful alien weapon. Data and Geordi attempt their first major escape strategy,
    channeling all available power into the main deflector dish for a concentrated
    energy burst, but the effort fails spectacularly, the energy simply absorbed by
    the Tyken's Rift. This setback plunges the crew into deeper despair, as Data confirms
    further attempts risk life support. The psychological breakdown reaches a critical
    point when Lieutenant Worf, overwhelmed by fear and a sense of lost warrior pride,
    attempts suicide with a Klingon dagger. Troi, sensing his distress, intervenes
    just in time, guiding him to articulate his profound fear and preventing a tragic
    loss. This act highlights the extreme mental and emotional toll on the crew and
    the failure of their initial, desperate attempts to escape.
  key_moments: []
