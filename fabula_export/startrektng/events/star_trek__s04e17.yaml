  title: Troi deciphers Hagan’s telepathic message
  description: 'In Sickbay, Deanna Troi interrogates the catatonic Betazoid science
    advisor Hagan, who repeats fragmented phrases—''double,'' ''one moon circling,''
    ''eyes in the dark''—that mirror the nightmares plaguing the *Enterprise* crew.
    Troi realizes these aren’t random hallucinations but a *deliberate telepathic
    transmission*, confirming the Tyken’s Rift is an active, malevolent force. Hagan’s
    distressed reaction—tears, physical tension—suggests he’s trapped in the same
    psychic loop, unable to escape. Troi’s revelation to Beverly Crusher shifts the
    crew’s understanding: their madness isn’t organic but *engineered*, raising urgent
    questions about the Rift’s origin and the trapped vessel’s role in their predicament.
    The scene pivots from psychological horror to a targeted, external threat, accelerating
    the crew’s need to decode the message and break free before irreversible collapse.'
