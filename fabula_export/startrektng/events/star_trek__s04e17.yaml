  title: Data witnesses Geordi’s cognitive collapse
  description: "\n  Data enters Engineering to find Geordi La Forge in severe cognitive\
    \ decline—his speech slurred, his memory fractured, and his ability to function\
    \ as Chief Engineer utterly compromised. Geordi struggles to recall basic technical\
    \ terms (e.g., 'main deflector dish'), forcing Data to repeat instructions as\
    \ if speaking to a stranger. The scene underscores the Tyken’s Rift’s insidious\
    \ effect on the crew, with Geordi’s deterioration serving as a microcosm of the\
    \ broader existential threat facing the *Enterprise*. Data’s clinical observation\
    \ of Geordi’s condition—coupled with his own immunity to the Rift’s psychological\
    \ toll—positions him as the only rational actor left to coordinate the ship’s\
    \ escape. The moment also foreshadows Geordi’s potential irrelevance in the crisis,\
    \ compelling Data to assume command while the crew’s faculties unravel.\n  "
