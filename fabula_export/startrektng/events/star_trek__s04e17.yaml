  scene_sequence: 17
  sequence_in_scene: 27
  key_dialogue:
  - 'DATA: After analyzing the sensor logs from the Brattain and the Enterprise, as
    well as the data from our last series of probes, I have concluded... we have become
    trapped in a massive rupture in space... undetectable by normal means... into
    which energy is absorbed.'
  - |-
    BEVERLY: Data... in Tyken's experience... did the crew exhibit behavioral changes?
    DATA: No. There were no reports of unusual conduct among the crew.
  - 'BEVERLY: Then -- what is it? What''s happening to us?'
