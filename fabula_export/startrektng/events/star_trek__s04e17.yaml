  scene_sequence: 5
  sequence_in_scene: 10
  key_dialogue:
  - 'BEVERLY: There was no outside source... no alien presence... The crew of the
    Brattain, all thirty-four of them -- appear to have killed each other.'
  - 'PICARD: What could have caused such an event? Drugs? A virus? Poison...'
  - 'BEVERLY: Toxicological tests showed no unusual substances in their systems. And
    they were in good health. But for whatever reason, they seem to have turned against
    each other, using phasers, knives -- and bare hands.'
  - 'CAPTAIN ZAHEVA: First Officer Brink and his men were behind it... they got to
    the engines... don''t work anymore... had to eliminate Brink... the ship is out
    of... out of... we''re running out... too dangerous... out of Brink... and his
    men...'
