  - character_uuid: ger_agent_0e5c114935a9
    emotional_state: "\n        Concerned and unsettled by Picard's collapse, but\
      \ constrained by Klingon discipline and Starfleet protocol. His emotional state\
      \ is one of quiet alarm, recognizing the gravity of the captain's breakdown\
      \ while unable to intervene meaningfully.\n      "
    goals:
    - Maintain order on the bridge despite the captain's instability
    - Silently assess the implications of Picard's delegation to Data
    what_happened: "\n        Worf witnesses Picard's breakdown in the turbolift,\
      \ his stoic demeanor momentarily disrupted by shock. He moves toward the captain\
      \ with concern, but Picard's abrupt recovery ('As you were') shuts down any\
      \ further intervention. Worf's silence and watchful gaze suggest deep unease,\
      \ though he adheres to protocol. His later observation of Picard delegating\
      \ command to Data is passive but loaded with unspoken tension, reflecting the\
      \ crew's unraveling hierarchy.\n      "
