    global_id: ger_object_086157395e39
  - object_uuid: ger_object_33cb87e9af9c
    description_of_involvement: "\n        Picard’s *Ready Room Computer* is the stage\
      \ for the revelation of Zaheva’s log. Beverly programs it with clinical precision,\
