    what_happened: Geordi takes his place at a science station near Data, his fingers
      moving confidently over the controls as he pre-heats the injectors and coordinates
      with Data to verify fuel flow and valve status. His voice is steady, his demeanor
      assured—until the engines fail to respond. At that moment, his brow furrows,
      and he stares at the readouts as if willing them to change. His perplexity is
      palpable, a rare crack in his usual optimism, as he grapples with the impossibility
      of a ship that *should* work but won’t. He turns to Riker, his voice laced with
      genuine confusion, admitting he doesn’t understand what’s happening—a admission
      that underscores the gravity of the situation.
