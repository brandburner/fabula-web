    what_happened: "\n        Riker stands near the tactical station, his arms crossed\
      \ as he watches the deflector beam fizzle out. His posture is rigid, his expression\
      \ a mix of frustration and resignation. When he speaks—'Nothing... it just fizzled\
      \ out...'—his voice carries the weight of a man who expected better but isn't\
      \ surprised. He doesn't press for another attempt; he knows the risks. Instead,\
      \ he watches Picard, waiting for the captain to take the lead, but also bracing\
      \ for the possibility that Picard might not have an answer this time. Riker's\
      \ role as the bridge between command and crew is tested here: he must project\
      \ confidence, even as his own doubts gnaw at him.\n      "
