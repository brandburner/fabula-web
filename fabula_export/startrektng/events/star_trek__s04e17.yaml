  object_involvements:
  - object_uuid: ger_object_ea08de738e27
    description_of_involvement: "\n        The *Enterprise*'s impulse engines, the\
      \ ship's primary sublight propulsion system, are ordered by Picard to engage\
      \ at minimum power. However, Lin reports that they are 'not responding,' marking\
      \ another critical failure in the ship's systems. The impulse engines' refusal\
      \ to engage is the final nail in the coffin of the crew's hopes for escape.\
      \ Without impulse power, the *Enterprise* is left drifting, its propulsion systems\
      \ entirely disabled. The failure is not a malfunction but a deliberate sabotage\
      \ by the Rift, stripping the crew of their last means of control. The engines'\
      \ silence is deafening, a physical manifestation of the crew's helplessness.\n\
      \      "
    status_before_event: "\n        Fully operational and ready for engagement. The\
      \ impulse engines are the ship's primary means of sublight travel and are functioning\
      \ within expected parameters. They are prepared to execute Picard's order to\
      \ move the *Enterprise* forward, even at minimum power.\n      "
    status_after_event: "\n        Completely unresponsive and non-functional. The\
      \ impulse engines' failure is part of a cascading systems collapse, leaving\
      \ the *Enterprise* without propulsion. Their shutdown is permanent within this\
      \ event, ensuring the ship's paralysis and deepening the crew's despair.\n \
      \     "
    global_id: ger_object_ea08de738e27
  - object_uuid: ger_object_ba5b477b4454
    description_of_involvement: "\n        The *Enterprise*'s maneuvering thrusters,\
      \ critical for fine-tuned movement and stabilization, begin to fail the moment\
      \ the tractor beam is engaged. Data's report of 'thrusters are losing power'\
      \ marks the first domino in the ship's systems collapse. Lin later confirms\
      \ their total shutdown, leaving the *Enterprise* without the ability to adjust\
      \ its position or avoid drift. The thrusters' failure is not gradual but abrupt,\
      \ as if severed by an external force. Their loss is a direct blow to the crew's\
      \ ability to navigate the Rift, amplifying their sense of entrapment.\n    \
      \  "
    status_before_event: "\n        Fully operational and responsive to bridge commands.\
