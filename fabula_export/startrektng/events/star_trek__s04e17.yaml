  title: O'Brien Accuses Keiko of Infidelity
  description: O'Brien, already unraveling from sleep deprivation in the Tyken's Rift,
    confronts Keiko with unfounded accusations of infidelity with Tom Corbin. His
    paranoia escalates as he rejects her affection, physically pushing her away when
    she tries to embrace him. The scene reveals the Rift's psychological weaponization—exploiting
    O'Brien's vulnerability to fracture trust and destabilize the crew. Keiko's stunned
    silence underscores the irreversible damage inflicted by the Rift's siege, marking
    a critical turning point in their relationship and foreshadowing further unraveling
    among the Enterprise crew. The confrontation is abrupt, emotionally raw, and structurally
    pivotal, serving as both a character study of O'Brien's descent and a thematic
    exploration of how the Rift preys on personal insecurities to sow chaos.
