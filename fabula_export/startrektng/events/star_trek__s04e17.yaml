      \ itself: a beacon of human ingenuity and resilience, now adrift and helpless.\
      \ The crew's struggle to maintain control over the ship reflects Starfleet's\
      \ broader challenge—how to confront an enemy that defies logic, technology,\
      \ and even the human mind.\n      "
