  title: Troi’s Descent into the Rift’s Hallucination
  description: |2-

      Deanna Troi, psychically unmoored by the Tyken’s Rift, drifts through a disorienting void where twin lights pierce the fog and a disembodied voice taunts her with cryptic whispers. The voice—echoing the Brattain crew’s final madness—repeats *‘Eyes... in the dark...’* as Troi turns in panic, searching for an escape that doesn’t exist. Her fear is palpable, her Betazoid senses overwhelmed by the Rift’s psychological assault. Meanwhile, Data’s countdown (*‘We have ninety seconds remaining’*) underscores the urgency: Troi’s nightmare isn’t just a hallucination but a race against time to locate the source of the voice before the Rift’s effects consume her entirely. The scene blurs reality and delusion, forcing Troi to confront the Rift’s core horror: the voice isn’t just a taunt—it’s a distress call from another trapped vessel, and her only hope of escape lies in answering it.
