    become trapped in a massive rupture in space... undetectable by normal means...
    into which energy is absorbed.'
  - 'PICARD: You mean... a Tyken''s Rift...'
  - 'WORF: I was detained.'
  - 'BEVERLY: Data... in Tyken''s experience... did the crew exhibit behavioral changes?'
  - 'DATA: No. There were no reports of unusual conduct among the crew. There was
    no record of sleep disturbances of any kind, Counselor.'
  - 'BEVERLY: Then -- what is it? What''s happening to us?'
