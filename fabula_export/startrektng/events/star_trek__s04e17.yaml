- fabula_uuid: act_a3f85aa0c8f10b88
  number: 3
  summary: 'Data identifies the cause of their physical entrapment: the Enterprise
    is caught in a Tyken''s Rift, a rare spatial anomaly that drains all energy, rendering
    propulsion systems useless. He explains that escaping such a rift typically requires
    a massive, concentrated energy release, which the Enterprise currently lacks the
    means to produce, as even photon torpedoes would be insufficient. Simultaneously,
    the psychological toll on the crew intensifies. Picard and Riker both admit to
    experiencing vivid hallucinations; Picard sees the turbolift ceiling descending
    to crush him, while Riker finds his bed filled with snakes. Profoundly shaken
    by his own vulnerability and the frightening prospect of losing control of his
    mind, Captain Picard makes the difficult decision to delegate critical decision-making
    authority to Data, recognizing that his own cognitive faculties are compromised.
    Dr. Beverly Crusher, after further investigation, makes a breakthrough discovery:
    the crew is suffering from severe REM sleep deprivation, which is causing the
    cognitive decline, paranoia, and hallucinations. She warns Picard that without
    a solution, the entire crew is destined to descend into irreversible madness,
    a grim prognosis that underscores the dire stakes.'
  key_moments: []
  scene_numbers:
