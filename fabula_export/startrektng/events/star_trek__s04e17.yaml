  title: Picard surrenders command to Data
  description: 'In the Enterprise’s ready room, Picard—visibly shaken by his earlier
    REM-deprivation hallucinations—confronts the terrifying prospect of losing cognitive
    control. He confesses his vulnerability to Data, revealing a deeply personal memory
    of his grandfather’s dementia as a metaphor for his own unraveling. Recognizing
    the urgency of their predicament in the Tyken’s Rift, Picard makes a rare and
    painful decision: he delegates tactical authority to Data, entrusting the android
    with the critical task of channeling power to the deflector dish. This moment
    marks a profound inversion of their dynamic, as Picard’s pride and command instincts
    are eclipsed by necessity, forcing him to rely on Data’s uncompromised logic to
    navigate their shared descent into madness. The scene underscores the crew’s collective
    unraveling while establishing Data as the only stable force aboard the ship, setting
    up his eventual assumption of command as Acting Captain.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e17
  scene_sequence: 19
  sequence_in_scene: 31
  key_dialogue:
  - 'DATA: Sir, Commander La Forge and I have come up with a potential solution to
    our predicament. Perhaps the modifications we used to increase firepower against
    the Borg might be effective here.'
  - 'PICARD: Apparently... I am not immune... to the strange forces at work on this
    ship... It is my responsibility... somehow... to see that this ship is guided
    to safety. I will have to rely on you, from now on... We may need to count on
    you for our very survival.'
  - 'PICARD: It''s a frightening prospect... to lose control of your mind... When
    I was young, I saw my grandfather deteriorate... from a powerful, robust figure...
    to a -- a frail wisp of a man, who couldn''t even remember how to make his way
    home...'
