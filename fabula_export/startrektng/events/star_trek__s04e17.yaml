  title: Data implements life-support diversion plan
  description: "\n  In Sickbay, Beverly Crusher prepares to force Deanna Troi into\
    \ REM sleep using a cortical scanner, a desperate measure to enable telepathic\
    \ communication with the trapped vessel. Meanwhile, on the empty bridge, Data—now\
    \ Acting Captain—reports the plan’s readiness to Picard, who authorizes the procedure\
    \ despite its catastrophic risks. Data immediately broadcasts a shipwide announcement\
    \ diverting life-support power to the warp core, a move that will accelerate the\
    \ crew’s REM deprivation but is their only chance to escape the Tyken’s Rift.\
    \ The scene underscores the crew’s collective desperation: Beverly’s trembling\
    \ hands betray her own deteriorating state, while Picard’s silent approval of\
    \ Data’s gambit reveals his trust in the android’s logic over his own faltering\
    \ judgment. The moment marks a turning point—no longer merely surviving the Rift,\
    \ the Enterprise is now actively betting its crew’s lives on a high-stakes escape\
    \ plan.\n  "
