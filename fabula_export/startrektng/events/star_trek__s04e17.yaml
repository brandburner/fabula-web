  title: Enterprise loses propulsion control
  description: "\n  The Enterprise, already adrift in the Tyken's Rift, attempts to\
    \ tow the derelict USS Brattain using its tractor beam. Picard orders Worf to\
    \ prepare the beam, but the operation immediately triggers a cascading systems\
    \ failure. Data detects the loss of maneuverability, and Lin confirms the thrusters\
    \ are failing. When Picard commands impulse engines to engage at minimum power,\
    \ Lin reports they are unresponsive. Riker attempts to contact Engineering for\
    \ answers, but the channel remains silent. The failure compounds the crew's psychological\
    \ unraveling, as the Rift's REM-deprivation effects erode their ability to respond\
    \ effectively to the crisis. The scene underscores the escalating helplessness\
    \ of the Enterprise crew, trapped in a deteriorating ship with no clear path to\
    \ escape or restoration of control.\n  "
