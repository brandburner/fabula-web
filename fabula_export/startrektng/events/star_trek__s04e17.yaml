  participations:
  - character_uuid: ger_agent_b1e9e0b6f423
    emotional_state: "\n        A fragile facade of control masking deep terror and\
      \ humiliation. His emotional state oscillates between desperate attempts to\
      \ maintain authority and raw, exposed panic during the hallucination. The delegation\
      \ to Data is a final, resigned act of surrender to the Rift's psychological\
      \ assault.\n      "
    goals:
    - Maintain the illusion of command despite his deteriorating mental state
    - Protect Riker (and the crew) from the full extent of his own psychological collapse
    what_happened: "\n        Picard begins the event with a facade of control, probing\
      \ Riker's mental state while subtly revealing his own unraveling. His physical\
      \ tells—tugging at his collar, leaning against the turbolift wall—betray his\
      \ growing disorientation. The hallucination of the ceiling crushing him triggers\
      \ a primal collapse: he sinks to his knees, hands raised in terror, his voice\
      \ reduced to a childlike plea ('No! No!'). After Worf witnesses his breakdown,\
      \ Picard struggles to reclaim dignity, exiting the turbolift with forced composure\
      \ before abruptly delegating command to Data, a rare admission of vulnerability.\n\
      \      "
