acts:
- fabula_uuid: act_bffd521eab704ec7
  number: 1
  summary: The Enterprise locates the USS Brattain, a missing science vessel, adrift
    near a binary star system. A landing party beams aboard, discovering the entire
    crew dead, seemingly having killed each other in a violent frenzy. The only survivor,
    a Betazoid science advisor named Andrus Hagan, is found in a profound catatonic
    state, only able to utter fragmented, terrifying phrases. Dr. Beverly Crusher's
    autopsies confirm the crew's self-destruction, with no external cause, and Captain
    Zaheva's logs reveal a descent into paranoia and mutiny, made after the ship became
    stranded. Meanwhile, attempts by Geordi La Forge and Data to restart the Brattain's
    engines prove futile, indicating an unseen problem preventing propulsion. Counselor
    Deanna Troi experiences a vivid and terrifying nightmare, hearing a disembodied
    voice speak of 'eyes in the dark' and 'one moon circles.' This initial dream serves
    as the first direct, though cryptic, communication from the unknown threat, setting
    the stage for the psychological and physical peril that will soon engulf the Enterprise
    crew. The act establishes the central mystery of what happened on the Brattain
    and introduces the first unsettling signs that the Enterprise might be facing
    a similar fate.
