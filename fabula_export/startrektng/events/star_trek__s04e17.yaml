      but also a prison of responsibility.
    key_environmental_details:
    - The forward viewscreen, dark and imposing, reflecting Picard’s strained visage.
    - Data at Ops, his presence a steady counterpoint to the bridge’s eerie emptiness.
    - The hum of consoles, now reduced to a faint background noise, a reminder of
      the ship’s dwindling systems.
    - Picard’s rigid posture at the command chair, his hands gripping the arms as
      if to anchor himself to reality.
