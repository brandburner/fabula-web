    emotional_state: Stunned into helplessness, his usual strategic mind overwhelmed
      by the magnitude of the failure and the looming threat to his crew's survival.
    goals:
    - To find *any* viable alternative to retrying the deflector discharge, even if
      it means accepting temporary setbacks.
    - To regain his composure and restore a sense of leadership before the crew's
      morale collapses entirely.
    what_happened: "\n        Picard stands frozen at the center of the bridge, his\
      \ fingers pressed lightly against the armrest of his chair as if bracing for\
      \ impact. His face is a mask of stunned disbelief, his usual composure replaced\
      \ by a rare, vulnerable hesitation. When Data delivers the verdict—'No, sir.\
      \ If we draw more power, we risk losing life-support systems.'—Picard doesn't\
      \ respond. His silence isn't contemplative; it's paralytic. The weight of command\
      \ has never felt heavier, and for the first time, he has no next move. His eyes\
      \ flicker toward the viewscreen, where the Rift looms like a silent predator,\
      \ but his mind is elsewhere—trapped in the realization that his crew's survival\
      \ now hinges on the impossible.\n      "
    observed_status: "\n        Picard stands frozen at the center of the bridge,\
