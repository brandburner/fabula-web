- fabula_uuid: cand_evt_scene_442e5214348ab1ef_01
  global_id: null
  title: Troi deciphers alien distress call
  description: "\n  In the Enterprise's ready room, Counselor Troi—visibly unraveling\
    \ from REM deprivation—reveals she has detected a Betazoid-specific telepathic\
    \ distress signal from the entities causing their torment. The message, fragmented\
    \ but urgent ('Eyes in the dark'), suggests the beings are trapped like the Enterprise\
    \ and actively seeking help. Picard, struggling to maintain focus, presses Troi\
    \ for details, while Data cross-references her insights with sensor data, hypothesizing\
    \ the presence of another ship on the rift's opposite side. Troi proposes using\
    \ 'directed dreaming,' a therapeutic technique, to communicate with the entities\
    \ and potentially coordinate an escape. The exchange underscores the crew's desperation—Beverly\
    \ paces restlessly, Picard clings to coherence, and Data remains the sole rational\
    \ anchor—while raising the possibility of an ally or a shared solution to their\
