  key_dialogue:
  - 'TROI: REM sleep occurs at a different frequency for Betazoids than other humanoids...
    I believe these beings are using that frequency to communicate telepathically...'
  - 'TROI: They''re calling for help. I think they''re trapped just like we are. ''Eyes
    in the dark''... could mean this twin star system...'
  - 'TROI: Maybe... communication through dreams can work both ways... I could try
    to get them to stop...'
  - 'TROI: Dreamers can learn to take control of their dreams... retain a conscious
    memory... even while they''re in REM sleep. I should be able to remember a short
    message.'
  - 'PICARD: If it''s... possible... what would you say... ?'
  - 'DATA: Perhaps we can accomplish more than that. If we could coordinate our efforts
    with these beings... we might work together to free ourselves.'
