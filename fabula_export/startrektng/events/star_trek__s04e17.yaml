  - character_uuid: ger_agent_f1a913dda0ad
    emotional_state: "\n        Anxious and unsettled, teetering between controlled\
      \ admission of his symptoms and raw, instinctive terror during the snake hallucination.\
      \ His emotional state reflects the Rift's erosion of his usual resilience, leaving\
      \ him exposed and reactive.\n      "
    goals:
