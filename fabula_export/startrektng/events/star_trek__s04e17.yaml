  title: Troi’s Forced REM Sleep Experiment
  description: "\n  In Sickbay, Beverly Crusher—visibly struggling with REM deprivation—prepares\
    \ to force Deanna Troi into REM sleep using a cortical scanner, a desperate attempt\
    \ to establish telepathic contact with the derelict ship’s crew. The procedure\
    \ is risky, with Data imposing a two-minute limit due to the Enterprise’s dwindling\
    \ power reserves. Meanwhile, Picard, barely holding onto his faculties on the\
    \ empty bridge, authorizes the plan despite its life-threatening consequences.\
    \ Data, now acting captain, issues a shipwide order to divert life support power\
    \ to the warp core, setting the stage for a high-stakes gamble to escape the Tyken’s\
    \ Rift. The scene underscores the crew’s unraveling mental states and the brutal\
    \ trade-offs required for survival, with Troi’s telepathic probe serving as their\
    \ last hope for salvation.\n  "
