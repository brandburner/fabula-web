- fabula_uuid: cand_evt_scene_3b60f7c6ac321ac7_01
  global_id: null
  title: Troi's Nightmare and Hagan's Clue
  description: "\n  Deanna Troi, exhausted and on the edge of psychological collapse,\
    \ drifts into a nightmare vision of the Tyken's Rift—a murky void filled with\
    \ cryptic whispers and an indistinct shape. The disembodied Sighing Voice repeats\
    \ its haunting refrain ('Eyes in the dark... one moon circles...'), reinforcing\
    \ the eerie, telepathic distress call from the trapped ship. Troi jolts awake,\
    \ disoriented, and turns to Hagan, the catatonic Betazoid survivor of the *Brattain*,\
    \ desperate for answers. Hagan murmurs the word *'double'*—a fragment of meaning\
    \ that Troi clings to as a potential clue. Meanwhile, Beverly Crusher, visibly\
    \ strained, confesses her failure to restore REM sleep to the crew, revealing\
    \ Troi is the only one still capable of dreaming—though her nightmares are becoming\
    \ unbearable. Troi’s despair deepens as she realizes her inevitable descent into\
    \ the same catatonic state as Hagan, underscoring the crew’s collective unraveling.\
    \ The scene pivots from Troi’s personal terror to the broader crisis: the *Enterprise*’s\
    \ crew is losing their minds, and Hagan’s cryptic word may be the only key to\
    \ escape.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e17
  scene_sequence: 22
  sequence_in_scene: 34
  key_dialogue:
  - 'TROI: Where are you... ?'
  - 'SIGHING VOICE: Eyes... in the dark... one moon circles...'
  - 'HAGAN: ...double... double...'
  - 'TROI: What does that mean? Is something doubled?'
  - 'BEVERLY: Deanna... Nothing''s working... I''ve tried somatic drugs, I''ve tried
    inducing theta waves in the entorhinal cortex... no matter what I do, no one can
    reach REM sleep. No one can dream... except you...'
  - 'TROI: Except me... And all I have is nightmares... I can barely sleep at all
    anymore.'
  - 'TROI: In the end... I''ll be like him. Just like him.'
