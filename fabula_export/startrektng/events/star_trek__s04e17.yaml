    it will maintain electrical activity in your brain at the proper frequencies...'
  - 'TROI: Two minutes, is that all, Data?'
  - 'DATA: Unfortunately, yes. We have only enough power to emit a hydrogen stream
    for that period of time. They must understand that they have to detonate it immediately.'
  - 'DATA: Sir, we are ready to implement the plan.'
  - 'PICARD: Proceed.'
  - 'DATA: We will need to draw power from the life support systems in order to discharge
    the collectors.'
