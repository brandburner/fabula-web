  title: Beverly admits REM sleep failure
  description: 'In Sickbay, Deanna Troi—already unraveling from nightmares and Hagan’s
    cryptic warnings—watches Beverly Crusher deliver a devastating update: despite
    exhaustive medical efforts, she cannot restore REM sleep to the crew. Beverly’s
    exhaustion and frustration mirror the crew’s collective despair, while Troi’s
    reaction reveals her growing fear of succumbing to the same madness that left
    Hagan catatonic. The moment crystallizes the crew’s vulnerability, forcing Troi
    to confront her own psychological unraveling as the ship’s fate hangs in the balance.
    Beverly’s admission isn’t just a medical failure—it’s a narrative turning point,
    stripping away the crew’s last hope of resisting the Tyken’s Rift’s psychological
    toll. Troi’s despairing glance at Hagan underscores the inevitability of her own
    descent unless she finds another way to fight back.'
