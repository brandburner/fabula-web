  global_id: null
  title: Enterprise detects the Brattain’s ominous silence
  description: "\n  The *Enterprise* emerges from warp near a binary star system,\
    \ where the derelict *USS Brattain*—a science vessel missing for 29 days—floats\
    \ powerless and adrift. Picard orders a sensor sweep, revealing no structural\
    \ damage but inconclusive life signs. Data confirms the ship’s propulsion is offline,\
    \ while Troi’s empathic senses pick up a disturbing, ambiguous presence aboard.\
    \ Her unease is palpable, her expression suggesting something far worse than death.\
    \ Picard, noting her reaction, immediately authorizes an away team to investigate.\
    \ Riker assembles Data, Worf, and—after Troi insists—Crusher and Troi herself,\
    \ though her insistence carries an unspoken warning. The team departs for the\
    \ transporter room, leaving Picard to observe the Brattain with growing apprehension.\
    \ The scene establishes the mission’s stakes: a ship that should not be silent,\
    \ a crew that may not be alive, and a psychological undercurrent Troi alone perceives.\
    \ The discovery is not just a mystery—it is a harbinger of the Tyken’s Rift’s\
    \ insidious influence, already seeping into the *Enterprise*’s collective psyche.\n\
    \  "
