- fabula_uuid: cand_evt_scene_04835f846254b68b_01
  global_id: null
  title: Away Team Discovers Brattain Massacre
  description: "\n  The away team materializes on the *Brattain*'s bridge, expecting\
    \ to find survivors or answers, only to confront a grotesque crime scene. Data's\
    \ initial scan reveals no system malfunctions, but Riker's turn of the command\
    \ chair exposes Captain Zaheva's corpse—her eyes frozen in terror, a tool impaled\
    \ in her chest. Worf uncovers a second body, charred by a phaser set to lethal\
    \ force, while Beverly confirms the entire bridge crew is dead. Troi senses a\
    \ lone survivor, leading her to the turbolift where Hagan, a catatonic Betazoid,\
    \ sits unresponsive. The scene forces the team to confront the unthinkable: the\
    \ crew turned on each other in a frenzy of madness, a harbinger of the Tyken's\
    \ Rift's psychological toll. Riker's warning that the killer may still be aboard\
    \ heightens the tension, while Troi's empathic connection to Hagan hints at the\
    \ deeper mystery yet to unfold.\n  "
