      \ reason are all *under siege* in the ready room. The *Brattain*’s crew were\
      \ Starfleet officers—disciplined, trained, and loyal—and yet they turned on\
      \ each other without external cause. This event forces Picard and Beverly to\
      \ question whether Starfleet’s *preparedness* is an illusion. The organization’s\
      \ involvement is *systemic*: it is the *framework* within which the *Brattain*’s\
      \ collapse and the *Enterprise*’s crisis unfold. Starfleet’s *failure to anticipate*\
      \ the Tyken’s Rift’s effects is the subtext of every line in this scene.\n \
      \     "
    active_representation: Through the *Brattain*’s derelict status (a failure of
      Starfleet’s support systems) and the *Enterprise* crew’s deteriorating condition
      (a test of Starfleet’s training).
    power_dynamics: Starfleet is *powerful in theory* but *powerless in practice*
      against the Rift’s psychological assault. Its authority is being *challenged
      by the unknown*.
    organizational_goals:
    - To *maintain the illusion of control* (Picard’s role as Starfleet’s representative
      on the *Enterprise*).
    - To *prevent a repeat of the Brattain’s fate* (the unspoken mission of this scene).
    influence_mechanisms:
    - Through *institutional pride* (Picard’s faith in Starfleet’s protocols),
    - Through *protocol* (the autopsy report and log as official Starfleet documentation).
    institutional_impact: The *Brattain*’s fate *exposes the cracks* in Starfleet’s
      preparedness. If a Starfleet crew can turn on itself without cause, then *no
      ship is safe*—and Starfleet’s *entire mission* is called into question.
    internal_dynamics: The tension between *Starfleet’s ideals* (cooperation, reason)
      and the *Rift’s reality* (paranoia, violence) is the core conflict of this event.
      The organization’s *internal debate* is whether its training is enough—or if
      it is *fundamentally flawed*.
    global_id: ger_organization_73a4b614bde7
