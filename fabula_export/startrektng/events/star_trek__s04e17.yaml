  scene_sequence: 23
  sequence_in_scene: 36
  key_dialogue:
  - 'GILLESPIE: I think... it''s some kind of experiment... Captain Picard wants to
    see how we''ll take it, stuck here like rats...'
  - 'GILLESPIE: It''s like we''re laboratory animals... I don''t want to sit and wait
    for death to sneak up behind me...'
  - 'GILLESPIE: You heard about them on the Brattain... shut in their rooms... dying
    alone... that''s not for me. I''d rather go out fighting...'
