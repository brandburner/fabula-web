  title: Troi Finds the Catatonic Betazoid Survivor
  description: "\n  The away team materializes on the *Brattain*’s bridge, only to\
    \ discover a massacre—Captain Zaheva impaled in her chair, other crew members\
    \ charred by phaser fire, their bodies hidden under consoles as if they died in\
    \ terror. Data confirms no system malfunctions, ruling out mechanical failure\
    \ as the cause. As the team processes the horror, Troi senses a psychic presence\
    \ and moves toward the turbolift, where she finds Hagan, a catatonic Betazoid\
    \ man. Beverly confirms he is alive, but he remains unresponsive, his vacant stare\
    \ suggesting deep psychological trauma. Riker and Worf keep their phasers trained\
    \ on him, wary of another threat, while Troi attempts to establish contact, her\
    \ Betazoid empathy drawing her to him despite his silence. The discovery shifts\
    \ the investigation from external threats to the psychological horror of the Tyken’s\
    \ Rift, raising urgent questions about Hagan’s role in the slaughter and the fate\
    \ of the *Enterprise*’s crew if they remain trapped.\n  "
