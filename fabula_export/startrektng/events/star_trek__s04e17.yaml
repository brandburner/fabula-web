      \ Tyken's Rift. However, the moment it engages, the beam becomes a catalyst\
      \ for the ship's systems failure. Data reports the loss of maneuverability almost\
      \ immediately, and the beam's activation seems to trigger a cascade of malfunctions—thrusters\
      \ lose power, and the impulse engines become unresponsive. The beam, meant as\
      \ a tool of salvation, instead accelerates the *Enterprise*'s descent into helplessness.\
      \ Its failure is not just mechanical but symbolic: the crew's last hope of regaining\
      \ control is stripped away by the Rift's malevolent influence.\n      "
    status_before_event: "\n        Fully operational and ready for deployment. The\
