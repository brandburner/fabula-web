  title: Peeples attacks Geordi in Engineering
  description: In the Enterprise's Engineering section, Geordi and Data work urgently
    to prepare the deflector discharge, unaware of Ensign Peeples' approach. Peeples,
    now fully unhinged by sleep deprivation, suddenly lunges at Geordi, accusing him
    of sabotaging the crew's escape by tampering with the reactant mix. Data intervenes
    with android precision, blocking the attack and restraining Peeples until security
    arrives. The guards escort the raving ensign to sickbay, where he continues to
    shout threats about exposing Geordi's supposed betrayal. The incident leaves Geordi
    visibly shaken, his desperation palpable as he voices his fear that the crew won't
    survive much longer. This moment underscores the escalating psychological collapse
    aboard the Enterprise, where paranoia and distrust now threaten to derail the
    crew's last hope for escape. The attack also highlights Data's growing role as
    the ship's stabilizing force, his immunity to the Rift's effects making him the
    only reliable authority in the crisis.
