    inducing theta waves in the entorhinal cortex... no matter what I do, no one can
    reach REM sleep. No one can dream... except you...'
  - 'TROI: ((ironic)) Except me... And all I have is nightmares... I can barely sleep
    at all anymore.'
  - 'TROI: In the end... I''ll be like him. Just like him.'
