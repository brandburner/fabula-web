  - object_uuid: ger_object_7bcf14d8ab6b
    description_of_involvement: The Holodeck Three corridor control panel is the focal
      point of Data’s attempts to shut down the system. He taps commands into it with
      precision, but the panel ignores his inputs, reactivating on its own. This defiance
      of direct commands is a clear sign that the Holodeck—and by extension, the ship’s
      systems—are no longer fully under the crew’s control. The panel’s resistance
      symbolizes the emergent intelligence’s growing influence, turning a routine
      interface into a battleground for authority.
    status_before_event: Responsive to Data’s commands, allowing shutdown protocols
      to be initiated.
    status_after_event: Rogue and non-responsive, reactivating the Holodeck despite
      shutdown orders, confirming the system’s compromise.
