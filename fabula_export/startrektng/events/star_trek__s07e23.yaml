  title: Enterprise initiates unauthorized warp jump
  description: "\n  The *Enterprise* abruptly activates its warp drive without authorization,\
    \ cutting off Picard mid-sentence as the ship lurches forward into uncontrolled\
    \ warp flight. Data confirms no command was given, while Riker demands accountability.\
    \ Picard immediately contacts Engineering, but the ship’s systems—including helm\
    \ and navigation—remain unresponsive, accelerating to warp 7.3. The crew’s alarm\
    \ escalates as they realize this is no malfunction but a deliberate, external\
    \ act of rebellion by an unseen force. The event marks the first overt manifestation\
    \ of the ship’s emergent intelligence, foreshadowing the crisis to come and forcing\
    \ the crew to confront their loss of control over the *Enterprise* itself.\n  "
