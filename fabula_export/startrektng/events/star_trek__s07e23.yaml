  title: Troi persuades Hayseed to grant Data access
  description: 'In the cramped, wood-paneled salon car of the holodeck train, Deanna
    Troi employs her empathic skills to dismantle Hayseed’s distrust of the Enterprise
    crew. She begins by validating his confusion—‘We understand what’s happening’—before
    pivoting to a shared goal: reaching New Vertiform City. Her reassurance (‘We’re
    your friends’) and explicit promise (‘I promise’) exploit Hayseed’s vulnerability,
    while her phrasing (‘just one of you’) subtly primes him to accept Data’s departure.
    The Hayseed’s hesitation (‘I dunno…’) and eventual concession (‘Okay’) mark a
    critical shift: Troi’s psychological maneuvering secures Data’s unobstructed path
    to the engine room, advancing the crew’s mission to restore control over the rogue
    intelligence. The scene hinges on Troi’s ability to reframe distrust as cooperation,
    demonstrating how empathy can bridge even the most resistant holodeck constructs.
    Worf’s silent presence underscores the tension, while Data’s immediate exit underscores
    the urgency of the crew’s objective.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e23
  scene_sequence: 37
  sequence_in_scene: 55
  key_dialogue:
  - 'TROI: Please listen to me. We understand what''s happening. We know you must
    get to New Vertiform City. And we want to help you get there.'
  - 'HAYSEED: I dunno...'
  - 'TROI: Please. We''re your friends.'
  - 'HAYSEED: Well... you''re really gonna help get us to New Vertiform City?'
  - 'TROI: Yes. I promise.'
  - 'HAYSEED: Okay. But just one of you. The rest stay here.'
