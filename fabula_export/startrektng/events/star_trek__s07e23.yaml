  key_dialogue:
  - 'GEORDI: ((off tricorder, to com)) The object''s absorbing vertion particles,
    sir... and it''s growing even faster than before.'
  - 'GEORDI: ((amazed)) Sir... I''m picking up internal energy emissions from this
    thing...'
  - 'RIKER: What do you mean?'
  - 'GEORDI: It''s beginning to generate its own energy...'
  - 'PICARD''S COM VOICE: Can you be more specific?'
  - 'GEORDI: I''m picking up coherent emissions... matter conversion... it''s incredible...'
  - 'GEORDI: Wait, something''s wrong... we''ve got power fluctuations... the vertion
    absorption rate is dropping... What''s happening to the particle beam?'
  - 'RIKER: The beam''s exhausted the supply of particles in the star... there''s
    nothing left to take out.'
  - 'GEORDI: Captain -- the object''s energy output is decreasing...'
