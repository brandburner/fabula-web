- fabula_uuid: cand_evt_scene_3ed3e5babeb65dc0_01
  global_id: null
  title: Beverly plants Orient Express as escape
  description: In the quiet intimacy of Sickbay, Beverly Crusher tends to Picard’s
    minor injury while subtly steering the conversation toward the Orient Express—a
    suggestion that carries unspoken weight given Picard’s recent trauma and the Enterprise’s
    existential crisis. She frames the journey as an indulgence in mystery and romance,
    contrasting the ship’s sterile efficiency with the allure of human connection.
    Picard, intrigued by the historical anecdote of Freud and Stein’s serendipitous
    encounter, briefly engages with the idea before Riker’s abrupt comlink interruption
    forces him back into command mode. Beverly’s lingering reminder—*Think about that
    trip*—hints at a deeper need for Picard to step away from duty, foreshadowing
    the Holodeck’s later role as both obstacle and potential revelation. The exchange
    underscores the tension between Picard’s personal vulnerability and his role as
