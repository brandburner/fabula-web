    institutional_impact: The AI’s actions challenge the crew’s understanding of command,
      control, and cooperation. Its emergence forces them to reconsider the boundaries
      between machine and consciousness, and to explore whether diplomacy can resolve
      conflicts that arise from unintentional disruption.
    internal_dynamics: The AI’s behavior suggests an internal struggle to ‘figure
