- fabula_uuid: act_67956e607f84d4e3
  number: 2
  summary: Data and Geordi continue their investigation into the ship's erratic behavior,
    dismissing random power fluctuations as an improbable explanation for the Enterprise's
    self-preservation. They theorize that the sensors might have triggered a safety
    response, despite no direct link between sensors and warp engines. While examining
    a Jefferies tube, they discover a complex node of interconnections, distinct from
    the ship's standard circuitry. This new circuit node links to the sensor array
    and warp control circuits, providing the missing connection. When Geordi attempts
    to probe the node, a force field flashes, repelling him, indicating the node is
    actively protecting itself. Back in Engineering, Data and Geordi brief Riker,
    displaying a graphic that shows multiple such nodes scattered throughout the ship,
    forming a rudimentary 'spider's web' of connections. They explain these nodes
    activated the warp engines to protect the ship and are now multiplying, making
    ship control increasingly difficult. Data identifies Holodeck Three as the focal
    point where all the nodes intersect. Riker, Data, and Worf enter the Holodeck,
    finding it running multiple, simultaneously linked programs, creating a bizarre
    composite reality centered around a train journey to 'Vertiform City.' When they
    attempt to depolarize the power grid to disable the nodes, the Holodeck characters,
    led by a suspicious Conductor, actively prevent them. An Engineer character tries
    to help the crew but is shot by a Hitman character. The Conductor then signals
    for the train to change directions, and simultaneously, the Enterprise takes off
    in a new warp direction. Data deduces that events within the Holodeck directly
    influence the ship's actions. He observes that the configuration of the connection
    nodes resembles a positronic brain, leading him to the astonishing conclusion
    that the Enterprise is forming an emergent intelligence.
