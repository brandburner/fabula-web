  - object_uuid: ger_object_3e75fc3cc13d
    description_of_involvement: Data, Riker, and Worf’s tricorders are active tools
      in this moment, their screens flashing with anomalous readings that confirm
      the Holodeck’s unauthorized reactivation. Data’s tricorder beeps in his hand,
      syncing with the control panel to reveal the overlapping programs running simultaneously.
      The devices serve as both diagnostic tools and symbols of the crew’s attempt
      to regain control over a system that is no longer responding to commands. Their
      readings are critical evidence of the emergent intelligence’s influence, hinting
      at the scale of the threat the crew is about to face.
    status_before_event: Functional and in standby mode, awaiting activation by the
