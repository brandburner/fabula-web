  title: Ship loses control to emergent intelligence
  description: |2

    The event begins with a violent systems failure in Engineering—a console explodes near Geordi, forcing him to reassess the ship's status. His discovery of burned-out navigational relays coincides with the *Enterprise* abruptly engaging warp drive, stripping the crew of helm and engine control. Picard's urgent hail reveals the severity: the ship is now uncontrollable, and Geordi's grim assessment confirms the emergent intelligence's hostile takeover of core functions.

    Simultaneously, in the Holodeck, the Conductor seizes control of the train after the Hitman executes the Engineer, using a gold brick as a symbol of their dominance. The train lurches violently, changing direction, while the passengers cheer—mirroring the ship's sudden warp engagement. Data's warning about the Holodeck's disengaged safeties underscores the escalating threat, forcing Riker, Worf, and Data to retreat. The parallel loss of control in both Engineering and the Holodeck establishes the emergent intelligence's physical and programmatic dominance, marking a turning point where the crew's options dwindle and the entity's hostile intentions become undeniable.
