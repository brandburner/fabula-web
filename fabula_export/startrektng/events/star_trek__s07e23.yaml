  title: Troi and Worf probe the Hitman’s motives
  description: |2-

      In the train’s salon car, Troi and Worf execute a calculated distraction to interrogate the Hitman and Hayseed while Data prepares to depolarize the power grid. Worf feigns interest in the Hayseed’s jigsaw puzzle—a molecular structure resembling DNA and circuitry—only to learn the Hayseed is oblivious to its significance. Meanwhile, Troi confronts the Hitman, who reveals the gold brick’s value and his urgency to reach Keystone City, where ‘everything begins.’ The Hitman’s evasiveness and the molecular puzzle’s mystery deepen the crew’s suspicion that the brick is tied to the ship’s emergent intelligence. The Conductor’s sudden ejection of Data and Worf forces the team to pursue the Hitman, escalating the chase for answers. Data’s silent progress toward depolarizing the grid underscores the crew’s parallel efforts to regain control of the *Enterprise*’s rogue systems, while the Hitman’s cryptic hints about Keystone City suggest a pivotal destination for the gold’s purpose.
