      to intervene but momentarily restrained by the uncertainty of the situation.
      The heat and steam of the engine room cling to him, but his focus is razor-sharp,
      grounded in the need to understand and mitigate the crisis.'
    beliefs:
    - The Conductor’s distress is a sign of deeper systemic failure, likely tied to
      the emergent intelligence’s instability.
    - His presence and intervention are critical to preventing further escalation,
      whether in the holodeck or the broader ship.
    observed_traits:
    - Tactically alert
    - Protective of the crew and mission
    - Direct and no-nonsense
    - Adaptive to chaos
    - Physically imposing presence
