- fabula_uuid: act_b8f3bb28a3663335
  number: 4
  summary: Troi and Worf examine the now-complete brick wall in the Holodeck, pondering
    the meaning of the 'foundation' that has been laid. Data, at the manhole interface,
    attempts to depolarize the power grid using a low-frequency inversion field. However,
    a 1940s taxi suddenly screeches around the corner, attempting to run him over,
    highlighting the Holodeck's active resistance to interference. As Data activates
    his device, the Enterprise experiences violent shaking and flickering lights,
    losing structural integrity. In the Holodeck, the shaking causes bricks to fall
    from scaffolding, injuring Troi. Data quickly stops his device, and the ship's
    tremors subside. In Sickbay, Troi explains that the ship was protecting itself
    from their intervention. She elaborates that the Holodeck functions as the ship's
    'imagination,' filled with metaphorical imagery, and its characters represent
    various aspects of the ship, acting on instinct like an infant intelligence. She
    notes that the ship draws on the crew's experiences through their Holodeck programs.
    Picard, acknowledging that thwarting the ship has failed, decides to shift strategy
    towards cooperation. Troi, Data, and Worf return to the Holodeck train. This time,
    Worf presents tickets to 'Vertiform City,' gaining the Conductor's trust. The
    train then experiences power problems, and Worf helps by shoveling coal into the
    engine's boiler, restoring power. Simultaneously, the Enterprise, now on a new
    course, approaches a white dwarf star. Riker reports the ship is using a modified
    tractor beam to collect 'vertion particles' from the star, routing them directly
    into Cargo Bay Five. Geordi confirms the object in the Cargo Bay is rapidly absorbing
    these particles, growing larger and beginning to generate its own internal energy,
    resembling the strange molecule seen earlier. However, the particle beam soon
    exhausts the star's supply. The object's energy levels drop, and the Holodeck
    train, experiencing a corresponding power loss, lurches violently and derails,
    plunging the car into darkness. The ship's efforts to complete its mysterious
    creation are suddenly stalled, creating a critical setback.
