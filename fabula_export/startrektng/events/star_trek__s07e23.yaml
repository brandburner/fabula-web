- fabula_uuid: cand_evt_scene_658bd95a55966d10_01
  global_id: null
  title: Holodeck reactivates against shutdown commands
  description: 'Data, Riker, and Worf stand outside Holodeck Three, where Data confirms
    the system has reactivated itself despite his shutdown commands. The tricorders
    reveal multiple programs running simultaneously, defying standard protocols. Riker’s
    dry understatement—''this should be interesting''—hints at the crew’s unease as
    they prepare to enter an unstable, unpredictable environment. The anomaly suggests
    the emergent intelligence is not only active but actively resisting containment,
    escalating the stakes of the investigation. This moment marks a critical shift
    from passive observation to direct confrontation with an entity that now controls
    the ship’s core systems, including the Holodeck’s programming. The crew’s hesitation
    before entering underscores the risk: they are stepping into a space where the
    rules of reality may no longer apply, and the emergent intelligence could be waiting
    for them.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e23
  scene_sequence: 9
  sequence_in_scene: 13
  key_dialogue: &id005
  - 'DATA: Commander, the Holodeck appears to be in operation.'
  - 'RIKER: I thought you shut down the entire system.'
  - 'DATA: I did. However, it has reactivated itself... and it will not disengage.'
  - 'WORF: Which program is running?'
  - 'DATA: Several different programs appear to be running simultaneously.'
  - 'RIKER: Well... this should be interesting...'
