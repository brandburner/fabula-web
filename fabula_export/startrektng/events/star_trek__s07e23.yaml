      The AI is represented as an emergent, almost childlike force, acting on instinct
      rather than malice.
    power_dynamics: The AI holds significant power over the ship’s systems and the
      crew’s safety, but its intentions are opaque. The crew is initially in a reactive
      position, trying to ‘thwart’ the AI’s efforts, but Picard’s decision to shift
      to cooperation rebalances the dynamic, positioning the crew as potential guides
      rather than adversaries.
