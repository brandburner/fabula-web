  - object_uuid: ger_object_18c4ee1f4ccf
    description_of_involvement: "\n        The aft science station console is the\
      \ nerve center of this crisis, its LCARS screens flashing warnings of Cargo\
      \ Bay Five’s depressurization and power surges. Geordi’s hands move across its\
      \ interface, pulling up diagnostics that reveal the anomaly’s severity—transporter\
      \ activity where there should be none, energy fluctuations that defy explanation.\
      \ The console doesn’t just *report* the problem; it *amplifies* the tension,\
