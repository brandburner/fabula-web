    into warp drive on their own?'
  - 'DATA: Perhaps the engines were activated by a random power fluctuation.'
  - 'GEORDI: Which occurred just in time to save the ship?'
  - 'DATA: It is improbable... but it is possible.'
  - 'GEORDI: Well, I don''t think I''m ready to start believing in luck.'
  - 'DATA: There is another possibility. The sensors apparently detected a dangerous
    anomaly that threatened the Enterprise. It is possible that they triggered a safety
    response which caused the ship to avoid destruction.'
  - 'GEORDI: But there''s no direct link between the sensors and the warp engines...'
  - 'GEORDI: A force field... where did that come from?'
  - 'DATA: It appears to be protecting itself.'
