    emotional_state: 'Picard projects an exterior of calm authority, but beneath the
      surface, there’s a current of unease. His dismissal of the head injury as a
      ‘scrape’ is classic Picard—prioritizing the ship over himself—but the fact that
      he mentions it at all suggests it’s a physical manifestation of his deeper anxiety
      about the *Enterprise*’s instability. His emotional state is one of *controlled
      vigilance*: he’s not panicked, but he’s acutely aware that this malfunction
      could be a symptom of something larger. The corridor, a transitional space,
      mirrors his own role as a bridge between the crew’s immediate concerns and the
      ship’s long-term safety.'
    goals:
