  title: Troi and Worf abandon Data to chase Hitman
  description: 'After emerging from the Brooklyn subway into an eerily deserted Holodeck
    street, Troi and Worf split from Data when Troi''s empathic senses detect the
    Hitman''s presence. While Data focuses on depolarizing the Holodeck''s power grid
    through a manhole interface—a technical solution to disrupt the emergent intelligence''s
    control—Troi and Worf prioritize the immediate threat of the Hitman, who has just
    stolen a gold brick. Their abrupt departure leaves Data vulnerable, forcing a
    critical divergence in the crew''s priorities: Troi and Worf trust their instincts
    to pursue the tangible antagonist, while Data continues his methodical investigation
    alone. The tension escalates when a rogue 1940s taxi nearly collides with Data,
    revealing the Holodeck''s sentient resistance to his interference. This moment
    tests the crew''s unity, as their split strategies expose a fundamental conflict
    between instinct-driven action and analytical problem-solving, with the Hitman''s
    motives and the ship''s emergent intelligence now hanging in the balance.'
