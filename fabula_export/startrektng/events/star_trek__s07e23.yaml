- fabula_uuid: act_79748ff9f7992a78
  number: 5
  summary: 'The Holodeck train lies in a smoking wreck, mirroring the Enterprise''s
    ship-wide shutdown and extreme angle in space. Data and Troi struggle to their
    feet, battered but otherwise unharmed. Worf reports the Conductor accidentally
    derailed the train. In Cargo Bay Five, Geordi confirms the object was forming
    a coherent, almost organic energy matrix, indicating the ship was attempting to
    create a lifeform. Its energy levels are dropping rapidly, threatening its survival
    without more vertion particles. Suddenly, the ship lurches, systems come back
    online, and it accelerates to warp nine, heading for the Cordannas system, another
    white dwarf star, now identified as ''New Vertiform City.'' Geordi delivers dire
    news: the ship has diverted all systems to maximize propulsion, leaving less than
    two hours of reserve oxygen. Picard, facing an immediate threat to the crew, orders
    Data to regain control of the train and tasks Geordi with finding an artificial
    source of vertion particles. In the Holodeck, the train characters block Data,
    Troi, and Worf''s path. Troi persuades the Hayseed to allow Data through, promising
    to help them reach ''New Vertiform City.'' Data enters the engine room, confronts
    the Conductor and Hitman, and convinces the Conductor to let him take the controls,
    promising a faster route. Data then pulls the brake lever, causing the Enterprise
    to drop out of warp near the MacPherson Nebula. Geordi, having modified a photon
    torpedo, launches it into the nebula, which explodes into a dazzling glow, successfully
    producing vertion particles. The Enterprise immediately taps into the glowing
    nebula, collecting the particles. In Cargo Bay Five, the object rapidly absorbs
    the vertion particles, completing its formation and radiating a strong, powerful
    glow. Riker reports the nodes are deactivating, and ship systems are returning
    to normal. The fully formed, beautiful, alien lifeform rises from the floor, sparkles
    with a transporter effect, dematerializes from the Cargo Bay, and then rematerializes
    outside the ship, gently moving away into space. The Holodeck characters toast
    their arrival at ''New Vertiform City'' before the entire simulation disappears,
    leaving an empty Holodeck. In the Ready Room, Picard reflects to Data that the
    emergent intelligence stemmed from the sum of the crew''s honorable experiences,
    and therefore, he trusts the lifeform it created, calming Data''s concerns about
    the risk taken.'
