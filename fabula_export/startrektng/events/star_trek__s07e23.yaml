- fabula_uuid: cand_evt_scene_cd947b2409890477_01
  global_id: null
  title: Holodeck and particle beam collapse
  description: The Conductor, overseeing the Holodeck simulation, panics as the train’s
    trajectory deviates from its intended destination—Vertiform City—suggesting the
    emergent intelligence’s control is destabilizing. Meanwhile, in Cargo Bay Five,
    the particle beam collapses entirely, severing the energy supply to the mysterious
    molecule’s growth. The molecule’s glow fades, leaving it inert, signaling a catastrophic
    failure in the crew’s attempt to stabilize the emergent lifeform. The parallel
    collapses force the crew to confront whether the intelligence’s control is slipping
    or if sabotage is at play, exposing the fragility of the ship’s self-directed
    creation. The Conductor’s distress and the particle beam’s disappearance mark
    a critical turning point, as the crew’s efforts to guide the molecule’s development
    are abruptly halted, leaving the ship’s future uncertain and the intelligence’s
    intentions in question.
