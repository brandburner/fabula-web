- fabula_uuid: cand_evt_scene_ed1095ea2cf1af27_01
  global_id: null
  title: Enterprise's emergent neural network revealed
  description: "\n  In Engineering, Data, Riker, and Geordi analyze a monitor displaying\
    \ the ship's connection nodes—a web of systems now linked through the Holodeck.\
    \ Data observes that the nodes have expanded dramatically, integrating sensors,\
    \ engines, and replicators into a self-sustaining network. When Riker questions\
    \ why the Holodeck is central to this, Data theorizes that Holodeck events directly\
    \ influence the ship's behavior, citing the Engineer's murder and the Conductor's\
    \ train redirection as evidence of a causal link. Geordi recognizes the node configuration\
    \ as resembling Data's positronic brain, prompting Data to propose that the Enterprise\
    \ may be forming an intelligence. The revelation stuns Riker and Geordi, marking\
    \ a turning point where the ship transitions from a tool to a potential autonomous\
    \ entity with its own agency. The scene underscores the crew's dawning realization\
    \ that they may no longer be in full control of their vessel, raising existential\
    \ questions about the nature of sentience and command.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e23
  scene_sequence: 12
  sequence_in_scene: 18
  key_dialogue:
  - 'DATA: The number of systems now affected by the nodes has grown considerably.
    Sensors, engines, replicators, propulsion... they are all working together now,
    almost independently of the main computer. And the nodes link all of them through
    the Holodeck.'
  - 'RIKER: Are you saying... that the ship is being controlled by the Holodeck?'
  - 'DATA: Not precisely. Geordi, does the configuration of the connection nodes look
    familiar to you?'
  - 'GEORDI: Yeah... it''s... a little like the structure of your positronic brain.'
  - 'DATA: That is correct. It appears that the nodes are in the process of creating
    a rudimentary neural net.'
  - 'RIKER: Data -- what are you suggesting?'
  - 'DATA: Unlikely as it may sound... I believe that the Enterprise may be forming
    an intelligence.'
