    emotional_state: 'Awe-struck and unmoored—like an engineer who has just discovered
      his life''s work might be *alive*, and he doesn''t know whether to celebrate
      or mourn the loss of control. His usual confidence in systems is replaced by
      a gnawing question: *Can I still fix this? Or is it beyond me now?*'
