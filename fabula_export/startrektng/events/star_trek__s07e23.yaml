      Jefferies tubes.
    - The humming of structural fields and the groaning of the ship’s framework, as
      if responding to the lifeform’s energy.
    - The glow of the vertion particle beam illuminating the lifeform, creating a
      stark contrast with the bay’s industrial surroundings.
    - The crew’s hushed voices and occasional gasps as they witness the lifeform’s
      dematerialization.
