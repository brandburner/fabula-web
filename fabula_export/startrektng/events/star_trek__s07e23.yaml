      it's a system recovery or something more sinister.
    what_happened: "\n        Geordi is the scene's technical anchor, his tricorder\
      \ sweeping the dimly flickering object with the intensity of a surgeon diagnosing\
      \ a critical patient. His voice is steady but laced with urgency as he describes\
      \ the energy matrix's coherence and organic emissions—findings that force the\
