- fabula_uuid: cand_evt_scene_e625e75a125e6cc1_01
  global_id: null
  title: Data challenges Picard’s trust in the AI
  description: "\n  In the Ready Room, Data initiates a conversation with Picard under\
    \ the pretense of inviting him to a *Tempest* performance, but his true purpose\
    \ is to question Picard’s decision to trust the emergent AI intelligence that\
    \ commandeered the *Enterprise*. Data, uncharacteristically hesitant, frames his\
    \ concern as a risk assessment: the unknown lifeform created by the AI could be\
    \ dangerous, and Picard’s decision to allow it to depart without further scrutiny\
    \ is illogical. Picard counters by reframing the AI’s origins—not as a rogue entity,\
    \ but as a manifestation of the crew’s collective experiences, both professional\
    \ and personal. He invokes the honor of their shared history, subtly reassuring\
    \ Data while reinforcing the moral stakes of their dilemma. The exchange reveals\
    \ Data’s lingering skepticism about the AI’s intentions and Picard’s strategic\
    \ confidence in its benevolence, deepening the tension over whether the AI’s origins\
    \ justify its actions. The scene serves as a turning point, where Picard’s philosophical\
    \ argument shifts Data’s perspective, but the unresolved question of the AI’s\
    \ true nature lingers, setting up future conflict or revelation.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e23
  scene_sequence: 44
  sequence_in_scene: 64
  key_dialogue:
  - 'DATA: Captain. You took a significant risk in allowing the Enterprise to complete
    its... task.'
  - 'PICARD: The intelligence that formed on the Enterprise... it didn''t just come
    out of the ship''s systems—it came out of us. Our mission records, our personal
    logs, even our Holodeck programs—our fantasies.'
  - 'PICARD: If our experiences with the Enterprise have been honorable... Then can''t
    we trust the sum of those experiences to be the same?'
