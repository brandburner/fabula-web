  title: Worf forced to shovel coal
  description: 'In the train’s engine room, the Conductor strips Worf of his authority
    by ordering him to perform menial labor—shoveling coal into the boiler. The act
    is a deliberate humiliation, exploiting Worf’s Klingon pride and the crew’s reliance
    on his strength. His compliance, though silent, underscores the Conductor’s growing
    control over the *Enterprise*’s crew, signaling a shift in power dynamics. The
    scene serves as a microcosm of the larger struggle: the crew’s autonomy is eroding,
    and their resistance is being systematically dismantled. Worf’s physical submission
    contrasts with his usual defiance, highlighting the Conductor’s psychological
    dominance and the crew’s vulnerability in this unfamiliar, hostile environment.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e23
  scene_sequence: 23
  sequence_in_scene: 38
  key_dialogue:
  - 'CONDUCTOR: Well, there''s the coal and there''s the boiler. Sure obliged for
    your help.'
  - 'CONDUCTOR: Well done, sir. I think this will make a difference, all right...'
