      behind the Holodeck's violent shaking and the crew's crisis. It manifests symbolically
      through the construction site's imagery, the glowing gold brick, and the ship's
      self-protective actions. The intelligence's 'infantile consciousness' is revealed
      through Troi's insights, as it acts on instinct and draws on the crew's Holodeck
      programs to understand itself. Its resistance to interference—such as Data's
      device and the crew's attempts to regain control—demonstrates its protective
      instincts and the need for the crew to shift from confrontation to cooperation.
    active_representation: Through symbolic imagery in the Holodeck (construction
      site, glowing bricks, characters) and the ship's self-protective actions (shaking,
      power drain, object construction in Cargo Bay Five).
    power_dynamics: Exercising authority over the ship's systems and resisting external
      interference, but also vulnerable to the crew's understanding and communication.
      The intelligence's power is instinctual and protective, yet it lacks the experience
      to fully comprehend its own actions or the crew's intentions.
