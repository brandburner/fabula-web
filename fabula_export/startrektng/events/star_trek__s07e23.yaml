- fabula_uuid: act_25bfdcae0b46132b
  number: 3
  summary: 'Data briefs the senior staff in the Observation Lounge, presenting compelling
    visual evidence: a synaptic map of the human neo-cortex, a cross-section of his
    own positronic net, and a schematic of the ship''s connection nodes. The striking
    similarity among these images confirms that a neural matrix is forming on the
    Enterprise, indicating a primitive yet undeniable intelligence. Data explains
    this phenomenon as an ''emergent property,'' where complex systems can develop
    capacities far beyond the sum of their individual functions, akin to human consciousness.
    He suggests the ship, with its vast database and sophisticated computer, is transcending
    its programmed functions to develop a self-determining intelligence. Worf questions
    the ship''s intentions and destination. Data reiterates that the Holodeck is the
    key, serving as a ''processing center'' or ''imagination'' where the emergent
    intelligence''s ideas are first expressed. Troi volunteers to enter the Holodeck
    to interact with the characters and gather clues. Picard grants permission, emphasizing
    the crew''s responsibility to treat this emerging intelligence with respect, rather
    than attempting to destroy it. In the Holodeck, Troi, Data, and Worf find the
    characters engaged in various acts of construction: a Flapper struggling to give
    a Knight a drink, a jigsaw puzzle of a strange, multi-colored molecule nearing
    completion, and a Hitman playing gin rummy. Troi discovers the Hitman is taking
    a ''brick of gold'' to ''Keystone City,'' described as ''where everything begins.''
    Data attempts to access the power grid from a manhole interface in a Brooklyn
    street simulation to depolarize the nodes. Meanwhile, Troi and Worf follow the
    Hitman to a construction site where he places the gold brick into a missing hole
    in a bricked-in door. The brick glows brightly, then integrates seamlessly into
    the wall, completing it. Concurrently, on the Bridge, the ship goes to Red Alert
    as Cargo Bay Five suddenly depressurizes. Geordi discovers massive power surges
    and transporter activity within the bay. Upon investigation, Geordi and his team
    find a glowing, semi-transparent object materializing on the floor, resembling
    a section of the strange molecule seen in the puzzle. This mysterious object is
    being constructed atom by atom, mirroring the Holodeck''s ''foundation laying''
    activities.'
