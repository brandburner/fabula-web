      systemic failure.
    - Ensure the *Enterprise* remains a safe and functional environment for the crew,
      even if it means shutting down recreational systems.
    what_happened: Picard emerges from the Holodeck with a minor head injury, which
      he dismisses with characteristic stoicism. His immediate focus isn’t on his
      own well-being but on the broader implications of the malfunction, a choice
      that defines his leadership. He listens intently as Data explains the cause,
      his expression shifting from curiosity to cautious concern. When Data mentions
      the *Orient Express* program, Picard’s interruption—‘Yes, yes, I know about
      the Orient Express’—reveals his deep cultural knowledge, but also his impatience
      to cut to the heart of the problem. His order to shut down all Holodecks is
      delivered with quiet authority, a decision that reflects his instinct to err
      on the side of caution. Picard’s physical presence in the corridor—standing
      apart from Data as the android works the panel—symbolizes his role as the ship’s
      moral and strategic compass, even in moments of technical crisis.
