      \ across the ship as the lifeform completes its formation and departs. Their\
      \ deactivation is confirmed by Riker, signaling the restoration of the ship's\
      \ normal operations. The nodes' role in this event is to facilitate the emergent\
      \ intelligence's purpose, linking the holodeck simulation to the lifeform's\
      \ creation and departure. Their disappearance underscores the temporary and\
      \ intentional nature of the intelligence's control over the ship.\n      "
    status_before_event: Actively infiltrating and controlling the Enterprise's critical
      systems, forming a dense network across sensors, warp control, engines, replicators,
      propulsion, and defenses.
    status_after_event: Deactivated and dissipating, restoring the ship's systems
      to normal operation.
