- fabula_uuid: cand_evt_scene_27b58e5462289eba_01
  global_id: null
  title: Picard orders Holodeck shutdown after malfunction
  description: "\n  After narrowly escaping the rogue Holodeck train, Picard and Data\
    \ exit the Holodeck corridor where Data immediately notices Picard’s minor head\
    \ injury. Data begins investigating the malfunction, tracing the train’s origin\
    \ to Beverly Crusher’s *Orient Express* program—a historical recreation that somehow\
    \ merged with the Prospero Island simulation due to a database retrieval error.\
    \ Picard, recognizing the potential systemic risk, orders Data to run a full diagnostic\
    \ and shut down all Holodecks as a precautionary measure. The exchange reveals\
    \ Picard’s cautious leadership style, his trust in Data’s technical expertise,\
    \ and the escalating instability aboard the *Enterprise*, foreshadowing deeper\
    \ malfunctions tied to the ship’s emergent intelligence. The shutdown order also\
    \ serves as a narrative pivot, shifting focus from the immediate Holodeck threat\
    \ to broader systemic concerns.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e23
  scene_sequence: 2
  sequence_in_scene: 3
  key_dialogue:
  - 'DATA: ((concerned)) Captain, you are injured...'
  - 'PICARD: It''s just a scrape... I''ll have it seen to...'
  - 'DATA: The train we encountered is from one of Doctor Crusher''s Holodeck programs.
    It is a re-creation of the Orient Express, a train which ran from Paris to Istanbul
    from the late nineteenth century until -'
  - 'PICARD: Yes, yes, I know about the Orient Express... but what was it doing on
    Prospero''s Island?'
  - 'DATA: There appears to have been a malfunction in the Holodeck''s database retrieval
    system. The two programs were somehow temporarily linked together.'
  - 'PICARD: Could this malfunction affect the other Holodecks as well?'
  - 'DATA: It is a possibility. I would have to run a diagnostic to be certain.'
  - 'PICARD: All right, get to it. And shut down all of the Holodecks until you''re
    finished, just to be on the safe side.'
