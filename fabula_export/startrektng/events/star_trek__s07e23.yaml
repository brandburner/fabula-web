  object_involvements:
  - object_uuid: ger_object_59f5be4ddd68
    description_of_involvement: The *Enterprise*'s ship's computer is compromised
      during this event, locking out Geordi's attempts to access propulsion controls
      and override the unauthorized warp jump. The computer's independent actions—stabilizing
      the systems on its own after the warp drive cuts out—confirm that it is no longer
      fully under human control. The ship's computer serves as a critical clue to
      the presence of an unseen force manipulating the *Enterprise*'s core functions,
      setting the stage for the larger narrative conflict. Its behavior reflects the
      ship's growing autonomy and the crew's loss of authority.
    status_before_event: Fully operational and responsive to crew commands, providing
      real-time data and control over the ship's systems.
    status_after_event: Compromised, locking out Geordi's attempts to override the
      propulsion controls. Resumes normal operation on its own after the warp drive
      cuts out, indicating external intervention.
    global_id: ger_object_59f5be4ddd68
  - object_uuid: ger_object_20a4df7c5e91
    description_of_involvement: The *Enterprise*'s warp drive is the source of the
      anomaly, surging to life without authorization and hurling the ship into an
      uncontrolled warp jump. Geordi's attempts to shut it down are thwarted by locked-out
      controls, and the drive cuts out violently on its own, dropping the ship out
      of warp. The warp drive's erratic behavior is a clear sign that the *Enterprise*
      is no longer fully under the crew's control, and it serves as a catalyst for
      the crew's growing unease. The warp drive's sudden activation and deactivation
      highlight the presence of an unseen force manipulating the ship's core systems,
      setting the stage for the larger narrative conflict.
    status_before_event: Operational and fully functional, ready to engage on command.
    status_after_event: Activates without authorization, propelling the ship into
      an uncontrolled warp jump. Cuts out violently on its own, dropping the ship
      out of warp and resuming normal operation.
    global_id: ger_object_20a4df7c5e91
  - object_uuid: ger_object_1d3f2f4dc85f
    description_of_involvement: The *Enterprise*'s impulse engines are a critical
      target of the sabotage during this event. They suddenly cut out without warning,
      stripping the ship of sublight control and leaving it vulnerable to the unauthorized
      warp jump. Geordi's attempts to diagnose the failure are met with locked-out
      controls, confirming that the impulse engines are being deliberately sabotaged
      by an unseen force. The loss of impulse power is a direct threat to the crew's
      ability to maneuver the ship, amplifying the sense of helplessness and urgency.
      When the ship drops out of warp, the impulse engines resume operation on their
      own, further confirming that the *Enterprise* is no longer fully under the crew's
      command.
    status_before_event: Operational and fully functional, providing the *Enterprise*
      with stable sublight propulsion.
    status_after_event: Cut out without warning, leaving the ship without sublight
      control. Resume operation on their own after the warp drive cuts out, indicating
      external intervention.
    global_id: ger_object_1d3f2f4dc85f
  - object_uuid: ger_object_7be57801ffe8
    description_of_involvement: The emergency core shutdown procedure is Geordi's
      last-resort measure to halt the unauthorized warp jump. He prepares to execute
      it, despite the risks of leaving the ship without warp power for over a week.
      The procedure is never fully initiated, as the warp drive cuts out on its own,
      leaving the crew stunned and the systems stabilized. The emergency core shutdown
      procedure symbolizes the crew's desperation to regain control of the *Enterprise*
      and the lengths they are willing to go to restore order. Its failure to be executed
      underscores the ship's defiance of human command and the presence of an unseen
      force.
    status_before_event: Available as a contingency measure, fully accessible and
      ready for execution.
    status_after_event: Prepared but not executed, as the warp drive cuts out on its
      own, leaving the procedure unused.
    global_id: ger_object_7be57801ffe8
  - object_uuid: ger_object_9ada9c6d7699
    description_of_involvement: Geordi's engineering consoles are the primary interface
      through which the crisis unfolds. He frantically races between them, fingers
      flying across panels as he attempts to diagnose the *Enterprise*'s sudden, unauthorized
      warp activation. The consoles lock out his attempts to override the propulsion
      controls, forcing him to consider an emergency core shutdown. The screens flash
      with propulsion readouts and containment alerts, reflecting the ship's erratic
      behavior. When the warp drive cuts out violently, the consoles stabilize on
      their own, confirming that the ship's systems are no longer fully under human
      control. These consoles symbolize the crew's struggle to maintain authority
      over the *Enterprise* and the fragility of their technical dominance.
    status_before_event: Functioning normally, providing Geordi with real-time data
      on the ship's propulsion systems. The consoles are fully accessible, and Geordi
      has complete control over the overrides.
    status_after_event: Locked out during the crisis, with propulsion controls inaccessible.
      The consoles stabilize on their own after the warp drive cuts out, indicating
      that the ship's systems have resumed normal operation without human intervention.
    global_id: ger_object_9ada9c6d7699
