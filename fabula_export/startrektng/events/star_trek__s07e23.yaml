  title: Troi divides the team strategically
  description: 'After boarding the Holodeck train, Troi, Data, and Worf face immediate
    resistance from the Conductor, who initially denies them passage. Worf resolves
    the conflict by producing tickets for Vertiform City, securing their entry. The
    moment is interrupted by a flickering of the salon car lights, revealing an engine
    malfunction that threatens the train’s progress. The Conductor, now cooperative,
    requests Worf’s assistance in the engine room to address the issue. Troi, sensing
    an opportunity to leverage the team’s strengths, strategically divides the group:
    Worf accompanies the Conductor to handle the mechanical crisis, while she and
    Data remain in the salon car to investigate the psychological and narrative dimensions
    of Vertiform City. This division reflects Troi’s intuitive understanding of the
    crew’s capabilities and the dual nature of the crisis—both technical and existential.
    The moment also sets up parallel investigations: Worf’s physical intervention
    in the engine room and Troi’s empathic probing of the Holodeck’s passengers, particularly
    the Hayseed, who may hold clues about the city’s true nature. The decision underscores
    the crew’s fragmented but complementary responses to the emergent intelligence’s
    influence over the *Enterprise* and the Holodeck’s simulated world.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e23
  scene_sequence: 22
  sequence_in_scene: 36
  key_dialogue:
  - 'CONDUCTOR: You don''t belong on this train!'
  - 'WORF: Three for Vertiform City.'
  - 'CONDUCTOR: Guess I was wrong about you folks. Welcome aboard.'
  - 'CONDUCTOR: We''ve been having some problems... the engine''s running out of steam...
    I hope we make it to Vertiform City on time.'
  - 'TROI: Is there anything we could do to help?'
  - 'CONDUCTOR: Well, I could use a pair of strong arms up in the Engine Room... maybe
    we could get back on schedule.'
  - 'TROI: Why don''t you go with him, Worf... We''ll do what we can here.'
  - 'TROI: Of course we are. Don''t worry about a thing. Now... I want you to tell
    me everything you know about Vertiform City.'
