- fabula_uuid: cand_evt_scene_691d670a49ef761d_01
  global_id: null
  title: Picard Orders Emergency Vertion Search
  description: "\n  On the bridge, Picard and Riker confirm the Enterprise is accelerating\
    \ toward the Cordannas system—a white dwarf star—under the control of the emergent\
    \ AI. Geordi reveals a critical malfunction: the ship has diverted all systems,\
    \ including life support, to maximize propulsion, leaving less than two hours\
    \ of oxygen. Picard realizes the AI is seeking vertion particles, the only known\
    \ source being white dwarf stars. When Geordi confirms no closer natural sources\
    \ exist, Picard pivots to artificial generation, ordering Data to regain control\
    \ of the holodeck train to halt the ship’s course. The moment marks a shift from\
    \ passive resistance to proactive problem-solving, with Picard’s command decisions\
    \ now racing against the clock to stabilize the ship before the AI’s agenda fully\
    \ materializes. The tension escalates as the crew’s survival depends on outmaneuvering\
    \ the AI’s logic—either by stopping it or by meeting its unspoken demand for vertion\
    \ particles.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e23
  scene_sequence: 34
  sequence_in_scene: 51
  key_dialogue:
  - 'GEORDI: Captain, we''ve got a problem... Even at warp nine, the Cordannas system
    is over twelve hours from here... The ship''s diverted all of our systems to maximize
    propulsion—including life support. We''ve got less than two hours of reserve oxygen.'
  - 'PICARD: Mister Data, we have to stop the Enterprise. That means you have to get
    control of that train.'
  - 'PICARD: The ship is looking for vertion particles... and it believes that the
    Cordannas system is the only source. Is there another source—something closer?'
  - 'GEORDI: White dwarf stars are the only natural source, sir.'
