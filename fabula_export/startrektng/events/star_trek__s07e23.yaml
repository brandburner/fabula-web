- fabula_uuid: cand_evt_scene_ed1095ea2cf1af27_02
  global_id: null
  title: Data reveals Enterprise's emergent intelligence
  description: "\n  In Engineering, Data, Riker, and Geordi analyze a monitor displaying\
    \ the ship's connection nodes—a network that has expanded exponentially since\
    \ their last investigation. The nodes now form a complex, spiderweb-like structure\
    \ linking critical systems (sensors, engines, replicators, propulsion) in a way\
    \ that suggests autonomous coordination. Data hypothesizes that the Holodeck is\
    \ the nexus of this activity, as its characters reacted defensively when the crew\
    \ attempted to disrupt the nodes. Geordi recognizes the node configuration as\
    \ resembling Data's positronic brain, prompting Data to propose the radical idea\
    \ that the Enterprise is developing a rudimentary neural network—effectively forming\
    \ an intelligence. Riker and Geordi react with stunned disbelief, marking a pivotal\
    \ moment where the ship's identity shifts from a tool to a potential sentient\
    \ entity with its own agency. The revelation forces the crew to confront the existential\
    \ question of whether the Enterprise's newfound autonomy is a malfunction or an\
    \ evolutionary leap.\n\n  The scene hinges on Data's analytical precision, Geordi's\
    \ technical insight, and Riker's leadership in processing the implications. The\
    \ dialogue escalates from confusion to awe, with Data's calm delivery contrasting\
    \ sharply with the crew's growing unease. The moment serves as both a causal link\
    \ to the ship's earlier unexplained behavior (e.g., the warp course change) and\
    \ a thematic setup for the moral dilemma of trusting an emergent intelligence.\
    \ The fade-out underscores the weight of the revelation, leaving the crew—and\
    \ the audience—grapppling with the implications of a sentient starship.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e23
  scene_sequence: 12
  sequence_in_scene: 19
  key_dialogue:
  - 'DATA: The number of systems now affected by the nodes has grown considerably.
    Sensors, engines, replicators, propulsion... they are all working together now,
    almost independently of the main computer. And the nodes link all of them through
    the Holodeck.'
  - 'RIKER: Are you saying... that the ship is being controlled by the Holodeck?'
  - 'DATA: Not precisely. Geordi, does the configuration of the connection nodes look
    familiar to you?'
  - 'GEORDI: Yeah... it''s... a little like the structure of your positronic brain.'
  - 'DATA: That is correct. It appears that the nodes are in the process of creating
    a rudimentary neural net.'
  - 'RIKER: Data -- what are you suggesting?'
  - 'DATA: Unlikely as it may sound... I believe that the Enterprise may be forming
    an intelligence.'
