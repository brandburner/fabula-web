- fabula_uuid: cand_evt_scene_f212e6674a1f5e6d_02
  global_id: null
  title: Worf’s Truth and the Elders’ Betrayal
  description: 'Worf ambushes L’Kor in the shadows of a Romulan prison camp, desperate
    to confirm whether his father, Mogh, is alive. L’Kor initially resists but reveals
    Mogh’s death at Khitomer—a lie Worf senses immediately. When Worf demands to know
    how many Klingons are held captive and how many Romulans guard the camp, L’Kor
    hesitates, then summons the Elders. The Elders enter and, instead of welcoming
    Worf’s offer to help them escape, they restrain him. L’Kor’s final words—*‘We
    are not leaving here. And neither are you.’*—reveal a horrifying truth: the Klingons
    are not prisoners but self-imposed captives, bound by a secret tradition Worf
    does not understand. The scene ends with Worf’s stunned resistance as the Elders
    pin him down, marking a brutal turning point in his mission. The revelation forces
    Worf to confront the possibility that his father’s honor—and his own understanding
    of Klingon culture—may be built on a lie.'
