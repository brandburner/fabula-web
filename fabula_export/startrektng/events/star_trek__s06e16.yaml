  global_id: null
  title: Worf confronts Mogh’s possible survival
  description: Worf sits alone at the Replimat after Geordi abruptly leaves, frustrated
    by the replicated food. The moment of solitude underscores Worf’s emotional vulnerability
    as he grapples with the weight of his father’s alleged survival. Jaglom Shrek,
    a Yridian informant, approaches Worf and reveals that Mogh may still be alive
    in a Romulan prison camp, contradicting Worf’s long-held belief that his father
    died honorably at Khitomer. Worf’s initial disbelief turns to fury as Shrek attempts
    to extort payment for the information, forcing Worf to confront the possibility
    that his father’s legacy—and his own honor—may be built on a lie. The confrontation
    ends with Worf storming off, his internal conflict now exposed and escalating
    toward a reckoning with Klingon tradition and his own identity. This scene serves
    as a turning point, setting up Worf’s perilous journey to uncover the truth about
    his father’s fate, regardless of the cost to his own beliefs or safety.
