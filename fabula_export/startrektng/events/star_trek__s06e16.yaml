      cognitive activity during the blackout. The log shows no anomalies, but its
      ‘normal’ readings raise more questions than they answer.
    status_after_event: Closed and set aside, its contents leaving the crew with no
      clear resolution. The log’s inability to explain Data’s vision or hair growth
