- fabula_uuid: cand_evt_scene_f3f06da4c3fb98f9_02
  global_id: null
  title: Worf challenges Shrek’s mercenary motives
  description: "\n  In the cramped, utilitarian confines of Shrek’s shuttlecraft,\
    \ Worf’s simmering distrust of the Yridian informant erupts into open confrontation.\
    \ As Shrek briefs him on the dangers of the Romulan prison camp—warning of predators\
    \ and the need for stealth—Worf’s focus shifts from tactical preparation to moral\
    \ reckoning. When he presses Shrek on how he learned of the camp’s existence and\
    \ why he hasn’t shared the information with the Klingon government, Shrek’s evasive\
    \ response (‘I sell information... I do not give it away’) triggers Worf’s anger.\
    \ The exchange escalates as Worf accuses Shrek of profiting from the suffering\
    \ of imprisoned Klingons, forcing Shrek to retreat behind a cold, unyielding facade\
    \ (‘I have my reasons’). The tension peaks when Shrek dismisses Worf’s outrage\
    \ with a curt suggestion to rest, leaving Worf to stew in frustration. This moment\
    \ marks a critical fracture in their alliance, as Worf’s quest for his father’s\
    \ truth collides with Shrek’s self-serving pragmatism. The scene underscores Worf’s\
    \ internal conflict: his Klingon honor demands action, but the moral ambiguity\
    \ of his allies forces him to question whether his mission is being exploited\
    \ for someone else’s gain.\n  "
