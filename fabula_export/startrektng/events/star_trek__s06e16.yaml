      prison camp, regardless of the personal cost.
    - To hold Shrek accountable for withholding critical intelligence from the Klingon
      government, even if it means risking their tenuous alliance.
    what_happened: "\n        Worf stands in the cramped shuttlecraft, his dark camouflage\
      \ clothing blending with the dim lighting as he leans over the console monitor,\
      \ studying the grainy reconnaissance graphic of the Romulan prison camp. His\
      \ posture is rigid, his brow furrowed as he calculates the logistics of the\
      \ mission—twelve hours of treacherous jungle travel under the cover of night.\
      \ When Shrek warns him of the predators lurking in the jungle, Worf’s response\
      \ is a terse, confident assertion of his preparedness, though his eyes betray\
      \ a flicker of unease. The confrontation escalates as he presses Shrek about\
      \ the source of the intelligence and the informant’s failure to alert the Klingon\
      \ government. His voice grows accusatory, his Klingon honor clashing with Shrek’s\
      \ mercenary pragmatism. By the end of the exchange, Worf’s emotional state is\
      \ a volatile mix of anger and disillusionment, and he retreats to the rear of\
      \ the shuttle to prepare for the mission, his movements sharp with restrained\
      \ frustration.\n      "
