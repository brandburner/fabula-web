    power_dynamics: |2-

              Starfleet exercises authority over the crew’s actions, dictating the parameters of the experiment (e.g., the twenty megajoules limit) and the protocols for handling malfunctions. However, the organization’s power is also challenged by the unknown— the alien cylinder’s surge demonstrates that even Starfleet’s most skilled personnel cannot fully control every variable. The crew operates under the constraint of institutional guidelines, but their personal stakes (concern for Data, scientific curiosity) create a tension between duty and individual agency.
