  title: Data recalls impossible memory of Soong
  description: 'After a plasma-induced blackout in Engineering, Data awakens with
    a fragmented memory of Dr. Noonien Soong—a man who died decades ago. Geordi confirms
    Data was clinically unconscious for thirty seconds, yet Data insists he retains
    a vivid, sequential record of seeing Soong during that time. The revelation forces
    Data to confront the impossibility of his experience: his positronic net cannot
    generate false memories, yet the vision defies all logic. Bashir’s anxious presence
