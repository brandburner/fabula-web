  description: 'Worf tracks down Shrek on DS9’s lower promenade, his desperation over
    his father’s possible survival hardening into ruthless determination. After cornering
    Shrek—who initially resists with excuses—Worf physically intimidates him, exposing
    the informant’s fear and greed. The confrontation escalates when Worf reveals
    he knows Shrek’s vessel is warp-capable, forcing Shrek to admit the journey’s
    dangers. Worf’s ultimatum—payment after the trip *or death*—crushes Shrek’s resistance,
    securing his reluctant cooperation. The scene crystallizes Worf’s moral descent:
    his quest for truth now demands violence, while Shrek’s cowardice and self-interest
    are laid bare. The exchange also foreshadows their fraught alliance, where trust
    is nonexistent and survival hinges on mutual exploitation. The moment marks a
    turning point in Worf’s arc, as his Klingon honor curdles into something darker,
    and Shrek’s fear becomes a weapon Worf wields without hesitation.'
