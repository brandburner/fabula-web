  key_dialogue:
  - 'WORF: (to N.D.) Ensign Lopez. This duty roster is unacceptable. The assignments
    must be listed in order of priority. Prepare it again. I will expect it no later
    than oh nine hundred hours. Understood?'
  - 'RIKER: Worf, I''ll need that rendezvous schedule sent over to Commander Rudman
    on the Merrimac as soon as you -'
  - 'WORF: (cutting him off) I am aware of your request, Commander.'
  - 'RIKER: Lieutenant... are you alright?'
  - 'WORF: I am... fine, sir. I will send the schedule... Excuse me, sir...'
