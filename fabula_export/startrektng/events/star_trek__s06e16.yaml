  - 'BASHIR: Your creator went to a lot of trouble to make you seem human... I find
    that fascinating.'
  - 'DATA: Most people are usually interested in my extraordinary abilities. But no
    one has ever asked me if my hair can grow, or noticed that I can breathe.'
