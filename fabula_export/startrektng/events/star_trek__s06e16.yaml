  title: Data detects Sickbay intrusion
  description: 'On the Enterprise bridge, Data’s console emits a warning alarm, prompting
    him to investigate an anomalous power drain in the starboard EPS conduits. His
    diagnostic reveals the breach originates in Sickbay, where an unauthorized access
    into the bio-imaging systems has occurred. Riker, though not immediately alarmed,
    directs Data to personally examine the irregularity. The exchange is brief but
    purposeful: Data’s methodical reporting contrasts with Riker’s pragmatic response,
    underscoring the bridge’s operational rhythm. The intrusion, though minor, introduces
    a potential security threat—one that could intersect with Worf’s ongoing crisis
    and the broader narrative tension surrounding the Enterprise’s mission integrity.
    Data’s departure for Sickbay marks the beginning of a parallel investigation that
    may reveal deeper stakes beyond the immediate anomaly.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e16
  scene_sequence: 3
  sequence_in_scene: 4
  key_dialogue:
  - 'DATA: ((off console)) Commander -- I am reading a minor power drain in the Starboard
    EPS conduits.'
  - 'RIKER: What''s causing it?'
  - 'DATA: ((works)) The problem is originating in Sickbay. There has been an unauthorized
    access into the computer''s bio-imaging systems.'
  - 'RIKER: You''d better check it out.'
