- fabula_uuid: act_a5ca570a1bffb910
  number: 5
  summary: 'This act brings both narrative threads to their respective climaxes and
    resolutions, while introducing a final, shocking twist for Worf. Data, having
    fully processed his second vision, explains to Dr. Bashir that the images were
    generated by previously dormant neural circuits, intentionally incorporated by
    Dr. Soong to activate at a certain developmental stage. He now understands these
    experiences as a form of ''dreaming'' and plans to consciously induce them daily,
    embracing his newfound capacity for imagination. This provides Data with a profound
    personal breakthrough. Meanwhile, Worf successfully infiltrates the Romulan prison
    camp, observing the Klingon inhabitants. He confronts L''Kor, an elder Klingon,
    who confirms that Worf''s father, Mogh, did indeed die honorably at Khitomer,
    dispelling Shrek''s lie and Worf''s deepest fear of dishonor. Worf expresses outrage
    at the Romulans for denying the captured Klingons an honorable death and attempts
    to rally them for an escape. However, L''Kor and the other Elders resist, revealing
    a shocking truth: they are not interested in liberation. Instead, they turn on
    Worf, subdue him, and declare that he, too, will now remain a prisoner, trapped
    within their self-imposed captivity. The episode concludes with Worf''s astonishment
    at this betrayal, leaving him a prisoner of his own people and setting up a ''To
    Be Continued'' cliffhanger.'
