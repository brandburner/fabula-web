- fabula_uuid: cand_evt_scene_2467138515c428e4_02
  global_id: null
  title: Shrek reveals Mogh’s possible survival
  description: 'Worf sits alone at the Replimat after Geordi leaves, his solitude
    amplifying his internal conflict over Klingon honor and his father’s legacy. Jaglom
    Shrek, a Yridian informant, approaches him with a bombshell: Mogh may still be
    alive in a Romulan prison camp. Worf’s initial disbelief curdles into fury as
    Shrek demands payment for the information, forcing Worf to confront the possibility
    that his father—once a paragon of Klingon honor—might have survived as a prisoner,
    a fate worse than death in Klingon culture. The confrontation exposes Worf’s raw
    emotional wound, his struggle between desperate hope and the threat of dishonor,
    and sets the stage for his perilous quest to uncover the truth. Shrek’s revelation
    acts as a narrative catalyst, destabilizing Worf’s self-control and propelling
    him toward a reckless, honor-bound mission that will test the limits of his loyalty
    to Starfleet and his Klingon identity. The scene’s tension escalates as Worf’s
    temper flares, culminating in his physical threat against Shrek before storming
    off, leaving the informant—and the audience—with the weight of an unresolved,
    life-altering question: *Is Mogh truly alive?*'
