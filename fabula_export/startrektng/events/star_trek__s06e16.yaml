  - 'SHREK: Excellent. I can provide you with the coordinates...'
  - 'WORF: No. You will take me there.'
  - 'WORF: What is the real reason you do not want to take me? Is it because what
    you have said is not true?'
  - 'SHREK: The camp is located on the edge of Romulan space. It is a dangerous journey...'
  - 'WORF: Dangerous... It would be more dangerous for you to refuse.'
  - 'WORF: And if you are lying... if there is no prison camp... I will kill you.'
