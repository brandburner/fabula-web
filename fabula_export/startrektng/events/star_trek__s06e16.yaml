- fabula_uuid: cand_evt_scene_f3f06da4c3fb98f9_01
  global_id: null
  title: Worf challenges Shrek’s mercenary motives
  description: In the cramped, utilitarian confines of Shrek’s shuttlecraft, Worf’s
    simmering distrust of the Yridian informant erupts into direct confrontation.
    While reviewing a reconnaissance graphic of the Romulan prison camp’s dense jungle
    perimeter, Worf’s probing questions about Shrek’s sources and motives expose the
    mercenary’s evasive, profit-driven calculus. Shrek’s refusal to disclose how he
    obtained the intelligence—or why he hasn’t shared it with the Klingon High Council—ignites
    Worf’s fury, forcing him to confront the moral ambiguity of his own mission. The
    exchange reveals Shrek’s cold pragmatism and Worf’s growing disillusionment with
    the possibility that his quest for his father’s honor may be entangled in someone
    else’s exploitative agenda. The tension peaks when Shrek dismisses Worf’s outrage
    with a calculated indifference, leaving Worf to retreat in silent frustration,
    his resolve hardened but his moral clarity fractured. The scene underscores the
    collision of Klingon honor with the mercenary underworld’s amoral logic, deepening
    Worf’s internal conflict over whether his father’s alleged survival is worth weaponizing
    for Shrek’s gain.
