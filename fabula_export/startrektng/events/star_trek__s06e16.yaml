  organization_involvements:
  - organization_uuid: ger_organization_c14e2ea7a796
    description_of_involvement: 'The Klingon Self-Imposed Captives manifest in this
      event through the collective action of L’Kor, the Elders, and Gi’Ral. Their
      organization is represented not by a spokesman but by the physical enforcement
      of their tradition—restraining Worf to protect their secrecy. The power dynamics
      are hierarchical: L’Kor commands, the Elders and Gi’Ral obey, and Worf is the
      outsider whose presence threatens their oath. The organization’s goals are clear:
      uphold the tradition of self-imposed captivity at all costs, even if it means
      betraying Mogh’s son. Their influence mechanisms include silent aggression (the
      Elders’ restraint), calculated deception (L’Kor’s lie about Mogh), and enforced
      loyalty (Gi’Ral’s compliance). The institutional impact is profound: Worf’s
      shock at the revelation forces him to question everything he knows about Klingon
      honor, while the internal dynamics of the group are exposed as rigid and unyielding,
      with no room for dissent.'
    active_representation: Via collective action—L’Kor’s command, the Elders’ and
