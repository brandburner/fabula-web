  key_dialogue: &id009
  - 'DATA: I have heard you mention that you once experienced a vision.'
  - 'WORF: If it has anything to do with your father, you must learn all you can about
    it. In the Klingon MajQa ritual, there is nothing more important than receiving
    a revelation about your father.'
  - 'WORF: Your father is part of you... always. Learning about him tells you about
    yourself... That is why, no matter where he is... or what he''s done... you must
    find him.'
