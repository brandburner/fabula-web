  - character_uuid: ger_agent_868446276ca7
    emotional_state: A storm of disbelief curdling into white-hot fury, masking deep-seated
      grief and the terror of dishonor. His external aggression barely contains the
      internal collapse of his carefully constructed identity.
    goals:
    - To reject Shrek’s claim as a lie and preserve Mogh’s honorable death at Khitomer
    - To suppress the desperate hope that his father might still be alive, as it threatens
      his Klingon identity and Starfleet duty
    what_happened: Worf sits alone at the Replimat table after Geordi’s departure,
      initially at ease as he finishes his meal. His demeanor shifts dramatically
      when Shrek approaches, revealing knowledge of Mogh. Worf’s body language tightens—his
      grip on the table edge whitens, his posture stiffens—as he grapples with disbelief,
      then fury. He physically dominates Shrek by grabbing his shirt, his voice a
      guttural growl, before storming off in anguish, leaving the informant and the
      audience with the haunting question of Mogh’s survival.
