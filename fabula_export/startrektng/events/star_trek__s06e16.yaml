      location of Mogh
    - To ensure Worf’s emotional investment in the information, making him more likely
      to pay the price
    what_happened: Shrek slides into Worf’s space with calculated confidence, his
      voice a low, manipulative purr as he dangles the revelation of Mogh’s survival
      like bait. He leans in close, exploiting Worf’s emotional vulnerability, and
      escalates the tension by demanding payment. Though shaken when Worf grabs him,
      he maintains his composure, insisting on the deal even as Worf threatens violence.
      His departure is marked by a quiet, predatory satisfaction—he’s planted the
      seed of doubt and left Worf to unravel.
