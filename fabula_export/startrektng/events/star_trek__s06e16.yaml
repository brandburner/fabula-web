    emotional_state: Calculating and predatory, with a surface layer of feigned nonchalance
      that barely masks his excitement at the leverage he’s gained. His fear of Worf’s
      physical threat is secondary to his greed, and he leaves with the satisfaction
      of a job well done—Worf is now his puppet on a string.
    goals:
