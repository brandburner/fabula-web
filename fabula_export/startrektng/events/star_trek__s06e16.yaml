    DATA: The interpretation of visions and other metaphysical experiences are almost always culturally derived. And I have no culture of my own.
    PICARD: Yes you do. You are a culture of one. And that's no less valid than a culture of one billion.
  - 'PICARD: Explore the image, Data. Let it capture your imagination. Focus on it...
    spend some time with it... and see where it takes you. Let it inspire you.'
  - 'DATA: I believe I understand, sir. Thank you.'
