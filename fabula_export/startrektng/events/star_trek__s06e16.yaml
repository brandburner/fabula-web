  title: Worf and Data share visions of fathers
  description: 'In Ten Forward, Data approaches Worf—who is brooding alone after learning
    of his father’s possible survival—seeking insight into his own inexplicable vision
    of Dr. Soong. Worf, initially reluctant, reveals his own MajQa vision of Kahless,
    a formative experience that foretold his Starfleet career. As Data describes his
    plasma-shock-induced vision of his creator, Worf’s advice to ‘find its meaning’
    becomes a mirror for his own unresolved quest for Mogh. The exchange exposes Worf’s
    hypocrisy: he urges Data to pursue paternal truth while denying his own need to
    do the same. The scene deepens their emotional bond, underscores their parallel
    struggles with legacy, and foreshadows Worf’s imminent confrontation with his
    father’s fate. Worf’s final line—‘Do not stop until you have the answer’—is a
    self-directed plea, marking a turning point in his arc.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e16
  scene_sequence: 12
