  title: Worf forces Shrek into deadly alliance
  description: "\n  Worf tracks Shrek down on DS9’s lower promenade, his Klingon intensity\
    \ immediately unsettling the Yridian informant. After Shrek’s initial attempt\
    \ to deflect with false cooperation—offering coordinates instead of transport—Worf\
    \ exposes his lie by referencing station records, revealing Shrek’s hidden warp-capable\
    \ vessel. The confrontation escalates physically as Worf pins Shrek against a\
    \ railing, his voice low and lethal, demanding the truth behind Shrek’s reluctance.\
    \ Shrek cracks under pressure, admitting the journey’s peril but still clinging\
    \ to his mercenary instincts, demanding upfront payment. Worf counters with a\
    \ brutal ultimatum: if the camp doesn’t exist, Shrek dies. The threat isn’t just\
    \ about vengeance—it’s a test of Shrek’s survival instincts against Worf’s unyielding\
    \ honor. Shrek capitulates, but the alliance is born from fear and coercion, not\
    \ trust, setting the stage for a partnership fraught with betrayal and mutual\
    \ distrust. The scene crystallizes Worf’s desperation to uncover his father’s\
    \ fate, while Shrek’s reluctance hints at deeper dangers ahead, both physical\
    \ and moral.\n  "
