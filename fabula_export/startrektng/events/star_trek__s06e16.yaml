    emotional_state: "\n        Righteously indignant at Shrek’s profit-driven indifference\
      \ to the suffering of imprisoned Klingons, yet increasingly disillusioned as\
      \ his moral clarity is challenged. His anger is tempered by a growing sense\
      \ of isolation, as he realizes his quest for his father’s honor may be entangled\
      \ in a web of exploitation. There’s a quiet desperation beneath his outward\
      \ confidence, a fear that his actions may not align with the Klingon values\
      \ he holds dear.\n      "
    goals:
