      or witnesses are present before summoning the Elders. The door’s narrow frame
      becomes a symbolic barrier—Worf later lunges toward a side door in a failed
      escape attempt, only to be grabbed by L’Kor. The door’s role is twofold: it
      facilitates the Elders’ entrance (enabling the betrayal) and blocks Worf’s exit
      (trapping him in the revelation). Its quiet creaking and the Elders’ silent
      entry heighten the scene’s tension, as the door swings shut on Worf’s hopes
      of rescue.'
