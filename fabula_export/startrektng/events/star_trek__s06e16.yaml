- fabula_uuid: cand_evt_scene_f9e4b2d813025adf_01
  global_id: null
  title: Data reveals Soong’s hidden programming
  description: In a private corridor conversation following Data’s plasma-induced
    blackout, the android discloses to Julian Bashir that his recent visions were
    triggered by dormant neural circuits—pre-programmed by Dr. Noonien Soong. Data
    explains these circuits were designed to activate at a later stage of his development
    but were prematurely triggered by the plasma shock. Bashir, intrigued by the scientific
    implications, requests permission to study and publish Data’s experience, which
    Data grants without hesitation. The exchange subtly reinforces Data’s evolving
    self-awareness while planting the seed of ‘dreaming’ as a new frontier for his
    android consciousness. Bashir’s playful ‘sweet dreams’ as he departs underscores
    the humanizing shift in Data’s internal landscape, leaving him to reflect on the
    implications of his newfound capacity for internal visions.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e16
  scene_sequence: 24
  sequence_in_scene: 38
  key_dialogue:
  - 'DATA: The images I saw during the time I was shut down were generated by a series
    of previously dormant circuits in my neural net. I believe Doctor Soong incorporated
    those circuits into my base programming, intending them to be activated when I
    reached a certain level of development.'
  - 'BASHIR: But the plasma shock activated them prematurely...'
  - 'DATA: That is correct.'
  - 'BASHIR: I''m curious... now that those circuits are active... what do you intend
    to do with them?'
  - 'DATA: I plan to shut down my cognitive functions for a brief period of time each
    day. I hope to generate new internal visions.'
  - 'BASHIR: It sounds like you''re talking about dreaming...'
  - 'DATA: An accurate analogy.'
  - 'BASHIR: Remarkable... This is just the kind of thing that could get me published
    in the *Starfleet Cybernetics Journal*. Would you mind if I authored a paper about
    all this?'
  - 'DATA: Of course not.'
  - 'BASHIR: Thank you, Data. And... sweet dreams.'
  is_flashback: false
  location_uuid: ger_location_23d97b5266f1
