  title: Worf’s betrayal by the Elders
  description: 'Worf ambushes L’Kor in a dimly lit meeting hall, desperate for answers
    about his father Mogh’s fate. L’Kor initially resists but reveals Mogh died at
    Khitomer, crushing Worf’s hope. When Worf proposes liberating the Klingon prisoners,
    L’Kor summons the Elders, who—after a tense standoff—restrain Worf, declaring
    he will not leave. The betrayal exposes the Klingons’ self-imposed captivity and
    their refusal to accept rescue, forcing Worf to confront the moral ambiguity of
    Klingon honor. The scene escalates from emotional vulnerability to violent confrontation,
    underscoring the cost of Worf’s quest and the Elders’ complicity in their own
    suffering. The revelation that the Klingons *choose* to remain prisoners—despite
    Worf’s offer of freedom—shatters his assumptions and deepens his isolation, while
    the Elders’ threat to detain him raises the stakes of his mission. The betrayal
    also mirrors Data’s internal struggle, where both characters are trapped by forces
    beyond their control: Worf by the Elders’ deception, Data by his own dormant circuits.'
