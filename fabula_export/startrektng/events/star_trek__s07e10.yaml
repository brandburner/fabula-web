  key_dialogue:
  - 'DATA: Doctor Tainer has provided me with many details about my development that
    I was not aware of. Conversing with her was a fascinating experience—but her interest
    in me seems to be... limitless.'
  - 'TROI: She''s your mother, Data. That''s how parents are.'
  - 'DATA: I was a parent. I do not recall exhibiting excessive interest in Lal''s
    behavior.'
  - 'TROI: Data, you and Lal were practically inseparable the entire time she was
    alive. That''s how every parent feels. It''s very hard to let your children go
    out into the world and fend for themselves. You can''t help but be protective
    of them. I''m sure your mother feels the same way.'
  - 'DATA: If that is true... then why did she never attempt to contact me?'
  - 'TROI: I don''t know, Data. It could have something to do with your parents separating...
    you were part of a life she might have wanted to put behind her. But if you really
    want to know, why don''t you ask her?'
