    an android -- or withhold that knowledge from her. And I do not know what to do.'
  - 'TROI: I don''t think so. She''s believed she''s human all her life. The truth
    might be devastating to her.'
  - 'DATA: If she knew she were an android, she and I would have something to share.
    I would no longer be alone in the universe.'
  - 'TROI: ...but at the same time, telling her would rob her of the one thing you''ve
    wanted all your life -- to be human.'
