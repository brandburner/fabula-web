    description_of_involvement: |2-

              The Engineering Drilling Control Consoles in Geordi’s office are critical to the operation’s execution. Data and Juliana sit at nearby consoles, monitoring real-time feeds of phaser penetration depth, particle beam intensity, and seismic stability metrics. Data taps commands for surgical accuracy, while Juliana fine-tunes the beam power to reduce crustal stress. The consoles’ interfaces allow them to coordinate with Riker on the bridge, ensuring the phaser bursts are delivered with precision. Their role is indispensable, enabling the crew to execute the drilling plan with the required technical finesse.
    status_before_event: Active, displaying real-time drilling data and seismic metrics,
