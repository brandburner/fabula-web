- fabula_uuid: act_50a3f675d6462ae7
  number: 4
  summary: 'A palpable tension now exists between Data and Juliana following her confession
    of abandonment, with Juliana visibly uncomfortable and avoiding Data''s gaze as
    they work. The drilling operation for the second magma pocket is underway, but
    the Enterprise encounters a dangerous pocket of magnesite ore, causing severe
    shuddering throughout the ship. Juliana, demonstrating remarkable skill and quick
    thinking, rapidly adjusts the phaser harmonics, stabilizing the beam through a
    combination of precise calculation and fortunate timing. Her quick action averts
    a crisis, impressing Geordi but leaving Data regarding her with an unreadable,
    intensified gaze, suggesting his suspicions are growing. After successfully drilling
    the second shaft, Pran suggests setting up the infusion unit in the first pocket
    while the second cools, providing a temporary reprieve. Data and Juliana proceed
    to the first magma pocket to calibrate an infusion unit. Data continues to observe
    Juliana intently, his expression becoming more focused than casual, noticing subtle
    inconsistencies in her behavior and capabilities. Pran, aware of the lingering
    tension, attempts to mediate their strained relationship, but Data directly asks
    Juliana if she would have left him behind if he were biological. She honestly
    replies no, explaining her profound fear of having to dismantle another "child"
    like Lore, a trauma she could not endure again. Data accepts her apology, and
    a moment of reconciliation occurs, seemingly mending their rift. Later, during
    a concert in Ten Forward where Data and Juliana perform a violin duet, Data notices
    something profoundly curious about Juliana''s performance: every pitch and intonation
    is exactly the same as their practice, a flawless, mechanical replication. This
    observation, combined with earlier subtle cues about her abilities, intensifies
    his suspicion about her true nature. This prompts Data to seek Beverly Crusher''s
    help to surreptitiously examine Juliana''s medical records, expressing his belief
    that "she is not who she claims to be," just before an urgent cave-in report interrupts
    their investigation.'
