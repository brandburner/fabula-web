  - 'JULIANA: At first you couldn''t have cared less about social niceties like ''please''
    and ''thank you''; you were... downright rude, in fact.'
  - 'DATA: I am incapable of embarrassment. Please, continue.'
  - 'JULIANA: One thing we didn''t anticipate was that you thought nothing of being
    naked. -- some of the colonists objected to having an anatomically-correct android
    running around without any clothes on.'
  - 'PRAN: ((sotto)) Someone''s checked his calculations, of course.'
  - 'RIKER: No, but I''m sure Data knows what he''s doing.'
  - 'JULIANA: Data, do you have any plans right now? Maybe we could spend some time
    together? I''d love to see your quarters...'
