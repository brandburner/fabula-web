      distant but ever-present support of the ship's systems. Their role is that of
      the unseen hand—providing seismic data, drilling the escape shaft, and standing
      by to beam the team to safety, should the opportunity arise. The crew's institutional
      protocols and technical expertise are the invisible scaffolding upon which Data
      and Juliana's survival hinges, even as the away team's personal crisis unfolds
      beyond their reach. Their power lies in their ability to monitor, advise, and
      intervene from afar, a reminder that the away team is never truly alone—even
      when they feel abandoned by truth.
    active_representation: Through Riker's combadge transmissions, which serve as
      the bridge's voice in the cavern, and the pre-positioned practical lighting
      and pattern enhancers left by the *Enterprise* crew. The ship's phasers, which
      drilled the escape shaft, are also a silent but pivotal presence.
    power_dynamics: Exercising authority through real-time communication and technical
      support, but operating under the constraint of physical distance. The crew's
      power is reactive—they can advise and assist, but they cannot directly alter
      the away team's immediate circumstances or the revelations unfolding in the
      cavern.
    organizational_goals:
    - Ensure the away team's survival by providing critical updates on seismic activity
      and potential escape routes.
    - Support the mission's success by maintaining the infusion unit's functionality
      and drilling the escape shaft, even if those efforts ultimately go unused.
    influence_mechanisms:
    - Real-time communication via combadge, allowing for coordinated responses to
      seismic threats.
    - Technical support through pre-deployed equipment (lighting, pattern enhancers)
      and the drilled escape shaft.
    - Institutional protocols for away team safety, which dictate Riker's urgent but
      measured interventions.
    institutional_impact: The *Enterprise* crew's involvement underscores the tension
      between institutional duty and personal crisis. While they are focused on the
      mission's technical and logistical demands, the away team's emotional reckoning—particularly
      Juliana's revelation—exists outside their purview, highlighting the isolation
      of individual truth in the face of collective purpose.
    internal_dynamics: The bridge crew operates with disciplined urgency, but there
      is an undercurrent of frustration at their inability to intervene directly.
      Riker's tone, though authoritative, carries the weight of responsibility for
      lives he cannot protect with his own hands.
