  title: Data challenges Juliana’s inconsistent past
  description: "\n  In a tense confrontation aboard *Ten Forward*, Data methodically\
    \ dismantles Juliana’s emotional narrative by exposing inconsistencies in her\
    \ account of their shared history. After she describes their secret marriage and\
    \ his erased childhood, Data reveals he has no record of her in the colonists’\
    \ journals—only a Juliana O’Donnell, not a Soong. When Juliana explains their\
    \ hidden marriage, Data delivers the devastating news of Noonian Soong’s death,\
    \ triggering her visceral reaction. The moment forces Juliana to confront the\
    \ unresolved pain of Soong’s abandonment and his fatal obsession with his work,\
    \ while Data’s clinical detachment underscores the emotional chasm between them.\
    \ The exchange escalates from curiosity to confrontation, revealing Juliana’s\
    \ vulnerability and Data’s need for empirical validation over emotional connection.\
    \ The scene’s climax—Data’s abrupt exit to verify her claims—leaves Juliana emotionally\
    \ exposed and the truth of their relationship in limbo, setting up the next phase\
    \ of their fractured reunion.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e10
  scene_sequence: 2
  sequence_in_scene: 5
  key_dialogue: &id003
  - |-
    DATA: My memory record begins when I was activated by the Starfleet officers who found me on the Omicron Theta outpost. But -- I discovered that my memory banks contained the contents of their journals and logs.
    JULIANA: We thought you might find their experiences useful... after your childhood, we figured you needed all the help you could get.
    DATA: My -- childhood?
  - |-
    JULIANA: Because of my mother. She thought Noonian was an eccentric scientist who was too old for me... we decided to get married secretly and give her some time to get used to the idea of our being together.
    DATA: My father did have an unusual way of looking at things...
    JULIANA: How would you know that?
    DATA: I encountered him once -- in the Terlina system.
    JULIANA: That's where we went -- after we left the outpost... I had no idea you'd ever met him.
    DATA: It was shortly before his death.
  - |-
    JULIANA: We didn't exactly part on the best of terms... I realized that he loved his work as much as he loved me. Maybe more. There we were, stuck on that planet in the middle of a jungle... no one else to talk to, no -- no life. It just wasn't enough... That's why I left.
    DATA: This has been an interesting encounter, and one altogether unexpected. I would like to corroborate what you have told me before we proceed further.
