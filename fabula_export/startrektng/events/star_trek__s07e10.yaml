    description_of_involvement: |2-

              The Enterprise’s phaser arrays are modified to create a highly focused particle beam for drilling into Atrea’s crust. Geordi configures the phasers, while Data and Juliana use them to bore deep into the planet’s surface, targeting unstable magma pockets. The phaser bursts penetrate the crust with surgical accuracy, injecting plasma to reliquify the core and stabilize the planet. The phasers’ role is central to the mission’s success, blending advanced technology with the crew’s technical expertise. Their precise application underscores the fusion of human ingenuity and android calculation.
    status_before_event: Modified and online, ready for the drilling operation, with
      Geordi overseeing their configuration in Engineering.
    status_after_event: Successfully used to drill the shaft and stabilize the magma
      pocket; phaser arrays remain operational but are no longer firing.
    global_id: ger_object_198cf7399ab9
  - object_uuid: ger_object_5055f1bd2071
    description_of_involvement: |2-

              The bridge viewscreen projects a live feed of the planetary drilling site, allowing Pran, Riker, Worf, and the away team to monitor the operation’s progress. The feed shows the phaser beam penetrating the crust, creating a well-like shaft, and the resulting seismic activity. The viewscreen’s real-time updates are critical to the crew’s ability to assess the drilling’s success and adjust their strategies. Its role is both practical—providing visual confirmation of the operation—and symbolic, representing the crew’s collective focus and the high stakes of the mission.
    status_before_event: Active, displaying the live feed of the drilling site and
      phaser beam penetration.
    status_after_event: Continues to display the stabilized drilling site and the
      successful shaft, with updated seismic readings.
