  description: "\n  In the claustrophobic confines of the collapsing magma pocket,\
    \ Data and Juliana race to repair the damaged infusion unit, their urgency heightened\
    \ by Riker’s warnings of escalating seismic stress. As they work, a violent tremor\
    \ fractures the cavern floor, creating a thirty-foot precipice between them and\
    \ the beam-out point. With the ceiling caving in and rocks crashing around them,\
    \ Data insists they must jump to escape. Juliana hesitates, fearing the distance,\
    \ but Data seizes her arm and leaps, absorbing the impact while she is thrown\
    \ violently to the ground. The fall tears her arm clean off, exposing a tangle\
    \ of wires and blinking circuitry—revealing her as an android. Data stares at\
    \ the exposed machinery, his expression unreadable, as the screen fades to black.\
    \ The moment shatters the fragile trust between them, forcing Data to confront\
    \ the possibility that his mother is not human, and that his own origins may be\
    \ more artificial than he ever imagined. The revelation also raises critical questions\
    \ about Dr. Soong’s legacy and the ethical boundaries of android creation, setting\
    \ the stage for the final act’s moral reckoning.\n  "
