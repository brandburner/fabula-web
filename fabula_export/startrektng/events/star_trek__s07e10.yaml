- fabula_uuid: act_61b9d21e12430abc
  number: 6
  summary: 'In Sickbay, Beverly Crusher and Geordi La Forge examine the still-unconscious
    Juliana, confirming she is a highly advanced Soong-type android, meticulously
    designed to appear human. They discover she possesses tear ducts, sweat glands,
    capillaries, and a feedback processor that emits a false bio-signal, even mimicking
    the aging process. Data explains his prior suspicions, citing Juliana''s ability
    to perform complex calculations without computer assistance, her blinking pattern
    governed by a Fourier Series (identical to his own), and her perfectly replicated
    violin performance, which only an artificial life-form could achieve. Geordi then
    discovers a hidden information module with a holographic interface within Juliana''s
    head panel. Data activates it on the holodeck, revealing a holographic message
    from Dr. Noonian Soong. Soong explains the profound truth: the real Juliana O''Donnell,
    his wife and Data''s co-creator, died after being severely injured during the
    Crystalline Entity attack. Overcome with grief, he transferred her memories into
    an android body, meticulously programming her to remain unaware of her artificial
    nature, believing this illusion was essential for her happiness. Soong instructs
    Data to re-insert the chip, which will erase her memory of the accident, and pleads
    with Data to let her live out her life believing she is human, emphasizing that
    "in every way that matters, she is Juliana Soong." Data then consults Captain
    Picard, Beverly, and Counselor Troi, grappling with the immense ethical dilemma
    of revealing the truth to Juliana. Beverly argues for her right to know and deal
    with reality, while Troi emphasizes the potential devastation and the irony of
    robbing her of the one thing Data has always desired: to be human. Data admits
    his personal desire for a unique connection as another android, highlighting his
    internal conflict. Ultimately, Data decides to honor Soong''s wishes and protect
    Juliana''s illusion of humanity. He re-inserts the chip, and Juliana awakens with
    no memory of the revelation. As Juliana prepares to depart Atrea, Data shares
    Soong''s dying words about his great love for her, assuring her that Soong was
    referring to her. Juliana, deeply touched, reflects on an Atrean saying about
    children born of love, implying Data''s inherent goodness. They share a poignant
    farewell, with Data carrying the weight of his secret and a profound, bittersweet
    sense of connection and loss.'
