  title: Juliana reveals Data’s erased childhood
  description: "\n  In a charged, intimate confrontation aboard *Ten Forward*, Juliana\
    \ Tainer shatters Data’s self-perception by claiming to be his mother and detailing\
    \ his erased past on Omicron Theta. She describes his early development—his 'childhood'\
    \ as an infantile android, Noonian Soong’s obsessive tinkering, and the deliberate\
    \ wiping of his memory before the Crystalline Entity attack. Data, methodical\
    \ and skeptical, challenges her inconsistencies (her secret marriage to Soong,\
    \ her absence from colony records) while absorbing the emotional weight of her\
    \ revelations. When he casually mentions encountering Soong before his death,\
    \ Juliana’s composure fractures, exposing her unresolved grief and the bitterness\
    \ of their estrangement. The scene culminates in Data’s clinical request to 'corroborate'\
    \ her story, leaving Juliana visibly wounded by his detachment. This moment forces\
    \ Data to confront the fragmented nature of his existence—his origins, his erased\
    \ past, and the human-like emotions he’s never allowed himself to process—while\
    \ the *Enterprise*’s mission to save Atrea looms as a parallel crisis. The exchange\
    \ reveals Juliana’s desperate need for connection and Data’s struggle to reconcile\
    \ his android logic with the human-like bonds she offers.\n  "
