    beliefs:
    - That Juliana is human, as she has claimed and as his positronic networks have
      been programmed to accept.
    - That his own origins are distinct from hers, rooted in Dr. Soong's sole creation—until
      this moment forces him to question everything.
    observed_traits:
    - Decisive under pressure
    - Mechanically precise in crisis
    - Emotionally reserved yet intellectually reactive
    - Protective (physically, though not emotionally transparent)
    - Analytical even in moments of personal upheaval
