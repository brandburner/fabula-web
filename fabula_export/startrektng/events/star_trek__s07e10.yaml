  title: Juliana weaponizes Data’s origins
  description: "\n  In a corridor outside Counselor Troi’s office, Juliana Tainer\
    \ deliberately exposes Data’s pre-creation ambiguity by revealing Noonien Soong’s\
    \ unresolved debate over his gender—framing it as a maternal concession to Soong’s\
    \ paternalism. When Data stops to visit Troi, Juliana seizes the moment to insinuate\
    \ that his ‘sexuality programming’ (a technical feature Soong designed) is the\
    \ real reason for the visit, not therapy. Her breezy dismissal of his explanation—‘Good\
    \ night’—leaves Data unsettled, his vulnerability to human projections of his\
    \ nature now weaponized. The exchange escalates tension between his quest for\
    \ self-definition and her manipulative intent, while foreshadowing his later confrontation\
    \ with Soong’s hologram and the ethical dilemma of Juliana’s true identity.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e10
  scene_sequence: 5
  sequence_in_scene: 10
  key_dialogue:
  - 'JULIANA: -- I wanted to make you female, but your father insisted on a son. We
    argued about it endlessly, right up until we were ready to assemble you.'
  - 'DATA: How did you decide?'
  - 'JULIANA: Well, Noonian walked in holding your head in his hand and—innocent as
    you please—said it was up to me. Of course he knew perfectly well what he was
    doing... once again, he''d made it in his own image—what was I to say?'
  - 'JULIANA: He was worried the sexuality programming he designed for you wouldn’t
    work...'
  - 'DATA: You misunderstand; Counselor Troi is a therapist—'
  - 'JULIANA: ((breezy)) Good night...'
