- fabula_uuid: cand_evt_scene_c518c85867fb5928_01
  global_id: null
  title: Data reveals Soong’s love for Juliana
  description: "\n  In the transporter room, Data shares a posthumous confession from\
    \ Dr. Noonien Soong—his admission that Juliana was his *only* great love. The\
    \ revelation catches Juliana off guard, her initial reaction a quiet, inward smile\
    \ before she responds with an Atrean proverb about inherited goodness, framing\
    \ Data’s moral purity as a legacy of their shared bond. The moment is charged\
    \ with unspoken grief: Soong’s regret over never expressing his love mirrors Data’s\
    \ own struggle to articulate his emotions. Juliana’s kiss on Data’s cheek—an impulsive,\
    \ maternal gesture—seals the scene’s emotional weight, bridging Soong’s legacy\
    \ with Juliana’s identity. For Data, the exchange is a bittersweet farewell, his\
    \ final act of preserving her humanity before her departure. The scene deepens\
    \ the narrative’s central tension: Juliana’s impending loss and Data’s unresolved\
    \ conflict between his creator’s legacy and his own ethical dilemmas.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e10
  scene_sequence: 21
  sequence_in_scene: 41
  key_dialogue:
  - 'DATA: Before he died, my father told me that he had only one great love in his
    life... and that he regretted never letting her know how much he cared for her.
    I am certain he was referring to you.'
  - 'JULIANA: On Atrea they have a saying... that a child born from parents who love
    each other will have nothing but goodness in his heart... I guess that explains
    you...'
  - 'JULIANA: Take care of yourself, son.'
