  title: Juliana confesses her Omicron Theta betrayal
  description: "\n  In a moment of raw emotional exposure, Juliana Tainer admits to\
    \ Data that she deliberately abandoned him during the Omicron Theta evacuation—not\
    \ because the escape pod was full, but because she feared he would become like\
    \ Lore. Her confession is abrupt, unfiltered, and laced with guilt, revealing\
    \ the depth of her betrayal and the fragility of Data's emotional foundations.\
    \ The revelation forces Data to confront the painful truth that his own mother,\
    \ the one person he believed might offer unconditional acceptance, chose to leave\
    \ him behind out of fear. The scene ends with Juliana's abrupt departure, leaving\
    \ Data alone to process the devastating implications of her confession, which\
    \ undermines his understanding of love, trust, and his own worth. This moment\
    \ serves as a turning point in their relationship, shifting from tentative reconciliation\
    \ to irreparable tension, and deepens Data's existential crisis as he grapples\
    \ with the fragility of human connections and the weight of his own origins.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e10
  scene_sequence: 7
  sequence_in_scene: 14
  key_dialogue:
  - 'JULIANA: "I lied to you, Data. The pod wasn’t full. I left you behind because
    I was afraid. Afraid of what you might become."'
  - 'DATA: "You feared I would become like Lore."'
  - 'JULIANA: "Yes. And I was wrong. But I can’t take it back."'
