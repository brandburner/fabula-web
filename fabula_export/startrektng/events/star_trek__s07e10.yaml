acts:
- fabula_uuid: act_8912137c0add5503
  number: 1
  summary: 'The Enterprise arrives at Atrea to assist with a critical planetary geological
    crisis, where the molten core is rapidly solidifying, threatening to render the
    world uninhabitable within thirteen months. Captain Picard, Geordi, and Data meet
    with Atrean scientist Pran Tainer and his human wife, Juliana Tainer, who is also
    a geologist. Juliana details the dire situation, emphasizing the urgency and the
    potential for catastrophic loss of life. Data and Geordi swiftly propose a complex
    and high-stakes solution: ferro-plasmic infusion. This procedure involves using
    the ship''s phasers to drill deep into the planet''s magma pockets and then injecting
    sufficient plasma to re-liquefy the core, stabilizing it for centuries. This innovative
    plan is accepted by the Atreans, and preparations for the dangerous operation
    begin immediately. As the initial meeting concludes, Juliana approaches Data,
    her demeanor shifting from professional to deeply personal. She asks Data if he
    knows her, then reveals a stunning and emotionally charged truth: she was present
    at his creation on Omicron Theta and claims to be Dr. Soong''s wife, effectively
    making her Data''s mother. This unexpected and profound revelation leaves Data
    visibly puzzled, his logical processors grappling with an entirely new and unrecorded
    aspect of his past, and the audience with a significant, emotionally charged cliffhanger,
    setting the stage for a deeply personal and existential journey for the android.'
  key_moments: []
  scene_numbers:
  - 1
  - 2
  - 3
- fabula_uuid: act_a88f658612043773
  number: 2
  summary: Following Juliana's startling revelation, Data seeks to verify her claims,
    noting his complete lack of memory regarding her. Juliana explains that his memory
    processors were intentionally wiped after his initial "childhood" development
    and deactivation on Omicron Theta, prior to the devastating Crystalline Entity
    attack. Data, however, finds no mention of her as Dr. Soong's wife in the colonists'
    logs, only a "Juliana O'Donnell." Juliana counters this inconsistency by explaining
    that she and Soong married secretly on Mavala Four due to her mother's strong
    disapproval of Soong's eccentricities and age. Data then reveals he encountered
    Dr. Soong shortly before his death, a fact that deeply affects Juliana, who had
    not known of Soong's passing. She confesses that she eventually left Soong because
    she felt he loved his work more than he loved her, a difficult admission for her.
    Data, ever the seeker of objective truth, begins to cross-reference passenger
    manifests and other historical data, finding corroborating evidence that Juliana
    O'Donnell and Noonian Soong did indeed travel to Mavala Four during the period
    in question. Despite this partial verification, Data struggles to reconcile her
    detailed story with Soong's complete silence about her in his own logs. Geordi
    La Forge encourages Data to embrace the unexpected and consider that Soong might
    have omitted her from his records due to personal heartbreak. Data acknowledges
    his profound curiosity about this previously unknown past. Later, Data approaches
    Juliana in Ten Forward and, after internal deliberation and considering Geordi's
    advice, addresses her as "Mother," signifying his acceptance of her claim and
    his desire to build a relationship with her, marking a significant emotional step.
