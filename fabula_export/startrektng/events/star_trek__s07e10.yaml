  title: Data challenges Juliana’s inconsistent past
  description: "\n  In a tense confrontation aboard *Ten Forward*, Data methodically\
    \ dismantles Juliana’s emotional narrative by exposing inconsistencies in her\
    \ account of their shared history. After she describes their secret marriage and\
    \ his erased childhood, Data reveals he has no record of her in the colonists’\
    \ journals—only a Juliana O’Donnell, not a Soong. When Juliana explains their\
    \ hidden marriage, Data delivers the devastating news of Noonian Soong’s death,\
    \ triggering her visceral reaction. The moment forces Juliana to confront the\
    \ unresolved pain of Soong’s abandonment and his fatal obsession with his work,\
    \ while Data’s clinical detachment underscores the emotional chasm between them.\
    \ The exchange escalates from curiosity to confrontation, revealing Juliana’s\
    \ vulnerability and Data’s need for empirical validation over emotional connection.\
    \ The scene’s climax—Data’s abrupt exit to verify her claims—leaves Juliana emotionally\
    \ exposed and the truth of their relationship in limbo, setting up the next phase\
    \ of their fractured reunion.\n  "
