  scene_sequence: 17
  sequence_in_scene: 34
  key_dialogue:
  - 'GEORDI: Basically, she''s a Soong-type android -- except everything about her
    is designed to fool you into thinking she''s human.'
  - 'DATA: The first indication occurred when we were drilling. I saw her perform
    several complex calculations without the assistance of the computer. [...] The
    intervals between blinks were governed by a Fourier Series -- the same mathematical
    formula my father used to give my blinking pattern the appearance of randomness.'
  - 'DATA: ((O.S.)) It appears to be an information module... With a holographic interface.'
