  title: Juliana reveals her past opposition to Data
  description: "\n  During a tense moment aboard the Enterprise as the crew prepares\
    \ for the critical drilling operation to save Atrea, Juliana Tainer—Data’s claimed\
    \ mother—shares a long-buried anecdote about his early development. As she recounts\
    \ the story, her voice wavers, and she confesses that she once vehemently opposed\
    \ Data’s creation, fearing he would replicate Lore’s destructive potential. This\
    \ revelation forces Data to confront her about her past emotional distance and\
    \ the unspoken betrayal of her role in his origins. The moment deepens his existential\
    \ crisis, as he grapples with the revelation that the woman he has begun to see\
    \ as a maternal figure once saw him as a threat. The confession occurs amid the\
    \ mission’s urgency, heightening the emotional stakes and forcing Data to reconcile\
    \ his past with his present responsibilities. Juliana’s admission is raw and unfiltered,\
    \ exposing her guilt and the complexity of her relationship with Data, while also\
    \ underscoring the ethical dilemmas he now faces as he considers her true nature\
    \ and his own identity.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e10
  scene_sequence: 7
  sequence_in_scene: 13
  key_dialogue:
  - 'JULIANA: "I was against your creation from the beginning. I thought... I thought
    you would be like Lore. That you would destroy everything."'
  - 'DATA: "You feared me. And yet, you raised me. Why?"'
  - 'JULIANA: "Because Noonian convinced me you were different. But I never stopped
    wondering if he was wrong."'
