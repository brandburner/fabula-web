- fabula_uuid: cand_evt_scene_c932c628078dbdec_01
  global_id: null
  title: Data probes Juliana’s medical records
  description: 'In Sickbay, Data approaches Beverly Crusher with an unusual request:
    access to Juliana Tainer’s medical records. When Beverly questions his motives,
    Data evades direct answers, insisting only that he has a ‘good reason’ for his
    inquiry. Beverly reluctantly complies, scanning Juliana’s transporter trace pattern
    and finding no overt anomalies—only mild hypertension, which she dismisses as
    age-related. Data’s cryptic response—‘I have reason to believe she is not who
    she claims to be’—hints at his growing suspicion that Juliana’s identity is fabricated.
    Before Beverly can press further, Riker interrupts via combadge, summoning Data
    to an emergency in Transporter Room Two. The abrupt cutoff leaves Beverly—and
    the audience—with unanswered questions, while reinforcing the dual crises unfolding:
    Data’s existential dilemma and the Enterprise’s race to save Atrea. The scene
    underscores Data’s methodical approach to uncovering Juliana’s true nature, even
    as his investigation is derailed by operational demands. The tension between his
    personal quest and his duty to the crew remains unresolved, heightening the narrative’s
    central conflict.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e10
  scene_sequence: 14
  sequence_in_scene: 27
  key_dialogue:
  - 'BEVERLY: Data... why do you need Doctor Tainer''s medical records? Is something
    wrong with her?'
  - 'DATA: I am not certain. Perhaps you could determine that from her Transporter
    trace pattern.'
  - 'BEVERLY: I probably could... but I don''t ordinarily look into someone''s medical
    status unless I have a good reason.'
  - 'DATA: Doctor... I would ask that you not require me to be more specific. But
    I assure you that I have a good reason for asking.'
  - 'DATA: Because... I have reason to believe she is not who she claims to be...'
