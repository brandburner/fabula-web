- fabula_uuid: cand_evt_scene_3940e34a642c309e_01
  global_id: null
  title: Juliana confesses her betrayal and fear
  description: "\n  In a private, emotionally charged moment aboard *Ten Forward*,\
    \ Juliana Tainer reveals the dark history of Dr. Soong’s failed android prototypes—including\
    \ the violent Lore—and admits her initial terror that Data would become like them.\
    \ Her confession evolves into a reluctant admission of pride in Data’s existence,\
    \ exposing her conflicted maternal bond and the ethical weight of his creation.\
    \ The scene bridges Data’s past and present, deepening the tension between his\
    \ identity and the legacy of his origins. Juliana’s emotional unraveling culminates\
    \ in her devastating confession: she lied about the escape pod on Omicron Theta,\
    \ abandoning Data out of fear he would turn out like Lore. This betrayal shatters\
    \ Data’s fragile trust in her and forces him to confront the cost of her human\
    \ fragility. The moment serves as a turning point, redefining their fractured\
    \ relationship and setting up Data’s existential reckoning with his origins.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e10
  scene_sequence: 10
  sequence_in_scene: 20
  key_dialogue: &id011
  - 'JULIANA: Do you think you''ll ever try to create an android again?'
  - 'DATA: Perhaps. I created Lal because I wished to procreate. Despite what happened
    to her, I still have that wish.'
  - 'JULIANA: But... how do you know the same thing won''t happen? Creating a stable
    positronic matrix is very tricky -- your Father lost several prototypes before
    Lore.'
  - 'DATA: I was not aware that he created any androids before my brother.'
  - 'JULIANA: There were three of them... they were like children to us... losing
    them was very painful. When Noonian decided to try again, I was very much against
    it. I didn''t think we had the right to bring a life into the world that had so
    little chance of surviving.'
  - 'JULIANA: I lied when I said there wasn''t room for you in the escape pod that
    we took from Omicron... there was... I didn''t want to bring you with us... I
    was afraid that if we reactivated you, you''d turn out like Lore.'
  - 'JULIANA: I made Noonian leave you behind...'
