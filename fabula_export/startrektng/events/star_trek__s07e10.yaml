      her relationship with Data.
    - To justify her actions by framing them as a mother’s fear, though she knows
      the logic is flawed.
    what_happened: "\n        Juliana begins the scene with a facade of composure,\
      \ her fingers nervously tracing the rim of her glass as she steers the conversation\
      \ toward Data’s potential to create another android. Her voice wavers when she\
      \ speaks of Soong’s failed prototypes, her eyes darting away as she describes\
      \ them as 'children' lost to their creators. The moment Data connects her opposition\
      \ to his creation, her guilt becomes palpable—she reaches for his hand, a desperate\
      \ attempt to reassure him, but her touch is fleeting. As she confesses the lie\
      \ about the escape pod, her voice breaks, tears welling in her eyes. Overcome\
      \ by emotion, she stands abruptly and exits, leaving Data in stunned silence.\
      \ Her physical departure mirrors the emotional collapse of her carefully constructed\
      \ narrative.\n      "
