  scene_sequence: 18
  sequence_in_scene: 36
  key_dialogue:
  - 'SOONG: Why? There was no reason for her to know. I wanted her to be happy. I
    wanted us to be happy. And we were... for a while, anyway...'
  - 'SOONG: The truth is that in every way that matters, she is Juliana Soong. I''ve
    programmed her to terminate after a long life. Let her live out the rest of her
    days, and die believing she was human. Don''t rob her of that, son. Please.'
  - 'DATA: If she recovers and learns that she is an android -'
  - 'SOONG: She doesn''t have to know.'
