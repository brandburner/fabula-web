- fabula_uuid: act_1caa20e78c961beb
  number: 3
  summary: 'Data and Juliana continue to bond, with Juliana sharing more intimate
    anecdotes about Data''s early "childhood" and Dr. Soong''s eccentricities, such
    as his determined but ultimately abandoned attempts to program hiccups into Data
    and Data''s initial, uninhibited lack of modesty. These stories provide a deeper,
    more personal context to Data''s origins. Data, however, seeks counsel from Counselor
    Troi regarding Juliana''s "limitless" interest in him and, more pointedly, his
    logical query about her failure to contact him sooner over the years. Troi suggests
    it might relate to his parents'' separation and Juliana''s desire to put that
    painful part of her life behind her, offering an emotional perspective Data struggles
    to grasp. During preparations for drilling the first magma pocket, Juliana inadvertently
    reveals a painful truth: she was initially vehemently against Data''s creation.
    She explains her fear that he would turn out like Lore, given Soong''s previous
    failed android prototypes and Lore''s malevolent nature. This revelation deeply
    affects Data, who directly confronts her about her opposition to his very existence
    and her subsequent, decades-long lack of contact. Juliana, overwhelmed by guilt
    and emotion, admits she lied about there being no room for him in the escape pod
    from Omicron Theta. She confesses she deliberately left him behind, driven by
    an overwhelming fear that if he turned out like Lore, she would be forced to dismantle
    him, a trauma she could not bear to repeat. Overcome with this painful admission,
    Juliana abruptly leaves, leaving Data to process this profound and emotionally
    devastating truth about his abandonment.'
