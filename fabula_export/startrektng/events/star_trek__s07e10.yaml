- fabula_uuid: act_29f7184a8f3a493d
  number: 5
  summary: A sudden and severe cave-in occurs in one of the magma pockets, injuring
    Pran Tainer. Data and Juliana volunteer to return to the highly unstable pocket
    to finish configuring the infusion unit, as any delay would jeopardize the entire
    mission to save Atrea. Geordi warns Data about a misaligned transporter pattern
    enhancer, which Data must manually re-align for their beam-out, adding another
    layer of risk to the already perilous task. Inside the precarious magma pocket,
    Data and Juliana face further escalating seismic activity. A powerful tremor creates
    a sharply defined two-foot ledge, and Data notes the increasing instability, urging
    Juliana to hasten their work. They discover the infusion unit is damaged by falling
    rocks and must begin reprogramming its complex sequence from scratch, working
    under immense pressure and the constant, low-level rumble of molten magma. Another
    violent tremor strikes, causing more rocks and debris to fall from the ceiling
    and walls, forcing them to cling to the infusion unit to maintain balance. Despite
    the danger, they manage to complete the programming. As they rush back to the
    beam-out point, a massive aftershock causes the cavern floor to drop another thirty
    feet, leaving them stranded on the edge of a sheer precipice, far above the pattern
    enhancers. With no hand-holds in the rock face and the ceiling collapsing around
    them, Data makes a split-second, desperate decision to jump, pulling Juliana firmly
    by the arm. As they land on the floor below, Data is able to absorb the shock,
    but Juliana hits the ground hard and is knocked unconscious. To Data's (and the
    audience's) astonishment, her arm is torn off, revealing a mass of wires and blinking
    circuitry, unequivocally confirming she is an android. Data, however, stares down
    at her exposed arm with a strangely calm demeanor, showing no undue surprise,
    indicating he had already suspected the profound truth.
