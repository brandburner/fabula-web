      demand for the code is a last-ditch effort to maintain diplomatic protocol,
      but the vessel''s refusal to comply—and Worf''s subsequent warning of phaser
      banks—exposes the code as a hollow formality. Its absence underscores the betrayal:
      the Beta moon''s alleged escort is either a rogue faction or a deliberate aggressor,
