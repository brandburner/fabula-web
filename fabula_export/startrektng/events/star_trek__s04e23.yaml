  scene_sequence: 5
  sequence_in_scene: 9
  key_dialogue:
  - 'TROI: Is that the colgonite astringent you have on your eyes? I''ve never tried
    it...'
  - 'BEVERLY: How... how did you know?'
  - 'TROI: I don''t really think it''s much of a secret.'
  - 'BEVERLY: It isn''t?'
  - 'TROI: No. You''ve been -- glowing.'
  - 'BEVERLY: Glowing... Well, yeah... that''s just how I feel, Deanna...'
  - 'TROI: Just... something I sense in Odan. Beverly... how well do you really know
    him?'
  - 'BEVERLY: I feel like I know him better than anyone I''ve ever known... but...
    Am I being foolish? I don''t think so... and yet... it''s only been a couple of
    weeks... Of course, maybe that means it''s just infatuation... but I''m a grown
    up, I know the difference between love and infatuation...'
  - 'TROI: And you like it...'
  - 'BEVERLY: I like it.'
