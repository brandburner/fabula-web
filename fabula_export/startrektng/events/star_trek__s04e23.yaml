    description_of_involvement: Beverly’s medical tricorder is the critical tool that
      reveals the dire condition of Odan’s symbiont. As she scans Riker’s collapsing
      body, the tricorder’s screen flashes alarming readings—heart rate spikes and
      plummeting blood pressure—indicating the symbiont is dying. This diagnostic
      tool forces Beverly to confront the impossible choice of removing Odan immediately
      or waiting for the Trill host ship. Its readings symbolize the urgency and medical
      stakes of the situation, driving the narrative tension.
    status_before_event: Functional and in Beverly’s possession, used earlier to monitor
      Odan’s condition and now deployed to assess Riker’s collapse.
    status_after_event: Continues to function, now displaying critical data that confirms
      the need for immediate action to save Odan’s symbiont.
