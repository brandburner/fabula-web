  global_id: null
  title: Riker’s Collapse Reveals Medical Crisis
  description: "\n  In the Observation Lounge, Commander Riker—already weakened by\
    \ hosting the Odan symbiont—exhausts himself securing tentative trust from Kalin\
    \ Trose and Lathal Bine by leveraging intimate knowledge of their pasts. His calculated\
    \ performance succeeds in swaying Lathal Bine, but the moment the Peliar representatives\
    \ depart, Riker’s facade crumbles. He collapses into his chair, his body wracked\
    \ with pain, and desperately pleads with Beverly for help. The scene pivots from\
    \ diplomatic triumph to a medical emergency, exposing the severity of Riker’s\
    \ rejection syndrome and forcing Beverly to confront the immediacy of his crisis.\
    \ The contrast between Riker’s composed negotiation and his sudden vulnerability\
    \ underscores the fragility of his condition and the high stakes of Beverly’s\
    \ impending choice: whether to prioritize his survival or the mission’s success.\n\
    \  "
