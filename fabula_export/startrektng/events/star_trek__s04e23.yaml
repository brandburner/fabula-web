- fabula_uuid: cand_evt_scene_bc3de72380ac9214_02
  global_id: null
  title: Odan’s Collapse and Beverly’s Choice
  description: 'On the Enterprise bridge, Beverly Crusher’s mounting anxiety reaches
    a breaking point as Odan (hosting Riker) emerges from the Peliar Zel peace talks,
    declaring success before collapsing from the strain of his Trill symbiont’s failing
    host. Beverly’s medical tricorder reveals the symbiont is dying—leaving her with
    an impossible choice: remove Odan immediately to save his life, or wait for the
    Trill host ship’s arrival, risking his death and the collapse of the fragile peace.
    Picard, recognizing the urgency, orders Worf to escort the Peliar Zel representatives
    off the ship and sets a course to intercept the Trill vessel at warp nine, racing
    against time. Beverly’s professional duty clashes with her personal fear of losing
    Odan, forcing her to act despite the ethical and medical risks. The scene crystallizes
    the high-stakes tension of the mission, where diplomacy, medicine, and love intersect
    in a moment of crisis that demands immediate, irreversible decisions.'
