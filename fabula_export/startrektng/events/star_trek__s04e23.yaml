  title: Troi’s Story Breaks Beverly’s Resistance
  description: 'In a quiet, emotionally charged moment at Ten Forward, Beverly Crusher—wracked
    by confusion and grief over Odan’s symbiont transfer into Riker—confesses her
    turmoil to Deanna Troi. She admits loving Odan’s essence but struggling to reconcile
    it with Riker’s physical form, questioning whether her feelings are for the symbiont
    or the man. Troi responds with a deeply personal anecdote about her father, illustrating
    how love transcends physical presence. As Beverly listens, she turns to see Riker
    enter, and Troi urges her to accept the pull she feels toward him. The moment
    marks Beverly’s emotional turning point: her resistance to Odan/Riker’s relationship
    begins to crumble, foreshadowing her eventual acceptance of their bond. The scene
    hinges on Troi’s empathy and Beverly’s vulnerability, with the latter’s internal
    conflict laid bare as she grapples with love beyond human norms. The fade-out
    on Beverly’s gaze locking with Riker’s underscores the inevitability of her emotional
    surrender, setting up her later actions in the story’s climax.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e23
  scene_sequence: 15
  sequence_in_scene: 32
  key_dialogue:
  - 'BEVERLY: The first man I ever loved unconditionally... was named Stefan. He was
    a soccer player... I would watch him race down the field and I thought my heart
    would stop because he was so beautiful... We married and had three children...
    twin boys, Andrew and Alex, and then a girl, Jennifer... Stefan became a famous
    artist and created huge, breathtaking metal sculptures... I kept house and made
    the world easy for him... and he came to adore me as much as I worshipped him...
    At least in my daydreams. Stefan was eleven... and I was eight. He never even
    knew I existed.'
  - 'BEVERLY: Deanna... I loved Odan. I''m sure of that... I had no doubts, no fears...
    and now... I don''t know what it was I loved. His eyes... his hands, his mouth...
    his body? They''re gone. If that was all it was, I should mourn him and go on...
    But there was so much more... I felt completely free with him... unguarded...
    at ease with myself... There were so many things that made him special to me.
    Where are they? Are they still here... alive in Will Riker?'
  - 'TROI: The first man I ever loved... was my father. He was strong and tall...
    he carried me when the ground was muddy... he chased away the monsters who hid
    under my bed at night... he sang to me and he kept me safe. And then he went away...
    What I wouldn''t give to hear his songs again... to feel his arms protect me.
    I never will. But I can still feel his warmth, his love... as though he were here
    with me. Beverly, if you can feel those things from the man we know as Will Riker,
    accept them, accept the love.'
