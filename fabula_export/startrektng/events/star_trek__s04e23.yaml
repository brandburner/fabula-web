  title: Riker volunteers as Odan's host
  description: In the Observation Lounge, Beverly Crusher delivers the devastating
    news that Odan’s symbiont—still alive despite its host’s death—must find a new
    body within hours or perish, risking the collapse of the Peliar Zel peace talks.
    The crew grapples with the urgency, with Data’s ineligibility as a host due to
    his android biology forcing the group to consider desperate alternatives. Riker,
    recognizing the stakes, volunteers to become Odan’s temporary human host, despite
    Beverly’s warnings about the untested risks to his body and identity. Picard,
    torn between duty and the safety of his first officer, ultimately defers to Riker’s
    autonomy, granting him permission to proceed. The moment underscores the crew’s
    trust in one another and the moral weight of their choices, as Riker’s sacrifice
    could either secure Odan’s survival and prevent war—or cost him his life. The
    scene pivots from crisis to action, setting up the high-stakes medical procedure
    that follows.
