    key_environmental_details:
    - The faint shimmer of ionized particles in the upper ionosphere.
    - The escort ship emerging from the moon's limb, its phaser banks glowing as they
      power up.
    - The shuttlecraft's shields straining under the tension of evasive maneuvers.
