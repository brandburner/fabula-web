- fabula_uuid: act_271f68d879799f73
  number: 4
  summary: Act Four intensifies the diplomatic and personal stakes, pushing Odan (in
    Riker's body) to the brink while Beverly grapples with her rekindled, complicated
    feelings. Odan, increasingly ill and in pain from the host body's rejection, insists
    on proceeding with the crucial peace negotiations despite Picard's concerns about
    his deteriorating condition. He demonstrates extraordinary diplomatic prowess
    by recalling intimate, secret details of the representatives' past, earning the
    trust of Lathal Bine and securing a tentative agreement from Kalin Trose. However,
    the immense effort takes a severe physical toll, and Odan collapses, desperately
    calling for Beverly's help. In Sickbay, Beverly confirms the onset of classic
    rejection syndrome, with no long-term medical solution, only temporary immunosuppressants.
    The emotional tension between Beverly and Odan (in Riker's body) escalates as
    he reaches for her, and she almost succumbs to the intimacy before pulling back,
    conflicted by Riker's identity and her own ethical boundaries. Picard observes
    their complex dynamic, acknowledging the "awkward situation." Odan, reflecting
    on his life's mission to solve insoluble problems, recognizes his own personal
    dilemma with Beverly has no easy answer. Later that night, Odan's persona emerges
    more strongly, as he paces agitatedly and attempts to order his native drink.
    Beverly, drawn by an unseen force and reflecting on the rose Odan gave her, comes
    to his quarters. After a tense, emotionally charged exchange, where Odan explicitly
    states his desire for her and offers her a final chance to leave, Beverly makes
    a definitive choice, declaring "I'm not leaving." They share a passionate kiss,
    signifying her acceptance of Odan in Riker's form and her surrender to their complicated
    love.
