- fabula_uuid: cand_evt_scene_bd982c76b1c75203_02
  global_id: null
  title: Leka reveals Peliar Zel’s war threat
  description: |2

    Governor Leka of Peliar Zel delivers a dire briefing to the Enterprise crew, revealing that the long-standing environmental conflict between the planet’s Alpha and Beta moons has escalated into an armed standoff. She describes how Alpha’s exploitation of the planet’s magnetic field for energy has triggered environmental collapse on Beta, leading to accusations of genocide and the mobilization of weapons. The tension is palpable as Leka warns that war is imminent, threatening to drag the planet’s neutral population into the conflict. Odan, the Trill ambassador, demonstrates his deep knowledge of the situation, while his insistence on shuttling to the surface—despite Leka’s safety concerns—hints at his hidden vulnerabilities and the high personal stakes of his mission. Meanwhile, Deanna Troi’s lingering unease about Odan’s emotional fluctuations foreshadows the revelation of his Trill symbiont nature, which will later force Beverly Crusher into an impossible ethical and emotional crisis. The scene underscores the fragility of the peace Odan is tasked to preserve and sets up the urgent, life-or-death diplomatic mission that will test his resolve—and Beverly’s loyalty—beyond measure.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e23
  scene_sequence: 4
  sequence_in_scene: 7
  key_dialogue:
  - 'LEKA: It has grown progressively worse. The people on our moons have been in
    discord ever since they migrated from the planet five centuries ago. For us on
    the planet... it is like having two squabbling children. We try to help settle
    their arguments without taking sides... but this time, we are at a loss.'
  - 'LEKA: Alpha is unwilling to lose their new-found energy source... Beta accuses
    them of intentionally courting genocide... our efforts to find a compromise have
    failed. And now—we''ve received intelligence that both sides are arming for war.
    If that happens... the people of my planet will begin to take sides... the outcome
    can only be disastrous.'
  - 'ODAN: Excuse me, Captain... I would prefer to shuttle to the surface.'
  - 'LEKA: I would not recommend it. There are many radical factions involved in this
    dispute. It would be difficult to guarantee your safety.'
  - 'ODAN: I''m sure I''m not the first who has expressed discomfort with the idea
    of molecular transport. Thank you, but I much prefer to keep myself intact. I''ll
    shuttle down.'
  - 'TROI: It''s Ambassador Odan... I continue to feel such... fluctuations... of
    emotion from him.'
  - 'TROI: But he seems a lovely person... very much a gentleman, don''t you think?'
