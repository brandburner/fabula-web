  title: Crusher Rushes Data for Time
  description: Beverly Crusher, still reeling from the charged intimacy of her encounter
    with Odan, abruptly shifts into professional urgency. She dismisses Odan with
    a medical pretext—'Put a cold cloth on your forehead'—before dragging Data down
    the corridor at an uncharacteristically frantic pace. Her insistence that 'every
    second does count' betrays her emotional investment in Odan’s well-being, overriding
