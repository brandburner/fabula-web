      the banks' glow a visual metaphor for the betrayal of the Beta moon's alleged
      hospitality. Their presence transforms the ionosphere from a diplomatic corridor
      into a kill zone, forcing the shuttle crew to abandon negotiation and prioritize
      survival. The phasers themselves remain unseen but felt—their potential fire
      a looming threat that dictates every maneuver Riker makes.
