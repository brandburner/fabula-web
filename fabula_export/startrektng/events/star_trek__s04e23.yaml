- fabula_uuid: act_6d4a62cac2fde3fe
  number: 5
  summary: 'Act Five brings the narrative to its emotional and diplomatic climax,
    forcing impossible choices and leading to a bittersweet resolution. With war imminent
    and the peace talks reaching their final stage, Riker (Odan) is critically ill,
    his body rapidly deteriorating from rejection. He makes a profound, ethical decision:
    he refuses further medication, prioritizing Riker''s life over his own, and demands
    to be removed from Riker''s body immediately after the mediation, even if it means
    his own demise before the new host arrives. Beverly, stunned and heartbroken,
    ultimately agrees to this selfless act, acknowledging the immense sacrifice. Picard,
    witnessing the depth of their bond and Beverly''s anguish, offers her profound
    personal comfort, breaking his professional demeanor. The Trill host ship is delayed,
    intensifying the race against time. Despite his agonizing pain, Odan successfully
    brokers a fragile peace treaty between the warring moons, collapsing the moment
    he exits the Observation Lounge. Beverly, seeing Riker''s critical state, prepares
    for the emergency removal of the symbiont, hoping to save Riker''s life and that
    the new host will arrive in time. The new host finally arrives, revealed to be
    a beautiful woman named Kareel, further challenging Beverly''s understanding of
    Odan''s identity. Beverly successfully transfers Odan to Kareel. In a final, poignant
    conversation, Kareel (now Odan) reaffirms his love for Beverly, but Beverly, exhausted
    by the constant change and the uncertainty of future hosts, tearfully explains
    she cannot continue the relationship. Odan, in Kareel''s body, understands her
    human limitations, and they share a final, loving goodbye, acknowledging their
    bond while accepting the impossibility of their future. The Enterprise departs,
    leaving Beverly heartbroken but wiser.'
