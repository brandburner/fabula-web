- fabula_uuid: cand_evt_scene_90f6a5db07355cfe_01
  global_id: null
  title: Picard orders evasive retreat from hostile escort
  description: "\n  The shuttle, piloted by Riker with Odan aboard, approaches the\
    \ moon’s ionosphere when Worf detects an unidentified vessel emerging from the\
    \ moon’s limb. Picard orders a hail, but the ship—claiming to be a Beta moon escort—fails\
    \ to respond. When Picard demands a security clearance code, the silence deepens\
    \ his suspicion. The tension escalates as Worf reports the escort ship powering\
    \ its phaser banks, forcing Riker to reinforce shields and execute evasive maneuvers.\
    \ The abrupt shift from diplomatic caution to tactical retreat underscores the\
    \ crew’s vulnerability in unprotected space and the fragility of Odan’s mission.\
    \ Picard’s distrust of the escort mirrors the broader narrative’s theme of trust\
    \ as a liability in high-stakes environments, where even allies may pose threats.\
    \ The scene serves as a turning point, escalating the mission’s stakes from diplomatic\
    \ urgency to immediate survival.\n  "
