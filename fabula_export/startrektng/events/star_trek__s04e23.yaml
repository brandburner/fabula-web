    emotional_state: Controlled urgency with underlying tension—Picard is a man used
      to being obeyed, but he recognizes the gravity of Riker’s defiance and the unspoken
      stakes in his first officer’s voice.
    goals:
    - Retrieve the shuttle and its occupants safely, using all available Starfleet
      resources.
    - Maintain chain of command while allowing Riker the autonomy to act on his judgment
      in a crisis.
    what_happened: Picard, from the safety of the *Enterprise* bridge, issues rapid-fire
      orders to retrieve the shuttle, first via tractor beam, then via transporter
      when the hull’s integrity fails. His voice is authoritative but laced with concern,
      a captain balancing protocol with the lives of his crew. When Riker defies his
      order to beam aboard, Picard’s silence is palpable—his trust in his first officer
      is tested, but his faith in Riker’s judgment ultimately prevails. He does not
      yet know the full stakes (Odan’s symbiont nature), but his instinct to defer
      to Riker’s tactical call speaks to their deep professional bond.
