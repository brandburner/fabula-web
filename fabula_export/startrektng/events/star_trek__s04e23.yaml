  scene_sequence: 17
  sequence_in_scene: 35
  key_dialogue:
  - 'BEVERLY: All his vital functions are overworked. His immune system is under attack.
    I can only guess that he''s going through classic rejection syndrome.'
  - 'PICARD: Is there any treatment you can give him?'
  - 'BEVERLY: I can administer an immunosuppressant. It would help with the symptoms...
    but it wouldn''t correct the underlying cause. He''s carrying a foreign organism
    in his body.'
  - 'BEVERLY: I don''t know what to do... medical school didn''t exactly prepare me
    for a situation like this...'
  - 'PICARD: You''re doing all you can...'
  - 'BEVERLY: Thank you. I wish that were more comforting.'
  - 'BEVERLY: Don''t worry about me, Captain. I''m fine.'
  - 'RIKER: Let me touch you... just for a moment...'
