    description_of_involvement: Beverly sweeps the medical tricorder over Riker’s
      torso during the procedure, monitoring his heart rate, blood pressure, and EEG
      readings in real-time. The tricorder’s screen flashes critical warnings as Riker’s
      vitals destabilize, alerting Beverly and Ogawa to the urgency of the situation.
      Later, Beverly uses it to confirm Riker’s stabilization post-procedure, ensuring
      the symbiont’s successful assimilation. The tricorder is an indispensable tool,
      providing the data necessary for Beverly to make split-second decisions and
      adjustments during the high-stakes implantation.
