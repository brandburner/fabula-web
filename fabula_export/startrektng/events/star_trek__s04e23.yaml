  global_id: null
  title: Riker confronts his fractured identity
  description: In Data’s quarters, Riker—now hosting Odan’s Trill symbiont—joins a
    poker game with Worf, Geordi, and Data, where his effortless card-handling skills
    and unsettling familiarity with Riker’s mannerisms create an immediate tension.
    Data’s blunt question about the nature of the symbiosis forces Riker to articulate
    the psychological dissonance of sharing consciousness with his former self, revealing
    the fragility of his identity. The moment exposes the irreversible transformation
    he’s undergone, as well as the crew’s discomfort with his altered state. When
    Geordi’s concern for Riker’s eventual return triggers a realization of his own
    alienation, Riker abruptly leaves, underscoring the emotional and existential
    weight of his dual existence. The scene deepens the audience’s understanding of
    Trill symbiosis while highlighting the irreversible fracture in Riker’s sense
    of self and his strained relationships with the crew.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e23
  scene_sequence: 14
  sequence_in_scene: 28
  key_dialogue:
  - 'DATA: Ambassador, what is the precise nature of the symbiotic joining? Are you
    Odan? Or Commander Riker? Or a combination of both?'
  - 'RIKER: I wish I could give you an answer as simple as the question. Ordinarily,
    the host body has no personality. This time... is different somehow.'
  - 'RIKER: And something compelled me to come here tonight... though I didn''t consciously
    know what would await me. It is as though... Will Riker is here with me... I have
    never felt that with other hosts.'
