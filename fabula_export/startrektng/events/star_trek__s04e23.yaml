  title: Riker searches for Beverly in crisis
  description: 'Possessed by Odan’s desperate consciousness, Riker’s agitation escalates
    as he frantically queries the *Enterprise* computer for Beverly Crusher’s location.
    His pacing and abrupt collapse into a chair reveal the physical toll of Odan’s
    symbiont—exhaustion, disorientation, and a mounting sense of urgency. The scene
    underscores Odan’s critical need for Beverly’s medical expertise, not just for
    his survival but as a turning point in the looming diplomatic crisis. Riker’s
    fragmented state mirrors Odan’s own unraveling, while his inability to act decisively
    foreshadows the ethical dilemma Beverly will soon face: whether to prioritize
    Odan’s life or the fragile peace he was sent to broker. The tension here is visceral,
    rooted in the unspoken fear that time is running out—for Odan, for Riker, and
    for the mission itself.'
