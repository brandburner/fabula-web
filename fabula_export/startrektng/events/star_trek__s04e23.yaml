  title: Shuttle under fire forces evasive retreat
  description: "\n  The shuttle carrying Riker and Odan approaches the moon’s ionosphere\
    \ when Worf detects an unidentified vessel emerging from the moon’s limb. Picard\
    \ orders a hail, but the ship—claiming to be an escort from the Beta moon—fails\
    \ to respond. Tension escalates as Picard demands security clearance, only for\
    \ Worf to report the ship is powering its phaser banks. Riker immediately reinforces\
    \ shields and initiates evasive maneuvers, shifting the crew from diplomatic caution\
    \ to survival mode. The abrupt escalation underscores the fragility of Odan’s\
    \ mission and the high stakes of his symbiont secret, now a potential catalyst\
    \ for war. The scene forces the crew to abandon negotiation and prioritize escape,\
    \ marking a critical turning point in the mission’s trajectory.\n  "
