    PICARD: I have no doubt, however, that they will bolt if anything goes wrong in your discussions.
    RIKER: Then it's up to me to make sure nothing goes wrong.
    PICARD: ... for a moment... you sounded more like Will Riker.
  - 'RIKER: My life has been spent... trying to help others find solutions to insoluble
    problems. And now... I am confronted with one of my own for which there is truly
    no answer.'
