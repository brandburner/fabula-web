- fabula_uuid: act_0daebdb8ab2be5a4
  number: 3
  summary: Act Three delves into the complex emotional and psychological fallout of
    Odan's transfer into Riker's body. Riker, now inhabited by Odan, confidently asserts
    his diplomatic identity to Governor Leka, though his physical frailty begins to
    manifest. Beverly, tasked with his medical care, struggles to maintain professional
    detachment, deeply uncomfortable with the intimacy of her lover's essence residing
    in her friend's form. Their private conversation highlights Beverly's anguish
    over Odan's initial deception and her inability to reconcile her feelings for
    Odan with Riker's familiar appearance. Odan, in turn, expresses genuine puzzlement
    at her reaction, as his nature is simply "what I am," and reaffirms his unwavering
    love, offering to suppress it if it causes her pain. The Enterprise crew also
    grapples with the new reality, with Data directly questioning the nature of the
    symbiotic joining. Riker (Odan) reveals that, unlike previous hosts, Will Riker's
    personality is unexpectedly "here with me," adding another layer of complexity
    and unease for his friends. A poignant scene unfolds in Ten-Forward as Beverly
    confides in Troi, articulating her profound confusion and grief, questioning the
    nature of her love and her attraction to Odan in Riker's "brotherly" body. Troi,
    through a personal anecdote, encourages Beverly to embrace the love she feels,
    regardless of the vessel. The act culminates in Beverly's reluctant acceptance
    of her continued attraction to Odan, now in Riker's body, as she feels an undeniable
    "pull" between them, setting the stage for a deeper, more complicated romantic
    entanglement.
