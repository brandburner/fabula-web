- fabula_uuid: cand_evt_scene_295e13024835802a_01
  global_id: null
  title: Odan’s Sacrifice and Beverly’s Breaking Point
  description: In the Ready Room, Beverly Crusher examines Riker—now hosting Odan’s
    symbiont—only to discover his rapidly deteriorating condition. Odan, aware the
    medication is damaging Riker’s body, refuses further treatment, insisting he must
    endure the pain to complete the mediation. His decision to leave Riker’s body
    at the end of the day—regardless of whether a new host has arrived—stuns Beverly,
    forcing her to confront the ethical and emotional cost of his choice. The moment
    is charged with unspoken intimacy between them, witnessed by Picard, who later
    offers Beverly rare personal comfort as she grapples with the impossible dilemma
    of Odan’s sacrifice and her own feelings. The scene crystallizes the collision
    of duty, love, and survival, with Odan’s resolve pushing Beverly toward a breaking
    point where professionalism and emotion blur irreparably.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e23
  scene_sequence: 23
  sequence_in_scene: 45
  key_dialogue:
  - 'RIKER: No... no more.'
  - 'BEVERLY: But how can you function? Conduct the meeting?'
  - 'RIKER: I''ll manage.'
  - 'RIKER: Further... I will conduct the mediation today... but at the end of today,
    regardless of the outcome... I must be removed from Riker''s body. Even if the
    new host has not yet arrived.'
  - 'BEVERLY: But... you wouldn''t survive...'
  - 'RIKER: Riker will not survive unless I am removed. He has given enough...'
  - 'RIKER: Your word.'
  - 'PICARD: Beverly... I am your friend. I cannot imagine what you are going through...
    but it must be a kind of hell. I want you to know... I am here... to help you...
    in any way I can.'
