    emotional_state: A fragile mix of desperation and longing, masking deeper fear—fear
      of rejection, fear of death, and fear that Beverly will choose duty over him.
      His plea is both a test of her feelings and a last-ditch effort to anchor himself
      to her before his time in Riker’s body runs out.
    goals:
    - To break through Beverly’s professional resolve and force her to acknowledge
      her feelings for him, thereby securing her emotional investment in his survival.
    - To experience a moment of intimacy with her, regardless of the consequences,
      as a way to cope with his physical and emotional pain.
    what_happened: Lies on a bio-bed, groggy and in pain from rejection syndrome,
      but his voice is urgent and pleading as he takes Beverly’s wrist, holding it
      firmly. His physical weakness contrasts with the emotional intensity of his
      plea, his eyes locked on hers as he begs for intimacy—both as a desperate bid
      for comfort and a test of her resolve. He briefly sits up, forcing himself to
      release her, his actions a mix of vulnerability and restraint.
