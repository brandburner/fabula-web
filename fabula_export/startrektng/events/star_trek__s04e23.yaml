  global_id: null
  title: Riker volunteers as Odan’s host
  description: 'In the observation lounge, Beverly Crusher delivers the devastating
    news that Odan’s symbiont—still viable but dying—requires an immediate new host
    to survive. The revelation that Odan is a Trill symbiont, not a human, forces
    the senior staff to confront the urgency of the situation: without Odan, the fragile
    peace negotiations on Peliar Zel will collapse, triggering war. Data’s offer to
    serve as a temporary carrier is dismissed due to his android biology, leaving
    the crew with no viable options—until Riker, recognizing the stakes, volunteers
    to become Odan’s human host. Beverly warns of the untested risks, but Riker’s
    moral clarity and willingness to sacrifice his own body for the mission force
    Picard to grant him autonomy. The scene escalates from clinical crisis to a high-stakes
    moral dilemma, where duty, loyalty, and the blurred line between self and symbiont
    collide. Riker’s decision not only secures Odan’s survival but also deepens the
    narrative’s themes of identity, risk, and the cost of diplomacy.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e23
  scene_sequence: 11
  sequence_in_scene: 21
  key_dialogue:
  - 'BEVERLY: Odan''s host body died of the injuries just over an hour ago. But the
    symbiont being... Odan... is still alive.'
  - 'RIKER: Doctor... could a human host carry him?'
  - 'BEVERLY: I... believe so. From Odan''s description of the process... it should
    be possible. But -'
  - 'RIKER: Then I volunteer.'
  - 'PICARD: Commander... the risk is too great.'
  - 'RIKER: Weigh it against the prospect of war.'
