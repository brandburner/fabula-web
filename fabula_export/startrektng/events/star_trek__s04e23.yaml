- fabula_uuid: cand_evt_scene_bc3de72380ac9214_01
  global_id: null
  title: Odan collapses after peace talks success
  description: 'On the Enterprise bridge, Beverly Crusher’s anxiety peaks as she and
    Picard await news from Odan’s peace talks on Peliar Zel. When Odan (hosted by
    Riker) emerges, declaring the mission a success, he immediately collapses—revealing
    his critical condition as a Trill symbiont. Beverly’s medical scan confirms the
    emergency, forcing her to act: she must remove the symbiont from Riker’s failing
    body and transfer it to a new host before it dies. Picard swiftly orders Worf
    to secure the Trill ship’s arrival and sets a course to intercept it at warp nine,
    escalating the stakes. The scene pivots from diplomatic triumph to a medical crisis,
    exposing Beverly’s personal conflict—her professional oath to save Odan clashes
    with her emotional turmoil over his true nature and the ethical implications of
    his symbiosis. The urgency of the moment forces her into an impossible choice:
    proceed with the risky transfer or risk losing Odan and the fragile peace he brokered.
    The collapse also underscores the fragility of Odan’s existence as a Trill, blurring
    the lines between host and symbiont in Beverly’s mind and deepening her emotional
    investment in his survival.'
