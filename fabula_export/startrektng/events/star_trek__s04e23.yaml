  - character_uuid: ger_agent_f1a913dda0ad
    emotional_state: Determined yet conflicted—Riker is a man who prides himself on
      following orders, but here, he’s forced to trust his gut over protocol. His
      defiance is not reckless; it’s a calculated risk born of his understanding that
      Odan’s survival is the key to peace.
    goals:
    - Keep the shuttle airborne long enough to reach Peliar Zel, despite its critical
      damage.
    - Protect Odan’s life by any means necessary, even if it means defying a direct
      order from Picard.
    what_happened: Riker is the eye of the storm—physically wrestling with the shuttle’s
      failing controls while mentally weighing the impossible choices before him.
      His voice is steady but strained as he reports the damage, then makes the split-second
      decision to defy Picard’s order. The moment he chooses to manually pilot the
      shuttle, he becomes the sole arbiter of Odan’s fate, his hands gripping the
      controls with the weight of the mission’s future in his grasp. His alert to
      Beverly is not just a medical notification; it’s a warning of the emotional
      bomb about to detonate in sickbay.
