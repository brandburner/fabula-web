      of Peliar Zel. The door’s role is both practical and symbolic: it marks the
      transition from safety to risk, from control to vulnerability, and from the
      known to the unknown. Its closure behind the shuttle leaves a palpable silence,
      underscoring the crew’s collective awareness of the stakes.'
