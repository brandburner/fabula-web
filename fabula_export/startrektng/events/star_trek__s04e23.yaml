- fabula_uuid: cand_evt_scene_c32ea7ae78158f45_02
  global_id: null
  title: Riker risks life to save Odan
  description: 'In a high-stakes crisis, Riker’s shuttle is ambushed and critically
    damaged, forcing Picard to order a tractor beam retrieval. When Odan—weak and
    injured—pleads that transporter technology would kill him, Riker defies Picard’s
    direct order to beam aboard, instead choosing to manually pilot the failing shuttle
    while simultaneously alerting Dr. Crusher to Odan’s life-threatening condition.
    The moment exposes the deeper conflict between duty and moral urgency: Riker’s
    insubordination isn’t just about saving a diplomat but about preserving the fragile
    hope of peace. Odan’s desperate plea reveals his Trill symbiont nature for the
    first time, setting up Beverly’s impending ethical dilemma and the existential
    stakes of his survival for the mission. The tension escalates as Riker’s decision
    forces Picard to trust his first officer’s judgment, while Odan’s vulnerability
    foreshadows the broader crisis of his symbiont’s survival and the emotional fallout
    for Beverly.'
