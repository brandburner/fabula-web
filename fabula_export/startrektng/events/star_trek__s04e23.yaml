    the implantation takes place. Drugs might damage the symbiont.'
  - 'RIKER: No... just... strange sensations...'
  - 'BEVERLY: He''s going to start fibrillating. Two hundred milligrams metrazene...'
  - 'RIKER: Hello...'
  - 'RIKER: I am just fine... but you look tired, Doctor Beverly.'
  - 'RIKER: The man they knew as my father... the man who stands before them now...
    both are merely hosts. It is your task to help them understand.'
