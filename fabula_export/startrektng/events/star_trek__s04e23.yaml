  - 5
- fabula_uuid: act_5bac3cf726b80478
  number: 2
  summary: 'Following the shocking revelation of Odan''s true nature, Act Two focuses
    on the desperate measures to save the symbiont and the diplomatic mission. Odan
    explains the Trill''s joined species biology and urgently requests a new host,
    which is forty hours away, far exceeding his symbiont''s survival window in stasis.
    The Enterprise crew, including Picard, Riker, and Troi, grapples with this unprecedented
    biological and ethical dilemma, understanding Odan''s critical role in preventing
    war on Peliar Zel. Commander Riker, recognizing the dire stakes, bravely volunteers
    to become Odan''s temporary human host, despite Beverly''s warnings about the
    unknown risks and lack of precedent for a human host. Beverly, facing immense
    medical and ethical challenges, proceeds with the experimental implantation. The
    surgery is fraught with tension as Riker endures extreme pain and his body shows
    signs of rejection, pushing Beverly to her medical limits. Through quick thinking
    and intervention, Beverly stabilizes Riker, and the symbiont successfully assimilates.
    The act concludes with a powerful moment of transformation: Riker awakens, but
    it is Odan''s persona that emerges, evident in his familiar gesture of kissing
    Beverly''s wrist, leaving Beverly in a state of profound realization and emotional
    turmoil, as her lover now inhabits her friend''s body.'
