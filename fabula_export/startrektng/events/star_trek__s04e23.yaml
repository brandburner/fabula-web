  title: Odan’s symbiont secret exposed
  description: The shuttle carrying Ambassador Odan is ambushed by an unknown vessel,
    taking critical damage. Odan is thrown unconscious, and Riker struggles to maintain
    control as the shuttle begins to break apart. When Picard orders a tractor beam
    to tow the shuttle, Riker proposes beaming them aboard—only for Odan to weakly
    reveal that transporter technology would kill him, exposing his Trill symbiont
    nature for the first time. The revelation forces Riker to defy Picard’s orders
    and attempt a manual landing, while Beverly’s reaction in Sickbay foreshadows
    the emotional and ethical crisis to come. The moment transforms a tactical crisis
    into a diplomatic and personal reckoning, as Odan’s secret becomes a liability
    that could derail the mission and force the crew to choose between saving him
    and preserving the fragile peace negotiations on Peliar Zel.
