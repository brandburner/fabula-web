  title: Odan refuses transporter for shuttle
  description: In the observation lounge, Governor Leka briefs the Enterprise crew
    on the escalating conflict between Peliar Zel’s Alpha and Beta moons, framing
    it as an existential crisis requiring Odan’s immediate diplomatic intervention.
    Odan, seated beside Data, subtly acknowledges Beverly’s earlier medical attention
    with a fleeting glance, reinforcing their clandestine intimacy. When Picard suggests
    beaming Odan directly to the planet’s surface, Odan insists on taking a shuttle
    instead, citing personal discomfort with transporter technology—a decision that
    Leka warns is unsafe due to radical factions. Picard defers to Odan’s preference,
    but the exchange underscores Odan’s secrecy and his willingness to prioritize
    personal aversion over protocol, foreshadowing his later vulnerability. Meanwhile,
    Troi lingers, voicing her unease about Odan’s emotional fluctuations to Picard,
    who dismisses them as either seasonal or culturally typical of Trill. The scene
    ends with Troi’s lingering doubt, planting the seed for Odan’s eventual crisis.
