    emotional_state: Desperate and fearful, but with a quiet urgency that commands
      attention—his plea is not just for himself, but for the peace he’s fought to
      secure.
    goals:
    - Prevent Riker from transporting him, thereby saving his symbiont and the mission’s
      fragile hope for peace.
    - Protect his identity as a Trill, knowing the revelation could derail his diplomatic
      work.
    what_happened: Odan is violently thrown from his seat by the shuttle’s impact,
      striking his head against the bulkhead and losing consciousness briefly. He
      regains awareness just as Riker proposes beaming aboard, revealing his Trill
      symbiont’s fatal vulnerability to transporter technology. His voice is weak
      but urgent, his plea a desperate whisper that exposes his true nature for the
      first time. Physically, he is disoriented and injured, but his emotional state
      is one of raw fear—not just for his life, but for the mission’s collapse if
      his secret is ignored.
    observed_status: Odan is violently thrown from his seat by the shuttle’s impact,
