  title: Riker/Odan’s fractured identity exposed
  description: 'In Data’s quarters, Riker—now hosting the Trill symbiont Odan—joins
    Geordi, Worf, and Data for a poker game, but his presence unsettles the crew.
    Data’s blunt questioning forces Riker to articulate the unsettling duality of
    his consciousness, revealing that Odan’s symbiosis with Riker’s body is unlike
    any other Trill joining. Riker’s effortless card-dealing and uncanny knowledge
    of the game (despite never having played it) underscore the symbiont’s dominance
    over his host’s identity. When Geordi voices concern for Riker’s eventual return,
    the moment crystallizes the crew’s discomfort with Odan’s presence in their friend’s
    body. Recognizing their unease, Riker abruptly leaves, marking a turning point
    in his self-imposed isolation. The scene serves as a microcosm of the larger narrative
    tension: the irreversible erosion of Riker’s autonomy and the crew’s inability
    to reconcile their loyalty to him with Odan’s alien presence. The exit foreshadows
    Riker’s later emotional withdrawal, as he begins to see himself as a burden rather
    than a crewmate.'
