- fabula_uuid: cand_evt_scene_5ca3d336ff5a25c1_01
  global_id: null
  title: Riker Gains Peliar Trust Through Pain
  description: "\n  In the Observation Lounge, Commander Riker—physically deteriorating\
    \ but mentally sharp—exploits his encyclopedic knowledge of Peliar history and\
    \ personal details to disarm Kalin Trose and Lathal Bine, securing their fragile\
    \ trust. Despite Beverly Crusher’s medical warnings and his own worsening condition,\
    \ Riker leverages intimate knowledge of their pasts (including Trose’s suppressed\
    \ role in thwarting an assassination plot) to convince them of his legitimacy\
    \ as Odan. The scene culminates in Lathal Bine’s acceptance and Trose’s conditional\
    \ agreement, but Riker’s collapse immediately afterward reveals the cost of his\
    \ performance. The exchange underscores the mission’s urgency, Riker’s willingness\
    \ to sacrifice his health for diplomacy, and the Peliar delegation’s vulnerability\
    \ to emotional leverage—a dynamic that could backfire as tensions escalate. Beverly’s\
    \ helplessness in the moment foreshadows her later ethical crisis over Odan’s\
    \ symbiont transfer.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e23
  scene_sequence: 16
  sequence_in_scene: 33
  key_dialogue:
  - 'RIKER: Lathal Bine... It was your aunt who represented Beta thirty years ago...'
  - 'RIKER: Kalin Trose, you quelled a plot by radicals on your moon to assassinate
    the Beta delegation.'
