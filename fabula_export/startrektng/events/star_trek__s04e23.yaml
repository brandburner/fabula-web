      immediate action takes place aboard the *Enterprise*, the stakes of the symbiont
      implantation and Odan-in-Riker’s briefing are directly tied to the political
      and environmental tensions on Peliar Zel. The planet’s neutral inhabitants and
      the escalating conflict between Alpha and Beta moons create a high-pressure
      environment, where Odan’s mission—and by extension, the symbiont implantation—is
      a matter of life and death for countless people. The location’s symbolic significance
      lies in its representation of fragile neutrality and the urgent need for diplomacy
      to prevent catastrophe.
