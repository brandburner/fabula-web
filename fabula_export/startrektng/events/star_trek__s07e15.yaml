- fabula_uuid: cand_evt_scene_3c7b042f12727e56_01
  global_id: null
  title: Sito’s Bruised Farewell to Worf
  description: In the Enterprise’s shuttlebay, Ensign Sito Jaxa—disguised in Bajoran
    civilian clothes and bearing visible bruises—approaches Lieutenant Worf for a
    final exchange before her undercover mission. Her injuries, inflicted by Doctor
    Crusher to sell her cover as a mistreated prisoner, serve as a visceral reminder
    of the mission’s dangers. Sito expresses gratitude for Worf’s past confidence
    in her, a moment that underscores their mentor-mentee bond and the emotional weight
    of her departure. Worf’s restrained but proud farewell—‘Good luck’—hints at his
    conflicted pride and concern, while Sito’s reassurance (‘I’ll see you soon’) masks
    the unspoken risk of her sacrifice. Geordi’s confirmation of the shuttle’s readiness
    adds operational urgency, and the closing hangar doors symbolize the irreversible
    threshold between preparation and execution. The scene heightens tension by juxtaposing
    Sito’s vulnerability (her bruises, her youth) with the mission’s lethal stakes,
    framing her departure as a turning point where personal stakes collide with duty.
