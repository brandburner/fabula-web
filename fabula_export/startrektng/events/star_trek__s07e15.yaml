- fabula_uuid: act_628f528b6e0b5f58
  number: 2
  summary: The Enterprise races against time to retrieve the escape pod, whose occupant's
    life support is failing, necessitating a risky boost to transporter range. Chief
    Engineer La Forge and Ensign Taurik collaborate on this, with Taurik's attempt
    to identify the life-form being quickly curtailed by La Forge, underscoring the
    mission's classified nature and the priority of safe retrieval. Nurse Ogawa is
    discreetly dismissed from Sickbay as Doctor Crusher prepares for a secret patient,
    and Ensign Sito is posted outside, further highlighting the sensitive situation.
    Captain Picard then unexpectedly summons Sito, first asking about her piloting
    skills in the turbolift, then subjecting her to a harsh, unyielding interrogation
    in his Ready Room. He relentlessly scrutinizes her past involvement in the Nova
    Squadron incident at Starfleet Academy, accusing her of participating in a dangerous
    dare-devil stunt and a subsequent cover-up that impeded an official investigation
    into a cadet's death. Picard questions her fundamental character, stating she
    should have been expelled and expressing disbelief at her presence on his ship.
    His cutting remarks leave Sito deeply shaken, humiliated, and questioning her
    entire career path and worthiness as a Starfleet officer. The act concludes with
    Sito's dismissal, leaving her, and the audience, bewildered by Picard's uncharacteristic
    cruelty and the true, as yet unknown, purpose behind his intense scrutiny.
