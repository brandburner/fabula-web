    on a tenuous connection—his grandfather’s Canadian heritage—to initiate an awkward
    conversation. His attempt to bond over shared roots collapses when Riker reveals
    he’s Alaskan, not Canadian, leaving Lavelle flustered and exposed. The exchange
    underscores his insecurity and social clumsiness, contrasting sharply with Sito’s
    quiet confidence after Worf’s endorsement. Lavelle’s humiliation deepens his outsider
    status among the junior officers, while Riker’s dismissive indifference reinforces
    the power dynamic between them. The scene foreshadows Lavelle’s struggle to navigate
    the competitive environment of the *Enterprise*, where perceived favoritism and
    unspoken hierarchies dictate advancement. The moment also highlights Lavelle’s
    tendency to misread social cues, a flaw that will later complicate his relationships
    with peers and superiors.
