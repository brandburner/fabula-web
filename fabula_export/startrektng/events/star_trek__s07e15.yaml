  global_id: null
  title: Ogawa’s promotion and Powell’s distance
  description: In Beverly’s office, Ogawa initially deflects Beverly’s mention of
    her career evaluation, only for Beverly to reveal she’s recommending Ogawa for
    promotion to lieutenant. The news briefly lifts Ogawa’s spirits, but Beverly’s
    follow-up question about Ogawa’s relationship with Powell exposes her underlying
    anxiety. Ogawa confides that Powell has been emotionally distant—canceling dates
    and seeming preoccupied—while downplaying her concerns as overreaction. Beverly
    dismisses Ogawa’s worries as unfounded, attributing Powell’s behavior to his research
    work. Though Ogawa leaves reassured, the exchange underscores her unresolved tension
    between professional validation and personal insecurity, mirroring the crew’s
    broader struggle to reconcile duty and intimacy. The scene’s subtext reveals Ogawa’s
    fear of vulnerability, even as her promotion suggests her competence is recognized
    by the ship’s leadership.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e15
  scene_sequence: 7
  sequence_in_scene: 11
  key_dialogue:
  - 'BEVERLY: If you''re wondering about your evaluation, it couldn''t be better.'
  - 'OGAWA: Actually, I just wanted to tell you that Ensign Reilly''s condition is
    showing improvement... but thank you.'
  - 'BEVERLY: In fact, I''m recommending you for a promotion. How does Lieutenant
    Alyssa Ogawa sound to you?'
  - 'OGAWA: It sounds wonderful.'
  - 'BEVERLY: Alyssa... I''ve been meaning to ask you -- how are things going with
    you and Lieutenant Powell?'
  - 'OGAWA: Fine... I think.'
  - 'OGAWA: I just wonder... I''ve never met anyone like Andrew. It''s as though we''ve
    known each other forever... But... I know that in the beginning of a romance...
    it''s possible to be... a little blind.'
  - 'OGAWA: Well... cancelling a date like that... the way he''s been so distant lately...
    Doctor... do you think those could be warning signs? That he''s losing interest?'
  - 'BEVERLY: Alyssa... I think you may be overreacting.'
  - 'OGAWA: Maybe so...'
  - 'BEVERLY: If I felt as strongly about someone as you do about Andrew - he''d have
    to do a lot more than cancel one date before I became suspicious.'
