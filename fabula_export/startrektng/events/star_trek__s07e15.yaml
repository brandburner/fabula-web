    shifts focus from Beverly’s revelation about Powell’s infidelity to a pointed
    critique of Ensign Sito’s qualifications for the Ops position. His skepticism—voiced
    as a private aside to Worf—exposes a deeper tension: Riker’s reluctance to trust
    junior officers, particularly those with Sito’s complicated history at the Academy.
    Worf’s immediate, defensive rebuttal reveals his personal investment in her success,
    framing the debate as a test of mentorship and institutional trust. The exchange
    unfolds amid the poker game’s casual rhythm, but the subtext is sharp: Riker’s
    judgment isn’t just about Sito’s competence—it’s about his own lingering doubts
    about promoting officers with ‘baggage,’ while Worf’s reaction hints at his protective
    instincts toward her, complicating their professional dynamic. The moment serves
    as a microcosm of the crew’s broader struggles with leadership, loyalty, and the
    cost of second chances.'
