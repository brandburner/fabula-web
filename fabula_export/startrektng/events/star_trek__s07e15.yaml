  title: Riker’s Ops Assignment and Lavelle’s Disappointment
  description: 'During a tactical drill on the *Enterprise* bridge, Commander Riker
    critiques Ensign Sito’s performance—highlighting her need to refine her phaser-locking
    technique—while dismissing Ensign Lavelle’s hopes for recognition with a curt
    order to resume course. The moment crystallizes Riker’s lingering skepticism toward
    Lavelle, whose eagerness and insecurity are laid bare. When Picard abruptly alters
    the ship’s course to the Argaya system, Riker seizes the opportunity to promote
    Sito to Ops, bypassing Lavelle entirely. The decision exposes the fragile hierarchy
    of ambition on the bridge: Sito’s quiet competence earns her the post, while Lavelle’s
    frustration simmers beneath his professional demeanor. Their awkward but warm
    exchange—where Sito deflects his bitterness with humor—reveals their complex friendship,
    now strained by competition. The scene foreshadows how these dynamics will play
    out under pressure, particularly as Sito’s undercover mission looms. Riker’s blunt
    mentorship and Picard’s unannounced detour underscore the crew’s shifting priorities,
    while the vacant Ops station becomes a symbol of Lavelle’s unfulfilled aspirations
    and Sito’s rising status.'
