  title: Promotion rivalry fractures junior officers
  description: In Ten Forward, Commander Riker and Counselor Troi privately debate
    promotions for Lavelle and Sito, exposing their divergent assessments of the candidates'
    strengths. Riker leans toward Lavelle's technical experience, while Troi argues
    for Sito's leadership potential. Meanwhile, Lavelle and Sito—unaware they're competing
    for the same Ops position—attempt to enjoy an evening with friends, though Lavelle's
    anxiety betrays his desperation. The tension escalates when Ben, the waiter, overhears
    Riker and Troi's conversation and—unintentionally—reveals the promotion competition
    to Lavelle and Sito. The revelation fractures their friendship, injecting professional
    tension into their personal dynamic at a critical juncture. The scene underscores
    the crew's fragility, where ambition and insecurity collide, foreshadowing how
    this rivalry will test their unity during Sito's impending undercover mission.
    The moment also highlights Ben's role as an unwitting catalyst, his civilian perspective
    contrasting with the junior officers' Starfleet pressures. The fade-out leaves
    their fractured dynamic unresolved, heightening the stakes for their future interactions.
