  key_dialogue:
  - |-
    PICARD: How long have you served on the Enterprise?
    SITO: Seven months, sir.
    PICARD: I see... I understand you've been recommended for the Ops position. Do you think you're up to it?
    SITO: I do, sir.
    PICARD: I'm not so sure. Your record concerns me.
    SITO: Sir?
    PICARD: The incident you were involved in at the Academy.
  - |-
    PICARD: What concerns me more is that you participated in a cover-up that impeded an official investigation into the death of a cadet. What do you suppose that tells me about your character?
    SITO: Sir, if you had any idea what it was like after that incident—I didn’t have any friends, anyone to talk to. I had to take my flight test with the instructor because no one else would be my partner. In a lot of ways it would have been easier to just walk away. But I didn’t. I stuck with it. Doesn’t that say something about my character, too...?
    PICARD: I'm very sorry you didn’t enjoy your time at the Academy, Ensign. But as far as I'm concerned, you should have been expelled for what you did. Quite frankly, I don’t know how you made it onto my ship.
  - 'PICARD: You''re dismissed...'
