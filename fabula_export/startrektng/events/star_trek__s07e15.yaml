      \ precision. As Riker issues orders, Data’s fingers dance over the LCARS panels,\
      \ delivering updates like ‘The enemy vessel is firing’ with clinical detachment.\
      \ The console’s screens confirm the target’s destruction after Sito fires the\
      \ phasers, but the data also feeds into the performance readout that later exposes\
      \ Alpha shift’s seven percent slower response time. Data’s neutrality highlights\
      \ the human elements at play—Sito’s hesitation, Lavelle’s rivalry—making the\
      \ console a silent witness to the crew’s struggles. Its readouts are cold, unfeeling,\
      \ yet they carry the weight of institutional judgment.\n      "
