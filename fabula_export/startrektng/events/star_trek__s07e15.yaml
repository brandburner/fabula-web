  object_involvements:
  - object_uuid: ger_object_dd45fa3bd236
    description_of_involvement: The Ops console becomes the physical manifestation
      of Riker’s judgment and the shifting hierarchy between Sito and Lavelle. When
      Data vacates the station, it is not Lavelle but Sito who is assigned to fill
      the role—a decision that underscores Riker’s assessment of her potential. The
      console’s panels, flickering with readouts, serve as a neutral arbiter of competence,
      yet they also amplify the awkwardness between the two ensigns as they sit side
      by side. Sito’s fingers move tentatively over the controls, a stark contrast
      to Lavelle’s stiff posture at the helm. The console’s functional role as the
      nerve center of the bridge is secondary to its narrative role as a prize won
      and a source of resentment.
    status_before_event: Occupied by Data, its screens displaying real-time sensor
      and operational data during the drill. The station is a symbol of authority
      and trust, reserved for those deemed ready by the senior staff.
    status_after_event: Now manned by Sito, the console’s readouts shift to reflect
      her adjustments, but its true change is symbolic—it represents the fragile promotion
      of one ensign and the unspoken demotion of another.
    global_id: ger_object_dd45fa3bd236
  - object_uuid: ger_object_f616e012f065
    description_of_involvement: The Enterprise phasers are the focal point of Riker’s
      critique of Sito, symbolizing the precision and adaptability required of Starfleet
      officers. During the drill, Sito’s hesitation in locking the phasers becomes
      a metaphor for her broader struggle with confidence and decisiveness. Riker’s
      tactical advice—to let the locking relay 'float' until the fire order—transforms
      the phasers from a tool into a lesson in mental discipline. The phasers’ role
      in this event extends beyond their functional purpose; they embody the tension
      between rigid training and adaptive leadership, a theme that will resurface
      in Sito’s undercover mission.
    status_before_event: Fully operational and locked onto the simulated target during
      the drill, but Sito’s delay in firing creates a moment of vulnerability in the
      exercise.
    status_after_event: Standby mode as the drill concludes, but the phasers’ symbolic
      role as a test of Sito’s competence lingers, now tied to her assignment at Ops.
