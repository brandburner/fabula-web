- fabula_uuid: cand_evt_scene_218a5554a4b7c59a_01
  global_id: null
  title: Picard dismantles Sito’s self-worth
  description: 'In the sterile isolation of the ready room, Picard deliberately strips
    away Sito’s professional confidence by dredging up her Academy cover-up—a trauma
    she has spent years burying. His interrogation isn’t about her fitness for Ops;
    it’s a calculated test of her moral resilience, designed to expose whether she’ll
    crumble under pressure or rise to the challenge of her upcoming undercover mission.
    His cold, unrelenting skepticism forces her to relive the shame of her past while
    revealing his own unspoken belief that redemption must be earned through suffering.
    The scene pivots on his abrupt dismissal, leaving her shattered and him silently
    assessing whether she’s broken or merely bent—a distinction that will determine
    if she survives the mission ahead. The power dynamic is brutal: Picard holds all
    the leverage, and Sito’s only defense is raw, unfiltered vulnerability, which
    he treats as a liability rather than a strength. The exchange underscores the
    high stakes of her assignment: if she can’t withstand this psychological assault,
    she has no chance against the Cardassians.'
