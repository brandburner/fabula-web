  title: Worf tests Sito’s trust in authority
  description: After a martial arts class, Worf invites Sito to join his advanced
    group but first subjects her to the *gik’tal*—a fabricated blindfolded sparring
    test. When she removes the blindfold in frustration, Worf reveals the ritual was
    a lesson in questioning unfair judgment. The moment underscores Worf’s mentorship,
    Sito’s growing self-advocacy, and foreshadows her need to trust her instincts
    during the undercover mission. The exchange exposes Sito’s vulnerability and Worf’s
    strategic teaching methods, reinforcing their mentor-protégé dynamic while subtly
    challenging Starfleet’s hierarchical culture.
