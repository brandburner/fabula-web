  title: Lavelle’s insecurity surfaces in poker game
  description: During a casual poker game in Lavelle and Taurik’s quarters, Lavelle’s
    professional insecurities bubble to the surface. After Ben calls him out for overplaying
    his hand, Ogawa and Sito offer reassurance about Riker’s evaluation process, prompting
    Lavelle to admit he’s been telling himself Riker dislikes him as a psychological
    crutch. The confession reveals his self-sabotaging tendencies and fear of failure,
    while Taurik’s abrupt exit—justifying it with cold probability calculations—contrasts
    sharply with Lavelle’s emotional vulnerability. The scene underscores Lavelle’s
    struggle between ambition and self-doubt, while also highlighting the junior officers’
    differing coping mechanisms under pressure. Ogawa’s pragmatic advice and Sito’s
    quiet confidence serve as foils to Lavelle’s anxiety, deepening the contrast between
    their approaches to career advancement and leadership validation.
