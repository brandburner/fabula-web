  - object_uuid: ger_object_8a806e2329b6
    description_of_involvement: "\n        The Alpha Shift Tactical Drill Performance\
      \ Readout is the bridge’s digital judge, its LCARS screens glowing with the\
      \ cold, unfeeling truth of Alpha shift’s failure. When Riker studies the readout\
      \ post-drill, the numbers—seven percent slower than Gamma shift—are a public\
      \ rebuke, exposing Sito’s hesitation and the crew’s collective shortcoming.\
      \ The readout doesn’t lie; it doesn’t care about past scandals or personal struggles.\
      \ It is the institutional embodiment of Starfleet’s standards, and in this moment,\
      \ it passes judgment. The numbers become a focal point for the bridge crew,\
      \ a shared moment of disappointment that fractures their cohesion. For Sito,\
      \ the readout is a mirror, reflecting her deepest insecurities back at her.\n\
      \      "
