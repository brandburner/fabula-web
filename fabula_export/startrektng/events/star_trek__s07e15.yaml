- fabula_uuid: cand_evt_scene_16e82af1b5436248_01
  global_id: null
  title: Sito demands a fair chance from Picard
  description: 'In the Ready Room, Ensign Sito Jaxa confronts Captain Picard with
    a blunt ultimatum: either grant her a fair opportunity to prove herself on the
    *Enterprise* or approve her transfer. She frames her demand as a matter of professional
    respect, invoking her Starfleet Academy record and past achievements to underscore
    her qualifications. Picard, initially dismissive, reveals he deliberately assigned
    her to the *Enterprise* to test her character—not for the Ops position, but for
    a high-stakes undercover mission. His admission that he *asked for her* specifically
    to redeem herself catches Sito off guard, shifting the dynamic from confrontation
    to reluctant trust. The scene pivots from a career crisis to a high-stakes mission
    setup, exposing Picard’s strategic mentorship and Sito’s untested courage. The
    tension lingers in Sito’s stunned silence as she exits, leaving Picard’s motives—and
    the mission’s dangers—unspoken but palpable.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e15
  scene_sequence: 30
  sequence_in_scene: 42
  key_dialogue: &id021
  - 'SITO: All I''ve ever wanted is to make a career for myself in Starfleet. I can''t
    change what happened at the Academy. No one can. All I can do is work hard and
    try to earn the respect of the people I serve with. If you''re not going to give
    me that chance, then I respectfully request that you transfer me to another ship.'
  - 'PICARD: If you''re looking for a more lenient commander, I don''t think you''ll
    find one. [...] It took a lot of courage to come here and face me after what I
    said to you the other day. You see... I didn''t call you in here then to assess
    your qualifications for the Ops position. I was assessing you for a very important
    mission.'
  - 'PICARD: I wanted to make sure you got a fair chance to redeem yourself.'
