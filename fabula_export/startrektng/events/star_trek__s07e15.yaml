  title: Sito’s self-doubt exposed in poker game
  description: During a casual poker game in Taurik’s quarters, Sito’s professional
    insecurities surface when she admits Picard’s blunt assessment of her character
    has eroded her confidence. Taurik attempts to reassure her with logic, but his
    words fail to penetrate her self-doubt. Lavelle, sensing her vulnerability, intervenes
    with an impassioned defense of her abilities, momentarily lifting her spirits.
    The exchange reveals the depth of Sito’s internal struggle—her fear of being unworthy
    of promotion—and underscores how Picard’s judgment looms over her career. Lavelle’s
    own insecurity about his chances for promotion slips through, creating a fragile
    moment of mutual vulnerability between the two junior officers. This scene foreshadows
    Sito’s potential hesitation during her upcoming undercover mission, where self-trust
    will be critical to survival.
