  global_id: null
  title: Riker’s Judgment and Lavelle’s Resentment
  description: During a tactical drill on the *Enterprise* bridge, Commander Riker
    critiques Ensign Sito Jaxa’s hesitation in locking phasers, offering a tactical
    workaround that highlights her potential. His subsequent assignment of Sito to
    the Ops position—over Ensign Lavelle—exposes the fragile hierarchy of ambition
    among junior officers. Lavelle’s visible disappointment and Sito’s awkward attempt
    to console him reveal their competitive tension, while their shared humor briefly
    eases the friction. The scene underscores Riker’s role as a mentor who rewards
    competence over blind loyalty, setting up Lavelle’s lingering insecurity and Sito’s
    rising status, both of which will later clash during the undercover mission. The
