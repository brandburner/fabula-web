- fabula_uuid: act_4351a187b2aa94aa
  number: 4
  summary: 'Act Four marks a pivotal turning point for Ensign Sito, challenging her
    courage and revealing the true intent behind Picard''s earlier harshness. Worf
    subjects Sito to a ''gik''tal'' ritual, a blindfolded martial arts test. When
    she protests its unfairness, Worf reveals it was a test of courage and the ritual
    itself is fabricated, designed to teach her to stand up for herself against perceived
    injustice. Empowered, Sito confronts Picard in his Ready Room, respectfully requesting
    a transfer if he will not give her a fair chance, asserting her exemplary record
    and demanding to be judged on her current performance. Picard then reveals his
    true intentions: he was testing her for a highly dangerous, critical mission and
    had specifically requested her for the Enterprise to offer her a chance at redemption.
    Simultaneously, Nurse Ogawa shares joyous news with Beverly Crusher: Lieutenant
    Powell proposed marriage, completely blindsiding Beverly, who had previously observed
    Powell with another woman and feared he was losing interest. In the Observation
    Lounge, Sito learns the details of her mission: she is to pose as a Bajoran prisoner
    for Joret Dal, the Cardassian defector, to help him cross the heavily guarded
    Cardassian border. Her role is to make Joret appear as a bounty hunter, thereby
    facilitating his return with vital intelligence. Despite the immense danger, Sito
    volunteers, drawing on her Bajoran heritage and knowledge of Cardassian cruelty.
    The act concludes with Sito, her face bruised to simulate mistreatment, preparing
    to depart on the shuttle with Joret, receiving a final, proud farewell from Worf.'
