- fabula_uuid: act_588d31929d581119
  number: 5
  summary: Act Five brings the dangerous mission to its tragic climax and explores
    the aftermath among the lower decks crew. In the shuttle, Joret Dal explains his
    disillusionment with the Cardassian military and his desire for peace, revealing
    a shared humanity with Sito. As a Cardassian patrol approaches, Sito allows herself
    to be shackled, fully committing to her role as a prisoner. Back on the Enterprise,
    Lavelle expresses deep concern about Sito's disappearance and the damaged shuttle,
    struggling with the secrecy surrounding her mission. Ogawa and Taurik, bound by
    their security clearances, are forced to remain silent, causing frustration for
    Lavelle but ultimately reinforcing their Starfleet duty. On the Bridge, the mood
    is grim as the crew searches for Sito's escape pod. Riker confirms to Lavelle
    they are scanning for 'Bajoran life-signs,' confirming Lavelle's fears about his
    friend's involvement. Data detects debris consistent with a Federation escape
    pod inside Cardassian space, signaling a devastating outcome. Captain Picard delivers
    a somber ship-wide announcement, informing all personnel that Ensign Sito Jaxa
    has been lost in the line of duty, commending her courage and strength of character.
    The crew mourns her loss, particularly Lavelle, who receives his promotion but
    is burdened by guilt, believing Sito might have been chosen instead. His friends,
    Ogawa and Taurik, offer comfort and encouragement. The act concludes with Ben
    gently persuading Worf to join Sito's grieving friends at their table in Ten Forward,
    a poignant moment of shared loss and camaraderie that transcends rank, honoring
    Sito's sacrifice and reinforcing the bonds forged in service.
