      scenarios
    influence_mechanisms:
    - Through the chain of command (Picard’s orders, Worf’s mentorship, Geordi’s technical
      support)
    - By leveraging institutional resources (shuttlecraft, medical expertise, tactical
      planning)
    institutional_impact: The mission reflects Starfleet’s willingness to operate
      in moral gray areas for strategic gain, while also highlighting the personal
      cost borne by its officers.
    internal_dynamics: The tension between Starfleet’s ethical ideals and the pragmatic
      necessities of espionage, as well as the mentorship and trust that bind officers
      together.
    global_id: ger_organization_73a4b614bde7
  - organization_uuid: ger_organization_20548e3adf7b
    description_of_involvement: The Cardassian Military looms as the primary obstacle
      and target of the mission, its patrols and brutal border security forcing Sito
      and Joret into deception. The organization’s shift from defensive posturing
      to aggressive expansionism is implied in Joret’s defection, his knowledge of
      its corruption and glory-seeking Guls a critical asset. The mission’s success
      hinges on outmaneuvering Cardassian vigilance, with Sito’s cover as a mistreated
      prisoner a direct response to the organization’s reputation for cruelty. The
      Cardassian Military is not physically present in the scene but is the unseen
      antagonist, its presence felt in the stakes of the operation and the risks Sito
      faces.
    active_representation: Through the implied threat of Cardassian patrols and the
