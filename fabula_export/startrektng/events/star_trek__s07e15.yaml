    his subconscious motives, suggesting his competitive play stems from a need to
    prove himself to senior officers—a lingering insecurity from his early career.
    The confrontation forces Riker to confront his harshness toward Lavelle, revealing
    his own unspoken pressures as a commander. Meanwhile, Geordi and Worf’s peripheral
    game underscores the scene’s duality: camaraderie masking professional tension,
    as Riker’s tactical dominance over Geordi (who misreads his tells) highlights
    his strategic edge. The moment serves as a turning point for Riker’s self-awareness,
    while the poker game’s stakes—both literal and metaphorical—expose the fragility
    beneath his confident exterior.'
