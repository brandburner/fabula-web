  title: Worf’s endorsement fuels Lavelle’s envy
  description: In Ten Forward, Worf’s unexpected endorsement of Sito for a high-stakes
    Ops assignment catches her off guard, sparking quiet pride and reinforcing her
    confidence. Meanwhile, Lavelle—eavesdropping from a nearby table—misinterprets
    their conversation as a sign of Worf’s favoritism, his insecurity morphing into
    resentment. His failed attempt to bond with Riker over shared Canadian roots (only
    to learn Riker is Alaskan) further exposes his social awkwardness and career anxiety.
    The moment fractures the junior officers’ dynamic, with Lavelle’s envy simmering
    beneath the surface, setting the stage for future rivalry. Worf’s departure leaves
    Sito to join her peers, while Lavelle’s humiliation deepens his fixation on proving
    himself—at any cost.
