  title: Riker confirms Bajoran life-sign search
  description: On the Enterprise bridge, Commander Riker directs Ensign Lavelle to
    focus long-range scans on Bajoran life-signs, confirming for the first time that
    the missing escape pod contains Sito Jaxa. Lavelle’s visible shock reveals his
    personal investment in the search, while Riker’s measured but tense demeanor underscores
    the mission’s urgency. The revelation escalates the scene’s stakes, as Picard—having
    just entered—immediately authorizes a treaty-violating probe launch into Cardassian
    space, a desperate gamble to locate the pod. The crew’s collective tension mounts
    as they await the probe’s telemetry, with Worf’s grim determination and Picard’s
    calculated risk-taking framing the high-stakes gamble. This moment crystallizes
    the crew’s emotional and operational stakes, tying Sito’s fate to the Enterprise’s
    diplomatic and moral boundaries.
