  title: Geordi restricts Taurik’s transporter scans
  description: In Engineering, Geordi La Forge and Taurik work urgently to stabilize
    the transporter lock on Sito Jaxa’s escape pod, which is drifting too far for
    a clean beam-out. Taurik, driven by Vulcan curiosity, attempts to analyze the
    pod’s life signs, but Geordi sharply shuts down the inquiry, prioritizing mission
    security over scientific exploration. The tension between their approaches—Geordi’s
    adherence to Starfleet protocols and Taurik’s logical but unorthodox methods—escalates
    as Geordi adjusts the frequency spread to strengthen the confinement beam. When
    Taurik reports the beam is at 109% of normal, Geordi immediately contacts the
    transporter room to confirm the lock. The exchange underscores the broader conflict
    between institutional caution and individual initiative, mirroring the crew’s
    divided responses to the undercover operation’s risks. Geordi’s refusal to allow
    Taurik’s scans hints at deeper concerns about the mission’s secrecy, while Taurik’s
    compliance reveals his respect for the chain of command despite his intellectual
    frustration. The scene culminates in a technical compromise, setting the stage
    for the transporter room’s critical attempt to retrieve Sito’s pod.
