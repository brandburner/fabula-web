  global_id: null
  title: Troi negotiates Lwaxana’s rest through delegation
  description: In Sickbay, Beverly Crusher confirms Lwaxana’s physical health but
    diagnoses her psilosynine depletion—a direct result of overusing her Betazoid
    telepathy during Cairn negotiations. Lwaxana, still shaken by her earlier public
    outburst, initially resists Beverly’s order to rest, insisting the Cairn delegation
    cannot wait. Deanna Troi seizes the moment to assert control, offering to handle
    the Cairn verbally while enforcing a strict no-telepathy rule for Lwaxana. The
    exchange reveals Deanna’s growing confidence in her own authority, her strategic
    use of logic to outmaneuver her mother’s stubbornness, and Lwaxana’s reluctant
    concession—a rare moment of vulnerability that foreshadows her deeper psychological
    unraveling. The scene marks a turning point in their dynamic, with Deanna stepping
    into a leadership role that will later force her to confront Lwaxana’s repressed
    trauma.
