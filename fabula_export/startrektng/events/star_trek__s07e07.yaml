  key_dialogue:
  - 'PICARD: Counselor... Doctor Crusher feels your mother''s condition is deteriorating...
    her neural functions are getting weaker.'
  - 'TROI: If we can''t figure out what''s wrong with her -- I don''t think she will.'
  - 'PICARD: You said you''d reviewed her journals for the past five years. Perhaps
    we should go further back.'
  - 'TROI: My Mother has always been so diligent about her journal -- why would she
    have stopped making entries for so long?'
  - 'PICARD: She didn''t. The files were deleted. By your Mother... almost thirty
    years ago.'
  - 'TROI: I don''t understand any of this... Captain, I have to go back in to my
    mother''s mind. That''s the only way we''re ever going to get any answers.'
