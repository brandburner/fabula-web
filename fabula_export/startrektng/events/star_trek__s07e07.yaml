- fabula_uuid: act_20b71f62861d3938
  number: 3
  summary: Maques explains his attempt to help Lwaxana, revealing that her psyche
    has 'collapsed in on itself,' retreating into her meta-conscious mind. He offers
    to provide a telepathic 'bridge' that will allow Deanna to access the images and
    memories within Lwaxana's mind. Despite the inherent dangers and the uncertainty
    of success, Deanna, driven by the faint 'Help me...' she heard, convinces Captain
    Picard to allow her to proceed with this unprecedented mental intrusion. Upon
    entering Lwaxana's mind, Deanna finds herself in a dark, surreal Enterprise corridor,
    disorienting and echoing with the sound of dripping water. A menacing wolf growl
    and the recurring 'Help me...' voice establish a threatening and mysterious atmosphere.
    An illusion of Captain Picard appears, calmly ordering Deanna to sever the connection,
    but Deanna quickly discerns it as a construct of her mother's mind, speaking with
    Lwaxana's pained voice, attempting to push her away. Resisting this initial barrier,
    Deanna continues her quest, only to confront the physical manifestation of the
    menacing wolf, forcing her to flee. She then enters a room resembling her quarters
    but filled with child's toys and a serene view of Betazed, where she encounters
    an idealized manifestation of her deceased father. He attempts to emotionally
    manipulate her into staying, appealing to her love and longing, but Deanna, recognizing
    him as another protective barrier, makes the agonizing decision to leave him,
    prioritizing her mother's rescue. Returning to the dark corridor, she encounters
    a Betazoid child, whom she identifies as 'Hedril,' followed by Lwaxana herself,
    who angrily screams at Deanna to 'Get away!' This abrupt and forceful rejection
    from her mother's psyche immediately expels Deanna from Lwaxana's mind, leaving
    her with more questions than answers but confirming Lwaxana's deep-seated resistance
    to her help.
