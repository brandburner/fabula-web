  title: Deanna probes Hedril for clues
  description: In the Observation Lounge, Deanna Troi interviews Hedril—a young Cairn
    girl—about her connection to Lwaxana’s coma, seeking answers to why her mother’s
    mind has constructed this child as a focal point of trauma. Hedril’s admission
    that she ‘makes Lwaxana sad’ triggers Deanna’s realization that the girl may symbolize
    a repressed emotional wound. After ruling out physical causes with Beverly, Deanna
    decides to investigate Lwaxana’s private logs, suspecting they hold the key to
    unlocking the trauma. Data’s psychological insight—that dream figures often represent
    aspects of the dreamer—further solidifies the theory that Hedril embodies Lwaxana’s
    vulnerability. The scene pivots from medical inquiry to emotional excavation,
    with Deanna’s frustration mounting as she grapples with the idea that her mother’s
    mind is actively shielding a hidden truth, possibly tied to her own unresolved
    past with Kestra. The moment marks a shift from external investigation to internal
    confrontation, setting up Deanna’s imminent descent into Lwaxana’s fractured psyche.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e07
  scene_sequence: 18
  sequence_in_scene: 34
  key_dialogue:
  - 'TROI: I asked your Father to bring you here because I wanted to talk to you about
    something. You know that Lwaxana is sick, don''t you?'
  - 'HEDRIL: Yes. Is it my fault?'
  - 'HEDRIL: I make her sad.'
  - 'TROI: Why do you say that?'
  - 'HEDRIL: Because it''s true.'
  - 'TROI: I just don''t understand how she fits in to all this...'
  - 'BEVERLY: I still haven''t been able to find a physiological cause for what''s
    happened to your Mother. That makes me think that Maques was right, that her condition
    was precipitated by some traumatic event.'
  - 'DATA: Perhaps we are being too literal. In my recent study of dream analysis,
    I learned that people who appear in a dream can sometimes represent different
    aspects of the person who is dreaming.'
  - 'TROI: That''s right... a child might represent vulnerability. Maybe Hedril depicts
    some fragile part of my mother.'
