  key_dialogue: &id025
  - 'LWAXANA: Why did I look away... why wasn''t I paying attention... ?'
  - 'TROI: It was a terrible tragedy -- the worst thing that can happen to any parent...
    I know you feel responsible... but it was an accident... And what you''re doing
    isn''t fair to Kestra... I saw a little girl who was sweet and happy... she must
    have brought a great deal of joy into your lives... Then isn''t it better to remember
    her like that?'
