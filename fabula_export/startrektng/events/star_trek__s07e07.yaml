- fabula_uuid: act_430d888d45034826
  number: 5
  summary: 'Deanna re-enters Lwaxana''s mind, now armed with the knowledge of the
    deleted journal entries and determined to uncover the truth. Inside, ''Hedril,''
    now clearly identified as a Betazoid child and not Cairn, reappears with the menacing
    wolf. ''Hedril'' poignantly questions her own identity, asking ''Who is Hedril?''
    before fleeing with the wolf, leading Deanna through a void into a dark, eerie
    arboretum. The persistent dripping sound is traced to the pond, where ''Hedril''s''
    reflection briefly appears before being obscured. Deanna confronts Lwaxana, who
    stands guard over this final, most painful secret. Under Deanna''s persistent
    questioning about the deleted journals and ''Hedril,'' Lwaxana''s emotional defenses
    finally crumble. She is forced to reveal a long-repressed memory: a family picnic
    at Lake El''nar with her husband, baby Deanna, and another daughter, Kestra, who
    was playing with a dog. The memory shifts to the tragic moment Kestra, chasing
    the dog, drowned in the strong current while Lwaxana was momentarily distracted
    with baby Deanna. Overwhelmed by unbearable guilt and grief, Lwaxana had repressed
    all memory of Kestra and meticulously deleted her from her journals. Deanna guides
    her mother through this agonizing revelation, urging her to forgive herself and
    to remember Kestra''s life with joy rather than perpetual grief and self-blame.
    A manifestation of Kestra appears, and Lwaxana, finally able to express her profound
    sorrow and seek forgiveness, embraces her lost daughter, allowing Kestra''s image
    to fade peacefully. Lwaxana awakens from her coma, healed and reconciled with
    her past. Deanna gives her mother a cherished picture of Kestra and baby Deanna,
    solidifying the re-embraced memory and allowing Lwaxana to celebrate Kestra''s
    life, ending the long-held secret and fostering a new, deeper understanding between
    mother and daughter.'
