  - character_uuid: ger_agent_b8f6a0e932a5
    emotional_state: "\n        The wolf embodies the raw, untamed nature of Lwaxana’s\
      \ repressed grief—feral, protective, and aggressive. It does not act out of\
      \ malice but as an instinctive force, driven to guard the fragments of memory\
