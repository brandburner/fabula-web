- fabula_uuid: cand_evt_scene_bd6b61f4c6f25b51_01
  global_id: null
  title: Deanna hears a plea in Lwaxana’s mind
  description: 'Deanna Troi, alone in Sickbay with her comatose mother, attempts a
    desperate telepathic intrusion to reach Lwaxana’s consciousness. After repeated
    pleas—*Mother... can you hear me...? Please come back to me*—she receives a faint,
    distorted response: *Help me...*, a voice so fragmented it’s impossible to identify.
    The exchange is brief, the connection unstable, and Deanna’s anguish deepens as
    the plea cuts off abruptly. Her frustration and fear escalate when she later awakens
    to find Maques, the Cairn diplomat, standing over Lwaxana’s bed, his telepathic
    presence radiating an unsettling intensity. The scene marks a critical shift:
    the crisis is no longer purely medical but psychically invasive, and Deanna’s
    resolve to uncover the truth is now intertwined with suspicion of Maques’ motives.
    The moment also foreshadows the deeper trauma lurking in Lwaxana’s mind, as the
    plea suggests a part of her is trapped, begging for rescue from something unseen.'
