  key_dialogue: &id017
  - 'TROI: Why did you delete parts of your journal? Did something happen to you—something
    you don’t want me to know about?'
  - 'LWAXANA: No, I would never let anything happen to you... never. (anguished) I
    can’t...'
  - 'TROI: Was it here, at El’nar? Tell me; whatever it is, we can face it together.'
  - 'LWAXANA: The dog got away... she ran after him... we didn’t notice... until it
    was too late...'
