- fabula_uuid: cand_evt_scene_0b5f670760131cb5_03
  global_id: null
  title: Memory fractures under repressed trauma
  description: 'Deanna Troi pursues the disembodied voice of ''Hedril''—later revealed
    as her long-dead sister Kestra—through a shifting arboreum landscape, where a
    seemingly idyllic family picnic memory curdles into darkness. The scene begins
    in a murky, dripping version of the arboretum, where Troi hears Kestra’s plea
    for help and glimpses her reflection in the pond before a thrown stone disrupts
    the image. She follows the figure into a brighter, sunlit picnic scene, where
    Lwaxana, Deanna’s father, and a baby Deanna interact with Kestra. The memory’s
    warmth is undercut by tension: Lwaxana’s refusal to let Kestra play near the water,
    the baby’s crying, and the dog’s growl, which morphs into a wolf’s snarl—a sonic
    distortion that signals the repressed violence lurking beneath the surface. When
    Lwaxana finally acknowledges Kestra by name, Deanna realizes her sister’s existence
    was erased from her own memory. The picnic abruptly darkens again as Lwaxana’s
    trauma resurfaces: the dog escapes, Kestra chases it, and Lwaxana’s anguished
    confession—''The dog got away... she ran after him... we didn’t notice... until
    it was too late''—reveals the drowning that shattered her family. This moment
    is a narrative turning point, where Deanna’s investigation into her mother’s coma
    forces Lwaxana to confront the repressed truth of Kestra’s death, while also exposing
    the depth of her own psychological fracture. The event serves as both a thematic
    parallel to Deanna’s own unresolved grief and a structural bridge, linking Lwaxana’s
    past trauma to her present comatose state and Deanna’s desperate mission to save
    her.'
