      the starscape of Deanna’s Enterprise quarters. It bathes the room in soft, golden
      light, creating an atmosphere of tranquility that contrasts with the psychological
      turmoil Deanna experiences. The landscape serves as a metaphor for the illusion’s
      false promise of safety and stability, luring Deanna into a sense of security
      that masks the danger of lingering. Her glance at the view is fleeting but loaded,
      as she recognizes it as part of the trap—beautiful, but not real.
    status_before_event: Unobstructed and vibrant, filling the windows with a peaceful,
      nostalgic glow that enhances the room’s childlike sanctuary.
    status_after_event: Unchanged in appearance, but its role as a manipulative element
      is exposed as Deanna turns away from it to confront the illusion.
    global_id: ger_object_d3bbcf9333a1
  - object_uuid: ger_object_00bcfdac5363
    description_of_involvement: 'The doll house, a miniature replica of a Betazoid
      family home, sits prominently in the room, serving as a symbolic anchor to Deanna’s
      childhood. She examines it closely, her fingers hovering over its tiny furniture,
