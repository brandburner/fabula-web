  title: Deanna forces Lwaxana to face Kestra’s death
  description: 'In the Arboretum’s shifting light, Deanna Troi confronts her mother
    Lwaxana at the pond’s edge—a site of both memory and trauma—where Lwaxana, still
    numb from reliving Kestra’s drowning, clings to guilt. Deanna disrupts her mother’s
    self-flagellation by reframing the tragedy: she insists Lwaxana remember Kestra’s
    joyful life, not just her death, and challenges her to release the repressed pain
    that has festered for decades. When Lwaxana hesitates, Deanna pushes further,
    urging her to speak directly to Kestra’s spirit. The moment crystallizes when
    Kestra materializes—a manifestation of Lwaxana’s subconscious—offering forgiveness.
    This confrontation marks a turning point: Deanna risks destabilizing her own emotional
    equilibrium to force Lwaxana into the raw, unfiltered grief she’s avoided, while
    Lwaxana’s resistance crumbles under the weight of her daughter’s love and the
    specter of the child she failed to protect. The scene pivots from passive witnessing
    to active intervention, as Deanna’s empathy becomes the catalyst for Lwaxana’s
    repressed pain to surface, setting the stage for her eventual absolution and the
    dissolution of the coma’s grip on her mind.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e07
  scene_sequence: 23
  sequence_in_scene: 48
  key_dialogue: &id027
  - 'LWAXANA: Why did I look away... why wasn’t I paying attention... ?'
  - 'TROI: It was a terrible tragedy -- the worst thing that can happen to any parent...
    I know you feel responsible... but it was an accident... And what you''re doing
    isn''t fair to Kestra... I saw a little girl who was sweet and happy... she must
    have brought a great deal of joy into your lives... Then isn''t it better to remember
    her like that?'
  - 'TROI: You have to forgive yourself, Mother... you have to let go... Hiding it
    didn’t make it go away. It''s still there, hurting you... and it will stay there
    unless you can forgive yourself and move on.'
  - 'TROI: Kestra was here, a few moments ago. Talk to her... Do it. Tell her how
    you feel. I''m here with you. I''ll help you.'
  - 'LWAXANA: Oh, Kestra... my precious one... I''m so sorry...'
