  global_id: null
  title: Deanna uncovers Lwaxana’s erased past
  description: Deanna Troi frantically searches her mother’s personal belongings in
    her quarters, her emotional distress deepening as she finds no clues to explain
    Lwaxana’s deteriorating condition. She discovers a small curl of hair and a photograph
    of her father, both triggering painful memories of loss. Picard arrives with grim
    news from Sickbay—Crusher confirms Lwaxana’s neural functions are weakening. When
    Deanna admits she’s found nothing in her mother’s journals or medical records,
    Picard suggests reviewing older entries. They uncover a seven-year gap in Lwaxana’s
    journals, later revealed to be deliberately deleted by Lwaxana herself. This discovery
    forces Deanna to confront the possibility of a repressed trauma, prompting her
    to insist on re-entering her mother’s mind to uncover the truth. The event escalates
    the stakes, shifting the investigation from external clues to the dangerous, uncharted
    territory of Lwaxana’s repressed memories, where Deanna risks her own stability
    to save her mother.
