  title: Lwaxana ambushes Deanna about marriage
  description: In a tense corridor confrontation, Lwaxana Troi intercepts Deanna mid-stride,
    weaponizing emotional guilt to push her toward marriage with Maques. She dismisses
    Deanna’s embarrassment as trivial, framing Maques as a lonely widower in need
    of a partner—an implicit critique of Deanna’s single status. The mention of Deanna’s
    deceased father as a hypothetical ally escalates the pressure, exposing Lwaxana’s
    manipulative tactics and Deanna’s simmering resentment. The exchange occurs in
    a public Turbolift, forcing Deanna into a constrained, awkward silence that underscores
    their fractured dynamic. This moment deepens the unresolved conflict between maternal
    control and Deanna’s autonomy, while foreshadowing Lwaxana’s later coma-induced
    vulnerability—a state where her repressed trauma will finally surface, forcing
    Deanna to confront the roots of their dysfunction.
