      to the illusion’s manipulations.
    global_id: ger_object_00bcfdac5363
  - object_uuid: ger_object_ed97b85d7aa1
    description_of_involvement: The high-tech toys scattered across the floor are
      anachronistic elements in the otherwise nostalgic room, designed to disorient
      Deanna and reinforce the illusion’s artificiality. She glances at them briefly,
      her brow furrowing as she notes their advanced design—clashing with the childhood
      memory the illusion seeks to evoke. Their presence serves as a subtle clue that
      the scene is constructed, not real, though their primary function is to deepen
      the room’s deceptive comfort. The toys symbolize the illusion’s attempt to blend
      Deanna’s past and present in a way that obscures the truth.
    status_before_event: Scattered across the floor, glowing faintly with futuristic
      energy, arranged to appear as if a child had left them behind.
    status_after_event: Physically unchanged, but their role as a red herring is revealed
      as Deanna focuses instead on the illusion’s emotional appeals.
    global_id: ger_object_ed97b85d7aa1
  - object_uuid: ger_object_04d3b91a2edd
    description_of_involvement: The old-style Starfleet uniform with lieutenant’s
      pips worn by the illusion of Mr. Troi is a meticulously detailed costume, evoking
      Deanna’s earliest memories of her father. Its authenticity—down to the rank
      insignia—stirs her emotions, making the illusion feel tangible and real. The
      uniform symbolizes her father’s legacy in Starfleet, a source of pride and protection
      that the illusion exploits to deepen its emotional hold. When Deanna turns away,
      the uniform’s presence lingers as a ghost of the past, reinforcing the bittersweet
      nature of her choice to leave.
    status_before_event: Perfectly fitted to the illusion, crisp and immaculate, with
      lieutenant’s pips gleaming under the soft light.
    status_after_event: Physically unchanged, but its symbolic weight as a relic of
      Deanna’s past is heightened by her refusal to stay.
    global_id: ger_object_04d3b91a2edd
  location_involvements:
  - location_uuid: ger_location_7df9e12ac57c
    description_of_involvement: 'Troi’s quarters, fused with an illusionary Betazoid
