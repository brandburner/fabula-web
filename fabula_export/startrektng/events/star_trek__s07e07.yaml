  title: Lwaxana’s telepathic intrusion triggers Deanna’s rejection
  description: 'In the turbolift, Lwaxana Troi—still reeling from her earlier emotional
    outburst—attempts to reassert control over Deanna through a telepathic jab, accusing
    her of defiance. Deanna’s sharp verbal rebuke (''Stop it, mother'') cuts through
    Lwaxana’s unspoken criticism, exposing the raw tension between them. The moment
    fractures Lwaxana’s composure: she covers her face, visibly shaken, and Deanna—caught
    between frustration and concern—leads her out with reluctant tenderness. The silence
    and physical vulnerability reveal Lwaxana’s uncharacteristic fragility, hinting
    at the trauma beneath her usual performative strength. This exchange underscores
    their fractured bond and foreshadows Deanna’s impending confrontation with her
    mother’s repressed past.'
