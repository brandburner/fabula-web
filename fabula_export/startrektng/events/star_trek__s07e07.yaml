    emotional_state: A woman drowning in guilt, her emotional state oscillates between
      desperate denial and crushing despair. She is trapped between the need to protect
      Deanna from the truth and the inescapable weight of her own failure as a mother.
      Her anguish is palpable, a storm of regret and self-loathing that she can no
      longer contain.
    goals:
    - To suppress the memory of Kestra’s drowning at all costs, believing it will
      destroy her relationship with Deanna.
    - To avoid confronting her own role in the tragedy, fearing it will shatter her
      self-image as a nurturing mother.
    what_happened: Lwaxana stands frozen near the arboretum pond, her face a mask
      of anguish as she oscillates between the present and a fragmented picnic memory.
      She physically recoils from Deanna’s questions, her hands trembling as she clutches
      at her bag, searching for a teething ring—a futile attempt to distract from
      the unfolding trauma. Her voice cracks with raw pain as she admits the truth
      about Kestra’s drowning, her body slumping in exhaustion as the repressed memory
      finally surfaces.
