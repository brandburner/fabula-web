  title: Deanna forces Lwaxana to confront Kestra’s death
  description: In the Arboretum’s pond, Deanna Troi interrupts her mother’s ritualized
    grief over Kestra’s drowning—a trauma Lwaxana has buried for years—by confronting
    her with the raw, unprocessed guilt she has carried. The scene pivots from passive
    witnessing to active intervention as Deanna’s empathy becomes a catalyst for Lwaxana’s
    repressed pain to surface. Deanna guides Lwaxana through a cathartic confrontation
    with Kestra’s ghostly manifestation, urging her to shift from self-blame to remembering
    her daughter’s joy. The Arboretum’s pond, a site of both memory and present tension,
    becomes the battleground for this emotional reckoning, where Deanna’s love and
    frustration collide with Lwaxana’s self-destructive blame. The moment marks a
    turning point in their relationship, as Lwaxana begins to release her guilt and
    Deanna risks her own stability to break through her mother’s emotional armor.
    The resolution—Kestra’s ghostly embrace and disappearance—symbolizes the first
    step toward healing, though the cost of this confrontation lingers in the air
    between them.
