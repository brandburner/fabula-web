  title: Deanna forces Lwaxana to confront Kestra’s death
  description: "\n  In the Arboretum’s eerie, shifting landscape—a space oscillating\
    \ between idyllic memory and traumatic distortion—Deanna Troi confronts her mother,\
    \ Lwaxana, as the latter clings to repressed grief. The scene opens with Lwaxana\
    \ standing guard near the pond, her anguish palpable, while Deanna, guided by\
    \ Hedril’s spectral plea for help, presses her to acknowledge the buried truth.\
    \ Lwaxana resists, her evasions revealing the depth of her denial: she deletes\
    \ journal entries, refuses to name Hedril, and recoils from Deanna’s questions\
    \ about El’nar. The tension escalates when Deanna deduces the existence of a sister,\
    \ Kestra, through Lwaxana’s slip—calling Hedril by that name. The memory then\
    \ unfolds: a family picnic where Kestra, a precocious child, begs to play by the\
    \ water. Lwaxana’s panic mounts as the dog’s playful growl morphs into a wolf’s\
    \ snarl, foreshadowing the tragedy. When Lwaxana collapses into the memory, Deanna\
    \ witnesses the moment of loss: Kestra chasing the dog, her parents distracted\
    \ by the teething baby, the unnoticed slip into the pond. Lwaxana’s anguished\
    \ confession—‘The dog got away... she ran after him... we didn’t notice... until\
    \ it was too late’—marks the breaking point. Deanna’s insistence that Lwaxana\
    \ *must* remember becomes the catalyst for the repressed trauma to surface, setting\
    \ the stage for its full revelation and the potential to unlock Lwaxana’s coma.\
    \ The Arboretum’s duality—sunlit memory vs. shadowed truth—mirrors Lwaxana’s fractured\
    \ psyche, while Deanna’s role shifts from observer to active healer, risking her\
    \ own emotional stability to force her mother toward catharsis.\n  "
