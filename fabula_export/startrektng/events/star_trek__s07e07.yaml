  key_dialogue:
  - |-
    DATA: Mrs. Troi, are you all right?
    LWAXANA: Yes... yes... just a little tired. This constant telepathy with the Cairn... I'm fine, really.
  - |-
    LWAXANA: (to Worf) Aren't you going to mingle, Mister Woof?
    WORF: I do not care for telepaths. They make me... uneasy.
    LWAXANA: Don't worry -- The Cairn couldn't read your thoughts even if they wanted to. Your brain isn't sophisticated enough.
  - |-
    MAQUES: Your Mother has... told me... of your need.
    TROI: Need?
    MAQUES: A moment... Husband. You need a husband.
