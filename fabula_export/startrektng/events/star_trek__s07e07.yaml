  key_dialogue: &id001
  - 'LWAXANA: Good morning... So what did you think of Maques?'
  - 'TROI: Why did you do that, Mother? You embarrassed both of us.'
  - 'LWAXANA: He''s really very sweet. And lonely. Poor man, a widower, raising a
    child alone.'
  - 'TROI: Please, Mother... don''t start.'
  - 'LWAXANA: I just think it''s time for you to settle down. If your Father were
    still alive I''m sure he''d say the same thing.'
