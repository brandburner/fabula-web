  key_dialogue:
  - 'PICARD: Counselor... I''ve just been in Sickbay. Doctor Crusher feels your mother''s
    condition is deteriorating... her neural functions are getting weaker.'
  - 'TROI: If we can''t figure out what''s wrong with her -- I don''t think she will.
    But I don''t know what to do. I''ve talked with Mister Homn, who''s known her
    for years. I''ve checked her medical records. I''ve made enquiries to the government
    on Betazed and I''ve contacted several of her close friends. If she suffered some
    kind of psychic trauma, there''s just no evidence of it.'
  - 'PICARD: This is odd... there''s a seven year gap. She didn''t. The files were
    deleted. By your Mother... almost thirty years ago.'
  - 'TROI: I don''t understand any of this... Captain, I have to go back in to my
    mother''s mind. That''s the only way we''re ever going to get any answers.'
