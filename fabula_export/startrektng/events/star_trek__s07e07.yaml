- fabula_uuid: act_1839624ab61fd9dc
  number: 2
  summary: Lwaxana remains unconscious in Sickbay, unresponsive to all medical intervention.
    Dr. Crusher finds no physiological cause for her coma, but notes unusually high
    activity in Lwaxana's paracortex, the Betazoid telepathic lobe, strongly suggesting
    a telepathic origin for her critical condition. Captain Picard and Deanna question
    Maques, who struggles to articulate his observations about Lwaxana's mind. However,
    through a brief, intense telepathic burst directed at Deanna, he manages to convey
    the presence of 'bad thoughts' and the persistent 'dark place' within Lwaxana.
    Deanna interprets this 'dark place' as her mother's meta-conscious, a Betazoid
    psychological defense mechanism, possibly overwhelmed by a severe psychic trauma.
    Despite the lack of an identified traumatic event, Deanna remains hopeful for
    a physiological diagnosis from Beverly's ongoing sub-neural scan. Driven by a
    deep need to help her mother, Deanna decides to stay with Lwaxana and attempts
    telepathic contact herself. During this attempt, she hears a faint, desperate
    voice calling 'Help me...' from within Lwaxana's mind, confirming that a part
    of her mother is seeking assistance. Hours later, Maques is discovered by Troi
    in Sickbay, attempting to telepathically contact Lwaxana. His intense focus and
    the accompanying rush of white noise wake Deanna and alarm the medical staff,
    highlighting the urgency and mystery surrounding Lwaxana's internal struggle.
