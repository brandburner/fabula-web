- fabula_uuid: cand_evt_scene_602afa543a97b388_03
  global_id: null
  title: Deanna rejects her father’s illusion
  description: 'Deanna Troi confronts a spectral manifestation of her deceased father—a
    comforting illusion crafted by Lwaxana’s subconscious to shield her from the repressed
    trauma at the heart of her coma. The illusion lures Deanna with nostalgia, singing
    a lullaby from her childhood and evoking shared memories of warmth and safety.
    Though emotionally devastating, Deanna resists the temptation, recognizing the
    illusion as a psychological barrier. She refuses to abandon her mission to save
    Lwaxana, even as the illusion warns her that her mother ‘doesn’t want to see you.’
    The moment becomes a turning point: Deanna’s resolve to prioritize her mother’s
    survival over her own emotional refuge propels her forward into the darker recesses
    of Lwaxana’s mind, where the truth of Kestra’s death awaits. The scene underscores
    Deanna’s growth—her willingness to endure pain for the sake of another—and foreshadows
