  title: Maques forces telepathic breach on Troi
  description: "\n  Maques, frustrated by his inability to verbally articulate the\
    \ danger lurking in Lwaxana’s mind, abruptly initiates an uninvited telepathic\
    \ link with Deanna Troi. The connection manifests as a violent, disorienting white\
    \ noise that assaults Troi’s senses, leaving her physically recoiling and emotionally\
    \ destabilized. Picard, witnessing Troi’s distress but unable to perceive the\
    \ telepathic intrusion, intervenes physically, demanding Maques stop. The breach\
    \ succeeds in transmitting fragmented but critical insights about Lwaxana’s repressed\
    \ trauma—a 'dark place' within her psyche—though the method leaves Troi visibly\
    \ shaken. The scene marks a turning point: the abstract urgency of Lwaxana’s coma\
    \ becomes visceral, tied to the immediate cost of Troi’s own stability, while\
    \ Maques’ desperate telepathic gambit underscores the stakes of uncovering the\
    \ truth.\n  "
