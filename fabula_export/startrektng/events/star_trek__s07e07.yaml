      \ Cairn edge, replaced by a haunting vulnerability. Her question, *‘Who is Hedril?’*,\
      \ reveals her fractured identity, a direct echo of Lwaxana’s repressed grief\
      \ over her lost daughter. She flees with the wolf into the void, her form dissolving\
      \ into the starry blackness, leaving only the imprint of trauma in her wake.\n\
      \      "
