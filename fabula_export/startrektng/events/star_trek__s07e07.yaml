  global_id: null
  title: Troi Discovers Lwaxana’s Erased Memories
  description: 'Deanna Troi searches her mother’s quarters for clues about Lwaxana’s
    coma, uncovering personal mementos—including a lock of her own childhood hair
    and a photograph of her late father—that stir painful memories of loss. Picard
    arrives with grim news from Beverly Crusher: Lwaxana’s neural functions are deteriorating.
    As Deanna expresses frustration over her fruitless search, Picard suggests reviewing
    Lwaxana’s older journal entries. While scanning the files, they discover a seven-year
    gap in the records, later revealed to be a deliberate erasure by Lwaxana herself.
    This revelation forces Deanna to confront the possibility that her mother has
    repressed a traumatic event—one that now threatens Lwaxana’s life and Deanna’s
    own stability. The discovery compels Deanna to make a desperate decision: she
    must re-enter her mother’s mind, risking psychological harm to uncover the truth
    hidden in Lwaxana’s fractured psyche. The event serves as a critical turning point,
    shifting the narrative from passive investigation to active confrontation with
    the past.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e07
  scene_sequence: 19
  sequence_in_scene: 38
  key_dialogue:
  - 'PICARD: Doctor Crusher feels your mother''s condition is deteriorating... her
    neural functions are getting weaker.'
  - 'TROI: If we can''t figure out what''s wrong with her—I don''t think she will.'
  - 'PICARD: The first entry seems to be Stardate 30620.1. ... There''s a seven-year
    gap. ... She didn''t. The files were deleted. By your Mother... almost thirty
    years ago.'
  - 'TROI: I don''t understand any of this... Captain, I have to go back in to my
    mother''s mind. That''s the only way we''re ever going to get any answers.'
