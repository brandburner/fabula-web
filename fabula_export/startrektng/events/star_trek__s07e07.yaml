- fabula_uuid: cand_evt_scene_0b5f670760131cb5_01
  global_id: null
  title: Deanna forces Lwaxana to face Kestra’s death
  description: "\n  In the arboretum—a space now twisted by trauma—Deanna Troi pursues\
    \ her mother Lwaxana, who resists confrontation by retreating into denial. Deanna\
    \ presses Lwaxana about deleted journal entries and the spectral child Hedril,\
    \ whose identity as Kestra (Deanna’s repressed sister) becomes clear through a\
    \ fragmented picnic memory. Lwaxana’s anguish escalates as the scene shifts between\
    \ past and present: the idyllic family moment shatters when the dog (a wolf in\
    \ disguise) escapes, and Kestra drowns in the pond. Deanna’s relentless questioning\
    \ forces Lwaxana to relive the repressed tragedy, exposing the root of her coma\
    \ and the fracture in their relationship. The confrontation becomes a turning\
    \ point, where Deanna’s desperation to save her mother collides with Lwaxana’s\
    \ lifelong avoidance of grief, making the truth inescapable.\n  "
