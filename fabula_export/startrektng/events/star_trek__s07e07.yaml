    emotional_state: "\n        The voice is a distillation of Lwaxana’s suffering—raw,\
      \ unfiltered, and pleading. It carries the weight of years of repressed grief,\
      \ a cry for salvation that transcends words. There is no malice in it, only\
      \ a desperate need to be heard, to be freed from the prison of the unconscious.\
      \ Its brevity is its power; a single plea is enough to shatter Deanna’s hesitation\
      \ and pull her into the void, for it speaks to the deepest empathic connection\
      \ between mother and daughter.\n      "
    goals:
    - To summon Deanna into the void, acting as a beacon for her empathic senses.
    - To communicate the urgency of Lwaxana’s trapped state, compelling Deanna to
      act.
    what_happened: "\n        The disembodied voice emerges from the starry void,\
      \ its plea—*‘Help me…’*—echoing with desperate urgency. It is not tied to a\
      \ physical form but exists as a psychic imprint, a fragment of Lwaxana’s consciousness\
      \ reaching out from the depths of her fractured mind. The voice does not speak\
      \ again but its single cry is enough to compel Deanna to leap into the void,\
      \ acting as the catalyst for her descent into the abyss of Lwaxana’s trauma.\n\
      \      "
