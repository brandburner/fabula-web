  global_id: null
  title: Deanna Rejects Father’s Illusion
  description: Deanna Troi confronts a spectral illusion of her deceased father—a
    manifestation of Lwaxana’s repressed mind designed to shield her from the truth.
    The illusion lures her with warmth and nostalgia, singing a lullaby from her childhood
    to exploit her grief and stall her progress. Though momentarily moved, Deanna
    resists the emotional manipulation, recognizing the deception as a barrier to
    saving her mother. She forces herself to leave, prioritizing Lwaxana’s survival
    over her own longing for comfort, despite the psychological cost. The scene underscores
    Deanna’s resolve and the depth of Lwaxana’s trauma, which has warped her mind
    into a labyrinth of protective illusions.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e07
  scene_sequence: 15
  sequence_in_scene: 30
  key_dialogue: &id013
  - 'TROI: Don''t do this...'
  - 'MISTER TROI: I''m sorry I had to go away when you were so little... I didn''t
    want to...'
  - 'TROI: You''re not my father... you''re a part of Mother''s mind...'
  - 'MISTER TROI: ((singing)) Down in the valley... valley so low... hang your head
    over... hear the wind blow -'
  - 'TROI: No... no... you''re trying to keep me here... keep me from finding something...'
  - 'MISTER TROI: If you want to help her... leave. Let her have peace.'
  - 'TROI: But... she called out to me.... she does want my help.'
  - 'MISTER TROI: Stay with me... just a little while... it''s been so long - we''ll
    never have this chance again.'
  - 'TROI: Goodbye, daddy.'
