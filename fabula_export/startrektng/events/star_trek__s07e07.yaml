- fabula_uuid: act_904e5cf588299984
  number: 4
  summary: Following her abrupt expulsion from Lwaxana's mind, Deanna questions the
    Cairn child, Hedril, who states she makes Lwaxana sad, deepening the mystery of
    her connection to Lwaxana's trauma. Data suggests that Hedril, like other figures
    appearing in a dream or a meta-conscious mind, could represent a vulnerable or
    repressed aspect of Lwaxana's psyche, reinforcing Picard's observation that everything
    Deanna encountered within Lwaxana's mind acted as a barrier designed to keep her
    out. With no physiological cause yet found for Lwaxana's coma, Dr. Beverly Crusher
    emphasizes the increasing likelihood that a traumatic event precipitated her condition.
    Deanna, frustrated by the lack of external evidence or any recent traumatic events,
    begins a meticulous search through Lwaxana's extensive personal logs and journals,
    hoping to uncover a hidden clue. Captain Picard assists in this exhaustive review,
    and together they uncover a perplexing seven-year gap in Lwaxana's journal entries.
    This significant period begins approximately a year after Lwaxana's marriage and
    ends a few months after Deanna's own birth. Further investigation reveals that
    these files were not simply missing but were deliberately deleted by Lwaxana herself
    almost thirty years prior. This discovery provides the critical breakthrough,
    strongly suggesting a profound, repressed event occurred during that specific,
    erased period. Realizing the immense implications of this deliberate act of erasure,
    Deanna resolves that the only way to uncover the full truth and potentially save
    her mother is to re-enter Lwaxana's mind, convinced that the answers lie within
    this hidden, deleted past. This act marks a pivotal shift from external investigation
    to a targeted internal quest, armed with a crucial piece of information.
