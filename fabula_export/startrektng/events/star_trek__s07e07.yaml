      about Maques with feigned casualness. She dismisses Deanna’s embarrassment,
      framing Maques as a lonely widower to evoke sympathy, and escalates the pressure
      by invoking Deanna’s deceased father as a hypothetical ally. Her body language
      is assertive—stepping into Deanna’s path, maintaining eye contact—while her
      tone oscillates between maternal concern and subtle coercion. Inside the turbolift,
      she continues her emotional maneuvering, undeterred by Deanna’s silence or the
      presence of a crewperson.
