    comatose mother, dozes in Sickbay. Hours later, she jolts awake to the sound of
    Cairn telepathic white noise—only to find Maques, the Betazoid nurse, standing
    over Lwaxana’s bed with an unnervingly intense focus. His presence triggers Deanna’s
    empathic alarms, and when she demands an explanation, the tension escalates as
    the on-duty nurse rushes in. The scene deepens the mystery of Lwaxana’s coma,
    introducing Maques as a potential threat or hidden ally, while reinforcing Deanna’s
    growing paranoia about unseen forces manipulating her mother’s fragile state.
    The abrupt shift from quiet vigil to confrontation marks a turning point, forcing
    Deanna to question who—or what—she can trust in her desperate quest to save Lwaxana.
