acts:
- fabula_uuid: act_17ef3a8c6b81e156
  number: 1
  summary: The episode introduces Ambassador Lwaxana Troi assisting the telepathic
    Cairn delegation in learning verbal communication, a process that visibly strains
    her. She exhibits increasingly erratic emotional behavior, including a curious,
    prolonged stare at the Cairn child, Hedril, and vague, dismissive responses to
    concerns about her well-being. Her overbearing nature manifests when she attempts
    to arrange a marriage for Deanna with Maques, who then inadvertently reveals Lwaxana's
    telepathic 'need' for a husband, causing Deanna significant embarrassment. Deanna
    confronts her mother about this behavior, leading to an emotional breakdown where
    Lwaxana clings to Deanna, expressing intense, almost desperate, love and fear
    for her daughter. Maques later confides in Deanna, explaining that Cairn telepathy
    is direct and that he senses a 'dark place' within Lwaxana's mind, which Deanna
    initially dismisses as normal privacy. Lwaxana's erratic behavior escalates into
    a public outburst in Ten Forward, where she aggressively warns Riker to stay away
    from Deanna. Following this, Dr. Beverly Crusher examines Lwaxana, diagnosing
    low psilosynine levels due to telepathic overexertion and prescribing immediate
    rest from telepathic communication. Deanna offers to assist the Cairn verbally
    to allow her mother to recover. Despite the explicit medical warning, Lwaxana
    subtly uses telepathy again in the arboretum while explaining 'heaven' to the
    Cairn, immediately appearing drawn and tired. Shortly after, she collapses, falling
    unconscious, prompting Deanna to call for a medical emergency. This act establishes
    Lwaxana's deteriorating mental and physical state, hints at a deeper, hidden issue,
    and sets the stage for Deanna's desperate investigation into her mother's mind.
