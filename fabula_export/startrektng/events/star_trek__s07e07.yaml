  - 'BEVERLY: She''s fine, except her psilosynine levels are a little low.'
  - 'TROI: That''s a neurotransmitter involved in telepathy.'
  - 'BEVERLY: It''s been depleted by your work with the Cairn. You''re going to have
    to avoid telepathic communication for a while.'
  - 'LWAXANA: I can''t -- We only have three days left and the Cairn still have so
    much to learn.'
  - 'TROI: Maybe I can help with the Cairn.'
  - 'LWAXANA: You''re only half-Betazoid, dear. And you don''t have any experience
    with their form of telepathy.'
  - 'TROI: Then I won''t use telepathy; we''ll work verbally.'
  - 'LWAXANA: I suppose we could do that... And if they don''t understand something
    I''ll explain it to them telepathically.'
  - 'TROI: No, you''ll work verbally too. The point is for you to rest. Besides, it''ll
    be good for them to have to figure things out with words.'
