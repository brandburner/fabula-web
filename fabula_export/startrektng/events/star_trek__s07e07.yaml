- fabula_uuid: cand_evt_scene_55da320206a44662_04
  global_id: null
  title: Lwaxana’s matchmaking humiliates Deanna
  description: During a diplomatic reception in Ten Forward, Lwaxana Troi deliberately
    leaves Deanna alone with Maques, a senior Cairn diplomat, under the pretense of
    fostering cultural exchange. Maques, struggling with spoken language but sincere
    in his intentions, awkwardly reveals Lwaxana’s humiliating suggestion that Deanna
    'needs a husband.' The moment forces Deanna to confront her mother’s overbearing
    control and her own unresolved emotional dependencies, while also exposing Lwaxana’s
    manipulative tactics. Deanna’s reaction—a mix of shock, embarrassment, and simmering
    anger—plants the seeds for a future confrontation that will test their relationship.
    The scene underscores Lwaxana’s inability to respect Deanna’s autonomy and foreshadows
    the deeper emotional vulnerabilities that will surface as Deanna delves into her
    mother’s repressed trauma.
