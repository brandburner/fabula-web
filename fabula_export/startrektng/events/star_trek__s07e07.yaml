    memory of her family picnic, where her older daughter Kestra (disguised as Hedril)
    appears. The idyllic scene fractures as Lwaxana’s denial collapses under Deanna’s
    persistence, revealing Kestra’s tragic fate. The memory shifts from sunlight to
    darkness, mirroring Lwaxana’s psychological unraveling. When Deanna learns Kestra
    drowned chasing the family dog, Lwaxana’s anguish confirms the trauma that has
    haunted her for decades—one Deanna must now face to save her mother’s life and
    her own stability. The scene’s tonal shift from warmth to dread underscores the
    cost of repressed grief, while Kestra’s plea ('Help me') becomes the emotional
    catalyst for Deanna’s mission.
