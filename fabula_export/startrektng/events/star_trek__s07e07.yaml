      Deanna away or retreating into psychic fragmentation.
    - To avoid acknowledging Kestra’s existence, as doing so would force her to confront
      her role in the tragedy and the erasure of her daughter from Deanna’s life.
    what_happened: 'Lwaxana stands frozen in the arboretum, her body language rigid
      with resistance as she clutches the edges of her psychic memory like a drowning
      woman. Her face is a mask of anguish, eyes darting between Deanna and the shifting
      landscape as she relives the picnic tragedy. She physically recoils from Deanna’s
      questions, her voice breaking as she oscillates between denial (''Go away'')
      and raw confession (''The dog got away... she ran after him...''). Her hands
      tremble as she rifles through her bag for the teething ring, a futile attempt
      to distract from the unfolding horror. The moment Kestra’s name is spoken, Lwaxana’s
      composure shatters—her shoulders slump, her breath hitches, and she collapses
      into the memory, her voice a whisper of guilt: ''I can’t...'''
