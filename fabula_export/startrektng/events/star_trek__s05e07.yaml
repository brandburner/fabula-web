- fabula_uuid: cand_evt_scene_fe931f5aec01cd19_02
  global_id: null
  title: Klingon vessel arrives as Picard departs
  description: "\n  In the Enterprise’s cargo bay, Geordi La Forge confirms the recovered\
    \ metal fragments are a Vulcan navigational deflector array from the decommissioned\
    \ *T’Pau*, last known to be at the Qualor Two surplus depot. This revelation sparks\
    \ Riker’s proposal to investigate the depot, while Picard’s attention shifts abruptly\
    \ when Worf announces the arrival of a Klingon vessel—sent by Gowron as a direct\
    \ response to Picard’s covert mission. The Klingon ship’s appearance marks the\
    \ first tangible step toward Picard’s journey to Romulus, where he intends to\
    \ locate Spock. The scene pivots from forensic investigation to high-stakes diplomacy,\
    \ with Picard’s decision to board the Klingon vessel alongside Data setting in\
    \ motion a dangerous gambit that will test Klingon-Romulan tensions and Romulan\
    \ secrecy. The exchange between Picard and Riker underscores the dual-track investigation\
    \ unfolding: one focused on the *T’Pau*’s disappearance, the other on Spock’s\
    \ unauthorized presence on Romulus. The Klingon vessel’s arrival is both a logistical\
    \ breakthrough and a narrative turning point, as Picard’s personal mission—driven\
    \ by his connection to Spock and Sarek—collides with the political realities of\
    \ Klingon-Federation relations.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e07
  scene_sequence: 11
  sequence_in_scene: 20
  key_dialogue:
  - 'GEORDI: What we seem to have here is a navigational deflector array. Or at least
    what''s left of one.'
  - 'RIKER: Why would anyone want a Vulcan deflector?'
  - 'GEORDI: Beats me, Commander. Every question we answer here seems to bring up
    two more.'
  - 'PICARD: You''re certain it is Vulcan...'
  - 'GEORDI: Yes, sir. A metallurgical analysis confirmed that... and by running a
    molecular pattern trace, we even identified the ship as the *T’Pau*. It was decommissioned
    years ago and sent to the surplus depot at Qualor Two. As far as anyone knows
    it''s still there.'
  - 'WORF''S COM VOICE: A Klingon vessel is decloaking off our port bow. Compliments
    of Gowron.'
  - 'PICARD: Please convey our gratitude, Mister Worf. Advise the captain that Lieutenant
    Commander Data and I will be transporting aboard shortly.'
  - 'RIKER: I''d like to take the Enterprise to Qualor Two... see what I can find
    out there.'
  - 'PICARD: Agreed.'
