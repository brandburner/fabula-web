  key_dialogue: &id025
  - 'DATA: Sir, you have seemed unusually pensive since we received the news of Ambassador
    Sarek''s death.'
  - 'PICARD: Sarek and I shared a particular bond. Our lives touched in an unusual
    way... I admit that I feel the effects of his loss. The tenor of our mission has
    changed, at least for me, Data. We were sent to confront Spock about his disappearance.
    Now, we must also tell him his father is dead.'
  - 'PICARD: It is never quite that simple. Not even for a Vulcan. Certainly not for
    Spock who is also half Human. They spent a lifetime in conflict... now the chance
    to resolve all of their differences is gone.'
  - 'K''VADA: Don''t you two look sweet... Do you know what the Romulans will do to
    you if they discover who you are?'
  - 'PICARD: I have a good idea.'
