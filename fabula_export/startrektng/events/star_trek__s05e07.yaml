  object_involvements:
  - object_uuid: ger_object_dbe05e02de49
    description_of_involvement: "\n      The Enterprise bridge viewscreen is the *eye\
      \ of truth* in this scene. It first reveals the empty starfield at the T'Pau’s\
      \ coordinates, a visual gut-punch that silences Dokachin’s bluster. Later, it\
      \ becomes the stage for Geordi’s revelation: the deflector’s reroute to the\
      \ Tripoli is displayed on Dokachin’s terminal, projected for all to see. The\
      \ viewscreen’s dual role—first as a mirror of absence, then as a tool of exposure—amplifies\
      \ the drama, turning abstract data into undeniable proof. Its glow casts a harsh\
      \ light on Dokachin’s failures, making the bridge feel like a courtroom where\
      \ the evidence is inescapable.\n      "
    status_before_event: Displaying star charts and shipyard data; neutral tool for
      navigation and communication.
    status_after_event: Instrument of revelation, exposing the T'Pau’s reroute and
      Dokachin’s complicity in the cover-up.
    global_id: ger_object_dbe05e02de49
  - object_uuid: ger_object_eb7e3fd45d08
    description_of_involvement: "\n      Dokachin’s terminal is the *digital battleground*\
      \ of this scene. His frantic tapping of keys—'I have the T'Pau cross-referenced\
      \ in four different directories'—is a desperate attempt to regain control, but\
      \ the terminal betrays him. It reveals the deflector’s reroute to the Tripoli,\
      \ a fact he can’t explain away. The terminal’s screen becomes a mirror, reflecting\
      \ not just data but Dokachin’s incompetence. Its beeps and flashes are the soundtrack\
      \ to his unraveling, a machine that, unlike him, cannot lie. For Riker and Geordi,\
      \ it’s a tool of justice; for Dokachin, it’s an instrument of humiliation.\n\
      \      "
    status_before_event: Functioning normally, displaying shipyard records and directories
      under Dokachin’s control.
    status_after_event: Exposed as a flawed system, revealing the T'Pau’s reroute
      and forcing Dokachin to admit the truth.
    global_id: ger_object_eb7e3fd45d08
  - object_uuid: ger_object_667245c704b5
    description_of_involvement: "\n      The T'Pau, though physically absent, is the\
      \ *ghost in the machine* of this scene. Its disappearance is the catalyst for\
