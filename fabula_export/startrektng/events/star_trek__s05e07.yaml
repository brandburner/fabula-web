- fabula_uuid: cand_evt_scene_fe931f5aec01cd19_01
  global_id: null
  title: Deflector discovery shifts investigation focus
  description: 'In the Enterprise’s cargo bay, Geordi La Forge identifies the mysterious
    metal fragments as a Vulcan navigational deflector array from the decommissioned
    *T’Pau*, a ship long thought to be in storage at Qualor Two. This revelation—coupled
    with the confirmation that the deflector was *unauthorizedly removed*—immediately
    raises suspicions of theft and potential Romulan involvement. The discovery prompts
    Riker to propose a parallel investigation at Qualor Two, while Picard, already
    distracted by Worf’s announcement of a Klingon vessel’s arrival (a gift from Gowron
    for his covert mission to Romulus), approves the plan. The scene pivots from forensic
    analysis to action: Picard and Data prepare to depart for Romulus, while Riker’s
    team will pursue the Qualor Two lead. The deflector’s origins not only validate
    Riker’s earlier hunch about stolen Vulcan technology but also deepen the mystery
    of Spock’s presence on Romulus, as the *T’Pau*’s decommissioning and the deflector’s
    disappearance suggest a deliberate, high-stakes operation. The exchange between
    Picard and Riker—brief but charged with unspoken urgency—underscores the dual-track
    investigation now unfolding: one personal (Picard’s mission to Romulus), the other
    operational (Riker’s pursuit of the deflector’s trail). The Klingon vessel’s arrival
    serves as a narrative fulcrum, forcing Picard to split his focus and trust his
    crew to handle the Qualor Two lead independently. The deflector’s discovery is
    the first tangible link between Spock’s disappearance and a broader conspiracy,
    elevating the stakes and framing the Enterprise’s crew as pieces in a larger,
    interstellar puzzle.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e07
  scene_sequence: 11
  sequence_in_scene: 19
  key_dialogue:
  - 'GEORDI: What we seem to have here is a navigational deflector array. Or at least
    what''s left of one.'
  - 'RIKER: Why would anyone want a Vulcan deflector?'
  - 'GEORDI: Beats me, Commander. Every question we answer here seems to bring up
    two more.'
  - 'PICARD: You''re certain it is Vulcan...'
  - 'GEORDI: Yes, sir. A metallurgical analysis confirmed that... and by running a
    molecular pattern trace, we even identified the ship as the *T’Pau*. It was decommissioned
    years ago and sent to the surplus depot at Qualor Two. As far as anyone knows
    it''s still there.'
  - 'WORF''S COM VOICE: A Klingon vessel is decloaking off our port bow. Compliments
    of Gowron.'
  - 'PICARD: Please convey our gratitude, Mister Worf. Advise the captain that Lieutenant
    Commander Data and I will be transporting aboard shortly.'
  - 'RIKER: I''d like to take the *Enterprise* to Qualor Two... see what I can find
    out there.'
  - 'PICARD: Agreed.'
