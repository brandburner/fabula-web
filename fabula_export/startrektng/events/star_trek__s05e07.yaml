  title: Neral exposes Picard’s covert presence
  description: 'In a tense confrontation within a Romulan office, Proconsul Neral—Romulus’s
    high-ranking counterintelligence operative—summons Senator Pardek under the pretense
    of routine inquiry. Neral reveals classified intelligence confirming Captain Picard’s
    unauthorized arrival on Romulus, forcing Pardek into a precarious position: deny
    knowledge and risk exposure as a collaborator, or acknowledge the breach and betray
    Picard’s covert mission. Neral’s calculated order to distribute Picard’s likeness
    to security forces escalates the stakes, exposing Romulan counterintelligence’s
    active tracking of the intruder—likely in disguise—while Picard’s mission remains
    covert and vulnerable. Pardek’s impassive reaction masks his internal conflict,
    as his alliance with Spock and Picard now hangs by a thread. The exchange underscores
    Neral’s ruthless efficiency and the fragility of Picard’s undercover operation,
    setting the stage for a high-stakes cat-and-mouse game across Romulus.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e07
  scene_sequence: 26
  sequence_in_scene: 44
  key_dialogue:
  - 'NERAL: What do you know of this Human? Jean-Luc Picard... a Starfleet Captain...'
  - 'PARDEK: I know nothing of him.'
  - 'NERAL: You haven''t seen him recently...?'
  - 'PARDEK: To my knowledge, I''ve never seen him.'
  - 'NERAL: I have received intelligence that says he''s on his way here. Perhaps
    here already.'
  - 'PARDEK: Here -- on Romulus?'
  - 'NERAL: Yes... curious, isn''t it? I suppose we''d better find out if the report
    is accurate -- or merely rumor. Circulate his likeness to the security forces.
    Remind them that if he is here, he is probably disguised as one of us.'
