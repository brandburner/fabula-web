    from Vulcan, where she has been tending to her ailing husband, Sarek. Their reunion
    is marked by restrained warmth—Perrin’s gracious demeanor barely conceals the
    grief weighing on her, while Picard’s measured greeting reveals his deep concern
    for Sarek’s condition. The moment is charged with unspoken tension: Perrin’s pain
    over Sarek’s decline and Picard’s personal investment in the mission to Romulus,
    which is now inextricably tied to the Vulcan family’s fractured legacy. Their
    brief exchange, though polite, underscores the emotional stakes of Picard’s journey,
    framing it as both a professional duty and a deeply personal reckoning with Spock’s
    estrangement from his father. The scene foreshadows the fragility of family bonds
    and the weight of legacy that will shape the mission’s emotional and political
    challenges ahead.'
