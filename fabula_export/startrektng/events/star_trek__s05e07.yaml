- fabula_uuid: cand_evt_scene_113fe63d9854e9fc_01
  global_id: null
  title: Perrin reveals Spock’s fractured legacy
  description: 'In the *Enterprise* ready room, Picard presses Perrin for answers
    about Spock’s disappearance, only to uncover the deep, unresolved rift between
    Spock and his father, Sarek. Perrin’s guarded demeanor initially shields her pain,
    but her emotional outburst reveals the public rupture between father and son during
    the Cardassian War debates—a betrayal she personally resented. The revelation
    forces Picard to confront the personal stakes of his mission: Spock’s actions
    may not be purely political but a desperate attempt to reconcile with a legacy
    he can never fully inherit. Perrin’s anguish over Sarek’s deteriorating health
    and his unfulfilled wish to see Spock adds urgency to Picard’s investigation,
    while her reluctant permission for him to visit Sarek sets up the mind-meld that
    could bridge the divide—or expose deeper Romulan secrets. The scene pivots from
    professional inquiry to raw emotional vulnerability, deepening Picard’s investment
    in the mission beyond its diplomatic implications.'
