  key_dialogue: &id009
  - |-
    RIKER: I'm Commander William Riker of the Federation Starship Enterprise.
    DOKACHIN: Klim Dokachin, quartermaster of Surplus Depot Zed-One-Five.
    RIKER: We need some information about a Vulcan ship, the *T'Pau*. It was sent there a few years ago.
    DOKACHIN: Did you arrange an appointment?
  - |-
    RIKER: Mister Dokachin, the information I need involves a matter of major importance to the Federation.
    DOKACHIN: Uh huh.
    RIKER: I'll need access to your logs, your files... It won't take long. My people can do the work.
    DOKACHIN: I don't allow outsiders into my computer system.
  - |-
    RIKER: ((incredulous)) I don't believe him.
    TROI: He's king of his particular hill, Commander. You'll have to treat him that way.
    RIKER: Counselor... a perfect job for you.
