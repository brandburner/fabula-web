      part of his disguise.
    global_id: ger_object_a473ce9cc7ab
  - object_uuid: ger_object_0c2157fa6478
    description_of_involvement: "\n      The Romulan skin pigmentation Beverly applies\
      \ to Picard and Data’s faces and necks is the most visually striking transformation\
      \ in the disguise process, its grayish tone erasing their Federation identities\
      \ and replacing them with the cold, alien aesthetic of Romulans. The pigmentation\
      \ is not merely cosmetic—it is a psychological barrier, a layer of protection\
