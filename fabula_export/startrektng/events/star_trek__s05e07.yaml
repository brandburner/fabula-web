  title: Troi outmaneuvers Dokachin with empathy
  description: After Commander Riker’s blunt, protocol-ignoring approach fails to
    secure Klim Dokachin’s cooperation, Counselor Troi intervenes by leveraging her
    empathic insight into the Zakdorn quartermaster’s ego. Dokachin, a rigid bureaucrat
    who dismisses Riker’s requests with bureaucratic indifference, initially shuts
    down all attempts to access restricted files on the decommissioned Vulcan ship
    *T’Pau*. Troi recognizes Dokachin’s need for validation and subtly flatters his
    self-importance, positioning herself as a peer rather than a subordinate. This
    strategic pivot forces Riker to relinquish control of the negotiation, marking
    a critical shift in the crew’s approach to Romulan bureaucracy. The scene underscores
    Troi’s role as a bridge between Federation diplomacy and alien psychology, while
    exposing the limitations of Riker’s direct tactics in this context. The exchange
    also hints at Troi’s discomfort with the decaying surplus depot, foreshadowing
    deeper cultural or personal unease tied to the mission’s stakes.
