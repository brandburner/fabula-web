      a refusal to engage, a rejection of Starfleet’s authority, and a declaration
      that this encounter will be settled by firepower, not words. Their activation
      is the point of no return, the moment when Riker’s warning becomes obsolete
      and the *Enterprise* is forced into a defensive (and soon, offensive) posture.
      The phasers themselves are a narrative device, symbolizing the unseen, unspoken
      conflicts brewing in the Federation’s borders—threats that don’t announce themselves,
      don’t negotiate, and don’t care about the rules.'
    status_before_event: Charged and locked onto the *Enterprise*, their energy signature
      detected by Worf but their intent unclear until they fire.
    status_after_event: Discharged, but their damage is done—they’ve drawn first blood,
      and now the *Enterprise* is poised to return fire.
