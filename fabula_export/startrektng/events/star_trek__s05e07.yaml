  key_dialogue: &id003
  - 'PICARD: Still no response from the Klingons, Mister Worf?'
  - 'WORF: I believe I know why our messages are not being answered. Gowron... has
    been rewriting Klingon history.'
  - 'RIKER: Rewriting history?'
  - 'WORF: He is claiming that it was his courage... his genius... which brought about
    an end to the civil war. In the new version... there is no mention made of the
    Federation''s help in his rise to power.'
  - 'PICARD: One question answered. What do we know of him?'
  - 'DATA: He has been in public service since he was a young man... a senator for
    nine decades. He is considered a ''man of the people...'' He has sponsored many
    reforms. Reportedly, he is considered by the Romulan leadership to be something
    of a radical because he has been an advocate for peace throughout his career.'
  - 'PICARD: I can see why Spock would cultivate a relationship with him.'
