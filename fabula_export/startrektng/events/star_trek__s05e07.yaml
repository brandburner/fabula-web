- fabula_uuid: cand_evt_scene_156cde409ebeb48e_01
  global_id: null
  title: Troi manipulates Dokachin for T'Pau coordinates
  description: "\n  On the *Enterprise* bridge, Riker’s blunt diplomacy fails to sway\
    \ Klim Dokachin, a Zakdorn quartermaster whose ego and resistance to authority\
    \ stall the investigation into the missing Vulcan ship *T’Pau*. Recognizing Dokachin’s\
    \ vanity and his unspoken attraction to her, Counselor Troi steps in, using her\
    \ empathic insight to subtly validate his self-importance. She frames the search\
    \ for the *T’Pau* as a personal favor, appealing to his desire to be seen as indispensable.\
    \ Dokachin, flattered by Troi’s attention and eager to prove his utility, reluctantly\
    \ accesses restricted files, revealing the ship’s last logged coordinates—section\
    \ 18-gamma-12—before offering to guide the *Enterprise* there. The exchange exposes\
    \ Dokachin’s insecurity beneath his bravado, while Troi’s strategic charm underscores\
    \ her role as the crew’s emotional and tactical asset. As the *Enterprise* navigates\
    \ the Romulan junkyard, Dokachin’s offhand remark about the decaying ships hints\
    \ at Troi’s unspoken discomfort with the setting, foreshadowing her later cultural\
    \ or personal unease in Romulan space. The scene marks a pivot from Riker’s failed\
    \ direct approach to Troi’s indirect, empathy-driven negotiation, advancing the\
    \ plot while deepening character dynamics.\n  "
