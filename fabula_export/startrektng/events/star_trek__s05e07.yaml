  title: K'Vada reluctantly obeys Picard’s orders
  description: "\n  On the Klingon Bird of Prey’s bridge, Captain K'Vada—visibly disdainful\
    \ of his assignment—confronts Picard about their covert mission to Romulus. His\
    \ initial hostility reveals his skepticism of Starfleet’s secrecy and the personal\
    \ stakes of Picard’s mission, which he deduces involves Ambassador Spock. Picard\
    \ remains impassive, refusing to disclose details beyond the coordinates, forcing\
    \ K'Vada to grapple with the tension between duty and distrust. After a charged\
    \ standoff, K'Vada reluctantly orders his helmsman to proceed, signaling the mission’s\
    \ commencement despite his lingering reservations. The exchange underscores the\
    \ fragility of their alliance and the high cost of obedience in a high-stakes,\
    \ morally ambiguous operation.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e07
  scene_sequence: 12
  sequence_in_scene: 22
  key_dialogue:
  - |-
    K'VADA: When I received my orders... I was not told where we were going.
    PICARD: That's right.
    K'VADA: I know my duty, Captain... when I'm given orders, I follow them. But I do not like secrets. I want to know why we are on this mission.
    PICARD: I'm sorry. It is a confidential matter.
  - |-
    K'VADA: You're going after the defector, aren't you?
    PICARD: Defector...
    K'VADA: You think information like that stays a secret? Ambassador Spock has gone to Romulus... and you're going after him.
    PICARD: Your orders are to take us to a set of coordinates near Romulus... and to bring us back. That is all I am prepared to discuss.
  - |-
    K'VADA: If we are discovered by the Romulans... it means death for all of us.
    PICARD: I realize that.
    K'VADA: Very well, Captain. We have set a course for Romulus.
