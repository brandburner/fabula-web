- fabula_uuid: cand_evt_scene_0e4e1486f6830471_01
  global_id: null
  title: Picard confronts Sarek’s death before Romulan mission
  description: Picard and Data, now disguised as Romulans, prepare to depart for their
    covert mission to Romulus. As Picard packs away the materials used for their disguises,
    Data observes his captain’s uncharacteristic distraction, prompting Picard to
    reveal the emotional weight of Sarek’s death. He explains the unresolved father-son
    conflict between Spock and Sarek, acknowledging the illogical yet profound human-Vulcan
    struggle that defined their relationship. The revelation deepens the personal
    stakes of the mission, as Picard must now deliver the news of Sarek’s death to
    Spock—a task that complicates their objective of uncovering the truth behind Spock’s
    unauthorized presence on Romulus. The scene underscores the tension between duty
    and grief, setting the emotional tone for their infiltration. Their exchange is
    abruptly interrupted as they board the Klingon bridge, where K’Vada mocks their
    disguises and warns of the dangers ahead, reinforcing the high-stakes nature of
    their mission.
