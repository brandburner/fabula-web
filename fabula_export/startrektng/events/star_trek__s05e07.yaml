    the indignity of Sarek’s prolonged decline—shares her fear of losing him with
    Picard, who listens with deep empathy. She describes the cruelty of the disease,
    the unpredictability of his condition, and her gratitude for each fleeting moment
    with him. Picard’s quiet admiration for her strength and his own restrained sorrow
    create a rare moment of vulnerability between them, deepening their bond. The
    exchange underscores the emotional weight of Sarek’s legacy, which looms over
    both characters’ personal and professional stakes in the Romulan crisis. Perrin’s
    reluctance to voice her own pain, combined with Picard’s sensitivity, reveals
    their shared respect and the unspoken tension of a mission that now feels deeply
    personal for both of them.
