  title: Picard and Data’s surveillance exposed
  description: "\n  Picard and Data attempt a covert stakeout of Pardek’s legal office\
    \ on Romulus, posing as locals in a café. Data’s android mannerisms and Picard’s\
    \ unfamiliarity with Romulan customs draw suspicion from a vendor, who questions\
    \ their cover. Despite identifying Pardek’s location, their presence is compromised\
    \ when Romulan soldiers—likely alerted by the vendor—detain them at disruptor\
    \ point. The scene underscores the fragility of their undercover efforts in a\
    \ hostile environment, where even minor missteps risk exposure. The failed surveillance\
    \ forces a shift from stealth to direct confrontation with Romulan authorities,\
    \ escalating the mission’s stakes and revealing the duo’s vulnerability in a society\
    \ where trust is nonexistent and paranoia is rampant.\n  "
