  global_id: null
  title: Surveillance Collapses Under Scrutiny
  description: "\n  Picard and Data execute a covert surveillance operation on Romulus,\
    \ attempting to locate Senator Pardek by staking out a legal office linked to\
    \ him. Their disguise as locals is immediately tested when Data’s android mannerisms\
    \ draw suspicion, forcing Picard to improvise by physically guiding him into a\
    \ more natural posture. Their attempt to blend in at a nearby café fails when\
    \ a hostile soup vendor questions their origins, exposing their lack of cultural\
    \ authenticity. The tension escalates when Romulan foot soldiers—who had been\
    \ observing them—intervene, drawing disruptors and detaining them under suspicion.\
    \ The confrontation forces Picard and Data to abandon their stealth approach,\
    \ shifting the mission from passive observation to direct confrontation with Romulan\
    \ authorities. The event underscores the fragility of their undercover operation\
    \ and the high stakes of their presence in hostile territory, where even minor\
    \ missteps risk exposure and capture.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e07
