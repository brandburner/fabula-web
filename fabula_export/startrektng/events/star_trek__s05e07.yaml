      \ suspicion from Romulan authorities. The objects’ functionality is not just\
      \ physical but psychological, as they symbolize the lengths to which Picard\
      \ and Data must go to infiltrate a hostile environment.\n      "
    status_before_event: "\n      The pigmentation and ear molds are fully applied\
