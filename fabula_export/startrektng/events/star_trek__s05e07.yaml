  description: "\n  The *Enterprise* encounters an unidentified vessel that refuses\
    \ to respond to hails, escalating from passive hostility to a direct attack after\
    \ Commander Riker issues a warning. Worf detects an energy surge in the vessel's\
    \ phaser banks, confirming their hostile intent just before they fire, striking\
    \ the *Enterprise* and damaging forward shields to 72%. Riker immediately orders\
    \ a defensive response, boosting shields and preparing to target the attacker's\
    \ weapon systems. The attack disrupts the ship's mission continuity, forcing the\
    \ crew into a high-stakes confrontation that tests their readiness and exposes\
    \ the *Enterprise*'s vulnerability to unseen threats. The moment marks a critical\
    \ shift from diplomatic caution to tactical engagement, raising the stakes as\
    \ the crew transitions from passive endurance to active retaliation.\n  "
