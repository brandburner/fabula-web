      \ color of urgency, and the crew’s collective heartbeat as they brace for what\
      \ comes next. The alert is both a tool and a symbol: a tool to mobilize the\
      \ crew, and a symbol of the Federation’s vulnerability in the face of the unknown.\n\
      \      "
