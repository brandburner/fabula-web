- fabula_uuid: cand_evt_scene_da459602bc944c66_01
  global_id: null
  title: Riker uncovers Dokachin’s hidden deuterium shipment
  description: "\n  Dokachin’s insistence on the *Tripoli*’s presence at its coordinates\
    \ collides with Worf’s confirmation of an empty starfield, exposing the Zakdorn\
    \ quartermaster’s deception. Riker’s sharp interrogation reveals a scheduled deuterium\
    \ shipment in two hours, forcing Dokachin to admit the truth under pressure. The\
    \ revelation shifts the investigation from a missing ship to a covert operation,\
    \ prompting Riker to order the *Enterprise* to disguise itself as a derelict vessel\
    \ and prepare a stakeout. This moment transforms the scene from a bureaucratic\
    \ dead end into a high-stakes tactical maneuver, directly advancing Picard’s broader\
    \ mission by exposing Romulan subterfuge and setting up a confrontation with the\
    \ shipments’ recipients. The tension escalates as Dokachin’s nervousness underscores\
    \ the stakes—his earlier denials now unravel, revealing a hidden layer of the\
    \ conspiracy surrounding Spock’s presence on Romulus.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e07
  scene_sequence: 18
  sequence_in_scene: 31
  key_dialogue: &id017
  - 'DOKACHIN: In all the time the Zakdorn have operated this depot, nothing''s ever
    been lost. Never. I''ll tell you this... somebody will pay. I''ll conduct an investigation.
    Whoever is responsible...'
  - 'RIKER: On screen.'
  - 'DOKACHIN: I do not understand this. This is not possible.'
  - 'RIKER: When is today''s transport?'
  - 'DOKACHIN: Just over two hours from now. A shipment of deuterium storage tanks.'
  - 'RIKER: Ensign, align the Enterprise so we''ll appear to be one of the abandoned
    ships. Mister La Forge, when we''re in position, shut down engines and all systems
    except sensors and life support.'
  - 'RIKER: I''m guessing somebody''s going to be here to receive those storage tanks
    -- and I''d be very interested to see who it is.'
