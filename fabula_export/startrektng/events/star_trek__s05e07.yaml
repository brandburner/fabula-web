- fabula_uuid: cand_evt_scene_5274950dc3186ca5_02
  global_id: null
  title: Sarek reveals Spock’s Romulan connection
  description: "\n  Picard confronts Sarek in his ceremonial death chamber, where\
    \ the dying Vulcan is emotionally unraveling, his grief and rage alternating in\
    \ waves. Perrin departs after securing Sarek’s attention, leaving Picard to invoke\
    \ Spock’s name as a lever—an act that pierces Sarek’s detachment and forces him\
    \ into the present. The revelation that Spock is missing on Romulus triggers a\
    \ cascade of memories: Sarek recalls Senator Pardek, a Romulan peace advocate\
    \ with whom Spock maintained a clandestine relationship, despite Sarek’s earlier\
    \ dismissal of the alliance as illogical. The exchange exposes the generational\
    \ fracture between father and son—Spock’s defiance, Sarek’s failed attempts to\
    \ control him, and the unspoken admiration beneath their conflict. As Sarek’s\
    \ mind drifts, Picard guides him through the Vulcan salute, a poignant gesture\
    \ that underscores the unresolved bond between them. The scene reframes Spock’s\
    \ disappearance as a deliberate, politically charged act, thrusting Picard’s mission\
    \ toward Romulus with new urgency.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e07
  scene_sequence: 7
  sequence_in_scene: 12
  key_dialogue:
  - |-
    SAREK: Spock?
    PICARD: Yes. He's missing.
    SAREK: Is that you, Picard... ?
  - |-
    SAREK: He is a Romulan Senator. Spock has maintained a relationship with him over the years... I don't know where they met. The Khitomer Conference, I'd imagine.
    PICARD: Pardek represented Romulus?
    SAREK: Yes... yes I'm quite sure he did...
  - |-
    SAREK: Secretly... I admired him... that proud core of him that would not yield...
    PICARD: ((softly)) Sarek, we are a part of each other. I know Spock has caused you pain... but I also know you love him...
    SAREK: Tell him, Picard...
