  global_id: null
  title: Picard confronts Sarek’s absence and Spock’s legacy
  description: "\n  In the Enterprise’s observation lounge, Picard records a personal\
    \ log revealing his emotional investment in the Romulus mission, driven by his\
    \ connection to Sarek and the weight of potentially delivering devastating news\
    \ about Spock. When Riker informs him that Sarek—too ill to join his wife aboard—won’t\
    \ be present, Picard’s dread deepens. The exchange exposes the unresolved tension\
    \ between Spock and his father, a conflict Picard only partially understands from\
    \ his past mind-meld with Sarek. The scene underscores Picard’s leadership burden:\
    \ not just investigating Spock’s actions but possibly confirming his betrayal\
    \ to a dying man. The discovery of mysterious Vulcan metal fragments (later tied\
    \ to the T’Pau) shifts focus to Riker’s parallel investigation, but the emotional\
    \ core remains Picard’s private reckoning with legacy and duty.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e07
  scene_sequence: 2
  sequence_in_scene: 3
  key_dialogue:
  - 'PICARD: We should notify Sarek''s wife of our plans...'
  - 'RIKER: All taken care of, sir... she''ll be transporting aboard at oh-seven hundred...'
  - 'PICARD: And Sarek?'
  - 'RIKER: She says he is too ill to join her.'
  - 'PICARD: Not unexpected. The man is dying. And I have the... honor... to bring
    him the news that his son may have betrayed the Federation.'
  - 'RIKER: How well do you know Spock?'
  - 'PICARD: I met him only once... what I know of him comes from history books and
    of course the mind meld with his father...'
  - 'PICARD: ... Well, sometimes, fathers and sons...'
  - 'RIKER: ((from personal experience)) Understood.'
