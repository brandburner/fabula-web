  title: Riker fails to bypass Zakdorn bureaucracy
  description: "\n  Commander Riker attempts to circumvent Klingon-controlled space\
    \ bureaucracy by directly contacting Klim Dokachin, a Zakdorn quartermaster at\
    \ Surplus Depot Zed-One-Five, for critical intelligence about the decommissioned\
    \ Vulcan ship *T'Pau*. Dokachin, a rigidly protocol-bound official, dismisses\
    \ Riker's requests without an appointment, forcing the Enterprise crew to abandon\
    \ their initial approach. Riker's frustration reveals the crew's vulnerability\
    \ in navigating Klingon space, where even routine information-gathering requires\
    \ formal channels. The failed contact underscores the mission's escalating tension\
    \ as time and resources dwindle, while also setting up Troi's subsequent intervention—a\
    \ strategic pivot that leverages her empathic insight to bypass Dokachin's obstinacy.\
    \ The scene highlights the crew's adaptability in the face of bureaucratic obstacles,\
    \ reinforcing the broader narrative of external threats and internal operational\
    \ challenges that threaten Picard's covert mission to Romulus.\n  "
