  object_involvements:
  - object_uuid: ger_object_dbe05e02de49
    description_of_involvement: The Enterprise Bridge Viewscreen serves as the primary
      interface for Riker’s failed negotiation with Klim Dokachin. It fills the bridge
      with Dokachin’s rigid, self-assured face, framed by stacks of protocol binders
      that symbolize the bureaucratic barriers the crew faces. The viewscreen flickers
      back to a starfield twice as Dokachin terminates the transmission, visually
      reinforcing the crew’s isolation and the depot’s unyielding stance. Its role
      is both functional—a tool for communication—and narrative, highlighting the
      gulf between Starfleet’s urgency and Klingon-controlled space’s red tape.
    status_before_event: Active and displaying the Enterprise’s approach to Surplus
      Depot Zed-One-Five; later repurposed for direct hail to Dokachin.
    status_after_event: Returns to a static starfield after Dokachin’s second dismissal,
      symbolizing the crew’s stalled progress.
    global_id: ger_object_dbe05e02de49
  - object_uuid: ger_object_ce3670200246
    description_of_involvement: The Surplus Depot Z15 T’Pau Logs System is the invisible
      but critical object of contention in this event. Though never directly seen,
      its existence is implied as the source of the information Riker seeks. Dokachin’s
      refusal to grant access—‘I don’t allow outsiders into my computer system’—turns
      this system into a metaphorical fortress, guarded by bureaucratic protocol.
      Its locked status forces the crew to pivot to Troi’s diplomatic approach, making
      it a catalyst for the scene’s strategic shift.
    status_before_event: Secure and inaccessible, housed within the depot’s restricted
      databases, with no external access granted.
    status_after_event: Remains locked, but its importance is now framed as a challenge
      to be overcome through alternative means (e.g., Troi’s intervention).
    global_id: ger_object_ce3670200246
  - object_uuid: ger_object_667245c704b5
    description_of_involvement: The decommissioned Vulcan ship *T’Pau* is the unseen
      but central object driving the conflict. Though not physically present on-screen,
      its mention—‘a Vulcan ship, the T’Pau’—anchors the entire exchange. Riker’s
      urgency stems from the need to investigate its deflector array, which may hold
      clues to the attacks on the Enterprise crew. Dokachin’s obstruction turns the
      *T’Pau* into a MacGuffin of sorts, its very existence a provocation to the crew’s
      mission. The ship’s absence from the depot’s accessible logs becomes a narrative
      tension point, propelling the crew toward Troi’s diplomatic gambit.
    status_before_event: Decommissioned and stored at Surplus Depot Zed-One-Five,
      with its deflector array removed without authorization (implied by the broader
      plot).
    status_after_event: Still physically present at the depot but its logs remain
      inaccessible, heightening the mystery around its role in the attacks.
    global_id: ger_object_667245c704b5
