  - 'PERRIN: As far as I’m concerned, he disappeared a long time ago.'
  - 'PERRIN: He attacked Sarek’s position... publicly... he showed no loyalty to his
    father.'
  - 'PERRIN: He wants to see his son... to heal any rifts that still remain... but
    now it may be too late.'
  - 'PICARD: Perrin... would you allow me to see Sarek?'
  - 'PERRIN: If it were anyone else... I would never permit it. But you are a part
    of him... and he of you...'
