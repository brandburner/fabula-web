  object_involvements:
  - object_uuid: ger_object_5fb1d011b0c0
    description_of_involvement: 'Data’s mission files on Romulan society are the focus
      of his relentless processing during the event. Displayed on a PADD or internal
      interface, these files include details on the Krocton Segment and other cultural
      specifics critical to their undercover operation. While Picard lies restless
      on the shelf-bed, Data’s absorption in the files—his unblinking focus and lack
