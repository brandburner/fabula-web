  key_dialogue: &id029
  - 'DATA: This is definitely the street on which the intelligence scan of Spock and
    Pardek was taken, sir... adjusting for the optical distortion, I am able to verify
    the architectural features...'
  - |-
    SOUP WOMAN: Why do you want to know?
    PICARD: I need his services... he was recommended.
    SOUP WOMAN: I haven't seen you here before.
    DATA: We are here for the day... from the city of Rateg.
    SOUP WOMAN: Rateg. I don't think so.
    DATA: It is a misconception that all Rategs speak with a particular inflection. In fact, there are twelve different -
    PICARD: ((interrupting)) We come from several kilometers outside the city...
  - |-
    ROMULAN#1: Do not move.
    PICARD: What? You've made a mistake...
    ROMULAN#1: Quiet. Come with us...
