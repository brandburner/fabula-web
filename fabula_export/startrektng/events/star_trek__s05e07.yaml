  title: K'Vada confronts Picard over Romulus mission
  description: 'On the Klingon Bird of Prey''s bridge, Captain K''Vada challenges
    Picard''s evasiveness about their covert course toward Romulus, deducing the mission''s
    true purpose: locating Ambassador Spock. Picard''s refusal to disclose details
    escalates tension, forcing K''Vada to confront the high-stakes implications of
    aiding a Romulan defector. The exchange tests Klingon-Romulan alliances and Picard''s
    resolve to prioritize Spock over diplomatic protocol, with K''Vada''s reluctant
    compliance underscoring the fragility of their alliance. Data''s presence on the
    bridge subtly reinforces the mission''s technical and analytical components, while
    K''Vada''s visceral opposition highlights the personal and political risks of
    the journey. The scene culminates in K''Vada setting a course for Romulus, marking
    the point of no return for Picard''s dangerous covert operation.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e07
  scene_sequence: 12
  sequence_in_scene: 21
  key_dialogue:
  - |-
    K'VADA: When I received my orders... I was not told where we were going.
    PICARD: That's right.
    K'VADA: I know my duty, Captain... when I'm given orders, I follow them. But I do not like secrets. I want to know why we are on this mission.
    PICARD: I'm sorry. It is a confidential matter.
  - |-
    K'VADA: You're going after the defector, aren't you?
    PICARD: Defector...
    K'VADA: You think information like that stays a secret? Ambassador Spock has gone to Romulus... and you're going after him.
    PICARD: Your orders are to take us to a set of coordinates near Romulus... and to bring us back. That is all I am prepared to discuss.
  - |-
    K'VADA: If we are discovered by the Romulans... it means death for all of us.
    PICARD: I realize that.
