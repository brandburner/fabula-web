    him the news that his son may have betrayed the Federation.'
  - 'RIKER: How well do you know Spock?'
  - 'PICARD: I met him only once... what I know of him comes from history books and
    of course the mind meld with his father... Sarek and Spock... Well, sometimes,
    fathers and sons...'
  - 'RIKER: ((from personal experience)) Understood.'
