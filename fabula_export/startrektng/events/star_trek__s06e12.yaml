      Starfleet’s stance on artificial life: if Moriarty’s sentience was an accident,
      creating another being like him would be a deliberate violation of their principles.
      Picard’s hesitation stems from his role as Starfleet’s representative, forcing
      him to weigh Moriarty’s emotional claims against the organization’s broader
      mandate to prevent ethical breaches. Starfleet’s absence from the scene is palpable—its
      rules are the unspoken third party in the conversation.'
    active_representation: Through Picard’s invocation of Starfleet’s ethical frameworks
      (‘The moral and ethical implications... are overwhelming’) and the *Enterprise*’s
      adherence to protocol (security oversight, system controls). Starfleet’s influence
      is also felt in the scientific uncertainty surrounding Moriarty’s sentience—‘we
      don’t know how or why you are able to exist off the Holodeck.’
    power_dynamics: Starfleet operates as the ultimate authority, constraining Picard’s
      ability to act outside its guidelines. Moriarty, in turn, is positioned as an
      existential challenge to Starfleet’s assumptions about life, sentience, and
      the holodeck’s capabilities. The power dynamic is one of institutional control
      versus individual desperation, with Picard caught in the middle.
    organizational_goals:
