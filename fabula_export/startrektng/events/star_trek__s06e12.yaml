    global_id: ger_object_fa182c2c78da
  - object_uuid: ger_object_86f9ef87fb5e
    description_of_involvement: "\n        The tool Data tosses to Geordi serves as\
      \ the first clue that something is amiss in the simulation. Geordi catches it\
