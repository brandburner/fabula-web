  title: Picard exploits Moriarty’s emotional vulnerability
  description: Picard strategically delays Moriarty’s demand to revive the Countess
    by appealing to his emotional attachment, exposing Moriarty’s deep love for her
    as both a tactical weakness and a moral dilemma. Moriarty’s hostility softens
    as Picard frames the delay as a protective measure, leveraging the Professor’s
    adoration into reluctant compliance. The moment underscores the power of sentiment
    in their high-stakes negotiation, with Picard’s calculated empathy forcing Moriarty
    to concede time—though the interruption by Riker’s bridge summons leaves their
    fragile truce unresolved. This exchange reveals Moriarty’s humanity beneath his
    criminal facade, while Picard’s manipulation highlights the ethical cost of his
    deception.
