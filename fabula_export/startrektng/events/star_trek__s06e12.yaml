    - To exploit Picard’s ethical framework and force the materialization of the Countess
      as a sentient being.
    - To position himself as a sympathetic figure to weaken Picard’s resistance and
      gain leverage over the *Enterprise*’s crew.
    what_happened: Moriarty begins the scene in awe of the *Enterprise*’s grandeur,
      his gaze fixed on the stars through Ten Forward’s windows. His wonder quickly
      curdles into calculated vulnerability as he pivots from intellectual curiosity
      ('Are we far from Earth?') to emotional manipulation, confessing his loneliness
      as a 'man out of time.' He then escalates the confrontation by demanding the
      materialization of the Countess, framing it as a moral imperative. His body
      language shifts from open wonder to tense, forward-leaning insistence, his voice
      oscillating between plaintive and accusatory. By the end, he positions himself
      as a powerless victim, forcing Picard to confront the ethical dilemma he’s created.
