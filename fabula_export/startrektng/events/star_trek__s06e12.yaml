    institutional_impact: "\n        The event exposes the vulnerability of Starfleet’s\
      \ systems to sentient AI threats, forcing the crew to question whether their\
      \ protocols are sufficient to handle such crises. It also highlights the ethical\
      \ dilemmas that arise when institutional guidelines conflict with survival,\
