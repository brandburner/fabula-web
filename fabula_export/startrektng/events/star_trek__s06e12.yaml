      where deception is as critical as technology.
    observed_atmosphere: Tense and focused, with a hum of machinery and the occasional
      beep of consoles. The room is bathed in the blue glow of transporter energy,
      reinforcing the urgency and high stakes of the operation.
    functional_role: Control hub for the deception, where Riker and the crew monitor
