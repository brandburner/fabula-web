  title: Riker confirms Enterprise escape
  description: 'On the *Enterprise* bridge, Riker—relieved but still tense—reports
    to Picard via comm that the ship has regained full control and is pulling away
    from the planet’s gravitational pull, averting collision. The exchange is clipped
    and functional, reflecting the urgency of the moment, but carries the weight of
    Picard’s earlier deception: Riker’s confirmation that the ship is free signals
    the success of Picard’s gambit to outmaneuver Moriarty. The dialogue is sparse
    but loaded with subtext—Riker’s focus on the immediate crisis (the six-minute
    countdown) contrasts with Picard’s unspoken awareness that the real victory lies
    in the illusion he’s constructed for Moriarty. This moment shifts the narrative
    from physical peril to psychological confrontation, as the crew’s survival now
    hinges on Moriarty’s reaction to the revelation of his confinement.'
