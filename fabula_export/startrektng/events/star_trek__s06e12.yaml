      inconsistencies.
    - To warn Picard of the catastrophic implications of having given Moriarty access
      to the *real* *Enterprise* via command codes.
    what_happened: "\n        Data’s role in this event is twofold: first, as the\
      \ observer who deduces the Holodeck simulation through logical inconsistencies\
      \ (Geordi’s left-handedness, the combadge’s ricochet, the transporter’s failure),\
      \ and second, as the messenger who delivers the devastating truth to Picard.\
      \ His physical actions—hurling his combadge, catching Geordi’s tool, and analyzing\
      \ the transporter logs—are precise and deliberate, each serving as evidence\
      \ to support his conclusion. Data’s urgency is not born of fear but of the need\
      \ to act before Moriarty’s control becomes irreversible. His final warning—that\
      \ Picard may have given Moriarty access to the *real* *Enterprise*—is delivered\
      \ with a gravity that underscores the stakes.\n      "
