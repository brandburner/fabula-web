  sequence_in_scene: 36
  key_dialogue:
  - 'DATA: Through deduction. Lieutenant Barclay and I tried to transport a simulated
    object off the Holodeck -- something that has never been attempted. But since
    the transporter itself was just a simulation, the computer had no real data from
    which to create a transport log.'
  - 'PICARD: Computer, discontinue program.'
  - 'PICARD: Computer, exit.'
  - 'DATA: It appears that Moriarty has programmed the Holodeck to accept only his
    commands.'
  - 'PICARD: Mister La Forge, will you excuse us please?'
  - 'PICARD: Data... who is real here?'
  - 'DATA: You and I are real, as is Lieutenant Barclay. We entered the Holodeck together
    when we first went to see Moriarty.'
  - 'PICARD: I just gave my command codes to the computer... thinking I was regaining
    control of the ship.'
  - 'DATA: You may have inadvertently given Professor Moriarty the means of gaining
    control of the real Enterprise.'
