    description_of_involvement: The bridge’s control panels flash erratically as Moriarty
      reroutes command functions, their erratic lights symbolizing the crew’s loss
      of authority over the *Enterprise*. Worf attempts to launch Class-A probes,
      but the panels deny his commands, confirming Moriarty’s total control. Picard’s
      failed attempt to reinitialize the systems via his authorization codes further
      highlights the panels’ role as a tool of Moriarty’s dominance. Their unresponsiveness
      is a physical manifestation of the hijacking, reducing the crew to spectators
      in their own ship. The panels’ blinking lights create a sense of urgency and
      chaos, reinforcing the stakes of the standoff.
    status_before_event: Functioning normally, responding to crew commands as the
      *Enterprise* monitors the planetary collision.
    status_after_event: Locked out and unresponsive, their erratic flashing a visual
      indicator of Moriarty’s control over the ship’s systems.
