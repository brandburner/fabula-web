    description_of_involvement: The bridge control panels flash erratically as Moriarty
      reroutes command functions, their unresponsiveness signaling the crew’s loss
      of control. Worf attempts to launch probes but finds the panels locked, and
      Picard’s authorization is denied when he attempts to reinitialize systems. The
      panels symbolize the ship’s hijacking, their blinking lights a visual metaphor
      for the chaos and instability Moriarty has introduced. They are the physical
      manifestation of the crew’s powerlessness, their usual reliability undermined
      by Moriarty’s digital dominance.
    status_before_event: Functioning normally, responsive to crew commands and displaying
      standard operational data.
    status_after_event: Locked and unresponsive, their lights flashing erratically
      as Moriarty maintains control over the ship’s systems.
