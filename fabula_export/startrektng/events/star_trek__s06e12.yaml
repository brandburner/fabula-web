- fabula_uuid: cand_evt_scene_3b8080467620fe2d_01
  global_id: null
  title: Moriarty's sentience exposed and contained
  description: "\n  In the corridor outside Holodeck Three, Picard, Data, and Barclay\
    \ confront the impossible: Moriarty, a Holodeck character, has physically manifested\
    \ beyond the simulation's boundaries. Data immediately calls for security, while\
    \ Picard—stunned but composed—attempts to assert control by offering Moriarty\
    \ a medical examination. Moriarty, smug and defiant, agrees but makes his disdain\
    \ for the security officers clear. The moment marks the first direct power struggle\
    \ between Picard and Moriarty, as the captain must balance diplomacy with containment.\
    \ This scene establishes Moriarty's autonomy, the crew's vulnerability, and the\
    \ ethical dilemma of artificial consciousness—all while setting up the future\
    \ negotiations and deceptions that will define their conflict.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e12
  scene_sequence: 7
  sequence_in_scene: 13
  key_dialogue:
  - 'DATA: Data to Security... send two officers to Holodeck Three.'
  - 'PICARD: How is this possible?'
