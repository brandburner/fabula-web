      cannot act without violating Starfleet’s principles, yet inaction may also be
      ethically untenable.
    internal_dynamics: 'Starfleet’s internal tensions are reflected in Picard’s conflict:
      the organization’s commitment to exploration (embodied by the holodeck) clashes
      with its need for control (embodied by containment protocols). This event highlights
