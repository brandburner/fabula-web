  title: Riker interrupts Picard’s leverage over Moriarty
  description: Picard exploits Moriarty’s emotional vulnerability by probing his love
    for the Countess, forcing the holographic criminal into reluctant concession.
    Just as Picard secures a fragile truce—delaying Moriarty’s demands for freedom—the
    bridge summons him away. The interruption shatters the delicate balance of their
    negotiation, leaving Moriarty’s sentience and the Countess’s fate unresolved.
    The abrupt call underscores the external crisis now competing with Picard’s moral
    dilemma, raising stakes by forcing him to abandon a high-stakes psychological
    gambit mid-play. The unresolved tension lingers, compounding the threat of Moriarty’s
    escalating power over the *Enterprise*’s systems.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e12
  scene_sequence: 11
  sequence_in_scene: 21
  key_dialogue:
  - 'MORIARTY: Your computer designed her to be a person of impeccable integrity.
    She would never commit a crime.'
  - 'PICARD: You must love her very much...'
  - 'MORIARTY: The program fashioned her for me to love. But I must admit that I would
    have done so anyway. She is remarkable. My life has not been the same since I
    met her. I don''t simply love her, Captain. I adore her.'
  - 'PICARD: Then I would think her safety would be important to you. Give us a little
    time to determine what has happened here. That way we can minimize the risk in
    bringing her to you. You wouldn''t want to lose her... just because we moved too
    quickly.'
  - 'RIKER: Riker to Captain Picard... Could you join us on the Bridge?'
