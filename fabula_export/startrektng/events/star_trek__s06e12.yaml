  - 'MORIARTY: I no longer believe anything you say. When this is over you''ll walk
    out of this room, to the real world and your own concerns... and leave me here,
    trapped in a world I know to be nothing but illusion. I cannot bear that. I must
    leave.'
  - 'PICARD: You must believe me, Professor. If you step outside that door, you will
    cease to exist.'
  - 'MORIARTY: If I am nothing more than a computer simulation, then very little will
    have been lost. But if I''m right... Mind over matter... cogito ergo sum...'
  - 'MORIARTY: I think... therefore I am...'
