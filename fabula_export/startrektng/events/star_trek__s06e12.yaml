    will collide in less than five hours and explode to form a new star. If we don''t
    have navigational control, we won''t be able to maintain a safe distance—and this
    vessel will be destroyed.'
  - 'MORIARTY: Not alone. Not without the Countess.'
  - 'PICARD: Mister Data... investigate the possibility of doing what Professor Moriarty
    has asked.'
