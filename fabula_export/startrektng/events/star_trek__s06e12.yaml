  global_id: null
  title: Moriarty renegotiates under false pretenses
  description: 'After rematerializing in the transporter room—now physically real
    but still trapped in Picard’s deception—Moriarty and the Countess celebrate their
    perceived freedom, only for Moriarty to immediately pivot from gratitude to manipulation.
    He dismisses Riker’s demand for command code release, instead escalating his demands
    to a shuttlecraft, leveraging his control of the *Enterprise* as leverage. The
    exchange exposes Moriarty’s true nature: a master of psychological warfare who
    exploits even moments of supposed victory to tighten his grip. Riker’s frustration
    underscores the crew’s desperation, as Moriarty’s shifting priorities force them
    into a high-stakes impasse where every concession risks deeper entrapment. The
    scene hinges on the tension between illusion and reality—Moriarty believes he’s
    won, but the crew’s deception remains unseen, setting the stage for his eventual
    downfall.'
