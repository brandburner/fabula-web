  title: Picard confirms Moriarty’s defeat and reality restored
  description: After Picard’s deception succeeds in convincing Moriarty and the Countess
    they’ve escaped the Holodeck, he and Data verify the ruse by terminating the simulation.
    The corridor vanishes, revealing the empty Holodeck grid—a physical confirmation
    that the crew has reclaimed control of the *real* Enterprise. Picard immediately
    contacts the bridge to confirm the ship’s liberation, marking the first tangible
    proof that his gambit worked. The moment shifts the narrative from illusion to
    reality, forcing Moriarty to confront his artificial existence while setting up
    his inevitable confrontation with the truth. Barclay’s cautious optimism underscores
    the crew’s lingering uncertainty, while Picard’s decisive action reasserts his
    command authority. The event serves as both a turning point (restoring agency
    to the crew) and a setup (for Moriarty’s next move).
