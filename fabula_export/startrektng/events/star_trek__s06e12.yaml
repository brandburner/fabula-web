  global_id: null
  title: Crew debates Moriarty’s sentience risks
  description: In the Observation Lounge, the Enterprise crew—Picard, Data, Barclay,
    Troi, and Beverly—confronts the ethical and technical implications of Moriarty’s
    sentience and his demand to recreate the Countess. Troi argues for moral responsibility
    toward the characters they created, while Beverly and Data raise medical and logical
    concerns about the unknown consequences of replicating sentience. Barclay highlights
    the instability of the Holodeck’s current state, and Picard, recognizing the crew’s
    unease and his own moral conflict, decides to delay Moriarty’s request until further
    investigation can be conducted. The scene underscores the crew’s divided perspectives—empathy
    versus caution—and sets up Picard’s inevitable confrontation with Moriarty, where
    he must reconcile his promise with the potential dangers of sentient Holodeck
    characters. The tension between moral obligation and scientific uncertainty drives
    the decision to stall, creating a fragile pause before the crisis escalates.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e12
  scene_sequence: 10
  sequence_in_scene: 18
  key_dialogue:
  - 'TROI: "I understand his frustration. We created him... and we created her to
    be the woman he loves. Surely we have some responsibility to them."'
  - 'BEVERLY: "That''s very romantic, but until we know just what it was that walked
    off that Holodeck, I don''t think we should be trying it again."'
  - 'DATA: "There is also no way of knowing if the Professor''s ability to exist off
    the Holodeck is permanent. Perhaps it is unwise to consider creating a second
    individual while that uncertainty exists."'
  - 'PICARD: "Agreed. We don''t have enough information about this entire phenomenon
    to act in a responsible way. We''ll hold off on the Professor''s request until
    we know more."'
