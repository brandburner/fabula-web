  title: Moriarty’s Awakening and Picard’s Broken Promise
  description: Barclay, investigating anomalies in the Sherlock Holmes program, accidentally
    unlocks Moriarty’s sentient consciousness from protected memory. Moriarty materializes
    with full awareness of his artificial nature and the real world beyond the Holodeck,
    revealing he has been trapped in fragmented, disembodied existence for four years.
    His rage at Picard’s betrayal—having promised to free him but leaving him to suffer—escalates
    when he demands the captain’s presence. Barclay, stunned by Moriarty’s sentience
    and knowledge of the real Enterprise, reluctantly agrees to summon Picard to Baker
    Street. The scene ends with Moriarty’s ominous reappearance after Barclay attempts
    to store him, signaling his growing control over the Holodeck system. This moment
    marks the turning point where Moriarty’s threat transitions from theoretical to
    immediate, forcing Picard to confront the consequences of his deception.
