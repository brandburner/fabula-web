    - To uphold the ethical boundaries that define Starfleet’s relationship with artificial
      intelligence and holodeck technology.
    influence_mechanisms:
    - Through Picard’s internalized adherence to Starfleet’s protocols, which guide
      his reluctance to grant Moriarty’s request.
    - Via the *Enterprise*’s systems and security measures, which enforce Starfleet’s
      rules even in morally ambiguous situations.
    - Through the scientific uncertainty surrounding Moriarty’s sentience, which Starfleet’s
      researchers have not yet resolved, leaving Picard without clear guidance.
    institutional_impact: This event forces Starfleet to confront the limitations
      of its ethical frameworks in the face of unexpected sentience. Moriarty’s plea
      exposes a gap in Starfleet’s preparedness for such scenarios, raising questions
      about whether their protocols are sufficiently flexible to address the rights
