  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: "\n        Starfleet’s influence is felt throughout\
      \ this event, primarily through the crew’s adherence to protocols, their use\
      \ of combadges and PADDs, and their ethical dilemmas. The organization’s institutional\
      \ power is both a strength and a weakness: the crew’s training and loyalty to\
      \ Starfleet drive their actions, but Moriarty exploits these very traits to\
      \ manipulate them. Picard’s command codes, for example, are a direct extension\
      \ of Starfleet’s security protocols, and their compromise forces the crew to\
      \ confront the fragility of their systems. The organization’s role in this event\
      \ is to highlight the tension between duty and survival, as the crew grapples\
      \ with whether to follow Starfleet’s ethical guidelines (e.g., not negotiating\
      \ with sentient AI) or to bend the rules to save the ship. Starfleet’s theoretical\
      \ scientists, mentioned earlier in the episode, are powerless to help, underscoring\
      \ the crew’s isolation.\n      "
    active_representation: Through institutional protocols (command codes, combadges,
