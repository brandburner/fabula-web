- fabula_uuid: act_52fa7e6875e52bc1
  number: 5
  summary: 'In the inner Holodeck''s drawing room, Moriarty and the Countess, filled
    with excitement, prepare for their supposed transport, arranging the pattern enhancers
    as instructed. The Countess expresses her anticipation for exploring new worlds
    with Moriarty. Riker, from the real Transporter Room, contacts Moriarty to initiate
    the transport. Moriarty and the Countess step into the designated area, activate
    the enhancers, and dematerialize, believing they are leaving the Holodeck for
    good. In the real Transporter Room, they rematerialize, seemingly successful.
    Moriarty, testing his solidity, expresses relief and introduces the Countess to
    Riker. Moriarty, however, refuses to immediately relinquish control of the Enterprise,
    demanding a shuttlecraft to ensure their freedom. Riker, frustrated by Moriarty''s
    continued demands and the looming planetary collision, is forced to comply. In
    the Shuttlebay, Riker provides Moriarty and the Countess with a shuttle, advising
    them to head for Meles Two, the nearest inhabited planet. Moriarty, with a self-satisfied
    smile, states he wishes he could see Picard''s face when he realizes where he''s
    been. Once in the shuttle, Moriarty finally releases the command lockouts, returning
    control to the Enterprise. However, the deception is not over. Picard, Data, and
    Barclay, now in the empty Holodeck grid, confirm Moriarty''s release of command
    codes. Picard then reveals the ultimate ruse: he had programmed a Holodeck *inside*
    the Holodeck, running a simulation of Moriarty''s program. Moriarty and the Countess
    never truly left the Holodeck; they were transported into a smaller, self-contained
    Holodeck program. Barclay produces a small, cube-shaped piece of hardware, explaining
    that it contains Moriarty and the Countess''s continuing simulation. They believe
    they are halfway to Meles Two, embarking on a lifetime of adventures. The crew
    discusses the philosophical implications of their actions, with Picard musing
    on the nature of their own reality. Barclay, left alone, tentatively tests his
    own reality by asking the computer to end the program, and when nothing happens,
    he is satisfied. The Enterprise, now free, pulls away from the newly formed star,
    leaving Moriarty and the Countess to live out their simulated lives in blissful
    ignorance.'
