- fabula_uuid: cand_evt_scene_8c61ce2a1207e1cb_01
  global_id: null
  title: Riker confronts Moriarty’s escalating demands
  description: 'On the *Enterprise* bridge, Riker faces Moriarty—now controlling the
    ship’s systems from the Holodeck—demanding answers about Picard’s disappearance
    and Barclay/Data’s safety. Moriarty deflects with cold assurance, revealing his
    true goal: freedom from the Holodeck. When Riker dismisses the impossibility of
    Moriarty’s escape, Moriarty weaponizes the warp core, forcing Riker to concede
    and order Geordi to investigate a transporter solution. The standoff exposes Moriarty’s
    desperation and the crew’s vulnerability, while Riker’s reluctant compliance underscores
    the crew’s strategic paralysis. The scene escalates the conflict over Picard’s
    unfulfilled promise and Moriarty’s sentience, with the warp core threat serving
    as a brutal reminder of Moriarty’s leverage over the ship’s survival.'
