  - object_uuid: ger_object_7b42f0cf6757
    description_of_involvement: 'The *Enterprise*’s central computer is the invisible
      puppet master in this scene, its systems hijacked by Moriarty to release command
      lockouts. Though not physically present, its voice—mediated through the shuttlecraft’s
      interface—confirms the execution of Moriarty’s orders. This object represents
      the ultimate tool of his deception, a digital dungeon that once imprisoned him
      now bending to his will. Its compliance underscores the theme of control: Moriarty,
      once a prisoner of the system, now wields it to orchestrate his escape—only
      to be trapped in another layer of illusion.'
    status_before_event: Operational, locked under Starfleet protocols, with Moriarty’s
      sentience stored in its memory banks.
    status_after_event: Command lockouts released, temporarily under Moriarty’s control,
      though Picard’s ultimate deception remains unseen.
    global_id: ger_object_7b42f0cf6757
  - object_uuid: ger_object_e06ca2f36465
    description_of_involvement: 'The shuttlecraft serves as a fleeting sanctuary for
      Moriarty and the Countess, its compact interior framing their intimate exchange
      against the backdrop of the starfield. The vessel’s dim consoles and humming
      systems create a cocoon of isolation, amplifying the fragility of their momentary
      freedom. Moriarty uses the shuttle’s computer interface to connect with the
      *Enterprise*’s central systems, executing his command to release lockouts—a
      critical step in his deception. The shuttle’s role is symbolic: a vessel of
      false liberation, drifting in the void between the Holodeck and the unknown.'
    status_before_event: Docked in the *Enterprise*’s shuttlebay, pre-programmed for
