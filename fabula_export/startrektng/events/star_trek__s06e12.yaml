  - character_uuid: ger_agent_0e5c114935a9
    emotional_state: "\n        Analytically focused with a sense of urgency. Data’s\
      \ emotional state is one of intense concentration, but there is a subtle undercurrent\
      \ of concern. He is not afraid, but he understands the implications of his deductions,\
      \ and his delivery reflects the weight of the moment. His warning to Picard\
