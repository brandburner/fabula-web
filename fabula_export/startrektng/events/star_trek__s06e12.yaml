    global_id: ger_object_86f9ef87fb5e
  - object_uuid: ger_object_f50f56564de0
    description_of_involvement: "\n        Picard’s command codes—Epsilon-seven-nine-three—are\
      \ the pivotal object in this event, as their input grants Moriarty access to\
      \ the *real* *Enterprise*. Picard enters them in a moment of desperate hope,\
      \ believing he is regaining control, but the computer’s response (‘Command codes\
      \ verified’) is Moriarty’s victory. The codes are not just a password; they\
      \ are the key to the *real* ship, and their revelation forces Picard to confront\
      \ the ethical and tactical nightmare of having handed Moriarty the means to\
      \ escape the Holodeck. The codes’ role is catastrophic, as they turn Picard’s\
      \ authority against him, making him an unwitting accomplice in Moriarty’s plan.\
      \ Their input is the moment the crew’s vulnerability is laid bare, and the stakes\
      \ of the planetary collision become secondary to the threat of Moriarty’s sentience.\n\
      \      "
    status_before_event: "\n        Known only to Picard and the *Enterprise*’s highest-ranking\
      \ officers, stored securely in his memory and intended for emergency use.\n\
      \      "
    status_after_event: "\n        Compromised and in Moriarty’s control, now a weapon\
