  scene_sequence: 30
  sequence_in_scene: 57
  key_dialogue:
  - 'RIKER: How did you do it, sir?'
  - 'PICARD: We were able to program the Holodeck inside the Holodeck, and use the
    same ruse on Moriarty that he used on us.'
  - 'TROI: You mean he never realized that he hadn’t left the Holodeck?'
  - 'PICARD: ((gestures to the cube)) The simulation is continuing even now, inside
    that cube.'
  - 'PICARD: They’ll live out their lives... and never know the difference.'
  - 'TROI: ((smiles)) So in a sense... you did give Moriarty what he wanted.'
  - 'PICARD: ((gestures around him)) In a sense. And... who knows—our reality might
    not be all that different from theirs. All this... might be nothing more than
    an elaborate simulation being run inside a little device... sitting on someone
    else’s table...'
