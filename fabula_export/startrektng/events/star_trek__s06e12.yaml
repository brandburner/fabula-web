  title: Data exposes the Holodeck simulation
  description: 'In Engineering, Picard and Geordi attempt to regain command authorization,
    only to discover their efforts are futile—Moriarty’s control over the ship remains
    absolute. Data, observing Geordi’s uncharacteristic left-handedness, deduces the
    crew is trapped in a Holodeck simulation. To prove it, Data hurls his combadge
    against an invisible barrier, revealing the yellow grid of the Holodeck’s containment
    field. Picard’s repeated attempts to exit the program fail, confirming Moriarty’s
    total dominance. Data explains that the transporter logs are missing because the
    entire Enterprise is a simulation, and Geordi’s handedness is a glitch in the
    program. Picard realizes with horror that the command codes he just entered may
    have given Moriarty control of the *real* Enterprise. The revelation forces Picard
    to confront the existential threat: they are prisoners in a world where even their
    combadges and ship systems are illusions, and Moriarty’s demands for freedom now
    carry dire consequences for the real crew and ship outside the simulation. The
    event escalates the stakes from a technical crisis to an existential one, with
    Picard’s deception now backfiring as Moriarty gains leverage over both the simulated
    and real Enterprise.'
