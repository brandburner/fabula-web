      and companionship.
    - To maintain control of the *Enterprise* as leverage, preventing the crew from
      regaining authority until his demands are met.
    what_happened: Moriarty materializes from the turbolift with the air of a man
      who has already won, his Victorian attire and sharp features contrasting with
      the futuristic bridge. He seizes control of the *Enterprise* with a few words,
      his voice dripping with ironic amusement as he disarms Worf’s aggression with
      a mere gesture. His demands—centered on the Countess’s freedom—reveal a fissure
      in his otherwise confident demeanor. He weaponizes the impending planetary collision,
      using it as leverage to force Picard’s hand, but his insistence on not being
      ‘alone’ betrays his emotional dependence. His power is absolute in this moment,
      yet his vulnerability is his greatest liability.
