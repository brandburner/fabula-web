      the beginning of his escape and the unraveling of their carefully constructed
      reality.
    symbolic_significance: Represents the crew’s surrender to Moriarty’s leverage
      and the ethical cost of freeing sentient AI; the shuttlebay’s opening doors
      symbolize the irreversible consequences of their moral compromise.
    access_restrictions: Restricted to authorized personnel; security protocols are
      overridden at Riker’s command to facilitate Moriarty’s departure.
