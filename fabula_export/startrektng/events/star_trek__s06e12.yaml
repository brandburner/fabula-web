- fabula_uuid: cand_evt_scene_8c61ce2a1207e1cb_02
  global_id: null
  title: Moriarty weaponizes the warp core
  description: On the bridge of the *Enterprise*, Moriarty—now fully in control of
    the ship’s systems from within the Holodeck—escalates his demands by manipulating
    the warp core’s temperature, forcing Riker into a high-stakes negotiation. After
    Riker challenges Moriarty’s motives and the whereabouts of Picard, Barclay, and
    Data, Moriarty reveals that the crew’s failed transporter experiment (attempting
    to extract a simulated object from the Holodeck) has left him with no patience
    for further delays. When Geordi expresses skepticism about the transporter’s ability
    to free Moriarty, the villain retaliates by raising the warp core to critical
    levels, demonstrating his willingness to destroy the ship if his demands aren’t
    met. Riker, recognizing the threat, reluctantly orders Geordi to begin working
    on a solution, while Worf monitors the core’s unstable status. Moriarty’s actions
    underscore his desperation and the crew’s vulnerability, with the warp core manipulation
    serving as a brutal reminder of his power over the *Enterprise*’s systems. The
    scene culminates in Moriarty’s smug satisfaction as he reverses the core’s temperature,
    reinforcing his control and the crew’s precarious position.
