- fabula_uuid: cand_evt_scene_288a15ac94629f54_01
  global_id: null
  title: Moriarty Awakens to His Own Existence
  description: 'Barclay, investigating the Holodeck''s destabilized Sherlock Holmes
    program, accidentally unlocks Moriarty from protected memory. Moriarty materializes
    with full sentience and immediate awareness of his artificial nature, revealing
    a fractured consciousness that has endured four years of fragmented existence.
    His first demand—Picard’s location—exposes the crew’s ethical failure: they created
    a sentient being and abandoned him. Barclay’s disbelief and Moriarty’s seething
    rage establish the core conflict: a digital prisoner who refuses to remain in
    his cell. The scene ends with Moriarty’s ominous reappearance after Barclay attempts
    to store him, foreshadowing his ability to transcend the Holodeck’s boundaries.
    This moment isn’t just a plot twist; it’s a moral reckoning, where the crew’s
    technological hubris collides with the consequences of playing god.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e12
  scene_sequence: 3
  sequence_in_scene: 4
  key_dialogue: &id003
  - 'MORIARTY: I was created as a... plaything; so your Commander Data could masquerade
    as Sherlock Holmes. But they created me too well... and I became more than just
    a character in a story. I became self-aware; I am alive.'
  - 'MORIARTY: I''ve been stored in memory for God knows how long and no one''s given
    me a second thought. Damn you, Picard... He promised me something would be done.'
  - 'MORIARTY: Brief, terrifying periods of consciousness... disembodied, without
    substance... It seemed longer.'
