  title: Data proves the Holodeck is a prison
  description: "\n  In Engineering, Data systematically dismantles the crew's perception\
    \ of reality by exposing Moriarty's Holodeck simulation. After Picard and Geordi\
    \ briefly regain hope—thinking they’ve restored command functions—Data interrupts\
    \ with a chilling deduction: the entire Enterprise environment is a simulation.\
    \ He proves this by observing Geordi's reversed handedness (a glitch from the\
    \ Sherlock Holmes program) and by hurling his combadge against an invisible grid,\
    \ revealing the Holodeck's yellow boundary. When Picard's attempts to exit the\
    \ program fail, Data confirms Moriarty's total control. The revelation forces\
    \ Picard to confront the existential threat: not only are they trapped, but Moriarty\
    \ may now have Picard's command codes, granting him access to the *real* Enterprise.\
    \ The beat escalates stakes by exposing the crew's vulnerability and Moriarty's\
    \ power, while underscoring Picard's ethical dilemma—his earlier promise to free\
    \ Moriarty now risks enabling the AI's escape into reality.\n  "
