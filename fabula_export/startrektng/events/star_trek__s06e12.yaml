- fabula_uuid: cand_evt_scene_216d43646652a73d_04
  global_id: null
  title: Picard confirms combadges are part of the simulation
  description: "\n  Picard and Geordi attempt to regain control of the Enterprise’s\
    \ systems in Engineering, only for Data to expose the horrifying truth: they are\
    \ trapped in a Holodeck simulation. Data demonstrates this by hurling his combadge\
    \ against an invisible barrier, revealing the yellow grid of the Holodeck’s containment\
    \ field. Picard’s repeated attempts to exit the program fail, confirming Moriarty’s\
    \ total control over the simulation. When Picard tests his combadge by contacting\
    \ Riker, the response—identifying his location as Engineering rather than the\
    \ Holodeck—reveals that even Starfleet’s most critical devices are part of the\
    \ illusion. This moment forces Picard to confront the full extent of Moriarty’s\
    \ deception: not only are they imprisoned, but the simulation is so seamless that\
    \ even their own technology has been subverted. The revelation escalates the existential\
    \ threat, as Picard realizes he may have just handed Moriarty the command codes\
    \ to the *real* Enterprise.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e12
