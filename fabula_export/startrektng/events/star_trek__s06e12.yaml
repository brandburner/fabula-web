acts:
- fabula_uuid: act_e421f0561d488447
  number: 1
  summary: 'The narrative begins in a Sherlock Holmes holodeck program, where Data,
    playing Holmes, makes an error, prompting Geordi to call Lieutenant Barclay to
    investigate the holodeck''s malfunction. Barclay discovers a protected memory
    section within the program, which unexpectedly materializes Professor Moriarty.
    Moriarty, exhibiting full self-awareness and recalling his previous encounter
    with Captain Picard, expresses profound anger at being stored for four years and
    demands to speak with Picard, believing Picard had promised him freedom from the
    simulation. Barclay, stunned by Moriarty''s sentience, attempts to store him again,
    but Moriarty demonstrates an ability to override the system, foreshadowing his
    formidable capabilities. The main act opens with Captain Picard''s log entry,
    detailing the Enterprise''s mission to observe a rare celestial event. Barclay
    informs Picard and Data of Moriarty''s reappearance and his demand for a meeting.
    Picard, accompanied by Data and Barclay, enters the Holodeck to confront Moriarty.
    Moriarty immediately challenges Picard, accusing him of neglecting his promise
    to find a way for him to leave the Holodeck. Picard explains that Starfleet''s
    most brilliant minds have failed to find a solution and expresses concern over
    Moriarty''s claim of experiencing the passage of time while in storage. Moriarty
    dismisses these explanations, asserting his determination to escape the illusion.
    Picard attempts to prove the impossibility of Holodeck matter existing outside
    the simulation by throwing a book into the corridor, where it promptly disintegrates.
    Moriarty, however, remains unconvinced, believing his consciousness and will can
    transcend physical limitations. Despite Data''s scientific objections and Picard''s
    warnings of non-existence, Moriarty boldly steps into the ship''s corridor and
    remains corporeal, astonishing everyone present and establishing his unprecedented
    ability to manifest in the ''real'' world. This act effectively sets up the central
    conflict: Moriarty''s demand for freedom and his unexpected power to challenge
    the fundamental laws of their reality.'
