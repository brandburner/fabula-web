    emotional_state: Initially hostile and accusatory, but rapidly shifting to vulnerable
      sincerity when discussing the Countess, only to be jolted back into tension
      by the interruption. His emotional state is a volatile mix of defensiveness,
      adoration, and reluctant concession.
    goals:
    - To secure the Countess’s safety and ensure her sentience is preserved
    - To negotiate his own freedom from the Holodeck while maintaining control over
      the *Enterprise*’s systems
    what_happened: Moriarty begins the scene in a state of simmering hostility, his
      posture rigid and voice laced with bitterness as he accuses Picard of delay
      and inaction. When Picard probes his relationship with the Countess, Moriarty’s
      defensiveness spikes—his tone sharpens, and he insists on her 'impeccable integrity'
      as if to shield her from suspicion. However, as Picard presses further, Moriarty’s
      demeanor shifts dramatically. His voice softens, his gaze lowers, and his language
      becomes poetic and unguarded as he describes his adoration for the Countess.
      The mention of her safety momentarily disarms him, and he gives Picard a 'long
      look' before lowering his eyes in implied acquiescence. This vulnerability is
      abruptly interrupted by Riker’s comlink summons, snapping Moriarty back into
      tension as Picard exits, leaving their negotiation unresolved.
