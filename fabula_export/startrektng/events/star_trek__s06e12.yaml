    - The sterile glow of the Arch Monitor, casting a cold light over the control
      panel and Barclay’s anxious face
    - The hum of the Holodeck’s systems, a constant reminder of the technological
      power at play
    - The yellow grid lines of the Holodeck matrix, visible when Moriarty materializes,
      symbolizing the fragile boundaries between simulation and reality
    - The control panel’s touch pads and voice command nodes, the tools Barclay uses
      to unlock Moriarty and later attempt to contain him
