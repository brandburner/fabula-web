- fabula_uuid: act_677e38020cbf7639
  number: 2
  summary: 'Following Moriarty''s impossible exit from the Holodeck, Picard, Data,
    and Barclay join him in the corridor, struggling to comprehend how he maintained
    corporeality. Data calls for Security, and Picard arranges for Dr. Beverly Crusher
    to examine Moriarty. In Sickbay, Beverly''s scans confirm Moriarty''s physical
    reality as a human, albeit with unusual DNA, and note that his quantum signatures
    differ significantly from typical Holodeck simulations, indicating a permanent
    form. Geordi, using his VISOR, also confirms Moriarty''s molecular cohesion. Picard
    acknowledges Moriarty''s ''miracle'' but questions his future. Moriarty, eager
    to explore his new reality, expresses a desire to understand the ship and its
    purpose. Picard takes Moriarty to Ten Forward, where Moriarty expresses awe at
    the stars and the vastness of space. He begins to plan his new life, but Picard
    warns him against criminal behavior, which Moriarty dismisses as a fictional past.
    Moriarty then reveals a profound sense of loneliness as a ''man out of time''
    and makes an unexpected request: to bring the Countess Regina Bartholomew, a Holodeck
    character designed as his love, into reality. Picard refuses, citing the unknown
    nature of Moriarty''s transformation and the overwhelming ethical implications
    of deliberately creating a new life form without understanding the process. Moriarty
    argues passionately, accusing Picard of denying him love for the sake of his conscience.
    In a subsequent meeting in the Observation Lounge, Picard, Data, Beverly, Troi,
    and Barclay discuss Moriarty''s request. While Troi sympathizes, Beverly and Data
    caution against creating another life form given the uncertainties. Picard decides
    to postpone the request, prioritizing further investigation. Later, in Moriarty''s
    quarters, Picard attempts to reason with him, suggesting a delay to ensure the
    Countess''s safety. Moriarty, though initially resistant, shows vulnerability
    when discussing his deep love for the Countess, appearing to acquiesce. However,
    this apparent agreement is a ruse. Picard is called to the Bridge, where the two
    gas giants are nearing collision. Suddenly, command functions on the Bridge fail,
    and Picard''s voice authorization is denied. Moriarty appears, revealing he has
    seized control of the Enterprise, escalating his demand for the Countess''s release
    into a direct threat against the ship and crew.'
