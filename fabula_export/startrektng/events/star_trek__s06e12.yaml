  - object_uuid: ger_object_49e06c6f0254
    description_of_involvement: The viewscreen dominates the bridge, its dark glass
      surface displaying the looming collision of the two gas giants—a visual metaphor
      for the impending doom facing the *Enterprise*. Picard gestures toward it during
      his standoff with Moriarty, using the imagery to underscore the urgency of the
      situation and the consequences of Moriarty’s hijacking. The planets’ turbulent
      atmospheres and the distorting gravity well serve as a ticking clock, reinforcing
      the high stakes of the negotiation. Moriarty, however, remains unmoved by the
      visual threat, his confidence in his own leverage overshadowing the cosmic danger.
      The viewscreen thus functions as both a clue (the crew’s original mission) and
      a symbol (the fragility of their control over the ship).
