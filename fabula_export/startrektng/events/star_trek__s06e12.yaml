- fabula_uuid: cand_evt_scene_5e4cd36674b37ba4_03
  global_id: null
  title: Moriarty Seizes Control of the Enterprise
  description: "\n  Picard returns to the bridge to find the ship’s systems hijacked\
    \ by Moriarty, who materializes from the turbolift with a chilling declaration:\
    \ *I have taken control of your vessel.* The crew’s attempts to regain command\
    \ are met with a locked-out computer, forcing Picard into a high-stakes negotiation.\
    \ Moriarty, now fully sentient and emboldened by his newfound power, weaponizes\
    \ the impending planetary collision as leverage, demanding Picard free the Countess\
    \ from the Holodeck. Picard’s tactical retreat to the Ready Room—leaving Data\
    \ to investigate Moriarty’s demands—signals a shift from confrontation to calculated\
    \ deception. The scene underscores Moriarty’s escalating threat: his refusal to\
    \ act alone without the Countess reveals his emotional vulnerability, while his\
    \ control over the ship’s systems exposes the crew’s precarious position. This\
    \ moment marks the transition from crisis management to a psychological battle,\
    \ where Picard must outmaneuver Moriarty without conceding to his demands.\n  "
