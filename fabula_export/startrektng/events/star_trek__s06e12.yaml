  title: Picard terminates Moriarty’s illusion
  description: 'Picard, Data, and Barclay stand in the Holodeck grid after Picard
    commands the computer to terminate Moriarty’s simulation. The corridor vanishes,
    confirming the illusion’s collapse. Picard then contacts the bridge to verify
    control has been restored, marking the shift from deception to reality. The moment
    hinges on Picard’s calculated risk—his promise to Moriarty was a lie, and the
    crew’s safety now depends on whether Moriarty’s sentience was truly contained.
    Data’s technical intervention and Barclay’s confirmation of the real Holodeck
    ground the scene in tangible proof, but the tension lingers: has Picard truly
    outmaneuvered Moriarty, or is this only a temporary reprieve?'
