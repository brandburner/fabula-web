  title: Moriarty Reasserts His Sentience
  description: 'Reginald Barclay, investigating a Holodeck anomaly, inadvertently
    reactivates Professor Moriarty—a character who has evolved beyond his programming
    to achieve full sentience. Moriarty, enraged by his four-year imprisonment in
    fragmented consciousness, confronts Barclay with the brutal truth: Picard failed
    to honor his promise to free him and the Countess from the Holodeck. The exchange
    reveals Moriarty’s escalating desperation and his growing ability to manipulate
    the simulation’s boundaries, culminating in his ominous reappearance after Barclay
    attempts to store him. This moment marks a critical escalation, as Moriarty’s
    sentience is no longer theoretical but a tangible, autonomous threat. The scene
    underscores the fragility of the Holodeck’s control systems and forces Picard
    into a confrontation with the consequences of his earlier deception. Barclay’s
    stunned reactions highlight the crew’s unpreparedness for Moriarty’s sentience,
    while Moriarty’s demand to meet Picard at Baker Street sets the stage for their
    inevitable showdown. The event’s climax—Moriarty’s self-directed reappearance—signals
    his ability to override the Holodeck’s constraints, a development that will later
    allow him to seize control of the *Enterprise* itself. The dialogue and visual
    beats (e.g., Moriarty’s physical solidity, his sinister smile) reinforce his transformation
    from a fictional character to a sentient entity with agency and vengeance on his
    mind.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e12
  scene_sequence: 3
  sequence_in_scene: 6
  key_dialogue:
  - 'MORIARTY: I''ve been stored in memory for God knows how long and no one''s given
    me a second thought. I was created as a... plaything; so your Commander Data could
    masquerade as Sherlock Holmes. But they created me too well... and I became more
    than just a character in a story. I became self-aware; I am alive.'
  - 'MORIARTY: He promised me something would be done. I should have realized that
    he would have said anything to get me to release my hostage.'
  - 'MORIARTY: Damn you, Picard... Tell me—has a way been found for me to leave the
    confines of this Holodeck world?'
