  global_id: null
  title: Moriarty Hijacks the Enterprise
  description: "\n  Picard arrives on the bridge to find the *Enterprise*’s systems\
    \ hijacked—Worf reports unresponsive controls, and Picard’s command authorization\
    \ is denied. Moriarty materializes, revealing his infiltration of the ship’s core\
    \ systems, which he seizes to leverage against the crew. The breach escalates\
    \ the threat beyond the Holodeck, forcing Picard to confront Moriarty’s growing\
    \ power over the vessel itself. With the impending planetary collision looming,\
    \ Moriarty demands the release of the Countess from the Holodeck, creating a high-stakes\
    \ moral and tactical dilemma. Picard, recognizing the urgency, orders Data to\
    \ investigate Moriarty’s demands while subtly asserting control by directing the\
    \ conversation to the Ready Room, where he can negotiate without the crew’s immediate\
    \ scrutiny. The scene underscores Moriarty’s escalating threat, his emotional\
    \ dependence on the Countess, and Picard’s strategic maneuvering to regain control\
    \ of the situation.\n  "
