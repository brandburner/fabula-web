      (the Holodeck simulation).
    what_happened: "\n        Geordi is the unwitting participant in Data’s deduction,\
      \ his left-handed tool catch serving as the first clue that something is amiss.\
      \ He is confused by Data’s actions—‘What did you do that for?’—but his confusion\
      \ turns to shock as Data reveals the truth about the Holodeck simulation. Geordi’s\
