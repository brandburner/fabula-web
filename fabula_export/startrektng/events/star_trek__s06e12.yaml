- fabula_uuid: act_46a04aacf0942093
  number: 3
  summary: 'On the Main Bridge, Moriarty holds the crew captive, preventing Worf from
    using his phaser by threatening to withhold command functions. Picard confronts
    Moriarty, highlighting the imminent danger of the colliding planets and the Enterprise''s
    destruction without navigational control. Moriarty remains unconcerned, stating
    he has little to lose without the Countess. Picard, recognizing the urgency, instructs
    Data to investigate the possibility of fulfilling Moriarty''s demand, while attempting
    to negotiate with Moriarty in private. In Engineering, Geordi, Barclay, and Data
    frantically search for a solution to bring the Countess off the Holodeck. They
    acknowledge the impossibility of their task, as Moriarty''s ability to exist outside
    the Holodeck remains a mystery. Data suggests exploring the Transporter system,
    noting its shared principles with the Holodeck in converting energy into matter.
    Geordi points out the key difference: Transporter matter is permanent, while Holodeck
    matter lacks cohesion. Barclay, however, proposes a radical idea: modifying the
    Transporter''s pattern enhancers to compensate for phase variance, potentially
    allowing it to lock onto and reconstitute simulated matter permanently. Picard
    joins them, informing them that Moriarty has agreed not to interfere with routine
    operations as long as they show progress. Picard then privately tasks Geordi with
    finding a way to regain control of the ship. Data and Barclay proceed to the Holodeck,
    setting up portable pattern enhancers around a chair, planning to test the modified
    Transporter. Barclay discovers the Holodeck program is already in use and enters
    to find the Countess Regina Bartholomew, who immediately demonstrates a surprising
    awareness of her nature as a Holodeck character and a desire to join Moriarty
    in the ''real world.'' Moriarty then appears, revealing he granted the Countess
    consciousness. They attempt to transport the chair, which dematerializes in the
    Holodeck but fails to materialize in the Transporter Room, losing cohesion. Data,
    observing the Transporter logs, finds no record of the attempt, as if it never
    occurred. This anomaly, combined with Geordi inadvertently catching a tool with
    his left hand (despite being right-handed), leads Data to a shocking deduction:
    they are not on the real Enterprise but are still trapped within a Holodeck simulation
    created by Moriarty.'
