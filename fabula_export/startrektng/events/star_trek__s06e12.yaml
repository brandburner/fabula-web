      \ is one of reluctant facilitator, as Riker and Worf override its security measures\
      \ to open the shuttlebay doors and allow Moriarty’s departure. The ship’s institutional\
      \ power is temporarily usurped by Moriarty, highlighting the vulnerability of\
      \ its systems and the ethical dilemmas faced by its crew. The *Enterprise*’s\
