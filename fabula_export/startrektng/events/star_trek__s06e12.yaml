      still glowing faintly from their arrival, symbolizes the crew’s gamble—materializing
      them was a risk, and now they’re trapped in a negotiation where the room itself
      feels like a cage. The confined space forces the characters into close proximity,
      heightening the tension and making every word, every gesture, feel weighted.'
