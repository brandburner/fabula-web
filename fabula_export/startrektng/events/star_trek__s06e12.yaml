- fabula_uuid: act_49f47c7c3cb82381
  number: 4
  summary: 'Data''s revelation that they are still within a Holodeck simulation of
    the Enterprise leaves Picard and Geordi stunned. Data provides further evidence:
    the lack of Transporter log data for the failed chair experiment and Geordi''s
    left-handed catch, mirroring a previous Holodeck malfunction. To confirm, Data
    hurls his combadge, which strikes an invisible wall, briefly revealing the Holodeck
    grid. Picard''s attempts to discontinue the program or exit fail, confirming Moriarty''s
    control over this simulated environment. Picard then uses his combadge to contact
    ''Riker,'' who reports their location as Engineering, further proving they are
    in a simulation, as the real Riker would have identified them as being in Holodeck
    Three. Data clarifies that only Picard, Data, and Barclay are real, having entered
    the Holodeck together. Picard realizes that his recent attempt to regain control
    of the ship, where he input his command codes into the simulated computer, may
    have inadvertently given Moriarty control of the *real* Enterprise. With less
    than three hours until the planetary collision, Picard understands they must find
    a way to satisfy Moriarty''s demands to regain control of the actual ship. Meanwhile,
    on the *real* Main Bridge, Riker, Worf, and Geordi are under Moriarty''s control.
    Moriarty, believing he is on the real Enterprise, appears on the viewscreen from
    his simulated quarters, demanding that Riker''s crew find a way to bring him off
    the Holodeck. Riker expresses skepticism, but Moriarty reveals he knows about
    their earlier (simulated) Transporter attempt, using it as proof that a solution
    exists. When Riker''s simulated Geordi expresses doubt, Moriarty escalates his
    threat by raising the warp core temperature to critical levels, forcing Riker
    to comply. Back in the inner Holodeck, Picard seeks out the Countess. He adopts
    a formal, 19th-century manner to engage her, recognizing her wit and sagacity.
    Picard reveals the (false) solution for transporting Holodeck matter: uncoupling
    the Transporter''s Heisenberg Compensators. He then presents his terms: the Countess
    must convince Moriarty to return voice commands to him, or neither of them will
    be transported. The Countess, though recognizing it as a threat, agrees to do
    what she can, understanding Picard''s responsibility for the lives of his crew.
    This act intensifies the deception, with Picard now manipulating Moriarty from
    within his own trap.'
