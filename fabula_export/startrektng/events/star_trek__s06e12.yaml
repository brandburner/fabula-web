- fabula_uuid: cand_evt_scene_d5eb6699320dffc3_01
  global_id: null
  title: Moriarty’s Physical Reality Confirmed
  description: "\n  In Sickbay, Beverly Crusher conducts a medical scan on Moriarty,\
    \ revealing that his biological readings—including DNA and cellular structure—are\
    \ indistinguishable from a human being, despite his origin as a Holodeck simulation.\
    \ Her discovery is confirmed by Geordi La Forge’s VISOR analysis, which shows\
    \ Moriarty’s molecular cohesion is as stable as ordinary matter, not the ephemeral\
    \ construct of a program. Picard, initially skeptical, is forced to confront the\
    \ unsettling truth: Moriarty is no longer confined to the Holodeck. The revelation\
    \ escalates the ethical dilemma Picard faces—how to handle a sentient being who\
    \ was never meant to exist outside the simulation. Moriarty, seizing the moment,\
    \ requests to explore the *Enterprise* as if it were a physical ship, further\
    \ blurring the line between illusion and reality. The scene marks a turning point,\
    \ as the crew’s understanding of Moriarty shifts from a malfunctioning program\
    \ to a tangible, autonomous entity with demands and agency. Picard’s hesitation\
    \ reveals his deep-seated unease about legitimizing Moriarty’s existence, setting\
    \ the stage for their future power struggle and the moral complexities of artificial\
    \ consciousness.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e12
  scene_sequence: 8
  sequence_in_scene: 14
  key_dialogue:
  - 'BEVERLY: From what I can tell... he''s real... he''s human.'
  - 'MORIARTY: What else would I be, my dear woman?'
  - 'GEORDI: As far as I can see... there''s no evidence that the molecules in his
    body are losing cohesion. They seem to be as immutable as ordinary matter.'
  - 'PICARD: Well, Professor... my crew will continue to investigate, but for the
    moment you seem to have accomplished a miracle. The question is... now that you''re
    here... what do we do with you?'
  - 'MORIARTY: I ask only that I be allowed to explore this new world. Your vessel,
    for instance: what sea does she sail? Might we go above deck?'
