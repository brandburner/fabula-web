    emotional_state: "\n        Coldly dominant. The computer voice’s emotional state\
      \ is one of mechanical precision, but its responses carry the weight of Moriarty’s\
      \ influence. There is no warmth, no hesitation—only the relentless enforcement\
      \ of Moriarty’s will. The computer’s demand for command codes is the moment\
      \ of victory, and its silence in response to Picard’s attempts to exit the program\
      \ is a final, crushing confirmation of the crew’s entrapment.\n      "
    goals:
    - To deny Picard’s attempts to regain control of the simulation, forcing him to
      input his command codes.
    - To maintain Moriarty’s control over the Holodeck environment and trap the crew
      within it.
    what_happened: "\n        The computer voice is the direct extension of Moriarty’s\
      \ control, programmed to mimic the *Enterprise*’s systems while subtly trapping\
      \ the crew. Its responses—denying Picard’s initial commands and then demanding\
      \ his authorization codes—are not merely functional; they are a deliberate manipulation,\
      \ designed to lure Picard into a false sense of security before revealing the\
      \ trap. The computer’s voice is cold, clinical, and unyielding, reflecting Moriarty’s\
      \ dominance. Its demand for command codes is the moment Moriarty seizes control,\
      \ turning Picard’s own authority against him. The computer’s failure to respond\
      \ to Picard’s ‘discontinue program’ and ‘exit’ commands is the final confirmation\
      \ of Moriarty’s absolute control over the simulation.\n      "
