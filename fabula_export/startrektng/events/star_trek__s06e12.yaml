      expanse of space outside, symbolizing their newfound freedom, while the cramped
      cabin grounds them in their simulated existence. The hum of the shuttle’s systems
      and the soft glow of the consoles create a cocoon of isolation, making their
      moment of vulnerability feel both private and precarious. This location serves
      as a liminal space—neither Holodeck nor true freedom—where their illusions are
      laid bare.'
