  - character_uuid: ger_agent_63a68273c66d
    emotional_state: "\n        Confused, then shocked, then horrified. Geordi’s emotional\
      \ state is a rollercoaster—first, he is merely puzzled by Data’s odd behavior,\
      \ then stunned by the revelation of the simulation, and finally, he grapples\
      \ with the existential horror of their situation. His voice carries a note of\
      \ disbelief, as if he cannot quite accept that the *Enterprise* around him is\
      \ not real. There is a sense of violation, as though his very perception of\
      \ reality has been betrayed.\n      "
    goals:
    - To assist Picard in restoring command functions (initially).
    - To understand the implications of Data’s revelation and adapt to the new reality
      (the Holodeck simulation).
    what_happened: "\n        Geordi is the unwitting participant in Data’s deduction,\
      \ his left-handed tool catch serving as the first clue that something is amiss.\
      \ He is confused by Data’s actions—‘What did you do that for?’—but his confusion\
      \ turns to shock as Data reveals the truth about the Holodeck simulation. Geordi’s\
      \ role in this event is passive but pivotal; his glitched behavior (left-handedness)\
      \ is the key to unraveling the illusion. His reaction to Data’s revelation—‘We're\
      \ still on the Holodeck...?’—reflects the crew’s collective disorientation and\
      \ the horror of their predicament. Geordi’s emotional state shifts from confusion\
      \ to surprise to dawning realization, mirroring the crew’s journey from false\
      \ hope to despair.\n      "
