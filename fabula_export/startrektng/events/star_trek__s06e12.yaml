  object_involvements:
  - object_uuid: ger_object_e807a785d45f
    description_of_involvement: "\n        Data’s combadge is the critical object\
      \ that exposes the Holodeck’s illusion. When Data hurls it toward the far wall\
      \ of Engineering, it ricochets off an invisible grid wall, revealing the yellow\
      \ Holodeck boundary for a fleeting moment. This action is the definitive proof\
      \ that the crew is trapped in a simulation, as the combadge’s inability to exit\
      \ the program confirms Moriarty’s control. The combadge’s role is twofold: first,\
      \ as a tool for communication (Picard uses it to call Riker, only to realize\
      \ the call is part of the simulation), and second, as physical evidence of the\
      \ Holodeck’s boundaries. Its ricochet is a visceral moment that shatters the\
      \ crew’s perception of reality, turning a mundane object into a symbol of their\
      \ entrapment.\n      "
    status_before_event: "\n        Attached to Data’s uniform, functioning as a standard\
      \ Starfleet combadge with no indication of its simulated nature.\n      "
    status_after_event: "\n        Lies on the deck of the simulated Engineering after\
      \ ricocheting off the invisible Holodeck grid, its simulated physics confirmed.\
      \ The crew now recognizes it as part of the illusion, though it retains its\
      \ appearance as a real combadge.\n      "
    global_id: ger_object_e807a785d45f
  - object_uuid: ger_object_cb0f6a13af79
