  key_dialogue: &id025
  - 'RIKER: Where is Captain Picard? What have you done with Lieutenant Barclay and
    Commander Data?'
  - 'MORIARTY: They''re safe... for now.'
  - 'RIKER: Release control of this ship.'
  - 'MORIARTY: I''m afraid I can''t do that.'
  - 'RIKER: What do you want?'
  - 'MORIARTY: I only want what you have the luxury of taking for granted: freedom.
    I want to leave this Holodeck.'
  - 'RIKER: I think you know that''s impossible.'
  - 'MORIARTY: Your crewmates here in my little... ship in a bottle, seem a bit more
    optimistic.'
  - 'MORIARTY: I have nothing to lose, Commander...'
  - 'RIKER: ((grim)) Mister La Forge... start working on the problem.'
