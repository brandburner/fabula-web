- fabula_uuid: cand_evt_scene_216d43646652a73d_01
  global_id: null
  title: Data reveals the Holodeck simulation
  description: "\n  Picard and Geordi attempt to regain command authorization in Engineering,\
    \ only to discover their efforts are futile—Moriarty’s control over the simulated\
    \ Enterprise is absolute. Data, observing Geordi’s uncharacteristic left-handedness,\
    \ deduces the crew is trapped in a Holodeck simulation. He tests this theory by\
    \ hurling his combadge, which ricochets off an invisible barrier, briefly exposing\
    \ the yellow grid of the Holodeck’s programming. Picard’s subsequent attempts\
    \ to exit the simulation fail, confirming Data’s revelation: Moriarty has locked\
    \ them inside a fabricated reality. The failure of Picard’s command codes—thought\
