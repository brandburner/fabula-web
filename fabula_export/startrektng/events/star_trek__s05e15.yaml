- fabula_uuid: cand_evt_scene_109cf9ecf2d6ef5c_01
  global_id: null
  title: Distress Signal Identifies Lost Starship
  description: "\n  On the *Enterprise* bridge, Picard and Riker investigate an anomalous\
    \ distress signal emanating from Mab-Bu Six, a moon with violent electromagnetic\
    \ interference. Data isolates the signal and identifies it as a Starfleet subspace\
    \ distress call from a Daedalus-class starship—the *U.S.S. Essex*—lost over two\
    \ centuries ago under Captain Bryce Shumar. Worf’s scans fail to detect life signs,\
    \ but Troi’s empathic senses suggest someone is alive on the moon’s surface. Picard\
    \ initially dismisses the risk of investigating a 'ghost ship,' but Troi’s intuition\
    \ and the signal’s eerie connection to the past force a reconsideration. The discovery\
    \ foreshadows the alien prison’s influence and the crew’s impending possession,\
    \ as the signal’s origin on the moon ties directly to the Ux-Mal entities’ escape\
    \ plan.\n  "
