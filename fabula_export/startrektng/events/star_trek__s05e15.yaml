      potential extractions or reinforcements. Geordi earlier confirmed its functionality
      during systems checks in the Ready Room.
    status_after_event: Taken offline and placed in diagnostic mode, rendering it
      inoperable for a couple of hours. The bridge crew is left without a critical
      tool for resolving the crisis.
