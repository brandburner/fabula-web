  - object_uuid: ger_object_327487073b2a
    description_of_involvement: The Ten Forward forcefields, initially set to P-polarity,
      are reprogrammed by the possessed Data and Troi to reverse their polarity, creating
      an absolute seal. This action isolates Ten Forward from the rest of the ship,
      cutting off all internal communications, sensor feeds, and transporter locks.
      The forcefield serves as a critical barrier, trapping the possessed crew and
      hostages inside while preventing the bridge crew from intervening.
    status_before_event: Active and set to P-polarity, allowing limited communication
      and sensor access between Ten Forward and the rest of the ship.
    status_after_event: Reversed to create an absolute seal, isolating Ten Forward
      and cutting off all external communication and sensor feeds.
    global_id: ger_object_327487073b2a
