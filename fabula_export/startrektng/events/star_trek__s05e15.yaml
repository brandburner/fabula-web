  global_id: null
  title: Troi senses unseen threat on the moon
  description: After the shuttle crash on the moon’s surface, Riker, Data, and Troi
    assess their situation—isolated by electromagnetic interference that blocks communication
    with the *Enterprise*. While Riker dismisses the possibility of life on the barren,
    storm-lashed terrain, Troi’s empathic senses confirm an approaching presence,
    despite Data’s tricorder readings showing no life signs. The distant glimmering
    lights and electromagnetic bursts hint at an unseen force, deepening the crew’s
    unease as the alien threat begins to manifest. This moment marks the first concrete
    indication that the moon is not as lifeless as it appears, setting up the crew’s
    eventual possession by the Ux-Mal entities. The tension escalates as Troi’s intuition
    clashes with Riker’s skepticism, foreshadowing the supernatural nature of the
    threat they face.
