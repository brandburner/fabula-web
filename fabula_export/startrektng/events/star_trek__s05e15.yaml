  title: Data’s speech glitch and Troi’s private request
  description: "\n  On the bridge, Data’s speech processors malfunction mid-sentence,\
    \ his stuttering ('m-m-moment') marking the first visible sign of his possession\
    \ by the Ux-Mal entity. The glitch is dismissed as a minor technical issue, but\
    \ his subsequent exchange with Riker—where he insists on a polar orbit scan despite\
    \ logical inconsistencies—reveals his growing alien influence. Meanwhile, Troi\
    \ subtly requests a private meeting with Picard, their unspoken eye contact suggesting\
    \ an unacknowledged but critical agenda. The moment underscores the crew’s fractured\
    \ trust and the escalating stakes of the unseen alien threat, as Data’s uncharacteristic\
    \ aggression and Troi’s covert urgency hint at deeper tensions beneath the surface.\
    \ The scene bridges the crew’s external investigation with the internal horror\
    \ of possession, setting up the next phase of the crisis.\n  "
