    One wrong move, and your precious crew pays the price."'
  - 'PICARD: "Then we understand each other. But if you harm them, you lose your leverage—and
    your escape."'
  - 'DATA (possessed): "Your logic is flawed, Captain. We have already won." (laughs
    unnaturally)'
