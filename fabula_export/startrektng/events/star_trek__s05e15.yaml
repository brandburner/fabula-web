  title: Troi reveals the Ux-Mal escape plan
  description: "\n  In Cargo Bay 4, the energy cloud materializes with hundreds of\
    \ swirling rings, accompanied by a hive-like humming. Troi and Data, now fully\
    \ possessed by the Ux-Mal entities, stand with an air of triumph as Picard confronts\
    \ them. Troi admits the 'ghosts' are not spectral beings seeking peace but imprisoned\
    \ Ux-Mal convicts who have manipulated the *Enterprise* crew to facilitate their\
    \ escape. She reveals they were banished to the moon five centuries ago after\
    \ a failed escape attempt aboard the *Essex*, and now intend to use the *Enterprise*\
    \ and its crew's bodies to return to their home system. Picard realizes the moon\
    \ is a penal colony, and the entities' true goal is hijacking the ship. The revelation\
    \ shatters the crew's assumptions, escalating the threat from a supernatural mystery\
    \ to a calculated, existential invasion. The dialogue exposes the entities' ruthlessness\
    \ and strategic deception, while Picard's deduction underscores the urgency of\
    \ containing the threat before the Ux-Mal can execute their plan.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e15
  scene_sequence: 42
  sequence_in_scene: 66
  key_dialogue:
  - 'TROI: You''re quite right, Picard. We''re not ghosts. And it is not rest, we
    seek. Only escape.'
  - 'PICARD: Escape?'
  - 'TROI: We were brought to this moon over five centuries ago from a star system
    called Ux-Mal... We were separated from our bodies and left to drift in the storms.
    Once we almost escaped... on board the *Essex*... but that ship was incapable
    of eluding the moon''s electromagnetic currents...'
  - 'PICARD: Did you really think using their identities would gain our sympathy...?'
  - 'TROI: It was a better approach than asking you to allow hundreds of condemned
    prisoners on board...'
  - 'PICARD: Then, this moon is a penal colony...'
  - 'TROI: That is correct. But now we have your ship... and your bodies to carry
    us home...'
