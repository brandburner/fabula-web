  - object_uuid: ger_object_2f7aea833bdf
    description_of_involvement: 'The Deck 13 turbolift communicators, though not directly
      involved in the Ten Forward ambush, are critical to the broader chase. Their
      abandonment on Deck 13 by the possessed crew creates a breadcrumb trail for
      Worf and security, leading them to realize the crew slipped away seconds earlier.
      This object involvement ties into the event''s narrative tension—the possessed
      crew''s evasion tactics force the Enterprise crew to play catch-up, always one
      step behind. The communicators'' role here is indirect but vital: they expose
      the possessed crew''s cunning and the ship''s vulnerability to internal sabotage.'
    status_before_event: Attached to uniforms of Troi, Data, and O'Brien, active and
      traceable.
    status_after_event: Discarded on Deck 13 turbolift floor, deactivated. Later discovered
      by Worf as part of the investigation.
    global_id: ger_object_2f7aea833bdf
  - object_uuid: ger_object_d76e0dda54e8
    description_of_involvement: 'Data jams his fingers into the Enterprise''s security
      field wall circuits in the Deck 10 corridor, short-circuiting the panels with
      a shower of sparks. The exposed wiring hums ominously before failing, collapsing
      the security fields that were meant to trap the possessed crew. This object
      involvement is the linchpin of the ambush—Data''s technical prowess turns the
      ship''s defenses against it, allowing the possessed crew to reach Ten Forward.
      The circuits'' failure is a symbolic and practical breach: the ship''s systems,
      designed to protect, are now tools of the enemy. The sparks and hum of the short-circuit
      create a visceral, almost violent atmosphere, mirroring the entities'' ruthlessness.'
    status_before_event: Functioning normally, powering the security fields that block
      the corridor.
    status_after_event: Short-circuited, sparking, and deactivated. The security fields
      they controlled are collapsed, leaving the path to Ten Forward open.
    global_id: ger_object_d76e0dda54e8
  - object_uuid: ger_object_d7ae7e91d741
    description_of_involvement: 'The three communicators dropped by the possessed
      crew—Troi, Data, and O''Brien—lie abandoned on the turbolift floor on Deck 13,
      serving as a crucial clue for Worf and the security team. Their presence signals
      the possessed crew''s tactical awareness—they discarded them to evade tracking,
      but in doing so, left behind evidence of their route. The communicators are
      a silent accusation: the crew''s own technology, turned against them by the
      entities'' possession. Their abandonment also highlights the possessed crew''s
      desperation—they are willing to cut off all communication to avoid detection.'
    status_before_event: Attached to uniforms of Troi, Data, and O'Brien, active and
      traceable.
    status_after_event: Discarded on the turbolift floor, deactivated. Later found
      by Worf as evidence of the possessed crew's escape route.
    global_id: ger_object_d7ae7e91d741
  - object_uuid: ger_object_86fe3733951f
    description_of_involvement: The tables and chairs in Ten Forward serve as both
      environmental props and improvised cover during the phaser battle. Civilians
      and crew dive behind them as phaser fire erupts, using their sturdy Starfleet-issue
      construction to shield themselves. A crewwoman tumbles over one after the vase
      explodes, and Worf uses a chair as partial cover during his standoff with O'Brien.
      The furniture, once arranged for socializing, now becomes a chaotic obstacle
      course in a desperate fight for survival. Their presence underscores the absurdity
      of the situation—peaceful gathering spaces turned into war zones.
    status_before_event: Arranged in a circle for socializing, unscathed.
    status_after_event: Scattered, overturned, and scorched from phaser fire. Some
      are used as cover; others are collateral damage in the crossfire.
    global_id: ger_object_86fe3733951f
