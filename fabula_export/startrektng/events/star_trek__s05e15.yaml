  - organization_uuid: ger_organization_48782eabb521
    description_of_involvement: The Ux-Mal entities, ancient alien prisoners from
      the Ux-Mal star system, execute a brutal and efficient takeover of the Enterprise
      bridge. Through their possession of Data and O'Brien, they seize control of
      the ship's systems, stunning the crew and disabling the bridge consoles. Their
      actions reflect their ruthless determination to escape their moon prison and
      use the Enterprise as a means to that end. The entities' influence is manifested
      through the violent actions of their hosts, as they exploit the crew's trust
      in one another to achieve their goals.
    active_representation: Through the violent actions of their possessed hosts (Data
