    description_of_involvement: 'Starfleet’s institutional protocols and historical
      records are leveraged by the Ux-Mal entities as a tool of deception. Troi, possessing
      Troi, fabricates an identity as ‘Captain Bryce Shumar’ of the *Essex* and cites
      Starfleet’s records to lend credibility to her claims. Picard, however, uses
      his knowledge of Starfleet’s archives to challenge the entities’ story, exposing
      inconsistencies (e.g., crew size, command structure) that undermine their ruse.
      The organization’s role in this event is dual: as a source of institutional
      trust that the entities exploit, and as a framework Picard uses to dismantle
      their lies.'
