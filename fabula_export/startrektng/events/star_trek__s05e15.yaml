  title: O'Brien discards Molly to expedite escape
  description: "\n  In Ten Forward, the possessed O'Brien—frustrated by Molly O'Brien’s\
    \ persistent crying—abruptly seizes the infant from Keiko and thrusts her into\
    \ the arms of a random crew member. This callous act, devoid of empathy, underscores\
    \ the Ux-Mal entity’s prioritization of its own survival over human bonds. The\
    \ move eliminates a distraction, allowing the possessed crew to focus on securing\
    \ transporter controls and lowering the forcefield. Data and Troi, meanwhile,\
    \ take Picard and Worf as hostages, ensuring their path to the cargo bay remains\
    \ unobstructed. The scene escalates the tension by demonstrating the entities’\
    \ ruthlessness and the crew’s vulnerability, while also creating a critical window\
    \ for Data to execute the next phase of their escape plan.\n  "
