    shift, as the possessed crewmembers—now acting as ruthless enforcers—demonstrate
    their ability to manipulate the ship’s systems and personnel. The scene underscores
    the aliens’ strategic advantage, their willingness to use force, and the crew’s
    vulnerability, setting up the next phase of the crisis where the entities will
    exploit their control to escape the moon prison.
