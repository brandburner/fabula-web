- fabula_uuid: cand_evt_scene_badef46ec6b6f584_02
  global_id: null
  title: Data provokes Worf’s alien rage
  description: "\n  In Ten Forward, the alien-possessed crew—led by Troi and O’Brien—maintain\
    \ a tense standoff with the hostages, including Worf, while Picard’s voice over\
    \ the comms attempts to negotiate. Data, now under alien control, exhibits erratic\
    \ behavior, pacing nervously and brandishing a phaser. His agitation escalates\
    \ when he fixates on Worf, taunting him with verbal jabs that exploit the Klingon’s\
    \ warrior pride. Data’s provocation—‘Attack me. Or are you afraid?’—is a deliberate\
    \ attempt to destabilize Worf, testing the limits of his self-control while revealing\
    \ the alien’s manipulative tactics. Worf’s stoic refusal to engage (‘I have no\
    \ fear of death’) underscores his discipline, but the tension between them crackles\
    \ with unspoken violence. Troi briefly interrupts, asserting control over Data,\
    \ but the moment exposes the fragility of the crew’s resistance: the aliens are\
    \ not only using their hosts’ bodies but weaponizing their psychological vulnerabilities.\
    \ The scene underscores Data’s internal conflict—his logical detachment clashing\
    \ with the alien’s primal aggression—while escalating the hostages’ fear and the\
    \ crew’s desperation to regain control.\n  "
