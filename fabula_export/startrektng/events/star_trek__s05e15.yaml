  title: Troi rejects Picard’s diplomacy
  description: In Ten Forward, the possessed crew—led by Troi—dismiss Picard’s attempts
    at negotiation, revealing the Ux-Mal entities’ intransigence. Troi, now a cold
    and calculating host, ignores Picard’s plea for communication and instead demands
    the *Enterprise* be moved to the moon’s southern polar region. Meanwhile, Data,
    under alien control, provokes Worf with taunts, escalating tensions among the
    hostages. The scene underscores the futility of human reasoning against the entities’
    single-minded focus on escape, forcing Picard to confront the limits of his influence.
    The exchange also highlights the psychological toll on the crew, as Data’s uncharacteristic
    aggression and Troi’s detached manipulation expose the aliens’ destabilizing control
    over their hosts. This moment marks a turning point, shifting the crisis from
    negotiation to confrontation as the crew realizes diplomacy is ineffective against
    the entities’ ruthless determination.
