    global_id: ger_object_dcb078dcd46f
  - object_uuid: ger_object_3ad9338c845c
    description_of_involvement: The *Essex* coordinates, transmitted by the Ux-Mal
      entities via Data's console input, serve as both a tactical tool and a psychological
      weapon. On the surface, they are the key to locating the wreckage and retrieving
      the entities' remains—but their provision is also a test of the crew's compliance.
      The coordinates are delivered with cold certainty, reinforcing the entities'
      claim that they alone hold the knowledge necessary to resolve the crisis. Geordi's
      receipt of these coordinates, despite the *Enterprise*'s sensor failures, underscores
      the crew's forced dependence on the entities' information, a dependence that
      will later be exploited by Picard in his negotiation strategy.
    status_before_event: Unknown to the *Enterprise* crew; held exclusively by the
      Ux-Mal entities.
    status_after_event: Transmitted to the bridge and logged into the *Enterprise*'s
      systems, but their accuracy cannot be verified due to the ionic cyclone's interference.
