    description_of_involvement: The Ten Forward transporter controls become the focal
      point of the possessed crew’s actions. O’Brien secures these controls, creating
      an access code to prevent the bridge from using the transporter against them.
      This object is critical to the entities’ escape plan, as it allows them to move
      freely to the cargo bay without interference. The transporter controls symbolize
