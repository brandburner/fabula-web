- fabula_uuid: cand_evt_scene_ca322612beb6aed2_01
  global_id: null
  title: Picard probes Troi’s alien possession
  description: In Cargo Bay 4, Picard relentlessly interrogates Troi—now possessed
    by the Ux-Mal entity—while O’Brien and Data prepare the transporter under her
    orders. Picard’s probing questions about her identity and the entity’s escape
    plan escalate her frustration, revealing the alien’s growing control over her
    body and the crew’s mounting suspicion. The tension peaks when O’Brien announces
    the transporter is ready, forcing Troi to break eye contact with Picard and proceed
    with the escape attempt. The exchange underscores the entity’s desperation and
    Picard’s strategic effort to exploit its psychological vulnerabilities before
    the hijacking succeeds.
