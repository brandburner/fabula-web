    take O''Brien and Data more than a couple of minutes to override it once they
    discover it''s there...'
  - 'RIKER: I hope that''ll be enough time for the captain to play his hand...'
  - 'RO: You know what he''s going to do?'
  - 'RIKER: There''s only one reason he chose cargo bay four...'
  - 'RIKER: (grim, to Ro) If it becomes necessary, Ensign, you will blow the cargo
    bay hatch on my orders.'
