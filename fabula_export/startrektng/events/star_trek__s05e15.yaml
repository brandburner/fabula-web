  object_involvements:
  - object_uuid: ger_object_25dd1540b003
    description_of_involvement: The Enterprise bridge consoles, once the hub of the
      crew's authority and control, are hijacked by the Ux-Mal entities. Ro's helm
      console is locked out, preventing her from correcting the unauthorized orbital
      shift. Data attempts to use his console after the attack on Riker, but all functions
      deactivate, leaving him frustrated. The consoles' sudden deactivation symbolizes
      the aliens' complete takeover of the ship's systems, rendering the crew powerless.
      Their darkening screens and silent panels reflect the loss of control and the
      bridge's transformation into a battleground.
    status_before_event: Active and responsive, displaying sensor readouts, navigation
      data, and tactical alerts. The crew relies on them for ship operations.
    status_after_event: All bridge consoles are deactivated, their screens dark, and
      their functions locked out. The Enterprise Computer confirms the transfer of
      command functions to engineering, sealing the aliens' victory.
    global_id: ger_object_25dd1540b003
  - object_uuid: ger_object_a416f7e7b1c3
    description_of_involvement: Worf's phaser is drawn in response to Riker's call
      for security, but O'Brien ambushes him from behind, grabbing his wrist and wrenching
      the weapon free. O'Brien then uses Worf's own phaser to stun him, adding a layer
      of humiliation to the attack. The phaser, a symbol of Worf's authority and defensive
      capability, is turned against him, highlighting the aliens' tactical cunning
      and the crew's sudden vulnerability. Its brief use in this event underscores
      the speed and brutality of the takeover.
    status_before_event: Holstered at Worf's side, ready for use in case of threats.
    status_after_event: Disarmed by O'Brien and used to stun Worf. It lies on the
      floor near Worf's stunned body, now a tool of the Ux-Mal entities.
    global_id: ger_object_a416f7e7b1c3
  - object_uuid: ger_object_e7eeb41c5efc
    description_of_involvement: The full security alert, triggered by Riker in a desperate
      attempt to regain control, is a futile gesture. The klaxons blare across the
      bridge, their shrill tones cutting through the violence of Data's assault on
      Riker and the disarming of Worf. However, the alert dies almost immediately
      as the bridge consoles deactivate, underscoring the aliens' dominance. The security
      alert serves as a brief, desperate cry for help, but it is silenced as quickly
      as it begins, symbolizing the crew's isolation and the ship's vulnerability.
    status_before_event: Inactive, with the bridge operating under normal protocols.
    status_after_event: Activated briefly by Riker, but immediately deactivated as
      the bridge consoles are locked out by the Ux-Mal entities.
    global_id: ger_object_e7eeb41c5efc
  - object_uuid: ger_object_048e2d8248c8
    description_of_involvement: The possessed crew's hand phasers are wielded with
      brutal efficiency by O'Brien and Data (though Data does not fire his phaser
      in this event). O'Brien uses his phaser to disarm Worf, stunning him, and then
      fires at Ro and Riker, dropping them both. The phasers symbolize the violent
      shift in power on the bridge, as the once-protective tools of Starfleet security
      are now weapons of domination in the hands of the Ux-Mal entities. Their orange
      glow cuts through the chaos, underscoring the aliens' ruthless control.
    status_before_event: Holstered or in the possession of the crew (Riker, Worf,
      Ro), ready for use in case of emergencies.
    status_after_event: O'Brien's phaser is active and has been fired multiple times,
      stunning Riker, Ro, and Worf. Worf's phaser is disarmed and lies on the floor
      near his stunned body.
    global_id: ger_object_048e2d8248c8
  location_involvements:
