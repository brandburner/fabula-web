- fabula_uuid: cand_evt_scene_ab87760a4c8b0067_01
  global_id: null
  title: Riker authorizes lethal containment of possessed crew
  description: 'With the possessed crew—Data, O’Brien, and Troi—preparing to hijack
    the *Enterprise* via the transporter, Riker assumes command and faces an impossible
    moral choice. Geordi La Forge confirms he’s isolated Cargo Bay 4 with a neutrino
    field, but warns it will only delay the possessed crew’s override for minutes.
    Riker, recognizing Picard’s strategic intent, orders Ensign Ro to stand by to
    blow the bay’s hatch if necessary—a decision that forces Ro to confront the lethal
    consequences of sacrificing crewmates to stop the Ux-Mal entities. The tension
    underscores the escalating stakes: the crew’s survival now hinges on Riker’s ruthless
    pragmatism and Ro’s willingness to execute a direct order that will cost lives.
    The moment crystallizes the crisis, shifting from containment to outright destruction
    as the only viable option.'
