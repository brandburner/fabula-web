    description_of_involvement: The bridge turbolift override controls are a pivotal
      tool in the crew's counterattack. Worf engages these controls at Riker's direction,
      halting the turbolift between decks and trapping the possessed officers. This
      action demonstrates the crew's ability to use the ship's systems against the
      invaders, turning the turbolift—a tool for escape—into a confinement device.
      The override controls symbolize the crew's regaining of tactical footing and
      their exploitation of the aliens' reliance on technology.
