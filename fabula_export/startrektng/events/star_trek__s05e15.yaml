  key_dialogue: &id041
  - 'BEVERLY: I''ve compared the away team''s last transport trace patterns to earlier
    records. They''re exactly the same, except in Troi, Data, and O''Brien there''s
    an unusual synaptic activity—some kind of anionic energy. It may be a life-form
    superimposing neural patterns onto our people.'
  - 'PICARD: If your theory is accurate, what would happen if we inflicted pain on
    the others...'
  - 'BEVERLY: That might force whatever it is out of our people.'
  - 'RO: A plasma shock—it would be painful but it wouldn''t cause any physical harm.'
  - 'PICARD: Bridge to Ten Forward. Now that we are moving the ship as you requested,
    I would like to know the nature of the injuries to members of my crew.'
