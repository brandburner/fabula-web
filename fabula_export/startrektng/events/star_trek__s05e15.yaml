  description: "\n  The turbolift carrying Troi, Data, and O'Brien—now fully under\
    \ alien control—abruptly halts on Deck 10 after O'Brien attempts to reroute it\
    \ to Engineering. The sudden stop triggers immediate tension among the possessed\
    \ crew, who realize they’ve been trapped by the bridge’s override. Troi demands\
    \ their location while O'Brien, leveraging his technical expertise, begins manipulating\
    \ the lift’s controls to bypass the bridge’s command authority. This moment marks\
    \ a critical escalation: the aliens’ attempt to regain mobility exposes their\
    \ desperation and tactical vulnerability, while the crew’s physical confinement\
    \ heightens the stakes of their possession. The scene underscores the Ux-Mal’s\
    \ ruthlessness—they’re willing to risk exposure to escape—and forces Picard and\
    \ the bridge team to act decisively to contain the threat before the possessed\
    \ officers can exploit their access to ship systems.\n  "
