  title: Picard confronts Troi in cargo bay
  description: 'In Cargo Bay Four, Picard faces the possessed Troi, who now speaks
    with the cold authority of the Ux-Mal entity controlling her. The confrontation
    reveals the prisoners'' desperate plan: they intend to hijack the *Enterprise*
    and use the crew''s bodies to escape their moon prison. Troi, now a ruthless enforcer,
    demands Picard''s compliance while subtly exposing the entities'' paranoia and
    fractured unity. The standoff escalates as Picard probes their intentions, forcing
    Troi to reveal their ruthless willingness to harm hostages—including Keiko and
    Molly O''Brien—if their demands aren''t met. The scene underscores the crew''s
    vulnerability and the entities'' strategic cunning, setting up Picard''s subsequent
    psychological maneuvering to exploit their divisions. The tension peaks when Troi,
    with a chilling smile, confirms their intent to ''borrow'' the ship permanently,
    leaving no room for negotiation. The exchange also hints at the entities'' desperation,
    as they cling to their only chance at freedom, making them unpredictable and dangerous
    adversaries.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e15
  scene_sequence: 46
  sequence_in_scene: 74
  key_dialogue:
  - 'PICARD: "Counselor, I know you''re in there. Fight them."'
  - 'TROI: "Captain, I''m afraid Deanna is... indisposed. But I assure you, she''s
    quite comfortable. For now."'
  - 'PICARD: "What do you want?"'
  - 'TROI: "What we''ve always wanted. Freedom. And you''re going to give it to us."'
  - 'PICARD: "And if I refuse?"'
  - 'TROI: "Then we''ll take it. And we''ll take your ship. And your crew. And your
    *lives*, if necessary. Starting with the O''Briens. Keiko and little Molly. Such
    a shame to waste potential."'
  - 'PICARD: "You''re bluffing."'
  - 'TROI: "Am I? Ask yourself, Captain—how far would *you* go to escape a prison
    you''d been trapped in for centuries?"'
