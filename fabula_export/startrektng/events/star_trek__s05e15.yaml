      \ (she *knows* someone is down there) and *vulnerability* (she’s the only one\
      \ who feels it). There’s a quiet *defiance* in her tone—she’s not asking for\
      \ permission to believe, she’s stating a fact. Her empathy isn’t just a tool;\
      \ in this moment, it’s her *moral compass*, and she’s willing to stand by it\
      \ even if it isolates her.\n      "
    goals:
