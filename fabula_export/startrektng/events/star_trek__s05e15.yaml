- fabula_uuid: cand_evt_scene_9f27c0e34958a312_01
  global_id: null
  title: Data seizes Picard under alien control
  description: In a desperate escalation of the alien possession crisis, Geordi La
    Forge and Ro Laren execute a high-risk plasma charge attack in the crawlspace
    to expel the Ux-Mal entities from their hosts. Data, now fully under the alien’s
    influence, anticipates their move and evades the blast, leaving Troi and O’Brien
    vulnerable. Seizing the moment, Data disarms Geordi and Ro, then brutally seizes
    Picard by the neck, pinning him against a wall. Using Picard as a human shield,
    Data threatens to kill him and the entire crew unless the bridge aborts the attack.
    The alien’s dominance over Data’s android body transforms him into a weapon, deepening
    the Ux-Mal’s control over the *Enterprise* and raising the stakes for the ship’s
    survival. This moment marks a critical turning point, where the crew’s tactical
    advantage collapses and the alien threat becomes a direct, violent force against
    Picard’s leadership and the ship’s integrity. The scene underscores the Ux-Mal’s
    ruthlessness and Data’s compromised state, forcing Picard into a position of helplessness—a
    stark contrast to his usual command authority.
