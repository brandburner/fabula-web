  - character_uuid: ger_agent_673e968e9e0c
    emotional_state: 'Hyper-alert with controlled tension—Ro is fully engaged in her
      role, her emotions channeled into precision and urgency. There’s a quiet determination
      in her demeanor, a refusal to let fear or hesitation slow her down. The subtext
      is clear: she knows the ship is under siege, and her updates are the difference
      between survival and disaster.'
    goals:
    - Provide Riker and the bridge crew with real-time intelligence on the possessed
      crew’s location and movements to enable a coordinated response.
    - Ensure that the bridge remains secure and operational, even as the threat closes
      in.
    what_happened: Ro is not directly involved in the physical confrontation but serves
      as the bridge’s eyes and ears, her fingers flying over the console as she tracks
      the possessed crew’s movements. Her voice is tight, her words clipped, as she
      relays the critical update to Riker. The tension in her posture—shoulders slightly
      hunched, eyes locked on the screen—betrays her awareness of the stakes. She
