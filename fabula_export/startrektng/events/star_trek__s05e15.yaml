  title: Possessed crew ambushes Ten Forward
  description: "\n  The possessed crew—Data, Troi, and O'Brien—overwhelm Ten Forward’s\
    \ security by bypassing emergency forcefields using Data’s technical manipulation\
    \ of the ship’s systems. They burst into the lounge, where civilians and crew\
    \ have taken refuge, and immediately open fire with phasers, creating a chaotic,\
    \ high-stakes standoff. Worf and two security officers rush in to counter the\
    \ threat, but the possessed crew’s immunity to phaser stuns renders them nearly\
    \ unstoppable. Worf is stunned in the crossfire, while Keiko O’Brien shields her\
    \ infant daughter, Molly, from the violence, underscoring the personal stakes\
    \ of the crisis. The scene escalates from a tense standoff to a brutal, disorienting\
    \ phaser battle, forcing the Enterprise’s crew to confront the terrifying reality\
    \ of their own possessed colleagues turning against them. The ambush not only\
    \ demonstrates the Ux-Mal entities’ ruthlessness but also exposes the ship’s vulnerability,\
    \ as the possessed crew now control a key civilian area and can use its occupants\
    \ as leverage.\n  "
