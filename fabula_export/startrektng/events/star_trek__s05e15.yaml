  title: Riker openly defies Picard’s order
  description: "\n  In a moment of escalating tension on the *Enterprise* bridge,\
    \ Commander Riker—his arm still broken from the away mission—frowns at Picard’s\
    \ order to stand down, signaling his internal conflict. Instead of obeying, Riker\
    \ immediately countermanders the command by ordering Geordi La Forge back to the\
    \ bridge, a direct challenge to Picard’s authority. This defiance is not just\
    \ a tactical misstep but a fracture in the chain of command, exposing the crew’s\
    \ fractured unity as the alien possession crisis deepens. The act underscores\
    \ the psychological stakes: Riker’s broken arm (which grants him immunity to possession)\
    \ makes him a critical asset, but his insubordination risks destabilizing the\
    \ ship’s leadership at a moment when trust is already eroded. The scene forces\
    \ Picard to confront whether Riker’s defiance is born of desperation, strategic\
    \ foresight, or the growing paranoia of a crew under siege.\n  "
