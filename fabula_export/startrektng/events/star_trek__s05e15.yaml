    description_of_involvement: Beverly Crusher’s medical tricorder is the primary
      diagnostic tool used to scan Troi’s tingling skin and detect the unusually high
      levels of synaptic energy in the away team. The device registers these anomalies,
      which Beverly initially dismisses as harmless afterimages from the electromagnetic
      discharge. Its readings—though downplayed—serve as the first critical clue to
      the Ux-Mal entities’ possession, foreshadowing the later revelation of the alien
      threat. The tricorder’s role is functional yet narratively pivotal, as its prematurely
      dismissed findings set the stage for the crew’s unraveling.
    status_before_event: Functioning normally, stored or held by Beverly Crusher in
      Sickbay, ready for use in diagnosing the away team’s injuries.
    status_after_event: Continues to function, though its readings of synaptic anomalies
      are not yet acted upon, leaving the crew’s possession undetected.
    global_id: ger_object_1016134d4493
