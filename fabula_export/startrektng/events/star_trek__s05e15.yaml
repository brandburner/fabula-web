  object_involvements:
  - object_uuid: ger_object_dcb078dcd46f
    description_of_involvement: 'The console in Ten Forward is the physical nexus
      of the entities'' control over the *Enterprise*. Data inputs the *Essex* coordinates
      here, demonstrating the entities'' ability to override ship systems even from
      a secondary location. The console''s role is twofold: it reinforces the entities''
      dominance by showing they can manipulate the ship''s functions remotely, and
      it serves as a visual reminder to the hostages of their powerlessness. O''Brien''s
      earlier use of this console to lower the force field around Ten Forward further
      cements its significance as a tool of oppression.'
