  title: Possessed crew breaches Ten Forward
  description: 'The possessed crew—Troi, Data, and O’Brien—overcome the Enterprise’s
    security fields by exploiting Data’s ability to manipulate circuitry, bypassing
    emergency protocols. They storm Ten Forward, where civilians and crew have taken
    refuge, and open fire with phasers, forcing everyone to the floor. Worf and two
    security officers attempt to intervene but are outgunned; Worf is stunned by Troi,
    while Data and O’Brien neutralize the security team with brutal efficiency. The
    scene escalates the crisis, demonstrating the aliens’ ruthless control over their
    hosts and the vulnerability of the Enterprise’s crew and civilians. The violence
    underscores the stakes: the Ux-Mal entities are willing to harm their own crewmates
    and innocent bystanders to achieve their escape, while Picard and Riker’s containment
    strategies prove ineffective against the possessed officers’ technical and tactical
    advantages. The chaos in Ten Forward forces the crew to confront the limits of
    their defenses and the personal cost of the alien threat.'
