  title: Riker forced to facilitate alien escape
  description: "\n  Under Picard’s alien-influenced coercion, Riker is compelled to\
    \ override the *Enterprise*’s computer lockouts and sever communications with\
    \ La Forge and Crusher. The act isolates Riker from his crew, granting the Ux-Mal\
    \ entities full control over the ship’s systems. Picard frames the demand as a\
    \ 'cooperative opportunity,' but the subtext is clear: Riker’s compliance is non-negotiable.\
    \ His hesitation—marked by a telling beat—reveals his internal conflict between\
    \ loyalty to Picard and the moral weight of aiding the aliens. The scene escalates\
    \ the crisis by consolidating the Ux-Mal’s power, while Riker’s broken arm (unbeknownst\
    \ to the aliens) remains his only advantage. The dialogue’s calculated tone underscores\
    \ the entities’ manipulation, turning Picard’s voice into a weapon against his\
    \ own crew.\n  "
