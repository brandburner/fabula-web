      in this event, manifesting through their possession of Troi, Data, and O’Brien.
      They coordinate the hijacking of the *Enterprise*, storm Ten Forward, and take
      hostages, demanding retrieval of remains from the *Essex* crash site. Their
      ruthless tactics include stunning crew members, disabling systems, and psychological
      manipulation exploiting personal bonds. The entities’ internal paranoia and
      hierarchical tensions emerge as Troi’s fabricated identity is exposed, revealing
      fractures in their unity. Their desperation to escape drives the negotiation,
      even as Picard’s strategic questioning uncovers their vulnerabilities.
