    power_dynamics: Exercising overwhelming authority over the bridge crew and ship
      systems, operating with near-total control and minimal resistance.
    organizational_goals:
    - Seize control of the Enterprise bridge and its systems to facilitate their escape
      from the moon prison.
    - Neutralize the senior officers (Riker, Worf, Ro) to prevent resistance and ensure
