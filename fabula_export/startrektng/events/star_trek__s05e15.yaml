      his to force Picard into a moral dilemma, aiming it at Worf and threatening
      execution. O’Brien draws his own phaser after Worf is subdued, adding to the
      tension as he targets Keiko. The weapons emit stun beams, injuring hostages
      and enforcing the entities’ demands. Their orange glow cuts through the chaos,
      symbolizing the crew’s loss of control and the entities’ dominance. The phasers
      are not just tools but extensions of the entities’ ruthlessness, turning the
      lounge into a battleground.
    status_before_event: Holstered or held loosely by the possessed crew, ready to
      be drawn at a moment’s notice.
    status_after_event: Actively brandished, with Data’s phaser trained on Worf and
      O’Brien’s drawn and aimed at Keiko, creating a high-stakes standoff.
    global_id: ger_object_048e2d8248c8
  - object_uuid: ger_object_999a1e3db4fb
    description_of_involvement: The skeletal remains of the *Essex* crew, claimed
      by the Ux-Mal entities to be those of Captain Shumar and his crew, serve as
      a bargaining chip in the standoff. Troi and Data insist that Picard beam these
      remains aboard the *Enterprise* for a proper burial on Earth, using the request
      as leverage to force his compliance. The remains are symbolic of the entities’
      deception—they exploit the crew’s respect for the dead to justify their escape.
      Their mention in the negotiation underscores the moral ambiguity of the situation,
      as Picard must weigh the ethical implications of honoring a request tied to
      a lie.
    status_before_event: Buried at the southern pole of the moon, undiscovered by
      sensors but claimed by the entities.
    status_after_event: Still buried, but the demand to retrieve them hangs over the
      negotiation, unresolved.
