  - 'PICARD: On the contrary, we''ve had a difficult time with transport since our
    arrival... that''s why we had to send down the shuttle. You should all be well
    aware of that fact.'
  - 'DATA: We must be able to use the transporters...'
  - 'PICARD: In fact, Chief O''Brien was the one who successfully executed the return
    of the away team... he is the most qualified on board to operate the transporter
    under these circumstances...'
  - 'DATA: It is a trick... he is trying to divide us...'
  - 'PICARD: Because I assume if you go to the cargo bay, you will choose not to take
    all of the hostages. Their safety is my primary concern.'
  - 'O''BRIEN: ((as he gets an idea)) But there is a way to neutralize that threat...
    Bridge, transfer all transporter functions to Ten Forward...'
