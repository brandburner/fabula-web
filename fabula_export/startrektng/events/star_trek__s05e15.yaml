    institutional_impact: The Ux-Mal entities' actions undermine the authority of
      Starfleet and the Enterprise crew, demonstrating the vulnerability of even the
      most advanced starship to external possession and control. Their takeover forces
      the remaining crew to respond to a full-scale invasion of their ship, shifting
      the narrative from psychological manipulation to physical domination.
    internal_dynamics: The entities operate with ruthless efficiency, but there are
