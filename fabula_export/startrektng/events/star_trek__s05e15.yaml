    description_of_involvement: The Enterprise's transporter array is the first critical
      system targeted by the possessed crew, who disable it and place it in diagnostic
      mode. This action cuts off the bridge crew's ability to beam in reinforcements
      or extract hostages, leaving them with no immediate means of direct intervention.
      The transporter's disablement is a ruthless but effective tactic, exploiting
