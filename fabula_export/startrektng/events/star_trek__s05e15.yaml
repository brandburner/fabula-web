  title: O'Brien's rescue attempt disrupted by storm
  description: 'Chief Miles O''Brien beams down to the moon''s surface to assist the
    stranded away team, but a violent storm erupts before he can complete the mission.
    As the team hurriedly positions enhancer rods to stabilize the transporter signal,
    lightning strikes O''Brien''s rod, knocking him away and triggering a cascade
    of mysterious energy rings. The rings possess Data, Troi, and O''Brien, while
    Riker—protected by an unknown force—activates the rods'' final switch, beaming
    the team back to the *Enterprise* just as the storm reaches its peak. The possession
    marks a critical escalation: the alien prisoners have now infiltrated the crew,
    turning the conflict from external investigation to an internal crisis. O''Brien''s
    mention of his daughter Molly adds emotional weight, foreshadowing the Ux-Mal''s
    later manipulation of his family as leverage. The storm''s disruption not only
    derails the rescue but also accelerates the alien threat, shifting the narrative
    from containment to survival.'
