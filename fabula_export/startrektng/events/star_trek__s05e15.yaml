- fabula_uuid: cand_evt_scene_6dde30437b34e94b_02
  global_id: null
  title: Picard outmaneuvers the Ux-Mal entities
  description: "\n  In the cargo bay, Picard faces down the Ux-Mal entities—now possessing\
    \ Troi, Data, and O’Brien—who threaten lethal violence if their demands aren’t\
    \ met. The entities demand release, but Picard exposes their bluff: they cannot\
    \ kill their hosts without dooming their own escape. Keiko and Worf reinforce\
    \ the crew’s willingness to die for the ship, while Picard offers a conditional\
    \ surrender—freedom for the entities in exchange for releasing their hosts. After\
    \ a tense standoff, the entities reluctantly retreat, abandoning their human vessels.\
    \ Picard immediately orders medical aid for the freed crew and instructs Worf\
    \ to transport the entities back to their moon prison. The moment marks a turning\
    \ point: the crew’s collective resolve, not brute force, defeats the alien threat,\
    \ while Picard’s strategic leadership preserves both lives and mission integrity.\n\
    \  "
