- fabula_uuid: cand_evt_scene_31ab1b2516cd9367_03
  global_id: null
  title: Possessed crew escalate hostage crisis
  description: 'The tension in Ten Forward reaches a breaking point as the alien-possessed
    crew—Data, Troi, and O’Brien—escalate their threats against the hostages, including
    Keiko and Worf. Picard attempts to negotiate, questioning the legitimacy of their
    claims about the *Essex* and its captain, Shumar, while subtly probing for inconsistencies.
    The aliens, however, respond with escalating violence: Data forces Picard to choose
    between Worf and Keiko, threatening to execute one of them if he refuses to comply
    with their demands. Meanwhile, O’Brien’s unsettling recitation of Miles’ repressed
    memories—spoken in a hollow, alien voice—terrifies Keiko, revealing the entities’
    ability to access and weaponize personal history. Troi, now fully under alien
    control, coldly rejects Picard’s appeals for mercy, signaling the crew’s moral
    boundaries are being tested. The scene culminates with Ro’s off-screen voice indicating
    she is preparing to act, setting up the next critical moment of confrontation.
    This event marks a turning point where the crew’s desperation and the aliens’
    ruthlessness collide, raising the stakes of the possession crisis to their peak.'
