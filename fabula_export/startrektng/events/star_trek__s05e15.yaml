- fabula_uuid: act_b6d8967e6b372e3a
  number: 4
  summary: Following the failed first plasma shock attempt and Captain Picard's self-sacrifice
    as a hostage, the tension within Ten Forward intensifies dramatically. Geordi
    La Forge and Ensign Ro work frantically to recalibrate their equipment and prepare
    for a second, more precise plasma shock, while Dr. Crusher finalizes the development
    of her containment field. The Ux-Mal entities, growing increasingly impatient
    and ruthless, escalate their threats. Data, under the alien's influence, first
    grabs Worf, then brutally separates Keiko O'Brien from her baby, Molly, threatening
    to kill them if Picard does not fully cooperate. Picard, witnessing this chilling
    display of cruelty, is forced to feign cooperation to buy precious time for the
    rescue efforts. On the bridge, Geordi and Ro meticulously monitor the situation
    inside Ten Forward, waiting for the precise moment when all three possessed crew
    members are simultaneously within range of their plasma weapon. When a fleeting
    opportunity arises, Ro fires the plasma charge. The blast successfully strikes
    Troi and O'Brien, causing them to writhe in pain as the energy rings momentarily
    streak out of them. However, Data, with his superior android reflexes, once again
    manages to evade the shock. In a desperate and immediate response, Data seizes
    Picard, holding him by the neck and demanding that the rescue attempt be aborted,
    threatening to kill everyone in the room, starting with the Captain. Picard, under
    duress, is forced to order the bridge to stand down. With Troi and O'Brien briefly
    freed but the entities quickly returning to them, and Data still posing an immediate,
    deadly threat, Riker, realizing the extreme danger and the failure of the plasma
    strategy, makes a drastic and high-stakes decision. He orders the cargo bay doors
    to be opened to space, a desperate move that would risk everyone but also definitively
    foil the prisoners' ultimate escape plan. This act masterfully builds intense
    suspense, vividly demonstrates the entities' escalating ruthlessness, and pushes
    the Enterprise crew to a desperate, high-stakes gamble, setting the stage for
    the ultimate confrontation.
