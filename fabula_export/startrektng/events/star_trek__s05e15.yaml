  title: Plasma weapon targeting confirms possession requirement
  description: "\n  In the claustrophobic crawl space between decks, Geordi La Forge\
    \ and Ensign Ro Laren navigate the cramped access tunnel while setting up a plasma\
    \ weapon targeting system. Their technical banter masks the tension of their mission:\
    \ to position the weapon so it can strike all three possessed crew members (Troi,\
    \ Picard, and Data) in Ten Forward. The targeting scanner reveals the forcefield’s\
    \ distortion, with a critical circular marker indicating the line of fire. Ro’s\
    \ observation that 'all three of them have to be in the circle if it's going to\
    \ work' confirms the mission’s brutal requirement—success hinges on sacrificing\
    \ the possessed officers to the plasma shock. Geordi’s check-in with Dr. Crusher\
    \ ensures operational coordination, reinforcing the urgency of the plan. The scene\
    \ underscores the crew’s desperation, as their only viable solution demands a\
    \ morally fraught trade-off: using their own crewmates as targets to save the\
    \ ship.\n  "
