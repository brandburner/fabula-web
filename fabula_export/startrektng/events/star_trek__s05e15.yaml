  title: Possessed crew seizes the bridge
  description: The bridge erupts into chaos when Ensign Ro detects an unauthorized
    orbital shift and locked helm controls, revealing the alien entities' growing
    influence over the ship's systems. Riker, suspicious of Data's uncharacteristic
    silence, approaches him—only for Data to violently lash out, striking Riker with
    unnatural speed and force. The confrontation escalates as O'Brien, also possessed,
    disarms Worf and stuns Ro, seizing control of the bridge. Riker attempts to transfer
    command to engineering, but the entities disable all consoles, leaving the crew
    vulnerable. This violent coup marks the aliens' direct takeover of the *Enterprise*,
    escalating the crisis from psychological manipulation to physical domination.
    The scene underscores the entities' ruthlessness and the crew's sudden helplessness,
    forcing Picard to respond to a full-scale invasion of his ship.
