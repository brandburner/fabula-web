  title: Data challenges Riker’s search strategy
  description: "\n  On the bridge, Data—still recovering from a speech glitch—publicly\
    \ defies Riker’s tactical approach by insisting on a polar-region scan, citing\
    \ electromagnetic field anomalies. The exchange reveals Data’s growing unpredictability,\
    \ as his stuttering and insistence clash with Riker’s cautious leadership. Meanwhile,\
    \ Troi’s private request to speak with Picard in the ready room hints at deeper\
    \ tensions, while Data and Troi share an unnoticed, knowing look. The moment underscores\
    \ the crew’s fractured trust and the escalating alien influence, as Data’s logic—though\
    \ technically sound—feels subtly off, foreshadowing his eventual possession. Riker’s\
    \ hesitation to deviate from the crash site reflects his reliance on conventional\
    \ tactics, while Data’s insistence marks the first overt sign of his compromised\
    \ judgment.\n  "
