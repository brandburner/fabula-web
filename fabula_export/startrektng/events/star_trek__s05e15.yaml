  title: Troi Overpowers Picard in Turbolift Escape
  description: 'In a violent escalation of the alien possession crisis, Deanna Troi—now
    fully under the Ux-Mal entity’s control—ambushes Captain Picard in the ready room,
    striking him down with brutal efficiency to clear her path to the bridge. She
    joins Data and O’Brien, who have already seized control of the bridge and stunned
    Riker, Worf, and Ro. The possessed crew moves with desperate urgency, their fractured
    command structure exposed as Troi berates Data for not waiting for her to manipulate
    Picard into compliance. O’Brien, now armed with additional phasers, leads the
    group toward the turbolift, their goal clear: to abandon the stranded officers
    and flee the moon prison using the *Enterprise*’s resources. The scene underscores
    the aliens’ ruthlessness, their internal divisions, and the crew’s dwindling options
    to regain control before the ship is lost to their escape plan.'
