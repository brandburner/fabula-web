  scene_sequence: 30
  sequence_in_scene: 49
  key_dialogue:
  - 'PICARD: Impressions, Mister Worf?'
  - 'WORF: Spiritual possessions of this sort have been reported throughout Klingon
    history. It is called Jat''yIn -- the taking of the living by the dead.'
  - 'PICARD: ... then he should be on much better behavior, don''t you think... ?
    A Starfleet Captain?'
  - 'O''BRIEN: I gave you that... In a place called McKinley Park. Green grass...
    tall trees.'
  - 'KEIKO: Please... don''t...'
  - 'O''BRIEN: You said, ''You make me so happy, Miles.'''
  - 'TROI: Leave her alone.'
  - 'DATA: You will cooperate... you will cooperate... or someone will die, Captain...
    who will it be... ?'
  - 'DATA: Pick one to die, Captain. Or I will kill them both...'
  - 'WORF: Choose me, Captain.'
