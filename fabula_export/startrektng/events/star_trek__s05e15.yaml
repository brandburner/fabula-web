  global_id: null
  title: Data’s first possession symptom surfaces
  description: "\n  In the turbolift, Picard and Riker discuss the derelict ship’s\
    \ lack of life signs, with Riker suggesting scanner modifications to penetrate\
    \ the storms. Data’s sudden, uncharacteristic stuttering—his first visible sign\
    \ of possession—interrupts the conversation, drawing immediate attention. The\
    \ crew’s reactions (Picard’s concern, Troi’s knowing glance) signal the alien\
    \ entity’s growing control over him. The turbolift’s arrival at its destination\
    \ underscores the urgency: what began as an external mystery (the shipwreck) now\
    \ shifts to an internal horror (Data’s corruption). The moment marks the first\
    \ overt sign of the Ux-Mal’s infiltration, forcing the crew to confront a threat\
    \ they’ve yet to fully recognize.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e15
  scene_sequence: 13
  sequence_in_scene: 18
  key_dialogue:
  - 'PICARD: Did you find any evidence of life?'
  - 'RIKER: No, but if Troi was right, we weren’t far away from it...'
  - 'PICARD: Bridge. How do you suggest we proceed?'
  - 'RIKER: We’re gonna have to find a way to modify the scanners to penetrate those
    storms. Got any ideas, Data...?'
  - 'DATA: ((a beat)) It is p-p-possible we might be able to employ virtual imaging
    to interpolate missing data...'
  - 'PICARD: Is there something wrong, Data?'
