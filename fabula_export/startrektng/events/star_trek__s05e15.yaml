  title: O'Brien’s possession fractures under Molly’s cry
  description: In a tense standoff inside Ten Forward, the possessed crew—Data, Troi,
    and O’Brien—hold the Enterprise’s hostages at phaser point while Picard negotiates
    their demands. The moment fractures when Molly O’Brien’s crying triggers a violent
    reaction in Chief O’Brien, whose alien entity recoils from the infant’s distress.
    O’Brien’s brief, unguarded recognition of Keiko and Molly reveals the entity’s
    instability, as it struggles to maintain control over his emotional responses.
    Data’s subsequent outburst—‘Silence that... ch-child!’—exposes the entities’ discomfort
    with human vulnerability, hinting at a critical weakness in their possession.
    The scene underscores the precariousness of their grip on O’Brien’s body and the
    potential to exploit his lingering connection to his family. Meanwhile, Troi’s
    calculated deception as ‘Captain Bryce Shumar’ sets up Picard’s interrogation,
    but the entities’ desperation and internal fractures become increasingly apparent,
    foreshadowing their eventual downfall.
