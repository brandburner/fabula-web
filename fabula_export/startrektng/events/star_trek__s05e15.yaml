  title: Possessed crew seizes Ten Forward
  description: "\n  The possessed crew, now fully in control of Ten Forward, corner\
    \ Worf while Troi—possessed by the Ux-Mal entity—aims a phaser at him, her alien\
    \ presence evident in her unsettling demeanor. Picard, monitoring from the bridge,\
    \ attempts to establish communication with Worf, but Troi intercepts, confirming\
    \ Worf’s presence while subtly asserting the Ux-Mal’s dominance. Meanwhile, on\
    \ the bridge, Riker orders security teams to both entrances of Ten Forward, but\
    \ Geordi reveals the possessed crew has already locked out computer access, forcing\
    \ a strategic deadlock. The Ux-Mal’s preemptive lockdown of Ten Forward’s systems\
    \ exposes the crew’s vulnerability, escalating the crisis as the entities tighten\
    \ their grip on the ship’s infrastructure and personnel. The event marks a critical\
    \ turning point, shifting the conflict from chaotic phaser battles to a high-stakes\
    \ standoff where the Ux-Mal dictate the terms of engagement.\n  "
