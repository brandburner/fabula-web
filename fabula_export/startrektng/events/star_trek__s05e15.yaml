- fabula_uuid: act_d25c35d2b062f140
  number: 5
  summary: 'The Enterprise now holds a polar orbit as demanded by the Ux-Mal entities.
    Riker and the bridge crew grapple with the challenge of the possessed crew, who
    demand the specific coordinates of their "remains" from the Essex wreck be beamed
    aboard. Picard, still a hostage in Ten Forward, initiates a subtle game of manipulation.
    He highlights the inherent difficulty of using transporters in the severe electromagnetic
    interference, a fact the possessed O''Brien initially denies but is forced to
    acknowledge due to the away team''s recent crash. Picard then shrewdly suggests
    that O''Brien, as the most qualified, would need to operate a transporter from
    a cargo bay pad, subtly attempting to divide the group. When Data expresses suspicion,
    Picard offers safe passage to all, framing it as a concern for the hostages. The
    entities, seeking absolute control, demand all transporter functions be transferred
    to Ten Forward, which O''Brien successfully achieves, creating a unique access
    code to prevent any counter-use by the Enterprise crew. To ensure their safety
    during the move, each entity takes a hostage: Troi takes Picard, Data takes Worf,
    and O''Brien takes Keiko, leaving baby Molly with a supernumerary. They then proceed
    to Cargo Bay Four. In the cargo bay, Picard presses Troi, questioning their true
    intentions and how they plan to achieve their promised "rest." Troi, exasperated
    by his persistence, finally reveals their true identity as Ux-Mal prisoners from
    a penal colony, seeking to use the Enterprise and its crew''s bodies to escape
    their centuries-long imprisonment. At this critical juncture, Dr. Crusher, acting
    on Riker''s command, floods the cargo bay with her containment field, neutralizing
    the energy rings and rendering the entities powerless. Picard confronts the trapped
    entities, emphasizing their inability to escape and the Enterprise crew''s unwavering
    willingness to die to prevent their escape. Realizing their plan is irrevocably
    foiled, the Ux-Mal entities release their hosts. The energy rings are then captured
    in the containment field and beamed back to the moon. The Enterprise crew recovers
    from their ordeal, with Troi, Data, and O''Brien reflecting on their harrowing
    experience, and O''Brien sharing a loving reunion with Keiko and Molly, bringing
    a sense of relief and resolution to the harrowing experience as the Enterprise
    departs the stormy moon.'
