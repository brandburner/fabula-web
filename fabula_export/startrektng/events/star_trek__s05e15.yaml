  title: Enterprise approaches forbidden distress signal
  description: "\n  The *Enterprise* enters orbit around Mab-Bu Six, a storm-wracked\
    \ moon officially classified as uninhabited, responding to a weak distress signal\
    \ detected from its surface. Captain Picard records a log entry noting the anomaly—the\
    \ moon’s forbidden status and the signal’s origin—while the ship’s sensors struggle\
    \ against the moon’s violent electromagnetic interference. The scene establishes\
    \ the moon’s eerie, hostile environment and the crew’s initial curiosity, which\
    \ will soon escalate into a crisis as they uncover the truth behind the distress\
    \ call. Picard’s log entry subtly foreshadows the danger ahead, framing the moon\
    \ as a place of hidden threats rather than a simple rescue mission. The visual\
    \ contrast between the moon’s dark, stormy surface and the glowing gas giant behind\
    \ it reinforces the tension, hinting at the unknown forces at play.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e15
  scene_sequence: 1
  sequence_in_scene: 1
  key_dialogue: &id001
  - 'PICARD: ((V.O.)) Captain''s log, stardate 45571.2. We are going into orbit around
    an unexplored M-class moon of Mab-Bu Six. Though the moon was reported to be uninhabited,
    we have picked up a weak distress call.'
