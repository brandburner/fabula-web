      implied leadership and the *Enterprise*’s technological capabilities are a source
      of hope, but their inability to intervene immediately highlights the crew’s
      vulnerability. The organization’s role is off-screen but critically narrative,
      driving the crew’s urgency to survive until rescue arrives.
