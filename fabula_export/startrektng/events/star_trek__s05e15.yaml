  - organization_uuid: ger_organization_48782eabb521
    description_of_involvement: The Ux-Mal entities, acting as a collective force,
      exert their influence through the possessed bodies of Data, Troi, and O’Brien.
      They manipulate the crew’s emotions, exploit personal memories, and enforce
      their demands with phaser threats, all to achieve their escape from the penal
      colony. Their power dynamics are ruthless and hierarchical, with Troi serving
      as the primary spokesperson and Data acting as the enforcer. The entities’ internal
      tensions—hinted at in their fragmented speech and erratic behavior—suggest a
      fractured unity, but their collective resolve remains strong. Their goal is
      to commandeer the *Enterprise* and use it to flee their prison, regardless of
      the cost to the crew.
    active_representation: Through the possessed crew members—Data, Troi, and O’Brien—who
      act as extensions of the entities’ will, enforcing their demands and escalating
      the standoff.
    power_dynamics: The entities exercise absolute control over the possessed crew,
      using their bodies as tools for coercion and escape. Their power is derived
      from the crew’s emotional vulnerabilities and the high stakes of the hostage
