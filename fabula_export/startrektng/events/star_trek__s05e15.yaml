      lured into the trap. The lounge’s reversed forcefields isolate it from the rest
      of the ship, blocking sensors and communications, which makes it the perfect
      setting for the crew’s desperate gambit. The forcefield’s distortions, visible
      on the targeting monitor, add a layer of uncertainty to the plan, as Geordi
      and Ro must account for these anomalies to ensure the plasma shock strikes its
      targets. Ten Forward’s role in the event is both practical—a battleground—and
      symbolic, as it represents the heart of the *Enterprise*’s social and moral
      fabric, now hijacked by the Ux-Mal.
