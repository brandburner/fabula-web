      \ repurposed for high-stakes negotiation. The containment field floods the area,\
      \ trapping the entities and their hosts, while the plasma shock is delivered\
      \ through the transporter pad. The bay’s hatches and doors are potential weak\
      \ points, but Picard’s strategy ensures they are not needed for the resolution.\
      \ The atmosphere is thick with tension, the hum of the containment field mixing\
      \ with the crackle of the plasma shock.\n      "
    observed_atmosphere: "\n        Tension-filled and electrically charged. The air\
