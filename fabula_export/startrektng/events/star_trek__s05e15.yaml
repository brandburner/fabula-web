  title: Riker authorizes access to alien containment
  description: On the Enterprise bridge, Commander Riker monitors the progress of
    Geordi La Forge and Beverly Crusher as they move toward Deck 18, where the alien
    prisoners are held. Ensign Ro confirms their location, prompting Riker to override
    security protocols and grant them access to Cargo Bay Four—a restricted area housing
    the possessed crew. This decision, though routine, aligns with the Ux-Mal entities'
    escape plan, escalating the narrative tension by placing the ship's security at
    greater risk. The scene underscores Riker's command authority and the aliens'
    ability to manipulate the crew's actions from within, setting up a critical moment
    where the Enterprise's defenses are inadvertently compromised. The dialogue is
    terse and functional, reflecting the urgency of the situation and the crew's focus
    on resolving the crisis without realizing the deeper threat at play.
