  title: Troi reports telepathic pull from the moon
  description: In the Ready Room, Counselor Troi confesses to Captain Picard an unsettling
    telepathic experience tied to the moon’s southern polar region. She describes
    a fleeting but intense sensation of voices carried on the wind, compelling her
    toward that location. Picard probes for specifics, but Troi admits uncertainty
    about the message’s content—only that it felt like a deliberate summons. The exchange
    establishes Troi’s empathic sensitivity as a critical investigative tool, while
    the moon’s southern polar region emerges as a focal point for the *Essex*’s mystery.
    The scene underscores the crew’s growing awareness of an unseen, possibly supernatural
    threat, elevating the stakes of their investigation beyond the shipwreck’s physical
    remains. Picard’s measured questioning contrasts with Troi’s emotional urgency,
    highlighting their complementary roles in confronting the unknown.
