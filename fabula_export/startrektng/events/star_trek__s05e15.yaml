    on this moon for long.'
  - 'TROI: Maybe they''ve been living underground.'
  - 'RIKER: Question is where? I still can''t locate the source of the damn signal...
    it''s bouncing around more than we are...'
  - 'DATA: Sir, forward thrusters have failed. We are losing power.'
