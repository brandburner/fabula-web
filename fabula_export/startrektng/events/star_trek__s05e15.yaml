      action isolates the lounge, cutting off all internal communications, sensor
      feeds, and transporter locks. The forcefields become an impenetrable barrier,
      trapping the possessed crew and hostages inside while leaving the bridge crew
      blind and immobile. Their reversal is a masterstroke of technical precision,
      exploiting the ship's systems to ensure the aliens' escape plan proceeds uninterrupted.
      The forcefields symbolize the possessed crew's dominance and the bridge crew's
      sudden helplessness.
