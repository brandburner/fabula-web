      bridge, the ship's command center, is overrun in a matter of seconds, as the
      entities use their possessed hosts to disable the crew and transfer command
      functions to engineering. The Enterprise's systems, which normally operate under
      the crew's control, are hijacked, leaving the ship vulnerable to the aliens'
      domination. This event marks a turning point in the narrative, as the Enterprise
      is no longer a refuge but a battleground for the crew's survival.
