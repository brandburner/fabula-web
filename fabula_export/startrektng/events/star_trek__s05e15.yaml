      the possessed crew moving with eerie precision. The reversed forcefields cast
      an unnatural glow, amplifying the sense of isolation and danger.
    functional_role: Battleground and prison for the possessed crew and hostages.
      The location’s sealed-off status forces the bridge crew to innovate, turning
      Ten Forward’s defenses into a delivery mechanism for the plasma shock.
    symbolic_significance: Represents the violation of the crew’s personal and social
      spaces. Ten Forward, typically a place of relaxation and camaraderie, becomes
      a site of control and coercion, highlighting the entities’ intrusion into the
      crew’s lives.
    access_restrictions: Sealed by reversed forcefields, with no entry or exit possible
