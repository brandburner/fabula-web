  global_id: null
  title: Troi rejects Picard’s trust, demands ship access
  description: "\n  In a tense standoff aboard *Ten Forward*, Deanna Troi—possessed\
    \ by the Ux-Mal entity—rebuffs Captain Picard’s offer of help after he exposes\
    \ her false identity as *Essex* Captain Bryce Shumar. The entity pivots from deception\
    \ to direct confrontation, declaring it cannot trust Picard and demanding the\
    \ *Enterprise* as a means to escape the moon prison. Data’s escalating impatience\
    \ underscores the urgency of the crisis, while Troi’s calculated manipulation\
    \ reveals the alien prisoners’ ruthless priorities: their freedom supersedes all\
    \ other concerns, including the lives of the crew they’ve hijacked. The scene\
    \ crystallizes the entities’ desperation and the crew’s vulnerability, setting\
    \ up the high-stakes confrontation to come.\n  "
