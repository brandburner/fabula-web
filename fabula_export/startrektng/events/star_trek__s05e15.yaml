  object_involvements:
  - object_uuid: ger_object_10637ad3cec1
    description_of_involvement: The turbolift interior control panel becomes a critical
      tool in the possessed officers' attempt to escape. O'Brien reads the panel to
      confirm their location (Deck 10) and immediately begins manipulating the controls
      to override the bridge's command lock. His technical expertise is on full display
      as he fiddles with the interior panel, his fingers moving quickly in a desperate
      attempt to regain mobility. The panel's functionality is both a lifeline and
      a point of vulnerability, as the crew's ability to override it from the bridge
      demonstrates their tactical advantage.
    status_before_event: Functional and responsive, displaying the turbolift's current
      deck and accepting manual inputs.
    status_after_event: Locked by the bridge override, with O'Brien's attempts to
      bypass it unsuccessful.
    global_id: ger_object_10637ad3cec1
