- fabula_uuid: cand_evt_scene_7d195d8bbaba3c24_02
  global_id: null
  title: Riker confronts Pressman over cloaking device
  description: "\n  In the eerie, half-collapsed engineering section of the *Pegasus*—its\
    \ walls fused with rock and littered with the preserved bodies of its crew—Admiral\
    \ Pressman and Commander Riker materialize to retrieve the ship’s illegal cloaking\
    \ device. The moment Pressman exposes the intact device, Riker’s conflict becomes\
    \ visceral: his past loyalty to Pressman clashes with his present moral clarity.\
    \ He confronts Pressman directly, rejecting the experiment’s justification and\
    \ the cost of its secrecy, while Pressman retaliates with a veiled threat to Riker’s\
    \ career. Their standoff—rooted in Pressman’s unyielding ambition and Riker’s\
    \ belated remorse—culminates in a tense impasse, where Riker’s refusal to comply\
    \ forces Pressman to assert dominance. The scene ends abruptly with Picard’s recall\
    \ order, leaving the device’s fate and Riker’s allegiance unresolved but the stakes\
    \ painfully clear: the past’s sins demand reckoning, and the Federation’s treaties\
    \ cannot be ignored.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e12
  scene_sequence: 16
  sequence_in_scene: 34
  key_dialogue:
  - 'PRESSMAN: This room was open to space for twelve years...'
  - 'RIKER: I know. I just kept hoping it wasn’t going to be here... that it would’ve
    been destroyed or buried back there in the rock...'
  - 'RIKER: I can’t let you start these experiments all over again. It was wrong twelve
    years ago, and it’s still wrong today.'
  - 'PRESSMAN: You’d better reconsider that position, Commander. We have a mission
    to accomplish and you’re going to carry it out.'
  - 'RIKER: You don’t know that. Neither of us knows what happened after we left.'
  - 'PRESSMAN: That doesn’t sound like the young Conn Officer who grabbed a phaser
    and defended his captain twelve years ago.'
  - 'RIKER: Yeah, well I’ve had twelve years to think about it. And if I had to do
    it over again... I’d point that phaser at you instead of them.'
  - 'PRESSMAN: So on reflection... you’d rather be a traitor than a hero.'
  - 'RIKER: I wasn’t a hero and neither were you. What you were doing was wrong and
    I was wrong to support you.'
  - 'PRESSMAN: I made you... and I can break you just as easily.'
