- fabula_uuid: cand_evt_scene_7d195d8bbaba3c24_01
  global_id: null
  title: Riker confronts Pressman over cloaking device
  description: "\n  In the eerie, rock-encased engineering section of the *Pegasus*,\
    \ Riker and Pressman materialize amid the preserved corpses of the ship’s dead\
    \ crew—a grim reminder of the past. The room’s fusion with the asteroid and the\
    \ bodies in old Starfleet uniforms underscore the tragedy of the *Pegasus*’s final\
    \ mission. Pressman, focused solely on retrieving the cloaking device, dismisses\
    \ Riker’s emotional reaction to the dead crew, revealing his callous prioritization\
    \ of the mission over human life. When Pressman uncovers the intact cloaking device,\
    \ Riker’s worst fears are confirmed, forcing him to confront his complicity in\
    \ the past and his moral duty in the present. Their confrontation escalates as\
    \ Riker, now matured by twelve years of reflection, rejects Pressman’s justification\
    \ for violating the Treaty of Algeron. Pressman retaliates with a veiled threat,\
    \ exploiting his authority over Riker’s career. The tension reaches a breaking\
    \ point when Picard’s urgent com signal interrupts them, but not before Riker’s\
    \ resolve to stop Pressman—regardless of the personal cost—becomes clear. The\
    \ scene ends with the device beamed up, but the moral and ethical stakes of their\
    \ conflict remain unresolved, setting the stage for Riker’s inevitable defiance.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e12
  scene_sequence: 16
  sequence_in_scene: 33
  key_dialogue:
  - 'PRESSMAN: This room was open to space for twelve years...'
  - 'RIKER: I know. I just kept hoping it wasn’t going to be here... that it would’ve
    been destroyed or buried back there in the rock...'
  - 'RIKER: I can’t let you start these experiments all over again. It was wrong twelve
    years ago, and it’s still wrong today.'
  - 'PRESSMAN: You’d better reconsider that position, Commander. We have a mission
    to accomplish and you’re going to carry it out.'
  - 'RIKER: You don’t know that. Neither of us knows what happened after we left.'
  - 'RIKER: No... we killed them.'
  - 'PRESSMAN: So on reflection... you’d rather be a traitor than a hero.'
  - 'RIKER: I wasn’t a hero and neither were you. What you were doing was wrong and
    I was wrong to support you... I was just too young and stupid to realize it at
    the time.'
  - 'PRESSMAN: I made you... and I can break you just as easily.'
