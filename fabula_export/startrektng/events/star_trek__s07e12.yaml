  global_id: null
  title: Riker questions Pressman’s moral legacy
  description: In a tense yet paternal exchange at Ten Forward, Admiral Pressman subtly
    tests Riker’s loyalty by reminiscing about their shared past aboard the *Pegasus*,
    while Riker’s probing questions expose his unresolved guilt and suspicion about
    the ship’s classified mission. The conversation begins with lighthearted nostalgia—Pressman
    teasing Riker about his beard and old nicknames—but quickly shifts to the unspoken
    weight of their past. When Riker asks whether they’ll find the *Pegasus* and its
    ‘experiment,’ Pressman deflects, only to later reveal that Starfleet Security
    is backing a renewed attempt to revive the illegal cloaking technology. Riker’s
    discomfort grows as Pressman insists this time will be different, but his troubled
    expression signals his deepening conflict between duty and conscience. The scene
    ends with Riker visibly unsettled, foreshadowing his eventual confrontation with
    Pressman’s moral compromises and the Federation’s principles.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e12
  scene_sequence: 7
  sequence_in_scene: 13
  key_dialogue:
  - |-
    PRESSMAN: How long have you had the beard?
    RIKER: About four years. I think I just got tired of hearing how 'young I looked.'
    PRESSMAN: What was it that Lieutenant Boylen used to call you?
    RIKER: ((grimaces)) Ensign Babyface.
  - |-
    RIKER: Do you ever... wonder whether we did the right thing?
    PRESSMAN: Never. It was a tragedy, yes. But it wasn’t your fault and it wasn’t mine. What we were doing was for the good of the Federation. We can’t blame ourselves because the others couldn’t see that.
  - |-
    RIKER: You want to try again?
    PRESSMAN: ((glances around, then sotto)) It’s not just me. The Chief of Starfleet Security has personally assured me of her complete support.
    RIKER: Admiral Raner...? How many other people know about this?
    PRESSMAN: Not many. And it’s up to us to make sure it stays that way. Raner gave me written orders for you... you’ll find them coded in the Enterprise computer. You’ve been instructed not to reveal the true nature of our mission to anyone, not even Captain Picard.
