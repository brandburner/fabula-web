  object_involvements:
  - object_uuid: ger_object_7ca075093e42
    description_of_involvement: The warp plasma conduits are the technical backbone
      of the cloaking device’s activation. Geordi reroutes the *Enterprise*’s impulse
      engines through these conduits, a maneuver that stabilizes the cloak but carries
      significant risk—if the intercooler levels spike, the entire relay system could
      fail catastrophically. The conduits are the physical link between the ship’s
      power systems and the cloaking device, and their successful rerouting is the
      difference between escape and disaster. Their involvement is both a technical
      triumph and a moral tightrope, as the crew knows the *Pegasus* met its fate
      due to a similar failure.
    status_before_event: Dormant but functional, part of the *Enterprise*’s standard
      propulsion and power distribution network.
    status_after_event: Actively rerouted and integrated into the cloaking device’s
      power sequence, now humming with energy as the device engages.
    global_id: ger_object_7ca075093e42
  - object_uuid: ger_object_db4631d02410
    description_of_involvement: 'The cloaking device is the centerpiece of this event,
      both literally and thematically. Under Riker’s command, it hums to life, enveloping
      the *Enterprise* in invisibility and escaping the Romulan trap. The device’s
      activation is a technical success—Geordi and Data confirm its stability—but
      it is also a moral transgression, violating the Federation’s Treaty of Algeron.
      The low, resonant hum filling Main Engineering is the auditory manifestation
      of the crew’s desperation and the weight of their choice. The device’s involvement
      is a turning point: it saves the ship but seals the crew’s fate in the eyes
      of Starfleet law.'
    status_before_event: Dormant and illegal, stored as a prototype or hidden system
      aboard the *Enterprise*, awaiting activation.
    status_after_event: Active and engaged, cloaking the *Enterprise* and rendering
      it invisible to Romulan sensors. The device is now a ticking clock, as its use
      will have severe consequences for the crew and Picard’s command.
    global_id: ger_object_db4631d02410
  - object_uuid: ger_object_9a3b93cb33f2
    description_of_involvement: The *Pegasus*’s experimental engine and weapon systems
