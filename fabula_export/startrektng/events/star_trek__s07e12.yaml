  object_involvements:
  - object_uuid: ger_object_00d226f98e60
    description_of_involvement: The *Enterprise*’s maneuvering thrusters are the mechanical
      enablers of Picard’s strategy, allowing the ship to navigate the asteroid’s
      narrow chasm without the use of the cloaking device. The Conn Officer’s precise
      adjustments ensure the ship reaches the optimal position for the cloaking device
      to be deactivated in full view of the Romulan warbird. The thrusters hum under
      yellow alert, their controlled bursts a tactile reminder of the ship’s vulnerability
      and the high stakes of Picard’s gamble. Without them, the *Enterprise* would
      be trapped, unable to execute its captain’s bold plan.
    status_before_event: Operational but underutilized, as the cloaking device had
      been the primary means of navigation.
    status_after_event: Actively engaged, guiding the *Enterprise* through the asteroid
      and into the open where the cloaking device can be deactivated.
