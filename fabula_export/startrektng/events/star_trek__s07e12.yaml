  title: Romulans seal Enterprise in asteroid
  description: |2-

      The *Enterprise* bridge erupts into crisis as Admiral Pressman and Riker return from the *Pegasus*’s unstable engineering section—now without the cloaking device. The main viewer displays a solid wall of molten rock, the chasm’s entrance sealed by Romulan disruptor fire. Picard delivers the devastating report: the Romulans have trapped the *Enterprise* inside the asteroid, instantly transforming the scene’s tension from Pressman’s arrival to an existential threat. The crew’s focus shifts from the *Pegasus* conspiracy to immediate survival, while Riker’s moral dilemma—revealing the illegal cloaking device—becomes even more urgent. The scene’s abrupt shift from internal conflict to external peril forces the crew to confront both the Romulans’ strategic aggression and the consequences of their own secrets. The molten rock’s cooling glow underscores the irreversible nature of the trap, heightening the stakes as the act ends on a cliffhanger.
