      account while hinting at the larger lie (the cloaking device). The pod symbolizes
      the crew’s survival and the beginning of the conspiracy, its absence from the
      official report now glaring in the context of the Romulan salvage. Its role
      is purely narrative—triggering Picard’s skepticism and Geordi’s technical questions—but
      its implications ripple through the entire event.'
    status_before_event: Stored in Starfleet archives or a classified database, its
      existence known only to survivors and high-ranking officers involved in the
      cover-up.
    status_after_event: Implicitly ‘activated’ as evidence in the conversation, now
      a focal point of the mission’s urgency. Its mention ensures the crew’s focus
      shifts from the warp core breach lie to the *Pegasus*’s experimental systems—and
      the Romulans’ threat.
