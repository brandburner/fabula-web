      perceive the radiation as natural.
    global_id: ger_object_43cda215e335
  - object_uuid: ger_object_9a3b93cb33f2
    description_of_involvement: The USS Pegasus’s experimental engine/weapon systems
      are the focal point of the deception. Though physically hidden within Asteroid
      Gamma 601, its subspace resonance signature is detected by Geordi, revealing
      its presence. The crew’s entire strategy—from Riker’s proposal to destroy the
