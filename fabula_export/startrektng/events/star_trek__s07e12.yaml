- fabula_uuid: cand_evt_scene_bbb1f7e27e6e40d4_01
  global_id: null
  title: Pegasus’s destruction and cloak activation
  description: "\n  In Main Engineering, Geordi La Forge confirms the catastrophic\
    \ failure of the *Pegasus*’s impulse engines, revealing that the ship’s warp plasma\
    \ conduits were rerouted in a way that caused a fatal cascade—plasma ignited in\
    \ space, simulating destruction while the vessel remained in a phased state. This\
    \ explanation triggers a flash of realization in Riker, who connects the dots:\
    \ the *Pegasus* drifted into the asteroid system, its cloak failing mid-phase,\
    \ trapping half the ship in solid rock. The revelation underscores the moral weight\
    \ of the cloaking device’s existence and its role in the *Pegasus*’s doomed mission.\
    \ Moments later, Geordi reports the Enterprise’s cloaking device is operational,\
    \ forcing Picard to order its activation. The low hum of the cloak filling Engineering\
    \ marks the Enterprise’s irreversible breach of the Treaty of Algeron, escalating\
    \ the moral dilemma at the heart of the crisis. The scene pivots from forensic\
    \ analysis to high-stakes action, with Riker’s past colliding with Picard’s present\
    \ command.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e12
  scene_sequence: 19
  sequence_in_scene: 40
  key_dialogue: &id011
  - 'GEORDI: Commander, I''ve routed the impulse engines through the warp plasma conduits...
    but you''ll have to watch the intercooler levels... if they go too high, we''ll
    blow out the entire relay system.'
  - 'RIKER: I think that''s what happened twelve years ago. The cloak blew out the
    plasma relays on the *Pegasus* after we left the ship... the plasma ignited in
    space, and it looked like the ship had been destroyed.'
  - 'PRESSMAN: So the ship drifted into this system... still in a phased state...
    and when it passed through this asteroid...'
  - 'RIKER: The cloak failed. And half the ship materialized in solid rock.'
  - 'GEORDI: La Forge to Bridge. The cloak is on-line and ready to begin phase sequencing.'
  - 'PICARD: Proceed, Number One.'
