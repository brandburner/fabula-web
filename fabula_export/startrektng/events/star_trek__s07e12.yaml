  global_id: null
  title: Enterprise activates forbidden cloaking device
  description: In a high-stakes technical maneuver, Riker—under Picard’s direct order—successfully
    activates the *Enterprise*’s cloaking device while concealed inside an asteroid,
    a move that violates the Federation’s Treaty of Algeron. Geordi’s engineering
    work confirms the device is operational, and Riker’s grim revelation about the
    *Pegasus*’s destruction (its cloak failing and half the ship materializing inside
    solid rock) underscores the moral weight of their actions. The cloaking device’s
    activation is both a technical triumph and a moral transgression, forcing Riker
    to confront his past loyalty to Captain Morgan Bateson while Picard asserts his
    authority over Pressman’s secretive mission. The moment is charged with tension,
    as the crew crosses an ethical line to escape the Romulan trap, setting up the
    inevitable confrontation with Federation law and Pressman’s authority.
