    description_of_involvement: The *Enterprise*’s maneuvering thrusters are engaged
      by the Conn Officer to guide the ship through the asteroid using only sublight
      propulsion, avoiding the use of the cloaking device or warp drive. Their precise
      adjustments are critical to the ship’s safe passage, countering the gravitational
      and magnetic hazards identified by Data. The thrusters hum under yellow alert
      as the *Enterprise* navigates the narrow chasm, their controlled bursts a testament
      to the crew’s technical skill amid the moral and political storm unfolding on
      the bridge. Once clear of the asteroid, the thrusters fall silent as the ship
      prepares for Picard’s order to decloak, their role shifting from navigation
      to symbolic compliance with his defiant stance.
    status_before_event: Active and engaged, firing controlled bursts to maneuver
      the *Enterprise* through the asteroid’s subsurface layers.
    status_after_event: Powered down but ready, as the *Enterprise* sits in open space,
      now decloaked and vulnerable to the Romulan Warbird’s gaze.
