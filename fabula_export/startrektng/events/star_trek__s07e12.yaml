  key_dialogue:
  - 'PICARD: Mutiny... on a Federation starship. It''s shocking -- no, it''s unthinkable.
    And yet you''ve never mentioned it.'
  - 'RIKER: I was seven months out of the Academy... my head was still ringing with
    words like duty and honor. When they moved against him, I thought they were a
    group of self-serving, disloyal officers. So I grabbed a phaser and defended my
    captain.'
  - 'PICARD: Wil, what the hell''s going on here? Why did your crew mutiny? And why
    is Pressman so determined to find your ship twelve years later?'
  - 'RIKER: I''ve told you all I can. I am under the direct orders of Admiral Pressman...
    not to discuss this. Sir.'
  - 'PICARD: I may have to re-evaluate the command structure of this ship.'
