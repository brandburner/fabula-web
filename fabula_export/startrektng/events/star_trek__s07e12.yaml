    description_of_involvement: The *Enterprise*’s maneuvering thrusters are the mechanical
      enablers of Picard’s strategy, allowing the ship to navigate the asteroid’s
      narrow chasm without the use of the cloaking device. The Conn Officer’s precise
      adjustments ensure the ship reaches the optimal position for the cloaking device
