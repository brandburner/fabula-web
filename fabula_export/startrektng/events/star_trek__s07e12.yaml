  key_dialogue:
  - 'PRESSMAN: How long have you had the beard?'
  - 'RIKER: About four years. I think I just got tired of hearing how ''young I looked.'''
  - 'PRESSMAN: What was it that Lieutenant Boylen used to call you?'
  - 'RIKER: ((grimaces)) Ensign Babyface.'
  - 'RIKER: Do you really think we''ll find the Pegasus?'
  - 'PRESSMAN: I wouldn''t have come all the way out here if I didn''t.'
  - 'RIKER: And what about our... experiment? Do you think we''ll find that too?'
  - 'PRESSMAN: Maybe.'
  - 'RIKER: You know... I still think about what happened... about that last day.'
  - 'PRESSMAN: So do I. It''s not the kind of thing you just forget about.'
  - 'RIKER: Do you ever... wonder whether we did the right thing?'
  - 'PRESSMAN: Never. It was a tragedy, yes. But it wasn''t your fault and it wasn''t
    mine. What we were doing was for the good of the Federation. We can''t blame ourselves
    because the others couldn''t see that.'
  - 'RIKER: I know... but maybe we went about it the wrong way.'
  - 'PRESSMAN: Well, this time we may have a chance to do it the right way. If this
    mission is successful... if we do find the Pegasus and our experiment... we can
    finish what we started twelve years ago.'
  - 'RIKER: ((shocked)) You want to try again?'
  - 'PRESSMAN: ((glances around, then sotto)) It''s not just me. The Chief of Starfleet
    Security has personally assured me of her complete support.'
  - 'RIKER: Admiral Raner...? How many other people know about this?'
  - 'PRESSMAN: Not many. And it''s up to us to make sure it stays that way. Raner
    gave me written orders for you... you''ll find them coded in the Enterprise computer.
    You''ve been instructed not to reveal the true nature of our mission to anyone,
    not even Captain Picard.'
  - 'PRESSMAN: Don''t worry... it won''t be like it was twelve years ago. This time,
    no one''s going to stop us.'
