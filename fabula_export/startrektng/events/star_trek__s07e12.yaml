  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: 'Starfleet is the invisible puppeteer of this event,
      its policies and secrets driving every revelation and conflict. The organization
      is represented through Pressman’s authority, the warp core breach report’s falsehood,
      and the implied chain of command (Picard deferring to Pressman’s ‘overall command’).
      Starfleet’s institutional weight is felt in the crew’s automatic deference to
      Pressman’s narrative, even as its cover-up is exposed. The organization’s dual
      role—as both the architect of the *Pegasus*’s mission and the perpetrator of
      its cover-up—creates a crisis of trust for Picard and Riker. Starfleet’s influence
      is exerted through classified intelligence (the Romulan operative’s report)
      and operational orders (the Devolin system mission), but its true power lies
      in the unspoken: the expectation that its officers will obey, regardless of
      moral cost.'
    active_representation: Through institutional protocol (Pressman’s authority),
      classified intelligence (the Romulan operative’s report), and operational orders
      (the Devolin system mission). Starfleet’s presence is also felt in the warp
      core breach report, whose falsity is the event’s inciting incident.
    power_dynamics: Exercising authority over individuals (Picard defers to Pressman’s
      command) but being challenged by external forces (the Romulans’ salvage operation)
      and internal tensions (Riker’s conflicted loyalty). Starfleet’s power is both
      absolute and fragile—its secrets rely on the crew’s compliance, but that compliance
      is now being tested.
    organizational_goals:
    - Maintain the secrecy of the *Pegasus*’s experimental technology (particularly
      the cloaking device) to preserve Federation security and avoid diplomatic fallout
      with the Romulans.
    - Recover or destroy the *Pegasus* wreckage to prevent the Romulans from acquiring
      advanced Starfleet technology, even if it means sacrificing the truth about
      the cover-up.
    influence_mechanisms:
    - Classified intelligence (the Romulan operative’s report, which triggers the
      mission).
    - Chain of command (Pressman’s assertion of ‘overall command,’ forcing Picard
      to defer).
    - Operational orders (the Devolin system mission, framed as a direct response
      to the Romulan threat).
    - Institutional trust (the expectation that officers will obey without questioning,
      as seen in Riker’s silence).
    institutional_impact: 'The event exposes the tension between Starfleet’s stated
      principles (transparency, adherence to treaties like the Algeron Accords) and
      its covert actions (cloaking device experiments, cover-ups). The crew’s moral
      dilemma—whether to uphold the mission or challenge the lies—reflects a broader
      institutional crisis: Can an organization that values secrecy also claim to
      be ethical?'
    internal_dynamics: A fracture between the ‘old guard’ (Pressman, representing
      the *Pegasus* era and its secrets) and the ‘new generation’ (Picard, Riker,
      Geordi, who must navigate the fallout of those secrets). The event highlights
      Starfleet’s internal debate over the cost of technological superiority and the
      price of loyalty.
    global_id: ger_organization_73a4b614bde7
  - organization_uuid: ger_organization_9774506e823a
    description_of_involvement: 'The Romulan High Command is the external antagonist
