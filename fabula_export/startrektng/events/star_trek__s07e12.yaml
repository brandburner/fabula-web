    RIKER: I can't believe how stupid I was.
    BEVERLY: You both got a little carried away, that's all...
    RIKER: No. It was my fault. I lost focus... I let myself get distracted at a crucial moment.
  - |-
    RIKER: I knew what I was supposed to do... but I didn't do it. If we'd had real Bat'leths I might be dead right now.
    BEVERLY: Wil... it's all right. You made a mistake... no harm done. You'll do better next time.
    RIKER: Yeah... maybe.
