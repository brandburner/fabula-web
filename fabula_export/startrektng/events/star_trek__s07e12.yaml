    description_of_involvement: Picard’s PADD containing the *Judge Advocate General’s
      Report* is the *catalyst* and *weapon* of this confrontation. It begins as a
      silent, ominous prop—Picard studies it intently before Riker arrives, his expression
      darkening. When he reads aloud from it, the PADD becomes a *tool of interrogation*,
      its contents forcing Riker into a corner. Picard *wields* it like a prosecutor,
      slamming it down in frustration when Riker refuses to cooperate. The PADD’s
      classified nature (sealed by Starfleet Intelligence) underscores the *institutional
      weight* of the secrets it holds, while its physical presence—a small, glowing
      rectangle on the table—serves as a *tangible symbol of the rift* between Picard
      and Riker. By the end, it lies discarded, a casualty of the broken trust it
      was meant to expose.
    status_before_event: Active and in Picard’s possession; he is reading from it
      when Riker enters. The screen displays the JAG report, which Picard uses to
      ambush Riker with the truth.
    status_after_event: Discarded on the table, screen dark. Its purpose fulfilled—it
      has served as both evidence and a blunt instrument in the confrontation.
