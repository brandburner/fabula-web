- fabula_uuid: cand_evt_scene_c6ef0ce36752091c_03
  global_id: null
  title: Picard Orders Illegal Cloaking Device
  description: 'After the Enterprise is trapped inside an asteroid by Romulan Commander
    Sirol, who offers a false rescue under the guise of ''geological experiments,''
    Admiral Pressman reveals the true stakes: abandoning the ship would expose the
    *Pegasus* and its illegal cloaking device to Romulan capture. Riker, under immense
    pressure, discloses the existence of the prototype cloaking device—an act that
    immediately fractures the chain of command. Pressman, enraged, attempts to seize
    control of the *Enterprise*, but Worf’s defiance and Riker’s loyalty to Picard
    thwart him. Picard, torn between Federation law and survival, reluctantly authorizes
    Data and Geordi to adapt the device for the *Enterprise*, marking a critical breach
    of the Treaty of Algeron. The decision forces Picard to prioritize the crew’s
    safety over doctrine, setting up a moral reckoning that will haunt his command
    and test the limits of his principles. The tension escalates as the crew races
    against time to escape, with the cloaking device’s activation looming as an irreversible
    act of desperation.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e12
  scene_sequence: 18
  sequence_in_scene: 39
  key_dialogue:
  - 'SIROL: Captain... you seem to be in a very... unfortunate circumstance. How can
    we help?'
  - 'PRESSMAN: We can''t do it. If we abandon the Enterprise they''ll come back here
    and get their hands on both ships.'
  - 'RIKER: Captain... I have a suggestion. There''s a piece of equipment under guard
    in Admiral Pressman''s quarters which could get us out of here. It''s a prototype
    for a Federation cloaking device.'
  - 'PICARD: That''s what this is all about? A cloaking device? In the Treaty of Algeron
    the Federation specifically agreed not to develop cloaking technology.'
  - 'PRESSMAN: That treaty is the biggest mistake we ever made. It''s kept us from
    exploiting a vital area of defense that-'
  - 'PICARD: ((hard)) That treaty has kept the peace for sixty years. And as a Starfleet
    officer, you are sworn to uphold it.'
  - 'RIKER: Captain... we might be able to adapt the cloak for the Enterprise engines
    and use it to escape the asteroid.'
  - 'PICARD: Make it so.'
