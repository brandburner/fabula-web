  - object_uuid: ger_object_880eb8e9c9d0
    description_of_involvement: 'The Romulan salvaged debris from the *Pegasus* is
      the catalyst for the entire event, its discovery by a Romulan warbird the ‘smoking
      gun’ that shatters the warp core breach cover-up. Pressman’s description of
      the debris—‘positively identified’ as *Pegasus* material—is the linchpin of
      his revelation, forcing Picard to confront the discrepancy between Starfleet’s
      official narrative and the truth. The debris is a silent antagonist, its existence
      a ticking clock: the Romulans are already one step ahead, and the *Enterprise*
      must act swiftly to reclaim or destroy the wreck. Its role is dual: a plot device
      and a moral accelerant, exposing the lie and raising the stakes.'
    status_before_event: Recovered by the Romulan warbird *Terix* in the Devolin system,
      analyzed by Romulan scientists, and flagged as *Pegasus* material by Starfleet
      Intelligence’s operative in the Romulan High Command.
    status_after_event: Now the primary objective of the *Enterprise*’s mission. Its
      status shifts from ‘Romulan asset’ to ‘Federation priority,’ with Picard’s orders
      to ‘salvage it if possible, destroy it if necessary’ framing it as both a target
      and a time-sensitive threat.
    global_id: ger_object_880eb8e9c9d0
  - object_uuid: ger_object_9a3b93cb33f2
    description_of_involvement: 'The metallurgical and chromographic specifications
      of the *Pegasus* are requested by Geordi as the technical key to the mission’s
      success. Pressman’s promise to provide them bridges the gap between the emotional
      revelations and the practical steps needed to locate the wreck. These specs
      are the difference between a blind search and a targeted operation, their acquisition
      a testament to Starfleet’s preparedness—and Pressman’s control over the mission’s
      parameters. Their role is functional but symbolic: they represent the fusion
      of science and secrecy, the tools needed to either recover or destroy a ship
      built on lies.'
    status_before_event: Classified in Starfleet Intelligence databases, accessible
      only to authorized personnel with the proper clearance.
    status_after_event: Designated for immediate transfer to Geordi’s team, their
      release marks the official commencement of the *Enterprise*’s mission. Their
      status shifts from ‘restricted’ to ‘mission-critical,’ now tied to the Devolin
      system search parameters.
