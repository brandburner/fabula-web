  description: |2-

      The *Enterprise* bridge crew discovers a Federation warp core signature emanating from an asteroid, which Admiral Pressman identifies as the hidden *Pegasus*—a ship tied to Riker’s past and the Federation’s forbidden cloaking technology. Geordi La Forge’s sensor readings confirm the resonance pattern, while Data pinpoints the vessel’s location beneath the asteroid’s surface. As the Romulan warbird closes in, Riker proposes destroying the asteroid to prevent the Pegasus from falling into enemy hands, but Pressman rejects the idea, prioritizing salvage over destruction. The crew devises a plan to mask the signature using ionizing radiation, buying time while the *Enterprise* feigns disinterest and withdraws. The scene escalates tension between Riker and Pressman, foreshadowing Riker’s moral dilemma and the Pegasus’s role as a political and ethical time bomb. The Romulan warbird’s arrival forces immediate tactical decisions, raising the stakes for the *Enterprise*’s mission and the Federation’s secrets.
