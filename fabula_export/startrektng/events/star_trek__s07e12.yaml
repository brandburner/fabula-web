    radiation. There''s so much of it in this system already, the Romulans won''t
    know the difference.'
  - 'RIKER: ((off console)) If we''re going to do it, we have to do it fast... the
    Romulans will be in sensor range in about a minute.'
  - 'PRESSMAN: ((grim)) If it doesn''t... we''ll have handed them the Pegasus.'
