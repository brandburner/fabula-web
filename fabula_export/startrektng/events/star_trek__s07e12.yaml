- fabula_uuid: cand_evt_scene_f0e6c76363f6c36c_02
  global_id: null
  title: Riker proposes destroying the Pegasus
  description: "\n  The *Enterprise* crew detects a Federation warp core signature\
    \ emanating from an asteroid, which Admiral Pressman confirms as the hidden *Pegasus*—a\
    \ ship tied to Riker’s past and the Federation’s forbidden cloaking technology.\
    \ As Data verifies the readings, Riker reports the Romulan warbird closing in,\
    \ forcing the *Enterprise* to confront an immediate tactical crisis. Riker proposes\
    \ destroying the asteroid to prevent the *Pegasus* from falling into Romulan hands,\
    \ but Pressman rejects the idea, prioritizing salvage over destruction. Picard\
    \ then orders a high-risk deception—masking the *Pegasus*’s ion trail with radiation—to\
    \ buy time, while Riker’s suggestion of destruction reveals his moral conflict\
    \ between loyalty to his former captain and upholding Federation principles. The\
    \ scene escalates tension between Pressman’s secrecy and Picard’s adherence to\
    \ Starfleet law, setting up a confrontation over the *Pegasus*’s fate and the\
    \ ethical limits of Starfleet’s mission.\n  "
