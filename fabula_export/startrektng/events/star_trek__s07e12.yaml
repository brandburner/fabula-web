    description_of_involvement: |2-

              The Romulans' tachyon scans are the invisible but critical tool driving the tension in this event. Worf first notes their resumption after the standoff, confirming that the Romulans' true objective is to locate the *Pegasus*. These scans are not merely a search tool but a symbol of the Romulans' technological advantage and their willingness to exploit it. The scans pulse through the Devolin system, probing the asteroid fields with a precision that underscores the urgency of the *Enterprise*'s mission. Their mention by Worf serves as a stark reminder that the Romulans are already two days ahead, turning the sensor sweep into a race against time.
    status_before_event: |2-

              The tachyon scans were active prior to the standoff, but their resumption after Sirol's departure confirms their continued use as a search tool. The Romulans had already begun their hunt for the *Pegasus* before the *Enterprise* arrived, giving them a critical head start.
    status_after_event: |2-

              The tachyon scans remain active and are now a focal point of the *Enterprise*'s sensor sweep. The crew is acutely aware that the Romulans are using these scans to narrow down the *Pegasus*'s location, and Picard orders the initiation of their own search to counter this advantage. The scans are no longer a background detail but a direct threat, driving the urgency of the *Enterprise*'s mission.
