- fabula_uuid: act_f8bb56711884e509
  number: 4
  summary: 'The Enterprise navigates a treacherous, winding tunnel deep within the
    asteroid, encountering magnetic field shifts and structural instability. Picard,
    wary of the risks, discreetly warns Pressman he will abort the mission if conditions
    worsen, asserting his authority over the safety of his ship. They soon locate
    the Pegasus, eerily fused into the solid rock, appearing as if half the ship materialized
    within the asteroid. Pressman, eager to retrieve the ''sensitive equipment,''
    prevents Picard from sending a full Away Team, insisting he and Riker beam directly
    into the Pegasus''s Engineering section. Inside, they discover numerous dead crew
    members, preserved in the vacuum of space, a grim testament to the ship''s fate.
    Pressman quickly uncovers the object of their mission: a large, exotic prototype
    Federation cloaking device. The sight of this illegal technology brings Riker''s
    worst fears to fruition, and he finally confronts Pressman, refusing to help him
    reactivate the dangerous and unethical experiments that led to the deaths on the
    Pegasus. Riker expresses deep regret for his past complicity, denouncing Pressman''s
    actions as a violation of Federation treaties. Pressman attempts to intimidate
    Riker, but Riker stands firm, asserting he would now point his phaser at Pressman.
    Their confrontation is abruptly interrupted when the Romulans fire on the asteroid''s
    entrance, sealing the Enterprise inside and trapping them.'
  key_moments: []
  scene_numbers:
  - 12
  - 13
  - 14
