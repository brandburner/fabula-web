  global_id: null
  title: Riker confronts Pressman over cloaking device
  description: "\n  In the eerie, half-lit engineering section of the *Pegasus*—its\
    \ walls fused with rock and littered with the preserved bodies of its crew—Riker\
    \ and Pressman materialize to retrieve the illegal cloaking device. The sight\
    \ of the dead crewmembers, frozen in time, immediately unsettles Riker, who had\
    \ hoped the device might have been destroyed. Pressman, however, is focused solely\
    \ on recovering the technology, his excitement clashing with Riker’s growing moral\
    \ conflict. When Riker finally voices his opposition, the confrontation escalates\
    \ into a raw, ideological clash: Pressman justifies the experiments as necessary\
    \ for Federation security, while Riker, now wiser and more principled, condemns\
    \ the device as a violation of the Treaty of Algeron. Their argument reaches a\
    \ breaking point when Pressman threatens Riker’s career, but the tension is abruptly\
    \ cut short by Picard’s order to evacuate. The unresolved standoff leaves Riker’s\
    \ loyalty—and the device’s fate—hanging in the balance, directly setting up the\
    \ next crisis: the Romulans’ trap and the crew’s desperate need for the very technology\
    \ Riker now rejects.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e12
  scene_sequence: 16
  sequence_in_scene: 35
  key_dialogue:
  - 'PRESSMAN: This room was open to space for twelve years...'
  - 'RIKER: I know. I just kept hoping it wasn’t going to be here... that it would’ve
    been destroyed or buried back there in the rock...'
  - 'RIKER: It was wrong twelve years ago, and it’s still wrong today.'
  - 'PRESSMAN: You’d better reconsider that position, Commander. We have a mission
    to accomplish and you’re going to carry it out.'
  - 'RIKER: No... we killed them.'
  - 'PRESSMAN: So on reflection... you’d rather be a traitor than a hero.'
  - 'RIKER: I wasn’t a hero and neither were you. What you were doing was wrong and
    I was wrong to support you...'
  - 'PRESSMAN: I made you... and I can break you just as easily.'
