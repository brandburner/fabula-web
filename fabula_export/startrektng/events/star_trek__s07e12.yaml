      as both a legal and ethical record of the crew’s divided loyalties. The log
      functions as a moral anchor in a moment of operational chaos, ensuring that
      Picard’s dissent is preserved for future review or accountability. Its activation
      is a deliberate choice—Picard does not raise his voice or challenge Pressman
      directly, but he ensures that his opposition is documented, creating a paper
      trail that could later be used to justify his actions or critique Pressman’s.
      The log’s digital nature makes it immutable and official, reinforcing Picard’s
      role as the moral compass of the *Enterprise* even in the face of overwhelming
      authority. Its inclusion in this event highlights the tension between institutional
      protocol and individual conscience.
