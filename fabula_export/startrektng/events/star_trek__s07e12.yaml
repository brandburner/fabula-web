- fabula_uuid: act_6b2c1216098faef4
  number: 5
  summary: Trapped within the asteroid, the Enterprise receives a mocking transmission
    from Commander Sirol, who offers to 'rescue' the crew by transporting them to
    his Romulan warbird, effectively taking them captive. With no other viable escape
    options, Riker makes the difficult decision to defy Pressman's orders and reveals
    the existence of the illegal prototype cloaking device to Captain Picard. Picard
    reacts with shock and profound anger, condemning Pressman's violation of the Treaty
    of Algeron, which prohibits Federation development of cloaking technology. Pressman
    attempts to assert command, but Worf and Riker refuse to obey, clearly shifting
    their loyalty to Picard. Riker explains the device's unique phasing capabilities,
    which could allow the Enterprise to pass through solid matter. Despite his deep
    moral objections to using illegal technology, Picard, faced with no alternative,
    orders Data and La Forge to adapt the device for the Enterprise. They quickly
    deduce that the Pegasus's 'destruction' was actually a cloaking device malfunction,
    causing it to phase into the asteroid. The Enterprise successfully adapts the
    device and phases through the asteroid, emerging into normal space. Picard immediately
    orders the cloaking device disengaged, exposing the illegal technology to the
    Romulan warbird. He then arrests Pressman for violating the Treaty of Algeron.
    Riker, acknowledging his past complicity, also submits himself for arrest. In
    the brig, Picard assures Riker that his courageous decision to expose the truth,
    despite his past mistakes and loyalty to Pressman, has preserved his trust and
    his right to serve in Starfleet.
