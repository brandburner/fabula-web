  title: Pressman manipulates Riker’s loyalty
  description: In the ready room, Admiral Pressman confronts Riker with controlled
    fury over his suggestion to destroy the *Pegasus*, framing it as a betrayal of
    their shared mission. After a calculated shift from anger to paternal warmth,
    Pressman exploits their past—specifically Riker’s unwavering loyalty during the
    *Pegasus* mutiny—to reaffirm his trust in Riker’s character. The manipulation
    hinges on nostalgia and guilt, forcing Riker to confront the tension between his
    past obedience to Pressman and his present moral conflict over the cloaking device.
    The scene ends with Riker visibly troubled, his internal crisis deepened by Pressman’s
    strategic appeal to duty and loyalty. This moment serves as a turning point, where
    Riker’s past is weaponized to pressure him into complicity, setting up his eventual
    confrontation with Picard and the revelation of the *Pegasus*’s secret.
