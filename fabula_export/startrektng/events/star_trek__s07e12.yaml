    goals:
    - Atonement for his past involvement in the *Pegasus*’s cloaking experiments
    - Protecting Picard from the fallout of his decision by taking responsibility
      for his own actions
    what_happened: Riker stands at his station, his body tensing as Picard orders
      the decloak. He hesitates briefly, his conflicted expression betraying his internal
      struggle between loyalty to Pressman—his former mentor—and his duty to Picard.
      When Picard charges Pressman with violating the Treaty of Algeron, Riker’s face
      pales, and he abruptly stands, declaring he must also be arrested. His voice
      is firm, but his hands clench at his sides, revealing the depth of his turmoil.
      He allows Worf to escort him off the bridge without resistance, his posture
      slumped in resignation.
