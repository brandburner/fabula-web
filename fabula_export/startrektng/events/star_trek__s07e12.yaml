  object_involvements:
  - object_uuid: ger_object_2225766d31d6
    description_of_involvement: The Enterprise Bridge Turbolift serves as the exit
      point for Riker and Pressman as they depart for the *Pegasus*. Its activation
      and departure underscore the haste and secrecy of the salvage operation, as
      well as the immediate fracture in command loyalty. The turbolift’s departure
      leaves Picard, Data, and Worf on the bridge, reinforcing the isolation of Riker
      and Pressman’s mission and the tension between the two groups.
    status_before_event: Stationary and open on the bridge, with Picard, Data, Worf,
      and the crew present. The turbolift is a standard part of the bridge’s operations,
      ready for use.
    status_after_event: Closed and departing with Riker and Pressman inside, leaving
      the bridge crew behind. The turbolift’s departure symbolizes the physical and
      emotional separation between the command team and the away mission.
    global_id: ger_object_2225766d31d6
  - object_uuid: ger_object_c8293fd0b47b
    description_of_involvement: Data’s tricorder is used to scan the *Pegasus* and
      assess the condition of Main Engineering. The device provides critical sensor
      readings, confirming that 65% of the ship is embedded in the asteroid and that
      the compartment is intact but has a hull breach. These readings enable the crew
      to plan the power transfer and shield extension necessary to restore life support,
      making the salvage operation feasible. The tricorder’s data also underscores
      the urgency and risks of the mission, as the hull breach and failing life support
      pose immediate dangers to the away team.
    status_before_event: Activated and in use by Data, providing real-time sensor
      readings of the *Pegasus*’s condition. The tricorder is a standard diagnostic
      tool, but its readings in this context are critical to the mission’s success.
    status_after_event: The tricorder remains functional and continues to provide
      data, but its role shifts from assessment to preparation for the away mission.
      The readings it provides inform the crew’s decisions about restoring life support
      and extending the shields, ensuring the salvage operation can proceed.
    global_id: ger_object_c8293fd0b47b
  - object_uuid: ger_object_bf3363e6ac02
    description_of_involvement: The 'sensitive equipment'—later revealed to be the
      cloaking device—is the MacGuffin driving the salvage operation. Pressman’s insistence
      on retrieving it, despite the risks and ethical concerns, highlights its significance
      as a classified and potentially illegal technology. The equipment’s presence
      in Main Engineering and the secrecy surrounding it create tension between institutional
      secrecy and personal integrity, particularly for Riker, who is torn between
      his loyalty to Pressman and his duty to Starfleet.
    status_before_event: Fused into the asteroid rock within Main Engineering, inaccessible
      without the away team’s intervention. Its existence is known only to Pressman
      and Riker, who share a history tied to the *Pegasus*’s past.
    status_after_event: The equipment remains in place, but its retrieval is now the
      primary objective of the away mission. Its status shifts from a hidden secret
      to an active point of conflict, as the crew prepares to beam into Main Engineering
      to secure it.
    global_id: ger_object_bf3363e6ac02
