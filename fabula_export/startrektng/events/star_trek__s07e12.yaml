acts:
- fabula_uuid: act_1a2e6a17c245279e
  number: 1
  summary: The narrative opens with a lighthearted 'Captain Picard Day' ceremony,
    quickly interrupted by a priority transmission from Admiral Blackwell. Picard
    learns the Enterprise must abandon its scientific survey to rendezvous with Admiral
    Pressman, who will brief them on a highly classified mission. Upon Pressman's
    arrival, Riker reacts with profound shock, as Pressman is his former commanding
    officer from the USS Pegasus, a ship presumed destroyed twelve years prior. Pressman
    reveals that Romulans have located Pegasus debris, and the Enterprise's mission
    is to find and salvage or destroy the ship before the Romulans do. As the Enterprise
    enters the debris-filled Devolin system, they encounter a Romulan warbird, leading
    to a tense, polite exchange of veiled threats between Picard and Commander Sirol.
    Later, Pressman and Riker share a private conversation, where Pressman alludes
    to a secret 'experiment' from the Pegasus and his intention to resume it with
    Starfleet Security's backing. He explicitly orders Riker not to disclose the true
    nature of their mission to Captain Picard, placing Riker in a profound moral dilemma
    and revealing his deep-seated discomfort with the past events and Pressman's current
    agenda.
  key_moments: []
  scene_numbers:
  - 1
  - 2
  - 3
  - 4
- fabula_uuid: act_56a7fb61588e26c2
  number: 2
  summary: Picard and Pressman engage in a philosophical discussion about command,
    with Picard valuing an officer's willingness to challenge orders for the greater
    good, while Pressman emphasizes unquestioning loyalty and obedience in a crisis.
    Pressman's rigid stance and evasiveness about the Pegasus's loss raise Picard's
    suspicions. Riker, meanwhile, injures himself during Bat'leth practice, displaying
    an unusual level of frustration and self-reproach, hinting at his internal turmoil
    over past choices and his current complicity in Pressman's secret. The Enterprise's
    sensors eventually detect a subspace resonance signature emanating from a large
    asteroid, which Geordi identifies as consistent with a Federation warp core, strongly
    indicating the location of the Pegasus. As a Romulan warbird approaches their
    position, threatening to discover the Pegasus, Picard devises a clever strategy
    to mask the ship's signature by saturating the asteroid with ionizing radiation,
    making it appear as a natural phenomenon. This deception successfully fools the
    Romulans, who scan the asteroid without detecting anything and move off. However,
    Riker's earlier suggestion to destroy the asteroid is sharply rebuffed by Pressman,
    who insists on salvage, further highlighting his hidden agenda and Riker's growing
    unease.
  key_moments: []
  scene_numbers:
  - 5
  - 6
  - 7
- fabula_uuid: act_1267b44d50694cec
  number: 3
  summary: After the Romulans depart, having been successfully deceived, Picard plans
    to return to the asteroid later. However, Pressman immediately confronts Riker
    in the Ready Room, expressing anger over Riker's suggestion to destroy the Pegasus.
    Pressman manipulates Riker, appealing to his loyalty and past actions, reminding
    him of their shared secret and the 'duty' to the Federation, further entrenching
    Riker's internal conflict. Simultaneously, Picard, growing increasingly suspicious,
    researches the Pegasus incident and uncovers a sealed Starfleet Intelligence report
    detailing a mutiny aboard the ship. He confronts Riker with this information,
    demanding the truth about the mutiny and the subsequent cover-up. Riker, bound
    by Pressman's explicit orders, refuses to divulge the classified information,
    leading to a tense standoff where Picard expresses profound disappointment, questions
    Riker's trustworthiness, and threatens to re-evaluate his command structure. Picard's
    attempt to gain clarity from Admiral Blackwell is rebuffed, reinforcing the high-level
    secrecy surrounding the mission. Despite Picard's strong objections and concerns
    about safety, Pressman then asserts his authority and orders the Enterprise to
    enter the asteroid through a deep fissure to retrieve the Pegasus, forcing Picard
    to comply under protest.
  key_moments: []
  scene_numbers:
