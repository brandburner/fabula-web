    know that we have -'
  - 'PICARD: They''ll know the truth, Admiral. Which is what everyone is going to
    know very shortly.'
  - 'RIKER: Lieutenant. I''ll have to be placed under arrest as well.'
  - 'PICARD: Admiral, I hereby charge you with violation of the Treaty of Algeron.
    As Captain of the *Enterprise*, I''m placing you under arrest.'
