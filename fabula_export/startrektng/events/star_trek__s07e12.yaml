  title: Pressman forces Enterprise into asteroid chasm
  description: 'Admiral Pressman overrides Captain Picard’s objections and orders
    the *Enterprise* into a perilous asteroid chasm to retrieve the *Pegasus*. After
    Data warns of the maneuver’s untested risks—including potential gravimetric fluctuations
    and structural instability—Picard attempts to propose alternatives, including
    a shuttle mission. Pressman dismisses these options, asserting his authority with
    a calm but firm directive: ''Prepare to take the *Enterprise* in, Captain. That’s
    an order.'' Picard logs his dissent in the ship’s log, then reluctantly executes
    the maneuver under Yellow Alert, with Riker and Data complying despite their reservations.
    The scene escalates tension between Pressman’s unyielding command and the crew’s
    growing unease, foreshadowing the moral and operational stakes of the *Pegasus*
    mission. Riker’s silence during the exchange underscores his internal conflict,
    as he grapples with loyalty to Pressman and the Federation’s ethical boundaries.
    The *Enterprise*’s descent into the chasm marks a turning point, where institutional
    authority clashes with personal judgment, setting the stage for the revelation
    of the *Pegasus*’s illegal cloaking device.'
