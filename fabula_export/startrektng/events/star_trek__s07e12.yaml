  title: Picard’s Authority Overruled by Blackwell
  description: 'In the ready room, Picard attempts to delay the mission by appealing
    to Admiral Blackwell, his former colleague, on a personal level. His request is
    met with bureaucratic resistance—Blackwell invokes Starfleet Intelligence’s authority,
    explicitly warning Picard that the Chief of Starfleet Intelligence is monitoring
    the operation. The exchange underscores the institutional power dynamics at play:
    Picard’s moral unease is dismissed as irrelevant, and his authority as captain
    is subordinated to Pressman’s classified mission. The tension escalates when Worf’s
    tactical update confirms their approach to the asteroid, leaving Picard with no
    choice but to comply. This moment crystallizes the conflict between individual
    judgment and institutional loyalty, foreshadowing the moral crisis Riker will
    soon face. The scene also highlights Picard’s isolation—his attempt to leverage
    a personal connection fails, reinforcing the mission’s secrecy and the high stakes
    of defiance.'
