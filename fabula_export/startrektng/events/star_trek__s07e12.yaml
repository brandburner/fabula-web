- fabula_uuid: cand_evt_scene_1fdb07613446f517_01
  global_id: null
  title: Picard exposes cloaking device to Romulans
  description: "\n  Picard orders the *Enterprise* to decloak in full view of the\
    \ Romulan Warbird, directly violating Starfleet’s Treaty of Algeron and exposing\
    \ the Federation’s hypocrisy regarding the *Pegasus*’s illegal cloaking device.\
    \ The act is a calculated defiance of Admiral Pressman’s authority, forcing Riker\
    \ to confront his divided loyalties—between his past with Pressman and his duty\
    \ to Picard. Worf, ever loyal to Picard, arrests Pressman without hesitation,\
    \ while Riker, torn by guilt, voluntarily submits to arrest alongside him. The\
    \ scene escalates tensions, crystallizes Picard’s moral stance, and sets the stage\
    \ for his eventual confrontation with Starfleet Command. The Romulans, now aware\
    \ of the Federation’s breach, become a looming external threat, while the *Enterprise*\
    \ crew’s internal fractures deepen. Picard’s decision is not just a tactical move\
    \ but a moral declaration: the Federation’s principles must be upheld, even at\
    \ personal cost.\n  "
