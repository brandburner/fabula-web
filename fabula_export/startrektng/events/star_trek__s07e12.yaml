  title: Riker’s Self-Punishment in Sickbay
  description: 'Riker arrives in Sickbay with a broken rib from Bat’leth practice,
    his physical injury serving as a metaphor for his unresolved guilt over the *Pegasus*
    incident. Beverly Crusher treats him, but his disproportionate self-reproach—‘I
    knew what I was supposed to do... but I didn’t do it’—reveals his deeper conflict:
    the moral weight of his past loyalty to Pressman and the Federation’s betrayal.
    His evasive demeanor and refusal to accept Beverly’s reassurance (‘Yeah... maybe’)
    signal his emotional withdrawal, foreshadowing his impending crisis of conscience
    when forced to choose between Pressman’s secrets and Starfleet’s principles. The
    scene underscores Riker’s internalized shame, framing his injury as both a literal
    and symbolic wound that will demand resolution when the *Pegasus*’s cloaking device
    resurfaces. The subtext of his dialogue—‘If we’d had real Bat’leths I might be
    dead right now’—hints at his subconscious desire for punishment, reinforcing the
    moral stakes of his past actions.'
