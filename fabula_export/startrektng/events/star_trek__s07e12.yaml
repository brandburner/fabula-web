- fabula_uuid: cand_evt_scene_83f7a784658be8e1_01
  global_id: null
  title: Pressman reveals Pegasus' true fate
  description: 'In the observation lounge, Admiral Pressman dismantles the official
    narrative of the *USS Pegasus*'' destruction by admitting the ship was lost twelve
    years prior under his command—with Riker as helmsman. He reveals Starfleet Intelligence''s
    discovery of Romulan salvaged debris in the Devolin system, contradicting the
    long-standing warp core breach story. Riker''s discomfort and Pressman''s calculated
    omission of key details (like the cloaking device) create tension, while Picard
    accepts the mission parameters without yet questioning the deeper implications.
    Geordi''s technical inquiry about the Pegasus'' experimental systems hints at
    the ship''s classified nature, setting up the episode''s central conflict: the
    Federation''s treaty violation and the moral dilemma of protecting a rogue captain''s
    secrets. The scene establishes Pressman''s manipulative authority, Riker''s buried
    guilt, and the crew''s unwitting role in a high-stakes cover-up.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e12
  scene_sequence: 4
  sequence_in_scene: 6
  key_dialogue:
  - 'PRESSMAN: As some of you may know, the starship Pegasus was lost in this sector
    twelve years ago along with most of its crew. I was the captain and Commander
    Riker here was my helmsman.'
  - 'PICARD: I remember reading about it. The ship was destroyed by a... warp core
    breach as I recall.'
  - 'RIKER: That''s right. The Captain and I, along with seven others managed to get
    to an escape pod before the breach became critical.'
  - 'PRESSMAN: However, all that changed three days ago. Starfleet Intelligence has
    an operative in the Romulan High Command. He sent us a message that a Romulan
    warbird had located a piece of debris in the Devolin system which was positively
    identified as being from the Pegasus.'
  - 'GEORDI: Why would the Romulans try to salvage pieces of a twelve year-old starship?'
  - 'PRESSMAN: The Pegasus was a prototype... experimental engine... new weapon systems...
    some of our designs were even used in constructing the Enterprise. There''re a
    lot of things on board the Romulans would love to get their hands on.'
