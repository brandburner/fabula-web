  - object_uuid: ger_object_338cc463a7d8
    description_of_involvement: The illegal cloaking device is the symbolic heart
      of the conflict, the technology whose existence forces Picard into an impossible
      choice. Its deactivation is not just an order—it is a moral statement, a rejection
      of the Federation’s hypocrisy, and a gamble with interstellar peace. The device’s
      presence on the *Enterprise* is a ticking time bomb, and Picard’s decision to
      expose it is the moment of detonation. Its deactivation in full view of the
      Romulans is an act of defiance, but also a desperate attempt to restore the
      Federation’s moral authority. The cloaking device is more than machinery; it
      is the embodiment of the Federation’s secret shame.
    status_before_event: Active and hidden, its existence a closely guarded secret
