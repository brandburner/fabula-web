  key_dialogue:
  - |-
    PICARD: ... as a matter of fact, I never met Wil before he reported aboard at Farpoint Station.
    PRESSMAN: You chose your first officer without ever meeting him?
    PICARD: I was looking through the records of about fifty candidates... Wil's was much like all the others... filled with the usual dry statistics and glowing letters of recommendation that tell you nothing. I was about to put it aside and go on to the next file, when something caught my eye. There had been an incident on Altair Three when Wil was First Officer of the *Hood*. He refused to let Captain DeSoto beam down during a crisis. He disobeyed a direct order and risked a general court martial because he thought he was right. When I read that... I knew I'd found my Number One.
    PRESSMAN: You wanted someone with a history of disobedience?
    PICARD: I wanted someone who would stand up to me... someone who was more concerned with the safety of the ship and accomplishing the mission than with how something looked on his record.
  - |-
    PRESSMAN: Frankly, I've always felt it was more important for an officer to trust his captain's judgment. In a crisis, there's no time for explanations... orders have to be obeyed without question or lives may be lost.
    PICARD: ((gently)) I am aware of that, Admiral.
  - |-
    PICARD: Admiral... the records regarding the loss of the *Pegasus* are a bit... vague about what happened just before you abandoned ship. Can you add anything to the... official account?
    PRESSMAN: I'm afraid not. But I can tell you this: Twelve years ago, I needed an officer I could count on in a crisis... someone who would support and obey my decisions without question... someone willing to trust my judgment... that someone was Wil Riker... and without his loyalty, none of us would have survived.
