  title: Picard forces Riker to confront Pegasus mutiny
  description: "\n  In Picard’s quarters, Riker arrives with scan data only for Picard\
    \ to abruptly pivot to a classified JAG report detailing the *Pegasus* mutiny—an\
    \ event Riker has never disclosed. Picard’s cold interrogation exposes Riker’s\
    \ evasive loyalty to Pressman, forcing him to recount his role in the mutiny:\
    \ as a junior officer, he sided with Pressman against the crew, who mutinied over\
    \ the captain’s reckless experiments. When Picard presses for the truth behind\
    \ the cover-up, Riker clings to Pressman’s orders, refusing to betray his former\
    \ captain. Picard’s frustration boils over as he questions Riker’s integrity,\
    \ threatening to re-evaluate the command structure—a direct challenge to their\
    \ professional bond. The scene culminates in Riker’s dismissal, leaving Picard’s\
    \ trust in him fractured and the *Pegasus*’s secrets still buried.\n  "
