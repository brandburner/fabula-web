  title: Picard demands Riker reveal Pegasus truth
  description: In Picard’s quarters, Picard confronts Riker with a sealed Judge Advocate
    General’s report detailing the *Pegasus* mutiny, forcing Riker to recount his
    role in the violent suppression of the rebellion. Picard’s frustration escalates
    as Riker, bound by Pressman’s orders, refuses to disclose the full truth, leaving
    Picard to question Riker’s loyalty and the integrity of the Enterprise’s command
    structure. The tension peaks when Picard explicitly threatens to re-evaluate Riker’s
    position as first officer, marking a fracture in their professional bond and exposing
    the moral conflict at the heart of the mission. The scene underscores Picard’s
    growing distrust of Starfleet’s secrecy and Riker’s internal struggle between
    duty and complicity, setting up the eventual confrontation with Pressman’s hidden
    agenda.
