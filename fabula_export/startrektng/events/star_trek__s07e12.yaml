  title: Pressman reveals Pegasus' true fate
  description: "\n  In the Observation Lounge, Admiral Pressman delivers a bombshell\
    \ to the *Enterprise* crew: the *Pegasus*—officially destroyed in a warp core\
    \ breach twelve years prior—was actually lost under his command, with Riker as\
    \ helmsman. Pressman reveals Starfleet Intelligence’s discovery of Romulan salvaged\
    \ debris in the Devolin system, contradicting the official narrative. The Admiral’s\
    \ admission forces Riker into a silent moral crisis, as his former captain’s version\
    \ of events clashes with the Federation’s secrecy. Picard, unaware of the deeper\
    \ implications, accepts the mission to locate or destroy the *Pegasus* before\
    \ the Romulans exploit its advanced technology. The scene establishes the central\
    \ conflict: Riker’s loyalty to Pressman versus his duty to uphold Federation law,\
    \ while also setting the stage for the *Enterprise*’s high-stakes search in the\
    \ Devolin system.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e12
  scene_sequence: 4
  sequence_in_scene: 7
  key_dialogue:
  - 'PRESSMAN: As some of you may know, the starship Pegasus was lost in this sector
    twelve years ago along with most of its crew. I was the captain and Commander
    Riker here was my helmsman.'
  - 'PICARD: I remember reading about it. The ship was destroyed by a... warp core
    breach as I recall.'
  - 'RIKER: That''s right. The Captain and I, along with seven others managed to get
    to an escape pod before the breach became critical.'
  - 'PRESSMAN: However, all that changed three days ago. Starfleet Intelligence has
    an operative in the Romulan High Command. He sent us a message that a Romulan
    warbird had located a piece of debris in the Devolin system which was positively
    identified as being from the Pegasus.'
  - 'PRESSMAN: We have to find the ship before the Romulans do... salvage it if possible...
    destroy it if necessary. You''ll command the Enterprise while I remain in overall
    command of the mission.'
