  title: Pressman manipulates Riker’s loyalty
  description: In the Ready Room, Admiral Pressman confronts Riker with controlled
    fury over his suggestion to destroy the *Pegasus*, framing it as a betrayal of
    their shared mission to reclaim the cloaking device. After a calculated shift
    from anger to paternal concern, Pressman exploits their past—invoking Riker’s
    youthful idealism and his loyalty during the Pegasus’s illegal experiments—to
    reassert dominance. The manipulation hinges on nostalgia and duty, forcing Riker
    to confront the tension between his past allegiance to Pressman and his present
    obligations to Starfleet’s ethics. Riker’s visible discomfort signals his internal
    conflict, setting up his eventual moral reckoning. The scene underscores Pressman’s
    psychological mastery and Riker’s vulnerability to guilt-driven loyalty.
