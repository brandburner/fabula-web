  title: Picard exposes Pegasus and arrests Pressman
  description: "\n  In a deliberate act of moral defiance, Captain Picard orders the\
    \ *Enterprise* to deactivate its illegal cloaking device in full view of the Romulan\
    \ warbird, directly violating Admiral Pressman’s authority and exposing the Federation’s\
    \ hypocrisy regarding the *Pegasus* incident. The moment forces Pressman to confront\
    \ the consequences of his actions, as Picard charges him with violating the Treaty\
    \ of Algeron and places him under arrest. Riker, torn between loyalty to his former\
    \ commanding officer and his duty to the *Enterprise*, abruptly demands to be\
    \ arrested alongside Pressman, framing his act as both personal atonement and\
    \ a defiant stand against institutional hypocrisy. Worf’s silent compliance underscores\
    \ the gravity of the situation, while Picard’s unyielding stance reaffirms his\
    \ commitment to Federation principles. The scene crystallizes the conflict between\
    \ institutional duty and personal allegiance, setting the stage for Riker’s moral\
    \ reckoning and Picard’s confrontation with Starfleet Command.\n  "
