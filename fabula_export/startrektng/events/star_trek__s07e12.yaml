- fabula_uuid: cand_evt_scene_c6ef0ce36752091c_02
  global_id: null
  title: Riker Reveals the Cloaking Device
  description: |2

    This event marks a critical turning point in the *Pegasus* arc, where Riker’s moral dilemma reaches its breaking point. Trapped inside an asteroid by Romulan Commander Sirol—who taunts them with a false offer of 'transportation to Romulus'—the *Enterprise* crew faces an existential threat. Admiral Pressman, desperate to recover the illegal cloaking device, insists on abandoning the *Enterprise* to prevent the Romulans from seizing both ships. Picard rejects this, and the crew debates their dwindling options: Worf suggests phasers, but Data warns of catastrophic collapse. Riker, torn between loyalty to Pressman and his duty to Picard, finally reveals the existence of the cloaking device—a direct violation of the Treaty of Algeron. Pressman’s fury at the breach is immediate, but Picard’s shock is deeper, forcing him to confront the moral rot at the heart of Starfleet’s secrecy. The revelation fractures the chain of command: Pressman attempts to seize control, but Worf’s defiance (and Riker’s support) leaves him isolated. Picard, reluctantly, authorizes Data and Geordi to adapt the device for the *Enterprise*, setting in motion a chain of events that will test the crew’s principles and the Federation’s integrity. The moment is a masterclass in escalating tension, where Riker’s choice—driven by survival but rooted in his past with Pressman—exposes the cost of unchecked loyalty and the fragility of Starfleet’s ideals.
