  global_id: null
  title: Romulan bluff and tactical retreat
  description: "\n  The *Enterprise* crew braces for combat as a Romulan warbird powers\
    \ weapons, but the threat dissipates when Commander Sirol hails Picard. Their\
    \ exchange is a masterclass in diplomatic subterfuge: Sirol feigns innocence about\
    \ the warbird’s sudden appearance, while Picard counters with veiled threats about\
    \ 'unfortunate consequences.' The tension escalates when Sirol probes the *Enterprise*’s\
    \ presence in the Devolin system, revealing both sides are concealing their true\
    \ motives. The Romulans’ abrupt departure leaves the crew on edge, with Worf confirming\
    \ they’re continuing their tachyon scans—a clear indication they’re searching\
    \ for the *Pegasus*. Picard’s order to initiate the sensor sweep marks the start\
    \ of a high-stakes race against time, where the Romulans’ head start and the *Enterprise*’s\
    \ seven-day timeline create a pressure-cooker scenario. The scene pivots from\
    \ military confrontation to psychological maneuvering, exposing the fragility\
    \ of Federation-Romulan détente and the personal stakes for Riker, whose past\
    \ with the *Pegasus* now looms over the mission.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e12
  scene_sequence: 6
  sequence_in_scene: 11
  key_dialogue:
  - 'SIROL: I am Commander Sirol of the Romulan vessel Terix. To whom do I have the
    honor of speaking?'
  - 'PICARD: Not at all. But an... unannounced appearance like this could have unfortunate
    consequences. It would be a shame if your ship were damaged during such a... misunderstanding.'
  - 'SIROL: I doubt our objectives are... compatible.'
  - 'PICARD: Then I won''t keep you.'
