  title: Picard confronts Riker over Pegasus mutiny
  description: "\n  Picard deliberately ignores Riker's scan data submission, creating\
    \ immediate tension before abruptly revealing a classified JAG report detailing\
    \ the Pegasus mutiny. The revelation forces Riker to confront his buried past,\
    \ as Picard methodically dismantles his evasive responses. Riker's reluctant account\
    \ of the mutiny—where he defended Pressman against mutineers—exposes his moral\
    \ conflict between blind loyalty and Federation ethics. Picard's escalating frustration\
    \ culminates in a direct challenge: 'What the hell's going on here?' When Riker\
    \ invokes Pressman's orders to silence him, Picard responds with a chilling threat\
    \ to re-evaluate the command structure, leaving their professional relationship\
    \ fractured. The scene crystallizes the central conflict: Riker's divided loyalties\
    \ between his former captain and Picard's demand for transparency, while revealing\
    \ the mutiny as a deliberate cover-up with broader implications for Starfleet's\
    \ integrity.\n  "
