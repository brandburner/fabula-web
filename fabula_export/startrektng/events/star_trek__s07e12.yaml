    description_of_involvement: Starfleet is represented through the authority of
      Admiral Pressman, who overrules Picard’s protests and insists on a limited away
      team to retrieve the 'sensitive equipment' from the *Pegasus*. Pressman’s actions
      reflect Starfleet’s institutional priorities—technological superiority and secrecy—even
      at the cost of ethical concerns and crew safety. The organization’s influence
      is exerted through its chain of command, as Pressman leverages his rank to advance
      the mission despite Picard’s objections. The tension between Pressman’s authority
      and Picard’s ethical concerns highlights the broader institutional dynamics
      at play, particularly the conflict between secrecy and transparency in Starfleet.
    active_representation: Through Admiral Pressman’s unilateral authority and the
      institutional protocols he invokes to justify the salvage operation. Pressman’s
      rank and past with Riker enable him to override Picard’s objections, reinforcing
      Starfleet’s hierarchical structure and the weight of classified missions.
    power_dynamics: Exercising authority over individuals (Picard, Riker) and the
      mission’s direction. Pressman’s power is derived from his rank, his past with
      Riker, and the classified nature of the 'sensitive equipment.' However, his
      authority is challenged by Picard’s ethical concerns and the risks posed to
      the *Enterprise* and its crew.
    organizational_goals:
    - Retrieve the 'sensitive equipment' (cloaking device) from the *Pegasus* despite
      the risks and ethical concerns
    - Maintain secrecy about the *Pegasus*’s past and the nature of the equipment,
      even if it means overruling subordinate officers
    influence_mechanisms:
    - Hierarchical authority (Pressman’s rank over Picard)
    - Leveraging past relationships (Pressman’s bond with Riker)
    - Classified mission protocols (justifying secrecy and limited team)
    institutional_impact: The event underscores the tension between Starfleet’s institutional
      priorities—technological superiority and secrecy—and the ethical concerns of
      its officers. Pressman’s actions reflect a broader institutional dynamic where
      classified missions and covert operations take precedence over transparency
      and crew safety, setting the stage for the moral dilemmas that will unfold in
      the salvage operation.
    internal_dynamics: The conflict between Picard’s ethical concerns and Pressman’s
      authority highlights the internal tensions within Starfleet, particularly the
      balance between institutional secrecy and personal integrity. The event also
      reveals the factional dynamics at play, as Pressman’s past with Riker and the
