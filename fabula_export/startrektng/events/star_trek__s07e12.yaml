    description_of_involvement: Starfleet’s institutional presence looms over the
      confrontation between Riker and Pressman, embodied in the Federation’s treaties,
      chain of command, and ethical guidelines. The Treaty of Algeron—banning cloaking
      technology—is the central point of contention, with Pressman arguing for its
      violation in the name of tactical advantage and Riker insisting on its upholding.
      Starfleet’s hierarchy is tested as Riker defies Pressman’s orders, while Picard’s
      recall order reinforces the organization’s authority. The organization’s internal
      tensions—between secrecy, ambition, and moral integrity—are laid bare in this
      moment, with the cloaking device serving as a physical manifestation of Starfleet’s
      broken principles.
    active_representation: Through institutional protocol (Picard’s recall order),
      moral conflict (Riker’s defiance of Pressman), and the physical artifact of
      the cloaking device (a violation of Starfleet’s treaties).
    power_dynamics: Starfleet’s authority is both asserted (via Picard’s command)
      and challenged (via Pressman’s defiance of treaties and Riker’s moral stance).
      The organization’s power is fragmented—Pressman wields operational control,
      Riker represents ethical resistance, and Picard enforces institutional boundaries.
      The Romulans’ external threat further complicates Starfleet’s internal power
      struggles, as the cloaking device becomes a symbol of both security and moral
      failure.
    organizational_goals:
    - Uphold the Treaty of Algeron and Starfleet’s ethical guidelines, as represented
      by Riker’s defiance and Picard’s recall order.
    - Retrieve the cloaking device for tactical advantage, as pursued by Pressman,
      despite the moral and legal risks.
    influence_mechanisms:
