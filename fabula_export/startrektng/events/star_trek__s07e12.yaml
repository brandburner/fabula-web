  title: Riker demands shared accountability for Pegasus
  description: "\n  After the Enterprise successfully escapes the asteroid using the\
    \ illegal cloaking device, Picard immediately orders its deactivation, exposing\
    \ the ship to the Romulans. This forces Admiral Pressman to confront the consequences\
    \ of his actions, as Picard publicly arrests him for violating the Treaty of Algeron.\
    \ The moment becomes a moral reckoning when Riker—haunted by his past complicity\
    \ in the *Pegasus* incident—suddenly stands and demands to be arrested alongside\
    \ Pressman. His act is both a personal atonement and a defiant stand against Federation\
    \ hypocrisy, framing his demand as a refusal to let Pressman bear the full weight\
    \ of the scandal alone. The scene tests Riker’s loyalty to the *Enterprise*’s\
    \ crew and the principles they uphold, while forcing Pressman to face the cost\
    \ of his own choices. Picard’s unyielding commitment to Federation law contrasts\
    \ sharply with Riker’s internal conflict, underscoring the tension between institutional\
    \ duty and personal allegiance. The arrest of both men signals a turning point\
    \ in the story, where the truth of the *Pegasus* incident can no longer be hidden,\
    \ and the consequences of past actions must be confronted.\n  "
