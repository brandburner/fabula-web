  key_dialogue:
  - 'SIROL: Captain... you seem to be in a very... unfortunate circumstance. How can
    we help?'
  - 'PICARD: What is it you want, Sirol?'
  - 'SIROL: I don''t want anything, Captain. But I will offer to help. By transporting
    your crew aboard my ship. We''ll take you back to Romulus... where after a short
    stay as our guests, you will be returned to the Federation.'
  - 'PRESSMAN: We can''t do it. If we abandon the Enterprise they''ll come back here
    and get their hands on both ships.'
  - 'RIKER: Captain... I have a suggestion. There''s a piece of equipment under guard
    in Admiral Pressman''s quarters which could get us out of here. It''s a prototype
    for a Federation cloaking device.'
  - 'PRESSMAN: ((quiet, hard)) You just ended your career, Wil.'
  - 'PICARD: That''s what this is all about? A cloaking device? In the Treaty of Algeron
    the Federation specifically agreed not to develop cloaking technology.'
