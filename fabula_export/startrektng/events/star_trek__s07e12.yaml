  scene_sequence: 6
  sequence_in_scene: 12
  key_dialogue:
  - 'SIROL: I am Commander Sirol of the Romulan vessel *Terix*. To whom do I have
    the honor of speaking?'
  - 'PICARD: Not at all. But an... unannounced appearance like this could have unfortunate
    consequences. It would be a shame if your ship were damaged during such a... misunderstanding.'
  - 'SIROL: We are conducting a survey of gaseous anomalies.'
  - 'PICARD: How long will it take to search the system?'
  - 'GEORDI: At least seven days, sir.'
  - 'WORF: And the Romulans have a two-day head start.'
