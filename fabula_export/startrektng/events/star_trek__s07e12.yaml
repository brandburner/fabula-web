  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: Starfleet is the overarching institutional force that
      shapes the conflict between Riker and Pressman. The organization’s principles—particularly
      the Treaty of Algeron, which bans cloaking technology—are the moral and legal
      framework against which Pressman’s actions are judged. Starfleet’s presence
      is felt through the preserved corpses of the *Pegasus* crew, the cloaking device
      itself, and the broader stakes of the Romulan threat. The organization’s internal
      tensions are laid bare in this scene, as Pressman represents a rogue element
      willing to violate Starfleet’s treaties for strategic gain, while Riker embodies
      the moral and ethical obligations that Starfleet is meant to uphold. Picard’s
      com signal, ordering the away team to return to the *Enterprise*, further underscores
      Starfleet’s authority and the need to contain Pressman’s actions.
    active_representation: Through the moral and ethical dilemmas faced by Riker and
      Pressman, as well as Picard’s authoritative intervention via the com system.
      Starfleet’s principles are invoked in the dialogue, particularly in Riker’s
      rejection of Pressman’s justification for the experiments.
    power_dynamics: Starfleet’s authority is both challenged and upheld in this scene.
      Pressman operates as a rogue element, exploiting his rank to enforce compliance
      with his mission, while Riker represents the organization’s ethical ideals.
      Picard’s intervention reasserts Starfleet’s chain of command, but the conflict
      between Riker and Pressman reveals deeper institutional tensions—between ambition
      and morality, secrecy and transparency.
    organizational_goals:
