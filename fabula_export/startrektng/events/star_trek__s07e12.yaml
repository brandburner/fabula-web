- fabula_uuid: cand_evt_scene_f0e6c76363f6c36c_03
  global_id: null
  title: Picard orders high-risk deception to hide Pegasus
  description: "\n  After Geordi La Forge detects a subspace resonance signature from\
    \ an asteroid—likely the Pegasus—Picard and Admiral Pressman debate their next\
    \ move. With the Romulan warbird closing in, Riker suggests destroying the asteroid\
    \ to prevent the Pegasus from falling into enemy hands, but Pressman rejects the\
    \ idea, prioritizing salvage over destruction. Picard then proposes a risky deception:\
    \ masking the Pegasus’s ion trail with ionizing radiation to make it appear as\
    \ a natural phenomenon. Data confirms the plan is theoretically viable, and Picard\
    \ orders its execution. The Enterprise initiates the ionization pulse, then alters\
    \ course to feign disinterest, hoping the Romulans will overlook the asteroid.\
    \ This moment crystallizes Picard’s moral calculus—balancing Federation principles\
    \ with the need to protect a rogue starship—while escalating the tension between\
    \ loyalty to Pressman and adherence to the Prime Directive. The deception, if\
    \ successful, buys time but exposes the crew to Romulan detection if the ruse\
    \ fails.\n  "
