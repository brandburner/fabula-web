  object_involvements:
  - object_uuid: ger_object_27f033c3f46c
    description_of_involvement: "\n      Asteroid Gamma 601 serves as the hiding place\
      \ for the *Pegasus*, and its surface is scanned by Geordi and Data to confirm\
      \ the ship’s location. The asteroid’s deep chasms are large enough to conceal\
      \ the *Pegasus*, and the crew’s plan to mask the warp core signature using ionizing\
      \ radiation is executed to prevent the Romulans from detecting the ship. The\
      \ asteroid’s rugged terrain and natural ionizing radiation provide the perfect\
      \ cover for the deception, allowing the *Enterprise* to feign disinterest and\
      \ withdraw without raising suspicion.\n      "
    status_before_event: "\n      A barren, cratered asteroid with deep chasms, hiding\
      \ the *Pegasus* beneath its surface. The asteroid’s subspace resonance signature\
      \ is detectable by advanced sensors, but its natural ionizing radiation provides\
      \ a potential means of masking the *Pegasus*’s warp core.\n      "
    status_after_event: "\n      The asteroid’s subspace resonance signature is masked\
      \ by an ionization field pulse, rendering the *Pegasus*’s warp core undetectable\
      \ by the Romulans. The *Enterprise* withdraws, leaving the asteroid and the\
      \ hidden ship behind, but the crew’s deception buys them time to return later.\n\
      \      "
    global_id: ger_object_27f033c3f46c
  - object_uuid: ger_object_8bffb52b02df
    description_of_involvement: "\n      Geordi’s bridge console displays the subspace\
      \ resonance signature emanating from Asteroid Gamma 601, confirming the presence\
      \ of the *Pegasus*’s warp core. The graphic display is critical to the crew’s\
      \ understanding of the situation, as it provides visual confirmation of the\
      \ resonance pattern and allows Data to analyze the asteroid’s structure. The\
      \ console’s readings are used to devise the plan to mask the warp core signature\
      \ using ionizing radiation, and its data is instrumental in executing the deception.\n\
      \      "
    status_before_event: "\n      Displaying sensor readings of the asteroid’s subspace\
      \ resonance signature, which Geordi identifies as a Federation warp core. The\
      \ console is fully operational and provides the crew with the data they need\
      \ to confirm the *Pegasus*’s location.\n      "
    status_after_event: "\n      Continues to display sensor readings, but now the\
      \ subspace resonance signature is masked by the ionization field pulse. The\
      \ console’s data confirms the success of the deception, allowing the *Enterprise*\
      \ to withdraw without raising Romulan suspicion.\n      "
    global_id: ger_object_8bffb52b02df
  - object_uuid: ger_object_43cda215e335
    description_of_involvement: "\n      Riker’s proposed photon torpedoes are initially\
      \ considered as a means of destroying the asteroid and preventing the *Pegasus*\
      \ from falling into Romulan hands. However, Pressman rejects the idea, prioritizing\
      \ salvage over destruction. The photon torpedoes are ultimately discarded in\
      \ favor of Geordi’s plan to use ionizing radiation to mask the warp core signature.\
      \ While the torpedoes are not used in this event, their consideration highlights\
      \ the high stakes of the situation and the crew’s willingness to take drastic\
      \ measures to protect the Federation’s secrets.\n      "
    status_before_event: "\n      Loaded and ready for use aboard the *Enterprise*,\
      \ but not yet deployed. Riker proposes using them to destroy the asteroid, but\
      \ the plan is rejected by Pressman.\n      "
    status_after_event: "\n      Remain unused, as the crew opts for Geordi’s plan\
      \ to mask the warp core signature using ionizing radiation. The photon torpedoes\
      \ are not deployed, but their consideration underscores the urgency and desperation\
      \ of the situation.\n      "
    global_id: ger_object_43cda215e335
  - object_uuid: ger_object_9a3b93cb33f2
    description_of_involvement: "\n      The *Pegasus*’s warp core is the focal point\
      \ of the event, as its subspace resonance signature is detected by Geordi and\
      \ confirmed by Data. The signature reveals the ship’s hidden location beneath\
      \ Asteroid Gamma 601, sparking a tense debate between Riker and Pressman over\
      \ whether to destroy the asteroid or salvage the *Pegasus*. The warp core’s\
      \ presence is a ticking time bomb, as the Romulans are closing in and could\
