  object_involvements:
  - object_uuid: ger_object_27f033c3f46c
    description_of_involvement: Asteroid Gamma 601 serves as the physical hiding place
      for the USS Pegasus and the central location of the deception. Its rugged, cratered
      surface and deep chasms provide the perfect concealment for the starship, while
      its natural subspace resonance patterns allow the crew to mask the Pegasus’s
      signature with ionizing radiation. The asteroid’s role is both a narrative device
      (hiding the Pegasus) and a symbolic representation of the moral and ethical
      dilemmas the crew faces—whether to destroy it (and the Pegasus) or deceive the
      Romulans to protect Federation secrets.
    status_before_event: A barren, cratered asteroid with deep chasms, emitting natural
      subspace resonance patterns. The Pegasus is hidden within its fissures, and
      its warp core signature is detectable by advanced sensors.
    status_after_event: The asteroid’s surface remains unchanged, but its subspace
      resonance patterns are now saturated with ionizing radiation, masking the Pegasus’s
      signature. The Romulans, if deceived, will perceive it as a natural phenomenon
      and overlook it.
    global_id: ger_object_27f033c3f46c
  - object_uuid: ger_object_8bffb52b02df
    description_of_involvement: Geordi’s bridge console and its subspace resonance
      display are critical tools in detecting the Pegasus’s hidden warp core. The
      graphic display renders the asteroid’s subsurface structure, confirming the
      Pegasus’s location and enabling the crew to devise their deception plan. Data
      leans in to confirm the warp core readings, and Geordi works the console to
      display the asteroid on the main viewer. This object is the technical backbone
      of the event, providing the data needed to make informed decisions under pressure.
    status_before_event: Active and functional, displaying sensor data from the asteroid.
      Geordi is working the console to analyze the subspace resonance signature.
    status_after_event: Still active, now displaying confirmation of the ionization
      pulse’s success. The console’s data supports the deception plan’s execution.
    global_id: ger_object_8bffb52b02df
  - object_uuid: ger_object_43cda215e335
    description_of_involvement: Ionizing radiation is the key to the deception plan,
      proposed by Geordi and executed by Data. By saturating the asteroid with high
      levels of ionizing radiation—already present in the system—the crew masks the
      Pegasus’s ion trail, making it appear as a natural phenomenon. This object is
      the narrative and technical solution to the problem, allowing the Enterprise
      to feign disinterest and buy time. Its success hinges on the Romulans’ inability
      to distinguish between natural and artificial radiation patterns.
    status_before_event: Present in the system but not yet concentrated around the
