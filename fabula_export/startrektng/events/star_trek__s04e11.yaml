  title: Data’s logical failure with Keiko
  description: In the Arboretum, Data attempts to apply cold logic to Keiko’s emotional
    distress over canceling her wedding, framing her decision as a flawed calculation
    rather than a human response. His detached analysis—rooted in probability and
    error correction—only deepens her anguish, exposing the chasm between his analytical
    approach and her vulnerability. Keiko, already fragile, reacts with defensive
    anger, accusing him of betraying their friendship by reducing her pain to a solvable
    equation. The exchange forces Data to confront the limits of his understanding
    of human emotions, prompting him to seek Counselor Troi’s guidance. This moment
    underscores the tension between logic and empathy, a central theme in Data’s arc
    as he strives to comprehend humanity beyond data points. The scene serves as a
    turning point, revealing that his quest for friendship requires more than observation—it
    demands emotional attunement he hasn’t yet mastered.
