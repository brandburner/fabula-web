  key_dialogue: &id003
  - 'DATA: ((V.O.)) Unlike my human friends, I am not affected by feelings or emotional
    considerations. In that sense, I am closer to being Vulcan than human, but I am
    not attracted to Vulcan philosophy. Their devotion to logic does have a certain
    appeal in its simple purity... but I find theirs to be a somewhat... stark philosophy,
    lacking beauty... and joy.'
  - 'T''PEL: ((to Riker. Polite, yet curt)) Leave us, please.'
  - 'PICARD: Ambassador T''Pel... / T''PEL: ((returning salute)) I come to serve.'
