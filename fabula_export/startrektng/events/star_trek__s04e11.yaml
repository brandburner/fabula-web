      \ of Riker hints at her true allegiances. When the pair emerges onto the bridge,\
      \ the Ready Room’s influence lingers in their body language (Picard’s grimness,\
      \ T’Pel’s satisfaction), making it a symbolic space of hidden agendas.\n   \
      \   "
