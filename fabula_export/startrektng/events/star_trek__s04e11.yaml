  sequence_in_scene: 39
  key_dialogue: &id029
  - 'MENDAK: We''re still waiting, Captain. Is there a problem?'
  - 'PICARD: There''s been... an accident. Ambassador T''Pel... was killed in a Transporter
    malfunction.'
  - 'MENDAK: What kind of malfunction?'
  - 'PICARD: We''re investigating that right now. I''m sure that--'
  - 'MENDAK: I should have known the Federation wasn''t serious about this conference.'
  - 'PICARD: Admiral, I can assure you that the Federation places the highest priority
    on this mission and its goal.'
  - 'MENDAK: Well played, Captain... well played. Starfleet opposes normalization
    of relations with the Romulan Empire and so you are ordered to create... an accident.'
  - 'PICARD: You''re mistaken. I am ready and willing to discuss the establishment
    of full diplomatic relations under the same terms as Ambassador T''Pel.'
  - 'MENDAK: ((derisive laugh)) A generous offer, since you know that we were only
    willing to negotiate with T''Pel. I salute you again, Captain. It was a maneuver
    worthy of a Romulan. I suggest we both leave the Neutral Zone before there is...
    another accident.'
  - 'PICARD: Set course for Federation territory, warp two.'
  - 'PICARD: Mister Data, take charge of the investigation. Study computer logs, sensor
    information... everything. I refuse to believe this was a simple malfunction.'
