  title: Data delivers Keiko’s wedding news
  description: In Ten Forward, Data approaches Miles O’Brien during wedding preparations
    and delivers Keiko’s decision to cancel the ceremony with clinical detachment,
    framing it as a logical choice for her happiness. O’Brien’s initial shock quickly
    erupts into raw, unfiltered anger—his outburst exposing the emotional fragility
    Data’s algorithms failed to predict. Geordi’s subsequent reproach (‘Next time,
    maybe I should break the... good news’) underscores the gap between Data’s analytical
    approach and human emotional reality, forcing him to confront the limitations
    of his predictive models. The scene pivots from setup (Keiko’s request) to consequence
    (O’Brien’s reaction), marking a turning point in Data’s self-directed study of
    friendship and empathy. The fade-out to Data’s log entry—acknowledging his program’s
    need for ‘adjustment’—signals his growing awareness of human irrationality, while
    the teaser’s abrupt ending leaves O’Brien’s emotional fallout unresolved, heightening
    tension for the next act.
