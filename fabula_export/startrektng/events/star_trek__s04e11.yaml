  global_id: null
  title: Data dances with Keiko at wedding
  description: "\n  In the aftermath of Keiko and Miles O'Brien's wedding ceremony\
    \ aboard the *Enterprise*, Data—dressed in formal attire with a boutonniere—participates\
    \ in the celebration by dancing with Keiko. The scene unfolds in Ten Forward,\
    \ decorated with Japanese and Irish cultural elements, as the wedding transitions\
    \ from solemn ritual to lively celebration. Data, who has just witnessed the emotional\
    \ exchange of the sake-sharing ceremony and Picard's officiation, now finds himself\
    \ in an intimate moment with Keiko. His movements are precise yet tender, reflecting\
    \ his attempt to emulate human connection through physical interaction. As they\
    \ dance, Data's voice-over reveals his evolving understanding of human emotions,\
    \ particularly the desire to be loved and the need for friendship. This moment\
    \ serves as a pivotal shift in his internal narrative, marking a transition from\
    \ detached observation to active participation in human experiences. The dance\
    \ becomes a metaphor for his growing capacity to bridge logic and emotion, foreshadowing\
    \ his deeper exploration of what it means to be human.\n  "
