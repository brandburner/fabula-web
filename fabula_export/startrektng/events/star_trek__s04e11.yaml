    - The soft, rhythmic beeping of the biobed’s monitors, syncing with Lieutenant
      Juarez’s breathing.
    - The faint scent of antiseptic, mingling with the natural, unfiltered smells
      of labor.
    - The dimmer lighting in the nook, creating a contrast with the brighter main
      Sickbay.
    - The presence of medical instruments within arm’s reach, a reminder of the procedural
      nature of the space.
