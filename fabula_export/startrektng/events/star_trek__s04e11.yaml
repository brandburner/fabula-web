  title: Picard orders Neutral Zone course
  description: "\n  Picard abruptly shifts the *Enterprise* toward the Romulan Neutral\
    \ Zone, defying protocol and raising immediate suspicion among his senior officers.\
    \ After dismissing Data’s request for clarification on a vague tactical analysis,\
    \ Picard issues the course change—warp seven—directly to Riker, who reacts with\
    \ barely concealed concern. The order is given with uncharacteristic terseness,\
    \ and Picard exits to the Ready Room with T’Pel, leaving Riker and Data to execute\
    \ the maneuver without explanation. Data’s voice-over log underscores the tension:\
    \ his lack of emotions allows him to perform his duties without hesitation, even\
    \ as the crew’s unease grows. The scene marks a deliberate breach of Starfleet\
    \ protocol, hinting at Picard’s hidden agenda regarding T’Pel and foreshadowing\
    \ the diplomatic crisis to come. Riker’s compliance, despite his obvious reservations,\
    \ highlights the crew’s trust in Picard’s leadership—even when it defies logic.\n\
    \  "
