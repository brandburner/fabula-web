  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: 'Starfleet’s presence in this event is **institutional
      yet invisible**—its protocols and values shape the environment without being
      explicitly stated. Sickbay operates under Starfleet’s medical standards, where
      efficiency, privacy, and professionalism are paramount. Beverly’s embarrassment
      at Data’s public request stems from her role as a **Starfleet officer first**,
      where maintaining decorum in a medical setting is non-negotiable. The organization’s
      influence is also seen in the **vestibule’s semi-public nature**, where workplace
      interactions are subject to scrutiny, and in the **biobed’s clinical design**,
      which prioritizes data over emotion. Yet, Starfleet’s **humanistic side** is
      evident in its support for personal milestones like childbirth, creating a paradox:
      the same institution that demands professionalism also values the crew’s well-being.'
    active_representation: Via **institutional protocol** (e.g., medical privacy,
      professional conduct) and **collective action of members** (e.g., Beverly’s
