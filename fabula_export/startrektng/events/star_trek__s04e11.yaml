- fabula_uuid: act_808a410e7048c038
  number: 5
  summary: 'In the Ready Room, Data presents his findings: a temporary energy fluctuation
    during T''Pel''s transport, indicating a second, Romulan Transporter signal from
    the Devoras. He deduces the Romulans beamed T''Pel off the pad and replaced her
    with genetically similar material to simulate her death and sabotage the negotiations.
    Picard, confirming Data''s analysis, orders Red Alert and an intercept course
    for the Romulan ship. The Enterprise pursues the Devoras at warp eight, with Picard
    opening a channel to Mendak. Mendak initially denies holding anyone captive, but
    as a second Romulan Warbird decloaks, Picard firmly asserts his intent to retrieve
    the Ambassador. Mendak, recognizing Picard''s resolve, finally reveals T''Pel,
    now in a Romulan uniform, identifying her as Sub-Commander Selok—a spy. Selok
    sarcastically thanks Picard for his ''help,'' and Mendak demands the Enterprise
    leave peacefully. With three more Romulan ships approaching, Picard, acknowledging
    the tactical disadvantage, orders a retreat, reflecting on the resilience needed
    in defeat. Later, in the Arboretum, Data apologizes to a now cheerful Keiko for
    his earlier interference. Keiko accepts his apology and, happy and excited, invites
    him to her wedding. Data, still somewhat confused but ready, attends the wedding
    in Ten Forward, a celebration blending Japanese and Irish traditions. Picard officiates,
    uniting Keiko and O''Brien. Data, applying Dr. Crusher''s earlier advice, gracefully
    dances with the bride. The day concludes with Data observing the newborn Juarez
    baby with Picard, who reflects on the ''small miracle'' of life amidst conflict.
    Data then takes over the night watch on the Bridge, reflecting on his day''s experiences,
    hopeful that through continuous learning, changing, and growing, he will one day
    discover his own humanity, concluding his log to Commander Maddox.'
