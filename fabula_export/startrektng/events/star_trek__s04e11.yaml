      a passive observer.
    goals:
    - To document the interaction for his personal log, using it as data for his study
      of human behavior.
    - To maintain neutrality, avoiding any action that might escalate the tension.
    what_happened: Data exits the ready room with Riker, his golden eyes reflecting
      the ambient light as he processes the interaction. His internal log—*‘Their
      devotion to logic does have a certain appeal in its simple purity… but I find
      theirs to be a somewhat stark philosophy, lacking beauty… and joy’*—hints at
      his conflicted analysis of the scene. He does not intervene or react emotionally,
      but his presence as a witness underscores the clash between Vulcan logic and
      human emotion, a theme central to his character arc.
