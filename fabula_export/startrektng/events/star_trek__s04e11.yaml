      \ the unpredictability of high-stakes diplomacy.\n      "
    internal_dynamics: |2-

              The crew's adherence to protocol is tested by the unexpected failure, revealing tensions between institutional rules and human emotion. The event exposes the crew's vulnerability and the organization's reliance on flawed systems.
