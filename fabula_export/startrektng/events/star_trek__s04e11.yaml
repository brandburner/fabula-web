- fabula_uuid: cand_evt_scene_7e1c7a060ab6458d_02
  global_id: null
  title: Data requests dance lessons from Beverly
  description: 'In the vestibule outside Beverly Crusher’s office, Data interrupts
    her post-birthing-area rounds with an abrupt, socially awkward request: *‘Will
    you teach me how to dance?’* The timing is jarring—Beverly has just reassured
    a laboring patient and is transitioning to administrative tasks—yet Data’s query
    is delivered with his characteristic literal-mindedness, devoid of context or
    preamble. A passing nurse overhears, her startled reaction mirroring Beverly’s
    own embarrassment. The request isn’t just about dancing; it’s Data’s latest attempt
    to decode human rituals, this time in the wake of Keiko’s wedding (where he observed
    Geordi’s advice about ‘cold feet’ and Worf’s Klingon perspective on gifts). Beverly’s
    immediate discomfort stems from the public nature of the ask—exposing her personal
    life to workplace scrutiny—and the implied intimacy of private lessons. She reacts
    by physically pulling Data into her office, a move that underscores her conflicted
    role as both mentor and reluctant participant in his emotional education. The
    scene functions as a microcosm of Data’s broader struggle: his logical pursuit
    of human connection clashes with the messy, unscripted reality of social interaction.
    For Beverly, it’s a moment of professional vulnerability, where her expertise
    as a doctor is suddenly overshadowed by her role as an unwilling guide to an android’s
    emotional growth. The exchange sets up their subsequent private lessons, where
    Data’s literal-mindedness will continue to collide with Beverly’s human instincts,
    advancing the story’s central theme of the gap between logic and emotion.'
