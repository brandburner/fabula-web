      earlier orders to Data, reinforcing the idea that this maneuver is deliberate,
      calculated, and fraught with unspoken stakes. Their execution marks a turning
      point in the act, shifting the *Enterprise* from passive observation to active
      engagement with the Neutral Zone’s dangers.'
