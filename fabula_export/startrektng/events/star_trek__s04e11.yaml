  title: Data observes Keiko and O'Brien’s wedding
  description: 'Data, dressed in formal attire with a boutonniere, stands in Ten Forward—decorated
    for a fusion of Japanese and Irish wedding traditions—as Keiko Ishikawa, in a
    semi-traditional black silk kimono, completes a silent prayer to her ancestors
    before joining Miles O’Brien. Data escorts her to O’Brien, facilitating the sake-sharing
    ritual (three sips each) before Picard officiates their marriage. The ceremony
    culminates in a kiss and cheers, transitioning into lively Irish music as guests
    congratulate the couple. Later, Data dances with Keiko, his movements precise
    yet tender, while his internal monologue reveals his evolving understanding of
    human connection—acknowledging his grasp of love and friendship despite lingering
    confusion over darker emotions like anger and hatred. The scene underscores Data’s
    outsider perspective and his quiet, methodical quest to bridge logic and humanity,
    while the wedding itself serves as a microcosm of the story’s central themes:
    intimacy, cultural synthesis, and the universal desire for belonging. The moment
    also foreshadows Data’s later emotional revelations, particularly his dance with
    Keiko, which becomes a pivotal turning point in his self-awareness.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e11
  scene_sequence: 30
