  title: Keiko confesses wedding cancellation
  description: During the wedding rehearsal, Keiko abruptly informs Data she is calling
    off her marriage to Miles. She delivers the news with uncharacteristic detachment,
    masking her emotional turmoil behind a facade of rationality. Data, operating
    within his observational framework, probes for logical explanations but fails
    to grasp the depth of her distress. Keiko reveals her unhappiness—despite the
    impending wedding, she feels an overwhelming weight rather than joy—and asks Data
    to deliver the devastating news to Miles. The scene pivots from celebration to
    crisis, exposing Keiko’s vulnerability and forcing Data to confront human emotional
    complexity beyond his analytical lens. This moment not only disrupts the planned
    narrative trajectory of the wedding but also thrusts Data into an uncomfortable
    role as an emotional intermediary, setting up future conflicts between Miles and
    Data while deepening the story’s exploration of human irrationality and emotional
    pain.
