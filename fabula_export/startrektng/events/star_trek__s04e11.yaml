      advantage of their deception and holding them accountable for their actions.
    - Demonstrate to the Romulan Star Empire—and the broader galaxy—that Starfleet
      will not tolerate espionage or manipulation, reinforcing the Federation’s reputation
      as a formidable and unyielding ally.
