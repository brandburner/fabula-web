    - To **support the personal lives of crew members** (e.g., childbirth, mentorship)
      while upholding Starfleet’s standards.
    influence_mechanisms:
    - Through **policy** (e.g., medical confidentiality, workplace conduct guidelines),
    - Via **institutional symbols** (e.g., Sickbay’s design, Beverly’s authority as
