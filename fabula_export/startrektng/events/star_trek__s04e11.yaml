  scene_sequence: 3
  sequence_in_scene: 4
  key_dialogue:
  - 'KEIKO: I''ve decided not to go through with it, Data.'
  - 'KEIKO: I''m supposed to be getting married, Data. I should be happy... but I''m
    not. I just feel this weight pressing down on me.'
  - 'KEIKO: He''ll probably be just as relieved as I am. Data, you introduced us,
    you mean a lot to both of us... I''d really appreciate it if... you would tell
    Miles for me.'
