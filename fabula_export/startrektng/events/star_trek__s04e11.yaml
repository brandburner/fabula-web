  global_id: null
  title: Mendak accuses Picard of Romulan sabotage
  description: "\n  Picard delivers the news of Ambassador T'Pel's death to Romulan\
    \ Subcommander Mendak, who immediately rejects the explanation of a transporter\
    \ malfunction as a transparent lie. Mendak's response escalates from disbelief\
    \ to outright accusation, framing the incident as a deliberate Federation sabotage\
    \ designed to undermine diplomatic progress. His bitter praise for Picard's 'Romulan-worthy\
    \ maneuver' before terminating communications reveals the depth of Romulan distrust\
    \ and the fragility of the negotiation process. The exchange forces Picard to\
    \ retreat strategically, abandoning the Neutral Zone while ordering Data to investigate\
    \ the incident—a decision that underscores the crew's growing suspicion of Romulan\
    \ deception and the high stakes of the diplomatic mission.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e11
  scene_sequence: 22
  sequence_in_scene: 38
  key_dialogue: &id027
  - 'MENDAK: We''re still waiting, Captain. Is there a problem?'
  - 'PICARD: There''s been... an accident. Ambassador T''Pel... was killed in a Transporter
    malfunction.'
  - 'MENDAK: What kind of malfunction?'
  - 'PICARD: We''re investigating that right now. I''m sure that--'
  - 'MENDAK: I should have known the Federation wasn''t serious about this conference.'
  - 'PICARD: Admiral, I can assure you that the Federation places the highest priority
    on this mission and its goal.'
  - 'MENDAK: Well played, Captain... well played. Starfleet opposes normalization
    of relations with the Romulan Empire and so you are ordered to create... an accident.'
  - 'PICARD: You''re mistaken. I am ready and willing to discuss the establishment
    of full diplomatic relations under the same terms as Ambassador T''Pel.'
  - 'MENDAK: ((derisive laugh)) A generous offer, since you know that we were only
    willing to negotiate with T''Pel. I salute you again, Captain. It was a maneuver
    worthy of a Romulan. I suggest we both leave the Neutral Zone before there is...
    another accident.'
