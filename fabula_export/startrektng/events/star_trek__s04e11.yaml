    institutional_impact: Reinforces the **duality of Starfleet as both a rigid institution
      and a supportive community**—where personal growth (e.g., Data’s quest for humanity)
      is encouraged, but always within the framework of duty and decorum.
    internal_dynamics: The tension between **professional expectations** (e.g., Beverly’s
      role as CMO) and **personal relationships** (e.g., her mentorship of Data) creates
      an internal dynamic where individual agency is balanced against institutional
      demands.
