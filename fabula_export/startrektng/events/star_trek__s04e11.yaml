  sequence_in_scene: 50
  key_dialogue:
  - 'DATA: Keiko, I need your help. I have offended you and need to find a way to
    rectify my mistake. I am not sure what to do.'
  - 'KEIKO: You didn''t offend me. It would be best if you got dressed. For the wedding?'
  - 'DATA: I am not nervous. I am just... confused.'
