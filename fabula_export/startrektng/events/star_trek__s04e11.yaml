      a willingness to act decisively when diplomacy fails. The crew’s actions are
      a direct extension of Starfleet’s mandate, demonstrating their commitment to
      upholding the organization’s ideals even in the face of adversity. This event
      underscores Starfleet’s dual role as both a diplomatic and military force, capable
      of shifting gears when necessary to protect its interests and those of the Federation.
    active_representation: Through the actions of its officers—Picard’s leadership,
      Riker’s tactical execution, and Data’s logical compliance—the crew embodies
