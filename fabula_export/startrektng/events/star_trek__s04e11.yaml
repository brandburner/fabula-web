  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: "\n        Starfleet is actively represented in this\
      \ event through the presence of its crew members, the operational protocols\
      \ of the *Enterprise*, and the diplomatic interactions involving Ambassador\
      \ T’Pel. The Transporter Technician, Data, Picard, and Riker all act as extensions\
