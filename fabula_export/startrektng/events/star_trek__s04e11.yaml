    emotional_state: Amused and in control—he derives pleasure from outmaneuvering
      Picard, but beneath the surface, there is a calculating ruthlessness. He is
      fully aware of the danger he is placing the *Enterprise* in, and he relishes
      the power dynamic.
    goals:
    - To maintain the illusion of Romulan innocence while secretly holding T’Pel captive,
      using her as leverage in the negotiation.
    - To provoke the *Enterprise* into a reaction that justifies Romulan military
      action, thereby gaining the upper hand in the standoff.
    what_happened: Mendak appears on the viewscreen, his demeanor a calculated mix
      of amusement and cold authority. He initially denies holding T’Pel captive,
      his tone laced with condescension, but his subtle nod to an off-screen subordinate
      signals the Romulans’ true intentions. His smirk and measured responses reveal
      a man who enjoys the game of deception, confident in his ability to manipulate
      the situation. His physical presence is minimal but his influence is maximal—his
      actions directly escalate the conflict.
