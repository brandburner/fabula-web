  sequence_in_scene: 42
  key_dialogue:
  - 'DATA: The only abnormality found during my investigation was a temporary increase
    in the matter to energy signal ratio. This fluctuation was well within operating
    parameters and would normally not invite further consideration. However, due to
    the circumstances, I decided to investigate the possibility that a second Transporter
    signal had caused the fluctuation. Although this was highly improbable, it was
    the only remaining theory.'
  - 'RIKER: A second transporter signal? From where?'
  - 'DATA: From the Devoras.'
  - 'PICARD: Red Alert. All hands stand to battlestations.'
