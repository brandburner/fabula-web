- fabula_uuid: cand_evt_scene_7e1c7a060ab6458d_01
  global_id: null
  title: Data requests dance lessons from Beverly
  description: 'In Sickbay’s birthing area, Beverly Crusher reassures a pregnant crew
    member and her husband while monitoring contractions. Data, observing from the
    vestibule, narrates his fascination with human medicine as a window into the ''human
    condition.'' He interrupts Beverly’s work with an abrupt, socially awkward request:
    ''Will you teach me how to dance?'' The request catches Beverly off guard, and
    a passing nurse’s startled reaction underscores its unexpectedness. Beverly, visibly
    embarrassed, quickly pulls Data into her office to discuss the matter privately.
    This moment contrasts Data’s logical pursuit of human understanding with the visceral,
    emotional reality of human interaction—particularly the vulnerability of physical
    connection. The request also foreshadows Data’s broader struggle to bridge his
    analytical nature with the irrational, embodied experiences of humanity, including
    the wedding dance he later witnesses between Keiko and Miles. The scene serves
    as a microcosm of Data’s journey, where his curiosity about friendship and emotion
    collides with the unscripted, often messy reality of human behavior.'
