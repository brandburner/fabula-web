      \ confined space amplifies the contrast between T’Pel’s stoic demeanor and Data’s\
      \ curious, introspective narration. The turbolift is a practical yet symbolic\
      \ space, representing the flow of personnel and ideas aboard the *Enterprise*.\n\
      \      "
    status_before_event: "\n        The aft turbolift is fully functional and ready\
