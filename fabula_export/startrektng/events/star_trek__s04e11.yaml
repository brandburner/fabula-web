  - object_uuid: ger_object_1afdb3824ab4
    description_of_involvement: The Romulan Warbird, though not physically present
      on the *Enterprise*’s bridge, is a looming threat whose sudden decloaking to
      starboard signals the Romulans’ true intentions. Its appearance is detected
      by Worf and confirmed by Data’s sensors, serving as the catalyst for the crew’s
      transition to combat readiness. The Warbird’s sleek, predatory hull and powered
      weapons systems are implied through the crew’s reactions and the viewscreen’s
      display, making it a tangible manifestation of the Romulans’ hostility. Its
      role in the event is to escalate the confrontation from a diplomatic standoff
      to a direct military threat, forcing the *Enterprise* to react defensively.
    status_before_event: Cloaked and undetected, lurking in the Neutral Zone as a
      hidden variable in the negotiation.
    status_after_event: Decloaked and weapons-powered, now an active threat to the
      *Enterprise*. Its presence shifts the dynamic from words to potential combat.
    global_id: ger_object_1afdb3824ab4
  - object_uuid: ger_object_6ecdef60b2de
    description_of_involvement: The *Enterprise*’s bridge viewscreen is the primary
      interface between the crew and the Romulans, projecting Mendak’s image during
      the confrontation. It serves as a visual conduit for the escalating tension,
      allowing Picard to directly accuse Mendak of holding T’Pel captive and for Mendak
      to deliver his denials with a smirk. The viewscreen also displays the sudden
      appearance of the decloaking Warbird, its angular hull materializing to starboard—a
      moment that visually underscores the shift from diplomacy to armed standoff.
      The screen’s flickering light and the Romulan insignia on Mendak’s uniform create
      an atmosphere of hostility, reinforcing the power dynamics at play.
    status_before_event: Displaying the *Devoras* and Mendak’s image, with no immediate
      signs of threat. The screen is a tool for diplomatic communication, albeit one
      now strained by suspicion.
    status_after_event: Now showing the decloaking Warbird, its weapons systems powered
