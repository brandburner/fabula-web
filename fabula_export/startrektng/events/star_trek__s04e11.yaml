- fabula_uuid: cand_evt_scene_abee9cae2644db95_02
  global_id: null
  title: Data seeks reassurance about O'Brien's outburst
  description: "\n  In the Enterprise barbershop, Data observes Geordi La Forge and\
    \ the alien barber V'Sal engaging in their usual friendly banter, which Data attempts\
    \ to replicate by calling Geordi a 'peabrain'—a failed experiment in human humor.\
    \ The moment exposes Data's ongoing struggle to grasp the nuances of human interaction,\
    \ particularly the risks of misapplied mimicry. Shifting focus, Data directly\
    \ addresses Geordi about Chief O'Brien's earlier emotional outburst after Keiko's\
    \ pre-wedding anxiety. Geordi reassures Data that O'Brien's reaction was merely\
    \ a result of 'cold feet' and that the wedding will proceed as planned. This exchange\
    \ underscores Data's persistent quest to decode human emotional complexity while\
    \ reinforcing the crew's interconnectedness during the wedding preparations. Geordi's\
    \ advice to 'find a gift' subtly propels Data toward his next social investigation,\
    \ demonstrating how even minor interactions serve as stepping stones in his broader\
    \ study of human relationships.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e11
  scene_sequence: 8
  sequence_in_scene: 12
  key_dialogue:
  - 'DATA: My hair does not require trimming... you peabrain.'
  - |-
    GEORDI: What?
    DATA: My hair...
    GEORDI: Peabrain'?
    DATA: I am experimenting with friendly insults and jibes. It was not meant as a serious disparagement.
  - |-
    DATA: Geordi, I am still confused about Chief O'Brien's reaction this morning.
    GEORDI: He was just surprised, Data. He didn’t mean to blow up like that. He knows Keiko probably doesn’t want to call off the marriage. (off Data’s look) She’s just getting cold feet.
    DATA: Cold feet... jitters... a nervous reaction to an impending event of great importance.
    GEORDI: Right. Don’t worry, everything’ll be fine. She’ll change her mind again.
    DATA: She will?
    GEORDI: Absolutely.
    DATA: Then you believe the wedding will still proceed?
    GEORDI: Trust me, they’ll get married... so you better find a gift.
