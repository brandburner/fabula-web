      \ of Picard, Riker, Data, Worf, and O'Brien, who follow protocols to the best\
      \ of their ability despite the unexpected crisis. The organization's values—safety,\
      \ diplomacy, and technological reliability—are tested by the transporter malfunction.\
      \ Starfleet's role in this event is both institutional (through its protocols)\
      \ and human (through the crew's emotional responses).\n      "
    active_representation: "\n        Through the actions of its officers, who follow\
      \ Starfleet protocols even as the situation spirals out of control. The crew's\
      \ adherence to protocol contrasts with the unpredictability of the transporter\
      \ failure.\n      "
    power_dynamics: "\n        Exercising authority over the crew's actions, but ultimately\
      \ powerless to prevent the tragedy. Starfleet's protocols are followed, but\
      \ the organization's technological limitations are exposed.\n      "
