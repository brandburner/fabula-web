      \ the emergency: 'I'm losing her signal!' and later, 'I'm sorry, sir... the\
      \ Ambassador's dead.' His hands move rapidly over the transporter controls,\
      \ but the technology fails him, leaving him defeated and the crew in disarray.\n\
      \      "
    observed_status: "\n        O'Brien responds to Picard's order to prepare the\
