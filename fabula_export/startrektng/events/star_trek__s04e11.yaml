- fabula_uuid: cand_evt_scene_86ee2c5afdd7d81b_01
  global_id: null
  title: Data masters technique but fails emotion
  description: "\n  Data enters the Holodeck for his first dance lesson with Beverly\
    \ Crusher, who has recreated her childhood dance studio. Initially, Data excels\
    \ at technical execution—replicating tap-dancing steps with flawless precision\
    \ after a single demonstration. Beverly is astonished by his ability to mirror\
    \ her movements, but when she shifts to social dance (a slower, more fluid style\
    \ requiring improvisation and emotional connection), Data struggles. His rigid\
    \ adherence to pre-programmed patterns fails when he cannot see Beverly’s feet\
    \ or follow a fixed sequence. The moment exposes a fundamental limitation: while\
    \ Data can replicate human motion, he lacks the intuitive adaptability and emotional\
    \ spontaneity that define human expression. Beverly’s frustration and eventual\
    \ compassion underscore the chasm between his artificial precision and the organic,\
    \ unpredictable nature of human interaction. The scene culminates with Beverly\
    \ leaving Data to practice with a holographic partner, setting up his solo experimentation\
    \ as a metaphor for his broader quest to understand humanity.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e11
  scene_sequence: 18
  sequence_in_scene: 30
  key_dialogue: &id017
  - 'BEVERLY: ((re: the room)) Whatta ya think? It''s a recreation of the studio where
    I took my first dance lesson.'
  - 'DATA: I cannot reproduce your performance if I cannot see your feet.'
  - 'BEVERLY: ((now she understands)) You need something to copy. You can''t just...
    dance?'
  - 'BEVERLY: Look up... into my eyes... Good... You''re holding me too tight, Data...'
  - 'DATA: This is a very complex set of variables to coordinate.'
