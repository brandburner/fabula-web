      \ the Romulan Warbird. The panel's glowing readouts flicker erratically as the\
      \ signal destabilizes, and O'Brien's urgent voice reports the emergency over\
      \ the com. Data engages the computer override in a desperate attempt to assist,\
      \ but the transporter fails catastrophically, losing T'Pel's pattern mid-transport.\
      \ The console's malfunction not only dooms T'Pel but also exposes the fragility\
      \ of Starfleet's technology, leaving the crew in shock and the diplomatic mission\
      \ in ruins.\n      "
    status_before_event: Operational and ready for transport, with O'Brien at the
