  title: Data’s Log on Emotional Efficiency
  description: "\n  Data enters the bridge to find Picard and T’Pel in tense consultation,\
    \ their body language suggesting unspoken tension. Picard orders a sudden course\
    \ correction toward the Neutral Zone—a decision that visibly unsettles Riker,\
    \ who hesitates before complying. Data, assigned to analyze Romulan deployments,\
    \ begins his work at the science station while Picard and T’Pel retreat to the\
    \ Ready Room. As the *Enterprise* accelerates toward the Neutral Zone, Data’s\
    \ voice-over log reveals his detachment from the crew’s unease, framing his lack\
    \ of emotions as an asset. His observation underscores the contrast between his\
    \ logical precision and the human reactions around him, foreshadowing his later\
    \ exploration of friendship and emotional connection. The scene’s tension—both\
    \ in Picard’s defiance of protocol and Data’s clinical observation—sets up the\
    \ act’s central conflict: the collision of logic, duty, and the unspoken pressures\
    \ of command.\n  "
