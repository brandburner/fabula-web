- fabula_uuid: cand_evt_scene_e5e2cacc65b008d4_01
  global_id: null
  title: Picard orders pursuit after Romulan deception
  description: "\n  In the Ready Room, Data reveals his discovery of a Romulan transporter\
    \ deception: while the *Enterprise* believed Ambassador T'Pel died in a transporter\
    \ malfunction, the Romulans simultaneously beamed her off the ship and left replicated\
    \ genetic material to fake her death. Picard, after a deliberate pause to weigh\
    \ the implications, defies Starfleet protocol by declaring a Red Alert and ordering\
    \ the *Enterprise* to pursue the *Devoras* at high warp. The decision tests Picard’s\
    \ leadership—balancing instinct against protocol—and escalates the diplomatic\
    \ crisis into direct confrontation. Data’s voiceover foreshadows Picard’s defiance,\
    \ while Riker’s skepticism and Geordi’s technical insight ground the revelation\
    \ in operational reality. The scene pivots from investigation to action, with\
    \ the crew exiting to execute the pursuit, marking a turning point in the Romulan\
    \ conflict.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e11
