- fabula_uuid: act_e0e556bf5f7d3d81
  number: 3
  summary: 'Data begins his dance lessons with Dr. Crusher in a Holodeck recreation
    of her childhood studio. He demonstrates a remarkable ability to master complex
    tap dance routines through precise imitation, astonishing Beverly. However, when
    attempting social dancing, Data struggles significantly, unable to improvise or
    lead, and repeatedly steps on Beverly''s foot. Beverly realizes Data''s limitation:
    he cannot ''just dance'' without a specific pattern to copy. She patiently guides
    him, emphasizing leading, eye contact, and even smiling, a ''complex set of variables''
    for Data. Their lesson is interrupted by an urgent call for Beverly to Sickbay,
    as Lieutenant Juarez is in labor. Beverly encourages Data to continue experimenting
    with an artificial partner. Meanwhile, on the Bridge, Data observes Commander
    Riker telling a joke, reflecting on the fascinating human connection between humor
    and popularity, and speculating on its correlation with ''love.'' Data then reports
    the Enterprise has reached the designated rendezvous coordinates. Picard, grim-faced,
    orders a long-range scan, which reveals a Romulan Warbird in the Neutral Zone.
    Despite T''Pel''s disapproval, Picard orders Yellow Alert and sets a course into
    the Neutral Zone. As the Enterprise approaches the Romulan ship, Picard orders
    Red Alert, causing tension between him and T''Pel. T''Pel dictates specific coordinates
    and opens a channel to Admiral Mendak, who invites her to transport aboard. T''Pel,
    with an air of arrogance, insists on beaming over immediately, dismissing Picard''s
    final plea for reconsideration. Picard reluctantly orders the Transporter Room
    to prepare, instructing Worf to maintain a signal lock for retrieval. During the
    transport sequence, an emergency unfolds: O''Brien reports losing T''Pel''s signal,
    and despite Data and Worf''s attempts to intervene, the Ambassador is declared
    dead, marking a dramatic and unexpected turning point in the diplomatic mission.'
