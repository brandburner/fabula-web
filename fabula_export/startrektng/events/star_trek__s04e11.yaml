- fabula_uuid: act_036d45ea3e0fee40
  number: 4
  summary: 'In the Transporter Room, Picard, Data, and Riker receive Chief O''Brien''s
    report on Ambassador T''Pel''s apparent death. O''Brien explains the pattern broke
    up during transfer, and he was unable to retrieve it. Data notes the unprecedented
    nature of such an accident, while Geordi finds no system flaws, and O''Brien confirms
    no prior malfunctions or Romulan interference. Picard, refusing to accept a simple
    malfunction, orders a comprehensive diagnostic of all transporters. Dr. Crusher
    reports T''Pel''s molecular structure dissipated instantly, leaving only minimal
    organic compounds, insufficient for an autopsy. The somber atmosphere is broken
    by Worf''s report that Admiral Mendak wishes to speak with Picard. On the Bridge,
    Picard informs Mendak of the ''accident.'' Mendak, after a moment of surprise,
    immediately accuses Picard of sabotaging the negotiations, believing Starfleet
    opposes normalized relations. He praises Picard for a ''maneuver worthy of a Romulan,''
    then breaks off communications, suggesting both ships leave the Neutral Zone.
    Picard, facing an accusation of treachery and the collapse of the mission, orders
    a retreat to Federation territory. He then tasks Data with leading a thorough
    investigation, explicitly stating his refusal to believe it was a simple malfunction.
    Data, drawing on his admiration for Sherlock Holmes''s deductive reasoning, begins
    his investigation across various departments. In Sickbay, he asks Beverly to perform
    a non-standard comparison: T''Pel''s genetic code from her last Transporter ID
    trace against the residual organic material found on the pad. Beverly discovers
    a ''slight discrepancy'' and ''numerous single-bit errors,'' consistent with ''replicated
    material.'' This crucial finding leads Data and Beverly to the startling conclusion
    that the remains are not T''Pel''s, fundamentally altering the understanding of
    the ''accident'' and revealing a deeper deception.'
