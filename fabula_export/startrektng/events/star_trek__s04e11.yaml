      manipulating the crew.
    - To ensure that Starfleet remains off-balance, making them more vulnerable to
      Romulan deception.
    what_happened: T'Pel exits the ready room after Riker and Data, her posture unyielding
      and her expression inscrutable. Her departure is as abrupt as her dismissal
      of Riker, reinforcing her control over the negotiation’s terms. The exchange
      leaves Picard and Riker in the ready room, the tension of her authority lingering.
      Her true identity as a Romulan operative is not yet revealed, but her actions
      foreshadow the deception and conflict to come.
