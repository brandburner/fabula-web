    his analytical framework to her emotional turmoil over her canceled wedding. His
    detached, predictive confidence—rooted in data rather than empathy—contrasts sharply
    with Keiko’s vulnerability, revealing the limits of his understanding of human
    emotions. The exchange forces him to confront the gap between logic and emotional
    connection, a central tension in his arc. This moment underscores his broader
    quest to comprehend humanity, setting up his subsequent search for guidance from
    Counselor Troi. The scene serves as a turning point, exposing the fragility of
    his analytical approach when applied to raw human emotion.
