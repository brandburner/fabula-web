- fabula_uuid: cand_evt_scene_724d16c27474f573_01
  global_id: null
  title: Data and Worf discuss wedding gifts and rituals
  description: In the replicating center, Data observes a family replicating a toy
    and approaches Worf to seek guidance on selecting a wedding gift for Keiko. Worf,
    initially confident in his knowledge of human customs, suggests traditional items
    like crystal wine glasses, but Data challenges the idea, noting that the gift
    should reflect the giver’s personality. Worf admits he has never participated
    in a human wedding, expressing discomfort with the emotional and physical aspects
    of the ritual—particularly dancing and crying. Data’s concern about dancing foreshadows
    his later struggle to learn the skill, while Worf’s reluctance highlights his
    own outsider status in human social norms. The exchange underscores Data’s growing
    fascination with human bonding rituals and Worf’s ambivalence toward them, deepening
    the contrast between their approaches to understanding humanity. The scene also
    serves as a setup for Data’s subsequent request for dance lessons from Beverly
    Crusher, as his anxiety about the wedding’s emotional demands becomes more pronounced.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e11
  scene_sequence: 9
  sequence_in_scene: 13
  key_dialogue:
  - |-
    DATA: Are you here to find a wedding gift?
    WORF: Yes.
    DATA: I would appreciate your help in selecting an appropriate item.
    WORF: ((a little proudly)) Of course. I have attended human weddings before.
  - |-
    DATA: This is a traditional gift?
    WORF: My adoptive parents often give these... things at family weddings. A human custom.
    DATA: It was my understanding that the item selected should reflect the personality of whoever is giving the gift. (looks at screen) This does not remind me of you.
  - |-
    DATA: ((concerned)) Dancing...
    WORF: An honor, perhaps. But human bonding rituals involve a great deal of talking, dancing, and crying.
