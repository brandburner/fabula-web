  title: T'Pel revealed as Romulan spy
  description: During a tense standoff with Admiral Mendak, Picard refuses to retreat
    despite Romulan threats, declaring his duty to protect Federation citizens. Mendak,
    recognizing Picard’s resolve, abruptly reveals Ambassador T'Pel as Sub-Commander
    Selok—a Romulan spy in Federation uniform. The betrayal shatters trust, exposing
    the Romulans’ deception and forcing Picard to abandon negotiations. Worf’s report
    of three additional Romulan warships arriving confirms the Federation’s strategic
    disadvantage, compelling Picard to order a tactical retreat. The revelation not
    only sabotages the diplomatic mission but also underscores the Romulans’ dominance
    in the sector, leaving the *Enterprise* outmaneuvered and the Federation’s negotiating
    position in ruins. Data’s poker analogy frames the confrontation as a high-stakes
    gamble, where Picard’s unyielding stance fails to secure victory but exposes the
    Romulans’ true intentions.
