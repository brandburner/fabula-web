  - location_uuid: ger_location_62db2750cf83
    description_of_involvement: The **vestibule outside Beverly’s office** is a narrow,
      transitional space that amplifies the awkwardness of Data’s request. Its semi-public
      nature—visible to passing nurses and crew—turns a private mentorship moment
      into a workplace spectacle. Beverly’s embarrassment is directly tied to this
