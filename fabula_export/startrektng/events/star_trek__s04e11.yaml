- fabula_uuid: cand_evt_scene_8b8b34196c7d6c74_01
  global_id: null
  title: Data and Beverly uncover T'Pel deception
  description: 'In Sickbay, Data approaches Beverly Crusher with a request to compare
    the genetic code of the unidentified remains found on the transporter pad with
    Ambassador T''Pel''s last transporter trace. Beverly initially dismisses the idea
    as unnecessary, but Data persists, framing his inquiry as a logical extension
    of Sherlock Holmes'' deductive reasoning. Beverly reluctantly complies, running
    the genetic analysis. The results reveal a critical discrepancy: the remains''
    mitochondrial structure and nucleotide bases match T''Pel''s, but the organic
    sample contains ''numerous single-bit errors''—a hallmark of replicated material.
    This suggests the remains are not T''Pel''s, forcing Beverly to conclude either
    the DNA was mutated by the transporter (unlikely, given the records) or the remains
    belong to someone else entirely. The revelation shifts the scene from scientific
    inquiry to a moment of ethical and narrative reckoning, as Data''s logical pursuit
    of truth exposes a deliberate deception aboard the *Enterprise*. The discovery
    sets up a confrontation with the Romulans and forces Data to grapple with the
    implications of sabotage and betrayal, while also reinforcing his role as an impartial
    investigator in a story increasingly driven by human (and Vulcan/Romulan) emotion
    and conflict.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e11
  scene_sequence: 23
  sequence_in_scene: 40
  key_dialogue:
  - 'DATA: "Have you compared the genetic code with the Ambassador''s last recorded
    Transporter ID trace?"'
  - 'BEVERLY: "No... that''s not part of the standard procedure. Why?"'
  - 'DATA: "I could be pursuing an untamed ornithoid without cause."'
  - 'BEVERLY: "A wild goose chase?"'
  - 'BEVERLY: "Chemically, these are identical... however, the organic sample from
    the Transporter is showing numerous single-bit errors... like replicated material."'
  - 'BEVERLY: "I''d say the DNA was either mutated by the Transporter during the rematerialization
    process... Or these aren''t the remains of the Ambassador."'
