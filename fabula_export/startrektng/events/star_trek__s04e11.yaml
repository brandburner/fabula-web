    - Via the crew’s unwavering execution of orders, reflecting Starfleet’s training
      and discipline in high-pressure situations.
    - By leveraging Picard’s leadership and judgment, which serve as a model for how
      Starfleet officers are expected to act in the face of moral and operational
      dilemmas.
    institutional_impact: This event tests the boundaries of Starfleet’s protocols,
      highlighting the tension between diplomatic ideals and the necessity of military
      action. Picard’s decision to pursue the Romulan vessel at warp eight could set
      a precedent for how Starfleet responds to future acts of deception, potentially
