  key_dialogue:
  - 'PICARD: Since the time of the first wooden sailing ships, all captains have enjoyed
    the happy privilege of joining two people in the bonds of matrimony. And so now
    it is my honor to unite you Keiko Ishikawa, and you Miles Edward O''Brien together
    in marriage here in the sight of your friends and family.'
  - 'DATA (V.O.): There are still many human emotions I do not fully comprehend...
    anger, hatred, revenge... But I am not mystified by the desire to be loved...
    the need for friendship... these are things I do understand.'
