      Picard’s voice granting entry, and its mechanical precision mirror Data’s own
      nature: a being designed to serve but ultimately excluded from the human (and
      Vulcan) circles he seeks to join. Its role is both practical and metaphorical,
      underscoring the fragility of Data’s place in the *Enterprise*’s hierarchy.'
