  - 'DATA: Captain, there is no prior record of this type of accident occurring on
    a starship. Back-up systems and safeguards are designed to prevent just such an
    occurrence.'
  - 'PICARD: To die in a Transporter accident... Hardly a fitting end for one of the
    Federation''s most honored diplomats.'
