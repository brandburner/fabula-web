- fabula_uuid: cand_evt_scene_abee9cae2644db95_01
  global_id: null
  title: Data misfires with human humor
  description: 'In the Enterprise barbershop, Data observes Geordi La Forge and the
    alien barber V''Sal engaging in their usual friendly banter, which Data interprets
    as a form of human social bonding. When Geordi invites Data to join in, the android
    attempts to replicate the humor by calling Geordi a ''peabrain,'' but his robotic
    delivery and literal interpretation of the phrase backfire, startling Geordi.
    The moment exposes Data’s struggle to grasp the nuances of human communication—particularly
    the balance between sincerity and playful insult. Geordi quickly reassures Data
    that the wedding between Miles O’Brien and Keiko will proceed despite O’Brien’s
    earlier outburst, explaining Keiko’s hesitation as ''cold feet.'' This exchange
    underscores Data’s ongoing quest to understand human emotions while reinforcing
    the crew’s interconnectedness and resilience in relationships. The scene also
    serves as a microcosm of Data’s broader narrative arc: his attempts to mimic human
    behavior often reveal the fragility of his own social learning, highlighting the
    unintended consequences of misapplied mimicry in human interaction.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e11
  scene_sequence: 8
  sequence_in_scene: 11
  key_dialogue:
  - |-
    GEORDI: Hi... here for a trim?
    DATA: My hair does not require trimming... you peabrain.
  - |-
    GEORDI: Peabrain'?
    DATA: I am experimenting with friendly insults and jibes. It was not meant as a serious disparagement.
  - |-
    GEORDI: He was just surprised, Data. He didn’t mean to blow up like that. He knows Keiko probably doesn’t want to call off the marriage. (off Data’s look) She’s just getting cold feet.
    DATA: Cold feet... jitters... a nervous reaction to an impending event of great importance.
