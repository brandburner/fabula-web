  title: Data’s apology meets Keiko’s wedding invitation
  description: 'In the arboretum, Data approaches Keiko with a formal apology for
    his earlier interference in her wedding plans, seeking to rectify his mistake
    through logical contrition. Keiko, now cheerful and reconciled with Miles, dismisses
    his earnestness with playful warmth, instead inviting him to attend her wedding
    as a gesture of friendship. She offers him a carnation—a symbolic token of inclusion—while
    Data, caught off guard, struggles to reconcile her spontaneity with his analytical
    approach to human connection. The moment marks a pivotal shift: Keiko’s invitation
    challenges Data’s rigid pursuit of understanding emotions, subtly suggesting that
    true friendship transcends logic and requires participation, not just observation.
    The scene underscores Data’s evolving journey toward sentience by contrasting
    his confusion with Keiko’s effortless acceptance, setting up his eventual attendance
    at the wedding as a key milestone in his emotional growth.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e11
