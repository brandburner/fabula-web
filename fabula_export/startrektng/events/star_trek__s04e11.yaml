  title: Riker’s wedding anticipation contrasts Data’s duty
  description: "\n  The scene opens on the dimly lit nightshift bridge of the *Enterprise*,\
    \ where Data—recording a personal log for Commander Maddox—observes the transition\
    \ between shifts as a microcosm of human routine. His voiceover reveals his struggle\
    \ to quantify friendship, framing the day’s events as empirical data for Maddox’s\
    \ study. When Riker arrives early for his shift, his uncharacteristic cheerfulness\
    \ (a result of Keiko’s upcoming wedding) immediately contrasts with Data’s clinical\
    \ detachment. Riker’s playful banter—‘Nervous?’—exposes Data’s inability to experience\
    \ anticipation, underscoring the android’s outsider status even as he performs\
    \ his duties flawlessly. The handover of command is efficient but charged with\
    \ subtext: Riker’s personal joy (a wedding) collides with Data’s professional\
    \ focus (Juarez’s labor, T’Pel’s arrival), while Data’s voiceover admits his difficulty\
    \ in understanding human emotions. The scene functions as a thematic setup, juxtaposing\
    \ human emotionality with Data’s logical framework, and foreshadows the day’s\
    \ conflicts—Keiko’s wedding crisis and the Romulan negotiations—that will further\
    \ test Data’s ability to comprehend irrationality.\n  "
