    - Through the crew’s training and adherence to Starfleet’s scientific and safety
      procedures.
    - Via the institutional expectations placed on officers like Geordi, Data, and
      Barclay to act decisively under pressure.
    - By leveraging Starfleet’s resources (e.g., the *Enterprise*’s advanced systems)
      to contain and analyze the threat.
    institutional_impact: The event forces Starfleet’s protocols to confront their
      own limitations, particularly in addressing threats that are **sentient, adaptive,
      and capable of infecting organic systems**. The quasi-energy’s behavior challenges
      the organization’s assumptions about control and predictability, raising questions
      about how Starfleet prepares for the unknown.
    internal_dynamics: The crisis exposes tensions between **individual adaptability**
      (e.g., Geordi and Data’s improvisation) and **institutional rigidity** (e.g.,
      following protocol even when it fails). Barclay’s role as both a victim and
      a potential carrier of the infection also highlights the personal cost of Starfleet’s
