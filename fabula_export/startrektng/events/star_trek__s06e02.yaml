  title: Barclay rescues crew from transporter beam
  description: Barclay materializes unexpectedly in the transporter room, clutching
    a half-transported science crewmember from the USS Yosemite. His sudden appearance
    triggers a transporter alarm due to the unexpected mass increase, revealing he
    was holding onto the crewmember during transport. Beverly immediately orders the
    safety field deactivated, allowing the crewmember to recover. Barclay, urgent
    and breathless, bypasses protocol to plead with Worf and security to rescue the
    remaining trapped crew still in the beam, revealing the lifeform’s threat and
    his own desperate role in the unfolding crisis. The crewmember confirms Lieutenant
    Kelly’s attempt to reprogram the bio-filter, which caused the molecular dispersion
    anomaly trapping them. Geordi deduces the residual plasma energy amplified the
    charge, preventing pattern degradation. Worf and security successfully retrieve
    the remaining crew, while Barclay’s actions validate his earlier visions and demonstrate
    his growth in overcoming his phobia to save others. The event escalates the transporter
    malfunction crisis, confirms the lifeform’s interference, and marks a turning
    point in Barclay’s arc as he transitions from fear to decisive action.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e02
  scene_sequence: 27
  sequence_in_scene: 42
  key_dialogue:
  - 'O''BRIEN: I''m reading a ninety-two percent increase in mass, sir!'
  - 'BARCLAY: There are more of them in the beam... you have to grab them and hold
    on...'
  - 'CREWMEMBER: We were infected with something... Lieutenant Kelly tried to reprogram
    the bio-filter...'
  - 'GEORDI: It looks like he increased molecular dispersion past the integrity point...
    your patterns were lost in the beam.'
  - 'BARCLAY: The residual energy from the plasma streamer... it must''ve amplified
    the charge in the buffer... enough to keep your patterns from degrading...'
