      report, the reliance on forensic evidence, and the protocol-driven responses
      from Picard. Starfleet’s role is to coordinate the *Enterprise*’s actions in
      response to the Cardassian threat, ensuring that operational decisions align
      with broader strategic goals. The organization’s influence is both directive
      and supportive, as it provides the framework for Picard’s command while also
      imposing the pressure of institutional expectations.
    active_representation: Through formal spokesman (Admiral Hayes) delivering a structured
      intelligence briefing and institutional symbolism (Starfleet logo).
    power_dynamics: Exercising authority over the *Enterprise* and its crew, while
