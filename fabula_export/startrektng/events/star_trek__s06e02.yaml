  key_dialogue: &id007
  - 'BARCLAY: Commander... what if we bridged our Transporter system with theirs?
    It might be enough to cut through the ionic field.'
  - 'GEORDI: To do that, we''d have to activate the Yosemite''s Transporters by remote...'
  - 'BARCLAY: No problem, sir. I can reconfigure their controller to accept commands
    from here.'
  - 'GEORDI: Barclay -- I''ll need a systems engineer on this Away Team.'
  - 'BARCLAY: I''ll ask Ensign Dern to join you.'
  - 'GEORDI: I meant you, Barclay.'
