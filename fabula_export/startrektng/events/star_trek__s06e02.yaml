      crew’s actions—from initiating the resonance frequency scan to activating the
      containment field—are all rooted in Starfleet’s scientific and safety guidelines.
      However, the sentient energy’s emergence exposes the gaps in those protocols,
      particularly in how they address **unknown, adaptive threats**. Starfleet’s
      hierarchical structure and emphasis on rapid problem-solving are both assets
      and liabilities: while they enable quick decision-making, they also create pressure
      to ‘solve’ the crisis within established frameworks, even when those frameworks
      are inadequate.'
    active_representation: Via institutional protocol (diagnostic scans, containment
      procedures) and the chain of command (Geordi and Data reporting to Picard, Barclay
      following orders). Starfleet’s presence is also implied through the broader
      context of the mission (rescuing the *Yosemite*) and the crew’s adherence to
      its scientific and ethical standards.
    power_dynamics: Exercising authority through the crew’s adherence to protocol,
      but facing challenges as the sentient energy defies Starfleet’s assumptions
      about scientific inquiry and containment. The organization’s power is both enforced
      (through the crew’s training) and tested (by the quasi-energy’s sentience).
    organizational_goals:
