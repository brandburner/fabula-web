    emotional_state: Controlled tension with underlying urgency. O’Brien’s exterior
      remains composed, but his internal focus is razor-sharp—he knows the stakes,
      and his every action is calculated to buy time and stabilize the situation.
      There’s a flicker of relief when the bio-filter engages, but his primary concern
      remains Barclay’s safety and the crew’s mission.
    goals:
    - To stabilize Barclay’s transporter signal and prevent his pattern from collapsing
      entirely.
    - To reprogram the bio-filter to neutralize the microbial threat before it infects
      the *Enterprise*’s systems or crew.
    what_happened: O’Brien works the transporter console with practiced urgency, his
      fingers dancing over the controls as he adjusts molecular dispersion and phase-transition
      frequency. He maintains a steady stream of updates—‘Signal’s holding…’ ‘His
      pattern is locked and holding…’—while reassuring Geordi that he can ‘hold [Barclay]
      together’ despite the signal dropping to 50%. His voice is calm but tense, a
      testament to his experience under pressure. When Beverly reports the imaging
      scanners are finally isolating the microbes, O’Brien seizes the moment, programming
      the bio-filter with precision.
