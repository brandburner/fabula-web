  global_id: null
  title: Barclay’s transporter panic surfaces
  description: During a routine transporter check for the away team to the *Yosemite*,
    Barclay’s repressed fear of the transporter is triggered when O’Brien casually
    mentions technical limitations—'bandwidth limitations' and 'static charge'—unwittingly
    exposing the depth of his psychological unraveling. His attempt to mask his panic
    fails as the transporter’s humming and prolonged dematerialization effects intensify
    his distress. When Geordi calls him to the stage, Barclay’s panic peaks, and he
    abruptly exits the room, leaving the team stunned. The moment reveals Barclay’s
    vulnerability, foreshadows the lifeform discovery in the transporter beam, and
    sets up his later role in the *Yosemite*’s rescue mission. The scene underscores
    the tension between duty and personal trauma, while O’Brien’s technical jargon—meant
    to reassure—ironically amplifies Barclay’s terror, highlighting the disconnect
    between rational explanations and irrational fears.
