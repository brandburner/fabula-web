  title: Barclay confesses transporter phobia to Troi
  description: 'In Troi’s office, Barclay—still shaken by his earlier public breakdown
    during transport—reveals the depth of his lifelong fear of dematerialization,
    which he has hidden for years to avoid career ruin. Troi validates his anxiety
    as rational (given the transporter’s molecular disassembly) and introduces Plexing,
    a Betazoid technique to suppress fear through neural stimulation. Barclay, initially
    skeptical, tries the method and experiences immediate relief, triggering an impulsive
    decision to confront his phobia head-on. His sudden shift from paralysis to determination
    marks a critical turning point: his fear, once a liability, becomes the catalyst
    for uncovering the transporter’s hidden threat. The scene bridges psychological
    vulnerability and narrative urgency, setting up Barclay’s later role in exposing
    the quasi-energy lifeform.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e02
  scene_sequence: 4
  sequence_in_scene: 8
  key_dialogue:
  - 'BARCLAY: Ever since I was a child, I''ve been scared to death that if I ever
    dematerialized... I wouldn''t come back whole again. I know it sounds crazy.'
  - 'TROI: There''s nothing crazy about it, Reg—you are being taken apart molecule
    by molecule. We can desensitize you to this type of fear. It''s a slow and gradual
    process... but it works.'
  - 'BARCLAY: I''m going to beam over there. I can do this.'
