      to Geordi with a spark of technical inspiration, proposing the transporter bridge
      solution with quick, confident words. His body language shifts from nervous
      hesitation to focused intensity as he outlines the plan, but when Geordi assigns
      him to the away team, his posture stiffens, his fingers twitch at his sides,
      and his voice falters—revealing the deep-seated fear of transporters that threatens
      to paralyze him. He stalls, suggesting Dern as a replacement, but ultimately
      follows Geordi with a reluctant, worried expression, his anxiety palpable.
