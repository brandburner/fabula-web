  - object_uuid: ger_object_9531bed03f8b
    description_of_involvement: "\n        The *Enterprise*’s tractor beam is tested\
      \ and found ineffective due to the plasma streamer’s ionic interference. Worf\
      \ confirms its failure, and Data’s scans corroborate the limitation, leaving\
      \ the crew with no mechanical means to pull the *Yosemite* free. The tractor\
      \ beam’s inability to function serves as a turning point, eliminating one of\
      \ the crew’s primary tools and forcing them to consider more desperate measures.\
      \ Its failure is a narrative catalyst, pushing the story toward the transporter\
