  title: Rescued crewmember reveals Kelly’s biohazard failure
  description: "\n  The event opens with the Enterprise crew materializing from the\
    \ transporter beam, having successfully rescued the stranded *Yosemite* crew.\
    \ Among them is a disoriented but conscious crewmember who immediately begins\
    \ recounting the disaster that trapped them. The crewmember reveals that Lieutenant\
    \ Kelly, in an unauthorized attempt to reprogram the bio-filter, inadvertently\
    \ dispersed dangerous microbial patterns into the *Yosemite*’s systems. This revelation\
    \ forces the Enterprise’s leadership to confront the immediate biohazard threat\
    \ now present on their ship, as well as the broader implications of Kelly’s reckless\
    \ actions. The crewmember’s testimony also underscores the parasitic lifeform’s\
    \ lingering threat, tying the crisis to Barclay’s earlier discovery of the sentient\
    \ transporter entity. Picard and Riker exchange a tense glance, signaling the\
    \ escalation of both the biohazard and the crew’s distrust of the transporter\
    \ system. The scene pivots from relief at the rescue to alarm as Beverly and Geordi\
    \ rush to assess the contamination risk, while Data begins analyzing the microbial\
    \ patterns for containment strategies. The event serves as a turning point, shifting\
    \ the narrative from crisis resolution to a new, more complex threat.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e02
  scene_sequence: 29
  sequence_in_scene: 48
  key_dialogue:
  - 'CREWMEMBER: "Kelly—he tried to fix the bio-filter. Said it was the only way to
    keep the microbes from spreading. But something went wrong. The patterns just...
    exploded. We were trapped in the beam before we even realized what was happening."'
  - 'PICARD: "You’re saying Lieutenant Kelly’s unauthorized modifications caused this?"'
  - 'CREWMEMBER: "Yes, sir. He didn’t mean to—he was trying to help. But the microbes...
    they’re still out there. In the beam. In us."'
  - 'BEVERLY: "Data, if these microbes are quasi-energy-based, they could be replicating
    even now. We need to isolate the affected crew immediately."'
