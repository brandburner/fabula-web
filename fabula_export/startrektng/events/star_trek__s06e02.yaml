- fabula_uuid: cand_evt_scene_9cf019226c2dc277_01
  global_id: null
  title: Barclay proposes transporter bridge workaround
  description: In Engineering, Barclay—despite his crippling fear of transporters—overhears
    Geordi and Picard’s dilemma about reaching the *Yosemite* through interference.
    Recognizing a technical solution, he impulsively suggests bridging the Enterprise’s
    and *Yosemite*’s transporter systems to bypass the ionic field. Geordi approves
    the plan, but when he assigns Barclay to the away team, Barclay’s hesitation reveals
    his deep-seated anxiety. Geordi insists, forcing Barclay to confront his phobia
    while setting the stage for the mission’s execution—and its hidden dangers. The
    exchange underscores Barclay’s brilliance under pressure but also his vulnerability,
    foreshadowing the lifeform discovery that will later endanger the crew. The scene
    pivots from technical problem-solving to psychological tension, as Barclay’s reluctance
    becomes a narrative ticking clock.
