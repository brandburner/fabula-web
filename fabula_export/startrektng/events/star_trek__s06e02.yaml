  scene_sequence: 29
  sequence_in_scene: 47
  key_dialogue:
  - 'CREWMEMBER: "Lieutenant Kelly tried to reprogram the bio-filter! He thought he
    could stabilize the energy patterns, but it backfired—trapped us in the beam!"'
  - 'BARCLAY: "I saw you—all of you—trapped in there. I couldn’t just leave you like
    that. Not again."'
  - 'PICARD: "Barclay, you’ve just confirmed what we feared. The transporter isn’t
    just malfunctioning—it’s *infected*."'
