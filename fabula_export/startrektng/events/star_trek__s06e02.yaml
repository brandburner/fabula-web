  title: Data reveals quasi-energy microbes in transporter
  description: In the aftermath of Barclay’s terrifying visions and the Yosemite explosion,
    Data’s analysis of the transporter beam uncovers quasi-energy microbes as the
    root cause of the anomalies. The discovery forces the crew to confront a hidden,
    sentient threat embedded in the Enterprise’s transporter system. Geordi proposes
    a high-risk solution—suspending Barclay mid-transport to purge the microbes—while
    Picard weighs the scientific necessity against the personal danger to Barclay.
    The revelation escalates the crisis, shifting the focus from Barclay’s phobia
    to a systemic threat that endangers the entire crew. The tension lies in the crew’s
    urgency to act versus the ethical dilemma of exposing Barclay to further risk,
    underscoring the story’s themes of trust, sacrifice, and the unintended consequences
    of technological reliance. Data’s clinical detachment contrasts with Barclay’s
    visceral fear, highlighting the divide between logic and emotion in crisis management.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e02
  scene_sequence: 29
  sequence_in_scene: 46
  key_dialogue:
  - 'DATA: "The quasi-energy microbes are not merely a byproduct of the transporter
    malfunction. They are the cause. They have been replicating within the beam, altering
    its structure."'
  - 'GEORDI: "If we suspend Barclay mid-transport, we can isolate the microbes and
    purge them from his system. But the risk is extreme—his neural patterns could
    be permanently disrupted."'
  - 'PICARD: "We have no choice. If these microbes are spreading, the entire crew
    is at risk. Barclay’s safety is secondary to the safety of this ship."'
