      procedures for analyzing an unknown sample. However, the plasma’s sentience
      and infectivity **expose the limits of Starfleet’s preparedness**, forcing an
      improvisational response. The organization’s **commitment to exploration and
      discovery** clashes with the **immediate threat to crew safety**, creating a
      **dilemma between curiosity and containment**. Starfleet’s influence is felt
      through the **crew’s training, the ship’s systems, and the expectation to document
      and report findings**—even in a crisis.
