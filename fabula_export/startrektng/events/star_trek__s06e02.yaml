  title: Barclay’s ionization confirmed as real
  description: 'In Sickbay, Beverly Crusher conducts a medical scan on Barclay’s left
    arm, revealing residual ionization matching the patterns found in Lieutenant Kelly’s
    body and the Yosemite sample container. This confirms Barclay’s terrifying experiences
    in the transporter beam were not hallucinations but a genuine exposure to an unknown
    energy phenomenon. The revelation vindicates Barclay, who had been dismissed as
    paranoid, and shifts the crew’s skepticism into urgent concern. Riker, present
    for the scan, immediately grants Barclay permission to proceed with recreating
    the Yosemite explosion conditions—now framed as a critical diagnostic experiment.
    Beverly equips Barclay with a monitoring armband to track ionization buildup,
    transforming his fear into a tool for the crew’s survival. The scene marks a turning
    point: Barclay’s personal trauma becomes the key to understanding the transporter
    entity’s threat, while Riker’s approval escalates the mission’s stakes by ordering
    all primary transporters offline to prevent further contamination. The exchange
    underscores the crew’s trust in Barclay’s instincts and the escalating danger
    posed by the quasi-energy lifeform.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e02
  scene_sequence: 20
  sequence_in_scene: 32
  key_dialogue:
  - 'BEVERLY: I''m reading minute levels of residual ionization in the sub-dermal
    tissue of his left arm. The patterns correspond exactly to the ones we measured
    in Lieutenant Kelly''s body... and in the sample container from the science ship.'
  - 'BARCLAY: So... something did happen to me in the Transporter beam?'
  - 'RIKER: Does this ionization pose a threat to Mister Barclay?'
  - 'BARCLAY: Sir... Commander La Forge and I were planning to recreate the circumstances
    of the explosion on the Yosemite... that might give us some answers. Permission
    to continue with the experiment?'
