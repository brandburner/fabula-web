  title: Plasma sample erupts into sentient energy
  description: "\n  In Engineering, Geordi La Forge and Data prepare to analyze a\
    \ plasma sample linked to Barclay’s transporter phobia, believing it may hold\
    \ clues to the Yosemite disaster. As they initiate a resonance frequency scan,\
    \ the sample violently erupts, shattering its container and revealing pulsating,\
    \ quasi-energy particles that appear to be *alive*—their bio-magnetic signatures\
    \ suggesting sentience. The explosion forces Geordi and Data backward, but their\
    \ focus shifts abruptly when Barclay, who had been monitoring the console, collapses\
    \ unconscious. His body begins radiating the same sparkling energy seen in his\
    \ earlier visions, while his armband flashes erratically. The scene marks a critical\
    \ turning point: the plasma sample is not inert debris but a hostile, self-replicating\
    \ lifeform, and Barclay’s physiological connection to it confirms the transporter\
    \ anomaly is not a malfunction but an *infection*—one that may already be spreading\
    \ through the Enterprise’s systems and crew. The event escalates the stakes from\
    \ technical failure to existential threat, demanding immediate action to contain\
    \ the energy before it infects more organic systems or triggers another catastrophic\
    \ event.\n  "
