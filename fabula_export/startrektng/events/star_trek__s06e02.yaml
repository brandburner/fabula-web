  - 'RIKER: Does this ionization pose a threat to Mister Barclay?'
  - 'BARCLAY: Sir... Commander La Forge and I were planning to recreate the circumstances
    of the explosion on the Yosemite... that might give us some answers. Permission
    to continue with the experiment?'
