  title: Barclay absorbs alien energy particles
  description: In Engineering, Geordi and Data prepare to analyze a plasma sample
    linked to Barclay’s transporter phobia. When the sample violently erupts into
    sentient energy particles, Barclay—who had been monitoring the containment field—collapses
    unconscious, his body pulsing with the same alien energy. His armband flashes
    erratically, suggesting a direct, possibly symbiotic connection between the particles
    and his physiology. The discovery confirms the transporter anomaly is not a malfunction
    but a hostile, quasi-energy lifeform capable of infecting organic systems. The
    event escalates the stakes, revealing Barclay as both a victim and a key to understanding
    the threat, while forcing the crew to confront the possibility of a biological
    invasion through the transporter network. The moment serves as a turning point,
    shifting the narrative from investigation to crisis management as the crew realizes
    the lifeform’s potential to spread beyond Barclay’s body.
