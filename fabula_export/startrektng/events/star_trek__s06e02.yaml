    what_happened: "\n      Picard stands at the center of the bridge, commanding\
      \ the crew with measured authority. He records the Captain's Log to document\
      \ the discovery of the Yosemite, his voice steady but laced with concern. He\
      \ directs the crew to hail the vessel, assess life signs, and explore rescue\
