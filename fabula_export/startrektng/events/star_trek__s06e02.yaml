  title: Barclay’s Ionization Confirmed and Experiment Approved
  description: In Sickbay, Beverly Crusher confirms Barclay’s terrifying transporter
    visions were real by detecting residual ionization in his left arm—matching the
    patterns found in Lieutenant Kelly’s body and the Yosemite sample. This validation
    transforms Barclay’s fear into a critical diagnostic tool, giving him the credibility
    to propose recreating the Yosemite explosion to study the ionization threat. Riker
    approves the experiment but orders all primary transporters offline as a precaution,
    escalating the tension between scientific urgency and the crew’s vulnerability
    to the unseen lifeform. Beverly equips Barclay with a monitoring armband to track
    ionization buildup, marking a shift from psychological distress to active investigation.
    The scene bridges Barclay’s personal trauma with the crew’s broader mission, foreshadowing
    the transporter’s hidden danger while reinforcing the stakes of discovery.
