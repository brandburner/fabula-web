      \ with ionic interference readings. Data and Worf interact with these consoles\
      \ to assess the situation, but the information they provide is consistently\
      \ negative: no life signs, no tractor beam lock, and no response to hails. The\
      \ consoles serve as a tangible representation of the crew’s frustration, their\
      \ inability to penetrate the plasma streamer’s secrets, and the urgent need\
      \ for alternative solutions. They are both a tool and a limitation, highlighting\
      \ the tension between what the crew *wants* to know and what the technology\
      \ *allows* them to discover.\n      "
    status_before_event: "\n        The consoles are fully operational but overwhelmed\
      \ by the plasma streamer’s interference, displaying only fragmented or unusable\
      \ data. They reflect the crew’s growing sense of helplessness as standard tools\
      \ fail.\n      "
    status_after_event: "\n        The consoles remain in the same state of dysfunction,\
