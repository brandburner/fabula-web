- fabula_uuid: act_5f33d19621613274
  number: 3
  summary: Alone in his quarters, Barclay, increasingly agitated and paranoid, researches
    'Transporter Psychosis' via the ship's computer. The computer details the disorder's
    causes—neuro-chemical breakdown during transport—and its symptoms, including paranoid
    delusions, multi-infarct dementia, and various hallucinations (somatic, tactile,
    visual), accompanied by psychogenic hysteria. Peripheral symptoms like sleeplessness,
    accelerated heart rate, diminished eyesight, painful spasms, and dehydration are
    also listed. As the computer recites each symptom, Barclay compulsively checks
    himself, convinced he is experiencing them all, particularly the visual and tactile
    hallucinations. His alarm intensifies when the computer states there is no known
    treatment. Meanwhile, in the Observation Lounge, Dr. Crusher reports to Picard
    and senior staff that Kelly's autopsy revealed residual ionization in all his
    systems, suggesting exposure to ionized gas or high-energy plasma. Geordi hypothesizes
    that if the sample container fragments also show similar ionization, the Yosemite
    crew might have tried to beam aboard plasma from the streamer, leading to an explosion.
    Back in Engineering, as Geordi and Data prepare to recreate the experiment, they
    observe Barclay's increasing erratic behavior, including repeatedly checking his
    eyesight and drinking excessive amounts of water, confirming Data's earlier observations
    of his physiological preoccupation. Geordi, concerned, sends Barclay to rest.
    Counselor Troi intercepts Barclay in a corridor, confronting him about his unresponsiveness
    and agitated state. Barclay, denying his vision and his distress, attempts to
    deflect her concerns. Recognizing his deteriorating mental state and potential
    danger to himself and others, Troi temporarily relieves him of duty. Later, in
    his quarters, Barclay desperately tries various relaxation techniques, but his
    left arm again radiates with sparkling light, this time spreading to his shoulder
    and neck. This physical manifestation, rather than deepening his despair, ignites
    a fierce, grim determination within him to understand and confront whatever is
    happening. He immediately contacts Chief O'Brien, seeking his help.
