      seeking answers), Starfleet is both a **guiding force** and a **constraint**
      in this event.
    power_dynamics: Starfleet’s power lies in its **structured approach to crisis
      management**, but it is **challenged by the plasma’s unpredictability**. The
      crew’s authority is derived from their **training and rank**, while the plasma’s
      power stems from its **biological aggression and sentience**, which Starfleet’s
      protocols were not designed to handle.
