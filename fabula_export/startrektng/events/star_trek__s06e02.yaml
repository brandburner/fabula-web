  title: Enterprise discovers stranded Yosemite
  description: "\n  The *Enterprise* detects the missing *USS Yosemite* trapped within\
    \ a volatile plasma streamer, triggering an immediate crisis response. Picard’s\
    \ Captain’s Log establishes the stakes—an uncontactable science vessel presumed\
    \ lost—while the bridge crew’s tense exchanges reveal the mission’s urgency. Riker’s\
    \ speculation that the *Yosemite* strayed too close to the phenomenon foreshadows\
    \ the crew’s later discovery of the transporter entity, but the immediate obstacle\
    \ is the plasma streamer’s distortion field, which blocks scanners and tractor\
    \ beams. Picard’s refusal to risk a shuttle and his order to attempt a transporter\
    \ beam onto the *Yosemite* sets the stage for Barclay’s later discovery of the\
    \ quasi-energy lifeform. The scene balances procedural urgency with thematic tension:\
    \ the crew’s technical limitations mirror the broader narrative’s central conflict\
    \ between human ingenuity and an unseen, malevolent force.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e02
  scene_sequence: 1
  sequence_in_scene: 1
  key_dialogue: &id001
  - 'PICARD: Magnify.'
  - 'RIKER: The last report we have says they were observing the streamer at medium
    range. Maybe they went in for a closer look... got more than they bargained for.'
  - 'PICARD: Hail them.'
  - 'WORF: No response.'
  - 'PICARD: Life signs?'
  - 'DATA: Our scanners cannot penetrate the plasma streamer''s distortion field.'
  - 'PICARD: Can we tractor the vessel out?'
  - 'DATA: No, sir—the ionic interference is too heavy.'
  - 'RIKER: I''ll take a shuttle.'
  - 'PICARD: Too risky—you could be pulled in, too. (to Com) Bridge to Engineering—Geordi,
    can we beam an Away Team onto the science ship?'
  is_flashback: false
