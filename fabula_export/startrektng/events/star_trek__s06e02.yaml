  title: Microbes in Barclay’s Body
  description: In Sickbay, Barclay learns that the quasi-energy microbes infesting
    the transporter system are also inside his body, directly linking his terrifying
    visions to Lieutenant Kelly’s death. Beverly confirms the microbes caused Kelly’s
    contractions during autopsy, revealing a dangerous biological connection between
    the transporter’s malfunction and the crew’s well-being. Geordi and Data propose
    a risky mid-transport suspension to filter the microbes from Barclay’s system,
    forcing him to confront his deepest fear—permanent pattern degradation. The tension
    escalates as Barclay grapples with the choice between his survival and the mission’s
    success, exposing the fragility of his psychological state and the high stakes
    of the rescue operation.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e02
  scene_sequence: 22
  sequence_in_scene: 36
  key_dialogue:
  - 'BARCLAY: Life forms?'
  - 'DATA: That is correct. They appear to be quasi-energy microbes that exist within
    the distortion field of the plasma streamer -- which made them undetectable to
    our sensors.'
  - 'BEVERLY: Some of these microbes are also in your body, Reg.'
  - 'BARCLAY: Inside me?'
  - 'BEVERLY: Yes... But now that we''ve identified the microbes, we can start trying
    to eliminate them.'
  - 'BARCLAY: But... isn''t there a way to... to... to force these things out of me?'
  - 'GEORDI: We''d have to hold you in there for a while... Thirty or forty seconds...
    it''s hard to tell. But I think it would be safe...'
  - 'DATA: Your pattern would degrade to the point where your signal would be permanently
    lost.'
