  title: Troi relieves Barclay of duty
  description: Counselor Troi intercepts Lieutenant Barclay in a corridor as he walks
    in a dissociative state, visibly agitated and evasive. She presses him about his
    erratic behavior—particularly his earlier claim of seeing something in the transporter
    beam—which he dismisses as imagination. When Barclay insists he is fine, Troi,
    recognizing the severity of his mental state, overrides his protests and temporarily
    relieves him of duty. Barclay, though visibly shaken, complies but leaves abruptly,
    leaving Troi concerned. This moment escalates the narrative tension by forcing
    Barclay’s psychological crisis into the open, validating his earlier visions as
    a legitimate threat, and setting up his eventual confrontation with the transporter’s
    hidden danger. The scene also underscores Troi’s role as the crew’s emotional
    safeguard, ensuring no one’s instability goes unchecked—even if it means making
    unpopular decisions.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e02
  scene_sequence: 16
  sequence_in_scene: 25
  key_dialogue:
  - |-
    TROI: Lieutenant Barclay, I've been calling you, why haven't you responded?
    BARCLAY: Walking.
    TROI: I can see that. Where are you going?
    BARCLAY: Nowhere. I just don't get to these decks very often.
  - |-
    TROI: Commander La Forge said you seemed very nervous this morning. He also mentioned that you said you saw something in the Transporter beam.
    BARCLAY: I was wrong. They checked the Transporter and there wasn't... there was nothing there. I imagined the whole thing.
    TROI: You don't sound very convinced of that...
  - |-
    TROI: Mister Barclay, you are exhausted and highly agitated. And I cannot allow a member of this crew to endanger himself and others. I think...
    BARCLAY: I'm not endangering anyone and I wish you would...
    TROI: I think it's in your best interest to take a leave of absence. Reg—I'm temporarily relieving you of duty.
