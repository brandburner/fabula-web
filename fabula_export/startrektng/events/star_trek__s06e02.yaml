  title: Barclay’s transporter breakdown
  description: "\n  In the Transporter Room, Commander Riker authorizes the away team’s\
    \ transport to the USS Yosemite despite Lieutenant Barclay’s escalating distress.\
    \ O’Brien warns of ‘bandwidth limitations’ and ‘static charge accumulation,’ triggering\
    \ Barclay’s repressed transporter phobia. As Riker, Worf, and Beverly dematerialize\
    \ without incident, Barclay’s anxiety peaks—his breathing quickens, sweat breaks\
    \ out, and he visibly struggles to maintain composure. When Geordi signals his\
    \ turn, Barclay freezes, then abruptly declares, ‘I’m sorry—I can’t do this,’\
    \ before fleeing the room. The scene underscores the tension between duty and\
    \ psychological fragility, leaving Barclay’s unresolved terror—and the unseen\
    \ threat in the transporter beam—unaddressed. Riker’s decision to proceed without\
    \ addressing Barclay’s warning foreshadows the lifeform’s later revelation as\
    \ a direct consequence of this oversight.\n  "
