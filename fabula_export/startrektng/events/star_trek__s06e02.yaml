  object_involvements:
  - object_uuid: ger_object_ecdc75624011
    description_of_involvement: The USS Enterprise transporter console is central
      to the crisis, displaying bandwidth limitations, static charge accumulation,
      and ionic fluctuations as O’Brien and Geordi work to stabilize the mass anomaly.
      O’Brien detects the 92% increase in mass during Barclay’s transport and sets
      up a force field around the chamber, later deactivating it on Beverly’s orders.
      The console’s alarms blare as the team struggles to rescue the trapped crew,
      and Geordi uses it to beam out Worf and security. Its readouts flicker as the
      lifeform’s interference is confirmed, and the console’s strain under emergency
      conditions highlights the severity of the anomaly.
    status_before_event: Operational but displaying warnings of bandwidth limitations,
      static charge, and ionic fluctuations due to the transporter beam anomaly.
    status_after_event: Stabilized temporarily after the rescue, though the console’s
      readouts still reflect the ongoing interference from the lifeform in the transporter
      beam.
