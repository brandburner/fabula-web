    by an attendant and guard, his unease growing as he observes the institutionalized
    brutality around him—locked cell doors, distant screams, and the hollow stares
    of other inmates. His attention snaps to an approaching doctor who is a near-identical
    replica of the alien lieutenant he encountered earlier in his mission, a detail
    that jolts him with paranoia. The doctor’s indifference as he passes without acknowledgment
    deepens Riker’s disorientation, forcing him to question whether this is another
    layer of the asylum’s psychological manipulation or a fragment of his own fractured
    memory. The moment underscores the blurring line between his undercover mission
    and the fabricated reality of confinement, escalating his internal conflict: is
    the asylum a constructed illusion, or is his mind unraveling under the strain
    of neuro-somatic torture?'
