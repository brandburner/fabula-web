      The fading light and the solitude of the space create a mood of quiet determination,
      as Riker’s actions become a metaphor for his internal battle. The air is thick
      with the unspoken trauma of his mission, and the act of destruction feels both
      cathartic and symbolic.
    functional_role: A symbolic battleground where Riker confronts and dismantles
      the illusion of the asylum, reclaiming control over his fractured psyche. It
      serves as a space for introspection and catharsis, where physical action mirrors
      psychological recovery.
