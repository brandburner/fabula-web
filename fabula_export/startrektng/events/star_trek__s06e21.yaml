      the sweat-dampened sheets a physical manifestation of his internal turmoil.
      As Riker bolts upright, the bed’s metal frame and thin padding serve as a grounding
      (if uncomfortable) reminder of his *actual* location, though his grip on the
      sheets suggests he is still anchored to the nightmare’s illusion. The bed’s
      presence reinforces the duality of his experience: his body is safe, but his
      mind is not.'
    status_before_event: Neatly made, with Riker lying atop the sheets, his body relaxed
