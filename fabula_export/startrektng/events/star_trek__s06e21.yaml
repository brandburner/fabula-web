  title: Riker’s feigned injury reveals deeper anxiety
  description: In Sickbay, Riker attempts to manipulate Beverly into excusing him
    from the upcoming play by faking a head injury, but his ruse is exposed when scans
    show no physical damage. His lingering discomfort—dismissed as stage fright—hints
    at his subconscious resistance to the mission’s demands. The moment is interrupted
    by Geordi’s arrival with a severely burned crewmember, whose unsettling, fixed
    stare at Riker amplifies his unease, foreshadowing the psychological unraveling
    to come. The scene underscores Riker’s fragile mental state and the blurred line
    between his undercover role and his fractured psyche, while also establishing
    Beverly’s role as both confidant and unwitting participant in his deception.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e21
