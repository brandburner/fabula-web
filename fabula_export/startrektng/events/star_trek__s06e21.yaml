      he is still trapped in the asylum. The quarters’ familiar lighting and hum of
      the starship contrast sharply with the asylum’s oppressive atmosphere, but the
      locking sound of the door shatters the illusion. This location is a fleeting
      reminder of Riker’s Starfleet identity, but it ultimately becomes another layer
      of the asylum’s psychological torment, reinforcing the blurring of realities.
      The quarters’ role is bittersweet: a symbol of what Riker is fighting to reclaim,
      even as it slips further from his grasp.'
