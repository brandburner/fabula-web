  title: Worf and Data execute extraction plan
  description: "\n  In the dimly lit common area of the Tilonian asylum, Worf and\
    \ Data move with tactical precision to execute the extraction plan. Riker, still\
    \ disoriented from his fractured mental state, struggles as Worf activates the\
    \ Pattern Enhancer Devices, forming a triangular beaming zone. Worf confirms the\
    \ setup via communicator with the *Enterprise*, signaling the crew’s readiness\
    \ to extract three individuals—Riker, Data, and himself. The moment marks a critical\
    \ intersection of tactical execution and Riker’s psychological fragility, as his\
    \ resistance underscores the urgency of the rescue. The abrupt dematerialization\
    \ of the trio cuts off Riker’s connection to the asylum’s manipulative environment,\
    \ transitioning him into an uncertain but potentially liberating phase of the\
    \ mission.\n  "
