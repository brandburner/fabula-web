      the fluorescent buzz of the lights, and the murmured voices of inmates create
      an atmosphere of institutional decay—a place where reality is malleable and
      sanity is a luxury. For Riker, this space is a prison of the mind, but for Worf
      and Data, it is a battleground where they must act swiftly to reclaim him. The
      location’s role is dual: it is the final bastion of the asylum’s influence,
      and it is the threshold through which Riker is forcibly pulled back into the
      crew’s world.'
