  title: Worf’s lethal briefing wounds Riker
  description: In the Observation Lounge, Worf prepares Riker for his undercover mission
    to Tilonus Four, outfitting him with a Tilonian pendant (a disguised communicator)
    and demonstrating the ritualistic Nisroh knife—a weapon central to the mission’s
    bartering ceremony. Worf’s uncharacteristically aggressive demeanor and the knife’s
    accidental gash to Riker’s head reveal the mission’s high stakes and the fragility
    of Riker’s mental state. The injury, though minor, foreshadows the physical and
    psychological dangers ahead, while Worf’s uncharacteristic intensity underscores
    the mission’s urgency. Riker’s attempt to deflect tension with humor fails, exposing
    his underlying unease as he prepares to confront an illusion that may unravel
    his sanity. The scene pivots from tactical briefing to a moment of raw vulnerability,
    where the mission’s risks become visceral and personal.
