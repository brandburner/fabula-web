  title: Riker escapes Tilonian lab
  description: Riker regains consciousness strapped to an examination table in a repurposed
    asylum cell, now revealed as a Tilonian lab. A neurochemical probe is attached
    to his head, confirming the reality of his captivity and the Tilonians' psychological
    manipulation. When the Administrator attempts to sedate him, Riker violently resists—kicking
    an assistant unconscious and ripping the probe free, exposing a bleeding wound.
    He seizes a nisroh knife and threatens the Administrator, forcing compliance.
    In a moment of desperate clarity, he activates his pendant to signal the *Enterprise*,
    confirming Worf’s readiness to extract him. The scene ends with his successful
    transport, leaving the Administrator frustrated and Picard’s log entry later revealing
    the mission’s physical and psychological cost to Riker. This moment marks the
    physical escape from Tilonian captivity but underscores the lingering trauma of
    his fractured psyche, setting up his recovery arc and the broader implications
    of the Tilonians’ neuro-somatic extraction techniques.
