- fabula_uuid: cand_evt_scene_73cf68458b691f55_02
  global_id: null
  title: Riker reconstructs his fractured mind
  description: In the ready room, Riker—now physically recovered but psychologically
    unmoored—pieces together his fragmented memories of the Tilonus mission under
    Picard and Troi’s guidance. His disjointed recollections (the alley ambush, the
    nisroh knife, the shifting hospital/Enterprise hallucinations) reveal the Tilonians’
    neuro-somatic interrogation as a psychological assault that blurred reality and
    fantasy. Troi’s diagnosis—that his mind constructed a defensive illusion using
    recent, tangible experiences (the play, mission prep)—validates his disorientation
    while exposing the depth of his trauma. Picard’s clinical debriefing contrasts
    with Riker’s visceral distress, underscoring the mission’s lingering threat and
    Riker’s unresolved fight to reclaim agency over his own psyche. The scene pivots
    from revelation to action when Riker, despite exhaustion, insists on addressing
    an unspecified but urgent priority, foreshadowing his refusal to remain passive
    in the face of the Tilonians’ ongoing threat.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e21
  scene_sequence: 27
  sequence_in_scene: 53
  key_dialogue: &id023
  - |-
    PICARD: Evidently, you were abducted two days after beaming to the surface.
    RIKER: I remember it now... I was in an alley... they attacked me from behind. I tried to defend myself with the nisroh knife Worf gave me...
  - |-
    TROI: Your mind must have created a defense mechanism, a fantasy that helped you resist the neuro-somatic process. Your unconscious fastened onto elements from your real life in an attempt to keep you grounded... to keep you sane.
    RIKER: The preparation for the mission... the play... they were all recent experiences, fresh in my mind...
  - |-
    PICARD: Get some rest, Number One. We can talk more in the morning.
    RIKER: Alright... but there's one thing I'd like to do first...
