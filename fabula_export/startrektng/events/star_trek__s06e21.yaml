  title: Riker hears Syrus through Troi
  description: After a brief, reassuring exchange with Troi—where she downplays his
    earlier outburst as stress-related—Riker encounters Data, who praises his 'realistic'
    portrayal of dementia in the play. The compliment, though well-intentioned, deepens
    Riker’s unease, as it forces him to confront whether his performance was an act
    or a symptom of his unraveling mind. As Troi suggests relaxation techniques, her
    voice abruptly shifts into that of Doctor Syrus, a psychological trigger that
    shatters Riker’s fragile grip on reality. The hallucination—whether a manifestation
    of his paranoia or a Tilonian manipulation—escalates his existential crisis, blurring
    the line between his undercover mission and the asylum’s illusory control. Troi’s
    confusion at his reaction underscores the isolation of his experience, leaving
    him unsettled and questioning whether he can trust his own perception. The moment
    marks a critical turning point, where the narrative’s central tension—*Is he losing
    his mind, or is the asylum weaponizing his perception?*—becomes inescapable.
