- fabula_uuid: cand_evt_scene_28236fddd82b8f3e_01
  global_id: null
  title: Riker confronts his fractured reflection
  description: "\n  In his quarters, Riker—disguised as an asylum inmate for the play—stands\
    \ before the mirror, applying makeup to complete his transformation. Beverly,\
    \ present to support him, listens as he recounts a vivid 'dream' of being trapped\
    \ in Ward Forty-seven, where his delusions of murder and confinement felt terrifyingly\
    \ real. The exchange reveals Riker’s growing psychological instability, as he\
    \ struggles to distinguish between his undercover mission and the hallucinatory\
    \ asylum. Beverly’s attempt to ground him with humor and shared memories of their\
    \ theatrical collaboration fails to fully reassure him. When she leaves, Riker\
    \ stares at his reflection—the inmate’s face staring back—and experiences a moment\
    \ of disorientation, where the line between performance and reality blurs. This\
    \ scene underscores his unraveling sanity, as the mission’s psychological toll\
    \ begins to erode his grip on what is real. The moment foreshadows his deeper\
    \ descent into the asylum’s fabricated reality, where his identity as a Starfleet\
    \ officer will be systematically dismantled.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e21
  scene_sequence: 12
  sequence_in_scene: 25
  key_dialogue:
  - 'RIKER: I was there... in Ward Forty-seven, just like in the play. Everyone thought
    I was insane... that I''d killed somebody... Except it was all real.'
  - 'BEVERLY: Deanna mentioned you went to bed early because you felt a little anxious
    about the play. But I had no idea...'
  - 'RIKER: It was a smash. We got a standing ovation.'
  - 'RIKER: I feel... like an actor.'
