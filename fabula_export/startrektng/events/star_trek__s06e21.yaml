- fabula_uuid: cand_evt_scene_73cf68458b691f55_03
  global_id: null
  title: Riker confronts fractured memories
  description: 'In the ready room, Riker—now physically recovered but psychologically
    unmoored—sits with Picard and Troi as they piece together his abduction on Tilonus
    IV. His fragmented recollections reveal the Tilonians'' neuro-somatic extraction
    attempt, which forced his mind to construct a protective illusion: a fabricated
    asylum reality blending elements of his recent mission prep (the play, Beverly''s
    care) with his deepest fears. Troi''s explanation of this defense mechanism validates
    Riker''s disorientation while underscoring the mission''s psychological toll.
    When Picard orders him to rest, Riker''s immediate insistence on ''one thing''
    he must do first hints at his unresolved trauma and the scene''s unresolved tension—his
    mind may be healing, but his psyche remains in flux, foreshadowing his later destructive
    outburst against the asylum set. The exchange exposes the mission''s lingering
    threat: even rescued, Riker''s sanity is still a battleground between truth and
    illusion.'
