    power_dynamics: "\n        *Exerting control over Riker’s psyche*, even in the\
      \ rehearsal. The Tilonians’ influence is *proactive*, as their tactics are being\
      \ anticipated and countered by Starfleet’s preparation.\n      "
    organizational_goals:
