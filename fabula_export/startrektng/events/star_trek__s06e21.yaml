      memories of the *Enterprise*. He physically tests the environment—scanning the
      door, pressing against the walls—while verbally challenging Doctor Syrus's assertions.
      His emotional state oscillates between confusion, defiance, and reluctant acceptance
      as the Doctor systematically dismantles his grip on reality. Riker's physical
      presence is tense and restless, his movements erratic as he struggles to reconcile
      his fractured identity. The moment he questions the need for a guard escort—'There's
      no need for this'—reveals a flicker of his former assertiveness, though it is
