  title: Mavek weaponizes Riker’s doubt
  description: After Commander Bloom’s delusional breakdown shatters Riker’s fragile
    hope of shared reality, Mavek—an asylum attendant—exploits his vulnerability by
    fabricating a grotesque murder accusation. He taunts Riker with visceral, fabricated
    details (blood on his hands, a nine-stabbed victim) to provoke a violent outburst,
    revealing his role as a psychological manipulator. The scene escalates from mockery
    to menace, forcing Riker to confront whether his sanity is unraveling or if Mavek
    is orchestrating his descent. The injection at the climax underscores the asylum’s
    oppressive control, leaving Riker physically and psychologically compromised.
    This moment tests his grip on reality, deepening the story’s central tension between
    mission truth and fabricated illusion.
