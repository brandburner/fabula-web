  - character_uuid: ger_agent_f1a913dda0ad
    emotional_state: "\n        Initially *tense and anxious*, masking desperation\
      \ with forced compliance. As the rehearsal progresses, his emotional state shifts\
      \ to *frustrated and defensive*, culminating in a *desperate, unfiltered outburst*\
      \ that reveals his underlying fear of losing control. By the end, he is *emotionally\
      \ broken and exposed*, his vulnerability laid bare.\n      "
    goals:
    - Maintain the rehearsal’s illusion to prepare for the undercover mission
    - Avoid revealing his true psychological state to Data and Beverly
    what_happened: "\n        Riker begins the rehearsal seated on the bed in the\
      \ staged asylum cell, dressed in hospital attire, his posture rigid and his\
      \ expressions carefully controlled. He delivers his lines with forced compliance,\
      \ parroting the doctor’s narrative of guilt and rehabilitation, but his underlying\
      \ tension is palpable—his fingers twitch, his voice wavers, and his nervous\
      \ smile betrays his discomfort. As Data’s interrogation intensifies, Riker’s\
      \ composure unravels: he stands abruptly, his movements becoming erratic and\
      \ caged, like an animal trapped. His outburst is raw and unscripted, abandoning\
      \ the role entirely to vent his frustration at the rehearsal’s psychological\
      \ toll. When Beverly calls the break, Riker is visibly shaken, his emotional\
      \ state exposed, and his confidence in the mission visibly fractured.\n    \
      \  "
