      Riker’s face and the inmate’s hollow gaze.
    - The hum of the *Enterprise*’s systems, now felt as a distant, almost alien presence,
      underscoring Riker’s isolation.
    - The sink’s edge, where Riker’s fingers grip tightly as he steadies himself against
      the disorientation.
