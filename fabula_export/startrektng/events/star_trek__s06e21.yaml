  global_id: null
  title: Riker confronts his fractured reflection
  description: In the solitude of his quarters, Riker prepares for the play’s performance
    while still wearing his inmate costume. As Beverly departs, he studies his reflection
    in the mirror—only to see the asylum inmate staring back at him, a hallucinatory
    echo of his dream. The moment unsettles him, forcing a brief hesitation before
    he shakes it off. This visual distortion underscores the psychological erosion
    of his undercover mission, blurring the line between his role as an actor and
    his unraveling grip on reality. The scene serves as a turning point, revealing
    how deeply the asylum’s influence has seeped into his waking mind, threatening
    to unmoor him entirely from Starfleet’s mission and his own identity.
