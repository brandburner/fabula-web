  - object_uuid: ger_object_f31a62922b10
    description_of_involvement: The **Asylum Cell Door** is a critical barrier in
      this event, symbolizing Riker’s trapped state and the asylum’s control over
      him. Initially, it is locked by Data (disguised as Doctor Syrus) in the staged
      theater rehearsal, sealing Riker in his cell. Later, when Riker flees to his
      quarters aboard the *Enterprise* and realizes he is still in the asylum, the
      door’s locking sound triggers his panic. He beats his fists against it, screaming
      for release, but it remains unyielding—a physical manifestation of his psychological
      imprisonment. The door’s resistance underscores the futility of his struggle
      and the asylum’s dominance over his reality.
    status_before_event: Locked, sealing Riker in the asylum cell (either as part
