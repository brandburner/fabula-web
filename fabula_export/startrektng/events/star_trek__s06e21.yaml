  title: Riker’s Forced Extraction from Asylum Cell
  description: In the suffocating darkness of his asylum cell, Riker—already psychologically
    fractured—is jolted awake by the sound of someone forcing the door open. His paranoia
    spikes as Data and Worf, dressed in dark clothing and armed, enter the room. Riker,
    disoriented and convinced he’s trapped in the asylum’s illusion, immediately rejects
    their presence, backing against the wall in terror. Worf attempts to reason with
    him, but Riker’s resistance escalates when Data physically restrains him, covering
    his mouth to silence his protests. The scene underscores Riker’s deep dissociation
    from reality, as his allies’ rescue mission is perceived as another layer of the
    asylum’s manipulation. His violent struggle against Data and Worf—his most trusted
    crewmates—reveals the extent of his psychological unraveling, blurring the line
    between mission and delusion while testing the limits of his allies’ loyalty and
    the fragility of his grip on sanity.
