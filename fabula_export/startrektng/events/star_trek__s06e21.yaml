    what_happened: "\n        Data, disguised as Doctor Syrus with a distinctive accent,\
      \ stands offstage (initially) and later onstage, methodically interrogating\
      \ Riker with clinical precision. His line delivery is calm and probing, designed\
      \ to dismantle Riker’s responses and expose inconsistencies. He plays the role\
      \ with detached authority, using psychological tactics to push Riker toward\
      \ an emotional breaking point. When Riker’s outburst occurs, Data breaks character\
      \ briefly to acknowledge the rehearsal’s conclusion, offering analytical insights\
      \ to help Riker improve. His demeanor remains composed throughout, but his goal\
      \ is to prepare Riker for the real psychological challenges ahead.\n      "
