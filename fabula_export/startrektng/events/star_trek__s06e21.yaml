  description: "\n  In a moment of psychological vulnerability, Commander Riker’s\
    \ grip on reality fractures as the turbolift doors reveal the asylum corridor—a\
    \ hallucinatory flashback to his fabricated imprisonment. His immediate reaction\
    \ is visceral: he recoils, closes his eyes, and mutters a desperate mantra ('It's\
    \ not real... not real...') to anchor himself in the present. The hallucination\
    \ forces him to confront the blurred boundary between his undercover mission and\
    \ the Tilonians’ psychological manipulation, marking a critical turning point\
    \ in his battle against mental erosion. When he reopens his eyes, the turbolift\
    \ has reverted to the *Enterprise*, but the episode underscores the fragility\
    \ of his sanity and the mission’s escalating stakes. The scene functions as both\
    \ a psychological trigger and a narrative pivot, revealing how deeply the Tilonians\
    \ have infiltrated his mind.\n  "
