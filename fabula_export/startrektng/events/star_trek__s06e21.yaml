  title: Riker smashes the illusion
  description: Riker, standing on the stage of the asylum theater, confronts the Administrator—now
    revealed as the sole constant between his fractured realities. The audience, filled
    with familiar faces from both the Enterprise and the asylum (Picard, Data, Worf,
    Beverly, Troi, Doctor Syrus, Mavik), watches intently as Riker pieces together
    the deception. When the Administrator’s wound reopens—a physical manifestation
    of the illusion’s instability—Riker’s defiance erupts. Spurred by the audience’s
    applause, he shatters the back wall of the stage set with a violent punch, symbolically
    and literally dismantling the staged reality that has trapped him. The collapse
    of the illusion forces a confrontation between his fractured psyche and the mission’s
    true stakes, marking a turning point in his struggle to reclaim his sanity and
    identity. The act is both a physical and psychological rebellion, driven by the
    realization that the applause is complicit in his torment.
