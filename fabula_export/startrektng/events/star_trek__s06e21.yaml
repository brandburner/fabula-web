  scene_sequence: 4
  sequence_in_scene: 8
  key_dialogue:
  - 'WORF: This is the last known location of the research team. They had occupied
    a small building in the Southwest quarter of the city. You will begin your search
    there.'
  - 'RIKER: The Southwest quarter covers over two hundred square kilometers. That''s
    a lot of ground for one man to cover... I''d better pack an extra pair of boots.'
  - 'WORF: I suggest you pay closer attention, Commander. Your life will be at stake.'
  - 'RIKER: Yes... of course I do...'
  - 'WORF: Because you will be posing as a Merchant, you will need to know how to
    use the Nisroh for the traditional bartering ceremony.'
  - 'RIKER: That''s okay, that''s okay... I guess I really wasn''t paying attention...
    I''d better get to Sickbay. We''ll pick this up later.'
