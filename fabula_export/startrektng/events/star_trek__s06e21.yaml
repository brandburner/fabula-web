    claiming people had come to take him back to his starship.'
  - 'RIKER: I still have the phaser... why do I still have the phaser?'
  - 'ADMINISTRATOR: It''s not a phaser. It''s a knife. You stole it from one of the
    food trays. Give it to me. We don''t want you to hurt yourself...'
  - 'RIKER: I don''t believe you -'
  - 'RIKER: If this is a knife... what happened to Mavek?'
  - 'RIKER: None of this is real -'
