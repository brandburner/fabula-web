  key_dialogue: &id025
  - |-
    PICARD: Evidently, you were abducted two days after beaming to the surface.
    RIKER: I remember it now... I was in an alley... they attacked me from behind. I tried to defend myself with the nisroh knife Worf gave me...
  - |-
    TROI: Your mind must have created a defense mechanism, a fantasy that helped you resist the neuro-somatic process. Your unconscious fastened onto elements from your real life in an attempt to keep you grounded... to keep you sane.
    RIKER: ((onto the idea)) The preparation for the mission... the play... they were all recent experiences, fresh in my mind...
  - |-
    PICARD: Get some rest, Number One. We can talk more in the morning.
    RIKER: Alright... but there's one thing I'd like to do first...
