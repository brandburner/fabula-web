  title: Riker’s Desperate Flight and Data’s Restraint
  description: In a moment of escalating psychological collapse, Riker—convinced the
    asylum is real—breaks free from Data’s grip and flees down the corridor, screaming
    for help. His fractured mind, unable to distinguish mission reality from confinement
    illusion, drives him toward the asylum guards, who appear as his only salvation.
    Worf and Data, stunned by Riker’s sudden betrayal, are momentarily outmaneuvered
    by Mavik and a guard. Data swiftly disarms the guard and neutralizes Mavik, while
    Worf incapacitates the attendant. As the confrontation resolves, Data physically
    restrains Riker, forcibly guiding him back toward the mission’s objective. The
    scene underscores Riker’s deteriorating grip on sanity, the precarious balance
    of power between him and Data, and the urgency of his internal battle. The physical
    restraint—though necessary—exposes the depth of Riker’s psychological unraveling,
    as his trust in his crew is overshadowed by the asylum’s manufactured reality.
