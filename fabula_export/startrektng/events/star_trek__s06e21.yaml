      Riker’s struggle is, at its core, a battle to reclaim his Starfleet identity—a
      fight against the asylum’s attempts to rewrite his past and loyalty. The organization’s
      values (discipline, exploration, moral integrity) are what Riker is fighting
      to preserve, even as the asylum seeks to strip them away. His choice of Reflection
      Therapy is an act of defiance, a refusal to let the asylum dictate his sense
      of self. Starfleet’s absence in this scene underscores the isolation of Riker’s
      fight, but it also serves as a reminder of what he is fighting for: his place
      in the fleet and his duty to his crew.'
