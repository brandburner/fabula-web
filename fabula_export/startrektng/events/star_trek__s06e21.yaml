      \ tactics, and the rehearsal’s intensity mirrors the torment Riker will face\
      \ in their asylum. The Tilonians’ methods—gaslighting, fabricated evidence,\
      \ and institutional control—are on full display, making this rehearsal a *preemptive\
      \ psychological battle* against their manipulation.\n      "
    active_representation: Via the methods Data replicates (Doctor Syrus’s interrogation
