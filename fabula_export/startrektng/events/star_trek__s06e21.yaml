  key_dialogue: &id021
  - 'PICARD: Evidently, you were abducted two days after beaming to the surface.'
  - 'RIKER: I remember it now... I was in an alley... they attacked me from behind.
    I tried to defend myself with the nisroh knife Worf gave me... I managed to fight
    off one of them... but I think they injected me with some kind of drug...'
  - 'TROI: Your mind must have created a defense mechanism, a fantasy that helped
    you resist the neuro-somatic process. Your unconscious fastened onto elements
    from your real life in an attempt to keep you grounded... to keep you sane.'
