      reality and trap its victims. It is a place of false safety, where Riker’s delusions
      feel tangible and the crew’s intervention is an act of violence against the
      illusion. The extraction itself—a sudden, abrupt dematerialization—mirrors the
      asylum’s own ability to disrupt perception, but this time, the disruption is
      an act of liberation. The location embodies the theme of reality vs. illusion,
      and the crew’s struggle to pull Riker back from the brink.
