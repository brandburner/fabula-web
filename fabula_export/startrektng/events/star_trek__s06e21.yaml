  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: 'Starfleet''s influence is palpable in this rehearsal,
      as the mission to infiltrate the Tilonian asylum is a high-stakes undercover
      operation. The staged cell set and Data''s role as Doctor Syrus reflect Starfleet''s
      preparation methods—using theater and psychological simulation to ready agents
      for dangerous assignments. Beverly''s direction and Riker''s struggle with the
      role highlight Starfleet''s emphasis on emotional authenticity in undercover
      work. The organization''s goals are twofold: to extract the stranded research
      team and to ensure Riker''s psychological resilience. The rehearsal''s intensity
      foreshadows the mission''s risks, with Riker''s outburst serving as a warning
      of the emotional toll to come.'
    active_representation: Through institutional protocols (rehearsal as mission preparation)
      and crew roles (Beverly as director, Data as psychological interrogator).
    power_dynamics: Exercising authority over Riker's training, but also operating
      under constraints—balancing mission success with agent well-being.
    organizational_goals:
    - Prepare Riker emotionally and psychologically for the undercover mission by
      simulating the Tilonian asylum's control tactics.
    - Ensure the mission's success by extracting the stranded research team while
      minimizing psychological harm to Riker.
    influence_mechanisms:
    - Using theater and role-playing to immerse Riker in the mission's psychological
      demands.
    - Leveraging Beverly's medical and psychological expertise to guide Riker's emotional
      access to the role.
    - Deploying Data's analytical skills to probe Riker's reactions and assess his
      readiness.
    institutional_impact: The rehearsal reinforces Starfleet's commitment to thorough
      mission preparation, even at the cost of psychological strain. Riker's outburst
      highlights the organization's tension between achieving objectives and protecting
      its agents.
    internal_dynamics: 'The rehearsal exposes a debate within Starfleet''s protocols:
      how far to push an agent in preparation for a mission, and whether emotional
      authenticity should be prioritized over psychological safety.'
    global_id: ger_organization_73a4b614bde7
