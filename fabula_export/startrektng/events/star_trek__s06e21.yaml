  global_id: null
  title: Riker’s paranoia deepens under alien scrutiny
  description: 'In Ten Forward, Riker confides in Troi about his growing unease—first
    triggered by a wounded crewmember’s accusatory stare in Sickbay, now compounded
    by days of feeling watched. Troi interprets his distress as an actor’s immersion
    in *Frame of Mind*, but Riker’s discomfort is visceral: the play’s themes of psychological
    torment mirror his own unraveling. Just as he begins to relax, a searing pain
    in his temple (where his Tilonian wound lies) draws his attention to the alien
    lieutenant from the teaser, who sits across the room, staring unblinkingly. When
    Riker turns to point him out, the lieutenant vanishes, leaving Riker to question
    his sanity. His resolve to investigate personnel logs the next day marks a shift
    from passive unease to active paranoia, as the line between mission and madness
    blurs further. The encounter underscores the Tilonians’ ability to infiltrate
    his reality, reinforcing the show’s central tension: Riker’s struggle to distinguish
    illusion from truth.'
