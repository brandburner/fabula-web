  title: Riker accepts Tilonus Four undercover mission
  description: In the ready room, Picard briefs Riker on a high-stakes solo mission
    to Tilonus Four, where a Federation research team is stranded amid political chaos.
    Riker expresses skepticism about the lack of local support and the dangers of
    operating in a fractured, weapon-hungry society, but ultimately accepts the assignment.
    The exchange reveals Picard’s strategic trust in Riker’s judgment and Riker’s
    willingness to prioritize duty over personal commitments—like Beverly Crusher’s
    play—even as the mission’s risks become clear. The scene subtly foreshadows Riker’s
    eventual psychological unraveling by emphasizing isolation and the absence of
    backup, while Picard’s reassurance about time for the play underscores the crew’s
    unspoken tension between mission demands and personal well-being. Worf’s impending
    cultural briefing is mentioned, setting up his later role in the mission’s preparation
    and its unintended consequences (e.g., the injury that may later blur Riker’s
    perception of reality). The moment also highlights Riker’s leadership—his immediate
    recognition of the need for a solo approach—and Picard’s reliance on his first
    officer’s adaptability, even in uncertain circumstances.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e21
  scene_sequence: 3
  sequence_in_scene: 6
  key_dialogue:
  - 'RIKER: Tilonus Four? Didn''t their government just collapse?'
  - 'PICARD: It''s in a state of total anarchy. When the Prime Minister was assassinated,
    a Federation research team was on the planet. It is believed they were forced
    to go into hiding... Your mission will be to locate and evacuate them.'
  - 'RIKER: Can''t they go to local authorities?'
  - 'PICARD: There are no local authorities. The government''s been splintered—several
    factions are vying for power. And they''re desperate for weapons or technology
    of any kind... Apparently, some factions are resorting to torture to gather information.
    A Starfleet research team would be a prime target.'
  - 'RIKER: Then I''ll have to go alone... undercover.'
  - 'PICARD: No, no... you''ll have plenty of time for that, Number One. We won''t
    be arriving at Tilonus for another five days. Besides, if you back out now, Beverly
    will come after me to play the part.'
