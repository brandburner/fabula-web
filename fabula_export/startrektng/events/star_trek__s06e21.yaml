acts:
- fabula_uuid: act_1d59f8943a8dc2d7
  number: 1
  summary: Commander Riker rehearses for a play titled 'Frame of Mind,' portraying
    an inmate in an asylum. He struggles with the role's emotional demands, feeling
    a growing unease that he attributes to the play's disturbing themes. During this
    period, he encounters a mysterious Alien Lieutenant who stares at him with unnerving
    intensity, an encounter that leaves Riker feeling watched and unsettled. Riker
    is then assigned a critical undercover mission to the anarchic world of Tilonus
    Four to locate and evacuate a stranded Federation research team. The mission requires
    him to operate alone, under dangerous conditions, further heightening his stress.
    During a briefing with Worf, an accidental injury from a Tilonian knife demonstration
    leaves Riker with a head wound, which, despite being medically healed by Beverly
    Crusher, continues to cause him phantom pain. His sense of paranoia escalates
    after a disturbing encounter with a severely injured crewmember in Sickbay and
    another sighting of the staring Alien Lieutenant. As Riker performs the play's
    climax, delivering a powerful, emotionally charged performance, the lines between
    his reality and the play's illusion begin to blur. The Alien Lieutenant appears
    in the audience, staring impassively. In a shocking transition, the theater audience
    and stage set vanish, replaced by the stark reality of an actual asylum cell,
    where an Alien Doctor greets a stunned Riker, asserting his new, terrifying reality
    as a patient.
  key_moments: []
  scene_numbers:
