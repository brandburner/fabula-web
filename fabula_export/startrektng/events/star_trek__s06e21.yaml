  key_dialogue: &id011
  - |-
    RIKER: Where am I? How did you get me off the ship?
    DOCTOR: The ship again...
  - |-
    DOCTOR: We spoke with Admiral Budrow. On Starbase...
    RIKER: ...Starbase Twenty-nine.
    DOCTOR: That's right. Now. Focus on who I am. Do you remember me?
  - |-
    RIKER: If what you're saying is true... where am I?
    DOCTOR: You're in Ward Forty-seven of the Tilonus Institute for Mental Disorders.
