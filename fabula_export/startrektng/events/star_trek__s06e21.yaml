  participations:
  - character_uuid: ger_agent_f1a913dda0ad
    emotional_state: Surface confidence masking deep anxiety; a creeping dread of
      losing his Starfleet identity to the inmate’s delusions.
    goals:
    - To maintain the facade of control over his psychological state for Beverly’s
      sake (and his own).
    - To distinguish between the undercover mission’s reality and the hallucinatory
      asylum, but failing as the lines blur.
    what_happened: Riker stands in his quarters' bathroom, dressed in the ragged inmate
      costume, meticulously applying dark makeup around his eyes with a waxy stick.
      His hands move with deliberate precision, but his voice betrays unease as he
      recounts a 'dream' of Ward Forty-seven to Beverly, describing it as terrifyingly
      real. After she leaves, he freezes before the mirror, his reflection morphing
      into the inmate’s hollow gaze, triggering a moment of disorientation where performance
      and reality collapse. His posture stiffens, fingers gripping the sink edge as
      he shakes off the vision, but the unease lingers in his tightened jaw and darting
      eyes.
    observed_status: Riker stands in his quarters' bathroom, dressed in the ragged
      inmate costume, meticulously applying dark makeup around his eyes with a waxy
      stick. His hands move with deliberate precision, but his voice betrays unease
      as he recounts a 'dream' of Ward Forty-seven to Beverly, describing it as terrifyingly
      real. After she leaves, he freezes before the mirror, his reflection morphing
      into the inmate’s hollow gaze, triggering a moment of disorientation where performance
      and reality collapse. His posture stiffens, fingers gripping the sink edge as
      he shakes off the vision, but the unease lingers in his tightened jaw and darting
      eyes.
    beliefs:
    - That his 'dream' of Ward Forty-seven is a manifestation of mission-related stress,
      not actual memory.
    - That performing the play will help him reclaim his Starfleet identity, but the
      makeup and costume are already eroding it.
    observed_traits:
    - Vulnerable yet performative
    - Self-aware of psychological unraveling
    - Defensive humor as coping mechanism
    - Physically reactive to psychological triggers
