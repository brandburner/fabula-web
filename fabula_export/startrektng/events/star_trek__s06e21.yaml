      \ psychological resilience needed to survive the Tilonian neuro-somatic draining\
      \ plot. Data and Beverly, as Starfleet officers, are actively involved in the\
      \ rehearsal, using their expertise to push Riker to his emotional limits. The\
      \ organization’s influence is subtle but pervasive, shaping the rehearsal’s\
      \ intensity and Riker’s determination to succeed.\n      "
    active_representation: Via institutional protocol (mission preparation) and collective
      action of officers (Data, Beverly, Riker)
    power_dynamics: "\n        *Exercising authority over Riker’s psychological conditioning*,\
      \ but also *operating under the constraint* of ensuring his mental well-being.\
      \ The rehearsal is a controlled environment where Starfleet’s interests (mission\
      \ success) align with Riker’s personal stakes (survival and sanity).\n      "
    organizational_goals:
    - Prepare Riker for the psychological resistance required on Tilonus IV
    - Ensure the mission’s success by equipping him with emotional authenticity in
