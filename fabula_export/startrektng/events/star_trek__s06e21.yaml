    - Extract neuro-somatic energy for Tilonian weapons technology (long-term goal)
    influence_mechanisms:
    - Through psychological gaslighting (replicated by Data)
    - Via fabricated narratives (the rehearsal’s script as a precursor to Tilonian
      lies)
    - By leveraging institutional authority (the asylum’s control over patients)
    institutional_impact: "\n        The rehearsal exposes the *ethical dilemma* of\
      \ Starfleet’s mission: to what extent should they prepare Riker for psychological\
      \ torture, and at what cost to his mental health? It also highlights the Tilonians’\
      \ *brutal efficiency* in breaking down prisoners, making this event a microcosm\
      \ of the larger conflict.\n      "
    internal_dynamics: "\n        The Tilonians operate with *unified purpose*, using\
