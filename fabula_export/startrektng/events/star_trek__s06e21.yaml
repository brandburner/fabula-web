  title: Riker’s First Asylum Confinement
  description: Riker awakens in an asylum cell, disoriented and struggling to reconcile
    his fractured memories of the *Enterprise* with the Doctor’s insistence that his
    Starfleet identity is a delusion. The Doctor systematically dismantles Riker’s
    grip on reality, citing a fabricated conversation with Admiral Budrow to reinforce
    the illusion of his isolation. When Riker questions the necessity of a guard escorting
    him to the Common Area, the Attendant’s cryptic response—*‘That’s what you said
    the last time’*—hints at a violent history Riker cannot recall, deepening his
    paranoia. The scene culminates in Riker’s reluctant compliance, underscoring the
    asylum’s psychological manipulation and the precarious balance between resistance
    and submission. The spiny lobe-fish meal, offered as a conditional privilege,
    serves as a symbolic reminder of the institution’s control over even basic needs,
    while the guard’s stun weapon subtly reinforces the threat of violence lurking
    beneath the facade of care. This moment marks the beginning of Riker’s descent
    into the asylum’s fabricated reality, where every concession to compliance erodes
    his sense of self further.
