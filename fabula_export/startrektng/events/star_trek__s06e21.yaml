  key_dialogue: &id005
  - 'RIKER: "You''re absolutely right, Doctor. In fact, right now it''s hard to imagine
    ever hurting anyone..."'
  - 'RIKER: "What I need is to get out of this cell. I''m locked up day and night...
    you control every move... tell me what to eat, what to think, what to say... And
    when I show a glimmer of independent thought, you strap me down, inject me with
    drugs and call it a ''treatment."'
  - 'BEVERLY: "Haven''t you ever felt at odds with everyone—like the whole world was
    against you?"'
