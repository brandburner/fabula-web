- fabula_uuid: cand_evt_scene_73cf68458b691f55_01
  global_id: null
  title: Riker reconstructs his abduction
  description: 'In the ready room, Riker—now physically recovered but psychologically
    unsteady—sits with Picard and Troi as the captain reveals the truth of his abduction
    on Tilonus IV. Riker’s fragmented memories begin to coalesce: he recalls the ambush
    in an alley, the nisroh knife fight, and the injection that triggered his mental
    unraveling. His confusion deepens as he describes oscillating between a hospital
    setting and the *Enterprise*, unable to distinguish reality from the Tilonians’
    neuro-somatic illusion. Troi interprets this as his mind’s defensive construction—a
    psychological shield woven from recent, tangible experiences (the play, mission
    prep) to anchor his sanity. Picard confirms the Tilonians’ neuro-somatic extraction
    attempt, grounding Riker’s trauma in external cause rather than internal collapse.
    The exchange reveals the mission’s psychological toll, the Tilonians’ tactical
    sophistication, and Riker’s resilience in resisting their manipulation. The scene
    ends with Riker’s quiet determination to process the ordeal further, signaling
    his refusal to let the experience break him.'
