- fabula_uuid: act_fd384daf57cac000
  number: 5
  summary: Worf and Data swiftly overpower Mavik and the guard, then attempt to beam
    Riker out of the asylum using Pattern Enhancer Devices. Riker struggles, still
    believing them to be part of his delusion, but dematerializes with them. He reappears
    in Sickbay on the Enterprise, where Picard and Beverly explain he was abducted
    on Tilonus Four. However, Riker's head wound, which Beverly had previously healed,
    reappears and bleeds, signaling to him that this Enterprise reality is yet another
    illusion. In a desperate act to break free, Riker attacks Worf, seizes a phaser,
    and, after a tense standoff with Picard, aims the weapon at himself, firing to
    shatter the illusion. The Enterprise Sickbay shatters like glass, returning him
    to the asylum cell. There, he still holds the phaser, which the Administrator
    (Alien Lieutenant) claims is a knife. Riker's head wound reappears, confirming
    the phaser's reality. He vaporizes Mavik, then threatens to destroy the asylum
    with the phaser, causing this reality to shatter as well. Riker then finds himself
    on the Enterprise stage set, confronting the Administrator/Lieutenant, whom he
    identifies as the 'only constant' across his shifting realities. His head wound
    reappears, confirming this, too, is a lie. Driven by a final surge of defiance,
    Riker shoves the Administrator and punches the stage wall, causing this ultimate
    illusion to shatter. He awakens in an Alien Lab, discovering he has been abducted
    by Tilonians and subjected to neuro-somatic draining via a probe connected to
    his head. Riker uses his mission training to fight off an assistant, signals the
    Enterprise with his pendant, and is finally rescued. Back on the Enterprise, Picard
    and Troi explain his mind created the elaborate fantasy as a defense mechanism
    against the Tilonian torture. Riker, now fully recovered and understanding his
    harrowing experience, returns to the theater to dismantle the stage set, symbolizing
    his final liberation from the mental prison.
