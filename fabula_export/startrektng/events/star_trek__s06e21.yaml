  title: Riker Rejects Reality in Fractured Therapy
  description: In a high-stakes psychological confrontation, Doctor Syrus subjects
    Riker to holographic 'Reflection Therapy,' forcing him to confront fragmented
    projections of his crewmates—Troi, Worf, and Picard—who materialize as echoes
    of his suppressed trauma. The projections initially appear disjointed, reliving
    a violent alleyway encounter, but abruptly shift into urgent pleas for Riker to
    reject the asylum’s illusion and return to the *Enterprise*. Riker, already destabilized
    by the therapy’s disorienting effects, dismisses their warnings as delusions,
    shouting them away. His refusal to trust them solidifies his entrapment in the
    asylum’s fabricated reality, marking a critical turning point where external validation
    of truth is erased. The Doctor, observing Riker’s breakdown, declares this a 'big
    step'—his rejection of the crew as hallucinations—while Riker, exhausted, remains
    trapped in the delusion’s grip. The scene underscores the Tilonian conspiracy’s
    success in isolating Riker’s mind, leaving him with no anchor to reality beyond
    the asylum’s lies.
