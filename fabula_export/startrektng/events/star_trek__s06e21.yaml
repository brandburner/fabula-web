- fabula_uuid: act_12ac94e6b9da8a06
  number: 3
  summary: 'Riker, now back on the Enterprise, prepares for the play, recounting his
    intense asylum ''dream'' to Beverly Crusher, who attributes it to his anxiety
    over the role. He applies makeup to look exhausted, a subtle nod to his ''dream''
    experience. However, during the play''s performance, Riker''s reality begins to
    unravel again. He experiences vivid hallucinations: Mavik, the asylum attendant,
    appears on stage, and the audience momentarily transforms into an asylum cell
    wall. These intrusions deeply unsettle Riker, disrupting his performance and blurring
    the lines between the play and his ''dream.'' He then spots the Alien Lieutenant,
    Suna, in the audience, not applauding, and confronts him, accusing Suna of being
    ''the key'' to his torment. This public outburst leads to Riker realizing he has
    assaulted a real crewmember, further disorienting him. Beverly takes Riker to
    Sickbay, where medical scans show no neurological abnormalities, leading her to
    conclude his experiences are stress-induced hallucinations. Riker feels a temporary
    sense of relief, but his fragile grip on reality is tested again when he hears
    Doctor Syrus''s voice instead of Troi''s. The turbolift doors open to reveal the
    asylum corridor, and he encounters ''Commander Bloom'' repeating her warning on
    the Enterprise. Panicked, Riker flees to his quarters, but the doors lock with
    the distinctive sound of the asylum, and he finds himself back in the asylum cell,
    screaming in despair, utterly trapped.'
  key_moments: []
