- fabula_uuid: cand_evt_scene_c05fbdcd0a4f9a56_01
  global_id: null
  title: Riker confesses paranoia to Troi
  description: In Ten Forward, Riker—visibly unsettled by the day’s events—confides
    in Troi about his growing paranoia, attributing it to the psychological toll of
    his undercover mission and the disturbing themes of *Frame of Mind*. He describes
    an eerie encounter with a wounded crewmember in Sickbay and admits to feeling
    watched, as if everyone on the ship is scrutinizing him. Troi interprets his distress
    as a natural extension of his acting role, urging him to embrace the darker emotions
    rather than suppress them. As Riker begins to accept her suggestion, he suddenly
    reacts to a sharp pain in his temple and spots the same alien lieutenant from
    earlier staring at him from across the room. The lieutenant vanishes before Troi
    can confirm his identity, leaving Riker unsettled and resolving to investigate
