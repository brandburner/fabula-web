  object_involvements:
  - object_uuid: ger_object_e33a00f8a20f
    description_of_involvement: The inmate costume—ragged, ill-fitting, and symbolic
      of Riker’s psychological unraveling—serves as both a prop for the play and a
      physical manifestation of his fracturing identity. Worn throughout the scene,
      it blurs the line between performance and delusion, its texture and weight reinforcing
      the inmate’s confinement. When Riker stares into the mirror, the costume’s disheveled
      state mirrors his internal disarray, making the reflection’s transformation
      all the more unsettling.
    status_before_event: Hanging in Riker’s quarters, freshly donned for the play’s
      performance; physically intact but symbolically charged with the weight of the
      undercover mission.
    status_after_event: Still worn by Riker as he turns away from the mirror, now
      imbued with the psychological tension of the moment; the costume’s role shifts
      from prop to a literal 'second skin' of his unraveling psyche.
    global_id: ger_object_e33a00f8a20f
  - object_uuid: ger_object_9b1688cd74cf
    description_of_involvement: The make-up stick, a waxy tool for creating the inmate’s
      exhausted appearance, becomes a narrative device for Riker’s transformation—both
      physical and psychological. As he applies the dark pigment in circles around
      his eyes, the stick’s smooth glide symbolizes the ease with which his Starfleet
      identity is being obscured. When set down, it lies on the sink like a discarded
      piece of his former self, its residue on his fingers a tactile reminder of the
      role consuming him.
    status_before_event: Unused, lying on the sink counter; a neutral prop awaiting
      activation in the performance.
    status_after_event: Lying on the sink, now smudged with dark pigment; its purpose
      fulfilled, but its symbolic weight—of transformation and loss—lingers in the
      scene.
