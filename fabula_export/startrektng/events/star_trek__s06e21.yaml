  title: Riker’s Breaking Point in Rehearsal
  description: "\n  During a staged asylum scene in the Enterprise’s theater, Riker—playing\
    \ a patient under psychological manipulation—attempts to perform his role for\
    \ Data (posing as the doctor) but fractures under the weight of his undercover\
    \ mission’s psychological toll. Initially, he adheres to the script, parroting\
    \ the doctor’s narrative of guilt and rehabilitation, but his composure unravels\
    \ when Data challenges his compliance. Riker’s outburst reveals his raw desperation:\
    \ he’s trapped between the illusion of the asylum and the reality of his mission,\
    \ with the line between performance and psychological breakdown blurring. The\
    \ scene ends with Beverly and Data breaking character, exposing the rehearsal’s\
    \ artificiality—but Riker’s emotional collapse lingers, marking a turning point\
    \ in his struggle to maintain his sanity undercover. The moment underscores the\
    \ mission’s psychological cost and foreshadows his later breakdown in the Tilonian\
    \ lab, where the distinction between role and reality will become lethal.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e21
  scene_sequence: 1
  sequence_in_scene: 1
  key_dialogue: &id001
  - 'RIKER: "You''re absolutely right, Doctor. In fact, right now it''s hard to imagine
    ever hurting anyone..."'
  - 'DOCTOR: "How do you feel about that person you used to be?"'
  - 'RIKER: "I won''t let you or anyone think that... I''m not insane."'
  - 'RIKER: "I''m locked up day and night... you control every move... tell me what
    to eat, what to think, what to say..."'
  - 'BEVERLY: "Haven''t you ever felt at odds with everyone—like the whole world was
    against you?"'
