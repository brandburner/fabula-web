  title: Riker’s Memory Erased by Asylum Logic
  description: 'In a sterile asylum cell, Riker’s grip on reality unravels as Doctor
    Syrus methodically dismantles his Starfleet identity, replacing it with a fabricated
    narrative of self-inflicted injury and delusional fantasies. The Doctor’s calm,
    clinical gaslighting—backed by fabricated "evidence" like a nonexistent Starfleet
    admiral—erodes Riker’s confidence, forcing him to question whether his memories
    of the *Enterprise* and his mission are real or hallucinations. The scene escalates
    from confusion to reluctant acceptance as Riker’s resistance crumbles, culminating
    in his passive compliance when an armed guard escorts him to the Common Area.
    The Doctor’s exit leaves Riker alone, staring at his reflection in a stainless-steel
    mirror, a visual metaphor for his fractured self-perception. This moment marks
    the asylum’s psychological victory: Riker’s internal conflict between truth and
    illusion now mirrors the external power struggle between the Tilonian captors
    and Starfleet’s undercover operative.'
