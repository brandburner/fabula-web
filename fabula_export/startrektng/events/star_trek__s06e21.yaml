- fabula_uuid: act_8ed1b7c5efea556d
  number: 4
  summary: 'Exhausted and at his breaking point, Riker fully accepts the asylum as
    his reality, convinced that his Starfleet life is the true delusion. He seeks
    help from Doctor Syrus, expressing a desire to remember his past, even if it means
    confronting a potential murder. Syrus, seizing this opportunity, presents Riker
    with a stark choice: undergo Reflection Therapy to recall past events and face
    trial, or opt for a complete Synaptic Reconstruction, which would erase his memories
    and fundamentally alter his personality. Riker, fearing the loss of self, chooses
    Reflection Therapy. During the therapy, holographic representations of his crewmates—Troi
    (fear), Worf (anger), and Picard (logic)—manifest, recounting an alley attack.
    The Alien Lieutenant, identified by Syrus as Administrator Suna, also appears.
    In a dramatic turn, the holographic crewmates suddenly speak directly to Riker,
    urging him to believe the Enterprise is real and the asylum a trick. Riker, committed
    to his asylum reality, vehemently rejects them as delusions, causing them to vanish.
    Syrus expresses satisfaction at Riker''s ''progress.'' The next day, Beverly Crusher,
    disguised as a hospital doctor, appears in the common area, attempting to convince
    Riker he is on an undercover mission and they are trying to rescue him from a
    conspiracy. Riker, however, dismisses her as another delusion. Later, Data and
    Worf, dressed in dark clothing, break into Riker''s cell, attempting a ''rescue.''
    Believing them to be part of his persistent delusions, Riker panics, calls for
    help, and runs to Mavik and the hospital guards for safety, further solidifying
    his perceived asylum reality.'
