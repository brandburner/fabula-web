      tables create a stark, oppressive atmosphere. Riker’s breakdown occurs in this
      space, where the false cheer of potted plants and activities contrasts sharply
      with the underlying tension. The common area serves as both a stage for Mavik’s
      psychological torture and a prison for Riker’s unraveling mind.
