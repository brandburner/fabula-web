    description_of_involvement: "\n        The *'Something for Breakfast' play script*\
      \ is implied but not physically present during this event, as Riker and Data\
      \ have abandoned it in favor of improvisational tension. The script’s absence\
      \ underscores the rehearsal’s shift from structured performance to raw emotional\
      \ exposure. Initially, it served as a guide for Riker’s role, but as his outburst\
      \ occurs, the script is rendered obsolete—his genuine feelings replace the written\
      \ words. The script’s discarded role mirrors Riker’s rejection of the rehearsal’s\
      \ artificiality, foreshadowing his struggle to maintain control in the real\
      \ Tilonian lab.\n      "
    status_before_event: Likely placed on a nearby surface (e.g., the bed or a prop
      table) but ignored as the rehearsal intensifies. Its pages are dog-eared from
      use.
    status_after_event: Abandoned entirely, its purpose fulfilled but its limitations
      exposed. The script’s failure to contain Riker’s emotions symbolizes the rehearsal’s
      breakdown.
    global_id: ger_object_e7afdd72d81e
  - object_uuid: ger_object_e33a00f8a20f
    description_of_involvement: "\n        Riker’s *asylum patient clothing*—a loose-fitting\
      \ hospital gown and pants—serves as a costume prop that reinforces his role\
      \ as a vulnerable patient. The attire is deliberately unflattering and restrictive,\
      \ stripping him of his usual Starfleet authority and making him physically and\
      \ psychologically exposed. As his outburst occurs, the clothing becomes a metaphor\
      \ for his stripped-down state, emphasizing his desperation to escape the rehearsal’s\
      \ illusion. The fabric clings to him as he moves erratically, mirroring the\
      \ psychological confinement he feels.\n      "
    status_before_event: Neatly worn, though slightly rumpled from Riker’s tense posture.
      The gown’s color is institutional and dull, reinforcing the role’s dehumanizing
      effect.
    status_after_event: Disheveled from Riker’s physical outburst, with the gown’s
      neckline slightly torn. The clothing now carries the emotional residue of his
      breakdown, symbolizing his fractured state.
    global_id: ger_object_e33a00f8a20f
  - object_uuid: ger_object_cb99a8fa7c77
    description_of_involvement: "\n        The *bed in the Tilonian asylum cell* serves\
      \ as a symbolic prop and practical anchor for Riker’s performance. Initially,\
      \ he sits on it with forced compliance, his posture rigid and his fingers gripping\
      \ the edge. As his outburst escalates, he stands abruptly, using the bed as\
      \ a physical barrier between himself and the 'doctor' (Data). The bed’s sparse\
      \ padding and metal frame reinforce the cell’s oppressive atmosphere, mirroring\
      \ the confinement Riker will face on Tilonus IV. Its presence grounds the rehearsal\
      \ in the illusion of the asylum, making Riker’s emotional breakdown feel visceral\
      \ and real.\n      "
    status_before_event: Positioned in the center of the staged asylum cell, unoccupied
      but central to the set design. Its padding is slightly worn, and the metal frame
      is cold and unyielding.
    status_after_event: Remains in place, now carrying the residual tension of Riker’s
      outburst. The bed’s symbolic weight as a place of forced compliance and psychological
      torment is amplified.
    global_id: ger_object_cb99a8fa7c77
