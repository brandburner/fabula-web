- fabula_uuid: act_6e0c6a272f24429f
  number: 2
  summary: Trapped in the asylum, Riker confronts Doctor Syrus, who systematically
    dismantles Riker's Starfleet identity, insisting his memories are delusions. Syrus
    claims Starfleet has no record of him and manipulates Riker into 'remembering'
    a fabricated past within the institution, including an incident where he supposedly
    injured himself during an escape attempt, transposing it with Worf's knife accident.
    Riker's grip on his Starfleet reality weakens as he begins to accept Syrus's narrative.
    In the common area, Riker encounters other patients, including a female inmate,
    'Commander Bloom,' who claims to be a Starfleet officer abducted for neuro-chemical
    extraction. Her subsequent attempt to communicate with her 'Starship' using a
    spoon exposes her profound delusion, momentarily dashing Riker's hopes of a shared
    reality. Mavik, an attendant, further torments Riker by recounting gruesome details
    of a murder Riker supposedly committed, deliberately provoking an angry outburst.
    This psychological manipulation pushes Riker to his breaking point. In a fit of
    rage, Riker attacks Mavik and is injected with a sedative. The scene abruptly
    shifts as Riker bolts awake in his Enterprise quarters, drenched in sweat, believing
    the entire asylum experience was merely a vivid nightmare, a product of his anxieties
    about the play.
