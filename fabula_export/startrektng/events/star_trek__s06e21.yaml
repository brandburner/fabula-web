  title: Riker Forcibly Beamed from Tilonus Asylum
  description: In the dimly lit common area of the Tilonus Asylum, Worf and Data execute
    a pre-planned extraction, activating Pattern Enhancer Devices to create a beaming
    zone. Riker, disoriented and resisting, is caught in the triangle of light as
    Worf signals the *Enterprise* for transport. The abrupt beam-out severs Riker’s
    tenuous connection to the asylum’s fabricated reality, marking a violent transition
    from psychological torment to physical rescue. The moment underscores the crew’s
    tactical precision but also the fragility of Riker’s mental state—his resistance
    suggests he is still trapped between mission and delusion, even as his body is
    freed. The event serves as a turning point, shifting the narrative from psychological
    manipulation to physical liberation, though Riker’s internal struggle remains
    unresolved.
