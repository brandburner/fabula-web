      access, support systems) to combat his paranoia, but it also represents the
      very system he is beginning to distrust. The alien lieutenant’s unchecked presence
      aboard the *Enterprise* hints at a failure of Starfleet’s protocols to detect
      or contain external threats, while Riker’s reliance on the personnel logs reflects
      his faith in institutional transparency—faith that may soon be shattered.'
