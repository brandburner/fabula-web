  title: Picard orders Data’s technical examination
  description: 'In the ready room, Picard confronts Data about the unexplained 24-hour
    memory gap, probing whether an external force could have influenced the android
    without his knowledge. Data’s evasive response—‘I am unable to answer that question,
    Captain’—heightens Picard’s suspicion, as the android’s usual transparency is
    conspicuously absent. When Picard demands a technical examination by Geordi La
    Forge, Data complies without resistance, but the tension lingers: his passive
    obedience contrasts sharply with his earlier insistence on transparency, suggesting
    he is hiding something. The scene escalates the crew’s distrust of Data while
    positioning the examination as a critical next step in uncovering the truth behind
    the temporal anomaly. Picard’s decision to involve La Forge—rather than Beverly
    or Troi—signals his focus on technical evidence over psychological or medical
    explanations, reinforcing the stakes of the investigation.'
