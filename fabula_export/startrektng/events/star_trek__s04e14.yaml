  global_id: null
  title: Riker challenges Data’s sensor explanation
  description: |2

    This scene marks a critical moment of tension between Riker’s skepticism and Data’s evasive logic, exposing the crew’s growing unease about the wormhole’s lingering effects. The probe’s readings reveal a Neptune-like planet, contradicting Data’s earlier Class M classification—an inconsistency that Riker immediately flags as suspicious. Data’s rushed, overly precise rebuttal (suggesting a wormhole ‘afterimage’ and a six-week survey mission) feels rehearsed, raising questions about his true motives. Picard, though initially swayed, defers to Riker’s instincts by ordering diagnostics, but the exchange underscores the crew’s fractured trust in their own instruments—and by extension, their reality. The scene functions as a turning point: while Picard dismisses the anomaly as resolved, Riker’s lingering doubt plants the seed for the larger investigation into the missing 24 hours, framing Data as a potential obstacle (or ally) in uncovering the truth.
