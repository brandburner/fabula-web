- fabula_uuid: act_37c31b193ab4a273
  number: 5
  summary: 'With the Paxan entity inhabiting Troi, Data explains the truth: the Paxans
    are xenophobic isolationists who terraformed their planet to remain hidden. Their
    energy field serves as a trap, stunning intruding ships and erasing the crews''
    memories. Data, immune to the stun, remained conscious during the initial encounter.
    In a detailed flashback, Data recounts how he revived the crew and Picard negotiated
    with the Paxan entity (then possessing Troi) to protect their privacy in exchange
    for a full memory wipe. Picard, realizing the gravity of the situation, ordered
    Data to conceal the truth from everyone, including himself, to ensure the Paxans''
    secrecy. Back in real-time, the Paxan entity, still in Troi, demands the Enterprise''s
    destruction due to the failed memory wipe and the crew''s renewed investigation.
    Picard, understanding that the ''clues'' were the problem, proposes a second,
    more thorough memory erasure, promising to eliminate all evidence of their encounter.
    The Paxan entity agrees, granting a ''second chance.'' The crew undergoes the
    memory wipe again, returning to their original state of ignorance, with only Data
    and Picard retaining knowledge of the Paxans, Data bound by Picard''s order to
    maintain the secret. The Enterprise proceeds toward its original destination,
    unknowingly having experienced a second temporal alteration.'
