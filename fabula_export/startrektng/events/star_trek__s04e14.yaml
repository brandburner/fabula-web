acts:
- fabula_uuid: act_1a0fcc5ff544471c
  number: 1
  summary: 'The Enterprise crew enjoys a period of relaxation, with Captain Picard
    indulging in a Dixon Hill holodeck mystery. Data interrupts Picard''s recreation,
    reporting the detection of an M-Class planet within a T-Tauri star system. As
    the Enterprise investigates, it encounters a small, unstable wormhole, which briefly
    renders the entire crew unconscious. Upon revival, Data reports that only thirty
    seconds have passed and that the planet is now identified as Neptune-like, not
    M-Class. However, Dr. Beverly Crusher discovers a significant discrepancy: her
    Diomedian scarlet moss spores, which she started just before the incident, show
    a full day''s growth. This biological evidence directly contradicts Data''s account
    and the ship''s chronometer. Picard''s inquiry begins, centered on the puzzling
    missing day and Data''s peculiar immunity and consistent, yet suspect, reports.
    The act effectively establishes the central narrative question: what truly happened
    during the missing twenty-four hours, and why does Data''s account differ so drastically
    from all other evidence?'
