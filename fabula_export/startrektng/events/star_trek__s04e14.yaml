  title: Crusher traces anomaly to Locklin
  description: 'Beverly Crusher enters the transporter room and immediately interrogates
    O''Brien about the last transporter usage before the wormhole incident, leveraging
    her medical authority to probe for inconsistencies. O''Brien, still nursing a
    minor injury from a domestic mishap with Keiko, confirms Ensign Locklin was the
    final user—a detail that triggers Beverly’s suspicion. Recognizing the potential
    link between Locklin’s transporter activity and the ship’s temporal disruption,
    Beverly orders Locklin to report to Sickbay for a medical evaluation, framing
    the request as a routine check but hinting at deeper concerns about alien influence
    or physiological anomalies tied to the wormhole. This exchange marks a critical
    pivot: Beverly’s medical expertise becomes the first concrete evidence that the
    crew’s missing 24 hours were not a natural occurrence, setting up her later confrontation
    with Picard and the revelation of the Paxan entity’s interference.'
