  title: Geordi confirms Data’s technical capability
  description: 'Geordi La Forge emerges from Engineering’s ladder well to deliver
    a critical technical revelation to Picard and Beverly Crusher. His discovery—that
    the ship’s chronometer was deliberately tampered with by disabling security protocols—confirms
    the crew’s suspicions that the missing 24 hours was no accident. When pressed
    by Picard, Geordi reveals that only he and Data possess the expertise to execute
    such a modification, directly implicating Data in the temporal anomaly. The revelation
    escalates the crew’s distrust of the android and forces Picard to confront Data’s
