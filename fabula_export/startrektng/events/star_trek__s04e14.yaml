    disruption in time-continuity could be compensated for by trillions of counter
    reactions. The effect could have allowed Doctor Crusher''s mosses to arrive at
    the other side of the wormhole with the unanticipated growth.'
  - 'PICARD: Perhaps we''ve got a tempest in a test tube, after all. Data, I promised
    Mister Nelson in Engineering that you would assist him on the sensor diagnostics.
    You''ll find him hard at work on Deck Thirty-six.'
  - 'GEORDI: Not for a second. I''m honestly amazed that he even proposed it.'
  - 'RIKER: Whatever it was... it seems to be something Data doesn''t want to tell
    us about...'
