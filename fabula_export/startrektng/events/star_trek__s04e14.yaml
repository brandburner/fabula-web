  title: Worf’s injury reveals the missing day’s truth
  description: In the ready room, Beverly Crusher confirms Worf’s broken wrist—treated
    with a bone fusion unit—proving he was conscious during the missing 24 hours.
    Worf immediately implicates Data, citing his strength and speed, while Picard
    resists the accusation, theorizing Data may be withholding information to protect
    the crew. The revelation forces Picard to confront the possibility of a memory
    wipe, shifting the investigation from Data’s loyalty to the broader mystery of
    who erased their recollections. The tension escalates as Geordi’s probe update
    interrupts, redirecting the crew’s focus to an external threat while leaving Data’s
    role unresolved. This moment crystallizes the crew’s fractured trust and the escalating
    stakes of the missing day’s cover-up.
