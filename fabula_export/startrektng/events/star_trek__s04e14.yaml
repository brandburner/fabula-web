  global_id: null
  title: Wormhole anomaly disrupts Enterprise crew
  description: "\n  The Enterprise crew, fully staffed on the bridge, confirms their\
    \ arrival in the T-tauri system under Picard’s command. Data detects an anomalous\
    \ energy fluctuation directly in their path, revealing a fleeting wormhole that\
    \ vanishes as quickly as it appears. Worf confirms the fading energy distortions,\
    \ but before Picard can issue orders, the wormhole reopens—this time dangerously\
    \ close to the ship. The crew barely has time to react before the Enterprise is\
    \ pulled into the wormhole, triggering a blinding flash of light. When the light\
    \ fades, Data remains the only conscious crew member, observing the rest of the\
    \ bridge crew slumped over or collapsed, marking the abrupt onset of the missing\
    \ 24-hour anomaly. The event disrupts the ship’s operational rhythm, introduces\
    \ immediate tension, and foreshadows the larger mystery of the missing time, setting\
    \ the stage for Picard’s investigation into the unexplained phenomenon.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e14
  scene_sequence: 7
  sequence_in_scene: 10
  key_dialogue:
  - 'MCKNIGHT: Entering the T-tauri system, now, Captain.'
  - 'DATA: Sensors indicate an energy fluctuation directly in our path. Source unknown.'
  - 'WORF: Still picking up energy distortions—but fading. It seems to be gone.'
  - 'PICARD: A wormhole?'
  - 'DATA: Very likely. Small and extremely unstable wormholes have been mapped near
    thirty-nine T-tauri systems in the last one hundred years alone.'
  - 'RIKER: Captain, I suggest we move to a safer location. It could reappear at any
    moment.'
  - 'PICARD: Agreed. Ensign, take us—'
  - 'DATA: --Captain!'
