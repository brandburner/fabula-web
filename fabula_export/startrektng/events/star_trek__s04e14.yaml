  title: Picard dismisses sensor mystery despite Riker’s doubts
  description: On the bridge, Data confirms the probe’s readings of a Neptune-like
    planet, contradicting earlier M-Class sensor data from before the wormhole. Riker’s
    skepticism about the sensor malfunction’s precision forces Data to hastily propose
    an untested theory—that the sensors may have captured an *afterimage* of a planet
    from the other side of the wormhole. Picard, swayed by Data’s logic, orders a
    full diagnostic but ultimately dismisses the anomaly as resolved, overriding Riker’s
    lingering concerns. The exchange reveals Data’s evasiveness and the crew’s fractured
    trust, while Picard’s premature closure of the investigation sets up future revelations
    about the missing 24 hours. The tension escalates as the crew’s unease about the
    wormhole’s effects—and Data’s role in them—goes unaddressed.
