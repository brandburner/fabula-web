    communications through the holodeck program would be less obtrusive.'
  - 'PICARD''S COM VOICE: I appreciate the consideration, Commander. What can I do
    for you?'
  - 'DATA: Long range sensors have detected a T-tauri type star within a pocket of
    the Ngame cloud. [...] However, the star''s single planet falls within the M-Class
    range. It is capable of supporting life.'
  - 'PICARD''S COM VOICE: Now that is unusual.'
  - 'DATA: Highly, Sir.'
  - 'PICARD''S COM VOICE: Yes, thank you, Data. Procedures require us to investigate.
    Recall the bridge crew and set a course.'
