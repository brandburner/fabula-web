  global_id: null
  title: Data reveals Paxan inevitability
  description: 'On the Bridge, Data’s strategic manipulation of the Enterprise’s shields—varying
    their strength and shape to delay the Paxan energy field’s takeover—temporarily
    staves off the alien threat, but his grim revelation shatters the crew’s confidence.
    Picard, still reeling from Data’s earlier admission that he ordered the android
    to lie, now confronts a far greater existential crisis: the Paxans’ superior technology
    ensures their eventual victory. The revelation is compounded when Troi, possessed
    by a Paxan entity, delivers a chilling warning, exposing the crew’s trespass into
    a forbidden system. Data clarifies the Paxans’ xenophobic isolationism, their
    terraforming of a protoplanet, and their method of neutralizing intruders through
    biochemical stasis and memory erasure. The scene escalates the stakes, forcing
    Picard to grapple with the crew’s vulnerability and the Paxans’ preemptive hostility,
    while also highlighting Data’s uncharacteristic initiative and the crew’s collective
    helplessness against an unseen, technologically superior foe. The tension peaks
    as Worf reaches for his phaser, only for Data to intervene, underscoring the futility
    of physical resistance against the Paxans’ control over Troi’s body. The event
    marks a turning point, shifting the narrative from investigation to confrontation
    with an existential threat that the crew cannot counter through conventional means.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e14
  scene_sequence: 40
  sequence_in_scene: 61
  key_dialogue:
  - 'PICARD: I... ordered you to lie?'
  - 'DATA: -- No! You must vary shield strength and shape as rapidly as possible.
    Maximum shields will only speed the ship''s takeover.'
  - 'TROI: You have invaded our system.'
  - 'DATA: They are xenophobes, Sir. Isolationists. The Paxans terraformed a protoplanet
    in this system to better conceal their whereabouts. The apparent wormhole we experienced
    during our previous encounter is actually a trap designed to keep away intruders.'
  - 'DATA: My positronic brain is a technology unknown to the Paxans. Their stun-field
    had no effect on me. When I realized that I alone was able to act...'
  - 'TROI: Your knowledge of us is unacceptable.'
