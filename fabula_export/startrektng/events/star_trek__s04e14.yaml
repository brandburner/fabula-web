  key_dialogue:
  - 'PICARD: Do you recognize the planet, Data?'
  - 'DATA: Yes, it is the planet our probe detected in the T-tauri system.'
  - 'GEORDI: No it''s not. Actually, it''s Tethys Three. I retrieved the image from
    the ship''s library. The geophysical figures have been slightly altered, but it''s
    definitely Tethys Three.'
  - 'PICARD: Data, did you take this image from the ship''s library and then program
    the probe to send it back to us?'
  - 'DATA: I cannot verify that hypothesis.'
  - 'PICARD: But you don''t deny it.'
  - 'DATA: No, Sir.'
  - 'PICARD: Data! You''re the key to this entire mystery. And you''ve done nothing
    but block my attempts to solve it. Why are you fighting me?'
  - 'DATA: It is not by choice.'
  - 'PICARD: What would you have me do?! How would you handle this, if our positions
    were reversed?'
  - 'DATA: I am apparently guilty of falsifying the Enterprise''s records. Of interfering
    with an investigation. Of disobeying a direct order from my commanding officer.
    Your duty seems clear.'
  - 'PICARD: Do you know what a court-martial would mean? Your career in Starfleet
    would be finished.'
  - 'DATA: I realize that.'
  - 'PICARD: Do you also realize that you would most likely be stripped down to the
    wires to find out what the hell went wrong?'
  - 'DATA: Yes, Sir. I do.'
