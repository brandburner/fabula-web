    own face but felt alien, as if something else inhabited it. The moment suggests
    external psychological manipulation or a deeper fracture in Troi's perception,
    foreshadowing the broader threat of the Paxan entity's influence. Worf's protective
    intervention—breaking protocol to enter her private quarters—highlights the escalating
    unease among the crew as the mystery of the missing 24 hours deepens. The scene
    serves as a psychological turning point, shifting the investigation from physical
    evidence to the crew's mental vulnerability, and ties directly into Troi's later
    role as a conduit for the Paxan's revelations.
