  title: Beverly discovers accelerated moss growth
  description: Beverly Crusher returns to the Sickbay lab to retrieve a medical instrument
    for O’Brien’s injury but is abruptly halted by the sight of her Diomedian moss
    spores, which have matured far beyond their expected growth rate—indicating a
    full day has vanished from her memory. Her initial disbelief ('This is impossible')
    shifts to suspicion as she questions Alyssa, her medical technician, about potential
    tampering. Alyssa denies any involvement, leaving Beverly unsettled and prompting
    her to investigate further. This discovery marks the first concrete biological
    evidence of the missing 24 hours, forcing Beverly from her role as a passive observer
    into an active investigator. The scene escalates the crew’s unease about the ship’s
    compromised timeline, setting up Picard’s broader inquiry into the anomaly and
    Data’s suspicious behavior. Beverly’s clinical detachment gives way to quiet urgency,
    signaling the shift from medical routine to crisis response.
