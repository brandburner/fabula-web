  global_id: null
  title: Picard bargains with Paxan entity through Troi
  description: "\n  In a high-stakes confrontation aboard the *Enterprise*, Picard\
    \ faces the Paxan entity—manifesting through Deanna Troi—who demands the ship’s\
    \ destruction to conceal their existence. Data, immune to the Paxans’ memory-wiping\
    \ stasis, has already revived the crew and initiated emergency protocols to protect\
    \ the ship from the alien energy field. When Troi, possessed by the Paxans, threatens\
    \ destruction, Picard exploits their vulnerability: their reliance on stasis to\
    \ erase memory. He proposes a counteroffer—erasing all crew knowledge of the encounter\
    \ in exchange for the ship’s survival. The Paxans, terrified of exposure, hesitate.\
    \ Picard then orders Data to conceal the truth permanently, even from himself,\
    \ ensuring the secret remains buried. The crew is tasked with scrubbing all ship\
    \ records, marking a moral turning point for Picard as he prioritizes survival\
    \ over transparency. The scene hinges on Picard’s strategic negotiation, Troi’s\
    \ unwitting role as a conduit, and Data’s unwavering obedience to his orders,\
    \ all while revealing the Paxans’ fear of discovery as their critical weakness.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e14
  scene_sequence: 41
  sequence_in_scene: 65
  key_dialogue:
  - 'PICARD: If you destroy this ship, others will come searching for us. You may
    not be able to stop them all. Knowledge of your civilization could be spread across
    half the galaxy.'
  - 'TROI: There are over a thousand lifeforms on this vessel. How could you assure
    their silence?'
  - 'PICARD: Data, I have to give you a most unusual order... I''m not quite sure
    how well you will be able to integrate it into your program... I am ordering you
    never to reveal what has happened here today. Not to Starfleet, not even to myself.
    You will conceal your memory of the Paxans for as long as you live. Is that understood?'
  - 'DATA: Completely, Captain.'
