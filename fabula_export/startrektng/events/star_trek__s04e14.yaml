  - 'PICARD: During the missing day. Were you contacted by Starfleet? Were you given
    orders to conceal the truth from us?'
  - 'DATA: I cannot answer that question. We must leave.'
  - 'PICARD: Dammit, Data! It''s the only explanation that makes sense! This ship
    is not going anywhere until I get an answer. Now who gave you such an order?'
  - 'DATA: You did, Sir.'
