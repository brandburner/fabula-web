  title: Picard negotiates a second memory wipe
  description: "\n  On the bridge, Data reveals the full extent of the first memory\
    \ wipe—how he reset the ship’s chronometer and erased the crew’s short-term memories\
    \ to conceal the Paxan encounter. Picard, recognizing the flaws in this approach,\
    \ argues that residual clues (Crusher’s experiment, Worf’s healed wrist, Troi’s\
    \ hallucinations) led the crew to uncover the truth. He proposes a second, more\
    \ thorough memory wipe, this time ensuring no evidence remains. Troi, still possessed\
    \ by the Paxan entity, initially resists but is swayed by Picard’s logic, granting\
    \ the crew a second chance. The moment ends with Troi collapsing as the entity’s\
    \ psychic link severs, leaving the crew to execute the plan. This exchange marks\
    \ a turning point: Picard’s willingness to manipulate memory for survival, Troi’s\
    \ role as a vessel for alien vengeance, and the crew’s complicity in burying the\
    \ truth.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e14
  scene_sequence: 42
  sequence_in_scene: 67
  key_dialogue:
  - 'DATA: We proceeded to erase all evidence of our encounter with the Paxans. I
    reset the computer''s chronometer—and the crew was again stunned into unconsciousness
    and their short-term memories erased. When they were revived a day later, the
    computer adjustments made it appear that only thirty seconds had passed.'
  - 'PICARD: The plan failed because clues were left behind that suggested a mystery.
    And to many humans, a mystery must be solved. Doctor Crusher''s incubation experiment,
    Worf''s wrist, Troi''s hallucinations... little pieces of evidence that led us
    to even more clues about the clock, the transporter trace, Data''s odd behavior...
    Don''t you see... without clues, there would be no mystery! If we were to simply
    eliminate all the clues and begin again...'
  - 'TROI: You are a most unusual species. Worthy of a second chance. Proceed.'
