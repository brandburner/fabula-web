- fabula_uuid: cand_evt_scene_4f56389cc8e330ad_01
  global_id: null
  title: Crew regains consciousness amid temporal anomaly
  description: 'The *Enterprise* crew awakens from an unexplained blackout after transiting
    an unstable wormhole, disoriented and physically affected. Picard, the first to
    regain full consciousness, immediately questions Data about the duration of their
    unconsciousness, only to be told thirty seconds passed—directly contradicting
    the ship’s spatial displacement and the crew’s visible injuries. Riker’s report
    of the Enterprise’s unplanned movement (a full day’s travel in seconds) and Beverly’s
    urgent com request create a critical tension: the crew’s subjective experience
    of time does not align with Data’s report or the ship’s logs. This discrepancy,
    combined with Data’s immunity to the wormhole’s effects, plants the first seeds
    of suspicion about his role in the anomaly. The scene establishes the central
    mystery of the missing 24 hours and sets Picard on a path to uncover the truth,
    while also highlighting the crew’s vulnerability and the need for immediate action.'
