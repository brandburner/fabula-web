  key_dialogue:
  - 'PICARD: It was a ruse to throw us off the track. Look at the clues. Doctor Crusher''s
    incubation experiment, the computer clock, the transporter trace all indicate
    the existence of a missing day. Worf''s broken wrist suggests that we may have
    been awake and aware for that day, and possibly in a struggle for our lives.'
  - 'PICARD: Why else would he be willing to sacrifice his career rather than tell
    us the truth? ... I cannot live with that.'
  - 'PICARD: ((to McKnight)) Ensign, take us back to the scene of the crime. Go to
    warp two.'
