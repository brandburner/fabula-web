  title: Picard approves Data’s clock recalibration
  description: "\n  The *Enterprise* crew regains consciousness after a wormhole transit,\
    \ disoriented and injured. Data, unaffected by the stun effect, reports the crew\
    \ was unconscious for only thirty seconds, though Riker’s navigation data suggests\
    \ a full day’s spatial displacement. Picard, still woozy, orders Data to realign\
    \ the ship’s chronometers with Starbase 410’s subspace signal to account for the\
    \ temporal anomaly. Beverly Crusher interrupts via com, her urgency hinting at\
    \ an escalating medical crisis in Sickbay—one that threatens to divert attention\
    \ from the looming alien threat. The scene establishes Data’s suspicious immunity\
    \ to the wormhole’s effects, Picard’s immediate trust in his second officer, and\
    \ the crew’s collective disorientation as a narrative throughline. The recalibration\
    \ request becomes a symbolic act: a technical fix masking deeper deception, while\
    \ Beverly’s interruption foreshadows the biological evidence that will later expose\
    \ the truth of the missing day.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e14
  scene_sequence: 8
  sequence_in_scene: 14
  key_dialogue:
  - |-
    PICARD: Data?
    DATA: Careful, Captain. The stun-effect from the wormhole was relatively severe.
  - |-
    PICARD: How long were we unconscious?
    DATA: Approximately thirty seconds.
    PICARD: You were not affected?
  - |-
    PICARD: Well, where the hell are we?
    RIKER: Point five-four parsecs from our previous position. Almost a day's travel... in just thirty seconds.
    DATA: Sir, I should re-align the ship's clock with Starbase Four-ten's subspace signal to adjust for the time distortion.
    PICARD: Proceed.
  - |-
    BEVERLY'S COM VOICE: Captain, Sickbay here.
    PICARD: Go ahead, Doctor.
