  scene_sequence: 13
  sequence_in_scene: 20
  key_dialogue:
  - 'RIKER: "Wait a minute, didn’t your readings indicate a Class M planet before
    we went through the wormhole, Data?"'
  - 'DATA: "It is conceivable that the sensors picked up the afterimage of an actual
    planet that lies on the other side of the wormhole. We could survey the nearby
    stars for such a planet. It would require approximately six weeks."'
  - 'RIKER: "It’s awfully strange that a malfunctioning sensor should give such a
    specific misreading of a planet. I would have thought that a space/time disturbance
    would cause a lot more confusion than that."'
