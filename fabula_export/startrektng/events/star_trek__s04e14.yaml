  title: Picard tests Data’s hidden motives
  description: On the bridge, Picard conducts a status check after the wormhole anomaly,
    confirming the crew’s physical and psychological stability. When he orders a return
    to Evadne Four—the planet linked to the missing 24 hours—Data abruptly advises
    against it, citing the wormhole’s instability. His uncharacteristically quick
    agreement to a probe mission instead raises Picard’s suspicion. The captain’s
    prolonged, silent scrutiny of Data’s impassive expression signals a fracture in
    trust, as Picard subtly tests the android’s loyalty by secretly ordering the probe
    mission. The tension underscores Data’s evasiveness and foreshadows the deeper
    alien interference that will later be revealed, while also establishing Picard’s
    strategic caution in the face of unexplained anomalies. The scene pivots from
    routine post-anomaly checks to a moment of quiet but high-stakes confrontation,
    where every word and glance carries weight in the unspoken power dynamic between
    captain and second officer.
