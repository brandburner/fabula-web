  title: Picard demands Data reveal the truth
  description: In Data’s quarters, Picard escalates his confrontation with the android
    after Geordi La Forge exposes the altered probe image as Tethys Three, not the
    T-tauri system planet. When Picard directly accuses Data of falsifying records,
    Data’s evasive responses—including a refusal to confirm or deny the accusation—fuel
    Picard’s frustration. The tension peaks when Picard reveals Troi’s disturbing
    hallucination, linking it to the missing 24 hours, and demands Data explain his
    secrecy. Data’s cryptic justifications—that withholding information may protect
    the crew—clash with Picard’s insistence on full disclosure. The standoff reaches
    a breaking point when Data, aware of the consequences, dares Picard to court-martial
    him, even if it means dismantling. The scene underscores the conflict between
    duty and secrecy, with Data’s defiance forcing Picard to confront the moral cost
    of his command and the hidden stakes of the temporal anomaly.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e14
  scene_sequence: 32
  sequence_in_scene: 46
  key_dialogue:
  - 'PICARD: Do you recognize the planet, Data?'
  - 'DATA: I cannot verify that hypothesis.'
  - 'PICARD: But you don''t deny it.'
  - 'DATA: No, Sir.'
  - 'PICARD: Data! You''re the key to this entire mystery. And you''ve done nothing
    but block my attempts to solve it. Why are you fighting me?'
  - 'DATA: It is not by choice.'
  - 'PICARD: What does that mean?'
  - 'DATA: I cannot say.'
  - 'PICARD: You would rather endanger Deanna Troi, a friend, than tell me what''s
    going on?!'
  - 'DATA: Which would you place first? The welfare of a single individual? Or that
    of the entire crew?'
  - 'PICARD: What would you have me do?! How would you handle this, if our positions
    were reversed?'
  - 'DATA: I am apparently guilty of falsifying the Enterprise''s records. Of interfering
    with an investigation. Of disobeying a direct order from my commanding officer.
    Your duty seems clear.'
  - 'PICARD: Do you know what a court-martial would mean? Your career in Starfleet
    would be finished.'
  - 'DATA: I realize that.'
