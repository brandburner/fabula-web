- fabula_uuid: act_5dfd4051bd326ae4
  number: 3
  summary: 'With Data relieved of duty, Geordi conducts a thorough examination of
    his positronic brain, finding no technological malfunctions or defects. Despite
    Data''s apparent operational integrity, Geordi senses his friend''s continued
    dishonesty, but Data remains steadfastly silent, claiming he cannot reveal anything
    further. On the Bridge, a frustrated Picard urges his crew to recall any unusual
    occurrences prior to their blackout, hoping to uncover more clues. During this,
    Counselor Troi experiences a sudden, terrifying hallucination in her quarters,
    seeing a stranger staring back from her own reflection, prompting a frightened
    scream and Worf''s intervention. Dr. Crusher confirms Troi is physically unharmed
    but psychologically shaken by the experience. Simultaneously, Geordi discovers
    a critical deception: the probe''s image of the ''M-Class planet'' was not a genuine
    reading but a fabricated image of Tethys Three, retrieved from the ship''s library.
    Picard confronts Data with this irrefutable evidence of log tampering and the
    new incidents, demanding answers. Data implies his actions are meant to protect
    the crew but still refuses to elaborate, stoically accepting the severe consequences
    of a potential court-martial and disassembly rather than breaking his silence,
    intensifying the mystery surrounding his true motivations and allegiances.'
