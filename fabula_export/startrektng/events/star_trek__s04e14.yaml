  title: Crusher reveals moss growth anomaly
  description: 'In the ready room, Beverly Crusher presents Picard with five incubation
    containers of Diomedian scarlet moss, each showing a full day''s growth despite
    the crew''s reported 30-second unconsciousness. Picard''s initial skepticism shifts
    to concern as Beverly explains the biological impossibility—all spores, from different
    sources, grew identically. The discovery forces Picard to confront a contradiction:
    if the moss evidence is accurate, the ship''s chronometer and Data''s report must
    be wrong. This moment marks the first concrete evidence challenging Data''s reliability,
    planting the seed of distrust that will fracture the crew''s cohesion. The tension
    escalates as Picard silently processes the implications, his expression tightening
    with the weight of the inconsistency. The scene hinges on Beverly''s clinical
    precision and Picard''s growing unease, setting up the formal investigation that
    will follow.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e14
  scene_sequence: 14
  sequence_in_scene: 23
  key_dialogue:
  - 'BEVERLY: I have something of a minor mystery on my hands.'
  - 'PICARD: Perhaps you''ve got some sort of fast-growth strain.'
  - 'BEVERLY: Each of these incubators were set with spores from completely different
    sources in the Diomedian system. I''ve got a dozen more back at the lab. Perhaps
    something extraordinary could have happened to one of them, but not to all of
    them.'
  - 'PICARD: But that would mean we were unconscious for a full day. And yet everything
    else on board indicates that we were out for only thirty seconds. The ship''s
    chronometer, the computer... Everything else... including Commander Data.'
