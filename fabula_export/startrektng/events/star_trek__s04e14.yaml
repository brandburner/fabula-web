  title: Troi’s Alien Possession Begins
  description: 'Deanna Troi lies unconscious in her quarters when a green energy pulse—emanating
    from the Paxan entity—invades her body. The glow envelops her head before vanishing,
    leaving her physically present but mentally hollowed out. Her sudden, unnatural
    stillness signals the alien intelligence has seized control, transforming the
    ship’s empathic anchor into a vessel for their unseen enemy. This moment marks
    a critical escalation: the Paxans have breached the crew’s defenses, and Troi’s
    possession becomes the first tangible evidence of their hostile intentions. The
    event foreshadows the revelation of the missing 24 hours and the Paxans’ failed
    memory wipe, while also establishing Troi as a pawn in a conflict she cannot resist.
    The lack of dialogue underscores the violation’s invasiveness—her body moves,
    but her voice is silenced, emphasizing the alien’s dominance over her autonomy.'
