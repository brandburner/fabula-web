  title: Geordi initiates covert Data investigation
  description: Geordi La Forge arrives in Engineering under the pretense of relieving
    Data from sensor diagnostics, maintaining a friendly demeanor until the android
    departs. The moment Data exits, Geordi’s expression shifts to focused intensity,
    signaling a deliberate pivot from public trust to private suspicion. He immediately
    recruits Nelson to assist in a covert computer investigation, leveraging his engineering
    authority to probe Data’s unexplained 24-hour absence without raising alarms.
    This scene marks the first overt step in Picard’s covert investigation, exposing
    the crew’s growing unease about Data’s role in the temporal anomaly and setting
    the stage for a deeper conspiracy. Geordi’s calculated deception—smiling at Data
    while secretly planning to scrutinize his actions—highlights the crew’s fractured
    trust and the high stakes of uncovering the truth before the hidden alien threat
    can strike again.
