  title: Soong interrogates Data on purpose and humanity
  description: 'The scene opens in Soong’s lab, where Data—now fully functional after
    his malfunction—engages in an unsettlingly intimate exchange with his creator,
    Dr. Noonian Soong. Soong, amused and probing, tests Data’s physical and emotional
    capabilities, from whistling a children’s tune to questioning his choice to join
    Starfleet. Data responds with clinical precision, framing his decisions as logical
    extensions of continuity and purpose, while Soong’s questions subtly reveal his
    own unresolved conflict: whether his creations are tools, reflections, or something
    beyond his control. The tension escalates when Lore, Data’s malevolent brother,
    arrives unexpectedly, disrupting the fragile father-son dynamic. Soong’s revelation
    that he is dying—delivered with eerie calm—fractures Lore’s emotional composure,
    while Data processes the information with detached curiosity. The scene underscores
    the existential stakes of Data’s quest for meaning, the fragility of Soong’s paternal
    authority, and the irreconcilable differences between the brothers, all while
    foreshadowing Lore’s betrayal and Soong’s impending death. The dialogue is laced
    with subtext: Soong’s metaphors about sculptors and continuity hint at his own
    mortality and the legacy he seeks to leave, while Data’s insistence on logic masks
    his growing awareness of the emotional undercurrents he cannot yet fully grasp.
    The exchange serves as both a character study and a thematic exploration of creation,
    purpose, and the human obsession with the past—all while setting the stage for
    the brothers’ inevitable confrontation.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e03
  scene_sequence: 26
  sequence_in_scene: 40
  key_dialogue:
  - |-
    SOONG: Why Starfleet?
    DATA: It was Starfleet officers who rescued me.
    SOONG: Ah. So you decided to emulate your emancipators. How disappointing.
  - |-
    SOONG: Why are humans so fascinated with old things?
    DATA: Perhaps, for humans, old things represent a tie to the past.
    SOONG: And what's so important about the past? People needed money, they got sick. Why tie yourself to that?
    DATA: Humans are mortal. They seem to need a sense of continuity.
    SOONG: Ah hah!! Why?
    DATA: To give their lives meaning... A sense of purpose.
  - |-
    SOONG: You see, I'm dying.
    DATA: Dying from what, sir?
    LORE: Wait a minute. Wait a minute. What do you mean you're dying? You look fine. You're not that old. You look fine. What is this? Some kind of trick to see how we'd react?
    SOONG: I wish it were.
