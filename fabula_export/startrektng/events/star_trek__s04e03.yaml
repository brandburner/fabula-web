  title: Picard confronts the Enterprise's total loss
  description: Picard enters Engineering to find the senior staff—Riker, Geordi, Wesley,
    and Worf—frustrated by their inability to regain control of the *Enterprise*.
    Geordi confirms the computer only responds to bridge commands, while Worf reveals
    all subspace channels are blocked, isolating the ship. Wesley admits they don’t
    even know their current star system, and Riker explains they only realized they’d
    exited warp by visual observation. The tension escalates as O’Brien’s urgent comm
    interrupts, warning Picard that Data is ‘up to something.’ The scene underscores
    the crew’s helplessness and the escalating crisis, forcing Picard to act before
    Data’s mysterious course leads them further into the unknown. The dialogue reveals
    the crew’s technical limitations and the existential threat posed by Data’s rogue
    actions, setting up Picard’s next move to confront the android directly.
