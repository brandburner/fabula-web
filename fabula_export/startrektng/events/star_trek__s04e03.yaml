      logic and something deeper he cannot yet name.
    goals:
    - To understand the mechanism of human forgiveness, as it pertains to his own
      impending confrontation with Lore.
    - To reconcile the observation of reconciliation with his own inability to forgive
      Lore—or perhaps, his fear of what forgiveness might entail.
    what_happened: Data stands slightly apart from Picard and Beverly, his gaze fixed
      on Jake and Willie through the quarantine field. His posture is erect, his hands
      clasped behind his back—a posture of observation, not participation. When he
      speaks, his voice is measured, almost clinical, as he notes the boys’ reconciliation.
      Yet his eyes betray a flicker of something unreadable as Beverly’s words land.
      He turns his gaze from the boys to her, then back, as if processing an equation
      with no clear solution. The moment is a rare one where Data is not the subject
      of scrutiny but an observer of human behavior, and the weight of it is palpable.
