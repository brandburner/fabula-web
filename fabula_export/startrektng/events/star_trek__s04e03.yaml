      state is one of triumphant control, tinged with a paternalistic amusement at
      Data’s vulnerability.
    goals:
    - Reassert his control over Data by severing his connection to the *Enterprise*
      and isolating him physically and psychologically.
    - Test Data’s obedience and functional capabilities through arbitrary commands
      and questions, reinforcing his role as Data’s creator and superior.
    what_happened: Soong moves through the lab with an air of playful arrogance, treating
      Data like a curious experiment rather than a sentient being. He methodically
      disables Data’s communicator and manipulates his oral circuitry with a metallic
      tool, all while engaging in cryptic, whimsical dialogue that keeps Data off-balance.
      Soong’s physical presence is dominant—he scuttles, fiddles with dinosaur models,
      and issues commands with a mix of paternal affection and manipulative control.
      His revelations about the homing circuit and his survival are delivered with
      a smirk, underscoring his enjoyment of Data’s confusion and his own power over
      his creation.
