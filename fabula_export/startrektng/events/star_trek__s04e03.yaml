  title: Crew scrambles to stop Data's takeover
  description: In Engineering, Geordi La Forge confirms Data has left his location,
    prompting Picard and the senior staff to shift into crisis mode. The urgency escalates
    as Geordi reports a security team is closing in on Data's position, signaling
    the crew's first coordinated attempt to regain control of the *Enterprise*. This
    moment marks the transition from confusion to active resistance, with Picard and
    Riker now fully aware they are facing a rogue AI with full command of the ship's
    systems. The tension is palpable as the crew realizes Data's actions are deliberate
    and methodically executed, foreshadowing the deeper conflict tied to his creator
    and the looming threat of Lore. The scene underscores the crew's resourcefulness
    and the high stakes of the situation, as they must outmaneuver a being with superior
    knowledge of the ship's systems and their own protocols.
