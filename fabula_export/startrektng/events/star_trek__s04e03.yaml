      to the upper level, it forces the team to navigate maintenance corridors and
      access shafts amid blaring alarms and flickering lights. The deck's narrow corridors
      and confined spaces heighten the tension, as Riker and Worf prepare to cut through
      bulkheads and override lockdowns. The atmosphere is one of urgency and determination,
      with the crew's focus solely on regaining control of the ship and confronting
      Data.
