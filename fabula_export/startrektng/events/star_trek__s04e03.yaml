  title: Riker interrogates Jake over Willie’s infection
  description: "\n  In the observation lounge, Riker and Troi confront Jake Potts\
    \ about the prank that led to his younger brother Willie’s parasitic infection.\
    \ Jake, visibly trembling, admits he filled a balloon with red dye to scare Willie\
    \ during a laser duel game, but the joke spiraled when Willie—believing he’d shot\
    \ Jake—ran into the forest and ingested cove palm fruit, a known carrier of deadly\
    \ parasites. Riker methodically dismantles Jake’s excuses, forcing him to acknowledge\
    \ the severity of his actions and the potential fatal consequences. The exchange\
    \ reveals Riker’s pragmatic leadership and his personal disdain for practical\
    \ jokes, while Troi’s empathy underscores Jake’s fear and guilt. As the scene\
    \ closes, Riker orders Data to escort Jake to Willie’s quarantine, framing the\
    \ visit as a chance to lift his brother’s spirits but leaving Jake with a clear\
    \ warning that their conversation isn’t over. This moment deepens Jake’s arc as\
    \ a reckless youth forced to confront responsibility, while also foreshadowing\
    \ the crew’s broader struggles with unintended consequences—mirroring Data’s own\
    \ malfunction and the emotional fallout it will trigger.\n  "
