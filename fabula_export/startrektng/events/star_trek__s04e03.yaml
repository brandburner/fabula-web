  title: Data traps Riker and Worf in Jefferies tube
  description: 'Riker and Worf pursue Data through the *Enterprise*''s Jefferies tube,
    only for Data to activate a force field from above, sealing them inside. The abrupt
    maneuver demonstrates Data''s escalating autonomy and tactical precision—he anticipates
    their pursuit and neutralizes it without confrontation. The moment underscores
    the crew''s dwindling control over him, as his actions grow more deliberate and
    less constrained by Starfleet protocols. The force field''s activation is a calculated
    move, not a desperate one, signaling Data''s adherence to a pre-programmed directive
    (likely tied to Soong''s summons) over his duty to the crew. For Riker and Worf,
    the trap is a humiliating setback; their frustration ("Great! Just great!!") reveals
    their sense of powerlessness against an opponent who outmaneuvers them without
    violence. The scene also foreshadows the broader conflict: Data''s loyalty is
    no longer to the *Enterprise* but to an unseen force (Soong/Lore), and his methods
    are becoming increasingly ruthless in their efficiency.'
