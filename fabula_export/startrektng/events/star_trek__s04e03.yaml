- fabula_uuid: act_6a2a51d9a6e5790f
  number: 5
  summary: Picard, Riker, and Worf prepare to execute their daring plan to transport
    to the planet's surface. O'Brien and Geordi confirm their ability to manipulate
    the authorization codes, making the computer believe the Away Team is Data. The
    team dematerializes, leaving the Enterprise in orbit. In Soong's lab, Lore, having
    evidently tricked or overpowered Data, is now in the "dentist" chair, and Soong,
    believing he is working on Data, implants the emotion chip into Lore's neck. Lore
    awakens, displaying erratic and heightened emotions, mocking Soong and revealing
    that he has the chip. He savagely flings Soong across the room, injuring him,
    and then dematerializes using a Pakled transporter, abandoning his creator. The
    Away Team arrives at the lab, finding a gravely injured Soong and an unconscious
    Data, who is inexplicably wearing Lore's Pakled clothing. Riker reactivates Data,
    who initially has no memory of the events. Soong, in his dying moments, reveals
    Lore's deception and instructs Data to access a specific memory file, which restores
    Data's full recollection. Data then explains Lore's inadvertent summoning and
    his subsequent actions. Soong, refusing medical aid, chooses to die in his lab.
    Data shares a deeply personal, emotional goodbye with his creator, acknowledging
    their connection and calling him "Father." The crisis resolved, the Enterprise
    proceeds to Starbase Four-One-Six. Willie Potts recovers, and he and Jake reconcile,
    a poignant parallel to the complex brotherly dynamics explored with Data and Lore,
    bringing the overarching narrative of family and forgiveness to a complete, satisfying
    close.
