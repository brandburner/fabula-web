  title: O'Brien reveals Data's rogue course
  description: In the midst of escalating tension aboard the *Enterprise*, Chief O'Brien
    interrupts the crew's desperate attempts to regain control of the ship's systems.
    Picard, Riker, Geordi, Wesley, and Worf are gathered in Engineering, where Geordi
    confirms that the computer is locked to bridge commands only, and Worf reports
    that all subspace channels have been blocked—cutting off the crew's ability to
    call for help. Picard presses Wesley for any progress in tracing navigation inputs,
    but Wesley admits they don’t even know their current star system. Riker underscores
    the severity of their situation by revealing they only realized they’d exited
    warp by visual confirmation. O'Brien’s urgent com transmission breaks in, warning
    Picard that Data is ‘up to something.’ The interruption forces Picard to shift
    focus from the crew’s technical struggles to the deeper, more sinister implications
    of Data’s actions, signaling that the crisis is no longer just a malfunction but
    a deliberate, purposeful act. The moment heightens the urgency of the situation,
    as the crew’s inability to communicate or navigate leaves them vulnerable to Data’s
    unknown agenda. O'Brien’s vague but ominous warning sets up the revelation that
    Data has taken full control of the ship, steering it toward an unknown destination,
    which will force Picard to confront the severity of the crisis and the need for
    immediate action.
