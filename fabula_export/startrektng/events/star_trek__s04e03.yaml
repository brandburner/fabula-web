    global_id: ger_object_430a34bd5fca
  - object_uuid: ger_object_2225766d31d6
    description_of_involvement: 'The upstage left Turbolift serves as Data’s strategic
      exit point after consolidating control of the *Enterprise*. It opens with a
      hiss in response to his commands, providing a swift and unobstructed route for
      his departure. The Turbolift’s activation is not merely functional but symbolic—it
      represents Data’s calculated withdrawal from the bridge, leaving the crew stranded
      and powerless. Its doors close behind him, sealing his departure and underscoring
      the finality of his takeover. The Turbolift’s role in this event is twofold:
      it facilitates Data’s consolidation of power by removing him from the immediate
      scene of conflict, and it isolates the bridge crew, preventing them from pursuing
      him in the short term.'
