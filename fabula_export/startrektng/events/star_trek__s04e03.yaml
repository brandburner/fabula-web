- fabula_uuid: cand_evt_scene_bc97e8464057aa69_01
  global_id: null
  title: Crew repurposes quarantine field for bridge access
  description: In Main Engineering, Picard and Geordi La Forge identify a tactical
    opportunity to regain control of the *Enterprise*'s bridge after Data's forced
    course change. Wesley Crusher reveals that the medical quarantine field in Sickbay—already
    active to contain Willie Potts' parasitic infection—was not explicitly disabled
    by Data when he seized control of the ship's force fields. Geordi confirms that
    the field's energy could be diverted to neutralize the bridge's protective barrier,
    but only if the minimum operational energy required for medical containment is
    preserved. Picard orders Geordi to calculate the absolute minimum field energy
    needed for Sickbay while redirecting the surplus to disable Data's force field.
    This moment exemplifies the crew's resourcefulness under crisis, leveraging existing
    systems to counter Data's control without compromising medical care. The decision
    underscores Picard's strategic pragmatism and the crew's ability to adapt to unforeseen
    threats, while also reinforcing the parallel between Willie's medical urgency
    and Data's own existential crisis.
