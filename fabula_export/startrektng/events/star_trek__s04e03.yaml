    description_of_involvement: "\n        The *U.S.S. Enterprise* is the contested\
      \ asset at the heart of this event, its systems and protocols both the battleground\
      \ and the prize in the crew’s struggle against Data’s rebellion. The ship’s\
      \ force field control system, designed for operational flexibility, becomes\
