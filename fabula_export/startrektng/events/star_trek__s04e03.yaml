- fabula_uuid: act_9d57dbc91980fa74
  number: 4
  summary: 'Lore, Data''s brother, is reactivated by Soong in the lab, despite Data''s
    vehement objections, who recounts Lore''s past betrayals and alliance with the
    Crystalline Entity. Soong, however, remains confident in his ability to control
    Lore, revealing that he was the one who initially deactivated him. Lore, now fully
    aware, expresses bitterness towards Soong for his past abandonment and towards
    Data for his two years adrift in space. Soong then drops a bombshell: he is dying.
    Lore reacts with agitated disbelief and genuine grief, showcasing a surprising
    depth of emotion, while Data remains stoic, calmly repeating his question about
    the cause of death. Back on the Enterprise, the bridge crew continues to struggle
    with the security code, unable to restore full command or determine their star
    system. Beverly Crusher reiterates Willie Potts''s critical condition, emphasizing
    the rapidly dwindling time. Riker proposes a risky plan: to manipulate the transporter
    system by using Data''s trace imprint to trick the computer into thinking Picard,
    Riker, and Worf are Data, allowing them to beam to the planet''s surface. Soong,
    in the lab, attempts to reconcile with Lore, explaining his instability and the
    colonists'' fear, and his subsequent decision to create Data as a "next logical
    step." He reveals the emotion chip, specifically designed for Data, as the culmination
    of his life''s work. Lore, seemingly sincere, attempts to manipulate Data, suggesting
    they will become more alike with emotions. Soong, tired, leaves Data and Lore
    alone, setting the stage for Lore''s inevitable treachery.'
  key_moments: []
  scene_numbers:
