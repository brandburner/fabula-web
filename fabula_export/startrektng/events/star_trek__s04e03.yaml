      and cut off from the outside universe—mirroring the isolation he imposes on
      Data.
    access_restrictions: Restricted to Soong and those he summons (e.g., Data via
      the homing circuit). The automatic doors and remote location ensure that Data
      cannot easily leave or be rescued by the *Enterprise*.
    key_environmental_details:
    - Dim, shadowy lighting that casts long shadows across the cluttered equipment.
