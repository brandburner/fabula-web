      shut. Soong then uses the same tool to probe inside Data's mouth, producing
      sharp clicking sounds as he manipulates internal mechanisms. The communicator
      is rendered inoperative, symbolizing Soong's severing of Data's link to the
      *Enterprise* and his autonomy. Data repeatedly attempts to use it to contact
      the ship, but it emits only static silence, underscoring his isolation.
    status_before_event: Functional; Data uses it to communicate with the *Enterprise*
      prior to his arrival on Soong's planet.
