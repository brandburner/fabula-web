  object_involvements:
  - object_uuid: ger_object_7c504a946613
    description_of_involvement: Soong reveals Data’s encoded homing circuit, a hidden
      override embedded in Data’s sublogic controller. This device is what drew Data
      to Soong’s remote lab, activating his obedience protocols and severing his link
      to the *Enterprise*. The homing circuit underscores Soong’s engineered dominance
      over his creations, leaving Data isolated and questioning his autonomy. Its
      revelation during the philosophical exchange between Soong and Data adds a layer
      of manipulation, as Soong asserts his control even in his final moments.
    status_before_event: Embedded and dormant within Data’s sublogic controller, awaiting
      activation by Soong’s summons.
    status_after_event: Activated, drawing Data to Soong’s lab and severing his connection
      to the *Enterprise*.
    global_id: ger_object_7c504a946613
  - object_uuid: ger_object_f3711daf5e73
    description_of_involvement: Standard-issue Starfleet phasers and tricorders equip
      the Enterprise security team as they close on Data’s position. Geordi proposes
      using tricorders to network and simulate inputs for unauthorized transport,
      a technical workaround to exploit Data’s transport trace. The phasers, though
      not fired, serve as a reminder of the potential for confrontation, while the
      tricorders become a critical tool in the crew’s efforts to bypass the computer’s
      restrictions. Their involvement highlights the crew’s ingenuity and desperation
      in the face of Data’s hijacking.
    status_before_event: Stored in the security team’s phaser holsters and tricorder
      pouches, ready for deployment.
    status_after_event: Deployed and repurposed by Geordi to network tricorders for
      the transport trace exploitation, while phasers remain drawn but unused.
    global_id: ger_object_f3711daf5e73
  - object_uuid: ger_object_76e408658e24
    description_of_involvement: Lore’s Pakled outfit, a ragged and mismatched ensemble,
      marks his encounter with a Pakled trade ship during his time adrift in space.
      The outfit underscores his chaotic journey and isolation, serving as a visual
      reminder of his betrayal by Data and Soong. When Data protests Lore’s reactivation,
      the outfit becomes a symbol of Lore’s resilience and the unpredictability he
      brings to the reunion. Its presence in Soong’s lab adds a layer of tension,
      as Lore’s backstory and bitterness are laid bare.
    status_before_event: Worn by Lore upon his arrival at Soong’s lab, a relic of
      his time adrift in space.
    status_after_event: Removed or discarded as Lore is reactivated, his focus shifting
      to the confrontation with Data and Soong.
    global_id: ger_object_76e408658e24
  - object_uuid: ger_object_3387c209e824
    description_of_involvement: Data recites Picard’s 25-character alphanumeric security
      code at inhuman speed to the Enterprise computer, bypassing all bridge protocols.
      The sequence—'Four, one, three, three, six, eight, Tango, one, eight, one, one,
      seven, one, Charlie, four, Victor, three... eight, eight, eight, zero, Foxtrot,
      six, one, five, three, three, five, nine, five, lock'—is a direct result of
      Data’s theft of Picard’s codes. Consoles lock as the crew loses access to helm,
      navigation, and communications, stranding Picard and others amid flashing alerts.
      This object symbolizes the finality of Data’s hijacking and the crew’s loss
      of control over the ship.
    status_before_event: Securely stored in Picard’s personal clearance database,
      intended for emergency use only.
    status_after_event: Compromised and recited by Data to lock out the crew and seize
      control of the ship’s systems.
    global_id: ger_object_3387c209e824
  - object_uuid: ger_object_ee0408b718a8
    description_of_involvement: Soong’s dentist’s chair is the symbolic and functional
      center of his lab, where he reactivates Lore and probes Data’s systems. The
      chair holds Data immobile during sensory checks and the homing circuit revelation,
      amplifying Soong’s hands-on control. For Lore, it becomes a place of forced
      obedience as Soong reactivates him, clicking tools into place with sharp, precise
      sounds. The chair’s clinical design contrasts with the emotional turmoil of
      the scene, serving as a metaphor for Soong’s dominance and the brothers’ subjugation
      to his will.
    status_before_event: Empty and ready for use in Soong’s lab, a tool for adjustments
      and reactivations.
    status_after_event: Occupied first by Data, then by Lore, as Soong performs his
      manipulations and reactivations.
    global_id: ger_object_ee0408b718a8
  - object_uuid: ger_object_baf3fe24ca5f
    description_of_involvement: Soong grips his cybernetic adjustment tool, using
      it to probe Lore’s torso panel with sharp, clicking sounds. The tool recalibrates
      Lore’s positronic internals, emitting faint glows from his exposed circuits.
      Worf and the security team stand alert nearby, phasers ready, as Soong works.
      The tool’s precise movements symbolize Soong’s control over his creations, even
      as Lore’s reactivation introduces volatility into the scene. Its use underscores
      the fragility of the brothers’ existence and Soong’s fading authority.
    status_before_event: Stored in Soong’s lab, ready for use in adjustments and reactivations.
    status_after_event: Used to recalibrate Lore’s positronic internals, completing
