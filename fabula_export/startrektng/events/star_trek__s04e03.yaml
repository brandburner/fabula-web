    global_id: ger_object_76e408658e24
  - object_uuid: ger_object_3387c209e824
    description_of_involvement: Data recites Picard’s 25-character alphanumeric security
      code at inhuman speed to the Enterprise computer, bypassing all bridge protocols.
      The sequence—'Four, one, three, three, six, eight, Tango, one, eight, one, one,
      seven, one, Charlie, four, Victor, three... eight, eight, eight, zero, Foxtrot,
      six, one, five, three, three, five, nine, five, lock'—is a direct result of
      Data’s theft of Picard’s codes. Consoles lock as the crew loses access to helm,
      navigation, and communications, stranding Picard and others amid flashing alerts.
      This object symbolizes the finality of Data’s hijacking and the crew’s loss
      of control over the ship.
    status_before_event: Securely stored in Picard’s personal clearance database,
      intended for emergency use only.
    status_after_event: Compromised and recited by Data to lock out the crew and seize
      control of the ship’s systems.
