  title: Riker exposes Jake’s guilt and reveals his own trauma
  description: "\n  In the observation lounge, Riker interrogates Jake Potts about\
    \ the prank that nearly killed his brother Willie, forcing the boy to confront\
    \ the consequences of his actions. Jake, trembling and defensive, recounts how\
    \ he tricked Willie into thinking he’d shot him with a real weapon, leading Willie\
    \ to flee into a cove palm forest where he ingested a parasitic fruit. Riker’s\
    \ cold, methodical questioning—highlighting the medical emergency and the crew’s\
    \ diverted mission—escalates Jake’s guilt, while his own visceral reaction to\
    \ practical jokes reveals a personal aversion rooted in past trauma. Troi observes\
    \ the exchange, noting Jake’s fear, but Riker dismisses her empathy, prioritizing\
    \ Willie’s survival. The scene ends with Riker assigning Data to escort Jake to\
    \ Willie’s quarantine, a tactical move to stabilize morale while subtly reinforcing\
    \ Jake’s isolation. The dialogue underscores the crew’s shared emotional stakes\
    \ amid Data’s crisis, foreshadowing how personal histories (like Riker’s) collide\
    \ with the mission’s urgency.\n  "
