  global_id: null
  title: Soong tests Data’s obedience and control
  description: In Soong’s isolated lab, Data—disoriented and unaware of how he arrived—is
    subjected to a series of seemingly arbitrary tests by his creator, Dr. Noonian
    Soong. Soong, who reveals himself as alive after years of presumed death, evades
    Data’s questions about the purpose of his summons while probing Data’s physical
    and sensory capabilities (e.g., balancing on one leg, detecting humidity). The
    tests serve as a psychological assessment, demonstrating Soong’s manipulative
    control over his creation and foreshadowing deeper layers of deception. Data,
    confused and insistent on contacting the *Enterprise*, is met with Soong’s dismissive
    reassurances and cryptic remarks, including the revelation of an encoded homing
    circuit in Data’s sublogic controller. The exchange underscores Soong’s arrogance
    and Data’s vulnerability, setting up the emotional and ethical stakes of their
    reunion. The scene also hints at Soong’s hidden agenda—his desire to grant Data
    emotions—while establishing his manipulative nature and the power imbalance between
    creator and creation.
