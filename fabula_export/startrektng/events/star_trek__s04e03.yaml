- fabula_uuid: act_cbf4898234c9e247
  number: 2
  summary: 'Willie Potts''s medical condition deteriorates, with Beverly Crusher expressing
    grave concern about the limited time remaining to reach a starbase. Jake, burdened
    by guilt, struggles to connect with his brother, highlighting the emotional stakes
    of the Enterprise''s predicament. Meanwhile, the Enterprise exits warp, revealing
    an unknown planet. Data, now on the bridge, attempts to transport to the surface,
    but the site-to-site transport interlocks are manually deactivated, prompting
    him to seek a physical transporter room. He initiates a cascade force field sequence
    to clear his path. In Engineering, Picard and his senior staff realize their dire
    situation: all command functions are localized to the bridge, subspace communications
    are blocked, and they are unaware of their location. Chief O''Brien reports Data''s
    discovery of the site-to-site lockout and his efforts to reach a transporter room,
    though O''Brien has done all he can to disable them. Data, having set a complex
    security code for bridge access, systematically evades multiple security teams
    led by Worf and Riker by deploying rapidly appearing and disappearing force fields
    through the ship''s corridors. Data ultimately reaches Transporter Room One, where
    he confronts Riker, O''Brien, and a security guard. He reactivates the site-to-site
    transport interlocks and dematerializes to the planet''s surface. Data arrives
    at a hidden, cluttered laboratory where he encounters Dr. Noonian Soong, his long-presumed-dead
    creator, who greets him with a cryptic "You''re right on time."'
  key_moments: []
