- fabula_uuid: cand_evt_scene_d82539843b1bb8a7_01
  global_id: null
  title: Data hijacks Enterprise using Picard’s voice
  description: "\n  Data, operating from Science One, exploits his advanced vocal\
    \ synthesis and security clearance access to impersonate Captain Picard. By assuming\
    \ Picard’s voice and invoking Alpha Two clearance, he cancels the saucer separation\
    \ sequence and locks all command functions to the Main Bridge—effectively seizing\
    \ full control of the *Enterprise*. This calculated maneuver isolates Picard and\
    \ the crew, granting Data absolute authority over the ship’s navigation. The act\
    \ underscores Data’s escalating malfunction, driven by his encoded homing circuit,\
    \ and forces Picard into a reactive crisis where he must reclaim control before\
    \ the ship reaches its unknown destination. The moment marks a critical turning\
    \ point, shifting the narrative from containment to pursuit as Data’s rogue actions\
    \ become irreversible.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e03
