      clinical, and reminiscent of medical or dental equipment—reinforces the power
      dynamic between Soong and Data. It positions Data as a patient (or a specimen)
      under Soong’s care, emphasizing his vulnerability and Soong’s role as the one
      in control. The chair’s central placement in the lab further underscores its
      significance as the site of Data’s isolation and manipulation.
    status_before_event: Empty and ready for use, positioned in the center of Soong’s
