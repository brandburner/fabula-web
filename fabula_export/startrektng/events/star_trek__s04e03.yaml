      barrier, sealing the Main Bridge turbolift doors and service crawlways to prevent
      the crew from regaining access. Worf reports their establishment, and their
      presence is implied throughout the scene as the crew scrambles to find an alternative
      route to the bridge. These force fields are not just obstacles but symbols of
