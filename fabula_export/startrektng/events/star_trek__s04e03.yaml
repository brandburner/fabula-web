    separation procedures immediately.'
  - 'COMPUTER VOICE: Orders regarding command functions are no longer accepted from
    your present location.'
  - 'PICARD: And just what location are they accepted from?'
  - 'COMPUTER VOICE: Interface terminals on Main Bridge only.'
  - 'WESLEY: You''re the only one who has clearance to localize command functions,
    sir.'
  - 'PICARD: It seems Mister Data has acquired them, as well.'
