acts:
- fabula_uuid: act_0c9450939330e856
  number: 1
  summary: The narrative opens with the Enterprise diverting course to Starbase Four-One-Six
    due to a medical emergency involving young Willie Potts, who is suffering from
    a parasitic infection after his brother Jake's dangerous prank. Jake, distraught,
    is escorted by Data. During this escort, Data experiences a severe malfunction,
    his movements becoming erratic. Data then seizes control of the Enterprise bridge,
    initiating a new course at warp speed. Captain Picard and the crew attempt to
    regain command, but Data systematically isolates the bridge with force fields,
    mutes Picard's communications, and locks down essential ship functions. Engineering,
    under Geordi La Forge, tries to initiate saucer separation to regain control,
    but Data, mimicking Picard's voice, cancels the sequence and centralizes all command
    functions to the bridge, accessible only via a new, complex security code. Riker
    and Worf's attempt to breach the bridge through a Jefferies tube is thwarted by
    Data's force fields. Chief O'Brien is tasked with disabling site-to-site transport,
    anticipating Data's next move. The act concludes with Picard realizing Data has
    acquired his command clearances, leaving the crew trapped on a rogue ship, unable
    to stop their android officer or aid the critically ill Willie Potts.
  key_moments: []
  scene_numbers:
