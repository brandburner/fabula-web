    global_id: ger_object_baf3fe24ca5f
  - object_uuid: ger_object_06c3edabef74
    description_of_involvement: Soong’s emotion chip, stolen by Lore, is a positronic
      device designed to grant Data human-like emotions. Its theft and installation
      in Lore amplify his emotional volatility, fueling the instability that defines
      his character. The chip is revealed after Soong revives Data, who learns of
      its loss alongside his restored memories. Its absence underscores the brothers’
      divergent paths—Data’s logical detachment versus Lore’s chaotic emotions—and
