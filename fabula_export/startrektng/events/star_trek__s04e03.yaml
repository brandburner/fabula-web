- fabula_uuid: cand_evt_scene_afe2567fa2afe148_02
  global_id: null
  title: Riker proposes high-risk transport workaround
  description: 'With the *Enterprise* locked on an unauthorized course toward an unknown
    planet, Picard, Riker, and Geordi urgently debate countermeasures on the bridge.
    Worf reports sensor access but reveals a human lifeform on the planet’s surface
    and an uncrewed vessel entering orbit, heightening the mystery. Geordi confirms
    the ship’s systems are locked under Data’s Alpha Two clearance, leaving the crew
    unable to override commands. Riker proposes a daring workaround: exploiting Data’s
    residual transport trace to beam a team to the planet’s surface, bypassing the
    ship’s compromised computer locks. Geordi outlines a technical plan involving
    tricorder networking and simulated test conditions, while Picard authorizes the
    risky maneuver. The plan hinges on exploiting a vulnerability in the system, but
    its success could mean the difference between regaining control and being at the
    mercy of Data’s mysterious summons. The scene blends immediate operational chaos
    with ominous discoveries, foreshadowing deeper connections to Data’s actions and
    the looming reunion with Lore. Beverly’s earlier warning about Willie Potts’s
    deteriorating condition adds urgency, reinforcing the crew’s desperation to act
    quickly.'
