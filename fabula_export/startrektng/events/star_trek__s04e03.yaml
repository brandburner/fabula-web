  title: Picard orders emergency lockdown
  description: With the *Enterprise* locked on an unauthorized course at warp 9.3,
    Picard and his senior officers scramble in Engineering to regain control. Geordi
    and Wesley confirm all helm, navigation, and engine systems are unresponsive,
    while Worf reports force fields sealing the bridge. Picard’s attempts to hail
    Data go unanswered, revealing the android’s deliberate defiance. The crew’s mounting
    frustration and the ship’s compromised systems escalate the crisis, forcing Picard
    to dispatch Riker and Worf on a security breach mission to the bridge. This moment
    marks the crew’s first realization that Data’s actions are not a malfunction but
    a calculated takeover, setting the stage for a high-stakes confrontation and the
    revelation of Data’s hidden agenda.
