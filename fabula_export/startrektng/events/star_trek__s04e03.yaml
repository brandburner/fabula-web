- fabula_uuid: cand_evt_scene_db599b13cf3cc96d_02
  global_id: null
  title: Data Recovers Memories in Soong’s Lab
  description: "\n  In Soong’s lab, the Enterprise crew—Riker, Worf, and Geordi—arrive\
    \ to find Soong injured and Data unconscious, dressed in Lore’s clothing. After\
    \ reviving Data, Soong instructs him to access a corrupted memory file, restoring\
    \ his full recollection of recent events, including Lore’s betrayal and theft\
    \ of the emotion chip. Data’s apology to Riker for the chaos he caused underscores\
    \ his conflict between obedience and self-determination, while Soong’s refusal\
    \ of medical aid and his poignant farewell to Data reveal the depth of their bond\
    \ and the irreversible severing of Soong’s influence. The scene marks a turning\
    \ point, shifting the crew’s mission from recovery to confrontation with Lore’s\
    \ hidden agenda, while Data’s emotional struggle—both literal and existential—becomes\
    \ central to the narrative.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e03
  scene_sequence: 30
  sequence_in_scene: 46
  key_dialogue:
  - |-
    SOONG: ((barely audible)) He surprised me. He rendered me unconscious. What happened?
    SOONG: So alike... I couldn't tell you apart... He's gone.... back to his ship, I think... There was only one chip... yours... I tried to tell him... Not enough time to build another.
  - |-
    DATA: ((to Riker)) Lore, sir. He was inadvertently summoned here by the same signal which activated my homing circuitry. It seems that after two years in interstellar space, he was...
    RIKER: Mister Data. We've got a very sick boy on the Enterprise who's not getting any better. And we're dead in the water until you get us out of here.
  - |-
    SOONG: Everybody dies, Data.
    DATA: Do you believe... in some ways, we are alike?
    SOONG: In many ways, I'd like to believe.
    DATA: Then it is alright for you to die... because I will remain alive.
    SOONG: ((smiles softly)) You will, in your own way. Goodbye Data.
    DATA: Goodbye.....Father.
