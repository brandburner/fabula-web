  object_involvements:
  - object_uuid: ger_object_b4581da2379e
    description_of_involvement: 'Data’s force field is the physical manifestation
      of his control over the Enterprise’s systems. It materializes as a three-meter
      cross-seal, separating the transporter pad from the rest of the room and trapping
      Riker, O’Brien, and the security guard. The field is impenetrable from the front,
      as Riker discovers when he is zapped upon touching it. However, O’Brien later
      realizes it only extends across the front of the pad, leaving the rear exposed—a
      critical oversight that could have allowed security to breach it. The force
      field symbolizes Data’s dominance: it is both a barrier and a statement of his
      unchecked authority over the ship’s infrastructure. Its presence underscores
      the crew’s helplessness, as their phasers and physical efforts are rendered
      useless.'
    status_before_event: Inactive; the transporter room’s force fields are not engaged
      prior to Data’s command.
    status_after_event: Active and locked in place, blocking access to the transporter
      pad from the front. The rear remains unshielded, though this is discovered too
      late to matter.
    global_id: ger_object_b4581da2379e
  - object_uuid: ger_object_f3711daf5e73
    description_of_involvement: The security team’s phasers are raised in a futile
      gesture of threat, symbolizing the crew’s attempt to assert physical control
      over Data. Riker’s phaser is the most prominently featured, as he aims it at
      Data before the force field is activated. O’Brien warns against firing, citing
      the risk of phase coil ricochets—a technical detail that underscores the phasers’
      uselessness against Data’s force field. The phasers remain holstered or lowered
      throughout the rest of the event, their threat neutralized by Data’s superior
      access to the ship’s systems. Their presence serves as a visual reminder of
      the crew’s inability to physically intervene.
    status_before_event: Armed and ready; the security guard and Riker have their
      phasers drawn, prepared to fire if necessary.
    status_after_event: Lowered and ineffective; the force field renders them useless,
      and the crew’s focus shifts to technical countermeasures.
    global_id: ger_object_f3711daf5e73
  - object_uuid: ger_object_987a698e3841
    description_of_involvement: 'The Enterprise transporter console is the focal point
      of Data’s technical manipulation. O’Brien monitors it as Data approaches, but
      the console is already compromised: Data has disabled the primary power bus
      and erected force fields around the secondary circuits, blocking interference.
      Data does not interact directly with the console’s interface; instead, he accesses
      the wall panel to rearrange the isolinear chips, reactivating the site-to-site
      transport interlocks. The console’s hum and glowing panels serve as a backdrop
      to the crew’s frustration, a silent witness to their inability to stop Data.
      Its state reflects the ship’s vulnerability to Data’s override, highlighting
      the crew’s loss of control over the transporter systems.'
    status_before_event: Compromised; the primary power bus is disabled, and force
      fields are erected around secondary circuits, preventing repairs or interference.
    status_after_event: Functional but locked under Data’s control; the site-to-site
      transport interlocks are reactivated, enabling his escape.
    global_id: ger_object_987a698e3841
  - object_uuid: ger_object_2c211493ca07
    description_of_involvement: The wall panel in the transporter room is Data’s direct
      access point to the ship’s systems. He pries it open with mechanical precision,
      revealing a compartment packed with isolinear chips. His rearrangement of these
      chips reactivates the site-to-site transport interlocks, a critical move that
      enables his escape. The panel’s access is unguarded, reflecting the crew’s lack
      of foresight in securing it. O’Brien and Riker watch helplessly as Data completes
      the override, their inability to stop him underscored by the panel’s exposed
      vulnerability. The sparks flickering from the panel as Data works symbolize
      the ship’s systems yielding to his control, a visual metaphor for the crew’s
      loss of agency.
    status_before_event: Sealed and unremarkable; the panel is part of the transporter
      room’s standard infrastructure, unnoticed until Data acts.
    status_after_event: Open and tampered with; the isolinear chips are rearranged,
      and the panel remains accessible, though its purpose has been served.
    global_id: ger_object_2c211493ca07
  - object_uuid: ger_object_b39fac7956f4
    description_of_involvement: The transporter pad is the stage for Data’s escape
      and the crew’s helplessness. Riker, O’Brien, and the security guard stand on
      it as Data enters, their phasers raised in a futile display of force. Data activates
      a force field that separates the pad from the rest of the room, trapping the
      crew. O’Brien later tests the field’s limits by touching the wall behind the
      pad, discovering it only extends across the front. This realization—though too
      late—highlights the pad’s role as both a battleground and a symbol of the crew’s
      confinement. Data stands on the pad to dematerialize, using it as the launchpoint
      for his escape. The pad’s glowing surface and humming energy reinforce the tension,
      serving as a visual metaphor for the crew’s trapped position and Data’s unchecked
      power.
    status_before_event: Active and energized; the pad is ready for transport operations,
