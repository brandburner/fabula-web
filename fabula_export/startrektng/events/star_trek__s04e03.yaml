  title: Riker interrogates Jake over prank consequences
  description: "\n  In the observation lounge, Riker and Troi confront Jake Potts\
    \ about the prank that led to his younger brother Willie’s parasitic infection.\
    \ Jake, visibly trembling, recounts how he filled a balloon with red dye and staged\
    \ a fake laser duel to scare Willie, only for Willie to flee into the forest and\
    \ ingest cove palm fruit—an act that exposed him to deadly parasites. Riker methodically\
    \ dismantles Jake’s justifications, forcing him to acknowledge the severity of\
    \ his actions. The interrogation reveals Jake’s guilt and fear, while Riker’s\
    \ cold precision underscores the moral stakes: Jake’s recklessness nearly cost\
    \ Willie his life. The scene culminates with Riker ordering Data to escort Jake\
    \ to Willie’s quarantine, framing the confrontation as both a disciplinary measure\
    \ and a test of Jake’s capacity for empathy. Troi’s observation of Jake’s fear\
    \ contrasts with Riker’s focus on Willie’s survival, highlighting the duality\
    \ of consequence and responsibility. This moment serves as a microcosm of the\
    \ *Enterprise*’s broader crisis—where unchecked impulses (like Data’s malfunction)\
    \ can spiral into life-threatening outcomes, mirroring Jake’s prank and its unintended\
    \ fallout.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e03
  scene_sequence: 1
  sequence_in_scene: 1
  key_dialogue:
  - 'RIKER: So you made your nine-year-old brother think he killed you?'
  - 'RIKER: And while he was hiding he ate the fruit of a cove palm. Are you familiar
    with the condition upon which I agreed to allow you two boys to remain on the
    Enterprise when your parents went on sabbatical?'
  - 'JAKE: That we''d stay out of trouble, sir.'
  - 'RIKER: Think about it, Mister Potts. And while you''re at it, think about what
    might have happened had we not been this close to a starbase medical facility.'
