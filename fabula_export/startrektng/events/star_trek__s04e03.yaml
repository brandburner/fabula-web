  object_involvements:
  - object_uuid: ger_object_7c504a946613
    description_of_involvement: Soong reveals Data’s encoded homing circuit, a hidden
      override embedded in Data’s sublogic controller. This device is what drew Data
      to Soong’s remote lab, activating his obedience protocols and severing his link
      to the *Enterprise*. The homing circuit underscores Soong’s engineered dominance
      over his creations, leaving Data isolated and questioning his autonomy. Its
      revelation during the philosophical exchange between Soong and Data adds a layer
      of manipulation, as Soong asserts his control even in his final moments.
