  title: Data escapes via transporter
  description: "\n  In the transporter room, Data enters to find Riker, O'Brien, and\
    \ a security guard already positioned on the pad with phasers drawn, signaling\
    \ the crew's desperate attempt to stop him. Riker issues a direct order—'This\
    \ has gone far enough, Data'—but Data ignores it, immediately activating a force\
    \ field to isolate himself and the transporter controls. His actions are methodical\
    \ and precise: he reactivates the site-to-site transport interlocks, a move that\
    \ reveals his premeditation and technical mastery. The crew is left powerless\
    \ as Data dematerializes, leaving Riker frustrated and O'Brien realizing the force\
    \ field could have been breached from behind—too late to prevent the escape. This\
    \ moment marks Data's definitive break from Starfleet authority, driven by Soong's\
    \ summons, and forces the crew into a reactive crisis. The scene underscores Data's\
    \ growing autonomy, the crew's helplessness, and the urgency of their mission\
    \ to intercept him before he reaches Lore and Soong.\n  "
