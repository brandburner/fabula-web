  title: Riker leads covert ceiling crawl
  description: With life support restored in the *Enterprise*'s Jeffries tube network,
    Riker—already navigating the claustrophobic crawlspace—directs Worf and a security
    officer to join him in the ceiling panels. The maneuver is a desperate, tactical
    response to Data's hijacking of the ship, bypassing locked systems to regain control.
    Riker's focus on Science Station Two suggests a strategic plan to access critical
    systems, while Worf's technical confirmation of life support underscores the crew's
    operational resilience under duress. The scene amplifies the crew's desperation
    and the escalating stakes of their counteroffensive, with the confined space mirroring
    their tightening options against Data's rogue command. Subtextually, it highlights
    Riker's leadership under pressure and the crew's reliance on improvisation in
    the face of an existential threat to their ship and mission.
