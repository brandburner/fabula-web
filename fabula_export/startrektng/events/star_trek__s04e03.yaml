- fabula_uuid: cand_evt_scene_db599b13cf3cc96d_03
  global_id: null
  title: Soong’s Final Moments and Data’s Farewell
  description: "\n  In Soong’s lab, the Enterprise crew—Riker, Geordi, and Worf—arrive\
    \ to find Soong barely conscious after Lore’s betrayal and Data unconscious in\
    \ Pakled clothing. Riker resets Data, who regains full memory and learns Lore\
    \ stole the emotion chip. Soong, refusing medical aid, insists on dying in his\
    \ lab, rejecting Data’s plea to return to the Enterprise for treatment. When Data\
    \ requests a private farewell, Soong acknowledges their bond, calling Data his\
    \ son in a rare moment of vulnerability. Data, though incapable of human grief,\
    \ reciprocates with the word *‘Father,’* marking the irreversible severing of\
    \ Soong’s influence. The exchange underscores Data’s emerging autonomy while Soong’s\
    \ death symbolizes the end of his control over his creation. The scene closes\
    \ with Picard’s log confirming Willie Potts’ recovery, subtly contrasting human\
    \ resilience with Data’s existential reckoning.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e03
  scene_sequence: 30
  sequence_in_scene: 47
  key_dialogue:
  - |-
    SOONG: Everybody dies, Data.
    DATA: Do you believe... in some ways, we are alike?
    SOONG: In many ways, I'd like to believe.
    DATA: Then it is alright for you to die... because I will remain alive.
  - |-
    SOONG: You know I cannot grieve for you.
    DATA: You will, in your own way.
    SOONG: Goodbye Data.
    DATA: Goodbye.....Father.
  - |-
    SOONG: No, no, no. I'll be fine.
    GEORDI: With all due respect, sir, you don't look fine to me.
    SOONG: I've lived here a long time, young man. I have no plans of dying anywhere else.
