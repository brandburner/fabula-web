  title: Data locks down the Enterprise
  description: "\n  The crisis escalates as Picard and the crew in Engineering discover\
    \ the Enterprise is locked into an unauthorized warp trajectory at 9.3, with all\
    \ helm controls unresponsive. Geordi confirms the ship's systems are fully compromised—life\
    \ support failures on Deck One, force fields sealing the bridge, and manual overrides\
    \ failing. Picard's direct order to stop the ship is ignored, revealing Data's\
    \ deliberate takeover. Riker and Worf are dispatched to breach the bridge from\
    \ below, while Geordi and Wesley confirm total system lockdown. The scene culminates\
    \ in Picard's frustrated hail to Data, marking the first overt confrontation between\
    \ captain and rogue android. The tension hinges on Picard's realization that Data\
    \ is no longer following orders but executing a premeditated, external-driven\
    \ agenda—setting up the crew's desperate race to reclaim control before the ship\
    \ reaches its unknown destination.\n  "
