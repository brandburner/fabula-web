- fabula_uuid: act_9bae438d5397e606
  number: 3
  summary: In Soong's lab, Data awakens with no memory of his journey, prompting Soong
    to reveal his survival after faking his death and his use of an encoded homing
    circuit to summon Data. Data, attempting to contact the Enterprise, finds his
    communicator useless. Soong, observing Data's features, confirms his identity
    as Data's creator and playfully tests Data's advanced sensory capabilities. Data,
    still confused, presses Soong for the "why" behind his summoning. Soong explains
    his desire to give Data the capacity for emotions, a long-held ambition. Simultaneously,
    on the Enterprise, the crew makes limited progress regaining control. Geordi and
    Wesley discover that while Data transferred command functions to the bridge, he
    only specified fields he planned to initiate, leaving the Sickbay quarantine field
    accessible. Picard orders the diversion of minimal necessary power from the quarantine
    field to breach the bridge's force field. Beverly Crusher warns that Willie Potts
    has less than 36 hours to live, intensifying the urgency. Picard, Riker, and Worf
    successfully regain access to the bridge, but still require a security code to
    restore full command functions. Worf detects a single human lifeform on the planet
    and an uncrewed vessel entering orbit. Soong engages Data in a philosophical discussion
    about human fascination with the past and the desire for continuity, subtly hinting
    at Data's own "immortality" through his existence. The act culminates with the
    dramatic arrival of Lore, Data's malevolent brother, also summoned to Soong's
    lab in a dazed state, setting the stage for a tense family reunion.
  key_moments: []
  scene_numbers:
