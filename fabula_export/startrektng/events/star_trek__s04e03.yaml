- fabula_uuid: cand_evt_scene_db599b13cf3cc96d_01
  global_id: null
  title: Lore’s Betrayal and Soong’s Final Words
  description: "\n  The Away Team—Riker, Worf, and Geordi—burst into Soong’s lab to\
    \ find the scientist injured and Data unconscious, dressed in Lore’s clothing.\
    \ After reviving Data, Soong reveals Lore’s theft of the emotion chip and his\
    \ escape, confirming the full scope of the crisis: Data’s malfunction was orchestrated\
    \ by his malevolent brother. The scene pivots from recovery to confrontation as\
    \ Soong, dying, shares a poignant farewell with Data, acknowledging their shared\
    \ humanity despite Data’s inability to grieve. The revelation of Lore’s betrayal\
    \ and the stolen chip shifts the crew’s mission from rescue to urgent pursuit,\
    \ while Soong’s death underscores the cost of his creations’ conflict. The emotional\
    \ weight of the moment—Data’s whispered 'Father'—contrasts with the cold reality\
    \ of Lore’s actions, deepening the stakes for the crew and the android’s future.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e03
  scene_sequence: 30
  sequence_in_scene: 45
  key_dialogue:
  - 'SOONG: ((barely audible)) So alike... I couldn''t tell you apart... He''s gone....
    back to his ship, I think... There was only one chip... yours... I tried to tell
    him... Not enough time to build another.'
  - |-
    DATA: ((whispering)) Do you believe... in some ways, we are alike?
    SOONG: In many ways, I'd like to believe.
    DATA: Then it is alright for you to die... because I will remain alive.
    SOONG: ((smiles softly)) You will, in your own way. Goodbye Data.
    DATA: Goodbye.....Father.
  - 'RIKER: Mister Data. We''ve got a very sick boy on the Enterprise who''s not getting
    any better. And we''re dead in the water until you get us out of here.'
