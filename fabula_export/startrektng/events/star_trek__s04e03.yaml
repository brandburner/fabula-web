  object_involvements:
  - object_uuid: ger_object_9f823505c750
    description_of_involvement: Data’s communicator is the first object Soong targets
      to isolate Data from the *Enterprise*. Soong opens it, exposing its micro-circuitry,
      and uses a metallic tool to disable its function. When Data attempts to contact
      the ship, the communicator emits only static silence, confirming Soong’s sabotage.
      The communicator symbolizes Data’s connection to Starfleet and his crew, and
      its disablement is a literal and metaphorical severing of his ties to the *Enterprise*.
      Its broken state underscores Data’s vulnerability and Soong’s control over his
      existence.
    status_before_event: Functional and fully operational, allowing Data to communicate
      with the *Enterprise* and Starfleet.
    status_after_event: Disabled and non-functional, emitting only static when Data
      attempts to use it.
    global_id: ger_object_9f823505c750
  - object_uuid: ger_object_7c504a946613
    description_of_involvement: The encoded homing circuit is revealed by Soong as
      the mechanism that summoned Data to his lab. Embedded in Data’s sublogic controller,
      it was activated by Soong to override Data’s autonomy and draw him away from
      the *Enterprise*. The circuit’s existence is a stark reminder of Soong’s engineered
      control over Data, highlighting the fragility of Data’s perceived free will.
      Soong mentions it casually, as if it were a mundane feature rather than a violation
      of Data’s agency. The circuit’s role in the event is to underscore Soong’s dominance
      and foreshadow the deeper manipulations yet to come, particularly his plan to
      reactivate Lore.
    status_before_event: Active and functional, having successfully summoned Data
      to Soong’s lab.
    status_after_event: Still active but no longer needed for its primary purpose;
      its role in the event is to reveal Soong’s control over Data.
