- fabula_uuid: cand_evt_scene_08d7e2525d5e8268_04
  global_id: null
  title: Soong reveals the homing circuit’s control
  description: "\n  In Soong’s lab, Data—disoriented and confused—awakens to find\
    \ his creator alive, having manipulated his arrival via an encoded homing circuit\
    \ in his sublogic controller. Soong, evasive and playful, deflects Data’s questions\
    \ about the *why* behind his summons, instead subjecting him to trivial tests\
    \ (balancing on one leg, detecting humidity) that reveal his obsessive, almost\
    \ paternal fixation on Data’s sensory and functional perfection. The revelation\
    \ of the homing circuit exposes Soong’s deliberate erosion of Data’s autonomy,\
    \ framing their reunion as a transaction of control rather than kinship. Data’s\
    \ insistence on contacting the *Enterprise* underscores his fractured agency,\
    \ while Soong’s cryptic hints—‘I’ve never felt too comfortable living anywhere\
    \ without a prearranged route of escape’—foreshadow his own betrayal and Lore’s\
    \ impending violence. The scene’s tension lies in the contrast between Data’s\
    \ logical confusion and Soong’s manipulative whimsy, a dynamic that underscores\
    \ the ethical stakes of creation and the cost of unchecked ingenuity.\n  "
