  title: Picard trapped in Cardassian ambush
  description: "\n  Picard, Beverly, and Worf realize too late that the empty chamber\
    \ was a deliberate Cardassian trap. As they turn to retreat, armed Cardassians\
    \ ambush them from multiple hidden positions. Worf and Beverly fight back—Worf\
    \ disarms one attacker while Beverly shoots another—but the team is overwhelmed\
    \ as reinforcements pour in. Worf is wounded by a disruptor blast and knocked\
    \ unconscious, forcing Beverly to retreat through a closing hatch. Picard, separated\
    \ from his team, is cornered and disarmed as the Cardassians close in, leaving\
    \ him captured and vulnerable to interrogation. The ambush exposes the mission’s\
    \ failure and sets up Picard’s imminent confrontation with Gul Madred, who orchestrated\
    \ the trap.\n  "
