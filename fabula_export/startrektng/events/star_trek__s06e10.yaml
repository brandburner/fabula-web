  title: Holodeck failure reveals mission fragility
  description: "\n  In a high-stakes holodeck simulation of their covert Cardassian\
    \ infiltration, Beverly Crusher and Worf execute a tactical retreat through a\
    \ cave system, only to be ambushed by a Cardassian operative. Picard freezes the\
    \ program, exposing their five-second operational lag—a critical vulnerability\
    \ in their mission readiness. The team’s frustration boils over as Picard refuses\
    \ to disclose mission specifics, leaving Beverly and Worf questioning the feasibility\
    \ of the operation and Picard’s opaque leadership. The moment underscores the\
    \ escalating tension between trust in command and the brutal realities of their\
    \ unpreparedness, while Picard’s insistence on secrecy deepens the crew’s unease\
    \ about the mission’s true objectives.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e10
  scene_sequence: 3
  sequence_in_scene: 5
  key_dialogue: &id001
  - 'PICARD: You were at least five seconds slower this time.'
  - 'WORF: Captain... it would be helpful to know something about our mission.'
  - 'PICARD: Mister Worf... I have my orders. I''m sure you understand.'
  - 'BEVERLY: Sorry. I guess I was paying too much attention to getting away from
    that last Cardassian. Or maybe it was the phaser blasts... or the falling rocks...'
  - 'PICARD: I know this is difficult. But for now, all I can do is ask you to trust
    me.'
