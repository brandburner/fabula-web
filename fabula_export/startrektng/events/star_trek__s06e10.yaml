- fabula_uuid: cand_evt_scene_fc02edc7f942b5ff_01
  global_id: null
  title: Jellico asserts command through calculated efficiency
  description: "\n  The event opens with Jellico immediately establishing his authority\
    \ over the *Enterprise* crew, beginning with a brisk, no-nonsense interaction\
    \ with Riker in the corridor. Jellico dismantles the ship’s standard three-shift\
    \ rotation without hesitation, demanding a four-shift system by that evening,\
    \ along with readiness reports and a senior staff meeting—all while subtly testing\
    \ Riker’s loyalty by referencing his past career choices. His dismissive demeanor\
    \ (e.g., cutting off Riker’s explanation of his quarters, leaving him in the corridor)\
    \ signals his preference for efficiency over rapport.\n\n  The formal transfer\
    \ of command in Ten Forward serves as a symbolic and public transition of power.\
    \ Picard’s measured reading of the order and the subsequent handshake with Jellico\
    \ underscore the gravity of the moment, but Jellico’s immediate dismissal of the\
    \ crew—‘Dismissed’—marks his impatience with ceremony. The tension escalates when\
    \ Jellico privately offers Picard covert support (a class five probe for mission\
    \ intel) but publicly humiliates Riker for questioning the four-shift order. His\
    \ cold, unyielding tone—‘You will tell the department heads... I don’t want to\
    \ talk about it’—reveals a command style rooted in control, not collaboration.\
    \ Picard’s restrained reaction (almost interceding but stopping himself) highlights\
    \ the destabilizing shift in leadership, while Jellico’s lingering doubt about\
    \ Riker’s adaptability foreshadows future friction. The event ends with Jellico’s\
    \ unsettling observation about Riker’s past service under Picard, hinting at deeper\
    \ scrutiny of the crew’s loyalties.\n  "
