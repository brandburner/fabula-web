  title: Jellico returns Picard’s Shakespeare book
  description: "\n  In the ready room, Jellico and Picard finalize mission details\
    \ before Picard’s covert departure. Jellico dismisses Riker’s competence with\
    \ a cutting remark, then bluntly asserts his ownership of the *Enterprise*—a power\
    \ play that underscores the fragility of Picard’s authority. After a tense handshake\
    \ and Jellico’s loaded ‘Good hunting,’ he stops Picard at the door and returns\
    \ his cherished Shakespeare book, a deliberate gesture of symbolic command transfer.\
    \ The exchange—silent but charged—contrasts Picard’s intellectual legacy with\
    \ Jellico’s personal anchor (a drawing of his son). Jellico’s smile and the final\
    \ look between them reveal the unspoken tension of this forced transition, framing\
    \ Picard’s exit as both a personal and strategic turning point. The moment crystallizes\
    \ the fragility of leadership and the unspoken stakes of the mission ahead.\n\
    \  "
