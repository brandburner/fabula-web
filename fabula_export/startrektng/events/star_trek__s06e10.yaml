    - Ensure Picard is taken for interrogation (implied by his removal from the chamber)
    what_happened: 'The Cardassian officer who leads Picard away does so with a deliberate
      slowness, his bootsteps echoing in the chamber. His smirk is less about individual
      triumph and more about institutional vindication—this capture is a statement.
      He doesn’t speak, but his body language is a silent taunt: *Your Federation
      is weak, and we are in control here.* Picard’s isolation is now absolute, his
      combadge and weapon gone, his team retreated.'
