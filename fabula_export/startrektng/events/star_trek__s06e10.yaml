  title: Jellico’s abrupt departure from bridge
  description: During a critical moment on the *Enterprise* bridge, Commander Riker
    informs Captain Jellico that Gul Lemec has arrived for negotiations. Jellico responds
    with a terse acknowledgment and immediately withdraws to his Ready Room, leaving
    Riker and Troi visibly unsettled by his abrupt departure. The exchange underscores
    Jellico’s unorthodox leadership style—his refusal to engage in standard diplomatic
    protocol or even acknowledge the presence of his senior officers. His abrupt exit
    signals a deliberate power play, reinforcing his dominance over the crew and foreshadowing
    his confrontational approach to command. The moment also highlights the crew’s
    discomfort with his authoritarian tactics, as Riker and Troi share a silent, puzzled
    look, suggesting their unease with the shift in leadership dynamics. This beat
    establishes Jellico’s unpredictable nature and sets up future conflicts between
    his methods and the crew’s established norms.
