  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: 'Starfleet commands the *Enterprise* through admirals
      like Nechayev, who reassigns officers including Picard to covert missions against
      Cardassian metagenic weapons. Vice Admiral Nechayev’s order relieving Picard
      of command and installing Jellico enforces hierarchical protocols: four-shift
      rotations, battle drills, uniform standards, and operational secrecy. Starfleet
      Intelligence supplies critical intel, while officers undergo rigorous holodeck
      training emphasizing precision and trust. Jellico’s militaristic efficiency
      clashes with collaborative norms during diplomatic standoffs, balancing exploration
      ideals with border defense and chain-of-command rigor. In this event, Starfleet’s
      authority is embodied in the command transfer ceremony, the PADD containing
      the order, and Jellico’s adherence to its protocols—even as his personal leadership
      style creates tension with the crew’s established dynamics.'
    active_representation: Through formal institutional protocol (the command transfer
      ceremony, the PADD order, and Jellico’s adherence to Starfleet’s hierarchical
      structure).
    power_dynamics: Exercising absolute authority over the *Enterprise* and its crew,
      enforcing compliance with Starfleet’s protocols and Jellico’s personal command
      philosophy.
    organizational_goals:
    - To ensure the smooth transfer of command from Picard to Jellico in accordance
      with Starfleet protocol.
    - To maintain operational efficiency and readiness aboard the *Enterprise* during
      the transition.
    - To support the covert mission against the Cardassian metagenic weapon while
      adhering to secrecy and chain-of-command principles.
    influence_mechanisms:
    - Through formal orders and hierarchical authority (e.g., the command transfer
      order, readiness reports, and duty rosters).
    - By enforcing operational protocols (e.g., the four-shift rotation, battle drills,
      and uniform standards).
    - Via institutional support for covert missions (e.g., the class five probe launched
      to aid Picard’s team).
    institutional_impact: The event reinforces Starfleet’s commitment to hierarchical
      discipline and operational readiness, even as Jellico’s authoritarian style
      creates friction with the crew’s established norms. The covert mission underscores
      the organization’s willingness to deploy officers in high-stakes, classified
      operations, balancing secrecy with the need for intelligence and support.
    internal_dynamics: The tension between Jellico’s militaristic efficiency and the
      crew’s collaborative culture reflects broader institutional debates about command
      styles and operational priorities. The event highlights the challenge of maintaining
      morale and cohesion under abrupt leadership changes, particularly in high-pressure
      situations like the Cardassian standoff.
    global_id: ger_organization_73a4b614bde7
  - organization_uuid: ger_organization_e5cb9dbb921a
    description_of_involvement: The USS *Enterprise* crew gathers in Ten Forward for
      Picard’s formal surrender of command to Jellico, watching with professionalism
      undercut by unease. The crew delivers perfunctory applause that signals discomfort
      over Jellico’s changes and Picard’s uncertain role. Post-ceremony mingling reveals
      tensions in officers like Riker and Geordi, while Crusher and Troi share silent
      solidarity over a classified mission. The organization’s cohesion is tested
      by Jellico’s rigid command style, which clashes with the crew’s loyalty to Picard
      and their established routines. The event underscores the crew’s divided loyalties
      and the fragility of their morale under the new leadership, even as they strive
      to maintain professionalism.
