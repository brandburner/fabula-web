    \ logic. Picard reveals Starfleet Intelligence's theory that the Cardassians have\
    \ developed a subspace delivery system—using theta-band emissions—to deploy the\
    \ toxin safely. He confirms their destination is Celtris Three, where they must\
    \ infiltrate a hidden research facility and destroy the weapon if confirmed. The\
    \ revelation solidifies the mission's urgency and the team's resolve, despite\
    \ the extreme risks. Picard's personal expertise with theta-band technology from\
    \ his Stargazer days explains his selection for the mission, while Worf's tactical\
    \ role and Beverly's medical expertise are explicitly defined. The team's immediate\
    \ acceptance of the dangerous objective underscores their trust in Picard's leadership,\
    \ even as they operate outside Starfleet's chain of command. The scene ends with\
    \ Picard ordering a covert detour to Torman Five, hinting at a strategic or logistical\
    \ necessity for their infiltration plan.\n  "
