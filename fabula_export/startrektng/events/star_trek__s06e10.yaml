- fabula_uuid: cand_evt_scene_42fb13ed74175d4f_01
  global_id: null
  title: Jellico Reconfigures Enterprise for War
  description: Admiral Jellico records a log entry framing the Cardassian rendezvous
    as a potential threat, then immediately begins militarizing the *Enterprise* by
    ordering aggressive system modifications—bypassing standard protocols to reroute
    phaser arrays and deflector pathways for combat readiness. He overrides Riker’s
    objections and Data’s logical warnings, repurposing science stations for damage
    control and weapons status, while mandating four battle drills to simulate Cardassian
    attacks. His final order—removing Picard’s fish from the Ready Room—symbolically
    erases Picard’s legacy, signaling his intent to assert absolute control. The scene
    crystallizes Jellico’s militaristic mindset, exposing his distrust of Picard’s
    covert mission and his willingness to prioritize confrontation over diplomacy,
    while testing the crew’s loyalty to his command. Riker’s frustration and Data’s
    compliance underscore the tension between Starfleet’s ideals and Jellico’s authoritarian
    approach, foreshadowing the crew’s resistance to his leadership and the escalating
    stakes of the Cardassian confrontation.
