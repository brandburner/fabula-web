- fabula_uuid: act_ed378dbca0c3c496
  number: 2
  summary: Jellico continues to implement radical reconfigurations of the Enterprise's
    systems, focusing on combat readiness, which causes significant friction with
    Geordi La Forge and Deanna Troi. Geordi struggles to meet demanding deadlines
    for power system reroutes and warp coil realignments, while Troi attempts to address
    crew morale issues, only to receive a directive from Jellico to enforce rapid
    adjustment and wear a standard uniform. Riker, observing the growing discontent
    and Jellico's unyielding command, considers seeking Picard's intervention but
    ultimately decides against burdening his exhausted former captain. Jellico, in
    a private conversation, bluntly dismisses Picard's defense of Riker, asserting
    his need for a crew ready for war and emphasizing that the Enterprise is now his.
    The act culminates with Jellico's complete takeover of Picard's ready room, symbolizing
    his full command and the stark shift in leadership, as Picard departs for his
    mission, leaving behind a ship under a new, demanding regime.
