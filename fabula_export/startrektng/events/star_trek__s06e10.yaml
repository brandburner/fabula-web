    emotional_state: Authoritative and determined—Jellico’s emotional state is one
      of unshakable confidence, bordering on arrogance. He is fully committed to his
      militaristic approach and views Riker’s objections as irrelevant. His order
      to remove Picard’s fish is not just practical but symbolic, signaling his intent
      to assert absolute control and erase Picard’s influence. There is a cold, calculated
      ruthlessness to his actions, reflecting his belief that diplomacy has failed
      and only strength will suffice.
