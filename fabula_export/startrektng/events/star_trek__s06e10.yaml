      \ to engage in direct conflict** (reflected in Nechayev’s decision to relieve\
      \ Picard of command and install Jellico) creates a **paradox**—the team must\
      \ operate in the shadows to achieve what the Federation cannot do openly. The\
      \ event underscores the **Federation’s moral and strategic dilemmas**, where\
      \ the pursuit of peace often requires **covert and morally ambiguous tactics**.\n\
      \      "
    active_representation: Through the **team’s undercover identities** and the **implied
