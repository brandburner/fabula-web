- fabula_uuid: cand_evt_scene_66025e71a29b91af_01
  global_id: null
  title: Jellico tests Geordi’s competence and loyalty
  description: 'In the claustrophobic confines of a Jeffries tube, Captain Jellico
    subjects Geordi La Forge to a series of erratic, unnecessary technical demands
    and personal asides, exposing his own insecurity and micromanagement. The scene
    begins with Jellico inspecting a Mees panel while casually referencing Geordi’s
    past service on the *Victory*, immediately establishing a power dynamic. He then
    orders an arbitrary increase in deuterium flow—an instruction Geordi dutifully
    notes despite its lack of operational justification—before abruptly shifting to
    a nostalgic anecdote about Captain Zimbata, a fellow Academy rugby player. The
    non sequitur disrupts the professional tone, forcing Geordi to adapt to Jellico’s
    unpredictable rhythm. When Jellico claims to hear a fluctuation in the EPS power
    distributor that Geordi cannot detect, the tension escalates: Jellico’s insistence
    on the nonexistent issue underscores his need to assert control, while Geordi’s
    compliance—despite his skepticism—reveals his struggle to reconcile Starfleet
    protocol with Jellico’s authoritarian demands. The scene concludes as they exit
    the tube, leaving Geordi visibly unsettled by the encounter. This exchange foreshadows
    the broader friction between Jellico’s leadership style and the crew’s morale,
    while also highlighting Geordi’s professionalism under pressure. Thematically,
    it underscores the cost of blind obedience in a command structure where competence
    is secondary to loyalty.'
