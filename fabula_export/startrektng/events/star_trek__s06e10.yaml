- fabula_uuid: cand_evt_scene_42fb13ed74175d4f_02
  global_id: null
  title: Jellico reshapes the Enterprise for war
  description: 'Admiral Jellico asserts his authority over the *Enterprise* by repurposing
    science stations for damage control and weapons monitoring, overriding Riker’s
    objections with blunt efficiency. He orders Data to reconfigure the ship’s power
    grid for combat readiness, dismissing standard protocols as insufficient. His
    abrupt command to remove Picard’s fish from the ready room—a symbolic erasure
    of Picard’s legacy—underscores his disregard for the former captain’s presence
    and the crew’s loyalty. The scene escalates the power struggle between Jellico
    and the senior staff, foreshadowing their resistance to his militaristic priorities.
    Jellico’s micromanagement and battle drills create a tense, war-ready atmosphere,
    while his dismissal of Riker’s expertise signals his distrust of the crew’s existing
    protocols. The event crystallizes Jellico’s leadership style: authoritarian, confrontational,
    and focused on dominance rather than diplomacy.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e10
  scene_sequence: 6
  sequence_in_scene: 13
  key_dialogue: &id011
  - 'JELLICO: I want you to install a bypass between the main phaser array and the
    secondary generators. I also want to run the main deflector pathway through the
    warp power grid and the auxiliary conduits through the lateral relays. You may
    have to reconfigure the transfer interface.'
  - 'RIKER: Sir... you may not be aware that our normal interface already routes auxiliary
    power through three separate relays.'
  - 'JELLICO: I''m aware of your current systems design. It''s not good enough. If
    these negotiations fail, we could find ourselves in a war zone. If that happens
    I want to be loaded for bear.'
  - 'JELLICO: And... get that fish out of the Ready Room.'
