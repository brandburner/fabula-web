  title: Picard adjusts training after Beverly’s error
  description: During a high-stakes holodeck simulation of their covert mission, Beverly
    Crusher and Worf fail to properly calibrate a deflector array, leaving them vulnerable
    to a Cardassian ambush. Picard initially critiques their performance—highlighting
    their five-second delay—but quickly pivots to a more supportive approach when
    he notices Beverly’s exhaustion. He corrects her technical mistake with precision,
    then shifts tone, acknowledging the mission’s difficulty and urging them to trust
    him. Beverly, visibly drained but still committed, agrees to retry the simulation,
    while Worf’s frustration with the lack of mission clarity lingers. The moment
    underscores the tension between Picard’s need for operational perfection and his
    responsibility to maintain his team’s morale, especially as they prepare for a
    mission where precision and trust are equally critical. Worf’s timing of their
    run becomes a tangible metric for improvement, reinforcing the urgency of their
    training.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e10
  scene_sequence: 3
  sequence_in_scene: 6
  key_dialogue:
  - |-
    PICARD: You were at least five seconds slower this time.
    WORF: You increased the difficulty level, sir.
    PICARD: It'll be a lot more difficult where we're going.
  - |-
    BEVERLY: Which is where, exactly?
    PICARD: I'm sorry, but I can't tell you that yet.
  - |-
    PICARD: I know this is difficult. But for now, all I can do is ask you to trust me.
    BEVERLY: All right. Let's do it again.
