  global_id: null
  title: Jellico Demands Unrealistic Engineering Upgrades
  description: In a tense, high-pressure confrontation in Engineering, Captain Jellico—acting
    under Nechayev’s authority—orders Geordi La Forge to push the *Enterprise*’s warp
    core beyond safe operational limits, demanding a 20% power transfer increase and
    a 15% efficiency boost in the warp coils. Geordi objects, citing the impracticality
    of the task (which would shut down critical research labs and require nonstop
    labor for two days), but Jellico dismisses his concerns as irrelevant to the ship’s
    current mission. Data, ever logical, confirms the task is technically feasible
    but offers no moral or practical critique. Jellico’s refusal to consider the human
    or operational consequences of his orders—coupled with his abrupt, authoritarian
    demeanor—escalates the crew’s frustration with his leadership. The scene underscores
    the growing conflict between Starfleet’s ethical standards and Jellico’s militaristic
    pragmatism, foreshadowing broader tensions as the *Enterprise* operates under
    his command. Geordi’s silent seething and Jellico’s dismissive exit leave the
    crew’s morale and trust in their temporary captain further eroded.
