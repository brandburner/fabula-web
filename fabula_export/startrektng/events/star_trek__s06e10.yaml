  title: Jellico’s psychological dominance play
  description: In the Ready Room, Captain Jellico deliberately chooses to meet Gul
    Lemec in the Observation Lounge instead of his office, a calculated move to assert
    dominance by forcing the Cardassian to wait and navigate unfamiliar territory.
    Counselor Troi, initially puzzled, quickly realizes Jellico’s strategy—comparing
    Cardassians to timber wolves and framing the encounter as a power struggle. She
    warns that such tactics risk escalating into a lethal confrontation, but Jellico
    dismisses her concern with cold confidence, revealing his unshakable belief in
    his ability to outmaneuver Lemec. The exchange underscores Jellico’s authoritarian
    leadership style, his disregard for diplomatic subtlety, and his willingness to
    weaponize psychological manipulation. It also exposes Troi’s unease with his methods,
    foreshadowing her later role as a reluctant participant in his aggressive strategy
    during the negotiations.
