  title: Picard reveals metagenic weapon mission details
  description: "\n  In a tense, confined shuttlecraft briefing, Picard finally discloses\
    \ the true nature of their covert mission: investigating a Cardassian metagenic\
    \ weapon capable of devastating entire ecosystems. Beverly reacts with professional\
    \ horror, explaining how these genetically engineered viruses mutate to destroy\
    \ all DNA before self-destructing, leaving infrastructure intact for conquest.\
    \ Worf immediately questions the weapon's strategic plausibility, forcing Picard\
    \ to reveal Starfleet Intelligence's theory about a protected subspace delivery\
    \ system—information that dramatically escalates the mission's stakes. The team\
    \ examines theta-band subspace emissions data linking Celtris Three to the weapon,\
    \ with Picard assigning specific roles (Beverly for bio-toxin analysis, Worf for\
    \ security) while revealing his personal Stargazer-era expertise with theta-band\
    \ waves. The revelation of their destination (Torman Five for discreet transport)\
    \ and the mission's 'destroy at all costs' directive create palpable tension as\
    \ the team processes the magnitude of what they're facing.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e10
  scene_sequence: 14
  sequence_in_scene: 25
  key_dialogue:
  - 'PICARD: Now that we''re on our way... I can finally tell you about our mission.
    Starfleet Intelligence believes the Cardassians are developing... metagenic weapons.'
  - 'BEVERLY: ((quiet, grim)) Oh my God. They''re genetically engineered viruses which
    are designed to destroy entire eco-systems. The metagenic toxins are released
    into the atmosphere of a planet and immediately begin mutating. They seek out
    and destroy every form of DNA they encounter. In a few days, everything is dead.'
  - 'PICARD: Within a month, the metagenic agent itself breaks down and dissipates
    completely... leaving every city, road, and piece of equipment perfectly intact.
    And if they are? Then we destroy it. At all costs.'
