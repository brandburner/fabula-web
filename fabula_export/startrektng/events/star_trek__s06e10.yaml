  title: Nechayev Reassigns Picard and Installs Jellico
  description: |2

    Admiral Nechayev delivers a blunt, high-stakes briefing to Riker, Data, and Troi in the observation lounge, revealing the Cardassian border crisis and the Enterprise’s covert redeployment. She abruptly strips Picard of command—without explanation—while assigning him, Beverly, and Worf to a classified mission. The crew’s confusion and unease escalate when Nechayev announces Captain Jellico’s immediate takeover of the Enterprise, citing his Cardassian armistice experience. Riker challenges the decision in private, but Nechayev shuts him down, leaving him unsettled. The scene fractures trust, escalates geopolitical tension, and forces Picard into a shadow operation where his authority and purpose are suddenly in question. Nechayev’s cold efficiency and Jellico’s impending arrival set the stage for a power struggle and a covert mission with life-or-death stakes.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e10
  scene_sequence: 2
  sequence_in_scene: 2
  key_dialogue:
  - 'NECHAYEV: The Cardassian forces which were recently withdrawn from the Bajoran
    sector, have been redeployed along the Federation border. They''ve mobilized three
    divisions of ground troops... and their subspace communications have increased
    by fifty percent. We believe they''re preparing for an incursion into Federation
    space.'
  - 'NECHAYEV: The Captain, your Chief Medical Officer, and Security Chief have been...
    reassigned. That''s all I can tell you for now.'
  - |-
    RIKER: With all due respect... it isn't necessary to give Captain Jellico command of the Enterprise in order to conduct a negotiation.
    NECHAYEV: ((flatly)) I disagree. The Enterprise will be in a dangerous situation and I want someone on the Bridge who has a great deal of experience with the Cardassians. No offense Commander, but that's not you.
