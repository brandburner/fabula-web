  object_involvements:
  - object_uuid: ger_object_f8bd1b4f263e
    description_of_involvement: The bosun’s whistle pierces the air of Ten Forward
      during the formal command transfer ceremony, marking the conclusion of the handover.
      Its shrill tone enforces naval tradition, signaling the finality of Picard’s
      relief and Jellico’s assumption of command. The whistle’s role is ceremonial,
      but its sound carries weight—it is the auditory punctuation of a moment that
      reshapes the *Enterprise*’s hierarchy. The whistle’s sharp, unyielding call
      contrasts with the tension in the room, underscoring Jellico’s impatience with
      tradition and his preference for efficiency over ritual.
    status_before_event: Held by the bosun in Ten Forward, ready to be sounded at
      the conclusion of the ceremony.
    status_after_event: Used and its role in the event complete, but its sound lingers
      as a symbol of the shift in command.
    global_id: ger_object_f8bd1b4f263e
  - object_uuid: ger_object_955dda402c71
