- fabula_uuid: cand_evt_scene_c258c3f140e0298b_02
  global_id: null
  title: Beverly detects Cardassian weapon signature
  description: "\n  In the claustrophobic, shadow-drenched caverns of Celtris Three,\
    \ Picard’s team—Picard, Beverly, and Worf—presses deeper into the planet’s underbelly.\
    \ Beverly’s tricorder picks up anomalous subspace signals, which Picard quickly\
    \ identifies as theta-band emissions, the telltale signature of the Cardassian\
    \ metagenic weapon. His technical expertise allows him to refine the tricorder’s\
    \ bandwidth, pinpointing the weapon’s location 500 meters east and 700 meters\
    \ below their current position. This is the team’s first concrete lead in their\
    \ covert mission, and the discovery shifts the dynamic from cautious exploration\
    \ to targeted infiltration.\n\n  The moment is interrupted by the screeching of\
    \ Celtran bats, which triggers an uncharacteristic reaction from Worf. His phaser\
    \ snaps upward, his posture rigid with tension, revealing a vulnerability beneath\
    \ his Klingon stoicism. Beverly seizes the opportunity to tease him, her playful\
    \ jab underscoring the team’s growing camaraderie even as the mission’s stakes\
    \ escalate. Picard, ever the leader, reassures them with calm authority, but the\
    \ bats’ presence serves as a reminder of the unknown dangers lurking in the darkness.\
    \ The scene marks a critical turning point: the team now has a destination, but\
    \ the path to it is fraught with physical and psychological obstacles.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e10
  scene_sequence: 19
  sequence_in_scene: 34
  key_dialogue:
  - 'PICARD: That''s characteristic of theta-band emissions. You need to compress
    the detection bandwidth to get a directional fix.'
  - 'BEVERLY: I''m picking up some type of subspace signals, but I can''t get a lock
    on them.'
  - 'WORF: Bats...'
  - 'BEVERLY: You''re not afraid of bats, are you, Worf?'
  - 'WORF: Of course not.'
