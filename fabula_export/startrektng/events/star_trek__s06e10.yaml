  title: Jellico enforces uniform decree on Troi
  description: 'In the Ready Room, Captain Jellico subtly asserts his authority over
    Counselor Troi by dismissing her concerns about crew morale and redirecting her
    to enforce his new command structure. After briefly sharing a personal moment
    about his son’s crayon drawings—an attempt to humanize himself—he pivots to a
    cold, bureaucratic demand: Troi must wear the standard Starfleet uniform on the
    Bridge, overturning Picard’s relaxed dress code. The exchange reveals Jellico’s
    calculated strategy to reshape the *Enterprise*’s culture, using symbolic power
    moves (like removing Picard’s personal items) to undermine the former captain’s
    legacy. Troi’s stiffened reaction underscores the tension between Jellico’s rigid
    expectations and the crew’s lingering loyalty to Picard, foreshadowing deeper
    conflicts under his command.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e10
  scene_sequence: 9
  sequence_in_scene: 18
  key_dialogue:
  - 'JELLICO: I prefer a certain... formality on the Bridge. I would appreciate it
    if you wore a standard uniform when you''re on duty.'
  - 'TROI: Of course, sir.'
  - 'TROI: I wouldn''t call it resistance. More like... uncertainty. Most of them
    have served under Captain Picard for several years. They knew him, knew what he
    expected. Now they''re being asked to adjust to a new captain and a new way of
    doing things. They''re uncertain how to react.'
  - 'JELLICO: I''m glad you''re here. I''d like to go over the duty roster with you...
    Unfortunately, I don''t have time for a honeymoon with the crew. You''ve clearly
    given this a lot of thought, so I want you to take charge of the morale situation.
    Please see to it that they make the adjustment to the new routine quickly and
    easily.'
