  object_involvements:
  - object_uuid: ger_object_2742bf24deb7
    description_of_involvement: Picard’s combadge is ripped from his uniform by the
      armed Cardassian, the small gold delta badge severing his last link to the *Enterprise*
      and Starfleet. The act is brutal and symbolic—without it, he is cut off from
      communication, backup, and identity. The combadge clatters to the ground or
      is pocketed by the Cardassian, its absence a physical manifestation of Picard’s
      isolation. For the first time in his career, he is truly alone, his authority
      stripped away in an instant.
    status_before_event: Attached to Picard’s uniform, functioning as his primary
      means of communication with the *Enterprise* and his crew.
    status_after_event: Removed from Picard’s possession, either discarded on the
      cavern floor or confiscated by the Cardassians. No longer operational as a Starfleet
      device in this context.
    global_id: ger_object_2742bf24deb7
  - object_uuid: ger_object_7f26eb3547f4
    description_of_involvement: Picard’s phaser is confiscated by the armed Cardassian
      with a swift, almost dismissive motion. The weapon—symbolizing Starfleet’s non-lethal
      but authoritative presence—is now in enemy hands, a trophy of their ambush.
      Its removal underscores Picard’s vulnerability; without it, he cannot defend
      himself or resist. The phaser’s absence is a narrative turning point, marking
      the shift from active resistance to passive captivity.
    status_before_event: Holstered at Picard’s side, fully charged and ready for use
      in self-defense or tactical situations.
    status_after_event: Confiscated by the Cardassians, likely secured or destroyed
      to prevent recapture. No longer in Picard’s possession or operational under
      his control.
    global_id: ger_object_7f26eb3547f4
  - object_uuid: ger_object_5a152fdfe248
    description_of_involvement: 'Beverly’s tricorder is the tool that forces the retreat,
      its sensor array detecting the five approaching Cardassians with clinical accuracy.
      She grips it tightly as she urges Worf to follow, the device beeping in warning—a
      mechanical extension of her urgency. The tricorder’s role here is dual: it saves
      their lives by revealing the threat, but it also underscores their failure,
      as it cannot save Picard. Its readings are a cold reminder of the mission’s
      fragility.'
    status_before_event: Active in Beverly’s hand, scanning for life signs, energy
      signatures, and threats in the caverns.
    status_after_event: Still operational but now focused on ensuring the team’s escape.
      Its data may later reveal the full extent of the Cardassian forces.
    global_id: ger_object_5a152fdfe248
  - object_uuid: ger_object_d390fe0b6154
    description_of_involvement: The metagenic weapon’s control console is the focal
      point of the Cardassian operator’s actions, its flashing lights and beeping
      alarms silenced with a few keystrokes. The deactivation is swift and precise,
      a testament to Cardassian technical discipline. The console’s sudden quietude
      mirrors the mission’s collapse—what was once a beacon of hope (or threat) is
      now inert, its secrets protected. The act symbolizes Cardassian control over
      the weapon and the away team’s failure to neutralize it.
    status_before_event: Active, flashing and beeping, drawing the away team’s attention
      and confirming the weapon’s presence in the chamber.
    status_after_event: Deactivated, screens dark, alarms silent. The weapon remains
      secure, its status unknown to Starfleet.
