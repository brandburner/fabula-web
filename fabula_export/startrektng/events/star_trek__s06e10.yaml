  global_id: null
  title: Picard reveals metagenic weapon mission
  description: "\n  In a tense, confined shuttlecraft briefing, Picard finally discloses\
    \ the true nature of their covert mission: investigating a suspected Cardassian\
    \ metagenic weapon capable of devastating entire ecosystems. Beverly reacts with\
    \ horror at the ecological implications, while Worf questions the weapon's strategic\
    \ logic. Picard reveals Starfleet Intelligence's theory that the Cardassians have\
    \ developed a subspace delivery system—using theta-band emissions—to deploy the\
    \ toxin safely. He confirms their destination is Celtris Three, where they must\
    \ infiltrate a hidden research facility and destroy the weapon if confirmed. The\
    \ revelation solidifies the mission's urgency and the team's resolve, despite\
    \ the extreme risks. Picard's personal expertise with theta-band technology from\
    \ his Stargazer days explains his selection for the mission, while Worf's tactical\
    \ role and Beverly's medical expertise are explicitly defined. The team's immediate\
    \ acceptance of the dangerous objective underscores their trust in Picard's leadership,\
    \ even as they operate outside Starfleet's chain of command. The scene ends with\
    \ Picard ordering a covert detour to Torman Five, hinting at a strategic or logistical\
    \ necessity for their infiltration plan.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e10
  scene_sequence: 14
  sequence_in_scene: 26
  key_dialogue: &id017
  - 'PICARD: Now that we''re on our way... I can finally tell you about our mission.
    Starfleet Intelligence believes the Cardassians are developing... metagenic weapons.'
  - 'BEVERLY: ((quiet, grim)) Oh my God.'
  - 'WORF: I am not familiar with... metagenics.'
  - 'BEVERLY: They''re genetically engineered viruses which are designed to destroy
    entire eco-systems. The metagenic toxins are released into the atmosphere of a
    planet and immediately begin mutating. They seek out and destroy every form of
    DNA they encounter. In a few days, everything is dead.'
  - 'PICARD: Within a month, the metagenic agent itself breaks down and dissipates
    completely... leaving every city, road, and piece of equipment perfectly intact.'
  - 'WORF: Leaving the planet safe to be conquered.'
  - 'PICARD: Starfleet Intelligence believes that the Cardassians are developing a
    new delivery system - one which would protect them from any accidental exposure
    to the toxin. They believe the Cardassians are testing a way of launching dormant
    metagenic material on a subspace carrier wave.'
  - 'PICARD: For several weeks, bursts of theta-band subspace emissions have been
    detected coming from Celtris Three. Those emissions may indicate a metagenic delivery
    system in operation.'
  - 'PICARD: Our orders are to penetrate the Celtris Three installation and determine
    whether or not the Cardassians are actually building a metagenic weapon. And if
    they are? Then we destroy it. At all costs.'
  - 'PICARD: I know where we can arrange some... discreet transportation. Set course
    for Torman Five.'
