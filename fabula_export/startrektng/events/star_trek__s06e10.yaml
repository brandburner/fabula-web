  title: Jellico establishes dominance through rapport
  description: 'Captain Jellico materializes in the *Enterprise*’s Transporter Room,
    immediately seizing control of the narrative by demonstrating his pre-existing
    knowledge of Riker’s Starfleet record—class rank, graduation year—before Riker
    can even introduce himself. The exchange is a calculated power move: Jellico’s
    warmth masks an assertive command presence, leaving Riker momentarily off-balance.
    By referencing Riker’s past without prompting, Jellico signals his thorough preparation
    and authority, subtly undermining Picard’s legacy while testing Riker’s loyalty.
    The scene functions as a microcosm of Jellico’s leadership style: charismatic
    but unyielding, blending psychological precision with operational efficiency.
    The transition to the corridor underscores the shift in command dynamics, with
    Riker’s hesitation marking the crew’s unease about the abrupt change. This moment
    sets the tone for Jellico’s tenure, where rapport is a tactical tool and authority
    is never questioned—only accepted.'
