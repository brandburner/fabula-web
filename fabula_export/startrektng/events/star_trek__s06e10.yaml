    description_of_involvement: Picard’s backpack is torn from his shoulders by the
      Cardassian, its contents—mission-critical equipment, supplies, and potentially
      personal items—now exposed to enemy scrutiny. The pack’s removal is both practical
      (denying Picard resources) and psychological (stripping him of autonomy). Its
