  title: Riker detects Cardassian transmissions on Celtris III
  description: "\n  On the *Enterprise* bridge, Commander Riker discovers encrypted\
    \ Cardassian transmissions originating from Celtris III, a planet near the Federation-Cardassian\
    \ border. His analysis reveals residual theta-band subspace emissions—key indicators\
    \ of the metagenic weapon’s activity—suggesting the weapon’s recent activation\
    \ or deactivation. When Riker reports this to Captain Jellico, the latter’s immediate\
    \ recognition of the planet’s significance (despite his feigned nonchalance) confirms\
    \ the mission’s covert focus on Celtris III. Jellico’s abrupt decision to bypass\
    \ standard protocol and open a *priority two* secure channel to Admiral Nechayev—without\
    \ consulting Riker further—signals the gravity of the discovery. The exchange\
    \ underscores the tension between Riker’s investigative instincts and Jellico’s\
    \ authoritarian command style, while the theta-band emissions serve as a critical\
    \ plot reveal: the weapon’s status is now known, but its fate (and Picard’s) remains\
    \ uncertain. The scene functions as a turning point, escalating the crisis and\
    \ forcing Starfleet’s hand to intervene directly in Picard’s mission.\n  "
