  title: Jellico’s dominance collapses under Cardassian defiance
  description: In the observation lounge aboard the *Enterprise*, Captain Jellico’s
    attempt to assert Starfleet authority over Gul Lemec spirals into open hostility
    when Lemec challenges his rank and legitimacy. Jellico, already on edge from the
    pressure of replacing Picard, responds with aggressive posturing—brushing past
    Lemec, seizing his seat, and dismissing his objections as trivial. When Lemec
    escalates by questioning Jellico’s authority to dictate terms, Jellico’s facade
    of control shatters. He erupts in a barely restrained outburst, accusing Lemec
    of being unfit for negotiations, then abruptly storms out, leaving the Cardassian
    stunned. The confrontation exposes Jellico’s fragility as a leader, undermines
    the mission’s diplomatic objectives, and foreshadows deeper tensions between Starfleet
    and the Cardassian Union. Riker and Troi, caught in the crossfire, are forced
    to follow Jellico’s retreat, reinforcing the crew’s growing unease under his command.
    The scene marks a turning point, where Jellico’s psychological tactics backfire,
    and Lemec’s defiance reveals the mission’s precarious foundation.
