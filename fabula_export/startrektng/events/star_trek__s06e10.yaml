      ritual.
    global_id: ger_object_955dda402c71
  - object_uuid: ger_object_778044e5dc0c
    description_of_involvement: The class five probe is mentioned in Jellico’s private
      conversation with Picard as a potential solution to the covert mission’s intelligence
      gap. Jellico proposes launching it near the Cardassian border to scan the metagenic
      weapon installation and transmit telemetry data for Picard’s shuttle to intercept.
      The probe is not physically present in Ten Forward but is a critical tool in
