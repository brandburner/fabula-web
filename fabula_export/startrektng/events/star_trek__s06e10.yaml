- fabula_uuid: act_36cf1808d3f04da0
  number: 4
  summary: Jellico continues his aggressive psychological tactics against Gul Lemec
    during the diplomatic meeting, successfully establishing dominance by making Lemec
    wait and then adopting a belligerent stance. He uses Riker and Troi to further
    his strategy, portraying himself as an unreasonable 'loose cannon' to manipulate
    Lemec into a more conciliatory position. Meanwhile, Picard's team navigates the
    treacherous caverns of Celtris Three, facing environmental challenges like dangerous
    abysses and tight lava tubes. They use specialized equipment and teamwork to rappel
    down a deep chasm and blast through a narrow passage. Beverly's tricorder detects
    theta-band emissions, confirming the presence of the suspected facility. During
    the negotiations, Gul Lemec subtly hints at knowledge of a Federation team operating
    within Cardassian territory, directly raising the stakes for Picard's mission
    and implying potential open conflict if their covert operation is discovered.
    The team eventually locates and breaches a shielded maintenance hatch, anticipating
    the research facility.
