  key_dialogue:
  - 'PICARD: ((to group)) To Captain Jean-Luc Picard, Commanding Officer, USS Enterprise.
    Stardate 46358. You are hereby requested and required to relinquish command of
    your vessel to Captain Edward Jellico, Commanding Officer, USS Cairo as of this
    date. Signed, Vice-Admiral Alynna Nechayev, Starfleet Command.'
  - 'JELLICO: ((to Picard)) I relieve you, sir. PICARD: I stand relieved.'
  - 'JELLICO: ((quiet)) How''s your team shaping up? PICARD: ((quiet)) It''s going
    well. But I would prefer more current intelligence on the exact layout of the
    installation. The most recent information is over two years old. JELLICO: ((quiet
    shock)) Two years... I don''t know how Nechayev ever talked you into this. PICARD:
    ((wry)) She didn''t give me a choice.'
  - 'JELLICO: ((slow and firm)) You will tell the department heads that as of now,
    the Enterprise is on a four shift rotation. I don''t want to talk about it. Get
    it done.'
