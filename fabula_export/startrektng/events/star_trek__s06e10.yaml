- fabula_uuid: act_b0081d8a813168c8
  number: 3
  summary: 'Picard, Beverly, and Worf depart the Enterprise in a shuttlecraft. Once
    out of range, Picard finally reveals the mission''s true objective: to investigate
    Celtris Three, where Starfleet Intelligence suspects the Cardassians are developing
    metagenic weapons—genetically engineered viruses designed to destroy entire ecosystems.
    Beverly grimly explains the devastating nature of these outlawed biological weapons,
    while Picard details the Cardassians'' suspected new delivery system using dormant
    toxins on a subspace carrier wave. Their orders are to penetrate the installation,
    confirm the weapon''s existence, and destroy it at all costs. To reach Celtris
    Three undetected, the team arranges covert passage via a disreputable Ferengi
    Daimon, Solok, with Beverly employing seductive charm to secure his cooperation.
    Meanwhile, on the Enterprise, Jellico prepares for diplomatic talks with Cardassian
    Gul Lemec, employing calculated psychological tactics to establish dominance and
    gain an advantage in the tense negotiations, setting the stage for a high-stakes
    encounter on both fronts.'
