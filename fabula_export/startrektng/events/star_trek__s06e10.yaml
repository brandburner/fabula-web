- fabula_uuid: cand_evt_scene_fb31e7b2dc18ae6a_01
  global_id: null
  title: Picard’s team breaches the lava tube
  description: "\n  Picard’s team reaches a dead end in the cavern system, where a\
    \ narrow lava tube—just one foot in diameter—blocks their path. Picard confirms\
    \ via tricorder that the tube extends seventy meters southwest into another chamber,\
    \ making it their only viable route forward. Worf, recognizing the tactical necessity,\
    \ uses a phaser set to a wide beam to widen the entrance, expanding it by two\
    \ feet. The team now has a crawlable passage, though the confined space forces\
    \ them into a vulnerable, physically demanding advance. Picard takes the lead,\
    \ pushing his pack ahead of him and crawling into the tube, signaling his willingness\
    \ to endure discomfort for the mission’s success. The moment underscores the team’s\
    \ growing desperation and the high stakes of their covert operation, as they trade\
    \ safety for progress in an environment where every decision could mean failure—or\
    \ worse, capture.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e10
  scene_sequence: 23
  sequence_in_scene: 39
  key_dialogue:
  - 'PICARD: We need to get through here. This lava tube runs southwest for seventy
    meters before running into another chamber.'
  - 'PICARD: ((looks inside)) The tube opens up a little more beyond this entrance.
    If we can widen the opening, we should be able to crawl through.'
  - 'WORF: A phaser set to level sixteen should suffice.'
  - 'PICARD: Make it so.'
