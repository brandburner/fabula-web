  global_id: null
  title: Jellico’s Unilateral Bridge Overhaul
  description: Captain Jellico seizes control of the *Enterprise*’s bridge operations
    with a series of abrupt, uncompromising orders, systematically dismantling Picard’s
    legacy and imposing his militaristic priorities. He directs Data to reconfigure
    the ship’s power systems—demanding a bypass between the phaser array and secondary
    generators, despite Data’s logical objections about the seven-hour overhaul required.
    Riker, visibly frustrated, challenges Jellico’s demands, only to be dismissed
    with blunt authority. Jellico then repurposes science stations for damage control
    and weapons status, ordering Riker to conduct four battle drills simulating Cardassian
    attacks. The scene culminates with Jellico’s symbolic erasure of Picard’s presence—ordering
    the removal of his fish from the Ready Room—before abruptly summoning Data to
    accompany him off the bridge. The exchange underscores Jellico’s authoritarian
    leadership style, the crew’s growing resentment, and the precarious balance of
    loyalty and control under his command. The scene also foreshadows the crew’s resistance
    and the broader power struggle between Jellico and the senior staff, particularly
    Riker, while Data’s compliance—despite his autonomy—highlights the tension between
    logic and obedience in Starfleet’s hierarchy.
