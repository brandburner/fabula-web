  global_id: null
  title: Beverly manipulates Solok into cooperation
  description: In the dimly lit Torman Bar, Picard, Beverly, and Worf approach Daimon
    Solok—a disheveled, paranoid Ferengi transporter broker—to secure passage to Celtris
    Three. Solok initially denies involvement in smuggling and resists their request,
    dismissing them as Federation spies. When he attempts to leave, Worf physically
    blocks him, forcing Solok to reluctantly engage. Beverly then shifts tactics,
    leveraging Solok’s vanity and ego with flirtatious charm. She compliments his
    reputation, touches his ears, and whispers promises of gratitude, triggering a
    hormonal reaction that overrides his skepticism. Solok abruptly reverses course,
    offering passage without further negotiation. The exchange underscores Beverly’s
    tactical adaptability, the mission’s reliance on interpersonal manipulation, and
    Solok’s susceptibility to ego-driven flattery over logic or loyalty. The scene
    also contrasts with Picard’s failed negotiation earlier, highlighting the team’s
    evolving strategies under pressure.
