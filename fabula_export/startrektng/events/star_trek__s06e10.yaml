    of the Enterprise in order to conduct a negotiation.'
  - 'NECHAYEV: ((flatly)) I disagree. The Enterprise will be in a dangerous situation
    and I want someone on the Bridge who has a great deal of experience with the Cardassians.
    No offense Commander, but that''s not you.'
