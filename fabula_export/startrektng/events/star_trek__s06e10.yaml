  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: 'Starfleet is represented in this event through Captain
      Jellico’s aggressive diplomatic tactics, which reflect its institutional priorities:
      maintaining border security, asserting dominance in negotiations, and protecting
      covert operations. Jellico’s accusations of Cardassian troop movements and his
      threats of Federation counter-deployments demonstrate Starfleet’s willingness
      to escalate tensions to achieve its goals. However, Lemec’s revelation of the
      covert team’s presence exposes a vulnerability in Starfleet’s strategy, forcing
      Jellico into a defensive position. The organization’s goals are pursued through
      Jellico’s bluster and Riker’s conciliatory efforts, but the underlying tension
      reveals the fragility of its covert operations.'
    active_representation: Through Captain Jellico’s aggressive diplomatic tactics
      and Commander Riker’s conciliatory efforts, as well as the institutional protocols
      and intelligence-gathering efforts implied by the PADD.
    power_dynamics: Exercising authority over the negotiation but being challenged
      by Lemec’s knowledge of the covert team and his veiled threats against Picard.
    organizational_goals:
    - To assert Federation dominance in the negotiation and force the Cardassians
      into revealing their true intentions.
    - To protect the covert team’s mission and prevent the Cardassians from gaining
      further intelligence on Federation operations.
    influence_mechanisms:
    - Through Jellico’s aggressive rhetoric and threats of military counter-deployments.
    - Through the use of intelligence (e.g., the PADD) to support claims of Cardassian
      troop movements.
    - Through Riker’s diplomatic efforts to de-escalate tensions and maintain a facade
      of reasonableness.
    institutional_impact: The event highlights the tension between Starfleet’s desire
      for diplomatic resolution and its reliance on covert operations, as well as
      the risks of escalating tensions in high-stakes negotiations.
    internal_dynamics: Jellico’s authoritarian tactics clash with Riker’s more diplomatic
      approach, revealing internal debates over the best way to handle the Cardassian
      threat.
    global_id: ger_organization_73a4b614bde7
  - organization_uuid: ger_organization_37fde988c994
    description_of_involvement: 'The United Federation of Planets is indirectly represented
      in this event through the actions of Captain Jellico and Commander Riker, who
      embody its diplomatic and military priorities. Jellico’s aggressive tactics
      reflect the Federation’s determination to protect its territorial interests
      and assert its authority, while Riker’s conciliatory efforts highlight its commitment
      to diplomacy. However, Lemec’s revelation of the covert team’s presence exposes
      a contradiction in the Federation’s approach: its reliance on covert operations
      while simultaneously pursuing diplomatic solutions. This tension underscores
      the Federation’s struggle to balance its ideals of exploration and cooperation
      with the realities of interstellar conflict.'
