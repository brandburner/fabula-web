  title: Riker challenges Nechayev’s decision
  description: In the Observation Lounge, Admiral Nechayev delivers a blunt briefing
    to Riker, Data, and Troi about the Cardassian troop redeployment and the Enterprise’s
    impending diplomatic mission. When Riker questions the sudden reassignment of
    Picard, Nechayev shuts down further discussion, revealing that Picard, Beverly,
    and Worf have been reassigned to a classified mission. After the others leave,
    Riker privately confronts Nechayev, arguing that Jellico’s command isn’t necessary
    for negotiations. Nechayev dismisses his objection with cold finality, leaving
    Riker visibly unsettled by the abrupt power shift and the implications for Picard’s
    future. The exchange underscores Nechayev’s unyielding authority and Riker’s loyalty
    to Picard, while foreshadowing the crew’s resistance to Jellico’s leadership.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e10
  scene_sequence: 2
  sequence_in_scene: 4
  key_dialogue:
  - |-
    RIKER: Where is Captain Picard?
    NECHAYEV: The Captain, your Chief Medical Officer, and Security Chief have been... reassigned.
  - |-
    RIKER: With all due respect... it isn't necessary to give Captain Jellico command of the Enterprise in order to conduct a negotiation.
    NECHAYEV: I disagree. The Enterprise will be in a dangerous situation and I want someone on the Bridge who has a great deal of experience with the Cardassians. No offense, Commander, but that's not you.
  - |-
    RIKER: Are the Cardassians really ready for war?
    NECHAYEV: I didn't say war, Commander. I said incursion.
