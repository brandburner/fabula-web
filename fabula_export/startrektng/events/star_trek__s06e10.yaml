- fabula_uuid: cand_evt_scene_fc02edc7f942b5ff_02
  global_id: null
  title: Picard formally surrenders command to Jellico
  description: "\n  In a public ceremony in Ten Forward, Picard stands at a podium\
    \ and reads the official Starfleet order relieving him of command of the *Enterprise*,\
    \ transferring authority to Jellico. The moment is framed as a formal, ceremonial\
    \ transition, but the tension between the two men is palpable. Picard’s voice\
    \ remains steady as he recites the order, but his body language—rigid posture,\
    \ deliberate movements—betrays the emotional weight of the act. Jellico, standing\
    \ beside him, accepts the transfer with a brisk efficiency that underscores his\
    \ authority, though his earlier joviality in the corridor has vanished. The crew\
    \ watches in silence, their applause afterward feeling perfunctory rather than\
    \ celebratory. The exchange of command codes via the computer is the mechanical\
    \ climax of the moment, but the real drama unfolds in the unspoken: Picard’s reluctance,\
    \ Jellico’s unyielding control, and the crew’s unease at the abrupt shift in leadership.\
    \ The ceremony is a symbolic surrender, but it also sets the stage for the covert\
    \ mission and the crew’s divided loyalties that follow. Picard’s quiet conversation\
    \ with Jellico afterward—about the mission’s intelligence gaps and Jellico’s offer\
    \ to launch a probe—reveals the true stakes: this is not just a transfer of command,\
    \ but the beginning of a high-risk operation where trust and authority will be\
    \ tested.\n  "
