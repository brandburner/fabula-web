  key_dialogue: &id025
  - 'PICARD: ((urgent)) Beverly, get out of there!'
  - 'WORF: No, sir.'
  - 'PICARD: Are you all right?'
  - 'BEVERLY: ((coughing)) I think so. Next time, you bring up the rear.'
