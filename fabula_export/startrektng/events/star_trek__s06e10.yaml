  object_involvements:
  - object_uuid: ger_object_f8bd1b4f263e
    description_of_involvement: The bosun’s whistle pierces the air of Ten Forward
      during the formal command transfer ceremony, marking the conclusion of the handover.
      Its shrill tone enforces naval tradition, signaling the finality of Picard’s
      relief and Jellico’s assumption of command. The whistle’s role is ceremonial,
      but its sound carries weight—it is the auditory punctuation of a moment that
      reshapes the *Enterprise*’s hierarchy. The whistle’s sharp, unyielding call
      contrasts with the tension in the room, underscoring Jellico’s impatience with
      tradition and his preference for efficiency over ritual.
    status_before_event: Held by the bosun in Ten Forward, ready to be sounded at
      the conclusion of the ceremony.
    status_after_event: Used and its role in the event complete, but its sound lingers
      as a symbol of the shift in command.
    global_id: ger_object_f8bd1b4f263e
  - object_uuid: ger_object_955dda402c71
    description_of_involvement: Crew erects this simple podium in Ten Forward for
      the command transfer ceremony, where Picard stands to read the Starfleet order.
      The podium serves as the focal point of the event, symbolizing the transfer
      of authority from Picard to Jellico. Its presence elevates the ceremony, giving
      it a formal and official tone, but its simplicity also underscores the perfunctory
      nature of the handover. The podium is where Picard’s voice carries the weight
      of Starfleet’s decision, and where Jellico’s dismissive 'Dismissed' marks the
      end of an era and the beginning of a new, uncertain chapter for the *Enterprise*’s
      crew.
    status_before_event: Erected in Ten Forward prior to the ceremony, awaiting Picard’s
      use.
    status_after_event: Removed after the ceremony, its symbolic role in the event
      complete.
    global_id: ger_object_955dda402c71
  - object_uuid: ger_object_778044e5dc0c
    description_of_involvement: 'Jellico proposes launching this advanced sensor probe
      during a private corridor exchange with Picard, directing its deployment near
      the Cardassian border. The probe is intended to scan the metagenic weapon installation
      and transmit telemetry data for Picard’s covert team to intercept. Its role
      in the event is twofold: functionally, it provides critical intelligence for
      the mission, and narratively, it highlights Jellico’s covert support for Picard
      despite his public authoritarianism. The probe’s launch is a strategic move,
      offering Picard a lifeline while Jellico asserts control over the *Enterprise*’s
      operations.'
    status_before_event: Stored in the *Enterprise*’s probe bay, awaiting deployment
      near the Cardassian border.
    status_after_event: Launched and transmitting telemetry data to Picard’s shuttle,
      fulfilling its role in the covert mission.
    global_id: ger_object_778044e5dc0c
  - object_uuid: ger_object_20cbc37b1423
    description_of_involvement: 'Jellico demands these administrative reports from
      Riker in the corridor, using them to scrutinize the *Enterprise* crew’s performance
      and readiness. The evaluations serve as a tool for Jellico to assess the crew’s
      capabilities and identify potential weaknesses under his command. Their role
      in the event is twofold: practically, they provide Jellico with the data he
      needs to make informed decisions about the crew’s assignments and training;
      narratively, they underscore his meticulous and controlling approach to leadership.
      The reports become a mechanism for Jellico to assert his authority, testing
      Riker’s compliance and pushing rapid operational changes.'
