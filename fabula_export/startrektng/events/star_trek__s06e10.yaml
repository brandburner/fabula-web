  title: Madred reveals Picard’s meticulous surveillance
  description: 'In a stark, echoing interrogation room, Gul Madred methodically dismantles
    Picard’s composure by reciting an unsettlingly precise dossier of his personal
    and professional history—from his birthplace and family lineage to his Stargazer
    command and theta-band research. The revelation confirms the mission was a Cardassian
    trap, designed to exploit Picard’s expertise and past trauma. Madred establishes
    absolute dominance, threatening execution if Picard resists, while Picard’s shock
    gives way to hardened defiance. The scene underscores the Cardassians’ strategic
    advantage: they don’t just seek information—they seek to break Picard’s will,
    leveraging his history as a hostage to force compliance. The power dynamic is
    irrevocable, with Picard’s survival now contingent on outmaneuvering Madred’s
    psychological traps before the interrogation escalates further.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e10
  scene_sequence: 32
  sequence_in_scene: 51
  key_dialogue:
  - 'MADRED: A challenge. You should prove to be an interesting challenge. Possibly
    the most interesting to come through that door in many years.'
  - 'MADRED: Jean-Luc. Serial number SP dash nine three seven dash two one five. Son
    of Maurice and Yvette Picard, born in La Barre, France. Former Captain of the
    Stargazer... where you conducted extensive studies on theta-band subspace carrier
    waves.'
  - 'MADRED: In this room, you do not ask questions. I ask them, and you answer. And
    if I''m not satisfied with those answers... you will die.'
