      the command transfer ceremony, where Picard stands to read the Starfleet order.
      The podium serves as the focal point of the event, symbolizing the transfer
      of authority from Picard to Jellico. Its presence elevates the ceremony, giving
      it a formal and official tone, but its simplicity also underscores the perfunctory
      nature of the handover. The podium is where Picard’s voice carries the weight
      of Starfleet’s decision, and where Jellico’s dismissive 'Dismissed' marks the
      end of an era and the beginning of a new, uncertain chapter for the *Enterprise*’s
      crew.
    status_before_event: Erected in Ten Forward prior to the ceremony, awaiting Picard’s
      use.
    status_after_event: Removed after the ceremony, its symbolic role in the event
      complete.
