      of the risks they’re taking.
    beliefs:
    - Picard’s focus on the mission is necessary, but the team’s safety cannot be
      entirely sacrificed for it
    - Covert operations require adaptability, but this level of risk is unsustainable
      long-term
    observed_traits:
    - Practical and safety-conscious
    - Voices concerns but defers to mission priorities
    - Observant of environmental hazards
    - Resigned to the realities of covert operations
    importance: primary
