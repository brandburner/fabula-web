    description_of_involvement: The bosun’s whistle is sounded during the command
      transfer ceremony, marking the formal conclusion of the transfer of authority.
      Its shrill tone cuts through the tense silence of Ten Forward, signaling the
      end of the ritual and the official beginning of Jellico’s command. The whistle
      is a traditional naval instrument, symbolizing the continuity of Starfleet’s
      ceremonial protocols even amid leadership changes. Its sound is abrupt and final,
      reinforcing the institutional nature of the event and the irrevocability of
      the command transfer.
    status_before_event: Held by the bosun, ready to be sounded at the conclusion
      of the ceremony. Its presence is implied but not seen, as the bosun is off-screen.
    status_after_event: Sounded once, fulfilling its ceremonial role. It is then silent
      again, awaiting the next formal occasion.
    global_id: ger_object_f8bd1b4f263e
  - object_uuid: ger_object_955dda402c71
    description_of_involvement: The ceremonial podium in Ten Forward is the focal
      point of the command transfer ceremony, where Picard stands to read the Starfleet
      order relieving him of command. It is a simple, elevated platform, erected specifically
      for this occasion, and it symbolizes the institutional power of Starfleet. The
      podium is the stage for the formal surrender of authority, and its presence
      underscores the gravity of the moment. Jellico stands beside Picard, accepting
      the transfer with brisk efficiency, while the crew watches in uneasy silence.
      The podium is later vacated as the ceremony concludes, but its role in the event
      is pivotal—it is the physical manifestation of the shift in command.
