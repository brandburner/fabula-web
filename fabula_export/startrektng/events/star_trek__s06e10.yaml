- fabula_uuid: act_d2710600d66a8e9c
  number: 5
  summary: Picard's team breaches the suspected research facility on Celtris Three,
    only to discover it is an empty chamber—an elaborate trap. Cardassians immediately
    ambush them, leading to a chaotic firefight. During the intense confrontation,
    Picard is captured while Worf, wounded by a disruptor blast, and Beverly manage
    to escape, leaving Picard behind as the hatch seals shut. On the Enterprise, Riker
    detects coded Cardassian messages from Celtris Three and residual theta-band emissions,
    prompting Jellico to open a secure channel to Admiral Nechayev. Jellico informs
    Nechayev that the emissions have ceased, indicating the mission's completion,
    but confirms no contact from Picard's team, leaving their fate uncertain. Picard
    is brought before Gul Madred for interrogation, who reveals an astonishing level
    of detail about Picard's personal history and Starfleet career, confirming the
    Cardassians orchestrated the entire mission as a sophisticated lure. The act concludes
    with Madred asserting his control and threatening Picard's life, ending on a dramatic
    cliffhanger.
