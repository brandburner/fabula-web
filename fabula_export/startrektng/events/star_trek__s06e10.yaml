acts:
- fabula_uuid: act_42020e2b7a505fc1
  number: 1
  summary: 'Admiral Nechayev abruptly relieves Captain Picard of command of the Enterprise,
    reassigning him, along with Dr. Beverly Crusher and Lt. Worf, to a highly classified
    mission. Captain Edward Jellico assumes command, immediately instituting a demanding
    regime of operational changes, including new shift rotations and system reconfigurations,
    which creates significant friction with Commander Riker and the rest of the crew.
    Picard''s team begins intense, secret training in a holodeck, enduring rigorous
    physical and tactical simulations without knowing their exact destination or objective.
    Jellico''s initial interactions with the crew, particularly Riker, establish his
    no-nonsense, results-oriented leadership style, which contrasts sharply with Picard''s
    more collaborative approach, leading to immediate tension. The act concludes with
    a clear demonstration of Jellico''s authoritative command style as he dismisses
    Riker''s concerns about the new shift schedule and asserts his full control over
    the Enterprise, while Picard prepares for his dangerous, unknown assignment, hinting
    at the high stakes of the overall situation. This segment establishes the dual
    narrative tracks: Jellico''s command of the Enterprise and Picard''s covert operation,
    both against the backdrop of escalating Cardassian tensions.'
