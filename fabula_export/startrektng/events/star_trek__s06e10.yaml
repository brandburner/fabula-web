  key_dialogue: &id009
  - 'JELLICO: I want you to install a bypass between the main phaser array and the
    secondary generators. I also want to run the main deflector pathway through the
    warp power grid and the auxiliary conduits through the lateral relays. You may
    have to reconfigure the transfer interface.'
  - 'DATA: The transfer interface is not designed for that configuration. It will
    take seven hours to make the changes.'
  - 'RIKER: Sir... you may not be aware that our normal interface already routes auxiliary
    power through three separate relays.'
  - 'JELLICO: I''m aware of your current systems design. It''s not good enough. If
    these negotiations fail, we could find ourselves in a war zone. If that happens
    I want to be loaded for bear.'
  - 'JELLICO: And... get that fish out of the Ready Room.'
