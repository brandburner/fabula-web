      a seasoned commander, issuing a rapid-fire series of orders to militarize the
      *Enterprise*. He overrides Riker’s objections with blunt authority, repurposing
      science stations for damage control and weapons status, mandating battle drills,
      and—most symbolically—ordering the removal of Picard’s fish from the Ready Room.
      His body language is assertive and unyielding, reinforcing his control over
      the ship and crew. He leaves the bridge with Data, his final orders hanging
      in the air like a challenge to the crew’s loyalty.
