      the podium. They are part of the lounge’s standard furnishings, designed for
      comfort and socializing.
    status_after_event: Occupied by Beverly and Troi, who sit together in silence.
      The benches now symbolize the crew’s fatigue and the emotional weight of the
      leadership transition.
    global_id: ger_object_69caf13367bd
  - object_uuid: ger_object_80e5340ab54f
    description_of_involvement: 'The Ten Forward refreshments—trays of food and dispensers
