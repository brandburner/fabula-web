  title: Geordi vents frustration to Riker
  description: "\n  In a tense corridor exchange, Geordi La Forge—visibly agitated—unloads\
    \ his frustration over Captain Jellico’s unrealistic demands, which include rerouting\
    \ power systems, overhauling duty rosters, and realigning warp coils in an impossible\
    \ two-day timeline. Geordi’s anger stems not from the work itself but from the\
    \ lack of time and resources, a clear violation of Starfleet’s operational standards.\
    \ Riker, already aware of Jellico’s sweeping changes across departments, acknowledges\
    \ the shared burden but admits his own attempts to reason with Jellico have failed.\
    \ Geordi, desperate for a solution, suggests enlisting Picard’s intervention,\
    \ framing the request as a last resort to restore sanity to the *Enterprise*’s\
    \ operations. Riker’s reluctant agreement signals the crew’s growing reliance\
    \ on Picard as a stabilizing force, even as his own authority is eroded. The scene\
    \ underscores the crew’s fracturing morale and the unspoken tension between loyalty\
    \ to Jellico’s orders and the need for Picard’s guidance.\n  "
