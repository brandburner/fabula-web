  title: Jellico reshapes the ready room
  description: 'In the ready room, Captain Jellico systematically dismantles Picard’s
    personal touches—removing the Shakespeare volume, wood carving, and fish tank—while
    replacing them with his own son’s crayon drawings. When Counselor Troi enters
    to discuss crew morale, Jellico deflects her concerns with cold efficiency, redirecting
    her to enforce his new command style. He dismisses her abruptly, then casually
    orders her to wear a standard uniform on the bridge, a deliberate strike against
    Picard’s legacy. The scene underscores Jellico’s calculated dominance: he isn’t
    just asserting authority over the ship, but over Picard’s identity and the crew’s
    trust, setting the stage for deeper fractures in the *Enterprise*’s cohesion during
    the covert mission. The contrast between his rigid professionalism and the childlike
    drawings reveals his duality—a man who wields power with precision but clings
    to personal vulnerability, making his takeover all the more unsettling.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e10
  scene_sequence: 9
  sequence_in_scene: 17
  key_dialogue:
  - |-
    TROI: I'd like to talk about the way the change in command is affecting the crew.
    JELLICO: I've noticed some resistance.
    TROI: I wouldn't call it resistance. More like... uncertainty. Most of them have served under Captain Picard for several years. They knew him, knew what he expected. Now they're being asked to adjust to a new captain and a new way of doing things. They're uncertain how to react.
    JELLICO: I see your point. This all could be very unsettling to them... And to you. Perhaps everyone just needs some time... time for you to get to know and trust the crew... and time for them to understand how you want things done.
    JELLICO: I'm glad you brought this to my attention, Deanna. Unfortunately, I don't have time for a honeymoon with the crew. You've clearly given this a lot of thought, so I want you to take charge of the morale situation. Please see to it that they make the adjustment to the new routine quickly and easily.
  - 'JELLICO: I prefer a certain... formality on the Bridge. I would appreciate it
    if you wore a standard uniform when you''re on duty.'
  - |-
    JELLICO: ((re: drawings)) The latest masterpieces from my son.
    TROI: ((looks)) Definitely an elephant.
    JELLICO: ((turns drawing)) I think.
