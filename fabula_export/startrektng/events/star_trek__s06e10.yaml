  global_id: null
  title: Jellico delivers mission silence to Nechayev
  description: In the Enterprise ready room, Captain Jellico initiates a secure transmission
    to Admiral Nechayev to report the abrupt cessation of theta-band emissions from
    Celtris III—the signal Picard’s team was tracking. The absence of follow-up communication
    leaves both officers in tense silence, their unspoken dread for Picard’s fate
    palpable. Jellico’s measured delivery contrasts with Nechayev’s restrained urgency,
    revealing the high stakes of the mission and the personal weight of command. The
    scene underscores the mission’s failure to materialize as planned, forcing Jellico
    and Nechayev to confront the possibility of disaster without concrete evidence.
    The exchange is brief but charged, with Jellico’s contemplative pause afterward
    hinting at his own investment in Picard’s survival beyond mere operational concern.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e10
  scene_sequence: 31
  sequence_in_scene: 50
  key_dialogue:
  - 'NECHAYEV: Captain?'
  - 'JELLICO: Those emissions you were so concerned about... have just stopped. I''d
    say that one way or the other, our friends have finished their task.'
  - 'NECHAYEV: Have you heard from our friends?'
  - 'JELLICO: No.'
  - 'NECHAYEV: Let me know if you do. I''d very much like to see them again.'
  - 'JELLICO: So would I, Admiral.'
