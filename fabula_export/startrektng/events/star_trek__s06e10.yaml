    emotional_state: Deeply concerned but controlled—Picard’s emotional state is a
      mix of fear for Beverly’s safety and frustration at his own inability to act
      immediately. However, his training and experience allow him to channel these
      emotions into effective leadership, ensuring the rescue is executed safely and
      the team remains focused on the mission. There is a quiet intensity to his demeanor,
      a recognition of how close they came to losing a critical member of the team.
    goals:
    - Ensure Beverly Crusher’s safe extraction from the cave-in
    - Assess the team’s readiness to continue the mission after the incident, balancing
      Beverly’s well-being with the urgency of their objective
    what_happened: Picard is the first to vocalize the danger, his voice sharp with
      urgency as he hears the rumbling and realizes Beverly is trapped. His instinct
      is to rush back into the tunnel, but Worf’s restraint forces him to pause, his
      body tensed with the effort to hold back. Once Worf begins the rescue, Picard
      positions himself at the tunnel entrance, ready to assist, his hands gripping
      Worf’s legs as he pulls the Klingon—and Beverly—free from the debris. His concern
      for Beverly is palpable, both in his physical actions and his immediate check
      on her condition. Picard’s leadership in this moment is less about giving orders
      and more about being present, ensuring the team’s safety while also assessing
      their ability to continue. His decision to press forward after the incident
      reflects his balance of empathy and mission focus.
