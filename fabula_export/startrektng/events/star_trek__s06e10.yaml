    JELLICO: The power transfer levels will need to be upgraded by twenty percent. The efficiency of your warp coils is also unsatisfactory.
    GEORDI: The coil efficiency is well within specifications, Captain.
    JELLICO: I'm not interested in the specs, Geordi. The efficiency needs to be at least fifteen percent higher.
  - |-
    GEORDI: Taking that grid off-line will shut down the astrophysics lab, exobiology, geological research...
    JELLICO: We're not on a research mission. Get it done in two days.
  - |-
    DATA: I believe that is also an attainable goal. If we utilize the entire Engineering department, there should be sufficient manpower available to complete the task.
    GEORDI: Sure, if they work around the clock for the next two days.
