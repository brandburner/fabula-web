      and the moral ambiguities inherent in covert operations, where the ends often
      justify means that would be unacceptable in open conflict.
    internal_dynamics: The team’s use of tactics like seduction and physical intimidation
      reflects a temporary suspension of Starfleet’s usual diplomatic norms, driven
      by the urgency of the mission.
