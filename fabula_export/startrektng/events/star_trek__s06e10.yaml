  global_id: null
  title: Nechayev relieves Picard and installs Jellico
  description: Admiral Nechayev delivers a blunt briefing to Riker, Data, and Troi
    about escalating Cardassian border activity, revealing the Enterprise’s covert
    redeployment to diplomatic talks. Without warning, she abruptly strips Captain
    Picard of command, reassigning him, Beverly, and Worf to a classified mission.
    Nechayev justifies the decision by appointing Captain Jellico—a Cardassian armistice
    veteran—to lead the Enterprise, citing his experience as critical for the dangerous
    negotiations ahead. The announcement shocks the crew, particularly Riker, who
    later challenges Nechayev’s authority in a private confrontation. The scene fractures
    trust, escalates geopolitical tension, and forces Picard into a shadow operation,
    where his authority and purpose are suddenly in question. Jellico’s arrival sets
    the stage for a power struggle and a covert mission to counter the Cardassian
    threat.
