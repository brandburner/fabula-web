      solidarity over a classified mission. The organization’s cohesion is tested
      by Jellico’s rigid command style, which clashes with the crew’s loyalty to Picard
      and their established routines. The event underscores the crew’s divided loyalties
      and the fragility of their morale under the new leadership, even as they strive
      to maintain professionalism.
