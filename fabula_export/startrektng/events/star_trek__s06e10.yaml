  object_involvements:
  - object_uuid: ger_object_74dfaa65f7d8
    description_of_involvement: The *Enterprise*’s Tactical Station Panel becomes
      a symbol of Jellico’s authoritarian control as he strides to it and issues orders
      to repurpose the ship’s systems for combat. The panel’s interfaces glow under
      his fingers as he bypasses protocols, rerouting phaser arrays and deflector
      pathways. Riker stands nearby, visibly frustrated, while Data offers logical
      warnings that are ignored. The panel’s transformation from a tool for exploration
      to one for war reflects the broader shift in the ship’s purpose under Jellico’s
      command, highlighting the tension between Starfleet’s ideals and his militaristic
      approach.
    status_before_event: Operational under standard tactical protocols, supporting
      diplomatic and exploratory missions.
    status_after_event: Repurposed for combat readiness, with phaser arrays and deflector
      pathways rerouted for immediate use. The panel now reflects Jellico’s militaristic
      priorities, symbolizing the ship’s transition from diplomacy to confrontation.
    global_id: ger_object_74dfaa65f7d8
  - object_uuid: ger_object_a7deeb76ee90
    description_of_involvement: 'Picard’s fish, a small but symbolic artifact in the
      *Enterprise*’s Ready Room, is ordered removed by Jellico as a deliberate erasure
      of Picard’s legacy. The fish represents Picard’s personal touch and the ship’s
      identity under his command, and its removal is a calculated move to assert Jellico’s
      authority. The order is given almost as an afterthought, but its significance
      is profound: it signals Jellico’s intent to strip away any remnants of Picard’s
      influence and establish his own militaristic vision for the *Enterprise*. The
      fish’s removal is a quiet but powerful moment, underscoring the shift in command
      dynamics and the crew’s resistance to Jellico’s leadership.'
    status_before_event: Alive and thriving in its aquarium in Picard’s Ready Room,
      a personal touch reflecting his command style.
    status_after_event: Removed from the Ready Room by two N.D. Crewmembers, its fate
      unknown but its symbolic significance erased. The Ready Room is now a blank
      slate for Jellico’s authority.
    global_id: ger_object_a7deeb76ee90
  - object_uuid: ger_object_ed40f4d17d2a
    description_of_involvement: The *Enterprise*’s warp power grid is co-opted by
      Jellico to reroute the main deflector pathway, bypassing standard protocols
      to boost combat power. This modification is part of his aggressive overhaul
      of the ship’s systems, designed to prepare for a potential Cardassian ambush.
      The warp power grid, typically used for propulsion and long-range travel, is
      now repurposed for defensive and offensive capabilities, reflecting Jellico’s
      belief that the *Enterprise* must be ready for war. Data’s warning about the
      logistical challenges of this change is dismissed, underscoring Jellico’s willingness
      to prioritize confrontation over efficiency.
    status_before_event: Operational under standard warp protocols, supporting propulsion
      and long-range travel.
    status_after_event: Rerouted to power the main deflector pathway, requiring a
      seven-hour overhaul of the transfer interface. Now a dual-purpose system supporting
      both warp travel and combat readiness, reflecting Jellico’s militaristic priorities.
    global_id: ger_object_ed40f4d17d2a
  - object_uuid: ger_object_b3f56646c15f
    description_of_involvement: The *Enterprise*’s main phaser array is at the center
      of Jellico’s militarization efforts. He orders a bypass between it and the secondary
      generators, overriding standard protocols to reroute power for immediate combat
      capability. This modification is part of a broader strategy to transform the
      ship from a diplomatic vessel into a warship, reflecting Jellico’s belief that
      negotiation with the Cardassians is futile. The phaser array symbolizes the
      shift from exploration to confrontation, and its repurposing underscores the
      escalating tension between Starfleet’s ideals and Jellico’s militaristic approach.
    status_before_event: Operational under standard Starfleet protocols, routed through
      the normal auxiliary power relays.
    status_after_event: Rerouted to the secondary generators via a bypass, overriding
      the transfer interface and requiring a seven-hour overhaul. Now primed for immediate
      combat use, reflecting Jellico’s aggressive preparations.
    global_id: ger_object_b3f56646c15f
  - object_uuid: ger_object_1fc64aaa7233
    description_of_involvement: The *Enterprise*’s secondary generators are repurposed
      as a power source for the main phaser array under Jellico’s orders. This bypass
      of standard protocols is part of his broader strategy to militarize the ship,
      ensuring that the phaser array can be activated immediately in the event of
      a Cardassian attack. The generators, typically used as backup power, are now
      a critical component of Jellico’s combat-ready configuration, symbolizing the
      ship’s transition from diplomacy to confrontation. Data’s warning about the
      seven-hour delay highlights the impracticality of this modification, but Jellico
      overrides it with blunt authority.
    status_before_event: Operational as backup power sources, following standard Starfleet
      protocols.
    status_after_event: Rerouted to power the main phaser array via a bypass, requiring
      a seven-hour overhaul of the transfer interface. Now a primary component of
      the ship’s combat systems, reflecting Jellico’s militaristic priorities.
