- fabula_uuid: cand_evt_scene_fc02edc7f942b5ff_04
  global_id: null
  title: Jellico secretly aids Picard’s mission
  description: "\n  In a private corridor exchange following Picard’s formal relinquishment\
    \ of command, Captain Jellico—Picard’s temporary replacement—reveals his covert\
    \ awareness of Picard’s unauthorized mission to destroy the Cardassian metagenic\
    \ weapon. Despite his official authority and the tension between them, Jellico\
    \ offers critical assistance: he proposes launching a class five probe near the\
    \ Cardassian border, allowing Picard’s team to intercept its telemetry for updated\
    \ intelligence on the installation’s layout. The exchange is charged with subtext—Jellico’s\
    \ offer is a calculated risk, bridging his duty to Starfleet and his personal\
    \ loyalty to Picard. The moment underscores Jellico’s complex moral stance: while\
    \ he enforces rigid operational changes aboard the *Enterprise* (e.g., implementing\
    \ a fourth watch shift), he privately supports Picard’s rogue mission, demonstrating\
    \ a pragmatic flexibility that contrasts with his authoritarian public persona.\
    \ Picard’s acceptance of the help, despite their strained dynamic, highlights\
    \ the mission’s urgency and the crew’s fractured allegiances. The dialogue is\
    \ terse but loaded, with Jellico’s shift from jovial camaraderie to cold authority\
    \ when addressing Riker’s objections serving as a reminder of his dual role: a\
    \ disciplinarian captain and a reluctant ally to Picard’s cause.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e10
