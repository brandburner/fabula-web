  title: Jellico’s final warning to Picard
  description: "\n  In the Enterprise’s ready room, Picard and Jellico review mission\
    \ details before Picard’s covert departure. Jellico dismisses Picard’s attempt\
    \ to vouch for Riker, bluntly stating that the mission’s failure is likely and\
    \ that the Enterprise is now *his* command. Their handshake and Jellico’s return\
    \ of Picard’s Shakespeare book—a symbolic gesture of authority—underscore the\
    \ irreversible power shift. Jellico’s ‘Good hunting’ carries ominous weight, acknowledging\
    \ the mission’s peril while reinforcing their fractured relationship. The exchange\
    \ frames Picard’s departure as both a strategic necessity and a personal reckoning,\
    \ with Jellico’s cold pragmatism contrasting sharply with Picard’s lingering loyalty\
    \ to his crew. The scene ends with Jellico alone in the captain’s chair, holding\
    \ a drawing of his son, a quiet reminder of the personal stakes beneath the professional\
    \ tension.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e10
  scene_sequence: 12
  sequence_in_scene: 22
  key_dialogue:
  - 'JELLICO: Jean-Luc... let''s be candid for a moment. The Cardassians aren''t going
    to listen to reason, and the Federation won''t give in to their demands. And the
    odds are, you won''t be coming back from this mission of yours.'
  - 'JELLICO: I want this ship ready for action. I don''t have time to give Wil Riker
    or anyone else a ''chance.'' And... forgive me for being blunt, but the Enterprise
    is mine now.'
  - 'JELLICO: ((smiles)) Well... here''s hoping you beat the odds. Good hunting.'
