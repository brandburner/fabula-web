      and transmit telemetry data for Picard’s covert team to intercept. Its role
      in the event is twofold: functionally, it provides critical intelligence for
      the mission, and narratively, it highlights Jellico’s covert support for Picard
      despite his public authoritarianism. The probe’s launch is a strategic move,
      offering Picard a lifeline while Jellico asserts control over the *Enterprise*’s
      operations.'
    status_before_event: Stored in the *Enterprise*’s probe bay, awaiting deployment
      near the Cardassian border.
    status_after_event: Launched and transmitting telemetry data to Picard’s shuttle,
