    not present before the Entity''s attack.'
  - 'DOCTOR MARR: Commander... I hear everything you say to me. If there is anything
    worth my response, you can be sure I will not be silent.'
  - 'DATA: Then I do not understand your lack of interest in the bitrious filaments
    I mentioned.'
  - 'DOCTOR MARR: It''s old news to me. I found evidence of bitrium in three separate
    attack sites. It seems to be a residual element the Entity produces after it absorbs
    living matter.'
  - 'DATA: As I have speculated, the presence of refractory --'
  - 'DOCTOR MARR: ((interrupting)) -- refractory metals. Yes, I know.'
