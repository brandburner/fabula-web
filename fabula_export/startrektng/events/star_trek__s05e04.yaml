  - 'DOCTOR MARR: I''ve never surveyed a site so soon after the attack. I thought
    maybe I''d find something new. Something that would make a difference...'
  - 'DATA: If the Entity left a residual trace of antiprotons in the samples we collected,
    the gamma radiation scan would reveal that.'
  - 'DOCTOR MARR: A sharp spike at ten KEV. And another... A pattern...'
  - 'DOCTOR MARR: If it also deposits antiprotons in space, as it travels... could
    we detect them?'
  - 'GEORDI: Sure. The ship''s lateral sensors can be set for gamma radiation.'
  - 'DOCTOR MARR: Well. Let''s get to it, shall we?'
