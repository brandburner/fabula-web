  title: Marr hears Renny’s voice through Data
  description: 'In Data’s quarters, Dr. Marr—ostensibly focused on programming the
    graviton beam’s frequency modulation—abruptly shifts the conversation to her son
    Renny, probing Data’s stored memories of him. What begins as a seemingly casual
    inquiry about Renny’s childhood (his Parrises Squares victories, his girlfriend
    Janina) escalates into a raw, desperate request: Marr asks Data to replicate Renny’s
    voice by reading from his journals. Data hesitates but complies, delivering an
    adolescent Renny’s earnest, affectionate journal entry in perfect imitation. The
    voice—full of youthful optimism and unfulfilled dreams—unravels Marr’s composure.
    She listens in stunned silence, tears streaming, as the weight of her son’s lost
    future crashes over her. The moment forces her to confront the grief she’s buried
    beneath her quest for vengeance, revealing the fragility of her emotional armor
    just as the mission’s moral crossroads looms. The scene’s quiet devastation underscores
    the cost of her obsession and the irrevocable loss she’s refused to face.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e04
  scene_sequence: 15
  sequence_in_scene: 28
  key_dialogue:
  - 'DOCTOR MARR: Could you... do something for me? It would mean a lot... You see...
    all I have left of Renny, my only connection to him... is there, inside you. And
    I was wondering... if you could talk to me in his voice.'
  - 'DATA: ((as Renny)) I took my last exam today... I think I did all right on everything
    except cellular biology. I know you think it''s important, Mom... but I don''t
    see how I''m ever gonna use this stuff. In a couple of weeks, a bunch of us are
    going on an archaeological dig in the mountains... I miss you.'
  - 'DOCTOR MARR: Renny started Parrises Squares when he was young... too young, really...
    but the older children kept asking him to join in and I couldn''t keep him away.
    He just had this natural gift...'
