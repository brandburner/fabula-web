  sequence_in_scene: 32
  key_dialogue:
  - 'DOCTOR MARR: I need your help... like you did before... tell me you understand,
    Renny... that you know I did it for you, because I love you... because I wanted
    to give you peace, at last.'
  - 'DATA: I do not find such a file in your son''s journals. However... from what
    I know of him by his writing and his memories, I do not believe he would be happy.
    He was proud of your career as a scientist, and now you have destroyed it. You
    say you did it for him, but he would not want that. Yes. He would be very sad
    now. (innocently hopeful) Does that help, Doctor Marr?'
