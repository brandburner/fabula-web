    to me, and kind. I repaid you with accusations -- and I realize I may have been
    wrong.'
  - 'DATA: I am unaware of any negative thoughts he had about you. His personal journals
    indicated he was proud... that you were such a fine scientist.'
  - 'DOCTOR MARR: He was... ? What else... do you know... ?'
