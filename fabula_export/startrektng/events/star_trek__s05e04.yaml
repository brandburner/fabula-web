  title: Marr’s reluctant gamma scan breakthrough
  description: 'In Engineering, Dr. Marr’s frustration with inconclusive soil analysis—her
    last hope for new data—reveals her emotional investment in the mission. When Data
    suggests a gamma radiation scan, she initially dismisses it as unproven, her distrust
    of him rooted in his connection to Lore and her own grief over her son’s death.
    Geordi’s immediate enthusiasm for the idea forces her to confront her resistance,
    and as the scan uncovers an antiproton pattern, her professional curiosity briefly
    overrides her skepticism. The moment marks a tactical shift in the mission, but
    her lingering hesitation underscores her deeper conflict: the tension between
    scientific rigor and her personal vendetta against the Crystalline Entity. The
    discovery sets up the team’s next move—tracking the Entity’s antiproton trail—but
    Marr’s reluctance to engage with Data’s logic foreshadows her eventual breakdown
    when vengeance takes priority over reason.'
