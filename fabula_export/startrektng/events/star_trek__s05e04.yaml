    power_dynamics: |2-

      Exercising authority over the colonists and directing their evacuation. Starfleet's protocols and the crew's expertise are critical in assessing the threat and ensuring the safety of the colonists. The organization's power is tested as the crew must make ethical decisions about how to respond to the Crystalline Entity.
