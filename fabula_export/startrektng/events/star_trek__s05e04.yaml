- fabula_uuid: cand_evt_scene_76eaa74b02476cf8_01
  global_id: null
  title: Marr’s Revenge and the Entity’s Destruction
  description: "\n  The Crystalline Entity detonates violently in space after Dr.\
    \ Marr’s sabotage, its shards scattering in a catastrophic burst of light. On\
    \ the *Enterprise* bridge, Picard’s restrained fury is palpable as he orders Worf\
    \ to confine Marr, but she remains fixated on the destruction, her grief momentarily\
    \ sated. Data intervenes, offering to escort her instead, revealing her unspoken\
    \ bond with him—one rooted in her son’s memories. Her quiet acceptance of Data’s\
    \ guidance underscores the moral fracture between justice and vengeance, while\
    \ the crew’s stunned silence highlights the irreversible consequences of her actions.\
    \ The Entity’s demise leaves the mission’s purpose in question, forcing the crew\
    \ to confront the cost of retribution over diplomacy.\n  "
