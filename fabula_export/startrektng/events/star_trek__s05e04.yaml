    symbolic_significance: Represents the *threshold* between professional collaboration
      and personal reckoning—a space where Marr’s scientific objectivity and Data’s
      logical precision collide with the messy reality of grief and hidden knowledge.
    access_restrictions: Open to all crew, but the moment’s intimacy makes it feel
