  title: Marr dismisses Data, Picard enforces cooperation
  description: |2-

      Dr. Kila Marr arrives on the *Enterprise* and immediately establishes her professional authority while subtly undermining Data’s credibility. During a briefing in the observation lounge, she ignores Data’s contributions—twice—when he offers critical insights about the Crystalline Entity’s behavior and the Omicron Theta attack. Her dismissive attitude stems from her knowledge of Lore’s past collaboration with the Entity, which she implies taints Data by association. Picard, observing her hostility, intervenes by directly ordering Marr to work with Data, framing it as a strategic necessity. Marr complies outwardly but remains visibly resistant, her flushed cheeks betraying her frustration. The exchange reveals Marr’s unresolved grief over her son’s death and her deep-seated bias against Data, while Picard’s firm stance underscores his pragmatic leadership. Troi later confirms Marr’s emotional transfer of blame from Lore to Data, setting up future tensions. The scene establishes a fragile alliance between Marr and Data, one that could either save the mission or doom it due to Marr’s unresolved trauma and Data’s unwavering logic.
