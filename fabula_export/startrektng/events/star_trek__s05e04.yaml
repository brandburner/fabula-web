      The subterranean caverns beneath the hills to the east of Melona Colony serve as the only viable shelter for the colonists as the Crystalline Entity descends. Data identifies them as the best bet for cover, approximately one kilometer east of the colony. The caverns represent a desperate refuge, offering protection from the Entity's surface-scouring energy. Their cool, shadowed chambers and twisting tunnels provide a stark contrast to the sunlit valley's sudden peril, offering a glimmer of hope for survival amid the whirring dread and darkening skies. The colonists race toward this natural refuge, its depths offering desperate cover as the Entity's destructive beauty looms over the colony.
