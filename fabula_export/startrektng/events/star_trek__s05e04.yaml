    emotional_state: A fragile facade of professionalism masking deep grief and simmering
      rage—Marr’s emotional state is a pressure cooker, her curiosity about Data’s
      programming giving way to cold dismissal as she redirects her focus to the Crystalline
      Entity’s energy signatures. The turbolift’s confined space amplifies her internal
