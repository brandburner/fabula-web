acts:
- fabula_uuid: act_da4d126475c0f3dd
  number: 1
  summary: On the idyllic Melona Colony, Commander Riker, Data, and Dr. Crusher oversee
    infrastructure preparations. Riker develops a connection with engineer Carmen
    Davila. Their peaceful work shatters with the sudden, ominous arrival of the Crystalline
    Entity. Riker recognizes the threat and initiates an evacuation to subterranean
    caverns. The Entity, a vast crystalline form, descends, consuming everything in
    its path with a brilliant, destructive beam. Carmen, attempting to save an older
    man, is consumed. Riker and the remaining colonists seal themselves in the cave,
    but their air supply dwindles. The Enterprise, under Captain Picard, races to
    their location, its crew sensing a growing disturbance. After hours of dwindling
    oxygen, the Enterprise arrives, rescuing the trapped colonists. Riker emerges
    to find Melona completely devastated, reduced to dust and skeletal remains, a
    stark testament to the Entity's destructive power. This act establishes the immediate
    peril and the Entity's devastating impact, setting the stage for the Enterprise's
    mission.
