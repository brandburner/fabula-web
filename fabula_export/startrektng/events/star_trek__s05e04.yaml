    - Through Starfleet's protocols and values, which guide the crew's response to
      the crisis and shape their ethical considerations
    institutional_impact: |2-

      The event highlights the tension between Starfleet's commitment to exploration and communication with unknown entities and the ethical dilemmas posed by threats like the Crystalline Entity. It underscores the organization's responsibility to protect its personnel and the civilians under its care, as well as the challenges of balancing these goals in the face of overwhelming danger.
    internal_dynamics: |2-

      The crew's internal debate over how to respond to the Crystalline Entity reflects broader institutional tensions within Starfleet. Riker's leadership is tested as he must balance the need for decisive action with the ethical considerations of communicating with or destroying the Entity. The event also highlights the chain of command and the crew's reliance on each other's expertise in a crisis.
