    the colonists... but frankly it''s a little hard to believe.'
  - 'DATA: It is true, Doctor. The contents of their journals and logs were transferred
    into my memory cells. The man who created me also experimented with scanning the
    synaptic patterns of the colonists'' temporal lobes and programming them into
    my neural nets.'
  - 'DOCTOR MARR: You possess -- their thoughts?'
  - 'DATA: To some degree. Doctor Soong hoped to provide me with an amalgam of the
    colonists memories.'
