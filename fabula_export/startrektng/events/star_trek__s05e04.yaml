      deliberate, but the weight of her grief and the moral fracture of her actions
      are palpable. She is a woman who has sought vengeance and found only temporary
      solace in its aftermath.
    beliefs:
    - That the Entity deserved destruction for the pain it caused, including the loss
      of her son.
    - That her actions, though justified in her mind, have isolated her from the crew
      and the mission’s ideals.
