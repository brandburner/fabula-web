  title: Riker’s Letter and the Weight of Loss
  description: 'In the ready room, Picard offers Riker the opportunity to write a
    personal letter to Carmen Davila’s family, forcing him to confront the grief he
    has suppressed since her death. Riker initially accepts the offer but quickly
    pivots to advocating for the Crystalline Entity’s destruction, framing it as a
    strategic necessity to prevent further loss of life. Picard, sensing the emotional
    undercurrent, challenges Riker’s motives, probing whether his stance is driven
    by logic or unresolved personal pain. Riker deflects the accusation, insisting
    his reasoning is purely tactical—yet his insistence on writing the letter to Carmen’s
    family betrays his internal conflict. The exchange reveals the depth of Riker’s
    grief and the moral dilemma at the heart of the mission: whether to prioritize
    communication or destruction. The scene underscores the tension between duty and
    vengeance, with Riker’s emotional state mirroring Dr. Marr’s but lacking her overt
    hostility. Picard’s quiet skepticism leaves the question unanswered, but the weight
    of Riker’s unresolved feelings lingers, complicating the mission’s ethical framework.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e04
  scene_sequence: 14
  sequence_in_scene: 27
  key_dialogue:
  - 'PICARD: Starfleet will notify Carmen Davila''s family of her death and return
    her personal effects. Would you care to include a letter?'
  - 'RIKER: Yes, sir. I''d like that.'
  - 'PICARD: Are you sure that''s it? Or are you being influenced by personal feelings?'
  - 'RIKER: With all due respect, sir... I''m not a raw cadet. I''ve lost people on
    missions before. Carmen was a good friend. But that''s not why I''m saying this.
    If we take the time to try to communicate with this thing, we may lose our chance
    to destroy it. And I don''t think we can risk that.'
