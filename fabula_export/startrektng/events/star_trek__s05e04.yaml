      particularly any insights into the Crystalline Entity’s behavior.
    - To avoid engaging with Data’s claim of artificial empathy, as it threatens to
      unravel her carefully constructed emotional armor.
    what_happened: Dr. Kila Marr enters the turbolift with a posture that betrays
      her exhaustion—shoulders slightly hunched, her dark eyes flickering with a mix
      of professional curiosity and personal pain. She initially engages Data with
      a scientist’s skepticism, her voice laced with the weariness of someone who
      has heard too many empty promises. When Data confirms the transfer of colonists’
      memories, her expression tightens; she studies him like a specimen under a microscope,
      her scientific mind grappling with the ethical implications. But the moment
      Data mentions Dr. Soong’s experiment, her demeanor shifts. She turns away, her
      voice cutting through the hum of the turbolift as she commands the computer
      to take them to the bridge. Her focus locks onto the monitor’s energy spikes,
      her body language signaling a deliberate emotional withdrawal—she will not entertain
      Data’s claim of empathy, not when vengeance burns brighter.
