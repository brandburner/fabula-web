    emotional_state: Grief-sated but emotionally hollow, her satisfaction at the Entity’s
      destruction tempered by the knowledge of what she has lost—and what she has
      become.
    goals:
    - To ensure the Entity can never harm anyone again, even at the cost of her own
      moral standing.
    - To find a moment of peace in the aftermath of her actions, however fleeting.
    what_happened: Dr. Marr stands frozen on the bridge, her gaze locked on the destruction
      she has wrought. Her hand grips Data’s arm tightly, a physical anchor in the
      storm of her emotions. When she speaks—*'It will never hurt anyone again...'*—her
      voice is quiet, almost reverent, as if she is both confessing and celebrating.
      The satisfaction in her tone is fleeting, replaced by a sober resignation as
      she accepts Data’s offer to escort her. Her demeanor is reserved, her movements
      deliberate, but the weight of her grief and the moral fracture of her actions
      are palpable. She is a woman who has sought vengeance and found only temporary
      solace in its aftermath.
    observed_status: Dr. Marr stands frozen on the bridge, her gaze locked on the
