  description: "\n  On the *Enterprise* bridge, Dr. Kila Marr—still raw from her son\
    \ Renny’s death at the Crystalline Entity’s hands—reveals she has already calculated\
    \ the torpedo reprogramming needed to destroy it. When Picard expresses hope to\
    \ avoid firing, Marr’s visceral reaction exposes her unspoken assumption that\
    \ the Entity must be annihilated. Picard, sensing the escalating tension, redirects\
    \ the conversation to his ready room, where the confrontation can unfold privately.\
    \ Riker, observing from his post, registers the exchange with quiet unease, signaling\
    \ the mission’s moral fracture: Marr’s grief-driven vengeance versus Picard’s\
    \ insistence on diplomacy. The moment marks a turning point, as Marr’s hostility\
    \ toward the Entity—and by extension, Picard’s restraint—becomes undeniable, forcing\
    \ the captain to confront her emotional state head-on.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e04
  scene_sequence: 8
  sequence_in_scene: 17
  key_dialogue: &id017
  - 'DOCTOR MARR: That''s the same pattern we saw in engineering.'
  - 'PICARD: If it''s possible to avoid firing on it, I would hope that -'
  - 'DOCTOR MARR: You aren''t going to kill it?'
  - 'PICARD: Perhaps you should join me in my ready room.'
