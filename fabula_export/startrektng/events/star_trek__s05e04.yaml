  global_id: null
  title: Marr dismisses Data’s expertise
  description: Dr. Kila Marr arrives on the *Enterprise* and is briefed on the Crystalline
    Entity’s attack on Melona Colony. She immediately disregards Data’s contributions,
    revealing her deep-seated distrust of him due to his brother Lore’s past collaboration
    with the Entity. Picard, observing her hostility, insists on Data’s inclusion
    in her team, creating tension between Marr’s vengeful focus and the crew’s need
    for collaboration. Troi later notes Marr’s emotional detachment, foreshadowing
    her potential to undermine the mission’s objectives. The scene establishes Marr’s
    bias as a central conflict, while also highlighting Picard’s strategic pragmatism
    and Data’s unwavering professionalism despite the dismissal. The exchange sets
    up Marr’s later defiance and the crew’s struggle to balance scientific inquiry
    with emotional trauma.
