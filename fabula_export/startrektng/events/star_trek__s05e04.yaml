  title: Picard witnesses Kallisko’s annihilation
  description: "\n  The bridge crew receives a desperate distress call from the *Kallisko*,\
    \ a transport ship under relentless pursuit by the Crystalline Entity. Picard,\
    \ recognizing the futility of the ship’s defenses, attempts to guide its captain\
    \ through evasive maneuvers, but the Entity’s attack is swift and merciless. The\
    \ transmission cuts to screams and silence as the *Kallisko* is obliterated, leaving\
    \ only Data’s clinical confirmation of its destruction. The scene forces Picard\
    \ to confront the Entity’s unstoppable power while Marr, visibly shaken, retreats\
    \ into her own traumatic memories. The moment underscores the existential threat\
    \ posed by the Entity and the moral weight of inaction, as Picard orders an away\
    \ team to search for survivors despite knowing none remain. The Entity’s departure\
    \ afterward feels less like retreat and more like a calculated demonstration of\
    \ dominance, deepening the crew’s sense of helplessness and urgency.\n  "
