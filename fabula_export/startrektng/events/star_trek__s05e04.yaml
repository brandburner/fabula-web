    it?'
  - 'PICARD: We are not hunters, Doctor. Nor is it our role to exact revenge.'
  - 'DOCTOR MARR: What do you propose? We track it down... greet it warmly... and
    ask if it would mind terribly not ravaging any more planets?'
  - 'PICARD: I''m going to try to talk to it.'
  - 'DOCTOR MARR: To what end?'
  - 'PICARD: If we can determine what its needs are, we might find other sources to
    supply it...'
  - 'DOCTOR MARR: Its needs are to slaughter people by the thousands... it''s nothing
    but a giant killing machine.'
  - 'PICARD: There are those, Doctor, who would argue that the Crystalline Entity
    has as much right to be here as we do.'
