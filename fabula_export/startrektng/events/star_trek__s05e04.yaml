    - To maintain professional composure while processing the implication that Data
      has access to restricted Omicron Theta data (a direct threat to her control
      over the mission’s narrative).
    - To subtly probe for more information without revealing her personal investment
      (e.g., her son’s fate), using skepticism as a tool to extract truths.
    what_happened: "\n        Marr’s body language shifts almost imperceptibly as\
      \ Data speaks. Her initial gratitude curdles into confusion, then suspicion,\
      \ her puzzlement etched in the furrow of her brow and the tightness around her\
      \ eyes. The skeptical smile that curls her lips is a defense mechanism—a way\
      \ to mask the unease coiling in her gut. Her glance at Data as they reach the\
      \ turbolift is loaded: *Does he know more than he’s saying? Does he know about\
      \ Renny?* The unspoken questions hang between them, a chasm widening with each\
      \ word. Her silence after Data’s admission is telling; she doesn’t press for\
      \ details, but the way her fingers might tighten (implied by the text) suggests\
      \ she’s holding back a flood of emotions—anger, grief, betrayal. The turbolift’s\
      \ arrival is a reprieve, but the damage is done: trust has eroded, and the mission’s\
      \ scientific narrative now feels tainted by Data’s hidden depths.\n      "
