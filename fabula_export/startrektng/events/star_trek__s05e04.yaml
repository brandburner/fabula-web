  key_dialogue: &id013
  - |-
    DOCTOR MARR: Commander... Kila Marr.
    RIKER: We're glad you're here.
    DOCTOR MARR: You were on the surface... during the attack.
    RIKER: That's right.
    DOCTOR MARR: Remarkable. You and your group are the only beings ever known to survive an assault by the Crystalline Entity.
    RIKER: We were lucky.
    DOCTOR MARR: And... your android. He was there, too?
  - |-
    DATA: Doctor, I ran a full spectrographic analysis, section by section. Trace elements confirm that it was the same entity which destroyed the colony on Omicron Theta.
    DOCTOR MARR: The Crystalline Entity seems to function like a giant electromagnetic collector...
  - |-
    DOCTOR MARR: I am aware of his origins. I am very much aware that his brother, Lore, worked with the Crystalline Entity, and led it to Omicron Theta -- where it killed every living thing.
    PICARD: If there are others you wish to have on your team, you are, of course, welcome to request their additional presence. But as captain, I think it is in the best interest of this investigation for you and Commander Data to work together.
