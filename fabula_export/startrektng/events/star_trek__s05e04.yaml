  key_dialogue: &id001
  - 'CARMEN: ... and the hospital facility -- will stand there, facing north, in that
    grove of trees. The school and the arts center will be here, centrally located
    among the residential pods.'
  - 'RIKER: I have to say I envy you... this is a beautiful place to put down roots.'
  - 'CARMEN: Somehow, Commander... you don''t strike me as the kind that puts down
    roots...'
  - 'RIKER: No? How do I strike you?'
  - 'CARMEN: As... a free spirit. An adventurer.'
  - 'RIKER: Ah. And aren''t pioneers, like you, adventurers at heart?'
  - 'RIKER: Data -- what''s our best bet for cover?'
  - 'DATA: There are subterranean caverns beneath the hills to the east. Approximately
    one kilometer.'
