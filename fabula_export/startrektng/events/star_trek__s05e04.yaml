  title: Kallisko’s destruction and Marr’s unraveling
  description: 'The bridge crew listens in helpless horror as the *Kallisko*—a defenseless
    transport ship—is hunted down and annihilated by the Crystalline Entity. Picard’s
    futile attempts to guide the ship’s evasion are met with screams and silence,
    underscoring the Entity’s merciless efficiency. Meanwhile, Dr. Marr stands frozen,
    her face betraying a visceral reaction as the destruction triggers flashbacks
    to her son Renny’s death on Omicron Theta. The scene cuts to her internal collapse,
    her grief and rage resurfacing as the Entity’s latest atrocity mirrors her past
    trauma. Picard orders Riker to lead an away team to the wreckage, but Marr’s emotional
    state—now a ticking time bomb—threatens to derail the mission’s focus on communication
    over retaliation. The moment marks a turning point: the Entity’s escalation forces
    the crew to confront the cost of hesitation, while Marr’s unhealed wounds threaten
    to override logic with vengeance.'
