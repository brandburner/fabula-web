- fabula_uuid: cand_evt_scene_6e42971829de1449_02
  global_id: null
  title: Kallisko’s destruction and Marr’s unraveling
  description: 'The bridge crew of the *Enterprise* listens in helpless horror as
    the *Kallisko*—a defenseless transport ship—is hunted and annihilated by the Crystalline
    Entity. Picard’s desperate attempts to guide the ship to safety fail as the Entity’s
    attack overwhelms its shields, cutting off the captain’s frantic screams mid-transmission.
    The abrupt silence underscores the Entity’s merciless efficiency. Meanwhile, Data
    confirms the Entity’s departure, leaving the crew to confront the irreversible
    loss. The scene’s emotional weight is amplified by Dr. Marr’s visceral reaction:
    her stillness and haunted expression reveal her trauma resurfacing, as the *Kallisko*’s
    destruction mirrors the destruction of Omicron Theta and her son’s death. Picard
    orders Riker to lead an away team to search for survivors, but Marr’s absence—lost
    in her own memories—signals her emotional fracture, foreshadowing her later vengeful
    actions. The event escalates the existential threat posed by the Entity while
    deepening the moral dilemma for the crew, particularly Marr and Riker, who must
    now grapple with the consequences of their hesitation and grief.'
