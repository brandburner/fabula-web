    detachment and gently prompts her to open up about her unresolved grief over her
    son Renny’s death on Omicron Theta. Marr, visibly fragile, begins to confess her
    haunting thoughts—wondering if Renny called for her in his final moments—but abruptly
    regains control as the turbolift doors open, reinforcing her professional facade.
    The moment leaves her trauma unaddressed and underscores the tension between her
    personal pain and the mission’s demands. Data’s nonjudgmental presence serves
    as a catalyst for her brief vulnerability, but the interruption of the doors closing
    the scene mirrors the unresolved nature of her grief and the mission’s moral dilemma.
