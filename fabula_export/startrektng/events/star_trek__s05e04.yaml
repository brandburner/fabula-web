    goals:
    - To provide Dr. Marr with emotional support and guidance, recognizing her vulnerability
      in this moment.
    - To mitigate the tension between Marr and the crew, offering a neutral yet empathetic
      presence to ease her transition off the bridge.
    what_happened: Data stands beside Dr. Marr on the bridge, his presence a quiet
      anchor amid the crew’s shock. He observes her fixation on the destruction, her
      grip on his arm a rare physical connection that hints at their unspoken bond—rooted
      in his synaptic patterns from Omicron Theta, where he once knew her son Renny.
      When Picard orders Worf to escort Marr, Data intervenes with a measured suggestion,
      offering to take her himself. His voice is calm, his actions deliberate, revealing
      a compassionate understanding of her grief and the moral weight of her actions.
