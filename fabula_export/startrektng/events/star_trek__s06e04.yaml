    description_of_involvement: 'The USS *Enterprise* Transporter is the lifeline
      for Scott and Geordi, though it is not yet in range to effect their rescue.
      Picard’s order to ''stand by to beam two from the Jenolan'' activates the transporter’s
      role as the ship’s last hope. The transporter’s involvement is implied but critical—its
      readiness and precision will determine whether the away team survives. The object’s
      symbolic weight is immense: it represents the *Enterprise*’s ability to bridge
      the gap between past and future, saving lives even as it underscores the *Jenolan*’s
      doomed legacy.'
    status_before_event: Standby mode, awaiting Picard’s order to lock onto the *Jenolan*’s
      coordinates and initiate transport.
    status_after_event: Activated and ready, with the transporter room crew poised
      to beam Scott and Geordi to safety as soon as the *Enterprise* enters range.
