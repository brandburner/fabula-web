- fabula_uuid: cand_evt_scene_9bea72de5e1cec09_01
  global_id: null
  title: Riker and Geordi discover Scott in the Jenolan’s transporter
  description: "\n  Riker, Worf, and Geordi materialize aboard the derelict *Jenolan*,\
    \ a 23rd-century vessel adrift on a Dyson Sphere, where they immediately assess\
    \ the ship’s failing systems. The air is stale, life support barely functional,\
    \ and the engineering consoles show signs of severe damage. Geordi’s tricorder\
    \ reveals the transporter remains operational despite the ship’s decay, its power\
    \ drawn from auxiliary systems. Upon closer inspection, they discover an intact\
    \ transporter pattern locked in a continuous diagnostic cycle—a pattern that defies\
    \ all known physics, given its minimal signal degradation after 75 years. Riker\
    \ questions the logic of such a setup, but Geordi theorizes it may have preserved\
    \ a living being. When they activate the transporter, Montgomery Scott materializes\
    \ before them, alive after decades in stasis. The revelation forces Riker and\
    \ Geordi to confront the ethical and scientific implications of Scott’s survival,\
    \ setting the stage for his reintegration into the 24th century and the moral\
    \ dilemmas it presents.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e04
  scene_sequence: 3
  sequence_in_scene: 5
  key_dialogue:
  - 'RIKER: The air''s pretty stale.'
  - 'GEORDI: Life support is barely operating.'
  - 'RIKER: See if you can increase the oxygen level.'
  - 'GEORDI: The Transporter is still on-line... it''s being fed power from the auxiliary
    systems.'
  - 'RIKER: The rematerialization subroutine has been disabled.'
  - 'GEORDI: That''s not all... the phase inducers are connected to the emitter array...
    the override is completely gone... and the pattern buffer''s been locked into
    a continuous diagnostic cycle.'
  - 'RIKER: This doesn''t make any sense... locking the unit in a diagnostic mode
    just sends inert matter through the pattern buffer. Why would anyone want to -'
  - 'GEORDI: There''s a pattern still in the buffer.'
  - 'RIKER: It''s completely intact... less than point zero zero three percent signal
    degradation. How is that possible?'
  - 'GEORDI: I don''t know... but I''ve never seen a transporter system jury-rigged
    like this.'
  - 'RIKER: Could someone... survive in a Transporter buffer for seventy-five years?'
