  title: Scott Rejects Troi’s Counseling Offer
  description: After a tense confrontation with Geordi La Forge, Montgomery Scott
    remains agitated in his quarters, muttering about lost respect and relevance.
    When Counselor Deanna Troi arrives—ostensibly to offer support—Scott initially
    mistakes her intentions, assuming she’s there to assist with practical matters.
    His confusion turns to defensiveness as he realizes she’s a psychologist, and
    his pride flares when he suspects Geordi sent her. Troi’s well-meaning but clinical
    approach triggers Scott’s deep-seated resistance to vulnerability, especially
    in a century where his expertise is obsolete. His blunt rejection of her help—‘I
    don’t need a ship’s counselor’—is less about her role and more about his refusal
    to acknowledge his own fragility. The exchange underscores his struggle to adapt,
    not just to the 24th century’s technology, but to the emotional expectations of
    a crew that values psychological well-being as much as engineering prowess. His
    storming out isn’t just a physical exit; it’s a symbolic retreat into isolation,
    reinforcing the narrative’s central tension between self-reliance and the need
    for connection.
