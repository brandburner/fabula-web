- fabula_uuid: act_ef8f4956b002d07c
  number: 4
  summary: Trapped inside the Dyson Sphere, the Enterprise is propelled by tractor
    beams towards the central star. With warp and impulse engines overloaded, Riker
    uses maneuvering thrusters to narrowly guide the ship into a stable orbit, averting
    immediate catastrophe. Meanwhile, Scott and Geordi, still aboard the crashed Jenolan,
    work to access its damaged computer core. Scott initially expresses deep pessimism,
    dismissing the Jenolan's old technology as "useless, garbage" and "obsolete,"
    clearly projecting his own feelings onto the ship. Geordi, however, challenges
    this perspective, highlighting the enduring principles of the Jenolan's systems
    and arguing that old doesn't mean useless. This conversation marks a turning point,
    fostering a nascent respect between the two engineers. Their attempt to contact
    the Enterprise fails, and they realize the ship is no longer in orbit, deducing
    that it must have been pulled inside the sphere. On the Enterprise bridge, Data's
    scans reveal the star is highly unstable, experiencing severe radiation bursts
    and matter expulsions. Worf reports a massive solar flare heading directly for
    the ship, and Data predicts that the Enterprise's weakened shields will fail within
    three hours, leaving the crew facing imminent destruction.
