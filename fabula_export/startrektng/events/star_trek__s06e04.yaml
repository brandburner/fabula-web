  scene_sequence: 8
  sequence_in_scene: 18
  key_dialogue:
  - 'SCOTT: Laddie, ye need to phase-lock the warp fields within three percent or
    they''ll become unstable.'
  - 'GEORDI: We use a multi-phase auto-containment field now... it''s meant to operate
    above three percent.'
  - 'SCOTT: I remember a time when the old Enterprise was spiralling in toward Psi
    two thousand... the Captain wanted to try a cold start of the warp engines. I
    told him that without a proper phase-lock it would take at least thirty minutes...'
  - 'GEORDI: Look, sir. I''ve tried to be patient, I''ve tried to be polite. But I''ve
    got a job to do here. And you''re... in the way.'
  - 'SCOTT: I was driving starships while your great grandfather was still in diapers.
    I''d think you''d be grateful for a little help.'
