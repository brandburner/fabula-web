- fabula_uuid: cand_evt_scene_6901810fafc18cc8_02
  global_id: null
  title: Scott Rejects the Holodeck Illusion
  description: "\n  In the Holodeck’s recreation of the original *Enterprise* bridge,\
    \ Montgomery Scott—overwhelmed by nostalgia—briefly indulges in a fantasy of homecoming,\
    \ pouring a drink to absent crewmates and reminiscing about his past. When Picard\
    \ enters, their shared understanding of first ships and lost purpose creates a\
    \ fleeting bond, but Scott’s admission that he feels obsolete on the *Enterprise-D*\
    \ shatters the illusion. His abrupt termination of the simulation—‘a computer-generated\
    \ fantasy’—exposes his refusal to romanticize the past, even as it underscores\
    \ his unresolved grief over displacement. The moment forces Picard (and the audience)\
    \ to confront Scott’s struggle: his identity is tied to a ship and era that no\
    \ longer exist, and his rejection of the Holodeck is a painful acknowledgment\
    \ that he cannot return to what was. The scene pivots from emotional vulnerability\
    \ to defiant realism, setting up Scott’s eventual confrontation with his irrelevance\
    \ in the 24th century.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e04
  scene_sequence: 12
  sequence_in_scene: 27
  key_dialogue: &id017
  - 'SCOTT: Here''s to you, Lads...'
  - 'SCOTT: I''m not eighteen. I can''t start over again like a raw cadet.'
  - 'SCOTT: I don''t belong on your ship... I belong on this one. This was my home.
    This is where I had a purpose. But this isn''t real... it''s just a computer-generated
    fantasy. And I''m just an old man trying to hide in it. Computer, shut this bloody
    thing off. It''s time I acted my age.'
