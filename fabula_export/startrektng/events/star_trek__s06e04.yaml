- fabula_uuid: cand_evt_scene_049534384fc6894e_01
  global_id: null
  title: Jenolan's fatal engine meltdown
  description: The USS *Jenolan*'s plasma intercooler fails catastrophically, triggering
    a runaway engine meltdown that disables helm control with less than two minutes
    before critical failure. Scott, overwhelmed by the ship's imminent destruction,
    confirms the engines are overheating and cannot be stabilized. Geordi, working
    frantically at the console, loses helm control and transmits a desperate distress
    call to the *Enterprise*, warning Picard that the ship cannot be moved and must
    be destroyed to prevent the Dyson Sphere's collapse. Picard, calculating the time
    to reach the *Jenolan* with the *Enterprise*'s damaged impulse engines, orders
    an emergency transporter evacuation for Scott and Geordi. The scene underscores
    the fragility of 23rd-century technology in the 24th century, forcing Scott to
    confront his obsolescence while the *Enterprise* crew races against time to save
    the stranded crew and preserve the *Jenolan*'s legacy. The tension escalates as
    the clock ticks down, highlighting the stakes of the crisis and the emotional
    weight of Scott's helplessness in a world that has moved beyond him.
