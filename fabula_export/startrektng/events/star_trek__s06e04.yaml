- fabula_uuid: cand_evt_scene_24526cb2ca271f87_02
  global_id: null
  title: Scott’s past and future collide
  description: 'Geordi La Forge escorts Montgomery Scott through the Enterprise’s
    corridors, where Scott’s initial wonder at the 24th century’s technology curdles
    into quiet despair as he recounts the *Jenolan*’s crash and the desperate transporter
    buffer solution that saved his life—but cost Ensign Franklin’s. Geordi, sensing
    Scott’s emotional fragility, pivots to showcase the Holodeck as a way to re-engage
    him, but the gesture underscores Scott’s existential displacement: his past is
    a tragedy, and his future is a world he no longer recognizes. The moment crystallizes
    Scott’s core conflict—his struggle to reconcile his legacy with his irrelevance—and
    foreshadows his later push to prove his worth in Engineering, where his skills
    might still matter. The subtext reveals Scott’s unspoken guilt over Franklin’s
    death and his fear that his expertise, like his crew, is now obsolete. Geordi’s
    optimism, while well-intentioned, only highlights the generational chasm between
    them, setting up their eventual collaboration and Scott’s arc of redemption through
    ingenuity rather than nostalgia.'
