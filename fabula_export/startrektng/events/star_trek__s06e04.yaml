  - object_uuid: ger_object_89e54de0de4b
    description_of_involvement: The command chair in the *Jenolan*’s ops center is
      more than a seat—it’s a symbol of authority, legacy, and the weight of command.
      When Scott gestures for Geordi to take it, the chair becomes a silent witness
      to the passing of the torch. Its worn upholstery and outdated design contrast
      with Geordi’s modern uniform, underscoring the generational shift. The act of
      sitting in it isn’t just about control; it’s about stepping into a history that
      Scott is ready to hand over. The chair’s role evolves from 'relic' to 'threshold,'
      marking the moment Geordi assumes not just the conn, but the responsibility
      of bridging past and future.
    status_before_event: Vacant, its surface dusty from disuse. The chair’s design
      is utilitarian, a relic of the 23rd century.
    status_after_event: Occupied by Geordi, its presence now imbued with new purpose.
      The chair’s function shifts from 'historical artifact' to 'seat of active command.'
