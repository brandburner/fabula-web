  title: Picard appeals to Geordi’s empathy for Scott
  description: "\n  In the ready room, Picard strategically frames Scott’s potential\
    \ involvement in accessing the *Jenolan*’s memory core as a moral imperative rather\
    \ than a logistical task. He begins by asking Geordi about the feasibility of\
    \ retrieving the damaged records, then pivots to suggesting Scott’s expertise\
    \ could be critical. When Geordi proposes sending Lieutenant Bartel instead, Picard\
    \ shifts the conversation to Scott’s psychological state, emphasizing the universal\
    \ human need for purpose. By positioning the request as a compassionate act—‘one\
    \ of the most important things in a man’s life is the need to feel useful’—Picard\
    \ leverages Geordi’s empathy, ensuring his agreement without resorting to direct\
    \ orders. The exchange subtly reinforces Scott’s vulnerability while positioning\
    \ Geordi as a bridge between the 23rd and 24th centuries, foreshadowing their\
    \ eventual partnership. The moment underscores Picard’s leadership through emotional\
    \ intelligence and highlights the crew’s collective responsibility toward their\
    \ displaced guest.\n  "
