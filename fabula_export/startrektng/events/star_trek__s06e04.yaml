- fabula_uuid: cand_evt_scene_644d23fb4b9e8baa_01
  global_id: null
  title: Scott and Geordi Restore Jenolan Engines
  description: In the Jenolan’s ops center, Scott and Geordi work side-by-side to
    revive the ship’s engines after a critical failure. Scott, recognizing Geordi’s
    hesitation due to outdated regulations he himself authored, bypasses safety protocols
    with a bold, unorthodox solution—boosting deuterium flow through the auxiliary
    tank despite its theoretical pressure limits. Geordi initially resists, citing
    official specifications, but Scott’s confidence and experience persuade him. When
    the engines successfully restart, Geordi acknowledges Scott’s ingenuity, and Scott,
    in a rare moment of humility, defers command of the bridge to Geordi, symbolizing
    his acceptance of his new role as a mentor rather than a leader. The scene marks
    a turning point in their dynamic, as Scott’s 23rd-century expertise earns Geordi’s
    respect and validates his place in the 24th century, despite his struggles with
    modernity. The moment also subtly underscores the generational transition in Starfleet
    engineering, where tradition and innovation must coexist to overcome crises.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e04
  scene_sequence: 22
  sequence_in_scene: 41
  key_dialogue:
  - |-
    SCOTT: Shunt the deuterium from the main cryo pump to the auxiliary tank.
    GEORDI: The tank can't handle that much pressure.
    SCOTT: Where'd you get that idea?
    GEORDI: It's in the impulse engine specifications.
    SCOTT: Regulation forty-two slash fifteen... 'Pressure Variances in IRC Tank Storage'?
    GEORDI: Right.
    SCOTT: Forget it. I wrote it. A good engineer is always a wee bit conservative... at least on paper. Just bypass the secondary cut-off valve and boost the flow... it'll work.
  - |-
    SCOTT: Well, if we've done our jobs properly, the engines should be coming back on line... about... now.
    GEORDI: You were right... the auxiliary tank is holding.
  - 'SCOTT: I may be a captain by rank, but... I''ve never wanted to be anything else
    but an engineer. Take the Conn, Geordi.'
