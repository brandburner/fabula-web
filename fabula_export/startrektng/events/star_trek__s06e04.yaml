      of an indifferent, alien megastructure. It is a microcosm of Starfleet’s values—teamwork,
      ingenuity, and resilience under pressure.
    access_restrictions: Restricted to senior bridge officers and essential crew during
      crises. Access is tightly controlled to maintain operational security and chain
      of command.
