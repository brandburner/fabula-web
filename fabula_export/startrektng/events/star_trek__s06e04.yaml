      assessments, Data’s analytical capabilities)
    - Via the *Enterprise*’s technology and resources (e.g., sensors, shields, impulse
      power), even as those resources are stretched to their limits
    - By reinforcing the chain of command (Picard’s authority, Riker’s support, Worf’s
      reports), ensuring coordinated action under pressure
    institutional_impact: |2-

              The crew’s actions in this moment reflect Starfleet’s broader struggle to adapt to threats beyond its current technological understanding. The Dyson Sphere forces the organization to confront its limitations, potentially pushing it toward innovation or humility in the face of the unknown.
    internal_dynamics: |2-

              The crew’s internal cohesion is tested here, as they must rely on each other’s specialized skills (Data’s scans, Worf’s tactical reports, Riker’s engineering updates) to survive. There is no room for factionalism or hesitation—every member must perform their role flawlessly. The moment also highlights the tension between Starfleet’s exploratory mandate and the crew’s immediate need for self-preservation.
