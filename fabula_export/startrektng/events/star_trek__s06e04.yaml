    description_of_involvement: The *Dyson Sphere Gravitational Anomaly* is referenced
      indirectly as the catalyst for the *Jenolan*’s crash, its pull described by
      Scott as an inescapable force that doomed the ship. While not physically present
      in the corridor, its looming presence is felt in Scott’s halting recount of
      the event—his voice tightening as he describes the gravity well’s grip. The
      anomaly serves as a narrative link to the larger mystery of the Dyson Sphere,
      but in this moment, it is a symbol of Scott’s powerlessness and the unpredictability
      of the universe, a force that stripped him of his crew and his time.
    status_before_event: A distant, uncharted threat detected by the *Jenolan*’s sensors,
      later revealed to be the Dyson Sphere’s gravity well.
    status_after_event: Invoked as a tragic backstory element, its physical presence
      unresolved but its consequences (the crash, Franklin’s death) deeply embedded
      in Scott’s psyche.
    global_id: ger_object_69cd8d45776b
  - object_uuid: ger_object_d58c6333289a
    description_of_involvement: 'The *Jenolan Transporter Pattern Buffer* is the linchpin
      of Scott’s survival and guilt, its technical brilliance overshadowed by its
      tragic limitation. Scott describes his jury-rigged solution—locking the buffer
      into a diagnostic cycle and cross-connecting phase inducers—to Geordi, who praises
      its ingenuity. Yet Scott’s admission that it was ‘only fifty percent brilliant’
      (failing to save Franklin) reveals the buffer’s dual role: a lifeline and a
      reminder of his failure. In the corridor, it exists as a metaphor for Scott’s
      own state—preserved but incomplete, a relic of a past he cannot escape.'
    status_before_event: Functioning in a degraded but stable state aboard the wrecked
      *Jenolan*, sustaining Scott’s pattern for 75 years.
    status_after_event: Physically aboard the *Jenolan*, but its narrative role shifts
      to a symbol of Scott’s survival guilt and the ethical dilemmas of desperate
      engineering.
    global_id: ger_object_d58c6333289a
  - object_uuid: ger_object_2122bebdd947
    description_of_involvement: 'The *Jenolan’s Plasma Transfer Conduits* are the
      technical trigger for the crash, their overload described by Scott as the moment
      everything went wrong. He points to a conduit interface on the *Enterprise*’s
      wall, drawing a parallel between the two ships’ engineering—past and present.
      The conduits are not just a plot device but a metaphor for Scott’s fragility:
      their failure mirrors his own perceived failure to protect his crew. In the
      corridor, they become a silent witness to his confession, a tangible link to
      the trauma he carries.'
    status_before_event: Overloaded during the *Jenolan*’s final approach to the Dyson
      Sphere, causing the crash.
    status_after_event: Invoked as a narrative device, their breach symbolizing the
      irreversible damage to Scott’s world and his sense of self.
    global_id: ger_object_2122bebdd947
  - object_uuid: ger_object_ee1ad5056c0c
    description_of_involvement: 'Scott’s *Cross-Connected Phase Inducers* are the
      technical heart of his survival hack, praised by Geordi as ‘brilliant’ for sustaining
      the transporter buffer. Yet their mention is bittersweet, as Scott immediately
      qualifies the praise by acknowledging Franklin’s death. In the corridor, the
      inducers are discussed abstractly, but their physical absence makes them a ghost
      of Scott’s past ingenuity—a solution that worked, but not enough. They embody
      the paradox of his survival: a testament to his skill, yet a constant reminder
      of what he could not save.'
    status_before_event: Cross-connected aboard the *Jenolan* to provide a regenerative
