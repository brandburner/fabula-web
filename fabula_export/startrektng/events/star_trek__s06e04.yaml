      him a place in the 24th century—reflect Starfleet’s institutional commitment
      to its personnel, even those lost to time. The organization’s influence is subtle
      but profound: it is the reason Scott is alive, yet it also represents the unfamiliar
      future he must now navigate. Starfleet’s evolution—symbolized by Worf’s presence—is
      both a source of hope and a challenge to Scott’s identity.'
