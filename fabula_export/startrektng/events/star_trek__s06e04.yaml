  title: Jenolan crash landing on Dyson Sphere
  description: |2-

      The USS *Jenolan*—a derelict 23rd-century starship adrift on the Dyson Sphere’s surface—makes a controlled but rough crash landing, its hull visibly scarred but structurally intact. The impact is severe enough to suggest the ship’s systems are compromised, yet not so catastrophic that it would prevent eventual liftoff. This moment marks the physical transition from the Jenolan’s decades-long stasis to its rediscovery by the *Enterprise*, setting the stage for the crew’s investigation and the eventual revival of Montgomery Scott. The crash landing underscores the ship’s fragility and the urgency of the situation, as its failing systems (later revealed to include barely functional life support and a degraded transporter) become the primary focus of the away team’s assessment. The visual contrast between the ancient, battle-worn Jenolan and the advanced Dyson Sphere surface reinforces the narrative tension between past and present, history and progress. This event serves as a critical setup for the subsequent discovery of Scott in stasis and the ethical dilemmas surrounding his revival.
