      buffer, the framework for Geordi’s empathy, and the source of the technological
      advancements that overwhelm Scott. Starfleet’s policies (e.g., transporter regulations,
      crew recovery protocols) are implied in Scott’s survival and Geordi’s role as
      his guide, while its evolutionary trajectory—from the *Jenolan* to the *Enterprise-D*—highlights
      the chasm Scott must bridge. The organization’s goals and values are both a
      comfort (familiarity) and a challenge (adaptation) for Scott.'
