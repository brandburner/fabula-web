- fabula_uuid: cand_evt_scene_1bbd9019dcc41a39_03
  global_id: null
  title: Picard authorizes Jenolan rescue mission
  description: "\n  The *Enterprise* crew, mid-warp, detects a distress signal from\
    \ the long-lost *USS Jenolan*—a Federation transport ship vanished 75 years prior.\
    \ Data confirms the signal’s origin, prompting Picard to order an immediate halt\
    \ to warp speed. The ship is violently pulled into a massive gravitational field,\
    \ revealing an uncharted Dyson Sphere—a theoretical megastructure capable of harnessing\
    \ a star’s energy. The crew reacts with astonishment as Data and Picard theorize\
    \ about the object’s nature, with Riker questioning its potential for inhabited\
    \ life. Worf locates the distress signal’s source on the Sphere’s northern hemisphere,\
    \ and Picard orders the *Enterprise* into synchronous orbit. Data’s scans reveal\
    \ the *Jenolan* has impacted the Sphere’s surface, with minimal life support still\
    \ active but no life signs. Recognizing the urgency and historical significance,\
    \ Picard authorizes Riker to assemble an away team for an immediate rescue operation,\
    \ marking the *Enterprise*’s first direct engagement with the Sphere’s mysteries.\
    \ The scene culminates in Riker and Worf departing for Transporter Room Three\
    \ to prepare for the mission, setting the stage for Scott’s revival and the unfolding\
    \ crisis.\n  "
