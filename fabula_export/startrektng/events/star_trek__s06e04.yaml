  title: Scott demands his lost ship
  description: After leaving Ten Forward drunk and disoriented, Scott stumbles to
    the Holodeck, desperate to recreate the bridge of his beloved *USS Enterprise*
    (NCC-1701). His frustration mounts as the computer’s impersonal prompts force
    him to confront the reality that his past—even its registry number—has been overshadowed
    by progress. The exchange underscores his alienation in the 24th century, where
    technology has moved on without him, and his stubborn insistence on precision
    only deepens his sense of irrelevance. The scene foreshadows his struggle to reconcile
    his legacy with a future that no longer needs him, setting up his eventual confrontation
    with his own obsolescence.
