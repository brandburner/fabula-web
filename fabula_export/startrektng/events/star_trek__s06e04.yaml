acts:
- fabula_uuid: act_6c669734d0575cd9
  number: 1
  summary: The Enterprise, traveling at warp speed, detects a distress signal from
    the USS Jenolan, a Federation transport ship missing for seventy-five years. The
    signal leads them to an enormous, mysterious object, which Captain Picard identifies
    as a Dyson Sphere. Upon closer investigation, they locate the crashed Jenolan
    on the sphere's surface. A landing party, including Commander Riker, Lieutenant
    Worf, and Geordi La Forge, beams aboard the derelict ship. Geordi discovers a
    unique transporter buffer configuration holding a human pattern. They successfully
    rematerialize Captain Montgomery Scott, who has been in stasis for decades. Scott's
    immediate concern is for his fellow crewman, Ensign Franklin, whose pattern has
    degraded beyond recovery. Scott is then confronted with the reality of his seventy-five-year
    absence, reacting with profound shock to the advanced technology and the presence
    of a Klingon officer on the Enterprise bridge. Geordi attempts to introduce Scott
    to the ship's modern engineering, but Scott struggles to comprehend the vast technological
    leap. Dr. Crusher orders Scott to rest, preventing him from exploring Engineering
    further, which visibly frustrates him. Alone in his new, spacious quarters, Scott
    feels isolated and obsolete, a man out of time, as the weight of his displacement
    settles upon him.
