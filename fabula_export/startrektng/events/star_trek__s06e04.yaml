- fabula_uuid: act_dd1da1e382b613f0
  number: 3
  summary: Drunk and disheartened, Scott retreats to a Holodeck, programming a simulation
    of the original USS Enterprise bridge (NCC-1701). He finds a fleeting sense of
    belonging in the familiar surroundings, but the empty bridge ultimately emphasizes
    his loneliness and the past he has lost. Captain Picard, having observed Scott's
    struggles, enters the Holodeck and joins him. They share a drink of Aldeberan
    whiskey and bond over their shared experiences of commanding and missing their
    first starships, the Stargazer and the original Enterprise. This moment of empathy
    allows Scott to articulate his profound sense of obsolescence, stating that he
    feels "in the way" on Picard's ship and that his purpose belongs to a bygone era.
    Recognizing Scott's deep need to feel useful, Picard later requests Geordi to
    accompany Scott to the Jenolan to retrieve its damaged computer core data. Despite
    their earlier conflict, Geordi agrees, understanding Picard's intention to restore
    Scott's sense of purpose. Meanwhile, Data discovers a massive antenna array on
    the Dyson Sphere, which appears to be a communications device. As the Enterprise
    approaches to investigate, they trigger an automated system. The array reveals
    itself to be a gigantic hatch, which opens, and powerful tractor beams pull the
    Enterprise inside the Dyson Sphere, trapping them.
