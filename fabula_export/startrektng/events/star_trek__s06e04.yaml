  global_id: null
  title: Scotty’s outdated expertise sparks conflict
  description: Montgomery Scott, still grappling with his displacement in the 24th
    century, intrudes into Engineering during Geordi La Forge’s critical sensor recalibration,
    offering unsolicited advice rooted in 23rd-century protocols. His interference
    triggers an alarm when he adjusts the warp field containment parameters, exposing
    the technological gap between their eras. Geordi, already strained by Scott’s
    paternalistic demeanor, politely but firmly rejects his help, leading to a tense
    exchange where Scott invokes his seniority and legacy. The confrontation escalates
    when Scott dismisses Geordi’s directness as naivety, culminating in Geordi’s blunt
    demand for Scott to leave. Scott storms out, leaving Geordi with lingering regret
    but no time to resolve the friction. The scene underscores Scott’s struggle with
    obsolescence and the generational divide in Starfleet’s engineering culture, while
    foreshadowing their eventual forced collaboration under crisis conditions.
