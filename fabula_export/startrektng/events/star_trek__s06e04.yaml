- fabula_uuid: cand_evt_scene_24526cb2ca271f87_01
  global_id: null
  title: Scott reveals Jenolan transporter tragedy
  description: 'In a tense, emotionally charged corridor exchange, Montgomery Scott—still
    disoriented by his revival—unwittingly reveals the full horror of the *Jenolan*’s
    final moments to Geordi La Forge. As they walk toward the turbolift, Scott’s initial
    awe at the Dyson Sphere’s engineering gives way to a halting confession: his desperate,
    half-successful attempt to preserve his and Franklin’s transporter patterns in
    a degraded buffer system. The moment pivots from technical admiration to raw guilt
    when Scott admits Franklin’s pattern couldn’t be saved, his voice cracking with
    self-recrimination. Geordi’s attempt to pivot to 24th-century marvels fails to
    lift Scott’s mood, exposing the depth of his trauma—not just from the crash, but
    from the moral weight of survival. The scene underscores Scott’s struggle with
    irrelevance: his past ingenuity is both a source of pride and a reminder of his
    inability to save his crew, while Geordi’s well-meaning optimism highlights the
    generational divide between them. The turbolift doors closing on Scott’s overwhelmed
    expression bookends the moment, leaving his emotional state unresolved but his
    guilt laid bare.'
