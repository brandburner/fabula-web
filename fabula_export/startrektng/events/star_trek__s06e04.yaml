  - character_uuid: ger_agent_a868ef04d112
    emotional_state: "\n        A storm of melancholy, defiance, and resignation.\
      \ Surface-level, he appears resigned ('It's time I acted my age'), but beneath\
      \ that is a raw, almost childlike grief for a past he can never reclaim. His\
      \ defiance ('This isn't real... it's just a computer-generated fantasy') masks\
      \ a deeper fear: that he has no place in the future, and his skills—once the\
      \ backbone of Starfleet—are now relics. The act of shutting down the simulation\
      \ is both an acknowledgment of reality and a violent rejection of his own longing.\n\
      \      "
    goals:
    - To momentarily escape the 24th century by immersing himself in a simulation
      of his past
    - To share his pain with someone who might understand (Picard), validating his
      feelings of loss
    - To confront the truth of his obsolescence, even if it means destroying the illusion
      that sustains him
    what_happened: "\n        Scott enters the Holodeck’s recreation of the original\
      \ *Enterprise* bridge with a mix of awe and sorrow, his face briefly lighting\
      \ up at the sight of his former home before the emptiness of the simulation\
      \ settles in. He pours himself a drink at his old engineering station, toasting\
      \ absent crewmates in a quiet, ritualistic moment of grief. When Picard arrives,\
      \ Scott’s demeanor shifts from melancholic introspection to reluctant engagement,\
      \ sharing stories of his past with a man who understands the ache of lost ships.\
      \ His emotional unraveling culminates in a defiant rejection of the simulation,\
      \ symbolically (and literally) shutting down his fantasy of return. His physical\
      \ state—unsteady on his feet, voice trembling—reveals the cost of confronting\
      \ his obsolescence.\n      "
