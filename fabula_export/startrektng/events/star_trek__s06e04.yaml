  title: Picard appeals to Geordi for Scott’s inclusion
  description: In the ready room, Picard initiates a strategic conversation with Geordi
    about accessing the *Jenolan*’s damaged memory core, framing the task as an opportunity
    to restore Scott’s sense of purpose. Geordi initially suggests sending Lieutenant
    Bartel as a technical intermediary, but Picard—recognizing Scott’s psychological
    fragility—repositions the request as a moral imperative, emphasizing the human
    need to feel useful. Geordi, moved by Picard’s appeal, agrees to accompany Scott,
    marking a pivotal shift from logistical pragmatism to emotional investment. The
    exchange subtly underscores Scott’s marginalization while setting up his eventual
    integration into the mission, foreshadowing his redemptive arc through technical
    expertise and crew camaraderie. Picard’s leadership here hinges on emotional intelligence,
    leveraging Geordi’s empathy to bridge the generational gap between 23rd- and 24th-century
    engineers.
