      prepare Scott for the realities of the 24th century.
    institutional_impact: Scott’s revival and disorientation highlight the tension
      between Starfleet’s ideal of progress and the personal cost of change for its
      long-serving members. His reaction to Worf underscores the organization’s ability
      to evolve while also revealing the challenges of reconciling the past with the
      present.
    internal_dynamics: The event subtly reflects Starfleet’s internal debates about
      tradition versus innovation, as seen in Scott’s struggle to accept the changes
      wrought over 75 years.
