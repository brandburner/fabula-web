  - object_uuid: ger_object_e0c8921905db
    description_of_involvement: The *Enterprise Turbolift* serves as a transitional
      threshold, its sleek 24th-century operation contrasting with Scott’s disorientation.
      As the doors close, Scott’s overwhelmed expression is framed by the lift’s sterile
      efficiency, underscoring his alienation. The turbolift is more than a mode of
