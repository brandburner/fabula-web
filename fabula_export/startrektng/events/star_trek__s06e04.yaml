  title: Picard orders Jenolen’s destruction
  description: "\n  In a high-stakes moment of command under extreme duress, Picard\
    \ must make an agonizing choice: sacrifice the *Jenolen*—a ship carrying Montgomery\
    \ Scott and other survivors—to ensure the *Enterprise*’s escape through the closing\
    \ Dyson Sphere hatch. The scene unfolds in parallel across two locations: the\
    \ *Enterprise*’s bridge, where Worf confirms photon torpedoes are loaded, and\
    \ the *Jenolen*, where Scott shouts in desperation as his ship collapses around\
    \ him. Picard’s rapid-fire orders—first to energize the transporter to save the\
    \ crew, then to fire torpedoes—demonstrate the brutal calculus of command: saving\
    \ the *Enterprise* (and its crew, including Scott) requires destroying the *Jenolen*\
    \ to clear the path. The explosion of the *Jenolen* and the *Enterprise*’s dramatic,\
    \ last-second roll through the hatch underscore the irreversible consequences\
    \ of time and the weight of leadership. The moment forces Picard to confront the\
    \ cost of survival, while Scott’s helplessness in the 23rd-century engineer’s\
    \ body contrasts sharply with his past legacy, reinforcing the theme of obsolescence\
    \ and the passage of time.\n  "
