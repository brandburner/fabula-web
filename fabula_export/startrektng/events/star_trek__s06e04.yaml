  key_dialogue:
  - 'SCOTT: ((shocked)) You''re giving me one of your shuttles?'
  - 'PICARD: Call it... an extended loan. Since you lost your ship while saving ours,
    it seemed only fair.'
  - 'SCOTT: The Norpin Colony is where old men go to retire... maybe I''ll end up
    there someday... but not just yet.'
  - 'SCOTT: And she''s a fine ship... a credit to her name. But I''ve always found
    that a ship is only as good as the Engineer who takes care of her... and from
    what I can see... the Enterprise is in good hands.'
