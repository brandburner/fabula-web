    \ and impulse engines—Scott briefly engages, only to retreat into self-pity. The\
    \ moment of tentative connection is shattered when Geordi’s repeated hails to\
    \ the Enterprise go unanswered, plunging both men into stunned silence. The Enterprise’s\
    \ sudden disappearance isn’t just a logistical crisis—it forces Scott to confront\
