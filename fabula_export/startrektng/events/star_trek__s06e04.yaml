- fabula_uuid: cand_evt_scene_d39eb632f336d96d_01
  global_id: null
  title: Scott’s failed rescue and Riker’s revelation
  description: 'Disoriented but determined, Montgomery Scott emerges from transporter
    stasis and immediately attempts to rescue Ensign Franklin from the Jenolan’s degraded
    buffer, only to fail as Franklin’s pattern proves irrecoverable. The emotional
    weight of this loss lingers as Riker introduces himself and the *Enterprise*,
    sparking Scott’s excitement—until Worf’s presence as a Klingon officer on a Starfleet
    bridge shatters his assumptions about the 24th century. Riker’s gentle but evasive
