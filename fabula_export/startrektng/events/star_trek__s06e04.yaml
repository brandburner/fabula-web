      slump, his voice quiets, and he sits alone in the vast room, staring blankly.
      The physical space amplifies his emotional collapse, as the quarters—once a
      symbol of progress—become a prison of his irrelevance.'
    beliefs:
    - That his experiences in the 23rd century are universally valuable and worth
      sharing (a belief Kane’s disinterest shatters).
    - That technology and progress are inherently good, but his displacement suggests
      this belief is being tested (the quarters are 'better' but alienating).
    observed_traits:
    - Desperate for connection
    - Nostalgic to the point of self-delusion
    - Physically expressive of emotional states (posture, facial expressions)
    - Prone to romanticizing the past as a coping mechanism
    - Vulnerable when faced with indifference
