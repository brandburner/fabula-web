      decaying relic of the 23rd century, its dimly lit corridors and flickering consoles
      creating an atmosphere of decay and desperation. The location serves as a liminal
      space—neither fully past nor present—where Scott’s physical and emotional revival
      takes place. The stale air, smashed bulkheads, and auxiliary-powered systems
      reinforce the precarity of his situation, while the transporter stage becomes
      the threshold between his old life and the unfamiliar future. The Ops Center
      is a character in its own right, its dilapidated state mirroring Scott’s internal
      conflict and the fragility of the past.
    observed_atmosphere: Oppressively somber, with a tension between hope (Scott’s
      revival) and despair (the loss of Franklin and the ship’s decay). The flickering
      lights and stale air create a sense of suspended animation, as if time itself
      has stalled in this place.
    functional_role: Threshold between past and present; a site of revival, grief,
