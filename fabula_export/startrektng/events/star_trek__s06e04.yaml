    have to destroy it in order to escape.'
  - 'SCOTT: I can''t hold her together much longer... we''ve got about two minutes
    before the engines go critical.'
  - 'PICARD: Bridge to Transporter Room Three. Stand by to beam two from the Jenolan
    as soon as we''re in range.'
