  - 'DATA: This object does fit the general parameters of Dyson''s theory. Possibly
    a great number of people, Commander. The interior surface area of a sphere this
    size would be equivalent to more than two hundred fifty million class M planets.'
  - 'DATA: I have found the Jenolan, Captain. It has impacted on the surface of the
    sphere. There are no life signs. However, there are several small power emanations...
    and life support is still functioning at minimal levels.'
