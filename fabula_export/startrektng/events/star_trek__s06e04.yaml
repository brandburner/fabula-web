- fabula_uuid: act_865f4fc0361372e4
  number: 2
  summary: Ignoring medical advice, Scott attempts to assist Geordi in Main Engineering,
    eager to contribute. However, his 23rd-century engineering methods and advice
    clash sharply with the Enterprise-D's advanced systems, leading to an alarm when
    he tries to adjust a console. Geordi, already under pressure to complete a spectrographic
    analysis of the Dyson Sphere, becomes increasingly frustrated by Scott's outdated
    interventions and well-intentioned but unhelpful suggestions. The tension escalates
    into a heated argument, with Geordi bluntly telling Scott he is "in the way."
    Feeling disrespected and further marginalized, Scott storms out of Engineering.
    Counselor Troi subsequently visits Scott in his quarters, attempting to provide
    emotional support and help him process his disorientation. Scott, however, misinterprets
    her role as a psychologist sent to evaluate his sanity, rebuffing her efforts
    and asserting that he doesn't need a counselor. Seeking solace, Scott goes to
    Ten Forward, orders a Scotch, but is dismayed to discover it's 'synthehol,' a
    non-intoxicating substitute. Commander Data, observing Scott's reaction, offers
    him a bottle of genuine, albeit ancient, Aldeberan whiskey, further highlighting
    Scott's displacement in this new, 'synthetic' future.
