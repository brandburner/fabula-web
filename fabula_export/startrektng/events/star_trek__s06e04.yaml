      of the engine meltdown. Geordi’s declaration—'I've lost helm control'—signals
      the ship’s total loss of maneuverability, sealing its fate. The console’s failure
      is a microcosm of the *Jenolan*’s broader collapse, a 23rd-century relic unable
      to withstand the stresses of its final moments. Its death knell is the distress
      call Geordi transmits, a desperate plea for the *Enterprise* to intervene.
    status_before_event: Functional but deteriorating, with flickering displays and
      intermittent responses as the ship’s systems fail.
    status_after_event: Completely inoperable, with dead panels and no helm authority,
      rendering the *Jenolan* unable to move or defend itself.
