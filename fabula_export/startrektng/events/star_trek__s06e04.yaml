  - object_uuid: ger_object_d58c6333289a
    description_of_involvement: The Jenolan Transporter Console is the focal point
      of Scott’s desperate attempt to rescue Ensign Franklin, its flickering displays
      and degraded readouts reflecting the futility of his efforts. Scott works the
      console with urgency, his hands moving over controls that are both familiar
      and alien to him. The console’s failure to stabilize Franklin’s pattern—marked
      by the 53% degradation warning—serves as a brutal metaphor for Scott’s inability
      to save his past, his crew, or even his own sense of purpose. Its role in the
      event is both functional (as a tool for revival) and symbolic (as a harbinger
      of loss and obsolescence).
    status_before_event: Functional but degraded, drawing power from auxiliary systems
      and displaying a stable but locked transporter pattern in diagnostic mode.
    status_after_event: Deactivated after Scott confirms Franklin’s pattern is irrecoverably
      degraded; the console remains in a state of limbo, much like Scott himself.
    global_id: ger_object_d58c6333289a
