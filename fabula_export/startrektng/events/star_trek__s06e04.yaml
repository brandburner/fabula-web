      machinery drowns out the silence between Scott and Geordi, a soundtrack to Scott’s
      internal struggle.
    status_before_event: Operational and empty, awaiting Scott and Geordi’s entry.
    status_after_event: Carries Scott and Geordi toward the Holodeck, its doors sealing
      shut on Scott’s unresolved emotions.
