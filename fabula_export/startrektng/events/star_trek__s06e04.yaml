      orders. His body language is taut, his movements precise and deliberate—every
      adjustment to the controls is calculated, betraying his deep understanding of
      both 23rd- and 24th-century engineering. When the pilot beams fail, his frustration
      is palpable, but it quickly crystallizes into decisive action. The order for
      ''full impulse'' is delivered with the authority of a man who has earned his
      rank, but there''s a flicker of something else in his voice: the weight of responsibility
      for a ship and crew that aren''t his, but whose survival now rests on his shoulders.
      His fingers fly across the console, but his VISOR never leaves the deflector
      shield readouts, tracking the strain on the *Jenolan*''s systems in real-time.'
    beliefs:
    - The *Jenolan*'s deflector shield can withstand the hatch's pressure if pushed
      to full impulse (calculated risk based on 23rd-century specs).
    - Montgomery Scott's expertise is invaluable in this crisis, and his collaboration
      is key to their survival (respect for his legacy).
    observed_traits:
    - Decisive under pressure (no hesitation in high-stakes moments)
