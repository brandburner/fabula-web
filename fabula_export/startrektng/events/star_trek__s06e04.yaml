- fabula_uuid: act_9086472209c192cb
  number: 5
  summary: 'Scott and Geordi work tirelessly on the Jenolan''s engines, combining
    their respective eras of engineering knowledge. Scott, in a moment of shared expertise,
    reveals he authored the very engineering regulations Geordi cites, demonstrating
    his profound and lasting understanding of starship mechanics. With the Jenolan''s
    engines restored, they deduce that the sphere''s hatch was triggered by a standard
    subspace hail. They formulate a daring plan: use the Jenolan to trigger the hatch
    from a safe distance, then move in to physically jam it open, allowing the Enterprise
    to escape. Geordi initially protests, deeming the plan suicidal, but Scott''s
    conviction and plea, engineer to engineer, persuade him. They execute the plan,
    triggering the hatch and then positioning the Jenolan to hold it open. The Enterprise,
    guided by Geordi''s urgent communication, races towards the closing hatch. The
    Jenolan sustains critical damage, with Scott and Geordi barely beaming to safety
    before the ship explodes, sacrificing itself to keep the portal open. The Enterprise
    narrowly slips through the closing hatch, escaping the sphere. Back on the Enterprise,
    Picard offers Scott a shuttlecraft. Scott, rejuvenated by his renewed purpose
    and the validation of his skills, decides against retirement, choosing instead
    to explore the galaxy. He shares a final, respectful exchange with Geordi, acknowledging
    the Enterprise''s capable hands, before embarking on his new journey.'
