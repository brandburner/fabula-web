      desperate command—leaves the bridge in darkness, symbolizing the crew''s loss
      of control. The consoles'' role in the event is pivotal: they represent the
      transfer of power from Starfleet to the Ferengi, as the ship''s critical systems
      are locked down and exploited by the invaders.'
    status_before_event: Fully operational, displaying real-time data on ship systems,
      sensor readings, and tactical information. The consoles are the primary interface
      for the bridge crew to command the Enterprise.
    status_after_event: Deactivated and inert, their screens dark and unresponsive.
      The consoles are now under Ferengi control, their functions locked down by Riker's
      command but ultimately useless to the crew.
