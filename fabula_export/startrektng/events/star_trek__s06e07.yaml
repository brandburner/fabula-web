- fabula_uuid: cand_evt_scene_d8f7ddea32fafc57_01
  global_id: null
  title: O'Brien rejects Keiko's intimacy
  description: 'In O''Brien''s quarters, the couple attempts to navigate their transformed
    states with forced normalcy—Keiko orders coffee, recalling O''Brien''s preference,
    but the moment fractures when she instinctively seeks physical comfort. O''Brien
    recoils from her childlike form, his discomfort escalating into explicit rejection.
    Keiko''s plea—*I am still your wife*—collapses under O''Brien''s technical objection:
    *You''re also ten years old.* The argument spirals into existential dread as Keiko
    forces him to confront the unspoken question: if the transformation is permanent,
    does their marriage survive? The tension peaks when Molly''s voice interrupts,
    a brutal reminder of the family they might lose if O''Brien cannot accept Keiko''s
    new form. The scene exposes the marriage''s fragility, where love is tested not
    by external threats but by the grotesque intimacy of seeing one''s partner as
    a stranger.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e07
  scene_sequence: 9
  sequence_in_scene: 13
  key_dialogue: &id007
  - 'YOUNG KEIKO: I am still your wife.'
  - 'O''BRIEN: Technically, yes.'
  - |-
    YOUNG KEIKO: Technically?
    O'BRIEN: No. I mean, of course you're my wife... but you're also ten years old.
  - 'YOUNG KEIKO: What if they can''t find a way? What if I''m like this the rest
    of my life? What does that mean for us, for our family?'
  is_flashback: false
  location_uuid: ger_location_a43721c4d4f7
  theme_uuids: []
  arc_uuids:
