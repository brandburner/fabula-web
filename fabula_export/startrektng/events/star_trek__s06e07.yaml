- fabula_uuid: act_b089b16d034c295a
  number: 4
  summary: 'Confined to the school room, Young Picard, Ro, Guinan, and Keiko, along
    with other children, assess their dire situation. Young Picard confirms that adults
    are being transported to the surface for forced labor, while children remain aboard.
    Young Guinan proposes a radical strategy: they must "act like children" to exploit
    their appearance and the Ferengi''s underestimation. In the Ready Room, Daimon
    Lurin attempts to coerce Riker into releasing the command lockout by threatening
    the lives of the crew in the hazardous mines on Ligos Seven. Back in the school
    room, Young Picard struggles with the child-friendly computer interface, which
    initially refuses to display security grids or schematics. Young Guinan''s intervention,
    asking for a "picture of the inside of the Enterprise," yields a simplified, brightly
    colored ship diagram, which Young Picard adapts for their planning. Young Ro and
    Young Guinan access a Jeffries Tube, preparing to move through the ship. Inspired
    by Alexander''s toy, Young Picard devises a clever diversion. He and Young Keiko
    use the remote-controlled toy, with a combadge secretly attached, to lure a Ferengi
    guard from the Transporter Room, where he is then trapped by a forcefield activated
    by Young Picard. Alexander, in turn, distracts another Ferengi guard in Sickbay
    to retrieve hyposprays. Young Picard then feigns a dramatic tantrum, demanding
    to see his "father" Riker, successfully convincing Berik to take him to the Observation
    Lounge, thus setting the stage for direct communication with Riker.'
  key_moments: []
