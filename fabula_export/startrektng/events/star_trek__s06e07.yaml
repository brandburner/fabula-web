- fabula_uuid: act_749d22d10b7aed88
  number: 5
  summary: 'In the Observation Lounge, Young Picard and Riker, playing the roles of
    father and son, engage in a subtle, coded conversation. Young Picard requests
    Riker restore access to the "kid''s computer" in the schoolroom, a veiled instruction
    to release ship command functions. Daimon Lurin, still attempting to assert control,
    threatens to execute the children, including Riker''s "son," if the command lockout
    is not lifted. Riker, feigning resignation, agrees to comply. On the Bridge, Riker
    pretends to explain the ship''s complex computer systems to Morta, while surreptitiously
    restoring command functions to the crew via a hidden keypad. From the school room,
    Young Picard confirms the command lockout is released and activates the weapon
    deactivation program and transporter security field. The children then execute
    their coordinated plan: Young Ro and Young Guinan place combadges on Ferengi guards
    in Engineering, beaming them into the now-active transporter forcefield. Alexander
    gives Berik a combadge, similarly beaming him away. Young Keiko uses a retrieved
    hypospray to incapacitate another Ferengi guard. With most of the Ferengi secured,
    Young Picard, armed with a phaser, confronts Daimon Lurin in the Ready Room, declaring,
    "I believe you''re in my chair." Riker incapacitates Morta, and Lurin is captured.
    Finally, with ship control regained, Beverly and O''Brien use the transporter
    to restore Picard, Guinan, Keiko, and Ro to their adult forms. Guinan and Ro reflect
    on their temporary childhood, finding unexpected value and a less terrible experience
    than anticipated, concluding the narrative with a sense of resolution and personal
    growth.'
