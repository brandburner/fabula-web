- fabula_uuid: cand_evt_scene_9ed0fdfa73b96d82_01
  global_id: null
  title: Lurin threatens Riker with crew enslavement
  description: "\n  In the *Enterprise*’s ready room, Commander Riker confronts Daimon\
    \ Lurin—a Ferengi pirate—who has seized control of the ship and plans to exploit\
    \ Ligos Seven’s Vendarite resources. Lurin dismisses Riker’s warning of Federation\
    \ retaliation, revealing his operation is independent of the Ferengi Alliance\
    \ and driven purely by profit. When Riker presses about the fate of the science\
    \ team, Lurin coldly admits they’ve been forced into slave labor, implying the\
    \ *Enterprise* crew will face the same fate. He escalates the threat by hinting\
    \ at selling the ship to the Romulans, then subtly intimidates Riker by suggesting\
    \ the mines on Ligos Seven are 'hazardous'—a veiled threat to the crew’s safety.\
    \ The exchange underscores the Ferengi’s ruthless pragmatism and the crew’s vulnerability,\
    \ while Lurin’s exit leaves Riker grappling with the moral and strategic implications\
    \ of his next move. The scene serves as a turning point, exposing the Ferengi’s\
    \ true intentions and raising the stakes for the crew’s counterattack.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e07
  scene_sequence: 23
  sequence_in_scene: 37
  key_dialogue:
  - 'RIKER: I hope your profit margin is pretty high on this little adventure, Lurin...
    because you''re risking war with the Federation.'
  - 'LURIN: We''re not affiliated with the Ferengi Alliance. We''re... in business
    for ourselves. And yes, it will be highly profitable. For an investment of two
    surplus Klingon ships... a few repairs... and some weapons... we''ve netted a
    Federation starship and her crew, not to mention a planet rich in Vendarite.'
  - 'RIKER: You made them slave laborers.'
  - 'LURIN: ((low, measured)) I think... that the mines on Ligos Seven can be very
    hazardous. How many people in your crew?'
  - 'RIKER: ((tight)) One thousand, fourteen.'
  - 'LURIN: Very hazardous, Commander.'
