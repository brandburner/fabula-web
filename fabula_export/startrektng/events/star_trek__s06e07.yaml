    - Exploitation of perceived weaknesses (e.g., underestimating the children’s capabilities)
    institutional_impact: "\n        The event exposes the Ferengi Pirates’ institutional\
      \ flaws—their opportunism, lack of cohesion, and overreliance on force. Their\
      \ defeat here underscores the dangers of underestimating opponents and the importance\
