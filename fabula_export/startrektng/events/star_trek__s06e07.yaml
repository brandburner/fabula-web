    global_id: ger_object_fa52958e88d3
  - object_uuid: ger_object_e0c8921905db
    description_of_involvement: The Enterprise-D Bridge Turbolift serves as a critical
      entry point for the Ferengi ambush. Berik and Morta materialize directly onto
      the bridge from this turbolift, their sudden appearance catching the crew off-guard.
      The turbolift’s doors hiss open, spilling the Ferengi onto the bridge where
      they immediately draw their weapons and open fire. Later, Young Picard attempts
      to use the same turbolift as an escape route, only to be captured by a Ferengi
      guard exiting it. The turbolift’s confined space amplifies the tension and chaos
      of the ambush, as it becomes a conduit for both the Ferengi’s invasion and the
      crew’s desperate attempts to resist.
