  - organization_uuid: ger_organization_eaecdcd9ccf1
    description_of_involvement: The Ferengi Pirates are represented in this event
      through the actions of Daimon Lurin, Berik, Morta, and the implied presence
      of the Ferengi Transporter Room Guard. Lurin’s arrival and invocation of the
      Ferengi Salvage Code demonstrate the organization’s legalistic and opportunistic
      nature, using dubious interpretations of law to justify their seizure of the
      *Enterprise*. The Ferengi’s internal dynamics are on display as Berik and Morta
      bicker over their failures, only to be silenced by Lurin’s authority. Their
      power dynamics are characterized by a hierarchy where Lurin’s word is absolute,
      and subordinates like Berik and Morta are quick to defer to him. The organization’s
      goals in this event are to establish control over the *Enterprise* and its crew,
      exploit its resources for profit, and intimidate the crew into compliance through
      threats of execution.
    active_representation: Through the direct actions of Daimon Lurin, who embodies
