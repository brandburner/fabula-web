      \ will be scrutinized. Its doors slide shut behind them, symbolizing the shift\
      \ from public command to private vulnerability. The Ready Room is more than\
      \ a meeting place; it is a crucible where Picard’s fitness to lead will be tested.\
      \ The tidy desk and subdued lighting, reminiscent of earlier tense standoffs\
      \ (e.g., Picard’s confrontation with Q), set the stage for a high-stakes discussion.\
      \ Beverly’s request to speak privately here is a calculated move—she knows the\
      \ crew’s eyes are on them, and the Ready Room offers the only semblance of privacy\
      \ on the bridge.\n      "
    status_before_event: Empty, its doors closed, awaiting Picard and Beverly’s entry.
