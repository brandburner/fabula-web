- fabula_uuid: cand_evt_scene_f6d2fa3044201e6d_02
  global_id: null
  title: Ro’s trauma surfaces under Guinan’s gaze
  description: "\n  In Sickbay, Young Ro—now physically a child—sits on a biobed,\
    \ visibly uncomfortable with her transformed body. Her fingers twitch as she struggles\
    \ to reconcile her hands with her adult identity. Young Guinan, observing her\
    \ with quiet amusement, prods Ro’s resistance to her new state, leading Ro to\
    \ snap that she was never a child in the traditional sense. Her blunt admission—‘I\
    \ was in a refugee camp. Fun wasn’t exactly in my vocabulary’—reveals the root\
    \ of her bitterness: a childhood defined by survival, not play. Guinan’s gentle\
    \ challenge (‘What about now? You’re not in that camp anymore’) forces Ro to confront\
    \ her refusal to embrace even fleeting joy, exposing how her workaholic tendencies\
    \ mask unresolved trauma. The exchange underscores Ro’s fragility beneath her\
    \ hardened exterior, foreshadowing her eventual, reluctant embrace of childhood\
    \ in the episode’s climax. Meanwhile, Beverly and Troi’s concerned glances at\
    \ Young Picard’s departure highlight the crew’s collective disorientation, but\
    \ Ro’s moment with Guinan becomes the emotional core of the scene, revealing the\
    \ psychological toll of her transformation.\n  "
