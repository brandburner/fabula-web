  object_involvements:
  - object_uuid: ger_object_e7d15bb4a642
    description_of_involvement: 'The USS Enterprise-D Main Bridge Consoles are the
      heart of the ship''s command and control systems, manned by Worf and Data as
      they attempt to defend against the Ferengi ambush. The consoles glow with data
      as the officers tap commands, but their efforts are cut short by phaser fire
