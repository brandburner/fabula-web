- fabula_uuid: cand_evt_scene_9ed0fdfa73b96d82_02
  global_id: null
  title: Lurin threatens Riker with enslavement
  description: "\n  In the *Enterprise*’s ready room, Daimon Lurin—now seated in Picard’s\
    \ chair—reveals the full scope of his operation to Commander Riker. Lurin dismisses\
    \ Riker’s warning of Federation retaliation, smugly detailing how his independent\
    \ Ferengi crew has seized the *Enterprise* and its crew as a high-profit venture.\
    \ When Riker presses about the fate of the science team on Ligos Seven, Lurin\
    \ coldly confirms they’ve been forced into slave labor to extract Vendarite, and\
    \ that Riker’s crew will face the same fate. The stakes escalate further when\
    \ Lurin hints that the *Enterprise* itself will be sold to the Romulans—once he\
    \ regains access to the ship’s central computer. His veiled threat about the ‘hazardous’\
    \ conditions of Ligos Seven’s mines is a direct warning to Riker: cooperate or\
    \ risk the lives of his entire crew. The exchange underscores Lurin’s ruthless\
    \ pragmatism and the Ferengi’s willingness to exploit the *Enterprise*’s vulnerability,\
    \ while forcing Riker into an impossible choice between defiance and complicity.\
    \ The scene also foreshadows the Romulans’ shadowy involvement in the crisis,\
    \ deepening the conspiracy surrounding the *Enterprise*’s capture.\n  "
