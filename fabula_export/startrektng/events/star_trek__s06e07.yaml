  object_involvements:
  - object_uuid: ger_object_82a43b43e68f
    description_of_involvement: 'The combadge serves as both a decoy and a tactical
      tool in Alexander’s hands. He presents it to Berik as a ''found'' item, exploiting
      the Ferengi’s instinctive greed for anything that might hold value. The combadge’s
      true function—triggering a transporter beam—is unknown to Berik, making it a
      perfect instrument for the children’s ambush. Its repurposing from a standard
      Starfleet communication device to a trap highlights the children’s ingenuity:
      they turn everyday technology into weapons of resistance, leveraging their knowledge
      of the *Enterprise*’s systems against the invaders. The combadge’s role is pivotal,
      as it directly enables the removal of Berik from the equation, weakening Ferengi
      control over the school room.'
    status_before_event: Possessed by Alexander Rozhenko, who has retrieved it from
      the school room. It is in functional condition, fully capable of triggering
      a transporter beam when activated.
    status_after_event: Dematerialized along with Berik, likely transported to a predetermined
      location (e.g., a holding cell or an empty part of the ship) as part of the
      children’s trap. Its physical state is unchanged, but its role in the event
      is complete.
    global_id: ger_object_82a43b43e68f
  - object_uuid: ger_object_ebf00abdadf9
    description_of_involvement: 'The hypospray, typically a medical tool used for
      administering injections, is repurposed by Young Keiko as a non-lethal weapon.
      She uses it to incapacitate the Ferengi guard at the corridor intersection,
      pressing it to his neck and rendering him unconscious in seconds. The hypospray’s
      effectiveness lies in its stealth and speed: it allows Keiko to neutralize the
      guard without alerting other Ferengi or engaging in a physical confrontation.
      Its use underscores the children’s adaptability—they are not limited to traditional
      weapons but can improvise with whatever tools are at hand. The hypospray’s role
      is critical, as it enables Keiko to clear a path for the children’s counterattack,
      demonstrating that even ''innocent'' objects can become instruments of resistance
      in the right hands.'
    status_before_event: Retrieved from Sickbay by Alexander Rozhenko earlier in the
      scene and passed to Young Keiko. It is fully charged and functional, containing
      a sedative or similar agent capable of rendering a target unconscious.
    status_after_event: Still clutched in Young Keiko’s hand after the ambush. It
      remains functional but may now be depleted or require recharging, depending
      on the hypospray’s settings. Its role in the event is complete, but it could
      be reused if additional Ferengi guards need to be neutralized.
