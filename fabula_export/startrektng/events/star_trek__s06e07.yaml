      and Morta''s order to transport the adult crew to Ligos Seven seals their fate.
      The combadge''s role in the event is bittersweet: it represents Riker''s last
      act of defiance, but its effectiveness is undermined by the Ferengi''s swift
      and ruthless execution of their plan.'
