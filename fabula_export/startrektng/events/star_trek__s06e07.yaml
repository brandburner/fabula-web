  global_id: null
  title: Lurin blackmails Riker with his son
  description: "\n  Lurin, the Ferengi leader, weaponizes Riker’s paternal instincts\
    \ by threatening to execute the child-hostages—including Riker’s own 'son'—unless\
    \ he surrenders control of the *Enterprise*’s systems. The scene opens with Lurin\
    \ taunting Riker about his family, framing their presence as a vulnerability.\
    \ When Riker defends Starfleet’s values, Lurin pivots to outright blackmail, declaring\
    \ he will execute the children—starting with Riker’s—if the computer isn’t released.\
    \ Riker’s initial defiance crumbles under the threat, his posture shifting from\
    \ outrage to resigned compliance. The exchange exposes the Ferengi’s ruthless\
    \ pragmatism and Riker’s emotional Achilles’ heel, forcing him into a tactical\
    \ surrender that preserves the children’s lives but cedes critical ship control.\
    \ The moment escalates the Ferengi’s power while laying bare Riker’s internal\
    \ conflict: his duty as a Starfleet officer clashes with his instinct to protect\
    \ his family, setting up his later covert resistance.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e07
  scene_sequence: 35
  sequence_in_scene: 53
  key_dialogue:
  - 'LURIN: I understand your... son was here to see you.'
  - 'RIKER: That''s right.'
  - 'LURIN: We Ferengi do not bring our offspring along with us aboard ships.'
  - 'RIKER: Then I suppose that''s your loss. We consider our families to be one of
    our strengths.'
  - 'LURIN: I think you will find they can also be a weakness.'
  - 'LURIN: Unless you release the computer to our control, I will execute every child
    on this ship... beginning with yours.'
  - 'RIKER: Even you aren''t that cruel.'
  - 'LURIN: It is cruel to put children in danger by bringing them aboard a starship
    in the first place.'
  - 'RIKER: All right... all right... just don''t harm my son.'
