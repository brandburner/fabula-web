  object_involvements:
  - object_uuid: ger_object_e7d15bb4a642
    description_of_involvement: The USS Enterprise-D Main Bridge Consoles are the
      primary targets of the Ferengi assault. Worf and Data man these consoles, tapping
      commands to execute Young Picard’s orders, but their efforts are cut short as
      Berik and Morta open fire. The consoles glow with activity as the crew attempts
      to respond to the crisis, but the Ferengi’s phaser blasts force Worf and Data
      to the ground, disabling their access. The consoles deactivate entirely after
      Riker’s command lockout, leaving the bridge—and the *Enterprise*—vulnerable
      to Ferengi control. The consoles symbolize the loss of Starfleet authority,
      as their deactivation marks the Ferengi’s complete seizure of the ship.
    status_before_event: Active and fully operational, with Worf and Data executing
      commands to respond to the crisis.
    status_after_event: Deactivated and locked down, with all command functions suspended,
      leaving the bridge inoperable.
    global_id: ger_object_e7d15bb4a642
  - object_uuid: ger_object_ad0f756e012d
    description_of_involvement: Riker’s Combadge is the critical tool he uses to attempt
      a last-ditch effort to regain control of the *Enterprise*. As the Ferengi ambush
      unfolds, Riker taps his combadge and issues a command to deactivate all command
      functions, a desperate bid to lock down the bridge systems. The combadge responds
      with a sharp chirp, acknowledging his authorization, but the damage is already
      done—the Ferengi have secured the bridge, and the computer’s compliance only
      reinforces their control. The combadge symbolizes Riker’s leadership and his
      willingness to take decisive action, even in the face of overwhelming odds.
      Its use, though ultimately ineffective, highlights the crew’s desperation and
      the Ferengi’s ruthless efficiency.
    status_before_event: Attached to Riker’s uniform, fully functional and ready for
      use.
    status_after_event: Still functional but rendered ineffective by the Ferengi’s
      control of the bridge and the ship’s systems.
    global_id: ger_object_ad0f756e012d
  - object_uuid: ger_object_e2f2ad33da63
    description_of_involvement: The Ferengi Rifles are the primary weapons used in
      the ambush, wielded with brutal efficiency by Berik, Morta, and the unnamed
      Ferengi guard. These alien rifles fire phaser blasts that drop Worf and Data
      in seconds, incapacitating the bridge crew and securing Ferengi control. The
      rifles’ precision and power underscore the Ferengi’s tactical advantage, as
      they overwhelm the *Enterprise*’s defenses with minimal resistance. The unnamed
      guard uses his rifle to capture Young Picard in the corridor, the weapon’s mere
      presence enough to halt the child’s escape. The rifles symbolize the Ferengi’s
      reliance on force and their disregard for honorable combat.
    status_before_event: Charged and ready for use, carried by the Ferengi boarding
      party as they prepare to seize the *Enterprise*.
    status_after_event: Discharged and still active, with the Ferengi maintaining
      control of the bridge and the ship’s corridors.
    global_id: ger_object_e2f2ad33da63
  - object_uuid: ger_object_fa52958e88d3
    description_of_involvement: Morta’s Ferengi Communicator is the device he uses
      to report the successful seizure of the bridge and issue the order to transport
      all able-bodied adults to Ligos Seven’s surface. The communicator crackles to
      life under his touch, carrying his cold, authoritative voice as he coordinates
      the next phase of the Ferengi’s takeover. The device symbolizes the Ferengi’s
      organizational discipline and their ability to execute large-scale operations
      with precision. Its use marks the transition from ambush to full-scale control,
      as Morta’s order strips the *Enterprise* of its adult crew and leaves the children
      stranded. The communicator’s role in this event is pivotal, as it enables the
      Ferengi to consolidate their victory and begin exploiting the ship’s resources.
    status_before_event: Attached to Morta’s belt, fully charged and ready for use.
    status_after_event: Still active, with Morta using it to continue coordinating
