  object_involvements:
  - object_uuid: ger_object_e7d15bb4a642
    description_of_involvement: 'The USS Enterprise-D Main Bridge Consoles are the
      heart of the ship''s command and control systems, manned by Worf and Data as
      they attempt to defend against the Ferengi ambush. The consoles glow with data
      as the officers tap commands, but their efforts are cut short by phaser fire
      from Berik and Morta. The sudden deactivation of the consoles—triggered by Riker''s
      desperate command—leaves the bridge in darkness, symbolizing the crew''s loss
      of control. The consoles'' role in the event is pivotal: they represent the
      transfer of power from Starfleet to the Ferengi, as the ship''s critical systems
      are locked down and exploited by the invaders.'
    status_before_event: Fully operational, displaying real-time data on ship systems,
      sensor readings, and tactical information. The consoles are the primary interface
      for the bridge crew to command the Enterprise.
    status_after_event: Deactivated and inert, their screens dark and unresponsive.
      The consoles are now under Ferengi control, their functions locked down by Riker's
      command but ultimately useless to the crew.
    global_id: ger_object_e7d15bb4a642
  - object_uuid: ger_object_ad0f756e012d
    description_of_involvement: 'Riker''s Combadge is the critical tool he uses to
      issue his final command, tapping it urgently to lock down the Enterprise''s
      command functions. The combadge''s sharp chirp cuts through the chaos of the
      ambush, carrying Riker''s voice across the ship as he attempts to regain control.
      However, the command comes too late—the Ferengi have already secured the bridge,
      and Morta''s order to transport the adult crew to Ligos Seven seals their fate.
      The combadge''s role in the event is bittersweet: it represents Riker''s last
      act of defiance, but its effectiveness is undermined by the Ferengi''s swift
      and ruthless execution of their plan.'
    status_before_event: Attached to Riker's uniform, fully functional and ready for
