  global_id: null
  title: Riker outmaneuvers Morta with technical jargon
  description: 'Riker lures Morta into a false sense of control by bombarding him
    with nonsensical Starfleet technical terminology, exploiting the Ferengi’s arrogance
    and ignorance. While Morta struggles to keep up, Riker covertly reconfigures the
    *Enterprise*’s command systems, restoring access to the crew. The scene hinges
    on Riker’s tactical cunning—using Morta’s overconfidence against him—and underscores
    the Ferengi’s vulnerability to psychological manipulation. The moment is critical:
    it reverses the Ferengi’s temporary dominance, setting the stage for the crew’s
    counteroffensive. Riker’s actions reveal his strategic brilliance, even under
    duress, while Morta’s embarrassment exposes his limitations as a leader. The dialogue’s
    rapid-fire technical gibberish contrasts sharply with the Ferengi’s flustered
    confusion, heightening the tension and reinforcing the stakes of the power struggle.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e07
  scene_sequence: 36
  sequence_in_scene: 54
  key_dialogue:
  - 'RIKER: Okay, Morta. The Enterprise computer system is controlled by three primary
    main processing cores cross-linked with a redundant melacortz ramistat and fourteen
    kiloquad interface modules. The core elements are based on FTL nanoprocessor units
    arranged into twenty-five bilateral kelilactirals with twenty of those units being
    slaved to the central heisenfram terminal. You do know what a bilateral kelilactiral
    is, don’t you?'
  - 'MORTA: Of course I do, human. I am not stupid.'
  - 'RIKER: No, of course not. Now this is the isopalavial interface which controls
    the main firomactal drive unit. Don’t touch that, you’ll blow up the entire firomactal
    drive.'
  - 'MORTA: What? Wait. What is... what is a firomactal?'
