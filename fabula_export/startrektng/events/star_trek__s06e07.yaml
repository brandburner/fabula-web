  - 'RIKER: Lock phasers on target bearing to port.'
  - 'WORF: Phasers locked.'
  - 'RIKER: Fire.'
  - 'DATA: Minor damage to one ship. Its shields are holding.'
  - 'WORF: Starboard power coupling is down... warp engines off-line.'
  - 'RIKER: Shields?'
  - 'WORF: Down to thirteen percent.'
  - 'WORF: Casualties reported on decks twenty-six and twenty-seven...'
  - 'DATA: Sensors and secondary generators off-line... life support down to sixty-seven
    percent...'
  - 'RIKER: ((to Com)) Engineering, status report.'
