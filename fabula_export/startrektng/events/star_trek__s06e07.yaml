  title: Riker demands engineering status under fire
  description: 'In the midst of a brutal Klingon assault, Commander Riker—now physically
    a child but retaining his tactical instincts—orders an urgent engineering status
    report to assess the *Enterprise*''s critical systems. The ship is reeling from
    repeated torpedo strikes, with Worf reporting catastrophic damage: primary life-support
    offline, warp engines down, shields at 13%, and mounting casualties. Riker''s
    demand for an engineering update reveals the crew''s fractured command structure
    under duress, as the ship''s survival hinges on their ability to prioritize repairs
    amid their disorienting transformations. The request underscores the dual threat
    of external attack and internal chaos, forcing Riker to balance immediate tactical
    decisions with the crew''s deteriorating physical and psychological state. His
    voice remains steady, but the escalating damage reports expose the precariousness
    of their situation, where even a child''s strategic mind is tested by the weight
    of command in a crisis.'
