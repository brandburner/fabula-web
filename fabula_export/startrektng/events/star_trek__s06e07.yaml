  key_dialogue:
  - |-
    YOUNG GUINAN: Well, this is exciting.
    YOUNG RO: Would you rather be playing with dolls?
    YOUNG GUINAN: I'd rather be doing almost anything other than sitting here and watching you sulk.
  - |-
    GEORDI: We think the shuttle was caught in a molecular reversion field, which caused the structure of the ship to deteriorate. When the field penetrated the hull, it also began to affect the shuttle crew.
    O'BRIEN: When I tried to beam them off, I wasn't able to get a lock because the reversion field was masking part of their patterns.
    BEVERLY: If the Transporter only registered part of their RVN patterns... that would explain why the key sequences are missing.
    GEORDI: Exactly. And without those key sequences, the Transporter reconstructed them as children.
  - |-
    WORF'S COM VOICE: We're entering orbit around Ligos Seven, sir.
    RIKER: On my way.
