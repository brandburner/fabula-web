acts:
- fabula_uuid: act_db2da85b3b973a49
  number: 1
  summary: Captain Picard, Guinan, Keiko O'Brien, and Ensign Ro return to the Enterprise
    after a visit to Marlonia, their shuttle encountering a mysterious energy field.
    A subsequent transporter malfunction transforms them into twelve-year-old children,
    a shocking development for Chief O'Brien. In Sickbay, Doctor Crusher confirms
    their physical transformation while their adult minds remain intact. Young Picard,
    despite his altered state, insists on prioritizing the distress call from Ligos
    Seven. He temporarily relinquishes command to Commander Riker, acknowledging the
    unusual circumstances, after Beverly expresses concerns about his fitness to command.
    Meanwhile, Young Ro grapples with irritation and discomfort over her new youthful
    appearance, contrasting with Young Guinan's serene and somewhat amused acceptance
    of the situation. The personal impact of the transformation extends to Keiko and
    O'Brien, who struggle with the implications for their marriage, particularly when
    their daughter Molly fails to recognize her mother, deepening Keiko's emotional
    distress. This act establishes the central conflict of the characters' altered
    states and the immediate challenges they face, both professionally and personally,
    setting the stage for the larger narrative.
