  object_involvements:
  - object_uuid: ger_object_213ccc815f11
    description_of_involvement: 'The shipboard personal replicator serves as a functional
      prop and symbolic anchor for Keiko''s attempt to reclaim normalcy. She uses
      it to replicate two cups of coffee—one tailored to O''Brien''s preference (black,
      double sweet)—a ritualistic gesture meant to bridge the gap between their past
      and present. The replicator''s role is twofold: functionally, it provides the
      coffee that becomes a catalyst for their argument; narratively, it underscores
      the fragility of their domestic rituals in the face of irreversible transformation.
      The coffee itself remains untouched, a failed symbol of connection.'
    status_before_event: Operational and embedded in the wall of O'Brien's quarters,
      ready for voice commands.
    status_after_event: Still operational, but the replicated coffee sits untouched,
      its purpose as a symbol of normalcy undermined by the argument.
