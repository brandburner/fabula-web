    description_of_involvement: Decks 26 and 27 of the *Enterprise* are the hardest-hit
      sections during the Klingon assault, bearing the brunt of the torpedo strikes.
      These decks are transformed into a casualty zone, where hull breaches vent atmosphere,
      debris rains from shattered ceilings, and crew members scramble to seal compartments
      against the vacuum. The location is a microcosm of the ship’s broader collapse,
      where the raw toll of battle is felt most acutely. The wailing alarms, flickering
      lights, and buckling bulkheads create a sense of chaos and urgency, forcing
      the crew to adapt or perish.
