  object_involvements:
  - object_uuid: ger_object_4825e6e20e20
    description_of_involvement: "\n      Alexander’s Remote-Controlled Gliding Toy\
      \ is a lunchbox-spider hybrid that glides silently across the floor, bumping\
      \ into Young Picard and sparking an idea. The toy’s design—compact, gliding,\
      \ and equipped with odd armatures—makes it an ideal distraction tool for exploiting\
      \ the Ferengi’s greed. Picard borrows the toy, recognizing its potential to\
      \ create a diversion that could give the crew an advantage. The toy’s repurposing\
      \ from a child’s plaything to a strategic tool underscores the crew’s ingenuity\
      \ and adaptability. Its gliding motion and lack of wheels make it uniquely suited\
      \ for navigating the ship’s corridors undetected.\n      "
    status_before_event: In Alexander’s possession, gliding across the schoolroom
      floor as he plays with it.
    status_after_event: In Young Picard’s possession, ready to be used as a distraction
      tool in their plan to retake the Enterprise.
    global_id: ger_object_4825e6e20e20
  - object_uuid: ger_object_b0704b8d10ad
    description_of_involvement: "\n      Alexander’s Remote Control PADD is a small\
