  title: Alexander steals hyposprays for rebellion
  description: In a swift, calculated move, Alexander—now a child—exploits the Ferengi’s
    temporary absence from Sickbay to raid a storage bin for hyposprays, prioritizing
    speed over stealth. The stolen medical supplies are critical to the children’s
    plan to undermine the Ferengi’s control of the *Enterprise*, leveraging their
    childlike forms to exploit the pirates’ underestimation of their capabilities.
