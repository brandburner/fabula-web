  description: "\n  The Ferengi ambush escalates as Berik and Morta lead reinforcements\
    \ onto the bridge, overwhelming Worf and Data with phaser fire to seize control\
    \ of the *Enterprise*. Young Picard is captured in a corridor by a Ferengi guard,\
    \ while Riker, realizing the severity of the threat, initiates a command lockout\
    \ to disable critical systems. The Ferengi, now in full control, order the transport\
