      Seven crisis**—a Starfleet science team in distress—serves as a **catalyst for
      the conflict**, forcing Picard to choose between his **personal pride** and
      the **collective good** Starfleet demands. The organization’s **absence of physical
      presence** makes its influence all the more potent, a **ghost in the machine**
      shaping their every word.'
    active_representation: Through **institutional protocol** (Beverly’s medical authority)
