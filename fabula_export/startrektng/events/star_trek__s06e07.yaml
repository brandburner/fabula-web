  title: Alexander distracts Ferengi guard with childlike mischief
  description: "\n  In Beverly's office, a bored Ferengi guard (Ferengi #2) slumps\
    \ at her desk, idly fidgeting with medical equipment. The momentary lapse in vigilance\
    \ creates an opening when Alexander—now a child—slips in unnoticed. With calculated\
    \ precision, he taps on the office window before darting back into the corridor.\
