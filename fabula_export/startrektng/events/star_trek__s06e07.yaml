- fabula_uuid: cand_evt_scene_468880a8ca93c147_01
  global_id: null
  title: Picard and Riker retake the bridge
  description: "\n  Young Picard, having secured the Ferengi captives in the transporter\
    \ room with Alexander’s help, arrives on the bridge carrying a phaser. Riker,\
    \ who has been stalling Morta with a convoluted technical lecture, seizes the\
    \ moment—when Morta turns to investigate Picard’s entrance, Riker delivers a precise\
    \ elbow strike, incapacitating him. The two then prepare to confront the final\
    \ Ferengi, Daimon Lurin, still holding the ready room. This moment marks the culmination\
