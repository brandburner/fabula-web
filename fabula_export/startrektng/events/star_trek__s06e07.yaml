  title: Keiko confronts O'Brien’s rejection of her child form
  description: 'In the O’Briens’ quarters, Young Keiko attempts to reconnect with
    O’Brien by performing a mundane but intimate act—replicating his coffee exactly
    as he likes it, a gesture that underscores their long-standing familiarity. When
    she cuddles against him seeking comfort, O’Brien recoils, his discomfort escalating
    into an explicit rejection of her childlike form. The tension erupts into a raw
    confrontation: Keiko demands to know if their marriage is over, while O’Brien
    struggles to articulate his conflict between technical fact (she is still his
    wife) and visceral reality (she is now a child). The moment is shattered by Molly’s
    off-screen call for ‘Mommy,’ a brutal reminder of the family’s fractured dynamics
    and the inescapable demands of parenthood that now collide with their existential
    crisis. This scene exposes the fragility of their relationship under stress, with
    O’Brien’s inability to accept Keiko’s transformation mirroring the broader crew’s
    struggle to adapt to their altered states. The unresolved conflict leaves their
    future—and the stability of their family—hanging in the balance, while Molly’s
    voice serves as a stark, unanswerable question about what it means to be a parent
    when neither adult can fulfill that role as they once did.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e07
  scene_sequence: 9
  sequence_in_scene: 14
  key_dialogue:
  - |-
    YOUNG KEIKO: Miles Edward O'Brien. I am still your wife.
    O'BRIEN: Technically, yes.
    YOUNG KEIKO: Technically?
    O'BRIEN: No. I mean, of course you're my wife... but you're also ten years old.
  - 'YOUNG KEIKO: What if they can''t find a way? What if I''m like this the rest
    of my life? What does that mean for us, for our family?'
  - 'MOLLY: Mommy?'
