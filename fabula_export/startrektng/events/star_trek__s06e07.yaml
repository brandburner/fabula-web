    description_of_involvement: The aft consoles on the *Enterprise* bridge become
      a focal point of frustration for Berik and Morta, who are unable to bypass the
      security lockouts imposed by Starfleet protocols. Their failed attempts to access
      the command functions highlight the Ferengi’s technical limitations and their
      reliance on brute force rather than sophisticated hacking. The consoles’ flickering
      screens and denial of access serve as a visual metaphor for the crew’s resilience,
      even in their de-aged states. Lurin’s arrival and declaration of salvage law
      render the consoles’ lockouts irrelevant, as his legalistic threat of executing
      the crew overrides the need for technical access. The consoles thus symbolize
      both the Ferengi’s limitations and the crew’s indirect defiance.
    status_before_event: Locked and inaccessible to Berik and Morta, with security
      protocols preventing unauthorized access.
    status_after_event: Remain locked but are now overshadowed by Lurin’s legal and
      physical control over the bridge.
