- fabula_uuid: cand_evt_scene_0d6b5ac3fed8d887_ferengi_ultimatum
  global_id: null
  title: Lurin invokes salvage law
  description: 'Daimon Lurin arrives on the *Enterprise* bridge to seize control,
    silencing the bickering Ferengi underlings Berik and Morta with a single command.
    He immediately asserts his authority by invoking Ferengi salvage law, declaring
    the ship and crew his property under threat of lethal force. Riker, now the de
    facto captain, challenges Lurin’s authority, but the Daimon cuts him off with
    cold precision, establishing the Ferengi’s ruthless leverage. The scene escalates
    the stakes by framing the adult crew as vulnerable hostages—especially with Worf
    and Data incapacitated—while Lurin’s calculated threat (executing crew members)
    forces Riker into a position of powerless negotiation. The exchange underscores
    the Ferengi’s legalistic brutality and the crew’s desperate vulnerability, setting
    up the high-stakes confrontation to come. Lurin’s arrival marks a turning point:
    the Ferengi are no longer disorganized pirates but a disciplined, dangerous force
    with a clear agenda.'
