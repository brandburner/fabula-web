    description_of_involvement: "\n        The bridge consoles are the interface through\
      \ which the crew executes Picard’s orders, but they also become a battleground\
      \ for authority. Worf’s hesitation at his tactical console is a physical manifestation\
      \ of the crew’s internal conflict—his hands hover over the controls as he grapples\
      \ with whether to obey. Data’s interaction with his console is smoother, a contrast\
      \ that highlights the crew’s divided reactions. The consoles themselves are\
      \ neutral, but their use (or lack thereof) in this moment reflects the broader\
      \ struggle: can the crew follow a child who claims to be their captain? The\
      \ consoles are more than tools; they are a litmus test for the crew’s discipline\
      \ and Picard’s leadership.\n      "
    status_before_event: Active, with Worf, Data, and other crew members manning their
      stations, but momentarily idle as the crew reacts to Picard’s appearance.
    status_after_event: Operational, with Worf and Data executing Picard’s orders,
      though the tension in the air lingers.
