    institutional_impact: Starfleet’s institutional impact in this event is one of
      vulnerability and temporary powerlessness, as its crew and protocols are overwhelmed
      by the Ferengi’s legalistic threats and brute force. The event underscores the
      organization’s reliance on its personnel’s skills and the fragility of its authority
      when faced with external aggression.
    internal_dynamics: The event reveals Starfleet’s internal tensions, particularly
      the crew’s fragmentation under Ferengi control. Riker’s leadership is tested
      as he grapples with the loss of key personnel (Worf, Data) and the threat to
      the crew’s safety. The organization’s usual cohesion is disrupted, but Riker’s
      defiance hints at an underlying resolve to counter the Ferengi’s takeover.
