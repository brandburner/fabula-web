- fabula_uuid: act_af47af4776e41abc
  number: 3
  summary: The Enterprise endures a brutal assault from the Klingon Birds of Prey,
    suffering severe damage. Worf reports critical system failures, including primary
    life support, warp engines, and rapidly diminishing shields. Despite Riker's attempts
    to return fire, the Enterprise is overwhelmed, sustaining heavy casualties across
    multiple decks. Data detects multiple transporter signatures, confirming the ship
    is being boarded. Ferengi pirates, led by Daimon Lurin, swiftly seize control.
    Young Picard is captured in a corridor, while Geordi and his engineering team
    are also taken prisoner. On the Bridge, Ferengi (Berik and Morta) materialize,
    incapacitating Worf and Data. Riker, before his capture, initiates a command lockout,
    preventing the Ferengi from gaining full control of the ship's systems. Daimon
    Lurin arrives on the Bridge, declaring the Enterprise a salvage claim under Ferengi
    law. He reveals his intention to exploit Ligos Seven's Vendarite mineral resources
    and use the adult crew, including the previously captured Starfleet science team,
    as slave labor in the mines. Crucially, Lurin orders that all children remain
    aboard the ship, setting up the unique circumstances for their eventual counter-attack.
    This act marks a significant turning point, establishing the primary antagonist
    and the dire stakes for the Enterprise and its crew.
