  title: Picard assesses children’s vulnerability under Ferengi control
  description: "\n  After being forcibly escorted into the schoolroom by Berik, Young\
    \ Picard immediately takes command of the situation, assessing the safety of the\
    \ children and confirming the Ferengi’s control over key ship sections. His first\
    \ priority is Keiko’s distress over her daughter’s whereabouts, which he addresses\
    \ with reassurance while subtly reinforcing his leadership role. The group brainstorms\
    \ countermeasures, with Ro proposing a gas attack—only for Picard to realize command\
    \ functions are locked. Guinan then pivots the discussion toward their childlike\
    \ appearances, suggesting they exploit the Ferengi’s underestimation of them.\
    \ This moment marks a critical shift: Picard’s initial instinct to command as\
    \ an adult gives way to Guinan’s insight that their vulnerability could be weaponized,\
    \ setting up the crew’s eventual counterattack.\n  "
