  title: Ferengi seize Enterprise control
  description: "\n  The Ferengi ambush escalates as Berik and Morta lead reinforcements\
    \ onto the bridge, overwhelming Worf and Data with phaser fire to seize control\
    \ of the *Enterprise*. Meanwhile, Young Picard is intercepted in a corridor by\
    \ an armed Ferengi, cutting off his attempt to reach the bridge. Riker, realizing\
    \ the severity of the situation, immediately locks down all command functions\
    \ to prevent further Ferengi control, but the damage is done—Morta orders the\
    \ transport of all able-bodied adults to Ligos Seven’s surface, stripping the\
    \ ship of its crew and leaving the childlike crew stranded and vulnerable. The\
    \ coordinated takeover forces the children into a desperate, high-stakes struggle\
    \ for survival, setting the stage for their counter-attack. The event underscores\
    \ the Ferengi’s ruthless efficiency and the crew’s sudden helplessness, while\
    \ Riker’s command lockout becomes a temporary but critical obstacle to their eventual\
    \ recovery.\n  "
