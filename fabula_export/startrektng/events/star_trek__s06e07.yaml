  title: Data detects hostile boarding in Engineering
  description: "\n  In the midst of the Enterprise's critical systems collapse and\
    \ the ongoing Klingon attack, Geordi La Forge delivers a grim assessment: auxiliary\
    \ power and emergency backups are offline, leaving the ship without warp capability\
    \ for at least an hour. Worf reports devastating losses—shields are down, and\
    \ decks 35 through 40 have suffered heavy casualties. The crew's already precarious\
    \ situation escalates further when Data detects transporter signatures in three\
    \ cargo bays, confirming an unauthorized boarding by hostile forces. This revelation\
    \ introduces a new, unseen threat—one that forces the childlike crew to confront\
    \ not only their physical vulnerability but the immediate danger of an enemy now\
    \ inside the ship. The moment shifts the narrative from external threats (Klingons)\
    \ to an internal invasion, raising the stakes and demanding urgent action from\
    \ the transformed crew.\n  "
