- fabula_uuid: cand_evt_scene_49ff148152698c53_01
  global_id: null
  title: Ferengi seize Enterprise bridge and crew
  description: "\n  The Ferengi ambush escalates as Berik and Morta lead reinforcements\
    \ onto the bridge, overwhelming Worf and Data with phaser fire to seize control\
    \ of the *Enterprise*. Young Picard is captured in a corridor by a Ferengi guard,\
    \ while Riker, realizing the severity of the threat, initiates a command lockout\
    \ to disable critical systems. The Ferengi, now in full control, order the transport\
    \ of all able-bodied adults to Ligos Seven’s surface, stripping the ship of its\
    \ adult crew and leaving the childlike crew stranded. This coordinated takeover\
    \ forces the children into a desperate struggle for survival and recovery of their\
    \ ship, setting the stage for their counter-attack. The event underscores the\
    \ Ferengi’s ruthless efficiency and the vulnerability of the transformed crew,\
    \ while Riker’s quick thinking—though ultimately ineffective—highlights the stakes\
    \ of the situation.\n  "
