      well as the implied captivity of other crew members like Miles O’Brien and Geordi
      La Forge. Starfleet’s institutional impact in this event is one of powerlessness,
      as its protocols and personnel are systematically neutralized by the Ferengi’s
      legalistic brutality and threats of violence.
    active_representation: Through the defiant actions of William Riker, who embodies
      Starfleet’s principles of leadership and resistance, and the unconscious but
