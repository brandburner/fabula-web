  title: Endar claims Jeremiah as his son
  description: "\n  Picard, seated on the bridge, confirms the *Q'Maire*'s passive\
    \ status with Data before Worf announces Captain Endar's demand for an open channel.\
    \ Endar appears on-screen, initially focused on the rescued Talarian crew, but\
    \ his demeanor shifts dramatically when Picard reveals the presence of a human\
    \ boy—Jono—among the survivors. Picard corrects Endar, identifying the boy as\
    \ Jeremiah Rossa, a name that visibly unsettles the Talarian captain. Endar’s\
    \ immediate, unshakable declaration that Jeremiah is *his son* by Talarian custom\
    \ upends Picard’s assumptions about the child’s identity and the diplomatic stakes\
    \ of his care. The revelation forces Picard to confront the fragility of Jeremiah’s\
    \ dual heritage and the personal cost of Endar’s claim, while also exposing the\
    \ deeper cultural and familial conflict at the heart of the story. The exchange\
    \ ends with Picard and Riker’s stunned silence, marking a turning point in the\
    \ standoff and Jeremiah’s fate.\n  "
