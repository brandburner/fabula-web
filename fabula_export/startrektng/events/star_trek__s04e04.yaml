- fabula_uuid: cand_evt_scene_037ee19d4ef7968b_01
  global_id: null
  title: Picard demands to see Jono despite injuries
  description: After regaining consciousness in Sickbay following Jono’s violent stabbing,
    Picard—disoriented but urgent—immediately demands to see the boy, overriding Beverly’s
    medical objections. His insistence reveals a visceral fear for Jono’s safety,
    not just as a diplomatic liability but as someone he now feels responsible for.
    Beverly’s firm refusal to prioritize the meeting over his treatment underscores
    the physical toll of the attack, while Picard’s refusal to wait exposes his emotional
    investment in Jono’s well-being. The confrontation forces Picard to confront his
    own vulnerability—both physical and emotional—as his protective instincts override
    his usual composure. This moment marks a turning point in his relationship with
    Jono, shifting from reluctant guardian to someone willing to defy medical protocol
    for the boy’s sake, even at his own expense. The subtext of the exchange highlights
    Picard’s growing paternal bond, despite his discomfort with children, and sets
    up future conflicts where his personal stakes in Jono’s fate will clash with Starfleet’s
    diplomatic priorities.
