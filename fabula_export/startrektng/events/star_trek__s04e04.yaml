- fabula_uuid: act_d64acad1a362bf29
  number: 2
  summary: Picard attempts to establish a connection with Jono, moving the boy into
    his own quarters after Jono dismisses his assigned room as a 'cage.' Jono maintains
    his Talarian identity, refusing to remove his gloves to avoid touching 'aliens'
    and expressing contempt for human customs. Picard probes Jono about the origin
    of his past injuries, which Jono dismisses as 'tests' of strength and endurance,
    scorning Picard's lack of understanding. Jono becomes agitated when Picard asserts
    his human identity, demanding to be returned to his 'cell.' Picard confides in
    Troi about his discomfort with children, revealing he 'skipped his childhood'
    in pursuit of his Starfleet career. Troi encourages him, emphasizing the importance
    of his role. Jono rearranges Picard's quarters and listens to loud Talarian music,
    further asserting his cultural identity. Picard shows Jono photographs of his
    human parents, but Jono denies any memory, claiming Endar rescued him and dismissing
    his parents' deaths as part of war. The Talarian warship Q'Maire arrives, and
    its Captain, Endar, appears on the main viewer, claiming Jono as his son according
    to Talarian custom, which allows him to adopt the child of a slain enemy to replace
    his own lost son. This revelation astonishes Picard and Riker, escalating the
    diplomatic stakes.
