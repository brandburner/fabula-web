  - 'BEVERLY: You might not ask that, Lieutenant, if he were your child.'
  - 'DATA: According to their tradition, a male child of fourteen has reached the
    age of decision. They undergo a ceremony of initiation and after that have the
    freedom to make their own choices.'
  - 'WORF: Sir, the message is for Jeremiah Rossa.'
  - 'PICARD: Have the boy brought to my Ready Room.'
