      rapidly transforming into a psychological trigger. Its electronic sounds—initially
      sharp zaps—escalate into phaser fire, explosions, and the voices of Connor and
      Moira Rossa, forcing Jono to relive the Talarian raid. The ball’s design (glowing,
      reactive) mirrors the way trauma distorts perception: what starts as a harmless
      game object becomes a vessel for Jono’s repressed memories. Its role is purely
      auditory and symbolic, with no physical interaction after the flashback begins.
      The ball’s ''death'' as a game prop parallels Jono’s confrontation with his
      past.'
    status_before_event: Active, struck back and forth between Picard and Jono, emitting
      electronic zaps with each hit.
