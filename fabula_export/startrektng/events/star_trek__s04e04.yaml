  title: Jono rejects Picard’s authority
  description: Picard attempts to establish a paternal rapport with Jono by addressing
    his distress ritual and offering comfort in the Enterprise’s quarters, but the
    boy’s defiance escalates when he dismisses the space as a 'cage' and demands to
    know if he will be returned to Captain Endar. Jono’s refusal to engage with Picard’s
    authority—rooted in his Talarian conditioning—exposes the captain’s inability
    to bridge the cultural divide, while his blunt challenge ('Are you going to return
    me to my Captain?') forces Picard to confront the diplomatic and ethical stakes
    of Jono’s fractured identity. The exchange underscores Jono’s visceral loyalty
    to Endar and his rejection of Starfleet’s influence, setting up a direct conflict
    between Picard’s diplomatic obligations and the boy’s emotional needs.
