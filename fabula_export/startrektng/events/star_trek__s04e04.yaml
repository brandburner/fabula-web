- fabula_uuid: act_a72e1a192057cfe6
  number: 4
  summary: 'Talarian warships converge on the Enterprise, creating a tense standoff.
    Data confirms the Enterprise''s superior firepower, but Picard expresses his desire
    to avoid conflict. Data reveals a crucial Talarian custom: a male child of fourteen
    reaches an ''age of decision'' after an initiation ceremony, granting them freedom
    of choice. This information offers Picard a glimmer of hope for a peaceful resolution.
    Starfleet Command sends a subspace communication specifically for Jeremiah Rossa.
    Picard brings Jono to his ready room to view a message from his grandmother, Admiral
    Connaught Rossa. The Admiral expresses her love, pride in the Rossa family''s
    Starfleet legacy, and relief at Jono''s return, emphasizing his role as ''the
    last of the Rossas.'' Jono becomes visibly overwhelmed and agitated, expressing
    frustration at the inability to perform his Talarian calming rituals. Picard takes
    Jono to the racquetball court, hoping to channel his energy. However, the electronic
    sounds of the game trigger a vivid, traumatic memory for Jono: the chaotic sounds
    of battle, his parents'' voices, and his mother''s scream during the Talarian
    raid. Jono collapses in anguish, sobbing as he recalls his mother''s death. Picard
    comforts him, recognizing this as a significant emotional breakthrough. Later,
    Jono, subdued but more open, discusses his mother''s singing and admits feeling
    ''weak'' now that he remembers these painful things. Picard assures him that feeling
    hurt is part of being human, as is feeling joy. Jono then expresses hunger, and
    Picard takes him to Ten Forward. There, Jono, more relaxed, accidentally flings
    a banana split onto Wesley, leading to his first genuine laughter. Picard feels
    content, believing things are finally improving. However, later that night, Jono
    descends from his hammock in Picard''s quarters, enters Picard''s bedroom, and,
    with a look of terror, plunges a Klingon dagger into the sleeping Captain''s chest.'
