  - character_uuid: ger_agent_596f60e072a1
    emotional_state: 'Disturbed and resolute. Her pacing and the tightness in her
      voice reveal a frustration that the Talarians’ brutality is not just historical
      but *ongoing*, with Jono as its latest victim. She is also weary, the weight
      of centuries of medical knowledge about trauma making this case feel tragically
      familiar. The commotion from Sickbay doesn’t startle her—it *confirms* her fears:
      Jono’s instability is a direct result of his abuse.'
    goals:
    - To ensure Picard fully grasps the severity of Jono’s condition, both physical
      and psychological, so he can make informed decisions about the boy’s future.
    - To prepare the *Enterprise* crew for the fallout of Jono’s trauma, whether it
      manifests as violence, dissociation, or a desperate bid to return to his captors.
    what_happened: "\n        Beverly dominates the scene physically and emotionally,\
      \ her pacing a restless counterpoint to Picard’s stillness. She is the bearer\
      \ of bad news, her medical authority lending gravity to each revelation: the\
      \ fractures, the concussion, the calcium traces. Her voice tightens as she describes\
      \ the abuse, not with clinical detachment but with a disturbance that borders\
      \ on anger. She doesn’t just present facts; she *challenges* Picard to see the\
      \ humanity behind the data, invoking Stockholm syndrome as both explanation\
      \ and warning. Her final line—'*That’s not uncommon*'—is delivered with a weariness\
      \ that suggests she’s seen this pattern before, a cycle of violence and coerced\
