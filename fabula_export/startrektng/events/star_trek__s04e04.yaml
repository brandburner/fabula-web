- fabula_uuid: cand_evt_scene_c8e732d259a24850_01
  global_id: null
  title: Picard confronts Jono with human past
  description: Picard returns to his quarters to find them violently reconfigured
    by Jono—furniture rearranged, Talarian music blaring—underscoring the boy’s defiance
    and cultural rejection. After silencing the noise, Picard discovers Jono suspended
    in a hammock, refusing to use human beds. Instead of escalating conflict, Picard
    attempts emotional connection by showing Jono family photos of his human parents,
    Connor and Moira Rossa, and infant Jeremiah. Jono dismisses his human identity
    outright, calling himself 'Jono' and shrugging off Picard’s revelation that his
    parents were killed by Talarians, framing it as inevitable war. The exchange exposes
    the depth of Jono’s Talarian conditioning and his emotional detachment from his
    human past. Just as Picard presses further, Riker interrupts with news of the
    Talarian warship’s arrival, forcing Picard to leave. Alone, Jono is visibly shaken
    by the photos, his hand reaching toward his mother’s image before a traumatic
    flashback—phaser fire and Moira’s voice—overwhelms him. He suppresses the memory
    with visible effort, reinforcing his internal conflict between Talarian loyalty
    and buried human trauma. The scene escalates tension between Picard’s diplomatic
    efforts and Jono’s ideological rigidity, while foreshadowing the boy’s unresolved
    psychological fractures.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e04
  scene_sequence: 12
  sequence_in_scene: 25
  key_dialogue:
  - 'PICARD: Computer, turn off that noise!'
  - 'JONO: You turned off my music.'
  - 'PICARD: Jono, I want to show you something... Those are Connor and Moira Rossa—your
    parents. That baby is you... Jeremiah Rossa.'
  - 'JONO: My name is Jono.'
  - 'PICARD: You were born Jeremiah, on Galen Four. Your colony was destroyed, later,
    during a border skirmish... Do you remember any of that? Your parents, your home?'
  - 'JONO: No. I know that Endar rescued me. He told me so.'
  - 'PICARD: Jono, your parents were killed by Talarians...'
  - 'JONO: It was war. Death is part of war.'
