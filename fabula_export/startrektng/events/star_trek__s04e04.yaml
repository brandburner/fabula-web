- fabula_uuid: cand_evt_scene_8f5124bdf790037f_01
  global_id: null
  title: Jono’s Restraint and Defiance in Sickbay
  description: "\n  Jono’s psychological unraveling reaches a breaking point in Sickbay\
    \ as he violently resists medical personnel and Counselor Troi after being asked\
    \ to remove his gloves—a trigger for his trauma. His shrieking escalates into\
    \ a full meltdown, forcing Beverly to call Security while Picard attempts to intervene.\
    \ Jono’s accusations of 'dissection' reveal his deep-seated paranoia and distrust\
    \ of Starfleet, particularly Beverly, whom he associates with invasive scrutiny.\
    \ His demand to return to Captain Endar exposes the fragility of his fractured\
    \ identity, caught between Talarian conditioning and his human past. Picard’s\
