- fabula_uuid: act_b63c0c1a20ef63e1
  number: 3
  summary: Picard allows Captain Endar to beam aboard the Enterprise for face-to-face
    negotiations, despite considering Endar's claim unacceptable. Endar recounts finding
    Jono as a 'squalling child' after the battle on Galen Four, asserting he 'rescued'
    him in accordance with Talarian tradition to replace his own son lost to humans.
    Picard confronts Endar about Jono's past injuries, suggesting abuse. Endar vehemently
    denies this, attributing the injuries to Jono's youthful attempts to win approval
    and respect through rigorous 'tests' of strength, such as riding a T'stayan and
    winning contests. Picard declares he cannot return Jono to Endar, as Jono's human
    family awaits him. Endar, in turn, threatens war, stating he has called in reserved
    forces and will not allow the Enterprise to leave Talarian territory without Jono.
    He challenges Picard, asking if he would not go to war for his only son, pushing
    Picard to the brink of catastrophe. Endar requests to see Jono to prove he has
    been a good father. Troi speaks with Jono, who dismisses human mothers and reiterates
    Talarian values of strength and war. Jono shows agitation when viewing a picture
    of his human mother. Picard, considering both the potential for abuse and the
    need for diplomacy, allows a supervised visit between Endar and Jono. In the Observation
    Lounge, Endar and Jono share an emotional reunion, pressing foreheads in a gesture
    of affection. Endar presses Jono about his choice, and Jono, hesitant, lies about
    wanting to stay, reaffirming his loyalty. Endar warns Jono he may die if war ensues,
    to which Jono claims he is ready, solidifying their shared deception.
