  key_dialogue:
  - 'PICARD: When we found Jono, it seemed so clear what had to be done. We knew if
    he could only be persuaded to make the decision to stay... you would most likely
    let him. So with the best of intentions, we tried to convince him... and, in so
    doing, thoroughly failed to listen... to his feelings, his needs.'
  - 'PICARD: Jono will return home—to the only home he has ever known. To the father
    that he loves. To you, Endar.'
  - 'ENDAR: Thank you, Captain...'
