  title: Jono stabs Picard in his quarters
  description: "\n  In the dead of night, Jono—tormented by his fractured identity\
    \ and the weight of his Talarian upbringing—sneaks into Picard’s darkened quarters.\
    \ The boy watches the sleeping captain with a conflicted expression, his emotions\
    \ oscillating between trust and terror. When Picard awakens and offers a warm,\
    \ paternal smile, Jono’s face briefly softens in response before his expression\
    \ twists into anguish. Without warning, he draws a Klingon dagger and plunges\
    \ it into Picard’s chest, letting out a guttural cry of pain. The attack is sudden,\
    \ brutal, and emotionally charged, marking a catastrophic rupture in the fragile\
    \ trust Picard had begun to build with the boy. The act forces Jono to fully embrace\
    \ his Talarian conditioning, severing any remaining ties to his human past and\
    \ escalating the diplomatic crisis to a point of no return. The violence is both\
    \ a betrayal of Picard’s care and a desperate attempt by Jono to reclaim control\
    \ over his fractured self.\n  "
