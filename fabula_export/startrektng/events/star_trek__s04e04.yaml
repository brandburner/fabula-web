- fabula_uuid: act_358e6364980f3103
  number: 5
  summary: Picard awakens in Sickbay, injured but stable, the dagger having been deflected
    by his sternum. He immediately demands to see Jono, who is being held in security.
    On the Bridge, Talarian warships converge, and Riker, in command, prepares for
    battle as Endar demands Jono's immediate return. Riker informs Endar of Jono's
    attack on Picard and states Jono will be returned to Starfleet for consequences,
    escalating the standoff to Red Alert. In Sickbay, Jono explains to Picard that
    he attacked him out of fear of 'betraying' Endar and abandoning his Talarian identity,
    believing he faced execution for attacking a Captain. Picard, now on the Bridge,
    interrupts Riker's communication with Endar. He takes responsibility for the crisis,
    admitting his 'crime' was trying to force Jono to make a choice rather than listening
    to his true feelings and needs. Picard declares Jono will return to Endar, 'the
    only home he has ever known,' to the father he loves. Endar is astonished and
    grateful, and Picard orders immediate transport. In the Transporter Room, Jono,
    in a profound gesture of affection and solidarity, removes his gloves and presses
    his forehead to Picard's, offering a soft 'Thank you' before beaming away. Picard
    watches the empty pad, confident in his decision. Later, in his quarters, Picard
    removes Jono's hammock, reflecting on the boy's impact and the lessons learned
    from the experience, beginning to restore order to his room.
