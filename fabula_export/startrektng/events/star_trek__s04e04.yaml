  title: Endar demands proof of paternal care
  description: 'In a tense confrontation aboard the *Enterprise*, Picard and Endar
    clash over Jono’s fate after Endar reveals the Talarian tradition of claiming
    enemy children as surrogate sons. Picard accuses Endar of abuse, citing Jono’s
    injuries, but Endar defends his actions as part of Talarian warrior culture, insisting
    Jono’s wounds stem from youthful trials. The exchange escalates when Picard refuses
    to return Jono, triggering Endar’s threat of war. The standoff forces Picard to
    confront the moral dilemma: surrendering Jono risks betraying his principles and
    the boy’s fragile trust, while defiance risks catastrophic conflict. Endar’s demand
    to see Jono—framed as proof of paternal care—becomes a pivotal turning point,
    exposing the cultural and emotional chasm between them and setting the stage for
    Jono’s psychological reckoning.'
