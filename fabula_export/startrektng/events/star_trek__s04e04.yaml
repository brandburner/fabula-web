  title: Jono’s identity crisis erupts under Rossa’s message
  description: "\n  In the Ready Room, Jono watches a recorded message from Admiral\
    \ Connaught Rossa, his human grandmother, who reveals his true heritage and the\
    \ Rossa family legacy. The revelation triggers Jono’s deep-seated conflict between\
    \ his Talarian upbringing and his human identity. When he fixates on Rossa’s Starfleet\
    \ uniform and learns she outranks Picard, his agitation escalates—he paces frantically,\
    \ lamenting his inability to perform Talarian rituals (music, B’Nar) that ground\
    \ him. Picard, sensing Jono’s unraveling, offers an unexpected gesture: sharing\
    \ his own coping mechanism (tea and reflection) to help the boy regulate his emotions.\
    \ The scene underscores Jono’s fractured identity, Picard’s reluctant but growing\
    \ paternal role, and the looming diplomatic tension between Starfleet and Talarian\
    \ expectations. Jono’s outburst—‘I feel if I have to hold still much longer I\
    \ will die!’—reveals the suffocating pressure of his dual identities, while Picard’s\
    \ response marks a shift from authority to empathy, foreshadowing his evolving\
    \ mentorship.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e04
  scene_sequence: 19
  sequence_in_scene: 40
  key_dialogue:
  - 'CONNAUGHT: "Jeremiah... my name is Connaught Rossa. I am your father''s mother.
    I find myself wondering what you look like... and all I can do is imagine your
    father at your age. You come from a family that would make you proud. Many of
    them have given their lives to bring peace to the galaxy. You are the last of
    the Rossas. I am so very thankful that you have been given back to us, to carry
    on the line."'
  - 'JONO: "She wears a Starfleet uniform."'
  - 'PICARD: "Yes."'
  - 'JONO: "What is her rank?"'
  - 'PICARD: "She is an Admiral."'
  - 'JONO: "She outranks you."'
  - 'JONO: "If I were home now, I would go to the brae, and run along the river...
    run as fast as I could! I can''t do any of the things that calm me here! You won''t
    let me have my music, you won''t let me make the B''Nar! I feel if I have to hold
    still much longer I will die!"'
  - 'PICARD: "Jono -- let me show you what I do when I get those feelings."'
