acts:
- fabula_uuid: act_900d9f63a2b6e7d6
  number: 1
  summary: The Enterprise responds to a distress call from a Talarian observation
    craft, discovering five injured Talarian teenagers and, surprisingly, a human
    boy among them. This boy, Jono, fiercely identifies as Talarian and demands to
    be returned to his captain, Endar. Medical scans reveal Jono suffered severe past
    injuries, leading Doctor Crusher to suspect abuse and suggest a case of Stockholm
    syndrome. Jono exhibits extreme agitation and distress when attempts are made
    to examine him or remove his gloves, consistently reiterating his loyalty to Endar.
    Starfleet identifies Jono as Jeremiah Rossa, the presumed-dead grandson of Admiral
    Rossa, whose parents were killed in a Talarian raid. Counselor Troi observes Jono's
    strong response to Captain Picard's authority and suggests Picard, despite his
    discomfort with children, must act as a father figure to help Jono reconnect with
    his human heritage. Picard reluctantly accepts this daunting responsibility, setting
    the stage for his personal challenge and the central conflict of Jono's identity.
