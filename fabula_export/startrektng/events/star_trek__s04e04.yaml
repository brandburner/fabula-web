  key_dialogue: &id009
  - 'ENDAR: I took him in accordance with my peoples'' traditions.'
  - 'PICARD: What... tradition... is it that empowered you to capture a helpless child?'
  - 'ENDAR: I lost my son at the hands of humans during the conflict over Castal One.
    Talarian custom allows me to claim the son of a slain enemy.'
  - 'PICARD: Then explain the fractured ribs! The concussion... the broken arm...'
  - 'ENDAR: Youth. Have you ever been a father, Picard? Have you ever had a son desperately
    try to win your approval? Your respect?'
  - 'ENDAR: Would you not for your only son?'
  - 'PICARD: We have been at peace for years. Let us not rush headlong toward war.'
  - 'ENDAR: Then help me to avoid it! If you will allow me to see Jono, it will be
    clear to you—I have been a good father.'
