- fabula_uuid: cand_evt_scene_d82d686326450eae_01
  global_id: null
  title: Picard confronts Endar over Jono’s identity
  description: 'On the *Enterprise* bridge, Picard verifies the Talarian warship *Q’Maire*’s
    passive status with Data, confirming its non-hostile posture—until Worf interrupts
    to announce Captain Endar’s demand for an open channel. The exchange begins as
    a routine diplomatic update but escalates when Picard reveals the presence of
    a human boy, Jeremiah Rossa, among the rescued Talarian crew. Endar’s immediate
    recognition of the child as his son—*Jono*—shatters Picard’s assumptions, forcing
    him to confront the child’s dual identity and the Talarian claim to him. The revelation
    exposes the fragility of Jono’s past and the high stakes of the standoff, as Endar’s
    paternal declaration clashes with Picard’s Federation obligations. The moment
    crystallizes the central conflict: Jono’s loyalty is not just a diplomatic issue
    but a deeply personal one, with Endar’s emotional claim complicating Picard’s
    protective instincts toward the boy. The scene ends with Picard’s stunned reaction,
    setting up the next act’s confrontation over Jono’s future.'
