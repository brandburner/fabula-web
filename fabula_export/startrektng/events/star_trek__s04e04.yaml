      \ tension, though the scene unfolds in Beverly’s adjacent office. The two spaces\
      \ are functionally linked: Beverly’s office is a *control room* for the crisis,\
      \ where medical data is analyzed and strategies are debated, while Sickbay is\
      \ the *battleground*, where Jono’s trauma manifests in real time. The commotion\
      \ that interrupts Picard and Beverly is a *sonic bridge* between these locations,\
      \ collapsing the distance between theory (the scans) and practice (Jono’s meltdown).\
      \ The layout also reflects the power dynamics at play: Beverly’s office is a\
      \ space of *authority* (where decisions are made), while Sickbay is a space\
      \ of *vulnerability* (where those decisions are tested).\n      "
    observed_atmosphere: 'Tension-filled and sterile, with the clinical precision
      of Beverly’s office contrasting sharply with the chaotic energy bleeding in
      from Sickbay. The air is thick with unspoken questions: *How much damage has
      already been done? How much more can Jono—and the Enterprise—withstand?*'
