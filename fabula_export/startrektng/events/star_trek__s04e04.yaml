      response to the Talarian distress call, its protocols, values, and chain of
      command shaping every decision made on the bridge. The organization’s presence
      is felt in Picard’s adherence to (and eventual override of) protocol, Riker’s
      coordination of the away team, and Data’s reliance on historical Starfleet records
      of Talarian tactics. Starfleet’s humanitarian principles—embodied in Picard’s
      log entry and his ultimate decision to rescue the survivor—clash with the tactical
      caution instilled by its neutrality policies. The organization’s influence is
      also seen in the crew’s trust in one another, a product of Starfleet’s emphasis
      on teamwork and shared purpose. However, the event also highlights the limitations
      of Starfleet’s institutional knowledge, as Data’s warning about the Talarian
      self-destruct trap exposes a gap in their preparedness for asymmetric threats.
