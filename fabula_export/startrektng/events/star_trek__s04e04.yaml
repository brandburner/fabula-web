  title: Picard challenges Endar over Jono’s injuries
  description: In the captain’s ready room, Picard confronts Endar about the Talarian’s
    claim to Jono (Jeremiah Rossa), forcing a reckoning over the boy’s past. Endar
    recounts rescuing Jono as an infant after the Galen Four massacre, framing it
    as a Talarian tradition of claiming enemy sons—yet Picard’s suspicion of abuse
    surfaces when Beverly’s medical findings reveal severe injuries. Endar deflects,
    attributing the fractures and concussions to Talarian youth rituals, but his defensiveness
    and Picard’s moral outrage escalate tensions. The exchange exposes the cultural
    clash between Federation values and Talarian customs, while Picard’s refusal to
    return Jono triggers Endar’s war threat, pushing the conflict toward a breaking
    point. The scene pivots from diplomatic negotiation to personal confrontation,
    with Picard’s paternal instincts clashing against Endar’s claim of fatherhood
    and the looming specter of war.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e04
  scene_sequence: 14
  sequence_in_scene: 30
  key_dialogue:
  - |-
    PICARD: And so, you -- kidnapped him.
    ENDAR: A harsh term, Captain. I rescued the child. There was almost no one left alive on Galen Four... was I to leave him screaming by his mother's body?
  - |-
    PICARD: Then explain the fractured ribs! The concussion... the broken arm...
    ENDAR: Youth. Have you ever been a father, Picard? Have you ever had a son desperately try to win your approval? Your respect?
  - |-
    ENDAR: Then under no circumstances will I allow your ship to leave our territory.
    PICARD: Are you saying you would be willing to go to war over the boy?
    ENDAR: Would you not for your only son?
