  title: Jono recognizes Picard’s authority
  description: In Sickbay, Picard and Riker enter to find a chaotic scene of Talarian
    teenagers wailing in distress. Picard’s repeated attempts to assert control—first
    with polite requests, then with a sharp command—finally silence the group when
    Jono, the human-Talarian boy, responds instantly to his authoritative tone. Jono,
    electrified by the word *Captain*, breaks from the group, bows in deference, and
    pleads to be taken back to his Talarian commander, Endar. The gesture reveals
    an unspoken military bond between them, rooted in Jono’s fractured identity and
    Picard’s lingering Starfleet authority. Troi observes the exchange with quiet
    significance, noting the instant connection between the two. This moment underscores
    Jono’s internal conflict—his loyalty to Endar clashes with his recognition of
    Picard’s command—and foreshadows the diplomatic tension ahead, as Picard’s discomfort
    with children now intersects with Jono’s complex allegiance.
