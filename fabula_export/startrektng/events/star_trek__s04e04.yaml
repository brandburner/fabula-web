      healing) and the brutal realities of interstellar conflict (abuse, coercion).
      The office is a bubble of control; Sickbay is the leaky vessel where that control
      is tested.
    access_restrictions: Restricted to senior staff and medical personnel during crises,
      though the commotion suggests that Jono’s outburst has breached these boundaries,
      drawing Picard and Beverly into the chaos.
