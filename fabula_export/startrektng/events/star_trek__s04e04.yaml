  title: Troi forces Picard to confront fatherhood
  description: "\n  In the observation lounge, the crew processes the revelation that\
    \ Jeremiah is Admiral Rossa’s grandson, orphaned in a Talarian raid. Beverly and\
    \ Troi note the boy’s deep resistance to women, while Data confirms the Talarian\
    \ patriarchal culture. Troi argues that Jeremiah’s psychological recovery requires\
    \ a male mentor—specifically Picard, the only person he’s shown any connection\
    \ to. Picard initially resists, citing his lack of training, but Troi’s insistence\
    \ frames the boy’s crisis as a test of Picard’s leadership and moral duty. The\
    \ exchange forces Picard to confront his own discomfort with paternal responsibility,\
    \ setting him on an unavoidable path toward mentorship despite his reluctance.\
    \ The scene pivots from revelation to confrontation, with Troi’s challenge exposing\
    \ Picard’s unresolved avoidance of emotional vulnerability.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e04
  scene_sequence: 8
  sequence_in_scene: 18
  key_dialogue:
  - 'TROI: Captain... if Jeremiah were returned to his family in his present condition...
    it would be a wrenching experience for everyone. Especially for him. He needs
    to re-discover his identity. He has to make some connection with his roots.'
  - 'PICARD: I agree. Please take whatever means you need to accomplish that, Counselor.'
  - 'TROI: I don’t think I can do anything, Captain.'
  - 'PICARD: Why not?'
  - 'BEVERLY: Troi’s right. It’s very clear that the boy does not respond well to
    women.'
  - 'TROI: Jeremiah needs to build a relationship with a man... a father figure...
    with whom he can explore his origins... and I think it should be you, Captain.'
  - 'PICARD: ((over my dead body)) Oh, no, Counselor! I don’t think so. He needs someone
    who is—trained in these things.'
  - 'TROI: But you are the only person on board to whom he has shown any connection.
    If Jeremiah is to find his—humanity—then you are the only one who can help him.
    It’s up to you, Captain.'
