  title: Beverly reveals Jono’s abuse to Picard
  description: "\n  In Beverly’s office, Picard and Beverly discuss Jono’s medical\
    \ scans, which reveal a pattern of injuries—fractured ribs, a broken arm, and\
    \ a concussion—suggesting prolonged physical abuse during his captivity. Beverly’s\
    \ clinical detachment cracks as she voices her suspicion that the Talarians brutalized\
    \ the boy, a revelation that forces Picard to confront the moral horror of Jono’s\
    \ situation. Their conversation is abruptly cut short by a commotion from Sickbay,\
    \ signaling an escalating crisis. The moment underscores the psychological and\
    \ physical toll of Jono’s trauma, deepening Picard’s conflict between his diplomatic\
    \ duties and his growing responsibility for the boy’s well-being. The interruption\
    \ also serves as a narrative pivot, shifting focus from private concern to immediate\
    \ action, while reinforcing the high stakes of Jono’s fractured identity and the\
    \ fragility of the peace talks.\n  "
