  title: Jono’s trauma surfaces in sickbay
  description: 'Picard’s log entry—recording the mystery of a human child among Talarian
    survivors—sets the stage for Beverly’s attempt to examine Jono, who sits rigidly
    on a diagnostic bed, refusing all contact. When Beverly scans him with a tricorder,
    Jono’s repressed trauma erupts: he shrieks, rocks violently, and triggers a sympathetic
    wail from the other Talarians. Troi confirms his terror, exposing the depth of
    his psychological wounds and the fragility of his identity. The scene underscores
    the crew’s growing realization that Jono’s resistance isn’t defiance but survival,
    forcing Picard to confront the ethical and emotional stakes of reconnecting him
    with his human past. The outburst also foreshadows the cultural and psychological
    battles ahead, as Jono’s trauma becomes a barrier to both Starfleet’s diplomatic
    goals and his own healing.'
