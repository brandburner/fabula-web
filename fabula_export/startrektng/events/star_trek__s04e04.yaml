      response to the Talarian distress call, its protocols, values, and chain of
      command shaping every decision made on the bridge. The organization’s presence
      is felt in Picard’s adherence to (and eventual override of) protocol, Riker’s
      coordination of the away team, and Data’s reliance on historical Starfleet records
      of Talarian tactics. Starfleet’s humanitarian principles—embodied in Picard’s
