  global_id: null
  title: Jeremiah’s Human Legacy Uncovered
  description: "\n  In the Observation Lounge, Data reveals Jeremiah’s true identity\
    \ as Jeremiah Rossa, grandson of Admiral Rossa, after matching his DNA to Starfleet\
    \ records. The revelation exposes the tragic history of his parents’ deaths in\
    \ a Talarian raid, framing Jeremiah as the sole survivor of a family marked by\
    \ loss. Riker’s personal connection to another Rossa casualty deepens the emotional\
    \ weight, while Beverly and Troi argue that Jeremiah’s psychological state—rooted\
    \ in Talarian conditioning—requires a male mentor to reconnect with his humanity.\
    \ Picard resists the role, but Troi insists he is the only figure Jeremiah has\
    \ shown any trust in, forcing Picard to confront his own discomfort with paternal\
    \ responsibility. The scene pivots from revelation to confrontation, setting up\
    \ Picard’s reluctant mentorship as the key to Jeremiah’s identity crisis and the\
    \ diplomatic standoff with the Talarians.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e04
  scene_sequence: 8
  sequence_in_scene: 17
  key_dialogue:
  - 'DATA: By matching DNA gene types, Starfleet was able to identify the young man
    as Jeremiah Rossa...'
  - 'RIKER: Rossa...'
  - 'PICARD: ... as in Admiral Rossa, Data?'
  - 'DATA: She is his grandmother, Captain.'
  - 'RIKER: I knew another one of the Rossas who was killed in action at the Krasner
    outpost...'
  - 'PICARD: Tragedy, it seems, follows the Rossa Family... the Admiral has lost both
    her sons...'
  - 'BEVERLY: She''ll have something to celebrate now...'
  - 'TROI: Captain... if Jeremiah were returned to his family in his present condition...
    it would be a wrenching experience for everyone. Especially for him. He needs
    to re-discover his identity. He has to make some connection with his roots.'
  - 'PICARD: I agree. Please take whatever means you need to accomplish that, Counselor.'
  - 'TROI: I don''t think I can do anything, Captain.'
  - 'PICARD: Why not?'
  - 'BEVERLY: Troi''s right. It''s very clear the boy does not respond well to women.'
  - 'DATA: The Talarians are a rigidly patriarchal society.'
  - 'TROI: Jeremiah needs to build a relationship with a man... a father figure...
    with whom he can explore his origins... and I think it should be you, Captain.'
  - 'PICARD: Oh, no, Counselor! I don''t think so. He needs someone who is—trained
    in these things.'
  - 'TROI: But you are the only person on board to whom he has shown any connection.
    If Jeremiah is to find his—humanity—then you are the only one who can help him.
    It''s up to you, Captain.'
