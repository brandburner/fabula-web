  key_dialogue:
  - 'PICARD: Those are Connor and Moira Rossa—your parents. That baby is you... Jeremiah
    Rossa.'
  - 'JONO: My name is Jono.'
  - 'PICARD: You were born Jeremiah, on Galen Four. Your colony was destroyed, later,
    during a border skirmish.'
  - 'JONO: No. I know that Endar rescued me. He told me so.'
  - 'PICARD: Jono, your parents were killed by Talarians...'
  - 'JONO: It was war. Death is part of war.'
