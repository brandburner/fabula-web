    working on combining a phase inverter and a cloaking device. In theory, they believed
    that a... phased ship could hide anywhere... even inside a planet.'
  - 'MIROK: We will set up a muon feedback wave inside the transfer beam. The particles
    will accumulate in their dilithium chamber. When they go to warp speed, their
    engines will explode.'
