  - object_uuid: ger_object_2c4e9e23df73
    description_of_involvement: "\n        The transporter console is the silent witness\
      \ to the crew’s unraveling. Chief Brossmer’s frantic scans over its panels are\
      \ a desperate attempt to reverse the irreversible—her fingers dance over controls\
      \ that now mock her with static and error codes. The console, once a symbol\
      \ of Starfleet’s precision, becomes a harbinger of death, its hum a funeral\
      \ dirge for Geordi and Ro. Its failure is not just technical; it’s a violation\
      \ of trust, a weapon wielded by the Romulans.\n      "
    status_before_event: "\n        Operational but compromised—Brossmer is already\
