    treats the investigation as a scientific puzzle, Geordi’s body language betrays
    his deeper emotional investment, given his recent brush with perceived death.
    The tricorder’s readings suggest the chroniton fields are localized, hinting at
    a deliberate sabotage rather than a random malfunction. This moment serves as
