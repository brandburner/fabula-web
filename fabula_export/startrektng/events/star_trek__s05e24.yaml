- fabula_uuid: cand_evt_scene_c3bb5a555e7bddac_02
  global_id: null
  title: Geordi discovers anyon beam reverses intangibility
  description: 'In a moment of escalating frustration, Geordi La Forge—desperate to
    restore his physical form and communicate the Romulan sabotage—experiments with
    the anyon emitter in Main Engineering. When Data accidentally sprays the beam
    across Geordi’s arm, the resulting electric shock reveals a critical breakthrough:
    the beam partially dephases his molecules, making his hand less intangible. Geordi
    realizes this could be the key to reversing his condition entirely, but Data’s
    fixation on his own mission-critical task leaves him dismissive. The discovery
    raises the stakes—Geordi’s scientific insight could save the *Enterprise*, but
    only if Data prioritizes his plea over his own objectives. The tension between
    their conflicting priorities underscores the urgency of the Romulan threat and
    Geordi’s isolation in his intangible state.'
