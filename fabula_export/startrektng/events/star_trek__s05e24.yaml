      \ answers, a last-ditch effort to turn back time. The device relays Brossmer’s\
      \ devastating news, its signal carrying the weight of the loss across the *Enterprise*.\
      \ It is both a tool of command and a messenger of doom, its beep a countdown\
      \ to the crew’s collective grief.\n      "
    status_before_event: "\n        Functional and ready—Riker uses it to demand an\
