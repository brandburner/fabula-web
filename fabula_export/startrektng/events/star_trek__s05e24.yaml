    emotional_state: A volatile mix of dark humor, determination, and underlying fear—masking
      his vulnerability with wit.
    goals:
    - Convey to Data (and the audience) that he and Ro are *not* dead, despite appearances.
    - Reject the memorial as a premature surrender to their fate.
    what_happened: 'Geordi is physically present but *invisible and intangible*, sitting
      on equipment in the shuttlecraft’s rear. His interruption—''Data -- I appreciate
      the sentiment. But you''re a little premature. I don’t intend to get commemorated
      before my time''—is delivered with a mix of humor and defiance, his voice cutting
      through the somber tone like a lifeline. The line is a *beating heart* of the
      scene: a refusal to accept defeat, a rejection of the memorial’s finality. His
      compassion for Data is evident in his tone, but his body language (implied by
      the dialogue) suggests a stubborn set to his jaw, arms crossed perhaps, as he
      leans forward to make his point. Ro’s resigned shrug in response highlights
      the contrast between their coping mechanisms: Geordi’s *fight* vs. her *acceptance*.
      The moment is bittersweet—his humor masks the desperation of their situation,
      but it also reaffirms his humanity in the face of the unknown.'
