    will accumulate in their dilithium chamber. When they go to warp speed, their
    engines will explode.'
  - 'GEORDI: We have to get back to the Enterprise and warn them.'
  - 'RO: How?'
  - 'GEORDI: I don''t know, but we have to find a way.'
