  global_id: null
  title: Decontamination exposes Geordi and Ro
  description: "\n  During a memorial service for Geordi and Ro—who are presumed dead\
    \ after a transporter accident—the two invisible protagonists witness their crew\
    \ celebrating their lives in Ten Forward. Ro reacts with disbelief and frustration\
    \ at the party-like atmosphere, while Geordi sees it as an opportunity to signal\
    \ their presence. When Brossmer initiates a decontamination process to clear chroniton\
    \ fields, the anyon effect briefly disrupts Geordi and Ro’s intangibility, revealing\
    \ their flickering forms to Data and Picard. The moment forces them to recalibrate\
    \ their chroniton emissions, exposing a critical flaw in their invisibility: their\
    \ vulnerability to subspace interference. This revelation becomes a turning point,\
    \ as Geordi urgently warns the crew about the Romulan sabotage before the Enterprise\
    \ goes to warp. The event shifts the narrative from grief to action, with Geordi’s\
    \ order to shut down the warp engines preventing a catastrophic muon wave build-up.\n\
    \  "
