  title: Transporter Malfunction Traps Geordi and Ro
  description: "\n  In the chaotic aftermath of a Romulan engine room disaster—marked\
    \ by dead bodies, burning consoles, and a failing core—Riker’s away team materializes\
    \ to assist. Geordi and Ro quickly assess the damaged graviton generator, determining\
    \ it must be replaced rather than repaired. As they prepare to transport it back\
    \ to the *Enterprise* for replication, a Romulan sabotage-induced transporter\
    \ malfunction occurs mid-beamout. Instead of dematerializing cleanly, Geordi and\
    \ Ro’s bodies begin to fuzz and spark, their forms destabilizing. The malfunction\
    \ renders them invisible and intangible, stranding them in a liminal state between\
    \ dimensions. This catastrophic failure becomes the inciting incident of the central\
    \ conflict: without the generator, the *Enterprise* cannot restore warp, and without\
    \ communication, the crew cannot warn Picard of the Romulans’ sabotage. The event\
    \ forces Geordi and Ro into a desperate, high-stakes race against time to find\
    \ a way to expose the Romulan plot before the ship’s impending warp jump dooms\
    \ them all.\n  "
