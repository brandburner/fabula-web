  title: Geordi follows Data to the Romulan ship
  description: "\n  In the transporter room, Data and Chief Brossmer analyze the transporter\
    \ malfunction that phased Geordi and Ro. Data deduces the accident was caused\
    \ by chroniton particles from the Romulan ship’s damaged cloaking device, which\
    \ traveled through the transporter beam. When Data announces his intention to\
    \ investigate the Romulan vessel to find the source of the emissions—and later\
    \ devise a decontamination method—Geordi, now invisible and intangible, realizes\
    \ this is his only chance to uncover the sabotage before the *Enterprise* reaches\
    \ warp. His urgency spikes as he attempts (and fails) to contact Ro via communicator,\
    \ reinforcing their isolation. The moment hinges on Data’s logical deduction and\
    \ Geordi’s desperate resourcefulness, both racing against time to prevent catastrophe.\
    \ Geordi’s decision to follow Data marks a critical shift: abandoning his initial\
    \ plan to communicate with Ro, he now prioritizes exposing the Romulan plot, even\
    \ if it means leaving her behind temporarily. The scene underscores the escalating\
    \ stakes and the crew’s fragmented efforts to avert disaster.\n  "
