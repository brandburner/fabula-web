- fabula_uuid: cand_evt_scene_9b425f3670f9913b_01
  global_id: null
  title: Data detects Geordi’s phased matter signature
  description: "\n  In Main Engineering, Data methodically scans the room with a tricorder,\
    \ searching for chroniton readings while Geordi—still invisible and intangible—watches\
    \ in frustration. When Data’s scan reveals an anomalous chroniton field embedded\
    \ in the wall, Geordi realizes it originated from his own phased matter passing\
    \ through the molecular structure during his entry. Excited, Geordi attempts to\
    \ communicate by walking through a pool table, hoping the disruption will force\
    \ Data to acknowledge his presence. However, Data’s methodical responses—spraying\
    \ the emitter and scanning without recognition—only deepen Geordi’s desperation.\
    \ The moment marks a critical scientific breakthrough: Data’s discovery of the\
    \ anyon emitter’s potential to neutralize phased matter, offering the first tangible\
    \ hope for reversing Geordi and Ro’s condition before the Enterprise’s impending\
    \ warp jump. Yet the failure of communication underscores the escalating stakes—time\
    \ is running out, and the Romulan sabotage remains undetected.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e24
