    global_id: ger_object_2c4e9e23df73
  - object_uuid: ger_object_7b067d51a218
    description_of_involvement: "\n        Geordi and Ro’s molecular patterns are\
      \ the invisible casualties of this event. Their absence from the transporter\
      \ buffer is not just a technical glitch—it’s a void where their lives should\
      \ be. Brossmer’s admission that they are 'irretrievably scrambled' turns their\
      \ patterns into a metaphor for the crew’s grief: something once tangible, now\
      \ dissolved into nothing. The patterns’ loss is the Romulans’ ultimate insult—a\
      \ reminder that their sabotage was not just about the *Enterprise*, but about\
      \ erasing individuals.\n      "
    status_before_event: "\n        Present but unstable—Brossmer’s initial scans\
      \ detect fragments of their patterns, hinting at a failed beam-out. There is\
      \ a sliver of hope that they might still be recoverable.\n      "
    status_after_event: "\n        Erased. The buffer is empty, the patterns gone.\
      \ What was once data is now a memory, a ghost in the machine. The Romulans have\
      \ ensured there is no trace left to mourn.\n      "
    global_id: ger_object_7b067d51a218
  - object_uuid: ger_object_5db0344a072b
    description_of_involvement: "\n        Riker’s com badge is the fragile thread\
