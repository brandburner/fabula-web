  - object_uuid: ger_object_d31411189253
    description_of_involvement: The Romulan containment chamber doors are the final
      barrier between the team and the successful ejection of the warp core. Jammed
      halfway open by the heavy beam, they cannot be fully closed until Data arrives
      to force them shut. The doors’ obstruction is a critical plot point, creating
      tension and testing the team’s ingenuity. Their eventual sealing is the direct
      result of Data’s intervention and the culmination of the team’s efforts. The
