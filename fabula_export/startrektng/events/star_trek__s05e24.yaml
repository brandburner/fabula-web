  global_id: null
  title: Data confirms Romulan sabotage threat
  description: "\n  In the Romulan engine room, Data interrogates Mirok and Varel\
    \ about the cloaking device damage, revealing chroniton emissions as the cause\
    \ of Geordi and Ro's transporter accident. While Mirok assures Data the emissions\
    \ will be neutralized before the core replacement, Data warns of their potential\
    \ catastrophic interaction with the new engine core—raising the stakes for Geordi\
    \ and Ro's invisible plight. Meanwhile, Geordi discovers a molecular phase inverter\
    \ in a Romulan console, linking it to Klingon intelligence reports about phased\
    \ cloaking technology. This revelation confirms the Romulans' sabotage and the\
    \ urgency of stopping warp before the Enterprise is destroyed. The scene escalates\
    \ as Mirok and Varel secretly plot to trigger a muon feedback wave in the Enterprise's\
    \ dilithium chamber, while Geordi and Ro—now aware of their phased state—race\
    \ to find a way to warn the crew. The tension peaks when a phased Romulan, Parem,\
    \ silently follows them, adding another layer of danger to their already precarious\
    \ situation.\n  "
