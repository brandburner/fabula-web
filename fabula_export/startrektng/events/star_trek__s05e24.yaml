  global_id: null
  title: Geordi and Ro uncover Romulan phased cloaking plot
  description: |2

    Geordi La Forge, while examining a Romulan console, discovers a molecular phase inverter—a device that alters matter to pass through solid objects. This revelation connects to Klingon intelligence reports about phased cloaking technology, explaining the transporter accident that rendered him and Ro intangible. Meanwhile, Data interrogates Romulan Commander Mirok about chroniton emissions, confirming the Romulans' sabotage of the Enterprise. As Geordi and Ro piece together the truth, they overhear Mirok and Varel plotting to sabotage the Enterprise's warp core via a muon feedback wave, which will detonate when the ship goes to warp. The stakes escalate as Geordi and Ro realize they must warn the Enterprise despite their phased state, or the ship—and everyone aboard—will be destroyed. The scene ends with a phased Romulan (Parem) silently following them, adding another layer of danger.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e24
  scene_sequence: 21
  sequence_in_scene: 36
  key_dialogue:
  - 'GEORDI: "I''ve never seen anything like this. There''s something in there that
    looks like a molecular phase inverter..."'
  - 'GEORDI: "A few years back, we got intelligence reports that the Klingons were
    working on combining a phase inverter and a cloaking device. In theory, they believed
    that a... phased ship could hide anywhere... even inside a planet. And conventional
    weapons would be useless against it."'
  - 'MIROK: "We will set up a muon feedback wave inside the transfer beam. The particles
    will accumulate in their dilithium chamber. When they go to warp speed, their
    engines will explode."'
  - 'GEORDI: "We have to get back to the Enterprise and warn them."'
