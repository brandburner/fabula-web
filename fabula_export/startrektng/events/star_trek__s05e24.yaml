      beam. Worf and the Romulan engineer disconnect its optical conduits and power
      leads, but the chamber cannot be sealed until Data arrives to force the doors
      shut. The chamber’s ejection is the only way to prevent the implosion, and its
      successful launch is the direct result of the team’s coordinated efforts. The
      chamber’s design and failure highlight the Romulans’ technical vulnerabilities
      and their dependence on Starfleet’s aid.
