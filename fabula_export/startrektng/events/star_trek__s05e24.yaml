  key_dialogue: &id015
  - 'RIKER: "We''ll have a complete power survey done within the hour... we''ll probably
    have to supply them with energy for life support... and they''re definitely going
    to need a new engine core to get home again."'
  - 'PICARD: "Understood, Commander. Keep us informed of your efforts. Picard out."'
  - 'PICARD: "I''ll be in sickbay."'
