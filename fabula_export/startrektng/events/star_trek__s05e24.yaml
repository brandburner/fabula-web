  global_id: null
  title: Data requests memorial permission
  description: 'Amid the Romulan power transfer crisis, Data interrupts Picard’s command
    briefing to request permission for a memorial service honoring Geordi and Ro.
    His request—framed as a personal responsibility—reveals his emotional processing
    of loss, contrasting with the Enterprise’s urgent operational priorities. Picard
    grants permission with quiet solemnity, underscoring the crew’s collective grief
    while Data’s departure leaves Picard momentarily reflective. The beat serves dual
    narrative purposes: it humanizes Data’s evolving emotional capacity and subtly
    reinforces the stakes of the Romulan sabotage, as even memorials must wait until
    the ship’s survival is secured. The exchange also foreshadows Data’s later deduction
    of Geordi and Ro’s true condition, tying emotional vulnerability to scientific
    breakthroughs.'
