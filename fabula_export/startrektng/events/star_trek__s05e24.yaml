    description_of_involvement: Starfleet is represented through the *Enterprise*’s
      institutional support for Riker’s decisions, the efficiency of its shields,
      and the trust placed in its technology. The organization’s role is critical
      in averting the crisis, as Riker’s order to extend the shields is the final
      step in saving both ships. Starfleet’s presence is felt through Picard’s voice,
      the *Enterprise*’s readiness, and the away team’s reliance on its resources.
      The organization’s power dynamics are those of a protective ally, using its
      technological superiority to safeguard both its own crew and the Romulans.
    active_representation: Through institutional protocol (Picard’s confirmation of
      shield deployment) and the away team’s reliance on Starfleet resources (transporters,
      shields, engineering support).
    power_dynamics: Exercising authority and protection over the Romulan ship, demonstrating
      Starfleet’s role as a stabilizing force in the crisis. The organization’s power
      is wielded with confidence, but also with a sense of responsibility for the
      lives at stake.
