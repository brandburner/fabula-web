  title: Geordi rejects Ro’s fatalism about death
  description: After a transporter accident renders them invisible and intangible
    to the crew, Geordi and Ro confront their shared predicament in Engineering. Ro,
    drawing on Bajoran beliefs about the afterlife, accepts their condition as death—evidenced
    by Beverly Crusher’s death certificates—and urges Geordi to make peace with their
    fate. Geordi, however, vehemently rejects the idea, insisting there must be a
    scientific explanation. Their clash reveals Ro’s pragmatic resignation and Geordi’s
    stubborn defiance, both rooted in their cultural and personal backgrounds. The
    tension escalates as Geordi refuses to surrender, declaring he will investigate
    the transporter room to find a solution, while Ro remains emotionally paralyzed
    by the weight of their perceived demise. The scene underscores their divergent
    coping mechanisms and sets up Geordi’s active resistance against their fate, which
    will later drive the plot toward uncovering the Romulan sabotage.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e24
  scene_sequence: 16
  sequence_in_scene: 24
  key_dialogue:
  - 'RO: We''re dead, Geordi.'
  - |-
    GEORDI: What?
    RO: Our patterns were lost in a transporter malfunction... we never rematerialized after leaving the Romulan ship.
  - |-
    GEORDI: We are not dead.
    RO: According to Doctor Crusher, we died in a transporter malfunction at fourteen-thirty hours. I watched her make out the death certificates.
  - |-
    GEORDI: No. You may be ready for the afterlife, but I'm not.
    RO: I don't see that we have much choice.
