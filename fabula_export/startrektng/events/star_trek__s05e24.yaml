  title: Transporter sabotage traps Geordi and Ro
  description: 'In the transporter room, Chief Brossmer attempts to beam Geordi La
    Forge and Ro Laren back to the *Enterprise* after their away mission, but the
    system malfunctions catastrophically. Strange, unrecognizable energy effects erupt
    on the transporter pad as Brossmer frantically tries to stabilize the beam, demanding
    more power from Engineering. The distortion intensifies, revealing the Romulan
    sabotage—Geordi and Ro are not just failing to materialize, but are being trapped
    in an intangible, phased state. Brossmer, realizing the situation is beyond recovery,
    aborts the transport, leaving the two officers stranded in a liminal existence.
    The failure isn’t just a technical glitch; it’s a critical revelation: the Romulans
    have tampered with the *Enterprise*’s systems, and if Geordi and Ro can’t communicate
    their discovery before warp, the ship—and everyone aboard—will be destroyed. The
    scene shifts from urgency to dread as the crew’s worst fears are confirmed: their
    friends are lost, and time is running out.'
