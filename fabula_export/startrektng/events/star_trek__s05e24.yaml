- fabula_uuid: act_5e5e4135cf356180
  number: 4
  summary: Back on the Enterprise, Geordi and Ro frantically search for evidence of
    the muon feedback wave, but it remains hidden from the ship's sensors. Data, meanwhile,
    detects new chroniton fields appearing across the Enterprise, puzzled by their
    random formation. Geordi realizes these are 'chroniton footprints' left by their
    movement, providing a potential link to their presence. Data instructs Brossmer
    to use the lateral sensor array to pinpoint these fields, while he modifies an
    anyon emitter to eradicate them. Ro goes with Brossmer to observe the sensor readings,
    while Geordi stays with Data, hoping to use the emitter to their advantage. Parem,
    the phased Romulan, also navigates the ship, searching for Geordi and Ro. In Main
    Engineering, Geordi observes Data using the anyon emitter to clear chroniton fields.
    Geordi deliberately walks through objects, generating new fields that Data detects
    and sprays. When Data accidentally hits Geordi's arm with the anyon beam, Geordi
    experiences a mild shock and partial rephasing, realizing the emitter could bring
    them back to normal. He tries to communicate this to Data, who remains focused
    on clearing the fields. On the bridge, Parem confronts Ro, revealing he can see
    her and demanding to know Geordi's whereabouts. Ro leads him on a chase through
    various crew quarters, during which Parem fires his disruptor, wounding her leg.
    Data and Geordi, following the unusually strong chroniton readings from the chase,
    arrive at the scene. Geordi tackles Parem, sending him through a wall and into
    space, eliminating the immediate threat. Data, still unaware of their presence,
    methodically decontaminates the room, leaving Geordi and Ro with the knowledge
    that the anyon emitter is their only hope.
