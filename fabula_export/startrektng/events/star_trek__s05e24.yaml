  sequence_in_scene: 38
  key_dialogue: &id033
  - 'GEORDI: The muon feedback wave''s not showing up on any of the engine displays.'
  - 'RO: The Romulans must be hiding it in the sensor return signal. Unless someone
    runs a level three diagnostic, they''ll never see it.'
  - 'GEORDI: There''s no reason why the interphase device would be producing new fields
    aboard this ship.'
  - 'GEORDI: We were in every one of those locations. Somehow we''re leaving... chroniton
    footprints behind us.'
  - 'DATA: I do not understand how these new fields have formed. No transporter beam
    has been active in any of those areas.'
