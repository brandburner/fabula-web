    description_of_involvement: The main bridge comms system serves as the critical
      conduit for Riker’s report, bridging the gap between the away team’s assessment
      of the Romulan vessel and Picard’s command decisions. Its clear, unobstructed
      transmission allows Riker’s voice to cut through the bridge’s ambient hum, delivering
      the tactical update with precision. The system’s functionality here is not just
      mechanical; it is narrative, as it facilitates the information exchange that
      sets Picard’s priorities in motion. Without it, the Romulan crisis would remain
      an abstract threat, but the comms system ensures it is heard, acknowledged,
      and—however briefly—taken into account before Picard pivots to sickbay.
    status_before_event: Fully operational, transmitting Riker’s report without interference.
      The system is a reliable tool for command communication.
    status_after_event: Continues to function normally, but now carries the residual
