      for their reappearance. Its explosive overload is a gamble, but it pays off,
      turning Ro''s frustration into a lifeline for the Enterprise.'
    status_before_event: Holstered at Ro's hip, fully charged but unused until she
      fires it in frustration. The disruptor is a standard Romulan energy weapon,
      capable of being overloaded for a powerful chroniton spike.
    status_after_event: The disruptor is spent, its energy reserves depleted after
      the overload. It lies inert on the floor of Ten Forward, its role in the event
      complete but critical—it has saved the ship and the crew.
    global_id: ger_object_b8d8ce6ca22b
