      warp core and the transporter malfunction that claimed Geordi and Ro. Though
      not physically present on the bridge, the Empire’s actions drive the crisis,
      forcing Picard to make brutal command decisions under the threat of further
      destruction. The Empire’s goal is to exploit Starfleet’s trust and use the *Enterprise*’s
      arrival as an opportunity to destroy it, masking their true intentions behind
      a facade of cooperation. Their influence is felt in the urgency of Riker’s requests,
      the offline status of the transporters, and the looming threat of the warp core
      breach.
