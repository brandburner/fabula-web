- fabula_uuid: cand_evt_scene_5c4299bcab2c7f6b_01
  global_id: null
  title: Ro discovers her invisibility and intangibility
  description: 'Ro Laren awakens in a disoriented state in the *Enterprise*’s corridor,
    her confusion deepening as passing crew members walk through her without acknowledgment.
    She attempts to hail the bridge via her communicator, but her calls go unanswered,
    reinforcing her growing isolation. When she reaches sickbay, the door fails to
    respond to her presence—until a crew member exits, allowing her to pass through
    the still-open door. This moment confirms her intangibility, marking a critical
    turning point: her altered state is no longer a fleeting malfunction but a persistent,
    destabilizing condition. The discovery forces her to confront the reality of her
    invisibility, which becomes both a liability (she cannot communicate the Romulan
    sabotage) and a potential advantage (she can move undetected through the ship).
    The scene underscores the escalating stakes of the *Enterprise*’s crisis, as Ro’s
    helplessness mirrors the crew’s broader vulnerability to the Romulan plot. Her
    Bajoran beliefs about death and the afterlife further complicate her reaction,
    as she grapples with whether this is a spiritual reckoning or a scientific anomaly.
    The moment also sets up her eventual collaboration with Geordi, as both must leverage
    their intangibility to navigate the ship’s impending doom.'
