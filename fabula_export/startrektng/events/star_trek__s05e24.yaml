  title: Ro’s intangibility confirmed through Picard
  description: 'In Beverly’s office, Ro Laren—already emotionally unmoored by the
    crew’s assumption of her death—witnesses Picard and Beverly finalize her and Geordi’s
    death certificates. When she desperately tries to intervene, Picard walks *through*
    her, confirming her horrifying intangibility. The moment is a visceral turning
    point: Ro’s physical helplessness mirrors the crew’s emotional paralysis, and
    the Romulan sabotage’s ticking clock looms larger as her inability to act underscores
    the stakes. The scene’s emotional brutality (her scream of ‘I’m not dead!’ going
    unheard) contrasts with Picard’s stoic professionalism, reinforcing the crew’s
    obliviousness to the truth—and the urgency of Ro and Geordi’s unseen struggle
    to warn them.'
