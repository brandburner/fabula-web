  title: Parem ambushes Ro on the bridge
  description: Parem, the phased Romulan, ambushes Ro and Brossmer on the *Enterprise*
    bridge, revealing his ability to detect her despite her invisibility—a critical
    vulnerability. He weaponizes this advantage by threatening her with a functional
    disruptor, forcing Ro to comply with his demands to locate Geordi. The confrontation
    escalates the tension between the phased characters, as Parem’s knowledge of their
    condition and his willingness to use violence expose the fragility of their intangible
    state. Ro’s decision to lead Parem away from the bridge without resistance underscores
    her strategic thinking, prioritizing the ship’s safety over immediate confrontation.
    The scene heightens the stakes of their phased existence, as Parem’s presence
    confirms the Romulan conspiracy and the urgency of exposing it before the *Enterprise*
    reaches warp speed. The disruptor’s functionality also hints at a potential solution
    to their intangibility, tying this moment to Geordi’s earlier discovery of the
    anyon emitter’s effect on his condition.
