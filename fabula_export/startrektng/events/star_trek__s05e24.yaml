  global_id: null
  title: Riker secures Romulan generator under sabotage
  description: 'In the chaotic aftermath of a Romulan engine room disaster—marked
    by dead bodies, burning consoles, and a failing warp core—Riker’s away team materializes
    to assist. Geordi immediately identifies the graviton field generator as irreparably
    depolarized, forcing Riker to negotiate its transport to the *Enterprise* for
    replication. Mirok, the Romulan science officer, reluctantly agrees, but the team’s
    attempt to beam the generator back triggers a transporter malfunction, causing
    Geordi and Ro to phase out of visibility. This moment escalates the crisis: the
    Romulans’ sabotage is now irreversible, and the *Enterprise*’s impending warp
    jump threatens to destroy the phased crew. The event pivots from diplomatic cooperation
    to existential peril, exposing the Romulans’ hidden agenda while trapping Geordi
    and Ro in a liminal state between life and death. Riker’s leadership and Geordi’s
    technical assessment become critical to the unfolding disaster, but the sabotage’s
    consequences are already set in motion.'
