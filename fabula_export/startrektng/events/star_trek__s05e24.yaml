    global_id: ger_object_7ac55142c21d
  - object_uuid: ger_object_b8d8ce6ca22b
    description_of_involvement: 'Parem''s disruptor is wielded by Ro to amplify their
      signal and disrupt their phased state. Initially fired in frustration at the
      memorial''s party-like atmosphere, the disruptor is later set to overload, creating
      a chroniton spike that interacts with the anyon beam. This interaction briefly
