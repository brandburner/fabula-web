      to accumulate muon particles in the *Enterprise*'s dilithium chamber, ensuring
      a catastrophic breach when the ship reaches warp speed. The wave is a silent,
      invisible threat, exploiting the beam's connection to the *Enterprise* to deliver
      its payload undetected. Its activation is the culmination of the Romulans' betrayal,
      turning the power transfer—a gesture of cooperation—into a lethal trap. Geordi
      and Ro overhear the plan and realize the urgency of warning the *Enterprise*
      before it's too late.
