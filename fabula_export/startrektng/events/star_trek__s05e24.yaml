    it when I came in here...'
  - 'GEORDI: ((over action)) When the phased matter in my body passed through the
    wall, it must''ve disrupted the wall''s molecular structure... producing a chroniton
    field.'
  - 'GEORDI: Data, I''m right here... that''s me you''re reading...'
