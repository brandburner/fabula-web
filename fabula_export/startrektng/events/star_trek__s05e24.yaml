      phenomenon that enables their brief materialization. Generated by their phased
      state, these emissions entangle with the chroniton fields rendering them intangible.
      When Ro overloads her disruptor, the resulting chroniton surge interacts with
      the anyonic emissions, creating a visible distortion that the Enterprise's decontamination
      beam amplifies. The anyon emissions are the key to their visibility, acting
