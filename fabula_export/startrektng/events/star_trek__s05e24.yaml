  key_dialogue: &id031
  - |-
    RO: I don't believe this... I'm dead... you can't hear me... and I'm still intimidated by you.
    RO: I just wanted to say... thank you. For trusting me when no one else would.
  - |-
    GEORDI: I think we'll find the answer to what's happened to us over there.
    RO: Why can't you just accept--
    GEORDI: Look, if you're right and we're dead this won't make any difference. But if I'm right, then we're still alive... and I'm going to need your help.
  - |-
    RIKER: Actually, I was thinking more of Ensign Ro...
    RO: Me?
