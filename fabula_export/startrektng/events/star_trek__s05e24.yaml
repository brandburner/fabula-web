acts:
- fabula_uuid: act_5dca1d0860fb38a6
  number: 1
  summary: The Enterprise responds to a distress call from a Romulan science vessel,
    finding it critically damaged and on the verge of a core breach. Riker leads an
    away team, including Geordi and Ro, to assist. During their return transport,
    a malfunction occurs, causing Geordi and Ro to vanish from the transporter pad,
    with the crew believing them dead. Back on the Enterprise, Picard and Troi grapple
    with the apparent loss, while Data begins a diagnostic of the transporter systems.
    Meanwhile, Riker and Worf work to prevent the Romulan ship's core from imploding,
    with Data arriving to provide critical assistance in manually ejecting the core,
    saving both ships from destruction. Unbeknownst to the crew, Ensign Ro awakens
    in an invisible and intangible state within the Enterprise's corridors. She attempts
    to communicate with passing crewmembers and then Picard and Beverly, only to discover
    they cannot see or hear her. Ro overhears Beverly preparing her death certificate,
    confirming the crew's belief that she is deceased. Ro's shock intensifies when
    Picard walks directly through her, solidifying her terrifying realization of her
    new, phased existence. This act establishes the central mystery of their disappearance
    and Ro's initial, disorienting experience of being 'dead' yet present.
  key_moments: []
