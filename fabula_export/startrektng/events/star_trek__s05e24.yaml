      in averting the crisis, as Riker’s order to extend the shields is the final
      step in saving both ships. Starfleet’s presence is felt through Picard’s voice,
      the *Enterprise*’s readiness, and the away team’s reliance on its resources.
      The organization’s power dynamics are those of a protective ally, using its
      technological superiority to safeguard both its own crew and the Romulans.
