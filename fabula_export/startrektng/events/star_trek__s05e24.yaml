  global_id: null
  title: Geordi and Ro uncover Romulan sabotage
  description: Geordi and Ro, now invisible and intangible after the transporter accident,
    analyze sensor data in main engineering and realize the Romulans have hidden a
    muon feedback wave within the Enterprise’s sensor returns—a sabotage that will
    trigger a warp core breach when the ship reaches warp speed. Meanwhile, Data detects
    unexplained chroniton fields forming in locations Geordi and Ro have recently
    occupied, leading Geordi to deduce they are leaving ‘footprints’ as they move.
    This revelation confirms the Romulans’ phased state and the crew’s own precarious
    condition, heightening urgency to communicate the threat before the ship’s impending
    warp transition. Ro is sent to the bridge to monitor sensor readings, while Geordi
    stays behind to assist Data in preparing an anyon emitter to neutralize the fields.
    The scene escalates tension by tying the crew’s personal crisis to the ship’s
    survival, as Parem, a phased Romulan, continues searching for them in the corridors,
    adding immediate physical danger to the stakes.
