      the transporter beam-out, but it becomes the instrument of the Romulans’ sabotage.
      His request to Brossmer—‘La Forge to Brossmer. Two people, one piece of equipment
      to beam aboard’—triggers the malfunction, phasing him and Ro out of visibility.
      The combadge, a symbol of Federation technology and trust, is rendered useless
      in the face of Romulan deception.
