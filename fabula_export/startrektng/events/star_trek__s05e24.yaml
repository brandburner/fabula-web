  title: Data’s memorial dilemma exposes crew fractures
  description: In a shuttlecraft en route to the Romulan vessel, Data—grieving the
    apparent deaths of Geordi and Ro—attempts to organize a memorial service, revealing
    his growing emotional complexity. His logical struggle to reconcile human/Bajoran
    customs with his own understanding of friendship creates tension when Ro, still
    convinced she’s dead, rejects the Bajoran Death Chant as too prolonged. Worf’s
    Klingon perspective on death as a celebration clashes with Data’s confusion, while
    Geordi’s off-screen presence (unknown to the others) adds tragic irony. The scene
    underscores the crew’s cultural divides and unresolved trauma, with Data’s vulnerability
    laying bare the emotional cost of their mission. The dialogue also foreshadows
    Geordi and Ro’s eventual return, as their ‘ghostly’ presence lingers in the subtext
    of the conversation.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e24
  scene_sequence: 20
  sequence_in_scene: 32
  key_dialogue:
  - 'DATA: Lieutenant, I am planning a memorial service for Commander La Forge and
    Ensign Ro. I would like you to participate.'
  - 'WORF: Human custom is to conduct a solemn, dignified service in which the dead
    are praised by their friends and loved ones. ... For a Klingon, this is a joyful
    time... a friend has died in the line of duty... and he has earned a place among
    the honored dead. It is not a time to mourn.'
  - 'DATA: I did not know what a friend was until I met Geordi. He spoke to me as
    though I were Human... he treated me no differently from anyone else. He accepted
    me for what I am. And that, I have learned, is friendship. I would like this service
    to reflect that friendship. But I do not know how to say goodbye.'
