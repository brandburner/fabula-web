  object_involvements:
  - object_uuid: ger_object_30481152ade6
    description_of_involvement: Geordi’s combadge is the critical communication device
      that enables Riker to coordinate with Picard and the *Enterprise*. When Riker
      taps it to order the shield extension, it becomes the linchpin of the team’s
      survival strategy. The combadge’s chirp and Picard’s immediate response underscore
      the efficiency of Starfleet’s chain of command. However, the combadge also foreshadows
      the transporter malfunction that will later strand Geordi and Ro—its role here
      is bittersweet, serving both as a tool of salvation and a harbinger of future
      crisis.
    status_before_event: Attached to Riker’s uniform, fully functional and ready for
      use. It is a standard-issue Starfleet device, symbolizing the crew’s connection
      to the *Enterprise* and their institutional support.
    status_after_event: Still functional but now associated with the transporter accident
      that will soon follow. Its role in this event is successful, but its later malfunction
      will have catastrophic consequences for Geordi and Ro.
    global_id: ger_object_30481152ade6
  - object_uuid: ger_object_056ede6f9216
    description_of_involvement: The heavy beam blocking the containment chamber doors
      is the physical obstacle that tests the team’s resolve and strength. Worf, the
      Romulan engineer, Riker, and Varel all struggle to move it, but their efforts
      fail until Data arrives to force the doors shut with his android strength. The
      beam’s immovability underscores the desperation of the situation and the high
      stakes of the crisis. Its removal is a turning point, enabling the core ejection
      and saving both ships. The beam also serves as a metaphor for the barriers—both
      literal and figurative—that must be overcome for cooperation between Starfleet
      and the Romulans.
    status_before_event: Wedged across the containment chamber doors, immovable by
