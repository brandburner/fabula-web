  global_id: null
  title: Romulans plot sabotage while Geordi and Ro overhear
  description: "\n  In the Romulan engine room, Geordi and Ro—still invisible and\
    \ intangible after the transporter accident—overhear Mirok and Varel devising\
    \ a muon feedback wave to sabotage the *Enterprise*'s warp core during its next\
    \ transition. The Romulans exploit the power transfer beam to accumulate muon\
    \ particles in the *Enterprise*'s dilithium chamber, ensuring a catastrophic breach\
    \ when the ship reaches warp speed. Meanwhile, Geordi identifies a molecular phase\
    \ inverter in the Romulan console, linking it to Klingon intelligence reports\
    \ about phased cloaking technology. This revelation confirms that Geordi and Ro\
    \ are not dead but phased, and that the Romulans are weaponizing the same tech.\
    \ The discovery forces them to act despite their intangible state, as failure\
    \ means certain destruction for the *Enterprise*. The scene escalates stakes by\
    \ revealing the Romulans' lethal intent and tying Geordi and Ro's personal crisis\
    \ to the ship's survival. Their urgency to warn the crew is heightened when they\
    \ realize the sabotage is already in motion, and they must find a way to communicate\
    \ the threat before it's too late. The moment also introduces a phased Romulan\
    \ observer, Parem, who silently follows them, adding another layer of tension\
    \ and foreshadowing future conflict.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e24
