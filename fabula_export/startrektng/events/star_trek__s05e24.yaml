  scene_sequence: 23
  sequence_in_scene: 41
  key_dialogue:
  - 'GEORDI: That''s interesting... you''re picking up chroniton readings in here,
    but not from me.'
  - 'GEORDI: ((getting excited)) Data, I came through this wall. I walked right through
    it when I came in here...'
  - 'GEORDI: ((over action)) When the phased matter in my body passed through the
    wall, it must''ve disrupted the wall''s molecular structure... producing a chroniton
    field.'
  - 'GEORDI: Come on... it''s me... that''s me you''re reading...'
