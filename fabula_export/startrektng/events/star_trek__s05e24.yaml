  title: Geordi and Ro devise chroniton warning
  description: Invisible and intangible after the transporter accident, Geordi and
    Ro strategize in Ten Forward to exploit chroniton fields during Picard’s memorial
    service. Geordi, driven by scientific urgency, insists they must use anyon emissions
    to become visible and warn the crew about the Romulan sabotage. Meanwhile, Data’s
    intervention on the bridge—delaying Picard’s warp attempt—buys critical time as
    the Romulan sabotage looms closer to destruction. The scene hinges on Geordi’s
    refusal to accept their 'death' and Ro’s growing skepticism of Bajoran beliefs,
    both pushing toward a desperate, high-stakes solution. Their plan becomes the
    only viable way to prevent the Enterprise’s warp core breach, but success hinges
    on precise timing and Data’s ability to detect their presence amid the memorial’s
    emotional weight.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e24
  scene_sequence: 36
  sequence_in_scene: 63
  key_dialogue:
  - 'GEORDI: "We’re not dead, Ro. We’re *phased*. And if we can find a way to interact
    with chroniton fields, we can make ourselves visible again."'
  - 'RO: "You’re asking me to risk a catastrophic chroniton surge in the middle of
    a memorial service? What if we trigger a warp core breach before we can even warn
    them?"'
  - 'GEORDI: "Then we’d better make sure Data’s ready to listen. Because if we don’t,
    we *are* dead—and so is everyone else on this ship."'
