  title: Picard dismisses sabotage warnings
  description: "\n  On the *Enterprise* bridge, Geordi and Ro—now invisible and intangible—desperately\
    \ try to warn Picard about Romulan sabotage in the dilithium chamber, but their\
    \ pleas go unheard. Picard, distracted by the Romulan commander Mirok’s polite\
    \ farewell and his own grief over their presumed deaths, prepares to engage warp\
    \ speed. Geordi and Ro’s frantic interjections ('No, Captain—wait!') are cut off\
    \ by Brossmer, who cites Data’s recommendation to delay warp until chroniton fields\
    \ are cleared. The reprieve buys Geordi and Ro critical time to act, but Picard’s\
    \ skepticism—rooted in his emotional state and the Romulans’ apparent cooperation—risks\
    \ dooming the ship. The scene underscores the tension between urgency and bureaucracy,\
    \ as well as the crew’s unspoken grief over Geordi and Ro’s disappearance. Their\
    \ relief at the delay is palpable, but the clock is ticking: they must exploit\
    \ the decontamination sweep to become visible before the *Enterprise* reaches\
    \ warp and triggers the sabotage.\n  "
