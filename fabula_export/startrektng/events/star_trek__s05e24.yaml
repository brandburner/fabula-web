      point of the crisis, having malfunctioned during the beam-out of Geordi and
      Ro. Picard orders a level one diagnostic and keeps all systems offline, acknowledging
      the irreversible loss of the two officers. The transporters’ failure is not
      just a technical issue but a symbolic one, representing the fragility of life
      and the unseen dangers of Romulan sabotage. Their offline status underscores
      the crew’s vulnerability and the need for caution moving forward.
    status_before_event: Malfunctioning and offline following the transporter accident
      that erased Geordi and Ro. No remains were detectable, and the systems are locked
      down pending diagnostic review.
    status_after_event: Still offline, with a level one diagnostic underway. Picard’s
      order ensures they remain inactive until the cause of the malfunction is identified
      and resolved.
