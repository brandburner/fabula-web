  global_id: null
  title: Picard confirms Geordi and Ro are lost
  description: "\n  The bridge crew grapples with the irreversible loss of Geordi\
    \ La Forge and Ro Laren after Brossmer confirms no physical remains can be retrieved\
    \ from the transporter accident. Picard, visibly affected but maintaining command\
    \ composure, orders a level one diagnostic of all transporter systems and directs\
    \ Data to investigate the Romulan ship for replacement personnel, prioritizing\
    \ the immediate threat of a warp core breach. Troi’s silent grief underscores\
    \ the crew’s collective mourning, while Riker’s blunt request for reinforcements—delivered\
    \ from the Romulan engine room—reveals the dual crisis: the personal loss of two\
    \ key officers and the looming sabotage threat. Picard’s decision to retreat at\
    \ Warp One, despite the unresolved transporter mystery, forces a brutal calculus\
    \ between saving the ship and abandoning the intangible Geordi and Ro. The scene\
    \ pivots from grief to urgent pragmatism, with Data’s departure marking the shift\
    \ from investigation to action.\n  "
