    status_before_event: Active, displaying tactical readouts of the Romulan vessel’s
      location and potential threats. Positioned on Picard’s desk, symbolizing the
      blend of command and personal reflection in the ready room.
    status_after_event: Remains active but shifts in symbolic role—from a tool for
      operational briefings to a backdrop for the crew’s emotional reckoning. The
      monitor’s glow fades into the background as the focus turns to Ro and Geordi’s
      invisible struggle.
