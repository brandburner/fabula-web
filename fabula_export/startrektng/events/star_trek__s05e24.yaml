    - Stabilize the Romulan ship to prevent a catastrophic warp core explosion that
      could endanger both crews.
    - Maintain the fragile alliance with the Romulans long enough to uncover any deception
      and ensure the safety of the *Enterprise*.
    influence_mechanisms:
    - Technical expertise (through the Starfleet crewmen’s repairs and Riker’s strategic
