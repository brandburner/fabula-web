  title: Ro confronts her erasure
  description: 'Ro Laren, now intangible and invisible to the crew, desperately tries
    to communicate with Dr. Beverly Crusher in her office. Her attempts to get Beverly’s
    attention—first through polite calls, then shouting, and finally violent gestures—all
    fail, culminating in her hand phasing through the desk. As Beverly updates Ro’s
    file to mark her as ''DECEASED,'' Ro witnesses the horrifying confirmation of
    her new reality: she is both present and erased, a ghost in the machine. The moment
    crystallizes her existential terror and the crew’s obliviousness to the Romulan
    sabotage, forcing her to confront the horror of being both seen and unseen. The
    scene escalates her isolation and the ticking clock of the *Enterprise*’s impending
    doom, as her inability to intervene becomes a visceral, inescapable reality.'
