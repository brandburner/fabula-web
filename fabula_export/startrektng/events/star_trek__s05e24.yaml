- fabula_uuid: act_e42cdb5e001818e7
  number: 3
  summary: Data, accompanied by Geordi (unseen), investigates the transporter room,
    detecting chroniton particles which he suspects caused the accident and the 'death'
    of Geordi and Ro. He plans to visit the Romulan ship to find the source of these
    emissions and later devise a decontamination method. Ro, having accepted her 'death,'
    visits the bridge to say her goodbyes, even as she overhears Riker planning to
    speak about her at the memorial service. Geordi, still determined, convinces Ro
    to accompany him back to the Romulan ship, believing they will find answers there.
    Aboard the shuttle, Data discusses his difficulty in planning an 'appropriate'
    memorial service, considering Human, Bajoran, and Klingon customs, with Worf offering
    a Klingon perspective of joy for a warrior's death. Once on the Romulan ship,
    Data questions Mirok and Varel about their damaged cloaking device, confirming
    the presence of chroniton fields. Observing the Romulan consoles, Geordi identifies
    a molecular phase inverter, realizing the Romulans were secretly developing a
    phased cloaking device. He deduces that the device's explosion emitted the chronitons,
    altering their molecular structure and rendering them 'phased' rather than dead.
    This revelation invigorates Geordi, who sees a path to decloaking. Immediately
    after, Geordi and Ro overhear Mirok and Varel plotting to install a muon feedback
    wave in the Enterprise's power transfer beam, intending to cause a warp core breach
    when the ship goes to warp. Shocked, they realize they must warn the Enterprise,
    but their intangible state presents a formidable obstacle. As they leave, a phased
    Romulan (Parem) is revealed, also in their state, silently following them.
