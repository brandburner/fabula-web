  title: Ro’s unheard farewell and Riker’s memorial offer
  description: In the ready room, Picard confirms the Romulan vessel’s suspicious
    location while Riker prepares to assist them. When Picard announces a memorial
    service for Geordi and Ro, Riker surprises everyone by volunteering to speak—not
    about Geordi, but about Ro, revealing an unexpected depth of respect for her.
    Meanwhile, Ro, invisible and intangible, lingers in the room, her unspoken gratitude
    to Picard surfacing as she attempts a final, futile farewell. Her moment of vulnerability
    is interrupted by Geordi, who urges her to join him on a shuttle to the Romulan
    ship, arguing that their only hope of uncovering the truth lies there. The scene
    pivots from grief to urgency, as Ro’s internal conflict—between acceptance of
    her perceived death and Geordi’s insistence on action—drives the narrative forward.
    The exchange underscores the crew’s shared loss while setting up the next critical
    mission to expose the Romulan sabotage before the *Enterprise* reaches warp speed.
