  - object_uuid: ger_object_f49ba56b8877
    description_of_involvement: 'The Romulan engine core is referenced indirectly
      through Riker’s report, serving as the linchpin of the external crisis threatening
      both the Romulan vessel and, by extension, the *Enterprise*. Its sabotage—implied
      but not yet fully understood—casts a long shadow over the scene, as the need
      for a new engine core and life support energy frames the Romulan distress call
      as a potential trap. The object is not physically present on the bridge, but
      its failure is the catalyst for Riker’s report, which in turn forces Picard
      to confront the dual crises: the Romulan threat and the crew’s trauma. Its role
      here is symbolic and structural, representing the unseen danger that demands
      immediate attention, even as Picard chooses to address a different, more personal
      crisis first.'
    status_before_event: Critically damaged and unstable, requiring urgent intervention
      (as reported by Riker). The sabotage is ongoing, with life support and power
      systems failing.
    status_after_event: Unchanged in physical state, but now explicitly linked to
      the *Enterprise*’s immediate concerns. The report ensures the Romulan crisis
      remains an active threat, even as Picard shifts focus to sickbay.
