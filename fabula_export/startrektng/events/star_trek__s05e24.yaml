- fabula_uuid: cand_evt_scene_44e7084962dfcc58_01
  global_id: null
  title: Picard orders Romulan rescue mission
  description: "\n  The *Enterprise* receives a fragmented Romulan distress call warning\
    \ of an imminent core breach, forcing Picard to act despite the ship’s ongoing\
    \ sabotage crisis. The transmission cuts out before details can be confirmed,\
    \ leaving the crew with only a dire warning and no time to verify. Picard immediately\
    \ orders Riker to lead an unarmed away team to the Romulan vessel, escalating\
    \ the ship’s already precarious situation. The decision is made under pressure,\
    \ with no guarantee of the Romulans’ trustworthiness or the mission’s safety.\
    \ Meanwhile, in the transporter room, Riker’s team—including Geordi, Ro, and Worf—prepares\
    \ to beam over, with Ro openly questioning the wisdom of going unarmed. The tension\
    \ between duty and risk is palpable, as the crew braces for a high-stakes rescue\
    \ that could further endanger the *Enterprise*. This moment serves as a turning\
    \ point, directly leading to the transporter malfunction that phases Geordi and\
    \ Ro, while also deepening the narrative’s central conflict between trust and\
    \ betrayal.\n  "
