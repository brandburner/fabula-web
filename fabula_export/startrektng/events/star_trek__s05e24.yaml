  title: Riker confirms Geordi and Ro are lost
  description: "\n  After a tense, prolonged silence in the Romulan engine room, Riker—still\
    \ waiting for Geordi and Ro to materialize from the transporter—demands an update\
    \ from Chief Brossmer. The transporter chief’s stunned admission that their molecular\
    \ patterns are irretrievably scrambled shatters the crew’s fragile hope. Riker’s\
    \ visceral reaction (shock, disbelief) underscores the emotional weight of the\
    \ loss, while the technical failure confirms the Romulan sabotage’s severity.\
    \ This moment escalates the mission’s stakes: without Geordi and Ro to expose\
    \ the sabotage, the *Enterprise* will be destroyed when it goes to warp. The event\
    \ functions as a narrative turning point, shifting the crew from rescue to survival\
    \ mode and forcing them to confront the dual crises of personal loss and impending\
    \ doom.\n  "
