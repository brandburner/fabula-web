- fabula_uuid: cand_evt_scene_cfcd97bdb68632e2_02
  global_id: null
  title: Riker and Data avert reactor meltdown
  description: "\n  In the Romulan engine room, Riker and Worf race against time to\
    \ manually eject the warp core before it implodes, but a blocking beam jams the\
    \ chamber door. With seconds remaining, Data arrives and uses his android strength\
    \ to seal the door, allowing Mirok to eject the core just before detonation. The\
    \ *Enterprise*’s shields—deployed on Riker’s order—protect both ships from the\
    \ explosion. This high-stakes moment hinges on teamwork, split-second decisions,\
    \ and Data’s intervention, resolving the immediate crisis while reinforcing the\
    \ crew’s trust in one another. The scene also underscores the Romulans’ desperation\
    \ and the fragility of their ship’s systems, foreshadowing their later sabotage\
    \ attempt.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e24
  scene_sequence: 6
  sequence_in_scene: 11
  key_dialogue:
  - 'MIROK: The pressure has jumped two hundred melakols! VAREL: I''ve lost control
    of the containment chamber! MIROK: It''s going to implode...'
  - 'RIKER: Worf, you two seal the chamber. WORF: Commander! (Riker turns to see Worf
    and the N.D. struggling with the beam) RIKER: (to Varel) Time? VAREL: Thirty seconds...'
  - 'RIKER: (straining against door) Stay there! Eject the chamber on my order! DATA:
    (o.c.) Excuse me, sir. (Data arrives and seals the doors with android strength)
    RIKER: Now!'
