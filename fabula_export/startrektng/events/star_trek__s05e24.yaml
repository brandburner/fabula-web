  title: Geordi rejects memorial service
  description: In the shuttlecraft, Data and Worf discuss funeral arrangements for
    Geordi and Ro, who are still phased and intangible but can hear the conversation.
    Data, struggling with the concept of loss, seeks guidance on how to honor his
    friends, while Worf offers a Klingon perspective that frames death as a celebration
    rather than a cause for grief. Geordi, overhearing the discussion, interrupts
    to assert his refusal to accept their 'death,' declaring that he has no intention
    of being commemorated prematurely. Ro, still resigned to their fate, remains silent.
    This moment underscores the tension between Geordi’s stubborn defiance and Ro’s
    fatalistic acceptance, while also revealing Data’s emotional growth and Worf’s
    cultural perspective on mortality. The exchange heightens the urgency of their
    situation, as their time to act dwindles and the stakes for exposing the Romulan
    sabotage grow higher.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e24
  scene_sequence: 20
  sequence_in_scene: 34
  key_dialogue:
  - 'DATA: Lieutenant, I am planning a memorial service for Commander La Forge and
    Ensign Ro. I would like you to participate.'
  - 'GEORDI: Data -- I appreciate the sentiment. But you''re a little premature. I
    don''t intend to get commemorated before my time.'
  - 'WORF: Commander, I am not the proper person to advise you. I am very happy for
    Commander La Forge. He has crossed to... that which is beyond. For a Klingon,
    this is a joyful time... a friend has died in the line of duty... and he has earned
    a place among the honored dead. It is not a time to mourn.'
