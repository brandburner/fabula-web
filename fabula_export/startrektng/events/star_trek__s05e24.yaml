    emotional_state: A volatile mix of exhilaration and despair—elated by the breakthrough
      but crushed by Data’s indifference, his emotions teetering between hope and
      helplessness.
    goals:
    - Convince Data to increase the anyon beam’s intensity to fully restore his physical
      form and communicate the Romulan sabotage.
    - Prove the beam’s effect is real and replicable, despite Data’s skepticism.
    what_happened: Geordi, invisible and intangible, frantically tries to get Data’s
      attention by repeatedly pushing his hand through the pool table, his movements
      growing more erratic with each failed attempt. When the anyon beam accidentally
      hits his arm, he recoils from the electric shock but quickly realizes the beam’s
      potential. His excitement builds as he tests his hand’s newfound resistance,
      but Data’s dismissal of his findings sends him into a spiral of frustration.
      He pleads urgently, his voice rising with desperation, as he grasps at this
      fragile hope—his only chance to communicate the Romulan threat and restore his
      physical form before the *Enterprise* is destroyed.
