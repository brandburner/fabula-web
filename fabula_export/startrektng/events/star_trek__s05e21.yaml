- fabula_uuid: act_bd8961cedb5f2123
  number: 2
  summary: Following her premature emergence, Kamala clarifies her identity as an
    empathic metamorph, a rare being capable of sensing and becoming a man's ideal
    mate, destined to bond permanently with Alrik to ensure peace. Commander Riker
    experiences her potent pheromonal influence firsthand, leading to a highly charged
    encounter. Dr. Crusher confronts Picard, expressing strong ethical objections
    to Kamala being treated as property and confined to her quarters. This moral challenge
    prompts Picard to assert Federation principles, granting Kamala freedom of movement
    on the ship, against Ambassador Briam's warnings about her disruptive nature.
    Kamala, in turn, begins to subtly probe Picard's character, noting his anger over
    her commodification and his guarded demeanor, signaling the nascent, complex attraction
    between them and further complicating Picard's duty.
