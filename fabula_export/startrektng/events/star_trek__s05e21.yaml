      \ and the reactor core destabilizes. The explosion that claims the shuttle is\
      \ sudden and violent, leaving no trace of the Ferengi or their vessel. The shuttle’s\
      \ role in the event is that of the tragic victim, its destruction a reminder\
      \ of the fragility of life and the brutality of the universe.\n      "
    observed_atmosphere: "\n        Chaotic and desperate, with blaring alarms, shuddering\
      \ bulkheads, and the eerie silence of space outside. The shuttle’s atmosphere\
      \ is one of impending doom, the crew’s last moments filled with the knowledge\
