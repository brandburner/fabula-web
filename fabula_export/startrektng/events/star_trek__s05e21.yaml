    global_id: ger_object_fdaa5ff18d3c
  - object_uuid: ger_object_807a34390459
    description_of_involvement: "\n        The Ferengi shuttle’s containment field\
      \ is the first domino in the chain reaction that leads to the shuttle’s destruction.\
      \ Its collapse is reported by Data, and its failure is the direct cause of the\
      \ reactor core’s instability. The containment field’s breakdown is a metaphor\
      \ for the fragility of the diplomatic negotiations unfolding aboard the *Enterprise*,\
      \ where the smallest failure can have catastrophic consequences. Its collapse\
      \ is the first sign that the shuttle—and by extension, the Ferengi’s role in\
      \ the larger conflict—is doomed.\n      "
    status_before_event: "\n        Failing and flickering, its collapse imminent\
      \ as the shuttle drifts helplessly in space. The containment field is the shuttle’s\
      \ last line of defense, and its failure is the first step toward the vessel’s\
      \ destruction. The crew of the *Enterprise* is aware of its condition, and their\
      \ urgency is driven by the knowledge that the shuttle is running out of time.\n\
      \      "
    status_after_event: "\n        Completely failed, its collapse triggering the\
      \ reactor core’s destruction. The containment field’s breakdown is the final\
      \ nail in the shuttle’s coffin, leaving no chance for the Ferengi to survive.\
      \ Its failure is a reminder of the inevitability of some outcomes, no matter\
      \ how desperately the crew may try to intervene.\n      "
    global_id: ger_object_807a34390459
  location_involvements:
  - location_uuid: ger_location_21fba3f3e20b
    description_of_involvement: "\n        Transporter Room Three aboard the *Enterprise*\
