  object_involvements:
  - object_uuid: ger_object_a0b216e0e635
    description_of_involvement: The Ferengi escape ship, mentioned by Qol as a rendezvous
      point, looms as a plot device and a symbol of the Ferengi’s desperation. Its
      existence—ready to carry Par Lenor, Qol, Briam, and Kamala off the *Enterprise*
      within three hours—reveals the Ferengi’s contingency planning and their willingness
      to abduct Kamala if necessary. The ship’s mention heightens the stakes, as it
      implies that the Ferengi are not merely negotiating but preparing for a potential
      heist. Briam’s threat to expose their scheme indirectly thwarts this plan, but
      the ship’s presence ensures the conflict is far from over.
    status_before_event: Prepped and waiting in a nearby location, its engines likely
      idling as the Ferengi await their window to depart. The ship is a tangible representation
      of their greed and their backup plan.
    status_after_event: Still operational but now irrelevant in the immediate aftermath
      of Briam’s injury. The Ferengi’s focus shifts from escape to damage control,
      as the guard’s phaser and Briam’s unconscious state derail their original timeline.
    global_id: ger_object_a0b216e0e635
  - object_uuid: ger_object_72c9ba60f756
    description_of_involvement: The Ferengi quarters table is an unwitting participant
      in the violence, serving as both an obstacle and the instrument of Briam’s injury.
      As Qol shoves Briam during their struggle, the Ambassador’s head strikes the
      table with such force that it *shatters*, the sound echoing the fragility of
      the peace talks. The table’s destruction is a visceral metaphor for the collapse
      of diplomacy, its splintered remains scattering across the floor like the shattered
      trust between Krios and the Ferengi. Its role is purely functional but narratively
      potent—it transforms a verbal confrontation into a physical one, with irreversible
      consequences.
    status_before_event: Intact and sturdy, serving as a neutral piece of furniture
      in the Ferengi quarters. Its surface is likely used for placing objects or leaning
      on during conversations.
    status_after_event: Shattered into fragments, its wood splintered and scattered
      across the floor. The table’s destruction mirrors the breakdown of the negotiation
      and the violence that has now entered the scene.
    global_id: ger_object_72c9ba60f756
  - object_uuid: ger_object_fc133bbde66d
    description_of_involvement: The guard’s phaser is the ultimate de-escalation tool
      in this scene, drawn in response to the noise of the struggle but never fired.
      Its raised barrel serves as a silent threat, freezing Par Lenor and Qol in place
      and forcing them to confront the consequences of their actions. The phaser’s
      presence is a reminder of Starfleet’s authority and the guard’s role as an enforcer
      of order. Though it doesn’t resolve the conflict, it prevents further violence,
      creating a tense standoff that underscores the precarious balance of power aboard
      the *Enterprise*.
    status_before_event: Holstered at the guard’s side, ready for use but not yet
      drawn. Its compact design suggests it is a standard-issue Starfleet hand phaser,
      capable of stun or lethal settings.
    status_after_event: Drawn and leveled at the Ferengi, its barrel glowing faintly
      with charged energy. The phaser remains unfired but serves as a deterrent, ensuring
      the scene does not escalate further.
    global_id: ger_object_fc133bbde66d
  - object_uuid: ger_object_dbf87526487f
    description_of_involvement: The five opulent Ludugial gold coins serve as the
      initial bait in the Ferengi’s bribe attempt, symbolizing both their wealth and
      their disregard for Kriosian integrity. When Par Lenor escalates the offer to
      twenty thousand ingots, the gold becomes a tangible representation of the Ferengi’s
      greed and the moral corruption they seek to introduce into the peace negotiations.
      Briam’s refusal of the coins—‘I am insulted’—highlights the stark contrast between
      Kriosian honor and Ferengi opportunism, making the gold a catalyst for the ensuing
      conflict.
    status_before_event: Intact and displayed in Briam’s hand as a ‘sample’ of the
      larger bribe. The coins gleam with opulence, emphasizing their value and the
      Ferengi’s attempt to tempt him.
    status_after_event: The coins remain undisturbed but are now symbolically tainted
      by the violence that followed. Their presence in the scene serves as a silent
      accusation of the Ferengi’s motives, even as Briam lies unconscious.
    global_id: ger_object_dbf87526487f
  location_involvements:
