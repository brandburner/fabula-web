  title: Kamala’s pheromones overwhelm Ten Forward
  description: "\n  Kamala’s unintentional pheromonal influence triggers a chaotic\
    \ reaction among the miners in Ten Forward, exposing the fragility of Riker’s\
    \ self-control and the broader tension between duty and desire aboard the *Enterprise*.\
    \ As Data escorts Kamala through the bar, her presence—unbeknownst to her—sends\
    \ the miners into a frenzy of attraction, their advances growing increasingly\
    \ bold. Riker, seated with Worf, immediately recognizes the danger and flees the\
    \ scene, his abrupt departure underscoring his struggle to maintain professionalism\
    \ amid personal temptation. Meanwhile, Kamala—naïve to the effect she’s having—engages\
    \ with the miners playfully, her behavior shifting to mirror their coarse, flirtatious\
    \ energy. Data, immune to her influence, attempts to shield her, but the miners’\
    \ persistence forces Worf to intervene with Klingon authority, restoring order.\
    \ The scene culminates with Kamala unconsciously emitting a Klingon hiss, a moment\
    \ that delights Worf and reveals the depth of her empathic abilities. This event\
    \ serves as a microcosm of the larger conflict: Kamala’s presence disrupts the\
    \ *Enterprise*’s equilibrium, forcing its crew to confront their own desires while\
    \ Picard’s diplomatic mission hangs in the balance.\n  "
