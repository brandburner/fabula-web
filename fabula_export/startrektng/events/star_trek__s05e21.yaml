- fabula_uuid: cand_evt_scene_427f855ae2634e00_02
  global_id: null
  title: Kamala dismantles Picard’s defenses
  description: "\n  In the ready room, Kamala strategically dismantles Picard’s emotional\
    \ walls by leveraging his intellectual passions—Ventanan archaeology and Shakespeare—as\
    \ a pretext for intimacy. She begins by offering to confine herself to her quarters,\
    \ but only if Picard agrees to visit her, framing the request as a condition rather\
    \ than a demand. When Picard resists, she shifts tactics, using her knowledge\
    \ of his personal history (gleaned from Data) to expose his repressed desires.\
    \ She describes him as a man of 'deep passion and conviction,' challenging his\
    \ self-deprecating claim of dullness. The tension escalates as she invades his\
    \ physical space, her empathic presence forcing him to confront his attraction.\
    \ Picard’s struggle—between duty and desire—culminates in Kamala’s biblical metaphor:\
    \ 'Even the walls of Jericho fell, Captain,' implying his resistance is futile.\
    \ The exchange forces Picard to acknowledge that his own conflicted longing fuels\
    \ her pursuit, deepening the narrative’s central tension: whether his personal\
    \ desires will undermine the fragile peace he’s sworn to broker.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e21
  scene_sequence: 27
  sequence_in_scene: 38
  key_dialogue:
  - |-
    KAMALA: Perhaps the ambassador is right. Perhaps I should remain in my quarters.
    PICARD: I am confident of my crew's self-control. But there are civilians and guests on board...
    KAMALA: I understand. I will volunteer to stay in my quarters under one condition. That you will visit me.
  - |-
    KAMALA: There it is, again.
    PICARD: What?
    KAMALA: The wall you put between us.
    PICARD: You are a day away from an arranged mating. Why would you want me to visit you in your quarters?
    KAMALA: I said a visit. I didn't ask you to make love to me.
  - |-
    KAMALA: When a metamorph finds you interesting... do not take it lightly.
    PICARD: I don't take it lightly... I'm only... trying to be as dull as possible.
    KAMALA: Even the walls of Jericho fell, Captain.
    PICARD: Why are you doing this?
    KAMALA: There can be only one reason. Because some part of you wants me to.
