      their greed and opportunism driving the confrontation. Par Lenor and Qol’s bribe
      attempt—escalating from ten thousand to twenty thousand Ludugial gold ingots—reveals
      their willingness to exploit the political crisis for profit. Their physical
      aggression against Briam, culminating in his injury, exposes their ruthlessness
      and the lengths to which they will go to acquire Kamala. The mention of their
      escape ship underscores their contingency planning, positioning them as persistent
      threats to the peace talks. Their actions force Picard into a more central role,
      disrupting the delicate balance of the negotiations.
