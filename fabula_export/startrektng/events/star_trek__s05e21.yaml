  - object_uuid: ger_object_807a34390459
    description_of_involvement: "\n        The Ferengi shuttle’s containment field\
      \ is the first domino in the chain reaction that leads to the shuttle’s destruction.\
      \ Its collapse is reported by Data, and its failure is the direct cause of the\
      \ reactor core’s instability. The containment field’s breakdown is a metaphor\
