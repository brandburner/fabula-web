  key_dialogue:
  - |-
    BRIAM: What is the meaning of this?
    PAR LENOR: Ah, I see you got our message...
    BRIAM: If this is some sort of bribe, I am not amused.
  - |-
    QOL: We must have the metamorph. She is the answer to a Ferengi prayer.
    PAR LENOR: A ship is waiting to rendezvous with us in three hours... we can all transport off together.
  - |-
    BRIAM: Thank you for that information. I will pass it along to Captain Picard.
    PAR LENOR: You can't do that...
  - |-
    BRIAM: Let go of me...
    QOL: No, wait... let us discuss...
