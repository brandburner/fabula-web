    internal_dynamics: The event reveals a fracture in the Ferengi’s usual unity—Par
      Lenor’s initial calm gives way to desperation, while Qol’s aggression suggests
      a lack of coordination. Their internal tensions become apparent as their plan
      unravels.
    global_id: ger_organization_7cfb7e1a1afe
