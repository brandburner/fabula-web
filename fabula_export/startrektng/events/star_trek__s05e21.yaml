  key_dialogue:
  - 'BRIAM: Not as property... as a gift... I was concerned that you would not entirely
    understand...'
  - 'PICARD: There is a provision within the Federation Constitution that protects
    an individual''s fundamental rights... once you were brought aboard this starship...'
  - 'KAMALA: You''re angry. Why?'
  - 'KAMALA: I am a gift to Alrik of Valt. I am an empathic metamorph. The first female
    metamorph born on my world for over a hundred years. With the ability to sense
    what a potential mate wants... what he needs... what gives him the greatest pleasure...
    and then to become that for him.'
  - 'PICARD: You do this of your own accord?'
  - 'KAMALA: It is my sole purpose in life.'
