events:
- fabula_uuid: cand_evt_scene_323392b88d8a4099_01
  global_id: null
  title: Picard logs fragile peace mission
  description: The *Enterprise* departs Krios orbit, marking the official commencement
    of the peace mission between Krios and Valt Minor. Picard records a log entry
    that underscores the historic significance of the Ceremony of Reconciliation,
    framing it as a potential end to centuries of conflict. Beneath the diplomatic
    formality, his voice carries the weight of unspoken tension—his growing, ethically
    fraught attachment to Kamala lingers as an undercurrent, complicating his role
    as an impartial mediator. The log entry serves as both a mission statement and
    a personal reckoning, setting the stage for the collision of political duty and
    personal conflict that will define the journey ahead. The departure from Krios
    symbolizes the threshold between preparation and execution, where Picard’s disciplined
    leadership will be tested by forces beyond diplomacy.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e21
  scene_sequence: 1
  sequence_in_scene: 1
  key_dialogue: &id001
  - 'PICARD (V.O.): "Captain''s log, stardate 45761.3. In an effort to bring an end
    to their centuries-long war, Krios and Valt Minor have agreed to a Ceremony of
    Reconciliation, to be held aboard the *Enterprise* at a point mid-way between
    their two systems."'
  is_flashback: false
  location_uuid: ger_location_fd10d3cc4d83
  theme_uuids: []
  arc_uuids:
