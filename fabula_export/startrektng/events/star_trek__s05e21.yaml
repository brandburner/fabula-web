  title: Briam probes Picard’s emotional control
  description: |2-

      In the transporter room, Briam—still recovering from his injury—confronts Picard with a probing question about Kamala’s allure. After expressing gratitude for Picard’s diplomatic efforts, Briam reveals his own vulnerability to Kamala’s influence, despite his advanced age. He then directly challenges Picard, asking how the captain resisted her during their close collaboration. Picard’s evasive response—cutting the conversation short with a formal farewell—only deepens Briam’s suspicion. The exchange exposes Picard’s emotional fragility and the growing tension between his duty and his forbidden attraction to Kamala. Briam’s departure leaves the unspoken question hanging: how much longer can Picard maintain his composure?
