  global_id: null
  title: Kamala forces Picard into temporary leadership
  description: "\n  In sickbay, Picard learns from Beverly that Ambassador Briam remains\
    \ unconscious and may not recover for days, forcing a postponement of the critical\
    \ peace conference. Kamala immediately intervenes, revealing that her biological\
    \ bonding window—essential for the treaty’s success—will close within two days.\
    \ She insists the ceremony cannot wait, overriding Picard’s objections about his\
    \ lack of familiarity with Kriosian or Valtese customs. Her urgency stems from\
    \ both the treaty’s fragility and her own unspoken resistance to bonding with\
    \ Alrik, whom she perceives as emotionally distant. Picard’s reluctance isn’t\
    \ just about protocol; it’s a moment of raw tension where his growing personal\
    \ conflict with Kamala surfaces. She counters by offering to guide him through\
    \ Valtese rituals, effectively trapping him in a partnership that will force him\
    \ to confront his feelings while navigating the mission’s collapsing timeline.\
    \ The exchange marks a turning point where duty and desire collide, with Kamala’s\
    \ demand exposing the mission’s vulnerability to her own emotional stakes.\n  "
