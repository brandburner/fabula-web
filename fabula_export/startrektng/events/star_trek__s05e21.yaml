  title: Kamala’s engineered purpose exposed
  description: "\n  In the *Enterprise*’s cargo bay, Kamala’s premature awakening\
    \ from stasis—triggered by Qol’s sabotage—reveals her as a genetically engineered\
    \ empathic metamorph, designed to seal a peace treaty through a politically arranged\
    \ marriage to Alrik of Valt Minor. Picard and Riker react with moral outrage as\
    \ Briam explains her role as a ‘gift’ to secure the alliance, framing her as a\
    \ sentient being treated as property. Kamala, serene yet probing, demonstrates\
    \ her empathic abilities by intuitively sensing Picard’s authority and Riker’s\
    \ repressed attraction, creating charged, sexually tense moments. Picard, visibly\
    \ disturbed, terminates the discussion abruptly, ordering her removal to quarters.\
    \ The scene crystallizes the ethical conflict at the treaty’s core—exploiting\
    \ Kamala’s autonomy for political ends—while deepening Picard’s internal struggle\
    \ between duty and his growing, forbidden attraction to her. The revelation also\
    \ escalates the tension between Federation principles and Kriosian customs, setting\
    \ up future confrontations over Kamala’s agency and the treaty’s moral validity.\n\
    \  "
