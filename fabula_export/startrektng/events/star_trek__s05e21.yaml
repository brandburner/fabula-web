- fabula_uuid: act_e70b81db6c829a43
  number: 5
  summary: On the morning of the ceremony, Picard confides in Dr. Crusher, revealing
    his deep emotional conflict and his profound feelings for Kamala, acknowledging
    his hope that she would not leave. Kamala, preparing for the ceremony in a stunning
    gown, confirms to Picard that she has permanently bonded with him, meaning her
    current personality, shaped by their time together, is now her true self. Despite
    this revelation and Picard's implied desire for her to stay, Kamala, demonstrating
    a powerful sense of duty learned from Picard, resolves to proceed with the arranged
    marriage to ensure peace. She reassures Picard that Alrik will never know her
    true feelings and that she will still fulfill her role. Picard, after a moment
    of intense internal struggle and a fantasy of intervening, ultimately allows the
    ceremony to proceed, prioritizing the greater good of peace over his personal
    desires. The act concludes with Picard returning to his solitary quarters, reflecting
    on the profound impact Kamala has had on him and the quiet sacrifice he has made,
    forever changed by the encounter.
