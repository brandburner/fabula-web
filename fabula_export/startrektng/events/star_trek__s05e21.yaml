- fabula_uuid: act_ee09443252d2297b
  number: 3
  summary: To manage Kamala's disruptive pheromonal effect on the crew, Picard assigns
    Data as her chaperone, believing his lack of emotions will render him immune.
    Kamala's visit to Ten Forward quickly proves the challenge, as her presence incites
    a chaotic reaction from the male crew and miners, forcing Worf to intervene. Later,
    Kamala engages Picard in a more intimate conversation in his ready room, demonstrating
    her ability to adapt to his intellectual and disciplined nature. She reveals her
    deep understanding of his interests, from Ventanan archaeology to Shakespeare,
    and challenges his emotional walls, sensing his underlying passion. This interaction
    intensifies the unspoken connection between them. Concurrently, the Ferengi, still
    confined, attempt to bribe Ambassador Briam to acquire Kamala. Briam's refusal
    leads to a violent struggle, resulting in his severe injury, which effectively
    removes him from the negotiations and forces Picard into an even more central,
    and personally compromising, role.
