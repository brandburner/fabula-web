  title: Picard challenges Briam over Kamala’s confinement
  description: In the holodeck’s ceremonial chamber, Picard confronts Ambassador Briam
    during a Kriosian ritual, where Briam is practicing a percussive instrument with
    rigid precision. When Picard insists Kamala should be allowed freedom of movement,
    Briam reacts with alarm, invoking her empathic pheromones as a threat to the crew’s
    stability. Picard counters that not every man is susceptible—hinting at his own
    potential immunity—and asserts his authority as captain, escalating their ideological
    clash. The exchange reveals Briam’s authoritarian control over Kamala and Picard’s
    growing personal investment in her autonomy, while foreshadowing his internal
    conflict between duty and desire. The tension underscores the fragility of the
    peace negotiations and the moral dilemma of treating Kamala as either a diplomatic
    asset or a sentient being with rights.
