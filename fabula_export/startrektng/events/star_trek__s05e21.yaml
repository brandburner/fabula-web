- fabula_uuid: cand_evt_scene_1e6d379183712459_01
  global_id: null
  title: Ferengi mock Starfleet hospitality
  description: 'Qol and Par Lenor, the Ferengi diplomats, inspect their assigned quarters
    aboard the *Enterprise* with thinly veiled disdain, immediately establishing their
    cultural superiority and reluctance to engage with Starfleet protocols. Their
    grudging acceptance of the accommodations—despite their obvious discomfort—sets
    the stage for a tense, transactional dynamic. The scene pivots when Par Lenor
    extends a dinner invitation to Captain Picard, only for Worf to decline on his
    behalf, reinforcing Picard’s deliberate emotional distance and the Ferengi’s perception
    of him as an aloof, unapproachable figure. The Ferengi’s subsequent private exchange—laughing
    that their plan is ''too easy''—confirms their hidden agenda, deepening the narrative’s
    conspiracy layer and foreshadowing their manipulation of events beyond the surface-level
    negotiations. This exchange underscores the diplomatic friction and the unspoken
    power struggle between the Ferengi and Starfleet, while also highlighting Picard’s
    internal conflict: his professional detachment clashing with his personal vulnerabilities,
    particularly his growing feelings for Kamala. The scene serves as both a setup
    for the Ferengi’s ulterior motives and a reinforcement of Picard’s emotional isolation,
    which will later be challenged by Kamala’s presence.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e21
  scene_sequence: 9
  sequence_in_scene: 11
  key_dialogue:
  - 'QOL: Quite acceptable. Not what we''re used to, you understand... but it will
    do.'
  - 'PAR LENOR: Perhaps your captain would care to invite us to join him for dinner
    this evening...'
  - 'WORF: The captain dines alone.'
  - 'QOL: A pity.'
  - 'QOL: That was too easy!'
