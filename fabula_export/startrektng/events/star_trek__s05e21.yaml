- fabula_uuid: cand_evt_scene_e4b1e8000727e200_01
  global_id: null
  title: Ferengi bribe Briam for Kamala
  description: "\n  In the Ferengi quarters, Par Lenor and Qol attempt to bribe Ambassador\
    \ Briam with Ludugial gold—first offering five coins as a sample, then escalating\
    \ to twenty thousand ingots—for Kamala’s acquisition. Their language is calculated:\
    \ they flatter Briam’s perceived financial hardship, frame Kamala as a ‘Ferengi\
    \ prayer’ (a ritualistic commodity), and promise him safe passage off the ship\
    \ post-exchange. Briam’s initial outrage (‘I am insulted’) masks his vulnerability;\
    \ his refusal is performative, rooted in wounded pride rather than moral conviction.\
    \ The Ferengi’s escalation—twenty thousand ingots, a ship waiting—reveals their\
    \ desperation and the scale of their scheme. When Briam threatens to report them\
    \ to Picard, Qol lunges, and the ensuing struggle ends with Briam’s violent fall,\
    \ leaving him unconscious. The scene exposes the Ferengi’s opportunism, Briam’s\
    \ fragility, and the precariousness of the treaty negotiations, as their actions\
    \ risk unraveling the fragile political balance. The fade-out on Briam’s injury\
    \ underscores the escalating chaos Kamala’s presence has unleashed.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e21
  scene_sequence: 28
  sequence_in_scene: 39
  key_dialogue:
  - 'PAR LENOR: This is just a sample... The bribe is ten thousand more. Ludugial
    gold, the purest in the galaxy...'
  - 'QOL: We know the lifestyle of a Kriosian Ambassador is barely comfortable...
    You deserve to live a life of luxury...'
  - 'BRIAM: I am insulted. How dare you suggest...'
  - 'PAR LENOR: Twenty thousand, but not an ingot more. We must have the metamorph.
    She is the answer to a Ferengi prayer.'
  - 'QOL: A ship is waiting to rendezvous with us in three hours... we can all transport
    off together...'
  - 'BRIAM: Thank you for that information. I will pass it along to Captain Picard.'
  - 'PAR LENOR: You can''t do that...'
