    emotional_state: 'Focused intensity with a edge of adrenaline—The Transporter
      Officer is in the zone, his entire being concentrated on the task at hand. The
      explosion is a gut punch, but his training kicks in: he knows there’s nothing
      more he can do, and his silence speaks volumes. There’s a quiet anger there,
      too—the frustration of a professional who was *this close* to success.'
    goals:
    - Lock onto the Ferengi traders with the transporter and beam them to safety before
      the shuttle’s reactor detonates.
    - Maintain clear, real-time communication with the bridge to ensure the rescue
      attempt is coordinated and efficient.
    what_happened: The Transporter Officer’s voice crackles over the com system, professional
      and ready as he acknowledges Riker’s order to boost output and lock onto the
      Ferengi. His response is concise—'Standing by.'—but the tension in his voice
      is palpable, even through the static. He is a faceless but critical part of
      the rescue effort, his fingers likely flying over the transporter controls as
      he attempts to lock onto the distressed traders. When the shuttle explodes,
      his voice is cut off abruptly, leaving the bridge crew to assume he, too, is
      processing the sudden loss. His role is that of the unseen technician, whose
      skills could have made the difference—if only there had been time.
