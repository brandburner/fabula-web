  - location_uuid: ger_location_28246cb1dc8c
    description_of_involvement: "\n        The Ferengi shuttle is the battleground\
      \ where the crisis plays out, its drifting form a symbol of vulnerability and\
      \ impending doom. The location is a stark contrast to the *Enterprise* bridge—whereas\
      \ the bridge is a hub of activity and coordination, the shuttle is a silent\
