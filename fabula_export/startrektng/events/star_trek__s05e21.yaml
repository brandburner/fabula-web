- fabula_uuid: cand_evt_scene_4b1679af36ecc539_01
  global_id: null
  title: Briam reveals the fragile Valtese gift
  description: "\n  In the Ready Room, Ambassador Briam presses Captain Picard for\
    \ restricted access to the Enterprise’s cargo bay, framing the request as a matter\
    \ of diplomatic urgency. He reveals the cargo is a fragile, irreplaceable 'gift'\
