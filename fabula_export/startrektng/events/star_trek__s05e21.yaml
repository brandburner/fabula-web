acts:
- fabula_uuid: act_a779373e61c5a23d
  number: 1
  summary: 'This act establishes the premise of a critical peace treaty between Krios
    and Valt Minor, which the Enterprise is facilitating. Ambassador Briam introduces
    the mysterious "gift" cargo, emphasizing its fragility and irreplaceability, and
    requests strict security. The narrative then introduces an unexpected complication:
    a distress call from a Ferengi shuttle. While rescuing the Ferengi, one of them,
    Qol, attempts to steal the cargo, causing an accident that prematurely releases
    Kamala from her stasis pod. Her emergence is visually striking, and she immediately
    addresses Captain Picard, mistaking him for her intended mate, Alrik of Valt.
    This moment serves as the inciting incident, setting up the central conflict and
    Picard''s personal dilemma, as he is now unexpectedly entangled with the "gift"
    meant to secure peace.'
