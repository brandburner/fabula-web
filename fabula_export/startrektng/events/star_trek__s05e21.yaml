    metamorph.'
  - 'PICARD: Kamala? Yes. She is looking forward to meeting you.'
  - 'ALRIK: ((not very interested)) I''m sure she''ll be satisfactory. Between you
    and me, Captain, I''m far more interested in the trade agreements.'
