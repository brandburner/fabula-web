- fabula_uuid: cand_evt_scene_a42ac7f3f8f59ad6_02
  global_id: null
  title: Ferengi ship explodes during rescue attempt
  description: "\n  The *Enterprise* emerges from warp to find the Ferengi shuttle\
    \ adrift with a failing containment field and unstable reactor core. Picard, Riker,\
    \ Worf, and Data monitor the crisis on the bridge as Data confirms two Ferengi\
    \ aboard. Riker orders an emergency long-range transport, but before the crew\
    \ can act, a small explosion aboard the shuttle triggers a catastrophic chain\
    \ reaction. Picard barks the order to energize the transporter, but the ship detonates\
    \ violently before the Ferengi can be saved. The explosion obliterates the shuttle\
    \ and its occupants, leaving the *Enterprise* crew stunned. The sudden loss of\
    \ the Ferengi—who were previously a disruptive but manageable complication—now\
    \ eliminates a critical diplomatic asset in the midst of fragile peace talks.\
    \ The event forces Picard to confront the brutal, irreversible consequences of\
    \ his decisions, while the shockwave of the explosion reverberates through the\
    \ ship’s crew, heightening the tension of the ongoing crisis. The destruction\
    \ also removes a potential wildcard from the negotiations, but at a cost that\
    \ underscores the fragility of life and the stakes of Picard’s mission.\n  "
