    scene underscores his internal conflict: as a Starfleet officer, he must suppress
    his attraction to Kamala, but her empathic influence has fractured his usual discipline.
    His hasty departure isn’t just physical—it’s a symbolic withdrawal from the emotional
    chaos she represents, foreshadowing the tension between duty and desire that will
    complicate Picard’s mission. The holodeck becomes his refuge, a controlled environment
    where he can process his vulnerability without further compromising his role as
    first officer.'
