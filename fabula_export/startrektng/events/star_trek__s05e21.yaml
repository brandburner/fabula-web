- fabula_uuid: cand_evt_scene_e4b1e8000727e200_02
  global_id: null
  title: Briam’s violent confrontation with Ferengi
  description: Ambassador Briam storms into the Ferengi quarters after receiving their
    bribe offer, only to be met with escalating threats and a physical altercation.
    The Ferengi, Par Lenor and Qol, attempt to coerce Briam into handing over Kamala
    by offering ludicrous sums of Ludugial gold, framing the exchange as a 'Ferengi
    prayer'—a thinly veiled attempt to exploit the political crisis for profit. Briam,
    outraged by their audacity, refuses and threatens to expose their scheme to Picard.
    The tension erupts into violence when Qol grabs Briam, leading to a struggle that
    ends with Briam striking his head on a table and collapsing unconscious. The guard’s
    phaser is drawn in response, abruptly cutting off the confrontation and leaving
    Briam’s fate uncertain. This moment disrupts the fragile political balance, removes
    Briam as a direct negotiator, and forces Picard to step into a more central role—one
    that will inevitably clash with his growing personal conflict over Kamala. The
    scene underscores the Ferengi’s opportunism, Briam’s moral integrity (or stubbornness),
    and the escalating stakes of the treaty negotiations, all while setting up Picard’s
    inevitable confrontation with Kamala’s bonding deadline.
