      \ His dialogue reveals frustration with Kamala’s engineered fate, his own helplessness,\
      \ and a forbidden desire to protect her. Physically, he stands, then sits again,\
      \ his body language tense yet seeking solace. His final admission ('I don’t\
      \ like it') is delivered with quiet intensity, betraying his struggle between\
      \ duty and personal feeling.\n      "
