  title: Ferengi exploit Enterprise hospitality
  description: "\n  Worf escorts the Ferengi merchants Qol and Par Lenor through the\
    \ *Enterprise* corridors, informing them they must remain aboard until the mission\
    \ concludes due to lack of transport. Their immediate, unprompted satisfaction—'That\
    \ will not be a problem'—reveals their opportunistic intent to exploit the ship's\
    \ amenities. Their smug tone ('We look forward to enjoying the comforts of your\
    \ fine ship') underscores their cultural disdain for Starfleet protocols and their\
    \ belief that the *Enterprise*'s resources are theirs for the taking. This exchange\
    \ foreshadows their disruptive presence during Picard's delicate diplomatic negotiations,\
    \ where their self-serving behavior could further strain the crew's focus and\
    \ resources. The scene establishes the Ferengi as a persistent, low-level threat\
    \ to the mission's stability, their greed a counterpoint to the high-stakes emotional\
    \ and political conflicts unfolding around Kamala and the peace treaty.\n  "
