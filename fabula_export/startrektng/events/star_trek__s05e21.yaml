  title: Riker’s Pheromone-Fueled Retreat
  description: After Kamala initiates a provocative kiss in her quarters, Riker’s
    professional restraint unravels under the influence of her empathic pheromones.
    His initial attempt to orient her to the space—delivered with stiff, bureaucratic
    precision—collapses when she closes the distance, testing his resolve. The kiss
    escalates into a charged exchange where Kamala’s calculated seduction (a mix of
    vulnerability and strategic defiance) clashes with Riker’s ironclad Starfleet
    discipline. His verbal resistance—‘I’ve made it a policy never to open another
    man’s gift’—is undermined by his physical reaction and the irony in his tone,
    signaling his internal fracture. The scene ends with Riker’s abrupt exit, a physical
    manifestation of his emotional retreat, foreshadowing his later holodeck refuge
    and the escalating tension between duty and desire that will complicate Picard’s
    mission. Kamala’s line about ‘the second time being better’ hints at her growing
    agency and the destabilizing effect she’ll have on the crew’s composure.
