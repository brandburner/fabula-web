  title: Worf silences miners protecting Kamala
  description: 'In Ten Forward, Kamala’s pheromonal influence triggers aggressive
    advances from the miners, who crowd around her despite Data’s attempts to shield
    her. When the miners escalate—mocking Data and pressuring Kamala to abandon him—Worf
    intervenes with a single command, his Klingon authority instantly silencing the
    room. The miners retreat, but Kamala’s reaction to Worf’s presence is unexpected:
    she hisses a Klingon growl at him, startling him into a rare moment of unguarded
    delight. Data seizes the opportunity to escort her out, but the incident underscores
    her destabilizing effect on the crew and the fragility of the mission’s diplomatic
    balance. Worf’s intervention highlights his protective instincts, while Kamala’s
    unorthodox response foreshadows her later attempts to manipulate or connect with
    the crew in ways that defy her intended role as a passive ‘gift.’'
