    description_of_involvement: |2-

              Kamala’s sarcophagus is the physical and symbolic heart of the event. Constructed from a 'solid' energy casing, it is designed to preserve her in stasis until the Finiis'ral ceremony. Qol’s clumsy attempt to steal it—using his Ferengi tricorder to scan and destabilize the energy field—triggers its catastrophic failure. The sarcophagus falls, cracks open, and dissolves, revealing Kamala in her cocoon-like structure. The sarcophagus’s role is dual: it is both a container for Kamala’s physical form and a metaphor for the fragile peace treaty it represents. Its destruction is a literal and symbolic rupture, exposing the ethical contradictions at the heart of the diplomatic mission.
    status_before_event: |2-

              The sarcophagus is intact, suspended in the zero-gravity field. It is a sleek, elevated stasis container, its energy casing humming with latent power. Kamala is in suspended animation, her form protected and unseen. The sarcophagus is treated with reverence by Briam and the Kriosian delegation, its contents a sacred diplomatic asset.
    status_after_event: |2-

              The sarcophagus is irreparably damaged. Its energy casing dissolves, and the cocoon-like structure beneath it disintegrates, revealing Kamala. The sarcophagus’s failure is irreversible, and its contents—Kamala—are now exposed to the cargo bay’s environment and the moral scrutiny of the Federation officers. The sarcophagus’s destruction is a turning point, as it forces a confrontation with Kamala’s agency and the ethical implications of her role as a 'gift.'
    global_id: ger_object_f55ae28a9b18
  - object_uuid: ger_object_5f4379f459db
    description_of_involvement: |2-

              The zero-gravity field surrounding Kamala’s sarcophagus is the first casualty of Qol’s sabotage. As he stumbles on the makeshift ladder, the crates he is standing on collide with the sarcophagus, destabilizing the energy field. The field crackles and shorts out, dissolving the protective casing and triggering the premature activation of the stasis chamber. The field’s failure is both a technical and narrative catalyst: it exposes Kamala to the cargo bay’s atmosphere and disrupts the diplomatic mission. The field’s shimmering light, once a symbol of her protected status, becomes a metaphor for the fragility of the peace treaty it was meant to secure.
    status_before_event: |2-

              The zero-gravity field is fully operational, maintaining a stable stasis environment around Kamala’s sarcophagus. It is a shimmering, ethereal barrier, symbolizing her protected and sacred status as a 'gift.' The field is under the supervision of Starfleet protocols, ensuring her safe transport to Valt Minor.
    status_after_event: |2-

              The zero-gravity field is completely destabilized, its energy dissipated. The sarcophagus’s casing dissolves, and Kamala emerges from stasis. The field’s failure marks the irrevocable disruption of the diplomatic mission, as Kamala’s premature awakening forces a confrontation with the ethical implications of her treatment.
    global_id: ger_object_5f4379f459db
  - object_uuid: ger_object_4f3ec8555025
    description_of_involvement: |2-

              Qol’s Ferengi tricorder is the direct cause of the sarcophagus’s destabilization. He uses it to scan the energy field, attempting to assess its security and value. However, his clumsy handling of the device—combined with his physical disruption of the crates—triggers a cascade failure in the stasis system. The tricorder’s readings destabilize the energy field, dissolving the sarcophagus’s casing and prematurely activating Kamala’s awakening. The tricorder is a tool of greed, its use a metaphor for the disruptive forces of opportunism and moral compromise. Its role in the event is purely catalytic, but its consequences are profound, as it exposes the fragility of the diplomatic mission.
    status_before_event: |2-

              The Ferengi tricorder is fully functional, tucked into Qol’s belt. It is a compact, Ferengi-engineered device, designed for scanning and assessing the value of goods. Qol intends to use it to evaluate Kamala’s sarcophagus and determine its transportability. The tricorder is a symbol of Ferengi cunning and opportunism, its presence in the cargo bay a violation of Starfleet protocols.
    status_after_event: |2-

              The Ferengi tricorder is confiscated by Worf as Qol is detained. Its role in the event is complete: it has served as the catalyst for the sarcophagus’s failure. The tricorder’s scans are irrelevant now, as the damage is done. It is removed from the cargo bay, along with Qol, and becomes a relic of the failed sabotage attempt.
    global_id: ger_object_4f3ec8555025
  - object_uuid: ger_object_72c1918cfbb1
    description_of_involvement: |2-

              Qol’s makeshift ladder is a flimsy, improvised structure constructed from cargo bay materials. It is his means of accessing Kamala’s sarcophagus, allowing him to climb and position himself for his sabotage attempt. However, the ladder’s instability is its undoing: as Worf confronts Qol, the support wobbles and collapses, sending Qol tumbling. The ladder’s failure is the immediate cause of the crates’ displacement, which in turn destabilizes the sarcophagus. The ladder is a symbol of Qol’s desperation and poor planning, its collapse a metaphor for the self-defeating nature of his greed. Its role in the event is purely mechanical, but its failure sets off the chain reaction that disrupts the diplomatic mission.
    status_before_event: |2-

              The makeshift ladder is assembled from crates and cargo bay debris, propped against the sarcophagus. It is unstable but functional, allowing Qol to reach the height needed to scan the energy field. The ladder is a testament to Qol’s improvisational skills, but it is also a sign of his recklessness. Starfleet security protocols would have prevented such a structure from being left unattended in the cargo bay.
    status_after_event: |2-

              The makeshift ladder collapses under Qol’s weight, scattering debris across the cargo bay floor. Its destruction is immediate and total, leaving no trace of its existence beyond the chaos it has wrought. The ladder’s failure is a literal and symbolic end to Qol’s sabotage attempt, as it triggers the events that lead to Kamala’s awakening and the unraveling of the diplomatic mission.
