  title: Picard hesitates at Kamala’s door
  description: "\n  Picard arrives at Kamala’s quarters, his hand hovering over the\
    \ chime as he hesitates—a moment of visible conflict between duty and desire.\
    \ The pause reveals his internal struggle: as a Starfleet officer sworn to uphold\
    \ the peace treaty, he must maintain professional distance, yet his growing emotional\
    \ attachment to Kamala threatens his self-control. The door opens before he can\
    \ act, and his reaction—lingering in the threshold, eyes widening—suggests he\
    \ is unprepared for what awaits inside. This beat underscores the fragility of\
    \ his resolve and the high stakes of his emotional entanglement, where personal\
    \ desire could destabilize the fragile alliance he is tasked to broker. The moment\
    \ is charged with unspoken tension, a silent acknowledgment of the line he is\
    \ about to cross.\n  "
