  description: "\n  The bridge crew watches in silence as Boraal Two’s atmosphere\
    \ dissipates, its surface turning from lush green to barren rock in real time.\
    \ Nikolai, visibly shaken by the planet’s destruction, abruptly leaves after a\
    \ tense exchange with Picard, who retreats to his ready room. The crew’s grief\
    \ is palpable—Beverly looks away, Riker’s jaw tightens, and even Data’s expression\
    \ remains unreadable. As the Enterprise prepares to depart, a science station\
    \ malfunctions due to an unexplained power drain from Deck Ten. Worf, monitoring\
    \ security logs, identifies the source and is ordered by Riker to investigate.\
    \ His departure marks the first step in a chain of events that will force him\
    \ to confront his brother’s Prime Directive violation and his own divided loyalties.\
    \ The anomaly foreshadows the Holodeck’s role in Nikolai’s intervention, setting\
    \ up Worf’s impending moral crisis.\n  "
