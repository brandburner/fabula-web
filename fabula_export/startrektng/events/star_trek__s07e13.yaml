  global_id: null
  title: Vorin’s breakdown in Ten Forward
  description: Vorin, disoriented and terrified by the unfamiliar surroundings of
    the *Enterprise*, stumbles into *Ten Forward* in a state of extreme distress.
    The sterile, high-tech environment—crowded with Federation civilians—triggers
    a panic attack, leaving him trembling and unable to process his surroundings.
    Riker intervenes to disperse the gathering crowd, while Troi, recognizing Vorin’s
    vulnerability, approaches him with deliberate calm. She anchors him by invoking
    Nikolai and Worf, the only names he recognizes, which momentarily stabilizes him.
    His plea—*‘Where am I?’*—reveals the depth of his disorientation and the urgency
    of his situation, while his physical collapse underscores the psychological toll
    of his forced removal from Boraal Two. The scene establishes Vorin as a fragile,
    traumatized figure whose presence forces the *Enterprise* crew to confront the
    ethical and emotional consequences of Nikolai’s actions.
