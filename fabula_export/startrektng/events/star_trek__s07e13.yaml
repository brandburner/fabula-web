  global_id: null
  title: Worf confronts Nikolai over Prime Directive breach
  description: "\n  Worf and Nikolai enter a cavern shelter where the Boraalans have\
    \ taken refuge, revealing Nikolai’s violation of the Prime Directive by using\
    \ Federation technology to protect them. Worf immediately pulls Nikolai aside,\
    \ expressing moral outrage over the ethical transgression and demanding an explanation.\
    \ Nikolai admits to setting up a deflector shield to shield the caves from radiation\
    \ and posing as a Boraalan to gain their trust. Despite Worf’s anger, Nikolai’s\
    \ heartfelt relief at seeing his brother softens the tension temporarily. Worf\
    \ insists the Boraalans’ deaths are inevitable, but Nikolai insists on speaking\
    \ with Captain Picard, forcing Worf to reluctantly agree to broker the meeting.\
    \ The confrontation ends with Nikolai publicly claiming Worf’s ability to predict\
    \ storms, elevating Worf’s status among the Boraalans as a revered 'Seer'—a role\
    \ that deepens his internal conflict between duty and loyalty. The exchange underscores\
    \ the urgency of the crisis while exposing the fractured relationship between\
    \ the brothers, setting up Worf’s eventual moral reckoning with Starfleet’s principles.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e13
  scene_sequence: 4
  sequence_in_scene: 7
  key_dialogue:
  - 'WORF: Nikolai, what have you done?'
  - 'NIKOLAI: They were dying. I refused to sit there... safe in that observation
    post... and watch it happen. I set up a deflector shield to screen these caves
    from the radiation and then I brought them here.'
  - 'WORF: There is nothing we can do for these people. You have only postponed their
    deaths.'
  - 'NIKOLAI: I''d like to discuss that with your Captain.'
  - 'WORF: I am certain he will want to speak with you.'
  - 'NIKOLAI: My brother is a seer. He understands the nature of the storms. He''ll
    know when it''s safe to travel.'
  - 'WORF: ((reluctantly)) That is correct.'
