    NIKOLAI: I'd recognize that voice anywhere. Is it really you, Worf?
    WORF: Nikolai... ?
    NIKOLAI: You've changed a lot in four years...
  - 'NIKOLAI: This is my brother, Worf... He''s come to help us.'
