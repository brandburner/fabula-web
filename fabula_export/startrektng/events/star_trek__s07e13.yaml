  key_dialogue: &id001
  - 'PICARD: Mister Data, analysis.'
  - 'DATA: It appears the planet''s atmosphere is dissipating, sir. Intense plasmonic
    reactions are destroying it. The stratosphere is already breaking down, and there
    are turbulent radiation storms across much of the surface. I estimate the planet
    will be uninhabitable in less than thirty-eight hours.'
  - 'RIKER: The distress call was only four days ago. Why would Doctor Rozhenko have
    waited so long before sending it?'
  - 'WORF: Sir, I am detecting faint power emissions from a system of caverns near
    the post. It could be a deflector shield.'
  - 'RIKER: It can''t be native to the planet. The Boraalans don''t have anything
    close to that level of technology.'
  - 'PICARD: Very well. But regardless of this planet''s immediate situation, we must
    still observe the Prime Directive. I''d like to minimize the risk of contact with
    the inhabitants. You''re to go alone, Mister Worf—and I want you surgically altered
    to pass as a Boraalan.'
