  key_dialogue:
  - 'NIKOLAI: I told you — you''ll have to kill me to get me away from here.'
  - 'WORF: I don''t want to fight you, Nikolai.'
  - 'NIKOLAI: Nothing was ever easy between us, was it?'
  - 'WORF: No.'
  - 'NIKOLAI: It''s my fault. If I''d been more like you, we wouldn''t have had so
    many problems.'
  - 'WORF: If you''d been more like me — those people would not be here now. You gave
    them a chance at a new life.'
  - 'NIKOLAI: Worf... I intend to share that life with them. The village will need
    someone to begin a new chronicle... and my child will need a father. My place
    is here.'
  - 'WORF: I will attempt to explain all this to mother and father.'
  - 'NIKOLAI: They won''t understand.'
  - 'WORF: They may. I will tell them... you are happy.'
