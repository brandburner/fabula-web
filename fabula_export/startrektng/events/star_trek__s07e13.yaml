- fabula_uuid: act_cbd9dfe8d46c3d26
  number: 2
  summary: 'Following Nikolai''s audacious act of transporting the Boraalans, Worf
    confronts his brother in a ship corridor, seething with anger and accusing him
    of insubordination and disgrace. Nikolai, however, remains unrepentant, asserting
    his conviction that saving lives outweighs the “abstraction” of Federation dogma
    and duty, intensifying the long-standing animosity between the siblings. Worf,
    unable to reconcile Nikolai''s reckless behavior with his own rigid adherence
    to Starfleet principles, declares he wants nothing more to do with him. Meanwhile,
    Captain Picard, though furious at Nikolai''s blatant defiance and the impossible
    situation he has created, realizes he has few viable options. Nikolai, ever resourceful,
    proposes a daring plan: find a suitable M-class planet and use the Holodeck to
    gradually transition the Boraalans'' perception of their environment, subtly altering
    the simulation to match their new home before beaming them down. Picard, despite
    his deep skepticism and ethical qualms, reluctantly agrees to this ethically fraught
    scheme. The plan immediately faces a severe setback when Geordi La Forge discovers
    that plasmonic energy surges from the destroyed Boraal Two have critically destabilized
    the Holodeck''s imaging processor, meaning the simulation could collapse at any
    moment. This revelation introduces a ticking clock and immense pressure. Distrusting
    Nikolai to manage the situation alone, Picard orders a reluctant Worf to accompany
    his brother to the Holodeck, tasking him with maintaining order and preventing
    further complications, a directive that exacerbates Worf''s internal conflict
    and resentment towards Nikolai. This act escalates the narrative tension, highlighting
    the pragmatic compromises forced upon Starfleet by Nikolai''s actions and further
    deepening the complex, unresolved issues between the Rozhenko brothers.'
