- fabula_uuid: act_7e091951a692be90
  number: 4
  summary: 'Vorin, overwhelmed and terrified by the reality of the Enterprise, wanders
    into Ten Forward, causing panic among the crew. Riker and Troi intervene, attempting
    to calm him and understand his distress. In Sickbay, Beverly Crusher confirms
    she cannot erase Vorin''s memory due to his unique neural physiology, eliminating
    a potential quick fix. Captain Picard, facing the direct consequences of Nikolai''s
    actions, explains the devastating truth to Vorin: his planet is gone, he is on
    a starship, and his home was an illusion. Vorin is utterly devastated, struggling
    to reconcile his lost reality with the bewildering new one, feeling his culture
    and past are irrevocably destroyed. Picard offers him a new life on the Enterprise,
    but Vorin remains lost in despair. Meanwhile, on the rapidly degrading Holodeck,
    Worf informs Nikolai of Vorin''s escape, leading to an explosive argument where
    Worf vents years of pent-up resentment over Nikolai''s recklessness, the chaos
    he creates, and his disregard for consequences. Nikolai, in turn, accuses Worf
    of being too rigid and focused on duty. The Holodeck simulation visibly begins
    to break down, with parts of the environment shimmering and dissolving into gridlines,
    signaling imminent failure. Dobara, Nikolai''s Boraalan partner, approaches Worf,
    pleading for reconciliation between the brothers and revealing her pregnancy with
    Nikolai''s child, forcing Worf to confront the deeply personal and lasting stakes
    of his brother''s choices and his own potential role in this new, complicated
    family.'
