      \ the Ops console to analyze Boraal Two's atmospheric dissipation and project\
      \ the timeline for the planet's uninhabitability, while Worf scans the observation\
      \ post and caverns for life signs and energy emissions. These consoles provide\
      \ the crew with critical data, shaping their understanding of the crisis and\
      \ guiding their decisions. The flickering lights and occasional system glitches\
      \ caused by plasmonic bursts add a layer of tension, highlighting the consoles'\
      \ role in maintaining the ship's operations.\n      "
    status_before_event: Fully operational but experiencing intermittent flickering
      due to plasmonic bursts, with Data and Worf actively using them to gather data.
    status_after_event: Continuing to function despite the ship's instability, with
      Worf's scans confirming the anomalous energy readings.
