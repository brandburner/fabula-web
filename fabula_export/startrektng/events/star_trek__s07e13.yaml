- fabula_uuid: cand_evt_scene_9e942ca0fdd8c07c_01
  global_id: null
  title: Vorin learns the truth of Boraal's destruction
  description: "\n  In Sickbay, Vorin—still disoriented and traumatized—sits under\
    \ the watchful eye of a Security Guard while Troi remains close to offer emotional\
    \ support. Beverly and Picard confer privately, where Beverly delivers the critical\
    \ news: Vorin’s memory cannot be erased due to his unique neural physiology. This\
    \ forces Picard to confront the inevitable—Worf must be told about Nikolai’s violation\
    \ of the Prime Directive. The revelation escalates the ethical crisis, as Vorin’s\
    \ fragile state becomes a mirror for the moral conflict now consuming the Enterprise\
    \ crew.\n\n  Picard approaches Vorin, who is visibly shaken, and begins to explain\
    \ the truth: Boraal is gone, and the caves Vorin believed were his home were an\
    \ illusion created by the Enterprise’s holodeck. Each revelation strips away another\
    \ layer of Vorin’s reality, leaving him in despair. Vorin’s anguish—‘How can we\
    \ grow when everything that made us who we are... is gone?’—resonates with Picard’s\
    \ own internal conflict, as the weight of the Prime Directive’s violation presses\
    \ heavily on him. The scene underscores the irreversible consequences of Nikolai’s\
    \ actions and the emotional toll they exact on those left to grapple with the\
    \ aftermath. Picard’s attempt to offer hope—a new world for the Boraalans—only\
    \ deepens Vorin’s despair, revealing the futility of trying to rebuild a culture\
    \ stripped of its foundations.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e13
  scene_sequence: 19
  sequence_in_scene: 30
  key_dialogue:
  - 'BEVERLY: I''m sorry, there''s nothing I can do... his neural physiology is unusual.
    I can''t wipe his memory.'
  - 'PICARD: Vorin. Listen to me. We can travel to many worlds. We will take you to
    one where your people can build a new life...'
  - 'VORIN: How can we grow when everything that made us who we are... is gone?'
