    description_of_involvement: The *Enterprise*’s communications systems are the
      symbolic and functional bridge between Nikolai’s research and Starfleet’s compromise.
      Worf offers to assist Nikolai in setting up a com link to upload his data remotely,
      framing the systems as a tool for preserving Boraalan culture without violating
      the Prime Directive. However, Nikolai rejects the offer outright, treating the
      systems as complicit in Starfleet’s inaction. The systems thus become a metaphor
      for the institutional barriers that have driven the wedge between Nikolai and
      the *Enterprise*, as well as between the brothers.
