  title: Worf’s Reluctant Confession About Nikolai
  description: "\n  In Sickbay, Beverly attempts to scan Worf’s cranial anatomy for\
    \ his surgical disguise as a Boraalan, but his restlessness betrays his preoccupation\
    \ with his estranged brother Nikolai. Beverly, sensing his tension, probes gently\
    \ about their relationship, forcing Worf to confront his conflicted feelings.\
    \ He admits they are brothers but reveals their fundamental differences—Nikolai’s\
    \ rebellious nature, his expulsion from Starfleet, and his brilliance—while carefully\
    \ avoiding criticism. Beverly’s curiosity and Worf’s guarded responses expose\
    \ the depth of his emotional turmoil: his loyalty to Starfleet clashes with his\
    \ unresolved bond to Nikolai, whose Prime Directive violation now forces Worf\
    \ to choose between duty and family. The exchange subtly raises the stakes of\
    \ the mission, as Worf’s reluctance to open up underscores the personal cost of\
    \ the crisis unfolding on Boraal Two.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e13
  scene_sequence: 2
  sequence_in_scene: 4
  key_dialogue:
  - 'BEVERLY: You''re worried about Nikolai, aren''t you?'
  - 'WORF: ((reluctantly)) Yes.'
  - 'BEVERLY: Are the two of you close?'
  - 'WORF: We are... brothers.'
  - 'BEVERLY: You''ve never talked much about him. What''s he like?'
  - 'WORF: ((carefully)) Nikolai is older than I... and we are not -- alike. We had
    many disagreements as we were growing up.'
  - 'WORF: Nikolai... has a mind of his own. He attended Starfleet Academy - but he
    was unable to follow the rules. He left after one year. However, he has many fine
    qualities. He is... brilliant. Persuasive. A natural leader...'
  - 'BEVERLY: Sounds intriguing... I look forward to meeting him.'
