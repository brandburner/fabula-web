- fabula_uuid: act_1ac3575e40d586e9
  number: 5
  summary: As the Enterprise reaches Vacca Six, Geordi La Forge reports that the Holodeck
    is on the verge of total collapse, necessitating an immediate transport of the
    Boraalans. Captain Picard makes a final, empathetic appeal to Vorin, who, unable
    to reconcile the truth with his former reality or live with the burden of the
    secret, tragically chooses to take his own life. Picard reflects on Vorin's death,
    lamenting the inability to bridge cultural gaps and the high price of their intervention.
    On the Holodeck, Worf confronts Nikolai about Dobara's pregnancy, leading to a
    physical altercation as their long-simmering resentments boil over. The Holodeck
    visibly shatters, with the sky dissolving into gridlines, forcing Nikolai to quickly
    improvise. He tells the terrified Boraalans that the “storms have returned” and
    Worf has the power to end them. Worf, understanding the deception, instructs them
    to take shelter while Geordi creates a simulated storm of wind, lightning, and
    thunder to enhance the illusion. The Boraalans scramble into their tents amidst
    the chaos. Worf then orders “Energize,” and the Boraalans, Worf, and Nikolai are
    transported to the calm, peaceful surface of Vacca Six, believing Worf has miraculously
    ended the storm. In the aftermath, Worf and Nikolai finally reconcile. Nikolai
    expresses his unwavering commitment to Dobara and their child, affirming his desire
    to build a new life with the Boraalans and take responsibility. Worf, seeing Nikolai's
    resolve and happiness, accepts his brother's choice. Worf takes Vorin's chronicle
    scroll, promising to explain Nikolai's actions and happiness to their parents,
    finding a measure of absolution for his brother's transgressions. The Enterprise
    departs, leaving the Boraalans to their new home and uncertain future.
