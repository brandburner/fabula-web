  title: Worf discovers Vorin’s forbidden drawing
  description: 'Worf, already simmering with resentment after witnessing Nikolai and
    Dobara’s intimate bond, notices Vorin sketching a forbidden depiction of two male
    leaders guiding a people—a direct violation of Boraalan social codes. The drawing’s
    subversive nature forces Worf to shift his focus from his personal conflict with
    Nikolai to the ethical implications of the *Enterprise*’s interference. Vorin’s
    act of defiance, captured in the scroll’s intricate hieroglyphics, becomes a visual
