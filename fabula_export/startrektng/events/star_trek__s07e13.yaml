  global_id: null
  title: Vorin learns the truth of his world
  description: 'In Sickbay, Vorin—still disoriented and sedated—confronts the devastating
    truth about his existence: the Boraalan caves he believed were his home were a
    fabricated illusion, and his planet is now uninhabitable. Picard, compelled by
    ethical duty and the weight of the *Enterprise*''s actions, delivers the revelation
    with measured gravity, explaining that the crew created a simulated environment
    to spare the Boraalans from the reality of their dying world. Vorin’s emotional
    collapse—his anguish over the loss of his culture and identity—exposes the irreparable
    fracture between his people’s past and any possible future. Picard’s offer of
    resettlement on a new world feels hollow in the face of Vorin’s grief, underscoring
    the moral cost of the *Enterprise*''s intervention. The scene serves as a turning
    point, forcing Vorin to confront the fragility of his reality while deepening
    the narrative’s central tension: the ethical conflict between saving lives and
    preserving cultural integrity.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e13
  scene_sequence: 19
  sequence_in_scene: 31
  key_dialogue:
  - 'VORIN: Why did you bring us here?'
  - 'PICARD: Your planet was dying... it could no longer support life. So we took
    you away from it.'
  - 'VORIN: But... we never left the caves...'
  - 'PICARD: We have the ability to create the... illusion of other places, like the
    caves on your planet. You have actually been on this starship for the last two
    days... not on Boraal.'
  - 'VORIN: Then our home... is gone?'
  - 'TROI: Yes.'
  - 'VORIN: How can we grow when everything that made us who we are... is gone?'
