- fabula_uuid: act_e960c8477be2a9c9
  number: 3
  summary: Worf and Nikolai, once again surgically altered and disguised as Boraalans,
    return to the Holodeck simulation, where Nikolai delivers the devastating news
    that their village is destroyed and they must embark on a difficult journey to
    a new, storm-free land. Worf, deeply uncomfortable with the deception, is forced
    to play the role of a “Seer,” providing vague, unconvincing answers to Vorin's
    persistent questions about their destination and its safety. Nikolai intervenes,
    reinforcing Worf's fabricated spiritual authority to quell the growing unease
    among the Boraalans. The fragile illusion is nearly shattered when Holodeck grid
    lines visibly appear in the natural pool, terrifying Tarrana and exposing the
    artificiality of their surroundings. Worf, demonstrating quick thinking, improvises
    a spiritual explanation, attributing the anomaly to an “omen of La Forge” and
    a sign of good fortune, a coded message that prompts Geordi in Engineering to
    quickly stabilize the glitch. This moment of shared deception briefly forges a
    strained “team” dynamic between the brothers, though Worf quickly dismisses any
    notion of partnership, reiterating his disgust with Nikolai's manipulative tactics
    and irresponsible nature. The act further complicates Worf's personal entanglement
    when Kateras, grateful for Worf's perceived wisdom, offers his daughter, Tarrana,
    as a wife, solidifying Worf's unwilling integration into Boraalan society. Simultaneously,
    Data and Beverly identify Vacca Six as the most suitable, albeit less hospitable,
    new home, a decision weighed with immense responsibility. The act reaches its
    climax when Vorin, searching for a lost chronicle scroll, stumbles upon a protruding
    Holodeck arch and the true exit, revealing the Enterprise corridor and the devastating
    reality of his situation, leading to his escape from the simulation.
