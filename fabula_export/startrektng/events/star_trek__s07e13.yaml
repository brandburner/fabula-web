- fabula_uuid: cand_evt_scene_4f4c30f32f0bea2e_01
  global_id: null
  title: Worf Rejects Nikolai’s Partnership Offer
  description: "\n  After Nikolai successfully stabilizes the Boraalan villagers’\
    \ faith in Worf by framing the Holodeck glitch as a Klingon ritual, he seizes\
    \ the moment to subtly recruit Worf into a partnership, praising their shared\
    \ success. Worf immediately shuts down the suggestion, insisting his presence\
    \ is solely due to Picard’s orders—not personal alignment. Nikolai doubles down,\
    \ defending his actions as morally justified, but Worf accuses him of reckless\
    \ selfishness, dredging up their fractured history. Nikolai dismisses Worf’s resentment\
    \ as irrelevant, reaffirming his ‘noble’ intent before walking away. The exchange\
    \ leaves Worf grappling with the collision of brotherhood and duty, his frustration\
    \ compounded by Nikolai’s refusal to acknowledge the consequences of his Prime\
    \ Directive violation. The scene underscores Worf’s internal conflict: his loyalty\
    \ to Starfleet and his Klingon honor are at odds with Nikolai’s unchecked idealism,\
    \ and the Boraalans’ fate now hinges on their unresolved tension.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e13
  scene_sequence: 13
  sequence_in_scene: 24
  key_dialogue:
  - 'NIKOLAI: Good work... It seems we''re not such a bad team after all.'
  - 'WORF: We are not a ''team.'' I am here because Captain Picard ordered me here.'
  - 'NIKOLAI: I''m not ashamed of what I did. I''m not sorry I saved their lives...
    Worf -- don''t we share the same goal? Aren''t we both trying to make this plan
    work?'
  - 'WORF: Only because you forced us into it. You still expect others to solve the
    problems you create.'
  - 'NIKOLAI: I''m not here to work out the issues of our childhood. I''m trying to
    save a people I care about. And if that upsets you—so be it.'
