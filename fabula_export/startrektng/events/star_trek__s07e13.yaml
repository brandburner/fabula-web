  title: Boraal Two's Collapse Forces Hard Choices
  description: |2-

      The Enterprise arrives in orbit around Boraal Two, where Data reveals the planet's atmosphere is disintegrating at an alarming rate—now projected to become uninhabitable in under 38 hours. The crew reacts with urgency as the ship is rocked by plasmonic energy bursts, threatening systems and escalating the crisis. Worf, already grappling with Nikolai's unexplained delay in sending the distress call, detects anomalous energy readings from Boraalan caverns—faint emissions consistent with a deflector shield far beyond the Boraalans' technological capacity. This discovery raises critical questions: Who is hiding behind this technology, and how does it connect to Nikolai's Prime Directive violation? Picard authorizes Worf to lead an Away Team, but only under strict orders to minimize contact with the inhabitants and to surgically alter his appearance to pass as a Boraalan. The scene forces the crew to confront the planet's imminent destruction, the ethical weight of their intervention, and the personal stakes of Worf's relationship with his estranged brother. The tension between duty and loyalty is sharpened as Worf's concern for Nikolai's safety clashes with Starfleet's non-interference protocols, setting up a moral dilemma that will define the mission's direction.
