  title: Beverly and Data choose Vacca Six
  description: "\n  In Stellar Cartography, Beverly Crusher and Data evaluate two\
    \ potential relocation sites for the Boraalans—Draygo Four and Vacca Six—each\
    \ carrying distinct risks. Data presents the options: Draygo Four, though more\
    \ hospitable, lies dangerously close to Cardassian space, while Vacca Six, though\
    \ isolated, offers a harsher climate. Beverly’s initial hope for isolation fades\
    \ as she grapples with the moral weight of their decision, questioning whether\
    \ the Boraalans can adapt to Vacca’s conditions or if unforeseen consequences\
    \ will arise. Data, ever logical, acknowledges the uncertainty but insists they\
    \ must act on the best available data. Beverly’s hesitation reflects the broader\
    \ ethical dilemma of the *Enterprise*’s intervention—balancing survival with long-term\
    \ stability. Ultimately, she concedes to Vacca Six, accepting the necessity of\
    \ the choice despite its risks. This moment underscores the crew’s commitment\
    \ to mitigating Nikolai’s Prime Directive violation, even as it forces them to\
    \ confront the irreversible consequences of their actions.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e13
  scene_sequence: 14
  sequence_in_scene: 25
  key_dialogue:
  - 'DATA: These are the two planets which best match our search criteria... Draygo
    Four features an unusually large temperate zone. However, it is within three light-years
    of Cardassian space.'
  - 'BEVERLY: There are constant border disputes in that sector...'
  - 'DATA: The alternative is Vacca Six. It is located in the Cabral sector... It
    offers a less hospitable climate than the Boraalans are accustomed to. However,
    it would still appear to be the better choice.'
  - 'BEVERLY: No, Data... you''re right. It''s just that... the enormity of what we''re
    doing is overwhelming. We''re deciding the future of a species.'
  - 'DATA: I do not believe we can offer any guarantees, Doctor. We can simply make
    the best choice we have at the moment.'
  - 'BEVERLY: Right. Well, Vacca Six it is, then.'
