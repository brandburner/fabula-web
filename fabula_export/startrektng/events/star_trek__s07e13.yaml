- fabula_uuid: cand_evt_scene_9452b3091ba57bed_02
  global_id: null
  title: Tarrana exposes Holodeck illusion
  description: After Nikolai delivers devastating news of the Boraalan village’s destruction—reinforcing
    Worf’s reluctant role as a ‘Seer’—Tarrana’s accidental discovery of Holodeck grid
    lines in the cavern pool threatens to unravel the crew’s carefully constructed
    deception. The glitch forces Worf to improvise a spiritual explanation, framing
    the grid lines as a coded message from La Forge. This moment escalates the tension
    between survival and ethical compromise, exposing the fragility of their deception
    and the growing desperation of their situation. Vorin’s lingering skepticism and
    Tarrana’s terror underscore the Boraalans’ vulnerability, while Worf’s quick thinking—though
    effective—reveals the moral cost of maintaining the lie. The event serves as a
    turning point, shifting the narrative from deception to crisis as the crew’s control
    over the simulation weakens.
