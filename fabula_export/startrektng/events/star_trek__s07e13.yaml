    you have the right to know. By the time Worf and I reached the surface, the village
    was gone. The storms had destroyed everything. There is nothing for us to return
    to.'
  - 'VORIN: Where is this new land? WORF: As we said, it is far from here. It will
    not be like the home you knew... even the stars may be different.'
  - 'WORF: Do not worry... it is an omen... This is the sign of... La Forge. It is
    a message to travellers...'
