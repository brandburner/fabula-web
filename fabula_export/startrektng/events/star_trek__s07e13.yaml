  title: Picard approves Nikolai’s Holodeck relocation plan
  description: "\n  In the ready room, Picard confronts Nikolai about the irreversible\
    \ damage to his career after violating the Prime Directive, only for Nikolai to\
    \ defiantly reaffirm his actions. Nikolai then unveils a desperate, untested solution:\
    \ using the Holodeck to simulate a gradual transition to a new M-class planet,\
    \ allowing the Boraalans to believe they are merely traveling to safety. Picard,\
    \ cornered by the lack of alternatives and the urgency of the situation, reluctantly\
    \ agrees to the plan despite its ethical and technical risks. The exchange exposes\
    \ Picard’s moral conflict—balancing Starfleet’s non-interference principles against\
    \ the immediate need to save lives—while Nikolai’s confidence masks the fragility\
    \ of his improvisation. The decision sets the stage for the Holodeck’s instability\
    \ to later threaten the entire operation, deepening the narrative tension between\
    \ duty and survival.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e13
  scene_sequence: 9
  sequence_in_scene: 18
  key_dialogue:
  - 'PICARD: You realize your career is finished.'
  - 'NIKOLAI: I know that, Captain. And I would do it all again.'
  - 'NIKOLAI: I believe we can find a new planet... an M-class world... which can
    become their new home. That''s where the Holodeck comes in. I''ll go back and
    tell the Boraalans we''re going on a journey... to a different place, where they''ll
    be safe from the storms. The Holodeck can change the terrain gradually as we travel...
    so that at the end, the Holodeck simulation will match the conditions on the new
    planet. And then, we''ll beam them down.'
  - 'PICARD: What if it doesn''t work? What if they become aware that something strange
    is going on?'
  - 'NIKOLAI: I can''t prepare for every contingency. But I assure you—I''m used to
    thinking on my feet. I''ll deal with the situation as it evolves.'
  - 'PICARD: I''m not enthusiastic about this plan... but I don''t see another option.
    We''ll give it a try.'
