    \ malfunctions, revealing only eight hours remain before the *Enterprise* reaches\
    \ the pre-warp planet. This forces Worf to grapple with the shrinking window for\
    \ Nikolai’s rescue, heightening his internal conflict between duty and family\
    \ loyalty. The tension escalates when Dobara approaches him, pleading for forgiveness\
    \ on Nikolai’s behalf and revealing her pregnancy—an emotional gut-punch that\
    \ binds Worf to the Boraalans as an uncle. Her raw vulnerability and the revelation\
    \ of their unborn child force Worf to confront the irreversible consequences of\
    \ Nikolai’s actions, deepening his moral dilemma. The scene pivots from technical\
    \ urgency to personal stakes, with Dobara’s plea framing Worf’s role not just\
    \ as a Starfleet officer but as a reluctant family figure, further complicating\
    \ his choices as the mission’s ethical and logistical pressures converge.\n  "
