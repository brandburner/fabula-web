  title: Enterprise alters course for Vacca Six
  description: "\n  On the bridge, Data confirms Vacca Six as the viable relocation\
    \ site for the Boraalans, marking a critical escalation in the *Enterprise*'s\
    \ intervention. Picard, without hesitation, orders the ship to alter course and\
    \ proceed at maximum warp, demonstrating his commitment to resolving the crisis\
    \ despite the ethical risks. Riker's quick calculation of the travel time underscores\
    \ the urgency, while Picard's decisive command reflects his leadership under pressure.\
    \ This moment solidifies the crew's active role in violating the Prime Directive,\
    \ forcing Worf to confront the personal and professional consequences of Nikolai's\
    \ actions. The decision to proceed to Vacca Six also sets up the impending Holodeck\
    \ instability, as the crew races against time to relocate the Boraalans before\
    \ the simulation collapses entirely.\n  "
