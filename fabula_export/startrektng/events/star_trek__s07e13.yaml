    description_of_involvement: Plasmonic energy bursts erupt from Boraal Two's disintegrating
      atmosphere, striking the Enterprise and causing the ship to lurch. The bursts
      create a sense of urgency and danger on the bridge, flickering the lights and
      interrupting operations. Data monitors their potential to cause intermittent
      system failures and power surges, adding another layer of complexity to the
      crew's already high-stakes mission. The bursts symbolize the planet's collapse
      and the ticking clock the crew faces.
    status_before_event: Erupting intermittently from Boraal Two's atmosphere, generating
