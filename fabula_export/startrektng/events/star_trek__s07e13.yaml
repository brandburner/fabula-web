  title: Worf requests away team to find Nikolai
  description: On the Enterprise bridge, Picard and the senior staff analyze the catastrophic
    atmospheric collapse of Boraal Two, revealing the planet will become uninhabitable
    within 38 hours. Worf, visibly concerned, scans for his estranged foster brother
    Nikolai but detects no life signs at the observation post. When Worf identifies
    faint power emissions consistent with a deflector shield in nearby caverns—a technology
    far beyond the Boraalans' capabilities—he requests permission to lead an away
    team. Picard, adhering to Starfleet's Prime Directive, denies the request and
    orders Worf to proceed alone, disguised as a Boraalan to minimize contact with
    the indigenous population. The exchange underscores Picard's commitment to Federation
    ethics while testing Worf's loyalty to duty over personal ties, foreshadowing
    the moral conflict that will define his mission. Worf's restrained but palpable
    tension reveals his internal struggle between professional obligation and familial
    concern, setting the stage for his subsequent confrontation with Nikolai's actions
    and the ethical dilemmas ahead.
