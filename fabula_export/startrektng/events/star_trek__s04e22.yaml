  global_id: null
  title: Riker interrupts Timicin’s emotional confession
  description: 'In a private corridor, Timicin—raw and vulnerable—confesses to Lwaxana
    that his love for her has awakened a desperate desire to live, despite his cultural
    duty to die at sixty. He grapples with the existential weight of defiance: his
    newfound hope clashes with the certainty that his people will never accept his
    rebellion. Lwaxana reassures him that his stance against ritual suicide will resonate,
    but his despair lingers—he is a man without a home, cut off from his world. Just
    as he reaches his emotional breaking point, Riker’s abrupt comlink summons shatters
    the moment, forcing Timicin to abandon their unresolved conflict and confront
    an external crisis. The interruption underscores the tension between personal
    and cultural obligations, leaving Timicin’s fate—and his relationship with Lwaxana—hanging
    in precarious balance.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e22
  scene_sequence: 23
  sequence_in_scene: 40
  key_dialogue:
  - 'TIMICIN: I want to live because I see in you how much there is to live for. You
    make me realize there is still some value to my life. I can still contribute.
    I can be an example to my people. But discovering these new desires in myself...
    and not being able to do anything with them... not being able to finish my work,
    not being able to reach my people...'
  - 'LWAXANA: You have made a statement about the sanctity of life. It will be heard,
    Timicin.'
  - 'TIMICIN: Who will hear it... from lightyears away. Where do I go now, Lwaxana?
    A man without a world. Who can never go home.'
