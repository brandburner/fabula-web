  title: B'Tardat issues ultimatum to Enterprise
  description: In the ready room, Timicin confronts Science Minister B'Tardat via
    viewscreen, declaring his intent to reject Kaelon's ritual suicide tradition and
    seek asylum aboard the Enterprise. B'Tardat, outraged, accuses Timicin of cultural
    betrayal and Federation coercion, dismissing his scientific contributions as irrelevant.
    When Timicin insists on finishing his solar revitalization work, B'Tardat escalates
    the conflict by ordering Kaelon warships to intercept the Enterprise, threatening
    to open fire if they attempt to depart with Timicin aboard. The confrontation
    forces Timicin to grapple with his moral crisis—whether his defiance stems from
    genuine conviction or external influence—while Picard acknowledges Timicin’s autonomy
    but offers no easy answers. The ultimatum raises the stakes, compelling the crew
    to confront the Kaelon threat directly and forcing Timicin to choose between his
    scientific mission, his cultural duty, and his love for Lwaxana. The scene underscores
    the collision of tradition and progress, with B'Tardat’s rigid adherence to *The
    Resolution* clashing against Timicin’s burgeoning self-determination and the Federation’s
    unintended role in the conflict.
