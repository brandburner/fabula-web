  key_dialogue:
  - 'DARA: ((to Timicin, not Lwaxana)) All that matters to me now is you. Not your
    work. Your work''s over. It is your time to rest.'
  - 'LWAXANA: It is an obscene ritual.'
  - 'DARA: ((sharp)) How dare you. How dare you criticize my way of life, my beliefs.'
  - 'DARA: I cannot bear the thought that you will be laid to rest on some other world...
    that you will not lie beside my mother... and I will not be able to lie beside
    you when my resolution comes.'
  - 'DARA: I''m sorry, Father. I do not understand how you can go on with your life
    knowing each day you live is an insult to everything we believe in. I love you.
    But I am ashamed.'
