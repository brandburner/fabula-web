      offering asylum). The organization’s influence is subtle but critical, as it
      forces Picard to navigate a tightrope between moral support for Timicin and
      respect for Kaelon’s sovereignty. The Federation’s ideals are tested here, as
      Picard must balance idealism with the reality of military threat.
