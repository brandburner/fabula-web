- fabula_uuid: act_48f78530364ac6cd
  number: 2
  summary: 'The Enterprise reaches the Praxillus system, preparing for Dr. Timicin''s
    helium ignition test. Lwaxana, oblivious to the impending scientific drama, focuses
    on dressing for Timicin, discussing her attraction to him with a resigned Deanna.
    On the bridge, the crew executes the complex procedure, firing photon torpedoes
    into the test star. Initially, the experiment appears to be a resounding success:
    the star''s core temperature stabilizes, it transforms from a fiery red to a brilliant
    yellow, and the crew celebrates Timicin''s life''s work coming to fruition. However,
    the triumph is short-lived. Geordi''s monitor shows the temperature rising uncontrollably
    again, the core density becoming unstable. The star quickly explodes in a nova-like
    reaction, shattering Timicin''s hopes and decades of effort. The devastation is
    profound, leaving Timicin utterly broken and unable to articulate his gratitude.
    Later, Lwaxana finds him in Ten Forward, attempting to console him with her characteristic
    charm, though tempered by his grief. In a quiet, vulnerable moment, Timicin reveals
    the tragic truth: he is going home to die, signifying that his scientific failure
    is intertwined with a personal, cultural obligation.'
  key_moments: []
  scene_numbers:
