  title: Timicin’s cultural crisis escalates
  description: In the ready room, Timicin confronts Science Minister B’Tardat via
    viewscreen, declaring his intent to abandon Kaelon’s ritual suicide tradition—‘The
    Resolution’—and seek asylum aboard the *Enterprise*. B’Tardat, stunned, accuses
    Picard of coercion, but Picard affirms Timicin’s autonomy. The tension peaks when
    B’Tardat threatens military action if the *Enterprise* departs with Timicin, revealing
    the Kaelon government’s willingness to escalate. After the transmission cuts,
    Timicin spirals into self-doubt, questioning whether he acted from conviction
    or fear, while Picard refuses to absolve him, forcing Timicin to grapple with
    his own moral agency. The scene underscores the collision between personal desire
    and cultural duty, with Lwaxana’s influence looming as both a catalyst and a complication.
    The Kaelon warships’ imminent threat raises the stakes, framing Timicin’s dilemma
    as a ticking clock with life-or-death consequences for all involved.
