      and emotional cost.
    - To force him to confront the *personal* stakes (his grandson, his legacy) beyond
      cultural duty.
    what_happened: "\n        Lwaxana dominates the scene physically and emotionally,\
      \ starting as a silent sentinel in Timicin’s robe—her presence alone a reproach—before\
      \ escalating to a verbal ambush. She moves with deliberate theatricality (crunching\
      \ oskoids, pacing, invading his space) to underscore her points, her Betazoid\
      \ empathy fueling both her rhetorical precision and her raw frustration. Her\
