- fabula_uuid: cand_evt_scene_aa8e7abf76bd16c1_01
  global_id: null
  title: Lwaxana’s grief fractures her composure
  description: 'In the transporter room, Lwaxana Troi’s demand to beam down to Kaelon
    II—driven by desperation to save Timicin—collapses into raw grief when O’Brien
    refuses to override orders. Her emotional breakdown reveals the depth of her fear:
    not just of losing Timicin, but of confronting her own mortality and the fragility
    of love in the face of cultural duty. Deanna’s telepathic intervention offers
    fleeting comfort, while Lwaxana’s admission—‘I don’t cry’—exposes the vulnerability
    beneath her usual bravado. The scene underscores the cost of her defiance against
    Kaelon’s tradition, as her grief becomes a mirror for Timicin’s inevitable fate
    and her own unresolved grief over her late husband. O’Brien’s discreet exit further
    highlights the intimacy of the moment, where Lwaxana’s carefully constructed persona
    unravels, leaving only her pain and Deanna’s quiet understanding.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e22
  scene_sequence: 15
  sequence_in_scene: 25
  key_dialogue:
  - 'LWAXANA: What d''you mean I ''can''t'' go down here? Are you telling me I''m
    a prisoner on this ship?'
  - 'LWAXANA: (tearful; confused) I''m sorry, little one. I don''t know what''s wrong
    with me. I''m sorry.'
  - 'LWAXANA: I don''t know. I just can''t accept that fate would allow me to meet
    him like this... and then take him away. He''s not ill. He hasn''t had a tragic
    accident. He''s just going to die... for no good reason... except his society
    has decided he''s too old... so they dispose of him. As though his life no longer
    has value or meaning.'
