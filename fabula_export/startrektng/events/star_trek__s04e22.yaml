- fabula_uuid: act_b13723a7891399f9
  number: 3
  summary: The Enterprise returns to Kaelon Two, where Captain Picard, Riker, and
    Data engage with Science Minister B'Tardat regarding the failed experiment. B'Tardat,
    aloof and unyielding, insists Timicin has "obligations at home" and dismisses
    further Federation assistance, indicating Timicin's imminent return. Lwaxana,
    having learned of the Kaelon custom, bursts into Picard's ready room, confronting
    him with the horrific revelation that Kaelon citizens, including Timicin, are
    expected to commit ritual suicide at age sixty, a practice known as "The Resolution."
    She vehemently demands Picard intervene, labeling the custom barbaric. Picard,
    however, firmly invokes the Prime Directive, explaining the Federation's non-interference
    policy. Enraged and desperate, Lwaxana attempts to beam down to Kaelon Two herself,
    only to be stopped by Deanna. In a poignant, telepathic exchange, Lwaxana confesses
    her deep emotional distress, her fear of mortality, and her inability to accept
    that Timicin's life will end for an arbitrary reason. Later, Lwaxana confronts
    Timicin in his quarters, expressing her "hateful" opposition to his impending
    suicide. Despite his attempts to justify the Kaelon tradition, the intense emotional
    connection between them culminates in a passionate kiss, solidifying their bond
    amidst the looming tragedy.
