      which prevent Lwaxana or the *Enterprise* crew from intervening to save Timicin,
      despite their personal or moral objections.
    power_dynamics: Operating under constraint, the Federation’s influence is indirect
      but significant. While it cannot intervene to change Timicin’s fate, its presence—embodied
      by the *Enterprise* and its crew—serves as a silent witness to the tragedy,
      highlighting the tension between its ideals and the realities of cultural sovereignty.
