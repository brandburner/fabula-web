  title: Timicin Rejects Lwaxana’s Invitation
  description: 'After exiting the turbolift, Lwaxana and Timicin walk down the corridor,
    where Lwaxana challenges Kaelon’s refusal to evacuate their dying planet, framing
    it as a cultural death sentence. Timicin defends his people’s attachment to their
    homeworld, but Lwaxana pivots to a flirtatious invitation for a nightcap in her
    quarters. His initial hesitation reveals mutual attraction, but he ultimately
    declines with visible regret, citing duty. His internal conflict surfaces when
    he nearly changes his mind before forcing himself to retreat to his own quarters,
    underscoring the tension between personal desire and cultural obligation. The
    moment foreshadows his impending crisis: whether to abandon tradition for love
    or uphold ‘The Resolution’ at the cost of his own life.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e22
  scene_sequence: 6
  sequence_in_scene: 12
  key_dialogue:
  - 'LWAXANA: One thing I don''t understand... if your people have known for generations
    that their sun is dying... why not simply evacuate the planet?'
  - 'TIMICIN: It is our home... it defines who we are as a people. If Kaelon ceases
    to exist... so do we...'
  - 'LWAXANA: Then you definitely should fix it.'
  - 'LWAXANA: My valet sleeps elsewhere.'
  - 'TIMICIN: I... wish I could. But I have to say ''no''.'
