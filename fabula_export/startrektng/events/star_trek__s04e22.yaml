      \ and the crew’s preparations for battle. The turbolift’s confined space mirrors\
      \ his isolation: he’s no longer part of the *Enterprise*’s unified front, but\
      \ a man adrift between two worlds. Its role here is functional (removing a non-combatant\
      \ from danger) and narrative (underscoring Timicin’s alienation).\n      "
