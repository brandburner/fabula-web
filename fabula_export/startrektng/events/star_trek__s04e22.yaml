- fabula_uuid: cand_evt_scene_ab022471c2a490f2_01
  global_id: null
  title: Lwaxana challenges Timicin’s ritual suicide
  description: "\n  In the quiet intimacy of Timicin’s quarters, Lwaxana—dressed in\
    \ his robe—confronts him about the Kaelon tradition of ritual suicide at age sixty,\
    \ which he has accepted as inevitable. Their conversation begins with Timicin\
    \ attempting to justify the practice as a humane alternative to prolonged decline,\
    \ framing it as a dignified transition of responsibility. Lwaxana, however, dismantles\
    \ his arguments with sharp, emotional precision, exposing the hypocrisy of the\
    \ tradition: she highlights its arbitrariness (why sixty?), its cruelty (forcing\
    \ healthy individuals to die prematurely), and its selfishness (relieving younger\
    \ generations of care-giving burdens). She shifts from logical debate to personal\
    \ appeal, invoking his grandson’s future and her own Betazed precedent of defying\
    \ outdated customs. The exchange escalates into a raw confrontation about love,\
    \ duty, and the value of life itself, forcing Timicin to grapple with the emotional\
    \ cost of his cultural obligation. The scene culminates in Lwaxana’s devastating\
    \ question: *If your world is doomed, why bother saving it at all?*—a challenge\
    \ that leaves Timicin without a ready answer, signaling a fracture in his resolve.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e22
  scene_sequence: 17
  sequence_in_scene: 29
  key_dialogue:
  - 'TIMICIN: The Resolution is a celebration of life... we can end our lives with
    dignity...'
  - 'LWAXANA: Celebration of life... it all sounds very noble, very caring. What you''re
    really saying is you got rid of the problem by getting rid of the people...'
  - 'LWAXANA: If that''s the way it is, why is anyone bothering to try to save your
    world at all? If its time has come, let it die. Where''s the difference, Timicin?
    Where?'
