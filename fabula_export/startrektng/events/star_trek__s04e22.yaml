  key_dialogue:
  - 'TIMICIN: Convection boundary uncoupling. The reaction caused gas turbulence of
    a totally unexpected magnitude... Why?'
  - 'DATA: Perhaps, but there is no known method of controlling neutron migration,
    Doctor.'
  - 'TIMICIN: Yes, yes, but it is theoretically possible. Using these test results,
    we could construct a new computer model of the energy dynamics of the star that
    can test a new detonation program. I''m certain it can be accomplished. Certain.
    It''s just a matter of time.'
