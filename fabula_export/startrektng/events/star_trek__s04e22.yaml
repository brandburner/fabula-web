  title: Lwaxana’s invitation and Timicin’s refusal
  description: 'After exiting the turbolift, Lwaxana Troi presses Timicin on Kaelon’s
    refusal to evacuate their dying planet, exposing his cultural attachment to home
    as existential identity. When they reach her quarters, she flirts openly, inviting
    him for a nightcap—a bold, seductive challenge to his cultural duty. Timicin’s
    refusal, though polite and regretful, reveals his internal conflict: his attraction
    to her clashes with his impending ritual suicide at sixty, a tradition he cannot
    yet abandon. His hesitation (turning back toward her door before retreating) underscores
    the depth of his struggle, foreshadowing the crisis that will force him to choose
    between love and tradition. Lwaxana’s undaunted smile signals her persistence,
    while Timicin’s troubled expression hints at the emotional toll of his decision.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e22
  scene_sequence: 6
  sequence_in_scene: 11
  key_dialogue: &id001
  - 'LWAXANA: One thing I don’t understand... if your people have known for generations
    that their sun is dying... why not simply evacuate the planet?'
  - 'TIMICIN: It is our home... it defines who we are as a people. If Kaelon ceases
    to exist... so do we...'
  - 'LWAXANA: Then you definitely should fix it.'
  - 'LWAXANA: My valet sleeps elsewhere.'
  - 'TIMICIN: You are delightful. You make me laugh. I mean, I don’t mean your invitation
    makes me laugh... I mean I take it quite seriously but...'
  - 'LWAXANA: Then say yes. And I’ll make you laugh some more.'
  - 'TIMICIN: I... wish I could. But I have to say ''no''.'
