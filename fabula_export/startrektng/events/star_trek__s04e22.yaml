  key_dialogue:
  - 'TROI: Mother, how much...'
  - 'LWAXANA: (TELEPATHIC V.O.) Little one... why do you refuse to use telepathy even
    when we are alone?'
  - 'TROI: We are not alone, Mother. Now how much longer will this take? You''ve been
    selecting for twenty minutes.'
  - 'LWAXANA: (TELEPATHIC V.O.) I am a woman dressing for a man. Something you might
    try now and then, dear. I wonder if Timicin likes green.'
  - 'TROI: That''s not very telepathic of you.'
  - 'LWAXANA: (aloud) I tried telepathy on him; he''s the wrong species. Right species
    for everything else, though. And you might try that once in a while, too.'
  - 'TROI: You know, you''re not just incorrigible; you''re insatiable.'
