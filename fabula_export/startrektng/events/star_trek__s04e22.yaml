- fabula_uuid: act_9cef27718fcee077
  number: 5
  summary: Timicin's request for asylum immediately escalates tensions with Kaelon
    Two. In a tense communication, Timicin attempts to explain his decision to Science
    Minister B'Tardat, advocating for a re-evaluation of "The Resolution." B'Tardat,
    however, interprets this as Federation coercion and responds by dispatching two
    Kaelon warships, demanding Timicin's return and threatening to open fire if the
    Enterprise attempts to leave. On the Enterprise, Timicin frantically tries to
    transmit his new scientific findings to his people, but the Kaelons have severed
    all communication links, effectively terminating his work. He expresses profound
    frustration and sadness, recognizing that his choice to live makes him a greater
    threat to his world than its dying sun. The emotional climax arrives with the
    unexpected visit of Timicin's daughter, Dara. She pleads with him to return home,
    expressing deep shame and grief over his defiance, and the profound cultural importance
    of him being laid to rest beside his ancestors. Dara's heartfelt appeal, particularly
    her tears and the desire for him to be buried with his mother, deeply impacts
    Timicin, forcing him to confront the immense personal and cultural cost of his
    rebellion. Lwaxana, witnessing this, questions if her encouragement was misguided.
    Ultimately, Timicin, despite his love for Lwaxana and his desire to live, decides
    to return to Kaelon Two, recognizing that his love for her is "almost" but "not
    quite enough" to outweigh his profound cultural ties and responsibilities. In
    a final act of respect and compassion, Lwaxana requests permission to accompany
    him to his Resolution, a request Picard grants, acknowledging her profound empathy.
    They dematerialize together, facing his final moments.
