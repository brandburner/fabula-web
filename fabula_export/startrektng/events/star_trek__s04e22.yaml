  description: 'Dara confronts Timicin in his quarters, her grief and shame over his
    rejection of *The Resolution* laid bare in a raw, emotional outburst. She pleads
    for him to return home, accusing Lwaxana of poisoning his mind, and reveals her
    deepest fear: that he will die alone on an alien world, separated from his family
    and cultural traditions. Her tearful confession—*I am ashamed*—exposes the irreconcilable
    conflict between duty and love, forcing Timicin to confront the personal cost
    of his defiance. The scene ends with his request for solitude, marking the collapse
    of his stoic facade and the first crack in his cultural conditioning.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e22
  scene_sequence: 25
  sequence_in_scene: 43
  key_dialogue:
  - 'DARA: Where will you die?'
  - 'DARA: I cannot bear the thought that you will be laid to rest on some other world...
    that you will not lie beside my mother... and I will not be able to lie beside
    you when my resolution comes.'
  - 'DARA: I love you. But I am ashamed.'
