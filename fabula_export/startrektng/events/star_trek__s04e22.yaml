- fabula_uuid: cand_evt_scene_aa8e7abf76bd16c1_02
  global_id: null
  title: Lwaxana confronts mortality on transporter pad
  description: 'In the transporter room, Lwaxana Troi’s emotional control shatters
    as she demands transport to Kaelon II to stop Timicin’s ritual suicide. When O’Brien
    refuses due to orders, she lashes out—first with Betazoid authority, then with
    raw grief—before collapsing into tears. Deanna intervenes, guiding her to the
    transporter pad where Lwaxana admits her fear of aging and loss, drawing painful
    parallels to her late husband’s death. The moment exposes her vulnerability: not
    just as a mother or ambassador, but as a woman confronting her own mortality and
    the fragility of love in the face of tradition. Deanna’s reassurance—‘you will
    never be one of those who dies before they die’—offers fleeting comfort, but the
    weight of Timicin’s impending fate lingers, framing this as a turning point where
    Lwaxana’s defiance of cultural duty becomes personal and visceral. The scene pivots
    from external conflict (orders, transport) to internal reckoning (grief, fear,
    love), deepening the stakes of her emotional arc.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e22
  scene_sequence: 15
  sequence_in_scene: 26
  key_dialogue:
  - 'LWAXANA: He expects to die. Because he''s sixty! What is sixty; it''s nothing!'
  - 'LWAXANA: I don''t know. I just can''t accept that fate would allow me to meet
    him like this... and then take him away. He''s not ill. He hasn''t had a tragic
    accident. He''s just going to die... for no good reason... except his society
    has decided he''s too old... so they dispose of him. As though his life no longer
    has value or meaning.'
  - 'LWAXANA: You can''t possibly understand at your age... but at mine... sometimes,
    you feel tired. And afraid.'
  - 'TROI: You... afraid? I never could tell...'
  - 'TROI: You''re feeling very vulnerable; very... mortal, if I may say so. I know
    you so well, Mother. And believe me, you will never be one of those who dies before
    they die.'
