  scene_sequence: 14
  sequence_in_scene: 25
  key_dialogue:
  - |-
    LURSA: Welcome, Captain.
    PICARD: Your invitation was... unexpected.
    B'ETOR: We should have extended it much sooner.
  - |-
    LURSA: Toral has the bloodline to lead the Empire into the next century. He has the support of the people.
    PICARD: The remaining issue then is to see if he has the support of the law.
    B'ETOR: But he must. Surely, you can see that.
    PICARD: I'll tell you what I see. If I find Toral's challenge valid, the two of you will very quickly gain control of the Council... and Gowron will be found dead shortly thereafter. If I reject Toral's challenge, you will accuse me of doing it only to serve Federation interests. It will give you a rallying cry to declare war and overthrow Gowron.
  - |-
    LURSA: This is not a threat, Captain. Just an unfortunate truth.
    B'ETOR: So why be our enemy, when you can be our friend?
