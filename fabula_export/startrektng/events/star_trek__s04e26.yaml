    description_of_involvement: 'Gowron’s ceremonial dagger is the focal point of
      this event, a ritualistic weapon designed to draw blood without causing permanent
      harm. Its blades extend with a precise, almost theatrical click when Gowron
      presses the hilt’s button, symbolizing the transition from symbolic threat to
