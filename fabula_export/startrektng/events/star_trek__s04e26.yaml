  key_dialogue:
  - 'GOWRON: The Duras family is gathering a large force near Beta Thoridar. As per
    the terms of the Treaty of Alliance, I now formally request your assistance in
    fighting these enemies of the Empire.'
  - 'WORF: The Duras family is corrupt and hungry for power... with no sense of honor
    or loyalty. They represent a grave threat to the security of the Federation. Captain,
    you and I know that they have conspired with Romulans in the past. If they should
    be the victors in this war, they will surely form a new Klingon/Romulan alliance.
    Starfleet must support Gowron... it is in the interests of both the Federation
    and the Empire.'
  - 'PICARD: Mister Worf... non-interference in the internal affairs of other cultures
    is one of the guiding principles of the Federation... and as Starfleet officers,
    we have all sworn an oath to uphold that principle regardless of personal feeling.'
  - 'WORF: Then... I must resign my commission as a Starfleet officer.'
