- fabula_uuid: act_0394d337616070cd
  number: 5
  summary: Act Five provides the resolution to Worf's central conflict and sets the
    stage for future geopolitical tensions. Following his installation, Gowron formally
    invokes the Treaty of Alliance, requesting Federation military assistance against
    the Duras family. Picard, however, steadfastly refuses, reiterating the Federation's
    core principle of non-interference in internal Klingon affairs, despite Gowron's
    protests and Worf's impassioned plea for intervention. Worf argues that the Duras
    family's Romulan ties pose a direct threat to Federation security and the quadrant's
    balance of power, urging Picard to reconsider. Picard, unwavering in his duty,
    then orders Worf to return to Starfleet duty, forcing Worf to make a definitive
    choice. Confronted with the irreconcilable demands of his Starfleet oath and his
    Klingon heritage, Worf makes the momentous decision to resign his commission,
    symbolically placing his combadge on the table. This act culminates in a poignant
    farewell between Picard and Worf, where Picard acknowledges Worf's unique blend
    of Klingon heart and human virtues, followed by a silent, respectful send-off
    from the Enterprise crew. As Worf departs to join Gowron, the Enterprise leaves
    the Klingon Home World. The final scene reveals that the mysterious woman allied
    with the Duras sisters and Romulan General Movar is a human, strikingly resembling
    Tasha Yar, confirming the deeper Romulan conspiracy and hinting at future encounters
    with Picard, leaving the overarching conflict unresolved but Worf's personal journey
    complete.
