- fabula_uuid: cand_evt_scene_aa78f28055da0f1b_01
  global_id: null
  title: Toral Challenges Gowron’s Leadership
  description: "\n  In the Great Hall, Picard formally confirms Gowron’s completion\
    \ of the rite of succession, solidifying his claim to the Klingon throne before\
    \ the High Council. The moment is abruptly shattered when Toral, a young Klingon\
    \ claiming to be Duras’s son, interrupts the ceremony to publicly challenge Gowron’s\
    \ leadership. The Duras sisters, Lursa and B’Etor, enter to support Toral, revealing\
    \ a hidden bloodline that threatens Gowron’s authority. The Council votes to accept\
    \ Toral’s challenge, forcing Gowron into a crisis of legitimacy. The interruption\
    \ tests Gowron’s leadership, exposes the Duras family’s political maneuvering,\
    \ and thrusts Worf into a conflict between Starfleet loyalty and Klingon honor,\
    \ as the scene sets the stage for a destabilized Klingon Empire.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e26
  scene_sequence: 10
  sequence_in_scene: 18
  key_dialogue:
  - 'K''TAL: naDev ghoS! Have you reached a decision regarding the succession of power?'
  - 'PICARD: Qaja plu d''itch jung. La woq you ghir klas qimha. Gowron. Doj hon. Doj
    hon.'
  - 'TORAL: I am Toral... son of Duras.'
  - 'GOWRON: Duras had no son!'
  - 'LURSA: Members of the High Council, it is a day of great rejoicing for the family
    of Duras and the Klingon Empire. We have discovered that our brother did indeed
    have a son and heir.'
  - 'K''TAL: The challenge is accepted. The arbiter will consider its validity.'
