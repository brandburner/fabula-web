  title: Worf requests leave to join Klingon crisis
  description: In the Ready Room, Worf formally requests a leave of absence from Picard
    to address the Klingon High Council’s crisis, marking a pivotal moment in his
    struggle between Starfleet duty and Klingon heritage. Picard grants the request
    with a rare Klingon farewell (*‘Qapla!’*), underscoring their mutual respect and
    the weight of Worf’s divided loyalties. The exchange subtly acknowledges the Federation’s
    non-interference constraints while signaling Worf’s irreversible shift toward
    embracing his Klingon identity. The moment is charged with unspoken tension—Picard’s
    approval carries both personal pride and professional resignation, while Worf’s
    posture (squaring his shoulders at the Klingon word) visually reinforces his internal
    transformation. The scene functions as a turning point, bridging Worf’s earlier
    emotional reckoning with Guinan and his impending confrontation with Kurn, while
    reinforcing Picard’s role as a mentor who must release his officer to his destiny.
    The fade-out and Picard’s whispered ‘good luck’ frame the request as a high-stakes
    gambit with personal and political consequences.
