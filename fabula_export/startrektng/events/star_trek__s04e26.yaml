- fabula_uuid: cand_evt_scene_1d683b4ed05ec615_01
  global_id: null
  title: Picard and Worf’s Final Farewell
  description: "\n  In Worf’s quarters, now stripped of most personal effects, Picard\
    \ discovers Worf in full Klingon regalia—a visual and symbolic severing of his\
    \ Starfleet identity. The scene unfolds as a quiet, charged confrontation between\
    \ two men who have shared a bond built on mutual respect and unspoken understanding.\
    \ Picard, ever the diplomat, acknowledges Worf’s decision to serve aboard the\
    \ *Bortas* but probes the deeper motivations behind it, forcing Worf to articulate\
    \ the irreconcilable pull of his Klingon heritage. Worf’s confession—that his\
    \ heart belongs to his people—reveals the emotional core of his choice, while\
    \ Picard’s response frames Worf’s humanity as his most defining trait, a bittersweet\
    \ acknowledgment of what will be lost. The moment culminates in Picard’s offer\
    \ to transport Worf’s belongings, a simple act laden with subtext: gratitude,\
    \ farewell, and the unspoken weight of a bond now fractured. Their exit together,\
    \ silent and deliberate, underscores the finality of the moment, leaving both\
    \ men to grapple with the consequences of duty and identity.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e26
  scene_sequence: 28
  sequence_in_scene: 50
  key_dialogue:
  - 'WORF: I was rescued from Khitomer by humans... raised and... loved by human parents.
    I have lived among humans for most of my life... fought at their sides. But I
    was born Klingon. My heart is of that world. I do hear the cry of the warrior...
    I belong with my people.'
  - 'PICARD: Being the only Klingon ever to serve in Starfleet... gave you a singular
    distinction. But I always felt that the most unique thing about you was your...
    humanity. Compassion... generosity... fairness... You took some of the best qualities
    of humanity and made them part of you. The result... was a man I was proud to
    call one of my officers.'
  - 'WORF: Thank you...'
