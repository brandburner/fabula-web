- fabula_uuid: act_5bfcf65a9bd9bd12
  number: 4
  summary: Act Four serves as the climax for Worf's personal quest and Gowron's struggle
    for leadership, showcasing the direct consequences of Picard's decision. Gowron,
    now severely weakened and isolated by the Council's defection, urgently summons
    Worf. Worf seizes this opportunity, offering Gowron the crucial support of four
    Klingon squadrons, led by his brother Kurn, but only in exchange for the long-sought
    restoration of his family's honor. Gowron, desperate, attempts to pressure Worf
    into securing Federation intervention through Picard, challenging Worf's identity
    and loyalty—forcing him to confront whether he is 'Human' or 'Klingon.' This intense
    negotiation is abruptly interrupted by a surprise attack on Gowron's ship by Duras
    family Birds of Prey. During the chaotic battle, Worf instinctively takes command
    of a weapons station, demonstrating his innate warrior prowess. Simultaneously,
    Picard, despite the immediate danger to Worf and Gowron, makes the difficult decision
    to withdraw the Enterprise from the combat zone, rigorously upholding the Federation's
    non-interference directive, thus leaving Worf and Gowron to face the Duras forces
    alone. Worf's tactical ingenuity allows them to destroy one attacking ship, and
    Kurn's timely arrival with his squadron drives off the remaining Duras vessels,
    saving Gowron. In the aftermath, during the re-installation ceremony, Gowron publicly
    and formally restores Worf's family honor, fulfilling Worf's long-standing quest
    for redemption.
