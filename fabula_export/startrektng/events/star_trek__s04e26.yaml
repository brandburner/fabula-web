- fabula_uuid: cand_evt_scene_d40108818c980ebf_01
  global_id: null
  title: Gowron demands Picard declare Duras family ineligible
  description: "\n  In the Observation Lounge, Gowron—restless and visibly agitated—confronts\
    \ Picard with urgent warnings about the Duras sisters, Lursa and B'Etor, who are\
    \ consolidating power within the Klingon High Council despite their family's disgraced\
    \ legacy. Gowron reveals their growing influence, including the allegiance of\
    \ three fleet commanders, and expresses fear that their corruption will erode\
    \ Klingon honor. When Picard refuses to declare the Duras family ineligible for\
    \ the Council, citing his limited arbiter role, Gowron’s frustration escalates\
    \ into a plea for Picard to ensure his installation as chancellor. Picard, bound\
    \ by Federation neutrality, reaffirms his commitment to Klingon law but stops\
    \ short of direct intervention. The exchange exposes Gowron’s vulnerability—his\
    \ leadership is precarious, and his reliance on Picard’s authority underscores\
    \ the fragility of his position. The scene foreshadows Worf’s impending loyalty\
    \ crisis, as Picard’s refusal to act forces Gowron to seek alternative means of\
    \ securing his rule, potentially pushing Worf toward a choice between Starfleet\
    \ and Klingon honor.\n  "
