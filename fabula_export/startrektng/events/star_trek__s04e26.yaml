- fabula_uuid: act_70bb877dfc4dd91a
  number: 3
  summary: 'Act Three marks the critical turning point in the narrative, where Picard''s
    arbitration decision directly ignites the Klingon civil war and Worf prepares
    to execute his strategic plan. Worf, now off-duty, continues to coordinate with
    Kurn, who confirms the allegiance of three additional squadron commanders, giving
    them significant military leverage. Simultaneously, Worf''s research into the
    Khitomer massacre records on the Enterprise raises Picard''s concerns about Worf''s
    use of Starfleet resources for personal Klingon political gain. Picard, grappling
    with his own conflicting duties as arbiter and Starfleet captain, ultimately decides
    to make the Khitomer records publicly available, pushing the boundaries of non-interference
    to indirectly aid Worf while maintaining Federation principles. This act also
    features a tense encounter between Picard and the Duras sisters, Lursa and B''Etor,
    who attempt to subtly intimidate him into ruling in Toral''s favor, explicitly
    linking his decision to the future of the Federation-Klingon alliance. Despite
    their threats, Picard announces his decision to the High Council: he rejects Toral''s
    challenge, citing the boy''s lack of honor and experience, and declares Gowron
    the rightful leader. This ruling, however, immediately backfires, as the majority
    of the Council members defiantly pledge their allegiance to Toral, effectively
    initiating the Klingon civil war and leaving Gowron isolated and vulnerable, exactly
    as Worf had anticipated.'
