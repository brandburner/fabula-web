    - By **exploiting personal loyalties** (Worf’s fear of destabilizing the Empire)
    institutional_impact: |2-

              The Empire’s **instability is the core conflict**—it forces Worf into a **moral dilemma**: act and risk Empire collapse, or stay silent and bear dishonor. The *Bortas*’s interception is a **microcosm of the Empire’s larger crisis**, and Picard’s arguments reflect the **Federation’s stake in its stability**.
    internal_dynamics: |2-

              **Civil war risks**—the Duras family’s challenge to Gowron is a **proxy for the Empire’s fractured loyalties**, and Worf’s potential action could **tip the balance**. The High Council’s discommendation of Worf’s family is a **symptom of this instability**, and his decision to challenge it would **expose the lie at the Empire’s heart**.
