  global_id: null
  title: Kurn saves Gowron, securing Enterprise invitation
  description: In a critical moment of vulnerability, Kurn’s Bird of Prey intervenes
    to repel an ambush by Lursa and B’Etor’s forces, forcing their retreat and saving
    Gowron’s ship. The attack exposes the Duras sisters’ ruthless tactics and Gowron’s
    precarious grip on power. Though Kurn’s intervention is decisive, Gowron’s response
    is restrained—acknowledging the act with a curt nod rather than overt gratitude,
    adhering to Klingon stoicism. Recognizing the strategic advantage of Worf’s presence,
    Gowron extends an invitation to the *Enterprise* delegation, including Worf, to
    attend his installation ceremony at the Great Hall. This invitation is both a
    political maneuver—solidifying alliances—and a test of Worf’s loyalty, as it forces
    him to confront his divided allegiances between Starfleet and Klingon tradition.
    The scene underscores the fragility of Gowron’s leadership and the high stakes
    of the succession crisis, while also setting up Worf’s inevitable choice between
    duty and honor.
