- fabula_uuid: cand_evt_scene_fcacf59caf759f99_02
  global_id: null
  title: Toral fractures the High Council
  description: "\n  In the Great Hall, Picard delivers his ruling on the Klingon succession\
    \ crisis, declaring Gowron the rightful leader and denying Toral’s claim. Picard’s\
    \ decision is legally sound but politically explosive: he rejects Toral not just\
    \ as a leader but as a warrior unproven in battle, a judgment that strips the\
    \ Duras family of their last legitimate claim to power. Toral, humiliated and\
    \ emboldened by Lursa and B'Etor’s manipulation, publicly defies Picard and Gowron,\
    \ rallying a majority of the High Council to defect. The defection is not just\
    \ a rejection of Gowron’s leadership but a symbolic repudiation of Federation\
    \ influence, as Toral frames the decision as Federation interference in Klingon\
    \ affairs. The scene culminates in a stark visual: the Great Hall, once filled\
    \ with the Council, now stands nearly empty, with only a handful of loyalists\
    \ remaining beside Gowron. Toral’s parting threat—‘Remember this day’—hints at\
    \ the blood feud to come, while Lursa and B'Etor’s smug satisfaction reveals their\
    \ long-game victory: regardless of who wins the civil war, the Duras sisters have\
    \ already secured their strategic advantage through chaos. The event forces Worf\
    \ into an impossible choice—his loyalty to Starfleet and Picard versus his Klingon\
    \ heritage and the crumbling empire of his people—while exposing the fragility\
    \ of Klingon unity under Gowron’s leadership.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e26
  scene_sequence: 16
  sequence_in_scene: 30
  key_dialogue:
  - 'PICARD: K''tal, this Council knows the law of heredity well. G''now juk Hol pajhard.
    A son will share in the honors or crimes of his father. Toral is Duras'' son...
    that has been established by the genetic scan. And it is heartwarming to see him
    embraced by the family of Duras... for they are an old and noble family. But with
    due respect to the traditions and laws of this High Council, there is no basis
    for accepting a petition for leadership from a boy who has fought no battles,
    shed no blood for his people, earned no honor for himself. Perhaps some day he
    shall. But not now.'
  - 'TORAL: Does the Federation dictate Klingon destiny or do we? Follow me. And I
    will show you honor.'
  - 'TORAL: Remember this day.'
