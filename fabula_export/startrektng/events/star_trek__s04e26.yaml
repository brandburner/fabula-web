- fabula_uuid: cand_evt_scene_a52c6267601cd622_01
  global_id: null
  title: Worf offers Kurn’s squadrons to Gowron
  description: "\n  In a tense, private confrontation aboard Gowron’s cruiser, Worf\
    \ reveals Kurn’s secret command of four elite Klingon squadrons—long concealed\
    \ due to their disgraced bloodline—and offers them as a strategic lifeline to\
    \ Gowron. The moment begins with Gowron, already embattled by a leadership challenge,\
    \ dismissing Worf as a dishonored Klingon, but Worf’s blunt proposition forces\
    \ Gowron to reconsider. The revelation that Kurn is Worf’s brother and that the\
    \ squadrons are pledged to his command shifts the dynamic, giving Gowron a glimmer\
    \ of hope. However, Gowron demands more than just military aid—he pressures Worf\
    \ to leverage Picard’s influence, forcing Worf to confront his divided loyalties.\
    \ Gowron’s taunt—*‘What are you, Worf?’*—exposes the core of Worf’s identity crisis,\
    \ just as a sudden Romulan attack interrupts the confrontation, leaving the fate\
    \ of the squadrons and Worf’s allegiance unresolved. The scene tests Worf’s Klingon\
    \ heritage while underscoring Gowron’s desperation and the fragility of his power.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e26
  scene_sequence: 17
  sequence_in_scene: 32
  key_dialogue:
  - 'GOWRON: Your forces are weak, Gowron... you will need help to fight the family
    of Duras.'
  - 'WORF: They are pledged to support... my brother, Kurn.'
  - 'GOWRON: Kurn is your brother?'
  - 'WORF: His true bloodline was kept hidden to protect him.'
  - 'GOWRON: What is it you want in return?'
  - 'WORF: You know my price.'
  - 'GOWRON: The return of your honor. For the support of four squadrons...? No, that
    will not be enough. The Duras family controls most of the fleet. We must have
    Federation help.'
  - 'WORF: They will not intervene.'
  - 'GOWRON: Perhaps not yet... but Starfleet Command will listen to Picard... and
    Picard listens to you.'
  - 'WORF: I can ask nothing more of him in this matter.'
  - 'GOWRON: What? You come to me and demand the restoration of your family’s honor...
    and now you hide behind Human excuses!'
  - 'GOWRON: What are you, Worf? Do you tremble and quake with fear at the approach
    of combat... hoping to talk your way out of a fight... like a Human... or do you
    hear the cry of the warrior... calling you to battle... calling you to glory...
    like a Klingon? Are you one of us?'
