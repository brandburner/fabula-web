- fabula_uuid: cand_evt_scene_fcacf59caf759f99_03
  global_id: null
  title: Toral’s Defiance and the Council’s Fracture
  description: "\n  In the Great Hall, Picard delivers his ruling on the Klingon succession,\
    \ denying Toral’s claim to leadership on the grounds that he lacks the honor earned\
    \ through battle. His decision, though legally sound, ignites a political crisis\
    \ as Toral—backed by Lursa and B’Etor—publicly rejects Picard’s authority and\
    \ Gowron’s leadership, rallying a majority of the High Council to defect. The\
    \ Duras sisters exchange a knowing glance with Picard, signaling their strategic\
    \ victory: the chaos serves their long-term goals regardless of the outcome. Gowron’s\
    \ plea to the defecting Councilors falls on deaf ears, leaving him, K’Tal, and\
    \ a lone supporter isolated in the vast, now-empty hall. Toral’s final threat\
    \ to Picard—‘Remember this day’—marks the moment the Klingon Civil War begins,\
    \ with the Federation’s perceived betrayal and the Duras family’s manipulation\
    \ setting the stage for a blood feud between Toral and Picard. The scene underscores\
    \ the fragility of Klingon unity and forces Worf into an impossible choice between\
    \ Starfleet and his people, while exposing the Romulan Empire’s shadowy influence\
    \ over the conflict.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e26
  scene_sequence: 16
  sequence_in_scene: 31
  key_dialogue:
