  global_id: null
  title: Worf and Kurn forge a divided strategy
  description: 'Aboard the *Bird of Prey*, Worf confronts his brother Kurn, who reveals
    a plan to assassinate Gowron and overthrow the High Council. Worf rejects the
    dishonorable coup, asserting his authority as elder brother, and instead proposes
    a strategic delay: they will wait until Gowron’s position is weakened by the Duras
    sisters before offering their support—on the condition that their family’s honor
    is restored. The scene crystallizes their ruthless pragmatism, as both brothers
    leverage their fractured bond as a weapon in the Klingon power struggle. Kurn
    reluctantly agrees, shifting from outright rebellion to a calculated, long-term
    play for their family’s redemption. The confrontation underscores Worf’s moral
    conflict—balancing Klingon tradition with his personal quest for honor—while exposing
    Kurn’s deep-seated resentment toward Gowron and the Council’s failures. The moment
    sets up their parallel but distinct approaches to undermining Gowron’s enemies,
    with Worf preparing for a direct confrontation and Kurn rallying military allies
    in the Mempa sector. The tension between them is palpable, but their shared goal—restoring
    their family’s name—temporarily unites them under Worf’s leadership.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e26
  scene_sequence: 9
  sequence_in_scene: 16
  key_dialogue:
  - 'KURN: Gowron is weak... and the family of Duras must never be allowed to lead
    the Council. All of our leaders... have failed us. They no longer deserve our
    loyalty. It is time to sweep away the old Council... and put a new one in its
    place.'
  - 'WORF: No. Gowron has completed the rite of succession... it is our duty to support
    him.'
  - 'WORF: We will back Gowron. But not now. Not yet. We will wait. Until Gowron feels
    the grasp of his enemies around his throat. Then we will offer him our support.
    And the price will be the restoration of our family name.'
