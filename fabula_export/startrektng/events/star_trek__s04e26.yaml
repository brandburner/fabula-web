acts:
- fabula_uuid: act_8fafb6309a5549a1
  number: 1
  summary: Act One establishes the precarious political situation on the Klingon Home
    World, setting the stage for a potential civil war. Captain Picard arrives to
    oversee Gowron's installation as the new High Council leader, but Gowron immediately
    reveals the Duras family's growing opposition, led by Lursa and B'Etor, and their
    suspected Romulan ties. Picard, serving as arbiter, firmly adheres to Federation
    non-interference, refusing to declare the Duras family ineligible, much to Gowron's
    dismay. Simultaneously, Worf, seeking to restore his family's honor, confronts
    Gowron, presenting evidence that Duras's father, not his own, betrayed the Klingons
    at Khitomer. Despite Worf's compelling case, Gowron, prioritizing his political
    survival and the Council's support, rejects Worf's plea. This rejection forces
    Worf to internalize his struggle, a process subtly aided by Guinan, who encourages
    him to embrace his Klingon identity and take decisive action. By the act's end,
    Worf, having been denied a straightforward path to honor, requests a leave of
    absence, signaling his intent to pursue his goals through alternative, more Klingon-centric
    means, separate from his Starfleet duties. This act effectively outlines the external
    political threat and Worf's internal conflict, propelling him towards a personal
    quest for redemption.
