  title: Picard pushes Worf to reclaim honor
  description: In Worf’s quarters, Picard—acting as Worf’s *cha’DIch*—interrupts his
    martial training to confront his protégé’s passive acceptance of discommendation.
    Picard frames the dishonor as a betrayal of Klingon identity, arguing that Worf’s
    strategic restraint has outlived its purpose. The tension escalates as Picard
    offers Starfleet leave to resolve the matter, forcing Worf to grapple with the
    collision of Klingon honor and Starfleet loyalty. Just as Worf begins to yield,
    Riker’s urgent comm about the *Bortas*’s unscheduled interception abruptly ends
    the confrontation, leaving Worf’s decision unresolved but the stakes crystal clear.
    The scene serves as a turning point, where Picard’s moral pressure and the looming
    Klingon crisis force Worf to confront his divided allegiances.
