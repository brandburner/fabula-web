      counters by framing the conflict as an 'internal Klingon matter,' effectively
      rendering the Treaty irrelevant in this context. The Treaty thus becomes a pawn
      in the larger debate over hypocrisy, non-interference, and the Federation’s
      role in Klingon affairs. Its mention underscores the tension between institutional
      obligations and the fluid, high-stakes reality of interstellar politics.
    status_before_event: A legally binding document, invoked by Gowron as leverage
