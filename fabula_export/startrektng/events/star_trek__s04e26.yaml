  - object_uuid: ger_object_84db0af4e583
    description_of_involvement: 'Gowron’s bat’leth hangs at his side, its curved blade
      a constant reminder of his warrior status and his readiness for violence. When
      Toral interrupts, Gowron’s hand twitches toward the weapon, his instinct to
      draw it betraying his fury. K’Tal restrains him, but the bat’leth’s presence
      looms large in the scene—a symbol of Gowron’s temper and the ever-present threat
      of bloodshed in Klingon politics. Its unused potential underscores the tension:
      Gowron *wants* to fight, but the Council’s vote forces him to confront his enemies
      with words, not steel.'
    status_before_event: Sheathed at Gowron’s side, a silent but ever-present symbol
      of his martial authority and readiness for conflict.
    status_after_event: Still sheathed, but its unused potential hangs in the air.
      Gowron’s restraint in not drawing it is a testament to K’Tal’s intervention,
      but the bat’leth’s role as a threat—unspoken but understood—remains.
