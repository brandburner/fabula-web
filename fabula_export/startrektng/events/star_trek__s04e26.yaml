    what_happened: "\n        Gowron appears on the viewscreen from the *Bortas*’s\
      \ ready room, his ridged forehead furrowed, his voice devoid of its usual bombastic\
      \ bravado. He sits forward in his chair, his massive frame tense, as if physically\
      \ restrained by the urgency of his mission. His dialogue is clipped, his demands\
      \ immediate—no time for Klingon ritual or Federation protocol. The dim lighting\
