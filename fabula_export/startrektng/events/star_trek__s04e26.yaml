- fabula_uuid: act_13158a056260af16
  number: 2
  summary: Act Two significantly escalates the brewing Klingon civil war and Worf's
    personal journey. Worf joins his brother Kurn, who unveils a radical plan to overthrow
    Gowron and the existing Council, having already secured the loyalty of several
    squadron commanders. Worf, however, rejects this dishonorable coup, asserting
    his authority as the elder brother and insisting they must strategically support
    Gowron, but only when Gowron is at his weakest, to leverage the restoration of
    their family honor. This decision solidifies Worf's unique approach to Klingon
    politics, balancing honor with pragmatism. Concurrently, the political machinations
    on the Home World intensify as Toral, Duras's alleged son, formally challenges
    Gowron's leadership, backed by the formidable Lursa and B'Etor. A genetic scan
    validates Toral's lineage, and the High Council, swayed by fear and loyalty to
    the Duras name, accepts the challenge. Picard then faces direct pressure from
    Lursa and B'Etor, who, in a veiled threat, imply the dissolution of the Federation-Klingon
    alliance if he rules against Toral. The act culminates with the revelation of
    Romulan General Movar and a mysterious woman, confirming the Duras family's foreign
    backing and the broader geopolitical stakes, setting the stage for Picard's critical
    arbitration decision and Worf's impending strategic move.
