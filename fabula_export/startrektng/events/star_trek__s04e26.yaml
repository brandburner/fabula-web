    internal_dynamics: |2-

              **Tension between personal loyalty and institutional duty**—Picard’s actions as *cha’DIch* could be seen as **overstepping command boundaries**, while Worf’s potential leave raises questions about **Starfleet’s role in Klingon internal affairs**.
