  object_involvements:
  - object_uuid: ger_object_760769ea3cc9
    description_of_involvement: The Ceremonial Cloak of K’mpec, draped over the empty
      leader’s chair, serves as the symbolic centerpiece of the succession rite. Picard
      lifts it and holds it before Gowron as K’Tal confirms his completion of the
      rite, but the moment is shattered when Toral interrupts. The cloak, a relic
      of Klingon tradition, becomes a silent witness to the Duras family’s power play—its
      presence underscores the ritual’s sanctity, even as that sanctity is being violated.
      The cloak’s role shifts from a tool of legitimacy to a backdrop for political
      theater, its weighty symbolism lost in the chaos of the challenge.
    status_before_event: Draped over the empty leader’s chair, untouched and revered
      as a symbol of Klingon tradition and the late Chancellor K’mpec’s legacy.
    status_after_event: Still draped over the chair, now overshadowed by the Duras
      family’s interruption. Its symbolic power is temporarily eclipsed by the raw
      political maneuvering unfolding around it.
