      of power from the deceased chancellor. Picard lifts the cloak and holds it before
      Gowron, formalizing his claim to leadership. The cloak’s presence is a ritual
      centerpiece, its weight and history lending gravity to the succession rites.
      When Toral’s challenge interrupts the ceremony, the cloak becomes a silent witness
      to the fracturing of Klingon unity, its symbolic power undermined by political
      maneuvering.
