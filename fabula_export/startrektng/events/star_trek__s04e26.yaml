  global_id: null
  title: Worf challenges Gowron’s tactical order
  description: 'Under direct attack with failing shields, Worf defies Gowron’s command
    to lock disruptors on the enemy Birds of Prey. Recognizing the tactical flaw—disruptor
    locks would alert the attackers to the ship’s readiness—Worf argues for a manual
    firing strategy, exploiting the enemy’s assumption of the cruiser’s helplessness.
    The bridge crew freezes in shock at Worf’s insubordination, but Gowron, after
    a tense pause, relents and approves the plan. The moment tests Worf’s loyalty
    to Gowron while exposing the chancellor’s vulnerability in crisis, as his authority
    hinges on trusting a subordinate who has already abandoned Starfleet for Klingon
    honor. The decision sets up a high-stakes gamble: if Worf’s strategy fails, the
    ship is doomed; if it succeeds, it could restore Gowron’s confidence in his leadership—and
    Worf’s place in the Klingon hierarchy.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e26
  scene_sequence: 23
  sequence_in_scene: 41
  key_dialogue:
