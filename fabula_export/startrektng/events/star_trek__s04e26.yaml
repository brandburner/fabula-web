    description_of_involvement: Deep space near the *Bortas* is the battleground for
      this high-stakes confrontation, a vast and isolated void where the fate of Klingon
      leadership hangs in the balance. The location is defined by its silence and
      the stark contrast between the brilliance of stars and the violence of disruptor
      fire. Kurn’s Bird of Prey decloaks here, its disruptors blazing as it fires
      on the Duras sisters’ vessel, forcing their retreat. The emptiness of space
      amplifies the tension, as every disruptor blast and shield collapse echoes the
      fragility of Gowron’s power. This location is not just a setting; it is a metaphor
      for the precarious nature of leadership in the Klingon Empire, where betrayal
      and loyalty are measured in split-second decisions.
