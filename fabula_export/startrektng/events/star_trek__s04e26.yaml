    power_dynamics: Exercising dominance through tradition and ritual. The Empire’s
      power in this moment is absolute, as it uses the ceremony to reinforce Gowron’s
      leadership and to bind Worf to its service. The absence of challengers (like
      Toral) and the unified support of the Klingons create a sense of inevitability,
      making the Empire’s authority feel unassailable. However, the looming threat
      of the Duras family and the civil war hints at the fragility beneath this display
      of strength.
    organizational_goals:
    - To solidify Gowron’s leadership by using the succession rite to legitimize his
      claim and to rally the warrior class behind him.
    - To restore the house of Mogh as a loyal and honorable part of the Empire, thereby
