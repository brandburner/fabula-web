  title: Worf reveals Khitomer betrayal to Gowron
  description: In a private confrontation aboard the *Enterprise*, Worf forces a reckoning
    with Gowron over the accusation of treason that has haunted him since Khitomer.
    After dismissing the transporter technician to ensure privacy, Worf directly challenges
    Gowron’s characterization of him as a traitor, revealing for the first time that
    he accepted discommendation to shield the Empire from Duras’ father’s betrayal—a
    secret that could have triggered a civil war. Gowron, caught between his personal
    respect for Worf and his political need to maintain Council support, refuses to
    restore Worf’s family name, exposing his own pragmatic limitations as a leader.
    The exchange underscores Worf’s moral dilemma—his loyalty to the Empire and his
    Klingon heritage colliding with Starfleet’s principles—and sets up Gowron’s vulnerability
    to the Duras family’s lingering influence. The moment also reveals Gowron’s awareness
    of the Council’s corruption, deepening the tension between personal honor and
    political survival.
