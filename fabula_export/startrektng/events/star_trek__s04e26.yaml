- fabula_uuid: cand_evt_scene_fcacf59caf759f99_01
  global_id: null
  title: Picard denies Toral’s claim, sparking Klingon schism
  description: "\n  In the Great Hall of the Klingon High Council, Picard delivers\
    \ his arbitration ruling, rejecting Toral’s claim to leadership on the grounds\
    \ that the young Klingon lacks battle experience and honor. His decision is rooted\
    \ in Klingon law—*G’now juk Hol pajhard*—which ties a son’s worth to his father’s\
    \ legacy. Though Picard acknowledges Duras’ noble lineage, he dismisses Toral\
    \ as unproven, reaffirming Gowron’s legitimacy. The ruling triggers immediate\
    \ backlash: Toral, emboldened by Lursa and B’Etor’s manipulation, defies Picard\
    \ and Gowron, rallying a majority of the Council to his side. The schism fractures\
    \ the High Council, leaving Gowron isolated with only a handful of loyalists.\
    \ Lursa and B’Etor exchange a knowing glance with Picard, signaling their strategic\
    \ victory—chaos serves their agenda regardless of the outcome. The scene ends\
    \ with Toral’s ominous warning to Picard and the visual symbolism of the emptying\
    \ hall, underscoring the collapse of Klingon unity and the looming civil war.\
    \ The event serves as both a turning point (Picard’s ruling) and a setup (Toral’s\
    \ rebellion), directly causing the Klingon civil war that follows.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e26
  scene_sequence: 16
  sequence_in_scene: 29
  key_dialogue:
  - 'PICARD: K''tal, this Council knows the law of heredity well. G''now juk Hol pajhard.
    A son will share in the honors or crimes of his father. Toral is Duras'' son...
    that has been established by the genetic scan. And it is heartwarming to see him
    embraced by the family of Duras... for they are an old and noble family. But with
    due respect to the traditions and laws of this High Council, there is no basis
    for accepting a petition for leadership from a boy who has fought no battles,
    shed no blood for his people, earned no honor for himself. Perhaps some day he
    shall. But not now.'
  - 'TORAL: Does the Federation dictate Klingon destiny or do we? Follow me. And I
    will show you honor.'
  - 'GOWRON: Then go... your blood will paint the way to the future.'
