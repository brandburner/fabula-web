      unused, surrounded by the hum of the transporter console. The room is otherwise
      empty, save for the transporter technician, who stands ready at her station.
    status_after_event: The transporter platform remains inactive, its purpose in
      this scene purely symbolic. The room is now empty, the technician dismissed,
      and the weight of the unresolved conflict lingers in the air.
