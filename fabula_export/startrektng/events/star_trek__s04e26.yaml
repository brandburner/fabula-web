- fabula_uuid: cand_evt_scene_ecae136c8e48d673_01
  global_id: null
  title: Picard compromises on Khitomer records
  description: "\n  Picard confronts Worf in the ready room after discovering Worf’s\
    \ unauthorized access to Starfleet’s classified records on the Khitomer massacre.\
    \ The exchange reveals Worf’s desperate need to clear his father’s name, while\
    \ Picard grapples with his own conflicted loyalties—both as a Starfleet officer\
    \ and as an arbiter in Klingon politics. Picard initially resists, invoking Starfleet’s\
    \ non-interference principles, but ultimately concedes, offering to release the\
    \ records to all parties, including the Duras family. The compromise underscores\
    \ the tension between duty and personal investment, with Picard admitting his\
    \ own struggle to maintain neutrality. Worf exits satisfied, but Picard remains\
    \ visibly troubled, his frustration compounded by an unexpected coded message\
    \ from the planet’s surface. The scene crystallizes the broader struggle between\
    \ Federation ideals and Klingon heritage, while foreshadowing deeper complications\
    \ in Picard’s role as arbiter.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e26
  scene_sequence: 13
  sequence_in_scene: 23
  key_dialogue:
  - 'PICARD: You are planning to use our files on the Khitomer massacre as evidence
    against Duras'' father?'
  - 'WORF: Yes, sir.'
  - 'PICARD: Mister Worf... do you not see an inherent conflict of interest... You
    are using your position as a Starfleet officer to affect political change on your
    planet... there could not be a worse compromise of our fundamental principles...'
  - 'WORF: Captain... you urged me to fight this battle... Do not tie my hands now...
    I must be able to prove my father''s innocence. The Federation records will do
    that.'
  - 'PICARD: Here I am lecturing you on a conflict of interest while I''m desperately
    trying to avoid one of my own. Do you think I wish to allow the Duras family to
    solidify their hold on the Council? Do you think I cannot see the implications
    for the Federation? And good Lord, Duras tried to have me killed! All of my instincts...
    my training... my very being as a Starfleet officer are at odds with my responsibilities
    as arbiter for the Klingon High Council. We walk the same tightrope between two
    worlds... you and I. We must try our very best to keep those worlds clearly separate...
    or we shall certainly fall.'
