  object_involvements:
  - object_uuid: ger_object_760769ea3cc9
    description_of_involvement: 'The Ceremonial Cloak of K’mpec, though not the central
      focus of this event, plays a crucial symbolic role. Picard places it on Gowron’s
      shoulders earlier in the scene, marking the formal transfer of leadership, but
      its presence during the blood oath ritual is a silent witness to the continuity
      of Klingon power. The cloak, heavy with the weight of K’mpec’s legacy, serves
      as a visual bridge between the past and present, reminding all in the Great
      Hall that Gowron’s rule is not just his own triumph, but a continuation of the
      Empire’s unbroken tradition. Its dark fabric and ornate design contrast with
      the bright blood on Worf’s hand, creating a visual metaphor: the old order (represented
      by the cloak) is being reinforced through the shedding of new blood (Worf’s
      oath).'
