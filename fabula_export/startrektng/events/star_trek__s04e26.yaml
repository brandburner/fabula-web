  title: Enterprise detects Klingon attack on Gowron
  description: 'Picard arrives on the *Enterprise* bridge to find Riker and Data already
    responding to an unfolding crisis: a Klingon Bird of Prey has ambushed Gowron’s
    flagship, the *Bortas*, during his leadership crisis. The tension escalates as
    Data reports a second attacker joining the assault, forcing Picard to confront
    the immediate threat to Worf’s life aboard the *Bortas*. His order to go to Red
    Alert marks the Federation’s forced entry into the Klingon succession conflict,
    crystallizing Worf’s divided loyalties and Picard’s strategic dilemma—whether
    to intervene or uphold non-interference. The scene hinges on the visual and auditory
    urgency of the attack, with the viewscreen displaying the *Bortas* under fire
    and Picard’s grim acknowledgment that the conflict has begun, setting the stage
    for Worf’s inevitable choice between Starfleet and Klingon honor.'
