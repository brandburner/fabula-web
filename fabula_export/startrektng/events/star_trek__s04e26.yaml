  title: Klingon warship disrupts Worf’s reckoning
  description: |2-

      In Worf’s quarters, Picard—acting as Worf’s *cha’DIch*—pressures him to reclaim his family’s honor by confronting the High Council’s discommendation. Worf resists, invoking patience as a weapon, but Picard counters that the lie of his dishonor must be challenged. Their tense, intimate exchange is abruptly cut short when Riker’s urgent comm reveals the *Bortas*, an unscheduled Klingon warship, has intercepted the *Enterprise* under the pretense of an escort. The interruption forces Worf to suppress his personal crisis, while Picard’s expression shifts from frustration to tactical alertness. The *Bortas*’s presence signals Gowron’s political instability and the Duras family’s escalating threat, pivoting the scene from internal conflict to external crisis. Worf’s whispered ‘Thank you, sir’—twice—reveals his conflicted relief at the distraction, as the Klingon warship’s arrival forces him to defer his reckoning with honor.
