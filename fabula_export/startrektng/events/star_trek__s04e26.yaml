  title: Worf resigns to join Gowron’s war
  description: "\n  In the Observation Lounge, Gowron formally invokes the Federation-Klingon\
    \ Treaty of Alliance to demand Picard’s military aid against the Duras family’s\
    \ coup. Picard rejects the request, invoking Federation non-interference policy,\
    \ but Gowron counters by citing past Federation meddling in Klingon affairs—exposing\
    \ the hypocrisy of neutrality. Worf, torn between duty and heritage, pleads with\
    \ Picard to intervene, arguing that the Duras family’s Romulan ties threaten the\
    \ Federation. Picard refuses, enforcing Starfleet’s principles, and orders Worf\
    \ to return to duty. When Worf requests leave instead, Picard leaves no room for\
    \ compromise, forcing Worf to choose. He resigns his commission, removes his combadge,\
    \ and joins Gowron’s cause, marking the irrevocable fracture of his dual identity.\
    \ The scene escalates the political crisis while crystallizing Worf’s long-standing\
    \ conflict between Klingon honor and Starfleet loyalty.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e26
