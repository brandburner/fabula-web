              **Operating under constraints** (non-interference policy) but **exerting influence** through personal relationships (Picard-Worf) and tactical responses (dealing with the *Bortas*). Starfleet’s power here is **indirect but significant**—it shapes Worf’s options and Picard’s arguments.
    organizational_goals:
