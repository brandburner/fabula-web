  key_dialogue:
  - |-
    LURSA: Welcome, Captain.
    PICARD: Your invitation was... unexpected.
    B'ETOR: We should have extended it much sooner.
  - |-
    PICARD: If I find Toral's challenge valid, the two of you will very quickly gain control of the Council... and Gowron will be found dead shortly thereafter. If I reject Toral's challenge, you will accuse me of doing it only to serve Federation interests. It will give you a rallying cry to declare war and overthrow Gowron.
    LURSA: You see very clearly, Captain. But one thing is missing. If you rule against us and we are victorious in a war against Gowron... B'ETOR: ...which we would be... LURSA: ...it would mean the end of the alliance with the Federation.
  - 'PICARD: You have manipulated the circumstances, ladies, with the skill of a Romulan.
    My decision will be announced at high sun tomorrow.'
