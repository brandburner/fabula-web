      the exchange of glances between Lursa, B’Etor, and Toral highlights the power
      dynamics at play. The home is not just a setting but a character in its own
      right, embodying the Duras family’s ambition and the fragility of their plans.
    observed_atmosphere: Tension-filled and conspiratorial, with an undercurrent of
