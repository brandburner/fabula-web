  object_involvements:
  - object_uuid: ger_object_12a6fe984fca
    description_of_involvement: 'The sturdy desk in the ready room serves as a neutral
      ground for their negotiation, its scarred surface a testament to past Klingon
      briefings and battles. Kurn paces near it as he unveils his plot, using it as
      a physical anchor for his passionate arguments. Worf, however, stands firm *beside*
      the desk rather than behind it, refusing to be positioned as a subordinate or
      a supplicant. The desk’s placement—between the brothers during their standoff—highlights
      the tension: it is neither a barrier nor a shield, but a shared space where
      their fates are decided. Its lack of decorative weapons (unlike the walls) suggests
      it is a place for strategy, not spectacle, making it the perfect stage for Worf’s
      calculated counterproposal.'
    status_before_event: Unoccupied but central to the room, its surface showing signs
      of prior use (scars, marks). Kurn gestures toward it as he speaks, treating
      it as a prop to emphasize his points.
    status_after_event: Unchanged in condition, but now imbued with the weight of
      their agreement. The desk’s role as a neutral zone is reinforced, as both brothers
      stand near it in a temporary truce, their hands resting on its edges like warriors
      sealing a pact.
    global_id: ger_object_12a6fe984fca
