  key_dialogue:
  - |-
    GUINAN: You know, I have a bet with the captain that I can make you smile before you make lieutenant commander.
    WORF: Not a good bet today.
  - |-
    GUINAN: Your son laughs and he's Klingon.
    WORF: He's a child. And part human.
    GUINAN: Oh, that's right and you're not. You're all Klingon. Except you don't laugh.
    WORF: I don't laugh because I don't feel like laughing.
    GUINAN: But other Klingons feel like laughing. What does that say about you... ?
    WORF: Perhaps it says... I do not feel like other Klingons.
  - 'GUINAN: The time will come when he''ll have to find out what it really means
    to be Klingon... Just as the time has come now for you, Worf.'
