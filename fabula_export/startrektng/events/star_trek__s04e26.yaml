  global_id: null
  title: Picard orders Enterprise withdrawal
  description: 'On the *Enterprise* bridge, Data reports the Bortas—Gowron’s flagship—under
    heavy attack, with critical systems failing and a distress signal transmitted.
    Riker challenges Picard’s decision to withdraw, arguing that Gowron’s survival
    is vital to Klingon stability and Worf’s safety. Picard, torn but resolute, reaffirms
    the Federation’s neutrality, ordering the *Enterprise* to retreat. The moment
    forces Worf’s divided loyalties into sharp relief: his Starfleet oath clashes
    with his Klingon honor, while Picard’s adherence to policy leaves both Worf and
    Gowron vulnerable. The scene underscores the Federation’s rigid neutrality as
    a liability when personal stakes collide with geopolitical principles, setting
    up Worf’s eventual resignation and the Duras sisters’ escalating coup attempt.'
