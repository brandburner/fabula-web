      the formal farewell ceremony) and collective action (the crew’s silent tribute).
    power_dynamics: Exercising authority over the ceremony’s structure (Picard’s commands)
      while respecting individual autonomy (Worf’s choice to leave). The organization’s
      presence is both authoritative and supportive, balancing discipline with emotional
      acknowledgment.
