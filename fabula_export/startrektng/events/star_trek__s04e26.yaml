      connection to Starfleet and commits him to Gowron’s cause. The table’s central
      position in the scene mirrors its role as the neutral ground where the conflict
      between Klingon honor and Starfleet duty plays out. Its surface, once a place
      for diplomatic discussions, becomes the site of a personal and institutional
      fracture.
    status_before_event: A pristine, unremarkable conference table in the Observation
      Lounge, used for routine discussions and strategy sessions.
