  object_involvements:
  - object_uuid: ger_object_ef12d6556e16
    description_of_involvement: The *Bortas*, Gowron’s flagship, is the epicenter
      of this event—a battered but symbolic vessel of Klingon power under siege. Its
      shields collapse under the Duras sisters’ disruptor fire, life support fails,
      and weapons go offline, leaving it vulnerable to destruction. Kurn’s timely
      intervention saves the ship, but its damaged state is a stark reminder of Gowron’s
      precarious grip on leadership. The *Bortas* is more than a vehicle; it is a
      stage for the power struggle unfolding within the Klingon Empire, and its survival
      is tied to Gowron’s political fortunes. The ship’s distress signals and failing
      systems create a sense of urgency, reinforcing the stakes of the ambush and
      the relief of its rescue.
    status_before_event: Under heavy attack; shields at critical levels, life support
      failing, weapons offline, distress signals broadcasting. The bridge is rocked
      by disruptor fire, and the crew braces for potential destruction.
    status_after_event: Damaged but functional; shields and life support restored
      to operational levels, though the hull bears the scars of the battle. The ship
      is no longer in immediate danger, but its vulnerability has been exposed, and
      Gowron’s leadership is now more dependent on external alliances.
    global_id: ger_object_ef12d6556e16
  - object_uuid: ger_object_4b7a778b8609
    description_of_involvement: Lursa and B'Etor’s Bird of Prey is the weapon of their
      treachery, a sleek and deadly vessel designed for ambush and sabotage. It fires
      disruptors at the *Bortas*, overwhelming its shields and targeting critical
      systems in a coordinated attack. Kurn’s Bird of Prey intervenes, firing disruptors
      that cripple the Duras sisters’ ship, forcing it to retreat and cloak. The Bird
      of Prey is not just a tool of war; it is a symbol of the Duras family’s ruthless
      ambition and their willingness to use violence to seize power. Its retreat marks
      a tactical defeat, but the threat it represents lingers, as the Duras family’s
      schemes are far from over.
    status_before_event: Fully operational; cloaked and ambushing the *Bortas* with
      disruptor fire, shields at maximum, weapons armed and targeting critical systems.
    status_after_event: Severely damaged; life support systems compromised, shields
      down, weapons offline. The ship retreats and cloaks, but its crew is alive,
      and the Duras sisters’ ambition remains intact.
    global_id: ger_object_4b7a778b8609
