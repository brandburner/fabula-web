  global_id: null
  title: Worf asserts authority over Kurn’s coup
  description: 'In the Bird of Prey’s ready room, Worf confronts Kurn after learning
    of his brother’s plan to assassinate Gowron—a dishonorable act that would destabilize
    the Klingon High Council. Kurn, embittered by Gowron’s refusal to restore their
    family’s honor, argues for a violent overthrow of the Council, framing it as a
    necessary purge of weak leadership. Worf rejects the proposal outright, invoking
    his status as elder brother to assert control over their family’s strategy. Though
