  title: Riker’s nightmare confession sparks investigation
  description: In Ten Forward, Riker confides in Troi about a disorienting, claustrophobic
    episode at the Conn console—one that mirrors a recurring nightmare. His visceral
    description of being trapped reveals deeper psychological distress, and Troi discloses
    that he is the third crew member to report similar emotional disturbances. The
    revelation prompts Riker to propose a group meeting to compare experiences, while
    Troi agrees to investigate further. This exchange marks the first step toward
    uncovering the alien subspace experiment threatening the *Enterprise*, shifting
    the narrative from individual trauma to a shared crisis. The scene establishes
    Riker as the emotional anchor of the mystery and Troi as the catalyst for collective
    action, while the subtext of unspoken fear underscores the escalating threat.
