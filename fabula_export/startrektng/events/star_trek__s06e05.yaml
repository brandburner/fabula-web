  - 'BEVERLY: His blood is transforming into some sort of... liquid polymer...'
  - 'BEVERLY: (hits communicator, urgent) Crusher to Sickbay -- get a plasma infusion
    unit to Deck Seven, Section Nineteen!'
  is_flashback: false
  location_uuid: ger_location_a07cbd496191
  theme_uuids: []
  arc_uuids: []
  participations:
  - character_uuid: ger_agent_5ea31c832e98
    emotional_state: Delirious with agony, his body and mind overwhelmed by the alien
      transformation, with no coherent thought beyond the pain.
    goals:
    - Survive the transformation and seek medical help to reverse the alien-induced
      changes.
    - Communicate the severity of his condition to Beverly and the medical team.
    what_happened: Lieutenant Hagler stumbles out of his quarters in a violent physical
      collapse, his skin a sickly blue-gray and his movements erratic and convulsive.
      He is delirious with pain, his body wracked by the alien-induced transformation.
      Beverly attempts to stabilize him, but his condition rapidly deteriorates. Hagler’s
      blood mutates into a viscous polymer, and he dies in Beverly’s arms, his body
      convulsing one final time before going limp.
    observed_status: Lieutenant Hagler stumbles out of his quarters in a violent physical
      collapse, his skin a sickly blue-gray and his movements erratic and convulsive.
      He is delirious with pain, his body wracked by the alien-induced transformation.
      Beverly attempts to stabilize him, but his condition rapidly deteriorates. Hagler’s
      blood mutates into a viscous polymer, and he dies in Beverly’s arms, his body
      convulsing one final time before going limp.
    beliefs:
    - He is dying, and there is no hope of recovery without immediate intervention.
    - The alien experimentation is responsible for his condition, and the *Enterprise*
      must act to stop it.
    observed_traits:
    - Vulnerable and suffering
    - Desperate for help
    - Physically and mentally broken by the alien experimentation
    importance: primary
    global_id: ger_agent_5ea31c832e98
  - character_uuid: ger_agent_f1a913dda0ad
    emotional_state: Shaken and grief-stricken, but maintaining professional composure
      to address the crisis and support her crew.
    goals:
    - Stabilize Hagler’s condition and reverse the alien-induced transformation using
      medical intervention.
    - Determine the cause of Hagler’s condition to inform the crew’s response to the
      alien threat.
    what_happened: Beverly Crusher races to Lieutenant Hagler’s quarters after detecting
      an emergency signal. She finds Hagler stumbling out in a violent physical collapse,
      his skin a grotesque blue-gray and his movements erratic. Beverly grabs hold
      of him, lowering him to the floor and scanning him with her medical tricorder.
      She reacts with shock as she discovers his blood mutating into a viscous polymer.
      Beverly calls for a plasma infusion unit, but Hagler’s condition deteriorates
      rapidly, and he dies in her arms. She stands, shaken, and looks to Picard and
      Riker, her expression a mix of grief and determination.
    observed_status: Beverly Crusher races to Lieutenant Hagler’s quarters after detecting
