- fabula_uuid: cand_evt_scene_27657703209b4654_02
  global_id: null
  title: Geordi’s VISOR malfunction triggers medical exit
  description: After investigating sabotage in the cargo bay’s sensor array, Geordi
    La Forge experiences a sudden, unexplained VISOR malfunction—first a sharp pain,
    then a creeping anxiety—that disrupts his focus mid-scan. His physical distress
    escalates from technical frustration to visceral discomfort, forcing him to abandon
    the integrity scan and seek immediate medical attention. The abruptness of his
    departure leaves Data to complete the critical work alone, while Geordi’s symptoms
    (linked to the sensor modifications and recurring crew nightmares) hint at a deeper,
    unresolved connection to the alien subspace experiments. The moment underscores
    the crew’s shared vulnerability and the escalating threat to their physiological
    and psychological stability, with Geordi’s exit marking a turning point in the
    investigation’s urgency.
