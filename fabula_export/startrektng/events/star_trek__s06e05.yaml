      \ Unlike the sensor array or the console, the tricorder offers no answers—it\
      \ can’t scan the alien interference, can’t diagnose Geordi’s anxiety, and can’t\
      \ alert the crew to the subspace experiments. Its presence is a cruel irony:\
      \ Geordi, the engineer who relies on his tools to navigate the unknown, is now\
      \ confronted with a threat that defies his technology. The tricorder’s silence\
      \ mirrors the crew’s growing helplessness.\n      "
