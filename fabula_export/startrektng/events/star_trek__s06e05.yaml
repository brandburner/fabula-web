  title: Graviton pulse countdown begins
  description: "\n  In Engineering, Geordi La Forge confirms the subspace homing signal’s\
    \ lock—its energy signature (K-E-V) matching the alien lab’s subspace frequency—while\
    \ Shipley verifies the graviton emitters are primed. Picard orders the pulse’s\
    \ initiation, but Data’s urgent COM transmission reveals the ship’s containment\
    \ field is failing in nine minutes, forcing the crew to execute a high-precision\
    \ maneuver under a brutal deadline. The tension escalates as Picard and Geordi\
    \ exchange a charged glance, acknowledging the stakes: the pulse must stabilize\
    \ the rupture *and* guide Riker’s rescue before the Enterprise is torn apart.\
    \ The scene pivots from technical execution to a race against structural collapse,\
    \ where every second of delay risks catastrophic failure.\n  "
