  - 'RIKER: I don''t have any problem getting to sleep... and I think I''m sleeping
    all night... but when I wake up, I feel exhausted...'
  - 'BEVERLY: This may be the result of a lack of REM sleep...'
  - 'RIKER: Warm milk toddy... you''re kidding.'
  - 'BEVERLY: The heat activates amino acids in the lactose -- which acts as a natural
    sedative. Besides, this is a recipe of the Captain''s Aunt Adelle. It''s delicious.'
