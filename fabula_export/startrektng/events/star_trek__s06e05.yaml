- fabula_uuid: cand_evt_scene_bd84c7142ed2bf5c_01
  global_id: null
  title: Riker Volunteers to Track Alien Signal
  description: 'In the wake of Hagler’s horrific death and the escalating spatial
    rupture in Cargo Bay Four, the senior crew gathers in the Observation Lounge to
    strategize. Geordi reveals the rupture’s expansion is accelerating, rendering
    beaming the affected sections impossible due to nucleonic interference. Picard
    presses for solutions, and Geordi proposes a graviton pulse to neutralize tetryon
    emissions—but only if they can locate the source in subspace. Worf suggests a
    homing device, but the crew debates how to deliver it. Riker seizes the moment,
    volunteering to carry the device himself, leveraging his repeated abductions as
    proof he’ll be taken again. The crew debates the risks—Beverly warns of a high-dose
    neuro-stimulant’s dangers, Troi questions whether the aliens will return him,
    and Picard reluctantly agrees, setting a deadline tied to the rupture’s progression.
    The scene pivots from technical crisis to personal sacrifice, with Riker’s offer
    framing the mission’s stakes: his life for the ship’s survival. The dialogue crackles
    with tension, balancing scientific pragmatism (Geordi/Data) and emotional urgency
    (Troi/Beverly), while Picard’s command decisions reflect the weight of leadership
    under existential threat. The event serves as a turning point, shifting from reactive
    problem-solving to proactive risk-taking, with Riker’s volunteerism becoming the
    linchpin of the plan.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e05
  scene_sequence: 18
  sequence_in_scene: 31
  key_dialogue:
  - 'GEORDI: We''ve set up a containment field in Cargo Bay Four. But the rupture
    just keeps expanding. I''d say we''ve got another five or six hours before it
    breaches the hull.'
  - 'RIKER: Yes, there is. Give it to me. It''s pretty clear I''ve been taken each
    of the past few nights... if I''m right, there''s every chance it''ll happen again
    tonight.'
  - 'TROI: If they send him back. Ensign Rager still hasn''t been returned...'
  - 'PICARD: We''ll wait as long as we can for you to be returned, Number One. But
    as soon as the spatial rupture threatens the ship... we''ll have to transmit that
    graviton pulse.'
