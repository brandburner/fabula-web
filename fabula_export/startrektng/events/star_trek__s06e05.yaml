  - character_uuid: ger_agent_8ebcc79c0a9f
    emotional_state: Curious and concerned—Data’s lack of fatigue allows him to notice
      the crew’s deterioration, but his inability to fully grasp their emotional states
      leaves him slightly adrift in this moment.
    goals:
    - Complete the structural integrity scan to assess the conduit’s stability.
    - Ensure Geordi receives medical attention for his VISOR malfunction and anxiety.
    what_happened: Data stands at the free-standing console, his fingers poised over
      the controls as Geordi requests his assistance. His curiosity is piqued by Geordi’s
      sudden distress—‘What is it?’—and he offers to run the structural integrity
      scan after Geordi’s departure. Unlike the organic crew, Data’s demeanor remains
      composed, but his concern for Geordi is evident in his gentle inquiry, ‘Are
      you alright, Geordi?’ His role here is that of the steady hand, picking up the
      slack as the human crew falters, his logic a counterbalance to the mounting
      chaos.
