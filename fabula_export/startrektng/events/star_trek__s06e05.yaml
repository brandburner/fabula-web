- fabula_uuid: act_197fc70a3e1192dc
  number: 1
  summary: The narrative opens with Commander Riker experiencing profound, unexplained
    exhaustion, leading him to oversleep and miss an important meeting. This personal
    struggle is juxtaposed with the Enterprise's mission to chart the dense Amargosa
    Diaspora, prompting Geordi and Data to implement a new sensor array modification
    to enhance efficiency. Later, at Data's poetry reading, Riker succumbs to his
    overwhelming fatigue, falling asleep in front of his colleagues. Following this,
    Beverly Crusher examines Riker, finding no physiological cause for his exhaustion
    and offering a folk remedy. Concurrently, the newly modified sensor array triggers
    a false EPS explosion alert in Cargo Bay Four, which Geordi initially dismisses
    as a glitch. Riker's fatigue persists, culminating in his disorientation when
    Geordi arrives for their morning appointment, revealing Riker has lost an entire
    night of sleep without conscious awareness. This sequence establishes a growing
    pattern of inexplicable personal and technological anomalies, setting the stage
    for a deeper mystery.
