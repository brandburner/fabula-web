    - Collective effort (Shipley and NDs executing supporting tasks),
    - Cultural norms (mutual respect, inclusion of personal interests like poetry
      readings).
    institutional_impact: Reinforces the *Enterprise*’s identity as a ship where technical
      innovation and personal connection are not mutually exclusive. The crew’s ability
