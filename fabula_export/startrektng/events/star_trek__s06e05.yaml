  global_id: null
  title: Crew reconstructs alien experiment table
  description: In the holodeck, Riker, Worf, Geordi, and Kaminer—guided by Troi—collaborate
    to reconstruct a fragmented nightmare memory, piecing together a metallic, inclined
    table with surgical restraints and alien tools. The process begins with vague
    recollections of a rectangular table, which they refine into a smaller, inclined
    metal surface. As the reconstruction progresses, they add a restraining arm, a
    swing-arm with a jagged-edged tool, and a blinding overhead light, each detail
    triggering deeper unease. The crew’s shared trauma surfaces as they realize the
    table resembles an alien experimentation device. Meanwhile, Data confirms his
    own 90-minute memory gap, and Beverly discovers Riker’s arm was surgically reattached,
    confirming the abductions. Picard orders a security lockdown, escalating the crisis
    as the crew confronts the psychological and physical horrors of their abductions.
