      the crew’s plan to track the tetryon emissions to their subspace source. Worf
      suggests its creation, and Geordi elaborates on how it could work with Riker’s
      volunteer mission. The device is designed to be small enough to be concealed
      on Riker’s body, yet capable of emitting a signal that the *Enterprise*’s sensors
      can track. Its successful deployment hinges on Riker’s abduction, making it
      a high-stakes gamble that could save the ship or doom him. The device is not
      yet built in this scene, but its conceptualization is the linchpin of the plan,
      symbolizing the crew’s shift from reactive problem-solving to proactive risk-taking.
    status_before_event: Conceptualized but not yet built—exists as an idea in the
