      and vulnerability.
    - A central table around which the officers gather, its surface acting as a silent
      witness to their debate.
    - Soft, ambient lighting that fails to dispel the shadows of fear and uncertainty
      in the room.
    - The absence of background noise, save for the occasional hum of the ship, amplifying
      the weight of every word spoken.
