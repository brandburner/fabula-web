  global_id: null
  title: Riker reclaims control in the lab
  description: In a moment of alien distraction caused by another subspace rupture,
    Riker seizes the opportunity to act. He moves deliberately from the examination
    table toward a nearby surface where his phaser and tricorder lie, exploiting the
    lab's instability to mask his movements. As he retrieves his equipment, two aliens
    detect his actions and advance toward him. Riker reacts with lethal precision,
    firing his phaser to neutralize both threats, their panicked screeches filling
    the lab. The tactical victory is short-lived, however, as he turns to rescue Ensign
    Rager and discovers her horrifically connected to alien instrumentation via tubes
    embedded in her neck. The approaching figure of another alien looms in the background,
    forcing Riker to confront the grim reality of the experiments—and the urgency
    of his mission to free his crew before it's too late. This moment marks a critical
    shift in the power dynamic, demonstrating Riker's resilience and setting the stage
    for his counteroffensive against the alien experimenters.
