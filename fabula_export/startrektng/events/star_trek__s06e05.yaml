- fabula_uuid: act_53788d1eb42e75f9
  number: 2
  summary: The inexplicable phenomena escalate beyond Riker's personal fatigue, affecting
    other crew members and ship systems. Lieutenant Worf exhibits an intense, primal
    aversion to a barber's scissors, an emotional response he cannot explain. Shortly
    after, Geordi La Forge's VISOR malfunctions twice in Cargo Bay Four, accompanied
    by a profound sense of anxiety and discomfort. His subsequent visit to Sickbay
    reveals a unique bacterial infection near his neural inputs, further deepening
    the mystery. Most alarmingly, Data discovers he has an inexplicable 90-minute
    memory gap, which occurred while he was alone in Cargo Bay Four. Simultaneously,
    Riker experiences a sudden, overwhelming feeling of being trapped when he sits
    at the Conn console, forcing him to abruptly vacate the position. These converging
    incidents, all linked to Cargo Bay Four, lead Geordi and Data to investigate further,
    culminating in their discovery of a pulsating bulkhead within the bay, emanating
    spatially-inverted tetryon particle emissions. This act dramatically expands the
    scope of the problem from individual experiences to a tangible, external threat
    impacting the ship and its personnel.
