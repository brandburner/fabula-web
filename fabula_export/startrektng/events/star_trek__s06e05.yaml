  title: Rupture countdown escalates crisis
  description: 'In the tense, high-stakes environment of Engineering, Picard demands
    an update from Geordi, who reveals the failure of their homing signal search.
    Data delivers the devastating news: the spatial rupture has expanded by 4.2% and
    will breach containment in just 14 minutes. Picard orders Geordi to divert auxiliary
    power to the failing field, but the command underscores the crew''s dwindling
    options. The scene amplifies the ticking clock, forcing immediate action while
    exposing the crew''s vulnerability against the alien threat. Geordi''s technical
    limitations and Data''s precise, emotionless delivery contrast with Picard''s
    mounting pressure, creating a moment of raw tension where the stakes are laid
    bare—failure now means certain destruction. The rupture''s visual distortion in
    the background serves as a constant, looming reminder of the crisis, while the
    dialogue reveals the crew''s desperation and the futility of their current strategies.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e05
  scene_sequence: 22
  sequence_in_scene: 38
  key_dialogue:
  - 'PICARD: Report.'
  - 'GEORDI: I still can''t locate the homing signal... We''ve covered the entire
    upper-subspace energy band. We''re extending the scan to adjacent energy levels...'
  - 'DATA: The rupture has expanded another four point two percent. Without further
    reinforcement, containment field integrity will fail in approximately fourteen
    minutes.'
  - 'PICARD: Can you divert more power to the containment field?'
  - 'GEORDI: I can try to augment the field with auxiliary power, but it won''t be
    much...'
  - 'PICARD: Make it so.'
