    counter-acting the graviton pulse... The rupture is beginning to expand again.'
  - 'GEORDI: Looks like somebody''s fighting back...'
  - 'PICARD: Can you strengthen the graviton pulse?'
  - 'GEORDI: I''ll try setting up a random frequency shift. If we can keep them from
    guessing our pulse modulation... they might not be able to compensate...'
  - 'GEORDI: They''re reacting faster than we can shift frequencies... Shipley --
    program the emitters for full spectrum pulse compression. I want to channel all
    of the graviton energy into a single burst... Let''s see if they can handle that...'
