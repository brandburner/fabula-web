    I remember the sensation of being trapped... and something about a smooth surface...'
  - 'WORF: I had a similar response... to a pair of scissors.'
  - 'GEORDI: When my VISOR cut out in the Cargo Bay, I had a weird feeling too...
    something about a smooth surface... Smooth... and cold... I think it was cold...'
  - 'KAMINER: Yes, cold...'
  - 'WORF: It was elevated... a platform...'
  - 'GEORDI: Right... a bench... Or a table...'
  - 'RIKER: Maybe there''s a way we can help ourselves remember more...'
