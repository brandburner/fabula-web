  key_dialogue:
  - 'DATA: ((reading)) Then we sat on the sand for some time and observed / How the
    oceans that cover this world were perturbed / By the tides from the orbiting moon
    overhead / How relaxing the sound of the waves is,'' you said. / I began to expound
    upon tidal effects / When you told me to stop, looking somewhat perplexed / So
    I did not explain why the sunset turned red / And we watched the occurrence in
    silence instead.'
  - 'RIKER: ((softly, to Troi)) I don''t understand this... I can barely keep my eyes
    open...'
  - 'DATA: You have prematurely anticipated my denouement, Commander. / However, I
    appreciate the sentiment. / I will continue.'
