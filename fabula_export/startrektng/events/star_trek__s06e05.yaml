  title: Riker stripped of defenses in alien lab
  description: Riker regains consciousness in a disorienting alien laboratory, immediately
    assessing his surroundings while feigning unconsciousness to avoid detection.
    The environment mirrors the Holodeck reconstruction but is more detailed and unsettling,
    with distorted perceptions, echoing sounds, and shadowy alien figures moving in
    the darkness. The aliens—never fully visible—systematically disarm him, removing
    his phaser, tricorder (left activated), and homing device, placing them on a pedestal
    within his line of sight. The removal of these tools signals the crew’s vulnerability
    and the aliens’ control over the situation, while Riker’s calculated stillness
    underscores his tactical awareness despite his compromised position. Nearby, Ensign
    Rager lies sedated on a platform, her blank expression reinforcing the lab’s experimental
    nature. The scene establishes the high-stakes interrogation to come, where Riker’s
    physical and psychological resilience will be tested against the aliens’ unknown
    methods.
