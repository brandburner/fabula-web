  object_involvements:
  - object_uuid: ger_object_0b93892aac7e
    description_of_involvement: 'Beverly Crusher’s neuro-stimulant hypospray is the
      medical countermeasure that will keep Riker conscious long enough to complete
      his mission. Administered with precision, the hypospray delivers a high-risk
      dosage designed to counteract the alien sedatives. Its use is a calculated gamble—too
      little and Riker will be vulnerable; too much and he could suffer permanent
      harm or death. The hypospray’s hiss as it injects the stimulant is a stark reminder
      of the medical risks Riker is taking. Its role in the scene is both functional
      and symbolic: it represents the crew’s efforts to give Riker every possible
      advantage, even as it underscores the mission’s dangers.'
    status_before_event: The hypospray is in Beverly’s possession in Sickbay, fully
      charged with the neuro-stimulant dosage. It is ready for use but not yet administered
      to Riker.
    status_after_event: The hypospray has been used to inject Riker with the neuro-stimulant.
      It is now empty or reset, its role in the mission fulfilled—for better or worse.
    global_id: ger_object_0b93892aac7e
  - object_uuid: ger_object_e9de4ac4c481
    description_of_involvement: 'Geordi’s modified tricorder is the crew’s lifeline
      to intelligence in the alien subspace. Locked into continuous scan mode, it
      will record data regardless of Riker’s physical state, ensuring that even if
      he’s incapacitated, the *Enterprise* may still gain critical insights into the
      aliens’ technology and environment. The tricorder is handed to Riker with a
      sense of urgency, its functional role extending beyond mere data collection—it
      symbolizes the crew’s hope that Riker will return with actionable information.
      Its presence in Riker’s possession is a tangible reminder of the mission’s dual
      purpose: rescue and reconnaissance.'
    status_before_event: Geordi is making final adjustments to the tricorder in Sickbay,
      ensuring it’s set to continuous scan mode. It is in his possession, fully functional
      but not yet in Riker’s hands.
    status_after_event: The tricorder is in Riker’s possession, strapped to his body
      or held in his hand as he prepares to depart for the alien subspace. It is active
      and recording, serving as both a tool and a silent witness to the mission’s
      unfolding events.
    global_id: ger_object_e9de4ac4c481
  - object_uuid: ger_object_7b1be0463654
    description_of_involvement: 'The neuro-stimulant itself is the medical edge that
      will allow Riker to remain conscious in the alien subspace, but it comes with
      severe limitations. Administered via hypospray, it counters the alien sedatives
      for a maximum of twelve hours—a window that is both a blessing and a curse.
      The stimulant’s effects are temporary, and its dosage is carefully calibrated
      to avoid lethal side effects. Its presence in the scene is a double-edged sword:
      it enables the mission but also serves as a ticking clock, a reminder that Riker’s
      time is limited and that failure is not an option. The stimulant’s role is purely
      functional, but its implications are deeply narrative, tying the mission’s success
      to a race against time.'
    status_before_event: The neuro-stimulant is contained within Beverly’s hypospray
      in Sickbay, ready for administration. It is in a stable, liquid form, fully
      potent but not yet injected into Riker.
    status_after_event: The neuro-stimulant has been injected into Riker’s system.
      It is now circulating in his body, counteracting the alien sedatives but also
      introducing the risk of overdose or adverse reactions. Its effects are temporary,
      with a twelve-hour window before it wears off.
