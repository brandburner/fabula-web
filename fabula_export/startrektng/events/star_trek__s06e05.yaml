  title: Riker endures silent interrogation under duress
  description: Riker lies strapped to an examination table in the alien lab, feigning
    unconsciousness while an unseen interrogator subjects him to a blinding neural
    scan. The alien probes his mind with a tool emitting a disorienting noise, forcing
    Riker to suppress his instinct to react as Rager—another captive—moans in pain
    nearby. His physical tension (sweating, clenched muscles) betrays his struggle
    to maintain composure, while the alien’s methodical scanning suggests a systematic
    extraction of information. The scene’s tension escalates when the alien briefly
    withdraws, leaving Riker to notice the homing device’s hidden activation—a silent
    lifeline for the trapped crew. The moment underscores Riker’s vulnerability as
    both subject and protector, with the alien’s tools and Rager’s suffering serving
    as reminders of the crew’s shared peril. The event’s quiet desperation contrasts
    with the ticking clock of the spatial rupture, heightening the stakes for Riker’s
    rescue mission.
