  - character_uuid: ger_agent_f1a913dda0ad
    emotional_state: Controlled exhaustion with underlying urgency—his fatigue is
      a liability he can’t afford to acknowledge fully, but it seeps into his interactions.
    goals:
    - Ensure the sensor array is secured to prevent further sabotage or system failures.
    - Maintain crew morale by acknowledging shared fatigue, even if briefly.
    what_happened: Riker stands beside Geordi, arms crossed, his posture rigid with
      command authority but his eyes betraying fatigue. He listens intently as Geordi
      traces the sabotage, nodding in agreement when the engineer questions the cause.
      His dialogue is measured, prioritizing ship safety over speculation, but his
      admission of sleeplessness—‘the second my head hits the pillow, it’s time to
      get up again’—reveals a crack in his usual stoicism. He exits abruptly, leaving
      the investigation unresolved, his departure underscoring the crew’s fragmented
      state.
