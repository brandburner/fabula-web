- fabula_uuid: cand_evt_scene_97c3ab2a8bf8f3de_01
  global_id: null
  title: Riker’s exhaustion disrupts Data’s poetry
  description: "\n  During Data’s poetry reading in Ten Forward, the android recites\
    \ a technically precise but emotionally sterile ode to his cat, Spot, using formal\
    \ meter and clinical language. The audience—including Riker, Geordi, Picard, Troi,\
    \ Worf, and Kaminer—grows increasingly restless as Data’s recitation drags on,\
    \ his lack of passion making the performance feel more like a lecture than a creative\
    \ expression. Riker, visibly exhausted from the cumulative effects of the alien\
    \ experiments and shared nightmares, struggles to stay awake, his fatigue manifesting\
    \ in stifled yawns and shifting posture. When he finally succumbs to sleep and\
    \ snores loudly, the moment becomes a public embarrassment, drawing attention\
    \ to his deteriorating physical and mental state. Data, ever composed, pauses\
    \ only briefly to acknowledge the interruption before continuing, but the incident\
    \ serves as a stark contrast between the android’s unshakable control and Riker’s\
    \ unraveling resilience. The scene underscores the psychological toll of the alien\
    \ abductions, foreshadowing the deeper crisis Riker will face as the mission escalates.\
    \ Troi’s concerned glances at Riker further highlight the crew’s growing unease,\
    \ while the audience’s discomfort reflects the broader tension permeating the\
    \ *Enterprise* as the subspace rupture looms.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e05
