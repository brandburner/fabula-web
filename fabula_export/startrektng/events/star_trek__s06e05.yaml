- fabula_uuid: cand_evt_scene_27657703209b4654_01
  global_id: null
  title: Riker and Geordi uncover sabotage
  description: "\n  In the Cargo Bay, Riker and Geordi investigate an EPS explosion\
    \ by examining a damaged bulkhead panel. Geordi traces the circuitry with a tricorder,\
    \ revealing that the explosion was triggered by unauthorized sensor modifications—something\
    \ he didn’t authorize. Their conversation exposes shared exhaustion, with Riker\
    \ admitting he’s barely sleeping, and Geordi’s yawns and distracted demeanor hinting\
    \ at deeper fatigue. Before they can resolve the issue, Geordi suddenly experiences\
    \ a sharp pain in his VISOR, followed by an unplaceable anxiety. He abruptly leaves\
    \ for Sickbay, leaving Data to continue the structural integrity scan alone. The\
    \ scene underscores the crew’s deteriorating physical and psychological state\
    \ while confirming deliberate tampering aboard the *Enterprise*, setting up a\
    \ larger conspiracy tied to the subspace anomalies and shared nightmares plaguing\
    \ the crew.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e05
  scene_sequence: 7
  sequence_in_scene: 12
  key_dialogue:
  - 'GEORDI: Just before the grid alarm sounded, we were running warp power through
    this junction... somehow, it must''ve tripped the internal scanners...'
  - 'RIKER: We can''t waste time chasing down sensor ghosts. Keep the array off-line
    until you have a chance to take a closer look.'
