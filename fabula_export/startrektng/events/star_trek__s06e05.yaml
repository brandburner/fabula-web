  title: Riker’s REM Sleep Diagnosis and Beverly’s Remedy
  description: 'In Sickbay, Riker—visibly exhausted—confides in Beverly about his
    persistent fatigue despite sleeping through the night, revealing his uncharacteristic
    vulnerability. Beverly’s medical scan finds no physical cause, but she diagnoses
    REM sleep deprivation, a symptom that subtly foreshadows his repressed trauma
    from the alien abduction. When Riker questions her unconventional prescription—a
    warm milk toddy—Beverly counters with scientific reasoning and a personal touch
    (the recipe belonging to Picard’s Aunt Adelle), blending professional expertise
    with emotional warmth. The exchange underscores Beverly’s dual role as both a
    trusted medical authority and a confidant, while Riker’s playful skepticism masks
    deeper unease. This moment serves as a quiet turning point: Beverly’s diagnosis
    hints at the alien experiment’s psychological toll, and her remedy—though simple—becomes
    a symbolic act of care amid the crew’s escalating crisis. The scene also reinforces
    Riker’s growing fragility, contrasting with his usual stoicism and setting up
    his later confrontation with the aliens.'
