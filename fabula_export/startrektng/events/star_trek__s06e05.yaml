- fabula_uuid: act_7918e89e8207538a
  number: 4
  summary: The crisis intensifies as a visible spatial rupture forms in Cargo Bay
    Four, threatening the Enterprise with a catastrophic hull breach. This escalating
    danger is underscored by the tragic return of Lieutenant Hagler, who dies shortly
    after from a grotesque transformation of his blood into a liquid polymer, confirming
    the lethal nature of the alien experiments. In a tense meeting in the Observation
    Lounge, Geordi explains the rupture's rapid expansion and Data confirms that nucleonic
    interference prevents beaming out the affected sections. Geordi proposes a desperate
    plan to close the rupture by neutralizing the tetryon emissions with a coherent
    graviton pulse, but this requires delivering the pulse directly to the source
    in subspace. Commander Riker, recognizing his repeated abductions, courageously
    volunteers to serve as bait, carrying a homing device to guide the Enterprise
    to the alien lab. Captain Picard, faced with no other viable option, reluctantly
    authorizes the perilous plan, setting a strict time limit for Riker's return before
    the ship's destruction. Beverly Crusher rapidly develops a potent neuro-stimulant
    to help Riker maintain consciousness during his next abduction, while Geordi finalizes
    the homing device and a modified tricorder for data collection. Riker, armed with
    these tools and a phaser, prepares himself for the terrifying certainty of his
    next abduction, ready to confront the unknown to save his ship and crew.
