  - 'DATA: "The structure of the bulkhead is being altered on a subatomic level. The
    metal itself is in a state of quasi-molecular flux."'
  - 'GEORDI: "Something from that deep in subspace shouldn''t be able to exist in
    our universe... But here it is."'
  - 'PICARD: "Does this pose a danger to the ship?"'
