- fabula_uuid: act_23190c139e0a0702
  number: 3
  summary: 'The Enterprise crew confronts the tangible evidence of an external, unknown
    force. Geordi and Data report the pulsating bulkhead and its spatially-inverted
    tetryon emissions to Captain Picard, confirming a dangerous, inexplicable subspace
    phenomenon originating from within the ship. Counselor Troi, having heard multiple
    accounts of intense emotional responses to ordinary objects, begins to connect
    the disparate experiences of the crew, recognizing a disturbing pattern. She convenes
    a meeting with Riker, Worf, Geordi, and civilian Kaminer, where they collectively
    recall fragmented elements of a shared dream. Using the holodeck, they meticulously
    reconstruct the environment from their collective subconscious: a cold, metallic,
    inclined operating table, bathed in a bright overhead light, featuring a chest
    restraint and a menacing, jagged, scissor-like tool. This chilling recreation
    provides a concrete image of their shared trauma. Further compounding the crisis,
    Data confirms his 90-minute memory loss was due to an actual absence from the
    ship, and the computer reveals Lieutenant Edward Hagler and Ensign Sariel Rager
    are missing. The gravity of the situation intensifies when Beverly Crusher examines
    Riker and discovers his arm has been surgically severed and reattached, providing
    irrefutable proof of alien abduction and invasive experimentation. This act transforms
    the mystery into a clear and present alien threat, revealing the horrifying reality
    of the crew''s experiences.'
