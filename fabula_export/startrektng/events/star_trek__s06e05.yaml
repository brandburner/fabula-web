- fabula_uuid: cand_evt_scene_0ca119ce851dd6d2_01
  global_id: null
  title: Crusher detects Geordi’s neural infection
  description: In Sickbay, Beverly Crusher examines Geordi La Forge after his sudden
    VISOR malfunction, discovering an anomalous bacterial infection near his neural
    interface—a strain not found in medical records. Her clinical suspicion escalates
    when the infection disrupts Geordi’s VISOR’s data stream, a critical malfunction
    that could impair his ability to function during the ongoing crisis. Beverly sterilizes
    the area and prepares a resonance tissue scan, marking the first step in mitigating
    a potential catastrophic failure in the ship’s most vital systems, given Geordi’s
    role as Chief Engineer. The scene underscores the alien threat’s insidious nature,
    as the infection suggests a deeper, unresolved connection to the subspace experiments
    plaguing the crew. Geordi’s vulnerability—both physical and professional—becomes
    a ticking clock, forcing the crew to address the crisis without their most technically
    skilled officer at full capacity.
