- fabula_uuid: cand_evt_scene_c1a2ca0d6e4e1937_01
  global_id: null
  title: Worf’s primal fear of scissors
  description: Worf visits the barbershop for a routine haircut, but Mot’s casual
    handling of scissors triggers an unexplained, violent panic response. The moment
    the blades glint in the light, Worf’s body reacts instinctively—grabbing Mot’s
    wrist in a defensive grip before abruptly standing and leaving. His reaction is
    raw, unfiltered, and deeply unsettling, revealing a psychological fracture tied
    to the subspace experiments. Mot, shaken, watches Worf exit without understanding
    the cause. The scene underscores Worf’s vulnerability, a stark contrast to his
    usual stoic demeanor, and hints at the alien experiments’ lingering trauma. The
    abruptness of the confrontation leaves both characters unsettled, with Worf’s
    fear lingering as an unresolved thread in the larger mystery of the crew’s shared
    nightmares.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e05
  scene_sequence: 6
  sequence_in_scene: 11
  key_dialogue: &id009
  - 'MOT: Mister Worf! My good Klingon, sir, welcome. It''s a pleasure to have you
    with us again... so soon.'
  - 'WORF: ((ominous)) Not like last time.'
  - 'MOT: I promise -- not too much off the top!'
