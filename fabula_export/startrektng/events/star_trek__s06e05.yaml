      Beverly calls for a plasma infusion unit, but Hagler’s condition deteriorates
      rapidly, and he dies in her arms. She stands, shaken, and looks to Picard and
      Riker, her expression a mix of grief and determination.
    beliefs:
    - Hagler’s condition is the result of alien experimentation, and the *Enterprise*
      must act to stop it before more crew members are affected.
    - Her medical expertise is critical to understanding and mitigating the threat
      posed by the alien force.
    observed_traits:
    - Highly skilled and resourceful in medical emergencies
    - Deeply empathetic and compassionate toward her patients
    - Resilient under pressure, maintaining professionalism even in crisis
    - Quick to adapt and take decisive action
    importance: primary
