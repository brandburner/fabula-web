    recognition failure.'
  - 'RIKER: Just a sensor glitch?'
  - 'GEORDI: That''s my guess.'
  - 'RIKER: Perform a level three diagnostic on the internal sensor network. Make
    sure we haven''t overlooked anything.'
  - 'RIKER: Maybe we should pick this up in the morning, Mister La Forge-- get a fresh
    start. And would you do me a favor? Stop by my quarters at oh-seven hundred hours.
    I''ve been having trouble waking up.'
  - 'GEORDI: Sure. Goodnight.'
  - 'RIKER: Goodnight.'
  - 'RIKER: ((calls out)) Who is it?'
  - 'GEORDI: ((O.S.)) Commander La Forge.'
  - 'RIKER: ((confused)) Morning? I just went to bed...'
