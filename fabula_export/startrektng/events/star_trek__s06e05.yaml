  title: Riker’s exhaustion disrupts Data’s poetry
  description: "\n  In Ten Forward, Data delivers a meticulously crafted but emotionally\
    \ sterile poetry reading to a dwindling audience. His recitation of an ode to\
    \ his cat, Spot, is technically flawless but devoid of passion, causing the crowd\
    \ to grow restless. Riker, visibly exhausted from the alien experiment’s lingering\
    \ effects, struggles to stay awake, his fatigue escalating into uncontrollable\
    \ snoring. The disruption halts Data’s performance, exposing Riker’s deteriorating\
    \ physical and psychological state. Troi’s concerned glance underscores the unspoken\
    \ tension—Riker’s exhaustion isn’t just sleep deprivation; it’s a symptom of the\
    \ alien abduction’s deeper trauma. The moment serves as a visceral reminder of\
    \ the crew’s shared vulnerability and the urgency of addressing the subspace rupture\
    \ before it consumes them. Data, ever composed, acknowledges the interruption\
    \ with android politeness, but the scene’s subtext reveals the fragility beneath\
    \ the *Enterprise*’s usual professionalism.\n  "
