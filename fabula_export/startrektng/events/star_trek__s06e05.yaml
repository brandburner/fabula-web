- fabula_uuid: cand_evt_scene_0cd897aa62e9a7f8_01
  global_id: null
  title: Hagler’s violent alien transformation
  description: 'Beverly Crusher races to Lieutenant Hagler’s quarters after detecting
    an emergency signal, only to find him stumbling out in a state of violent physical
    collapse. His skin has taken on a sickly blue-gray hue, and his movements are
    erratic, convulsive—clear signs of an alien-induced transformation. Beverly attempts
    to stabilize him, but her tricorder reveals a horrifying truth: his blood is mutating
    into a viscous polymer, a direct result of the subspace-based alien experimentation.
    As Picard and Riker arrive, Hagler’s condition deteriorates rapidly, and he dies
    in Beverly’s arms. The moment serves as a brutal confirmation of the crew’s exposure
    to the hostile alien force, escalating the stakes of their investigation and forcing
    the *Enterprise* to confront the lethal consequences of their enemy’s experiments.
    The grotesque spectacle leaves Picard and Riker visibly shaken, underscoring the
    urgency of their mission to neutralize the threat before more crew members suffer
    the same fate.'
