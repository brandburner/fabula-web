  - object_uuid: ger_object_f824dfcc82a5
    description_of_involvement: 'The **Mirror** in Riker’s quarters is a silent witness
      to his physical and emotional state. As he splashes water on his face, he pauses
      to look at his reflection—his tired eyes, unshaven face, and rumpled uniform.
      The mirror does not lie: it captures the toll of the shared nightmares and the
      weight of command. This object serves as a metaphor for self-awareness, forcing
      Riker to confront his exhaustion before rushing into the mission-critical discussion.
      His brief interaction with the mirror is a wordless acknowledgment of his vulnerability,
      a contrast to the confident, decisive leader he must become in Engineering.
      The mirror’s reflective surface also symbolizes the duality of his character:
      the man who values poetry and personal connections, and the officer who must
      prioritize duty.'
