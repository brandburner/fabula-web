  - object_uuid: ger_object_a9aa1ec56615
    description_of_involvement: 'The armband tracking device is the crew’s only means
      of monitoring Riker’s location once he enters the alien subspace. Geordi demonstrates
      its indicator light—a small but critical feature that will flash when the *Enterprise*
      locks onto Riker’s signal. This device is more than a piece of technology; it’s
      a lifeline, a fragile connection between Riker and his crew. Its blinking light
