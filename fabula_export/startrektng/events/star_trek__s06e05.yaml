  title: Crew shares fragmented nightmare memories
  description: |2-

      In the Observation Lounge, Counselor Troi leads a vulnerable group session where Riker, Worf, Geordi, and Kaminer reluctantly describe their shared but disjointed nightmare fragments. Riker recalls claustrophobic entrapment and a smooth surface, while Worf admits to an irrational fear of scissors tied to a dream. Geordi connects the sensations to a cold, elevated platform—possibly a table—triggering a collective realization that their experiences are not isolated but part of a coordinated, alien-induced phenomenon. The fragmented recollections begin to coalesce into a disturbing pattern, hinting at a larger, coordinated threat to the *Enterprise*. The scene establishes the crew’s shared trauma as a critical clue, shifting the investigation from individual incidents to a systemic alien experiment. Troi’s facilitation and Riker’s determination to uncover more drive the group toward the next step: recreating the environment in the holodeck to reconstruct the full memory.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e05
  scene_sequence: 13
