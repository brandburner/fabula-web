- fabula_uuid: cand_evt_scene_c68d0bcd2d25dc07_02
  global_id: null
  title: Alien abduction evidence confirmed
  description: "\n  The crew’s fragmented memories of a shared nightmare coalesce\
    \ into a chilling reconstruction of an alien experimentation table in the holodeck,\
    \ revealing the psychological and physical trauma of their abductions. As Riker,\
    \ Worf, Geordi, and Kaminer collaborate under Troi’s guidance, they piece together\
    \ a metallic, inclined table with surgical restraints and alien tools—including\
    \ a jagged-edged, single-grip instrument that triggers Worf’s unexplained fear\
    \ of scissors. The reconstruction’s eerie accuracy is interrupted by Data’s revelation\
    \ of a 90-minute memory gap in his internal systems, confirming that he, too,\
    \ was abducted. Picard’s subsequent discovery of two missing crewmembers (Hagler\
    \ and Rager) escalates the threat, prompting a ship-wide security lockdown. The\
    \ horror deepens when Beverly Crusher examines Riker’s arm and uncovers surgical\
    \ scars proving it was severed and reattached, confirming the aliens’ experimentation.\
    \ The scene shifts from psychological reconstruction to concrete evidence, forcing\
    \ the crew to confront the reality of their abductions and the looming subspace\
    \ rupture’s unnatural origin. The event serves as a turning point, transitioning\
    \ from investigation to urgent action as the crew races to locate the missing\
    \ officers and neutralize the tetryon emissions before the ship is destroyed.\n\
    \  "
