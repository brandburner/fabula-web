  title: Riker prepares as alien bait
  description: 'Riker lies in his quarters, fully armed and equipped with a tricorder
    and homing device, waiting for his own abduction by the alien experimenters. His
    deliberate choice to remain awake and prepared—rather than succumbing to exhaustion—signals
    a strategic shift from passive victim to active participant in the confrontation.
    The active tricorder suggests he is already monitoring for subspace anomalies,
    while his uniform and weapons indicate he is ready for immediate action. This
    moment of quiet anticipation underscores his resolve to turn the tables on the
    aliens, leveraging his knowledge of their methods to infiltrate their lab and
    rescue his crewmates. The tension lies in the contrast between his physical readiness
    and the psychological weight of what he is about to endure: voluntary submission
    to the very horror that has already traumatized him and his crew.'
