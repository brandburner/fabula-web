  global_id: null
  title: Tetryon rupture reveals external tampering
  description: In the Cargo Bay, Geordi and Data investigate a spatial rupture reported
    by Shipley, discovering that tetryon emissions—intensified by Geordi’s recent
    sensor array modifications—are coalescing at the rupture’s center. Geordi’s tricorder
    readings reveal the rupture’s unnatural modulation, suggesting deliberate control
    by an external force. Data confirms the rupture is expanding, risking a hull breach,
    while Geordi deduces that the sensor modifications may have drawn hostile attention.
    Their exchange shifts the investigation from internal malfunctions to an external,
    potentially hostile threat, escalating the crisis and linking the rupture to the
    crew’s shared nightmares and subspace instability. The scene pivots from technical
    analysis to existential danger, forcing the crew to confront an unseen adversary.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e05
  scene_sequence: 15
  sequence_in_scene: 26
  key_dialogue:
  - 'GEORDI: ((to Data, re: bulkhead)) Data -- the tetryon emissions have intensified.
    They seem to be focusing in this direction... ((continuing, re: rupture)) ...
    coalescing here... they''re reading as a point of subspace energy.'
  - 'GEORDI: Data... some of the signals from the modifications I made to the sensor
    array dipped pretty deep into subspace... Maybe they caught somebody''s attention...'
  - 'DATA: At the rate the rupture is expanding, we are in danger of a hull breach.'
