    creates an unobserved but vital lifeline for the trapped crew, setting up a potential
    escape vector that remains unknown to both captors and captives. This silent moment
    raises the stakes for Riker’s next move, as the device’s signal could be the key
    to his crew’s rescue—if he can exploit it without detection.
