  title: Finn’s identity confirms Troi’s visions
  description: In Sickbay, Beverly Crusher’s forensic analysis of bone fragments embedded
    in the *Enterprise*’s walls confirms they belong to Ensign Marla Finn, a crewmember
    reported missing eight years prior during the ship’s construction. When Troi recognizes
    Finn as the terrified woman from her recurring psychic visions, the physical evidence
    validates her supernatural connection to the murder—bridging the gap between the
    ship’s hidden past and her own unraveling mind. The revelation forces Troi to
    confront the possibility that her empathic flashes originated from the killer’s
    perspective, not Kwan’s, and that Pierce—whose face she now realizes she saw only
    as a distorted reflection—is the murderer. Worf, convinced of Pierce’s guilt,
    immediately demands a confrontation, shifting the investigation from speculative
    horror to targeted action. Meanwhile, Troi’s distracted observation of Worf and
    Calloway’s growing intimacy subtly underscores her emotional vulnerability amid
    the crisis, adding a layer of personal stakes to the unfolding mystery.
