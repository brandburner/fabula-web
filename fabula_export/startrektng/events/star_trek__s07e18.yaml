    night?'
  - 'WORF: No... of course not. Deanna... I do not regret being with you.'
  - 'TROI: I just... don’t feel myself. Maybe it’s the inhibitor—I’m so used to sensing
    what people are feeling... now I can’t.'
  - 'WORF: Perhaps I should talk to Lieutenant Pierce alone.'
