- fabula_uuid: act_e516f3d5b1810888
  number: 3
  summary: Troi's hallucination intensifies as she witnesses the man and woman from
    her vision embracing and mockingly laughing at her, before Worf manages to pull
    her back to reality. Reporting her bizarre experience to Picard, Beverly, and
    Data, Troi describes seeing through someone else's eyes and identifies a 'Utopia
    Planitia' toolbox, leading Picard to conclude she witnessed a past event from
    the ship's construction. Tasked with identifying the individuals, Troi and Worf
    meticulously sift through personnel files from Utopia Planitia. Their search yields
    Lieutenant Walter Pierce, the menacing man from Troi's vision, who is currently
    serving on the Enterprise. During their subsequent interview, Pierce denies any
    knowledge of unusual events or altercations during the ship's construction, and
    Troi finds herself unable to read his emotions, suggesting he possesses some telepathic
    ability or is deliberately concealing crucial information. Frustrated by his evasiveness,
    Troi and Worf decide to access Engineering logs for more information about him
    and the construction period. The act culminates in a moment of unexpected intimacy
    between Troi and Worf, as they share a passionate kiss in her quarters, adding
    a new, personal dimension to their professional partnership.
