  key_dialogue: &id011
  - |-
    TROI: Everything I've seen indicates he was well-adjusted and optimistic.
    WORF: Yes... I interviewed all of Kwan's co-workers. He observed nothing that indicated Kwan was contemplating ending his life. Nor did any of the others.
    TROI: It just doesn't make any sense...
  - |-
    TROI: I've been thinking about what happened to me in the nacelle tube... whether it was an empathic echo left by Kwan's death...
    WORF: In the past, have your empathic experiences always involved the physical presence of another person?
    TROI: All the ones I'm sure of, yes.
  - |-
    TROI: I keep thinking about Ensign Calloway... she needs to know what happened to Kwan -- it's the only way she'll ever be able to put his death behind her.
    WORF: She wishes they had acted on their feelings sooner... ?
    TROI: Yes. And I think... I think that's why I need to find out what really happened.
