  title: Troi’s psychic disturbance in nacelle control
  description: Counselor Troi enters the nacelle control room to investigate Lieutenant
    Kwan’s suicide, where she encounters Lieutenant Nara, who reveals Kwan’s duality
    as both a brilliant but ambitious engineer and a well-liked colleague. As Troi
    examines Kwan’s station, she is suddenly overwhelmed by a visceral psychic disturbance—a
    wave of panic and dread—triggered by the ship’s empathic residue. The experience
    leaves her visibly shaken, foreshadowing the deeper trauma tied to the Enterprise’s
    construction and Kwan’s death. Nara’s return interrupts the moment, but Troi’s
    disorientation hints at the unresolved horror she will soon confront.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e18
  scene_sequence: 14
  sequence_in_scene: 17
  key_dialogue: &id007
  - |-
    NARA: I'm sorry—
    TROI: I didn't see you there...
  - |-
    TROI: Did you notice any change in his behavior recently?
    NARA: No... It's as if something in him just... snapped.
  - |-
    NARA: He was... ambitious. He came in here with all sorts of new ideas about how to do things—some of them very good ideas.
    TROI: But not all?
    NARA: No. But once he settled in, we got along fine.
  - |-
    NARA: Are you all right?
    TROI: I... don't know...
