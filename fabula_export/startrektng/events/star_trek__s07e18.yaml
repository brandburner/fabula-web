- fabula_uuid: act_c22731b5f115a99d
  number: 4
  summary: 'The morning after their shared intimacy, Troi and Worf share a tender
    moment, but their personal connection is quickly interrupted by the demands of
    their investigation. Dr. Crusher informs Troi that the empathic inhibitor is ready,
    and Worf is called away to assist with medical supplies, leaving Troi to proceed
    to the nacelle control room with Data and Geordi. Troi takes the inhibitor, which
    successfully dampens her empathic abilities. Guided by her fragmented memories
    from the hallucination, she directs Geordi to a specific wall panel in the injector
    room, which Lieutenant Nara confirms Kwan was working on before his death. As
    Geordi opens the panel, Troi experiences another powerful empathic flash, again
    seeing the terrified woman and Lieutenant Pierce. Data''s scans then reveal human
    bone fragments embedded within the wall, shocking the crew. In Sickbay, Ensign
    Calloway identifies the remains as Ensign Marla Finn, reported missing from Utopia
    Planitia eight years prior. Troi realizes she couldn''t have been seeing through
    Kwan''s eyes, as he arrived after Finn''s disappearance, and deduces she was seeing
    through Pierce''s perspective, with Finn being terrified of him. As Worf and Troi
    prepare to confront Pierce, Troi expresses renewed insecurity about her suppressed
    empathic abilities and her relationship with Worf, who reassures her. The act
    concludes with a chilling cliffhanger: Troi returns to her quarters, expecting
    Worf, only to find Lieutenant Pierce waiting for her inside.'
