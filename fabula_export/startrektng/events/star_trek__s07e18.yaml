  title: Troi bypasses security to confront Calloway
  description: Counselor Troi hesitates outside Ensign Calloway’s quarters, her empathic
    instincts overriding protocol. After a moment of internal conflict—where she questions
    whether to announce herself or force entry—she overrides the security lock using
    her authorization code. The door opens, revealing her willingness to violate Starfleet
    protocols in pursuit of the truth about Kwan’s suicide and the psychic residue
    haunting the *Enterprise*. This act underscores her emotional unraveling and the
    investigation’s escalating stakes, as she crosses an ethical boundary that mirrors
    the moral decay she senses in the ship’s hidden history. The moment is charged
    with tension, as Troi’s desperation to uncover the truth clashes with her professional
    duty, setting the stage for her confrontation with Calloway and the potential
    fallout of her actions.
