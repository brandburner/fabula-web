    description_of_involvement: 'The nacelle control room is the primary setting for
      Kwan’s suicide and the crew’s failed intervention. Its industrial design—wall
      panels, free-standing consoles, the ladder to the catwalk, and the observation
      window—creates a claustrophobic, high-stakes environment. The room’s layout
      forces the crew into specific roles: Riker and Worf as active responders, Nara
      as a reluctant observer, and Kwan as the tragic figure at the center. The plasma
      stream’s glow, bleeding through the translucent maintenance door, casts an eerie
      light that amplifies the horror, making the room feel like a liminal space between
      life and death.'
    observed_atmosphere: Tension-filled with whispered conversations, punctuated by
      alarms and the hum of the plasma stream. The air is thick with dread, the crew’s
      movements stiff and deliberate, as if they are all holding their breath. The
      glow of the plasma creates a surreal, almost hallucinatory quality, blurring
      the line between the physical and the psychological.
