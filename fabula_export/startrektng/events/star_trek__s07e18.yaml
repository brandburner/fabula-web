    emotional_state: A fragile equilibrium of relief (finally, a name) and creeping
      dread (what this man represents). Her exhaustion is palpable, but the recognition
      of Pierce ignites a determined fire—she is no longer chasing echoes, but a tangible
      threat.
    goals:
    - To identify the man from her visions and ground her empathic experiences in
      concrete evidence.
    - To transition from passive investigation to active confrontation, ensuring the
      crew’s safety.
    what_happened: Troi is hunched over the aft science station console, her fingers
      moving with weary precision across the controls as she sifts through thousands
      of personnel records. Dark circles under her eyes betray her exhaustion, but
      her Betazoid heritage sharpens her focus when Pierce’s face appears on the monitor—her
      breath catches, and her body tenses as if physically struck by the recognition.
      She speaks in clipped, efficient bursts, her voice betraying a mix of relief
      and dread as she confirms his identity and location. The moment Pierce is named,
      she and Worf exchange a glance that is equal parts validation and foreboding,
      and they move as one toward the turbolift, her empathic burden now paired with
      a clear, external target.
