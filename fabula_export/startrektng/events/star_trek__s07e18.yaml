  title: Troi deciphers Pierce’s murder through empathic residue
  description: In the Observation Lounge, Troi and the senior staff analyze her traumatic
    empathic encounter with Pierce’s psychic imprint. Data confirms Pierce’s latent
    Betazoid telepathy, while Geordi’s scan reveals cellular residue in the ship’s
    wall—an empathic signature from the plasma discharge that killed Pierce and his
    victims. Troi deduces Pierce murdered his lovers in a fit of rage, then staged
    his own death to cover the crime. The revelation forces the crew to confront the
    ship’s buried violence and Troi’s own vulnerability to its psychic echoes. Worf’s
    presence is framed as the only reason she didn’t replicate Pierce’s suicide leap,
    underscoring the lingering danger of the Enterprise’s hidden traumas. The scene
    pivots from investigation to existential dread as the team realizes the ship itself
    may be complicit in preserving Pierce’s violent legacy.
