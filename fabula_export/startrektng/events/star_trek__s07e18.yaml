  global_id: null
  title: Troi shares grandfather’s story
  description: In the quiet of her quarters, Troi invites Worf to sit while reviewing
    Kwan’s logs, revealing no signs of distress in the deceased lieutenant. Their
    conversation shifts to Troi’s empathic experiences—first in the nacelle tube,
    then to a childhood memory of her grandfather’s silent, telepathic storytelling.
    Worf responds with unexpected openness, admitting his own Klingon traditions of
    seeking visions in fire. The moment deepens when Troi reflects on Calloway’s regret
    over unspoken love for Kwan, subtly mirroring her own unacknowledged feelings
    for Worf. Their eyes meet briefly, but Worf abruptly excuses himself, leaving
    Troi alone with the weight of their unresolved connection. The scene underscores
    Troi’s vulnerability and Worf’s struggle to reconcile Klingon stoicism with emotional
    intimacy, setting up his later, flustered confession to Riker.
