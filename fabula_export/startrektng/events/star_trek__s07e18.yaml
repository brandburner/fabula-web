- fabula_uuid: act_eaa1b38aa6a1ea95
  number: 5
  summary: 'The final act plunges Troi into a terrifying psychological climax. Upon
    finding Pierce in her quarters, Troi immediately calls security. Pierce claims
    Worf sent him and left, but the computer reveals Worf is in Ensign Calloway''s
    quarters. Troi rushes there, only to discover Worf and Calloway in a passionate
    embrace, laughing mockingly at her—a clear, distressing parallel to her earlier
    hallucination. Overwhelmed by betrayal and rage, Troi grabs Worf''s phaser and,
    in her hallucinatory state, kills him. Fleeing in horror, she encounters Pierce,
    who calmly tells her, ''You know what you have to do.'' Driven by despair, Troi
    makes her way to the nacelle control room, climbs to the catwalk, and is drawn
    to the plasma stream, preparing to jump, echoing Kwan''s suicide. At the last
    moment, the real Worf pulls her back, revealing that the entire sequence, from
    Pierce''s appearance in her quarters, was an intense, seconds-long hallucination.
    In the Observation Lounge, the mystery is finally resolved: Data confirms Pierce
    was partially telepathic and, along with Finn and another man, died in a plasma
    discharge eight years ago. Troi deduces Pierce murdered Finn and her lover in
    a fit of rage over their affair, then committed suicide, his empathic signature
    imprinted in the wall residue. Geordi confirms the presence of Pierce''s empathic
    signature, which triggered Troi''s experiences. Troi realizes her mind created
    a parallel narrative from her own life, nearly leading her to self-destruction.
    The episode concludes with Troi cryptically telling Worf, ''Hell hath no fury
    like a woman scorned,'' leaving him to ponder the implications of her hallucination
    and their burgeoning relationship.'
