  title: Troi murders Worf in jealous rage
  description: Counselor Troi, already psychically destabilized by the *Enterprise*'s
    dark residue and the trauma of reliving Ensign Finn’s murder, enters Ensign Calloway’s
    quarters unannounced and discovers Worf and Calloway in a passionate embrace.
    The sight triggers a hallucinatory rupture—Worf and Calloway’s laughter mirrors
    the mocking couple from Troi’s earlier visions, amplifying her paranoia and betrayal.
    In a frenzied state, she grabs Worf’s phaser and shoots him point-blank, killing
    him instantly. Calloway’s horrified accusation—‘He’s dead... you killed him’—snaps
    Troi back to reality, but the damage is irreversible. The act is a violent climax
    of her psychic unraveling, fueled by the ship’s lingering trauma, her own vulnerability,
    and the erosion of trust between her and Worf. Troi flees in shock, the murder
    marking the point of no return in her descent into self-destruction and the investigation’s
    collapse into chaos.
