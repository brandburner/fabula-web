- fabula_uuid: cand_evt_scene_51ad34b88846ef58_01
  global_id: null
  title: Troi’s Empathic Breakthrough in Injector Room
  description: "\n  Counselor Troi enters the injector room as Data and Geordi remove\
    \ a wall panel, triggering a violent empathic flashback that forces her to relive\
    \ the murder of Ensign Marla Finn. The psychic residue—linked to the ship’s construction—overwhelms\
    \ Troi, causing disorientation and physical distress. When she regains focus,\
    \ she insists something is hidden behind the conduit, prompting Geordi to scan\
    \ the area. His tricorder reveals organic material embedded in the wall, which\
    \ Data confirms as bone fragments. Geordi’s emitter beam exposes skeletal remains—a\
    \ forearm, skull, and ribs—concealed within the ship’s structure. The discovery\
    \ confirms Troi’s visions as factual, linking Kwan’s suicide to a buried crime\
    \ and shifting the investigation from psychological trauma to forensic evidence.\
    \ The moment marks a turning point: the ship itself becomes a witness, and Troi’s\
    \ empathic abilities are validated as a critical tool in uncovering the truth.\n\
    \  "
