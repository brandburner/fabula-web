  title: Troi detains Pierce after Worf’s unexplained absence
  description: Troi, already psychically unmoored from her investigation into Kwan’s
    suicide, expects Worf in her quarters but is instead confronted by Lieutenant
    Pierce, whose presence triggers her deepening paranoia. When Pierce claims Worf
    sent him—contradicting their earlier agreement—Troi’s suspicion spikes. She attempts
    to contact Worf directly, only to learn via the computer that he is in Ensign
    Calloway’s quarters, a revelation that stokes her emotional vulnerability and
    distrust. The scene escalates as Troi, acting on instinct, orders Pierce detained
    by security, marking a turning point where her professional caution collides with
    her unraveling mental state. The moment underscores her psychological fragility
    and the growing tension between her empathic exposure and her need for control,
    foreshadowing her eventual confrontation with Pierce’s true role in the murder
    she’s reliving.
