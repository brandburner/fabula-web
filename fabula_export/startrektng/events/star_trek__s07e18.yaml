acts:
- fabula_uuid: act_16c33f08f8a19625
  number: 1
  summary: The first act, including the teaser, establishes the central mystery of
    Lieutenant Kwan's inexplicable suicide. Kwan, a seemingly well-adjusted officer,
    jumps into the Enterprise's plasma stream despite Commander Riker's attempts to
    intervene. Captain Picard tasks Counselor Troi and Lieutenant Worf with investigating
    the baffling death. Their initial inquiries reveal Kwan had an exemplary record,
    was planning future activities with his girlfriend, Ensign Calloway, and showed
    no signs of distress. Calloway, heartbroken, implores Troi to uncover the truth,
    noting Kwan's unusual empathic sensitivity. Troi's solo investigation in the nacelle
    control room, the site of Kwan's death, culminates in her being overwhelmed by
    a sudden, intense flood of fear, rage, and panic. This visceral experience leaves
    her profoundly shaken and hints at a deeper, unseen force at play within the ship,
    suggesting the mystery is far more complex than a simple suicide. This act meticulously
    sets up the central narrative enigma and introduces the initial supernatural element
    that will drive the subsequent investigation.
