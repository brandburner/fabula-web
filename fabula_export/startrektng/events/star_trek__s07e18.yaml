  title: Troi and Worf examine Kwan’s suicide
  description: In her quarters, Counselor Troi reviews Lieutenant Kwan’s personal
    logs, finding no indication of distress—only evidence of his deep affection for
    Ensign Calloway. When Worf arrives to report that Kwan’s colleagues detected no
    signs of suicidal intent, Troi’s unease grows. She shares a personal anecdote
    about her grandfather’s telepathic storytelling, drawing a parallel to her recent
    empathic experience in the nacelle tube. Their conversation reveals Troi’s determination
    to uncover the truth for Calloway’s sake, while Worf’s abrupt departure hints
    at his unresolved feelings. The scene deepens the mystery of Kwan’s death and
    subtly explores Troi and Worf’s unspoken emotional connection, foreshadowing the
    darker forces at play aboard the *Enterprise*.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e18
