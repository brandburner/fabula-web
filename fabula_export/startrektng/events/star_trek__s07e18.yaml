- fabula_uuid: act_225babcdfca84d6d
  number: 2
  summary: Following her traumatic empathic experience, Troi reports her symptoms
    to Dr. Crusher, Commander Riker, and Lieutenant Worf. Dr. Crusher diagnoses elevated
    levels of psilosynine, a neurotransmitter associated with telepathy, and suggests
    Troi's experience might be an 'empathic echo' left by Kwan's death, given his
    partial empathic abilities. Despite the potential danger, Troi insists on returning
    to the nacelle control room with Worf to gain further insight. While reviewing
    Kwan's logs, Troi and Worf find nothing unusual, reinforcing the mystery. They
    discuss Troi's childhood experiences with telepathic echoes, further legitimizing
    the possibility of such a phenomenon. Worf, grappling with unexpressed feelings,
    awkwardly probes Riker about dating, hinting at his growing affection for Troi.
    Upon their return to the nacelle control room, as Worf opens the maintenance door
    to the plasma stream, Troi is plunged into a vivid, disorienting hallucination.
    She perceives a terrified woman and a menacing man in an unfinished version of
    the control room, alongside a 'Utopia Planitia' toolbox, suggesting a past event
    from the ship's construction. The vision leaves her alone and deeply confused,
    marking a significant escalation of the mystery.
