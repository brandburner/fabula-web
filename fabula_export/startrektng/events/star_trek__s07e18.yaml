    description_of_involvement: Starfleet is the overarching institutional framework
      that shapes the crew’s actions and the parameters of their investigation. The
      organization’s protocols (personnel records, security measures, chain of command)
      provide the tools Troi and Worf use to identify Pierce, while its values (truth,
      justice, protection of the crew) drive their urgency. Starfleet’s presence is
      implicit but pervasive—it is the reason the personnel records exist, the reason
      Worf’s security duties are paramount, and the reason Troi’s empathic insights
      must be validated through data. The organization’s role is to provide the structure
      within which the crew operates, even as it becomes a target of the investigation
      (Pierce’s actions are a betrayal of Starfleet’s trust).
    active_representation: Through institutional protocols (access to personnel records,
      security procedures) and the crew’s adherence to its values (pursuit of truth,
      protection of the crew). Starfleet is manifested in the ship’s systems, the
      crew’s roles, and the ethical framework guiding their actions.
    power_dynamics: Starfleet exercises authority over the crew through its hierarchical
      structure (Worf reports to Picard, Troi’s empathic insights must align with
      data), but the crew also challenges the organization’s assumptions (e.g., Troi’s
      psychic impressions force a reconsideration of past events classified as accidents).
      The power dynamic is collaborative but fraught with tension, as the crew navigates
      the gap between institutional procedure and personal intuition.
    organizational_goals:
    - To resolve the psychic disturbances aboard the Enterprise and neutralize the
      threat posed by Pierce.
    - To uphold the integrity of its personnel records and investigative processes,
      ensuring that past incidents (e.g., the murder at Utopia Planitia) are not repeated.
    influence_mechanisms:
    - Through its institutional resources (personnel databases, security protocols,
      chain of command), which shape the crew’s investigation.
    - Through its ethical framework (pursuit of truth, protection of the crew), which
      motivates Troi and Worf’s actions.
    - Through its historical context (Utopia Planitia, the murder), which provides
      the backstory for the present crisis and influences the crew’s understanding
      of the threat.
    institutional_impact: Starfleet’s involvement in this event highlights the tension
      between institutional procedure and personal intuition, as well as the organization’s
      vulnerability to internal betrayal. The investigation into Pierce’s actions
      forces a reckoning with Starfleet’s past failures (e.g., misclassifying the
