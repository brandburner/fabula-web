  title: Troi and Worf interrogate Pierce about Utopia
  description: In a tense, controlled interrogation in Engineering, Counselor Troi
    and Lieutenant Worf confront Lieutenant Pierce about his time at Utopia Planitia
    and his potential connection to Lieutenant Kwan’s death. Troi probes Pierce’s
    memory of the nacelle control room, where she experienced a traumatic empathic
    vision, while Worf presses for concrete details. Pierce deflects with vague responses,
    his body language betraying unease when Troi reveals she saw him in her vision.
    She subtly warns him that her empathic abilities could detect deception, leaving
    him with a veiled threat to come forward if he recalls anything. The exchange
    deepens the mystery of Kwan’s suicide, exposes Pierce’s potential complicity or
    fear, and escalates the investigation’s stakes by forcing him into a defensive
    position. The scene hinges on Troi’s psychological pressure and Pierce’s evasiveness,
    with Worf’s presence reinforcing the authority of the inquiry. The confrontation
    ends ambiguously, with Pierce’s guarded responses suggesting he knows more than
    he admits, while Troi’s empathic leverage leaves him with no clear way to avoid
    further scrutiny.
