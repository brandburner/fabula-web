  title: Troi uncovers Kwan’s empathic sensitivity
  description: In Beverly’s office, Counselor Troi interviews Calloway, Kwan’s grieving
    girlfriend, to gather insights into his state of mind before his suicide. Calloway
    reveals Kwan’s unusual emotional sensitivity—likely inherited from his Napean
    mother—along with a recent professional tension with Lieutenant Nara. This revelation
    deepens Troi’s suspicion that Kwan’s death was not a simple act of despair but
    a response to something far darker, particularly given his empathic abilities.
    The conversation also underscores Calloway’s conviction that Kwan would never
    have taken his own life, compelling Troi to probe further into the psychic residue
    haunting the *Enterprise*. The exchange serves as a critical turning point, shifting
    Troi’s investigation from a routine inquiry into a search for hidden trauma and
    potential foul play. The emotional weight of Calloway’s grief and her insistence
    that Kwan’s death was uncharacteristic further motivates Troi to confront the
    ship’s buried secrets, setting the stage for her later empathic confrontation
    with the psychic residue in the nacelle tube.
