  title: Troi deciphers vision’s Utopia Planitia origin
  description: In the observation lounge, Troi recounts her traumatic vision to Picard,
    Beverly, Data, and Worf, revealing it as a suppressed memory of a murder during
    the *Enterprise*-D’s construction at Utopia Planitia. The mention of a tool crate
    labeled with the shipyard’s name prompts Data to confirm the location, while Troi’s
    description of seeing through someone else’s eyes—likely Kwan’s—suggests an empathic
    link. Picard presses her to identify the faces she saw, particularly a red-haired
    man whose presence feels eerily familiar. Beverly proposes an empathic inhibitor
    to help Troi revisit the control room without being overwhelmed, setting up the
    next phase of the investigation. The scene establishes the vision’s historical
    roots, introduces a potential suspect, and shifts the focus from Kwan’s suicide
    to a buried crime tied to the ship’s past. The tension lies in Troi’s unresolved
    trauma and the crew’s growing realization that the *Enterprise* itself may be
    hiding a dark secret.
