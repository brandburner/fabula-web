  title: Kwan’s suicide in the plasma stream
  description: In the nacelle control room, Riker and Worf arrive to find Lieutenant
    Kwan standing on a catwalk, poised to leap into the active plasma stream. Kwan,
    visibly traumatized and muttering about unseen tormentors who ‘laughed at me,’
    is unresponsive to Riker’s attempts to calm him. Worf unlocks the plasma controls,
    but the venting process is too slow—Kwan, convinced of his fate, steps into the
    forcefield and is instantly vaporized. The moment captures the futility of intervention
    and the horror of an unseen psychological force driving Kwan’s actions, foreshadowing
    the deeper psychic corruption aboard the *Enterprise*. Riker’s failure to stop
    him underscores the helplessness of the crew against this unseen threat, while
    Kwan’s final words hint at the empathic residue that will later consume Troi.
    The scene’s stark visuals—Kwan’s silhouette against the plasma’s glow, Riker’s
    outstretched hand—emphasize the tragedy’s inevitability and the crew’s growing
    unease about the ship’s hidden past.
