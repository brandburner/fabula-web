- fabula_uuid: cand_evt_scene_19b9f0f6f6858e1b_02
  global_id: null
  title: Troi’s Empathic Link to Kwan’s Vision
  description: In the Observation Lounge, Counselor Troi recounts her disorienting
    empathic experience to Picard, Beverly, Data, and Worf, describing how she saw
    through someone else’s eyes during a traumatic event in the Enterprise’s control
    room eight years prior. The group theorizes that Troi may have psychically connected
    with Lieutenant Kwan, a partially empathic crewmember, and that her vision could
    be tied to his suicide. Picard tasks Troi with identifying the faces from her
    vision by reviewing personnel files from Utopia Planitia, while Beverly proposes
    synthesizing an empathic inhibitor to help Troi revisit the control room without
    being overwhelmed. The discussion underscores the unsettling nature of Troi’s
    psychic residue investigation, hinting at a deeper, unexplained connection between
    her mind and Kwan’s traumatic past. This moment serves as a critical turning point,
    shifting the investigation from abstract psychic echoes to a concrete, historical
    crime that demands resolution.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e18
  scene_sequence: 19
  sequence_in_scene: 28
  key_dialogue: &id023
  - 'PICARD: Do you remember anything else?'
  - 'TROI: I saw a tool crate on the floor... it was labeled Utopia Planitia.'
  - 'DATA: The shipyard where the Enterprise was built.'
  - 'TROI: Everyone was looking directly at me. It''s almost as if... I were seeing
    through someone else''s eyes.'
  - 'BEVERLY: Maybe you were seeing through his eyes?'
  - 'TROI: It''s a possibility... but I don''t understand how it could have happened.'
  - 'PICARD: The faces you saw -- did you recognize them?'
  - 'TROI: I don''t think I''ve ever seen the woman before, or the man who was with
    her. But there was someone else there. A man... he was staring at me in the most
    peculiar way. I think he had... reddish hair. He seemed familiar to me... but
    it''s all so hazy, like trying to remember a dream.'
  - 'TROI: Something terrible happened in that room. I felt it.'
  - 'BEVERLY: I could give you an inhibitor that would slow your brain''s production
    of psilosynine. That would probably suppress your empathic abilities enough to
    make the experience manageable.'
  - 'TROI: I''d like to try.'
