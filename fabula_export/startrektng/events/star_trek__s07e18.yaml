    Finn, matching the terrified woman from Troi’s empathic visions. When Troi realizes
    she was seeing the murder *through Pierce’s eyes*—not Kwan’s—she deduces his partial
    telepathy and complicity in Finn’s death. Worf, now certain of Pierce’s guilt,
    insists on confronting him immediately, while Troi’s lingering fixation on Worf
    and Calloway’s proximity hints at her emotional vulnerability amid the investigation’s
    escalation. The revelation shifts the crew’s focus from speculative horror to
    targeted action, with Troi’s psychic insight becoming the linchpin for exposing
    Pierce’s crime.
