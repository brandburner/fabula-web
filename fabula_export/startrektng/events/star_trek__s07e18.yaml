  title: Troi Deciphers Pierce’s Telepathy and Murder
  description: In the observation lounge, Troi and the senior staff dissect the psychic
    residue that nearly drove her to suicide. Worf recounts how he pulled her back
    from the plasma stream, confirming the hallucination’s artificial nature. Data
    reveals Pierce’s Betazoid lineage, explaining his latent telepathy, while Troi
    theorizes that his murder of two lovers—followed by his staged suicide—left an
    empathic imprint in the ship’s plasma discharge. Geordi’s discovery of cellular
    residue with an empathic signature validates Troi’s vision, forcing the crew to
    confront the Enterprise’s buried violence. The moment crystallizes Troi’s trauma
    as both personal and institutional, while exposing Pierce’s hidden role as the
    ship’s first killer. The revelation shifts the investigation from suicide to murder,
    with Troi’s near-death experience serving as a bridge between past and present
    crimes.
