  title: Troi identifies Kwan’s conduit link
  description: Counselor Troi enters the nacelle control room, where Geordi and Data
    are investigating Kwan’s suicide site. She confirms her empathic inhibitor is
    working but notices a console absent from her earlier vision, validating her fragmented
    memories. When she recalls a power conduit from her psychic experience, Geordi
    reveals it’s behind a rarely accessed panel—one Kwan worked on before his death.
    Nara confirms the panel hasn’t been opened since the ship’s construction, deepening
    the mystery. Troi’s insistence on accessing it sets the stage for the discovery
    of hidden evidence tied to Kwan’s death and the ship’s dark past. The scene pivots
    from psychological uncertainty to tangible investigative momentum, with Troi’s
    empathic insights now physically anchored in the ship’s infrastructure.
