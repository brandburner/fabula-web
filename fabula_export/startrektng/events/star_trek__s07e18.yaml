  object_involvements:
  - object_uuid: ger_object_1a49cdd657a4
    description_of_involvement: The nacelle control catwalk is the elevated platform
      where Kwan stands, poised to jump. Its narrow, precarious design forces him
      into close proximity with the plasma stream, amplifying the tension of the moment.
      Riker climbs a ladder toward it, his arm outstretched in a futile attempt to
      reach Kwan. The catwalk’s grating and the glow of the plasma below create a
      stark, almost theatrical stage for the tragedy, emphasizing the inevitability
      of Kwan’s fall. The whispers and psychic echoes that draw investigators to it
      later hint at its role as a conduit for the ship’s buried trauma.
    status_before_event: Structurally intact, with Kwan standing at its edge, his
      body language tense and agitated.
    status_after_event: Empty, save for the lingering horror of Kwan’s leap. The catwalk
      now feels like a site of haunting, a physical manifestation of the psychic corruption
      aboard the *Enterprise*.
    global_id: ger_object_1a49cdd657a4
  - object_uuid: ger_object_f964843bb460
    description_of_involvement: The nacelle plasma controls console is where Worf
      works to unlock the plasma venting process. Its screens flicker as the shutdown
      procedure initiates, but the process is too slow to save Kwan. The console’s
      glow cuts through the plasma stream’s blue haze, framing Riker’s futile reach
      and the crew’s stunned faces. It represents the crew’s reliance on technology
      and protocol, even in moments of crisis, and underscores the limitations of
      such systems when faced with psychological horrors.
    status_before_event: Locked by Kwan, with Worf working to override the controls.
