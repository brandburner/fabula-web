  title: Troi identifies Pierce as the murderer
  description: 'Troi, exhausted from cross-referencing thousands of personnel records,
    finally narrows her search to crew members who served at Utopia Planitia and aboard
    the *Enterprise* in the last seven years. When Lieutenant Walter Pierce’s face
    appears on the monitor—matching the man from her traumatic psychic visions—she
    immediately recognizes him as the murderer from her empathic reliving of the ship’s
    past. Worf, arriving late but offering tactical focus, confirms Pierce’s identity
