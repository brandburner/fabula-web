  title: Troi receives empathic inhibitor
  description: 'In Sickbay, Dr. Beverly Crusher administers an empathic inhibitor
    to Counselor Deanna Troi, a medical safeguard against the lingering psychic trauma
    from her empathic connection to the Enterprise’s dark history. The injection marks
    a turning point in Troi’s psychological resilience, as she must now rely on external
    intervention to stabilize her abilities. The scene underscores the escalating
    danger of her empathic link to the ship’s past, forcing her to confront the fragility
    of her mental state. Meanwhile, Worf is pulled away by Calloway to address quarantine
    protocols, leaving Troi to proceed alone to the nacelle room. Her lingering glance
    at Worf and Calloway hints at unspoken tension—both professional and personal—as
    the investigation into Kwan’s suicide and the hidden murder deepens. The moment
    captures the duality of Troi’s role: a counselor grappling with her own trauma
    while still expected to function as the ship’s emotional anchor.'
