  key_dialogue: &id003
  - 'DATA: Geordi, would you agree that the instinct for self-preservation is shared
    by most life forms?'
  - 'GEORDI: I don''t know, Data. All I can think is that maybe Lieutenant Kwan felt
    like there was something... wrong in his life, something he felt powerless to
    fix.'
  - 'DATA: I believe I understand. I have been in a similar situation. The first months
    following my activation were a difficult period for me... there were many problems
    associated with my becoming sentient. As my systems grew in complexity, it became
    increasingly difficult to integrate new pathways into my existing neural net.
    The probability of cascade failure grew with each added pathway. I came to the
    conclusion that it would be easier and safer to shut myself down and start again.'
  - 'GEORDI: But if you did that, you wouldn''t have remembered any of the things
    that had happened to you.'
  - 'DATA: In a way, it would have been like... committing suicide.'
