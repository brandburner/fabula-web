      explicitly mentions it as the cause of her inability to sense others’ emotions,
      a core part of her identity and professional role. The inhibitor’s effects are
      narratively significant, as they strip Troi of her usual emotional defenses
      and force her to rely on Worf for reassurance. Its presence underscores the
      fragility of her mental state and the high stakes of the investigation, as her
      empathic abilities are crucial to uncovering the truth behind the psychic residue.
    status_before_event: Administered to Troi prior to this scene, dulling her empathic
      senses and leaving her feeling adrift.
