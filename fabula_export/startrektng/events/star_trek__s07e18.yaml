  title: Troi’s unspoken psychic distress
  description: 'After exiting sickbay with Worf, Counselor Troi hesitates mid-corridor,
    her body language betraying the psychic residue of the Enterprise’s dark history.
    Though she doesn’t speak, her tension—visible in her posture and darting glances—signals
    the growing weight of the empathic echoes she’s been absorbing. The moment foreshadows
    her impending emotional unraveling, as the ship’s traumatic past begins to overwhelm
    her. Worf, attuned to her distress, subtly adjusts his stance to shield her from
    passing crew, but neither acknowledges the unspoken crisis. The scene hinges on
    Troi’s internal conflict: her professional duty to investigate versus the creeping
    horror of what she’s already sensed. The turbolift’s arrival and the crew exiting
    it serve as a stark contrast—ordinary ship life continuing while Troi stands at
    the precipice of a psychological abyss.'
