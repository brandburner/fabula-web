  title: Troi confirms inhibitor and probes console discrepancy
  description: 'In the nacelle control room, Counselor Troi enters with cautious confidence,
    her empathic inhibitor now functioning. She immediately seeks validation for her
    fragmented memories by questioning Geordi about a console she doesn’t recall from
    her earlier psychic vision. Geordi confirms the console was installed post-construction,
    which bolsters Troi’s trust in her empathic perceptions. When she identifies a
    specific power conduit—one Kwan had accessed before his death—Nara reveals it
    hasn’t been opened since the ship’s construction. This discrepancy between Troi’s
    vision and physical reality becomes a critical turning point: it confirms her
    psychic impressions are accurate, deepens the mystery of Kwan’s suicide, and propels
    the investigation toward uncovering the ship’s buried trauma. The moment bridges
    Troi’s psychological vulnerability with tangible evidence, reinforcing her resolve
    to confront the Enterprise’s dark past.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e18
  scene_sequence: 24
  sequence_in_scene: 38
  key_dialogue: &id031
  - 'GEORDI: Counselor, you okay?'
  - 'TROI: I''m fine. The inhibitor seems to be working.'
  - 'TROI: I don''t remember seeing this console during my empathic experience. Has
    it been here since the ship was built?'
  - 'GEORDI: No, we installed it about two years ago.'
  - 'NARA: Kwan was working on that conduit the day before he died.'
