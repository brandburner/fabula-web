  global_id: null
  title: Troi reveals her near-suicide to Worf
  description: In the observation lounge, Troi recounts her empathic experience near
    the plasma stream, where she nearly replicated Pierce’s fatal jump. Data confirms
    Pierce’s Betazoid heritage and the official Starfleet cover-up of his murders,
    while Geordi’s discovery of empathic residue in the ship’s wall explains Troi’s
    hallucinations. The team realizes Pierce’s psychic imprint triggered Troi’s near-suicidal
    state, forcing her to confront the destabilizing power of her own abilities. Worf’s
    presence is revealed as the only thing that prevented her from jumping, deepening
    the emotional stakes of their relationship and the investigation’s urgency. The
    scene underscores the blurred line between Troi’s empathy and Pierce’s trauma,
    raising questions about whether her gift is a liability in the face of such darkness.
