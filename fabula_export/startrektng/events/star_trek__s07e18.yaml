    approach, and Picard grants authorization just as Geordi La Forge interrupts with
    an urgent comm signal, leaving the investigation’s next steps unresolved but foreshadowing
    deeper complications tied to the *Enterprise*’s psychic residue. The scene underscores
    the crew’s emotional investment in Kwan’s death and establishes the investigation’s
    official parameters, while the abrupt interruption heightens tension around what
    the logs might reveal.
