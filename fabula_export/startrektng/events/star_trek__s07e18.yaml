      Troi’s hallucination, blurring the line between past and present, and serves
      as irrefutable proof that the *Enterprise*’s structure absorbed and preserved
      his violence. The residue’s discovery pivots the investigation from suicide
      to homicide, exposing the ship as a silent witness to murder.
