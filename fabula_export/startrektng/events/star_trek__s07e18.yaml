  description: In Sickbay, Beverly administers an empathic inhibitor to Troi, who
    is still recovering from the psychic trauma of reliving a murder tied to the *Enterprise*'s
    construction. As Troi prepares to leave with Worf to investigate further, Calloway—Kwan’s
    grieving girlfriend—interrupts their conversation with a technical question about
    quarantine protocols. Her timing is deliberate, cutting short Troi’s moment with
    Worf and forcing a separation. Troi notices Calloway’s unsettling smile as she
    hands Worf a PADD, a subtle but deliberate act that hints at her growing influence
    over Worf and foreshadows her role in the ship’s dark psychic residue. The interruption
    creates tension, reinforcing Troi’s isolation and the psychological unease permeating
    the investigation. Calloway’s calculated move deepens the scene’s undercurrent
    of distrust and sets up future conflicts between the characters.
