  global_id: null
  title: Troi’s psychic descent into the murder
  description: 'Counselor Troi, investigating psychic residue in the nacelle control
    room, experiences a violent psychic displacement after staring into the plasma
    stream. The vision begins with a terrified woman (later revealed as Ensign Marla
    Finn) pleading for help in an unfinished version of the control room, followed
    by a menacing man (Lieutenant Pierce) whose presence triggers Troi’s disorientation.
    The scene shifts abruptly: Troi finds herself fully immersed in the past, the
    control room now half-constructed, Worf vanished, and the air thick with the unmistakable
    energy of a murder. She stumbles upon a couple in a furtive embrace—Finn and Pierce—who
    laugh at her intrusion before the vision snaps back to reality, leaving Troi shaken
    and desperate to escape. This moment marks the climax of her empathic connection
    to the past crime, forcing her to confront the trauma of Finn’s death firsthand
    and setting the stage for her subsequent psychological unraveling. The event serves
    as both a revelation (confirming the murder’s psychic imprint) and a turning point
    (Troi’s vulnerability becomes a liability, requiring medical intervention and
    Worf’s protection).'
