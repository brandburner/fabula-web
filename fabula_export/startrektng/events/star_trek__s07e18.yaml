  title: Troi and Worf discover Kwan’s unsettling calm
  description: In Kwan’s meticulously ordered quarters, Troi and Worf search for clues
    about his suicide, expecting signs of turmoil but finding only eerie normalcy.
    The space’s pristine condition—filled with artifacts reflecting Kwan’s mixed heritage—contrasts
    sharply with the violence of his death, leaving both investigators unsettled.
    Worf notes Kwan’s unnatural calm before his suicide, while Troi theorizes that
    ending his pain may have felt like relief. Their discovery of a photograph of
    Ensign Calloway, Kwan’s girlfriend, deepens the emotional weight of the investigation.
    When they access Kwan’s final log, his cheerful tone and plans to spend time with
    Calloway directly contradict the official narrative of suicide, forcing Troi and
    Worf to question whether Kwan’s death was self-inflicted or something far more
    sinister. The scene establishes the psychological tension that will later drive
    Troi’s empathic connection to Kwan’s trauma and the ship’s hidden past.
