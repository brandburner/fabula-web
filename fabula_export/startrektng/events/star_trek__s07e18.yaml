  title: Troi’s Hallucinatory Suicide and Worf’s Rescue
  description: Counselor Troi, under the influence of the Enterprise’s dark psychic
    residue, enters a dissociative state in the nacelle control room. She climbs to
    the plasma stream’s maintenance door, which opens unnaturally, and stands transfixed
    by its glow, whispering, ‘I know what I have to do.’ As she prepares to jump into
    the plasma—a hallucinatory reenactment of Ensign Finn’s murder—Worf intervenes,
    pulling her back from the brink. The moment snaps Troi out of her trance, revealing
    the entire sequence as a psychic illusion. Her relief at finding Worf unharmed
    (and the absence of his phaser burn) confirms the hallucination’s nature, while
    her desperate embrace underscores the residue’s manipulative power and her own
    psychological vulnerability. The event forces Troi to confront the residue’s ability
    to weaponize her empathy, blurring the line between past trauma and present reality.
    Worf’s confusion—holding her without understanding her terror—highlights the isolation
    of her experience and the fragility of her mental state.
