      subject to Starfleet’s discretion)
    institutional_impact: 'The confrontation highlights the *tension between individual
      freedom and institutional control*—a core theme of *Star Trek*. Picard’s struggle
      to balance his personal feelings with his duty reflects Starfleet’s broader
      challenge: how to explore the galaxy while respecting its diversity and the
      autonomy of its people.'
    internal_dynamics: None explicitly shown, but the event foreshadows potential
