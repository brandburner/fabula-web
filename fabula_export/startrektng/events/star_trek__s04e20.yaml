    key_environmental_details:
    - Steep, narrow stone stairs ascending to the tower
    - Echoing footsteps and clashing steel
    - Flickering torchlight casting erratic shadows
    - Confined space forcing close-quarters combat
    - Bloodstains from the duel marking the stairs
    global_id: ger_location_e5bec0fd9be2
  - location_uuid: ger_location_9f5d2bb9b393
