  key_dialogue: &id015
  - 'Q: Sleeping alone, Picard?'
  - 'Q: I had such hopes for you, Jean-Luc. I thought you were a bit more evolved
    than the rest of your species. But now I realize you''re as weak as all the others.
    Still, it pains me to see the great Picard brought down by a woman.'
  - 'Q: This human emotion of Love is a dangerous thing, Picard. You are obviously
    ill equipped to handle it. She''s found a vulnerability in you... a vulnerability
    that I''ve wanted to find for years. If I had known this sooner, I would have
    arrived as a female. Mark my words, Jean-Luc, this is your Achilles heel.'
  - 'PICARD: ((very seriously)) Stay away from her, Q.'
  - 'Q: You would have me stand idly by while she leads you to your destruction?'
  - 'PICARD: Yes!'
