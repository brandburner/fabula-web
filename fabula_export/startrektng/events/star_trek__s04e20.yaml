- fabula_uuid: cand_evt_scene_a2f7caf18c0af3e6_01
  global_id: null
  title: Vash confronts Picard’s emotional evasion
  description: 'During the archaeology symposium reception in Ten Forward, Vash—frustrated
    by Picard’s public avoidance of their shared past—cornered Troi to probe whether
    Picard had ever mentioned her to his crew. When Troi confirms his silence, Vash
    directly approaches Picard, demanding to know why he’s erased their history from
    his professional life. Picard, caught off-guard, deflects with Starfleet propriety,
    insisting personal feelings have no place in command. Vash, stung by his emotional
    detachment, accuses him of self-imposed isolation, then abruptly leaves, forcing
    Picard to confront the cost of his repressed vulnerability. The exchange exposes
    the core tension of Q’s test: Picard’s rigid discipline is a shield against messy
    human emotions, but Vash’s presence—and Q’s meddling—threatens to dismantle it.
    The scene pivots from the reception’s polite formality to raw interpersonal conflict,
    marking a turning point where Picard’s internal struggle becomes undeniable to
    both Vash and the audience. The crew’s earlier teasing (beat_a04900db31e1e1f4)
    now gains weight as Vash’s confrontation forces Picard to acknowledge what he’s
    spent years suppressing.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e20
  scene_sequence: 6
  sequence_in_scene: 12
  key_dialogue:
  - |-
    VASH: I don't understand, I thought being ship's counselor meant the Captain confided in you.
    TROI: He does. When he feels it's necessary.
    VASH: And he never spoke to you about me?
    TROI: Not that I can recall.
    VASH: Not even a hint?
    TROI & VASH: ((together)) Private man.
  - |-
    VASH: Jean-Luc, we need to talk.
    PICARD: ((to the Vulcan)) Pardon me.
    PICARD: The reception seems to be a success.
    VASH: Forget the reception for a moment. How come you've never mentioned me to your friends?
    PICARD: What would you have me tell them?
    VASH: Maybe that we met, for one thing. That we had an adventure together. Some fun...
    PICARD: I'm afraid that wasn't possible.
    VASH: Why not?
    PICARD: It would have been... inappropriate.
  - |-
    VASH: Is that a Starfleet regulation? Or did you make that one up yourself?
    PICARD: I'm sorry if you're upset.
    VASH: And I'm sorry if my being here embarrasses you.
