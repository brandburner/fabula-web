  title: Q's ultimatum forces Picard to choose
  description: 'After Q transports Picard and his crew into a Sherwood Forest simulation,
    dressing them in period costumes and forcing them into Robin Hood roles, the crew
    is ambushed by Sir Guy of Gisbourne. Worf is injured defending Picard, and the
    crew flees into the forest. Q appears as the High Sheriff of Nottingham and delivers
    an ultimatum: Vash (Maid Marian) will be executed at dawn unless Picard risks
    his crew’s safety to rescue her. Picard insists his feelings for Vash are irrelevant,
    but Q taunts him, forcing him to confront the ethical weight of his command—whether
    to prioritize his crew’s safety or save an innocent life. The scene escalates
    the stakes, setting up a high-stakes rescue mission with deadly consequences,
    while also exposing Picard’s buried emotions and the psychological manipulation
    at play in Q’s game.'
