    what_happened: Vash dominates this scene with a mix of charm, psychological acuity,
      and strategic boldness. She enters Ten Forward with Beverly but quickly takes
      control of the conversation, probing Beverly about Picard’s habits and revealing
      her intimate knowledge of his private life—his rare visits to the lounge, his
      imitation of Riker, and their shared history on Risa. Her dialogue is laced
      with double entendres and calculated revelations, designed to unsettle and intrigue.
      When Riker joins, she effortlessly outmaneuvers his flirtation by referencing
      Picard’s private imitation of him, a detail that surprises and amuses Riker.
      Her frustration at Picard’s secrecy (*'You'd think he'd have told someone about
      me'*) hints at deeper emotional stakes, while her final question about the *Horga'han*
      fertility symbol underscores her role as a wildcard who disrupts the crew’s
      expectations. By the end, she departs with Riker, leaving a trail of intrigue
      and unresolved tension.
