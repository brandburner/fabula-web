      \ personal stakes of Picard’s actions and the limits of his authority in Q’s\
      \ game.\n      "
    active_representation: "\n        Through Picard’s disciplined leadership and\
      \ his initial adherence to a structured rescue plan, though these are ultimately\
      \ undermined by emotional and narrative forces.\n      "
    power_dynamics: "\n        Starfleet’s influence is constrained by Q’s omnipotent\
      \ manipulation of the scenario. Picard’s authority as a Starfleet captain is\
