acts:
- fabula_uuid: act_58a35f6c3d3f5b78
  number: 1
  summary: Captain Picard meticulously prepares for the Federation Archaeology Council's
    annual Symposium, focused on his keynote address about Tagus Three. His concentration
    breaks with the unexpected arrival of Vash, a former romantic interest and fellow
    archaeologist. Their reunion is passionate but quickly reveals underlying tensions
    regarding their past and present lives. Picard feels uncomfortable with Vash's
    presence on his ship, particularly her adventurous, rule-bending nature, which
    clashes with his Starfleet professionalism. Vash, in turn, feels slighted by Picard's
    refusal to acknowledge their relationship to his crew. She explores the ship,
    charming Commander Riker and Doctor Crusher, while observing Picard's guarded
    demeanor. Their private conversation escalates into an argument about Picard's
    need for privacy versus Vash's desire for recognition of their connection. Picard
    asserts his identity as a Starfleet Captain, unable to compromise his professional
    image. Vash departs, leaving Picard in a state of contemplation. The act culminates
    with the shocking appearance of Q in Picard's ready room, setting the stage for
