      guarded response forcing him to identify himself twice before she opens the
      door. The door’s sliding motion frames Vash in the entrance, her reluctance
      to step aside creating a physical barrier that Picard ultimately breaches by
      slipping past her. This object embodies the tension between privacy and intrusion,
      professionalism and personal desire.
