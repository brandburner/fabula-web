- fabula_uuid: cand_evt_scene_a28020d4cfcb7ac5_02
  global_id: null
  title: Q’s prank transforms the symposium
  description: "\n  Picard’s meticulously planned archaeology symposium reaches its\
    \ climax as he begins his lecture, framing the mystery of Tagus Three as a detective\
    \ story to engage the Archeology Council. The crew—including Troi, Beverly, Riker,\
    \ Geordi, Data, and Worf—are seated among the audience, their presence underscoring\
    \ the professional and personal stakes of the event. Just as Picard launches into\
    \ his presentation, Q’s interference begins subtly: a hunting cap materializes\
    \ on Beverly’s head, followed by one on Troi’s. Riker and Geordi react to a quarterstaff\
    \ and mandolin appearing in their hands, respectively, while Data finds himself\
    \ in a cowl clutching a leg of lamb and Worf is burdened with a chaperone. The\
    \ absurdity escalates as Picard, mid-sentence, is suddenly dressed in a yeoman’s\
    \ jerkin and cap, a bow materializing in his hand. The audience gasps as Picard’s\
    \ disbelief turns to outrage—‘What the hell!’—before he vanishes in a flash of\
    \ Q’s intervention. The prank isn’t just a disruption; it’s a declaration of Q’s\
    \ meddling, a surreal foreshadowing of the chaotic Robin Hood adventure to come,\
    \ and a deliberate undermining of Picard’s authority and control. The crew’s reactions—ranging\
    \ from confusion (Troi, Beverly) to amusement (Riker) to disdain (Worf)—highlight\
    \ their individual personalities while reinforcing the stakes: Q’s game will force\
    \ them all into roles they never chose, testing their loyalty, adaptability, and\
    \ the fragile balance of Picard’s leadership.\n  "
