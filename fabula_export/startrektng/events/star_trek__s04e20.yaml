- fabula_uuid: cand_evt_scene_8955445f390f9846_02
  global_id: null
  title: Q's ultimatum forces Picard to choose
  description: 'After Q transports Picard and his crew into a Sherwood Forest simulation,
    dressing them in period costumes and forcing them into Robin Hood roles, the crew
    is ambushed by Sir Guy of Gisbourne. Worf is injured defending Picard, and the
    crew flees into the forest. Q appears as the High Sheriff of Nottingham and delivers
    an ultimatum: Vash (Maid Marian) will be executed at dawn unless Picard risks
    his crew’s safety to rescue her. Picard insists his feelings for Vash are irrelevant,
    but Q taunts him, forcing him to confront the ethical weight of his command—whether
    to prioritize his crew’s safety or save an innocent life. The scene escalates
    the stakes, setting up a high-stakes rescue mission with deadly consequences,
    while also exposing Picard’s buried emotions and the psychological manipulation
    at play in Q’s game.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e20
  scene_sequence: 13
  sequence_in_scene: 28
  key_dialogue: &id019
  - 'PICARD: ((raging)) Q!'
  - 'Q: The choice is yours, my dear Robin. You can either take your ease here within
    the sylvan glade or risk your life to save a woman you care nothing about.'
  - 'PICARD: My feelings toward Vash are irrelevant. I''d attempt to save any innocent
    life, as you well know.'
  - 'Q: But what of your merry men? Are you willing to put them in jeopardy as well?
    Is Vash''s life worth losing hers or his or even his... ? ((the last being Worf))
    Though I admit he would make a perfect throw rug at Nottingham Castle.'
  - 'PICARD: Q, I ask you to end this now, before anyone else gets hurt.'
  - 'Q: Impossible. You see, I''ve given this fantasy as you call it, a life of its
    own. I don''t know how things will turn out anymore than you do. But of one thing
    I am certain. If you dare set foot in Nottingham Castle, blood will be spilled.'
