      government. The Taguans’ *cultural prohibitions* become a tool Picard uses to
      justify his threats, turning their rules into a shield for his own institutional
      priorities. Their implied presence raises the stakes—Vash’s recklessness isn’t
      just personal, it’s *diplomatic*.'
    active_representation: Through Picard’s references to their laws and the potential
      consequences of Vash’s actions (e.g., ‘If the Taguans were to catch you’).
    power_dynamics: Being invoked as an *external threat* to Vash’s actions, giving
      Picard leverage in the argument. Their power is *indirect but potent*—Picard
      wields it as a cudgel, but it’s ultimately the Taguans’ sovereignty that could
      impose the harshest consequences.
    organizational_goals:
