    the sylvan glade or risk your life to save a woman you care nothing about.'
  - 'PICARD: My feelings toward Vash are irrelevant. I''d attempt to save any innocent
    life, as you well know.'
  - 'Q: But what of your merry men? Are you willing to put them in jeopardy as well?
    Is Vash''s life worth losing hers or his or even his... ? ((the last being Worf))'
