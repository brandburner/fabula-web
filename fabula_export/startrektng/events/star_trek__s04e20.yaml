    global_id: ger_object_4527409d5f2b
  - object_uuid: ger_object_247f8d75dd2d
    description_of_involvement: Sir Guy’s sword is drawn during the forest ambush
      on Picard and the crew, where it is used to slash at Worf, inflicting a serious
      injury. Later, in the courtyard duel, Picard defeats Sir Guy hand-to-hand, likely
