- fabula_uuid: act_0e55a09c8bd302a5
  number: 2
  summary: Q, now in Picard's ready room, explains his presence as a means to repay
    a debt to Picard for saving his life. He offers Picard 'constructive' help with
    his 'dull and pedantic' archaeology speech, suggesting time travel or a visit
    to the sealed ruins. Picard firmly rejects Q's interference, demanding he leave
    the ship. Q, frustrated by Picard's refusal, departs. Picard then seeks out Vash
    in her quarters, discovering her illegal digging tools and a map of Tagus Three
    ruins. He confronts her about her true intentions, threatening to confiscate her
    equipment and place her in the brig. Vash defiantly asserts her identity as an
    adventurer, unwilling to change for him. Picard, equally firm in his Starfleet
    principles, declares their paths incompatible and leaves. Q, having secretly observed
    their argument, identifies Vash as Picard's emotional vulnerability. He confronts
    Picard in his quarters, mocking his 'love' for Vash and threatening to harm her.
    Picard fiercely warns Q to stay away from her, nullifying any perceived debt.
    Q, however, implies he will not stand idly by. The act concludes as Picard begins
    his symposium speech, only for Q to transform the meeting room into Sherwood Forest,
    casting Picard and his crew into the roles of Robin Hood and his merry men, with
    Picard becoming Robin Hood himself.
