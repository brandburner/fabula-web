    description_of_involvement: Starfleet’s influence permeates the confrontation,
      not through physical presence but through Picard’s invocation of its protocols.
      His threats to confiscate Vash’s tools or imprison her are direct applications
      of Starfleet’s *Code of Justice* and *Regulations on Planetary Sovereignty*.
      The organization’s *invisible hand* shapes every word—Picard’s authority as
      captain is derived from Starfleet, and his duty to uphold its rules is non-negotiable.
      Vash’s defiance, in turn, becomes a challenge to Starfleet’s institutional power,
      her adventurism a rejection of its constraints.
