- fabula_uuid: act_ba5344b273cfa2d5
  number: 4
  summary: In the castle courtyard, Q, as the High Sheriff, oversees preparations
    for the execution. He is surprised to find Vash and Sir Guy acting affectionately.
    Vash, having successfully charmed Sir Guy, claims she has consented to marry him,
    momentarily averting her execution. Q, suspicious of her sudden change of heart,
    tests her loyalty by accusing her of still being in league with Robin Hood. Vash,
    skilled in deception, bluffs her way through, convincing Sir Guy that Robin Hood
    had 'bewitched' her. Q, however, sees through her act and suggests keeping the
    wedding a secret to lure Robin Hood into a trap. Sir Guy agrees, eager to capture
    his rival. Picard, disguised as a tinker, infiltrates the castle and finds Vash
    in her chamber. Their reunion is fraught with tension as Vash, having already
    attempted her own escape strategy, refuses to leave with Picard, deeming his solo
    rescue plan foolish. She insists she can take care of herself, even if it means
    marrying Sir Guy. Their argument is cut short when Sir Guy and his soldiers burst
    in. Vash, in a shocking betrayal, disarms Picard and hands him over to Sir Guy,
    claiming it as her wedding present. Q, initially astonished by Vash's ruthlessness,
    later discovers a letter she wrote to Riker, revealing her feigned betrayal was
    a ruse to get help. Q, delighted by her duplicity, orders a double execution for
    Vash and Picard.
  key_moments: []
  scene_numbers:
