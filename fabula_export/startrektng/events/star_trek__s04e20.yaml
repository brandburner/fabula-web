- fabula_uuid: cand_evt_scene_a28020d4cfcb7ac5_01
  global_id: null
  title: Picard’s symposium derailed by Q’s prank
  description: "\n  Picard begins his meticulously planned archaeology symposium,\
    \ framing the mystery of Tagus Three as a detective story to engage the Archeology\
    \ Council. His intellectual rigor and narrative flair establish his authority\
    \ as a scholar, but the moment is abruptly derailed when Q’s interference manifests\
    \ in surreal, anachronistic transformations. The crew—including Riker, Geordi,\
    \ Data, and Worf—suddenly find themselves adorned with medieval props (hunting\
    \ caps, quarterstaffs, mandolins, a leg of lamb), while Picard himself is inexplicably\
    \ dressed in Lincoln green and vanishes mid-sentence. The absurdity of the scene\
    \ underscores Q’s meddling, foreshadowing the chaotic Robin Hood adventure to\
    \ come and forcing Picard to confront the emotional stakes hidden beneath his\
    \ academic detachment. The disruption serves as a narrative pivot, shifting the\
    \ symposium’s focus from intellectual inquiry to personal reckoning.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e20
