  - object_uuid: ger_object_3510ddd36ecf
    description_of_involvement: The door chime to Vash’s quarters is the first point
      of contact in this charged exchange. Picard presses it, triggering a melodic
      electronic tone that echoes through the corridor and summons Vash’s voice from
      within. The chime’s activation is a deliberate act—Picard could have used the
      ship’s intercom or simply announced himself, but the formality of the chime
