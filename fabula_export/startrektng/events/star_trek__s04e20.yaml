- fabula_uuid: act_72e7ea0b76e1787d
  number: 3
  summary: 'Picard and his crew, now in period costumes, realize Q has transported
    them to a re-creation of Sherwood Forest. Picard identifies himself as Robin Hood
    and his crew as the merry men, much to Worf''s disdain. Their initial disbelief
    quickly gives way to danger when Sir Guy of Gisbourne attacks, injuring Worf and
    forcing them to retreat into the forest. Q appears, now dressed as the High Sheriff
    of Nottingham, and reveals the stakes of his game: Vash, cast as Maid Marian,
    faces execution at noon the next day. He challenges Picard to save her, questioning
    if he would risk his crew for a woman he ''cares nothing about.'' Picard asserts
    his duty to save any innocent life, but Q highlights the danger to his crew. Picard,
    torn, decides to infiltrate Nottingham Castle alone, ordering his crew to remain
    behind. Meanwhile, Vash, imprisoned in Nottingham Castle, attempts to manipulate
    Sir Guy, briefly convincing him of her affections to avoid her impending execution.
    This act establishes the perilous reality of Q''s game and Picard''s personal
    commitment to Vash''s safety, despite his professional reservations.'
  key_moments: []
  scene_numbers:
