  title: Marian’s swordplay exposes Picard’s vulnerability
  description: Picard is paraded through Nottingham’s courtyard as a captured 'jackal,'
    his humiliation deepened when Sir Guy reveals that Marian disarmed him with his
    own sword—a moment that shocks Q and underscores her resourcefulness. The revelation
    forces Picard to confront his underestimation of Marian’s capabilities and the
    shifting power dynamics in Nottingham’s chaotic hierarchy. His public defeat,
    orchestrated by a woman he dismissed as a mere noblewoman, strips away his Starfleet
    authority and exposes his physical and strategic vulnerability in this unfamiliar
    world. The scene serves as a turning point, where Picard’s pride is wounded and
    his perception of Marian’s role in the conflict is irrevocably altered, setting
    up future confrontations and alliances.
