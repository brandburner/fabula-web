      Starfleet’s emissary, enforcing its rules even in a private setting.
    power_dynamics: Exercising authority over individuals (Picard over Vash) but being
      challenged by external forces (Vash’s defiance, Q’s manipulation). The organization’s
      power is *absolute in theory* but *tested in practice* by personal relationships
      and individual agency.
