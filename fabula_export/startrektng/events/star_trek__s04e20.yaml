- fabula_uuid: cand_evt_scene_61f1b051b15c8544_01
  global_id: null
  title: Vash’s betrayal exposed by Q
  description: 'In Maid Marian’s chamber, Vash secretly drafts a letter to Riker’s
    men—Picard’s crew in disguise—urging them to rescue Picard from execution. Her
    servant hesitates, warning of the dangers of Sherwood Forest at night, but Vash
    insists, revealing her desperation to save Picard despite her earlier defiance.
