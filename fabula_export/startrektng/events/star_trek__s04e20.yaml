      ruins from outsiders
    - Maintain their sovereignty and authority over Tagus, even in the face of Starfleet’s
      diplomatic presence
    influence_mechanisms:
    - Through the *threat of legal consequences* (Picard cites their laws as a reason
      for Vash to comply)
    - Via *cultural respect* (Picard’s duty to uphold their prohibitions as a guest
      on their planet)
    - By *limiting access* to the ruins, forcing Vash to operate in secrecy and Picard
