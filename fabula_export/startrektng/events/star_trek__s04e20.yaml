- fabula_uuid: cand_evt_scene_a28020d4cfcb7ac5_03
  global_id: null
  title: Picard abducted into Q’s game
  description: |2-

      Picard’s meticulously prepared archaeology symposium reaches its climax as he steps to the podium, poised to unveil his research on Tagus Three. The crew—Riker, Troi, Beverly, Data, Geordi, and Worf—are seated among the Archeology Council, including Vash, who watches with quiet amusement. As Picard begins his lecture, Q’s meddling escalates: anachronistic medieval props materialize on the crew—hunting caps on Beverly and Troi, a quarterstaff in Riker’s hand, a mandolin for Geordi, a cowl and lamb leg for Data, and a chaperone on Worf. The absurdity escalates as Picard, mid-sentence, suddenly finds himself dressed in a yeoman’s jerkin and cap, a bow appearing in his hand. His stunned reaction—‘What the hell!’—is cut short as he vanishes in a flash of Q’s intervention. The abrupt disappearance marks the escalation of Q’s meddling, forcibly thrusting Picard into a 12th-century Nottingham where he must confront his repressed emotions for Vash while risking the lives of his crew. The scene underscores Q’s manipulation, the crew’s involuntary entanglement in the adventure, and the emotional stakes of Picard’s past with Vash.
