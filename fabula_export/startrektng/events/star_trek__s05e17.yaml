    description_of_involvement: 'The J''naii psychotectic treatments are the *narrative
      sword of Damocles* hanging over Soren—and by extension, Riker’s conscience.
      Mentioned explicitly by Riker (‘They’ll give her these psychotectic treatments’),
      they function as both a plot device (the inciting incident for Riker’s defiance)
      and a thematic symbol of cultural oppression. Picard’s invocation of the Prime
      Directive as a constraint on intervention indirectly frames the treatments as
      a *forbidden fruit*: something Riker desperately wants to oppose, but Starfleet
      policy prevents him from addressing directly. The treatments’ absence in the
      scene (they are off-screen, happening on J''naii) makes them all the more menacing—a
      looming, inescapable fate that Riker must confront.'
