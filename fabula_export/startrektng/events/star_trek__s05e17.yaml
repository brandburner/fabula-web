  global_id: null
  title: Soren confesses forbidden gender identity
  description: 'In a private moment aboard the shuttle, Soren—vulnerable and emotionally
    raw—interrupts technical work to confess their forbidden truth: they feel like
    a woman, a desire criminalized on their homeworld. The admission is framed by
    a traumatic childhood memory of a classmate punished for gendered preferences,
    exposing the systemic oppression that has shaped their silence. Soren’s confession
    is both a declaration of trust in Riker and a plea for understanding, as they
    reveal the dangerous double life they’ve lived. Riker, stunned, absorbs the weight
    of this revelation, which forces him to confront the moral and emotional stakes
    of their growing connection. The moment ends with Soren departing the shuttle,
    leaving Riker grappling with the implications of their confession and the fragile
    intimacy they’ve shared. This event serves as a narrative turning point, deepening
    the emotional bond between the characters while raising the stakes of their relationship
    and the mission ahead.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e17
  scene_sequence: 10
  sequence_in_scene: 22
  key_dialogue:
  - |-
    SOREN: I'd like... to tell you something. Something that's not easy to say.
    RIKER: What's that?
    SOREN: I... find you attractive. I'm taking a terrible risk, telling you that. It means... revealing something to you... Something that, if it were known on my planet, would be very dangerous for me.
  - |-
    SOREN: Occasionally, among my people, a few are born who are—different. Who are throwbacks to the era when we all had gender. Some are born with strong inclinations toward maleness... and some have urges to be female. I am one of the latter.
    RIKER: I have to admit... I got the feeling you were different.
  - 'SOREN: I remember when I was very young... there was a rumor in my school that
    one of the students preferred a gender... in that case, male. The children started
    making fun of him... every day, they got more cruel... They could tell he was
    afraid... and that seemed to encourage them. He appeared in class one morning,
    bleeding... his clothes ripped. He said he''d fallen down. Of course the school
    authorities heard about it... They took him away and gave him psychotectic treatments.
    When he came back... he stood in front of the whole school and told us how happy
    he was now that he had been cured.'
  - 'SOREN: I''ve had to live a life of pretense and lies. With you... I can be honest.'
