  title: Shuttle spins out of control
  description: The shuttlecraft spirals violently after a port engine failure, forcing
    Riker to fight against G-forces while Soren attempts to reroute failing systems.
    A sudden, violent roll hurls Soren into the console, leaving them injured. The
    crisis interrupts their earlier emotional confession, forcing Riker to prioritize
    survival over their personal connection. Geordi’s intervention via tractor beam
    stabilizes the shuttle, but not before Soren’s injury—an event that tests Riker’s
    leadership instincts and deepens their bond amid physical peril. The moment also
    escalates the narrative tension, as Soren’s vulnerability now requires immediate
    medical attention, setting up the *Enterprise*’s rescue and the subsequent conflict
    with J'naii authorities.
