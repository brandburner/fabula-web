  - character_uuid: ger_agent_f1a913dda0ad
    emotional_state: Devastated by the collapse of his emotional and moral mission;
      oscillates between frantic hope ('everything’s going to be fine') and hollow
      despair ('Soren... I love you' met with silence). His body language—initially
      tense and purposeful, then slack with defeat—mirrors the death of his belief
      in redemption.
    goals:
    - To physically and emotionally rescue Soren from J'naii custody, restoring her
      to her 'true self' (as he understands it).
    - To convince Soren that their connection was real and worth fighting for, countering
      her conditioned rejection.
    what_happened: Riker drags Soren through the woods to the clearing, his grip firm
      but his demeanor shifting from determined rescue to dawning horror as Soren’s
      psychotectic conditioning becomes apparent. He pleads with her to return to
      the *Enterprise*, his voice cracking with desperation as he offers medical intervention,
      only to be met with her clinical detachment. His emotional collapse—clutching
      at straws, declaring his love—culminates in stunned silence as Soren disappears
      into the darkness, leaving him physically and emotionally shattered.
    observed_status: Riker drags Soren through the woods to the clearing, his grip
      firm but his demeanor shifting from determined rescue to dawning horror as Soren’s
      psychotectic conditioning becomes apparent. He pleads with her to return to
