      within the constraints of J'naii law, which the organization enforces without
      compromise. Soren’s defiance, however, directly challenges the organization’s
      core tenets, exposing the hypocrisy of a society that claims to value unity
      but criminalizes love.
    active_representation: Through Noor as the presiding judge, the gallery of citizens
