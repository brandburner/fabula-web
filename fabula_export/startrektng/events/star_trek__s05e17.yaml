      \ in this event. While no J'naii delegates are physically present during the\
      \ ambush, their **doctrine, guards, and institutional protocols** shape every\
      \ action. The **guards’ resistance** to Riker and Worf is a **direct manifestation\
      \ of J'naii authority**, and Soren’s **detached, clinical dialogue** is the\
      \ **end result of their psychotectic conditioning**. The organization’s power\
      \ is **not just physical (guards) but psychological (Soren’s altered state)**,\
      \ making it an **inescapable antagonist**. Riker’s failed rescue is not just\
      \ a **tactical defeat** but a **moral one**—he cannot combat an enemy that **rewrites\
      \ its victims’ identities**.\n      "
    active_representation: "\n        **Through the actions of their guards (physical\
      \ resistance) and Soren’s psychotectic conditioning (psychological erasure)**.\
      \ The J'naii are **not present in person** but are the **invisible hand** guiding\
      \ the event’s outcome.\n      "
    power_dynamics: "\n        **Dominant and unassailable**—Riker and Worf may overpower\
      \ the guards, but the J'naii’s **true power lies in their ability to reshape\
      \ Soren’s mind**, rendering Riker’s rescue **meaningless**. The organization\
      \ operates from a position of **moral and ideological superiority**, believing\
      \ its methods are **justified and irreversible**.\n      "
    organizational_goals:
