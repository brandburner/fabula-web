  - object_uuid: ger_object_f178ac23e7ac
    description_of_involvement: 'The repurposed type-four phaser emitters are the
      linchpin of Riker’s unorthodox plan, transforming a standard Starfleet tool
      into a makeshift mapping device. Their discussion of the emitters drives the
      core of the event, as Riker explains how they will fire photon pulses into null
