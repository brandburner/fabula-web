  - 'SOREN: I am one of the latter. I have urges to be female.'
  - 'SOREN: On our world these feelings are forbidden. Those who are discovered are
    shamed and ridiculed. Only by undergoing psychotectic therapy and having all elements
    of gender eliminated can they become accepted into society again.'
  - 'SOREN: I''ve had to live a life of pretense and lies. With you... I can be honest.'
