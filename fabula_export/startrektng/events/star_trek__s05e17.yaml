      line. While physically absent (the *Enterprise* is in orbit, but Starfleet’s
      policies are the focus), its influence is palpable in Picard’s warnings about
      career jeopardy and the *inability to defend Riker* if he acts unilaterally.
      Starfleet’s role here is *dual*: it is both the *moral compass* Picard appeals
      to (non-interference in internal affairs) and the *obstacle* Riker must navigate
      (or defy) to help Soren. The organization’s presence is felt in the *tension
      between duty and desire*, as Riker weighs his loyalty to Starfleet against his
      emotional bond with Soren.'
    active_representation: Through Picard’s invocation of the Prime Directive and
      his warnings about the consequences of violating Starfleet policy. The organization
      is also represented by the *invisible hand* of institutional expectation, looming
      over Riker’s decision.
    power_dynamics: Exercising *authority through policy and precedent*—Picard’s warnings
      carry the weight of Starfleet’s disciplinary power, but his inability to *defend*
      Riker if he acts unilaterally also reveals the organization’s *limitations*
      in morally gray situations. Starfleet’s power is *systemic and bureaucratic*,
      relying on rules rather than individual discretion.
    organizational_goals:
    - To uphold the Prime Directive and prevent interference in the J'naii’s internal
      affairs, even at the cost of an individual’s suffering (Soren).
    - To maintain Starfleet’s reputation and institutional integrity, which Picard
      frames as non-negotiable (‘I can’t defend you if you go too far’).
    influence_mechanisms:
    - Institutional policy (the Prime Directive as a binding constraint)
    - Career consequences (Picard’s warnings about jeopardy to Riker’s future)
    - Moral authority (Picard’s role as a representative of Starfleet’s values)
    institutional_impact: 'Starfleet’s influence creates a *no-win scenario* for Riker:
      obey the Prime Directive and abandon Soren to her fate, or defy the organization
      and risk everything. This conflict forces Riker to confront the *limits of institutional
      loyalty* and the *cost of personal conscience*, setting up the central tension
      of the episode.'
    internal_dynamics: None explicitly shown, but inferred as *hierarchical and rule-bound*—Picard’s
      warnings reflect Starfleet’s *lack of flexibility* in cases where individual
      rights clash with cultural non-interference. The organization’s internal dynamics
