    RIKER: I like a woman who's intelligent and sure of herself... somebody I can talk to and get something back. But the most important thing of all -- she has to laugh at my jokes.
    SOREN: And is that the kind of woman all human males prefer?
  - 'SOREN: ((voice takes on a sensuous tone)) Perhaps it is that complexity... which
    makes differences in the sexes... so interesting.'
