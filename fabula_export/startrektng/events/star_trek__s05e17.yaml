  title: Shuttle vanishes into null space anomaly
  description: "\n  On the *Enterprise* bridge, Picard initiates a search for the\
    \ missing J'naii shuttlecraft after Soren reports its disappearance. Data’s scans\
    \ reveal no debris or wreckage, deepening the mystery. When Riker orders a high-resolution\
    \ sweep, Data detects an anomalous neutrino emission with no visible source. Picard\
    \ authorizes a probe launch, but the probe vanishes without explanation, mirroring\
    \ the shuttle’s disappearance. The event escalates tension, hints at a dangerous\
    \ phenomenon in null space, and foreshadows the larger conflict between the *Enterprise*’s\
    \ mission and the J'naii’s societal constraints. Soren’s frustration and Riker’s\
    \ growing protectiveness toward them subtly underscore their burgeoning emotional\
    \ connection, while Krite’s suspicion lingers in the background. The anomaly’s\
    \ suddenness and Data’s inability to explain it frame the stakes: this is no ordinary\
    \ accident, but a phenomenon that defies known physics—and may threaten the crew’s\
    \ safety.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e17
