- fabula_uuid: act_05f143a95d4ccb88
  number: 4
  summary: Riker confides in Deanna Troi about his feelings for Soren, seeking her
    counsel. Troi acknowledges the evolving nature of relationships but assures Riker
    of their enduring friendship. Riker and Soren continue their professional collaboration,
    maintaining a facade of formality, but Krite observes their subtle interactions
    with suspicion. Riker attempts to arrange a private dinner with Soren, but before
    they can meet, Krite intercepts Riker, revealing that Soren has been taken into
    custody. Krite's smugness and refusal to disclose Soren's location provoke Riker.
    Riker storms into the J'naii Civic Chamber, interrupting Soren's hearing before
    a panel of judges, including Noor. To protect Soren, Riker falsely claims responsibility
    for their relationship, asserting he pursued her and that she rejected him, thus
    nothing "happened." However, Soren bravely rejects Riker's lie. She rises and,
    with profound courage and conviction, declares her identity as female, asserting
    she was born that way and is not "sick" or in need of a "cure." She passionately
    condemns her society's intolerance, demanding understanding and compassion for
    those like her, and challenges their right to dictate how people love.
