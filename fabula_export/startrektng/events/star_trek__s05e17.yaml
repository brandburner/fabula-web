    description_of_involvement: The playing cards, particularly the wild cards (twos,
      sixes, and aces), function as a metaphor for the cultural values at stake in
      this scene. Worf’s dismissal of the Federation Day variant as a 'woman’s game'
      reflects his discomfort with ambiguity and fluidity—qualities he associates
      with the J'naii’s genderless nature. The wild cards symbolize the unpredictability
      and 'weakness' he perceives in both the game and the J'naii, making them a focal
      point for his prejudice. When Beverly mentions Soren’s attraction to Riker,
      the cards take on an added layer of significance, representing the 'wild' and
      forbidden nature of their relationship.
    status_before_event: The cards are dealt and in play, with the wild cards already
      influencing the hands of the players. The game is progressing normally, though
      Worf’s discomfort with the variant is evident.
    status_after_event: The cards remain the same, but their symbolic weight has increased.
      They now represent not just the game’s rules but the broader cultural conflict
      unfolding at the table. Worf’s reaction has tied the cards to his prejudice,
      making them a lasting symbol of the tension in the room.
