  key_dialogue:
  - |-
    SOREN: We prefer to stay warm by sleeping with a friend.
    RIKER: I see...
    SOREN: ((explaining)) Not to mate... just to sleep together. For warmth.
  - |-
    RIKER: What's it like... on a planet where the people have no gender?
    SOREN: I'm afraid I don't understand.
    RIKER: Well... who leads when you dance? If you dance...
  - |-
    SOREN: What kind of woman do you find attractive?
    RIKER: I like a woman who's intelligent and sure of herself... somebody I can talk to and get something back.
    SOREN: And is that the kind of woman all human males prefer?
