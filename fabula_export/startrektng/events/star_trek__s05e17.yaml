- fabula_uuid: act_c664449dfe92e12e
  number: 5
  summary: Following Soren's defiant declaration, Noor dismisses her identity as a
    "perversion" and sentences her to psychotectic treatment, a procedure designed
    to eliminate all elements of gender. Riker desperately attempts to offer Soren
    asylum on the Enterprise, arguing it would solve the J'naii's "problem" and remove
    her influence, but Noor gently, yet firmly, refuses. Noor asserts that J'naii
    society is "enlightened" and that they are merely "curing" a sick citizen for
    her own happiness. Soren is taken away, her eyes wide with fear. Riker transports
    back to the Enterprise, expressing his anguish to Picard. Picard, while sympathetic,
    warns Riker against violating the Prime Directive, emphasizing the potential career-ending
    consequences. Despite Picard's warning, Riker remains resolute, determined to
    rescue Soren. Worf, demonstrating unwavering loyalty, volunteers to accompany
    Riker on his unsanctioned mission. Dressed in dark clothing, Riker and Worf covertly
    intercept Soren and her guards. Riker pulls Soren into the woods, intent on escaping,
    but Soren, with a chilling detachment, reveals she has already undergone the psychotectic
    treatment. She states her past feelings were a "mistake" and questions why she
    would want to revert to her former self. Riker declares his love, but Soren regards
    him without emotion, unable to recall her past affection, and then leaves. Devastated,
    Riker returns to the Enterprise. Picard, acknowledging the end of Riker's involvement
    with the J'naii, orders a course set for the Phelan system, and a heartbroken
    Riker complies.
