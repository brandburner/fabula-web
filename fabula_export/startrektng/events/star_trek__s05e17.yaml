      with the idea highlight the emitters’ narrative role: they embody the mission’s
      innovation and the risks inherent in improvisation. The emitters’ repurposing
      also serves as a metaphor for Riker and Soren’s own evolving dynamic—they, too,
      are being ‘repurposed’ from strangers to collaborators, their skills and trust
      combined for a higher purpose. Their successful use will be pivotal to the mission’s
      outcome.'
