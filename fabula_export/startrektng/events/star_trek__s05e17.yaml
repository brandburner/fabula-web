  title: Worf’s sexism clashes with Federation values
  description: During a casual poker game in Data’s quarters, Deanna Troi introduces
    *Federation Day*—a variant where wild cards (twos, sixes, aces) are allowed. Worf
    immediately dismisses it as a 'woman’s game,' arguing that wild cards weaken a
    hand, a sentiment Beverly Crusher swiftly challenges. His bias reveals deeper
    discomfort with the J'naii’s genderless society, which he finds unsettling. When
    Beverly observes that Soren appears attracted to Riker, Worf flatly declares the
    idea 'impossible,' exposing his rigid Klingon worldview. The exchange underscores
    the tension between Starfleet’s progressive ideals and Worf’s struggle to reconcile
    his heritage with the crew’s evolving values. The scene also subtly mirrors the
    broader narrative conflict of gender identity, framing Worf’s prejudice as a foil
    to Soren’s journey and Riker’s growing attachment to them. The poker game’s stakes
    escalate as Worf’s opening bet forces the others to reassess their hands, symbolizing
    the crew’s own reckoning with uncomfortable truths.
