      but his absence is felt in Riker’s solitude. His role in the escape—neutralizing
      the guards to create the opportunity for Riker and Soren to reach the clearing—is
      implied by the context. Worf’s loyalty to Riker is evident in the successful
      distraction, though the cost of his unsanctioned involvement (and the mission’s
      failure) looms over the scene.
    observed_status: Worf is not physically present in the clearing during this event,
