    global_id: ger_agent_7c7ad3242e96
  - character_uuid: ger_agent_1740a75659ea
    emotional_state: Detached and resigned, with fleeting moments of sadness for Riker’s
      suffering. Her emotional range is limited to surface-level reactions—sorrow
      for his pain, but no recognition of her own erased identity. The vacancy in
      her eyes suggests she is both present and absent, a vessel for J'naii doctrine.
    goals:
    - To comply with J'naii expectations by rejecting her past self and Riker’s advances,
      even as it causes her pain.
    - To escape the clearing and return to the safety of her conditioned existence,
      where she no longer questions her identity.
    what_happened: Soren is physically present but emotionally absent, her movements
      mechanical as Riker pulls her through the woods. In the clearing, she stands
      detached, her voice flat and clinical as she recites the J'naii party line about
      her 'sickness' and 'urges.' Her body language—turning away, shaking her head
      slightly—signals her disconnect from Riker’s pleas. The moment she says, 'I
      don’t understand how I could have done what I did,' her eyes are hollow, as
      if reciting a script. Her final apology is delivered with genuine sorrow, but
      for Riker’s pain, not their shared past.
    observed_status: Soren is physically present but emotionally absent, her movements
      mechanical as Riker pulls her through the woods. In the clearing, she stands
      detached, her voice flat and clinical as she recites the J'naii party line about
      her 'sickness' and 'urges.' Her body language—turning away, shaking her head
      slightly—signals her disconnect from Riker’s pleas. The moment she says, 'I
      don’t understand how I could have done what I did,' her eyes are hollow, as
      if reciting a script. Her final apology is delivered with genuine sorrow, but
      for Riker’s pain, not their shared past.
    beliefs:
    - Her 'true self' is the genderless, urge-free identity imposed by psychotectic
      treatment.
    - Her past feelings for Riker were symptoms of a curable illness, not authentic
      emotions.
    observed_traits:
    - Emotionally numb, speaking in conditioned platitudes
    - Physically compliant but psychologically distant
    - Capable of empathy for others’ pain but unable to access her own memories or
      desires
    - Uses clinical language to describe intimate experiences ('terrible urges')
    - Moves toward escape not out of fear, but as if following an instinctive script
    importance: primary
    global_id: ger_agent_1740a75659ea
  - character_uuid: ger_agent_868446276ca7
    emotional_state: Protective and watchful, but emotionally removed from the intimate
      confrontation. His focus is on the tactical success of the escape, not the personal
      failure unfolding in the clearing.
    goals:
    - To ensure Riker and Soren reach the clearing unharmed by J'naii guards.
    - To provide cover for their escape, even if the mission’s ultimate outcome is
      beyond his control.
