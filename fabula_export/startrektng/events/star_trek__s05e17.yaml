  title: Riker missteps on J'naii pronouns
  description: During a routine systems review aboard the shuttle, Riker’s offhand
    compliment to Soren—'You're handling those controls like you grew up in a shuttle'—unintentionally
    violates J'naii gender norms by assigning a masculine pronoun ('you'). Soren corrects
    him with quiet but firm precision, exposing the cultural chasm between them. Riker’s
    attempt to adapt ('I give up... what should I say?') reveals his frustration with
    the language barrier, while Soren’s patient explanation ('We use a pronoun which
    is neutral') underscores the rigid societal structures they both navigate. The
    moment pivots from professional collaboration to personal tension, foreshadowing
    the deeper conflicts of their relationship. Riker’s subsequent suggestion of lunch—framed
    as a casual break—serves as his first deliberate attempt to bridge the emotional
    distance, testing the boundaries of their connection.
