  title: Worf deflects discomfort with aggression
  description: "\n  During a poker game in Data’s quarters, Worf’s discomfort with\
    \ the J'naii—particularly their genderless nature—surfaces when Beverly casually\
    \ observes that Soren appears attracted to Riker. Worf immediately dismisses the\
    \ idea as 'impossible,' revealing his deep-seated prejudice against human-J'naii\
    \ relationships. When pressed by Troi, he deflects by escalating the poker bet\
    \ (raising fifty chips), using aggression to shift focus away from his personal\
    \ discomfort. The tension underscores his struggle to reconcile Klingon values\
    \ with the moral complexities of Riker’s emotional entanglement, foreshadowing\
    \ future conflict between duty and empathy. The scene also highlights Worf’s cultural\
    \ bias, which contrasts sharply with the story’s central theme of challenging\
    \ oppressive norms.\n  "
