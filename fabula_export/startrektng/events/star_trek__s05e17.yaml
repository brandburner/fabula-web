      of control. The organization’s presence is also felt in the hush that falls
      over the room as Soren speaks—her words are a direct challenge to the J'naii’s
      collective identity, and the citizens’ silence is a testament to the organization’s
      grip on their psyches.
    power_dynamics: Exercising near-absolute authority over individuals, particularly
      Soren, who is treated as a deviant in need of correction. The organization’s
      power is challenged by Riker’s intervention and Soren’s defiance, but its structures
