      \ shuttle within the null space. While it doesn’t directly factor into the emotional\
      \ dialogue between Riker and Soren, its mention interrupts their conversation,\
      \ grounding the scene in the mission’s objectives. The emission’s mysterious\
      \ origin foreshadows the impending mechanical crisis, tying the personal and\
      \ professional stakes of the event together.\n      "
    status_before_event: Detected as an anomalous reading on the shuttle’s sensors,
