      overwhelmed by Riker’s presence. The touch on their shoulders acts as a catalyst,
      forcing them to confront the attraction they’ve been suppressing. Their nervous
      energy and flushed reaction reveal a deep, unspoken craving for connection and
      self-expression, tempered by fear of transgression.
    goals:
