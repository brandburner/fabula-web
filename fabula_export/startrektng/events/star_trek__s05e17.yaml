    it much more likely that we can help you.'
  - 'RIKER: Let me take her away. She can come with me, we''ll give her asylum on
    the Enterprise. You''ll never have to see her again.'
  - 'NOOR: Commander, after Soren''s diatribe, you must think we are a cruel, repressive
    people. Nothing could be further from the truth. In fact, we are a remarkably
    free and open society... on this world, everyone wants to be normal.'
  - 'RIKER: Don''t do this—'
  - 'RIKER: Soren—'
