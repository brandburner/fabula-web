- fabula_uuid: act_6aeb72ed4bd4c478
  number: 2
  summary: 'Riker and Soren embark on their mission to chart the null space, establishing
    an efficient, collaborative rhythm in the shuttle. Soren continues her line of
    deeply personal questioning, inquiring about human sexual organs and mating practices.
    Riker, initially uncomfortable, explains the human experience of intimacy and
    pleasure in sexual acts, contrasting it with the J''naii method of incubating
    fetuses. Soren then provocatively asks about the sexual compatibility between
    humans and J''naii, revealing her people''s view of gender as "primitive" and
    "less evolved." A sudden shuttle accident injures Soren, forcing their return
    to the Enterprise. In Sickbay, Doctor Crusher treats Soren and observes a subtle,
    unmistakable attraction Soren harbors for Riker. Soren further questions Beverly
    about what it means to be female, noting human customs of self-decoration to attract
    men. Later, alone with Riker in the shuttle, Soren takes a profound risk, confessing
    her true identity: she is one of the rare J''naii born with a strong inclination
    towards being female, a forbidden "throwback" on her planet. She recounts a chilling
    story of a student cruelly punished and "cured" for exhibiting gendered preferences,
    conveying the immense fear and secrecy under which she lives. Soren touches Riker''s
    face, expressing her desire for honesty with him, and asks him to consider her
    revelation.'
