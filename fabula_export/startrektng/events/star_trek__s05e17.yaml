      only to be met with her clinical detachment. His emotional collapse—clutching
      at straws, declaring his love—culminates in stunned silence as Soren disappears
      into the darkness, leaving him physically and emotionally shattered.
    beliefs:
    - Love and personal authenticity can triumph over institutional oppression, even
      when that oppression is internalized.
    - Medical or technological intervention (e.g., Doctor Crusher’s treatment) can
      reverse psychological conditioning, preserving identity.
    observed_traits:
    - Protective to the point of self-destruction
    - Emotionally vulnerable when confronted with irreversible loss
    - Struggles to accept cognitive or psychological erasure as final
    - Uses logic (e.g., medical treatment) to deny emotional reality
    - Physically dominant in the rescue but emotionally powerless in the confrontation
    importance: primary
