  object_involvements:
  - object_uuid: ger_object_5525fcf7f290
    description_of_involvement: The falla bush is another prop Soren uses to sustain
      the exobotany ruse, gesturing toward it as she describes its rare, one-day bloom.
      Like the menellen tree, it serves as a distraction, allowing them to move deeper
      into the woods unnoticed. Its delicate, fragrant flowers symbolize the fleeting
      and precious nature of their moment together—a brief escape from the oppressive
      J'naii society. The bush’s ephemeral bloom mirrors the transient, stolen nature
      of Riker and Soren’s intimacy, emphasizing the urgency and fragility of their
      connection.
    status_before_event: Standing in the J'naii woods, its flowers not yet in bloom,
      awaiting its rare annual cycle.
    status_after_event: Unchanged physically, but now tied to the memory of their
      kiss, representing the ephemeral beauty of their forbidden moment.
    global_id: ger_object_5525fcf7f290
  - object_uuid: ger_object_dc643ead751a
    description_of_involvement: The menellen tree is used by Soren as a prop to maintain
      the pretense of exobotany, allowing her to justify their seclusion in the woods.
      She points it out to Riker, describing its seasonal color change from white
      to blue, which draws them deeper into the forest. While its functional role
      is to provide a cover story, its symbolic significance lies in its transformation—mirroring
      Soren’s own hidden transformation from a rigid J'naii pilot to a woman embracing
      her true self. The tree’s presence in the woods underscores the naturalness
      of their attraction, contrasting with the artificiality of J'naii norms.
    status_before_event: Standing in the J'naii woods, its leaves white, awaiting
      the cold weather to turn blue.
    status_after_event: Unchanged physically, but now associated with the moment of
      Riker and Soren’s kiss, imbued with symbolic meaning.
    global_id: ger_object_dc643ead751a
  - object_uuid: ger_object_9092150ae6cb
    description_of_involvement: The secluded courtyard bench serves as the neutral
      meeting ground where Riker retreats from the J'naii festivities and Soren initially
      approaches him. It symbolizes the transition from the oppressive public space
      of the civic chamber to the private, intimate moment that follows. The bench
      is where the tension between Riker and Soren is most palpable, as they sit at
      a distance, their dialogue strained and their body language rigid. It is the
      physical space that frames their first private exchange before they slip into
      the woods, marking the pivot from societal constraints to forbidden intimacy.
    status_before_event: Unoccupied, positioned in the secluded courtyard adjacent
      to the civic chamber and the woods.
    status_after_event: Vacant, as Riker and Soren rise to enter the woods, leaving
      the bench behind as a symbol of the formality they are escaping.
