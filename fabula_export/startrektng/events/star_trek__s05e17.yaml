      body language betraying the weight of unresolved grief. The turbolift doors
      closing behind him feel like a metaphorical seal on his inability to save Soren
      or challenge the J'naii’s oppressive norms.
    beliefs:
    - Starfleet’s mission and the Prime Directive sometimes demand sacrifices that
      feel morally unjust.
    - His personal feelings, no matter how profound, must not interfere with the greater
      good of the crew and the Federation.
