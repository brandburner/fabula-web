acts:
- fabula_uuid: act_06f0201424523839
  number: 1
  summary: The Enterprise responds to a J'naii request to investigate a missing shuttle.
    The J'naii, a genderless species, introduce Soren and Krite. Data detects an unusual
    neutrino emission, and a Starfleet probe vanishes into "null space," a theoretical
    anomaly. Commander Riker collaborates closely with Soren, a J'naii specialist,
    to understand and map this dangerous phenomenon. Their professional interactions
    quickly develop an easy familiarity, and Riker is intrigued by Soren's directness
    and wit. Soren, demonstrating exceptional piloting skills, volunteers to pilot
    the rescue shuttle, leading Riker to propose they team up. During a casual meal,
    Soren probes Riker about human gender and sexuality, expressing curiosity about
    the differences between males and females. Her questions become increasingly personal,
    culminating in a subtly seductive look and tone as she questions the "complexity"
    of sexes. Krite's sudden arrival interrupts this moment, and Soren immediately
    reverts to a formal, detached demeanor, leaving Riker puzzled by her sudden transformation
    and the underlying tension. This act establishes the central mystery of the null
    space, introduces the cultural conflict around gender, and initiates the burgeoning,
    complex relationship between Riker and Soren.
