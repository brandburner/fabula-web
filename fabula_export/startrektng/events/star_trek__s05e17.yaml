  description: "\n  In the confined, intimate space of the shuttle, Soren—while working\
    \ alongside Riker—abruptly shifts from technical collaboration to raw vulnerability.\
    \ After a charged moment of physical proximity (squeezing beside him to access\
    \ controls), Soren haltingly confesses their attraction to Riker, framing it as\
    \ a dangerous revelation. Their admission unfolds in stages: first, the personal\
    \ ('I find you attractive'), then the systemic ('on my planet, this is forbidden'),\
    \ and finally the traumatic ('I remember a child who was punished for this').\
    \ The confession becomes a narrative fulcrum—exposing the oppressive J'naii society\
    \ while forcing Riker to confront the moral weight of their growing connection.\
    \ Soren’s story of childhood bullying and psychotectic 'cures' underscores the\
    \ stakes, leaving Riker stunned and Soren emotionally exposed. The moment ends\
    \ with Soren’s plea for silence ('Don’t say anything. Just... think about it')\
    \ and her abrupt departure, the emotional charge lingering in the shuttle’s air.\
    \ This event transforms their relationship from professional to forbidden, with\
    \ Riker now complicit in Soren’s dangerous secret.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e17
  scene_sequence: 10
  sequence_in_scene: 21
  key_dialogue:
  - 'SOREN: I''d like... to tell you something. Something that''s not easy to say.'
  - 'SOREN: I am one of the latter. [referring to J''naii with female inclinations]'
  - 'SOREN: Those of us who have these urges... live secret, guarded lives. We seek
    each other out... always hiding, always terrified of being discovered...'
  - 'SOREN: I remember when I was very young... there was a rumor in my school that
    one of the students preferred a gender... in that case, male. The children started
    making fun of him... every day, they got more cruel... He appeared in class one
    morning, bleeding... his clothes ripped. He said he''d fallen down.'
  - 'SOREN: I''ve had to live a life of pretense and lies. With you... I can be honest.'
  - 'SOREN: Don’t say anything. Just... think about it.'
