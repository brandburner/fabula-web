      Riker and Soren reference it as the catalyst for their hypothesis about the
      null-space anomaly, framing the rescue mission as a means to recover the shuttle
      and its crew. The shuttle’s disappearance serves as the emotional and narrative
      driving force behind the scene, motivating Soren’s volunteerism and Riker’s
      protective counter-proposal. Its absence creates a sense of urgency and stakes,
      shaping the dynamic between Riker and Soren as they prepare to collaborate on
      the high-risk mission.
