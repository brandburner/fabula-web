  title: Riker and Soren’s charged intimacy shattered
  description: 'In Ten Forward, Riker and Soren share a meal while engaging in a probing,
    increasingly intimate conversation about gender, sexuality, and attraction. Soren—using
    feminine pronouns—begins by asking Riker about human gender differences, then
    pivots to questioning his preferences in women, her tone shifting from clinical
    curiosity to subtle seduction. Riker, caught off guard by her directness and the
    charged subtext, reciprocates with playful honesty, revealing his own vulnerability.
    The moment reaches a peak of tension as Soren leans in, her voice and body language
    turning seductive, only for Krite’s abrupt arrival to sever the connection. Soren
    instantly reverts to her rigid J''naii demeanor, leaving Riker disoriented and
    the emotional stakes unresolved. The scene underscores the fragility of their
    connection, the oppressive weight of J''naii cultural norms, and the unresolved
    tension between Riker’s personal desires and the mission’s constraints. The interruption
    by Krite serves as a stark reminder of the external forces working against their
    burgeoning relationship, heightening the narrative’s central conflict: societal
    expectations vs. individual longing.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e17
  scene_sequence: 5
  sequence_in_scene: 10
  key_dialogue:
  - |-
    SOREN: What is it?
    RIKER: Split pea soup. My father's recipe. I had it programmed into the replicators.
    SOREN: We prefer to stay warm by sleeping with a friend.
  - |-
    SOREN: What kind of woman do you find attractive?
    RIKER: I like a woman who's intelligent and sure of herself... somebody I can talk to and get something back. But the most important thing of all -- she has to laugh at my jokes.
    SOREN: And is that the kind of woman all human males prefer?
    RIKER: Not at all. Some men like quiet, demure women... others prefer a lot of energy... some respond only to physical attractiveness... others couldn't care less. There aren't any rules.
  - |-
    SOREN: Perhaps it is that complexity... which makes differences in the sexes... so interesting.
    [Soren leans forward slightly, her voice taking on a sensuous tone.]
    RIKER: [stares at her, taken aback]
