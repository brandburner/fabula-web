    description_of_involvement: The disappeared Starfleet shuttle, though not physically
      present, looms large over the event as the object of the rescue mission. Soren
      and Riker reference it as they discuss the technical challenges of entering
      the null-space anomaly, particularly the need to maintain power reserves. The
      shuttle’s disappearance is the inciting incident for the entire sequence of
      events, and its potential fate—stranded but with life support—adds emotional
      weight to the mission. The object’s absence is a driving force, motivating Riker
      and Soren to collaborate and pushing Noor to offer full cooperation. Its role
      is both a symbol of the stakes and a practical challenge that must be overcome.
    status_before_event: Vanished into the null-space anomaly, with its crew presumed
      alive but unable to sustain power without external intervention.
    status_after_event: Still missing, but the rescue mission is now fully planned,
      with Riker and Soren preparing to pilot a Starfleet shuttle into the anomaly
      to effect the rescue.
