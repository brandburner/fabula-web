- fabula_uuid: cand_evt_scene_c6f35dc162aff5a5_02
  global_id: null
  title: Enterprise departs J'naii space
  description: "\n  The bridge of the *Enterprise* hums with quiet efficiency as Picard\
    \ confirms the ship’s departure from J'naii orbit, marking the definitive end\
    \ of the crew’s involvement in Riker’s emotionally charged entanglement with Soren.\
    \ The exchange between Picard and Riker is laden with unspoken tension—Picard’s\
    \ measured professionalism contrasts with Riker’s rigid composure, his voice tight\
    \ and his face betraying nothing. When Picard asks if their business with the\
    \ J'naii is finished, Riker’s terse 'Yes, sir' is a final, irreversible acknowledgment\
    \ of the mission’s closure and the abandonment of Soren’s fate. The scene underscores\
    \ the cost of duty over personal desire, as the ship’s departure leaves Riker’s\
    \ unresolved grief and the J'naii’s oppressive norms behind. The warp jump away\
    \ from J'naii space is both a narrative pivot and an emotional gut-punch, signaling\
    \ the return to Starfleet’s broader mission while underscoring the irrevocable\
    \ loss of what Riker could not save.\n  "
