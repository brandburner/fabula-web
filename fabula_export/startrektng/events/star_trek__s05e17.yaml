      attempting to activate unresponsive thrusters, while Soren later lunges for
      it after being thrown by the violent roll. The console’s failing systems—unresponsive
      thrusters and collapsing inertial dampers—symbolize the fragility of their situation.
      It is both a tool and a threat: a source of potential salvation if mastered,
      but a brutal force if the shuttle’s spin cannot be corrected. Soren’s injury
      from colliding with it underscores the console’s dual role as both a lifeline
      and a hazard.'
    status_before_event: Functional but strained, with alarms blaring as the port
