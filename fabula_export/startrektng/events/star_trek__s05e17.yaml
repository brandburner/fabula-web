  title: Riker’s Failed Asylum Bid and Soren’s Forced Removal
  description: In the Civic Chamber, Riker desperately attempts to negotiate asylum
    for Soren after their confession of gender identity, but Noor dismisses the offer
    as naive. Noor frames J'naii society as 'enlightened,' insisting Soren’s identity
    is a 'perversion' requiring forced psychotectic treatment. When Riker protests,
    Noor’s guards physically separate them, whisking Soren away despite her terrified
    pleas. The scene underscores the regime’s ideological intransigence, Riker’s powerlessness,
    and the systemic oppression Soren faces. Riker’s final, futile outburst—'Soren!'—before
    beaming out marks his emotional breaking point and the escalation of the conflict
    between Federation values and J'naii dogma.
