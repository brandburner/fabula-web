  global_id: null
  title: Riker’s failed lie and Soren’s defiant truth
  description: In the J'naii Civic Chamber, Soren’s silent trial reaches a breaking
    point when Commander Riker storms in, interrupting the proceedings with a desperate
    attempt to shield Soren by taking full blame for their forbidden relationship.
    He fabricates a confession—claiming he pursued Soren against their will and that
    nothing physical occurred—hoping to absolve them of guilt under J'naii law. However,
    Soren rejects his lie, standing to declare their true identity as female and the
    authenticity of their feelings. Their impassioned speech dismantles the J'naii’s
    dehumanizing rhetoric, exposing the hypocrisy of their gender laws by framing
    their love as no different from the bonds the J'naii themselves cherish. The moment
    forces Riker to confront the limits of his protection and Soren to embrace their
    vulnerability as an act of resistance. The trial becomes a public reckoning, with
    Soren’s defiance marking a turning point in their struggle for self-determination
    and Riker’s moral alignment with their cause—even as it seals their shared fate
    under J'naii judgment.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e17
  scene_sequence: 20
  sequence_in_scene: 38
  key_dialogue:
  - 'RIKER: I was attracted to Soren. I pursued... I insisted. I didn''t understand
    your ways until Soren told me. And rejected me. Nothing happened between us.'
  - 'SOREN: No. I am tired of lies. I am female. I was born that way. I have had those
    feelings... those longings... all my life.'
  - 'SOREN: What we do is no different from what you do. We talk and laugh... we complain
    about work and we wonder about growing old... we talk about our families, and
    we worry about the future... All the loving things that you do with each other...
    that''s what we do. And for that, we are called misfits, and deviants... and criminals.'
