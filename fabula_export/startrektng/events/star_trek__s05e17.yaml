  object_involvements:
  - object_uuid: ger_object_9531bed03f8b
    description_of_involvement: 'The *Enterprise*’s tractor beam is the lifeline that
      stabilizes the shuttle, halting the violent spin and allowing Riker to order
      Soren’s transport to sickbay. Geordi’s voice over the comlink guides its deployment,
      turning the beam into a symbol of institutional support and technological prowess.
      Its intervention is a narrative turning point: it saves the crew physically,
      but it also delays the emotional reckoning between Riker and Soren, setting
      up the subsequent conflict with J''naii authorities. The beam’s role is dual—it
      is both a rescue and a reminder of the larger forces at play in the story.'
    status_before_event: Standby on the *Enterprise*, awaiting deployment for potential
      emergencies.
    status_after_event: Actively engaged, stabilizing the shuttle and enabling Soren’s
      transport to sickbay.
    global_id: ger_object_9531bed03f8b
