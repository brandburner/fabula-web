  title: Riker and Soren’s Forbidden Moment
  description: 'At the J''naii formal gathering, Riker retreats from the stifling
    festivities to a secluded courtyard, where Soren finds him. Their polite exchange
    masks an undercurrent of tension, as Soren—rigidly maintaining J''naii decorum—invites
    Riker to explore the woods under the pretense of exobotany. The moment they step
    into the forest, their formality dissolves: Riker impulsively pulls Soren into
    an embrace, and they share a passionate kiss, a spontaneous act that defies both
    J''naii law and Starfleet protocol. The scene culminates in their physical surrender
    to their burgeoning, taboo connection, with Krite’s unseen observation looming
    as a silent threat. This moment is the emotional and narrative turning point where
    their attraction becomes undeniable, setting up the inevitable conflict with J''naii
    society and Riker’s own moral dilemmas. The kiss is not just a personal revelation
    but a direct challenge to the oppressive norms Soren has endured, foreshadowing
    the sacrifices both will face.'
