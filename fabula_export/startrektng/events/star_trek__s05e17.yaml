  key_dialogue:
  - 'WORF: That is a woman''s game.'
  - 'BEVERLY: Let me get this straight. Are you saying it''s a woman''s game because
    -- because women are weak and need more help?'
  - 'WORF: Yes.'
  - 'BEVERLY: And just this afternoon I was insisting to one of the J''naii that those
    attitudes were nothing but a distant memory.'
  - 'WORF: The J''naii... They bother me.'
  - 'TROI: Why, Worf?'
  - 'WORF: They are all alike. No males. No females.'
  - 'BEVERLY: Well, one of them seems to be overcoming the differences... at least
    with regard to one of us... I could be wrong... but I get the definite impression
    that Soren... is attracted to Commander Riker.'
  - 'WORF: A human and a J''naii? Impossible.'
  - 'DATA: Why?'
