      using it as a proxy to explore their own suppressed identity.
    - Test Riker’s reaction to their proximity, seeking validation for their growing
      attraction without explicitly acknowledging it.
    what_happened: 'Soren sits on the bio-bed, their posture initially relaxed but
      growing increasingly tense as they engage Beverly in a series of increasingly
      personal questions about human femininity. Their curiosity is intellectual at
      first, almost clinical, as they dissect the biological and cultural markers
      of gender (hair, makeup, hormone differences). However, as Beverly describes
      the *purpose* of these markers—to attract men—their demeanor shifts; they grow
      quieter, their fingers tightening around the edge of the bio-bed. When Riker
      enters, Soren’s reaction is visceral: a flush spreads across their cheeks, their
      breath hitches, and they avert their gaze, suddenly self-conscious. Riker’s
      touch on their shoulders freezes them in place, as if his hands carry an electric
      current. Their subsequent attempt to leave is half-hearted, betraying their
      desire to stay near him.'
