  title: Worf’s Prejudice Against J'naii Revealed
  description: "\n  During a poker game in Data’s quarters, Worf’s discomfort with\
    \ the J'naii’s genderless nature surfaces as Troi introduces a variant called\
    \ *Federation Day*—a game with wild cards that Worf dismisses as 'a woman’s game,'\
    \ exposing his Klingon bias. Beverly challenges his sexist framing, linking it\
    \ to the J'naii’s own rigid norms, before revealing her observation that Soren,\
    \ the J'naii pilot, is attracted to Riker. Worf immediately rejects the idea as\
    \ 'impossible,' his visceral reaction laying bare his unexamined prejudice against\
    \ human-J'naii relationships. The exchange foreshadows the central conflict of\
    \ the story—Riker’s forbidden romance with Soren—while also highlighting Worf’s\
    \ struggle to reconcile his Klingon values with Starfleet’s progressive ideals.\
    \ His abrupt shift to aggressive poker play (raising the bet to fifty) serves\
    \ as a deflection, masking his discomfort with the conversation’s emotional and\
    \ moral complexity.\n  "
