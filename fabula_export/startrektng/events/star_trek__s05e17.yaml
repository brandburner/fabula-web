  - 'GEORDI: Let''s just say... you don''t want to waste any time once you get in
    there.'
  - 'GEORDI: You''ll have to give him continuous readouts on energy consumption. I
    can''t even predict if the drain will be at a constant rate.'
  - 'SOREN: I understand.'
  - 'RIKER: Since we don''t know the condition of the shuttle crew, I''ll beam us
    all directly to sickbay.'
