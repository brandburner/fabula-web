  title: Worf offers unconditional mission support
  description: In Riker’s quarters, Worf interrupts his covert preparations for an
    unsanctioned mission to rescue Soren. Riker, visibly tense, attempts to dismiss
    Worf but fails to conceal his intent. Worf, having deduced Riker’s plan, declares
    his loyalty without hesitation, framing his offer as both a professional duty
    and a personal bond. The moment pivots from Riker’s isolation to a partnership
    when Worf refuses to be ordered away, invoking Klingon honor and friendship. Their
    exchange transforms the mission from a solo act of defiance into a shared risk,
    deepening their trust and foreshadowing the moral and operational stakes of what
    follows. The scene underscores Worf’s growth beyond rigid duty, while Riker’s
    acceptance reveals his vulnerability and need for allies in a high-stakes moral
    dilemma.
