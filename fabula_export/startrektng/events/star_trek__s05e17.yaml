  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: Starfleet’s influence in this event is subtler but
      no less significant. Riker, as a Starfleet officer, is bound by its principles
      of exploration, diplomacy, and respect for other cultures. However, his actions
      in this event—particularly his impulsive kiss with Soren—challenge the very
      ideals of Starfleet’s non-interference policy. His dual loyalty to Starfleet
      and his personal desires creates an internal conflict that drives his behavior.
      While Starfleet itself is not directly present in this moment, its values and
      expectations shape Riker’s emotional state and the consequences he may face
      for his actions.
    active_representation: Through Riker’s internal conflict and the unspoken expectations
      of Starfleet’s principles, which contrast with his personal desires and the
      oppressive norms of J'naii society.
    power_dynamics: Operating under the constraints of Starfleet’s non-interference
      policy, Riker’s actions are a personal rebellion rather than an institutional
      one. His power in this moment is limited to his individual choices, which are
      shaped by his loyalty to Starfleet and his growing emotional connection to Soren.
    organizational_goals:
    - To uphold the principles of exploration and diplomacy, even in the face of personal
      temptation
    - To avoid direct interference in the internal affairs of other cultures, despite
      the moral and emotional challenges this poses
    influence_mechanisms:
    - The internal conflict within Riker, as he balances his personal desires with
      his duty to Starfleet
    - The unspoken expectations of Starfleet’s principles, which guide his actions
      even in moments of rebellion
    - The potential consequences of his actions, both for himself and for the broader
      mission of the Enterprise
    institutional_impact: The event highlights the institutional impact of Starfleet’s
      principles on Riker’s behavior, particularly in how they create an internal
      conflict between duty and desire. His kiss with Soren is a moment of personal
      rebellion, but it also raises questions about the limits of Starfleet’s non-interference
      policy and the moral complexities of cultural diplomacy.
    internal_dynamics: The internal dynamics of Starfleet are reflected in Riker’s
      struggle to reconcile his personal desires with his professional obligations.
      His actions in this event challenge the organization’s ideals, creating a tension
      that will likely drive future conflicts and resolutions.
    global_id: ger_organization_73a4b614bde7
  - organization_uuid: ger_organization_cf8ac3f7bd1a
    description_of_involvement: J'naii society looms over this event as an oppressive,
      ever-present force, its norms and expectations shaping every action and interaction
      between Riker and Soren. The society’s rejection of gender and physical intimacy
      creates a tension that drives their retreat into the woods, where they can briefly
      escape its constraints. Krite’s silent observation from the shadows serves as
      a reminder of the societal enforcement that threatens to disrupt their moment
      of intimacy. The organization’s influence is felt even in the absence of direct
      intervention, as Riker and Soren’s kiss is a direct rebellion against its oppressive
      ideals.
    active_representation: Through the enforcement of societal norms, embodied by
      Krite’s silent surveillance and the broader cultural expectations that drive
      Riker and Soren’s behavior.
    power_dynamics: Exercising authority over individuals through cultural conditioning,
      shame, and the threat of punishment. The organization’s power is absolute in
      the J'naii world, but this event highlights the fragility of its control in
      the face of individual desire.
    organizational_goals:
    - To maintain the genderless uniformity of J'naii society by suppressing any deviations,
      particularly those involving physical intimacy or gender identity
    - To ensure that Riker and Soren’s defiance does not go unpunished, reinforcing
      the societal norms through enforcement and public reckoning
    influence_mechanisms:
    - Cultural conditioning that instills shame and fear in those who deviate from
      norms
    - Surveillance and monitoring by individuals like Krite, who enforce compliance
      through vigilance and reporting
    - The threat of psychotectic therapy or other punitive measures for those who
      challenge the status quo
    institutional_impact: The event underscores the institutional impact of J'naii
      society’s oppressive norms, particularly in how they suppress individual desire
      and identity. Riker and Soren’s kiss, while a moment of rebellion, is also a
      testament to the fragility of their defiance in the face of such a powerful
      and entrenched system.
    internal_dynamics: The internal dynamics of J'naii society are revealed in the
      contrast between the public festivities in the civic chamber and the private
      rebellion in the woods. The organization’s rigid uniformity is challenged by
      the individual desires of its members, creating a tension that drives the narrative
      forward.
    global_id: ger_organization_cf8ac3f7bd1a
