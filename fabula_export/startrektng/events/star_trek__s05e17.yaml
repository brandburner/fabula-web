  - 'SOREN: "He? Commander, there are no he''s or she''s in a species without gender."'
  - 'RIKER: "Okay. For two days I''ve been trying to construct sentences without personal
    pronouns. I give up... what should I say? It? To us, that''s almost rude."'
  - 'SOREN: "We use a pronoun which is neutral. But it doesn''t really have a translation."'
  - 'RIKER: "Then I''ll just have to muddle through... so be tolerant if a stray ''he''
    or ''she'' slips by, okay?"'
