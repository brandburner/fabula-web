    - Emotional conflicts are secondary to physical safety and operational success.
    observed_traits:
    - Loyal to a fault, even in unsanctioned missions
    - Efficient in tactical execution (guards neutralized without prolonged conflict)
    - Understands the emotional stakes for Riker, though he does not intervene in
