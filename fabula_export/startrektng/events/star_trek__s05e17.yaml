- fabula_uuid: act_7458c377c4f63b1c
  number: 3
  summary: 'Riker and Soren prepare for the rescue mission, maintaining a formal distance
    despite their shared secret. Geordi confirms the energy buffer is installed, but
    warns of critical power drain within the null space. They launch, enter the null
    space, and locate the unconscious J''naii shuttle crew. The transporter fails
    to beam them out due to the null space''s interference, and power reserves plummet.
    Facing imminent death, Riker makes a desperate decision: he reroutes all remaining
    energy from the propulsion and navigation systems to the transporter for one final
    attempt, knowing it will cause the shuttle to explode. This high-stakes gamble
    succeeds, and Riker, Soren, and the rescued J''naii materialize safely in Sickbay.
    Krite, grateful for the rescue, invites the Enterprise crew to a formal gathering,
    during which he observes a lingering, formal exchange between Riker and Soren.
    Later, in a secluded garden, Soren approaches Riker. They maintain polite formality,
    but the tension between them is palpable. Soren leads Riker into the woods, ostensibly
    to show him plant life. Away from prying eyes, their suppressed emotions erupt;
    Riker takes Soren''s arm, and they share a deep, passionate kiss, solidifying
    their romantic connection.'
