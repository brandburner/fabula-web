  key_dialogue:
  - |-
    SOREN: Doctor... you are female.
    BEVERLY: Yes...
    SOREN: Forgive me... I don't mean to be rude... but I'm curious. What is it like?
  - |-
    SOREN: Do you... enjoy being a woman?
    BEVERLY: Yes. As a matter of fact, I enjoy it a lot.
  - |-
    RIKER: I'm glad you're all right...
    SOREN: What happened... why did the shuttle go into a spin?
    RIKER: Apparently, the port engine nacelle nicked one of the protrusions from the null pocket, and shut down.
    SOREN: Are we still on schedule for the rescue attempt?
    RIKER: That depends on how you're doing.
  - 'RIKER: Whoa... let''s get the doctor''s opinion first...'
