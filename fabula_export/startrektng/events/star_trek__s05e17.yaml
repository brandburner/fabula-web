  description: 'After a technical systems review aboard the shuttle, Riker—impressed
    by Soren’s expertise and growing comfortable with their dynamic—shifts the interaction
    from professional to personal by abruptly suggesting lunch. The moment marks a
    deliberate pivot: Riker, having struggled with the J''naii’s gender-neutral language,
    now uses the casual invitation as a test of their burgeoning connection. Soren’s
    amused reaction (a smile, a pause) signals their awareness of the shift, though
    neither explicitly acknowledges the subtext. The beat underscores Riker’s calculated
    but genuine effort to bridge the emotional distance between them, while Soren’s
    guarded openness hints at their own unspoken longing. The transition from shuttle
    to Ten Forward (implied by the lunch suggestion) sets up a more intimate setting,
    where cultural and personal barriers may soften further. The dialogue reveals
    Riker’s frustration with the J''naii’s rigid pronouns, framing his eventual slip-ups
    as a metaphor for the larger cultural clashes to come. For Soren, the moment is
    a rare glimpse of human informality—a contrast to their own society’s asexual
    norms—that both intrigues and unsettles them.'
