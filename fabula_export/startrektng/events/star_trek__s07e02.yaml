    emotional_state: Clinical and detached throughout, with no visible signs of stress
      or urgency, even as the shuttle plummets toward the planet.
    goals:
    - To maintain control of the shuttle and navigate the crisis with precision
    - To fulfill his role as pilot, ensuring the mission’s objectives are met despite
      the emergency
    what_happened: Voval remains seated at the shuttle controls, his posture rigid
      and unyielding as Picard attempts to engage him in conversation. He responds
      to Picard’s inquiries with terse, dismissive answers ('No', 'Seventeen hours,
      thirty-two minutes'), his tone clinical and detached. When the shuttle’s systems
      fail, he scans the console with methodical precision, announcing the power failure
      and the cause—an energy disruption field—with detached professionalism. His
      admission of 'Attitude controls failing' is delivered without emotion, and his
      final directive, 'Prepare for impact,' is calm and authoritative, reflecting
      his Iyaaran training in emotional detachment. His actions contrast sharply with
      Picard’s urgency, emphasizing the cultural divide between them.
