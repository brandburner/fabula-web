  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: 'Starfleet''s presence in this event is embodied through
      the crew''s adherence to diplomatic protocol, even as the Iyaarans test its
      limits. The organization''s values—curiosity, adaptability, and respect for
      diverse cultures—are on full display, though strained by Byleth''s provocations
      and Loquel''s unorthodox immersion. Troi and Riker represent Starfleet''s idealistic
      side, guiding the exchange with patience, while Worf and Data embody its institutional
      challenges: the tension between personal values (Worf''s Klingon honor) and
      professional duty (Starfleet''s diplomatic mission). The crew''s collective
      effort to uphold Starfleet''s reputation, despite the Iyaarans'' rigid expectations,
      highlights the organization''s commitment to cultural understanding, even when
      it is difficult or uncomfortable.'
    active_representation: Through the crew's actions and dialogue, particularly Troi's
      guidance of Loquel and Worf's restrained responses to Byleth. The dress uniforms
      worn by the officers also symbolize Starfleet's formal commitment to the exchange.
    power_dynamics: Starfleet is the host and thus holds the positional power, but
      the Iyaarans' study of human culture gives them a psychological advantage, as
      they are actively testing and provoking the crew. The power dynamic is one of
      mutual observation, with Starfleet seeking to facilitate the exchange and the
      Iyaarans seeking to extract data.
