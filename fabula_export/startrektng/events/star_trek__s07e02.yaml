acts:
- fabula_uuid: act_db78b3080e9c57df
  number: 1
  summary: Act One begins with the initial cultural exchange, following the events
    of the teaser where Worf, visibly uncomfortable with diplomatic duties, is reluctantly
    assigned as a liaison to the demanding Ambassador Byleth. Picard prepares for
    his journey to Iyar with Voval. At a reception in Ten Forward, Counselor Troi
    introduces Ambassador Loquel to the concept of human 'pleasure' through various
    desserts, particularly a Ktarian Chocolate Puff, which he finds 'delicious' and
    promptly takes the entire platter. This interaction clearly establishes Loquel's
    mission to explore this aspect of human experience. Concurrently, Worf's patience
    is severely tested by Byleth's rude and imperious behavior regarding food, foreshadowing
    his role in understanding antagonism. Data's ironic suggestion for Worf to find
    common ground with Byleth's demanding nature highlights their shared qualities.
    The narrative then shifts dramatically as Picard and Voval depart in the Iyaaran
    shuttle. The shuttle suddenly encounters an unknown energy disruption field, leading
    to a system-wide power failure and a violent crash-landing on a desolate, M-Class
    planet. Picard, disoriented, discovers Voval wounded and semi-conscious. He attempts
    to contact the Enterprise but finds communications jammed by interference. Deciding
    to seek help, Picard leaves Voval in the wreckage but is struck unconscious by
    a powerful plasma lightning flash. A mysterious humanoid figure then drags Picard
    away from the crash site, leaving his fate uncertain and marking a significant
    turning point, effectively isolating the captain from his crew and the established
    diplomatic mission.
