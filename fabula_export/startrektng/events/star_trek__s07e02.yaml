- fabula_uuid: act_df836dcb9ff17256
  number: 3
  summary: Act Three focuses on Picard's captivity and Anna's escalating emotional
    dependency. Picard awakens again, finding Anna watching him by a fire. She provides
    him with food, and he learns her name is Anna and that she has been stranded on
    the planet for seven years since her own ship crashed (Stardate 40812). Picard,
    still recovering from his supposed injuries, proposes they use his shuttle's communication
    equipment to signal for rescue. Anna expresses hope but insists on his severe
    injuries, pointing to the 'restriction device' on his ribs as necessary for healing.
    She agrees to retrieve the com panel from the shuttle but returns with it inexplicably
    damaged, claiming an accidental phaser blast. Picard, examining the charred circuitry,
    realizes the damage is too severe to be accidental and suspects foul play. Overcome
    with guilt and fear, Anna breaks down, confessing her profound loneliness and
    desperation to keep Picard from leaving her, revealing her motive for sabotaging
    their escape. The act culminates in Anna kissing Picard and declaring her love,
    a moment that leaves Picard deeply uncomfortable and concerned, as he recognizes
    the unhealthy and possessive nature of her attachment, setting up a direct conflict
    between his desire for escape and Anna's emotional needs.
