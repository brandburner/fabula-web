- fabula_uuid: cand_evt_scene_8134dd0c8eab2a8e_02
  global_id: null
  title: Anna reveals seven-year isolation
  description: Picard awakens in a derelict freighter, disoriented and injured, to
    find a mysterious woman—Anna—tending to him. Their initial interaction is tense,
    with Anna silencing Picard’s questions and revealing the shuttle pilot is dead.
    Hours later, Picard regains consciousness to find Anna watching him silently.
    She confirms she was a passenger on the crashed ship and has been stranded alone
    for seven years, a revelation that visibly unravels her. Picard, recognizing her
    trauma, offers Starfleet rescue, but Anna’s guarded resistance—culminating in
    her fleeting, vulnerable touch to his face—exposes the fragile trust between them.
    The moment underscores the psychological toll of isolation and the fragile, unspoken
    bond forming beneath their cultural and emotional divides, setting up Anna’s eventual
    reveal as Voval and her forced intimacy experiment.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e02
  scene_sequence: 11
  sequence_in_scene: 17
  key_dialogue: &id017
  - |-
    PICARD: Is someone there? Who's there... ?
    ANNA: Shhh...
  - |-
    ANNA: He's dead.
    PICARD: Wait. Someone else was with me... the pilot of the shuttlecraft... he's wounded... please, he needs your help...
  - |-
    ANNA: Seven years... I thought... one year... or two maybe... but how could it be seven...
    PICARD: Anna... it's all right...
  - |-
    PICARD: On my shuttle, there's a lot of equipment that survived the crash. We can use it to contact Starfleet. They'll send a ship for us. We can leave.
    ANNA: Leave?
    PICARD: Yes. Both of us. If you can get me back to the shuttle...
  - 'ANNA: I just... wanted to make sure you were real.'
