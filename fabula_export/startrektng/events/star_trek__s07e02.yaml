  key_dialogue:
  - 'ANNA: What... what are you doing? Get back in bed!'
  - 'PICARD: Anna... why is the door kept bolted from the outside?'
  - 'ANNA: For your protection...'
  - 'PICARD: How did this happen? It looks as though it''s been hit by a phaser blast.'
  - 'ANNA: I had to use a phaser to cut it free... maybe I accidentally damaged it...
    you can fix it, can''t you?'
  - 'PICARD: No.'
  - 'ANNA: I''m sorry.... I''m sorry... I can''t believe I did that... ruined our
    one chance... after waiting so long...'
  - 'ANNA: From the moment I saw you, I knew you were here to save me... I''ll do
    anything you want... just don''t leave me. I don''t want to be alone again...'
  - 'ANNA: I love you...'
