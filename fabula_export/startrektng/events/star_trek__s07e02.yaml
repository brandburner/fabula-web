  title: Byleth’s Elevator Provocation
  description: "\n  In the confined space of the *Enterprise*’s elevator, Byleth escalates\
    \ his psychological assault on Worf by first interrupting a technical tour with\
    \ a condescending question about antimatter replenishment rates—exposing Worf’s\
    \ lack of engineering expertise in front of Geordi. When Worf hesitates, Byleth\
    \ publicly dismisses him as intellectually inferior, then demands to inspect the\
    \ Bussard collectors. The claustrophobic setting forces Worf into physical proximity\
    \ with Byleth, who then compounds the humiliation by sniffing the air and asking,\
    \ 'Do you bathe?'—a direct challenge to Klingon honor codes. The exchange strips\
    \ away diplomatic pretense, revealing Byleth’s calculated study of antagonism\
    \ and Worf’s simmering rage, setting up the inevitable confrontation to come.\n\
    \  "
