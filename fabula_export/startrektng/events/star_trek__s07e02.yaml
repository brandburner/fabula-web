      pragmatism), **weakening their unified front**
    institutional_impact: "\n        The scene **highlights the fragility of the Federation’s\
      \ diplomatic ideal** when faced with a **culture that refuses to engage in good\
      \ faith**. The crew’s **adaptive tactics** (like the poker game) reveal how\
