  - |-
    LOQUEL: Are you going to eat?
    TROI: Excuse me?
    LOQUEL: You have no food on your plate. Are you going to eat?
    TROI: Oh... actually, I was waiting until we got to the dessert tray.
  - |-
    TROI: It's something we eat after the main course. It's usually very sweet... usually very bad for you. We eat it purely for pleasure.
    LOQUEL: My people eat only for nourishment.
  - |-
    LOQUEL: It is... it is...
    TROI: Delicious?
    LOQUEL: ((smiles at the word)) Delicious...
  - |-
    BYLETH: This is unacceptable.
    WORF: I am sorry if you do not care for our -
    BYLETH: Bring me new food. I require a higher protein and enzymatic content.
  - |-
    DATA: I have found that in moments of diplomatic tension, it is often helpful to find elements of commonality.
    WORF: Ambassador Byleth is... demanding... temperamental... rude...
    DATA: You share all of those qualities in abundance. Perhaps you should build on your similarities.
