- fabula_uuid: cand_evt_scene_84e83f8eab0188dd_03
  global_id: null
  title: Picard’s Truth and Voval’s Revelation
  description: |2-

      Picard’s growing suspicion of Anna’s deception reaches a breaking point when he forcibly removes the medical device she used to immobilize him, exposing the absence of his supposed injuries. His confrontation escalates as Anna—revealed as an Iyaaran ambassador—attempts to manipulate him through forced intimacy, only to abandon the ruse when he rejects her. Trapped in a locked cargo hold, Picard hears Voval’s voice outside, only for the door to open and reveal the 'dead' pilot alive and unharmed. Voval’s explanation of his species’ ability to feign death is cut short when Picard, now fully aware of the deception, follows him to a cliffside ledge where Anna—revealed as Voval in disguise—threatens suicide unless Picard confesses love. Picard’s refusal triggers a final transformation: Anna’s necklace is restored, and she reveals herself as Voval, admitting his mission to study human love through staged manipulation. The event shatters Picard’s assumptions about the Iyaarans’ motives, their cultural exchange, and the fragility of his own understanding of their species.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e02
  scene_sequence: 19
  sequence_in_scene: 34
  key_dialogue: &id025
  - 'PICARD: There''s no pain. It would seem my ribs weren''t broken after all...'
  - 'ANNA: I failed... you don''t love me... it''s over...'
  - 'PICARD: You staged the crash... faked my injury... and arranged all this to see
    if I would fall in love with you?'
  - 'VOVAL: My mission was to study human intimacy... specifically the concept you
    call love...'
