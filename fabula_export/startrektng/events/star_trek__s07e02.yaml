  - 'WORF: You are an insulting, pompous fool! If you were not an Ambassador, I would
    disembowel you right here!'
  - 'BYLETH: Do not let my title inhibit you, Klingon!'
  - 'BYLETH: Wonderful... very good! Thank you, Lieutenant Worf. I think I understand
    now. That was a very effective demonstration.'
