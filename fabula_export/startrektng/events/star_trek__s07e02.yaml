  title: Picard uncovers Anna’s deception and experiment
  description: 'Picard removes the medical restriction device Anna imposed, revealing
    his ribs were never broken—a lie she used to justify keeping him captive. The
    confrontation forces Anna to confront her own manipulation, exposing her inconsistencies
    and the fragility of her control over him. When Picard rejects her desperate attempts
    to seduce him, she abandons her pretense, declares the experiment a failure, and
    flees. The moment fractures their dynamic, revealing the depth of her deception
    and the precariousness of their alliance. Picard’s discovery of the necklace’s
    reappearance and Voval’s sudden arrival further unravel the truth: Anna was never
    human but an Iyaaran ambassador studying human love through calculated manipulation.
    The event culminates in Voval’s transformation back into their true form, admitting
    their mission’s failure and exposing the ethical boundaries of the cultural exchange
    program.'
