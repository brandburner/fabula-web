- fabula_uuid: act_7e459cc6d0435973
  number: 4
  summary: Act Four intensifies both narrative threads, bringing the Enterprise crew's
    frustration to a head and Picard's suspicions about Anna into sharp focus. Picard
    attempts to repair a power cell to reactivate the shuttle engines, while Anna,
    having cleaned herself up, tries to deepen their emotional connection, reiterating
    her love and asking him to promise to show her the Enterprise. Picard, recognizing
    her infatuation, gently but firmly rejects her advances, explaining that her feelings
    are likely confused by trauma and his role as a rescuer, though Anna's hopeful
    expression soon darkens, hinting at her true intentions. Concurrently, on the
    Enterprise, the diplomatic mission reaches a boiling point during a poker game.
    Ambassador Byleth blatantly cheats, provoking Worf into a furious confrontation
    that escalates into a physical fight, with Worf throwing Byleth against a wall.
    To Worf's astonishment, Byleth expresses satisfaction, declaring he has successfully
    understood 'antagonism.' Back on the planet, Picard, determined to escape, removes
    the 'restriction device,' only to discover he has no injury. He confronts Anna,
    accusing her of lying about his injuries, locking him in, and deliberately damaging
    the com panel. Anna breaks down, confessing her fear of abandonment. Her desperation
    turns aggressive as she forces kisses on Picard, who repels her. Anna, realizing
    her 'failure,' flees, dropping her necklace. As Picard tries to force open the
    locked door, Voval, the shuttle pilot, appears alive and well, opening the door
    from the outside, leaving Picard stunned by this sudden, impossible revelation.
