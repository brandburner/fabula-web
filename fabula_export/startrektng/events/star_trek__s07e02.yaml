    description_of_involvement: The metallic disc attached to Picard’s rib cage is
      a critical medical device that restricts his movement and accelerates the healing
      of his broken ribs. When Picard attempts to sit up, the device activates an
      energy field that jolts his hand away, reinforcing his physical vulnerability.
