    description_of_involvement: "\n        The **Iyaaran Government** casts a **long\
      \ shadow** over this scene, its **manipulative diplomacy** the **root cause**\
      \ of Worf’s crisis. While physically absent, its **influence is omnipresent**:\
      \ Byleth’s provocations are **sanctioned by his government’s study of antagonism**,\
