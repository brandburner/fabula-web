  global_id: null
  title: Byleth undermines Worf in Engineering
  description: In Engineering, Worf attempts to guide Ambassador Byleth through a
    technical tour of the Enterprise’s systems, but Byleth abruptly interrupts his
    explanation with a highly specific question about antimatter replenishment rates—demonstrating
    his intent to expose Worf’s perceived intellectual limitations. When Worf admits
    uncertainty, Byleth pivots to Geordi, openly questioning whether he is ‘smarter’
    than Worf, a direct humiliation that forces Geordi into an impossible diplomatic
    bind. Byleth then dismisses the entire exchange with a condescending ‘Never mind’
    and abruptly demands to inspect the Bussard collectors, escalating his power play.
    The exchange culminates in Worf’s barely contained fury as he leads Byleth to
    the elevator, where Byleth’s final insult—asking if Worf ‘bathes’—pushes the Klingon
    to the brink of physical confrontation. The scene serves as a microcosm of the
    cultural exchange’s unraveling, with Byleth’s calculated provocations laying the
    groundwork for Worf’s eventual violent outburst, which Byleth will later frame
    as a successful demonstration of human antagonism. The tension is heightened by
    the confined, intimate setting of the elevator, where Byleth’s proximity and personal
    insult force Worf into a space of visceral, unspoken rage.
