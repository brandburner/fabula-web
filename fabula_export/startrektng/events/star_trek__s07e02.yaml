  - character_uuid: ger_agent_b1e9e0b6f423
    emotional_state: Conflict between duty and compassion, masking frustration with
      composed resolve
    goals:
    - Secure help for Voval and ensure their survival
    - Reestablish contact with the *Enterprise* to coordinate rescue
    what_happened: Picard moves with urgent precision through the wrecked shuttle,
      first assessing Voval’s injuries and attempting—unsuccessfully—to contact the
      *Enterprise* via the COM console. Frustration flashes across his face as static
      drowns out his hails, but he quickly pivots, retrieving his tricorder to scan
      for nearby structures. His leadership is tested as he makes the agonizing choice
      to leave Voval behind, wrapping his jacket around the injured pilot for warmth
      and stability before forcing open the shuttle doors to brave the planet’s plasma
      storms alone.
