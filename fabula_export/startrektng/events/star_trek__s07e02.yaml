      The make-shift cot serves as Picard’s resting place in the derelict freighter, providing a surface for him to recover from his injuries. It is a simple but critical object, symbolizing both his physical vulnerability and the improvisational nature of their survival. Anna interacts with the cot as she tends to Picard, adjusting his position and ensuring his comfort. The cot’s presence underscores the stark contrast between their current circumstances and the technological sophistication of Starfleet.
