  title: Voval’s deception and love experiment exposed
  description: 'Picard, now fully recovered from his staged injuries, confronts Anna
    in the cargo freighter after discovering the medical device’s deception. His growing
    suspicion escalates when Anna—desperate to force a declaration of love—physically
    assaults him, revealing her manipulative nature. When Picard chases her to a cliff’s
    edge, she threatens suicide unless he confesses his love, but his refusal triggers
    her transformation into Ambassador Voval. The revelation exposes the Iyaaran experiment:
    Voval orchestrated the shuttle crash, Picard’s injuries, and the entire relationship
    to study human intimacy. The deception shatters Picard’s trust and underscores
    the cultural divide between human emotion and Iyaaran scientific detachment. The
    scene pivots from psychological tension to outright confrontation, forcing Picard
    to question the entire cultural exchange program’s legitimacy.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e02
  scene_sequence: 19
  sequence_in_scene: 35
  key_dialogue: &id027
  - 'PICARD: There''s no pain. It would seem my ribs weren''t broken after all...
    What the hell''s going on? Why are you trying to keep me here?'
  - 'ANNA: Please... I was so afraid... I didn''t want you to leave me... I was scared...
    I wanted you to stay... to love me...'
  - 'PICARD: You don''t have to do this. I found Voval, the shuttle pilot—he''s still
    alive. He can help us get away... Anna: I don''t care.'
  - 'PICARD: Your necklace. I broke it. It was lying in the cargo freighter, by the
    fire... I left it there. Now it''s whole again and back on your neck. How?'
  - 'VOVAL: My name is Ambassador Voval. My mission was to study human intimacy...
    specifically the concept you call love... You staged the crash... faked my injury...
    and arranged all this to see if I would fall in love with you?'
  is_flashback: false
  location_uuid: ger_location_9d12b2eb42f2
