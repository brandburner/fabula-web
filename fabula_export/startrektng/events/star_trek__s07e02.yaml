    description_of_involvement: The Bussard collectors are the abrupt destination
      of Byleth’s demand after he dismisses the antimatter discussion with condescension.
      His pivot to inspecting them is a calculated move to prolong Worf’s humiliation,
      forcing the Klingon to comply with his orders despite the simmering rage. The
      collectors themselves are never shown, but their mention serves as a pretext
      to transition the confrontation from Engineering to the turbolift—a confined
      space where Byleth can deliver his final insult. The object’s off-screen presence
      highlights Byleth’s control over the situation; he dictates the terms of the
      ‘tour,’ using technical requests as weapons. The collectors symbolize the futility
      of Worf’s attempts to regain agency, as even his role as a guide is subverted.
    status_before_event: Functioning normally, integrated into the *Enterprise*’s
      impulse systems, with standard diagnostic readings (irrelevant to the scene’s
