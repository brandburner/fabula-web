    emotional_state: Initially concerned (for the experiment’s outcome), then resigned
      and detached upon admission of failure—revealing the Iyaarans’ emotional detachment
      from the consequences of their actions.
    goals:
    - Ensure the experiment’s completion, even if it requires coercion.
    - Avoid personal or political fallout from the deception’s exposure.
    what_happened: Voval, in his true form, arrives at the cargo freighter after Anna’s
      escape, guiding Picard to the cliff’s edge where Anna (still in disguise) threatens
      suicide. His urgency to find her suggests concern for the experiment’s integrity,
      not her well-being. Once exposed, he admits failure, revealing the Iyaaran Government’s
      manipulative methods and the ethical void in their cultural exchange program.
    observed_status: Voval, in his true form, arrives at the cargo freighter after
      Anna’s escape, guiding Picard to the cliff’s edge where Anna (still in disguise)
      threatens suicide. His urgency to find her suggests concern for the experiment’s
      integrity, not her well-being. Once exposed, he admits failure, revealing the
      Iyaaran Government’s manipulative methods and the ethical void in their cultural
      exchange program.
    beliefs:
    - Scientific study of alien emotions is justified, regardless of ethical concerns.
    - 'The Iyaaran Government’s methods, while manipulative, serve a greater purpose:
      understanding humanity.'
