  global_id: null
  title: Byleth Overrides Picard’s Liaison Assignment
  description: In the shuttlebay, Captain Picard formally welcomes the Iyaaran ambassadors—Loquel,
    Byleth, and pilot Voval—while assigning liaisons to each. Picard introduces Worf
    as security chief and Riker as Byleth’s liaison, but Byleth abruptly rejects Riker,
    demanding Worf instead. Picard, caught off-guard, acquiesces despite Worf’s visible
    discomfort. Byleth’s dismissive demeanor and Worf’s reluctant compliance signal
    the Iyaarans’ disregard for Federation protocol and foreshadow escalating tensions
    between the crew and their guests. The exchange underscores Byleth’s manipulative
    authority and the *Enterprise*’s vulnerability to Iyaaran interference, while
    Riker and Picard’s unspoken reaction hints at future friction over chain-of-command
    disruptions.
