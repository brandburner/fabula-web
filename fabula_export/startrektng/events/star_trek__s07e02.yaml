      part of an experiment)
    goals:
    - Maintain the ruse of being a wounded pilot to observe Picard’s leadership in
      crisis
    - Gather data on human emotional responses under duress
    what_happened: Voval lies semi-conscious on the shuttle floor, a wound on his
      forehead, responding weakly to Picard’s attempts to stabilize him. He manages
      a nod as Picard instructs him to stay put, his vulnerability seemingly genuine
      but later revealed as part of an Iyaaran experiment. His physical state—pale,
      pained, and dependent—contrasts with the calculated nature of his true role
      as an ambassador studying human emotions.
