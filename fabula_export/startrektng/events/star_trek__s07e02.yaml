  title: Worf and Byleth's violent confrontation
  description: A poker game between Worf, Byleth, and the Enterprise crew devolves
    into open hostility when Byleth's cheating and taunts about Klingon honor push
    Worf to the breaking point. After Byleth shoves Worf, the Klingon retaliates by
    hurling him into the wall, prompting a physical altercation that Riker struggles
    to break up. The fight ends abruptly when Byleth expresses satisfaction, revealing
    his antagonism study was the true purpose of the provocation. The scene underscores
    the Iyaarans' manipulative approach to cultural exchange and the crew's growing
    frustration with their guests' methods. Worf's loss of control serves as a demonstration
    for Byleth's research, while the crew is left bewildered by the Iyaarans' lack
    of ethical boundaries in their studies of human behavior.
