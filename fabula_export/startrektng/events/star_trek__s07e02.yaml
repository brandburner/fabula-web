- fabula_uuid: act_e65e2a96fe3e412a
  number: 5
  summary: 'Act Five provides the climax and resolution for both storylines, revealing
    the true nature of the Iyaaran mission. Picard, shocked by Voval''s appearance,
    learns that Voval''s species can slow their metabolism, making injuries appear
    fatal. Voval expresses concern for Anna, mentioning a dangerous precipice, and
    insists they search for her together, arousing Picard''s suspicion. At the precipice,
    Picard finds Anna, who threatens to jump unless he promises his love. Picard,
    noticing her broken necklace is now intact, calls her bluff, exposing her manipulation
    and the coordinated nature of her and Voval''s actions. Anna then transforms into
    Voval, who reveals himself as Ambassador Voval. He explains that the entire elaborate
    scenario—the staged crash, fake injury, and forced intimacy—was an experiment
    to understand human ''love,'' mirroring Loquel''s study of ''pleasure'' and Byleth''s
    study of ''antagonism.'' Picard, while acknowledging the ''intriguing'' nature
    of their direct approach, informs Voval that such methods are considered criminal
    in human culture. With the experiment concluded and the shuttle confirmed to be
    undamaged, Picard and Voval return to the Enterprise. There, the other ambassadors
    share their ''enlightening'' experiences: Byleth describes his ''excruciating''
    Holodeck battles with Worf, which helped him understand antagonism, and Loquel,
    having indulged in ''delicious'' pleasures, now desires something ''bland.'' The
    ambassadors depart, leaving Picard and his crew to reflect on the extreme, yet
    ultimately educational, cultural exchange.'
