  title: Worf struggles with Starfleet dress uniform
  description: "\n  Worf stands in his quarters, visibly frustrated as he attempts\
    \ to tie the ornate sash of his Starfleet dress uniform, repeatedly failing to\
    \ secure it properly. His discomfort with the uniform—particularly its resemblance\
    \ to what he perceives as 'dresses'—exposes his deeper resistance to the diplomatic\
    \ mission's cultural expectations. When Riker enters and offers to help, Worf's\
    \ reluctance becomes more apparent, culminating in Riker's ill-timed joke ('you\
    \ look great in a dress') that lands poorly, underscoring Worf's vulnerability.\
    \ The moment highlights his internal conflict: his Klingon identity clashes with\
    \ Starfleet's diplomatic demands, foreshadowing his later struggles with Ambassador\
    \ Byleth's provocations. The scene establishes Worf's discomfort as a physical\
    \ and symbolic barrier to his role in the cultural exchange, setting up his eventual\
    \ confrontation with Iyaaran expectations of antagonism.\n  "
