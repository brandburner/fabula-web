  - organization_uuid: ger_organization_4b15ac5e2e67
    description_of_involvement: The Iyaaran Government is represented in this event
      through the actions and dialogue of its ambassadors—Voval, Loquel, and Byleth—as
      well as the shuttle pilot. Their diplomatic methods, which prioritize extreme
      experiences (pleasure, antagonism, and love) as tools for cultural study, are
