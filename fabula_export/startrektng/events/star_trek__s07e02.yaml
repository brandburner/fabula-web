      \ utilitarian approach** to diplomacy vs. the **Federation’s idealistic (but\
      \ strained) commitment to understanding**. Riker’s poker proposal is a **tactical\
      \ maneuver** to **protect the mission**, revealing how the **Iyaaran Government’s\
      \ actions** force Starfleet to **adapt or fail**.\n      "
    active_representation: "\n        **Via the actions of its ambassadors (Byleth\
      \ and Loquel)**, whose behaviors are **direct extensions of Iyaaran governmental\
      \ policy**. The crew’s reactions to the ambassadors are, in effect, **reactions\
      \ to the Iyaaran Government itself**.\n      "
    power_dynamics: "\n        **Asymmetric and testing**—the Iyaarans hold **informational\
      \ power** (they are studying the crew), while the Federation holds **institutional\
      \ power** (they host the exchange). The Iyaarans **challenge Starfleet’s authority**\
      \ by **provoking reactions**, forcing the crew to **defend their values under\
