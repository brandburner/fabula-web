      intentions
    - To reveal her isolation gradually, testing Picard’s empathy and reliability
    - To secure the com panel from the shuttle, both as a means of potential rescue
      and as a step toward fulfilling her experimental objectives
    what_happened: |2-

      Anna, later revealed to be Ambassador Voval in disguise, tends to Picard with a mix of guardedness and nurturing care. She silences his initial questions with a gesture, her voice hoarse as she reveals the shuttle pilot’s death. Hours later, she reveals her seven-year isolation, a revelation that visibly distresses her. She prepares food for Picard, explains the medical device on his ribs, and briefly touches his face—a moment of vulnerability—before exiting to retrieve the com panel. Her demeanor is a complex blend of tension, curiosity, and fragile hope.
