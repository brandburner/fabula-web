  - character_uuid: ger_agent_b1e9e0b6f423
    emotional_state: Suspicious → Angry → Determined → Resolute
    goals:
    - Expose Anna’s deception and uncover the truth behind the staged crash and his
      'injuries'.
    - Protect himself from further manipulation and ensure his safe return to the
      *Enterprise*.
    what_happened: Picard systematically dismantles Anna’s lies by removing the medical
      restriction device, revealing his uninjured ribs. He confronts her with growing
      suspicion, exposing inconsistencies in her story about the plasma storms, the
      com panel, and her motives for keeping him captive. When Anna’s emotional manipulation
      escalates into physical force, Picard firmly rejects her advances, demonstrating
      his moral resolve. His discovery of Anna’s necklace—intact and back on her neck—triggers
      his realization of her true identity as Ambassador Voval. He pursues her to
      the cliffside ledge, where her transformation into Voval exposes the Iyaaran
      deception, culminating in a confrontation that forces Voval to admit the failure
      of their experiment on human love.
    observed_status: Picard systematically dismantles Anna’s lies by removing the
      medical restriction device, revealing his uninjured ribs. He confronts her with
      growing suspicion, exposing inconsistencies in her story about the plasma storms,
