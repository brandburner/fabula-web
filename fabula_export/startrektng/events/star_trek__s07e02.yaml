  key_dialogue:
  - 'ANNA: What... what are you doing? Get back in bed!'
  - 'PICARD: Anna... why is the door kept bolted from the outside?'
  - 'ANNA: For your protection...'
  - 'PICARD: From what?'
  - 'ANNA: I''m sorry... I''m sorry... I can''t believe I did that... ruined our one
    chance... after waiting so long...'
  - 'ANNA: At first, I kept hoping that I''d be rescued... every day I''d set up a
    microfusion flare... and I''d look up in the sky and wait for someone to take
    me away... ... and it never happened.'
  - 'ANNA: There''s a precipice near here... I used to go there and stare down into
    the gorge... and think... I could just step off... and it would all be over...
    Then I realized... it was the hope that was driving me crazy... I had to accept
    that I was never going to get out of here...'
  - 'ANNA: From the moment I saw you, I knew you were here to save me... I''ll do
    anything you want... just don''t leave me. I don''t want to be alone again...'
  - 'ANNA: I love you...'
