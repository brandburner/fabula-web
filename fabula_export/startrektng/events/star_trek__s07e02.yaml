- fabula_uuid: cand_evt_scene_6c907b4e070b1a2d_02
  global_id: null
  title: Picard chooses survival over Voval
  description: 'After the shuttle crash leaves Voval critically injured, Picard prioritizes
    securing help over immediate medical aid. He scans the planet’s surface, detects
    a distant energy source, and makes the agonizing decision to abandon Voval—despite
    the pilot’s vulnerability—to seek assistance. The choice reflects Picard’s leadership
    under duress, where mission imperative clashes with moral instinct. His actions
    underscore the precariousness of their situation: the planet’s hostile environment,
    the unreliable comms, and the ambiguity of Voval’s true identity (later revealed
    as Ambassador Voval). The moment also foreshadows the Iyaaran ambassadors’ manipulative
    nature, as Voval’s staged injury may be part of a larger experiment. Picard’s
    departure leaves Voval alone, vulnerable, and the shuttle exposed to the planet’s
    plasma storms, raising stakes for both characters’ survival and the mission’s
    success.'
