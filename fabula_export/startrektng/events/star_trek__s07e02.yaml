    arrives unannounced at his quarters to demand an immediate tour of the arboretum
    and bio-labs. Byleth immediately accuses Worf of being late, despite Worf having
    no prior knowledge of the meeting time. When Worf questions the claim, Byleth
    escalates the confrontation by calling him a liar and dismissing his competence,
    adding the incident to a growing list of perceived inadequacies. The exchange
    exposes Byleth’s deliberate provocation—part of his study of human antagonism—and
    forces Worf into a defensive posture, further straining their already tense dynamic.
    The scene underscores the cultural exchange program’s failure to bridge understanding,
    as Byleth’s methods clash with Worf’s Klingon honor and Starfleet professionalism.
    The confrontation also serves as a microcosm of the broader narrative tension:
    the Iyaarans’ unorthodox research methods are destabilizing the crew’s cohesion,
    with Worf becoming the most visible casualty of their experiments in antagonism.'
