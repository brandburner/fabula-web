  object_involvements:
  - object_uuid: ger_object_95dc19546b3c
    description_of_involvement: The metal bar, used by Picard to pry open the locked
      door of the cargo freighter, symbolizes his determination to escape the Iyaaran
      trap. Its improvised use contrasts with the high-tech deception of the medical
      device and holographic pin, emphasizing Picard’s resourcefulness and refusal
      to be a passive subject in the experiment.
    status_before_event: Lying unused in the cargo freighter, an ordinary tool repurposed
      for escape.
    status_after_event: Used to force open the door, enabling Picard’s pursuit of
      Anna and eventual confrontation with Voval. Its function shifts from mundane
      to pivotal in the unraveling of the deception.
    global_id: ger_object_95dc19546b3c
  - object_uuid: ger_object_437e1f9fd23d
    description_of_involvement: The medical device, initially used to simulate Picard’s
      injuries and restrict his movement, becomes the catalyst for the confrontation.
      When Picard removes it, the absence of wounds exposes Anna’s deception. The
      device symbolizes the Iyaarans’ scientific detachment—using technology to manipulate
      emotions for study, blurring the line between medicine and psychological control.
    status_before_event: Attached to Picard’s torso, emitting an energy field to simulate
      pain and restrict movement. Functioning as a tool of deception to keep him immobilized.
    status_after_event: Removed by Picard and discarded, revealing the staged nature
      of his injuries. No longer functional in the deception, it becomes physical
      proof of the Iyaarans’ manipulation.
    global_id: ger_object_437e1f9fd23d
  - object_uuid: ger_object_b8b98d7fbc0a
    description_of_involvement: Anna’s necklace, a seemingly personal adornment, serves
      as a clue to her true identity. When Picard breaks it during their struggle,
      its sudden reappearance around Anna’s neck at the cliff’s edge confirms the
      holographic disguise. The necklace becomes a visual metaphor for the fragility
      of the Iyaarans’ deception and the inevitability of its exposure.
    status_before_event: Broken and left behind in the cargo freighter, appearing
      as a discarded prop.
    status_after_event: Reappears intact around Anna’s neck, revealing the necklace
      as part of the holographic projection system. Its restoration underscores the
      technological nature of the deception.
    global_id: ger_object_b8b98d7fbc0a
  - object_uuid: ger_object_fbb1c73dd34f
    description_of_involvement: The com panel, earlier presented as damaged, is implied
      to be part of the staged deception. Picard’s suspicion of its condition foreshadows
      the broader manipulation, though it is not directly interacted with in this
      event. Its role as a false prop highlights the Iyaarans’ meticulous planning
      to isolate Picard and control the narrative.
    status_before_event: Presented as phaser-charred and irreparable, reinforcing
      the illusion of a crashed shuttle and no means of escape.
    status_after_event: Unmentioned in this event, but its earlier deception is confirmed
      as part of the Iyaaran experiment’s design.
    global_id: ger_object_fbb1c73dd34f
  - object_uuid: ger_object_6e724e5686de
    description_of_involvement: Voval’s insignia pin, a holographic projection device
      disguised as standard insignia, is the key to Anna’s transformation. When Anna
      touches the pendant on her necklace (a prop in the disguise), the pin deactivates
      the hologram, revealing Voval’s true form. This object underscores the Iyaarans’
      technological sophistication and their willingness to use deception as a tool
      for cultural study.
    status_before_event: Concealed beneath Voval’s (as Anna’s) clothing, active and
      maintaining the holographic disguise.
    status_after_event: Exposed and deactivated, restoring Voval’s true appearance
      and ending the charade. The pin’s function is revealed as a tool of manipulation,
      not diplomacy.
    global_id: ger_object_6e724e5686de
  location_involvements:
