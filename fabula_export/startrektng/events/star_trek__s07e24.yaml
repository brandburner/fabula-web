  global_id: null
  title: Enterprise fires warning shot at Maquis
  description: "\n  The *Enterprise* detects a Cardassian vessel under sustained attack\
    \ by Maquis rebels, prompting Picard to issue a direct order for the rebels to\
    \ stand down. When the Maquis ignore his warnings—despite their status as Federation\
    \ citizens—Picard escalates the confrontation by arming phasers and photon torpedoes,\
    \ ultimately ordering Worf to fire a torpedo spread between the combatants. The\
    \ act forces the Maquis to break off their assault, but the defiance exposes the\
    \ depth of their rejection of Starfleet authority. Riker’s moral conflict is palpable\
    \ as he questions firing on Federation citizens to protect Cardassians, while\
    \ Data’s tactical updates underscore the escalating stakes. The scene serves as\
    \ a turning point: it reveals the Maquis’ willingness to defy Starfleet at any\
    \ cost, foreshadows Ro Laren’s impending loyalty crisis, and demonstrates Picard’s\
    \ resolve to uphold the treaty—even if it means using force against his own people.\
    \ The tension between duty and morality is laid bare, setting the stage for Ro’s\
    \ eventual betrayal and the broader conflict’s escalation.\n  "
