      knowledge of their tactics. Though not physically present, the Cardassians’
      shadow looms over the conversation, shaping the Maquis’ defiance and Ro’s empathy.
      The Union’s past occupation of Bajor—where Ro’s father was killed—further cements
      the bond between Ro and Macias, as both have suffered directly at Cardassian
      hands. The organization’s actions (or inaction, in the case of Juhraya) are
      framed as the catalyst for the Maquis’ existence.
    active_representation: Through Macias’ traumatic memories of Juhraya, Ro’s knowledge
      of Cardassian tactics, and the Maquis’ collective grievances.
    power_dynamics: The Cardassian Union is the oppressor, but its power is indirectly
      challenged by the Maquis’ resistance. The organization wields brute force, but
      its moral legitimacy is nonexistent in this context.
    organizational_goals:
    - Maintain control over the DMZ through intimidation and displacement of Federation
      citizens.
    - Prevent Starfleet from intervening in Maquis attacks, thereby avoiding direct
      conflict with the Federation.
    influence_mechanisms:
    - Military force and brutal tactics (e.g., beatings, forced relocations).
    - Exploiting the Federation-Cardassian treaty to justify actions against Maquis
      settlers.
    - Creating ‘unfortunate incidents’ (like Macias’ beating) that Starfleet ignores,
      eroding trust in the Federation.
    institutional_impact: The Cardassians’ actions are the root cause of the Maquis’
      rebellion, forcing Ro to confront the hypocrisy of Starfleet’s neutrality. Their
      brutality makes the Maquis’ fight personal for Ro, accelerating her defection.
    internal_dynamics: The Cardassian Union’s internal justifications for its actions
      (e.g., ‘securing the DMZ’) are never explored, but their impact on the Maquis
      is undeniable.
    global_id: ger_organization_b621f11a448b
  - organization_uuid: ger_organization_f8ba90f42dc6
    description_of_involvement: The Maquis are the protagonist force in this event,
      their struggle given human depth through Macias’ leadership and Ro’s growing
      sympathy. The organization is portrayed not as mindless rebels, but as displaced
      Federation citizens fighting for survival. Macias’ calm authority and the Maquis’
      operational security (e.g., Santos’ verification of Ro’s story) demonstrate
      their discipline, while their shared trauma with Ro creates an emotional pull
      that challenges her Starfleet loyalty. The hasperat moment symbolizes the Maquis’
      resilience—clinging to culture even in exile—and their ability to turn outsiders
      (like Ro) into allies.
    active_representation: Through Macias’ leadership, Santos’ intelligence-gathering,
      Kalita’s cautious compliance, and the Maquis settlers’ background presence.
    power_dynamics: The Maquis are the underdog, but their moral high ground is clear.
      They operate under constraint (limited resources, constant threat of Starfleet
      or Cardassian attacks), but their defiance is strategic and rooted in principle.
    organizational_goals:
    - Recruit Ro Laren as a valuable asset, leveraging her Starfleet knowledge and
      tactical skills.
    - Expose the hypocrisy of Starfleet’s neutrality by demonstrating the Cardassians’
      brutality firsthand.
    influence_mechanisms:
    - Shared trauma and cultural bonds (e.g., hasperat, Bajoran identity) to create
      emotional loyalty.
    - Operational security and verification processes to vet potential recruits.
    - The threat of consequences for betrayal (e.g., Macias’ veiled threat to Ro).
    institutional_impact: The Maquis’ ability to turn a Starfleet officer like Ro
      into a potential ally undermines Starfleet’s authority and forces Ro to question
      her allegiance. Their fight is framed as just, making her defection a moral
      imperative rather than a betrayal.
    internal_dynamics: The tension between distrust of outsiders (e.g., Kalita’s initial
