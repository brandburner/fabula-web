    - To maintain Starfleet’s strategic dominance in the Demilitarized Zone and uphold
      the Federation-Cardassian treaty
    influence_mechanisms:
    - Leveraging Ro’s undercover work to gather intelligence on the Maquis’ movements
    - Positioning the *Enterprise* and allied ships in the Hugora Nebula to execute
