  global_id: null
  title: Ro’s fractured loyalty exposed
  description: 'In a tense, covert meeting at an alien bar, Picard confronts Ro Laren’s
    wavering allegiance after she admits the Maquis refused the baited convoy mission—a
    clear deviation from Starfleet’s intelligence. Ro’s desperate deflection (demanding
    payment, then pivoting to a plea for more time) exposes her internal conflict:
    her growing sympathy for the Maquis clashes with her duty to Starfleet. Picard’s
    sharp rebuke—alternating between paternal disappointment and cold professionalism—forces
    Ro to confront the cost of her hesitation. The scene culminates in Picard’s decision
    to send Riker as an overseer, a symbolic rupture in their trust. Ro’s reluctant
    agreement to proceed masks her deeper betrayal, setting up her eventual defection.
    The dialogue crackles with subtext: Ro’s physical intimacy with Picard (caressing
    his cheek, holding his hand) contrasts with the emotional distance of her lies,
    while Picard’s measured responses reveal his frustration at her betrayal of both
    the mission and their mentorship. The event serves as a turning point, where Ro’s
    fractured loyalty becomes undeniable, and Picard’s authority is tested by her
    defiance.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e24
  scene_sequence: 28
  sequence_in_scene: 49
  key_dialogue:
  - 'RO: Not tonight.'
  - 'PICARD: Laren... what''s going on?'
  - 'RO: When you sent me on this mission, I thought I could do it. Even though it
    meant helping Cardassians. Even though it meant betraying people who were fighting
    them. But now... I''m not sure about where I stand.'
  - 'PICARD: Lieutenant... I could put you before a board of inquiry for having lied
    to me about this operation. I could certainly have you court-martialed if you
    sabotage it. But I don''t want to have to threaten you to do this... I want you
    to make the decision.'
  - 'RO: I''ll carry out my orders, sir.'
  - 'PICARD: I feel it necessary to have Commander Riker return with you. He can pose
    as a relative. To make sure nothing happens that might obstruct this mission.'
