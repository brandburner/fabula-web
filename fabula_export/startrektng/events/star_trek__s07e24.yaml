  - character_uuid: ger_agent_f1a913dda0ad
    emotional_state: Focused resolve—Worf’s emotional state is one of professional
      detachment, but beneath it lies a quiet acknowledgment of the operation’s moral
      complexity. He does not question the order to go to red alert, nor does he dwell
      on the irony of firing on former Starfleet personnel. Instead, he channels his
      energy into ensuring the mission’s tactical success, a trait that defines his
      role as the Enterprise’s security chief. His lack of visible conflict does not
      mean he is unaffected; rather, it underscores his ability to compartmentalize.
    goals:
