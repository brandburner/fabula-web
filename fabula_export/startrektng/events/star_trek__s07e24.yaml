  title: Ro and Macias bond over shared trauma
  description: Ro Laren and Macias walk through the Maquis settlement, where Macias
    subtly tests her loyalty by revealing the group’s vulnerability. When Ro questions
    the risks of trusting her, Macias responds with a veiled threat—*Then we’ll have
    a problem*—but his calm demeanor softens the warning. Their conversation shifts
    to the Cardassian occupation of Juhraya, where Macias recounts his brutal beating
    and the Federation’s inaction, exposing the moral failure of Starfleet’s neutrality.
    Ro’s empathy for his suffering deepens their connection, and when Macias asks
    about her father’s death, she shuts down, revealing her own unresolved grief.
    The moment pivots to shared nostalgia when Macias orders hasperat—a Bajoran dish—and
    Ro recalls her father’s cooking, creating an unexpected bond. Santos and Kalita
    arrive to confirm Ro’s story, solidifying Macias’ trust in her. The exchange humanizes
    the Maquis’ struggle, forces Ro to confront her dual loyalties, and marks a turning
    point in her ideological reckoning.
