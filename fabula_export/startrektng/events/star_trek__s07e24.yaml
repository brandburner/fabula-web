      \ surveillance and control over the border, making their bypass a direct challenge\
      \ to Starfleet’s authority. Their temporary neutralization is a victory for\
      \ the Maquis, but also a reminder of the fragile nature of their defiance—Starfleet’s\
      \ systems can be circumvented, but only for a limited time.\n      "
    status_before_event: "\n        The buoys are fully operational, their proximity\
      \ detectors active and monitoring the border. They represent an impassable barrier,\
      \ enforced by Starfleet’s security protocols.\n      "
    status_after_event: "\n        The buoys’ proximity detectors are disabled, rendering\
      \ them inert for the moment. The ship slips past them undetected, but their\
      \ status is temporary—Starfleet could reactivate or change the codes at any\
      \ time.\n      "
    global_id: ger_object_b608615dc051
