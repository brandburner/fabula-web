      desperation, proving the group’s resilience and Ro’s value to the cause.
    - Test Ro Laren’s loyalties further, ensuring her commitment to the Maquis over
      Starfleet by entrusting her with high-stakes operations like this supply run.
    influence_mechanisms:
    - Tactical ingenuity (exploiting Starfleet’s sensor blind spots and shield vulnerabilities)
    - Trust in Ro’s leadership (Kalita’s growing confidence in her, despite initial
      skepticism)
    - Moral leverage (appealing to Ro’s empathy for the Maquis’ plight as former Federation
      citizens)
    - Operational secrecy (maintaining strict protocols to protect the group’s location
      and resources)
    - Desperation as a motivator (the medical shortage drives the high-risk supply
      run, despite the dangers)
    institutional_impact: This event reinforces the Maquis’ ability to survive and
      adapt despite their limited resources, using Starfleet’s own systems against
      it. It also deepens Ro’s internal conflict, as her success in aiding the Maquis
      forces her to confront the ethical implications of her dual role. The operation
