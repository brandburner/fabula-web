  object_involvements:
  - object_uuid: ger_object_6b349dd3d72a
    description_of_involvement: The back wall bench in the alien bar serves as Ro’s
      hiding place and the site of her initial deception. She sits on it, adopting
      a vulnerable posture to avoid detection by Worf and Data. The bench’s worn,
      utilitarian build reflects the bar’s seedy atmosphere, where patrons come to
      disappear. When Santos stuns her, she collapses onto it, her limp form a stark
      contrast to the bench’s hardness. The object symbolizes the fragility of her
      cover and the sudden violence that disrupts her plan, marking the transition
      from disguise to captivity.
    status_before_event: Occupied by Ro, who uses it as a prop for her prostitute
      act, sitting on the lap of the humanoid patron.
