- fabula_uuid: act_fcd59577ac1dbcbc
  number: 2
  summary: Ro Laren begins her deep cover mission, entering a seedy alien bar in the
    Demilitarized Zone, dressed in civilian clothes and feigning distress. Her initial
    ruse involves pretending to be a prostitute to evade Worf and Data, who are 'searching'
    for her as part of the cover story—a Bajoran woman responsible for a Cardassian
    soldier's death. A human Maquis sympathizer named Santos intervenes, lying to
    Starfleet officers on her behalf, and later stuns her to bring her to a hidden
    Maquis settlement. There, Ro is interrogated by Santos, Kalita (a suspicious Maquis
    woman), and Macias (a wise, older Maquis leader). Ro skillfully fabricates a backstory,
    presenting herself as a disillusioned former Starfleet officer who was court-martialed
    and now seeks to fight Cardassian oppression, resonating with their cause. Macias,
    sensing her sincerity and recognizing her Bajoran heritage, shows a surprising
    degree of trust, which is later validated when Santos confirms her (false) Starfleet
    record. The Maquis then discuss a disturbing rumor about Cardassians supplying
    biogenic weapons to their colonists, prompting a need for medical supplies for
    a preemptive strike. Ro seizes this opportunity to further embed herself, boldly
    volunteering to steal the necessary supplies from her former ship, the Enterprise,
    leveraging her intimate knowledge of its security systems. Despite Kalita's strong
    objections and skepticism, Macias, swayed by Ro's conviction and a shared moment
    over Bajoran hasperat, agrees to let her attempt the audacious mission, with Kalita
    reluctantly accompanying her as a witness and safeguard.
