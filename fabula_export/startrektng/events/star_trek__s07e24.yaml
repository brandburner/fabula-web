  key_dialogue:
  - |-
    RO: We have to cancel the mission.
    PICARD: Why?
    RO: The Maquis didn't go for the bait. They think a convoy is too big a target.
  - |-
    PICARD: Laren... what's going on?
    RO: Do you have the money I asked you to bring?
    PICARD: Yes.
    RO: Put some on the table.
    PICARD: What?
    RO: By this time, we should be negotiating my price.
  - |-
    PICARD: This has nothing to do with me—it's about you. If you back out now, you'll be throwing away everything you've worked for.
    RO: ((desperately reaching)) Wouldn't it be better to postpone this operation... let me stay with them longer... learn where their cells are... it seems to me I could be more valuable if I had more time...
    PICARD: And just prolong the inevitable? No. We're committed to this mission. My only question to you is—can you carry out your orders?
