    description_of_involvement: The Cardassian Union is the passive beneficiary of
      Starfleet’s intervention, its presence in the event limited to the distress
      signal and the vulnerable vessel under Maquis attack. The organization’s role
      is symbolic—it represents the treaty’s stakes and the moral cost of Picard’s
