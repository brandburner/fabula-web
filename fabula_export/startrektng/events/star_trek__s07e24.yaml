- fabula_uuid: act_a6396449e3e21f83
  number: 5
  summary: 'Following Macias''s death, Ro''s internal conflict reaches its peak. She
    contacts Picard, requesting an urgent, covert meeting in an alien bar, where she
    attempts to derail the mission by fabricating reasons why the Maquis would not
    attack the convoy. Picard, however, sees through her thinly veiled lies and presses
    her for the truth. Ro confesses her profound uncertainty about her loyalties,
    admitting she no longer knows where she stands. Picard, while acknowledging her
    personal struggle, firmly reminds her of her duty and the severe consequences
    of backing out, including court-martial. He gives her a stark choice: carry out
    her orders or face the repercussions. Ro, torn between her loyalty to Picard,
    who gave her a second chance, and her burgeoning commitment to the Maquis, reluctantly
    agrees to proceed. Distrustful, Picard assigns Commander Riker to accompany her
    on the mission. As the Maquis squadron, including Ro and Riker''s ship, approaches
    the ''biogenic weapon'' convoy, Ro makes her definitive choice. She fires a low-intensity
    particle beam into the Hugora Nebula, exposing the hidden Starfleet attack force
    to the Maquis. She then holds Riker at phaser-point, preventing him from interfering.
    The Maquis, alerted to the trap, abort their mission and scatter. Ro informs Riker
    that she is choosing to stay with the Maquis, finally feeling a sense of belonging
    she hasn''t experienced in a long time. She asks Riker to convey her apologies
    to Picard. As Riker watches her dematerialize to join the rebels, he returns to
    the Enterprise to report her betrayal to a deeply disappointed and personally
    hurt Picard. Picard, looking out at the stars, grapples with Ro''s choice, acknowledging
    the end of their relationship and her transformation from Starfleet officer to
    a rebel with a cause.'
