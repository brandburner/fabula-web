- fabula_uuid: cand_evt_scene_22219fb750533111_01
  global_id: null
  title: Ro’s desperate disguise and Santos’ betrayal
  description: Ro Laren, disguised as a bar prostitute to evade Starfleet officers
    Worf and Data, adopts a risky cover that forces her into physical and psychological
    vulnerability. When Santos, a Maquis sympathizer, intervenes with a calculated
    lie to misdirect Worf and Data, Ro briefly believes she’s found an ally—only for
    Santos to betray her by stunning her with a phaser and delivering her to the Maquis.
    The tense interrogation that follows reveals Ro’s fabricated backstory (a court-martialed
    Starfleet officer with Bajoran trauma) and her calculated risk-taking to gain
    the Maquis’ trust. Santos’ betrayal, framed as a test of her loyalty, marks the
    first crack in Ro’s isolation, forcing her to confront the fragility of her cover
    and the unpredictable loyalties of those around her. The scene hinges on the collision
    of Ro’s fading Starfleet discipline and Santos’ untested but decisive defiance,
    setting the stage for their uneasy partnership and her eventual defection to the
    Maquis. The bar’s seedy atmosphere and the Maquis’ rough-hewn settlement underscore
    the lawless frontier where Ro’s moral dilemma will unfold.
