      as Picard’s warning shot. Worf calculates the firing range with precision, and
      the torpedoes’ launch is accompanied by a deep, resonant *whoosh* as they streak
      toward their target. The explosion creates a barrier of fire, forcing the Maquis
      to break formation and scatter. The torpedoes’ use is a calculated escalation—destructive
      enough to disrupt the Maquis but not so much as to directly engage them. Their
      deployment is a turning point, marking the Federation’s shift from diplomacy
      to military coercion and foreshadowing the unraveling of Ro’s loyalties.
    status_before_event: Loaded in the torpedo bays, their warheads armed and targeting
      systems aligned with Worf’s console. The torpedoes are primed for immediate
      launch on Picard’s order.
    status_after_event: Detonated in a spread between the combatants, their explosive
      force creating a temporary barrier. The torpedo bays are now empty, and the
      *Enterprise*’s weapons systems stand down from red alert.
