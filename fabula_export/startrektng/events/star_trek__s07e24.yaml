  - character_uuid: ger_agent_b1e9e0b6f423
    emotional_state: Determined but exposed—Riker’s emotional state is one of calculated
      risk. He and Ro are in a precarious position, and their survival depends on
      the Enterprise crew’s ability to execute the plan flawlessly. There is an unspoken
      trust between Riker and Picard, a bond that allows Riker to operate undercover
      with confidence, even as he knows the moral and tactical stakes are high. His
      absence from the bridge is a reminder that this operation extends beyond the
      Enterprise, into the uncertain territory of the Maquis’ rebellion.
    goals:
    - To maintain his cover as a Maquis sympathizer while gathering intelligence for
      Starfleet.
    - To ensure his ship is not targeted by friendly fire, allowing him and Ro to
      complete their mission.
    what_happened: 'Riker is *indirectly* present in this event as the pilot of the
      undercover ship whose warp signature Worf broadcasts to the attack force. His
      absence from the bridge is a narrative choice that emphasizes his role as Ro’s
      partner in the field, operating outside the Enterprise’s direct command structure.
      The relay of his ship’s signature underscores the high-stakes nature of their
      mission: they are deep undercover, and their safety depends on the Enterprise
      crew’s ability to coordinate with the attack force without revealing their true
      allegiance. Riker’s presence is felt in the tension of the moment—Picard and
      Worf must act to protect him, even as they prepare to intercept the Maquis.'
