  title: Maquis squadron detected—red alert declared
  description: "\n  The *Enterprise* bridge crew monitors sensor data tracking the\
    \ Maquis convoy’s approach to the Demilitarized Zone (DMZ) border. Data confirms\
    \ the relay-link with a perimeter probe, pinpointing the rebels’ trajectory as\
    \ they cross into Federation space. Picard and Worf finalize tactical precautions\
    \ to protect Riker and Ro’s undercover ship from friendly fire, ensuring its warp\
    \ signature is relayed to the attack force. When Data detects the Maquis squadron\
    \ entering sensor range, Picard orders a **red alert**, marking the threshold\
    \ of direct confrontation. The alert isn’t just procedural—it’s a **catalyst for\
    \ Ro’s internal crisis**, as her dual loyalties collide in real time. The tension\
    \ escalates between Starfleet’s authority and the Maquis’ desperate resistance,\
    \ forcing the crew to confront the looming conflict. The scene underscores the\
    \ mission’s high stakes: Ro’s undercover role is now irrevocably tied to the Federation’s\
    \ military response, setting the stage for her inevitable betrayal.\n  "
