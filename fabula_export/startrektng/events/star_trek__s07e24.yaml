  title: Picard tests Ro’s fractured loyalty
  description: 'In Ro Laren’s cramped quarters, Picard delivers Admiral Nechayev’s
    covert directive: Ro must infiltrate the Maquis to prevent a war with the Cardassians.
    Ro resists the mission’s moral compromise, revealing her deep-seated distrust
    of Cardassians and her lingering sympathy for the rebels. Picard counters with
    a pragmatic appeal—Starfleet’s interests align with Cardassia’s in this rare instance—but
    Ro’s hesitation stems from a personal betrayal: a former mentor, a Lieutenant
    Commander she admired, abandoned Starfleet to join the Maquis. The moment pivots
    when Picard acknowledges Ro’s growth, praising her readiness for the mission.
    Ro, moved by his faith in her, agrees—but not without a quiet, conflicted acknowledgment
    that this mission will test her loyalty to its breaking point. The scene ends
    with a shared smile, a fleeting moment of mutual respect that underscores the
    cost of Ro’s compliance: her trust in Starfleet is already strained, and this
    mission will fracture it further. The exchange is a turning point, where duty
    and morality collide, and Ro’s Bajoran roots and Starfleet oath are set on an
    irreconcilable course.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e24
  scene_sequence: 9
  sequence_in_scene: 16
  key_dialogue:
  - 'RO: Starfleet wants me to infiltrate the Maquis?'
  - 'PICARD: Because of your recent training... because you''re Bajoran... and because
    of your past troubles with Starfleet -- you''ll have a certain credibility.'
  - 'RO: I''ve spent the better part of my life fighting the Cardassians... I never
    thought I''d be helping them out.'
  - 'PICARD: This is a rare case where our interests coincide with theirs -- we both
    want peace in the Demilitarized Zone.'
  - 'RO: I''ve heard a lot about the Maquis. One of my instructors in Tactical Training...
    a Lieutenant Commander in Starfleet -- a man I admired and respected... was sympathetic
    to them. He resigned and left to join them.'
  - 'PICARD: We''re all sympathetic, Lieutenant. Our civilian population in the Demilitarized
    Zone is in a difficult situation. But sympathy ends at a certain point. The peace
    treaty isn''t just a piece of paper. If the Maquis force us into a war with Cardassia,
    it could mean hundreds of thousands of lives.'
  - 'RO: The way I see it... there''s at least one good reason to take this mission,
    sir. That''s to validate your faith in me.'
