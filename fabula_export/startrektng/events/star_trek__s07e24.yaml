  object_involvements:
  - object_uuid: ger_object_93f1d5cb1587
    description_of_involvement: 'Picard’s coins serve a dual purpose in this event:
      they are both a prop to maintain their cover as a prostitute and john, and a
      symbolic gesture of Ro’s growing defiance. When Ro demands the money ‘by this
      time, we should be negotiating my price,’ Picard places the coins on the table,
      turning their transaction into a metaphor for the moral compromise Ro is being
      forced to make. The coins are a tangible representation of the Federation’s
      influence—cold, hard, and unyielding—while also highlighting the performative
      nature of their interaction. Ro’s inspection of a coin before her confession
      underscores the transactional quality of her dilemma: she is being ‘paid’ to
      betray the Maquis, and the coins are a stark reminder of the cost.'
    status_before_event: Picard carries the coins in his pocket, intended for use
      as payment for his ale and as part of their undercover charade.
    status_after_event: The coins are placed on the table by Picard, where Ro picks
      one up and inspects it before her emotional confession. They remain on the table
      as Picard exits, symbolizing the unresolved tension between duty and morality.
    global_id: ger_object_93f1d5cb1587
