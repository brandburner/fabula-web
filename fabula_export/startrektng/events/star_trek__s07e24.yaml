  key_dialogue: &id019
  - 'RO: I set the transporter confinement parameters to maximum -- we should be able
    to fill our hold with medical supplies in just a single beam out.'
  - 'KALITA: I had no idea it was going to be so easy...'
  - 'RO: We''re approaching the Federation border...'
  - 'KALITA: How do you plan to get out of the Demilitarized Zone without being searched
    at one of the checkpoints?'
  - 'RO: We''re going to cross the border here.'
  - 'KALITA: There are sensor buoys all along the border. If we cross anywhere other
    than a checkpoint, Starfleet will send a ship to investigate.'
  - 'RO: With the right security codes, we can disable the proximity detectors on
    the buoys.'
  - 'KALITA: Starfleet changes those codes all the time.'
  - 'RO: I know the encryption algorithms. If I can access the buoy''s protocol subsystem
    I should be able to figure out the codes.'
  - 'KALITA: Should be able to?'
  - 'RO: Do you want this mission to succeed?'
  - 'KALITA: Of course I do -- we need those medical supplies.'
  - 'RO: In that case, let me do my job.'
  - 'RO: If I don''t input the right code in the next twenty seconds, we''ll trigger
    the proximity alarm.'
  - 'RO: It worked... until they change the access codes again, we can cross the border
    here.'
