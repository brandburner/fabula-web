    symbolic_significance: Represents the tension between duty and morality—The Enterprise
      bridge symbolizes the conflict between Starfleet’s institutional obligations
      and the moral dilemmas faced by its crew. The location is a place where duty
      and conscience collide, as Picard must balance the need to uphold the treaty
