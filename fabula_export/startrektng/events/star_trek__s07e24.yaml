    description_of_involvement: Starfleet is the absent but looming antagonist in
      this event, its presence felt through Macias’ recounting of Juhraya’s abandonment
      and Ro’s internal conflict. The organization’s neutrality in the DMZ is framed
      as complicity, with Macias’ biting observation—*They don’t understand the situation
      here*—serving as a rebuke. Ro’s empathy for the Maquis’ plight begins to erode
      her Starfleet loyalty, but the organization’s institutional weight still holds
      her back. Santos’ verification of her story, obtained through ‘sources at Starfleet,’
      highlights the Maquis’ ability to exploit Starfleet’s own systems, undermining
      its authority.
    active_representation: Through Ro’s internal conflict, Macias’ criticism, and
      Santos’ use of Starfleet sources to verify Ro’s story.
    power_dynamics: Starfleet is the dominant institutional force, but its moral authority
      is actively challenged by the Maquis’ grievances and Ro’s growing sympathy.
      The organization operates under the constraint of its own treaties, which the
      Maquis see as betrayal.
    organizational_goals:
    - Maintain the peace treaty with the Cardassians at all costs, even if it means
      abandoning Federation citizens in the DMZ.
    - Prevent the Maquis from escalating conflicts that could reignite war.
    influence_mechanisms:
    - Institutional protocols that prioritize diplomacy over intervention.
    - The threat of legal consequences for Maquis actions (e.g., labeling them ‘outlaws’).
    - The personal loyalty of officers like Ro, who struggle between duty and empathy.
    institutional_impact: Starfleet’s neutrality is portrayed as a moral failure,
      pushing Ro toward the Maquis’ cause and highlighting the organization’s inability
      to address the DMZ’s humanitarian crisis.
    internal_dynamics: The tension between Starfleet’s official stance (neutrality)
      and the defection of officers like Ro, who are increasingly disillusioned with
      its policies.
