      (if the *Enterprise* finds them).
    symbolic_significance: 'Represents the Maquis’ fragile autonomy—a ship that is
      both a home and a coffin, a symbol of their defiance and their desperation.
      The cockpit’s cramped quarters mirror the Maquis’ position: hemmed in by Starfleet
      and Cardassia, with no room to maneuver except through sheer audacity.'
    access_restrictions: Restricted to Ro and Kalita in this moment—no other Maquis
