  - 'WORF: In order to insure that the ship Commander Riker and Lieutenant Ro are
    piloting does not come under fire, I have relayed its warp signature to the rest
    of our attack force.'
  - 'DATA: Sir, the Maquis squadron is coming into sensor range.'
  - 'PICARD: Go to red alert.'
