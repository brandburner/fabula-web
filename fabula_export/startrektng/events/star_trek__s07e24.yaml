  title: Enterprise detects Maquis convoy
  description: "\n  On the *Enterprise* bridge, Picard, Worf, and Data monitor a sensor\
    \ relay tracking the Maquis convoy as it approaches the Demilitarized Zone border.\
    \ Data confirms the convoy’s position and the expected trajectory of the Maquis\
    \ attack force, while Worf ensures the warp signature of Riker and Ro’s ship is\
    \ relayed to the attack fleet to prevent friendly fire. The tension escalates\
    \ when Data detects the Maquis squadron entering sensor range, prompting Picard\
    \ to order a red alert. This moment marks the shift from strategic planning to\
    \ active confrontation, forcing the crew—especially Ro—to confront the moral and\
    \ tactical stakes of the mission. The alert isn’t just procedural; it’s a catalyst\
    \ for Ro’s internal crisis, as her dual loyalties between Starfleet and the Maquis\
    \ collide in real time. The scene underscores the Federation’s delicate balancing\
    \ act between duty and moral ambiguity, with Picard’s calm authority masking the\
    \ high stakes of the operation.\n  "
