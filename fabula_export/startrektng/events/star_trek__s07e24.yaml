  title: Picard fires warning shot at Maquis
  description: "\n  The *Enterprise* detects a Cardassian vessel under sustained Maquis\
    \ attack, with the rebels ignoring Picard’s repeated orders to stand down. The\
    \ Maquis ships—unmarked but instantly recognizable as Federation citizens—continue\
    \ their assault despite the Cardassian’s failing shields. Picard, faced with escalating\
    \ defiance, arms phasers and photon torpedoes, a decision that visibly unsettles\
    \ Riker, who voices moral unease at the prospect of firing on their own people.\
    \ Data confirms the Maquis are regrouping for another strike, while Worf reports\
    \ the Cardassian shields are critically low. With no alternative, Picard orders\
    \ Worf to detonate a torpedo spread between the combatants—a calculated warning\
    \ shot that forces the Maquis to break formation. The act underscores the Federation’s\
    \ willingness to use military force to uphold the treaty, raising the stakes of\
    \ Ro’s loyalties and the fragile peace between factions. The scene marks a turning\
    \ point: Picard’s escalation from diplomacy to force signals the Federation’s\
    \ hardening stance, while the Maquis’ refusal to comply exposes their growing\
    \ willingness to defy Starfleet authority, foreshadowing Ro’s eventual betrayal.\n\
    \  "
