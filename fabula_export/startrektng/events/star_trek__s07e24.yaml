    -- waiting for a galaxy-class Starship to come swooping down on us...'
  - 'RO: Don''t worry... it''ll be hard for them to locate us with just their directional
    sensors. Besides, they''re looking for a damaged science ship that wants to be
    found...'
  - 'RO: They''re here... Standby to engage thrusters.'
