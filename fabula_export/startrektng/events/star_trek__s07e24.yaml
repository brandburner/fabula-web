- fabula_uuid: cand_evt_scene_68a043bd378e8aa0_01
  global_id: null
  title: Federation ships attack Cardassian vessel
  description: 'The *Enterprise* bridge crew intercepts a Cardassian distress signal,
    only to discover the attacking vessels are Federation ships—a revelation that
    shatters Ro Laren’s loyalty to Starfleet. The abrupt shift from routine operations
    to crisis exposes the Maquis conflict’s escalation, forcing Picard and Ro into
    a moment of tense professionalism. Ro’s sensor analysis reveals the attackers’
    identity, while Data’s warp signature scan confirms the betrayal, leaving the
    crew stunned and Ro’s divided loyalties further strained. The scene pivots from
    procedural urgency to moral reckoning, as the Federation’s hidden aggression against
    the Cardassians forces Ro to confront the mission’s true stakes: her allegiance
    to Starfleet or the Maquis’ cause. The revelation also sets up Gul Evek’s later
    confrontation with Picard, as the Cardassians’ distrust of Starfleet deepens.
    The event’s abrupt fade-out underscores the unresolved tension, leaving the crew—and
    Ro—grapppling with the implications of Federation ships acting as aggressors in
    the Demilitarized Zone.'
