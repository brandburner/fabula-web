      air, and diverse patrons create an atmosphere of tension and anonymity. The
      bar’s seedy reputation ensures that no one asks questions, making it the perfect
      place for Ro to hide—and for Santos to misdirect Worf and Data. The back wall
      bench becomes her temporary refuge, while the front door is a constant threat
      of discovery.
    observed_atmosphere: Tension-filled with whispered conversations, smoke curling
      through the dim light, and the faint hum of phasers hidden beneath tables. The
      air is thick with the scent of alcohol and desperation, where every patron is
      a potential informant or enemy.
