      reveals her internal turmoil: she admits her growing sympathy for the Maquis
      and her reluctance to betray them, but ultimately caves to Picard’s pressure,
      agreeing to carry out her orders. Her body language (looking down, avoiding
      eye contact) betrays her distress, especially when Picard assigns Riker as her
      overseer, signaling his loss of trust in her.'
