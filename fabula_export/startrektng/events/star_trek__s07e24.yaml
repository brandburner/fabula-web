- fabula_uuid: act_7aa0b43bfc00007b
  number: 3
  summary: Act Three intensifies Ro's commitment to her undercover role as she and
    Kalita embark on the mission to steal medical supplies from the Enterprise. Aboard
    their Maquis ship, Kalita maintains her skepticism, but Ro systematically dismantles
    her doubts by demonstrating her profound tactical expertise. Ro successfully bypasses
    Federation border sensor buoys by cracking their encryption algorithms, a feat
    that visibly impresses Kalita, despite her reluctance to admit it. Meanwhile,
    the Enterprise, under Picard's command, is diverted by a fabricated distress call,
    creating the necessary window for Ro's infiltration. Ro's audacious plan involves
    directly penetrating the Enterprise's shields by exploiting a known weak point
    near the main impulse engines. Kalita is astonished by the sheer boldness of the
    maneuver, but Ro executes it flawlessly. Picard, having received a garbled message
    from Ro and understanding her mission, deliberately allows the Maquis ship to
    pass through the Enterprise's shields. Once inside, Ro and Kalita quickly beam
    a substantial quantity of medical kits aboard their vessel. Picard, maintaining
    the illusion for any potential Maquis observers, orders Worf to fire phasers at
    their 'previous position' as they depart, making it appear as if Starfleet attempted
    to stop them. Upon their triumphant return to the Maquis settlement, Ro and Kalita
    are greeted as heroes. Kalita, now completely won over, animatedly recounts Ro's
    daring actions, treating her with the camaraderie of a trusted friend. Macias
    warmly commends Ro, reinforcing his belief that 'in your heart, you're one of
    us,' a statement that deeply resonates with Ro, highlighting the growing conflict
    between her duty and her burgeoning loyalty to the Maquis cause.
