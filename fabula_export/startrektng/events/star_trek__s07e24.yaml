    description_of_involvement: The **nebula perimeter** serves as the vantage point
      for the sensor probe tracking the Maquis convoy’s approach to the DMZ border.
      This location is critical to the Enterprise’s ability to monitor the Maquis’
      movements in real time, as the probe relays data to the bridge sensor monitor.
      The nebula’s turbulent edge—flickering with ionized gas and electromagnetic
      interference—adds a layer of uncertainty to the sensor readings, forcing Data
      to interpret the data with precision. The perimeter is not just a physical boundary;
      it is a narrative threshold, a place where the Enterprise crew must rely on
      technology to bridge the gap between observation and action. The nebula’s interference
      also mirrors the moral ambiguity of the situation, as the Maquis’ movements
      are obscured by the same forces that the Federation claims to be protecting
      them from.
