      enables the ambush that she now questions.
    internal_dynamics: The *Enterprise*’s crew, including Picard, Riker, and Ro, operates
      under a chain of command that prioritizes mission success over individual moral
      conflicts. The ship’s internal dynamics are shaped by the tension between duty
