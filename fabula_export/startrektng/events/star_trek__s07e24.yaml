- fabula_uuid: cand_evt_scene_62d3d70b57efdda7_02
  global_id: null
  title: Picard confronts Ro’s shifting loyalties
  description: In a seedy alien bar, Picard—disguised as a civilian—engages in a staged
    romantic encounter with Ro to maintain cover while secretly discussing the Maquis
    mission. Ro urgently warns that the convoy plan is compromised, claiming the Maquis
    refuse to attack due to perceived vulnerability. Picard, sensing deception, presses
    her for the truth, only for Ro to pivot to a desperate demand for payment, revealing
    her fractured loyalty. When Picard refuses to accept her excuses and instead insists
    on Riker accompanying her to ensure mission success, Ro’s silence confirms her
    betrayal. The exchange exposes the depth of her internal conflict—between Starfleet
    duty and her growing sympathy for the Maquis—while forcing Picard to acknowledge
    the erosion of trust between them. The scene ends with Picard’s abrupt exit, leaving
    Ro isolated and the mission’s future uncertain.
