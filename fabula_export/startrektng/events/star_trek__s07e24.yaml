- fabula_uuid: cand_evt_scene_cbdff41d6f991edc_01
  global_id: null
  title: Picard proposes Maquis ambush plan
  description: 'In a private briefing aboard the *Enterprise*, Captain Picard reveals
    a morally fraught Starfleet operation to Lieutenant Ro Laren: using her Maquis
    ties to lure the rebels into a Cardassian bioweapon ambush in the Hugora Nebula.
    Picard frames the plan as a calculated risk to curb Maquis aggression, but Ro’s
    growing empathy for the rebels creates visible tension. She questions the ethics
    of the trap—whether the Maquis will surrender or be forced into a deadly confrontation—while
    Picard reassures her that Starfleet’s overwhelming force will ensure their capture.
    Ro’s hesitation, though brief, signals her internal conflict between duty and
    conscience, foreshadowing her eventual betrayal of Starfleet. The scene underscores
    Picard’s strategic ruthlessness and Ro’s moral dilemma, setting up the climax
    where she must choose between her oath and her newfound loyalty to the Maquis.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e24
  scene_sequence: 24
  sequence_in_scene: 41
  key_dialogue:
  - 'PICARD: We''ve come up with a plan that has the potential to seriously curtail
    the Maquis. We want to give them a target so threatening—that they''d be willing
    to commit as many people and ships as possible to destroy it.'
  - 'RO: Basically, I''d be leading them into a trap...'
  - 'PICARD: If you have a problem with any of this, I need to know now. ... I knew
    I could count on you.'
