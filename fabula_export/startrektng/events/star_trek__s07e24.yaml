  title: Federation Ships Attack Cardassian Vessel
  description: The *Enterprise* bridge crew detects a Cardassian distress signal near
    the Demilitarized Zone, prompting Picard to order an intercept. Ro Laren identifies
    the Cardassian ship under attack by unidentified vessels, but Data’s warp signature
    analysis reveals the assailants are Federation ships—a revelation that shatters
    Ro’s trust in Starfleet. The discovery forces Ro to confront the moral ambiguity
    of her mission, as the Federation’s hidden aggression against the Cardassians
    directly contradicts the ideals she swore to uphold. The moment escalates the
    Maquis conflict into a potential interstellar crisis, with Ro’s loyalty to Starfleet
    now in question. The scene ends on this explosive revelation, setting up Ro’s
    inevitable confrontation with her divided allegiances and the Federation’s duplicity.
