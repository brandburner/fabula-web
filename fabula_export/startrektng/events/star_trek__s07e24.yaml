  title: Picard orders Ro’s arrest after betrayal
  description: 'Picard and Data detect Ro Laren’s Maquis ship firing a particle beam
    into the Nebula—a deliberate signal to warn the Maquis of a hidden Starfleet ambush.
    When Data confirms the Maquis ships are scattering, Picard realizes Ro has sabotaged
    the mission, her loyalty now irrevocably shifted. His face hardens with betrayal
    as he orders Worf to take her into custody upon her return, marking the moment
    Picard’s trust in Ro collapses and the conflict between Starfleet and the Maquis
    escalates. The tension is palpable: Picard’s frustration is personal, while Ro’s
    actions reveal her growing allegiance to the rebels, setting the stage for their
    inevitable confrontation.'
