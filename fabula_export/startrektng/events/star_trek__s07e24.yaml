  title: Ro bypasses Federation security
  description: 'Ro Laren demonstrates her technical expertise by bypassing Federation
    security protocols to disable sensor buoys along the Demilitarized Zone border,
    allowing the Maquis ship to cross undetected. Kalita, initially skeptical of Ro’s
    abilities and motives, watches as Ro navigates the encryption algorithms under
    pressure, successfully inputting the correct codes just seconds before triggering
    an alarm. The tension between them is palpable—Kalita’s distrust contrasts with
    Ro’s focused competence, and the moment subtly shifts their dynamic. Ro’s success
    not only validates her skills but also tests her loyalty, as she leverages Starfleet
    knowledge for the Maquis’ benefit. The scene underscores Ro’s dual-edged role:
    a Starfleet officer whose actions now serve the rebels, while Kalita’s reluctant
    respect hints at the fragile trust being built between them. The event also foreshadows
    Ro’s growing ambiguity, as Picard’s log entry (played over the scene) reveals
    Starfleet’s growing unease about her disappearance, framing her actions as a potential
    betrayal of her oath.'
