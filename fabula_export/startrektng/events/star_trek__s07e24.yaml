- fabula_uuid: cand_evt_scene_1bd88fb8a1600764_01
  global_id: null
  title: Ro confronts Kalita’s exclusion
  description: 'Santos approaches Ro during a moment of apparent isolation in the
    Maquis settlement, revealing that Kalita deliberately excluded her from a critical
    strategy meeting. Ro’s reaction—first confusion, then recognition—exposes her
    growing awareness of the faction’s fractured trust dynamics. She reflects on a
    repressed memory of a resistance comrade from Bajor’s occupation, Kanore, whose
    rigid devotion to the cause mirrored Kalita’s behavior. This parallel forces Ro
    to confront her own shifting loyalties: while she understands Kalita’s paranoia,
    she also recognizes the cost of such distrust. Santos’s knowing smile and invitation
    to join the meeting mark a turning point—Ro’s decision to follow him signals her
    first active step toward aligning with the Maquis, even as her internal conflict
    deepens. The scene underscores the emotional toll of divided allegiance and the
    fragility of the Maquis’ unity, while Ro’s memory of Kanore serves as a warning
    about the dangers of ideological rigidity.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e24
  scene_sequence: 13
  sequence_in_scene: 25
  key_dialogue:
  - 'SANTOS: Why aren''t you with the others?'
  - 'RO: Kalita told me to stay here -- she had things to do.'
  - 'SANTOS: You''ve been here a week and she still doesn''t trust you.'
  - 'RO: So that''s what she meant by ''things to do.'' Kalita reminds me of someone
    I knew during the occupation... being a part of the resistance was the only thing
    he cared about. It was his identity.'
  - 'SANTOS: That does sound like Kalita...'
  - 'RO: Don''t get me wrong, I was glad to have him on my side... but he was hard
    to be around. Sometimes people would stay up late... telling stories -- you know,
    trying to forget about our troubles for a while. Kanore would come out of his
    tent in a huff and tell everyone to be quiet - that we should get some rest so
    we''d have ''strength for our struggle.'''
  - 'SANTOS: What would people do?'
  - 'RO: We''d ignore him.'
  - 'SANTOS: That sounds like the only way to handle a person like that...'
