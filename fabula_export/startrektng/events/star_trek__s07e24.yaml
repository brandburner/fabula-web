  object_involvements:
  - object_uuid: ger_object_8e51ddff7d41
    description_of_involvement: The **Enterprise bridge sensor monitor** is a critical
      tactical tool in this event, providing the crew with real-time data on the Maquis
      convoy and attack force. Data links this monitor to the perimeter sensor probe,
      allowing the crew to track the convoy’s movements and the Maquis squadron’s
      approach to the DMZ border. Worf uses the monitor to confirm the convoy’s position
      and relay Riker and Ro’s warp signature to the attack force, ensuring their
      ship is protected from friendly fire. When Data detects the Maquis squadron
      entering sensor range, the monitor’s feed becomes the catalyst for Picard’s
      red alert order. This object is the nerve center of the operation, translating
      raw sensor data into actionable intelligence. Its role is to demystify the threat,
      turning abstract coordinates into a clear and present danger that the crew must
      address.
    status_before_event: Displaying the Maquis convoy’s position and the DMZ border.
      The monitor is linked to the perimeter probe, and Data is using it to provide
      tactical updates to Picard and Worf.
    status_after_event: Now showing the Maquis attack force entering sensor range,
      which prompts Picard to order a red alert. The monitor’s data has shifted from
      tracking to immediate threat assessment, reflecting the crew’s transition into
      a state of high alert.
    global_id: ger_object_8e51ddff7d41
  - object_uuid: ger_object_b2b910fe4783
    description_of_involvement: The **sensor monitor** on the Enterprise bridge is
      the narrative and tactical hub of this event. It displays a spatial grid showing
      the nebula’s perimeter, the Maquis convoy (depicted as blips), and the DMZ border.
      Data uses it to establish a relay-link with the perimeter probe, while Worf
      references it to confirm the convoy’s position. When the Maquis attack force
      enters sensor range, the monitor’s data triggers Picard’s red alert order. The
      monitor is not merely a tool—it is the visual manifestation of the tension between
      observation and action, between data and decision. Its glowing screen and shifting
      blips create a sense of urgency, as the crew watches the Maquis’ movements unfold
      in real time. The monitor’s role is to bridge the gap between strategy and execution,
      turning abstract threats into concrete targets.
    status_before_event: Active and displaying real-time sensor data of the nebula
      perimeter, the Maquis convoy, and the DMZ border. The relay-link with the perimeter
      probe is established, and the monitor is being used by Data, Picard, and Worf
      to track the convoy’s position.
    status_after_event: The monitor now shows the Maquis attack force entering sensor
      range, prompting Picard to order a red alert. The screen’s data has shifted
      from strategic planning to active confrontation, reflecting the crew’s transition
      from preparation to action.
    global_id: ger_object_b2b910fe4783
  - object_uuid: ger_object_e43f166948ab
    description_of_involvement: 'The **warp signature of Riker and Ro’s ship** is
      a critical identifier in this event, serving as both a protective measure and
      a narrative device. Worf relays this signature to the Enterprise’s attack force
      to prevent friendly fire, ensuring that Riker and Ro’s undercover ship is not
      targeted during the interception. The warp signature is a tangible representation
      of their dual roles: Starfleet officers on a covert mission, operating within
      the Maquis convoy. Its relay is a moment of tension, as it forces the Enterprise
      crew to acknowledge Ro’s presence among the rebels while still treating her
      as one of their own. The warp signature is also a symbol of the moral ambiguity
      at the heart of the mission—it is both a tool for protection and a reminder
      of the crew’s divided loyalties.'
    status_before_event: The warp signature is being tracked by the Enterprise’s sensors
      and is known to Worf, who prepares to relay it to the attack force to prevent
      friendly fire.
    status_after_event: The warp signature has been successfully relayed to the attack
      force, ensuring that Riker and Ro’s ship is protected. However, the act of relaying
      it also underscores the crew’s awareness of Ro’s precarious position and the
      moral stakes of the operation.
