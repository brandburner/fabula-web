  global_id: null
  title: Ro betrays Starfleet to warn the Maquis
  description: 'On the *Enterprise* bridge, Data detects Ro Laren’s Maquis ship firing
    a particle beam into the nebula—a deliberate signal exposing the hidden Starfleet
    ambush. Picard, stunned by her defiance, orders Data to counter the effect, but
    the damage is done: Santos and the Maquis abort their mission, scattering their
    ships to avoid detection. Meanwhile, Ro holds Riker at phaser-point aboard her
    ship, ensuring Starfleet cannot interfere. Back on the *Enterprise*, Picard’s
    frustration turns to betrayal as he realizes Ro’s actions have sabotaged the mission.
    When Worf reports her ship is returning alone, Picard issues an arrest order,
    marking the moment Ro’s loyalty irrevocably shifts from Starfleet to the Maquis.
    The scene escalates the conflict’s stakes, forcing Picard to confront Ro’s moral
    crisis and his own failure to retain her allegiance.'
