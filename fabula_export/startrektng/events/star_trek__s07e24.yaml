  object_involvements:
  - object_uuid: ger_object_b608615dc051
    description_of_involvement: The Federation sensor buoys, though not physically
      present in the scene, are the primary obstacle Ro must overcome. Their encrypted
      proximity detectors are designed to alert Starfleet to unauthorized crossings
      of the Demilitarized Zone. Ro’s ability to bypass these detectors using her
      Starfleet encryption knowledge is the linchpin of the event. The buoys represent
      the institutional power of Starfleet, a force Ro is temporarily subverting to
      aid the Maquis. Their symbolic significance lies in the tension between Ro’s
      loyalty to Starfleet and her growing alignment with the rebels. The success
      of the bypass allows the Maquis ship to slip across the border undetected, a
      small but critical victory for the rebellion.
    status_before_event: Active and operational; the buoys’ proximity detectors are
      fully functional, scanning for unauthorized vessels and ready to trigger alarms.
    status_after_event: Temporarily disabled; the detectors are inactive, allowing
      the Maquis ship to cross the border without detection. Their status will revert
      once Starfleet changes the access codes.
    global_id: ger_object_b608615dc051
  - object_uuid: ger_object_4a4cf417a458
    description_of_involvement: 'The rear control panel of the Maquis ship is Ro’s
      primary tool in this high-stakes moment. She crouches over it, her fingers flying
      across the interface as she inputs Starfleet encryption algorithms to crack
      the sensor buoy protocols. The panel’s glowing keys and beeping alerts create
      a sense of urgency, mirroring the ticking clock of the proximity alarm. Ro’s
      success in disabling the detectors hinges on her ability to manipulate this
      panel, which serves as a tangible link between her Starfleet training and her
      Maquis mission. Its functionality is critical: without it, the ship would be
      detected, and the mission would fail.'
    status_before_event: Functional but inactive; the panel’s interface is dark until
      Ro activates it, at which point it displays Starfleet encryption prompts and
      proximity alarm warnings.
    status_after_event: Active and successful; the panel’s interface shows confirmation
      of the bypass, and the proximity alarm is silenced. The ship is now free to
      cross the Demilitarized Zone undetected.
    global_id: ger_object_4a4cf417a458
