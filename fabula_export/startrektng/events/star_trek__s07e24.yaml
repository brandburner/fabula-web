  - 'GUL EVEK: The Maquis came at us with photon torpedoes and type eight phasers—tell
    me, Captain, how do you suppose a group of civilians acquired that kind of weaponry?'
  - 'PICARD: Starfleet does not condone the Maquis’ actions in the Demilitarized Zone.
    Any more than your government condones paramilitary actions by Cardassian civilians.'
  - 'GUL Evek: Give our military the right to operate in the Zone for one week, and
    we’ll put a stop to paramilitary activity once and for all.'
  - 'PICARD: What you’re proposing would only perpetuate the cycle of violence.'
