  title: Ro sabotages the mission and turns on Riker
  description: 'As the Maquis squadron approaches the Demilitarized Zone border, Ro
    Laren—overwhelmed by her growing loyalty to the rebels and her moral conflict
    with Starfleet’s mission—deliberately triggers a power surge in her ship, disrupting
    the planned ambush. When Riker realizes what she’s done, she draws her phaser
    on him, declaring she can’t allow the attack to proceed. The act cements her betrayal
    of Starfleet, marking the irreversible moment she fully commits to the Maquis.
    The tension is palpable: Ro’s internal struggle erupts into violent defiance,
    forcing Riker into a vulnerable position while the Maquis squadron remains unaware
    of the impending Starfleet trap. This scene is the emotional and narrative climax
    of Ro’s arc, where her divided loyalties finally fracture, setting the stage for
    the escalating conflict between the Federation and the rebels.'
