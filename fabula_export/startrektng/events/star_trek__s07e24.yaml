  key_dialogue:
  - 'RO: It took a while, but I managed to patch into Starfleet''s comsystem. I intercepted
    a communication from one of the check-points on the border. They''re concerned
    because a Pakled transport came through carrying retro-viral vaccines. No one
    sees a problem with this—'
  - 'KALITA: What is Starfleet going to do about it?'
  - 'RO: They can''t do anything. These items are all perfectly legal.'
  - 'MACIAS: How close are the Cardassians to having the components they need?'
  - 'RO: Very close. Two days ago, a Yridian convoy left Deep Space Nine for the Demilitarized
    Zone. It''s carrying isomiotic hypos, plasma flares and quarantine pods.'
  - 'KALITA: We can''t let that convoy reach its destination.'
