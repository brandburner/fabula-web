- fabula_uuid: act_9d1dd5caace3c5f5
  number: 4
  summary: 'With Ro''s trust firmly established among the Maquis, Captain Picard meets
    her in secret to outline the next, more morally compromising phase of her mission.
    Picard reveals Starfleet''s plan to create a trap: Ro is to feed the Maquis false
    intelligence about Cardassians transporting biogenic weapon components through
    third parties, specifically a Yridian convoy. The goal is to lure the Maquis into
    attacking this convoy, where Starfleet ships will be waiting in the Hugora Nebula
    to apprehend them. Ro expresses deep reservations, fearing the Maquis will not
    surrender and a massacre will ensue. Picard acknowledges her conflict but underscores
    the gravity of the situation—preventing an interstellar war—and reminds her of
    her duty, which she reluctantly reaffirms. Back at the Maquis settlement, Ro executes
    her orders, skillfully planting the fabricated intelligence with Macias, Kalita,
    and Santos. She describes seemingly innocuous shipments (retro-viral vaccines,
    bio-mimetic gels) that, when combined, could form a biogenic device, and then
    reveals the ''critical'' Yridian convoy carrying the final components. The Maquis,
    now convinced of the imminent threat, agree to rally other cells for a large-scale
    preemptive strike. Later, Macias approaches a somber Ro, attempting to lift her
    spirits by sharing a poignant story about his father and the klavion, drawing
    a parallel to Ro''s own painful memories of her father''s death at Cardassian
    hands. This emotional connection deepens Ro''s internal struggle. The moment of
    bonding is shattered by a sudden Cardassian sneak attack on the settlement. In
    the ensuing chaos, Macias is mortally wounded. His dying words, that ''someone
    always steps forward to take his place,'' serve as a powerful catalyst for Ro,
    solidifying her empathy and sense of belonging with the Maquis, and setting the
    stage for her ultimate decision.'
