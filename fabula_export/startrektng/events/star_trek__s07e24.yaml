acts:
- fabula_uuid: act_6fba676c934d23e8
  number: 1
  summary: The narrative opens with Lieutenant Ro Laren's celebratory return to the
    USS Enterprise after advanced tactical training, marked by a warm reception from
    her former crewmates and a paternal welcome from Captain Picard. This reunion
    is abruptly interrupted by a distress signal from a Cardassian vessel under attack
    by Maquis ships—Federation citizens turned rebels. Picard is forced to intervene,
    deploying a torpedo spread to scatter the Maquis and protect the Cardassians,
    an act that highlights the escalating tensions in the Demilitarized Zone. Following
    this incident, Gul Evek, a Cardassian officer, confronts Picard, accusing Starfleet
    of failing to control the Maquis and hinting at Cardassian military intervention
    if the situation worsens. Soon after, Admiral Nechayev arrives, expressing grave
    concerns about the Maquis' growing strength and aggressive posture, fearing an
    all-out war. Recognizing the need for covert intelligence, Nechayev reveals Starfleet's
    plan to infiltrate the Maquis, selecting Ro Laren due to her Bajoran background,
    tactical skills, and past rebellious streak, which would lend her credibility.
    Picard, though initially hesitant, agrees. Ro, despite her personal history of
    fighting Cardassians, reluctantly accepts the dangerous mission, motivated by
    her deep loyalty to Picard and a desire to validate his faith in her, setting
    the stage for her journey into divided loyalties.
