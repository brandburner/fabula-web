  global_id: null
  title: Ro’s Interrogation Becomes Recruitment
  description: Ro Laren, cornered in an alien bar after Worf and Data’s search, improvises
    a desperate cover by kissing a stranger to evade capture. Santos, a Maquis sympathizer,
    initially shields her from Starfleet but then stuns her and delivers her to a
    Maquis interrogation. Under questioning by Santos, Kalita, and Macias, Ro pivots
    from evasion to recruitment, crafting a fabricated backstory as a disillusioned
    Starfleet officer. Her bold claim—that she wants to join the Maquis—exposes the
    interrogators’ vulnerabilities, forcing them to confront her shifting loyalties.
    Macias, the elder Maquis leader, signals cautious trust by disarming the tension
    and inviting Ro to walk with him, marking a critical juncture in her moral transformation.
    The scene hinges on Ro’s resourcefulness and the Maquis’ fractured trust, setting
    up her eventual defection from Starfleet.
