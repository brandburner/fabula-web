  title: Santos betrays Ro to the Maquis
  description: 'Ro Laren, disguised as a civilian and evading Starfleet officers Worf
    and Data, seeks refuge in an alien bar in the Demilitarized Zone. Santos, a Maquis
    sympathizer, initially helps her evade capture by lying to Worf and Data, creating
    a moment of fragile trust. However, their brief alliance shatters when Santos
    stuns Ro with a phaser, handing her over to the Maquis—Kalita and Macias—who interrogate
    her in a rough-hewn meeting room. Ro, still groggy, is forced to improvise a backstory
    as a disillusioned ex-Starfleet officer, revealing her Bajoran trauma and anti-Cardassian
    sentiment to gain their trust. The betrayal accelerates her moral dilemma: her
    fabricated loyalty to the Maquis now risks becoming real, as Santos and Kalita’s
    suspicion contrasts with Macias’ quiet empathy. The scene pivots from survival
    to recruitment, forcing Ro to confront whether her deception will spiral into
    irreversible commitment to the rebels’ cause. The tension hinges on Santos’ calculated
    betrayal—his initial act of defiance was a test, not an alliance—and Ro’s desperate
    pivot from fugitive to potential recruit, exposing the fragility of her cover
    and the Maquis’ ruthless pragmatism.'
