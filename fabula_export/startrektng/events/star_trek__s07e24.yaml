  - organization_uuid: ger_organization_f8ba90f42dc6
    description_of_involvement: 'The Maquis are represented through Macias’ leadership,
      Santos’ operational verification, and the settlement’s collective presence.
      Their involvement in this event is twofold: as the *antagonist* to Starfleet’s
      institutional goals and as the *ally* Ro is tentatively joining. Macias’ calm
      authority and the group’s cautious trust in Ro reflect their operational pragmatism,
      while the hasperat exchange humanizes their cause. The Maquis’ power dynamics
      are evident in their ability to vet outsiders (Santos’ confirmation) and integrate
      them (Kalita’s escort), but their vulnerability is also exposed—Ro’s dual allegiance
      could destabilize their fragile security.'
    active_representation: Through Macias’ leadership, Santos’ verification process,
      and the settlement’s communal atmosphere (settlers in the background).
