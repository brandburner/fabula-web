    emotional_state: Defiant and resolute—The Maquis’ emotional state is one of determined
      resistance. They are not acting out of blind aggression but from a sense of
      abandonment by the Federation. Their crossing of the DMZ border is an act of
      defiance, a refusal to accept the treaty’s terms, and a willingness to fight
      for their homes. There is no remorse in their actions, only a grim resolve to
      protect what remains of their lives and communities.
    goals:
    - To strike at Cardassian targets in the DMZ, defending their homes and livelihoods.
    - To force the Federation to acknowledge their plight and reconsider the treaty.
    what_happened: The Maquis attack force is depicted on the sensor monitor as a
      series of blips entering from the right edge of the screen, crossing the DMZ
      border into Federation space. Their movement is tracked in real-time by Data,
      who alerts Picard to their entry into sensor range. The Maquis are not physically
      present on the Enterprise bridge, but their actions—crossing the border and
      preparing to engage the Cardassians—drive the entire scene. Their presence is
      a looming threat, a catalyst for the red alert, and a reminder of the Federation’s
      failure to protect its own citizens. The Maquis are both the antagonists and
      the victims in this moment, their rebellion a direct result of Starfleet’s complicity
      in the treaty with the Cardassians.
