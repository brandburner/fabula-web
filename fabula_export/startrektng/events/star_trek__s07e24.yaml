  scene_sequence: 28
  sequence_in_scene: 50
  key_dialogue:
  - 'RO: When you sent me on this mission, I thought I could do it. Even though it
    meant helping Cardassians. Even though it meant betraying people who were fighting
    them. But now... I''m not sure about where I stand.'
  - 'PICARD: This has nothing to do with me—it''s about you. If you back out now,
    you''ll be throwing away everything you''ve worked for.'
  - 'PICARD: I could put you before a board of inquiry for having lied to me about
    this operation. I could certainly have you court-martialed if you sabotage it.
    But I don''t want to have to threaten you to do this... I want you to make the
    decision.'
  - 'RO: I''ll carry out my orders, sir.'
  - 'PICARD: I feel it necessary to have Commander Riker return with you. He can pose
    as a relative. To make sure nothing happens that might obstruct this mission.'
