- fabula_uuid: cand_evt_scene_2cf145dd5980fdde_01
  global_id: null
  title: Ro shares childhood trauma with Macias
  description: 'In a rare moment of vulnerability, Ro Laren—confronted by Macias’s
    optimistic vision of a future Maquis celebration—unexpectedly reveals a childhood
    memory of her father playing the klavion to comfort her fears. The recollection
    quickly darkens as she admits the memory’s bitter truth: even her father’s music
    couldn’t protect her from the Cardassians’ violence. Macias’s gentle response
    (a hand on hers, a whispered reassurance) underscores their deepening bond, but
    the moment is violently interrupted by a Cardassian ambush. The attack forces
    Ro to confront the brutal reality of the Maquis’ struggle—one that will soon demand
    her full allegiance. This exchange, rooted in shared trauma, becomes the emotional
    fulcrum for Ro’s eventual defection from Starfleet, as Macias’s dying words later
    echo her father’s failed protection, framing her choice as both a betrayal of
    duty and an act of solidarity with the oppressed.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e24
  scene_sequence: 26
  sequence_in_scene: 44
  key_dialogue:
  - 'MACIAS: I''ve been thinking about what our celebration will be like for a long
    time. We''ll have a huge dinner... you''ll make hasperat and I''ll make blueberry
    pie... we''ll drink wine and we''ll dance. I''ll even play the belaklavion. That
    will give everyone a laugh.'
  - 'RO: My father... played the klavion. When I was very young... and afraid of monsters
    under my bed... my father would play for me. He said the sound of the klavion
    had special powers. Monsters were afraid of it... and they''d disappear whenever
    they heard it. When I listened to the music he played for me... I was never afraid
    to go to sleep. When he died... I realized... even he couldn''t make all the monsters
    go away.'
  - 'MACIAS: When an old fighter like me dies... someone always steps forward to take
    his place...'
  is_flashback: false
