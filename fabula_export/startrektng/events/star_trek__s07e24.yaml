  title: Ro’s Final Betrayal and Departure
  description: 'Aboard the Maquis ship, Ro Laren completes her defection by ordering
    her beam-out to the rebel vessel while keeping Riker at phaser-point. The moment
    is charged with unspoken tension—Riker’s concern outweighs his anger, and Ro’s
    quiet resolve masks her emotional turmoil. She admits she now belongs with the
    Maquis, a confession that underscores her irreversible fracture from Starfleet.
    Before leaving, she entrusts Riker with a message of apology for Picard, a symbolic
    severing of her ties. The scene culminates in her dematerialization, marking the
    death of her Federation identity and the birth of her rebel persona. This is the
    narrative’s turning point: Ro’s choice escalates the conflict and forces Starfleet
    to confront her betrayal head-on.'
