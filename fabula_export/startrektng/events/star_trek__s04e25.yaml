  key_dialogue:
  - |-
    JENNA: He... asked me to dinner.
    DATA: What was your response?
    JENNA: I told him I'd think about it.
    DATA: As you requested, I must now remind you of the reasons you decided to end your relationship with Jeff.
    JENNA: Okay, okay... I remember.
  - |-
    DATA: Many lovers throughout history have had similar difficulties. Anne Boleyn was quite distressed that Henry the Eighth preferred the company of his huntsmen to that of his wife.
    JENNA: When did you develop an interest in romantic historical figures?
    DATA: Six weeks ago, when you and Jeff dissolved your relationship, I saw an excellent opportunity to study that aspect of human intimacy. Also, I believed it was my obligation to do so.
  - 'JENNA: That is really sweet, Data.'
