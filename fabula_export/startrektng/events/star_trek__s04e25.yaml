  - 'DATA: I do not know. Clearly, an ongoing intimate relationship is an option.
    However, I am inexperienced in such matters. I require advice.'
  - 'GUINAN: Well, don’t look at me. This time I don’t have any advice to give. You
    can’t tell someone how to handle their first love affair. They have to find a
    way to do that themselves.'
  - 'DATA: But I am incapable of love.'
  - 'GUINAN: Then this should be a very unique experience.'
