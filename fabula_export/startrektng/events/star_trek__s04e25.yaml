- fabula_uuid: act_94ed96766e895959
  number: 2
  summary: Data, perplexed by Jenna's kiss, seeks advice from various crew members
    on the nature of romantic relationships. Guinan challenges him to consider his
    own thoughts rather than just his lack of feelings, suggesting this 'first love
    affair' will be unique for someone incapable of love. Geordi offers vague, unhelpful
    advice, while Troi cautions Data against treating Jenna as an experiment, emphasizing
    her genuine feelings and needs. Worf issues a stern warning against mistreating
    Jenna, underscoring the emotional stakes. Riker encourages Data to pursue the
    relationship, highlighting the potential rewards despite the risks of disappointment
    for Jenna. Picard humorously deflects, admitting his own lack of expertise. Following
    these consultations, Data decides to pursue the relationship, creating a computational
    program for romantic interactions. He presents Jenna with flowers (a suggestion
    from Riker) and reveals the calculated nature of his approach, including a 'subroutine
    specifically for her.' Despite the artificiality, Jenna is touched by his effort
    and they share another kiss, formally commencing their experimental romance.
