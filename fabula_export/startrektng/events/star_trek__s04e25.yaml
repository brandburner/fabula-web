  - 'DATA: Hi, honey, I am home.'
  - 'JENNA: What is wrong with you tonight?'
  - 'DATA: With respect to romantic relationships, there is no... real me. I am drawing
    upon various literary and cultural sources to help define my role.'
  - 'JENNA: Kiss me.'
  - 'DATA: At that particular moment, I was reconfiguring the warp field parameters,
    analyzing the collected works of Charles Dickens, calculating the maximum pressure
    I could safely apply to your lips, considering a new food supplement for Spot...'
