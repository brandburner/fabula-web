    status_before_event: The telemetry link is inactive, with no real-time connection
      between Shuttle Three and the *Enterprise*. Data and the bridge crew are preparing
      to establish it, but the link has not yet been activated.
    status_after_event: The telemetry link is fully operational, with navigational
      inputs from Picard’s shuttle being accepted by the *Enterprise*’s computer.
      The link remains stable, allowing Data to guide the shuttle through the nebula’s
      distortions. Its activation is a key step in ensuring Picard’s safe passage.
