  title: Worf Warns Data About Jenna
  description: "\n  On the Enterprise bridge, Worf intercepts Data near the Tactical\
    \ station to deliver a veiled but unmistakable warning about his relationship\
    \ with Ensign Jenna D'Sora. Worf begins by framing Klingon relationships as acts\
    \ of conquest rather than pursuit, subtly contrasting his own cultural norms with\
    \ Data's experiment. When Data attempts to leave, Worf stops him and lowers his\
    \ voice, making it clear that Jenna serves under his command—and that any mistreatment\
    \ of her would provoke his displeasure. The warning is delivered with calculated\
    \ precision: Worf avoids direct accusations but ensures Data understands the stakes.\
    \ Data processes the message with his characteristic analytical pause, nodding\
    \ once before departing. His lingering glance back at Worf suggests the warning\
    \ has disrupted his computational model of love, introducing a new layer of moral\
    \ complexity to his experiment. The exchange marks a turning point in Data's journey,\
    \ forcing him to confront the ethical implications of his relationship with Jenna\
    \ beyond mere logic or simulation.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e25
  scene_sequence: 12
  sequence_in_scene: 20
  key_dialogue:
  - 'WORF: Klingons do not... pursue relationships. They conquer that which they desire.'
  - 'WORF: ((quietly, with meaning)) However... Ensign D''Sora serves under my command.
    If she were... mistreated, I would be very... displeased.'
  - 'DATA: I understand.'
