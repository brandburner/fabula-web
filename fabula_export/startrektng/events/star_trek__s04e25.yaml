    goals:
    - Maintain the appearance of emotional stability in front of others (even if no
      one is present to witness her slip)
    - Process her conflicting feelings about Data’s computational approach to romance
      without external judgment
    what_happened: Jenna D’Sora steps out of Data’s quarters with a practiced smile,
      her body language suggesting confidence, but the moment she is alone in the
      corridor, her expression falters. For a split second, her brow furrows slightly,
      and her lips part as if she might speak—but no words come. She pauses, her fingers
      twitching at her sides, before quickly composing herself and retreating into
      her own quarters. The hesitation is so brief it could be missed, but it betrays
      the emotional turbulence beneath her usual warmth.
