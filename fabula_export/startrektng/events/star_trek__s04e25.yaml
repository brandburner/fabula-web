  title: Data executes first romantic subroutine
  description: In Jenna’s cluttered quarters, Data—having consulted crewmates and
    developed a computational model for romance—attempts to apply his theoretical
    understanding of love in practice. He dims the lights and reveals he’s created
    a custom subroutine tailored to Jenna, framing their interaction as an experiment.
    Jenna, initially amused by his clinical approach, is moved by the effort and leans
    into the moment, kissing him. The scene underscores the tension between Data’s
    logical, algorithmic approach to emotion and Jenna’s organic, human vulnerability,
    setting up their experimental romance’s inevitable complications. The kiss marks
    the official start of their relationship, but the subtext—Data’s detachment and
    Jenna’s emotional investment—hints at the imbalance that will later destabilize
    their dynamic. The moment is both tender and unsettling, a microcosm of their
    fundamental differences.
