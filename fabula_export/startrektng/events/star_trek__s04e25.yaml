  title: Jenna kisses Data in Torpedo Bay
  description: 'In Torpedo Bay, Jenna D''Sora and Data work on a photon torpedo, their
    conversation revealing Jenna’s nostalgia for family and her growing emotional
    attachment to Data. When she confesses that he has given her more than any other
    man—citing his kindness and companionship—she impulsively kisses him first on
    the cheek, then passionately on the lips. Data remains motionless, his unreadable
    reaction underscoring the scene’s central tension: Jenna’s human vulnerability
    collides with his android limitations. The kiss is a litmus test for Data’s capacity
    to feel and for Jenna’s willingness to risk her heart on an unknown variable.
    The moment ends with Jenna leaving, her smile masking the uncertainty of whether
    Data can ever reciprocate her emotions. The scene serves as a turning point, escalating
    their experimental romance and foreshadowing the emotional complexities that will
    follow.'
