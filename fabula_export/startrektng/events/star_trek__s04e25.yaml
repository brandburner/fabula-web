      is the institutional framework that shapes every action on the *Enterprise*.
      In this moment, the Federation’s influence is manifest in Picard’s command decisions,
      the crew’s disciplined response, and the ship’s adherence to protocol. Picard’s
      order to set course for Starbase 260 reflects Starfleet’s operational priorities:
      debriefing, resupply, and mission continuity. The organization’s presence is
      subtle but pervasive, reinforcing the crew’s role as extensions of its values
      and structures.'
