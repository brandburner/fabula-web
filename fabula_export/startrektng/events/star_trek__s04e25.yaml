    goals:
    - Regain physical and emotional control to project leadership
    - Avoid displaying weakness in front of the crew (especially O’Brien, who represents
      the ship’s operational heart)
    what_happened: Picard materializes disoriented, his gait unsteady and speech fragmented,
      betraying a rare loss of control. He immediately moves toward the exit, his
      urgency to leave contrasting with his physical vulnerability. His admission
      of dizziness ('*I'm a little dizzy*') is undercut by his insistence on being
      'none the worse,' a classic Picard deflection masking deeper strain. His body
      language—stumbling, hesitant—reveals the psychological weight of his recent
      crisis, while his clipped dialogue ('*on my way*') signals his determination
      to reassert authority.
