- fabula_uuid: cand_evt_scene_6f65c676770a6aed_01
  global_id: null
  title: Shuttle systems fail under nebula stress
  description: "\n  In the high-stakes crisis of the shuttle's collapse, Picard refuses\
    \ to abort the mission despite escalating system failures, demonstrating his unyielding\
    \ commitment to leadership under pressure. Geordi and Data scramble to stabilize\
    \ the shuttle's failing thermal control, navigation, and communications systems,\
    \ while Riker's urgent commands reveal his growing concern for Picard's safety.\
    \ The crew's coordinated but desperate efforts to re-establish control highlight\
    \ the shuttle's precarious state and the crew's limits in the face of the nebula's\
    \ destabilizing effects. The tension peaks as Riker realizes the shuttle may not\
    \ survive the remaining 16 million kilometers to safety, underscoring the life-or-death\
    \ stakes of their situation.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e25
  scene_sequence: 39
  sequence_in_scene: 59
  key_dialogue:
  - 'PICARD: Belay that, Number One! I''m re-routing the secondary deuterium supply...
    switching to manual controls.'
  - 'RIKER: Captain, we''ve lost the link.'
  - 'PICARD: You''ll have to make course changes manually until we re-establish the
    connection.'
  - 'RIKER: How far do we have to go?'
  - 'MCKNIGHT: Sixteen million kilometers.'
