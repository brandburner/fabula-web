- fabula_uuid: cand_evt_scene_6de50514ee6bb013_02
  global_id: null
  title: Jenna confronts Data’s simulated romance
  description: In Jenna’s quarters, Data arrives performing an exaggerated, scripted
    version of a solicitous partner—offering drinks, tidying her space, and reciting
    rehearsed compliments—all delivered with mechanical precision that betrays his
    lack of genuine emotional understanding. Jenna, initially bewildered, grows increasingly
    uncomfortable as Data’s behavior escalates from awkward to outright performative.
    When she challenges him, Data admits his actions are based on a computational
    model of romance, not organic feeling. The moment reaches its breaking point when
    Jenna demands a kiss, only for Data to confess he was simultaneously analyzing
    warp parameters, literary texts, and the physical pressure of their contact. The
    revelation exposes the hollow core of their relationship, forcing Jenna to confront
    the impossibility of Data’s experiment in human connection. The scene underscores
    the existential divide between simulated affection and real emotion, leaving Jenna
    emotionally bruised and Data oblivious to the harm he’s caused.
