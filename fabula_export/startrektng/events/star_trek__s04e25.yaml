  title: Picard and Worf confront unexplained anomalies
  description: 'Picard enters his Ready Room to find his desk completely cleared—all
    objects strewn on the floor—with no logical explanation. His initial curiosity
    turns to unease as Worf arrives with a tricorder, confirming only Picard’s bioelectric
    traces are present. Worf’s Klingon instincts immediately demand a Red Alert, but
