  - 'DATA: Eighty-seven percent Saurian Brandy... Targ milk and Denevian mead comprise
    the rest... an unusually high concentration of mono-saccharides and fructose compounds.'
  - 'GUINAN: What do you think of her personally? Do you like her?'
