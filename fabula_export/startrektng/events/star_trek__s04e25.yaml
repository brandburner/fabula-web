  title: Data seeks Geordi’s advice on love
  description: "\n  After discovering Spot outside his quarters—a potential security\
    \ breach—Data abruptly shifts focus to his burgeoning romantic relationship with\
    \ Ensign D’Sora. He asks Geordi for guidance, framing the inquiry with clinical\
    \ precision (citing D’Sora’s serial number and the termination of her prior relationship\
    \ with Jeff Arton). Geordi, visibly flustered, stumbles through vague warnings\
    \ about emotional readiness and the risks of ‘jumping into’ relationships, his\
    \ discomfort revealing both his own inexperience and the crew’s limited capacity\
    \ to counsel Data’s unique emotional experiment. The exchange underscores Data’s\
    \ reliance on computational logic to navigate intimacy, while Geordi’s helplessness\
    \ foreshadows the android’s need for more nuanced counsel—later provided by Troi\
    \ and Guinan. The scene pivots from a security concern to a vulnerable moment\
    \ of emotional inquiry, exposing Data’s isolation in reconciling logic with human\
    \ connection.\n  "
