- fabula_uuid: act_5a5a55d242fdb105
  number: 5
  summary: Data presents his findings on the nebula's anomalies, explaining that dark
    matter causes 'gaps in the fabric of normal space' that the Enterprise collides
    with, akin to 'potholes.' Recognizing the inability to maneuver the large ship,
    Worf suggests a shuttle. Riker proposes using a shuttle to scout ahead and control
    the Enterprise's navigation, a plan Picard insists on executing himself, despite
    Riker's objections regarding the Captain's safety. Picard bravely pilots the shuttle
    through the treacherous, unstable space, narrowly avoiding numerous 'potholes'
    and guiding the Enterprise. The shuttle sustains damage, losing maneuverability
    and the telemetry link, forcing Picard to battle for control manually. As the
    shuttle begins to break apart, O'Brien beams Picard back to the Enterprise just
    in time. The ship then makes a final, desperate run and successfully exits the
    nebula into normal space, bringing relief to the crew. Concurrently, in Data's
    quarters, where he has prepared a romantic dinner, Jenna arrives with a weak smile.
    She confronts Data, acknowledging her pattern of seeking connection with unemotional
    men and realizing that despite his kindness, he cannot truly connect with her
    emotionally. She states that she doesn't 'really matter' to him and nothing she
    does can make him happy or hurt him. Data, in his logical manner, confirms her
    'valid projection' and accepts that his 'reach has exceeded his grasp.' Jenna,
    tearful, confirms their relationship is over, and Data, without emotion, states
    he will 'delete the appropriate program.' Jenna leaves, leaving Data to contemplate
    the limits of his understanding of humanity.
