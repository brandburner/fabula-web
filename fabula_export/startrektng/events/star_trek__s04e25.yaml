      also with the quiet confidence of professionals doing what they do best.
    functional_role: Battleground for navigation and survival, where split-second
      decisions determine life or death. The shuttle’s controls and monitors are the
      tools of the crew’s fight against the nebula’s chaos.
    symbolic_significance: Represents the fusion of human skill and technological
      precision—a microcosm of the *Enterprise*’s ethos and Data’s own journey to
      understand love through logic. The shuttle’s survival hinges on this synergy,
      just as Data’s relationship with Jenna does.
    access_restrictions: Restricted to the shuttle’s crew (Picard, Data, McKnight)
      during this critical maneuver. No external access or interference is possible
      or relevant.
