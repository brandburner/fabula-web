  title: Bridge erupts as Picard’s shuttle spirals
  description: "\n  The *Enterprise* bridge lurches violently as Picard’s shuttle\
    \ loses control in the nebula’s turbulence, triggering immediate crisis. Data\
    \ confirms the navigational link is severed, his clinical delivery underscoring\
    \ the crew’s sudden helplessness. Riker’s urgent query to O’Brien—‘Do you have\
    \ the Captain’s signal?’—cuts through the tension, exposing the mission’s fragility.\
    \ The scene pivots from controlled investigation to raw emergency, forcing the\
    \ crew to confront their vulnerability and the precariousness of Picard’s solo\
    \ flight. The bridge’s physical instability mirrors the crew’s emotional unraveling,\
    \ with every jolt reinforcing the stakes: Picard is adrift, and their connection\
    \ to him is slipping away.\n  "
