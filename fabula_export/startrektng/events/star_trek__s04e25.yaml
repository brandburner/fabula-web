- fabula_uuid: cand_evt_scene_c38d712dd98fd39f_01
  global_id: null
  title: Jenna teaches Data emotional reciprocity
  description: Jenna D'Sora arrives unannounced in Data's quarters, presenting him
    with a Tyrinean sculpture as a romantic gesture. Data's initial response is analytical
    rather than emotional—he critiques the sculpture's artistic qualities and resumes
    painting, oblivious to the social cues of the moment. Jenna playfully corrects
    him, referencing their 'Book of Love' as a shared framework for understanding
    human intimacy. Data, recognizing his misstep, attempts to rectify it by relocating
    the sculpture to a more prominent display, demonstrating his first clumsy but
    sincere effort at emotional reciprocity. The exchange reveals Data's growing awareness
    of human emotional expectations while underscoring Jenna's patience and investment
    in their experimental relationship. The scene culminates in a tender moment where
    Jenna kisses Data's cheek, affirming his progress and leaving him with a tangible
    lesson in human connection.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e25
  scene_sequence: 19
  sequence_in_scene: 31
  key_dialogue:
  - 'JENNA: The Book of Love, chapter four, paragraph seventeen: When your girlfriend
    arrives with a gift, stop whatever it is you''re doing, and give her your undivided
    attention.'
  - 'DATA: The nature of our interactions is considerably more subtle and complex
    than I had anticipated. I have much to learn.'
  - 'JENNA: A critical analysis isn''t necessarily the best response to a gift. Data,
    what''s important is that you''re trying. You don''t know how much that means
    to me.'
