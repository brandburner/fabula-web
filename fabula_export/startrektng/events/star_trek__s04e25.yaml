    symbolic_significance: Represents the tension between duty and desire, where technical
      precision and emotional intimacy collide. The confined space mirrors the compression
      of Data and Jenna’s feelings—contained, but ready to launch.
    access_restrictions: Restricted to authorized crew members with security clearance
      for Torpedo Bay operations.
