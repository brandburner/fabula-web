    emotional_state: A mix of sorrow, frustration, and resignation; her tears reflect
      both the end of the relationship and the broader realization of her emotional
      avoidance.
    goals:
    - To communicate her emotional needs to Data and seek reciprocity, even as she
      recognizes it’s impossible.
    - To end the relationship before her self-destructive pattern causes further pain
      (for herself, if not for Data).
    what_happened: Jenna enters Data’s quarters with a weak smile and distracted demeanor,
      immediately undercutting the romantic setup. Her physical presence is tense—she
      fidgets, avoids prolonged eye contact, and her voice wavers as she struggles
      to articulate her emotions. When she finally confronts Data, her words are raw
      and accusatory, revealing her pattern of self-sabotage in relationships. Her
      tears during the breakup are the only genuine emotional reaction in the scene,
      a stark contrast to Data’s detachment. She leaves abruptly, her exit underscored
      by the closing door, a metaphor for the emotional barrier Data cannot cross.
