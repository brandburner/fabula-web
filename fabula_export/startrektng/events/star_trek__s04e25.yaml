  title: Jenna ends the relationship with Data
  description: 'In Data’s quarters, Jenna arrives for a carefully staged romantic
    dinner, only to abruptly terminate their relationship. The scene opens with Data’s
    meticulous preparations—potted plants, lanterns, and a replicator-ready meal—all
    designed to replicate human courtship rituals. Jenna’s forced politeness and repetitive
    praise ("It looks... great... it really does") immediately signal her discomfort,
    a subtext Data misinterprets as distraction rather than emotional withdrawal.
    When she finally voices her realization—that she’s repeated her pattern of seeking
    emotionally unavailable partners—Data responds with clinical detachment, acknowledging
    the "recurring motif" but failing to grasp its emotional weight. His offer to
    "delete the appropriate program" crystallizes the core tragedy: his love is a
    simulation, not an experience. Jenna’s tears and hasty exit mark the collapse
    of their experiment, leaving Data to pet Spot with the same mechanical affection
    he once tried to apply to her. The scene functions as the emotional climax of
    their arc, exposing the irreconcilable gap between human need and artificial replication,
    while foreshadowing Data’s lingering existential questions about his own humanity.'
