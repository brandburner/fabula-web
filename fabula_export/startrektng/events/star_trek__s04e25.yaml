    description_of_involvement: 'The USS *Enterprise* (NCC-1701-D) is the operational
      and thematic backbone of this scene, embodying Starfleet’s mission of exploration,
      diplomacy, and the pursuit of knowledge—both scientific and personal. As the
      *Enterprise* navigates the unstable Mar Oscura nebula, the organization’s values
      are tested: the balance between duty and personal growth, the trust placed in
      the chain of command, and the willingness to explore uncharted territories (both
      literal and emotional). Picard’s decision to hand over command to Riker, despite
      the nebula’s dangers, reflects Starfleet’s emphasis on mentorship and the development
      of its officers, even in high-stakes situations. The *Enterprise*’s crew functions
      as a microcosm of Starfleet’s ideals, where individual journeys (like Data’s)
      are valued alongside the collective mission.'
    active_representation: Via institutional protocol (the handoff of command) and
      the collective action of its senior officers (Picard, Riker, Data, Worf, and
      McKnight). The *Enterprise* is also represented through its physical systems
      (consoles, viewscreen, Ready Room), which facilitate both operational and personal
      narratives.
    power_dynamics: Exercising authority through the chain of command, but also operating
      under the constraints of personal and emotional considerations. Picard’s departure
      from the bridge, while technically a delegation of authority, is influenced
      by his role as Data’s mentor—a dynamic that reflects Starfleet’s dual focus
      on mission and crew development.
