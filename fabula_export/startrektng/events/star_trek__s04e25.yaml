    description_of_involvement: The navigational link between Picard’s shuttle and
      the *Enterprise* is the critical communication and control mechanism that fails
      during this event. Its severance is the direct cause of the bridge’s lurching
      and the crew’s sudden helplessness. Before the event, the link allows for real-time
      data exchange and guidance, enabling the *Enterprise* to monitor Picard’s progress
      and assist as needed. When it severs, the crew loses all direct contact with
      Picard, as well as their ability to provide navigational assistance or effect
      a rescue. The link’s failure is both a functional disaster (cutting off communication)
      and a narrative turning point (forcing the crew to confront their inability
      to control the situation).
    status_before_event: Active and stable, providing a real-time data feed and navigational
