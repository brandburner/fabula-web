- fabula_uuid: cand_evt_scene_d45f2ede4eb3d727_04
  global_id: null
  title: Jenna ends the relationship with Data
  description: In Data’s quarters, Jenna arrives for what appears to be a romantic
    dinner, but her demeanor is subdued and hesitant. Data, unaware of her emotional
    state, attempts to proceed with their meal, but Jenna interrupts to address their
    relationship. She reveals that she has realized she is repeating a pattern—leaving
    an unemotional man only to enter another relationship with someone incapable of
    genuine feeling. Data acknowledges the validity of her observation, admitting
    that his aspiration to be human has exceeded his ability to truly understand or
    experience human emotions. Jenna, visibly upset, confirms the relationship is
    over. Data, ever logical, responds by stating he will 'delete the appropriate
    program,' a chilling metaphor for the emotional detachment that has defined their
    relationship. As Jenna leaves, Data remains seated, his cat Spot offering the
    only comfort in the aftermath of the breakup. The scene underscores the tragic
    gap between Data’s computational model of love and the messy, unquantifiable reality
    of human emotion, marking the definitive end of their experiment in romance.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e25
  scene_sequence: 51
  sequence_in_scene: 75
  key_dialogue:
  - 'JENNA: Data, sometimes people blindly make the same mistake again and again.
    Until it finally happens in a way so obvious and so blatant, that they can no
    longer deny what they''ve been doing.'
  - 'DATA: There does appear to be a recurring motif.'
  - 'JENNA: You were so kind and attentive. I thought maybe that would be enough.
    It is not? Because as close as we are, I don''t really matter to you. Not really.
    Nothing I could do or say will ever make you happy, or hurt you, or touch you
    in any way.'
  - 'DATA: That is... a valid projection. It is apparent that my reach has exceeded
    my grasp in this particular area. I am perhaps not nearly so human as I aspire
    to become...'
  - 'DATA: Jenna. Are we no longer... a couple?'
  - 'JENNA: No... we''re not.'
  - 'DATA: Then I will delete the appropriate program.'
