  title: Jenna confesses vulnerability to Data
  description: In Torpedo Bay, Jenna D'Sora shares a poignant childhood memory of
    family cookouts after her father's death, revealing her longing for connection
    and emotional intimacy. She contrasts Data's kindness with past relationships,
    praising his reliability and lack of emotional manipulation. When Data responds
    with logical precision about time travel, Jenna laughs and playfully kisses his
    cheek, then initiates a deeper kiss—testing his humanity. Data remains passive,
    neither reciprocating nor rejecting, underscoring the core tension between her
    human vulnerability and his android limitations. The moment marks a turning point
    in their experimental romance, as Jenna's unguarded affection collides with Data's
    computational constraints, foreshadowing the fragility of their relationship and
    the emotional cost of his experiment.
