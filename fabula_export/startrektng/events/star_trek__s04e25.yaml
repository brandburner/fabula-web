  title: Data recites Jenna’s breakup logic
  description: In Torpedo Bay, Data and Jenna prepare photon torpedoes for an experiment
    in the Mar Oscura nebula. Jenna’s subdued demeanor prompts Data to inquire about
    her emotional state, revealing she recently encountered her ex-boyfriend, Jeff.
    When Jenna admits Jeff asked her to dinner, Data—per their prior agreement—recites
    the meticulously documented reasons she ended the relationship, including Jeff’s
    neglect of small gestures and his irritating soup-eating habits. Jenna’s playful
    exasperation masks her vulnerability, while Data’s clinical recitation underscores
    his growing role as her emotional anchor. The exchange exposes the tension between
    Jenna’s human need for connection and Data’s detached, analytical approach to
    intimacy, foreshadowing their own experimental romance. Data’s admission that
    he studied historical lovers (like Anne Boleyn) to support Jenna during her breakup
    reveals his evolving capacity for empathy, even as his methods remain rigidly
    logical. The moment blends humor with pathos, highlighting Jenna’s fragility and
    Data’s burgeoning, if awkward, emotional investment in her well-being.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e25
