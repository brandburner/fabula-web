  title: Riker urges Data to embrace love’s risks
  description: 'In the observation lounge, Data confides in Riker about his inability
    to reciprocate Jenna’s romantic feelings, framing his dilemma as a logical paradox:
    he cannot experience pain, but she can. Riker counters by reframing love as an
    emotional gamble worth taking, emphasizing its transformative rewards beyond friendship.
    The exchange marks a pivotal shift—Data’s first acknowledgment that love may require
    surrendering control to experience its full spectrum. Riker’s advice, blending
    pragmatism with warmth, pushes Data toward action, though the android’s lingering
    hesitation suggests his internal conflict remains unresolved. This moment bridges
    Data’s analytical approach to romance with the crew’s growing influence on his
    emotional development, setting up his eventual decision to pursue the relationship
    despite its uncertainties.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e25
  scene_sequence: 13
  sequence_in_scene: 21
  key_dialogue:
  - 'DATA: Jenna has clearly demonstrated how she feels about me. But I am not capable
    of returning those feelings.'
  - 'RIKER: Jenna knows that. And she''s obviously decided to take the chance. Data,
    when it really works between two people, it''s like nothing you''ve ever experienced
    -- the rewards are far beyond simple friendship.'
  - 'DATA: How far beyond, sir?'
  - 'RIKER: Well, that''s what I hope you''re about to find out.'
