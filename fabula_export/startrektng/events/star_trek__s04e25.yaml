    what_happened: "\n      McKnight is at her conn station, her fingers hovering\
      \ over the controls as Riker speaks. Her reaction is immediate and visceral:\
      \ a sharp intake of breath, her eyes widening as she turns to the viewscreen.\
      \ Unlike Data or Worf, her surprise is unfiltered and human. She is the youngest\
      \ officer present, and her reaction—though brief—reveals the raw edge of the\
      \ crew’s collective shock. Her body language is tense, her posture rigid, as\
      \ if bracing for further bad news. She does not speak, but her silence is loud,\
      \ a testament to the weight of the moment.\n      "
