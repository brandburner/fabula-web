    emotional_state: Intensely focused with a sense of urgency, but his tone remains
      steady and professional. There's an undercurrent of determination—he knows the
      stakes, and he's not backing down.
    goals:
    - Stabilize the shuttle's thermal control and communication systems to restore
      functionality and ensure Picard's survival.
    - Work in tandem with Data to re-establish the connection between the Enterprise
      and the shuttle, leveraging his engineering expertise.
    what_happened: Geordi is hunched over the Engineering console, his hands moving
      swiftly as he reports the damage to the shuttle's starboard impulse nacelle.
      He immediately shifts to boosting power to the L-U band, his voice a mix of
      urgency and determination. His actions are precise, reflecting his deep technical
      knowledge and his commitment to saving Picard and the shuttle. The flickering
      lights of the console cast shadows on his focused face, highlighting the intensity
      of the moment.
