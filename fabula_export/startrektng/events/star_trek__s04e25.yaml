    emotional_state: Crushing disillusionment masked by forced composure—Jenna’s initial
      frustration gives way to a quiet, aching resignation as she realizes Data cannot
      reciprocate her emotional needs. Her half-hearted smile and uneasy hug are attempts
      to preserve dignity, but her body language betrays her growing unease. The moment
      marks the death of her experiment, leaving her emotionally raw and questioning
      her own judgment.
