  title: Data mimics human intimacy with mixed results
  description: 'In Ten Forward, Keiko and Miles O''Brien share a playful anecdote
    about their marriage, demonstrating the compromises and affection that define
    human relationships. Their easy, affectionate dynamic—culminating in a light kiss—serves
    as a model for Jenna D''Sora, who subtly positions herself and Data as a similar
    couple by threading her arm through his and laughing at his attempts to replicate
    Miles'' wink. Data, pleased by the crew''s laughter but still processing the emotional
    nuances, delivers his own observation about Jenna''s disorganized quarters, revealing
    his literal, analytical approach to intimacy. The scene underscores the core tension
    of Data''s experimental romance: while he can mimic human behaviors, he lacks
    the emotional understanding that makes them meaningful. Jenna''s faint envy of
    Keiko and Miles'' relationship hints at her growing investment in Data, while
    Data''s computational perspective highlights the gap between his logical model
    of love and the organic, flawed reality of human connection. The moment functions
    as both a setup for Data''s ongoing struggle to grasp intimacy and a turning point
    where Jenna''s romantic intentions become more explicit, deepening the stakes
    of their relationship experiment.'
