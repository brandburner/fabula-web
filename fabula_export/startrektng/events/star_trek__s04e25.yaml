      whether this ‘experiment’ is as fulfilling—or as safe—as she’d hoped.
    goals:
    - Maintain the illusion of confidence in her relationship with Data (even to herself).
    - Escape the corridor’s exposure (both literal and metaphorical) to process her
      emotions in private.
    what_happened: Jenna exits Data’s quarters with a deliberate, practiced smile—her
      body language suggesting confidence, but the moment the door seals behind her,
      her expression falters. The smile drops for a split second, replaced by a shadow
      of doubt that tightens her features before she quickly composes herself and
      turns toward her own quarters. Her retreat is swift, almost defensive, as if
      the corridor’s exposed vulnerabilities (both structural and emotional) have
      become too much to bear in public.
