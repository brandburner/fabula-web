  title: Data probes Jenna’s emotional withdrawal
  description: 'In the sterile, functional space of Torpedo Bay, Data—midway through
    calibrating a photon torpedo for the Mar Oscura experiment—pauses to observe Jenna’s
    uncharacteristic quietude. His inquiry into her well-being, framed as a logical
    assessment, reveals his growing capacity for attentiveness, while her subdued
    response hints at the fragility of their experimental romance. Jenna’s mention
    of encountering her ex-boyfriend Jeff triggers Data to recite the precise, analytical
    reasons she ended their relationship, a reminder of her reliance on his detached
    perspective to process her own emotions. The exchange underscores the tension
    between Jenna’s vulnerability and Data’s mechanical approach to intimacy, foreshadowing
    the limitations of their relationship. Meanwhile, Data’s revelation that he began
    studying human romance six weeks ago—when Jenna and Jeff broke up—exposes his
    underlying motivation: a sense of obligation to support her during a difficult
    period. The moment is charged with unspoken affection and the quiet acknowledgment
    of their evolving dynamic, where logic and emotion remain in uneasy balance.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e25
  scene_sequence: 1
  sequence_in_scene: 1
  key_dialogue:
  - 'DATA: Is there something occupying your thoughts, Jenna? You are somewhat subdued
    today...'
  - 'JENNA: He... asked me to dinner.'
  - 'DATA: What was your response?'
  - 'JENNA: I told him I''d think about it.'
  - 'DATA: As you requested, I must now remind you of the reasons you decided to end
    your relationship with Jeff.'
  - 'JENNA: I guess I asked for this... go ahead.'
  - 'DATA: You objected to the fact that Jeff seemed unwilling to set aside sufficient
    time for you. You said he never did... the little things. He was unresponsive.
    You disliked the sound he made when he ate his soup...'
  - 'JENNA: Okay, okay... I remember.'
  - 'DATA: Many lovers throughout history have had similar difficulties. Anne Boleyn
    was quite distressed that Henry the Eighth preferred the company of his huntsmen
    to that of his wife.'
  - 'JENNA: When did you develop an interest in romantic historical figures?'
  - 'DATA: Six weeks ago, when you and Jeff dissolved your relationship, I saw an
    excellent opportunity to study that aspect of human intimacy. Also, I believed
    it was my obligation to do so.'
  - 'JENNA: ''Obligation''? What do you mean?'
  - 'DATA: I anticipated this would be a difficult period for you. As your friend,
    it is my responsibility to be supportive in times of need.'
  - 'JENNA: That is really sweet, Data.'
