- fabula_uuid: cand_evt_scene_d45f2ede4eb3d727_01
  global_id: null
  title: Jenna ends their relationship
  description: 'Jenna arrives at Data’s quarters, where he has meticulously prepared
    an intimate dinner to replicate human romantic rituals. Her distracted demeanor
    and weak smile immediately signal emotional distance, but Data—ever the logical
    observer—misinterprets her unease as mere distraction. When Jenna abruptly derails
    their planned meal to confront their relationship’s instability, she reveals her
    self-destructive pattern of seeking emotionally unavailable partners, including
    Data. His analytical response—acknowledging the ‘recurring motif’ of her choices—only
    underscores the fundamental incompatibility between his computational model of
    love and her human need for vulnerability. The moment peaks when Jenna, tears
    in her eyes, confirms their breakup, and Data’s detached reaction (‘I will delete
    the appropriate program’) crystallizes the tragedy: his inability to truly *feel*
    the loss, even as she does. The scene marks the collapse of Data’s experiment
    in romance, exposing the limits of logic in matters of the heart and forcing Jenna
    to confront her own emotional avoidance. The cat’s sudden, affectionate presence
    in the aftermath—contrasting Data’s emotional emptiness—serves as a poignant,
    wordless counterpoint to the human connection Jenna sought and failed to find.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e25
  scene_sequence: 51
  sequence_in_scene: 72
  key_dialogue:
  - 'JENNA: Data, sometimes people blindly make the same mistake again and again.
    Until it finally happens in a way so obvious and so blatant, that they can no
    longer deny what they''ve been doing.'
  - 'DATA: There does appear to be a recurring motif.'
  - 'JENNA: No, it''s not. Because as close as we are, I don''t really matter to you.
    Not really. Nothing I could do or say will ever make you happy, or hurt you, or
    touch you in any way.'
  - 'DATA: Then I will delete the appropriate program.'
