- fabula_uuid: act_955ceb669ac1a3c2
  number: 4
  summary: The nebula's reality-altering effects escalate dramatically, with the previously
    vanished M-Class planet suddenly reappearing on the viewscreen. The ship experiences
    an atmospheric decompression in the Observation Lounge, followed by its spontaneous
    re-pressurization, and the lounge is found tossed. Data detects transient electrical
    currents, confirming a subspace distortion. Picard diverts all resources to understanding
    these anomalies, recognizing the immediate threat. Concurrently, Data attempts
    to apply his romantic program more actively in his relationship with Jenna, adopting
    an overtly solicitous, 'husband-like' persona, greeting her with 'Hi, honey, I
    am home' and offering to organize her quarters. Jenna finds his programmed behavior
    artificial and frustrating, leading to a strained 'lovers quarrel' that Data tries
    to enact from his studies. He reveals the full extent of his reliance on literary
    and cultural sources, admitting 'there is no... real me' in romantic contexts.
    Jenna's disillusionment deepens as Data, after a kiss, lists unrelated calculations
    he was performing, confirming her fears about his emotional detachment. The act
    reaches its crisis point when the Enterprise attempts to leave the nebula; Data's
    science station and a wall section dematerialize, followed by explosive decompression
    on Deck 37. A cryogenic control conduit blows in Engineering, and Ensign Van Mayter
    is tragically killed, stuck halfway through a deck, signifying the deadly consequences
    of the nebula's instability.
