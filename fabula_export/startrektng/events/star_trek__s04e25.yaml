acts:
- fabula_uuid: act_40cfa351b2933f10
  number: 1
  summary: The Enterprise prepares to explore the Mar Oscura nebula, with Data modifying
    torpedoes for scientific study. Ensign Jenna D'Sora assists him, revealing her
    recent breakup with Jeff and her pattern of seeking connection with emotionally
    unavailable men. Data, in his logical pursuit of understanding human intimacy,
    offers support. Their work culminates in a torpedo launch that illuminates the
    nebula, prompting Jenna to express a deeper affection for Data, culminating in
    a kiss on the lips. Concurrently, subtle anomalies begin to manifest on the ship,
    such as a medical instrument falling in Sickbay, hinting at the nebula's disruptive
    influence. The act establishes Jenna's vulnerability and growing attraction to
    Data, while Data approaches their burgeoning relationship with scientific curiosity.
    The kiss serves as the inciting incident, propelling Data to consider a romantic
    entanglement, despite his lack of emotions, and sets the stage for his experimental
    approach to love.
