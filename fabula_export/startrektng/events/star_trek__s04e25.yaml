    \ Geordi’s awkward, evasive responses expose Data’s isolation in navigating human\
    \ intimacy—his reliance on logic and external validation clashes with the messy,\
    \ illogical nature of romance. The pivot from security to vulnerability underscores\
    \ Data’s duality: his investigative instincts (e.g., cross-referencing the computer\
    \ log) collide with his burgeoning emotional curiosity, foreshadowing the tension\
    \ between duty and desire in his arc. Geordi’s helplessness highlights the crew’s\
    \ limited ability to guide Data, reinforcing the story’s theme that love cannot\
    \ be computed.\n  "
