  key_dialogue:
  - |-
    JENNA: Sometimes in the summer we went on cookouts... just my little brother and me, and Mother... She was hopeless without a replicator. But we didn't care.
    DATA: Children often do not develop a discerning palate until well beyond adolescence.
    JENNA: It wasn't that. It just felt... so good to be together... as a family. We didn't have much of that after my father died... so those times were really special. I wish we were back there now... you and I...
  - |-
    JENNA: That's one thing I've always loved about you. You make me laugh. You know, maybe I've been with the wrong men. Why couldn't they be like you, Data? You've got everything.
    DATA: That is not true. I have no human feelings.
  - 'JENNA: But you''ve still given me more than any of them. You''ve spent time with
    me when I was lonely... you''ve encouraged me when I was down. No one could have
    been kinder to me... those are the things that matter...'
  - 'JENNA: I don''t know if you''re aware of it... but you''re very handsome...'
