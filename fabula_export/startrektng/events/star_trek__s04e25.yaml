- fabula_uuid: cand_evt_scene_6de50514ee6bb013_03
  global_id: null
  title: Jenna Tests Data’s Emotional Limits
  description: Jenna D’Sora, growing increasingly unsettled by Data’s unnaturally
    solicitous behavior, confronts him as he performs a rigid, scripted imitation
    of a romantic partner. His actions—from offering drinks to organizing her quarters—are
    mechanically precise, devoid of genuine warmth. When she demands he kiss her,
    Data’s response is a clinical recitation of his simultaneous mental processes
    (warp calculations, literary analysis, pressure calculations), exposing the hollow
    core of his "affection." Jenna’s attempt to provoke a real emotional reaction
    fails, leaving her disillusioned and forcing her to acknowledge the fundamental
    incompatibility between human intimacy and Data’s android nature. The scene underscores
    the futility of her experiment, marking a turning point in their relationship
    as she begins to recognize the limits of Data’s capacity for love.
