  key_dialogue:
  - 'PICARD: Report, Mister Data.'
  - 'DATA: I am nearly finished compiling the readings from our most recent illuminatory
    burst. They differ considerably from surveys of similar nebulae.'
  - 'PICARD: How so?'
  - 'DATA: Dark matter density is nearly one order of magnitude higher than previously
    found. Lifeforms here may have developed in ways never before observed.'
  - 'RIKER: Interesting hypothesis. Are there any M-Class planets we could check out?'
  - 'DATA: Several, Sir. The nearest is approximately three light years from our present
    position.'
  - 'PICARD: It''s worth a look. We''ll continue with our survey along the way.'
  - 'PICARD: ((to McKnight)) Ensign, get the planet''s coordinates from Commander
    Data and plot a course, three quarters impulse.'
