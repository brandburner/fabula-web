  title: Data’s Unspoken Support for Jenna
  description: 'In Torpedo Bay, Data and Jenna D’Sora prepare a modified photon torpedo
    for the Mar Oscura experiment, their professional collaboration subtly revealing
    the deeper emotional currents between them. Jenna’s quiet distraction—stemming
    from her ex-boyfriend Jeff’s renewed romantic overtures—triggers Data to remind
    her of the reasons she ended their relationship, a ritualized act of friendship
    that underscores his role as her confidant. When Jenna expresses gratitude for
    his support, Data reveals he began studying human romance six weeks prior, specifically
    to understand intimacy after her breakup. His admission, framed as an ‘obligation,’
    carries unspoken weight: his growing fascination with love is inextricably tied
    to his bond with Jenna. The moment is intimate yet restrained, as their shared
    focus on the mission abruptly shifts their attention back to the torpedo launch,
    leaving Jenna’s unspoken affection—and Data’s computational curiosity—hanging
    between them. This exchange deepens their emotional connection while reinforcing
    the tension between personal vulnerability and professional duty that defines
    their relationship.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e25
  scene_sequence: 1
  sequence_in_scene: 4
  key_dialogue:
  - 'DATA: Is there something occupying your thoughts, Jenna? You are somewhat subdued
    today...'
  - 'JENNA: He... asked me to dinner.'
  - 'DATA: As you requested, I must now remind you of the reasons you decided to end
    your relationship with Jeff.'
  - 'JENNA: Okay, okay... I remember.'
  - 'DATA: Many lovers throughout history have had similar difficulties. Anne Boleyn
    was quite distressed that Henry the Eighth preferred the company of his huntsmen
    to that of his wife.'
  - 'JENNA: When did you develop an interest in romantic historical figures?'
  - 'DATA: Six weeks ago, when you and Jeff dissolved your relationship, I saw an
    excellent opportunity to study that aspect of human intimacy. Also, I believed
    it was my obligation to do so.'
  - 'JENNA: ''Obligation''? What do you mean?'
  - 'DATA: I anticipated this would be a difficult period for you. As your friend,
    it is my responsibility to be supportive in times of need.'
  - 'JENNA: That is really sweet, Data.'
