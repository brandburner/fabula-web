      the gravity of the situation, reflecting both his leadership burden and his
      personal investment in the lives of his crew. There is a quiet anguish beneath
      his stoic exterior, a recognition of the irreversible consequences of this failure.
    goals:
    - To process the information swiftly and determine the next course of action
    - To maintain composure as a leader, even in the face of devastating news
    what_happened: Picard receives Data’s update in stunned silence, his expression
      tightening almost imperceptibly. His body language suggests a moment of internal
      reckoning—shoulders slightly tensed, fingers curling faintly around the armrests
      of his chair. Though he does not speak, his lack of immediate response speaks
      volumes, signaling the depth of the crisis and the personal weight of the loss.
      His gaze remains fixed on Data, processing the information with the gravity
      it deserves.
