  title: Data reveals his study of love
  description: 'In Torpedo Bay, Data and Jenna D''Sora prepare photon torpedoes for
    an experiment in the Mar Oscura nebula. Jenna, subtly subdued after encountering
    her ex-boyfriend Jeff, reveals he asked her to dinner. Data, noticing her distraction,
    recites the precise reasons she ended the relationship—her frustration with Jeff’s
    neglect and emotional unresponsiveness—with clinical precision. Jenna, amused
    but grateful, accepts the reminder. Data then discloses he has spent the past
    six weeks studying human romance, triggered by Jenna’s breakup, framing it as
    an obligation to support her as a friend. His admission—coupled with his historical
    examples (Anne Boleyn and Henry VIII)—reveals his intellectual fascination with
    intimacy, now explicitly tied to his emotional connection with Jenna. The moment
    marks a pivotal shift: Data’s curiosity about love evolves from abstract study
    to a personal, experimental pursuit, foreshadowing their future romantic entanglement.
    Jenna’s affectionate response ("That is really sweet, Data") underscores the fragile,
    unspoken bond forming between them, while Data’s framing of his research as an
    obligation hints at his struggle to reconcile logic with emotional investment.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e25
