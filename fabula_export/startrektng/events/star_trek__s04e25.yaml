  title: Picard orders anomaly investigation
  description: "\n  Worf leads Picard, Riker, and Data into the Observation Lounge,\
    \ where they discover the room in complete disarray—furniture overturned, equipment\
    \ scattered as if violently displaced. Data’s tricorder scan reveals transient\
    \ electrical currents in the window’s transparent aluminum, mimicking subspace\
    \ distortion without detectable subspace fields. Picard immediately escalates\
    \ the situation, diverting all ship resources to investigate the unexplained phenomenon.\
    \ The crew’s collective unease underscores the anomaly’s threat level, shifting\
    \ the *Enterprise* from routine operations to high alert. This moment marks the\
    \ first tangible evidence of the Mar Oscura nebula’s destabilizing effects, foreshadowing\
    \ the deeper crisis to come.\n  "
