  sequence_in_scene: 8
  key_dialogue:
  - 'KEIKO: ... every night, Miles leaves his socks on the floor. When we got married,
    I made the mistake of picking them up a few times... then I realized if I kept
    it up I''d be doing it the rest of my life... so I stopped... figuring he''d get
    the message and do it himself.'
  - 'DATA: I believe I observed that you seem to have an aversion to orderliness...
    but it was not intended as a humorous remark...'
  - 'JENNA: Keiko, you sound just like Data. He came to my quarters the other day
    to give me a music lesson, and he said the funniest thing... how did you put it,
    Data?'
