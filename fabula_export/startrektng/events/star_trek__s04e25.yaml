  title: Data’s computational romance experiment begins
  description: 'In Jenna’s cluttered, intimate quarters, Data arrives with Crystilia
    flowers—a gesture he admits was suggested by Riker as part of his methodical approach
    to understanding human romance. His scientific detachment is immediately evident
    as he explains the flowers’ evolutionary purpose and casually reveals he’s consulted
    nearly 1% of the Enterprise crew for ‘experiential referents.’ When Jenna playfully
    teases him about treating her as a ‘variable,’ Data clarifies that he’s written
    a *custom subroutine* for her, a declaration that blends cold logic with an unsettlingly
    intimate specificity. The moment crystallizes their fundamental incompatibility:
    Jenna’s warmth and humor contrast sharply with Data’s computational framing of
    their relationship. The scene’s climax—Jenna kissing him despite (or because of)
    his detachment—sets up the central tension of their romance: can an android truly
    *experience* love, or is he merely simulating it? The dimmed lights and Jenna’s
    physical closeness underscore the emotional stakes, while Data’s clinical language
    foreshadows the emotional instability this experiment will create for both of
    them.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e25
  scene_sequence: 16
  sequence_in_scene: 24
  key_dialogue:
  - 'JENNA: You didn’t talk to the entire ship about us...'
  - 'DATA: No. In actuality, less than one percent of the Enterprise crew was involved.
    It was necessary to balance theory with experiential referents. Both are required
    for a program of this nature.'
  - 'JENNA: So... I''m just a small variable in one of your new computational environments?'
  - 'DATA: You are much more than that, Jenna. I have written a subroutine specifically
    for you—a program within the program. I have devoted a considerable share of my
    internal resources to its development.'
