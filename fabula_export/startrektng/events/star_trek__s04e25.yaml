- fabula_uuid: cand_evt_scene_db37d8939c603a74_02
  global_id: null
  title: Picard overrules Riker on shuttle piloting
  description: "\n  On the bridge, Picard and Riker prepare to depart for the shuttle\
    \ mission to escape the Mar Oscura nebula. As Riker moves toward the turbolift\
    \ to begin pre-flight checks, Picard abruptly asserts his authority, declaring\
    \ he will pilot the shuttle himself. Riker objects, invoking his duty as first\
    \ officer to protect the captain’s life—especially given the high stakes of their\
    \ situation. Picard counters with quiet resolve, framing the decision as a matter\
    \ of leadership and personal responsibility for the ship. The exchange is brief\
    \ but charged: Riker’s reluctance underscores his protective instinct and the\
    \ unspoken tension between duty and trust, while Picard’s insistence reinforces\
    \ his role as the ultimate authority, even in life-threatening circumstances.\
    \ The moment subtly highlights the crew’s hierarchical dynamics, where respect\
    \ for command coexists with the weight of shared risk. Jenna D’Sora’s earlier\
    \ emotional overture to Data lingers in the background, contrasting the crew’s\
    \ professional focus with the personal stakes unfolding elsewhere on the ship.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e25
  scene_sequence: 31
  sequence_in_scene: 51
  key_dialogue:
  - |-
    RIKER: I'll do my pre-flight once I'm on board.
    PICARD: Not this time, Will.
  - |-
    RIKER: Captain... my duty as First Officer is to safeguard the lives on this ship. Including yours. The Enterprise can't afford to lose you, sir. Not in this situation.
    PICARD: I believe our best chance of escaping this situation is for me to pilot that shuttle. This is my ship, Will. I've got to do it.
  - |-
    RIKER: ((acquiescing))
    Captain.
