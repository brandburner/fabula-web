    what_happened: Ensign Van Mayter, following Geordi La Forge’s orders, heads into
      access tube twenty-three M to inspect the Bridge connectors. His actions are
      routine but laced with tension, as the crew is acutely aware of the nebula’s
      dangers. Moments later, a bloodcurdling scream erupts from the tube, cutting
      through the corridor like a knife. Van Mayter’s body is found fused into the
      deck plating—his upper torso, head, and one arm protruding at grotesque angles,
      his limbs limp and lifeless. The scream and his sudden, violent death mark the
      end of his participation in the scene, his fate serving as a stark warning of
      the nebula’s lethal instability. His death is instantaneous and horrifying,
      leaving no time for reaction or rescue.
