      to quiet frustration as Data’s mechanical affections unfold. When she demands
      a kiss, her voice carries a mix of defiance and desperation, a last-ditch effort
      to provoke something real from him. As Data recites his simultaneous computations,
      her expression crumples slightly—her shoulders tense, her fingers tighten around
      her glass of Calaman Sherry. She forces a half-hearted smile afterward, but
      her hug is stiff, her eyes avoiding direct contact. The cluttered quarters,
      usually her sanctuary, now feel like a stage for her disillusionment, and she
      retreats into herself, grappling with the realization that Data’s experiment
      has failed.
