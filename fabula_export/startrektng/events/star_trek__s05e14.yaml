- fabula_uuid: act_2188ad0867d0e1b9
  number: 2
  summary: 'With the Enterprise now operational, Worf, still occupying the captain''s
    chair, asserts immediate tactical control, demonstrating the ship''s phaser capabilities.
    Picard, however, insists on a full diagnostic to ensure system integrity, a decision
    MacDuff helps mediate. Dr. Crusher reports that their memory loss is a block,
    not physical brain damage, and she needs access to medical files for comparison
    to devise a cure. Meanwhile, Riker and Ro continue their ship survey, discovering
    Ten Forward, where they encounter Data, an "artificial lifeform" whose memory
    is also affected, and Counselor Troi, who senses an inexplicable familiarity with
    Riker. This brief, tender moment is interrupted when Worf summons them to the
    bridge, where Geordi has successfully accessed the personnel files. The computer
    systematically reveals the names, ranks, and positions of all senior officers,
    formally re-establishing Picard as Captain and MacDuff as Executive Officer. Worf
    humbly apologizes to Picard for his earlier assertiveness, and Picard accepts,
    acknowledging the difficult circumstances. The senior staff then convenes in the
    Observation Lounge, where Data and Geordi reveal the shocking truth: the Federation
    is engaged in a long-standing, genocidal war with the Lysian Alliance. Their top-secret
    mission is to cross into Lysian territory and destroy the Lysian Central Command,
    a critical "lynchpin" operation to end the war. Despite Troi''s strong moral objections
    and a plea to verify orders, the crew''s specific instructions for radio silence
    prevent external confirmation. Faced with the gravity of their situation and the
    perceived necessity of their mission, Picard, with a somber resolve, orders a
    course for the Lysian Central Command, committing the Enterprise to a war and
    a strike against an enemy they barely understand.'
