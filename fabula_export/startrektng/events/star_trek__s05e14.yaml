- fabula_uuid: cand_evt_scene_42a049f9c674d250_01
  global_id: null
  title: Picard and Worf clash over mission priorities
  description: "\n  In the *Enterprise*'s ready room, Worf—temporarily occupying Picard's\
    \ chair—asserts tactical dominance by prioritizing combat readiness over understanding\
    \ their mission. His aggressive stance reflects both Klingon instinct and the\
    \ crew's disoriented state after the memory-wiping probe. Picard counters by advocating\
    \ for accessing ship logs to uncover their identities and purpose, exposing a\
    \ fundamental ideological divide: Worf's instinct for action versus Picard's strategic\
    \ caution. The tension escalates when Geordi confirms the ship's systems are operational,\
    \ forcing Picard to challenge Worf's urgency with a critical question: 'The question\
    \ is—for what?' This confrontation reveals the crew's fractured cohesion and the\
    \ amnesia's destabilizing effect, while also reinforcing Picard's leadership despite\
    \ his own memory loss. The moment serves as a turning point, shifting focus from\
    \ immediate survival to the moral and tactical implications of their unknown mission.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e14
  scene_sequence: 10
  sequence_in_scene: 18
  key_dialogue:
  - 'WORF: I disagree. We must first make ourselves ready for battle. That is the
    highest priority.'
  - 'PICARD: The question is—for what?'
  - 'WORF: We are ready.'
  - 'PICARD: I would recommend that before we prepare for combat, we try to access
    the ship''s logs. Discover who we are and what our purpose here might be.'
