  title: Memory restoration fails—MacDuff conceals deception
  description: "\n  Beverly Crusher attempts an experimental memory restoration procedure\
    \ on MacDuff, using a bio-bed apparatus and neural frequency modulation. The procedure\
    \ triggers violent convulsions, forcing Beverly to abort the treatment. Though\
    \ MacDuff pretends to remain disoriented and exhausted, his subtle, knowing smile—visible\
    \ only when Beverly turns away—reveals he has fully regained his memories. His\
    \ deception is strategic: he conceals his restored cognition to manipulate the\
    \ crew’s investigation of the alien probe’s true purpose, positioning himself\
    \ as both a vulnerable patient and a hidden adversary. The failed procedure deepens\
    \ Beverly’s frustration, while MacDuff’s calculated silence ensures he remains\
    \ the only crewmember aware of the Lysian probe’s true intent and the Satarran\
    \ agenda. The scene underscores the tension between medical desperation and covert\
    \ manipulation, setting up MacDuff’s later betrayal and the crew’s unwitting reliance\
    \ on his false vulnerability.\n  "
