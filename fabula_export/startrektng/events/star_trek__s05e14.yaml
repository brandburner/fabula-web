      the *Enterprise*'s capabilities, revealing the ship's status as a fully armed
      battleship. Its screens display the operational status of the phaser banks,
      photon torpedoes, and high-capacity shield grid, which Worf details with precision.
      MacDuff's interest in these capabilities is a subtle but critical moment, as
