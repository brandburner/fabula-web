  - 'GEORDI: I''ve accessed the optical data network for the engineering core. I can
    monitor every system that''s routed through here.'
  - 'RO: Warp and impulse drive are reading within tolerance levels. So are all the
    tactical arrays... defensive and offensive...'
  - 'RIKER: According to the schematics, the engineering computer core access is down
    that corridor. Weapons, propulsion, and shields are the priorities. We might be
    in danger of another attack.'
  - 'RIKER: When you''ve got those systems going, try for the personnel files. It
    would be nice if we all had names...'
