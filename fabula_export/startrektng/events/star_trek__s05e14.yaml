  title: Riker and Ro Clash Over Protocol
  description: "\n  In the confined space of a turbolift, Commander Riker and Lieutenant\
    \ Ro engage in a sharp, escalating debate about navigation procedures, revealing\
    \ their fundamentally opposed work styles. Riker, adhering to Starfleet’s long-standing\
    \ protocols, challenges Ro’s unilateral decision to alter flight handling assessments\
    \ without consultation. Ro, undeterred and even amused by the confrontation, counters\
    \ that her methods are superior and resists Riker’s attempt to enforce rigid hierarchy.\
    \ The exchange exposes deeper tensions: Riker’s frustration with Ro’s defiance\
    \ and her implicit rejection of his authority, while also hinting at their unresolved\
    \ dynamic—one that oscillates between professional friction and an unspoken, flirtatious\
    \ undercurrent. The unresolved conflict underscores the crew’s broader disarray,\
    \ as their fractured cohesion could hinder the *Enterprise*’s mission amid the\
    \ memory-wiping crisis. The scene ends with Riker’s unanswered question hanging\
    \ in the air, leaving their disagreement—and the crew’s stability—unresolved.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e14
  scene_sequence: 3
  sequence_in_scene: 4
  key_dialogue:
  - 'RIKER: Navigators on this ship have been doing flight handling assessments the
    same way for years, Ensign...'
  - 'RO: And I''ve found a better way...'
  - 'RIKER: Do you mind if we discuss changes in procedure before you make them?'
  - 'RO: If I had come to you in advance and asked you if I could do it my way...'
  - 'RIKER: I would have said...'
  - 'RO: No.'
  - 'RIKER: Or maybe ''yes''.'
  - 'RO: The point is... with all due respect... you''re trying to turn me into your
    idea of a model officer.'
  - 'RIKER: Ensign... the rules on this ship don’t change because Ro Laren decides
    they do.'
