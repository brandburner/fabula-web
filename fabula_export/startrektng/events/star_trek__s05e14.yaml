      asserting her competence beyond Starfleet’s rigid protocols.
    - Challenge Riker’s authority subtly, using his own words against him to expose
      the hypocrisy in his stance.
    what_happened: 'Ro steps into the turbolift already smiling, her amusement at
      Riker’s frustration evident in her body language—leaning slightly against the
      wall, arms crossed, her tone playful yet unyielding. She meets his challenges
      with sharp, confident retorts, her Bajoran independence shining through as she
      refuses to be cowed by his authority. When Riker suggests he might have approved
      her approach, her silence speaks volumes: she *knew* he wouldn’t, and his admission
      only confirms her point. She exits without resolving the conflict, her defiance
      lingering like a dare.'
