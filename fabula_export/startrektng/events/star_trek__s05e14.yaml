  title: Ro asserts dominance over Riker
  description: In Riker’s quarters, Troi arrives visibly shaken by the moral weight
    of their mission, seeking comfort. Riker attempts to reassure her while revealing
    personal artifacts—including a book inscribed with her name—that hint at their
    shared romantic history. Their intimacy is abruptly interrupted by Ro, who enters
    with an air of possessive confidence. After Troi departs, Ro seizes the moment,
    kissing Riker aggressively while playfully referencing her own jealousy. The act
    establishes Ro’s unchecked dominance over Riker’s affections, exploiting the crew’s
    amnesia to assert a pre-existing, volatile dynamic. The scene underscores the
    destabilizing effects of memory loss, where past relationships resurface without
    restraint, and Ro’s boldness contrasts sharply with Troi’s vulnerability, creating
    a tension that will later define their triangular dynamic.
