- fabula_uuid: act_5133a62b66ba0c5f
  number: 3
  summary: The Enterprise, now at warp, journeys deeper into Lysian territory, and
    the act explores the nascent personal relationships forming amidst the amnesia.
    In her quarters, Troi and Riker share a moment of undeniable romantic tension,
    as Troi expresses a profound sense of familiarity with him, despite lacking specific
    memories. She touches his cheek, suggesting a deep emotional connection. Later,
    in Riker's quarters, Ro Laren appears, playfully and seductively suggesting a
    pre-amnesia romantic involvement, further complicating Riker's emotional landscape
    with high erotic tension. The ship then crosses the Lysian border and encounters
    a small Lysian Destroyer. Data identifies it as a short-range attack vessel with
    minimal shields and disruptor weapons, clearly outmatched by the Enterprise. The
    Lysian ship attempts to hail them, prompting a heated debate. MacDuff, fearing
    a new Lysian weapon that could wipe their memories again, vehemently opposes opening
    a channel, a concern Data validates as "conceivable." Troi, guided by her intuition,
    argues for communication. However, when the Lysian ship powers up its disruptors
    and locks onto the Enterprise, Picard grimly orders return fire. The Enterprise
    effortlessly obliterates the Lysian destroyer, a victory that leaves a brooding
    silence on the bridge and deepens Picard's unease. MacDuff congratulates him,
    but Picard's unreadable expression as he stares at the empty viewscreen signals
    his growing moral discomfort and suspicion about the mission's true nature, especially
    given the enemy's apparent weakness.
