- fabula_uuid: act_e1e954e7feae2fcb
  number: 5
  summary: The Enterprise enters the Lysian system, its crew grimly determined. Data
    reports their approach to the Lysian Central Command. Picard orders Red Alert
    and battle stations. They encounter and easily destroy unmanned sentry pods, prompting
    Riker to note, "This is too easy." As they approach the Central Command, Data's
    scans reveal no additional vessels or defenses, and the station's defensive capabilities
    are reported as minimal. Data further reveals that the station houses over fifteen
    thousand people. This information, coupled with the ease of their approach and
    the enemy's apparent technological inferiority, brings Picard's mounting doubts
    to a head. He refuses to fire on "defenseless people," a moral stand that directly
    contradicts their mission orders. Enraged, MacDuff attempts to seize command,
    declaring Picard compromised and lunging for the weapons controls. Riker and Worf
    react swiftly, firing phasers at MacDuff. With each hit, MacDuff's human facade
    is stripped away, revealing a strange, metallic, alien body beneath. He is exposed
    as a Satarran agent, manipulating the Enterprise to strike a blow against his
    long-standing enemies, the Lysians. MacDuff is subdued, and the true nature of
    the mission is revealed. The Enterprise then changes course for Starbase 301 to
    restore the crew's memories. In the Ready Room, Picard and Riker discuss the implications
    of MacDuff's deception and the Satarran-Lysian conflict. Finally, in Ten-Forward,
    Riker faces the lingering romantic tension created during the amnesia period.
    Troi and Ro, now with their memories restored, playfully confront him about his
    dual entanglements, leaving him comically flustered but ultimately off the hook.
    The crew grapples with the ethical implications of their actions and the moral
    quandaries of wartime decision-making, having navigated a crisis of identity and
    purpose.
