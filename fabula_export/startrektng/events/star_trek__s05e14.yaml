  title: MacDuff manipulates memory restoration
  description: "\n  Geordi La Forge reveals the Lysian probe selectively targeted\
    \ personal files, confirming the memory loss was a deliberate weapon. Picard probes\
    \ Beverly for medical records, but she warns of risks without them. Riker volunteers\
    \ for memory restoration, but MacDuff interrupts, offering himself first—a calculated\
    \ move to maintain control. His deception goes unnoticed, allowing him to stay\
    \ steps ahead while the crew remains unaware of his true motives. The scene underscores\
    \ MacDuff’s tactical advantage and the crew’s growing vulnerability to his manipulation.\n\
    \  "
