- fabula_uuid: cand_evt_scene_99409fe55c92655d_01
  global_id: null
  title: Troi’s tactile memory of Riker
  description: 'In the disorienting aftermath of the alien probe’s memory wipe, Deanna
    Troi and William Riker enter her unfamiliar quarters, where she attempts to reconstruct
    her identity through physical touch—running her hands over objects as if they
    might trigger recollection. Riker’s presence becomes the sole anchor in her fractured
    reality, as she confesses that nothing else feels familiar. Their charged exchange
    reveals an unspoken emotional bond: Troi describes an intangible but visceral
    connection to him, tracing his cheek as if to extract buried memories. The moment
    escalates into a fragile, wordless intimacy, culminating in Troi’s impulsive kiss
    on his cheek—a gesture that lingers as a fleeting bridge between them before Riker
    exits, leaving her to process the encounter alone. The scene underscores their
    shared vulnerability in a world where even their own minds are unreliable, while
    foreshadowing the precarious nature of trust and the resilience of personal bonds
    amid external chaos.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e14
  scene_sequence: 17
  sequence_in_scene: 31
  key_dialogue:
  - 'RIKER: Recognize anything?'
  - 'TROI: It might as well belong to someone else. Nothing feels right... this room,
    the ship... most of all this war we''re fighting...'
  - 'RIKER: I don''t imagine war ever feels right.'
  - 'TROI: That same feeling... you seem familiar... you''re the only thing that does.'
  - 'RIKER: Can you remember anything specific?'
  - 'TROI: I don''t know... It''s more like remembering an emotional image... feelings
    that are somehow associated with you...'
  - 'RIKER: I hope they''re good feelings...'
  - 'TROI: Yes... they are...'
