      the crew’s fractured trust and amnesia-induced doubts are laid bare. The lounge’s
      neutral ground forces the crew to confront their differences without the distractions
      of their usual roles.
    symbolic_significance: Represents the crew’s moral isolation and the pressure
      of command. The lounge, typically a place of unity, becomes a stage for their
      divisions, underscoring the cost of their amnesia and the hidden enemy’s influence.
    access_restrictions: Restricted to senior staff only; the crew’s amnesia and the
