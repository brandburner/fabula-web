  key_dialogue:
  - 'WORF: A full diagnostic would require us to take our systems off-line. We would
    be defenseless.'
  - 'PICARD: If we''re going to trust our lives to these systems, we should make certain
    they aren''t going to fail.'
  - 'WORF: ((to Beverly)) What have you found, Doctor?'
  - 'BEVERLY: Not much. The brain scans I''ve run are unusual, but they show no damage
    to the hippocampus. That suggests we still have our long-term memories... but
    somehow they''re being blocked.'
  - 'PICARD: ((to Beverly)) The medical records will be our next priority.'
