- fabula_uuid: act_ffe696fbdb1c7a6e
  number: 4
  summary: As the Enterprise continues its journey at impulse, the senior staff convenes
    in the Observation Lounge, grappling with the grim reality of their wartime mission.
    Ro proposes a randomly vectored approach to the target, which Picard approves.
    Picard then turns his attention to the critical issue of memory restoration, asking
    Dr. Crusher for an update. Beverly explains that while she has a potential treatment
    involving increasing medial temporal region activity, she absolutely requires
    the crew's medical records to proceed safely. However, Geordi and Data report
    significant obstacles in accessing these files; they've hit a "file wall," and
    all mission reports, crew records, personal logs, and medical records appear to
    be selectively deleted or damaged. This discovery further intensifies the crew's
    suspicions about the true nature of their predicament. In Riker's quarters, the
    complex romantic entanglements deepen. Troi discovers a book inscribed "To Will...
    All My Love, Deanna," providing concrete evidence of a past intimate relationship
    with Riker. Moments later, Ro enters, observing the lingering tension between
    Riker and Troi with amused tolerance, before aggressively re-asserting her own
    amnesiac claim on Riker's affections, demonstrating a possessive streak. Back
    on the bridge, the selective data loss is discussed, leading MacDuff to confidently
    attribute it to the Lysian weapon, a claim that seems to satisfy the others. Despite
    the danger, MacDuff volunteers for Beverly's experimental memory restoration procedure,
    beating Riker to the offer. In Sickbay, Beverly attempts the procedure on MacDuff,
    who convulses violently. The treatment appears to fail, and MacDuff claims no
    memory recovery, though his subtle smile suggests otherwise. Picard, deeply troubled
    by the mission's lack of moral context and the convenient absence of crucial data,
    expresses his profound doubts to MacDuff, feeling like he's been handed a weapon
    and told to "shoot a stranger." MacDuff, however, skillfully manipulates Picard's
    moral compass, questioning if it's right to prolong the war based solely on their
    "moral discomfort." Picard's internal struggle intensifies, setting the stage
    for his ultimate decision.
