  title: Picard refuses genocidal order
  description: "\n  Picard’s moral crisis reaches its breaking point as the Enterprise\
    \ approaches the Lysian Central Command—a defenseless station housing 15,000 civilians.\
    \ Data’s scans confirm the station’s minimal defenses, while Troi’s empathic alarm\
    \ underscores the ethical horror of the mission. MacDuff, increasingly desperate,\
    \ pressures Picard to fire, invoking the 'rest of our forces' as justification.\
    \ Picard’s refusal to obey the genocidal order—'I do not fire on defenseless people'—ignites\
    \ a violent mutiny. MacDuff, exposed as a Satarran infiltrator, attempts to seize\
    \ control, revealing his alien physiology when struck by phaser fire. The confrontation\
    \ forces Riker and Worf to subdue him, while Picard’s defiance crystallizes his\
    \ moral authority and exposes the enemy within. The moment marks a turning point:\
    \ the crew’s loyalty is tested, the mission’s true stakes are revealed, and the\
    \ Satarran conspiracy is unmasked.\n  "
