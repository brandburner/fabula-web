    this vessel. But our identities have somehow been erased, or suppressed.'
  - 'RO: We should be careful what we say... there could be a boarding party somewhere
    on the ship.'
  - 'PICARD: I suggest we use [the comms]. Our ship must have a crew. They may still
    have their memories.'
