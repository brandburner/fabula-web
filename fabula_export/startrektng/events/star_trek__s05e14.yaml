- fabula_uuid: cand_evt_scene_312748008c4d387e_02
  global_id: null
  title: Ro tests Riker’s emotional resilience
  description: 'After interviewing disoriented crewmembers about their memory loss,
    Riker and Ro Laren transition from procedural efficiency to a charged, personal
    exchange. Ro’s seemingly casual question—*‘What would you be doing if your memories
    were intact?’*—serves as a probe, testing Riker’s vulnerability under crisis while
    subtly challenging his reliance on the holodeck for escapism. His flirtatious
    but evasive response (*‘I bet I could conjure up an interesting program or two’*)
    reveals his comfort with controlled fantasy over real intimacy, a dynamic that
    mirrors his broader struggle with leadership and emotional exposure. Ro’s retort
    (*‘You don’t strike me as a man who needs a holodeck to have a good time’*) carries
    dual subtext: a romantic overture and a critique of his avoidance of genuine connection.
    Their shared grin signals a momentary bond, but the tension lingers—Ro’s probing
    hints at her own unresolved tensions with authority and intimacy, while Riker’s
    deflection underscores his reluctance to confront deeper emotional stakes. The
    exchange functions as both a character-revealing beat (exposing Riker’s emotional
    armor) and a thematic setup (foreshadowing his later struggles with Troi and his
    own leadership under duress).'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e14
  scene_sequence: 12
  sequence_in_scene: 23
  key_dialogue:
  - 'RO: If everything was back the way it was supposed to be -- what do you think
    you''d be doing right now... ?'
  - 'RIKER: Having a lot more fun than searching the ship, I''d imagine.'
  - 'RO: Fun?'
  - 'RIKER: With that holodeck we just saw, I bet I could conjure up an interesting
    program or two...'
  - 'RO: Now, that''s disappointing...'
  - 'RIKER: Why?'
  - 'RO: You don''t strike me as a man who needs a holodeck to have a good time.'
