      As the signal’s origin is confirmed, it evolves into a high-frequency intrusion
      attempt, targeting the *Enterprise*’s optical data network. The signal’s escalation—from
      background noise to a 1500% intensity spike—serves as the catalyst for Picard’s
      shift from diplomacy to defense, embodying the probe’s silent aggression.
    status_before_event: Weak, intermittent signal picked up on long-range sensors.
      No immediate cause for alarm.
    status_after_event: Intensified to dangerous levels, locked onto the optical data
      network. The signal’s frequency matches the network’s vulnerabilities, prompting
      an urgent response.
