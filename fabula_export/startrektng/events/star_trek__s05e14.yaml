  title: MacDuff’s Deceptive Recovery
  description: "\n  In Sickbay, Beverly Crusher attempts to restore MacDuff’s erased\
    \ memories using an experimental medical device, but the procedure triggers violent\
    \ convulsions. Beverly aborts the treatment, visibly shaken, and checks MacDuff’s\
    \ neural activity—only to find no change in his diencephalic patterns, which should\
    \ have shifted if the procedure had worked. Despite her confusion, she declares\
    \ the attempt a failure, and MacDuff feigns disorientation, pretending to wake\
    \ up with no recollection. As Beverly turns away in disappointment, MacDuff’s\
    \ subtle, knowing smile reveals his deception: his memories were never erased,\
    \ and he has successfully manipulated the crew into believing he is as amnesiac\
    \ as the rest. This moment establishes his hidden agency and sets up his future\
    \ role as a wildcard in the crew’s investigation of the alien probe’s true purpose.\n\
    \  "
