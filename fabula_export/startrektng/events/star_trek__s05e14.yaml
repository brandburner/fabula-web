  title: Troi senses Riker’s hidden familiarity
  description: 'In Ten Forward, Riker and Ro investigate the crew’s collective memory
    loss when Troi steps forward as the bridge liaison. She notes two anomalies: Data’s
    artificial nature and her own unexplained empathic sensitivity. As she describes
    her ability to perceive emotions, Troi abruptly locks eyes with Riker, struck
    by an inexplicable sense of familiarity—an unspoken connection that disrupts the
    moment. Ro observes their charged exchange with quiet curiosity before Worf’s
    comlink summons them to the bridge, severing the intimacy. The scene underscores
    the crew’s fractured state while planting a personal subplot between Troi and
    Riker, hinting at deeper, unresolved emotions that may complicate their mission.'
