  title: Crew divides to reclaim the Enterprise
  description: |2

    After the alien probe's memory-wiping attack leaves the crew disoriented, Picard and his senior officers regroup on the bridge to formalize a coordinated response. Worf reports the ship's full tactical capabilities—ten phaser banks, 275 photon torpedoes, and high-capacity shields—revealing the *Enterprise* is a battleship, which MacDuff (the Satarran agent) notes with calculated interest. Meanwhile, Ro's growing agitation over their powerlessness clashes with Riker's attempt to restore order, culminating in a fragile moment of trust as they agree to search the ship together. Geordi volunteers to stabilize the computer core, while Worf authorizes the search, establishing the crew's first deliberate push to restore control. The scene underscores their collective resolve to counter the unseen threat, but also highlights the tension between survival and moral ambiguity as they prepare to investigate their erased mission.
