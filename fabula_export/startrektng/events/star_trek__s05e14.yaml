      the crew’s moral and tactical debate, its spacious yet intimate setting amplifying
      the weight of their decisions. The room’s large windows offer a view of the
      stars, a silent audience to the crew’s struggle, while the table at its center
      becomes a battleground for ideas. The lounge’s usual role as a place for reflection
      and camaraderie is subverted here, transformed into a war room where the fate
      of thousands hangs in the balance. The crew’s physical proximity—seated around
      the table, leaning in to examine the star map and graphic—creates a sense of
      claustrophobic tension, as if the walls themselves are pressing in on their
      conscience.
    observed_atmosphere: 'Tension-filled with whispered conversations and heavy silences,
      punctuated by outbursts of moral and tactical debate. The air is thick with
      the crew’s collective dread and the unspoken question: *How far are we willing
      to go?*'
