  title: Lysian hail sparks lethal division
  description: 'The Enterprise encounters a Lysian destroyer, triggering a high-stakes
    confrontation where MacDuff’s paranoia clashes with Picard’s caution. When the
    Lysians hail the ship, MacDuff insists it’s a trap—likely a weaponized communication
    channel—while Troi advocates for dialogue, exposing a leadership fracture. Picard,
    torn between orders and ethics, ultimately destroys the Lysian vessel after it
    fires first, leaving the crew in stunned silence. The act reveals MacDuff’s manipulative
    influence, Troi’s moral clarity, and Picard’s reluctant descent into violence,
    all while deepening the crew’s distrust of their own mission and the Lysians’
    true intentions. The moment marks a turning point: the first bloodshed in a conflict
    where memory loss and hidden agendas blur the line between self-defense and war
    crime.'
