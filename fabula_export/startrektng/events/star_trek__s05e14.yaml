acts:
- fabula_uuid: act_bab9b2befb9784a9
  number: 1
  summary: 'The Enterprise crew awakens on the bridge, disoriented and devoid of personal
    memories following a mysterious flash of green light. Captain Picard, Commander
    Riker, Lieutenant Worf, Ensign Ro Laren, Lieutenant Commander Geordi La Forge,
    and the newly introduced Commander MacDuff all share this inexplicable amnesia.
    While their identities are lost, their professional skills remain intact; Ro instinctively
    knows how to pilot, Worf understands tactical controls, and Picard exhibits natural
    leadership. Geordi discovers metallic debris outside, suggesting a recent conflict.
    With the ship''s voice interface offline, Geordi manages to restore basic internal
    communications, confirming that the entire crew has suffered the same memory loss.
    Dr. Beverly Crusher, in Sickbay, realizes she retains her medical expertise but
    no personal history, highlighting the selective nature of their amnesia. On the
    bridge, Worf, taking a proactive stance, prioritizes making the ship combat-ready,
    asserting a temporary command. Picard, however, advocates for first understanding
    their identities and mission by accessing ship logs. Riker and Ro, despite their
    pre-amnesia animosity, develop a cooperative bond as they survey the ship, with
    Ro expressing anxiety over her lack of control. Geordi successfully restores propulsion,
    navigation, weapons, and communications systems, making the Enterprise operational.
    As Worf declares the ship "ready," Picard''s lingering question, "for what?",
    underscores the act''s central tension: they have regained functionality but remain
    adrift in purpose, setting the stage for the discovery of their critical, yet
    unknown, mission.'
