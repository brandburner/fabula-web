- fabula_uuid: cand_evt_scene_8ed04e7800343a27_01
  global_id: null
  title: Crew suffers collective amnesia after probe attack
  description: The Enterprise bridge erupts into chaos as an alien probe breaches
    shields and triggers a bright green scanning beam, instantly erasing the entire
    crew's memories. Picard, Riker, and the rest of the bridge team—including a previously
    unseen Starfleet officer, MacDuff—awaken disoriented, unable to recognize each
    other or their surroundings. The event forces the crew into a state of existential
    crisis, stripping away their identities, mission context, and even basic operational
    knowledge. Worf and Geordi’s earlier warnings about the probe’s intrusion now
    take on dire significance as the crew grapples with the immediate threat of their
    own erased pasts. The sudden appearance of MacDuff, an unfamiliar officer, introduces
    an immediate red flag, hinting at deeper deception or manipulation. This moment
    isn’t just a plot device—it’s a narrative reset, forcing the characters (and the
    audience) to question everything they thought they knew about their purpose, alliances,
    and the looming danger they were investigating. The disorientation isn’t just
    physical; it’s psychological, as the crew’s instinctive reactions—like Ro’s confusion
    at her own hands on the helm—reveal how deeply their sense of self is tied to
    memory and routine. The event sets up a high-stakes crisis of identity, where
    survival depends on reconstructing the past while an unseen enemy’s true intentions
    remain obscured.
