  key_dialogue:
  - |-
    GEORDI: It looks like we're all in the same boat.
    RIKER: Make that -- 'on the same starship.'
  - |-
    PICARD: Clearly, we still possess certain skills -- we seem to know how to operate this vessel. But our identities have somehow been erased, or suppressed.
    RIKER: We are on the bridge -- there's a good chance this is our ship.
    RIKER: (to Picard) And it looks like you're the leader.
  - |-
    GEORDI: I've got some intermittent sensor readings here... the scan keeps repeating itself -- like it's stuck. But it looks like there's metallic debris right in front of us. Distance: seventeen kilometers.
    RIKER: The remains of another ship?
    GEORDI: That's a good possibility.
    WORF: Perhaps we were engaged in battle.
    RO: Then we fired back. Destroyed them.
  - |-
    PICARD: If this presumption is correct, we may have sustained other damage.
    PICARD: (to COM) Computer... status report.
    RIKER: No voice interface...
    GEORDI: No interface, period.
  - |-
    RO: We should be careful what we say... there could be a boarding party somewhere on the ship.
    WORF: (to com) Bridge to all personnel. Select a representative from your group to contact the bridge and report on your status.
