  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: 'Starfleet is the invisible but omnipotent force shaping
      the crew’s actions, its authority felt in every order, protocol, and moral dilemma.
      The organization is represented through the crew’s adherence to radio silence,
      their reliance on Starfleet’s intelligence about the Lysian weapon, and the
      unspoken expectation that they will obey their mission parameters without question.
      Starfleet’s influence is both a source of structure and a target of Troi’s moral
      objections, as she challenges the organization’s willingness to risk war crimes.
      The crew’s internal debate reflects broader institutional tensions: the tension
      between duty and morality, and the cost of blind obedience in wartime.'
    active_representation: Via institutional protocol being followed (radio silence,
      mission parameters) and the crew’s internalized loyalty to Starfleet’s chain
      of command.
    power_dynamics: Exercising authority over individuals, but being challenged by
      Troi’s ethical objections and the crew’s fractured trust. The organization’s
      power is absolute in theory, but its moral legitimacy is questioned in practice.
    organizational_goals:
    - To ensure the crew executes the mission to destroy the Lysian Central Command,
      thereby ending the war and preventing further Federation losses.
    - To maintain operational secrecy and coordination with other Starfleet vessels,
      even at the risk of moral compromise.
    influence_mechanisms:
    - Through institutional protocol (radio silence, adherence to orders),
    - Through the crew’s internalized loyalty and sense of duty,
    - Through the threat of disciplinary action or mission failure if orders are disobeyed,
    - Through the moral weight of the Federation’s cause, framed as a just war against
      a genocidal enemy.
    institutional_impact: The crew’s debate highlights the institutional tension between
      Starfleet’s military objectives and its ethical responsibilities. The organization’s
      power is reinforced by the crew’s compliance, but Troi’s objections plant seeds
      of doubt about the cost of unquestioning obedience.
    internal_dynamics: 'The crew’s internal debate mirrors broader institutional conflicts:
      the tension between tactical necessity and moral accountability, and the risk
      of war crimes in the pursuit of victory.'
    global_id: ger_organization_73a4b614bde7
