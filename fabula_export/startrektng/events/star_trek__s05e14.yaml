  title: Enterprise destroys Lysian destroyer
  description: |2

    The Enterprise crosses into Lysian space and is immediately intercepted by a Lysian destroyer. Picard orders a cautious approach, slowing to scan rather than engaging, but MacDuff insists on following orders to destroy all Lysian warships. Data confirms the destroyer is no match for the Enterprise, and when the Lysians hail the ship, MacDuff warns against responding, fearing a trap. The Lysians fire first, forcing Picard to retaliate. The Enterprise destroys the destroyer with a single phaser blast, leaving the crew in stunned silence. Picard’s reluctance and MacDuff’s eagerness expose a moral and strategic divide, while the Lysians’ apparent weakness fuels Picard’s suspicion about their mission. The encounter forces Picard to confront the ethical weight of their orders and underscores the Lysians’ readiness for conflict, setting up deeper questions about the mission’s true purpose.
