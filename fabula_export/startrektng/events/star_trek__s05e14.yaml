    race that''s been at war with the Lysians for decades.'
  - 'RIKER: With all the power that MacDuff had... to alter our brain chemistry, and
    manipulate the computers... it''s hard to believe he needed the Enterprise.'
  - 'PICARD: Satarran weapons technology is no more advanced than the Lysians''. One
    photon torpedo would have ended their war.'
  - 'RIKER: It almost did...'
