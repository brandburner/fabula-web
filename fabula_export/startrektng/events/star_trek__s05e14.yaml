  sequence_in_scene: 51
  key_dialogue:
  - |-
    RIKER: I hope I'm not interrupting.
    RO: Not at all. I was hoping to see you.
    TROI: Please -- sit down.
  - |-
    RO: The Counselor tells me... at times like that, we might do things we've always wanted to do.
    RIKER: She said that?
    TROI: It's psychologically valid.
  - |-
    RO: Don't worry about it, Commander. As far as I'm concerned we've shared something that you and I will treasure forever.
    RIKER: I feel kind of... confused.
    TROI: If you still feel confused tomorrow -- you know where my office is.
