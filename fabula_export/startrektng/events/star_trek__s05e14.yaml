- fabula_uuid: cand_evt_scene_ad2fc04b379c6436_01
  global_id: null
  title: Tactical readiness and fractured trust
  description: "\n  On the bridge of the *Enterprise*, the crew—still reeling from\
    \ the memory-wiping probe—attempts to regain control by assessing their tactical\
    \ capabilities and planning a search of the ship. Worf, seated in the captain’s\
    \ chair, delivers a blunt inventory of the vessel’s firepower (ten phaser banks,\
    \ 275 photon torpedoes, high-capacity shields) to MacDuff, an outsider whose loyalties\
    \ remain untested. The exchange underscores the crew’s military preparedness while\
    \ exposing their vulnerability: they are a battleship, but their own identities\
    \ and mission are erased. Meanwhile, Ro’s simmering frustration over her loss\
    \ of control erupts as she insists on searching engineering alone, revealing her\
    \ instinctive piloting knowledge despite amnesia. Riker intervenes, soothing her\
    \ with a reminder of their shared dependence, momentarily stabilizing the fragile\
    \ alliance. The scene crystallizes the tension between survival and suspicion—cooperation\
    \ is necessary, but trust is not guaranteed. Geordi volunteers to restore the\
    \ computer core, and the group splits to search the ship, setting the stage for\
    \ further revelations about their mission and the true nature of their enemy.\n\
    \  "
