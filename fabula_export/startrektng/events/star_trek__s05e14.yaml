      moral and political backbone of the crew’s mission, its ideals serving as both
      a justification and a point of contention. The Federation is represented through
      Data’s reports about the war, Geordi’s emphasis on the coordinated effort to
      end the conflict, and Picard’s invocation of the crew’s role as the ‘lynch pin’
