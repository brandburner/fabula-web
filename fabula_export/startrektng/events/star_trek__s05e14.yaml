  scene_sequence: 4
  sequence_in_scene: 7
  key_dialogue:
  - 'WORF: We are picking up a subspace signal, Captain. Sensors show a small spacecraft
    ahead.'
  - 'GEORDI: The configuration is unfamiliar--nothing in our database comes close.'
  - 'WORF: Within visual range.'
  - 'PICARD: On screen.'
  - 'WORF: No discernable armament. Reading one life-form aboard.'
  - 'PICARD: Hail the vessel.'
  - 'WORF: No response, Captain.'
  - 'GEORDI: We''re being scanned... but it''s not like any sensor system I''ve ever
    seen... Should we raise shields?'
  - 'PICARD: No. We''ll start this off with a show of good faith.'
  - 'WORF: Sir, the scans are now matching the frequencies of our optical data network.
    It could be an attempt to access our computer system.'
  - 'GEORDI: Scanning intensity has increased by fifteen hundred percent.'
  - 'PICARD: Shields up.'
