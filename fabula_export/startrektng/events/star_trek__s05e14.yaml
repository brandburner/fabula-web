      lives, and countering the Lysian threat—are framed as just and necessary, but
      Troi’s objections force the crew to confront the Federation’s complicity in
      potential war crimes. The Federation’s influence is felt in the crew’s sense
      of duty, but its moral authority is undermined by the secrecy and deception
      surrounding the mission.
