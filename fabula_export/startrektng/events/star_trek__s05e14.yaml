  - object_uuid: ger_object_97fdb69b0635
    description_of_involvement: The Enterprise Computer Core is the linchpin of the
      scene’s action, representing both the ship’s vulnerability and the key to its
      recovery. Geordi confirms that all systems—warp, impulse, and tactical—are functional
      but locked out, requiring direct access to the core to restore control. Riker
      references the core’s location via schematics, and Geordi is tasked with accessing
      it to prioritize weapons, propulsion, and shields. The core’s restoration is
      framed as the first critical step toward regaining the Enterprise’s operational
      autonomy, symbolizing the crew’s fight to reclaim their agency amid the alien
      probe’s assault. Its locked status underscores the fragility of their situation,
      while its potential unlocking offers a glimmer of hope.
    status_before_event: Locked and inaccessible, with all critical systems (warp,
      impulse, tactical) functional but unable to be controlled or activated by the
      crew.
    status_after_event: Geordi is en route to access it, with the expectation that
      it will be restored to full functionality, unlocking the ship’s defenses and
      operational capabilities.
