- fabula_uuid: cand_evt_scene_3679961aaf3e7840_01
  global_id: null
  title: Picard reveals MacDuff’s Satarran betrayal
  description: "\n  In the ready room, Picard delivers a measured but devastating\
    \ revelation to Riker: Commander MacDuff—a trusted officer and apparent mediator—was\
    \ a Satarran sleeper agent embedded aboard the *Enterprise* for decades. Picard\
    \ frames the disclosure as a necessary confession, acknowledging the Lysians’\
    \ prior awareness of MacDuff’s regrets and the brutal asymmetry of the Satarran-Lysian\
    \ war, where Satarran weapons are technologically inferior. The dialogue underscores\
    \ the moral compromises demanded by the conflict, with Picard justifying the deception’s\
    \ necessity while Riker grapples with the implications of MacDuff’s long-term\
    \ manipulation. The exchange deepens the crew’s understanding of the hidden war’s\
    \ stakes and forces Riker to confront the ethical cost of their mission. The scene’s\
    \ tension lies in Picard’s controlled delivery and Riker’s dawning realization\
    \ that the enemy was never just external—it was already among them, wearing a\
    \ Starfleet uniform.\n  "
