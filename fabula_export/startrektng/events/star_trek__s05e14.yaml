- fabula_uuid: cand_evt_scene_7814e15313b6884b_02
  global_id: null
  title: Picard Orders Attack on Lysian Command
  description: 'In the Observation Lounge, the crew—still grappling with collective
    amnesia—discovers their mission: the *Enterprise* must cross into Lysian territory
    and destroy the Central Command, a strike that could end the war but risks becoming
    a war crime. Geordi and Data reveal the Federation’s covert war, the capture of
    fourteen Starfleet vessels, and the Lysians’ devastating energy weapon. Troi objects,
    arguing for verification of orders, but Geordi insists on radio silence, and Worf
    urges decisive action. Picard, torn between duty and morality, ultimately orders
    the attack, committing the crew to a potentially catastrophic course. The decision
    fractures the crew’s unity, foreshadowing the consequences of their fragmented
    memories and the hidden enemy’s influence. The scene underscores Picard’s internal
    conflict and the crew’s fractured trust, setting the stage for the mission’s escalation
    and the revelation of MacDuff’s deception.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e14
  scene_sequence: 15
  sequence_in_scene: 29
