    our memories back. Is there anything you can do?'
  - 'BEVERLY: I found several cases resembling our condition in the medical index.
    The causes are different, but the cure is similar in each case. It involves increasing
    the activity of the medial temporal region of the brain. Using short term memory
    synapses to retrieve long term memory.'
  - 'GEORDI: Data and I ran into some trouble accessing the medical file areas in
    the computer. But with a little time, I''m pretty sure we can get there. Three
    hours, maximum.'
