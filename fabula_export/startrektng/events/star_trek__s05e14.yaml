  key_dialogue:
  - 'WORF: The Lysian Central Command would have received any transmission from the
    destroyer by now.'
  - 'RO: I recommend a randomly vectored approach to our target. It would be our best
    chance of avoiding any pursuit.'
  - 'PICARD: Doctor, the success of this mission would be far more likely if we had
    our memories back. Is there anything you can do?'
  - 'BEVERLY: I found several cases resembling our condition in the medical index.
    The causes are different, but the cure is similar in each case.'
  - 'GEORDI: Data and I ran into some trouble accessing the medical file areas in
    the computer. But with a little time, I''m pretty sure we can get there.'
