    el-Mitra Exchange—particularly since I have already taken both your rooks. By
    missing that opportunity, you have left your king vulnerable.'
  - 'TROI: Chess isn''t just a game of gambits and ploys—it''s also a game of intuition.'
  - 'DATA: You are a challenging opponent.'
