    description_of_involvement: 'Main Engineering is the heart of the *Enterprise*,
      a space pulsing with the ship''s lifeblood—literally and metaphorically. In
      this moment, it serves as the command center for the crew''s fragmented recovery
      efforts, its consoles and humming machinery a stark contrast to the disorientation
      outside. Riker, Ro, and Geordi gather here, their voices cutting through the
      low hum of strained systems, as they assess the ship''s status and plot their
