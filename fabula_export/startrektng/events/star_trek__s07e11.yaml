  - object_uuid: ger_object_6813eb03ea25
    description_of_involvement: The shuttle’s helm is Worf’s primary tool for navigating
      the quantum fissure. As he grips the helm tightly, his fingers dash across the
      controls to activate the inverse warp field and pilot the craft directly into
      the fissure’s core. The helm trembles violently as the shuttle enters the fissure,
      its systems straining under the anomaly’s energy. Sparks fly from the console,
