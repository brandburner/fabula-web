acts:
- fabula_uuid: act_47adece08025462e
  number: 1
  summary: 'Worf returns to the Enterprise from a Bat''leth competition, recording
    a personal log about his victory. He walks with Riker, exhibiting jumpiness due
    to anticipating a surprise birthday party. The crew, including Troi, Beverly,
    Geordi, and Data, indeed throws him a party, much to his initial chagrin. During
    the party, Worf experiences the first subtle shifts in reality: the cake changes
    color, Troi''s attire and hair alter, and Captain Picard, initially reported absent,
    suddenly appears. Later, on the Bridge, the crew investigates the Argus Array,
    discovering it has been reprogrammed to spy on Federation sites, with evidence
    pointing to Cardassian involvement. Worf, discussing Alexander''s future with
    Troi, proposes she become Alexander''s surrogate mother. In Engineering, Worf
    experiences another wave of dizziness, and the layout of the room shifts, with
    Picard disappearing and Data and Geordi changing positions. Concerned, Worf goes
    to Sickbay, where Doctor Crusher tells him he has a concussion and lost the Bat''leth
    competition, contradicting his memories. Worf, disturbed, checks his trophy, finding
    it is for ''Ninth Place'' instead of ''Champion Standing'', confirming his reality
    is fundamentally altered.'
