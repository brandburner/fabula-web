  - 'DATA: I believe the quantum fissure we discovered is a fixed point across the
    space-time continuum—a keyhole that intersects many different quantum realities.'
  - 'BEVERLY: So at this moment, there are an infinite number of Enterprises... and
    an infinite number of Doctor Crushers having this discussion.'
  - 'DATA: Exactly. The VISOR uses a subspace field pulse. I think that whenever Geordi
    came near Worf, the field pulse intensified the quantum flux and pushed Worf into
    another reality.'
  - 'WESLEY: Data... what if we scanned the quantum fissure using a subspace differential
    pulse? Maybe we could locate the quantum state that shares Worf’s signature...
    and find a way to get him back.'
