  - object_uuid: ger_object_deb5a8887a16
    description_of_involvement: The *Shuttlecraft Borges* is identified as the critical
      tool for sealing the quantum fissure. Picard confirms its possession on his
      alternate *Enterprise* and agrees to prepare it for launch. The shuttlecraft
      is not physically present on the original *Enterprise* bridge but is the linchpin
      of Data’s plan—its unique quantum signature matches Worf’s original vessel,
      making it the only craft capable of emitting the broad-spectrum warp field needed
      to restore the barriers between realities. The shuttlecraft’s role is both functional
      (the means to execute the plan) and symbolic (representing the convergence of
      parallel realities and the sacrifice required to resolve the crisis).
    status_before_event: Possessed by Picard’s alternate *Enterprise*, prepared for
