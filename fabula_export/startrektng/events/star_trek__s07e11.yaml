- fabula_uuid: act_19a2cbd0a6c182ab
  number: 5
  summary: Hundreds of Enterprises now fill space, and Data warns that the rate of
    quantum incursions is increasing exponentially, threatening to merge all realities.
    Data theorizes that if Worf re-enters the fissure in his original shuttle and
    emits a broad-spectrum warp field, it could seal the fissure and restore all ships
    to their proper realities. Captain Riker hails all the Enterprises, requesting
    the ship that matches Worf's quantum signature. Another Enterprise, captained
    by Picard, responds, confirming they possess the correct shuttle. In the Shuttlebay,
    Worf prepares for his perilous mission, sharing a tender goodbye with Troi, who
    is now his wife. As Worf's shuttle approaches the fissure, another Enterprise
    attacks, its Captain Riker desperate to avoid returning to a Borg-dominated reality.
    Riker orders the attacking Enterprise disabled, but it explodes due to prior damage.
    Worf proceeds into the fissure, experiencing a visual distortion of multiple Worfs
    before a flash of color. He awakens alone in his shuttle, now in empty space.
    He hails the Enterprise, and Captain Picard responds, confirming Worf won the
    Bat'leth and everything is normal. Back on the Enterprise, Worf walks with Riker,
    aware of the impending surprise party. Entering his quarters, he finds only Troi,
    who is not his wife, and she is feeding Alexander's pet beetle. Worf, relieved,
    invites Troi to dinner, signifying a new beginning for their relationship in his
    restored original reality.
