- fabula_uuid: cand_evt_scene_aeea1f19af651ee1_01
  global_id: null
  title: Worf's Reality Unravels Through Data's Facts
  description: 'Worf’s disorientation escalates as Data methodically recites the timeline
    of his marriage to Troi—a relationship Worf has no memory of. The clinical recitation
    of dates and events (spinal injury, Riker’s permission, their mating) contrasts
    sharply with Worf’s visceral confusion, underscoring the quantum anomaly’s destabilizing
    effects. When Data’s scan reveals no temporal anomalies, Worf retraces his steps,
    identifying Geordi La Forge as a common factor in his shifting realities. The
    scene pivots from personal crisis to investigative urgency, with Worf and Data
    preparing to confront Geordi, marking the first concrete lead in restoring Worf’s
    fractured identity. Troi’s departure for Sickbay leaves Worf emotionally adrift,
    reinforcing the stakes: his marriage, his memories, and his very existence are
    unraveling, and the only stable reference point is the anomaly itself.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e11
  scene_sequence: 15
  sequence_in_scene: 29
  key_dialogue:
  - 'DATA: I am initiating a subspace scan to search for temporal anomalies on or
    off the ship.'
  - 'WORF: Commander... how long have I been married to Counselor Troi?'
  - 'DATA: Two years, one month and twelve days. It is my understanding that your
    romantic affiliation began soon after you recovered from your spinal injury on
    Stardate 45587.'
  - 'WORF: I remember that... A cargo container fell on me.'
  - 'DATA: That is correct. After that, I observed that you and the Counselor began
    to spend more time together.'
  - 'WORF: When did it become... romantic?'
  - 'DATA: It was approximately six months later that you asked Commander Riker for
    his formal permission to court Counselor Troi. You felt that to do otherwise would
    be dishonorable.'
  - 'WORF: And then we mated.'
  - 'DATA: I am not privy to the exact details of when, where and how the first coupling
    took place. I could investigate it if you -'
  - 'WORF: No... that is alright.'
  - 'WORF: I was at the party... then I was in Engineering... then in my quarters...
    Geordi was in all three locations. And he was near me in each case, just before
    I noticed the differences.'
  - 'WORF: Do you think there is a connection?'
