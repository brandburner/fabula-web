  - object_uuid: ger_object_bc2982bdd0f7
    description_of_involvement: The Bajoran warship, detected by Data and confirmed
      by Wesley, fires without provocation, crippling the *Enterprise*’s power systems.
      Its disruptor volley is the direct cause of the energy surge that destabilizes
      the quantum fissure, spawning duplicate *Enterprise* vessels. This object embodies
      the Bajoran Empire’s hostile turn in this reality, serving as both antagonist
      and catalyst for the multiversal crisis. Its attack forces the crew to confront
      the fragility of their assumed alliances and the existential threat of the fissure’s
      collapse.
    status_before_event: Approaching the *Enterprise*, weapons charging.
    status_after_event: Fires on the *Enterprise*, causing critical damage and triggering
