- fabula_uuid: act_cd215290c1f40009
  number: 3
  summary: On the Red Alert Bridge, Worf's disorientation prevents him from raising
    shields, leading to the Enterprise sustaining heavy damage and the destruction
    of the Argus Array by the Cardassians. Picard, frustrated, relieves Worf from
    duty after he attributes his failure to 'memory loss,' which the crew does not
    understand. Returning to his quarters, Worf finds the trophy gone, replaced by
    a vase of flowers and art, and his personal log now states he *missed* the Bat'leth
    tournament entirely due to ship repairs. Troi enters, now in casual clothing,
    and behaves intimately, revealing they are married and have been for two years,
    a fact Worf does not remember. He is stunned to learn he has a 'wife.' Troi, sensing
    his genuine confusion, believes him and pledges her support. Worf and Data, whose
    eyes are now blue, begin to investigate, trying to pinpoint the first discontinuity.
    They identify Geordi as a common presence during all the shifts. Their search
    for answers takes a grim turn when they go to Sickbay to question Geordi, only
    to be informed by Doctor Ogawa that Geordi is dead, having succumbed to plasma
    burns from the earlier attack.
