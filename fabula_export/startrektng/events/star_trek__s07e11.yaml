  title: Riker exposes Worf’s fractured reality
  description: 'In the Ready Room—now Riker’s as captain—Data reveals Worf’s cellular
    quantum signature is asynchronous with the Enterprise’s universe, confirming he
    doesn’t belong here. Riker methodically dismantles Worf’s claim of attending a
    Bat’leth tournament by presenting irrefutable ship records: no shuttle departed,
    no competition occurred. The confrontation forces Worf to confront a terrifying
    inconsistency: his own memories are at war with objective reality. When Worf asks
    how long Riker has been captain, Riker reveals Picard died in a Borg attack four
    years prior—a truth that contradicts Worf’s fractured memories. The moment crystallizes
    the crisis at the heart of Worf’s arc: if his past is unraveling, what remains
    of his identity? The scene escalates the existential threat of the quantum anomaly
    while deepening the emotional stakes of Worf’s displacement.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e11
  scene_sequence: 17
  sequence_in_scene: 36
  key_dialogue:
  - 'DATA: I have found that the quantum flux in Worf''s cellular RNA extends to the
    subatomic level. It is asynchronous with normal matter. In essence, Captain—Mister
    Worf does not belong in our universe.'
  - 'RIKER: But he''s standing right here in front of us. He''s been on the ship for
    seven years. DATA: I cannot explain that either. According to my understanding
    of physics, Worf should not exist.'
  - 'RIKER: You say these discontinuities started to occur after you returned from
    a Bat''leth tournament on Forcas Three. WORF: Yes sir. RIKER: Now, I know for
    a fact that you didn’t attend that tournament... and that no shuttlecraft has
    left the Enterprise for over a month.'
  - 'WORF: I do remember. I just remember it differently. RIKER: You don’t remember
    any of this, do you? WORF: I do remember. I just remember it differently.'
