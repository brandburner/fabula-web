  - object_uuid: ger_object_12c9025d78eb
    description_of_involvement: The quantum fissure is the invisible but all-consuming
      force driving this event. Though not visually depicted on the viewscreen, its
      presence is felt through Data’s announcement that Worf has entered it. The fissure
      is the narrative and physical nexus of the crisis—it is both the cause of the
