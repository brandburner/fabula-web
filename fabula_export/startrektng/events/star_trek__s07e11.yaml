      of space here is not empty; it is a canvas for the collision of timelines, a
      place where the laws of physics and narrative fate intersect. The crew’s focus
      on the viewscreen ties the bridge’s interior to this external chaos, blurring
      the line between the ship’s safety and the existential threat beyond.
    observed_atmosphere: Silent and vast, but charged with the energy of colliding
