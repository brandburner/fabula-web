- fabula_uuid: cand_evt_scene_aeea1f19af651ee1_02
  global_id: null
  title: Worf's Reality Shifts Demand Investigation
  description: "\n  Worf’s mounting disorientation—triggered by inconsistencies in\
    \ his birthday party and earlier dizziness in Engineering—compels him to demand\
    \ a deeper analysis of the quantum anomaly. Data’s subspace scan fails to detect\
    \ temporal anomalies, forcing Worf to recount the first signs of his reality fracturing:\
    \ the shifting cake, Riker’s contradictory statements about Picard’s attendance,\
    \ and the sudden absence of Picard in Engineering. As Worf pieces together the\
    \ timeline, he realizes Geordi La Forge was present at all three destabilizing\
    \ moments, suggesting a direct connection between Geordi and the quantum fissure.\
    \ The scene marks the first explicit moment where Worf’s subjective instability\
    \ becomes a shared problem, shifting Data from passive observer to active investigator.\
    \ The revelation that Geordi may be the key to stabilizing the anomaly reframes\
    \ the crisis from abstract theory to a targeted focus on his role, escalating\
    \ the stakes and narrowing the investigation’s scope.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e11
  scene_sequence: 15
  sequence_in_scene: 30
  key_dialogue:
  - 'WORF: Commander... how long have I been married to Counselor Troi?'
  - 'DATA: Two years, one month and twelve days.'
  - 'WORF: And when did this... relationship begin?'
  - 'DATA: It is my understanding that your romantic affiliation began soon after
    you recovered from your spinal injury on Stardate 45587.'
  - 'WORF: I remember that... A cargo container fell on me.'
  - 'DATA: That is correct. After that, I observed that you and the Counselor began
    to spend more time together.'
  - 'WORF: When did it become... romantic?'
  - 'DATA: It was approximately six months later that you asked Commander Riker for
    his formal permission to court Counselor Troi. You felt that to do otherwise would
    be dishonorable.'
  - 'WORF: And then we mated.'
  - 'DATA: I am not privy to the exact details of when, where and how the first coupling
    took place. I could investigate it if you -'
  - 'WORF: No... that is alright.'
  - 'WORF: I went to Sickbay. Doctor Crusher told me I had a concussion... but I do
    not remember that happening.'
  - 'DATA: Think back. Are you sure that was the very first change? Perhaps there
    was one before you entered Sickbay?'
  - 'WORF: Before... Yes... yes. In Engineering. I felt a wave of dizziness... and
    when I looked up, you and Commander La Forge were on the opposite side of the
    room. Captain Picard was gone.'
  - 'WORF: I thought I had blacked out for a moment, and had not observed your movements.'
  - 'WORF: And at my birthday party... the cake was chocolate, then it was yellow.
    And Commander Riker told me the Captain was not going to attend... then suddenly
    the Captain was there.'
  - 'DATA: We should try to find any commonalties in these events. Where were you
    each time?'
  - 'WORF: I was at the party... then I was in Engineering... then in my quarters...'
  - 'DATA: What about the people you were with? Was there anyone who was present at
    all three events?'
  - 'WORF: Everyone was at my birthday party... then I was with Counselor Troi...
    then Commander La Forge entered... Geordi was in all three locations. And he was
    near me in each case, just before I noticed the differences.'
  - 'WORF: Do you think there is a connection?'
  - 'DATA: It is possible. We should speak with Commander La Forge.'
