- fabula_uuid: cand_evt_scene_ca9bd407707bba70_01
  global_id: null
  title: Worf’s Reality Collapses on the Bridge
  description: 'Worf returns to the bridge after the Bat’leth competition, only to
    find his memories and perception of reality unraveling. Data’s innocuous request
    for a metallurgical scan triggers Worf’s confusion—he has no recollection of the
    task. Before he can process this, a Cardassian *Galor*-class warship appears,
    forcing a tense diplomatic standoff with Gul Nador. Worf’s attempt to expose the
    Cardassians’ reprogramming of the Argus Array backfires spectacularly: Picard
    and Riker have no knowledge of the imaging logs he insists exist, and Data denies
    downloading them. The crew’s skepticism and Worf’s growing frustration reveal
    the quantum anomaly’s destabilizing effects on his mind, isolating him as the
    only one aware of the hidden threat. The scene underscores his Klingon instinct
    to act clashing with the crew’s disbelief, foreshadowing the existential crisis
    looming over the *Enterprise* and the multiverse. His struggle to reconcile his
    fractured memories with the crew’s reality becomes a microcosm of the larger conflict
    between perception and truth.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e11
  scene_sequence: 9
  sequence_in_scene: 16
  key_dialogue:
  - 'DATA: Lieutenant, have you completed the metallurgical scan of the Array?'
  - |-
    WORF: Sir?
    DATA: The metallurgical scan. Is it complete?
    WORF: I do not remember you asking me to -
  - |-
    WORF: Captain -- that ship was responsible for reprogramming the Array.
    PICARD: What do you mean?
    WORF: It is the same Class and energy configuration as the ship we saw in the imaging logs.
    PICARD: Imaging logs... Are you saying you have evidence that the Cardassians tampered with the Array?
    WORF: They have been using the Array as a surveillance device. You saw the logs yourself.
    PICARD: I haven't heard anything about this.
    RIKER: Neither have I.
    WORF: Commander Data -- show them the imaging logs you downloaded from the Array.
    DATA: I know of no such logs, Lieutenant.
  - 'PICARD: Worf... are you feeling alright?'
