    WORF: Wife!
  - |-
    TROI: So... are you saying you don't remember the last three years? You don't remember us falling in love... and getting married?
    WORF: I do remember the last three years... but they are different. We did not have this relationship. The Enterprise did not have a battle with the Cardassians...
  - 'TROI: Worf... whatever''s wrong... whatever''s happened... I want you to know
    that I believe you... And that I love you. We''ll find out what''s happening...'
