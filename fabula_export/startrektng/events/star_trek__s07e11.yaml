  - object_uuid: ger_object_deb5a8887a16
    description_of_involvement: The *shuttlecraft Borges* is confirmed by Picard (alternate
      reality) to be the vessel matching Worf’s quantum signature. It is the critical
      tool required for Worf’s high-risk mission to re-enter the quantum fissure and
      emit the broad-spectrum warp field. The shuttlecraft’s possession by the alternate
