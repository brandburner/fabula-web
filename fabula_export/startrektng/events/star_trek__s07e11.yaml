    global_id: ger_organization_73a4b614bde7
  - organization_uuid: ger_organization_9e4f7d5c96cf
    description_of_involvement: "\n        The *Alternate Enterprises Collective*\
      \ is represented by the hundreds of parallel *Enterprises* that have materialized\
      \ in the sector. Data detects their exponential influx, and Wesley isolates\
      \ Picard’s ship as a response to Riker’s hail. The collective serves as both\
      \ a threat (filling the sector and risking total reality collapse) and a potential\
      \ resource (providing the shuttlecraft needed to seal the fissure). Their presence\
      \ underscores the scale of the crisis and the urgency of the crew’s mission.\
      \ The organization’s influence is passive but critical, as it is their very\
      \ existence that drives the need for a solution.\n      "
    active_representation: Through the collective action of the parallel *Enterprises*,
