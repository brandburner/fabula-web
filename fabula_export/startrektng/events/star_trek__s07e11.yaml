  - object_uuid: ger_object_0d43083e35bc
    description_of_involvement: The *Enterprise*’s shields, Worf’s last line of defense,
      fail to activate in time. His order to raise them comes too late, as the Bajoran
      disruptor fire slams into the ship, crippling its power systems. The shields’
      failure exposes the crew to the full brunt of the attack, amplifying the damage
      and triggering the energy surge that destabilizes the quantum fissure. This
      object’s malfunction underscores the crew’s vulnerability in this fractured
      reality.
    status_before_event: Standby mode; Worf has not yet ordered them raised.
    status_after_event: Overwhelmed and ineffective; the Bajoran attack breaches the
      ship’s defenses, causing systemic damage.
    global_id: ger_object_0d43083e35bc
  - object_uuid: ger_object_fc237c6b912f
    description_of_involvement: The *Enterprise*’s tactical station is the nerve center
      of the crisis. Worf relieves Wesley to take command, tapping LCARS panels to
      raise shields—too late—as the Bajoran attack rocks the ship. The console’s alarms
      blare, and its screens display the incoming Bajoran warship’s readings, while
      Wesley’s earlier analysis of the quantum fissure is abruptly interrupted. The
      station’s failure to activate shields in time becomes a critical weakness, exposing
      the ship to the attack’s devastating power surge.
    status_before_event: Functional but under Wesley’s control; Worf is not yet at
      the station when the Bajoran ship is detected.
    status_after_event: Damaged and overwhelmed by the power surge; Worf’s attempt
      to raise shields fails, leaving the ship vulnerable.
    global_id: ger_object_fc237c6b912f
  - object_uuid: ger_object_84fc5da49ce0
