- fabula_uuid: cand_evt_scene_793d4cd81a7b0535_01
  global_id: null
  title: Worf asks Troi to become Alexander's SohchIm
  description: "\n  In a rare moment of vulnerability, Worf approaches Deanna Troi\
    \ in Ten Forward to discuss his concerns about Alexander’s upbringing. He acknowledges\
    \ the challenges of fatherhood and expresses gratitude for Troi’s influence on\
    \ his son, revealing that he has come to see her as a maternal figure. The conversation\
    \ takes a formal turn when Worf requests that Troi become Alexander’s *SohchIm*—a\
    \ Klingon surrogate mother—should anything happen to him. Troi, moved by the request,\
    \ accepts with warmth and humor, deepening their bond. The moment is abruptly\
    \ interrupted by Data’s summons to Engineering, leaving their emotional exchange\
    \ unresolved and underscoring Worf’s perpetual tension between personal and professional\
    \ duties.\n\n  This event serves as a pivotal character moment, revealing Worf’s\
    \ growing trust in Troi and his fear of leaving Alexander without a Klingon guardian.\
    \ It also highlights the fragility of his reality, as his request is rooted in\
    \ the existential uncertainty he faces due to the quantum anomaly. The interruption\
    \ by Data reinforces the narrative’s tension between Worf’s personal crisis and\
    \ his obligations to Starfleet, while Troi’s acceptance solidifies their relationship\
    \ beyond friendship.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e11
  scene_sequence: 5
  sequence_in_scene: 9
  key_dialogue:
  - 'WORF: Excuse me, Counselor. Do you have a moment?'
  - 'WORF: I have been meaning to speak with you... about Alexander. It has never
    been easy for me... having Alexander on board. I have always tried to be a good
    father... to give him guidance... but he seems to have his own mind about some
    things.'
  - 'WORF: I want you to be Alexander''s SohchIm. You would become his surrogate mother.
    In case anything ever happened to me, you would be responsible for him.'
  - 'TROI: Worf, I don''t know what to say. It''s a great honor. I accept.'
