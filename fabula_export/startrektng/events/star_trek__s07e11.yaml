- fabula_uuid: act_02358a2127b7dcb5
  number: 4
  summary: 'In Sickbay, Data scans Geordi''s deceased body and VISOR but finds no
    unusual readings. Upon activating the VISOR, Worf experiences another shift: he
    is now a Commander in a red uniform, Beverly Crusher is present instead of Ogawa,
    and Troi confirms they are still married. Data detects a quantum flux in Worf''s
    cellular RNA, indicating Worf''s quantum signature does not match that of their
    universe, suggesting he originates from a different reality. Reporting to Captain
    Riker (who now has four pips and replaced Picard, killed by the Borg), Worf explains
    the discontinuities began after his Bat''leth tournament. Riker, despite his own
    different memories (Picard''s death, no shuttle leaving), instructs Data to backtrack
    Worf''s remembered course. Wesley Crusher, now on the Bridge, discovers a quantum
    fissure—a ''keyhole'' intersecting many different quantum realities—along Worf''s
    return path. Data explains that Worf''s shuttlecraft, upon contact with the fissure,
    was thrown into a state of quantum flux, and Geordi''s VISOR intensified this
    effect, pushing Worf between realities. Wesley proposes scanning the fissure to
    locate Worf''s original quantum state. In his quarters, Worf and Troi discuss
    their relationship and children (Shannara and Eric-Christopher), revealing that
    Alexander does not exist in this reality, a deeply disturbing revelation for Worf.
    On the Bridge, while scanning the fissure, a Bajoran ship attacks, destabilizing
    the fissure and causing multiple Enterprises from other realities to appear on
    the viewscreen.'
