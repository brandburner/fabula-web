- fabula_uuid: cand_evt_scene_7fc6bfe93a7594e3_01
  global_id: null
  title: Worf rejects medical reality
  description: 'Worf sits in Sickbay after a Bat’leth tournament, where Beverly Crusher
    attempts to treat him for a concussion he insists he never suffered. When she
    recounts his earlier complaints—including a memory of losing the tournament due
    to a head injury—Worf reacts with visceral disbelief, insisting he *won* the competition.
    His refusal to accept her account exposes a critical fracture in his perception
    of reality, revealing that his memories are no longer reliable. The scene escalates
    from clinical concern to existential tension as Beverly’s medical certainty clashes
    with Worf’s absolute conviction, foreshadowing the quantum anomaly’s deeper corruption
    of his existence. His abrupt departure to ‘prove’ his victory underscores the
    urgency of his denial: if his own mind can’t be trusted, what else is unraveling?'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e11
  scene_sequence: 7
  sequence_in_scene: 13
  key_dialogue:
  - 'BEVERLY: Any nausea... or blurred vision?'
  - 'WORF: No. However, I did experience dizziness earlier today... at my birthday
    celebration.'
  - 'BEVERLY: It sounds like you''re having a few side-effects from the concussion.
    I''ll give you vertazine for the dizziness... but I want you to get some rest.'
  - 'WORF: Doctor... perhaps you are thinking of another patient. I have no concussion.'
  - 'BEVERLY: Worf... you came in here this morning complaining about a ringing in
    your ears. I scanned you... you had a concussion.'
  - 'WORF: No...'
  - 'BEVERLY: Temporary memory loss is common with this kind of injury... Do you remember
    telling me about the Bat''leth tournament? You said one of the competitors hit
    you in the head... that''s why you lost the match...'
  - 'WORF: I won that tournament. I can prove it to you.'
  is_flashback: false
  location_uuid: ger_location_49d2199d767f
  theme_uuids: []
  arc_uuids: []
  participations:
  - character_uuid: ger_agent_868446276ca7
    emotional_state: 'Righteously indignant, masking deep unease—his Klingon honor
      cannot tolerate the implication of weakness, but his gut tells him something
      is *wrong* with Beverly’s account. The emotional state is a volatile mix of
      defiance and creeping dread: if he didn’t lose, why does she insist he did?'
    goals:
    - Prove his victory in the Bat’leth tournament to reassert his honor and reality.
    - Reject Beverly’s medical authority to avoid acknowledging any perceived weakness
      or memory lapse.
    what_happened: Worf sits rigidly on the bio-bed, initially compliant as Beverly
      scans him, but his posture tightens as she mentions the concussion. His denial
      escalates from confusion to defiance when she recounts his lost tournament,
      his voice dropping into a growl as he insists he *won*. He physically recoils
      from the hypospray, steps off the bio-bed abruptly, and strides toward the door
      with military precision, his Klingon pride refusing to accept any vulnerability—especially
      one that contradicts his memory.
