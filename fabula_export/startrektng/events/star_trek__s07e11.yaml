  title: Cardassian surveillance exposed and Worf’s reality fractures
  description: "\n  In Engineering, Data and Geordi present evidence that the Argus\
    \ Array—a Federation surveillance network—has been covertly reprogrammed to monitor\
    \ key Federation sites, including Deep Space Five, Starbase 47, the Iadara Colony,\
    \ and the Utopia Planitia Shipyard. The logs reveal a Cardassian Galor-class warship\
    \ as the likely orchestrator, suggesting a deliberate breach of Federation security.\
    \ Picard orders Worf to scan for nearby Cardassian vessels, escalating tensions.\
    \ As Worf receives propulsion analysis data from Geordi, he suddenly experiences\
    \ a disorienting vertigo, triggering a quantum anomaly that alters his perception:\
    \ Data and Geordi abruptly shift positions across the room, and Picard vanishes\
    \ entirely. The scene underscores the dual threats facing the crew—an external\
    \ Cardassian conspiracy and an internal, destabilizing quantum fissure that is\
    \ already rewriting Worf’s reality in real time. The abrupt shift from professional\
    \ duty to personal crisis highlights Worf’s vulnerability and the anomaly’s escalating\
    \ threat.\n  "
