  - 'RIKER: Ever since the Bajorans overthrew the Cardassian Empire, they''ve been
    getting more and more aggressive. Yesterday they destroyed one of our subspace
    telescopes... they thought we were using it to spy on them.'
  - 'WESLEY: They''re charging their weapons, sir...'
  - 'WORF: Shields!'
  - 'WESLEY: Captain, they''ve damaged our power systems -- it''s caused an energy
    surge within the subspace pulse.... The quantum fissure is beginning to destabilize.'
  - 'RIKER: Can you disengage the pulse?'
  - 'WESLEY: Too late, sir.'
