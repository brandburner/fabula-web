  title: Worf's disorientation cripples tactical response
  description: 'Under Red Alert, Worf materializes on the bridge during a Cardassian
    attack but freezes at Tactical, unable to recognize the altered console configuration.
    Riker’s urgent command to raise shields goes unanswered as Worf’s confusion exposes
    his destabilizing quantum flux. The Enterprise takes direct hits while Picard
    and Riker exchange a silent, loaded glance—Worf’s failure isn’t just tactical
    incompetence, but a symptom of his unraveling identity. Riker seizes control,
    launching a decisive photon torpedo strike that destroys the Cardassian ship,
    but the damage is done: Worf’s inability to function in his own role underscores
    the existential threat to his reality. The scene pivots from combat to crisis,
    shifting focus from external conflict to Worf’s internal collapse.'
