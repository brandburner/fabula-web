    DATA: That is one possibility. However, the uncertainty principle dictates that time is a variable in this equation. You may end up several days before this event -- or several days after it. There is no way to tell.
  - 'WORF: ((quiet)) Goodbye, Deanna.'
  - 'RIKER: Good luck.'
