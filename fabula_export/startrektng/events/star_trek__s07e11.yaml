    been easy for me... having Alexander on board. I have always tried to be a good
    father... to give him guidance... but he seems to have his own mind about some
    things.'
  - 'WORF: Once, when I thought I was going to die... I asked you to watch over Alexander.
    I was wondering... if you might consider formalizing that arrangement. I want
    you to be Alexander''s SohchIm.'
