  scene_sequence: 4
  sequence_in_scene: 8
  key_dialogue:
  - 'DATA: The Array appears to be functioning normally, sir. The Array is still transmitting
    data. However, it is no longer sending that information to the Federation. It
    appears that someone has redirected its imaging systems.'
  - 'WORF: It is uninhabited. But there could easily be a ship, or a subspace relay
    station receiving the data.'
  - 'RIKER: Captain. I suggest we beam a repair crew aboard the Array. We can download
    the imaging logs—find out what the Array''s been observing for the past six days.'
  - 'PICARD: Make it so.'
