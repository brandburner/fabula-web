  global_id: null
  title: Geordi's death and Worf's quantum shift
  description: 'In sickbay, Worf and Data arrive to question Geordi La Forge about
    potential quantum anomalies, only to learn from Doctor Ogawa that Geordi has died
    from plasma burns. As Data conducts a forensic examination of Geordi''s body and
    VISOR, Worf experiences another reality-shifting episode triggered by the VISOR''s
    activation. The scene abruptly shifts: Ogawa vanishes, replaced by Beverly Crusher
    in her lab coat, and Worf finds himself in a red commander''s uniform with three
    pips, now the Enterprise''s first officer. Troi confirms they are married in this
    new reality, while Data detects a quantum flux in Worf''s cellular RNA, suggesting
    the VISOR may be a catalyst for the destabilizing quantum anomaly. The event underscores
    the multiversal crisis''s escalation, tying Geordi''s death to the parallel-universe
    threat while revealing Worf''s precarious existence across realities.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e11
  scene_sequence: 16
  sequence_in_scene: 32
  key_dialogue:
  - 'DATA: Doctor, is Geordi well enough to answer some questions?'
  - 'OGAWA: I''m afraid not, Data. Geordi''s dead.'
  - 'DATA: I see nothing that connects these bio-readings to your recent sense of
    discontinuity.'
  - 'OGAWA: What about his VISOR?'
  - 'DATA: Perhaps we should activate it.'
  - 'WORF: A moment ago, Doctor Crusher was not here. It was... Doctor Ogawa.'
  - 'WORF: And my uniform is different... what is my rank and position?'
  - 'TROI: You''re a Commander... and First Officer.'
  - 'WORF: (to Troi) Are we still married?'
  - 'TROI: Yes...'
  - 'DATA: (off tricorder, to Worf) I am detecting a quantum flux in your cellular
    RNA...'
