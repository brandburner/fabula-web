      depicted on the viewscreen. This external location is a silent but looming presence—an
      infinite expanse where the alternate *Enterprise* meets its end and where Worf
      now ventures. The fissure’s presence in deep space is implied through Data’s
      announcement and the visual destruction of the alternate ship, making the external
