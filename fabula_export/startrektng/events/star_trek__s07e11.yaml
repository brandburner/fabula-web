      action. He rushes to Tactical, shouldering Worf aside with a firm but not unkind
      gesture, and takes control of the console. His movements are precise and decisive
      as he fires the photon torpedoes, his voice steady despite the chaos. His glance
      at Picard is loaded with unspoken concern: *This isn’t like Worf.*'
    beliefs:
