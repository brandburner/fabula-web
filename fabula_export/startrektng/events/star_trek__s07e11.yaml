  title: Worf’s first reality fracture
  description: "\n  Worf experiences his first destabilizing perceptual shift while\
    \ analyzing Cardassian surveillance data in Engineering. After receiving propulsion\
    \ analysis from Geordi and scanning for nearby Cardassian ships, Worf is suddenly\
    \ struck by vertigo. When he recovers, he finds Data and Geordi inexplicably repositioned\
    \ across the room, with Picard vanished entirely. The disorientation marks the\
    \ first overt manifestation of the quantum anomaly’s effects on his reality, signaling\
    \ that the crisis is no longer theoretical but actively unraveling his perception.\
    \ Geordi’s medical concern—‘Worf, you don’t look so good. Maybe you should go\
    \ to Sickbay’—underscores the urgency of the situation, while Worf’s compliance\
    \ (‘Yes... perhaps I will’) reveals his growing unease. The scene bridges the\
    \ Cardassian conspiracy subplot with the quantum anomaly’s existential threat,\
    \ forcing Worf to confront the fragility of his own reality.\n  "
