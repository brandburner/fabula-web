- fabula_uuid: cand_evt_scene_d33fcd879d859a90_01
  global_id: null
  title: Picard demands forensic contract review
  description: 'In the Athenum Vault, Ardra unveils the ancient Ventaxian contract
    as proof of her divine authority to enslave the population, framing it as a mutually
    beneficial agreement from a thousand years prior. Picard immediately challenges
    her narrative, insisting Data conduct a forensic analysis of the scrolls to verify
    their authenticity. Ardra initially resists but ultimately concedes, revealing
    her enjoyment of the confrontation. When Picard mentions Federation hostages,
    Ardra’s composure fractures—she angrily orders their release, exposing her vulnerability
    to emotional provocation. The exchange establishes Picard’s skepticism as a direct
    threat to Ardra’s control, while Data’s forensic review becomes the critical next
    step in exposing her fraud. The scene ends with Picard securing the hostages’
    freedom and leaving Data behind to analyze the contract, setting up the arbitration
    that will determine Ventax Two’s fate. The power dynamic shifts subtly: Ardra’s
    authority is no longer unquestioned, and Picard’s strategic defiance forces her
    into a reactive position.'
