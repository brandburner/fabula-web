    Ardra’s supernatural-seeming power, the crew’s helplessness, and Picard’s growing
    frustration as conventional measures fail to contain her. Her final disappearance
    leaves the confused Ensign in her place, reinforcing the crew’s vulnerability
    and the futility of direct confrontation.
