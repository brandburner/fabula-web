    that the hostages are released... Now!'
  - 'ARDRA: Let us not cloud this with bit players, Picard. You will not leave because
    you find me irresistible.'
  - 'PICARD: Enterprise, advise Doctor Clark that the hostages are being released...
    Goodness... had nothing to do with it.'
