- fabula_uuid: act_142dd63d05946935
  number: 4
  summary: 'Act Four opens with Picard and Data stranded on Ventax Two, unable to
    locate the vanished Enterprise. Data reports the ship is nowhere within a lightyear,
    but Geordi detects a sudden spike in Z particle readings, suggesting a hidden
    power source linked to the disappearance. Ardra appears, gloating over the Enterprise''s
    absence, but Picard, seizing on Data''s legal discovery, challenges her to an
    arbitration, accusing her of being a fraud. Ardra initially resists, claiming
    she has nothing to gain, but Picard offers the location of the Zaterl Emerald
    as an incentive. Ardra rejects the jewel, instead demanding Picard himself as
    her prize: his heart, mind, and soul, freely given. Picard, despite the extreme
    personal cost, agrees to her terms. Ardra chooses Data as the arbiter, citing
    his impartiality as an android, a choice Picard reluctantly accepts, recognizing
    Data''s inability to feel fear makes him uniquely suited to resist Ardra''s intimidation.
    The arbitration begins, with Ardra presenting historical evidence and Jared''s
    testimony to support her claim, which Data, adhering strictly to Ventaxian law,
    largely upholds, overruling Picard''s objections. Ardra then directly questions
    Picard, demonstrating her ''powers''—a tremor, making Picard disappear and reappear,
    and transforming into a demonic figure—leaving Picard unable to explain them.
    Ardra rests her case, confident in her victory, as Picard faces overwhelming odds.'
  key_moments: []
  scene_numbers:
  - 17
  - 18
  - 19
  - 20
- fabula_uuid: act_94fec1f974b62b0c
  number: 5
  summary: Act Five brings the climax and resolution of the conflict. Geordi and Dr.
    Clark successfully trace the Z particle source to a cloaked ship in orbit, confirming
    Picard's suspicion of technological deception. In the arbitration, Picard skillfully
    cross-examines Jared, revealing that the Ventaxians achieved their peace and prosperity
    through their own hard work, courage, and societal reforms, not through Ardra's
    direct intervention. Ardra attempts to object, but Data allows Picard to continue,
    leading Jared to admit that Ardra had left Ventax Two before the environmental
    reforms even began. With Geordi's timely arrival, Picard calls for a recess and
    learns about the cloaked ship and that the Enterprise is merely cloaked and its
    systems jammed. Picard, now armed with the truth, returns to the arbitration.
    He dramatically demonstrates Ardra's 'magic' himself, replicating her tremors,
    disappearances, and transformations (including becoming Fek'lhr) with the Enterprise
    crew's assistance, exposing them as technologically based illusions. Picard reveals
    Ardra's cloaked ship, her centuries-old implant technology for activating illusions,
    and her history of using twenty-three aliases to deceive innocent people for petty
    schemes. Ardra, her deception exposed, attempts to withdraw and release the Ventaxians
    from their contract, but Jared, now empowered, has her apprehended by sentries.
    Data officially dissolves the contract, and Picard reflects that the Ventaxians
    saved themselves, long ago. Ardra is led away, defeated, but not without a final,
    taunting remark to Picard.
