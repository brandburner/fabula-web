  title: Ardra claims the Enterprise through contract
  description: Ardra escalates her power play on the *Enterprise* bridge by first
    occupying Picard’s chair and then demonstrating her ability to bypass security
    measures—first with a forcefield that repels Worf, then by seamlessly assuming
    the identity of an ensign at Ops. When Picard orders her removal via transporter,
    she reappears in disguise, mocking the crew’s attempts to contain her. The tension
    peaks when Data confirms the Ventaxian contract’s legal validity, granting Ardra
    ownership of the *Enterprise* and its crew. Her smug declaration—‘the Enterprise
    belongs to me now’—undercuts Picard’s authority and forces the crew into a crisis
    of compliance versus resistance. The scene pivots from physical confrontation
    to legal surrender, with Ardra’s technological superiority and Data’s impartial
    analysis framing the crew’s vulnerability. The moment also exposes the crew’s
    reliance on Starfleet protocols, which Ardra exploits with theatrical precision,
    leaving Picard with no immediate recourse but to record his defiance in a private
    log (a beat that follows).
