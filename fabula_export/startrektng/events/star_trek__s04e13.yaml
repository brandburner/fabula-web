  object_involvements:
  - object_uuid: ger_object_672d9c4e2388
    description_of_involvement: The Ventaxian contract scrolls are referenced by Ardra
      as legal proof of her claim to the *Enterprise*. Data confirms their validity,
      revealing that the contract grants her ownership of the planet, its atmosphere,
      and anything in orbit—including the *Enterprise* itself. The scrolls serve as
      a weapon in Ardra’s psychological and legal domination, forcing the crew to
      confront the reality of her power and the potential loss of their ship.
    status_before_event: Stored in the *Enterprise*’s vault, awaiting Data’s analysis.
    status_after_event: Confirmed as legally valid, with Ardra using them to assert
      her claim to the *Enterprise*.
    global_id: ger_object_672d9c4e2388
  - object_uuid: ger_object_9cb5edee61ff
    description_of_involvement: Ardra’s blue forcefield activates around her as she
      sits in Picard’s chair, effortlessly repelling Worf’s physical attack. The forcefield
      demonstrates her invulnerability and technological superiority, leaving the
      crew stunned and unable to counter her. It is a tangible manifestation of her
      power, reinforcing her dominance and the futility of direct confrontation. The
      forcefield disappears as suddenly as it appeared, allowing Ardra to taunt Picard
      before vanishing.
    status_before_event: Inactive, latent within Ardra’s advanced technology.
    status_after_event: Activated to repel Worf, then deactivated, leaving no trace
      of its presence.
    global_id: ger_object_9cb5edee61ff
  - object_uuid: ger_object_6136cf22bffb
    description_of_involvement: Ardra materializes wearing a standard Starfleet ensign
      uniform, complete with a red Ops division shirt and black pants, perfectly mimicking
      a crewmember. She uses the disguise to infiltrate the Ops station, taunting
      Picard directly before vanishing. The uniform serves as a tool of deception,
      allowing her to breach the crew’s defenses and expose their vulnerability to
      infiltration. The real Ensign is left confused and disoriented in her place,
      highlighting the ease with which Ardra can manipulate the crew.
    status_before_event: Stored in the *Enterprise*’s uniform inventory, unused.
    status_after_event: Worn by Ardra as a disguise, then discarded as she vanishes,
      leaving the real Ensign in her place.
    global_id: ger_object_6136cf22bffb
