  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: 'Starfleet is the institutional backbone of Picard
      and Data''s debate, though its presence is largely implied rather than explicit.
      The *Enterprise*''s databases, legal archives, and operational protocols are
      extensions of Starfleet''s resources, providing the empirical tools they use
