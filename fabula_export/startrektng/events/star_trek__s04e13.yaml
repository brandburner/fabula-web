  title: Ardra retaliates with supernatural vanishing
  description: Ardra invades Picard’s quarters while he sleeps, using illusory blue
    light and wind effects to stage a seductive confrontation. When Picard rejects
    her repeated transformations—from a veiled temptress to a prim woman to a Troi-like
    figure—she escalates her threat, declaring he will regret his dismissal. In a
    final act of supernatural aggression, she vanishes him from his quarters with
    a wave of her arm, demonstrating her escalating control and setting up his forced
    relocation to the science station. The scene underscores Ardra’s desperation,
    her reliance on illusion, and the growing stakes of her Ventaxian contract scheme.
    Picard’s unshaken resolve contrasts with her unraveling composure, marking a turning
    point in their power struggle.
