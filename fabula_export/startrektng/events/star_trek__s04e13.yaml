    system. Look for a ship or a base of operations -- anything large enough to generate
    that power... Mister La Forge, accompany Doctor Clark back to the science station...
    see if you can trace the origin of the tremors...'
  - 'COM VOICE: Security to Bridge. Intruder on board.'
