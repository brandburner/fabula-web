      station serves as the last line of defense against the mob’s assault and a critical
      link to the *Enterprise*.
    symbolic_significance: Represents the fragile barrier between order and chaos,
      as well as the vulnerability of scientific inquiry in the face of superstition
      and mass hysteria.
    access_restrictions: Heavily guarded by the mob; access is restricted to those
      inside the station, who are under siege and fighting for survival.
