  title: Picard challenges Ardra to arbitration
  description: 'After Data confirms the *Enterprise* has vanished—an act Ardra dismisses
    as trivial—Picard escalates their confrontation by invoking Ventaxian legal precedent
    to demand formal arbitration. His calculated risk forces Ardra to either expose
    her fraudulent claims or accept a structured confrontation where her authority
    can be dismantled. Ardra counters by naming Data as the neutral arbiter, exploiting
    his android nature to ensure impartiality, while Picard—desperate to regain control—accepts
    her escalating terms: if she wins, she claims not just his body but his heart,
    mind, and soul. The exchange reveals Picard’s strategic mind and Ardra’s ruthless
    confidence, setting the stage for a high-stakes trial where deception and truth
    will collide. Geordi’s earlier discovery of Z-particle anomalies hints at Ardra’s
    technological deception, but the focus remains on the psychological and legal
    battle unfolding between the two adversaries.'
