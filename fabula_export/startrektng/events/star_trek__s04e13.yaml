  key_dialogue:
  - 'DATA: Perhaps because the technique requires an actor to seek his own emotional
    awareness to understand the character he plays...'
  - 'PICARD: But that would seem an impossible task for you, Data.'
  - 'DATA: I have modified the method for my own use, sir. Since I have no emotional
    awareness to create a performance, I am attempting to use performance to create
    an emotional awareness. I believe if I can learn to duplicate the fear of Ebenezer
    Scrooge, then I will be one step closer to being truly human.'
  - 'PICARD: The moment you decided to stop imitating other actors and to create your
    own interpretation... you were already one step closer to being truly human.'
