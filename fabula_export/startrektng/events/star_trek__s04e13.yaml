  title: Ardra taunts Picard with invincibility
  description: Ardra, seated in Picard’s command chair, escalates her psychological
    dominance by effortlessly deflecting Worf’s physical attack with a forcefield,
    then vanishing and reappearing as an Ensign at Ops—demonstrating her ability to
    infiltrate the ship’s systems and mock Picard’s authority. When Picard orders
    her removal via transporter, she reappears in disguise, taunting the crew with
    her invulnerability and forcing Data to confirm the legal validity of the Ventaxian
    contract, which grants her ownership of the *Enterprise*. The scene underscores
    Ardra’s supernatural-seeming power, the crew’s helplessness, and Picard’s growing
    frustration as conventional measures fail to contain her. Her final disappearance
    leaves the confused Ensign in her place, reinforcing the crew’s vulnerability
    and the futility of direct confrontation.
