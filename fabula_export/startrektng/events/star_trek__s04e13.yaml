      and technological measures. However, their efforts are undermined by Ardra’s
      superior technology, legal maneuvering, and psychological dominance. The crew’s
      frustration and helplessness reflect Starfleet’s institutional limitations when
      faced with a threat that exploits both superstition and legal loopholes. The
      organization’s authority is challenged, and its systems are exposed as vulnerable
      to infiltration.
