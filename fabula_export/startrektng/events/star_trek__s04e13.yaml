  global_id: null
  title: Enterprise intercepts Ventax Two distress call
  description: "\n  The *Enterprise* bridge crew receives a frantic, degraded transmission\
    \ from Dr. Howard Clark at the Ventax Two science station, where a mob is violently\
    \ assaulting the facility. Clark’s panicked report reveals the planet is gripped\
    \ by mass hysteria—its population convinced their world will end the next day.\
    \ The signal cuts in and out as the mob’s pounding grows louder, forcing Picard\
    \ to order an immediate course change to Ventax Two. The urgency of the crisis\
    \ interrupts Data’s earlier emotional experiment, shifting the crew’s focus to\
    \ Ardra’s escalating influence and the looming deadline of the ancient contract.\
    \ The scene establishes the stakes: Picard must act swiftly to prevent planetary\
    \ enslavement, while the crew’s reactions (Worf’s tactical focus, Riker’s operational\
    \ coordination) underscore the mission’s gravity.\n  "
