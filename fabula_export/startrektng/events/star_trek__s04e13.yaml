    description_of_involvement: Ardra invokes the ancient contract as proof of her
      claim to Ventax II, though she withholds it from Picard’s request. The contract’s
      unseen presence looms over the confrontation, serving as her ultimate legal
      leverage. Its absence forces Picard to challenge her authority without concrete
      evidence, while Ardra uses its existence to assert her dominion. The contract
      symbolizes the Ventaxians’ ancient fear and Jared’s unyielding belief in its
      binding power, making it a silent but potent weapon in her psychological arsenal.
    status_before_event: Unknown (assumed to be in Ardra’s possession or stored securely).
