    description_of_involvement: The *Enterprise* transporter system is ordered by
      Picard to lock onto Ardra and beam her to the planet surface, but she evades
      the lock and reappears on the bridge in disguise. The failure exposes the system’s
      vulnerability to interference from superior technology, reinforcing Ardra’s
      ability to infiltrate and manipulate the crew. The transporter’s inability to
