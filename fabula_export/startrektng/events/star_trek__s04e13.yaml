- fabula_uuid: cand_evt_scene_64147745d6b0ac83_01
  global_id: null
  title: Time fracture reveals Ardra’s power
  description: "\n  The Ventaxian landscape undergoes a sudden, violent temporal distortion—time\
    \ fractures visibly, with the sky splitting into overlapping layers of past and\
    \ present. The effect is localized but catastrophic: buildings flicker between\
    \ states of decay and reconstruction, vegetation withers and regrows in seconds,\
    \ and the air hums with an unnatural energy. The Ventaxians react with terror,\
    \ some falling to their knees in prayer while others flee in panic. Picard and\
    \ his away team (Troi, Worf, and Data) stand transfixed, their tricorders useless\
    \ against the phenomenon. The distortion centers around Ardra, who remains eerily\
    \ calm, her presence seemingly the epicenter of the disruption. The event forces\
    \ Picard to confront the possibility that Ardra’s claims of divine power are not\
    \ mere deception but rooted in a force beyond his understanding. The temporal\
    \ fracture serves as a tangible demonstration of her influence, escalating the\
    \ stakes and making her threat of enslavement feel imminent and supernatural.\
    \ The crew’s attempts to communicate with the *Enterprise* fail, isolating them\
    \ further and heightening the tension. The distortion lasts only moments but leaves\
    \ an indelible mark on the team’s confidence, as even Data’s analytical detachment\
    \ is momentarily shaken by the inexplicable nature of the event.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e13
  scene_sequence: 23
  sequence_in_scene: 43
  key_dialogue:
  - 'PICARD: (to the team, voice tight with controlled urgency) "Report! What is happening?"'
  - 'TROI: (breathless, eyes wide) "I can’t read anything—it’s like the emotions are
    being torn apart with time itself."'
  - 'WORF: (growling, gripping his phaser) "This is no natural phenomenon. It is *her*
    doing."'
  - 'ARDRA: (smiling faintly, voice cutting through the chaos) "You see now, Captain?
    The contract is not a myth. The past does not forgive."'
