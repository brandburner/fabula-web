      to protocol, such as the use of communicators for emergency extraction and the
      decision to beam down to Ventax II to recover the hostages. Starfleet''s values
      are also challenged by the irrational nature of the crisis, as the crew struggles
      to reconcile their rational approach with the Ventaxians'' supernatural beliefs.'
