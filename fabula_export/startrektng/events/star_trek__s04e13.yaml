  - object_uuid: ger_object_6ecdef60b2de
    description_of_involvement: The primary viewscreen on the *Enterprise* bridge
      serves as the critical link between the crew and the chaos unfolding on Ventax
      II. It initially displays a starfield before shifting to the degraded transmission
      from Dr. Clark’s science station. The viewscreen’s instability—plagued by static,
      intermittent blackouts, and a fuzzy image—mirrors the desperation of the situation.
      The ominous sounds of pounding and mob violence in the background further emphasize
      the urgency of the crisis. Picard and the crew rely on the viewscreen to gather
      information and make critical decisions, making it an indispensable tool for
      their response.
    status_before_event: Displaying a starfield; functioning normally before the emergency
      transmission is received.
    status_after_event: Displaying a degraded, intermittent transmission from Ventax
      II; the signal is lost permanently at the end of the event, leaving the crew
      with a sense of urgency and the need for immediate action.
