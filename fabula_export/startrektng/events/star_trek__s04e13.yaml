    description_of_involvement: Starfleet is the institutional backbone of this event,
      its influence felt through Picard’s leadership, Riker’s com, and the *Enterprise*’s
      operational protocols. Though not explicitly named in the dialogue, Starfleet’s
      presence is embodied in Picard’s methodical approach to the crisis—gathering
      information, assessing threats, and preparing to act. The organization’s values
      (reason, diplomacy, protection of life) are on full display, particularly in
      Picard’s skepticism of Ardra’s claims and his urgency to counter Jared’s fanaticism.
      Starfleet’s role here is to provide the framework for rational response, a counterbalance
      to the irrational forces at play on Ventax II.
    active_representation: Through Picard’s leadership and Riker’s com, which relay
      Starfleet’s protocols and priorities. The *Enterprise*’s crew operates under
      Starfleet’s chain of command, ensuring that responses to the crisis are coordinated
      and ethical.
    power_dynamics: Exercising authority over the situation, but constrained by the
      need to respect Ventaxian sovereignty and the limitations of their technological
      interference. Starfleet’s power is intellectual and operational, not coercive.
    organizational_goals:
