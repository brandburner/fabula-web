  key_dialogue:
  - 'PICARD: What have you done with my ship, Ardra?'
  - 'ARDRA: I''ve done nothing with your ship. My ship is safely in my possession.'
  - 'PICARD: I do not recognize your claim on the Enterprise or on this world for
    that matter... and in accordance with Ventaxian legal precedent I call for an
    arbitration...'
  - 'ARDRA: I want your heart, your mind, your soul... And I want you to give them
    to me without resistance, of your own free will.'
  - 'PICARD: I agree to your terms.'
