  - location_uuid: ger_location_5dd3c4629b05
    description_of_involvement: 'The *USS Enterprise in Orbit Around Ventax II* serves
      as the distant but ever-present backdrop to this debate. While the ready room
      is the immediate setting, the ship''s steady orbit above Ventaxia symbolizes
      Starfleet''s role as an external force of logic and order in a crisis fueled
