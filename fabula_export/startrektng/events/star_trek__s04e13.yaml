      protocols also create constraints: Picard must act within the bounds of diplomacy
      and legal scrutiny, even as he grapples with the supernatural.'
    active_representation: Through institutional protocols (e.g., legal research,
      sensor scans) and Picard's command authority (as a Starfleet captain). Starfleet's
      influence is also reflected in Data's role as a synthetic officer, whose empirical
