    global_id: ger_object_bc8f290fd4c2
  - object_uuid: ger_object_ac397fff619d
    description_of_involvement: Ardra summons a massive holographic projection of
      Fek’lhr, a Klingon demon from Gre’thor, using a twisting energy effect. The
      projection materializes abruptly, towering over the group and silencing Worf’s
      skepticism. The hologram serves as a supernatural intimidation tactic, exploiting
      Klingon cultural lore to unsettle Worf and demonstrate Ardra’s ability to manifest
      as different mythic figures. Its brief appearance forces the crew into a reactive
      stance, exposing their lack of leverage against her technological and psychological
      dominance.
