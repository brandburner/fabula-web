- fabula_uuid: cand_evt_scene_d9b21e5c0b344453_01
  global_id: null
  title: Picard fails to rescue trapped science team
  description: 'The Enterprise receives a desperate, fragmented transmission from
    Dr. Clark at the Ventax Two science station, where a violent mob has breached
    the facility. The visual feed is chaotic—smoke, noise, and panic dominate as Clark
    screams for help. Picard immediately orders an emergency beam-out, but the transporter
    officer can only lock onto Clark’s signal, leaving the rest of the team trapped.
