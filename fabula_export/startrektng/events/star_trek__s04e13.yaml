  key_dialogue:
  - 'ARDRA: A longwinded description of a very simple business arrangement. I did
    away with their wars, famine, and economic ruin, and provided them a thousand
    years of paradise. My terms were clearly stated. They went into this with their
    eyes open. I''m sure you''ll find everything is in order...'
  - 'PICARD: I only remain here to secure the release of Federation hostages.'
