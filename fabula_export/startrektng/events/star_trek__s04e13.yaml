  key_dialogue:
  - |-
    PICARD: Did Ardra simply snap her fingers, transforming Ventax Two into paradise?
    JARED: The changes occurred gradually, over a long period of time.
    PICARD: Did she personally form the government that has peacefully ruled Ventax Two for a millennium?
    JARED: No, historical records indicate a council was convened to assess our options.
  - |-
    ARDRA: Is there any doubt in your mind, any doubt at all, that if I had not intervened, the terrible conditions here would have continued?
    JARED: No doubt at all.
    ARDRA: Then, as 'former' head of state for the Ventaxian people, you are satisfied that I fulfilled my part of the bargain.
    JARED: ((head down, defeated)) Yes, Ardra.
  - |-
    PICARD: Mister La Forge, my reputation as a litigator, not to mention my soul, is in serious jeopardy...
    GEORDI: Well, whatever's been going on over here gave us exactly what we needed...
    PICARD: You've identified her source of power... ?
    GEORDI: ((nods)) It's a cloaked ship...
