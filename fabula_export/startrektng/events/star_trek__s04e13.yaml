    my people..."'
  - 'JARED: "There is more. For several nights there have been visions of Ardra...
    again, just as the contract said would occur before her return. She has appeared.
    I myself have seen her."'
  - 'TROI: "This situation is deteriorating, Captain... people are approaching levels
    of anxiety that could lead to suicide..."'
  - 'DATA: "She is a cornerstone of Ventaxian theology. It seems that Ardra came to
    Ventax Two and promised one thousand years of peace and prosperity. As her price,
    she would return and enslave the entire population."'
