      demands.
    - Avoid provoking Ardra’s wrath, as Jared believes it would lead to catastrophic
      consequences for the population.
    influence_mechanisms:
    - Through Jared’s role as a figurehead, enforcing Ardra’s orders and maintaining
      the illusion of governmental authority.
    - By leveraging the Ventaxians’ fear and superstition to ensure compliance with
      Ardra’s wishes.
    - Via the government’s historical contract with Ardra, which is used to justify
      her current demands.
    institutional_impact: The Ventaxian Government’s involvement in this event highlights
      its inability to resist Ardra’s influence, reinforcing the need for external
      intervention (e.g., Picard and the Federation) to free the population from her
      control. The organization’s complicity in Ardra’s manipulation also raises questions
      about its legitimacy and the Ventaxians’ future under her rule.
    internal_dynamics: The government is deeply divided between its historical contract
      with Ardra and the immediate threat she poses to its people. Jared’s fear and
