  global_id: null
  title: Ardra's legal legitimacy confirmed through Jared's testimony
  description: "\n  In a Ventaxian arbitration hearing, Ardra systematically dismantles\
    \ Picard’s skepticism by interrogating Jared, the planetary leader, under Data’s\
    \ impartial oversight. Jared testifies to the planet’s dire state a thousand years\
    \ prior—overcrowded, polluted, and on the brink of collapse—before Ardra’s arrival,\
    \ which he attributes to her divine intervention. When Picard objects to Jared’s\
    \ lack of firsthand knowledge, Data overrules him, citing Ventaxian law’s allowance\
    \ for historical testimony. Ardra then extracts Jared’s confirmation of the contract’s\
    \ terms: a thousand years of peace in exchange for eventual surrender to her.\
    \ Picard’s objections are repeatedly dismissed, and Data upholds the legal validity\
    \ of Ardra’s claims, forcing Picard into a defensive position. The power dynamic\
    \ shifts irrevocably as Ardra’s authority is cemented, raising the stakes for\
    \ Picard’s mission to expose her as a fraud. The scene culminates in Ardra’s theatrical\
    \ display of supernatural power—earthquakes, teleportation, and a demonic transformation—leaving\
    \ Picard unable to refute her, further solidifying her dominance over the negotiation.\
    \ This moment marks a turning point, as Ardra’s legal standing becomes unassailable,\
    \ compelling Picard to adapt his strategy or risk losing the arbitration entirely.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e13
  scene_sequence: 20
  sequence_in_scene: 38
  key_dialogue:
  - 'ARDRA: Could you describe the state of your planet when I first visited a thousand
    years ago?'
  - 'JARED: A thousand years ago our planet was dying. Overcrowded and dangerous city-states
    warred unceasingly with each other. The air and water were polluted with industrial
    waste. There was a constant threat of starvation and epidemic.'
  - 'ARDRA: And then what happened? JARED: And then you came.'
  - 'ARDRA: Your honor, I submit I have established my identity as stated by the contract.'
  - 'DATA: Captain Picard, my interpretation of Ventaxian law suggests under these
    circumstances, this is acceptable... your objection is overruled.'
  - 'ARDRA: You don’t believe my powers are real, do you. PICARD: No, I don’t.'
  - 'ARDRA: Then, sir, may I ask you to explain... this... (waves hand, causing a
    tremor)'
  - 'ARDRA/DEVIL: Can you explain it, Picard?'
  - 'ARDRA: Yes or no, can you explain any of this? PICARD: No.'
  - 'ARDRA: I rest my case, your honor.'
