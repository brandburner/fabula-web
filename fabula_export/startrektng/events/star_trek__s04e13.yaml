  - object_uuid: ger_object_bc8f290fd4c2
    description_of_involvement: Ardra produces the census scroll with a magician’s
      flourish, unfurling it to reveal guidelines for a Ventaxian population census
      emphasizing productivity and economic forecasts. The scroll serves as a bureaucratic
      tool to intimidate Jared and the Ventaxians, framing her tyranny as a mundane
      administrative obligation. Picard blocks her path, demanding her attention,
      and the scroll becomes a symbol of her blend of corporate and supernatural authority.
      Its appearance shifts the dynamic from supernatural threat to legalistic coercion,
      underscoring Ardra’s hybrid approach to domination.
    status_before_event: Unknown (assumed to be in Ardra’s possession or generated
