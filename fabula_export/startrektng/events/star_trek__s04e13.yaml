  title: Ardra demands Picard’s soul
  description: 'Picard, desperate to expose Ardra’s fraudulent claims, escalates their
    confrontation by demanding formal arbitration under Ventaxian law. Ardra counters
    by accepting—but only if Picard stakes his *heart, mind, and soul* as the prize,
    forcing him to gamble his autonomy against her supernatural bluff. When Picard
    agrees, Ardra seizes the opportunity to exploit his trust in Data, naming the
    android as the impartial arbiter. Data, however, privately warns Picard that his
    logic-driven judgment may not favor him, revealing the high stakes of the gamble:
    Picard’s principles could become his undoing. The scene pivots from scientific
    investigation to a high-stakes psychological duel, where Ardra’s power lies not
    in her technology but in her ability to weaponize Picard’s own moral code against
    him. The moment marks a turning point—Picard’s calculated risk now hinges on Data’s
    neutrality, a wildcard that could either dismantle Ardra’s authority or expose
    Picard’s vulnerability to her manipulations.'
