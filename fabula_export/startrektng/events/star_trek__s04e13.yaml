  title: Picard orders failed emergency beam-out
  description: The Enterprise bridge receives a desperate distress call from Dr. Clark
    at the collapsing Ventax Two science station, where a mob has breached the facility.
    Picard immediately orders an emergency beam-out, but the transporter officer struggles
    to lock onto the team amid the chaos. The failed rescue attempt leaves Dr. Clark
    and her staff stranded, heightening the stakes of Ardra’s influence and forcing
    Picard to confront the limits of his control. The scene underscores the urgency
    of the crisis—both the physical threat to the science team and the looming supernatural
    contract—while exposing the crew’s vulnerability in the face of Ardra’s escalating
    power. Picard’s decisive yet frustrated command reveals his leadership under pressure,
    as the failure forces him to pivot to alternative strategies (e.g., interrogating
    Dr. Clark) while Ardra’s unseen presence looms over the unfolding disaster.
