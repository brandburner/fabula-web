      of Ardra’s return, allowing her to manipulate the population. Picard and Data’s
      efforts to uncover legal loopholes in the contract are aimed at empowering the
      Ventaxians to reclaim their agency, thereby weakening Ardra’s influence over
      their governance. The organization’s internal dynamics—its constitution, council,
      and legal precedents—are the very tools Picard and Data seek to use against
      Ardra.
