      in the episode (due to magnetic interference) foreshadows the challenges the
      away team may encounter, but in this moment, they represent a lifeline and a
      reminder of the crew's preparedness.
    status_before_event: Assigned to Picard, Data, Worf, and other away team members,
      fully operational and locked onto the *Enterprise*'s transporter systems.
    status_after_event: The communicators remain operational for now, but their reliability
