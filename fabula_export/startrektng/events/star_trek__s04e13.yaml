  - organization_uuid: ger_organization_07e4cf0e74ac
    description_of_involvement: 'The *Ventaxian Government* is the absent but looming
      entity in this debate, its fate hanging in the balance of Picard and Data''s
      exchange. The government''s current leader, Acost Jared, and its council are
      not present, but their plight is the catalyst for the entire crisis: Ardra''s
      contract threatens to overturn a thousand years of Ventaxian self-rule. Picard
      and Data''s debate is, in many ways, a proxy for the Ventaxian Government''s
      dilemma—do they submit to Ardra''s demands, or do they resist with the help
      of Starfleet? The government''s legal precedents and constitutional framework
      are the tools Picard tasks Data with analyzing, framing the organization as
      both a victim and a potential ally in the fight against superstition. Their
      collective fear of Ardra''s return is the emotional undercurrent of the scene,
      driving the urgency of Picard''s mission.'
    active_representation: 'Through their legal and historical records (e.g., the
      Contract of Ardra, Ventaxian precedents) and their collective fear of Ardra''s
      return (implied in Picard''s analysis). The Ventaxian Government is also represented
      by the stakes of the debate: if Picard fails, their autonomy will be lost.'
    power_dynamics: 'The Ventaxian Government is in a position of vulnerability, its
      power undermined by Ardra''s contract and the latent fear of its people. Picard
