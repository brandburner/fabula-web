  - 2
  - 3
  - 4
- fabula_uuid: act_c95e367de39c6eb9
  number: 1
  summary: 'Act One begins with the Enterprise arriving in orbit around Ventax Two,
    attempting to re-establish contact with the science station. The situation on
    the planet has severely deteriorated, with the station under siege by a frantic
    mob. Captain Picard orders Dr. Clark beamed aboard, narrowly rescuing him as the
    station''s door collapses. In Picard''s ready room, Dr. Clark explains Ventax
    Two''s history: an ancient, technologically advanced society that reverted to
    an agrarian lifestyle a millennium ago, now gripped by a legend. He reveals that
    Ardra, a figure from their past, is believed to be the devil returning to enslave
    the population after a thousand-year contract of peace. Picard learns that Ventaxian
    leader Acost Jared is obsessed with Ardra''s return, citing prophecies of geological
    tremors and visions, which have reportedly occurred. Despite Worf''s warnings
    about the danger, Picard decides to beam down to the planet with Data, Worf, and
    Troi to investigate and secure the release of Federation hostages. Upon their
    arrival in the Atheneum, a significant tremor strikes, and a blinding light appears,
    fading to reveal Ardra, a stunning woman who declares, ''Time''s up,'' solidifying
    the Ventaxians'' fears and directly confronting Picard.'
  key_moments: []
  scene_numbers:
  - 5
  - 6
  - 7
  - 8
- fabula_uuid: act_37d509f0b6e459b3
  number: 2
  summary: 'Act Two sees Ardra asserting her dominion over Ventax Two, treating the
    Ventaxians as her property and demanding an accounting of their accumulated resources.
    She dismisses their cowering and ancient customs, revealing a pragmatic, almost
    business-like demeanor. Picard immediately challenges her, questioning her identity
    and intentions, but Ardra responds with playful taunts and displays of seemingly
    supernatural power, such as conjuring a scroll and briefly transforming into the
    Klingon figure Fek''lhr. Picard remains skeptical, suspecting technological trickery,
    and demands to see the ancient contract. Data meticulously examines the scrolls
    and confirms the contract''s existence and its legally binding terms. Ardra, in
    a show of authority, orders the release of the Federation hostages, further demonstrating
    her control. Back on the Enterprise, Picard and his crew analyze Ardra''s ''powers,''
    concluding they are likely illusions created by advanced technology, such as transporters,
    holographic projections, and low-frequency tractor beams. However, Ardra escalates
    the conflict by infiltrating the Enterprise bridge, demonstrating a forcefield
    against Worf and appearing at the Ops station in an Ensign''s uniform. Data then
    delivers a devastating report: the contract''s language can be interpreted to
    grant Ardra ownership of anything on or in orbit around Ventax Two, including
    the Enterprise itself, leaving Picard in a precarious and deeply compromised position.'
  key_moments: []
  scene_numbers:
  - 9
  - 10
  - 11
  - 12
- fabula_uuid: act_a94086424f5ee5e4
  number: 3
  summary: In Act Three, Captain Picard, determined to expose Ardra as a fraud, delves
    into the study of confidence games, believing her to be a master con artist. He
    theorizes that the original 'Ardra contract' may have been a clever motivational
    tool used by a past Ventaxian leader to inspire societal change, rather than a
    genuine pact with a supernatural entity. Data, while acknowledging the Ventaxians'
    thousand years of peace, points out that the spirits in Scrooge's story were real,
    subtly questioning Picard's certainty. Ardra then invades Picard's private quarters,
    taunting him with seductive illusions, transforming into various 'ideal women,'
    including a version of Troi, and attempting to exploit his desires. Picard vehemently
    rejects her advances, calling her 'shallow and pathetic.' In retaliation, Ardra
    transports Picard, still in his bedclothes, to the science station on Ventax Two.
    Worf reports that the Enterprise transporters are malfunctioning due to interference,
    preventing Picard's immediate return. Data, meanwhile, discovers an obscure Ventaxian
    legal precedent for arbitration involving an alien claimant, offering Picard a
    potential loophole. As Data pilots a shuttle to retrieve Picard, the Enterprise
    mysteriously vanishes from orbit, leaving the shuttle isolated in space and Picard
    without his ship, marking a significant and alarming setback.
  key_moments: []
  scene_numbers:
