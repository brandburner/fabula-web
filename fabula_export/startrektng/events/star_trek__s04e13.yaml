acts:
- fabula_uuid: act_af30547e233a063a
  number: 0
  summary: The teaser opens with Data on the holodeck, portraying Ebenezer Scrooge,
    engaging in a philosophical discussion with Picard about method acting and the
    pursuit of emotional awareness, specifically fear. Data expresses his desire to
    understand human emotions by performing them, believing it will bring him closer
    to true humanity. Picard offers encouragement, noting Data's independent interpretation
    as a step forward. This introspective moment is abruptly interrupted by an emergency
    transmission from Ventax Two. Dr. Howard Clark, director of the science station,
    reports widespread chaos, mass hysteria, and a planet-wide belief that their world
    is ending. The signal is unstable, plagued by static and the sounds of a distant
    mob, highlighting the urgency and severity of the situation. Communication is
    lost, leaving Picard and the crew with an incomplete, alarming picture of the
    crisis unfolding on Ventax Two, setting the stage for their immediate intervention
    and the central mystery of Ardra's return.
  key_moments: []
  scene_numbers:
