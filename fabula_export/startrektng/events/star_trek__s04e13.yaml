  description: "\n  Picard’s diplomatic arrival on Ventax is abruptly derailed when\
    \ a seismic tremor—interpreted by the Ventaxians as a supernatural omen—shakes\
    \ the Atheneum. As the quake intensifies, a blinding light materializes, revealing\
    \ Ardra, a striking woman in black, who declares, *‘Time’s up.’* The Ventaxians\
    \ recoil in terror, whispering her name, while Picard’s skepticism collides with\
    \ the undeniable spectacle of her arrival. The moment transforms the mission from\
    \ a rational investigation into a high-stakes confrontation with an adversary\
    \ whose authority is now visually and emotionally undeniable. Data and Worf draw\
    \ phasers, but Ardra’s presence silences the room, forcing Picard to confront\
    \ the terrifying possibility that their enemy is not just a fraud—but something\
    \ far more dangerous.\n  "
