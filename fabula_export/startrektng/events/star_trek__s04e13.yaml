      to release the Federation hostages. The government’s complicity in Ardra’s manipulation
      is evident in Jared’s fearful submission and the Ventaxians’ blind obedience
      to her commands. The organization’s role in the scene underscores the fragility
      of its leadership and the depth of Ardra’s psychological hold over the population.
    active_representation: Through Jared’s actions and the Ventaxians’ deferential
      behavior, the government’s subjugation to Ardra’s will is clearly on display.
    power_dynamics: The Ventaxian Government operates under Ardra’s authority, with
      no independent agency. Jared’s compliance with her demands reflects the organization’s
      complete subordination to her supernatural claims, leaving it powerless to challenge
      her or protect its people from her manipulation.
    organizational_goals:
