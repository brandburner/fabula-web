  title: Enterprise vanishes mid-docking
  description: "\n  Picard and Data return to the *Enterprise* in a shuttle after\
    \ uncovering a legal loophole in Ventaxian law that could expose Ardra’s fraud.\
    \ As Data pilots the shuttle toward the ship, Picard strategizes a confidence\
    \ game to force Ardra into arbitration, leveraging her greed against her. Just\
    \ as the shuttle nears docking, the *Enterprise* abruptly vanishes without warning,\
    \ leaving Picard and Data stranded in open space. Picard’s immediate attempts\
    \ to hail the ship fail, cutting off their only means of communication, escape,\
