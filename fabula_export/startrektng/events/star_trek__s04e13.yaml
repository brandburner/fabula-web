    my people..."'
  - 'PICARD: "I am Captain Jean-Luc Picard. Is there nothing you can do...?"'
  - 'TROI: "This situation is deteriorating, Captain... people are approaching levels
    of anxiety that could lead to suicide..."'
  - 'PICARD: "No... I''m going down to the planet... Mister Worf and Mister Data,
    you will accompany me... I''m hoping the hostages have not been moved far... if
    the opportunity presents itself we will move quickly..."'
