    power_dynamics: 'Starfleet exercises authority over the *Enterprise* and its crew,
      but its power is tempered by the need for evidence and diplomacy. Picard''s
      leadership is constrained by the organization''s protocols, even as he leverages
      its resources to challenge Ardra. The power dynamic is also internal: Picard
      must convince Data (a Starfleet officer) of his skepticism, while Data''s questions
      force Picard to defend his stance within the framework of Starfleet''s values.'
