    institutional_impact: Starfleet’s involvement reinforces the idea that superstition
      and fear can be countered with logic and evidence. The organization’s presence
      here is a reminder that even in the face of ancient legends and fanatical beliefs,
      there are rational ways to resolve conflicts.
    internal_dynamics: The chain of command is tested as Picard must balance his intellectual
      curiosity with the need for immediate action. Riker’s com interruption highlights
      the tension between gathering information and responding to a crisis, a dynamic
      that Starfleet’s protocols are designed to manage.
