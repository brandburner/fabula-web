      are the tools Picard tasks Data with analyzing, framing the organization as
      both a victim and a potential ally in the fight against superstition. Their
      collective fear of Ardra''s return is the emotional undercurrent of the scene,
      driving the urgency of Picard''s mission.'
    active_representation: 'Through their legal and historical records (e.g., the
