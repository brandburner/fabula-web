  global_id: null
  title: Picard rejects Kennelly’s Cardassian priority
  description: In the ready room, Picard confronts Admiral Kennelly about the Cardassians’
    foreknowledge of the Enterprise’s mission, accusing him of complicity in a conspiracy
    to eliminate Bajoran militants like Orta. Kennelly deflects, insisting the Cardassian
    treaty must take precedence over Bajoran lives, but Picard refuses to sacrifice
    them. His blunt refusal—‘No. I’m not willing to give them up’—exposes Kennelly’s
    moral compromise and forces the Admiral to issue a direct order to withdraw, escalating
    their conflict. The exchange reveals Kennelly’s institutional allegiance to the
    Cardassian alliance over Federation ideals, while Picard’s defiance sets up his
    moral dilemma as the mission unfolds. The tension hinges on Picard’s refusal to
    prioritize diplomacy over lives, a choice that risks his career and the Federation’s
    fragile peace with the Cardassians.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e03
  scene_sequence: 23
  sequence_in_scene: 41
  key_dialogue:
  - 'PICARD: It seemed, Admiral, that they knew our course, our destination, our plan...'
  - |-
    KENNELLY: The important thing is, what do we do now?
    PICARD: Any suggestions, Admiral?
    KENNELLY: You have to protect the Cardassian peace, that's our top priority.
    PICARD: Sir, I see no way to protect the Cardassian peace without sacrificing the Bajorans.
    KENNELLY: If that's your call, I'll support it.
    PICARD: No. I'm not willing to give them up.
  - 'PICARD: I see the Cardassian liaison, with his Cardassian virus, coming to meet
    with you after the attack on Solarion Four. Now, we have a mutual enemy, he says.
    The Bajoran terrorists. The Cardassians can''t find them. But maybe the Federation
    can. I am beginning to see that our mission has been, in fact, to expose Orta...
    so the Cardassians could move in and destroy him.'
