  key_dialogue:
  - 'KENNELLY: Find this terrorist leader, Orta... get him back ''on the reservation''...
    any way you can.'
  - 'PICARD: Any way I can...'
  - 'KENNELLY: The Federation has dozens of settlements in that sector. We can''t
    allow the violence to continue.'
  - 'PICARD: And what do I have to offer that might persuade him to cooperate?'
  - 'KENNELLY: Amnesty... and a promise that we will immediately begin to address
    this issue with the Cardassians... quietly, behind the scenes, using every legitimate
    means... the Bajorans have to be patient...'
  - 'PICARD: They have endured generations of sympathy and promises. I cannot believe
    this Orta will be satisfied with more of the same.'
  - 'KENNELLY: It''s your job to see that he is, Jean-Luc.'
