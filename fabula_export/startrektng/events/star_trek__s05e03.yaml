- fabula_uuid: cand_evt_scene_218a16c183a0bceb_01
  global_id: null
  title: Picard reluctantly accepts Ro’s transfer
  description: In the Observation Lounge, Picard receives an unexpected order from
    Admiral Kennelly to assign Ensign Ro Laren to the *Enterprise*, despite his strong
    objections. Ro’s Bajoran background and controversial past—including her involvement
    in the Garon II incident—make Picard wary, but Kennelly insists on her assignment,
    framing it as critical to the mission. The exchange reveals Kennelly’s hidden
    agenda, as he dismisses Picard’s concerns with uncharacteristic urgency, even
    referencing Ro’s recent release from prison. Picard, though visibly uneasy, ultimately
    concedes, signaling his trust in Kennelly’s authority while subtly warning of
    potential regret. The moment underscores the tension between Starfleet’s bureaucratic
    demands and Picard’s moral leadership, setting up Ro’s pivotal but contentious
    role in the mission. Kennelly’s abrupt recovery from his earlier illness further
    hints at his complicity in the unfolding conspiracy, leaving Picard in a precarious
    position of compliance despite his reservations.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e03
  scene_sequence: 5
