    these negotiations. With your permission, Orta, I will have her transported back
    to my ship.'
  - 'RO: You don''t know all the facts, Sir.'
  - 'ORTA: Ro Laren is attempting to protect the interests of two worlds, Captain.
    She finds herself uncomfortably caught between them.'
  - 'ORTA: Your mission was to seek out the Bajoran terrorists who destroyed the Federation
    settlement on Solarion Four... As I have informed Ro Laren—it was not the Bajorans.'
