- fabula_uuid: cand_evt_scene_248b927ec4fbc4e5_02
  global_id: null
  title: Picard secures Keeve’s cooperation through aid
  description: Picard, Ro, Data, and Worf materialize in a Bajoran refugee camp, where
    the squalor of the displaced Bajorans—starving children, makeshift shelters, and
    the weight of historical trauma—immediately confronts them. Ro’s visceral reaction
    to the children, particularly her act of giving her Starfleet jacket to a naked
    child, reveals her unresolved connection to her Bajoran past and the vulnerability
    beneath her defiance. Keeve Falor, a proud but bitter Bajoran leader, initially
    refuses to help Picard locate Orta, framing the Federation’s neutrality during
    the Cardassian occupation as complicity. Picard counters by offering tangible
    aid—blankets and supplies—through Data and Worf, leveraging pragmatism to soften
    Keeve’s stance. The exchange exposes the raw wounds of Bajoran occupation and
    the Federation’s perceived failures, forcing Picard to navigate diplomacy through
    both empathy and strategic concessions. Ro’s deflected praise from Picard underscores
    her struggle with self-worth and belonging, deepening the mission’s moral and
    political stakes. The scene ends with Keeve agreeing to contact Picard if he has
    information, marking a fragile but critical alliance that hinges on trust and
    shared suffering.
