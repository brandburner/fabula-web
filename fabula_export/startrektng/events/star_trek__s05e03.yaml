    PICARD: Ensign, you were recruited for one mission and if you wish to be relieved of further duty, I will approve it. But I'd like you to consider remaining in Starfleet.
    RO: ((reacts)) You're not serious.
    PICARD: It would be a shame for Starfleet to lose someone with your potential.
    RO: ((heartfelt)) Thank you.
    RO: ((reality beat)) But this uniform... it just doesn’t fit, Captain... and you know it.
    PICARD: That can change.
  - |-
    PICARD: There's still a lot you can learn from Starfleet, Ensign.
    RO: I've always thought Starfleet could learn a lot from me, Captain.
    PICARD: That is an attitude I have found to be common among the best officers I've served with. You are not one of those officers, Ensign, but you might be someday... if you decide to work at it.
    RO: An interesting challenge, sir. And I rarely refuse an interesting challenge.
    RO: ((a beat)) There would be one condition.
    PICARD: Condition... ?
  - PICARD to Enterprise. Two to beam up.
