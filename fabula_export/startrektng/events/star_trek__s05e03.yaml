acts:
- fabula_uuid: act_32228faf44a21947
  number: 1
  summary: Captain Picard endures a barber's chatter before the Enterprise receives
    an urgent distress call from the Solarion Four colony, which abruptly ends. A
    subsequent audio message from a male voice claims responsibility for the destruction,
    identifying themselves as Bajorans and threatening further attacks until their
    homeland is restored. The Enterprise then rendezvous with Admiral Kennelly at
    Lya Station Alpha to discuss the Bajoran 'terrorist' attack. Kennelly, suffering
    from a cold, informs Picard about a new militant Bajoran splinter group led by
    Orta, who is seeking attention. Kennelly orders Picard to find Orta and persuade
    him to return to the camps, offering amnesty and promises of future diplomatic
    efforts with the Cardassians. Picard expresses skepticism about the effectiveness
    of these offers. Kennelly then reveals he has assigned Ensign Ro Laren to the
    Enterprise for this mission, overriding Picard's strong objections regarding her
    troubled Starfleet record and past court-martial on Garon Two. Ro beams aboard,
    displaying immediate defiance by refusing to remove her Bajoran earring until
    directly ordered by Riker, establishing her rebellious nature and the immediate
    tension surrounding her presence.
  key_moments: []
  scene_numbers:
  - 1
  - 2
  - 3
  - 4
  - 5
- fabula_uuid: act_c012caaf08342f26
  number: 2
  summary: Picard and Riker discuss Ensign Ro's problematic assignment, with Picard
    acknowledging the crew's likely reluctance but insisting on high performance standards.
    Ro enters, correcting Picard on the pronunciation of her Bajoran name and openly
    expressing her disdain for the assignment, stating it is merely 'better than prison.'
    She remains defiant and uncooperative during their initial meeting. The Enterprise
    arrives in the Valo system, where many Bajorans have resettled. During a mission
    briefing, Ro dismisses Data's suggestion to meet a known Bajoran leader, Jas Holza,
    as he lacks real influence. Instead, she directs the team to Keeve Falor on Valo
    Two, a more direct and less diplomatic figure. The away team beams to a desolate
    Bajoran refugee camp, a devastating sight of ramshackle huts and impoverished
    people. Ro shows a moment of profound vulnerability and empathy, giving her Starfleet
    jacket to a naked child and revealing her personal connection to their suffering
    by stating, 'This used to be me.' Keeve Falor, while acknowledging Ro, initially
    refuses to help Picard locate Orta, criticizing the Federation's past inaction
    during the Cardassian occupation. Picard, understanding the depth of their plight,
    offers tangible aid by arranging for blankets and other emergency supplies. This
    act of genuine assistance persuades Keeve to agree to contact Picard with information
    about Orta, marking a turning point in the negotiations. Picard acknowledges Ro's
    unexpected helpfulness, though she dismisses it.
  key_moments: []
  scene_numbers:
  - 6
  - 7
  - 8
  - 9
- fabula_uuid: act_3434956d47c1cda3
  number: 3
  summary: The Enterprise continues through the Valo system, with Keeve Falor having
    directed them to Orta's location on a moon of Valo One. In Ten-Forward, Ro isolates
    herself, prompting Beverly and Troi to avoid her. Guinan, however, approaches
    Ro, engaging her in a probing conversation. Guinan challenges Ro's self-imposed
    isolation and cynicism, suggesting Ro enjoys her self-pity. Guinan reveals her
    own experience of losing her homeworld, creating a rare moment of connection and
    understanding with Ro. She subtly encourages Ro to trust others, hinting at the
    importance of such trust in overcoming personal struggles. Shortly after, Ro receives
    a private subspace communication from Admiral Kennelly, confirming that her covert
    mission for him is progressing as planned. Meanwhile, Picard, Riker, Data, Worf,
    and Troi prepare for their meeting with Orta. Upon discovering Ro is missing and
    has beamed down to the moon six hours prior without authorization, Picard grows
    suspicious. The away team beams to the moon caves, the designated meeting site,
    but finds no activity. As they search, they are ambushed and captured by Bajoran
    terrorists, a direct and dangerous consequence of Ro's unauthorized and secret
    actions, escalating the mission into a full-blown crisis.
  key_moments: []
  scene_numbers:
