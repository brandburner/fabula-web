  global_id: null
  title: Ro Confesses Kennelly’s Covert Mission
  description: In the *Enterprise* ready room, Ensign Ro—escorted by Guinan—admits
    under duress to Admiral Kennelly’s covert directive to arm Bajoran militant Orta
    with Starfleet resources. Ro reveals Kennelly’s plan to bypass Federation diplomacy,
    offering weapons and ships to Orta in exchange for ending terrorism against the
    Federation. The confession forces Picard to confront Ro’s divided loyalties and
    the Federation’s complicity in escalating tensions. Ro’s traumatic childhood memory
    of her father’s torture at Cardassian hands surfaces, exposing her internal conflict
    between Bajoran identity and Starfleet duty. Picard, recognizing the ethical dilemma,
    decides to use Ro’s connection to Orta to uncover the truth behind the Solarion
    Four attack, while subtly aligning Ro with the *Enterprise* crew’s moral compass.
    The scene pivots from confrontation to cautious alliance, setting up a shift in
    Ro’s allegiance and Picard’s strategic response to Kennelly’s conspiracy.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e03
  scene_sequence: 18
  sequence_in_scene: 31
  key_dialogue: &id015
  - 'RO: Admiral Kennelly came to me in prison... told me he''d arrange to get me
    out if I''d accept a mission... not this mission. One for him and only him. You
    were being sent to talk, to negotiate... the Admiral knew that was hopeless...
    My job was to give Orta an incentive... Weapons. Ships. Things that could really
    make a difference against the Cardassians in the future.'
  - 'RO: When I was seven years old... I was given a piece of sugar candy and led
    by a Cardassian into a room. My father was sitting inside. And he looked at me
    with eyes I''d never seen... And then the Cardassian began to ask him questions...
    and during the next two hours as I was forced to watch, my father was tortured
    until he died. I remember feeling so... ashamed... as my father begged for mercy...
    I was ashamed of him for being so weak. I was ashamed of being Bajoran.'
  - 'PICARD: Do you think Orta would cooperate with us to determine the truth here?
    RO: I think I can persuade him. PICARD: Good. Our orders were to find him, bring
    him back to the camps... any way we could... perhaps that is exactly what we should
    do. RO: And then what? PICARD: And then watch what happens.'
