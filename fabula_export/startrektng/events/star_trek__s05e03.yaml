  title: Picard accuses Kennelly of conspiracy
  description: "\n  In the Captain’s Ready Room, Picard directly confronts Admiral\
    \ Kennelly with his suspicions that Starfleet—specifically Kennelly—has been complicit\
    \ in a Cardassian-Bajoran conspiracy. Picard outlines a damning theory: that the\
    \ Cardassians orchestrated the Solarion Four attack to justify hunting down Orta,\
    \ with Starfleet’s unwitting (or witting) assistance. Kennelly’s evasive responses\
    \ and his insistence on prioritizing the Cardassian treaty over Bajoran lives\
    \ confirm Picard’s worst fears. The exchange escalates into a power struggle,\
    \ with Kennelly dismissing Picard’s accusations as a loss of perspective and issuing\
    \ a direct order to withdraw—a command that signals the collapse of their professional\
    \ trust and the escalation of a hidden Starfleet power struggle. Picard’s refusal\
    \ to abandon the Bajorans marks a turning point, where his moral compass clashes\
    \ with institutional priorities, setting the stage for his defiance of Starfleet’s\
    \ authority.\n  "
