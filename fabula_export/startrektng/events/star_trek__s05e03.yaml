  title: Orta exposes Bajoran innocence and Ro’s divided loyalties
  description: 'In the moon caves, Orta—disfigured by Cardassian torture and speaking
    through a mechanical voice box—confronts Picard, revealing his scars as proof
    of Federation betrayal. He accuses Ro of sabotaging the mission, forcing Picard
    to question her allegiance after she admits to interfering with Bajoran militants.
    Orta then drops a bombshell: the Bajorans were not responsible for the Solarion
    Four attack, undermining Picard’s mission and hinting at a larger conspiracy.
    Ro’s conflicted silence and Picard’s growing distrust escalate tensions, while
    Orta’s warning that Picard may be a pawn in a deception deepens the crisis. The
    scene pivots from diplomatic negotiation to a revelation that shatters assumptions,
    forcing Picard to confront both Ro’s divided loyalties and the possibility that
    his mission is compromised from within.'
