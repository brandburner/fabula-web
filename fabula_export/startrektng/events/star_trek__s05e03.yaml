    description_of_involvement: The Bajoran Antares-class carrier is the symbolic
      target of the Cardassian false-flag operation. Though unmanned and controlled
      via a subspace relay, its destruction is staged to frame the Bajorans for the
      Solarion Four attack. Picard’s revelation that the vessel was unoccupied and
      remotely operated is pivotal in exposing the conspiracy. The carrier’s role
      in the event is as a prop in the Cardassians’ deception, but its destruction
      becomes the catalyst for uncovering the truth.
    status_before_event: Intact and operational, positioned near the Cardassian border,
      controlled remotely via a subspace relay aboard the vessel.
    status_after_event: Destroyed by Cardassian fire, reduced to debris, its role
      in the conspiracy exposed.
    global_id: ger_object_7959ef6e2992
  - object_uuid: ger_object_6dc44dcc73b2
    description_of_involvement: The Bajoran vessel’s subspace relay is the forensic
      evidence Picard uses to expose the Cardassian deception. Data and Worf confirm
      its operation, revealing that the vessel was controlled remotely—proving it
      was unmanned and part of a staged attack. The relay’s presence is the key to
      dismantling Kennelly’s accusations, as it demonstrates that the Bajorans could
      not have been responsible for the Solarion Four attack. Its role is functional
      but narratively critical, serving as the smoking gun in Picard’s argument.
    status_before_event: Active and operational aboard the Bajoran vessel, processing
      signals for remote control.
    status_after_event: Destroyed along with the vessel, but its existence and function
      are confirmed by Worf and Data, becoming the linchpin of Picard’s revelation.
    global_id: ger_object_6dc44dcc73b2
  - object_uuid: ger_object_5b77ce7d63c5
    description_of_involvement: The Cardassian ships are the antagonist force in this
      event, responsible for destroying the unmanned Bajoran vessel as part of their
      false-flag operation. Their actions are orchestrated to frame the Bajorans for
      the Solarion Four attack, but Picard’s forensic evidence—particularly the subspace
      relay and the lack of warp capability in Orta’s ships—exposes their deception.
      The ships’ role is to enact the Cardassians’ manipulation, but their destruction
