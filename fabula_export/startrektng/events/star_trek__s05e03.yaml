- fabula_uuid: cand_evt_scene_83d0329b873196de_03
  global_id: null
  title: Ro Confesses Kennelly’s Secret Mission
  description: In the ready room, Picard confronts Ensign Ro after Guinan intervenes
    on her behalf, revealing that Ro has been secretly communicating with Admiral
    Kennelly. Ro admits Kennelly ordered her to offer Orta weapons and ships in exchange
    for ending Bajoran terrorism—a direct violation of Starfleet principles. Picard,
    initially skeptical, listens as Ro recounts her traumatic childhood, where she
    witnessed her father’s torture by Cardassians, explaining her conflicted loyalty.
    The revelation forces Picard to question Kennelly’s motives and the mission’s
    true purpose, while Ro’s emotional vulnerability deepens their fragile trust.
    The scene ends with Picard deciding to use Ro’s connection to Orta to uncover
    the conspiracy, setting up their covert surveillance plan.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e03
  scene_sequence: 18
  sequence_in_scene: 33
  key_dialogue: &id019
  - 'PICARD: I have found that Guinan is very selective about whom she calls a friend.'
  - 'RO: Admiral Kennelly came to me in prison... told me he''d arrange to get me
    out if I''d accept a mission... not this mission. One for him and only him. You
    were being sent to talk, to negotiate... the Admiral knew that was hopeless...
    My job was to give Orta an incentive... Weapons. Ships. Things that could really
    make a difference against the Cardassians in the future.'
  - 'PICARD: Arming these people would be a violation of all that the Federation stands
    for. You cannot be blind to that...'
  - 'RO: When I was seven years old... I was given a piece of sugar candy and led
    by a Cardassian into a room. My father was sitting inside. And he looked at me
    with eyes I''d never seen... And then the Cardassian began to ask him questions...
    and during the next two hours as I was forced to watch, my father was tortured
    until he died. I remember feeling so... ashamed... as my father begged for mercy...
    I was ashamed of him for being so weak. I was ashamed of being Bajoran.'
  - 'PICARD: Do you think Orta would cooperate with us to determine the truth here?'
  - 'RO: That strange bartender of yours... She has a way of getting to you, you know?
    She said you were her friend.'
