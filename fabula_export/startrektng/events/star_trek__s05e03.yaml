- fabula_uuid: act_63b2f2499d8e1080
  number: 4
  summary: 'In the caves, Orta, his face mutilated by Cardassians, confronts Picard,
    stating he decided to abduct the team after speaking with Ro Laren. Ro attempts
    to explain her actions, but Picard, furious, restricts her to quarters, believing
    she has undermined the mission. Orta then reveals a shocking truth: the Bajorans
    did not attack the Solarion Four colony, fundamentally altering the premise of
    Picard''s mission. Back on the Enterprise, the crew debates Orta''s claim, with
    Troi sensing no deception. Picard, his jaw tight, confines Ro to her quarters
    for leaving the ship without authorization. In her quarters, a distraught Ro is
    visited by Guinan, who gently pushes her to confront her pain and lack of control.
    Guinan shares her own story of being saved by trusting one man, encouraging Ro
    to confide in Picard. Ro admits she''s in deep trouble, caught between conflicting
    loyalties, and doesn''t know who to trust, especially herself. Guinan brings Ro
    to Picard''s ready room. Ro, after expressing her willingness to face consequences,
    confesses Kennelly''s secret orders: he promised to arm Orta with weapons and
    ships to fight the Cardassians in exchange for ending attacks on the Federation.
    Ro explains her personal motivation, revealing the trauma of watching her father
    tortured to death by Cardassians, and her desire to no longer be ashamed of her
    Bajoran heritage. She admits she didn''t make the offer to Orta after his revelation
    about Solarion Four. Picard, now understanding the full extent of Kennelly''s
    treachery and the conspiracy, realizes Ro''s actions, though unauthorized, were
    driven by a complex moral dilemma. He decides to trust her and cooperate to uncover
    the truth, asking for her help in persuading Orta.'
  key_moments: []
  scene_numbers:
  - 15
  - 16
  - 17
  - 18
- fabula_uuid: act_df4eac0472e5c2e6
  number: 5
  summary: 'Picard, now aware of the conspiracy, briefs Kennelly on the screen, subtly
    implying Ro''s invaluable contribution and the successful ''capture'' of Orta,
    while Kennelly remains oblivious to Picard''s true intentions. The Enterprise
    escorts a Bajoran Antares-class carrier, which Picard and Ro have secretly arranged
    to be empty and remotely controlled, towards Valo Three. Data detects Cardassian
    warships crossing the border and increasing power to their weapon grids, confirming
    Picard''s suspicions of an ambush. Picard orders Red Alert and changes course
    to intercept the Cardassians. Gul Dolak hails, demanding Picard withdraw and allow
    them to destroy the ''terrorist carrier,'' which he claims has committed crimes
    against them. Picard refuses, asserting the neutrality of the space. Kennelly
    then issues a direct order to Picard to withdraw, prioritizing the Cardassian
    treaty, implicitly confirming his complicity in the plot. Picard, however, implements
    his counter-plan: he withdraws only after the Cardassians destroy the empty Bajoran
    vessel, exposing their intent without bloodshed. Picard then confronts Kennelly
    on the main viewscreen, revealing the ruse and exposing Kennelly''s treachery
    and the Cardassian conspiracy to frame the Bajorans and eliminate Orta. Kennelly
    is left speechless and exposed. In the aftermath, Kennelly faces a hearing. Picard
    offers Ro a chance to remain in Starfleet, acknowledging her potential and the
    positive qualities he has observed. Ro expresses heartfelt gratitude but remains
    uncertain about her future, ultimately accepting by subtly re-donning her Bajoran
    earring, symbolizing her embrace of her dual identity and a hopeful, albeit complex,
    path forward.'
