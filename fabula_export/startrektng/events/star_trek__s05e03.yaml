- fabula_uuid: cand_evt_scene_83d0329b873196de_02
  global_id: null
  title: Ro reveals Kennelly’s conspiracy and her trauma
  description: 'In the ready room, Picard confronts Ensign Ro after Guinan intervenes
    on her behalf, forcing Ro to confess her covert mission for Admiral Kennelly—arming
    Bajoran militants with Starfleet weapons. Ro’s admission is raw and unfiltered,
    revealing not only Kennelly’s betrayal of Federation principles but also her own
    deep-seated trauma: a childhood memory of witnessing her father’s torture at Cardassian
    hands, which fuels her divided loyalties. Picard, though shocked by Kennelly’s
    actions, recognizes Ro’s moral conflict and her potential as an ally. The scene
    pivots from accusation to reluctant collaboration as Picard tasks Ro with persuading
    Orta to cooperate, setting up a critical shift in the mission’s direction. Ro’s
    vulnerability—both in her confession and her emotional bond with Guinan—humanizes
    her, while Picard’s pragmatic response underscores his willingness to bend Starfleet’s
    rules when justice demands it. The exchange also foreshadows the broader conspiracy,
    as Ro’s hesitation to trust Kennelly hints at deeper corruption within Starfleet’s
    ranks.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e03
  scene_sequence: 18
  sequence_in_scene: 32
  key_dialogue: &id017
  - 'PICARD: I have found that Guinan is very selective about whom she calls a friend.'
  - 'RO: Admiral Kennelly came to me in prison... told me he''d arrange to get me
    out if I''d accept a mission... One for him and only him. You were being sent
    to talk, to negotiate... the Admiral knew that was hopeless... My job was to give
    Orta an incentive... Weapons. Ships. Things that could really make a difference
    against the Cardassians in the future.'
  - 'RO: When I was seven years old... I was given a piece of sugar candy and led
    by a Cardassian into a room. My father was sitting inside. And he looked at me
    with eyes I''d never seen... And then the Cardassian began to ask him questions...
    and during the next two hours as I was forced to watch, my father was tortured
    until he died. I remember feeling so... ashamed... as my father begged for mercy...
    I was ashamed of him for being so weak. I was ashamed of being Bajoran.'
  - 'PICARD: Do you think Orta would cooperate with us to determine the truth here?
    RO: I think I can persuade him. PICARD: Good. Our orders were to find him, bring
    him back to the camps... any way we could... perhaps that is exactly what we should
    do.'
