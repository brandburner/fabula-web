  title: Picard defies Cardassian ultimatum
  description: With the Enterprise escorting a Bajoran ship toward Valo Three, Captain
    Picard faces a direct challenge from Gul Dolak, who demands the vessel’s surrender
    under accusations of terrorism. Picard refuses to withdraw, invoking neutral space
    jurisdiction and the Federation’s moral obligation to protect civilians. The confrontation
    escalates as Dolak issues a veiled threat—an hour to comply or face consequences—while
    Data and Worf confirm the Cardassian warships’ aggressive posturing. Picard’s
    defiance sets the stage for a high-stakes standoff, forcing him to prepare for
    Kennelly’s inevitable intervention. The scene underscores Picard’s moral resolve
    but also the precarious balance between Starfleet’s neutrality and the Bajoran
    plight, with Ro’s loyalties and the Cardassian conspiracy looming as unresolved
    tensions. The dialogue reveals Picard’s diplomatic finesse and Dolak’s calculated
    aggression, while the subtext of Starfleet’s internal divisions (hinted at by
    Kennelly’s pending call) adds urgency to the moment. This event serves as both
    a turning point—escalating the Cardassian threat—and a setup for Picard’s private
    confrontation with Kennelly, where institutional pressures will clash with his
    principles.
