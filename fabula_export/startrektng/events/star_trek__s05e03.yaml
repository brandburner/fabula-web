  global_id: null
  title: Picard exposes Kennelly’s conspiracy
  description: 'On the *Enterprise* bridge, Picard executes a calculated deception
    by ordering the destruction of an unmanned Bajoran vessel—a ruse to provoke the
    Cardassians into revealing their true intentions. When Worf confirms the Bajoran
    ship’s destruction, Picard remains stoic, his strategy unfolding as planned. The
    tension escalates as Admiral Kennelly’s transmission interrupts, demanding a report.
    Picard, undeterred, reveals the truth: the Bajoran ship was remotely controlled,
    and the Cardassians staged the attack to frame Bajorans. Kennelly’s disbelief
    crumbles when Picard dismantles his assumptions about Bajoran culpability, exposing
    the Cardassians’ manipulation of Starfleet’s distrust. The confrontation forces
    Kennelly to confront his own complicity in the conspiracy, while Picard’s moral
    clarity and strategic foresight reaffirm his leadership. The scene marks a turning
    point, where Picard’s defiance of Starfleet’s institutional bias sets the stage
    for further exposure of the conspiracy and tests Ro’s loyalty as the Cardassian
    deception threatens Federation-Cardassian relations.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e03
  scene_sequence: 24
  sequence_in_scene: 43
  key_dialogue:
  - |-
    PICARD: The Bajoran ship has been destroyed.
    KENNELLY: ((nods, "regretfully")) All hands lost... ?
    PICARD: No, sir. No one was on board.
    KENNELLY: What are you talking about?
    PICARD: The ship was controlled from the ground. Communications were handled through a subspace relay aboard the vessel.
  - |-
    KENNELLY: They're terrorists, dammit. Why the hell would you want to protect them?
    PICARD: I am more concerned with protecting the honor and integrity of Starfleet.
  - |-
    PICARD: The Bajorans did not attack Solarion Four.
    KENNELLY: Is that what Orta told you?
    PICARD: Yes.
    KENNELLY: And you believed him?
    PICARD: Admiral, Orta's ships are old and obsolete. They do not have warp capabilities. They could not have reached another star system... let alone attack one.
    PICARD: I would suggest you ask your friend the Cardassian liaison, Admiral. The only explanation I can think of is that the Cardassians staged it.
