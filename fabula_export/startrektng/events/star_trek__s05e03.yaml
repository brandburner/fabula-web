  title: Picard defies Cardassian ultimatum
  description: "\n  The *Enterprise* escorts a Bajoran vessel toward Valo Three when\
    \ Data detects two Cardassian warships crossing the Federation border, their weapons\
    \ powering up. Picard orders a red alert and intercepts the Cardassians, who identify\
    \ the Bajoran ship as a 'terrorist carrier' and demand its surrender. Gul Dolak,\
    \ the Cardassian commander, escalates the confrontation, insisting the Federation\
    \ withdraw or face 'offense'—a veiled threat of violence. Picard refuses to abandon\
    \ the Bajorans, invoking neutral space and the Federation’s moral obligation to\
    \ protect civilians. Dolak responds with a one-hour ultimatum before taking 'any\
    \ steps necessary,' leaving Picard to prepare for a potential standoff while privately\
    \ signaling Data to notify Starfleet. The scene underscores the fragility of Federation-Cardassian\
    \ relations and forces Picard to balance diplomacy with defiance, setting up his\
    \ inevitable clash with Admiral Kennelly over Ro’s loyalties and the Bajoran crisis.\n\
    \  "
