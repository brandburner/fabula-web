  global_id: null
  title: Ro Corrects Picard on Her Name
  description: In the Enterprise’s ready room, Picard and Riker discuss their reservations
    about Ensign Ro’s assignment, with Picard expressing personal concern over her
    troubled past and Riker vowing to hold her to high standards. Their conversation
    is abruptly interrupted when Ro enters unannounced. Without hesitation, she corrects
    Picard’s use of her Bajoran name—*Laren*—insisting on *Ro* as the proper form,
    a subtle but deliberate assertion of her cultural identity. The correction, delivered
    with quiet defiance, immediately shifts the power dynamic, forcing Picard and
    Riker into a reactive stance. Ro’s blunt admission that she’s only on the mission
    to avoid prison further undermines their authority, exposing the fragility of
    their mission and the personal stakes at play. Her exit—before Picard can even
    dismiss her—leaves the captain and first officer visibly unsettled, underscoring
    Ro’s role as a destabilizing force aboard the *Enterprise* and foreshadowing her
    unresolved conflict between Bajoran heritage and Starfleet duty. The moment also
    highlights Picard’s frustration with the situation, as he mutters a belated *Dismissed*
    after she’s already gone, reinforcing the tension between his command and Ro’s
    defiance.
