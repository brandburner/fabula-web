  title: Cardassians cross border, demand Bajoran surrender
  description: "\n  The *Enterprise* escorts a Bajoran vessel toward Valo III when\
    \ Data detects two Cardassian Galor-class warships moving parallel to their course.\
    \ As tensions escalate, the Cardassians cross the Federation border with weapons\
    \ active, forcing Picard to declare a red alert. Gul Dolak hails the *Enterprise*,\
    \ accusing the Bajoran ship of being a 'terrorist carrier' and demanding its surrender.\
    \ When Picard refuses to withdraw, Dolak issues an ultimatum: the Federation has\
    \ one hour to leave or face 'steps necessary'—a veiled threat of violence. The\
    \ confrontation tests Picard’s diplomatic resolve and sets the stage for a potential\
    \ military escalation, while Ro’s divided loyalties loom as an unspoken tension.\
    \ The scene underscores the fragility of the region’s neutrality and the Cardassians’\
    \ willingness to provoke conflict, with Picard’s refusal to abandon the Bajorans\
    \ signaling his commitment to Federation principles despite the risks.\n  "
