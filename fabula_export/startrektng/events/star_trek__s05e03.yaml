  sequence_in_scene: 45
  key_dialogue:
  - |-
    RO: What will happen to him?
    PICARD: I'm not sure. A hearing, definitely. Perhaps a court martial.
    RO: If he's sent to the stockade on Jaros Two, tell him to request a room in the east wing... the west wing gets awfully hot in the afternoon.
  - |-
    PICARD: Ensign, you were recruited for one mission and if you wish to be relieved of further duty, I will approve it. But I'd like you to consider remaining in Starfleet.
    RO: You're not serious.
    PICARD: It would be a shame for Starfleet to lose someone with your potential.
  - |-
    RO: This uniform... it just doesn't fit, Captain... and you know it.
    PICARD: That can change.
    RO: I don't think so.
    PICARD: I've observed a certain quality about you that... might be harnessed, molded...
  - |-
    RO: There would be one condition.
    PICARD: Condition... ?
    (She attaches her silver earring to her ear. Picard studies her and nods.)
