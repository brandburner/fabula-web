  title: Riker announces Ro’s unapproved transfer
  description: 'In the transporter room, Commander Riker interrupts Captain Picard
    via comm to reveal an unexpected officer—Ensign Ro—is about to beam aboard without
    prior authorization. Picard’s immediate refusal ("Negative...") underscores his
    frustration with the breach of protocol, while Riker’s matter-of-fact delivery
    ("I’ve got one waiting to transport aboard...") exposes the tension between Starfleet’s
    bureaucratic rigidity and the mission’s urgent demands. This moment foreshadows
    deeper conflicts: Ro’s controversial Bajoran background, Kennelly’s hidden agenda,
    and the Enterprise’s strained relationship with Bajoran extremists. The scene’s
    brevity heightens its impact, as the unspoken question—*why* was Ro assigned without
    Picard’s approval?—hangs in the air, setting up future revelations about divided
    loyalties and covert operations.'
