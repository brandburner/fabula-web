  title: Orta exposes Bajoran innocence and warns Picard
  description: 'In the claustrophobic confines of the caves, Orta—his face disfigured
    by Cardassian torture and his voice mechanically altered—confronts Picard with
    a blunt accusation: the Bajoran terrorists he was sent to find had no involvement
    in the Solarion Four attack. The revelation forces Picard to question the foundation
    of his mission, while Ro’s presence and her conflicted loyalties further destabilize
    the situation. Orta’s warning that Picard may himself be a pawn in a larger deception
    deepens the tension, as Picard’s diplomatic composure fractures under the weight
    of betrayal and uncertainty. The exchange not only shifts the blame for the attack
    but also fractures the fragile trust between Picard and Ro, while hinting at a
    conspiracy that extends beyond Bajoran militants and Starfleet’s official narrative.
    The moment is a turning point, where Picard’s moral certainty is challenged and
    the mission’s true stakes become clear: someone is manipulating all parties, and
    the Federation’s role in the conflict may be far more compromised than he realized.'
