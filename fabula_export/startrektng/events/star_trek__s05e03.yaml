  - object_uuid: ger_object_b6382767d215
    description_of_involvement: The Cardassian Galor-class warships (Type 3) are the
      primary antagonists in this event, their presence and actions driving the escalation
      of tension. Data detects them moving parallel to the *Enterprise*’s course,
      and Worf identifies them as fully armed and ready for combat. Their crossing
      of the Federation border with weapons active forces Picard to declare a red
      alert, and their hail—led by Gul Dolak—accuses the Bajoran vessel of being a
      'terrorist carrier.' The ships serve as a physical manifestation of Cardassian
      aggression, their weapons and ultimatum creating an immediate and deadly threat.
      Their role is to provoke, intimidate, and, if necessary, destroy, making them
      the most direct obstacle to the *Enterprise*’s mission and the Bajoran settlers’
      safety.
    status_before_event: Operating within Cardassian space, moving parallel to the
      *Enterprise*’s course, weapons powered down but ready for activation. Their
      presence is a deliberate provocation, a test of Federation resolve.
    status_after_event: Crossing the Federation border with weapons active, having
      issued an ultimatum to the *Enterprise*. Their status is now openly hostile,
      with the potential for immediate violence if Picard does not comply.
