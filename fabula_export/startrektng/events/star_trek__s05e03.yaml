  - 'RO: Ensign Ro. Sir.'
  - 'PICARD: I beg your pardon?'
  - 'RO: The Bajoran custom has the family name first, the individual''s second. I
    am properly addressed as Ensign Ro.'
  - 'PICARD: I am fully aware of your Starfleet record, your problems on other ships,
    the incident on Garon Two that led to your court martial. I feel it only fair
    to inform you that I am personally concerned about your presence on this most
    critical mission...'
  - 'RO: I don''t want to be here any more than you want me to be here. Sir.'
