  title: Away team captured in cave ambush
  description: |2

    The away team materializes in the moon caves, phasers drawn, only to find no immediate signs of activity. Data detects molecular displacement traces suggesting recent movement, while Picard orders a standard search pattern. As the team spreads out, Troi picks up energy fluctuations and attempts to warn Picard via combadge, but her transmission goes unanswered. When Data and Troi return to Picard and Worf’s position, they discover them already bound and gagged at phaser-point by Bajoran terrorists. The terrorists emerge from the shadows, forcing Data and Troi to surrender their weapons and submit to capture. The entire team is now held hostage, their vulnerability exposing the mission’s fragility and setting up a high-stakes confrontation with the extremists.

    This moment serves as a narrative turning point, shifting the dynamic from investigation to crisis. The failed warnings—both Data’s technical readings and Troi’s empathic alerts—underscore the team’s unpreparedness, while the ambush itself reveals the Bajoran militants’ tactical advantage. The capture also raises questions about Ro’s loyalties, as her absence and the extremists’ presence suggest deeper connections to the conspiracy unfolding on Valo Three.
