  global_id: null
  title: Ro challenges Holza as a Bajoran contact
  description: In the Observation Lounge, Data proposes meeting Jas Holza, a Bajoran
    leader with diplomatic experience, as a potential contact for the mission. Beverly
    vouches for Holza’s competence, recalling his charm and leadership from a past
    symposium. Picard, impressed by Holza’s credentials, orders Data to arrange a
    meeting and sets a course for Valo Three. Ro, visibly uncomfortable, interrupts
    to dismiss Holza as a token figure with no real influence among Bajorans. She
    warns that the mission will likely end in violence, given the desperation of the
    Bajoran people. When pressed, she suggests Keeve Falor—a pragmatic but undiplomatic
    leader in a refugee camp on Valo Two—as a more viable alternative. The exchange
    exposes Ro’s divided loyalties, her frustration with Starfleet’s approach, and
    her deep-seated knowledge of Bajoran politics, while Picard’s measured response
    underscores his willingness to trust her expertise despite her defiance. The tension
    between Federation protocol and Bajoran realities becomes palpable, setting up
    the away team’s next steps and foreshadowing the moral and tactical dilemmas ahead.
