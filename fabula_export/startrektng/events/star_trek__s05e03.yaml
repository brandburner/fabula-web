- fabula_uuid: cand_evt_scene_4edc487650ef7f2a_02
  global_id: null
  title: Picard exposes Kennelly’s conspiracy
  description: "\n  On the *Enterprise* bridge, Picard methodically dismantles Admiral\
    \ Kennelly’s accusations against Bajor by revealing the Solarion Four attack was\
    \ a Cardassian setup. After the Cardassians destroy an unmanned Bajoran vessel—orchestrated\
    \ as a false-flag operation—Picard uses forensic evidence (subspace relay control,\
    \ lack of warp capability in Orta’s ships) to expose Kennelly’s prejudiced assumptions.\
    \ The confrontation forces Kennelly to confront his complicity in the Cardassian\
    \ plot, while Ro’s intelligence and Picard’s moral clarity shift blame from Bajor\
    \ to the Cardassians. The scene escalates institutional bias against Picard’s\
    \ moral clarity, tests Ro’s loyalty, and sets up a crisis in Federation-Cardassian\
    \ relations. Kennelly’s stunned reaction—‘The Cardassians. Why?’—underscores his\
    \ blind adherence to anti-Bajoran narratives, while Picard’s calm logic exposes\
    \ the conspiracy’s fragility. The exchange reveals Kennelly as a pawn in a larger\
    \ Cardassian scheme, with Ro’s role in uncovering the truth further solidifying\
    \ her dual identity as both Bajoran and Starfleet officer.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e03
  scene_sequence: 24
  sequence_in_scene: 44
  key_dialogue:
  - 'PICARD: The Bajorans did not attack Solarion Four.'
  - 'KENNELLY: Is that what Orta told you?'
  - 'PICARD: Yes. Orta''s ships are old and obsolete. They do not have warp capabilities.
    They could not have reached another star system... let alone attack one.'
  - 'PICARD: I would suggest you ask your friend the Cardassian liaison, Admiral.
    The only explanation I can think of is that the Cardassians staged it.'
