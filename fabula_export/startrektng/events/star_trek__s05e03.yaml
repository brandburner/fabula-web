  key_dialogue: &id005
  - 'PICARD: ((V.O.)) Now I see how history has rewarded them...'
  - 'RO: This used to be me.'
  - 'KEEVE: You were innocent bystanders for decades as the Cardassians took our homes...
    as they violated and tortured our people in the most hideous ways imaginable...
    as we were forced to flee...'
  - 'PICARD: I''m not here to debate Federation policy. I am prepared to offer assistance...'
  - 'RO: I couldn''t. And I wouldn''t. That''s one reason why I ran away. They are
    lost... defeated... I will never be.'
