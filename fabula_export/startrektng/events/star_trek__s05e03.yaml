  title: Picard orders Cardassian border surveillance
  description: Following Kennelly’s approval of the Bajoran escort mission, Picard
    subtly reinforces Ro’s value to the crew while probing Kennelly’s ambiguous ties
    to the Cardassians. After dismissing the admiral, Picard turns to Data and orders
    heightened monitoring of the Cardassian border—a directive that foreshadows impending
    Cardassian intervention and underscores Picard’s strategic foresight. The exchange
    with Kennelly, marked by Picard’s pointed inquiry about the admiral’s ‘Cardassian
    virus,’ hints at deeper distrust, while Ro’s silent presence at conn reinforces
    her dual role as both Starfleet officer and Bajoran insider. The scene pivots
    from diplomatic formality to tactical vigilance, setting the stage for escalating
    tensions with the Cardassians and the Bajoran militants aboard the carrier.
