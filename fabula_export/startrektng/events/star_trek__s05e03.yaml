  global_id: null
  title: Ro Confesses Kennelly’s Covert Mission
  description: In the *Enterprise* ready room, Ensign Ro—escorted by Guinan—admits
    under duress to Admiral Kennelly’s covert directive to arm Bajoran militant Orta
    with Starfleet resources. Ro reveals Kennelly’s plan to bypass Federation diplomacy,
    offering weapons and ships to Orta in exchange for ending terrorism against the
    Federation. The confession forces Picard to confront Ro’s divided loyalties and
    the Federation’s complicity in escalating tensions. Ro’s traumatic childhood memory
    of her father’s torture at Cardassian hands surfaces, exposing her internal conflict
    between Bajoran identity and Starfleet duty. Picard, recognizing the ethical dilemma,
    decides to use Ro’s connection to Orta to uncover the truth behind the Solarion
    Four attack, while subtly aligning Ro with the *Enterprise* crew’s moral compass.
    The scene pivots from confrontation to cautious alliance, setting up a shift in
    Ro’s allegiance and Picard’s strategic response to Kennelly’s conspiracy.
