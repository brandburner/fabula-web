  key_dialogue: &id007
  - 'KEEVE: Because you are innocent bystanders. ... and the Federation is pledged
    not to interfere in the internal affairs of others. How convenient it must be
    for you. To turn a deaf ear to those who suffer behind a line on a map.'
  - 'PICARD: We have had our own problems with the Cardassians... now that there is
    a treaty, we are in a position to help. Your people have been forced to resettle
    all over the quadrant. We can make a legitimate case with the Cardassians that
    this is no longer an isolated problem. We will work diplomatically on your behalf...
    but first the terrorist attacks must end.'
  - 'RO: The blankets were helpful... nothing I said mattered.'
