      or manipulation in the crisis.
    power_dynamics: Operating as a dominant military and political force in the region,
      with the ability to shape the outcomes of conflicts through direct action or
      indirect influence (e.g., supporting or undermining the Bajoran militants).
      The Cardassian Union’s power dynamics create a sense of instability, as the
      *Enterprise* must navigate the sector’s volatile politics while responding to
      the immediate threat.
    organizational_goals:
    - Maintain control over the sector and its resources, potentially using the Bajoran
