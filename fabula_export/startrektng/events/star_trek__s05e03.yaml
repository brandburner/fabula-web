  key_dialogue:
  - 'DATA: There are dozens of Bajoran camps on the three M-class planets. I suggest
    we may want to begin on Valo Three, where an ad hoc leader named Jas Holza lives.
    The Federation has had several dealings with him...'
  - 'RO: Holza is nobody. He''s the token Bajoran that ''respectable people...'' invite
    to symposiums and diplomatic soirees. But he has no real influence among my people.'
  - 'RO: Don''t you understand? These are desperate people. Ready to martyr themselves.
    They don''t want to talk... It will be. Don''t fool yourself. This mission will
    end in bloodshed.'
  - 'RO: I would go to the camp on the southern continent of Valo Two... find a man
    named Keeve Falor. He has no diplomatic experience. And he won''t ask you to dance.'
