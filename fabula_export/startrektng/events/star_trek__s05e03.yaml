      \ Starfleet logo—a brief, almost ironic nod to the institution Ro is betraying—the\
      \ monitor transitions seamlessly to Kennelly’s image, its screen casting a cold,\
      \ blue glow that illuminates Ro’s face and underscores the secrecy of their\
      \ interaction. The monitor’s hum is a low, persistent sound, like a metronome\
      \ counting down the seconds of Ro’s compliance. Its encrypted channel ensures\
      \ privacy, but the very act of using it to bypass Starfleet protocols transforms\
      \ it from a tool of communication into an instrument of subversion. The monitor’s\
      \ glow also serves as a visual metaphor: it lights up the shadows in Ro’s quarters,\
      \ revealing the darkness of her divided loyalties.\n      "
