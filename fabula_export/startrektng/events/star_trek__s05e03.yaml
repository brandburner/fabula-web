      low lighting, the close seating). It is here that Ro’s Bajoran identity collides
      with Starfleet’s institutional power, and where Guinan’s moral guidance bridges
      the gap. The room’s enclosed nature amplifies the emotional weight of Ro’s confession,
      making it impossible for Picard to retreat into bureaucratic detachment. The
