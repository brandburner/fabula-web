- fabula_uuid: cand_evt_scene_efaab47365ea04a3_01
  global_id: null
  title: Kennelly orders covert Bajoran capture mission
  description: Admiral Kennelly, visibly ailing from a Cardassian-transmitted illness,
    meets with Picard in the Observation Lounge to discuss the Bajoran terrorist attack
    on Solarion Four. Kennelly reveals the splinter group is led by Orta, a militant
    demanding attention for Bajor’s displaced population. Despite Picard’s skepticism
    about diplomatic channels, Kennelly orders him to locate Orta and persuade him
    to surrender under amnesty—an ambiguous directive that hints at coercive tactics.
    Kennelly’s insistence on ‘getting him back on the reservation’ and his evasive
    language about ‘legitimate means’ suggest a hidden agenda, while his physical
    vulnerability (sneezing, massaging his head) contrasts with his authoritative
    demands. The scene establishes the mission’s moral ambiguity and sets up Picard’s
    conflict between Starfleet’s ideals and Kennelly’s opaque orders, while foreshadowing
    Ro’s later role as a Bajoran insider with divided loyalties. The tension escalates
    when Riker interrupts via comm, hinting at further disruptions to the mission’s
    execution.
