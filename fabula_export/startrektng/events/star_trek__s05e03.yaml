  key_dialogue:
  - 'PICARD: Ro Laren? From the Wellington?'
  - 'KENNELLY: I wrote the orders. I thought she''d be valuable to you.'
  - 'PICARD: Admiral... respectfully... I would appreciate some consulting rights
    on the assignment of a new officer... especially someone with the record of Ro
    Laren...'
  - 'KENNELLY: She''s Bajoran.'
  - 'PICARD: There are other Bajorans in Starfleet... assign one of them...'
  - 'KENNELLY: I''ve discussed this situation with her. I''m convinced she''s the
    right one for the job...'
  - 'PICARD: After what happened at Garon Two, she has no business serving on any
    starship as far as I''m concerned... let alone the flagship, my ship...'
  - 'KENNELLY: You''re taking her... it''s all arranged... you have no idea how difficult
    it was to get her out of prison.'
  - 'PICARD: It''s that important to you...'
  - 'KENNELLY: It''s that important. To the mission.'
  - 'PICARD: Picard to Riker.'
  - 'RIKER''S COM VOICE: Sir... ?'
  - 'PICARD: Proceed with the transport.'
  - 'PICARD: Admiral, I hope neither of us regrets this.'
  - 'KENNELLY: You can handle her, Captain. If anyone can.'
