      moment. The bridge’s curved design and central viewscreen create a sense of
      isolation and focus, reinforcing the crew’s unity in the face of the Cardassian
      threat. It is here that Picard makes his stand, here that the fate of the Bajoran
      settlers is decided, and here that the *Enterprise*’s defiance is born.
