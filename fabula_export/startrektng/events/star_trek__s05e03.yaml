  - object_uuid: ger_object_f9314e89572e
    description_of_involvement: 'The contraband weapons promised to Orta are never
      physically present in the scene, but they are the emotional and narrative fulcrum
      of Ro’s confession. She describes them as ‘things that could really make a difference
      against the Cardassians,’ her voice tinged with both pride and shame. The weapons
      symbolize the moral ambiguity of Ro’s position: they are a tool for liberation
      in her eyes, but a violation of Starfleet’s principles in Picard’s. Their absence
      in the room makes them all the more potent—a specter of the choices Ro has already
      made and the consequences she now faces. Picard’s horror at the idea (‘Arming
      these people would be a violation of all that the Federation stands for’) underscores
      the stakes: this is not just about Ro’s loyalty, but the soul of the Federation
      itself.'
    status_before_event: Hypothetically secured by Kennelly, awaiting Ro’s delivery
      to Orta. Their existence is a ticking clock, a promise that could either save
      Bajor or doom Ro’s career.
    status_after_event: Their fate is now tied to Picard’s strategy. If Ro persuades
      Orta to cooperate, the weapons may never be delivered; if not, they could become
      a catalyst for escalating violence.
