- fabula_uuid: cand_evt_scene_8b3b697f10c41a6f_01
  global_id: null
  title: Ro challenges Picard’s Bajoran contact choice
  description: 'In the observation lounge, Data proposes meeting Jas Holza—a Bajoran
    leader with diplomatic experience—on Valo Three, citing his prior dealings with
    the Federation. Beverly vouches for Holza’s character, recalling his competence
    and charm at a symposium. Picard, impressed by Holza’s diplomatic background,
    approves the plan and orders the *Enterprise* to set course for Valo Three. However,
    Ro abruptly interrupts, dismissing Holza as a token figure with no real influence
    among Bajoran militants. She warns that the mission risks escalating into violence,
    as the Bajorans they seek are desperate and prone to martyrdom. When Data asks
    for an alternative, Ro reluctantly suggests Keeve Falor—a pragmatic but undiplomatic
    leader in a refugee camp on Valo Two—while subtly hinting at her own conflicted
    loyalties. The exchange exposes the tension between Starfleet’s structured approach
    and Ro’s firsthand knowledge of Bajoran extremism, foreshadowing the mission’s
    potential for failure and the friction between Picard’s authority and Ro’s skepticism.
    The moment also underscores Ro’s internal struggle: her Bajoran heritage clashes
    with her Starfleet duty, and her warnings carry the weight of someone who may
    know more than she reveals.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e03
  scene_sequence: 8
  sequence_in_scene: 11
  key_dialogue:
  - 'DATA: There are dozens of Bajoran camps on the three M-class planets. I suggest
    we may want to begin on Valo Three, where an ad hoc leader named Jas Holza lives.
    The Federation has had several dealings with him...'
  - 'RO: You''re wasting your time. Holza is nobody. He''s the token Bajoran that
    ''respectable people...'' invite to symposiums and diplomatic soirees. But he
    has no real influence among my people.'
  - 'RO: Don''t you understand? These are desperate people. Ready to martyr themselves.
    They don''t want to talk... It will be. Don''t fool yourself. This mission will
    end in bloodshed.'
