      of Cardassian power and the risks of colonization near their borders.
    - By creating a climate of distrust and instability, where the Bajoran militants’
      actions (whether genuine or manipulated) force Starfleet to react in ways that
      may benefit Cardassian interests.
    institutional_impact: The Cardassian Union’s presence in the sector adds a layer
