  title: Away Team Captured by Bajoran Extremists
  description: The away team—Picard, Worf, Data, and Troi—materializes in the moon
    caves to investigate recent activity, only to find the environment eerily quiet.
    Data detects molecular displacement traces, suggesting recent movement, while
    Troi picks up energy fluctuations, hinting at an impending threat. When Troi and
    Data attempt to warn Picard and Worf via combadge, their transmissions go unanswered.
    As they regroup, they round a bend and discover Picard and Worf already bound
    and held at phaser-point by Bajoran terrorists. The extremists swiftly overpower
    Data and Troi, forcing them to surrender their weapons and submit to capture.
    The scene ends with the entire away team now hostage, their mission compromised
    and the Federation’s diplomatic leverage severely undermined. This reversal exposes
    the crew’s vulnerability in Bajoran territory and sets up a precarious hostage
    scenario, where Ro’s loyalties will become a critical wildcard in the unfolding
    crisis. The tension escalates as the team’s preparedness is tested, and the mission’s
    fragile stability collapses under the weight of the ambush.
