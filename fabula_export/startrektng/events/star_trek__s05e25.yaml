- fabula_uuid: act_14f735e2273fcf46
  number: 3
  summary: 'Twelve years later on Kataan, Kamin''s family has grown. He plays a lullaby
    on his flute to his infant son, Batai, during a naming ceremony, expressing his
    newfound joy in fatherhood, a stark contrast to his earlier belief that he didn''t
    need children. Suddenly, Kamin experiences a sharp, agonizing pain and collapses.
    On the Enterprise, Picard''s vital signs plummet, and Dr. Crusher frantically
    works to save him, ordering Data to reestablish the beam. Data restores the connection,
    and Picard stabilizes, his life hanging in the balance. Ten more years pass on
    Kataan. Kamin''s daughter, Meribor, now sixteen, has followed in his scientific
    footsteps. Her analysis of soil samples reveals a grim truth: the planet is dying,
    beyond the scope of a mere drought. Kamin, though anguished, tries to shield her
    from the painful reality, but Meribor, guided by his own teachings, insists on
    confronting the truth. She resolves to marry her beloved, Dannick, sooner rather
    than later, prompting Kamin to impart the wisdom to ''Live now.'' On the Enterprise,
    Geordi''s probe traces the alien probe''s origin to the Silarian sector, specifically
    a star system named Kataan. Data confirms Kataan is an unmapped system whose star
    went nova, destroying all life approximately one thousand years ago, leaving Riker
    to grasp the profound implications of this discovery.'
  key_moments: []
  scene_numbers:
  - 11
  - 12
  - 13
- fabula_uuid: act_8eee4e840b9a619f
  number: 4
  summary: 'Another ten years pass on Kataan, bringing the total to thirty-two years
    since Picard''s arrival. The symbolic tree in the town square is now dead, reflecting
    the worsening ecological crisis. Kamin, now an older man, continues his astronomical
    observations. His son, Young Batai, now twenty, announces his decision to leave
    school to pursue music, a path Kamin initially resists, wishing for his son to
    find more focus. However, Kamin ultimately accepts Batai''s choice, reflecting
    on the limited time anyone might have to follow their dreams. The next day, Kamin
    confronts the Administrator, who has also aged significantly, about the planet''s
    dire state. The Administrator reveals that their scientists reached the same conclusions
    two years prior but kept it secret to prevent chaos. He dismisses Kamin''s suggestions
    for evacuation or preserving genetic samples, vaguely mentioning a ''plan in the
    works.'' As Kamin presses for action, Young Batai rushes in, pale and breathless,
    with urgent news: ''It''s mother. Hurry.'' Kamin races home to find Eline gravely
    ill. She makes a wry joke, then asks about his meeting with the Administrator,
    before making a final, tender request for him to put his shoes away. Eline dies
    peacefully, leaving Kamin to bury his head in her blanket, consumed by grief.'
