      for the *Enterprise*)
    - Regain his Starfleet identity (clinging to protocols, refusing to accept 'Kamin'
      as his name)
    - Understand his surroundings (demanding answers from Eline, scanning the room
      for clues)
    what_happened: "\n        Picard awakens seated in an unfamiliar chair, his body\
      \ weak and feverish, his mind struggling to reconcile the domestic surroundings\
      \ with his last memory: the *Enterprise* bridge. He rises unsteadily, scanning\
