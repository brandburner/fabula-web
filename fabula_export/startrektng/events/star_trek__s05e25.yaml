- fabula_uuid: cand_evt_scene_b768b98ed2ff1558_01
  global_id: null
  title: Kamin confronts Batai’s defiance
  description: In the quiet intimacy of their courtyard at night, Eline’s playful
    yet pointed remark about Picard’s absentmindedness—leaving his shoes out—sets
    the tone for their decades-long domestic rhythm, where his absorption in work
    (both as Kamin and, implicitly, his Starfleet past) contrasts with her grounded
    presence. Their exchange over the telescope reveals Eline’s frustration with his
    obsession, a microcosm of their emotional distance. The tension escalates when
    Picard’s reaction to Batai’s flute playing exposes his unspoken disapproval of
    his son’s lack of focus. Batai’s confession that he’s leaving school to pursue
    music forces Picard to confront his own rigid expectations, culminating in a moment
    of reluctant acceptance. Eline’s observation about Picard’s consistency—his refusal
    to stay silent about the planet’s decline despite personal cost—underscores the
    unbridgeable gap between his duty-driven nature and the fluidity of life around
    him. The scene crystallizes the passage of time, the generational divide, and
    the inevitability of change, all while hinting at the larger looming crisis of
    Kataan’s fate.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e25
  scene_sequence: 16
  sequence_in_scene: 33
  key_dialogue: &id017
  - 'ELINE: I put your shoes away for you again.'
  - 'PICARD: Fine. Then maybe you''ll sit down and rest the way you''re supposed to.'
  - 'ELINE: You treat me like some frail flower. People have surgery all the time.'
  - 'PICARD: He loves doing a lot of things—too many. One week he wants to be a botanist,
    the next week a sculptor. I wish he could find some focus in his life.'
  - 'YOUNG BATAI: I''m leaving school. I want to concentrate on my music. It''s what
    I care about.'
  - 'PICARD: We''ll... we''ll discuss it.'
  - 'ELINE: Even after all these years... you have the ability to surprise me.'
  - 'PICARD: The evidence is too pronounced. I can''t stay silent.'
