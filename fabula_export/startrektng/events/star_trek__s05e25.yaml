  title: Eline reveals Kataan’s extinction and Picard’s legacy
  description: "\n  In the town square, Picard—now Kamin—sits with Meribor as the\
    \ townspeople gather to witness the launch of a missile. Confused, Picard questions\
    \ why he was excluded from the knowledge of the launch, only for Meribor and Batai\
    \ to reveal that he has already witnessed this moment decades earlier. As the\
    \ probe ascends into the sky, Eline appears, confirming the devastating truth:\
    \ Kataan’s civilization has been extinct for a thousand years, and Picard is the\
    \ sole living vessel of their memory. She urges him to embrace his role as the\
    \ storyteller, ensuring their legacy endures beyond oblivion. The moment crystallizes\
    \ the probe’s tragic purpose—it was never a beacon of hope but a desperate attempt\
    \ to preserve a doomed civilization’s story through a future recipient. Picard’s\
    \ dual identity as both Kamin and Picard becomes the axis of this existential\
    \ burden, marking a turning point where he must confront his role as both witness\
    \ and guardian of a lost world.\n  "
