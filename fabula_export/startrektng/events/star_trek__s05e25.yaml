- fabula_uuid: cand_evt_scene_c65344128ec0a890_01
  global_id: null
  title: Picard learns the probe’s true purpose
  description: "\n  In the town square, Picard—now Kamin—confronts Meribor and Batai,\
    \ who reveal that the probe’s launch is not a hopeful act but a desperate, cyclical\
    \ mission to preserve Kataan’s memory. Picard, disoriented, struggles to reconcile\
    \ this revelation with his fragmented recollections of the future. Eline appears,\
    \ confirming that Kataan’s civilization has been extinct for a thousand years\
    \ and that Picard is the sole living vessel of their legacy. The probe’s launch\
    \ is exposed as a vessel of memory, designed to carry the weight of a doomed civilization’s\
    \ final testament to a future recipient—Picard himself. The moment forces Picard\
    \ to confront his role as both witness and guardian of Kataan’s story, deepening\
    \ the tragedy of their extinction and the burden of his newfound purpose.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e25
  scene_sequence: 21
  sequence_in_scene: 43
  key_dialogue:
  - 'PICARD: Did everyone know about this except me?'
  - 'MERIBOR: You know about it, father. You''ve already seen it.'
  - 'BATAI: Yes, you have, old friend... Don''t you remember? You saw it... just before
    you came here. We hoped our probe would encounter someone in the future—someone
    who could be a teacher... who could tell others about us.'
  - 'ELINE: The rest of us have been gone for a thousand years... If you remember
    what we were, and how we lived... then we''ll have found life again.'
  - 'ELINE: Now we live. In you. Tell them of us... my darling...'
