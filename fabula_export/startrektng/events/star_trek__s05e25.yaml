              The nucleonic beam is the direct weapon of the probe's assault, an invisible energy stream that slices through the Enterprise's shields despite their raised status. It locks onto Picard with unerring precision, causing physiological upheaval—convulsions, synaptic failure, and a surge of neurotransmitters—that triggers his collapse. The beam's most striking effect is its ability to dissolve Picard's vision into a kaleidoscope of colors, violently wrenching his consciousness from the Enterprise bridge to Kataan. The beam is not merely a physical attack but a metaphysical invasion, erasing the boundaries between Picard and Kamin and setting in motion his transformation. Its effects are irreversible and profound, marking the beginning of his fractured identity.
    status_before_event: |2-

              The nucleonic beam is emitted from the probe as a low-level particle stream, scanning the shield's perimeter. It is undetected by standard sensors until Worf identifies its penetration of the shields, at which point it intensifies and locks onto Picard.
    status_after_event: |2-

              The beam dissipates after striking Picard, its purpose fulfilled. The colors it generates fade as Picard's consciousness stabilizes on Kataan, leaving no physical trace on the Enterprise. However, its metaphysical effects—Picard's collapse and the transfer of his mind—linger as a lasting disruption to his reality.
