  global_id: null
  title: Probe strike collapses Picard’s reality
  description: "\n  The *Enterprise* bridge crew enjoys a rare moment of camaraderie\
    \ as Picard recounts a humorous anecdote about Admiral Gustafson’s operatic endurance.\
    \ The lighthearted exchange is abruptly shattered when Worf detects an unidentified\
    \ probe matching their course. Data identifies it as an ancient ceramic alloy\
    \ construct, while Worf warns of a nucleonic beam penetrating their shields. Before\
    \ Picard can issue further orders, the beam strikes him directly, causing him\
    \ to collapse unconscious. As Riker rushes to catch him, Picard’s vision dissolves\
    \ into a kaleidoscope of colors before resolving into the face of Eline, a woman\
    \ who greets him as her husband. This moment marks the catastrophic rupture of\
    \ Picard’s identity—his Starfleet reality unravels in an instant, replaced by\
    \ the unfamiliar life of Kamin on Kataan. The event serves as a narrative fulcrum,\
    \ transitioning Picard from his known existence into a decades-long alien identity,\
    \ while leaving the *Enterprise* crew in stunned disarray, unaware of the probe’s\
    \ true purpose or the fate of their captain.\n  "
