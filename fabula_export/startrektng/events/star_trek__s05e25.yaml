- fabula_uuid: act_c3693b0dd487445b
  number: 2
  summary: On the Enterprise, Dr. Crusher examines the unconscious Picard, finding
    hyperactive fibrogenic activity and off-scale neurotransmitter production, but
    no physical injury. Data reports the probe's nucleonic beam is now a narrow, reciprocating
    band focused directly on Picard, and cannot be blocked or evaded as the probe
    maintains a tethered position. Riker considers destroying the probe, but Crusher
    advises against it due to unknown risks. Meanwhile, on Kataan, five years have
    passed. Picard, now fully integrated as Kamin, continues his scientific observations,
    charting the sun's movements, yet still clings to fragmented memories of his Starfleet
    life. Eline confronts him, expressing her deep frustration and loneliness, urging
    him to fully embrace their life together and start a family. Kamin, pained by
    her words, acknowledges her patience and love, and, in a pivotal moment, asks
    her permission to build a nursery. Eline is overjoyed, and they share a tender
    embrace, signifying Kamin's commitment to his life on Kataan. Back on the Enterprise,
    Geordi discovers traceable residue on the probe, suggesting a point of origin.
    Data proposes disrupting the beam. Riker, weighing the risks, decides to proceed,
    ordering Data to prepare to cut the connection, despite Crusher's continued uncertainty
    about the potential consequences.
