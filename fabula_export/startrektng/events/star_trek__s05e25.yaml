    immediate destruction of the probe, but Beverly’s medical scans reveal no physical
    trauma—only hyperactive neurotransmitter production and fibrogenic activity, suggesting
    the probe is rewriting Picard’s biology at a cellular level. When Riker orders
    a retreat, the probe mirrors the Enterprise’s movement, proving it is not merely
    tracking Picard but *bound* to him. Beverly’s realization—that the probe is tethered
    to Picard like a leash—shifts the crew’s understanding from external threat to
    something far more intimate and sinister, deepening the mystery of his connection
    to Kataan’s fate. The tension escalates as the crew grapples with the implications:
    the probe isn’t just studying Picard; it is *claiming* him.'
