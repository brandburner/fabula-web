      and his dialogue with Eline. The Council represents the institutional power
      that both enables and constrains Picard’s actions: as a member, he is privy
      to the truth about the supernova, but his role also binds him to a system that
      suppresses this knowledge from the public. The Council’s policies—particularly
      its secrecy—create the tension that underpins Picard’s frustration with Batai:
      his son’s defiance mirrors the larger rebellion against institutional control
      that Picard himself is poised to undertake. The Council’s shadow looms over
      the courtyard, a reminder that personal choices, no matter how profound, are
      made within a system that is itself doomed.'
    active_representation: 'Through Picard’s internal monologue and his conversation
      with Eline about the Administrator. The Council is embodied in Picard’s dilemma:
      whether to challenge its authority (by revealing the truth) or to remain complicit
      in its silence.'
    power_dynamics: Picard is both a participant in and a potential threat to the
      Council’s power. His scientific observations give him authority, but his moral
      convictions place him in opposition to the Council’s policies. The Council’s
      power is exercised through secrecy and institutional inertia, while Picard’s
      power lies in his knowledge and his willingness to use it—even at personal cost.
    organizational_goals:
