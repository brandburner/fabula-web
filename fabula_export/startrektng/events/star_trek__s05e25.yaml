- fabula_uuid: act_2bf44277756d4195
  number: 5
  summary: On the Enterprise, Dr. Crusher observes alarming physiological alterations
    in the unconscious Picard, noting metabolic rates consistent with an eighty-year-old
    man. The scene shifts back to Kataan, where Kamin, now eighty-five and frail,
    playfully chases his six-year-old grandson, Kamie, who is Meribor's son. Meribor,
    now in her mid-thirties, and Young Batai, now thirty, enter, announcing it's time
    to witness 'the launching.' Kamin, initially resistant, is led to the town square.
    Meribor tells him he already knows about the launching, and his old friend Batai
    appears, revealing that Kamin saw it 'just before you came here.' Batai explains
    that their probe was launched to encounter someone in the future—a teacher who
    could tell others about their lost civilization. Kamin slowly comprehends that
    he is that chosen individual. Eline, appearing as she was in Act Two, along with
    Meribor, Batai, Young Batai, and other townfolk, explain that they have been gone
    for a thousand years. Eline tells Kamin that their civilization will 'live in
    you' if he remembers them. As Kamin reaches out to her, a deep rumble sounds,
    and he watches a glowing missile, the very probe that struck him, launch into
    the sky. Back on the Enterprise, Picard stirs, regaining consciousness. Data announces
    the nucleonic beam has ceased. Picard, disoriented, struggles to reconcile the
    brief twenty-five minutes on the Enterprise with the lifetime he just lived on
    Kataan. Riker presents him with a metal box found inside the probe, containing
    Kamin's flute. Picard takes the flute to his quarters and plays the familiar lullaby,
    now a poignant symbol of a profound life lived and a lost civilization whose memory
    he now carries.
