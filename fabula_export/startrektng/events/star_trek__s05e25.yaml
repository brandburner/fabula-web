acts:
- fabula_uuid: act_3f2469f8ed0608d6
  number: 1
  summary: The Enterprise crew enjoys a light-hearted moment, with Captain Picard
    recounting a lengthy opera experience, before sensors detect an unusual, foreboding
    alien probe. The probe fires a nucleonic beam that penetrates the ship's shields,
    causing Picard to stagger and collapse, losing consciousness. He awakens disoriented
    in a strange, rustic home, where a woman named Eline calls him 'Kamin' and claims
    to be his wife. Picard, suffering from apparent amnesia, attempts to use Starfleet
    commands, which fail. He explores the alien dwelling and ventures outside into
    a foreign town, Ressik, on the planet Kataan. He meets Batai, the Council leader,
    who attributes Picard's confusion to a fever-induced memory loss. Playing along,
    Picard gathers information, learning of his life as an iron weaver and his passion
    for playing the flute, an instrument he finds entirely unfamiliar. The emotional
    core of this act deepens as Eline expresses her unwavering love and pain over
    his forgotten memories. The act culminates with Picard discovering a medallion
    on Eline, an exact miniature of the probe that struck him, hinting at the true
    nature of his experience. The scene then cuts back to the Enterprise, where Riker
    attends to the unconscious Picard, calling for medical assistance.
  key_moments: []
  scene_numbers:
