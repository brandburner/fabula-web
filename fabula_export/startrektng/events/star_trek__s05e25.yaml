    - By leveraging Picard’s sense of duty and his fear of causing public chaos, thereby
      keeping him (temporarily) in line.
    - By creating a culture of compliance, where even those who know the truth (like
      Picard) are pressured to remain silent.
    institutional_impact: The Council’s influence is a backdrop to the personal conflict,
