    global_id: ger_object_61defef6c725
  - object_uuid: ger_object_2f9281dde56a
    description_of_involvement: "\n        The unidentified alien probe is the catalyst\
      \ for the event, detected by Worf as it matches the *Enterprise*'s course. Data\
      \ identifies it as an ancient ceramic alloy construct composed of paricium and\
      \ talgonite, an unusual material not found in Starfleet records. The probe emits\
      \ a nucleonic beam that penetrates the *Enterprise*'s shields, despite Riker's\
      \ orders to raise defenses. This beam locks onto Picard, striking him directly\
      \ and causing his collapse. The probe's mysterious origin and advanced technology—despite\
      \ its seemingly primitive composition—highlight its significance as a harbinger\
      \ of the catastrophic rupture in Picard's identity. Its role in the event is\
      \ both a physical threat and a narrative device, serving as the mechanism that\
      \ transports Picard's consciousness to Kataan.\n      "
    status_before_event: "\n        The probe is detected 22,000 kilometers off the\
      \ *Enterprise*'s port quarter, matching the ship's course and holding a relative\
      \ position. It is unarmed but emits a low-level nucleonic beam, which penetrates\
      \ the shields and strikes Picard.\n      "
    status_after_event: "\n        The probe vanishes after striking Picard, leaving\
      \ the *Enterprise* crew stunned and unaware of its true purpose or the fate\
      \ of their captain. Its disappearance underscores its enigmatic nature and the\
      \ irreversible transformation it has set in motion.\n      "
    global_id: ger_object_2f9281dde56a
  - object_uuid: ger_object_dd451361cdb3
    description_of_involvement: "\n        The nucleonic beam emitted by the unidentified\
      \ probe is the direct cause of Picard's collapse and the rupture of his identity.\
      \ The beam penetrates the *Enterprise*'s shields despite their raised status,\
      \ locking onto Picard with a narrow, unbreakable tether. It triggers a physiological\
      \ upheaval in Picard—convulsions, synaptic failure, surging neurotransmitters,\
      \ and fibrogenic activity—while dissolving his vision into a kaleidoscope of\
      \ colors. This visual and physical assault on Picard's body and mind serves\
      \ as the mechanism that transports his consciousness to Kataan, where he awakens\
      \ as Kamin. The beam's unusual particle stream, noted by Data, underscores its\
      \ advanced and mysterious nature, making it a pivotal object in the event's\
      \ narrative and thematic significance.\n      "
    status_before_event: "\n        The nucleonic beam is emitted by the probe as\
      \ an invisible energy stream, scanning the *Enterprise*'s shields and preparing\
      \ to lock onto a target.\n      "
    status_after_event: "\n        The nucleonic beam dissipates after striking Picard,\
      \ leaving him unconscious and his consciousness transported to Kataan. Its effect\
      \ is irreversible, marking the beginning of Picard's transformation into Kamin.\n\
      \      "
    global_id: ger_object_dd451361cdb3
