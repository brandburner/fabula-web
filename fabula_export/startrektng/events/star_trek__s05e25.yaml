    \ true purpose, one that implicates the destruction of Kataan and the civilization\
    \ he came to love. The moment hinges on his weakened but insistent voice—‘I have\
    \ a great deal to tell you’—a line that carries the weight of a man who has lived\
    \ decades in minutes and now must act before time unravels further. The crew’s\
    \ puzzled reactions underscore the stakes: Picard isn’t just recovering; he’s\
    \ returning with a warning.\n  "
