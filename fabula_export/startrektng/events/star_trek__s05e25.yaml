- fabula_uuid: cand_evt_scene_c65344128ec0a890_03
  global_id: null
  title: Picard learns his role as Kataan’s legacy
  description: 'In the town square, Picard—now fully immersed in his Kamin identity—confronts
    the truth of Kataan’s extinction and his own role as the civilization’s unwitting
    guardian. Meribor hints at his forgotten knowledge of the probe, while Batai confirms
    that Picard is the future recipient of their message. Eline, appearing as she
    did in their shared past, reveals that their entire civilization has been dead
    for a thousand years, and that Picard’s memories of Kataan are the only remnants
    of their existence. As the probe’s symbolic missile launches into the sky, Eline
    entrusts him with the burden of preserving their story, forcing Picard to reconcile
    his dual identity—both as Kamin, the iron weaver who lived and loved on Kataan,
    and as Picard, the Starfleet captain who will carry their legacy forward. The
    moment crystallizes the probe’s tragic purpose: not destruction, but a desperate
    plea for remembrance across time. Picard’s realization—that he is the vessel for
    a lost people’s memory—marks the emotional and narrative climax of his time on
    Kataan, setting the stage for his return to the *Enterprise* with an inescapable
    moral weight.'
