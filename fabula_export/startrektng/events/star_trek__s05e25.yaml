  global_id: null
  title: Kamin confronts the Administrator’s cover-up
  description: 'In the town square, Kamin—now aged twenty-seven years into his Kataan
    life—publicly challenges the Administrator with his journal of scientific evidence
    proving the planet’s impending destruction. The Administrator, initially dismissive,
    reveals that the leadership has known for two years but suppressed the truth to
    avoid societal collapse. Their tense exchange escalates as Kamin demands action—evacuation,
    genetic preservation, *anything*—only for the Administrator to admit a secret
    plan exists while refusing details. The confrontation is abruptly cut short when
    Young Batai arrives, breathless, to deliver urgent news: Eline is gravely ill.
