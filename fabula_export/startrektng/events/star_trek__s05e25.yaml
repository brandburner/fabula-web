      down forces him into a role he despises: the helpless observer. His emotional
      state is one of *betrayal by circumstance*: the probe is an enemy he cannot
      fight, and the rules of engagement (protecting Picard at all costs) bind his
      hands. His silence after being overruled is louder than his outburst.'
    goals:
