  title: Eline’s silent rejection fractures Picard’s unity
  description: 'In the courtyard of their home, Picard (as Kamin) attempts to distract
    himself from his lingering Starfleet memories by charting the sun’s movements—a
    scientific pursuit that mirrors his past identity. Eline, observing his preoccupation,
    confronts him with quiet but escalating frustration, accusing him of clinging
    to a lost life while neglecting their shared present. Her question—*When do I
    get you back?*—exposes the emotional rift between them: she has tolerated his
    divided heart for five years, but her patience is eroding. The tension peaks when
    Picard fails to reassure her, leaving her to withdraw into the house without joining
    him for a critical meeting with the Administrator. Batai’s arrival and silent
    acknowledgment of Eline’s absence underscores the fracture, signaling that Picard’s
    dual identity is no longer a private struggle but a public fracture in their bond.
    The moment foreshadows the probe’s impending revelation, which will force Picard
    to choose between the life he’s built and the one he’s lost—while Eline’s refusal
    to accompany him marks the first overt rejection of their shared purpose, a turning
    point in their relationship’s cohesion.'
