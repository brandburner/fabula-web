- fabula_uuid: cand_evt_scene_f811a3245783cd07_02
  global_id: null
  title: Riker Receives Hanson’s Borg Defeat Transmission
  description: "\n  The event begins in Engineering, where Riker and Shelby—still\
    \ navigating their tense dynamic—oversee repairs to the *Enterprise* after the\
    \ Borg encounter. Shelby, newly appointed First Officer, demonstrates her technical\
    \ competence but remains guarded, while Riker acknowledges her role in stopping\
    \ the Borg, though she insists she failed to save Picard. Their exchange is laced\
    \ with unspoken friction, revealing Shelby’s ambition and Riker’s lingering self-doubt.\n\
    \n  The tension shifts abruptly when Data interrupts with a subspace transmission\
    \ from Admiral Hanson, relaying Starfleet’s catastrophic defeat at Wolf 359. The\
    \ transmission cuts off mid-sentence, leaving only the chilling implication: the\
    \ Borg have annihilated the fleet, assimilated Picard (now Locutus), and are now\
    \ unstoppable. The crew’s collective horror is palpable as they process the magnitude\
    \ of the loss—Earth’s fall is imminent, and the *Enterprise* is now the Federation’s\
    \ last hope.\n\n  Riker’s leadership is tested in real time. He convenes a strategy\
    \ meeting with his senior staff, where desperation overshadows hope. Proposals\
    \ like graviton beams and nanotechnology are dismissed as too slow or ineffective,\
    \ exposing the crew’s dwindling faith in survival. Riker’s moment of vulnerability—admitting\
    \ he cannot replace Picard—reveals the emotional weight of command. The scene\
    \ culminates in Guinan’s intervention, where she forces Riker to confront his\
    \ grief and the need to let go of Picard to save him. Her blunt counsel (‘*There\
    \ can only be one Captain*’) becomes the turning point, compelling Riker to embrace\
    \ his role fully.\n\n  The event ends with the *Enterprise* arriving at Wolf 359,\
    \ where the wreckage of the Starfleet armada—a visual metaphor for the Federation’s\
    \ collapse—confirms the transmission’s dire truth. The crew’s shock and Riker’s\
    \ steely resolve set the stage for the impending battle, where the stakes are\
    \ no longer tactical but existential.\n  "
