      of concentration as he relays the Enterprise’s position and the countdown to
      Earth’s doom. His voice is calm, almost clinical, but there’s a slight tremor
      beneath the surface—this is a boy who has seen too much, too soon, and now bears
      the burden of delivering the grim math of their situation. He doesn’t flinch
      when Riker issues the intercept order; instead, he adjusts the ship’s trajectory
      with precision, his prodigious intellect focused on the task at hand. Yet, the
      countdown—‘Twenty-three minutes, fourteen seconds’—hangs in the air like a verdict.
