  title: Riker confronts command’s emotional weight
  description: 'In the Captain’s Ready Room, Riker—now wearing Picard’s rank—avoids
    sitting in the Captain’s chair, instead occupying his usual subordinate seat,
    symbolizing his reluctance to fully embrace the role. When Troi arrives, their
    dynamic shifts palpably: Riker’s warmth as a friend is now tempered by his new
    authority, creating an unspoken tension. Troi reveals the crew’s repressed grief
    over Picard’s loss, comparing it to losing a family patriarch, while Riker admits
    Picard was a father figure to him. The moment fractures when Riker abruptly pivots
    to operational matters, masking his vulnerability behind duty. His final glance
    at the empty chair underscores his isolation as captain and the weight of leading
    in Picard’s shadow. The scene establishes Riker’s leadership struggle and the
    crew’s fractured cohesion amid the Borg threat, while Troi’s empathic insight
    highlights the unspoken emotional toll on the ship.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e01
  scene_sequence: 5
  sequence_in_scene: 7
  key_dialogue:
  - 'RIKER: He was more of a father to me than my own.'
  - 'TROI: We know the risks, tell ourselves we''re prepared for the consequences...
    and yet, something like this cuts deeper than we can admit at first. He was our
    Captain. It''s like losing the leader of a nation or the head of a family.'
  - 'RIKER: When I saw him like that... mutilated... Was there any part of him left,
    Deanna?'
