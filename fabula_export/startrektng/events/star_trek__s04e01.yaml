    symbolic_significance: Represents the crew's last line of defense and their collective
      will to survive against impossible odds. It embodies the tension between despair
      and hope, as well as the fragile advantage gained through Data's intervention.
    access_restrictions: Restricted to senior bridge officers and essential crew members
      during red alert.
