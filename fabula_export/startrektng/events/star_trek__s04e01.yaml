- fabula_uuid: cand_evt_scene_92e8b7a8180b9b3b_02
  global_id: null
  title: Locutus reveals Borg inevitability
  description: "\n  In a tense confrontation in Sickbay, Beverly Crusher revives Locutus—the\
    \ assimilated Picard—only for him to dismiss Federation efforts to resist the\
    \ Borg as futile. His chilling certainty about Earth’s impending assimilation\
    \ forces Riker to confront the stark reality: the Borg’s advance is unstoppable,\
    \ and Picard’s mind may already be lost. The scene underscores the stakes of Data’s\
    \ desperate mind-meld, as the crew’s last hope for a tactical advantage hangs\
    \ in the balance. Locutus’ brief, suppressed resistance—a fleeting moment where\
    \ Picard’s humanity surfaces—hints at a potential weakness in the Borg’s control,\
    \ but his dominance quickly reasserts itself. The exchange exposes the crew’s\
    \ desperation and the Borg’s psychological warfare, reinforcing the urgency of\
    \ their mission to save Earth.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e01
  scene_sequence: 16
  sequence_in_scene: 29
  key_dialogue:
  - 'RIKER: Can you revive him?'
  - 'BEVERLY: I''d like more time to study the structural changes in the motor pathways...'
  - 'RIKER: Doctor, we don''t have more time. Once he was wired into the Borg, they
    knew everything he knew. I''m hoping it goes both ways. If we''re lucky, he had
    access to everything we need to know about them... especially their vulnerabilities.'
  - 'LOCUTUS: I am... on board the Enterprise.'
  - 'RIKER: That''s right.'
  - 'LOCUTUS: A futile maneuver.'
  - 'LOCUTUS: Incorrect strategy, Number One... to risk your ship and crew... to retrieve
    only one man... Picard would never have approved...'
  - 'LOCUTUS: You underestimate... us... to believe this... abduction would be of
    any concern...'
  - 'LOCUTUS: There is no need for apprehension... I intend no harm.'
  - 'LOCUTUS/PICARD: No harm.'
  - 'LOCUTUS: I will continue... aboard your ship... to speak for the Borg... as they
    continue... without further diversion... to sector zero zero one... where they
    will force your unconditional surrender.'
