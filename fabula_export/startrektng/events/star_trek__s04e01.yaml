  number: 1
  summary: The Enterprise, still reeling from Captain Picard's assimilation, attempts
    a desperate, high-energy deflector blast against the Borg cube. The Borg instantly
    adapt, rendering the attack futile, and Locutus reveals Picard's knowledge now
    serves the Collective, deepening Riker's despair. With the Enterprise damaged
    and the Borg advancing toward Earth, Admiral Hanson promotes Riker to Captain,
    emphasizing Picard's loss as a casualty of war and abandoning hope for his recovery.
    Riker grapples with the immense weight of command, confiding in Troi about Picard's
    paternal role in his life and the emotional toll of his transformation. He struggles
    to sit in Picard's chair, a symbol of the immense shoes he must fill. Meanwhile,
    Locutus undergoes further, agonizing assimilation aboard the Borg ship, becoming
    less human. Riker and Shelby, despite their past friction, discuss strategies
    against the Borg, with Riker emphasizing the need to adapt and overcome Picard's
    stolen knowledge. Starfleet engages the Borg at Wolf 359, but Admiral Hanson's
    communication cuts out mid-battle, signaling a dire outcome and leaving Riker
    and the crew with a profound sense of foreboding as their repairs conclude.
