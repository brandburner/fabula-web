  object_involvements:
  - object_uuid: ger_object_234534bda0a6
    description_of_involvement: The navigational deflector is mentioned by Riker as
      one of the critical systems damaged during the Enterprise’s failed assault on
      the Borg cube. Its failure knocks out the ship’s pursuit capability, leaving
      the Enterprise unable to immediately rejoin the fleet at Wolf 359. The deflector’s
      condition is a tangible reminder of the Borg’s superiority and the crew’s limitations,
      adding to the sense of urgency and desperation as they scramble to effect repairs.
      Its role in the event is both practical—hindering the ship’s ability to engage
      the Borg—and symbolic, representing the crew’s struggle to overcome seemingly
      insurmountable odds.
    status_before_event: Crippled and non-functional following the failed deflector
      blast against the Borg cube. The system’s failure has left the Enterprise unable
      to pursue the Borg ship or rejoin the fleet.
    status_after_event: Under repair, with Geordi and the engineering team working
      to restore it to operational status. The crew’s ability to rejoin the battle
      and defend Earth depends on the successful completion of these repairs.
    global_id: ger_object_234534bda0a6
  - object_uuid: ger_object_8556c1a502fb
    description_of_involvement: The viewscreen in the Observation Lounge serves as
      the primary conduit for Admiral Hanson’s transmission, projecting his image
      and voice into the room with a sense of urgency and authority. It is through
      this device that Hanson delivers his grim assessment of Starfleet’s preparations,
      defends Picard’s character, and promotes Riker to captain. The viewscreen’s
      flickering light casts long shadows across the faces of the crew, emphasizing
      the gravity of the moment and the weight of Hanson’s words. Its role in the
      event is both functional—providing a means of communication—and symbolic, representing
      the fragile connection between the Enterprise and Starfleet command as they
      prepare for the battle ahead.
    status_before_event: Active and displaying Admiral Hanson’s image and voice from
      his Ready Room on a Galaxy-class starship. The transmission is clear, though
      the tension in the room is palpable.
    status_after_event: Deactivated after Hanson signs off, leaving the crew in silence
      as they process the promotion and the looming battle. The screen remains dark,
      a stark contrast to the urgency of the moment just passed.
