- fabula_uuid: act_952d3d9e5724b897
  number: 2
  summary: The Enterprise, now fully repaired, warps towards Wolf 359, with subspace
    communications from the battle site cut off. Riker formally appoints Shelby as
    his First Officer, acknowledging her expertise on the Borg despite her ambition,
    and gathers his senior staff to brainstorm strategies. The crew presents various
    ideas, including graviton beams and destructive nanites, but all prove either
    insufficient or too time-consuming, leading to a palpable sense of hopelessness.
    Riker admits his inadequacy and longing for Picard's leadership, struggling to
    inspire his demoralized crew. Guinan confronts Riker in Picard's Ready Room, directly
    challenging his reluctance to fully embrace command. She advises him to 'let go
    of Picard,' asserting that there can only be one captain and that to defeat the
    Borg, Riker must abandon Picard's known strategies, which the Borg now possess.
    Guinan's counsel prompts Riker to finally sit in Picard's chair, signifying his
    acceptance of his new role. The Enterprise then arrives at Wolf 359, discovering
    a devastating graveyard of destroyed Starfleet vessels, including ships Shelby
    recognizes, confirming the catastrophic defeat of the Federation fleet.
