  - character_uuid: ger_agent_574d21def712
    emotional_state: 'A **steady resolve**—Guinan is **not grieving**, but she **understands
      grief**. Her emotional state is **determined and empathetic**: she knows the
      crew’s despair is a self-fulfilling prophecy, and she will not let Riker indulge
      in it. Her **firmness** (‘You must let him go’) is not cruel but **necessary**—she
      sees the bigger picture, and she will force Riker to see it too. The wreckage
      of Wolf 359 does not shock her, but it **confirms her fears**: the Federation’s
      survival depends on Riker’s ability to lead.'
    goals:
    - Force Riker to confront his grief and self-doubt
    - Push Riker to embrace his role as captain
    - Save the crew from their own despair
    - Honor Picard’s memory by ensuring his legacy lives on
    what_happened: Guinan is the **catalyst for Riker’s transformation**. She enters
      the Ready Room uninvited, **claiming Picard’s chair** in a bold move that forces
      Riker to confront his avoidance. Her dialogue is **blunt and unflinching**—she
      tells him the crew expects to die, that his hesitation will doom them, and that
      he must **‘let go of Picard’**. Her speech (‘There can only be one Captain’)
