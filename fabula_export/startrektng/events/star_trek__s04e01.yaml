  title: Riker orders Borg exploit attempt
  description: In Data’s laboratory, the crew debates the Borg’s subspace-linked collective
    consciousness as a potential vulnerability. Beverly Crusher theorizes that severing
    Picard’s connection to the hive mind would cripple the Borg, while Shelby extrapolates
    their interdependent nature. Riker, under pressure, orders Data to attempt injecting
    a disarm command into the collective. The urgency escalates as Worf reports the
    Borg ship’s weapons charging, forcing Riker to declare a red alert and prepare
    the *Enterprise* for battle. The scene pivots from strategic planning to immediate
    crisis, with Riker’s leadership tested as the Borg threat looms over Earth. The
    dialogue reveals the crew’s desperation and the high stakes of their gambit—failure
    means assimilation for billions, while success hinges on Data’s untested experiment
    and Picard’s fragile mental state. The moment crystallizes the Federation’s last
    stand against the Borg, where every decision carries existential weight.
