  global_id: null
  title: Riker Confronts Command and Loss
  description: "\n  This event marks Riker's emotional and psychological reckoning\
    \ with his new role as captain, the loss of Picard, and the crushing weight of\
    \ command in the face of the Borg threat. The scene opens in Engineering, where\
    \ Riker and Shelby—still tense from their earlier conflict—discuss repairs and\
    \ the impending battle. Shelby, though ambitious, acknowledges her limitations\
    \ and Riker’s need for her expertise, revealing a fragile but necessary professional\
    \ truce. The tension between them underscores the broader crew dynamic: a team\
    \ fractured by grief, uncertainty, and the absence of their beloved captain.\n\
    \n  The moment shifts to the Observation Lounge, where Riker gathers his senior\
    \ staff to strategize. The crew’s desperation is palpable as they brainstorm futile\
    \ tactics against the Borg, their ideas dismissed one by one. Riker’s admission—‘I\
    \ wish he were here to say it, too’—exposes his raw vulnerability and the crew’s\
    \ collective longing for Picard’s leadership. The scene culminates in Riker’s\
    \ private crisis in the Ready Room, where Guinan forces him to confront his reluctance\
    \ to fully embrace command. Her blunt challenge—‘Let go of Picard’—is the emotional\
    \ turning point, compelling Riker to sit in Picard’s chair for the first time.\
    \ The act symbolizes his reluctant acceptance of leadership, though the weight\
    \ of the moment is tempered by the grim reality awaiting them: the devastation\
    \ of Wolf 359, where the Borg have annihilated the Starfleet armada. The event\
    \ bridges Riker’s personal struggle with the larger narrative stakes, setting\
    \ the stage for the Enterprise’s desperate counterattack.\n  "
