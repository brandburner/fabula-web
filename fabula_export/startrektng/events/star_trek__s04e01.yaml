  global_id: null
  title: Riker Promoted to Captain
  description: 'In the aftermath of the Enterprise’s failed engagement with the Borg,
    Admiral Hanson delivers a grim assessment of the Federation’s desperate preparations
    to defend Earth. Shelby’s blunt warning—that Picard, now Locutus, will have shared
    tactical knowledge with the Borg—hangs in the air, but Hanson refuses to accept
    Picard’s complicity, framing him instead as a casualty of war. The moment pivots
    when Hanson abruptly promotes Riker to captain, thrusting him into command of
    the Enterprise. The promotion is not a celebration but a necessity, underscored
    by Hanson’s reluctant acknowledgment of Picard’s loss and the looming battle where
    ‘either they survive or we do.’ Riker’s stunned silence and the crew’s collective
    tension reveal the weight of the moment: leadership has shifted, but the ship—and
    the Federation—remain in existential peril. The event marks a turning point, forcing
    Riker to confront his readiness for command while the Borg’s relentless advance
    toward Earth looms as an inescapable deadline.'
