- fabula_uuid: cand_evt_scene_55d1ca204c936a0a_02
  global_id: null
  title: Riker orders pursuit after Locutus extraction
  description: 'The event opens with Worf and Data successfully extracting Locutus
    (Picard) from the Borg ship in a high-risk away mission, neutralizing drones and
    sedating him before beaming out. As they materialize in the shuttle, the Borg
    retaliate by destroying the vessel mid-transport, forcing a desperate last-second
    escape that leaves Locutus in Federation custody. The scene then shifts to the
    critically damaged *Enterprise*, where Riker—now acting captain—must navigate
    a crisis: the saucer section is disabled, the impulse drive is crippled, and the
    Borg ship is accelerating toward Earth. Geordi reports the ship’s vulnerabilities,
    while Wesley notes the saucer’s exposed state. Riker’s leadership is tested as
    he orders a risky maneuver to draw Borg fire, only for the enemy ship to abruptly
    warp away, resuming its course to Earth. The event culminates with Riker’s decisive
    command to rendezvous with the saucer section and pursue the Borg, marking a shift
    from reactive defense to proactive confrontation. The tension lies in Riker’s
    struggle to balance immediate survival with the larger threat, while the crew’s
    urgency underscores the Federation’s precarious position.'
