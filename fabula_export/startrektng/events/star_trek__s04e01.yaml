  - object_uuid: ger_object_afd882f197b0
    description_of_involvement: 'The battle section of the Enterprise-D is the linchpin
      of Riker and Shelby’s high-risk strategy. Its weapons, power generators, and
      tactical arrays make it the perfect lure for the Borg, drawing their tractor
      beam and attention away from the saucer section. The battle section’s role in
      this event is twofold: it serves as both bait and battleground. Riker’s evasive
      maneuvers (Riker Alpha and Beta) and Shelby’s antimatter spread deployment are
      designed to maximize its perceived threat, ensuring the Borg remain focused
      on it. The section’s sacrifice is a calculated risk, one that the crew accepts
      in the hopes of buying time for Data’s mission and securing the saucer’s escape.'
    status_before_event: Attached to the saucer section, fully armed and operational,
      preparing for separation and potential combat.
