      and survival of non-combat personnel.
    - Exploit the Borg’s tactical predictability by taunting Locutus, reinforcing
      their focus on firepower over the fleeing saucer.
    what_happened: "\n        Riker stands at the center of the bridge, his posture\
      \ rigid with command authority as he orchestrates the separation of the *Enterprise*.\
      \ His voice is steady, but his eyes betray a flicker of grief—Picard’s assimilation\
      \ still fresh—masked by tactical precision. He orders the saucer’s separation,\
      \ then immediately commands all weapons to fire, drawing the Borg’s focus. His\
      \ murmured taunt to Locutus, ‘Just as you should, Captain,’ is a calculated\
      \ jab, exploiting the Borg’s predictability while masking his own vulnerability.\
      \ He directs evasive maneuvers (Riker Alpha/Beta) with Wesley, ensuring the\
      \ battle section remains a distraction.\n      "
