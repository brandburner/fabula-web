      reflecting Starfleet’s emphasis on adaptability and resilience in the face of
      crisis.
    global_id: ger_organization_73a4b614bde7
  - organization_uuid: ger_organization_45cc9de22968
    description_of_involvement: The Borg Collective functions as the unified hive
      mind of cybernetically enhanced drones linked through subspace, directing cubes
      and assimilated individuals like Locutus (Picard) to assimilate species and
      conquer worlds. They adapt rapidly to attacks via forcefields and tactical foreknowledge,
      annihilate fleets such as at Wolf 359, and enforce assimilation through drones
      and implants. Data accesses their hierarchical structure—root command overseeing
      subnodes for defense, navigation, and communications—planting disruptive regeneration
