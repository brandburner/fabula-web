  title: Locutus Extraction and Shuttle Destruction
  description: "\n  Worf and Data materialize on the Borg ship, immediately engaging\
    \ in a high-stakes firefight to neutralize drones and reach Locutus (Picard).\
    \ Worf tackles Locutus to the ground while Data sedates him with a hypo, ensuring\
    \ his capture. As they prepare to beam out, the Borg retaliate by destroying their\
    \ shuttle mid-transport, forcing a desperate last-second escape. The team materializes\
    \ safely on the *Enterprise* with Locutus in custody, but the shuttle’s destruction\
    \ underscores the Borg’s relentless hostility and the mission’s precarious success.\
    \ Meanwhile, Riker orders the *Enterprise* to pursue the Borg ship, now accelerating\
    \ toward Earth, while Geordi reports critical damage to the impulse drive and\
    \ the saucer section’s vulnerability. The scene shifts from tactical extraction\
    \ to a broader strategic crisis, as the crew races to reattach the saucer and\
    \ intercept the Borg before they reach their destination.\n  "
