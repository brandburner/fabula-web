    - Consoles beeping with urgent data on the Borg's trajectory
    - The hum of the ship's engines at warp, straining against the Borg threat
    global_id: ger_location_a69347c9f4ae
  - location_uuid: ger_location_3342be1adea6
    description_of_involvement: "\n        Sickbay serves as the tension-filled examination\
