  object_involvements:
  - object_uuid: ger_object_59a95b0176ae
    description_of_involvement: "\n        Shelby orders the antimatter spread fired\
      \ from the battle section, creating a dispersed field of explosive charges that\
      \ erupt chaotically. This object disrupts the Borg’s sensors, forcing their\
      \ scanners to recalibrate and their tractor beam to adjust. The spread is not\
      \ just a weapon—it is a smokescreen, a way to obscure the saucer’s escape and\
      \ buy precious seconds. Its deployment is a gamble, but one that pays off as\
      \ the Borg’s focus remains locked on the battle section. The spread’s chaos\
      \ is the perfect cover for Riker’s maneuver.\n      "
    status_before_event: Loaded in the battle section’s weapons bay, awaiting deployment.
    status_after_event: Fired and detonating in a chaotic field, disrupting Borg sensors
      and confirming the saucer’s safe passage.
    global_id: ger_object_59a95b0176ae
  - object_uuid: ger_object_401e97aaefe2
    description_of_involvement: "\n        The *Enterprise*’s weapons roar to life\
      \ at Riker’s command, phasers and torpedoes raking the Borg cube in a desperate\
      \ barrage. Their fire is not meant to destroy the Borg—it is a distraction,\
      \ a lure to draw the tractor beam’s attention. Shelby’s subsequent order to\
      \ fire the antimatter spread amplifies this tactic, creating a chaotic field\
      \ that forces the Borg to adjust their focus. The weapons are the battle section’s\
      \ lifeblood, the reason the Borg prioritize it over the fleeing saucer. Their\
      \ deployment is a calculated risk, sacrificing firepower to ensure survival.\n\
      \      "
    status_before_event: Charged and ready, integrated into the *Enterprise*’s defensive
      and offensive systems.
    status_after_event: Firing at full capacity, drawing the Borg’s tractor beam and
      confirming Riker’s gambit.
    global_id: ger_object_401e97aaefe2
  - object_uuid: ger_object_eae76785bb75
    description_of_involvement: "\n        The saucer section detaches cleanly from\
      \ the battle section, accelerating away under Wesley’s precise tracking. Its\
      \ separation is swift and silent, a testament to Geordi’s engineering and the\
      \ *Enterprise*’s design. The Borg’s scanners dismiss it entirely, locking their\
      \ tractor beam onto the battle section instead. This object becomes a symbol\
      \ of hope—the vulnerable but essential part of the ship that must survive, carrying\
      \ families, non-combat personnel, and the potential for the crew’s future. Its\
      \ escape is the entire gambit’s purpose, and its success hinges on the battle\
      \ section’s sacrifice.\n      "
    status_before_event: Attached to the battle section, fully integrated into the
      *Enterprise*’s operations.
    status_after_event: Detached and accelerating at 100 meters per second, ignored
      by the Borg and fleeing to safety.
    global_id: ger_object_eae76785bb75
  - object_uuid: ger_object_afd882f197b0
    description_of_involvement: "\n        The battle section remains behind after\
      \ the saucer’s separation, its weapons and propulsion systems now the sole focus\
      \ of the Borg’s attention. Riker orders all weapons to open fire, drawing the\
      \ tractor beam’s lock. Shelby follows with the antimatter spread, turning the\
      \ section into a distraction—and a sacrificial lamb. The battle section’s role\
      \ is to buy time, to ensure the saucer’s escape, and to inflict as much damage\
      \ on the Borg as possible before its inevitable destruction. It is both a tactical\
      \ asset and a symbol of the Federation’s willingness to endure loss for the\
      \ greater good.\n      "
    status_before_event: Integrated with the saucer section, fully operational as
      part of the *Enterprise*.
    status_after_event: Separated and targeted by the Borg, its weapons firing desperately
      as it executes evasive maneuvers (Riker Alpha/Beta).
    global_id: ger_object_afd882f197b0
  - object_uuid: ger_object_012e8ab331bb
    description_of_involvement: "\n        The docking latches are the mechanical\
      \ linchpins of the *Enterprise*’s separation. Geordi confirms their clearance,\
      \ signaling the saucer’s clean detachment from the battle section. Their flawless\
      \ release is critical—any failure here would doom the gambit before it begins.\
      \ The latches symbolize the ship’s fragility in this moment: a single point\
      \ of vulnerability that, if exploited, could spell disaster. Their successful\
      \ disengagement is a small but vital victory, allowing the saucer to flee while\
      \ the battle section remains behind.\n      "
    status_before_event: Engaged, securing the saucer and battle sections as a single
      vessel.
    status_after_event: Retracted and clear, allowing the saucer to separate and accelerate
      away from the battle section.
    global_id: ger_object_012e8ab331bb
  - object_uuid: ger_object_58a64b47ce2f
    description_of_involvement: "\n        The Borg tractor beam projects from their\
      \ cube as a glowing energy field, locking onto the battle section with relentless\
      \ precision. Wesley tracks its attempts to lock on, reporting its focus on the\
      \ weapons-laden section while ignoring the saucer. This object is the Borg’s\
      \ tactical tool, the instrument of their assault—and the very thing Riker exploits.\
      \ The beam’s lock confirms the gambit’s success: the Borg have taken the bait.\
      \ Its grip on the battle section forces Riker into evasive maneuvers (Riker\
      \ Alpha/Beta), but it also ensures the saucer’s survival. The beam is both enemy\
      \ and ally in this moment.\n      "
    status_before_event: Dormant within the Borg cube, awaiting tactical deployment.
