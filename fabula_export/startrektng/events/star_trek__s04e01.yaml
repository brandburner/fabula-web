  global_id: null
  title: Riker confronts grief with Troi
  description: 'In the Captain’s ready room, Riker—now wearing Picard’s rank—avoids
    sitting in the captain’s chair, a symbolic rejection of his new role. When Troi
    enters, their dynamic shifts immediately: the intimacy of their past relationship
    is now strained by his authority. Riker masks his vulnerability with operational
    focus, but his raw admission that Picard was ‘more of a father to me than my own’
    cracks his composure. Troi’s empathic confirmation of Picard’s lingering humanity
    forces Riker to confront the pain of his assimilation, though he quickly retreats
    into duty. The moment underscores the crew’s collective grief as a ‘family’ in
    mourning, while Riker’s struggle to lead reveals the emotional cost of command.
    Their unspoken farewell—‘Thank you, Captain’—signals the irreversible distance
    between them, leaving Riker isolated with the weight of Picard’s legacy and the
    empty chair that symbolizes everything he must now carry alone.'
