  title: Riker orders Data and Worf to proceed
  description: In the Transporter Room, Miles O'Brien confirms the Borg have adapted
    their electromagnetic field to block transporter functions, rendering the crew's
    primary extraction plan obsolete. Riker, already anticipating this contingency,
    immediately pivots to the prearranged backup strategy. He directs Data and Worf—both
    equipped with armpacks—to proceed with their high-risk infiltration of the Borg
    cube. The moment underscores the Borg's relentless tactical evolution and the
    Federation's desperate need for unconventional solutions. Riker's decisive shift
    from transporter reliance to direct action reflects his growing command instincts,
    while Data and Worf's silent readiness signals their acceptance of the mission's
    dangers. The scene serves as a critical pivot point, transitioning from failed
    technology to a desperate, high-stakes gambit to capture Locutus and save Earth.
