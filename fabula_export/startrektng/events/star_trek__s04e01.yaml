    description_of_involvement: Data's Laboratory Biobed serves as the critical platform
      where Locutus (Picard) lies supine during the neural link procedure. It lowers
      smoothly to expose Picard, allowing Data to clamp onto its transfer device and
      bridge his positronic matrix to Picard's Borg-altered pathways. The biobed thrums
      under strain as Picard's Borg arm thrashes violently, and it becomes a symbolic
      battleground for control—Data's strength ultimately breaks the Borg arm at the
      wrist, severing its connection. The biobed's readouts glow with diagnostic data,
      monitored closely by Beverly and O'Brien, as Picard's human hand reaches out
      to grasp Data's wrist in a fleeting moment of resistance.
    status_before_event: The biobed is in a raised position, cradling Locutus (Picard)
      supine, with diagnostic readouts glowing and ready for the neural link procedure.
      It is stable and fully functional, awaiting Data's connection.
    status_after_event: The biobed is lowered and slightly damaged from the violent
      thrashing of Picard's Borg arm. The detached Borg hand continues to move in
      Data's grip, and the readouts display heightened neural activity, confirming
      the brief surfacing of Picard's human consciousness. The biobed remains operational
      but bears the physical marks of the struggle.
    global_id: ger_object_e4ab3570b037
  - object_uuid: ger_object_1a5fda11161d
    description_of_involvement: Data's Head and Laboratory Control Panels are essential
      tools for establishing and maintaining the neural link with Locutus (Picard).
      Data opens a panel on his head to reveal his positronic matrix, while the laboratory
      equipment panels display glowing readouts that Beverly and O'Brien monitor closely.
