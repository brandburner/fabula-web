- fabula_uuid: cand_evt_scene_ad73065a5b545f7a_01
  global_id: null
  title: Riker promoted as Picard is declared lost
  description: 'In the aftermath of the Enterprise’s failed engagement with the Borg,
    Admiral Hanson delivers a devastating assessment: Picard, now Locutus, is irretrievably
    lost, and the Federation’s only option is to treat him as a tactical liability.
    Shelby’s blunt warning—that the Borg will exploit Picard’s knowledge—hits hard,
    but Hanson refuses to accept that Picard would willingly aid the enemy, framing
    his assimilation as a tragic casualty of war. The moment crystallizes the crew’s
    grief and the brutal reality of their new mission: Earth’s survival now hinges
    on defeating Locutus, even if it means destroying Picard in the process. Hanson’s
    reluctant promotion of Riker to captain underscores the stakes—Riker must step
    into Picard’s shoes not as a successor, but as a leader forced to confront an
    enemy that wields his mentor’s mind against him. The scene pivots from rescue
    to survival, with the weight of command settling on Riker’s shoulders as the Borg
    ship warps toward Earth, leaving no time for mourning.'
