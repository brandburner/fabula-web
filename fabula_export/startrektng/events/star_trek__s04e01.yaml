  title: Shuttle infiltration of Borg vessel
  description: "\n  In a high-stakes gambit to exploit Locutus's potential resistance\
    \ to Borg control, Riker orders the saucer section to unleash an antimatter spread\
    \ as a diversion while simultaneously launching a stealth shuttle with Data and\
    \ Worf. The shuttle drifts unpowered through the antimatter field, evading the\
    \ Borg's tractor beam, and successfully breaches the Borg's electromagnetic defenses.\
    \ Data confirms the transporter has enough power for a round-trip beam—onto the\
    \ Borg vessel and back—while Worf prepares for the infiltration. The duo dematerializes,\
    \ executing a daring mission to capture Locutus and exploit his assimilated knowledge\
    \ to save Earth. The scene hinges on tactical precision, the Borg's unexpected\
    \ reaction to the antimatter display, and the calculated risk of transporting\
    \ onto an enemy vessel with limited power reserves. The success of this infiltration\
    \ could turn the tide against the Borg, but the cost remains uncertain as the\
    \ shuttle's fate hangs in the balance.\n  "
