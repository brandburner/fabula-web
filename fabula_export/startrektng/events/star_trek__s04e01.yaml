    status_after_event: |2-

      The neural link is severed as Data complies with Riker's order. Picard's vitals stabilize, and the biobed's readouts confirm his recovery. The link's destruction marks the end of the experiment, but also the restoration of Picard's humanity. The risk was worth it, though the crew will forever wonder what intelligence they lost in the process.
