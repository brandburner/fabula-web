  organization_involvements:
  - organization_uuid: ger_organization_245261bdcf54
    description_of_involvement: "\n        The *U.S.S. Enterprise* is represented\
      \ here through Riker’s hail, a desperate attempt to **reclaim agency** in the\
      \ face of the Borg’s overwhelming power. The ship’s presence on the viewscreen\
      \ is a **symbol of defiance**, but also of vulnerability—Riker is forced to\
      \ engage on the Borg’s terms, with no leverage to negotiate. The *Enterprise*’s\
      \ role in this moment is reactive: it **seeks information, buys time, and clings\
      \ to hope**, even as the Borg Collective tightens its grip. The organization’s\
      \ survival depends on Riker’s ability to turn this exchange into an advantage,\
      \ but the odds are stacked against him.\n      "
    active_representation: Through Riker as the acting captain, speaking on behalf
      of the *Enterprise* and the Federation.
    power_dynamics: "\n        **Weakened and reactive**: The *Enterprise* is outgunned\
      \ and outmaneuvered, forced to engage in a dialogue where the Borg hold all\
      \ the power. Riker’s authority is **tenuous**, his commands a pale imitation\
      \ of Picard’s leadership.\n      "
