  title: Riker stalls Locutus with emotional appeal
  description: 'With the Borg cube looming and Data’s mind-meld mission underway,
    Riker—desperate to buy time—reopens communications with Locutus (Picard) and attempts
    a psychological gambit. He frames his request for delay as a plea for humanity’s
    sake, hoping to exploit Locutus’ residual connection to Picard’s past. The exchange
    is brief but charged: Locutus dismisses the appeal with cold efficiency, reaffirming
    the Borg’s collective will and the futility of resistance. The moment underscores
    the irreversible transformation of Picard into a weapon, while also revealing
    Riker’s growing willingness to manipulate even his former mentor’s assimilated
    consciousness to protect Earth. The failure of this tactic forces Riker to escalate
    to direct confrontation, setting up the subsequent counterattack.'
