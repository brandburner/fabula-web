  object_involvements:
  - object_uuid: ger_object_59a95b0176ae
    description_of_involvement: 'The antimatter spread is the centerpiece of Riker
      and Shelby’s gambit, a high-risk tactical maneuver designed to disrupt the Borg’s
      collective focus. Ordered by Shelby and executed by the tactical officer, the
      spread erupts into a chaotic field of antimatter charges, forcing the Borg to
      adjust their tractor beam and prioritize the battle section. Its role here is
      twofold: it serves as a distraction, drawing the Borg’s attention away from
      the saucer, and as a disruptive force, creating the critical window Data needs
      to infiltrate the Borg ship. The spread’s deployment is a moment of high tension,
      as the crew braces for the Borg’s retaliation while hoping their gamble will
      pay off.'
    status_before_event: Charged and ready in the battle section’s weapons array,
      awaiting Shelby’s order to deploy.
    status_after_event: Fired and erupting in a chaotic field, disrupting the Borg’s
      focus and confirming the saucer’s escape.
    global_id: ger_object_59a95b0176ae
  - object_uuid: ger_object_401e97aaefe2
    description_of_involvement: 'The Enterprise’s battle section weapons are the primary
      tools of Riker and Shelby’s deception. Ordered to open fire by Riker and deployed
      in the antimatter spread by Shelby, these weapons serve as the bait that lures
      the Borg’s attention. Their barrage forces the Borg to adjust their tactics,
      locking the tractor beam onto the battle section and ignoring the saucer’s retreat.
      The weapons’ role here is symbolic as much as functional: they represent the
      crew’s defiance in the face of overwhelming odds. Their deployment is a gamble,
      but one that pays off by creating the critical window Data needs to infiltrate
      the Borg ship.'
    status_before_event: Charged and ready, awaiting orders to engage the Borg cube.
    status_after_event: Fired in a coordinated barrage, followed by the deployment
      of the antimatter spread. The weapons’ energy signatures draw the Borg’s focus,
      ensuring the gambit’s success.
    global_id: ger_object_401e97aaefe2
  - object_uuid: ger_object_eae76785bb75
    description_of_involvement: The saucer section of the Enterprise-D is the primary
      beneficiary of Riker and Shelby’s gambit. Though it is not the focus of the
      Borg’s attention during this event, its successful separation and retreat are
      the ultimate goals of the antimatter spread tactic. The saucer’s acceleration—tracked
      by Wesley—confirms that the Borg have taken the bait, prioritizing the battle
      section’s firepower over the saucer’s non-combatant personnel. Its role here
      is that of a decoy, a distraction that buys time for Data’s mission and the
      crew’s survival. The saucer’s escape is a fleeting victory, but one that underscores
      the crew’s willingness to sacrifice for the greater good.
    status_before_event: Attached to the battle section, preparing for separation
      amid red alert conditions.
    status_after_event: Detached and accelerating away from the battle section, drawing
      no Borg fire and heading toward relative safety.
    global_id: ger_object_eae76785bb75
  - object_uuid: ger_object_afd882f197b0
    description_of_involvement: 'The battle section of the Enterprise-D is the linchpin
      of Riker and Shelby’s high-risk strategy. Its weapons, power generators, and
      tactical arrays make it the perfect lure for the Borg, drawing their tractor
      beam and attention away from the saucer section. The battle section’s role in
      this event is twofold: it serves as both bait and battleground. Riker’s evasive
      maneuvers (Riker Alpha and Beta) and Shelby’s antimatter spread deployment are
      designed to maximize its perceived threat, ensuring the Borg remain focused
      on it. The section’s sacrifice is a calculated risk, one that the crew accepts
      in the hopes of buying time for Data’s mission and securing the saucer’s escape.'
    status_before_event: Attached to the saucer section, fully armed and operational,
      preparing for separation and potential combat.
    status_after_event: Separated from the saucer, under Borg tractor beam lock, executing
      evasive maneuvers while deploying the antimatter spread. Its shields and systems
      are strained, but it remains a viable distraction.
    global_id: ger_object_afd882f197b0
