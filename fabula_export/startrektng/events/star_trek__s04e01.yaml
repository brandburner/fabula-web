    - Through the disciplined execution of tactical maneuvers and high-risk strategies.
    - By leveraging the crew’s ingenuity and adaptability in the face of an overwhelming
      enemy.
    - Via the preservation of Starfleet’s values—loyalty, sacrifice, and the protection
      of the Federation—even in the darkest moments.
    institutional_impact: The event underscores Starfleet’s willingness to embrace
      high-risk strategies when survival is at stake, reflecting the organization’s
      commitment to innovation and resilience in the face of existential threats.
    internal_dynamics: The crew’s unity and trust in Riker’s leadership are tested,
      but their shared training and values enable them to execute the gambit without
      hesitation. There is no internal conflict; instead, there is a collective focus
      on the mission’s success.
