      \ the crew’s focus from psychological confrontation to existential urgency.\
      \ Its adaptive forcefields and relentless advance are implied threats, underscoring\
      \ the crew’s desperation to protect their advantages (like Data) and counter\
      \ the Borg’s inevitability.\n      "
    status_before_event: "\n        The Borg Cube is en route to Earth, having already\
      \ breached Mars defenses and assimilated Captain Picard. It is detected by Jupiter\
      \ Outpost 92, confirming its arrival in sector zero-zero-one. Its adaptive forcefields\
      \ have absorbed the Enterprise’s deflector blasts without damage, and its trajectory\
      \ is unstoppable.\n      "
    status_after_event: "\n        The Borg Cube continues its advance toward Earth,\
