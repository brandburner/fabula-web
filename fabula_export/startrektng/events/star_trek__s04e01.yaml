  - character_uuid: ger_agent_574d21def712
    emotional_state: 'A **steady resolve**—Guinan is **not grieving**, but she **understands
      grief**. Her emotional state is **determined and empathetic**: she knows the
      crew’s despair is a self-fulfilling prophecy, and she will not let Riker indulge
