    description_of_involvement: Starfleet is the overarching institutional force driving
      the crew’s actions and decisions in this event. Through Admiral Hanson’s transmission,
      Starfleet’s mobilization of a fleet at Wolf 359 and the coordination of Klingon
      and potential Romulan support are highlighted as critical components of the
      Federation’s defense against the Borg. Hanson’s promotion of Riker to captain
      is framed as a Starfleet directive, emphasizing the organization’s need for
      strong leadership in the face of existential threat. Starfleet’s involvement
      in this event is both practical—providing resources, strategy, and command structure—and
      symbolic, representing the collective will of the Federation to resist assimilation
      and protect its people.
    active_representation: Through formal spokesman (Admiral Hanson) giving a direct
      briefing and issuing a field commission to Riker, as well as via institutional
      protocol (mobilizing fleets, coordinating alliances, and issuing orders).
    power_dynamics: Exercising authority over individual officers (e.g., promoting
      Riker, directing the crew’s actions) and operating under the constraint of overwhelming
      odds and the need to unite disparate factions (Klingons, Romulans) against a
      common enemy.
    organizational_goals:
    - To rally all available resources—ships, personnel, and alliances—to defend Earth
      against the Borg’s advance, regardless of the odds.
    - To ensure a smooth transition of command from Picard to Riker, providing the
      crew with the leadership and direction they need to face the coming battle.
    influence_mechanisms:
    - Through the chain of command (Admiral Hanson’s orders and promotions),
    - By mobilizing fleets and coordinating alliances (Klingons, Romulans),
    - By providing tactical and strategic guidance to the crew, even in the face of
      personal loss and emotional turmoil.
    institutional_impact: The event underscores Starfleet’s role as the backbone of
      the Federation’s defense, highlighting both its strengths (unity, resourcefulness)
      and its vulnerabilities (reliance on individual leaders like Picard, the need
      for alliances with former adversaries). The promotion of Riker symbolizes Starfleet’s
      adaptability and its willingness to place trust in untested leaders when the
      stakes are highest.
    internal_dynamics: The internal debate over response strategy is evident in Shelby’s
      warning about Picard’s potential betrayal and Hanson’s impassioned defense of
      his character. This tension reflects broader institutional struggles to balance
      tactical pragmatism with emotional loyalty, as well as the challenge of maintaining
      morale in the face of overwhelming odds.
