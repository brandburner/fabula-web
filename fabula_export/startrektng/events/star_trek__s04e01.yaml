      and institutional training. Starfleet’s influence is manifested in Riker’s leadership,
      the crew’s adherence to Starfleet regulations, and their reliance on Starfleet
      technology and resources.
    power_dynamics: Exercising authority over individuals and vessels, but operating
      under the constraint of the Borg’s superior firepower and adaptive tactics.
      Starfleet’s power is tempered by the need to balance immediate survival with
      the larger threat to Earth and the Federation.
    organizational_goals:
    - Coordinate the *Enterprise*’s response to the Borg threat and ensure the safe
      extraction of Locutus
    - Protect Earth and the Federation from assimilation by the Borg Collective
    - Leverage Starfleet’s resources and training to counter the Borg’s adaptive tactics
    influence_mechanisms:
    - Through formal command structures and tactical protocols, ensuring the crew’s
      actions are coordinated and effective
    - By providing the *Enterprise* with advanced technology and resources, such as
      the transporter and phasers, which are critical to the mission’s success
    - Via institutional training and guidance, equipping the crew to manage grief
      and execute high-stakes tactics under pressure
    institutional_impact: Starfleet’s involvement in this event underscores the organization’s
