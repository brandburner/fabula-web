- fabula_uuid: cand_evt_scene_df94f3eeb122971a_02
  global_id: null
  title: Antimatter spread disrupts Borg pursuit
  description: "\n  With the *Enterprise*’s saucer section successfully separated\
    \ and fleeing, Riker orders Shelby to execute a pre-planned antimatter spread—a\
    \ high-risk tactical maneuver designed to disrupt the Borg’s collective focus\
    \ and buy time for Data’s mind-meld with Locutus. The Borg, under Locutus’s direction,\
    \ immediately prioritize the battle section, ignoring the saucer’s retreat, confirming\
    \ Riker’s strategy. As the antimatter spread is deployed, the Borg ship’s tractor\
    \ beam locks onto the battle section, forcing Riker to execute evasive maneuvers\
    \ (Riker Alpha, then Riker Beta) to evade capture. The spread’s execution is a\
    \ calculated gamble: it risks drawing the Borg’s full wrath but also creates a\
    \ critical window for Data’s covert infiltration. Shelby’s decisive command—‘Fire\
    \ antimatter spread’—marks the moment where Riker’s unorthodox tactics shift from\
    \ theory to execution, escalating the stakes and forcing the Borg to react rather\
    \ than dictate the battle’s terms. The scene underscores Riker’s leadership under\
    \ pressure, Shelby’s tactical precision, and the Federation’s willingness to embrace\
    \ high-risk strategies when survival is at stake.\n  "
