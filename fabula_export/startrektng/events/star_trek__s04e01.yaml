  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: "\n        Starfleet is represented in this event\
      \ through the actions of its officers—Riker, Beverly, Worf, and Shelby—as they\
      \ respond to the Borg threat with urgency and tactical precision. The organization’s\
      \ influence is manifest in the crew’s adherence to protocol (e.g., relocating\
