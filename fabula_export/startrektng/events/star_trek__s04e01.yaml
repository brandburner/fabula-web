  title: Enterprise intercepts Borg advance
  description: "\n  The Borg breach Mars' defenses, marking a critical escalation\
    \ in their relentless advance toward Earth. On the Enterprise's bridge, Riker—now\
    \ Captain—orders an immediate intercept of the Borg cube, shifting the Federation's\
    \ strategy from retreat to direct confrontation. Worf confirms the Borg's breakthrough,\
    \ while Wesley provides the precise time remaining until the Borg reach Earth\
    \ (23 minutes, 14 seconds). The tension is palpable: every second counts, and\
    \ the crew's urgency reflects the high stakes of the moment. This scene serves\
    \ as the narrative pivot where Riker must lead the Enterprise into battle, with\
    \ the fate of humanity hanging in the balance. The dialogue is clipped and functional,\
    \ emphasizing the urgency and the weight of command Riker now carries.\n  "
