      resistance, a microcosm of the Federation’s will to fight. The battle bridge
      is a symbol of human ingenuity and courage, pitted against the Borg’s cold efficiency.
    access_restrictions: Restricted to senior bridge officers and essential crew during
      battle conditions. Access is controlled to maintain operational security and
      prevent Borg infiltration or sabotage.
    key_environmental_details:
