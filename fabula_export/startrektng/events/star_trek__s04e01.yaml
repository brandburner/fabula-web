- fabula_uuid: cand_evt_scene_92e8b7a8180b9b3b_01
  global_id: null
  title: Locutus asserts Borg inevitability
  description: "\n  In Sickbay, Beverly Crusher reluctantly revives Locutus—the assimilated\
    \ Picard—under Riker’s urgent orders. As Locutus regains consciousness, he immediately\
    \ dismisses the Federation’s efforts to resist the Borg as futile, his chilling\
    \ certainty underscoring the collective’s overwhelming power. His calm, detached\
    \ demeanor contrasts sharply with the crew’s tension, particularly when a fleeting\
    \ moment of Picard’s suppressed humanity surfaces—a brief, desperate plea for\
    \ understanding before the Borg’s control reasserts itself. Riker, desperate for\
    \ tactical intelligence, presses for information, but Locutus reveals nothing,\
    \ instead delivering a cold proclamation: the Borg’s advance toward Earth is unstoppable,\
    \ and the Enterprise’s rescue mission is meaningless. The scene forces Riker to\
    \ confront the brutal reality of the Borg threat while highlighting the fragility\
    \ of Picard’s lingering consciousness, setting up the stakes for Data’s impending\
    \ mind-meld as the crew’s last hope for a tactical advantage.\n  "
