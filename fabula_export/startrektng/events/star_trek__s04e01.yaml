      casting an eerie glow over the crew.
    - The hum of consoles and the distant thrum of the *Enterprise*’s engines, a constant
      reminder of the ship’s readiness for battle.
    - The dim, tactical lighting, which heightens the tension and focuses the crew’s
      attention on their stations.
    - The absence of non-essential personnel, creating a sense of isolation and urgency.
