  title: Riker orders covert shuttle infiltration
  description: "\n  In a high-stakes tactical maneuver, Riker exploits the Borg's\
    \ distraction from the antimatter spread to launch a stealth shuttle carrying\
    \ Data and Worf. The shuttle drifts unpowered through the Borg field, narrowly\
    \ evading a tractor beam sweep, while Data confirms the transporter has enough\
    \ energy for a round-trip infiltration. The shuttle breaches the Borg's electromagnetic\
    \ defenses, allowing Data and Worf to dematerialize onto the Borg ship—a desperate\
    \ gambit to capture Locutus (Picard) and uncover a weakness in the Collective.\
    \ The moment hinges on Riker's calculated risk, Data's precision, and the Borg's\
    \ momentary vulnerability, setting up the critical mind-meld attempt that could\
    \ save Earth.\n  "
