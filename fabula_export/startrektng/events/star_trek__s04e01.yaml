- fabula_uuid: act_b6b00f2a79a563fa
  number: 5
  summary: The Borg ship drops out of warp near Jupiter, with planetary defenses proving
    ineffective. The Enterprise, still forty-two minutes away from intercepting, faces
    Earth's imminent assimilation. In Data's lab, he establishes a multi-stage neural
    link with Locutus, closely monitored by Beverly, O'Brien, and Troi. During the
    final, dramatic connection, Picard's human consciousness briefly asserts itself,
    causing his Borg arm to attempt to sever the link. Data, using his strength, breaks
    the Borg arm, and Picard's human hand grasps Data's wrist, a desperate act of
    contact. Picard then whispers 'Sleep,' a command Data interprets as a strategy.
    Data, realizing the Borg's interdependency is their Achilles' heel, successfully
    plants a regenerative command into the Borg collective consciousness, effectively
    putting them 'to sleep' and halting their attack on Earth. The Enterprise, having
    been on a collision course, ceases its desperate final maneuver. Riker orders
    Shelby to confirm the Borg's incapacitated state, and she reports an imminent
    self-destruct sequence within the Borg ship. Despite Beverly's concerns about
    Picard's safety and Data's desire for further study, Riker orders the away team
    back and the Enterprise to a safe distance. The Borg ship explodes, freeing Picard
    from the collective. Picard recovers, acknowledging Riker's 'brilliantly unorthodox
    strategy.' As the Enterprise orbits Earth, Picard, though physically recovering,
    reflects on his assimilation, hinting at the lasting psychological trauma of his
    experience, leaving a poignant, unresolved note to his ordeal.
