  object_involvements:
  - object_uuid: ger_object_2dad61e70a5f
    description_of_involvement: The Enterprise’s warp reactor core is on the brink
      of catastrophic failure, its coolant systems overwhelmed by the strain of the
      failed assault on the Borg cube. The computer’s urgent warnings—'primary coolant
      failure' and 'exceeding reaction chamber thermal limit'—create a sense of impending
      doom, mirroring the crew’s desperation. Geordi’s shutdown of the warp engines
      is a last-ditch effort to prevent a chain reaction that would destroy the ship,
      but the core’s failure symbolizes the broader collapse of the Federation’s defenses.
      Its critical state underscores the Borg’s ability to push the Enterprise to
      its limits with ease.
    status_before_event: Overloaded and unstable, with coolant failure alarms blaring
      and thermal limits exceeded, threatening a catastrophic breach.
    status_after_event: Shut down by Geordi to prevent a breach, but the damage is
      done—its failure reflects the crew’s tactical impotence and the Borg’s overwhelming
      power.
