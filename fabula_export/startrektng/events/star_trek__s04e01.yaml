      \      "
    internal_dynamics: "\n        There is a tension between protocol and improvisation.\
      \ Riker and Shelby must balance Starfleet’s established procedures with the\
      \ need for unorthodox solutions. The crew’s unity is tested, but their shared\
      \ training and loyalty to the Federation keep them focused on the mission.\n\
      \      "
    global_id: ger_organization_73a4b614bde7
