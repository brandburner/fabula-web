  title: Riker and Shelby’s Command Tensions
  description: "\n  In Picard’s ready room, Riker—still wearing his captain’s pips—briefs\
    \ Picard on the *Enterprise*’s repair timeline, deferring to him with subtle deference.\
    \ Shelby enters, seeking permission to disembark, and the scene pivots into a\
    \ charged exchange. Shelby’s probing question about Riker’s future command opportunities\
    \ (‘I imagine you’ll get your choice of any Starfleet command’) reveals her ambition\
    \ and strategic interest in Riker’s trajectory, while Riker’s deflective response\
    \ (‘my career plans are my own business’) underscores his loyalty to Picard and\
    \ his reluctance to entertain alternatives. The subtext is clear: Shelby is testing\
    \ Riker’s ambition, hinting at a power dynamic that could fracture the crew’s\
    \ unity. Picard’s quiet dismissal of Shelby and his final order to Riker (‘Make\
    \ it so’) reaffirms their restored hierarchy, but the lingering tension—Riker’s\
    \ lingering confidence, Shelby’s veiled ambition—sets up future conflict over\
    \ leadership and loyalty. The scene closes with Picard alone, his pensive silence\
    \ suggesting unresolved trauma beneath the surface of command.\n  "
