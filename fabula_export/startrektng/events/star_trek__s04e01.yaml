      \ (e.g., Shelby’s com report, Wesley’s calculations). Starfleet’s broader struggle\
      \ against the Borg is embodied in the crew’s desperate attempts to protect their\
      \ advantages (like Data) and counter the Collective’s dominance. The organization’s\
      \ goals in this event are twofold: to safeguard its personnel and assets from\
      \ assimilation and to gather critical intelligence to inform a counterattack.\
      \ Its influence mechanisms include tactical coordination, real-time communication,\
      \ and the strategic prioritization of key personnel and technology.\n      "
    active_representation: "\n        Through the actions of its senior officers (Riker,\
      \ Beverly, Worf, Shelby) and the institutional protocols they follow (e.g.,\
      \ relocating Data, relaying urgent com reports). Starfleet’s presence is also\
      \ implied through the broader context of the Borg invasion and the crew’s training\
      \ in crisis response.\n      "
    power_dynamics: "\n        Starfleet is on the defensive, operating under the\
      \ constraint of the Borg’s overwhelming technological superiority. However,\
      \ the crew’s tactical ingenuity and protective instincts allow them to exert\
      \ influence in small but critical ways, such as shielding Data from exploitation\
      \ and gathering intelligence on the Borg’s weaknesses.\n      "
    organizational_goals:
