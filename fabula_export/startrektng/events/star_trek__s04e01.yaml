      becomes Starfleet’s final bulwark. The organization’s role in this event is
      to provide the crew with the resources, training, and strategic guidance needed
      to counter the Borg threat and protect Earth. Starfleet’s influence is felt
      in the crew’s tactical decisions, their adherence to protocol, and their unwavering
      commitment to the mission.
