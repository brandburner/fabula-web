    - The relentless march toward Earth, creating a sense of inevitability and urgency
    institutional_impact: "\n        The Borg Collective’s influence in this event\
      \ underscores the existential threat facing Starfleet and the Federation. Their\
      \ ability to assimilate even the most advanced personnel (like Picard) and technology\
      \ (like the Enterprise’s deflectors) demonstrates the futility of conventional\
