  global_id: null
  title: Locutus asserts Borg dominance over Riker
  description: "\n  The scene opens on the Borg ship, where Locutus—now more Borg\
    \ than human—is positioned near the communication chamber, his physical transformation\
    \ (pale skin, added Borg arm) underscoring his assimilation. As the Enterprise\
    \ approaches on the viewscreen, Locutus reacts with cold, calculated awareness,\
    \ his humanity further eroded. When Riker hails the ship, Locutus responds with\
    \ chilling authority, granting permission to speak in a tone that reinforces his\
    \ role as the Borg’s voice. The exchange is a deliberate psychological maneuver:\
    \ the Borg exploit Riker’s desperation to save Picard while asserting their unassailable\
    \ power over the Federation. Locutus’s brief hesitation before speaking—his face\
    \ flickering with residual human emotion—hints at the struggle beneath the collective’s\
    \ control, but the moment is fleeting. The scene serves as a turning point, solidifying\
    \ the Borg’s dominance and forcing Riker to confront the irreversible loss of\
    \ his captain and mentor.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e01
  scene_sequence: 8
  sequence_in_scene: 15
  key_dialogue:
