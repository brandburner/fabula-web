- fabula_uuid: cand_evt_scene_37930a92668332c2_01
  global_id: null
  title: Data initiates risky neural link with Locutus
  description: In Data’s laboratory, the crew prepares for a desperate, high-risk
    procedure to access the Borg collective through Locutus (Picard). Data, with Riker’s
    authorization, establishes a cybernetic link between his positronic matrix and
    Picard’s neural pathways, despite admitting he has never attempted this before.
    Beverly monitors Picard’s vital signs, O’Brien tracks Data’s positronic activity,
    and Troi stands by to detect any emotional or psychological connection to Picard’s
    consciousness. The procedure begins in stages, with Data confirming the first
    neural connection—but no meaningful access to the Borg hive mind is achieved.
    Meanwhile, the Borg ship’s relentless advance toward Earth is shown in the background,
    underscoring the urgency and stakes of the experiment. The scene blends scientific
    tension with existential dread, as the crew’s last hope for uncovering a Borg
    weakness hinges on this untested, potentially fatal gambit. The failure to breach
    the Borg consciousness leaves Picard’s condition stable but the mission’s objective
    unfulfilled, forcing the crew to confront the possibility that their most critical
    strategy may have already failed.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e01
