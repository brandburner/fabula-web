  - object_uuid: ger_object_8556c1a502fb
    description_of_involvement: "\n        The Borg Cube is the looming, existential\
      \ threat that drives the urgency of this event. Though not physically present\
      \ in Sickbay, its arrival in sector zero-zero-one—revealed through Shelby's\
      \ com transmission—shatters the crew's focus and forces them into desperate\
      \ action. The Cube's adaptive forcefields and relentless advance are implied\
      \ through the crew's reactions: Riker's urgency, Wesley's grim calculations,\
      \ and the collective dread of assimilation. Its presence is a silent but overwhelming\
      \ force, symbolizing the inevitability of the Borg's dominance unless the crew\
      \ can intervene.\n      "
    status_before_event: Approaching Jupiter Outpost 92, having breached Mars defenses
      and absorbed the Federation fleet at Wolf 359. Its adaptive forcefields render
      conventional attacks ineffective, and its trajectory is set for Earth.
    status_after_event: Confirmed in sector zero-zero-one, with Jupiter Outpost 92
      reporting visual contact. The Cube's arrival is now a confirmed, immediate threat,
      with 27 minutes until it reaches Earth.
    global_id: ger_object_8556c1a502fb
