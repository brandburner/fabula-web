  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: 'Starfleet is represented in this event through the
      actions of its officers—Riker, Shelby, Geordi, and Wesley—who execute a high-risk
      tactical maneuver to outmaneuver the Borg. The organization’s influence is felt
      in the crew’s discipline, their adherence to protocol even in the face of overwhelming
      odds, and their unwavering commitment to protecting the Federation. Starfleet’s
      training and values are on full display here, as the crew demonstrates the ability
      to adapt, improvise, and execute complex maneuvers under pressure. The organization’s
      goals are embodied in Riker and Shelby’s strategy: to buy time for Data’s mission
