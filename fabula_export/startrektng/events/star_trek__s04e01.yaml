      protocols (neural link procedure, retreat maneuvers), and collective action
      of crew members (away team, bridge crew).
    power_dynamics: Exercising authority over individuals (Riker's command decisions),
      being challenged by external forces (the Borg Collective), and operating under
      constraint (limited time, resources, and intelligence).
    organizational_goals:
