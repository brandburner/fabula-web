  global_id: null
  title: Riker abandons diplomacy for tactical strike
  description: After a failed attempt to exploit Locutus’s lingering humanity by appealing
    to Picard’s past trust in him, Riker recognizes the futility of negotiation. The
    Borg collective rejects all terms, reasserting its inhumanity with an ultimatum—disarmament
    and escort to Earth for assimilation. Riker, now fully aware that diplomacy is
    impossible, abruptly terminates the transmission and pivots to a tactical response.
    He orders Gleason to pinpoint the Borg’s signal source, signaling a shift from
    negotiation to direct confrontation. This moment marks a critical escalation in
    the Enterprise’s strategy, abandoning hope for a peaceful resolution and committing
    to a high-stakes military counterattack to locate and neutralize the Borg’s command
    structure before Earth falls. The decision reflects Riker’s growing acceptance
    of his role as captain and the harsh reality that the Borg cannot be reasoned
    with—only fought.
