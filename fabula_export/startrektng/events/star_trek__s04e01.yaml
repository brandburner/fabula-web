  title: Riker’s futile attack on the Borg
  description: Riker, now captain of the *Enterprise*, orders a full-power deflector
    blast at the Borg cube in a desperate attempt to disrupt their advance. The bridge
    crew braces as the ship’s systems strain under the energy discharge, with Geordi
    monitoring the deflector’s power levels. The beam strikes the Borg vessel, but
    their adaptive forcefield absorbs the blast without consequence, leaving the *Enterprise*
    vulnerable. The failed attack underscores the Borg’s technological superiority
    and the crew’s growing helplessness, while Locutus (Picard) looms on the viewscreen
    as an inescapable symbol of their doom. The moment forces Riker to confront the
    futility of brute force, setting up the need for a more strategic solution—like
    Data’s mind-meld with Locutus—to save Earth from assimilation. The tension is
    palpable as the crew watches their best weapon fail, and the Borg’s impassive
    response amplifies the stakes of the impending battle.
