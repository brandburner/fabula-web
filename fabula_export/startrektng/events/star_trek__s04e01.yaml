      Earth.
    what_happened: 'Locutus dominates the viewscreen, his voice a chilling amalgam
      of Picard’s cadence and the Borg’s mechanical precision. His face is a mask
      of assimilation—eyes hollow, skin pallid, his humanity stripped away. He delivers
      the Borg’s ultimatum with cold finality: *''We will proceed to Earth and if
      you attempt to intervene we will destroy you.''* There is no negotiation in
      his tone, only the collective’s inexorable will. His presence is a specter,
      a reminder of what the *Enterprise* crew stands to lose if they fail. The transmission
      cuts abruptly, but the weight of his words lingers, a psychological weapon as
      potent as any Borg drone.'
