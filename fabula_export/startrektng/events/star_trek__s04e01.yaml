    - The Federation’s ideological commitment to resistance, which provides the moral
      and emotional foundation for the *Enterprise*’s defiance.
    institutional_impact: This moment reinforces Starfleet’s role as the vanguard
      of Federation defense, where individual officers like Riker embody the organization’s
      values under fire. The *Enterprise*’s actions here set a precedent for Starfleet’s
      response to existential threats, demonstrating that even in the face of annihilation,
      the Federation will not surrender without a fight.
    internal_dynamics: The chain of command is tested as Riker assumes Picard’s role,
      but the crew’s loyalty to Starfleet’s mission overrides any internal tensions.
      The organization’s unity is its greatest strength in this crisis.
