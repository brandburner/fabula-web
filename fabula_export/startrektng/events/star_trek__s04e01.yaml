- fabula_uuid: cand_evt_scene_df94f3eeb122971a_01
  global_id: null
  title: Riker sacrifices battle section to save saucer
  description: "\n  With the Borg closing in and Picard assimilated as Locutus, Riker\
    \ executes a high-stakes tactical maneuver: he orders the *Enterprise*’s saucer\
    \ section to separate and flee while the battle section—with its weapons and crew—remains\
    \ behind to engage the Borg. The separation is swift and precise, with Geordi\
    \ confirming the docking latches clear and Wesley tracking the saucer’s velocity\
    \ as it pulls away. Riker immediately orders all weapons to open fire, drawing\
    \ the Borg’s attention to the battle section. Locutus, anticipating the move,\
    \ focuses the Borg ship’s tractor beam on the battle section, confirming Riker’s\
    \ gambit: the Borg prioritize the section with firepower, leaving the saucer vulnerable\
    \ but intact. Wesley’s reports—‘Borg tractor beam attempting to lock on’ and ‘They’re\
    \ ignoring the saucer section completely’—validate the strategy, while Riker’s\
    \ murmured ‘Just as you should, Captain’ reveals his psychological edge, taunting\
    \ Locutus even as the battle section’s fate hangs in the balance. Shelby’s order\
    \ to fire the antimatter spread sets up the next phase of the counteroffensive,\
    \ but the cost is clear: the battle section’s crew and weapons are now the Borg’s\
    \ primary target, a sacrifice Riker makes with grim resolve to ensure the saucer’s\
    \ survival and Data’s mind-meld attempt. The scene underscores Riker’s leadership\
    \ under pressure, the Federation’s willingness to endure loss for the greater\
    \ good, and the Borg’s relentless, tactical predictability—all while raising the\
    \ stakes for Picard’s recovery and Earth’s defense.\n  "
