      of a fleet at Wolf 359. The organization’s influence is felt in Hanson’s promotion
      of Riker to captain, his framing of Picard’s assimilation as a casualty of war,
      and the urgent call to action against the Borg. Starfleet’s protocols and chain
      of command are on full display, as the crew is tasked with rejoin the fleet
      and contributing to the defense of Earth. The organization’s presence is both
      a source of structure and a reminder of the high stakes facing the Federation.
