    what_happened: "\n        Locutus watches the *Enterprise*’s separation from the\
      \ Borg ship, his voice a chilling blend of Picard’s cadence and the Borg’s collective\
      \ monotone. He anticipates Riker’s strategy, directing the Borg’s tractor beam\
      \ to lock onto the battle section—the part with weapons. His actions are cold,\
      \ calculated, and devoid of emotion, yet there’s a flicker of something almost\
      \ human in his recognition of Riker’s taunt. He is the Borg’s tactical voice,\
      \ ensuring their focus remains on the threat they understand: firepower. His\
      \ presence looms over the scene, a reminder of what Picard has become—and what\
      \ the crew is fighting to undo.\n      "
