  title: Riker confronts Troi about Picard’s loss
  description: In the captain’s ready room, Riker—now wearing Picard’s rank—avoids
    sitting in the captain’s chair, instead occupying his usual seat as if clinging
    to the past. When Troi enters, their dynamic is immediately strained by the new
    power imbalance; Riker’s warmth is met with Troi’s professional distance, a silent
    acknowledgment of the emotional barrier now between them. Their conversation reveals
    the crew’s collective grief over Picard’s assimilation, with Troi framing his
    loss as a national or familial tragedy. Riker’s raw admission that Picard was
    a father to him exposes his vulnerability, but he quickly shifts to operational
    reassurance, masking his pain with duty. The moment underscores the cost of leadership—Riker’s
    loneliness in command—and the fragility of intimacy under crisis, as Troi’s response
    hints at her conflicted loyalty between personal bonds and professional duty.
    The scene ends with Riker glancing at Picard’s empty chair, a visual metaphor
    for the void he must now fill alone.
