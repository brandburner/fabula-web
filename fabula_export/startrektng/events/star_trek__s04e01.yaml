      protocols and their reliance on Starfleet resources reflect the organization’s
      commitment to protecting the Federation, even in the face of overwhelming odds.
      The event highlights the high cost of resistance and the need for proactive
      tactics to counter the Borg’s unyielding hostility.
    internal_dynamics: Internal debate over response strategy, as the crew grapples
      with the loss of Picard and the ship’s critical damage. The chain of command
