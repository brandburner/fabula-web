      loss. The organization’s ability to unite disparate forces and make difficult
      decisions underscores its role as the backbone of the Federation’s defense.
    internal_dynamics: Internal debate over the tactical implications of Picard’s
      assimilation, with Shelby challenging Hanson’s refusal to accept Picard as a
      liability. The chain of command is reinforced, but the emotional toll on the
      crew is evident, creating tension between institutional protocol and personal
      grief.
