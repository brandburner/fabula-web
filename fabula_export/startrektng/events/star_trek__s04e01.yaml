      \ driven by urgency and the need to safeguard a critical asset. The hypospray’s\
      \ role is purely functional but symbolically significant—it represents the crew’s\
      \ refusal to let the Borg dictate the terms of engagement, even in a moment\
      \ of vulnerability.\n      "
    status_before_event: "\n        The hypospray is in Beverly Crusher’s possession,\
      \ fully charged and ready for use. It is a standard medical tool in Sickbay,\
      \ designed for rapid administration of sedatives or other treatments in emergencies.\n\
