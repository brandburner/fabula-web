  object_involvements:
  - object_uuid: ger_object_8538dc934630
    description_of_involvement: 'Picard’s microcircuit fibers are the physical manifestation
      of his assimilation, but their mention here is indirect—Data’s failure to establish
      a neural path around them highlights their role as an obstacle. The fibers symbolize
      the Borg’s control, yet Picard’s bypassing of them proves they are not absolute.
      Their presence is a looming threat, but his resistance turns them into a tactical
      clue: if he can initiate contact despite them, the crew might find another way
      to exploit this weakness.'
    status_before_event: Embedded deep within Picard’s tissues, fully functional and
      suppressing his human consciousness—except for this brief, defiant resurgence.
    status_after_event: Temporarily overridden by Picard’s human will, creating a
      fragile opening for the crew to act.
    global_id: ger_object_8538dc934630
  - object_uuid: ger_object_b55edc5b6283
    description_of_involvement: 'Data’s neural link to Locutus is the critical tool
      enabling Picard’s contact, though it is described as unstable. The link is not
      a physical object but a conceptual bridge—its ‘flickering signals’ are the crew’s
      only evidence of Picard’s resistance. This intangible connection becomes the
      crew’s lifeline, offering a glimpse into the Borg’s vulnerability. The link’s
      fragility (mentioned in Data’s comlink report) underscores the urgency: the
      crew must act before it collapses or the Borg adapt.'
    status_before_event: Attempted but failed by Data—Picard’s human consciousness
      initiates it independently, bypassing Borg protocols.
    status_after_event: Temporarily stable, providing the crew with a two-minute window
      to exploit the Borg’s hesitation.
    global_id: ger_object_b55edc5b6283
