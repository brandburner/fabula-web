    global_id: ger_object_012e8ab331bb
  - object_uuid: ger_object_58a64b47ce2f
    description_of_involvement: The Borg tractor beam is the antagonist force in this
      event, a glowing energy field that locks onto the Enterprise’s battle section
      with relentless precision. Directed by Locutus, it ignores the saucer section
      entirely, confirming Riker’s strategy. The beam’s lock-on forces Riker to execute
      evasive maneuvers (Riker Alpha and Beta), adding tension and urgency to the
