  global_id: null
  title: Riker’s Failed Appeal to Picard’s Humanity
  description: In a desperate bid to exploit Locutus’s lingering humanity, Riker appeals
    to Picard’s past—invoking their shared history as friends and colleagues to fracture
    the Borg’s control. Locutus initially hesitates, suggesting Picard’s consciousness
    is still present, but the collective swiftly reasserts dominance, rejecting diplomacy
    and issuing an ultimatum that escalates the conflict toward inevitable confrontation.
    The failure underscores the Borg’s inhumanity and forces Riker to confront the
    irreversible loss of his captain and mentor, shifting the narrative from negotiation
    to tactical response. The moment also reveals the Borg’s psychological warfare,
    exploiting Riker’s grief while reinforcing their unassailable power over the Federation.
    Riker’s subsequent order to pinpoint the Borg’s transmission source marks the
    transition from diplomacy to direct action, setting up the next phase of the battle.
