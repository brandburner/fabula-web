  object_involvements:
  - object_uuid: ger_object_59a95b0176ae
    description_of_involvement: 'The antimatter spread is the centerpiece of Riker
      and Shelby’s gambit, a high-risk tactical maneuver designed to disrupt the Borg’s
      collective focus. Ordered by Shelby and executed by the tactical officer, the
      spread erupts into a chaotic field of antimatter charges, forcing the Borg to
      adjust their tractor beam and prioritize the battle section. Its role here is
      twofold: it serves as a distraction, drawing the Borg’s attention away from
      the saucer, and as a disruptive force, creating the critical window Data needs
      to infiltrate the Borg ship. The spread’s deployment is a moment of high tension,
      as the crew braces for the Borg’s retaliation while hoping their gamble will
      pay off.'
    status_before_event: Charged and ready in the battle section’s weapons array,
      awaiting Shelby’s order to deploy.
    status_after_event: Fired and erupting in a chaotic field, disrupting the Borg’s
      focus and confirming the saucer’s escape.
    global_id: ger_object_59a95b0176ae
  - object_uuid: ger_object_401e97aaefe2
    description_of_involvement: 'The Enterprise’s battle section weapons are the primary
      tools of Riker and Shelby’s deception. Ordered to open fire by Riker and deployed
      in the antimatter spread by Shelby, these weapons serve as the bait that lures
      the Borg’s attention. Their barrage forces the Borg to adjust their tactics,
      locking the tractor beam onto the battle section and ignoring the saucer’s retreat.
      The weapons’ role here is symbolic as much as functional: they represent the
      crew’s defiance in the face of overwhelming odds. Their deployment is a gamble,
      but one that pays off by creating the critical window Data needs to infiltrate
      the Borg ship.'
    status_before_event: Charged and ready, awaiting orders to engage the Borg cube.
