  title: Borg self-destruct forces emergency extraction
  description: "\n  The away team on the Borg ship—led by Shelby—discovers the collective\
    \ is entering a catastrophic self-destruct sequence triggered by their malfunction.\
    \ Shelby reports this to Riker, who immediately orders Data to sever his neural\
    \ link with Picard (Locutus) to prevent further risk. Meanwhile, Beverly warns\
    \ of the unknown consequences to Picard’s condition if the Borg ship explodes.\
    \ Riker prioritizes crew survival, commanding the away team to beam out while\
    \ the *Enterprise* retreats. As Data disconnects, the Borg ship detonates in a\
    \ series of decentralized bursts, and Picard’s vitals stabilize, his humanity\
    \ restored. The moment crystallizes the Federation’s desperate gamble: sacrificing\
