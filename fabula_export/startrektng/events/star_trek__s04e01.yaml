  title: Riker Orders Collision Course
  description: 'With the *Enterprise* trapped in the Borg tractor beam and shields
    failing, Riker makes the desperate decision to ram the Borg vessel—a last-ditch
    effort to protect Earth. Meanwhile, Data’s neural link with Locutus yields a critical
    clue: Picard, briefly breaking free of Borg control, whispers the word *‘Sleep’*,
    which Data interprets as a potential weakness in the Borg collective. The scene
    escalates the Federation’s existential crisis, forcing Riker to embrace command
    while Data races to exploit Picard’s cryptic message before the Borg reassert
    dominance. The moment crystallizes the stakes—every second without a countermeasure
    brings Earth closer to annihilation, and Picard’s fleeting resistance underscores
    the cost of the Borg’s assimilation.'
