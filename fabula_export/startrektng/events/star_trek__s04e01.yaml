  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: Starfleet directs the *Enterprise* crew—including
      promoted captain Riker and first officer Shelby—in desperate Borg countermeasures.
      Admiral Hanson mobilizes 40 ships at Wolf 359, relaying defeats, and underscores
      Earth defense. Training equips officers to manage grief while executing tactics
