    - Through the Collective’s hive mind, which coordinates the assault with relentless
      efficiency.
    institutional_impact: "\n        The Borg’s actions in this event highlight their\
      \ role as an existential threat to the Federation. Their adaptability forces\
      \ Starfleet to think beyond conventional warfare, and their focus on assimilation\
      \ underscores the stakes of the conflict. The event also sets up the need for\
