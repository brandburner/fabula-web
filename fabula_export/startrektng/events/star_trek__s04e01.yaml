  global_id: null
  title: Riker cuts Borg communications and orders counterattack
  description: After Locutus (assimilated Picard) dismisses Riker’s desperate attempt
    to stall the Borg’s advance with emotional appeals, Riker abruptly terminates
    the transmission, severing the Borg’s psychological leverage. He immediately shifts
    to tactical action, ordering Gleason to reset subspace communications to a scrambled
    code—Riker One—effectively cutting off further Borg communication attempts. This
    move is both a defensive maneuver to protect the *Enterprise* from Borg infiltration
    and a strategic signal to the crew that the time for negotiation is over. Riker
    then demands a status report from Commander Shelby, setting the stage for the
    preemptive strike against the Borg. The scene underscores Riker’s evolution from
    hesitation to decisive leadership, as he embraces the ruthless pragmatism required
    to counter the Borg’s collective threat. The abrupt termination of dialogue with
    Locutus also marks a symbolic rejection of Picard’s assimilated state, reinforcing
    the crew’s resolve to fight rather than surrender to the Borg’s inevitability.
    The reset of communications and the call for Shelby’s report create a sense of
    urgency, propelling the narrative toward the impending counterattack.
