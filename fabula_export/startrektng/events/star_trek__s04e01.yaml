    GUINAN: The way I see things, if a man is convinced he's gonna die tomorrow, he'll probably find some way to make it happen. The only one who can turn that around... is you.
    RIKER: I'll do the best I can.
    GUINAN: You'll have to do something you don't want to do. Let go of Picard.
  - 'RIKER: Whatever the outcome, I know our efforts in the coming battle will justify
    the faith he had in all of us.'
