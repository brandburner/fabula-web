      \ of their defenses and the inevitability of assimilation. The organization's\
      \ power dynamics are a stark contrast to Starfleet's, highlighting the crew's\
      \ vulnerability and the high stakes of their counterattack.\n      "
    internal_dynamics: "\n        The Borg Collective operates as a unified hive mind,\
      \ with no internal conflict or individuality. Its actions are driven by cold\
