  title: Riker orders retreat after Borg adapt
  description: 'The Enterprise''s desperate assault on the Borg cube fails catastrophically
    as the collective, now augmented by Picard''s tactical knowledge as Locutus, effortlessly
    absorbs the ship''s weapons fire. Geordi struggles to stabilize the overtaxed
    warp core while the bridge crew watches in stunned silence as their most powerful
    attacks prove useless. Riker, his face a mask of disbelief, finally orders a ceasefire—only
    for Locutus to deliver a chilling revelation: Picard''s assimilation has given
    the Borg total foreknowledge of Federation strategies. The moment crystallizes
    the Federation''s vulnerability, forcing Riker to confront the horrifying truth
    that brute force cannot prevail against an enemy that now wields their own captain''s
    mind. The scene ends with Locutus'' personal address to Riker as ''Number One,''
    a deliberate psychological strike that underscores the irrevocable loss of Picard
    and the Borg''s total dominance over the situation.'
