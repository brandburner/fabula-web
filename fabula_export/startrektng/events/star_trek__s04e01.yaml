  object_involvements:
  - object_uuid: ger_object_ef167644bb75
    description_of_involvement: The Borg cutting beam is the weapon that seals the
      fate of the away team’s shuttle. Fired by the Borg ship as Worf, Data, and Locutus
      beam out, the cutting beam slices through the vessel, reducing it to twisted
      metal and debris. The beam’s activation is a swift and lethal counter to the
      away team’s extraction attempt, forcing them to rely on the transporter for
      their last-second escape. Its role in the event is that of the retaliatory strike,
      reflecting the Borg’s unyielding hostility and their determination to prevent
      the Federation from gaining any advantage.
    status_before_event: Charged and ready for use, part of the Borg ship’s arsenal
      of weapons. The cutting beam is a standard-issue tool for neutralizing threats
      and eliminating escape routes.
    status_after_event: Discharged after destroying the shuttle, its energy expended.
      The cutting beam has fulfilled its purpose in retaliating against the away team,
      though its effectiveness against future Federation tactics remains a point of
      concern.
    global_id: ger_object_ef167644bb75
  - object_uuid: ger_object_36a7b49947da
    description_of_involvement: Data’s transporter armband is a compact but powerful
      device that enables the away team’s escape from the Borg ship. After sedating
      Locutus, Data activates the armband’s controls to beam the team—Worf, himself,
      and the unconscious Locutus—back to the *Enterprise*. The armband’s pulse of
      energy cuts through Borg interference, ensuring a successful transport despite
      the shuttle’s destruction. Its role in the event is that of the lifeline, providing
      the team with a means of escape when all other options are exhausted.
    status_before_event: Fully functional and synchronized with the *Enterprise*’s
