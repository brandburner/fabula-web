- fabula_uuid: act_e93ae6d11adf91d3
  number: 3
  summary: The Enterprise navigates the debris field of Wolf 359, following magnetic
    eddy currents that indicate the Borg ship's course. Riker, now fully in command,
    orders Ensign Crusher to pursue the Borg and instructs Shelby to prepare the saucer
    separation plan, revealing his intention to use the Borg's knowledge of Picard's
    strategies against them. He assigns Data and Worf a special mission. On the Borg
    ship, Locutus, further dehumanized, communicates with Riker, who attempts to deceive
    him into a meeting. Riker uses Picard's past trust to create a momentary processing
    difficulty for Locutus, but the Borg influence quickly reasserts itself, demanding
    unconditional surrender. Riker cuts communication, then re-establishes it with
    a scrambler code, feigning a delay for assimilation while covertly preparing his
    attack. He orders the saucer separation, and the battle section, under Riker's
    command, lures the Borg's tractor beam while the saucer section fires an antimatter
    spread. Amidst the pyrotechnics, Data and Worf launch in a shuttle, cutting their
    engines to evade the Borg's tractor beam. They successfully penetrate the Borg
    ship's electromagnetic field, materialize inside, neutralize nearby Borg, and
    capture Locutus. They transport back to the Enterprise just as the Borg ship obliterates
    their shuttle, securing their objective.
