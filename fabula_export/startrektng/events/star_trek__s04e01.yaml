- fabula_uuid: act_dc2bee914ee545d4
  number: 4
  summary: 'The Borg ship warps away from Wolf 359, resuming its course toward Earth,
    leaving the Enterprise to reconnect its sections and pursue. In Sickbay, Beverly
    Crusher examines the unconscious Locutus, noting extensive microcircuit infiltration
    and DNA rewriting. Riker presses her to revive him, hoping to extract vulnerabilities
    from the Borg collective through Picard. Upon revival, Locutus speaks, confirming
    his awareness of being on the Enterprise but dismisses his capture as a ''futile
    maneuver,'' asserting the Borg will continue their advance on Earth. He scans
    Worf and Data, declaring their species will be assimilated or become obsolete.
    Data, Riker, and Beverly observe that Locutus transmits complex subspace signals
    to the Borg ship, forming the basis of their collective consciousness. Beverly
    warns that severing this link could be fatal to Picard, as the Borg self-destruct
    when disconnected. Data proposes a dangerous alternative: he can access the ''machine''
    aspect of the Borg collective through a direct neural link with Locutus. Meanwhile,
    the Borg ship enters Sector 001, passing Saturn, bringing the threat of assimilation
    ever closer to Earth.'
