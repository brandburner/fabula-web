  sequence_in_scene: 30
  key_dialogue:
  - 'DATA: Using multimodal reflection sorting, I have been able to detect a complex
    series of subspace signals between Locutus and the Borg ship...'
  - 'BEVERLY: That''s how they''re controlling him?'
  - 'DATA: It is not just a matter of control, Doctor. The signals are interactive
    across a subspace domain similar to that of a Transporter beam. I would hypothesize
    that these frequencies form the basis of the Borg''s collective consciousness.'
  - 'RIKER: Can''t we block them?'
  - 'DATA: Possibly. But, as you will recall, on several occasions, we have witnessed
    the Borg removing key circuits from injured comrades... no doubt separating them
    from the group consciousness.'
  - 'RIKER: The injured Borg immediately self-destructed.'
  - 'DATA: That is correct, sir.'
  - 'BEVERLY: Cutting the link to Locutus might be fatal to Captain Picard.'
  - 'DATA: (beat, an idea) Then perhaps... there is a way I can access the ''machine'',
    Doctor.'
