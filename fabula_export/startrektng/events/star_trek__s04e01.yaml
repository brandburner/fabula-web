    internal_dynamics: |2-

      The event exposes **tensions between tactical necessity and ethical concerns**—Beverly's warnings about Picard's condition clash with Riker's orders to retreat. There is also a **factional dynamic** between those who advocate for further study (Data) and those who prioritize survival (Riker, Beverly). However, the crew ultimately **unites behind Riker's leadership**, demonstrating Starfleet's ability to **resolve internal conflicts** in high-pressure situations.
