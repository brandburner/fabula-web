  title: Data paralyzes the Borg Collective
  description: With the *Enterprise* under relentless Borg assault and hull breaches
    imminent, Riker prepares to issue evacuation orders when Data interrupts via comms,
    revealing he has exploited a vulnerability in the Borg’s hive mind. Using the
    cryptic command Picard whispered earlier—*sleep*—Data triggers a regenerative
    subcommand, forcing the entire Borg Collective into a dormant state. The attack
    halts abruptly, leaving the crew stunned. Riker, initially skeptical, demands
    confirmation, and Data clarifies that the Borg’s power drive and electromagnetic
    field are now minimal, effectively neutralizing the immediate threat. The moment
    hinges on Data’s earlier neural link with Locutus, proving his sacrifice and ingenuity
    have bought the Federation precious time. Riker, seizing the opportunity, immediately
    dispatches Shelby to verify the Borg’s incapacitation, shifting the narrative
    from desperation to tactical advantage. The event underscores Data’s unique role
    as both a bridge and a weapon against the Borg, while Riker’s leadership is tested
    in real-time decision-making under extreme pressure.
