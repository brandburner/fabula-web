    status_after_event: |2-

      The Borg Cube is destroyed in a series of decentralized explosions, its structure disintegrating into debris. The Collective's hive mind is disrupted, and Picard is freed from its influence. The ship's remnants drift in space, no longer a threat, but also no longer a source of intelligence. The destruction is both a tactical success and a strategic sacrifice.
