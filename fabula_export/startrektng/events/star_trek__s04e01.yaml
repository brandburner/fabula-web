      \ Sparks fly, welding torches hiss, and the warp core’s blue plasma pulses with\
      \ restrained power. Engineering is where the ship’s lifeblood is maintained,\
      \ where technical precision meets desperate urgency. Its role in this event\
      \ is critical, even if off-screen.\n      "
    observed_atmosphere: "\n        Chaotic but controlled, with the clang of repair\
      \ tools, the hiss of welding torches, and the low thrum of the warp core. The\
      \ air is thick with the scent of oil and ozone, the lighting flickering as systems\
      \ strain under the Borg’s assault. There’s a sense of controlled panic—every\
      \ second counts, and every repair could mean the difference between survival\
