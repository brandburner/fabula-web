    but they had a big ship— they kept shooting at us. Then they beamed over. They
    had purple helmets on and phaser rifles. I saw them. But they didn’t see me...'
  - 'BEVERLY: You''re safe now, Timothy. You''re going to be alright.'
  - 'TIMOTHY: Yes.'
  - 'DATA: Counselor, I must join Commander La Forge in engineering. If you will excuse
    me—'
  - 'TROI: Timothy, would you like Data to stay a little bit longer?'
