      \ underscores the structural integrity of the *Vico*'s remaining systems and\
      \ the high risks associated with any attempt to retrieve data or survivors.\
      \ The translink signal's failure forces the crew to reconsider their approach,\
      \ ultimately leading to the decision to send an away team. The signal's role\
      \ in the event highlights the crew's reliance on technology and the limitations\
      \ imposed by the Black Cluster's anomalies.\n      "
    status_before_event: "\n      The translink signal is fully functional and ready\
      \ for use, stored within the *Enterprise*'s systems. It is intended to establish\
      \ a secure data link with the *Vico*'s computer core, allowing the crew to retrieve\
      \ critical information about the vessel's destruction. The signal is a standard\
