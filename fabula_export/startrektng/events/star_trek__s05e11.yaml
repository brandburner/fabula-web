    - To fulfill his Starfleet duty by responding to Geordi’s summons (end)
    what_happened: |2-

              Data enters Timothy’s quarters with his characteristic poise, immediately focusing on the boy’s sloppy Dokkaran temple model. His critique is delivered with clinical detachment—'*It lacks the harmony that characterized this particular temple*'—unaware of the emotional landmine he’s triggered. When Timothy collapses into self-loathing, Data attempts to correct the boy’s construction method, but his patience wears thin as Timothy’s frustration escalates. The pivotal moment arrives when Data, sensing the boy’s despair, *rebuilds the model at 'Data speed'* in a blur of precision, leaving Timothy stunned. Data’s departure is abrupt, summoned by Geordi’s comm, but not before Timothy’s awestruck gaze lingers on him—a silent acknowledgment of the gulf between human and machine.
