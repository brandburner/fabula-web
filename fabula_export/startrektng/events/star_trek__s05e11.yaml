              *A metaphor for the fragility of life and the weight of survival*. The corridor’s collapsed beams and exposed wiring symbolize the vulnerability of the Vico’s crew, while the survivor’s cry represents the thin line between life and death. The away team’s presence in this space is a testament to their mission—to preserve life, even in the face of overwhelming odds. The corridor is both a grave and a lifeline, and the team’s actions determine which role it will ultimately play.
