      to adapt to the unexpected while upholding its core values.
    internal_dynamics: The tension between individual agency and institutional constraint
      is evident in Riker’s reluctance to leave Data behind. While Starfleet protocol
      dictates the retreat, Riker’s personal connection to his crewmates creates an
      internal conflict—one that Starfleet’s structure does not fully address. Similarly,
