  title: Timothy’s memory triggers Data’s investigation
  description: 'During a violent gravitational wavefront assault on the *Enterprise*,
    Timothy—already traumatized by the destruction of the *Vico*—physically clings
    to Data as his repressed memories resurface. His repeated, frantic utterance of
    *‘more shields’* sparks Data’s analytical curiosity, leading the android to immediately
    relocate Timothy to the aft science station. There, Data attempts to extract and
    analyze the boy’s fragmented recollections of the *Vico*’s final moments, hoping
    to uncover critical information about the Black Cluster’s threat. The scene underscores
    the duality of external crisis (the ship’s struggle against the wavefront) and
    internal revelation (Timothy’s buried trauma becoming a potential key to survival).
    Troi’s failed attempt to remove Timothy from the bridge highlights his emotional
    dependence on Data, while Picard’s focus on evasive maneuvers contrasts with Data’s
    methodical pursuit of answers through the boy’s mind. The moment marks a turning
    point: Timothy’s trauma is no longer just a personal burden but a strategic asset
    in the *Enterprise*’s fight for survival.'
