  title: Gravitational wavefront traps the Enterprise
  description: The *Enterprise* is struck by a violent gravitational wavefront, forcing
    Commander Riker to raise shields and initiate a red alert. As the ship shudders
    under the distortion, Timothy—already traumatized by the destruction of the *Vico*—relives
    his repressed memories, clinging to Data in terror. The crew struggles to stabilize
    the ship, with Worf reporting minimal damage but escalating sensor disruptions.
    Picard orders evasive maneuvers, but the helm fails to respond, leaving the ship
    trapped. Data, noticing Timothy’s distress, begins probing his memories of the
    *Vico*’s destruction, while Troi attempts to guide the boy away from the chaos.
    The scene escalates the ship’s peril while deepening Timothy’s psychological unraveling,
    linking his trauma to the present crisis.
