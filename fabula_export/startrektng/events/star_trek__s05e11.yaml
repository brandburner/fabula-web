      traumatized child—from undue stress. This tension is evident in Picard’s shift
      from therapeutic support to interrogation, as he balances the need for answers
      with the ethical responsibility to avoid retraumatizing the boy. Starfleet’s
      influence is also seen in the crew’s disciplined response to the Black Cluster’s
      perils, their adherence to protocol even as their technology fails.
