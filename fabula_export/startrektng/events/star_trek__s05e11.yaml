- fabula_uuid: cand_evt_scene_1bfabe02aad6577e_01
  global_id: null
  title: Picard questions Vico destruction evidence
  description: "\n  On the bridge’s science station, Picard, Data, and Geordi analyze\
    \ forensic evidence of the Vico’s destruction, revealing inconsistencies between\
    \ the forensic data and Timothy’s claim of a boarding party. Geordi confirms no\
    \ physical traces of intruders—no transporter signatures or docking anomalies—while\
    \ Picard speculates about cloaked attackers (Romulan, Klingon, or Breen). When\
    \ Troi enters, Picard voices skepticism about Timothy’s account, prompting Troi\
    \ to defend the boy’s trauma as a barrier to clear recall. The tension escalates\
    \ as Geordi exits to recheck sensor logs, leaving Troi to propose Data as Timothy’s\
    \ confidant, leveraging their bond to uncover the truth. Picard approves, framing\
    \ Data’s role as both therapeutic and investigative. The scene pivots from forensic\
    \ analysis to psychological strategy, exposing the crew’s divided trust in Timothy’s\
    \ testimony and setting up Data’s emotional challenge: navigating human grief\
    \ while extracting critical facts.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e11
  scene_sequence: 16
  sequence_in_scene: 24
  key_dialogue: &id015
  - 'PICARD: No sign of phaser burns on the hull.'
  - 'GEORDI: I don''t think that''s likely, sir... There was absolutely no evidence
    of anybody coming on board the Vico. We would have found a transporter field trace.
    Or if somebody had used the entry ports, we would have found an electrostatic
    differential in the docking latches. We didn''t.'
  - 'PICARD: Or he''s lying.'
