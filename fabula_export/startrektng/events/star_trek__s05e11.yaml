  title: Data rescues Timothy from wreckage
  description: In the collapsing ruins of the VICO research vessel, Data locates the
    traumatized survivor Timothy trapped beneath a bulkhead. With precise android
    strength, Data lifts the debris to free the boy, but the action triggers a secondary
    collapse, forcing an immediate escape. Data scoops Timothy into his arms and sprints
    toward the corridor, triggering an emergency transport just as the ceiling caves
    in. The rescue underscores the fragility of human life amid the Black Cluster’s
    dangers while establishing Data’s role as Timothy’s protector—a dynamic that will
    shape their emotional bond moving forward. The urgency of the moment contrasts
    with Data’s deliberate, reassuring actions, highlighting his growing capacity
    to balance logic with empathy. The scene also serves as a turning point, shifting
    focus from the investigation of the VICO’s destruction to Timothy’s trauma and
    the crew’s moral responsibility to him.
