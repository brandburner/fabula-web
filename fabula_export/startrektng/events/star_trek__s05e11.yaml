acts:
- fabula_uuid: act_7c4570129d6291d6
  number: 1
  summary: The Enterprise arrives at a perilous Black Cluster, discovering the research
    vessel Vico destroyed and adrift. Captain Picard dispatches an away team, including
    Commander Riker, Data, and Geordi, to investigate. They navigate the heavily damaged
    Vico, finding bodies amidst the wreckage, confirming no adult survivors. Deep
    within the ship, they locate a young boy, Timothy, trapped beneath a fallen bulkhead.
    Data, demonstrating his superior android strength, carefully lifts the massive
    debris, rescuing the traumatized child. Timothy is transported to Sickbay, still
    gripping Data's hand, and recounts a harrowing, yet inconsistent, tale of purple-helmeted
    attackers boarding his ship. This account immediately raises questions, as Geordi
    and Picard find no physical evidence of a boarding party or external attack during
    their initial analysis of the Vico's damage. Counselor Troi observes Timothy's
    profound shock and withdrawal, recognizing his narrative as a coping mechanism
    for overwhelming trauma. She suggests Data, the boy's rescuer and the only figure
    Timothy has connected with, spend time with him. Data, initially perplexed by
    the nuances of human emotion and trauma, begins his interactions with Timothy.
    During an activity, Data's objective critique of Timothy's model crushes the boy,
    but Data's subsequent demonstration of android efficiency and strength deeply
    impresses Timothy. This interaction marks the beginning of Timothy's emulation
    of Data, a nascent attempt to escape his pain by adopting an emotionless, powerful
    persona. The act concludes with Timothy consciously practicing Data's impassive
    expression and head tilts in a mirror, fully committing to his new, self-constructed
    identity.
