              Surface: Agitated → Hyperenthused → Crushed → Upset → Awestruck.
              Internal: A maelstrom of insecurity, survivor’s guilt, and a desperate need to belong. Data’s critique reopens the wound of his perceived failure (both in the model and, by extension, the *Vico* disaster), while the android’s flawless reconstruction leaves him in a state of conflicted admiration—envy of Data’s perfection, but also a flicker of hope that such precision might be within his reach.
    goals:
    - To earn Data’s approval and prove he can 'do something right,'
    - To escape his trauma through distraction (building the model)
    - To understand his place in a world where androids like Data exist (post-critique)
    what_happened: |2-

              Timothy begins the scene in a state of agitated hyperfocus, his hands shaking as he assembles the Dokkaran temple model with desperate haste. His pride crumbles the moment Data delivers his critique, triggering a spiral of self-doubt: '*You hate it. I can’t do anything right.*' He physically destroys his own work in a fit of frustration, his emotional collapse mirrored in the scattered pieces of the model. Data’s subsequent rebuilding of the temple at 'Data speed' leaves Timothy awestruck, his earlier despair momentarily eclipsed by admiration. The scene ends with him staring at the turbolift doors, his unblinking gaze a silent testament to the emotional whiplash he’s experienced—and the unspoken question of where he fits in a world of android perfection.
