- fabula_uuid: cand_evt_scene_f7a8a92e51751def_01
  global_id: null
  title: Away team recovers data amid wreckage
  description: "\n  The away team—Riker, Data, and Geordi—materializes in the devastated\
    \ corridor of the Vico research vessel, where structural instability and scattered\
    \ bodies underscore the ship’s catastrophic destruction. Their cautious movement\
    \ reveals the severity of the damage, with exposed wiring, collapsed beams, and\
    \ flickering monitors hinting at the vessel’s final moments. Data and Geordi attempt\
    \ to access the ship’s computer systems, but the consoles are either dead or locked\
    \ in feedback loops. Riker suggests tapping directly into the core, leading Geordi\
    \ to locate an ODN junction. As Data connects a data extraction device, a faint,\
    \ desperate voice interrupts their work—a survivor calling out from deeper within\
    \ the wreckage. The team’s focus shifts abruptly from data recovery to rescue,\
    \ with Riker and Data leaving Geordi to monitor the transfer while they investigate\
    \ the voice. The moment marks a critical pivot: the mission’s objective expands\
    \ from uncovering evidence of the Vico’s destruction to addressing the immediate\
    \ human cost of the tragedy, foreshadowing the emotional and psychological stakes\
    \ tied to the sole survivor, Timothy.\n  "
