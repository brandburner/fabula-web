    of anybody coming on board the Vico.'
  - 'TROI: Data -- stay a moment. I think we should ask Data to spend some time with
    Timothy. You''re the only one Timothy''s reached out to... because you rescued
    him. We can use your relationship with him to help his recovery.'
  - 'DATA: Exactly how shall I proceed, Counselor?'
  - 'TROI: Just be with him. You''re a presence he trusts. That''s what he needs most
    right now.'
