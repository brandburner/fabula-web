- fabula_uuid: act_22dcb6f776a996f9
  number: 4
  summary: In Engineering, Data confides in Geordi about his "perceptual paradigm
    shift," expressing a newfound introspection as he observes Timothy emulating him.
    Data realizes the irony of a human striving to be like him, an android who has
    always strived for humanity. Geordi offers insight, suggesting that this experience
    might help Data appreciate aspects of himself he previously overlooked. The Enterprise
    then proceeds deeper into the Black Cluster, encountering increasingly intense
    gravitational wavefronts. These forces severely distort the ship's sensors, creating
    false readings and rendering external detection impossible. Worf initially mistakes
    the ship's own echoes for enemy vessels, highlighting the extreme environmental
    challenges. Picard, concerned by the sensor unreliability, orders a phaser test,
    which confirms that energy weapons are useless within the cluster, as their beams
    are reflected and dissipated by the warped space. Data, analyzing these observations,
    concludes that an attack on the Vico within the cluster is "exceedingly remote,"
    directly contradicting Timothy's initial story of an enemy vessel. This scientific
    confirmation solidifies Picard's suspicions about Timothy's narrative. Picard
    then summons Timothy to his ready room, accompanied by Troi and Data, to gently
    confront him. Timothy struggles to maintain his android facade, which begins to
    waver under the pressure. Data's direct statement, "Timothy, androids do not lie,"
    acts as a catalyst, shattering the boy's carefully constructed defense. Overwhelmed,
    Timothy's fantasy crumbles, and he tearfully confesses, "It was me. I did it.
    I killed them all," revealing his profound guilt and the true, tragic nature of
    the Vico's destruction.
