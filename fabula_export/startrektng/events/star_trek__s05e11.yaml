  key_dialogue:
  - 'DATA: I would like to confide in you, Geordi. However, I am finding my thoughts
    difficult to verbalize.'
  - 'GEORDI: If I had a boy going around pretending to be just like me, I might be
    a little uncomfortable too.'
  - 'DATA: I have spent my entire life emulating Humans. Now, I find myself confronted
    by a Human who is emulating me.'
  - 'GEORDI: A lot of us have a way of not appreciating ourselves. We''re too close
    to the subject. Keep an eye on Timothy... he might help you learn to understand
    yourself a little better.'
