    institutional_impact: The event reinforces Starfleet’s dual role as both a protective
      and demanding institution. The crew’s actions are a testament to their training
      and the resources at their disposal, but the moral and tactical dilemmas they
      face also highlight the limitations of even the most advanced organization.
