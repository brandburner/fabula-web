      \ forces at play. These anomalies are directly responsible for the *Vico*'s\
      \ destruction, as evidenced by the vessel's breached hull and exposed decks.\
      \ The cluster's sensor-distorting properties complicate the *Enterprise*'s scans,\
      \ forcing the crew to rely on limited data and high-risk away missions to uncover\
      \ the truth. Its presence looms over the entire event, symbolizing both the\
      \ allure of scientific discovery and the peril of the unknown.\n      "
    status_before_event: "\n      The Black Cluster is a stable yet unpredictable\
