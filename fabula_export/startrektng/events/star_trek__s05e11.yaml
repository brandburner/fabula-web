              **Starfleet** is the invisible but omnipresent force shaping this event, its influence manifesting through institutional protocols, duty calls, and the *Enterprise*’s operational demands. Geordi’s comm interruption—'*I need your help with the shield modulators*'—is the most direct representation of Starfleet’s priorities: the ship’s survival in the Black Cluster takes precedence over Timothy’s emotional needs. Data’s immediate response to the summons reflects Starfleet’s culture of discipline and hierarchy, where personal moments are secondary to mission-critical tasks. Even the *Enterprise*’s humming systems and turbolifts are extensions of Starfleet’s infrastructure, reinforcing the organization’s values of efficiency and logic. The event thus becomes a microcosm of Starfleet’s broader tension: the ideal of exploring 'to seek out new life and new civilizations' (its prime directive) clashes with the reality of its members’ individual struggles—like Timothy’s trauma or Data’s quest for humanity.
    active_representation: |2-

              Through **institutional protocol** (Geordi’s summons) and **organizational infrastructure** (the *Enterprise*’s systems, turbolifts, and shipboard duties). Starfleet is also represented by Data’s role as a Starfleet officer, whose duties override his interaction with Timothy.
    power_dynamics: |2-

              **Exercising authority over individuals**: Starfleet’s demands (e.g., shield modulator repairs) dictate Data’s actions, pulling him away from Timothy. The organization’s priorities are non-negotiable, even in emotionally charged moments.
