- fabula_uuid: act_51fec398f4f3ab1d
  number: 2
  summary: In Engineering, Geordi and Data continue their investigation into the Vico's
    destruction, analyzing the corrupted data logs. They confirm the vessel suffered
    a disrupter-style attack but find no evidence supporting Timothy's claim of a
    boarding party. Geordi shares a personal anecdote of childhood trauma, attempting
    to offer Data context for Timothy's emotional state and withdrawal. Meanwhile,
    Timothy struggles to integrate into the Enterprise's school environment. He exhibits
    agitated, obsessive behavior, focusing intensely on building a complex model of
    a Dokkaran temple, ignoring his teacher and classmates. Counselor Troi observes
    this concerning behavior through an observation window, recognizing his profound
    isolation. On the Bridge, Picard, Data, and Geordi discuss the Vico's fate, considering
    potential assailants like the Breen, but the lack of boarding evidence remains
    a significant inconsistency. Troi intervenes, formally requesting that Data spend
    more time with Timothy, believing Data's unique connection as his rescuer can
    help the boy confront his trauma. Data, still grappling with the complexities
    of human emotion, agrees, albeit with a degree of bemusement. In Timothy's quarters,
    Data helps the boy correctly construct his temple model, demonstrating the logical,
    step-by-step process. Timothy, increasingly fascinated by Data's capabilities,
    questions the android about his lack of emotions and superior abilities. Data
    explains his design to exceed human capacity, further solidifying Timothy's admiration.
    The act culminates with Timothy, alone in his quarters, deliberately practicing
    Data's impassive facial expressions and characteristic head tilts in a mirror,
    fully immersing himself in the android persona as a defense against his overwhelming
    grief and guilt.
