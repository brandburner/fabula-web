  title: Geordi shares childhood trauma to help Data
  description: 'In Engineering, Data and Geordi analyze corrupted sensor logs from
    the *Vico* to reconstruct its final moments, uncovering an electromagnetic pulse
    that wiped critical data. The technical investigation pivots when Data abruptly
    asks Geordi about childhood trauma, revealing his struggle to understand Timothy’s
    emotional state. Geordi recounts his own harrowing experience of being trapped
    in a fire as a child—how the two minutes felt like an eternity and how he clung
    to his parents’ presence afterward. This personal disclosure helps Data grasp
    the depth of Timothy’s isolation and the psychological toll of trauma, bridging
    the gap between technical analysis and human vulnerability. The exchange underscores
    the scene’s dual purpose: solving the *Vico*’s destruction while humanizing Data’s
    approach to Timothy’s healing.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e11
  scene_sequence: 14
  sequence_in_scene: 21
  key_dialogue:
  - 'GEORDI: This isn''t good. I think whatever hit the Vico set up an E-M pulse that
    flashed through their computer banks.'
  - 'DATA: Geordi, as a child, did you ever experience a traumatic event?'
  - 'GEORDI: I was trapped in a fire once, when I was five -- before I got my VISOR.
    It only took about two minutes before my parents found me and pulled me out. And
    nobody got hurt. But I tell you -- that was the longest two minutes of my life.
    And it was more than a month before I would let my parents get out of earshot.
    I absolutely needed to know they were there.'
