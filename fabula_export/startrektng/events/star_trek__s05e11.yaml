  title: Riker orders Data’s solo extraction
  description: With the *Enterprise*’s transporter locked onto Data and the traumatized
    survivor Timothy, Riker—now back aboard—coordinates a high-stakes extraction.
    After assessing the structural instability of the VICO’s bulkhead, Data warns
    that moving it risks a collapse, forcing Riker and Geordi to retreat to the ship
    for safety. Riker reluctantly agrees, leaving Data to execute the risky maneuver
    alone. The moment hinges on Data’s precision and Timothy’s fragile emotional state,
    testing the android’s loyalty to the mission and the crew’s trust in his abilities.
    The decision underscores the moral tension between saving a life and preserving
    the ship’s integrity, while also highlighting Riker’s leadership under pressure—balancing
    urgency with calculated risk. The scene sets up the transporter beam-out as a
    critical turning point, where Data’s actions will determine whether Timothy survives
    and whether the *Enterprise* can escape the Black Cluster’s sensor-warping interference
    undetected.
