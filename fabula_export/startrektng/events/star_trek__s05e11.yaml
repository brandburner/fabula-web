  key_dialogue:
  - 'TIMOTHY: Everything was shaking. I lost my balance. I was just trying to hold
    on to something. I didn’t mean to do it.'
  - 'PICARD: What didn’t you mean to do, Timothy?'
  - 'TIMOTHY: My arm... it hit the computer panel. That’s what destroyed the ship.'
  - 'TROI: The ship was damaged when your arm hit the computer panel...?'
  - 'TIMOTHY: Yes it was...'
  - 'DATA: It is not possible. The onboard control systems for every starship require
    a user code clearance. You could not have inadvertently affected any of the Vico’s
    systems.'
  - 'TIMOTHY: But if it wasn’t me...'
  - 'PICARD: We’re trying to determine what happened right now. And anything that
    you can remember that may assist...'
