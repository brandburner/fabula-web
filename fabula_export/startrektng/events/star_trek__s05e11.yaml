  object_involvements:
  - object_uuid: ger_object_57af7a9e0498
    description_of_involvement: |2-

              Geordi’s **Combadge** serves as the abrupt, mechanical interruption that pulls Data away from the emotionally charged moment with Timothy. Its beep and Geordi’s voice—'*La Forge to Data. I need your help with the shield modulators.*'—are the auditory cues that shift the scene’s focus from the personal to the operational. The combadge represents Starfleet’s institutional priorities: the *Enterprise*’s survival in the Black Cluster takes precedence over Timothy’s emotional needs. Its role is purely functional, but its timing is thematically significant—it underscores the tension between human connection and duty, a conflict that Timothy, as a survivor, grapples with implicitly.
    status_before_event: |2-

              Attached to Geordi’s uniform, active and ready for use. Its presence is implied but not visible in Timothy’s quarters.
    status_after_event: |2-

              The combadge’s function is fulfilled; Data acknowledges the summons and prepares to depart. The device remains operational, symbolizing the ongoing demands of Starfleet duty.
    global_id: ger_object_57af7a9e0498
  - object_uuid: ger_object_8a614f507f59
    description_of_involvement: |2-

              The **Erector Set** is the physical manifestation of Timothy’s fragile ego and his desperate attempt to earn validation. Initially, it is a sloppy, unbalanced model—symbolizing his internal chaos and the hasty, agitated state of his mind. When Data critiques its structural flaws, Timothy’s emotional collapse is mirrored in his violent destruction of the model: he knocks over the tower-like structure and throws down the pieces, externalizing his self-loathing. The object’s role shifts dramatically when Data *rebuilds it at 'Data speed'*—a flawless recreation that leaves Timothy awestruck. The Erector Set thus serves as a metaphor for Timothy’s journey: from self-doubt to temporary inspiration, but ultimately, a reminder of the gulf between human imperfection and android precision.
    status_before_event: |2-

              A hastily assembled, unbalanced Dokkaran temple model made of metal rods and connectors. The structure leans precariously, with pieces poorly aligned. It sits on Timothy’s table in his foster parents’ quarters, a tangible representation of his internal turmoil.
    status_after_event: |2-

              The model is now *perfectly constructed* by Data, its pieces aligned with geometric precision. It sits intact on the table, a stark contrast to its earlier state of disarray. Timothy stares at it in awe, but the object’s completion also underscores his own inability to achieve such perfection—leaving him emotionally raw.
    global_id: ger_object_8a614f507f59
  - object_uuid: ger_object_7ffe229a00e0
    description_of_involvement: |2-

              The **Turbolift Doors** in Timothy’s quarters serve as a literal and symbolic threshold between two worlds: the intimate, emotionally charged space of the boy’s foster quarters and the broader, duty-driven universe of the *Enterprise*. When Data steps through them to leave, the doors *hiss shut* with finality, framing Timothy’s unblinking stare—a moment of quiet devastation. The doors become a barrier, not just physical but emotional, as Timothy is left alone to process the whiplash of Data’s critique and subsequent perfection. Their smooth metal panels reflect the cold, unyielding nature of the ship’s technology, a stark contrast to the warmth (or lack thereof) in Timothy’s interaction with Data. Later, the turbolift carries Data to the bridge, where the doors part amid the chaos of the Black Cluster—a reminder that the ship’s crises continue, regardless of personal moments.
    status_before_event: |2-

              Closed, sealing Timothy and Data in the foster quarters. The doors are a standard *Enterprise* design: smooth, metallic, and functional, with a soft hiss when opening or closing.
    status_after_event: |2-

              The doors remain closed after Data’s departure, framing Timothy’s solitary figure. Their sealed state mirrors the emotional isolation he feels, while their functional design underscores the ship’s prioritization of efficiency over individual needs.
    global_id: ger_object_7ffe229a00e0
