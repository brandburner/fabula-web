  title: Riker prepares Engineering for Cluster hazards
  description: 'As the *Enterprise* approaches the Black Cluster, the bridge crew
    responds to escalating gravitational wavefronts with disciplined precision. Riker
    orders forward shields at 35% and a reduction in impulse speed to 1/4, demonstrating
    his tactical acumen and commitment to crew safety. The scene establishes the Cluster’s
    immediate threat—its unpredictable turbulence forces the ship to adapt standard
    procedures, underscoring the mission’s escalating danger. While Picard oversees
    the adjustments, Riker’s communication with Engineering (off-screen) signals the
    beginning of a broader logistical effort to harden critical systems against the
    Cluster’s sensor-distorting effects. The crew’s calm professionalism contrasts
    with the unseen trauma of Timothy’s rescue, reinforcing the duality of their mission:
    technical readiness and emotional resilience. This moment serves as a setup for
    later engineering challenges and foreshadows the strain on both ship and crew
    as they venture deeper into uncharted territory.'
