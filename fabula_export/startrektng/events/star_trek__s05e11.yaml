  title: Phasers fail in Black Cluster’s distortion
  description: |2

    The *Enterprise* navigates the Black Cluster under increasing gravitational wavefronts, with Worf reporting sensor failures due to signal reflection. Picard orders a phaser test, revealing that the weapons—like sensors—are rendered useless by the cluster’s distortion. Data confirms the phenomenon affects all energy-based systems, including disruptors and cloaking fields, effectively blinding the ship to threats. This tactical vulnerability forces Picard to confront Timothy’s account of the *Vico*’s destruction, as the crew’s inability to scan or defend exposes the ship to unseen dangers. The moment marks a critical shift from investigation to urgent action, with Picard summoning Timothy for direct interrogation, signaling the crew’s growing suspicion that the boy’s trauma holds the key to the *Vico*’s fate.
