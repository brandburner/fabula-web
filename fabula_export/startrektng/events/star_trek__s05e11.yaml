      and controlled urgency. The transporter pad glows beneath Riker and Geordi as
      they materialize, its hum a steady counterpoint to the tension in the air. Beverly
      Crusher stands nearby, her medical bag at the ready, while Hutchinson hunches
      over the transporter controls, his fingers moving with precision. The room is
      bathed in the sterile light of the *Enterprise*’s interior, a sanctuary after
      the darkness of the *Vico*. Yet the atmosphere is far from calm: the transporter’s
      whine is a high-pitched keen, the beeps of the controls a staccato rhythm of
      anticipation. Everyone’s eyes are fixed on the pad, waiting for Data and Timothy
      to appear. The room is a liminal space, neither the danger of the *Vico* nor
      the safety of the *Enterprise*’s corridors, but a threshold where hope and fear
      collide.'
