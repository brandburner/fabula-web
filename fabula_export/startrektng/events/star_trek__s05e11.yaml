  title: Picard orders Timothy’s interrogation
  description: With the *Enterprise* trapped in the Black Cluster’s destabilizing
    gravitational wavefronts, Picard’s attempts to deploy sensors and phasers fail
    catastrophically—both are reflected and rendered useless by the distortion. Data
    confirms the Vico’s destruction via an attack is ‘exceedingly remote,’ forcing
    Picard to confront the implication that someone on the ship is lying. Shifting
    from therapeutic support to urgent investigation, he orders Counselor Troi to
    bring Timothy to his ready room for direct interrogation, marking a critical escalation
    in the crew’s approach to the boy’s trauma and the mystery of the Vico’s fate.
    The scene underscores the tension between logic (Data’s analysis) and human emotion
    (Timothy’s guilt), while the ship’s vulnerability to the cluster’s effects mirrors
    the crew’s growing unease about the truth they’re uncovering.
