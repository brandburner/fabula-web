  - 'DATA: "Captain, drop the shields."'
  - 'PICARD: "Drop the shields."'
  - 'DATA: "Our own shields caused the increase in the wavefronts... we induced harmonic
    amplification effects."'
  - 'RIKER: "The more energy we dumped into the shield grid, the worse the impact..."'
  - 'PICARD: "If we had transferred all that warp power to the shields, it would''ve
    torn the ship apart."'
