  title: Bridge Under Wavefront Assault
  description: "\n  The *Enterprise* bridge is struck by a second, far more devastating\
    \ wavefront from the Black Cluster, escalating the crisis as structural overpressure\
    \ exceeds 180% of safe limits. The crew—already strained by the sensor-distorting\
    \ effects of the anomaly—reacts with urgency: Worf reports the intensifying threat,\
    \ while Data rapidly processes data at his console, his android precision contrasting\
    \ with the human tension around him. Timothy, the traumatized survivor, clings\
    \ to Data’s side, his wide-eyed fear underscoring the ship’s vulnerability. Picard,\
    \ recognizing the severity of the situation, immediately calls for Geordi La Forge’s\
    \ expertise, his voice cutting through the chaos with authority. The scene serves\
    \ as a turning point, forcing the crew to confront the Black Cluster’s escalating\
    \ danger while highlighting the duality of their mission: survival and Timothy’s\
    \ emotional stability. The wavefront’s impact isn’t just a physical threat—it’s\
    \ a test of the crew’s ability to adapt under pressure, with Data’s logical focus\
    \ and Picard’s leadership as critical anchors.\n  "
