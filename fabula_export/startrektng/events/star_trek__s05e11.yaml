- fabula_uuid: cand_evt_scene_d95c561b88cb5553_01
  global_id: null
  title: Picard confronts Vico destruction evidence
  description: "\n  In Engineering, Geordi La Forge presents Picard with a forensic\
    \ diagram of the destroyed research vessel *Vico*, revealing the precise locations\
    \ of Timothy’s parents’ deaths. Picard studies the graphic in silence, his expression\
    \ tightening as he visualizes the brutal final moments of the attack—Timothy’s\
    \ mother in the computer core, his father likely on the exposed bridge. The clinical\
    \ precision of Geordi’s analysis forces Picard to confront the human cost of the\
    \ tragedy, deepening his emotional investment in Timothy’s trauma. Meanwhile,\
    \ in Sickbay, Timothy—physically healed but emotionally shattered—falls asleep\
    \ clutching Data’s hand, symbolizing his fragile trust. Beverly Crusher clears\
    \ him for release, but Troi warns Data that Timothy’s world is gone and they must\
    \ help him rebuild it. The scene bridges the forensic investigation with the boy’s\
    \ psychological state, escalating the stakes for both the mission and Timothy’s\
    \ healing.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e11
  scene_sequence: 13
  sequence_in_scene: 19
  key_dialogue: &id011
  - 'GEORDI: Sections of the primary and secondary hull were torn right off. Shearing
    planes are here, here, and here.'
  - 'PICARD: The boy was here.'
  - 'GEORDI: His mother was the ship''s systems engineer. The second away team found
    her body here—inside the core.'
  - 'PICARD: And the boy''s father?'
  - 'GEORDI: Ship''s second officer. He was most likely on the bridge when it was
    exposed to space.'
  - 'TROI: His world is gone, Data. We''re going to have to help him build a new one.'
