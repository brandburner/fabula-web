  title: Riker and Data hear the survivor’s cry
  description: "\n  In the wreckage of the Vico’s devastated corridor, Riker, Data,\
    \ and Geordi cautiously navigate the unstable environment, their focus on extracting\
    \ critical data from the ship’s core. The scene is tense, with structural groans\
    \ and shifting debris threatening collapse at any moment. As they work to access\
    \ the ODN junction, a faint, desperate voice—‘Is somebody there?’—interrupts their\
    \ mission. The plea halts Riker’s investigation, compelling him to abandon the\
    \ data retrieval and investigate the source of the cry. He signals Data to follow,\
    \ leaving Geordi to monitor the transfer device. The moment marks a shift from\
    \ forensic analysis to immediate humanitarian response, forcing the crew to confront\
    \ the human cost of the disaster. The survivor’s voice, weak but urgent, introduces\
    \ an emotional undercurrent that will later challenge Data’s understanding of\
    \ human trauma and Riker’s leadership priorities.\n  "
