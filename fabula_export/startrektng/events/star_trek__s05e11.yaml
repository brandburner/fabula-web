  title: Timothy mirrors Data’s movements
  description: 'In the sterile, humming corridor of the *Enterprise*, Data and Timothy
    walk in unsettling synchronization—arms swinging in perfect unison, steps matching
    with mechanical precision. The illusion of a second android is so convincing that
    two passing crewmembers stop mid-stride, their double-takes betraying their shock.
    This moment isn’t just a display of Timothy’s trauma; it’s a deliberate, almost
    ritualistic imitation of Data’s mannerisms, signaling the boy’s psychological
    fracture and his desperate attempt to escape his humanity. The crew’s reaction
    underscores the unnaturalness of the scene, foreshadowing the deeper bond—and
    the darker revelations—yet to come. The synchronization isn’t just physical; it’s
    a metaphor for Timothy’s emotional detachment, his guilt over the *Vico*’s destruction,
    and the Black Cluster’s influence warping his perception of reality. The silence
    between them speaks volumes: Timothy’s mimicry is both a coping mechanism and
    a cry for help, while Data’s passive acceptance hints at his own struggle to understand
    human emotion through this distorted lens.'
