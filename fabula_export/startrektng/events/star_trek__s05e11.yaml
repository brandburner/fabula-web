      decisions. Its compact size and orderly decor (shelves of Shakespeare, a desk
      for reflection) contrast with the chaos of the bridge, making it an ideal setting
      for a confrontation that requires focus and emotional precision. The ready room’s
      role in this event is symbolic: it represents the shift from therapeutic support
      to investigative confrontation, and the crew’s growing suspicion that the truth
      lies not in data, but in the people aboard the ship.'
