- fabula_uuid: cand_evt_scene_c5cd3053f67d3161_01
  global_id: null
  title: Timothy’s Trauma and Data’s Unwavering Presence
  description: "\n  In the sterile, antiseptic environment of *Enterprise*’s sickbay,\
    \ Timothy—physically recovered but emotionally shattered—clings to Data’s hand\
    \ with desperate intensity, his grip betraying the fragility beneath his stoic\
    \ exterior. His fragmented, halting account of the boarding party’s assault on\
    \ the *Vico* reveals the raw edges of his trauma: the sudden violence, the unseen\
    \ attackers, and his own hidden survival. Beverly’s gentle attempts to comfort\
    \ him (offering food, reassurance) are met with a hollow, disconnected stare,\
    \ underscoring the depth of his dissociation. When Data attempts to leave, Timothy’s\
    \ immediate, wordless refusal—expressed through an even tighter grip—exposes his\
    \ unspoken dependency on the android, who has become an unexpected anchor in his\
    \ storm of grief. Troi’s intervention, asking if Data should stay, crystallizes\
    \ the boy’s need for stability, while Data’s hesitation (his head tilt, the pause)\
    \ hints at his own burgeoning understanding of human vulnerability. The scene\
    \ serves as a turning point: Timothy’s trauma is no longer abstract, and Data’s\
    \ role as both protector and emotional touchstone is solidified, setting up their\
    \ future dynamic as the boy’s reluctant confidant.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e11
  scene_sequence: 12
