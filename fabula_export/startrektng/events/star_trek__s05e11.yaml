  title: Timothy’s fragile trust and Data’s guardianship
  description: "\n  In Sickbay, Timothy—physically healed but emotionally shattered—falls\
    \ asleep clutching Data’s hand, a gesture that reveals his desperate need for\
    \ stability. The moment underscores his trauma and the fragile trust he has placed\
    \ in Data, who stands motionless beside his bed. Beverly Crusher confirms Timothy’s\
    \ medical clearance for release, but Deanna Troi’s plea to Data—*‘Help him rebuild\
    \ his world’*—shifts the focus from physical recovery to emotional healing. This\
    \ exchange marks the end of Act One, crystallizing the story’s emotional core:\
    \ Timothy’s trauma and Data’s untested capacity for human connection. The scene’s\
