  title: Timothy mirrors Data’s android mannerisms
  description: "\n  In Timothy’s quarters, Data attempts to style the boy’s hair as\
    \ a clumsy but earnest bonding gesture, mirroring Picard’s earlier directive to\
    \ reinforce Timothy’s android persona as a therapeutic coping mechanism. Timothy’s\
    \ constant head tilts—exact replicas of Data’s own—disrupt the process, revealing\
    \ how deeply he has internalized Data’s mannerisms as a defense against his trauma.\
    \ When Data finally holds Timothy’s head still, the boy’s question about other\
    \ androids in Starfleet exposes his isolation and his desperate need for belonging.\
    \ The conversation then pivots to fear and nightmares, where Timothy’s evasive\
    \ response ('I do not require sleep') betrays his unresolved guilt over the Vico’s\
    \ destruction. Data’s observation of Timothy’s reflection—now styled identically\
    \ to his own—underscores the boy’s fragile attachment to his android persona,\
    \ while also highlighting the chasm between Data’s logical empathy and Timothy’s\
    \ visceral, unprocessed grief. The moment serves as both a setup for Timothy’s\
    \ eventual confrontation with his trauma and a turning point in Data’s own emotional\
    \ development, as he begins to recognize the limits of his ability to truly understand\
    \ human pain.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e11
  scene_sequence: 23
  sequence_in_scene: 35
  key_dialogue:
