  title: Troi begins Timothy’s trauma assessment
  description: "\n  In the sterile, antiseptic environment of Sickbay, Data materializes\
    \ with Timothy—still clinging to him in a state of shock—after their harrowing\
    \ rescue from the wrecked *Vico*. The boy’s physical and emotional fragility is\
    \ immediately apparent as he buries his face into Data’s shoulder, overwhelmed\
    \ by the unfamiliar faces of Beverly Crusher and the nurse. Meanwhile, Picard’s\
    \ voiceover log confirms the grim reality: no other survivors were found, leaving\
    \ Timothy as the sole witness to the tragedy. This moment marks the formal initiation\
    \ of Troi’s counseling process, as the scene contrasts the cold finality of Picard’s\
    \ report with the raw, unspoken trauma of a child confronting grief and guilt.\
    \ The tension between the Enterprise’s clinical efficiency and Timothy’s visceral\
    \ distress underscores the urgency of his emotional support, while foreshadowing\
    \ the deeper psychological work ahead.\n  "
