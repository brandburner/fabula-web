  - object_uuid: ger_object_8be126113779
    description_of_involvement: 'Beverly activates the sickbay replicator to produce
      food for Timothy, her fingers tapping the panel with practiced ease. The device
      materializes a simple meal—likely something child-friendly—amid the sterile
      hum of medical equipment. While Timothy nods in response to her offer, his detachment
      renders the act bittersweet: the replicator, a symbol of Starfleet’s ability
      to provide for basic needs, cannot address the deeper hunger of his trauma.
      The food sits untouched, a silent testament to the gap between physical care
      and emotional healing.'
    status_before_event: Idle, awaiting activation for Timothy’s request.
    status_after_event: Active, having produced a meal that goes unclaimed by Timothy,
      who remains focused on Data.
    global_id: ger_object_8be126113779
  - object_uuid: ger_object_9000e678e53c
    description_of_involvement: 'Mounted above Timothy’s biobed, the diagnostic monitor
      flickers with data—vital signs, neural scans, and physiological readings—all
      confirming his physical recovery. Yet the readings cannot capture the panic
      in his eyes or the desperation in his grip on Data’s hand. Beverly studies the
      monitor closely, but the data tells only half the story: Timothy’s body may
      be stable, but his mind is a storm. The monitor’s clinical detachment underscores
      the limitations of medicine in addressing trauma, leaving his emotional state
      to be deciphered through nonverbal cues and the interventions of Troi and Data.'
    status_before_event: Displaying stable readings, reflecting Timothy’s physical
      recovery.
    status_after_event: Continuing to show stable readings, but the data remains disconnected
      from his emotional state, which worsens as he clings to Data.
    global_id: ger_object_9000e678e53c
