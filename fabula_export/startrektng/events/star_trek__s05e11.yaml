  - character_uuid: ger_agent_d6daf73ee8f2
    emotional_state: 'A volatile mix of *dissociation* and *yearning*. On the surface,
      Timothy is eerily calm, almost robotic, as he mimics Data and deflects questions
      about his nightmares. Beneath this facade, however, there’s a deep well of pain—his
      compulsive movements and the way he clings to Data’s perfection suggest a boy
      who is terrified of his own emotions and the memories they might unleash. His
      whispered *''It''s perfect''* is both a moment of relief and a tragic admission:
      for now, he finds safety in illusion.'
    goals:
    - To avoid confronting his trauma by immersing himself in Data’s world—adopting
      the android’s mannerisms, precision, and detachment as a shield.
    - To test Data’s limits, probing whether the android truly understands human fear
      or if he, too, is bound by his programming (as Timothy is bound by his grief).
    what_happened: 'Timothy sits in a chair, his body language tense and fragmented,
      as he compulsively mirrors Data’s android-like head tilts—a behavior that disrupts
      Data’s attempts to groom him. His dialogue is a mix of admiration for Data’s
      precision and probing questions about androids, fear, and nightmares, all delivered
      with a detached, almost mechanical cadence that mirrors Data’s own speech patterns.
      When Data asks if he’s having disturbing dreams, Timothy deflects with a chilling
      echo: *''I do not require sleep.''* The moment he sees his reflection in the
      mirror, styled identically to Data, he whispers, *''It''s perfect,''*—a fleeting
      moment of satisfaction in an otherwise fractured emotional state. His actions
      and words reveal a boy desperately trying to escape his humanity by adopting
      Data’s detachment, even as his trauma seeps through in his inability to sit
      still or answer directly.'
