  title: Timothy’s First Words to Riker and Data
  description: Trapped beneath a collapsed bulkhead in the wreckage of the Vico, ten-year-old
    Timothy—panicked and disoriented—immediately shifts focus from his own peril to
    the safety of his parents upon seeing Riker and Data. His first question, ‘Are
    my parents alright?,’ reveals his selfless instinct even in crisis, contrasting
    with the guilt he will later grapple with. The moment underscores the emotional
    stakes of his survival and foreshadows his trauma, as his immediate concern for
    others signals the depth of his attachment to his family. The scene also establishes
    Data’s role as a confidant, as his reaction to Timothy’s question (cut off by
    the fade-out) hints at the android’s burgeoning understanding of human priorities
    in moments of distress. The exchange serves as a narrative pivot, shifting from
    the Enterprise’s investigation of the Vico’s destruction to the crew’s moral obligation
    to rescue Timothy and address his psychological state.
