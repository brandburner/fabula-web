  title: Strategic briefing and Timothy’s interrogation
  description: 'In the Observation Lounge, Picard convenes a senior crew briefing
    to assess the Black Cluster’s dangers and the Vico’s destruction. Data outlines
    the Cluster’s violent gravitational forces, while Geordi confirms shield adjustments
    for safe passage. Worf warns of sensor limitations, and Riker speculates the Vico
    may have been ambushed. Picard then privately tasks Troi with extracting critical
    intelligence from Timothy, the traumatized survivor, before ordering the Enterprise’s
    entry into the Cluster at 0700. The scene splits between strategic urgency and
    psychological pressure, as the crew’s next move hinges on both scientific data
    and Timothy’s repressed trauma. Picard’s directive to Troi underscores the mission’s
    dual focus: solving the Vico’s mystery while addressing Timothy’s emotional state,
    setting up a parallel investigation into the boy’s guilt and the Cluster’s threats.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e11
  scene_sequence: 19
  sequence_in_scene: 30
  key_dialogue:
  - 'DATA: The Black Cluster was formed almost nine billion years ago when hundreds
    of protostars collapsed in close proximity. The resulting gravitational forces
    are violent and highly unpredictable.'
  - |-
    PICARD: Has the boy volunteered any further information?
    TROI: No. But we have an appointment in less than an hour.
    PICARD: If there's any possibility of getting more from him, I'd like you to pursue it.
  - 'RIKER: Maybe that''s what happened to the Vico—they didn''t see anything coming
    until it was too late.'
