  object_involvements:
  - object_uuid: ger_object_ad0f756e012d
    description_of_involvement: Riker’s combadge is the lifeline connecting the *Vico*’s
      wreckage to the *Enterprise*’s bridge, a small but critical object that facilitates
      the crew’s coordination. He taps it with a firm, deliberate motion, his voice
      steady as he relays orders to Data and Hutchinson. The combadge’s chirp is the
      auditory cue that bridges the physical and emotional distance between the away
      team and the ship, a reminder that even in the midst of chaos, the chain of
      command holds. Its gold delta shield glints under the flickering emergency lights,
      a symbol of Starfleet’s authority and the crew’s shared purpose. Without it,
      the extraction would be a solitary, uncoordinated effort—with it, it becomes
      a testament to trust and teamwork.
    status_before_event: Pinned to Riker’s uniform, its surface smooth and functional.
      It has already been used to coordinate the initial away team deployment, and
      now it serves as the conduit for Riker’s reluctant order to retreat. The combadge
      is a constant presence, a tool that Riker relies on without thought, its familiarity
      a small comfort in the uncertainty.
    status_after_event: Still active and functional, now serving as the link between
      Riker aboard the *Enterprise* and Data on the *Vico*. Its role shifts from coordination
      to moral support, as Riker’s final words—‘Whenever you're ready, Data’—carry
      the weight of his trust and the unspoken hope for a successful outcome.
    global_id: ger_object_ad0f756e012d
  - object_uuid: ger_object_cbed5ef74b46
    description_of_involvement: The *Enterprise*’s transporter controls, manned by
      Hutchinson, are the invisible thread pulling Data and Timothy toward safety.
      Their hum fills the transporter room, a low, persistent drone that underscores
      the tension of the moment. Hutchinson’s fingers dance over the controls, adjusting
      settings to pierce the *Vico*’s heavy shielding and the interference from the
      Black Cluster. The transporter pad glows beneath Riker and Geordi as they materialize,
      a beacon of hope for Data’s imminent return. The controls are not just a tool
      but a promise—a promise that, if Hutchinson’s skill and the transporter’s technology
      hold, Data and Timothy will make it out alive. The lock-on sequence is a fragile
      thing, dependent on Data’s timing and the *Vico*’s unstable environment.
    status_before_event: Locked onto Data and Timothy’s coordinates, the controls
      flicker with unstable readings as the Black Cluster’s interference plays havoc
      with the signal. Hutchinson’s adjustments are constant, his focus unwavering
      as he fights to maintain the lock. The transporter room is bathed in the eerie
      glow of the pad, a stark contrast to the darkness of the *Vico*’s wreckage.
    status_after_event: Still locked and active, awaiting Data’s signal to energize.
      The controls remain volatile, but Hutchinson’s expertise keeps the connection
      alive. The transporter pad is empty now, save for the faint shimmer of residual
      energy, a reminder of the crew’s safe return and the precariousness of Data’s
      situation.
    global_id: ger_object_cbed5ef74b46
  - object_uuid: ger_object_27a373fc8e5a
    description_of_involvement: The structural beams bracing the bulkhead are a visual
      and auditory reminder of the precariousness of the situation. Their groans echo
      through the wreckage like a countdown, each creak a potential harbinger of doom.
      Riker, Data, and Geordi all glance upward at them, their eyes tracing the lines
      of stress as they assess the risk of collapse. Data’s warning—‘that may initiate
      the collapse of the surrounding supports’—directs their attention to these beams,
      framing them as the weak link in an already fragile chain. They are not just
      obstacles; they are the embodiment of the crew’s urgency, the ticking clock
      against which every decision is made.
    status_before_event: Braced against the bulkhead, their metal surfaces strained
      and groaning under the weight. They are visibly bent, their integrity compromised
      by the *Vico*’s destruction. The crew’s glances upward treat them as a silent
      threat, a looming disaster waiting to happen.
    status_after_event: Unchanged in their physical state, but now the focus of Data’s
      solitary effort. Their groans are a constant backdrop to his calculations, a
      reminder that time is not on his side. The beams’ instability is both a challenge
