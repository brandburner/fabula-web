  title: Enterprise investigates Vico wreckage
  description: "\n  The Enterprise arrives at the Black Cluster, where Captain Picard\
    \ records a mission log documenting the investigation into the lost research vessel\
    \ *Vico*. Upon detecting unnatural gravitational anomalies, Picard orders the\
    \ ship to drop out of warp, revealing the cluster’s sensor-distorting properties.\
    \ Data locates the *Vico*—a derelict, structurally compromised vessel—with no\
    \ life signs detected. Riker and Data prepare for a high-risk away mission to\
    \ the wreckage, despite warnings of potential structural collapse. The crew’s\
    \ reactions to the visual spectacle of the Black Cluster and the *Vico*’s devastation\
    \ underscore the gravity of the situation, while Picard’s cautious orders reflect\
    \ his dual responsibility to uncover the truth and ensure crew safety. The scene\
    \ establishes the scientific inquiry and looming peril that will define the Enterprise’s\
    \ encounter with the Black Cluster.\n  "
