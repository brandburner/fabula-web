      and Picard’s voiceover log. The organization’s influence is both institutional
      and deeply human: it dictates the crew’s response to Timothy’s rescue, ensuring
      that his physical and emotional needs are addressed within the framework of
      their mission. Starfleet’s values—compassion, duty, and the preservation of
      life—are on full display, but so too is the tension between its rigid structures
      and the unpredictable nature of human (and android) emotion. The organization’s
      goals are served, but the cost is the boy’s trauma, which Starfleet must now
      help him navigate.'
