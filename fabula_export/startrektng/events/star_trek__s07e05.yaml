    the crew’s cohesion and deepening the personal stakes of their deception. The
    moment also reveals Riker’s willingness to prioritize the mission over loyalty,
    a choice that will later strain his relationships with Beverly and Worf, while
    reinforcing Picard’s role as the reluctant tactician in this high-stakes infiltration.
