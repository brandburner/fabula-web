    urgently advises Baran to withdraw before the ship is annihilated. Baran resists
    at first, but another devastating hit forces his hand. He publicly orders a retreat
    to warp six, masking his reluctance with a false claim of having inflicted 'enough
    damage.' Picard and Riker, still maintaining their undercover roles, subtly exchange
    a relieved glance, acknowledging the temporary reprieve. The retreat isn’t just
    a tactical maneuver—it’s a strategic pivot, accelerating the extremist’s timeline
    and forcing Picard and Riker to adapt their mission mid-crisis. The scene underscores
    Tallera’s growing influence over Baran, the fragility of the mercenary ship’s
    systems, and the escalating stakes of the *Enterprise*’s intervention.
