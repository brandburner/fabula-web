  title: Picard exploits Data’s literalism against Riker
  description: "\n  In the aftermath of the mercenary mission, Picard, Riker, and\
    \ Data walk through the *Enterprise* corridor, debriefing the mission’s resolution.\
    \ Picard casually jokes about Riker’s renegade status, but Data—ever the literalist—takes\
    \ the remark at face value. When Riker protests that Picard was joking, Data insists\
    \ on adhering to Starfleet regulations, which technically classify Riker as a\
    \ renegade facing court-martial. Picard seizes the opportunity, ordering Data\
    \ to escort Riker to the brig. Data complies without hesitation, despite Riker’s\
    \ protests, exposing the tension between blind adherence to protocol and the moral\
    \ flexibility required in undercover operations. The scene underscores the fragility\
    \ of their cover and the unintended consequences of Data’s unyielding logic, while\
    \ also highlighting Picard’s strategic manipulation of his crew’s strengths and\
    \ weaknesses.\n  "
