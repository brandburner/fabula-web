      \ Starfleet is also represented by the undercover roles of Picard and Riker,\
      \ who are acting as extensions of its values and authority.\n      "
    power_dynamics: "\n      Starfleet operates as a distant but authoritative force,\
      \ providing the moral and strategic framework for Picard and Riker’s actions.\
