      \ lack of knowledge about Riker and Picard’s mission creates a **critical blind\
      \ spot**.\n      "
    global_id: ger_organization_73a4b614bde7
  - organization_uuid: ger_organization_368e3ed99081
    description_of_involvement: "\n        The Klingon Empire’s role is **peripheral\
