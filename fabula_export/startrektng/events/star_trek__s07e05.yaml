  title: Troi detects Koral’s hidden fear
  description: "\n  On the *Enterprise* bridge, Data attempts to hail the Klingon\
    \ shuttle pilot, Koral, but is met with hostile silence. Troi, sensing Koral’s\
    \ emotions through her Betazoid empathy, detects his underlying fear and anxiety\
    \ beneath his defiant exterior. Worf, frustrated by Koral’s refusal to cooperate,\
    \ suggests forcibly boarding the shuttle, but Data initially resists, citing the\
    \ Klingon-Federation Treaty. Troi’s insight—revealing Koral’s vulnerability—shifts\
    \ the dynamic, prompting Worf to exploit a bureaucratic loophole: a 'health and\
    \ safety inspection' under Article 47 of the Treaty. Data, after weighing the\
    \ ethical implications, reluctantly authorizes the inspection, allowing Worf and\
    \ Crusher to board the shuttle. The decision risks exposing the *Enterprise*’s\
    \ undercover operation but offers a critical opportunity to uncover Koral’s true\
    \ purpose and disrupt potential threats before they escalate.\n  "
