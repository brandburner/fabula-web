      \ actions (detaining Koral) are seen as a threat by the mercenaries, creating\
      \ a **proxy conflict** where Starfleet’s protocols become the enemy. **Resource\
      \ allocation**: The *Enterprise*’s lowered shields and focus on the Klingon\
      \ shuttle make it vulnerable, highlighting the **trade-offs** in Starfleet’s\
      \ operational priorities.\n      "
    global_id: ger_organization_73a4b614bde7
  - organization_uuid: ger_organization_368e3ed99081
