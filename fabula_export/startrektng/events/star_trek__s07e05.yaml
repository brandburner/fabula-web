  scene_sequence: 27
  sequence_in_scene: 47
  key_dialogue:
  - 'TALLERA: There. Your reward as promised.'
  - 'NARIK: I did not come this far to be cheated. I want it all. Now.'
  - 'TALLERA: Very well. You will get what you deserve.'
  - 'PICARD: You can''t win, Tallera. Starfleet won''t stand by while you tear apart
    one of the founding worlds of the Federation.'
  - 'TALLERA: How little you understand what you are facing, Captain. You are used
    to fighting enemies like yourself... people on ships with energy weapons, defense
    shields, warp drives... but this is unlike anything you have ever faced. This
    is the power of the mind.'
  - 'PICARD: The third image is the Vulcan symbol for peace... that symbol is positioned
    between the symbols for war and death. It''s a warning... that the resonator''s
    power can be overcome by peace.'
  - 'TALLERA: You''re about to see how wrong you are.'
  - 'PICARD: Clear your minds of all aggressive thoughts...'
  - 'PICARD: Think, Tallera—two thousand years ago, your people were being consumed
    by war... then they found the way of peace and logic. During the same period,
    the resonator was dismantled... don''t you see the connection? When peace came
    to Vulcan, the resonator became useless. That is why it was dismantled.'
  - 'PICARD: You were right... the resonator cannot be stopped with phasers or shields.
    But like every other form of violence... it can be stopped with peace.'
