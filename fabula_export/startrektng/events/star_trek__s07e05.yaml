  object_involvements:
  - object_uuid: ger_object_b6ba224c81eb
    description_of_involvement: "\n        Picard’s Scanner Pad is the technical instrument\
      \ that transforms the Terikon artifact from an unknown relic into a confirmed\
      \ component of the psionic resonator. Picard manipulates its settings with deliberate\
      \ precision, subtly stalling the scan to delay the inevitable revelation. The\
      \ pad’s beep and the computer’s announcement of the 98% match create a dramatic\
      \ punctuation, shifting the power dynamic in the room. Its role is both functional\
      \ (providing data) and narrative (acting as the neutral arbiter that forces\
      \ Tallera’s hand). The scanner pad is a tool of truth in this high-stakes deception,\
      \ exposing Picard’s gamble and accelerating the mercenaries’ timeline.\n   \
      \   "
    status_before_event: "\n        Active and operational, used by Picard to scan\
      \ lesser artifacts before isolating the Terikon piece. Its settings are adjusted\
      \ multiple times, reflecting Picard’s attempts to control the flow of information.\n\
      \      "
    status_after_event: "\n        The scanner pad’s confirmation of the Terikon match\
      \ makes it a symbol of the mercenaries’ progress. It remains in the cargo bay,\
      \ but its data is now a weapon in Tallera and Baran’s hands, driving the next\
      \ phase of their plan.\n      "
    global_id: ger_object_b6ba224c81eb
  - object_uuid: ger_object_dbd8970f9c5d
    description_of_involvement: "\n        Tallera’s Com Device is the bridge between\
      \ the cargo bay and Baran’s authority, serving as the mechanism that escalates\
      \ the stakes of the Terikon discovery. When Tallera touches the device to hail\
      \ Baran, it symbolizes the end of Picard’s temporary reprieve—her voice, cool\
      \ and unemotional, delivers the damning confirmation that sets the mercenaries’\
      \ hunt into overdrive. The com device is more than a tool; it’s the instrument\
      \ of Picard’s impending doom, as it ensures Baran’s involvement and the irrevocable\
      \ acceleration of the weapon’s reassembly. Its activation is a narrative turning\
      \ point, marking the shift from interrogation to execution.\n      "
    status_before_event: "\n        Inactive but ever-present, a symbol of Baran’s\
      \ authority and the mercenaries’ command structure. Tallera carries it as a\
      \ tool of communication, but its potential to alter the course of the mission\
      \ looms large.\n      "
    status_after_event: "\n        Activated and used to relay the Terikon match confirmation\
      \ to Baran. Its role is fulfilled in this moment, but its activation ensures\
      \ that the mercenaries’ timeline will now proceed without delay.\n      "
    global_id: ger_object_dbd8970f9c5d
  - object_uuid: ger_object_71fc57116844
    description_of_involvement: "\n        The Terikon Puzzle-Piece Artifact is the\
      \ linchpin of this event, serving as both a physical clue and a narrative catalyst.\
      \ Picard places it on the scanner pad after removing less significant artifacts,\
      \ and its intricate designs and puzzle-like shape immediately draw Tallera’s\
      \ attention. When the scanner confirms a 98% Terikon match, the artifact transitions\
      \ from a mere relic to the critical component of the psionic resonator—a discovery\
      \ that irrevocably escalates the mercenaries’ hunt. Its involvement is symbolic\
      \ as well as functional: it represents the merging of ancient Vulcan technology\
      \ with modern extremism, and its confirmation forces Picard into a corner, where\
      \ his cover and mission hang in the balance.\n      "
    status_before_event: "\n        Part of a group of newly acquired artifacts, unscanned\
      \ and unremarkable until Picard isolates it for analysis. Its true significance\
      \ is unknown until the scan confirms its Terikon origins.\n      "
    status_after_event: "\n        Confirmed as a 98% Terikon match, it becomes the\
      \ focal point of the mercenaries’ immediate plans. Tallera handles it with reverence,\
