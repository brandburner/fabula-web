  sequence_in_scene: 39
  key_dialogue:
  - 'TALLERA: What happened?'
  - 'PICARD: I switched our transponder codes. It seemed like a prudent, if regrettable
    step.'
  - 'TALLERA: Baran was nothing. We have a mission to complete... and the crew needs
    a leader.'
  - 'PICARD: There''ll be no more ''punishment'' on this ship. Do your duties and
    I''ll see to it that we complete our mission... and get our payment.'
