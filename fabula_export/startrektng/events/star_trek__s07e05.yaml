  key_dialogue: &id001
  - 'WORF: Direct hit to the port nacelle...'
  - 'WORF: But -- only minimal damage.'
  - 'TROI: Wil must''ve done something to their weapons.'
  - 'DATA: I believe so, Counselor. It is now up to us to... play along.'
  - 'DATA: Release inertial dampers and cut power on decks thirty-one through thirty-seven.'
  - 'DATA: Set phasers to twenty-five percent. Return fire.'
  - 'WORF: Aye, sir.'
