  title: Data exploits Wil's sabotage for deception
  description: 'On the *Enterprise* bridge, Data observes the mercenary ship''s attacks
    causing only superficial damage, deducing Wil Riker''s covert interference with
    their weapons. Rather than exposing the deception, Data seizes the strategic opportunity
    to deepen the illusion of vulnerability. He orders Giusti to disable inertial
    dampers and depower critical decks, creating the *appearance* of a crippled ship.
    Simultaneously, he instructs Worf to return fire at reduced phaser output—enough
    to maintain the facade of resistance without revealing the *Enterprise*''s true
    combat capability. This calculated maneuver serves two critical purposes: it preserves
    Picard and Riker''s undercover mission by reinforcing the mercenaries'' misperception
    of the *Enterprise* as an easy target, and it buys time for Starfleet''s broader
    counteroffensive. The scene underscores Data''s tactical brilliance and his willingness
    to bend Starfleet protocols when strategic necessity demands it, while also highlighting
    the unspoken trust between Data and Riker, whose sabotage remains undetected but
    is now being weaponized for mutual advantage.'
