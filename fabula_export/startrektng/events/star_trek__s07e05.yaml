  description: "\n  In the Observation Lounge, Data and Troi are interrogating Koral\
    \ about his mission when Riker, Picard, and the mercenaries suddenly materialize,\
    \ disrupting the scene. Riker immediately demands the artifact Koral carries,\
    \ and Picard retrieves it, confirming its identity. To maintain their cover, Riker\
    \ feigns betrayal by firing his phaser at Picard, who preemptively shoots Riker\
    \ in self-defense, staging his death. Troi confirms Riker’s survival to Picard,\
    \ who coldly approves before departing with the mercenaries. Data, realizing the\
    \ deception, orders a security alert and begins tracking the mercenary ship. The\
    \ exchange solidifies Riker and Picard’s undercover credibility while escalating\
    \ the mission’s stakes, as the crew must now navigate the fallout of Riker’s apparent\
    \ death and Picard’s departure with the artifact.\n  "
