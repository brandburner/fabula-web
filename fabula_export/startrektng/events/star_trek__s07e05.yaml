  title: Riker’s Staged Betrayal and Picard’s Tactical Wound
  description: "\n  In the Observation Lounge, Riker and Picard—undercover as mercenaries—materialize\
    \ with their crew to intercept Koral, a Klingon transporting a second telepathic\
    \ artifact. Picard confirms the artifact’s identity, but Riker’s sudden phaser\
    \ threat against him escalates into a staged confrontation. Picard preemptively\
    \ fires, stunning Riker to sell their cover, while Troi falsely confirms Riker’s\
    \ death to Data. The deception solidifies their credibility with the mercenaries,\
    \ but at the cost of Picard crossing an ethical line—his cold ‘Good’ after Riker’s\
    \ ‘death’ underscores the mission’s moral toll. The moment forces Data and Troi\
    \ to improvise, maintaining the ruse while Riker recovers, setting up Picard’s\
    \ imminent departure with the mercenaries and the crew’s frantic response to the\
    \ crisis.\n  "
