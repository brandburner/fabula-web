  - character_uuid: ger_agent_f2c5f532ddd2
    emotional_state: Thoughtfully engaged, Troi’s emotional state is one of quiet
      confidence. She is neither alarmed nor surprised by the deception; rather, she
      is fully present, her empathy allowing her to read the room and contribute meaningfully
      to the unfolding strategy. There is a sense of camaraderie in her interaction
      with Data, a shared understanding that transcends words.
    goals:
    - Provide Data with the empathic insight that Riker’s sabotage is the cause of
      the minimal damage.
    - Support the crew’s cohesion by ensuring that emotional tensions do not disrupt
      the mission.
    what_happened: Troi stands at her counselor’s station, her empathic senses attuned
      to the subtle shifts in the bridge crew’s emotions. She is the first to voice
      the unspoken realization—that Wil Riker must have interfered with the mercenary
      weapons—her insight cutting through the tactical chatter. Her contribution is
      concise, her tone measured, as she provides Data with the critical piece of
      information needed to justify his deception. Though she does not speak again
      in this exchange, her presence is a quiet but vital force, her empathy ensuring
      that the crew’s unspoken tensions are acknowledged and addressed.
