    institutional_impact: |2-

            The event highlights the *tensions between Starfleet’s ideals and the realities of undercover work*. Picard and Riker are forced to compromise their principles (deception, violence) to achieve their mission, raising questions about the *ethical limits of Starfleet’s methods*. The organization’s broader impact is seen in the *fractured dynamics of the mercenary crew*, which the officers are exploiting—but at the risk of their own moral integrity.
