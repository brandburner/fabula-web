  title: Riker reveals Baran’s assassination order
  description: 'In Picard’s cramped quarters aboard the mercenary ship, Riker arrives
    under Baran’s orders to feign friendship and test Picard’s loyalty—only to reveal
    the true stakes: Baran has commanded Riker to assassinate Picard once the second
    artifact is authenticated. The revelation forces Picard to acknowledge the precariousness
    of their undercover mission, as Baran’s neural servo already poses an immediate
    threat to his life. Picard’s discovery that the artifacts are Vulcan (not Romulan)
    adds a layer of deception to the extremist’s motives, while Riker’s admission
    of Baran’s kill order escalates the tension, compelling Picard to propose a preemptive
    mutiny. The exchange underscores the fragility of their cover and the urgency
    of their next moves, as Baran’s paranoia and the extremist’s hidden agenda converge
    into a life-or-death gambit.'
