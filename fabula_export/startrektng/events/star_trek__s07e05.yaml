- fabula_uuid: cand_evt_scene_f3d59425b6e0ecb5_02
  global_id: null
  title: Picard’s Suspicion of Tallera’s Betrayal
  description: 'In Baran’s quarters, Picard and Tallera examine the two pieces of
    the telepathic resonator while reviewing Baran’s logs, which reveal the artifacts
    are destined for the T’Karath Sanctuary on Vulcan. Picard, feigning academic curiosity,
    studies the inscriptions on the resonator pieces, noting the presence of Vulcan
    gods of war and death—along with an unexplained missing third symbol. His probing
    questions about the final artifact and Tallera’s insistence on handling the delivery
    alone trigger her first visible reaction: a fleeting look of shock when he mentions
    Riker’s preemptive warning to Vulcan authorities. Picard’s suspicion deepens as
    Tallera deflects his offers to accompany her, citing Vulcan protocol, and abruptly
    exits with the artifacts. The moment marks a critical shift—Picard’s trust in
    Tallera fractures, and the stolen artifacts escalate the stakes, as their reassembly
    could trigger the very galactic conflict he and Riker are tasked to prevent. The
    scene underscores the tension between cooperation and deception, forcing Picard
    to prioritize tracking Tallera while maintaining his undercover mission.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e05
  scene_sequence: 25
