  title: Riker defends Narik from Baran’s threat
  description: "\n  On the mercenary ship’s bridge, Baran pressures Narik to complete\
    \ warp engine repairs under an impossible deadline, subtly threatening his life\
    \ by resting his hand on a neural servo device. Riker intervenes, validating Narik’s\
    \ technical concerns and buying him time, which defuses the immediate tension.\
    \ The exchange reveals Baran’s ruthless leadership style—he prioritizes results\
    \ over lives—and Riker’s calculated maneuvering to protect Narik while maintaining\
    \ his cover as a loyal enforcer. Baran then orders Riker to ‘wake’ Galen (Picard),\
    \ a veiled command to eliminate him, testing Riker’s loyalty. Riker’s compliance\
    \ signals his deepening entanglement in Baran’s hierarchy, where survival depends\
    \ on balancing deception with strategic defiance. The scene underscores the precarious\
    \ trust dynamics among the crew and sets up Riker’s next critical choice: obeying\
    \ Baran’s order or sabotaging it to protect Picard.\n  "
