  global_id: null
  title: Data detects mercenary coordinates and confronts Worf
  description: "\n  Data deciphers the mercenary ship's encrypted signal, revealing\
    \ their destination in the Hyralan Sector—a critical breakthrough that enables\
    \ the *Enterprise* to intercept them. His calm authority contrasts with Worf's\
    \ simmering frustration, which erupts in a muttered 'Finally' after Data's delayed\
    \ order. Recognizing the subtext of Worf's irritation, Data immediately requests\
    \ a private meeting in the Ready Room, signaling a deliberate escalation of their\
    \ unresolved tension. The scene pivots from mission progress to interpersonal\
    \ conflict, setting up a confrontation that will test Worf's loyalty and Data's\
    \ leadership. The moment underscores the crew's fractured cohesion during Picard\
    \ and Riker's absence, with Worf's defiance threatening to destabilize the chain\
    \ of command at a pivotal juncture.\n  "
