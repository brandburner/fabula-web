  description: "\n  In the aftermath of the mission’s success—neutralizing the psionic\
    \ resonator and detaining the mercenaries—Picard, Riker, and Data walk through\
    \ the *Enterprise*’s corridor, still processing the fallout of their covert operation.\
    \ Picard, still dressed in his mercenary disguise, casually orders Riker to set\
    \ a course for Starbase 227, only for Riker to remind him—with dark humor—that\
    \ both are officially dead in Starfleet’s records. Data, ever literal, seizes\
    \ on this technicality, confirming that Picard lacks jurisdiction and Riker is\
    \ technically a renegade facing court-martial. Picard, seizing the moment, orders\
    \ Data to escort Riker to the brig, exposing the absurd yet precarious legal void\
    \ their undercover status has created. The exchange underscores the fragility\
    \ of their operational legitimacy and the bureaucratic fallout of their covert\
    \ actions, while also revealing Picard’s willingness to weaponize Starfleet’s\
    \ own rigidity against Riker—even in jest. The scene ends with Data, oblivious\
    \ to the humor, leading Riker away, leaving Picard to retreat to his quarters,\
    \ the weight of their mission’s consequences lingering unspoken.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e05
