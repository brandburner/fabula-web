- fabula_uuid: act_92c27a4928ee4231
  number: 2
  summary: Data confronts Lieutenant Worf in the Ready Room, addressing his insubordinate
    behavior and public questioning of orders while acting as First Officer. Data
    emphasizes the importance of loyalty and private counsel in this role, offering
    Worf a transfer if he cannot conform. Worf, showing remorse, pledges to uphold
    his duties and reaffirms their friendship. This interaction strengthens their
    professional and personal bond. On the mercenary ship, Riker continues to build
    trust with Baran, subtly intervening to protect Narik from Baran's wrath over
    engine repairs, thus appearing to align with the crew's interests. Picard, meanwhile,
    attempts to incite a mutiny against Baran, approaching Narik. However, Narik dismisses
    Picard's overtures, expressing distrust and stating his loyalty to Tallera. Picard's
    initial attempt to rally support fails. Shortly after, Tallera confronts Picard
    in the cargo hold, revealing her knowledge of his Starfleet transmission and correctly
    deducing his true identity. She then discloses her own identity as T'Paal, a Vulcan
    Security agent, and explains her mission to investigate a growing isolationist
    movement on Vulcan and prevent the reassembly of a dangerous psionic resonator,
    the Stone of Gol. Picard reciprocates, confirming his identity as Captain Jean-Luc
    Picard, establishing a fragile alliance based on shared objectives.
