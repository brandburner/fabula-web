    global_id: ger_object_7a04689e0177
  - object_uuid: ger_object_b6ba224c81eb
    description_of_involvement: "\n      Picard’s scanner pad (PADD) is central to\
      \ the revelation that the artifacts are Vulcan, not Romulan. He uses it to analyze\
      \ the glyphs and pictograms on the Calder Two artifact, providing critical intelligence\
      \ that undermines the extremists' narrative. The PADD’s data is incomplete,\
      \ but its findings are sufficient to shift the dynamic between Picard and Riker,\
      \ as they realize the artifacts’ true origin. This object symbolizes Picard’s\
      \ reliance on analytical rigor and his frustration at being cut off from Starfleet’s\
      \ superior computational resources.\n      "
    status_before_event: "\n      Picard is actively studying the PADD when Riker\
      \ enters, using it to analyze the Calder Two artifact’s glyphs. The device is\
      \ functional but limited in its data, requiring Picard to infer the artifacts’\
      \ Vulcan origin from partial information.\n      "
    status_after_event: "\n      The PADD remains in Picard’s possession, now serving\
      \ as tangible evidence of the artifacts’ Vulcan origin. Its data has been shared\
      \ with Riker, reinforcing their shared understanding of the situation and the\
      \ need to accelerate their mutiny plans.\n      "
    global_id: ger_object_b6ba224c81eb
