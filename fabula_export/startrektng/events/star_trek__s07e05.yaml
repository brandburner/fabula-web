  key_dialogue: &id007
  - 'BARAN: I suppose I should thank you. None of us would be alive if it weren’t
    for you.'
  - 'RIKER: ((bitter)) You''re welcome.'
  - 'PICARD: What''s wrong, Commander? Starting to have second thoughts about betraying
    your comrades... because that''s what you''ve done—betrayed them... betrayed them
    in order to save yourself. You were just a second-rate officer before... now you''re
    a coward and a traitor. How does that feel?'
  - 'RIKER: I don''t know. How did that feel?'
  - 'BARAN: ((hard)) That''s enough. Galen, get down to the cargo hold and check those
    artifacts. Move.'
