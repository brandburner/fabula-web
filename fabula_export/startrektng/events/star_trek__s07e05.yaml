  title: Klingon shuttle defies communication
  description: |2

    The *Enterprise* arrives at the coordinates where a Klingon shuttle—bearing a single passenger, Koral—is detected adrift. Data initiates contact, but Koral’s refusal to engage (beyond a single-word acknowledgment of his name) escalates tensions. Troi senses Koral’s underlying fear, while Worf advocates for boarding the shuttle under the guise of a health and safety inspection, exploiting a treaty loophole. Data, though hesitant, ultimately approves the maneuver, setting the stage for a confrontation that risks exposing Picard and Riker’s undercover mission. The scene underscores the crew’s desperation to uncover the truth while navigating diplomatic constraints, with Koral’s defiance serving as a catalyst for Worf’s strategic thinking and Data’s calculated risk-taking.
