  key_dialogue: &id017
  - 'DATA: I am Lieutenant Commander Data of the Federation Starship Enterprise.'
  - 'KORAL: Koral.'
  - 'DATA: May I inquire as to your destination?'
  - 'KORAL: No.'
  - 'DATA: May I ask the purpose of your journey?'
  - 'KORAL: No.'
  - 'WORF: Sir... I recommend that we bring the shuttle aboard with our tractor beam,
    search it, and interrogate Koral.'
  - 'DATA: According to the terms of the Klingon/Federation Treaty, Koral has every
    right to free transit through Federation space. We cannot board or search his
    vessel without cause.'
  - 'WORF: However... the Treaty also gives us the right to conduct... health and
    safety inspections of any ship in our space.'
  - 'DATA: Article forty-seven, paragraph three, subsection B: ''Starfleet will have
    the right to insure all Klingon vessels comply with safety and navigational regulations
    as specified by mutual agreement.'''
  - 'DATA: However, if Koral wishes to contest our actions he can file a protest with
    the Judge Advocate General''s office.'
