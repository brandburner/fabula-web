      \ the operation and the relief that comes with its neutralization, even as the\
      \ crew grapples with the bureaucratic and legal repercussions of their actions.\
      \ The resonator’s absence in the scene is symbolic, representing the transition\
      \ from active crisis to the administrative aftermath.\n      "
