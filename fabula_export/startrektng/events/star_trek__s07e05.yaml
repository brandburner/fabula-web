      \  "
    global_id: ger_object_329d9209efcf
  - object_uuid: ger_object_61e899862bcc
    description_of_involvement: "\n        The weapons and equipment for the raiding\
      \ party are **symbols of the mercenaries’ desperation and Baran’s ruthlessness**.\
      \ Their preparation marks the transition from planning to action, emphasizing\
      \ the high stakes of the mission. Baran’s order to ‘draw weapons and equipment\
      \ for a raiding party of five’ underscores the urgency and lethality of the\
      \ impending raid. The gear—phasers, disruptors, breaching tools, and likely\
      \ personal shields—serves a dual purpose: **practical** (enabling the team to\
      \ infiltrate the *Enterprise*) and **psychological** (reinforcing the threat\
      \ to Picard and Riker’s lives). The equipment’s presence also highlights the\
      \ asymmetry of the conflict: the mercenaries are outgunned but rely on surprise\
      \ and Riker’s insider knowledge.\n      "
    status_before_event: "\n        Stored in the mercenary ship’s armory, unused\
      \ but readily accessible. The crew has likely used similar gear for past raids,\
      \ but this mission is unusually high-risk due to the target (*Enterprise*).\n\
      \      "
    status_after_event: "\n        Assembled and distributed to the raiding party\
      \ (including Riker and Picard), now en route to the *Enterprise*. The equipment\
