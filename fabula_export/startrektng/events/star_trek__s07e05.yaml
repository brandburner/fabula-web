  global_id: null
  title: Tallera's lethal demonstration of the resonator
  description: In the Vulcan cavern, Tallera lures Vekor and Narik to their deaths
    by activating the fully assembled Stone of Gol resonator, which amplifies violent
    impulses into lethal psychic energy. When Narik demands the full payment promised,
    Tallera triggers the resonator, killing both mercenaries with a dissonant psychic
    blast. Picard, now alone with Tallera, realizes the resonator’s power is tied
    to the Vulcan symbol for peace—positioned between war and death—suggesting its
    vulnerability to nonviolent resistance. As Riker, Worf, and security guards materialize,
    Picard orders them to drop their weapons and clear their minds, demonstrating
    that the resonator’s power can be neutralized by peace. Tallera, exhausted from
    failed attempts to kill them, collapses, and Picard disassembles the resonator,
    ending the immediate threat. The scene underscores the weapon’s danger, Tallera’s
    ruthlessness, and Picard’s strategic brilliance in turning the resonator’s own
    logic against it, foreshadowing the confrontation’s resolution through mental
    discipline rather than force.
