  title: Baran defuses Riker-Picard fight with cargo assignment
  description: 'After Narik reports the ship’s engines require five hours of offline
    repairs—with Baran threatening execution if the work isn’t done in three—tensions
    explode between Picard and Riker. Picard, still seething from Riker’s earlier
    betrayal, verbally dismantles him in front of the crew, calling him a coward and
    traitor. Riker’s response is physical: he punches Picard, knocking him down. Baran
    intervenes, ordering Picard to the cargo hold to inspect the artifacts—a tactical
    move that separates the two officers before their conflict escalates further.
    Tallera observes silently, her scrutiny hinting at deeper suspicion of the crew’s
    true loyalties. The moment serves as a pressure point for the mission’s secrecy,
    testing both Picard’s and Riker’s ability to maintain their undercover roles amid
    rising distrust. Baran’s assignment also subtly tests Picard’s loyalty and competence,
    while Riker’s outburst reveals the strain of his double life.'
