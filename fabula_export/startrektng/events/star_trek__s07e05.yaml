  location_involvements:
  - location_uuid: ger_location_2e63d5b5bb57
    description_of_involvement: "\n        The Cargo Hold of the Mercenary Ship is\
      \ a claustrophobic, high-tension arena where Picard’s undercover mission teeters\
      \ on the brink of collapse. Its stark, utilitarian design—stacked crates, harsh\
      \ overhead lights, and the metallic tang of recycled atmosphere—mirrors the\
