    at the rendezvous coordinates... but he''s been detained by the Enterprise.'
  - 'PICARD: How could they have found out about the rendezvous, Commander? RIKER:
    How could I have known the rendezvous coordinates? If anyone sent them a message
    it must''ve been one of you.'
  - 'BARAN: ... but he does. [pointing at Riker] Riker thinks about this for a moment...
    then realizes that the best way to keep anyone from getting hurt on a raid like
    this is for him to lead it.'
  - 'BARAN: In case you are thinking of betraying us to your friends on the Enterprise...
    you might remember that I can still kill you at the first sign of trouble. RIKER:
    I haven''t forgotten.'
  - 'BARAN: I have an additional task for you... one that will prove your loyalty.
    This raid is an opportunity to get rid of Galen. Once you''ve found the artifact...
    kill him.'
