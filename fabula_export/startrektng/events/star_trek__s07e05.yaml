    emotional_state: Though not physically present, Riker’s emotional state can be
      inferred as one of calculated confidence. He is fully aware of the risks he
      has taken in sabotaging the mercenary weapons, but his trust in Data, Troi,
      and the rest of the crew allows him to remain focused on the broader mission.
      There is a sense of quiet satisfaction in knowing that his actions have created
      an opening for the *Enterprise* to exploit.
    goals:
    - Sabotage the mercenary weapons to minimize damage to the *Enterprise* and preserve
      his and Picard’s cover.
    - Create a strategic advantage for the *Enterprise* by exploiting the mercenaries’
      overconfidence.
    what_happened: Though physically absent from the bridge, Riker’s presence looms
      large over the scene. His unseen sabotage of the mercenary weapons is the catalyst
      for Data’s deception, his actions a silent but powerful force shaping the *Enterprise*’s
      response. The crew’s deductions about his interference—particularly Troi’s empathic
      insight—reveal his influence, even as his true role remains hidden from the
      mercenaries. Riker’s absence is felt in the strategic opportunities it creates,
      his trust in the crew’s ability to adapt evident in the seamless execution of
      Data’s plan.
