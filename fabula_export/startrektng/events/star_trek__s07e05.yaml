  title: Data decodes mercenary coordinates
  description: |2

    Data deciphers the encrypted signal from the mercenary ship, revealing its destination: the Hyralan Sector—a critical location tied to the Vulcan extremist’s telepathic weapon. This breakthrough allows the *Enterprise* to set an intercept course, directly supporting Picard and Riker’s undercover mission. The revelation escalates tension between Data and Worf, as Worf’s frustration with Data’s command style surfaces when he’s ordered to execute the course change. The moment underscores the crew’s urgency to stop the weapon’s reassembly while maintaining their covert operation, and it sets up a power struggle between Data and Worf that could destabilize the mission. Geordi’s observation about the *Enterprise*’s superior speed reinforces the stakes: time is running out, and the crew must act decisively to prevent a galactic incident.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e05
  scene_sequence: 9
