  title: Riker forced to betray Picard under Baran’s test
  description: 'In Baran’s decadent quarters, the mercenary leader reveals his plan
    to eliminate Picard (Galen) once the final artifact is secured, testing Riker’s
    loyalty. Riker seizes the opportunity to deepen his cover by feigning enthusiasm
    for Picard’s demise, even volunteering to befriend him and uncover his allies.
    Baran, ever suspicious, probes Riker’s motives, questioning whether his defection
    from Starfleet is genuine. The tension escalates when Baran explicitly orders
    Riker to kill Picard, forcing Riker to nod in agreement—his expression unreadable—while
    internally balancing his undercover mission against the moral weight of the command.
    The scene underscores the precariousness of Riker’s double role: he must appear
    fully complicit in Baran’s schemes while secretly working to thwart them, all
    without tipping his hand to Picard or the crew. The dialogue crackles with subtext,
    as Riker’s calculated responses mask his true allegiance, and Baran’s cautious
    probing reveals his own paranoia. This moment serves as a critical turning point,
    where Riker’s cover is both reinforced and further endangered, raising the stakes
    for his ability to maintain the deception while advancing the mission’s objectives.'
