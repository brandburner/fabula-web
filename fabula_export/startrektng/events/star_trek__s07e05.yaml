  global_id: null
  title: Riker stuns Enterprise crew to pursue Koral
  description: Picard and Riker, undercover as mercenaries, materialize in the *Enterprise*
    shuttlebay with armed mercenaries and immediately escalate the confrontation by
    stunning an Enterprise crewmember. Worf instinctively reaches for his phaser,
    but Picard levels his weapon at him, forcing compliance. Riker quickly deduces
    Koral’s location—with Data and Troi in the Observation Lounge—and neutralizes
    Beverly and Worf with phaser fire to prevent interference. The violent takeover
    reveals their undercover infiltration, tests the limits of their cover, and forces
    a high-stakes race to intercept Koral before he can activate the telepathic weapon.
    The scene underscores the moral cost of Riker’s deception, as he sacrifices trust
    with his crewmates to maintain his mission-critical role, while Picard’s cold
    authority as 'Galen' further cements his false identity. The stolen shuttle’s
    transporter becomes their means to bypass security and reach Koral, but the act
    of stunning allies—especially Beverly and Worf—deepens the narrative tension between
    duty and betrayal.
