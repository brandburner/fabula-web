  key_dialogue: &id029
  - 'PICARD: According to Baran''s logs, the two artifacts are supposed to be delivered...
    to the T''Karath Sanctuary on Vulcan.'
  - 'TALLERA: I know that place. It was an underground stronghold for one of the factions
    during the last civil war. It''s been abandoned for centuries.'
  - 'PICARD: Perhaps you can help me with something... I''ve been able to translate
    most of the writing on these pieces... But this hieroglyph on the anterior has
    me a bit puzzled. This is clearly the Vulcan god of war... and this is the god
    of death... But if you look closely you can see that there is a third symbol missing
    -- which should be on the final piece.'
  - 'TALLERA: Fascinating. But I am not an archaeological expert.'
  - 'PICARD: When we arrive at Vulcan, I will take these pieces to a secure holding
    area before going to the Sanctuary. I prefer to go alone... it will arouse less
    suspicion among the isolationists.'
  - 'PICARD: I didn''t want to risk a misunderstanding... someone might have mistaken
    this for an actual raid...'
  - 'TALLERA: ((covering)) It was a wise precaution.'
  - 'PICARD: Perhaps I should contact the Enterprise... have them meet us at Vulcan
    in case these isolationists try to escape.'
  - 'TALLERA: Your offer is appreciated... but our security forces are more than adequate.'
  - 'PICARD: Are you sure it''s wise for you to go to the Sanctuary alone? After all,
    they''re expecting Baran to show up, not you. If I accompanied you, it may seem
    more plausible that -'
  - 'TALLERA: Captain, I understand your human emotional need to be there at the final
    moment... but this is a Vulcan matter.'
