  - 'BEVERLY: Hello. I''m Doctor Crusher, and this is Lieutenant Worf. We''re here
    to conduct the health and safety inspection of your ship.'
  - 'KORAL: ((with contempt)) Health and safety inspection...'
  - 'BEVERLY: That''s right. You know... radiation leaks... biochemical contamination...
    other health hazards...'
