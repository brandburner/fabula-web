  title: Picard Outmaneuvers Tallera with Peace
  description: "\n  In the Vulcan caverns, Tallera assembles the Stone of Gol resonator—a\
    \ weapon that amplifies violent impulses—while Picard, Riker, and Worf materialize\
    \ to confront her. After Tallera brutally kills the mercenaries Narik and Vekor\
    \ using the resonator’s lethal telepathic distortion, Picard realizes the weapon’s\
    \ vulnerability: the Vulcan symbol for peace, embedded in its design, suggests\
    \ it can be neutralized by mental discipline. When Riker and Worf arrive armed,\
    \ Picard orders them to stand down and clear their minds, demonstrating that the\
    \ resonator’s power falters against non-aggressive thoughts. Tallera, exhausted\
    \ by the effort to maintain control, collapses as the distortion fails to harm\
    \ them. Picard dismantles the resonator, securing the mission’s success while\
    \ reinforcing the theme that violence cannot prevail against peace and logic.\
    \ The confrontation underscores Picard’s tactical brilliance and his understanding\
    \ of Vulcan philosophy, preserving their undercover mission and averting a catastrophic\
    \ escalation.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e05
  scene_sequence: 27
  sequence_in_scene: 48
  key_dialogue:
  - 'TALLERA: Go ahead, Captain. Pick up the phaser. See what good it will do.'
  - 'PICARD: Drop your weapons! Do it! Make no aggressive movements. The resonator
    amplifies violent thoughts and emotions.'
  - 'PICARD: Think, Tallera—two thousand years ago, your people were being consumed
    by war... then they found the way of peace and logic. When peace came to Vulcan,
    the resonator became useless. That is why it was dismantled.'
  - 'PICARD: You were right... the resonator cannot be stopped with phasers or shields.
    But like every other form of violence... it can be stopped with peace.'
