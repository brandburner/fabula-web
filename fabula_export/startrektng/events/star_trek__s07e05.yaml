  key_dialogue: &id011
  - 'DATA: I have completed the analysis of the signal from the mercenary ship. I
    believe these groupings represent bearings and coordinates taken from their navigational
    system.'
  - 'GEORDI: So you think this is their flight plan...'
  - 'DATA: Yes. If I am correct, the mercenary vessel is heading toward these coordinates
    in... the Hyralan Sector.'
  - 'WORF: ((annoyed)) Finally.'
  - 'DATA: Lieutenant, may I see you in the Ready Room?'
