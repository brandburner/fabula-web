  global_id: null
  title: Riker stuns Enterprise crew to pursue Koral
  description: Picard and Riker, undercover as mercenaries, materialize in the *Enterprise*
    shuttlebay with armed mercenaries and immediately escalate the confrontation by
    stunning an Enterprise crewmember. Worf instinctively reaches for his phaser,
    but Picard levels his weapon at him, forcing compliance. Riker quickly deduces
    Koral’s location—with Data and Troi in the Observation Lounge—and neutralizes
    Beverly and Worf with phaser fire to prevent interference. The violent takeover
