- fabula_uuid: act_5a5df74ab326b2fc
  number: 3
  summary: Tallera, revealing her true identity as T'Paal, a Vulcan Security agent,
    explains the grave threat posed by the Stone of Gol to Captain Picard. She describes
    it as a psionic resonator, a devastating ancient Vulcan weapon that amplifies
    telepathic energy, capable of mass destruction. Tallera's mission involves infiltrating
    Baran's crew to prevent Vulcan isolationists from reassembling this weapon, which
    they believe will purify Vulcan culture. Picard agrees to maintain their cover,
    recognizing the necessity of continuing the masquerade to intercept the weapon.
    Simultaneously, the Enterprise arrives in the Hyralan Sector and detects a Klingon
    shuttle. Data attempts to communicate with the shuttle's pilot, Koral, who proves
    uncooperative. Worf suggests using a "health and safety inspection" loophole in
    the Klingon/Federation Treaty to board the shuttle and search for the second artifact.
    Data, after careful consideration of the treaty's spirit, authorizes the inspection,
    sending Worf and Dr. Crusher. On the mercenary ship, Baran receives Koral's last
    transmission, indicating the Enterprise has detained him and likely possesses
    the second artifact. Despite his crew's disbelief, Baran decides to launch a daring
    raid on the Enterprise. Riker volunteers to lead the boarding party, ensuring
    he can control the situation and minimize harm. Before the raid, Baran privately
    orders Riker to kill Picard once the artifact is secured, testing Riker's loyalty
    and eliminating a perceived threat.
