  global_id: null
  title: Riker confirms Tallera’s deception
  description: 'Riker, undercover on the mercenary ship, contacts Vulcan Security
    Minister Satok to verify the presence of a Vulcan operative—ostensibly to prevent
    a misguided attack on the approaching ship. Satok’s immediate denial that any
    Vulcan agent is aboard shatters Riker’s assumption that Tallera is a legitimate
    operative. The revelation forces Riker to confront the possibility that Tallera’s
    true identity and motives are far more dangerous than initially believed, directly
    threatening the mission’s core objectives. The moment marks a critical turning
    point: Riker’s trust in Tallera collapses, and the stakes of the mission escalate
    as the true nature of the extremist’s agenda becomes clear. The exchange is tense,
    with Satok’s measured confusion contrasting sharply with Riker’s dawning horror,
    underscoring the fragility of their undercover operation and the urgency of uncovering
    Tallera’s real plans before she can reassemble the psionic resonator.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e05
  scene_sequence: 24
  sequence_in_scene: 42
  key_dialogue:
  - 'RIKER: Minister, I wanted to let you know that the mercenary ship which has been
    raiding planets in the Taugan sector is probably on its way to Vulcan right now.'
  - 'SATOK: Commander, I believe there is a problem. We have no operative aboard a
    mercenary ship.'
  - 'RIKER: I know that one of your operatives has been investigating the assembly
    of the psionic resonator on a mercenary ship for several months.'
