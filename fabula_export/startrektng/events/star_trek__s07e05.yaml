  object_involvements:
  - object_uuid: ger_object_82508cd479c7
    description_of_involvement: |2-

              Geordi’s sub-harmonic analysis tool is the key to uncovering the hidden cipher in Riker’s transmission. By running the transmission through this tool, Geordi exposes the intricate series of numbers and letters—an okudagram—that was concealed in the carrier wave. This tool’s application marks a turning point, shifting the crew’s focus from sensor sweeps to decryption and revealing Riker’s covert message.
    status_before_event: Idle, awaiting use for signal analysis or decryption tasks.
    status_after_event: Actively engaged in analyzing Riker’s transmission, having
      successfully uncovered the hidden cipher.
    global_id: ger_object_82508cd479c7
  - object_uuid: ger_object_07867f1643aa
    description_of_involvement: |2-

              Giusti uses the lateral array sensors to conduct sensor sweeps under Data’s direction, setting them to maximum gain in an attempt to locate the mercenary ship. The sensors yield no results, reinforcing the crew’s frustration and the need to explore alternative investigative methods. Their role shifts from active pursuit to passive surveillance, highlighting the tension between action and caution.
    status_before_event: Operational and set to standard gain, conducting routine
      sensor sweeps with no significant findings.
    status_after_event: Set to maximum gain and actively monitoring for the mercenary
      ship, though still yielding no results.
    global_id: ger_object_07867f1643aa
  - object_uuid: ger_object_02883ab61428
    description_of_involvement: |2-

              The hidden cipher, revealed as an okudagram of numbers and letters, becomes the crew’s primary objective. Its discovery forces a pivot from passive surveillance to urgent decryption, as Data and Geordi work to resequence the signal and find a decryption key. The cipher’s existence raises critical questions about Riker’s intentions, the status of his cover, and the potential implications for the mission. Its resolution could alter the course of the entire operation.
    status_before_event: Concealed within the carrier wave of Riker’s transmission,
      undetected until Geordi’s analysis.
    status_after_event: Exposed and displayed on the monitor, now the focus of Data
      and Geordi’s decryption efforts.
    global_id: ger_object_02883ab61428
  - object_uuid: ger_object_30c567f727b7
    description_of_involvement: |2-

              The replay of Riker’s last transmission serves as the initial focus of Troi’s analysis, which reveals no hidden messages. However, it becomes the critical clue when Geordi’s sub-harmonic analysis uncovers the concealed cipher embedded in its carrier wave. This object transforms from a routine communication log into a pivotal piece of evidence, driving the crew’s shift from passive surveillance to active decryption.
    status_before_event: A standard video replay of Riker’s transmission, analyzed
      by Troi for hidden messages with no success.
    status_after_event: Identified as containing a hidden cipher, now the central
      focus of Data and Geordi’s decryption efforts.
    global_id: ger_object_30c567f727b7
  - object_uuid: ger_object_860a15ed817d
    description_of_involvement: |2-

              The aft science station console is where Geordi performs the sub-harmonic analysis that uncovers the hidden cipher. Data and Troi gather around the monitor to examine the okudagram, while Geordi initiates the search for a decryption key. This console becomes the epicenter of the crew’s investigative efforts, symbolizing their shift from passive monitoring to active problem-solving. Its screens display the cipher and the tools needed to decode it, driving the narrative forward.
    status_before_event: Displaying Riker’s transmission replay and standard sensor
