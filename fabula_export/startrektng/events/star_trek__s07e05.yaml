  global_id: null
  title: Geordi uncovers Riker’s hidden cipher
  description: "\n  On the *Enterprise* bridge, Data directs a series of sensor sweeps\
    \ to locate the mercenary ship while managing Worf’s growing impatience with his\
    \ cautious approach. Troi, analyzing Riker’s last transmission, finds no anomalies,\
    \ but Geordi’s sub-harmonic analysis reveals a concealed cipher embedded in the\
    \ carrier wave of Riker’s command codes. The discovery forces Data to reassess\
    \ the mission’s risks—suggesting Riker may have left a deliberate, covert message\
    \ despite his undercover constraints. The cipher’s existence raises urgent questions:\
    \ Is it a distress signal, a tactical directive, or evidence of Riker’s cover\
    \ being compromised? The breakthrough shifts the crew’s focus from passive surveillance\
    \ to active decryption, accelerating the need to act before the mercenaries reach\
    \ their destination.\n  "
