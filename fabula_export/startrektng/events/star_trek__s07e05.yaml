      \ interrogation, and its technical infrastructure (the scanner pad, com devices)\
      \ enables the critical discovery of the Terikon artifact. The cargo bay is a\
      \ pressure cooker, where every word, gesture, and beep of the scanner feels\
      \ amplified, and Picard’s gamble to delay the scan plays out against the backdrop\
      \ of Baran’s looming authority.\n      "
    observed_atmosphere: "\n        Tension-filled with whispered conversations and\
      \ the hum of machinery, the air thick with suspicion and the unspoken threat\
      \ of violence. The cargo bay feels like a battleground, where Picard’s cover\
      \ is the only shield against Tallera’s probing and Baran’s ultimate judgment.\n\
      \      "
    functional_role: "\n        A high-stakes interrogation chamber and archaeological\
      \ lab, where the mercenaries’ artifacts are analyzed and their fates are decided.\
