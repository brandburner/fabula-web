- fabula_uuid: cand_evt_scene_a9023bc7e4d423f8_01
  global_id: null
  title: Picard stages mutiny against Baran
  description: 'Picard seizes control of the mercenary ship by publicly accusing Baran
    of betrayal and physically assaulting him, exploiting the crew''s discontent with
    Baran''s leadership. He frames Riker''s attack on him as Baran''s orchestration,
    rallying Narik, Tallera, Vekor, and others to his side. Baran, isolated and desperate,
    counters by threatening Picard with a neural servo—a telepathic weapon capable
    of lethal force—but Picard exposes Baran''s strategic weakness: the crew''s necessity
    for his survival. The confrontation ends with Baran cornered, his authority crumbling,
    and Picard poised to consolidate power, reshaping the ship''s hierarchy and accelerating
    the mission''s urgency. The scene hinges on Picard''s calculated manipulation
    of the crew''s greed and Baran''s paranoia, while Tallera''s ambiguous loyalty
    foreshadows future conflict. The act closes with Baran''s failed attempt to regain
    control, setting up his eventual downfall in the next scene.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e05
  scene_sequence: 21
  sequence_in_scene: 37
  key_dialogue:
  - 'PICARD: Tell them what happened, Narik.'
  - 'NARIK: Riker turned on us... he tried to kill Galen before we beamed back.'
  - 'PICARD: He might have killed all of us. And I believe he was acting on the direct
    orders of Baran.'
  - 'PICARD: You betrayed us.'
  - 'BARAN: He''s plotted this all along... opposed me at every turn... endangered
    all of us with his stubborn refusal to follow orders.'
  - 'PICARD: A refusal to follow your orders... the orders of a small man trying to
    fill a role too big for him.'
  - 'PICARD: More promises of riches. More excuses for Baran to fill his own coffers
    while the rest of us go begging. I say it''s time for a change. Who''s with me?'
  - 'BARAN: Not quite. [pulls out neural servo] As long as I have this, I''m still
    in command.'
  - 'PICARD: You can''t kill us all... you need us to run the ship more than we need
    you to command it.'
  - 'BARAN: I don''t need to kill you all... just you, Galen. Somehow I think that
    watching you writhe in your death throes may change a few minds... and a few is
    all I need.'
