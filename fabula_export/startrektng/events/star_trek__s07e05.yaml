  key_dialogue: &id031
  - 'RIKER: Wait a minute... You were declared dead, remember? You can''t give orders
    around here.'
  - 'DATA: If we are to adhere to the exact letter of Starfleet regulations, then
    technically sir, you have been declared a renegade. In fact, I believe you are
    facing twelve counts of court martial offenses. You cannot give orders either.'
  - 'PICARD: Quite right. I''m going to get some sleep. In the meantime I suggest
    you escort Commander Riker to the brig.'
