  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: "\n        Starfleet’s involvement is **indirect but\
      \ critical**: the *Enterprise*’s detention of Koral and the second artifact\
      \ sets the entire raid in motion. Unaware of Riker and Picard’s undercover roles,\
