- fabula_uuid: act_7259d2d55dde1472
  number: 5
  summary: 'Following Baran''s death, Captain Picard assumes command of the mercenary
    ship. He immediately destroys the neural servo, signaling an end to Baran''s oppressive
    control, and sets a course for Vulcan to deliver the artifacts. Meanwhile, on
    the Enterprise, Commander Riker contacts Vulcan Security Minister Satok to warn
    him about the approaching mercenary ship and the supposed Vulcan operative, T''Paal.
    Satok''s puzzled reaction reveals a critical truth: Vulcan Security has no operative
    aboard the mercenary ship. This exposes Tallera''s deception to Riker. Picard,
    having grown suspicious of Tallera''s reactions earlier, orchestrates a confrontation
    on the mercenary bridge. He subtly reveals his knowledge of her true intentions,
    prompting Tallera to expose Picard as a Starfleet officer to the crew. Picard
    counters by revealing the artifacts are a dangerous weapon, not a payment, and
    that Tallera intends to use it herself. A compromise is reached: Vekor and Narik
    will accompany Tallera to the surface to ensure payment. In a dark Vulcan cavern,
    Tallera assembles the Stone of Gol, a psionic resonator, while Vekor and Narik
    discover their payment is incomplete. Tallera uses the weapon to kill Narik and
    Vekor when they demand full payment. Riker, Worf, and security materialize, having
    tracked Picard''s neural implant. Picard, realizing the weapon amplifies aggressive
    thoughts, orders his team to drop their weapons and clear their minds. Tallera
    attempts to use the resonator, but the Vulcans'' peace of mind renders it useless,
    defeating her. Satok takes Tallera into custody. Picard, Riker, and Data discuss
    the mission''s conclusion, with Picard humorously noting Riker and Data''s strict
    adherence to regulations.'
