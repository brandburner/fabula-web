  global_id: null
  title: Riker Volunteers for Enterprise Raid
  description: The mercenary crew receives a distressing transmission from Koral’s
    Klingon shuttle, revealing the *Enterprise* has detained him at the rendezvous
    coordinates—meaning Starfleet now possesses the second artifact. Baran, alarmed,
    proposes a high-risk boarding raid on the *Enterprise* to retrieve it, exploiting
    their lowered shields. Picard and Riker exchange tense glances, with Picard subtly
    accusing Riker of betrayal, while Riker defends himself by questioning the crew’s
    loyalty. Baran, recognizing Riker’s insider knowledge of the *Enterprise*, orders
    him to lead the raid. In a private moment, Baran escalates the stakes by secretly
    commanding Riker to assassinate Picard during the mission, using the neural servo
    device as leverage to ensure compliance. The scene heightens tension by forcing
    Riker to balance tactical necessity with the moral weight of killing his captain,
    while Picard remains unaware of the deadly order hanging over him. The raid proposal
    sets up a critical test of Riker’s loyalty and the mission’s survival, with Baran’s
    hidden directive creating a ticking clock for Picard’s life.
