- fabula_uuid: cand_evt_scene_a9023bc7e4d423f8_02
  global_id: null
  title: Picard’s mutiny and Baran’s neural servo threat
  description: 'Picard seizes the moment to overthrow Baran by publicly exposing his
    betrayal—first by physically assaulting him, then by rallying the crew with accusations
    of incompetence and greed. Narik corroborates Picard’s claim that Riker acted
    on Baran’s orders, turning the crew against their leader. Baran, cornered and
    outnumbered, retaliates by brandishing the neural servo—a telepathic weapon capable
    of lethal force—threatening to execute Picard to regain control. The standoff
    forces Picard to counter with a high-stakes psychological gambit: exposing Baran’s
    strategic vulnerability (the crew’s necessity for the weapon’s activation) while
    maintaining the illusion of his own desperation. The scene escalates from physical
    confrontation to a tense stalemate, where brute force collides with tactical necessity,
    setting up the next act’s deadly confrontation.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e05
  scene_sequence: 21
  sequence_in_scene: 38
  key_dialogue:
  - |-
    PICARD: Where is it?

    PICARD: Oh, I do have something else for you...

    ((Picard punches Baran))
  - |-
    PICARD: Tell them what happened, Narik.

    NARIK: Riker turned on us... he tried to kill Galen before we beamed back.

    PICARD: He might have killed all of us. And I believe he was acting on the direct orders of Baran.

    PICARD: You betrayed us.
  - |-
    BARAN: Not quite.

    BARAN: As long as I have this, I'm still in command.

    PICARD: You can't kill us all... you need us to run the ship more than we need you to command it.

    BARAN: I don't need to kill you all... just you, Galen. Somehow I think that watching you writhe in your death throes may change a few minds... and a few is all I need.
