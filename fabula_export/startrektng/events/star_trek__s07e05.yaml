      \ of Baran’s threat and the assassination order. The objects’ functional role\
      \ is tactical, but their narrative weight lies in what they represent: the **point\
      \ of no return** for the undercover officers.\n      "
    status_before_event: Stored in the ship’s armory, unused and inert.
    status_after_event: Assembled and distributed to the raiding party; now a tangible
      countdown to the mission’s execution.
    global_id: ger_object_61e899862bcc
  - object_uuid: ger_object_e2503fee2937
    description_of_involvement: "\n        Vekor’s console is the **nerve center**\
