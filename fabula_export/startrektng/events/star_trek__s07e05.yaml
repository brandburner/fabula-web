  title: Tallera probes Picard’s inconsistencies
  description: In the mercenary ship’s cargo bay, Picard examines newly acquired artifacts
    while Tallera enters unannounced, her suspicion of him already simmering. She
    immediately challenges his actions during the *Enterprise* attack—why he didn’t
    exploit the ship’s shield failure—and his ongoing friction with Riker, which she
    frames as self-sabotage. Picard deflects with sarcasm and evasion, maintaining
    his mercenary persona while subtly adjusting the scanner to mask his true expertise.
    Tallera’s interrogation escalates as she presses for answers, her tone shifting
    from probing to accusatory. When the scanner confirms a 98% Terikon match on a
    puzzle-like artifact, Picard seizes the moment to redirect her focus, but not
    before Tallera’s lingering skepticism threatens to unravel his cover. The exchange
    reveals Tallera’s growing distrust of Picard’s motives and her methodical approach
    to exposing inconsistencies, while Picard’s calculated defiance underscores the
    precariousness of his undercover mission. The discovery of the artifact becomes
    a temporary reprieve, but the tension between them remains unresolved, setting
    up future confrontations where Tallera’s scrutiny could expose Picard’s true identity.
