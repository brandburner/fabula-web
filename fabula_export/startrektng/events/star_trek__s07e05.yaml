  title: Enterprise detains Koral, forcing a raid
  description: 'The mercenary crew receives a transmission from Koral revealing his
    capture by the *Enterprise* at the rendezvous coordinates, shattering their operational
    security. Baran deduces the Federation now holds the second artifact, forcing
    an immediate decision: a high-risk boarding raid on the *Enterprise* to retrieve
    it. Picard and Riker’s undercover dynamic fractures as Picard openly questions
    Riker’s loyalty, while Baran—sensing an opportunity—orders Riker to lead the raid
    and secretly assassinate Picard. The scene escalates from tactical planning to
    personal betrayal, with Riker’s compliance becoming a matter of survival under
    Baran’s neural servo threat. The stakes rise exponentially: failure risks exposing
    Starfleet’s infiltration, while success demands Riker betray his captain or risk
    both their lives. The artifact’s loss and the raid’s necessity redefine the mission’s
    urgency, shifting focus from covert investigation to outright confrontation with
    the *Enterprise*’s crew—including Data, Troi, and Worf—who remain unaware of Riker
    and Picard’s true identities. The scene’s tension hinges on Riker’s internal conflict:
    his loyalty to Picard versus his need to maintain cover, all while Baran’s paranoia
    and Picard’s suspicion create a powder keg of distrust that could detonate the
    entire operation.'
