- fabula_uuid: cand_evt_scene_99b9873d31512784_01
  global_id: null
  title: Crusher and Worf board Koral’s shuttle
  description: "\n  In the mercenary ship’s shuttlebay, Dr. Beverly Crusher and Lieutenant\
    \ Worf approach Koral’s Klingon shuttle to conduct a health and safety inspection—a\
    \ bureaucratic maneuver authorized by Data to exploit a treaty loophole. Koral,\
    \ a towering and hostile Klingon, initially resists with silent contempt, his\
    \ physical presence alone intimidating Beverly. After a tense standoff, he begrudgingly\
    \ allows them entry, though his glare and body language signal deep disdain for\
    \ Starfleet’s interference. Beverly begins scanning the shuttle for hazards, her\
    \ professional demeanor masking the underlying tension. The confrontation subtly\
    \ exposes Koral’s hostility toward Starfleet while reinforcing the precarious\
    \ balance of power between the undercover crew and the mercenaries. The inspection\
    \ serves as a calculated risk: if Koral reports the incident, it could jeopardize\
    \ Picard and Riker’s cover, but if successful, it may disrupt Koral’s plans before\
    \ the telepathic weapon is reassembled.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e05
