acts:
- fabula_uuid: act_c090b79b00c6ccaa
  number: 1
  summary: 'On the Enterprise, Data, Troi, and Geordi intensify their efforts to decipher
    Commander Riker''s hidden message. Geordi''s sub-harmonic analysis of Riker''s
    command code transmission uncovers an intricate sequence of numbers and letters.
    Data rapidly deciphers this code, identifying it as navigational coordinates pointing
    to the Hyralan Sector, the mercenary ship''s next destination. This breakthrough
    allows the Enterprise to set a new course, initiating the next phase of their
    pursuit. Concurrently, on Baran''s vessel, the crew rushes repairs to the anti-matter
    containment unit, with Baran threatening Narik''s life to accelerate the process.
    Picard and Riker meticulously maintain their undercover identities, engaging in
    a staged, venomous argument that culminates in Riker striking Picard. This public
    display reinforces Riker''s perceived betrayal of Starfleet and Picard''s apparent
    insubordination, crucial for deceiving Baran. Tallera, however, watches their
    exchange with an increasingly thoughtful and suspicious expression. Baran, sensing
    an opportunity and trusting Riker''s apparent disloyalty, tasks Riker with a critical,
    treacherous mission: to feign friendship with Picard, identify any potential allies
    Picard might have among the crew, and ultimately, execute Picard once the final
    artifact is secured. Riker, committed to his deep cover, accepts this grim assignment,
    further entangling himself in Baran''s dangerous schemes.'
  key_moments: []
  scene_numbers:
