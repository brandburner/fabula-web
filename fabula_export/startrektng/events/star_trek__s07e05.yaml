- fabula_uuid: cand_evt_scene_4aecfb19d018e631_01
  global_id: null
  title: Tallera exposes Picard’s Starfleet cover
  description: "\n  Picard’s undercover mission collapses when Tallera, the mercenary\
    \ crew’s leader, intercepts encrypted Starfleet transmissions and publicly reveals\
    \ his identity to the crew. The confrontation unfolds on the bridge of the mercenary\
    \ ship as Picard attempts to delay the delivery of the telepathic weapon artifacts\
    \ by splitting them. Tallera, sensing his obstruction, exposes the transmissions\
    \ as proof of his deception, forcing Picard into a defensive position. He counters\
    \ by revealing the artifacts’ true nature as components of a dangerous weapon,\
    \ but Tallera pivots, proposing a compromise: she, Picard, and two mercenaries\
    \ will proceed to the planet’s surface, with Picard as a hostage. The crew’s distrust\
    \ of Picard escalates, directly threatening his and Riker’s mission to prevent\
    \ the weapon’s reassembly and the potential galactic conflict it could ignite.\
    \ The scene marks a critical turning point, shifting the power dynamic and forcing\
    \ Picard into a precarious position where his survival and mission success are\
    \ now intertwined with Tallera’s deception and the crew’s greed.\n  "
