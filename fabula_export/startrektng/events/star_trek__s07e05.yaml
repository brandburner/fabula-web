      \ and the legal consequences faced by Picard and Riker. The organization’s influence\
      \ is felt in Data’s literal interpretation of Starfleet’s rules, which turns\
      \ Picard’s joke into a technically valid order. Starfleet’s power dynamics are\
      \ on full display here, as the crew’s covert actions—necessary for the mission’s\
      \ success—now render them legally ambiguous, even renegades. The organization’s\
      \ goals in this event are twofold: to maintain institutional order and to hold\
      \ individuals accountable for their actions, even when those actions were undertaken\
      \ in service of a greater cause. Its influence mechanisms include regulatory\
      \ enforcement, chain of command, and the threat of court-martial, all of which\
      \ create the tension that fuels the scene’s dark humor.\n      "
