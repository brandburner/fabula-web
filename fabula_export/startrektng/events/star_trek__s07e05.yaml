- fabula_uuid: cand_evt_scene_f0c95b6ec79d8441_01
  global_id: null
  title: Riker Strikes Picard Undercover
  description: "\n  On the mercenary ship's bridge, Baran acknowledges Riker's role\
    \ in saving the crew during battle, but Riker's response is uncharacteristically\
    \ bitter and detached. Picard seizes the moment to verbally dismantle Riker, accusing\
    \ him of betrayal and cowardice—language that cuts deep given their shared Starfleet\
    \ history and Riker's undercover sacrifice. Riker, already emotionally frayed,\
    \ snaps and physically strikes Picard, a violent act that risks exposing their\
    \ true identities. Baran intervenes, sending Picard to the cargo hold to inspect\
    \ the artifacts, effectively diffusing the immediate conflict but leaving the\
    \ tension between the two officers unresolved. Tallera observes the exchange with\
    \ quiet scrutiny, her suspicion of the crew now heightened. The moment fractures\
    \ their fragile undercover alliance, escalates personal stakes, and introduces\
    \ a new layer of danger: if their cover is compromised, the entire mission—and\
    \ the fragile trust they’ve maintained—collapses.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e05
