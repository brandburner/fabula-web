  - object_uuid: ger_object_329d9209efcf
    description_of_involvement: "\n        Koral’s incoming transmission is the **spark\
      \ that ignites the raid**, delivering the devastating news that the *Enterprise*\
      \ has detained him and the second artifact. Vekor relays the message, and Baran’s\
      \ reaction—disturbed and calculating—sets the entire event in motion. The transmission’s\
      \ brevity and abrupt cutoff (Koral ‘stopped transmitting’) add to the urgency,\
      \ leaving the crew with no time to debate. Its content forces Baran to act decisively,\
      \ proposing the high-risk boarding plan and, in private, ordering Riker to assassinate\
      \ Picard. The transmission is both a **clue** (revealing the *Enterprise*’s\
      \ vulnerability) and a **threat** (exposing the mercenaries’ operation).\n \
      \     "
    status_before_event: "\n        Sent approximately fifteen minutes prior to the\
      \ event, originating from Koral’s Klingon shuttle at the rendezvous coordinates.\
      \ The message is incomplete, cut off mid-transmission, leaving critical details\
      \ unresolved.\n      "
    status_after_event: "\n        The transmission’s contents are now known to the\
      \ entire bridge crew, and its implications have been acted upon: the raid is\
      \ ordered, and Riker is given his deadly assignment. The message itself is no\
