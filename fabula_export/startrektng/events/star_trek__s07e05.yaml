- fabula_uuid: act_dc79cfe135b243d1
  number: 4
  summary: Picard, Riker, Narik, and two mercenaries materialize in the Enterprise
    shuttlebay, immediately stunning an Enterprise crewmember, Worf, and Dr. Crusher.
    Riker, feigning his allegiance to Baran, uses his knowledge of the ship to direct
    the boarding party. He quickly deduces Koral, the Klingon pilot, holds the second
    artifact and is in the Observation Lounge with Data and Troi. The raiding party
    beams directly to the lounge. There, Picard scans Koral, retrieves the second
    artifact, confirming its authenticity. Data confronts Riker, warning him of charges
    of piracy and treason. Riker, to maintain his deep cover and fulfill Baran's orders,
    turns his phaser on Picard. Picard, anticipating this, evades the shot and fires
    back, "killing" Riker. Troi, aware of the deception, confirms Riker's "death"
    to Picard. Picard and the mercenaries then dematerialize with the artifact. Back
    on the mercenary ship, Picard immediately confronts Baran, exposing his treachery
    to the crew. He reveals Riker's staged betrayal and accuses Baran of planning
    to keep the profits. Picard incites a mutiny, successfully rallying Tallera, Narik,
    Vekor, and other crew members against Baran. Cornered, Baran attempts to activate
    his neural servo to kill Picard. However, Picard, having anticipated this, reveals
    he switched their transponder codes earlier. Baran inadvertently activates the
    device on himself, collapsing dead.
