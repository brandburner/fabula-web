  title: Riker ordered to kill Picard
  description: 'After learning the Enterprise has detained Koral and the second artifact,
    Baran proposes a high-risk boarding raid to seize it. Riker volunteers to lead
    the operation, positioning himself to protect Picard while maintaining his cover.
    Baran, however, privately orders Riker to assassinate Picard during the raid—a
    direct test of Riker’s loyalty. The command forces Riker into a moral crisis:
    obey Baran to preserve his undercover mission or defy him to save Picard, risking
    exposure and the entire operation. Picard remains unaware of the deadly order,
    heightening the tension between duty and friendship. The scene escalates from
    tactical planning to a personal betrayal, with Riker’s internal conflict now tied
    to the mission’s success or failure. Baran’s threat of the neural servo device
    looms over Riker, ensuring compliance while underscoring the mercenaries’ ruthlessness.
    The moment marks a turning point, where Riker’s choices will determine whether
    the mission survives or collapses under the weight of his divided loyalties.'
