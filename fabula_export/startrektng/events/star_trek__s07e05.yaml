  title: Riker stuns allies to pursue Koral
  description: After Picard’s failed scan of the Koral’s shuttle confirms the artifact’s
    absence, Riker deduces the extremist must be with Data and Troi in the Observation
    Lounge. To prevent interference, he stuns Beverly and Worf—sacrificing trust and
    teamwork to maintain secrecy and advance the mission’s critical objective. The
    act forces Picard to comply with Riker’s ruthless efficiency, escalating the tension
    between their undercover roles and their moral boundaries. Riker’s decision to
    neutralize allies underscores the mission’s urgency, but at the cost of fracturing
    the crew’s cohesion and deepening the personal stakes of their deception. The
    moment also reveals Riker’s willingness to prioritize the mission over loyalty,
    a choice that will later strain his relationships with Beverly and Worf, while
    reinforcing Picard’s role as the reluctant tactician in this high-stakes infiltration.
