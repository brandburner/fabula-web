- fabula_uuid: cand_evt_scene_e0cdabd0e928e5bf_02
  global_id: null
  title: T'Paal reveals the Gol Stone conspiracy
  description: "\n  In a tense confrontation aboard the mercenary ship’s cargo hold,\
    \ Picard’s cover as 'Galen' is exposed when T'Paal (posing as Tallera) reveals\
    \ she intercepted his encrypted transmission to the *Enterprise*. After confirming\
    \ Picard’s Starfleet identity, T'Paal discloses her true role as a V’Shar agent\
    \ investigating a Vulcan extremist faction seeking to reassemble the Stone of\
    \ Gol—a psionic resonator capable of killing with telepathic energy. The weapon,\
    \ stolen from a Vulcan museum, is being hunted by isolationists who aim to purge\
    \ alien influences from Vulcan society. Picard, alarmed by the weapon’s destructive\
    \ potential, agrees to maintain their undercover operation to prevent its completion.\
    \ However, T'Paal delivers a chilling ultimatum: if the resonator nears assembly,\
    \ she will destroy the ship and everyone aboard to stop it. The exchange forces\
    \ Picard to confront the moral cost of their mission—balancing the need to preserve\
    \ the peace against the risk of interstellar conflict.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e05
  scene_sequence: 14
  sequence_in_scene: 25
  key_dialogue:
  - 'TALLERA: I will not play games with you. I found the message you sent to the
    Enterprise. When Riker used his command codes to drop their shields, you sent
    a transmission to them on the same carrier wave. You''re a Starfleet officer.'
  - 'PICARD: The Stone of Gol... ?'
  - 'TALLERA: The resonator was believed to have been destroyed during the Time of
    the Awakening. Only one piece was known to have survived and it was placed in
    a Vulcan museum under heavy guard. Six months ago, that piece was stolen from
    the museum. Soon after, mercenary ships began raiding archaeological sites across
    the quadrant. We believe that a member of the isolationist movement is trying
    to reassemble the resonator.'
  - 'TALLERA: My orders are to find that would-be assassin and stop him. [...] But
    Captain... I cannot allow the resonator to be assembled. If necessary, I will
    destroy this ship, its crew... all of us... to prevent that from happening.'
