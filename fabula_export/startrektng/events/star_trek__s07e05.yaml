      \ and Picard, Starfleet represents **loyalty and duty**, but in this moment,\
      \ it’s also the **source of the conflict**—their need to protect the *Enterprise*\
      \ clashes with their need to maintain cover. The organization’s **symbolic weight**\
      \ lies in its **idealism vs. pragmatism**: Starfleet’s rules make it predictable,\
      \ but its crew’s competence could foil the mercenaries’ plans.\n      "
    active_representation: Through the *Enterprise*’s actions (detaining Koral, holding
