  title: Wesley deciphers the sentry's behavior
  description: "\n  Wesley and Dirgo analyze the alien sentry's behavior after discovering\
    \ their phasers have been encrusted by selenium fibers. Wesley uses his tricorder\
    \ to detect the sentry's energy patterns, revealing its sensitivity to movement\
    \ and heat near the shielded spring. Dirgo, impatient with Wesley's scientific\
    \ approach, pressures him into a reckless plan to lure the sentry away using phasers.\
    \ Despite Wesley's objections, Dirgo forces the issue, exploiting Wesley's emotional\
    \ attachment to Picard's survival. The sentry splits in two—one part envelops\
    \ Dirgo's phaser, while the other cocoons Dirgo himself, leaving Wesley alone\
    \ and horrified. The event marks a turning point: Wesley's leadership is thrust\
    \ upon him as Dirgo's demise forces him to take decisive action to save Picard.\n\
    \  "
