- fabula_uuid: cand_evt_scene_58b47e5b8b6085e9_02
  global_id: null
  title: Dirgo forces Wesley into a deadly gambit
  description: "\n  After Wesley analyzes the sentry’s energy patterns and deduces\
    \ its defensive behavior—triggered by movement toward the water and responsive\
    \ to energy signatures—Dirgo, frustrated by the cautious scientific approach,\
    \ manipulates Wesley’s emotional attachment to Picard. He exploits Wesley’s fear\
    \ for Picard’s survival (wounded and dehydrated) by pressuring him into a high-risk\
    \ plan: using phasers to lure the sentry away from the spring. Despite Wesley’s\
    \ objections and lack of evidence supporting the strategy, Dirgo’s ruthless pragmatism\
    \ prevails. He forces Wesley to set a phaser on automatic fire while he attacks\
    \ the force field, hoping to distract the sentry. The plan backfires catastrophically:\
    \ the sentry splits into two, one enveloping Dirgo in a lethal cocoon while the\
    \ other neutralizes Wesley’s phaser. The failure leaves Wesley isolated, weaponless,\
    \ and forced to confront the sentry alone—marking a turning point where his leadership\
    \ is tested and Dirgo’s recklessness proves fatal. The event escalates tension\
    \ by stripping away the group’s dwindling resources and exposing the sentry’s\
    \ adaptive, lethal nature, while also deepening Wesley’s internal conflict between\
    \ duty and self-preservation.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e09
  scene_sequence: 18
  sequence_in_scene: 33
  key_dialogue: &id033
  - 'DIRGO: Look at that.'
  - 'WESLEY: How did this happen?'
  - 'DIRGO: That -- thing -- did it.'
  - 'DIRGO: What is this getting us? We''ve got to get to the water!'
  - 'WESLEY: If I could find a way to manipulate the frequency, I might be able to
    control it. The Sentry appeared when we started using phasers. Maybe it responds
    to heat... or collimated energy...'
  - 'DIRGO: If you''re right... we can use a phaser to lure it away.'
  - 'WESLEY: No, we can''t... we have to figure out our options before we -'
  - 'DIRGO: Then set your phaser on automatic and take cover.'
  - 'DIRGO: And while we''re doing that, your Captain is dying. With those wounds,
    most men would already be dead. If he doesn''t get water...'
  - 'DIRGO: When I start firing -- you better do your part.'
