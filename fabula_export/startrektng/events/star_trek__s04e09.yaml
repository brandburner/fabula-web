      sentry expands and contracts unpredictably. Despite the overwhelming crackling
      sound and the hot wind blowing his hair back, he stands his ground, resolute.
      When the sentry looms over him, he closes his eyes, bracing for annihilation—only
      to open them in amazement as the entity passes through him harmlessly. His relief
      is palpable as he secures the water, his movements swift and purposeful as he
      fills the medical pack and hurries back toward the tunnel.
