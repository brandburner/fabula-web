  object_involvements:
  - object_uuid: ger_object_df0da9301ac8
    description_of_involvement: 'The derelict radioactive waste vessel is the catalyst
      for the crisis, its unstable trajectory and leaking radiation creating a ticking
      time bomb. The tractor beam’s struggle to maintain a lock on the barge—exacerbated
      by shearing forces of 93 metric tons—symbolizes the fragility of the *Enterprise*’s
      efforts. The vessel’s wobbling motion in space visually reinforces the urgency,
      as its potential breakaway would doom the ship to lethal exposure. Riker’s fixation
      on it reflects the high stakes: its containment is not just a technical challenge
      but a matter of survival for the crew and the stranded Picard and Wesley.'
    status_before_event: Trapped in the *Enterprise*’s tractor beam, leaking radiation
      at escalating levels, structurally unstable due to shearing forces.
    status_after_event: Still secured by the tractor beam (for now), but the radiation
      leak continues to worsen, with lethal exposure imminent in 35 minutes.
    global_id: ger_object_df0da9301ac8
  - object_uuid: ger_object_184a9896ed19
    description_of_involvement: 'The *Enterprise*’s coolant system is the Achilles’
      heel of Geordi’s high-risk plan. Already under extreme pressure from the tractor
      beam’s thermal demands, the system teeters on the brink of failure. Geordi’s
      warning—‘we''re running at peak coolant pressure’—highlights the fragility of
      the ship’s infrastructure, making the overclocking of reactors a roll of the
      dice. The coolant system’s status is a metaphor for the crew’s predicament:
      one wrong move, and everything collapses.'
    status_before_event: Strained to peak pressure, with thermal limits nearing critical
      failure.
    status_after_event: Pushed beyond safe operating parameters by the overclocked
      reactors, now at imminent risk of catastrophic failure.
    global_id: ger_object_184a9896ed19
  - object_uuid: ger_object_9531bed03f8b
    description_of_involvement: 'The *Enterprise*’s fusion reactors are the high-risk
      solution to the tractor beam crisis. Geordi’s hesitation stems from the reactors’
      peak coolant pressure, which makes overclocking them a dangerous gamble. Riker’s
      order to bring additional reactors online is a last-ditch effort to stabilize
      the beam, but it threatens to push the ship’s systems beyond their limits. The
      reactors’ role here is dual-edged: they are both the crew’s best hope and a
      potential trigger for catastrophic failure, embodying the desperation of the
      moment.'
    status_before_event: Operating at peak coolant pressure, with thermal limits already
