      tricorder readings and the unknown energy signature, demonstrating his strategic
      mindset and unwavering leadership. Picard’s physical resilience and calm demeanor
      contrast sharply with Dirgo’s hidden struggle, reinforcing his role as the stabilizing
      force in the group.
