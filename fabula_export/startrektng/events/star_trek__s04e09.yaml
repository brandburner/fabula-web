    what_happened: "\n        Wesley is found propped against the cave wall, Picard’s\
      \ head resting in his lap, having just woken from exhaustion. His eyes are heavy\
      \ with fatigue, but his posture stiffens with alertness as the rescue team arrives.\
      \ He rushes to his mother, Beverly, with palpable relief, then insists he can\
      \ walk despite his obvious depletion. When Picard regains consciousness, Wesley\
      \ steps forward immediately, drawn by the captain’s weak but deliberate summons.\
      \ The moment Picard publicly acknowledges his life-saving efforts, Wesley’s\
      \ emotional state is a complex mix of pride, bittersweetness, and quiet resolve.\
      \ His silent nod to Picard’s farewell is a poignant acceptance of the transition\
      \ from protégé to peer, his hand lingering in Picard’s as the stretcher is carried\
      \ out.\n      "
