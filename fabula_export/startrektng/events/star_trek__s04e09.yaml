- fabula_uuid: cand_evt_scene_ea824a95878530f9_01
  global_id: null
  title: Riker chooses risky waste disposal
  description: 'With the *Enterprise* orbiting Gamelan Four and a derelict, radiation-spewing
    waste vessel trapped in the planet’s gravitational pull, Riker must act swiftly
    to avert a planetary crisis. After Data confirms the vessel’s unmanned status
    and Geordi warns of the extreme radiation risks, Riker proposes a high-stakes
    solution: pushing the vessel into the Gamelan sun using the *Enterprise*’s deflectors
    to clear a path through the unstable Meltasion Asteroid Belt. Geordi counters
    with a safer but untested alternative—sending a construction module to attach
    thrusters remotely—but Riker’s urgency prevails, prioritizing speed over caution.
    The tension escalates when Worf interrupts with news that Picard’s shuttle, carrying
    him and Wesley, has gone missing on its way to Pentarus Five. Beverly’s alarm
    and Riker’s frustration force a painful choice: delay the waste disposal to search
    for Picard or press forward to save Gamelan Four. Riker’s decision to prioritize
    the immediate planetary threat over the unknown fate of his captain underscores
    the moral weight of command and the crew’s divided loyalties. The scene crystallizes
    Riker’s leadership under pressure, the crew’s trust in his judgment, and the dual
    crises now threatening both the *Enterprise* and its missing personnel.'
