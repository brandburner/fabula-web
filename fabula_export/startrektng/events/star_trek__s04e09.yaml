      the scene’s emotional whiplash. Physically, they mark the transition from the
      lab (where he was working with the volatile compounds) to the bridge, where
      his personal and professional lives collide. Symbolically, they represent the
      threshold between Wesley’s scientific pursuits and his Starfleet duties, a tension
      that defines his character arc. The doors also underscore the urgency of the
      moment—Wesley’s burst through them is a visual cue of his flustered state, while
      their later use (when Picard sends Riker, Wesley, and Worf to escape the failing
      life support) reinforces their role as a liminal space between safety and danger.
    status_before_event: Closed, with Wesley approaching from the lab corridor, his
      tardiness about to be reprimanded.
    status_after_event: Open, having facilitated Wesley’s entrance and later serving
      as an escape route during the life support failure. Their functional role shifts
      from entry point to emergency exit.
