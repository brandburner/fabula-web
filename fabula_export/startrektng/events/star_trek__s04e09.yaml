    \ Starfleet’s urgency and the precariousness of their bond, as a distress call\
    \ from Gamelan Four interrupts their plans. Picard’s decision to send Wesley with\
    \ him, despite his inexperience, foreshadows the crash on Lambda Paz and the survival\
    \ test that will follow. The scene establishes Wesley’s unearned trust, Picard’s\
    \ mentorship, and the fragility of their mission—all while setting up the narrative\
    \ divergence between Riker’s radiation crisis and Picard/Wesley’s stranded ordeal.\n\
