  title: Shuttle crash after failed braking maneuver
  description: "\n  With the shuttle's hull temperature rising dangerously and the\
    \ planet looming closer, Picard takes manual control of the helm while Wesley\
    \ and Dirgo argue over technical solutions. Dirgo, defensive about his ship's\
    \ outdated systems, dismisses Wesley's expertise and physically shoulders him\
    \ aside to take over the deuterium flow reroute. Picard executes a braking maneuver,\
    \ but the shuttle's instability and Dirgo's reckless bypass attempt trigger a\
    \ catastrophic failure. Smoke fills the cabin as the craft lurches violently before\
    \ crashing into the moon's surface, plunging the crew into darkness. The crash\
    \ marks a turning point: the shuttle is now inoperable, resources are dwindling,\
    \ and the crew's fragile alliance fractures further under the weight of Dirgo's\
    \ incompetence and Wesley's forced leadership.\n  "
