    symbolic_significance: |2-

              Represents the **fragility of human control** in the face of technological failure and ego. The shuttle's collapse mirrors the breakdown of trust and authority among the crew, while its darkness symbolizes the **unknown future** they now face together.
    access_restrictions: |2-

              None during the event—all crew members are trapped within the shuttle's interior, their movement limited by the chaos and failing systems. Post-crash, the darkness and wreckage restrict access to controls and supplies.
