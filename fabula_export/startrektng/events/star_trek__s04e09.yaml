  title: Picard takes command during shuttle crisis
  description: "\n  With the mining shuttle spiraling out of control after a thruster\
    \ explosion, Picard immediately assumes command, overriding Dirgo’s failing leadership.\
    \ The crew faces a critical choice: either attempt a risky manual landing on a\
