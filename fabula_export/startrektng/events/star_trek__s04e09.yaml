  title: Riker orders waste ship thruster test
  description: "\n  With the *Enterprise* facing a radiation crisis and Picard and\
    \ Wesley stranded on a desolate moon, Riker must balance immediate survival with\
    \ the desperate plea from Gamelan Four’s miners for assistance. Worf relays the\
    \ miners’ limited resources and urgency, forcing Riker to weigh the lives of the\
    \ stranded crew against the planet’s looming catastrophe. Geordi confirms the\
    \ thrusters are attached and ready, giving Riker the critical window to act. His\
    \ decision to proceed with a controlled thruster test—gradual acceleration to\
    \ 40% power—is a calculated risk, designed to stabilize the waste vessel and buy\
    \ time for both the *Enterprise* and the rescue mission. The tension escalates\
    \ as the crew watches the viewer, awaiting the outcome of this high-stakes maneuver.\
    \ Riker’s leadership is tested as he prioritizes the greater good, knowing that\
    \ failure could doom both the *Enterprise* and the miners. The scene hinges on\
    \ split-second decision-making and the crew’s technical precision under pressure,\
    \ with every second counting in the race against radiation and time.\n  "
