  title: Picard asserts command over Dirgo’s defiance
  description: "\n  After salvaging supplies from the crashed shuttle, Picard and\
    \ Dirgo clash over survival strategy in the scorching desert of Lambda Paz. Picard\
    \ insists on a disciplined march toward the mountains to mark their path and seek\
    \ shelter, while Dirgo resists, asserting his authority as captain of the Nenebek.\
    \ Wesley intervenes, publicly aligning with Picard and reinforcing the chain of\
    \ command. Though Dirgo reluctantly complies, the confrontation exposes his instability\
    \ and the group’s fragile hierarchy. The tension escalates further when Wesley\
    \ detects an unknown energy signature emanating from the mountains, adding urgency\
    \ to their trek. Picard’s decisive leadership and Wesley’s growing confidence\
    \ contrast sharply with Dirgo’s defiance and hidden vulnerability, setting the\
    \ stage for future conflicts and revealing the precarious nature of their alliance.\
    \ The scene underscores the stakes of survival while deepening the power dynamics\
    \ between the three men.\n  "
