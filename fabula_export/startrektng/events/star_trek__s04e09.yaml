    description_of_involvement: 'The *construction module* becomes the crew’s chosen
      solution to the waste vessel crisis. Geordi proposes it as a safer alternative
      to direct towing, allowing the *Enterprise* to attach thrusters remotely and
      guide the vessel through the asteroid belt without risking crew contamination.
