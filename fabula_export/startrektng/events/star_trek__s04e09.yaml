  object_involvements:
  - object_uuid: ger_object_dd37444b013b
    description_of_involvement: "\n        The Enterprise Auxiliary Fusion Generators\
      \ are the crew’s last hope, their diverted power the only thing keeping the\
      \ tractor beam functional. Geordi’s rotation of their output is a calculated\
      \ risk—too little power, and the beam fails; too much, and the *Enterprise*’s\
      \ structural integrity could collapse under the strain. These generators are\
      \ the heart of the ship’s emergency systems, and their performance in this moment\
      \ will determine whether the crew lives or dies. The computer’s warning of lethal\
      \ radiation exposure underscores the urgency of their role, as every second\
      \ counts in the race to clear the asteroid belt.\n      "
    status_before_event: Operational and at standby, ready to divert power as needed
      for emergency maneuvers.
    status_after_event: Maximally strained, their output rotated to critical levels
      to sustain the tractor beam, with no margin for error.
    global_id: ger_object_dd37444b013b
  - object_uuid: ger_object_2d66ccc0d8a8
    description_of_involvement: "\n        The Enterprise Bridge Science Station is\
      \ the nerve center of the crisis, where Geordi’s fingers fly over the panel\
      \ to divert power from the auxiliary fusion generators and rotate reactor output.\
      \ This console is not just a tool but a lifeline—its readouts provide real-time\
      \ data on radiation levels, shearing forces, and tractor beam stability, which\
      \ Data and Riker use to make split-second decisions. The panel’s responsiveness\
      \ and Geordi’s expertise are the difference between success and catastrophe,\
      \ as he pushes the ship’s systems to their absolute limits. Without this station,\
      \ the crew would be flying blind in their desperate gamble.\n      "
    status_before_event: Functioning normally, displaying standard bridge operations
      data before the crisis escalates.
    status_after_event: Overloaded with critical diagnostics, its systems pushed to
      the brink as Geordi executes high-risk maneuvers to stabilize the tractor beam.
    global_id: ger_object_2d66ccc0d8a8
  - object_uuid: ger_object_9531bed03f8b
    description_of_involvement: "\n        The Enterprise Tractor Beam is the linchpin\
      \ of the crew’s survival, its stability hanging by a thread as Geordi and Data\
      \ battle to keep it locked onto the failing waste vessel. The beam is subjected\
      \ to 103 metric tons of shearing force, a stress test that could tear it apart\
      \ at any moment. Geordi’s decision to increase impulse power to full is a direct\
      \ attempt to compensate for this instability, a high-stakes gamble that could\
      \ either tow the vessel to safety or doom the *Enterprise* to radiation poisoning.\
      \ The tractor beam is more than a tool—it is the fragile thread connecting the\
      \ ship to its only hope of escape, and its fate is inextricably linked to the\
      \ crew’s.\n      "
    status_before_event: Strained but functional, maintaining a lock on the waste
      vessel as the *Enterprise* approaches the asteroid belt.
    status_after_event: Pushed to its absolute limits, the beam remains stable for
      now, but the shearing force and radiation exposure threaten to overwhelm it
      at any second.
    global_id: ger_object_9531bed03f8b
  - object_uuid: ger_object_e5aab23bc882
    description_of_involvement: "\n        The Aft Turbolift serves as Geordi’s rapid\
