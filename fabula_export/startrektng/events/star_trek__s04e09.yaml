      \ the *Enterprise*’s preparedness.\n      "
    status_after_event: "\n        Now bearing Picard and Wesley, being carried out\
      \ of the cave toward the shuttle for transport back to the *Enterprise*. Their\
      \ role in the event is complete, but they will continue to serve as a means\
      \ of medical evacuation.\n      "
    global_id: ger_object_4655542f19f1
  - object_uuid: ger_object_f62557452cbf
    description_of_involvement: "\n        Picard’s arrow, crafted from the Nenebek\
