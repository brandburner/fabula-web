  global_id: null
  title: Picard confronts Dirgo’s survival failure
  description: After the shuttle crash on Lambda Paz, Picard emerges from the wreckage
    and immediately begins assessing their dire situation. He directs Wesley to salvage
    medical supplies and rations while questioning Dirgo about the shuttle’s status.
    Dirgo reveals that all systems are offline, including communications and the transponder,
    leaving them stranded. When Picard presses for emergency supplies, Dirgo admits
    he prioritized his own survival over essentials like water, exposing his recklessness.
    The revelation forces Picard to confront the group’s dwindling resources and Dirgo’s
    unreliability, escalating the tension as the crew faces dehydration and an unknown
    alien threat. The confrontation underscores Picard’s leadership under pressure
    and the fragility of their survival, while also setting up a crisis of trust that
    will test Wesley’s emerging role as a leader.
