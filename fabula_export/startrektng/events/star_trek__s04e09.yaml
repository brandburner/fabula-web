      *Enterprise* and its crew. Its involvement in this event is both literal and
      symbolic—literally, it is the object being jettisoned toward the sun, its trajectory
      a physical manifestation of Riker’s order. Symbolically, it represents the crew’s
      willingness to sacrifice one threat to neutralize another, a moral compromise
      that underscores the brutal calculus of survival in space. The waste ship’s
      path toward the sun is a visual metaphor for the inevitability of destruction,
      a reminder that some threats cannot be contained and must be eliminated by any
      means necessary. Its release is not just an action; it is a statement of intent,
      a declaration that the crew will do whatever it takes to survive.
