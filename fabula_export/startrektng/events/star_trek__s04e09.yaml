      \ Wesley’s status** from ensign to **future officer**, but also **binds his\
      \ fate to Picard’s mentorship**. The message’s **timing**—interrupting the reprimand—creates\
      \ a **dramatic irony**: joy and duty collide in the same breath.\n      "
