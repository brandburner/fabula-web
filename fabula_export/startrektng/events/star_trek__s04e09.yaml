    For emergencies.'
  - 'PICARD: Alcohol. This won''t quench your thirst... it will only make it worse.'
  - 'DIRGO: I''ll take my chances... It''s mine!'
  - 'PICARD: Mister Crusher, stow this with the medical supplies and keep your eye
    on it.'
