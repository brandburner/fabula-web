  - object_uuid: ger_object_6ecdef60b2de
    description_of_involvement: 'The derelict waste vessel is the central crisis trigger,
      a hulking, unmanned sublight freighter trapped in Gamelan Four’s gravitational
      pull. Its gaseous-core fission reactor, though non-functional, emits lethal
      radiation levels that threaten the planet’s population. The vessel’s ominous
      presence on the viewscreen looms over the bridge, a silent but deadly countdown
      to catastrophe. Riker’s decision to push it into the Gamelan sun using the *Enterprise*’s
      deflectors hinges on its status as an immediate, existential threat—one that
      cannot be ignored or delayed. The vessel’s role as a ticking time bomb forces
