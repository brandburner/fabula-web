      its radiation leak posing an immediate and lethal threat to the ship and crew.
      It is stationary relative to the *Enterprise*, held in place by the beams as
      the countdown to exposure ticks away. The ship is a looming presence on the
      viewscreen, its fate—and the fate of the *Enterprise*—hanging in the balance.
