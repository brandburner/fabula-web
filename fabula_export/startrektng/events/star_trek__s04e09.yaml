      arbiter of the crew’s fate. Though unseen on-screen, its presence is omnipresent—felt
      in the computer’s countdown, the strain in Data’s voice, and the tension in
      Riker’s posture. The vessel is both a threat and a tool: its destruction in
      the asteroid belt was the mission, but now it has become a liability that must
      be cut loose to save the *Enterprise*. Its fate is symbolic of the crew’s dilemma—sacrifice
      one threat to avoid another, with no guarantee of success.'
