      \ from Admiral Nsomeka** is the **emotional catalyst** of the event, a **subspace\
      \ transmission** that **pivots the scene from reprimand to triumph**. Picard\
      \ delivers the news with **measured pride**: ‘She expects you to report in two\
      \ weeks,’ and Wesley’s **stunned reaction** (‘The Academy?’) transforms the\
