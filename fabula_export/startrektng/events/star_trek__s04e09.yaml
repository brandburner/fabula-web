  object_involvements:
  - object_uuid: ger_object_df0da9301ac8
    description_of_involvement: 'The *derelict vessel’s gaseous-core fission reactor*
      is the technical heart of the crisis, even though it is not directly interacted
      with in this scene. Data’s analysis of its non-functional state and the extreme
      radiation it emits frames the crew’s dilemma: *How do we neutralize a threat
      we cannot safely approach?* The reactor’s presence is implied in every discussion
      of the waste vessel, serving as the invisible force driving the crew’s urgency.
      Its role is to raise the stakes, forcing Riker to choose between immediate action
      (and risk) or a delayed, safer solution (and the moral cost of deferring Picard’s
      search). The reactor embodies the episode’s central tension: *Some threats cannot
      be ignored, no matter the personal cost.*'
    status_before_event: Non-functional but emitting lethal radiation, trapped in
      the vessel’s core. Its instability is the root cause of Gamelan Four’s crisis.
    status_after_event: Still non-functional but now targeted for disposal via the
      construction module. Its radiation remains a threat until the vessel is pushed
      into the Gamelan sun.
    global_id: ger_object_df0da9301ac8
  - object_uuid: ger_object_641ec1e80871
    description_of_involvement: 'The *Enterprise hailing frequency* is the primary
