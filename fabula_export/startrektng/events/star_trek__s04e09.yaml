- fabula_uuid: cand_evt_scene_a1637e4e1130c086_02
  global_id: null
  title: Nenebek departs with mounting tensions
  description: "\n  The scene opens in Shuttlebay Two, where Geordi La Forge has just\
    \ completed a safety inspection of Dirgo’s modified mining shuttle, the *Nenebek*.\
    \ Dirgo, a grizzled and self-assured pilot, dismisses Geordi’s concerns about\
    \ his unconventional thruster modifications with a smug confidence, signaling\
    \ his distrust of Starfleet protocols. When Picard and Wesley arrive, Dirgo immediately\
    \ asserts his authority as 'Captain,' a title Wesley quietly questions under his\
    \ breath—only for Dirgo to overhear and react defensively. Picard, sensing the\
    \ friction, defers operational control to Wesley, a subtle but deliberate move\
    \ that underscores the crew’s unease with Dirgo’s leadership.\n\n  The tension\
    \ escalates as Dirgo sizes up Picard and Wesley, his body language radiating skepticism.\
    \ His insistence on piloting the shuttle himself, despite Wesley’s obvious discomfort,\
    \ foreshadows the power struggles to come. The scene cuts to the *Enterprise*\
    \ bridge, where Riker acknowledges Wesley’s launch confirmation and orders a course\
    \ for the Gamelan system at warp six. The *Nenebek* departs, carrying Picard,\
    \ Wesley, and Dirgo toward Regalus—but the underlying distrust and Dirgo’s self-serving\
    \ nature already cast a shadow over the mission. This moment serves as both a\
    \ setup for the impending crash and a character study, revealing Dirgo’s inflexibility\
    \ and Wesley’s burgeoning leadership under pressure.\n  "
