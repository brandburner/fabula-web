  global_id: null
  title: Riker forces tractor beam power reduction
  description: "\n  With the Enterprise's tractor beam straining under the shearing\
    \ force of the radiation-leaking waste vessel, Data warns that the connection\
    \ is destabilizing and imminent failure threatens to lose the barge entirely.\
    \ Riker, faced with no viable alternatives, makes the agonizing call to reduce\
    \ power to the beam—sacrificing progress toward containment but buying time to\
    \ prevent structural collapse. Geordi La Forge, already stretched thin by thermal\
    \ limits and coolant pressure, is ordered to stabilize the beam by overloading\
    \ additional fusion reactors, a high-risk maneuver that could trigger coolant\
    \ failure. The Computer's warning of lethal radiation exposure in 35 minutes underscores\
    \ the crew's desperate stakes, forcing Riker into a gamble that pits immediate\
    \ survival against the long-term mission. The scene hinges on Riker's leadership\
    \ under pressure, where every decision carries existential weight for the ship\
    \ and crew.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e09
  scene_sequence: 17
  sequence_in_scene: 30
  key_dialogue:
  - 'DATA: "Tractor beam is holding... shearing force eighty metric tons per meter..."'
  - 'RIKER: "Reduce power."'
  - 'GEORDI: "I can''t divert any more power to the shields... we''re already hitting
    maximum thermal limits... Only other choice is to bring some other fusion reactors
    on line... but we''re running at peak coolant pressure..."'
  - 'RIKER: "Do it."'
  - 'COMPUTER VOICE: "Warning. Radiation levels at one hundred fifty millirads per
    minute and rising. Lethal exposure in thirty-five minutes."'
