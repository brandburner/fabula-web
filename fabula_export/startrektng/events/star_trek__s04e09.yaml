      \ with him reinforces the chain of command. Dirgo's defiance, however, challenges\
      \ Starfleet's authority, highlighting the tension between individualism and\
      \ institutional hierarchy. The group's reliance on salvaged phasers and tricorders\
      \ also underscores Starfleet's emphasis on resourcefulness and adaptability\
      \ in extreme conditions.\n      "
    active_representation: Through Picard and Wesley's adherence to Starfleet's chain
      of command, protocols, and values, as well as the use of Starfleet technology
      (tricorder, phasers).
    power_dynamics: Exercising authority over individuals (Picard and Wesley uphold
      Starfleet's hierarchy), but being challenged by external forces (Dirgo's defiance
      and the harsh environment).
    organizational_goals:
    - Maintain discipline and cohesion among the group to ensure survival.
    - Uphold Starfleet's values of leadership, resourcefulness, and adaptability in
      extreme conditions.
    influence_mechanisms:
    - Through Picard's authoritative leadership and Wesley's loyalty to the chain
      of command.
