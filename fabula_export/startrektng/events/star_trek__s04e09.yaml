- fabula_uuid: cand_evt_scene_d2fdc92d05c59f0c_01
  global_id: null
  title: Dirgo awakens the lethal sentry
  description: "\n  In the cavern’s vast, sunlit expanse, the group stumbles upon\
    \ a fountain—its water their only hope for survival. Dirgo, desperate and impulsive,\
    \ ignores Picard’s caution and fires his phaser at the protective force field.\
    \ The reckless act triggers a violent reaction: a crackling energy sentry materializes,\
    \ its electrical fury destabilizing the cavern’s structure. As rocks begin to\
    \ fall, Picard sacrifices himself to shield Wesley, taking a brutal blow to the\
    \ head. The sentry vanishes, but the damage is done—Picard lies unconscious, gravely\
    \ injured, while Dirgo stands frozen in shock. Wesley, now forced into leadership,\
    \ snaps Dirgo out of his paralysis, demanding help to free the Captain. The moment\
    \ fractures the group’s fragile trust, escalating their peril and forcing Wesley\
    \ to step into a role he’s unprepared for. The event marks a turning point: survival\
    \ is no longer just about the environment, but about the fractured dynamics between\
    \ them.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e09
  scene_sequence: 13
  sequence_in_scene: 23
  key_dialogue: &id021
  - 'DIRGO: I knew there had to be water!'
  - 'PICARD: Mister Crusher... what was that?'
  - 'WESLEY: It seems to be some kind of tightly confined annular force field...'
  - 'DIRGO: We can with our phasers.'
  - 'PICARD: I think it might be wiser if...'
  - 'WESLEY: The E-M pattern again—the power level''s really spiking now...'
  - 'DIRGO: Look... I think it''s working!'
  - 'PICARD: Stop firing!'
  - 'WESLEY: Help me!'
  - 'WESLEY: Dirgo—move!'
