  title: Distress call forces mission split
  description: "\n  The Enterprise bridge hums with routine activity when Wesley Crusher\
    \ bursts in late, flustered from an experiment, only to be sharply reprimanded\
    \ by Picard—until the captain reveals Wesley’s acceptance to Starfleet Academy.\
    \ The moment of triumph is abruptly cut short when Worf detects a distress signal\
    \ from Gamelan Four. Chairman Songi’s desperate plea reveals an unidentified spacecraft\
    \ emitting lethal radiation, threatening the planet. Picard immediately splits\
    \ the crew’s resources: Riker and the Enterprise will investigate the radiation\
    \ crisis, while Picard and Wesley proceed to Pentarus Five as planned. The decision\
    \ forces a narrative divergence—Picard’s diplomatic mission becomes secondary\
    \ to the crew’s survival, while Riker’s leadership is tested against an escalating\
    \ environmental threat. The split underscores the fragility of the Federation’s\
    \ unified front and sets both storylines on collision courses with danger. Subtextually,\
    \ Picard’s trust in Wesley is tested early, while Riker’s competence is thrust\
    \ into the spotlight without preparation. The event’s tension lies in its abrupt\
    \ pivot from personal triumph to existential crisis, mirroring the crew’s own\
    \ transition from routine to chaos.\n  "
