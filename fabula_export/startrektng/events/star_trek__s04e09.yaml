  - object_uuid: ger_object_9531bed03f8b
    description_of_involvement: The *Enterprise*’s tractor beam is the linchpin of
      this high-stakes gambit. Geordi La Forge increases its power to half-impulse,
      pushing it beyond its designated safety limits to tow Picard and Wesley’s shuttle
      through the asteroid belt at dangerous speeds. The beam’s structural shearing
      effect is closely monitored by Data and Geordi, as any failure could rip the
      ship apart. Its role is both a lifeline and a ticking time bomb—success means
      rescue, but failure means catastrophic structural collapse. The hum of the beam’s
      strain fills the bridge, a physical manifestation of the crew’s desperation.
    status_before_event: Operating at 100% of its designated towing capacity, with
      minimal shearing effects but insufficient speed to outpace the radiation crisis.
    status_after_event: Operating at 150% capacity (half-impulse), with severe shearing
      effects and unknown stability. The beam is now a critical weak point in the
      ship’s structure, requiring constant monitoring.
