      on the viewscreen, grounding the abstract threat of the waste vessel in human
      stakes. The frequency’s role is twofold: it delivers critical information (the
      rising radiation levels) and humanizes the crisis, reminding the crew that their
      decisions have real consequences for Gamelan Four’s population. Its use is brief
      but pivotal, serving as the bridge between the *Enterprise*’s technical problem-solving
      and the moral weight of their choices.'
    status_before_event: Open and active, allowing real-time communication with Gamelan
      Four. No interference or technical issues are noted.
    status_after_event: Closed after Songi’s transmission ends, but the frequency
      remains available for further updates or emergencies. The crew’s focus shifts
      back to internal debate and action.
    global_id: ger_object_641ec1e80871
  - object_uuid: ger_object_6ecdef60b2de
    description_of_involvement: 'The *derelict radioactive waste vessel* is the immediate,
      life-threatening focus of this event. Its dark, ominous presence on the viewscreen
      dominates the crew’s attention as Data confirms its unmanned status and Geordi
      warns of its lethal radiation levels. The vessel’s gaseous-core fission reactor,
      though non-functional, emits dangerous radiation that threatens Gamelan Four,
      forcing Riker to prioritize its neutralization. The crew’s debate over how to
      handle it—towing it directly (risky) vs. using the construction module (safer)—highlights
      the stakes: *How do we dispose of this threat without dooming ourselves?* The
      vessel’s role is both a technical puzzle and a moral test, embodying the episode’s
      central conflict between duty and personal stakes.'
    status_before_event: Trapped in Gamelan Four’s gravitational pull, drifting helplessly
      with a non-functional propulsion system. Emitting extreme radiation, posing
      an existential threat to the planet below.
    status_after_event: 'Still adrift but now the target of the crew’s solution: the
      construction module will attach thrusters to it, allowing the *Enterprise* to
      guide it safely into the Gamelan sun. Its status remains critical, but the crew
      has a plan to neutralize it.'
    global_id: ger_object_6ecdef60b2de
  - object_uuid: ger_object_ddc495805ab7
    description_of_involvement: 'The *Pentarus Five Miners’ Shuttlecraft* is the catalyst
