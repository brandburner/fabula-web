  sequence_in_scene: 44
  key_dialogue: &id045
  - 'DATA: There is an intense magnetic field, Commander. I am getting an anomalous
    reading... but it is not strong enough to interpret accurately.'
  - 'GEORDI: I can narrow the frequency range on the sensor array... and try to enhance
    the signal... Any better, Data?'
  - 'DATA: Yes. The reflection signature now clearly indicates that it is metal...
    duranium. The probability is quite high that it is the shuttlecraft.'
  - 'RIKER: Any life signs?'
  - 'DATA: It is impossible to determine. The magnetic flux would mask any bio-energy
    emanations.'
  - 'RIKER: Mister Worf, will that interference affect the Transporter Beam?'
  - 'WORF: Yes, Commander. An Away Team would have to take a shuttlecraft.'
  - 'RIKER: Assemble your team, Mister Data.'
  - 'BEVERLY: I''m going with you.'
