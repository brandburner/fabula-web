- fabula_uuid: act_a49d753d029089ce
  number: 4
  summary: Act Four brings resolution to the Enterprise's perilous mission and deepens
    Wesley's emotional journey. On the Enterprise, Riker makes a final, desperate
    push, ordering full impulse speed and diverting power from auxiliary fusion generators
    to stabilize the tractor beam. The ship races towards the asteroid belt, with
    the computer counting down to lethal radiation exposure. With mere seconds to
    spare, the Enterprise clears the asteroids, and Riker orders the release of the
    waste vessel, which hurtles into the sun, neutralizing the threat. The Red Alert
    is cancelled, and a palpable wave of relief washes over the Bridge. Riker, immediately
    prioritizing Picard's fate, orders a course set to search for the missing captain.
    Back on Lambda Paz, Wesley tends to the unconscious Picard, using a phaser to
    generate warmth against the frigid night. He reveals Dirgo's death to a listless
    Picard, grappling with his own guilt and responsibility. Seeking to keep Picard
    conscious and motivated, Wesley begins to speak from the heart, recalling their
    shared past and expressing his profound admiration for Picard. In a deeply personal
    confession, Wesley reveals that much of his ambition and hard work, including
    his pursuit of Starfleet Academy, has been driven by a desire to make Picard proud.
    This emotional outpouring re-energizes Wesley's resolve. He grips Picard's hand,
    promising to secure water and keep him alive until rescue arrives, drawing strength
    from their shared bond. Picard, though weak, acknowledges Wesley's resilience
    and determination. This act marks the successful completion of one major storyline,
    freeing the Enterprise to pursue the other, while Wesley's character arc reaches
    a significant emotional peak, solidifying his commitment and purpose.
