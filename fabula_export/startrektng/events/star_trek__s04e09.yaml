    institutional_impact: The Academy’s involvement in this event underscores its
      role as a pillar of Starfleet, where mentorship and tradition are critical to
      the development of future leaders. Picard’s reference to Boothby serves as a
      reminder of the institution’s enduring impact, even in the face of mortality.
