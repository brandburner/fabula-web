  global_id: null
  title: Riker navigates radiation crisis with decisive command
  description: With the *Enterprise* locked onto a rapidly deteriorating waste vessel
    emitting lethal radiation, Riker takes immediate command of the crisis. He orders
    a risky course through the asteroid belt to minimize exposure, prioritizing the
    ship’s survival over the delayed search for Picard and Wesley. The bridge crew
    scrambles to execute his directives—Allenby sets the new course, Data begins calculating
    radiation impact on the crew, and Worf relays a postponement to the mining settlement.
    Riker’s split-second decisions reflect his leadership under pressure, but the
    tension escalates as the computer’s warning confirms the radiation levels are
    rising. His call to summon Dr. Crusher to the bridge underscores the severity
    of the situation, forcing the crew to confront the possibility of catastrophic
    consequences if the crisis isn’t contained. The scene hinges on Riker’s ability
    to balance tactical necessity with moral responsibility, as his actions delay
    the rescue effort while ensuring the *Enterprise*’s survival.
