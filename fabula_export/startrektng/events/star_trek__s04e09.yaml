  - object_uuid: ger_object_0feff6f3f130
    description_of_involvement: The Nenebek, Dirgo’s modified mining shuttle, is the
      primary setting for the crisis, its ragged exterior and unconventional thruster
      modifications now proving fatally flawed. The shuttle’s systems—communication,
      navigation, and propulsion—fail catastrophically, forcing the crew to rely on
      manual controls and desperate improvisation. Its instability and failing impulse
      engine drive the urgency of the scene, as the crew scrambles to plot a course
      to Lambda Paz before total system failure.
