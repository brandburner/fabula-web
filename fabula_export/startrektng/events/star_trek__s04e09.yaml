      the verge of failure. The shuttle is now a barely controllable vessel hurtling
      toward Lambda Paz.
    global_id: ger_object_0feff6f3f130
  - object_uuid: ger_object_02ee03117cbb
    description_of_involvement: The port thruster quad is the critical failure point
      that triggers the crisis, its explosion severing stability and navigation controls.
      Dirgo identifies its destruction as the root cause of the shuttle’s spiral,
