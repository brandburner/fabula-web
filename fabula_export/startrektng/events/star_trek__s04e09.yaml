  title: Riker risks ship to rescue Picard
  description: "\n  With the *Enterprise*’s radiation shield failing in 38 minutes,\
    \ Riker and Data confirm the crew must evacuate non-essential areas while Beverly\
    \ Crusher implements emergency protocols. Riker learns traversing the asteroid\
    \ belt will take 51 minutes—longer than the shield’s remaining lifespan—leaving\
    \ no time for a safe rescue of Picard and Wesley. Beverly warns of inevitable\
    \ casualties if they proceed, but Riker orders Geordi to push the tractor beam\
    \ beyond safe limits, risking structural damage to the ship. The decision forces\
    \ a brutal calculus: save the shuttle at the cost of the *Enterprise*’s integrity,\
    \ or abandon Picard and Wesley to the moon’s surface. The tension escalates as\
    \ Geordi prepares to execute the dangerous maneuver, with Data monitoring the\
    \ shearing effect on the beam. This moment crystallizes the crisis: Riker’s leadership\
    \ is tested as he prioritizes the lives of two over the potential loss of the\
    \ ship and crew.\n  "
