  global_id: null
  title: Riker orders reactor overload to stabilize tractor beam
  description: With the *Enterprise* struggling to maintain a tractor beam lock on
    a radiation-leaking waste vessel, Data warns that the shearing force is destabilizing
    the connection, threatening to lose the barge entirely. Riker, faced with no viable
    alternatives, orders Geordi to stabilize the beam by overloading additional fusion
    reactors—a high-risk maneuver that could trigger coolant failure. The tension
    escalates as the computer announces lethal radiation exposure in 35 minutes, forcing
    Riker into a desperate gamble to save the ship while Picard and Wesley remain
    stranded on the moon below. Geordi’s hesitation underscores the danger of the
    plan, but Riker’s decisive command reflects his willingness to take extreme measures
    to protect the crew and the mission. The scene hinges on the countdown to catastrophe,
    amplifying the stakes as the crew races against time to neutralize the threat
    before it’s too late.
