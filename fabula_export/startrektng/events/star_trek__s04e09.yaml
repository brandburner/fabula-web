  global_id: null
  title: Picard’s Final Mentorship Before the Trial
  description: 'In a dimly lit cave on a desolate moon, Picard—weakened by fever and
    injury—awakens to find Wesley frantically modifying a tricorder to disrupt the
    alien sentry blocking their only water source. As Wesley avoids acknowledging
    Picard’s deteriorating condition, Picard seizes the moment to deliver a poignant,
    urgent mentorship, urging Wesley to seek out Boothby, the enigmatic groundskeeper
    at Starfleet Academy, as a guide for his future. The exchange is charged with
    emotional weight: Picard’s voice cracks with pride as he expresses his faith in
    Wesley’s potential, while Wesley struggles with the finality of Picard’s words.
    The moment crystallizes Picard’s legacy as a mentor and underscores the gravity
    of Wesley’s impending trial against the sentry. Picard’s blessing—‘I was proud
    of you’—serves as both a farewell and a call to action, reinforcing their bond
    and the stakes of Wesley’s survival. The scene pivots from technical problem-solving
    to raw emotional truth, leaving Wesley with a mission beyond the cave: to honor
    Picard’s guidance and prove himself worthy of it.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e09
  scene_sequence: 24
  sequence_in_scene: 40
  key_dialogue: &id037
  - 'PICARD: Ensign... where are we?'
  - 'WESLEY: We crashed, sir... we''re in a cave...'
  - 'PICARD: Wesley... I may not make it...'
  - 'WESLEY: I''m going to get to the water... I took the transponder element from
    my communicator... used it to modify the tricorder... I think I can use it to
    interrupt the sentry''s energy pattern... stop it. Or at least slow it down...'
  - 'PICARD: Listen to me... So much I''ve wanted to tell you. At the Academy, there
    is someone... who meant a great deal to me... he has been there forever... you
    must get to know him... his name is Boothby... tell him we were friends...'
  - 'PICARD: He''s the groundskeeper. One of the wisest men I ever knew... I envy
    you, Wesley... it is just the beginning of the adventure for you.'
  - 'PICARD: Always remember... I was... proud of you...'
