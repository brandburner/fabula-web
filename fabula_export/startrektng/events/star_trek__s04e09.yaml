      over the tricorder and communicator, his fingers moving with desperate precision
      as he modifies the devices to disrupt the alien sentry. He avoids direct eye
      contact with Picard, his body language tense and evasive, as if shielding himself
      from the weight of Picard’s deteriorating condition. When Picard speaks, Wesley’s
      responses are rapid, almost frantic, as he clings to the technical problem at
      hand, using it as a distraction from the emotional reality unfolding. His voice
      wavers slightly as he explains his plan, betraying his anxiety, but he steels
      himself as Picard delivers his final mentorship, nodding in acknowledgment before
      turning to leave the cave.
