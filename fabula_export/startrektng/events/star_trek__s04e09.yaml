- fabula_uuid: act_483ca5d5fd175968
  number: 3
  summary: 'Act Three focuses on Wesley''s desperate struggle for survival and leadership
    on Lambda Paz, paralleled by the Enterprise''s escalating crisis. Wesley frantically
    administers first aid to a severely injured and fading Picard, who suffers from
    a broken leg, fractured arm, and a head wound. Dirgo, pessimistic and self-serving,
    insists Picard is beyond help and abandons them, further isolating Wesley. In
    a poignant moment of lucidity, Picard imparts crucial advice to Wesley, urging
    him to take command and stand up to Dirgo, acknowledging his own failing condition.
    He also shares a personal anecdote about Boothby, a groundskeeper at Starfleet
    Academy, as a mentor figure, subtly passing the torch of wisdom. Picard then slips
    back into unconsciousness, leaving Wesley entirely alone with the immense responsibility.
    Meanwhile, on the Enterprise, the situation rapidly deteriorates as radiation
    levels reach critical, lethal thresholds. Data projects the crew has only 38 minutes
    before lethal exposure, while navigating the asteroid belt will take 51 minutes.
    Riker, facing an impossible choice, pushes the Enterprise''s tractor beam to its
    absolute limit, attempting to accelerate through the belt. The beam destabilizes,
    forcing him to reduce power, leaving the crew with a mere 35 minutes until lethal
    exposure. Back in the cavern, Wesley, driven by desperation and scientific curiosity,
    meticulously studies the sentry''s energy patterns, realizing it functions as
    a guardian. Dirgo returns, impatient and reckless, proposing a dangerous plan
    to lure the sentry away with phaser fire. Despite Wesley''s objections, Dirgo
    forces his hand. The plan catastrophically backfires: the sentry splits, one part
    destroying Wesley''s phaser, the other enveloping and killing Dirgo in a horrifying,
    fibrous cocoon. Wesley is left utterly alone, staring in shock at Dirgo''s fate,
    the weight of survival now solely on his young shoulders.'
