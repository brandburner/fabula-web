- fabula_uuid: act_a4b3be5873f96598
  number: 2
  summary: Act Two deepens the struggle for survival on Lambda Paz and intensifies
    the Enterprise's race against time. Inside a cave, Picard confronts Dirgo about
    his hidden bottle of dresci, revealing it to be alcohol, not water. Picard, asserting
    his authority, confiscates it for medicinal use, further highlighting Dirgo's
    selfishness and creating palpable friction within the group. As they explore deeper,
    Wesley's tricorder readings indicate a change in the mysterious energy pattern.
    Concurrently, on the Enterprise, Beverly Crusher and Deanna Troi express growing
    concern for Picard's missing shuttle, while Riker's plan to attach thrusters to
    the waste vessel fails when the barge's structural integrity is compromised, causing
    it to disintegrate. Faced with mounting radiation and the failure of his initial
    strategy, Riker makes the desperate decision to directly tow the highly radioactive
    waste vessel through the treacherous Meltasion Asteroid Belt, a move that places
    the entire Enterprise crew at severe risk. Radiation levels on the ship begin
    to rise alarmingly. Back on Lambda Paz, the trio discovers a subterranean cavern
    containing a fountain—a vital water source. However, the fountain is protected
    by a powerful force field. Dirgo, impatient and reckless, ignores Picard's caution
    and fires his phaser at the force field, inadvertently provoking a dangerous energy
    sentry. The sentry retaliates violently. In a selfless act, Picard shoves Wesley
    out of the path of falling rocks, taking the full brunt of the assault himself.
    Picard collapses, severely injured and unconscious, leaving Wesley and a stunned
    Dirgo to face the immediate aftermath and the daunting task of survival without
    their captain's direct leadership. This act marks a critical turning point, as
    both the Enterprise and the stranded trio face escalating, life-threatening dangers,
    with Picard's incapacitation forcing Wesley into an unexpected leadership role.
