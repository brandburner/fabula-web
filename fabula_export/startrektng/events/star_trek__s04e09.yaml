  title: Riker orders emergency detachment
  description: 'The *Enterprise* races at full impulse toward the asteroid belt while
    towing the contaminated waste vessel, its tractor beam barely holding. Data confirms
    the beam’s stability, but the computer’s escalating radiation warnings—now counting
    down to lethal exposure in seconds—force Riker into a critical decision. Worf’s
    announcement of their proximity to the asteroid field triggers Riker’s order to
    detach the vessel immediately, a high-stakes gamble to prevent catastrophic crew
    exposure. The tension hinges on the crew’s ability to act before the countdown
    reaches zero, mirroring Picard and Wesley’s parallel struggle on the moon. The
    scene underscores Riker’s command under pressure, the ship’s vulnerability, and
    the interconnected stakes of both crises: the *Enterprise*’s survival and the
    rescue mission’s success are now inextricably linked.'
