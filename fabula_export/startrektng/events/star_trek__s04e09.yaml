  global_id: null
  title: Shuttle systems fail mid-crisis
  description: With the mining shuttle in violent disarray after a thruster explosion,
    Picard immediately takes command from the disoriented Dirgo, whose incompetence
    and panic become glaringly apparent. Wesley confirms the port thruster module
    is destroyed, severing communications with the *Enterprise* and Pentarus Station,
    while Dirgo’s frantic attempts to hail help fail. Picard’s rapid assessment reveals
    the navigational system is offline, forcing a manual course correction. Wesley
    scans for a habitable environment and identifies a barely class-M moon—Lambda
    Paz—despite its extreme temperatures and magnetic interference. The shuttle’s
    instability worsens as Dirgo struggles to maintain control, threatening to lose
    the main impulse engine. Picard’s decisive leadership contrasts sharply with Dirgo’s
    flustered reactions, setting up a power shift and the crew’s desperate need for
    a landing site. The scene escalates from mechanical failure to existential peril,
    with time running out as the shuttle hurtles toward an uncertain landing on an
    uncharted moon.
