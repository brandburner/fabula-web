    what_happened: 'Riker stands at the center of the bridge, his body language a
      study in controlled tension. His initial focus is on the waste vessel, his orders
      sharp and decisive—‘We’re going to give that barge a push into the Gamelan sun’—but
      when Worf interrupts with news of Picard’s shuttle, his frustration is visible.
      A muscle twitches in his jaw as he glances at the viewscreen, then back at the
      crew. His voice tightens when he defers the search: ‘Tell them we have an emergency
      situation here... we’ll start a search after we’ve dealt with it.’ The words
      are firm, but the subtext is heavy: *This is killing me.* He immediately pivots
      to action, ordering Geordi to launch the construction module, as if movement
      can outpace the guilt gnawing at him.'
