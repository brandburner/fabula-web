acts:
- fabula_uuid: act_d78c1318c72b3661
  number: 1
  summary: The narrative opens with Captain Picard preparing for a diplomatic mission
    to Pentarus Five, a task he anticipates will be contentious. Simultaneously, Ensign
    Wesley Crusher receives the life-changing news of his acceptance into Starfleet
    Academy, a moment of profound joy and validation. Picard, recognizing Wesley's
    potential and wishing to share a final mission, assigns him to accompany him to
    Pentarus Five. This personal moment is abruptly interrupted by a dire distress
    call from Gamelan Four, reporting a mysterious, radiation-emitting spacecraft
    threatening their peaceful planet. Displaying his characteristic leadership, Picard
    dispatches Commander Riker and the Enterprise to investigate the Gamelan crisis,
    while he and Wesley board Captain Dirgo's shuttle, the *Nenebek*, to continue
    their original mission. The initial optimism quickly dissolves as the *Nenebek*
    experiences a catastrophic malfunction, shaking violently and losing critical
    systems, leaving Picard and Wesley in immediate peril. This sequence establishes
    the dual narrative tracks and introduces the central conflict for both Picard
    and Wesley, setting the stage for their individual challenges and the overarching
    themes of leadership and survival as the shuttle crashes on the desolate moon,
    Lambda Paz. Dirgo's revelation of no water, only alcohol, escalates the survival
    crisis, while Riker's mission on the Enterprise reveals an ancient waste vessel,
    forcing him to prioritize the widespread threat over searching for Picard. As
    the stranded trio treks across the desert, Wesley detects a mysterious energy
    reading from the mountains, introducing an unknown danger.
