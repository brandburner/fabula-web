    description_of_involvement: Starfleet Academy is invoked by Picard as the institution
      that will shape Wesley’s future, its values and traditions embodied by Boothby,
      the groundskeeper. Though not physically present, Starfleet Academy looms as
      a symbol of continuity, mentorship, and the cyclical nature of leadership within
      Starfleet. Picard’s reference to Boothby as a figure who has ‘been there forever’
      underscores the institution’s enduring legacy and the role it plays in nurturing
      future generations. The mention of the Academy serves as a bridge between Picard’s
      past and Wesley’s future, reinforcing the idea that Starfleet’s values are passed
      down through personal connections and institutional traditions.
    active_representation: Through the invocation of Boothby as a mentor and the mention
      of Starfleet’s traditions, the Academy is represented as an enduring institution
      that shapes the lives of its cadets.
    power_dynamics: Exercising a subtle but profound influence over Wesley’s future,
      as Picard urges him to seek out Boothby’s guidance; the Academy’s power lies
      in its ability to mold individuals through mentorship and tradition.
    organizational_goals:
    - To ensure the continuity of Starfleet’s values and traditions through the mentorship
      of future generations, as embodied by Boothby’s role.
    - To reinforce the idea that leadership and wisdom are passed down through personal
      connections, creating a sense of institutional legacy.
    influence_mechanisms:
    - Through the guidance of mentors like Boothby, who embody the Academy’s values
      and traditions.
    - By instilling a sense of duty and pride in its cadets, as seen in Picard’s pride
