  title: Picard sabotages Corey’s revenge plan
  description: 'In the dimly lit, deserted gambling center of the Bonestell Facility,
    Picard confronts Corey as he prepares to cheat a Nausicaan at Dom-Jot. Corey,
    initially dismissive of Picard’s warnings, escalates the tension with sarcasm
    and defiance, but Picard’s unyielding moral stance—threatening to expose Corey’s
    tampering—shatters their friendship. The confrontation reveals the irreconcilable
    divide between Corey’s reckless impulsivity and Picard’s rigid adherence to principle,
    a clash that forces Corey to abandon the plan in bitter betrayal. The scene underscores
    the cost of Picard’s intervention: his attempt to prevent a past mistake instead
    fractures a bond, demonstrating how well-intentioned actions can unravel relationships
    and identities. The moment is a turning point, marking the irreversible severing
    of their friendship and foreshadowing the broader consequences of altering history.'
