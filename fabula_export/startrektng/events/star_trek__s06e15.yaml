- fabula_uuid: cand_evt_scene_7cc6c01e709ff3e3_03
  global_id: null
  title: Picard Confesses His Past Betrayal
  description: "\n  In the Bonestell Facility’s gambling center, Picard watches Corey’s\
    \ Dom-Jot game with mounting dread as a Nausicaan enters—the same alien who will\
    \ later cheat Corey and spark a violent confrontation. When Corey ignores Picard’s\
    \ urgent warnings not to play the Nausicaan, Picard’s desperation escalates, revealing\
    \ his hidden guilt. Q, disguised as the bartender, goads Picard into admitting\
    \ he rigged a rematch years earlier to help Corey win, a confession that exposes\
    \ the moral cost of his youthful choices. The Nausicaan’s victory over Corey foreshadows\
    \ the coming fight, while Picard’s admission—forced by Q’s provocation—undermines\
    \ his self-image as an honorable man. This moment of raw vulnerability deepens\
    \ the stakes of Picard’s temporal intervention, as his past actions now threaten\
    \ to unravel his present identity.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e15
  scene_sequence: 6
  sequence_in_scene: 15
  key_dialogue:
  - 'PICARD: No, don''t play him.'
  - 'COREY: Why?'
  - 'PICARD: It''ll cause trouble.'
  - 'PICARD: He''s a Nausicaan... they can be very ill-tempered when they lose.'
  - 'COREY: So can I.'
  - 'PICARD: Corey, listen to me. This is a bad idea. Don''t play him.'
  - 'Q: I see you''ve found your Nausicaan friend.'
  - 'PICARD: Sorry to disappoint you.'
  - 'Q: Ensign Zweller seems to be doing well.'
  - 'PICARD: He''s going to lose. The Nausicaan is cheating.'
  - 'Q: Really? I''m beginning to like these Nausicaans.'
  - 'PICARD: If history repeats itself, Corey will figure it out later tonight and
    then he''ll want revenge.'
  - 'Q: And will you help your best friend avenge this injustice?'
  - 'PICARD: I did the first time. I found a way to rig the table so that Corey could
    win in a rematch.'
  - 'Q: You? Cheated? Picard, I''m impressed.'
  - 'PICARD: It was a foolish mistake. The Nausicaan and his two friends didn''t take
    the loss very well. They were outraged... they wanted a fight... And I gave them
    one.'
