  object_involvements:
  - object_uuid: ger_object_34428840e869
    description_of_involvement: 'Sickbay’s overhead diagnostic monitor tracks Picard’s
      vital signs in real-time, its screen a grim tableau of his deteriorating condition.
      The monitor’s beeps slow as his heart flatlines, the unyielding line cutting
      through the shouts and transporter hums. Beverly glances at it repeatedly, her
      face tightening with each new alert. The monitor becomes a silent witness to
      the medical team’s desperation, its readouts a cold, clinical confirmation of
      what they already know: Picard is dying, and there is nothing they can do to
      stop it. The screen’s glow casts long shadows over the operating table, a visual
      metaphor for the darkness creeping into the room as hope fades.'
    status_before_event: Displaying normal readings for the crew, ready for emergency
      use.
    status_after_event: Showing a flatline and error codes related to Picard’s bioregulator
      failure, its screen frozen in time.
    global_id: ger_object_34428840e869
  - object_uuid: ger_object_dcd136b15660
    description_of_involvement: 'Beverly grabs this hypospray loaded with 40 cc’s
      of inoprovaline and presses it to Picard’s neck as his bioregulator fails. The
      drug is a last-ditch effort to stabilize his artificial heart, but the tricorder’s
      readings show it’s too late—the damage is irreversible. The hypospray hisses
      as it delivers the dose, a sound that blends with the alarms and the frantic
      shouts of the medical team. Its failure is a microcosm of the larger crisis:
      even Starfleet’s most advanced medicine cannot overcome the teryon beam’s devastation.
      The empty hypospray is left on the operating table, a discarded symbol of hope
      that has run out.'
    status_before_event: Stored in a medical supply cabinet, fully charged and ready
      for emergency use.
    status_after_event: Empty and discarded on the operating table, its contents administered
      but ineffective.
    global_id: ger_object_dcd136b15660
  - object_uuid: ger_object_828e8474ee26
    description_of_involvement: A nurse hands Beverly this compact cortical stimulator
      as Picard’s brain activity plummets. She presses it firmly against his forehead,
      its hum lost in the cacophony of defibrillator pads and pulmonary support tubes.
      The device is designed to jolt the brain back into activity, but Picard’s body
      jerks twice under its influence before falling still. The stimulator’s failure
      is the final nail in the coffin—it confirms that the damage to his bioregulator
      and organs is irreversible. The device lies abandoned on the operating table
      afterward, its purpose fulfilled but its outcome devastating. Its presence in
      this scene is a testament to the medical team’s refusal to accept defeat, even
      as the evidence mounts against them.
    status_before_event: Stored in a sterile tray, charged and ready for emergency
