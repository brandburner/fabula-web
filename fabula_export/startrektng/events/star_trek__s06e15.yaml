  object_involvements:
  - object_uuid: ger_object_34428840e869
    description_of_involvement: Beverly’s vital signs monitor beeps steadily in Sickbay,
      providing a clinical counterpoint to Picard’s unhinged laughter. The device
      confirms his physical stability, but its readouts fail to capture the psychological
      unraveling he’s experiencing. Its presence underscores the disconnect between
      medical science and the human condition, as Beverly struggles to reconcile Picard’s
      body (healed) with his mind (fractured).
    status_before_event: Idle on a nearby console, awaiting use as Picard is beamed
      in from the brawl.
    status_after_event: Active, displaying stable vitals, but its data does little
      to explain Picard’s eerie demeanor.
    global_id: ger_object_34428840e869
  - object_uuid: ger_object_2eb03c6167cd
    description_of_involvement: 'The gambling center’s furniture—chairs and tables—becomes
      collateral damage in the brawl, splintering under the force of swinging fists
      and bodies. The destruction is chaotic, mirroring the unraveling of Picard’s
      composure. What was once a neutral space for recreation becomes a battleground,
      its broken remnants a physical manifestation of the violence that has consumed
      the scene. The furniture’s role is purely environmental but symbolically rich:
      it represents the shattering of Picard’s carefully constructed self-control.'
    status_before_event: Intact, arranged for card games and drinks, a normal setting
      for off-duty cadets.
    status_after_event: Smashed and scattered across the floor, a debris field marking
      the site of the brawl.
    global_id: ger_object_2eb03c6167cd
  - object_uuid: ger_object_7657f22053d2
    description_of_involvement: 'The serrated blade is the pivotal weapon in this
      event, wielded by Nausicaan #2 to stab Picard through the back. Its jagged edge
      mirrors the brutality of the Nausicaans’ attack, symbolizing the irreversible
      violence of Picard’s past. The blade’s entry and exit from Picard’s body are
      visceral, reinforcing the physical and psychological trauma he’s endured. Its
      role is both functional (the instrument of injury) and thematic (a metaphor
      for the pain Picard has carried for decades).'
    status_before_event: 'Sheathed at Nausicaan #2’s belt, hidden until the moment
      of attack.'
    status_after_event: Bloodied and withdrawn from Picard’s back, now a symbol of
      the violence that has reshaped his identity.
