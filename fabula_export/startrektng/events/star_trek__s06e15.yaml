    - Large windows framing star fields—a view Picard once commanded, now a taunting
      reminder of his fall
    - The hum of background conversation, which fades into silence as Picard’s plea
      grows more desperate
    - A cleared table, its emptiness symbolizing the void left by Riker and Troi’s
      departure
