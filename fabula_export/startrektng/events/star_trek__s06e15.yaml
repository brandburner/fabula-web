  title: Corey’s Betrayal and Exit
  description: 'In a tense, late-night confrontation at the Bonestell Facility’s gambling
    center, Picard discovers Corey sabotaging a Dom-Jot table to cheat the Nausicaans—a
    reckless act Corey dismisses as harmless. Picard, driven by moral urgency, escalates
    from warnings to a direct threat: he’ll expose Corey’s tampering to the gambling
    foreman. Corey’s initial sarcasm curdles into stunned betrayal when Picard invokes
    his rank (Ensign Picard) as leverage, a calculated move that strips their friendship
    of its equality. The moment fractures irreparably when Corey, voice hollow with
    rage, abandons the plan and storms out, severing their bond. This isn’t just a
    tactical retreat; it’s the death of trust, a consequence of Picard’s interference
    that will haunt both characters as the ripple effects of his altered past unfold.
    The scene underscores the cost of moral absolutism: even when justified, it can
    destroy what matters most.'
