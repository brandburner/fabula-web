    global_id: ger_object_3147a9b79cb0
  - object_uuid: ger_object_cf30ddb5358a
    description_of_involvement: 'Nausicaan #2’s sword serves as a silent but potent
      threat throughout the confrontation. Its presence is a constant reminder of
      the violence that could erupt at any moment, a physical manifestation of the
      Nausicaans’ aggression and the danger they pose. When Picard notices Nausicaan
      #2’s hand resting on the hilt, it’s a pivotal moment—the sword becomes the tipping
      point that forces Picard to intervene physically, escalating the tension and
      leading to the shattering of his friendships. Its role is not just as a weapon,
      but as a symbol of the brutality that Picard is trying (and failing) to avoid.'
    status_before_event: 'Sheathed at Nausicaan #2’s side, its hilt within easy reach,
      a constant and ominous presence.'
    status_after_event: Still sheathed, but the threat it posed has been neutralized—for
      now—by Picard’s intervention. The sword remains a symbol of the violence that
      nearly unfolded, a reminder of the fragility of the moment.
