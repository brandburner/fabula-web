  - 'TROI: Your performance reports have always been good. You''re thorough... dedicated...'
  - 'RIKER: Reliable, steady... punctual.'
  - 'PICARD: I see. What would you say if I told you I thought I was capable of being
    more than that...'
  - 'RIKER: Frankly, Lieutenant... I don''t think that''s realistic...'
  - 'TROI: Hasn''t this been the problem all along? Throughout your career... you''ve
    had lofty goals... but you''ve never been willing to do what''s necessary to attain
    them.'
  - 'PICARD: All right, Q. Enough of this. You''ve made your point.'
  - 'PICARD: Q... ?'
