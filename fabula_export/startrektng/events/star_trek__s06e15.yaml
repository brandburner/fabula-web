      values are both a shield (protecting Picard from Corey’s recklessness) and a
      sword (driving a wedge between them).
    internal_dynamics: The scene highlights the tension between Starfleet’s ideal
      of restraint and the ‘old ways’ of resolving conflicts (violence, honor-bound
      retaliation). Picard’s alignment with Starfleet’s values creates an internal
      conflict for Corey, who sees it as a betrayal of their shared past.
