      Ensign’s uniform, his expression a mix of shock, disorientation, and warmth
      as he interacts with Marta. The slap from Corlina has left him physically and
      emotionally stunned, but it is Q’s revelation that he has been temporally reverted
      to his 21-year-old self that truly unmoors him. Picard’s dialogue is halting,
      his movements uncertain, as he grapples with the surreal nature of his situation.
      His lingering gaze at Marta reveals a vulnerability he rarely shows, hinting
      at the depth of his emotional conflict. When Q appears, Picard’s resistance
      to altering history stems from his fear of unintended consequences, but Q’s
      assurance that only *his* timeline will be affected forces him to confront the
      existential tension between his past and present selves.
