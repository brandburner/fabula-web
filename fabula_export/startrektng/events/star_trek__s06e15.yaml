  title: Picard’s vulnerability sparks Marta’s attraction
  description: In Marta’s quarters, Picard grapples with the fallout of his fractured
    friendship with Corey, his frustration palpable as he admits he couldn’t make
    Corey understand his decision to sabotage the Dom-Jot scheme. Marta, observing
    his uncharacteristic seriousness, teases him at first—his officer’s uniform and
    newfound maturity striking her as unexpectedly attractive. Their playful banter
    quickly escalates into charged tension when Marta directly asks if he’s ever considered
    a romantic relationship between them. Picard, caught off guard but honest, confesses
    he has thought about it for years. The moment crystallizes into a kiss, a rare
    unguarded act that disrupts Picard’s emotional reserve and hints at the transformative
    power of his altered timeline choices. The scene ends with Q’s sudden appearance
    the next morning, mocking Picard’s guilt and foreshadowing the consequences of
    his actions. This event serves as both a payoff for Marta’s shifting perception
    of Picard and a setup for the moral and emotional reckoning that follows his interference
    in Corey’s life.
