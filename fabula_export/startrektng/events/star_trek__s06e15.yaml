      that reject Starfleet’s ideals.
    institutional_impact: The event reinforces the idea that Starfleet’s promises
      of protection and glory are illusory, leaving its officers vulnerable to both
      external threats (e.g., the Lenarians) and internal flaws (e.g., Picard’s reckless
      past).
