  description: In Picard’s quarters, Corey demands revenge against a Nausicaan who
    cheated him at Dom-Jot, but Picard refuses, invoking Starfleet discipline and
    the dangers of provoking Nausicaans. Marta initially wavers but ultimately aligns
    with Picard, rejecting Corey’s plan. The moment marks a pivotal shift in Marta’s
    loyalty—her growing attraction to Picard’s newfound maturity and responsibility
    becomes palpable, while Corey’s betrayal and exit foreshadow the irreversible
    fracture in their friendship. The scene’s subtext reveals Marta’s unspoken romantic
    tension with Picard, which Q later exploits to taunt him about past regrets. Picard’s
    firm stance also underscores his moral evolution, contrasting sharply with his
    younger self’s impulsiveness. The confrontation ends with Corey storming out,
    leaving Marta and Picard in a charged, intimate silence before Q’s interruption
    derails the moment. This event sets up Corey’s reckless revenge plot and deepens
    the emotional stakes of Picard’s moral dilemma—his past choices now collide with
    his present identity, forcing him to confront the consequences of altering his
    history.
