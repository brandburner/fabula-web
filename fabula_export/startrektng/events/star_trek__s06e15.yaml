  object_involvements:
  - object_uuid: ger_object_767fe604903e
    description_of_involvement: 'The Dom-Jot table’s bumpers and pockets are the stage
      upon which the Nausicaans’ provocation plays out, their metallic surfaces and
      illuminated edges framing the confrontation like a ring in a gladiatorial arena.
      The bumpers, which normally redirect the Dom-Jot balls in a controlled manner,
      become a metaphor for the unpredictability of the situation—just as the table’s
      mechanics are designed to manipulate the game, the Nausicaans manipulate the
      emotional dynamics between Picard, Corey, and Marta. When the Nausicaans slam
      the bumpers to cheat, it mirrors their broader strategy: to disrupt, to humiliate,
      and to force the Starfleet officers into a position where they must either fight
      or be labeled cowards. The table’s role is not just functional but symbolic,
      representing the structured yet volatile nature of the conflict.'
    status_before_event: Intact and functional, the bumpers and pockets are set for
      a game, their magnetic pulses ready to redirect the Dom-Jot balls.
    status_after_event: Still intact but now a silent witness to the fallout of the
      confrontation. The table’s purpose has shifted from a site of competition to
      a site of emotional reckoning, its bumpers and pockets no longer relevant to
      the drama unfolding around it.
    global_id: ger_object_767fe604903e
  - object_uuid: ger_object_3147a9b79cb0
    description_of_involvement: 'The Dom-Jot balls are the inciting object of the
      confrontation, their smooth surfaces and glowing paths a metaphor for the game
      of provocation being played between the Nausicaans and the Starfleet officers.
      While the balls themselves are not directly involved in the physical altercation,
      their presence in the gambling center sets the stage for the Nausicaans’ challenge
      to Corey. The game of Dom-Jot becomes a stand-in for the larger conflict—one
      of skill, pride, and the willingness to fight. When the Nausicaans taunt Corey
      with the offer to play, the Dom-Jot balls symbolize the stakes: not just a game,
      but a test of honor and courage that Picard’s friends are ill-prepared to meet.'
    status_before_event: Scattered across the Dom-Jot table, their paths illuminated
