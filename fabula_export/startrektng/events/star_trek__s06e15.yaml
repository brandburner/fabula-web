- fabula_uuid: cand_evt_scene_528661984070cb16_02
  global_id: null
  title: Q Offers Picard a Temporal Reversal
  description: "\n  In the immediate aftermath of a humiliating confrontation with\
    \ Corlina—a woman he double-booked for a date—Picard stands disoriented in his\
    \ Starbase Earhart quarters, still processing the surreal reality of his 21-year-old\
    \ body. His old friends Corey and Marta, unaware of his true identity, tease him\
    \ for his 'slowing reflexes' after Corlina slaps him, their playful ribbing masking\
    \ the genuine concern Marta briefly shows. As they leave for the casino, Picard’s\
    \ lingering gaze at Marta reveals his emotional vulnerability, a stark contrast\
    \ to his usual composed demeanor. Suddenly, Q materializes, adopting the guise\
    \ of a Starfleet captain, and delivers his proposition: Picard has been temporally\
    \ reverted to his 21-year-old self, with two days to alter a defining mistake—his\
    \ near-fatal encounter with a Nausicaan—before Q will return him to the present.\
    \ Picard’s initial resistance stems from his fear of unintended consequences,\
    \ but Q assures him that only *his personal* timeline will be affected, not the\
    \ broader fabric of history. The offer forces Picard to confront the existential\
    \ tension between the man he was and the man he has become, crystallizing his\
    \ dilemma: the cost of rewriting one’s past versus the irreversible weight of\
    \ his present identity. The scene ends with Picard realizing he must soon face\
    \ Penny, the second woman he double-booked, underscoring the immediate moral and\
    \ emotional stakes of Q’s offer.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e15
  scene_sequence: 4
  sequence_in_scene: 9
  key_dialogue: &id015
  - 'Q: Attention on deck, Ensign Picard!'
  - 'PICARD: Q... What''s the point of creating this... fantasy?'
  - 'Q: It''s no fantasy. This is all very real, I assure you. You''re twenty-one
    years old again... a brash young man, fresh out of the Academy.'
  - 'PICARD: I won''t do it. I won''t alter history.'
  - 'Q: Oh, very well... if you attach so much importance to the continuity of time...
    I can personally guarantee that nothing you do here will end up hurting anyone,
    or have an adverse affect on what you know as history. The only thing at stake
    here is your life and your peace of mind.'
  - 'PICARD: So then I won''t die?'
  - 'Q: Of course you''ll die. It''ll just be at a later time.'
  - 'PICARD: In fact, Penny should be... waiting for me... right now.'
