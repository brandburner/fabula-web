      in revenge is rooted in his Starfleet oath, while Corey’s insistence on violence
      reflects a rejection of Starfleet’s higher standards. The organization’s influence
      is felt in the rank insignia on Picard’s uniform, the moral dilemma he faces,
      and the impending separation of the friends as they report to their respective
      ships. Starfleet’s role is to act as a catalyst for Picard’s growth, even as
      it drives a wedge between him and Corey. The organization’s values—restraint,
      honor, and duty—are tested and debated in this moment, with Picard aligning
      himself with them and Corey rebelling against them.
    active_representation: Via institutional protocol (Picard’s oath) and symbolic
