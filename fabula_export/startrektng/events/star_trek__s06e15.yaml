      Starfleet Officers’) and Marta’s remark about their impending assignments.
    power_dynamics: Starfleet exercises moral and institutional authority over the
      characters, particularly Picard, who internalizes its values. Corey challenges
      this authority, seeking to revert to a pre-Starfleet code of honor (violence
      and revenge). The organization’s power is both enabling (Picard’s resolve) and
      constraining (the cost of his choices).
