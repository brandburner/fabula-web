      match, used to conceal the magnetic device. Its condition is unknown but implied
      to be functional.
    status_after_event: Still in the Bonestell Facility, potentially repurposed by
      Corey for his own rigging attempt. Its symbolic role shifts from evidence of
      the Nausicaan’s cheating to a tool of Corey’s revenge.
