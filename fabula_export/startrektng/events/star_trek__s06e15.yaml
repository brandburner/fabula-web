  sequence_in_scene: 22
  key_dialogue:
  - |-
    MARTA: I've just never seen you like this before. You're so... serious.
    PICARD: Do I really seem that different?
    MARTA: I don't know... maybe I'm just not used to seeing you in an officer's uniform... No... it's more than that... you do seem different... I mean, I'm not complaining... I think it suits you.
  - |-
    MARTA: Johnny... have you ever thought about us... getting together?
    PICARD: Actually... I have. For a long time.
    MARTA: Why didn't you ever say so?
    PICARD: I... don't know. At the moment... I can't imagine why I didn't...
  - |-
    Q: A little jumpy this morning, are we? Feeling guilty perhaps?
    PICARD: I don't have anything to feel guilty about, Q.
    Q: No? We were friends, Q. Nothing more.
