- fabula_uuid: cand_evt_scene_7cc6c01e709ff3e3_01
  global_id: null
  title: Corey’s Dom-Jot Gamble and Picard’s Foreshadowed Dread
  description: "\n  Picard enters the Bonestell Facility’s gambling center, where\
    \ Corey is mid-game in a high-stakes Dom-Jot match against an alien opponent.\
    \ Corey’s cocky confidence and skill secure his victory, but the moment is interrupted\
    \ by the arrival of a Nausicaan—a figure Picard instantly recognizes as a harbinger\
    \ of future violence. His dread is palpable, rooted in foreknowledge of the Nausicaan’s\
    \ role in his own fatal injury. When Corey, oblivious to the danger, eagerly accepts\
    \ a rematch with the Nausicaan, Picard intervenes with urgent warnings, but Corey\
    \ dismisses him as overprotective. The Nausicaan cheats blatantly, humiliating\
    \ Corey and provoking his rage. Meanwhile, Q—disguised as the bartender—observes\
    \ Picard’s futile attempts to alter fate, mocking his inability to prevent the\
    \ coming conflict. The scene crystallizes the central tension: Picard’s foreknowledge\
    \ of his own demise clashes with Corey’s reckless overconfidence, setting the\
    \ stage for a collision between fate and hubris. The Nausicaan’s predatory smile\
    \ and Corey’s hardening fury signal the inevitability of violence, while Picard’s\
    \ frustration underscores the futility of his interference in a timeline already\
    \ set in motion.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e15
  scene_sequence: 6
  sequence_in_scene: 13
  key_dialogue:
  - |-
    MARTA: He's winning.
    PICARD: Of course.
    MARTA: I thought you had a date.
    PICARD: She... decided to leave.
    MARTA: (ironic) You're getting old, Johnny.
  - |-
    PICARD: (quiet, urgent) No, don't play him.
    COREY: Why?
    PICARD: It'll cause trouble.
    COREY: So can I.
  - |-
    Q: I see you've found your Nausicaan friend.
    PICARD: Sorry to disappoint you.
    Q: Ensign Zweller seems to be doing well.
    PICARD: He's going to lose. The Nausicaan is cheating.
    Q: Really? I'm beginning to like these Nausicaans.
    PICARD: If history repeats itself, Corey will figure it out later tonight and then he'll want revenge.
    Q: And will you help your best friend avenge this injustice?
