  - 'Q: I''ve done exactly what I promised, Jean-Luc. I''ve returned you to the present.'
  - 'PICARD: This is not the present I remember. You said nothing would change.'
  - 'Q: And nothing has changed... except for you. But then, that''s what you wanted,
    wasn''t it? To change the man you were in your youth? Well, you did it—and this
    is the man you are today. You should be happy... you have a real heart beating
    in your chest and you get to live out the rest of your life in safety... running
    tests... making analyses... and carrying reports to your superiors.'
