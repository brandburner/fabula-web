      is to underscore the Nausicaan’s duplicity and Corey’s observant nature, while
      also foreshadowing Corey’s own descent into dishonesty. When Q reveals Corey
      is rigging the table, the cue becomes a dark mirror—Corey is now the cheater,
      wielding his own version of the Nausicaan’s tool.
