      and stunned by Corlina’s slap. His initial interactions with Corey and Marta
      are marked by warmth and nostalgia, but his confusion deepens as Q’s offer forces
      him to confront the weight of his past mistakes. He resists Q’s manipulation,
      fearing the unintended consequences of altering his timeline. His physical presence—touching
      his face in the mirror, looking down at his uniform—underscores his struggle
      to reconcile his past and present selves. The event becomes a crucible for his
      moral and emotional reckoning.
