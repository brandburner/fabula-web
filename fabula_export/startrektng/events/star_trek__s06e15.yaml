- fabula_uuid: cand_evt_scene_7cc6c01e709ff3e3_02
  global_id: null
  title: Picard’s Failed Intervention and Q’s Mockery
  description: "\n  In the Bonestell gambling center, Picard arrives to find Corey\
    \ mid-game, triumphantly winning against an alien opponent. Marta teases Picard\
    \ about his canceled date, but his attention is immediately diverted when a Nausicaan\
    \ enters—Picard recognizes him as the future antagonist and reacts with dread.\
    \ When Corey, oblivious to the danger, accepts a high-stakes rematch with the\
    \ Nausicaan, Picard urgently tries to dissuade him, warning that the Nausicaan\
    \ is cheating and that the game will lead to violence. Corey dismisses Picard’s\
    \ warnings as erratic, insisting on playing. As the game progresses, the Nausicaan\
    \ cheats openly, humiliating Corey and provoking his fury. Meanwhile, Q—disguised\
    \ as the bartender—observes Picard’s struggle with amused detachment, mocking\
    \ his futile attempts to alter fate. Picard’s confession to Q about his past interference\
    \ (rigging the table to help Corey win) reveals his guilt and the moral cost of\
    \ his youthful choices, while Q’s taunts underscore the inevitability of the coming\
    \ conflict. The scene ends with Corey’s rage simmering, setting up the violent\
    \ confrontation to come.\n  "
