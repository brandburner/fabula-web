- fabula_uuid: cand_evt_scene_2de969b860d7ec71_02
  global_id: null
  title: Q reveals Lenarian attack truth
  description: "\n  In a moment of raw confrontation, Q forces Picard to accept his\
    \ death by revealing the Lenarian attack as the cause. Picard, already reeling\
    \ from Q's psychological manipulations—including the sudden appearance of his\
    \ disapproving father, Maurice—initially resists the truth, demanding proof. Q\
    \ escalates by producing Picard's damaged artificial heart, triggering fragmented\
    \ memories of the attack. The revelation forces Picard to confront the irreversible\
    \ consequences of his past, particularly his youthful arrogance and the fight\
    \ with the Nausicaans that led to his heart transplant. This moment is a turning\
    \ point: Picard's denial collapses, and he begins to grapple with the weight of\
    \ his choices, setting up his eventual decision to undo his past. The scene underscores\
    \ Q's control over Picard's psychological unraveling, using both brutal honesty\
    \ and cruel theatrics to break Picard's resistance and force him to engage with\
    \ the truth of his death and the fragility of his identity.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e15
  scene_sequence: 3
  sequence_in_scene: 5
  key_dialogue: &id007
  - 'Q: I told you. You''re dead. This is the afterlife. And I''m God.'
  - 'PICARD: No. I am not dead. I refuse to believe there is an afterlife which is
    run by you.'
  - 'Q: The conference, the unexpected attack, the compressed teryon beam... the bottom
    line is, your life ended about five minutes ago under the inept ministrations
    of Doctor Beverly Crusher.'
  - 'PICARD: If I''m truly dead, then my only regret is dying... and finding you here.'
  - 'Q: It wasn''t very smart of you to take on three Nausicaans like that.'
  - 'PICARD: I started that fight with the Nausicaans... I started it because I was
    young and cocky... If I had been more responsible at that age... I wouldn''t have
    needed this heart... and I wouldn''t have died from a random energy surge thirty
    years later.'
