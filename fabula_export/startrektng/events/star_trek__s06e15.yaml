  description: "\n  In the Bonestell Facility’s grimy gambling center, Corey—confident\
    \ and cocky—dominates a Dom-Jot game against an alien opponent, collecting his\
    \ winnings to the crowd’s cheers. Picard, arriving late after a failed date, watches\
    \ with Marta as Corey’s arrogance peaks. The mood shifts violently when a Nausicaan\
    \ enters, his predatory grin signaling danger. Picard, recognizing the Nausicaan\
    \ from his past, urgently warns Corey not to play him, citing the Nausicaans’\
    \ volatile nature. Corey dismisses the warning, insisting he can handle himself.\
    \ As the game progresses, the Nausicaan cheats blatantly, running the table and\
    \ humiliating Corey in front of the jeering crowd. The Nausicaan’s final taunt—a\
    \ thrown cue stick and stolen winnings—ignites Corey’s fury, his face hardening\
    \ into cold, vengeful rage. The scene underscores Corey’s recklessness, Picard’s\
    \ helplessness to alter fate, and the inevitability of the violence to come. Q’s\
    \ presence looms, his taunts forcing Picard to confront his past complicity in\
    \ the coming conflict.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e15
  scene_sequence: 6
  sequence_in_scene: 16
  key_dialogue:
  - |-
    PICARD: No, don't play him.
    COREY: Why?
    PICARD: It'll cause trouble.
    COREY: So can I.
  - |-
    PICARD: He's a Nausicaan... they can be very ill-tempered when they lose.
    COREY: (flip) So can I.
  - |-
    Q: Ensign Zweller seems to be doing well.
    PICARD: He's going to lose. The Nausicaan is cheating.
    Q: Really? I'm beginning to like these Nausicaans.
    PICARD: If history repeats itself, Corey will figure it out later tonight and then he'll want revenge.
    Q: And will you help your best friend avenge this injustice?
  - |-
    PICARD: I did the first time. I found a way to rig the table so that Corey could win in a rematch.
    Q: You? Cheated? Picard, I'm impressed.
    PICARD: It was a foolish mistake. The Nausicaan and his two friends didn't take the loss very well. They were outraged... they wanted a fight... And I gave them one.
