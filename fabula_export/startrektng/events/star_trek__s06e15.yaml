  - object_uuid: ger_object_5bffb1b64f96
    description_of_involvement: The Dom-Jot table is the symbolic heart of the conflict,
      representing both Corey’s humiliation and Picard’s moral dilemma. Though physically
      absent from Picard’s quarters, it looms large in the dialogue—Corey’s accusations
      of cheating (‘he held the cue close to his waist’) and Picard’s warnings about
      provoking the Nausicaan tie the table to the scene’s tension. Its role as the
      ‘battleground’ for honor and revenge is reinforced by Q’s revelation that Corey
      is now rigging it himself, forcing Picard to act. The table’s absence makes
      it a potent absentee presence, a metaphor for the irresolvable past Picard must
      confront.
    status_before_event: Located in the Bonestell Facility, recently used in a rigged
      Dom-Jot match between Corey and the Nausicaan. The table’s mechanisms are intact
      but compromised by the Nausicaan’s alleged magnetic device.
    status_after_event: Still in the Bonestell Facility, now being tampered with by
      Corey, who is rigging it for his own revenge. The table’s state is precarious,
      both physically (due to Corey’s interference) and symbolically (as a catalyst
      for escalating conflict).
    global_id: ger_object_5bffb1b64f96
  - object_uuid: ger_object_557a8dabe7e4
    description_of_involvement: 'Q’s flower arrangement serves as a deceptive prop,
      masking his true identity and intentions as he enters Picard’s quarters. The
      bouquet is thrust forward with mocking theatricality (‘Is there a John-Luck
      Pickard here?’), its frivolity contrasting sharply with the scene’s emotional
      weight. The flowers symbolize the superficiality of Q’s disguise and the intrusion
      of his omniscient meddling into Picard’s private moment with Marta. Once Q’s
      identity is revealed, the flowers are discarded, their purpose fulfilled—Q no
      longer needs the pretext, as his taunts have already shattered the intimacy
      of the room. The object’s role is purely functional, yet its presence heightens
      the scene’s irony: beauty and romance are weaponized to deliver a cruel reminder
      of Picard’s regrets.'
    status_before_event: Clutched in Q’s hand as he approaches Picard’s quarters,
      intact and freshly arranged. The flowers are a prop, their condition unimportant
      beyond their role in the disguise.
    status_after_event: Discarded by Q after his identity is revealed, likely left
      on a surface in Picard’s quarters. Their symbolic value as a ‘gift’ is nullified,
      reduced to a discarded prop.
    global_id: ger_object_557a8dabe7e4
  - object_uuid: ger_object_37e3271e2d4c
    description_of_involvement: 'Picard’s rank insignia on his uniform is a quiet
      but powerful symbol of his transformation. When Marta touches it (‘Maybe these
      bars are starting to feel a little heavy, Ensign’), the gesture underscores
      the weight of his new responsibilities and the distance growing between him
      and his friends. The insignia represents the moral and emotional burden of his
      Starfleet oath, a physical manifestation of the ‘higher standard’ he’s striving
      for. Its presence in this moment—amidst the fracturing of friendships and the
      awakening of romantic tension—highlights the cost of growth: Picard is no longer
      just Corey’s friend or Marta’s potential lover; he is an officer, bound by duties
      that isolate him from his past.'
    status_before_event: Affixed to Picard’s uniform, newly earned and still unfamiliar.
      Its weight is both literal (the physical bar) and metaphorical (the responsibility
      it signifies).
    status_after_event: Still on Picard’s uniform, but now imbued with added significance
      after Marta’s remark. The insignia serves as a reminder of the choices he’s
      making and the person he’s becoming, even as it drives a wedge between him and
      Corey.
    global_id: ger_object_37e3271e2d4c
  - object_uuid: ger_object_f05116ff8ff9
    description_of_involvement: The Nausicaan’s Dom-Jot cue is described in vivid
      detail by Corey as the tool used to hide the magnetic device (‘gripping it tight
      against his waist’). Though not physically present in Picard’s quarters, the
      cue is a critical piece of evidence in Corey’s accusation, its positioning during
