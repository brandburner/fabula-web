acts:
- fabula_uuid: act_9ce4d61fecaf9be6
  number: 1
  summary: 'Captain Picard dies in Sickbay after a surprise Lenarian attack, his artificial
    heart failing from a compressed teryon beam. He awakens in a blinding white limbo,
    confronted by Q, who reveals Picard''s death and playfully asserts his divine
    status. Picard initially disbelieves and resists Q''s claims, but Q provides undeniable
    evidence by conjuring his stern, disapproving father, Maurice, who appears and
    laments Picard''s early demise and his decision to join Starfleet. This vision
    deeply affects Picard, forcing him to confront long-held feelings of inadequacy.
    Q then presents Picard''s fused artificial heart, explaining its origin in a reckless
    youthful brawl. A vivid, almost immediate vision of young Picard being stabbed
    by three Nausicaans solidifies the memory of this past regret. Q offers Picard
    a unique opportunity: return to his youth and alter this specific mistake, promising
    a return to life with a real heart if he successfully avoids the fight. Picard,
    intrigued by the prospect of shedding his youthful arrogance and correcting a
    pivotal error, agrees to change his past, leading to his abrupt transportation
    to his younger self on Starbase Earhart, two days before the fateful Nausicaan
    confrontation. This act effectively establishes the inciting incident of Picard''s
    death, introduces the supernatural intervention of Q, and clearly defines the
    central conflict and the high stakes of altering one''s personal history.'
  key_moments: []
  scene_numbers:
  - 1
  - 2
  - 3
- fabula_uuid: act_281a584b6e7fec55
  number: 2
  summary: 'Picard finds himself disoriented and uncomfortable in his younger body,
    an Ensign on Starbase Earhart, grappling with the presence of his old friends,
    Corey and Marta, who perceive him as his twenty-one-year-old self. He immediately
    attempts to alter his past romantic missteps, leading to an awkward encounter
    with Corlina and then a dramatic confrontation with Penny, a woman he was scheduled
    to meet, who throws a drink in his face after he rebuffs her advances. Q, observing
    Picard''s struggles in various guises, clarifies the mission: Picard has two days
    to avoid the Nausicaan fight and its resulting injury to secure a future with
    a real heart. Later, at the Bonestell Facility''s gambling center, Picard watches
    Corey confidently win at Dom-Jot. His apprehension grows when the very Nausicaan
    from his past, the one responsible for his original injury, enters the gaming
    area and challenges Corey. Picard, recognizing the impending danger, attempts
    to dissuade Corey from playing, but his newfound caution is met with quizzical
    looks and irritation from his friend, who sees the Nausicaan as an easy mark.
    This act effectively establishes Picard''s initial struggles with his altered
    reality, highlighting the immediate and often negative consequences of his attempts
    to navigate his past without repeating mistakes, and reintroduces the pivotal
    Nausicaan encounter, setting the stage for the central conflict of his intervention.'
  key_moments: []
  scene_numbers:
  - 4
  - 5
  - 6
- fabula_uuid: act_c728e8afa0f3683a
  number: 3
  summary: Corey, ignoring Picard's earlier caution, plays the Nausicaan at Dom-Jot
    and loses, quickly realizing the Nausicaan cheated. Enraged by the deception,
    Corey proposes rigging the table for revenge, planning a rematch to reclaim his
    honor and winnings. Picard firmly refuses to participate in this scheme, citing
    the inherent dangers of provoking Nausicaans and emphasizing the need for Starfleet
    officers to uphold higher ethical standards. This principled stance deeply frustrates
    and alienates Corey, who departs in anger, feeling betrayed by his friend's unexpected
    change in character. Marta, initially hesitant about Corey's revenge plan, sides
    with Picard, leading to a moment of unexpected intimacy between them. Marta expresses
    a growing attraction to Picard's newfound maturity and sense of responsibility,
    and they share a passionate kiss. Q, observing their interaction, notes Picard's
    growing collection of regrets, particularly concerning his past relationship with
    Marta, and then informs Picard that Corey is proceeding with rigging the table
    despite his advice. This act deepens the personal stakes for Picard, showing his
    choices impacting his friendships and romantic life, and his struggle to balance
    his desire for a safer future with the integrity of his relationships.
  key_moments: []
  scene_numbers:
  - 7
  - 8
  - 9
- fabula_uuid: act_74b397cd33387389
  number: 4
  summary: 'The morning after their romantic encounter, Marta expresses deep regret,
    fearing their night together has irrevocably damaged their long-standing friendship,
    making their impending goodbyes difficult and awkward. Picard realizes the profound
    mistake he has made in altering their dynamic, recognizing the unintended negative
    consequences of his interventions. Later, at the Bonestell Facility, an uncomfortable
    tension hangs over Picard, Corey, and Marta as they gather for their last night
    out. The three Nausicaans enter, immediately resuming their taunts against Corey
    and insulting Starfleet officers, escalating the tension. As Nausicaan #2 draws
    a weapon and Corey prepares to strike in retaliation, Picard decisively intervenes,
    elbowing Corey to prevent him from starting the fight. This action successfully
    averts the original brawl and the stabbing, but it shatters his friendships with
    both Corey and Marta, who express their profound disillusionment and walk out
    of his life, leaving him isolated. Immediately following this, Picard finds himself
    abruptly transported to the Enterprise bridge in an alternate timeline, now a
    low-ranking Lieutenant Junior Grade and assistant astrophysics officer, devoid
    of his familiar authority and respect. Q appears in Beverly''s office, explaining
    that by removing his youthful recklessness, Picard also erased the defining experiences
    that shaped his leadership, leaving him with a safe but ultimately unfulfilling
    and unremarkable life.'
  key_moments: []
  scene_numbers:
