- fabula_uuid: cand_evt_scene_2de969b860d7ec71_01
  global_id: null
  title: Picard confronts his death in Q’s limbo
  description: "\n  In Q’s limbo—a disorienting white void—Picard, already reeling\
    \ from Q’s claim that he is dead, demands answers. Q forces him to confront the\
    \ reality of his mortality by demonstrating the absence of a heartbeat, shattering\
    \ Picard’s denial. The confrontation escalates when Q conjures Picard’s disapproving\
    \ father, Maurice, who reiterates his long-standing disapproval of Picard’s Starfleet\
    \ career, deepening Picard’s existential crisis. Q then reveals the cause of Picard’s\
    \ death—a Lenarian attack—and taunts him with the artificial heart that failed\
    \ him. The scene culminates in a flashback to Picard’s youth, where he witnesses\
    \ his younger self laughing as he is impaled by Nausicaans, a moment Q uses to\
    \ expose Picard’s regret over his past arrogance and the irreversible consequences\
    \ of altering his timeline. The event serves as a turning point, forcing Picard\
    \ to grapple with the finality of death and the weight of his past choices, while\
    \ Q manipulates him toward a reckoning with his identity and legacy.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e15
  scene_sequence: 3
  sequence_in_scene: 4
  key_dialogue: &id005
  - |-
    PICARD: What's going on, Q?
    Q: I told you. You're dead. This is the afterlife. And I'm God.
  - |-
    Q: Check your heart rate. Go ahead.
    PICARD: (hesitates, then puts a hand to his throat, reacts with shock) No pulse? What a surprise.
    PICARD: How do I know this isn't another one of your tricks?
    Q: Think, Jean-Luc. Why would I go to all the trouble of faking your death when I could simply kill you whenever I felt like it?
  - |-
    PICARD: (quiet) I regret a great many things from those days...
    Q: Really?
    PICARD: (finally admitting) I regret a great many things from those days...
  - |-
    PICARD: (looking at the artificial heart) If I had been more responsible at that age... I wouldn't have needed this heart... and I wouldn't have died from a random energy surge thirty years later.
    Q: So if you had it to do all over again... ?
    PICARD: (quiet) Things would be different...
