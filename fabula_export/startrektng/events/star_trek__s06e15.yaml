  key_dialogue: &id019
  - 'MARTA: Bravo! Bravo!'
  - 'PICARD: Cortan? Cortan Zweller?'
  - 'Q: Attention on deck, Ensign Picard!'
  - 'PICARD: I don’t look it.'
  - 'Q: You mortals can be so obtuse. Why do you persist in believing that life and
    death are such static and rigid concepts?'
  - 'PICARD: I won’t alter history.'
  - 'Q: You’re not that important.'
