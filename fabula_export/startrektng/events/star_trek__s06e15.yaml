- fabula_uuid: cand_evt_scene_48be2d02b8a6b0f5_01
  global_id: null
  title: Picard rejects Corey’s revenge plan
  description: "\n  In Picard’s quarters, Corey—still seething from his humiliation\
    \ at Dom-Jot—confronts Picard and Marta with a plan to retaliate against the Nausicaan\
    \ who cheated him. Corey insists the Nausicaan used a magnetic device to rig the\
    \ game, and he demands Picard’s support for violent payback, framing it as a matter\
    \ of Starfleet honor. Picard, however, refuses outright, invoking his oath and\
    \ warning of the Nausicaans’ lethal reputation. His refusal shocks Corey, who\
    \ accuses him of cowardice and abandonment of their shared past. Marta, initially\
    \ conflicted, ultimately sides with Picard, creating a rift with Corey and exposing\
    \ the widening moral divide between them. The confrontation ends with Corey storming\
    \ out, his friendship with Picard fractured. The moment also sparks unspoken romantic\
    \ tension between Marta and Picard, as she admires his newfound maturity. Before\
    \ the scene resolves, Q arrives, taunting Picard with news that Corey has ignored\
    \ his advice and is now rigging the Dom-Jot table himself, forcing Picard to act.\
    \ The exchange underscores the irreversible consequences of Picard’s choices—both\
    \ in his past and present.\n  "
