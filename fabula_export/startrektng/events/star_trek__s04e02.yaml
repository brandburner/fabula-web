  title: Worf Rejects Human Affection in Ten Forward
  description: "\n  In Ten Forward, Worf’s human adoptive parents, Sergey and Helena\
    \ Rozhenko, attempt to express their pride in his Starfleet career, only for Worf\
    \ to abruptly shut them down, demanding emotional restraint. His cold dismissal—‘Mother,\
    \ Father... I wish you would be a little more reserved while you’re aboard’—exposes\
    \ the unresolved cultural rift between them. After Worf leaves to attend to duty,\
    \ Helena and Sergey voice their deep-seated fear that Worf believes they cannot\
    \ truly understand him due to their humanity. Guinan intervenes, reassuring them\
    \ that Worf’s occasional human gestures (like his secret fondness for prune juice)\
    \ reveal his unspoken bond with them. The scene underscores Worf’s struggle to\
    \ reconcile his Klingon identity with the human love he cannot fully embrace,\
    \ while also highlighting his parents’ quiet, enduring devotion despite his emotional\
    \ distance.\n  "
