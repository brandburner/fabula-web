    emotional_state: 'Surface: Cold and controlled, masking deep discomfort and conflict.
      Internal: Torn between love for his parents and the need to uphold Klingon honor,
      with a underlying fear of losing himself in human emotion.'
    goals:
    - Maintain Klingon stoicism and control over the reunion to avoid appearing weak.
    - Minimize physical affection to preserve his warrior identity, despite his love
      for his parents.
    what_happened: Worf stands rigidly in the transporter room, his Klingon stoicism
      visibly strained as he awaits his adoptive parents' arrival. His initial growled
      impatience ('My mother is never on time. It is so... human... of her.') reveals
      his internal conflict between Klingon discipline and human affection. When the
      Rozhenkos materialize, his face briefly softens into a rare, unguarded smile
      and he greets them with a quiet 'Hello, mother... father.' However, his body
      stiffens as Helena embraces him, and his responses to Sergey’s teasing become
      clipped and defensive ('No.'). His attempt to control the visit by limiting
      their tour ('We are in the midst of repair.') betrays his fear of vulnerability,
      and he exits abruptly, his posture tense and his expression unreadable.
