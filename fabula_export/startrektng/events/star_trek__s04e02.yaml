  global_id: null
  title: Brothers Reconcile in the Vineyard
  description: "\n  After their physical altercation, Picard and Robert collapse into\
    \ exhausted laughter, their mud-streaked faces mirroring the childlike vulnerability\
    \ beneath their adult resentments. The moment shifts from playful to profound\
    \ as Picard confesses the depth of his Borg trauma—his failure to resist, his\
    \ self-loathing, and the haunting weight of what he was forced to do. Robert’s\
    \ response, though blunt, cuts through Picard’s self-recrimination with brutal\
    \ honesty: *‘So, Jean-Luc Picard is human after all.’* The brothers help each\
    \ other up, their shared struggle now a bridge rather than a divide. Robert’s\
    \ arm around Picard’s shoulder is a wordless acknowledgment of their fractured\
    \ bond, while his final quip—*‘I still don’t like you’*—reveals the lingering\
    \ tension beneath their reconciliation. The scene marks a turning point, where\
    \ Picard’s post-Borg identity crisis finds tentative resolution in familial connection,\
    \ and Robert’s role as both critic and caretaker is solidified. Their walk back\
    \ to the house, side by side, symbolizes the restoration of trust, even if their\
    \ relationship remains imperfect.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e02
  scene_sequence: 15
  sequence_in_scene: 30
  key_dialogue: &id013
  - |-
    PICARD: You were asking for it, you know.
    ROBERT: Yes, but you needed it. You have been terribly hard on yourself.
  - |-
    PICARD: They took everything I was. They used me to kill and destroy. And I could not stop them. I should have been able to stop them.
    ROBERT: So, Jean-Luc Picard is human after all.
  - |-
    ROBERT: This is going to be with you a long time, Jean-Luc. A long time. And you have to learn to live with that. You have a simple choice now—living with it below the sea with Louis or above the clouds on your Enterprise.
    PICARD: Maybe I did come back so you’d look after me.
    ROBERT: I still don’t like you.
