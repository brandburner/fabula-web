    \ pride, marking a subtle shift in his acceptance of their bond. Sergey’s offhand\
    \ mention of stolen ship schemats—‘I have all the specs and diagrams at home’—is\
    \ the event’s narrative bomb: a casual line that foreshadows his civilian obsession\
    \ with Starfleet and the potential liability of his unauthorized knowledge. Helena’s\
    \ urgency to leave (‘It’s time to go’) underscores the tension between Sergey’s\
    \ defiance and the family’s need to maintain appearances. Picard’s reaction—a\
