      eagerness and Helena’s gentle but firm correction, forcing him into a role he
      resists: the son, not the Klingon warrior. His final line—''We are in the midst
      of repair. I will not be able to give you a complete tour.''—is delivered with
      clipped precision, a thinly veiled attempt to regain control and escape the
      emotional exposure.'
