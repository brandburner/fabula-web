    emotional_state: 'A toxic cocktail of schadenfreude and wounded pride—he’s gotten
      what he wanted (Picard’s loss of control), but the physical pain and humiliation
      sting. His smirk fades as he realizes the depth of Picard’s rage, and for the
      first1st time, he glimpses the man his brother has become: not the untouchable
      hero, but someone as broken as he is.'
    goals:
    - To force Picard to acknowledge his abandonment of the family and his own complicity
      in their rift.
    - To assert dominance in their relationship, proving that Picard is not the infallible
      figure he pretends to be.
    what_happened: 'Robert stands his ground, his posture rigid with defiance as he
      fires his final verbal volley: *‘Did you come back because you need me to look
      after you again…?’* The question is a dagger, designed to reduce Picard to the
      helpless child Robert once bullied. His face is a mask of smug triumph—until
      Picard’s fist connects with his jaw. The impact sends him reeling backward,
      his body crashing into the dense brush with a grunt of pain. He lands in a tangle
      of limbs and foliage, his expression shifting from shock to something darker:
      a mix of humiliation and grim satisfaction, as if he’s finally provoked the
      reaction he’s always wanted.'
