acts:
- fabula_uuid: act_e04b5b8492c5cc2f
  number: 1
  summary: The first act introduces the core conflicts for both Captain Picard and
    Lieutenant Worf. Picard, still recovering from his assimilation by the Borg, decides
    to visit his family vineyard in France, a place he has avoided for two decades.
    Counselor Troi notes his avoidance of home, suggesting he seeks to find himself
    after his trauma. Simultaneously, on the Enterprise, Commander Riker informs Worf
    of his adoptive human parents' impending visit. Worf reacts with deep discomfort
    and a sense of impropriety, revealing his struggle with his Klingon honor and
    human upbringing. Upon their arrival, Worf's parents, Sergey and Helena Rozhenko,
    immediately embarrass him with open affection and casual human customs, further
    highlighting his internal conflict. Meanwhile, Picard arrives at his ancestral
    home, encountering his curious nephew, Rene, who is fascinated by Starfleet. Picard
    then meets his sister-in-law, Marie, who offers a warm welcome. The act culminates
    in Picard's tense reunion with his brother, Robert, whose formal and distant demeanor
    immediately establishes their long-standing strained relationship, rooted in their
    differing life paths and Robert's resentment of Picard's Starfleet career and
    perceived arrogance. The physical distance between them as Picard leaves Robert
    to his work foreshadows their emotional chasm.
