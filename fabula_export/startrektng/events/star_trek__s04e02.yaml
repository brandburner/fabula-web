- fabula_uuid: cand_evt_scene_8599e6f81fdf3c4b_02
  global_id: null
  title: Picard’s Hollow Homecoming
  description: Picard returns to his family vineyard, where Marie’s warm but cautious
    welcome contrasts with Robert’s detached indifference. The exchange reveals the
    unspoken fractures in the Picard family—Marie’s forced optimism masks her awareness
    of the brothers’ estrangement, while Robert’s cold formality (excusing himself
    to tend a 'sick vine') underscores his lingering resentment. Picard’s nostalgia
    for the unchanged estate clashes with the emotional distance between him and Robert,
    foreshadowing deeper confrontations. René’s youthful enthusiasm for Starfleet
    further highlights the generational and ideological divide, as Picard’s presence
    disrupts the family’s fragile equilibrium. The scene establishes the vineyard
    as a battleground for unresolved tensions, where the past’s weight threatens to
    suffocate any chance of reconciliation.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e02
  scene_sequence: 6
  sequence_in_scene: 12
  key_dialogue: &id009
  - 'MARIE: Jean-Luc! ... It''s so good to finally meet you. How are you feeling?'
  - 'PICARD: Just fine.'
  - 'MARIE: Well, Robert and I are delighted you''ve come to stay with us. ... I won''t
    hear of it. It''s your home. It will always be your home.'
  - 'PICARD: No. In fact, the amazing thing is how little it has changed. Everything
    is exactly as I remember it... the hills, the house, every rock and stone looks
    untouched by the passage of time.'
  - 'MARIE: Robert''s worked hard to keep it that way. It''s very important to him.'
  - 'PICARD: As it was to our father.'
  - 'RENE: Someday I''m going to be a starship captain!'
  - 'PICARD: (grins, to himself) Even you, Uncle... you look so much like Robert when
    he was your age...'
  - 'ROBERT: So, you''ve arrived all right. Welcome home, Captain.'
  - 'PICARD: Hello, Robert.'
  - 'ROBERT: Did you shuttle out from the village?'
  - 'PICARD: No... I decided to walk.'
  - 'PICARD: It''s... good to see you.'
  - 'ROBERT: (inclines head toward house) Make yourself at home. You know where everything
    is... we eat at eight. I''ll be in in a minute. I''ve got to save this poor, sick
    vine.'
