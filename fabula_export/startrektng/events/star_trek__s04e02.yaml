  sequence_in_scene: 25
  key_dialogue:
  - |-
    SERGEY: Are we disturbing you?
    WORF: No. I thought you were going to your quarters to sleep.
    HELENA: We just came by to tuck you in.
  - |-
    SERGEY: We had to come. After we read your letter... about your discommendation from the Klingons... of course, we had to come.
    HELENA: We don't exactly understand it all... We don't have to. We know what kind of man you are... Whatever you did, we know it was for a good reason.
    WORF: My reasons can never be told.
  - |-
    HELENA: I'm sorry if this is too human of us... but whenever you are suffering, you must remember... we are with you.
    SERGEY: And that we're proud of you, and love you.
    HELENA: You're our son.
