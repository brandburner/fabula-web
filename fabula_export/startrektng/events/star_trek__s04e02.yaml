- fabula_uuid: cand_evt_scene_18d62dfea13e3ced_01
  global_id: null
  title: Marie restores order after brotherly fight
  description: Marie enters the Picard home to find Jean-Luc and Robert covered in
    mud, their physical altercation evident from the trail of dirt and Robert’s bruised
    chin. Though they deflect with childlike excuses—claiming they both 'fell'—Marie’s
    sharp instincts cut through their evasion. Her reprimand isn’t just about the
    mess; it’s a pointed reminder of their shared history and the unspoken rules of
    the family. The brothers’ laughter at her reference to their father’s discipline
    reveals their lingering bond, but Marie’s insistence on cleanup forces them to
    confront the aftermath of their conflict. Picard’s abrupt decision to leave—citing
    duty to the *Enterprise*—is met with Marie’s quiet authority, grounding the scene
    in the tension between familial duty and personal calling. The moment underscores
    Marie’s role as the household’s disciplinarian and the fragile reconciliation
    between the brothers, now marked by unspoken understanding rather than resolution.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e02
  scene_sequence: 16
  sequence_in_scene: 31
  key_dialogue:
  - |-
    MARIE: What in the world... ?
    MARIE: What happened here?
  - |-
    MARIE: Have you two been fighting?
    ROBERT: Fighting? Oh, you mean this. There's a perfectly good explanation for this...
  - |-
    MARIE: Shame on you both. What would your father say if he saw you like this?
    PICARD: He'd probably send us to bed without our supper.
  - |-
    MARIE: You can't leave yet.
    PICARD: I'm sorry. I must.
    MARIE: You're not leaving until you clean up this mess... both of you...
