- fabula_uuid: cand_evt_scene_718e580c4500fdc7_01
  global_id: null
  title: Wesley confronts his father’s hologram
  description: "\n  In a dimly lit holodeck, Wesley Crusher activates a long-dormant\
    \ holographic recording of his late father, Jack, expecting to see the towering,\
    \ legendary figure from his childhood memories. Instead, the program materializes\
    \ a younger, vibrant version of Jack—barely older than Wesley himself—wearing\
    \ a lieutenant’s uniform and radiating youthful confidence. The hologram delivers\
    \ a heartfelt, self-aware monologue, acknowledging his inexperience as a father,\
    \ his devotion to Starfleet, and the proud but flawed legacy of the Crusher family.\
    \ Wesley listens intently, not just to the words but to the man behind them, searching\
    \ for traces of the father he barely knew. As Jack’s message concludes with a\
    \ tender declaration of love, the hologram dissolves abruptly, leaving Wesley\
    \ alone in the darkness. The moment forces him to grapple with the emotional weight\
    \ of his father’s absence, the unfulfilled connection between them, and the legacy\
    \ of a man who, despite his flaws, loved him deeply. The scene underscores Wesley’s\
    \ unresolved grief and the bittersweet nature of inherited identity, framing his\
    \ father not as an idealized figure but as a complex, human presence whose influence\
    \ lingers beyond death.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e02
  scene_sequence: 18
  sequence_in_scene: 34
  key_dialogue:
  - 'JACK: Hello, Wesley. As I make this recording, you''re just ten weeks old. I
    want you to know who I am today. This Jack Crusher won''t exist by the time you''re
    grown up... I''ll be older, more experienced... hopefully a little wiser. But
    this person will be gone, and I wanted you to know who I am now, who your father
    was when you came into this world.'
  - 'JACK: I see you lying there in your crib... and I realize that I don''t know
    the first thing about being a father. So let me just apologize for all the mistakes
    I''m about to make as you grow up. I hope you don''t grow up resenting the fact
    that I was gone so much. That comes with this uniform.'
  - 'JACK: You''re only a baby... but it''s remarkable. I see in your face all the
    people I''ve loved in my lifetime... your mother... my father and mother... our
    family. I see me in you, too. I can feel that you''re my son. There''s this connection,
    this bond... I will always be a part of you, Wes... I love you, Wesley.'
