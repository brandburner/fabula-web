      rigid as he awaits his parents'' arrival. When they materialize, his face briefly
      softens with unguarded love—a rare, vulnerable moment—but he quickly suppresses
      it, stiffening as Helena embraces and kisses him. He exchanges stiff, formal
      greetings with Sergey, his discomfort growing as his father’s enthusiasm and
      nostalgia clash with his own cultural reserve. Worf’s attempts to redirect the
