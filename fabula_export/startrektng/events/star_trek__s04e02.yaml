  title: Picard announces his departure
  description: Marie returns home to find Picard and Robert covered in mud, their
    physical altercation from earlier now exposed. The brothers, caught in a moment
    of childlike guilt, deflect with humor, but Marie’s sharp reprimand cuts through
    their evasion. Picard, having resolved his internal conflict through the confrontation,
    abruptly declares his decision to cancel his meeting with the Atlantis project
    and return to the *Enterprise*. His farewell to Robert is wordless but charged—an
    unspoken truce that acknowledges their unresolved history while signaling Picard’s
    recommitment to Starfleet. The moment hinges on Marie’s insistence on order (cleaning
    the mess) as a metaphor for the unresolved tensions between the brothers, which
    Picard now leaves behind—temporarily, at least—while Robert’s quiet acceptance
    hints at a fragile reconciliation. The scene functions as a turning point, where
    Picard’s emotional withdrawal from his family is framed as both a retreat and
    a reaffirmation of his identity.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e02
  scene_sequence: 16
  sequence_in_scene: 32
  key_dialogue:
  - |-
    MARIE: What in the world... ?
    ROBERT: Ah...
    PICARD: It's entirely my fault, Marie...
    ROBERT: Yes, you see, he fell... and then I fell...
    PICARD: We both fell together...
  - |-
    MARIE: Have you two been fighting?
    ROBERT: Fighting? Oh, you mean this. There's a perfectly good explanation for this...
    MARIE: Shame on you both. What would your father say if he saw you like this?
    PICARD: He'd probably send us to bed without our supper.
  - |-
    PICARD: The ship will be ready to leave orbit soon... and I belong on board.
    (beat, then to Robert)
    If I ever doubt that again... I know where to come.
