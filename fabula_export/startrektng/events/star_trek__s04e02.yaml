- fabula_uuid: cand_evt_scene_6a959c461e1220c4_03
  global_id: null
  title: Worf’s parents arrive, exposing his cultural divide
  description: 'Worf’s adoptive parents, Sergey and Helena Rozhenko, materialize in
    the *Enterprise*’s transporter room, their warm but culturally alien greetings—Helena’s
    embrace and Sergey’s nostalgic Starfleet reminiscences—immediately clash with
    Worf’s Klingon stoicism. His visible discomfort (stiffening at Helena’s kiss,
    glancing at O’Brien for validation) underscores the unresolved tension between
    his human past and Klingon identity. Helena subtly corrects Sergey’s social missteps
    (e.g., his enthusiasm for touring the ship), reinforcing the cultural and emotional
    friction. The moment reveals Worf’s love for them beneath his gruff exterior but
    also his struggle to reconcile their human affection with his Klingon pride. O’Brien’s
    awkward attempt to relate ("Last time my old man came on board...") highlights
    the universal awkwardness of parental visits, but Worf’s dismissal ("Unlikely")
    underscores his isolation. The scene sets up Worf’s internal conflict: he cannot
    fully reject their love, yet their presence forces him to confront the parts of
    himself he’s tried to bury.'
