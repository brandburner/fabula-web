- fabula_uuid: act_b3bd96084482eed4
  number: 4
  summary: 'Act Four brings the emotional climaxes for both Worf and Picard. Beverly
    finally gives Wesley Jack''s holographic message, a poignant moment of connection
    between mother and son, setting the stage for Wesley''s personal journey. In Worf''s
    quarters, his parents visit, expressing profound and unconditional love. They
    reveal they came because they understood he was in trouble after reading about
    his discommendation, and despite not fully comprehending Klingon honor, they are
    proud of him and will always be with him. Worf, overwhelmed by their unwavering
    support, embraces them in a rare display of vulnerability, solidifying their bond
    as a family unit. Concurrently, at the Picard home, a heated confrontation erupts
    between Jean-Luc and Robert. Robert relentlessly provokes Picard, questioning
    his changes, accusing him of arrogance, and digging at his past achievements and
    perceived failures. The verbal sparring escalates into a physical fight in the
    vineyard, an awkward but cathartic release of years of bottled-up resentment.
    As they lie in the mud, laughing, Picard finally breaks down, confessing his deep
    guilt and helplessness over his time as Locutus, admitting he felt weak and inadequate.
    Robert, witnessing his brother''s raw vulnerability, offers understanding and
    acceptance, telling Picard he must learn to live with his trauma and presenting
    him with a clear choice: a life below the sea with Louis or above the clouds on
    his Enterprise. This moment marks a profound shift in their relationship, moving
    from animosity to a newfound, albeit complex, brotherly bond.'
  key_moments: []
  scene_numbers:
