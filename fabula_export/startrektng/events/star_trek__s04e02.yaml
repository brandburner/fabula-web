  key_dialogue:
  - |-
    RIKER: You didn't know?
    WORF: No, sir. (beat as he struggles with answer) It is... inappropriate for a Klingon to receive his family while on duty. As humans, my parents do not understand.
  - |-
    RIKER: I'm sure we can arrange for you to have more off-duty time while they're here.
    WORF: (too quickly) No... sir. That will not be necessary.
  - |-
    RIKER: Worf, if you're worried they might learn about what happened on the Klingon planet...
    WORF: Not at all, sir. I have already informed them in correspondence of my discommendation. I do not believe any human can truly understand my dishonor.
