- fabula_uuid: cand_evt_scene_6a959c461e1220c4_02
  global_id: null
  title: Worf’s parents arrive, exposing his identity crisis
  description: 'Worf’s adoptive parents, Sergey and Helena Rozhenko, materialize in
    the *Enterprise*’s transporter room, their warm but culturally alien greetings—Helena’s
    embrace and Sergey’s nostalgic Starfleet reminiscences—immediately clash with
    Worf’s rigid Klingon demeanor. His visible discomfort (stiffening at Helena’s
    kiss, dismissing Sergey’s enthusiasm) underscores the unresolved tension between
    his Klingon pride and his human past. The scene reveals Worf’s internal conflict:
    while he loves his parents (his face softens at first sight of them), he resists
    their human affection, symbolized by his abrupt attempt to expedite their departure.
    Helena’s subtle correction of Sergey—‘We came to see Worf. Not the ship.’—exposes
    the deeper issue: Worf’s struggle to reconcile his Klingon identity with the unconditional
    love of his human family, a tension that will later erupt in his discommendation
    and broader arc of self-acceptance. The sterile transporter room setting amplifies
    the emotional friction, while O’Brien’s failed attempts to relate (his joke about
    ‘women’) highlight Worf’s isolation. This moment is a turning point, forcing Worf
    to confront the cultural and emotional divide he’s spent years suppressing.'
