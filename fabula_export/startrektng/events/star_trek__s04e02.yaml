- fabula_uuid: act_b5b0f42f8d9d9c4b
  number: 2
  summary: Act Two deepens the personal struggles of the characters, particularly
    focusing on the impact of parental figures. Beverly Crusher discovers a holographic
    message from her deceased husband, Jack, intended for their son, Wesley. She grapples
    with the emotional weight of giving it to Wesley, fearing it might cause more
    harm than good, but Counselor Troi encourages her to allow Wesley to connect with
    his father's memory. On the Enterprise, Worf endures further embarrassment as
    his parents recount childhood stories to Geordi La Forge, highlighting his struggle
    with their human customs versus his Klingon identity. Sergey later expresses concern
    about Worf to Geordi, indicating a deeper parental worry despite the cultural
    disconnect. The act's central dramatic sequence unfolds during a family dinner
    at the Picard home. The meal is fraught with underlying tension as Robert subtly
    criticizes Picard's Starfleet life and modern technology, contrasting it with
    his own traditional values. Robert's resentment surfaces when Rene shares his
    starship report, reigniting old sibling rivalries and accusations of Picard's
    arrogance. Robert bitterly warns Picard against encouraging Rene's interest in
    Starfleet, revealing his desire to protect his son from a path he views as destructive,
    and accusing Picard of neglecting his own family responsibilities. The act concludes
    with the brothers locked in a cold stare, their unresolved conflicts palpable.
