    - To find some closure or connection with his father, even if it is only through
      a holographic recording.
    what_happened: Wesley stands in the dimly lit holodeck, his gaze fixed on the
      holographic projection of his father. Initially, he is taken aback by the youthful
      appearance of Jack, which challenges his idealized memories. As Jack’s monologue
      unfolds, Wesley listens intently, his expression a mix of curiosity, longing,
