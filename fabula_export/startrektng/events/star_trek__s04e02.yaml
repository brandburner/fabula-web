- fabula_uuid: cand_evt_scene_309a7d19614c2475_01
  global_id: null
  title: Worf Rejects Riker’s Offer of Time Off
  description: "\n  In the Enterprise’s observation lounge, Commander Riker reviews\
    \ refit reports when Worf enters to deliver an efficiency update on phaser upgrades\
    \ and power supply calibration. Riker praises Worf’s work but casually mentions\
    \ Worf’s adoptive parents, the Rozhenkos, are on the visitors’ list—a surprise\
    \ Worf clearly doesn’t welcome. When Riker suggests arranging extra off-duty time\
    \ for Worf to spend with them, Worf refuses abruptly, insisting it’s ‘inappropriate’\
    \ for a Klingon to receive family while on duty. Riker presses, noting the Enterprise\
    \ isn’t a Klingon ship, but Worf doubles down, dismissing the idea entirely. The\
    \ tension escalates when Riker hints at Worf’s discommendation, but Worf shuts\
    \ down the conversation, insisting his parents can’t grasp his dishonor. The exchange\
    \ underscores Worf’s internal conflict: his Klingon duty clashes with his human\
    \ family’s affection, and his rigid professionalism masks deeper shame. The scene\
    \ contrasts Worf’s disciplined exterior with his unresolved turmoil, reinforcing\
    \ the duality of his identity and the Enterprise’s dual narrative arcs—Picard’s\
    \ recovery and Worf’s struggle for self-acceptance.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e02
  scene_sequence: 2
  sequence_in_scene: 2
  key_dialogue:
  - 'RIKER: Here''s the final schedule for shore leave and personnel transfers. By
    the way, I''m looking forward to meeting your parents.'
  - 'WORF: No... sir. That will not be necessary.'
  - 'RIKER: Worf, if you''re worried they might learn about what happened on the Klingon
    planet...'
  - 'WORF: Not at all, sir. I have already informed them in correspondence of my discommendation.
    I do not believe any human can truly understand my dishonor.'
