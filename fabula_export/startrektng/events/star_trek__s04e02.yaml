- fabula_uuid: cand_evt_scene_7f78a7eb235c353c_02
  global_id: null
  title: Parents confront their fear of Worf’s distance
  description: "\n  In the quiet, after-hours solitude of Ten Forward, Worf’s human\
    \ adoptive parents—Sergey and Helena Rozhenko—attempt to connect with their son,\
    \ only to be met with his characteristic emotional restraint. When Worf abruptly\
    \ leaves to attend to duty, the parents are left exposed in their vulnerability,\
    \ their shared glance revealing decades of unspoken worry. Guinan’s arrival provides\
    \ an unexpected opportunity for reflection, as she gently probes their relationship\
    \ with Worf, revealing their deep-seated fear that their humanity makes them unworthy\
    \ of his trust. Helena’s confession—*‘I’m afraid Worf thinks we don’t understand\
    \ him… because we’re human’*—exposes the emotional chasm between Klingon values\
    \ and human connection, while Sergey’s admission that they *‘let him discover\
    \ his heritage for himself’* underscores their deliberate but painful approach\
    \ to parenting a Klingon son. Guinan’s reassurance—that Worf’s quiet moments in\
    \ Ten Forward reveal his true home is with *them*—offers a fragile but hopeful\
    \ counterpoint to their insecurity. This exchange serves as a turning point, forcing\
    \ the parents to confront their own fears while hinting at Worf’s unresolved internal\
    \ conflict: his struggle to reconcile his Klingon identity with the unconditional\
    \ love of the family who chose him.\n  "
