      \ avoid emotional engagement, declaring, 'I’ve got to save this poor, sick vine'\
      \ as he dismisses Picard. The vine’s ailment mirrors the **ailing bond between\
      \ the brothers**—something that requires tender, sustained care but is instead\
      \ neglected in favor of deflection and coldness. Its presence in the scene is\
      \ **highly functional**: it grounds Robert’s traditionalism in the physical\
      \ world of the vineyard, while also serving as a barrier to reconciliation.\
      \ The vine’s 'sickness' is never explicitly described, but its role is clear:\
      \ it is a **metaphor for the family’s unresolved trauma**, and Robert’s focus\
      \ on it underscores his refusal to tend to the deeper emotional wounds.\n  \
      \    "
    status_before_event: "\n        The vine is visibly ailing, its leaves possibly\
      \ wilting or its branches looking brittle. It is kneeling-level to Robert, who\
