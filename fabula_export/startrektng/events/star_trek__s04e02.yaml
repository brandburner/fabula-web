- fabula_uuid: act_92de5901a375285c
  number: 3
  summary: Act Three presents a significant turning point for Picard and offers a
    moment of understanding for Worf's parents. Picard walks through the vineyard
    with his old friend, Louis, who observes Picard's lifelong pursuit of the future
    compared to Robert's adherence to the past. Louis, now a supervisor on the Atlantis
    underwater exploration project, reveals the project needs a director and subtly
    suggests Picard for the role. This offer deeply unsettles Picard, causing him
    to question his conviction about remaining in Starfleet and leaving him with a
    hollow feeling. Meanwhile, in Ten Forward, Worf's parents discuss their son with
    Guinan. They express their concern that Worf believes they do not understand him
    due to their human nature. Guinan, with her unique insight, assures them that
    despite Worf's Klingon exterior and struggles, he deeply loves and appreciates
    them, and that his true 'home' is with them. Back at the Picard home, Marie encourages
    Picard to consider the Atlantis project, envisioning his return home. Robert enters,
    and Louis, misinterpreting Picard's interest, reveals he has already set up a
    meeting with the board of governors for Picard. This unexpected development leaves
    Picard feeling trapped and defeated, pulled between his past and a potential new
    future, and deeply conflicted about his identity and purpose. He stands alone
    on the empty grounds, a lost man.
  key_moments: []
  scene_numbers:
