- fabula_uuid: cand_evt_scene_6a959c461e1220c4_01
  global_id: null
  title: Worf’s human family arrives
  description: In the sterile transporter room, Worf’s discomfort with his adoptive
    parents’ visit surfaces as he waits with O’Brien. His growled impatience—‘My mother
    is never on time. It is so... human... of her’—reveals his internal conflict between
    Klingon stoicism and human affection. When the Rozhenkos materialize, Worf’s initial
    unguarded love for them (a rare, fleeting smile) is immediately suppressed as
    Helena’s embrace and Sergey’s jovial Starfleet nostalgia force him into rigid
    formality. His stiffened posture and clipped responses (‘No.’) to Sergey’s teasing
    about weight gain and holodeck training underscore his struggle to reconcile his
    Klingon identity with their human warmth. O’Brien’s failed attempts to bond (‘I
    know what you mean, Lieutenant’) highlight Worf’s isolation, while Sergey’s pride
    in Worf’s commission (‘Chief, can you imagine an old enlisted man like me raising
    a boy to be an officer?’) contrasts sharply with Worf’s visible discomfort. The
    scene culminates in Worf’s abrupt exit, his attempt to control the visit by limiting
    their tour (‘We are in the midst of repair’) betraying his fear of vulnerability.
    The Rozhenkos’ unconditional love—Helena’s tactful observation about his hair—further
    exposes the tension between his Klingon pride and their human connection, setting
    up his ongoing identity crisis.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e02
