  title: Beverly gives Wesley his father’s message
  description: 'In Beverly’s office, she hands Wesley a holographic disk containing
    a final message from his deceased father, Jack, recorded shortly after Wesley’s
    birth. Beverly’s professional warmth masks her grief, while Wesley’s excitement
    is tempered by hesitation—he’s eager to connect with his father but also wary
    of the emotional weight. The exchange is charged with unspoken tension: Beverly’s
    hesitation in explaining the message’s contents suggests she knows its significance
    but respects Jack’s wish for Wesley to hear it firsthand. Wesley’s brief, wordless
    embrace before leaving underscores the fragility of their bond in this moment
    of inherited loss. The event serves as a turning point, directly leading to Wesley’s
    activation of the hologram in the Holodeck, where he will finally confront his
    father’s legacy.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e02
  scene_sequence: 11
  sequence_in_scene: 22
  key_dialogue:
  - 'WESLEY: What kind of message?'
  - 'BEVERLY: I don''t know exactly. Your father made it a few weeks after you were
    born.'
  - 'WESLEY: Why?'
  - 'BEVERLY: He thought it was important to say certain things... to make sure he
    didn''t forget to tell you later.'
  - 'BEVERLY: He wanted you to have this when you turned eighteen... and I want you
    to have it too.'
