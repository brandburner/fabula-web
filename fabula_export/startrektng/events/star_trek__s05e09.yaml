    - To conceal his true identity as a thief and fraud, maintaining the historian
      facade to avoid immediate consequences from the *Enterprise* crew.
    what_happened: Rasmussen stands in the cramped, high-tech time-pod, his back nearly
      pressed against the exposed trays of stolen *Enterprise* technology. He raises
      a malfunctioning phaser at Data, his hand trembling slightly as he threatens
      to stun the android. His voice shifts from condescending flattery to panicked
      desperation as he confesses his true identity as a 22nd-century inventor and
