  key_dialogue:
  - 'RASMUSSEN: So you''ve made your choice after all... and without my help.'
  - 'PICARD: Quite the contrary, Professor. You''ve been quite helpful. By your refusing
    to assist me, I''m left with the same choice I began with; to try or not to try...
    to run the risk or to play it safe. But your arguments have reminded me how precious
    the right to choose can be... that right or wrong, the choice is mine. And since
    I''ve never been much for playing it safe... I choose to try.'
  - 'PICARD: Program the firing sequence, Mister Data.'
