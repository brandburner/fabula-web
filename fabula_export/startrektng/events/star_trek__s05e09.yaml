- fabula_uuid: cand_evt_scene_b40f56a709a0f813_01
  global_id: null
  title: Picard records colony leaders' fatalistic consent
  description: "\n  In a private log entry, Picard formally documents the Penthara\
    \ Four colony leaders' unanimous decision to accept a high-risk intervention—despite\
    \ its potentially catastrophic consequences. The log serves as both a record of\
    \ their fatalistic resolve and a moment of moral reckoning for Picard, who must\
