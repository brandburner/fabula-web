      of Rasmussen’s crimes**. Normally **slid into a rack**, the trays are **left
      open**, their contents **gleaming under the pod’s stark lights**, creating a
      **visually striking tableau of theft**. The trays’ **organization**—with tricorders,
      medical devices, Geordi’s visor, and even barware **sorted into piles**—reveals
      Rasmussen’s **methodical but indiscriminate** approach to stealing. Their **exposure**
      makes the theft **undeniable**, and Data’s **immediate notice** of their contents
      forces Rasmussen to **draw his phaser in desperation**. The trays’ **symbolic
      role** is **damning**: they represent the **accumulation of Rasmussen’s avarice**,
      a **physical record of his betrayal** that will be used to **hold him accountable**.
      Their recovery is **essential** to **restore the *Enterprise*’s stolen property**
      and **prove Rasmussen’s guilt**.'
    status_before_event: 'Exposed and incriminating: the trays are **left open**,
