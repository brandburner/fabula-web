acts:
- fabula_uuid: act_2dea1ba561b4b7ce
  number: 1
  summary: The Enterprise races to Penthara Four, a planet facing a cataclysmic winter
    after an asteroid strike. Geordi and Data assess the dire climatic changes, noting
    a rapid temperature drop. Worf detects an unusual temporal distortion, prompting
    Picard to investigate. The Enterprise encounters a small, advanced spacecraft,
    and Professor Berlinghoff Rasmussen appears on the bridge, claiming to be a 26th-century
    historian. He states he traveled back nearly three hundred years to observe Captain
    Picard. Rasmussen's arrival immediately raises suspicions among the senior staff.
    In the ready room, Rasmussen evades questions about the future, asserting that
    information exchange must be one-way to prevent altering history. He makes cryptic
    remarks about Picard's modesty and the layout of his ready room, demonstrating
    prior knowledge. During a meeting in the Observation Lounge, the crew questions
    Rasmussen's timing and purpose, but he remains vague, hinting at an imminent 'important
    event.' Troi senses he withholds information. Picard, despite the crew's skepticism,
    allows Rasmussen to remain, citing his verified human status, the temporal distortion,
    and his unique vessel. Rasmussen distributes questionnaires, further irritating
    Worf. Data escorts Rasmussen to his quarters, where Rasmussen expresses disappointment
    with the accommodations. Data, curious, asks if he is 'alive' in the 26th century,
    but Rasmussen dismisses the question patronizingly. Rasmussen then pockets a PADD
    from Data's desk, revealing his true, acquisitive nature as he smiles, satisfied
    with his unfolding plans.
  key_moments: []
  scene_numbers:
  - 1
  - 2
  - 3
  - 4
  - 5
- fabula_uuid: act_5ba5a58d84803e98
  number: 2
  summary: The Enterprise arrives at Penthara Four, a planet shrouded in dust clouds
    and experiencing heavy snowfall. Picard, Geordi, and Doctor Moseley discuss the
    plan to release underground carbon dioxide pockets to create a temporary greenhouse
    effect, counteracting the freezing temperatures. Moseley notes the irony of intentionally
    causing a greenhouse effect. Meanwhile, Rasmussen joins Riker, Worf, and Beverly
    in Ten Forward, distributing questionnaires. He makes unsettling remarks about
    the crew's calmness and the imminence of an 'important event,' further fueling
    Worf's dislike and Riker's frustration. Rasmussen cryptically mentions a past
    visit to a 22nd-century vessel, piquing Beverly's scientific curiosity. He checks
    a small ring on his finger, seemingly monitoring time. In Engineering, Geordi
    and Data work on atmospheric data and thermal simulations. Rasmussen enters, hands
    them questionnaires, and shows a particular fascination with Data's efficiency
    and his role in the mission, asking if he can go faster. He then pockets a small
    PADD from a console while Geordi is distracted. Geordi prepares to transport to
    the surface with Data's assistance. On the bridge, Riker oversees the phaser drilling
    operation to release CO2. Rasmussen sits in Riker's command chair, observing the
    process and making comments about witnessing history. As the drilling progresses,
    Data reports elevated CO2 levels and Moseley confirms no further temperature drops.
    The initial phase of the mission appears successful, and Rasmussen quotes a historical
    record of Picard's achievement, confirming his foreknowledge of the outcome.
  key_moments: []
  scene_numbers:
  - 6
  - 7
  - 8
  - 9
  - 10
- fabula_uuid: act_cf92ed2add6ec2c0
  number: 3
  summary: 'In Sickbay, Troi confides in Beverly that Rasmussen is ''after more than
    a history lesson'' and seems to be trying to confuse them. Rasmussen enters, appearing
    overly cheerful, and attempts to engage Beverly in conversation about her questionnaire,
    specifically a neural stimulator. He then confronts Troi, acknowledging her distrust
    but attempting to draw parallels between their unique senses. Troi remains firm
    in her lack of trust, which Rasmussen claims to have predicted. Rasmussen then
    tries to charm Beverly, flattering her curiosity and suggesting he''s never met
    anyone who made him consider not returning to his own time. Beverly, though flattered,
    reminds him of his own rules against influencing the past. On the bridge, alarms
    blare as Worf detects massive earthquakes and volcanic activity on Penthara Four.
    Data confirms the epicenters are beneath the drill sites, indicating the Enterprise''s
    intervention caused the geological instability. Geordi reports from the surface,
    confirming the severity of the quakes and the compounding problem of volcanic
    ash blocking sunlight. Riker shows Picard how the eruption coordinates perfectly
    overlap with the drilling sites, revealing their plan backfired catastrophically.
    Picard grapples with the unintended devastation they have caused. In Data''s quarters,
    Rasmussen, while Data is distracted by a call from Geordi, pockets a tricorder
    from Data''s desk. Data then reports to Picard the new, highly risky plan to ionize
    the atmosphere: a modified phaser blast could convert particles into high-energy
    plasma, but an error of just 0.06 terawatts would incinerate the entire planet''s
    atmosphere. Picard faces an impossible choice, with the stakes dramatically raised.'
  key_moments: []
  scene_numbers:
  - 11
  - 12
  - 13
  - 14
  - 15
- fabula_uuid: act_3cb136c0a4d403d5
  number: 4
  summary: 'Picard, deeply troubled by the escalating crisis and the potential for
    millions of deaths, summons Rasmussen to his ready room. He openly discusses his
    dilemma: do nothing and thousands die, or attempt a risky solution that could
    kill millions. Picard, wrestling with his convictions, hypothetically asks Rasmussen
    for guidance, acknowledging that everything Starfleet stands for tells him not
    to. Rasmussen, however, remains detached and refuses to offer any information,
    arguing against altering history and demonstrating a callous disregard for the
    lives on Penthara Four, stating they are ''dead a long time'' in his future. Picard
    challenges Rasmussen''s ''temporal Prime Directive,'' comparing it to Starfleet''s
    own directive, which he has occasionally disregarded when it was the right thing
    to do. He argues that Rasmussen''s refusal to help is a choice that manipulates
    the future just as much as his own actions. Picard passionately asserts that his
    future is unwritten and he does not ''give a damn'' about Rasmussen''s past. Riker''s
    voice calls, confirming optimal electrostatic conditions for the risky plan, forcing
    Picard''s hand. For a brief moment, Rasmussen''s confident facade cracks, showing
    a trace of remorse as he pleads with Picard not to ask him to help. Picard, after
    a long stare, leaves without Rasmussen''s assistance. As Picard exits, Rasmussen
    quickly pockets a small pile of isolinear chips from a table. On the bridge, Picard
    declares his choice to proceed with the dangerous plan, stating that Rasmussen''s
    refusal to help reinforced his right to choose and his preference for action over
    playing it safe. He orders Data to program the firing sequence, taking full responsibility
    for the decision.'
  key_moments: []
  scene_numbers:
  - 16
  - 17
  - 18
  - 19
- fabula_uuid: act_7135977419a4d982
  number: 5
  summary: 'The Enterprise prepares for the highly dangerous atmospheric ionization.
    Geordi, on the viewscreen from the planet''s surface, insists on remaining below
    to compensate for density variations, despite the extreme risk to his life if
    the plan fails. Picard, after a moment of consideration, grants his permission.
    Rasmussen, observing from the bridge, can barely contain his excitement, confirming
    his foreknowledge of Geordi''s actions. Data activates the deflector beam and
    phasers, initiating the complex sequence. The Enterprise fires multiple beams
    into the dust clouds, followed by a phaser beam that ignites an enormous explosion,
    enveloping the planet in an orange glow. This is quickly replaced by glowing blue
    ''fingers'' and a pillar of blue light that streaks towards the Enterprise. The
    ship absorbs the energy, vibrates intensely, and then redirects an even brighter
    blue beam into deep space, dissipating the planetary glow. The maneuver is successful;
    Penthara Four is saved, with clear skies and sunlight returning. Geordi reports
    from the surface, confirming success and relief. Rasmussen approaches Picard,
    making a final patronizing remark about Picard''s success ''without any help,''
    and prepares to leave. Picard, however, orders Rasmussen''s vessel searched, having
    suspected him due to missing items. In the shuttlebay, Rasmussen attempts to evade
    the search, but Worf threatens to force entry. Rasmussen, panicking, requests
    only Data be allowed inside, knowing Data''s programming will prevent him from
    divulging information. Data enters the vessel and discovers it filled with stolen
    Enterprise technology: tricorders, a neural stimulator, a VISOR, PADDs, and even
    silverware. Rasmussen, aiming a phaser at Data, reveals he is a 22nd-century inventor
    who stole the time-pod from a future historian. He confesses his plan to ''invent''
    the stolen 24th-century technology in his own time. He attempts to stun Data,
    but the phaser, now deactivated by the Enterprise''s sensors, fails. Rasmussen
    is apprehended, his ship disabled. Picard, mimicking Rasmussen''s earlier words,
    confronts him about attempting to alter history. Rasmussen is detained and sent
    to Starbase Two-one-four to face justice, effectively trapped in the 24th century.
    His time-pod shimmers and disappears, leaving him stranded. Picard welcomes him
    to the 24th century.'
