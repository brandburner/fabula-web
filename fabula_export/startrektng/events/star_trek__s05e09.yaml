      retrieval of the neural stimulator, Troi’s role as the ship’s empath, the nurse’s
      obedience to orders—all reflect Starfleet’s protocols and values. However, Rasmussen’s
      manipulations exploit the very trust Starfleet fosters among its officers, using
      flattery and false camaraderie to undermine their unity. The organization’s
      influence is felt in the crew’s divided responses: Troi’s skepticism (rooted
      in her empathic training), Beverly’s professional detachment (eroded by personal
      flattery), and the nurse’s quiet efficiency (a reminder of Starfleet’s ‘no-nonsense’
      ethos). Starfleet’s ideals—loyalty, transparency, protection of the innocent—are
      tested by Rasmussen’s presence, foreshadowing the crew’s later realization of
      his betrayal.'
    active_representation: Via institutional protocol (e.g., Beverly’s medical directives,
      Troi’s empathic role) and the crew’s collective duty to protect the ship and
      its passengers (e.g., the patients in Sickbay). Starfleet is also represented
      by the *absence* of overt institutional oversight—Rasmussen’s ability to manipulate
      the crew suggests a blind spot in Starfleet’s security or vetting processes.
    power_dynamics: Exercising authority over individuals (the crew follows protocol)
      but being challenged by external forces (Rasmussen’s temporal interference and
      thefts). The organization’s power is also constrained by the crew’s personal
      vulnerabilities (e.g., Beverly’s loneliness, Troi’s protective instincts), which
      Rasmussen exploits.
    organizational_goals:
    - To maintain the crew’s unity and professionalism in the face of external threats
      (e.g., Rasmussen’s manipulations).
    - To protect the innocent (patients, civilians) from temporal interference or
      exploitation by outsiders.
    - To uphold the Prime Directive and Starfleet’s ethical codes, even as Rasmussen
      tests their boundaries.
    influence_mechanisms:
    - Through institutional protocol (e.g., medical directives, security clearances,
      chain of command).
    - Through the crew’s personal ethics and training (e.g., Troi’s empathic skepticism,
      Beverly’s professional boundaries).
    - Through the symbolic presence of the ship itself (e.g., Sickbay as a place of
      healing, the patients as reminders of the crew’s duties).
    - Through the threat of consequences (e.g., Rasmussen’s eventual exposure and
