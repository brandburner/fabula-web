  - character_uuid: ger_agent_77e501eb0c73
    emotional_state: "\n        A volatile mix of **panicked defiance** (clinging\
      \ to his phaser as a last resort) and **crushing desperation** (as his lies\
      \ unravel and his escape plan fails). His initial bravado masks deep insecurity,\
      \ and the phaser’s malfunctions trigger a visceral fear of exposure and failure.\
      \ By the end, his emotional state is one of **humiliated vulnerability**, stripped\
      \ of his invented persona and left with nothing but his avarice.\n      "
    goals:
    - To intimidate Data into submission using the phaser, ensuring his own escape
      back to the 22nd century with stolen technology (and potentially Data’s disassembled
      components).
    - To maintain his facade as a 26th-century historian long enough to activate the
      time-pod’s auto-timer and flee before the crew intervenes.
    what_happened: "\n        Rasmussen stands in the cramped time-pod, his back nearly\
      \ pressed against the multifaceted panels as Data examines the stolen Enterprise\
      \ technology. His demeanor shifts from smug condescension to panicked desperation\
      \ when Data questions his motives. He raises a phaser, threatening Data with\
      \ stun settings, but his voice wavers as he admits his true intentions: to dissect\
      \ Data for profit in the 22nd century. When the phaser malfunctions twice, his\
      \ facade crumbles entirely, leaving him exposed as a fraudulent inventor whose\
      \ greed has outpaced his competence. His final glance at his ring—symbolizing\
      \ his failed escape plan—reveals the depth of his desperation.\n      "
