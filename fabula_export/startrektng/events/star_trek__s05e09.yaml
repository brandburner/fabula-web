  title: Rasmussen materializes on the bridge
  description: "\n  The *Enterprise* is en route to Penthara Four to mitigate an asteroid-induced\
    \ climate crisis when Worf detects an anomalous space-time distortion. Picard\
    \ orders a course correction to investigate, revealing a small, unidentifiable\
    \ spacecraft. When hailing attempts yield a cryptic response demanding Picard\
    \ 'move over,' a bright flash materializes Rasmussen—a self-proclaimed 26th-century\
    \ historian—directly in front of the captain. Rasmussen’s sudden appearance disrupts\
    \ the crew’s focus on the planetary crisis, introducing a high-stakes ethical\
    \ dilemma: whether to prioritize the immediate threat to Penthara Four or investigate\
    \ this temporal anomaly. His arrival forces Picard to confront the consequences\
    \ of time manipulation, while his cryptic demeanor and unfamiliar technology immediately\
    \ raise suspicion among the crew. The scene underscores the tension between duty\
    \ and curiosity, as the crew’s reliance on Geordi’s engineering solutions for\
    \ Penthara Four clashes with the unexpected intrusion of a figure from the future.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e09
  scene_sequence: 1
  sequence_in_scene: 1
  key_dialogue: &id001
  - 'WORF: We''ve received a response, sir, but... They want you to... ''Move over,
    sir.'''
  - 'PICARD: Who are you?'
  - 'RASMUSSEN: Rasmussen''s the name, sir. Professor Berlinghoff Rasmussen. Where
    I come from, every historian knows the bridge of old 1701-D.'
  - 'PICARD: And where exactly is it you come from?'
  - 'RASMUSSEN: Why Earth... late twenty-sixth century Earth, to be exact. You see,
    I''ve traveled back nearly three hundred years just to find you.'
