- fabula_uuid: cand_evt_scene_302e988c1b732936_01
  global_id: null
  title: Rasmussen’s deception and planetary crisis collide
  description: |2-

      The scene opens with Picard interrogating Riker and Data about Rasmussen’s suspicious line of questioning—his obsessive focus on past starships and Soong’s work, which Data confirms was his primary interest. Before the conversation can deepen, Worf interrupts with urgent reports of escalating seismic activity beneath the drill sites, revealing that the Enterprise’s intervention has triggered catastrophic geological instability. The bridge erupts into controlled chaos as alarms blare, volcanic plumes rise on the viewscreen, and Geordi’s voice crackles over comms, confirming the severity of the situation. Riker then overlays the eruption coordinates with the phaser drilling sites, visually proving the crew’s unintended role in the disaster. Picard’s realization—that their attempt to help has caused irreparable harm—hangs heavy in the air, while Rasmussen’s true motives as a treasure hunter remain exposed but unresolved. The scene forces Picard to confront two crises at once: the ethical fallout of their actions and the immediate threat to La Forge’s safety, all while Rasmussen’s deception lingers as a secondary threat.
