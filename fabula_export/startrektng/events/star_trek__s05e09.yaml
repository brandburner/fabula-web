  title: Rasmussen deflects Picard’s questions
  description: "\n  Picard confronts Rasmussen about the historian’s selective disclosure\
    \ of future knowledge, demanding to know why he was chosen for study. Rasmussen\
    \ deflects with bureaucratic justifications—citing 'historical integrity' and\
    \ a one-way flow of information—while his evasiveness deepens Picard’s suspicion\
    \ that the 26th-century scholar is hiding a darker motive. The exchange underscores\
    \ the power imbalance between them, as Rasmussen casually measures the ready room’s\
    \ dimensions (counting meters aloud), revealing his premeditated familiarity with\
    \ the space. His flattery and academic curiosity mask a calculated agenda, foreshadowing\
    \ Data’s later revelations about Rasmussen’s true intentions. Picard’s growing\
    \ skepticism is palpable, but Rasmussen’s charm and historical authority keep\
    \ him from pressing further—yet.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e09
  scene_sequence: 2
  sequence_in_scene: 4
  key_dialogue:
  - 'PICARD: Exactly what kind of historian are you?'
  - 'RASMUSSEN: My focus is on the twenty-second through the twenty-fourth centuries,
    early interstellar history... Now don''t move it on my account.'
  - 'PICARD: You can''t expect me to believe that the layout of my ready room is of
    interest to future historians... I can''t help but wonder what could possibly
    have caused you to select me as the subject of your study.'
  - 'RASMUSSEN: I''d love to tell you, Picard. I really would. But try and imagine
    what a young Caesar might have done differently if someone had given him a hint
    of what lay ahead... I''m afraid the exchange of information will have to flow
    in one direction only.'
  - 'RASMUSSEN: ...four... five... six... seven meters. HA! I was right!'
