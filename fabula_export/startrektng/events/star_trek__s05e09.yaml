  global_id: null
  title: Rasmussen steals Data’s PADD while probing limits
  description: 'In a moment of calculated opportunism, Rasmussen surreptitiously steals
    a PADD from an Engineering console while Data is distracted, demonstrating his
    exploitative nature and disregard for Starfleet protocols. Simultaneously, Rasmussen
    fixes Data with an unsettling question—*''Can you go faster?''*—hinting at a deeper,
    potentially predatory interest in the android’s capabilities. The scene underscores
    Rasmussen’s hidden agenda: he is not merely a historian but a temporal opportunist,
    testing the boundaries of the Enterprise crew’s trust and Data’s limits. The theft
    goes unnoticed, reinforcing the crew’s blind spot regarding Rasmussen’s true intentions
    while foreshadowing his eventual exposure. The moment also highlights Data’s vulnerability
    to manipulation, as Rasmussen’s probing question suggests an attempt to exploit
    the android’s unique abilities for his own gain.'
