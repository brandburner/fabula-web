  title: Rasmussen’s phaser fails exposing his desperation
  description: "\n  In a tense confrontation aboard Rasmussen’s time-pod, Data discovers\
    \ the stolen Enterprise technology—tricorders, medical equipment, Geordi’s visor,\
    \ and even barware from Ten Forward—arranged in collector trays. Rasmussen, now\
    \ cornered, draws a phaser and threatens Data, revealing his true intentions:\
    \ to dissect the android for scientific profit in his own 22nd-century timeline.\
    \ When Data questions his motives, Rasmussen admits he’s not a historian but a\
    \ failed inventor who stole the time-pod and plans to return with Data as his\
    \ ultimate prize. As Rasmussen prepares to stun Data and flee, the phaser malfunctions\
    \ twice, stripping away his last advantage. The failure forces a dramatic shift\
    \ in power dynamics, exposing his avarice and leaving him defenseless against\
    \ Data’s unyielding logic and Picard’s impending moral scrutiny. The moment underscores\
    \ Rasmussen’s desperation and the crew’s impending confrontation with his predatory\
    \ intentions.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e09
  scene_sequence: 25
  sequence_in_scene: 54
  key_dialogue:
  - 'DATA: I do not believe any of these items belong to you, Professor.'
  - 'RASMUSSEN: Nor does this! ((raising phaser)) This phaser is set at the highest
    stun setting. If I''m correct, that is sufficient to immobilize even you.'
  - 'RASMUSSEN: You will take a little longer to figure out than a tricorder, but
    it should be well worth the effort.'
  - 'DATA: I assume your hand print will open the door whether you are conscious or
    not.'
