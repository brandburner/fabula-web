- fabula_uuid: cand_evt_scene_965c56477c7c38d9_02
  global_id: null
  title: Rasmussen’s True Intentions Exposed
  description: "\n  Data confronts Rasmussen aboard his time-pod, where he discovers\
    \ stolen *Enterprise* technology—tricorders, medical equipment, Geordi’s visor,\
    \ and even mundane items like Ten Forward barware—all intended for Rasmussen’s\
    \ exploitation in the 22nd century. Rasmussen, cornered, reveals his true identity\
    \ as a rogue inventor from the 22nd century who stole the time-pod from a 26th-century\
    \ historian. His initial plan was to smuggle back 24th-century trinkets as inventions,\
    \ but upon learning of Data’s existence, he pivots to a far more sinister scheme:\
    \ dissecting Data for scientific profit. When Rasmussen attempts to stun Data\
    \ with a malfunctioning phaser, his desperation and moral corruption are laid\
    \ bare, forcing Picard’s ethical dilemma to a breaking point. The confrontation\
    \ strips away Rasmussen’s facade, exposing his avarice and the depth of his betrayal—both\
    \ of the *Enterprise* crew and the timeline itself. This moment not only validates\
    \ Worf’s earlier suspicions but also escalates the crew’s urgency to neutralize\
    \ Rasmussen before he can act on his plans.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e09
  scene_sequence: 25
  sequence_in_scene: 53
