    global_id: ger_location_3b3d14e4c747
  - location_uuid: ger_location_981a14d1576e
    description_of_involvement: "\n      Though the detention cell is only implied\
      \ off-screen in this event, its looming presence is critical to the narrative.\
      \ Worf’s order to ‘Take him to a detention cell’ and Riker’s directive to ‘notify\
      \ Starfleet that we’ll be dropping him off at Starbase Two-one-four’ frame the\
      \ shuttlebay confrontation as the prelude to Rasmussen’s confinement. The detention\
      \ cell symbolizes the finality of his fate—stranded in the 24th century with\
      \ no escape. Its reinforced walls and shimmering force fields, watched over\
      \ by security monitors, represent the inescapable consequences of his actions.\
      \ The cold lighting and bare surfaces of the cell (implied through description)\
      \ would amplify Rasmussen’s panic, making this event the last gasp of his freedom\
      \ before institutional isolation.\n      "
    observed_atmosphere: Cold, oppressive, and isolating—designed to strip away any
      remaining dignity or hope.
    functional_role: Impending confinement site for Rasmussen, where he will be held
      pending transfer to Starbase 214.
    symbolic_significance: Embodies the moral and institutional consequences of temporal
      meddling and theft.
    access_restrictions: Highly restricted; only authorized Starfleet personnel can
      enter or exit.
    key_environmental_details:
