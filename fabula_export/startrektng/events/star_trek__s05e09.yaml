- fabula_uuid: cand_evt_scene_f11040b446f93bd4_01
  global_id: null
  title: Crew challenges Rasmussen’s motives
  description: "\n  In the Observation Lounge, the Enterprise crew openly interrogates\
    \ Rasmussen about his suspicious timing and hidden agenda, exposing their collective\
    \ distrust of his 26th-century historian guise. Worf and Geordi lead the charge,\
    \ questioning why he arrived *now* of all times, while Rasmussen deflects with\
    \ cryptic confidence. Riker probes the ethical boundaries of time travel, and\
    \ Beverly—despite Picard’s warning—tries to pry for future medical knowledge.\
    \ Picard, though cautious, formally extends Starfleet hospitality, backed by medical\
    \ confirmation of Rasmussen’s humanity and Worf’s reluctant verification of the\
    \ temporal distortion. The crew’s unease lingers, with Troi sensing deception\
    \ and Worf’s skepticism palpable. Rasmussen’s patronizing dismissal of Data in\
    \ the turbolift afterward—treating him as a relic—further underscores his avaricious\
    \ nature. The scene serves as a turning point: while Picard extends official trust,\
    \ the crew’s distrust foreshadows Data’s later revelation of Rasmussen’s true\
    \ intentions, setting up the conflict between duty and suspicion that will define\
    \ the act.\n  "
