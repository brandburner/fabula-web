  - character_uuid: ger_agent_fb8ab4bb3015
    emotional_state: Relieved yet resigned—his initial joy at the stabilization of
      temperatures is palpable, but Geordi’s correction grounds him in the harsh reality
      of their situation. His emotional state is a mix of gratitude for the temporary
      reprieve and quiet determination to face whatever comes next.
    goals:
