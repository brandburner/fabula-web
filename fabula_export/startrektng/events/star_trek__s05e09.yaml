  title: Rasmussen steals Geordi’s PADD under false pretenses
  description: "\n  Rasmussen enters Engineering under the guise of academic curiosity,\
    \ feigning interest in Data’s computational efficiency and Geordi’s VISOR to distract\
    \ them. While Geordi and Data focus on mission-critical thermal simulations, Rasmussen\
    \ subtly pockets a PADD from an unattended console, masking his theft as casual\
    \ conversation. His repeated references to 'knowing the outcome' and his theatrical\
    \ reaction to Data’s presence ('Data... at Penthara Four!') reveal his hidden\
    \ agenda—he is not a passive observer but an opportunist exploiting his time-traveler\
    \ status. The theft foreshadows his later exposure as a self-serving historian,\
    \ undermining Picard’s ethical dilemma about altering history. Geordi’s impatience\
    \ and Data’s literal-mindedness make them vulnerable to Rasmussen’s manipulation,\
    \ while the stolen PADD becomes a tangible clue to his true motives.\n  "
