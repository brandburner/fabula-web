- fabula_uuid: cand_evt_scene_3663ad76a1ceefa2_01
  global_id: null
  title: Picard proposes CO2 greenhouse intervention
  description: "\n  Picard and Geordi brief Moseley on a desperate plan to artificially\
    \ trigger a greenhouse effect on Penthara IV by releasing underground CO₂ to counteract\
    \ the planet's irreversible atmospheric collapse. The proposal forces Moseley\
    \ to confront the dark irony of replicating the very crisis they’ve spent decades\
    \ combating, while Geordi frames it as a brutal but necessary sacrifice to restore\
    \ sunlight. A female scientist delivers an urgent update—New Seattle’s rivers\
    \ are freezing and cloud depth has reached 12 kilometers—escalating the crisis\
    \ and underscoring the urgency of Picard’s plan. The exchange reveals the crew’s\
    \ moral conflict: survival vs. ethical consistency, setting up the high-stakes\
    \ implementation that follows.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e09
  scene_sequence: 4
  sequence_in_scene: 8
  key_dialogue: &id007
  - 'PICARD: We''ve located three underground pockets of carbon dioxide... here, here
    and here. Our drilling phasers can release enough of the gas to form an envelope
    which would temporarily hold in the heat from the sun.'
  - 'MOSELEY: ((laughing at the irony)) We spend years, decades trying to avoid anything
    that would lead to a greenhouse effect and here we are about to create one on
    purpose.'
  - 'GEORDI: Less than twenty percent of your normal sunlight is getting through that
    dust, Doctor. If we can hold enough heat in with the CO2, it should give the planet
    time to mend itself.'
  - 'FEMALE SCIENTIST: New Seattle is reporting a cloud depth of twelve kilometers.
    Two rivers, tropical rivers, are beginning to freeze.'
