  global_id: null
  title: Rasmussen’s exile begins
  description: After Data confirms Rasmussen’s true identity as a 22nd-century inventor—not
    a 26th-century historian—Picard coldly dismantles his lies, revealing that all
    stolen technology has been deactivated. Rasmussen’s desperate pleas to return
    to his time-pod fall on deaf ears as Worf prepares to detain him. The moment reaches
    its climax when the pod vanishes, stranding Rasmussen in the 24th century. Picard’s
    final, biting welcome—‘Welcome to the twenty-fourth century’—underscores the irreversible
    consequences of Rasmussen’s actions, while his panic reveals the full weight of
    his moral isolation. The scene crystallizes the cost of temporal meddling, with
    Picard’s calculated detachment contrasting sharply with Rasmussen’s unraveling
    composure. The event serves as both a thematic payoff (the dangers of altering
    history) and a narrative turning point, shifting focus from the Penthara Four
    crisis to Rasmussen’s personal reckoning.
