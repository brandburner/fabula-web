  title: Data discovers Rasmussen’s stolen technology
  description: "\n  Data enters Rasmussen’s futuristic vessel and immediately identifies\
    \ a collection of stolen *Enterprise* technology—tricorders, medical equipment,\
    \ Geordi’s visor, and even mundane items like Ten Forward barware—arranged in\
    \ exposed trays. Rasmussen, caught off-guard, raises a phaser at Data, revealing\
    \ his desperation. The confrontation escalates as Rasmussen abandons his historian\
    \ facade, admitting he’s a 22nd-century inventor who stole a time-pod to exploit\
    \ advanced tech for personal gain. His true motives surface when he threatens\
    \ to dissect Data for scientific profit, exposing his avarice and the depth of\
    \ his moral corruption. The phaser fails to fire, leaving Rasmussen vulnerable\
    \ as Data prepares to expose him to Picard. This moment forces Picard’s ethical\
    \ dilemma about altering history into sharper focus, as Rasmussen’s predatory\
    \ intentions directly challenge the crew’s moral boundaries.\n  "
