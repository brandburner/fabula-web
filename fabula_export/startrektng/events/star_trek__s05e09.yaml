    global_id: ger_object_57ef0de37d02
  - object_uuid: ger_object_fb8f80061d9e
    description_of_involvement: "\n        The **stolen phaser** is the **pivotal\
      \ weapon** in Rasmussen’s failed attempt to subdue Data. He **trains it on Data\
      \ with threats**, but it **dead-clicks twice without discharging**, stripping\
      \ him of his leverage. This **malfunction** is **narratively critical**, as\
      \ it **exposes Rasmussen’s desperation** and **forces Data to take control of\
      \ the situation**. The phaser’s failure underscores the **irony of stolen technology\
      \ betraying its user**—a **thematic echo** of Rasmussen’s own predatory intentions.\
      \ Its presence in the scene also **reinforces the stakes** of his theft, as\
      \ it was meant to be a tool for his **22nd-century ‘inventions’**.\n      "
    status_before_event: "\n        Fully charged and functional (presumably), stolen\
      \ from the *Enterprise* and repurposed by Rasmussen for his threats.\n      "
    status_after_event: "\n        **Non-functional**, having failed to fire. It becomes\
      \ **evidence of Rasmussen’s crimes**, as Worf later collects it in the shuttlebay.\
      \ Its failure **seals Rasmussen’s fate**, leaving him vulnerable to Data’s exposure.\n\
      \      "
    global_id: ger_object_fb8f80061d9e
  - object_uuid: ger_object_ea13cd60fdb0
    description_of_involvement: "\n        Rasmussen’s **time-pod** serves as the\
      \ **battleground** for the confrontation between Data and Rasmussen. Its **futuristic,\
      \ minimalist design**—with multifaceted panels and exposed trays—creates a **sterile,\
