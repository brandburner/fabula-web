  title: Rasmussen’s fraud exposed and arrested
  description: In the shuttlebay, Data reveals Rasmussen’s true identity as a 22nd-century
    thief rather than a 26th-century historian, exposing his theft of advanced technology.
    Picard, now fully aware of Rasmussen’s deception, confronts him with cold precision,
    mimicking Rasmussen’s earlier rhetoric to underscore his hypocrisy. Rasmussen’s
    desperate attempts to regain access to his vessel fail as Worf retrieves the stolen
    artifacts, and Picard orders his arrest. The moment culminates in Rasmussen’s
    panicked realization that his ship—his only means of returning to his own time—has
    vanished, leaving him stranded in the 24th century. The scene shifts from ethical
    debate to outright betrayal, with Picard’s final taunt ('Welcome to the twenty-fourth
    century') marking the definitive collapse of Rasmussen’s lies and the irreversible
    consequences of his actions. The event serves as both a turning point in the story—exposing
    Rasmussen’s true motives—and a thematic payoff, reinforcing the dangers of temporal
    interference and the fragility of trust.
