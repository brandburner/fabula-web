  title: Picard forces Rasmussen’s vessel inspection
  description: In the *Enterprise* shuttlebay, Rasmussen attempts to depart with his
    valise, only for Picard to confront him with suspicion over missing items. Rasmussen
    deflects with condescension, but Worf and Riker escalate the standoff with physical
    intimidation, forcing him into a defensive position. Cornered, Rasmussen concedes
    to a search—but only by Data, whom Picard orders to withhold any findings. The
    exchange exposes Rasmussen’s desperation to hide stolen technology, while Picard’s
    calculated maneuver reveals his growing distrust of the historian’s motives. The
    scene pivots from verbal sparring to a tense, high-stakes negotiation, where Rasmussen’s
    panic and Picard’s strategic patience collide, setting up Data’s imminent discovery
    of the stolen tricorder and the broader threat to the timeline.
