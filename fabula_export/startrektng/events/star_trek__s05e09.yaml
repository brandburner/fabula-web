    dust, Doctor. If we can hold enough heat in with the CO₂, it should give the planet
    time to mend itself.'
  - 'MOSELEY: New Seattle is reporting a cloud depth of twelve kilometers. Two rivers,
    tropical rivers, are beginning to freeze. We better get started before there''s
    nothing left to mend.'
