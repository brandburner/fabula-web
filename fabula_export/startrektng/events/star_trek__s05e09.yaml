  title: Rasmussen steals Data’s tricorder
  description: "\n  In Data’s quarters, Rasmussen exploits a moment of distraction\
    \ when Geordi hails Data from the surface of Penthara Four. As Data turns to address\
    \ the monitor, Rasmussen casually pockets a tricorder from Data’s desk—a calculated\
    \ theft disguised as an opportunistic act. The scene underscores Rasmussen’s predatory\
    \ nature, as he manipulates Data’s trust by feigning scholarly interest in Soong’s\
    \ schematics while secretly advancing his own agenda. The theft introduces a critical\
    \ plot device that could later disrupt the Enterprise’s mission, while also deepening\
    \ the tension between Data’s blind faith in Rasmussen’s motives and the crew’s\
    \ growing suspicion. The moment is a turning point, revealing Rasmussen’s true\
    \ opportunistic character and setting up his eventual exposure.\n  "
