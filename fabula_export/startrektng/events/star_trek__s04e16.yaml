  object_involvements:
  - object_uuid: ger_object_cb18f9aa0314
    description_of_involvement: The newborn energy being looms as an invisible but
      palpable presence, its rapid growth the catalyst for the scene's urgency. Though
      not physically visible on the bridge, its existence is felt through Worf's report
      of its expanding volume and Data's analysis of its parent's course. The being's
      survival is the driving force behind Picard's decision to alter the *Enterprise*'s
      trajectory, and its continued drain on the ship's power systems adds a ticking
      clock to the crew's actions. The being is both a scientific curiosity and a
      moral imperative, its fate intertwined with the crew's guilt over the parent's
      destruction and their determination to atone.
    status_before_event: Attached to the *Enterprise*'s hull, its volume at 46 million
      cubic meters and growing at an alarming rate, draining the ship's power reserves.
    status_after_event: Remains attached to the hull as the *Enterprise* changes course
      toward the asteroid belt, its growth and power drain continuing but now with
      a potential solution in sight.
    global_id: ger_object_cb18f9aa0314
  - object_uuid: ger_object_901cb74f8afe
    description_of_involvement: 'The parent energy being, though deceased, plays a
      crucial role in the scene as a spectral guide. Data''s analysis of its course
      through the system reveals its destination: the asteroid belt, rich in meklinite,
      the sustenance it sought for its unborn child. This revelation is the turning
      point of the event, providing the crew with the critical insight they need to
      act. The parent''s journey becomes a roadmap for the *Enterprise*''s new course,
      a posthumous act of guidance that transforms the crew''s guilt into a mission
      of redemption. Its presence is felt through Data''s findings and the crew''s
      collective recognition of the path forward.'
    status_before_event: Deceased, its trajectory through the system analyzed by Data,
      revealing its course toward the asteroid belt for sustenance.
    status_after_event: Its role as a guide is fulfilled, its course now informing
      the *Enterprise*'s actions as the crew races to the asteroid belt to save the
      newborn.
    global_id: ger_object_901cb74f8afe
