- fabula_uuid: act_bdd523f54c3b091e
  number: 3
  summary: Act Three focuses on the crew's collective decision to atone for their
    accidental destruction of the parent creature by assisting its newborn. In the
    Observation Lounge, Dr. Crusher explains the newborn is premature and trapped
    within its parent's carcass, suggesting a "Cesarean section" with phasers. Despite
    Worf's caution about the unknown nature of the offspring, Picard, driven by guilt
    and a sense of responsibility, orders the crew to proceed. Concurrently, Geordi
    and Leah, now in jumpsuits, are forced into close quarters while inspecting power
    transfer conduits within the ship's cramped crawlspaces. Leah discovers Geordi's
    innovative mid-range phase adjuster, praising his ingenuity and suggesting he
    publish a scientific paper, a rare moment of professional respect. During this
    close interaction, Leah questions Geordi's unusual familiarity with her. Geordi,
    hesitant to reveal his holodeck fantasy, admits to studying her work and files,
    expressing his long-held admiration and hope for friendship. Just as a tender
    moment seems to develop, Leah definitively reveals she is married, a bombshell
    that completely devastates Geordi. Back on the Bridge, Dr. Crusher, with Worf's
    assistance, successfully uses a precision phaser beam to incise the parent's body,
    and the newborn slowly emerges, much to the relief and satisfaction of the command
    crew. A dejected Geordi later confides in Guinan in Ten-Forward, expressing his
    disappointment with the "real" Leah and his shattered fantasy. Guinan offers poignant
    insight, suggesting Geordi saw what he *wanted* to see in the holodeck and that
    Leah "didn't live up to your expectations," urging him to see her for who she
    truly is. The act concludes as the Enterprise attempts to leave the system, but
    the newborn follows, imprinting on the ship and attaching itself to the hull,
    beginning to drain the ship's energy, believing the Enterprise to be its mother.
    Picard, recognizing this behavior, decides against taking immediate action, embracing
    their new, unexpected responsibility.
