- fabula_uuid: act_0bcdabedf726cb9d
  number: 4
  summary: 'Act Four intensifies the dual crises: the Enterprise''s dwindling power
    due to the newborn''s energy drain and the escalating personal conflict between
    Geordi and Leah. The command crew assesses the critical power situation, with
    Geordi estimating only hours until auto-shutdown. Leah offers her expertise to
    extend engine efficiency, signaling a nascent professional collaboration. Data
    discovers the parent creature was heading towards an asteroid field rich in sustenance,
    prompting Picard to plan a rendezvous there, hoping the newborn will find its
    natural food source. A plan is formulated to detach the creature by depressurizing
    a shuttlebay. Meanwhile, Leah, seeking more information on Geordi''s engine modifications,
    accesses a file that leads her to a holodeck program of the prototype engine schematic.
    Unaware of its true nature, she enters Holodeck Three, only to discover the holographic
    recreation of herself interacting intimately with Geordi. Witnessing the "fantasy
    plaything," Leah is outraged, feeling "invaded" and "violated," accusing Geordi
    of creating multiple such programs. Geordi, pushed to his limit by her constant
    accusations and lack of trust, erupts in a passionate defense, expressing his
    frustration at her judgment and his genuine desire for friendship. He storms out,
    leaving Leah stunned by his emotional outburst. The attempt to detach the baby
    creature fails; it clings tighter, dramatically increasing the power drain and
    pushing the Enterprise to the brink of auto-shutdown. To compound the peril, sensors
    detect several other large energy creatures rapidly approaching from the asteroid
    field, turning green—a sign of aggression—and the Enterprise has only seconds
    of phaser fire available, setting up a dire cliffhanger.'
  key_moments: []
