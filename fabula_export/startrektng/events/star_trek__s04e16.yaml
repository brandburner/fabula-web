  global_id: null
  title: Geordi and Leah’s explosive confrontation
  description: 'Geordi La Forge discovers Leah Brahms has accessed his private holodeck
    program—a romanticized simulation of her—and rushes to confront her. The scene
    erupts into a heated exchange where Leah accuses him of violating her professional
    and personal boundaries, while Geordi, initially defensive, finally snaps under
    her relentless criticism. His outburst reveals his deeper frustration: not just
    with her accusations, but with her refusal to see him as anything beyond a flawed
    engineer. The confrontation forces Geordi to admit his ''crime''—attempting friendship—while
    Leah is left stunned by the raw vulnerability of his confession. The scene escalates
    from professional tension to a personal reckoning, exposing the fractured dynamic
    between them and setting up Geordi’s emotional withdrawal from the crisis unfolding
    on the *Enterprise*.'
