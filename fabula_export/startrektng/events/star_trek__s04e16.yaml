  - object_uuid: ger_object_e43cd36aa822
    description_of_involvement: "\n        The Shuttlebay Control Booth console is\
      \ a hub of frantic activity, with Geordi, Data, and Worf tapping commands and\
      \ scanning readouts. Geordi's attempt to depressurize the bay is met with failure,\
