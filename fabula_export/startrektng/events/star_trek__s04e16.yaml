  title: Geordi’s fantasy fractures under reality
  description: Geordi La Forge meticulously crafts an intimate, romantic setting in
    his quarters—soft lighting, classical guitar, and a carefully curated ambiance—to
    welcome Leah Brahms, his long-held holodeck fantasy made tangible. When Leah arrives
    still in her work uniform, her clinical demeanor and abrupt rejection of his efforts
    immediately expose the gap between his idealized vision and the reality of her
    detached, professional nature. The tension escalates as Geordi’s awkward small
    talk (noting her hair differs from her personnel file) triggers Leah’s suspicion,
    forcing him to backpedal with a weak excuse about 'protocol.' A fleeting moment
    of connection emerges when Leah confesses her engines are like 'children' to her,
    and Geordi—surprised by his own understanding—briefly bridges the divide. But
    the illusion shatters when Leah abruptly declines dinner, reverting to cold professionalism
    and leaving Geordi stunned in the dimly lit room, his fantasy in ruins. The scene
    underscores the collision of illusion and reality, revealing Leah’s complexity
    (her vulnerability about her work) while dismantling Geordi’s romantic projections,
    setting up their future professional friction and his emotional reckoning.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e16
  scene_sequence: 15
  sequence_in_scene: 25
  key_dialogue:
  - |-
    GEORDI: Computer... subdued lighting.
    COMPUTER VOICE: Please state your request in precise candlepower.
    GEORDI: It's not a matter of precision, it's a matter of... mood. Brighter than this.
  - |-
    LEAH: Commander La Forge... if I seem to you somewhat... unyielding... in my views -- it's because I care so very much about my work.
    GEORDI: I know that.
    LEAH: Well, to be honest, some people find me cold, cerebral, lacking in humor...
  - |-
    GEORDI: ... they're like your children.
    LEAH: Yes... exactly...
  - |-
    LEAH: I'm sorry, I hope you didn't go to a lot of trouble, but I can't stay. I just don't feel it's appropriate.
    GEORDI: You can't --?
    LEAH: I'm preparing a list of the discrepancies I've identified in your modifications. I hope -- now that we've reached an understanding -- that you'll be prepared to discuss them with me in a more objective fashion.
