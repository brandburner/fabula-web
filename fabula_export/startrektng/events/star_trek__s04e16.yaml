- fabula_uuid: act_6bda5c111999f026
  number: 5
  summary: 'Act Five opens with the Enterprise in extreme peril, operating on auxiliary
    power with life support barely functional, as the aggressive energy creatures
    rapidly close in. In Engineering, Geordi and Leah, putting aside their personal
    animosity, are forced to collaborate under immense pressure. Leah proposes a solution:
    "souring the milk" by contaminating the energy the baby creature is drawing from
    the ship, making it unpalatable. Geordi quickly grasps the concept, and they realize
    they can alter the energy frequency to be foreign to the lifeform''s natural vibrations.
    With the other creatures just minutes away, Geordi and Leah work together at the
    console, gradually lowering the energy wavelength. The baby creature reacts violently,
    increasing its energy consumption, and the approaching creatures accelerate and
    turn brilliant green, mirroring the parent''s aggressive state before its destruction.
    Despite the ship rocking and auxiliary generators failing, Leah, maintaining composure,
    makes the final adjustment to the frequency. The rocking abruptly stops, and the
    baby entity disengages from the hull. It drifts towards its relatives, who return
    to their normal colors and envelop it, indicating acceptance. The tension on the
    Bridge dissipates as power returns, and Picard congratulates Geordi and Leah on
    "weaning the baby." Later, in Ten-Forward, Geordi and Leah share a moment of genuine
    reconciliation. They laugh about the holodeck incident, with Leah apologizing
    for her initial behavior and admitting her own preconceptions about him. Geordi,
    in turn, acknowledges his attachment to the holodeck fantasy. They connect on
    a new, authentic level, with Leah even noting that Geordi reminds her of her husband.
    Just as a potential new intimacy begins to blossom, Worf interrupts with a message
    for Leah from her husband, abruptly breaking the mood. Leah exits, leaving Geordi
    alone, reflecting on the bittersweet conclusion of their complicated encounter.'
