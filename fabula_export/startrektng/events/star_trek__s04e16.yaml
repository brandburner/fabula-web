- fabula_uuid: cand_evt_scene_c35b31dfe089c17e_01
  global_id: null
  title: Geordi reveals his phase adjuster to Leah
  description: "\n  In the claustrophobic confines of the *Enterprise*’s crawlspace,\
    \ Geordi La Forge—frustrated by Leah Brahms’ failure to match his holodeck fantasy—demonstrates\
    \ his mid-range phase adjuster, a technical innovation he’s kept private. The\
    \ moment begins with Leah noticing an irregular acoustic signature in the engines,\
    \ prompting Geordi to reveal his invention. Her immediate recognition of its significance\
    \ and genuine admiration force Geordi to confront the dissonance between his idealized\
    \ version of her and the reality of her competence. When Leah presses him about\
    \ his uncharacteristic familiarity, Geordi deflects with vague admiration for\
    \ her work, but the intimacy of their physical proximity and the warmth in her\
    \ response briefly make her resemble his holodeck Leah—until she shatters the\
    \ illusion by revealing she is married. The revelation leaves Geordi visibly stunned,\
    \ marking a turning point in his emotional conflict: his fantasy of Leah is irrevocably\
    \ shattered, while her professional respect for him complicates their dynamic.\
    \ The scene subtly shifts their relationship from tension to mutual recognition\
    \ of skill, forcing Geordi to grapple with the cost of his projections.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e16
  scene_sequence: 19
  sequence_in_scene: 31
  key_dialogue:
  - 'LEAH: I''ve never seen anything like this... what is it?'
  - 'GEORDI: A mid-range phase adjuster... it puts the plasma back into phase after
    inertial distortion.'
  - 'LEAH: This has never been done before. I don''t think it''s ever been conceived
    of before. You should write a scientific paper.'
  - 'GEORDI: That''s not my strong suit, Doctor...'
  - 'LEAH: But this kind of refinement should be shared... and you deserve the credit
    for it...'
  - 'GEORDI: Maybe we could collaborate. Writing is one of your strong points.'
  - 'LEAH: Commander La Forge... ever since I came on board, there''s been something
    a little peculiar in your attitude. You seem to know things about me even though
    we''ve never met.'
  - 'GEORDI: I... studied you. Your writings, your Starfleet file. I''ve admired you.
    Your work.'
  - 'LEAH: I''m flattered, but...'
  - 'GEORDI: I''ve looked forward to meeting you for a long time... And I''d like
    to think -- that we could get to be friends. Good friends.'
  - 'LEAH: I thought you knew... you seem to know everything else about me... but
    Commander... if I''m hearing what I think I am, then you should know... I''m married.'
