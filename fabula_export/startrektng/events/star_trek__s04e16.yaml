  key_dialogue: &id001
  - 'LEAH: ... the matter/anti-matter ratio has been changed... the mixture isn''t
    as rich as regulations dictate.'
  - 'GEORDI: Experience has shown me that too high a ratio diminishes efficiency.
    I worked with the mixture until I got the right balance.'
  - 'LEAH: Is that a criticism, Commander?'
  - 'GEORDI: No, of course not. It''s just... a well-known fact. There''s theory...
    and there''s application. They don''t always jibe.'
  - 'LEAH: You''ve charted a completely new swap-out schedule for main component replacement...'
  - 'GEORDI: You bet. I found the Starfleet estimates of MTBF units were unrealistic.
    I determined my own schedule based on observation and experience.'
  - 'LEAH: Is that going to be your only defense, Commander? That same tired rhetoric...
    (mimicking) Out here in the field we learn things you designers couldn''t possibly
    understand...'
  - 'GEORDI: In the first place, Doctor, I''m not aware of needing any defense...
    in the second place'
  - 'LEAH: I''d like to hear this message privately.'
  - 'GEORDI: In my office. Be my guest.'
