    the dilithium crystal...'
  - 'LEAH: And why you added that mid-range phase adjuster...'
  - 'LEAH: Commander... it seems you''ve made more modifications than I''m aware of.
    Do you have a file on all the work you''ve done?'
  - 'GEORDI: Sure. It''s in the computer -'
  - 'PICARD''S COM VOICE: Picard to La Forge...'
  - 'GEORDI: ((to Leah)) You go ahead, Doctor... Ensign Pavlik can show you the file
    on the engine modifications.'
