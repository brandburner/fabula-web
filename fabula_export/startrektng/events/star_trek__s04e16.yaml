      Pavlik’s **comlink** is the lifeline between Engineering and the bridge—a fragile but critical connection in the chaos. His voice crackles through the device, delivering the dire update: *'The power drain just jumped to ninety-three percent, sir... approaching auto-shutdown.'* The comlink’s involvement here is *operational*: it enables real-time communication during a crisis where every second counts. Its role isn’t just functional; it’s *symbolic*: the comlink represents the crew’s reliance on each other, even as the ship falls apart around them. When Pavlik taps it to report, the sharp *chirp* cuts through the bridge’s alarms, a reminder that the crisis is shared—and that solutions may come from anywhere. The comlink’s status is *vital*: if it fails, the crew’s coordination collapses.
