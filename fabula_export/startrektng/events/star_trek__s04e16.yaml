- fabula_uuid: cand_evt_scene_efc7a0db0a1865f3_01
  global_id: null
  title: Data identifies meklinite as sustenance
  description: With the *Enterprise* limping toward the asteroid belt on impulse power,
    Data’s sensor analysis reveals the asteroids contain meklinite—a compound that
    interferes with scans but also matches the chemical signature of the parent energy
    being’s outer shell. This discovery suggests the asteroids serve as a nutrient
    source for the newborn lifeform, forcing a critical strategic pivot. Picard, weighing
    the moral and tactical implications, orders Geordi to detach the creature from
    the hull, abandoning their earlier plan to leave it behind. The revelation shifts
    the crew’s focus from guilt over the parent’s destruction to urgent survival,
    raising stakes as they now race to sustain the newborn while navigating the asteroid
    field’s hazards. The moment underscores the crew’s adaptability and the ethical
    weight of their decisions, with Data’s scientific insight becoming the linchpin
    of their new course of action.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e16
  scene_sequence: 32
  sequence_in_scene: 50
  key_dialogue: &id031
  - 'DATA: The asteroids contain large quantities of meklinite, which is interfering
    with our scanners. I am also detecting traces of Kefnium, a compound which was
    found in the parent being''s outer shell. It is likely that the asteroids provide
    sustenance for this lifeform.'
  - 'RIKER: We could leave the child here. If Data''s right, it would have an ample
    supply of food.'
  - 'PICARD: Agreed. Mister La Forge, are you ready to separate our guest from the
    hull?'
