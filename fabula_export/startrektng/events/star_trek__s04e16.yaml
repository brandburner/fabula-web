  key_dialogue:
  - 'GUINAN: You''re gonna wear that uniform out if you keep swatting at it...'
  - 'GEORDI: I guess I''m a little nervous... it''s not every day a man comes face
    to face with a dream...'
  - 'GEORDI: It was just so—comfortable... We worked like one person. What I didn''t
    think of, she did. I''d start sentences, she''d finish them.'
  - 'GUINAN: We all fall in love with our fantasies, from time to time, La Forge...'
  - 'GEORDI: You''ve got it wrong, Guinan. I''m not necessarily expecting anything
    romantic. I just know that, whatever else, Leah Brahms and I will be good friends.'
