- fabula_uuid: cand_evt_scene_3e8d3e16c2d568e9_01
  global_id: null
  title: Leah probes Geordi’s modifications
  description: After exiting the Observation Lounge, Geordi and Leah engage in a professional
    discussion about engine efficiency, revealing their shared technical expertise
    and mutual respect. Leah subtly probes Geordi for access to his modification files,
    planting the seeds for deeper collaboration—and foreshadowing her eventual investigation
    of his work. Their rapport is abruptly interrupted by Picard’s comm summons, redirecting
    Geordi to the bridge and leaving Leah to pursue the files independently. The exchange
    underscores their evolving professional dynamic, with Leah’s request hinting at
    her methodical approach to scrutinizing Geordi’s innovations, which will later
    challenge his assumptions about her character. The interruption also highlights
    the Enterprise’s escalating crisis, forcing Geordi to prioritize the ship’s needs
    over his personal reckoning with Leah’s real-world persona.
