- fabula_uuid: cand_evt_scene_b9bfb87c808f7dc6_02
  global_id: null
  title: Geordi and Leah collaborate under pressure
  description: 'In the high-stakes tension of Engineering, Geordi La Forge and Leah
    Brahms—previously locked in professional and personal friction—suddenly find themselves
    in a moment of unexpected synergy. As the *Enterprise* teeters on the edge of
    a power crisis, Geordi’s frustration with the newborn creature’s relentless energy
    drain is palpable, but Leah’s arrival shifts the dynamic. She enters with a cool,
    professional demeanor, devoid of their earlier hostility, and proposes a solution:
    altering the ship’s power frequency to make the energy unpalatable to the creature.
    Geordi, initially guarded, warms to the idea as they brainstorm together, their
    mutual intellectual curiosity bridging the gap between them. The moment is charged
    with subtext—Geordi’s lingering idealization of Leah (rooted in his holodeck fantasy)
    briefly surfaces as she mirrors the collaborative, brilliant version of herself
    he imagined. Their exchange is rapid-fire, technical, and charged with urgency,
    but beneath the problem-solving lies a fragile truce. The scene underscores how
    crisis can force even clashing personalities into alignment, while also hinting
    at Geordi’s internal conflict: his professional focus is sharpened, but his emotional
    investment in Leah remains unresolved. The collaboration sets up their joint report
    to Picard, but the subtext lingers—this is a moment where Geordi’s fantasy and
    reality blur, foreshadowing the tension between his personal desires and the mission’s
    demands.'
