    description_of_involvement: |2-

      The *Enterprise*’s **engines** become a pawn in Riker’s high-stakes maneuver. His order—*'Take the engines off-line. Supplement with auxiliary power.'*—is a calculated risk: by cutting the primary power source, he severs the newborn’s direct link to the ship’s energy, but he also weakens the *Enterprise*’s mobility and defensive capabilities. The engines’ role here is *sacrificial*: they are temporarily disabled to buy time, their power rerouted to auxiliary systems. This move underscores the crew’s desperation—they’re willing to hobble their own ship to survive. The engines’ involvement is *strategic*: their shutdown is a tactical retreat, not a defeat, but the tension lies in whether La Forge can restore them before the newborn adapts or the *Enterprise*’s systems fail permanently.
