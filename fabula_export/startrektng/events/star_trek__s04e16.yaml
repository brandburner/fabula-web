      The *Enterprise*’s **fusion reactors** are the lifeblood of the ship—and the newborn’s target. As the power drain spikes to 93%, these reactors become the battleground for survival. The creature’s energy siphoning isn’t just a technical problem; it’s a *metaphorical vampirism*, draining the ship’s vitality while the crew scrambles to cut off the flow. Riker’s order to take the engines offline and supplement with auxiliary power is a desperate gambit to *starve* the newborn of its power source, but the risk is clear: if the reactors fail, the ship dies. The flickering bridge lights are a visceral reminder of this struggle—the reactors’ output is the difference between life and auto-shutdown. Their involvement here is *existential*: without them, the *Enterprise* cannot function, and the newborn cannot survive.
