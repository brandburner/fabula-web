- fabula_uuid: cand_evt_scene_9f9103892db50dae_02
  global_id: null
  title: Leah dismisses Geordi’s engineering choices
  description: In the Enterprise’s engineering section, Leah Brahms conducts a meticulous
    inspection of Geordi’s modifications, systematically dismantling his technical
    decisions with cold, professional precision. Her questions and critiques—delivered
    in a detached, almost clinical tone—force Geordi into a defensive posture, where
    he must justify his deviations from Starfleet regulations. The exchange escalates
    into a subtle power struggle, with Leah’s sardonic mimicry of his field experience
    revealing her disdain for his approach. Geordi’s frustration simmers beneath the
    surface, his pride wounded by her dismissal of his expertise. The tension peaks
    when Leah abruptly cuts the confrontation short to take a private subspace message,
    leaving Geordi alone in the engine room—his sanctuary now tainted by her judgment.
    The moment underscores the widening gap between his idealized vision of her and
    the reality of her sharp, unyielding professionalism, deepening his internal conflict
    over her true nature and his own self-worth as an engineer. The interruption also
    serves as a narrative pivot, shifting focus away from their personal clash and
    toward the broader crisis unfolding aboard the ship.
