- fabula_uuid: cand_evt_scene_c2278746f0e11674_03
  global_id: null
  title: Geordi’s Unchecked Enthusiasm for Leah Brahms
  description: "\n  In the ready room, Picard casually informs Geordi that Dr. Leah\
    \ Brahms—the Senior Design Engineer of the Theoretical Propulsion Group—will board\
    \ the *Enterprise* to review his engine modifications. Geordi’s reaction is immediate\
    \ and unguarded: his excitement borders on giddiness, revealing his preexisting,\
    \ idealized infatuation with her. When Picard notes the familiarity in Geordi’s\
    \ tone, Geordi stumbles over his words, hastily correcting himself by framing\
    \ his knowledge of Brahms as purely professional (studying her schematics). The\
    \ exchange exposes the tension between Geordi’s private fantasy (likely tied to\
    \ his holodeck interactions with her) and the reality of her impending arrival.\
    \ Picard, though mildly amused by Geordi’s enthusiasm, misinterprets it as scholarly\
    \ admiration rather than personal attachment. The scene sets up Geordi’s internal\
    \ conflict: his professional duty to impress her clashes with his emotional vulnerability,\
    \ foreshadowing his struggle to reconcile his idealized perception of Brahms with\
    \ the woman she truly is.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e16
  scene_sequence: 1
  sequence_in_scene: 3
  key_dialogue:
  - 'PICARD: It seems that the exemplary nature of your work has caught the attention
    of Starfleet Command.'
  - 'GEORDI: Well... that''s very flattering. Thank you, sir.'
  - 'PICARD: In fact, someone is coming on board just to see some of the engine modifications
    you have made.'
  - 'GEORDI: Who''s that, Captain?'
  - 'PICARD: The Senior Design Engineer of the Theoretical Propulsion Group—Doctor
    Leah Brahms.'
  - 'GEORDI: Leah''s coming here? That''s terrific!'
  - 'PICARD: You know Doctor Brahms?'
  - 'GEORDI: Well, of course I do! I— ((stops)) I mean, I''ve studied her—her schematics
    for years. She was responsible for a lot of the engine design on the *Enterprise*.'
  - 'PICARD: Well, it should be an enjoyable visit, then. She''ll be transporting
    on board as soon as we arrive at the Starbase. Would you like to greet her on
    our behalf?'
  - 'GEORDI: ((restrained)) Why... yes, Captain. I''d be happy to serve that function.'
