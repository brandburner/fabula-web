    beliefs:
    - His modifications, though unapproved, are necessary for the *Enterprise*’s efficiency
      and safety.
    - Leah’s opinion matters to him—both professionally and personally, given his
      preconceived notions about her.
    - Duty to the ship and crew always takes precedence, even over personal or professional
