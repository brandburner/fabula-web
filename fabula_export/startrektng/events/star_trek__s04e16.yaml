  title: Geordi invites Leah to dinner
  description: Geordi La Forge, seeking to defuse the tension between himself and
    Leah Brahms, shifts from a professional tour of Engineering to a personal invitation
    for dinner in his quarters. After Leah notices an unauthorized but effective modification
    to the dilithium chamber—a change that aligns with her own upcoming design for
    the next-class starship—Geordi seizes the moment of mutual recognition to propose
    a more informal meeting. The discovery of their shared love for fungilli creates
    an unexpected, unguarded connection, momentarily softening Leah’s guarded demeanor
    and hinting at a deeper compatibility beyond their professional rivalry. The invitation
    marks a pivot from adversarial professionalism to tentative personal curiosity,
    setting the stage for a potential emotional reckoning between Geordi’s idealized
    fantasy of Leah and the reality of who she is.
