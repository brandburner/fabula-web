- fabula_uuid: cand_evt_scene_731433098f5c5f2e_01
  global_id: null
  title: Enterprise alters course to save newborn energy being
  description: The *Enterprise* faces an escalating crisis as the newborn energy being's
    rapid growth threatens the ship's power systems. Worf reports the creature's volume
    has increased by 8.5% in three hours, now occupying 46 million cubic meters of
    space. Data's analysis reveals the deceased parent was likely heading toward the
    asteroid belt for sustenance, forcing Picard to abandon the ship's original strategy.
    With urgency, Picard orders an immediate course change to the asteroid belt, prioritizing
    both the creature's survival and the *Enterprise*'s stability. This decision escalates
    the moral stakes, as the crew must now balance their guilt over destroying the
    parent with the urgent need to sustain the newborn. The scene underscores Picard's
    leadership under pressure, Data's analytical precision, and the crew's collective
    responsibility to an unprecedented lifeform. The course change also sets up a
    high-stakes race against time, as the ship's power reserves dwindle and the crew
    must navigate the asteroid field to secure the meklinite-rich resources the creature
    needs to survive.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e16
  scene_sequence: 31
  sequence_in_scene: 49
  key_dialogue:
  - 'WORF: Its total volume has increased by eight point five percent in the last
    three hours. I am now reading it as forty-six million cubic meters.'
  - 'RIKER: It was heading for an asteroid belt...'
  - 'PICARD: Ensign Rager, set course two five nine mark three one eight, one half
    impulse.'
