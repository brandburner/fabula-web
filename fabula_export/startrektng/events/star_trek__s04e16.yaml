  title: Leah asserts her expertise in engineering
  description: 'Geordi La Forge, still nursing his bruised ego from Leah Brahms’ failure
    to match his holodeck fantasy, adopts a professional but detached demeanor when
    she enters Engineering. His assumption that she would defer to him—given her theoretical
    background—is immediately challenged when Leah, with quiet authority, announces
    her intent to inspect the power transfer conduits. Geordi’s surprise betrays his
    unspoken bias: he assumes she lacks the technical hands-on experience to crawl
    into the engine compartments. Leah’s icy response—*‘I designed them, Commander...
    I know what’s involved’*—exposes the gap between Geordi’s idealized perception
    of her and her actual competence. The moment forces Geordi to confront his own
    assumptions, while Leah’s decisive action subtly reinforces her agency in the
    engineering hierarchy. The exchange is a turning point in their dynamic, shifting
    from professional tension to a more complex, reality-based interaction. Leah’s
    physical assertion—brushing past him toward the engine compartments—underscores
    her refusal to be confined by Geordi’s expectations, while Geordi’s visible discomfort
    signals the beginning of his reckoning with his own biases.'
