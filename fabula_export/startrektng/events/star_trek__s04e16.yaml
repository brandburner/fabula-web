- fabula_uuid: cand_evt_scene_35afd8dbdb1dde54_01
  global_id: null
  title: Geordi confronts his idealized fantasy
  description: Geordi La Forge sits dejected in Ten-Forward, tearing a napkin apart
    as he grapples with the crushing gap between his holodeck fantasy of Leah Brahms
    and her cold, critical reality. Guinan, observing his frustration, challenges
    his self-deception with sharp precision, forcing him to acknowledge that his VISOR—both
    literal and metaphorical—has been filtering Leah through his own desires rather
    than seeing her as she truly is. The exchange exposes Geordi’s romantic projection
    as a form of self-delusion, while Guinan’s blunt critique reframes his disappointment
    as a failure of perception rather than Leah’s fault. This moment serves as a thematic
    pivot, mirroring the crew’s broader struggle with illusion versus truth (e.g.,
    the alien lifeform’s perceived threat vs. its vulnerable reality) and underscores
    Geordi’s need to reconcile his idealism with the messy, unfiltered world. The
    scene’s emotional arc—from defensiveness to sheepish realization—positions Geordi
    to eventually engage with Leah on more authentic terms, though the wound of his
    shattered fantasy lingers.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e16
  scene_sequence: 23
  sequence_in_scene: 36
  key_dialogue:
  - 'GEORDI: A glitch, a malfunction in the holodeck... it''s the only explanation
    I can think of... it''s a miracle we ever got out of that booby-trap alive...
    how could it have been so far off? It was based on every piece of information
    on record about Leah Brahms... okay, with an admitted margin for error... but
    this is an error that''s a light year wide...'
  - |-
    GUINAN: Not what you hoped for, huh?
    GEORDI: Hoped for...? She's about as friendly as a Circassian Plague Cat... all she cares about is her work... she hates what I've done to her engines... and to top it off -- she's married! The computer never even told me she was married...
    GUINAN: Computer problem, huh...
    GEORDI: Must've been...
    GUINAN: Maybe it was your old VISOR...
    GEORDI: What are you talking about?
    GUINAN: The VISOR you wore on the holodeck with her.
    GEORDI: This is the same VISOR.
    GUINAN: Really? I figured you were wearing the one that lets you see what you want to see.
  - |-
    GUINAN: Here you had this perfectly wonderful fantasy... and now the real Leah comes along and ruins it. She's done the most heartless, despicable thing one person can do to another -- she didn't live up to your expectations.
    GEORDI: (regards her, feeling sheepish)
    GUINAN: (points to VISOR) Take a hard look through your VISOR, La Forge... see her for who she really is... not what you want her to be.
