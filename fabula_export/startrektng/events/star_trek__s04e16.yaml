  title: Picard interrupts Geordi and Leah’s collaboration
  description: Geordi La Forge and Leah Brahms exit the Observation Lounge, their
    professional rapport momentarily restored as they discuss engine efficiency improvements.
    Leah probes Geordi about his unauthorized modifications, hinting at her intent
    to review his work—both as a colleague and as someone who may challenge his assumptions.
    Just as Geordi begins to explain, Captain Picard’s urgent comm summons him to
    the bridge, abruptly severing their conversation. Geordi directs Leah to Ensign
    Pavlik for access to his files, then departs, leaving Leah alone in the corridor.
    The interruption underscores the Enterprise’s escalating crisis, forcing Geordi
    to prioritize his duty over his personal reckoning with Leah. The moment also
    highlights Leah’s professional curiosity and her role as a potential disruptor
    of Geordi’s idealized fantasy of her, setting up their next confrontation in Engineering.
