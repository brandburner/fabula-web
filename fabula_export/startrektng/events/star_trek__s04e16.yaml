  - object_uuid: ger_object_f540cf321d09
    description_of_involvement: Geordi’s *engine modification files* are the prize
      Leah seeks, representing both a professional courtesy and a potential point
      of contention. When she asks, ‘*Do you have a file on all the work you’ve done?*’,
      her tone is polite but probing—she’s not just requesting data; she’s asserting
      her right to evaluate his work. Geordi’s offer to direct her to Pavlik is a
      gesture of transparency, but it also sets the stage for Leah’s independent assessment,
      which will later force Geordi to confront the gap between his idealized vision
      of her and her rigorous, unromantic professionalism. The files are a narrative
      MacGuffin, driving the subplot of Leah’s investigation and Geordi’s disillusionment.
    status_before_event: Stored in the *Enterprise*’s computer systems, accessible
      only to authorized personnel (e.g., Geordi, Pavlik, Leah with permission).
    status_after_event: Leah is en route to retrieve them, setting in motion her review
      of Geordi’s work and the potential realignment of their professional dynamic.
    global_id: ger_object_f540cf321d09
  - object_uuid: ger_object_31c99645bbba
    description_of_involvement: The *reoriented dilithium crystal* is the centerpiece
      of Geordi’s explanation, representing his most significant modification. Leah’s
      response (‘*And why you added that mid-range phase adjuster...*’) frames it
      as part of a larger pattern of innovation, and Geordi’s brief affirmation (‘*Right.*’)
      underscores its importance. The crystal embodies Geordi’s hands-on problem-solving—it’s
      a tangible result of his experience with recurring engine problems, and its
      mention foreshadows Leah’s later evaluation of whether such modifications are
      justified or reckless. The object is a silent but pivotal character in the exchange,
      symbolizing the collision between Geordi’s pragmatism and Starfleet’s protocols.
