- fabula_uuid: cand_evt_scene_337753ae2f89c81f_01
  global_id: null
  title: Geordi’s Holodeck Fantasy Defended
  description: Geordi La Forge, visibly nervous and fidgety, confesses to Guinan his
    idealized memory of Leah Brahms—a holographic recreation from a year prior that
    embodied warmth, brilliance, and effortless collaboration. He dismisses Guinan’s
    skepticism, insisting the hologram’s personality traits were derived from Leah’s
    Starfleet record, making their connection feel real. When Guinan cautions him
    about romanticizing fantasies, Geordi deflects, claiming he only seeks friendship,
    though his body language and enthusiasm betray deeper, unspoken hopes. The exchange
    underscores his emotional detachment from reality, setting up the inevitable clash
    between his fantasy and the real Leah Brahms, who arrives shortly after. Guinan’s
    unspoken warning lingers as Geordi leaves, undeterred, his optimism a fragile
    shield against disillusionment.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e16
