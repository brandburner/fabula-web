  title: Swarm detected as creature threat escalates
  description: In the Shuttlebay Control Booth, Geordi confirms the alien creature
    remains attached to the *Enterprise* despite full depressurization, revealing
    its resilience and the crew’s inability to dislodge it. Data detects multiple
    radio transmissions, and Worf identifies a swarm of similar entities emerging
    from the asteroid field, now just ten minutes away. The tactical situation worsens
    as Worf reports the ship’s weapons are limited to two seconds of phaser fire on
    auxiliary power. Picard’s command to display the swarm on-screen visually confirms
    the looming threat, shifting the crisis from containment to survival. The scene
    escalates tension by revealing the newborn’s survival is now tied to a coordinated
    attack that could overwhelm the *Enterprise*, forcing the crew to prepare for
    an imminent confrontation. Geordi’s technical failure to detach the creature and
    Worf’s grim weapons assessment underscore the ship’s vulnerability, while Picard’s
    calm but urgent demeanor sets the tone for the coming battle. The event serves
    as a turning point, transitioning from scientific curiosity to existential threat,
    and establishes the swarm as a relentless, coordinated force rather than isolated
    entities. The fade-out on Picard’s reaction leaves the crew’s next move uncertain,
    heightening the stakes for the following act.
