      \ for the crew’s unity and their shared determination to face the crisis together.\n\
      \      "
    observed_atmosphere: "\n        The atmosphere on the bridge is electric with\
      \ tension, the air thick with the weight of impending doom. The red alert lights\
      \ cast a stark, urgent glow over the crew, and the hum of the ship’s systems\
