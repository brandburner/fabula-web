    description_of_involvement: The **Geordi's Office Wall Monitor** is the primary
      interface through which Geordi interacts with the Tarchannen Three mission records.
      It flickers with static, its grainy display reflecting both the degraded state
      of the footage and Geordi's own mental fatigue. The monitor serves as a visual
      extension of Geordi's frustration, its flickering images and abrupt cutoffs
      to static mirroring the erratic, desperate nature of his search. When Data enters,
      the monitor displays the frozen frame of Susanna Leijten from the flashback,
      her image a ghostly reminder of the past and the stakes of the present. The
      monitor's role is both functional and symbolic—it is the tool Geordi uses to
      chase answers, but it also becomes a mirror for his unraveling state.
    status_before_event: The wall monitor is active, displaying the Tarchannen Three
      mission records in a loop. It is functional but visually degraded, with static
