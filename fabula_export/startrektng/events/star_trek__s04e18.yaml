  title: Bioluminescence reveals hidden infection
  description: "\n  Nurse Ogawa urgently summons Beverly to Sickbay, where Susanna’s\
    \ condition has deteriorated dramatically. Her skin now exhibits bioluminescent\
    \ properties—reacting to light with a fading phosphorescent trail—while her body\
    \ temperature plummets and her transformation accelerates despite medical intervention.\
    \ Beverly’s initial confusion shifts to clinical urgency as she realizes Susanna’s\
    \ physiology is generating a disruptive field, obscuring scans. Suspecting a foreign\
    \ entity driving the changes, Beverly orders an immediate genetic analysis to\
    \ identify the cause before the transformation becomes irreversible. The discovery\
    \ of Susanna’s mimetic bioluminescence marks a critical escalation, forcing Beverly\
    \ to abandon prior assumptions and pursue a more aggressive diagnostic approach.\
    \ This moment transforms the medical crisis from a puzzling anomaly into a race\
    \ against an unknown, potentially parasitic force.\n  "
