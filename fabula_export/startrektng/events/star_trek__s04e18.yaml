  scene_sequence: 24
  sequence_in_scene: 40
  key_dialogue:
  - 'BEVERLY: "There... in the thymus... Some kind of parasite. It''s using Susanna''s
    immune system to spread genetic instructions..."'
  - 'OGAWA: "There''s not much of her original DNA left."'
  - 'BEVERLY: "But we''re going to need unaltered genes... or we''ll never get her
    back. We''ve got to get that thing out of her. Now."'
