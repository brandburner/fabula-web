acts:
- fabula_uuid: act_f5da61909198233e
  number: 1
  summary: The narrative opens with a five-year-old recording from Tarchannen Three,
    showing a younger Geordi La Forge and Susanna Leijten investigating a vanished
    outpost alongside Ensigns Hickman, Mendez, and Brevelle. They discover a torn
    Starfleet uniform, hinting at the mystery. Five years later, Commander Leijten
    reports to Captain Picard, Commander Riker, and Geordi that Brevelle, Mendez,
    and Hickman have all disappeared, each last seen heading towards Tarchannen Three.
    Geordi expresses disbelief that Hickman, a family man, would desert. Leijten confirms
    Hickman was spotted en route to the planet, emphasizing that the original disappearances
    were never solved. The ominous realization that Geordi and Susanna are the only
    two remaining members of that original investigative team establishes a personal
    and immediate threat. The Enterprise then sets a course to intercept Hickman's
    stolen shuttlecraft. Geordi and Susanna share a moment of apprehension in Ten
    Forward, discussing their past and present fears, acknowledging the danger they
    face. On the Bridge, Hickman's shuttle is located, but he ignores all hails and
    commands, accelerating directly into Tarchannen Three's atmosphere, where it is
    destroyed. This dramatic event confirms the compulsion drawing Starfleet personnel
    back to the planet. Sensors detect two more Federation shuttles on the planet's
    surface, but no life signs. Picard dispatches an away team, including Riker, Worf,
    Data, Geordi, and Susanna, to investigate. On the planet, they find Mendez's shuttle
    and another torn uniform. Susanna discovers non-human footprints and begins to
    exhibit strange behavior, following the prints alone into the darkness. Geordi
    finds her, but she is disoriented and resists his attempts to help, thrashing
    violently. Geordi manages to transport them both back to Sickbay, marking the
    first direct physical manifestation of the mysterious affliction on a main character.
