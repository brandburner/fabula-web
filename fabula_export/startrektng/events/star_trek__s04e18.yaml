- fabula_uuid: cand_evt_scene_5cae7b427b19907b_02
  global_id: null
  title: Susanna’s Alien Senses and Collapse
  description: 'Susanna Leijten’s investigation of non-human footprints near the shuttle
    triggers a sudden, unsettling transformation in her behavior. She insists Mendez
    and Brevelle are alive, her voice laced with eerie certainty, before recoiling
    violently from Geordi’s touch. When he attempts to restrain her, she thrashes
    in panic, forcing him to call for an emergency medical transport. The scene escalates
    from tension to outright crisis, revealing Susanna’s deteriorating mental state—whether
    due to alien influence or psychological fracture—and compelling Geordi to confront
    the urgency of her condition before it spirals further. The moment marks a turning
    point: her erratic behavior no longer feels like paranoia but a symptom of something
    far more sinister, while Geordi’s forced intervention underscores the mission’s
    fragility and the need for immediate action. The chase ends with Susanna’s panicked
    face, a visual cue of her unraveling, as the act fades to black, leaving her fate—and
    the crew’s—hanging in the balance.'
