  title: Geordi demands to continue investigation
  description: 'In Beverly’s office, Geordi La Forge—already exhibiting early signs
    of the alien transformation—overhears Beverly and Picard discussing the horrifying
    truth: the Tarchannen III crew weren’t abducted but *transformed* into an unknown
    species. When Beverly admits she can only slow the process, Geordi’s denial collapses
    into desperate resolve. He argues that analyzing mission records is the only way
    to uncover the cause, appealing to Picard’s sense of urgency. Despite Beverly’s
    medical objections, Picard reluctantly grants permission, imposing strict bioscan
    monitoring and symptom reporting. The scene crystallizes Geordi’s refusal to accept
    passivity in the face of his impending fate, while underscoring the crew’s moral
    dilemma: scientific urgency versus personal safety in a crisis where time is the
    enemy. The exchange reveals Geordi’s engineering mindset—logic over emotion—but
    also his vulnerability, as Beverly’s warning that *he* could be next lingers unspoken
    between them. Picard’s decision reflects his trust in Geordi’s judgment, even
    as the captain’s own hesitation hints at the high stakes of the gamble.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e18
  scene_sequence: 17
  sequence_in_scene: 31
  key_dialogue:
  - 'GEORDI: Can you stop it, Doctor?'
  - 'BEVERLY: The T-cell stimulator will slow the rate of change... but until I find
    the cause...'
  - 'GEORDI: Then how did she get it?'
  - 'BEVERLY: That''s a good question. And it would be a great help if I knew.'
  - 'BEVERLY: The only thing I do know, Geordi... is that it''s very possible you''ll
    be next.'
  - 'GEORDI: Then there''s no time to waste. I''ve got to get back to work.'
  - 'PICARD: And what if you begin to change... and feel compelled to return to the
    planet like the others?'
  - 'GEORDI: Program the computer to monitor my movements... that way you can be sure
    I don''t leave the ship.'
  - 'GEORDI: What would you do, sir? Sit it out in Sickbay... or try to learn what
    it is that''s got you... and maybe stop it?'
