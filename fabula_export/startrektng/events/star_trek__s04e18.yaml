  - object_uuid: ger_object_f69fff985910
    description_of_involvement: 'The enhanced sensor arrays are calibrated by Worf
      to detect Geordi''s unique absorption spectrum, but their effectiveness is undermined
      by Tarchannen Three''s atmospheric interference. Worf reports that the scans
      are still negative and that high-resolution EM adjustments will take *several
