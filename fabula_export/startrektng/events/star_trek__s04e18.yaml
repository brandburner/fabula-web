  - 'DATA: Have you done an audio analysis...'
  - 'GEORDI: And a spectrographic analysis and a screen for ionizing radiation...
    and I even ran an enhancement for micro-seismic disturbances. I''ve tried it all.'
  - 'DATA: Perhaps if you indulged in a short rest period, you could approach this
    problem with what humans commonly refer to as a fresh point of view...'
  - 'GEORDI: You''re probably right, Data. But I''ve got to finish scanning these
    records... while I can.'
