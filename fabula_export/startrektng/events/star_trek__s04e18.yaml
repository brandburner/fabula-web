  object_involvements:
  - object_uuid: ger_object_f03628bb7265
    description_of_involvement: "\n        The abandoned shuttlecraft serves as the\
      \ starting point for the team’s investigation and the discovery of the torn\
      \ Starfleet uniform. Geordi exits the shuttle to show the uniform to the team,\
      \ and Susanna’s subsequent disappearance and erratic behavior unfold near its\
      \ exterior. The shuttle’s derelict state and the uniform inside symbolize the\
      \ vanished crew’s fate, while its proximity to the non-human footprints ties\
      \ it directly to the contagion’s threat.\n      "
    status_before_event: Abandoned on Tarchannen Three’s surface, doors pried open,
      interior containing the torn uniform.
    status_after_event: Remains abandoned but now tied to Susanna’s unraveling, its
      interior a grim reminder of the crew’s disappearance.
    global_id: ger_object_f03628bb7265
  - object_uuid: ger_object_e3d747673add
    description_of_involvement: "\n        The non-human footprints near the shuttle\
      \ are the catalyst for Susanna’s unraveling. She discovers them and becomes\
      \ fixated on the idea that Mendez and Brevelle are alive, her voice taking on\
      \ an eerie certainty. The footprints serve as a tangible link to the contagion,\
      \ symbolizing the unseen threat and the planet’s ability to distort perception.\
      \ Their presence forces the team to confront the possibility that Susanna is\
      \ already succumbing to the same force that transformed the others.\n      "
    status_before_event: Embedded in the dirt beside the shuttle, irregular and non-human
      in appearance.
    status_after_event: Discovered by Susanna, their significance amplified by her
      erratic behavior and the team’s growing unease.
    global_id: ger_object_e3d747673add
  - object_uuid: ger_object_807f153d2d46
    description_of_involvement: "\n        The portable beacons are used by the team\
      \ to illuminate the dark surface of Tarchannen Three. Worf and Riker direct\
      \ their beams across the non-human footprints, while Susanna powers off her\
      \ beacon as she recoils from Geordi’s grasp. The sudden darkness amplifies the\
      \ tension, casting her panicked face in shadow as the team scrambles to respond.\
      \ The beacons’ light—and its absence—serve as a metaphor for the team’s struggle\
      \ to see the truth in the face of the planet’s deceptions.\n      "
    status_before_event: Clutched by the team members, beams sweeping the darkness.
    status_after_event: Susanna’s beacon is turned off, plunging her into shadow as
      she thrashes in panic.
    global_id: ger_object_807f153d2d46
  - object_uuid: ger_object_a16671a34190
    description_of_involvement: "\n        Geordi’s communicator is the tool that\
      \ seals Susanna’s fate in this moment. After restraining her as she thrashes\
      \ in panic, he flips it open and calls for emergency medical transport to Sickbay.\
      \ The device’s glow cuts through the darkness, symbolizing the team’s last resort\
      \ to contain the crisis. Its use marks the turning point where Susanna’s condition\
      \ is no longer deniable, and the mission’s urgency shifts from investigation\
      \ to survival.\n      "
    status_before_event: Closed and attached to Geordi’s uniform.
    status_after_event: Open and active, its panel glowing as it hails the Enterprise.
    global_id: ger_object_a16671a34190
  - object_uuid: ger_object_aef660e7069f
    description_of_involvement: "\n        Geordi La Forge’s tricorder is used to\
      \ scan the area for life signs as the team searches for Susanna. When Susanna\
      \ claims to sense the presence of Mendez and Brevelle, Geordi scans again but\
      \ detects nothing, reinforcing the eerie disconnect between her perception and\
      \ empirical reality. The tricorder’s failure to confirm her claims underscores\
      \ the alien nature of the threat and the possibility that Susanna is already\
      \ under its influence.\n      "
    status_before_event: Functional and in Geordi’s possession, used for initial scans
      of the area.
    status_after_event: Still functional but yields no conclusive results, reinforcing
      the mystery of Susanna’s claims.
    global_id: ger_object_aef660e7069f
  - object_uuid: ger_object_c32e183c0a76
    description_of_involvement: "\n        The torn Starfleet uniform, found inside\
      \ the abandoned shuttle, is a critical clue to the vanished crew’s fate. Geordi\
      \ shows it to the team, and its violent tears—suggesting a brutal struggle or\
      \ forced transformation—heighten the tension. The uniform’s presence reinforces\
      \ the reality of the contagion and foreshadows Susanna’s potential transformation,\
      \ tying her erratic behavior to the same unseen force that claimed the others.\n\
      \      "
    status_before_event: Crumpled on the shuttle floor, violently torn with jagged
      edges.
    status_after_event: Shown to the team, its condition a haunting reminder of the
      crew’s disappearance.
    global_id: ger_object_c32e183c0a76
