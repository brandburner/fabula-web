    functionally invisible aboard the *Enterprise*—a terrifying possibility that suggests
    he might still be on the ship, undetected. The revelation escalates the urgency
    of the search, as Geordi’s potential disappearance could now be happening in plain
    sight, with no way to track him. Beverly’s medical insight forces the crew to
    confront the horrifying reality that their own sensors may be useless against
    this alien adaptation, raising the stakes for both Geordi’s survival and the mission’s
    success. The dialogue underscores the vulnerability of the crew to an enemy that
    can exploit their own technology against them, while also highlighting Beverly’s
    role as the voice of grim medical logic in the face of escalating crisis.'
