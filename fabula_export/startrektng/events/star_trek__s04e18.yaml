      \ values of curiosity and duty, and the institutional structures that support\
      \ the crew's actions. While no crew members are visible, the Enterprise itself\
      \ is a manifestation of Starfleet's authority, technology, and the collective\
      \ will of its members. The orbit around Tarchannen III reflects Starfleet's\
      \ dual role: as both an exploratory force venturing into the unknown and a protective\
      \ entity standing guard against unseen threats. The fade-out and the text 'END\
      \ OF ACT FIVE' underscore the organizational stakes, leaving the audience with\
      \ the sense that Starfleet's values and protocols will be tested in the resolution\
      \ of the crisis.\n      "
