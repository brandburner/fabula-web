  key_dialogue: &id057
  - 'SUSANNA: No... you must turn them off... the light frightens them...'
  - 'SUSANNA: Geordi, my voice is familiar... listen to it... you can feel that we
    share this... you know I am not a threat... The others... Mendez, Brevelle, they
    no longer exist as humans... but a part of you still does. You are not one of
    them... not yet. I can help you... if you''ll just trust me...'
  - 'SUSANNA: Look at me... I''ve come back... Let me take you back, too.'
  - 'SUSANNA: We''re going home, Geordi.'
