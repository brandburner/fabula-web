  - object_uuid: ger_object_7e651d211786
    description_of_involvement: 'Geordi’s tampered emergency beacon is the crew’s
      most promising tool for tracking him on Tarchannen Three. Data repairs and modifies
      it, tuning it to emit ultraviolet light that penetrates the planet’s sensor-obscured
      atmosphere. The beacon’s transformation from a sabotaged device to a critical
