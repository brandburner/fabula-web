      that might explain the transformations.
    - To prove to himself (and by extension, the crew) that his analytical skills
      can still solve the problem, despite his deteriorating condition.
    what_happened: Geordi La Forge sits alone in his office, his body language betraying
      exhaustion—slumped shoulders, a hand rubbing his temple as if warding off a
      headache. He stares intently at the wall monitor, his VISOR reflecting the flickering
      static of the mission records. His voice is strained as he barks commands at
      the computer, each negative response deepening the creases of frustration on
      his face. When Data enters, Geordi interrupts him mid-sentence, a rare lapse
      in his usual patience, before admitting his failure with a weary sigh. His final
      exchange with Data—agreeing to rest but only 'while I can'—reveals the raw edge
      of his desperation, his fingers trembling slightly as he turns back to the monitor.
