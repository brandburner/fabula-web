- fabula_uuid: cand_evt_scene_bde0114d5787f0f2_01
  global_id: null
  title: Shuttle discovery confirms Mendez’s fate
  description: "\n  The away team materializes on Tarchannen Three’s desolate surface,\
    \ where the perpetual twilight casts long shadows over the abandoned shuttlecraft—a\
    \ critical piece of evidence tied to the disappearances. Susanna Leijten, leading\
    \ the approach, immediately identifies the shuttle as the one stolen by Mendez\
    \ from the *Aries*, confirming the crew’s compulsion to return to the planet.\
    \ Her recognition escalates the urgency of the mission, as the shuttle’s presence\
    \ implicates the alien influence in the transformations and disappearances. Geordi\
    \ La Forge, driven by both professional duty and personal fear (given his own\
    \ impending transformation), takes the initiative to enter the shuttle, crossing\
    \ a threshold that shifts the investigation from external observation to direct\
    \ confrontation with the mystery. The moment marks a turning point: the shuttle’s\
    \ discovery is no longer theoretical evidence but tangible proof of the planet’s\
    \ sinister hold over the crew, including Mendez and now Geordi himself. The team’s\
    \ split focus—Susanna and Geordi investigating the shuttle while Riker, Worf,\
    \ and Data secure the perimeter—reflects the duality of their mission: solving\
    \ the past while racing against Geordi’s deteriorating condition.\n  "
