  title: Worf discovers Geordi’s discarded VISOR
  description: "\n  In the holodeck’s Tarchannen Three simulation, Commander Riker\
    \ and Lieutenant Worf lead a security team searching for clues about the crew’s\
    \ disappearances. While Riker examines a frozen humanoid hologram—an unexplained\
    \ artifact from the mission—Worf discovers Geordi La Forge’s torn Starfleet uniform\
    \ and discarded VISOR, clear evidence of his violent transformation. The find\
    \ confirms Geordi’s disappearance is tied to the same alien metamorphosis affecting\
    \ other crew members, escalating the urgency to uncover the cause before it’s\
    \ too late. The moment underscores the horror of the transformation and the crew’s\
    \ desperate race against time to save Geordi and prevent further spread of the\
    \ contagion.\n  "
