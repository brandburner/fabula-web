  object_involvements:
  - object_uuid: ger_object_a46df408ff62
    description_of_involvement: "\n        The Enterprise’s long-range sensors are\
      \ the first to detect the shuttle’s erratic trajectory, providing the crew with\
      \ critical (if grim) data. Worf’s initial report—‘Long range sensors holding\
      \ on the shuttlecraft’—sets the stage for the event, and Data’s subsequent analysis\
      \ confirms the shuttle’s acceleration toward Tarchannen Three. The sensors are\
      \ more than just tools; they are the crew’s eyes into the unknown, revealing\
      \ a threat that cannot be ignored. Their data is clinical, but the implications\
      \ are devastating: the shuttle is lost, and the phenomenon is active. The sensors’\
      \ role is to turn suspicion into certainty, forcing the crew to act.\n      "
    status_before_event: "\n        The long-range sensors are locked onto the shuttle\
      \ as it enters the Tarchannen system, their data streams feeding into the bridge’s\
      \ consoles. They are operational but have not yet revealed the full extent of\
      \ the crisis.\n      "
    status_after_event: "\n        The sensors confirm the shuttle’s uncontrolled\
      \ descent, their data now a grim confirmation of the crew’s worst fears. The\
      \ shuttle is beyond recovery, and the sensors’ role shifts from detection to\
      \ documentation of the inevitable.\n      "
    global_id: ger_object_a46df408ff62
  - object_uuid: ger_object_59e83294c7fc
    description_of_involvement: "\n        The Enterprise’s bridge viewscreen is the\
      \ primary instrument through which the crew experiences the shuttle’s descent.\
      \ Graham’s update—‘The craft is now within visual range’—triggers Picard’s order\
      \ to display it, and the viewscreen becomes the focal point of the event. The\
