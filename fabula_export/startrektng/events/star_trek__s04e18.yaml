      Data’s microscopic examination.
    status_after_event: Logged into the ship’s forensic database, with Doctor Crusher
      and Data initiating a cross-referencing search to identify the species.
    global_id: ger_object_0f36b50b25e5
  - object_uuid: ger_object_af06dbf58f55
    description_of_involvement: "\n        The computer graphic of the unidentified\
