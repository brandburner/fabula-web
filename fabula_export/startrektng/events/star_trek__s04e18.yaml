  object_involvements:
  - object_uuid: ger_object_164f48ea8e95
    description_of_involvement: Beverly’s Starfleet comm badge is the lifeline that
      connects the away team to the *Enterprise* and ultimately secures Geordi’s rescue.
      When she taps the insignia to initiate the transport, it chirps to life, establishing
      a direct link to the ship’s transporter room. The badge’s activation is a pivotal
      moment, marking the transition from the desperate search on Tarchannen Three
      to the medical intervention Geordi so desperately needs. Its role is both practical
      (facilitating communication and transport) and symbolic (representing the team’s
      reliance on Starfleet’s resources to save one of their own).
    status_before_event: Attached to Beverly’s uniform, dormant but ready for activation
      to coordinate the transport.
    status_after_event: Activated, establishing a connection to the *Enterprise* and
      initiating the transport of Geordi and Susanna to Sickbay.
    global_id: ger_object_164f48ea8e95
  - object_uuid: ger_object_7e651d211786
    description_of_involvement: Data’s modified ultraviolet emergency beacon is the
      linchpin of the team’s ability to locate Geordi and the transformed creatures.
      Its blue glow pierces the darkness, revealing the creatures’ hiding places without
      triggering their flight response. The beacon’s precision allows Data to track
      Geordi’s movements, even as he flees, and ultimately exposes the secluded area
      where Geordi is huddled. Its functional role is both tactical (locating targets)
      and narrative (symbolizing the team’s desperate search for a way to reach Geordi
      before it’s too late).
    status_before_event: Activated and held by Data, its filament glowing intensely
      as he scans the underbrush for signs of Geordi and the creatures.
    status_after_event: Still active, its light continues to illuminate the secluded
      area as Susanna coaxes Geordi out of hiding, ensuring the team can see and intervene.
    global_id: ger_object_7e651d211786
  - object_uuid: ger_object_9a452328c57e
    description_of_involvement: 'The palm beacons, initially activated by the team
      upon materializing, are swiftly turned off at Susanna’s warning. Their light
      triggers the transformed creatures’ aggressive instincts, making them a critical
      hazard in the environment. The beacons’ sudden deactivation is a tactical maneuver,
      shifting the team’s approach from illumination to stealth. Their role here is
      dual: as a tool that nearly compromises the mission and as a lesson in the creatures’
      sensitivity to light, which informs the team’s use of the ultraviolet beacon
      later.'
    status_before_event: Activated by the team, casting bright light across the desolate
      landscape, triggering the creatures’ aggression.
    status_after_event: Deactivated by the team, plunging the area back into the planet’s
      natural twilight, allowing for safer movement.
    global_id: ger_object_9a452328c57e
