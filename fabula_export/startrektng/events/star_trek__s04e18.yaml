  title: Susanna’s collapse reveals irreversible transformation
  description: "\n  In Geordi’s office, Susanna’s deteriorating mental and physical\
    \ state reaches a breaking point as she fixates on returning to Tarchannen Three,\
    \ her desperation revealing the alien transformation’s psychological grip. When\
    \ Geordi suggests medical intervention, she rejects it violently, insisting the\
    \ answers lie on the planet. As she storms out, her body betrays her—trembling\
    \ uncontrollably before collapsing in Main Engineering. Geordi’s attempt to catch\
    \ her exposes the undeniable proof of her metamorphosis: dark blotches on her\
    \ neck and fused fingers, confirming the irreversible nature of the alien infection.\
    \ The moment forces Geordi to confront the urgency of his own impending fate,\
    \ marking a critical escalation in the crisis. The revelation also underscores\
    \ the transformation’s compulsion, as Susanna’s actions mirror those of the earlier\
    \ disappeared crew members (Brevelle, Hickman, Mendez), suggesting a shared, inescapable\
    \ pull toward Tarchannen Three.\n  "
