  title: Geordi discovers torn Starfleet uniform
  description: 'Geordi La Forge enters the abandoned shuttlecraft, his movements deliberate
    but tense as he scans the confined space for clues about the vanished crew. His
    attention snaps to the floor, where a violently torn Starfleet uniform lies crumpled—its
    jagged edges and unnatural rips suggesting a struggle or a sudden, forced transformation.
    The uniform’s presence implicates the shuttle as the site of the crew’s disappearance,
    its condition hinting at the same violent fate now threatening Geordi. The discovery
    heightens the mystery: was this a struggle against an external force, or evidence
    of the crew’s own bodies being altered against their will? The uniform’s torn
    fabric becomes a silent witness to the horror unfolding on Tarchannen Three, forcing
    Geordi to confront the reality that he may be next.'
