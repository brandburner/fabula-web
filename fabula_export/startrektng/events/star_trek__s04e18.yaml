  title: Data confronts his emotional investment in Geordi
  description: In Beverly Crusher’s office, Data and Beverly review inconclusive medical
    data on the Tarchannen Three transformations, their urgency underscored by the
    risk to Geordi. Beverly directly challenges Data’s insistence on logic, calling
    out his uncharacteristic motivation to solve the mystery. Data deflects at first,
    invoking his android nature, but his hesitation and eventual admission—‘I am strongly
    motivated to solve this mystery’—reveal his deep, unspoken attachment to Geordi.
    The exchange forces Data to acknowledge his emotional stakes, a rare moment of
    vulnerability that reframes his scientific detachment as a facade for concern.
    This confrontation becomes a turning point in Data’s arc, exposing the tension
    between his programming and his growing humanity, while also heightening the urgency
    of their mission to save Geordi before he transforms. The scene pivots from clinical
    analysis to raw emotional stakes, driving the narrative forward with both character
    depth and thematic resonance.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e18
  scene_sequence: 14
  sequence_in_scene: 25
  key_dialogue:
  - 'BEVERLY: The parameters are pretty broad, Data... any match we make is going
    to be inconclusive at best.'
  - 'DATA: I am aware of that. However, I see no other reasonable course of investigation
    available to us. And we may not have much time.'
  - 'BEVERLY: You''re worried about Geordi, aren''t you?'
  - 'DATA: I am an android. It is not possible for me to feel anxiety. Starfleet personnel
    have vanished... others may be at risk. We must do the best we can to find out
    why.'
  - 'DATA: However... I am strongly motivated to solve this mystery.'
