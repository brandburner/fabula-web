  title: Geordi vanishes after transporter breach
  description: "\n  The crisis escalates as Data discovers Geordi La Forge has bypassed\
    \ transporter security in Room Six, initiating an unauthorized transport to Tarchannen\
    \ Three. The bridge crew reacts with alarm when Worf confirms no life signs on\
    \ the surface, forcing Picard to acknowledge the sensor array’s failure. This\
    \ revelation triggers a moment of stunned silence—Geordi’s disappearance mirrors\
    \ the fate of the Tarchannen Three victims, raising the terrifying possibility\
    \ that he, too, has been transformed and is now lost. Picard’s order to find another\
    \ way to locate Geordi shifts the narrative into high-stakes problem-solving,\
    \ with Data proposing an ultraviolet light solution to bypass the sensor limitations.\
    \ The event marks a turning point: the crew’s tools and understanding are failing\
