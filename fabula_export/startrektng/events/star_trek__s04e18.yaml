  title: Data modifies UV beacon for Geordi’s rescue
  description: "\n  In the Transporter Room, Data executes a critical technical modification\
    \ to the *Enterprise*’s UV beacon, repurposing it to pinpoint Geordi La Forge’s\
    \ location on Tarchannen III. The urgency is palpable—Geordi’s transformation\
    \ into an alien species is accelerating, and the crew’s window to retrieve him\
    \ before he is lost forever is narrowing. Meanwhile, Chief Hedrick provides the\
    \ away team’s transport coordinates, while Riker finalizes preparations for the\
    \ high-stakes rescue mission. The scene is a convergence of logistical precision\
    \ and emotional tension, as the crew races against time to counter the planet’s\
    \ deadly influence. Data’s modification is not just a technical fix but a symbolic\
    \ act of hope, grounding the crew’s efforts in tangible progress. The moment underscores\
    \ the crew’s resourcefulness and their refusal to abandon one of their own, even\
    \ as the stakes grow increasingly dire.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e18
  scene_sequence: 37
  sequence_in_scene: 63
  key_dialogue: &id059
  - 'DATA: "The UV beacon’s frequency has been recalibrated to match the spectral
    signature of the alien cells detected in Commander Leijten’s tissue samples. This
    should allow us to triangulate Geordi’s location on the planet’s surface."'
  - 'RIKER: "How long until we have a lock?"'
  - 'DATA: "Approximately three minutes, Commander. The modifications are complete."'
  - 'HEDRICK: "Transport coordinates for the away team are locked in, sir. We’re ready
    to beam them down as soon as we have Geordi’s exact location."'
