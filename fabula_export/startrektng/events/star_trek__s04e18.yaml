- fabula_uuid: cand_evt_scene_eb41a6f9f687fa98_01
  global_id: null
  title: Beverly reveals the transformation truth
  description: "\n  In Beverly’s office, Picard and Beverly examine magnified cell\
    \ samples—one from Susanna’s altered skin, the other an alien cell Data recovered—when\
    \ Geordi enters unnoticed. Beverly delivers the devastating truth: the Tarchannen\
    \ Three crew weren’t abducted but *transformed* into an unknown species, and Geordi’s\
    \ clean bioscans are a false reassurance. His denial crumbles as Beverly admits\
    \ she can’t stop the process yet, and Geordi’s desperation shifts from passive\
    \ fear to urgent action. Picard reluctantly approves Geordi’s continued investigation,\
    \ despite Beverly’s warnings, as Geordi argues that inaction guarantees his fate.\
    \ The scene pivots from revelation to reckoning, forcing Geordi into active participation\
    \ in his survival while underscoring the insidious, unpredictable nature of the\
    \ transformation. The ticking clock tightens as Beverly’s uncertainty about the\
    \ timeline—weeks or hours—hangs over the room.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e18
  scene_sequence: 17
  sequence_in_scene: 30
  key_dialogue:
  - 'BEVERLY: This is one of Susanna''s altered skin cells... And this is one of the
    alien cells Data found. Captain, I think the people who disappeared from Tarchannen
    Three weren''t abducted... they were transformed into another species...'
  - |-
    GEORDI: Can you stop it, Doctor?
    BEVERLY: The T-cell stimulator will slow the rate of change... but until I find the cause... (shakes head). The only thing I do know, Geordi... is that it's very possible you'll be next.
  - |-
    GEORDI: Then there's no time to waste. I've got to get back to work.
    PICARD: What if you begin to change... and feel compelled to return to the planet like the others?
    GEORDI: Program the computer to monitor my movements... that way you can be sure I don't leave the ship.
    GEORDI: What would you do, sir? Sit it out in Sickbay... or try to learn what it is that's got you... and maybe stop it?
