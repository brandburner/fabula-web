  title: Geordi’s disappearance triggers bridge crisis
  description: 'The bridge crew’s tense investigation into the Tarchannen Three infection
    is abruptly derailed when Beverly Crusher’s post-surgery update reveals Geordi
    La Forge has vanished from the *Enterprise*—despite his successful surgery and
    no record of transporter or shuttle activity. The revelation triggers a stunned
    silence, then escalating alarm as Beverly confirms the Computer’s report: Geordi
    is no longer on board. This forces the senior staff to confront the horrifying
    possibility that Geordi’s disappearance marks the next stage of the alien transformation,
    escalating the mission from a medical mystery to an existential threat with personal
    stakes for the entire crew. The moment pivots the narrative from external threat
    to internal crisis, compelling immediate action while underscoring the crew’s
    vulnerability to an enemy they cannot yet see or understand.'
