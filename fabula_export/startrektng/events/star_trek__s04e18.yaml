  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: Starfleet’s presence is palpable in this scene, not
      through overt representation but through the team’s actions, protocols, and
      the stakes of their mission. The shuttlecraft’s theft from the *Aries* ties
      the personal crisis of Mendez’s disappearance to the larger institutional failure—Starfleet’s
      inability to protect its crew from the alien contagion. The team’s adherence
      to away mission protocols (e.g., securing the perimeter, investigating the shuttle)
      reflects Starfleet’s training and values, even as they grapple with a threat
      that defies conventional understanding. The organization’s goals—safety, truth,
      and resolution—are embodied in the team’s actions, though the crisis exposes
      the limits of Starfleet’s preparedness.
    active_representation: Via institutional protocol being followed (away team deployment,
      perimeter security, evidence gathering) and through the team’s shared identity
      as Starfleet officers.
    power_dynamics: Exercising authority over the team’s actions (through training,
      protocol, and chain of command) but operating under constraint—Starfleet’s resources
      and protocols are being tested by an unprecedented threat.
    organizational_goals:
    - Uncover the truth behind the crew’s vanishings and the shuttle’s abandonment
      to prevent further transformations
    - Ensure the away team’s safety while investigating the shuttlecraft and the planet’s
      dangers
    influence_mechanisms:
    - Through the team’s adherence to Starfleet protocols and training (e.g., Riker’s
      orders, Worf and Data’s perimeter security)
    - Via the institutional stakes tied to the shuttle’s theft from the *Aries* and
      the broader crisis affecting Starfleet personnel
    institutional_impact: The scene highlights Starfleet’s vulnerability to threats
      that defy conventional understanding, as well as the personal and professional
      risks faced by its officers. The team’s investigation is not just a mission
      but a test of Starfleet’s ability to adapt and protect its people.
    internal_dynamics: Tension between institutional protocol and the unpredictable
      nature of the alien threat. The team’s actions reflect Starfleet’s values, but
      the crisis forces them to operate outside standard procedures, exposing the
      organization’s limitations.
    global_id: ger_organization_73a4b614bde7
  - organization_uuid: ger_organization_83ab3d86da7b
    description_of_involvement: The *Aries* is invoked through Susanna’s identification
      of the shuttlecraft as stolen from the vessel, directly tying Mendez’s disappearance
      to the *Aries’* crew and the broader Starfleet crisis. While the *Aries* itself
      is not physically present, its role as the origin point of the shuttlecraft—and
      by extension, the contagion—adds a layer of institutional gravity to the scene.
      The *Aries’* connection to the mystery underscores the scale of the threat,
      as it suggests that the transformation contagion has already claimed multiple
      Starfleet crews, not just Mendez. The organization’s involvement is implicit
      but critical, as it frames the team’s investigation as part of a larger, ongoing
      effort to contain the crisis.
    active_representation: Through the shuttlecraft’s provenance (stolen from the
      *Aries*) and the broader implications of Mendez’s disappearance for the *Aries’*
      crew.
    power_dynamics: Operating under the shadow of institutional failure—the *Aries’*
      inability to prevent Mendez’s theft or the crew’s transformations. The team’s
      investigation is, in part, an attempt to rectify the *Aries’* shortcomings and
      prevent further losses.
    organizational_goals:
    - Recover the stolen shuttlecraft and gather evidence to understand the transformation
      contagion’s origins
    - Prevent further crew vanishings or transformations by uncovering the mechanism
      behind the alien threat
    influence_mechanisms:
    - Through the shuttlecraft as a physical link to the *Aries* and the contagion’s
      spread
    - Via the institutional stakes tied to Mendez’s disappearance and the *Aries’*
      crew’s fate
    institutional_impact: The *Aries’* involvement raises the stakes of the investigation,
      as it suggests that the team’s failure to solve the mystery could result in
      further losses across Starfleet. The organization’s reputation and the safety
      of its crews hang in the balance.
    internal_dynamics: Tension between the *Aries’* past failures (e.g., allowing
      the shuttle to be stolen, losing crew to the contagion) and the team’s present
      efforts to rectify those failures. The *Aries*’s absence in the scene is a silent
      but looming presence, driving the team’s urgency.
