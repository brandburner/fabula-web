  title: Data proposes ultraviolet beacon solution
  description: "\n  With Geordi La Forge vanished after an unauthorized transporter\
    \ breach—his life signs undetectable on Tarchannen Three—the bridge crew faces\
    \ a critical impasse. Picard acknowledges the sensor array’s failure, leaving\
    \ the crew without a means to locate Geordi before the alien transformation completes.\
    \ Data, analyzing the situation, proposes a high-risk technical solution: modifying\
    \ an emergency beacon to emit ultraviolet light, which could bypass the sensor\
    \ array’s limitations and read Geordi’s absorption spectrum. This moment hinges\
    \ on Data’s analytical precision and the crew’s desperation, as the proposal introduces\
    \ a high-stakes gambit that could either save Geordi or, if misapplied, accelerate\
    \ his transformation. Riker immediately endorses the plan, and Picard orders its\
    \ execution, setting the stage for an away team to deploy with the modified beacon.\
    \ The scene underscores the crew’s resourcefulness under pressure and the escalating\
    \ tension of Geordi’s fate, now tied to the success of Data’s untested solution.\n\
    \  "
