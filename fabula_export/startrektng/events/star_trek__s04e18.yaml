  title: Hickman’s shuttle crashes into Tarchannen Three
  description: The bridge crew of the *Enterprise* watches in horror as Ensign Hickman’s
    stolen shuttle spirals uncontrollably toward Tarchannen Three’s atmosphere, defying
    all attempts to intervene. Picard’s urgent hails go unanswered as Data’s sensor
    readings confirm the shuttle’s inevitable destruction—now just seconds away. The
    crew’s collective panic escalates as the shuttle burns up on entry, leaving only
    a flash of light and silence. Worf’s immediate sensor sweep reveals two additional
    abandoned Federation shuttles on the planet’s surface, both devoid of life signs,
    deepening the mystery of the missing crew and the alien transformation’s reach.
    The revelation triggers an urgent away team deployment, with Riker assigning Geordi,
    Data, Worf, and Susanna to investigate the planet’s surface, where the truth of
    the disappearances—and the fate of those transformed—may finally be uncovered.
    The event serves as a brutal turning point, confirming the compulsion driving
    the transformed individuals and raising the stakes for Geordi’s own impending
    transformation.
