  title: Riker and Worf race to locate Geordi
  description: "\n  In Engineering, Riker and Worf arrive to find Data modifying Geordi’s\
    \ tampered emergency beacon, confirming the device was sabotaged. Hedrick’s transporter\
    \ logs reveal Geordi beamed down near the *Aries* shuttle on Tarchannen Three,\
    \ but the vast, sensor-obscured terrain—spanning over 300 square kilometers—makes\
    \ a search nearly impossible. Riker’s urgency escalates as Worf reports that enhanced\
    \ EM scans to track Geordi’s absorption spectrum will take hours, a delay Geordi\
    \ cannot afford given the alien transformation’s accelerating timeline. Data completes\
    \ the beacon’s repair, but the real breakthrough hinges on whether the crew can\
    \ narrow the search radius before Geordi’s fate mirrors that of the vanished *Aries*\
    \ crew. Riker’s order to meet Dr. Crusher in Transporter Room Six signals a shift\
    \ from investigation to high-stakes rescue, with the clock ticking against Geordi’s\
    \ survival.\n  "
