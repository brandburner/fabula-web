  title: Hedrick discovers Geordi’s alien form
  description: During routine transporter maintenance in Transporter Room Six, Chief
    Hedrick stumbles upon Geordi La Forge mid-transformation—his body partially warped
    into an alien, chameleon-skinned humanoid. The encounter begins as a standard
    security alert, but before Hedrick can react, the alien-Geordi lunges at him in
    a violent blur, knocking him to the ground. This moment marks the first direct,
    unfiltered witnessing of the Tarchannen Three contagion’s physical toll, escalating
    the stakes of the mystery and forcing the crew to confront the horrifying reality
    of Geordi’s transformation. The attack underscores the urgency to contain the
    contagion before Geordi vanishes entirely, while also revealing the alien form’s
    predatory nature and the contagion’s ability to bypass transporter security protocols.
    Hedrick’s failed attempt to call for help highlights the suddenness and brutality
    of the transformation, leaving the crew with no time to prepare for the escalating
    crisis.
