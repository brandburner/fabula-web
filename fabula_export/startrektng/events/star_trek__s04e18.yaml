      compile them into the holodeck simulation.
    status_after_event: Used to create the simulation, which remains active but is
      disrupted as Geordi’s transformation accelerates.
    global_id: ger_object_d2130d4688fb
  - object_uuid: ger_object_a70801f337b0
    description_of_involvement: The Tarchannen Three Mission Holographic Simulation
      is the primary tool Geordi uses to reconstruct and analyze the away team’s final
      moments. He commands the computer to create the simulation, extrapolate movements,
      and isolate the anomalous shadow. The simulation allows him to freeze, reverse,
      and manipulate the holograms of Susanna, Mendez, and himself, systematically
      removing their shadows to prove the unexplained shadow has no source. The simulation’s
      limitations—such as the computer’s inability to identify the shadow’s origin—drive
      Geordi to extrapolate the shadow’s shape, revealing the humanoid entity. This
      object is central to the investigation, serving as both a window into the past
      and a catalyst for Geordi’s transformation.
    status_before_event: Inactive until Geordi commands the computer to compile it
      from Starfleet records. Once activated, it recreates the Tarchannen Three outpost
      and away team with high fidelity.
    status_after_event: Remains active but is disrupted as Geordi’s transformation
      accelerates, leaving the simulation in a state of unresolved tension.
    global_id: ger_object_a70801f337b0
  - object_uuid: ger_object_1dc64befdc3f
    description_of_involvement: The Anomalous Shadow is the central mystery of the
      event, an unexplained silhouette that persists on the holodeck wall even after
      all crew members’ holograms are removed. Geordi isolates this shadow through
      systematic elimination, proving it has no logical source in the simulation.
      The shadow’s behavior—disappearing when Brevelle’s camera light is turned off
      and reappearing when it is turned back on—confirms its unnatural origin. The
      computer’s inability to identify its source leads Geordi to extrapolate its
      shape, revealing a humanoid entity. This object is the catalyst for Geordi’s
      transformation, serving as a harbinger of the contagion that claimed the away
      team.
    status_before_event: Present on the holodeck wall during the simulation, initially
      indistinguishable from the shadows of the away team.
    status_after_event: Extrapolated into a humanoid figure, confirming its external
      origin and triggering Geordi’s physical deterioration.
    global_id: ger_object_1dc64befdc3f
  - object_uuid: ger_object_04d97a45d853
    description_of_involvement: The Vector Analysis Data is generated by the computer
      in response to Geordi’s command to identify the source of the anomalous shadow.
      Glowing vector lines trace the shadow’s path across the holodeck grid, converging
