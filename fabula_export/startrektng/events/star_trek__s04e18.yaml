  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: "\n      Starfleet is the invisible but omnipresent\
      \ force shaping this event, its protocols and values both a guide and a constraint\
      \ for the crew. The disappearance of Geordi La Forge—a senior officer and technical\
      \ expert—is not just a personal tragedy but a failure of Starfleet’s investigative\
      \ and protective systems. The crew’s reliance on Starfleet’s medical and technical\
      \ protocols (Beverly’s surgery, Data’s analysis, the Computer’s logs) is suddenly\
      \ called into question. The organization’s involvement is *structural*—it provides\
      \ the framework within which the crew operates, but its limitations are exposed\
      \ by the crisis. Starfleet’s emphasis on first contact and discovery now feels\
      \ like a liability, as the crew grapples with an enemy that operates outside\
      \ their understanding. The organization’s presence is felt in the crew’s adherence\
      \ to protocol (quarantine, sensor sweeps, transporter locks) even as they question\
      \ its sufficiency.\n      "
    active_representation: Via institutional protocol being followed (the crew’s actions
