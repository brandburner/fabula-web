      outside, he now confronts the mystery directly. The interior’s confined, claustrophobic
      feel amplifies the tension, as if the walls themselves are closing in on the
      team’s unanswered questions. The viewports framing Tarchannen Three’s perpetual
      twilight outside reinforce the shuttle’s role as a liminal space between the
      known and the unknown.
