      as Geordi’s transformation begins.
    global_id: ger_object_823f92c7aaf9
  - object_uuid: ger_object_d2130d4688fb
    description_of_involvement: The Tarchannen Three Away Team Recordings are the
      raw data Geordi uses to reconstruct the mission in the holodeck. These recordings,
      captured during the original away team’s investigation, provide the foundation
      for the simulation. Geordi commands the computer to scan these records and create
      holographic recreations of Brevelle, Susanna, Mendez, and himself. The recordings’
      accuracy is critical—they allow Geordi to isolate the anomalous shadow and prove
      it is not cast by any crew member. Without these recordings, Geordi would lack
      the evidence to uncover the shadow’s external origin, making them indispensable
      to his investigation.
