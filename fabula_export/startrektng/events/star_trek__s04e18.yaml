    can''t believe he''d steal a shuttle and desert...'
  - 'SUSANNA: Believe it, Geordi. He was spotted by a Federation supply ship yesterday...
    on a course toward Tarchannen Three.'
  - 'SUSANNA: Geordi and I are the only two left.'
