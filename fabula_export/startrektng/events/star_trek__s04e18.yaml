  title: Beverly discovers Susanna’s genetic erasure
  description: 'In Sickbay, Beverly Crusher and Nurse Ogawa analyze Susanna Leijten’s
    deteriorating condition, identifying a parasitic entity in her thymus that is
    systematically rewriting her DNA. Ogawa’s scan reveals that Susanna’s original
    genetic identity is nearly erased, leaving only fragments of her human genetic
    code. Beverly realizes the parasite isn’t merely feeding on Susanna—it is actively
    transforming her cellular structure to match its own, a process that threatens
    to consume her entirely. With time running out, Beverly declares an emergency
    extraction of the parasite, marking a critical turning point in the mission to
    halt the Tarchannen Three transformation epidemic before Geordi La Forge succumbs
    to the same fate. The urgency of the situation underscores the stakes: if Susanna’s
    unaltered genes cannot be preserved, her humanity—and potentially Geordi’s—will
    be lost forever. This moment shifts the narrative from investigation to desperate
    intervention, forcing Beverly to act as both scientist and surgeon in a race against
    an alien biological force.'
