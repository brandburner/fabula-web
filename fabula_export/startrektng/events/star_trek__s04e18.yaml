      itself. The team’s actions—scanning with tricorders, documenting findings, and
      following Susanna’s commands—reflect Starfleet’s methodical approach to exploration
      and crisis response. The discovery of the torn uniform and the absence of evidence
      challenge Starfleet’s assumptions about planetary investigations, hinting at
      a threat beyond its usual scope. The organization’s protocols are followed to
      the letter, but the mystery of Tarchannen Three exposes the limits of even Starfleet’s
      resources when faced with the unknown.
    active_representation: Through the away team’s actions, adherence to protocol,
      and the recording device as a Starfleet-issued tool. The team’s uniforms and
      equipment symbolize Starfleet’s authority and the institutional weight behind
      their mission.
