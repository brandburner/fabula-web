  title: Holodeck Three Revealed as Geordi’s Last Location
  description: The bridge crew, already on high alert after Geordi La Forge’s disappearance,
    systematically rules out external explanations—no transporter activity, no missing
    shuttles—before the computer reveals his last known location was Holodeck Three.
    The revelation triggers a silent but charged exchange between Picard and Riker,
    whose shared glance underscores the gravity of the discovery. Holodecks are controlled
    environments, meaning Geordi’s disappearance wasn’t an accident but a deliberate,
    internal anomaly. Riker’s immediate dispatch of Worf to investigate with him signals
    the shift from passive investigation to active crisis response, while the holodeck’s
    association with Geordi’s engineering expertise hints at a potential technological
    or simulated cause for his transformation. The scene pivots the mystery inward,
    away from external threats, and raises the stakes by implicating the ship’s own
    systems in the unfolding horror.
