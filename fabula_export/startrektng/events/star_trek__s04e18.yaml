  - object_uuid: ger_object_d2130d4688fb
    description_of_involvement: The Tarchannen Three Away Team Recordings are digital
      Starfleet records capturing footage from the doomed mission. Geordi loads them
      into the holodeck, where the computer recreates the outpost and crew holograms—Brevelle,
      Susanna, Mendez—to match exact positions. He freezes and reverses the simulation,
      systematically removing each hologram to isolate the unexplained shadow. The
      recordings serve as the raw data for Geordi’s investigation, their accuracy
      and detail enabling the extrapolation of the shadow’s shape. Without these records,
      Geordi’s analysis would be impossible, making them a foundational resource for
      uncovering the truth behind the transformations.
