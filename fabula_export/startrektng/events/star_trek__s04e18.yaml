- fabula_uuid: cand_evt_scene_d4bce7d444782041_01
  global_id: null
  title: Geordi isolates the shadow anomaly
  description: |2

    Geordi La Forge, working alone in Engineering, meticulously analyzes Tarchannen Three mission footage to uncover a cryptic shadow anomaly that defies explanation. After deleting audio to focus on visuals, he freezes the recording and isolates a lone shadow on the outpost wall—one that doesn’t correspond to any crew member present in the frame. His frustration grows as the computer fails to identify its source, but his engineer’s instincts drive him to slow-motion replay, spectral enhancement, and magnification, revealing a faintly humanoid shape. The discovery ignites urgency: he orders the computer to compile a holographic simulation of the entire record in Holodeck Three, convinced this anomaly holds the key to the disappearances—and his own impending transformation. His physical tell (drumming fingers, pacing) betrays his exhaustion, but the breakthrough propels him forward despite his deteriorating condition. The moment marks a critical shift from passive analysis to active investigation, with Geordi’s technical expertise now directly tied to the crew’s survival.
