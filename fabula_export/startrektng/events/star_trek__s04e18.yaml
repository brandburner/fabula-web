- fabula_uuid: act_fe4d833ce004ee18
  number: 2
  summary: In Sickbay, Doctor Crusher examines Susanna, finding her blood chemistry
    severely abnormal and a histamine response, though the cause remains unknown.
    Crusher orders Susanna to remain on the Enterprise for observation, a directive
    Captain Picard reinforces despite Susanna's protests and desire to continue the
    investigation. Geordi attempts to reassure Susanna. Picard, however, expresses
    concern to Beverly about Geordi's safety, noting that Mendez and Hickman also
    seemed fine before their disappearances. Susanna, agitated and speaking rapidly
    in the corridor, proposes a more aggressive search strategy on the planet. She
    then notices her hand trembling uncontrollably, realizing that whatever is happening
    to the others is now happening to her. Geordi offers comfort, holding her hand
    and promising to protect her. Back on the Main Bridge, Data, Geordi, and Susanna
    examine magnified alien skin cells found on the torn uniform and a computer graphic
    of the strange, non-human footprints. Data explains the footprints are not from
    any known Tarchannen life form. Data and Beverly begin searching the medical database
    for a match. Geordi and Susanna, working together, decide to review old mission
    records to find a commonality among the original team members, hoping to identify
    the source of the affliction. In Beverly's office, Data expresses his strong motivation
    to solve the mystery, hinting at his concern for Geordi. Meanwhile, in Geordi's
    office, Susanna grows increasingly restless and frustrated with the lack of progress,
    feeling the effects of the transformation. She complains of her eyes hurting and
    her brain feeling 'wrapped in a blanket,' expressing a desperate need to get off
    the ship and return to Tarchannen. Geordi suggests seeing Doctor Crusher, but
    Susanna vehemently refuses, insisting the answers are on the planet. As she attempts
    to leave, her body begins trembling uncontrollably, and she collapses. Geordi
    rushes to her, discovering dark blotches on her neck and, to his horror, her two
    middle fingers fused together, a clear and shocking sign of her accelerating transformation.
