- fabula_uuid: cand_evt_scene_99158f59086f48e1_01
  global_id: null
  title: Susanna lures Geordi from the aliens
  description: 'Susanna Leijten disables the team’s palm beacons—knowing the light
    triggers the transformed creatures’ aggression—then leads the away team into Tarchannen
    Three’s treacherous underbrush. She uses her intimate knowledge of the transformation
    to guide them, insisting Geordi is still nearby. When Data’s UV beacon reveals
    two fully transformed aliens and a partially altered Geordi, Susanna isolates
    herself from the group, approaching Geordi with a mix of authority and empathy.
    She speaks directly to his lingering humanity, acknowledging the internal war
    he’s fighting and offering trust as a lifeline. Her quiet, persistent appeal—‘I
    know what’s going on inside you’—breaks through his primal instincts, allowing
    her to take his hand and transport him to safety. The moment underscores Susanna’s
    tactical leadership and her personal stakes in saving Geordi, while also revealing
    the fragility of his remaining humanity. The team’s reliance on her expertise
    and her ability to connect with Geordi on a visceral level elevate her role as
    the mission’s linchpin, but the scene also hints at the cost of her own transformation,
    as her actions mirror the alien compulsion she’s resisting. The rescue is a temporary
    victory, but the tension lingers: how much of Geordi—and Susanna—remains human?'
