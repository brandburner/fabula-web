- fabula_uuid: cand_evt_scene_81e8fa806008754a_03
  global_id: null
  title: Hickman’s shuttle destruction triggers away team
  description: 'The bridge crew watches in horror as Lieutenant Hickman’s stolen shuttle
    disintegrates upon atmospheric entry into Tarchannen Three, despite Picard’s desperate
    attempts to intervene. Data’s clinical countdown—‘sixteen seconds to impact’—contrasts
    with the crew’s mounting dread, culminating in a silent, explosive flash that
    leaves only debris. Worf’s immediate sensor scan reveals two additional abandoned
    Federation shuttles on the planet’s surface, both devoid of life signs, confirming
    a pattern of disappearance. Picard’s swift decision to dispatch an away team—Riker,
    Geordi, Data, Worf, and Susanna—marks a turning point: the mystery of the transformations
    is no longer theoretical but an active, deadly threat. Susanna’s inclusion, though
    unspoken, underscores her dual role as both investigator and potential victim,
    while Geordi’s presence raises the stakes personally for the crew. The scene pivots
    from reactive shock to proactive urgency, with the away team’s departure framing
    the next phase of the investigation.'
