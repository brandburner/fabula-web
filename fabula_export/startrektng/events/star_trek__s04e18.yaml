- fabula_uuid: cand_evt_scene_99158f59086f48e1_03
  global_id: null
  title: Susanna coaxes Geordi from alien refuge
  description: 'After the away team locates Geordi—now partially transformed into
    a Tarchannen creature—hiding with two other infected beings, Susanna uses their
    shared history and emotional connection to appeal to his remaining humanity. While
    the others track him with a UV beacon, she isolates him from the group and speaks
    directly to his struggle, acknowledging the war between his human instincts and
    the alien metamorphosis. Her gentle persistence breaks through his resistance
    just long enough for Beverly to order their emergency transport to Sickbay. The
    moment marks a critical turning point: Geordi’s descent into alien transformation
    is halted, shifting the narrative from horror to a race against time for a cure.
    The scene hinges on Susanna’s ability to reach him not as a Starfleet officer,
    but as someone who understands his fear and shares his fight for control. The
    other two transformed beings flee, reinforcing the irreversible nature of their
    condition, while Geordi’s hesitation—his hand reaching for hers—signals his fragile
    hold on his humanity. The transport to Sickbay underscores the urgency of Beverly’s
    work ahead, as the clock ticks down on Geordi’s survival.'
