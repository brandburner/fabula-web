  title: Geordi isolates the Tarchannen shadow
  description: "\n  Geordi La Forge reconstructs the Tarchannen Three outpost in a\
    \ holodeck simulation, methodically isolating a mysterious shadow observed in\
    \ the original away team recordings. He freezes the holograms and reverses the\
    \ simulation to study the shadow's behavior, removing each crew member's holographic\
    \ presence one by one. When he eliminates all known sources, the shadow remains—an\
    \ independent, unprogrammed entity with no logical origin. The computer confirms\
    \ no object in the simulation could cast it, forcing Geordi to extrapolate its\
    \ shape, which materializes as a humanoid figure. As he examines it, he experiences\
    \ a sudden, intense pain and notices the first physical signs of the alien transformation:\
    \ fused fingers and mottled blotches on his neck. The failed experiment deepens\
    \ the enigma of the Tarchannen Three transformations and raises the stakes for\
    \ Geordi’s own impending fate, as the shadow’s existence suggests a sentient,\
    \ parasitic force at work—one that may already be inside him.\n  "
