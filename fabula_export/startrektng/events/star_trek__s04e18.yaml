- fabula_uuid: act_50b03f7368add919
  number: 3
  summary: 'In the dimly lit Sickbay, Susanna lies in an emergency bed, her transformation
    significantly advanced: her skin mottled with black patches and veins, her hair
    oily and black, and her eyes no longer human. Beverly explains Susanna''s extreme
    sensitivity to light. Geordi is visibly shocked by her appearance. Beverly informs
    Picard and Geordi that the people who disappeared from Tarchannen Three were not
    abducted but transformed into another species. Geordi, stunned, asks if the transformation
    can be stopped. Beverly admits the T-cell stimulator can only slow it, not cure
    it, and reveals that Geordi is very likely to be next, despite his recent bioscans.
    Geordi, moving from denial to acceptance, insists on returning to his investigation
    to find the source of the affliction, arguing that sitting in Sickbay would be
    futile. Picard, understanding Geordi''s drive, grants permission, provided he
    reports for regular bioscans and immediately reports any symptoms. Geordi, relieved,
    rushes back to work. In his office, Geordi tirelessly reviews the mission''s visual
    records, searching for anomalies. He performs various analyses—audio, spectrographic,
    radiation, micro-seismic—all yielding no results. Data enters, offering assistance
    and suggesting Geordi rest, expressing a rare form of concern. Geordi, however,
    is driven by urgency, knowing his time is limited. Meanwhile, in Sickbay, Nurse
    Ogawa alerts Beverly to Susanna''s further deterioration: her skin now simulates
    light, leaving a phosphorous trail, and her body temperature is dropping. Beverly
    hypothesizes the presence of a foreign body, like a ''viral creche,'' initiating
    a full genetic analysis. Back in his office, Geordi, watching the visual record,
    notices a single, unexplained shadow on the outpost wall after the away team members
    move out of view. Puzzled, he attempts to identify its source through computer
    analysis, but the computer cannot. Realizing the significance, Geordi orders a
    holographic simulation of the visual record in Holodeck Three, convinced he is
    on the verge of a breakthrough. As he hurries to the holodeck, he notices his
    own hand trembling badly, like Susanna''s. He hesitates, knowing he should contact
    Beverly, but his determination to solve the mystery and save Susanna overrides
    his concern for his own health. He enters the holodeck, where a re-creation of
    Building One stands, complete with holograms of Susanna, Mendez, and Geordi, their
    shadows visible on the wall.'
