  title: Geordi’s transformation exposed and escape
  description: "\n  The away team materializes near the abandoned shuttle on Tarchannen\
    \ Three, where Susanna immediately warns them to turn off their palm beacons,\
    \ fearing the light will trigger the transformed creatures. Data activates a UV\
    \ beacon, revealing two fully transformed Tarchannen creatures and a partially\
    \ transformed Geordi hiding in the underbrush. When Worf and Riker attempt to\
    \ restrain Geordi, he overpowers them and flees, driven by primal instincts. Susanna\
    \ pursues him, using their shared history and empathy to coax him out of hiding.\
    \ She appeals to his fading humanity, urging him to trust her and take her hand.\
    \ Geordi hesitates but ultimately relents, allowing Susanna to transport him back\
    \ to the *Enterprise* for medical treatment. The moment marks a critical escalation\
    \ in Geordi’s descent into the alien form, as well as a turning point in Susanna’s\
    \ mission to save him before he fully succumbs. The scene underscores the tension\
    \ between Geordi’s deteriorating humanity and the alien instincts consuming him,\
    \ while Susanna’s tactical leadership and emotional connection to him become the\
    \ key to his potential salvation.\n  "
