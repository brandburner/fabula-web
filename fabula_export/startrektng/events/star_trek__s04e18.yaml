  title: Geordi’s transformation begins in the holodeck
  description: "\n  In the holodeck, Geordi La Forge obsessively reconstructs the\
    \ Tarchannen Three mission to isolate the unexplained shadow from Brevelle’s recordings.\
    \ As he methodically strips away holographic elements—removing Susanna, Mendez,\
    \ and even his own hologram—the shadow persists, defying logic. When the computer\
    \ confirms no object in the program could cast it, Geordi demands a vector analysis,\
    \ forcing the system to extrapolate a humanoid shape. The revelation triggers\
    \ a physical collapse: his middle fingers fuse together, and mottled discoloration\
    \ spreads across his neck. The transformation, previously confined to others,\
    \ now claims him, marking a critical escalation in the race against time. His\
    \ scientific detachment shatters as the horror of his own metamorphosis becomes\
    \ undeniable, forcing him to confront the inevitability of his fate unless he\
    \ solves the anomaly’s origin.\n  "
