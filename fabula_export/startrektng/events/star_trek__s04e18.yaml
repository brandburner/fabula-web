- fabula_uuid: cand_evt_scene_cb34150bf0030f93_03
  global_id: null
  title: Last Survivors Confirmed
  description: "\n  In the Observation Lounge, Susanna Leijten presents a five-year-old\
    \ recording of the original Tarchannen Three away team—Ensigns Brevelle, Mendez,\
    \ and Hickman—before their disappearances. Picard and Riker probe the timeline\
    \ of their vanishings, revealing no prior signs of illness or distress. Geordi\
    \ La Forge, initially skeptical, is forced to confront the reality when Susanna\
    \ confirms Hickman’s unauthorized shuttle flight toward Tarchannen Three. The\
    \ revelation crystallizes the pattern: members of the original investigation are\
    \ now disappearing in the same manner. Susanna’s blunt admission—‘Geordi and I\
    \ are the only two left’—shifts the narrative from mystery to existential threat,\
    \ as the two survivors face an unseen force that has already claimed everyone\
    \ else. The scene’s tension escalates from investigative curiosity to personal\
    \ urgency, with Geordi’s denial collapsing under the weight of evidence. The fade-out\
    \ underscores the looming danger: whatever erased the original team is now targeting\
    \ its investigators, with Geordi and Susanna as the final targets.\n  "
