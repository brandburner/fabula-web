  - object_uuid: ger_object_93f991ad3d94
    description_of_involvement: The *Engineering Pool Table with Monitor* doubles
      as a makeshift command center, its built-in monitor displaying the 300-square-kilometer
      search radius and EM scan data. Riker and Worf use it to analyze the terrain,
      but the negative sensor scans and the impossibly large area force them to reconsider
      their approach. The pool table’s repurposing reflects the crew’s adaptability
      under pressure, turning a recreational space into a hub for desperate problem-solving.
      Its role is both practical (data visualization) and symbolic (the crew’s resourcefulness
      in the face of overwhelming odds).
