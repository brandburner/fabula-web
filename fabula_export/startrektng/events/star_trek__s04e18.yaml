      \ of the stakes: this is no longer a missing person case, but an active, predatory\
      \ phenomenon. The viewscreen’s display is both a tool for analysis and a catalyst\
      \ for urgency, forcing the crew to confront the reality of the situation. Its\
      \ role is to turn data into drama, making the abstract tangible.\n      "
    status_before_event: "\n        The viewscreen is displaying the starfield of\
      \ the Tarchannen system, with long-range sensor data overlayed. It is a passive\
      \ tool, awaiting the crew’s next command.\n      "
    status_after_event: "\n        The viewscreen now displays the shuttle’s uncontrolled\
