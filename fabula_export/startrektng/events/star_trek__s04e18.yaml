  title: Susanna locates and retrieves Geordi
  description: "\n  Susanna Leijten leads an away team into the alien-infested environment\
    \ of Tarchannen Three, equipped with UV lights to navigate the hostile terrain\
    \ and locate Geordi La Forge, who has partially transformed into the same alien\
    \ species affecting the Tarchannen Three survivors. The team moves cautiously,\
    \ their urgency tempered by the need to avoid triggering the alien compulsion\
    \ that lured Brevelle and Mendez back to the planet. Susanna’s intimate knowledge\
    \ of Geordi—both as a colleague and someone now sharing the same alien DNA—allows\
    \ her to coax him out of hiding with a mix of reassurance and urgency. Once located,\
    \ Beverly Crusher immediately orders their transport to Sickbay, marking a critical\
    \ turning point in the race to reverse Geordi’s condition before it becomes irreversible.\
    \ The rescue underscores the high stakes of the transformation process and sets\
    \ up the subsequent medical intervention to save Geordi’s life.\n  "
