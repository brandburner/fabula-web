  global_id: null
  title: Susanna reveals alien reproduction threat
  description: "\n  In Sickbay, Susanna Leijten regains consciousness after Beverly\
    \ Crusher removes what was assumed to be a parasitic growth from her thymus. Susanna\
    \ immediately corrects Beverly, revealing the horrifying truth: the 'parasite'\
    \ is actually the alien species' reproductive method—a DNA strand that triggers\
    \ a metamorphosis in the host. Her alien instincts then alert her to Geordi La\
    \ Forge's absence, confirming he has been transported to Tarchannen Three. When\
    \ Beverly mentions an away team is preparing to search for him, Susanna insists\
    \ *only she* can find him, framing her as the sole viable link to his survival.\
    \ The moment escalates the stakes by exposing the biological invasion's true nature\
    \ and positioning Susanna as both a critical asset and a potential liability,\
    \ given her unresolved connection to the alien transformation. The tension shifts\
    \ from a rescue mission to a race against time, as the crew now understands the\
    \ aliens are not just transforming victims but actively spreading through biological\
    \ invasion.\n  "
