- fabula_uuid: act_f1870cc6ded0ab43
  number: 4
  summary: In the holodeck, Geordi, despite his increasing physical symptoms, focuses
    intently on the simulation. He creates a hologram of Brevelle, positioned as if
    recording the scene, and extrapolates the movements of the away team. As the simulation
    runs, the mysterious shadow remains on the outpost wall after the other shadows
    move off. Geordi, frustrated by the speed, freezes the program and reverses it,
    then isolates the unexplained shadow. He systematically removes the holograms
    and shadows of Leijten, La Forge, and Mendez, leaving only Brevelle, his camera,
    and the singular, unidentified shadow. Geordi positions himself between the camera
    and the wall, confirming nothing is casting the shadow. He asks the computer to
    identify the shadow's source, but it reports no object in the program could generate
    it. A wave of dizziness strikes Geordi, but he pushes through. He then instructs
    the computer to extrapolate the most likely shape and position of the object casting
    the shadow, assuming a height similar to his own. A gray, roughly humanoid figure
    materializes in front of the shadow, revealing the alien's presence. Just as Geordi
    makes this crucial discovery, he is struck by a sudden, intense jab of internal
    pain, dropping to his knees. His middle fingers fuse together, and the first mottled
    blotches of transformation appear on his neck, confirming his worst fears. Meanwhile,
    in Sickbay, Beverly and Nurse Ogawa finally locate a parasite in Susanna's thymus,
    which is using her immune system to spread genetic instructions and transform
    her DNA. They realize they need unaltered genes to reverse the process and prepare
    for surgery. Beverly attempts to contact Geordi, but the computer reports he is
    no longer on board the Enterprise. Data confirms no transporter activity, and
    Worf reports all shuttles are secure, creating confusion. Picard orders a search
    for Geordi's last known location, which is Holodeck Three. Riker and Worf rush
    to the holodeck, where they find Geordi's abandoned VISOR and torn uniform, confirming
    his transformation and departure. Simultaneously, the chameleon-like humanoid
    (Geordi) breaks the security lockout in Transporter Room Six and beams down to
    Tarchannen Three, evading detection and leaving the Enterprise.
