      framework guiding the away team’s actions. The organization’s emphasis on crew
      safety, scientific inquiry, and adaptability to unknown threats is evident in
      every decision made during the event. Susanna’s firsthand knowledge of the creatures’
      behavior, for example, is a direct result of Starfleet’s training and her experience
      as an away team leader. Similarly, the team’s reliance on the *Enterprise*’s
      transporter and medical resources reflects the organization’s commitment to
      supporting its personnel in the field. Starfleet’s influence is also seen in
      the team’s disciplined approach to the crisis, balancing tactical precision
      with emotional intelligence—a hallmark of the organization’s culture.
    active_representation: Through the actions and decisions of its personnel (Susanna’s
      leadership, Beverly’s medical coordination, Riker’s tactical command) and the
      institutional resources at their disposal (transporter, medical facilities,
      sensor technology).
    power_dynamics: Exercising authority through training, protocol, and resource
      allocation, while also being challenged by the unknown nature of the alien threat.
      The organization’s power is both enabling (providing the tools for success)
      and constraining (requiring adherence to protocols even in life-or-death situations).
    organizational_goals:
    - To ensure the safe recovery of Geordi La Forge, a valued crew member, using
      all available Starfleet resources.
    - To gather critical data on the alien contagion and its effects, in accordance
      with Starfleet’s mission of exploration and scientific inquiry.
    influence_mechanisms:
    - Training and expertise of personnel (Susanna’s firsthand knowledge, Beverly’s
      medical skills, Data’s technical precision)
    - Institutional resources (transporter, medical facilities, sensor technology)
    - Protocols and procedures (transport coordination, emergency medical response,
      away team protocols)
    - Cultural values (crew safety, adaptability, scientific curiosity)
