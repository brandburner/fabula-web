  title: Susanna reveals Tarchannen Three’s vanished crew
  description: "\n  In the Observation Lounge, Susanna Leijten presents damning evidence\
    \ of the Tarchannen Three mission’s disappearances, identifying the three key\
    \ figures—Ensign Brevelle (who was ill before deserting), Mendez (who vanished\
    \ without warning), and Hickman (a family man who stole a shuttle). Picard probes\
    \ the inconsistencies: Brevelle’s sudden illness contrasts with Mendez’s and Hickman’s\
    \ apparent normalcy before their disappearances. Geordi, initially skeptical,\
    \ is forced to confront the truth when Susanna confirms Hickman’s course toward\
    \ Tarchannen Three. The revelation escalates the crisis, linking the original\
    \ 49-person vanishing to Geordi’s current transformation and the team’s dwindling\
    \ numbers—only he and Susanna remain. The scene underscores the mission’s unresolved\
    \ horror and the urgency of solving it before Geordi succumbs to the same fate.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e18
  scene_sequence: 2
  sequence_in_scene: 3
  key_dialogue:
  - 'SUSANNA: That''s Hickman on the right... that''s Mendez on the left... and as
    already noted, the recording was made by Ensign Brevelle... five years ago...'
  - 'PICARD: Commander Leijten, you said Brevelle was ill last week for several days
    before he... deserted. What about Mendez?'
  - 'SUSANNA: Mendez was last seen aboard the Aries an hour before she disappeared.
    According to witnesses, she seemed completely normal.'
  - 'GEORDI: ((skeptical)) I know Paul Hickman. He''s a family man... two kids. I
    can''t believe he''d steal a shuttle and desert...'
  - 'SUSANNA: Believe it, Geordi. He was spotted by a Federation supply ship yesterday...
    on a course toward Tarchannen Three.'
  - 'RIKER: And now, five years later, members of the away team that investigated
    the disappearances... have started disappearing themselves.'
  - 'SUSANNA: Geordi and I are the only two left.'
