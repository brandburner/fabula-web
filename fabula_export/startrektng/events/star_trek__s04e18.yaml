  - object_uuid: ger_object_abe3c6f18af4
    description_of_involvement: 'The *Enterprise Transporter Logs* are the linchpin
      of this event, providing the critical intel that Geordi beamed down near the
      *Aries* shuttle on Tarchannen Three. Hedrick’s comlink report to Riker confirms
