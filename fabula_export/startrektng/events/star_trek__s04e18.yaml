  global_id: null
  title: Alien evidence confirms extraterrestrial threat
  description: "\n  On the Enterprise bridge, Data reveals forensic evidence from\
    \ the torn Starfleet uniform—alien skin cells and an unidentified footprint—that\
    \ definitively links the crew's disappearances to an unknown extraterrestrial\
    \ species. The discovery forces Geordi and Susanna to confront the reality of\
    \ an active, hostile alien presence aboard their ship, escalating the stakes as\
    \ Geordi's own transformation into the same entity becomes an imminent and irreversible\
    \ threat. Data's analysis of the footprint (unmatched to any known Tarchannen\
    \ life form) and the skin cells (requiring weeks of cross-referencing without\
    \ additional evidence) underscores the urgency of the situation, while Susanna's\
    \ skepticism about the footprint's absence during the original investigation introduces\
    \ a critical inconsistency that demands further exploration. The moment serves\
    \ as a turning point, shifting the narrative from speculative investigation to\
    \ confirmed existential threat, with Geordi's visible unease signaling his personal\
    \ vulnerability as the next potential victim.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e18
  scene_sequence: 12
  sequence_in_scene: 23
  key_dialogue:
  - 'DATA: During microscopic examination of the torn uniform, I discovered these
    alien skin cells.'
  - 'SUSANNA: Source?'
  - 'DATA: Undetermined.'
  - 'GEORDI: Without something else to cross-reference, it would take weeks to try
    and identify them...'
  - 'DATA: Fortunately, there is more evidence...'
  - 'SUSANNA: If we''re pursuing a theory that somehow unknown aliens are involved...
    I should tell you we didn’t find tracks like that during the original investigation.'
  - 'DATA: The planet is subject to frequent sandstorms. Footprints could have been
    obliterated prior to your arrival.'
