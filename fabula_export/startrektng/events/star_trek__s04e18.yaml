  global_id: null
  title: Susanna reveals the alien transformation truth
  description: "\n  In a high-stakes confrontation in Sickbay, Susanna Leijten—now\
    \ partially transformed by the alien species—reveals the horrifying reproductive\
    \ cycle of the creatures: they implant their DNA into hosts, triggering a grotesque\
    \ metamorphosis. Her partial transformation grants her unique insight into Geordi's\
    \ condition, making her the only one who can locate him before he fully succumbs.\
    \ The revelation escalates the urgency of the mission, as the crew now understands\
    \ the irreversible nature of the transformation and the compulsion driving the\
    \ infected to return to Tarchannen III. Susanna’s confession also underscores\
    \ her own vulnerability, as her deteriorating state becomes a ticking clock for\
    \ both her and Geordi’s survival. The moment serves as a critical turning point,\
    \ shifting the narrative from investigation to desperate rescue.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e18
  scene_sequence: 37
  sequence_in_scene: 64
  key_dialogue:
  - 'SUSANNA: "They don’t just kill us. They *use* us. Their DNA—it rewrites ours.
    That’s why we’re drawn back to the planet. It’s not just a compulsion. It’s *instinct*."'
  - 'SUSANNA: "I can feel it, Geordi. The pull. The *need* to go back. And if I don’t
    fight it, I *will* go back. And when I do… I won’t be me anymore."'
  - 'BEVERLY: "Susanna, how long before the transformation is complete?"'
  - 'SUSANNA: "Hours. Maybe less. And Geordi—he’s further along than I am. If we don’t
    find him soon, there won’t be anything left to save."'
