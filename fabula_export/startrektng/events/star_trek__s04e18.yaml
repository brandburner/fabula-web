- fabula_uuid: act_a51e49c7f6d53667
  number: 5
  summary: 'On the Main Bridge, the crew struggles to locate Geordi, as their sensor
    array proves useless against his transformed state. Data proposes modifying an
    emergency beacon to emit ultraviolet light, which can read Geordi''s absorption
    spectrum. Riker immediately orders the modification and prepares an away team.
    In Engineering, Data quickly completes the UV beacon. Transporter Chief Hedrick,
    recovered from his encounter with the transformed Geordi, reports Geordi''s transport
    coordinates, confirming he beamed down near the Aries shuttle on Tarchannen Three.
    Riker and Worf acknowledge the vast search area but remain determined. Meanwhile,
    in Sickbay, Susanna regains consciousness, her eyes clear and human again, though
    still partially alien. Beverly explains the removal of the parasite. Susanna,
    with newfound inner knowledge from her partial transformation, corrects Beverly,
    stating it wasn''t a parasite but the alien species'' method of reproduction:
    planting a DNA strand in a living host to cause metamorphosis. She immediately
    senses Geordi is on the planet and insists she is the only one who can find him.
    On Tarchannen Three, Riker, Beverly, Susanna, Worf, and Data materialize. Susanna,
    sensitive to the light, instructs the team to turn off their palm beacons, explaining
    the light frightens the transformed creatures, but confirms the UV light will
    not. She leads the team into the underbrush, quickly locating Geordi and two other
    Tarchannen creatures. Geordi, barely recognizable in his alien form, attempts
    to flee. Susanna, using her bond with Geordi and her understanding of his internal
    struggle, gently coaxes him out of hiding. She appeals to his remaining humanity,
    emphasizing that she has returned and can help him come back. She holds out her
    hand, and after a long beat, Geordi takes it. Beverly immediately taps her insignia,
    ordering their transport directly to Sickbay. Back on the Enterprise, Geordi is
    cured and on the road to recovery, though his skin still bears a few blotches.
    Susanna is completely back to normal. Picard asks about the fate of Brevelle and
    Mendez; Susanna confirms there is no hope for them to return to human form. Geordi,
    now able to speak, explains that in another few minutes, he would not have responded
    to Susanna at all, indicating the irreversible nature of the full transformation.
    Picard orders warning beacons placed in orbit and on the planet''s surface to
    prevent future incidents. Geordi, deeply moved, thanks Susanna for trusting him
    even in his transformed state, acknowledging her role in saving him. Susanna,
    with a grin, attributes it to her ''good advice,'' and they share a comforting
    hug, bringing a personal resolution to their ordeal.'
