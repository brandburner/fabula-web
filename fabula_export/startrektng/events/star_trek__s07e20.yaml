    talking about old superstition and nonsense.'
  - 'ANTHWARA: Then you should respect the fact that this planet holds a deeply spiritual
    significance for us. It took us two centuries to find a place where the mountains
    gave us permission to use their stone for our houses... where the rivers let us
    drink from their waters... and where the wind sang to us at night.'
  - 'TROI: Captain, may I suggest that we adjourn for now... allow us all time to
    think about what''s been said.'
  - 'PICARD: In the meantime, I would like to invite you all to the Enterprise this
    evening as our guests.'
