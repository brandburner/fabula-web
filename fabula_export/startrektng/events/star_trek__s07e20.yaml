  title: Picard issues the relocation order
  description: "\n  After Admiral Necheyev delivers Starfleet’s final, uncompromising\
    \ order to forcibly relocate the Dorvan V colonists, Picard—visibly conflicted—exchanges\
    \ a tense glance with Riker, the last remnants of their diplomatic hopes shattered.\
    \ The weight of the decision presses on him as he reflects on Anthwara’s accusation\
    \ that his family’s history of displacement is repeating itself. With a heavy\
    \ silence, Picard steels himself and summons Worf, who arrives to receive the\
    \ formal command to begin preparations for the relocation. The moment marks the\
    \ mission’s point of no return: Picard’s leadership is tested as he transitions\
    \ from moral debate to operational execution, while Riker’s reluctant departure\
    \ with Worf underscores the crew’s compliance despite lingering ethical unease.\
    \ The scene underscores the tension between duty and conscience, with Picard’s\
    \ internal struggle manifesting in his deliberate, almost mechanical delivery\
    \ of the order—a stark contrast to the emotional turmoil beneath the surface.\n\
    \  "
