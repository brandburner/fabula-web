      present, the organization’s influence is felt in Beverly’s initial anger at
      Wesley’s perceived betrayal of its values, as well as in Wesley’s admission
      that he feared disappointing ‘Captain Picard’ and his ‘friends.’ Starfleet’s
      culture of duty and excellence is framed as both a source of pride and a stifling
      burden, particularly for Wesley, who feels trapped by the legacy of his father’s
      service. The organization’s power dynamics are subtly challenged as Beverly
      and Wesley grapple with the idea that destiny—embodied by the Traveller’s prophecy—may
      supersede institutional mandates.
