- fabula_uuid: act_e5c58d3bdd68f972
  number: 2
  summary: The Enterprise arrives at Dorvan Five, and Captain Picard, accompanied
    by Troi, initiates negotiations with the Tribal Council, led by Anthwara. Picard
    explains the Federation's position, offering alternative planets, but the tribal
    leaders express a profound spiritual connection to Dorvan Five, emphasizing their
    ancestors' two-century search for a welcoming home and their rejection of environmental
    control. Wakasa, a council member, expresses contempt for the Federation's demands,
    and the initial meeting concludes without resolution. Later, during a reception
    on the Enterprise, Picard attempts to appeal to Anthwara's sense of 'greater good,'
    drawing parallels to Anthwara's grandfather's difficult decisions, but Anthwara
    counters by stressing the importance of holding onto what they have, even against
    overwhelming opposition. He then probes Picard about his own family history. Meanwhile,
    Beverly confronts Wesley about his sullen and rude behavior, particularly his
    outburst in Engineering. Wesley, increasingly frustrated, lashes out, declaring
    he is 'sick of living up to other people's expectations' and storms out. During
    the reception, Wesley encounters Lakanta, an Indian elder, who reveals he has
    been expecting Wesley for two years, having foreseen his coming during a vision
    quest in the Habak. Lakanta suggests Wesley's spirit is troubled and that he can
    find answers on Dorvan Five, piquing Wesley's curiosity despite his initial skepticism.
    This act deepens both the external conflict through failed negotiations and Wesley's
    internal crisis, introducing the mystical element that will guide his path.
