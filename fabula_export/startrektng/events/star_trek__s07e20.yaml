  title: Wesley Dismisses Geordi’s Engineering Work
  description: "\n  In *Main Engineering*, Geordi La Forge—eager to reconnect with\
    \ Wesley—shows him a modified warp core design, a project rooted in their shared\
    \ history and Geordi’s professional respect. Wesley, now disillusioned and emotionally\
    \ detached, responds with cold condescension, critiquing the design as outdated\
    \ and inferior to Academy-level advancements. His dismissive tone escalates into\
    \ outright arrogance, undermining Geordi’s expertise and rejecting the gesture’s\
    \ personal intent. When Geordi, stung, asks what’s wrong, Wesley deflects with\
    \ hostility, shutting down further dialogue. The exchange reveals Wesley’s deepening\
    \ estrangement from Starfleet and those who once mentored him, while Geordi’s\
    \ frustration underscores the cost of Wesley’s withdrawal on those left behind.\
    \ The scene serves as a microcosm of Wesley’s broader rejection of his past, foreshadowing\
    \ his eventual resignation from Starfleet.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e20
  scene_sequence: 4
  sequence_in_scene: 10
  key_dialogue:
  - 'GEORDI: Wes -- there you are. You''ve got to take a look at this.'
  - 'WESLEY: ((dismissive)) You''ve only got one micro-fusion inter-relay in here...
    the converter interface will never hold up.'
  - 'GEORDI: Well, I guess we can''t have all the fancy new equipment they give you
    kids at the Academy. We have to make do with what we''ve got.'
  - 'WESLEY: ((hard)) Do you want my help or not?'
  - 'GEORDI: ((bristling)) I was doing this for you... I thought you''d be interested
    in this.'
  - 'WESLEY: Well, I''m not.'
