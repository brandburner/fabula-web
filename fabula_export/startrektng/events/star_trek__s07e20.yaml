  global_id: null
  title: Picard confronts the Tribe’s sacred refusal
  description: In a tense negotiation aboard the *Enterprise*, Picard delivers Starfleet’s
    ultimatum to the Native American Tribal Council of Dorvan V, offering uninhabited
    alternatives as a concession. Anthwara, the Council’s leader, rejects the alternatives
    with quiet defiance, framing Dorvan V as a sacred homeland where the planet itself
    ‘welcomed’ his people after centuries of displacement. Wakasa, a younger Council
    member, openly challenges Picard’s authority, accusing him of dismissing their
    beliefs as superstition. Picard, caught between bureaucratic orders and moral
    empathy, struggles to reconcile Starfleet’s demands with the Tribe’s spiritual
    sovereignty. The scene escalates the conflict, forcing Picard to confront the
    ethical cost of enforcing the relocation—while Troi’s suggestion to adjourn reveals
    the impasse. The dialogue underscores the irreconcilable clash between institutional
    power and indigenous cultural survival, setting the stage for further escalation.
    The Tribe’s refusal isn’t just political; it’s existential, rooted in their belief
    that Dorvan V is the first planet to ‘accept’ them after Earth’s broken bond.
    Picard’s internal conflict mirrors the broader tension between Federation authority
    and the rights of displaced peoples, a theme that will later intersect with Wesley’s
    own crisis of belonging.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e20
  scene_sequence: 5
  sequence_in_scene: 11
  key_dialogue:
  - 'ANTHWARA: You don''t understand... the choice of this world was not limited to
    ''environmental conditions.'' There were other... more intangible concerns as
    well. My people have always had an intimate bond with nature. We think of ourselves
    as being a part of it... and it being a part of us. One of the reasons our ancestors
    left Earth two hundred years ago was because that bond had been severed.'
  - 'WAKASA: He''s laughing at you, Anthwara. He thinks you''re talking about old
    superstition and nonsense.'
  - 'PICARD: I can assure you that we will not impose a weather control system or
    anything else on your people. Whatever world you choose to colonize will be completely
    yours to do with as you please.'
  - 'ANTHWARA: Captain, once the bond between us and Earth had been broken, we had
    to find a planet where we could establish a new bond... a planet that would welcome
    us. When I came here twenty years ago, I was welcomed by the mountains... the
    rivers... the sky.'
