- fabula_uuid: act_e2214c97fa6506e0
  number: 4
  summary: 'Gul Evek confronts Picard on Dorvan Five, asserting Cardassian authority
    and demanding to know why the evacuation is not complete. Picard attempts to de-escalate,
    requesting Evek''s immediate departure due to delicate negotiations, but Evek
    refuses, insisting on a preliminary survey. Picard issues a stern warning, asserting
    Federation jurisdiction until the transfer is complete. Meanwhile, Wesley enters
    the Habak with Lakanta, a sacred ceremonial chamber. Lakanta explains the inclusive
    nature of their spirituality, incorporating diverse spirits, including Klingons
    and Vulcans, alongside traditional Earth animals. Lakanta instructs Wesley to
    start a fire and wait, beginning his vision quest. On the Enterprise, Picard receives
    final confirmation from Admiral Necheyev that the Federation Council will not
    reopen the Dorvan Five issue, leaving him no choice but to proceed with forced
    removal. Picard, deeply troubled by the historical echoes of his ancestor''s actions,
    orders Worf to prepare for the evacuation. Back in the Habak, Wesley, exhausted,
    experiences a profound vision: his deceased father, Jack Crusher, appears and
    tells him he has been following a path that wasn''t his own, urging him to find
    his true destiny. The vision ends, and Wesley emerges from the Habak, encountering
    Worf preparing to lay down a confinement beam for forced removal. Witnessing this,
    and influenced by his vision and the apparitions of Lakanta and a Mansara-masked
    figure, Wesley makes a decisive choice. He defies Starfleet orders, alerting the
    villagers to the impending forced removal, which incites a hostile standoff between
    the Indians and Starfleet security, effectively escalating the conflict to a dangerous
    new level.'
