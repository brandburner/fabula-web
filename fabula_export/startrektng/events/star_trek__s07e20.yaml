  title: Wesley confronts his self-worth with Lakanta
  description: "\n  Wesley arrives in the Native American village visibly out of place,\
    \ his Starfleet uniform marking him as an outsider among the villagers who ignore\
    \ him. His initial frustration at Lakanta’s cryptic presence—revealed to have\
    \ been observing him since his arrival—escalates into a raw admission of his disillusionment.\
    \ Lakanta’s probing questions force Wesley to confront his lack of self-respect\
    \ and his inability to identify anything as sacred in his life. The elder’s assertion\
    \ that *everything* in their world is sacred, including Wesley himself, challenges\
    \ the young man’s self-perception. Lakanta’s final suggestion—that Wesley’s disrespect\
    \ for himself is a form of desecration—becomes the emotional catalyst for Wesley’s\
    \ reluctant but transformative agreement to embark on a vision quest. This moment\
    \ marks a turning point in his moral and personal journey, as he begins to question\
    \ Starfleet’s rigid expectations and seeks deeper purpose beyond institutional\
    \ validation.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e20
  scene_sequence: 9
  sequence_in_scene: 20
  key_dialogue:
  - |-
    WESLEY: How long have you been watching me?
    LAKANTA: Since you beamed down.
  - |-
    LAKANTA: What's sacred to you, Wesley?
    WESLEY: To me? Uh... well, I consider a lot of things... important... I respect a lot of things... but I don’t know if I consider anything sacred.
  - |-
    LAKANTA: So if you're sacred... then you have to treat yourself with respect... to do otherwise is to desecrate something holy.
    WESLEY: Maybe I don’t have... a lot of respect for myself right now.
    LAKANTA: Then perhaps it's time for your own vision quest to begin.
