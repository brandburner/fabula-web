  title: Wesley resigns over moral conflict
  description: "\n  In the Observation Lounge, Picard confronts Wesley over his insubordination\
    \ during the Dorvan V crisis, where Wesley defied orders to protect the colonists.\
    \ Picard, furious, demands an explanation, but Wesley—now a transformed figure—stands\
    \ firm, rejecting the moral authority of Starfleet’s orders. The exchange escalates\
    \ as Picard invokes chain of command, but Wesley, unshaken, declares his resignation,\
    \ removing his combadge and exiting. The moment fractures their mentor-student\
    \ bond, marking Wesley’s definitive break from institutional authority. Picard’s\
    \ stunned reaction underscores the gravity of the decision, while Riker’s interruption\
    \ about Gul Evek’s arrival signals the broader diplomatic fallout. This scene\
    \ crystallizes Wesley’s disillusionment and the cost of moral conviction in a\
    \ rigid system.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e20
  scene_sequence: 19
  sequence_in_scene: 34
  key_dialogue:
  - 'PICARD: Inexcusable. You defied the orders of the ranking officer on the scene...
    put the entire Away Team in jeopardy... and made an already tense situation worse.
    Your actions reflect poorly on this ship and on that uniform. I want an explanation
    Mister Crusher, and I want it now.'
  - 'WESLEY: What you''re doing down there is wrong. Captain, these people aren''t
    just some random group of colonists... they''re a unique culture... one that predates
    the Federation and Starfleet.'
  - 'PICARD: That is not your decision to make, Cadet. Now, I don''t know what''s
    gotten into you lately, and right now I don''t care. But I will tell you this—while
    you wear that uniform, you will obey every order you''re given and you will conform
    to Starfleet regulations and rules of conduct. Is that clear?'
  - 'WESLEY: Yes, it is. But I''m not going to wear this uniform anymore. I''m resigning
    from the Academy.'
