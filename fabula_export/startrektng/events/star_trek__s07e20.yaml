      realism: they will take the chance to remain on Dorvan V, even if it means renouncing
      Federation citizenship and facing an uncertain future under Cardassian jurisdiction.
      The council’s power in this scene lies in its moral clarity and historical legitimacy,
      which force Picard and Evek to confront the ethical implications of their actions.'
    active_representation: 'Through Moral and Historical Advocacy: The Tribal Council
      is represented by Anthwara, who speaks not only as a leader but as the voice
      of his people’s collective memory and spiritual connection to Dorvan V. His
      arguments are rooted in both practical concerns and deep-seated cultural values,
      making his advocacy uniquely compelling.'
    power_dynamics: 'Moral Authority in a Politically Weak Position: The Tribal Council
      wields significant moral authority in this scene, as its claims to Dorvan V
      are grounded in both historical injustice and spiritual connection. However,
      its political power is limited by its lack of formal recognition or military
      backing. Anthwara’s ability to negotiate from a position of relative weakness
      underscores the council’s resilience and the ethical weight of its cause, which
      forces Picard and Evek to engage with its demands seriously.'
