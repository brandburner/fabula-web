- fabula_uuid: cand_evt_scene_c890d1897bff73c1_01
  global_id: null
  title: Wesley exposes Starfleet’s forced removal plan
  description: "\n  Wesley Crusher, still disoriented from his vision quest and grappling\
    \ with supernatural visions, stumbles upon Worf directing security personnel to\
    \ set up a confinement beam perimeter around the Dorvan Five village. The revelation\
    \ that Starfleet intends to forcibly relocate the villagers—using transporter\
    \ coordinates as a security measure—triggers a moral crisis in Wesley. His initial\
    \ shock gives way to defiance as he witnesses Lakanta’s apparition (a lingering\
    \ vision from his quest), reinforcing his growing connection to the villagers\
    \ and their plight. Wesley’s emotional state—fueled by his father’s posthumous\
    \ guidance and the spiritual weight of his experiences—culminates in a public\
    \ betrayal of Starfleet. He turns on Worf, shouting to the villagers about the\
    \ impending forced removal, uniting them against the Federation. The scene marks\
    \ a decisive break from Wesley’s Starfleet identity, as he aligns himself with\
    \ the colonists’ resistance, while Worf’s rigid adherence to orders underscores\
    \ the ideological chasm between duty and ethics. The confrontation escalates into\
    \ a standoff, with Wakasa and the villagers turning hostile, forcing Worf and\
    \ the security team into a tense retreat. This moment solidifies Wesley’s transformation\
    \ from a disillusioned prodigy to an active rebel, while exposing the moral hypocrisy\
    \ of Starfleet’s actions.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e20
  scene_sequence: 18
  sequence_in_scene: 32
  key_dialogue: &id007
  - 'WORF: Lay out a confinement beam trace along the Southwestern edge of the village.
    Be discreet -- we do not wish to alarm the population.'
  - 'WESLEY: Worf... we can''t do this. These people deserve better than to be taken
    from their homes...'
  - 'WESLEY: ((to villagers)) Do you know what they''re doing? They''re preparing
    to beam you away -- to take you to their ship! You''re not going to just let them
    do that, are you?'
