- fabula_uuid: cand_evt_scene_ac54745650d13d07_03
  global_id: null
  title: Wesley’s final departure from the Enterprise
  description: "\n  In the sterile, functional space of the transporter room, Wesley\
    \ Crusher prepares to leave the *Enterprise*—and Starfleet—forever. The moment\
    \ is charged with unspoken grief and quiet acceptance. Picard, standing as both\
    \ a commanding officer and a surrogate father, shakes Wesley’s hand with restrained\
    \ affection, his final words ('good luck, Wesley') carrying the weight of a man\
    \ who has watched a prodigy unravel and now must let him go. Beverly, her emotions\
    \ barely contained, clings to Wesley in a tearful hug, her attempt at humor ('dress\
    \ warmly in those other planes of existence') betraying her fear for his uncertain\
    \ future. The scene is a wordless exchange of mutual understanding between Picard\
    \ and Beverly as they exit together, their shared burden as leaders and parents—of\
    \ having to enforce rules that conflict with their personal convictions—left unspoken\
    \ but palpable. The transporter hums, Wesley dematerializes, and the act ends\
    \ not with fanfare but with the quiet finality of a door closing on a chapter.\
    \ This moment is the emotional climax of Wesley’s disillusionment, a turning point\
    \ that underscores the cost of moral compromise in Starfleet’s hierarchy and the\
    \ personal sacrifices it demands from those who serve it.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e20
