      and institutional pressure.
    - To use academic and research standards (e.g., Doctor Vassbinder’s paper) as
      tools for shaping cadets’ worldviews.
    influence_mechanisms:
    - Mentorship (Boothby’s historical role and Picard’s current attempt to reconnect).
    - Academic and research standards (e.g., the expectation that cadets engage with
      cutting-edge papers).
    - Institutional pressure (e.g., the threat of expulsion for underperformance).
    institutional_impact: The event highlights the Academy’s role in shaping—or failing
      to shape—cadets like Wesley. His disillusionment reflects a broader critique
      of the Academy’s ability to adapt to individual needs and moral convictions.
      The scene foreshadows his resignation, which will directly challenge the Academy’s
      authority.
    internal_dynamics: The tension between the Academy’s rigid expectations and Wesley’s
