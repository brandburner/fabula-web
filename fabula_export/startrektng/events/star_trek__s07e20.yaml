      a metaphor for his unresolved internal struggle—partially emptied of Starfleet’s
      expectations but not yet filled with a clear alternative. Its presence on the
      bed during their embrace underscores the bittersweet nature of their reconciliation:
      love persists, but the path forward remains uncertain.'
