acts:
- fabula_uuid: act_ca2401fd8be30dae
  number: 1
  summary: 'The Enterprise docks at Starbase Three One Zero, where Wesley Crusher
    returns from Starfleet Academy for a break. His mother, Beverly, greets him with
    warmth, but Wesley''s subtle disengagement and forced cheer signal an underlying
    unhappiness. He rebuffs attempts by Geordi and Picard to connect, displaying an
    uncharacteristic arrogance and apathy toward Starfleet engineering and his former
    mentors. This behavior underscores a growing internal conflict, hinting at his
    disillusionment with his chosen path. Concurrently, Captain Picard receives a
    critical briefing from Fleet Admiral Necheyev. She informs him of a new border
    treaty with the Cardassians, which mandates the relocation of the Native American
    colony on Dorvan Five, as the planet now falls within Cardassian territory. Picard
    voices profound moral objections, highlighting the historical echoes of forced
    displacement for these people who sought to preserve their cultural identity.
    Despite his ethical concerns, Necheyev delivers a grim order: if the colonists
    refuse to evacuate, Picard must remove them ''by any means necessary.'' Picard,
    deeply conflicted by the directive, reluctantly accepts the mission, setting the
    stage for a profound moral dilemma and the central external conflict of the narrative.
    This act effectively establishes both Wesley''s personal crisis and Picard''s
    ethical challenge.'
