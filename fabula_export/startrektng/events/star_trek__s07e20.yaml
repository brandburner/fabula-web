    emotional_state: 'Surface: Feigned politeness masking deep frustration and disillusionment.
      Internal: A mix of resentment toward Starfleet’s authority, regret for his dismissive
      behavior toward Picard, and a gnawing sense of isolation.'
    goals:
    - To avoid a meaningful conversation with Picard and maintain emotional distance.
    - To deflect Picard’s probing questions about Boothby and his time at the Academy
      without revealing his true feelings.
    what_happened: Wesley is awakened from sleep in his disheveled quarters, his irritation
      at Picard’s unannounced visit quickly giving way to evasive, dismissive behavior.
      He moves sluggishly, avoiding eye contact, and uses the replication of coffee
      as a distraction to occupy his hands. His body language—hunched shoulders, gripping
      the mug tightly, and feigned politeness—reveals his emotional withdrawal and
      resentment toward Starfleet’s institutional expectations. By the end of the
      exchange, he sits in frustrated regret, unable to articulate his true feelings
      or repair the rift with Picard.
