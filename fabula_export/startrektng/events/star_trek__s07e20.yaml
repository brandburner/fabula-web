  title: Wesley rejects Starfleet for Dorvan Five
  description: "\n  In Wesley’s quarters, Beverly confronts her son as he packs his\
    \ bags in civilian clothes, marking his formal rejection of Starfleet. Their tense\
    \ exchange reveals Wesley’s disillusionment with the Academy and his belief that\
    \ his father’s spirit—encountered during a vision quest—has guided him toward\
    \ a new path. Beverly, though initially furious, shifts to understanding as Wesley\
    \ admits his long-suppressed depression and fear of disappointing others. The\
    \ moment pivots when Beverly invokes the Traveller’s prophecy, reframing Wesley’s\
    \ departure not as failure but as the fulfillment of a foretold destiny. Their\
    \ emotional reconciliation culminates in Wesley’s declaration that he will return\
    \ to Dorvan Five’s colonists, defying Starfleet’s impending relocation order.\
    \ The scene crystallizes Wesley’s transformation from prodigy to self-defined\
    \ individual, while also foreshadowing the moral conflict between Federation authority\
    \ and the colonists’ sovereignty.\n  "
