  title: Picard exits Wesley’s quarters
  description: Picard visits Wesley’s quarters to welcome him back aboard the Enterprise,
    only to find him withdrawn and evasive. The exchange begins with awkward pleasantries—Wesley,
    still in bed and visibly disheveled, deflects Picard’s attempt to reconnect by
    dismissing Boothby, a shared figure from their past. Wesley’s cold, dismissive
    tone and refusal to engage reveal his deep disillusionment with Starfleet and
    his strained relationship with Picard. When Picard presses slightly, Wesley backtracks
    unconvincingly, further exposing the rift between them. Sensing the futility of
    the conversation, Picard abruptly ends the exchange with a formal farewell, leaving
    Wesley alone to grapple with regret. The moment underscores the collapse of their
    once-close mentor-mentee dynamic, marking a turning point in their relationship
    and Wesley’s internal conflict over his path forward. The unresolved tension lingers,
    signaling that their estrangement is no longer temporary but a fundamental shift
    in their connection.
