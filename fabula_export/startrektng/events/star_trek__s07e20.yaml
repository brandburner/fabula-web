- fabula_uuid: cand_evt_scene_f1d00ab9c6aa5ed8_01
  global_id: null
  title: Wesley confronts his Starfleet disillusionment
  description: "\n  Beverly Crusher confronts Wesley in his quarters as he packs to\
    \ leave Starfleet Academy, forcing him to articulate the emotional crisis behind\
    \ his abrupt resignation. The exchange reveals Wesley’s repressed fear of failing\
    \ Picard’s expectations and his mother’s legacy, as well as his growing disillusionment\
    \ with the institution. Beverly’s anger gives way to concern when Wesley admits\
    \ he’s been struggling with depression, and she ultimately reframes his decision—not\
    \ as failure, but as a fulfillment of the Traveller’s prophecy. The scene culminates\
    \ in a fragile reconciliation, where Beverly acknowledges the unspoken pressures\
    \ they’ve placed on him, and Wesley reveals his intention to stay with the Native\
    \ American colonists on Dorvan Five, despite Starfleet’s impending relocation\
    \ order. The confrontation lays bare the emotional fault line between Wesley’s\
    \ self-doubt and the unspoken expectations of his lineage, while also foreshadowing\
    \ his spiritual journey beyond Starfleet.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e20
  scene_sequence: 20
  sequence_in_scene: 36
  key_dialogue:
  - |-
    BEVERLY: Why are you doing this?
    WESLEY: I told you, Starfleet's not for me.
    BEVERLY: Dammit, Wesley. I may not be able to stop you from throwing your entire life away, but you are going to stand here and explain it to me first. You owe me that much.
  - |-
    WESLEY: I saw Dad today. He told me not to follow him... that I had to find my own path.
    BEVERLY: ((incredulous)) Is that what this is all about? Some mystical vision told you to leave the Academy and now you're packing your bags?
  - |-
    WESLEY: I just never questioned the fact that someday I'd be in Starfleet. But when Dad said not to follow him, I just knew he was right. It seems... so clear now.
    BEVERLY: Maybe it's partly my fault... I never realized the kind of pressure we all must've put on you... to be exactly what we expected you to be...
  - |-
    BEVERLY: You remember the alien from Tau Ceti who could control warp fields with his mind... ?
    WESLEY: ((nods)) The Traveller.
    BEVERLY: He told Captain Picard a long time ago that you were... special - like Mozart. That you were destined for something... different from the rest of us... Maybe... this is the first step...
