  title: Wesley rejects Starfleet expectations
  description: "\n  Beverly confronts Wesley in his quarters after his increasingly\
    \ erratic behavior—particularly his outburst in Engineering—escalates into a direct\
    \ challenge to her authority. The tension begins with Beverly’s frustrated observation\
    \ of his moodiness, which Wesley dismisses as trivial. When she presses him on\
    \ his uncharacteristic conduct, he snaps, revealing a deeper resentment toward\
    \ Starfleet’s rigid expectations and the pressure to conform to the Picard legacy.\
    \ His outburst—'Maybe I'm sick of living up to other people's expectations...\
    \ maybe I'm sick of following rules and regulations'—exposes the fracture in his\
    \ identity, as his defiance collides with his vulnerability. The scene culminates\
    \ in Wesley storming out, symbolizing his rejection of the institution that has\
    \ shaped him and foreshadowing his eventual departure from Starfleet. This moment\
    \ marks a critical turning point in his arc, where his disillusionment becomes\
    \ irreversible, directly setting up his vision quest and existential crisis.\n\
    \  "
