  global_id: null
  title: Anthwara’s Spiritual Defense of Dorvan Five
  description: In a tense meeting aboard the *Enterprise*, Picard and Troi attempt
    to negotiate the relocation of Native American colonists from Dorvan Five, offering
    alternative worlds as a concession. Anthwara, the Tribal Council leader, rejects
    the proposal, framing Dorvan Five as a sacred homeland where the land itself has
    welcomed his people. Wakasa escalates the conflict by accusing Picard of dismissing
    their beliefs as superstition, forcing Picard to confront the moral weight of
    Starfleet’s order. Troi intervenes, adjourning the meeting to allow time for reflection,
    while Picard extends an invitation to the colonists to visit the *Enterprise*
    later, subtly shifting the dynamic from confrontation to potential dialogue. The
    scene underscores the collision between institutional authority and indigenous
    spiritual sovereignty, deepening the thematic stakes of the conflict.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e20
  scene_sequence: 5
  sequence_in_scene: 12
  key_dialogue:
  - 'ANTHWARA: You don''t understand... the choice of this world was not limited to
    ''environmental conditions.'' There were other... more intangible concerns as
    well. My people have always had an intimate bond with nature. We think of ourselves
    as being a part of it... and it being a part of us. One of the reasons our ancestors
    left Earth two hundred years ago was because that bond had been severed.'
  - 'WAKASA: He''s laughing at you, Anthwara. He thinks you''re talking about old
    superstition and nonsense.'
  - 'PICARD: I have a great deal of respect for your beliefs and the meaning they
    hold for your people. Then you should respect the fact that this planet holds
    a deeply spiritual significance for us. It took us two centuries to find a place
    where the mountains gave us permission to use their stone for our houses... where
    the rivers let us drink from their waters... and where the wind sang to us at
    night.'
