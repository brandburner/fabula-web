- fabula_uuid: cand_evt_scene_7fb35275d161be55_02
  global_id: null
  title: Worf requests Starfleet intervention under pressure
  description: "\n  The scene opens with Wesley Crusher arriving in the Indian village,\
    \ where tensions are already escalating. Wakasa, a Tribal Council member, immediately\
    \ dismisses Wesley’s presence, his focus instead on the unfolding standoff: two\
    \ Cardassian troopers have been captured by the villagers, their weapons seized.\
    \ The Indians, led by Wakasa, refuse to recognize the Federation-Cardassian treaty\
    \ and declare their intent to resist any forced removal from Dorvan Five. When\
    \ Worf and his security team arrive, they find the villagers surrounding the Cardassians,\
    \ their hostility directed not only at the Cardassians but now also at the Federation\
    \ officers. Worf attempts to intervene diplomatically, citing the treaty’s terms,\
    \ but Wakasa rejects Starfleet’s authority outright, rallying the crowd against\
    \ them. Recognizing the situation’s volatility, Worf discreetly contacts Picard\
    \ for direct orders, marking a critical moment where the crew’s authority is tested\
    \ and the need for Starfleet’s decisive leadership becomes undeniable. This event\
    \ foreshadows the moral and strategic dilemmas Picard will face, as the colonists’\
    \ defiance forces the Federation to confront the consequences of its own policies.\n\
    \  "
