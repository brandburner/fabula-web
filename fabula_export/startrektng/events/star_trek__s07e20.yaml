  title: Picard probes Wesley’s withdrawal
  description: In Wesley’s disheveled quarters, Picard arrives unannounced to welcome
    him back from the Academy, only to find him uncharacteristically disheveled and
    emotionally distant. The exchange begins with awkward pleasantries—Wesley’s evasive
    responses and refusal to meet Picard’s gaze signal a deeper disillusionment with
    Starfleet. When Picard references Boothby, a mentor figure from their past, Wesley
    dismisses him with uncharacteristic coldness, revealing his growing resentment
    toward institutional authority. Picard, sensing the tension, withdraws abruptly,
    leaving Wesley regretful but unable to bridge the gap. The scene underscores the
    fracture in their relationship, foreshadowing Wesley’s impending resignation from
    Starfleet and Picard’s own moral reckoning with the Dorvan V mission. The disarray
    of the room mirrors Wesley’s internal chaos, while Picard’s rigid formality betrays
    his discomfort with the unspoken rift between them.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e20
  scene_sequence: 3
  sequence_in_scene: 7
  key_dialogue: &id005
  - 'PICARD: Oh. I''m sorry to disturb you, Mister Crusher. I assumed you would be
    up at this hour. I could come back later.'
  - 'WESLEY: Fine, I guess. I haven''t seen him in a while. To be honest, sir... Boothby
    was starting to get on my nerves a little bit. He always seemed to have an opinion
    about everything.'
  - 'PICARD: But you''d had enough of his insights.'
