    - Soft, recycled-air lighting that casts a warm but sterile glow, emphasizing
      the artificiality of the *Enterprise*’s environment.
    - The low, constant hum of the ship’s systems, a backdrop that underscores the
      isolation of their confrontation.
    - Disheveled clothing and half-unpacked gear strewn about, visually reflecting
      Wesley’s internal disarray.
    - The bed, a neutral ground where the emotional weight of their exchange is physically
      manifested.
