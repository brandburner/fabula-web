- fabula_uuid: act_5feb79467d4ae60c
  number: 5
  summary: 'A furious Picard confronts Wesley in the Observation Lounge, condemning
    his insubordination and the jeopardy he created. Wesley, however, remains resolute,
    calmly asserting that the forced relocation is ''wrong,'' regardless of Starfleet
    orders. He then resigns from Starfleet Academy, placing his combadge on the table,
    signaling a definitive break from his expected future. Simultaneously, Gul Evek
    demands a meeting with Picard, as the situation on Dorvan Five rapidly deteriorates.
    Beverly confronts Wesley in his quarters, expressing her anger and anguish over
    his decision. Wesley reveals his vision of his father, explaining that Jack told
    him to find his own path. Beverly, though initially incredulous, eventually accepts
    his decision, recalling the Traveller''s prophecy about Wesley''s unique destiny.
    Wesley declares his intention to stay with the Indians, even as the conflict escalates
    on the planet. On Dorvan Five, the Indians take Cardassian troops hostage, leading
    to a volatile standoff with Worf''s security team. A Cardassian trooper fires
    a disruptor, igniting open conflict. On the Bridge, Picard and Gul Evek face the
    brink of war, with the Cardassian ship powering weapons. Picard appeals to Evek,
    reminding him of the devastating cost of their previous war and Evek''s personal
    losses. Evek, swayed by Picard''s words and the memory of his lost sons, orders
    his ship to beam up his troops, preventing further bloodshed. Ultimately, Picard
    brokers an unprecedented agreement: the Indians relinquish their Federation citizenship
    to remain on Dorvan Five under Cardassian protection, a solution Gul Evek reluctantly
    accepts. Wesley, guided by the now-revealed Traveller, chooses to leave with him,
    embarking on a new, extraordinary path beyond Starfleet, leaving his mother and
    Picard behind to pursue his unique destiny.'
