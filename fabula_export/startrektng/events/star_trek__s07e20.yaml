- fabula_uuid: act_e89518a455181807
  number: 3
  summary: 'Beverly confides in Picard about Wesley''s alarming decline at Starfleet
    Academy, including falling grades and a defensive attitude. She implores Picard
    to speak with him, but Picard, drawing on his own past struggles, advises letting
    Wesley work through his issues independently to avoid pushing him further away.
    Meanwhile, Wesley seeks out Lakanta in the Indian village, initially frustrated
    by Lakanta''s enigmatic responses. Lakanta challenges Wesley to consider what
    is ''sacred'' to him, emphasizing the inherent sacredness of all things and of
    Wesley himself, which resonates deeply with Wesley''s unspoken self-doubt. Lakanta
    then suggests Wesley embark on his own vision quest in the Habak. Back on the
    Enterprise, Picard informs the Tribal Council that, despite his regrets, they
    must leave Dorvan Five, reiterating the order for forced removal if they resist.
    Anthwara responds by revealing a dark chapter in Picard''s family history: an
    ancestor, Javier Maribona-Picard, was responsible for brutal acts during the Pueblo
    Revolt centuries ago. Anthwara declares Picard''s presence is meant to ''erase
    a stain of blood'' from his family''s past, adding a profound personal and historical
    dimension to Picard''s moral dilemma. The act culminates with the unexpected arrival
    of Gul Evek and Cardassian troops on Dorvan Five, immediately escalating the external
    conflict and creating a volatile situation on the planet''s surface.'
