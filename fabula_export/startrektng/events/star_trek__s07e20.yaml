      detail and his desire to create an atmosphere of refinement. The sandwiches,
      like the tea and canapés, serve as a diplomatic tool—subtly signaling respect
      and an attempt to disarm Necheyev’s defenses. Their untouched state underscores
      the tension between the gesture and the gravity of the conversation, as the
      focus shifts from hospitality to moral conflict.
