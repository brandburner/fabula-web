    influence_mechanisms:
    - Collective action and unified defiance, which rally the villagers against Starfleet.
    - Spiritual and cultural authority, which frames the conflict as a moral and historical
      struggle rather than a mere institutional dispute.
    - Leadership figures like Wakasa, who channel the community’s resistance and provide
      a focal point for their defiance.
    institutional_impact: The event reinforces the tribal council’s role as the moral
      and cultural guardian of the villagers, challenging Starfleet’s authority and
      exposing the ethical shortcomings of its policies. It also highlights the resilience
      of indigenous communities in the face of displacement, framing their resistance
      as a continuation of historical struggles for sovereignty.
    internal_dynamics: The council’s unity is tested by the external pressure of Starfleet’s
      orders, but their shared history and spiritual beliefs strengthen their resolve.
      The event does not reveal internal divisions, but rather a collective commitment
