      itself takes place on the *Enterprise* bridge, Dorvan V’s presence is omnipresent,
      as it is the site of the Cardassian troop attack, the away team’s deployment,
      and the broader standoff between the two powers. The planet’s role in the event
      is symbolic and functional, representing the moral and territorial stakes of
      the conflict. The urgency of the transmissions from the Vetar and the mention
      of the away team’s recall highlight Dorvan V as the battleground where diplomacy
      and military force collide. Its atmosphere is one of tension and impending violence,
      though the event’s resolution temporarily averts disaster.
    observed_atmosphere: Tense and volatile, with the looming threat of war casting
      a shadow over the negotiations. The planet’s surface is depicted as chaotic,
      with Cardassian troops under attack and the away team in danger, though the
      bridge’s red alert status reflects the same urgency.
    functional_role: Battleground and symbolic center of the conflict between the
      Federation and Cardassia. The planet’s fate is tied to the negotiations between
      Picard and Evek, as its colonization by Native Americans and the Cardassian
      claim to the territory drive the standoff.
    symbolic_significance: Represents the moral and territorial stakes of the war,
      as well as the shared trauma of displacement and violence experienced by both
      the Federation and Cardassia. Dorvan V is a microcosm of the broader conflict,
      where personal stories (such as Evek’s loss of his sons) intersect with geopolitical
      struggles.
    access_restrictions: Restricted to Starfleet and Cardassian personnel due to the
