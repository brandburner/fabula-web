  title: Picard issues forced relocation order
  description: "\n  In the ready room, Picard receives Admiral Necheyev’s final, uncompromising\
    \ order to forcibly relocate the Dorvan V colonists—a decision that shatters his\
    \ diplomatic hopes and forces him into a moral abyss. After a tense exchange where\
    \ Picard pleads for a Federation Council reconsideration (which Necheyev reveals\
    \ was already denied), the transmission ends, leaving Picard and Riker in stunned\
    \ silence. Picard’s internal conflict surfaces as he reflects on Anthwara’s accusation\
    \ of ancestral complicity in genocide, questioning whether history is repeating\
    \ itself. The weight of the moment is palpable as Picard, visibly conflicted,\
    \ steels himself and issues the order to Worf to begin preparations for the forced\
    \ removal. Riker’s reluctant departure with Worf underscores the crew’s complicity\
    \ in a morally fraught directive, marking the mission’s point of no return where\
    \ duty and conscience collide. This scene serves as the narrative’s turning point,\
    \ where Picard’s leadership is tested by the cost of obedience and the irreversible\
    \ consequences of his actions.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e20
  scene_sequence: 14
  sequence_in_scene: 27
  key_dialogue:
  - |-
    NECHEYEV: Is there any indication that the Tribal Council will change their position in the near future?
    PICARD: No, sir.
    NECHEYEV: Then I see no other choice... Captain... I made that request two days ago. The answer was no.
  - |-
    PICARD: Anthwara believes that I am responsible for the crimes of one of my ancestors against his people...
    RIKER: Do you believe that?
    PICARD: No, of course not. I respect their beliefs... but that can't have any bearing on our mission. But at the same time... I wonder if a dark chapter in my family history is about to repeat itself.
  - |-
    PICARD: Mister Worf... begin preparations to remove the inhabitants from Dorvan Five.
    WORF: Aye, sir.
