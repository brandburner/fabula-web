      and the institutional and familial expectations that have defined his life up
      to this point. The quarters symbolize the past he is trying to leave behind,
      even as they provide the necessary privacy for him to articulate his struggles.
    access_restrictions: Restricted to Wesley and, by extension, Beverly (as his mother
      and a senior officer with access privileges). The door is presumably closed,
      ensuring their conversation remains private and unobserved.
