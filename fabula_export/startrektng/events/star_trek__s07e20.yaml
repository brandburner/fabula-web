    description_of_involvement: The confinement beam perimeter is the physical and
      technological manifestation of Starfleet’s plan to forcibly relocate the villagers.
      The security guards lay out its traces along the southwestern edge of the village,
      marking the boundaries of the transporter coordinates. This perimeter is not
      just a security measure but a symbol of institutional power and the moral dilemma
      at the heart of the scene. Wesley’s exposure of the perimeter’s purpose turns
      it into a focal point of the villagers’ resistance, as they realize the extent
      of Starfleet’s betrayal.
    status_before_event: Partially set up by the security guards, with traces marked
      but not yet activated, as Worf directs the final adjustments.
    status_after_event: Abandoned and incomplete, as Worf and the team retreat under
      the villagers’ hostile pressure. The perimeter remains a physical reminder of
      the confrontation and the villagers’ defiance.
    global_id: ger_object_53b95fda45af
  - object_uuid: ger_object_556f7107c7b5
    description_of_involvement: Worf’s tricorder is the functional tool used to calculate
      and mark the transporter coordinates for the confinement beam perimeter. Its
      presence is a tangible symbol of Starfleet’s technological and institutional
      power, as well as the cold, calculated nature of the forced relocation plan.
      Wesley’s gaze locks onto the tricorder, which becomes the catalyst for his realization
      of what is happening and his subsequent defiance. The tricorder’s role is both
      practical—enabling the setup of the perimeter—and narrative, as it represents
      the mechanical enforcement of Federation policy.
    status_before_event: Active and in use by Worf, displaying transporter coordinates
      and confinement beam parameters as he directs the security team.
    status_after_event: Still functional but no longer in use for the perimeter setup,
      as the confrontation forces Worf and the team to retreat.
