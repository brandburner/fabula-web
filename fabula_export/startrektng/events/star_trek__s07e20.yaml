- fabula_uuid: cand_evt_scene_5ac7415391c39fac_02
  global_id: null
  title: Traveller reveals true form to Wesley
  description: "\n  In the midst of escalating violence between Worf, Wakasa, and\
    \ the Cardassian troops, Wesley experiences a moment of disconnection from the\
    \ physical conflict. Lakanta, his vision quest guide, reveals himself as the Traveller—a\
    \ cosmic entity who has been orchestrating Wesley’s spiritual awakening. The Traveller\
    \ explains that Wesley’s visions, including his encounter with his deceased father,\
    \ were manifestations of his own mind and spirit, guided by the Traveller’s influence.\
    \ The entity offers to be Wesley’s guide to new realms of thought and energy,\
    \ but Wesley hesitates, torn between his newfound enlightenment and the immediate\
    \ crisis unfolding around him. The Traveller reassures him that the others must\
    \ find their own destinies, and Wesley ultimately agrees to leave with him. As\
    \ they depart, time resumes, and the violence between the factions erupts anew,\
    \ underscoring the divergence between Wesley’s spiritual path and the physical\
    \ conflicts of Starfleet and the colonists.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e20
  scene_sequence: 23
  sequence_in_scene: 44
  key_dialogue:
  - 'WESLEY: Who are you?'
  - 'TRAVELLER: I''ve been waiting a long time for this moment, Wesley.'
  - 'WESLEY: So my experience in the Habak... my vision of my father... the things
    he said to me... those were all your doing?'
  - 'TRAVELLER: I merely opened the door for you... what you experienced came from
    your own mind... your own spirit if you wish.'
  - 'WESLEY: What about them? I can''t just leave them like this.'
  - 'TRAVELLER: They must find their own destinies, Wesley. It is not our place to
    interfere.'
