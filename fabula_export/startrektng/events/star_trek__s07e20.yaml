  global_id: null
  title: Wesley confronts Habak’s sacred inclusivity
  description: "\n  Wesley Crusher follows Lakanta into the Habak, a sacred ceremonial\
    \ chamber blending Native American tradition with 24th-century symbols—starships\
    \ and planets alongside Earth animals. Initially told strangers are unwelcome,\
    \ Wesley is reassured by Lakanta’s cryptic claim of having foreseen his arrival.\
    \ His curiosity is piqued by the *Mansara* dolls, including one resembling a Klingon,\
    \ which Lakanta explains represent spirits from all cultures, past and present,\
    \ without distinction. The revelation challenges Wesley’s Starfleet-centric worldview,\
    \ framing his journey as one of cultural and spiritual expansion. Lakanta directs\
    \ him to light a fire and wait, emphasizing that the path ahead is his alone to\
    \ walk. The moment marks a turning point: Wesley’s disillusionment with Starfleet\
    \ begins to give way to a broader, more inclusive understanding of what is sacred—one\
    \ that transcends his former identity.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e20
  scene_sequence: 13
  sequence_in_scene: 25
  key_dialogue:
  - 'LAKANTA: This is the Habak... the focal point of our lives.'
  - 'LAKANTA: Strangers are not welcome here...'
  - 'WESLEY: Wait a minute. When I asked to come here, you said it would be -'
  - 'LAKANTA: You are not a stranger. I told you, I''ve seen you here before.'
  - 'LAKANTA: Our culture is rooted in the past, but it is not limited to the past.
    The spirits of Klingons, Vulcans, Ferengi come to us just as the bear, the coyote,
    the parrot. There is no difference.'
  - 'LAKANTA: This is your journey, Wesley. I can open the door for you, but only
    you can go through it.'
