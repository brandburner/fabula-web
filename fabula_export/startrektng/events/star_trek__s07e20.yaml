  title: Wakasa defies Starfleet over Cardassian prisoners
  description: "\n  Wesley Crusher arrives at the Indian village to find Wakasa and\
    \ his people holding two captured Cardassian troopers, violating the Federation-Cardassian\
    \ treaty. The tension escalates as Worf and his security team confront Wakasa,\
    \ who openly rejects Starfleet authority and declares the village’s refusal to\
    \ surrender Dorvan Five. The villagers, emboldened by Wakasa’s defiance, surround\
    \ the Cardassians and turn their hostility toward the Federation officers, forcing\
    \ Worf to break protocol and call Picard for urgent instructions. This moment\
    \ marks a critical escalation in the moral and political standoff between the\
    \ colonists and Starfleet, with Wakasa’s refusal to recognize the treaty setting\
    \ the stage for open conflict. Wesley, caught between his Starfleet training and\
