  title: Wesley begins his vision quest
  description: "\n  Wesley Crusher follows Lakanta into the Habak, a sacred ceremonial\
    \ chamber blending traditional Native American symbolism with 24th-century influences.\
    \ The space, marked by ladders, a central firepit, and walls adorned with both\
    \ Earth animals and starships, reflects the Habak people's inclusive spiritual\
    \ perspective. Lakanta initially asserts that strangers are unwelcome, but clarifies\
    \ that Wesley is no stranger—he has foreseen Wesley's arrival. Wesley examines\
    \ the chamber, noting dolls (Mansara) representing diverse spirits, including\
    \ a Klingon, which Lakanta explains reflects their culture's openness to all beings.\
    \ Lakanta instructs Wesley to light the fire and wait alone, framing the vision\
    \ quest as a personal journey where only Wesley can determine his path. The moment\
    \ marks Wesley's transition from passive observer to active participant in his\
    \ spiritual and personal growth, emphasizing independence and introspection. The\
    \ fire's symbolic significance—both a literal and metaphorical light—sets the\
    \ stage for Wesley's impending revelations and the dissolution of his Starfleet\
    \ identity.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e20
  scene_sequence: 13
  sequence_in_scene: 26
  key_dialogue:
  - 'LAKANTA: This is the Habak... the focal point of our lives.'
  - 'LAKANTA: Strangers are not welcome here...'
  - 'WESLEY: Wait a minute. When I asked to come here, you said it would be -'
  - 'LAKANTA: You are not a stranger. I told you, I''ve seen you here before.'
  - 'WESLEY: What... should I do?'
  - 'LAKANTA: Start the fire... then sit... and wait.'
  - 'WESLEY: What am I waiting for?'
  - 'LAKANTA: This is your journey, Wesley. I can open the door for you, but only
    you can go through it.'
