  title: Lakanta reveals Wesley’s foreseen arrival
  description: "\n  Wesley enters Ten Forward during a reception for the Dorvan Five\
    \ tribal leaders, visibly uncomfortable in his cadet uniform. While Picard engages\
    \ Anthwara in a tense discussion about sacrifice and legacy, Wesley isolates himself\
    \ near a window, only to be approached by Lakanta, an elder who claims to have\
    \ foreseen his arrival two years prior. Lakanta reveals he experienced a vision\
    \ during a Habak ritual where Wesley appeared, suggesting the young man’s presence\
    \ on Dorvan Five is no accident. Wesley, initially skeptical, is unsettled by\
    \ the elder’s cryptic certainty, which resonates with his own existential crisis.\
    \ The encounter forces Wesley to confront the possibility that his disillusionment\
    \ with Starfleet and his search for meaning are part of a larger, predetermined\
    \ purpose tied to the planet’s fate. Lakanta’s departure leaves Wesley visibly\
    \ shaken, his mind now preoccupied with the implications of the vision and the\
    \ idea that his path may diverge from Starfleet’s rigid expectations. The moment\
    \ marks a turning point in Wesley’s arc, as Lakanta’s words plant the seed for\
    \ his eventual rejection of his former life in favor of a spiritual and philosophical\
    \ journey.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e20
  scene_sequence: 7
  sequence_in_scene: 16
  key_dialogue:
  - |-
    LAKANTA: I have been waiting for you.
    WESLEY: For... me?
    LAKANTA: I have known you would come to us for the past two years.
  - |-
    LAKANTA: Two years ago, I went into the Habak and began a vision quest. While I was there, I saw many things... talked to many animals and spirits... and I saw you.
    WESLEY: I don't mean to be rude, but I wish you'd stop talking about me in the future tense.
    LAKANTA: I know your spirit's troubled, Wesley. That's why you've come to us. We can help you find the answers you seek.
  - |-
    PICARD: It's never easy to leave one's home... to give up the safe and familiar. But there are times when the greater good demands that sacrifices be made... I'm sure your grandfather knew that.
    ANTHWARA: His grandson does too. But there are also times when a people have sacrificed too much... when they must hold on to what they have... even if it means standing up against overwhelming opposition.
