    description_of_involvement: Starfleet is the institutional force behind Necheyev’s
      orders and Picard’s moral dilemma. It manifests in the PADD containing the relocation
      directives, Necheyev’s authority as a vice admiral, and the broader context
      of the Cardassian border treaty. Starfleet’s influence is felt in the pragmatic
      justification for the relocation—‘a reasonable price to pay for peace’—and the
      expectation that Picard will execute the orders without question. The organization’s
      power dynamics are on full display, as Necheyev enforces its directives while
      Picard challenges their moral implications, revealing the tension between duty
      and empathy within the Federation’s ranks.
