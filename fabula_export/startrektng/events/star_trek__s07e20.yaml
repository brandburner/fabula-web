- fabula_uuid: cand_evt_scene_2d185245a00dead0_01
  global_id: null
  title: Picard asserts Federation authority over Evek
  description: 'In a tense standoff at the Indian village on Dorvan Five, Captain
    Picard confronts Gul Evek, a Cardassian officer who has arrived prematurely to
    survey the planet’s infrastructure. Evek dismisses Picard’s diplomatic efforts
    as irrelevant, insisting his mission is non-negotiable. Picard, aware of the fragile
    negotiations with the Native American colonists and the political implications
    of Cardassian interference, attempts to assert Federation jurisdiction while avoiding
    direct confrontation. The exchange escalates into a veiled power struggle, with
    Picard warning Evek that Dorvan Five remains under Starfleet’s protection—at least
    for now. The scene underscores the ideological clash between Cardassian militarism
    and Starfleet’s diplomatic obligations, while also highlighting Picard’s moral
    dilemma: enforcing Starfleet’s orders risks betraying the colonists’ trust, yet
    yielding to Evek could undermine Federation authority. The confrontation sets
    the stage for further escalation, as Evek’s presence threatens to derail Picard’s
    efforts to negotiate a peaceful resolution with the Tribal Council.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e20
  scene_sequence: 12
  sequence_in_scene: 24
  key_dialogue:
  - 'PICARD: I''m Captain Jean-Luc Picard of the Enterprise.'
  - 'GUL EVEK: What are these people still doing here? The evacuation should be well
    underway by now.'
  - 'PICARD: It was my understanding that there would be no Cardassian presence on
    this world for another six weeks. Your arrival here may upset some very... delicate
    negotiations.'
  - 'GUL Evek: Negotiations? The status of this planet has been settled... what are
    you negotiating?'
  - 'PICARD: I must ask that you and your men leave... immediately.'
  - 'GUL EVEK: We were sent here to make a preliminary survey of the buildings and
    equipment being left behind. I have no intention of leaving until our mission
    is complete.'
  - 'PICARD: This is still Federation territory, Gul Evek... until that changes, this
    world is under my jurisdiction... and I will protect it.'
  - 'GUL EVEK: Is that a threat?'
  - 'PICARD: It is a fact... and I suggest you keep it in mind as you conduct your...
    survey.'
