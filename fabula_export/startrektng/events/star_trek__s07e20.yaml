      \      "
    active_representation: "\n        **Through Wesley's alignment with their cause**—his\
      \ decision to return to Dorvan V is framed as a **moral and spiritual choice**,\
      \ one that contrasts sharply with Starfleet's orders. The Council is also represented\
      \ **through its absence**: their **defiance of Starfleet** is cited as a **legitimate\
      \ challenge to institutional authority**, one that Wesley now supports.\n  \
      \    "
    power_dynamics: "\n        **David vs. Goliath**—The Tribal Council is positioned\
      \ as the **underdog** in a conflict with the **overwhelming power of the Federation\
      \ and Starfleet**. However, their **moral and cultural sovereignty** gives them\
      \ a **legitimacy that Starfleet cannot easily dismiss**, particularly as Wesley\
      \ (a former Starfleet prodigy) sides with them. The power dynamic is also **symbolic**:\
      \ the Council represents **authentic community and heritage**, while Starfleet\
      \ represents **institutional authority and bureaucracy**.\n      "
    organizational_goals:
