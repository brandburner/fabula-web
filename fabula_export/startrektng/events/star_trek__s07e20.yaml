      edge as she processes Wesley’s revelations, her posture shifting from rigid
      confrontation to slumped vulnerability. The bed becomes a neutral ground where
      their conflict softens into intimacy, culminating in their wordless embrace.
      Wesley places his suitcase atop it, turning the bed into a stage for the physical
      and emotional baggage they both carry. Its padded surface contrasts with the
      hardness of their words, offering a space for reconciliation. The bed’s role
      is to contain the storm of their emotions, providing a stable foundation as
      they navigate the collapse of old certainties.
