  global_id: null
  title: Picard warns Evek of escalating conflict
  description: "\n  In the Observation Lounge, Picard and Gul Evek receive Worf’s\
    \ report on the escalating standoff on Dorvan Five, where Cardassian troops have\
    \ been taken hostage by the Native American colonists. Evek, enraged by the situation,\
    \ orders the *Vetar* to dispatch an armed squad to occupy the village and rescue\
    \ the prisoners. Picard, recognizing the imminent threat of a violent confrontation,\
    \ urgently demands Evek beam his people to safety before the situation spirals\
    \ further. When Evek refuses, invoking Cardassian sovereignty and threatening\
    \ retaliation, Picard escalates the confrontation by warning that any Cardassian\
    \ attack on the village will provoke a Federation response. The exchange reveals\
    \ the irreconcilable clash between Starfleet’s moral obligations to protect Federation\
    \ citizens and the Cardassians’ insistence on territorial authority, setting the\
    \ stage for a direct military confrontation. The tension underscores Picard’s\
    \ dilemma: whether to prioritize Starfleet’s orders or the colonists’ right to\
    \ self-determination, while Evek’s defiance forces him to confront the consequences\
    \ of his choices.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e20
  scene_sequence: 22
  sequence_in_scene: 41
  key_dialogue:
  - 'PICARD: Have your ship lock-on to your people and beam them out of there now,
    before something happens.'
  - 'GUL EVEK: My people? What about these Indians of yours—they''ve taken hostages.
    This planet is ours, Captain, and we will not be chased away by some unruly crowd.'
  - 'GUL EVEK: Two of our men on the surface have been taken prisoner. Prepare to
    send an armed squad to rescue them and to occupy the village.'
  - 'PICARD: Gul Evek, those people down there are Federation citizens and I am sworn
    to protect them. If your troops attack the village, my security forces will respond...'
  - 'GUL EVEK: I hope you realize the consequences of Federation officers firing on
    Cardassian troops...'
  - 'PICARD: I do. That''s why we need to stop this now, before it''s too late.'
