    Don''t send our two peoples back down that path... not like this. History is in
    your hands—right now. Give us one last chance for peace.'
  - 'GUL EVEK: I had three sons, Captain. I lost two of them in the war. I don''t
    want to lose the last one.'
  - 'PICARD: Beam up our Away Team immediately, Number One.'
