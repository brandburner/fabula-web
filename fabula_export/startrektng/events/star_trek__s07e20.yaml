      leaders. Their collective presence and defiant stance embody the organization's
      rejection of the Federation's relocation order. Anthwara's passionate defense
      of Dorvan V as a sacred homeland and Wakasa's confrontational accusations both
      serve to reinforce the Council's unwavering commitment to their spiritual and
      cultural identity. The Council's unity—visible in their silent solidarity and
      the deliberate setting aside of the PADDs—demonstrates their resolve to resist
      Starfleet's authority, even at the risk of escalating conflict.
    active_representation: Through Anthwara and Wakasa, who serve as the Council's
      primary spokespeople, and the five silent leaders, whose presence amplifies
      the Council's unified stance. Their actions and dialogue reflect the organization's
      collective will and cultural values.
    power_dynamics: Challenging Starfleet's authority and institutional power, though
      they lack the material or military resources to enforce their position. Their
      power lies in their moral and spiritual conviction, which they wield as a form
      of resistance against the Federation's bureaucratic logic.
    organizational_goals:
    - To defend Dorvan V as the sacred homeland of the colonists, rejecting any relocation
      as a betrayal of their spiritual bond with the land.
    - To expose the moral and cultural blind spots in Starfleet's decision-making
      process, particularly its failure to recognize the intangible, spiritual needs
      of indigenous peoples.
    influence_mechanisms:
    - Through the moral and spiritual authority of their arguments, which frame the
      relocation as a violation of their cultural identity and ancestral rights.
    - Through their unified, defiant stance, which forces Picard to confront the emotional
      and ethical consequences of Starfleet's order.
    - Through their rejection of the PADDs and alternative planets, which symbolically
      dismisses the Federation's material concessions as insufficient.
    institutional_impact: The event underscores the limitations of institutional power
      when faced with deeply held cultural and spiritual beliefs. The Tribal Council's
      resistance challenges Starfleet to reconsider its approach to indigenous rights
      and the moral weight of its decisions, particularly in cases where spiritual
      and cultural values are at stake.
    internal_dynamics: The Council's unity is a strength, but the event also reveals
      the internal tensions between Anthwara's diplomatic approach and Wakasa's confrontational
      stance. While both leaders are committed to defending Dorvan V, their methods
      reflect different strategies for resisting Starfleet's authority, which could
      become a point of contention if the conflict escalates.
