  title: Wesley’s Father’s Final Vision
  description: "\n  In a liminal, firelit village plaza, Wesley Crusher—physically\
    \ and emotionally disoriented after his vision quest—encounters the spectral figure\
    \ of his deceased father, Jack, who materializes as a vision during the ritual.\
    \ The surreal setting, filled with masked villagers and flickering shadows, heightens\
    \ the dreamlike quality of the encounter. Jack delivers a blunt, emotionally charged\
    \ ultimatum: Wesley must abandon the path he has been following (mirroring Jack’s\
    \ own Starfleet journey) and embrace a destiny of his own. The exchange forces\
    \ Wesley to confront the finality of his father’s absence and the irreversible\
    \ nature of the choice before him. Jack’s departure into the shadows leaves Wesley\
    \ with a crushing weight of responsibility, marking a turning point in his spiritual\
    \ and personal transformation. The scene serves as both a revelation—clarifying\
    \ Wesley’s internal conflict—and a catalyst for his eventual resignation from\
    \ Starfleet.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e20
  scene_sequence: 16
  sequence_in_scene: 30
  key_dialogue:
  - 'JACK: You''ve reached the end, Wesley.'
  - 'WESLEY: The end... the end of what?'
  - 'JACK: This journey. The one you started a long time ago... when I left you and
    your mother.'
  - 'WESLEY: You mean... when you died.'
  - 'JACK: You set out on a journey that wasn''t your own. Now it''s time to find
    the path that is truly yours. Don''t follow me any further.'
  - 'WESLEY: I... don''t understand.'
  - 'JACK: Yes, you do. It''s just hard for you to accept.'
  - 'JACK: Good-bye, Wesley. Good luck.'
