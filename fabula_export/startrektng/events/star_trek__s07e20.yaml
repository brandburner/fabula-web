  title: Wesley betrays Starfleet to the villagers
  description: "\n  Wesley Crusher, still reeling from his vision quest and the supernatural\
    \ visions of his father and Lakanta, stumbles upon Worf directing Starfleet security\
    \ personnel to set up a confinement beam perimeter around the village. When Worf\
    \ reveals the Federation’s intent to forcibly relocate the colonists, Wesley—now\
    \ emotionally invested in the villagers’ plight—experiences a crisis of conscience.\
    \ His visionary experiences, combined with his growing empathy for the Dorvan\
    \ Five inhabitants, push him to publicly expose Starfleet’s plan to the villagers.\
    \ In a defiant outburst, he warns the colonists of the impending forced removal,\
    \ uniting them against Worf and the Federation. This act of rebellion fractures\
    \ Wesley’s loyalty to Starfleet, marking a turning point in his identity crisis\
    \ as he aligns himself with the villagers’ resistance. The scene escalates the\
    \ moral and political standoff, with Wakasa and the villagers confronting Worf,\
    \ while Wesley’s betrayal of his former shipmates underscores the depth of his\
    \ disillusionment with Starfleet’s moral authority.\n  "
