  - organization_uuid: ger_organization_8e73707aeac7
    description_of_involvement: The Native American Tribal Council of Dorvan V is
      the driving force behind the resistance in this event, with Wakasa serving as
      its defiant voice. The council’s refusal to relinquish Dorvan V—despite Starfleet’s
      orders and the Cardassians’ threats—frames the entire conflict. Their stance
      is rooted in both spiritual conviction (the land chose them) and practical defiance
      (they will not be displaced again). The council’s power in this moment is embodied
      in Wakasa’s unyielding posture and the villagers’ willingness to capture and
      hold the Cardassian troopers. Their resistance is physical, emotional, and symbolic,
      representing a rejection of institutional authority in favor of tribal sovereignty.
      The phaser fire and the resulting violence serve as a microcosm of the broader
      struggle between the council’s desires and the external forces seeking to remove
      them.
    active_representation: Through Wakasa, who speaks and acts as the council’s representative,
      and through the villagers’ collective defiance.
    power_dynamics: The council holds significant moral and emotional power over its
      people, but its physical power is limited by the presence of Starfleet and the
      Cardassians. Their defiance is symbolic and spiritual as much as it is tactical,
      and their ability to resist is tied to the land itself.
    organizational_goals:
    - To maintain control over Dorvan V and resist relocation at all costs
    - To assert the tribe’s sovereignty and spiritual connection to the land, regardless
      of external pressures
    influence_mechanisms:
    - Through Wakasa’s leadership and rhetorical defiance
    - Through the villagers’ physical resistance and capture of the Cardassian troopers
    - Through the symbolic weight of their spiritual beliefs, which frame the land
      as sacred and non-negotiable
    institutional_impact: The council’s resistance highlights the ethical dilemmas
      of Starfleet’s policies, particularly the parallels between historical displacements
      of Native American peoples and the Federation’s current actions. Their defiance
      serves as a moral counterpoint to Starfleet’s institutional authority, forcing
      a reckoning with the human cost of relocation.
    internal_dynamics: The council’s unity is strong, but the internal tension lies
      in their ability to sustain resistance against overwhelming external forces.
      Their spiritual conviction is their greatest strength, but it also makes compromise
      nearly impossible.
