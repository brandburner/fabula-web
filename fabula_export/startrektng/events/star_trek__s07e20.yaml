    been a certain amount of... tension between us in the past.'
  - 'NECHEYEV: The Federation has just completed a very long and difficult series
    of negotiations regarding the final status of our border with the Cardassians.
    Those colonies finding themselves on the wrong side of the border will have to
    be moved.'
  - 'PICARD: Admiral... centuries ago, the North American Indians were forcibly displaced
    from their ancestral lands. This group on Dorvan Five originally left Earth two
    hundred years ago because they wanted to preserve their cultural identities.'
  - 'NECHEYEV: Then your orders are to remove them... by any means necessary.'
  - 'PICARD: No. That won''t be necessary.'
