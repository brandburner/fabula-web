      at the cost of renouncing citizenship and accepting Cardassian jurisdiction.
    - Honor the historical suffering of Native American peoples by rejecting forced
      displacement, as symbolized by Picard’s refusal to remove them by force.
    influence_mechanisms:
    - 'Moral and Historical Appeal: Anthwara’s invocation of the ‘stain of blood’
      and the council’s ancestral connection to Dorvan V serves as a powerful moral
