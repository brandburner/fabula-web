- fabula_uuid: cand_evt_scene_7bd3267b4f0e6f32_01
  global_id: null
  title: Picard and Anthwara debate legacy and sacrifice
  description: 'In a tense yet civilized exchange at Ten Forward’s reception, Picard
    attempts to draw a parallel between Anthwara’s grandfather Katowa—a revered Native
    American leader who uprooted his people for survival—and his own moral dilemma
    over the Dorvan Five relocation. Picard frames the decision as a necessary sacrifice
    for the greater good, but Anthwara dismantles the comparison by exposing the emotional
    cost of repeated displacement. The conversation shifts abruptly when Anthwara
    probes Picard’s own family history, forcing Picard to confront the personal burdens
    he’s buried beneath his duty. Meanwhile, Wesley’s disillusionment with Starfleet
    is underscored when Lakanta, a Native American elder, reveals he foresaw Wesley’s
    arrival years prior, hinting at a deeper purpose tied to Dorvan Five’s fate. Lakanta’s
    cryptic words unsettle Wesley, planting the seed for his eventual vision quest
    and rejection of Starfleet’s rigid path. The scene serves as a crucible for both
    characters: Picard faces the weight of his ancestors’ actions, while Wesley grapples
    with his own unresolved identity crisis, setting up their respective arcs of self-confrontation
    and transformation.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e20
  scene_sequence: 7
  sequence_in_scene: 15
  key_dialogue:
  - 'PICARD: ... so I''ve been trying to familiarize myself with the history and traditions
    of your people. I was quite interested to learn that it was your grandfather -
    Katowa - who led the group of Indians who initially left Earth two centuries ago.'
  - 'ANTHWARA: His grandson does too. But there are also times when a people have
    sacrificed too much... when they must hold on to what they have... even if it
    means standing up against overwhelming opposition.'
  - 'ANTHWARA: What do you know about your family, Captain?'
  - 'PICARD: My family. Well... our roots in Western Europe go back to the time of
    Charlemagne.'
  - 'LAKANTA: I have been waiting for you. I have known you would come to us for the
    past two years.'
  - 'LAKANTA: There''re many things you don''t understand yet... but you will.'
