    description_of_involvement: Starfleet is represented in this event through the
      modernized design of the *Enterprise*, the presence of the Klingon woman in
      a Starfleet uniform, and the institutional protocols that Beverly and Riker
      operate within. The organization’s influence is subtle but pervasive, shaping
      the environment and the dynamics between the characters. Starfleet’s role here
      is to underscore the changes that have occurred over the sixteen years Riker
      has lost, particularly the integration of Klingons into its ranks and the broader
      evolution of the crew. The organization’s presence is felt in the calm professionalism
      of Beverly and the symbolic role of the Klingon woman, both of whom embody Starfleet’s
      adaptability and continuity.
    active_representation: Via institutional protocols (Beverly’s professional demeanor)
      and symbolic imagery (the Klingon woman in a Starfleet uniform).
    power_dynamics: Exercising authority over the crew’s roles and the ship’s operations,
      while also being challenged by the external threat of the 'virus' and the internal
      disorientation of its officers like Riker.
    organizational_goals:
