      deviation from protocol.
    - Maintain the illusion of absolute control over the prisoner, reinforcing the
      Romulan Star Empire’s dominance.
    what_happened: 'The Romulan guard moves with mechanical precision, deactivating
      the force field at Tomalak’s unspoken command. His actions are devoid of hesitation
      or moral conflict—this is routine for him, a task performed without question.
      The guard’s compliance is not born of loyalty to Tomalak but of adherence to
      Romulan military discipline. He stands as a silent enforcer, his presence a
      reminder of the institutional power that backs Tomalak’s authority. His role
      in this moment is functional, not personal, but his participation is critical:
      without his action, Tomalak’s entry would not be possible.'
