  object_involvements:
  - object_uuid: ger_object_80b03c1a1b7d
    description_of_involvement: The holding cell, cut into the living rock of the
      Romulan tunnel complex, is a stark and unyielding space designed to isolate
      and disorient prisoners. Its rough, natural walls amplify the sense of confinement,
      while the deactivated force field at its entrance marks the transition from
      the tunnel to captivity. The cell’s oppressive atmosphere is heightened by its
      connection to the tunnel, which serves as a corridor of mounting dread, leading
      inexorably to Riker’s imprisonment. The cell’s unyielding rock and the force
      field’s glow create a visual and symbolic barrier to Riker’s freedom.
    status_before_event: Empty and secure, with the force field active, ready to receive
      a prisoner.
    status_after_event: Occupied by Riker, with the force field reactivated to ensure
      his confinement.
    global_id: ger_object_80b03c1a1b7d
  - object_uuid: ger_object_f7c46004e9ba
    description_of_involvement: The Romulan holding cell force field is a shimmering
      energy barrier that seals the entrance to the cell, symbolizing the irreversible
      shift from Riker’s status as a diplomatic guest to that of a prisoner. One of
      the Romulan guards deactivates it with a precise gesture, admitting Tomalak
      and Riker before reactivating it to lock Riker inside. Its humming presence
      underscores the finality of his confinement, serving as both a physical and
      psychological barrier to his freedom. The force field’s deactivation at this
      moment is a deliberate act, reinforcing Tomalak’s control over Riker’s fate.
    status_before_event: Active and humming, blocking the entrance to the holding
