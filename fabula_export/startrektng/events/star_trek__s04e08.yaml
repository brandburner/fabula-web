- fabula_uuid: act_2ab9e9bbe207de96
  number: 3
  summary: 'Act Three opens with Riker''s panicked arrival in Sickbay, where Jean-Luc
    is being treated for a broken wrist sustained during a game of Parrises Squares.
    Riker''s initial overreaction as a new father is tempered by Beverly, who gently
    reminds him of Jean-Luc''s profound losses—his mother and now, effectively, his
    father. This conversation prompts Riker to acknowledge his own past fears about
    fatherhood and commit to building new memories with Jean-Luc, leading to a tender
    moment of connection and a plan for a Holodeck fishing trip. Back in his quarters,
    Riker''s attempt to find visual records of his ''wife,'' Min, on the computer
    initially fails due to the recurring system lag. When Jean-Luc provides a specific
    Stardate, the computer instantly displays home videos of Minuet, a Holodeck character
    Riker once created, confirming his deepest suspicions: his entire ''future'' is
    a fabrication. Armed with this knowledge, Riker returns to the Bridge and systematically
    dismantles the illusion. He confronts Geordi about the prolonged diagnostic, Worf
    about his vague battle scar, and Data about an uncharacteristic linguistic contraction
    (''I can''t''). His direct challenges expose the cracks in the simulated reality.
    When Picard and Troi attempt to intervene, Riker silences them, declaring an end
    to the ''charade.'' The simulated Bridge, crew, Picard, and Troi shimmer away,
    revealing a Romulan Holodeck. Tomalak steps forward, confirming Riker''s deductions
    and the end of the deception, leaving Riker alone in the stark reality of his
    capture. This act serves as the climax of Riker''s internal struggle with his
    new reality, culminating in his decisive unraveling of the deception.'
