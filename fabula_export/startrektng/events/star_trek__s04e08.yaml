  title: Riker uncovers Ethan’s Holodeck deception
  description: In a hidden Romulan storeroom, Ethan reveals a hand-drawn map of the
    base’s tunnels, including the shuttle bay and communications hub. When Riker suggests
    using the transmitter to contact the *Enterprise*, Ethan panics, revealing the
    device is voice-activated and only accepts Ambassador Tomalak’s authorization—a
    detail Riker recognizes as originating from the Holodeck illusion. His stunned
    reaction forces Ethan to admit he learned it from Riker himself, exposing the
    boy’s knowledge of the fabricated reality. As Romulans close in, Riker refuses
    to flee, declaring the game over. The illusion collapses, revealing the cavern
    setting, and Riker confronts Ethan, realizing the boy orchestrated the deception.
    The moment shatters Riker’s remaining trust and confirms the entire mission was
    a construct of his own mind, engineered by Barash’s isolation-driven fantasy.
