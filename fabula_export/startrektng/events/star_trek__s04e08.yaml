  title: Riker Bonds with Ethan in Captivity
  description: 'After Tomalak cruelly introduces a terrified boy as Riker’s son—only
    to reveal it’s a fabricated illusion—Riker is left alone with the child, Ethan,
    in a holding cell. The boy, traumatized and distrustful, initially recoils from
    Riker’s attempts to connect, but Riker’s persistent gentleness gradually coaxes
    him into revealing fragments of his past: his capture at the classified Miridian
    Six research station, the disappearance of his parents, and a failed escape attempt.
    Riker, exploiting his own vulnerability (memory loss, isolation) to build rapport,
    promises to help Ethan escape, deepening his emotional investment in the boy’s
    fate. The exchange underscores Riker’s protective instincts while hinting at the
    Romulans’ manipulation of his fractured reality, as Ethan’s story contradicts
    official records and raises questions about the station’s existence. The scene’s
    tension stems from Ethan’s fear and Riker’s desperate need for connection, both
    of which serve the larger narrative of deception and psychological torment orchestrated
    by Tomalak.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e08
  scene_sequence: 27
