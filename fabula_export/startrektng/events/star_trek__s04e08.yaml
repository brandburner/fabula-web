  description: "\n  The away team—Riker, Geordi, and Worf—materializes in a hazardous\
    \ cavern on Onias Three, where toxic volcanic gases and magnetic interference\
    \ immediately jeopardize their mission. Geordi’s tricorder confirms the environment’s\
    \ lethality, while Worf’s disrupted sensors heighten the urgency. The team’s inability\
    \ to obtain accurate readings underscores the escalating danger, forcing them\
    \ to reassess their safety and next steps in a setting that may already be compromising\
    \ their survival. Picard’s fractured comms attempt from the *Enterprise* bridge\
    \ further signals the mission’s instability, setting up the team’s isolation and\
    \ the potential for further complications. The scene establishes the cavern as\
    \ a hostile, unpredictable environment that could derail the mission before it\
    \ even begins.\n  "
