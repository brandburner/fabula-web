- fabula_uuid: act_fbb6e5fc98ed723f
  number: 2
  summary: 'Act Two immediately plunges Riker into the emotional aftermath of meeting
    his son, Jean-Luc, who quickly discerns his father''s memory loss. Counselor Troi
    reveals that Beverly hoped this encounter might trigger Riker''s memories and
    informs him of his wife Min''s death two years prior, a loss Riker cannot grieve
    due to his amnesia. Troi encourages Riker to connect with Jean-Luc, emphasizing
    the boy''s current need for his father. Riker attempts to bond by teaching Jean-Luc
    trombone, a moment that subtly raises his suspicions when Jean-Luc casually mentions
    Riker ''always'' making the same mistake, hinting at a pre-programmed familiarity.
    Riker''s growing unease intensifies when the Enterprise computer exhibits unusual
    delays and glitches while he tries to access his service record. The arrival of
    Romulan Ambassador Tomalak, a notorious former adversary, further fuels Riker''s
    distrust. Despite Picard and Troi''s assurances that Tomalak has changed and the
    alliance is genuine, Riker remains wary, particularly regarding the proposed revelation
    of Outpost Twenty-Three''s location, a key Federation defense. His concerns are
    dismissed as outdated, but his instincts persist. The act concludes with a sudden
    call from Beverly: Jean-Luc has been injured and taken to Sickbay, pulling Riker
    away from his professional doubts into immediate paternal concern. This act steadily
    builds Riker''s internal and external conflicts, highlighting the inconsistencies
    in his new reality and the emotional stakes involved.'
