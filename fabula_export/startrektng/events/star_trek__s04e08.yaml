- fabula_uuid: act_64be8ee9675da524
  number: 5
  summary: 'Act Five opens with Riker and Ethan concealed in the dark crawlspace,
    as Romulan guards search nearby, their sensors inexplicably failing to detect
    them due to ''heavy metals'' in the rock. Ethan leads Riker through the hidden
    passages to a secret storeroom, revealing a detailed map of the Romulan base he
    created during a previous escape. Riker, formulating a plan, suggests breaking
    into communications to contact the Enterprise. Ethan, however, reveals the transmitter
    is voice-activated, accepting only Tomalak''s voice. This detail immediately triggers
    Riker''s realization: Ethan''s knowledge of ''Ambassador Tomalak'' comes from
    the Holodeck fantasy, not reality. Riker confronts Ethan, demanding his true identity
    and role in the deception. Before Ethan can fully explain, Romulan guards, led
    by Tomalak, burst into the room. Riker, having seen through all the illusions,
    calmly drops his phaser, refusing to play any more ''games.'' In this moment of
    surrender, the Romulans and the storeroom shimmer and vanish, revealing the immense,
    natural cavern where Riker was originally captured. Riker confronts Ethan, who
    is now revealed as the true architect of the illusion. Simultaneously, on the
    real Enterprise, Picard, Data, Troi, Worf, and Geordi detect Riker''s signal,
    confirming his survival and location. Picard makes contact, and Riker, with Ethan,
    begins to understand the full truth. Ethan, whose real name is Barash, explains
    that his world was invaded, his people killed, and his mother left him the neural
    scanners for protection and to create a world where he could have anything he
    wanted, including companionship. He confesses to luring Riker and creating the
    elaborate fantasy because he was lonely and wanted ''somebody... real.'' Riker,
    moved by Barash''s profound isolation, extends an offer of friendship and invites
    him to leave the cavern and explore real life. Barash, transforming into his true
    alien form, accepts Riker''s hand, who affectionately calls him ''Jean-Luc.''
    They dematerialize, and the Enterprise warps away, concluding the episode with
    a poignant resolution of compassion and new beginnings.'
