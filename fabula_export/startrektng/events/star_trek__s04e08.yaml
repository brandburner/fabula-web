  title: Data distracts Tomalak while Riker retreats
  description: "\n  After Tomalak’s overtly intrusive inspection of the *Enterprise*’s\
    \ tactical station—an act of calculated provocation designed to test Federation\
    \ defenses—Riker, sensing the escalating tension, abruptly withdraws with Picard\
    \ and Troi to the Ready Room. Before leaving, Riker delegates Data to engage Tomalak\
    \ in a controlled distraction, leveraging Data’s analytical precision to subtly\
    \ interrogate the Romulan while maintaining plausible deniability. The exchange\
    \ begins with Tomalak’s feigned admiration for the *Enterprise*’s bridge, but\
    \ his lingering focus on tactical systems reveals his true intent: espionage.\
    \ Riker’s decision to retreat underscores his strategic awareness of Romulan deception,\
    \ while Data’s intervention serves as a tactical maneuver to extract intelligence\
    \ without direct confrontation. The scene establishes the precarious balance of\
    \ trust in the Neutral Zone, where every interaction is a potential trap, and\
    \ where even polite conversation carries the weight of hidden agendas.\n  "
