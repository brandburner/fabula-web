  title: Ethan admits crafting the illusion
  description: 'In the hidden chamber, Riker—still disoriented by memory loss and
    the collapsing Romulan illusion—confronts Ethan after the boy reveals knowledge
    of Tomalak’s false title. Riker’s realization that Ethan knows details from the
    fabricated reality triggers a brutal confrontation: he demands the truth about
    the boy’s role. As Romulan guards close in, Ethan’s evasive responses and the
    sudden disappearance of the illusion force Riker to piece together the deception.
    The moment shatters their fragile trust, exposing Ethan as the architect of the
    fantasy. Riker’s calm surrender to the Romulans—followed by the illusion’s collapse—reveals
    the cavern’s true setting, leaving Riker stunned and Ethan guilt-ridden. This
    confrontation marks the turning point where Riker’s fractured perception of reality
    is violently exposed, and Ethan’s isolation becomes the tragic core of the deception.'
