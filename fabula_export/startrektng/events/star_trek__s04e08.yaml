- fabula_uuid: cand_evt_scene_c2a62b4a13b79a26_01
  global_id: null
  title: Picard interrupts Riker’s birthday for urgent mission
  description: "\n  During Commander Riker’s birthday celebration in *Ten Forward*,\
    \ the festive atmosphere—marked by music, laughter, and camaraderie—is abruptly\
    \ shattered when Captain Picard’s comm request interrupts the revelry. The interruption\
    \ is framed as a routine security survey near the Neutral Zone, but the urgency\
