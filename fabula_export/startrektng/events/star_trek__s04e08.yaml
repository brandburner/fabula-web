- fabula_uuid: act_7d7d21136c25ded2
  number: 4
  summary: Act Four begins with Riker in an anteroom, as a Romulan technician removes
    the artificial gray from his hair and beard, signifying his return to his true
    self. Tomalak, now revealed as Riker's captor, explains the use of neural scanners
    and a Holodeck to create the elaborate illusion. Riker details how he uncovered
    the deception, citing the computer's inconsistent time lags and, crucially, the
    appearance of Minuet—a past Holodeck fantasy—as his 'wife.' Tomalak expresses
    surprise, having believed Minuet was a real person from Riker's memories, underscoring
    the limitations of their human brain-pattern scanners and the 'gaps' in the information
    they extracted. Riker remains skeptical of these claimed limitations, given the
    intricate detail of the illusion. Tomalak, growing impatient, orders Riker imprisoned.
    In a tunnel, Tomalak reveals that Riker's away team colleagues, Worf and Geordi,
    were safely beamed back to the Enterprise, but Riker's signal was diverted, leading
    to his capture. Riker is then placed in a holding cell with a frightened, ragged
    boy, whom Tomalak mockingly identifies as 'Jean-Luc,' confirming the boy was merely
    an image used to augment the program. Riker, however, learns the boy's real name
    is Ethan, a captive from Miridian Six whose parents were taken by the Romulans.
    Ethan reveals he previously escaped but was recaptured. When Tomalak returns,
    demanding information about Outpost Twenty-Three, Ethan makes a desperate dash
    for freedom. Riker seizes the opportunity, punching Tomalak and then the guard,
    grabbing the guard's phaser. He and Ethan escape into the tunnels, using Riker's
    phaser to neutralize pursuing Romulan guards. They eventually hide in an air conditioning
    grate, securing it just as Romulan footsteps approach, ending the act with them
    trapped but temporarily safe.
