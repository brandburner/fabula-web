  title: Riker exposes Romulan deception flaws
  description: 'In a tense confrontation with Tomalak, Riker systematically dismantles
    the Romulans'' fabricated reality by exposing two critical vulnerabilities: the
    technical limitations of their neural scanners (which failed to fully extract
    his memories of Outpost Twenty-Three) and the psychological miscalculation of
    using Minuet—a holodeck program he once created—as his "wife." Tomalak''s initial
    disbelief turns to frustration as Riker reveals his discovery of the illusion''s
    inconsistencies, forcing the Romulan to abandon diplomatic pretense and resort
    to physical coercion. The exchange underscores Riker''s cognitive resilience despite
    his memory loss, while revealing the Romulans'' strategic overreach in their attempt
    to manipulate him. The moment marks a turning point where Riker''s skepticism
    becomes a weapon, shifting the power dynamic from deception to direct confrontation.'
