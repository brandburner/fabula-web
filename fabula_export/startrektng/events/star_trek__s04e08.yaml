      shared history, not a test of his current state.
    what_happened: Picard dominates the event with a *calculated* blend of authority
      and empathy, moving from shock ('To lose sixteen years...') to a methodical
      deconstruction of Riker’s erased legacy. He begins by standing at the window—symbolically
      distanced from Riker—before sitting at the table, a power move that frames the
      conversation as a *briefing* rather than a personal crisis. His dialogue is
      precise, almost clinical, as he outlines the Romulan rescue, the negotiations,
      and Riker’s pivotal role. However, his emotional range emerges in his insistence
      ('we do need you') and his reassurance ('We will get through this'), revealing
      a man who sees Riker not just as an officer, but as a *partner* in a shared
      mission. His exit is abrupt but purposeful, signaling his trust in Riker’s eventual
      compliance.
