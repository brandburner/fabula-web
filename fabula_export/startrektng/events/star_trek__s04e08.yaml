- fabula_uuid: cand_evt_scene_ffdd060d27b6c7ad_02
  global_id: null
  title: Riker discovers Minuet in the illusion
  description: 'In his quarters, Riker’s fragile acceptance of his fabricated reality
    shatters when he attempts to access visual records of his wife—only to find the
    computer resisting his commands. His son Jean-Luc, unaware of the deception, helps
    retrieve a home video featuring Minuet, a holographic figure from Riker’s past
    who now appears as his wife in this illusion. The sight of her triggers a visceral
    reaction: Riker’s whispered recognition of her name ("Min... Minuet?") reveals
    his dawning horror that this entire world is a constructed lie. The moment is
    punctuated by Geordi’s summons to the bridge, which Riker answers with grim determination,
    signaling his shift from passive confusion to active resistance against the illusion.
    The event serves as the emotional and narrative tipping point where Riker’s subconscious
    suspicions crystallize into certainty, propelling him toward the bridge to confront
    the truth—whether the crew’s complicity or the virus’s deeper manipulation.'
