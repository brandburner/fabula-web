      Worf, and Riker before the transporter can beam them up. The gas scrambles the
      transporter signals, preventing their extraction and directly leading to Riker’s
      collapse and infection with Altarian encephalitis. Its presence is a silent
      but deadly force, underscoring the away team’s vulnerability and the mission’s
      sudden turn from routine to life-threatening. The gas’s role in the event is
      later referenced by Beverly Crusher, who confirms that it was the cause of the
      team’s incapacitation and Riker’s subsequent memory loss.
