- fabula_uuid: cand_evt_scene_914f92ed942e0f47_03
  global_id: null
  title: Riker Offers Barash a New Life
  description: 'In the alien chamber, Riker—still disoriented but regaining clarity—confronts
    Ethan (later revealed as Barash) about the fabricated illusion that trapped him.
    The boy, wracked by loneliness and grief over his mother’s sacrifice, confesses
    to creating the fantasy to keep Riker as a companion. Riker, empathizing with
    Barash’s isolation (mirroring his own childhood abandonment), extends a lifeline:
    an invitation to join the *Enterprise*. Barash hesitates, then reveals his true
    alien form, accepting Riker’s hand as they prepare to transport. The moment symbolizes
    Riker’s triumph over the illusion and his capacity for compassion, while Barash’s
    transformation marks his first step toward redemption. The scene resolves Riker’s
    internal struggle and sets up the mission’s diplomatic stakes, as the *Enterprise*
    warps away with both characters aboard.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e08
  scene_sequence: 33
  sequence_in_scene: 60
  key_dialogue: &id033
  - 'RIKER: What should I call you? Ethan... Jean-Luc?'
  - 'ETHAN: ((sad)) It doesn''t matter.'
  - 'RIKER: This room... it''s more than just a Holodeck, isn''t it?'
  - 'ETHAN: ((almost proud)) Much more. The neural scanners read my mind... give me
    anything I want. Just like they tried to give you everything you wanted.'
  - 'RIKER: What I wanted? You probed the *Enterprise*... lured us here... so you
    could play games with me. I didn''t want any of that... you did. Why?'
  - 'ETHAN: My world was invaded... my people... killed. My mother brought me here...
    so our enemies would never find me.'
  - 'RIKER: But they found her, didn''t they?'
  - 'ETHAN: She knew they would never stop looking for her... So she made sure I would
    be safe... She left the scanners to protect me... and to give me everything I
    wanted.'
  - 'RIKER: Everything... then why kidnap me?'
  - 'ETHAN: ((after a pause)) I wanted you to stay. It''s been so long... I just wanted
    somebody... real. I... thought you would be happy... I''m sorry...'
  - 'RIKER: I have to return to my ship. Come with me. You don''t have to stay here
    anymore... you don''t have to be alone anymore...'
  - 'RIKER: To me, you''ll always be Jean-Luc.'
