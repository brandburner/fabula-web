      exposure as the illusion dissolves.
    functional_role: Confrontation site where the illusion is exposed and dismantled,
      forcing Riker to confront the truth.
    symbolic_significance: Represents the psychological manipulation Riker is subjected
      to, as well as the fragility of the fabricated reality.
    access_restrictions: Hidden and forgotten by the Romulans, accessible only to
      those aware of its existence (e.g., Ethan).
    key_environmental_details:
