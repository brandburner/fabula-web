  title: Riker’s Unease Before Tomalak’s Arrival
  description: In Riker’s quarters, the scene opens with him attempting to access
    his service record—specifically the Fornax Disaster—only to encounter a suspicious
    computer lag. His frustration is interrupted by the unexpected appearance of Jean-Luc,
    a ten-year-old boy who calls him 'Dad,' a detail that immediately unsettles Riker.
    The boy’s presence, combined with the computer’s erratic behavior, triggers Riker’s
    instincts that something is fundamentally wrong. Before he can process this, Picard’s
    com signal interrupts, announcing Ambassador Tomalak’s imminent arrival. Riker’s
    forced smile as he departs with Jean-Luc’s reassurance—'Everything’s going to
    be fine'—underscores his lingering unease, setting up the tension between his
    personal disorientation and the impending diplomatic crisis. The moment serves
    as a microcosm of the illusion’s instability, where even routine interactions
    feel manufactured and ominous.
