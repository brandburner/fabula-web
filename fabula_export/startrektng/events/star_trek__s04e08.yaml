      *some* memory, but her measured cadence ('the damage is permanent') reveals
      the weight of her role as the bearer of devastating news. She is the emotional
      anchor in the scene, counterbalancing Riker’s turmoil.
    goals:
    - To ensure Riker accepts the reality of his memory loss without catastrophic
      emotional breakdown, using gradual revelation and sensory grounding.
    - To prepare Riker for the possibility of permanent damage, while leaving a slender
      thread of hope (associational therapy) to mitigate his despair.
    what_happened: Beverly Crusher enters Riker’s Sickbay room with a composed but
      weary demeanor, her aged appearance (gray-streaked hair, subtle stylistic changes)
      signaling the passage of time. She delivers the diagnosis with measured compassion,
      using tactile reassurance (taking Riker’s hand) to ground him in reality. Her
      calm persistence—'Feel my hand... flesh and bone'—contrasts with Riker’s escalating
      desperation, as she carefully balances hope ('your memory *could* return') with
      brutal honesty ('the damage is permanent'). Her activation of the wall monitor
