      \ acceptance of the fabricated reality. Initially, Riker attempts to access\
      \ visual records of his 'wife,' but the computer resists, returning a blank\
      \ screen. Jean-Luc intervenes, specifying a Stardate that unlocks the video:\
      \ a recording of Riker, Jean-Luc, and Minuet celebrating a birthday. The sight\
      \ of Minuet—his holographic companion from the past—as his 'wife' in this constructed\
      \ narrative triggers Riker’s horrified recognition. The video’s unsteady, home-style\
      \ cinematography and the intimate domestic scene it captures make the illusion\
      \ feel painfully real, which is why its exposure is so devastating. The video\
      \ is not just a record; it is the smoking gun that proves the world around Riker\
      \ is a lie.\n      "
    status_before_event: "\n        Stored in the *Enterprise*’s computer systems\
