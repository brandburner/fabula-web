  key_dialogue: &id011
  - |-
    RIKER: Geordi... your eyes... what happened to your VISOR... ?
    GEORDI: My VISOR? I... Sorry, sir. Doctor Crusher warned us... you might not remember. I don't need my VISOR, Captain... not since I got these cloned implants...
  - |-
    RIKER: Commander Data... You are my First Officer?
    DATA: You remember, sir?
    RIKER: No, Data. Not a single day of the last sixteen years.
  - |-
    RIKER: Shields up. Go to Red Alert.
    DATA: Captain... we have been expecting the Decius. There is no need for alarm.
    RIKER: Cancel Red Alert. Clearly, I need to be... briefed.
