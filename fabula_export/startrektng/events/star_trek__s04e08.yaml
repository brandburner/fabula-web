  title: Tomalak probes Riker’s instability
  description: "\n  In the confined space of a turbolift, Tomalak exploits Riker’s\
    \ lingering vulnerability from the virus-induced memory loss, testing his readiness\
    \ for the Romulan treaty negotiations. His pointed question—*‘The virus you contracted,\
    \ Captain. You have fully recovered?’*—is a calculated probe, designed to unsettle\
    \ Riker and expose any lingering psychological weakness. Picard intervenes with\
    \ diplomatic precision, deflecting the inquiry and reaffirming Riker’s fitness,\
    \ but the exchange underscores the fragility of Riker’s mental state. Tomalak’s\
    \ subsequent praise—*‘You, of all people, deserve to be there’*—feels hollow,\
    \ a performative gesture masking his skepticism. Riker’s measured but guarded\
    \ response (*‘Thank you... Ambassador’*) reveals his unease, signaling that his\
    \ confidence remains shaken. The scene functions as a pressure test: Tomalak’s\
    \ challenge forces Riker to confront his own doubts, while Picard’s intervention\
    \ highlights the high stakes of the negotiations and the crew’s reliance on Riker’s\
    \ stability. The unresolved tension leaves Riker’s competence—and the treaty’s\
    \ success—hanging in the balance.\n  "
