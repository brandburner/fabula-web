- fabula_uuid: cand_evt_scene_cf545e67062a99a7_01
  global_id: null
  title: Tomalak reveals Riker’s deliberate capture
  description: "\n  Tomalak and his Romulan guards escort Riker through a tunnel toward\
    \ a holding cell, casually revealing that his capture was premeditated. While\
    \ Riker’s away team was allowed to return to the *Enterprise*, his transport signal\
    \ was deliberately diverted—a fact Tomalak delivers with cold precision. Riker’s\
    \ defiant response ('My people won’t stop looking for me') is met with Tomalak’s\
    \ chilling counter ('They already have'), underscoring the Romulans’ control over\
    \ the situation. The force field deactivating at the holding cell visually reinforces\
    \ Riker’s vulnerability, marking a shift from diplomatic tension to outright captivity.\
    \ This moment solidifies Tomalak as the orchestrator of Riker’s disorientation\
    \ and sets up the psychological torment to come, as Riker’s memory loss makes\
    \ him an easy target for manipulation.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e08
  scene_sequence: 26
  sequence_in_scene: 47
  key_dialogue: &id015
  - 'TOMALAK: When you and your colleagues transported to this planet, you were less
    than a kilometer from this base. Your capture was a simple matter.'
  - 'RIKER: My colleagues... ?'
  - 'TOMALAK: We allowed them to transport safely back to the *Enterprise*. But your
    signal was... diverted.'
  - 'RIKER: My people won’t stop looking for me, Tomalak.'
  - 'TOMALAK: They already have.'
