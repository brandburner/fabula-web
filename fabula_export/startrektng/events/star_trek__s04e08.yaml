- fabula_uuid: cand_evt_scene_78b0b91ceb2ecb5e_01
  global_id: null
  title: Tomalak violates protocol to interrogate Riker
  description: "\n  Tomalak, a Romulan operative with a hidden agenda, deliberately\
    \ violates Starfleet protocol by gaining controlled access to Riker’s holding\
    \ cell. The guard’s compliance—whether through collusion or coercion—underscores\
    \ the precariousness of Riker’s situation and the fragility of his captivity.\
    \ This confrontation marks the first direct interaction between the two, where\
    \ power dynamics and psychological manipulation will dictate the terms of their\
    \ exchange. The violation of protocol signals Tomalak’s confidence in his authority\
    \ and foreshadows the high-stakes interrogation to come, where Riker’s reality\
    \ and Tomalak’s true motives will be tested.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e08
