  title: Riker and Ethan evade capture through tunnels
  description: 'After escaping their Romulan holding cell, Riker and Ethan flee through
    a labyrinth of tunnels, using Ethan’s knowledge of the ventilation system to evade
    their pursuers. When Romulan guards nearly corner them, Riker disarms one with
    a stolen phaser, while Ethan secures their escape route by sealing an air conditioning
    grate behind them. The two take refuge in a narrow crawlspace, where Ethan reveals
    that the surrounding rock’s heavy metal content disrupts Romulan sensors—explaining
    why they haven’t been detected. Riker’s survival instincts and tactical precision
    are on full display, while Ethan’s familiarity with the tunnels hints at his prior
    escape attempts and deeper connection to this environment. The moment underscores
    their growing interdependence: Riker relies on Ethan’s local knowledge, while
    Ethan benefits from Riker’s combat skills. Their whispered exchange about Ethan’s
    earlier escape from the infirmary also foreshadows the boy’s resourcefulness and
    the isolation that drove him to flee, reinforcing the thematic tension between
    trust and survival in their alliance.'
