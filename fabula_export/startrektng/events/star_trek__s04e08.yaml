  key_dialogue:
  - |-
    RIKER: It wasn't. There was the computer time lag, for one thing.
    TOMALAK: Unavoidable. Our scanners have a limited response time. So whenever you strayed from our... expectations...
    RIKER: To smash your house of cards? No, it was the visual record of my 'wife,' Minuet. Bad move.
  - |-
    RIKER: If Outpost Twenty-three is what you're after... Why didn't you just use your neural scanners to probe my mind?
    TOMALAK: Our scanners are calibrated for Romulan brain patterns. When it comes to human brains, they are less efficient. There were gaps in the information we gathered from your memory.
    RIKER: Gaps? After what I've just seen, I find that hard to believe.
  - |-
    TOMALAK: We are wasting time.
    TOMALAK: Bring him.
