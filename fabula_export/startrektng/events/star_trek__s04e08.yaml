- fabula_uuid: cand_evt_scene_4678941267ff6be2_01
  global_id: null
  title: Riker defies therapy and triggers instability
  description: 'In the turbolift, Beverly Crusher urges Riker to begin associational
    therapy in his quarters, arguing that personal memories will be most effective
    for recovery. Riker, however, rejects the suggestion outright, insisting his identity
    is tied to the bridge and that returning there will trigger his memory. When he
    overrides Beverly’s command to go to Deck Eight and orders the turbolift to the
    bridge, the computer malfunctions—first failing to register the command and then
    lurching into motion. Beverly attributes the glitch to a processing accelerator
    failure, but the incident subtly foreshadows the deeper instability of the *Enterprise*’s
    systems (and Riker’s psyche) as the illusion begins to unravel. The turbolift’s
    erratic behavior mirrors Riker’s own resistance to healing, reinforcing the narrative’s
    central tension: his refusal to confront his fractured past is physically manifesting
    in the ship’s malfunctioning technology. The scene underscores the illusion’s
    fragility while highlighting Riker’s stubbornness as both a character flaw and
    a narrative driver.'
