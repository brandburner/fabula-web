acts:
- fabula_uuid: act_367436f2dbee6867
  number: 1
  summary: 'Act One establishes Commander Riker''s birthday celebration on the Enterprise,
    quickly interrupted by unusual subspace fluctuations near the Neutral Zone. A
    routine security survey on Alpha Onias Three turns perilous when Riker, Geordi,
    and Worf encounter toxic gases and a disrupted transport. Riker awakens in Sickbay,
    disoriented and visibly older, informed by Dr. Beverly Crusher that he has lost
    sixteen years of memory due to an Altarian encephalitis virus contracted during
    the away mission. He struggles to accept his new reality as Captain of the Enterprise,
    with Geordi having cloned eyes and Data as his First Officer. The sudden appearance
    of a Romulan Warbird, the Decius, further disorients him, especially when Admiral
    Picard and Counselor Troi emerge from it, revealing a fragile Federation-Romulan
    alliance on the brink of a treaty. Riker, despite his profound memory loss, learns
    he is a crucial figure in these negotiations. He expresses severe doubts about
    his fitness to command or negotiate, but Picard gently, yet firmly, persuades
    him of his irreplaceable role. The act culminates in Riker''s return to his quarters,
    where he is confronted with the most personal shock: meeting his ten-year-old
    son, Jean-Luc, a child he has no memory of fathering, playing the trombone. This
    personal revelation deepens Riker''s internal conflict, grounding the vast, impersonal
    changes of his ''future'' in a deeply emotional and immediate challenge. The act
    effectively sets up Riker''s central dilemma: navigating a life he cannot recall
    while fulfilling high-stakes responsibilities.'
