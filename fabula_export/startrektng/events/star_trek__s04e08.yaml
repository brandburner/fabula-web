- fabula_uuid: cand_evt_scene_948321e706245ba4_02
  global_id: null
  title: Subspace anomaly diverts Picard from Riker’s party
  description: On the *Enterprise* bridge, Picard prepares to leave for Riker’s birthday
    celebration when Data’s philosophical musing about human birthdays momentarily
    delays him. Before they can depart, a supernumerary officer detects unusual subspace
    fluctuations, prompting Picard and Data to investigate. Data’s analysis reveals
    the signals originate from Alpha Onias III—a planet officially listed as uninhabited—raising
    suspicions of a hidden Romulan base. The discovery forces Picard to prioritize
    the anomaly over Riker’s party, setting in motion the away mission that will lead
    to Riker’s memory loss. The scene underscores the tension between personal obligations
    and duty, while the subspace anomaly serves as the inciting incident for the Romulan
    conspiracy and Riker’s subsequent crisis. Picard’s abrupt shift from celebration
    to investigation foreshadows the mission’s high stakes and the disruption it will
    cause in Riker’s life.
