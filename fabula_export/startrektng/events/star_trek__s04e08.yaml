- fabula_uuid: cand_evt_scene_063fc955450c382a_02
  global_id: null
  title: Riker learns of permanent memory loss
  description: "\n  Beverly Crusher delivers the devastating news that Riker’s Altarian\
    \ encephalitis has caused permanent memory loss—erasing sixteen years of his life—while\
    \ he grapples with the implications for his identity and command. The scene opens\
    \ with Riker waking in a subtly modernized Sickbay, his own aged reflection in\
    \ a diagnostic device confirming the passage of time. Beverly’s measured but compassionate\
    \ delivery of the diagnosis—'the damage is permanent'—shatters Riker’s denial,\
    \ forcing him to confront a reality where his past, his relationships, and his\
    \ career as he knew them no longer exist. His immediate demand for associational\
    \ therapy reveals his desperation to reclaim his identity, underscoring the emotional\
    \ stakes as the Romulan crisis looms. The exchange is a turning point: Riker’s\
    \ refusal to accept the diagnosis sets up his future struggle to distinguish illusion\
    \ from reality, while Beverly’s warnings about the experimental nature of therapy\
    \ foreshadow the risks of his obsession with recovery.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e08
  scene_sequence: 6
  sequence_in_scene: 11
  key_dialogue:
  - 'BEVERLY: Will... this virus invariably destroys all memory back to the moment
    of the original infection. In your case, all the way back to Alpha Onias Three.'
  - 'RIKER: I can''t believe this... it''s a dream... or...'
  - 'BEVERLY: Feel my hand... flesh and bone. This is not a dream... and you are Captain
    William T. Riker... in command of the Enterprise.'
  - 'RIKER: If I''ve lost my memory... how do I find it again?'
  - 'BEVERLY: Memory is formed out of association. Smells, sounds, and images in the
    present could possibly trigger them.'
  - 'RIKER: Then let''s get started. There''s nothing more familiar to me than the
    Enterprise. If anything''s going to bring back...'
  - 'BEVERLY: Will... I said your memory *could* return. In many of these cases...
    the damage is permanent.'
