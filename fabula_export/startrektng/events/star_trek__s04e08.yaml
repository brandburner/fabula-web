- fabula_uuid: cand_evt_scene_914f92ed942e0f47_02
  global_id: null
  title: Riker breaks Barash’s isolation with empathy
  description: 'In the alien chamber, Riker—still disoriented but determined—presses
    Ethan (Barash) about the fabricated reality surrounding him. Ethan reveals his
    tragic past: his world’s destruction, his mother’s sacrifice to hide him, and
    his loneliness driving him to create illusions, including Riker’s fabricated family.
    Moved by Ethan’s vulnerability and recognizing his own childhood abandonment,
    Riker extends a compassionate invitation to join the *Enterprise*, offering escape
    from isolation. Ethan hesitates, then transforms into his true alien form (Barash),
    accepting Riker’s hand as they prepare to transport. The moment bridges Riker’s
    illusion-shattered clarity with Barash’s redemption, marking a turning point in
    both their arcs—Riker reclaiming agency over his reality, Barash finding connection
    after decades of solitude. The scene’s emotional core lies in Riker’s leadership
    through empathy, not force, and Barash’s fragile trust in a human who sees beyond
    his illusions.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e08
  scene_sequence: 33
  sequence_in_scene: 59
  key_dialogue: &id031
  - 'RIKER: What should I call you? Ethan... Jean-Luc?'
  - 'ETHAN: ((sad)) It doesn’t matter.'
  - 'RIKER: This room... it’s more than just a Holodeck, isn’t it?'
  - 'ETHAN: ((almost proud)) Much more. The neural scanners read my mind... give me
    anything I want. Just like they tried to give you everything you wanted.'
  - 'RIKER: What I wanted? You probed the *Enterprise*... lured us here... so you
    could play games with me. I didn’t want any of that... you did. Why?'
  - 'ETHAN: My world was invaded... my people... killed. My mother brought me here...
    so our enemies would never find me. She knew they would never stop looking for
    her... So she made sure I would be safe...'
  - 'RIKER: But they found her, didn’t they?'
  - 'ETHAN: ((after a pause)) I wanted you to stay. It’s been so long... I just wanted
    somebody... real. I... thought you would be happy... I’m sorry...'
  - 'RIKER: Come with me. You don’t have to stay here anymore... you don’t have to
    be alone anymore...'
  - 'THE ALIEN: My real name is Barash.'
  - 'RIKER: To me, you’ll always be Jean-Luc.'
