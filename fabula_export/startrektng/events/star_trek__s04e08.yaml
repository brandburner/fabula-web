  title: Riker confronts his fabricated son
  description: In Riker’s quarters, Troi guides him through a room filled with mementos
    from the sixteen years he can’t remember—decorations, alien art, unfamiliar furniture—before
    the sound of a trombone playing off-key draws him into Jean-Luc’s room. There,
    he meets a ten-year-old boy who calls him 'Dad,' triggering a moment of stunned
    recognition. The boy, mid-story about a school assignment, suddenly realizes Riker
    doesn’t remember him, his excitement collapsing into quiet grief. Troi intervenes,
    revealing Beverly’s hope that meeting Jean-Luc might jog Riker’s memory, but the
    encounter only deepens his disorientation. When Riker asks about Jean-Luc’s mother,
    Troi delivers the devastating news of Min’s death in a shuttle accident, forcing
    Riker to grapple with the loss of a wife he can’t even recall. The scene underscores
    the emotional toll of his fractured memories, framing his desperate need for clarity
    against the fragility of the illusion he’s trapped in. The trombone’s discordant
    scales, echoing from Jean-Luc’s room, serve as a haunting reminder of the instability
    beneath the fabricated reality.
