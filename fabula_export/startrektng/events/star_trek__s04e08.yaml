  - 'RIKER: Are you sure? You yourself have said it''s always like a chess game with
    the Romulans. Move and counter-move, guile and deceit.'
  - 'TROI: I sense no such dishonesty in Tomalak. He is sincere in his desire for
    peace. He wants this alliance. There is no cause for concern.'
  - 'RIKER: No cause for concern? We''re talking about revealing the location of Outpost
    Twenty-Three, the key to all our Neutral Zone defenses.'
  - 'PICARD: Pardon my bluntness, Captain, but your information is out of date. The
    strategic importance of Outpost Twenty-Three is minimal. And has been for years.'
