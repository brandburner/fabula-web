      the Romulan crisis requiring Riker’s eventual return to duty). The *Enterprise*
      is not just a setting but an *active participant* in Riker’s struggle: its crew
      (Beverly, the N.D. Nurse) and infrastructure (Sickbay, replicators) are extensions
      of its role as a home and workplace for its officers. The ship’s subtle modernization—reflected
      in Beverly’s aged appearance and the updated equipment—symbolizes the time Riker
      has lost, while its continued operation underscores the *inescapable demands
      of duty* that will soon pull him back into service.'
