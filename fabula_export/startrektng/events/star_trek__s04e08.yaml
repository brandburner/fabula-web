  key_dialogue:
  - |-
    RIKER: ((sarcastic)) As fast as you tracked down that faulty processing accelerator?
    GEORDI: ((defensive)) I'm running a Level One diagnostic...
    RIKER: ...for thirty hours...? It's never taken you more than four. You're not capable of that kind of incompetence, La Forge.
  - |-
    RIKER: Where did you get that scar?
    WORF: ((proudly)) In combat, sir.
    RIKER: What battle? When? Which unit, which sector?
  - |-
    RIKER: ((hammering)) Shut up, as in close your mouth, and stop talking.
    PICARD: What did you say?
    RIKER: ((hammering)) Shut up, as in close your mouth, and stop talking.
  - 'TOMALAK: As you wish, Commander Riker. The charade is over.'
