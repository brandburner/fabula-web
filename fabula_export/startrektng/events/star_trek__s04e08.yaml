  title: Riker questions Troi about Tomalak’s transformation
  description: "\n  In the transporter room, Riker watches as Tomalak—once a hostile\
    \ Romulan commander—materializes aboard the *Enterprise* under diplomatic immunity.\
    \ The moment is charged with historical tension, as Riker recalls Tomalak’s past\
    \ threats (e.g., at Nelvana Three) and his visceral distrust of Romulan motives.\
    \ After Picard escorts Tomalak out, Riker lingers with Troi, voicing his skepticism:\
    \ *‘Ambassador... Tomalak? At Nelvana Three, he threatened to take the hull of\
    \ the Enterprise home as a war trophy!’* Troi counters that time has changed Tomalak,\
    \ planting seeds of doubt about Riker’s own judgment. This exchange underscores\
    \ Riker’s vulnerability—his instincts clash with the mission’s fragile diplomacy,\
    \ foreshadowing his later disorientation in the illusion. The scene also highlights\
    \ Troi’s role as a mediator, subtly challenging Riker’s rigid worldview while\
    \ hinting at the Romulans’ potential for evolution (or deception). The tension\
    \ between Riker’s memory of past conflicts and Troi’s suggestion of change mirrors\
    \ the broader narrative’s theme of perception vs. reality, a conflict that will\
    \ later define his struggle in the illusion.\n  "
