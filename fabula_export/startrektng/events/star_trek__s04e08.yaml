  title: Tomalak’s calculated flattery undermines Riker
  description: 'In a tense corridor exchange, Tomalak publicly praises Riker’s negotiation
    skills—ostensibly to reassure Picard of the alliance’s stability—while his condescending
    tone and dismissive body language reveal his true intent: to manipulate Riker’s
    professional pride. Riker’s guarded responses and sideways glances at Picard and
    Troi signal his skepticism, but their obliviousness to his unease isolates him
    further. The moment hinges on Tomalak’s performative charm masking his contempt,
    deepening Riker’s distrust of the Romulans and foreshadowing the psychological
    toll of the virus. The Turbolift ride underscores Riker’s vulnerability: his instincts
    clash with the alliance’s fragile optimism, setting up his later disorientation
    when reality fractures entirely.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e08
  scene_sequence: 17
  sequence_in_scene: 31
  key_dialogue:
  - 'TOMALAK: As soon as we arrive at your Outpost Twenty-Three, the final negotiations
    should go quickly.'
  - 'TOMALAK: Your Captain Riker is the kind of negotiator even the Ferengi should
    avoid.'
  - 'PICARD: But we have come to an agreement both sides can live with. Thanks largely
    to Captain Riker.'
  - 'TOMALAK: And we are grateful, Captain. The new alliance will greatly benefit
    my people.'
  - 'RIKER: As I hope it will benefit mine.'
  - 'TOMALAK: It will, Captain. It will.'
