- fabula_uuid: cand_evt_scene_e947d91e28468193_01
  global_id: null
  title: Wesley and Robin’s Farewell Gift
  description: "\n  In the quiet intimacy of the guest quarters, Wesley Crusher and\
    \ Robin Lefler share a poignant farewell as he prepares to leave the *Enterprise*.\
    \ Their exchange blends playful banter—like Robin teasing him about a birthmark\
    \ rumor—with tender moments, including a kiss that underscores the depth of their\
    \ bond. As Wesley packs his travel bag, Robin hands him a small red book titled\
    \ *Robin’s Laws*, a sentimental compilation of their inside jokes and shared history.\
    \ Wesley reciprocates by adding his own law—‘A couple of light years can’t keep\
    \ good friends apart’—solidifying their connection even as the ship’s crisis looms\
    \ beyond their door. The moment is bittersweet, marked by lingering affection\
    \ and the unspoken weight of separation, while Riker’s com voice interrupts to\
    \ remind Wesley of his impending departure. The scene serves as a thematic counterpoint\
    \ to the chaos unfolding elsewhere, emphasizing the resilience of personal bonds\
    \ amid external threats.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e06
  scene_sequence: 35
  sequence_in_scene: 63
  key_dialogue:
  - 'ROBIN: I never saw you wear these. Afraid someone might see your birthmark?'
  - 'WESLEY: Who started that birthmark rumor, anyway?'
  - 'ROBIN: Wish you didn’t have to go.'
  - 'WESLEY: Me too.'
  - 'ROBIN: Here... A gift. So you’ll remember. *Robin’s Laws*. All one hundred and
    two of them.'
  - 'WESLEY: Law number one hundred and three... A couple of light years can’t keep
    good friends apart.'
