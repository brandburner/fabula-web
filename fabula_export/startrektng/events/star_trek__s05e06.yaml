  title: Wesley and Robin feign addiction to avoid suspicion
  description: "\n  Wesley and Robin execute a calculated deception in a guest room,\
    \ pretending to be engrossed in the mind-control game when Beverly and Worf enter.\
    \ Their performance convinces the crew members that they, too, are under the game's\
    \ influence, allowing them to evade immediate suspicion. Once Beverly and Worf\
    \ leave, Wesley and Robin drop the act, revealing their true alertness and shared\
    \ paranoia. Robin warns Wesley to stay vigilant, referencing 'Law Ninety-One'—a\
    \ coded reminder to trust no one, not even Picard. Wesley acknowledges the danger\
    \ and instructs Robin to access security codes in Engineering, while he begins\
    \ working on a computer to investigate further. The scene underscores their fragile\
    \ alliance, mutual distrust of the crew, and the escalating stakes as they operate\
    \ in secrecy to counter the mind-control threat.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e06
  scene_sequence: 23
  sequence_in_scene: 42
  key_dialogue:
  - 'ROBIN: It worked.'
  - 'WESLEY: Better keep the mock-ups with us. We can''t trust anyone now. Not even
    the captain.'
  - 'ROBIN: I''m supposed to be on duty in engineering. I''ve gotta get back before
    Commander La Forge suspects something.'
  - 'WESLEY: When you get there, start accessing the codes for the security tracking
    system. There''s something I want to try...'
  - 'ROBIN: Wesley. Don''t forget Law Ninety-One... Always watch your back.'
  - 'WESLEY: You too.'
