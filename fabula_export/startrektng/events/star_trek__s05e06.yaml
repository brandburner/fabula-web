  title: Wesley and Robin uncover Data’s sabotage
  description: In Ten Forward, Wesley and Robin observe the game’s insidious spread
    as O’Brien and an unnamed crew member aggressively push them to play, revealing
    the crew’s collective obsession. Wesley deduces that Data—unaffected by addiction—must
    be connected to the game’s arrival, given his suspicious ‘injury’ at the same
    time. Their shared realization that Data’s deactivation is no accident prompts
    them to investigate his positronic network, setting the stage for a covert inquiry
    into the game’s true purpose. The scene underscores the game’s systemic infiltration
    while positioning Wesley and Robin as the only unaffected crew members capable
    of exposing the conspiracy. Their decision to examine Data marks a critical turning
    point, shifting the narrative from passive observation to active resistance against
    the mind-control device’s influence.
