acts:
- fabula_uuid: act_861cacdb73a83a7b
  number: 1
  summary: Commander Riker enjoys a playful, flirtatious encounter with Etana Jol
    on Risa. Their interaction culminates in Etana introducing Riker to a seemingly
    innocuous crescent-shaped device, which she calls 'a game.' Etana slips the device
    onto Riker's ear, and he immediately experiences a profound sensation of pleasure
    upon successfully completing the first level. This initial experience establishes
    the game's addictive quality and its connection to a mysterious alien woman. Riker
    returns to the Enterprise, where Captain Picard informs him of an accelerated
    mission to the Phoenix Cluster and the impending arrival of Wesley Crusher. Riker
    attempts to share the game with Geordi La Forge, who is too preoccupied with mission
    preparations to try it. Later, Riker teases Counselor Troi about the game, describing
    it as 'better than chocolate' and sparking her curiosity. The game's subtle introduction
    and Riker's enthusiasm begin to sow the seeds of its widespread adoption among
    the crew, setting the stage for its insidious influence.
