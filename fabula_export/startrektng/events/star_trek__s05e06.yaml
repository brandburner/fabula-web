  key_dialogue: &id007
  - |-
    WESLEY: Conduits twelve and twenty-two are still down for testing.
    ROBIN: We can re-route through junction fourteen B...
    WESLEY: You have a funny way of looking at conduit configuration. But it works.
    ROBIN: Law Thirty-Six -- You gotta go with what works.
  - |-
    ROBIN: They said you were good.
    WESLEY: Why do I get the feeling you already know me?
    ROBIN: I have a couple of friends at the Academy. Your name's come up a few times. That was some prank you pulled on Adam Martoni in the physics lab. I just want to know how you got the antimatter regulator to spray chili sauce.
    WESLEY: Uh... there's another side to that story...
  - "WESLEY: This isn't fair. I know nothing about you.\nROBIN: Law Forty-six -- Life\
    \ isn't always... \nWESLEY: ... isn't always fair. I know that law.\nWESLEY: I've\
    \ gotta go work on the sensor relays. But later, I want a chance to even the score.\
    \ Ten Forward, nineteen hundred hours. Will you join me for coffee?\nROBIN: No.\
    \ But I'll join you for dinner."
