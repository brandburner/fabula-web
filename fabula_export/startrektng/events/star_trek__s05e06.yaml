      curved stations, glowing consoles, and turbolifts create a sense of urgency,
      while the presence of Ensign Bloom at conn and the absence of Deanna Troi and
      Beverly Crusher (who are present but silent) underscores the crew’s compromised
      state. The bridge’s role in this event is to amplify the tension of the chase,
      with its institutional authority being exploited by Wesley’s deception. The
      space feels sterile and mechanical, reflecting the crew’s detached, protocol-driven
      reactions.
