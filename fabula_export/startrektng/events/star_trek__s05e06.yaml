      the Risa game’s influence, turning the *Enterprise*’s crew into enforcers of
      a twisted new order. The organization’s usual emphasis on individual rights
      and moral integrity is erased, replaced by a collective compliance that prioritizes
      the game’s rules over Wesley’s survival. Starfleet’s presence is felt in the
      crew’s unified front against Wesley, their actions a dark mirror of the institution’s
      ideals.
    active_representation: Via the crew’s collective action, enforcing the game’s
      influence as if it were a Starfleet directive. The absence of higher authority
      (e.g., Picard, Data) leaves the crew to interpret Starfleet’s values through
      the game’s lens.
    power_dynamics: Exercising authority over Wesley, using the crew’s numbers and
      the game’s hypnotic pull to overwhelm his resistance. The organization’s power
      is distorted, operating under the game’s control rather than its own principles.
