  description: "\n  Wesley enters Beverly’s quarters and finds her engrossed in the\
    \ Risan game, her flushed face and breathless state revealing her deep addiction.\
    \ The moment catches her off-guard, forcing her to admit—with embarrassment—that\
    \ the game was originally intended for him. Wesley’s concern for Data is immediately\
    \ deflected by Beverly, who insists Geordi is handling the situation and orders\
    \ Wesley to abandon his vacation to focus on his own well-being. The exchange\
    \ underscores Wesley’s growing frustration at being sidelined, while Beverly’s\
    \ protective stance masks the crew’s unspoken fear that the game’s influence may\
    \ be beyond their control. This moment foreshadows Wesley’s eventual defiance\
    \ and his pivotal role in breaking the game’s hold on the *Enterprise*.\n  "
