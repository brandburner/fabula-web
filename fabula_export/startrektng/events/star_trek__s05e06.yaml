- fabula_uuid: act_f788b57215401056
  number: 2
  summary: Wesley Crusher materializes on the Enterprise, initially greeted by a prank
    from the senior staff, who then welcome him warmly. He reconnects with his mother,
    Beverly, and Captain Picard, who tests his Latin. Wesley expresses interest in
    assisting with the Phoenix Cluster survey, and Geordi invites him to Engineering.
    While working in Engineering, Wesley meets Robin Lefler, a mission specialist.
    They share an immediate intellectual and personal connection, bonding over their
    shared technical expertise and a playful exchange of 'Robin's Laws.' This rapport
    establishes them as a formidable, uncompromised duo. Meanwhile, Beverly and Troi
    discuss the widespread popularity of the game. The act takes a dark turn when
    Beverly summons Data to sickbay under the pretense of an experiment. Without warning,
    she deactivates him. Riker and Troi enter, and the three senior officers drag
    Data to an examination table, preparing to tamper with his positronic matrix.
    This shocking betrayal reveals the game's sinister influence extends to the highest
    levels of the Enterprise command structure, leaving Data vulnerable and the ship's
    safety compromised.
