    Commander La Forge suspects something.'
  - 'WESLEY: When you get there, start accessing the codes for the security tracking
    system. There''s something I want to try...'
  - 'ROBIN: Wesley. Don''t forget Law Ninety-One... Always watch your back.'
  - 'WESLEY: You too.'
