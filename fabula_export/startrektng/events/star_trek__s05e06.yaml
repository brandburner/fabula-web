  title: Picard orders crew to distribute mind-control devices
  description: On the Enterprise bridge, Worf detects an incoming vessel, prompting
    Picard to assemble his senior staff—Beverly, Geordi, and others—for a mission
    briefing. The crew appears normal, but their compliance with Picard’s order to
    replicate and distribute the addictive mind-control devices (disguised as harmless
    games) reveals their unwitting complicity in Etana Jol’s scheme. Picard’s casual
    mention of Wesley Crusher as an afterthought underscores the crew’s obliviousness
    to the threat, while the scene’s tension lies in the contrast between the ship’s
    apparent routine and the sinister purpose of their actions. This moment marks
    the first coordinated effort to spread the mind-control device, foreshadowing
    the escalating crisis as the crew’s autonomy erodes under its influence.
