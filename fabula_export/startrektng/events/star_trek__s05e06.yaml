- fabula_uuid: act_5bd7e78d37754651
  number: 5
  summary: 'Etana Jol, now revealed as the antagonist, outlines her plan to use the
    Enterprise crew to distribute the addictive game throughout Starfleet, beginning
    with the Starship Endeavor and Starbase Sixty-seven. Wesley, maintaining his charade
    of addiction, attempts to escape the compromised crew and activate a site-to-site
    transporter program. However, Robin, now under the game''s influence, betrays
    him, holding out a game and urging him to play. Riker and Worf apprehend Wesley,
    who makes a desperate run for it, using his knowledge of the ship to evade them
    through Jefferies tubes and a rigged phaser diversion. Despite his ingenuity,
    he is eventually trapped and captured by Riker and Worf. Wesley is dragged to
    the bridge, where Picard, under Etana''s control, forces the game onto him. Just
    as Wesley succumbs, the bridge lights go out, and Data emerges from the turbolift,
    wielding a modified palm beacon that emits blinding flashes. Data, having been
    reconnected by Wesley and given time to adapt, uses the optical bursts to break
    the crew''s hypnotic control. The crew recovers, Data takes command, and Etana''s
    ship is captured. In the aftermath, Wesley prepares to return to Starfleet Academy,
    sharing a poignant goodbye with Robin. Their bond, forged in crisis, is solidified
    as a deep friendship, with Robin gifting him a book of her ''laws,'' and Wesley
    offering a new one: ''A couple of light years can''t keep good friends apart.'''
