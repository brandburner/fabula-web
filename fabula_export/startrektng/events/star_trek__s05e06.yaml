- fabula_uuid: act_7a18e639a5088dbe
  number: 4
  summary: 'The game''s pervasive influence becomes undeniable in Ten Forward, where
    nearly everyone, including O''Brien, is playing. Wesley and Robin observe this
    widespread addiction, realizing they are the only unaffected individuals on the
    ship. They connect Data''s mysterious deactivation to the game''s arrival, suspecting
    a deliberate act. Investigating Data in sickbay, they discover his positronic
    links were not merely damaged but precisely severed, indicating a surgical intervention.
    This revelation leads them to conclude that only Geordi or Beverly, given their
    intimate knowledge of Data, could have performed such an act. The implication
    is clear: a trusted senior officer is behind Data''s sabotage, and the game serves
    a more sinister purpose than mere pleasure. To avoid detection and continue their
    investigation, Wesley and Robin decide to feign addiction, donning mock-up game
    headsets. Their deception successfully fools Beverly and Worf. The act culminates
    with the Enterprise nearing the Phoenix Cluster and an alien ship approaching.
    Etana Jol, the woman from Risa, appears on the viewscreen, revealing her control
    over Captain Picard and the entire Enterprise crew. She issues commands, confirming
    her role as the mastermind and the crew''s subjugation, leaving Wesley and Robin
    as the last hope for the ship.'
