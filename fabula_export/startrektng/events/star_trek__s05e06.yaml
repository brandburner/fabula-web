- fabula_uuid: cand_evt_scene_94d7011981926875_01
  global_id: null
  title: Wesley discovers Data’s sabotage
  description: "\n  In a tense, covert moment in Sickbay, Wesley Crusher and Robin\
    \ Lefler investigate Data’s unconscious state using a medical tricorder, seeking\
    \ answers to his sudden malfunction. While Robin keeps watch for the distracted\
    \ nurse—who is absorbed in the addictive game—Wesley scans Data’s positronic network,\
    \ uncovering an anomalous signal breach. His tricorder reveals a deliberate severing\
    \ of Data’s cognitive links, the cuts so precise they suggest expert sabotage.\
    \ The discovery implicates Geordi La Forge and Beverly Crusher, the only crewmembers\
    \ with the technical expertise to perform such a targeted act. This revelation\
    \ shifts the narrative from a personal mystery to a calculated conspiracy, confirming\
    \ that Data’s deactivation was not accidental but a strategic move to neutralize\
    \ the one crewmember immune to the game’s mind-control effects. The weight of\
    \ this realization forces Wesley and Robin to confront the broader implications:\
    \ if Data was deliberately disabled, the game’s true purpose extends far beyond\
    \ addiction—it’s a tool for control, and the entire crew is already compromised.\
    \ Their discovery escalates the stakes, making them the only unaffected individuals\
    \ left to expose and stop the plot before it’s too late.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e06
