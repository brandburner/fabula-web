  global_id: null
  title: Data disrupts mind control on the bridge
  description: "\n  The bridge crew, fully under the alien game’s hypnotic control,\
    \ forcibly restrains Wesley Crusher and subject him to the game’s laser-induced\
    \ submission. Picard and Beverly—acting with eerie calm—secure the device around\
    \ Wesley’s ear, forcing his eyes open as the lasers lock onto his pupils. Wesley\
    \ resists violently, but the game’s influence takes hold, his body slumping in\
    \ defeat as the overlay consumes his vision. Just as the crew celebrates their\
    \ victory, the bridge lights cut out, plunging the room into darkness. Data emerges\
    \ from the turbolift, wielding a modified palm beacon that emits blinding flashes\
    \ of light. The crew recoils, stunned and disoriented, their hypnotic trance shattered.\
    \ Data seizes the moment, issuing rapid-fire orders to Worf to secure an alien\
    \ vessel—a decisive counterattack that reasserts his authority and forces the\
    \ infected officers into a reactive, defensive position. The event marks a critical\
    \ turning point, restoring temporary control to the *Enterprise* and positioning\
    \ Data as the crew’s only uncorrupted asset.\n  "
