  title: Data’s severed consciousness exposes the crew’s deception
  description: 'In Sickbay, Beverly Crusher reports Data’s sudden incapacitation—his
    higher functions remain active but disconnected from his android body—while Geordi
    La Forge’s diagnostics reveal no physical cause. The scene underscores the crew’s
    vulnerability as their most rational ally becomes a passive victim of the unseen
    threat. Riker and Beverly, now compromised by the addictive game, exchange a subtle,
    knowing glance, betraying their complicity in the conspiracy. Picard authorizes
    an investigation into Data’s logs and quarters, unwittingly setting in motion
    a search that could expose the truth. The tension escalates as the crew’s deception
    deepens, and the stakes for Wesley and the unaffected personnel grow more urgent.
    This moment marks a critical turning point: Data’s condition is no longer just
    a medical mystery but a symptom of the larger crisis, forcing the remaining unaffected
    crew to act before the infection spreads further.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e06
  scene_sequence: 12
  sequence_in_scene: 22
  key_dialogue:
  - 'BEVERLY: He came in to complain about a servo malfunction. My scans were coming
    out negative. And then he just... collapsed.'
  - 'GEORDI: From what I can tell, his higher functions are intact. But the signals
    aren''t getting from his brain to the rest of his body. It''s like he''s in a
    coma.'
  - 'RIKER: Data performs self-diagnostic routines on a regular basis. We should take
    a look at his logs—they might tell us something.'
