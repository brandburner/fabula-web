  title: Data and Wesley break mind-control addiction
  description: "\n  After the Enterprise successfully seizes the Ktarian vessel with\
    \ a tractor beam, Data confirms the crew’s recovery from the mind-control addiction.\
    \ Picard, still disoriented but regaining command, dismisses Etana Jol’s threats\
    \ with a decisive warning, asserting Starfleet’s dominance. Geordi’s shaken realization\
    \ of their near-catastrophic actions underscores the game’s insidious influence.\
    \ Wesley reveals he reactivated Data’s positronic matrix, enabling Data to deploy\
    \ modified optical bursts through the ship’s systems—disrupting the addiction\
    \ and restoring control. Data confirms the pulse has reached all terminals, while\
    \ Riker orders medical teams to assist the remaining affected crew. Picard, now\
    \ fully in command, sets a course for Starbase 82 to deliver the captured vessel,\
    \ marking the transition from crisis to resolution. The event hinges on Data’s\
    \ technical ingenuity and Wesley’s resourcefulness, while also exposing the crew’s\
    \ vulnerability to external manipulation—a critical turning point in the battle\
    \ against Etana’s scheme.\n  "
