  title: Etana commands the Enterprise crew
  description: "\n  The alien ship’s arrival triggers a crisis as Picard summons his\
    \ senior officers to the bridge, where Etana Jol materializes on the viewscreen.\
    \ Her demeanor shifts from the seductive Risan woman of the teaser to a cold,\
    \ calculating strategist, revealing her full control over the crew. Picard and\
    \ the senior staff—Riker, Worf, Beverly, Geordi, and Troi—stand in rigid compliance,\
    \ their expressions blank, their actions mechanical. Etana dispatches them like\
    \ pawns: Riker to the *Endeavor*, Geordi and Troi to Starbase 67, and Picard to\
    \ Starfleet Academy, all to distribute the mind-control device. The crew’s unquestioning\
    \ obedience underscores the depth of their infection, while Etana’s clipped orders\
    \ and the Ktarians’ implied reward system expose her true motives—expansion and\
    \ domination. The scene culminates in a chilling display of power, where the *Enterprise*’s\
    \ senior staff, once autonomous, now function as extensions of Etana’s will. This\
    \ moment forces Wesley and Data into a desperate struggle to reclaim the ship’s\
    \ autonomy, marking the full exposure of the infection’s reach and the crew’s\
    \ total subjugation.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e06
  scene_sequence: 24
  sequence_in_scene: 44
  key_dialogue:
  - 'ETANA: Report.'
  - 'PICARD: The Enterprise has been secured. We await your further instructions.'
  - 'ETANA: The expansion will proceed as follows... Commander Riker. Pilot a shuttlecraft
    to these coordinates. You will rendezvous with the Starship Endeavor. Resume distribution
    of the device aboard that vessel.'
  - 'PICARD: We also have an opportunity to introduce the game to Starfleet Academy.'
  - 'ETANA: Excellent. See to it. The Ktarians commend your efforts, Picard. When
    the expansion is complete... you and your crew will be rewarded.'
