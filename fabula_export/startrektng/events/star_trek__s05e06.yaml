    immediately acts to sever the infected crew’s ability to locate him. Upon exiting
    the transporter room, he tears off his communicator, dismantles it, and tampers
    with its internal components—likely disabling its tracking function—before discarding
    it. His calculated destruction of the device marks his first overt act of sabotage
    against the mind-controlled crew, signaling his strategic resistance alongside
    Data’s efforts. The act is both pragmatic (buying time) and symbolic (rejecting
    the game’s control), as he then flees down the corridor, his urgency underscoring
    the high stakes of his escape. This moment solidifies Wesley’s role as the primary
    agent of defiance against the Risa game’s influence, setting up his subsequent
    efforts to reclaim the ship with Data’s help.
