  title: Wesley’s final transporter escape
  description: 'Cornered in a corridor by Riker and Worf, Wesley makes two desperate
    attempts to flee: first sprinting away, then attempting a transporter escape.
    Riker activates a security containment field, trapping Wesley in a dead end. With
    no other options, Wesley inputs a transporter code—dematerializing just as Riker
    and Worf lunge to capture him. His successful escape marks the last free crew
    member’s departure from the mind-controlled *Enterprise*, leaving Data as the
    sole remaining ally against Etana Jol’s addiction. The moment underscores Wesley’s
    resourcefulness and the escalating stakes of the crisis, as his escape forces
    the infected crew to confront their own compromised loyalty to the ship’s mission.'
