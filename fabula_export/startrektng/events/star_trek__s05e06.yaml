    \ to subject him to the mind-control device. Despite his violent resistance, they\
    \ override his autonomy, with Beverly offering false reassurance while Picard\
    \ activates the game’s laser, which locks onto Wesley’s pupils. As the device\
    \ takes hold, Wesley’s physical struggle subsides, replaced by a forced relaxation\
    \ as the game’s addictive influence begins to dominate his mind. The moment is\
    \ interrupted when Data emerges from the turbolift, using a modified palm beacon\
    \ to emit blinding flashes that disrupt the crew’s hypnotic state, temporarily\
    \ breaking the game’s control. This scene marks the crew’s ethical collapse under\
    \ crisis, as they sacrifice Wesley’s individual will to preserve the *Enterprise*,\
    \ while also setting up Data’s decisive counterattack against the infection.\n\
