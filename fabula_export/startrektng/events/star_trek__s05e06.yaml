  title: Data’s Betrayal and Deactivation in Sickbay
  description: "\n  Beverly Crusher lures Data to sickbay under false pretenses, claiming\
    \ she needs his help with a medical experiment involving bioactive silicon. Data,\
    \ ever dutiful, complies without suspicion, reprogramming a tricorder as instructed.\
    \ The moment he turns his back, Beverly deactivates him with a hidden switch,\
    \ causing him to collapse. Riker and Troi—both now under the mind-control device’s\
    \ influence—enter and secure the room, then restrain Data on an examination table.\
    \ Beverly reveals a medical laser tool, signaling their intent to tamper with\
    \ his positronic matrix. The scene escalates the crew’s desperation, forcing Data\
    \ into a position of helplessness despite his loyalty to the mission. This moment\
    \ marks a critical turning point, where the crew’s moral boundaries dissolve under\
    \ the game’s control, and Data’s vulnerability becomes a weapon against him.\n\
    \  "
