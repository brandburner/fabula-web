  title: Riker’s game delayed by Geordi’s priorities
  description: 'In the bustling chaos of Engineering, Commander Riker attempts to
    share a Risa game with Geordi La Forge, but Geordi—buried in critical sensor recalibration
    for the upcoming mission—politely defers. The exchange subtly contrasts Riker’s
    impulsive enthusiasm (and his lingering Risa indulgence) with Geordi’s disciplined
    focus on operational demands. While the moment feels casual, it plants a critical
    seed: the game’s delayed introduction to the crew prevents immediate exposure
    to the mind-control device, postponing the crisis that will later engulf the *Enterprise*.
    Robin Lefler’s quiet competence in the background further underscores the crew’s
    fractured priorities, as Riker’s distraction with pleasure clashes with Geordi’s
    mission-driven urgency. The scene’s tension lies in what isn’t said—Riker’s unspoken
    frustration at the deferral, Geordi’s unvoiced impatience with Riker’s timing,
    and the unnoticed danger lurking in Riker’s "harmless" souvenir.'
