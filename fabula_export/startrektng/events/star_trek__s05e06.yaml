  title: Riker and Beverly conceal their complicity
  description: In Sickbay, Riker and Beverly stand over Data’s unconscious body, presenting
    a facade of normalcy while secretly hiding their involvement in the mind-control
    conspiracy. Picard and Geordi arrive to investigate Data’s sudden collapse, with
    Geordi diagnosing a severed connection between Data’s positronic brain and his
    body. Riker subtly suggests examining Data’s logs and quarters, a calculated move
    to control the investigation’s direction. When Picard authorizes the search and
    departs, Beverly and Riker exchange a charged glance—an unspoken acknowledgment
    of their shared deception. The scene underscores their complicity in the crisis
    while setting up the investigation that will later expose their betrayal. The
    tension between their outward professionalism and hidden guilt foreshadows their
    eventual unraveling under the game’s influence and the crew’s eventual discovery
    of their role in the conspiracy.
