  global_id: null
  title: Wesley and Robin bond over shared isolation
  description: In Ten Forward, Wesley and Robin share a rare moment of emotional vulnerability,
    bonding over their unconventional upbringings as outsiders. Robin reveals her
    deep-seated loneliness from being raised by absent exobiologist parents, while
    Wesley empathizes with his own experiences. Their connection deepens as they laugh
    together, but the moment shifts when Robin mentions the addictive Risan game spreading
    through the crew. Wesley grows uneasy, noting his mother's unusual insistence
    that he try it. When they observe a crew member succumbing to the game's effects,
    Wesley's curiosity turns to suspicion, and he proposes analyzing the device through
    a computer interface. The scene establishes their alliance while foreshadowing
    the game's insidious influence, marking a turning point from personal connection
    to investigative urgency.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e06
  scene_sequence: 16
  sequence_in_scene: 30
  key_dialogue:
  - 'ROBIN: When your parents are the only exobiologists in the sector, you do a lot
    of travelling around. Base to base to base... After a while, I felt like a piece
    of luggage.'
  - 'WESLEY: Really? Mine was a warp coil.'
  - 'ROBIN: My parents weren''t around much. Even when I needed them... their work
    always came first. That''s how I learned my first law. Law One -- The only person
    you can rely on is yourself.'
  - 'WESLEY: Sounds lonely.'
  - 'ROBIN: It''s everywhere.'
  - 'WESLEY: It''s strange, don''t you think? Everybody playing it all the time...'
  - 'ROBIN: Why don''t you try it and find out?'
  - 'WESLEY: I''d want to know more about it first. We could hook it up to a computer.
    The medical programs can simulate human brain responses...'
