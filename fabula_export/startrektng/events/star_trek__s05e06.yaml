    institutional_impact: |2-

              This event marks the beginning of a systemic threat to Starfleet's operational integrity. Riker's addiction foreshadows a cascade of failures—miscommunications, delayed responses, and compromised missions—as the neural device spreads through the *Enterprise*'s crew. The organization's ability to function cohesively is at risk, with Etana's manipulation serving as a prototype for broader Ktarian subversion.
    internal_dynamics: |2-

              The scene highlights the tension between individual autonomy and institutional control. Riker's choices in this moment reflect a broader internal dynamic within Starfleet: the balance between allowing personal freedom (e.g., shore leave on Risa) and maintaining rigorous discipline. This event exposes a vulnerability in that balance, where personal indulgence can be weaponized against the organization.
