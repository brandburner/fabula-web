  sequence_in_scene: 1
  key_dialogue: &id001
  - 'RIKER: Etana...'
  - 'ETANA: It''s a game. Everyone here''s playing it.'
  - 'RIKER: What was that?'
  - 'ETANA: Your reward. For clearing the first level.'
  - 'RIKER: How far does this game go?'
  - 'ETANA: As far as you can take it. You want to try for level two?'
