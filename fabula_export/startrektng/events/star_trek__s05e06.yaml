  title: Riker tests Robin’s technical expertise
  description: 'In the midst of Engineering’s pre-mission chaos, Riker—distracted
    by his Risa souvenir—briefly engages with Geordi’s sensor bandwidth crisis. When
    Geordi introduces Robin Lefler as a newly promoted mission specialist, Riker tests
    her competence by asking for a status update on the sensor multiplexing. Robin
    delivers a concise, confident report, revealing her technical skill and adaptability
    under pressure. The exchange subtly undermines Riker’s preconceived notions of
    her role (likely as a junior technician) while highlighting the crew’s fractured
    focus: Riker’s mind is already on the addictive game, Geordi is buried in recalibrations,
    and Robin—unnoticed until now—emerges as a capable problem-solver. The moment
    foreshadows her later collaboration with Wesley, as her competence becomes a quiet
    counterpoint to the crew’s impending mind-control crisis.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e06
  scene_sequence: 3
  sequence_in_scene: 5
  key_dialogue:
  - 'RIKER: Geordi... how are you coming with the survey preparations?'
  - 'ROBIN: We''re increasing the available bandwidth... so more science teams can
    use the sensors at once. We figured out a way to do it by multiplexing the array.'
  - 'RIKER: Will it be ready by the time we arrive?'
  - 'ROBIN: Yessir. You can count on it.'
