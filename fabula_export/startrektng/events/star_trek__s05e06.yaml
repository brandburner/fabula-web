  title: Wesley and Robin uncover the game’s neural addiction
  description: "\n  In the Engineering Lab, Wesley and Robin Lefler conduct a forensic\
    \ analysis of the Risan game, connecting its neural sensors to a computer simulation\
    \ of the human brain. Their tests reveal alarming activity in the reticular formation\
    \ and frontal lobe—particularly the pleasure center—confirming the game’s psychotropic\
    \ mechanism. As they accelerate the simulation, serotonin levels spike, and widespread\
    \ bonding to neuroreceptors becomes evident, exposing the game as an irreversible\
    \ addictive device. The discovery forces Wesley to abandon caution and seek immediate\
    \ action, escalating the stakes as the crew’s autonomy hangs in the balance. The\
    \ moment marks a critical turning point: the game isn’t just addictive—it chemically\
    \ hijacks higher reasoning, making resistance nearly impossible. Wesley’s urgency\
    \ to warn Picard stems from this revelation, but the crew’s compromised state\
    \ now makes even the captain a potential threat.\n  "
