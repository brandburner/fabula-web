  title: Riker's addiction to the neural game begins
  description: |2-

      In Riker's Risa quarters, Etana Jol escalates their flirtatious encounter into a playful chase, culminating in a physical tussle that leaves them both breathless and intertwined. As Etana massages Riker's shoulders, she subtly slips a crescent-shaped neural device around his ear, framing it as a harmless game. The device activates, projecting a semi-translucent grid overlay onto Riker's vision, where he must mentally manipulate a disc into a cone. His initial struggle gives way to triumph as he succeeds, triggering an overwhelming burst of pleasure that leaves him gasping. Etana immediately offers him level two, which he accepts without hesitation, his rapid progression and physical reactions revealing the game's insidious addictive power. The scene establishes Riker's vulnerability to external manipulation and foreshadows the crew-wide crisis that will follow as the device spreads through the *Enterprise*.
