  title: Data offers Wesley dance lessons
  description: In a rare moment of shared vulnerability, Data and Wesley bond over
    their mutual struggles with social integration at Starfleet Academy. Data reveals
    his difficulty navigating human customs—particularly the Sadie Hawkins Dance—while
    Wesley admits his own lack of dancing skill, despite his mother Beverly’s expertise.
    This exchange humanizes Data by exposing his ongoing efforts to understand human
    behavior, while Wesley’s admission of inadequacy creates an unexpected emotional
    bridge between them. Data’s subsequent offer of dance lessons—backed by a meticulously
    designed 17-part holographic course—serves as a subtle but significant gesture
    of mentorship, foreshadowing their future collaboration against the mind-control
    threat. The moment underscores their parallel experiences as outsiders (Data as
    an android, Wesley as a prodigy) and establishes a foundation of trust that will
    be critical when Wesley later reactivates Data to combat Etana Jol’s influence.
    The dialogue’s casual yet revealing tone contrasts with the looming crisis, reinforcing
    the story’s tension between personal connection and systemic threat.
