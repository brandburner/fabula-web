  title: Data and Wesley share isolation stories
  description: "\n  In a quiet corridor of the *Enterprise*, Data and Wesley—both\
    \ outsiders in their own ways—engage in an unexpectedly vulnerable conversation\
    \ about their shared struggles with social rejection. Data admits his difficulty\
    \ navigating human social norms, particularly at the Academy, where his lack of\
    \ emotional understanding made him a target for practical jokes. Wesley reciprocates\
    \ with his own story of being pranked by Adam Martoni, revealing a parallel experience\
    \ of alienation despite his human status. The exchange deepens their bond, as\
    \ Data’s offer to teach Wesley dance lessons (a skill he learned from Beverly)\
