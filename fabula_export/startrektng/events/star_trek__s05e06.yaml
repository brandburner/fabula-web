    - Reach the turbolift unnoticed to regroup and plan his next action
    what_happened: Wesley moves with rigid, deliberate precision, his body coiled
      like a spring ready to release. He clutches the mock game device—a prop that
      doubles as his alibi—with white-knuckled tension, his gaze fixed ahead to avoid
