- fabula_uuid: act_2ae3aa60893f50ca
  number: 3
  summary: Picard and Wesley share a personal conversation in the ready room, reminiscing
    about Boothby and Picard's past at Starfleet Academy, humanizing the Captain.
    Beverly then calls Picard to sickbay, where Data lies unconscious. Geordi examines
    Data, concluding his higher functions are intact but signals are not reaching
    his body, essentially placing him in a coma. Riker suggests searching Data's logs
    and quarters for clues, then subtly manipulates Geordi, who is weary and frustrated,
    into taking a break and trying the game in Ten Forward. This demonstrates the
    game's pervasive influence and the compromised crew's manipulative behavior. Meanwhile,
    Wesley and Robin continue their work in Engineering, their bond strengthening
    as they discuss Robin's 'laws.' Wesley later finds his mother, Beverly, engrossed
    in the game, gasping with pleasure, which makes him uneasy. He attempts to warn
    Captain Picard about the game's psychotropic and potentially addictive nature,
    explaining his preliminary findings about its effect on the brain's pleasure and
    reasoning centers. Picard appears to take his concerns seriously, but after Wesley
    leaves, Picard retrieves the game and puts it on himself, succumbing to its influence.
    This confirms that the game's control has reached the highest authority on the
    ship, leaving Wesley and Robin as the only uncompromised individuals.
