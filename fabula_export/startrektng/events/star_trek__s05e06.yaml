- fabula_uuid: cand_evt_scene_94d7011981926875_02
  global_id: null
  title: Wesley and Robin uncover Data’s sabotage
  description: "\n  In Sickbay, Wesley and Robin—now the only unaffected crewmembers—examine\
    \ Data’s unconscious body, using a tricorder to detect an anomalous signal breach\
    \ in his positronic network. Their scan reveals surgically precise cuts in Data’s\
    \ cognitive fibers, confirming his deactivation was deliberate sabotage rather\
    \ than an accident. Wesley deduces that only Geordi La Forge and Beverly Crusher\
    \ possess the expertise to perform such targeted damage, forcing the duo to confront\
    \ a chilling realization: the game’s purpose extends beyond addiction. Data, as\
    \ the ship’s most logical and resistant crewmember, was a deliberate target to\
    \ neutralize opposition. This discovery elevates the stakes, revealing the game’s\
    \ sinister intent to control the entire crew. The weight of their isolation—being\
    \ the last unaffected—presses on them as they grasp the urgency of their mission:\
    \ they must act before the mind-control device fully consumes the *Enterprise*\
    \ and its crew.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e06
  scene_sequence: 20
  sequence_in_scene: 39
  key_dialogue:
  - 'WESLEY: ((re: Data)) I don''t know what to make of this. There''s brain activity...
    all his systems seem to be working.'
  - 'ROBIN: How can that be? He''s unconscious.'
  - 'WESLEY: There might be a signal breach somewhere... between his brain and his
    body. Let''s map his nervous system... see if we can isolate a weak link...'
  - 'WESLEY: ((finds something)) Here. The signal stops here. Below his cognitive
    processor.'
  - 'WESLEY: ((reads tricorder)) There''s some kind of damage... almost undetectable...'
  - 'ROBIN: ((re: viewscreen)) Wesley, look.'
  - 'WESLEY: It looks like some of his positronic links have been severed.'
  - 'ROBIN: The cuts are very precise... see how clean the edges are?'
  - 'WESLEY: Only two people on board know enough about Data to have done something
    like this. Commander La Forge... and my mother.'
  - 'ROBIN: Why would one of them do this to him?'
  - 'WESLEY: Maybe there''s more going on here than we thought. Someone could be trying
    to use the game—for some purpose other than pleasure...'
  - 'ROBIN: If that''s the case... Data would have been a threat to that plan... but
    with him out of the way, everybody else could become addicted.'
  - 'WESLEY: And everybody has. Except us.'
