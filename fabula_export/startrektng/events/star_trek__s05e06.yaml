  title: Worf detects Wesley’s hidden presence
  description: |2-

      The bridge crew, now fully under the mind-control device’s influence, scrambles to locate Wesley after he evades capture by exploiting transporter systems and security sensors. Geordi La Forge traces Wesley’s energy signature to Deck Six, prompting Picard to seal the area and deploy security forces. Meanwhile, Wesley uses a Type-1 phaser to create a false sensor trail, luring guards into a decoy before slipping away. In engineering, Worf isolates an anomalous heat signature on Deck Seven—an irregularity that defies the ship’s systems—suggesting Wesley’s hidden presence. The discovery triggers a high-stakes pursuit, as Riker and Worf exchange a knowing look before sprinting toward the location, their Klingon instincts confirming Wesley’s involvement. This moment marks a critical shift: the crew’s systematic hunt for Wesley escalates, revealing their compromised state while underscoring Wesley’s resourcefulness as the last uninfected ally on the *Enterprise*.
