  title: Neural sensors expose the game’s mind-control mechanism
  description: "\n  In the Engineering Lab, Wesley Crusher and Robin Lefler conduct\
    \ a forensic analysis of the Risan game by interfacing it with a neural sensor\
    \ pad and a simulated brain model. Their scans reveal alarming activity in the\
    \ reticular formation and frontal lobe—particularly the septal area, the brain’s\
    \ pleasure center—confirming the game’s psychotropic mechanism. As they accelerate\
    \ the simulation, they observe serotonin dysregulation and widespread neuroreceptor\
    \ bonding, indicating irreversible addiction. The discovery forces Wesley to abandon\
    \ caution and seek immediate action, marking a critical turning point in the crew’s\
    \ fight against the infection. The revelation also underscores the game’s insidious\
    \ design: it doesn’t just addict—it systematically erodes higher reasoning, leaving\
    \ victims vulnerable to external control. This moment shifts the narrative from\
    \ investigation to urgent intervention, as Wesley prepares to confront Captain\
    \ Picard with the evidence.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e06
  scene_sequence: 17
  sequence_in_scene: 32
  key_dialogue:
  - 'WESLEY: "Wait a second... look at this. Serotonin levels are way off. Let''s
    do a neurochemical analysis..."'
  - 'ROBIN: "Are you saying you think the game''s addictive?"'
  - 'WESLEY: "... The pleasure center of the brain. Whatever this game does, it must
    feel pretty good."'
  - 'ROBIN: "I''m seeing widespread bonding to neuroreceptors..."'
  - 'WESLEY: "Correct me if I''m wrong, but this looks like a psychotropic reaction."'
