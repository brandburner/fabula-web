    and disoriented from the Risa game’s addictive influence. Her immediate embarrassment
    and evasive explanation—admitting she ‘couldn’t resist’—reveal the game’s insidious
    hold over her. When Wesley declines to play, Beverly’s insistence on his vacation
    (a deflection) underscores her complicity in the crew’s collective addiction.
    The moment forces Wesley to confront the game’s personal stakes, shifting his
    investigation from abstract threat to urgent family crisis. The scene’s tension
    lies in Beverly’s vulnerability—her role as a trusted authority figure now compromised—and
    Wesley’s dawning realization that the infection has already reached the heart
    of the ship’s command structure.
