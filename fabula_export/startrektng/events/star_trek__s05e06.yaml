  title: Riker redirects Geordi to Ten Forward
  description: "\n  In Data’s quarters, Geordi La Forge and William Riker—both investigating\
    \ Data’s unexplained shutdown—hit a dead end after reviewing logs and diagnostics.\
    \ Geordi, visibly frustrated and concerned for his friend, suggests returning\
    \ to sickbay to check on Data’s condition. Riker, subtly influenced by the mind-control\
    \ game’s addictive pull, dismisses Geordi’s worry with reassurances that Beverly\
    \ Crusher has the situation under control. He then pivots to a calculated invitation,\
    \ urging Geordi to take a break and meet him in Ten Forward, where he claims to\
    \ have something for him to try. The exchange reveals Riker’s growing susceptibility\
    \ to the game’s influence, as he prioritizes spreading its addictive allure over\
    \ addressing the crew’s mounting crisis. Geordi, weary and emotionally drained,\
    \ reluctantly agrees, marking a critical moment where the game’s insidious control\
    \ begins to erode the crew’s cohesion and investigative focus.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e06
  scene_sequence: 13
  sequence_in_scene: 24
  key_dialogue:
  - 'RIKER: Standard security sweep shows nothing out of the ordinary.'
  - 'GEORDI: Personal logs, diagnostics, duty logs... they all look normal. No evidence
    of anything leading to Data''s shutdown.'
  - 'RIKER: Maybe we should ask his cat.'
  - 'RIKER: Looks to me like you need a break... unwind a little.'
  - 'RIKER: I know just the thing. Why don''t you meet me in Ten Forward? I''ve got
    something I want you to try.'
