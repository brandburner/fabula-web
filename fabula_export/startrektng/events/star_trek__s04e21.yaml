  - 3
  - 4
- fabula_uuid: act_426222a6be9f33e4
  number: 2
  summary: Following J'Dan's partial confession, Admiral Satie and Captain Picard
    discuss the unsettling prospect of a conspiracy on the Enterprise. Satie, initially
    appearing as a respected ally, shares personal anecdotes about her esteemed father,
    Judge Aaron Satie, subtly building a rapport with Picard and establishing her
    credentials as a principled investigator. Meanwhile, Sabin Genestra, Satie's Betazoid
    aide, subtly manipulates Lieutenant Worf, exploiting Worf's personal history and
    the lingering dishonor associated with his father's alleged betrayal. Sabin's
    calculated remarks amplify Worf's motivation to prove his loyalty by aggressively
    pursuing any potential conspirators, effectively turning him into an eager tool
    for Satie's agenda. The investigation intensifies as Satie's team interrogates
    Dr. Beverly Crusher and then medical technician Simon Tarses. Tarses, visibly
    nervous, provides evasive answers, particularly regarding his personal background,
    claiming his paternal grandfather was Vulcan. Sabin, relying solely on his Betazoid
    intuition, dramatically declares Tarses is lying and is 'the man' they are looking
    for, despite the lack of any concrete evidence. Picard expresses discomfort with
    this conclusion, sensing the investigation is veering into dangerous territory,
    but Satie's conviction and Sabin's pronouncement set Tarses firmly in the crosshairs.
  key_moments: []
  scene_numbers:
