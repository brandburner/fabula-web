- fabula_uuid: cand_evt_scene_e6b127bb74f7a897_01
  global_id: null
  title: J'Dan Exploits Worf's Dishonor
  description: In a tense, confined turbolift ride, J'Dan deliberately provokes Worf
    by referencing his family's dishonored name—a wound Worf has spent years suppressing.
    J'Dan's probing questions ('On the Klingon Home World... your name is not mentioned...')
    force Worf into a defensive silence, exposing his raw vulnerability. The exchange
    escalates the ship's underlying tension over loyalty and suspicion, while Worf's
    refusal to engage verbally underscores his internal conflict between Klingon tradition
    and Starfleet duty. The scene ends with Worf asserting dominance through physical
    intimidation (glaring until J'Dan exits), a moment that foreshadows his later
    struggle to reconcile honor with Federation principles.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e21
  scene_sequence: 2
  sequence_in_scene: 3
  key_dialogue:
  - 'J''DAN: On the Klingon Home World... your name is not mentioned... it is as though
    you never existed.'
  - 'J''DAN: A terrible burden for a warrior to bear... to become nothing... without
    honor... without the chance for glory...'
