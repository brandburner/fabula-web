- fabula_uuid: act_3f90869781eff1f9
  number: 4
  summary: 'Picard discovers Lieutenant Worf aggressively expanding the investigation
    into Simon Tarses, ordering extensive background checks, surveillance, and even
    encephalographic polygraph scans on junior officers. Disturbed by the escalating
    tactics, Picard confronts Worf, explaining the historical concept of a ''drumhead
    trial''—summary justice dispensed without due process—and warns against abandoning
    fundamental Federation principles like the Seventh Guarantee, which protects against
    self-incrimination. Worf, initially swayed by Satie''s rhetoric of rooting out
    enemies, begins to show uncertainty. Picard then privately meets with Tarses,
    who, though admitting to falsifying his application about his Romulan heritage,
    maintains his innocence regarding any sabotage, expressing deep regret for his
    lie and believing his Starfleet career is irrevocably ruined. Picard subsequently
    confronts Satie, demanding an immediate halt to the hearings, accusing her of
    unethical conduct, particularly her false claim about corrosive chemicals in the
    engine room. Satie, however, dismisses Picard''s objections with a chilling resolve,
    revealing she has been in direct contact with Starfleet Command and intends to
    *expand* the investigation, bringing in Admiral Thomas Henry and scrutinizing
    ''every last person on this ship.'' She asserts her authority, stating she does
    not require Picard''s permission. The act culminates with Nellen delivering a
    stunning order to Picard: he is to report to the interrogation room for questioning
    before the committee, marking a dramatic shift in Satie''s target and elevating
    the conflict to a personal level.'
  key_moments: []
  scene_numbers:
  - 13
  - 14
  - 15
- fabula_uuid: act_226595f8162d2cf8
  number: 5
  summary: Captain Picard finds himself in the interrogation room's 'hot seat,' facing
    Admiral Satie and Sabin, with Admiral Thomas Henry observing from the gallery.
    Picard, invoking his right to make an opening statement, delivers a powerful,
    impassioned speech. He condemns the proceedings as a 'trial based on insinuation
    and innuendo,' highlighting Simon Tarses's ruined career due to his Romulan heritage
    and warning against the dangers of fear leading to the erosion of fundamental
    liberties. Satie, unmoved, dismisses Picard's plea and immediately turns the attack
    on him, questioning his loyalty by citing his nine violations of the Prime Directive
    and, most devastatingly, his assimilation by the Borg, holding him responsible
    for the destruction of 39 Starfleet ships and the loss of thousands of lives.
    Worf attempts to defend Picard, but Sabin quickly counters by questioning Worf's
    own reliability due to his father's alleged Romulan collaboration, further demonstrating
    the insidious nature of Satie's witch hunt. Satie's accusations become increasingly
    personal and irrational, culminating in a furious denunciation of Picard as a
    corruptor of the Federation. In a final, desperate move, Picard invokes the wisdom
    of Satie's own father, Judge Aaron Satie, quoting his warning about the 'first
    link' in the chain of oppression. This act of poetic justice, coupled with Satie's
    unhinged outburst, finally alienates Admiral Henry, who silently rises and leaves,
    effectively ending Satie's authority. Satie, realizing her power is broken, declares
    she has 'nothing more to say.' The hearings are called off, and Satie leaves the
    Enterprise. In the aftermath, Picard and Worf reflect on the harrowing experience,
    acknowledging the constant need for vigilance against those who spread 'disease
    in the name of liberty,' even when cloaked in the guise of good deeds.
