  scene_sequence: 9
  sequence_in_scene: 16
  key_dialogue:
  - 'WORF: This was found in your quarters. J''DAN: I take injections. Everyone knows
    that. WORF: But your injections don''t require an optical chip reader. This device—has
    only one function: to transform computer information into biological sequences.'
  - 'J''DAN: The blood of all Klingons has become water... since the Federation alliance
    we have become a nation of mewling babies... The Romulans are strong... they are
    worthy allies... they do not turn Klingons into weaklings—like you...'
  - 'SABIN: I believe... he is telling the truth. He admits stealing the files...
    but not sabotaging the dilithium chamber. I get no sense that he is lying. PICARD:
    If you''re right... someone else may be involved. ADMIRAL SATIE: I think, Captain...
    that you have a bigger problem on your ship than one Klingon Exchange Officer.'
