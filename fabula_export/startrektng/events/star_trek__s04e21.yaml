      party in this confrontation, its values and protocols the battleground upon
      which Picard and Satie clash. Picard invokes Starfleet’s due process and the
      Seventh Guarantee (rights of the individual) as his moral compass, while Satie
      wields Starfleet’s security mandates and the specter of sabotage as justification
      for preemptive action. The organization’s duality—balancing exploration and
      defense, individual rights and institutional safety—is laid bare in this debate,
      with the *Enterprise*’s crew and systems as the stakes. Starfleet’s presence
      is felt in the very air of the Ready Room, its ideals both a shield and a sword.
    active_representation: Through the invocation of its protocols (due process, evidence
      standards) and the symbolic weight of its uniformed officers (Picard and Satie
      as opposing interpretations of its mission).
    power_dynamics: Exercising competing interpretations of Starfleet’s core values—Picard
      as the defender of individual rights, Satie as the enforcer of security. The
      organization’s authority is both the source of their conflict and the lens through
      which their actions are judged.
