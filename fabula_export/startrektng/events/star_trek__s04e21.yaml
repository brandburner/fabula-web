  title: Satie asserts command and bypasses protocol
  description: Admiral Norah Satie arrives on the *Enterprise* via transporter, immediately
    establishing her authority by rejecting Picard’s offer of quarters and insisting
    on an unannounced inspection of the sabotaged Engine Room. Her gracious yet firm
    demeanor masks a calculated move to bypass standard protocol, signaling her intent
    to control the investigation from the outset. Picard’s instinctive courtly response—nearly
    kissing her hand—is deflected by Starfleet regulation, subtly reinforcing the
    tension between tradition and duty. Satie’s decision to forgo formalities and
    dive directly into the investigation foreshadows her willingness to disregard
    procedural norms in pursuit of her agenda, setting the stage for a clash with
    the *Enterprise*’s culture of trust and due process. The moment also highlights
    her strategic use of charm to disarm while asserting dominance, a tactic that
    will later prove manipulative as her witch hunt escalates.
