- fabula_uuid: act_29eb35f626b1cd2a
  number: 3
  summary: 'Captain Picard confronts Admiral Satie, expressing his profound unease
    with pursuing Simon Tarses based solely on Sabin''s Betazoid intuition, arguing
    against restricting a man''s freedom without probable cause. Satie, however, skillfully
    deflects Picard''s concerns, drawing parallels to his own use of Counselor Troi
    and emphasizing the urgency of preventing further damage. Just as Satie pressures
    Picard to act, Geordi La Forge and Data present conclusive evidence from Engineering:
    the warp drive explosion was not sabotage but an accident caused by neutron fatigue
    in a defective part. This revelation should have ended the investigation into
    a saboteur, but Satie dismisses it, insisting that J''Dan''s admitted espionage
    still points to a larger conspiracy and that Tarses remains a suspect due to his
    perceived deceit. Worf, now firmly aligned with Satie''s zealous pursuit, advocates
    for continuing the investigation into Tarses. Picard, attempting to maintain due
    process, reluctantly agrees to continue, aiming to ''unequivocally'' establish
    Tarses''s innocence. The hearing for Tarses is then dramatically opened to the
    public, transforming it into a more formal, accusatory proceeding. Dr. Beverly
    Crusher bravely steps forward to defend Tarses''s exemplary character and loyalty,
    but Satie aggressively questions her, implying a cover-up. Picard intervenes,
    but Satie, now unconstrained, allows Sabin to unleash a barrage of accusations
    against Tarses, culminating in the shocking revelation that Tarses lied on his
    Starfleet application: his paternal grandfather was Romulan, not Vulcan. Tarses,
    cornered, invokes his right against self-incrimination, leaving Picard stunned
    by the proceedings'' ugly turn.'
  key_moments: []
  scene_numbers:
