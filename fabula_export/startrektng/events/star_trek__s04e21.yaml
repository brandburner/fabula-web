- fabula_uuid: cand_evt_scene_8dfdb0b519ef5f2b_01
  global_id: null
  title: Picard challenges Satie’s unethical tactics
  description: 'In a private confrontation in the ready room, Picard directly accuses
    Admiral Satie of fabricating evidence and manipulating crew members—including
    Worf—to advance her conspiracy theory. Satie dismisses his concerns as naivety,
    revealing her personal obsession with preserving the Federation at any cost. She
    counters by asserting her authority, threatening to expand the hearings and involve
    Starfleet Security, forcing Picard into a direct power struggle. The scene crystallizes
    their ideological clash: Picard’s moral principles against Satie’s ruthless pragmatism,
    with the crew’s trust and the ship’s values hanging in the balance. Picard’s refusal
    to back down marks a turning point, setting up his eventual defiance of Starfleet
    Command to protect his crew.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e21
  scene_sequence: 20
  sequence_in_scene: 38
  key_dialogue:
  - 'PICARD: We are hounding an innocent man.'
  - 'ADMIRAL SATIE: Can you be so incredibly naive...? I have a purpose. My father
    taught me... that the United Federation of Planets is the most remarkable institution
    ever conceived. It is my cause to make sure that this extraordinary union is preserved...'
  - 'PICARD: The hearings on Simon Tarses must stop. If necessary, I will go to Starfleet
    Command.'
  - 'ADMIRAL SATIE: Captain, I have news for you... I''ve been in constant contact
    with Starfleet Command. And the hearings aren''t going to stop—they''re going
    to be expanded.'
  - 'PICARD: Admiral... what you''re doing here... is unethical... it''s immoral...
    and I will fight it.'
