  title: Satie examines explosion evidence
  description: "\n  In Engineering, Geordi La Forge presents Admiral Satie with the\
    \ visual log of the dilithium chamber explosion—a sudden, unexplained blast that\
    \ triggered emergency containment fields and injured two crew members. The footage\
