- fabula_uuid: cand_evt_scene_3abac1c9f4b60ef3_01
  global_id: null
  title: Worf intimidates J'Dan with Klingon violence
  description: Worf abruptly cuts off J'Dan’s attempt to negotiate an escape by physically
    overpowering him with a swift Klingon martial arts maneuver, slamming him against
    the wall. He threatens J'Dan with execution by the Klingon High Council if he
    does not confess to Romulan collusion, leveraging the threat of dishonor and death
    to coerce compliance. The confrontation ends with Worf releasing J'Dan and exiting,
    leaving the Klingon scientist humiliated and seething. This moment escalates the
    tension between Worf and J'Dan while reinforcing the investigation’s paranoid
    atmosphere, where fear and violence replace due process. It also foreshadows Worf’s
    moral conflict—his alignment with Satie’s witch hunt clashes with his Klingon
    honor code, setting up his eventual disillusionment with the investigation’s methods.
