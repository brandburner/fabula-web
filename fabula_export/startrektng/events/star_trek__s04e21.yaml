  global_id: null
  title: Worf exposes J'Dan’s Romulan data theft
  description: In a tense interrogation, Worf confronts J'Dan with irrefutable evidence—a
    syringe containing a Federation data chip—that proves J'Dan transferred classified
    Starfleet schematics to the Romulans. J'Dan, cornered, defends his betrayal as
    a principled rejection of the Federation’s perceived erosion of Klingon honor,
    framing the Romulans as a more worthy ally. His admission forces Worf to grapple
    with the moral cost of loyalty to both his people and Starfleet’s ideals, while
    Admiral Satie seizes on the confession to escalate her conspiracy theory, now
    suggesting a broader saboteur remains at large. The scene pivots from a personal
    confrontation into a systemic crisis, revealing the fragility of trust aboard
    the *Enterprise* and setting up the next phase of Satie’s witch hunt.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e21
  scene_sequence: 9
  sequence_in_scene: 14
  key_dialogue:
  - |-
    WORF: This was found in your quarters.
    J'DAN: I take injections. Everyone knows that.
    WORF: But your injections don't require an optical chip reader. This device—has only one function: to transform computer information into biological sequences.
  - 'J''DAN: The blood of all Klingons has become water... since the Federation alliance
    we have become a nation of mewling babies... The Romulans are strong... they are
    worthy allies... they do not turn Klingons into weaklings—like you...'
  - |-
    SABIN: I believe... he is telling the truth. He admits stealing the files... but not sabotaging the dilithium chamber. I get no sense that he is lying.
    ADMIRAL SATIE: I think, Captain... that you have a bigger problem on your ship than one Klingon Exchange Officer.
