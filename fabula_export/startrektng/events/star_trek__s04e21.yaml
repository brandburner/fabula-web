- fabula_uuid: cand_evt_scene_69875134cb2597d0_01
  global_id: null
  title: Worf rejects J'Dan’s corrupt bargain
  description: In a tense, wordless corridor confrontation, J'Dan—desperate and cornered—attempts
    to bribe Worf by offering to restore his family’s dishonored name in exchange
    for aiding his escape. Worf’s stony silence and deliberate compliance (leading
    J'Dan to his quarters) expose the depth of his moral resolve, while J'Dan’s escalating
    desperation underscores the fragility of his own position. The moment crystallizes
    the conflict between institutional duty and personal honor, with Worf’s refusal
    to compromise serving as a counterpoint to the ship’s escalating paranoia. His
    physical dominance (gesturing J'Dan into his quarters) reinforces the power dynamic,
    while J'Dan’s hesitation reveals his growing realization that his leverage is
    crumbling. The scene functions as a turning point, where Worf’s adherence to Starfleet
    principles begins to outweigh his Klingon-driven quest for vengeance, foreshadowing
    his eventual rejection of Admiral Satie’s witch hunt.
