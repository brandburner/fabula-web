  key_dialogue:
  - 'SABIN: Mister Tarses. Isn''t it true that you have had access to the biological
    supplies in Sickbay?'
  - 'TARSES: That''s part of my job, yes.'
  - 'SABIN: Isn''t it true that your security clearance gives you access to all the
    stores and files in Sickbay -- access which you can exercise at any time?'
  - 'TARSES: Because I have access doesn''t mean I -'
  - 'SABIN: What would you say if I told you there is evidence that the explosion
    in the engine room was caused by a corrosive chemical... one that is kept stored
    in Sickbay.'
  - 'SABIN: Isn''t - it - true... that the paternal grandfather of whom you speak
    was not Vulcan... but was in fact a Romulan? That it is Romulan blood you carry...
    and a Romulan heritage that you honor?'
  - 'TARSES: On the advice of my counsel... I refuse to answer the question... in
    that... the answer... may serve... to incriminate me.'
