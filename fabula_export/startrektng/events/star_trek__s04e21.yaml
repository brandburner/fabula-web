- fabula_uuid: cand_evt_scene_51d6ce258cc576f9_01
  global_id: null
  title: Sabin manipulates Worf into leading the witch hunt
  description: 'In the Observation Lounge, Sabin—Admiral Satie’s Betazoid aide—exploits
    Worf’s deep-seated insecurities about his father’s legacy to coerce him into leading
    the investigation. Sabin begins by praising Worf’s thoroughness, then subtly undermines
    him by referencing rumors that his father, Mogh, betrayed the Klingons to the
    Romulans. Worf reacts defensively, insisting his father’s actions are his own
    concern, but Sabin pivots to express surprise at Worf’s loyalty, implying he had
    initially doubted him. The manipulation works: Worf, now desperate to prove himself,
    vows to root out any conspiracy on the *Enterprise* and agrees to arrange interviews
    of the crew. Sabin’s calculated words—delivered with feigned reassurance—force
    Worf into overcompensating, ensuring the investigation remains under Sabin’s indirect
    control while deepening Worf’s self-imposed burden. The scene establishes Sabin’s
    psychological dominance and sets Worf on a collision course with his own moral
    limits, as his Klingon honor code clashes with Starfleet’s principles. The exchange
    also foreshadows Worf’s eventual disillusionment with the investigation’s unethical
    tactics, as Sabin’s words plant the seeds for his later conflict with Picard and
    the crew’s trust in him.'
