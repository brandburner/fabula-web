  title: Picard seizes control of Satie’s investigation
  description: "\n  Admiral Satie continues her relentless pursuit of Worf’s connections,\
    \ dictating orders to her aide Nellen to expand the witch hunt—now targeting Worf’s\
    \ family and Academy peers—when Picard intercepts them in the corridor. His interruption\
    \ is deliberate and authoritative: he physically takes Nellen’s PADD, insisting\
    \ on a private, off-record conversation. Satie’s initial resistance (a beat of\
    \ startled hesitation) is swiftly masked by her calculated charm, but Picard’s\
    \ demand for control—‘in private... and off the record’—exposes the power shift.\
    \ The exchange is a microcosm of their ideological clash: Satie’s unchecked zealotry\
    \ vs. Picard’s insistence on due process. Her concession (‘you are my partner\
    \ in this’) is a tactical retreat, not surrender, setting up their later confrontation\
    \ where Picard will directly challenge her methods. The turbolift scene shift\
    \ underscores the escalation: what began as a Starfleet inquiry is now a private,\
    \ high-stakes power struggle with the ship’s core values at stake.\n  "
