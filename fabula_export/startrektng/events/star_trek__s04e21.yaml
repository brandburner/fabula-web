  title: Picard dismantles Satie’s witch hunt
  description: In a high-stakes confrontation, Picard weaponizes Admiral Satie’s own
    legalistic principles and moral hypocrisy to expose the unraveling of her witch
    hunt. After invoking Judge Aaron Satie’s wisdom—a direct callback to her father’s
    legacy—Picard frames her crusade as a violation of Federation values, forcing
    her to abandon her accusations. The scene pivots from ideological confrontation
    to institutional reckoning when Admiral Henry, disgusted by Satie’s unchecked
    zealotry, silently rises and leaves the room, stripping her of authority. The
    moment marks the collapse of Satie’s crusade and the restoration of the *Enterprise*’s
    moral standing, while also revealing the fragility of trust and the dangers of
    unchecked paranoia. Picard’s appeal to principle, combined with Satie’s emotional
    unraveling, underscores the cost of abandoning due process in the name of security.
    The event serves as a turning point, shifting the narrative from institutional
    suspicion to a reaffirmation of Starfleet’s core values—though not without exposing
    the personal and professional scars left in its wake.
