    - Via *proxy agents* (Nellen Tore, Satie’s committee), it distances itself from
      the personal cost of its actions, maintaining plausible deniability.
    institutional_impact: This moment marks a *crisis of faith* in Starfleet’s ideals,
      as the organization’s pursuit of security begins to mirror the very authoritarianism
      it claims to oppose. The interrogation summons is not just an attack on Picard;
      it is an attack on the *principles of due process and fairness* that Starfleet
      is supposed to uphold. The institutional impact is a *fracturing of trust*,
      both in Picard’s leadership and in the system that is supposed to support him.
    internal_dynamics: 'The investigation has exposed a *deep rift* within Starfleet:
      those who believe in Satie’s methods (like Nellen Tore) versus those who see
      her as a zealot (like Picard and Riker). The organization’s internal dynamics
      are now playing out on the bridge, with the summons serving as a *lightning
      rod* for this conflict.'
