      As Picard invokes her father’s words, her facade cracks—her cheeks flush, her
      voice rises in outrage, and she lashes out personally, calling his defense 'traitorous.'
      The final blow comes when the visiting Starfleet Admiral leaves in disgust;
      she sits in stunned silence, her dignity shattered, as the room empties around
      her. Her physical presence becomes a statue-like stillness, a stark contrast
      to the chaos of the departing audience.
