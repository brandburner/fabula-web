  title: Picard Confronts Satie’s Unchecked Authority
  description: 'In the Ready Room, Picard directly challenges Admiral Satie’s escalating
    witch hunt, accusing her of unethical tactics—including lying about volatile chemicals
    in the Engine Room—to pressure J’Dan into a confession. Satie dismisses his concerns
    with condescension, revealing her obsession with preserving the Federation at
    any cost, even if it means destroying lives. She counters by announcing the expansion
    of hearings, now under the oversight of Admiral Henry, and asserts her direct
    authority over Starfleet Command, leaving Picard powerless to stop her. The confrontation
    crystallizes their ideological clash: Picard’s defense of due process against
    Satie’s paranoid crusade, foreshadowing a deeper institutional crisis. Picard’s
    threat to escalate to Starfleet Command is met with Satie’s cold defiance, signaling
    that her investigation will only intensify, regardless of the cost to the *Enterprise*’s
    crew or its mission. The scene ends with Picard visibly shaken, realizing the
    depth of Satie’s influence and the fragility of his own authority in the face
    of her unchecked power.'
