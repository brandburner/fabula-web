- fabula_uuid: cand_evt_scene_87c6049db62b96b4_01
  global_id: null
  title: Picard halts Worf’s witch hunt
  description: "\n  Picard enters the Observation Lounge to find Worf orchestrating\
    \ a frantic, accusatory investigation into Ensign Simon Tarses, with crew members\
    \ scrambling to compile damning evidence—movement logs, polygraph scans, and lists\
    \ of associates. Worf’s aggressive tactics mirror Klingon justice, but Picard\
    \ intervenes, dismissing the crew and confronting Worf directly. He frames the\
    \ proceedings as a 'drumhead trial,' a historical reference to summary justice\
    \ that strips away due process. Worf defends his actions by citing Tarses’ refusal\
    \ to discuss his Romulan grandfather, but Picard rejects the logic, invoking the\
    \ Federation’s Seventh Guarantee and warning of the slippery slope from suspicion\
    \ to paranoia. The exchange forces Worf to confront the moral and procedural boundaries\
