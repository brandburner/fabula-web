  title: J'Dan's Interrogation Under Pressure
  description: "\n  In a tense interrogation room aboard the *Enterprise*, Commander\
    \ Riker and Counselor Troi confront J'Dan, a Klingon exo-biologist, with evidence\
    \ of unauthorized access to the ship's propulsion systems and dilithium chamber\
    \ schematics—evidence that later surfaced in Romulan hands. J'Dan vehemently denies\
    \ involvement, deflecting accusations by invoking his Klingon identity as the\
    \ sole reason for suspicion. Troi, using her empathic abilities, confirms J'Dan\
    \ is hiding something, though she cannot pinpoint what. Riker escalates the pressure\
    \ by threatening to return J'Dan to the Klingon High Council, a move that would\
    \ likely result in his execution for dishonor. The scene ends with J'Dan refusing\
    \ further cooperation, leaving the crew with unanswered questions and deepening\
    \ the ship's internal crisis. This confrontation mirrors the broader witch hunt\
    \ led by Admiral Satie, where paranoia and distrust threaten to undermine the\
    \ *Enterprise*'s core values of due process and fairness.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e21
  scene_sequence: 1
  sequence_in_scene: 1
  key_dialogue: &id001
  - |-
    RIKER: What were you doing accessing the propulsion system files on Stardate 44758?
    J'DAN: I didn't...
    RIKER: But you did... from computer Twelve-B-Nine on Deck Thirty-six.
  - |-
    TROI: J'Dan... we have confirmed reports that schematic drawings of our dilithium chamber fell into Romulan hands... one week later.
    J'DAN: I know nothing about it.
  - |-
    RIKER: We've discussed that with the Klingon High Council. You'll be sent back... as soon as we've finished our investigation.
    J'DAN: I have nothing more to say.
