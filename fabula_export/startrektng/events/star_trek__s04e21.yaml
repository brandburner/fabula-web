  title: Picard receives interrogation summons
  description: Picard sits distracted on the bridge, his leadership momentarily unmoored
    as Data reports the warp engines' restoration. Riker's quiet concern—'Are you
    all right, Captain?'—reveals the weight of Picard's unspoken burdens. Before he
    can respond, Nellen Tore delivers a PADD from Admiral Satie, ordering Picard to
    report for interrogation the next morning. The summons shatters his composure,
    marking a critical escalation in the witch hunt narrative. Nellen's neutral delivery
    contrasts with the palpable triumph beneath her professionalism, signaling that
    Picard is now the target of Satie's zealous inquiry. The moment forces Picard
    from observer to participant in the unfolding crisis, raising the stakes for both
    his personal integrity and the Enterprise's moral standing. The scene pivots from
    institutional crisis to personal confrontation, with Picard's silence speaking
    volumes about his shock and the gravity of the accusation.
