  title: Picard’s distracted command exposed
  description: On the bridge, Picard’s leadership is visibly compromised as he fails
    to respond to Data’s report about the warp engines’ restoration, his mind still
    reeling from his confrontation with Admiral Satie. Riker’s quiet inquiry—‘Are
    you all right, Captain?’—reveals the depth of Picard’s distraction, underscoring
    how Satie’s witch hunt has already eroded his focus. The moment is interrupted
    by Nellen Tore’s arrival, who delivers a PADD summoning Picard to a formal interrogation
    the next morning. The summons is a calculated escalation, designed to unnerve
    him and assert Satie’s authority. Nellen’s stoic demeanor masks her satisfaction,
    while Picard’s stunned reaction signals the personal stakes now at play. The scene
    foreshadows the institutional pressure Picard will face, framing his emotional
    state as both a liability and a vulnerability that Satie will exploit.
