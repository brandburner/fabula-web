- fabula_uuid: cand_evt_scene_e50c926bda2e0955_02
  global_id: null
  title: Worf and Sabin Push Tarses Investigation
  description: "\n  In the Observation Lounge, Admiral Satie and her aide Sabin press\
    \ Captain Picard to authorize a formal investigation into Simon Tarses, framing\
    \ it as a necessary step to *prove* his innocence. Sabin subtly manipulates the\
    \ conversation, emphasizing collaboration with Worf to establish Tarses's guilt\
    \ or innocence 'for his own sake,' while Satie leverages the confessed spy J'Dan\
    \ as evidence of a broader conspiracy. Picard, already wary of Satie's escalating\
    \ witch hunt, reluctantly concedes, exposing the tension between due process and\
    \ the ship's unraveling trust. Worf, now aligned with Satie and Sabin, insists\
    \ on pursuing Tarses, revealing his shift from procedural integrity to becoming\
    \ a tool in the investigation. The scene crystallizes the conflict between institutional\
    \ fairness and the personal stakes of the conspiracy narrative, setting up the\
    \ formal hearing that will follow.\n  "
