  title: Engineering reveals sabotage evidence
  description: "\n  In Engineering, Data and Geordi present forensic evidence to Picard\
    \ and Admiral Satie, confirming the warp core explosion was no accident. The visual\
    \ log shows the dilithium chamber hatch violently detaching, followed by emergency\
    \ containment activation. Geordi explains two crew members suffered radiation\
    \ burns, while Data’s analysis reveals the articulation frame collapsed—directly\
    \ matching the stolen Klingon schematics. Satie seizes on this as proof of sabotage,\
    \ demanding a full briefing. The tension escalates as Picard acknowledges the\
    \ sabotage theory, but the technical evidence also subtly undermines Satie’s conspiracy\
    \ narrative by showing no prior system malfunctions. The scene pivots from forensic\
    \ investigation to Satie’s escalating authority, setting up her witch hunt while\
    \ exposing the fragility of her accusations against the crew.\n  "
