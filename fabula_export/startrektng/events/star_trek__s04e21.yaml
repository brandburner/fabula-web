  - object_uuid: ger_object_902eb95b8613
    description_of_involvement: 'The PADD handed to Picard by Nellen Tore is not merely
      a device—it is the *physical manifestation of Satie’s authority* and the witch
      hunt’s escalation. Its glowing screen displays the summons in stark, official
      text, the words ''interrogation room'' and ''committee'' jumping out like accusations.
      Picard’s grip on the PADD tightens as he reads, his fingers pressing into the
      edges as if trying to crush the weight of the order. The PADD is a *clue, a
      weapon, and a symbol*: a clue into Satie’s next move, a weapon wielded against
      Picard’s leadership, and a symbol of how Starfleet’s bureaucracy has been hijacked
      by paranoia. Its transfer from Nellen to Picard is a ritualistic passing of
      the torch—one that signals the end of Picard’s observer status and the beginning
      of his ordeal.'
    status_before_event: In Nellen Tore’s possession, its screen displaying the pre-written
      summons for Picard’s interrogation, ready to be delivered.
    status_after_event: In Picard’s hands, the summons now a tangible burden he must
      carry into the next morning’s confrontation.
