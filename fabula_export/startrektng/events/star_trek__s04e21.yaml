  title: Picard halts Worf’s witch hunt
  description: "\n  Picard enters the observation lounge to find Worf orchestrating\
    \ a relentless investigation into Ensign Tarses, ordering crew members to track\
    \ his movements, scan his brain, and compile lists of associates. The scene reveals\
    \ Worf’s Klingon-driven urgency to expose a traitor, but Picard intervenes, dismissing\
    \ the crew and confronting Worf directly. He frames the proceedings as a 'drumhead\
    \ trial'—a brutal, summary justice that violates Starfleet’s principles. Worf\
    \ defends his actions, citing Tarses’ evasiveness about his Romulan heritage as\
    \ proof of guilt, but Picard counters with the Federation’s Seventh Guarantee,\
    \ warning that suspicion without evidence erodes their values. The exchange forces\
    \ Worf to confront the moral cost of his methods, while Picard reasserts the ship’s\
    \ ethical boundaries. The moment marks a turning point: Worf’s certainty wavers,\
    \ and Picard’s discomfort signals his growing unease with the investigation’s\
    \ direction.\n  "
