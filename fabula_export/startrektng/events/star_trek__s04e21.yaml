  title: Troi confirms J'Dan’s hidden motives
  description: 'In the interrogation room, Riker and Troi press J''Dan—a Klingon exo-biologist
    under suspicion for sabotage—about his unauthorized access to the *Enterprise*’s
    propulsion systems and dilithium chamber schematics. J''Dan denies involvement,
    deflecting blame by invoking anti-Klingon bias, but Troi’s empathic assessment
    reveals he is concealing critical information. The exchange escalates tension
    between procedural inquiry and personal betrayal, foreshadowing the broader witch
    hunt led by Admiral Satie. Worf, tasked with escorting J''Dan to his quarters,
    becomes a silent enforcer in the unfolding crisis, while Riker’s frustration with
    J''Dan’s evasion underscores the crew’s growing distrust of outsiders. The scene
    pivots from fact-finding to a deeper moral conflict: whether the *Enterprise*’s
    investigation will prioritize truth or yield to paranoia.'
