  global_id: null
  title: Picard confronts Satie’s unchecked authority
  description: 'In the Ready Room, Picard directly challenges Admiral Satie’s escalating
    investigation tactics, accusing her of fabricating evidence and abandoning Starfleet’s
    ethical principles. Satie, undeterred, reveals she has Starfleet Command’s backing
    to expand the hearings—now including Admiral Henry—and threatens to investigate
    every crew member if necessary. The confrontation crystallizes their ideological
    divide: Picard’s moral resistance against Satie’s ruthless pragmatism, with her
    final warning—‘Do what you must, Captain. And so will I.’—escalating the power
    struggle. The scene leaves Picard unsettled, signaling the crew’s unity is now
    at risk as Satie’s witch hunt gains institutional momentum.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e21
  scene_sequence: 20
  sequence_in_scene: 39
  key_dialogue:
  - |-
    PICARD: We are hounding an innocent man.
    ADMIRAL SATIE: And how, may I ask, have you managed to determine that?
    PICARD: I talked with him.
  - |-
    ADMIRAL SATIE: I cannot imagine why you are suddenly trying to block this investigation... there have been others, in the past, who got in my way. They came to regret it.
    PICARD: The hearings on Simon Tarses must stop. If necessary, I will go to Starfleet Command.
    ADMIRAL SATIE: Captain, I have news for you... I've been in constant contact with Starfleet Command. And the hearings aren't going to stop—they're going to be expanded.
  - |-
    PICARD: Admiral... what you're doing here... is unethical... it's immoral... and I will fight it.
    ADMIRAL SATIE: Do what you must, Captain. And so will I.
