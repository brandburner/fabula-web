  - 'SABIN: ...when I first heard about your father... There are some who believe
    he betrayed your people to the Romulans...'
  - 'WORF: My father... what he did or did not do... is no one''s concern but my own...'
  - 'SABIN: ...before I saw you in action, I naturally considered you a possible security
    risk... but I want you to know you have the Admiral''s and my complete confidence.
    You have nothing to prove to us.'
  - 'WORF: If there is a conspiracy on board, I promise you I will find it...'
