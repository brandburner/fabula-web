  global_id: null
  title: Sabin’s revelation exposes deeper sabotage
  description: In a tense interrogation, Worf presents damning evidence against J’Dan—including
    a syringe capable of encoding data into biological sequences—exposing J’Dan’s
    espionage for the Romulans. Though J’Dan admits to stealing Starfleet data, he
    vehemently denies involvement in the dilithium sabotage. Sabin, using his empathic
    abilities, confirms J’Dan’s truthfulness, forcing Satie and Picard to confront
    the unsettling possibility that an *unknown* saboteur remains active aboard the
    *Enterprise*. Satie’s warning escalates the crisis, shifting the investigation
    from a targeted inquiry into a ship-wide conspiracy, while Picard’s growing unease
    signals the fragility of trust within the crew. The scene ends with J’Dan’s removal
    and the ominous implication that the real threat is still at large, setting up
    the second act’s escalation of paranoia and division.
