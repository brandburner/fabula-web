- fabula_uuid: cand_evt_scene_7ba21d0e46449d49_01
  global_id: null
  title: Tarses’s hearing exposes Satie’s witch hunt
  description: "\n  The public hearing into Simon Tarses’s alleged sabotage begins\
    \ under Picard’s reluctant authority, but Admiral Satie immediately weaponizes\
    \ the forum into a spectacle of guilt by association. The scene opens with Tarses\
    \ seated beside Riker as his counsel, while spectators—including Beverly—fill\
    \ the room, signaling Satie’s calculated shift from closed-door inquiry to public\
    \ spectacle. Picard’s discomfort is palpable as Satie frames the hearing as a\
    \ moral reckoning, comparing saboteurs to ‘roaches scuttling for the dark.’ Beverly’s\
    \ impassioned defense of Tarses’s character and loyalty humanizes him, but Satie\
    \ pivots aggressively, probing Beverly about Tarses’s interactions with J’Dan\
    \ and implying collusion. The tension escalates when Sabin reveals Tarses’s Romulan\
    \ heritage—a lie on his Starfleet application—that Satie uses to brand him as\
    \ inherently untrustworthy. Riker objects, but the damage is done: Tarses invokes\
    \ his right against self-incrimination, his career in ruins. The hearing devolves\
    \ from a search for truth into a witch hunt, with Satie’s paranoia and Sabin’s\
    \ manipulation exposing the *Enterprise*’s fractures. Picard’s growing horror\
    \ at the proceedings foreshadows his eventual confrontation with Satie, while\
    \ Tarses’s collapse underscores the cost of institutional distrust.\n  "
