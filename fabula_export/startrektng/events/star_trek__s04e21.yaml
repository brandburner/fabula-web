- fabula_uuid: cand_evt_scene_0888cc49bb543e1e_01
  global_id: null
  title: Sabin Accuses Tarses of Lying
  description: Admiral Satie’s interrogation of Dr. Beverly Crusher yields no useful
    information, but the focus quickly shifts to Simon Tarses, a nervous medical technician.
    Picard frames the inquiry as informal, but Sabin Genestra—using his empathic abilities—accuses
    Tarses of lying, despite Tarses’s insistence that he has nothing to hide. The
    accusation escalates the investigation into a witch hunt, with Satie and Worf
    now convinced Tarses is the key to the conspiracy. Picard’s discomfort with the
    tactics underscores the growing tension between protocol and paranoia, signaling
    the mission’s descent into institutional distrust. The scene marks a turning point
    where the investigation shifts from procedural inquiry to personal vendetta, with
    Tarses becoming the scapegoat for Satie’s conspiracy theories. The confrontation
    also deepens the divide between Picard’s adherence to due process and Satie’s
    ruthless pursuit of a suspect, setting the stage for future conflicts over Starfleet’s
    core values.
