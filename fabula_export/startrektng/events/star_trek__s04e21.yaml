  global_id: null
  title: Picard challenges Worf’s moral compromise
  description: In the Observation Lounge, Picard interrupts Worf mid-investigation
    as he orders invasive surveillance and polygraph scans on Ensign Tarses, revealing
    a systemic erosion of due process. Picard frames the moment as a ‘drumhead trial’—a
    historical metaphor for summary justice—exposing how their pursuit of J’Dan’s
    conspiracy has warped into paranoid overreach. Worf, initially defensive, grapples
    with Picard’s warning that their methods now violate the Federation’s Seventh
    Guarantee, forcing him to confront the cost of abandoning Starfleet’s ethical
    foundations. The confrontation underscores Picard’s growing disillusionment with
    the investigation’s trajectory while laying bare Worf’s internal conflict between
    Klingon honor and Federation duty. The scene pivots from procedural urgency to
    moral reckoning, with Picard’s historical analogy serving as a wake-up call that
    disrupts Worf’s certainty and foreshadows the crew’s broader reckoning with Satie’s
    witch hunt.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e21
  scene_sequence: 17
  sequence_in_scene: 35
  key_dialogue:
  - 'WORF: Ensign Bailey, you and Crewman Marcus will coordinate to track Tarses''
    movements for the last five years. Ensign Kellogg, I want a list of all his relatives...
    his known associates... especially old school friends... And make arrangements
    to do an encephalographic polygraph scan...'
  - |-
    PICARD: What is going on here?
    WORF: Captain... I am conducting the investigation of Simon Tarses.
    PICARD: What has happened to us, Mister Worf?
    WORF: Sir?
    PICARD: I think... we're putting on a drumhead trial...
  - |-
    PICARD: No. We must not let ourselves think that. The Seventh Guarantee is one of the most important rights granted by the Federation. We cannot use one of the fundamental principles of our Constitution and turn it against a citizen.
    WORF: Sir... the Federation does have enemies... we must seek them out...
    PICARD: Yes... that's how it starts. But the road from legitimate suspicion to rampant paranoia is shorter than we might think. Something is wrong here, Worf... I don't like what we have become.
