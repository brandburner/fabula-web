  global_id: null
  title: Satie exposes Tarses's Romulan heritage
  description: "\n  The hearing into Simon Tarses's alleged sabotage escalates into\
    \ a public spectacle when Admiral Satie, with Sabin's assistance, systematically\
    \ dismantles Tarses's credibility. Beverly Crusher's impassioned defense of Tarses\
    \ is swiftly undercut by Satie's aggressive questioning, which forces Beverly\
    \ to admit she saw Tarses socializing with J'Dan. Picard's discomfort grows as\
    \ Satie's tactics become increasingly unethical, culminating in Sabin's revelation\
    \ that Tarses lied about his Romulan heritage on his Starfleet application. Tarses,\
    \ cornered and desperate, invokes his right against self-incrimination, effectively\
    \ admitting guilt by refusing to answer. The scene exposes Satie's paranoid obsession\
    \ with uncovering a conspiracy, while also revealing the fragility of Tarses's\
    \ position and the moral compromises of those around him. Picard's authority is\
    \ tested as he struggles to maintain control over the hearing, which has devolved\
    \ into a witch hunt. The revelation of Tarses's Romulan blood not only destroys\
    \ his career but also forces the crew to confront their own prejudices and the\
    \ cost of institutional suspicion.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e21
  scene_sequence: 15
  sequence_in_scene: 30
  key_dialogue:
  - 'ADMIRAL SATIE: Spies and saboteurs don''t like the bright light of public inquiry.
    They''re like roaches, scuttling for the dark corners...'
  - 'BEVERLY: I would like to go on record as saying that I have worked with Crewman
    Tarses for eighteen months. His work has been exemplary. He is a model of diligence
    and reliability. He is devoted to Starfleet and as far as I''m concerned, his
    loyalty is without question. There''s no way this man is a traitor.'
  - 'SABIN: Isn''t it true... that the paternal grandfather of whom you speak was
    not Vulcan... but was in fact a Romulan? That it is Romulan blood you carry...
    and a Romulan heritage that you honor?'
  - 'TARSES: On the advice of my counsel... I refuse to answer the question... in
    that... the answer... may serve... to incriminate me.'
