  key_dialogue:
  - 'WORF: Am I bothering you, sir?'
  - 'PICARD: No... please, come in, Mister Worf.'
  - 'PICARD: We think we have come so far... the torture of heretics and the burning
    of witches is ancient history... and then... before you can blink an eye... it
    threatens to start all over again.'
  - 'WORF: I believed her... I helped her... I didn''t see what she was.'
  - 'PICARD: Villains who wear black hats are easy to spot. Those who clothe themselves
    in good deeds are well camouflaged.'
  - 'PICARD: Maybe. But it won''t stop her. She -- someone like her -- will always
    be with us... waiting for the right climate to flourish... spreading disease in
    the name of liberty. Vigilance, Worf. That is the price we must continually pay.'
