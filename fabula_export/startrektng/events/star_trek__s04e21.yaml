  key_dialogue:
  - 'SABIN: An accident? I find that hard to believe...'
  - 'ADMIRAL SATIE: Let''s keep our perspective, gentlemen. Just because there was
    no sabotage doesn''t mean there''s not a conspiracy on this ship. We do have a
    confessed spy.'
  - 'SABIN: And he had confederates.'
  - 'PICARD: I remind you all... that Tarses is innocent... until he is proven guilty.'
  - 'ADMIRAL SATIE: ((smoothly)) Of course he is. What Sabin is saying is that he
    and Lieutenant Worf would like to establish Tarses'' innocence unequivocally...
    for his own sake.'
