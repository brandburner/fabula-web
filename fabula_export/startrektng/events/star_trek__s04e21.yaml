- fabula_uuid: cand_evt_scene_30dd72e76ddea6b7_02
  global_id: null
  title: Satie Accuses J'Dan of Sabotage
  description: In a tense interrogation room, Admiral Satie escalates her investigation
    by directly accusing J'Dan of sabotaging the *Enterprise*'s dilithium chamber,
    leveraging his prior admission of transferring Starfleet data to the Romulans.
    Worf, acting as Satie’s enforcer, presents irrefutable evidence—a syringe containing
    a data chip—proving J'Dan’s collusion with the Romulans. Though J'Dan defiantly
    justifies his betrayal as a rejection of the Federation’s perceived erosion of
    Klingon honor, he denies involvement in the sabotage. Sabin, Satie’s Betazoid
    aide, unexpectedly vouches for J'Dan’s truthfulness, forcing Satie to confront
    the unsettling possibility that the sabotage was orchestrated by an *unknown*
    saboteur still active aboard the ship. Picard, witnessing the interrogation, realizes
    the investigation has spiraled into a ship-wide crisis, exposing the fragility
    of trust among the crew and raising the stakes of Satie’s witch hunt. The scene
    ends with Satie’s ominous warning that the *Enterprise* faces a far greater threat
    than a single Klingon traitor, setting up the second act’s escalation into a conspiracy-driven
    narrative.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e21
  scene_sequence: 9
  sequence_in_scene: 15
  key_dialogue:
  - |-
    WORF: I tracked the movements of each person who left the Enterprise since you've been here. I traced one Tarkanian diplomat as far as the Cruces system... where he disappeared and has not been seen since.
    J'DAN: That proves nothing.
    WORF: This was found in your quarters.
    J'DAN: I take injections. Everyone knows that.
    WORF: But your injections don't require an optical chip reader. This device—has only one function: to transform computer information into biological sequences.
  - 'J''DAN: The blood of all Klingons has become water... since the Federation alliance
    we have become a nation of mewling babies... The Romulans are strong... they are
    worthy allies... they do not turn Klingons into weaklings—like you...'
  - |-
    ADMIRAL SATIE: How did you damage the dilithium chamber?
    J'DAN: I had nothing to do with that.
    ADMIRAL SATIE: No? You mean it was sheer coincidence that it was sabotaged after you gave the plans for its design to the Romulans?
    J'DAN: I do not know. I had nothing to do with it.
    ADMIRAL SATIE: You've admitted your crime. Why lie now?
    J'DAN: I am not lying.
  - |-
    SABIN: I believe... he is telling the truth. He admits stealing the files... but not sabotaging the dilithium chamber. I get no sense that he is lying.
    PICARD: If you're right... someone else may be involved.
    ADMIRAL SATIE: I think, Captain... that you have a bigger problem on your ship than one Klingon Exchange Officer.
