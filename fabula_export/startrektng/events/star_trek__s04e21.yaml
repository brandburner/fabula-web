  - 'PICARD: "I''m not sure I can sanction any action against Mister Tarses based
    solely on Betazoid intuitions."'
  - 'ADMIRAL SATIE: "If Counselor Troi suggested to you... that someone on the ship
    were dangerous... would you not act on that? Observe him... curb his activity?"'
