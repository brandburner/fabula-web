acts:
- fabula_uuid: act_f855f020372137f1
  number: 1
  summary: 'The narrative opens with Captain Picard''s log, detailing a security breach
    and warp drive sabotage, leading to the interrogation of Klingon exo-biologist
    J''Dan. Commander Riker and Counselor Troi question J''Dan, who denies direct
    involvement but is sensed to be hiding information. Lieutenant Worf, driven by
    a desire to restore his family''s honor, aggressively pursues J''Dan, eventually
    forcing a confession: J''Dan admits to transferring Starfleet data to Romulans
    using a modified hyposyringe, motivated by a belief that the Federation has weakened
    Klingon society. However, J''Dan steadfastly denies sabotaging the Enterprise''s
    warp drive. Retired Admiral Norah Satie, a renowned conspiracy expert, arrives
    with her Betazoid aide, Sabin Genestra, and assistant Nellen Tore. Satie immediately
    takes charge, inspecting the damage and quickly becoming convinced of a larger
    conspiracy. Despite engineering reports from Geordi La Forge and Data indicating
    a structural failure in the dilithium chamber, Sabin''s Betazoid intuition confirms
    J''Dan''s truthfulness about not causing the explosion, solidifying Satie''s conviction
    that another saboteur is still at large on the ship. This act establishes the
    initial threat, introduces the primary antagonist, and sets the stage for Satie''s
    escalating investigation, shifting the focus from a single spy to a broader, unseen
    enemy within the crew.'
  key_moments: []
  scene_numbers:
  - 1
