  global_id: null
  title: Picard orders medical investigation into Troi's coma
  description: "\n  In Sickbay, Captain Picard records a log expressing concern over\
    \ Counselor Troi's unexplained coma, which has defied medical explanation despite\
    \ thorough examination. Dr. Beverly Crusher confirms no physical cause has been\
    \ found, leaving Troi unresponsive to standard revival techniques. Commander Riker\
    \ reveals Troi's last known activity involved an Ullian delegate, prompting Picard\
    \ to order a medical probe into the telepathic delegation. The scene establishes\
    \ the mystery's urgency—Picard's leadership shifts from concern to action, while\
    \ Riker's revelation about Troi's final moments with the Ullians redirects suspicion\
    \ toward the delegation. The investigation's focus narrows to the Ullians' biofilter\
    \ readings and potential telepathic interference, setting up a confrontation between\
    \ Starfleet's medical protocols and the Ullians' telepathic capabilities. The\
    \ moment also underscores Picard's methodical approach to crisis, balancing empathy\
    \ for Troi with the need for decisive action.\n  "
