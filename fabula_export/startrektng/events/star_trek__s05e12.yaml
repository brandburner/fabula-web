  title: Jev and Troi bond over parental betrayal
  description: After Jev storms away from his father’s public humiliation, Troi intercepts
    him in a corridor, sensing his distress. He confesses his frustration with Tarmin’s
    belittling behavior, only for Troi to reciprocate with her own unresolved pain
    over her mother’s emotional distance. Their shared vulnerability—Jev’s rare moment
    of candor, Troi’s empathic insight—creates an unexpected connection. The turbolift
    doors open, and they enter together, their dynamic shifting from adversarial to
    allied. This fragile bond foreshadows Jev’s potential role in the Ullian conspiracy,
    as Troi’s empathy may later become a tool for uncovering his deception. The scene
    underscores how trauma, when acknowledged, can bridge even the most divided factions,
    while also hinting at the cost of Jev’s hidden agenda.
