  title: Picard leaves Troi with fragmented memories
  description: In Sickbay, Deanna Troi awakens disoriented after a three-day memory
    gap, her last recollection being an innocuous act of brushing her hair. Picard
    probes her for details, but she can only express a vague, gnawing fear without
    concrete answers. When he reveals that Riker and Crusher have since fallen into
    similar comas—likely linked to the Ullians' telepathic presence—Troi’s shock deepens.
    Picard orders her to remain under observation while he investigates the Ullians,
    emphasizing the potential value of her recovered memories. His departure leaves
    Troi alone, grappling with the psychological violation of her mind and the unsettling
    implication that her memories may hold critical clues. The scene underscores the
    escalating stakes of the Ullian investigation, framing Troi’s vulnerability as
    both a personal and narrative turning point. Her fragmented state foreshadows
    the emotional and psychological toll of the memory invasions, while Picard’s decisive
    but cautious approach sets the tone for the broader confrontation with the Ullians.
