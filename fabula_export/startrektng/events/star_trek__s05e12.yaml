  title: Picard demands Ullian confinement and probes
  description: Picard confronts the Ullian delegation—Tarmin, Jev, and Inad—after
    ruling out all other explanations for Troi and Riker’s comas. He demands they
    confine themselves to quarters, framing it as a temporary precaution while the
    investigation continues. Tarmin reacts with indignation, while Jev, sensing an
    opportunity, proposes a memory probe of Troi to retrieve her lost memories and
    prove the Ullians’ innocence. Inad supports the idea, citing the safety of prior
    probes, and Picard reluctantly agrees to discuss it with Troi. The exchange escalates
    tensions, revealing the Ullians’ desperation to clear their name and Picard’s
    growing suspicion that their presence is the key to solving the mystery. The scene
    pivots from confrontation to negotiation, setting up the memory probe as a critical
    test of trust and truth—one that could either vindicate the Ullians or expose
    their guilt.
