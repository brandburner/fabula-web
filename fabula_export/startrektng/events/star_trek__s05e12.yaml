- fabula_uuid: cand_evt_scene_8af709f8b240c1c6_01
  global_id: null
  title: Geordi uncovers nilizene as a hidden cause
  description: |2-

    Geordi La Forge conducts a methodical, exhaustive diagnostic search in Engineering to identify the cause of Troi and Riker's unexplained comas. After systematically ruling out medical conditions like Iresine Syndrome and cross-referencing chemical agents (ferrazene, dardilion, etc.), he discovers a critical oversight in the Enterprise's sensor protocols: nilizene, a rare byproduct of dardilion, is not routinely scanned for. Though the computer confirms nilizene is absent from the ship, Geordi's discovery shifts the investigation away from conventional medical explanations and toward nonchemical agents—exposing a potential blind spot in Starfleet's diagnostic systems. This revelation underscores the Ullian delegation's arrival as a deliberate or overlooked threat, forcing the crew to reconsider their assumptions about the comas' origins. The scene highlights Geordi's analytical rigor and the Enterprise's vulnerability to unseen dangers, while also setting up the need for alternative investigative approaches (e.g., Data's historical cross-referencing).
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e12
  scene_sequence: 19
  sequence_in_scene: 28
  key_dialogue:
  - 'GEORDI: Computer, locate the electropathic pattern described in medical database
    four-delta-one.'
  - 'COMPUTER VOICE: Electropathic pattern located.'
  - 'GEORDI: Okay, we''re gonna track down any possible cause of that brain pattern.
    First, what are the medical conditions that might account for it?'
  - 'COMPUTER VOICE: Iresine Syndrome is a cause of the electropathic pattern.'
  - 'GEORDI: Right. And Doctor Crusher''s already eliminated that. How many nonmedical
    forces or substances might cause the pattern?'
  - 'COMPUTER VOICE: There are twenty-two nonmedical agents.'
  - 'GEORDI: Okay. And how many of those are present on the Enterprise?'
  - 'COMPUTER VOICE: None is present on the Enterprise.'
  - 'GEORDI: Are the ship''s sensors calibrated to detect all those agents?'
  - 'COMPUTER VOICE: All agents are scanned by the sensors.'
  - 'GEORDI: Okay. Let''s start with the chemical substances. Name them.'
  - 'COMPUTER VOICE: Ferrazene, hylanatine, dardilion, chrysimite, and manzene.'
  - 'GEORDI: Ferrazene has a complex molecular structure... it breaks down into bilenium
    and tarrisite. Do the sensors scan for those?'
  - 'COMPUTER VOICE: Ship''s sensors scan for both compounds.'
  - 'GEORDI: And are they present on the Enterprise?'
  - 'COMPUTER VOICE: Bilenium and tarrisite are not present.'
  - 'GEORDI: Do any of the substances break down into by-products that are not scanned
    for?'
  - 'COMPUTER VOICE: Dardilion contains the byproduct nilizene. Sensors do not routinely
    scan for that substance.'
  - 'GEORDI: Well, this isn''t a routine situation. Scan for nilizene.'
  - 'COMPUTER VOICE: There is no nilizene on the Enterprise.'
  - 'GEORDI: Why did I know you were going to say that?'
