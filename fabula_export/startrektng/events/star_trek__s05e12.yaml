  global_id: null
  title: Troi Reveals Tarmin as Her Assailant
  description: |2-

      During a forced Ullian memory probe, Counselor Troi is compelled to relive a traumatic flashback where a seemingly innocent moment with Riker in his quarters violently transforms into an assault. The memory reveals Tarmin—Jev’s father—looming over her, his face twisted in malice as he whispers 'Imzadi' before physically harming her. Troi’s distress escalates as she realizes the figure is not Riker but Tarmin, and she breaks free from the probe, screaming his name. The revelation shatters the Ullian delegation’s facade of innocence, implicating Tarmin in a violent act and forcing Picard and Worf to confront the truth. Jev’s reaction—pity and concern—hints at deeper complicity or knowledge, while Inad’s stunned silence underscores the gravity of the accusation. The moment serves as a turning point, exposing the Ullians’ true intentions and escalating the stakes of their presence aboard the *Enterprise*.
