  title: Jev observes Ullian memory retrieval
  description: In this pivotal moment at Ten Forward, Tarmin demonstrates his Ullian
    memory retrieval technique on Keiko O’Brien, successfully unlocking a long-forgotten
    childhood memory of her grandmother. The group—including Riker, Geordi, and Beverly—watches
    in fascination as Keiko vividly recalls the sensory details of the experience,
    from the texture of an ink brush to the sound of her grandmother’s humming. Tarmin’s
    intrusive yet charismatic approach unsettles Jev, who subtly admonishes his father
    for overstepping telepathic boundaries without explicit consent. The tension escalates
    when Tarmin playfully probes Beverly’s memories, prompting Jev to intervene again,
    reinforcing his role as the moral counterbalance to his father’s aggression. As
    the group disperses, Jev lingers behind, his inscrutable expression hinting at
    deeper knowledge or conflict—an unspoken tension that foreshadows his later betrayal.
    The scene underscores the Ullians’ telepathic capabilities while planting seeds
    of distrust, particularly through Jev’s quiet resistance to his father’s methods.
    This moment serves as both a demonstration of Ullian power and a subtle warning
    of the ethical dilemmas to come, as the crew’s fascination masks the potential
    dangers of memory manipulation.
