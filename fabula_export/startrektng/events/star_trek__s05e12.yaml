  key_dialogue:
  - |-
    RIKER: May I join you?
    JEV: Commander... of course... Something's wrong...
    RIKER: Counselor Troi is ill.
  - |-
    RIKER: Did you go with her into her quarters?
    JEV: Are you suggesting I behaved improperly, Commander?
    RIKER: Not at all... I'm just trying to trace her steps.
  - |-
    RIKER: If you have no objection, Doctor Crusher would like to examine you and your group...
    JEV: To what end?
    RIKER: She'd like to eliminate the possibility that one of you might be carrying some organism that was harmful to Deanna.
