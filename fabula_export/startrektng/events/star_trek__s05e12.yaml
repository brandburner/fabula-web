  title: Troi’s memory invasion by Jev
  description: "\n  In her quarters, Troi begins her nightly routine—brushing her\
    \ hair, ordering hot chocolate—when repressed memories of her past relationship\
    \ with Riker resurface unbidden. The flashbacks start tenderly, showing playful\
    \ moments (poker chips scattering, Riker stroking her hair) and escalate into\
    \ a charged confrontation where their intimacy turns confrontational. As Troi\
    \ relives their emotional struggle—her resistance to their relationship on the\
    \ same ship—Riker’s face suddenly distorts into Jev’s, revealing the Ullian’s\
    \ psychic intrusion. The memory twists violently: Jev replaces Riker, his grip\
    \ tightening as he forces a kiss, his voice echoing Riker’s words in a grotesque\
    \ mimicry. Troi’s horror peaks as multiple versions of Jev appear, observing and\
    \ participating in the violation. The assault culminates in her screaming ‘No!’\
    \ before collapsing unconscious, her spilled hot chocolate staining her nightgown—a\
    \ visceral symbol of the trauma’s intrusion into her sanctuary. The scene bridges\
    \ Troi’s personal vulnerability with the Ullians’ hidden threat, foreshadowing\
    \ Jev’s manipulation of memories to frame his father.\n  "
