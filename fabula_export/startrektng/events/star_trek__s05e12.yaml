    \ aggression. Troi, sensing his distress, attempts to comfort him, but his behavior\
    \ grows increasingly erratic—his touch lingering on her face before he abruptly\
    \ withdraws, his body language rigid with restraint. When Troi presses him to\
    \ talk, Jev’s facade cracks: he mutters about her kindness and beauty, then suddenly\
    \ initiates a brutal memory probe, his hand raised in the Ullian telepathic gesture.\
    \ The invasion leaves Troi visibly disoriented, marking the first overt act of\
    \ the Ullians’ hidden agenda. The scene escalates the conflict by exposing Jev\
    \ as the true perpetrator behind the memory thefts, forcing Picard and the crew\
    \ to confront the delegation’s deception. The probe also serves as a turning point,\
    \ shifting the narrative from suspicion of Tarmin to direct confrontation with\
    \ Jev’s violence, while reinforcing Troi’s vulnerability as an empath and the\
    \ psychological toll of the Ullians’ intrusion.\n  "
