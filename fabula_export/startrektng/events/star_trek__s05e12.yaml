    global_id: ger_agent_f1a913dda0ad
  - character_uuid: ger_agent_f2c5f532ddd2
    emotional_state: "\n        Initially *disturbed* by the intrusive flashbacks,\
      \ Troi’s emotional state escalates to *horrified* as Jev distorts her memories,\
      \ then to *terrified* as the assault becomes physical in the flashbacks. Her\
      \ final scream and collapse reflect *sheer trauma*, her body and mind overwhelmed\
      \ by the violation. The unconscious state that follows is a physical manifestation\
      \ of her psychological breach.\n      "
    goals:
    - To resist the psychic invasion and reclaim control of her memories.
    - To protect her emotional sanctuary from further violation.
    what_happened: "\n        Troi begins her nightly routine in her quarters—brushing\
      \ her hair, replicating hot chocolate—when fragmented flashbacks of her past\
      \ with Riker intrude. Initially, these memories are tender (poker games, shared\
      \ laughter, a kiss), but they rapidly distort as Jev psychically invades them.\
      \ His face replaces Riker’s, his hands tightening around her wrists with violent\
      \ urgency. Multiple versions of Jev appear, forcing themselves on her in the\
      \ flashbacks. Troi screams in horror, struggling against the assault, but the\
      \ psychic intrusion overwhelms her. She collapses unconscious onto the floor,\
      \ her hot chocolate spilling beside her, staining her nightgown. Her emotional\
      \ sanctuary is violated, and her body goes limp, signaling the comatose state\
      \ that will later alarm the *Enterprise*’s crew.\n      "
    observed_status: "\n        Troi begins her nightly routine in her quarters—brushing\
      \ her hair, replicating hot chocolate—when fragmented flashbacks of her past\
