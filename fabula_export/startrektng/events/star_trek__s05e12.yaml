- fabula_uuid: cand_evt_scene_af493333a1a679d0_02
  global_id: null
  title: Troi’s Memory Violated by Jev
  description: "\n  In her quarters, Troi is preparing for bed when fragmented, intrusive\
    \ memories of her past relationship with Riker overwhelm her. The tender recollections—poker\
    \ games, intimate moments—suddenly distort into a violent assault as Jev replaces\
    \ Riker in the flashbacks. Multiple versions of Jev appear, forcing themselves\
    \ on her, their sadistic smiles contrasting with her terror. The psychic intrusion\
    \ escalates until Troi collapses unconscious, her spilled hot chocolate symbolizing\
    \ the violation of her emotional sanctuary. This event marks the first physical\
    \ manifestation of the Ullian delegation’s hidden malevolence, directly linking\
    \ Jev to the comas and setting the investigation into motion.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e12
  scene_sequence: 7
  sequence_in_scene: 12
  key_dialogue: &id003
  - 'RIKER: We have to talk about this...'
  - 'TROI: No... don''t...'
  - 'JEV: Imzadi...'
  - 'TROI: Don''t do this... !'
  - 'JEV: us?'
  - 'TROI: No... no... no...'
  is_flashback: false
