  title: Riker interrogates Jev over Troi’s coma
  description: In a tense confrontation at Ten Forward, Commander Riker presses Jev—an
    Ullian delegate with telepathic memory-retrieval abilities—about his last interaction
    with Counselor Troi, now in a mysterious coma. Riker’s probing questions reveal
    Jev’s evasive responses and defensive posture, raising suspicions that the Ullian
    may be withholding critical information. Jev initially feigns concern but grows
    increasingly guarded, particularly when Riker suggests a medical examination of
    the entire Ullian delegation. The exchange escalates from polite inquiry to veiled
    accusation, culminating in Jev’s controlled but seething anger as Riker departs.
    This scene marks a turning point in the investigation, shifting focus from Tarmin
    to Jev as a potential suspect while underscoring the personal stakes of Troi’s
    condition for Riker. The subtext of Jev’s suppressed rage hints at deeper deception,
    foreshadowing his later role as the true perpetrator of the memory invasions.
