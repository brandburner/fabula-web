  title: Troi Relives Forced Memory of Ullian Intrusion
  description: During an Ullian telepathic probe, Counselor Troi involuntarily regresses
    into a repressed memory triggered by the sensation of someone touching her hair.
    The flashback reveals a moment of violation in her quarters—an unseen figure (later
    revealed to be Jev) intruding on her personal space. Troi’s physical discomfort
    (frowning, setting down her hairbrush) and fragmented recollection ('I get some
    hot chocolate...') signal the memory’s traumatic nature. Jev’s probing questions
    ('Someone's with you in the room?') escalate the tension, forcing Troi to confront
    the repressed event while also implicating the Ullians in psychological manipulation.
    The scene serves as a turning point, exposing the Ullians’ true intentions and
    deepening the mystery of the comas afflicting the crew.
