- fabula_uuid: act_9880baaa92ec76c8
  number: 5
  summary: 'The Enterprise sets course for Starbase 440 to disembark the Ullians,
    with Jev assuring Picard that Ullian authorities will support prosecution for
    memory invasion, a crime long abolished on their world. Picard, however, expresses
    uncertainty about the legal basis for such a unique offense. Data and Geordi continue
    their investigation, uncovering a critical discrepancy: Tarmin was not present
    for all recorded coma incidents on other planets. Further analysis reveals that
    Jev was the *only* Ullian consistently present at every single incident of unexplained
    coma. As Jev prepares to depart, he visits Troi to say goodbye. During their conversation,
    he again invades her memories, confirming her worst fears: he was the true assailant
    all along, having manipulated her memories to implicate his father. Troi, fueled
    by rage and desperation, fiercely fights back against Jev, physically assaulting
    him. Data and Worf, having just uncovered the conclusive evidence linking Jev
    to all the attacks, burst into the quarters and subdue him. The Ullians are disembarked,
    and it is confirmed that Dr. Crusher and Commander Riker will recover, albeit
    slowly. Picard reflects on the inherent ''seed of violence'' present in all beings,
    even in an evolved society, after Tarmin expresses profound shock at his son''s
    actions, underscoring the enduring potential for darkness within humanity.'
