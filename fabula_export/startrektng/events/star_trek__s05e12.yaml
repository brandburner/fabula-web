acts:
- fabula_uuid: act_44921ca582c6f89f
  number: 1
  summary: The Enterprise hosts Ullian telepathic historians, including Tarmin, his
    son Jev, and Inad. Keiko O'Brien undergoes a memory retrieval with Tarmin, successfully
    recalling a childhood memory of her grandmother. Tarmin demonstrates his abilities
    by attempting to probe Beverly Crusher's memories without permission, and later
    makes Worf and Geordi uncomfortable with similar overtures. Jev appears uncomfortable
    with his father's pushy nature and publicly demeaning comments. Counselor Troi,
    empathizing with Jev's frustration, shares a brief, understanding conversation
    with him. Later, in her quarters, Troi experiences disorienting memory flashes,
    initially appearing as a romantic encounter with Commander Riker. These flashes
    rapidly escalate, becoming fragmented and violent, distorting the Riker figure
    into Jev, who appears to assault her within the memory. Overwhelmed by these intrusive
    and terrifying visions, Troi collapses into an unexplained coma, leaving a spilled
    cup of hot chocolate as the only physical evidence of her distress.
  key_moments: []
