  title: Troi Recognizes Jev’s Betrayal
  description: In a disorienting flashback, Riker’s arms lower Troi to the floor as
    she regains lucid awareness of the present moment. Her dazed expression shifts
    to horrified realization when she locks eyes with Jev, who looms over her with
