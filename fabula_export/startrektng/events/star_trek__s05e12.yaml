- fabula_uuid: act_5dc2326df36c3397
  number: 3
  summary: Dr. Crusher, after examining the Ullians, rules out a harmful organism
    as the cause of the comas. She discovers a trace of electropathic activity in
    both Troi and Riker's brains, located in the thalamus, the area associated with
    memory function. This pattern resembles Iresine Syndrome, but their normal histamine
    levels complicate the diagnosis. Picard confronts the Ullians about the inexplicable
    comas, and while Tarmin is defensive, Jev and Inad agree to further examinations.
    Keiko O'Brien, the only crew member to have undergone a memory probe, is scanned
    and shows no residual electropathic activity, further deepening the mystery. Geordi
    La Forge conducts an exhaustive ship-wide diagnostic, systematically eliminating
    all known non-medical agents that could cause the electropathic pattern, confirming
    none are present on the Enterprise. While researching Iresine Syndrome in her
    office, Dr. Crusher is suddenly overwhelmed by her own traumatic memory flashes
    of identifying the deceased Jack Crusher. These memories are violently invaded
    and distorted, with Jev appearing in place of Picard, smiling sadly. Terrified,
    Dr. Crusher screams and collapses into a coma, becoming the third victim.
  key_moments: []
