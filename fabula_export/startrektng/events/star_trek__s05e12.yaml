  title: Troi’s Memory Gap and Ullian Suspicion
  description: "\n  Deanna Troi awakens in Sickbay after a three-day coma, her last\
    \ memory a mundane act—brushing her hair—before a terrifying void. Picard and\
    \ Dr. Martin reveal the alarming pattern: she was the first victim, followed by\
    \ Riker and Crusher, all struck down during the Ullian delegation’s visit. Troi’s\
    \ disorientation and fear escalate as Picard implicates the Ullians’ telepathic\
    \ abilities, framing her memory loss as a potential theft rather than an accident.\
    \ The scene pivots from personal vulnerability to institutional urgency, as Troi’s\
    \ fragmented state becomes a critical clue in uncovering the Ullians’ hidden agenda.\
    \ Picard’s departure leaves her grappling with the psychological violation of\
    \ her mind, while his directive to report any recovered memories sets up the next\
    \ phase of investigation—one that will force her to confront the invasive nature\
    \ of the Ullians’ power.\n  "
