    prompting him to demand the computer locate Riker’s whereabouts. The empty command
    chair underscores Riker’s absence, heightening tension as Picard’s voice tightens
    with uncharacteristic urgency. Worf’s immediate response—‘On my way, sir’—signals
    the crew’s disciplined but alarmed reaction. This moment marks the first overt
    shift from passive observation to active crisis intervention, as Picard’s order
    to track Riker’s location (revealing him in his quarters) foreshadows the Ullian
    delegation’s deeper threat. The scene’s brevity amplifies its weight: a single
    unanswered hail becomes the catalyst for uncovering the telepathic sabotage unfolding
    aboard the *Enterprise*.'
