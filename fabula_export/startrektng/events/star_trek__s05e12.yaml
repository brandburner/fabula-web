  title: Worf pushes for Ullian quarantine
  description: "\n  Worf discovers Riker unconscious in his quarters, triggering a\
    \ tense confrontation in the Observation Lounge where Beverly reveals electropathic\
    \ residue in Riker and Troi’s brains—suggesting targeted memory manipulation.\
    \ Worf immediately links the comas to the Ullians’ arrival, demanding quarantine,\
    \ while Picard resists due to lack of concrete evidence. Beverly’s revelation\
    \ that the residue is concentrated in the thalamus (the memory center) heightens\
    \ suspicion, but Picard insists on further investigation before taking drastic\
    \ action. The scene crystallizes the clash between Worf’s instinct-driven Klingon\
    \ pragmatism and Picard’s Starfleet adherence to protocol, while also deepening\
    \ the mystery of the Ullians’ true intentions.\n  "
