  title: Riker’s Memory Invasion Begins
  description: "\n  Commander Riker sits alone in his quarters, reviewing a PADD at\
    \ his desk, when the Ullian telepathic attack begins. The scene opens with a false\
    \ sense of normalcy—Riker is focused on routine work, his posture relaxed but\
    \ his expression subtly weary, reflecting the emotional toll of Troi’s earlier\
    \ collapse. Without warning, his concentration fractures as violent, intrusive\
    \ memory flashes distort his perception. The script does not show the visuals\
    \ of these flashes, but the text implies a sudden, disorienting assault on his\
    \ mind: fragmented images of past traumas (likely the engineering crisis where\
    \ Ensign Keller died) intercut with the Ullian delegation’s faces, particularly\
    \ Jev’s. Riker’s physical reactions—clutching his head, his breath quickening—signal\
    \ the onset of the same telepathic invasion that struck Troi. The attack escalates\
    \ rapidly; his body tenses, his fingers dig into the PADD’s edge, and his voice\
    \ (off-screen) emits a guttural, pained sound as he collapses forward onto the\
    \ desk. The scene ends with his unconscious form slumped over the PADD, the device’s\
    \ screen flickering with static—a visual metaphor for the corruption of his memories.\
    \ This moment is a *causal turning point*: it confirms the Ullian attack is deliberate\
    \ and escalating, forces Picard to act, and sets up Riker’s later coma as a parallel\
    \ to Troi’s. Thematically, it reinforces the vulnerability of the crew’s minds\
    \ and the Ullians’ hidden agenda, while Riker’s isolation in his quarters underscores\
    \ the personal stakes of the invasion.\n  "
