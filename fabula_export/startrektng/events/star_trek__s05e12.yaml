  - 'PICARD: That you voluntarily confine yourself to quarters. At least until we
    unravel this mystery.'
  - 'JEV: Then... I would propose doing a memory probe of Counselor Troi. You''ve
    said she doesn''t remember what happened to her before she lapsed into unconsciousness.
    I could retrieve that memory... There''s a possibility it could explain the coma—and
    prove us innocent.'
  - 'INAD: Tarmin did a memory probe on another of your crew... Has she suffered any
    ill effects? And neither will Counselor Troi. Please... have as many people present
    as you like to guarantee her safety... but give us this chance to vindicate ourselves.'
