  key_dialogue:
  - 'PICARD: ((to Beverly)) Can you bring her out of it?'
  - 'BEVERLY: I''ve tried standard revival techniques... she doesn''t respond. Until
    I know what caused this, I don''t want to try anything more extreme.'
  - 'RIKER: She was found in her quarters this morning when she didn''t show up for
    an appointment. She was dressed for bed... but the bed wasn''t slept in.'
  - 'PICARD: Who was the last person to speak with her?'
  - 'RIKER: She left the dinner last night with one of the Ullians.'
  - 'PICARD: Commander, ask if they would consent to examinations -- just to be certain.'
