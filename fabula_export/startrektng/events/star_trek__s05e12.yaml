      \ feels like a betrayal of their shared past.\n      "
    beliefs:
    - That his relationship with Troi is sacred and worth protecting (implied by the
      original memory).
    - That Jev’s distortion of these memories is an unforgivable violation of trust.
    observed_traits:
    - Protective (in the original memory, he is gentle and attentive to Troi)
