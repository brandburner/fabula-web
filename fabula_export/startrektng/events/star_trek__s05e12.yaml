  title: Riker’s Ullian memory distortion
  description: "\n  In a fractured, disorienting flashback, Riker relives a distorted\
    \ version of a past engineering crisis—an antimatter breach where Ensign Keller\
    \ was trapped—now warped by Jev’s telepathic infiltration. The memory begins with\
    \ Riker urgently evacuating crew members, but Jev appears in multiple locations\
    \ simultaneously, replacing Davis and other crew members, creating a surreal,\
    \ destabilizing effect. The flashback escalates as Jev’s presence triggers a sensory\
    \ overload: overlapping voices (Davis, Geordi, Jev) merge into a chaotic cacophony,\
    \ forcing Riker to relive the trauma of sealing the isolation door while Keller\
    \ dies. The memory’s distortion—Jev’s quiet smile, his ability to occupy multiple\
    \ spaces—hints at the Ullians’ manipulative power and foreshadows the psychological\
    \ unraveling Riker and Troi will endure. The scene culminates in Riker’s disorientation,\
    \ mirroring the comas that will soon afflict him and Troi, and underscoring the\
    \ Ullians’ ability to weaponize memory itself.\n  "
