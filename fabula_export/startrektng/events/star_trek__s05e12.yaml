  title: Riker probes Jev over Troi’s coma
  description: "\n  In a tense, charged confrontation at Ten Forward, Commander Riker\
    \ approaches Jev—the Ullian delegate with telepathic memory-retrieval abilities—under\
    \ the pretense of casual conversation. Riker’s opening question, framed as a request\
    \ to join Jev at his table, quickly reveals his true purpose: Troi’s unexplained\
    \ coma. Jev’s initial feigned surprise and concern are undercut by his evasive\
    \ body language and terse responses, which escalate as Riker presses for details\
    \ about his last interaction with Troi. Jev’s defensiveness—particularly his sharp\
    \ reaction to Riker’s suggestion that he might have accompanied Troi to her quarters—exposes\
    \ his discomfort with scrutiny. Though Jev insists he and Troi only spoke briefly\
    \ in a turbolift, his reluctance to engage and his dismissive shrug when Riker\
    \ requests medical examinations for the Ullian delegation hint at deeper deception.\
    \ The exchange ends with Riker departing, but Jev’s expression shifts from condescension\
    \ to controlled anger, signaling his hidden resentment and the fragility of his\
    \ cooperation. This scene serves as a critical turning point: it confirms Riker’s\
    \ suspicions, sets up the medical investigation of the Ullians, and foreshadows\
    \ Jev’s role in the conspiracy. The power dynamic between the two men—Riker’s\
    \ methodical authority versus Jev’s simmering hostility—underscores the broader\
    \ conflict between Starfleet’s trust in diplomacy and the Ullians’ potential for\
    \ manipulation.\n  "
