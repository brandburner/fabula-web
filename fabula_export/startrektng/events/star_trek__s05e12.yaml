    simply isn''t a crime we''ve ever had to contend with.'
  - 'JEV: According to what I''ve just learned... it was a practice that was abolished
    on our world centuries ago.'
  - 'PICARD: What would motivate someone like your father to commit such an act?'
  - 'JEV: I don''t know. A perverse source of pleasure... a way to exercise control
    over another... ?'
  - 'PICARD: Your father claims -- quite strenuously -- that he is innocent.'
  - 'JEV: My father has never been one to admit that he''s wrong. (shakes his head)
    But it''s hard to believe he would be capable of this.'
  - 'JEV: I am told... that the punishment for this crime is quite severe.'
  - 'JEV: We are monitoring his telepathic activity. You have my assurance that he
    won''t assault anyone else.'
