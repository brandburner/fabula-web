  global_id: null
  title: Crusher finds no trace of Ullian probe
  description: In Sickbay, Dr. Beverly Crusher conducts a thorough neurological examination
    on Keiko O’Brien to assess lingering effects from the Ullian memory probe. Despite
    Keiko’s positive recollection of the experience—calling it 'wonderful'—Crusher’s
    scans reveal no physiological or neurological abnormalities, including normal
    electrical activity, CPK levels, and hippocampal/thalamic stability. The absence
    of electropathic residue confirms Keiko’s body is unharmed, but this lack of findings
    deepens the mystery surrounding the unexplained comas of Troi and Riker. The scene
    underscores Keiko’s vulnerability as a non-telepathic outsider in the crisis,
    while also reinforcing the urgency to uncover the Ullians’ hidden motives. Beverly’s
    reassuring smile to Keiko contrasts with her professional frustration at the dead
    end, highlighting the tension between medical certainty and the unresolved threat
    aboard the *Enterprise*.
