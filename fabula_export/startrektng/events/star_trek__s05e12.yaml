      \ the consoles, their screens flickering with Nel system planetary records and\
      \ Ullian mission logs. The station’s curved design and humming sensors amplify\
      \ the tension, as the crew cross-references data to expose Tarmin’s alibi. Picard\
      \ looms nearby, demanding progress reports, while the Ullians and Crusher watch\
      \ from a distance. The station’s functionality is essential, as it provides\
      \ the tools and space for the investigative breakthrough. Its atmosphere is\
      \ one of focused urgency, with the crew’s collaborative efforts driving the\
      \ discovery.\n      "
