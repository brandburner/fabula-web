  title: Tarmin’s aggressive memory probe pushback
  description: During a formal dinner with the Ullian delegation, Tarmin—eager to
    demonstrate his telepathic abilities—pushes aggressively for memory retrievals,
    targeting crew members one by one. His insistence escalates from playful to coercive,
    revealing his unethical urgency and disregard for personal boundaries. Beverly
    Crusher’s teasing invitation sparks his enthusiasm, but Worf’s refusal and Geordi’s
    polite decline only fuel his frustration. The scene peaks when Tarmin publicly
    humiliates his son, Jev, by belittling his skills, exposing the Ullians’ internal
    divisions. Jev’s abrupt exit and Troi’s quiet pursuit underscore the growing tension,
    while Inad’s half-hearted attempts to rein in Tarmin’s behavior highlight the
    delegation’s fractured unity. The moment foreshadows the dangerous stakes of their
    telepathic intrusion, as Picard’s crew increasingly resists violating personal
    autonomy—setting up Tarmin as a suspect in the later memory invasions while revealing
    Jev’s simmering resentment, which will later drive his betrayal.
