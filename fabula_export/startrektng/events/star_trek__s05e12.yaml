  - character_uuid: ger_agent_f1a913dda0ad
    emotional_state: "\n        *Absent in the present* (as a memory construct), but\
      \ his distorted version in the flashbacks reflects *forced intimacy turning\
      \ to violence*. The emotional weight of his memory being violated is what devastates\
      \ Troi—she is not just being assaulted, but her *shared history* with Riker\
      \ is being desecrated. The horror lies in the contrast between the real Riker\
      \ (gentle, loving) and Jev’s sadistic doppelgänger.\n      "
    goals:
    - None (as a memory construct, he has no agency).
    - To serve as a vessel for Jev’s psychic assault on Troi’s emotions.
    what_happened: "\n        Riker appears only as a *memory construct* in Troi’s\
      \ flashbacks, initially depicted in tender, romantic moments (poker games, shared\
      \ laughter, a kiss). However, Jev distorts these memories, replacing Riker’s\
      \ face with his own and twisting the intimate scenes into violent assaults.\
      \ Riker’s voice is replaced by Jev’s, and his gentle touch becomes a bruising\
      \ grip. The distortion is so seamless that Troi, in her traumatized state, cannot\
      \ distinguish the real Riker from Jev’s intrusion. His presence in the flashbacks\
      \ is a catalyst for Troi’s horror, as the violation of her memories with Riker\
      \ feels like a betrayal of their shared past.\n      "
    observed_status: "\n        Riker appears only as a *memory construct* in Troi’s\
