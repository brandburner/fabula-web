  description: Geordi La Forge and Data enter Sickbay to report their fruitless diagnostic
    search for the cause of Troi and Riker’s comas, only to discover Dr. Beverly Crusher
    unconscious at her desk. Geordi immediately checks her pulse while Data summons
    an emergency medical team. The scene escalates the medical crisis—now affecting
    the ship’s chief medical officer—while reinforcing the urgency of the Ullian threat.
    Crusher’s collapse suggests a direct, targeted attack on the Enterprise’s leadership,
    deepening the narrative stakes and forcing the crew to confront the possibility
    that the Ullians’ telepathic abilities are not just invasive but potentially lethal.
    The moment also underscores the vulnerability of the crew’s most trusted medical
    authority, raising questions about whether the comas are a deliberate sabotage
    or an unintended consequence of Ullian memory probes.
