  scene_sequence: 18
  sequence_in_scene: 27
  key_dialogue:
  - 'BEVERLY: You''re the only person on board who''s undergone a memory probe by
    the Ullians. I''d like to do a neurological work-up... see if I can detect any
    residual effect.'
  - 'KEIKO: I''m happy to help...'
  - 'BEVERLY: Have you had any unusual symptoms since the probe? Headaches? Dizziness?'
  - 'KEIKO: No, nothing like that. It was a wonderful experience...'
  - 'BEVERLY: ((reading tricorder)) There''s no indication at all of the electropathic
    residue.'
  - 'KEIKO: ((bewildered)) Is that good?'
  - 'BEVERLY: You''re fine, Keiko. But we''re no closer to solving this mystery.'
