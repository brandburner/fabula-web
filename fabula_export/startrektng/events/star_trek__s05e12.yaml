  title: Ullians agree to memory probe under suspicion
  description: Picard and Crusher confront the Ullian delegation—Tarmin, Jev, and
    Inad—after Troi and Riker fall into unexplained comas. Tarmin deflects accusations
    with feigned offense, while Jev’s overly eager cooperation and Inad’s measured
    diplomacy create tension. When Crusher proposes invasive memory probes to investigate,
    Tarmin initially resists but ultimately agrees, though his reluctance and Jev’s
    unsettling demeanor deepen Picard’s distrust. The scene ends with a close-up of
    Jev, subtly foreshadowing his later betrayal. This moment shifts the investigation
    from passive observation to active confrontation, forcing the Ullians to submit
    to scrutiny while leaving their true motives ambiguous.
