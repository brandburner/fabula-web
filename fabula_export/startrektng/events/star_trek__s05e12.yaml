  participations:
  - character_uuid: ger_agent_c3bcf088d86b
    emotional_state: "\n        *Sadistic satisfaction* as he watches Troi’s horror\
      \ unfold in the flashbacks, mixed with *smug emboldenment* at his ability to\
      \ manipulate her memories undetected. His emotional state is cold and calculating,\
      \ revealing his deep-seated resentment toward Tarmin and his enjoyment of power\
      \ over others. The ‘sad smile’ he wears in the flashbacks suggests a perverse\
      \ sense of justice—punishing Troi for being associated with Riker, whom he may\
      \ resent as a symbol of Starfleet’s authority.\n      "
    goals:
    - To psychically assault Troi and frame Tarmin for the comas, diverting suspicion
      from himself.
    - To assert dominance over Troi, exploiting her empathic nature to maximize her
      trauma.
    what_happened: "\n        Jev psychically invades Troi’s memories, replacing Riker\
      \ in her flashbacks with a sadistic doppelgänger. He wears Riker’s outfit but\
      \ distorts the tender moments into violent assaults, his grip tightening around\
      \ Troi’s wrists as he forces himself on her. Multiple versions of Jev appear\
      \ in the flashbacks, observing and participating in the violation, their smiles\
      \ ranging from smug to emboldened. His voice replaces Riker’s, uttering phrases\
      \ like *‘Imzadi’* and *‘I can’t stop thinking about you’* with mocking intimacy.\
      \ The assault is both physical (in the flashbacks) and psychological, targeting\
      \ Troi’s most private emotions. His actions are calculated, exploiting her vulnerability\
      \ to frame Tarmin while concealing his own predatory drives.\n      "
    observed_status: "\n        Jev psychically invades Troi’s memories, replacing\
      \ Riker in her flashbacks with a sadistic doppelgänger. He wears Riker’s outfit\
