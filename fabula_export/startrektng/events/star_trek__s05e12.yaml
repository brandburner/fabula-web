- fabula_uuid: cand_evt_scene_2bc302512295d109_01
  global_id: null
  title: Riker’s Vigil and Beverly’s Intervention
  description: 'In a moment of raw vulnerability, Commander Riker sits at Deanna Troi’s
    bedside, speaking to her in a coma as if she might hear him. His dialogue oscillates
    between mundane updates about ship operations and unguarded admissions of longing,
    revealing the depth of his unspoken feelings for her. The scene is intimate yet
    tense, as Riker’s emotional guard crumbles—his voice catching when he realizes
    she may not wake to review his personnel report, and his body language betraying
    his exhaustion and fear. The moment is abruptly interrupted by Dr. Beverly Crusher,
    who enters with medical authority and compassion. She acknowledges Riker’s devotion
    but firmly enforces protocol, urging him to rest. Her intervention forces Riker
    to confront his own limits: his inability to control Troi’s condition, his physical
    and emotional depletion, and the fragile boundary between duty and personal attachment
    aboard the *Enterprise*. The exchange underscores the personal stakes of Troi’s
    coma, not just for Riker but for the crew as a whole, while also highlighting
    Beverly’s role as both a healer and a disciplinarian. The scene serves as a turning
    point, shifting focus from Riker’s private grief to the broader crisis unfolding
    in Sickbay and the ship’s investigation into the Ullian delegation’s involvement
    in the comas.'
