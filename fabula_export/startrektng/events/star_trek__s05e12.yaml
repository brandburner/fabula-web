  title: Riker relives Keller’s death in flashback
  description: "\n  In a disorienting flashback triggered by Ullian telepathic intrusion,\
    \ Commander Riker is forcibly submerged into the traumatic memory of an antimatter\
    \ breach in Engineering. The scene opens with Geordi and Davis in the present,\
    \ but Riker’s focus fractures as the past overtakes him: the isolation door slams\
    \ shut, trapping Ensign Keller inside. Despite Davis’s desperate pleas—*‘Keller\
    \ is still in there!’*—Riker, as the ranking officer, must make the agonizing\
    \ call to seal the door, sacrificing Keller to prevent a catastrophic radiation\
    \ leak. The memory is visceral: Riker’s voice cracks with authority (*‘Bring down\
    \ the door!’*), his body language rigid with suppressed grief, while Geordi’s\
    \ warnings about radiation levels underscore the inescapable logic of the decision.\
    \ The flashback ends with Riker in his quarters, physically and emotionally unmoored,\
    \ the memory’s weight still crushing him. This moment reveals the core of Riker’s\
    \ unresolved guilt—a wound that explains his hesitation in crises and his deep-seated\
    \ fear of failure, while also foreshadowing the Ullians’ ability to weaponize\
    \ such trauma. The scene’s tension lies in the contrast between Riker’s present\
    \ stoicism and the raw, unfiltered horror of the past, exposing how deeply his\
    \ past governs his present.\n  "
