    repeated comm hails go unanswered. This moment marks the escalation of the Ullian
    threat from Troi’s initial coma to a direct, visible attack on the *Enterprise*’s
    senior staff. The silence from Riker’s quarters forces Picard into urgent action,
    signaling the onset of a full-blown crisis that will expose the Ullians’ manipulative
    tactics and test the crew’s ability to counter their influence. The event underscores
    the vulnerability of the ship’s leadership and the urgency of uncovering the truth
    behind the comas before more victims fall.
