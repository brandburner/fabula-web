- fabula_uuid: act_89e6e4ffbc9ac334
  number: 4
  summary: 'Geordi and Data confirm that their extensive diagnostics have yielded
    no explanation for the comas, reinforcing the suspicion towards the Ullians. Picard,
    with no other options, decides to restrict the Ullians to their quarters as a
    precautionary measure, acknowledging the limitations of such an action against
    a telepath. Suddenly, Counselor Troi regains consciousness, but she cannot recall
    the traumatic events leading to her coma, only a profound sense of fear and disorientation.
    Picard informs her of Riker and Crusher''s similar fates. Meanwhile, Data and
    Geordi, following a new line of inquiry, cross-reference the Ullians'' visited
    planets with instances of unexplained comas. They discover a pattern: several
    cases of Iresine Syndrome on other planets coincided with Ullian visits, suggesting
    that less thorough medical facilities may have misdiagnosed the true cause. Seizing
    this potential breakthrough, Jev proposes performing a memory probe on Troi to
    retrieve her missing memories, arguing it could exonerate the Ullians. Despite
    Picard''s protective reluctance, Troi, desperate for answers, agrees. During the
    probe, Troi relives the assault, and with a horrifying realization, identifies
    Tarmin, Jev''s father, as her attacker, shocking Picard, Worf, and Inad.'
  key_moments: []
