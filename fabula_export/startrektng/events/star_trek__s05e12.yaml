  title: Ullians demand Troi memory probe
  description: 'Picard, frustrated by the Enterprise’s inability to explain Troi and
    Riker’s comas, confronts the Ullian delegation with a request for voluntary confinement.
    Tarmin reacts defensively, while Jev counters by proposing a memory probe of Troi
    as a means of proving Ullian innocence. Inad reinforces the argument by citing
    the safe prior probe of Keiko O’Brien, pressuring Picard to reconsider. The exchange
    reveals the Ullians’ strategic shift from passive cooperation to active defense,
    while Picard’s hesitation signals his growing unease about compromising Troi’s
    safety. The scene marks a critical escalation: the Enterprise’s leadership is
    now being pushed to either trust the Ullians or risk further confrontation, with
    Troi’s well-being at stake as the potential cost of resolution.'
