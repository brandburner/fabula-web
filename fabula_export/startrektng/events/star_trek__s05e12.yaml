- fabula_uuid: cand_evt_scene_e9b674a14144dcef_01
  global_id: null
  title: Tarmin’s confession and Picard’s moral reckoning
  description: 'In the aftermath of Jev’s exposure as the true perpetrator of the
    memory invasions, Tarmin—stripped of his earlier arrogance—confesses the Ullians’
    brutal history of using memory rape as a weapon during a violent era. His shame
    is palpable as he reveals this trauma was thought to be long buried. Picard responds
    by mirroring Earth’s own violent past, framing it as a shared human (and Ullian)
    struggle to transcend primal instincts. The exchange is a fragile but profound
    moment of mutual recognition: both species carry the weight of historical atrocities,
    and neither has fully escaped the potential for darkness within. The scene deepens
    the thematic stakes beyond the immediate crisis, forcing the group to confront
    the cyclical nature of trauma and the fragility of moral progress. Picard’s closing
    words—acknowledging the ‘seed of violence’ in all beings—serve as both a warning
    and a call to vigilance, tying the personal tragedy of the comas to a broader
    existential question about the nature of sentience and power.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e12
  scene_sequence: 37
  sequence_in_scene: 58
  key_dialogue:
  - 'TARMIN: I have asked that the finest physicians on my world meet with you all
    upon our return... to help you in your healing process.'
  - 'TARMIN: It has been three centuries since anyone was treated for this... this
    form of rape. But there are medical records from that era... It was a time of
    great violence among my people... a time we thought we had left far behind. That
    this could happen now... is unimaginable.'
  - 'PICARD: Earth was once a violent planet, too. At times, the chaos seemed to threaten
    the very fabric of life. Like you, we have evolved. We''ve learned to find better
    ways to handle our conflicts. But no one would deny that a seed of violence remains
    in every one of us. The potential for it is always there. We must learn to recognize
    it... because that violence is capable of consuming each of us. Just as it consumed
    your son.'
