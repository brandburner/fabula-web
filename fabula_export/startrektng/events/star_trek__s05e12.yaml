  organization_involvements:
  - organization_uuid: ger_organization_ea929c592ad4
    description_of_involvement: The **Ullian Delegation** is the active force in this
      event, shifting from passive cooperation to aggressive defense. Through Jev’s
      proposal of the memory probe and Inad’s diplomatic pressure, they reposition
      themselves as victims of unfounded suspicion, demanding a chance to prove their
      innocence. Tarmin’s withdrawal, while seemingly defensive, may be a strategic
      move to let the others take a harder line. Their collective action—leveraging
      logic, precedent, and emotional appeals—exerts significant influence over Picard,
      forcing him to reconsider his stance. The delegation’s unity in this moment
      masks internal fractures, particularly Jev’s potential hidden agenda.
    active_representation: Through Jev and Inad as spokespeople, with Tarmin’s silent
      defiance reinforcing their collective stance.
    power_dynamics: Exercising psychological pressure on Picard by framing the probe
      as a matter of fairness and Ullian rights, while simultaneously deflecting suspicion
      onto the Enterprise.
    organizational_goals:
    - To avoid confinement and maintain Ullian autonomy aboard the Enterprise.
    - To force Picard to accept the memory probe as a ‘fair’ solution, thereby regaining
      control of the narrative.
    influence_mechanisms:
    - Leveraging the precedent of Keiko O’Brien’s safe probe to pressure Picard.
    - Using emotional appeals (e.g., ‘entitled to a defense’) to guilt Picard into
      compliance.
    - Exploiting Picard’s protective instincts toward Troi as a vulnerability.
    institutional_impact: 'The delegation’s actions reflect broader Ullian cultural
