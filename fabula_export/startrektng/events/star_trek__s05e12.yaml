  title: Picard orders Ullian containment after comas
  description: 'In the Ready Room, Picard, Geordi, and Data review the medical diagnostics
    on Troi and Riker’s comas, which reveal no physiological cause. Data’s logical
    elimination of all other factors leaves the Ullians as the only remaining suspects.
    Picard, faced with the urgency of the situation and the lack of alternatives,
    makes a decisive but cautious move: he orders Data to investigate the Ullians’
    past visits to other planets for similar incidents while restricting the delegation
    to their quarters as a precautionary measure. The decision is pragmatic but fraught
    with tension—Geordi questions whether physical containment can even stop telepathic
    intrusions, exposing the crew’s vulnerability. The moment is interrupted by a
    comlink from Sickbay announcing Troi’s sudden awakening, which Picard immediately
    recognizes as a potential breakthrough. This event marks the shift from passive
    diagnostic failure to active, targeted suspicion, setting the stage for direct
    confrontation with the Ullians and the eventual revelation of Jev’s betrayal.
    The scene underscores Picard’s leadership under uncertainty, the crew’s growing
    unease, and the escalating stakes of the telepathic threat.'
