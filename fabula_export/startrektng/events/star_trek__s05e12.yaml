  title: Troi attacks Jev after memory violation
  description: In Troi’s quarters, Deanna Troi—still reeling from Jev’s telepathic
    violation of her memories—loses control when he attempts to probe her again. She
    attacks him violently, striking him repeatedly in a raw, physical outburst fueled
    by rage and violation. The confrontation escalates until Worf, Data, and security
    officers intervene, subduing Jev. Data reveals that forensic analysis of past
    incidents on Nel III exonerated Tarmin and instead identified Jev as the sole
    Ullian present during all unexplained comas, confirming his guilt. The scene shifts
    to Picard’s log, where he records the recovery of Beverly Crusher and William
    Riker, marking a critical turning point in the mission. This event serves as both
    a cathartic release of Troi’s trauma and the definitive proof needed to expose
    Jev’s betrayal, accelerating the crew’s confrontation with the Ullians’ true motives.
