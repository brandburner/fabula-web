  title: Picard assigns crisis investigation roles
  description: 'In Sickbay, Picard, Riker, and Beverly Crusher gather around Deanna
    Troi’s unexplained coma, with Doctor Martin’s tricorder readings revealing unusual
    neurotransmitter activity in her diencephalon. The team’s initial confusion shifts
    to strategic action: Riker is dispatched to interrogate the Ullian delegate last
    seen with Troi, Beverly prepares to analyze biofilter logs for potential Ullian-borne
    pathogens, and Picard authorizes medical examinations of the entire Ullian delegation.
    The scene establishes Picard’s methodical crisis leadership—dividing labor to
    systematically address the threat—while the unexplained medical anomaly and Troi’s
    unsettling stillness foreshadow deeper Ullian involvement. The dialogue underscores
    the crew’s urgency and the unspoken tension that this incident may not be accidental,
    setting up the investigation’s central conflict: whether the Ullians’ telepathic
    abilities are benign or weaponized.'
