      \ that will later alarm the *Enterprise*’s crew.\n      "
    beliefs:
    - That her private memories are sacred and inviolable.
    - That Jev’s actions are a deliberate betrayal of trust, given the Ullians’ diplomatic
      pretenses.
    observed_traits:
    - Vulnerable (emotionally exposed in her private space)
    - Defiant (struggling against the psychic assault)
