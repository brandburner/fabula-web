- fabula_uuid: cand_evt_scene_9972d72c454a939a_01
  global_id: null
  title: Tarmin undermines Jev’s credibility
  description: During a formal dinner in the Enterprise’s dining room, Tarmin—an Ullian
    delegate and Jev’s father—publicly belittles his son’s idealism about their memory
    library, exposing their strained relationship and Tarmin’s competitive ruthlessness.
    After Jev passionately describes the library as a noble project, Tarmin interrupts
    to grandstand, framing the Ullians as ‘archaeologists of the mind’ and dismissing
    Jev’s contributions. The tension escalates when Tarmin aggressively pressures
    crew members (Worf, Geordi, Riker) for memory retrieval demonstrations, ignoring
    Inad’s warnings about consent. The climax comes when Tarmin humiliates Jev by
    recounting a past failure, prompting Jev to abruptly leave the room. Troi follows
    him, foreshadowing their later connection. The scene deepens distrust of the Ullians,
    highlights Tarmin’s manipulative nature, and sets up Jev’s later betrayal by revealing
    his vulnerability and resentment toward his father. The crew’s resistance to Tarmin’s
    intrusive tactics also underscores the ethical stakes of memory manipulation.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e12
  scene_sequence: 4
  sequence_in_scene: 6
  key_dialogue:
  - 'TARMIN: What my son means to say is—we think of ourselves as archaeologists of
    the mind. We believe that the history of a world is contained in the personal
    experiences of its people.'
  - 'TARMIN: Once Jev spent two days with a contingent of elderly Gentons. He couldn’t
    get a thing from them. I worked with them for one hour and recovered a missing
    fragment of the Gentonian trade wars.'
