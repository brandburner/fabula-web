  organization_involvements:
  - organization_uuid: ger_organization_ea929c592ad4
    description_of_involvement: "\n        The Ullian Delegation’s hidden agenda is\
      \ embodied in Jev’s psychic assault on Troi. While the delegation publicly advocates\
      \ for ethical memory archiving, Jev’s actions expose their predatory practices—using\
      \ psychic intrusion to manipulate and violate others. His assault on Troi is\
      \ not an isolated incident but part of a pattern: the Ullians’ memory probes\
      \ have left other victims (like those on Iresine) in comas, masked as ‘Iresine\
      \ Syndrome.’ Jev’s targeting of Troi serves a dual purpose: to frame his father\
      \ Tarmin and to assert Ullian dominance over Starfleet’s empaths.\n      "
    active_representation: "\n        Through Jev’s covert psychic actions, which\
      \ represent the delegation’s true nature—aggressive, unethical, and exploitative.\
      \ His sadism is an extension of the Ullians’ institutional culture, where memory\
      \ violation is normalized.\n      "
    power_dynamics: "\n        Exercising psychological dominance over Troi and, by\
      \ extension, Starfleet. The Ullians operate under the guise of diplomacy but\
      \ wield psychic power as a weapon, exploiting Troi’s vulnerability to further\
      \ their goals.\n      "
    organizational_goals:
    - To manipulate Troi’s memories and frame Tarmin for the comas, diverting suspicion
      from Jev’s crimes.
    - To demonstrate Ullian psychic superiority over Starfleet’s empaths, undermining
      trust in the delegation’s ethical claims.
    influence_mechanisms:
    - Psychic intrusion (direct manipulation of Troi’s mind)
    - Memory distortion (weaponizing Troi’s past to inflict trauma)
    - Deception (masking their predatory actions as ethical memory archiving)
    institutional_impact: "\n        The event underscores the Ullians’ hypocrisy,\
      \ revealing their ‘memory archiving’ as a front for psychic domination. It forces\
      \ Starfleet to confront the delegation’s true nature, potentially derailing\
      \ their diplomatic mission and exposing their crimes.\n      "
    internal_dynamics: "\n        Jev’s actions reflect internal Ullian tensions:\
