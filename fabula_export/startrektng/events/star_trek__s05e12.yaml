- fabula_uuid: act_d65fa57dcbc79e77
  number: 2
  summary: Counselor Troi lies in a deep coma in Sickbay, baffling Dr. Crusher, who
    finds unusual neurotransmitter readings but no clear medical cause. Commander
    Riker, deeply concerned, questions Jev about his last interaction with Troi. Jev
    responds defensively, denying any wrongdoing and expressing controlled anger after
    Riker leaves. Riker visits Troi's bedside, speaking to her unconscious form, revealing
    his affection and concern, and expressing hope for her recovery. Later, in his
    own quarters, Riker is suddenly afflicted by a series of traumatic and jumbled
    memory flashes. These memories relate to a past engineering crisis involving Ensign
    Keller and a rapidly closing isolation door, where Riker made a difficult command
    decision. The flashes become increasingly distorted, with Jev appearing in place
    of crewman Davis, observing Riker with a quiet, unsettling smile. Overwhelmed
    by the cacophony of voices and the invasive, altered memories, Riker collapses
    into a coma, mirroring Troi's condition. Worf finds him unconscious at his desk.
