  title: Tarmin probes Keiko’s memory and oversteps with Beverly
  description: In Ten Forward, Tarmin demonstrates Ullian memory retrieval on Keiko
    O’Brien, guiding her through a childhood memory of her grandmother’s ink-brush
    practice. The vivid recollection—triggered by tactile and sensory cues—reveals
    the Ullians’ ability to access and reconstruct long-buried memories with unsettling
    precision. When Beverly Crusher expresses fascination, Tarmin seizes the moment
    to probe *her* memories without consent, teasingly referencing her first childhood
    kiss. His son Jev sharply rebukes him for violating Ullian ethical protocols,
    exposing the delegation’s internal tension over privacy and consent. The exchange
    foreshadows deeper ethical conflicts, as Tarmin’s pushiness and Jev’s discomfort
    hint at the Ullians’ hidden agenda and their disregard for Starfleet’s boundaries.
    The scene ends with the group dispersing, leaving Jev isolated and pensive, his
    enigmatic expression hinting at his later role as the true perpetrator of memory
    invasions.
