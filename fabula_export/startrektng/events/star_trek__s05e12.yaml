  title: Riker deflects Ullian memory probe
  description: "\n  In Ten Forward, Tarmin demonstrates Ullian memory retrieval by\
    \ guiding Keiko through a childhood memory of her grandmother, revealing vivid\
    \ details of a forgotten moment. The process captivates the crew, including Beverly,\
    \ who marvels at the clarity of Keiko’s recovered memory. Tarmin then turns his\
    \ attention to Beverly, teasingly suggesting he could retrieve her first childhood\
    \ kiss—an intrusion that Jev quickly shuts down as unethical. The moment diffuses\
    \ when Geordi jokingly invites Riker to submit to a memory probe, only for Riker\
    \ to deflect with a grinning refusal: 'None that I'd want to share with an audience.'\
    \ The exchange underscores Riker’s guarded nature, his reluctance to expose personal\
    \ vulnerabilities, and the broader tension around Ullian telepathic intrusion.\
    \ Jev’s lingering, inscrutable expression as the group disperses foreshadows his\
    \ hidden role in the unfolding mystery of the comas, while Riker’s deflection\
    \ plants the seed for his later resistance to Ullian manipulation when he falls\
    \ into a coma.\n  "
