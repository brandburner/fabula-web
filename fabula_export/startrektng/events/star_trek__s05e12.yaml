  key_dialogue:
  - |-
    TARMIN: What are you suggesting, Captain?
    PICARD: That you voluntarily confine yourself to quarters. At least until we unravel this mystery.
    TARMIN: ((offended)) We're to be prisoners?
  - |-
    JEV: Captain... our history indicates that we do not adversely affect the people we contact.
    PICARD: I know that.
    JEV: Then... are you implying an intentional assault?
    PICARD: I am simply trying to consider all possibilities.
  - |-
    INAD: Tarmin did a memory probe on another of your crew... Has she suffered any ill effects?
    PICARD: No...
    INAD: And neither will Counselor Troi. Please... have as many people present as you like to guarantee her safety... but give us this chance to vindicate ourselves.
