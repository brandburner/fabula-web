      a symbol of institutional authority and procedural order. Brand rings it sharply
      to silence the room and adjourn the hearing, its deep resonant tone cutting
      through the tension like a gavel. The bell’s sound marks the end of the current
      session and the recess until the next day, reinforcing the gravity of the inquiry
      and the weight of the lies being told. Its historical significance—as a relic
      of Starfleet’s past—contrasts with the modern technological evidence (like the
      PADD and monitor) that will ultimately determine the cadets’ fate.
