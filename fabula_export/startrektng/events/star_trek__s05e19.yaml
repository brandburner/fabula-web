  title: Albert reveals Wesley’s legacy to Beverly
  description: In the aftermath of Admiral Brand’s briefing on the Nova Squadron investigation,
    Beverly Crusher approaches Commander Albert to offer condolences. Albert, visibly
    shaken, recognizes her as Wesley’s mother and—through a moment of raw vulnerability—reveals
    that his son Joshua idolized Wesley, crediting him for his success in astrophysics.
    The exchange underscores Wesley’s posthumous influence on others while deepening
    Beverly’s emotional stakes in the tragedy. Albert’s confession also subtly foreshadows
    the moral weight of Wesley’s choices, as his legacy becomes intertwined with the
    investigation’s unresolved questions about the accident’s cause. The scene serves
    as a poignant humanizing moment amid the institutional proceedings, reinforcing
    the personal cost of the tragedy for both families.
