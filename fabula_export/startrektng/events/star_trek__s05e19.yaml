  global_id: null
  title: Boothby warns Picard of Locarno’s dangerous influence
  description: Picard seeks Boothby’s insight into Nova Squadron’s dynamics after
    the fatal training accident. Boothby, while tending to his garden, draws a parallel
    between Nova’s reckless pride and his own past Parrises Squares victory—one that
    nearly destroyed the Academy grounds. He reveals Nick Locarno as the team’s charismatic
    but dangerous leader, whose influence over the cadets borders on cult-like devotion.
    Boothby frames Locarno as a surrogate father figure whose requests—even reckless
    ones—are followed without question, foreshadowing the team’s fatal cover-up. The
    exchange forces Picard to confront the moral hazard of unchecked loyalty, setting
    up his later confrontation with Wesley about the truth behind Joshua Albert’s
    death. Boothby’s warning serves as both a cautionary tale and a direct indictment
    of Locarno’s leadership, positioning him as the hidden architect of the tragedy.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e19
  scene_sequence: 15
  sequence_in_scene: 35
  key_dialogue:
  - |-
    BOOTHBY: Remember the parrises squares tournament in 'twenty four?
    PICARD: That final game against Minsk...
    BOOTHBY: It took me three weeks to repair the grounds after the celebration.
    PICARD: We had a lot to celebrate. Our team wasn't supposed to win. We were proud of them...
    BOOTHBY: Well... the cadets today are just as proud of Nova Squadron. The celebration they held after Nova won the Rigel Cup made 'twenty-four look like a dinner party. To the other cadets, the members of that team are gods... and that's a hard image to live up to. But Nick Locarno... he watches out for them... he keeps them together. Nick is what makes that team special... he's their coach, surrogate father, and best friend all in one... a natural leader. The members of that team love him... if he asks them to do something, they do it... even if it means going right over a cliff.
  - |-
    BOOTHBY: Look at this... weeds keep popping up in the primrose beds... poor flowers never have a chance to grow...
    PICARD: You could use a good herbicide instead of crawling about on your hands and knees pulling weeds.
    BOOTHBY: And you could explore space on a holodeck instead of a starship.
