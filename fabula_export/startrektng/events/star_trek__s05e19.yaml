      and Commander Albert. The hearing room, the flight schematics, and the cover-up
      of the Kolvoord Starburst maneuver are all products of Starfleet’s rigid training
      environment and its demand for truth—yet the organization’s own bureaucracy
      enables the deception. The Academy’s presence is felt in the flight data Wesley
      reviews, the sweater (a symbol of cadet camaraderie), and the unspoken pressure
      to uphold the squadron’s honor. The organization’s influence is both direct
      (through its protocols) and indirect (through the moral dilemmas it creates
      for its cadets).
