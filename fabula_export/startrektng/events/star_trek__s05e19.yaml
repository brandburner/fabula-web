      scrutiny. The air is thick with unspoken accusations, grief, and the weight
      of the lies being told. The cadets’ unease is amplified by the spectators’ silent
      watchfulness and the judges’ probing questions.
    functional_role: Venue for the informal court of inquiry, where truth and deception
      clash under Starfleet’s authority. The room’s structure—judges’ table, cadet
      table, and spectator section—reinforces the power dynamics at play, with the
      cadets positioned as defendants and the judges as arbiters of truth.
    symbolic_significance: Represents the institutional power of Starfleet Academy
