  - object_uuid: ger_object_06a1a84a5b09
    description_of_involvement: 'The Starfleet Academy Database is the digital repository
      of all official records, evidence, and testimony related to the Nova Squadron
      investigation. Data accesses it via an *unauthorized* link from Main Engineering’s
      computer terminal, bypassing standard protocols. The database’s contents—flight
      logs, sensor readings, cadet testimonies, and accident reconstructions—are critical
      to uncovering the truth about Joshua Albert’s death. Its role in this event
      is twofold: as a tool for Data’s independent inquiry and as a symbol of institutional
      knowledge being repurposed for an unofficial, truth-seeking mission. The database’s
      materialization on the terminal screen marks the moment Data’s defiance of protocol
      becomes actionable, transforming the *Enterprise* from a passive observer into
      an active participant in the investigation.'
    status_before_event: Securely stored within Starfleet Academy’s systems, accessible
      only through authorized channels and with proper clearance. The database is
      a closed, institutional resource, its contents restricted to those with the
      appropriate credentials.
    status_after_event: Temporarily linked to Main Engineering’s terminal, its contents
      now accessible to Data for analysis. The link is unauthorized, creating a narrative
      tension between institutional control and individual initiative.
