  key_dialogue: &id017
  - |-
    PICARD: Can you tell me what maneuver this is?
    WESLEY: It's the Kolvoord Starburst.
    PICARD: Five ships crossing within ten meters of each other and then igniting their plasma trails. One of the most difficult and spectacular demonstrations of precision flying. It hasn't been performed by an Academy team in over a century. Do you know why?
    WESLEY: It was banned by the Academy following a training accident.
    PICARD: An accident in which all five cadets lost their lives. Nicholas Locarno wanted to end his Academy career in a blaze of glory... so he convinced the four of you to learn the Kolvoord Starburst for the commencement demonstration. If it worked, you'd thrill the assembled guests... and Locarno would graduate as a living legend. Except it didn't work... and Joshua Albert paid the price.
  - |-
    PICARD: ((hard)) I asked you a question, Cadet.
    WESLEY: ((stiffly)) I... choose not to answer, sir.
    PICARD: ((hard)) You choose not to answer... and yet you've already given an answer to the inquiry... and that answer was a lie.
    WESLEY: I said the accident occurred after the loop, and it did.
    PICARD: ((hard)) But you neglected to mention the fact that following the loop your team executed a dangerous maneuver which was the direct cause of the crash. Yes, you told the truth... but only to a point. And a lie of omission is still a lie.
  - |-
    PICARD: The first duty of every Starfleet officer is to the truth... be it scientific truth, historical truth, or personal truth. It is the guiding principle upon which Starfleet is based. If you cannot find it within yourself to stand up and tell the truth about what happened... you do not deserve to wear that uniform.
    PICARD: Mister Crusher... I'll make this simple for you. Either you come forward and tell Admiral Brand what really took place... or I will.
