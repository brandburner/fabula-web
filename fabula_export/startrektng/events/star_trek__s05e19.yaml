- fabula_uuid: act_88bbe996a369b55a
  number: 3
  summary: |-
    Picard, still uneasy about the Nova Squadron testimony, assigns Geordi La Forge and Data to conduct an independent analysis of the flight recorder and Academy database. Simultaneously, in Wesley's dorm room, the Nova Squadron members engage in a heated discussion. Sito and Wesley express their discomfort with Locarno's testimony, particularly his assertion that Albert was responsible. Locarno, employing his charismatic leadership, skillfully manipulates his teammates. He convinces Sito and Hajar that Albert indeed panicked, thereby solidifying their commitment to the fabricated story. He then pressures Wesley, arguing that revealing the truth would mean sacrificing their Starfleet careers, an outcome none of them, including Wesley, are prepared for. Locarno presents Wesley with a preliminary report on his damaged flight recorder, suggesting its incomplete data supports their narrative of Albert's culpability. Despite his growing unease, Wesley reluctantly agrees to maintain the cover-up.

    Later, Lt. Commander Albert visits Wesley, returning a sweater and sharing fond memories of his son. Albert expresses sorrow for his son's supposed "mistake" and apologizes for Josh having "let them down," intensifying Wesley's profound guilt. The inquiry reconvenes with Wesley on the stand. He presents his flight recorder data, which is distorted and incomplete, and recounts the agreed-upon, false sequence of events. However, Satelk introduces new evidence: navigational satellite images recorded after the Yeager loop. These images clearly show Nova Squadron in a formation drastically different from the diamond slot they claimed. Confronted with irrefutable proof of their deception, Wesley is forced to stonewall, claiming "I have none" when asked for an explanation. The act ends with the cadets in shock and Picard understanding the gravity of the situation.
