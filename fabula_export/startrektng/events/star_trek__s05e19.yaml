  - object_uuid: ger_object_5c94630f2b0e
    description_of_involvement: Saturn NavCon file 6-379 is the irrefutable evidence
      that dismantles the cadets’ cover-up. Captured by a navigational control satellite
      during a routine sensor sweep, the file shows the squadron in a chaotic formation
      seven seconds after the Yeager loop—a direct contradiction of Locarno’s testimony.
      Satelk magnifies and enhances the imagery, freezing it at the critical moment
      to expose the deception. The file’s technical precision (time index, satellite
      origin) leaves no room for doubt, making it the smoking gun of the inquiry.
      Its introduction marks the turning point where the cadets’ lies collapse.
    status_before_event: Archived in Saturn’s navigational control system, awaiting
      retrieval for the inquiry. The data is untampered and objective.
    status_after_event: Displayed on the wall monitor, freezing the room as the cadets’
      deception is exposed. The file’s authority is absolute, sealing the fate of
      the cover-up.
    global_id: ger_object_5c94630f2b0e
  - object_uuid: ger_object_cc7ca721249a
    description_of_involvement: The hearing room’s computer system is activated by
