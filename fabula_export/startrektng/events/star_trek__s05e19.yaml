    description_of_involvement: 'Starfleet, as the overarching organization, is represented
      through the inquiry’s adherence to its core values: truth, accountability, and
      institutional integrity. The USS *Enterprise*-D’s presence (via Picard) adds
      weight to the proceedings, reinforcing the stakes of the cadets’ actions. Starfleet’s
      policies on dangerous maneuvers and cover-ups are the foundation of the inquiry,
      and the organization’s reputation is on the line. The inquiry is not just about
      Nova Squadron but about upholding the standards that define Starfleet as a whole.
      The evidence presented—satellite imagery, flight logs—is a direct reflection
      of Starfleet’s technical and investigative capabilities.'
