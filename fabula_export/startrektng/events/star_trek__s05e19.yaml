  title: Boothby warns of Nova Squadron’s pride
  description: 'Picard confronts Boothby about Nova Squadron’s troubles, prompting
    the groundskeeper to draw a parallel between the cadets’ reckless ambition and
    his own past pride in a winning *Parrises Squares* team. Boothby frames Nick Locarno
    as a charismatic but dangerous leader whose influence could drive the squadron
    toward catastrophic decisions—mirroring the tragedy that has already occurred.
    The analogy serves as a veiled critique of the cadets’ hubris and foreshadows
    Wesley’s impending moral dilemma: whether to uphold loyalty to the squadron or
    expose the truth behind Joshua Albert’s death. The exchange underscores the tension
    between institutional pride and the cost of silence, while Boothby’s gardening
    metaphor (weeds choking growth) reinforces the theme of unchecked ambition destroying
    potential. Picard’s shift from dry humor to solemn reflection signals the gravity
    of the situation, framing this moment as a turning point where institutional denial
    begins to unravel.'
