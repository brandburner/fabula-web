  sequence_in_scene: 18
  key_dialogue:
  - 'LOCARNO: ... at this point we accelerated and executed a starboard turn of twenty-seven
    degrees. We came out of the turn on course for Titan.'
  - |-
    BRAND: How do you explain the fact that the low apogee turn around Titan was at least two thousand kilometers closer to the moon than indicated in your plan?
    HAJAR: We had discussed changing the approach after I filed the flight plan. The final decision was made en route to Saturn. I didn't consider it significant enough to mention here.
  - |-
    LOCARNO: Josh was a good pilot... but lately he'd been having difficulties. He would get nervous during close flybys and pull away in the final seconds... his formation flying was a little erratic.
    BRAND: And you didn't report any of this?
    LOCARNO: No sir, I didn't. We'd flown together a long time... I thought he could handle it if I gave him a chance. I was wrong.
