  sequence_in_scene: 21
  key_dialogue:
  - 'LOCARNO: ... at this point we accelerated and executed a starboard turn of twenty-seven
    degrees. We came out of the turn on course for Titan.'
  - 'BRAND: How do you explain the fact that the low apogee turn around Titan was
    at least two thousand kilometers closer to the moon than indicated in your plan?'
  - 'LOCARNO: Josh was a good pilot... but lately he''d been having difficulties.
    He would get nervous during close flybys and pull away in the final seconds...
    his formation flying was a little erratic.'
  - 'BRAND: I am... disturbed by what I''ve heard here today. By your own admission,
    you allowed your teammate to fly when you knew he was having difficulties maintaining
    formation. That demonstrates a serious lack of judgment.'
  - 'BRAND: We should have the first data from Mister Crusher''s flight recorder tonight.
    We will reconvene at thirteen hundred hours tomorrow.'
  - 'LOCARNO: Everything''s fine. Trust me.'
