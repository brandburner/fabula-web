  global_id: null
  title: Sito’s Sensor Defense Exposes Squadron Lies
  description: "\n  In the Academy hearing, **Satelk** probes **Sito** about her reliance\
    \ on sensor data rather than visual confirmation during the fatal maneuver, revealing\
    \ a critical inconsistency in Nova Squadron’s testimony. Sito’s admission that\
    \ she was flying on sensors alone—an unusual and risky practice—draws **Picard’s\
    \ skepticism**, as he notes that pilots typically rely on visual cues for formation\
    \ flying. **Brand** presses Sito further, exposing her inability to recall Albert’s\
    \ ship orientation just before the collision, which undermines the squadron’s\
    \ claim of a clean formation. **Locarno** then intervenes, shifting blame onto\
    \ Albert by describing his alleged nervousness and erratic flying, a narrative\
    \ that shocks **Wesley** and **Albert’s father** while deepening the inquiry’s\
    \ focus on whether the tragedy stemmed from procedural failure or deliberate deception.\
    \ The hearing adjourns with unresolved tension, leaving the truth—and the cadets’\
    \ complicity—hanging in the balance.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e19
  scene_sequence: 9
  sequence_in_scene: 19
  key_dialogue:
  - |-
    SATELK: Did your attention falter?
    SITO: No, sir. I was... flying on sensor readings at the time... I did not have visual contact with Cadet Albert's ship when he broke formation.
  - |-
    BRAND: If you were flying on sensors alone, perhaps you could tell us the orientation of his ship just before the collision.
    SITO: I... don't know, sir.
    BRAND: You were flying in a ship traveling eighty thousand k.p.h., with Cadet Albert's ship less than ten meters away... and you don't know what his orientation was?
  - |-
    LOCARNO: Josh was a good pilot... but lately he'd been having difficulties. He would get nervous during close flybys and pull away in the final seconds... his formation flying was a little erratic.
    BRAND: And you didn't report any of this?
    LOCARNO: No sir, I didn't. We'd flown together a long time... I thought he could handle it if I gave him a chance. I was wrong.
