      of the Kolvoord Starburst.
    - The hum of the *Enterprise*'s systems, a constant reminder of the ship's role
      as a vessel of exploration and justice.
    - The leather-bound books on Picard's desk, symbolizing the weight of history
      and tradition in Starfleet's mission.
    - The viewport showing passing stars, a visual metaphor for the vastness of space
      and the small but critical choices that define an officer's character.
