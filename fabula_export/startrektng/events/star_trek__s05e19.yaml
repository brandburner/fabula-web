- fabula_uuid: cand_evt_scene_a8de3680480c0c81_03
  global_id: null
  title: Picard delivers Wesley’s consequences
  description: 'In the quiet aftermath of the Nova Squadron inquiry, Picard meets
    Wesley under the elm tree—a location heavy with symbolic weight from earlier in
    the story—to deliver the formal repercussions of his actions. The scene is charged
    with unspoken tension: Wesley, already burdened by guilt, braces for judgment,
    while Picard, though stern, carries the weight of a mentor who has guided Wesley
    toward moral clarity rather than easy absolution. Picard reveals that Locarno
    has been expelled, taking full responsibility for the Kolvoord maneuver cover-up,
    a final act of loyalty that deepens Wesley’s regret. The punishment—stripped academic
    credits and academic probation—is severe but not unexpected, framed as a necessary
    reckoning rather than mere retribution. Picard’s refusal to offer hollow comfort
    ("You should feel bad... and you will pay for what you did") underscores the gravity
    of Wesley’s choices, while his echoing of Boothby’s wisdom ("You knew what you
    had to do... I just made sure you listened to yourself") reinforces the theme
    of personal accountability. The handshake that follows isn’t just a farewell;
    it’s a silent acknowledgment of the cost Wesley must now carry alone. The scene
    closes with a fade-out, leaving Wesley’s isolation—and the weight of his conscience—unresolved,
    a deliberate narrative choice to emphasize that moral clarity doesn’t always bring
    peace.'
