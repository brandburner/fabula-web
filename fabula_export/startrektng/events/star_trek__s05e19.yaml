  title: Locarno Tests Wesley’s Loyalty
  description: In Wesley’s dormitory, Picard and Beverly arrive to check on him post-accident,
    but his guarded demeanor—avoiding discussion of Joshua’s death—reveals his emotional
    withdrawal. Locarno’s sudden entrance disrupts the moment, his presence immediately
    altering Wesley’s posture and tone. After Picard and Beverly depart, Locarno shifts
    from sympathetic squadron leader to interrogator, probing Wesley’s readiness for
    the inquiry. His insistence that ‘everything’s going to be all right—as long as
    we stick together’ is a veiled command, exposing the pressure to maintain the
    cover-up. Wesley’s hesitation and physical exhaustion contrast with Locarno’s
    controlled charisma, underscoring the moral fracture between duty and truth. The
    scene crystallizes the tension between loyalty to the squadron and the weight
    of complicity, with Locarno’s manipulation serving as the first overt test of
    Wesley’s resolve.
