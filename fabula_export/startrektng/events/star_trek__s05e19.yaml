- fabula_uuid: act_13e80543f75d6182
  number: 2
  summary: |-
    Picard walks the Academy grounds, lost in thought, and encounters Boothby, the irascible groundskeeper who knew Picard as a cadet. Boothby, after a brief, nostalgic exchange, subtly shifts the conversation to Nova Squadron, confirming his familiarity with all its members, including the deceased Cadet Albert. His cryptic tone leaves Picard unsettled. Meanwhile, Nova Squadron prepares for the inquiry, with Locarno reinforcing their bond. He praises the team's unity and friendship, preparing them for "tough times ahead" and emphasizing their need to "come through for each other."

    The informal court of inquiry begins, led by Admiral Brand and Captain Satelk. Locarno testifies first, using a schematic display to present a seemingly honest and straightforward account of the flight, detailing a standard diamond slot formation and a Yeager loop maneuver. Hajar, the team navigator, corroborates the story but admits to a minor deviation from the flight plan, downplaying its significance. Sito, in the tail position, claims she saw nothing due to flying on sensors, an explanation Picard finds unusual. The judges' suspicion grows as inconsistencies emerge. Locarno, sensing the pressure, then reluctantly blames Albert, stating he "panicked" and "tried to pull out of the turn prematurely," causing the collision. This statement shocks Wesley and deeply affects Lt. Commander Albert. Brand expresses her disturbance at the team's lack of judgment and delayed reporting, recessing the inquiry. Locarno, confident despite the mounting suspicion, reassures Wesley, "Everything's fine. Trust me," as the act concludes, leaving Wesley in a swirl of conflicting emotions.
