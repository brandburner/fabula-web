      scandal.
    - Ensure that cadets face consequences commensurate with their actions, reinforcing
      the seriousness of the Academy’s policies.
    influence_mechanisms:
    - Disciplinary actions (cancellation of credits, formal reprimands, denial of
      advancement).
    - Delegation of authority (Picard as the messenger of the Academy’s decision).
