  title: Locarno Shifts Blame to Albert
  description: 'During the Academy hearing, Locarno delivers a calculated testimony
    that frames Joshua Albert as a reckless, unstable pilot whose panic caused the
    fatal collision. He admits to knowing about Albert’s formation-flying difficulties
    but claims he withheld the information to protect his friend’s reputation. The
    testimony fractures trust in the room: Picard’s skepticism deepens, Commander
    Albert is visibly shaken, and Wesley is left stunned by the betrayal. Hajar and
    Sito corroborate Locarno’s story, though Sito’s discomfort is palpable. Brand,
    disturbed by the cadets’ lack of transparency, adjourns the hearing until the
    flight recorder data can be reviewed, raising the stakes for Wesley’s moral dilemma.
    The scene sharpens the narrative’s central tension between loyalty and accountability,
    as Locarno’s lie obscures the truth and forces Wesley to confront the consequences
    of his silence.'
