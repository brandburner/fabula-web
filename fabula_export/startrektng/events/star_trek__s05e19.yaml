  - organization_uuid: ger_organization_87e355d3463a
    description_of_involvement: 'Starfleet Academy is represented through the disciplinary
      actions taken by Admiral Brand, as relayed by Picard. The organization’s influence
      is felt in the punishment Wesley receives—cancellation of academic credits,
      a formal reprimand, and denial of advancement with his class. This event underscores
      the Academy’s commitment to upholding truth and accountability, even when it
      comes at a personal cost to its cadets. The confrontation between Picard and
      Wesley is a microcosm of the Academy’s values in action: moral clarity, institutional
      integrity, and the consequences of failing to live up to those standards. The
      organization’s power dynamics are evident in Picard’s role as the messenger
      of its discipline, reinforcing the hierarchy and expectations of Starfleet’s
      training environment.'
