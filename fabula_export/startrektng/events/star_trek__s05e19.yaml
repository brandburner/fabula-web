      table, and a viewscreen—contrasts sharply with the raw, personal grief and guilt
      unfolding. The subdued lighting and empty space amplify the isolation Wesley
      feels, as well as the weight of the unspoken truth. The hearing room is not
      just a physical space but a symbolic arena where institutional protocols collide
      with personal morality, forcing Wesley to confront the consequences of his actions.
