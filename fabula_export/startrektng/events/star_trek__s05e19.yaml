  title: Picard delivers Wesley’s formal reprimand
  description: 'In the quiet aftermath of Joshua Albert’s death and Locarno’s self-sacrificing
    confession, Picard confronts Wesley under the elm tree on Academy grounds. The
    weight of Locarno’s expulsion—his final act of loyalty to the squadron—crushes
    Wesley, who realizes the full cost of his silence. Picard delivers the formal
    disciplinary decision: Wesley’s academic credits are revoked, and he will not
    graduate with his class. The punishment is severe but just, forcing Wesley to
    endure public shame while grappling with his guilt. Picard’s measured words—echoing
    Boothby’s earlier wisdom—validate Wesley’s moral reckoning, though the dismissal
    leaves him isolated. The scene crystallizes the irreversible consequences of Wesley’s
    choices, marking a turning point where his loyalty to Starfleet and his squadron
    collapses under the weight of truth. The handshake between them feels like a final,
    solemn acknowledgment of what Wesley has lost and what he must now carry alone.'
