      and accountability, while the antique bell and historical decor evoke the legacy
      of Starfleet’s traditions—traditions the cadets are now betraying.
    access_restrictions: Restricted to those directly involved in the inquiry (judges,
      cadets, spectators with a stake in the case). The hearing is informal but still
      governed by Starfleet protocols, with Brand and Satelk controlling the flow
      of information.
