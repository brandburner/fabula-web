  title: Satellite evidence exposes Nova Squadron’s lie
  description: "\n  In the formal inquiry, Admiral Brand and Captain Satelk present\
    \ distorted flight recorder footage of Nova Squadron’s approach to Titan, forcing\
    \ Wesley to recount the fatal Yeager loop maneuver that killed Joshua Albert.\
    \ The recovered data cuts off abruptly, leaving the collision and Wesley’s escape\
    \ unrecorded. When Satelk demands Wesley confirm the squadron’s formation during\
    \ the loop, he hesitates—his silence revealing the deception. Satelk then introduces\
    \ irrefutable satellite imagery from Saturn’s navigational control system, capturing\
    \ the squadron in a non-standard formation *seven seconds after* the loop. The\
    \ evidence contradicts Locarno’s earlier testimony, exposing the cover-up. Wesley’s\
    \ refusal to justify the lie—despite the mounting pressure—marks the collapse\
    \ of his loyalty to the squadron and the beginning of his moral reckoning. The\
    \ moment escalates the crisis, ensuring his exposure is imminent and forcing the\
    \ inquiry toward a reckoning with the truth.\n  "
