  title: Picard forces Wesley to confront the Starburst lie
  description: 'In a tense, emotionally charged confrontation in the ready room, Picard
    ambushes Wesley with irrefutable evidence of Nova Squadron’s forbidden Kolvoord
    Starburst maneuver—the reckless, banned flight sequence that caused Joshua Albert’s
    death. Picard methodically dismantles Wesley’s evasive testimony, exposing the
    lie of omission that has defined the inquiry. The exchange escalates from clinical
    interrogation to a moral reckoning, with Picard invoking Wesley’s past potential
    as an officer to underscore the betrayal of Starfleet’s core values. Wesley’s
    refusal to answer directly (despite Picard’s withering stare) reveals his fractured
    loyalty—caught between squadron camaraderie and the weight of his complicity.
    The scene culminates in Picard’s ultimatum: Wesley must confess the truth to Admiral
    Brand, or Picard will do it for him. The confrontation fractures Wesley’s resolve,
    setting up his inevitable breakdown and the unraveling of Locarno’s cover-up.
    The dialogue crackles with subtext: Picard’s disappointment isn’t just professional—it’s
    personal, rooted in Wesley’s unfulfilled promise, while Wesley’s silence speaks
    volumes about his guilt and fear of isolation. The moment is a turning point,
    where the moral cost of the accident becomes inescapable for Wesley, and Picard’s
    role shifts from mentor to judge.'
