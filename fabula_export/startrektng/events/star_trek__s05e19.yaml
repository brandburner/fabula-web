  title: Wesley confesses the Kolvoord Starburst truth
  description: "\n  In a formal hearing room, Admiral Brand formally closes the inquiry\
    \ into Joshua Albert's death, citing unresolved contradictions between cadet testimony\
    \ and satellite data. As she delivers a reprimand to Nova Squadron for filing\
    \ an inaccurate flight plan, Wesley Crusher abruptly stands to amend his testimony.\
    \ With visible emotional strain, he admits the squadron performed the forbidden\
    \ Kolvoord Starburst maneuver—an advanced, high-risk maneuver they knew was prohibited—after\
    \ the Yeager loop. Wesley takes direct responsibility for pressuring Joshua into\
    \ the maneuver, stating they 'thought we could do anything' before the fatal crash.\
    \ His confession directly exonerates Joshua from blame, shifting responsibility\
    \ to the squadron's reckless ambition. The room reacts with shock as Wesley turns\
    \ to Joshua's father, Commander Albert, and delivers a heartbreaking apology:\
    \ 'Josh didn't let us down, sir. It wasn't his fault.' The confession shatters\
    \ the squadron's code of silence, forcing Admiral Brand to reopen the inquiry\
    \ and confront Locarno, the squadron leader, who remains defiantly silent. This\
    \ moment marks Wesley's moral reckoning, where institutional loyalty collapses\
    \ under the weight of personal integrity and grief.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e19
  scene_sequence: 20
  sequence_in_scene: 46
  key_dialogue:
  - 'BRAND: Captain Satelk and I have gone over your testimony and the physical evidence
    from the crash. Your statements cannot be reconciled with the data collected from
    the NavCon satellite. Your unwillingness to offer any explanation for this contradiction
    is disappointing, and it raises suspicion. We cannot escape the conclusion that
    either the data is faulty in some way... or you have lied to us.'
  - 'WESLEY: Yesterday, I testified that the crash occurred following a Yeager loop.
    That''s not entirely true. We did perform the loop. But after that, we broke formation...
    and attempted a Kolvoord Starburst. We knew it was prohibited and that it would
    be dangerous, but we wanted to do something spectacular for the commencement demonstration...
    So we pushed Josh... and he wasn''t ready. We thought we could do it... we thought
    we could do anything. We were wrong... and Josh died.'
  - 'WESLEY: Josh didn''t let us down, sir. It wasn''t his fault.'
