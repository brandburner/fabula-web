  - organization_uuid: ger_organization_cb62a8e5ebc8
    description_of_involvement: Nova Squadron is the subject of the inquiry, its unity
      and loyalty tested by the evidence. The organization’s culture—built on camaraderie,
      ambition, and a willingness to push boundaries—is exposed as both its strength
