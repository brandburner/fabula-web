  key_dialogue: &id001
  - 'PICARD: ((V.O.)) Captain''s log, stardate 45703.9. We are en route to Earth,
    where it will be my pleasant duty to deliver this year''s commencement address
    at Starfleet Academy. I''m also looking forward to seeing Wesley Crusher again.
    His flight team will perform a demonstration near Saturn that will be transmitted
    to the graduation ceremonies.'
  - 'PICARD: We''ve met a few times. She''s a... formidable woman.'
  - 'RIKER: When I was at the Academy, we had a Vulcan superintendent who memorized
    the personnel file of every single cadet. He knew everything. It was like having
    your parents there with you. All the time.'
  - 'PICARD: My superintendent was a Betazoid—a full telepath. When he called you
    into his office, he didn’t have to ask what you’d done.'
  - 'WORF: Captain, we are being hailed by the Academy again. It is Admiral Brand.'
  - 'PICARD: On-screen.'
  - 'WORF: Sir, she is requesting a private channel.'
