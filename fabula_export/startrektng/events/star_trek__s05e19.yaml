      force shaping the inquiry’s proceedings. Its values—truth, accountability, and
      safety—are the bedrock of Brand’s authority, and its protocols dictate the cadets’
      fates. The Academy’s presence is felt in the formal reprimands, the revocation
      of flight privileges, and the unspoken threat of expulsion. It is both judge
