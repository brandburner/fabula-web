  global_id: null
  title: Picard reveals Locarno’s self-sacrifice
  description: "\n  In a quiet, emotionally charged confrontation under the elm tree\
    \ on Starfleet Academy grounds, Picard delivers the devastating truth to Wesley:\
    \ Locarno has taken full blame for the Kolvoord Starburst disaster, shielding\
    \ the rest of Nova Squadron—including Wesley—from expulsion. Picard’s measured\
    \ delivery contrasts with Wesley’s visceral reaction, revealing the depth of his\
    \ guilt and self-loathing. The revelation forces Wesley to confront his complicity\
    \ in the cover-up, the moral weight of his silence, and the fragility of his loyalty\
    \ to both Starfleet’s ideals and his squadron. Picard’s final words—echoing Boothby’s\
    \ mentorship—reinforce the cost of Wesley’s choices, leaving him to grapple with\
    \ the irreversible consequences of his inaction. The moment crystallizes Wesley’s\
    \ transformation from a conflicted cadet to someone who must now live with the\
    \ weight of his decisions, while also underscoring Picard’s role as a moral compass\
    \ who ensures Wesley faces the truth, no matter how painful.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e19
  scene_sequence: 22
  sequence_in_scene: 52
  key_dialogue: &id019
  - 'PICARD: Mister Locarno has been expelled.'
  - 'WESLEY: ((bitter)) They should''ve expelled all of us.'
  - 'PICARD: They almost did. But... Mister Locarno made an impassioned plea for the
    rest of you. He said he used his influence as squadron leader to convince you
    all to try the Kolvoord maneuver and then to cover up the truth. He asked to take
    full responsibility.'
  - 'WESLEY: ((a sad laugh)) He did exactly what he said he would—he protected the
    team. I feel awful... I''ve let everybody down... my friends, Mom, you.'
  - 'PICARD: You should feel bad... and you will pay for what you did. Admiral Brand
    has decided that, in addition to a formal reprimand, your academic credits for
    the past year will be cancelled and you will not advance with your class.'
  - 'PICARD: ((echoing Boothby''s words)) You knew what you had to do... I just made
    sure you listened to yourself. Good-bye, Cadet.'
