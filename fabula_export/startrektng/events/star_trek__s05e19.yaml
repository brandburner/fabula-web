  title: Picard reassures Beverly about Wesley
  description: "\n  In the quiet intimacy of Beverly’s quarters, Picard delivers the\
    \ grim details of Wesley’s near-fatal training accident—second-degree burns, a\
    \ fractured arm, and the death of his friend Joshua Albert—while Beverly clings\
    \ to clinical detachment as a shield against maternal panic. Her questions about\
    \ medical protocols (regeneration series, metorapan allergies) betray her need\
    \ for control, but Picard’s firm reassurances ('He's fine') force her to confront\
    \ the raw terror she’s suppressed: that Wesley’s ambition in Starfleet could cost\
    \ him his life. The moment pivots when she asks *how* it happened, revealing her\
    \ deeper fear isn’t just injury but the *unknown*—the unspoken risks of the Academy’s\
    \ culture. Picard’s abrupt departure for Admiral Brand’s briefing leaves Beverly\
    \ alone, her forced smile collapsing into silent grief as the weight of Wesley’s\
    \ moral crossroads (loyalty vs. truth) looms over them both. The scene functions\
    \ as a pressure valve: Picard’s duty pulls him toward institutional accountability,\
    \ while Beverly’s unspoken dread underscores the personal stakes of the coming\
    \ inquiry.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e19
  scene_sequence: 3
  sequence_in_scene: 7
  key_dialogue:
  - |-
    BEVERLY: Have they completed the regeneration series?
    PICARD: I'm... not certain.
    BEVERLY: Wesley's allergic to metorapan treatments... they'll have to use a bicaridine substitute.
  - |-
    BEVERLY: How did it happen?
    PICARD: Apparently, Wesley's squadron was practicing on the Academy flight range near Saturn... they were in close formation when there was a collision... all five ships were destroyed. Four of the cadets managed to transport out... one did not.
    BEVERLY: Do you know who it was?
    PICARD: His name was Joshua Albert.
  - |-
    BEVERLY: Wesley talked about him... They were friends...
    PICARD: Beverly. Wesley is alive and well.
