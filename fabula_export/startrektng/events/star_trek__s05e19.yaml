      and Satelk—reinforces Starfleet’s institutional gravity, making the cadets’
      deception feel all the more transgressive. The space is both a courtroom and
      a moral crucible, where Wesley’s loyalty to the squadron is tested against the
      truth. The hearing room’s symbolism is unmistakable: it is a place of judgment,
      where personal bonds must yield to accountability.'
