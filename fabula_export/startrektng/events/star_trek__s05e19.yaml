      integrity, sending a clear message to cadets about the consequences of dishonesty
      and cover-ups.
    internal_dynamics: The event highlights the tension between individual loyalty
      (to the squadron) and institutional loyalty (to Starfleet’s values), a dynamic
      that the Academy must navigate in its training of future officers.
