  - object_uuid: ger_object_e48d127032d1
    description_of_involvement: 'The Academy Hearing Room Monitor is a critical tool
      in this event, projecting a schematic of Saturn, its moons, and the five Valkyrie-class
      fighters of Nova Squadron. Locarno uses it to illustrate his false account of
      the fatal maneuver, pointing to the display as he describes the flight paths
      and the collision. The monitor zooms in on the ships’ formations, visually reinforcing
      Locarno’s narrative while also highlighting inconsistencies—such as the deviation
      from the filed flight plan—that Brand and Satelk later challenge. The monitor’s
      ability to display and manipulate the flight data makes it a double-edged tool:
      it supports Locarno’s deception but also provides the evidence that could eventually
      expose it.'
    status_before_event: Active and displaying the pre-loaded flight path schematic
      of Saturn and the Nova Squadron ships, set up by the hearing room staff prior
      to the inquiry.
    status_after_event: Turned off by Captain Satelk after Sito’s testimony, leaving
      the room with a sense of unresolved tension and the unspoken implication that
      the monitor’s data could be revisited for further scrutiny.
