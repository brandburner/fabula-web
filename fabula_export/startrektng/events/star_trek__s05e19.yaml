    confides in Picard that Wesley has been uncharacteristically secretive about the
    Nova Squadron accident, refusing her help and displaying unmistakable signs of
    guilt. Her maternal intuition—backed by Wesley’s cryptic behavior—suggests he’s
    hiding something critical about the crash. Picard’s grim acknowledgment signals
    his growing concern that Wesley’s silence may be tied to the forbidden Kolvoord
    Starburst maneuver, escalating the moral dilemma at the heart of the investigation.
    The moment forces Picard to confront the possibility that his surrogate son could
    be complicit in a cover-up, deepening the personal stakes of the inquiry.
