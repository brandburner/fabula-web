  - organization_uuid: ger_organization_cb62a8e5ebc8
    description_of_involvement: 'Nova Squadron, once a tight-knit unit bound by loyalty
      and ambition, is fractured by Wesley’s confession. The squadron’s collective
      identity is on trial, and the event forces its members to confront the cost
      of their deception. Locarno’s denial is a desperate attempt to preserve the
      squadron’s reputation, but it also exposes the moral rot at its core. The squadron’s
      involvement in the event is a study in contradiction: it was built on trust
      and excellence, but those very ideals led to Joshua’s death and the cover-up
      that followed. The event marks the beginning of the squadron’s dissolution,
      as the truth undermines the bonds that once held them together.'
    active_representation: Through the cadets’ testimony, their body language, and
      the unspoken tensions between them (e.g., Wesley’s confession vs. Locarno’s
      denial).
    power_dynamics: Being challenged by the inquiry’s authority, with the squadron’s
      future hanging in the balance. The cadets are no longer in control—they are
      being judged, and their power lies only in their willingness to tell the truth.
    organizational_goals:
    - To maintain the squadron’s unity and reputation, even at the cost of the truth.
    - To protect its members from the consequences of their actions, no matter how
      misguided.
    influence_mechanisms:
    - Through peer pressure and the unspoken code of loyalty that binds the cadets
      together.
    - Through Locarno’s leadership, which prioritizes the squadron’s image over individual
      accountability.
    - Through the collective silence of Sito and Hajar, which reinforces the cover-up
      and isolates Wesley.
    institutional_impact: The event signals the end of Nova Squadron as it was, forcing
      a reckoning with the moral failures that led to Joshua’s death. The squadron’s
      future will be shaped by this moment—either it will reform with a renewed commitment
      to truth, or it will dissolve entirely, a casualty of its own hubris.
    internal_dynamics: The squadron is torn between loyalty to its members and the
      truth about what happened. Wesley’s confession exposes the fracture, while Locarno’s
      denial represents the old guard’s refusal to change. The event lays bare the
      tension between ambition and integrity, a conflict that will define the squadron’s
      legacy.
    global_id: ger_organization_cb62a8e5ebc8
