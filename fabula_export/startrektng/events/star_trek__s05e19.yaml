  global_id: null
  title: Wesley forced to confess the Yeager loop
  description: "\n  Admiral Brand presents distorted flight log footage of Wesley’s\
    \ squadron approaching Titan, forcing him to recount the fatal Yeager loop maneuver\
    \ that led to Joshua Albert’s death. The fragmented data cuts off abruptly at\
    \ Titan’s clearance, but Wesley describes the subsequent collision and his emergency\
    \ transport—exposing the dangerous, forbidden tactic. When Satelk confronts him\
    \ with satellite evidence of the squadron’s formation breakdown, Wesley’s evasive\
    \ silence collapses under the weight of the proof. The moment marks the irreversible\
    \ unraveling of the cover-up, as Wesley’s refusal to justify the deception escalates\
    \ the crisis and ensures his exposure is imminent. The tension peaks when Brand\
    \ directly challenges him, leaving Wesley trapped between loyalty to his squadron\
    \ and the truth about the maneuver that killed his friend.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e19
  scene_sequence: 13
  sequence_in_scene: 30
  key_dialogue:
  - 'BRAND: Are you ready, Mister Crusher?'
  - 'WESLEY: ((demonstrates with hands)) The ships begin in a diamond slot formation.
    They climb and loop backwards at a steep angle... at the peak of the loop, all
    five ships flip over and accelerate in a new direction.'
  - 'SATELK: Mister Crusher, did your team remain in a diamond slot formation throughout
    the loop?'
  - 'BRAND: Mister Crusher, are these ships in a diamond slot formation?'
  - 'WESLEY: No, sir.'
