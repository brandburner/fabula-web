- fabula_uuid: cand_evt_scene_4509d34e7b949a32_05
  global_id: null
  title: Locarno’s False Testimony and Wesley’s Dilemma
  description: "\n  In the informal court of inquiry, Locarno delivers a carefully\
    \ constructed false account of the fatal training exercise, blaming Cadet Joshua\
    \ Albert’s erratic flying for the collision. He fabricates details about Albert’s\
    \ nervousness and premature pull-out, framing the tragedy as an individual failure\
    \ rather than a result of the forbidden Kolvoord Starburst maneuver. Admiral Brand\
    \ and Captain Satelk probe inconsistencies—Hajar’s evasive answers about the altered\
    \ flight path and Sito’s claim of relying solely on sensors—but Locarno’s charismatic\
    \ leadership and plausible deniability keep the narrative intact. Wesley, seated\
    \ among the cadets, remains visibly tense, his internal conflict escalating as\
    \ Locarno’s lies directly contradict his own knowledge of the truth. The scene\
    \ culminates with Locarno reassuring Wesley that ‘everything’s fine,’ a hollow\
    \ promise that deepens Wesley’s moral crisis. The inquiry adjourns with unresolved\
    \ questions, setting up the next phase of the investigation and forcing Wesley\
    \ to confront whether his silence is complicity. The tension between institutional\
    \ trust (in Brand and the inquiry) and squadron loyalty (in Locarno) reaches a\
    \ breaking point, with Wesley’s guilt and fear of betrayal now visibly at odds\
    \ with his sense of justice.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e19
