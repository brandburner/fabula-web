  title: Picard confronts Boothby’s quiet legacy
  description: Picard, wandering the somber Academy grounds after Joshua Albert’s
    death, stumbles upon Boothby—a groundskeeper who once served as his unyielding
    mentor during his cadet years. Their reunion is marked by Picard’s uncharacteristic
    vulnerability as he attempts to express gratitude for Boothby’s harsh but formative
    guidance, only for Boothby to deflect the praise with characteristic gruffness.
    The exchange reveals Picard’s lingering respect for the man who forced him to
    confront his own flaws, while Boothby’s cryptic knowledge of Nova Squadron—including
    Joshua Albert—hints at deeper institutional awareness of the cadets’ dangerous
    maneuvers. The moment underscores the theme of *unseen guidance*, framing Picard’s
    past mentorship as a precursor to his current role guiding Wesley through moral
    crisis. Boothby’s abrupt shift in tone when discussing the squadron foreshadows
    his hidden role in the unfolding tragedy, leaving Picard unsettled and the audience
    primed for further revelations about the Academy’s complicity.
