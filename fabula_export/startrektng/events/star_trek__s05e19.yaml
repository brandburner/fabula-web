- fabula_uuid: cand_evt_scene_7cffc98b8b34d33b_04
  global_id: null
  title: Locarno’s Silent Betrayal and Wesley’s Truth
  description: "\n  In the hearing room, Admiral Brand prepares to close the investigation\
    \ into Nova Squadron’s fatal training exercise, citing unresolved contradictions\
    \ between the cadets’ testimony and satellite data. As she delivers formal reprimands\
    \ and revokes flight privileges, Wesley Crusher abruptly stands to amend his testimony.\
    \ He confesses that the crash resulted from a forbidden Kolvoord Starburst maneuver—one\
    \ he and the squadron had concealed out of pride and ambition. His admission forces\
    \ the room to confront the truth: Joshua Albert’s death was not an accident but\
    \ a consequence of reckless hubris. When Brand presses the remaining squadron\
    \ members for confirmation, Sito and Hajar remain silent, but Locarno—Nova’s leader—explicitly\
    \ denies Wesley’s claim with a chilling, calculated lie. His refusal to take responsibility\
    \ exposes the depth of the cover-up and the moral fracture within the squadron,\
    \ while Wesley’s confession becomes the catalyst for the inquiry’s true reckoning.\
    \ The moment crystallizes the cost of loyalty to a flawed ideal and the weight\
    \ of individual accountability.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e19
  scene_sequence: 20
  sequence_in_scene: 48
  key_dialogue:
  - 'BRAND: Captain Satelk and I have gone over your testimony and the physical evidence
    from the crash. Your statements cannot be reconciled with the data collected from
    the NavCon satellite. Your unwillingness to offer any explanation for this contradiction
    is disappointing, and it raises suspicion. We cannot escape the conclusion that
    either the data is faulty in some way... or you have lied to us.'
  - 'WESLEY: Yesterday, I testified that the crash occurred following a Yeager loop.
    That''s not entirely true. We did perform the loop. But after that, we broke formation...
    and attempted a Kolvoord Starburst. We knew it was prohibited and that it would
    be dangerous, but we wanted to do something spectacular for the commencement demonstration...
    So we pushed Josh... and he wasn''t ready. We thought we could do it... we thought
    we could do anything. We were wrong... and Josh died.'
  - 'LOCARNO: No, sir.'
