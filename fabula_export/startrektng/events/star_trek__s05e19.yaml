  title: Picard forces Wesley to confront his lie
  description: 'In the ready room, Picard confronts Wesley with irrefutable evidence
    of Nova Squadron’s forbidden Kolvoord Starburst maneuver—the direct cause of Joshua
    Albert’s death. Wesley initially evades the question, but Picard dismantles his
    deflection by exposing the lie of omission in his testimony. The captain invokes
    Starfleet’s core principle of truth, framing Wesley’s silence as a betrayal of
    his potential and the uniform he wears. When Wesley refuses to answer directly,
    Picard delivers an ultimatum: either Wesley confesses to Admiral Brand or Picard
    will. The exchange fractures their mentor-mentee bond, forcing Wesley to choose
    between loyalty to his squadron and accountability to the truth. Picard’s disappointment
    is palpable, rooted in Wesley’s unfulfilled promise and the moral cost of complicity.
    The scene escalates the narrative tension, pushing Wesley toward a crisis of conscience
    while underscoring the thematic stakes of integrity versus peer pressure.'
