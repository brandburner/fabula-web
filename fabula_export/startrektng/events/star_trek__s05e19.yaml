- fabula_uuid: cand_evt_scene_0db6e59b3fb7528d_03
  global_id: null
  title: Locarno Manipulates Wesley into Silence
  description: 'In Wesley’s dorm room, Locarno orchestrates a calculated emotional
    campaign to coerce Wesley into suppressing the truth about the fatal Kolvoord
    Starburst maneuver. He begins by framing Josh’s death as an inevitable consequence
    of panic, subtly enlisting Hajar and Sito’s reluctant agreement to isolate Wesley.
    When Wesley resists, Locarno shifts tactics—first presenting a doctored flight
    recorder report as "evidence" of Josh’s culpability, then appealing to Wesley’s
    loyalty to the squadron and his shared history with Josh. The speech is masterful:
    Locarno invokes their unbreakable bond as Nova Squadron, the trust required in
    high-stakes missions, and even Josh’s hypothetical wishes for their unity. Wesley’s
    resistance crumbles under the weight of peer pressure, institutional fear, and
    the guilt of betraying his fallen friend’s memory. The moment marks Wesley’s moral
    compromise, where institutional survival outweighs truth—a turning point that
    will later haunt him during the inquiry and his confrontation with Commander Albert.
    The scene underscores how institutional loyalty can corrupt even the most principled
    individuals, particularly when wielded by a charismatic leader like Locarno, whose
    ambition is masked as camaraderie.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e19
  scene_sequence: 11
  sequence_in_scene: 27
  key_dialogue:
  - 'LOCARNO: ((gentle)) Look... he was my friend, too. I worked to get him on this
    team. But the truth is... he panicked.'
  - 'LOCARNO: ((to everyone)) Are we ready for that? [A long beat. None of them, even
    Wesley, is ready to leave the Academy.]'
  - 'LOCARNO: The first night I met you, Wes... I knew I wanted you on this squad.
    I knew what you''d bring to it... you, more than any of the others, would understand
    what it means to be able to count on someone. We made a promise, right in the
    beginning, that we''d stick together. We were Nova Squadron—nobody else could
    say that. And even after we graduated we''d try to get posted to the same duty...
    we were going to be a team—for a long time. Josh can''t be a part of those plans
    anymore. But I think he''d still want us to be a team. What do you think?'
