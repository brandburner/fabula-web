    description_of_involvement: The antique ship’s bell serves as a symbolic tool
      for procedural control in this event. Brand uses it to silence the room and
      bring the inquiry to order, its deep resonant tone cutting through the tension.
      The bell’s ring marks the beginning and end of the session, reinforcing the
      formal and institutional nature of the hearing. Its sound is a reminder that,
      despite the informality of the proceedings, the inquiry is still bound by Starfleet’s
      rules and protocols. The bell also underscores the gravity of the moment, as
      its strikes bookend the cadets’ testimonies and the unresolved questions that
      linger in the room.
    status_before_event: Placed on the judges’ table at the beginning of the hearing,
      ready to be used to maintain order.
