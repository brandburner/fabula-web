- fabula_uuid: act_ad22785d7351e617
  number: 4
  summary: |-
    Beverly Crusher, her maternal instincts fully aroused, confronts Wesley in his dorm room, determined to find an explanation for the satellite data and protect his career. She suggests the data might be tampered with and plans to intervene with Admiral Brand. Wesley, however, firmly stops her, asking her to "stay out of it." This refusal, combined with his demeanor, makes Beverly realize that Wesley is not entirely innocent, compounding her shock and sorrow. She embraces him, understanding the depth of his trouble.

    Meanwhile, Picard seeks further insight from Boothby, the groundskeeper. Boothby, in a more direct conversation, confirms Locarno's powerful influence over Nova Squadron, describing him as a "natural leader" whom the team would follow "even if it means going right over a cliff." This reinforces Picard's suspicions about Locarno's role. Picard then joins Geordi and Data in Main Engineering to review the flight recorder data. Despite initial difficulties in simulating the crash, they uncover several anomalies in Wesley's ship's operation: fluctuating starboard power flow, low fluidic pressure in landing struts, and, critically, an open coolant interlock just before the maneuver around Titan. Data notes this procedure is "extremely hazardous" in flight, and Geordi explains it's the first step in purging plasma exhaust, which would likely "ignite the plasma." Picard, connecting these seemingly disparate pieces of information, has a sudden, grim realization: the squadron intentionally ignited their plasma trails. He deduces they were attempting the forbidden Kolvoord Starburst maneuver, a dangerous act that directly caused the accident. This revelation solidifies Picard's understanding of the truth behind the cover-up.
