    global_id: ger_organization_87e355d3463a
  - organization_uuid: ger_organization_cb62a8e5ebc8
    description_of_involvement: 'Nova Squadron, as the subject of the inquiry, is
      a collective entity whose fate hangs in the balance during this event. The squadron’s
      unity is both its strength and its weakness: while it provides the cadets with
      a sense of belonging and shared purpose, it also pressures them to maintain
      a united front, even at the cost of the truth. Locarno’s leadership is central
      to this dynamic, as he uses his charisma and authority to keep the cadets aligned
      with his narrative. The inquiry threatens to expose the cracks in this unity,
      as the cadets’ testimonies are challenged and their loyalty to one another is
      tested. The squadron’s involvement in this event is a study in the tension between
      group cohesion and individual integrity, as each cadet must decide whether to
      prioritize their personal values or their loyalty to the team.'
    active_representation: Through the collective action of the cadets, who present
      a united front in their testimonies, and through Locarno’s leadership, which
      binds them to his narrative. The squadron’s presence is felt in the way the
      cadets support one another, even as their individual guilt and fear begin to
      surface.
    power_dynamics: Operating under the constraint of Locarno’s leadership and the
      pressure to maintain squadron unity. The cadets’ power lies in their ability
      to control the narrative, but this power is fragile, as it depends on their
      willingness to lie and their fear of the consequences of speaking up.
    organizational_goals:
    - To protect the squadron’s reputation and ensure that its members are not held
      individually accountable for the accident.
    - To maintain the unity and morale of the team, even in the face of external scrutiny
      and internal conflict.
    influence_mechanisms:
    - Through Locarno’s charismatic leadership, which keeps the cadets aligned with
      his version of events.
    - Through the pressure of peer loyalty, which discourages any cadet from speaking
      up and risking the squadron’s cohesion.
    - Through the shared fear of expulsion or disciplinary action, which motivates
      the cadets to stick to the cover-up.
    institutional_impact: The inquiry threatens to dismantle the squadron’s unity,
      as the truth about the Kolvoord Starburst and the cadets’ role in the accident
      comes to light. The outcome will determine whether Nova Squadron survives as
      a team or is broken apart by the consequences of its actions.
    internal_dynamics: The hearing exposes the internal tensions within the squadron,
      as the cadets grapple with their guilt, their fear of expulsion, and their loyalty
      to Locarno. Wesley’s internal conflict is a microcosm of these tensions, as
      he struggles to reconcile his moral obligations with his desire to belong to
      the team.
    global_id: ger_organization_cb62a8e5ebc8
