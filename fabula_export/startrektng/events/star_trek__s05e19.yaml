  global_id: null
  title: Wesley Confesses the Kolvoord Truth
  description: "\n  At the formal Starfleet Academy inquiry into Joshua Albert’s death,\
    \ Wesley Crusher—physically and emotionally battered—breaks his silence under\
    \ the weight of guilt and Picard’s moral guidance. He admits Nova Squadron performed\
    \ the forbidden Kolvoord Starburst maneuver, directly causing the fatal accident.\
    \ Locarno, initially defiant, crumbles under the mounting evidence (including\
    \ satellite data and Sito’s corroboration) and takes full responsibility, though\
    \ his confession is framed as a calculated move to protect his squadron’s legacy\
    \ rather than genuine remorse. The inquiry’s verdict—Locarno’s expulsion and Wesley’s\
    \ reprimand—marks the irreversible consequences of their choices, with Wesley’s\
    \ integrity costing him his future at the Academy. The scene underscores the tension\
    \ between institutional loyalty and moral accountability, while Picard’s silent\
    \ presence validates Wesley’s sacrifice as the right path, even at personal cost.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e19
  scene_sequence: 21
  sequence_in_scene: 50
  key_dialogue:
  - 'WESLEY: "It was the Kolvoord Starburst. We all knew the risks. I should have
    stopped it."'
  - 'LOCARNO: "You’re lying. The flight recorder’s corrupted. There’s no proof."'
  - 'SATELK: "The satellite feed tells a different story, Cadet. Your trajectory matches
    the maneuver’s signature."'
  - 'LOCARNO: "Fine. It was my call. I take full responsibility."'
