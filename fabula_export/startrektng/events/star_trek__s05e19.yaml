    description_of_involvement: 'The **Academy Hearing Room** serves as the formal
      setting for the inquiry, its somber, traditional atmosphere amplifying the gravity
      of the proceedings. The flags of the Federation and Starfleet line the walls
      behind the judges’ table, symbolizing the institutional authority under which
      the hearing takes place. The room is divided into distinct zones: the judges’
      table (where Brand and Satelk preside), the cadet table (where Wesley, Hajar,
      Sito, and Locarno sit), and the spectator section (where Picard, Beverly, and
      Lieutenant Commander Albert observe). The **antique ship’s bell**, **monitor**,
      and **PADD** are strategically placed to facilitate the inquiry, while the **flags**
      and **hearing room decor** reinforce the weight of Starfleet’s expectations.
      The room’s layout—with the cadets facing the judges and the spectators behind
      them—creates a sense of being ‘on trial,’ heightening the pressure on the cadets
      to maintain their cover-up.'
