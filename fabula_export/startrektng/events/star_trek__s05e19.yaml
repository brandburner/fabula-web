  title: Locarno pressures Wesley to lie
  description: 'In Wesley’s dorm room, Locarno arrives to find Wesley visibly shaken
    after Picard’s confrontation. Locarno immediately shifts into damage control mode,
    dismissing Picard’s suspicions as baseless theory and urging Wesley to deny everything
    during the inquiry. Wesley resists, torn between loyalty to his squadron and his
    moral obligation to the truth. Locarno escalates from persuasion to emotional
    manipulation, accusing Wesley of betraying the team and shoving him in a moment
    of rage. Wesley stands firm, declaring he cannot lie again, which triggers Locarno’s
    bitter outburst—revealing his hidden ambition and the depth of his fear. The confrontation
    ends with Locarno walking out, leaving Wesley to grapple with the cost of integrity
    and the fracture of their friendship. This moment crystallizes Wesley’s moral
    dilemma: whether to uphold Starfleet’s values or protect his squadron’s reputation,
    marking a turning point in his character arc and the investigation’s trajectory.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e19
  scene_sequence: 19
  sequence_in_scene: 42
  key_dialogue:
  - 'LOCARNO: Captain Picard doesn''t know anything... he has a theory. Let him tell
    the inquiry what he thinks happened... they''ll ask us, ''Is it true?'' and we''ll
    say, ''No, sir.'' There''s no evidence, so there''s no case... and we''ll get
    off with a reprimand.'
  - 'WESLEY: You''re asking me to call Captain Picard a liar.'
  - 'LOCARNO: You''re going to turn us in? You. Alone. Are going to decide what happens
    to me... to Sito... to Jean. You''re going to decide that.'
  - 'WESLEY: I''m not going to lie to them again, Nick... I can''t live with it.'
  - 'LOCARNO: I got you on this team... I gave you a chance when there were upperclassmen
    waiting in line. I said, ''He won''t let us down.'' I guess I was wrong...'
  - 'LOCARNO: To save the team. That''s more important than you and it''s more important
    than me.'
