  description: In the formal but subdued atmosphere of the Academy’s hearing room,
    Admiral Brand conducts an initial inquiry into Cadet Joshua Albert’s fatal training
    accident, offering hollow condolences to his father, Commander Albert. When Albert
    presses for answers—demanding details about the crash, flight plans, and potential
    malfunctions—Brand stonewalls him with bureaucratic caution, admitting no progress
    while deflecting accountability. Her measured tone and insistence on ‘standard
    procedure’ underscore Starfleet’s institutional rigidity, deepening Albert’s frustration
    and foreshadowing the systemic cover-up Wesley will later uncover. Meanwhile,
    Picard and Beverly Crusher observe the exchange, with Beverly’s awkward but genuine
    condolences to Albert revealing the human cost of the tragedy. The scene ends
    with Brand’s decision to proceed with graduation ceremonies, framing duty over
    grief as Starfleet’s priority—a choice that will later clash with Wesley’s moral
    dilemma.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e19
  scene_sequence: 5
