  global_id: null
  title: Locarno’s False Testimony and Brand’s Demand
  description: During the informal court of inquiry, Locarno delivers a calculated
    false testimony, blaming Joshua Albert’s death on his own alleged panic and formation-flying
    errors. His performance is convincing, portraying himself as a responsible leader
    who failed to report Albert’s struggles out of loyalty. Admiral Brand, however,
    detects inconsistencies—particularly Hajar’s evasive answers about the flight
    plan deviation and Sito’s unconvincing claim of relying solely on sensors. Picard,
    observing closely, notes the implausibility of flying without visual cues in such
    a high-speed maneuver. Brand, visibly disturbed by the cadets’ lack of transparency,
    announces a forensic review of Wesley’s flight recorder data, escalating the stakes.
    The scene ends with Locarno reassuring Wesley that ‘everything’s fine,’ but Wesley’s
    internal conflict deepens as the inquiry’s recess looms over the next day’s revelations.
    The event marks a critical turning point, where institutional distrust collides
    with personal loyalty, forcing Wesley to confront whether silence is complicity
    in a cover-up that cost a life.
