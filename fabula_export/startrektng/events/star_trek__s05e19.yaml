  title: Locarno unites the squadron before inquiry
  description: 'In Wesley’s dorm room, Locarno—Nova Squadron’s charismatic leader—conducts
    a final pre-inquiry pep talk, blending camaraderie with subtle pressure. He adjusts
    Hajar’s uniform and reassures Sito, whose tension reveals her unease, while positioning
    himself as the steadfast anchor of the group. His speech frames their bond as
    their greatest strength, subtly reinforcing the expectation that they must present
    a united front during the inquiry. The moment is charged with unspoken guilt and
    loyalty, as Locarno’s emotional appeal to their shared history at the Academy
    serves as both a rallying cry and a veiled reminder of their collective responsibility
    to uphold the cover-up. The scene underscores the moral dilemma Wesley faces:
    whether to prioritize truth or the squadron’s code of silence, foreshadowing his
    eventual confrontation with Locarno’s authority.'
