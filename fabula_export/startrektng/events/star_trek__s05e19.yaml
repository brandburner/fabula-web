acts:
- fabula_uuid: act_1b3ac4a20a5475c0
  number: 1
  summary: |-
    The Enterprise travels to Earth, where Captain Picard prepares to deliver a commencement address at Starfleet Academy. He anticipates seeing Wesley Crusher's flight team, Nova Squadron, perform a demonstration. Admiral Brand, the Academy Superintendent, contacts Picard privately to inform him of a severe accident involving Nova Squadron. Picard then relays the tragic news to Beverly Crusher: a collision during a training exercise destroyed all five ships, resulting in the death of Cadet Joshua Albert. Beverly, deeply concerned for Wesley and the loss of Albert, attempts to focus on Wesley's medical care, but her emotions quickly surface.

    At the subsequent Academy briefing, Brand and Captain Satelk announce an immediate investigation. Lt. Commander Albert, Joshua's grieving father, presses for answers, but Brand assures him a thorough inquiry will take place. Picard and Beverly visit Wesley in his dorm room. Wesley, recovering from injuries and visibly shaken, remains stiff and unwilling to discuss the accident, stating he has "talked about nothing else for the past two days." His squadron leader, Cadet First Class Nicholas Locarno, then arrives. Locarno, charismatic and a natural leader, reassures Wesley, emphasizing the importance of team unity: "Everything's going to be all right -- as long as we stick together." This interaction, where Locarno subtly pressures Wesley to maintain a united front, marks the initial establishment of the cover-up and sets the stage for Wesley's moral dilemma. The act concludes with Wesley's troubled expression, hinting at the internal conflict he faces.
  key_moments: []
  scene_numbers:
