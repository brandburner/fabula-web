    emotional_state: 'A storm of conflicted emotions: defiance masks guilt and fear,
      while Picard’s invocation of his past and the uniform stirs shame and self-doubt.
      His silence is not strength but paralysis—trapped between the weight of his
      oath and the pressure of peer loyalty.'
    goals:
    - To protect Nova Squadron’s reputation and avoid implicating his teammates, even
      at the cost of his own integrity.
    - To avoid directly lying to Picard, instead relying on omissions and evasions
      to maintain a fragile moral high ground.
    what_happened: Wesley enters the ready room with apprehension but a facade of
      readiness, his posture stiffening as Picard’s interrogation unfolds. He initially
      avoids direct eye contact, his gaze flickering to the terminal’s simulation
      before snapping back to Picard under the weight of the captain’s command. His
      verbal responses are minimal and evasive—first identifying the maneuver, then
      defaulting to ‘I choose not to answer’—but his physical tension (clenched jaw,
      rigid stance) betrays his internal turmoil. When Picard invokes his past and
      the uniform, Wesley’s voice quiets, his defiance crumbling slightly, though
      he refuses to yield. His exit is abrupt, leaving the weight of Picard’s ultimatum
      hanging in the air.
