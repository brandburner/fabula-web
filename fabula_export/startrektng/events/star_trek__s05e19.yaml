  title: Boothby warns Picard of Nova Squadron’s blind loyalty
  description: "\n  Picard seeks Boothby’s perspective on Nova Squadron’s troubled\
    \ state, framing the conversation as a casual exchange while kneeling beside the\
    \ groundskeeper’s flower beds. Boothby, initially evasive, uses a metaphor about\
    \ weeds and primroses to critique the Academy’s tendency to ignore systemic problems.\
    \ When Picard presses, Boothby pivots to a shared memory of their 2224 Parrises\
    \ Squares victory—a moment of pride that mirrors Nova Squadron’s current cult-like\
    \ status. He reveals Nick Locarno’s outsized influence over the team, framing\
    \ the cadets’ loyalty as both a strength and a danger: they’ll follow him ‘right\
    \ over a cliff.’ The subtext is clear: the squadron’s reckless cohesion is a ticking\
    \ time bomb, and Locarno’s leadership may have already led them into disaster.\
    \ Boothby’s warning, delivered through nostalgia and gardening metaphors, forces\
    \ Picard to confront the institutional denial shielding Nova Squadron’s failures.\
