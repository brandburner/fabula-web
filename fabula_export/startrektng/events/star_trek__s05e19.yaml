  global_id: null
  title: Picard confronts Wesley’s lie of omission
  description: 'In the ready room, Picard ambushes Wesley with irrefutable evidence
    of Nova Squadron’s forbidden Kolvoord Starburst maneuver—the direct cause of Joshua
    Albert’s death. Wesley’s evasive response (‘I choose not to answer’) triggers
    Picard’s withering disappointment, who invokes Starfleet’s core principle of truth
    as a moral litmus test. The confrontation escalates when Picard recalls Wesley’s
    childhood promise on the Enterprise bridge, framing the cadet’s silence as a betrayal
    of both his potential and the uniform. The ultimatum—confess to Admiral Brand
    or Picard will—crystallizes Wesley’s crisis: loyalty to Locarno’s cover-up or
    accountability to Starfleet’s values. The scene’s tension hinges on Picard’s strategic
    use of silence and proximity, forcing Wesley to physically endure the weight of
    his mentor’s disillusionment. The unresolved standoff leaves Wesley’s choice hanging,
    but Picard’s final dismissal underscores the stakes: truth is non-negotiable,
    and complicity is a failure of character.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e19
  scene_sequence: 18
  sequence_in_scene: 41
  key_dialogue:
  - |-
    PICARD: Can you tell me what maneuver this is?
    WESLEY: It's the Kolvoord Starburst.
    PICARD: Five ships crossing within ten meters of each other and then igniting their plasma trails. One of the most difficult and spectacular demonstrations of precision flying. It hasn't been performed by an Academy team in over a century. Do you know why?
    WESLEY: It was banned by the Academy following a training accident.
  - |-
    PICARD: ((hard)) I asked you a question, Cadet.
    WESLEY: ((stiffly)) I... choose not to answer, sir.
    PICARD: ((hard)) You choose not to answer... and yet you've already given an answer to the inquiry... and that answer was a lie.
    WESLEY: I said the accident occurred after the loop, and it did.
    PICARD: ((hard)) But you neglected to mention the fact that following the loop your team executed a dangerous maneuver which was the direct cause of the crash. Yes, you told the truth... but only to a point. And a lie of omission is still a lie.
  - 'PICARD: The first duty of every Starfleet officer is to the truth... be it scientific
    truth, historical truth, or personal truth. It is the guiding principle upon which
    Starfleet is based. If you cannot find it within yourself to stand up and tell
    the truth about what happened... you do not deserve to wear that uniform.'
