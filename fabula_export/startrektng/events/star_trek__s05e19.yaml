    over Joshua Albert’s death to consolidate control over the group’s narrative.
    He frames Joshua as responsible for the fatal training accident, using emotional
    appeals to Hajar and Sito while isolating Wesley, who resists the deception. Locarno
    presents a doctored flight recorder report—purportedly proving Joshua’s fault—to
    pressure Wesley into compliance. The scene fractures the squadron’s unity, with
    Wesley’s resistance exposing the moral cost of the cover-up. Locarno’s rhetoric—blending
    camaraderie, ambition, and guilt—reveals his leadership style: charismatic but
    manipulative, prioritizing institutional survival over truth. The moment forces
    each cadet to confront their complicity in the lie, while the truth about the
    forbidden Kolvoord Starburst maneuver remains buried. Wesley’s eventual nod of
    acceptance marks a critical turning point, as loyalty to the squadron overrides
    his moral compass, setting up future conflicts when the truth inevitably surfaces.'
