  title: Beverly’s Failed Protection and Wesley’s Guilt
  description: "\n  In Wesley’s dorm room, Beverly Crusher attempts to shield her\
    \ son from the consequences of the Nova Squadron accident by questioning the validity\
    \ of the satellite data and proposing to delay the inquiry. Her maternal instincts\
    \ drive her to defend Wesley, assuming his innocence, but his sharp rejection\
    \ of her intervention—'Mom. No. You can't do that.'—exposes his guilt. The moment\
    \ crystallizes Wesley’s moral dilemma: loyalty to his squadron or accountability\
    \ for Joshua Albert’s death. Beverly’s realization that Wesley is not innocent\
    \ ('You haven’t done anything wrong') shatters her faith in him, leaving her in\
    \ stunned silence before they embrace in shared sorrow. This confrontation forces\
    \ Wesley to confront his complicity and marks a turning point in his arc, where\
    \ his guilt becomes inescapable.\n  "
