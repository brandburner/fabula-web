- fabula_uuid: cand_evt_scene_4509d34e7b949a32_01
  global_id: null
  title: Cadets Testify Under Scrutiny
  description: "\n  In the informal court of inquiry, Locarno delivers a meticulously\
    \ crafted testimony blaming Joshua Albert’s death on his own reckless flying during\
    \ a routine maneuver, omitting the squadron’s unauthorized deviation from the\
    \ flight plan. His performance is convincing, but subtle inconsistencies emerge\
    \ as Admiral Brand and Captain Satelk probe the cadets. Hajar confirms the squadron’s\
    \ adherence to the flight plan despite evidence of a closer approach to Titan,\
    \ while Sito’s reliance on sensor data—rather than visual confirmation—raises\
    \ Picard’s skepticism. Locarno then pivots to a fabricated narrative about Albert’s\
    \ supposed nervousness, framing the accident as a result of his panic. The testimony\
    \ leaves Wesley visibly shaken, while the other cadets exchange uneasy glances.\
    \ The scene underscores the moral dilemma facing Wesley: whether to uphold the\
    \ squadron’s code of silence or challenge the institution’s cover-up of a fatal\
    \ error. The inquiry is recessed until the next day, when data from Wesley’s flight\
    \ recorder will be analyzed, leaving the truth still obscured but the tension\
    \ escalating.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e19
