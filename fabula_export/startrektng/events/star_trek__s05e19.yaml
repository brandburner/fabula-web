    emotional appeals to team loyalty and veiled threats of expulsion, exploits Wesley’s
    guilt and fear of abandonment. The scene escalates Wesley’s moral crisis, framing
    his choice as a test of integrity against institutional pressure. Locarno’s manipulation
    succeeds when Wesley, moved by the promise of enduring team unity, finally nods
    in reluctant acceptance, marking a pivotal moment where his resistance crumbles
    under the weight of collective survival and emotional manipulation.
