  key_dialogue: &id009
  - 'BRAND: There was very little left to salvage from the wreckage. We did recover
    one of the ships'' data recorders, but it was badly damaged. We''re attempting
    to restore the information, but it''s going to take some time. Standard procedure
    calls for an immediate investigation by two command-level officers. Captain Satelk
    and I will begin taking depositions from Nova Squadron at fifteen-hundred hours
    today.'
  - 'PICARD: If you require any assistance, Admiral, the Enterprise is at your disposal.'
  - 'BRAND: I''m sure we can handle the investigation... but thank you for the offer.'
  - 'ALBERT: Josh once told me that Wesley was the only reason he made it through
    astrophysics.'
