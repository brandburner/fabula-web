- fabula_uuid: cand_evt_scene_7cffc98b8b34d33b_03
  global_id: null
  title: Squadron confirms Wesley’s truth
  description: 'In a tense hearing room, Admiral Brand prepares to close the investigation
    into Joshua Albert’s death, citing unresolved contradictions between the cadets’
    testimony and satellite data. Wesley Crusher abruptly stands to amend his earlier
    statement, confessing that Nova Squadron executed the forbidden Kolvoord Starburst
    maneuver—a reckless, prohibited move that caused the crash. His admission shifts
    the room’s energy, forcing the squadron to confront their complicity. Brand then
    directly questions Sito and Hajar, who—after hesitant pauses—quietly affirm Wesley’s
    confession, validating his truth and exposing the cover-up’s depth. Locarno, the
    squadron’s leader, remains silent, refusing to corroborate or deny, leaving the
    weight of the revelation to settle over the room. The moment marks a turning point:
    Wesley’s moral courage fractures the squadron’s unity, while the cadets’ reluctant
    confirmation underscores their shared guilt and the tragedy’s irreversible consequences.
    The scene pivots from procedural closure to emotional reckoning, with Wesley’s
    act of truth-telling becoming the catalyst for the inquiry’s next phase—one that
    will demand accountability from those who enabled the lie.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e19
  scene_sequence: 20
  sequence_in_scene: 47
  key_dialogue:
  - 'BRAND: Captain Satelk and I have gone over your testimony and the physical evidence
    from the crash. Your statements cannot be reconciled with the data collected from
    the NavCon satellite. Your unwillingness to offer any explanation for this contradiction
    is disappointing, and it raises suspicion. We cannot escape the conclusion that
    either the data is faulty in some way... or you have lied to us.'
  - 'WESLEY: Yesterday, I testified that the crash occurred following a Yeager loop.
    That''s not entirely true. We did perform the loop. But after that, we broke formation...
    and attempted a Kolvoord Starburst. We knew it was prohibited and that it would
    be dangerous, but we wanted to do something spectacular for the commencement demonstration...
    So we pushed Josh... and he wasn''t ready. We thought we could do it... we thought
    we could do anything. We were wrong... and Josh died.'
  - 'BRAND: Cadet Sito, is this true?'
  - 'HAJAR: (quiet)'
  - 'BRAND: Mister Locarno, you''re the leader of Nova Squadron... do you have anything
    to say?'
  - 'LOCARNO: (quiet) No, sir.'
