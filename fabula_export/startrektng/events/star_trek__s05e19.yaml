      The g-forces, speed, and sensor readings offer a technical backdrop to Wesley’s
      verbal account, but their distortion underscores the unreliability of the evidence—until
      the satellite imagery contradicts it. The readouts’ abrupt cutoff at Titan’s
      clearance creates a narrative gap, which Satelk exploits to introduce the satellite
      data. Their role is to set up the subsequent reveal, making the truth even more
      undeniable.
