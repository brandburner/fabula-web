  title: Locarno’s ultimatum fractures Wesley’s loyalty
  description: 'In Wesley’s dorm room, Locarno arrives expecting a crisis but quickly
    shifts into damage control mode when Wesley reveals Picard’s suspicions about
    the Kolvoord maneuver cover-up. Locarno dismisses Picard’s accusations as baseless
    theory and pressures Wesley to maintain the lie, framing it as a matter of team
    survival. When Wesley resists, Locarno’s facade of leadership cracks—he physically
    shoves Wesley, accuses him of betrayal, and weaponizes their friendship, reminding
    Wesley of his debt to the squadron. The confrontation escalates into a moral showdown:
    Locarno demands Wesley’s resignation to spare the team, exposing his ruthless
    ambition, while Wesley’s refusal to lie further fractures their bond. The scene
    crystallizes the cost of silence for both men—Locarno’s fear of exposure and Wesley’s
    guilt over complicity—while forcing Wesley toward a reckoning with his own complicity
    in the lie. The ultimatum isn’t just about the truth; it’s about whether Wesley
    will prioritize institutional loyalty or moral integrity, even at the expense
    of his career and relationships.'
