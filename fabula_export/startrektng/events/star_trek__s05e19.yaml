  global_id: null
  title: Picard Uncovers the Forbidden Maneuver
  description: "\n  In Main Engineering, Picard and Beverly arrive to demand an update\
    \ on the Nova Squadron crash investigation. Geordi and Data present their findings,\
    \ revealing critical anomalies in Wesley’s flight recorder: erratic power fluctuations\
    \ and a premature coolant interlock opening. Picard’s probing questions force\
    \ Geordi to admit the interlock was opened just before the maneuver—a procedure\
    \ that should only occur in a maintenance bay. Data confirms the maneuver was\
    \ hazardous, but Picard deduces the truth: the cadets were attempting to purge\
    \ plasma exhaust mid-flight, a reckless and forbidden maneuver. The revelation\
    \ shifts the investigation from accident to deliberate act, escalating the moral\
    \ stakes for Wesley and exposing the cover-up tied to Joshua Albert’s death. The\
    \ moment marks a turning point, as Picard’s deduction forces the truth into the\
    \ light, deepening the conflict between loyalty and integrity for the surviving\
    \ cadets.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e19
  scene_sequence: 17
  sequence_in_scene: 37
  key_dialogue:
  - 'PICARD: Did Wesley''s flight recorder indicate there was anything... unusual
    about the ship or the way it was operating?'
  - 'GEORDI: The fluidic pressure in the landing struts was low, but I don’t know
    what difference that would make.'
  - 'DATA: We did find that Wesley had opened his coolant interlock just before beginning
    the maneuver around Titan.'
  - 'GEORDI: Which is a little unusual. The interlock is normally closed unless you''re
    performing a check on the engine coolant levels. But there''s no evidence Wesley
    was running that kind of check.'
  - 'PICARD: Filling the primary coolant tanks requires an open interlock... but that
    can only be done in a maintenance bay. What other reasons are there to open that
    valve?'
  - 'GEORDI: It''s the first step in purging the plasma exhaust.'
  - 'DATA: That procedure would be extremely hazardous while the ship was in flight.'
  - 'GEORDI: Yeah, the engine would probably ignite the plasma.'
  - 'PICARD: Ignite the plasma... that''s exactly what they were trying to do.'
