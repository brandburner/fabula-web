- fabula_uuid: cand_evt_scene_f9b6dfab339df2fa_02
  global_id: null
  title: Picard reveals the accident’s cost
  description: 'In the quiet tension of Beverly’s quarters, Picard delivers the devastating
    details of Wesley’s flight team accident—four cadets rescued, one dead (Joshua
    Albert), and Wesley injured but stable. Beverly’s clinical focus on medical protocols
    masks her terror, but Picard’s measured tone and physical proximity force her
    to confront the fragility of her son’s life. The revelation of Joshua’s death—someone
    Wesley knew—hits her with visceral force, exposing the unspoken fear that has
    haunted her since Wesley joined Starfleet. Picard’s reassurances ("Wesley is alive
    and well") clash with the subtext: this was a near-fatal mistake, and the truth
    of what happened remains buried. The scene pivots from medical logistics to emotional
    reckoning, setting up Wesley’s moral dilemma and the investigation to come. Beverly’s
    suppressed tears and Picard’s firm grip on her hand underscore the weight of the
    moment—this is not just a report, but the first crack in the facade of Starfleet’s
    invincibility for the Crushers.'
