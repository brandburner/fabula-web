      to stricter enforcement of training protocols and greater emphasis on transparency
      across the organization.
    internal_dynamics: The inquiry reveals tensions between individual loyalty and
      institutional duty. While Brand and Satelk are united in their pursuit of the
      truth, the cadets’ actions highlight the challenges of enforcing Starfleet’s
      values in a high-pressure environment.
