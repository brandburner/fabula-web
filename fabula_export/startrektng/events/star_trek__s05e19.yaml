- fabula_uuid: act_f4911317d09fd5b5
  number: 5
  summary: |-
    Picard summons Wesley to his ready room and confronts him directly. He displays a computer simulation of the Kolvoord Starburst, a dangerous and forbidden maneuver banned after a fatal accident over a century ago. Picard reveals his knowledge that Locarno convinced the team to attempt this maneuver for the commencement demonstration, leading to Joshua Albert's death. He accuses Wesley of a "lie of omission" and delivers a powerful speech about "the first duty of every Starfleet officer is to the truth." Picard gives Wesley an ultimatum: either he reveals the truth to Admiral Brand, or Picard will.

    Disturbed, Wesley confronts Locarno, informing him that Picard knows everything. Locarno, in damage control mode, attempts to convince Wesley to call Picard a liar, arguing there is "no evidence" and they will "get off with a reprimand." Wesley refuses, stating he "can't live with it," which escalates into a physical confrontation and a bitter exchange. Locarno accuses Wesley of betraying his friends for Picard's "duty and honor" speech, and bitterly reminds Wesley of his loyalty to the team. Locarno dismisses Wesley's moral stance, urging him to resign if he cannot maintain the lie, rather than making the team "pay for your guilty conscience."

    At the reconvened inquiry, Brand, lacking definitive proof, prepares to close the investigation with only formal reprimands. However, Wesley stands and confesses the full truth: Nova Squadron attempted the Kolvoord Starburst, pushed Albert beyond his limits, and caused his death. He clears Albert's name. Sito and Hajar corroborate his testimony. When asked, Locarno initially denies the account but then assumes full responsibility for instigating the maneuver and the subsequent cover-up. As a result, Locarno is expelled, while Wesley, Sito, and Hajar receive formal reprimands, lose flight privileges, and Wesley loses all academic credits for the past year. Picard acknowledges Wesley's difficult but correct decision, echoing Boothby's words, "You knew what you had to do... I just made sure you listened to yourself." The act concludes with Wesley accepting his consequences, having chosen duty and truth over loyalty to a lie.
