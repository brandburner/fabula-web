  key_dialogue:
  - 'PICARD: ... he had second degree burns on his chest and a multiple fracture of
    his right arm. But he''s going to be fine.'
  - 'BEVERLY: How did it happen?'
  - 'PICARD: Apparently, Wesley''s squadron was practicing on the Academy flight range
    near Saturn... they were in close formation when there was a collision... all
    five ships were destroyed. Four of the cadets managed to transport out... one
    did not.'
  - 'BEVERLY: Do you know who it was?'
  - 'PICARD: His name was Joshua Albert.'
  - 'BEVERLY: Wesley talked about him... They were friends...'
