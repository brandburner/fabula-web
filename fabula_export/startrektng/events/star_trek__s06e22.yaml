  title: Ogawa bypasses security for autopsy files
  description: Frustrated by her restricted access to autopsy records, Beverly Crusher
    attempts to retrieve Reyga and Jo'Bril's files through her terminal, only to be
    denied by the computer. Nurse Ogawa, observing Beverly's desperation, intervenes
    and bypasses security protocols to download the files herself. Beverly initially
    resists Ogawa's involvement to protect her, but Ogawa insists, leveraging Beverly's
    diminished authority to justify her defiance. The moment marks a critical escalation
    in Beverly's investigation, as she now has the medical data needed to probe Jo'Bril's
    physiology and the tetryon traces that could expose sabotage. Ogawa's act of loyalty—despite
    the risk to her career—solidifies their alliance and underscores Beverly's growing
    isolation from Starfleet's institutional constraints. The scene also foreshadows
    the ethical compromises Beverly will face as her pursuit of truth clashes with
    Starfleet's protocols.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e22
  scene_sequence: 22
  sequence_in_scene: 37
  key_dialogue:
  - |-
    BEVERLY: Computer, access ship's medical logs and download current autopsy files.
    COMPUTER VOICE: Autopsy files are restricted to active medical personnel only. Access denied.
  - |-
    OGAWA: Doctor Crusher... ?
    BEVERLY: Ogawa.
    OGAWA: What do you need the autopsy files for?
    BEVERLY: Don't worry. I know I'm not supposed to be here... I'll go...
    OGAWA: I can see how important this is to you...
  - |-
    OGAWA: Is that an order, Doctor?
    BEVERLY: Yes.
    OGAWA: Too bad you're not my boss any more.
