  title: Beverly probes Christopher and T’Pan’s knowledge
  description: In Christopher’s quarters, Beverly subtly interrogates Christopher
    and T’Pan about Reyga’s death, probing for hidden motives. She frames her questions
    as exploratory—‘I just can’t accept the fact that he took his own life’—but her
    focus on T’Pan’s professional rivalry with Reyga hints at deeper suspicion. Christopher’s
    defensive overreaction—‘I find your question distasteful’—and his insistence that
    Kurak is ‘not a killer’ despite overhearing her heated argument with Reyga raise
    Beverly’s suspicions. His uneasy admission about the confrontation, followed by
    his and T’Pan’s united front, suggests they may be hiding something. Beverly exits
    with lingering doubt, her voiceover noting that while Klingons often make idle
    threats, ‘sometimes they follow through.’ The scene escalates Beverly’s investigation
    while revealing Christopher’s discomfort and T’Pan’s calculated neutrality, both
    of which imply complicity or knowledge beyond what they admit.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e22
  scene_sequence: 14
  sequence_in_scene: 24
  key_dialogue:
  - 'CHRISTOPHER: I''m afraid I don''t understand, Doctor. Do you have evidence that
    Reyga was murdered?'
  - 'BEVERLY: No. But I just can''t accept the fact that he took his own life... and
    I want to explore the possibilities a bit further.'
  - 'T''PAN: What reason would anyone have had to kill him?'
  - 'BEVERLY: That''s why I came to you. I wondered if you might have any thoughts
    along that line... Just as an example... if his technology had been successful,
    you might have been displaced as the preeminent scientist in subspace technology.
    That might seem like a motive.'
  - 'CHRISTOPHER: I must say I resent this, Doctor. We''ve all been shocked by the
    recent events. I don''t see that there''s anything to gain by dragging us through
    these insinuations.'
  - 'BEVERLY: I''m just trying to uncover the truth. And I''m asking your help to
    do it. Have you seen or heard anything that might suggest that someone else had
    a motive?'
  - 'CHRISTOPHER: I was in the storage room of the science laboratory yesterday...
    Kurak was working in the lab. I heard Reyga come in... they got into... an argument.
    I don''t know... I couldn''t hear clearly until they started shouting at each
    other. Then I heard Kurak say that Reyga had questioned her honor, and no Klingon
    would stand for that.'
  - 'CHRISTOPHER: And, Doctor -- neither are we.'
