  title: Troi warns Picard about Beverly’s collapse
  description: On the bridge, Deanna Troi privately expresses concern to Picard about
    Beverly Crusher’s emotional withdrawal following her relief of duty and the traumatic
    aftermath of Reyga’s experiment. Troi notes Beverly’s avoidance of counseling,
    hinting at a deeper psychological fracture—only for Data to abruptly interrupt
    with news of an unauthorized shuttle launch (the *Justman*), forcing Picard to
    shift focus from Beverly’s unspoken suffering to an immediate crisis. The moment
    underscores the crew’s fractured state, where personal trauma and professional
    duty collide, and where Beverly’s reckless solo mission signals her refusal to
    be sidelined. The abrupt interruption also highlights the Enterprise’s operational
    chaos, where personal and professional emergencies compete for attention, leaving
    Beverly’s emotional collapse unaddressed—until her defiant action forces the issue
    into the open.
