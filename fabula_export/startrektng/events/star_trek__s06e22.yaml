- fabula_uuid: act_04cde2aa4321f047
  number: 5
  summary: Beverly, now piloting the shuttle into the sun's corona, confirms to a
    shocked Picard that she intends to prove Reyga's shield works and was sabotaged.
    Picard's attempts to recall the shuttle fail as Beverly has isolated navigational
    control, and solar interference prevents a tractor beam lock. As the shuttle plunges
    into the corona, Beverly confirms the metaphasic shield is holding, vindicating
    Reyga's work. Suddenly, communications with the Enterprise are severed, and Jo'Bril
    emerges from a compartment within the shuttle, alive and holding a phaser. He
    reveals his species' ability for "physio-stasis," explaining he faked his death
    and was conscious during his autopsy. Jo'Bril confesses to sabotaging the initial
    flight to discredit Reyga, intending to be the sole developer of the weaponized
    metaphasic technology. He then attempts to obscure the shuttle from Enterprise
    sensors, making it appear destroyed. Beverly, realizing his true intentions, lunges
    for the controls, violently altering the shuttle's course. In the ensuing chaos,
    the phaser is dislodged. A desperate struggle for the weapon ensues, during which
    Beverly punches and kicks Jo'Bril. She retrieves the phaser and fires, hitting
    Jo'Bril, who reveals a gaping hole in his chest—a testament to his unique physiology.
    Beverly fires a continuous burst, vaporizing him. With the shuttle failing, she
    reroutes it back to the Enterprise, which had begun a search for wreckage. Safely
    back, Beverly is reinstated. The episode concludes with Beverly presenting Guinan
    with a state-of-the-art tennis racquet as a thank you, only to discover Guinan
    has never played tennis, highlighting Guinan's subtle but effective manipulation
    to motivate Beverly. The Enterprise then warps away, leaving Beverly to reflect
    on the events.
