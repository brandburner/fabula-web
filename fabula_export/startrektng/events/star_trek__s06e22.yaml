- fabula_uuid: cand_evt_scene_73ac81ed3ebe9e5e_01
  global_id: null
  title: Jo'Bril reveals his deception and sabotage
  description: "\n  Beverly Crusher’s desperate attempt to contact the *Enterprise*\
    \ is violently interrupted when Jo'Bril—presumed dead after the shuttle’s apparent\
    \ destruction—emerges from a hidden compartment, alive and armed with a phaser.\
    \ His revelation of Takaran 'physio-stasis' (a controlled cellular state mimicking\
    \ death) shatters Beverly’s trust, exposing that he was fully conscious during\
    \ her autopsy and overheard all her investigations. Jo'Bril admits his sabotage\
    \ of Reyga’s metaphasic shield was a calculated move to discredit the Ferengi\
    \ scientist and claim the technology for himself. When Beverly realizes his intent\
    \ to weaponize the prototype, she lunges for the shuttle controls, triggering\
    \ a violent tumble toward the sun’s corona. The phaser is knocked from Jo'Bril’s\
    \ grip, leaving both trapped in a desperate, high-stakes confrontation. This moment\
    \ forces a reckoning: Jo'Bril’s deception wasn’t survival—it was a premeditated\
    \ betrayal, and Beverly’s investigation now hinges on his true motives and the\
    \ shuttle’s survival.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e22
  scene_sequence: 28
  sequence_in_scene: 45
  key_dialogue: &id015
  - 'JO''BRIL: They cannot hear you.'
  - 'BEVERLY: How... can you be alive... ?'
  - 'JO''BRIL: I''d think after your autopsy on me, you''d know the answer to that.'
  - 'BEVERLY: The slow rate of cellular decay...'
  - 'JO''BRIL: It''s a natural result of physio-stasis. Takarans can control their
    physiology at a cellular level. We can create the appearance of death...'
  - 'BEVERLY: In the morgue... you were conscious the whole time... you heard everything
    we said... knew everything we were going to do...'
  - 'JO''BRIL: I''m sending out a transient subspace signal. It will obscure the shuttle
    from the Enterprise sensors... and they will interpret it as a warp engine breach.
    They''ll believe that you''ve been destroyed.'
  - 'JO''BRIL: All I wanted to do was discredit Reyga so no one would pursue his technology
    except me. But you''ve given me more than I could''ve hoped...'
  - 'JO''BRIL: Now I can take the prototype back to Takara... where I will develop
    it into a weapon.'
  is_flashback: false
  location_uuid: ger_location_e81aa1482f70
  theme_uuids: []
  arc_uuids:
  - ger_conflictarc_e6afdb7e91c8
