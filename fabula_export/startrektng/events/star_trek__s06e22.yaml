  object_involvements:
  - object_uuid: ger_object_4da7cb561b25
    description_of_involvement: The shuttle, though not physically present in the
      lab, is the silent specter of the scene. Its failed test flight—with Jo’Bril
      at the controls—is the immediate cause of the shutdown, its memory haunting
      the team’s debate. Reyga’s offer to pilot it himself transforms it from a scientific
      tool into a symbol of his desperation, while Beverly’s refusal to authorize
      further tests frames it as a deathtrap. The shuttle’s absence is a void, its
      potential for destruction lingering in the air, amplifying the stakes of the
      conflict.
    status_before_event: Recently returned from its fatal test flight, the shuttle
      is damaged and deemed unsafe. It sits in a hangar or dock, its systems compromised
      by the solar corona’s effects, awaiting further inspection or scrapping.
    status_after_event: Officially grounded by Beverly’s shutdown order, the shuttle’s
      fate is tied to Reyga’s defiance. His vow to ‘prove himself’ suggests he may
      attempt to use it again, setting the stage for his solo, fatal flight.
