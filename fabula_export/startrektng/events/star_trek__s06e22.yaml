- fabula_uuid: cand_evt_scene_5e1fd76b4d5a0ab3_01
  global_id: null
  title: Crusher finds murder evidence in Reyga’s grip
  description: In the Science Lab, Beverly Crusher examines Reyga’s body and discovers
    a discharged plasma infuser clenched in his hand—a detail that contradicts the
    expected reflex response to a plasma surge. Her medical instincts immediately
    flag this as suspicious, particularly given Reyga’s unyielding determination to
    prove his invention’s worth. Worf suggests suicide, but Beverly counters that
    the unnatural grip on the infuser suggests foul play. She orders an autopsy, her
    professional resolve clashing with her personal grief. This moment shifts the
    investigation from an assumed accident to a deliberate murder, forcing Beverly
    to confront the darker implications of Reyga’s death and the mission’s hidden
    dangers. The discovery also sets up her eventual confrontation with Starfleet
    command over the autopsy request, deepening the conspiracy’s stakes.
