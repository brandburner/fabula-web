  title: Crusher forces Kurak’s violent confession
  description: Beverly Crusher confronts Kurak in the science lab, where the Klingon
    scientist is studying Reyga’s metaphasic shield configurations. Beverly’s probing
    questions about Kurak’s threats against Reyga escalate into a physical altercation
    when Kurak, provoked by Beverly’s accusations of sabotage, violently hurls her
    into a wall. Despite the assault, Beverly refuses to back down, demanding answers.
    Under pressure, Kurak reluctantly admits Reyga accused her of sabotaging the shield—a
    revelation that implicates her in the conspiracy and forces Beverly to recognize
    the personal danger of her investigation. The confrontation marks a turning point,
    shifting the narrative from suspicion to direct confrontation with the conspiracy’s
    architects, while also exposing Kurak’s volatile nature and her role in the unfolding
    sabotage plot.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e22
  scene_sequence: 15
  sequence_in_scene: 27
  key_dialogue:
  - |-
    BEVERLY: That looks like one of Doctor Reyga's shield configurations.
    KURAK: Yes.
    BEVERLY: You seem very interested in technology that failed.
    KURAK: No one has denied there is potential in the idea.
  - |-
    BEVERLY: Did Reyga make that mistake?
    KURAK: I have heard enough accusations. Now, I will have your silence.
    BEVERLY: You're going to have to throw me a lot harder than that to get it.
  - |-
    BEVERLY: What did he accuse you of?
    KURAK: Sabotage.
    BEVERLY: Sabotage... of the metaphasic shield... was that why it failed?
    KURAK: How would I know?
    BEVERLY: Did you sabotage the project?
    KURAK: No. I did not.
