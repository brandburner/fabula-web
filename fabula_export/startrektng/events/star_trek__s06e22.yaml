      \ tumble—highlights the panel’s critical role. Its flickering lights during\
      \ the struggle symbolize the fragile hope of rescue, now dashed by Jo'Bril’s\
      \ sabotage. The panel’s failure to reconnect with the *Enterprise* leaves Beverly\
      \ and Jo'Bril isolated, their fates tied to the shuttle’s descent into the sun.\n\
