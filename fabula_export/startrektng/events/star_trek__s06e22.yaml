  object_involvements:
  - object_uuid: ger_object_6b18e920a167
    description_of_involvement: "\n        Data’s circuitry probe is the **scalpel**\
      \ in this forensic autopsy, its precise diagnostics dissecting the shuttle’s\
      \ EPS flow regulator, field emitter coil, and radial force compensator. The\
      \ probe’s confirmations—‘The flow regulator is functioning properly,’ ‘All systems\
      \ operate as designed’—are the **nails in Reyga’s coffin**, each one driving\
      \ home the inescapable truth: the failure was not mechanical. The probe’s role\
      \ is **methodical and merciless**, stripping away Reyga’s defenses one system\
      \ at a time. Its clinical precision contrasts sharply with Reyga’s desperation,\
      \ underscoring the **gap between emotion and evidence**. The probe does not\
      \ judge; it simply **reveals**, and in doing so, it forces Reyga to question\
      \ everything.\n      "
    status_before_event: "\n        Ready for use, gripped by Data as he steps into\
      \ the shuttle to begin diagnostics. It is a standard Starfleet engineering tool,\
      \ calibrated for accuracy.\n      "
    status_after_event: "\n        **Task complete**, but its data has **altered the\
      \ trajectory of the investigation**. The probe’s findings do not resolve the\
      \ mystery—they deepen it, shifting focus from ‘what went wrong?’ to ‘why did\
      \ it go wrong?’ Its role in the event is now a **catalyst for suspicion**.\n\
      \      "
    global_id: ger_object_6b18e920a167
  - object_uuid: ger_object_5f35dd683ebd
    description_of_involvement: "\n        Geordi’s tricorder is the **arbiter of\
      \ truth** in this scene, its sensor sweep over the shuttle’s hull revealing\
      \ the **undeniable evidence** of baryonic radiation damage. The device’s chirping\
      \ readouts and lighting screen serve as a **cold, clinical counterpoint** to\
      \ Reyga’s emotional unraveling. Geordi’s findings—delivered with cautious professionalism—act\
      \ as the **death knell for Reyga’s certainty**, confirming that the shield was\
      \ breached by an external force. The tricorder’s role is **narratively pivotal**:\
      \ it shifts the investigation from ‘mechanical failure’ to ‘unaccounted variables,’\
      \ planting the seed for Beverly’s later suspicion of sabotage. Its data is **objective\
      \ but damning**, forcing Reyga to confront the possibility that his genius was\
      \ not enough.\n      "
    status_before_event: "\n        Fully charged and operational, carried by Geordi\
      \ as he approaches the shuttle for his scan. It is a standard Starfleet-issue\
      \ diagnostic tool, trusted for its accuracy.\n      "
    status_after_event: "\n        **Discharged of its immediate purpose**, but its\
      \ data now lingers as a **looming question**: if the shield was breached by\
      \ baryonic radiation, what else might have gone wrong? The tricorder’s role\
      \ in the event is complete, but its implications are just beginning to unfold.\n\
      \      "
    global_id: ger_object_5f35dd683ebd
  - object_uuid: ger_object_4da7cb561b25
    description_of_involvement: "\n        The shuttle itself is a **witness to catastrophe**,\
      \ its scarred hull and open door a mute testament to the mission’s failure.\
      \ Geordi’s tricorder scan reveals micro-crystalline damage from baryonic radiation,\
      \ a **physical record** of the shield’s breach and Jo’Bril’s fatal exposure.\
      \ The shuttle’s interior, where Reyga and Data conduct their diagnostics, is\
      \ a **clinic of shattered expectations**—every system check a nail in the coffin\
      \ of Reyga’s certainty. Its role in the event is **dual**: as a **forensic specimen**\
      \ (yielding clues about the failure) and as a **symbol of Starfleet’s vulnerability**\
      \ (a machine that was supposed to protect its pilot but did not).\n      "
    status_before_event: "\n        Docked in the shuttle bay after the failed test\
