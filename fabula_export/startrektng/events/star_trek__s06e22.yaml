  title: Crusher demands autopsy despite Ferengi rituals
  description: "\n  Beverly Crusher confronts Captain Picard in the ready room, insisting\
    \ Reyga’s death was not suicide but murder. She argues her professional assessment—based\
    \ on her final interaction with Reyga—contradicts the suicide ruling, but Picard\
    \ cautions her against emotional bias. When she presses for an autopsy, Picard\
    \ reveals Reyga’s Ferengi family has blocked it due to ritual obligations, leaving\
    \ her without official means to prove her suspicions. Picard offers a conditional\
    \ concession: if she can find external evidence, he will reconsider. The exchange\
    \ escalates Beverly’s frustration, forcing her to seek alternative methods (like\
    \ the molecular tissue scan) to uncover the truth. The scene underscores the tension\
    \ between Starfleet protocol, cultural respect, and Beverly’s unshakable conviction\
    \ that justice demands an investigation.\n  "
