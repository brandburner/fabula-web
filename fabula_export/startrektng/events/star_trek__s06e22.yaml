  title: Riker warns Beverly to stand down
  description: 'In a tense corridor confrontation, Commander Riker intercepts Beverly
    Crusher as she returns from the Shuttlebay, ostensibly to inform her of transport
    arrangements for her upcoming inquiry at Starbase 23. His initial reassurances—about
    the inquiry being a formality and Picard’s support—are undercut by a sharp warning:
    she must avoid any ''foolish'' actions before the hearing. When Beverly feigns
    ignorance, Riker explicitly orders her to remain in her quarters, framing it as
    both professional advice and personal concern. The exchange reveals Riker’s dual
    role as her ally (protecting her career) and her superior (enforcing Starfleet
    protocol), while Beverly’s defiance—softened only by their friendship—signals
    her refusal to abandon her investigation. The moment escalates narrative tension
    by restricting Beverly’s agency just as she nears a breakthrough, forcing her
    to choose between compliance and insubordination. Riker’s final plea as a ''friend''
    underscores the personal stakes, but Beverly’s departure without commitment leaves
    her path forward uncertain and her defiance implicit.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e22
  scene_sequence: 21
  sequence_in_scene: 35
  key_dialogue:
  - 'RIKER: Beverly... We''ve made arrangements for a shuttle to Starbase twenty-three.
    You can leave at oh-seven-hundred hours tomorrow.'
  - 'RIKER: But... if you do anything foolish... before the inquiry... that wouldn''t
    look so good. [...] The smartest thing you can do right now is to stay in your
    quarters and read a good book. Because if you make this situation any worse --
    it''ll be that much harder on you.'
  - 'BEVERLY: I know, Wil... thank you. But... as a friend... please try to understand.
    I can''t quit now. And I don''t want you to get involved...'
