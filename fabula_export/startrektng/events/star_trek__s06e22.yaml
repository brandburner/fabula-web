- fabula_uuid: cand_evt_scene_119d61dc9c8237cf_02
  global_id: null
  title: Reyga’s shield test and Jo’Bril’s unexpected offer
  description: "\n  In the Science Lab, Beverly Crusher convenes a skeptical panel\
    \ of scientists—Klingon warp specialist Kurak, Vulcan subspace theoretician T’Pan,\
    \ her human husband Christopher, and Takaran solar physicist Jo’Bril—to evaluate\
    \ Reyga’s controversial metaphasic shield. Reyga, unshaken by their doubts, insists\
    \ his technology can protect a shuttle within a star’s corona, despite T’Pan’s\
    \ logical objections and Kurak’s outright hostility. The tension escalates when\
    \ Kurak accuses Reyga of falsifying data, forcing Beverly to intervene. Reyga\
    \ counters by proposing a live demonstration, offering exclusive rights to whoever\
    \ funds his work. The group remains unconvinced until Jo’Bril, hitherto silent,\
    \ volunteers to pilot the shuttle into Vaytan’s corona, citing his expertise in\
    \ solar plasma. His sudden intervention—unexpected and unprompted—shifts the dynamic:\
    \ Kurak and Christopher reluctantly endorse the test, while Beverly, though pleased\
    \ by the progress, harbors quiet unease. Reyga, buoyed by Jo’Bril’s faith, agrees\
    \ to the plan, and the group disperses. The scene ends with Beverly and Reyga\
    \ exiting together, their fragile alliance momentarily strengthened, though the\
    \ experiment’s risks—and Jo’Bril’s true motives—remain unspoken. This moment marks\
    \ a critical turning point: Reyga’s ambition clashes with the crew’s survival,\
    \ while Jo’Bril’s loyalty (or apparent lack thereof) exposes the fragility of\
    \ their scientific collaboration and foreshadows the mission’s fatal consequences.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e22
  scene_sequence: 3
  sequence_in_scene: 5
  key_dialogue:
  - 'REYGA: You''ve all seen my experimental data. The metaphasic shield has been
    proven.'
  - 'T''PAN: Forgive my skepticism, Doctor, but your claims are somewhat extravagant.
    Protect a shuttle within a star''s corona? Not even your own government believes
    it can be done.'
  - 'KURAK: You wouldn''t be the first scientist to manipulate experimental data to
    his own advantage...'
  - 'JO''BRIL: I will volunteer for that task. I''ve spent years studying solar plasma
    reactions. The thought of being able to penetrate a star''s corona... it''s a
    remarkable opportunity.'
  - 'REYGA: Doctor Jo''Bril... I am gratified. And there will be no difficulty operating
    the metaphasic controls—the system will activate automatically as you approach
    the star.'
