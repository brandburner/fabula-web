  title: Crusher discovers Jo'Bril's impossible physiology
  description: In Sickbay, Beverly Crusher examines Jo'Bril's corpse under a medical
    scanner, revealing physiological anomalies that defy his species' legendary resilience.
    When Nurse Ogawa's tissue scan confirms an abnormally low rate of cellular decay—an
    impossibility for his kind—Beverly's confusion deepens. Picard arrives, questioning
    her findings, and their exchange reveals his concern for her emotional state,
    framing her obsession with Reyga's death as a form of unresolved grief. The discovery
    of Jo'Bril's unnatural cellular stability becomes a critical clue, hinting at
    sabotage and foreshadowing his later revelation as the true saboteur. The scene
    underscores Beverly's relentless pursuit of the truth while exposing the personal
    toll of her investigation, as Picard's warning about her loneliness and grief
    lingers unaddressed. The medical mystery deepens, setting up the next phase of
    Beverly's investigation into the shuttle mission's true cause.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e22
  scene_sequence: 8
  sequence_in_scene: 14
  key_dialogue:
  - 'PICARD: How''s it going?'
  - 'BEVERLY: I''ve never run into a humanoid species like this... His internal physiology
    is baffling. He doesn''t seem to have discrete ''organs''... at least not in the
    traditional sense... practically every system is evenly distributed throughout
    his body. That kind of physiology should make him incredibly resistant to injury...
    so whatever killed him had to occur at the cellular level...'
  - 'PICARD: Are you doing it for Reyga... or yourself?'
  - 'BEVERLY: What do you mean?'
  - 'PICARD: You''re the loneliest person in the world right now... no one can say
    anything... no one can do anything that will help. You don''t think it''ll ever
    go away. And you''re right. It never does. But you can live with it. It doesn''t
    feel that way now, but you can.'
