- fabula_uuid: cand_evt_scene_ba4ef9aa32f38a43_01
  global_id: null
  title: Beverly vaporizes Jo'Bril in the shuttle
  description: "\n  In the final moments of the doomed shuttle, Beverly and Jo'Bril\
    \ engage in a brutal physical struggle for control of a phaser as the vessel's\
    \ metaphasic shield collapses. The violent turbulence makes aiming difficult,\
    \ but Beverly manages to fire, striking Jo'Bril in the chest—only to discover\
    \ his body possesses an unnatural ability to regenerate. When he continues advancing\
    \ despite the fatal wound, Beverly realizes she must act decisively. She unleashes\
    \ a sustained phaser burst, vaporizing him entirely. The act forces her to confront\
    \ the moral weight of taking a life, even in self-defense, while the shuttle's\
    \ imminent destruction looms. With Jo'Bril eliminated, Beverly turns her focus\
    \ to stabilizing the vessel, her hands moving urgently over the controls as the\
    \ computer warns of hull failure. The moment crystallizes the mission's catastrophic\
    \ consequences and her role in them, marking a turning point where survival and\
    \ ethics collide.\n  "
