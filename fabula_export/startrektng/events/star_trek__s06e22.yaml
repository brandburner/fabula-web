  title: Crusher Terminates Reyga’s Experiment
  description: "\n  In the Science Lab, Beverly Crusher delivers the final verdict\
    \ on Reyga’s metaphasic shield experiment, shutting it down permanently after\
    \ Jo’Bril’s death. Reyga, desperate to prove his theory, pleads for more time,\
    \ but Beverly—bound by her medical oath and the safety of the crew—refuses, citing\
    \ the ethical and practical risks. The team’s reactions reveal deep fractures:\
    \ Christopher invokes Jo’Bril’s death as a cautionary reminder, T’Pan dismisses\
    \ the shield’s feasibility, and Kurak’s blunt question—*‘Whom do you propose to\
    \ sacrifice next?’*—cuts to the moral core of the experiment. Reyga, humiliated\
    \ but defiant, vows to pilot the shuttle himself, a moment that foreshadows his\
    \ fatal obsession. Beverly’s internal monologue underscores her conflict: she\
    \ admires Reyga’s tenacity but knows the project is over. The scene ends with\
    \ Reyga’s exit, marking the last time Beverly sees him alive—a tragic irony that\
    \ underscores the experiment’s irreversible consequences. The tension between\
    \ scientific ambition and ethical responsibility reaches its peak here, setting\
    \ up Reyga’s doomed solo mission and Beverly’s unwitting role in his death.\n\
    \  "
