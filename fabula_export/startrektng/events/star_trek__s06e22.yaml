      \ signal. The ship’s unwitting role as a potential rescuer is undermined by\
      \ Jo'Bril’s deception, which convinces its crew that the shuttle has been destroyed.\
      \ The *Enterprise*’s sensors, normally a lifeline for stranded crew, are blinded\
