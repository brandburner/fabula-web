  - 'PICARD: How''s it going?'
  - 'BEVERLY: I''ve never run into a humanoid species like this... His internal physiology
    is baffling. He doesn''t seem to have discrete ''organs''... at least not in the
    traditional sense... practically every system is evenly distributed throughout
    his body.'
  - 'PICARD: The answers will come, Beverly...'
  - 'BEVERLY: I couldn''t close my eyes. I have to find out what killed him. I owe
    that to Doctor Reyga.'
  - 'PICARD: Are you doing it for Reyga... or yourself? You''re the loneliest person
    in the world right now... no one can say anything... no one can do anything that
    will help. You don''t think it''ll ever go away. And you''re right. It never does.
    But you can live with it. It doesn''t feel that way now, but you can.'
