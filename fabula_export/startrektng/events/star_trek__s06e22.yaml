  title: Crusher autopsies Reyga against protocol
  description: Alone in the morgue, Beverly Crusher—haunted by the mission’s fatal
    consequences and Reyga’s suspicious death—overrides medical protocols to conduct
    an unauthorized autopsy. Her conviction that forensic evidence holds the key to
    exposing the conspiracy drives her to take a calculated risk, blurring the line
    between duty and obsession. The moment marks a turning point in her investigation,
    as she defies Starfleet’s authority to pursue the truth, knowing the potential
    consequences for her career and reputation. The act underscores her moral resolve
    and the depth of her commitment to Reyga’s legacy, even as it isolates her further
    from her colleagues and superiors. The autopsy itself becomes a symbolic act of
    rebellion against the systemic failures that led to Reyga’s death, setting the
    stage for her eventual confrontation with the saboteur and the conspiracy’s architects.
