  - location_uuid: ger_location_e81aa1482f70
    description_of_involvement: "\n        The experimental shuttle, deep within Vaytan’s\
      \ corona, is a pressure cooker of scientific ambition and existential risk.\
      \ Its cramped interior becomes Beverly’s solitary stage, where her relief at\
      \ the shield’s success is swiftly overshadowed by the creeping dread of sabotage.\
      \ The external fury of the star’s plasma presses against the hull, a metaphor\
      \ for the unseen threats lurking within the *Enterprise*’s own ranks. The location’s\
      \ atmosphere is one of fragile stability—alarms could blare at any moment, systems\
      \ could fail, and Beverly’s suspicions could prove fatal. It’s a place where\
      \ triumph and disaster are separated by a thread.\n      "
