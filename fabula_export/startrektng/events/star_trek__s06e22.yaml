  - 'WORF: Sir, she has isolated her navigational control... it will not be possible
    to establish remote operation.'
  - 'RIKER: Get a tractor beam on her.'
  - 'WORF: I cannot establish a lock, she is too close to the star... solar interference
    is too high.'
  - 'PICARD: Mister Data, what''s her heading?'
  - 'DATA: Bearing two-seven-one mark four. She is heading into the sun''s corona.'
