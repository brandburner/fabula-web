- fabula_uuid: cand_evt_scene_13bf3a0217db9430_01
  global_id: null
  title: Crusher defies Picard over Reyga’s shield
  description: On the *Enterprise* bridge, Picard orders Beverly to abort her shuttle
    mission into the star, dismissing Reyga’s unproven metaphasic shield as reckless.
    Beverly refuses, invoking her medical oath and the potential scientific breakthrough,
    creating a tense standoff. Picard escalates by ordering Worf to override the shuttle’s
    controls, but Beverly has already isolated navigation, rendering remote intervention
    impossible. As the shuttle hurtles toward the sun’s corona, the crew’s attempts
    to stop it—tractor beams, remote overrides—fail due to solar interference. The
    scene crystallizes the fracture between Picard’s caution and Beverly’s conviction,
    exposing their professional and personal tension over risk, trust, and command.
    Beverly’s defiance isn’t just about Reyga’s shield; it’s a rebellion against Starfleet’s
    bureaucratic skepticism, a gamble that could either vindicate her or doom her
    career—and possibly her life. The moment forces Picard to confront his own rigid
    adherence to protocol, while Beverly’s actions reveal her willingness to sacrifice
    everything for what she believes in, setting the stage for the mission’s catastrophic
    consequences and the conspiracy that follows.
