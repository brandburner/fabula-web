  title: Crusher and Data trace sabotage via tetryon evidence
  description: "\n  Beverly Crusher enters the shuttle to find Data conducting diagnostics\
    \ on the hull, revealing her growing suspicion of sabotage. She presses Data to\
    \ explore the theoretical possibility of remote interference with Reyga’s shield\
    \ system, despite his initial dismissal of sabotage. Data methodically outlines\
    \ how a phased ionic pulse could disrupt the metaphasic shield during Jo’Bril’s\
    \ test flight, creating a tetryon field that might leave detectable traces in\
    \ Jo’Bril’s tissue. Beverly’s realization that this forensic path could expose\
    \ the saboteur marks a critical shift—her scientific curiosity now aligns with\
    \ her investigative drive, setting the stage for her next risky move: breaking\
    \ protocol to scan Jo’Bril’s remains. The exchange underscores Beverly’s tenacity\
    \ and Data’s analytical precision, while the tetryon clue becomes the linchpin\
    \ for unraveling the conspiracy. The scene’s tension lies in the contrast between\
    \ Data’s detached logic and Beverly’s emotional urgency, both of which propel\
    \ the investigation forward.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e22
  scene_sequence: 20
  sequence_in_scene: 34
  key_dialogue:
  - |-
    BEVERLY: Data... what are you doing here?
    DATA: I am running additional diagnostics to make certain there was no permanent radiation damage to the shuttlecraft hull.
  - |-
    BEVERLY: Data, you've studied Doctor Reyga's shield system. Tell me—do you think it could've been sabotaged?
    DATA: There was no evidence to suggest sabotage.
    BEVERLY: Just consider the possibility...
    DATA: The system interlocks prevent access to the circuitry unless the shield emitter is active. Any attempt to sabotage the device would have to be made while the shield was in operation.
    BEVERLY: The only time the shield was active was during Jo'Bril's test flight.
    DATA: That is correct. It seems unlikely that Jo'Bril would perform sabotage which would result in his own death.
  - |-
    BEVERLY: Would it be possible to sabotage the shuttle by remote, during the flight?
    DATA: A phased ionic pulse beamed directly into the metaphasic projection matrix would cause a temporary system malfunction.
    BEVERLY: Where on the Enterprise could you generate a phased ionic pulse?
    DATA: Such a pulse could be initiated from the lateral sensor arrays, Science Labs one, four, or sixteen, or any of the bridge science stations.
    BEVERLY: Let's assume for the moment that someone did send out a phased ionic pulse... what would've happened inside the shuttle?
    DATA: A tetryon field would have formed briefly inside the cabin, temporarily disrupting the metaphasic shield.
    BEVERLY: A tetryon field... If Jo'Bril had been exposed to a tetryon field, it might have left residual traces in his tissue...
