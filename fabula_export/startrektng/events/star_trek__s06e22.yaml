- fabula_uuid: act_c5217fe5b92c3966
  number: 4
  summary: 'Driven by Guinan''s challenge, Beverly covertly resumes her investigation,
    focusing on the possibility of sabotage. She enlists Data''s help in the shuttlebay,
    inquiring about potential sabotage methods. Data explains that a phased ionic
    pulse, generated from various ship locations, could have created a temporary tetryon
    field inside the shuttle, disrupting the metaphasic shield. Beverly immediately
    connects this to the possibility of finding residual tetryon traces in Jo''Bril''s
    tissue. Commander Riker intercepts Beverly, warning her against any "foolish"
    actions that could worsen her impending formal inquiry, urging her to remain in
    her quarters. Beverly, however, firmly rejects his advice, asserting she "can''t
    quit now" and prioritizing the truth over her career. Back in Sickbay, she attempts
    to access restricted autopsy files but is denied. Nurse Ogawa, witnessing Beverly''s
    unwavering resolve, defies her own orders and uses her access to retrieve Jo''Bril''s
    medical records. Together, they perform a molecular-level tissue scan on Jo''Bril''s
    body, discovering the critical evidence: tetryon traces in his subdermal tissue.
    This discovery confirms the sabotage. With grim determination, Beverly realizes
    there''s only one way to definitively prove Reyga''s shield works and expose the
    saboteur. Defying Picard''s implicit and explicit orders, she launches the modified
    shuttle, the Justman, into the sun''s corona herself, shocking the Bridge crew
    and setting the stage for a dangerous confrontation.'
