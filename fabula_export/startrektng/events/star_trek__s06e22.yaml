      sterile but precarious interior, the hum of systems masking the potential for
      catastrophic failure.
    functional_role: Isolated testing ground for Reyga’s shield, now a potential deathtrap
      for Beverly.
    symbolic_significance: Represents the thin line between scientific breakthrough
      and catastrophic failure, as well as Beverly’s vulnerability in the face of
      hidden enemies.
    access_restrictions: Restricted to authorized personnel (Beverly, Reyga, and prior
      test pilots like Jo’Bril).
