  title: Crusher admits autopsy violation to Picard
  description: 'In Picard’s quarters, Beverly Crusher confesses to performing an autopsy
    on Dr. Reyga against explicit orders, violating Ferengi death customs. Picard’s
    initial restraint gives way to controlled anger as he outlines the cultural and
    professional consequences—including potential Ferengi government intervention
    and the erosion of his own authority. Beverly accepts full responsibility, but
    the exchange is charged with unspoken tension: Picard’s disappointment cuts deeper
    than any formal reprimand, while Beverly’s misery stems not just from the act
    itself but from betraying Picard’s trust. The scene underscores the fracture in
    their relationship, where duty and personal loyalty collide, and foreshadows the
    broader fallout of her insubordination. The flashback framing (via Beverly’s V.O.)
    emphasizes her retrospective guilt, framing this moment as a turning point in
    her moral and professional unraveling.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e22
  scene_sequence: 18
  sequence_in_scene: 30
  key_dialogue:
  - 'PICARD: Beverly. What can I do for you?'
  - 'BEVERLY: Jean-Luc. I''m going to tell you something you need to know. You won''t
    like it. I just did an autopsy on Doctor Reyga.'
  - 'PICARD: You most certainly should not. I made it clear to you that the family
    expressly prohibited it. You have not only disobeyed my order, you have interfered
    in the death rituals of another culture.'
  - 'BEVERLY: I know.'
  - 'PICARD: If the Ferengi government gets into it... and I''m certain they will...
    there might be some significant repercussions. I''m not sure how much I could
    protect you.'
  - 'BEVERLY: You don''t have to, Jean-Luc. I knew what I was doing. I''m prepared
    to accept the consequences.'
