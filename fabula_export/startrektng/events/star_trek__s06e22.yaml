- fabula_uuid: cand_evt_scene_51c3d6eb4e14f409_01
  global_id: null
  title: Shuttle triumph collapses into crisis
  description: "\n  The *Enterprise* crew experiences a fleeting moment of triumph\
    \ as Beverly Crusher’s shuttle successfully penetrates the sun’s corona, proving\
    \ Reyga’s metaphasic shield technology works. The bridge erupts in relief, but\
    \ Beverly’s victory is immediately undercut by her suspicion of sabotage—she demands\
    \ Picard place security on the visiting scientists, citing the first test’s failure\
    \ as evidence of foul play. Before she can elaborate, the shuttle’s transmission\
    \ cuts to static, severing contact and plunging the crew into alarm. The abrupt\
    \ loss of signal foreshadows deeper conspiracy, transforming the celebration into\
    \ a crisis and forcing Picard into a security response. The scene pivots from\
    \ scientific achievement to existential threat, with Beverly’s instincts now the\
    \ only guide in unraveling the sabotage.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e22
  scene_sequence: 27
  sequence_in_scene: 44
  key_dialogue:
  - 'PICARD: Beverly -- what''s happening?'
  - 'BEVERLY: I''m all right... ((to computer)) Computer -- shield status?'
  - 'COMPUTER VOICE: Metaphasic shield holding... all systems within normal operating
    parameters.'
  - 'BEVERLY: ((quietly)) Congratulations, Doctor Reyga... you did it.'
  - 'BEVERLY: Captain, I want you to post security guards on the three visiting scientists...
    one of them has to be responsible for sabotaging the first test... I think if
    we -'
  - 'WORF: Sir, we''ve lost contact.'
