      failure. The viewscreen’s glow casts long shadows, the shuttle’s plunge into
      the corona the only light in the room.
    functional_role: The command center where authority is tested and found wanting.
      The bridge is the heart of the *Enterprise*, but in this moment, it’s a cage—Picard’s
      orders cannot reach Beverly, and the crew’s technology cannot save her.
    symbolic_significance: Embodies the tension between institutional power and individual
      defiance. The bridge is Starfleet’s domain, but Beverly’s actions force the
      crew to confront its limitations—its rules cannot stop her, and its technology
      cannot save her.
    access_restrictions: Restricted to senior staff only. The bridge is locked down,
      the crew’s focus solely on the crisis at hand.
