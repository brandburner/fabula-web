    because it was sabotaged... and I''m going to prove it.'
  - 'PICARD: You can''t be certain of that. You''re betting your life on a hypothesis.'
  - 'BEVERLY: I''m not wrong.'
  - 'DATA: Sir, the shuttle is entering the corona.'
