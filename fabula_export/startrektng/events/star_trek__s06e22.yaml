  title: Crusher’s confession to Guinan
  description: 'Beverly Crusher, in the midst of packing for her impending formal
    inquiry and professional disgrace, spirals into self-recrimination while treating
    Guinan’s minor injury. Her agitated state—marked by rapid, disjointed speech and
    physical restlessness—reveals the depth of her guilt over Reyga’s experiment and
    the fallout from her advocacy. Guinan, initially posing as a patient, subtly redirects
    Beverly’s focus from self-pity to the root of her crisis: her discomfort with
    complacency and her belief in Reyga’s discredited science. The scene pivots from
    Beverly’s bitter monologue about her career’s end to a reluctant admission of
    her motivations—her role as a ‘scientific diplomat’ and her frustration with the
    scientific community’s prejudice against Reyga. Guinan’s quiet persistence forces
    Beverly to confront the emotional and ethical stakes of her choices, setting the
    stage for her eventual reckoning with the consequences of her actions. The moment
    underscores Beverly’s vulnerability beneath her professional composure and Guinan’s
    role as a catalyst for her emotional and investigative awakening.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e22
  scene_sequence: 2
  sequence_in_scene: 2
  key_dialogue:
  - 'BEVERLY: Three days on the shuttle to Starbase twenty-three... then a transport
    back to Earth... I can hear Admiral Brooks now, telling me how I''ve disgraced
    Starfleet Medical... Then a leisurely day and a half before the formal inquiry
    begins and my career ends.'
  - 'GUINAN: Do I have to break my leg before you tell me what happened?'
  - 'BEVERLY: It started when I invited those scientists on board... No. It started
    at the Altine Consortium. Actually, it probably started before that. When I began
    feeling... comfortable. Too comfortable.'
  - 'BEVERLY: I thought I could be a... facilitator. You see, he had this amazing
    invention, based on metaphasic field technology. But his methodology was completely
    unorthodox.'
  - 'GUINAN: Sort of a scientific diplomat.'
  - 'BEVERLY: That''s it exactly. And believe me, it wasn''t easy.'
