    emotional_state: "\n        **Tense empathy**. Geordi is clearly uncomfortable\
      \ being the bearer of bad news, but his duty to the truth—and to Starfleet’s\
      \ safety protocols—compels him to speak. His emotional state is a balance of\
      \ **professional detachment** (focusing on the data) and **quiet concern** (for\
      \ Reyga’s well-being and the implications of the failure).\n      "
    goals:
    - To provide accurate, actionable data about the shuttle’s damage to aid the investigation.
    - To ensure no technical oversight is missed that could endanger future missions.
    what_happened: "\n        *Correction: Geordi is the one physically present in\
      \ this event. Jo’Bril (agent_753638580a97) is not. Geordi stands near the shuttle’s\
      \ hull, tricorder in hand, his expression a mix of concentration and growing\
      \ concern. He joins the group after completing his scan, delivering his findings\
      \ with cautious professionalism. His tone is not accusatory, but his words—‘your\
      \ shield just wasn’t able to protect him’—land like a verdict. Geordi’s role\
      \ here is that of the reluctant truth-teller, his technical expertise unwittingly\
