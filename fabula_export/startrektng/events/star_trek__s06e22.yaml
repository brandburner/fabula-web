- fabula_uuid: cand_evt_scene_f99d63b66bdd1c8a_01
  global_id: null
  title: Shield failure exposes Reyga’s unraveling
  description: 'In the aftermath of the shuttle’s catastrophic test flight, Reyga,
    Geordi, and Data conduct a forensic examination of the damaged vessel, searching
    for mechanical explanations for the shield failure. Reyga’s desperation grows
    as each diagnostic confirms his systems functioned as designed, leaving no technical
    fault to blame. Geordi’s discovery of baryonic radiation damage to the hull forces
    Reyga to confront the possibility of an unforeseen variable—one he insists he
    accounted for. Beverly’s arrival heightens the tension, as her presence underscores
    the personal stakes: Reyga’s life’s work and reputation are collapsing, while
    the mission’s true risks become undeniable. The scene marks a turning point where
    technical failure intersects with Reyga’s emotional fracture, setting up his potential
    role in the conspiracy and foreshadowing Beverly’s deeper investigation into the
    experiment’s sabotage.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e22
  scene_sequence: 9
  sequence_in_scene: 17
  key_dialogue:
  - 'REYGA: Run another diagnostic on the EPS flow regulator.'
  - 'DATA: The flow regulator is functioning properly.'
  - 'REYGA: What about the field emitter coil? Has it maintained polarity?'
  - 'DATA: Yes, Doctor.'
  - 'REYGA: The radial force compensator?'
  - 'DATA: I am unable to locate any malfunction. All of your systems are operating
    according to your design specifications.'
  - 'GEORDI: I found some micro-crystalline damage to the hull which confirms that
    your shield was breached by a burst of baryonic radiation...'
  - 'BEVERLY: Were the levels high enough to damage organic tissue?'
  - 'DATA: Perhaps there was an unexpected interaction between the solar radiation
    and your metaphasic shield.'
  - 'REYGA: No, that''s not possible... I anticipated every contingency.'
