- fabula_uuid: act_1b27e88687bd54ec
  number: 3
  summary: This act plunges Beverly deeper into the mystery, shifting from a perceived
    accident to suspected murder. The narrative continues in flashback, as Beverly
    and Worf investigate a plasma surge in Science Lab Four, discovering Dr. Reyga's
    body. He is clutching a discharged plasma infuser, leading Worf to suspect suicide.
    However, Beverly's medical instincts immediately raise doubts, noting the unnatural
    grip on the device. Her suspicions solidify, but her path to investigation is
    obstructed when Picard informs her that Reyga's family, adhering to Ferengi death
    rituals, strictly forbids an autopsy. Despite Picard's sympathetic warnings about
    the futility and cultural insensitivity of pursuing the matter, Beverly remains
    convinced of foul play. Defying Picard's direct order and Starfleet protocol,
    she secretly performs an autopsy, finding no immediate answers but deepening her
    conviction that Reyga was murdered. Picard, angered by her insubordination and
    the potential diplomatic repercussions, officially relieves her of duty. The flashback
    ends, returning to Beverly's quarters where she finishes packing, explaining her
    predicament to Guinan. Guinan, instead of offering sympathy, challenges Beverly's
    anger and despair, urging her to act on her belief that a murderer is aboard the
    Enterprise, providing the catalyst for Beverly to abandon her resignation and
    resume her investigation with renewed determination.
