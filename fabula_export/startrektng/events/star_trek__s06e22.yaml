    description_of_involvement: 'Starfleet’s authority is the invisible but omnipotent
      force shaping this event. Beverly Crusher, as Chief Medical Officer, wields
      Starfleet’s protocols like a shield, her decision to shut down the experiment
      rooted in the organization’s core values: the safety and well-being of its crew
      above all else. The lab itself is a microcosm of Starfleet’s institutional power—sterile,
      regulated, and unyielding—where debates over scientific ethics are ultimately
      decided by rank and responsibility. Kurak, T’Pan, and Christopher, though skeptical
      of Reyga’s work, defer to Beverly’s authority, reinforcing Starfleet’s hierarchical
      structure. The organization’s influence is also felt in the unspoken threat
      of disciplinary action: Reyga’s defiance is not just a personal risk but a challenge
      to Starfleet’s chain of command, one that could lead to his ostracism or worse.'
    active_representation: Through Beverly Crusher’s authority as Chief Medical Officer
      and the lab’s institutional protocols, which frame the debate and enforce the
      final verdict.
    power_dynamics: Starfleet exercises unchallenged authority over the scientific
      panel, with Beverly as its primary representative. Her decision is final, backed
      by the weight of the organization’s ethical and safety regulations. Reyga’s
      defiance, while personal, is ultimately powerless against the system—his vow
      to pilot the shuttle himself is a desperate bid for autonomy in the face of
      institutional control.
    organizational_goals:
    - To enforce the safety and ethical guidelines of Starfleet, prioritizing crew
      well-being over experimental risks.
    - To uphold the chain of command and institutional protocols, even in the face
      of personal or scientific dissent.
    influence_mechanisms:
