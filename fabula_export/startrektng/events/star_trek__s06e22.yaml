  title: Crusher confirms sabotage with tetryon traces
  description: "\n  In the morgue, Beverly Crusher and Nurse Ogawa perform a high-resolution\
    \ tetryon scan on Jo'Bril's corpse, initially yielding no results. Beverly insists\
    \ on recalibrating the scanner to enhanced sensitivity, revealing trace tetryon\
    \ particles in the subdermal tissue—proof the shuttle's shield was deliberately\
    \ sabotaged. Ogawa remains skeptical, framing the evidence as circumstantial,\
    \ while Beverly's expression shifts from scientific curiosity to steely resolve.\
    \ The discovery marks a critical turning point: the conspiracy is no longer theoretical,\
    \ and Beverly's investigation now has forensic backing. The tension between scientific\
    \ certainty and professional skepticism underscores the stakes, as Ogawa's hesitation\
    \ forces Beverly to consider bolder, riskier measures to expose the truth. The\
    \ moment also foreshadows Beverly's next move—direct confrontation with the saboteur—while\
    \ reinforcing her role as the story's relentless truth-seeker.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e22
  scene_sequence: 23
  sequence_in_scene: 38
  key_dialogue:
  - 'BEVERLY: We''ll have to run a tissue scan at the molecular level. Calibrate the
    scanner to detect tetryon particles.'
  - 'OGAWA: Nothing...'
  - 'BEVERLY: Let''s try it again. Use the enhanced resolution mode to boost the sensitivity.'
  - 'OGAWA: Look... in the subdermal tissue... tetryon traces...'
  - 'BEVERLY: So someone did sabotage the shield...'
  - 'OGAWA: That''s a possibility... but this is very circumstantial evidence.'
