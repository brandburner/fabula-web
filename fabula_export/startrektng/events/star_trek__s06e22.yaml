    - By the implicit threat of disciplinary action against Reyga, should he defy
      Beverly’s orders.
    institutional_impact: Starfleet’s involvement ensures that the shutdown of the
      metaphasic shield experiment is not just a personal or scientific decision but
      a reflection of the organization’s broader commitment to ethical responsibility.
      The event reinforces Starfleet’s role as a guardian of both innovation and safety,
      even when those values come into conflict.
    internal_dynamics: 'The debate in the Science Lab reveals underlying tensions
      within Starfleet’s scientific community: the push for bold innovation (represented
      by Reyga) versus the demand for rigorous, ethical oversight (embodied by Beverly,
