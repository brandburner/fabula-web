  title: Scientists debate Reyga’s shield technology
  description: "\n  In the Science Lab, Beverly Crusher convenes a skeptical panel\
    \ of scientists—Klingon warp specialist Kurak, Vulcan subspace theorist T’Pan\
    \ and her human husband Christopher, and Takaran physicist Jo’Bril—to evaluate\
    \ Reyga’s controversial metaphasic shield. The Ferengi scientist, uncharacteristically\
    \ composed, defends his work against T’Pan’s logical skepticism and Kurak’s outright\
    \ hostility, which escalates into an accusation of data falsification. Beverly\
    \ intervenes, proposing a live demonstration by flying a shuttle into the corona\
    \ of the unstable star Vaytan. Jo’Bril unexpectedly volunteers to pilot the mission,\
    \ citing his expertise in solar plasma and his confidence in Reyga’s theory. The\
    \ group agrees to proceed, though Kurak and Christopher insist on an ‘impartial’\
    \ evaluation. The exchange reveals deep-seated tensions: Kurak’s cultural disdain\
    \ for science, T’Pan’s professional rivalry, and Jo’Bril’s hidden agenda. Beverly’s\
    \ relief at securing a volunteer masks her unease about the risks, while Reyga’s\
    \ quiet triumph underscores his isolation and desperation for validation. The\
    \ scene sets up the high-stakes test flight, foreshadowing the shuttle disaster\
    \ and the conspiracy that will unravel around Reyga’s death.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e22
  scene_sequence: 3
  sequence_in_scene: 4
  key_dialogue:
  - 'T''PAN: Forgive my skepticism, Doctor, but your claims are somewhat extravagant.
    Protect a shuttle within a star''s corona? Not even your own government believes
    it can be done.'
  - 'KURAK: You wouldn''t be the first scientist to manipulate experimental data to
    his own advantage...'
  - 'REYGA: What better way to test my invention? I''m not concerned—the shield will
    hold.'
  - 'JO''BRIL: I will volunteer for that task. I''ve spent years studying solar plasma
    reactions. The thought of being able to penetrate a star''s corona... it''s a
    remarkable opportunity.'
  - 'BEVERLY: We''d want to be sure that you''re familiar with the shuttle controls...
    and Doctor Reyga''s modifications...'
  - 'REYGA: Doctor Jo''Bril... I am gratified. And there will be no difficulty operating
    the metaphasic controls—the system will activate automatically as you approach
    the star.'
