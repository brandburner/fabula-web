  title: Guinan Provokes Beverly’s Rage
  description: 'In the raw aftermath of her relief from duty, Beverly Crusher—emotionally
    unraveling—attempts to confide in Guinan, seeking sympathy for the career-ending
    consequences of her actions. Instead of offering comfort, Guinan deliberately
    deflects, fixating on her own trivial concerns (a tennis injury) while Beverly’s
    frustration escalates into explosive anger. Guinan, recognizing Beverly’s suppressed
    rage, deliberately stokes it, forcing her to confront her own inaction. The confrontation
    culminates in Guinan’s blunt challenge: *‘If you’re angry—maybe you’ll stop moping
    and do something.’* This moment marks a critical turning point, where Beverly’s
    grief and guilt are weaponized into motivation, pushing her toward resuming her
    investigation despite the professional risks. Guinan’s provocations reveal her
    hidden role as a catalyst, subtly steering Beverly toward the conspiracy’s truth
    while masking her own deeper knowledge of the situation. The scene ends with Beverly
    storming out, her resolve reignited but her path forward still uncertain.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e22
  scene_sequence: 19
  sequence_in_scene: 31
  key_dialogue:
  - 'BEVERLY: Two people have died on this ship... two lives that ended, horribly...
    and you''re worried about your tennis game?'
  - 'GUINAN: Doctor... are you angry?'
  - 'BEVERLY: Angry? For two hours, I''ve poured my heart out to you... and all you
    care about is your elbow. You bet I''m angry!'
  - 'GUINAN: Then what are you going to do about it?'
  - 'GUINAN: Do you think Reyga killed himself?'
  - 'BEVERLY: No.'
  - 'GUINAN: Do you think there''s a murderer on the Enterprise?'
  - 'BEVERLY: Yes.'
  - 'GUINAN: Then why are you standing here?'
