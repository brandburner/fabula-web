  object_involvements:
  - object_uuid: ger_object_ba67263bcd10
    description_of_involvement: Beverly Crusher’s medical tricorder is the tool that
      bridges clinical objectivity and emotional intuition. She sweeps it over Reyga’s
      body, its glowing sensor array scanning for post-mortem indicators of cause
      of death. The device hums as it assesses organ function and plasma surge effects,
      confirming the unnatural grip on the discharged infuser. She snaps it shut decisively,
      signaling the completion of her initial exam and the beginning of her defiance
      against institutional assumptions. The tricorder is both a diagnostic instrument
      and a symbol of Beverly’s authority as a medical officer, empowering her to
      challenge Worf’s suicide theory.
    status_before_event: Activated and in Beverly’s hand, ready for use in examining
      Reyga’s body.
    status_after_event: Deactivated and secured, having provided critical evidence
      that contradicts the suicide narrative.
    global_id: ger_object_ba67263bcd10
  - object_uuid: ger_object_d9f845c1d33d
    description_of_involvement: The glassine evidence bag is a mundane yet crucial
      object that transforms the plasma infuser from a mere clue into irrefutable
      evidence. Beverly seals the discharged infuser inside it, preserving it for
      the autopsy and investigation. The bag’s transparency symbolizes the clarity
      Beverly seeks amid the institutional fog of denial and skepticism. Its presence
      underscores the shift from grief to investigation, as Beverly prepares to challenge
      Starfleet’s assumptions and uncover the truth behind Reyga’s death.
    status_before_event: Empty and ready for use, lying nearby or in Beverly’s possession.
    status_after_event: Containing the plasma infuser, secured and labeled as evidence,
      awaiting transport to the morgue for further analysis.
    global_id: ger_object_d9f845c1d33d
  - object_uuid: ger_object_cb54a1285369
    description_of_involvement: The plasma infuser is the linchpin of the scene, a
      small but devastating clue that transforms Reyga’s death from a tragic accident
      into a deliberate murder. Beverly pries it from Reyga’s rigid fist, noting its
      fully discharged state and the unnatural grip that defies the expected reflex
      response. She scans it with her tricorder, confirming its discharge and bagging
      it in glassine as evidence. The infuser’s presence challenges Worf’s suicide
      theory and becomes the focal point of Beverly’s investigation, symbolizing the
      conspiracy that led to Reyga’s death and the institutional bias that sought
      to cover it up.
    status_before_event: Clenched in Reyga’s fist, fully discharged, and surrounded
      by the residual energy of the plasma surge.
    status_after_event: Secured in a glassine evidence bag, labeled as critical evidence
