acts:
- fabula_uuid: act_ee82295125ea54cf
  number: 1
  summary: 'This act introduces Dr. Beverly Crusher''s professional crisis and the
    events leading to it. The teaser opens with an agitated Beverly packing, revealing
    she''s been relieved of duty. Guinan''s casual visit for a tennis injury provides
    a narrative frame for Beverly to recount her downfall. Beverly explains her motivation
    to attend the Altine Consortium, seeking new research and feeling "too comfortable."
    There, she discovered Dr. Reyga, a Ferengi scientist ostracized for his unorthodox
    metaphasic shield technology. Believing in his potential, Beverly invited Reyga
    and other prominent scientists—Kurak (Klingon), T''Pan (Vulcan), Dr. Christopher
    (human), and Jo''Bril (Takaran)—aboard the Enterprise to evaluate his invention.
    Despite initial skepticism, Reyga convinced the group of his shield''s viability.
    Jo''Bril volunteered to pilot a modified shuttle into the Vaytan star''s corona
    for a demonstration. The mission began successfully, with the shield holding against
    extreme temperatures and radiation. However, elevated neutrino levels and then
    rapidly rising baryon particles appeared in the cabin, causing Jo''Bril to lose
    consciousness. The Enterprise crew could not beam him out due to solar interference
    until the shuttle exited the corona. Jo''Bril died shortly after arriving in Sickbay,
    leaving Beverly devastated and questioning the mission''s failure. This act establishes
    the core conflict: the perceived failure of Reyga''s invention and the tragic
    death of Jo''Bril, which directly leads to Beverly''s professional jeopardy.'
