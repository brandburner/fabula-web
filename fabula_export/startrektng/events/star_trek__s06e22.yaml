  global_id: null
  title: Shuttle experiment collapses into crisis
  description: |2

    The shuttle's metaphasic shielding test appears to succeed as Jo'Bril pilots into the star's corona, with Beverly and Reyga sharing a moment of triumph. The cabin remains stable despite extreme external conditions, and Reyga's technology seems validated. However, the moment shatters when Jo'Bril reports elevated neutrino levels, followed by a sudden surge of baryon particles destabilizing the experiment. Jo'Bril becomes unresponsive, gasping for air as the shuttle's systems fail. Picard orders an emergency extraction, but the solar radiation delays transport. Beverly rushes to Sickbay as Jo'Bril collapses, his unconscious body the first casualty of the experiment's catastrophic failure. The scene shifts from scientific validation to life-or-death urgency, exposing the experiment's fatal flaw and forcing Beverly to confront the consequences of her advocacy. Reyga's ashen expression underscores the personal and professional stakes now at risk.
