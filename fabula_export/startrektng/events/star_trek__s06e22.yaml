    own life.'
  - 'BEVERLY: Or perhaps someone just wants it to look that way. Look at this... isn''t
    it odd that he could hold on so tightly to the infuser when it was discharged.
    The normal reflex would be to drop it.'
  - 'BEVERLY: I''ll know for certain when I do the autopsy.'
