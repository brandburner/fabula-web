    emotional_state: Analytically detached, but his role as the bearer of bad news
      makes him a reluctant participant in the crew’s unraveling. There’s a quiet
      tension in his posture—he understands the stakes, even if he doesn’t show it.
    goals:
    - To provide accurate, real-time data to aid the crew’s decision-making (even
      if it’s futile).
