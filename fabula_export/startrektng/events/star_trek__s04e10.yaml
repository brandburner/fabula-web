  title: Troi resigns without explanation
  description: 'Deanna Troi exits Picard’s Ready Room abruptly, her body language
    rigid and her expression unreadable, signaling a decisive break from her professional
    role. Picard follows moments later, his own posture tense, and immediately delivers
    the news of her resignation to Riker with quiet gravity. The scene hinges on Troi’s
    unspoken crisis—her loss of empathic abilities has rendered her unable to fulfill
    her counselor duties, yet she refuses to articulate this vulnerability, instead
    choosing silence and withdrawal. Riker’s puzzled reaction underscores the crew’s
    growing unease, as Troi’s departure leaves a critical void in the ship’s emotional
    and psychological stability. The moment is a turning point: Troi’s resignation
    isn’t just a personal failure but a fracture in the crew’s cohesion, occurring
    as the *Enterprise* faces an existential threat. Picard’s restrained delivery
    contrasts with Riker’s unspoken concern, creating a tension between institutional
    duty and human fragility. The scene’s brevity amplifies its weight—what isn’t
    said speaks volumes about Troi’s internal collapse and the crew’s unspoken fears.'
