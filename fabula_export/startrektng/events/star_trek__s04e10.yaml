  organization_involvements:
  - organization_uuid: ger_organization_245261bdcf54
    description_of_involvement: 'The *USS Enterprise (NCC-1701-D)* is the *living,
      breathing entity* behind this event, its survival the ultimate stakes of Picard’s
      appeal to Troi. The ship’s systems hum in the background, a constant reminder
      of the crew’s desperation and the ticking clock. Picard frames the 2D lifeforms’
      unresponsiveness as a *threat to the Enterprise’s existence*, tying Troi’s participation
