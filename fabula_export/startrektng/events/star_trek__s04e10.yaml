- fabula_uuid: cand_evt_scene_feaee5684b3d6830_01
  global_id: null
  title: Troi’s empathic failure exposes her crisis
  description: 'During a high-stakes briefing in the Observation Lounge, the *Enterprise*
    crew debates the nature of the cosmic anomaly pulling the ship toward a cosmic
    string. When Picard directly asks Troi to sense any lifeforms, she freezes—her
    usual confidence shattered. Her inability to detect *anything*, not just the anomaly
    but even her colleagues, triggers a visible panic. The crew’s confusion turns
    to alarm as she admits her empathic abilities have vanished entirely, leaving
    her emotionally blind. Riker rushes to her side as she clutches her head in terror,
    the moment marking a public unraveling of her identity and the crew’s unspoken
    reliance on her gifts. The scene pivots from external threat to internal crisis,
    forcing Picard and Riker to confront Troi’s fragility while Data’s rationalizations
    fail to address the deeper human stakes. The fade-out underscores the escalation:
    her collapse is no longer private but a shared vulnerability that could destabilize
    the crew’s cohesion during the looming crisis.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e10
  scene_sequence: 15
  sequence_in_scene: 19
  key_dialogue:
  - 'PICARD: Counselor, do you sense a lifeform out there?'
  - 'TROI: I don''t think so... No, there''s nothing... Strange, I sense... nothing.
    Not out there, not in here. All of you, you''re blank to me.'
  - 'RIKER: Deanna.'
