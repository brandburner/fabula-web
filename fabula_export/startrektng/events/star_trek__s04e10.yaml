  title: Troi’s professional mask slips with Brooks
  description: In a private counseling session, Deanna Troi—still grappling with the
    sudden loss of her empathic abilities—attempts to maintain her professional demeanor
    while probing Ensign Janet Brooks about her emotional breakthrough. Brooks, who
    claims to feel 'a new woman' after finally confronting her grief over her husband’s
    death, becomes an unwitting mirror for Troi’s own unspoken crisis. Troi’s attempt
    to share her vulnerability backfires when Brooks dismisses her skepticism, exposing
    Troi’s professional insecurity and the fragility of her identity without her empathic
    gifts. The scene underscores Troi’s struggle to reconcile her role as a counselor
    with her personal loss, while Brooks’ defiance highlights the tension between
    perceived progress and unresolved pain. The exchange leaves Troi emotionally exposed,
    her usual confidence replaced by desperation as she realizes her inability to
    read Brooks—or herself—without her empathic sense.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e10
  scene_sequence: 19
  sequence_in_scene: 25
  key_dialogue:
  - |-
    TROI: You said you woke up 'a new woman this morning.
    BROOKS: That's how I feel...
    TROI: Tell me about her - this new woman...
  - |-
    BROOKS: She's not holding anything back anymore.
    TROI: She's not?
    BROOKS: I let it all out last night. I cried for two hours. I realized I'd never accepted the loss of my husband.
  - |-
    TROI: I'm having a very difficult time today. And I feel you need to know.
    BROOKS: What's wrong?
    TROI: I've temporarily lost my empathic sense. It's kind of like having one hand tied behind your back.
    BROOKS: I'm sorry... do you want me to come back?
    TROI: No, no, I'm fine. It's just... I feel before we continue it's important you know that.
  - |-
    TROI: Because I can't tell how you feel this morning, but it... it seems to me... one night of crying can't make up for months of pretending.
    BROOKS: No. You're wrong. I feel better today than I have in ages. You're absolutely wrong, Deanna.
