  title: Engine shutdown fails to alter course
  description: 'The Enterprise’s shuddering ceases after Picard orders an emergency
    engine shutdown, but Allenby’s sensor readings confirm the ship remains locked
    on its deadly trajectory toward the cosmic string fragment. The failure exposes
    a critical truth: the threat isn’t mechanical but tied to the anomaly’s fundamental
    nature, forcing the crew to confront an existential crisis. Picard and Riker exchange
    a tense, unspoken acknowledgment of the escalating danger, while Data’s earlier
    warning about structural integrity now looms as a secondary concern. The moment
    underscores the crew’s vulnerability and the anomaly’s inescapable pull, shifting
    the narrative from technical solutions to a deeper, more existential confrontation
    with the unknown.'
