      her fingers gripping the edge as Beverly delivers the diagnosis. She forces
      a smile and makes light of the situation—'It's just hope, Beverly. Not false
      hope.'—but her impatience ('I may be perfectly fine by tomorrow') and interruption
      of Beverly's warnings betray her denial. Her insistence on returning to duty
      despite Beverly's objections reveals her desperation to reclaim her identity,
      even as her emotional fragility surfaces in her laughter and abrupt exit.
