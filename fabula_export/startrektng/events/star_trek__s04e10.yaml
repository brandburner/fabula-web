  description: "\n  Beverly Crusher enters Troi’s office to find her in diminished\
    \ but lingering distress, her earlier headache now replaced by a disorienting\
    \ mental fog. Beverly’s tricorder scan reveals unusual readings, prompting her\
    \ to insist on further medical testing in Sickbay. Just as Troi agrees to leave,\
    \ Riker’s urgent com-summons interrupts, redirecting the scene’s focus from Troi’s\
    \ private crisis to the crew’s impending crisis meeting. Troi’s brief, unsettling\
    \ hesitation—where she stares at Beverly with an uncharacteristically blank expression—hints\
    \ at deeper neurological instability, foreshadowing how her empathic collapse\
    \ may intersect with the crew’s looming confrontation with the cosmic string fragment.\
    \ The tension between Troi’s personal vulnerability and her professional obligation\
    \ sharpens the stakes of the impending crisis, as her ability to function as counselor\
    \ (and by extension, her role in the crew’s cohesion) becomes uncertain.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e10
  scene_sequence: 14
  sequence_in_scene: 18
  key_dialogue:
  - 'BEVERLY: I got here as quickly as I could. We''ve got a Sickbay filled with headaches.
