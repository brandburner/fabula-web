  title: Warp jump fails under graviton stress
  description: "\n  The *Enterprise* attempts a desperate warp jump to escape the\
    \ graviton field’s pull, but the maneuver triggers a catastrophic systems failure.\
    \ Geordi La Forge executes the warp jump at Picard’s order, but the ship’s engines\
    \ strain against the unnatural forces, causing violent structural stress. Data\
    \ reports the integrity field pressure spikes to 217% of safe limits, and the\
    \ computer warns of imminent structural failure. Picard immediately orders all\
    \ engines disengaged, which stabilizes the ship but leaves it trapped—exposing\
    \ the crew’s technological limitations against the cosmic threat. The failure\
    \ forces a reckoning: their conventional solutions are inadequate, and the crew\
    \ must now confront dwindling options. The scene underscores the tension between\
    \ human ingenuity and the overwhelming power of the anomaly, while also serving\
    \ as a narrative pivot that shifts focus from Troi’s personal crisis to the ship’s\
    \ survival.\n  "
