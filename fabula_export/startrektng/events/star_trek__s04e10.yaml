  title: Brooks challenges Troi’s resignation
  description: 'Deanna Troi, midway through packing her office, is interrupted by
    Ensign Brooks, who arrives for a scheduled counseling session. Troi immediately
    reveals she has resigned as ship’s counselor, citing her inability to sense Brooks’
    emotions during their last session as proof of her professional failure. Brooks,
    however, vehemently disagrees, recounting how Troi’s guidance—delivered without
    empathic insight—forced her to confront her unresolved grief over her husband’s
    death. The revelation exposes the fragility of Troi’s self-worth, which has been
    entirely tied to her empathic abilities, and underscores the unintended impact
    of her counseling even in its absence. The exchange forces Troi to confront the
    possibility that her value as a counselor extends beyond her powers, while also
    hinting at the broader existential crisis she faces: if she cannot rely on her
    Betazoid heritage, what remains of her identity and purpose on the *Enterprise*?
    The scene serves as a critical turning point in Troi’s arc, challenging her resignation
    and planting the seed for her eventual rediscovery of self-worth through human
    intuition rather than supernatural gifts.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e10
  scene_sequence: 33
  sequence_in_scene: 46
  key_dialogue:
  - 'TROI: Janet, I''ve resigned as ship''s counselor.'
  - |-
    BROOKS: But why?
    TROI: Well, I think it was fairly clear during your last appointment... it was obviously non-productive and...
    BROOKS: Non-productive. I don't understand... how could you say that?
    TROI: But I couldn't sense what you were...
  - 'BROOKS: Deanna, you were right about me. I had to go back and look at what I
    was doing, why I was trying to convince myself and you that I was a ''new woman''...
    and I realized I was doing the same thing to myself all over again... trying to
    hide from the pain... I have to accept that... it''s really just beginning for
    me, isn''t it... So, as far as I''m concerned, it was very productive. Maybe you
    couldn''t sense what I was feeling... but you helped.'
