  - 'TROI: How do you people live like this? ... You have no idea. No idea what this
    is like. How can you know what it''s like to lose something you''ve never had?'
  - 'TROI: If our positions were reversed, I wouldn''t have been in here treating
    skinned elbows while you were passed out on your office floor. I would have been
    there a lot sooner... maybe in time to prevent this before it ever happened.'
