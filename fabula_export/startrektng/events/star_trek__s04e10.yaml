  title: Riker forces Troi to face her fractured identity
  description: 'In Troi’s quarters, Riker deliberately invades her self-imposed isolation,
    refusing to let her withdraw after her resignation. Their confrontation begins
    with charged silence—Riker’s physical embrace breaks Troi’s emotional dam, revealing
    her raw vulnerability. She admits feeling untethered, describing the world as
    ''colorless and hollow'' without her empathic abilities. Riker challenges her
    hypocrisy: she’s rejected her human side while clinging to Betazoid superiority,
    stripping away her ''safe position'' of control. The exchange forces Troi to confront
    her existential crisis—not just the loss of her abilities, but the deeper fear
    of being ''equal'' to others without her empathic advantage. The scene pivots
    from personal reckoning to operational urgency when Geordi’s com interrupts, but
    the unresolved tension lingers, marking a turning point in Troi’s arc toward reclaiming
    agency beyond her lost gifts.'
