    RIKER: I'm real.
    TROI: No, you're not! You're a projection. With no more substance to me than a character on the Holodeck.
  - |-
    RIKER: You've always had an advantage... a little bit of control over every situation... it must have been a very safe position to be in.
    TROI: That isn't true.
    RIKER: Isn't it?
