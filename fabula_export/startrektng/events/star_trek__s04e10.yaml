    emotional_state: Feigned assurance masking a growing unease, with a flicker of
      frustration at the ship’s betrayal of his expectations.
    goals:
    - To maintain the illusion of control over Engineering’s systems and reassure
      the bridge crew of stability.
    - To quickly diagnose the source of the shudder before it escalates into a larger
      crisis.
    what_happened: 'Geordi La Forge stands at his control panels in Engineering, his
      hands poised over the readouts as the impulse engines strain under an unseen
      force. The ship’s sudden shudder catches him off-guard, his body tensing in
      response to the unexpected disturbance. His initial reaction is one of defensive
      confidence: *''There''s nothing wrong down here! The engines are fine!''*—a
      statement that belies the flicker of uncertainty in his eyes. Geordi’s dialogue
      reveals his deep-seated trust in his systems and his reluctance to admit vulnerability,
      even as the physical evidence contradicts his words. This moment captures the
      tension between his professional pride and the creeping realization that something
      is gravely amiss.'
