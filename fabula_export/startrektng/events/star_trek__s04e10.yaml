      The *Enterprise*’s engines are the crew’s last hope—a tool of resistance in the face of an overwhelming force. Picard’s order to La Forge—'If your engines are functional, we’ll attempt to break free'—turns the engines from a background system into the focal point of the crew’s defiance. La Forge’s immediate response—'Go ahead, Captain.'—signals his readiness to push the engines to their limits. The engines’ role here is symbolic as much as functional: they represent the crew’s refusal to surrender, their determination to fight back against the cosmic string’s pull. Whether they succeed or fail, the engines are the embodiment of their struggle.
    status_before_event: |2-

      Operational but strained, running at one-tenth impulse power as the *Enterprise* drifts toward the cosmic string. The engines are functional, but their current output is insufficient to break free from the pull. La Forge is likely already assessing how to increase their power without risking a catastrophic overload.
    status_after_event: |2-

      The engines are now operating at maximum capacity, or as close to it as La Forge can safely push them. Their status is a point of tension: will they be enough to break the cosmic string’s grip, or will they fail, leaving the crew with no other options? The engines’ fate is tied directly to the *Enterprise*’s survival.
