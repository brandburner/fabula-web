  title: Guinan forces Troi to confront human intuition
  description: 'In Ten-Forward, Troi sits isolated and withdrawn, still reeling from
    the loss of her empathic abilities. Guinan approaches with tea, then deliberately
    provokes Troi by jokingly suggesting she could replace her as ship’s counselor.
    Troi initially dismisses the idea, but Guinan’s persistent, playful questioning
    forces her to articulate the difference between passive listening and active counseling—revealing
    Troi’s lingering self-doubt about her worth without her powers. Guinan’s subtextual
    challenge exposes Troi’s reliance on her Betazoid abilities, pushing her to acknowledge
    her human intuition as a viable alternative. The exchange ends with Troi realizing
    Guinan’s intent: to make her recognize that her identity isn’t defined by her
    lost abilities alone. This moment marks a turning point in Troi’s journey to redefine
    her role on the *Enterprise*, bridging her existential crisis with the crew’s
    broader mission against the two-dimensional threat.'
