    emotional_state: 'Focused intensity with an undercurrent of quiet dread—Allenby
      is doing her job, but the anomaly’s resistance to their efforts leaves her with
      a gnawing sense that they are up against something they don’t fully understand.
      Her role as helmsman makes her the first to confront the harsh truth: their
      usual tools are not enough.'
    goals:
    - To execute Picard’s orders with absolute precision, ensuring the shutdown is
      carried out flawlessly.
    - To provide the crew with real-time, unfiltered data about the anomaly’s effects,
      even when that data contradicts their hopes for a solution.
    what_happened: 'Allenby moves with precision and urgency, her fingers flying over
      the engine shutdown panel as Picard’s order cuts through the chaos. The moment
      the engines power down, she leans into her console, her eyes scanning the sensor
      readings with laser focus. Her voice is steady as she delivers the devastating
      news: the ship is still being pulled. There’s no triumph in her tone, only the
      grim professionalism of a helmsman who knows her role is to report the truth,
      no matter how dire. She is the bridge between the crew’s actions and the cold,
      unyielding reality of the anomaly’s pull.'
