    I just don''t know how to draw on my human instinct...'
  - 'TROI: Data, what if they''re simply acting instinctively... there are inherent,
    inborn forces that drive every species. What they need. What they fear. We''ve
    got to discover what drives this species?'
  - 'TROI: Moths fly toward a flame. Horses sometimes run into a burning barn. Data,
    don''t you see, we''ve been thinking in three-dimensions. We have to get two-dimensional.'
