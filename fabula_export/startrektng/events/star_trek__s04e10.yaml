  global_id: null
  title: Crew battles cosmic string collision
  description: The *Enterprise* crew faces an escalating crisis as gravitational distortions
    from a cosmic string fragment pull the ship toward inevitable collision. Worf
    confirms the ship is on a collision course with three minutes remaining, while
    Data reports the shear force turbulence is disrupting their ability to simulate
    an escape. Riker orders Geordi to activate stabilizers and fire impulse engines,
    but the ship remains locked in the string's pull. Picard escalates the frequency
    projection, and as the chaotic sound coalesces into a dissonant chord, the two-dimensional
    beings' advance slows. Geordi detects the graviton wake field collapsing, and
    Picard orders La Forge to break free—securing a tactical victory while leaving
    the cosmic string's sentience and Troi's empathic crisis unresolved. The scene
    underscores the crew's resourcefulness under pressure and the lingering threat
    of the anomaly's unknown nature.
