  title: Troi misjudges Brooks’ progress
  description: In a private counseling session, Deanna Troi—still grappling with the
    sudden loss of her empathic abilities—attempts to mask her professional insecurity
    by probing Ensign Janet Brooks about her emotional transformation. Brooks, who
    claims to feel 'a new woman' after finally grieving her husband’s death, becomes
    a mirror for Troi’s own unresolved struggle with change and loss. Troi’s desperation
    to maintain control leads her to dismiss Brooks’ progress as superficial, a misstep
    that exposes her fragility and deepens her existential crisis. The scene underscores
    Troi’s vulnerability, her reliance on her empathic abilities, and the growing
    tension between her professional role and her personal unraveling. Brooks’ rejection
    of Troi’s assessment forces Troi to confront the limits of her non-empathic judgment,
    isolating her further from the crew as the ship’s cosmic threat escalates. The
    exchange reveals Troi’s unspoken grief over her identity crisis, while Brooks’
    conviction in her healing becomes a stark contrast to Troi’s professional and
    emotional instability.
