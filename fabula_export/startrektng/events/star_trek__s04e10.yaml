- fabula_uuid: act_9b78f1ad9ba6858f
  number: 3
  summary: Troi struggles intensely with her newfound disability, displaying anger
    and defensiveness towards Riker, whom she perceives as treating her differently.
    She attempts to resume her counseling duties, but her session with Ensign Brooks
    highlights her inability to provide effective guidance without her empathic sense,
    leaving her desperate and frustrated. Meanwhile, Data and Geordi launch a probe,
    which reveals the two-dimensional nature of the mysterious entities pulling the
    Enterprise, providing the first concrete understanding of the external threat.
    Troi's frustration escalates into an angry confrontation with Beverly, where she
    lashes out, expressing her profound sense of loss and isolation. Overwhelmed and
    feeling useless, Troi retreats to her quarters, where she collapses to the floor
    in despair, signifying her emotional rock bottom and the complete breakdown of
    her professional and personal identity.
  key_moments: []
