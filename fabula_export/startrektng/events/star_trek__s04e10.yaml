  title: Brooks confronts repressed grief through Troi’s music box
  description: In Troi’s office, Ensign Brooks—still denying her grief over her husband’s
    death—attempts to convince Troi she is ‘coping well,’ listing her professional
    achievements as proof. Troi gently challenges her avoidance, noting the emotional
    labor of suppression, and reveals it is Marc’s birthday. Brooks’ facade cracks
    as she admits a dream where she briefly believed he was alive, only to wake to
    the reality of his death. When Troi presents a music box tied to Marc, the object
    triggers a cathartic breakdown, forcing Brooks to finally acknowledge her unresolved
    mourning. The moment deepens their shared vulnerability, with Troi’s non-empathic
    intuition proving as powerful as her lost abilities. This scene serves as a turning
    point for Brooks’ arc, marking her transition from denial to acceptance, while
    also reinforcing Troi’s evolving role as a counselor beyond her empathic gifts.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e10
  scene_sequence: 1
  sequence_in_scene: 2
  key_dialogue:
  - 'BROOKS: It''s been five months since Marc''s accident. I haven''t missed a single
    hour of my duties. I''ve volunteered for extra time in the nursery. My language
    studies are better than they''ve ever been. Someone else might have given in—but
    I didn''t.'
  - 'TROI: Recovery from a great loss involves a great deal of pain. If we try to
    avoid that pain we only make it harder on ourselves in the long run.'
  - 'BROOKS: Last night. I dreamt Marc was with me, celebrating. I held him. I was
    so glad this nonsense was finally over. Then I woke up—Alone. And I knew he was
    dead. For the first time, I knew it...'
