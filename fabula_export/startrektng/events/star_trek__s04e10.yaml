      \ to the photon torpedo strike. The probe transmits a polarized visual feed\
      \ to the main viewer, allowing the crew to observe the beings’ coordinated,\
      \ fish-like movements as they remain oblivious to the explosions. Its data confirms\
      \ the torpedoes’ ineffectiveness, reinforcing the crew’s realization that conventional\
      \ weapons cannot disrupt the beings’ gravitational pull. The probe serves as\
      \ a critical tool for real-time assessment, though its findings only deepen\
      \ the crew’s sense of helplessness.\n      "
