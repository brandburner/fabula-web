- fabula_uuid: cand_evt_scene_f2726dd385e86d1c_01
  global_id: null
  title: Troi Rejects Picard’s Empathy
  description: In Picard’s ready room, Deanna Troi—visibly unkempt and emotionally
    raw—formally resigns as the *Enterprise*’s counselor, declaring her loss of empathic
    abilities renders her professionally unfit. Picard, seated beside her in an attempt
    to bridge the divide, argues that her role transcends her abilities, invoking
    a personal anecdote about a disabled Academy instructor. Troi, however, dismisses
    his reassurances as patronizing, insisting his lack of understanding is rooted
    in ableist assumptions. The exchange escalates into a tense standoff, with Troi’s
    refusal to engage in further discussion marking a definitive rupture in their
    professional dynamic. Her resignation, framed as an irrevocable decision, forces
    Picard to confront the limits of his influence over her identity crisis, while
    also setting up her potential departure from the ship’s counselor role during
    the crew’s existential threat.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e10
  scene_sequence: 24
  sequence_in_scene: 33
  key_dialogue:
  - 'TROI: I''ve been working with Ensign Brooks since the death of her husband...
    she''s avoided the reality of what happened... denied it to herself... and I realize
    I''ve been doing the same thing about my condition.'
  - 'PICARD: Deanna, I have been fortunate in having had access to your Betazoid abilities.
    Most starship captains must be content with human counselors. Empathic awareness
    is not a requirement for the position.'
  - 'TROI: With all due respect, Captain, you don''t know what you''re talking about.
    That is a common belief which has no scientific basis... no doubt created by normal
    people who feel uncomfortable around the disabled. I am disabled. And I''m telling
    you I cannot perform my duties.'
  - 'TROI: ((interrupting, softly)) Spare me the inspirational anecdote and accept
    my resignation, Captain.'
