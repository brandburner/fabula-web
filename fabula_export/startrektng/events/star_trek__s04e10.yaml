    - To maintain operational control over the *Enterprise* and ensure the crew follows
      established protocols, even in the face of the unknown.
    - To gather data on the anomaly for future reference, even if immediate solutions
      are elusive.
    influence_mechanisms:
    - Through the chain of command (Picard’s order, Riker’s support, Allenby’s execution),
      ensuring actions are coordinated and authorized.
    - Via institutional knowledge and training, which shapes the crew’s responses
      and their understanding of the threat.
    - Through the ship’s systems and sensors, which are extensions of Starfleet’s
      technological and scientific capabilities.
    institutional_impact: The anomaly’s defiance of Starfleet’s protocols forces the
      crew—and by extension, the organization—to confront the limits of their preparedness.
      This moment highlights the tension between institutional rigidity and the need
      for adaptability in the face of the unknown.
    internal_dynamics: The crew’s reliance on Starfleet’s protocols is both a strength
      and a vulnerability. While the protocols provide structure, the anomaly’s resistance
      to them exposes the organization’s blind spots and the need for creative, outside-the-box
      thinking.
