    what_happened: Riker stands beside Picard, his hands gripping the edge of the
      captain’s chair as the ship lurches to a halt. His expression is a mix of frustration
      and focus, his eyes narrowing as Allenby delivers the grim confirmation that
      the shutdown has done nothing to alter their course. The glance he exchanges
      with Picard is electric with unspoken urgency—no words are needed. As first
      officer, he is already mentally racing through contingency plans, but the anomaly’s
      resistance to their usual tools leaves him grappling with a rare sense of helplessness.
      His body language is coiled, ready to act, but his mind is confronting the possibility
      that action itself may be futile.
