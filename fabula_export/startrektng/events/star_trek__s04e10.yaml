- fabula_uuid: cand_evt_scene_5b6a5413faadd4b1_01
  global_id: null
  title: Picard orders escalating photon torpedo strike
  description: "\n  With the *Enterprise* inexorably dragged toward a cosmic string\
    \ fragment by two-dimensional beings, Captain Picard faces a critical decision.\
    \ After Data confirms the entities remain oblivious to the danger, Worf proposes\
    \ a tactical strike with photon torpedoes—a measure Picard initially resists but\
    \ ultimately authorizes as a last resort. The first volley, detonated ahead of\
    \ the beings, fails to alter their course or disrupt their gravitational pull.\
    \ Forced to escalate, Picard orders a second, more aggressive volley directly\
    \ into their field, only for Data to report the explosions have no effect. The\
    \ failure leaves the crew with no conventional means to deter the threat, marking\
    \ a turning point in the crisis where brute force proves ineffective against an\
    \ incomprehensible adversary. The scene underscores Picard’s leadership under\
    \ pressure, the crew’s reliance on untested strategies, and the existential stakes\
    \ of their predicament.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e10
  scene_sequence: 32
  sequence_in_scene: 44
  key_dialogue:
  - 'WORF: Sir, recommend we fire a spread of photon torpedoes into their field.'
  - 'PICARD: Must we destroy them to save ourselves...'
  - 'DATA: No affect, sir. Matter anti-matter explosions appear to be ineffective.'
