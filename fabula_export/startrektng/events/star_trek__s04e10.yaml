  title: Troi’s first empathic breakdown
  description: 'During a counseling session with Ensign Brooks, Deanna Troi experiences
    her first visible symptom of empathic instability—a sudden, disorienting lapse
    in focus and memory. After Brooks notices Troi’s dizziness and momentary confusion,
    Troi dismisses it as exhaustion, repeating herself and failing to recall their
    prior conversation. The exchange reveals Troi’s growing vulnerability, foreshadowing
    the catastrophic loss of her empathic abilities that will later force her to confront
    her identity. The scene marks the first crack in her professional composure, subtly
    linking her personal crisis to the broader cosmic threat looming over the *Enterprise*.
    Brooks’ concern underscores the stakes: Troi’s instability isn’t just personal—it’s
    a fracture in the ship’s emotional foundation, one that will demand resolution
    before the crew can address the external anomaly.'
