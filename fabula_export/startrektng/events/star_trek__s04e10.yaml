  object_involvements:
  - object_uuid: ger_object_28355a3729c5
    description_of_involvement: 'The Engineering control panels are Geordi’s primary
      interface with the ship’s systems, their displays a mix of reassuring stability
      and ominous ambiguity. As the ship shudders, the panels become a battleground
      of conflicting information: the readouts suggest all is well, but the physical
      tremor of the *Enterprise* tells a different story. Geordi’s hands hover over
      the controls, his fingers poised to react, but the panels offer no immediate
      answers. Their role in this event is to underscore the disconnect between perceived
      control and reality, as well as the crew’s reliance on technology that may not
      fully comprehend the threat they face.'
    status_before_event: Displaying stable impulse engine readouts, with Geordi monitoring
      them closely but without immediate concern.
    status_after_event: Unchanged in their visual readouts, but now accompanied by
      the ship’s physical shudder, creating a dissonance between data and experience.
    global_id: ger_object_28355a3729c5
  - object_uuid: ger_object_ea08de738e27
    description_of_involvement: 'The *Enterprise*’s impulse engines are the focal
      point of this event, their strained hum a deceptive indicator of stability.
      While their readouts appear normal to Geordi’s trained eye, the ship’s abrupt
      shudder reveals their vulnerability to the 2D lifeform’s gravitational pull.
      The engines serve as both a clue—hinting at the external threat’s growing influence—and
      a symbol of the crew’s technical prowess being tested. Their momentary instability
      is the first physical sign that the *Enterprise* is no longer in full control
      of its environment, foreshadowing the larger struggle to come. The engines’
      role here is dual: they are both a tool Geordi relies on and a harbinger of
      the crisis that will force the crew to rethink their understanding of the universe
      around them.'
    status_before_event: Operating at one-tenth impulse power, readouts stable but
      showing early signs of strain under the 2D lifeform’s influence.
    status_after_event: Physically shuddering, with Geordi’s confidence in their stability
      visibly shaken by the unexpected disturbance.
    global_id: ger_object_ea08de738e27
