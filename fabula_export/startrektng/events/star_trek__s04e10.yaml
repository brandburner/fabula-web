  title: Cosmic string fragment pulls Enterprise toward destruction
  description: "\n  The Enterprise detects a cosmic string fragment—a hyper-dense,\
    \ one-dimensional object with extreme gravitational pull—through anomalous sensor\
    \ readings of accelerated interstellar gases. Data confirms the phenomenon is\
    \ within visual range, and Riker orders it magnified on the viewscreen, revealing\
    \ a celestial distortion resembling a vacuum cleaner sucking in stellar material.\
    \ Data identifies it as a cosmic string fragment (107 km long) with gravitational\
    \ fields as powerful as a black hole, while Allenby expresses confusion about\
    \ its nature. Riker explains cosmic strings' deadly properties, and Data reveals\
    \ that two-dimensional beings are caught in its pull, dragging the Enterprise\
    \ toward it. Riker immediately dispatches Data, Beverly Crusher, and Miles O’Brien\
    \ to address the crisis, escalating the ship’s existential threat while Troi’s\
    \ empathic crisis remains unresolved in the background. The scene functions as\
    \ a turning point, shifting focus from Troi’s personal struggle to a mission-critical\
    \ external threat that demands immediate action.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e10
  scene_sequence: 31
  sequence_in_scene: 42
  key_dialogue:
  - 'DATA: Yes, Commander. Sensors are detecting highly accelerated interstellar gases...'
