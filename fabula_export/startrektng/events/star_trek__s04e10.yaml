  title: Troi Rejects Riker’s Concern
  description: In Troi’s office, Riker attempts to offer emotional support after her
    empathic abilities vanish, but she deflects with brittle defensiveness. Her initial
    smile masks simmering resentment as she accuses him of treating her like a 'blind
    woman'—a projection of her fear of being diminished. When Riker gently calls out
    her fear ('I’ve never seen you... quite so scared'), she doubles down with a hollow
    'I’m fine,' dismissing him to return to work. The exchange exposes her denial
    and the fragility of her professional identity, while Riker’s unmet concern foreshadows
    her isolation. The scene pivots from interpersonal tension to Troi’s self-imposed
    exile, reinforcing her refusal to confront her vulnerability—even with those closest
    to her.
