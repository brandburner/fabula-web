    description_of_involvement: 'Starfleet’s presence on the bridge is palpable in
      this moment, not as a physical entity but as an institutional force that shapes
      the crew’s responses and expectations. The protocols Picard and Riker follow—the
      shutdown order, the sensor readings, the chain of command—are all products of
      Starfleet’s training and doctrine. Yet the anomaly’s defiance of those protocols
      exposes a fundamental tension: Starfleet’s tools and training are designed for
      known threats, but this anomaly operates outside those parameters. The crew’s
      frustration and helplessness are, in part, a reflection of Starfleet’s limitations
      in the face of the unknown. The organization’s influence is both a guiding force
      and a constraint, as the crew grapples with the gap between what they’ve been
      taught to do and what they now must confront.'
