acts:
- fabula_uuid: act_1abccff6bf0d9517
  number: 1
  summary: This act introduces Counselor Deanna Troi, showcasing her empathic abilities
    as she effectively counsels Ensign Janet Brooks through her grief. The narrative
    establishes Troi's core identity and role on the Enterprise. Concurrently, the
    ship encounters its first mysterious sensor anomaly, a brief, unidentifiable phenomenon
    that hints at an external threat. Following her successful counseling session,
    Troi experiences sudden dizziness and disorientation, symptoms that align with
    Data's detection of strange, plane-polarized objects. The act culminates dramatically
    with Troi collapsing unconscious in her office, signaling a profound personal
    crisis that directly correlates with the emerging external mystery. This setup
    establishes both the internal conflict for Troi and the external threat facing
    the Enterprise, intertwining their fates from the outset. The contrast between
    Troi's initial competence and her sudden incapacitation underscores the severity
    of her impending loss and the challenges ahead.
  key_moments: []
  scene_numbers:
