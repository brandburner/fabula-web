    despite her elderly appearance, and her DNA proves she was not Alkar’s mother.
    This shatters the crew’s understanding of Alkar’s identity and his empathic attacks,
    forcing Picard to act. Beverly’s urgency about Troi’s rapidly deteriorating condition—now
    life-threatening—compels Picard to abandon diplomatic caution and order Worf to
    prepare for a direct confrontation with Alkar on the planet’s surface. The scene
    marks a turning point, shifting from investigation to intervention as Picard commits
    to breaking Alkar’s diplomatic immunity to save Troi, despite the risks of escalating
    the conflict.'
