  title: Alkar’s Forced Boarding of the Enterprise
  description: "\n  In the *Enterprise*’s ready room, Ambassador Alkar protests Admiral\
    \ Simons’ decision to transport him aboard the *Enterprise* rather than a neutral\
    \ Federation vessel, arguing that the ship’s military profile will undermine his\
    \ diplomatic credibility. Picard counters that an unarmed transport would leave\
    \ Alkar vulnerable to another attack, while Simons—after weighing both perspectives—overrules\
    \ Alkar, insisting on the *Enterprise*’s security for the mission. Though Alkar\
    \ outwardly concedes with a serene smile, his hesitation and the subtext of his\
    \ objections reveal his resistance to Federation oversight and his desire for\
    \ operational secrecy. The exchange establishes Alkar’s manipulative nature, his\
    \ disdain for perceived interference, and the crew’s impending confrontation with\
    \ his empathic threat to Deanna Troi. Picard immediately acts on the decision,\
    \ ordering Riker to set course for Seronia, formalizing the *Enterprise*’s role\
    \ in the mission and raising the stakes for both the diplomatic negotiations and\
    \ Troi’s safety.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e03
  scene_sequence: 3
  sequence_in_scene: 5
  key_dialogue:
  - 'ALKAR: I am grateful for the Federation''s offer to escort me, but if I arrive
    at Rekag-Seronia on the *Enterprise*, the armed Flagship of Starfleet, my mission
    as a Peace negotiator will be compromised. There must be a Federation transport
    ship in the area that could take me there.'
  - 'PICARD: With all due respect, Admiral— to put the Ambassador on another unarmed
    transport will only invite a second assault.'
  - 'ADMIRAL SIMONS: ... we also recognize that safety is an issue—not just yours,
    but the crew that escorts you. To send you on an unarmed transport puts everyone
    at risk. I think it''s best if you proceed to Rekag-Seronia aboard the *Enterprise*.'
  - 'ALKAR: Then I have no choice.'
