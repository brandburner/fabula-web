  title: Maylor’s veiled threat to Troi
  description: 'In the transporter room, Ambassador Alkar and his mother Maylor materialize
    aboard the *Enterprise*. While Alkar maintains his serene diplomatic facade, Maylor—an
    elderly woman radiating suppressed rage—immediately locks onto Counselor Troi
    with unsettling precision. Without preamble, she delivers a cryptic, hostile warning:
    ''You think he''s attracted to you... but he isn''t. You offer him nothing.''
    The exchange escalates when Maylor, as she’s escorted out, turns back to Troi
    and issues a direct threat: ''Don’t pursue him. I won’t have it... I’ll stop you.''
    Troi, visibly shaken, reacts with physical discomfort (hand at her throat) and
    emotional distress, marking the first overt confrontation between the two women.
    Alkar’s attempt to dismiss Maylor’s behavior as illness only underscores the tension,
    leaving Troi unsettled and foreshadowing a deeper, more dangerous conflict over
    Alkar’s true nature and Troi’s survival. The scene establishes Maylor as a volatile,
    empathically attuned antagonist and Troi as a target in Alkar’s hidden emotional
    manipulation scheme.'
