  title: Enterprise responds to Rekag ambush
  description: The *Enterprise* arrives at Rekag-Seronia after receiving a distress
    call from the transport ship *Dorian*, only to find the Rekag battle cruisers
    abruptly retreating upon detecting the Federation vessel. Captain Picard, recognizing
    the tactical advantage, orders the crew to stand down from red alert but remains
    vigilant. The *Dorian*’s captain, Talmadge, reveals that the Rekag attack was
    likely provoked by the presence of a mediator aboard his ship—Ambassador Alkar—whose
    diplomatic mission to Seronia has become a flashpoint in the escalating conflict.
    Picard, sensing the political sensitivity of the situation, authorizes the transport
    of Alkar and his delegation to the *Enterprise*, assigning Counselor Troi to greet
    them. This decision, though routine, unwittingly places Troi in direct proximity
    to Alkar’s hidden threat, setting the stage for her empathic vulnerability to
    become the central crisis of the episode. The scene underscores the crew’s readiness
    to defend against unseen threats while hinting at the deeper strategic and psychological
    motives behind the Rekag’s actions.
