  title: Picard forces Alkar’s return to the Enterprise
  description: 'Captain Picard, his voice tight with urgency, issues an ultimatum
    to Ambassador Alkar via the bridge comms: Counselor Troi is dying, and the Enterprise
    is prepared to forcibly transport Alkar and his delegation back to the ship if
    they do not comply immediately. The threat is direct, cutting through diplomatic
    niceties—Picard’s command authority is no longer a request but a demand, framed
    as a life-or-death necessity. Jarth attempts to assert the delegation’s protected
    status with security force fields, but Picard dismisses the objection with cold
    precision, ordering Transporter Room Two to stand by. The tension escalates as
    Alkar, unshaken, calmly takes Liva’s hand in a gesture that reads as both surrender
    and control. His readiness to transport signals a calculated compliance, but the
    subtext is clear: he is not a man who yields without purpose. The exchange marks
    a critical shift from negotiation to enforcement, with Picard’s authority clashing
    against Alkar’s manipulative composure. The stakes are no longer about diplomacy
    but survival—Troi’s life hangs in the balance, and Picard’s willingness to use
    force underscores the desperation of the moment. The scene pivots from verbal
    confrontation to decisive action, with the transporter’s imminent activation serving
    as the ticking clock for Troi’s fate.'
