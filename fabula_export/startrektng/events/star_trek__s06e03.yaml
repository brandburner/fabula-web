    locates Troi’s whereabouts via the ship’s computer, prompting their immediate
    departure to intervene. This exchange reveals Riker’s deep personal connection
    to Troi and the crew’s growing alarm over her destabilization, while Beverly’s
    clinical approach contrasts with Riker’s emotional distress, setting up the next
    phase of the crisis.
