  title: Troi’s unprovoked hostility toward Riker
  description: In Troi’s quarters, Riker arrives unannounced for a routine crew evaluation
    and discovers an Ensign hastily dressing in her bedroom, creating an awkward but
    initially lighthearted moment. Troi, however, reacts with uncharacteristic aggression,
    accusing Riker of being bothered by the Ensign’s presence despite his denials.
    Her tone is sharp, her demeanor dismissive, and her insistence that his reaction
    is ‘none of your business’ reveals a growing instability—one that Riker, confused
    and taken aback, cannot reconcile with her usual warmth. The confrontation escalates
    as Troi presses him, her empathic sensitivity to his discomfort (or her own projection
    of it) making her increasingly hostile. Riker, frustrated by her refusal to focus
    on the evaluations, exits bewildered, leaving Troi’s erratic behavior as a stark
    indicator of Alkar’s empathic manipulation taking deeper root. The scene underscores
    her psychological unraveling, where her usual emotional intelligence is now weaponized
    against those closest to her, foreshadowing the severity of her condition if left
    unchecked.
