  title: Picard orders surface confrontation with Alkar
  description: 'In the Ready Room, Beverly Crusher delivers a critical medical update
    to Picard: her autopsy of Maylor reveals impossible biological anomalies—her body
    appears decades younger than her apparent age, and her DNA doesn’t match Alkar’s
    claim that she was his mother. This revelation deepens the mystery surrounding
    Alkar’s empathic manipulation and Troi’s rapid deterioration. Beverly urges Picard
    to act, warning that Troi’s empathic overload is now life-threatening. Picard,
    faced with the moral imperative to save his crew member, immediately orders Worf
    to prepare for a direct confrontation with Alkar on the planet’s surface. The
    decision marks a decisive shift from diplomatic caution to proactive intervention,
    escalating the conflict and forcing Alkar into a corner where his secrets can
    no longer be hidden. The urgency of Troi’s condition and the ethical weight of
    confronting a diplomat without clear evidence create a high-stakes moment that
    tests Picard’s leadership and the crew’s loyalty to one another.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e03
  scene_sequence: 28
  sequence_in_scene: 44
  key_dialogue:
  - 'BEVERLY: I don''t have any explanation for this, Captain... but when I examined
    Maylor''s body... I found that her heart, her lungs, her skeletal structure...
    most of the systems in her body... were those of a thirty-year-old.'
  - 'PICARD: How could that be? We both saw the woman.'
  - 'BEVERLY: Deanna''s condition is deteriorating rapidly. She could die. There are
    questions that only Alkar can answer.'
  - 'PICARD: Picard to Lieutenant Worf... Meet me in Transporter Room Two. We''re
    going to the surface.'
