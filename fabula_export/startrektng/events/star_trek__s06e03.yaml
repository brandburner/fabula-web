  title: Picard delays Troi’s transport for medical safety
  description: 'In Sickbay, Beverly Crusher successfully resuscitates Troi after her
    near-fatal empathic overload, confirming the neurotoxin decontamination sequence
    is working. As Troi’s vitals stabilize—blood pressure rising to 90/40 and neuro-transmitter
    levels dropping from 420% to 380%—Picard prepares to order her emergency transport
    to safety. However, Beverly insists they wait until the levels fall below 300%,
    the critical threshold for survival. Picard reluctantly defers to her medical
    authority, creating a tense standoff between urgency and caution. The moment underscores
    the crew’s desperation: Troi’s survival hinges on precise timing, while Alkar’s
    empathic assault continues to escalate outside Sickbay. The scene forces Picard
    to balance command decisions with medical necessity, exposing the high stakes
    of their mission.'
