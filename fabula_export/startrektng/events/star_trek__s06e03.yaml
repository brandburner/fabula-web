    description_of_involvement: The USS *Enterprise* functions as the operational
      base for the crew’s counterstrike against Alkar. Its systems—transporters, sickbay,
      com-links, and turbolifts—enable the diagnosis of injuries, location tracking,
      and urgent medical responses. The ship’s resources are fully mobilized to support
      Picard’s orders, from Beverly’s scans to Worf’s guard duty. The *Enterprise*’s
      role is both a logistical and symbolic one, representing Starfleet’s commitment
      to justice even in the face of diplomatic immunity.
    active_representation: Through its crew’s collective action, institutional protocols,
      and technical capabilities. The ship’s systems and personnel work in unison
      to execute Picard’s orders and counter Alkar’s threat.
    power_dynamics: Exercising authority over individuals (Alkar) and leveraging institutional
      resources to challenge his manipulation. The crew’s actions are constrained
      by the Federation Council’s immunity but driven by a moral imperative to act.
    organizational_goals:
    - To hold Alkar accountable for Troi’s death, despite diplomatic immunity.
    - To rescue Liva before Alkar’s empathic link fully transfers, preventing another
      victim.
    influence_mechanisms:
    - Through the crew’s proactive use of the ship’s systems (transporters, sickbay,
      com-links).
    - By leveraging Starfleet’s technical and medical expertise to counter Alkar’s
      predation.
    - Through Picard’s authoritative leadership, which mobilizes the crew into action.
    institutional_impact: The *Enterprise*’s involvement reflects Starfleet’s tension
      between institutional protocol (honoring diplomatic immunity) and moral responsibility
      (preventing further harm). The crew’s actions highlight the conflict between
      these priorities, as they act outside the Federation Council’s protections to
      expose Alkar’s crimes.
    internal_dynamics: The crew operates with a shared sense of urgency and determination,
      but their actions are also shaped by the constraints of Starfleet protocol.
      Picard’s orders bridge the gap between institutional duty and moral imperative,
      driving the mission forward.
    global_id: ger_organization_dbd3ade561bb
