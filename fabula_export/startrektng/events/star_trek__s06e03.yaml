  title: Alkar’s facade cracks under strain
  description: 'In the celebratory aftermath of the peace negotiations, Ambassador
    Alkar—surrounded by his delegation and well-wishers—experiences a sudden physical
    collapse, betraying the hidden cost of his empathic manipulation. His light-headedness
    and shaky breath disrupt the moment of triumph, revealing the first visible fracture
    in his carefully maintained serenity. Liva and Jarth’s immediate concern underscores
    the unspoken tension: Alkar’s emotional suppression is no longer sustainable.
    The interruption by Picard’s com signal adds urgency, signaling that the crew’s
    investigation into Troi’s condition is escalating. This moment marks the turning
    point where Alkar’s facade begins to unravel, foreshadowing the confrontation
    to come and the crew’s race to save Troi from his empathic overload.'
