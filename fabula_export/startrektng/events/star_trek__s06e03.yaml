  title: Alkar manipulates Liva into meditation
  description: 'Alkar exploits Liva’s compassion by feigning grief over Sev Maylor’s
    death, framing himself as a vulnerable figure in need of emotional support. His
    calculated performance—shaky voice, pained expression—triggers Liva’s empathy,
    making her offer help. Seizing the opportunity, Alkar retrieves a meditation box,
    positioning it between them as a tool for the ritual. The setup is predatory:
    the box is not for shared mourning but for siphoning his repressed emotions onto
    Liva, mirroring his earlier attack on Troi. The scene underscores Alkar’s pattern
    of emotional parasitism, using ritual and grief as weapons. Liva’s willingness
    to engage reveals her trust in him, which he exploits without hesitation, deepening
    the narrative tension around his predatory nature and the crew’s race to intervene
    before another victim is broken.'
