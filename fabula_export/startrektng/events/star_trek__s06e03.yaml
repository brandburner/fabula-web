  title: Alkar Transfers Emotions to Troi
  description: "\n  In Troi’s quarters, Alkar—still visibly agitated from his confrontation\
    \ with Picard—initiates a Lumarian meditation ritual under the guise of grief\
    \ processing. He hands Troi a ritual stone and guides her through a chant, his\
    \ demeanor shifting from edgy to eerily calm as he subtly manipulates the ceremony.\
    \ When their stones touch, they briefly glow, marking the moment Alkar offloads\
    \ his repressed negative emotions onto Troi. The transfer is immediate: Troi shudders,\
    \ her body reacting to the unnatural chill of the emotional drain. Alkar’s relief\
    \ is palpable, his facade of serenity restored, while Troi—unaware of what’s happened—experiences\
    \ her first physical symptom of the empathic overload. The scene ends with Troi\
    \ canceling her appointments, her behavior already subtly altered by the emotional\
    \ contamination. This moment is the inciting incident of Troi’s crisis, exposing\
    \ Alkar’s predatory nature and setting the crew’s desperate race to save her in\
    \ motion.\n  "
