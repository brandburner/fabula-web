  title: Alkar manipulates Troi into funeral ritual
  description: 'In Alkar’s quarters, Riker and Troi arrive to find Beverly and medics
    attempting to revive Maylor, who lies unconscious on the floor. Beverly’s efforts
    fail, and she confirms Maylor’s death with a solemn shake of her head. Alkar,
    visibly shaken but maintaining a composed facade, expresses regret over bringing
    his elderly mother on the journey. Troi approaches to comfort him, but Alkar quickly
    pivots, exploiting her empathic nature by requesting a Lumarian funeral meditation—a
    ritual only she can perform with him. His request is framed as a plea for cultural
    tradition, but his calculated tone and the timing of the ask reveal his true intent:
    to use Troi as his next emotional receptacle. The scene underscores Alkar’s psychological
    manipulation, setting the stage for Troi’s impending emotional overload and the
    crew’s eventual confrontation with his hidden cruelty. The ritual serves as the
    conduit for his repressed grief and rage, deepening Troi’s entrapment in his psychological
    trap.'
