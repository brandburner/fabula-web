  title: Picard orders Alkar’s forced capture
  description: 'In the transporter room, Picard—visibly consumed by fury and urgency—commands
    Worf to bypass Seronian security protocols and forcibly beam Ambassador Alkar
    aboard the *Enterprise*, despite the risks. His tone is uncharacteristically sharp,
    revealing his emotional state as he prioritizes Alkar’s capture over diplomatic
    caution. When Worf raises concerns about the Seronians’ reactivated security field,
    Picard dismisses them with a curt order to work with La Forge to override it,
    underscoring his determination to act decisively. The exchange exposes Picard’s
    vulnerability: his usual restraint has eroded under the weight of Troi’s life-threatening
    condition and Alkar’s manipulative betrayal. After issuing the command, Picard
    abruptly departs for Sickbay, signaling his shift from negotiation to confrontation
    and his prioritization of Troi’s survival over protocol or diplomacy. The scene
    marks a turning point, where Picard’s leadership becomes defined by urgency and
    moral clarity rather than restraint, setting the stage for direct conflict with
    Alkar and the escalating stakes of Troi’s crisis.'
