  title: Alkar’s death and Troi’s recovery
  description: In Sickbay, Ambassador Alkar’s body rapidly deteriorates as Troi’s
    empathic collapse reverses—her youthful regression halts, and she returns to her
    normal self. Alkar, now an ancient, decrepit figure, collapses and dies on the
    floor, his facade of serenity shattered by the backlash of his own suppressed
    emotions. Meanwhile, Riker rushes to Troi’s side, gripping her hand as she weakly
    calls his name, marking her fragile but definitive recovery. The scene pivots
    from Alkar’s tragic downfall to the crew’s first tangible victory, underscoring
    the cost of his deception and the resilience of those he targeted. Worf reports
    Alkar’s death to Picard, while Beverly and the captain react with stunned surprise,
    their focus shifting from the threat to the crew’s emotional recovery.
