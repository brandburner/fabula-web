  title: Alkar insists on unarmed peace talks
  description: "\n  In the Observation Lounge, Ambassador Alkar—whose serene demeanor\
    \ masks his true emotional instability—pressures Captain Picard to facilitate\
    \ immediate peace talks between Seronia and Rekag, despite escalating violence.\
    \ While his delegation members, Jarth and Liva, report on the deteriorating conflict\
    \ (broken ceasefires, retaliatory strikes), Alkar remains eerily composed, insisting\
    \ that delay would cost thousands of lives. Picard, recognizing the urgency, suggests\
    \ Darthen—a neutral coastal city—as a compromise meeting ground. Alkar, though\
    \ impressed by Picard’s strategic insight, refuses armed escorts, insisting he\
    \ must appear as a 'man of peace' to broker negotiations. The scene underscores\
    \ the fragility of diplomacy: Alkar’s facade of serenity contrasts sharply with\
    \ the chaos below, while his insistence on vulnerability hints at his deeper psychological\
    \ manipulation of others. The exchange also sets up the tension between Picard’s\
    \ pragmatic leadership and Alkar’s morally ambiguous methods, foreshadowing the\
    \ crew’s eventual confrontation with the ambassador’s true nature.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e03
  scene_sequence: 19
  sequence_in_scene: 26
  key_dialogue:
  - 'JARTH: Things have deteriorated steadily. Rekag sympathizers in outlying districts
    have attacked several towns.'
  - 'ALKAR: If they will just sit down with me...'
  - 'PICARD: Ambassador... the situation sounds volatile. Perhaps a cooling off period—'
  - 'ALKAR: These people need an end to the fighting now—to delay a week, or even
    a few days, could cost thousands of lives.'
  - 'ALKAR: No. I will not go with armed guards. I must be a man of peace before I
    can ask others for peace.'
  is_flashback: false
  location_uuid: ger_location_e52408ebd409
  theme_uuids: []
  arc_uuids: []
  participations:
  - character_uuid: ger_agent_c2db6c2b1b0d
    emotional_state: Feigned serenity masking deep emotional instability and a desperate
      need for control. His surface calm is a tool to project authority and suppress
      the chaos of his own suppressed emotions, which he later transfers onto others
      (e.g., Troi).
    goals:
    - To secure immediate peace talks in Darthen, regardless of the volatility, to
      maintain his facade of infallibility and diplomatic prowess.
    - To enforce his condition of arriving unarmed, ensuring his image as a 'man of
      peace' is untainted—both to manipulate the Seronians and Rekags and to conceal
      his own psychological fragility.
    what_happened: 'Alkar stands with unshakable serenity in the Observation Lounge,
      his posture relaxed yet commanding as he listens to Jarth and Liva’s grim reports.
      He interrupts Picard’s suggestion of a cooling-off period with a sharp, almost
      urgent insistence on immediate action, his voice smooth but laced with an undercurrent
      of authority. When Picard proposes Darthen as a neutral meeting ground, Alkar’s
      eyes flicker with approval before he imposes his non-negotiable condition: no
      armed guards. His demand to be seen as a ''man of peace'' is delivered with
      quiet finality, leaving no room for debate. Throughout, his emotional detachment
      contrasts sharply with the anxiety of his delegation, reinforcing his role as
      the calm eye of the storm—though the storm itself is one of his own making.'
