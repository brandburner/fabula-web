  title: Picard orders Liva’s rescue mission
  description: 'In the immediate aftermath of Troi’s death—declared by Beverly as
    a result of respiratory and renal failure—Alkar’s facade of serenity cracks as
    he coldly justifies her death as having ''purpose,'' triggering Picard’s steely
    vow to hold him accountable. The moment Alkar exits Sickbay, the crew’s grief
    transmutes into urgent action: Beverly scans Troi’s body, revealing a three-minute
    window to act, while Picard orders the transporter room to lock onto Liva in Alkar’s
    quarters and Worf to guard the door. The shift from mourning to tactical response
    underscores the crew’s refusal to let Alkar’s manipulation go unchallenged, setting
    up a high-stakes confrontation that could expose his empathic predation and force
    a reckoning. The scene’s tension hinges on the race against time—both to save
    Liva and to dismantle Alkar’s emotional control before he can claim another victim.'
