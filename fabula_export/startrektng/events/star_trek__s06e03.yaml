    emotional_state: A volatile mix of frustration and deep concern—his low voice
      and firm grip suggest he is barely containing his alarm, while his public demeanor
      reveals a man torn between his personal attachment to Troi and his duty to the
      crew.
    goals:
    - To remove Troi from public view before her behavior escalates further, thereby
      preventing a larger crisis.
    - To assess the extent of her condition in private, where he can intervene without
      drawing unnecessary attention or panic.
    what_happened: Riker’s body is coiled with tension, his jaw set as he grips Troi’s
      arm with controlled force. His low, measured voice contrasts with the urgency
      of his movements, betraying his struggle to balance discretion with the need
      for immediate action. He is not just escorting her—he is containing a threat,
      both to Troi and to the crew. His frustration is palpable, but so is his concern;
      this is a man who cares deeply but is now forced to act as both protector and
      warden.
    observed_status: Riker’s body is coiled with tension, his jaw set as he grips
