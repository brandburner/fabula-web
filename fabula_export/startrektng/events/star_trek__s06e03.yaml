    global_id: ger_object_af58cde73258
  - object_uuid: ger_object_7b98a2d1db10
    description_of_involvement: "\n      The audio-only communication channel between\
      \ the *Enterprise* and the *Dorian* is the primary means of dialogue in this\
      \ event, its staticky transmission reflecting the damage to the *Dorian*’s subspace\
      \ emitters. The channel crackles with interference, forcing Picard and Talmadge\
      \ to speak in fragmented exchanges. This limitation heightens the urgency of\
      \ the situation, as critical information—such as the mediator’s role in the\
      \ Rekag attack—is conveyed in broken, incomplete sentences. The channel’s unreliability\
      \ adds tension, symbolizing the fragility of communication and the unseen threats\
      \ lurking beneath the surface.\n      "
    status_before_event: Functional but severely degraded due to the *Dorian*’s damaged
      subspace emitters, with intermittent static and dropouts.
    status_after_event: Temporarily closed after the transport request is granted,
      as the focus shifts to the guests’ arrival on the *Enterprise*.
    global_id: ger_object_7b98a2d1db10
  - object_uuid: ger_object_e0c8921905db
    description_of_involvement: "\n      The turbolift on the *Enterprise* bridge\
      \ is the means by which Counselor Troi departs to greet the arriving guests.\
      \ As she steps inside and the doors seal behind her, the turbolift hums efficiently,\
      \ carrying her toward the transporter room and her fateful encounter with Alkar.\
      \ The turbolift serves as a transitional space, symbolizing the shift from the\
      \ bridge’s tactical readiness to the personal stakes of Troi’s assignment. Its\
      \ compact, cylindrical design and the sound of its movement underscore the inevitability\
      \ of her descent into danger.\n      "
    status_before_event: Operational and ready for use, with Troi stepping inside
      to descend to the transporter room.
    status_after_event: Returning to standby mode after delivering Troi to the transporter
      room, where she awaits the guests’ arrival.
    global_id: ger_object_e0c8921905db
