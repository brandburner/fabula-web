  title: Troi confides in Riker about Maylor’s threat
  description: In Troi’s office, Riker arrives for their routine crew evaluation review,
    but Troi is visibly distracted by her unsettling encounter with Maylor. When Riker
    presses her, Troi admits that Maylor’s emotions felt malevolent and disproportionately
    evil, a sensation that deeply unsettles her. Riker initially rationalizes Maylor’s
    behavior as a result of illness or age, but Troi’s empathic intuition—heightened
    by her own vulnerability—leaves her convinced of a deeper, unspoken danger. Their
    exchange is abruptly cut short when Worf interrupts with an emergency summons
    to Alkar’s quarters, forcing them to abandon their task and rush to investigate.
    This moment serves as a critical turning point, where Troi’s growing unease about
    Maylor foreshadows the true nature of Alkar’s empathic manipulation and sets the
    stage for the escalating conflict that follows. The scene underscores Troi’s emotional
    fragility and Riker’s role as her confidant, while also introducing the urgency
    that will drive the plot forward.
