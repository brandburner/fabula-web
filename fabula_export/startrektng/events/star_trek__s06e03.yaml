- fabula_uuid: cand_evt_scene_b06c3b836b936c2b_01
  global_id: null
  title: Crusher proposes Troi’s simulated death
  description: "\n  In Sickbay, Beverly Crusher reveals her grim diagnosis: Troi’s\
    \ empathic overload stems from Alkar’s psychic waste, a flood of negative emotions\
    \ that has triggered a fatal neurochemical cascade. When Riker asks if she can\
    \ counteract it, Beverly admits the only solution is to sever Alkar’s empathic\
    \ link—but that requires Troi to *stop* being a viable receptacle. The only way\
    \ to achieve this, she argues, is to simulate Troi’s death, forcing Alkar to break\
    \ the connection and turn to another target. Picard quickly grasps the logic:\
    \ if Alkar believes Troi is dead, he’ll abandon her and seek a new victim among\
    \ his delegation. Riker recoils at the idea, but Beverly assures him she can resuscitate\
    \ Troi within a 30-minute window—if they act fast enough. The plan hinges on a\
    \ brutal moral calculus: sacrificing Troi’s immediate safety to protect an unknown\
    \ future victim. Picard, though visibly troubled, authorizes the procedure, framing\
    \ it as a necessary evil to contain Alkar’s predation. The scene crystallizes\
    \ the crew’s desperation, forcing them to confront the ethical cost of their choices:\
    \ saving one life by risking another, all while Alkar’s next target remains unidentified\
    \ and vulnerable.\n  "
