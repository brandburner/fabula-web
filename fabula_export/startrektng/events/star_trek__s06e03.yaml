- fabula_uuid: cand_evt_scene_c27e0eff4871b54e_02
  global_id: null
  title: Picard assigns Troi to greet Alkar
  description: "\n  The *Enterprise* arrives at Rekag-Seronia in response to a distress\
    \ call from the transport ship *Dorian*, which has been attacked by Rekag battle\
    \ cruisers. After the cruisers retreat unexpectedly, Captain Picard opens a channel\
    \ to Captain Talmadge, who requests permission to transport two passengers—an\
    \ empathic mediator and his companion—to the *Enterprise*. Picard agrees, then\
    \ deliberately assigns Counselor Troi to greet them and escort them to his Ready\
    \ Room. This decision, made without full awareness of the threat, places Troi\
    \ in direct contact with Ambassador Alkar, setting her up as the unwitting target\
    \ of his predatory emotional manipulation. The scene establishes the immediate\
    \ conflict: Alkar’s hidden agenda and Troi’s vulnerability as an empath, while\
    \ also reinforcing Picard’s trust in her abilities—unbeknownst to him, this trust\
    \ will soon become a liability. The dialogue between Picard and Talmadge hints\
    \ at the mediator’s role in the Rekag attack, foreshadowing the larger diplomatic\
    \ crisis, but the true danger lies in the personal stakes of Troi’s encounter\
    \ with Alkar.\n  "
