  title: Picard authorizes Troi’s autopsy despite Alkar’s obstruction
  description: 'In Sickbay, Beverly Crusher monitors Troi’s rapidly deteriorating
    condition as her neurotransmitter levels spike to dangerous levels, mirroring
    the anomalies found in Alkar’s mother. After confirming the medical urgency, Beverly
    insists on performing an autopsy to uncover the connection between Maylor’s death
    and Troi’s collapse, despite Lumarian cultural taboos. Picard, freshly healed
    from his own injuries, initially hesitates but ultimately overrides protocol,
    authorizing the autopsy over Worf’s relayed objections from Alkar’s delegation.
    This decision marks a critical escalation—Picard prioritizes Troi’s survival over
    diplomatic decorum, setting the stage for a direct confrontation with Alkar’s
    hidden agenda. The moment underscores the crew’s desperation and forces Beverly
    to act outside ethical boundaries, while Picard’s leadership is tested by the
    need to balance medical necessity with political fallout. The scene’s tension
    hinges on the unspoken urgency: if Alkar’s empathic manipulation is confirmed,
    the crew’s next move must be swift and decisive to sever the link before Troi’s
    condition becomes irreversible.'
