acts:
- fabula_uuid: act_d50f419d0762068a
  number: 0
  summary: The Enterprise responds to a distress call from the transport ship Dorian,
    which has been attacked near Rekag-Seronia, a planet embroiled in conflict. Captain
    Picard learns the Dorian is carrying Ambassador Alkar, a Lumarian mediator, and
    his elderly mother, Sev Maylor, en route to peace negotiations. Counselor Troi
    is assigned to greet the arriving guests. Upon their materialization in the transporter
    room, Maylor immediately confronts Troi with a disturbing, almost malevolent intensity.
    Maylor warns Troi away from Alkar, making unsettling remarks about Troi's perceived
    attraction to him and threatening her. Alkar apologetically dismisses his mother's
    behavior as due to illness. Troi is left deeply unsettled and uncomfortable by
    this strange and unexpected encounter, sensing a profound malevolence emanating
    from Maylor. This teaser introduces the central figures and the initial, unsettling
    mystery surrounding Alkar and his mother, foreshadowing the psychological conflict
    that will define the narrative. The attack on the Dorian establishes the high
    stakes of Alkar's mission, while Maylor's direct aggression towards Troi sets
    up the personal threat to the Counselor.
  key_moments: []
