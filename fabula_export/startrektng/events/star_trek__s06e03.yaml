- fabula_uuid: cand_evt_scene_9df831118600edca_01
  global_id: null
  title: Alkar admits emotional parasitism to Picard
  description: In a tense confrontation in the Conference Chambers Anteroom, Picard
    directly accuses Alkar of performing an unauthorized autopsy on Maylor and reveals
    Troi’s critical condition in Sickbay. Alkar, unrepentant, calmly admits to transferring
    his negative emotions onto others—including Troi—as a means of maintaining his
    emotional equilibrium for mediation. He justifies his actions as a necessary sacrifice
    for peace, dismissing Troi’s suffering as collateral damage. Picard, horrified,
    condemns Alkar’s moral cowardice, but their confrontation is interrupted by Liva,
    who demands Alkar’s return to the negotiations. Worf is held at phaser point by
    Seronian sentries, forcing Picard to retreat for the moment. The exchange exposes
    Alkar’s ruthless pragmatism and Picard’s unyielding moral stance, escalating the
    stakes for Troi’s survival and the mission’s ethical conflict. The scene ends
    with Alkar’s defiance and Picard’s forced withdrawal, setting up a direct confrontation
    to sever Troi’s link to Alkar’s emotional drain.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e03
  scene_sequence: 29
  sequence_in_scene: 45
  key_dialogue:
  - |-
    ALKAR: No, she wasn't my mother.
    PICARD: And she wasn't ninety-three years old.
    ALKAR: Captain—did you perform an autopsy against my wishes?
  - |-
    ALKAR: I discovered long ago that I had the ability to channel my darker thoughts... my unwanted emotions... to others... leaving me unencumbered.
    PICARD: Is this... what you've done to Counselor Troi?
  - |-
    PICARD: You're a coward. You exploit the innocent so you don't have to shoulder the burden of unpleasant emotions.
    ALKAR: Captain... I get no payment for what I do. I have no power base, no agenda. I am willing to risk my life simply to help others.
