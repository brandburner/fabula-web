- fabula_uuid: act_3229d23b32df68aa
  number: 5
  summary: 'Picard and Worf return to the Enterprise, determined to retrieve Alkar.
    In Sickbay, Beverly explains Troi''s condition as a result of Alkar flooding her
    with ''psychic waste,'' causing an abnormal chemical response. She proposes a
    drastic, dangerous plan: temporarily ''kill'' Troi to break the emotional link
    with Alkar, then resuscitate her within thirty minutes. Picard, recognizing the
    risk but seeing no other option, agrees, with the added concern of protecting
    Alkar''s next potential victim. On Seronia, Alkar experiences a sudden shakiness,
    indicating the breaking of his link with Troi. Picard contacts Alkar, demanding
    his immediate return to the Enterprise, threatening forced transport. Alkar, taking
    Liva''s hand, agrees to beam aboard. In Sickbay, Alkar witnesses Troi''s ''dead''
    body, now appearing ghastly and aged, and expresses a chilling lack of remorse,
    viewing her death as having ''a purpose.'' He then dismisses Liva to his quarters,
    intending to establish a new link. The moment Alkar leaves, the crew springs into
    action, immediately beginning the resuscitation process for Troi. As Alkar starts
    the funeral meditation with Liva in his quarters, intending to transfer his emotions,
    the reversed flow of emotions from Troi causes him to age rapidly. Picard orders
    Liva transported away, successfully breaking the new link. Alkar, now an ancient,
    decrepit man, collapses and dies as the full force of his own negative emotions
    overwhelms him. Troi, simultaneously, is restored to her normal, youthful self.
    Riker and Troi later reflect on the traumatic events, with Troi describing the
    experience as looking at ''a Holodeck projection of someone else.'' Riker reassures
    her of his enduring friendship, bringing a sense of closure and relief to the
    harrowing ordeal. The Enterprise continues its mission, its crew having overcome
    a unique and morally complex threat.'
