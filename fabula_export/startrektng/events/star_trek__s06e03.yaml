  title: Alkar’s purge fails and escape attempt
  description: Alkar, now visibly aged and desperate, attempts to forcibly transfer
    his suppressed emotions onto Liva, his next intended receptacle. Liva resists
    violently, breaking free just as Alkar lunges for her again—only for her to vanish
    mid-transference, likely beamed away by the Enterprise crew. The abrupt disappearance
    leaves Alkar exposed, his facade of control shattered. He immediately bolts for
    the doors, only to find his path blocked by two security officers, trapping him
    in his quarters. The failed purge strips him of his last means of emotional regulation,
    while the thwarted escape marks the collapse of his physical threat to the crew.
    The scene underscores his unraveling—both emotionally and strategically—as the
    crew’s countermeasures begin to close in on him.
