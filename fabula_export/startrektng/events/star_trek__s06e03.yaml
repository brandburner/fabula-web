      a threat, both to Troi and to the crew. His frustration is palpable, but so
      is his concern; this is a man who cares deeply but is now forced to act as both
      protector and warden.
    beliefs:
    - That Troi’s behavior is a result of external manipulation (though he may not
      yet understand the full scope of Alkar’s involvement).
    - That isolating her is the only way to protect her—and the crew—from the fallout
      of her unstable emotional state.
