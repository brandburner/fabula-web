  title: Picard authorizes Troi's lethal procedure
  description: In Sickbay, Beverly Crusher reveals her desperate plan to save Deanna
    Troi from empathic overload by simulating her death with a hypospray of dylamadon—a
    lethal but reversible drug. The procedure would sever Alkar’s empathic link to
    Troi, but only if he believes she’s dead. Riker initially resists the idea, horrified
    by the moral implications, but Picard overrides his objections, framing the decision
    as a necessary sacrifice to protect Alkar’s next potential victim. The scene escalates
    the crisis by forcing the crew to confront the brutal calculus of saving one life
    at the risk of another, while also exposing the fragility of their ethical boundaries.
    Beverly’s clinical detachment contrasts with Riker’s emotional turmoil, while
    Picard’s decisive leadership underscores the high stakes of the mission. The moment
    hinges on trust in Beverly’s medical expertise and the crew’s willingness to gamble
    with Troi’s life to stop Alkar’s predation.
