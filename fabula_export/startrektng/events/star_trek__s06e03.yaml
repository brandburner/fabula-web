- fabula_uuid: act_bba263522cf574a4
  number: 4
  summary: Troi's physical transformation reaches its peak; her skin is now craggy,
    and her hair is completely white, giving her a horrific, aged appearance. She
    confronts Alkar in her quarters, desperately demanding to accompany him to Seronia,
    convinced that Liva intends to take him from her. Alkar, maintaining his unnatural
    serenity, calmly refuses, explaining that he needs her as an 'anchor' on the ship
    to enable his work. Troi, consumed by rage and anguish, collapses in defeat as
    he leaves. Meanwhile, Beverly examines Riker's scratches and discusses Troi's
    inexplicable behavior. In the Transporter Room, as Alkar, Jarth, and Liva prepare
    to beam down to Seronia, Troi appears, now embodying depravity. She lunges at
    Alkar with a concealed knife, attempting to stab him. Picard intervenes, sustaining
    a cut to his arm and shoulder. Security is called, and Troi, still struggling,
    is taken to Sickbay. Beverly scans Troi, confirming elevated neuro-transmitter
    levels, which she links to Maylor's earlier condition. Defying Lumarian custom,
    Picard authorizes an autopsy on Maylor. Beverly discovers Maylor was not Alkar's
    mother and possessed the body of a thirty-year-old, deepening the mystery. Picard
    confronts Alkar on Seronia, who, with chilling calm, admits to his ability to
    channel his 'darker thoughts' and 'unwanted emotions' to others, whom he calls
    'receptacles.' He reveals Maylor was one such receptacle and that Troi became
    another after Maylor's untimely death, justifying his actions as necessary for
    achieving peace. Picard condemns Alkar as a coward, but Alkar dismisses individual
    suffering in favor of 'broader canvas' of peace. Liva and two sentries, holding
    Worf at phaser point, force Picard to leave, leaving Alkar free to continue his
    mission. This act brings Troi's physical and mental decline to a critical point,
    fully exposes Alkar's horrific secret, and sets up the direct conflict between
    Picard and Alkar.
