  key_dialogue:
  - |-
    ALKAR: No, she wasn't my mother.
    PICARD: And she wasn't ninety-three years old.
    ALKAR: Captain—did you perform an autopsy against my wishes?
  - |-
    ALKAR: I discovered long ago that I had the ability to channel my darker thoughts... my unwanted emotions... to others... leaving me unencumbered.
    PICARD: Is this... what you've done to Counselor Troi?
  - |-
    PICARD: You think that justifies brutalizing her? And the others you've used?
    ALKAR: Ask the Seronian and Rekag children who go to sleep every night in fear of their lives.
  - |-
    PICARD: This time you will be held accountable. I'm taking you back to the Enterprise to release Counselor Troi.
    ALKAR: I have no intention of releasing her. Now—or ever.
