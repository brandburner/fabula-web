  title: Troi’s Rejection Exposes Alkar’s Fragility
  description: In Alkar’s quarters, Troi—now fully destabilized by his empathic transference—arrives
    in a disheveled state, her usual composure shattered. She initiates an overtly
    seductive advance, probing Alkar’s attraction to her with uncharacteristic directness.
    Alkar, though visibly drawn to her, resists with visible distress, his rejection
    rooted in genuine conflict rather than cruelty. His hesitation and eventual refusal
    reveal the fragility of his serene facade, while Troi’s frustration marks a turning
    point in her emotional unraveling. The encounter forces Alkar to confront the
    consequences of his empathic manipulation, escalating the psychological stakes
    between them. The scene underscores the escalating danger of Troi’s condition
    and the moral cost of Alkar’s actions, as his distress suggests he is not merely
    a villain but a man trapped by his own methods.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e03
  scene_sequence: 14
  sequence_in_scene: 21
  key_dialogue:
  - 'TROI: I''d like you to talk to me. About you. I don''t know anything about you.
    And... I''d like to.'
  - 'ALKAR: You are very beautiful... but our relationship can''t be -- like that.'
  - 'TROI: Is it really so complicated? ((She leans in to him, her mouth close to
    his... but he backs away))'
