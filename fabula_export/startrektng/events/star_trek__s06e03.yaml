      spiking neurotransmitter levels, now at 300% above normal. Beverly Crusher and
      the crew study the waveforms and numeric displays, which mirror the anomalies
      in Alkar’s mother, Maylor. The alarms pulse urgently, marking the medical crisis
      and the crew’s race against time. These systems serve as both a diagnostic tool
      and a ticking clock, reinforcing the life-or-death stakes of the situation and
      the crew’s need to act decisively. Their data drives Beverly’s grim diagnosis
      and the crew’s desperate plan to simulate Troi’s death.
