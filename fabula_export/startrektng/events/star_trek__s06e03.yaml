  global_id: null
  title: Alkar weaponizes Troi’s death in Sickbay
  description: 'In Sickbay, Alkar arrives to find Troi’s corpse—now aged and lifeless—after
    Beverly confirms her death from respiratory and renal failure. His calculated
    detachment shatters the crew’s grief, as he coldly declares her death ‘had a purpose,’
    exposing his emotional manipulation. Picard threatens accountability, but Alkar
    invokes diplomatic immunity, exiting with chilling composure. The moment shifts
    from mourning to urgency: Beverly scans Troi’s body, Riker demands a timeline,
    and Picard orders Liva’s immediate extraction from Alkar’s quarters. The scene
    pivots from revelation to action, forcing the crew to confront Alkar’s psychological
    warfare and the stakes of his next target—Liva—while underscoring the Federation’s
    complicity in enabling his crimes.'
