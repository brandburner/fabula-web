  title: Crusher uncovers Maylor’s bio-filter sabotage
  description: "\n  In Engineering, Beverly Crusher examines Sev Maylor’s bio-filter\
    \ logs alongside Geordi La Forge, comparing them to her tricorder readings from\
    \ three days prior. The discrepancy is stark: Maylor’s physiological decline—massive\
    \ cellular deterioration—occurred far too rapidly to be natural, suggesting deliberate\
    \ interference. Beverly’s suspicion hardens as she realizes the logs may have\
    \ been tampered with, likely to conceal Alkar’s empathic manipulation of Maylor’s\
    \ body as an emotional receptacle. Her request for an autopsy isn’t just procedural;\
    \ it’s a direct challenge to Alkar’s facade, a step that could expose his lethal\
    \ method and its ripple effects on Troi. Geordi offers technical checks, but Beverly’s\
    \ focus remains on the autopsy—a bold move that risks escalating tensions with\
    \ Alkar while offering the only path to saving Troi.\n  "
