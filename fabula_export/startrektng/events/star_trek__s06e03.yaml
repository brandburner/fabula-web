  title: Riker’s unplanned evaluation disrupts Troi
  description: 'Commander Riker arrives unexpectedly at Counselor Troi’s quarters
    for a routine crew evaluation, catching her in a vulnerable state—disheveled in
    a robe, clearly unprepared for his visit. His professional demeanor masks his
    concern as he notes her uncharacteristic disarray, while Troi, already destabilized
    by Alkar’s empathic assault, scrambles to conceal her emotional turmoil. The intrusion
    forces her to perform composure, masking the depth of her condition behind a thin
    veneer of normalcy. This moment underscores the tension between duty and empathy:
    Riker’s obligation to assess his crew clashes with his unspoken worry for Troi,
    while her struggle to maintain control reveals the fragility of her psyche under
    Alkar’s influence. The scene sets up a critical dynamic—Riker’s professional detachment
    becomes a silent battleground for the larger conflict, as Troi’s deteriorating
    state threatens to unravel the crew’s stability.'
