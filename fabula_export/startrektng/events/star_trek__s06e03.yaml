  object_involvements:
  - object_uuid: ger_object_9d49f58f645b
    description_of_involvement: Beverly’s diagnostic scanner is the tool that transforms
      Troi’s corpse from a symbol of loss into a lifeline for Liva. After removing
      the medical device from Troi’s forehead, Beverly immediately scans the body,
      uncovering the three-minute window before Alkar’s empathic link shifts fully
      to Liva. This device bridges the gap between grief and action, providing the
      crew with the precise timeline they need to intervene. Its beep and data readout
      become the catalyst for Picard’s order to extract Liva, turning medical science
      into a race against time.
    status_before_event: Attached to Troi’s forehead, confirming her death and contributing
      to the crew’s initial shock.
    status_after_event: Used to scan Troi’s body, revealing the critical three-minute
      window and enabling the crew’s tactical response.
