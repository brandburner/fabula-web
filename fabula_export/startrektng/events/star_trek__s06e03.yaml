  title: Maylor’s violent warning to Troi
  description: After Alkar invites Troi to assist him in diplomatic negotiations on
    Seronia, Maylor—his elderly mother—interrupts their conversation with a sudden,
    violent outburst. She accuses Troi of pursuing Alkar romantically, her language
    laced with venomous threats ("if you do, you will regret it for the rest of your
    life"). Troi, already unsettled by Maylor’s earlier hostility, recoils from the
    emotional assault, her empathic senses overwhelmed by the woman’s malevolence.
    Alkar attempts to restrain his mother, but her words linger, leaving Troi visibly
    shaken. The encounter exposes the depth of Maylor’s instability and the dangerous
    undercurrents of Alkar’s family dynamics, foreshadowing the emotional manipulation
    Troi will soon face. The scene underscores Troi’s vulnerability as an empath and
    the lurking threat posed by Alkar’s hidden nature.
