- fabula_uuid: act_badb75b7444abe35
  number: 2
  summary: Counselor Troi begins to display increasingly erratic and uncharacteristic
    behavior. She looks at herself in the mirror with profound dissatisfaction, cancels
    her morning appointments, and during a solo Tai Chi session, her movements become
    sensual and free-form, indicating a loss of focus and an overwhelming surge of
    new, uncontained emotions. Driven by these impulses, Troi directly approaches
    Alkar in his quarters, making overt seductive advances, questioning what kind
    of woman he finds attractive, and asking if he finds her attractive. She attempts
    to kiss him and trace his face, but Alkar, though acknowledging her beauty, gently
    but firmly rejects her, stating their relationship 'can't be like that.' Troi
    is left feeling frustrated and rejected. Later, Riker arrives at Troi's quarters
    to complete crew evaluations and discovers a young Ensign in her bedroom, putting
    on his boots, indicating a casual sexual encounter. Troi, unamused by Riker's
    presence, dismisses the Ensign with a provocative comment and then confronts Riker,
    accusing him of being bothered by her actions and asserting it's 'none of his
    business.' Her mood swings are stark; she becomes argumentative and dismissive,
    pushing Riker away when he attempts to refocus on work. Riker, confused and annoyed
    by her sudden change in attitude and behavior, eventually leaves, attributing
    it to her embarrassment, unaware of the deeper, more sinister cause. This act
    clearly marks the onset of Troi's personality and behavioral changes, driven by
    the transferred emotions, and begins to isolate her from her closest friends.
