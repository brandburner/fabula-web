- fabula_uuid: act_e0116907b0a3b782
  number: 1
  summary: Admiral Simons, via viewscreen, insists that Ambassador Alkar continue
    his journey to Seronia aboard the Enterprise, overriding Alkar's desire for a
    less conspicuous vessel due to security concerns. Alkar reluctantly acquiesces,
    maintaining his serene demeanor. Troi and Alkar begin to interact, first during
    a martial arts class where Alkar's discipline is evident, and then in a corridor
    and turbolift. Troi finds Alkar intriguing, sensing an unusual serenity, calmness,
    and tranquility from him, which she notes embodies the qualities he seeks to inspire
    in others. Alkar, in turn, asks Troi to accompany him to Seronia, acknowledging
    her empathic abilities would be an advantage. Their conversation is interrupted
    when Maylor once again confronts Troi outside Alkar's quarters, exhibiting heightened
    fury and directly accusing Troi of wanting to 'mate' with Alkar, issuing further
    threats. Troi, deeply disturbed, confides in Commander Riker, expressing her fear
    of Maylor's 'malevolent' feelings. Shortly after, an emergency is reported in
    Alkar's quarters, leading to Maylor's sudden death. Alkar, though pale, quickly
    regains composure and asks Troi to perform a Lumarian funeral meditation with
    him, citing her empathic abilities. During the meditation, as Alkar and Troi hold
    special stones and recite phrases, Alkar touches his stone to Troi's. Both stones
    briefly glow, Alkar appears relieved and calm, while Troi experiences a profound
    chill, a subtle but significant indication of the emotional transfer beginning.
    This act establishes Alkar's core mission, deepens the mystery around Maylor's
    intense hostility, and subtly initiates Troi's transformation through the ritual.
  key_moments: []
