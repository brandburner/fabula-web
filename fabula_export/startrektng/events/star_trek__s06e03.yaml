- fabula_uuid: act_dacaa4e43d10b0cc
  number: 3
  summary: 'The Enterprise arrives in orbit around Seronia, where Alkar meets with
    his delegation members, Jarth and Liva. They report on the escalating conflict,
    with a cease-fire already broken. Picard suggests the neutral city of Darthen
    as a negotiation site, which Alkar accepts, emphasizing his commitment to peace
    without armed guards. Meanwhile, Troi''s deterioration accelerates. During a counseling
    session, she exhibits shocking unprofessionalism, harshly criticizing Ensign Janeway
    for complaining, telling her she''s not ''up to it'' and suggesting a transfer.
    Janeway is devastated. Concurrently, Doctor Crusher investigates Maylor''s death,
    discovering a significant discrepancy between her initial transporter bio-filter
    log and later tricorder readings, indicating massive physiological deterioration
    in just three days. This deepens the medical mystery, as Maylor''s body showed
    no evidence of disease. The most dramatic manifestation of Troi''s transformation
    occurs in Ten Forward. She appears with a drastically altered appearance: a severe
    hairstyle, a prominent white streak in her hair, clinging attire, extreme makeup,
    and visible signs of accelerated aging on her skin. Her demeanor is openly seductive
    and aggressive. She publicly confronts Jarth and Liva, accusing Liva of wanting
    Alkar and Jarth of secretly wishing for Alkar''s failure. Riker, astonished by
    her transformation, intervenes and escorts her to her quarters. Once inside, Troi
    becomes overtly seductive towards Riker, attempting to kiss him. When he resists,
    she suddenly and violently rakes her nails across his neck and face, displaying
    a feral and dangerous look in her eyes. Riker, shocked and recognizing nothing
    familiar in her, retreats, leaving Troi in a state of unsettling emotional intensity.
    This act significantly escalates Troi''s physical and psychological deterioration,
    making it public and violent, while also advancing the medical mystery surrounding
    Maylor''s death, setting the stage for the true nature of Alkar''s abilities to
    be revealed.'
