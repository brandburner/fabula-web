- fabula_uuid: cand_evt_scene_1e870f3b144b0f1c_01
  global_id: null
  title: Alkar’s facade fractures under emotional collapse
  description: "\n  In the celebratory aftermath of the peace negotiations, Alkar—surrounded\
    \ by well-wishers and his delegation—maintains his signature serene demeanor,\
    \ physically anchoring his team with gestures of camaraderie (arm around Jarth’s\
    \ shoulder, Liva’s possessive touch). The moment is one of triumph, yet his body\
    \ betrays him: a sudden, unmistakable tremor disrupts his composure. His breath\
    \ hitches, his voice falters, and his insistence that he’s ‘fine’ rings hollow.\
    \ The physical collapse—light-headedness, shaky breathing—isn’t just exhaustion;\
    \ it’s the first visible crack in his empathic armor, a symptom of the emotional\
    \ overload he’s been offloading onto others. Liva and Jarth’s immediate concern\
    \ (‘You’re exhausted’/‘Do you want a doctor?’) underscores the fragility of his\
    \ facade, while Picard’s abrupt interjection via comms (‘Enterprise to Ambassador\
    \ Alkar’) forces Alkar to mask his distress with professionalism. The scene pivots\
    \ from jubilation to tension, revealing the cost of Alkar’s emotional manipulation\
    \ and foreshadowing the unraveling of his carefully constructed control.\n  "
