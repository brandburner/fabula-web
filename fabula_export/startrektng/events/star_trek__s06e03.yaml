  - object_uuid: ger_object_e0c8921905db
    description_of_involvement: "\n      The turbolift on the *Enterprise* bridge\
      \ is the means by which Counselor Troi departs to greet the arriving guests.\
      \ As she steps inside and the doors seal behind her, the turbolift hums efficiently,\
      \ carrying her toward the transporter room and her fateful encounter with Alkar.\
      \ The turbolift serves as a transitional space, symbolizing the shift from the\
      \ bridge’s tactical readiness to the personal stakes of Troi’s assignment. Its\
      \ compact, cylindrical design and the sound of its movement underscore the inevitability\
      \ of her descent into danger.\n      "
    status_before_event: Operational and ready for use, with Troi stepping inside
      to descend to the transporter room.
    status_after_event: Returning to standby mode after delivering Troi to the transporter
      room, where she awaits the guests’ arrival.
    global_id: ger_object_e0c8921905db
