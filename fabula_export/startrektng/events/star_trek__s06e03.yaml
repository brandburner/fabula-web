  global_id: null
  title: Crusher discovers Alkar’s mother’s suspicious death
  description: "\n  In the morgue, Beverly Crusher examines the corpse of Alkar’s\
    \ mother, an elderly Lumarian woman whose sudden death has already raised questions.\
    \ When Picard arrives, Beverly reveals her inability to determine a natural cause—no\
    \ evidence of disease, but abnormally high levels of neuro-transmitter residue\
    \ in the cerebral cortex, suggesting foul play. Picard, aware of the diplomatic\
    \ delicacy, refuses to authorize an autopsy unless a direct threat to the *Enterprise*\
    \ is confirmed. Beverly, frustrated but understanding, agrees to explore alternative\
    \ investigative methods. The exchange underscores the tension between medical\
    \ urgency and diplomatic protocol, while the neuro-transmitter residue becomes\
    \ a critical clue linking Alkar’s emotional manipulation to Maylor’s death. This\
    \ moment forces Beverly to seek indirect means of uncovering the truth, setting\
    \ up her later discovery of Alkar’s lethal emotional transfer mechanism.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e03
  scene_sequence: 11
  sequence_in_scene: 17
  key_dialogue:
  - 'BEVERLY: I haven''t been able to determine the cause of death. I found no evidence
    of disease. But I did find abnormally high levels of neuro-transmitter residue
    in her cerebral cortex.'
  - 'PICARD: Do you have any reason to suspect her death poses some kind of threat
    to the *Enterprise*?'
  - 'BEVERLY: He tells me that Lumerian custom forbids autopsy except in cases where
    contagious disease might be involved. Could you talk to him?'
  - 'PICARD: We''re in the middle of a delicate situation. I''d prefer not to go to
    him with this unless you feel it''s absolutely necessary.'
