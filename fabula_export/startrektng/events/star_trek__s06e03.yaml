  title: Troi’s empathic corruption surfaces
  description: 'In a scene that starkly deviates from Troi’s established character,
    she exhibits uncharacteristic cruelty toward Ensign Janeway during a counseling
    session. Janeway, visibly distressed, seeks guidance about perceived unfair treatment
    from Lieutenant Pinder, but Troi—under the influence of Alkar’s empathic corruption—dismisses
    her concerns with cold indifference. Instead of offering empathy, Troi berates
    Janeway for ‘whining,’ suggests she is unfit for the *Enterprise*, and implies
    a transfer might be necessary. The abrupt shift in Troi’s demeanor—from compassionate
    counselor to dismissive adversary—serves as a critical indicator of the empathic
    overload seeping into her psyche. Janeway’s defiant resolve, despite her devastation,
    underscores the stakes: the crew’s unspoken struggle to save Troi before her corruption
    becomes irreversible. The scene functions as a turning point, revealing the depth
    of Troi’s affliction and foreshadowing the urgency of the crew’s intervention.'
