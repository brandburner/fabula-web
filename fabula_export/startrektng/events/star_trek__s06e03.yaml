- fabula_uuid: cand_evt_scene_315b0a5ef94215f8_01
  global_id: null
  title: Riker escorts Troi to her quarters
  description: 'After a public confrontation in Ten Forward, Commander Riker forcibly
    guides Counselor Troi down the corridor toward her quarters, his grip firm on
    her arm as he keeps his voice low to avoid drawing attention. His frustration
    is palpable—her erratic behavior has crossed a line, and he’s struggling to reconcile
    her uncharacteristic aggression with the woman he knows. Troi responds with a
    predatory smile, her demeanor unnervingly detached, as they enter her room. The
    scene underscores the urgency of her condition: Riker’s intervention is no longer
    about discretion but damage control, as Alkar’s empathic corruption continues
    to erode her self-control. The moment foreshadows the crew’s impending confrontation
    with the full extent of her destabilization, where her actions may no longer be
    her own.'
