  title: Troi’s first emotional fracture
  description: After the Lumarian meditation ritual with Alkar, Troi returns to her
    quarters visibly unsettled, her usual composure shattered. She scrutinizes her
    reflection with uncharacteristic dissatisfaction, tugging at her uniform as if
    it no longer fits her identity. The ritual’s aftermath has left her physically
    chilled and emotionally adrift—her first symptom of Alkar’s empathic contamination.
    When the computer lists her scheduled counseling sessions, she abruptly cancels
    them all, a decision that marks a stark departure from her professional dedication.
    Her abrupt shift in behavior (from meticulous counselor to dismissive and self-critical)
    signals the insidious onset of Alkar’s emotional transfer, foreshadowing her psychological
    unraveling. The scene underscores the vulnerability of her empathic abilities,
    now weaponized against her, and sets up the crew’s urgent need to intervene before
    the contamination becomes irreversible.
