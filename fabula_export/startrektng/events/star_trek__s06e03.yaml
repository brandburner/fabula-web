- fabula_uuid: cand_evt_scene_8196bc1180109bc9_01
  global_id: null
  title: Maylor’s empathic assault reveals Alkar’s deception
  description: Counselor Troi enters the transporter room to greet Ambassador Alkar
    and his mother, Maylor, but the moment they materialize, Maylor’s unnerving empathic
    scrutiny immediately locks onto Troi with unsettling precision. Without preamble,
    Maylor delivers a venomous accusation—‘You think he’s attracted to you... but
    he isn’t. You offer him nothing’—exposing Alkar’s predatory emotional manipulation
    in a single, brutal stroke. Alkar’s frantic damage control—dismissing Maylor as
    ‘not well’ and rushing her away—only underscores the fragility of his carefully
    constructed facade, while Troi’s physical recoil (hand at her throat, visibly
    shaken) signals her unspoken vulnerability as the next target. The scene ends
    with Maylor’s chilling warning—‘Don’t pursue him. I won’t have it... I’ll stop
    you’—a direct threat that foreshadows her role as a vengeful force and cements
    Troi’s precarious position between Alkar’s deception and Maylor’s wrath. The exchange
    transforms a routine diplomatic greeting into a psychological minefield, where
    Troi’s empathic gifts become both her greatest asset and her fatal weakness.
