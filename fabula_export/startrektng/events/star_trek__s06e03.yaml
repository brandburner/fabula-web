  title: Alkar’s facade collapses in Liva’s grasp
  description: Alkar’s meticulously maintained emotional equilibrium shatters mid-mediation
    as his body and mind betray him. His sudden, violent disorientation—marked by
    a gasp and a desperate grab for Liva—reveals the grotesque cost of his empathic
    parasitism. Liva’s shock at his physical transformation (rapid aging) and his
    refusal to release her force her into the role of unwilling witness to his unraveling.
    The moment marks the irreversible tipping point where Alkar’s victimization of
    others becomes his own undoing, with Liva as the sole observer to his vulnerability.
    The scene underscores the thematic cost of emotional exploitation and the fragility
    of his Lumarian facade, while setting up Liva’s forced complicity in his downfall.
