- fabula_uuid: cand_evt_scene_e581b40cf18e9c43_01
  global_id: null
  title: Troi’s violent breakdown and Alkar’s abandonment
  description: This event marks the catastrophic unraveling of Deanna Troi’s psyche
    under Alkar’s empathic assault, split into two devastating confrontations. First,
    Riker witnesses Troi’s predatory seduction and violent lashing out—a grotesque
    inversion of her usual self—when she scratches his face after he resists her advances.
    His shocked retreat underscores the irreversible nature of her corruption. Later,
    Alkar’s cold abandonment of Troi, despite her desperate pleas and physical deterioration,
    exposes the full extent of his manipulation. Her aged appearance and feral rage
