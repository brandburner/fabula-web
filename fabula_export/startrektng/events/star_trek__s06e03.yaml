  - object_uuid: ger_object_828e8474ee26
    description_of_involvement: 'The cortical stimulator is the centerpiece of this
      high-risk procedure, a device designed to deliver a controlled electrical charge
      to Troi’s neural pathways in an attempt to sever her empathic link to Alkar.
      Ogawa places it on Troi’s forehead with precision, her hands steady despite
      the gravity of the moment. When Beverly gives the command, the device is activated,
      sending a violent charge through Troi’s body. Her back arches off the biobed
      as her muscles stiffen, her fingers clutching at the edges in a spasm of pain.
      The stimulator’s role here is dual-edged: it is both a tool of salvation and
      a potential cause of permanent damage, embodying the crew’s desperate gamble
      to save Troi at any cost. Its use is a last resort, a acknowledgment that gentler
      methods have failed.'
    status_before_event: Sterilized and ready for use in sickbay, its charge fully
      powered and its settings pre-configured for neural intervention. It sits on
      a medical tray, awaiting Beverly’s command.
    status_after_event: Depleted of its charge, its metal surface slightly warm from
      the electrical discharge. It is set aside, its purpose fulfilled, as the medical
      team monitors Troi’s condition for signs of improvement or further deterioration.
    global_id: ger_object_828e8474ee26
  - object_uuid: ger_object_464b8298aab0
    description_of_involvement: The 10 cc’s of cordrazine, a powerful sedative, is
      the first critical step in preparing Troi’s body for the cortical stimulator.
      Administered via hypospray by Nurse Ogawa, the cordrazine is designed to suppress
      Troi’s neural activity just enough to make her body receptive to the electrical
      charge without causing immediate cardiac arrest. The dose is precise—too little,
      and the procedure would fail; too much, and Troi might never wake up. As the
      sedative takes effect, Troi’s breathing slows further, her body growing limp
      in anticipation of the stimulator’s activation. The cordrazine is a necessary
      evil, a chemical precursor to the violent intervention that follows, symbolizing
      the crew’s willingness to push Troi’s body to its limits in the name of saving
      her mind.
    status_before_event: Pre-loaded into a hypospray, its atomic mist ready for immediate
      administration. The hypospray sits on a medical tray, its dosage calibrated
      to 10 cc’s—enough to sedate but not overwhelm.
    status_after_event: Exhausted, the hypospray is empty, its reservoir depleted.
      It is set aside, its purpose served, as the medical team turns their focus to
      monitoring Troi’s reaction to the cortical stimulator.
    global_id: ger_object_464b8298aab0
  - object_uuid: ger_object_8d760c4a046a
    description_of_involvement: The sickbay stasis field plays a critical role in
      stabilizing Troi’s condition prior to the procedure. It hums faintly as it encases
      her body, holding her motionless on the biobed and preventing her from thrashing
      as her empathic overload intensifies. When Beverly orders its release, the field
      dissipates with a soft electronic sigh, freeing Troi’s body for the administration
      of cordrazine and the application of the cortical stimulator. The stasis field’s
      temporary containment of Troi’s physical agitation is a metaphor for the crew’s
      struggle to control the uncontrollable—her empathic link to Alkar. Its release
      marks the transition from stabilization to intervention, a shift from passive
      containment to active, aggressive medical action.
    status_before_event: Active and fully engaged, its energy barrier shimmering faintly
      around Troi’s body, holding her in place as her empathic overload causes her
      to twitch and convulse slightly even within its confines.
    status_after_event: Deactivated and retracted, its energy field dissolved, leaving
      Troi exposed to the full force of the procedure. The faint hum of its operation
      fades, replaced by the beeping of medical monitors and the tense silence of
      the medical team.
