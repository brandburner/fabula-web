  title: Troi attacks Alkar in transporter room
  description: In the transporter room, Picard prepares to beam Alkar and his delegation
    to the surface for peace negotiations when Troi—now physically and psychologically
    ravaged by Alkar’s empathic dumping—enters in a state of violent desperation.
    Her hair is white, her skin withered, and her demeanor unhinged as she begs Alkar
    to take her with him. When he refuses, she lunges at him with a concealed knife,
    slashing Picard’s arm in the process. Security and Riker intervene to restrain
    her, while Beverly assesses Picard’s wound and Troi’s catastrophic physical state.
    Despite the chaos, Picard insists Alkar proceed with the mission, prioritizing
    the diplomatic crisis over Troi’s immediate collapse. The scene brutally exposes
    the depth of Troi’s suffering, Alkar’s complicity, and the crew’s fractured priorities
    as they scramble to contain the fallout—both literal and emotional—of his empathic
    betrayal.
