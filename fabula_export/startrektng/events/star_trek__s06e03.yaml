      this moment is notable—it has been replaced by cordrazine, a stronger sedative
      necessary for the brutal intervention about to take place.
    status_before_event: Previously used (and failed) in an attempt to revive Maylor
      in Alkar’s quarters. Now, it sits unused in sickbay, its limitations in this
      context rendering it obsolete for Troi’s condition.
    status_after_event: Remains unused in sickbay, its purpose fulfilled in earlier,
      less extreme medical interventions.
