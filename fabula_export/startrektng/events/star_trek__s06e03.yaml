  title: Troi Stabilized After Empathic Overload
  description: In Sickbay, Beverly Crusher and Ogawa perform an emergency resuscitation
    on Troi, whose body has gone rigid and vital signs have failed due to Alkar’s
    empathic assault. After multiple attempts, Troi’s pulse returns, and her blood
    pressure begins to climb, though it remains dangerously elevated. Beverly orders
    a neurotoxin decontamination sequence to neutralize the transferred emotions,
    with Ogawa monitoring the neuro-transmitter levels as they drop incrementally.
    Picard attempts to expedite Troi’s evacuation via transporter, but Beverly insists
    on waiting until her neuro-transmitter levels fall below 300% of normal—a critical
    medical threshold. The tension between urgency and caution underscores the crew’s
    desperation as Alkar’s empathic overload threatens to fracture Troi’s mind permanently.
    Troi’s eyes flutter open for the first time, signaling a fragile but vital return
    to consciousness, though her recovery remains precarious.
