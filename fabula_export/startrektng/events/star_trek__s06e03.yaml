- fabula_uuid: cand_evt_scene_e6feb1c655f966d0_01
  global_id: null
  title: Riker misinterprets Troi’s emotional collapse
  description: 'After witnessing Troi’s uncharacteristically aggressive and volatile
    behavior—culminating in a sexually charged confrontation where she lashes out
    at him—Riker exits the corridor visibly shaken. His confusion stems from his assumption
    that her outburst is rooted in personal embarrassment over being caught in a compromising
    situation (implied by the earlier turbolift scene with the ensign). Unaware of
    Alkar’s empathic manipulation, Riker misreads Troi’s emotional collapse as a private
    failing rather than the symptom of a life-threatening empathic overload. This
    misreading deepens the crew’s blind spot to the true threat, allowing Alkar’s
    manipulation to escalate unchecked while Troi’s condition worsens. The scene underscores
    the narrative’s central tension: the crew’s reliance on Troi’s empathic abilities
    to navigate interpersonal conflicts leaves them vulnerable when she becomes the
    victim of a threat they cannot perceive.'
