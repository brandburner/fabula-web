  title: Wesley phases into the vortex
  description: "\n  Beverly Crusher, racing against the collapsing reality of the\
    \ *Enterprise*, deduces that the vortex—her only path to stability—must be located\
    \ in Engineering, where Wesley’s warp experiment first destabilized reality. As\
    \ she bolts for the turbolift, the ship’s computer warns of imminent life support\
    \ failure, heightening the urgency. The turbolift malfunctions, stranding her\
    \ mid-transit, but she forces it to proceed to Deck 36, where the vortex begins\
    \ forming. Meanwhile, Wesley, deep in concentration, phases in and out of existence\
    \ alongside the Traveler, his mental connection to the warp bubble manifesting\
    \ physically. The vortex’s emergence confirms Beverly’s theory: the fracture in\
    \ reality is tied to Wesley’s experiment, and the ship’s structural integrity\
    \ is now at critical risk. This moment escalates the crisis, forcing Beverly to\
    \ confront the reality that her son’s actions have unraveled the fabric of their\
    \ world, while the vortex itself becomes both a threat and a potential escape\
    \ route.\n  "
