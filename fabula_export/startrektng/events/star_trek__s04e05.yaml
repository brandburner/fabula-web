  title: Wesley vanishes in Engineering
  description: "\n  Beverly Crusher rushes into Engineering, desperate to find Wesley\
    \ and confront him about the destabilizing warp bubble experiment. The red alert\
    \ blares as she locates the Okudagram of the warp field bubble on the monitors,\
    \ but Wesley is nowhere to be found. When he finally responds, their tense exchange\
    \ reveals his uncertainty about the experiment's consequences and his mention\
    \ of the enigmatic 'Traveler' as a potential solution. Beverly, increasingly frantic,\
    \ insists they seek help from Captain Picard, but as they turn a corner, Wesley\
    \ abruptly vanishes without warning or explanation. The sudden disappearance leaves\
    \ Beverly alone in the vast, empty Engineering section, her cry of despair echoing\
    \ through the space. This moment underscores the reality's fragility and forces\
    \ Beverly to confront the possibility that her son—and perhaps her own sanity—may\
    \ be lost forever to the experiment's unraveling consequences.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e05
  scene_sequence: 20
  sequence_in_scene: 35
  key_dialogue:
  - |-
    BEVERLY: Wesley!!
    WESLEY: Mom? You all right?
    BEVERLY: No. We may have very little time left...
  - |-
    BEVERLY: Hundreds of people are gone and your experiment is the only possible explanation we have to work on right now...
    WESLEY: There it is. I don't know what else to do...
  - |-
    BEVERLY: Wesley, is it possible you've accidentally re-created something he did? Something that could alter reality?
    WESLEY: I don't see how. But he's the only one who could tell us...
  - |-
    BEVERLY: -- try it...
    BEVERLY: Nooooo... !
