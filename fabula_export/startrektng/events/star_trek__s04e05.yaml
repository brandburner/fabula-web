      uncharacteristic: *doubt*. The weight of Beverly’s crisis, the warp bubble’s
      legacy, and the crew’s disappearances press upon him, yet he does not waver.
      In this moment, he is the embodiment of Starfleet’s ideal—leadership in the
      face of the unknown.'
    beliefs:
    - Leadership in a crisis is not about having all the answers, but about giving
      the crew a reason to believe in the next step.
    - The warp bubble’s effects, though inexplicable, may yet be reversible—if they
      can buy enough time.
