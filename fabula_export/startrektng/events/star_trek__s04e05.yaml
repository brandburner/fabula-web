      \ screens pulse with data on link integrity as they input commands, attempting\
      \ to reroute power and adjust equations to prevent Beverly’s dimensional separation.\
      \ The terminals become a battleground of logic and desperation, their interfaces\
      \ glowing under frantic use. When the vortex collapses, the screens darken,\
      \ symbolizing the failure of their efforts and the severing of the connection.\n\
      \      "
    status_before_event: Operational, displaying warp core and vortex link data; Wesley
