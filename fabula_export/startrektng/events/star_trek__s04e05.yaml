  scene_sequence: 21
  sequence_in_scene: 37
  key_dialogue: &id015
  - |-
    BEVERLY: They're all gone... ?
    PICARD: Doctor, I believe I have been more than fair. I have done everything I can to substantiate your... your perceptions.
    BEVERLY: Will Riker! Your First Officer. He's very good at poker, likes to cook, listen to jazz, plays the trombone...
  - |-
    BEVERLY: Jean-Luc, I don't know how, but you and I must find this Traveler or another from his race... if anyone can help us.
    PICARD: You have my word... as soon as we return to the starbase, I'll make every effort to find him.
  - |-
    BEVERLY: Maybe you can help me identify it... I'd like to use the ship's computer to monitor your life functions.
    PICARD: Until I disappear.
    BEVERLY: It will happen.
    PICARD: Very well. Computer, continuous scan: Captain Jean-Luc Picard vital signs. Audible readout. Begin now.
