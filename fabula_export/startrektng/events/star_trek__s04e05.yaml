  title: Beverly confirms the warp bubble’s collapse
  description: "\n  Beverly Crusher, isolated on the *Enterprise*’s bridge, cross-references\
    \ a graphic of the universe with Wesley’s warp bubble experiment and realizes\
    \ she is trapped inside it. As the bubble contracts, the ship suffers catastrophic\
    \ structural failure—sections vanish, life support collapses, and the *Enterprise*\
    \ dissolves into the void. The computer confirms the flaw is in the ship’s design,\
    \ not an external attack, and life support will fail in under five minutes. Beverly’s\
    \ scientific mind races to process the implications: her reality is unraveling,\
    \ and the warp bubble’s collapse is accelerating the ship’s destruction. The moment\
    \ crystallizes the stakes—she must act now or be erased from existence entirely.\n\
    \  "
