      of the records to inform their next steps.
    - Avoid emotional bias, ensuring his report is objective and free from speculation.
    what_happened: 'Data stands at his station, his posture erect and his voice calm
      as he delivers the results of his exhaustive search. He doesn’t hesitate or
      waver, reciting the facts with clinical precision: no Starfleet records, no
      birth records, no phonetic variations. His report is a digital death knell for
      Quaice’s existence, and he offers no emotional judgment, only the cold truth.
      When Beverly interrupts, he responds with polite deference but doesn’t yield,
      his logic unassailable.'
