- fabula_uuid: act_6aba4649884be5cf
  number: 3
  summary: Act Three intensifies Beverly's isolation as the crew continues to dismiss
    her claims. Geordi finds no evidence of the vortex in her office, and Data reports
    no malfunctions or anomalies, stating the ship's complement is now only 114. Beverly
    confronts the crew, pointing out the vast empty spaces on the ship and the missing
    hundreds, but they offer logical, albeit unsettling, explanations. Picard, now
    fully questioning her sanity, orders a Red Alert and confines non-essential personnel.
    The situation becomes dire when Beverly realizes Lieutenant Worf is also gone,
    and the remaining crew members do not remember him, signaling a rapid acceleration
    of the disappearances. Troi, while sympathetic, offers no real validation, further
    pushing Beverly into despair. Beverly finds Wesley in Engineering, who, though
    initially skeptical, acknowledges the Traveler as the only one who might understand
    the warp bubble's potential to alter reality. However, before they can act, Wesley
    vanishes mid-sentence, leaving Beverly utterly alone. On the bridge, she confronts
    Picard, who now remembers no one but her, and she monitors his vital signs as
    he, too, vanishes. Left entirely alone, Beverly is pulled into another vortex,
    but this time she fights back. The act ends with a glimpse into the 'real' Enterprise,
    where Wesley and Geordi are attempting to retrieve her, and the Traveler appears,
    stating that 'it's not over'.
