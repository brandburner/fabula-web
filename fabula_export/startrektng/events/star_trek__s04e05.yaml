- fabula_uuid: cand_evt_scene_520f5148bbc4fa3f_02
  global_id: null
  title: Beverly’s Isolation Confirmed on Bridge
  description: "\n  Beverly Crusher enters the bridge to find an eerily understaffed\
    \ crew—only Picard, Riker, Data, Worf, and a single supernumerary present, where\
    \ dozens should be. Her report of an empty sickbay triggers immediate skepticism\
    \ from Riker, who questions why the absence of her medical team would surprise\
    \ her. Data’s cold recitation of ship records—revealing Beverly is the *only*\
    \ medical officer aboard and the crew complement has shrunk to 230—shatters her\
    \ composure. The crew’s exchanged glances and Picard’s measured request for a\
    \ private conversation in the ready room signal their growing concern for her\
    \ mental state. The scene escalates Beverly’s crisis: her reality is unraveling,\
    \ her credibility is eroding, and the crew’s distrust now mirrors the alternate\
    \ reality’s distortions. Picard’s decision to isolate her for further discussion\
    \ marks a turning point—her fight to prove her sanity must now be waged in private,\
    \ against the very people she depends on.\n  "
