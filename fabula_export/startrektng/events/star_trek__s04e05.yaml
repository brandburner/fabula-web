      truth, giving the distortion indirect power over Beverly.
    organizational_goals:
    - Maintain operational stability despite the reality distortion (e.g., Picard’s
      focus on containing Beverly’s outburst).
    - Preserve crew morale by not publicly acknowledging the ship’s unreliability.
    influence_mechanisms:
    - Physical manifestation of the distortion (empty sickbay, reduced crew).
    - Institutional records as a tool for control (Data’s recitations).
    - The crew’s trust in the ship’s systems over individual testimony.
    institutional_impact: The *Enterprise*’s unreliability forces the crew to question
      whether their *loyalty* to the ship is misplaced. If the ship itself is distorting
      reality, can they still trust it—or each other?
    internal_dynamics: 'The ship’s dual role (victim/weapon) creates a schism: the
      crew must choose between *believing the ship’s data* (and thus doubting Beverly)
      or *believing Beverly* (and thus questioning the ship’s integrity). This mirrors
      the episode’s broader theme of *trust vs. truth*.'
