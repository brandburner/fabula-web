      flickering readouts, and the ever-present glow of the warp core create an atmosphere
      of controlled urgency, a reminder that the ship’s systems are functioning even
      as Wesley’s world unravels. The pool table, positioned near the warp core, becomes
      a microcosm of the larger conflict: a place where the mundane (a game table)
      intersects with the existential (a battle to save reality). The location’s functional
      role is twofold: it is both a workspace for Wesley and the Traveler’s collaboration
      and a stage for Wesley’s internal crisis. Symbolically, Engineering represents
      the bridge between human ingenuity and the unknown—a place where science and
      the metaphysical collide, where Wesley must decide whether to trust the tools
      of his trade or surrender to forces beyond his understanding.'
