  scene_sequence: 20
  sequence_in_scene: 34
  key_dialogue:
  - 'BEVERLY: Wesley!!'
  - 'BEVERLY: No. We may have very little time left... You don''t believe me... I
    don''t have time to convince you. Hundreds of people are gone and your experiment
    is the only possible explanation we have to work on right now...'
  - 'WESLEY: There is someone who might be able to help us, but I can''t reach him.
    He was Kosinski''s assistant... an alien from Tau Alpha C... He said he was a
    ''Traveler''... somehow he combined warp technology with the energy of his own
    thoughts...'
  - 'BEVERLY: Yes, I remember... he took us where thoughts and reality became indistinguishable...
    Wesley, is it possible you''ve accidentally re-created something he did? Something
    that could alter reality?'
  - 'BEVERLY: Nooooo... !'
