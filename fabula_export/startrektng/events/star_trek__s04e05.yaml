  title: Beverly confronts Sickbay’s emptiness
  description: 'Beverly Crusher enters Sickbay expecting her medical team, only to
    find a hauntingly empty space—silent equipment, abandoned beds, and no personnel.
    The absence triggers visceral panic, forcing her to confront the escalating collapse
    of reality aboard the *Enterprise*. This moment is a turning point: the unnatural
    void mirrors her mentor’s disappearance and the ship’s erasure of his existence,
    now felt as a harbinger of something far worse. The scene underscores her isolation,
    as the physical absence of her team mirrors the psychological unraveling of her
    perception. Her immediate retreat signals her refusal to accept this new reality,
    setting up her later desperation to prove her sanity against overwhelming evidence.'
