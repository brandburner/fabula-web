    global_id: ger_object_0561abac0dda
  - object_uuid: ger_object_34b2e83cdde2
    description_of_involvement: "\n      The Enterprise Bridge Viewscreen becomes\
      \ the focal point of the vortex’s manifestation, filling the entire screen with\
      \ surging energy as the dimensional rift expands. The viewscreen acts as a visual\
      \ medium through which the unraveling of reality is made tangible, its chaotic\
      \ swirls reflecting the fragility of the crew’s existence. Beverly stares at\
      \ it in terror as Picard vanishes, and Wesley’s voice echoes through it, signaling\
      \ the collapse of the link. The viewscreen’s role is both narrative and symbolic,\
      \ a portal to the crisis unfolding beyond the ship’s walls.\n      "
    status_before_event: Displaying standard bridge views; suddenly overtaken by the
      swirling vortex.
    status_after_event: Dark and inactive after the vortex collapses, the screen reflecting
      the severing of the dimensional link.
    global_id: ger_object_34b2e83cdde2
  - object_uuid: ger_object_0744863a309a
    description_of_involvement: "\n      The Vortex is the central threat and narrative\
      \ device of this event, a swirling mass of color and sound that materializes\
      \ abruptly, emitting a roar of white noise. It violently yanks Beverly toward\
      \ its center after she braces against the wall, her struggle to resist its pull\
      \ becoming a metaphor for her fight to retain her grip on reality. The vortex’s\
      \ collapse severs the dimensional link, leaving Beverly clinging to the tactical\
      \ station and Wesley in despair. Its role is both destructive and symbolic,\
      \ representing the unraveling of the crew’s shared existence.\n      "
    status_before_event: Forming in front of the viewscreen, expanding rapidly and
      emitting a roaring noise.
    status_after_event: Collapsed into a blinding flash, severing the link and vanishing
      from the bridge.
    global_id: ger_object_0744863a309a
  - object_uuid: ger_object_4d3acbd549ca
    description_of_involvement: "\n      The Engineering Computer Terminals are the\
