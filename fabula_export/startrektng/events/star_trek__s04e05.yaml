    goals:
    - Reach Deck 36 to confront the vortex and reverse the reality collapse
    - Protect Wesley, whom she senses is phasing into the vortex, by any means necessary
    what_happened: Beverly Crusher is physically and emotionally trapped in a malfunctioning
      turbolift, her body pressed against the walls as the car jerks to a halt. She
      frantically barks orders at the computer, her voice sharp with desperation,
      as she realizes the turbolift is her only means of reaching the vortex—her last
      hope to stop the ship’s collapse. Her hands grip the control panel, fingers
      flying over the interface in a futile attempt to override the system, her breath
      coming in short, sharp gasps. The flickering lights cast erratic shadows across
      her face, highlighting the tension in her jaw and the fear in her eyes. She
      is the embodiment of a mother’s love and a doctor’s resolve, both pushing her
      to act despite the overwhelming odds.
