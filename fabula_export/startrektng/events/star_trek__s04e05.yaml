      every action in this scene. The crew’s deference to protocol, their trust in
      Data’s diagnostics, and Picard’s decisive shift to Red Alert are all manifestations
      of Starfleet’s institutional values: order, logic, and hierarchical authority.
      Beverly’s pleas for Worf’s involvement are met with silence because Starfleet’s
      systems have already ‘decided’ he doesn’t exist. The organization’s presence
      is oppressive—it’s the system that’s erasing Beverly’s reality, even as it claims
      to protect the crew.'
    active_representation: Through institutional protocol (Red Alert, confinement
      orders) and the crew’s unquestioning adherence to data-driven decision-making.
    power_dynamics: Exercising absolute authority over the crew’s actions and perceptions,
      suppressing Beverly’s claims as a threat to ship integrity.
    organizational_goals:
    - Maintain ship integrity and crew cohesion through adherence to protocol, even
      at the cost of ignoring potential threats
    - Suppress anomalies that threaten the established narrative, even if those anomalies
      are real (e.g., Beverly’s vortex and disappearances)
    influence_mechanisms:
