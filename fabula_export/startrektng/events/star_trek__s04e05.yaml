  - organization_uuid: ger_organization_245261bdcf54
    description_of_involvement: 'The *U.S.S. Enterprise-D* is not just a setting;
      it is an active participant in Beverly’s unraveling. The ship’s skeletal crew
      complement (230 vs. her memory of 1,000+) and the empty sickbay are physical
      manifestations of the reality distortion. The *Enterprise*’s systems—its records,
      its turbolifts, its very structure—have become unreliable, mirroring Beverly’s
      psychological state. The ship’s role here is dual: it is both the *victim* of
      the distortion (its records are being altered) and the *weapon* wielded against
      Beverly (its data damns her claims). The crew’s trust in the ship’s systems
      over her testimony underscores the organization’s identity crisis: *Is the Enterprise
      still a home, or has it become a hostile environment?*'
    active_representation: Through its physical state (empty stations, malfunctioning
