      rigid with defiance as she clutches at the fraying edges of her memory. She
      interrupts Data’s report with a sharp, emotional insistence on Quaice’s existence,
      citing their 15-year history and her internship on Delos IV. Her voice wavers
      between desperation and defiance, her hands gesturing emphatically as she spells
      out Quaice’s name, as if the act of pronunciation could summon him into being.
      The crew’s growing skepticism forces her into a corner, her usual clinical composure
      unraveling under the weight of institutional denial.
