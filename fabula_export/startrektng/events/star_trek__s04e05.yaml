- fabula_uuid: cand_evt_scene_34b67f2c7a3e9a11_01
  global_id: null
  title: Beverly confronts Quaice’s erasure
  description: "\n  Beverly Crusher enters Dr. Dalen Quaice’s quarters, expecting\
    \ to find her mentor, only to discover the space empty and devoid of any personal\
    \ belongings. Her confusion escalates when she queries the ship’s computer, which\
    \ denies Quaice’s existence aboard the *Enterprise*—a response that contradicts\
    \ her explicit memory of his arrival. The moment forces Beverly to question her\
    \ own perception of reality, as the computer’s denial suggests Quaice was never\
    \ there at all. When Lieutenant Worf arrives to assist, Beverly recounts her interactions\
    \ with Quaice, including his assigned quarters and their planned meeting, but\
    \ Worf confirms no record of Quaice exists. The computer’s repetition of the denial—‘There\
    \ is no Doctor Dalen Quaice aboard the *Enterprise*’—underscores the ontological\
    \ crisis unfolding: Quaice’s disappearance is not merely physical but existential,\
    \ erasing him from the ship’s records entirely. Worf’s logical observation—that\
    \ even an injured Quaice would not explain the absence of his belongings—hints\
    \ at a deeper, systemic distortion of reality. The scene leaves Beverly isolated,\
    \ her sanity and memories under siege as the first cracks in the alternate timeline’s\
    \ integrity become undeniable.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e05
  scene_sequence: 5
  sequence_in_scene: 7
  key_dialogue:
  - 'BEVERLY: Dalen? Dalen, it''s Beverly.'
  - 'COMPUTER VOICE: There is no Doctor Dalen Quaice aboard the *Enterprise*.'
  - 'BEVERLY: Lieutenant Worf, yesterday, before we left starbase an old friend of
    mine came onboard: Doctor Dalen Quaice. I requested quarters for him. He was assigned
    here.'
  - 'COMPUTER VOICE: There is no Doctor Dalen Quaice aboard the *Enterprise*.'
  - 'WORF: Even if Doctor Quaice had been injured... why would his belongings be missing?'
