  title: Beverly uncovers systematic erasure of crew
  description: Beverly Crusher’s investigation into Dr. Quaice’s disappearance escalates
    when she discovers her entire medical staff—including Dr. Hill and Dr. Selar—has
    vanished from both ship records and crew memories. After Riker confirms no transporter
    logs for Quaice, Beverly examines O’Brien in Sickbay, only to find the staffing
    levels drastically reduced. When she attempts to contact Hill and Selar, the computer
    denies their existence, and a visit to Cara Hill (Dr. Hill’s alleged wife) reveals
    the woman has no memory of ever being married. The cumulative evidence forces
    Beverly to confront the possibility that reality itself is being altered, with
    her memories as the sole anchor to what once was. The scene marks a critical turning
    point, shifting the mystery from isolated disappearances to a systemic, reality-warping
    phenomenon tied to Wesley’s experiment and Beverly’s repressed fears about her
    son’s safety and her own professional competence.
