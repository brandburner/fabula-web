  global_id: null
  title: Quaice’s records vanish without trace
  description: On the *Enterprise* bridge, Beverly Crusher’s insistence on Dr. Dalen
    Quaice’s existence collides with Data’s exhaustive search—no Starfleet records,
    no birth records, not even phonetic variations of the name exist. Worf confirms
    the crew’s search yielded nothing, while Picard and Riker exchange uneasy glances.
    The revelation that Quaice’s transporter logs were deliberately erased shifts
    the investigation from a missing person to a deliberate cover-up, deepening the
    mystery and isolating Beverly further. Riker’s question about the transporter
    operator on duty becomes the next critical lead, exposing a systemic gap in the
    ship’s records that could unravel the entire mystery of Quaice’s disappearance—and
    by extension, the unraveling reality Beverly is experiencing. The tension escalates
    as Wesley’s realization of the implications hangs unspoken in the air, foreshadowing
    the psychological and existential crisis to come.
