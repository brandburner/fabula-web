- fabula_uuid: act_e777a14aa17c90ff
  number: 2
  summary: Act Two deepens Beverly's struggle against a reality that contradicts her
    memories. She attempts to validate her perceptions by suggesting Chief O'Brien
    might have been tampered with, but her investigation quickly uncovers a more alarming
    truth. Beverly discovers that not only Quaice but also her entire medical staff,
    including Doctors Hill and Selar, have vanished without a trace, with no computer
    records or even family memories of their existence. This widespread erasure of
    individuals amplifies the mystery beyond a single disappearance. Wesley and Geordi
    present their warp bubble experiment, positing that if someone were caught in
    it, they would appear to vanish, but Picard dismisses this as a cause for the
    extensive disappearances and altered records. The act reaches a critical point
    when Beverly finds Sickbay completely empty and Data informs her that the Enterprise's
    crew complement is only 230, not over a thousand as she remembers. Picard, though
    concerned for her mental state, agrees to return to Starbase 133 for a full diagnostic
    based on Beverly's desperate plea. The act concludes with Beverly experiencing
    a terrifying, swirling vortex in her office, which then vanishes, suggesting a
    physical manifestation of the reality distortion she perceives.
