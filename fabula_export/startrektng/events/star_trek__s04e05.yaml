  scene_sequence: 10
  sequence_in_scene: 16
  key_dialogue:
  - 'BEVERLY: "Doctors Hill and Selar, and four other members of my medical staff
    have all vanished. All record of their ever having been on the *Enterprise* has
    been excised from the computer''s memory."'
  - 'PICARD: "Did they come aboard with Doctor Quaice?"'
  - 'BEVERLY: "No. They''ve been here for months. But the two duty nurses don''t remember
    them. Their families don''t even remember them..."'
  - 'PICARD: "As O''Brien didn''t remember Doctor Quaice...?"'
  - 'BEVERLY: "I checked O''Brien thoroughly. I found no physiological abnormalities."'
