    - Institutional trust in technology (Data’s diagnostics are treated as absolute
      truth)
    - Procedural responses (Red Alert and confinement orders override individual concerns)
    institutional_impact: The scene underscores Starfleet’s tendency to prioritize
      institutional stability over individual experiences, even when those experiences
      point to a genuine threat. Beverly’s isolation is a direct result of the organization’s
      refusal to entertain ‘unverifiable’ claims, no matter how desperate or sincere.
    internal_dynamics: The crew’s collective dismissal of Beverly reflects Starfleet’s
      culture of skepticism toward subjective experiences, particularly when they
      challenge the ship’s operational narrative.
