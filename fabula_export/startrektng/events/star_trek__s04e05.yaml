    \ a demand that clashes with Wesley’s scientific training. The Traveler’s cryptic\
    \ reassurances—‘You must allow me to help’—only deepen Wesley’s existential doubt,\
    \ revealing the fragility of his confidence when faced with the unknown. The scene\
    \ culminates in Wesley’s breakdown as he admits, ‘I can’t. I can’t do it,’ forcing\
    \ him to confront the limits of logic and the necessity of emotional surrender\
    \ to save Beverly. This moment underscores the broader narrative tension between\
    \ reason and instinct, mirroring the collapse of reality around them.\n  "
