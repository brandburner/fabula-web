- fabula_uuid: act_fee5462d0710f1cc
  number: 4
  summary: Act Four reveals the truth behind Beverly's ordeal from the perspective
    of the 'real' Enterprise. Captain Picard's log confirms two failed attempts to
    retrieve Beverly and the unexpected reappearance of the Traveler. The Traveler
    explains that Beverly was caught in Wesley's static warp bubble and, at that precise
    moment, her thoughts created her own reality. He clarifies that he cannot enter
    her reality but can help Wesley open a gateway for her return, emphasizing Wesley's
    untapped potential to bridge the realities. Meanwhile, in Beverly's collapsing
    reality, she systematically interrogates the computer, confirming she is the sole
    crew member and that her 'universe' is a mere 705-meter spherical region. She
    attempts to set a course for Tau Alpha C, hoping to find the Traveler, but the
    computer denies its existence and refuses to comply. Back in the real reality,
    the Enterprise returns to the precise location of the warp bubble's formation.
    The Traveler guides Wesley, instructing him to let go of guilt and to open himself
    to time, space, and the intricate threads that bind them, as they begin to enter
    warp field equations to create a stable gateway. The Traveler observes with concern
    that Beverly's warp bubble, her reality, is rapidly collapsing, raising the stakes
    for her imminent rescue.
