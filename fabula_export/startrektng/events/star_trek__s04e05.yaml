  sequence_in_scene: 58
  key_dialogue:
  - 'COMPUTER VOICE: "Two minutes thirty seconds to life support failure."'
  - 'BEVERLY: "Computer, hypothetical situation... a person is trapped inside a static
    warp bubble. Determine a means of escape..."'
  - 'COMPUTER VOICE: "Escape would theoretically depend on establishing a stable threshold
    between the warp field and the outer environment."'
  - 'BEVERLY: "Extrapolate from theoretical database. How might it manifest itself?"'
  - 'COMPUTER VOICE: "A dynamic atmospheric disturbance of great intensity."'
  - 'BEVERLY: "Disturbance? The vortex! They must have been trying to reach me! But
    how do I find it...? Wesley, where do I go? Help me..."'
