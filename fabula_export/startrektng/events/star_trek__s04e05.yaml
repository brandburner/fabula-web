acts:
- fabula_uuid: act_773716ed66cde9dd
  number: 1
  summary: 'Act One introduces Dr. Beverly Crusher''s mentor, Dr. Dalen Quaice, aboard
    the Enterprise, setting a reflective tone about loss as they discuss the passing
    of loved ones. Beverly then observes her son, Wesley, conducting a warp field
    experiment that produces a brief, anomalous flash of light and a distinctive energy
    bubble. The narrative swiftly shifts to the inciting incident: the next morning,
    Quaice has inexplicably vanished, and the ship''s computer holds no record of
    his presence. Beverly''s attempts to confirm his existence are met with confusion
    and skepticism from Lieutenant Worf, who finds no trace of Quaice, and Captain
    Picard, who denies receiving Beverly''s request for Quaice''s passage. The situation
    escalates when Data''s comprehensive search yields no Starfleet or birth records
    for anyone named Quaice. The act culminates in a pivotal scene where Chief O''Brien,
    the transporter chief, explicitly denies beaming Quaice aboard, stating Beverly
    was alone, directly contradicting her memory and leading the crew to question
    her sanity. This act establishes the central mystery and the initial isolation
    of Beverly''s perception against a seemingly unalterable reality, highlighting
    the theme of memory and objective truth.'
