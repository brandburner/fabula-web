  - character_uuid: ger_agent_596f60e072a1
    emotional_state: "\n      A storm of grief, fear, and defiance. Beverly oscillates\
      \ between raw vulnerability (her interrupted confession to Picard) and fierce\
      \ determination (clinging to the tactical station as the vortex tries to claim\
      \ her). Her emotional state is a collision of love, loss, and the terror of\
      \ being erased from existence.\n      "
    goals:
    - To make Picard acknowledge the vanished crew and the reality of their disappearance.
    - To confess her repressed feelings for Picard before it’s too late.
    - To survive the vortex’s pull and retain her grip on reality.
    what_happened: "\n      Beverly Crusher stands isolated on the *Enterprise* bridge,\
      \ her voice trembling as she pleads with Picard to recognize the vanished crew—her\
      \ friends, colleagues, and son. She clutches the tactical station as the vortex\
      \ forms, her knuckles white with desperation. When Picard vanishes mid-conversation,\
      \ she is left screaming into the void, her emotional confession cut short. The\
      \ vortex drags her toward its center, but she clings to the station, her body\
      \ horizontal to the floor as she fights against the gravitational pull. Her\
      \ struggle is both physical and existential, a battle to retain her grip on\
      \ reality itself.\n      "
    observed_status: "\n      Beverly Crusher stands isolated on the *Enterprise*\
