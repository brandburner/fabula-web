  title: Picard challenges Beverly over missing records
  description: In the ready room, Picard confronts Beverly Crusher after Worf and
    Data confirm no trace of her mentor, Dr. Quaice, exists aboard the *Enterprise*—despite
    her insistence he arrived. When Picard reveals he was never informed of Quaice’s
    visit and the computer confirms no passenger record, Beverly’s credibility unravels.
    The exchange forces her to defend her memory against mounting evidence, exposing
    a critical gap in ship records—or her own perception—while raising suspicions
    of a deeper conspiracy. Picard’s methodical approach (checking transporter logs,
    contacting Starbase Command) contrasts with Beverly’s growing desperation, framing
    her as isolated and potentially unreliable. The scene escalates the mystery of
    Quaice’s disappearance and foreshadows the unraveling reality tied to Wesley’s
    experiment, as the crew’s skepticism hardens into concern for Beverly’s sanity.
