      beyond its control. The *Enterprise*’s crewless state is a direct challenge
      to the organization’s assumptions about order, authority, and the infallibility
      of its systems. Beverly’s plea—*‘They deserve better than to be shrugged off...
      brushed aside...’*—underscores the human cost of institutional detachment, even
      at the highest levels of the Federation.
    internal_dynamics: The tension between the Federation’s symbolic authority (embodied
      by the *Enterprise*) and the reality of the crisis (a ship operating without
      a crew). The organization’s internal dynamics are not directly visible, but
