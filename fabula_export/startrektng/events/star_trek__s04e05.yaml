      and systems are both a resource and a limitation. The *Enterprise*’s computer,
      a direct extension of Starfleet’s operational framework, provides Beverly with
      the data she needs to understand the collapse—but its responses are bound by
      institutional rigor, offering no solutions, only confirmations of doom. Starfleet’s
      emphasis on documentation and structural integrity is exposed as a weakness
      here: the ship’s ‘design flaw’ (a euphemism for the warp bubble’s distortion)
      is treated as a technical failure rather than a metaphysical crisis, reflecting
      the organization’s materialist worldview. The organization’s influence is indirect
      but critical—its systems enable Beverly’s analysis but also reinforce her sense
      of helplessness in the face of the unknown.'
