    ''Engage,'' and we just sit here?'
  - 'WESLEY: Just a couple more minutes! I''m ready to try the new warp field!'
  - 'WESLEY: ((sees Beverly)) Mom?'
  - 'BEVERLY: ((pensive)) Don''t let me interrupt.'
