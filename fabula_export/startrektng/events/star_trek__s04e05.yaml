  key_dialogue:
  - 'GEORDI: I''ve had a team in Sickbay for two hours. We''ve run the mass spectrometer
    on all particulates... we''ve scanned the EM spectrum in case a wave guide was
    somehow leaking radiation... we''ve even crawled into the life support ductwork...
    Captain, I don''t know what this vortex was that Doctor Crusher saw...'
  - 'BEVERLY: I didn''t just see it. I felt it. I barely got away from it!'
  - 'GEORDI: Well, there''s nothing there now. And no sign there ever was.'
  - 'BEVERLY: There are now close to nine hundred missing.'
  - 'DATA: Yes, doctor. There are one hundred fourteen people on the Enterprise. That
    is the exact number there should be.'
  - 'BEVERLY: Deck after deck of this ship is now deserted. How do you explain all
    the empty rooms? If only a hundred fourteen people are supposed to be on board,
    why all the extra space?'
  - 'DATA: Transportation of colonists... diplomatic missions... emergency evacuations...'
  - 'BEVERLY: Sir, I''d like Lieutenant Worf to program onboard sensors to monitor
    all personnel... if we can catch the exact moment someone disappears...'
  - 'PICARD: Whom did you say?'
