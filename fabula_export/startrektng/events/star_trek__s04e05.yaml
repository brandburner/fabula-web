    must believe me...'
  - 'PICARD: I have no choice but to believe you. The safety of my crew is at stake.
    But I want to be sure...'
  - 'BEVERLY: That I haven''t lost my mind?'
  - 'PICARD: ((keys insignia)) Mister Riker, set a course to return to Starbase One-Three-Three
    immediately.'
  - 'PICARD: Your word has always been good enough for me.'
