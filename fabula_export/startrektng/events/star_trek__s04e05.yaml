  - object_uuid: ger_object_4dd46df07ff8
    description_of_involvement: 'The ship''s crew manifest is the linchpin of this
      event, the tangible proof Beverly needs to confirm her reality. Picard''s recitation
      of the count—1,014 members, including Dr. Quaice—is not just a procedural detail
      but an emotional anchor. The manifest is a symbol of Starfleet''s institutional
      rigor, a digital record that cannot be erased by the chaos of the alternate
      timeline. Its precision (''the exact number there should be'') is what allows
      Beverly to smile and hold Wesley tighter, her fear momentarily allayed. The
      manifest is both a tool and a metaphor: it represents the crew''s collective
      existence and the unshakable bonds that define them.'
    status_before_event: Altered by the warp bubble's effects, initially denying Dr.
      Quaice's existence and contributing to Beverly's disorientation.
    status_after_event: Restored to its correct state, confirming the full crew complement
      and Dr. Quaice's presence. It is now a source of stability rather than confusion.
    global_id: ger_object_4dd46df07ff8
  - object_uuid: ger_object_0744863a309a
    description_of_involvement: The vortex is the dramatic centerpiece of this event,
      the portal through which Beverly is violently pulled and then expelled. Its
      disappearance in a flash of light is the visual and narrative climax of the
      crisis, marking the restoration of reality. The vortex is both a literal and
      symbolic force—it represents the unraveling of the crew's world, but its collapse
      also signifies their return to stability. Its roar and gravitational pull are
      described in past tense, but their echo lingers in the crew's exhausted postures
      and the quiet tension of the moment. The vortex is the embodiment of the alternate
      timeline's threat, and its vanishing is the payoff for Wesley's and the Traveler's
      efforts.
    status_before_event: A swirling, roaring mass of energy, violently pulling Beverly
      into its center as it contracts rapidly.
    status_after_event: Vanished completely, leaving no trace. The Enterprise's corridor
      is solid and stable, with no residual effects.
    global_id: ger_object_0744863a309a
  - object_uuid: ger_object_77d5589ead61
    description_of_involvement: The experimental warp bubble, though no longer visible,
      is the catalyst for Beverly's return and the restoration of reality. Its collapse
      is referenced by Geordi's urgent warning ('We're losing the bubble...'), and
      its absence is felt in the steady hum of the Enterprise's systems. The bubble's
      failure marks the end of the crisis, but its legacy lingers in the crew's exhaustion
      and the subtext of Beverly's relief. It is the physical manifestation of Wesley's
      and Geordi's experiment, a tool that briefly unraveled reality but ultimately
      brought Beverly back. Its role here is narrative—it is the device that forced
      the crew to confront the fragility of their existence.
    status_before_event: Collapsing rapidly, its instability causing the vortex to
      break up and Beverly to tumble out.
    status_after_event: Fully dissipated, with no trace remaining. The Enterprise's
      systems are stable, and the crew manifest confirms the restoration of the timeline.
    global_id: ger_object_77d5589ead61
