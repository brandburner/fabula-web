    symbolic_significance: The bridge, once a symbol of Starfleet’s exploratory mission,
      now represents the *institution* as an adversary. Its empty stations mirror
      the gaps in Beverly’s memory, and its red alert lights foreshadow the crisis
      to come.
    access_restrictions: Restricted to senior staff and essential personnel. Beverly’s
