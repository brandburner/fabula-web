      from a command center into a *tribunal*. The absence of other officers amplifies
      the isolation Beverly feels, as if the ship itself has turned against her. The
      bridge’s red alert lights cast a sickly glow, mirroring her distress, while
      the crew’s exchanged glances create a silent jury. This is where her credibility
      is publicly tested—and found wanting.
    observed_atmosphere: Sterile and accusatory—the bridge’s usual hum of activity
