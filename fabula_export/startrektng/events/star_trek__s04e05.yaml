  scene_sequence: 19
  sequence_in_scene: 33
  key_dialogue:
  - 'BEVERLY: Deanna, I''ve delivered babies who no longer exist! No one else remembers
    them. But I can close my eyes, and see their faces as clearly as I can see yours!
    What if it isn''t some huge conspiracy?! What if it''s just me?!'
  - 'TROI: What if it is just you?'
  - 'BEVERLY: Then, I''ve delayed a mission, scared a lot of people... including me...'
  - 'BEVERLY: If we reach Starbase. Wesley... where''s Wesley... ?'
