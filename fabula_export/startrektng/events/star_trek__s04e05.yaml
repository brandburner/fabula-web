  - object_uuid: ger_object_0561abac0dda
    description_of_involvement: The Enterprise's turbolift is referenced indirectly
      as the means by which Beverly initially moved through the ship before the vortex
      collapse. Though it does not appear in this specific event, its absence is notable—Beverly's
      emergence from the vortex places her directly in the corridor, bypassing the
      need for conventional transport. The turbolift symbolizes the ship's infrastructure,
