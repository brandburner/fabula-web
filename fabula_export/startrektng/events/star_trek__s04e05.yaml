- fabula_uuid: cand_evt_scene_1c57b71c0e911f0a_01
  global_id: null
  title: Crusher’s Reality Collapses on the Bridge
  description: On the *Enterprise* bridge, Beverly Crusher’s insistence on the existence
    of her mentor, Dr. Dalen Quaice, is systematically dismantled by Data’s exhaustive
    search of Starfleet records—no birth records, no service history, no trace of
    the man she claims to have known for fifteen years. Worf’s report confirms the
    crew’s inability to locate Quaice, while Picard’s skepticism and Riker’s probing
    questions force Beverly into a defensive posture. The scene escalates her isolation
    as the crew’s collective disbelief hardens into concern, marking the first visible
    fracture in her grip on reality. Wesley’s dawning realization of the implications
    (tying to his warp experiment) adds subtextual weight, while Picard’s suggestion
    of deliberate record tampering introduces the possibility of a larger conspiracy.
    The moment crystallizes Beverly’s psychological vulnerability and foreshadows
    the existential unraveling to come, as her memories clash with undeniable evidence.
    The hard cut to the transporter room setup underscores the urgency of the mystery
    and the crew’s growing unease.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e05
  scene_sequence: 7
  sequence_in_scene: 11
  key_dialogue: &id005
  - |-
    DATA: Sir, Starbase One-Three-Three has no record at all of a Doctor Dalen Quaice.
    PICARD: I thought he was stationed there for six years.
    DATA: Not according to their computer. I have also accessed Starfleet records. There is no doctor currently serving in Starfleet named Quaice. In fact I cannot find any service record whatsoever. There are no birth records with that name. I find no...
  - |-
    BEVERLY: Data, I interned with him on Delos Four. I've known him for fifteen years.
    DATA: I do not doubt you, Doctor. However I have tried one hundred seventy-three phonetic variations of the name, and...
  - |-
    PICARD: Then it appears, for reasons unknown, someone has gone to great pains to erase all traces of this man.
    RIKER: (to Beverly) Who was on transporter duty when he came aboard?
