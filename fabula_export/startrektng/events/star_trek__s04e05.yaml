- fabula_uuid: cand_evt_scene_a98101879114294c_03
  global_id: null
  title: Crusher’s Desperate Confession and the Vortex
  description: |2

    Beverly Crusher, isolated on the *Enterprise* bridge with Captain Picard, pleads for recognition of the vanished crew—her friends, colleagues, and son—while Picard, increasingly skeptical, dismisses her claims as delusions. As she attempts to confess her long-repressed feelings for Picard, the computer monitoring his vitals abruptly cuts out, and he vanishes before her eyes. The bridge reality fractures into a swirling vortex, dragging her toward an unseen dimension as Wesley’s panicked voice echoes from the other side. The vortex collapses, severing the link, and Beverly is left clinging to the tactical station, her sanity and the crew’s existence hanging by a thread. The scene culminates in Wesley’s despair and the Traveler’s sudden intervention, offering a fragile hope of retrieval. This moment marks the emotional and narrative climax of Beverly’s isolation, where her personal vulnerability intersects with the unraveling of reality itself.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e05
  scene_sequence: 21
  sequence_in_scene: 38
  key_dialogue: &id017
  - |-
    BEVERLY: They're all gone... ?
    PICARD: Doctor, I believe I have been more than fair. I have done everything I can to substantiate your... your perceptions.
    BEVERLY: Will Riker! Your First Officer. He's very good at poker, likes to cook, listen to jazz, plays the trombone... Commander Data, the android who sits here at Ops, dreams of being human, never gets the punch line to a joke... Deanna Troi, you ship's counselor, half-Betazoid, loves chocolate, the arrival of her mother makes you shudder? And Geordi, O'Brien, Worf... Wesley, my son -- They have been the living, breathing heart of this crew for over three years. They deserve better than to be shrugged off... brushed aside... to be pinched out of existence like this!
  - 'BEVERLY: Jean-Luc, I don''t know how, but you and I must find this Traveler or
    another from his race... if anyone can help us... PICARD: You have my word...
    as soon as we return to the starbase, I''ll make every effort to find him.'
  - 'BEVERLY: Jean-Luc, you and I - (The computer readout is gone in a wink. She is
    talking to empty air.) BEVERLY: I won''t forget. I won''t forget any of you!'
