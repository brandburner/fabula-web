      \ to handle phenomena beyond conventional science. The erasure of the crew and\
      \ the failure of the ship’s systems highlight the organization’s vulnerability\
      \ when faced with dimensional threats.\n      "
    internal_dynamics: The absence of Starfleet’s usual support structures (e.g.,
      Starbase Command, backup crews) leaves the *Enterprise* isolated and vulnerable.
