  title: Beverly confronts the vortex
  description: Beverly Crusher enters her office, only to be confronted by an unseen,
    rapidly forming vortex—a swirling mass of color and sound that materializes before
    her. The vortex grows in intensity, its pull growing stronger until it violently
    yanks her into its center. She struggles to resist, bracing against the wall,
    but the force is overwhelming. As she screams, the vortex engulfs her in a blinding
    flash of light, leaving her collapsed on the floor, gasping for breath. This moment
    marks a physical and psychological rupture, where the instability of the alternate
    reality manifests as a tangible, violent force. The event serves as a turning
    point, escalating Beverly’s disorientation and confirming that the distortions
    she’s experiencing are not merely hallucinations but a collapsing reality tied
    to Wesley’s experiment. The vortex’s sudden appearance and violent impact underscore
    the urgency of her situation, reinforcing that her perception of reality is unraveling—and
    that she is not in control of what is happening to her.
