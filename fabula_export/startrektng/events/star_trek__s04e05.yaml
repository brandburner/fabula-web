  title: Beverly confronts the computer’s denial
  description: Beverly Crusher, already unmoored by her mentor’s disappearance, attempts
    to navigate the *Enterprise* to Tau Alpha C—a location tied to Dr. Quaice’s last
    known whereabouts. The computer initially acknowledges the planet’s existence
    but refuses to plot a course, then outright denies Tau Alpha C’s existence entirely.
    This contradiction forces Beverly to confront the possibility that her memories
    are unreliable, deepening her psychological unraveling. The moment underscores
    the collapsing reality around her, as the ship’s systems—once a trusted extension
    of her world—now actively undermine her perception. Picard’s log entry (heard
    in voiceover) reveals the *Enterprise* is returning to the subspace bubble’s origin,
    tying Beverly’s personal crisis to the larger narrative of Wesley’s experiment
    and the unraveling warp field. The scene escalates her isolation, as even the
    ship’s AI now treats her as delusional, leaving her with no external validation
    for her reality.
