    all vanished. All record of their ever having been on the *Enterprise* has been
    excised from the computer''s memory.'
  - 'PICARD: Did they come aboard with Doctor Quaice?'
  - 'BEVERLY: ((shakes her head)) No. They''ve been here for months. But the two duty
    nurses don''t remember them. Their families don''t even remember them...'
  - 'PICARD: As O''Brien didn''t remember Doctor Quaice... ?'
  - 'BEVERLY: ((nods)) I checked O''Brien thoroughly. I found no physiological abnormalities.'
  - 'WESLEY''S COM VOICE: Crusher to Captain Picard.'
  - 'PICARD: Go ahead, Ensign.'
