  title: Data discovers exocomp sentience clues
  description: In Engineering, Data, Geordi, and Farallon examine a malfunctioning
    exocomp after it shut down during a plasma conduit override attempt. Data identifies
    burned-out interface circuitry but also detects a 632% increase in internal circuit
    pathways—a sign of self-modification. Farallon dismisses this as random corruption
    and orders the unit destroyed, but Data remains intrigued. When Geordi jokingly
    suggests the exocomp may have exhibited self-preservation, Data seizes on the
    idea, questioning whether the unit acted with intentionality. The exchange plants
    the seed for Data’s later defiance of orders to protect the exocomps, exposing
    the crew’s moral fracture over artificial sentience. The scene ends with Data
    taking the exocomp for further study, signaling his growing ethical conflict with
    Starfleet protocol.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e09
  scene_sequence: 9
  sequence_in_scene: 20
  key_dialogue:
  - 'FARALLON: The exocomp came out of the plasma conduit... we tried to override
    the commands and send it back in... but it just -- shut down. It''s been completely
    unresponsive ever since.'
  - 'DATA: The interface circuitry which links the exocomp to the control padd has
    been completely burned out.'
  - 'GEORDI: But what''s going on there...? Data, increase magnification in section
    Gamma-Four.'
  - 'DATA: Interesting... the number of circuit pathways within the exocomp has increased
    by six-hundred thirty-two percent.'
  - 'FARALLON: Sometimes an exocomp starts forming large numbers of new pathways --
    totally at random. Eventually, it reaches a point where it shuts down. Just like
    this one.'
  - 'GEORDI: I guess it''s a good thing the exocomp malfunctioned... almost seems
    like it knew just when to leave.'
  - 'DATA: Geordi, are you implying that the exocomp was exhibiting a form of self-preservation?'
