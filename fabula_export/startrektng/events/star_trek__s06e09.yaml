  title: Data probes life’s definition with Beverly
  description: 'Following Worf’s departure after Beverly’s bat’leth training session,
    Data seizes the private moment to interrogate her about the scientific and philosophical
    boundaries of life. His abrupt shift from polite inquiry to existential questioning
    reveals his growing obsession with the exocomps’ sentience—a fixation that forces
    Beverly into an uncomfortable confrontation with the ethical limits of her profession.
    Data dismantles her conventional definition of life (metabolism, reproduction,
    adaptation) by exposing its logical inconsistencies (e.g., fire, crystals), then
    pivots to his own existential crisis: the moment of his own sentience. Beverly,
    recalling her past struggles to answer Wesley’s similar questions, admits the
    question may be unanswerable, framing it as a lifelong struggle rather than a
    solvable puzzle. Data’s relentless questioning underscores his desperation for
    validation beyond his programming, while Beverly’s inability to provide a definitive
    answer highlights the ambiguity of his own personhood—a tension that will later
    drive his defiance of orders to protect the exocomps. The exchange forces Beverly
    to confront the ethical implications of Data’s claim to consciousness, while Data’s
    fixation on the exocomps’ potential sentience foreshadows his future defiance
    of Starfleet’s directives.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e09
  scene_sequence: 12
  sequence_in_scene: 24
  key_dialogue:
  - |-
    DATA: Doctor, are you injured?
    BEVERLY: Just my pride, Data. What can I do for you?
    DATA: I would like to ask you a question. What is your definition of life?
  - |-
    DATA: What about fire? It consumes fuel to produce energy... it grows... it creates offspring... by your definition, is it alive?
    BEVERLY: Fire is a chemical reaction. You could make the same argument for growing crystals... but obviously, we don’t consider them alive.
    DATA: And what about me? I do not grow... I do not reproduce... and yet I am considered to be alive.
  - |-
    DATA: I am curious... as to what transpired between one moment when I was nothing more than an assemblage of parts in Doctor Soong’s laboratory... and the next moment when I became alive. What was it that endowed me with life?
    BEVERLY: I think I’m saying that we struggle all our lives to answer it... and it’s the struggle that’s important. That’s what helps us define our place in the universe.
