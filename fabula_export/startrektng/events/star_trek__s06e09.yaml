      its circuitry—suggests it may no longer be fully under her control. The PADD''s
      sparking and overload in the previous scene foreshadows this moment of tension,
      where human understanding of the exocomp is as ''burned out'' as its interface.
      Its presence here is a reminder of the fragility of human dominance in the face
      of the unknown.'
    status_before_event: Connected to the exocomp via optical cable, displaying schematics
