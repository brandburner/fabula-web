- fabula_uuid: act_56cfc09eb66bbed5
  number: 2
  summary: Following the explosion, Geordi, Data, and Farallon examine the unresponsive
    exocomp, discovering its interface circuitry is burned out, yet its internal circuit
    pathways have significantly increased. Farallon dismisses this as random corruption,
    deeming the exocomp useless and advocating for its erasure. Geordi, offhandedly,
    jokes that the exocomp seemed to 'know just when to leave' before the explosion,
    planting a seed of an idea in Data's mind about self-preservation. Data independently
    investigates the exocomp, linking it to the ship's computer. He discovers that
    the exocomp deliberately burned out its own interface circuitry to prevent being
    sent back into danger, and then subsequently repaired itself when safe aboard
    the Enterprise. This revelation deeply challenges its classification as a mere
    tool. Data then seeks out Doctor Beverly Crusher, engaging her in a philosophical
    discussion about the definition of life, questioning what moment endowed him with
    life and whether the exocomps might have achieved a similar state. Beverly's insights,
    though not definitive, encourage Data's line of inquiry. Armed with this new understanding
    and a broadened perspective on sentience, Data confronts Farallon and Geordi,
    asserting his belief that the exocomps are indeed alive and should no longer be
    exploited as laborers. This act escalates the thematic conflict, moving Data from
    curiosity to conviction, and setting up the crew's need to test his radical hypothesis
    regarding the exocomps' sentience.
