  key_dialogue:
  - 'FARALLON: Mister Data. I was hoping I''d have a chance to meet you. I''ve done
    extensive studies of your positronic network.'
  - 'DATA: And I have studied your design for the particle fountain, Doctor. I find
    the concept to be highly innovative.'
  - 'FARALLON: Is it true that your computational speed is limited only by the physical
    separation of your positronic links?'
  - 'DATA: Actually, that is no longer the case. I recently converted my main interlink
    sequencer to asynchronous operation, which removed that performance constraint.'
