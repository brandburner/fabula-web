- fabula_uuid: cand_evt_scene_7fc311747175dc5c_02
  global_id: null
  title: Picard interrupts poker game with urgent summons
  description: "\n  During a tense poker game in Riker’s quarters, Beverly Crusher\
    \ escalates the stakes by proposing personal wagers—shaving beards or dyeing her\
    \ hair—exposing the crew’s competitive and vulnerable sides. Geordi, Worf, and\
    \ Riker reluctantly agree, with Geordi seemingly confident in his hand. Just as\
    \ he prepares to reveal it, Picard’s abrupt summons over the comms—ordering all\
    \ senior staff to the bridge—shatters the moment. The crew immediately abandons\
    \ the game, leaving Beverly frustrated and the unresolved bet hanging. The interruption\
    \ underscores the crew’s divided priorities: personal tensions and social dynamics\
    \ are abruptly sidelined by the looming crisis of the exocomps and the Tyran particle\
    \ fountain mission. The scene highlights how command authority (Picard’s voice)\
    \ can instantly override personal stakes, reinforcing the crew’s disciplined but\
    \ sometimes strained professionalism.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e09
  scene_sequence: 1
  sequence_in_scene: 2
  key_dialogue:
