              The access tunnels serve as a *metaphor for the unknown*—both the technical risks of the particle fountain and the ethical dilemmas posed by the exocomps. They’re a *warning*: the station’s problems run deeper than what’s visible in the Core, and Farallon’s solutions may only scratch the surface. Their physical presence also raises the stakes: if the Core fails, the tunnels could become *deathtraps* for anyone inside.
    symbolic_significance: |2-

              The tunnels represent the *consequences of unchecked ambition*. Just as Farallon is willing to push the particle fountain beyond its limits, the tunnels symbolize the *hidden costs* of her approach: the structural weaknesses, the safety risks, and the ethical compromises that come with cutting corners. They’re also a *literal and figurative dead end*—a reminder that some paths, once taken, lead only to collapse.
