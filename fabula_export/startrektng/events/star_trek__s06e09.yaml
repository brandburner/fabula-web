  scene_sequence: 26
  sequence_in_scene: 49
  key_dialogue:
  - 'FARALLON: All right... I''ve enabled the command pathways.'
  - 'DATA: If the exocomps do not shut down after I have programmed them, we may assume
    that they are willing to go.'
  - 'DATA: They seem to be re-programming the commands I entered...'
  - 'DATA: Clearly, they are not willing to be transported into the stream for detonation...
    however, they may have an alternate solution.'
  - 'FARALLON: Something we haven''t considered? Now you''re suggesting they have
    superior intelligence.'
  - 'DATA: Not at all... but they do have superior experience, Doctor... during their
    service, they have interfaced with every part of the station core... something
    none of us has done, including yourself. They may have another way to control
    the particle surge.'
  - 'KELSO: Sir... new coordinates are being fed to the Transporter -- by the exocomps.'
  - 'KELSO: The coordinates are inside the station core.'
  - 'RIKER: Kelso -- energize.'
