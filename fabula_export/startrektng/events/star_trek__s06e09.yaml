- fabula_uuid: act_0fb27583168d0348
  number: 4
  summary: 'Dr. Farallon, despite earlier setbacks, expresses cautious optimism about
    the particle fountain''s progress to Picard and Geordi in the station core. Suddenly,
    a catastrophic surge in the particle stream causes a tremendous explosion, plunging
    the station into emergency and threatening total collapse. A rapidly intensifying
    radiation field traps Picard and Geordi on the station, cutting off communications
    and transporter access to the Enterprise. On the Enterprise, Commander Riker assumes
    command and learns of their dire situation, with Data reporting only twenty-three
    minutes until fatal radiation levels are reached for Picard and Geordi. Picard
    and Geordi manage to establish a temporary, unstable force field on the station,
    desperately buying time. Facing limited options and the ticking clock, Farallon
    proposes a drastic measure: using the exocomps as explosive devices to shut down
    the particle fountain, configuring their boridium power cells to detonate on command.
    Data vehemently objects, reiterating his conviction that the exocomps are sentient
    life forms and should not be sacrificed. Riker, under immense pressure to save
    Picard and Geordi, overrides Data''s ethical concerns, ordering Farallon to proceed
    with preparing the exocomps and to disconnect their command pathways to prevent
    any ''malfunction.'' As Farallon prepares the exocomps for transport and detonation,
    Data, in a shocking and unprecedented act of insubordination, locks out the Transporter
    controls, defying Riker''s direct order and escalating the conflict to a critical
    moral and strategic impasse.'
