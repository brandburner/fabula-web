  global_id: null
  title: Riker and Data compromise on exocomps' autonomy
  description: "\n  After Data defies Riker’s direct order to release the transporter\
    \ lock-out—insisting the exocomps may be sentient—Riker, desperate to save Picard\
    \ and Geordi, escalates the confrontation by threatening to relieve Data of duty.\
    \ Data counters with a moral argument: sacrificing the exocomps (potential life\
    \ forms) to save humans violates ethical consistency. Riker, cornered by time\
    \ and logic, proposes a radical compromise: reconnecting the exocomps’ command\
    \ pathways to grant them autonomy in the mission. Data, though hesitant, concedes\
    \ that if the exocomps *choose* to proceed, he will release the lock-out. The\
    \ moment marks a turning point—Riker’s pragmatic leadership yields to moral flexibility,\
    \ while Data’s rigid ethics bend toward agency for the exocomps. Their agreement\
    \ sets up the exocomps’ subsequent defiance of programming, forcing the crew to\
    \ confront the limits of control over artificial life.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e09
  scene_sequence: 25
  sequence_in_scene: 48
  key_dialogue:
  - |-
    RIKER: Mister Data, I gave you a direct order. Release the Transporter lock-out. Now.
    DATA: I cannot do that, sir.
    RIKER: If you don't, I'll relieve you of duty.
    DATA: That is your prerogative, sir. Under Starfleet regulations, direct insubordination is a court martial offense. But I cannot release the Transporter.
  - |-
    RIKER: Data, those are two of your friends out there. They've saved your life more times than I can remember. I can't believe you'd be willing to sacrifice them like this.
    DATA: Command, please do not think I have made an arbitrary decision. I have considered the ramifications of my actions carefully. And I do not believe it is justifiable to sacrifice one life form for another.
  - |-
    RIKER: Then... what if we re-connect their command pathways and give them a choice?
    DATA: A choice, sir?
    RIKER: Data, you've assumed the exocomps will shut themselves down before undertaking this mission... at least, we can ask them if they're willing to proceed.
    DATA: That seems reasonable, sir... if they choose to go, I would be willing to release the Transporter lock-out.
