  title: Exocomps Sacrifice Themselves for Transport
  description: "\n  In the transporter room, Kelso successfully locks onto Picard\
    \ and Geordi’s energy signatures, materializing them safely aboard the Enterprise.\
    \ The crew’s relief is short-lived as Data immediately demands Kelso attempt to\
    \ lock onto the exocomps—still trapped in the station’s unstable core. Kelso struggles\
    \ with the transporter controls, but the exocomps themselves take action: two\
    \ of them dematerialize in sequence, their lights fading in a deliberate, ritualistic\
    \ manner, while the third remains active, its energy beam sustaining the transport\
    \ process. Once the other two are gone, the beam cuts out, and the final exocomp’s\
    \ lights blink off one by one, signaling its own extinction. The scene transforms\
    \ a technical rescue into a poignant act of self-sacrifice, underscoring the exocomps’\
    \ sentience and the moral weight of their destruction. The crew witnesses not\
    \ just a malfunction or a failure, but a conscious choice—one that forces them\
    \ to confront the ethical implications of treating artificial beings as expendable\
    \ tools.\n  "
