- fabula_uuid: cand_evt_scene_dfe0076f56f76182_01
  global_id: null
  title: Exocomps stabilize core for escape
  description: "\n  In the station's damaged core, the exocomps—previously protected\
    \ by Data—materialize near the unstable particle stream and form a precise triangular\
    \ pattern around the core. Using power-taps, they begin siphoning energy from\
    \ the core, modulating the particle stream's frequency to create a narrow escape\
    \ window. Geordi La Forge observes their coordinated efforts, noting their struggle\
    \ to control feedback as they balance power absorption rates. When the exocomps\
    \ finally achieve resonance, Picard orders the force field dropped, allowing the\
    \ Enterprise to transport them out. This moment marks a critical shift from conflict\
    \ to survival, as the crew seizes their only chance to escape the station. The\
    \ exocomps' actions—though initially seen as mere tool-like behavior—reveal a\
    \ sophisticated, almost sentient coordination, reinforcing Data's earlier claims\
    \ about their potential consciousness. The scene underscores the ethical tension\
    \ between treating the exocomps as tools or as beings capable of independent,\
    \ life-saving action.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e09
  scene_sequence: 27
  sequence_in_scene: 51
  key_dialogue:
  - 'PICARD: Mister La Forge...'
  - 'GEORDI: What are they up to?'
  - 'GEORDI: Those look like power-taps of some kind...'
  - 'PICARD: That''s exactly what they are... the exocomps are siphoning off power
    from the core...'
  - 'GEORDI: They''re trying to distort the particle stream frequency. That might
    open up a window that the Enterprise can use to beam us out...'
  - 'GEORDI: If they can modulate the radiation field... it''ll work. But they''ll
    have to get the sub-harmonic frequencies to resonance...'
  - 'GEORDI: The particle stream frequency is fluctuating... they''re having trouble
    controlling the feedback... it may be more power than they can handle...'
  - 'PICARD: Can we help them? Is there any way we can moderate the power transfer?'
  - 'GEORDI: We''ve done all we can, sir... it''s up to them now.'
  - 'GEORDI: This is incredible... they''re balancing the power absorption rates...
    It''s working... the particle stream is beginning to distort... Almost at resonance...
    They''ve got it.'
  - 'PICARD: Drop the force field.'
