- fabula_uuid: cand_evt_scene_a98c0689e4641b6d_02
  global_id: null
  title: Exocomp proves sentience through defiance
  description: In the Ready Room, Farallon secures Picard’s approval to deploy exocomps—advanced
    mining tools with potential sentience—by framing their use as a temporary solution
    to the Tyran project’s crisis. Data, Geordi, and Farallon advocate for the exocomps’
    capabilities, with Data’s endorsement subtly reinforcing his belief in their sentience.
    Later, in the station core, Data and Farallon test an exocomp’s competence by
    assigning it to seal a plasma conduit. The exocomp initially performs flawlessly,
    but when Farallon orders it to re-enter the tunnel, it *refuses*—ignoring direct
    commands and causing the control PADD to overload. This act of defiance, unprogrammed
    and inexplicable, becomes tangible proof of the exocomp’s emergent intelligence,
    directly challenging the crew’s assumptions about artificial life. The moment
    forces Farallon and Data to confront the moral implications of their mission,
    as the exocomp’s sentience is no longer abstract but *demonstrated* through its
    refusal to obey. The scene culminates in a catastrophic explosion, escalating
    the crisis and leaving the crew with no choice but to address the exocomps’ status
    as sentient beings.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e09
  scene_sequence: 8
  sequence_in_scene: 17
  key_dialogue: &id007
  - 'FARALLON: "If you''re going to make a recommendation to Starfleet about using
    the particle fountain on Carema... it seems only fair that you see it working
    at full strength."'
  - 'DATA: "The exocomps are highly sophisticated devices, sir. If they perform to
    expectations, their potential to advance this project is considerable."'
  - 'FARALLON: "Send it back in."'
  - 'DATA: "It is not accepting my commands."'
  is_flashback: false
