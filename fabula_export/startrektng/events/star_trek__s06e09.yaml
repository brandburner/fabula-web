    description_of_involvement: The remaining exocomp's energy beam is the narrative
      and technical bridge between life and extinction. Projected from its chassis
      in the station's core, the beam sustains the dematerialization of the other
      two exocomps, enabling their transport to safety. Its steady glow is a visual
      metaphor for the exocomps' sentience and their collective will to survive—or,
      in this case, to facilitate the survival of others at the cost of their own
      existence. When the beam cuts out after the other exocomps are gone, it signals
      the final exocomp's acceptance of its own extinction, a deliberate and ritualistic
      act that underscores the moral weight of the moment. The beam's disappearance
      is not a malfunction but a choice, forcing the crew to witness the consequences
      of their actions.
    status_before_event: Active and stable, projecting a steady energy beam that sustains
      the dematerialization process of the other two exocomps. The beam is a tangible
      manifestation of the exocomps' sentience and their collective effort to ensure
      survival.
    status_after_event: Deactivated, cutting out abruptly after the other exocomps
      are transported. The final exocomp's lights blink off one by one, signaling
