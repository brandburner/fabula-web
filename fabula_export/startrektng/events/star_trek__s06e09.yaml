  title: Exocomp demonstrates adaptive learning
  description: "\n  In Engineering, Dr. Farallon unveils the exocomp—a compact, axionic-neural-network-equipped\
    \ device with boridium power systems—positioning it as a revolutionary industrial\
    \ tool. She demonstrates its capabilities by simulating a repair scenario: when\
    \ tasked with fixing a fluctuating anti-matter converter, the exocomp autonomously\
    \ replicates a mode stabilizer and constructs novel circuit pathways in its memory,\
    \ revealing an emergent problem-solving capacity. Data, observing this, immediately\
    \ recognizes the implications: the exocomp isn’t merely executing pre-programmed\
    \ tasks but *learning*—a behavior that blurs the line between advanced machinery\
    \ and sentience. Geordi, while impressed by the technology, remains focused on\
    \ its practical applications, while Farallon frames the exocomp as a tool whose\
    \ efficiency improves with experience. The exchange plants the seed for Data’s\
    \ later moral crisis: if these devices can adapt and learn, do they possess rights\
    \ beyond their programmed function? The scene functions as a silent litmus test\
    \ for sentience, with Data’s growing unease foreshadowing his eventual defiance\
    \ to protect the exocomps as potential lifeforms.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e09
  scene_sequence: 7
  sequence_in_scene: 13
  key_dialogue:
  - 'FARALLON: "The exocomps don''t come close to Data''s sophistication..."'
  - 'DATA: "Exocomps...?"'
  - 'FARALLON: "That''s what I call them."'
  - 'DATA: "You have incorporated a micro-replication system into the device... in
    order to fashion tools."'
  - 'FARALLON: "It''s more than that. I designed the exocomps to be problem solvers.
    Whenever they perform a task they''ve never done before, the micro-replicator
    creates new circuit pathways within the unit''s memory."'
  - 'DATA: "So... in a sense, they are learning."'
  - 'FARALLON: "Exactly. The more situations they encounter, the more circuit pathways
    they build. They become better tools as they work."'
  - 'DATA: "You have incorporated a micro-replication system into the device... in
    order to fashion tools."'
