  global_id: null
  title: Poker game reveals personal insecurities
  description: "\n  In Riker’s quarters, a seemingly casual poker game among Riker,\
    \ Beverly, Geordi, and Worf escalates into a charged exchange about masculinity\
    \ and self-perception. Beverly’s teasing about beards—calling them an 'affectation'—triggers\
    \ defensive reactions from the men, each of whom justifies their facial hair as\
    \ symbolic of strength (Worf), tradition (Riker), or personal identity (Geordi).\
    \ The tension peaks when Beverly proposes a high-stakes wager: if she wins, the\
    \ men must shave their beards; if they win, she must dye her hair brunette. Geordi\
    \ impulsively accepts the bet, despite Worf’s silent disapproval and Riker’s hesitation,\
    \ exposing the crew’s competitive undercurrents and individual vulnerabilities.\
    \ The moment is abruptly cut short by Picard’s summons to the bridge, leaving\
    \ the wager unresolved and the crew’s personal dynamics exposed just as the exocomp\
    \ crisis demands their full attention. The scene functions as a microcosm of the\
    \ crew’s unspoken tensions, contrasting their professional unity with their private\
    \ insecurities—particularly Beverly’s challenge to traditional masculinity and\
    \ the men’s defensive posturing. The unresolved bet lingers as a subtextual thread,\
    \ hinting at future confrontations or compromises when personal stakes collide\
    \ with duty.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e09
  scene_sequence: 1
  sequence_in_scene: 1
  key_dialogue: &id001
  - 'BEVERLY: I don''t know... it''s as though they''re trying to hide something.'
  - 'WORF: To a Klingon, a beard is a symbol of courage.'
  - 'RIKER: My beard isn''t an affectation.'
  - 'BEVERLY: Oh? Then why not shave it off?'
  - 'GEORDI: We''ll take that bet.'
