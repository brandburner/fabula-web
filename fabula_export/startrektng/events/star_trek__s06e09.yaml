  title: Radiation crisis forces life-or-death decision
  description: "\n  The event opens with Data returning to the bridge, where Riker\
    \ urgently seeks confirmation of the crew's status from Kelso. Farallon reports\
    \ that Picard and Geordi remain trapped on the station due to intense ionization\
    \ fields blocking transporter locks. Data's analysis reveals the particle fountain's\
    \ surge will cause fatal radiation levels in 23 minutes, creating an immediate,\
    \ high-stakes crisis. The revelation forces Riker to confront the reality that\
    \ the crew's survival—and the exocomps' fate—are now inextricably linked, with\
    \ no time for ethical debate. The tension escalates as the crew realizes they\
    \ must act decisively, but the station's deteriorating condition and Data's earlier\
    \ defiance over the exocomps add layers of conflict. This moment serves as a turning\
    \ point, where the ethical dilemma collides with survival, demanding a resolution\
    \ that will test the crew's priorities and values.\n  "
