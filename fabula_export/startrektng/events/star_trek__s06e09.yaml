  title: Geordi and Farallon clash over exocomp deployment
  description: Geordi La Forge urgently warns Dr. Farallon that the station’s particle
    stream containment is failing, leaving less than five minutes before a catastrophic
    flood. Farallon resists shutting down the months-long restoration project, instead
    proposing to deploy an experimental exocomp—a tool Data previously believed to
    be sentient—to repair the power grid remotely. Geordi, skeptical of the untested
    device and the ethical implications of using it, questions its reliability, while
    Farallon insists it’s their only viable option. The tension escalates as the exocomp
    is activated and sent into the conduit, forcing Geordi to confront the immediate
    crisis while grappling with the unresolved debate over the exocomps’ sentience.
    The scene underscores the clash between short-term survival and long-term operational
    stability, with Farallon’s ambition and Geordi’s caution colliding under pressure.
    The deployment of the exocomp also serves as a test of its capabilities, raising
    stakes for both the station’s safety and the ethical dilemma surrounding artificial
    intelligence.
