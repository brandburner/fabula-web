  object_involvements:
  - object_uuid: ger_object_ac1af6e50767
    description_of_involvement: The transporter lock-out is the *immediate* source
      of conflict, a digital barrier Data imposes to prevent the exocomps’ destruction.
      It serves as a physical manifestation of his ethical stance, forcing Riker to
      confront the consequences of his orders. The lock-out is not just a technical
      constraint but a *moral line in the sand*—crossing it would require Data to
      betray his principles. Riker’s threat to relieve Data of duty hinges on this
      lock-out, making it the focal point of their power struggle. Its eventual release
      (contingent on the exocomps’ choice) symbolizes the crew’s willingness to yield
      control, however tentatively.
    status_before_event: Active, enforced by Data, blocking any transporter beam-out
      of the exocomps to the station. The lock-out is in ‘denial mode,’ screens frozen,
      reflecting the stalemate between Riker and Data.
    status_after_event: Deactivated upon Data’s concession, allowing the exocomps
      to be transported to the station if they choose to proceed. The lock-out’s removal
      is a narrative turning point, signaling the crew’s shift from confrontation
      to collaboration with the exocomps’ potential agency.
