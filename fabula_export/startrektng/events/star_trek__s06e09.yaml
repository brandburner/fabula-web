  title: Riker faces stranded crew and radiation crisis
  description: 'With Picard and La Forge still trapped on the station, Riker assumes
    command on the *Enterprise* and urgently assesses the crew''s status through Kelso
    and Farallon. The revelation that transporter locks are impossible due to ionization
    fields forces Riker to confront the escalating crisis: the station''s core radiation
    will reach fatal levels in 23 minutes, while Data''s defiance over the exocomps
    threatens to deepen the crew''s moral and operational impasse. The scene underscores
    Riker''s leadership under pressure, the crew''s vulnerability, and the collision
    of survival imperatives with ethical dilemmas. Farallon''s report of the failed
    evacuation attempt and Data''s radiation warning create a high-stakes convergence
    that demands immediate action, exposing the mission''s critical impasse and the
    crew''s growing desperation.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e09
  scene_sequence: 21
  sequence_in_scene: 40
  key_dialogue:
  - 'RIKER: Chief, do you have them?'
  - 'FARALLON: We''re fine, sir. But Captain Picard and Commander La Forge are still
    on the station.'
  - 'RIKER: Kelso, can you get them off?'
  - 'KELSO: I''ve been trying, sir... I can''t establish a pattern lock...'
  - 'FARALLON: Commander... we barely managed to transport off ourselves. The field
    ionization is too intense.'
  - 'DATA: Commander, the particle fountain is continuing to surge. At the present
    rate, the radiation within the station core will reach fatal levels in twenty-three
    minutes.'
