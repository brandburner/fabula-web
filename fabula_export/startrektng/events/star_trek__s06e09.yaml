  title: Exocomp fails survival test
  description: In a controlled experiment designed to empirically test the exocomps'
    sentience, Geordi La Forge and Data simulate a plasma breach in the Jeffries tube.
    The exocomp, programmed to repair the breach, continues working despite the impending
    'cascade failure'—a scenario that would destroy it in reality. When the countdown
    reaches zero and the exocomp emerges unharmed, Farallon declares the test a failure,
    proving the exocomp lacks self-preservation instincts. Data remains impassive,
    but the result forces a confrontation between his scientific optimism and the
    crew's pragmatic skepticism about the exocomps' true nature. Picard, though supportive
    of the test, acknowledges the ethical ambiguity of defining sentience, while Farallon's
    triumphant exit underscores the institutional resistance to Data's hypothesis.
    The moment crystallizes the tension between empirical evidence and moral intuition,
    setting up a deeper conflict over the rights of artificial beings—one that will
    later intersect with the crew's survival crisis on the station.
