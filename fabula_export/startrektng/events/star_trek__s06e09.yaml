  title: Data discovers exocomp's self-destructive repair
  description: In his quarters, Data interfaces the exocomp with the *Enterprise*
    computer to diagnose its malfunctioning command module. The computer reveals the
    burnt-out circuitry was deliberately repaired by the exocomp itself, raising the
    question of why it would first damage its own systems and then fix them. This
    discovery forces Data to confront the possibility that the exocomp is not just
    sentient but capable of deception—an ethical dilemma that challenges his understanding
    of artificial life. The revelation escalates the narrative tension around the
    exocomps' true nature, directly tying into Data's growing moral conflict and the
    broader ethical debate about sentience on the *Enterprise*.
