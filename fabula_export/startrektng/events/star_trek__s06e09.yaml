    goals:
    - Locate and rescue Geordi La Forge despite the escalating danger
    - Confront the moral implications of the exocomps’ potential sentience in the
      face of human loss
    what_happened: Picard takes command of the transporter console after Geordi departs,
      his voice growing increasingly urgent as he calls for Geordi amid the chaos.
      When Geordi does not respond, Picard abandons the console and ventures into
      the station’s far corner, where he finds Geordi injured beside Takenta’s body.
      His decision to stay behind—despite Farallon’s warning—reflects his unwavering
      commitment to his crew, even at the cost of his own safety. The moment is charged
      with tension as Picard assesses the situation, his leadership tested by the
      moral weight of the exocomps’ fate and the lives of his crew.
