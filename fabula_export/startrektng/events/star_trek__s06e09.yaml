- fabula_uuid: cand_evt_scene_5767bb9ae63520ca_01
  global_id: null
  title: Geordi challenges Farallon’s risky particle fountain plan
  description: 'In the unfinished Station Core, Geordi La Forge and Dr. Farallon clash
    over the particle fountain’s design, with Geordi warning that her proposed increase
    in stream density risks catastrophic overload. Farallon, exhausted and desperate
    to prove her project’s viability, insists on redistributing the load to boost
    efficiency. Their technical debate reveals deeper tensions: Geordi’s methodical
    caution versus Farallon’s ambitious idealism, both under pressure from Starfleet’s
    impending evaluation. The scene escalates when the station trembles, forcing them
    to confront an immediate crisis—one that underscores the project’s instability
    and the crew’s divided priorities. Picard’s voiceover frames this moment as a
    critical juncture in Geordi’s assessment, where trust in the technology (and in
    Farallon’s leadership) hangs in the balance. The unresolved conflict sets up Farallon’s
    later revelation of the exocomps, hinting at her willingness to cut corners for
    progress.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e09
  scene_sequence: 2
  sequence_in_scene: 3
  key_dialogue:
  - 'GEORDI: Doctor Farallon. The original design called for the particle fountain
    to lift five-hundred kilograms per minute from the surface -- so far it hasn''t
    come close to that.'
  - 'FARALLON: That''s why I want to increase the stream density -- that should boost
    the lift capacity by seventy-two percent.'
  - 'GEORDI: Yeah... and overload the field generators in the process.'
  - 'FARALLON: Not if we distribute the overload evenly throughout the system.'
  - 'GEORDI: Doctor... forgive me... but maybe we should concentrate on getting this
    phase of the project completed... before we start talking about re-designing it...'
  - 'FARALLON: Commander... I know you''re here to evaluate this project... Starfleet
    is considering whether to use a particle fountain on Carema Three... they want
    to know how feasible it is.'
  - 'GEORDI: I guess the question we have to ask... is if this technology is any more
    efficient than conventional mining techniques.'
  - 'FARALLON: Commander... I know we''ve had problems here. It seems like nothing''s
    gone right... it''s taking a lot longer than I thought to get the particle stream
    to full strength. But I know it can work. This is the direction mining will take
    in the future... and it should be implemented on Carema Three.'
