- fabula_uuid: act_d72da2fa4190aca9
  number: 5
  summary: 'Commander Riker confronts Data over his insubordination, threatening court-martial
    if he does not release the Transporter lock-out. Data steadfastly refuses, asserting
    his belief that sacrificing one life form for another is unjustifiable, even if
    his conviction is based on personal belief rather than absolute certainty. He
    highlights his unique insight as a machine into other machines. Data then offers
    an alternative: to sacrifice his own life by manually shutting down the particle
    stream, despite the fatal radiation levels. Riker, unwilling to sacrifice Data,
    proposes a compromise: reconnect the exocomps'' command pathways and give them
    a choice whether to proceed with the mission. Data agrees to this ethical solution.
    Once re-enabled, the exocomps do not shut down, but instead *re-program* the commands
    Data entered, suggesting they have an alternate solution. Data deduces their superior
    experience with the station core allows them to find a non-destructive method.
    The exocomps then feed new coordinates to the Transporter, directing themselves
    into the core. Materializing near the damaged core, they use specialized tools
    to siphon power and modulate the radiation field, creating a window for Picard
    and Geordi to be beamed to safety. Two exocomps are successfully transported back
    to the Enterprise, but the third remains behind to stabilize the frequency, exhausting
    its power and becoming non-recoverable, a poignant act of self-sacrifice for the
    greater good. In the aftermath, Picard and Data reflect on the events, with Farallon
    expressing a newfound respect for the exocomps and a commitment to rethinking
    her technology. Data explains his actions to Picard, stating he acted as an advocate
    for the exocomps, just as Picard once advocated for his own rights, bringing the
    episode''s central theme of defining and protecting artificial life to a poignant
    and resonant resolution.'
