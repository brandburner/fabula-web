  global_id: null
  title: Exocomps override self-destruct programming
  description: "\n  In the Transporter Room, Data, Riker, and Dr. Farallon attempt\
    \ to program the exocomps for self-destruction by transporting them into the particle\
    \ stream. After Farallon enables the command pathways, Data inputs the detonation\
    \ sequence, but the exocomps—rather than shutting down—begin rapidly reprocessing\
    \ the commands. Their blinking and beeping cease abruptly, signaling an unexpected\
    \ response. Data observes that the exocomps are not only refusing the self-destruct\
    \ order but actively reprogramming the Transporter coordinates. Kelso confirms\
    \ that new coordinates are being fed into the system, targeting the station core\
    \ instead. This revelation forces the crew to confront the exocomps' autonomy\
    \ and potential sentience, as their actions defy both their programming and the\
    \ crew's assumptions about their capabilities. Riker, after a tense pause, orders\
    \ Kelso to energize the Transporter, sending the exocomps into the station core—a\
    \ decision that escalates the crisis and deepens the ethical dilemma surrounding\
    \ artificial intelligence.\n  "
