    power_dynamics: |2-

              *Exercising authority through delegation* (Picard as the on-site representative) but *operating under constraint* (the crew's actions are bound by Starfleet's protocols, even as they confront ethical dilemmas the organization has not yet addressed). There is a *tension between efficiency and ethics*—Starfleet's focus on completing the particle fountain project clashes with the moral questions raised by the exocomps' potential sentience.
