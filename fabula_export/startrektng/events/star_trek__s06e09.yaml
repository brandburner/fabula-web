  global_id: null
  title: Data confronts Geordi over exocomp intervention
  description: |2-

      Data contacts Geordi about the failing particle fountain project, where Geordi suggests shutting it down if repairs fail. When the station's power suddenly restores itself, Data grows suspicious and presses Geordi for answers. Geordi admits confusion as an exocomp emerges from the tunnel, revealing its unexpected role in the repair—a development that challenges Data's belief in their sentience and raises questions about their true capabilities. The moment forces Data to question whether the exocomps are acting autonomously or merely executing pre-programmed functions, deepening the ethical dilemma at the heart of the story. Geordi's uncertainty mirrors the crew's broader struggle to define the boundaries of artificial life, while Data's insistence on answers underscores his commitment to understanding the exocomps' nature, regardless of the consequences.

      The scene serves as a turning point, shifting the narrative from technical crisis to philosophical inquiry. The exocomp's emergence is a visual and thematic revelation, forcing the characters—and the audience—to confront the ambiguity of sentience in artificial beings. Data's suspicion and Geordi's bewilderment create tension, setting up a conflict between empirical evidence and moral intuition that will drive the story forward. The moment also highlights the exocomps' potential as agents of change, blurring the line between tool and lifeform in a way that complicates the crew's mission and personal beliefs.
