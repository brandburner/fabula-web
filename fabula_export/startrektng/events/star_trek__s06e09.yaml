  title: Riker weighs exocomp sacrifice for rescue
  description: 'With the station''s force field set to collapse in 22 minutes, Riker
    demands solutions to save Picard and Geordi. Farallon proposes repurposing exocomps
    as explosives, reigniting Data''s ethical objections. Riker, desperate but pragmatic,
    overrides Data''s warnings about their potential sentience, authorizing Farallon
    to disable their command pathways to ensure compliance. The scene crystallizes
    the crew''s moral dilemma: the urgency of the crisis forces a brutal calculus
    between saving lives and respecting the rights of artificial beings. Data''s defiance
    underscores the unresolved tension between duty and ethics, while Riker''s decision
    reveals the pressure of command in life-or-death scenarios. The moment serves
    as a turning point, escalating the conflict over the exocomps'' status and foreshadowing
    their later resistance to destruction.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e09
  scene_sequence: 23
  sequence_in_scene: 43
  key_dialogue:
  - 'RIKER: All right, we''ve got twenty-two minutes. I want some options.'
  - 'FARALLON: Commander -- maybe the exocomps can help us. I can program their boridium
    power cells to explode on command. They can be configured just like a photon torpedo...
    but it would only take a few minutes.'
  - 'DATA: Commander, if I am correct, the exocomps will not allow themselves to be
    destroyed. They have a sense of survival, and will shut down before they will
    comply with the order.'
  - 'RIKER: Data, you know how much I value your judgment. But I can''t risk the Captain
    and Geordi on the basis of your ''belief''. Doctor... prepare the exocomps.'
