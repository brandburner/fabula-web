      potential awareness, even if it means challenging authority.
    what_happened: 'Data sits at his station on the bridge, his posture erect and
      his expression inscrutable. As Riker issues the order to deploy the exocomps,
      Data remains silent, his fingers poised over his console. The moment Kelso attempts
      to energize the transporter, Data acts decisively: he locks out the system,
      his movements precise and deliberate. His voice, when he speaks, is calm and
      measured, but the weight of his words is unmistakable. This is the first time
      Data has openly defied a direct order from a superior officer, and the act is
      a clear statement of his belief in the exocomps’ potential sentience. His resolve
      is unwavering, and his emotional state is one of quiet conviction, though he
      does not elaborate on his motivations. The lockout is not just a technical action;
      it is a moral stand, and it forces the crew to confront the ethical implications
      of their mission.'
