      for Starfleet operations.
    - To uphold the chain of command and institutional protocols, even in the face
      of ethical ambiguity.
    influence_mechanisms:
    - Through standardized testing protocols (the simulated overload signal).
    - Through the crew’s internalization of Starfleet’s mission (e.g., Data’s duty
      to follow orders, Beverly’s role as a medical officer bound by ethical guidelines).
    institutional_impact: The exocomp’s sentience exposes a fracture in Starfleet’s
      ability to categorize life and rights, forcing the crew to question whether
      the organization’s policies are morally adequate.
    internal_dynamics: The event highlights the tension between Starfleet’s *operational
      efficiency* (deploying the exocomps) and its *ethical responsibility* (recognizing
      sentience). Data’s insubordination and Beverly’s moral conflict reflect this
      institutional strain.
    global_id: ger_organization_73a4b614bde7
