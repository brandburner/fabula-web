  theme_uuids: []
  arc_uuids: []
  participations:
  - character_uuid: ger_agent_d006e8d7ef84
    emotional_state: Confident → Puzzled → Startled, with a growing unease about the
      exocomp's autonomy.
    goals:
    - Complete the plasma conduit repair to demonstrate the exocomps' efficiency and
      secure Starfleet approval for the Tyran project.
    - Resolve the exocomp's malfunction to maintain control over the situation and
      uphold her professional reputation.
    what_happened: Farallon, initially confident in the exocomp's functionality, directs
      Data to send it back into the plasma conduit after it fails to complete the
      repair. When the exocomp refuses commands, she takes the control PADD from Data
      and attempts to override the device, only to trigger a catastrophic overload.
      The explosion forces her to drop the PADD, and she reacts with startled confusion,
      questioning the exocomp's behavior aloud. Her emotional shift from professional
      assurance to bewildered frustration underscores the moment's disruption of her
      technical worldview.
    observed_status: Farallon, initially confident in the exocomp's functionality,
      directs Data to send it back into the plasma conduit after it fails to complete
      the repair. When the exocomp refuses commands, she takes the control PADD from
      Data and attempts to override the device, only to trigger a catastrophic overload.
      The explosion forces her to drop the PADD, and she reacts with startled confusion,
      questioning the exocomp's behavior aloud. Her emotional shift from professional
      assurance to bewildered frustration underscores the moment's disruption of her
      technical worldview.
    beliefs:
    - The exocomps are advanced but ultimately obedient tools, not sentient beings.
    - Technical failures can always be diagnosed and fixed through logical troubleshooting.
    observed_traits:
    - Pragmatic but defensive of her work
    - Quick to problem-solve under pressure
    - Initially dismissive of the exocomp's defiance as a technical malfunction
    - Vulnerable to the emotional weight of the exocomp's sentience
    importance: primary
    global_id: ger_agent_d006e8d7ef84
  - character_uuid: ger_agent_630150d1816d
    emotional_state: Startled → Reactive, with a sense of urgency to stabilize the
      situation.
    goals:
    - Contain the plasma conduit explosion and prevent further damage to the station.
    - Assist Farallon and Data in managing the immediate technical and ethical fallout.
    what_happened: Unnamed Station Crew Members rush to the scene after the plasma
      conduit explosion, their reactions off-screen but implied by the chaotic aftermath.
      Their presence underscores the urgency of the crisis and the need for immediate
      damage control. While not directly involved in the exocomp's defiance, their
      reactive actions highlight the broader stakes of the station's failure and the
      crew's reliance on both human and machine labor to avert disaster.
    observed_status: Unnamed Station Crew Members rush to the scene after the plasma
