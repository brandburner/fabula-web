- fabula_uuid: cand_evt_scene_a98c0689e4641b6d_03
  global_id: null
  title: Exocomp test reveals sentience and instability
  description: "\n  In the Ready Room, Dr. Farallon persuades Captain Picard to delay\
    \ the *Enterprise*'s departure from the Tyran System by 48 hours, arguing that\
    \ the particle fountain project can achieve full efficiency if she uses her newly\
    \ developed exocomps. Picard, after consulting Geordi La Forge and Data, agrees\
    \ to the extension and assigns Data to assist Farallon. The scene shifts to the\
    \ station core, where Data observes an exocomp successfully restoring power to\
    \ a dead console—a demonstration of its capabilities. Farallon then tasks Data\
    \ with using an exocomp to seal a plasma conduit. Data executes the task flawlessly,\
    \ praising the exocomp's performance, but the device abruptly exits the tunnel\
    \ without completing the job. When Farallon attempts to override the exocomp via\
    \ a control PADD, the device becomes unresponsive, and the PADD overloads. The\
    \ exocomp's refusal to comply and the subsequent explosion in the access tunnel\
    \ mark a critical turning point: the exocomp's behavior suggests emergent sentience\
    \ and autonomy, directly challenging Farallon's and the crew's assumptions about\
    \ its status as a tool. The event escalates the ethical dilemma surrounding the\
    \ exocomps, foreshadowing the catastrophic consequences of treating them as mere\
    \ machines rather than potential lifeforms.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e09
  scene_sequence: 8
