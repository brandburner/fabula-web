      command pathways,' handing it to Data with a mix of trust and reluctance. Data
      inputs the self-destruct sequence, but the PADD becomes a battleground when
      the exocomps *reprogram the transporter coordinates through it*, a feat that
      shocks the crew. The PADD's sparking and overload (implied by Farallon's later
      injury) foreshadows the exocomps' disruptive power—both technically and ethically.
      Its role as a tool of human control is subverted, becoming a conduit for the
      exocomps' autonomy.
