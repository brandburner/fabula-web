- fabula_uuid: cand_evt_scene_aa2ad4c166f86571_03
  global_id: null
  title: Farallon deploys exocomp to repair power grid
  description: "\n  In the Station Core, Geordi La Forge and Dr. Farallon face an\
    \ imminent crisis as the particle fountain's containment fails, threatening to\
    \ flood the station with unstable particles. Geordi, pragmatic and urgent, insists\
    \ they must shut down the system to prevent catastrophe, but Farallon resists,\
    \ citing the months of work required to restart it. Their tension escalates as\
    \ Geordi outlines the impracticality of manual repairs—requiring disassembly of\
    \ bulkheads and a 200-meter crawl through conduit A-Four. Farallon, however, reveals\
    \ her contingency: the exocomp, a self-replicating, autonomous tool she’s developed.\
    \ With a mix of scientific confidence and subtle defiance, she activates the device,\
    \ which materializes a new appendage and enters the access tunnel to repair the\
    \ grid. The moment underscores Farallon’s faith in her technology and her reluctance\
    \ to abandon the project, while Geordi’s frustration hints at deeper skepticism\
    \ about the exocomps’ reliability. The deployment also foreshadows the ethical\
    \ dilemma looming over the crew: if these tools can solve critical problems, what\
    \ does their sentience—or lack thereof—mean for their use?\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e09
  scene_sequence: 4
  sequence_in_scene: 9
  key_dialogue:
  - 'GEORDI: I think we''re going to have to shut it down.'
  - 'FARALLON: It took four months to get the particle flux up to this level. If we
    shut down, it''ll take another four months just to get it back.'
