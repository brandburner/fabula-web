  title: Farallon deploys exocomp to repair grid
  description: "\n  In the Station Core, Geordi La Forge and Dr. Farallon face an\
    \ escalating crisis as the particle stream containment fails, threatening to flood\
    \ the station. Geordi insists on shutting down the particle fountain—a four-month\
    \ restoration project—while Farallon resists, arguing for a technical fix. Their\
    \ tension peaks when Geordi outlines the impracticality of manual repairs, prompting\
    \ Farallon to reveal her experimental solution: an exocomp, a sentient-like mining\
    \ tool Data previously defended. She activates the device, deploying it into the\
    \ access tunnel to repair the power grid remotely. The moment marks the first\
    \ practical use of the exocomps, raising ethical questions about their autonomy\
    \ and the crew’s moral obligations. Farallon’s pragmatic optimism clashes with\
    \ Geordi’s frustration, while the exocomp’s deployment foreshadows deeper conflicts\
    \ over artificial sentience and control.\n  "
