  key_dialogue:
  - 'GEORDI: Doctor Farallon. The original design called for the particle fountain
    to lift five-hundred kilograms per minute from the surface -- so far it hasn''t
    come close to that.'
  - 'FARALLON: That''s why I want to increase the stream density -- that should boost
    the lift capacity by seventy-two percent.'
  - 'GEORDI: Yeah... and overload the field generators in the process.'
  - 'FARALLON: Not if we distribute the overload evenly throughout the system.'
  - 'FARALLON: Commander... I know you''re here to evaluate this project... I want
    to show you something I''ve been working on... something that might help us complete
    this project more quickly.'
