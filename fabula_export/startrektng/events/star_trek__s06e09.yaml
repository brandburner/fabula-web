              Operating on emergency red backup lighting, casting a tense, ominous glow over the Station Core. The flickering lights amplify the sense of urgency and instability, reflecting the crew's desperation.
    status_after_event: |2-

              Fully restored to normal brightness, bathing the Station Core in a steady, white light. The sudden shift is disorienting, signaling the resolution of the immediate crisis but leaving the crew—and the audience—with more questions than answers.
