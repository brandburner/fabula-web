      and chain of command (invoked by Riker) are the institutional frameworks within
      which the ethical debate unfolds. Starfleet’s mission—to seek out new life and
      new civilizations—is implicitly at odds with the crew’s pragmatic choices, creating
      a tension between *exploration* and *expediency*. The organization’s influence
      is felt in Data’s invocation of court martial for insubordination, Riker’s threat
      to relieve Data of duty, and the underlying question: *How far can ethics bend
      without breaking Starfleet’s rules?*'
