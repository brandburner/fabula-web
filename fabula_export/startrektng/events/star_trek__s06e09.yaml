    expectations, their potential to advance this project is considerable."'
  - 'FARALLON: "Send it back in."'
  - 'DATA: "It is not accepting my commands."'
  - 'FARALLON: "Maybe there''s a malfunction in its control processor. Let me see
    if I can override it..."'
