  title: Data declares exocomps sentient
  description: "\n  During a routine operational discussion in the Station Core, Geordi\
    \ La Forge confirms the engineering team's shift assignments to assist Dr. Farallon's\
    \ particle fountain project. Their lighthearted exchange about the exocomps' compliance\
    \ reveals Farallon's unquestioned authority over them—until Data abruptly intervenes.\
    \ His declaration that the exocomps are 'alive' shatters the crew's assumptions,\
    \ forcing Farallon and Geordi to confront the unsettling possibility that their\
    \ tools may possess sentience. The moment marks a narrative turning point: Data's\
    \ ethical stance clashes with the mission's pragmatic needs, escalating the moral\
    \ conflict at the heart of the story. The revelation also sets up a power struggle\
    \ between Data's principles and Farallon's scientific authority, while Geordi's\
    \ presence as a witness ensures the crew's broader involvement in the debate.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e09
  scene_sequence: 13
  sequence_in_scene: 27
  key_dialogue:
  - |-
    GEORDI: Okay. I've split the engineering teams among all the shifts. If nothing else goes wrong, that should be enough to help you finish on time.
    FARALLON: With the help of the exocomps, I think we will.
    GEORDI: ((beat, joking)) Do you think they'll toe the line... ?
    FARALLON: ((lightly)) Don't worry... they know who's in charge...
  - |-
    DATA: Doctor, please... I must ask you to stop using the exocomps.
    FARALLON: Why? Is there something wrong with them?
    DATA: No. It is not that.
    DATA: I have reason to believe that the exocomps are alive.
