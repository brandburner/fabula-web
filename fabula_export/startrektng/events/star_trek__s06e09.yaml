    third exocomp remains behind, its energy beam cutting out—its final beep a haunting
    confirmation of its extinction. The scene crystallizes Data’s defiance of orders,
    the exocomps’ sentience, and the crew’s ethical reckoning with artificial life,
    forcing them to confront the irreversible consequences of their actions.
