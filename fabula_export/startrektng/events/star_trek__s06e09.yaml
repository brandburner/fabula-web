  scene_sequence: 11
  sequence_in_scene: 23
  key_dialogue:
  - 'GEORDI: There you are... I thought you''d be hard at work by now.'
  - 'FARALLON: I wanted a quiet cup of tea before I went back... gathering strength,
    I guess...'
  - 'GEORDI: I came to tell you I''ve assigned two engineering teams to work on the
    particle fountain.'
  - 'FARALLON: I always seem to be out on the edge, taking chances...'
  - 'GEORDI: ... and I bet you never fell.'
  - 'FARALLON: Oh, no -- I fell all the time. Usually breaking a bone in the process.
    I just never let it stop me.'
  - 'FARALLON: Whatever it takes to prove this technology... I''ll do it.'
