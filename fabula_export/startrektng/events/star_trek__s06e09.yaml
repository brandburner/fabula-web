  title: Geordi risks life to save Takenta
  description: As radiation levels spike and evacuation protocols activate, Geordi
    La Forge abandons the transporter pad to locate Takenta, a missing crew member
    near the station's impeller control. Despite Picard's implicit order to prioritize
    his own safety, Geordi's moral imperative drives him into the hazardous environment.
    A secondary explosion leaves Geordi injured and Takenta dead, forcing Picard to
    choose between immediate escape and rescuing his injured engineer. The moment
    underscores Geordi's selfless dedication to crew welfare, while the failed rescue
    heightens the station's deteriorating conditions and the ethical stakes of the
    exocomps' sentience debate—now framed by the cost of human life in the crisis.
