- fabula_uuid: cand_evt_scene_66432f8f669a417a_02
  global_id: null
  title: Picard asserts moral authority over exocomps
  description: In the Observation Lounge, Picard convenes a critical debate over the
    exocomps' potential sentience after Data presents evidence of their self-preservation
    behaviors. Farallon, the exocomps' creator, dismisses the claims as mechanical
    malfunctions, while Beverly and Troi align with Data's ethical stance. Picard,
    recognizing the moral weight of the issue, declares that the exocomps must be
    treated as potential lifeforms until proven otherwise. This decision not only
    resolves the immediate conflict but also establishes Picard's moral leadership
    and sets the stage for empirical testing of the exocomps' sentience. The exchange
    reveals Farallon's utilitarian pragmatism, Data's unwavering ethical consistency,
    and Picard's role as the arbiter of Starfleet's principles, particularly the mission
    to recognize new life forms. Geordi's subsequent suggestion of a survival test
    further escalates the tension, forcing the crew to confront the ethical and philosophical
    stakes of defining life in artificial forms.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e09
  scene_sequence: 14
  sequence_in_scene: 29
  key_dialogue:
  - 'PICARD: Doctor, I appreciate the time constraints you''re under. But recognizing
    new life -- whatever its form -- is the principal mission of this vessel.'
  - 'DATA: Sir, when the exocomp left the access tunnel prior to the explosion, I
    believe it may have been attempting to save itself from destruction.'
  - 'FARALLON: That could have been nothing more than a malfunction... However, two
    hours later, when the exocomp was aboard the Enterprise and no longer in danger...
    it repaired itself.'
  - 'TROI: Doctor, why is it so difficult for you to accept the fact that the exocomp
    could be alive? After all, you''re talking to a living machine right now.'
  - 'PICARD: If the possibility exists... no matter how slight... that the exocomps
    are lifeforms, then we must examine that possibility.'
  - 'DATA: Until we have a definitive answer, I believe that it is inappropriate to
    exploit the exocomps as laborers.'
  - 'PICARD: Clearly these are difficult issues to resolve. We must proceed carefully.
    The first task is to test Mister Data''s hypothesis.'
