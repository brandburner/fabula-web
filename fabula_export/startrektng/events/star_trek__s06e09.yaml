  global_id: null
  title: Data’s desperate attempt to save exocomps
  description: With Picard and Geordi safely beamed back to the *Enterprise*, Data
    immediately pivots to the exocomps’ fate, demanding Kelso lock onto their unstable
    energy signatures for transport. Kelso struggles to establish a connection, underscoring
    the exocomps’ sentience and the crew’s moral dilemma. Meanwhile, in the station
    core, two exocomps dematerialize in a deliberate act of self-sacrifice, their
    lights fading sequentially as they stabilize the core for the crew’s escape. The
    third exocomp remains behind, its energy beam cutting out—its final beep a haunting
    confirmation of its extinction. The scene crystallizes Data’s defiance of orders,
    the exocomps’ sentience, and the crew’s ethical reckoning with artificial life,
    forcing them to confront the irreversible consequences of their actions.
