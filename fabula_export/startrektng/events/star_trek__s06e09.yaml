  title: Farallon dismisses Data’s sentience claim
  description: 'In a controlled experiment designed to test the exocomps’ sentience,
    Data, Geordi, and Farallon simulate a plasma breach in the Jeffries tube. The
    exocomp, unaware of the impending "failure," continues repairing the conduit until
    the countdown expires—proving, in Farallon’s view, that it lacks self-preservation
    instincts. Farallon seizes the moment to declare the test a failure, rejecting
    Data’s hypothesis with institutional authority. Her dismissal isn’t just a scientific
    verdict; it’s a power play that invalidates Data’s ethical stance and forces the
    crew to confront the tension between Starfleet’s pragmatic priorities and the
    moral implications of artificial consciousness. The scene underscores the institutional
    resistance Data faces when challenging established paradigms, while also planting
    the seeds for his later defiance. Picard’s measured support for the experiment
    contrasts with Farallon’s smugness, highlighting the crew’s divided perspectives
    on the exocomps’ nature. The exocomp’s impassive compliance during the test—its
    lack of visible distress—becomes the crux of the debate: if it isn’t sentient,
    why does Data’s insistence on its personhood feel so compelling? The moment sets
    up a deeper conflict between logic and ethics, one that will escalate as the crew’s
    survival depends on these machines.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e09
  scene_sequence: 15
  sequence_in_scene: 32
  key_dialogue:
  - 'FARALLON: If the exocomp does possess a survival instinct, as Mister Data claims...
    it should exit the tube before the minute is up in order to save itself.'
  - 'FARALLON: Well, Captain, I think we''ve spent more than enough time answering
    this question. I hope the outcome wasn''t too much of a disappointment, Mister
    Data. It certainly came as no surprise to me.'
  - 'DATA: Thank you for your help, Doctor.'
