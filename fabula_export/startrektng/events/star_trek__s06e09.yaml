  global_id: null
  title: Picard risks life to recover Geordi
  description: 'After an explosion severs communications and disrupts the station’s
    core, Captain Picard prioritizes the evacuation of Farallon’s team but remains
    behind to locate Geordi, who has gone missing while searching for the injured
    Takenta. The station’s deteriorating core and escalating radiation levels create
    a ticking clock, forcing Picard to make a high-stakes decision: beam out with
    the others or stay to rescue his injured chief engineer. When Picard finds Geordi—bruised
    but alive—near the body of the deceased Takenta, the moment underscores the moral
    urgency of their mission. The exocomps’ potential sentience, Data’s defiance,
    and the crew’s ethical dilemma are all mirrored in this personal crisis: Picard’s
    willingness to sacrifice himself for Geordi reflects the broader struggle to preserve
    life—whether organic or artificial—amid chaos. The scene’s tension lies not just
    in the physical peril but in the unspoken question of whether their efforts to
    save the exocomps are worth the cost of human lives.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e09
  scene_sequence: 19
  sequence_in_scene: 38
  key_dialogue: &id017
  - 'GEORDI: The radiation is setting up a field ionization effect, sir. We''ve got
    less than a minute to beam out.'
  - 'FARALLON: Where''s Takenta? He was over there, near the impeller control.'
  - 'GEORDI: I''ll get him, sir.'
  - 'PICARD: Mister La Forge! Mister La Forge!'
  - 'GEORDI: I''m okay... I only caught the edge of it... He''s dead, sir.'
