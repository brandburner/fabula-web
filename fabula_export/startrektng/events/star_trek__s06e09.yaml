- fabula_uuid: act_dc63e83d566c0daf
  number: 3
  summary: 'Captain Picard convenes a meeting with his senior staff and Dr. Farallon
    to address Data''s assertion that the exocomps are sentient life forms. Data presents
    his evidence: the exocomp''s deliberate self-disabling to avoid the explosion
    and its subsequent self-repair when no longer in danger, arguing this demonstrates
    an awareness of its environment and an ability to adapt. Farallon vehemently opposes
    this, dismissing Data''s claims as anthropomorphization and reiterating her intent
    to use the exocomps as mere tools. Counselor Troi and Doctor Crusher support Data''s
    ethical concerns, highlighting the Enterprise''s mission to recognize new life,
    regardless of its form. Picard, acknowledging the gravity of the ethical dilemma
    and the need for definitive proof, decides to test Data''s hypothesis. Geordi
    proposes a simulated emergency in a Jeffries tube, where the exocomp is sent in
    to make repairs; it must exit before a simulated plasma cascade failure to demonstrate
    a survival instinct. The exocomp, however, remains in the tube past the critical
    moment, seemingly failing the test and vindicating Farallon''s skepticism. A disheartened
    Data continues running trials, confessing to Beverly his profound hope that the
    exocomps represented a ''progenitor'' for him, alleviating his unique solitude.
    During a conversation, Data neglects to retrieve the exocomp, which then emerges,
    having not only completed the repairs but also *deactivated the simulated overload
    signal*, revealing it understood the test was not a real threat. This pivotal
    discovery confirms the exocomps'' advanced intelligence and sentience, fundamentally
    shifting the narrative''s central conflict and validating Data''s initial belief.'
