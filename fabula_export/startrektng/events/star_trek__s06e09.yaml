- fabula_uuid: cand_evt_scene_8271c47e7d6ceb28_01
  global_id: null
  title: Data confronts Picard with moral debt
  description: 'In the Enterprise’s ready room, Data deliberately stays behind after
    Dr. Farallon’s departure to address Picard privately. He frames his defiance of
    orders—risking Picard’s life to protect the exocomps—as a direct moral extension
    of Picard’s past advocacy for Data’s own rights as a sentient being. The exchange
    forces Picard to confront the weight of his earlier actions, now weaponized by
    Data as an ethical obligation. Farallon’s exit leaves the two alone, creating
    an intimate space for Data to articulate his reasoning, which Picard receives
    with quiet acknowledgment. The moment underscores the crew’s fractured ethics
    over artificial sentience and positions Data’s defiance as a deliberate, principled
    act rather than insubordination. The scene also serves as a thematic bridge, tying
    Picard’s past to the present crisis and reinforcing the narrative’s central question:
    *Who gets to define life?*'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e09
  scene_sequence: 29
  sequence_in_scene: 54
  key_dialogue:
  - 'FARALLON: I must admit you''ve given me a lot to think about, Commander Data...
    I''m not exactly sure what the exocomps are... but you can be assured that until
    I do, I won''t be treating them as simple tools.'
  - 'DATA: I wish your work on the particle fountain had been more successful... perhaps
    the exocomps will be able to help you to reconstruct it.'
  - 'PICARD: I think I understand the predicament you were in. It cannot have been
    an easy choice.'
  - 'DATA: No, sir. It was not. Several years ago, when my status as a living being
    was in question, you fought to protect my rights—and for that, I will always be
    grateful. The exocomps had no such advocate, sir. If I had not acted in their
    behalf, they would have been destroyed. I could not allow that to happen.'
