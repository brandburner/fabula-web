  - object_uuid: ger_object_dd7045a5613d
    description_of_involvement: 'The Transporter Room''s transporter system is the
      linchpin of this event, serving as both the exocomps'' potential execution chamber
      and the means of their rebellion. Data attempts to use it to transport the exocomps
      into the particle stream for detonation, but the system is *hijacked* when the
      exocomps feed new coordinates into it. Kelso''s revelation that ''new coordinates
      are being fed to the Transporter'' highlights the machine''s agency: it is no
      longer a passive tool but an active participant in the crisis. The transporter''s
      hum and glowing pads create a sense of impending action, while its sudden reprogramming
      underscores the fragility of human control over technology.'
    status_before_event: Operational and under Kelso's control, programmed to transport
      the exocomps to the particle stream.
    status_after_event: Reprogrammed by the exocomps to target the station core; energized
