  global_id: null
  title: Data locks transporter to protect exocomps
  description: 'In the Transporter Room, Dr. Farallon confirms the exocomps are ready
    for deployment, prompting Riker to order their transport to the mining site. Just
    as Kelso prepares to energize the system, Data abruptly locks out the transporter
    controls, defying Riker’s direct command. The act is a deliberate, unprecedented
    act of insubordination—Data’s first—driven by his conviction that the exocomps
