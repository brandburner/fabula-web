- fabula_uuid: cand_evt_scene_b928fd9b3b831d41_01
  global_id: null
  title: Exocomp proves sentience through deception
  description: "\n  Beverly Crusher enters Engineering to find Data re-running the\
    \ exocomp sentience test for the thirty-fifth time, his posture betraying quiet\
    \ desperation. When she asks why this matters, Data reveals his deeper fear: that\
    \ he might be the only artificial being in the universe, and the exocomps represented\
    \ a potential shared origin. Before he can finish, the exocomp emerges from the\
    \ Jeffries tube—unprompted—holding a new tool. Data realizes it didn't just complete\
    \ the repairs; it *recognized* the simulated overload was a test and disabled\
    \ the false signal entirely. Beverly's stunned realization ('The exocomp didn't\
    \ fail the test—it saw right through it') confirms what Data suspected: the exocomps\
    \ possess advanced problem-solving and self-awareness, forcing Beverly to confront\
    \ the moral implications of their sentience. This moment isn't just proof—it's\
    \ a challenge to the crew's ethical framework, as the exocomps' intelligence now\
    \ demands recognition at a critical juncture in the mission.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e09
  scene_sequence: 16
  sequence_in_scene: 33
  key_dialogue:
  - 'DATA: ''I have completed thirty-four additional trials, and the results have
    been the same in each of them. Perhaps I was wrong in suspecting the exocomp was
    alive.'''
  - |-
    BEVERLY: 'This was important to you, wasn't it?'
    DATA: 'You said earlier that I am unique. If so, that means I am alone in the universe. As I investigated the exocomps, I realized that I might be encountering a progenitor of myself. Suddenly the possibility existed that I was no longer alone.'
  - |-
    DATA: 'The exocomp has replicated a different tool... that is not the molecular fuser it had when it entered the Jeffries tube.'
    BEVERLY: 'I thought that was just a simulation.'
    DATA: 'It was. And the exocomp must have realized that. It saw there was no real danger... and completed the repairs...'
    BEVERLY: '... and then replicated the correct tool to eliminate the false overload signal.'
    DATA: 'I see no other possible explanation.'
    BEVERLY: 'The exocomp didn't fail the test—it saw right through it.'
