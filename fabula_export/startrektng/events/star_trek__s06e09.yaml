  object_involvements:
  - object_uuid: ger_object_67ce94ddc5fe
    description_of_involvement: 'The particle fountain core, the heart of the station’s
      operations, pulses ominously as Geordi and Farallon argue over its schematics.
      Its glow is both a promise and a warning—proof of its power, but also of its
      instability. When the tremor hits, the fountain’s energy spikes violently, its
      core flickering like a dying star. The tremor is not just a structural failure
      but a rejection of the fountain’s flawed design, a physical manifestation of
      the ethical and technical dilemmas at play. The core’s instability mirrors the
      crew’s: pushed to the limit, on the brink of collapse, and in desperate need
      of intervention. It is the station’s Achilles’ heel, and the tremor is the arrow
      that finds its mark.'
    status_before_event: Glowing but unstable, its energy readings fluctuating. The
      core is the focal point of the debate, its power both a solution and a liability.
    status_after_event: Flickering erratically, its energy spiking as the tremor confirms
      the fountain’s critical failure. The core is now a ticking time bomb, its instability
      undeniable.
    global_id: ger_object_67ce94ddc5fe
  - object_uuid: ger_object_c9b395cbd8c5
    description_of_involvement: 'Dr. Farallon’s equipment locker, containing her untested
      exocomps, becomes a symbol of her desperation—and the project’s recklessness.
      She moves toward it just as the tremor hits, her hand outstretched as if to
      grasp a lifeline. The locker’s contents remain unseen, but its presence looms
      large: a gamble that might save the project or doom it further. The tremor halts
      her mid-motion, the exocomps’ potential left untested, their fate (and the station’s)
      hanging in the balance. The locker is a metaphor for Farallon herself—locked
      in a cycle of ambition and exhaustion, her solutions as unstable as the station
      around her.'
    status_before_event: Closed and secure, containing the untested exocomps. Farallon
      is about to open it when the tremor interrupts.
    status_after_event: Remains closed, the exocomps’ potential left unresolved. The
      tremor’s timing feels like a judgment on Farallon’s untested solutions.
    global_id: ger_object_c9b395cbd8c5
  - object_uuid: ger_object_c88368b63940
    description_of_involvement: 'The exocomps, though unseen, cast a long shadow over
      the event. Farallon’s mention of them—her desperation to unveil them as a solution—hints
      at their symbolic weight: untested, risky, and potentially the key to saving
      the project or accelerating its downfall. The tremor interrupts her reveal,
      leaving their fate (and the station’s) in limbo. The exocomps are not just tools
      but a metaphor for the crew’s choices: do they double down on unproven solutions,
      or do they accept the consequences of their ambition? Their absence in the moment
      is as loud as their potential presence would have been, a ghost haunting the
      Station Core.'
    status_before_event: Contained within the equipment locker, untested and unseen.
      Farallon is about to introduce them as a solution.
    status_after_event: Still unseen, their potential left unresolved. The tremor’s
      timing feels like a judgment on Farallon’s recklessness.
    global_id: ger_object_c88368b63940
  - object_uuid: ger_object_9067d1e18d9e
    description_of_involvement: The Okudagram of the particle fountain serves as a
      visual battleground for Geordi and Farallon’s debate, its flickering schematics
      and fluctuating metrics (lift capacity, stream density) embodying the project’s
      instability. Geordi gestures sharply at the display, highlighting the gap between
      the original design’s promises and its current performance, while Farallon defends
      her proposed adjustments. When the tremor hits, the Okudagram’s data spikes
      erratically, the numbers reflecting the fountain’s overload—a silent but damning
      indictment of Farallon’s untested solutions. The monitor becomes a ticking clock,
      its warnings ignored until the station itself forces their attention.
    status_before_event: Functioning but displaying erratic performance data, with
      lift capacity far below the 500 kg/min target and stream density readings fluctuating
      unpredictably.
    status_after_event: Data spikes erratically during the tremor, alarms blaring
      as the readouts confirm the particle fountain’s critical failure. The display
      remains active but now serves as a visual confirmation of the crisis.
    global_id: ger_object_9067d1e18d9e
  - object_uuid: ger_object_e193de9783a5
    description_of_involvement: 'The station’s alarm klaxons are the voice of the
      crisis, their piercing wail cutting through Geordi and Farallon’s debate like
      a blade. The alarms are not just a warning but a verdict: the station is failing,
      and their arguments are irrelevant in the face of this mechanical truth. The
      klaxons sync with the tremors, their rhythm a countdown to disaster. They force
      the crew to confront what they’ve been ignoring—the particle fountain’s instability,
      the exocomps’ untested nature, the ethical questions Data’s defiance has raised.
      The alarms are the station’s way of saying, *‘Enough.’*'
    status_before_event: Silent, though the tension in the air suggests they are primed
      to sound.
    status_after_event: Blaring continuously, their wail drowning out all other noise.
      The alarms are now the dominant force in the Station Core, their urgency inescapable.
    global_id: ger_object_e193de9783a5
  - object_uuid: ger_object_eb238f2765ec
    description_of_involvement: 'The scattered equipment consoles in the Station Core
      are the nerve center of the crisis, their screens flashing warnings as Geordi
      and Farallon rush to check the readouts. The consoles’ alarms pierce the air,
      their urgent beeps syncing with the station’s tremors—a symphony of mechanical
      distress. Farallon’s fingers hover over the controls, her earlier confidence
      faltering as the data confirms her adjustments have backfired. The consoles
      are not just tools but witnesses to the project’s unraveling, their warnings
      ignored until the tremor forces a reckoning. Their state mirrors the crew’s:
      overwhelmed, reactive, and on the brink of failure.'
    status_before_event: Active but stable, displaying standard operational data with
      occasional glitches. Alarms are silent, though the tension in the air suggests
      impending issues.
    status_after_event: Alarms blare continuously, screens flash red with overload
      warnings, and the consoles’ readouts confirm the particle fountain’s critical
      failure. The equipment is now a liability, its data useless in the face of the
      tremor’s immediate threat.
    global_id: ger_object_eb238f2765ec
  - object_uuid: ger_object_cf5ee215707b
    description_of_involvement: 'The wall-mounted readout panel becomes the epicenter
