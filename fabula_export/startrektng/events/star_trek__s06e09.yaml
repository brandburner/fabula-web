  title: Data questions exocomps' emergent learning
  description: "\n  In Engineering, Dr. Farallon demonstrates the exocomp—a self-improving\
    \ industrial tool with axionic neural networks—by having it solve an anti-matter\
    \ converter repair problem. The device autonomously replicates a mode stabilizer\
    \ and adapts its internal circuitry, revealing its capacity for adaptive learning.\
    \ Data, intrigued, presses Farallon on the implications of this behavior, noting\
    \ that the exocomps appear to 'learn' by building new circuit pathways. Geordi\
    \ acknowledges the technology’s sophistication but remains focused on its practical\
    \ applications, while Farallon subtly shifts the conversation toward securing\
    \ Picard’s approval for her project. The exchange plants the seed for Data’s later\
    \ moral crisis: if the exocomps can adapt and improve, do they qualify as sentient\
    \ beings rather than tools? The moment also foreshadows Farallon’s urgency to\
    \ move beyond experimentation, hinting at her hidden agenda for the particle fountain\
    \ project.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e09
  scene_sequence: 7
  sequence_in_scene: 14
  key_dialogue:
  - 'FARALLON: We''ve been using devices like this on Tyrus Seven for years... the
    basic unit is a common industrial servo-mechanism. A few years ago... I started
    tinkering with one... this is the result.'
  - 'DATA: Exocomps... ?'
  - 'FARALLON: That''s what I call them.'
  - 'DATA: You have incorporated a micro-replication system into the device... in
    order to fashion tools.'
  - 'FARALLON: It''s more than that. I designed the exocomps to be problem solvers.
    Whenever they perform a task they''ve never done before, the micro-replicator
    creates new circuit pathways within the unit''s memory.'
  - 'DATA: So... in a sense, they are learning.'
  - 'FARALLON: Exactly. The more situations they encounter, the more circuit pathways
    they build. They become better tools as they work.'
