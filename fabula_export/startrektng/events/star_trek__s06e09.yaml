  title: Data questions exocomp sentience after Geordi’s remark
  description: "\n  In Engineering, Geordi La Forge and Data analyze a malfunctioning\
    \ exocomp alongside Dr. Farallon, who dismisses its corrupted circuitry as a routine\
    \ failure. After Farallon leaves, Geordi casually jokes that the exocomp 'knew\
    \ just when to leave'—a remark that triggers Data’s first explicit consideration\
    \ of the unit’s potential sentience. Data, previously focused on technical diagnostics,\
    \ now fixates on the idea of self-preservation, his expression shifting from analytical\
    \ curiosity to quiet introspection. The moment marks a narrative pivot: Data’s\
    \ initial technical inquiry evolves into a deeper, ethical confrontation with\
    \ the nature of artificial consciousness. His decision to take the exocomp with\
    \ him for further study signals the beginning of his personal and philosophical\
    \ investigation into sentience, setting up his eventual defiance of orders to\
    \ protect the exocomps. The exchange also underscores Geordi’s role as an unwitting\
    \ catalyst, his offhand comment planting the seed of doubt that will drive Data’s\
    \ arc forward.\n  "
