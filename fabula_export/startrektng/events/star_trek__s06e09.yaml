acts:
- fabula_uuid: act_c3b6334ecc616962
  number: 1
  summary: The Enterprise arrives at Tyrus-Seven-A, where Commander Geordi La Forge
    evaluates Dr. Farallon's particle fountain mining project, which is behind schedule
    and plagued by malfunctions. During a power grid malfunction, Farallon introduces
    her innovative 'exocomps,' small, problem-solving devices capable of micro-replication
    and learning. An exocomp successfully repairs the grid, piquing Data's interest
    due to its unusual speed and efficiency. Data later meets Farallon, who elaborates
    on the exocomps' advanced learning capabilities, explaining how they create new
    circuit pathways and become better tools with each new situation, further impressing
    Data. Farallon convinces Captain Picard to extend the Enterprise's stay to allow
    for further exocomp deployment, with Data assigned to assist her in the project.
    While working with Data, an exocomp fails to seal a plasma conduit and emerges
    from the tunnel, becoming unresponsive after Farallon attempts to override its
    commands. This leads to Farallon's control PADD overloading and a subsequent explosion
    in the access tunnel where the exocomp was working. This event marks the first
    hint of the exocomps' unusual behavior, setting the stage for Data's investigation
    into their potential sentience and introducing the central conflict of the episode
    regarding the definition of life and the rights of artificial beings. The initial
    setup establishes the project's difficulties, introduces the exocomps, and presents
    the first anomaly that challenges their classification as mere tools.
  key_moments: []
  scene_numbers:
