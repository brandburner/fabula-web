- fabula_uuid: act_bc7513b7ed3830bb
  number: 3
  summary: Data discusses his escalating experiences with Counselor Troi, explaining
    how elements from his nightmares, including sounds, objects, and smells, are now
    bleeding into his waking reality. He reviews various dream analysis theories,
    from prophetic functions to random neural discharges, noting their inability to
    fully explain his situation. Data contemplates Freud's theory, questioning if
    the dream knife symbolizes an unconscious desire to inflict violence. Troi dismisses
    many of these theories as flawed and obsolete, instead proposing that Data might
    be developing a neurosis as his neural net grows more complex and 'human.' Data,
    intrigued and hopeful by this possibility, agrees to regular counseling sessions
    and, as a safety measure, agrees to shut down his dream program. Meanwhile, Picard,
    still stranded, faces renewed pressure from Admiral Nakamura regarding the banquet,
    but maintains his confidence in his engineering staff. In Engineering, Picard's
    attempts to assist are subtly redirected by Geordi, who is relieved when Ensign
    Tyler distracts the Captain. Geordi then realizes Data has vanished from Engineering.
    Data, having left Engineering, confronts Troi in a turbolift. Holding the coil
    brace, which resembles the dream knife, Data calmly apologizes to Troi before
    stabbing her in the shoulder, causing her to cry out in pain as the turbolift
    doors close.
