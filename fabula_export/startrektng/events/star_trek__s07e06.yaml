  title: Picard confines Data after violent episode
  description: 'In the Observation Lounge, Data—now lucid but visibly unsettled—reveals
    his latest waking hallucination: a violent compulsion to ''eliminate'' a parasitic
    ''mouth'' he saw on Troi’s shoulder, along with a ''straw'' protruding from Riker’s
    head. Picard, Riker, and Geordi interrogate him, but Data offers no rational explanation,
    only that the visions mirror his earlier dream program. Geordi confirms diagnostics
    reveal no hardware malfunction, leaving the crew baffled. Picard, weighing crew
    safety over Data’s autonomy, reluctantly relieves him of duty and orders his confinement
    to quarters. The decision fractures trust among the senior officers, as Data’s
    compliance contrasts with the escalating, unexplained threat—now manifesting physically
    in Troi’s injury and the ship’s growing instability. The scene underscores Picard’s
    leadership dilemma: balancing compassion for his officer against the need to contain
    an unknown danger that may already be spreading.'
