    RIKER: Aren't you going to answer that, Mister Data?
    DATA: Sir?
    RIKER: That damn ringing. Answer it, will you?
  - |-
    TROI: Data, please... don't hurt me...
    DATA: I am sorry, Counselor.
    TROI: No...
    DATA: I am sorry, Counselor.
