- fabula_uuid: act_94b312e5ab03e536
  number: 4
  summary: 'Riker and Worf discover a shocking scene in the turbolift: Troi lies unconscious
    and bleeding from a shoulder wound, with Data standing over her, holding the coil
    brace. Data immediately attacks Riker, swinging the brace, but Worf quickly subdues
    him. Data, suddenly lucid, drops the brace and expresses confusion, realizing
    what he has done. Riker calls for medical assistance for Troi. In the Observation
    Lounge, Data explains his actions, stating he experienced another waking dream
    where he saw a ''mouth'' on Troi''s shoulder and a ''straw'' on Riker''s head,
    feeling an uncontrollable urge to ''eliminate'' these perceived threats. He confirms
    he had shut down his dream program, deepening the mystery. Picard, despite Data''s
    explanation, relieves him of duty and confines him to quarters as a sensible precaution.
    In Sickbay, Dr. Crusher examines Troi''s wound, discovering a strange, mottled
    red discoloration and cellular degradation. Using an interphasic scanner, Beverly
    reveals a previously unseen, leech-like creature latched onto Troi''s skin. Further
    scans reveal similar creatures infesting Beverly, Riker, and Picard, confirming
    a widespread, interphasic infestation. Data, confined to his quarters, entrusts
    Worf with the care of his cat, Spot, expressing fear that he might harm the animal
    during another uncontrollable waking dream, underscoring his deep distress and
    the danger he poses.'
