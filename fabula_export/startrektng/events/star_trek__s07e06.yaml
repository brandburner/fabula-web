  - 'BEVERLY: I''m picking up cellular degradation. But I don''t think it''s related
    to the lacerations... And there''s some kind of residual interphasic signature...'
  - 'BEVERLY: Nurse, get me an interphasic scanner... I want to take a closer look.'
