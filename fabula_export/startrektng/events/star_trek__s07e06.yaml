    description_of_involvement: 'Beverly Crusher’s interphasic scanner is the narrative
      and functional linchpin of this event. Initially used to diagnose Troi’s discoloration,
      it becomes the tool that exposes the horrifying truth: the crew is already infected.
      The scanner’s blue light acts as a reveal, stripping away the parasites’ invisibility
      and forcing the crew to confront their vulnerability. Its role is twofold—diagnostic
      and symbolic—illuminating not just the parasites, but the fragility of the *Enterprise*’s
      defenses. The device’s effectiveness is temporary; it reveals the threat but
      does not yet offer a solution, leaving the crew in a state of stunned inaction.'
    status_before_event: Stored in Sickbay, unused but available for emergency diagnostics.
      Its interphasic capabilities were not yet known to the crew as a critical tool.
    status_after_event: Still in Beverly’s possession, now proven effective at detecting
      the parasites—but its limitations (e.g., inability to remove them) are glaring.
      The crew will likely rely on it for further scans, but its role as a *solution*
      remains untested.
    global_id: ger_object_0e28077da6b1
  - object_uuid: ger_object_1aa289bb8127
    description_of_involvement: 'The leech-like interphasic parasites are the antagonist
      of this moment, their revelation a narrative gut-punch. They are not just physical
      threats but *metaphorical*—embodiments of the unseen dangers lurking in the
      *Enterprise*’s systems and the crew’s subconscious. Their tendrils, buried in
      tissue, symbolize the infestation’s insidious nature: it has already taken root,
      and removal will be painful. The parasites’ design (leeches) evokes primal fears
      of invasion and loss of control, reinforcing the crew’s helplessness. Their
      interphasic nature hints at a larger, dimensional threat that the crew is only
      beginning to understand.'
    status_before_event: Latent and invisible, embedded in the crew’s tissue. Their
      presence was unknown, their effects masked as rashes or fatigue.
    status_after_event: Exposed but still active. The crew now knows they are infected,
      but the parasites remain attached, their full capabilities (e.g., dimensional
      siphoning, emotional manipulation) yet to be revealed. Their status is ‘dormant
      but dangerous.’
    global_id: ger_object_1aa289bb8127
