  title: Troi diagnoses Data’s dream obsession
  description: 'In Troi’s office, Data arrives visibly unsettled, clutching a coil
    brace and confessing that his nightmares—once confined to his subroutines—are
    now bleeding into waking reality, manifesting as hallucinations and triggering
    violent impulses. He reveals he has obsessively researched 138 dream theories,
    fixating on Freud’s interpretation of the recurring knife symbol as a latent desire
    for violence. Troi challenges his self-diagnosis, dismissing Freud’s outdated
    framework and suggesting his fixation on the dreams may itself be a form of neurosis—a
    psychological complexity emerging as his neural net grows more humanlike. She
    offers weekly counseling sessions but insists he shut down his dream program immediately
    to prevent further destabilization, both for his own systems and the *Enterprise*’s
    safety. Data, initially resistant, becomes intrigued by the possibility of human-like
    psychological struggles, agreeing to her terms with cautious optimism. The exchange
    underscores the tension between Data’s logical pursuit of answers and Troi’s empathetic
    but firm intervention, framing his dreams as a potential threat to the ship’s
    integrity. The scene serves as a turning point: Data’s internal conflict becomes
    externalized, shifting the narrative from personal introspection to a crew-wide
    crisis as his hallucinations foreshadow the interphasic infestation.'
