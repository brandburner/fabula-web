  - 'TROI: Data... if you were one of my human patients, I might be concerned right
    now. I''d say you had a waking dream... or a hallucination... But you''re not
    human. It seems to me that we might be looking at some sort of technological problem...'
  - 'DATA: Perhaps Freud was correct... and the knife I dreamed of is the embodiment
    of my unconscious desire to inflict violence.'
  - 'TROI: Data... even Freud said ''sometimes a cigar is just a cigar.'' A lot of
    the theories you''ve examined are interesting... but they''re also flawed and
    obsolete. That knife could just as well be an archetypal symbol of rational clarity
    -- it''s sharp... it cuts through things that are dull... The bottom line is...
    I think you may be developing an almost... obsessive interest in your own inner-workings.
    I''d almost call it the beginnings of a... neurosis.'
  - 'TROI: As a first step, I want you to shut down your dream program until our next
    session... just to be safe. Give yourself a chance to reflect on this experience.'
