    Maybe it was designed to cause some side-effects... For all we know, Doctor Soong
    intended for you to oversleep now and then... as part of the human experience."'
  - 'DATA: "I have not fully assimilated its impact. I would prefer to study the images
    further before discussing them."'
  - 'GEORDI: "Sure... I understand. Sounds like it must''ve been pretty strange..."'
  - 'DATA: "''Strange'' is not a sufficient adjective to describe the experience."'
