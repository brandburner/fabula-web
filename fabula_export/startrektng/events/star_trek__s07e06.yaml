  title: Data’s Hallucination Triggered by Coil Brace
  description: 'In Engineering, Ensign Tyler playfully initiates physical closeness
    with Geordi while retrieving a tool, subtly signaling her romantic interest. Data
    observes the interaction with quiet amusement, prompting Geordi to deflect by
    requesting assistance with a coil brace—a sharp-edged object that immediately
    triggers Data’s waking hallucination. As Data examines the brace, its resemblance
    to the knife from his recurring nightmare unsettles him. His perception distorts:
    Geordi’s neck sprouts a hissing animal mouth, the room empties, and Riker appears
    with a straw embedded in his temple, demanding Data answer a ringing telephone
    embedded in his abdomen. A disembodied voice (posing as Freud) commands Data to
    ''kill them all,'' reinforcing the interphasic threat’s psychological manipulation.
    The hallucination ends abruptly when Geordi touches Data’s arm, restoring reality—but
    the episode underscores the escalating danger of Data’s subconscious visions and
    the unseen interphasic infestation. The scene bridges interpersonal dynamics (Tyler’s
    flirtation, Geordi’s discomfort) with the looming supernatural threat, foreshadowing
    Data’s role in confronting the entity.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e06
  scene_sequence: 16
  sequence_in_scene: 23
  key_dialogue:
  - 'DATA: Ensign Tyler still appears to have a ''crush'' on you, Geordi. It is clear
    that you did not speak with her.'
  - 'GEORDI: I haven''t had a chance, Data... Here. Give me a hand with this coil
    brace.'
  - 'FREUD: Kill them. You must kill them all... before it''s too late.'
