- fabula_uuid: cand_evt_scene_82343df37ddedaf3_03
  global_id: null
  title: Data’s Compulsion Leads to Ten Forward
  description: "\n  Data, under the influence of his nightmarish compulsion, abruptly\
    \ exits the corridor and enters *Ten Forward*, with Picard and Geordi following\
    \ in pursuit. The shift from the sterile, functional corridor to the ship’s social\
    \ hub—where crew interactions are typically unguarded—heightens the tension, as\
    \ the dream’s influence now visibly alters Data’s behavior in a space where his\
    \ actions could have immediate, unpredictable consequences. The ringing sound,\
    \ a recurring auditory hallucination, triggers Data’s pain response, reinforcing\
    \ the escalating threat of the interphasic intrusion. Picard and Geordi, now fully\
    \ aware that Data’s dreams are bleeding into reality, follow him into *Ten Forward*,\
    \ where the stakes of the unfolding crisis will become even more visceral. This\
    \ moment marks a critical escalation: the nightmares are no longer confined to\
    \ Data’s subconscious but are actively directing his actions in the physical world,\
    \ foreshadowing the interphasic threat’s growing control over the ship and its\
    \ crew.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e06
  scene_sequence: 30
  sequence_in_scene: 47
  key_dialogue: &id013
  - 'PICARD: Keep your eyes peeled. Even an apparently insignificant image could be
    an important symbol.'
  - 'GEORDI: He should be perceiving us as just another part of his dream. Anything
    we say to him will be taken in that context...'
  - 'PICARD: That sounds like a telephone ringer...'
