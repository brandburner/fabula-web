  title: Data attacks Troi in the turbolift
  description: "\n  In the turbolift, Deanna Troi calls for Deck 36 as the doors begin\
    \ to close. Data abruptly forces his way in, his demeanor immediately unsettling—he\
    \ ignores Troi’s greeting and stares blankly ahead. When she asks if he’s all\
    \ right, he remains silent, then turns his gaze to her right shoulder with unnerving\
    \ fixation. Troi notices the coil brace in his hand and questions his actions,\
    \ but Data responds with eerie calm: 'I am sorry, Counselor.' Before she can react,\
    \ he stabs the brace into her shoulder, causing her to cry out in pain. As she\
    \ falls back, Data advances toward her with the brace again, his face expressionless,\
    \ before the scene fades out. This moment marks the catastrophic manifestation\
    \ of Data’s interphasic corruption in the physical world, signaling the crew’s\
    \ immediate peril and the escalation of the interphasic threat from hallucination\
    \ to violent reality. The attack also foreshadows the broader infestation of the\
    \ *Enterprise* and the crew’s desperate need to uncover the source of the threat\
    \ before it consumes them entirely.\n  "
