  title: Troi senses unseen presence in corridor
  description: Deanna Troi, alone in the *Enterprise*’s corridor, abruptly stops mid-stride
    as an acute, unshakable sensation of being watched overwhelms her. She turns sharply,
    scanning the empty hallway behind her—her Betazoid senses detecting something
    intangible yet undeniably *there*. The moment lingers with palpable unease, her
    body tensing as she searches for the source, only to find nothing. After a beat
    of hesitation, she shakes off the feeling with a subtle shrug and continues toward
    the turbolift, though the encounter leaves a lingering disquiet. This moment subtly
    foreshadows the interphasic threat’s growing intrusion into the ship’s reality,
    where Data’s nightmares are beginning to bleed into the physical world. The scene
    establishes Troi as a key early indicator of the unseen danger, her empathic sensitivity
    making her the first crew member to register the threat’s presence—even if she
    cannot yet name it.
