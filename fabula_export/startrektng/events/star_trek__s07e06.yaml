  title: Interphasic infestation exposed in Sickbay
  description: "\n  Beverly Crusher’s urgent examination of Deanna Troi’s worsening\
    \ shoulder discoloration reveals a leech-like interphasic parasite embedded in\
    \ her tissue, confirming the infestation is not a rash but a systemic threat.\
    \ Using an interphasic scanner, Beverly exposes the creature’s presence—first\
    \ on Troi, then on herself, and finally on Picard and Riker, who enter mid-diagnosis.\
    \ The discovery escalates the crisis: the parasites, previously unseen, have already\
    \ spread to the senior crew, including the captain and first officer. The revelation\
    \ forces the crew to confront the severity of the infestation, which now threatens\
    \ the ship’s leadership and undermines their ability to respond. The moment shifts\
    \ from medical curiosity to existential dread as the crew realizes Data’s nightmares\
    \ were not hallucinations but a warning of a physical, ship-wide invasion. Beverly’s\
    \ clinical urgency contrasts with the crew’s stunned silence, underscoring the\
    \ infestation’s insidious nature—it has already infiltrated the Enterprise’s core\
    \ command structure, leaving no time for hesitation or denial.\n  "
