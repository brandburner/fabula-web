acts:
- fabula_uuid: act_44b4b9561e8c370a
  number: 1
  summary: Data experiences his first nightmare, a disturbing vision of workmen dismantling
    a warp plasma conduit and tearing him apart, which he dismisses upon waking. The
    Enterprise prepares to test its new warp core, a process delayed by Captain Picard's
    reluctance to attend an annual Starfleet Admiral's banquet. Data confides in Geordi
    about his nightmare, but Geordi attributes it to normal dream processes. The initial
    warp core test fails, causing a ship-wide power outage and further delaying Picard.
    Counselor Troi encourages Data to explore his dreams as a natural expression of
    his unconscious mind. Data then initiates another dream sequence, entering a surreal
    Ten Forward. In this dream, Worf eats 'cellular peptide cake,' Riker has a straw
    in his head, and the ominous ringing sound returns. Data encounters the workmen
    again, who force him to cut a piece of 'cellular peptide cake' from Troi's torso,
    which has transformed into a cake. Troi screams in pain. Data wakes abruptly,
    finding Troi, Geordi, and Worf attempting to rouse him, realizing he has inexplicably
    overslept. He concludes that something is profoundly wrong, as such an occurrence
    is impossible for an android.
