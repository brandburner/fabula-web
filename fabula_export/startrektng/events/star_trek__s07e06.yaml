  title: Picard’s dread of the banquet
  description: "\n  Picard enters the bridge visibly troubled, his usual composure\
    \ fractured by a Starfleet command message. His voiceover log—formally noting\
    \ the warp core’s completion—contrasts sharply with his slumped posture and grim\
    \ expression as he reveals the true source of his unease: an invitation to the\
    \ annual Starfleet Admiral’s banquet. The event triggers a rare moment of vulnerability,\
    \ exposing his deep aversion to bureaucratic performativity. Riker’s playful suggestion\
    \ of a ‘diplomatic crisis’ as an escape underscores the tension between Picard’s\
    \ duty and his personal disdain for Starfleet’s rituals, revealing a subtle fracture\
    \ in his leadership facade. The exchange highlights Picard’s internal conflict:\
    \ his obligation to uphold Starfleet’s expectations clashes with his growing disillusionment,\
