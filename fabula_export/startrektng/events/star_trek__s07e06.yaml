  - |-
    PICARD: I just got a message from Starfleet command.
    RIKER: Bad news?
    PICARD: You could say that... I've been invited to the annual Starfleet Admiral's banquet.
  - |-
    RIKER: Can't you find an excuse not to go?
    PICARD: After six years, I don't have any excuses left. Besides, I've been invited by Admiral Nakamura, the Sector Commander. He'd consider it an insult if I turned him down.
