  title: Data’s violent dismemberment by interphasic intruders
  description: 'Data investigates unauthorized workmen tampering with a warp plasma
    conduit, but his confrontation triggers a sudden, brutal assault. The workmen—cold
    and expressionless—ignore his repeated warnings, their silence escalating the
    tension. When Data attempts to speak, a high-pitched shriek erupts from him, startling
    even himself. The workmen react violently, converging on him with terrifying efficiency.
    One seizes his arm and tears it from its socket, initiating a grotesque dismemberment:
    limbs are wrenched free, metal and fabric rip apart, and Data’s head is separated
    from his body. The attack is swift, methodical, and horrifying, underscoring the
    interphasic threat’s physical and existential danger. This violent escalation
    marks a turning point in Data’s understanding of the threat’s nature, as the attack
    mirrors the nightmares that have been plaguing him. The shriek and the workmen’s
    sudden aggression suggest a deeper, otherworldly connection to the ship’s growing
    instability, forcing Data to confront the reality that his dreams are not mere
    hallucinations but warnings of a tangible, destructive force.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e06
  scene_sequence: 2
  sequence_in_scene: 2
  key_dialogue:
  - 'DATA: Excuse me. Do you have authorization to work in this area?'
  - 'DATA: You are dismantling a warp plasma conduit. I must ask you to stop.'
  - 'WORKMAN: Be quiet!'
