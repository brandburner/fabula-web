  title: Data’s forced mutilation of Troi’s dream body
  description: "\n  In a nightmarish, dreamlike sequence, Data is compelled by unseen\
    \ forces to violently mutilate Counselor Troi’s dismembered body, which lies on\
    \ a table with her legs missing and her torso transformed into a grotesque cake.\
    \ The Three Workmen—recurring symbols of the interphasic threat—hand Data an oversized\
    \ knife and force him to cut into Troi’s cake-like torso, despite her terrified\
    \ pleas. The act is not voluntary; Data resists at first but is ultimately driven\
    \ by the dream’s logic, his android nature, and the unseen threat’s manipulation\
    \ of his subconscious. The scene escalates from surreal horror (Worf eating a\
    \ Starfleet-themed cake, Beverly drinking from a straw inserted into Riker’s temple)\
    \ to visceral violence, underscoring the interphasic threat’s ability to distort\
    \ reality and exploit Data’s deepest fears—particularly his fear of harming those\
    \ he cares about. The abrupt shift in the dream, triggered by Troi’s screams,\
    \ signals the threat’s growing power and the urgency of Data’s mission to uncover\
    \ its source before it fully manifests in the real world.\n  "
