  title: Data executes emergency warp core shutdown
  description: "\n  In the midst of a critical warp core malfunction, Data and Geordi\
    \ La Forge work urgently in dim emergency lighting to stabilize the Enterprise.\
    \ Data takes decisive action by shutting down the warp engines, which restores\
    \ normal power to Engineering. Geordi reports to Picard that the plasma conduit\
    \ requires a full reconfigure, delaying the ship's departure by hours. The incident\
    \ underscores the escalating instability tied to Data's nightmares and the unseen\
    \ interphasic threat, as the ship's systems continue to fail under the growing\
    \ influence of the interphasic organisms. This moment serves as both a technical\
    \ crisis and a narrative turning point, revealing the depth of the ship's vulnerability\
    \ and the urgency of addressing Data's visions before further disaster strikes.\n\
    \  "
