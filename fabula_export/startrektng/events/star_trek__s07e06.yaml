- fabula_uuid: cand_evt_scene_18b83282f87d6bde_02
  global_id: null
  title: Warp core collapses under unseen threat
  description: 'The *Enterprise* attempts to engage warp speed after Geordi confirms
    systems are stable, but the warp core immediately fails—a catastrophic shutdown
    accompanied by a violent rattling noise. Geordi diagnoses a blown power converter
    and impulse engine failure, revealing the ship is now stranded. The crisis escalates
    as Data reports the warp field collapse, and the core’s ominous rattling signals
    an accelerating, unexplained malfunction. This moment marks a turning point: the
    ship’s technical failure aligns with Data’s interphasic nightmares, suggesting
    the malfunctions are not coincidental but symptomatic of a deeper, unseen threat.
    Picard’s order to proceed becomes a catalyst for the crew’s realization that the
    *Enterprise* is under attack from an interphasic force, forcing them to confront
    the possibility that Data’s dreams are not just hallucinations but warnings of
    a real, destabilizing presence aboard the ship. The scene shifts from routine
    operations to high-stakes emergency, with Geordi’s confidence in a quick fix undercut
    by the core’s unsettling, persistent rattling—a sound that foreshadows the ship’s
    unraveling integrity and the crew’s impending struggle against an enemy they cannot
    yet see or fully understand.'
