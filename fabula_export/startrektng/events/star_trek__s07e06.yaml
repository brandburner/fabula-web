- fabula_uuid: act_13c0e81c8b5eb50f
  number: 2
  summary: Geordi's diagnostics find no technical faults with Data's internal systems,
    leading him to suggest Data's nightmares might be a new aspect of his 'human experience.'
    Unconvinced, Data seeks a more scientific explanation. He activates a holodeck
    simulation of Sigmund Freud, hoping for analytical insight into his dreams. Freud
    offers a comically over-the-top Freudian interpretation, linking the 'cake' and
    'knife' to dismemberment, an Oedipal complex, and sexual inadequacy, which Data
    finds unhelpful and dismisses. Meanwhile, the Enterprise attempts a second warp
    core test, which again fails catastrophically, blowing out the power converter
    and impulse engines, rendering the ship completely immobile. This further frustrates
    Picard, who must again inform Admiral Nakamura of his delay. While working on
    a plasma conduit, Data sees a coil brace that strikingly resembles the knife from
    his dream, triggering a waking dream. In this waking dream, Geordi has an animal
    mouth on his neck, the ringing sound returns, and Riker, with a straw in his head,
    demands Data 'answer' the ringing. Data opens a panel on his abdomen to reveal
    a ringing telephone receiver, from which Freud's voice commands him to 'Kill them.
    You must kill them all... before it's too late.' Geordi snaps Data out of the
    waking dream, leaving Data shocked and confused by his perception.
