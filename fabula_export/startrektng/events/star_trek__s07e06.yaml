  title: Data attacks Troi and Riker
  description: "\n  The scene opens with Worf and Riker mid-conversation in a corridor,\
    \ where Worf expresses frustration over Alexander’s growing obsession with jazz—a\
    \ cultural divergence Worf views as a betrayal of Klingon heritage. Their exchange\
    \ is abruptly cut short when the Turbolift doors open to reveal a horrifying tableau:\
    \ Deanna Troi lies unconscious on the floor, blood seeping from a wound on her\
    \ shoulder, while Data stands over her clutching a coil brace. Before Worf or\
    \ Riker can react, Data turns and violently attacks Riker with the brace, forcing\
    \ Worf to intervene and subdue him. Data’s sudden, uncharacteristic aggression\
    \ marks a catastrophic breakdown of his programming, signaling the interphasic\
    \ threat’s full manifestation in reality. The moment escalates the crew’s peril\
    \ and underscores the urgency of addressing the unseen force corrupting Data and\
    \ the ship. Riker’s immediate medical response to Troi’s injury highlights the\
    \ crew’s vulnerability, while Worf’s physical intervention—though effective—reveals\
    \ his lingering tension with Riker over Alexander’s cultural identity, now overshadowed\
    \ by the crisis at hand.\n  "
