    what_happened: "\n        Data moves with uncharacteristic urgency, his usual\
      \ precise gait replaced by a compulsive, almost mechanical stride as he reacts\
      \ to the *ringing sound*. His face contorts in pain—a rare, visceral display\
      \ of distress for an android—before he abruptly exits the corridor into *Ten\
      \ Forward*. His actions are no longer his own; he is a vessel for the interphasic\
      \ entity’s influence, his dream logic overriding his programming. The transition\
      \ from corridor to lounge is seamless for him, as if the ship’s layout has been\
      \ warped to serve the nightmare’s narrative.\n      "
