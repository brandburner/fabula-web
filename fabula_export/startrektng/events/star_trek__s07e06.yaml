  title: Warp core collapses mid-engage
  description: "\n  The *Enterprise* prepares to enter warp under Picard’s command,\
    \ with Geordi confirming the warp core is stable. As Ensign Russell executes the\
    \ order, the engines flare violently but fail to propel the ship—then shut down\
    \ entirely. The warp field collapses, stranding the vessel in uncharted space.\
    \ In Engineering, Geordi diagnoses a blown power converter and impulse engine\
    \ failure, while Data reports the warp field collapse to Picard. The warp core\
    \ emits an ominous rattling noise, signaling deeper system instability. This mechanical\
    \ failure escalates the interphasic crisis, as the ship’s malfunction aligns with\
    \ Data’s nightmares, hinting at a hidden, systemic threat. The crew’s immediate\
