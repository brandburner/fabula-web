    emotional_state: Ominous and cold initially, shifting to aggressive and violent
      when provoked by Data’s shriek. Their lack of emotion or reaction suggests they
      are not fully human—possibly interphasic entities operating on a different plane
      of existence.
    goals:
    - To sabotage the warp plasma conduit (primary objective).
    - To eliminate any interference (Data’s intervention).
    what_happened: The three workmen, dressed in plain gray coveralls and wielding
      picks and shovels, ignore Data’s warnings with cold indifference. Their silence
      is unnerving, their expressions blank and ominous. When Data emits the high-pitched
      shriek, they turn as one, their demeanor shifting from passive to aggressive.
      One workman grabs Data’s arm and tears it from its socket with brutal force,
      initiating a coordinated dismemberment. The others converge, wrenching free
      limbs, ripping apart metal and fabric, and finally separating Data’s head. Their
      movements are efficient, almost mechanical, devoid of emotion or hesitation.
      The attack is swift, methodical, and horrifying, leaving Data’s components scattered
      across the corridor.
