  title: Enterprise fails to engage warp
  description: "\n  The *Enterprise*’s bridge crew prepares for departure, with Picard\
    \ ordering Ensign Russell to engage warp six for Starbase 219. Despite Geordi\
    \ La Forge’s assurance that the warp plasma conduit has been repaired, the ship\
    \ remains motionless—its systems unresponsive to commands. Picard’s repeated orders\
    \ to 'engage' grow increasingly tense as the crew realizes something is gravely\
    \ wrong. Just as the warp drive appears to activate, the bridge is plunged into\
    \ darkness as the entire ship loses power, leaving the *Enterprise* stranded in\
    \ space. This failure is not just a mechanical malfunction but a manifestation\
    \ of the interphasic threat’s growing influence, directly tying into Data’s nightmares\
    \ and the unseen force destabilizing the ship’s systems. The moment forces Picard\
    \ to escalate the issue to Engineering, revealing the depth of the crisis and\
    \ setting up the crew’s desperate search for answers.\n  "
