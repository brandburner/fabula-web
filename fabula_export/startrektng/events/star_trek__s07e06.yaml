  - object_uuid: ger_object_372887ae6f74
    description_of_involvement: 'Data’s positronic subprocessor is the linchpin of
      this event, both as the source of the high-frequency interphasic signatures
      and as the tool repurposed to emit the destabilizing pulse. Geordi kneels beside
      Data, making precise adjustments to its circuitry—a process that transforms
      it from a diagnostic component into a weapon. The subprocessor’s activation
      produces the high-pitched whine, bridging Data’s subconscious fears with the
      tangible threat aboard the *Enterprise*. Its role is dual: it detects the creatures’
      signatures and, when modified, becomes the means to combat them.'
    status_before_event: Functioning as a diagnostic tool, detecting high-frequency
      interphasic signatures but not yet repurposed for offensive use.
    status_after_event: Modified to emit a targeted interphasic pulse, now serving
      as a critical weapon against the infestation. Its circuitry is adjusted, and
      it remains in an activated state post-event.
    global_id: ger_object_372887ae6f74
  - object_uuid: ger_object_9237de8ff4b0
    description_of_involvement: Geordi’s communicator badge serves as the critical
      link between the Holodeck and Sickbay, enabling Picard to coordinate with Beverly
      Crusher in real-time. Though not the focal point of the event, its use underscores
      the ship’s reliance on Starfleet communication protocols even in moments of
      extreme crisis. The device’s activation is swift and functional, reflecting
      the urgency of the situation and the need for immediate, centralized command.
    status_before_event: Attached to Geordi’s uniform, fully operational and ready
