  global_id: null
  title: Crew realizes Data’s dreams hold the key
  description: 'In the Observation Lounge, the senior staff—Picard, Riker, Worf, Geordi,
    and Beverly—convene to assess the escalating interphasic infestation, now affecting
    73% of the crew. Beverly’s grim prognosis (cellular decay leading to total bodily
    dissolution) underscores the urgency, while Geordi’s failed attempts to detect
    or neutralize the creatures reveal their interphasic nature—beyond conventional
    sensors. The crew’s frustration peaks when Worf confirms no external source for
    the infestation, forcing Picard to connect Data’s violent hallucinations (his
