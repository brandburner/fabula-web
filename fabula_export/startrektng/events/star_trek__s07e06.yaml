  title: Data's shriek weaponizes against enemies
  description: 'In Freud’s office, Data’s nightmares manifest violently when disguised
    workmen—revealed as the *Enterprise*’s interphasic enemies—burst in, execute Freud,
    and attack Picard and Geordi. As the workmen prepare to strike, Data’s high-pitched
    shriek (previously a source of distress) incapacitates them, exposing it as a
    latent weapon. Picard realizes the shriek’s frequency disrupts the interphasic
    threat, marking a critical turning point: Data’s subconscious fears are not just
    psychological but a tangible defense. The scene dissolves abruptly, leaving the
    revelation unresolved but actionable—setting up Data’s immediate role in combating
    the ship-wide infestation. The confrontation forces Data to confront his own latent
    capabilities, while Picard and Geordi witness the shriek’s power firsthand, bridging
    the gap between Data’s nightmares and the *Enterprise*’s crisis.'
