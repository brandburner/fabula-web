  - 'GEORDI: Stand by, Captain...'
  - 'DATA: I will take the warp engines off-line.'
  - 'GEORDI: ((to com)) La Forge to Bridge. I''m sorry, Captain. We''re going to have
    to reconfigure the plasma conduit. It''s going to take a few hours at least, sir.'
