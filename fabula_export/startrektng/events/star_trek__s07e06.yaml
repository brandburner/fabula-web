  object_involvements:
  - object_uuid: ger_object_372887ae6f74
    description_of_involvement: Data’s positronic subprocessor is the linchpin of
      this event, both literally and symbolically. Geordi kneels beside Data and adjusts
      its circuitry with precision, modifying it to emit a high-frequency interphasic
      pulse as directed. This object, typically a component of Data’s internal systems,
      becomes a weapon in this moment—a tool to destabilize the boundary between Data’s
      dream-state and reality, and to target the interphasic organisms threatening
      the *Enterprise*. The pulse it emits is a high-pitched, inaudible whine, a sound
      that bridges the subconscious and the physical, proving that Data’s nightmares
      are not just personal but a key to the ship’s survival. The subprocessor’s transformation
      from a diagnostic tool to an offensive instrument marks a turning point in the
      crew’s response to the crisis.
    status_before_event: Functioning normally within Data’s positronic network, but
      emitting erratic high-frequency signatures detected as part of Data’s nightmares.
    status_after_event: Modified to emit a targeted high-frequency interphasic pulse,
