- fabula_uuid: cand_evt_scene_ce5fe672f49d10dc_02
  global_id: null
  title: Data attacks Troi and Riker in the corridor
  description: After a tense exchange between Riker and Worf about Alexander’s cultural
    identity, the two officers enter a turbolift to find Counselor Troi unconscious
    on the floor, bleeding from a wound on her shoulder. Data stands over her, holding
    a coil brace, and immediately turns on Riker with violent intent, swinging the
    brace at his face. Worf intervenes, restraining Data from behind, but the android
    suddenly regains lucidity, dropping the weapon in confusion. The abrupt shift
    from aggression to disorientation underscores the interphasic entity’s control
    over Data’s actions, marking the first physical manifestation of his nightmares
    in reality. The attack forces the crew to confront the escalating threat posed
    by the unseen force, while also revealing Data’s internal struggle between his
    programming and the external influence corrupting his systems. The moment serves
    as a turning point, shifting the narrative from speculative investigation to urgent
    crisis management.
