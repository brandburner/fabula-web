  scene_sequence: 28
  sequence_in_scene: 43
  key_dialogue:
  - 'DATA: It is an interesting hypothesis. If I am being affected by these interphasic
    creatures on an unconscious level, it may also explain my waking dreams, and my
    subsequent anti-social behavior.'
  - 'GEORDI: What we want to do is link your neural net into the Holodeck... and have
    you activate your dream program, so as you''re dreaming... we can observe the
    dream images.'
  - 'PICARD: Perhaps we can learn more about the creatures by interpreting the symbols
    and images in your dreams.'
