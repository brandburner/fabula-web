- fabula_uuid: act_e61b648ea1a7c119
  number: 5
  summary: Beverly reports to the senior staff that the interphasic creatures are
    extracting cellular peptides, causing widespread cellular decay, and she has no
    means to stop them. Geordi confirms the creatures exist in an interphasic state,
    making them nearly undetectable and impervious to conventional defenses. The crew
    realizes Data is not infested and that his dreams and waking visions are symbolic
    perceptions of these interphasic creatures and their method of cellular extraction.
    Picard decides they must re-engage Data's dream program, linking his neural net
    to the holodeck to observe his dreams in real-time, hoping to decipher the creatures'
    nature and weakness. Inside Data's dream, Picard and Geordi witness the 'cellular
    peptide cake' (symbolizing peptide extraction), the ringing telephone (a warning),
    and Freud (Data's unconscious mind trying to warn him). The three workmen, now
    identified as 'enemies,' appear and 'kill' Freud, then begin dismantling the warp
    plasma conduit. Picard realizes Data's high-pitched shriek, which caused the workmen
    pain in his initial nightmare, is the key. Data emits the shriek, incapacitating
    the workmen. With this understanding, Data urgently instructs Geordi to adjust
    his positronic subprocessor to emit a high-frequency interphasic pulse, mirroring
    the shriek. The pulse is emitted, and Beverly confirms it successfully disintegrates
    all the creatures from the crew. The crew traces the creatures' origin to the
    new warp plasma conduit, manufactured with an interphasic fusion process, which
    attracted the organisms and caused the warp core malfunctions. With the threat
    resolved and the ship's systems being repaired, Picard, no longer delayed, resigns
    himself to attending the Admiral's banquet. Geordi resolves his awkwardness with
    Ensign Tyler, offering her genuine praise. Finally, Troi brings Data a 'Data cake,'
    and they reflect on his experience, with Data contemplating the implications of
    his evolving psyche and the complex nature of his 'humanity.'
