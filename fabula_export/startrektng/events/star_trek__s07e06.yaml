  - |-
    DATA: Have you ever had nightmares before?
    GEORDI: Sure. Everybody does from time to time...
    DATA: I have had one hundred eleven dreams since I first discovered the program nine months ago. In all of that time, I have never experienced such strange and disturbing imagery in a dream. I believe it was... a nightmare.
  - |-
    GEORDI: Nightmares are part of dreaming, Data. Maybe you just discovered a new level to your program.
    DATA: Perhaps. I have also noted that I am spending an inordinate amount of time thinking about nightmare imagery. One could almost say that I am... preoccupied.
    GEORDI: Well, that's perfectly normal. When I have a nightmare, sometimes I can't shake that weird feeling for days...
  - 'GEORDI: ((to com)) La Forge to Bridge. Warp power at your discretion, Captain.'
