  title: Data confronts his dream obsession
  description: 'In Troi’s office, Data—visibly unsettled—admits his nightmares are
    now bleeding into waking reality, manifesting as hallucinations and triggering
    paranoia about his own systems. He recounts his exhaustive research into dream
    theories, fixating on Freud’s ''knife'' symbol as potential evidence of a latent
    violent impulse. Troi challenges his obsessive self-analysis, diagnosing his behavior
    as the onset of a neurosis—a possibility Data greets with uncharacteristic enthusiasm.
    She advises shutting down his dream program and offers weekly counseling, marking
    a turning point where Data’s internal conflict becomes a shared concern for the
    *Enterprise*’s safety. The scene underscores the escalating threat: Data’s subconscious
    is no longer just a personal mystery but a potential systemic risk, foreshadowing
    the interphasic threat’s external manipulation of his psyche. The exchange also
    reveals Troi’s role as both confidante and voice of reason, grounding Data’s existential
    crisis in psychological terms while hinting at the larger danger lurking beyond
    his dreams.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e06
  scene_sequence: 17
  sequence_in_scene: 26
  key_dialogue:
  - 'DATA: Everything seems to remind me of the nightmare -- objects, sounds, smells.
    And now I have seen elements from the dream while still in a waking state. I cannot
    explain it.'
  - 'TROI: Data... if you were one of my human patients, I might be concerned right
    now. I''d say you had a waking dream... or a hallucination... But you''re not
    human. It seems to me that we might be looking at some sort of technological problem...'
  - 'DATA: Perhaps Freud was correct... and the knife I dreamed of is the embodiment
    of my unconscious desire to inflict violence.'
  - 'TROI: The bottom line is... I think you may be developing an almost... obsessive
    interest in your own inner-workings. I''d almost call it the beginnings of a...
    neurosis.'
  - 'DATA: ((hopeful)) Do you really think it is possible?'
  - 'TROI: You may be the first person who''s come into my office who''s actually
    been excited by the prospect of a new neurosis. But yes... I do think it''s possible.
    In fact, I''d like to start counseling you on a regular basis.'
