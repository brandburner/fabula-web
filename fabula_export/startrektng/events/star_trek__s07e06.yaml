  title: Troi’s shoulder reveals cellular predation
  description: "\n  In *Ten Forward*, Data—still under the interphasic threat’s influence—approaches\
    \ an unconscious Deanna Troi, whose right shoulder has been carved into a grotesque\
    \ 'cake' by Worf, who casually eats a piece while commenting on the 'mint frosting.'\
    \ Picard and Geordi witness Data methodically slicing another portion from Troi’s\
    \ flesh, offering Picard a piece as if it were a normal social gesture. Picard’s\
    \ realization that the wound mirrors Data’s earlier nightmare (a mouth on Troi’s\
    \ shoulder) and Geordi’s deduction that 'cellular peptides'—the creatures’ target—are\
    \ being physically extracted, bridges the psychological and physical threats.\
    \ The scene escalates when a ringing sound triggers Data to reveal a telephone\
    \ embedded in his abdomen, through which Freud’s voice urgently commands Picard\
    \ to 'kill them' before it’s too late. The surreal horror of the moment—where\
    \ dreams manifest as literal predation—confirms the interphasic organisms are\
    \ not only consuming the ship but also its crew’s cellular structure, forcing\
    \ Picard to confront the existential threat head-on.\n  "
