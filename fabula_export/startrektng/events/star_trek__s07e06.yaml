  title: Data's interphasic hallucination erupts in Engineering
  description: "\n  Data's waking hallucination begins when he handles a coil brace\
    \ in Engineering, its sharp edges triggering a flashback to his recurring nightmare.\
    \ The hallucination distorts reality: Geordi's neck sprouts a hissing mouth, and\
    \ Riker appears with a straw embedded in his temple, demanding Data answer a ringing\
    \ telephone in his abdomen. A disembodied voice—posing as Freud—commands Data\
    \ to 'kill them all,' escalating the interphasic entity's psychological invasion.\
    \ Geordi's intervention snaps Data back to reality, but the episode underscores\
    \ the entity's growing control over his perception. The hallucination serves as\
    \ a turning point, revealing the interphasic threat's ability to manipulate Data's\
    \ subconscious and blur the line between his nightmares and the ship's physical\
    \ world. The crew's concern for Data's stability foreshadows the broader danger\
    \ now consuming the Enterprise.\n  "
