- fabula_uuid: cand_evt_scene_c8d70eca8b547768_01
  global_id: null
  title: Data explains his violent waking dreams
  description: "\n  In the tense aftermath of Data’s violent outburst—where he attacked\
    \ Troi and threatened Riker—Picard, Riker, and Geordi interrogate him in the observation\
    \ lounge to understand the source of his sudden aggression. Data, now lucid and\
    \ composed, describes his waking hallucinations: a parasitic 'mouth' on Troi’s\
    \ shoulder and a 'straw' protruding from Riker’s head, both images he originally\
    \ experienced in his dream program. His inability to rationalize these visions,\
    \ combined with Geordi’s failure to detect any malfunction in his positronic net,\
    \ deepens the crew’s unease. Picard, forced to act on the escalating threat, reluctantly\
    \ relieves Data of duty and confines him to quarters—a decision that fractures\
    \ trust and underscores the ship’s growing vulnerability to the unseen interphasic\
    \ danger. The scene pivots from investigation to containment, marking a turning\
    \ point where Data’s condition is no longer a personal anomaly but a direct risk\
    \ to the *Enterprise* and its crew.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e06
  scene_sequence: 24
  sequence_in_scene: 36
  key_dialogue:
  - 'DATA: "I believe I had another waking dream, sir. But this time, I felt an uncontrollable
    urge to... eliminate the image I saw."'
  - |-
    PICARD: "A straw?"
    DATA: "As I said, these are all images that I originally experienced in my dream program. I do not have a rational explanation for them."
  - |-
    PICARD: "In the meantime, Mister Data... I'm going to have to relieve you of duty and confine you to quarters."
    DATA: "A sensible precaution, sir."
