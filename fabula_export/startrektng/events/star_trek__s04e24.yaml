- fabula_uuid: cand_evt_scene_93624ce126765ce9_03
  global_id: null
  title: Geordi’s Conditioning Tested in Ten Forward
  description: 'In this pivotal scene, Taibak—posing as a fellow crewmember—tests
    the effectiveness of Geordi’s Romulan brainwashing by ordering him to assassinate
    Miles O’Brien in Ten Forward. The scene begins with Geordi appearing relaxed and
    unremarkable, masking the Romulan programming embedded in his VISOR. When Taibak
    instructs him to kill O’Brien, Geordi initially complies without hesitation, but
    his subconscious resistance surfaces in two critical moments: first, when he pauses
    to question the command, and second, when he hesitates again before firing. Taibak
    freezes the simulation to reinforce Geordi’s conditioning, forcing him to repeat
    the order until his will is broken. The murder is executed with eerie detachment,
    underscoring the Romulans’ control over him. Taibak’s observation of Geordi’s
    lingering resistance—despite his eventual compliance—hints at the fragility of
    the conditioning, foreshadowing future cracks in the Romulan plot. The scene’s
    chilling tone, combined with the contrast between Geordi’s casual demeanor and
    the violence he commits, reinforces the narrative’s central tension: the Federation’s
    most trusted engineer is now a weaponized pawn, and his imperfect control could
    unravel the conspiracy before it fully unfolds. The moment also serves as a turning
    point, marking the irreversible escalation of the Romulan scheme to provoke war
    between the Federation and the Klingon Empire.'
