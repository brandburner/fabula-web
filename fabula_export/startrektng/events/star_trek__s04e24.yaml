  key_dialogue:
  - 'RIKER: Another E-band blip?'
  - 'DATA: Yes, sir. However, the difference in intensity indicates this one did not
    originate from the same location as the first.'
  - 'RIKER: If it''s changed intensity... it can''t possibly be a protostar.'
  - 'DATA: That is a reasonable assumption.'
  - 'RIKER: Is there any known instance of Romulans using the E-band for communications?'
  - 'DATA: Not to my knowledge.'
  - 'RIKER: Is there any way to track the source?'
  - 'DATA: We can re-configure the primary sensor arrays. If we narrow their focus
    to scan for E-band emissions, we might be able to calculate a directional vector.
    But only if there are more occurrences.'
  - 'RIKER: Do it.'
