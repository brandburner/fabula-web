- fabula_uuid: act_6d2656654f8efb9f
  number: 5
  summary: Geordi experiences increasing psychological distress, manifesting as restless
    sleep and a minor vascular irregularity in his visual cortex, signaling the strain
    of his conditioning. As Vagh and Kell transport to the Enterprise for the planned
    meeting, Data makes a crucial breakthrough. He realizes the E-band emissions match
    human neural frequencies and are specifically designed to transmit direct commands
    to the human brain, strongly implicating Geordi's VISOR. Simultaneously, Data's
    investigation of Geordi's shuttle reveals evidence of a tractor beam and Romulan
    replication patterns on its memory chips, conclusively proving Geordi's abduction
    and brainwashing. Armed with this knowledge, Data orders Worf to apprehend Geordi.
    In Cargo Bay Four, Geordi attempts to assassinate Governor Vagh, but Worf intervenes,
    preventing the murder and averting immediate war. Data then publicly exposes Geordi's
    conditioning and identifies Picard and Kell as the only two individuals consistently
    present during all recorded E-band transmissions, suggesting one is the accomplice.
    Kell's refusal to be searched and his subsequent request for asylum, which Picard
    denies, confirms his guilt, leading to his arrest by Vagh's guards. The episode
    concludes with Deanna Troi beginning the difficult process of counseling Geordi,
    who struggles profoundly to distinguish between his real memories and the Romulan-implanted
    ones, facing a long and uncertain path to psychological recovery.
