  - 'DATA: That might suggest that the weapon has been charged with a forced pulse...
    well into the terahertz range.'
  - 'GEORDI: Then it''s definitely not Starfleet issue... and there can''t be that
    many systems that use terahertz feeds...'
  - 'GEORDI: I think we could narrow the list down with a little common sense, Data...
    ask yourself who has the most to gain from a conflict between the Klingon Empire
    and the Federation?'
