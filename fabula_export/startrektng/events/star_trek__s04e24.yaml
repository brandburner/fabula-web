      ensures he cannot move, making him fully vulnerable to Taibak's neural manipulation.
      Its clinical, impersonal appearance reinforces the cold efficiency of the procedure,
      symbolizing Geordi's loss of autonomy and the Romulans' control over his body
      and mind.
    status_before_event: Empty and ready for use, positioned under the bright lights
