  scene_sequence: 6
  sequence_in_scene: 12
  key_dialogue:
  - 'KELL: There have been two rebel attacks on neutral freighters... one Ferengi,
    the other Cardassian...'
  - 'WORF: You would test the Captain''s word with me, Kell? Is it because I have
    no honor in your eyes that you expect me to be disloyal?'
  - 'KELL: There are some members of the high council, Worf, who would thank you.
    For killing Duras. Had he lived, there is no doubt he would have ascended to head
    the council. Many... were not looking forward to that.'
  - 'WORF: My motives were personal. Not political.'
  - 'KELL: Motives? Who cares for motives? Humans perhaps. What matters is, you acted
    that day as a true Klingon.'
