      critically involved in this scene, as its integrity and neutrality are the target
      of Kell’s insinuations. Worf’s defense of Picard’s honor—‘Captain Picard does
      not lie’—positions the Federation as a moral and diplomatic force, whose reputation
      Kell seeks to undermine. The Federation’s non-interference policy in the Kriosian
      conflict is implicitly at stake, as Kell suggests that the Federation may be
      providing support to the rebels. This scene is a microcosm of the broader diplomatic
      crisis facing the Federation, where its alliances and principles are tested
      by external manipulations.
