  - object_uuid: ger_object_262f90264dbe
    description_of_involvement: Geordi’s VISOR is the central tool of Romulan control
      in this event, functioning as both a cybernetic implant and a conduit for neural
      manipulation. Initially, it provides Geordi with his enhanced visual perception,
      but Taibak hijacks it using a Romulan tech device, overlaying targeting grids
      and telemetry data onto Geordi’s vision. This visual corruption symbolizes the
      erosion of Geordi’s autonomy, as the VISOR—once a source of empowerment—becomes
      an instrument of his enslavement. When Geordi hesitates, Taibak freezes the
      simulation and directly programs the VISOR to reinforce the kill command, erasing
      Geordi’s moral resistance. The VISOR’s role as a control mechanism is visually
      and narratively pivotal, illustrating the Romulans’ ability to turn Federation
      technology against its owner.
    status_before_event: Functioning as Geordi’s primary visual interface, providing
      enhanced spectral perception and engineering telemetry—uncompromised by external
      control.
    status_after_event: Hijacked by Romulan technology, now a tool for neural conditioning
      and targeted violence, with residual programming embedded to override Geordi’s
      free will.
