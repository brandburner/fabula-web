  global_id: null
  title: Kell orders Geordi to assassinate Vagh
  description: In Kell’s quarters, the Klingon ambassador—secretly a Romulan agent—summons
    Geordi La Forge with cold efficiency, treating him as a disposable tool. Kell
    reveals the Federation’s investigation is accelerating, exposing Geordi’s brainwashed
    status as a liability. Without hesitation, Kell orders Geordi to assassinate Governor
    Vagh in Cargo Bay Four, framing Starfleet for the murder to provoke war. Geordi
    accepts the directive with eerie compliance, his VISOR-controlled mind erasing
    any moral resistance. The scene underscores Geordi’s complete subjugation to Romulan
    control while escalating the conspiracy’s stakes, as Kell’s calculated move sets
    the stage for an irreversible diplomatic crisis. The fade-out leaves Geordi’s
    chilling obedience as the final, damning image, reinforcing his transformation
    into a weapon against his will and his crew.
