  title: Geordi and Data uncover Romulan phaser tampering
  description: "\n  In Engineering, Geordi La Forge and Data conduct a covert test-fire\
    \ of a confiscated phaser rifle, ostensibly to verify its functionality. Geordi’s\
    \ technical expertise and Data’s forensic precision reveal critical anomalies:\
    \ the weapon’s inverted terahertz pulse and unnaturally high efficiency (94.1%)\
    \ confirm it is not Starfleet-issued. This discovery marks a turning point in\
    \ the conspiracy, as the tampering becomes undeniable proof of an external threat.\
    \ Geordi’s suspicion of Romulan involvement—subtly guided by his brainwashed conditioning—escalates\
    \ the investigation, while Data’s logical deduction narrows the list of potential\
    \ culprits. The moment forces the crew to confront the reality that the Federation’s\
    \ compromised weapons are part of a larger, orchestrated plot. The tension lies\
    \ in Geordi’s unwitting role: his technical observations, though accurate, are\
    \ influenced by Romulan programming, making him both the investigator and the\
    \ unwitting agent of the conspiracy.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e24
  scene_sequence: 15
  sequence_in_scene: 26
  key_dialogue:
  - 'GEORDI: ''Yeah... by quite a bit... ninety-four point one percent efficiency.'''
  - 'DATA: ''That might suggest that the weapon has been charged with a forced pulse...
    well into the terahertz range.'''
  - 'GEORDI: ''Then it''s definitely not Starfleet issue... and there can''t be that
    many systems that use terahertz feeds...'''
  - 'GEORDI: ''I think we could narrow the list down with a little common sense, Data...
    ask yourself who has the most to gain from a conflict between the Klingon Empire
    and the Federation?'''
