  key_dialogue:
  - 'WORF: La Forge!'
  - 'DATA: I have been able to determine that Commander La Forge was abducted by Romulans
    while en route to Risa. It is likely that they somehow forced him into taking
    part in their plot to assassinate Governor Vagh.'
  - 'DATA: I have narrowed the list of possibilities to two people... the only two
    people who were with Commander La Forge all three times a transmission was recorded.
    Captain Picard and Ambassador Kell.'
  - 'KELL: I am a Klingon... an emissary of the High Council. I will not be subjected
    to a search by you or anyone else on this ship...'
  - 'PICARD: I will certainly grant you asylum, Ambassador, as soon as you are absolved
    of this crime.'
