  title: Geordi's Brainwashed Sabotage of O'Brien
  description: "\n  In Ten Forward, Geordi La Forge—unbeknownst to himself—executes\
    \ a Romulan-conditioned sabotage against Miles O'Brien. After entering the lounge\
    \ and ordering a drink, Geordi's VISOR activates Romulan targeting telemetry,\
    \ locking onto O'Brien as a designated target. The scene cuts to Geordi's POV,\
    \ revealing the telemetry overlay before he deliberately spills his drink down\
    \ O'Brien's back, feigning an accident. O'Brien reacts with surprise, and Geordi's\
    \ subsequent apologies ('My glass... slipped') ring hollow, as his body language\
    \ betrays deliberate intent. The moment underscores the insidious nature of his\
    \ brainwashing: Geordi is physically present but mentally absent, a puppet executing\
    \ commands while his conscious mind remains oblivious. The sabotage serves as\
    \ a critical escalation in the Romulan plot, triggering O'Brien's departure—a\
    \ necessary step in the larger scheme to destabilize Federation-Klingon relations.\
    \ Geordi's visible confusion and remorse afterward ('shaking his head at how clumsy\
    \ he was') further highlights the psychological toll of his compromised state,\
    \ foreshadowing the internal conflict he will later face when his conditioning\
    \ begins to unravel.\n  "
