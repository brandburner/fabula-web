  title: Beverly detects Geordi’s Romulan conditioning
  description: 'Beverly Crusher performs a routine medical examination on Geordi La
    Forge, who appears physically exhausted after his Risa vacation. Her tricorder
    scan reveals a subtle vascular irregularity in his visual cortex—a detail Geordi
    dismisses as insignificant. Beverly presses further, probing whether his VISOR
    might be malfunctioning, and suggests he have it examined at Starbase 36. When
    Geordi reluctantly agrees, she offers him a somnetic inducer to help him sleep,
    a gesture he accepts with forced nonchalance. The exchange is laced with subtext:
    Beverly’s clinical concern contrasts with Geordi’s evasiveness, hinting at deeper
    physiological distress tied to his Romulan conditioning. This moment marks the
    first tangible clue that Geordi’s ‘refreshment’ from Risa is a facade, masking
    a brainwashed trigger for a Federation-Klingon war. The scene functions as a critical
    setup, planting medical evidence that will later corroborate Data’s forensic findings
    and Riker’s suspicions of Romulan interference.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e24
  scene_sequence: 28
  sequence_in_scene: 47
  key_dialogue:
  - 'BEVERLY: You couldn''t sleep at all?'
  - 'GEORDI: I was restless... kept waking up...'
  - 'BEVERLY: There is a minor vascular irregularity in the visual cortex; a slight
    dilation of the blood vessels. It doesn''t seem serious. ((a beat as she thinks
    about it)) What about your VISOR? Has it been giving you any problems?'
  - 'GEORDI: ((shakes head)) No... nothing unusual.'
  - 'BEVERLY: It might not be a bad idea to have your VISOR examined when we get to
    Starbase Thirty-Six next month.'
  - 'GEORDI: Okay. Sure.'
  - 'BEVERLY: In the meantime... this somnetic inducer will help you sleep. Just put
    it by your bed.'
  - 'GEORDI: ((unconvincing)) Thanks, Doc... I''m sure I''ll be fine...'
