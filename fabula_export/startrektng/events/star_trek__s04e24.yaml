  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: Starfleet is indirectly but critically affected by
      the Romulan ambush. Geordi, as a Starfleet officer, is the primary target, and
      his abduction is an attack on the institution itself. The *Enterprise* and its
      crew are unaware of the attack, leaving Geordi isolated and vulnerable. Starfleet’s
      protocols—reliance on shields, subspace communications, and the assumption of
      safety in Federation space—are exposed as inadequate against Romulan tactics.
      The event highlights the organization’s vulnerability to covert operations and
      the need for heightened vigilance, especially in the context of the broader
      conspiracy to provoke a Federation-Klingon war.
    active_representation: Through Geordi La Forge, a high-ranking Starfleet officer,
      whose abduction symbolizes the organization’s exposure to Romulan threats. Additionally,
      the shuttlecraft’s systems and protocols (shields, communications) represent
      Starfleet’s technological and operational standards, which are overwhelmed by
      Romulan superiority.
    power_dynamics: Starfleet is on the defensive in this moment, its systems and
      personnel exploited by the Romulans. The organization’s power is undermined
      by the ambush, which occurs in a region presumed to be safe. Geordi’s inability
      to call for help or defend himself reflects Starfleet’s institutional blind
      spots and the Romulans’ ability to penetrate its borders.
    organizational_goals:
    - Maintain the safety and security of its personnel, even in non-combat zones
    - Ensure reliable communication and defensive capabilities for all vessels, including
      shuttlecraft
    influence_mechanisms:
