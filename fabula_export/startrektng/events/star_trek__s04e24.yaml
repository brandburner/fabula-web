  title: Geordi ignores Data to approach Vagh
  description: In the noisy cargo bay, Geordi La Forge finishes a technical discussion
    with Miles O'Brien about phase transition coils—a mundane exchange that masks
    his true intent. As Data’s com call goes unanswered, Geordi deliberately turns
    away, his VISOR flickering with Romulan conditioning. His calculated movement
    toward Governor Vagh at the opposite end of the bay signals his compromised agency,
    as the Romulan programming overrides his loyalty to Starfleet. The scene underscores
    the Romulans’ control over him, foreshadowing his role in the assassination plot
    and the escalation of Federation-Klingon tensions. The ignored com call from Data—who
    is investigating the Romulan sabotage—highlights the growing divide between Geordi’s
    compromised actions and the crew’s efforts to uncover the truth.
