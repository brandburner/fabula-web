  - object_uuid: ger_object_49a30fdfcd5a
    description_of_involvement: The fake VISOR is a decoy prop, worn by Geordi’s double
      to impersonate him on Risa. Taibak inspects it closely, ensuring its authenticity
      before dispatching the double. The VISOR’s replication of Geordi’s design—down
      to the neural interface—is critical to maintaining the illusion. Its role is
      to misdirect the *Enterprise* crew, buying time for the Romulans to complete
      Geordi’s conditioning. The fake VISOR symbolizes the Romulans’ ability to exploit
      Starfleet technology against its own personnel.
    status_before_event: Stored behind the lights, awaiting inspection by Taibak.
    status_after_event: Worn by Geordi’s double as he exits the chamber, now serving
      as the decoy’s primary tool for impersonation.
