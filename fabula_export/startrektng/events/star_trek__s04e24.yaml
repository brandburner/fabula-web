    global_id: ger_object_f5386d03cf72
  - object_uuid: ger_object_ab22b9bfcfe8
    description_of_involvement: The physiological monitoring system projects Geordi's
      heartbeat and galvanic skin response into the room, providing real-time feedback
      on the effectiveness of Taibak's neural manipulation. The system's displays—showing
