  title: Taibak demonstrates Geordi's neural control
  description: Geordi La Forge is forcibly restrained in a Romulan surgical chamber,
    where Taibak—an emotionless but methodical scientist—demonstrates the full extent
    of his neural subjugation through Geordi’s VISOR. Using a specialized machine,
    Taibak hijacks Geordi’s visual cortex, subjecting him to alternating waves of
    artificial calm (a serene meadow) and visceral terror (unnamed horrors) to prove
    his total control over Geordi’s perceptions. The unseen Romulan commander questions
    the procedure’s undetectability, and Taibak confirms that Geordi’s pre-existing
    neural implants make his conditioning impossible to trace. The demonstration serves
    as a chilling preview of Geordi’s future role as an unwitting sleeper agent, while
    also establishing the Romulans’ confidence in their ability to manipulate him
    without leaving physical evidence. Geordi’s physical reactions—clenched teeth,
    cold sweat, erratic heartbeat—underscore his helplessness, reinforcing the psychological
    horror of his situation. This moment is both a setup for Geordi’s later sabotage
    on the *Enterprise* and a turning point in the Romulans’ plot, as they confirm
    their ability to weaponize his mind against the Federation and Klingons.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e24
  scene_sequence: 5
  sequence_in_scene: 9
  key_dialogue:
  - |-
    TAIBAK: Welcome, Mister La Forge. We've waited a long time to meet you.
    GEORDI: I can tell you've gone to a lot of trouble.
  - |-
    TAIBAK: I now have direct access to his visual cortex. He has no choice but to see what I wish him to see.
    GEORDI: ((tight, desperation showing)) Why... are you doing this?
  - |-
    WOMAN: Will there be any physical evidence of what you are doing to him?
    TAIBAK: None, Commander. That is why we chose La Forge. The utilization of his pre-existing neural implants makes our work impossible to detect.
