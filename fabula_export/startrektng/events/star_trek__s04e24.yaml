- fabula_uuid: cand_evt_scene_2eae6e54bdd4dce5_01
  global_id: null
  title: Kell tests Worf’s loyalty to Picard
  description: 'In the Enterprise’s tactical area, Kell—posing as a Klingon ambassador—subtly
    probes Worf’s allegiance to Picard by questioning whether the Federation is secretly
    arming Kriosian rebels. Worf, initially defensive, reaffirms Picard’s integrity,
    but Kell’s probing reveals a deeper agenda: he has staked his own reputation on
    Picard’s trustworthiness, hinting at a high-stakes political gambit. The exchange
    escalates when Kell pivots to flattery, praising Worf’s killing of Duras as a
    ‘true Klingon’ act, testing whether Worf’s loyalty to Picard might conflict with
    Klingon honor. Worf rejects the personal praise but leaves unsettled, unaware
    that Kell’s true goal is to manipulate him into doubting Picard’s leadership—a
    critical step in the Romulan conspiracy to destabilize Federation-Klingon relations.
    The scene underscores Worf’s internal conflict between his duty to Starfleet and
    his Klingon identity, while Kell’s calculated words expose the fragility of the
    alliance under Romulan influence.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e24
  scene_sequence: 6
  sequence_in_scene: 11
  key_dialogue:
  - 'KELL: There have been two rebel attacks on neutral freighters... one Ferengi,
    the other Cardassian...'
  - 'WORF: You would test the Captain''s word with me, Kell? Is it because I have
    no honor in your eyes that you expect me to be disloyal?'
  - 'KELL: There are some members of the high council, Worf, who would thank you.
    For killing Duras. Had he lived, there is no doubt he would have ascended to head
    the council. Many... were not looking forward to that.'
  - 'WORF: My motives were personal. Not political.'
  - 'KELL: Motives? Who cares for motives? Humans perhaps. What matters is, you acted
    that day as a true Klingon.'
