- fabula_uuid: cand_evt_scene_93624ce126765ce9_01
  global_id: null
  title: Geordi's conditioning confirmed in Ten Forward
  description: In Ten Forward, Romulan operative Taibak tests Geordi La Forge's brainwashing
    by ordering him to assassinate Miles O'Brien—a trusted crewmate. Despite initial
    hesitation, Geordi's VISOR overrides his moral resistance, forcing him to kill
    O'Brien in a chilling demonstration of Romulan control. The scene reveals the
    depth of Geordi's conditioning, as Taibak freezes the simulation to reinforce
    his programming when Geordi falters. The act confirms the Romulans' ability to
    manipulate Geordi into committing acts against his will, setting the stage for
    their larger scheme to destabilize the Federation-Klingon alliance. The cold efficiency
    of the execution, followed by Geordi's casual return to socializing, underscores
    the horror of his mental enslavement and the stakes of the Romulan conspiracy.
