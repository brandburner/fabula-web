- fabula_uuid: act_2658056a800fd912
  number: 2
  summary: 'Geordi returns to the Enterprise, outwardly appearing refreshed from his
    "vacation" and interacting normally with the crew, including Data. Data, however,
    detects unusual E-band energy fluctuations, marking the first subtle indication
    of the Romulan plot''s ongoing presence. Meanwhile, the political tension intensifies
    as Picard, Riker, and Kell meet Governor Vagh of Krios. Vagh presents tangible
    evidence: Federation medical supplies and a phaser rifle found in rebel hands,
    directly accusing Starfleet of interference. Picard takes the phaser rifle for
    analysis, determined to uncover its true origin. Later, Geordi, still under Romulan
    influence, performs a seemingly accidental act in Ten Forward by spilling a drink
    on Chief O''Brien. This seemingly trivial incident serves as a real-world test
    of his implanted programming, demonstrating the Romulans'' ability to trigger
    his conditioned responses even outside the holodeck. The act highlights the growing
    external pressure on the Federation while the internal threat of Geordi''s manipulation
    remains largely undetected, save for Data''s initial E-band readings.'
