  sequence_in_scene: 8
  key_dialogue:
  - 'TAIBAK: Welcome, Mister La Forge. We''ve waited a long time to meet you.'
  - 'GEORDI: Why... are you doing this?'
  - 'TAIBAK: I am sorry, Commander. It is a necessary step. I apologize for your discomfort.
    Here... ((adjusts controls)) Observe how a spring day on his native Earth affects
    him... he''s looking at a beautiful meadow, green trees, birds, a blue sky...
    the heartbeat slows, the galvanic skin response drops... the body responds to
    our stimuli, he is incapable of maintaining control of his own responses... watch
    as I change the stimuli again... ((Geordi’s vitals spike)) Once our work is done,
    La Forge will act normally... totally unaware of his conditioning. The perfect
    tool for our purpose.'
  - 'WOMAN: Will there be any physical evidence of what you are doing to him?'
  - 'TAIBAK: None, Commander. That is why we chose La Forge. The utilization of his
    pre-existing neural implants makes our work impossible to detect.'
