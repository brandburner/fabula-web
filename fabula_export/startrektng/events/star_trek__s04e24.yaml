  title: Data decodes neural transmission threat
  description: 'On the Enterprise bridge, Riker presses Data to investigate the mysterious
    E-band signals detected earlier. Data isolates the waveform and systematically
    queries the computer, eliminating standard communication and natural phenomena
    as explanations. The computer reveals the signal matches human neural frequencies—a
    discovery that implicates a Romulan-designed system capable of transmitting subliminal
    messages directly into human minds. This revelation shifts the crew’s focus from
    Federation weapons to a far more insidious Romulan plot targeting the Enterprise’s
    senior officers, with Geordi’s recent brainwashing now exposed as part of a larger,
    orchestrated deception. The moment marks a critical turning point, as Data’s forensic
    analysis exposes the true nature of the threat: not just sabotage, but psychological
    manipulation at the highest level of Starfleet command. The tension escalates
    as the implications become clear—this isn’t just about weapons or rebels, but
    a Romulan plot to destabilize the Federation from within by weaponizing its own
    people against each other. Data’s physical reaction—a slight jerk of his head—underscores
    the gravity of the discovery, signaling that the stakes have just reached a new,
    dangerous threshold.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e24
  scene_sequence: 30
  sequence_in_scene: 49
  key_dialogue:
  - 'RIKER: From inside the Enterprise? You''re sure?'
  - 'DATA: The first and third E-band blips were clearly generated on board the ship.
    The second came from the planet''s surface.'
  - 'RIKER: Generated by what?'
  - 'DATA: Unknown, sir.'
  - 'RIKER: Mister Data, we know we have a spy on board... and now we have unexplained
    signals on board. I''d say it''s a reasonable guess they''re related somehow,
    wouldn''t you?'
  - 'DATA: Yessir, one could easily speculate that the E-band is being used for some
    form of covert communication.'
  - 'RIKER: We need more than speculation, we need to know who, what, where, when
    and why. Soon, Mister Data... or we may be going to war.'
  - 'DATA: Computer, run an analysis of all known Romulan transmission formats, all
    bands... identify any commonalities with displayed waveform.'
  - 'COMPUTER VOICE: No commonalities noted.'
  - 'DATA: Does this waveform match that of any known communication format?'
  - 'COMPUTER VOICE: Negative.'
  - 'DATA: Broaden search pattern beyond communications. Does the waveform displayed
    conform to any natural phenomena, cryptographic formats or lifeform E-M emissions?'
  - 'COMPUTER VOICE: The signal corresponds to a delta-compressed wavelength spectrum
    similar to human neural frequencies.'
  - 'DATA: As in a human brainwave pattern?'
  - 'COMPUTER VOICE: Affirmative.'
  - 'DATA: What kind of receiver would be capable of processing these signals?'
  - 'COMPUTER VOICE: A system designed to modify the electromagnetic spectrum and
    carry those messages directly to the human brain.'
