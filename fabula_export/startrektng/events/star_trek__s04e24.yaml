- fabula_uuid: cand_evt_scene_93624ce126765ce9_02
  global_id: null
  title: Geordi executes O'Brien in simulation
  description: "\n  In a simulated Ten Forward, Romulan operative Taibak tests Geordi\
    \ La Forge’s brainwashing by ordering him to assassinate Miles O’Brien—a trusted\
    \ crewmate. Initially, Geordi accepts the command without hesitation, but as he\
    \ approaches O’Brien, his subconscious resistance surfaces in two brief moments\
    \ of hesitation. Taibak freezes the simulation to reinforce Geordi’s conditioning,\
    \ forcing him to repeat the order aloud before resuming the program. This time,\
    \ Geordi fires the phaser without hesitation, killing O’Brien in cold blood. The\
    \ scene underscores the Romulans’ near-total control over Geordi’s actions while\
    \ revealing the fragility of his conditioning—his lingering moral resistance is\
    \ the only crack in their otherwise flawless manipulation. The execution marks\
    \ the irreversible escalation of the Romulan conspiracy, proving Geordi’s utility\
    \ as a weaponized asset and setting the stage for the assassination of Governor\
    \ Vagh. The casual indifference of O’Brien’s holographic companions and Geordi’s\
    \ subsequent social ease with the group—despite the murder—highlight the psychological\
    \ horror of his brainwashing: he is both perpetrator and victim, his identity\
    \ eroded by Romulan control.\n  "
