  object_involvements:
  - object_uuid: ger_object_edf77dab2e81
    description_of_involvement: 'Kell’s hand phaser, though not physically present
      in the shuttlebay, casts a long shadow over Data’s investigation. This weapon—reconfigured
      by Geordi from *stun* to *kill* in his quarters—is the *true* object of scrutiny,
      though Data’s scans cannot detect its lethal potential. The phaser is a MacGuffin
      with a dark purpose: it will later be used to assassinate Governor Vagh, framing
      Starfleet and igniting a war. Here, its absence from the shuttle’s systems is
      a narrative irony: the most dangerous ‘discrepancy’ is the one Data’s forensic
      methods cannot uncover, buried in Geordi’s conditioned mind rather than the
      machine’s memory.'
    status_before_event: Recently reconfigured from *stun* to *kill* by Geordi in
      his quarters, now pocketed and carried by him as he moves through the *Enterprise*.
      Its lethal setting is armed and ready for use in the Romulans’ plot.
    status_after_event: Still in Geordi’s possession, its lethal configuration undetected.
