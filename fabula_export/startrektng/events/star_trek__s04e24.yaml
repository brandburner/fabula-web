  - organization_uuid: ger_organization_1194b1a128ff
    description_of_involvement: 'The **Romulan Star Empire** operates in the shadows
      of this event, its influence felt through Geordi’s conditioned actions and Kell’s
      calculated manipulations. While the Romulans are not physically present on the
      bridge, their plot unfolds through the sleeper agent they have created in Geordi.
      Kell’s warning about Vagh’s attack is a deliberate escalation, designed to pressure
      the crew into hasty decisions—decisions that play directly into the Romulans’
      hands. The organization’s goal is to provoke a war between the Federation and
      the Klingons, and Geordi’s misdirection is a critical step in that plan. The
      Romulans’ power lies in their invisibility: they pull the strings without ever
      revealing their hand.'
