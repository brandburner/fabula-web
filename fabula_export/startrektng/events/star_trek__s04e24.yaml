  title: Geordi deflects suspicion over transporter anomaly
  description: 'Under Riker’s relentless scrutiny, Geordi—now a Romulan-controlled
    sleeper agent—attempts to obscure the unauthorized transporter beam that triggered
    Data’s alert. He dismisses the sensor bypass as an unexplained technical anomaly,
    exploiting his engineering expertise to deflect suspicion while subtly reinforcing
    the crew’s growing distrust of his behavior. The exchange reveals Geordi’s internal
    conflict: his technical competence (a core part of his identity) now serves as
    a weapon against his own crew. Meanwhile, Ambassador Kell’s arrival with news
    of Vagh’s delayed attack creates a temporary reprieve, but the tension remains
    palpable as the Enterprise crew races to uncover the truth before the Klingons
    strike. This moment deepens the mystery of the Federation weapons transfers and
    underscores the Romulans’ meticulous manipulation of Geordi’s actions to provoke
    war.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e24
  scene_sequence: 21
  sequence_in_scene: 35
  key_dialogue:
  - 'DATA: Sensors confirm an unauthorized transporter beam was initiated at eleven
    twenty three hours.'
  - 'RIKER: How many people on board are capable of doing this, Geordi?'
  - 'GEORDI: I''m not even sure how it was done yet... when I find out, maybe I can
    give you an answer... not many, that''s for sure...'
