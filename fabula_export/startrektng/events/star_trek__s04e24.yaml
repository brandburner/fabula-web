  object_involvements:
  - object_uuid: ger_object_49a30fdfcd5a
    description_of_involvement: The fake VISOR is worn by Geordi's double, who steps
      out from behind the lights for Taibak's inspection. The replica is studied closely
      to ensure its accuracy, confirming that it can pass as Geordi's authentic VISOR.
      This prop is crucial to the Romulans' deception, as it allows the double to
      impersonate Geordi on Risa, delaying the *Enterprise* crew's detection of his
      absence and brainwashing. Its role underscores the Romulans' meticulous planning
      and their ability to exploit Starfleet technology for their own ends.
    status_before_event: Stored and ready for use, awaiting inspection by Taibak.
    status_after_event: Worn by Geordi's double as he exits the chamber, now part
      of the decoy operation.
