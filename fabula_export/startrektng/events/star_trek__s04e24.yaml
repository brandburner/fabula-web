  - object_uuid: ger_object_ab8d358e3e50
    description_of_involvement: 'The Romulan transporter effect is the scene’s deus
      ex machina—a violent, instantaneous erasure of Geordi’s autonomy. It erupts
      inside the shuttlecraft as a shimmering energy field, dematerializing him mid-sentence
      as he pleads for help. The effect is clinical, almost surgical in its precision,
      reflecting the Romulans’ technological superiority. It doesn’t just abduct Geordi;
      it silences him, cuts off his warning to the *Enterprise*, and leaves the shuttlecraft
      eerily empty. The transporter’s role is to symbolize the inevitability of the
      Romulans’ plan: Geordi, despite his skills, is powerless to resist. The effect’s
      suddenness also foreshadows the psychological manipulation to come—his body
      is taken, but his mind will be the next target.'
    status_before_event: Dormant, part of the Romulan Warbird’s systems, awaiting
      activation.
    status_after_event: Fully deployed, having transported Geordi aboard the Warbird.
      The shuttlecraft’s interior is now vacant, the only trace of Geordi his abandoned
      fruit punch and the static from his failed transmissions.
    global_id: ger_object_ab8d358e3e50
  - object_uuid: ger_object_9392db2350e4
    description_of_involvement: 'The shuttlecraft speakers fill the cabin with warm
