      the abruptness with which Geordi’s vacation is snatched away. Risa’s role in
      the event is to underscore what Geordi stands to lose: not just his leisure,
      but the promise of a normal life, untouched by the Romulans’ schemes. Its mention
      is a cruel irony, a reminder of the future he will never experience.'
