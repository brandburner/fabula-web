  title: Geordi and Data trace energy to Cargo Bay Four
  description: 'In Engineering, Geordi La Forge and Data methodically investigate
    an unauthorized energy spike by cross-referencing power distribution networks
    across the *Enterprise*''s systems. After ruling out transporter activity and
    life support anomalies, they pinpoint an irregular energy signature in the replicator
    waveguides—one that leads directly to Cargo Bay Four. Geordi’s suggestion to trace
    the surge, though framed as logical troubleshooting, subtly reveals his compromised
    state: his brainwashed directives are guiding the investigation toward the planted
    Federation weapons, a step in the Romulans’ plan to escalate tensions with the
    Klingons. The discovery forces Geordi to alert Worf to secure the cargo bay, an
    action that unwittingly advances the Romulan plot while masking his own involvement.
    The scene underscores the tension between Geordi’s genuine engineering instincts
    and his subconscious manipulation, as well as Data’s forensic precision in uncovering
    the anomaly. The moment serves as a critical turning point, exposing the first
    tangible evidence of sabotage and setting the stage for the crew’s eventual confrontation
    with the Romulan conspiracy.'
