    if necessary I will defend my ship...'
  - 'KELL: With your permission, I will transport down to the planet. May I suggest
    that you extend an invitation to Vagh to personally witness your continuing investigation...'
  - 'PICARD: Do you think he would come?'
  - 'KELL: I will do everything in my power to convince him.'
