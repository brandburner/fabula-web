  - object_uuid: ger_object_262f90264dbe
    description_of_involvement: Geordi’s VISOR is the key to the Romulans’ manipulation,
      as it provides direct access to his visual cortex through pre-existing neural
      implants. The guards remove it early in the procedure, allowing Taibak to connect
      the manipulation machine’s rods to the VISOR inputs. This interface enables
      Taibak to feed Geordi fabricated images (calm meadows, horrors) and control
      his perceptions. Later, the VISOR is returned to Geordi, now programmed to activate
      targeting overlays in Ten Forward, overriding his resistance and enabling sabotage.
      Its dual role—as both a tool for engineering and a weapon—underscores the moral
      horror of the Romulans’ exploitation.
    status_before_event: Attached to Geordi’s face, functioning as his primary sensory
      interface.
    status_after_event: Removed, interfaced with the manipulation machine, and later
      returned—now compromised and reprogrammed for Romulan control.
    global_id: ger_object_262f90264dbe
  - object_uuid: ger_object_f5386d03cf72
    description_of_involvement: The Romulan surgical chair is the centerpiece of the
      neural conditioning procedure, designed to restrain Geordi’s head and body with
      tight metal straps, ensuring he cannot move during the interface with the manipulation
      machine. Positioned under glaring lights, it symbolizes the Romulans’ clinical
      detachment and Geordi’s vulnerability. The chair’s dental-like design reinforces
      the procedure’s invasive nature, reducing Geordi to a specimen for Taibak’s
      experiments. Guards strap him in, and Taibak swivels him to face the lights,
      heightening his disorientation as the machine’s rods approach his VISOR inputs.
    status_before_event: Empty and ready, positioned at one end of the chamber with
      machines arranged around it. The straps are loose, and the chair is angled away
      from the lights.
    status_after_event: Occupied by Geordi, who is strapped in and swiveled to face
      the lights. The chair remains in place, but Geordi’s physical and psychological
      state is irrevocably altered by the procedure.
    global_id: ger_object_f5386d03cf72
  - object_uuid: ger_object_ab22b9bfcfe8
    description_of_involvement: The physiological monitoring system broadcasts Geordi’s
      heartbeat and galvanic skin response into the chamber, serving as a real-time
      display of Taibak’s control over his body. The system’s projections—heart rate
      spikes during terror, slows during calm—demonstrate the procedure’s success
      to the unseen commander. Taibak references the data ('His galvanic skin response
      has increased nine percent') to prove Geordi’s vulnerability to manipulation.
      The system’s clinical feedback reinforces the Romulans’ scientific precision
      and Geordi’s loss of autonomy.
    status_before_event: Inactive, awaiting Geordi’s restraint and the procedure’s
