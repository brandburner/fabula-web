      aside as Taibak prepares to interface with his visual cortex. The VISOR, which
      normally grants Geordi enhanced visual perception, becomes a vulnerability when
      connected to the neural manipulation machine. Its removal symbolizes Geordi's
      loss of control over his own senses, as the Romulans take over his perception
      entirely. Later, it is returned to him, now programmed to activate targeting
      overlays that will later override his resistance, turning him into a sleeper
      agent.
