      guards remove it upon his restraint, leaving him blind and disoriented. Taibak
      then connects the VISOR to the neural manipulation machine, using it as a direct
      interface to stimulate Geordi''s visual cortex. The VISOR''s removal and subsequent
      use as a tool of manipulation highlight its dual role: as both a lifeline for
      Geordi and a weapon in the Romulans'' hands. Once the procedure is complete,
      the VISOR is returned to Geordi, now programmed to activate targeting overlays
      that will later override his resistance, enabling sabotage and simulated murder.'
