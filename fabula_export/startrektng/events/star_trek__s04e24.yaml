acts:
- fabula_uuid: act_f2028ba0bb011bf5
  number: 1
  summary: Geordi La Forge, en route to a relaxing Risa vacation, is violently abducted
    by a Romulan Warbird. This incident immediately establishes the insidious Romulan
    threat. Concurrently, the USS Enterprise is dispatched to the Kriosian System
    to mediate a volatile dispute between the Klingon Empire and Kriosian rebels.
    Klingon Ambassador Kell joins Picard, expressing concerns that the Federation
    is secretly aiding the rebels, which could shatter the fragile Federation-Klingon
    alliance. On the Romulan ship, Geordi is subjected to a sophisticated brainwashing
    procedure, where Romulan scientist Taibak demonstrates complete control over Geordi's
    perceptions and actions through his VISOR. The conditioning is chillingly confirmed
    when Geordi, in a holodeck simulation, is compelled to "kill" Chief O'Brien. This
    act introduces Geordi as an unwitting pawn in a larger Romulan plot to sow discord
    and ignite a war between the Federation and the Klingon Empire, setting the stage
    for the escalating conflict and the hidden danger within the Enterprise crew.
    The act effectively establishes the primary external conflict (Klingon-Federation
    tension) and the internal, hidden threat (Geordi's manipulation).
