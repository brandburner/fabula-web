  title: Geordi evades Data in Cargo Bay
  description: "\n  Geordi La Forge moves through the Enterprise’s Cargo Bay with\
    \ deliberate, evasive precision, ignoring repeated hails from Data over the comms.\
    \ His body language—tense, purposeful—contrasts sharply with his usual relaxed\
    \ demeanor, signaling that his actions are no longer his own. The Romulan brainwashing\
    \ has fully taken hold, compelling him to navigate the crowded space toward an\
    \ undisclosed objective. His path weaves between crew members and cargo containers,\
    \ avoiding direct lines of sight, as if he’s been programmed to minimize detection.\
    \ The scene underscores the horror of his compromised state: a man of science\
    \ and integrity now reduced to an unwitting agent of sabotage, his every move\
    \ serving a Romulan agenda he cannot resist. The tension lies in the contrast\
    \ between the mundane setting and the high-stakes betrayal unfolding within it—Geordi’s\
    \ internal conflict is invisible, but his physical evasion is a clear warning\
    \ that something is deeply wrong.\n  "
