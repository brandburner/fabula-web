    while reinforcing Federation trust in its officers. The exchange underscores the
    diplomatic tension between the two powers and sets up Worf's later role in uncovering
    the Romulan plot. Kell's reluctance to work with Worf also hints at deeper Klingon
    distrust of the Federation, which the Romulans will later exploit to ignite war.
