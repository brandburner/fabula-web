  title: Geordi detects energy anomaly in Cargo Bay Four
  description: In Engineering, Geordi La Forge and Data methodically trace an unauthorized
    energy surge through the *Enterprise*'s secondary systems, ruling out transporter
    activity before isolating a suspicious energy pattern leading to Cargo Bay Four.
    Geordi’s technical expertise—unwittingly influenced by Romulan conditioning—guides
    the investigation, revealing the first tangible evidence of sabotage. His immediate
    alert to Worf to secure the cargo bay marks the first overt step in his brainwashed
    mission, escalating tensions between the Federation and Klingons while subtly
    exposing his compromised state. The scene functions as a causal turning point,
    linking Data’s forensic analysis to Geordi’s involuntary role in the conspiracy,
    setting up the crew’s eventual suspicion of his loyalty and the broader Romulan
    plot to destabilize the alliance.
