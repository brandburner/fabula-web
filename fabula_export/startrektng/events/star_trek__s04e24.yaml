  title: Geordi’s aborted assassination attempt
  description: "\n  Geordi La Forge enters Cargo Bay with lethal intent, his VISOR\
    \ overlaying Governor Vagh with Romulan targeting telemetry as he subtly reaches\
    \ for his phaser. The moment is abruptly interrupted when Miles O’Brien calls\
    \ out, forcing Geordi to abandon his mission mid-motion. His immediate shift from\
    \ murderous focus to feigned normalcy—smiling and agreeing to inspect pattern\
    \ buffers—exposes the fragility of his conditioning. The lingering glance at Vagh\
    \ reveals his internal conflict, while O’Brien’s unwitting intervention prevents\
    \ the assassination but leaves Geordi’s compromised state dangerously exposed.\
    \ This beat underscores the Romulan plot’s vulnerability to chance disruptions\
    \ and the immediate threat Geordi poses to the crew and mission.\n  "
