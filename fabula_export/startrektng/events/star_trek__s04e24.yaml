  title: Troi dismantles Geordi’s false memories
  description: 'In Geordi’s quarters, Deanna Troi methodically challenges his fabricated
    Risa vacation memories—vivid, specific recollections of swimming, a woman named
    Jonek, and even an Andorian waiter’s bumbling service. Geordi clings to these
    details with escalating desperation, his laughter masking growing unease as Troi
    systematically dismantles each claim. When she prompts him to recall the shuttle
