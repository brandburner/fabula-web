acts:
- fabula_uuid: act_2af910674016e8f3
  number: 1
  summary: 'The narrative opens on the Enterprise bridge, where Counselor Troi returns
    from a reunion, reflecting on her career path. Dr. Beverly Crusher, standing command
    during the night shift, informs Troi of Data''s current mission: recovering radioactive
    material from a crashed Federation probe on Barkon Four. Beverly reassures Troi
    that Data will not make contact with the planet''s pre-industrial society, as
    the crash site is far from any settlement. Troi, inspired by Beverly''s command
    role and her own recent reflections, expresses a nascent desire to pursue the
    Bridge Officer''s test, signaling a personal ambition beyond her counseling duties.
    Simultaneously, on Barkon Four, the scene shifts to a pre-industrial village at
    dawn. Garvin, a local magistrate, walks with his young daughter, Gia, when they
    discover a disoriented figure near the village entrance. This figure is Data,
    his Starfleet uniform torn, his combadge missing, and a large Starfleet container
    in hand. He attempts to speak, but only emits a distressing electronic noise,
    a sign of severe damage to his verbal processors. This unsettling image of Data,
    a technologically advanced being stranded and impaired in a primitive setting,
    marks the inciting incident, setting the stage for his memory loss and the subsequent
    contamination.'
  key_moments: []
  scene_numbers:
  - 1
  - 2
- fabula_uuid: act_cd81adcfdf12ef78
  number: 2
  summary: Continuing from the teaser, Garvin, initially protective of Gia, confronts
    the disoriented Data. Data's attempts to communicate result in garbled electronic
    sounds, but his non-threatening demeanor gradually eases Garvin's apprehension.
    As Data's verbal processors slowly repair, he regains the ability to form coherent
    words, though he reveals a complete loss of memory regarding his identity and
    past. Garvin tries to help Data, attempting to give him a name, but it is Gia
    who suggests "Jayden," a name Data accepts. Data recalls only walking from the
    mountains, a journey of significant distance according to Garvin, but nothing
    before that. Garvin's attention then turns to the container Data carries. Data,
    seemingly noticing it for the first time, cannot identify it. Garvin takes the
    container, observing its Starfleet logo and a radiation symbol, along with the
    word "RADIOACTIVE." Data reads the word aloud but does not comprehend its meaning,
    even suggesting it might be his name. Unaware of the inherent danger, Garvin fumbles
    with the latches and opens the container, exposing himself and the village to
    the twisted, burned metal fragments inside, unwittingly initiating the spread
    of contamination.
  key_moments: []
  scene_numbers:
  - 3
  - 4
- fabula_uuid: act_e39ca042cf68c3cf
  number: 3
  summary: On the Enterprise, Troi visits Riker, expressing her intention to take
    the Bridge Officer's test and become a commander. She cites various inspirations,
    including Beverly's example and her own experience commanding the bridge during
    a past crisis. Riker, while supportive, warns her of his strict judgment as her
    evaluator. Meanwhile, on Barkon Four, Talur, the village healer, examines Data.
    She dismisses his unusual appearance—pale skin and gold eyes—as characteristics
    of an "ice-man" from the Vellorian Mountains, attributing them to prolonged exposure
    to harsh conditions. Talur confidently diagnoses Data with memory loss but no
    other illness, showcasing her self-important and limited understanding of his
    true nature. Gia then names Data "Jayden," a name he accepts. Garvin, now calling
    him Jayden, consults Skoran, the village blacksmith, about the metal fragments.
    Skoran, initially suspicious of Data, examines the metal, noting its unusual luster
    and malleability, and agrees to purchase half the fragments for jewelry. During
    their discussion, the wooden base of the anvil inexplicably collapses, trapping
    Skoran's apprentice. Data, without hesitation, effortlessly lifts the heavy anvil,
    revealing his superhuman strength to the stunned villagers and further alienating
    him as an outsider. Later, Garvin experiences fatigue, the first symptom of radiation
    poisoning, which Talur misattributes to a need for fresh air. Data, during dinner,
    challenges Talur's unscientific theories, displaying his inherent logical and
    empirical nature, further establishing his unique perspective in the pre-industrial
    society. Gia, sharing a painful memory of her deceased mother, finds comfort in
    Data's words, as Data himself is drawn to the night sky, a subconscious connection
    to his true origins.
  key_moments: []
  scene_numbers:
  - 5
  - 6
- fabula_uuid: act_5cf7d46cbed9ac85
  number: 4
  summary: Troi undergoes a challenging Engineering Qualification test on the holodeck,
    simulating a red alert crisis on the Enterprise. Despite her efforts, she fails
    to prevent the ship's destruction, leading to a frustrating debrief with Riker.
    He refuses to disclose her error, emphasizing that a Bridge Officer must discover
    solutions independently, leaving Troi annoyed and determined. Concurrently, in
    the Barkonian village, Data attends Talur's class, where she teaches a rudimentary
    theory of elements. Data, unable to reconcile her teachings with his innate knowledge,
    respectfully challenges Talur's reasoning, arguing for empirical evidence over
    superficial observation. Talur, irritated by his intellectual dissent and his
    perceived memory deficit, dismisses his "ideas" and asserts her authority. Shortly
    after, Data and Gia witness a heated argument between Garvin and Skoran over the
    payment for the metal fragments. Garvin, now wearing a metal pin made from the
    fragments, suddenly collapses, displaying blotchy, blistered skin—clear signs
    of radiation poisoning. Talur examines him, admitting her unfamiliarity with the
    symptoms, though she notes "burn marks" and overheating. Data, observing Talur's
    primitive microscope, recognizes its potential for greater magnification. With
    Garvin's permission, Data resolves to conduct his own scientific investigation
    into the illness, enlisting Gia's help to gather supplies. As they leave a shop,
    Skoran and a group of villagers confront them, openly blaming Data for the spreading
    sickness. The villagers' mood turns hostile, forcing Data and Gia to retreat from
    the escalating accusations, highlighting Data's growing isolation and the community's
    fear.
  key_moments: []
  scene_numbers:
