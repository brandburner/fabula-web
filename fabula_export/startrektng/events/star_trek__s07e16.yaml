    description_of_involvement: 'The antimatter containment unit three serves as the
      catalyst for the crisis, its fluctuating magnetic field and impending containment
      failure driving the urgency of the scene. Troi’s failed attempts to eject it—blocked
      by the computer’s refusal—directly lead to the explosion. The unit’s role is
      symbolic: it represents the unresolved technical and emotional ‘containment’
      Troi struggles with, both in the simulation and her own self-awareness. Its
      destruction mirrors her failure to ‘contain’ her impulses and insecurities.'
    status_before_event: Functioning but unstable, with a fluctuating magnetic field
      and risk of containment failure.
