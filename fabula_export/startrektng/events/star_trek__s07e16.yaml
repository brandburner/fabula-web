- fabula_uuid: cand_evt_scene_8e5edf0d8e866d25_01
  global_id: null
  title: Troi defies Riker over test cancellation
  description: 'In her quarters, Troi is deep in study for her Engineering test, surrounded
    by PADDs and a complex engineering diagram, her exhaustion visible but her determination
    unwavering. When Riker enters and abruptly cancels the test, citing her repeated
    failures and lack of technical aptitude, Troi’s initial shock gives way to defiance.
    She challenges his assessment, arguing that bridge command requires more than
    technical memorization, but Riker remains firm, invoking his duty to the ship.
    His refusal to grant her more time to prove herself triggers a moment of introspection:
    Troi repeats his words—*‘My first duty is to the ship’*—and, after a beat of quiet
    realization, exits with renewed purpose, signaling her refusal to accept defeat.
    The exchange exposes her frustration with Starfleet’s rigid expectations and foreshadows
    her growing disillusionment with the no-win scenarios aboard the *Enterprise*,
    particularly as Data’s crisis looms. The scene pivots from personal failure to
    quiet rebellion, marking a turning point in Troi’s arc toward self-assertion and
    command readiness.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e16
  scene_sequence: 9
  sequence_in_scene: 20
  key_dialogue:
  - 'TROI: Here to give me more... encouragement?'
  - 'RIKER: No... actually I''m here to tell you that I''ve decided to cancel the
    rest of your test.'
  - 'TROI: Why? Because I''m not the most technically-minded person on the ship? I
    may have trouble telling the difference between a plasma conduit and a phase inducer,
    but there''s more to being a bridge officer than just memorizing technical manuals.'
  - 'RIKER: That''s right, there is. But even if you spend the next month memorizing
    every technical manual in the computer, I still don''t think you''ll pass the
    test.'
  - 'TROI: Tell me one thing... is there really a solution? Or is this simply a test
    of my ability to handle a no-win situation?'
  - 'RIKER: There is a solution.'
  - 'TROI: Then give me time to find it.'
  - 'RIKER: I can''t. As much as I care about you, my first duty is to the ship. I
    can''t let anyone serve as a Bridge Officer who isn''t qualified. I''m sorry.'
