  global_id: null
  title: Data's identity violently exposed
  description: After proving the metal fragments' lethal radiation to Talur, Data
    is confronted by Skoran and a sickened villager wielding crude weapons. Skoran,
    his skin already marred by radiation, accuses Data of causing the illness, escalating
    into a violent struggle. During the fight, a metal rod tears away Data's synthetic
    skin, revealing his android structure beneath. The villagers recoil in horror,
    fleeing in terror, while Data—stunned—stares at his metallic reflection in the
    mirror, grappling with the revelation that he doesn’t know what he is. This moment
    shatters his fragile human facade, accelerates the narrative urgency to uncover
    his true nature, and forces him into an existential crisis as the villagers’ fear
    turns to violent hostility. The revelation also sets up the villagers’ later frenzy
    and Skoran’s incitement of the mob, while Data’s self-discovery becomes the emotional
    core of the act’s climax.
