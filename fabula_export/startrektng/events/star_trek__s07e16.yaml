  object_involvements:
  - object_uuid: ger_object_227b471d39af
    description_of_involvement: The twisted radioactive metal fragments, scattered
      across Skoran’s blacksmith table, serve as the silent catalyst for the entire
      crisis. Some have been hammered into jewelry—including the pin Garvin wears
      on his shirt—which begins to contaminate him with radiation. The fragments’
      jagged, scorched edges and Starfleet-labeled container (noticed by Data) hint
      at their dangerous origin, but the villagers remain oblivious. Their presence
      foreshadows the illness sweeping through the village, tying Skoran’s greed directly
      to the poisoning.
    status_before_event: Scattered on Skoran’s table, some repurposed into jewelry
      (e.g., Garvin’s pin), emitting invisible radiation. The Starfleet container
      lies nearby, unopened.
    status_after_event: Garvin’s pin and other jewelry pieces remain in circulation,
      continuing to expose villagers to radiation. The fragments on the table are
      now linked to Garvin’s collapse, though their danger is still unrecognized.
    global_id: ger_object_227b471d39af
  - object_uuid: ger_object_2d4e46bd3d56
    description_of_involvement: Garvin’s radioactive metal pin, crafted by Skoran
      from the contaminated fragments, is the direct cause of his radiation poisoning.
      Worn on his shirt during the argument with Skoran, the pin’s contact with his
      skin introduces the radiation, leading to his sudden collapse. The pin’s presence
      on his body—unnoticed until his illness manifests—ties Skoran’s greed directly
      to the crisis, making the object a silent killer. Its discovery later will be
      key to Data’s investigation.
    status_before_event: Pinned to Garvin’s shirt, emitting radiation as he argues
