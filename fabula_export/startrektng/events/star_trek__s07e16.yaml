  global_id: null
  title: Troi Orders Geordi into Lethal Radiation
  description: In a high-stakes holodeck simulation of an engineering crisis, Counselor
    Deanna Troi is forced to make a command decision that tests her moral resolve.
    With the ship at red alert and the primary containment field failing, Worf warns
    that the crawlway to the ODN conduit is saturated with lethal warp plasma radiation.
    Despite Geordi’s confirmation that he could repair the conduit, Troi hesitates—visibly
    struggling with the weight of ordering a crewmember to certain death. After a
    tense pause, she steels herself and issues the order, sending Geordi into the
    crawlway. The moment is raw and emotionally charged, revealing Troi’s internal
    conflict between compassion and command. Riker abruptly terminates the simulation,
    revealing it was a test of her leadership. His validation of her choice—despite
    her self-doubt—marks a turning point in her confidence, though the emotional cost
    lingers. The event mirrors Data’s parallel crisis on Barkon IV, where sacrifice
    and ethical dilemmas define survival, reinforcing the episode’s central theme
    of leadership under impossible circumstances.
