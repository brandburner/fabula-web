      becomes a battleground of ideas—where science clashes with superstition, and
      trust is tested amid the chaos of illness and mob violence. The home’s role
      shifts from a place of rest to a site of desperate innovation, as Data repurposes
      household objects (like the mortar and pestle) for his scientific work.
    observed_atmosphere: Claustrophobic and urgent—the air is thick with the scent
