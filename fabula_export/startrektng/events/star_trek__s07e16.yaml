      holodeck simulation.
    global_id: ger_object_e1f06db2cbcc
  - object_uuid: ger_object_10f5f6b5cdc6
    description_of_involvement: The auxiliary control system is offline, removing
      Troi’s backup option for stabilizing the antimatter breach. Worf’s report—‘Auxiliary
      control is not on-line’—adds to the mounting tension, as it eliminates her ability
      to reroute power or execute overrides. The system’s failure is a narrative device,
      stripping Troi of her safety net and forcing her to confront her limitations.
      It symbolizes the absence of ‘auxiliary’ support (e.g., Riker’s feedback, her
      own technical knowledge) in her journey toward self-sufficiency.
    status_before_event: Offline and unavailable, leaving Troi without a critical
      backup option.
    status_after_event: Remains offline in the reset holodeck simulation, its failure
      a persistent constraint.
    global_id: ger_object_10f5f6b5cdc6
  - object_uuid: ger_object_e8670b496f22
    description_of_involvement: The holodeck pool table, repurposed as a diagnostic
      console, becomes the stage for Troi’s technical downfall. She hunches over it,
      tapping commands amid urgent klaxons, her frustration visible as the simulation
      spirals out of control. The table’s glow—initially a symbol of her authority—flickers
      and dies with the explosion, mirroring her loss of control. It serves as a metaphor
      for the ‘pool’ of her knowledge, which she fails to navigate effectively under
      pressure.
    status_before_event: Active, displaying LCARS diagnostics and tracking the antimatter
      breach.
    status_after_event: Destroyed in the explosion, ceasing to exist in the reset
      holodeck simulation.
    global_id: ger_object_e8670b496f22
  - object_uuid: ger_object_676971c0d4de
    description_of_involvement: The neodyne relay is a critical but failing component
      in the holodeck simulation, its overload directly contributing to the containment
      breach. Geordi warns Troi that it ‘isn’t holding,’ and its failure—along with
      the ejection system’s termination—seals the fate of the simulation. The relay
      functions as a metaphor for Troi’s own ‘relay’ between emotion and logic, which
      fails under pressure. Its breakdown underscores her inability to ‘reroute’ her
      approach when faced with technical constraints.
    status_before_event: Functioning but unstable, with rising pressure and risk of
