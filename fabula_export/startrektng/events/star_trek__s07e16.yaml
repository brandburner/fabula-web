  key_dialogue:
  - 'BEVERLY: Positronic net is on-line... sub-processor relays in place... neuro-electrical
    systems enabled.'
  - 'DATA: I do not know. I am... surprised to find myself here. I thought I was on
    Barkon Four.'
  - 'PICARD: What''s the last thing you remember?'
  - 'DATA: I had located the crashed Federation probe and collected the radioactive
    fragments. I was attempting to download the sensor logs from the probe''s on board
    computer when there was a... power surge. I believe the surge overloaded my positronic
    matrix. After that... I have no memory until this moment.'
  - 'RIKER: We don''t know much about what happened either... except you apparently
    saved an entire village from radiation poisoning...'
  - 'BEVERLY: And you were a very special friend to a little girl.'
  - 'DATA: ((to Troi)) Counselor, have you been promoted during my absence?'
  - 'TROI: That''s right.'
  - 'TROI: ((joking)) Which means you can call me ''sir'' from now on.'
  - 'DATA: Yes, sir.'
