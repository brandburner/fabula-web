    emotional_state: "\n        Introspective and slightly unsettled, her reunion\
      \ experience has left her questioning her path, and Data’s silence—combined\
      \ with Beverly’s forced reassurances—heightens her unease. She is not alarmed,\
      \ but her empathic senses are attuned to the undercurrents of tension in the\
      \ room.\n      "
    goals:
