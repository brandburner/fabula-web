  - 'GEORDI: I... think so.'
  - 'TROI: Then do it. That''s an order.'
  - 'TROI: I always knew that was part of being in command... I thought I was prepared
    for it... but when the moment came, I hesitated.'
  - 'RIKER: You did exactly what you needed to do. You tried every alternative...
    looked at all the options, and in the end you made the hard choice.'
