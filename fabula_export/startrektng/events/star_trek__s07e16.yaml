  title: Riker validates Troi’s command choice
  description: After Troi orders Geordi into a lethal radiation zone during a high-stakes
    holodeck simulation—hesitating but ultimately making the call—Riker abruptly terminates
    the program and reveals it was a test of her command decision-making. His abrupt
    shift from adversarial observer to mentor (addressing her as 'Commander') validates
    her difficult choice, though the emotional weight lingers. The moment bridges
    Troi’s personal growth and her evolving role in the chain of command, forcing
    her to confront the moral cost of leadership. Riker’s validation, while affirming,
    underscores the irreversible nature of command decisions, leaving Troi with a
    sobering realization of her own capacity for hard choices.
