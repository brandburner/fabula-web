- fabula_uuid: cand_evt_scene_c61c384195ed1aa5_01
  global_id: null
  title: Data proves metal’s lethal threat to Talur
  description: "\n  In Garvin’s home, Data conducts a controlled experiment to demonstrate\
    \ the radioactive properties of the metal fragments, using a luminous cloth screen\
    \ to visualize the invisible particle emissions. When Talur, the village healer,\
    \ initially dismisses the phenomenon as a trick, Data counters by blocking the\
    \ emissions with the Starfleet container—proving its protective function. Though\
    \ skeptical, Talur’s resistance wavers as the empirical evidence mounts, and she\
    \ reluctantly agrees to gather all metal fragments in the village for containment.\
    \ Their fragile cooperation is abruptly shattered when Skoran and an armed villager\
    \ burst in, accusing Data of causing the radiation sickness. During the violent\
    \ confrontation, Data’s synthetic skin is torn away, exposing his android frame—a\
    \ revelation that horrifies the attackers and plunges Data into a crisis of self-identity.\
    \ The scene pivots from scientific collaboration to violent confrontation, escalating\
    \ the narrative urgency while forcing Talur to confront the reality of the threat\
    \ and Data to grapple with his hidden nature.\n\n  The event serves as a turning\
    \ point: Talur’s agreement to help secures a critical step in mitigating the radiation\
    \ crisis, but the violent exposure of Data’s android identity accelerates the\
    \ villagers’ fear and hostility, setting the stage for his eventual sacrifice.\
    \ Thematically, it underscores the tension between empirical truth and superstition,\
    \ as well as the cost of hidden identities in a community already fractured by\
    \ illness and distrust.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e16
  scene_sequence: 11
  sequence_in_scene: 24
  key_dialogue:
  - |-
    TALUR: Where is this pattern of light coming from?
    DATA: I believe a stream of particles is emanating from the metallic pendant and hitting the cloth.
    TALUR: ((skeptical)) I don't see any... particles coming from the pendant.
  - |-
    DATA: No. It is empirical data. I believe that the fragments were originally placed in this container to protect people from accidental exposure. The word 'radioactive' may be a warning about the dangerous nature of the metal.
    TALUR: All right... let's say for the moment that you're right and there are... invisible particles coming from this metal. What should we do?
  - |-
    SKORAN: ((threatening)) There you are...
    DATA: If you are referring to the illness, you are partially correct, but it is more complex than that. You see, the metal fragments that -
    SKORAN: ((horrified)) What... what are you?
  - 'DATA: I do not know.'
