- fabula_uuid: cand_evt_scene_2d799b299783599e_01
  global_id: null
  title: Troi fails engineering crisis simulation
  description: During a high-stakes holodeck simulation of an antimatter containment
    breach aboard the *Enterprise*, Counselor Deanna Troi—unprepared for engineering
    emergencies—attempts to execute critical protocols but fails to stabilize the
    system. Her rushed, incorrect commands (ejecting the unit, then misdirecting power
    relays) trigger a catastrophic explosion, destroying the simulated engineering
    section. The failure exposes her vulnerability in technical crises, underscoring
    the crew’s reliance on specialized expertise like Geordi’s. Riker’s subsequent
    refusal to disclose her mistakes forces Troi to confront her blind spots, framing
    this as a pivotal moment in her Bridge Officer’s test arc. The event foreshadows
    the narrative’s broader theme of expertise and sacrifice, particularly Data’s
    impending self-sacrifice on Barkon IV, where technical precision will also be
    the difference between life and death. Troi’s frustration lingers as Riker exits,
    leaving her to grapple with her inadequacy in a domain where logic and procedure—not
    empathy—dictate survival.
