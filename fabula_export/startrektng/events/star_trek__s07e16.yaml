  object_involvements:
  - object_uuid: ger_object_057223512e5e
    description_of_involvement: The ODN conduit is the plot device that drives the
      crisis, its severance between Main Engineering and the antimatter storage deck
      creating an urgent repair scenario. Troi’s order to send Geordi into the crawlway
      to fix it is the pivotal moment of the event, as the conduit symbolizes both
      the technical failure and the moral failure of command—Geordi’s potential death
      is the 'cost' of restoring functionality. The conduit’s role is purely functional,
      yet its presence looms large in the dialogue and subtext, representing the inescapable
      trade-offs of leadership.
    status_before_event: Severed and non-functional, saturated with lethal warp plasma
      radiation, rendering it inaccessible without extreme risk.
    status_after_event: Unchanged in the simulation (as the program is terminated
      before repair), but its symbolic role as the 'price of command' persists in
      Troi’s reflection.
    global_id: ger_object_057223512e5e
  - object_uuid: ger_object_4b8f84a2c1a3
    description_of_involvement: The primary containment field control system is the
      catalyst for the crisis, its failure triggering the red alert and the subsequent
      chain of events. While it is never directly interacted with in this event, its
      malfunction is the reason Geordi must attempt the repair, making it the unseen
      architect of Troi’s dilemma. The system’s collapse forces Troi to choose between
      inaction (and potential catastrophic failure) or ordering a crewmate to their
      death, embodying the no-win scenarios inherent in command.
    status_before_event: Failed, destabilizing the warp plasma containment and saturating
      the crawlway with radiation.
    status_after_event: Unchanged in the simulation (program terminated), but its
      role as the 'unseen villain' of the scenario is implied in the aftermath.
    global_id: ger_object_4b8f84a2c1a3
  - object_uuid: ger_object_1c0fe02f5e8e
    description_of_involvement: The Jefferies Tube crawlway to the ODN conduit is
      the physical threshold Geordi must cross to attempt the repair, its narrow confines
      and lethal radiation making it a metaphor for the 'point of no return' in Troi’s
      command decision. The crawlway’s description—'saturates with lethal warp plasma
      radiation'—amplifies the stakes, turning Geordi’s exit into a silent, symbolic
      sacrifice. The doors closing behind him serve as a visual metaphor for the irreversibility
      of Troi’s order, leaving her alone with the weight of her choice.
    status_before_event: Accessible but hazardous, with active warp plasma radiation
      warnings and structural integrity compromised by the crisis.
    status_after_event: Unchanged in the simulation (program terminated), but its
      role as the 'path to damnation' lingers in Troi’s psyche.
    global_id: ger_object_1c0fe02f5e8e
  - object_uuid: ger_object_e60fe13589ef
    description_of_involvement: The holodeck serves as the primary narrative space
      for this event, its interactive simulation chamber transforming into a hyper-realistic
      recreation of Main Engineering under red alert. The holodeck’s ability to generate
      lethal radiation, collapsing containment fields, and urgent alarms creates a
      visceral crisis that blurs the line between simulation and reality. When Riker
      terminates the program, the holodeck’s instantaneous dissolution of Worf, Geordi,
      and the engineering crew underscores the artificiality of the scenario, yet
      the emotional weight of Troi’s order remains undiminished. The holodeck thus
      functions as both a testing ground and a psychological crucible, forcing Troi
      to confront the consequences of command in a controlled yet intensely real environment.
    status_before_event: Active and fully operational, generating a detailed simulation
      of Main Engineering in crisis mode, complete with holographic crew, functional
      consoles, and environmental hazards.
    status_after_event: Deactivated by Riker’s command, returning to its default state
      as an empty holodeck chamber, with all simulated elements—crew, alarms, radiation—erased.
    global_id: ger_object_e60fe13589ef
