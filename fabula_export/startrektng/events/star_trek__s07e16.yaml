  title: Data reveals radiation’s cellular destruction
  description: 'In Garvin’s home, now repurposed as a makeshift laboratory, Data demonstrates
    his refined microscope to Talur, revealing irrefutable evidence of cellular damage
    in the villagers—proof that their affliction stems from radioactive contamination
    rather than infection. Talur’s suspicion of Data’s lab activities forces this
    scientific revelation, which deepens the crisis: the villagers’ suffering is now
    directly tied to Data’s actions, escalating the urgency of his self-sacrificial
    mission. Gia’s weakened state and the pendant she wears (made from the radioactive
    fragments Data sold to Skoran) further implicates him, while Talur’s growing distrust
    underscores the emotional and moral stakes of his discovery. The moment marks
    a turning point, shifting the narrative from suspicion to certainty about the
    cause of the illness, and from external conflict to an internal reckoning for
    Data as he confronts his unintended role in the villagers’ suffering.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e16
  scene_sequence: 8
  sequence_in_scene: 17
  key_dialogue:
  - 'TALUR: Jayden... what are you doing?'
  - 'DATA: I am studying tissue samples from Garvin and Gia in an attempt to isolate
    the cause of the illness.'
  - 'TALUR: Gia?'
  - 'DATA: Yes. She is also beginning to show signs of the illness.'
  - 'DATA: As you can see, the cellular damage is quite extensive. However, based
    on the interstitial transparency and membrane integrity, I do not believe this
    is an infection or any form of communicable disease.'
  - 'TALUR: Still... it does seem to be more than a coincidence that shortly after
    you arrived, people started to become ill.'
  - 'DATA: I agree.'
  - 'DATA: When did you begin wearing that pendant?'
  - 'GIA: Two days ago. Father bought it from Skoran. Why?'
  - 'DATA: This was made from one of the metal fragments I sold to Skoran...'
