- fabula_uuid: cand_evt_scene_75346361c2153634_01
  global_id: null
  title: Data’s Memory Reboot and Moral Dissonance
  description: "\n  In Sickbay, Beverly Crusher reactivates Data after his memory\
    \ wipe on Barkon IV, where he unknowingly contaminated a village with radioactive\
    \ materials. As Data sits up, disoriented, he expresses confusion about his last\
    \ memory—downloading probe logs—while noting the physical damage to his uniform\
    \ from the villagers' attack. Riker and Beverly reveal that Data not only saved\
    \ the villagers from radiation poisoning but also formed a deep bond with a child,\
    \ Gia. Data processes this information with visible cognitive dissonance: his\
    \ logical framework cannot reconcile his erased past with the evidence of his\
    \ compassionate actions. The revelation forces him to confront an existential\
    \ question—who is he when his identity is fragmented?—while also highlighting\
    \ the crew’s emotional investment in his well-being. Troi’s sudden promotion to\
    \ Commander, announced with playful authority, further unsettles Data, adding\
    \ a layer of hierarchical tension to his already precarious state. The scene pivots\
    \ from physical recovery to moral reckoning, as Data’s struggle to reconcile his\
    \ lost humanity with the crew’s account of his heroism becomes the emotional core\
    \ of the moment.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e16
  scene_sequence: 15
