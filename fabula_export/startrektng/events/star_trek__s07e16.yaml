  object_involvements:
  - object_uuid: ger_object_227b471d39af
    description_of_involvement: The twisted radioactive metal fragments, scattered
      across Skoran’s blacksmith table, serve as the silent catalyst for the entire
      crisis. Some have been hammered into jewelry—including the pin Garvin wears
      on his shirt—which begins to contaminate him with radiation. The fragments’
      jagged, scorched edges and Starfleet-labeled container (noticed by Data) hint
      at their dangerous origin, but the villagers remain oblivious. Their presence
      foreshadows the illness sweeping through the village, tying Skoran’s greed directly
      to the poisoning.
    status_before_event: Scattered on Skoran’s table, some repurposed into jewelry
      (e.g., Garvin’s pin), emitting invisible radiation. The Starfleet container
      lies nearby, unopened.
    status_after_event: Garvin’s pin and other jewelry pieces remain in circulation,
      continuing to expose villagers to radiation. The fragments on the table are
      now linked to Garvin’s collapse, though their danger is still unrecognized.
    global_id: ger_object_227b471d39af
  - object_uuid: ger_object_2d4e46bd3d56
    description_of_involvement: Garvin’s radioactive metal pin, crafted by Skoran
      from the contaminated fragments, is the direct cause of his radiation poisoning.
      Worn on his shirt during the argument with Skoran, the pin’s contact with his
      skin introduces the radiation, leading to his sudden collapse. The pin’s presence
      on his body—unnoticed until his illness manifests—ties Skoran’s greed directly
      to the crisis, making the object a silent killer. Its discovery later will be
      key to Data’s investigation.
    status_before_event: Pinned to Garvin’s shirt, emitting radiation as he argues
      with Skoran.
    status_after_event: Still attached to Garvin’s shirt as he collapses, now a critical
      clue in Data’s investigation. Its danger remains unknown to the villagers.
    global_id: ger_object_2d4e46bd3d56
  - object_uuid: ger_object_512cbd6082f2
    description_of_involvement: Talur’s small piece of wood is the centerpiece of
      her lesson, used to ‘prove’ her theory of elemental composition. She lights
      one end with a candle, demonstrating how ‘fire’ can be ‘encouraged’ from within
      the wood. Data seizes on this moment to dismantle her analogy, arguing that
      wood’s combustibility does not mean it *contains* fire. The wood becomes a symbol
      of the villagers’ pseudoscientific worldview—and Data’s challenge to it—before
      being discarded as the lesson ends.
    status_before_event: Held by Talur, unlit, as part of her lesson props. The candle
      is lit nearby, ready for the demonstration.
    status_after_event: Charred and smoldering after Talur’s demonstration, left aside
      as the class disperses. Its role as a teaching tool is undermined by Data’s
      critique.
    global_id: ger_object_512cbd6082f2
  - object_uuid: ger_object_a3ddbd596a58
    description_of_involvement: Talur’s primitive microscope, a hand-held device with
      a large magnifying lens, is her last resort in diagnosing Garvin. She examines
      his blotchy skin, noting burn-like lesions, but the microscope’s poor magnification
      and lack of achromatic lenses leave her unable to identify radiation poisoning.
      Data takes the microscope, critiques its flaws, and implies that better tools
      could reveal the truth—a moment that foreshadows his scientific solution to
      the crisis. The object embodies the villagers’ technological limitations.
    status_before_event: Stored in Talur’s medical bag, unused until Garvin’s collapse.
    status_after_event: Handed to Data after Talur’s failed examination, now in his
      possession as he prepares to investigate. Its inadequacy is a stark contrast
      to Starfleet technology.
    global_id: ger_object_a3ddbd596a58
