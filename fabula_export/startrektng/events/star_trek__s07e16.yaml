  scene_sequence: 1
  sequence_in_scene: 2
  key_dialogue: &id003
  - 'BEVERLY: Data''s away on assignment. A Federation deep space probe went off course
    and crashed on Barkon Four. Some of the material in the casing is radioactive,
    so Data was sent to recover it before it contaminates the biosphere.'
  - 'TROI: Isn''t Barkon Four inhabited?'
  - 'BEVERLY: There''s a pre-industrial society, but the probe crashed over a hundred
    kilometers from the nearest settlement. Data won''t have to make contact with
    any of the Barkonians.'
  - 'RAINER: Commander... there''s been no response from Commander Data to our signal.'
  - 'BEVERLY: No. I wanted to let Data know that we''ll have to delay picking him
    up for a couple of days. We have orders to rendezvous with the Lexington and take
    medical supplies to the Taranko Colony. I''m sure he''s fine... it''s a very routine
    mission.'
