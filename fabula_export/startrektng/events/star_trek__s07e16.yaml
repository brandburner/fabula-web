  - object_uuid: ger_object_512cbd6082f2
    description_of_involvement: Talur’s small piece of wood is used as a demonstration
      prop during her lesson on the classical elements. She lights it with a candle
      to illustrate the presence of ‘fire’ within the wood, reinforcing her pseudoscientific
      teachings. Data challenges this analogy, arguing that wood’s combustibility
      does not mean it ‘contains’ fire—a moment that exposes the gap between Barkonian
      tradition and empirical science. The wood’s burning smoke and embers serve as
      a visual metaphor for the clash between old and new knowledge, as well as the
      villagers’ growing unease.
    status_before_event: Held by Talur in the town square, intact and unburned. Used
      as a teaching aid to demonstrate the ‘fire’ element.
    status_after_event: Partially burned by the candle flame, now charred and smoldering.
      Discarded or set aside after the lesson, symbolizing the rejection of Talur’s
      teachings by Data and, by extension, the villagers’ crisis of faith.
    global_id: ger_object_512cbd6082f2
  - object_uuid: ger_object_a3ddbd596a58
    description_of_involvement: Talur’s primitive microscope is used to examine Garvin’s
      blotchy skin and blisters, but its limited magnification and lack of precision
      prevent her from identifying the true cause of his illness. Data later picks
      it up, critiques its design (noting the need for an achromatic lens and increased
      focal length), and expresses interest in improving it. The microscope becomes
      a symbol of the technological gap between the villagers and Data, as well as
      the urgent need for better tools to diagnose and treat the radiation poisoning.
      Its failure in Talur’s hands foreshadows Data’s role in saving the village.
    status_before_event: Stored in Talur’s medical bag, unused until she retrieves
