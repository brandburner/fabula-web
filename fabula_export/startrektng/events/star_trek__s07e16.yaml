    emotional_state: Defiant yet deteriorating—his pride in standing up to Skoran
      masks his growing physical distress, and his collapse reveals the fragility
      beneath his tough exterior. His trust in Data is born of desperation, not full
      conviction.
    goals:
    - To secure a fair price for the metal fragments, ensuring his family’s stability.
    - To uncover the cause of his illness, even if it means relying on an outsider.
    what_happened: Garvin argues fiercely with Skoran over the price of the radioactive
      metal fragments, his voice rising with anger as he insists on the agreed-upon
      sum. His skin is already showing early signs of radiation exposure—blotchy red
      patches and small blisters—but he attributes his weakness to the argument. When
      Data intervenes, Garvin weakens further, his hand flying to his head as a wave
      of dizziness hits him. Skoran catches him before he falls, but Garvin’s collapse
      is swift and alarming. He weakly defends Data’s reliability to Talur later,
      granting permission for Data to investigate his illness—a rare moment of trust
      in the outsider amid his pain.
