- fabula_uuid: act_97b9d821c6811c2d
  number: 5
  summary: 'Data transforms Garvin''s dining room into a sophisticated laboratory,
    utilizing homemade equipment, including a refined microscope. He studies tissue
    samples from Garvin and Gia, who now exhibits symptoms of the mysterious illness.
    Talur, astonished by Data''s advanced instruments, observes his work. Data explains
    his scientific methodology, ruling out infection and seeking a common, recent,
    and unusual causal factor for the illness. Talur, still clinging to her limited
    understanding, suggests Data''s arrival as the only unusual commonality. Data
    considers this possibility but dismisses it due to Talur''s own lack of symptoms
    despite extensive contact. As Gia enters, visibly ill, Data notices the metal
    pendant she wears, realizing it was crafted from the radioactive fragments he
    sold to Skoran. This observation provides Data with a critical breakthrough, pinpointing
    the source of the spreading sickness. Simultaneously, Riker cancels Troi''s Bridge
    Officer''s test, convinced she is not suited for command, sparking her anger and
    determination. Defying Riker, Troi re-enters the holodeck simulation, facing the
    same crisis. This time, she makes the agonizing decision to order Geordi into
    a warp plasma shaft, a fatal act necessary to save the ship. Riker appears, confirming
    she passed, explaining the test''s true purpose: the capacity to make "the hard
    choice." Back in the village, Data demonstrates his theory to a skeptical Talur,
    using a luminescent screen to show invisible particles emanating from the metal
    pendant, which are blocked by the Starfleet container. He deduces the metal is
    "radioactive" and dangerous, instructing Talur to collect all fragments. As Talur
    leaves, Skoran and two men, armed and hostile, confront Data. During the ensuing
    struggle, Data''s skin is torn, revealing his metallic endoskeleton. The men recoil
    in horror and flee, leaving Data to confront his android reflection, shocked by
    the revelation of his true identity.'
  key_moments: []
  scene_numbers:
  - 9
  - 10
- fabula_uuid: act_a87fefa2d584e27f
  number: 6
  summary: In Garvin's home, Skoran, fueled by fear and prejudice, incites the villagers
    to hunt Data, branding him a dangerous "creature," despite Garvin's weak protestations
    from his sickbed. Talur departs, leaving Gia to tend to her father. Data, his
    exposed metallic face partially concealed by a scarf, appears to Gia, admitting
    his uncertainty about his identity but affirming his desire to help. Gia, though
    initially recoiling from his true visage, reaffirms her trust in him. Data works
    frantically for several hours in his makeshift lab, finally discovering a compound
    that neutralizes the harmful particles causing the illness. He administers this
    cure to a recovering Garvin and a visibly improving Gia. Recognizing the villagers'
    fear and distrust, Data decides to pour the potent compound into the village well,
    their sole water source, ensuring everyone receives the cure. He heads to the
    deserted town square, but Skoran and a mob of armed, feverish villagers intercept
    him. Despite their accusations and threats, Data manages to fling back the well
    cover and begins pouring the liquid. Skoran, in a desperate act, impales Data
    with a spear, causing sparks to fly from his back. Data, with his final act, empties
    the bucket into the well before collapsing and dying. Talur arrives, finds Data
    dead, and examines the empty bucket, a somber testament to his sacrifice. Later,
    Riker and Beverly, disguised as natives, arrive in the now-healthy village. They
    encounter a fully recovered Gia, who points to Data's crude grave, explaining
    he, whom they called Jayden, saved them from the sickness caused by the metal
    fragments, which were subsequently buried. Riker and Beverly, realizing the extent
    of Data's heroism, use a tricorder to confirm his deactivated state and plan to
    beam him and the probe fragments back to the Enterprise. On the ship, Data is
    reactivated but has no memory of his time on Barkon Four or his heroic sacrifice.
    He notes Troi's new Commander pips, puzzled by her promotion, his own profound
    journey and ultimate selflessness now erased from his memory.
