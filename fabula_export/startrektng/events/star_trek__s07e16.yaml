  title: Troi’s Reunion Reckoning and Beverly’s Command Confession
  description: "\n  Deanna Troi returns from a Carvin Institute reunion visibly unsettled,\
    \ her introspective mood hinting at unresolved professional or personal questions.\
    \ She finds Beverly Crusher unexpectedly commanding the bridge during the night\
    \ shift—a role Beverly admits she actively sought, revealing a latent ambition\
    \ to expand beyond her medical duties. Their conversation exposes Troi’s quiet\
    \ dissatisfaction with her own trajectory (implied by her probing questions about\
    \ Beverly’s rank pursuit) while Beverly’s candid admission about enjoying command\
    \ subtly foreshadows Troi’s later decision to test for bridge officer status.\
    \ The scene’s tension escalates when Data’s silence from Barkon IV is noted, planting\
    \ early concern about his mission. The exchange contrasts Troi’s emotional vulnerability\
    \ with Beverly’s pragmatic confidence, both surfacing amid the crew’s unspoken\
    \ anxiety over Data’s absence. The dialogue’s subtext—Beverly’s unspoken pride\
    \ in command, Troi’s unarticulated restlessness—drives the scene’s emotional weight,\
    \ while the communication failure with Data serves as a narrative hook for the\
    \ impending crisis.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e16
  scene_sequence: 1
  sequence_in_scene: 1
  key_dialogue: &id001
  - 'TROI: Beverly... you don''t usually stand a watch on the Bridge even when Data''s
    not here... why this time?'
  - 'BEVERLY: I volunteered tonight. I like to get in a little Bridge time now and
    then... stay on top of operations... tactical procedures... And the truth is...
    I like it. Not every doctor gets to command a starship... even if it is only the
    night shift.'
  - 'TROI: May I ask you a personal question... what made you decide to become a commander?
    I mean, you didn''t need the rank in order to be Chief Medical Officer... so why
    put yourself through all the extra work?'
  - 'BEVERLY: I don''t know... I never gave much thought to my rank for a long time...
    it seemed pretty trivial compared to being a doctor. But then, about eight years
    ago, I began to feel like I wanted to... stretch myself a little.'
  - 'RAINER: Commander... there''s been no response from Commander Data to our signal.'
  - 'TROI: But he''s not responding.'
