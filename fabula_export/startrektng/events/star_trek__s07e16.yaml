- fabula_uuid: cand_evt_scene_b8ccec47654b7bc7_02
  global_id: null
  title: Data reveals his android nature to Gia
  description: 'In the aftermath of Skoran’s mob inciting a hunt for Data, Gia—already
    weakened by radiation sickness—finds herself torn between her father’s fading
    trust in ''Jayden'' and the villagers’ growing fear of him as a demonic ''creature.''
    When Data returns to the home, he reveals his true metallic face to Gia, a moment
    of raw vulnerability that tests her faith. Gia recoils at first, but her resolve
    holds; she doesn’t flee, instead listening as Data explains his desperate mission
    to cure the villagers. His urgency is palpable—he’s racing against Skoran’s return
    and the villagers’ worsening condition. After hours of frantic work, Data synthesizes
    a cure, tests it on Garvin (who begins recovering), and administers it to Gia.
    The scene pivots from emotional revelation to pragmatic action: Data devises a
    plan to distribute the cure through the village well, knowing the villagers will
    never trust him directly. Gia’s fading consciousness underscores the stakes—her
    survival depends on Data’s success, and his sacrifice is now inevitable. The moment
    cements their bond, transforming Gia from a skeptical ally into a silent partner
    in his mission, while Data’s selflessness becomes the moral counterpoint to the
    villagers’ fear-driven violence.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e16
  scene_sequence: 12
  sequence_in_scene: 27
  key_dialogue: &id027
  - 'GIA: Jayden. Everyone''s looking for you. Skoran said that you''re some kind
    of creature.'
  - 'DATA: I do not know what I am. But I am not like you.'
  - 'GIA: I know... you''re an Ice-man. We talked about that...'
  - 'DATA: No. I am not...'
  - 'GIA: Jayden... why are you wearing that scarf?'
  - 'DATA: I do not wish to scare you.'
  - 'GIA: I won''t be afraid. Take it off.'
  - 'DATA: I understand your reaction. I must admit, I do not know what I am. But
    I do not wish to harm you. You or Garvin or anyone else. I only wish to help...
    to find a cure for the illness.'
  - 'DATA: Gia... I believe I have found the answer.'
  - 'GIA: You... you found a cure?'
  - 'DATA: I believe so.'
  - 'DATA: I must administer this to everyone in the village, but I do not think they
    will trust me after what happened with Skoran.'
  - 'GIA: I could... tell them...'
  - 'DATA: I am afraid they will not believe you either. Gia, is the well in the town
    square the only source of water for this village?'
