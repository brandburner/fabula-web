  title: Villagers Blame Data for Radiation
  description: 'Data and Gia exit a shop with supplies for his makeshift lab, only
    to be confronted by Skoran and a growing mob of villagers. The apprentice—now
    visibly sick with the same symptoms as Garvin—accuses Data of causing the illness,
    escalating the crowd’s hostility. Data, recognizing the danger, attempts to leave
    with Gia, but Skoran’s outburst ("Get out of here! Go back where you came from!")
    forces their retreat. The scene underscores Data’s alienation: his scientific
    efforts are met with fear and blame, while the villagers’ refusal to trust him—despite
    his attempts to help—deepens his existential crisis. The confrontation also raises
    the stakes for the village’s survival, as the radiation’s spread is now undeniable,
    and Data’s self-sacrifice becomes the only viable solution to undo the damage
    he’s caused. The moment marks a turning point, shifting the narrative from investigation
    to survival, with Data’s isolation now complete.'
