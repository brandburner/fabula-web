  - object_uuid: ger_object_227b471d39af
    description_of_involvement: The twisted radioactive metal fragments, displayed
      on Skoran’s table and crafted into jewelry (including Garvin’s pin), serve as
      the silent catalyst for the villagers’ crisis. Their contamination goes unnoticed
      until Garvin collapses, his symptoms (blotchy skin, blisters, fever) directly
      linked to his handling of the fragments. Data’s later investigation will reveal
      their true danger, but for now, they symbolize the unseen threat lurking beneath
      the village’s traditional way of life. Their presence foreshadows the broader
      contamination of Barkon IV and the urgent need for a solution.
    status_before_event: Displayed on Skoran’s table in the blacksmith’s shop, some
