      \ sadness, explaining how he was killed by the villagers out of fear but saved\
      \ them from radiation sickness by contaminating the well. She points to his\
      \ grave marker and mentions the buried metal fragments. Her reflection on Data’s\
      \ real name ('Data') and her departure mark her as a key witness to his heroism,\
      \ bridging the gap between the villagers' fear and the crew’s understanding\
      \ of his actions.\n      "
    observed_status: "\n        Gia, a young villager, is approached by Riker and\
