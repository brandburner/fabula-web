      with precise, deliberate movements, setting down the bucket of synthesized cure.
      As Skoran and the mob approach, he turns to face them, his voice calm and sincere
      as he declares his intent to help. When Skoran charges, Data flings back the
      well cover and begins pouring the cure into the well, his actions unshaken even
      as Skoran impales him with a spear. He jerks spasmodically as sparks erupt from
      his wound, but his final act is to ensure the bucket is emptied into the well
      before collapsing dead, his body crumpling beside the well.
