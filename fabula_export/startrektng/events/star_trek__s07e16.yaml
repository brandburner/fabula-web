      bonds and the destructive potential of fear. Their collective action, though
      driven by survival instincts, results in a tragic outcome that will haunt them
      long after. The villagers’ reliance on Skoran’s leadership and their willingness
      to follow him into violence reflect deeper institutional dynamics, where fear
      and paranoia can override reason and compassion. Talur’s role as the healer
