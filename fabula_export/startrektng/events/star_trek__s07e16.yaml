  global_id: null
  title: Data’s impalement and final sacrifice
  description: 'In the deserted town square at night, Data—now fully aware of the
    villagers’ suffering and his own role in causing it—attempts to administer the
    cure he synthesized by pouring it into the village well. His actions are interrupted
    by Skoran and a mob of feverish, hostile townspeople, who accuse him of bringing
    the plague. Skoran, delirious with radiation sickness, impales Data with a spear
    as he finishes emptying the bucket into the well. Data collapses and dies, his
    final act ensuring the villagers’ survival. Talur, the healer, kneels beside his
    body, examining the bucket and realizing the truth of his sacrifice. The scene
    underscores the tragic irony of Data’s redemption: his restored humanity and selflessness
    are met with violence and misunderstanding, yet his death saves the very people
    who rejected him. The moment also marks the culmination of his arc—from amnesiac
    outsider to selfless savior—while leaving the villagers to grapple with the cost
    of their fear and prejudice.'
