    global_id: ger_object_2d4e46bd3d56
  - object_uuid: ger_object_512cbd6082f2
    description_of_involvement: Talur’s small piece of wood is the centerpiece of
      her lesson, used to ‘prove’ her theory of elemental composition. She lights
      one end with a candle, demonstrating how ‘fire’ can be ‘encouraged’ from within
      the wood. Data seizes on this moment to dismantle her analogy, arguing that
      wood’s combustibility does not mean it *contains* fire. The wood becomes a symbol
      of the villagers’ pseudoscientific worldview—and Data’s challenge to it—before
      being discarded as the lesson ends.
    status_before_event: Held by Talur, unlit, as part of her lesson props. The candle
      is lit nearby, ready for the demonstration.
    status_after_event: Charred and smoldering after Talur’s demonstration, left aside
      as the class disperses. Its role as a teaching tool is undermined by Data’s
      critique.
    global_id: ger_object_512cbd6082f2
  - object_uuid: ger_object_a3ddbd596a58
    description_of_involvement: Talur’s primitive microscope, a hand-held device with
      a large magnifying lens, is her last resort in diagnosing Garvin. She examines
      his blotchy skin, noting burn-like lesions, but the microscope’s poor magnification
      and lack of achromatic lenses leave her unable to identify radiation poisoning.
      Data takes the microscope, critiques its flaws, and implies that better tools
      could reveal the truth—a moment that foreshadows his scientific solution to
      the crisis. The object embodies the villagers’ technological limitations.
    status_before_event: Stored in Talur’s medical bag, unused until Garvin’s collapse.
    status_after_event: Handed to Data after Talur’s failed examination, now in his
      possession as he prepares to investigate. Its inadequacy is a stark contrast
      to Starfleet technology.
    global_id: ger_object_a3ddbd596a58
