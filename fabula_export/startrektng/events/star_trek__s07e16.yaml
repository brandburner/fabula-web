- fabula_uuid: cand_evt_scene_b8ccec47654b7bc7_03
  global_id: null
  title: Data devises covert well cure
  description: 'After Skoran and the villagers depart to hunt him down, Data reveals
    his android nature to Gia, who—though visibly shaken—remains loyal. He then spends
    hours synthesizing a cure from the radioactive fragments, testing it on Garvin’s
    skin samples before administering it to Gia. When she confirms the well is the
    village’s sole water source, Data decides to secretly dose it, knowing the villagers’
    distrust will prevent direct distribution. This moment crystallizes his moral
    dilemma: prioritizing collective survival over transparency, even as it risks
    deepening their fear of him. The scene underscores his isolation, the villagers’
    desperation, and the irreversible consequences of his presence—both as a savior
    and a scapegoat.'
