  - character_uuid: ger_agent_f2c5f532ddd2
    emotional_state: A volatile mix of embarrassment, defensiveness, and self-critical
      anger, masking a deeper fear of inadequacy in a technical domain.
    goals:
    - To prove she can handle the engineering crisis despite her lack of technical
      training.
    - To salvage the simulation and avoid failing the test, even as her commands worsen
      the situation.
    what_happened: "\n      Deanna Troi, standing at the holodeck’s pool table console,\
      \ attempts to manage the antimatter containment breach with growing desperation.\
      \ She issues a series of incorrect commands—first ordering auxiliary control\
      \ (which is offline), then misdirecting power to the failing neodyne relay after\
      \ Geordi’s warning. When the computer blocks her ejection command, she panics,\
      \ and her final misstep triggers the explosion. Post-blast, she stands alone\
      \ on the holodeck grid, her frustration palpable as Riker reveals her test failure.\
      \ Her sarcastic retorts and insistence on knowing her mistakes reveal her pride\
      \ and self-doubt.\n      "
