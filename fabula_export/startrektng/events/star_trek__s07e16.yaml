  title: Talur accuses Data of causing the sickness
  description: In Garvin’s home, now repurposed as a makeshift laboratory, Data presents
    Talur with irrefutable evidence of cellular damage through his refined microscope,
    challenging her initial diagnosis of infection. Their tense exchange reveals Talur’s
    growing suspicion that Data’s arrival coincides with the outbreak, despite his
    logical dismissal of himself as the cause. Gia’s weakened state—marked by fever
    and physical decline—further escalates the urgency, as Data notices her metal
    pendant, a clue that will later link the illness to the radioactive fragments
    he sold to Skoran. The scene fractures trust between Data and the villagers, forcing
    him to confront the moral weight of his unintended contamination while Talur’s
    accusation publicly frames him as the source of their suffering. This moment shifts
    the narrative from scientific investigation to communal crisis, accelerating Data’s
    arc toward self-sacrifice to undo the damage he’s caused.
