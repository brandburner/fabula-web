- fabula_uuid: cand_evt_scene_8687dcb90565bd29_02
  global_id: null
  title: Riker and Beverly confirm Data’s death and plan covert recovery
  description: "\n  In the village square, Riker and Beverly—disguised as natives—approach\
    \ Gia, who reveals Data’s fate: he was killed by the villagers after saving them\
    \ from radiation poisoning. Gia explains how Data (whom she knew as 'Jayden')\
    \ deliberately contaminated the water with radioactive material to cure the villagers’\
    \ sickness, a selfless act that cost him his life. The revelation forces Riker\
    \ and Beverly to confront the moral weight of Data’s sacrifice while also assessing\
    \ the immediate threat: the buried probe fragments, which could still pose a danger.\
    \ Beverly scans the area with her tricorder, confirming Data’s deactivated state\
    \ and the presence of the fragments. Recognizing the need for secrecy to avoid\
    \ escalating tensions with the villagers, Riker proposes beaming both Data and\
    \ the fragments back to the *Enterprise* for recovery. This moment marks a critical\
    \ pivot—from passive observation to active intervention—as the crew’s moral obligation\
    \ to Data clashes with the need to preserve the villagers’ fragile trust. The\
    \ scene underscores the tragic irony of Data’s heroism: revered as a savior yet\
    \ destroyed by the very people he saved, while also setting up the next phase\
    \ of the story, where Data’s recovery and reactivation will force him to grapple\
    \ with the dissonance between his erased past and the evidence of his compassionate\
    \ actions.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e16
  scene_sequence: 14
  sequence_in_scene: 32
  key_dialogue: &id035
  - 'GIA: He was your friend?'
  - 'RIKER: Are you saying... he''s dead?'
  - 'GIA: They killed him because they were afraid of him.. But he saved all of us
    from the sickness.'
  - 'BEVERLY: It''s Data all right... he''s buried about two meters down. He''s been
    deactivated... I can''t tell how bad the damage is.'
  - 'RIKER: We can beam him and the probe fragments up to the ship and no one will
    know.'
