      competence for bridge command. The exam’s structure—simulated crises, withheld
      feedback, and self-reflection—reflects Starfleet’s emphasis on both technical
      precision and personal growth. Riker, as an evaluator, embodies Starfleet’s
      institutional rigor, while Troi’s failure highlights the organization’s high
      standards and the consequences of unpreparedness. The explosion isn’t just a
      simulation failure; it’s a narrative manifestation of Starfleet’s unyielding
      expectations.
