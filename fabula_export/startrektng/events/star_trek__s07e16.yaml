  global_id: null
  title: Riker denies Troi test failure feedback
  description: 'In a holodeck simulation of *Enterprise*''s main engineering during
    a red alert, Counselor Troi fails to stabilize an antimatter containment breach,
    triggering a catastrophic explosion that wipes out the simulation. When the scene
    resets, Commander Riker reveals himself and delivers the news of her failure on
    the Engineering Qualification exam. Instead of explaining her mistakes, he withholds
    feedback, insisting she must self-reflect to improve. His cryptic approach forces
    Troi to confront her lack of technical expertise and emotional blind spots, subtly
    testing her ability to learn from failure—a skill critical for Starfleet command.
    The moment underscores the duality of Starfleet’s demands: mastery of both technical
    precision and self-awareness, even in high-stakes crises. Troi’s frustration reveals
    her vulnerability, while Riker’s refusal to elaborate serves as a deliberate challenge,
    pushing her toward growth rather than dependency on external validation.'
