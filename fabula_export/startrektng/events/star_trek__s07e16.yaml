- fabula_uuid: cand_evt_scene_75346361c2153634_02
  global_id: null
  title: Data’s reactivation and Troi’s promotion
  description: "\n  In *Sickbay*, Data is reactivated by Beverly after his memory\
    \ loss and physical trauma on Barkon IV. His first moments of consciousness reveal\
    \ disorientation—he recalls only the probe crash and a power surge, nothing of\
    \ his subsequent heroism. Riker and Beverly fill him in on his forgotten actions:\
    \ saving the village and bonding with a child, details that leave him visibly\
    \ puzzled. The moment pivots when Troi, now wearing Commander’s pips, announces\
    \ her promotion. Data’s reaction—first confusion, then immediate deference—underscores\
    \ his struggle to reconcile the sudden shift in hierarchy with his fractured identity.\
    \ The exchange with Troi, though lighthearted, carries weight: her promotion marks\
    \ a turning point in their dynamic, while Data’s amnesia forces him to confront\
    \ the gap between his erased past and the moral legacy he left behind. The scene\
    \ bridges Data’s existential crisis with the broader narrative of change aboard\
    \ the *Enterprise*, using Troi’s promotion as a counterpoint to his own instability.\n\
    \  "
