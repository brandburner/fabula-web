  - object_uuid: ger_object_ec0cf5734d03
    description_of_involvement: Garvin’s tuft of hair, which detaches and falls onto
      the pillow as he collapses, serves as a visceral indicator of his radiation
      poisoning. The hair’s loss—sudden, unexpected, and undeniable—shocks Talur and
