  title: Gia reveals Data’s sacrifice and burial
  description: 'Disguised as villagers, Riker and Beverly locate Gia in the town square,
    where she reveals Data’s death at the hands of fearful villagers. She explains
    how he—whom they called Jayden—contaminated the water with radioactive material
    to cure the deadly sickness, saving the village at the cost of his own life. The
    revelation underscores Data’s selfless heroism and the tragic irony of his fate:
    revered as a savior yet destroyed by those he saved. Beverly confirms Data’s deactivated
    state via tricorder, and the pair plan to covertly recover his remains and the
    probe fragments to avoid escalating tensions with the villagers. The moment pivots
    from passive observation to active intervention, as the crew’s moral obligation
    to Data clashes with the need to preserve the villagers’ fragile trust. Gia’s
    grief and the crude stone marker at the well serve as haunting reminders of Data’s
    restored humanity and the cost of his sacrifice.'
