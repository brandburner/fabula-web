      their shared fear of the illness. Their organization is informal but potent,
      operating through mob mentality and the rapid dissemination of blame. The villagers’
      role here is to amplify Skoran’s accusations, creating an inescapable force
      that forces Data’s retreat. Their unity is fragile, however, built on superstition
      rather than reason, and their collective goal—to expel Data—is both a misguided
      attempt at protection and a reflection of their desperation.
    active_representation: Via collective action of members, with Skoran as the de
