- fabula_uuid: cand_evt_scene_b8ccec47654b7bc7_01
  global_id: null
  title: Data’s Truth and the Cure’s Cost
  description: 'The event unfolds in two critical phases: first, Skoran’s fearmongering
    incites the villagers to hunt Data as a demonic threat, while Gia—desperate and
    sick—confronts him in their home. Data, cornered and vulnerable, reveals his android
    nature to her for the first time, exposing his metallic face and admitting his
    own confusion about his identity. This moment of raw honesty tests Gia’s trust,
    but her refusal to flee despite her shock solidifies their fragile bond. The second
    phase shifts to Data’s frantic scientific work, where he synthesizes a cure for
    the radiation poisoning using the same metallic fragments that caused the crisis.
    He administers it to Gia and Garvin, proving its efficacy, but realizes the villagers
    will never accept it from him directly. His solution—poisoning the well—sets up
    the tragic irony of his sacrifice: the cure that saves them will also destroy
    him, as the villagers’ fear ensures they’ll never know the truth of his motives.
    The event escalates the central conflict by forcing Data to choose between self-preservation
    and the villagers’ survival, while also deepening Gia’s role as his sole ally
    in a hostile world. The tension between public persecution and private trust drives
    the narrative toward its inevitable climax.'
