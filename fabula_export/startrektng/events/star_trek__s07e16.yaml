  key_dialogue: &id007
  - 'SKORAN: You. Ice-man, where did you find this?'
  - 'DATA: I do not know.'
  - 'GARVIN: I told you, he''s lost his memory... and we''re calling him Jayden for
    now.'
  - 'SKORAN: It''s obviously been tempered and milled... but the lusterous quality
    of the metal is so pure... this wasn''t made in any forge I''ve ever seen. Will
    you sell them?'
  - 'DATA: You may be right. But I do not wish to sell all the fragments. They could
    provide a clue to my identity.'
  - 'SKORAN: I''ll give you twenty doraks for half the lot.'
  - 'GARVIN: Agreed.'
  - 'DATA: Did I do something wrong, Garvin?'
  - 'GARVIN: No... just unexpected.'
