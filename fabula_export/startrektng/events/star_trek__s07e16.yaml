  title: Data challenges village knowledge and witnesses Garvin’s collapse
  description: "\n  Data publicly challenges Talur’s pseudoscientific teachings during\
    \ a village lesson, exposing his outsider status while undermining local trust\
    \ in the village’s established order. His logical refutation of her elemental\
    \ theory—based on empirical evidence—alienates him further from the villagers,\
    \ who dismiss his claims as the ramblings of a memory-lost stranger. The tension\
    \ escalates when Data and Gia witness a violent confrontation between Garvin and\
    \ Skoran over the price of radioactive metal fragments, which Skoran has already\
    \ incorporated into jewelry. Data intervenes, siding with Garvin, but Skoran weaponizes\
    \ his status as an 'Ice-man,' deepening the village’s distrust. The conflict reaches\
    \ a breaking point when Garvin suddenly collapses, revealing the first visible\
    \ symptoms of radiation poisoning—blotchy skin, blisters, and fever. This moment\
    \ marks a critical turning point: Talur’s failure to diagnose the illness forces\
    \ Data to propose an investigation, setting up his eventual alliance with Gia\
    \ and the escalation of the radiation crisis. The event underscores Data’s growing\
    \ isolation, the villagers’ fear of his otherness, and the looming cost of his\
    \ presence in their world.\n  "
