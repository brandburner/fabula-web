  global_id: null
  title: Troi Confronts Riker Over Test Cancellation
  description: Troi, exhausted but determined, studies for her Engineering test in
    her quarters when Riker arrives to cancel the exam. She reacts with shock and
    defiance, arguing that she deserves the chance to prove herself despite her struggles
    with technical details. Riker insists her repeated failures demonstrate she isn’t
    suited for bridge command, framing it as a duty to the ship rather than a personal
    judgment. Though Troi initially resists, Riker’s departure leaves her processing
    his words—particularly his invocation of duty—until a sudden realization spurs
    her to exit with renewed purpose, signaling a shift in her approach to leadership
    and command. The exchange forces her to confront her own limitations and the broader
    expectations of Starfleet, setting up her eventual emotional breakthrough and
    pivot toward decisive action in the larger crisis.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e16
  scene_sequence: 9
  sequence_in_scene: 21
  key_dialogue:
  - 'TROI: Here to give me more... encouragement?'
  - 'RIKER: No... actually I''m here to tell you that I''ve decided to cancel the
    rest of your test.'
  - 'TROI: Why? Because I''m not the most technically-minded person on the ship? I
    may have trouble telling the difference between a plasma conduit and a phase inducer,
    but there''s more to being a bridge officer than just memorizing technical manuals.'
  - 'RIKER: There is a solution.'
  - 'TROI: Then give me time to find it.'
  - 'RIKER: I can''t. As much as I care about you, my first duty is to the ship. I
    can''t let anyone serve as a Bridge Officer who isn''t qualified. I''m sorry.'
