    - To survive the crisis, though she feels powerless to do so on her own.
    what_happened: "\n        Marissa stands with her head bowed, her body language\
      \ closed off and withdrawn. She avoids eye contact with Picard, her silence\
      \ speaking volumes about her discomfort in the situation. Unlike the boys, she\
      \ does not engage with Picard’s questions or offer any details about her science\
