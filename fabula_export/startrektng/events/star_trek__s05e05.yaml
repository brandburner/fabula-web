      \ yellow) stands out against the turbolift’s sterile metal, symbolizing the\
      \ hidden opportunities within chaos. Its successful removal marks the children’s\
      \ first active step toward taking control of their fate, shifting the dynamic\
      \ from helplessness to agency.\n      "
    status_before_event: Secured in place, covering the optical cabling and preventing
      access to the turbolift’s emergency systems.
    status_after_event: Removed by Marissa, exposing the cabling and enabling the
      group’s desperate plan to sever the lift’s connection.
