  location_involvements:
  - location_uuid: ger_location_594641bc64bc
    description_of_involvement: The cargo bay transforms from a seemingly mundane
      workspace into a high-stakes battleground as Beverly and Geordi execute their
      desperate plan. The plasma fire’s glow casts eerie shadows, while the wailing
      alarms and groaning bulkheads amplify the tension. The bay’s vastness becomes
      a liability as Geordi stumbles across its expanse, disoriented, while Beverly
      fights to reach the repressurization panel. The space’s utilitarian design—ladders,
      consoles, and stacked containers—contrasts sharply with the life-or-death stakes,
