  title: Data sacrifices body to stabilize ship
  description: "\n  Trapped in a Jeffries tube with a deadly energy arc threatening\
    \ the *Enterprise*'s antimatter containment, Data proposes a radical solution:\
    \ using his nonconductive android body to break the circuit. When Riker refuses\
    \ the initial risk, Data escalates by offering to remove his own positronic brain—a\
    \ move that forces Riker to reluctantly agree. The scene culminates in Data stepping\
    \ into the arc, absorbing the surge, and temporarily deactivating. His post-revival\
    \ guidance to Riker on how to extract his brain underscores his unyielding logic\
    \ and self-sacrifice for the crew’s survival. The moment reveals Data’s willingness\
    \ to dismantle himself for the mission, while Riker’s hesitation exposes his moral\
    \ conflict between pragmatism and preserving his friend’s integrity. The act stabilizes\
    \ the ship but leaves Data vulnerable, setting up future stakes for his existence\
    \ and the crew’s reliance on his unique capabilities.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e05
  scene_sequence: 17
  sequence_in_scene: 29
  key_dialogue:
  - 'DATA: The current cannot be shut down from this relay box.'
  - 'RIKER: Data, there''s at least half a million amps flowing through that arc.
    Can you take that much current?'
  - 'DATA: My positronic brain has several layers of shielding to protect it from
    power surges. It would be possible for you to remove my cranial unit and take
    it with you.'
  - 'RIKER: You want me to take your head off?'
  - 'DATA: Yes, sir. Is there something wrong?'
