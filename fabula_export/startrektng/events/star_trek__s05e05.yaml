acts:
- fabula_uuid: act_fbab4ddc7c15eee3
  number: 0
  summary: 'The USS Enterprise enjoys a brief period of downtime following a mission,
    with various crew members engaged in personal moments. O''Brien and his heavily
    pregnant wife, Keiko, discuss baby names with Riker, Data, and a bored Worf, highlighting
    the domestic tranquility. Elsewhere, Beverly Crusher attempts to coax Geordi La
    Forge into singing, showcasing their camaraderie. Captain Picard, visibly uncomfortable,
    begins a tour for three young science fair winners: the shy Marissa, the solemn
    Jay Gordon, and the energetic Patterson. This seemingly routine activity is abruptly
    shattered when the ship is struck by a quantum filament. The impact causes widespread
    damage, trapping Picard and the children in a plummeting turbolift. On the bridge,
    Lieutenant Monroe attempts to assess the damage, but a second, more violent impact
    cripples the ship further, causing explosions and plunging the bridge into darkness.
    This sequence rapidly establishes the initial calm, introduces key characters
    and their immediate situations, and then unleashes the inciting incident that
    drives the entire narrative, setting the stage for multiple concurrent crises.'
  key_moments: []
  scene_numbers:
