- fabula_uuid: cand_evt_scene_e6df16a922b133fb_02
  global_id: null
  title: Troi assumes reluctant command crisis
  description: With the *Enterprise* crippled by a quantum filament and Lieutenant
    Monroe dead, the bridge crew—O’Brien, Ro, and Mandel—scramble to assess the ship’s
    catastrophic damage. O’Brien’s failed attempts to restore communications and Ro’s
    report of sealed bulkheads confirm the crew’s isolation, while Mandel’s partial
    sensor readings reveal survivors in the saucer section but no life signs in the
    drive section, where Picard and the children are trapped. The crew’s desperation
    peaks when they realize Troi, as the senior officer present, must take command.
    Hesitant but compelled by urgency, Troi defers to O’Brien’s recommendation to
    initiate emergency procedure Alpha Two (manual override of systems), while Ro
    pushes for life support stabilization and intership communications. The scene
    marks Troi’s first test of leadership under existential pressure, exposing her
    lack of tactical experience and forcing her to rely on intuition and the crew’s
    fragmented expertise. The tension escalates as the weight of command settles on
    her shoulders, setting up her later pivotal decision to divert power to engineering—a
    choice that will test her compassion against Ro’s pragmatism.
