  object_involvements:
  - object_uuid: ger_object_a49db2f2dc9f
    description_of_involvement: 'The emergency bulkheads that have deployed across
      the *Enterprise* are a critical (and ominous) element of this event, serving
      as both a physical and narrative barrier to the crew’s efforts. Data reports
      that these bulkheads have severed access to the bridge and sickbay, isolating
      Ten Forward and forcing the crew to improvise. The bulkheads’ activation is
      a direct result of the quantum filament strike, their slamming shut a visceral
      reminder of the ship’s automated (and ultimately futile) attempts to contain
      the damage. For Riker, Data, and Worf, the bulkheads represent a stark reality:
      the command structure is gone, and the crew is on its own. The bulkheads’ role
      in the event is twofold: they create a sense of claustrophobia and urgency (the
      crew is trapped, with no easy way out) and force Riker to make difficult decisions
      (e.g., splitting the crew’s efforts, venturing into the perilous service crawlway).
      Their presence also underscores the ship’s vulnerability—even its automated
      systems cannot fully protect it from disaster.'
    status_before_event: Retracted and flush with the walls, part of the *Enterprise*’s
      emergency containment systems, ready to deploy in case of breaches or crises.
    status_after_event: Deployed and sealed, blocking direct access to the bridge,
      sickbay, and other critical sections of the ship. The bulkheads remain in place,
      forcing the crew to find alternative routes.
    global_id: ger_object_a49db2f2dc9f
  - object_uuid: ger_object_24fdb12b7281
    description_of_involvement: 'The starboard service crawlway is the crew’s only
      viable path to engineering, a narrow and perilous maintenance tunnel that Data
      identifies as their best chance to regain control of the *Enterprise*. The crawlway’s
      mention is a turning point in the event, as Riker and Data prepare to venture
      into its hazardous confines while Worf remains behind to manage triage. The
      crawlway’s role is symbolic and practical: it represents the crew’s desperation
      (they are forced to take extreme risks) and their resourcefulness (they adapt
      to the ship’s damaged infrastructure). The crawlway is not shown in the scene,
      but its description—tight passages lined with conduits and emergency systems—paints
      a vivid picture of the dangers ahead. For Riker and Data, the crawlway is a
      test of their resolve, a physical manifestation of the stakes they face. Its
      mention also reinforces the idea that the *Enterprise*’s survival depends on
      their ability to navigate the unknown.'
    status_before_event: Accessible but rarely used, part of the ship’s maintenance
      network, with standard lighting and clear pathways.
    status_after_event: Now the primary route to engineering, its condition likely
      degraded by the quantum filament strike. Riker and Data are preparing to enter,
      but its hazards (poor lighting, structural damage, tight spaces) are implied
      rather than shown.
    global_id: ger_object_24fdb12b7281
  - object_uuid: ger_object_e49872a03241
    description_of_involvement: 'The shattered glassware from Ten Forward’s bar is
      more than just debris—it is a visceral symbol of the ship’s sudden violence
      and the chaos that has descended upon the crew. The fragments litter the floor,
      creating a hazard that forces characters to navigate carefully, their movements
      constrained by the sharp edges and broken remnants of what was once a place
      of relaxation. The glassware’s destruction is a metaphor for the *Enterprise*’s
      fractured state: what was once orderly and functional is now dangerous and unpredictable.
      Worf’s protective instinct kicks in as he pulls Keiko close, shielding her pregnant
      form from the flying debris, while Riker and Data step around the shards as
      they assess the situation. The glassware’s role in the event is twofold: it
      heightens the tension (every movement is a potential risk) and underscores the
      irrevocable damage done to the ship and its crew.'
    status_before_event: Intact and arranged neatly behind the bar in Ten Forward,
      ready for use by crew and civilians enjoying the lounge.
    status_after_event: Scattered across the floor in jagged shards, creating a hazardous
      obstacle course for those moving through the space. The debris forces characters
      to adapt their movements and adds to the sense of urgency and danger.
    global_id: ger_object_e49872a03241
  - object_uuid: ger_object_1593e1073cd7
    description_of_involvement: 'The broken tables in Ten Forward are more than just
