      the physical strain of manual labor—and he commits to the plan without hesitation.
      Geordi’s strength and determination become evident as he lifts the heavy containers
      alongside Beverly, his VISOR likely helping him navigate the hazardous environment.
      His shift from despair to resolve reflects his deep loyalty to the *Enterprise*
      and his crewmates.'
