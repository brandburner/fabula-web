      absolute, but Ro’s challenge to it reflects deeper tensions within Starfleet—between
      the ideal of ‘infinite diversity in infinite combinations’ and the brutal realities
      of survival. The *Enterprise*’s crisis forces the crew to confront the cost
      of their principles, and the organization’s survival may depend on how they
      reconcile them.'
