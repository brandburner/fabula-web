  key_dialogue: &id021
  - 'BEVERLY: The levels are still rising.'
  - 'GEORDI: The energy''s being fed by the ship''s internal power grid and we can''t
    even get near that. The only way to stop it would be to eliminate the supply of
    oxygen. Wait a minute... If we open the external door it would depressurize the
    cargo bay, and blow all those containers out into space. At the same time, the
    lack of oxygen should knock out the plasma fire.'
  - 'BEVERLY: What about us?'
  - 'GEORDI: We''ll have to find something in here to hang onto while the air is evacuated.
    After that, we''ll shut the door and repressurize the bay.'
  - 'KEIKO: I''m having contractions... I mean contractions... I''m going into labor.'
  - 'WORF: You cannot. This... this is not a good time.'
