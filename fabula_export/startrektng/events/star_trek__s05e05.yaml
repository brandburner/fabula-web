  sequence_in_scene: 30
  key_dialogue: &id019
  - 'PICARD: ((strained)) Feel around the edge of the illumination module -- of the
    big circle, until you find a small knob.'
  - |-
    MARISSA: ((worried)) What about you?
    PICARD: ((honest)) My leg is broken. I'll only slow you down and you need to move quickly.
    (a little firmly)
    You'll have to be the leader. That's an order.
  - |-
    PATTERSON: I don't wanna be an officer anymore. I wanna stay with you.
    PICARD: Patterson, you're an officer, now. You have to obey orders.
    PATTERSON: I don't wanna!
    MARISSA: The crew has decided to stick together. We all go or we all stay.
    PICARD: All right. I'll try. But I want you to know... this is mutiny.
