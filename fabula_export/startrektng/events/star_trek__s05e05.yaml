    emotional_state: Tense and urgent, with a growing sense of frustration as the
      obstacles mount. Riker’s emotional state is one of controlled adrenaline—he
      is not panicked, but the stakes are clear, and his focus is razor-sharp on finding
      a way out. There is a hint of desperation beneath his usual confidence, a recognition
      that their situation is precarious.
    goals:
    - To reach Shuttlebay 2 as quickly as possible to secure their escape from the
      failing ship.
    - To find a way to neutralize or bypass the energy field blocking their path,
      even as the coolant gas closes in behind them.
    what_happened: Riker leads the crawl through the Jeffries tube, his broad shoulders
      brushing against the metal walls as he moves with determined urgency. He stops
      to read a nameplate, confirming their proximity to Shuttlebay 2, before the
      sudden hiss of the coolant leak sends them scrambling forward. His voice is
      sharp with alarm as he identifies the threat, and his body tenses as he realizes
      they are trapped between the gas and the energy field. Riker’s tactical instincts
      kick in, his mind racing to assess their options while his physical presence
      dominates the confined space, a stark contrast to Data’s measured movements.
    observed_status: Riker leads the crawl through the Jeffries tube, his broad shoulders
