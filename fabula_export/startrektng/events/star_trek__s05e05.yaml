  object_involvements:
  - object_uuid: ger_object_bd68ac534c89
    description_of_involvement: 'The cushions propping up Keiko are a pitiful attempt
      to provide comfort in a space not designed for it. Worf grabs them from Ten
      Forward’s tables, arranging them beneath her with the awkwardness of a man who
      has never tended to a laboring woman. They offer little real support, but Keiko
      leans into them anyway, her body craving any semblance of stability. The cushions
      are a metaphor for the entire scene: makeshift solutions in a crisis, barely
      adequate but all that’s available. Their presence highlights the absurdity of
      the setting—a lounge turned makeshift delivery room, where the trappings of
      normalcy (cushions, tables, viewports) are repurposed for a struggle as old
      as humanity itself.'
    status_before_event: Scattered across Ten Forward’s tables, part of the lounge’s
      usual decor. Neutral in color, soft but not medical-grade.
    status_after_event: Crushed beneath Keiko’s weight, slightly askew. Their original
      purpose—comfort for casual conversation—has been subverted by the urgency of
      the moment.
    global_id: ger_object_bd68ac534c89
  - object_uuid: ger_object_0f3e2727b4e9
    description_of_involvement: 'Worf’s First Aid Kit lies open nearby, its bandages
      and antiseptics untouched—a symbol of the scene’s futility. The kit, designed
      for cuts and bruises, is woefully inadequate for the task at hand. Worf doesn’t
      even reach for it; his focus is on the PADD and tricorder, as if technology
      alone can substitute for medical skill. The kit’s presence is a dark joke: in
      a crisis, Starfleet’s preparedness extends only so far, and the most basic of
      human experiences—childbirth—falls outside its purview.'
    status_before_event: Open on the floor near Worf, its contents (bandages, antiseptics,
      basic tools) visible but unused. A red, compact kit, standard Starfleet issue.
    status_after_event: Remains untouched and irrelevant. The kit’s inadequacy is
      a silent rebuke to Worf’s attempts to improvise.
    global_id: ger_object_0f3e2727b4e9
  - object_uuid: ger_object_937baec66288
    description_of_involvement: 'Worf’s Medical Reference PADD serves as a fragile
      crutch in his attempt to appear competent, its screen glowing with clinical
      data he barely understands. He consults it like a talisman, reciting terms like
      ‘dilation’ and ‘bearing down phase’ with the hollow authority of a man reciting
      a script. The PADD’s presence underscores the absurdity of the situation: in
      a starship with advanced medical technology, Keiko’s life—and her child’s—hinges
      on a Klingon’s half-remembered Starfleet simulation. When Keiko asks if the
      baby has turned, Worf’s grip tightens on the PADD, as if the device itself could
      provide the answer. It cannot.'
    status_before_event: Clutched in Worf’s hand, its screen displaying medical readouts
      and labor progression data. Positioned between Worf and Keiko, acting as a barrier
      as much as a tool.
    status_after_event: Still in Worf’s possession, but its utility has been exposed
      as illusory. Worf’s reliance on it wanes as Keiko’s questions force him to confront
      his own limitations.
