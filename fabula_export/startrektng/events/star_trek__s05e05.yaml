      \ opens, and the violent rush of air blasts the containers out, snuffing the\
      \ plasma fire. The door’s pressurization field disappears momentarily, creating\
      \ a vacuum that nearly kills them before Beverly repressurizes the bay. Its\
      \ function as both a tool and a threat underscores the high stakes of their\
      \ gamble.\n      "
    status_before_event: "\n        Closed and sealed, with the pressurization field\
