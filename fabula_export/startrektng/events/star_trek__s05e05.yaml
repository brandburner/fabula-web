  title: Beverly coaxes Geordi into singing
  description: In the cargo bay, Beverly Crusher playfully persists in coaxing Geordi
    La Forge to sing, despite his initial reluctance and self-consciousness. Geordi,
    embarrassed but ultimately yielding to her encouragement, attempts a quick, off-key
    rendition of *The Very Model of a Modern Major-General*, only to cut himself off
    mid-verse. Beverly, undeterred, reassures him that his performance was 'terrific'
    and offers to help refine his pitch, taking his arm in a nurturing gesture. The
    moment reveals Beverly’s maternal instincts and Geordi’s hidden vulnerability,
    creating an intimate contrast to the broader shipboard crisis unfolding elsewhere.
    Their dynamic—playful yet charged with unspoken tension—hints at their deep, unacknowledged
    bond, while Geordi’s discomfort underscores his struggle with self-doubt, a theme
    that will resurface when he later faces life-or-death decisions in the same cargo
    bay. The scene serves as a quiet character study, grounding the larger narrative
    stakes in personal, human moments.
