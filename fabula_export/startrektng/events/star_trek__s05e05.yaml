      moves between Keiko and the computer.
    - Wide viewports showing starfields, now framed by the *Enterprise*’s damaged
      hull, a visual metaphor for vulnerability.
    - The hum of the ship’s engines, intermittently drowned by alarms and the newborn’s
      cry.
