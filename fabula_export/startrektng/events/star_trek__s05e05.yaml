  - character_uuid: ger_agent_0e5c114935a9
    emotional_state: 'Analytically detached yet subtly engaged. Data’s emotional state
      is one of focused utility—he processes the crisis as a problem to be solved,
      but his actions (accompanying Riker, offering solutions) reveal a growing empathy
      for the crew’s plight. There is no panic in his voice, only precision, but the
      stakes are clear: the *Enterprise*’s survival depends on his ability to navigate
      the unknown.'
    goals:
    - Provide Riker with actionable intelligence to restore control of the *Enterprise*.
    - Assist in reaching engineering via the service crawlway, leveraging his technical
      expertise to stabilize the ship.
    what_happened: 'Data enters Ten Forward with his characteristic poise, the frozen
      doors a stark visual metaphor for the ship’s paralysis. He immediately provides
      Riker with a concise, data-driven assessment of the *Enterprise*’s condition:
      turbolifts and service crawlways are surveyed, the bridge and sickbay are inaccessible,
      and emergency bulkheads have sealed off critical sections. His report is clinical
      but urgent, framing the crisis in terms of priorities (''reestablishing control
      should be our top priority''). When Riker asks about engineering, Data offers
      a solution—the starboard service crawlway—as if reciting a technical manual,
      yet his suggestion carries the weight of their only viable option. His composed
      demeanor contrasts with the desperation around him, but his willingness to accompany
      Riker on the perilous journey to engineering signals his commitment to the crew’s
      survival, even as his own limitations as an android are subtly acknowledged
      in the chaos.'
