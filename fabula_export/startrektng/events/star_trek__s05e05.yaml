  title: Troi assumes command in crisis
  description: 'On the crippled *Enterprise* bridge, Counselor Troi is thrust into
    command after Lieutenant Monroe’s death, with O’Brien and Ro Laren providing critical
    technical and tactical guidance. Ro arrives via a stalled turbolift, revealing
    the ship’s isolation due to emergency bulkheads. Mandel’s sensor readings confirm
    survivors in the saucer section but no life signs in the drive section—where Picard
    and the children are trapped—deepening the crew’s despair. Troi, unprepared but
    resolute, initiates Alpha Two emergency protocols, bypassing computer control
    to manually stabilize life support and communications. The scene underscores the
    crew’s fractured leadership, the weight of command in crisis, and the emotional
    toll of uncertainty as they grapple with the possibility of irreversible loss.
    Ro’s pragmatic urgency clashes with Troi’s hesitant authority, while O’Brien’s
    personal stakes (his pregnant wife in Ten Forward) add tension to the technical
    decisions. The moment marks a turning point: Troi’s leadership is tested, the
    crew’s isolation becomes concrete, and the drive section’s silence forces them
    to confront the unthinkable—Picard may already be gone.'
