    institutional_impact: The *Enterprise*’s failure underscores the fragility of
      Starfleet’s exploratory mission and the crew’s mortality. It forces a reckoning
      with the limits of human technology and the importance of leadership in crises.
      The event sets up a narrative where survival, not exploration, becomes the primary
