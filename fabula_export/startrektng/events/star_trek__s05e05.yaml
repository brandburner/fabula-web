  object_involvements:
  - object_uuid: ger_object_cd048cd95ce8
    description_of_involvement: 'The cargo bay transporter console is a critical but
      failed tool in this event. Geordi attempts to activate it to beam out the quaratum
      containers, but the radiation interference renders it inoperable. His frustrated
      admission—‘I still can’t get any power to this transporter’—highlights the characters’
      vulnerability, forcing them to abandon technological solutions in favor of manual
      labor. The console’s failure symbolizes the broader crisis: the *Enterprise*’s
      systems are compromised, and the crew must rely on their own ingenuity and physical
      prowess to survive. Its presence in the scene serves as a stark reminder of
      the stakes—without it, the characters are left with no choice but to risk their
      lives dragging the containers by hand.'
    status_before_event: Powered on but unresponsive due to radiation interference.
      Geordi is actively attempting to activate it.
    status_after_event: Completely inoperable, abandoned as Beverly and Geordi shift
      to manual relocation. Its failure is a turning point, compelling the characters
      to act immediately.
    global_id: ger_object_cd048cd95ce8
  - object_uuid: ger_object_66c236fbae9e
    description_of_involvement: Beverly Crusher’s tricorder is the critical diagnostic
      tool in this event, providing real-time data on radiation levels and the quaratum’s
      instability. She scans the containers and Geordi, confirming their exposure
      limits (3–4 hours of tolerance) and the quaratum’s dangerous trajectory (83
      rads, rising at 4 rads per minute). The tricorder’s beeping and glowing readout
      add a layer of tension, as each new scan reveals the escalating threat. When
      Beverly identifies the far end of the bay as a safer zone (20% lower radiation),
      the tricorder’s data becomes the foundation for their plan. Its reliability
      contrasts with the failed transporter and anti-grav units, making it an indispensable
      asset in their fight for survival.
    status_before_event: Functional and in Beverly’s possession. Displaying radiation
