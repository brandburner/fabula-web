  - character_uuid: ger_agent_868446276ca7
    emotional_state: A man drowning in the contradiction of his own inadequacy—his
      Klingon pride demands he act, but his lack of medical knowledge leaves him flailing.
      Surface calm masks a storm of anxiety, not just for Keiko, but for his own failure
      to live up to Starfleet’s ideals of preparedness.
    goals:
    - To stabilize Keiko’s labor and deliver the baby safely, despite his lack of
      experience
    - To maintain the illusion of competence and reassure Keiko, even as his confidence
      crumbles
    what_happened: Worf kneels beside Keiko in Ten Forward, gripping a PADD and tricorder
      with the tense grip of a man out of his depth. His Klingon stoicism fractures
      as Keiko’s labor pains intensify, her raw vulnerability forcing him into a role
      he was never trained for. He recites medical jargon—‘dilation,’ ‘bearing down
      phase’—like a script, but his hesitation when Keiko asks if the baby has turned
      betrays his incompetence. His hand hovers awkwardly over her abdomen, probing
      with the clinical detachment of a warrior examining a wound, not the tenderness
      of a midwife. When she challenges his experience, he clings to the Starfleet
      Emergency Medical Course like a shield, his voice strained as he assures her,
      ‘I am sure everything will be fine,’—a lie even he doesn’t believe.
