- fabula_uuid: cand_evt_scene_dbe1a474396453ca_01
  global_id: null
  title: Bridge collapses into darkness
  description: After the initial quantum filament strike, Lieutenant Monroe attempts
    to stabilize the crippled *Enterprise* bridge, assessing damage reports and preparing
    the crew for a second impact. O’Brien confirms critical systems failures—primary
    life-support, impulse, and warp engines—while Mandel urgently warns of an incoming
    second filament. As Monroe orders all decks to brace, the ship is violently struck
    again, killing her instantly when the conn console explodes in her face. The bridge
    plunges into total darkness, leaving only red alert indicators blinking in the
    chaos. This moment marks the tipping point where Troi’s command decisions become
    the only lifeline for the crew and children trapped in the plummeting turbolift,
    as the ship’s systemic failure isolates Picard’s group and forces the remaining
    bridge crew into desperate survival mode. The darkness symbolizes both the physical
    and narrative collapse of the *Enterprise*’s command structure, thrusting Troi
    into an untested leadership role with no margin for error.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e05
  scene_sequence: 7
  sequence_in_scene: 11
  key_dialogue:
  - 'MONROE: What happened?'
  - 'MANDEL: Sensors are picking up subspace distortions and high-energy particles
    directly to starboard.'
  - 'MONROE: Looks like we ran into a quantum filament.'
  - 'MONROE: ((to O''Brien)) Damage report?'
  - 'O''BRIEN: We''ve lost primary life-support. Switching to secondary systems. Impulse
    and warp engines are offline.'
