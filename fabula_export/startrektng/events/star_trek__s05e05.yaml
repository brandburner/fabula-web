- fabula_uuid: cand_evt_scene_7bb0a41c589e592f_02
  global_id: null
  title: Cargo Bay Depressurization Sacrifice
  description: "\n  Trapped in a cargo bay with a plasma fire threatening volatile\
    \ quaratum containers, Beverly Crusher and Geordi La Forge execute a desperate\
    \ plan to save the *Enterprise* by manually depressurizing the bay. Beverly clinically\
    \ outlines the physiological horrors of rapid decompression—lung pressure, numbness,\
    \ and eventual unconsciousness—while Geordi, ever the engineer, focuses on the\
    \ mechanical steps: venting the air, ejecting the containers, and repressurizing\
    \ before they lose consciousness. Their hyperventilation and physical bracing\
    \ against the console underscore the urgency and danger of the moment. When the\
    \ spacedoor opens, the violent rush of air blasts the quaratum containers into\
    \ space, snuffing out the fire but leaving Geordi critically injured as he stumbles\
    \ across the bay. Beverly, disoriented but determined, drags herself to the atmospheric\
    \ controls and repressurizes the bay just in time, saving both their lives. The\
    \ scene is a high-stakes test of their resilience, highlighting the crew’s willingness\
    \ to endure extreme personal risk to protect the ship. It also serves as a brutal\
    \ reminder of the *Enterprise*’s crippled state, where even routine maintenance\
    \ has become a life-or-death gamble.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e05
  scene_sequence: 23
  sequence_in_scene: 40
  key_dialogue:
  - 'BEVERLY: Once the air is vented, the first thing you''ll feel is extreme pressure
    in your lungs... you''ll have to resist the temptation to exhale. Next, your hands
    and feet will get cold, then numb... and some of the capillaries in exposed sections
    of skin may burst.'
  - 'GEORDI: ((dry)) Sounds like fun.'
  - 'GEORDI: After the air has been evacuated, one of us will have to get to that
    panel and repressurize the bay.'
