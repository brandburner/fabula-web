  object_involvements:
  - object_uuid: ger_object_ef11b3d589d0
    description_of_involvement: The *engineering monitors* are the linchpin of O’Brien’s
      proposed solution and Troi’s final decision. Ro dismisses them as irrelevant
      (‘no reason to believe anyone’s alive’), but O’Brien counters that restoring
      power to them would allow trapped crew to assess the containment field’s status
      and potentially take corrective action. Troi seizes on this idea, ordering their
      reactivation as a lifeline to the drive section. The monitors thus transcend
      their functional role, becoming a metaphor for hope—concrete evidence that Troi’s
      choice is not merely emotional but rooted in a tangible, if speculative, chance
      for survival.
    status_before_event: Offline due to power loss in the drive section, leaving engineering
      personnel (and potential survivors) unaware of the containment field’s critical
      status.
    status_after_event: Power diverted from the bridge, restoring functionality and—potentially—alerting
      survivors to the impending crisis. Their status is now tied to the success of
      Troi’s gamble.
    global_id: ger_object_ef11b3d589d0
  - object_uuid: ger_object_2b336f076903
    description_of_involvement: 'The *antimatter containment field* is the central
      technical threat driving the event’s conflict, its status a ticking clock that
      looms over every argument. Ro frames it as an existential risk, warning that
      its collapse—accelerated by the damaged power coupling—could doom the ship in
      minutes. O’Brien, however, argues that it can be stabilized from engineering,
      provided power is diverted to restore monitors and systems. The field’s condition
      thus becomes a battleground for competing values: Ro sees it as a reason for
      immediate action, while O’Brien and Troi view it as a problem to solve, not
      an inevitability. Its symbolic role is equally critical, representing the fragile
      balance between survival and morality aboard the *Enterprise*.'
    status_before_event: Weakened to 40% and dropping, with the power coupling’s damage
      threatening to accelerate its decline. Monitors in the drive section are offline,
      leaving potential survivors unaware of the impending breach.
    status_after_event: Stabilized to 25% (per earlier reports in the scene) after
      power is diverted from the bridge to engineering monitors, though the long-term
      prognosis remains uncertain. The field’s status is now tied to Troi’s gamble—will
      the power diversion buy enough time for a solution, or hasten the coupling’s
      overheating?
    global_id: ger_object_2b336f076903
  - object_uuid: ger_object_02e0e5082848
    description_of_involvement: 'The *power coupling* is the event’s silent but deadly
      wildcard, its overheating a looming catastrophe that Ro invokes repeatedly to
      justify immediate separation. She describes it as a ‘ticking time bomb,’ its
      failure a near-certainty that would trigger a cascading collapse of the containment
      field. O’Brien acknowledges its volatility but argues that diverting power to
      engineering could mitigate the risk by restoring monitoring and control. The
      coupling thus serves as both a technical constraint and a narrative device,
