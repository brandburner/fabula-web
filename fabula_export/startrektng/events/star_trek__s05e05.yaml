  key_dialogue:
  - |-
    RIKER: How do you feel?
    KEIKO: ((weakly)) Okay... but a little... foggy.
    RIKER: Just lie still for a while. We'll get you to sickbay as soon as we can.
  - |-
    RIKER: We should assume the worst... that everyone on the bridge is dead and no one is in control of the ship.
    DATA: In that circumstance, reestablishing control should be our top priority.
    RIKER: Agreed. Can we get to engineering?
  - |-
    RIKER: ((to Data)) Let's go.
    RIKER: ((to Worf)) This room is going to be filled with wounded in a few minutes and they're going to need help. I want you to remain in charge here.
