    emotional_state: 'A storm of fear, exhaustion, and frustration, all sharpened
      by the betrayal of her body. She oscillates between hope (when Worf recites
      medical terms) and despair (when his hesitation reveals his ignorance), her
      emotional state a mirror of the ship’s broader crisis: systems failing, trust
      eroding, and the terrifying unknown looming.'
    goals:
    - To understand the status of her labor and the baby’s position, despite Worf’s
      incompetence
    - To endure the pain and fear long enough to deliver her child safely
    what_happened: 'Keiko O’Brien lies propped on cushions in Ten Forward, her body
      wracked by contractions that steal her breath and her composure. Sweat glistens
      on her forehead, her hands gripping the table edge as if it alone can anchor
      her to sanity. She fires rapid, desperate questions at Worf—‘Has the baby turned?’—her
      voice thin with exhaustion and fear. When he hesitates, her frustration boils
      over: ‘Have you ever done this before?’ Her labor isn’t just physical; it’s
      a stripping away of every illusion of control, leaving her raw and exposed.
      She clings to Worf’s reassurances like a lifeline, even as her instincts scream
      that something is wrong.'
