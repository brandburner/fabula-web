  title: Worf’s medical inexperience exposes Keiko’s fear
  description: 'In the chaotic aftermath of the quantum filament strike, Keiko O’Brien’s
    labor intensifies in Ten Forward, her pain and exhaustion laying bare the fragility
    of human resilience. Worf, thrust into an unfamiliar role as her sole medical
    support, attempts to compensate for his lack of experience with clinical detachment
    and Starfleet protocol—but his awkwardness and visible discomfort only heighten
    Keiko’s anxiety. When she asks if the baby has turned, Worf’s hesitation reveals
    his incompetence, forcing Keiko to confront the terrifying possibility that this
    delivery may not proceed as planned. The scene underscores the ship’s broader
    crisis by mirroring its collapse in Keiko’s body: both are out of control, both
    require desperate improvisation, and both risk catastrophic failure. Worf’s failure
    to provide meaningful reassurance isn’t just a personal shortcoming—it’s a microcosm
    of the *Enterprise*’s fractured systems, where even the strongest among them are
    unprepared for the chaos unfolding around them.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e05
  scene_sequence: 22
  sequence_in_scene: 38
  key_dialogue:
  - 'WORF: Your contractions are now only twenty seconds apart.'
  - 'KEIKO: It feels like they''re constant...'
  - 'WORF: They will continue to come closer together until you reach the bearing
    down phase.'
  - 'KEIKO: Worf... has the baby turned?'
  - 'WORF: Turned... ?'
  - 'KEIKO: So the head is down. Doctor Crusher told me a few days ago it hadn''t...
    but she wasn''t worried because I still had a month to go...'
  - 'KEIKO: Worf... have you ever done this before? Delivered a baby?'
  - 'WORF: No. But I have taken the Starfleet Emergency Medical Course. In a computerized
    simulation, I assisted in the delivery of a human baby.'
