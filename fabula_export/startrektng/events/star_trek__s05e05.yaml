  - character_uuid: ger_agent_be919d884533
    emotional_state: "\n        Surface: Terrified and overwhelmed. Internal: A deep\
      \ sense of isolation, as if she is an outsider even among her peers. The turbolift’s\
      \ fall amplifies her fear, but there is also a flicker of something else—perhaps\
      \ a realization that she is not alone in her fear, even if she cannot yet express\
      \ it.\n      "
    goals:
