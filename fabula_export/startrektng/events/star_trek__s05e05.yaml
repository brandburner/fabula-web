    global_id: ger_object_66c236fbae9e
  - object_uuid: ger_object_0b0dde4fb5d6
    description_of_involvement: The cargo bay anti-grav units are another failed technological
      asset in this event, their unreliability due to radiation forcing Beverly and
      Geordi to resort to brute strength. Geordi explicitly dismisses them as an option—‘With
      this much radiation flying around in here we can’t trust the anti-grav units’—underscoring
      the characters’ limited resources. The units’ presence in the scene serves as
      a narrative device, emphasizing the desperation of the situation. Without them,
      the characters must lift the heavy quaratum containers manually, a task that
      is both physically demanding and time-sensitive. Their failure mirrors the broader
      systemic collapse aboard the *Enterprise*, where even routine tools are rendered
      useless by the crisis.
