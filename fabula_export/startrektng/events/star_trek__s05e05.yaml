  title: Picard fails to command children’s fear
  description: 'Picard regains consciousness in the wrecked turbolift, his body aching
    and his leg injured, to find the three children—Marissa, Jay Gordon, and Patterson—huddled
    together in terrified silence. His first attempt to assess their condition is
    met with stunned, wordless stares, their fear palpable. When he tries to sit up,
    the pain in his leg startles them further, underscoring the precariousness of
    their situation. His immediate attempt to contact the bridge fails, and Patterson’s
    panicked question—*‘Why don’t they answer?’*—exposes the children’s raw vulnerability.
    Jay Gordon’s blunt declaration—*‘They’re all dead’*—triggers Patterson’s emotional
    collapse, and Picard’s instinctive response—reasserting authority with a firm
    *‘They’re not dead’*—only makes things worse. The children’s renewed sobbing reveals
    the limits of Picard’s usual command presence in this context: without rank, structure,
    or even functional technology, his leadership tools are useless. The scene shifts
    from physical survival to emotional survival, forcing Picard to confront the fact
    that his role as captain means nothing here. The children’s terror is not just
    about the turbolift’s plunge but about the collapse of the adult world they relied
    on—one Picard, despite his best intentions, cannot immediately restore.'
