  title: Worf delivers Keiko’s baby unexpectedly
  description: In the midst of the *Enterprise*'s crisis, Worf—unprepared but determined—assists
    Keiko O'Brien through an unplanned childbirth in Ten Forward. His rigid Klingon
    approach to the delivery (relying on a computer simulation) clashes with the unpredictable,
    organic reality of birth, forcing him to adapt. When the baby finally arrives,
    Worf’s stoic demeanor cracks as he holds the newborn, noting her resemblance to
    Miles O’Brien. Keiko, exhausted but radiant, expresses gratitude, revealing a
    rare vulnerability in Worf as he acknowledges the fragility and wonder of new
    life—a stark contrast to the ship’s looming peril. The moment humanizes Worf,
    underscoring his hidden capacity for tenderness amid chaos, while the baby’s cry
    serves as a poignant counterpoint to the crisis unfolding around them. This event
    deepens Worf’s character arc, foreshadowing his later role as a protector and
    complicating his usual warrior identity.
