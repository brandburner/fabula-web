      the crew can **restore communications or separate it from the crippled drive
      section**. The saucer’s **detachable nature** is implicitly referenced in Ro
      and O’Brien’s later debate (off-screen) about **saucer separation**, adding
      **strategic weight** to the crew’s decisions. Symbolically, the saucer represents
      the **crew’s last hope for survival**, while its **isolation** underscores the
      **fragility of their situation**.
