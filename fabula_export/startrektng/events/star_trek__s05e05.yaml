    description_of_involvement: The USS *Enterprise*’s bridge, once a hub of order
      and command, becomes a battleground of chaos and destruction during this event.
      The location’s role shifts from a center of control to a symbol of vulnerability
      as the quantum filament strikes. The bridge’s familiar layout—conn, ops, science
      stations—is rendered obsolete when the conn console explodes, killing Monroe
      and plunging the space into darkness. The crew, who once moved with purpose
      between stations, are now disoriented and leaderless, their movements restricted
      by the lack of light and the debris strewn across the deck.
