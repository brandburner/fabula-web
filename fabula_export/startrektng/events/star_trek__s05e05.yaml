  object_involvements:
  - object_uuid: ger_object_37a6210f458d
    description_of_involvement: The cargo bay spacedoor serves as both the obstacle
      and the solution in this high-stakes moment. Initially sealed to contain the
      atmosphere, it becomes the critical exit point for the quaratum containers when
      Beverly and Geordi trigger depressurization. The door’s pressurization field—visible
      as a blue outline—disappears as the bay vents, allowing the violent rush of
      air to eject the containers into space, snuffing the plasma fire. Its re-pressurization
      later restores breathable air, saving Beverly and Geordi from certain death.
      The door’s functionality is pivotal, symbolizing the thin line between destruction
      and survival in this scene.
    status_before_event: Sealed with an active pressurization field, maintaining the
      cargo bay’s atmosphere and preventing the vacuum of space from entering.
    status_after_event: Re-pressurized and sealed once more, with the atmosphere restored
      and the immediate threat neutralized.
    global_id: ger_object_37a6210f458d
  - object_uuid: ger_object_f1093db5e2eb
    description_of_involvement: The atmospheric control panel on the far wall of the
      cargo bay is the key to Beverly and Geordi’s survival. After the bay depressurizes,
      Geordi attempts to reach it but collapses from disorientation, leaving Beverly
      to stagger across the bay and activate the controls. The panel floods the bay
      with breathable air, restoring their ability to breathe and preventing their
      deaths. Its location—far from the spacedoor—adds a layer of physical challenge,
      turning the reprssurization into a race against time and their own failing bodies.
    status_before_event: Inactive, awaiting manual activation to repressurize the
      bay after depressurization.
    status_after_event: Activated by Beverly, restoring the bay’s atmosphere and saving
      their lives.
