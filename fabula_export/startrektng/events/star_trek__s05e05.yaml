      the computer fails. O’Brien **removes its access panel** and **manipulates the
      exposed controls** to initiate **Alpha Two**, a **desperate but necessary measure**
      to bypass the ship’s downed computer. The console’s **mechanical interfaces
      and wiring** symbolize the crew’s **shift from automated to hands-on survival
      tactics**, reflecting their **adaptability under pressure**. Its use is **both
      a technical solution and a narrative turning point**, as it marks the crew’s
      **acceptance of their isolation** and their **commitment to manual overrides**.
      The **sound of O’Brien’s hands working the controls**—**precise and urgent**—adds
      to the scene’s **tense, high-stakes atmosphere**.
    status_before_event: Sealed with an access panel, part of the ship’s automated
