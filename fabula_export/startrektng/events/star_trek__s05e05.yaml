- fabula_uuid: cand_evt_scene_d75c166c8b1111ed_02
  global_id: null
  title: Antimatter containment failure revealed
  description: 'On the crippled *Enterprise* bridge, O''Brien and Troi analyze sensor
    data from the quantum filament strike when Ro abruptly restores the engineering
    console by diverting power from the phaser array—a move O''Brien condemns as reckless.
    As the crew struggles to stabilize the ship, Ro and O''Brien discover a catastrophic
    warp field deviation: the antimatter containment field has weakened to 40% and
    is failing. When Troi asks what this means, Ro delivers the grim truth—if the
    field drops below 15%, the ship will explode. The revelation forces Troi to confront
    the existential weight of her command decisions in the crisis, while O''Brien
    and Ro’s technical clash underscores the crew’s fractured coordination under pressure.
    The moment marks a turning point, shifting the narrative from immediate survival
    to a race against time to prevent total destruction.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e05
  scene_sequence: 16
  sequence_in_scene: 28
  key_dialogue:
  - 'O''BRIEN: There. Just before the second time we were hit... see the subspace
    distortion?'
  - 'RO: I diverted power from the phaser array and dumped it into the engineering
    control system.'
  - 'O''BRIEN: You what? That''s a completely improper procedure. You can''t dump
    that much raw energy into a bridge terminal without—'
  - 'RO: We aren''t going to get out of this by playing it safe.'
  - 'RO: We''ve got a problem. The quantum resonance of the filament caused a polarity
    shift in the antimatter containment field.'
  - 'O''BRIEN: If it falls to fifteen percent... the field will collapse and there''ll
    be a containment breach.'
  - 'TROI: Which means... ?'
  - 'RO: The ship will explode.'
