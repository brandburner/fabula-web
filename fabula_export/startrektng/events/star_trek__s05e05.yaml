- fabula_uuid: act_b62281255357348d
  number: 3
  summary: 'The narrative intensifies as each group confronts seemingly insurmountable
    obstacles and makes desperate decisions. Riker and Data remain trapped by the
    arcing energy in the Jeffries tube. Data, ever logical, proposes a radical solution:
    using his non-conductive body to disrupt the current, or, more practically, having
    Riker remove his cranial unit to carry his positronic brain to engineering. Riker,
    initially shocked, reluctantly agrees to remove Data''s head, recognizing the
    dire necessity. In the turbolift, Picard and the children, having opened the ceiling
    hatch, discover a broken emergency clamp, meaning the lift is precariously held
    and will eventually fall. Picard, despite his broken leg, orders Marissa to lead
    the children up the turboshaft ladder to safety, intending to sacrifice himself.
    However, Marissa, demonstrating her burgeoning leadership, insists the "crew"
    sticks together, compelling Picard to attempt the arduous climb with them, highlighting
    his commitment to his newfound charges. In the cargo bay, Geordi devises a daring
    plan to extinguish the plasma fire and eliminate the quaratum threat: open the
    external spacedoor to depressurize the bay, blowing the containers into space
    and starving the fire of oxygen. This plan, however, requires him and Beverly
    to hyperventilate and cling to a ladder to survive the vacuum. Concurrently, in
    Ten Forward, Keiko O''Brien goes into active labor. A deeply uncomfortable and
    medically unprepared Worf is forced to assist her, relying on his limited Starfleet
    Emergency Medical Course knowledge, adding a poignant and unexpected personal
    crisis to the widespread chaos. This act is characterized by profound character
    sacrifices, desperate ingenuity, and the mounting personal and structural pressures
    on the crew.'
  key_moments: []
  scene_numbers:
