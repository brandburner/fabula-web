  global_id: null
  title: Crusher and La Forge risk depressurization
  description: |2-

      Trapped in the cargo bay with a plasma fire threatening to detonate volatile quaratum containers, Beverly Crusher and Geordi La Forge execute a desperate plan to save the *Enterprise*. Beverly methodically outlines the physiological horrors of rapid depressurization—lung pressure, numbness, burst capillaries—while Geordi dryly acknowledges the risks. They hyperventilate to oxygenate their blood, brace against the console, and trigger the bay’s depressurization. The violent rush of air ejects the quaratum containers into space, snuffing the fire, but the sudden vacuum leaves them disoriented and near collapse. Geordi, weakened, stumbles toward the repressurization panel, but Beverly—fighting dizziness—reaches it first, restoring atmosphere just in time. The scene underscores their trust in each other’s expertise and their willingness to endure extreme personal risk for the ship’s survival, while the physical toll of their gamble mirrors the broader crisis engulfing the *Enterprise*.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e05
  scene_sequence: 23
  sequence_in_scene: 39
  key_dialogue:
  - 'BEVERLY: Once the air is vented, the first thing you''ll feel is extreme pressure
    in your lungs... you''ll have to resist the temptation to exhale. Next, your hands
    and feet will get cold, then numb... and some of the capillaries in exposed sections
    of skin may burst.'
  - 'GEORDI: ((dry)) Sounds like fun.'
  - 'BEVERLY: We''ll have about fifteen seconds of useful consciousness left. After
    that, there''s about ten seconds of extreme disorientation, then we pass out.'
