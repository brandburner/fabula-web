    what_happened: Deanna Troi stands at the center of the moral storm, her posture
      shifting from quiet listener to decisive leader. She moves to the observation
      lounge window for a moment of solitude, her back turned as she processes the
      weight of the argument between O'Brien and Ro. When she turns back, her voice
      is steady but her hands betray a slight tremor—she is acutely aware of the lives
      at stake and the potential consequences of her choice. Troi’s decision to divert
      power to engineering is delivered with quiet resolve, her empathy for potential
      survivors overriding Ro’s pragmatic warnings. Her final 'Thank you, Ensign'
      to Ro is laced with unspoken tension, acknowledging the ensign’s dissent but
      reaffirming her authority.
