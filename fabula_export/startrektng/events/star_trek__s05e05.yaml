- fabula_uuid: cand_evt_scene_7350eaa201b2e3f7_01
  global_id: null
  title: Picard leads children through plummeting shaft
  description: "\n  Trapped in a malfunctioning turbolift shaft after the *Enterprise*’s\
    \ quantum filament attack, Picard and the three children—Marissa, Jay Gordon,\
    \ and Patterson—face a deadly crisis when the lift suddenly drops beneath them.\
    \ Picard, injured and tied to the children via improvised optical cables, fails\
    \ to open the Deck 7 doors and must order the group to climb higher. Patterson,\
    \ already paralyzed by fear, freezes completely after the lift’s violent plummet,\
    \ threatening to stall the entire group. Recognizing the need to restore momentum\
    \ and cohesion, Picard initiates a spontaneous group song—*Frère Jacques*—to refocus\
    \ their energy and overcome Patterson’s paralysis. The song becomes a unifying\
    \ act of leadership, transforming collective dread into shared resolve as they\
    \ resume their climb toward survival. The moment underscores Picard’s adaptive\
    \ leadership, shifting from command authority to empathetic guidance, while also\
    \ revealing the children’s individual struggles with fear and resilience under\
    \ extreme pressure.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e05
  scene_sequence: 21
  sequence_in_scene: 36
  key_dialogue: &id025
  - 'PICARD: I can''t open this door.'
  - 'PATTERSON: What if that one doesn''t open either?'
  - 'JAY GORDON: Then we''ll never get out.'
  - 'MARISSA: Quiet. That''s an order.'
  - 'PICARD: We''re going up. Ready?'
  - 'MARISSA: Ready, sir.'
  - 'PICARD: We''re all right. We''re going to keep climbing. Don''t look down.'
  - 'PICARD: What we need—is a climbing song. Marissa, what''s a song you sing in
    school?'
  - 'MARISSA: The Laughing Vulcan and His Dog?'
  - 'PICARD: I''m afraid I don''t know that one. I know—''Frère Jacques.'' We used
    to sing that when I was your age. Patterson, do you know that song?'
  - 'ALL BUT PATTERSON: ... Frère Jacques, Frère Jacques... dormez vous, dormez vous...
    sonnez les matines, sonnez les matines, ding din dong, ding din dong.'
