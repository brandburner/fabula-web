      displaying starfields or tactical data, are **dark or fragmented**, mirroring
      the crew’s **lack of situational awareness**. The bridge’s **acoustics**—**echoing
      with urgent voices and the hum of strained systems**—create a **tense, claustrophobic
      atmosphere**, amplifying the **stakes of their decisions**. Symbolically, the
      bridge represents the **heart of Starfleet’s institutional power**, now **fragile
      and humanized** by the crew’s personal struggles (e.g., O’Brien’s concern for
      Keiko).
    observed_atmosphere: Tension-filled with whispered conversations, urgent shouts,
      and the hum of strained systems. The air is thick with **fear, desperation,
