  - character_uuid: ger_agent_868446276ca7
    emotional_state: Determined with an undercurrent of quiet intensity. Riker’s emotional
      state is a mix of resolve and restraint—he is fully engaged in the crisis, but
      his actions are measured and deliberate. There is no panic in his voice, only
      a steely focus on the tasks at hand. His squeeze of Keiko’s hand is a rare moment
      of vulnerability, revealing the personal stakes beneath his professional demeanor.
      He is acutely aware of the weight of his decisions, but he does not waver.
    goals:
    - Restore control of the *Enterprise* by reaching engineering and assessing the
      ship’s critical systems.
    - Ensure the survival of the crew, particularly the wounded in Ten Forward, by
      delegating responsibilities effectively.
    what_happened: 'Riker is the linchpin of this event, his actions and decisions
      defining the crew’s response to the crisis. He begins by tending to Keiko’s
      injury with a tenderness that belies the urgency of the situation, his concern
      for her well-being a quiet but significant moment of humanity. When Data enters
      and delivers his grim report, Riker’s demeanor shifts from caregiver to commander.
      His declaration (''We should assume the worst... that everyone on the bridge
      is dead and no one is in control of the ship'') is a turning point—he is no
      longer second-in-command but the de facto leader of the *Enterprise*. His decision
      to split the crew’s efforts (Worf managing triage, Data accompanying him to
      engineering) reflects his tactical pragmatism and growing confidence. The moment
      is charged with unspoken stakes: if Riker fails, the ship is lost. His leadership
      is tested not just by the physical chaos (shattered glass, overturned tables,
      groaning wounded) but by the moral weight of his choices. As he and Data exit
      Ten Forward, Riker’s resolve is palpable—he is stepping into Picard’s shoes,
      and the crew’s survival depends on it.'
