      \ state becomes a metaphor for the fragility of the group’s situation and the\
      \ limitations of institutional safeguards (the Enterprise’s systems) in a crisis.\
      \ Their failure necessitates the children’s improvised solution, turning a technological\
      \ safety measure into a symbol of their vulnerability.\n      "
