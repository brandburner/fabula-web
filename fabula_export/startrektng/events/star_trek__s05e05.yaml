  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: 'Starfleet’s influence is palpable in this event,
      even as its protocols and command structures begin to break down. The crew’s
      actions—Worf’s triage efforts, Riker’s leadership, Data’s technical assessments—are
      all rooted in Starfleet training and values, even in the absence of direct oversight.
      The organization’s presence is felt in the medical tricorder, the first aid
      kit, and the emergency bulkheads, all of which are standard Starfleet-issue
      equipment designed to handle crises. However, the event also highlights the
      limitations of Starfleet’s systems: the bulkheads have sealed off critical sections,
      sickbay is inaccessible, and the crew is forced to improvise. Starfleet’s role
      in the event is twofold: it provides the tools and training that the crew relies
      on, but it also creates the constraints that they must work around. The organization’s
      influence is a double-edged sword—it offers structure and resources, but it
      also imposes rigid protocols that may not be sufficient in a disaster of this
      magnitude.'
    active_representation: Through institutional protocols (e.g., emergency bulkheads,
      medical tricorders, first aid kits) and the crew’s training (e.g., Worf’s triage
      efforts, Riker’s leadership, Data’s technical assessments). Starfleet is also
      represented by the unspoken expectations placed on the crew—even in chaos, they
      are expected to uphold its values and find a way to survive.
    power_dynamics: Exercising authority over individuals through training and equipment,
      but operating under constraint due to the ship’s damaged infrastructure. Starfleet’s
      power is both enabling (providing resources) and limiting (imposing protocols
      that may not be sufficient in a crisis). The crew must adapt to the organization’s
      systems while also working around their failures.
    organizational_goals:
