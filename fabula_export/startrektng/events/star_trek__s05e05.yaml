      labor. The console’s failure symbolizes the broader crisis: the *Enterprise*’s
      systems are compromised, and the crew must rely on their own ingenuity and physical
      prowess to survive. Its presence in the scene serves as a stark reminder of
      the stakes—without it, the characters are left with no choice but to risk their
      lives dragging the containers by hand.'
