  global_id: null
  title: Riker assumes crisis command in Ten Forward
  description: 'With the *Enterprise* crippled and Ten Forward repurposed as an emergency
    triage center, Commander Riker takes decisive leadership in the absence of Picard
    and the bridge crew. After assessing Keiko O’Brien’s injuries and delegating Worf
    to manage the wounded, Riker and Data determine that the bridge is likely destroyed
    and the ship is leaderless. Riker makes the critical call to assume the worst-case
    scenario—no command structure remains—and prioritizes reaching engineering through
    a perilous service crawlway. His decision to split the crew’s efforts (Worf handling
    triage, Data accompanying him) reflects both tactical pragmatism and his growing
    confidence in crisis leadership. The moment underscores the crew’s fractured response
    to the disaster and Riker’s transformation from second-in-command to the ship’s
    de facto leader, testing his readiness to fill Picard’s shoes under extreme pressure.
    The scene’s tension stems from the unspoken stakes: if Riker fails, the *Enterprise*
    may be lost entirely.'
