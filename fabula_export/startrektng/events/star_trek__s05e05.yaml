      impulse, warp engines—are crippled by the quantum filament, rendering it incapable
      of defending itself or its crew. The organization’s protocols and hierarchy
      are tested to the breaking point: Monroe’s death leaves a power vacuum, and
      the bridge crew’s survival instincts take precedence over Starfleet protocol.
      The *Enterprise*’s failure to withstand the filament strike reflects broader
      themes of vulnerability and the limits of human technology in the face of cosmic
      forces.'
