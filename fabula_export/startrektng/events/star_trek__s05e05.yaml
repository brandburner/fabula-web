  key_dialogue: &id005
  - 'PICARD: I want you all to know that we on the Enterprise are very proud of the
    science fair winners. Perhaps some of you will choose to pursue a career in Starfleet.
    I heartily urge you to do so.'
  - 'PATTERSON: I planted radishes in this special dirt and they came up all weird!'
  - 'JAY GORDON: An analysis of the life span of the swarming moths of Gonal Four.
    They only live for twenty hours. Then they all die.'
  - 'PICARD: Hang on—we''re falling!'
