  key_dialogue:
  - 'RO: The field strength is down to twenty percent. We can''t run the risk of staying
    here any longer.'
  - 'O''BRIEN: We''re not in danger until it drops below fifteen percent. We can afford
    to wait and see if anyone in engineering notices those monitors.'
  - 'TROI: Have you made preparations to separate the Saucer Section?'
  - 'RO: ((firmly)) O''Brien''s fixed it temporarily, but it could happen again at
    any moment, and next time we might not be able to stop it. You can''t let wishful
    thinking guide your decision. It''s time to leave, Counselor.'
  - 'TROI: We will separate the ship when I have decided that it''s time, not before.
    Is that clear, Ensign?'
