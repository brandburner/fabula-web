  title: Worf’s paternal crisis and Troi’s moral counsel
  description: 'In Troi’s quarters, Worf confesses his deepening fear that his son
    Alexander’s rejection of Klingon traditions will leave their family’s house without
    an heir—while also revealing his own regret over failing to take Alexander to
    Qo’noS sooner. Troi challenges Worf’s assumption that Alexander must fully embrace
    Klingon identity, arguing that Worf’s own hybrid existence proves balance is possible.
    Though Worf acknowledges her point, his lingering doubt about Alexander’s future
    and the looming threat of K’mtar’s *ya’nora kor* challenge create a crisis of
    confidence: Worf must decide whether to force Alexander into Klingon training
    or risk losing his son’s heritage entirely. The scene underscores the tension
    between tradition and individuality, while Troi’s counsel forces Worf to confront
    the ethical weight of his choices as both a father and a warrior.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e21
  scene_sequence: 15
  sequence_in_scene: 35
  key_dialogue:
