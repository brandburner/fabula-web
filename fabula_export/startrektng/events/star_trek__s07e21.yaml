  title: Riker secures Kalla system intel from Quark
  description: "\n  On the *Enterprise* bridge, Commander Riker interrogates Quark\
    \ via subspace communication to extract intelligence about the Duras sisters'\
    \ whereabouts. Riker leverages their shared history—including Quark’s past financial\
    \ deception—to pressure the Ferengi into revealing that Lursa and B'Etor are targeting\
    \ a magnesite deposit in the Kalla system, a resource the Pakleds unknowingly\
    \ possess. The exchange underscores Riker’s tactical cunning and Quark’s self-serving\
    \ pragmatism, while K'mtar’s eagerness for the hunt subtly foreshadows his hidden\
    \ motives. Worf confirms the *Enterprise*’s travel time to the Kalla system, setting\
    \ the mission in motion. The scene blends procedural efficiency with character-driven\
    \ tension, as Riker’s interrogation exposes Quark’s greed and K'mtar’s unsettling\
    \ enthusiasm for the impending confrontation.\n  "
