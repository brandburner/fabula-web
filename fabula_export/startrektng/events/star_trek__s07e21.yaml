  key_dialogue:
  - 'WORF: K''mtar, why did you treat Commander Riker so disrespectfully?'
  - 'K''MTAR: I may have been rude by human standards, but I meant no disrespect.
    What''s the matter, Worf, have you been living among humans so long that you''ve
    forgotten how Klingons behave?'
  - 'WORF: No... it has not been easy.'
  - 'K''MTAR: How are his fighting skills? Can he handle a Bat''leth?'
  - 'WORF: Actually... Alexander has not committed himself to undergoing the rite.'
  - 'K''MTAR: What?'
  - 'WORF: I have tried to make him see how important it is, but he will not listen
    to me.'
  - 'K''MTAR: Perhaps together, you and I can find a way to spark the boy''s interest
    in his heritage.'
  - 'K''MTAR: May I say goodnight to him?'
