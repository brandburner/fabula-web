  title: Riker authorizes covert mining investigation
  description: "\n  On the *Enterprise* bridge, Riker takes command as the ship approaches\
    \ Kalla Three, where Worf has detected an abandoned mining shaft. The magnesite\
    \ interference complicates life-sign readings, leaving the team uncertain about\
    \ the shaft’s current activity or occupants. Riker, recognizing the potential\
    \ threat posed by illegal mining operations, orders Data to assemble an Away Team\
    \ for direct investigation. The decision escalates the mission’s stakes, shifting\
    \ from passive observation to active intervention. Worf’s earlier discovery—though\
    \ inconclusive—validates Riker’s suspicion of foul play, reinforcing the need\
    \ for a covert but thorough response. The scene marks a deliberate Starfleet escalation,\
    \ with the Away Team’s deployment serving as both a tactical move and a narrative\
    \ pivot toward confrontation.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e21
  scene_sequence: 11
  sequence_in_scene: 28
  key_dialogue: &id021
  - 'DATA: We are approaching Kalla Three.'
  - 'RIKER: Any evidence of a mining operation?'
  - 'WORF: A shaft has been cut through the outer crust... there is evidence of machinery,
    but it does not appear to be in use.'
  - 'RIKER: Life signs?'
  - 'DATA: It is difficult to say. The magnesite is interfering with bioreadings.'
  - 'RIKER: Assemble an Away Team.'
