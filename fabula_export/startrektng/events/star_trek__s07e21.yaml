  - 'ALEXANDER: I know -- it''s mummified. He said he''d show it to us for fifty darseks.'
  - 'WORF: He is trying to take your money.'
  - 'ALEXANDER: Please, Father. He''s waiting.'
  - 'WORF: No. It is late. We should go home.'
