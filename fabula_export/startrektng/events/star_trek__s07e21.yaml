      at the defenseless warrior, his hands trembling as he drops the bat’leth. When
      the hologram retaliates, Alexander’s distress turns to panic—he flees the scene
      without a word, his exit a silent scream of emotional overload. His body language—hunched
      shoulders, averted gaze—betrays his shame, fear, and exhaustion from the relentless
      pressure to conform.
