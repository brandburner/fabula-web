  global_id: null
  title: Enterprise exposes cloaked Klingon threat
  description: "\n  The *Enterprise* detects and fires upon a cloaked Klingon *Bird\
    \ of Prey*, briefly exposing its presence before it vanishes. Riker, anticipating\
    \ the sisters' involvement in the stolen ore transaction, orders a tractor beam\
    \ to lock onto the ship. When Lursa and B'Etor hail the *Enterprise*, Riker accuses\
    \ them of orchestrating the assassination attempt on Worf, though they deny any\
    \ knowledge. Their mocking laughter and evasive responses escalate tensions, revealing\
    \ their contempt for Worf while also hinting at their deeper involvement in the\
    \ conspiracy. The confrontation culminates in their reluctant agreement to beam\
    \ aboard, setting the stage for a direct confrontation where evidence will be\
    \ presented—raising the stakes for Worf’s personal and professional integrity.\n\
    \  "
