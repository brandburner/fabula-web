  global_id: null
  title: Alexander Rejects K'mtar’s Warrior Path
  description: In Worf’s quarters, K’mtar pressures Alexander to abandon his human
    identity and embrace Klingon warrior training, including the Rite of Ascension.
    Alexander, initially engaged in a discussion about Kahless and Morath, challenges
    K’mtar’s rigid interpretation of Klingon stories, arguing that Morath’s refusal
    to fight might have been an act of love rather than cowardice. K’mtar dismisses
    Alexander’s questions, insisting he must conform to Klingon traditions. When K’mtar
    suggests Alexander leave the *Enterprise* to attend a Klingon school, Alexander
    resists, accusing K’mtar of being just like Worf—obsessed with turning him into
    a warrior. The confrontation escalates until Alexander storms out, leaving K’mtar
    visibly devastated, his facade of control crumbling. The scene underscores the
    generational conflict between tradition and self-determination, while K’mtar’s
    emotional reaction hints at a deeper, personal stake in Alexander’s future—one
    that goes beyond mere mentorship. The rejection deepens the tension between Alexander’s
    identity crisis and K’mtar’s hidden agenda, setting up future confrontations over
    duty and autonomy.
