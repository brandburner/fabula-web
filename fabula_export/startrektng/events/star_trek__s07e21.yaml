  title: Alexander reveals his time-travel mission
  description: "\n  In Worf’s quarters, K’mtar—weakened and gasping—reveals his true\
    \ identity as Alexander from the future, shattering Worf’s assumptions. To prove\
    \ his claim, he recounts intimate, private details of Lwaxana Troi’s death, forcing\
    \ Worf to confront an impossible truth: his son’s fate is already written—and\
    \ tied to forces beyond his control. Alexander confesses he traveled back in time\
    \ to prevent Worf’s murder, which he blames on his own pacifism being perceived\
    \ as weakness in Klingon society. He admits staging the assassination attempt\
    \ to force Alexander (the present-day boy) to embrace warrior training, fearing\
    \ history will repeat itself. Worf, initially skeptical, is moved by Alexander’s\
    \ emotional plea and the shared trauma of Lwaxana’s death. The revelation forces\
    \ Worf to question his own rigid expectations of Alexander, while Alexander grapples\
    \ with the futility of his mission. Their exchange culminates in a raw, emotional\
    \ embrace, marking a turning point in their father-son dynamic and the broader\
    \ narrative of destiny versus choice.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e21
  scene_sequence: 21
  sequence_in_scene: 52
  key_dialogue:
  - 'K''MTAR: I... am your son... Alexander... I have come to this time from forty
    years in the future.'
  - 'K''MTAR: I was three years old. She was dying when we found her. She barely managed
    to whisper my name... and she took my hand... and placed it in yours. Then she
    died. You howled with rage... and then you told me to look at her... to look at
    death... and always to remember. And I always have.'
  - 'WORF: The cause of peace is a worthy one... go back, and continue to work for
    it. Your struggle must continue.'
  - 'K''MTAR: But it is a futile struggle...'
  - 'WORF: No... you''ve already changed things more than you realize. I''m talking
    about myself. You have given me a glimpse into my son''s future. I see now that
    he has his own destiny... and I believe it will be a great one...'
