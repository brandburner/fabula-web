  global_id: null
  title: Riker leverages Quark for Duras intel
  description: "\n  On the *Enterprise* bridge, Riker exploits Quark’s lingering debt\
    \ from a dabo game to coerce the Ferengi into revealing critical intelligence\
    \ about the Duras sisters. Quark, initially evasive, admits under pressure that\
    \ Lursa and B'Etor are secretly acquiring mining equipment to exploit a magnesite\
    \ deposit in the Kalla system—a resource owned by the Pakleds. The revelation\
    \ provides the *Enterprise* with actionable intel for their next strategic move,\
    \ while also exposing the Duras sisters' expansionist ambitions and potential\
    \ conflict with the Pakleds. K'mtar, observing the exchange, questions Quark’s\
    \ credibility but ultimately concedes the lead. Riker orders the *Enterprise*\
    \ to depart for the Kalla system, setting the mission in motion. The scene underscores\
    \ Riker’s tactical acumen and Quark’s self-serving pragmatism, while subtly foreshadowing\
    \ K'mtar’s hidden motives through his eagerness for the hunt.\n  "
