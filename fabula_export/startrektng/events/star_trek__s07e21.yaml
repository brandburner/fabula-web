    this ship.'
  - 'ALEXANDER: Sometimes...'
  - 'K''MTAR: Have you ever been to the homeworld?'
  - 'ALEXANDER: No...'
  - 'K''MTAR: I think you''d like it there. At your uncle''s house there is a lake
    where you can swim. The water is so clear you can see to the bottom.'
  - 'ALEXANDER: Really?'
