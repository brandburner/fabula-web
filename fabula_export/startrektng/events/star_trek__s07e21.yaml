  key_dialogue: &id025
  - 'GORTA: Lursa! B''Etor? Do you know where they are?'
  - 'GEORDI: Actually we were hoping you did.'
  - 'GORTA: The Duras sisters... they are magnificent, aren''t they? Selling the ore,
    I imagine. They took everything, the ore, the ship... Such treachery... I can''t
    help but adore them.'
  - 'DATA: What kind of ship do they have?'
  - 'GORTA: A Bird of Prey. With a working cloaking device. Who knows how they got
    hold of that...'
  - 'WORF: And where have they gone?'
  - 'GORTA: We were going to sell the ore to a Yridian trader. We were supposed to
    meet him in the Ufandi system.'
