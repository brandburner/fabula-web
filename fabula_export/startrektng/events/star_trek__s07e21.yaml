- fabula_uuid: cand_evt_scene_61e64300281b1206_01
  global_id: null
  title: Alexander reveals his time-travel mission
  description: 'In a moment of raw vulnerability, K''mtar—Worf’s enigmatic Klingon
    advisor—collapses under physical and emotional strain, revealing his true identity
    as Alexander, Worf’s son from the future. To prove his claim, he recounts intimate,
    private details of Lwaxana Troi’s death, forcing Worf to confront an impossible
    truth: his son has traveled back in time to alter a future where Worf’s murder
    was orchestrated by Klingon society as punishment for Alexander’s pacifism. The
    revelation shatters Worf’s assumptions about K’mtar’s motives and exposes the
    brutal consequences of Alexander’s moral stance in a warrior culture. Worf, initially
    skeptical, is compelled to believe the truth when K’mtar describes events only
    Alexander could know. The confrontation escalates as K’mtar admits he staged the
    assassination attempt to harden Alexander into a warrior, fearing his own weakness
    led to Worf’s death. Worf, though shaken by the news of his own murder, prioritizes
    Alexander’s emotional turmoil, urging him to embrace his true self rather than
    conform to Klingon expectations. Their exchange culminates in a poignant embrace,
    where Worf reassures Alexander that his struggle for peace is worthy, even if
    it defies tradition. The event serves as a turning point, forcing Worf to accept
    Alexander’s individual path while revealing the high stakes of their generational
    conflict—one that transcends time itself.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e21
  scene_sequence: 21
  sequence_in_scene: 51
  key_dialogue: &id037
  - 'K''MTAR: I... am your son... Alexander... I have come to this time from forty
    years in the future.'
  - 'K''MTAR: I was three years old. She was dying when we found her. She barely managed
    to whisper my name... and she took my hand... and placed it in yours. Then she
    died. You howled with rage... and then you told me to look at her... to look at
    death... and always to remember. And I always have.'
  - 'WORF: The cause of peace is a worthy one... go back, and continue to work for
    it. Your struggle must continue.'
  - 'K''MTAR: But it is a futile struggle...'
  - 'WORF: No... you''ve already changed things more than you realize. I''m talking
    about myself. You have given me a glimpse into my son''s future. I see now that
    he has his own destiny... and I believe it will be a great one...'
