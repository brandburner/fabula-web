  - 'WORF: "I am confident my brother would not vote against me."'
  - 'TROI: "You don''t sound confident..."'
  - 'WORF: "Perhaps I should let Alexander know what is at stake... it might induce
    him to spend more time training."'
  - 'TROI: "I''m not sure that''s a good idea... it might scare him."'
  - 'WORF: "I should have tried harder... I should have taken him to visit the homeworld..."'
  - 'TROI: "The truth is you''ve found a balance within yourself, a balance that feels
    right to you. You have to trust that Alexander will be able to find his own balance.
    Just as you did."'
  - 'WORF: "Part of me wants to give him that freedom... but what if he turns away
    from his Klingon heritage? What will happen to my father''s house? Who will lead
    it?"'
