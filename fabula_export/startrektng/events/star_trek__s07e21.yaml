      risk of future retaliation from Riker.
    what_happened: Quark appears on the viewscreen from Deep Space Nine, his usual
      smug demeanor faltering as soon as he sees Riker. He attempts to deflect the
      conversation with forced smiles and evasive remarks, but Riker's mention of
      the unpaid latinum vouchers clearly unsettles him. Quark's body language becomes
      increasingly tense as the interrogation progresses, his fingers fidgeting and
      his voice taking on a higher pitch. Eventually, he relents and reveals the information
      about the Duras sisters' plans, though not without first voiding the vouchers
      in a petty act of defiance. His performance is a mix of nervousness, self-preservation,
      and Ferengi cunning.
