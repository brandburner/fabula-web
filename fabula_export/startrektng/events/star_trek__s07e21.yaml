  global_id: null
  title: Riker baits the Duras sisters with ore
  description: "\n  On the *Enterprise* bridge, Riker orchestrates a high-stakes tactical\
    \ maneuver to lure the Duras sisters into a trap. After confirming the Yridian\
    \ freighter carries only a fraction of the expected magnesite ore—suggesting the\
    \ Duras sisters have already offloaded most of it—Riker exploits the Yridian’s\
    \ greed by offering an exorbitant trade (Anjoran bio-mimetic gel) for the remaining\
    \ ore. Once secured, he orders Worf to transport the ore into open space and destroy\
    \ it with phasers, using it as bait to provoke the Duras sisters into revealing\
    \ their position. The act underscores Riker’s strategic cunning and willingness\
    \ to sacrifice tangible assets for a tactical advantage, while also escalating\
    \ the tension of the unseen Klingon threat. Troi’s skepticism and Worf’s confusion\
    \ hint at the crew’s unease with Riker’s unorthodox methods, reinforcing the high\
    \ stakes of the operation.\n  "
