    what_happened: "\n        Yog, the Yridian trader, is a study in greed and evasiveness.\
      \ His syntax is halting, his body language defensive as he claims to have acquired\
      \ the magnesite from a ‘Corvallen’—a lie Troi immediately detects. When Riker\
