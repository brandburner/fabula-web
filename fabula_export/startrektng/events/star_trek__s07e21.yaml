  - character_uuid: ger_agent_f1a913dda0ad
    emotional_state: "\n        Coolly calculating, with a hint of satisfaction in\
      \ his control over the situation. There’s no doubt in his actions—he’s playing\
      \ multiple moves ahead, and the destruction of the ore is a statement: *‘I know\
      \ you’re watching.’* His emotional state is one of strategic exhilaration, tempered\
      \ by the weight of leadership.\n      "
    goals:
    - Force the Duras sisters into revealing their position by creating an irresistible
      target (the destroyed ore)
    - Demonstrate to the crew (and the Duras sisters) that he is always three steps
      ahead, reinforcing his authority as first officer
    what_happened: "\n        Riker dominates the scene with effortless authority,\
      \ his charisma masking the complexity of his strategy. He engages Yog with a\
      \ mix of charm and calculated pressure, offering the Anjoran gel not as a fair\
      \ trade, but as a deliberate provocation. His body language is relaxed yet commanding—leaning\
      \ slightly forward during the negotiation, then stepping back to input coordinates\
      \ for the ore’s transport, all while ignoring Troi’s probing question. The destruction\
      \ of the ore is his signature move: a bold, almost theatrical gesture designed\
      \ to flush out the Duras sisters. Riker’s genius lies in his ability to turn\
      \ a tactical setback (the missing ore) into a psychological advantage, using\
      \ the *Enterprise*’s resources as tools of deception.\n      "
