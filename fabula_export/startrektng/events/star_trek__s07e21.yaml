  global_id: null
  title: K'mtar threatens Alexander's life
  description: 'Worf returns to his quarters to find K''mtar standing over Alexander''s
    sleeping form, disruptor in hand, his expression a mix of dread and grim resolve.
    The moment Worf enters, K''mtar''s intent becomes clear—he has come to kill the
    boy. A violent struggle ensues as Worf disarms K''mtar, only for the advisor to
    retrieve the weapon and turn it on Worf, forcing him into a no-win scenario: step
    aside and allow Alexander''s murder, or risk being stunned and leaving his son
    defenseless. The confrontation escalates until K''mtar delivers the devastating
    revelation that he is not who he claims to be—he is Alexander himself, from the
    future. This moment shatters Worf''s understanding of the situation, exposing
    K''mtar''s true motives and the depth of the conspiracy surrounding Alexander''s
    heritage. The revelation leaves Worf stunned, the audience questioning the nature
    of K''mtar''s deception and the implications for Alexander''s safety and future.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e21
  scene_sequence: 20
  sequence_in_scene: 49
  key_dialogue: &id033
  - 'K''MTAR: No further.'
  - 'WORF: K''mtar... why are you doing this?'
  - 'K''MTAR: Step away from the door.'
  - 'WORF: You will have to kill me.'
  - 'K''MTAR: I won''t do that. But I can stun you -- then kill the boy.'
  - 'WORF: What?'
  - 'K''MTAR: I... am Alexander.'
