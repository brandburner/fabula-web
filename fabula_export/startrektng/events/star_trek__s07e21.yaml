  title: Troi challenges Worf’s paternal hypocrisy
  description: 'In a private, emotionally charged conversation in Troi’s quarters,
    Worf confesses his fear that Alexander’s rejection of Klingon tradition may cost
    him his father’s house and legacy. Troi forces Worf to confront the hypocrisy
    of his own divided loyalties—he demands Alexander embrace Klingon identity while
    clinging to Starfleet, a choice he himself made. When Worf admits regret over
    not taking Alexander to Qo’noS, Troi counters that his son’s humanity is equally
    valid, urging him to trust Alexander’s ability to forge his own balance. The exchange
    exposes Worf’s deeper anxiety: his fear that his son’s choices will erase his
    own hard-won reconciliation between Klingon and Starfleet values. Troi’s counsel
    doesn’t resolve his conflict but forces him to acknowledge the self-centeredness
    of his expectations, setting up his later confrontation with K’mtar’s radical
    methods and the revelation of Alexander’s future self.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e21
