      the mission’s objectives are met despite environmental challenges.
    what_happened: "\n        Data assumes the Ops position with his characteristic\
      \ fluidity, his fingers poised over the console like a pianist about to play\
      \ a complex piece. His report of the *Enterprise*’s approach to Kalla Three\
      \ is delivered in his usual measured tone, but there’s a subtle shift when Riker\
