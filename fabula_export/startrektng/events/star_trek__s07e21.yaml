- fabula_uuid: cand_evt_scene_ad6cf55df5ad4758_02
  global_id: null
  title: K'mtar reveals his true identity
  description: 'In the dead of night, K''mtar enters Worf''s quarters with a disruptor,
    poised to kill Alexander while the boy sleeps. His conflicted expression suggests
    this act is not born of malice but necessity—he believes he must do it. Worf interrupts
    the moment, grappling with K''mtar in a violent struggle that ends with the disruptor
    skittering across the floor. K''mtar retrieves it and levels it at Worf, demanding
    he step away from Alexander''s door. When Worf refuses, K''mtar delivers the devastating
    revelation: *I... am Alexander.* The line hangs in the air, a bombshell that shatters
    the narrative foundation, forces Worf to confront an impossible truth, and leaves
    the audience reeling with questions about K''mtar''s motives, Alexander''s fate,
    and the nature of time itself. The abrupt fade-out heightens the tension, ensuring
    the revelation lingers as an unresolved crisis.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e21
