  - object_uuid: ger_object_a42ce4ee6ea7
    description_of_involvement: 'The magnesite deposit in the Kalla system is the
      ultimate prize sought by the Duras sisters, a resource owned by the Pakleds
      but unknown to them. Quark’s revelation about the deposit’s existence and the
      sisters’ plans to exploit it provides the *Enterprise* with a clear mission
      objective: intercept the Duras sisters before they can extract the magnesite.
      The deposit serves as both a narrative MacGuffin and a symbol of the sisters’
      ambition, driving the *Enterprise*’s pursuit and the tension that follows. Its
      value and the sisters’ desperation to acquire it underscore the stakes of the
      mission.'
    status_before_event: Unknown to the Pakleds, located in the Kalla system, and
      targeted by the Duras sisters for illegal extraction.
    status_after_event: Confirmed as the Duras sisters’ objective, now a known target
