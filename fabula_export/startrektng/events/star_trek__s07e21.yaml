  - organization_uuid: ger_organization_94bd38359315
    description_of_involvement: "\n        The House of Mogh is the driving institutional\
      \ force behind Worf’s crisis in this scene, even though it is never explicitly\
      \ named. Its survival—tied to Alexander’s acceptance of Klingon tradition—is\
      \ the unspoken stake in the custody dispute and the reason Worf fears his son’s\
      \ rejection of his heritage. The house’s legacy looms over the conversation,\
      \ particularly in Worf’s question: ‘What will happen to my father’s house? Who\
      \ will lead it?’ The house is not just a family; it is a Klingon institution\
      \ with its own expectations, honor codes, and political stakes. Its influence\
      \ is felt in the legal threat of *ya’nora kor*, K’mtar’s radical methods, and\
      \ Worf’s own internalized pressure to preserve his father’s name. The house’s\
      \ survival depends on Alexander’s conformity, making Worf’s conflict a matter\
      \ of dynastic consequence.\n      "
    active_representation: Through Worf’s internalized fear of failure and his confession
