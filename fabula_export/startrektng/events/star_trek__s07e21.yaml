  global_id: null
  title: K'mtar reveals Klingon homeworld evidence
  description: In the observation lounge, Worf presents the Duras dagger as evidence
    implicating Lursa and B'Etor in the assassination attempt, but their vehement
    denials and Troi's empathic reading of Lursa's sincerity force Riker to question
    K'mtar's credibility. The confrontation escalates when B'Etor discovers ancient
    Klingon markings on the dagger, revealing Lursa's secret pregnancy—a son Worf
    never knew existed. This revelation forces Worf to confront K'mtar for answers,
    deepening the conspiracy surrounding Alexander's heritage and the true motives
    of Worf's mysterious family advisor. K'mtar, uncharacteristically distracted,
    suggests setting a course for the Klingon homeworld to investigate further, hinting
    at a larger, unresolved threat tied to Kurn. The scene leaves the crew with unanswered
    questions about K'mtar's motives and the true nature of the threat facing Alexander,
    while raising the stakes for Worf's family conflict.
