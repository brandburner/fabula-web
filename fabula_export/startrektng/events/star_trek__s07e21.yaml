  title: Alexander rejects Klingon dogma
  description: In Worf’s quarters, K’mtar attempts to enforce rigid Klingon cultural
    lessons on Alexander by recounting the story of Kahless and Morath, but Alexander
    challenges the traditional interpretation by questioning Kahless’s anger and Morath’s
    motives. K’mtar dismisses Alexander’s human-influenced perspective, insisting
    he must conform to Klingon expectations. The confrontation escalates when K’mtar
    pressures Alexander to abandon the *Enterprise* and attend a Klingon school to
    prepare for the Rite of Ascension, framing it as the only way for him to belong.
    Alexander, initially shaken by K’mtar’s psychological manipulation, ultimately
    rejects the advisor’s demands, accusing him of being no different from Worf in
    his obsession with turning him into a warrior. The scene ends with Alexander storming
    out, leaving K’mtar visibly distressed, hinting at deeper emotional stakes beyond
    the surface conflict. This moment crystallizes the generational clash between
    tradition and personal identity, forcing Alexander to assert his mixed heritage
    while exposing K’mtar’s hidden agenda—his desperate need for Alexander to embrace
    his Klingon destiny for reasons that extend beyond cultural instruction.
