  title: K'mtar reveals Duras sisters' betrayal
  description: 'In the observation lounge, Riker, Worf, and K''mtar convene to discuss
    the assassination attempt on Worf. K''mtar, initially dismissive of Riker’s involvement,
    reveals himself as a trusted advisor (gin''tak) to Worf’s family, sent by Kurn
    to prevent the attack. Worf unveils a Duras dagger—evidence implicating Lursa
    and B''Etor—while K''mtar confirms their motive: seizing Kurn’s council seat.
    The exchange escalates tensions between Klingon honor and Starfleet’s investigative
    authority, with Worf vowing retaliation and K''mtar’s sharp tone undermining Riker’s
    diplomatic efforts. The scene crystallizes the Duras sisters’ treachery, deepens
    the blood feud’s stakes, and sets up K''mtar’s ambiguous role as both ally and
    potential threat. Riker’s invitation for K''mtar to stay aboard subtly shifts
    power dynamics, hinting at future scrutiny of his motives.'
