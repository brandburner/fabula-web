  object_involvements:
  - object_uuid: ger_object_49e06c6f0254
    description_of_involvement: The *Enterprise* bridge viewscreen is the primary
      medium through which this event unfolds, serving as both a window and a weapon.
      It projects Quark's image from Deep Space Nine, allowing Riker to interrogate
      him in real-time while maintaining the psychological pressure of a face-to-face
      confrontation. The viewscreen's glow casts a clinical light over the bridge,
      reinforcing the institutional nature of Starfleet's pursuit. When Quark appears,
      his alarm at seeing Riker is amplified by the viewscreen's unblinking gaze,
      making his evasion feel futile. Later, the viewscreen shifts back to the starfield,
      symbolizing the *Enterprise*'s transition from investigation to action. The
      viewscreen is more than a tool; it is a stage for the power dynamics at play,
      where Riker's authority and Quark's desperation collide.
    status_before_event: Active and displaying the starfield as the scene begins.
      It serves as a passive backdrop until Riker orders it to patch through the subspace
      link to Deep Space Nine.
    status_after_event: Returns to displaying the starfield after the transmission
      ends, but its role in the event has already been fulfilled—it facilitated the
      extraction of critical intelligence and set the *Enterprise* on its course to
      the Kalla system.
    global_id: ger_object_49e06c6f0254
