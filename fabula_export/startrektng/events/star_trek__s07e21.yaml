  title: K'mtar reveals his true identity
  description: "\n  After an ambush at the Klingon outpost, Worf and Alexander are\
    \ surrounded by three armed assailants. K'mtar, a mysterious Klingon observer,\
    \ intervenes by firing a disruptor shot that misses but distracts the attackers,\
    \ allowing Worf to rally and drive them off. As the attackers retreat, Worf confronts\
    \ K'mtar, who reveals himself as a sent agent of Worf's estranged brother Kurn.\
    \ The disclosure is marked by the presentation of a familial signet ring—a symbol\
    \ of Klingon lineage and trust—that Worf recognizes immediately. This moment of\
    \ recognition forces Worf to confront the hidden agenda behind K'mtar's presence:\
    \ his mission is not merely protective but tied to Kurn's long-standing designs\
    \ on Worf's legacy, raising immediate questions about loyalty, deception, and\
    \ the fragility of Alexander's future. The revelation escalates the central conflict\
    \ between Worf's Klingon heritage and his Starfleet values, while also introducing\
    \ a new layer of familial betrayal that threatens to destabilize his already fragile\
    \ relationship with Alexander.\n  "
