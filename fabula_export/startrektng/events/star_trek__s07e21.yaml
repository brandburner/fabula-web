      disrupting the ceremony. The robes remain on Worf throughout, serving as a visual
      reminder of the clash between sacred tradition and the chaotic interruption
      of human playfulness.
    status_before_event: Neatly arranged and dry, draped over Worf’s frame as he prepares
      for the ritual, symbolizing readiness and tradition.
    status_after_event: Damp and disheveled from the water balloon, clinging to Worf’s
      body as a physical manifestation of the ritual’s failure and the cultural tension
      between father and son.
