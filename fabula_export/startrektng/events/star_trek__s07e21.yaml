  key_dialogue:
  - |-
    ALEXANDER: Why was Kahless so mad about the lie his brother told?
    K'MTAR: Because it made him look like a coward.
    ALEXANDER: If Kahless had just let him explain what happened, maybe they wouldn’t have had to fight about it.
  - |-
    K'MTAR: No more questions! These are our stories. A warrior must learn how to interpret them properly.
    ALEXANDER: I'm trying to—but you're just like my Father. All you care about is me becoming a warrior.
  - |-
    K'MTAR: The only way you'll ever feel like you really belong is if you leave here and go live with your own kind.
    ALEXANDER: I don't want to leave the Enterprise!
