- fabula_uuid: act_e9677c438756befc
  number: 4
  summary: 'Worf confides in Counselor Troi about K''mtar''s threat and his dilemma
    regarding Alexander''s future. Troi advises Worf to trust Alexander to find his
    own balance between his Klingon and human heritage, just as Worf has done. Simultaneously,
    K''mtar continues his psychological manipulation of Alexander, emphasizing his
    ''difference'' on the Enterprise and suggesting he will only truly belong among
    Klingons, further isolating the boy. Alexander, however, resists K''mtar''s pressure,
    accusing him of being just like Worf in his single-minded focus on making him
    a warrior. On the Bridge, Riker devises a clever trap to locate the Duras sisters''
    cloaked Bird of Prey in the Ufandi system. By beaming stolen ore into space and
    firing phasers at it, the resulting explosion temporarily reveals the cloaked
    vessel. Lursa and B''Etor are captured and brought aboard the Enterprise. During
    interrogation, they deny involvement in the assassination attempt. A shocking
    revelation occurs when B''Etor points out a new marking on the assassin''s dagger—a
    symbol for Lursa''s unborn son. Lursa confirms her pregnancy, which she had kept
    secret, suggesting the dagger was meant to protect her son''s future, not to implicate
    the Duras sisters in an attack against Worf. This discovery casts doubt on the
    Duras sisters as the primary antagonists. The act culminates in K''mtar attempting
    to murder Alexander in his sleep, only to be stopped by Worf. In a shocking twist,
    K''mtar reveals his true identity: he is Alexander from 40 years in the future.'
