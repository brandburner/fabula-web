acts:
- fabula_uuid: act_d4ba1020136589bf
  number: 1
  summary: Worf attempts to initiate Alexander into the First Rite of Ascension, a
    crucial Klingon warrior ceremony, but Alexander resists, expressing disinterest
    in Klingon traditions and preferring human activities. His reluctance stems from
    his mother's wishes and his own pacifist leanings. Worf confides in Captain Picard
    about his struggles, leading Picard to suggest taking Alexander to the Kot'baval
    festival on a Klingon outpost. This provides Alexander with an immersive cultural
    experience, where he observes a Klingon street opera and even participates in
    a mock combat, showing a flicker of engagement. He makes friends with other Klingon
    children, suggesting a potential connection to his heritage. However, the celebratory
    atmosphere abruptly shifts to danger when Worf and Alexander are ambushed by three
    armed Klingon assassins in the deserted square at night. This attack immediately
    establishes a threat to Worf's family and sets the stage for external conflict,
    forcing Worf to defend himself and his son, thereby drawing Alexander into the
    harsh realities of Klingon politics despite his earlier resistance. The act ends
    with father and son surrounded, signaling immediate peril and the failure of Worf's
    initial attempts to gently guide Alexander towards his heritage.
