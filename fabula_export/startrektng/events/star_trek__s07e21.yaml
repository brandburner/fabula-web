  title: Gorta reveals Duras sisters' betrayal and escape
  description: 'The away team—Worf, Riker, Geordi, and Data—interrogates Gorta, a
    stranded Ferengi miner, in a rocky pit on the mining planet. Initially evasive,
    Gorta admits he was part of an illegal mining operation with the Duras sisters,
    Lursa and B''Etor. Under pressure, he reveals their betrayal: they stole the ore,
    a cloaked Bird of Prey, and are en route to the Ufandi system to sell the ore
    to a Yridian trader. Gorta’s admiration for their treachery contrasts with the
    crew’s urgency to recover the stolen property and thwart the sisters’ plans. The
    exchange establishes the sisters’ ruthlessness, the crew’s resolve, and the high
    stakes of their mission, while also exposing Gorta’s opportunistic nature. Data’s
    logical interrogation and Geordi’s pragmatic negotiation secure the critical information
    needed to pursue the Duras sisters, setting the stage for a confrontation in the
    Ufandi system.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e21
