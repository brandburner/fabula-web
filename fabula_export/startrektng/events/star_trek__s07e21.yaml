- fabula_uuid: act_fab73ac0b8a48cb1
  number: 2
  summary: The act opens with Worf and Alexander facing the assassins. A mysterious
    Klingon, K'mtar, intervenes, firing a disruptor and distracting the attackers,
    allowing Worf to fight them off. The assassins retreat. K'mtar reveals his identity,
    claiming to be a trusted advisor (*gin'tak*) sent by Worf's brother, Kurn, to
    protect Worf from the Duras sisters, who are suspected of orchestrating the attack.
    Commander Riker expresses suspicion of K'mtar's blunt and disrespectful demeanor,
    particularly towards Starfleet officers, but K'mtar dismisses it as a 'Klingon
    matter.' K'mtar then engages Worf in a discussion about Alexander's future, expressing
    concern over his lack of warrior training and his human upbringing. He subtly
    challenges Worf's parenting, suggesting Worf has forgotten Klingon ways. Later,
    K'mtar shows a surprisingly gentle and empathetic side to Alexander, connecting
    with the boy's fears of being different and his desire to protect his father.
    K'mtar frames warrior training not as a cultural obligation, but as a means for
    Alexander to defend Worf, successfully sparking Alexander's interest and offering
    him a sense of empowerment. This dual nature of K'mtar—brusque and traditional
    with adults, yet understanding and manipulative with Alexander—establishes his
    complex role and hidden agenda.
