  title: B'Etor discovers Lursa’s hidden pregnancy
  description: "\n  In the observation lounge, Worf presents the assassin’s dagger\
    \ to the Duras sisters, revealing their house crest and implicating them in the\
    \ assassination attempt. B'Etor, examining the blade, notices ancient Klingon\
    \ markings that list the Duras bloodline—including a symbol for Lursa’s unborn\
    \ son. Lursa’s visceral reaction (clutching her stomach) confirms the revelation:\
    \ she is pregnant, a fact she has kept secret even from Worf. The discovery forces\
    \ Worf to confront K'mtar for answers, deepening the conspiracy around Alexander’s\
    \ heritage and exposing a hidden layer of the Duras sisters’ motives. The moment\
    \ shifts the investigation from political intrigue to personal stakes, as Lursa’s\
    \ pregnancy becomes a pivotal, unexplained variable in the unfolding crisis.\n\
    \  "
