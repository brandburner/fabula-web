- fabula_uuid: cand_evt_scene_9ffe7e8c49c6e38f_02
  global_id: null
  title: Riker manipulates Yridian trader for tactical advantage
  description: 'On the *Enterprise* bridge, Riker detects a Yridian freighter carrying
    magnesite ore—far less than expected—suggesting the Duras sisters have already
    offloaded most of their stolen shipment. Suspicious of the Yridian trader Yog’s
    evasive claims about acquiring the ore from a Corvallen, Riker exploits the trader’s
    greed by offering an exorbitant trade: half a gram of Anjoran bio-mimetic gel
    for the remaining magnesite. Troi’s subtle headshake confirms Yog’s deception,
    but Riker proceeds anyway, revealing his true intent: securing the ore not for
    its value, but as bait. After transporting the crate into space, Riker orders
    Worf to destroy it with phasers, a calculated move to lure an unseen adversary
    into revealing themselves. The scene underscores Riker’s strategic cunning, his
    willingness to sacrifice tangible assets for long-term tactical gain, and the
    escalating stakes of the Duras sisters’ conspiracy. The destruction of the ore
    also foreshadows Riker’s broader gambit—using deception to expose hidden threats,
    a theme that will resurface in his later confrontation with the Duras sisters.'
