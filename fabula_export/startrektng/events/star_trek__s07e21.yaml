- fabula_uuid: cand_evt_scene_ca75b3933ef11a94_02
  global_id: null
  title: K'mtar invokes ya'nora kor
  description: In Ten Forward, K'mtar approaches Worf with a calculated mix of conciliation
    and escalation, first apologizing for his earlier outburst before pivoting to
    a veiled critique of Worf's parenting. He frames Alexander's lack of Klingon training
    as a failure of leadership, subtly undermining Worf's authority by invoking Kurn's
    name and suggesting the boy's human upbringing has made him weak. When Worf resists
    the idea of sending Alexander to Ogat's Academy, K'mtar's facade of concern cracks—he
    loses his temper, accusing Worf of prioritizing his own desires over Alexander's
    future as a warrior. The tension peaks when K'mtar invokes *ya'nora kor*, a formal
    challenge to Worf's fitness as a parent, forcing Worf into a high-stakes cultural
    reckoning where his leadership, loyalty, and priorities as a father are now under
    open scrutiny. The confrontation ends with K'mtar's emotional plea—'stop thinking
    of yourself'—leaving Worf visibly shaken and the challenge hanging over them like
    a blade. This moment isn't just about Alexander's future; it's a direct threat
    to Worf's honor and the stability of their relationship, with K'mtar's true motives
    still obscured beneath his paternalistic guise.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e21
  scene_sequence: 14
  sequence_in_scene: 34
  key_dialogue:
  - 'K''MTAR: Worf... I''m sorry about what happened. I shouldn''t have gotten so
    angry. It''s just that... I''m worried about Alexander.'
  - 'K''MTAR: Compared to other boys his age, Alexander''s fighting skills are years
    behind. I think you should consider sending him to the training Academy on Ogat.'
  - 'K''MTAR: The boy is more human than Klingon. If he stays here, he''ll never be
    a warrior. He''ll never be able to defend our family against its enemies.'
  - 'WORF: You would challenge my fitness to raise my own son?'
  - 'K''MTAR: For the good of our house, yes.'
  - 'K''MTAR: Worf... I beg you... stop thinking of yourself. It''s Alexander we must
    consider. Look into your heart... and do what''s best for him.'
