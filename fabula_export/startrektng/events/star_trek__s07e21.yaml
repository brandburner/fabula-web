  - object_uuid: ger_object_ed0c3e92fc9e
    description_of_involvement: The second-hand mining equipment is the critical clue
      that Quark reluctantly reveals under Riker’s pressure. This equipment, acquired
      by the Duras sisters, is intended for illegal mining operations in the Kalla
      system. Quark’s disclosure of its existence and purpose provides the *Enterprise*
      with the first concrete lead in their investigation, tying the sisters to a
      specific location and activity. The equipment symbolizes the sisters’ desperation
      and ambition, as well as their willingness to exploit resources through illicit
      means, setting the stage for the *Enterprise*’s pursuit.
    status_before_event: Acquired by the Duras sisters, intended for use in the Kalla
      system, but not yet deployed.
    status_after_event: Confirmed as a key piece of intelligence, now known to the
      *Enterprise* crew, who will use this information to track the sisters’ movements.
    global_id: ger_object_ed0c3e92fc9e
