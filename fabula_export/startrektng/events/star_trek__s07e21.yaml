- fabula_uuid: cand_evt_scene_ca75b3933ef11a94_01
  global_id: null
  title: K'mtar challenges Worf over Alexander's future
  description: 'In a tense confrontation at Ten Forward, K''mtar—posing as a concerned
    family advisor—begins by offering Worf a conciliatory apology for their earlier
    conflict, framing his concern as shared paternal anxiety over Alexander''s rejection
    of Klingon identity. He subtly undermines Worf''s parenting by invoking Kurn''s
    perspective on Alexander''s mother''s influence, then pivots to a calculated proposal:
    sending Alexander to the brutal Ogat Academy to ''correct'' his deficiencies.
    When Worf resists, K''mtar escalates by threatening *ya''nora kor*—a formal Klingon
    challenge to Worf''s fitness as a father—while masking his true motives beneath
    a veneer of familial duty. The scene culminates in K''mtar''s emotional manipulation,
    leaving Worf torn between cultural obligation and his son''s well-being, while
    revealing K''mtar''s hidden agenda through his uncharacteristic urgency and the
    threat of institutionalizing Alexander''s ''Klingon education.'''
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e21
  scene_sequence: 14
  sequence_in_scene: 33
  key_dialogue:
  - 'K''MTAR: Worf... I''m sorry about what happened. I shouldn''t have gotten so
    angry. It''s just that... I''m worried about Alexander.'
  - 'K''MTAR: Compared to other boys his age, Alexander''s fighting skills are years
    behind. I think you should consider sending him to the training Academy on Ogat.'
  - 'K''MTAR: The boy is more human than Klingon. If he stays here, he''ll never be
    a warrior. He''ll never be able to defend our family against its enemies.'
  - 'K''MTAR: Not necessarily. It would be within my rights to invoke ya''nora kor.'
  - 'K''MTAR: Worf... I beg you... stop thinking of yourself. It''s Alexander we must
    consider. Look into your heart... and do what''s best for him.'
