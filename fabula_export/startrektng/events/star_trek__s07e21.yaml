  title: Worf prioritizes bonding over Klingon training
  description: 'Worf interrupts Alexander’s bat’leth practice to deliver K’mtar’s
    abrupt farewell, revealing the advisor’s final message of support for Alexander’s
    autonomy. Instead of resuming training, Worf surprises Alexander by suggesting
    they simply spend time together—a deliberate pivot that signals his growing acceptance
    of Alexander’s individuality. The moment underscores Worf’s internal conflict
    between Klingon tradition and his evolving role as a father, while Alexander’s
    disappointment over K’mtar’s departure hints at lingering emotional fallout. Their
    physical closeness (Worf’s arm around Alexander’s shoulder) marks a rare moment
    of vulnerability and connection, foreshadowing Worf’s eventual confrontation with
    K’mtar’s radical methods and his own paternal choices. The scene’s emotional weight
    lies in its quiet subversion of expectations: Worf, the disciplined warrior, chooses
    presence over performance, framing fatherhood as an act of love rather than duty.'
