  title: Dagger reveals Duras pregnancy and K'mtar's distraction
  description: In the observation lounge, Worf presents the Duras dagger as evidence
    of Lursa and B'Etor's involvement in the assassination attempt, but their vehement
    denials and Troi's empathic reading of Lursa's sincerity create doubt. The sisters'
    examination of the dagger reveals a marking indicating Lursa's pregnancy—a secret
    known only to B'Etor—raising questions about the dagger's origin and the sisters'
    true motives. Meanwhile, K'mtar's uncharacteristic distraction and his insistence
    on returning to the Klingon homeworld for further evidence deepen suspicions about
    his agenda. Worf exits to confront K'mtar, leaving the crew divided over the sisters'
    guilt and the credibility of the advisor who claims to protect Alexander.
