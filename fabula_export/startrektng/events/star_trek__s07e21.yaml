- fabula_uuid: act_0ab1dec26a946ad8
  number: 3
  summary: Commander Riker, with Worf and K'mtar, actively pursues the Duras sisters.
    Riker uses his past dealings with Quark on Deep Space Nine to extract information
    about the sisters' whereabouts. Quark, after some negotiation over outstanding
    gambling vouchers, reveals the Duras sisters are illegally mining magnesite in
    the Kalla system and plan to sell it in the Ufandi system. Meanwhile, K'mtar attempts
    to accelerate Alexander's warrior training through a Holodeck program recreating
    the recent assassination attempt. Alexander initially performs well, demonstrating
    skill in combat. However, when instructed to 'finish' his defenseless holographic
    adversary, Alexander hesitates and refuses, throwing his bat'leth aside. This
    pacifist act deeply angers K'mtar, who berates Alexander for his 'weakness' and
    inability to kill, causing Alexander to flee the Holodeck distraught. The incident
    highlights the fundamental clash between Klingon warrior ideals and Alexander's
    inherent nature. K'mtar, frustrated by Alexander's resistance, then pushes Worf
    to send Alexander to a Klingon training Academy on Ogat. When Worf refuses, K'mtar
    threatens to invoke *ya'nora kor*, a formal challenge to Worf's fitness as a parent,
    revealing a desperate urgency in his mission to transform Alexander into a warrior.
    This threat significantly escalates the personal stakes for Worf and Alexander,
    forcing Worf to consider the profound implications for his son's future and his
    own paternal role.
