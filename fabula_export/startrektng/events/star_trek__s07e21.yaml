  title: Alexander rejects Klingon warrior rite
  description: Worf attempts to initiate Alexander into the First Rite of Ascension—a
    sacred Klingon coming-of-age ritual—by framing it as a necessary step toward manhood
    and warriorhood. The scene opens with Worf rehearsing a formal speech about the
    warrior’s path, only to be interrupted by Alexander’s human friend Eric, who accidentally
    drenches him with a water balloon. The moment exposes the cultural divide between
    Worf’s rigid Klingon expectations and Alexander’s human-leaning upbringing. Worf,
    undeterred, presses forward with the ritual, lighting a kor’tova candle to symbolize
    the warrior’s fire and urging Alexander to declare his intention to become a warrior.
    Alexander, however, resists outright, invoking his mother’s earlier assurance
    that he doesn’t *have* to participate in Klingon traditions. The confrontation
    escalates as Worf insists the rite is a choice but implies its necessity for a
    ‘true Klingon,’ while Alexander doubles down on his refusal, citing his lack of
    interest in warriorhood. The scene ends with Alexander storming off to his room,
    leaving Worf frustrated and the ritual unresolved. The exchange underscores the
    irreconcilable tension between Worf’s cultural pride and Alexander’s hybrid identity,
    foreshadowing future conflicts—particularly the advisor K’mtar’s later interference—as
    the boy’s rejection of Klingon rites becomes a flashpoint for deeper familial
    and cultural strife. The moment also highlights Worf’s struggle to reconcile his
    role as a father with his duty to preserve his heritage, setting up his eventual
    vulnerability to K’mtar’s manipulation.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e21
  scene_sequence: 1
  sequence_in_scene: 2
  key_dialogue: &id003
  - 'WORF: As time passes, a boy inevitably becomes a man. What is not inevitable,
    is that a man become a warrior. A warrior must be forged like a sword, tempered
    by... by experience. The path of the warrior begins with the First Rite of Ascension.'
  - 'ALEXANDER: What if... I don’t want to?'
  - 'WORF: If you do not participate in the rite before you are thirteen years of
    age, you will never be able to become a true Klingon warrior.'
  - 'ALEXANDER: I don’t care about that... Mother always said that I didn’t have to
    do any of this Klingon stuff if I didn’t want to.'
  - 'WORF: It is your decision... but—'
  - 'ALEXANDER: Good, then I’m not going to do it.'
