- fabula_uuid: act_0b3e97f216adcd12
  number: 5
  summary: Future Alexander, now revealed as K'mtar, explains his desperate mission.
    In his future, he became a pacifist diplomat, a path that led to Worf's murder
    by Klingon traditionalists. Believing his pacifism was Worf's undoing, Future
    Alexander traveled back in time to prevent his younger self from following that
    path, hoping to forge him into a warrior who could protect Worf and the House
    of Mogh. He confesses to staging the initial assassination attempt to frighten
    Alexander into embracing warrior ways. Worf, grappling with the revelation of
    his own future death, prioritizes his son's well-being. He confronts Future Alexander,
    arguing that one cannot dictate another's destiny and that Alexander must be true
    to himself. Worf acknowledges the worthiness of Alexander's desire for peace and
    encourages his older self to continue that struggle. This profound conversation
    leads to a reconciliation between father and son, transcending the temporal paradox.
    Future Alexander, accepting that he cannot alter the past or force a different
    future upon his younger self, embraces his own destiny and returns to his time,
    disappearing. Worf, now with a new understanding and acceptance of Alexander's
    individual path, finds his son practicing with a bat'leth on the Holodeck. Instead
    of pushing for training, Worf suggests they simply spend time together, signaling
    his full acceptance of Alexander for who he is, rather than who he wants him to
    be, thus resolving the central conflict of Worf's paternal expectations.
