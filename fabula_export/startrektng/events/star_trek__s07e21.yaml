  key_dialogue:
  - |-
    ALEXANDER: If Kahless had just let him explain what happened, maybe they wouldn’t have had to fight about it.
    K'MTAR: You are missing the point—
    ALEXANDER: And I don’t see what’s so wrong with running away—maybe Morath didn’t want to fight his brother because he didn’t want to have to kill him.
    K'MTAR: He ran because he was a coward.
