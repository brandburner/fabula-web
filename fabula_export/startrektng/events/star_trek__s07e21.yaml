- fabula_uuid: cand_evt_scene_f5ea0fd57ae6335e_01
  global_id: null
  title: K'mtar undermines Worf's authority
  description: Worf leads Alexander and K'mtar through the *Enterprise* corridors
    toward bat'leth training, but Alexander’s reluctance and K'mtar’s subtle provocation
    expose a growing rift. Worf chastises Alexander for mishandling his weapon, reinforcing
    his rigid expectations, while K'mtar seizes the moment to critique traditional
    Klingon methods. His suggestion of a Holodeck program—implying Worf’s training
    is outdated—publicly challenges Worf’s authority as a father and warrior. The
    exchange forces Worf to confront not just Alexander’s defiance but K'mtar’s manipulative
    influence, which threatens to erode his standing as both a mentor and a Klingon
    leader. The scene escalates the power struggle over Alexander’s upbringing, with
    K'mtar’s radical approach positioning him as a rival to Worf’s legacy.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e21
  scene_sequence: 9
