- fabula_uuid: cand_evt_scene_408e58368432c35b_01
  global_id: null
  title: Worf’s failed fatherhood lesson
  description: Worf attempts to formally initiate Alexander into the Klingon First
    Rite of Ascension, framing it as a sacred transition into manhood. The moment
    is disrupted when Alexander’s human friend Eric bursts in, accidentally drenching
    Worf with a water balloon—a playful prank that symbolizes Alexander’s rejection
    of Klingon traditions. Worf, already frustrated by Alexander’s resistance, delivers
    a rehearsed but stilted speech about warriorhood, only for Alexander to question
    its relevance, invoke his mother’s permission to opt out, and ultimately refuse
    participation. The exchange exposes the widening cultural and emotional rift between
    them, with Worf’s rigid expectations clashing against Alexander’s hybrid identity.
    The scene foreshadows deeper conflict over Alexander’s autonomy and Worf’s struggle
    to reconcile his Klingon heritage with his son’s human-leaning upbringing, while
    the water balloon incident serves as a literal and symbolic interruption of Worf’s
    authority. The unresolved tension leaves Worf visibly disappointed, setting up
    future interventions—like K’mtar’s arrival—as potential catalysts for escalation.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e21
  scene_sequence: 1
  sequence_in_scene: 1
  key_dialogue: &id001
  - 'WORF: As time passes, a boy inevitably becomes a man. What is not inevitable,
    is that a man become a warrior. A warrior must be forged like a sword, tempered
    by... by experience. The path of the warrior begins with the First Rite of Ascension.'
  - 'ALEXANDER: What if... I don’t want to?'
  - 'WORF: If you do not participate in the rite before you are thirteen years of
    age, you will never be able to become a true Klingon warrior.'
  - 'ALEXANDER: I don’t care about that... Mother always said that I didn’t have to
    do any of this Klingon stuff if I didn’t want to.'
  - 'WORF: It is your decision... but—'
  - 'ALEXANDER: Good, then I’m not going to do it.'
