  title: Riker traps Yridian freighter with magnesite
  description: "\n  On the *Enterprise* bridge, Commander Riker interrupts his log\
    \ entry to investigate Data’s detection of a Yridian freighter in the Ufandi system.\
    \ Suspecting the vessel is connected to the Duras sisters’ stolen magnesite, Riker\
    \ scans its hold and confirms only a fraction of the expected ore remains. He\
    \ hails the Yridian trader Yog, who claims to have acquired the ore from a Corvallen—a\
    \ lie Troi’s empathic senses immediately detect. Riker, sensing an opportunity,\
    \ offers an exorbitant trade (half a gram of Anjoran bio-mimetic gel) for the\
    \ ore, which Yog accepts without hesitation. Once the ore is beamed aboard, Riker\
    \ orders it transported into space and destroyed with phasers, revealing his true\
    \ intent: to eliminate the evidence and force the Duras sisters into a more desperate\
    \ position. The maneuver underscores Riker’s strategic cunning and his willingness\
    \ to manipulate external players to tighten the noose around his targets. Meanwhile,\
    \ Worf and Troi exchange glances, hinting at their shared skepticism about Riker’s\
    \ unorthodox tactics, which further complicates the crew’s dynamic as the investigation\
    \ escalates.\n  "
