      relaxed yet commanding as he orchestrates the interrogation of Quark with the
      precision of a chess master. He begins by casually referencing Quark's unpaid
      debt, using the latinum vouchers as leverage to extract the critical intelligence
      about the Duras sisters' plans. His dialogue is sharp and measured, alternating
      between threats and reassurances to keep Quark off-balance. When Quark reveals
      the information about the magnesite deposit, Riker's expression remains calm,
      but his eyes betray a flicker of satisfaction. He then efficiently transitions
      to plotting the course to the Kalla system, demonstrating his role as both strategist
      and leader.
