      Kalla system to thwart their plans.
    global_id: ger_object_a42ce4ee6ea7
  - object_uuid: ger_object_20d8fd7c2e15
    description_of_involvement: Riker’s unpaid latinum vouchers serve as the leverage
      tool in his interrogation of Quark, symbolizing the Ferengi’s financial vulnerability
      and past transgressions. Initially, Quark attempts to downplay their value,
      claiming they are equivalent to latinum, but Riker swiftly exposes this as a
      lie, highlighting their limited utility—only redeemable at Quark’s bar. The
      vouchers become the bargaining chip that forces Quark to disclose the Duras
      sisters’ plans, their symbolic weight far outweighing their material value.
      By the end of the event, Quark voids the vouchers in a final act of defiance,
      erasing their leverage but also signaling his compliance under duress.
    status_before_event: Possessed by Riker, held as unpaid debt from a past dabo
      game, representing a financial claim against Quark’s bar.
    status_after_event: Voided by Quark during the call, rendering them null and void,
      with their leverage erased but their role in extracting the intelligence fulfilled.
