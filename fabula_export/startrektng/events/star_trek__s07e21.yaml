- fabula_uuid: cand_evt_scene_12b4727ce143f090_01
  global_id: null
  title: K'mtar exposes Worf's paternal failures
  description: In Worf's quarters, K'mtar subtly undermines Worf's authority as a
    father and warrior by questioning his ability to raise Alexander as a proper Klingon.
    The conversation begins with Worf challenging K'mtar's disrespectful treatment
    of Riker, but K'mtar deflects by framing it as a cultural difference—implying
    Worf has grown too humanized. The tension escalates when K'mtar probes Worf about
    Alexander's lack of commitment to the Rite of Ascension, forcing Worf to admit
    his son's resistance. K'mtar's offer to 'help' feels less like support and more
    like a veiled threat, exposing Worf's deep-seated insecurities about his parenting
    and his struggle to reconcile Klingon expectations with his humanized ideals.
    The exchange ends with K'mtar requesting to see Alexander, setting up a future
    confrontation where his true motives may unravel Worf's fragile family dynamic.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e21
  scene_sequence: 6
  sequence_in_scene: 13
  key_dialogue:
  - |-
    WORF: I have not forgotten... I am merely pointing out that their ways are different from ours.
    K'MTAR: I trust you've made your son aware of that fact, as well?
  - |-
    WORF: Actually... Alexander has not committed himself to undergoing the rite.
    K'MTAR: What?
  - |-
    WORF: I have tried to make him see how important it is, but he will not listen to me.
    K'MTAR: Perhaps together, you and I can find a way to spark the boy's interest in his heritage.
