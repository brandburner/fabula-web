- fabula_uuid: cand_evt_scene_01edf6ddcb85503d_01
  global_id: null
  title: Picard authorizes last-ditch torpedo strike
  description: "\n  With the Soliton wave now less than a kilometer from the *Enterprise*\
    \ and all attempts at communication or negotiation with the wave’s source having\
    \ failed, Picard faces an impossible choice: stand down and let the wave annihilate\
    \ the colony, or take a desperate, high-risk tactical gamble. The bridge crew’s\
    \ tension is palpable as Data confirms the wave’s imminent arrival, and Picard’s\
    \ repeated attempts to reach Riker—who is likely still trapped in the burning\
    \ biolab with Worf and Alexander—go unanswered. The silence underscores the crew’s\
    \ isolation and the gravity of the moment. When Picard finally orders the tactical\
    \ officer to fire torpedoes, it’s a decision born of necessity rather than confidence,\
    \ marking a critical escalation in the crisis. The strike represents the crew’s\
    \ last hope to disrupt the wave, but it also signals their dwindling options and\
    \ the personal stakes at play: the ship’s survival, the colony’s fate, and the\
    \ unresolved tension between duty and compassion that has defined the mission\
    \ thus far. The order is given with a mix of frustration and resolve, revealing\
    \ Picard’s leadership under pressure—prioritizing action over inaction, even when\
    \ the outcome is uncertain.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e10
  scene_sequence: 31
  sequence_in_scene: 55
  key_dialogue:
