  title: Worf discovers Alexander’s forbidden training
  description: 'Worf stumbles upon Alexander secretly training in the holodeck with
    his bat’leth, defying his orders. The boy’s clumsy but determined combat against
    a simulated alien—slowed to match his skill—briefly stirs Worf’s pride, but his
    anger resurfaces when he remembers Alexander’s lies and disobedience. The confrontation
    escalates as Worf strips the bat’leth away, accusing Alexander of dishonesty and
    failing to uphold Klingon values. When Alexander protests, Worf’s temper snaps,
    and he delivers an ultimatum: the boy will be sent to a Klingon school to learn
    discipline. The threat shatters Alexander, who retreats in silence, leaving Worf
    to grapple with his own failure as a father. The scene underscores their fractured
    relationship, with Worf’s rigid expectations clashing against Alexander’s resistance
    to his Klingon heritage, all while the Soliton Wave crisis looms as a distant
    but pressing backdrop.'
