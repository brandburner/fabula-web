  title: Alexander’s Violent Rejection of Worf
  description: Worf attempts to reason with Alexander about his impending transfer
    to a Klingon school, but the boy—already seething with resentment—accuses him
    of shame and abandonment. Worf’s plea to honor K’Ehleyr’s memory fails to soften
    Alexander’s fury, and when Riker interrupts with a summons, the boy’s rage boils
    over. Left alone, Alexander violently overturns a table in a raw display of defiance,
    marking the collapse of his emotional restraint. The outburst foreshadows his
    reckless flight from Worf’s quarters and underscores the depth of their fractured
    relationship, which now threatens to spiral into irreversible damage amid the
    ship’s crisis. The scene exposes Alexander’s alienation from Klingon values and
    Worf’s failure to bridge the gap between duty and fatherhood, raising the stakes
    for their unresolved conflict.
