  title: Worf shares Kahless myth to teach Alexander
  description: Worf, struggling to reconcile his anger with his role as a father,
    initially lectures Alexander on Klingon honor in a rigid, authoritarian manner.
    When Alexander’s fear and evasive responses trigger Worf’s own unresolved trauma—his
    abandonment as a child—Worf shifts tactics. He softens, sharing the legend of
    Kahless and Morath to illustrate the weight of shame and the path to redemption.
    The myth’s moral, paired with Worf’s raw confession of his own past, breaks through
    Alexander’s defiance. The boy’s remorseful apology marks a turning point in their
    fractured relationship, though Troi’s later skepticism foreshadows deeper unresolved
    issues. The scene pivots from confrontation to vulnerability, using Klingon tradition
    to bridge the emotional gap between father and son while the Soliton wave crisis
    looms as an unspoken pressure on their fragile bond.
