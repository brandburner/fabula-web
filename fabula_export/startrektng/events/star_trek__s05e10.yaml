  global_id: null
  title: Troi Forces Worf to Confront Abandonment
  description: 'In Troi’s office, Worf defends his decision to send Alexander to a
    Klingon school, insisting it is for the boy’s benefit. Troi probes deeper, exposing
    Worf’s emotional detachment and unresolved grief over K’Ehleyr’s death. When she
    asks if Alexander might have felt abandoned—mirroring Worf’s own abandonment by
    K’Ehleyr—Worf’s composure fractures. Troi then pushes further, forcing Worf to
    admit his lingering anger at K’Ehleyr for dying and leaving him with a son he
    never knew. The confrontation reveals Worf’s self-deception: his rigid adherence
    to duty masks his fear of failing as a father and his inability to process his
    own trauma. The scene culminates in Troi’s blunt truth—that Worf and Alexander
    must heal together—leaving Worf visibly shaken but unable to deny the validity
    of her words. This moment is a turning point in Worf’s arc, as he begins to confront
    the cyclical nature of his emotional avoidance and its impact on his son.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e10
  scene_sequence: 20
  sequence_in_scene: 32
  key_dialogue:
  - |-
    TROI: Are you sure this is what you want?
    WORF: It is not a question of what I want... it is a question of what is best for the boy. He will be better off at a Klingon school.
    TROI: Have you discussed this with Alexander?
    WORF: He is a child. I informed him of my decision.
  - |-
    TROI: Do you think he might have felt... abandoned?
    WORF: (reacts)... He was very young. I'm sure he was... confused...
  - 'TROI: Being angry doesn''t mean you loved her any less, Worf... but you cannot
    hide from your feelings... just as Alexander cannot hide from his. You both have
    a lot of healing to do... perhaps you should think about doing it together.'
