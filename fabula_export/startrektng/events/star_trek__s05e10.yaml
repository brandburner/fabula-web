      array’ damage ties directly to this console’s failure to track the wave, creating
      a narrative link between the experiment’s promise and its peril. The object
      symbolizes the fragile boundary between scientific triumph and disaster.'
    status_before_event: Functional during the test ship’s launch, displaying real-time
