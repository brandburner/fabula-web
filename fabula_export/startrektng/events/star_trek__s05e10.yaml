    now faces the added pressure of a failing warp core, which could doom the colony
    they’re trying to save. The scene escalates from a personal rescue to a ship-wide
    survival crisis, with the crew forced to confront an impossible choice: divert
    critical resources to stabilize the warp core or maintain their pursuit of the
