  title: Worf discovers Alexander’s theft and lie
  description: "\n  In the biolab, Worf and Alexander trail behind a group of boys\
    \ and their fathers during a lesson on endangered species. While Ms. Kyle discusses\
    \ the Corvan Gilvos—a camouflaged, tree-dwelling creature—Alexander, usually disengaged,\
    \ becomes fascinated by the animals. Kyle subtly accuses Alexander of stealing\
    \ a lizard model, prompting Worf to defend his son vehemently. When Worf searches\
    \ Alexander’s jacket and finds the model, the betrayal is immediate: Alexander\
    \ lied directly to his face. The moment fractures their already fragile relationship,\
    \ exposing Worf’s blind trust in his son and Alexander’s defiance of Klingon honor.\
    \ The theft isn’t just a rule-breaking act—it’s a rejection of Worf’s attempts\
    \ to instill discipline, and the lie is a violation of the one value Worf holds\
    \ above all: truth. The confrontation escalates Worf’s frustration with parenting\
    \ and underscores the cultural divide between them, as Alexander’s behavior clashes\
    \ with Klingon expectations.\n  "
