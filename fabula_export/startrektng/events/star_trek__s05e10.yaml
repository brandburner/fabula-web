    description_of_involvement: |2-

              The comms channel to Ja'Dar is the **lifeline** connecting the Enterprise crew to the scientist who created the Soliton wave. It serves as both a **bridge of desperation** and a **mirror of guilt**: through it, Ja'Dar’s horrified realization that his experiment has spiraled beyond control is transmitted in real time. The channel crackles with urgency as Data delivers the devastating updates, and Riker’s question about Lemma Two’s ability to dissipate the wave hangs in the air like a verdict. The channel is not just a tool for communication but a **stage for reckoning**, where Ja'Dar must face the consequences of his overconfidence. Its open status ensures that the crew’s shock and Ja'Dar’s despair are **shared in real time**, heightening the emotional stakes of the moment.
    status_before_event: |2-

              An open but routine channel, used for standard scientific updates and coordination between the Enterprise and Ja'Dar’s team. The tone was collaborative, even optimistic, as the crew monitored the wave’s progress.
    status_after_event: |2-

              A conduit of **collective horror**, now carrying the weight of Ja'Dar’s admission that the wave will destroy the planet. The channel remains open, but the atmosphere is irrevocably shifted—from professional exchange to a moment of shared despair.
    global_id: ger_object_4058a0d6d6ce
  - object_uuid: ger_object_46387d8dd384
    description_of_involvement: |2-

              The aft science station controls are the **nerve center** of this crisis, where Data processes the Soliton wave’s escalating data in real time. The console’s screens display the wave’s velocity (now warp 4.1), energy surge (a factor of twelve), and the catastrophic projections (a two-hundredfold increase by planetfall). These readings are not just numbers but **death sentences**, transforming the abstract threat of the wave into a concrete, imminent doom. Riker leans over the console, absorbing the data with a growing sense of dread, while Data’s fingers move with precision, extracting every possible detail to inform the crew’s response. The station’s beeps and alerts create a **sensory backdrop of urgency**, reinforcing the stakes of the moment. It is here that the crew’s **illusion of control** is shattered, as the data reveals the wave’s true, unstoppable nature.
    status_before_event: |2-

              A functional but relatively calm workspace, where Data and the crew monitored the Soliton wave’s progress with cautious optimism. The readings were within expected parameters, if slightly unstable.
    status_after_event: |2-

              A **battleground of bad news**, where the console’s screens now display the wave’s catastrophic escalation. The data is no longer a tool for analysis but a **ticking clock**, counting down to planetary annihilation. The station’s alerts are constant, its displays flashing warnings that underscore the crew’s desperation.
    global_id: ger_object_46387d8dd384
  - object_uuid: ger_object_9b952e7b0354
    description_of_involvement: |2-

              The Soliton wave is the **central antagonist** of this event, a rogue force of nature that defies all expectations. It surges from warp 4.1 to an energy level twelve times its original output, with projections showing it will grow another two hundredfold by the time it reaches Lemma Two. Data’s sensor readings transform it from a manageable scientific anomaly into an **apocalyptic threat**, capable of obliterating not just the colony but **most of the planet**. Its escalation is the catalyst for the crew’s existential crisis, forcing them to confront the possibility that their efforts may be futile. The wave’s behavior—unpredictable, exponential, and devastating—mirrors the **hubris of scientific overreach**, a theme Ja'Dar’s horror underscores. It is no longer a tool but a **force of destruction**, and its trajectory now dictates the fate of millions.
    status_before_event: |2-

              A contained experimental phenomenon, traveling at a controlled warp velocity with manageable energy output. Ja'Dar and the Enterprise crew believed it could be dissipated by Lemma Two’s scattering fields, though its instability was already a cause for concern.
    status_after_event: |2-

              An uncontrollable, rapidly escalating catastrophe, now a **planet-killing force** with energy levels far beyond the colony’s ability to dissipate. Its trajectory is locked, its destruction assured unless the Enterprise can intervene in an impossible timeframe.
    global_id: ger_object_9b952e7b0354
