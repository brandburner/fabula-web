  title: Picard redirects Worf to fatherhood
  description: 'In the Ready Room, Picard attempts to discuss personnel changes with
    Worf, but their meeting is repeatedly interrupted by comms from Alexander’s teacher
    (Ms. Kyle) and Dr. Beverly Crusher—both demanding Worf’s immediate attention for
    school placement exams and a medical evaluation. Each interruption reveals Worf’s
    growing frustration and his inability to balance his duties as Security Chief
    with his new role as a father. Picard, initially irritated by Worf’s lateness,
    observes the disruptions with quiet patience before gently but firmly terminating
    the meeting. He acknowledges Worf’s parental responsibilities with a mix of empathy
    and subtle humor, urging him to prioritize Alexander’s needs over shipboard logistics.
    The scene underscores Worf’s struggle to reconcile Klingon expectations of stoicism
    with the messy realities of fatherhood, while Picard’s intervention serves as
    a thematic pivot—reminding Worf (and the audience) that family obligations transcend
    even the most critical mission demands. The moment also highlights Picard’s leadership
    style: pragmatic yet compassionate, willing to adapt when personal crises collide
    with professional duties.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e10
  scene_sequence: 5
  sequence_in_scene: 10
  key_dialogue:
  - 'PICARD: I thought our meeting was at eleven hundred hours, Mister Worf.'
  - 'WORF: I apologize for being late, Captain. I was detained in... school. I was
    enrolling my... son in class.'
  - 'PICARD: (gently, with a hint of humor) You are not the first officer on this
    ship to have a new family member. Take care of your son. The personnel changes
    can wait.'
