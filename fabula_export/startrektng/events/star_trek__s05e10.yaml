  - object_uuid: ger_object_d821501de409
    description_of_involvement: The warp transfer conduits are the critical infrastructure
      failing under the strain of the Soliton wave's pursuit. Geordi's dire report—'We
      lost four warp transfer conduits, Commander'—is the catalyst for the scene's
      tension, as it reveals the ship's vulnerability and the crew's dwindling options.
      These conduits are not just mechanical components but symbols of the Enterprise's
      fragility in the face of an unstoppable force. Their failure forces the crew
      to confront the reality that their usual advantages—speed, maneuverability—are
      being stripped away, leaving them with only desperate measures (e.g., firing
      torpedoes, racing against a deadline) to survive. The conduits' damage is a
      ticking clock, accelerating the crew's need to act.
    status_before_event: Functional but under extreme stress due to the Soliton wave's
      energy fluctuations, with four already lost by the time of this scene.
    status_after_event: Catastrophically damaged, with only a fraction of the ship's
      maximum warp speed remaining. The crew is now operating under severe limitations,
      heightening the urgency of their actions.
    global_id: ger_object_d821501de409
  - object_uuid: ger_object_780d0c66a9c0
    description_of_involvement: The Observation Lounge Soliton Demonstration Console
      is not directly present in this scene, but its absence is felt as the crew in
      Main Engineering grapples with the Soliton wave's immediate threat. The data
      it would display—wave trajectory, dissipation rates, and test ship telemetry—is
      now being relayed through other consoles, but the urgency of the situation is
      heightened by the lack of a centralized, visual reference. Geordi's report of
      the warp conduit failures and Data's timeline are the new 'consoles' guiding
      the crew, but they lack the visual immediacy of the Observation Lounge display,
      forcing the characters to rely on raw data and instinct. The console's indirect
      role here is to underscore the shift from observation to action, as the crew
      moves from analyzing the wave to racing against it.
    status_before_event: Operational in the Observation Lounge, displaying real-time
