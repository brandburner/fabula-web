    beliefs:
    - A Klingon’s word is his bond—he will return to the bridge in three minutes,
      no matter the cost.
    - His son’s life is sacred, but so is his oath to Starfleet; this crisis forces
      him to reconcile the two.
    observed_traits:
    - Paternal desperation
    - Klingon honor-driven urgency
    - Suppressed emotional volatility
    - Physical readiness for action
    importance: primary
