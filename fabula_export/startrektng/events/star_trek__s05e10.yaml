  - object_uuid: ger_object_bf80538c82fa
    description_of_involvement: The *Enterprise*’s long-range sensor array is critical
      to the event’s tension, as its damage leaves the ship blind to the Soliton wave’s
      path. Geordi’s mention of its impairment—caused by the test ship’s explosion—creates
      a race against time, as the crew cannot track the wave without it. The array’s
      failure is both a technical setback and a narrative obstacle, forcing Picard
      to prioritize repairs over immediate pursuit. Its offline status raises the
      stakes, as the crew must rely on estimates and Ja’Dar’s data rather than real-time
      tracking, adding urgency to Geordi’s repair timeline.
    status_before_event: Functional but strained, multiplexing data from 15 science
      teams. Operational during the test ship’s launch, providing telemetry on the
      Soliton wave’s efficiency.
    status_after_event: Disabled by the explosion, leaving the *Enterprise* unable
      to track the Soliton wave’s trajectory. Geordi commits to restoring it within
      hours, but the delay is a critical vulnerability.
    global_id: ger_object_bf80538c82fa
  - object_uuid: ger_object_4ad677fab8b8
    description_of_involvement: The *Enterprise*’s warp drive is a casualty of the
      Soliton wave’s impact, its failure reported by Worf as part of the ship’s broader
      systems collapse. The drive’s offline status is a direct result of the shearing
      stress that destroyed the test ship, creating a cascading failure that limits
      the crew’s options. Data’s mention of ‘shearing stress’ ties the warp drive’s
      damage to the wave’s instability, while Geordi’s later discussion with Ja’Dar
      implies the drive’s repair is secondary to sensor restoration. The warp drive’s
      failure is a stark reminder of the crew’s vulnerability, forcing them to confront
      the fragility of their technology.
    status_before_event: Operational and stable, powering the *Enterprise*’s pursuit
      of the Soliton wave experiment.
    status_after_event: Offline, with repairs not yet prioritized. The crew’s ability
