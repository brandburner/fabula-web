  - 'PICARD: "Picard to Commander Riker." ((silence)) "Bridge to Lieutenant Worf,
    acknowledge."'
  - 'DATA: "The wave is about to overtake us, sir."'
  - 'PICARD: ((frustrated)) "Commander Riker, acknowledge!"'
  - 'PICARD: ((to Tactical Officer)) "Fire torpedoes."'
