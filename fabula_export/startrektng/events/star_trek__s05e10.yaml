      diagnose failures, and coordinate responses. The space is alive with urgency—alarms
      pulse, consoles flicker, and officers issue sharp orders as the Soliton wave’s
      impact reverberates through the ship. Picard stands at the center, directing
      the chaos with measured authority, while Riker, Data, and Worf man their stations,
      their movements precise and focused. The bridge’s mood is one of controlled
      panic, where every decision could mean the difference between survival and catastrophe.
