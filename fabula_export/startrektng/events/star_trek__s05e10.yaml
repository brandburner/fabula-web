  title: Helena delivers Alexander’s moral crisis
  description: 'In a private corner of Ten Forward, Helena confronts Worf with the
    harsh reality of Alexander’s behavioral struggles—his defiance and dishonesty—while
    subtly framing her departure as an ultimatum. She begins warmly, reminiscing about
    Alexander’s excitement for the ship’s play area, but quickly pivots to the unspoken
    tension: her and Worf’s father are aging and can no longer manage the boy’s needs.
    When Worf resists the implication that he must take custody, Helena escalates,
    revealing Alexander’s lies and disobedience as symptoms of deeper moral failure.
    Her tone shifts from maternal concern to firm insistence, forcing Worf to grapple
    with the weight of his son’s upbringing. The scene culminates in her departure,
    leaving Worf alone with the unspoken demand: *Prove you are the father Alexander
    needs.* The exchange underscores the cultural clash between Klingon discipline
    and Alexander’s humanized upbringing, while tying Worf’s personal crisis to the
    broader stakes of the Soliton wave mission—his hesitation now risks more than
    just his son’s future.'
