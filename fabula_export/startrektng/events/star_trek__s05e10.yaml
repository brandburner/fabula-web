  title: Dual Crisis Splits the Crew’s Focus
  description: |2

    The *Enterprise* emerges from the Soliton wave critically damaged—shields weakened to 12%, transporters offline, and warp transfer conduits fluctuating—while Worf urgently reports a fire in Biolab Four with a malfunctioning suppression system. The crew’s attention is violently split between the immediate threat of the Soliton wave and the escalating emergency in the biolab, where Data reveals the presence of endangered animals and, critically, Alexander Rozhenko. Picard must prioritize: evacuate contaminated sections of the ship or rescue the trapped lifeforms, including Worf’s estranged son. The dual crisis forces the crew into a high-stakes triage, raising the personal and operational stakes as the Soliton wave looms behind them. The moment exposes the fragility of the *Enterprise*’s systems and the emotional vulnerabilities of its crew, particularly Worf, whose paternal instincts are tested against his duty to the ship and mission.
