- fabula_uuid: act_c39c69bbdab81d9c
  number: 3
  summary: The Enterprise assesses the damage from the Soliton Wave incident, with
    sensors and warp drive offline, and deflectors severely weakened. Doctor Ja'Dar
    reports a transient power imbalance caused the explosion. Geordi works to repair
    the main sensor array. Ms. Kyle calls Worf to her office, reporting Alexander's
    continued defiant behavior, aggression toward other students, and persistent lying.
    She reveals Alexander claimed Worf said 'Klingons do not listen to teachers,'
    which Worf denies. Worf, angered by Alexander's continued misconduct, storms off
    to confront him. He finds Alexander in the holodeck, awkwardly practicing with
    a bat'telh in Worf's calisthenics program. Alexander expresses pride in his 'victory,'
    but Worf's expression hardens. Worf confronts Alexander about his lies and disobedience,
    and Alexander defiantly blames Ms. Kyle. Frustrated and believing he has failed
    as a father, Worf announces his decision to send Alexander to a Klingon school,
    horrifying the boy. Simultaneously, Data reports the Soliton Wave has increased
    in velocity and energy, now traveling at warp four point one and threatening to
    destroy the Lemma Two colony on Lemma Two. The external threat escalates dramatically,
    adding urgency to the narrative.
