  global_id: null
  title: Warp core crisis forces Worf to choose duty
  description: In Main Engineering, Geordi reports catastrophic warp conduit damage
    while Riker demands maximum speed to outrun the Soliton wave. Data’s cold calculation—four
    minutes until impact—escalates the ticking-clock tension, forcing Picard to prioritize
    the colony’s survival over ship integrity. Worf, already distracted by Alexander’s
    crisis, seizes the moment to request leave, revealing his internal conflict between
    Klingon fatherhood and Starfleet duty. Picard grants the request but imposes a
    brutal three-minute deadline, framing the scene as a collision of personal and
    professional imperatives. The exchange underscores the Soliton wave’s existential
    threat while deepening Worf’s struggle to reconcile his roles as warrior, officer,
    and parent. Riker’s silent compliance as they exit signals his role as both ally
    and enforcer of Picard’s orders, reinforcing the crew’s collective sacrifice in
    the face of annihilation.
