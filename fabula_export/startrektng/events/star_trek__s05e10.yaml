      crew clusters around the viewscreen and Riker's monitor, their voices overlapping
      as they process the Soliton wave damage and the biolab fire. The space hums
      with alarms and the low murmur of crisis management, with Picard at its center,
      directing the response. The bridge's layout—consoles, viewscreen, turbolifts—facilitates
      rapid decision-making, but the confined space also amplifies the emotional stakes,
      particularly for Worf, whose personal connection to the biolab crisis is palpable.
