      current speed.
    - Advocate for immediate action (e.g., firing torpedoes) to disrupt the Soliton
      wave before it's too late.
    what_happened: Geordi is the voice of technical urgency, his frustration palpable
      as he reports the loss of four warp transfer conduits. His hands move quickly
      over the console, his expression tense as he warns Riker that maintaining their
      current speed is unsustainable. When he suggests firing the torpedoes while
      still ahead of the wave, his tone is insistent, underscoring the precarity of
      their situation. Geordi's role in this moment is that of the pragmatist, grounding
      the crew in the harsh realities of their engineering constraints. His urgency
      is not just professional but personal—he knows the stakes, and his warnings
      are a call to action.
