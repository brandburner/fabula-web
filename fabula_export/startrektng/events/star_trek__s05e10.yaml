  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: Starfleet is the institutional backbone of the Enterprise's
      mission, its protocols and priorities shaping every decision made in this scene.
      Starfleet's influence is felt in Picard's unwavering commitment to protecting
      the colony, in Riker's silent compliance with his orders, and in the crew's
      collective sacrifice. The organization's goals—scientific exploration, diplomatic
      protection, and the preservation of life—are embodied in the crew's actions,
      even as personal crises threaten to derail them. Starfleet's presence here is
      not overt but is woven into the fabric of the scene, a reminder that the crew's
      duties extend far beyond their individual concerns. The organization's power
      dynamics are evident in Picard's authority, which is absolute but tempered by
      the need to balance mission objectives with the well-being of his crew.
    active_representation: Through institutional protocol (e.g., Picard's authority,
      the chain of command, the three-minute deadline) and the collective action of
      the crew (e.g., their focus on the Soliton wave despite personal distractions).
