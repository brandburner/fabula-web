- fabula_uuid: act_1bd03ef6759a10be
  number: 5
  summary: 'With Alexander trapped in the burning biolab and the Enterprise losing
    speed, Picard grants Worf and Riker three minutes to rescue the boy before the
    ship must fire torpedoes. Worf and Riker race to the biolab, forcing entry into
    the smoke-filled, burning compartment. Worf locates Alexander pinned under debris,
    alive but injured. As Worf struggles to free him, Alexander, in his fear and pain,
    pleads with his father to save the endangered Gilvos in the lab. Witnessing Alexander''s
    genuine compassion for the creatures, Worf experiences a profound realization:
    his son is not beyond saving. Galvanized, Worf summons superhuman Klingon strength
    to lift the heavy beam off Alexander, while Riker retrieves the Gilvos. They escape
    the biolab just as the Enterprise fires torpedoes, successfully disrupting and
    dissipating the Soliton Wave. In sickbay, Alexander recovers from minor injuries.
    Worf offers Alexander a choice: attend a Klingon school or stay on the Enterprise
    and face challenges together. Alexander chooses to stay, accepting the challenge.
    Worf and Alexander share a genuine smile, finally forging a strong, reciprocal
    bond, signifying Worf''s acceptance of his role as a father and Alexander''s commitment
    to their relationship.'
