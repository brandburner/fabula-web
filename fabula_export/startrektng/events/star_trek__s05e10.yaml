  object_involvements:
  - object_uuid: ger_object_dbe05e02de49
    description_of_involvement: Riker's monitor displays an Okudagram diagram of the
      *Enterprise*, highlighting the gaps in the aft shields and the areas contaminated
      with ion radiation from the torpedoes. This visual aid is critical in Picard's
      decision-making process, as it provides a clear, data-driven representation
      of the ship's vulnerabilities. Riker uses the monitor to argue for the evacuation
      of specific sections, but the revelation of lifeforms in Biolab Four complicates
      this plan, forcing a reassessment of priorities.
    status_before_event: Active and displaying real-time data on shield gaps and ion
      radiation contamination in the aft sections of the ship.
    status_after_event: Continues to display critical ship data, but its relevance
      shifts as the biolab fire and the presence of lifeforms (including Alexander)
      become the focal point of the crew's attention.
    global_id: ger_object_dbe05e02de49
  - object_uuid: ger_object_9ab730091ad7
    description_of_involvement: The fire-suppression apparatus in Biolab Four is central
      to the crisis, as its malfunction traps endangered animals and Alexander inside
      the burning lab. Worf's urgent report of its failure is the catalyst for the
      scene's tension, as it reveals the immediate danger to life and forces the crew
      to act. The apparatus's failure is not just a technical issue but a moral one,
      as it directly threatens the safety of vulnerable beings, including a child.
    status_before_event: Malfunctioning and unable to contain the fire in Biolab Four,
      posing a direct threat to the lifeforms inside.
    status_after_event: Continues to fail, with the fire spreading and the situation
      in Biolab Four growing more dire by the second.
    global_id: ger_object_9ab730091ad7
  - object_uuid: ger_object_355238adeacf
    description_of_involvement: The endangered animals from Corvan II are a critical
      factor in the crew's decision-making, as their presence in Biolab Four adds
      moral weight to the crisis. Data's report of their presence, followed by the
      revelation of Alexander's identity, forces the crew to consider the ethical
      implications of their actions. The animals symbolize the broader stakes of the
      mission—protecting life in all its forms—while also serving as a distraction
      from the Soliton wave threat.
    status_before_event: Trapped in Biolab Four amid the fire, their survival dependent
      on the crew's ability to act quickly.
    status_after_event: Continue to be in immediate danger, with their fate now intertwined
      with Alexander's and the crew's ability to rescue them.
    global_id: ger_object_355238adeacf
  - object_uuid: ger_object_9c07adb21091
    description_of_involvement: The Enterprise Bridge viewscreen serves as the primary
      interface for the crew's interaction with the Soliton wave and the broader crisis.
      It displays the wave's shifting colors and shapes as the ship emerges, providing
      visual confirmation of their passage and the damage sustained. Though it does
      not directly show the biolab fire, its presence looms in the background, as
      the crew's attention shifts from the external threat to the internal emergency.
      The viewscreen is a symbol of the crew's connection to the larger universe and
      the dangers it holds.
    status_before_event: Active and displaying the Soliton wave's destabilizing energy
      as the *Enterprise* emerges from it, with alarms and damage reports flashing
      across the screen.
    status_after_event: Continues to display critical data, but its focus shifts as
      the biolab fire and the presence of lifeforms become the primary concern.
    global_id: ger_object_9c07adb21091
  - object_uuid: ger_object_9b952e7b0354
    description_of_involvement: The Soliton wave is the antagonistic force looming
      behind the *Enterprise*, its destabilizing energy having already weakened the
      ship's shields to 12% and caused fluctuations in warp conduits and transporters.
      Though not physically present on the bridge, its presence is a constant, ominous
      threat that frames the crew's decisions. The wave's proximity and the damage
      it has inflicted create a sense of urgency, forcing Picard to balance the immediate
      danger it poses with the crisis unfolding in Biolab Four.
    status_before_event: Active and surging at warp 7.2, 23 kilometers astern of the
