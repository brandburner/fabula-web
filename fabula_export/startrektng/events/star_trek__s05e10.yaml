  description: "\n  In the burning biolab, Worf discovers Alexander trapped under\
    \ debris and immediately shifts into protective mode, checking his pulse and clearing\
    \ wreckage with desperate urgency. When Riker arrives and they fail to lift a\
    \ massive beam pinning Alexander, Worf—ignited by paternal instinct—channels raw\
    \ Klingon strength to heave it off alone, revealing both his physical power and\
    \ emotional vulnerability. The moment of relief is interrupted when Alexander,\
    \ instead of celebrating his rescue, urgently points to a nearby Gilvo container\
    \ and pleads for their lives, forcing Riker to abandon protocol and prioritize\
    \ saving the endangered creatures. Worf’s silent pride in Alexander’s empathy\
    \ contrasts with Riker’s reluctant compliance, underscoring the tension between\
    \ duty and compassion while marking a turning point in Worf’s fractured relationship\
    \ with his son.\n  "
