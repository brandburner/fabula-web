  key_dialogue:
  - 'GEORDI: The soliton wave has continued to increase in power. Its energy level
    has risen by a factor of ninety-six. At its present rate of acceleration, the
    wave will hit the planet in about two hours.'
  - 'WORF: I know that I have been distracted by... family matters and that I have
    not been performing my duties in a satisfactory manner.'
