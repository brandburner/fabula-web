    status_before_event: |2-

            The consoles are fully operational but show signs of strain as the ship emerges from the initial wave impact. Sensors are recalibrating, and navigation systems are adjusting to the new pursuit trajectory. Damage reports from the biolab fire and other systems are flashing on screens, but the crew's focus is locked on the Soliton Wave's telemetry.
    status_after_event: |2-

            The consoles are now in overdrive, their screens filled with rapidly updating data on the wave's speed, energy surges, and the *Enterprise*'s relative position. Felton's adjustments have stabilized the ship's trajectory, but the consoles continue to emit urgent alerts as the crew prepares for the impending collision. The torpedo bays are armed and ready, their status displayed on Worf's station, while sickbay stands by for casualties.
