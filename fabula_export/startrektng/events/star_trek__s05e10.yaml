  object_involvements:
  - object_uuid: ger_object_2225766d31d6
    description_of_involvement: "\n        The Enterprise Bridge Turbolift is the\
      \ physical conduit for Worf and Riker’s race against time. Its sleek, confined\
      \ space amplifies the tension—there’s no room to pace, no escape from the weight\
