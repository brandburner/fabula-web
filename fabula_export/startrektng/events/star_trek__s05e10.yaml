- fabula_uuid: cand_evt_scene_4b2cbcd50789d658_01
  global_id: null
  title: Worf learns of Alexander’s defiance
  description: 'Ms. Kyle, Alexander’s teacher, delivers a blunt assessment of his
    behavior—defiance, aggression, and dishonesty—while Worf initially dismisses her
    concerns as cultural ignorance. When she reveals Alexander has been lying about
    Worf’s own parenting advice, his shock gives way to Klingon instinct: he abruptly
    cuts off the meeting, locates his son via the computer, and storms off to confront
    him directly. The scene exposes Worf’s struggle to reconcile human guidance with
    Klingon discipline, while Alexander’s rebellion becomes a tangible threat to their
    fragile bond. The confrontation looms as Worf prioritizes immediate action over
    counsel, revealing his own unresolved emotions and parenting failures.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e10
  scene_sequence: 16
  sequence_in_scene: 26
  key_dialogue: &id019
  - 'KYLE: ((carefully)) Lieutenant, your son is a very bright, very spirited young
    man. From his test scores, I''m sure he''ll turn out to be one of my best students.
    However, from his behavior in class so far, I do have some... concerns.'
  - 'KYLE: He takes toys from other children and then denies taking them... he acts
    like a bully and then says someone else started the fight... and he''s bluntly
    told me that you said ''Klingons do not listen to teachers.'''
  - 'WORF: I did not tell him that.'
  - 'KYLE: Of course not. He''s acting on his internal feelings and then making up
    stories to explain them. It might be a good idea for the two of you to sit down
    with Counselor Troi and try to talk this--'
  - 'WORF: Computer, where is Alexander Rozhenko?'
