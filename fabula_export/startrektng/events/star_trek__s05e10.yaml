  title: Soliton wave accelerates beyond all projections
  description: "\n  The Enterprise bridge becomes a pressure cooker of escalating\
    \ tension as Riker, now in command, oversees the ship's desperate race to stop\
    \ the soliton wave. Data's sensor sweep reveals the wave is not only still on\
    \ course for the Lemma Two colony but has unexpectedly surged to **warp 4.1**—far\
    \ exceeding all prior models. This revelation forces Riker to confront a brutal\
    \ reality: the ship's race against time has just grown exponentially more urgent.\
    \ The stakes skyrocket when Data delivers the devastating follow-up: the wave's\
    \ energy has increased by a **factor of twelve**, with projections showing it\
    \ will grow another **factor of two hundred** by the time it reaches the colony.\
    \ Ja'Dar's horrified response confirms the worst—the wave will now destroy not\
    \ just the colony but **most of the planet**. The scene pivots from urgency to\
    \ existential crisis, with Riker and Data's stunned reactions underscoring the\
    \ catastrophic shift in the mission's stakes. This moment is a **turning point**,\
    \ forcing the crew to abandon prior strategies and scramble for a solution that\
    \ now feels nearly impossible. The emotional weight is compounded by the subtext:\
    \ the Enterprise's crew, already stretched thin by the Soliton Wave crisis, must\
    \ now grapple with the fact that their efforts may no longer be enough to save\
    \ the colony—or even the planet.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e10
  scene_sequence: 19
