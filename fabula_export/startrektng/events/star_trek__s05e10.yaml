  key_dialogue:
  - 'WORF: Freeze program.'
  - 'ALEXANDER: Did you see it, Father? I won.'
  - 'WORF: Yes, I saw. ... Why are you here? ... I also said I wanted you to obey
    your teachers and keep your promise to me. Ms. Kyle has told me about your behavior...
    about your lies.'
  - 'ALEXANDER: I have not lied! She''s lying! She hates me, that''s why she makes
    up stories about me!'
  - 'WORF: I will not listen to further lies. ... It is now clear to me that I have
    failed in my duties as your father. You have no understanding of what it means
    to be Klingon. I will arrange for you to attend a Klingon school. There you will
    learn the lessons I have failed to teach you.'
  - 'ALEXANDER: No! I won''t go!'
  - 'WORF: Would you dishonor our family further with your disobedience?'
