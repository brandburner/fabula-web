            The Soliton Wave dominates the scene as both a physical threat and a narrative force of nature. On the viewscreen, it appears as a massive, shimmering distortion, its wavy form accelerating through space at warp 7.2—a speed that defies conventional physics and threatens to outpace the *Enterprise*. Data's report of its surge to warp 7.2 underscores its unpredictability, while Picard's order to increase speed to warp 7.3 frames the wave as an adversary that must be outmaneuvered at all costs. The wave's looming presence on the screen creates a visual countdown to catastrophe, its energy surges described as 'twelvefold,' a reminder of the destructive power it wields. It is not just an obstacle but a ticking clock, forcing the crew into a desperate sprint where every second counts.
    status_before_event: |2-

            The Soliton Wave has already destabilized and destroyed the test ship, sending ripples surging through space at warp 7.2. Its energy matrix is unstable, with power fluctuations and a warp field on the verge of collapse. The wave is accelerating toward the Lemma Two colony, its trajectory set to obliterate everything in its path.
    status_after_event: |2-

            The wave continues its relentless advance, now with the *Enterprise* in a high-speed pursuit, maintaining a 23-kilometer lead. Its energy surges have intensified, and its distortion on the viewscreen grows more menacing as the ship closes the distance. The crew's backfire plan—using photon torpedoes to disrupt its matrix—hangs in the balance, with the wave's unstoppable force serving as the ultimate test of their ingenuity and resolve.
