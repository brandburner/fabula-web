  title: Worf races to save Alexander amid failing systems
  description: 'On the *Enterprise* bridge, the crew scrambles to rescue Alexander
    Rozhenko, trapped in a burning biolab, while the ship’s failing warp core threatens
    their ability to intercept the Soliton wave. Picard attempts to contact Alexander
    via comms, but the boy doesn’t respond—heightening Worf’s fear that he’s injured
    or worse. Worf’s frustration boils over as he confirms the transporters remain
    offline, leaving no immediate way to extract Alexander. Felton’s urgent report
    of a catastrophic warp power failure forces Picard and Riker to confront a brutal
    choice: divert resources to stabilize the warp core or maintain their desperate
    pursuit of the Soliton wave. The scene escalates the dual crisis—Alexander’s physical
    peril and the ship’s existential threat—while exposing Worf’s helplessness to
    protect his son, both emotionally and physically. The tension underscores the
    collision of personal and professional stakes, with every second counting as the
    fire spreads and the Soliton wave looms closer.'
