- fabula_uuid: cand_evt_scene_a3034b55082e7869_01
  global_id: null
  title: Worf discovers Alexander’s forbidden training
  description: 'Worf, seething after Ms. Kyle’s report of Alexander’s defiance, storms
    to the holodeck expecting to confront his son’s disobedience. Instead, he finds
    Alexander secretly training with a bat’leth in a Klingon combat simulation—an
    act of defiance that cuts deeper than schoolyard rebellion. The discovery forces
    Worf to confront his own failure as a father: Alexander’s deception reveals not
    just disrespect, but a desperate bid for his father’s approval through the one
    thing Worf values most—Klingon warrior skill. The moment becomes a turning point,
    exposing the fragility of their bond and setting up the explosive confrontation
    to come. The holodeck’s simulated battlefield underscores the irony: Alexander’s
    defiance is a twisted mirror of Worf’s own Klingon instincts, forcing Worf to
    question whether his parenting has been discipline or neglect.'
