  title: Worf’s Failed Discipline and Ultimatum
  description: 'Worf discovers Alexander secretly training with his bat’leth in the
    holodeck, initially torn between pride at the boy’s effort and fury over his disobedience.
    After a heated confrontation—where Alexander defends his actions and accuses his
    teacher of lying—Worf’s frustration boils over. He declares his failure as a father
    and issues an ultimatum: Alexander will be sent to a Klingon school to learn discipline,
    a decision that shatters the boy’s trust and deepens their emotional rift. The
    scene underscores Worf’s rigid expectations and Alexander’s resistance to Klingon
    identity, setting up their later reconciliation and the thematic tension between
    tradition and self-determination. The ultimatum also triggers Troi’s intervention
    and the ship’s broader crisis, as the Soliton Wave’s escalation looms in the background,
    forcing Worf to confront his parenting failures amid the mission’s urgency.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e10
  scene_sequence: 18
  sequence_in_scene: 29
  key_dialogue:
  - |-
    ALEXANDER: ((with pride)) Did you see it, Father? I won.
    WORF: ((even)) Yes, I saw.
  - |-
    WORF: ((firm)) I will not listen to further lies. Return to our quarters.
    ALEXANDER: But you said we could go see the Gilvos again.
    WORF: ((a shout)) Enough!
  - |-
    WORF: It is now clear to me that I have failed in my duties as your father. You have no understanding of what it means to be Klingon. I will arrange for you to attend a Klingon school. There you will learn the lessons I have failed to teach you.
    ALEXANDER: ((horrified)) No! I won’t go!
