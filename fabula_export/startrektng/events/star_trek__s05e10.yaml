acts:
- fabula_uuid: act_5a4ab72ca4c65503
  number: 1
  summary: The Enterprise arrives at Bilana Three, where scientists prepare to test
    the Soliton Wave, a new propulsion method. Geordi expresses excitement, but Data
    and Worf remain detached. Worf receives an unexpected subspace communication from
    his adoptive mother, Helena, who arrives on the Enterprise with Worf's son, Alexander.
    Helena reveals she and Worf's father can no longer care for Alexander, leaving
    him in Worf's custody. Worf struggles with this sudden responsibility and Alexander's
    expectation to stay. Helena explains Alexander's difficulties, including disobedience
    and lying, which shocks Worf. Worf attempts to connect with Alexander, but their
    interactions are awkward and strained. Worf enrolls Alexander in school, where
    Alexander's teacher, Ms. Kyle, highlights his disengaged behavior and Worf's lack
    of knowledge about his son's birthday. During a father-son field trip to the biolab,
    Alexander is fascinated by the Gilvos. Ms. Kyle discreetly confronts Alexander
    about stealing a model and lying about it. Worf, initially defensive, discovers
    the model in Alexander's pocket, confirming his son's deception. This revelation
    deeply troubles Worf, challenging his Klingon sense of honor and his perception
    of his son.
