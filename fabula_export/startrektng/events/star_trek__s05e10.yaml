  global_id: null
  title: Enterprise suffers damage and receives distress call
  description: The *Enterprise* is violently rocked by the Soliton wave impact, causing
    structural damage, system failures, and minor injuries. As the crew regains order,
    Worf reports the extent of the damage—sensors, warp drive, and deflectors are
    offline—while Picard investigates the cause of the test ship’s explosion. A distress
    call from Bilana Three interrupts the recovery, forcing Picard to prioritize the
    colony’s crisis over the *Enterprise*’s repairs. Geordi’s technical exchange with
    Doctor Ja’Dar reveals the wave’s destabilizing effects and the urgency of restoring
    the ship’s sensors, while also offering a moment of human connection amid the
    chaos. The event escalates the tension between the crew’s immediate survival and
    their mission to stop the Soliton wave, underscoring the fragility of both the
    ship and their technological gambit.
