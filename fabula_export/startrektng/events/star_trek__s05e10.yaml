      emotion.
    symbolic_significance: 'Represents the *collision of Worf’s two worlds*: his Starfleet
      duty (symbolized by the bridge) and his Klingon fatherhood (symbolized by Alexander’s
      plight). The lab is where he must prove he can be both a warrior and a parent
      in the same breath.'
    access_restrictions: Restricted due to radiation and structural damage. Only authorized
