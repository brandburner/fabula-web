  title: Worf requests leave to save Alexander
  description: In the midst of a high-stakes Soliton wave crisis, Worf—distracted
    by his son Alexander’s peril in Biolab Four—abruptly requests leave from the bridge.
    Picard grants the request but assigns Riker as an escort, subtly acknowledging
    Worf’s emotional vulnerability while reinforcing the ship’s operational priorities.
    The exchange underscores the tension between Klingon honor, fatherhood, and Starfleet
    duty, as Worf’s urgency to protect Alexander clashes with the Enterprise’s desperate
    race against annihilation. Data’s cold report of the wave’s impending impact (four
    minutes, thirty seconds) heightens the stakes, forcing Worf and Riker to act within
    a razor-thin window. The moment foreshadows deeper conflicts in Worf’s dual identity
    as both a Klingon warrior and a father, while Picard’s firm deadline (three minutes,
    no more) tests Worf’s ability to balance personal and professional obligations
    under extreme pressure.
