  title: Helena reveals Alexander’s moral failures
  description: In a tense, emotionally charged conversation at Ten Forward, Helena—Worf’s
    adoptive mother—delivers a blunt assessment of Alexander’s behavioral struggles,
    framing them as urgent moral failures that demand Worf’s immediate intervention.
    She begins by reminiscing about Alexander’s excitement aboard the *Enterprise*,
    softening the blow before revealing his disobedience and dishonesty. Worf, initially
    resistant to the idea of fatherhood, is stunned by the accusation that his son
    is a liar, a revelation that forces him to confront his own avoidance of parental
    responsibility. Helena’s firm but loving insistence that Alexander needs his father’s
    guidance—*now*—escalates Worf’s internal conflict, tying his personal crisis to
    the broader stakes of the Soliton wave mission. The exchange underscores the generational
    weight of Klingon legacy and the fragility of Alexander’s upbringing, setting
    up Worf’s inevitable reckoning with his son’s needs amid the ship’s looming crisis.
    Helena’s departure leaves Worf grappling with the reality that his hesitation
    is no longer an option, foreshadowing the confrontation to come when Alexander’s
    theft of the model confirms her warnings.
