  object_involvements:
  - object_uuid: ger_object_3f266be289a6
    description_of_involvement: The *Enterprise*’s deflectors are reduced to 15% capacity
      after the Soliton wave’s impact, a critical vulnerability that Worf reports
      alongside the warp drive and sensor failures. The deflectors’ impairment leaves
      the ship exposed to further damage, particularly from the wave’s energy surges.
      Geordi’s later confirmation of the damage during his exchange with Ja’Dar underscores
      the ship’s precarious state, as the deflectors are essential for shielding against
      debris and subspace distortions. Their failure is a direct consequence of the
      wave’s destabilization, symbolizing the crew’s loss of control over their environment.
    status_before_event: At full capacity, protecting the *Enterprise* from subspace
      distortions and debris during the Soliton wave test.
    status_after_event: Operating at 15%, leaving the ship vulnerable to additional
      damage. Repairs are not immediately addressed, as the crew focuses on sensors
      and the colony’s distress.
    global_id: ger_object_3f266be289a6
  - object_uuid: ger_object_dbe05e02de49
    description_of_involvement: The transmission termination control is a small but
      pivotal object in the event, as Ja’Dar reaches for it to end the communication
      with the *Enterprise*. Geordi’s interruption—‘Doctor...’—halts the cutoff, creating
      a moment of human connection amid the technical crisis. The control’s pause
      allows Geordi to offer Ja’Dar encouragement, softening the blow of the failed
      experiment. Its role is symbolic, representing the crew’s refusal to disengage
      from the human cost of the disaster, even as systems fail around them.
    status_before_event: Ready to be activated by Ja’Dar to end the transmission,
