  - 'ALEXANDER: I''m sorry. I promise I''ll be good at the Klingon school. I''ll make
    you proud of me.'
  - 'WORF: Klingon schools are designed to be difficult. The physical and mental hardships
    faced by the students are meant to build strength and character. However, if you
    wish to face a greater challenge... you may stay here with me.'
  - 'ALEXANDER: ((seriously)) I accept your challenge, Father. I will stay.'
  - 'WORF: I believe your... mother would be pleased.'
