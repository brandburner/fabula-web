  title: Worf lectures Alexander on Klingon honor
  description: Worf, grappling with his own inadequacies as a father, delivers a harsh
    lecture to Alexander about Klingon honor and truthfulness. His anger and frustration—stemming
    from his fear of failing the boy—escalate into a confrontation that leaves Alexander
    visibly terrified. Worf’s rigid expectations clash with Alexander’s emotional
    vulnerability, exposing the fragility of their bond and the cultural chasm between
    them. The moment culminates in Alexander’s remorseful apology, marking a fragile
    turning point in their relationship, though the unresolved tension lingers beneath
    the surface. The scene underscores Worf’s struggle to reconcile his Klingon values
    with the complexities of parenting, while the Soliton wave crisis looms as an
    unspoken pressure on their strained dynamic.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e10
  scene_sequence: 9
  sequence_in_scene: 15
  key_dialogue:
  - 'WORF: A Klingon''s honor is more important to him than his life. A Klingon would
    gladly face the most horrible punishment rather than bring shame or disgrace to
    his family name. His word is his bond... without it, he is nothing.'
  - |-
    WORF: Why did you lie to me?
    ALEXANDER: I don't know.
    WORF: ((voice rising)) You do not know why you lied, and yet you did. You do not know why you stole, and yet you did!
  - |-
    WORF: When I was a child... younger than you... I lost my parents, my family... my people. Everything I had was taken from me... except my sense of honor. It was the one thing I had which was truly Klingon... and which no one could take away.
    ALEXANDER: I'm sorry, father. I won't do it again. I promise.
