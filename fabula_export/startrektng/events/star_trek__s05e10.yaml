    gladly face the most horrible punishment rather than bring shame or disgrace to
    his family name. His word is his bond... without it, he is nothing.'
  - 'WORF: When I was a child... younger than you... I lost my parents, my family...
    my people. Everything I had was taken from me... except my sense of honor. It
    was the one thing I had which was truly Klingon... and which no one could take
    away.'
  - 'WORF: When you lie or steal, you dishonor not only yourself, but your family.
    You dishonor me.'
