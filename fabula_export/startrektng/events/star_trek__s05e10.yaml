- fabula_uuid: cand_evt_scene_38bb113fe08a8273_01
  global_id: null
  title: Worf forces open the burning biolab
  description: "\n  In a high-stakes moment during the Soliton wave crisis, Worf and\
    \ Riker arrive at the jammed biolab doors where Alexander is trapped. Riker attempts\
    \ to manually override the malfunctioning control panel, but the system is dead.\
    \ Worf takes decisive action, ripping the panel from the wall and rewiring the\
    \ circuits with brute-force efficiency. When he signals Riker to stand clear,\
    \ the doors burst open—releasing a violent tongue of flame into the corridor.\
    \ The fire briefly recedes, creating a narrow window for the two officers to rush\
    \ into the burning lab. This moment escalates the urgency of the rescue mission,\
    \ forcing Worf to confront the immediate danger to his son while the Soliton wave’s\
    \ threat looms over the Enterprise. The physical act of forcing the doors also\
    \ underscores Worf’s Klingon pragmatism and his willingness to act without hesitation\
    \ when Alexander’s life is at stake, even in the face of personal fear or doubt.\n\
    \  "
