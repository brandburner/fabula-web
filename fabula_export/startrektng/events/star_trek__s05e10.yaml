- fabula_uuid: cand_evt_scene_bd78ac648587128e_01
  global_id: null
  title: Troi challenges Worf on fatherhood duty
  description: On the bridge, Troi intercepts Worf after his meeting with Picard and
    subtly confronts his reluctance to prioritize Alexander’s father-son field trip.
    Worf initially dismisses the event due to a scheduled personnel review, but Troi’s
    gentle persistence—framing the trip as an opportunity for Alexander to bond with
    peers and parents—exposes his discomfort with fatherhood. After a tense beat,
    Worf concedes, agreeing to reschedule his duties, marking a rare moment where
    his Klingon warrior ethos yields to emotional responsibility. The exchange underscores
    Troi’s role as a catalyst for Worf’s personal growth, while his hesitation reveals
    his unresolved grief over K’Ehleyr’s death and his struggle to reconcile Klingon
    values with parenting. The scene foreshadows Worf’s eventual reckoning with Alexander’s
    needs, setting up future conflicts over trust and cultural identity.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e10
