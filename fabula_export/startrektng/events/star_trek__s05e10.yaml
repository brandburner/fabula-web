- fabula_uuid: act_89ba417e30887c05
  number: 4
  summary: Worf discusses his decision to send Alexander away with Counselor Troi.
    Troi probes Worf's feelings, suggesting Alexander might feel abandoned, mirroring
    Worf's own unresolved anger and grief over K'Ehleyr's death and the burden of
    a son he never knew. Worf struggles with these emotions, acknowledging the pain
    but initially resisting the connection. Troi encourages him to confront his feelings
    and heal alongside Alexander. Worf attempts to talk to Alexander, who, feeling
    ashamed and abandoned, expresses anger and accuses Worf of caring only about his
    honor. Their conversation is interrupted by a summons to the observation lounge.
    Alexander, enraged and frustrated, knocks over a table and runs off to the biolab.
    In the observation lounge, Geordi reports the Soliton Wave has continued to increase
    in power and will hit Lemma Two in two hours. The crew decides their only option
    is to penetrate the wave and detonate torpedoes in front of it, a dangerous maneuver
    given the Enterprise's damaged shields. Worf seeks Picard's counsel, who encourages
    him to embrace the challenges of parenting. The Enterprise engages warp to intercept
    the wave, sustaining heavy damage as it passes through. Immediately after, Worf
    discovers Alexander is trapped in the burning biolab, a section of the ship vulnerable
    to ion radiation from the imminent torpedo detonation, raising the stakes to a
    critical level.
