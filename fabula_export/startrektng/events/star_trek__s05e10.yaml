  object_involvements:
  - object_uuid: ger_object_3f266be289a6
    description_of_involvement: The *Enterprise*’s deflectors are reduced to 15% capacity
      after the Soliton wave’s impact, a critical vulnerability that Worf reports
      alongside the warp drive and sensor failures. The deflectors’ impairment leaves
      the ship exposed to further damage, particularly from the wave’s energy surges.
      Geordi’s later confirmation of the damage during his exchange with Ja’Dar underscores
      the ship’s precarious state, as the deflectors are essential for shielding against
      debris and subspace distortions. Their failure is a direct consequence of the
      wave’s destabilization, symbolizing the crew’s loss of control over their environment.
    status_before_event: At full capacity, protecting the *Enterprise* from subspace
      distortions and debris during the Soliton wave test.
    status_after_event: Operating at 15%, leaving the ship vulnerable to additional
      damage. Repairs are not immediately addressed, as the crew focuses on sensors
      and the colony’s distress.
    global_id: ger_object_3f266be289a6
  - object_uuid: ger_object_dbe05e02de49
    description_of_involvement: The transmission termination control is a small but
      pivotal object in the event, as Ja’Dar reaches for it to end the communication
      with the *Enterprise*. Geordi’s interruption—‘Doctor...’—halts the cutoff, creating
      a moment of human connection amid the technical crisis. The control’s pause
      allows Geordi to offer Ja’Dar encouragement, softening the blow of the failed
      experiment. Its role is symbolic, representing the crew’s refusal to disengage
      from the human cost of the disaster, even as systems fail around them.
    status_before_event: Ready to be activated by Ja’Dar to end the transmission,
      a routine action in crisis communication.
    status_after_event: Unused, as Geordi’s intervention extends the conversation,
      turning a functional tool into a catalyst for empathy.
    global_id: ger_object_dbe05e02de49
  - object_uuid: ger_object_bf80538c82fa
    description_of_involvement: The *Enterprise*’s long-range sensor array is critical
      to the event’s tension, as its damage leaves the ship blind to the Soliton wave’s
      path. Geordi’s mention of its impairment—caused by the test ship’s explosion—creates
      a race against time, as the crew cannot track the wave without it. The array’s
      failure is both a technical setback and a narrative obstacle, forcing Picard
      to prioritize repairs over immediate pursuit. Its offline status raises the
      stakes, as the crew must rely on estimates and Ja’Dar’s data rather than real-time
      tracking, adding urgency to Geordi’s repair timeline.
    status_before_event: Functional but strained, multiplexing data from 15 science
      teams. Operational during the test ship’s launch, providing telemetry on the
      Soliton wave’s efficiency.
    status_after_event: Disabled by the explosion, leaving the *Enterprise* unable
      to track the Soliton wave’s trajectory. Geordi commits to restoring it within
      hours, but the delay is a critical vulnerability.
    global_id: ger_object_bf80538c82fa
  - object_uuid: ger_object_4ad677fab8b8
    description_of_involvement: The *Enterprise*’s warp drive is a casualty of the
      Soliton wave’s impact, its failure reported by Worf as part of the ship’s broader
      systems collapse. The drive’s offline status is a direct result of the shearing
      stress that destroyed the test ship, creating a cascading failure that limits
      the crew’s options. Data’s mention of ‘shearing stress’ ties the warp drive’s
      damage to the wave’s instability, while Geordi’s later discussion with Ja’Dar
      implies the drive’s repair is secondary to sensor restoration. The warp drive’s
      failure is a stark reminder of the crew’s vulnerability, forcing them to confront
      the fragility of their technology.
    status_before_event: Operational and stable, powering the *Enterprise*’s pursuit
      of the Soliton wave experiment.
    status_after_event: Offline, with repairs not yet prioritized. The crew’s ability
      to maneuver or escape the wave’s path is compromised, adding to the urgency
      of restoring other systems.
    global_id: ger_object_4ad677fab8b8
  - object_uuid: ger_object_af37139069fe
    description_of_involvement: Felton’s bridge console is the hub for damage reports
      and real-time data during the event, displaying the *Enterprise*’s position,
      sensor telemetry, and the Soliton wave’s trajectory. Worf and Geordi reference
      its readings to assess the ship’s status, while Data and Picard rely on its
