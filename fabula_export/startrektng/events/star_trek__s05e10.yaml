  title: Worf lifts debris to save Alexander
  description: In the burning biolab, Worf discovers his injured son Alexander trapped
    under a collapsed beam, his pulse weak but still alive. As Riker arrives to assist,
    they struggle together to lift the debris, but the beam proves too heavy. When
    Alexander stirs and pleads for help, Worf—galvanized by paternal instinct—summons
    his Klingon strength to heave the beam off alone, revealing his vulnerability
    and the depth of his bond with his son. The moment shifts when Alexander, despite
    his own pain, urgently points to a nearby Gilvo container and begs Riker to save
    the creatures inside. Riker hesitates but ultimately relents, demonstrating Alexander’s
    moral courage and the mission’s tension between duty and compassion. The scene
    underscores Worf’s transformation from reluctant father to protective parent,
    while Alexander’s empathy challenges the crew’s rigid priorities.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e10
  scene_sequence: 30
  sequence_in_scene: 53
  key_dialogue:
  - 'WORF: I''ve found him, Commander!'
  - 'ALEXANDER: ((coughing)) Father?'
  - 'WORF: Be still, I am here.'
  - 'ALEXANDER: My leg hurts. I''m scared.'
  - 'ALEXANDER: The Gilvos! Don''t leave them here!'
  - 'ALEXANDER: They''ll die! Please!'
