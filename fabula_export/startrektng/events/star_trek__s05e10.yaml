- fabula_uuid: act_8dc8375a836c3887
  number: 2
  summary: Worf confronts Alexander in his quarters, attempting to instill Klingon
    values of honor and truthfulness. He recounts the story of Kahless and Morath,
    emphasizing the shame Alexander brings upon their family by lying and stealing.
    Alexander expresses remorse and promises to change, which Worf accepts, believing
    the matter resolved. Counselor Troi, however, expresses reservations about the
    swiftness of the resolution, hinting at deeper issues. Meanwhile, the Enterprise
    prepares for the Soliton Wave test. Doctor Ja'Dar initiates the launch sequence,
    and the test ship successfully enters warp, demonstrating an astonishing ninety-eight
    percent energy efficiency. Geordi and Riker express awe at the breakthrough. Suddenly,
    the wave's power signature fluctuates, and its efficiency drops drastically. The
    test ship's warp field becomes unstable, leading to a severe subspace distortion
    that affects the Enterprise. Picard orders the ship out of warp, and the test
    ship explodes on the main viewer, sending distortion ripples that heavily rock
    the Enterprise, causing damage and a power outage. This catastrophic failure immediately
    shifts the narrative's focus to an external, escalating threat.
