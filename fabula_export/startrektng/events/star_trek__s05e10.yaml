  - character_uuid: ger_agent_868446276ca7
    emotional_state: A volatile mix of relief (permission granted), terror (time constraint
      and radiation), and determination (to save Alexander). His Klingon pride is
      both a strength and a liability—it fuels his resolve but also risks clouding
      his judgment.
    goals:
    - Reach Biolab Four in time to rescue Alexander before the ion radiation becomes
      lethal.
    - Prove to himself and Picard that he can balance fatherhood and duty, even in
      extremis.
    what_happened: "\n        Worf is a storm of barely contained emotion, his Klingon\
      \ physiology betraying his urgency—his fists clench, his breath is audible,\
      \ and his body language screams *movement*. When he approaches Picard, his plea\
      \ is direct, almost raw, stripping away the usual Starfleet formality. The moment\
      \ Picard grants his request, Worf’s relief is palpable, but it’s immediately\
      \ tempered by the three-minute deadline. His nod to Picard is not just acknowledgment;\
      \ it’s a vow to return in time, a promise to himself and his son. As he and\
      \ Riker move toward the turbolift, his strides are purposeful, his mind already\
      \ in Biolab Four, grappling with the debris, the radiation, and the fear of\
      \ losing Alexander.\n      "
    observed_status: "\n        Worf is a storm of barely contained emotion, his Klingon\
      \ physiology betraying his urgency—his fists clench, his breath is audible,\
      \ and his body language screams *movement*. When he approaches Picard, his plea\
      \ is direct, almost raw, stripping away the usual Starfleet formality. The moment\
