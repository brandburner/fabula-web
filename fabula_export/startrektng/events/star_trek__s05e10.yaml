  title: Alexander rejects Worf’s authority
  description: 'In the transporter room, Worf’s strained reunion with his estranged
    son Alexander—brought aboard by Helena—collapses when the boy abruptly declares
    he will not return to the *Enterprise*. The tense handshake and Alexander’s defiant
    refusal expose the unhealed rift between them, forcing Worf to confront the failure
    of his Klingon parenting and the boy’s rejection of his legacy. Helena’s guilt-ridden
    silence confirms this is not a temporary visit, escalating Worf’s conflict between
    his duty to his son and the Soliton wave crisis. The moment underscores the personal
    stakes of Worf’s mission, as his struggle to connect with Alexander mirrors the
    broader crisis: both demand urgent resolution, but neither yields easily. The
    scene ends with Worf’s unanswered question hanging in the air, leaving his emotional
    paralysis and the boy’s defiance as unresolved tensions.'
