    and Alexander, respectively. The lab is engulfed in flames, and the ship''s torpedoes
    fire in the background, signaling the crew''s simultaneous battle against the
    wave and the immediate threat of the fire. Worf''s focus is split between the
    mission-critical escape and his son''s safety, while Riker''s leadership ensures
    they stay on course. The scene underscores the duality of the crisis: the ship''s
    survival and the personal stakes of Worf''s relationship with Alexander. The urgency
    of the escape mirrors the broader tension of the Soliton wave threat, reinforcing
    the high-pressure environment where every action has consequences for both the
    crew and the mission.'
