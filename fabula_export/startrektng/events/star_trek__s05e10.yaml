    global_id: ger_object_af37139069fe
  - object_uuid: ger_object_780d0c66a9c0
    description_of_involvement: 'The Observation Lounge Soliton Demonstration Console
      is referenced indirectly as the source of the data Geordi and Data analyze post-explosion.
      While not physically present on the bridge, its role in the event is critical:
      the console’s earlier display of the Soliton wave’s unstable dissipation at
