    \ point, carrying the stolen trilithium resin. Their progress is abruptly halted\
    \ when Kelsey notices the ladder rungs above them have been deliberately severed—burnt\
    \ and melted as if cut by a torch. This discovery confirms Picard’s sabotage efforts,\
    \ forcing Kelsey to abandon their planned route. The moment escalates tension\
    \ by revealing Picard’s proactive resistance and the terrorists’ vulnerability\
    \ to his countermeasures. Kelsey’s reaction—her face darkening with realization—signals\
    \ a shift from confidence to heightened paranoia, as she now must adapt her strategy\
    \ under the threat of further ambushes. The sabotage also underscores the high-stakes\
    \ cat-and-mouse dynamic between Picard and the terrorists, where every move by\
    \ one side provokes a counter by the other.\n  "
