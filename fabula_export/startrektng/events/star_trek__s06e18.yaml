  title: Picard sacrifices jacket to evade Satler
  description: 'Trapped in the Jefferies Tube with Satler closing in behind him and
    the baryon sweep advancing ahead, Picard makes a split-second tactical decision.
    He removes his jacket, leaves it draped over a manhole he’s cut into the floor,
    then slips through the opening to escape. Satler, pursuing relentlessly, finds
    the jacket and pauses to investigate—only to be caught in the baryon sweep as
    it surges through the tube. The sweep kills her instantly, her scream echoing
    through the corridor as Picard flees, now jacketless but alive. The moment forces
    Picard to confront the unintended but direct consequence of his actions: Satler’s
    death, though not his intent, is a result of his choices. Meanwhile, in Main Engineering,
    Neil discovers the field diverter—critical for shielding the terrorists from the
    baryon sweep—has been sabotaged, leaving the group vulnerable. Kelsey, undeterred,
    orders the risky relocation of the trilithium resin, deepening the group’s desperation
    as the baryon sweep closes in. The event escalates the immediate threat, forces
    Picard into a moral reckoning, and exposes the terrorists’ growing vulnerability,
    all while raising the stakes for the impending arrival of the mysterious ship.'
