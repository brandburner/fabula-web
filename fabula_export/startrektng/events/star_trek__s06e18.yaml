- fabula_uuid: act_035cb4801377a15e
  number: 5
  summary: Kiros, having recaptured Picard, communicates with Kelsey, who instructs
    them to meet at an intersection. As they proceed, Kelsey ruthlessly executes Neil,
    who questions their continued movement, demonstrating her cold efficiency and
    disregard for her crew. Picard attempts to reason with Kelsey, revealing his true
    identity as Captain Jean-Luc Picard and offering himself as a hostage in exchange
    for leaving the trilithium. Kelsey dismisses his offer, confirming her motive
    is profit, not politics, and reiterates her confidence in their plan. Simultaneously,
    at Arkaria Base, Data detects the approaching scout ship—the terrorists' escape
    vessel—and observes Orton dropping the defense shields. Riker, seeing their window
    of opportunity, instructs Data, the only one unaffected by the hypersonic pulse,
    to stop the ship once everyone else is incapacitated. Beverly activates the modified
    VISOR, and the hypersonic pulse renders Orton and the Waiter unconscious, leaving
    Data free to move to the computer panel. Picard, Kiros, and Kelsey enter Ten Forward,
    where Picard has set a trap. He guides Kiros to step on a combination of white
    and black powders, triggering a small explosion that incapacitates Kiros. Picard
    then lunges at Kelsey, knocking the trilithium thermos from her grasp. As they
    fight, the baryon sweep breaches the wall of Ten Forward, forcing them to contend
    with both each other and the advancing energy field. Kelsey, regaining her weapon
    and the thermos, receives a signal from her ship and beams away, leaving Picard
    trapped and facing imminent destruction by the sweep. Desperate, Picard contacts
    Arkaria Base, urgently demanding the deactivation of the baryon sweep. Data, having
    reached the computer panel, successfully stops the sweep, saving Picard. The scout
    ship, carrying Kelsey and the trilithium, explodes in space. Picard reveals he
    surreptitiously removed the safety pin from the trilithium container during their
    struggle, ensuring its destruction. The Enterprise returns to normal operations.
    Beverly tends to Picard's injuries. Worf, much to the amusement of Riker, Beverly,
    and Troi, returns Picard's saddle, which he found in a maintenance locker, bringing
    a humorous and satisfying close to the perilous adventure.
