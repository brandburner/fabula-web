  title: Picard escalates confrontation with Kelsey
  description: 'Picard, now aware of Kelsey’s plan to steal the trilithium resin,
    intercepts her communication with Kiros and directly challenges her. He reveals
    his knowledge of the resin’s volatility and the catastrophic risks of moving it,
    escalating the conflict by declaring his willingness to destroy the *Enterprise*—and
    himself—rather than allow the theft. Kelsey, recognizing Picard’s true identity,
    dismisses his warnings and orders Pomet to hunt him down, while Picard arms himself
    with a Klingon crossbow from Worf’s quarters, preparing for a physical confrontation.
    The exchange marks a turning point: Picard’s moral resolve clashes with Kelsey’s
    ruthless pragmatism, raising the stakes as both sides prepare for violent escalation.
    The scene underscores Picard’s desperation and the terrorists’ recklessness, with
    the trilithium resin becoming a ticking time bomb for the *Enterprise*’s survival.'
