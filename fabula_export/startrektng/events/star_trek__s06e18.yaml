  title: Riker probes Picard’s unexplained absence
  description: "\n  At the Arkaria Base reception, Riker—trapped in Hutchinson’s endless\
    \ small talk—seizes an opportunity to escape by redirecting him toward Data, who\
    \ is relentlessly interrogating Orton about Arkarian naming conventions. The distraction\
    \ allows Riker to slip away and confront Geordi about Picard’s sudden disappearance.\
    \ Geordi, oblivious to the tension, casually explains that Picard returned to\
    \ the *Enterprise* to retrieve his saddle, implying he’s already left the base\
    \ entirely. Riker’s unease deepens as he realizes Picard’s absence isn’t just\
    \ a brief errand but a deliberate, unexplained departure during a crisis. The\
    \ revelation underscores the crew’s fractured communication and raises questions\
    \ about Picard’s motives—especially given the impending trilithium theft and the\
    \ mysterious ship’s arrival. Meanwhile, Orton’s abrupt exit with the Arkarian\
    \ Waiter hints at deeper conspiracies unfolding off-screen.\n  "
