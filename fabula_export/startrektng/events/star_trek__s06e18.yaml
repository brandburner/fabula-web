    with Orton by feigning negotiation before suddenly attacking him with a right
    cross. The abrupt violence forces Beverly to activate Geordi’s modified VISOR,
    emitting a hypersonic pulse that incapacitates the terrorists—except Data—while
    triggering Orton’s brutal retaliation against Riker. The scene shifts from psychological
    manipulation to physical confrontation, revealing the terrorists’ desperation
    and the crew’s reliance on split-second improvisation. Riker’s provocation serves
    as a distraction, allowing Beverly’s plan to unfold, but the backlash leaves him
    vulnerable to Orton’s violence, raising the stakes for the hostages’ survival.
    The baryon sweep’s progress in the background underscores the urgency of their
    situation, as the crew’s window to act narrows with each passing moment.
