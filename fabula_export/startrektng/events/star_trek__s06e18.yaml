      with Kiros. The location is tense and chaotic, with Neil and Pomet working urgently
      to prepare the resin for transport. The humming machinery and flickering consoles
      create an atmosphere of controlled urgency, but the absence of the field diverter—destroyed
      by Picard—adds a layer of danger. Kelsey’s dialogue reveals the desperation
      of the situation, as the baryon sweep looms and the terrorists must relocate
      to Ten Forward. Main Engineering is both a technical workspace and a pressure
      cooker of escalating conflict, where Picard’s interference threatens to unravel
      Kelsey’s plans.
    observed_atmosphere: Tense and urgent, with a sense of controlled chaos. The hum
      of machinery and flickering consoles create a backdrop of technical precision,
      but the absence of the field diverter adds a palpable sense of danger. The air
