  title: Picard confirms baryon sweep deadline
  description: 'In the Ready Room, Picard receives a comm from Administrator Orton
    confirming the one-hour countdown to the baryon sweep—a critical deadline that
    will trap him on the Enterprise if he doesn’t act. His clipped response (''Confirmed'')
    reveals his focus on the mission, while his polite but insincere acceptance of
    Hutchinson’s reception (''I''m looking forward to it'') underscores his diplomatic
    detachment. The moment highlights Picard’s strategic prioritization: the baryon
    sweep is an immediate threat, but the reception is a distraction he can’t afford.
    His quiet packing of the satchel suggests preparation for action, not social obligations,
    reinforcing his shift from Starfleet protocol to survival mode. The exchange with
    Orton also subtly foreshadows the impending crisis, as the sweep’s timing will
    later force Picard into desperate measures to stop the trilithium theft.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e18
  scene_sequence: 4
  sequence_in_scene: 7
  key_dialogue:
  - 'ORTON''S COM VOICE: Captain, if you''re on schedule, I''d like to confirm that
    we''ll begin the baryon sweep at fifteen hundred hours -- approximately one hour
    from now.'
  - 'PICARD: Confirmed.'
  - 'ORTON''S COM VOICE: Commander Hutchinson also wanted me to make sure that you''ll
    be able to attend his reception this afternoon.'
  - 'PICARD: Tell him... I''m looking forward to it.'
