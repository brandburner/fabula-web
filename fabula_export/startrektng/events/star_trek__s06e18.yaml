- fabula_uuid: act_83053c29f85c6300
  number: 4
  summary: The baryon sweep claims Satler, who is caught in the deadly energy field
    while pursuing Picard. Picard, now without his jacket, continues his escape through
    the corridors, acknowledging Satler's demise with a grim expression. In Main Engineering,
    Kelsey discovers the extent of Picard's sabotage; the field diverter is fused
    beyond repair, leaving them vulnerable to the approaching baryon sweep. She makes
    the critical decision to relocate the trilithium resin to Ten Forward, the last
    section of the ship to be swept, despite Neil's protests about the unit's portability.
    Pomet, emerging from the Jefferies Tube, reports Satler's death and presents Kelsey
    with Picard's Starfleet combadge, revealing "Mott's" true identity and the formidable
    opponent they face. Picard, having retrieved Klingon weapons from Worf's quarters,
    uses Devor's communicator to taunt Kelsey. He asserts his knowledge of their escape
    ship and his intention to be on it, escalating their cat-and-mouse game. Kelsey,
    in turn, warns him against interfering, threatening to destroy the Enterprise.
    Picard defiantly states his preference for destroying the ship over allowing the
    trilithium to fall into terrorist hands, confirming his unwavering resolve. He
    then conducts an experiment with chemical powders, preparing a new trap. Simultaneously,
    at Arkaria Base, Beverly completes the modifications to Geordi's VISOR. Riker,
    after a brief discussion with Troi, decides to create a distraction. He confronts
    Orton, then delivers a powerful punch, sending Orton sprawling. As Riker grapples
    with the Waiter, Beverly activates the VISOR, emitting a brief burst of light.
    The hypersonic pulse incapacitates everyone in the room, except for Data, who
    remains unaffected. Meanwhile, Pomet, searching for Picard, is ambushed. Picard,
    concealed in a corridor, fires a crossbow bolt tipped with a tranquilizing agent,
    incapacitating Pomet. However, as Picard moves to disarm Pomet, Kiros appears,
    holding Picard at weapon-point, once again capturing the Captain and ending the
    act on a cliffhanger.
