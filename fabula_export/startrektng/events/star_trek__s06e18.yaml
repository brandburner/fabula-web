    trap by leaving his jacket over a manhole, forcing Satler to trigger the baryon
    sweep and die. Meanwhile, in Main Engineering, Pomet reveals Satler’s death to
    Kelsey and hands her Picard’s Starfleet combadge, exposing ‘Mott the barber’ as
    a Starfleet operative. This revelation escalates the terrorists’ urgency and forces
    Picard into a more precarious position, as his true identity is now compromised.
    The discovery of the combadge shifts the power dynamic, making Kelsey and her
    team realize they’re facing a far more dangerous adversary than initially thought.
    The scene also highlights the terrorists’ desperation as they prepare to relocate
    the trilithium resin despite the looming baryon sweep, raising the stakes for
    Picard’s mission.
