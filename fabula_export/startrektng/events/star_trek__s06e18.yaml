  object_involvements:
  - object_uuid: ger_object_12af14643431
    description_of_involvement: The alien communicator is the primary device through
      which the confrontation between Picard and Kelsey unfolds. Picard uses it to
      intercept Kelsey’s transmission to Kiros, revealing his knowledge of her plan
      and escalating the conflict. The communicator serves as a bridge between the
      two locations—Worf’s quarters and Main Engineering—allowing Picard to challenge
      Kelsey directly. Its squawking alert draws Picard’s attention, and his use of
      it to confront Kelsey marks a turning point in the scene, shifting the dynamic
      from covert observation to direct confrontation. The communicator’s role is
      critical in raising the stakes and accelerating the narrative.
    status_before_event: In Picard’s pocket, active and tuned to Kelsey’s frequency.
      It is functional and ready for use, allowing him to monitor her communications.
    status_after_event: Returned to Picard’s pocket after the confrontation, but its
      use has triggered a chain of events that escalate the conflict. The communicator
      remains a tool for communication but is now a symbol of the direct challenge
      issued to Kelsey.
    global_id: ger_object_12af14643431
  - object_uuid: ger_object_95fdfcfa2e9c
    description_of_involvement: The Main Engineering Field Diverter is referenced
      indirectly in this event through Kelsey’s dialogue, where she accuses Picard
      of damaging it. The diverter’s destruction is a critical plot point, as it removes
      the terrorists’ primary safeguard against the baryon sweep and forces them to
      accelerate their plans. Picard’s sabotage of the diverter earlier in the scene
      is a tactical move to disrupt their operation, but it also raises the stakes
      by exposing the *Enterprise* to greater danger. The diverter’s absence is a
      looming threat in this exchange, as Kelsey and Picard both recognize the consequences
      of its loss.
    status_before_event: Functional and in place in Main Engineering, providing protection
      against the baryon sweep and stabilizing the trilithium resin extraction.
    status_after_event: Destroyed by Picard earlier in the scene, leaving the terrorists
      vulnerable to the baryon sweep and forcing them to relocate to Ten Forward.
    global_id: ger_object_95fdfcfa2e9c
  - object_uuid: ger_object_32af00fb59e0
    description_of_involvement: The trilithium resin is the central macguffin of this
      event, serving as both the object of the terrorists’ theft and the catalyst
      for Picard’s confrontation with Kelsey. Its volatility is highlighted as a catastrophic
      risk, with Picard warning that moving it could destroy the *Enterprise*. Kelsey
      dismisses his warnings, but the resin’s presence looms over the entire exchange,
      symbolizing the high stakes of the conflict. Its extraction and planned transport
      to Ten Forward drive the urgency of the scene, as both sides recognize the destructive
      potential it holds.
    status_before_event: Secure within the *Enterprise*’s engine core, stabilized
      by the field diverter in Main Engineering. Its volatility is contained but not
      eliminated, making it a ticking time bomb.
    status_after_event: Prepped for transport in a thermos, with Neil and Pomet preparing
      to move it to Ten Forward. The resin remains a volatile and dangerous cargo,
      now in the hands of terrorists who are willing to risk its instability for their
      own gain.
    global_id: ger_object_32af00fb59e0
  - object_uuid: ger_object_c04c056a64aa
    description_of_involvement: The Klingon arrows complement the crossbow as Picard’s
      chosen weapons for the confrontation. He grabs a set alongside the crossbow,
      chambering them as he prepares to leave Worf’s quarters. The arrows are sharp,
      sturdy, and ready for battle, reflecting the urgency and lethality of the situation.
      Their inclusion underscores the seriousness of Picard’s intent—he is no longer
      relying on words or strategy alone but is prepared to use deadly force if necessary.
      The arrows serve as a physical manifestation of his resolve and the high stakes
      of the conflict.
    status_before_event: Stored in Worf’s quarters alongside the crossbow, part of
      his Klingon weaponry. They are functional and ready for use but inactive until
      Picard takes them.
    status_after_event: In Picard’s possession, chambered in the crossbow. They are
      now active ammunition, ready to be used in the confrontation with the terrorists.
    global_id: ger_object_c04c056a64aa
  location_involvements:
