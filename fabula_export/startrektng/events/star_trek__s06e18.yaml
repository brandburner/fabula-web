  title: Picard sabotages diverter to escape pursuit
  description: With the baryon sweep advancing through the *Enterprise* and Satler
    closing in, Picard calculates his only viable option is to create chaos. He deliberately
    sabotages a field diverter in Main Engineering, triggering alarms and releasing
    gas to obscure his movements. As the system fails and warnings blare, he knocks
    Satler aside, destroys the diverter with a phaser, and flees into a Jefferies
    Tube. The sabotage not only buys him time but also escalates the immediate threat—trapping
    him between Satler’s pursuit and the deadly energy field. The act underscores
    Picard’s willingness to bend Starfleet protocols when survival demands it, while
    the Jefferies Tube becomes a claustrophobic battleground where his next move will
    determine whether he survives the baryon sweep or becomes another casualty of
    the terrorists’ theft.
