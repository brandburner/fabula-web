- fabula_uuid: cand_evt_scene_a74078e2e27b7615_02
  global_id: null
  title: Picard disguised as barber under guard
  description: 'In the hijacked *Enterprise* engineering bay, Picard—still disguised
    as ''Mott the barber''—is brought in at gunpoint by Kiros and placed under Satler’s
    watchful eye. Kelsey, the ruthless terrorist leader, interrogates him briefly
    but dismisses his cover story as harmless, assigning Satler to guard him while
    Kiros searches for the missing Devor. The scene reveals the terrorists’ urgent
    timeline: they must extract trilithium resin from the engine core before the baryon
    sweep hits in thirty minutes. Picard, now a captive observer, subtly assesses
    their operations, noting the field diverter’s role in protecting the resin. His
    presence shifts the power dynamic—Kelsey underestimates him, but his knowledge
    of the ship and the stakes (trilithium theft) positions him to exploit their vulnerabilities
    later. The exchange underscores Kelsey’s paranoia and the crew’s desperation,
    while Picard’s meek act masks his strategic advantage: he’s now inside their operation,
    gathering intel for his counterplay.'
