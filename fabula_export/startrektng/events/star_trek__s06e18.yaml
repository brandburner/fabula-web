- fabula_uuid: cand_evt_scene_56ac957db9074f5b_03
  global_id: null
  title: Picard grants Worf’s request over Geordi’s
  description: 'On the Bridge during the final moments of evacuation, Picard must
    authorize the baryon sweep while fielding urgent requests from Worf and Geordi.
    Worf, prioritizing security, asks to skip the Arkaria Base reception—Picard grants
    it immediately, citing operational necessity. Geordi, concerned about the ship’s
    elevated baryon particle levels, requests time to install additional field diverters,
    but Picard dismisses him abruptly, noting Worf ‘beat you to it.’ The exchange
    exposes Picard’s uneven favoritism: Worf’s Klingon pragmatism aligns with Picard’s
    tactical mindset, while Geordi’s technical caution is sidelined. Worf’s satisfaction
    and Geordi’s quiet resentment underscore a deeper fracture in the crew’s cohesion,
    where Picard’s leadership is now visibly skewed toward those who mirror his urgency
    over those who question it. The moment also foreshadows Geordi’s later marginalization
    in the hostage crisis, where his expertise becomes critical yet undervalued.'
