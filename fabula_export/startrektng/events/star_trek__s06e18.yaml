- fabula_uuid: act_2245df4a3732d2c5
  number: 2
  summary: At Arkaria Base, the reception continues, with Data persistently engaging
    Orton in small talk, much to Orton's and Riker's exasperation. Riker, seeking
    an escape from Hutchinson's relentless chatter, redirects him to Data, leaving
    Orton and Riker to briefly commiserate. Geordi, meanwhile, detects an unusual
    energy reading emanating from a table, prompting his suspicion. The Arkarian Waiter
    and Orton, displaying increasing nervousness, attempt to dissuade Geordi from
    investigating. Riker notices the escalating tension. Suddenly, the Waiter and
    Orton reveal their true colors, drawing hidden weapons and initiating an attack.
    Riker dives for cover, while Geordi is incapacitated by a phaser blast. Commander
    Hutchinson, attempting to intervene, is killed by Orton. The remaining crew members
    are quickly taken hostage, leaving Riker and Data to exchange grim looks, trapped
    and without immediate recourse. Concurrently, on the Enterprise, Picard drags
    the unconscious Devor to Sickbay. He discovers Devor's communicator, which crackles
    to life with Kelsey's voice. Picard overhears Kelsey instructing Kiros to find
    Devor and then meet in Main Engineering, revealing the terrorists' coordinated
    plan and their focus on a specific location on the ship. Picard, using Devor's
    laser-torch, attempts to interrogate the now-reawakened Devor, who defiantly asserts
    Picard's Starfleet principles prevent him from killing. Picard, unfazed, hyposprays
    Devor into unconsciousness, confirming his resolve to act. As Picard cautiously
    navigates the darkened corridors, he is ambushed and captured by Kiros, who holds
    him at weapon-point as he attempts to open a Turbolift hatch, further isolating
    Picard and placing him directly in the terrorists' control.
