  title: Riker’s last-resort gambit executes
  description: "\n  With the Arkaria Base crew held hostage and a hostile ship closing\
    \ in, Riker—battered from failed negotiations—orchestrates a desperate countermeasure.\
    \ Beverly Crusher modifies Geordi’s VISOR into a hypersonic weapon, and Riker\
    \ orders Data to remain unaffected while the rest of the crew is incapacitated.\
    \ As Beverly activates the device, the room collapses: Orton, the Waiter, and\
    \ even Troi drop unconscious, leaving Data as the sole operative. The stakes escalate\
    \ as Data rushes to the computer panel to intercept the incoming vessel, fulfilling\
    \ Riker’s contingency plan. The moment underscores the crew’s vulnerability, the\
    \ fragility of human resilience, and the high cost of Riker’s tactical shift from\
    \ diplomacy to calculated risk. The baryon sweep’s looming threat adds urgency,\
    \ forcing Data to act with unerring precision while the rest of the crew lies\
    \ defenseless.\n  "
