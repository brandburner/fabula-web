    description_of_involvement: Picard’s transporter controls are the physical manifestation
      of his desperation and the ship’s failing systems. His fingers move over the
      panels with practiced urgency, each command a plea for the machine to obey one
      last time. The controls, however, are as doomed as the *Enterprise* itself—they
      flicker, respond sluggishly, and then die entirely as the computer’s shutdown
      sequence takes hold. The transporter controls are not just a tool in this moment;
      they are a betrayal. They represent the limits of Picard’s authority, the fragility
      of Starfleet’s technology, and the cruel irony that the very systems designed
      to save lives have now stranded him. Their failure forces Picard to confront
      the reality that he is no longer in control, and that his next move must be
      made without the crutch of advanced machinery.
    status_before_event: Flickering but responsive—Picard’s commands briefly energize
      the transporter pads, and the console lights pulse with activity. The hum of
      the transporter builds, offering a sliver of hope before the inevitable collapse.
    status_after_event: Dead. The panels are dark, the transporter pads inert, and
      the room is silent. The controls are now just inert metal and glass, their purpose
      fulfilled in failure.
