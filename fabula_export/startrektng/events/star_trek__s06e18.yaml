    global_id: ger_object_8c4d056f5e46
  - object_uuid: ger_object_f10a61b9b19b
    description_of_involvement: "\n        The Alien Phaser is the catalyst for the\
      \ violent escalation in the reception. Concealed in the food cart, it remains\
