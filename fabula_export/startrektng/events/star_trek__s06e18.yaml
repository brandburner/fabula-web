  key_dialogue: &id027
  - 'KELSEY: Give me the trilithium.'
  - 'NEIL: ((panting)) How... how much farther do we have to go?'
  - 'KELSEY: Not far. (looks at thermos) With all the modifications you made to this
    unit, will we have any trouble removing the trilithium?'
  - 'NEIL: No... you just remove the control rod and then drain the unit... there
    shouldn''t be any problem.'
  - 'KELSEY: That''s all I wanted to know.'
  - 'KELSEY: ((to Picard)) Well... not as clever as you thought. Where''s Pomet?'
  - 'KIROS: He shot him with some kind of arrow.'
  - 'PICARD: He''s not dead.'
  - 'KELSEY: Well, he will be soon. The baryon sweep''s nearly here and we don''t
    have time to go back for him.'
  - 'KIROS: What about Neil?'
  - 'KELSEY: The sweep got him. Let''s go.'
  - 'KELSEY: ((to Picard)) And you can lead, Mister Mott. That way if we come to any
    more of your little surprises, you''ll be sure to let us know.'
