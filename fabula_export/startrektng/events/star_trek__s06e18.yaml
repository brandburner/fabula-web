  title: Picard’s failed negotiation with Kelsey
  description: 'Picard attempts to manipulate Kelsey into abandoning the trilithium
    theft by offering himself as a hostage, but she reveals her mercenary motives
    and dismisses his appeal. The exchange exposes her tactical control over him,
    forcing him to comply with her demands—including opening Ten Forward’s door—while
    underscoring her ruthless pragmatism. The moment escalates the tension, as Kelsey’s
    refusal to negotiate leaves Picard with no leverage, reinforcing her dominance
    and the urgency of the baryon sweep deadline. The scene also clarifies her true
    objective: profit-driven theft, not ideological terrorism, making her a more calculating
    and dangerous antagonist. Picard’s failure to sway her sets up his subsequent
    desperation and the violent confrontation in Ten Forward.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e18
  scene_sequence: 31
  sequence_in_scene: 53
  key_dialogue:
  - 'PICARD: Kelsey -- perhaps we can work out a deal.'
  - 'KELSEY: You''re the only one who needs a deal, Mott.'
  - 'PICARD: My name''s not Mott. It''s Jean-Luc Picard.'
  - 'KELSEY: Captain Picard... this is all beginning to make sense...'
  - 'PICARD: Leave the trilithium here and take me with you. You can use me as a hostage
    instead of threatening -'
  - 'KELSEY: I''m not a terrorist Captain, and I don''t have a political agenda...
    But I know some people who do have agendas... and who are very interested in this
    little container.'
  - 'PICARD: Profit. This is all about profit.'
  - 'KELSEY: I prefer to think of it as commerce.'
