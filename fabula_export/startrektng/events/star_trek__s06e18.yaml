    description_of_involvement: |2-

      Starfleet is represented in this event through the actions of its officers—Riker, Troi, Data, and Beverly—who are held hostage by the terrorists. Their **loyalty to Starfleet's principles** drives their desperate countermeasure, even as they operate outside of formal protocols. The organization's **institutional values**—protecting lives, upholding the law, and defending against threats—are embodied in their willingness to take extreme risks to stop the terrorists. However, Starfleet's **bureaucratic constraints** (e.g., the baryon sweep's inevitability, the lack of reinforcements) also limit their options, forcing them into a high-stakes gambit. The event underscores the **tension between Starfleet's ideals and the harsh realities of survival** in the face of existential threats.
    active_representation: |2-

      Through the **collective action of its officers**, who act in defiance of the terrorists' control. Riker's leadership, Beverly's technical adaptation of the VISOR, and Data's precise execution of the plan all reflect Starfleet's **training, ingenuity, and resilience**. The organization is also represented by its **absence**—the lack of backup, the baryon sweep's inescapable timeline, and the terrorists' exploitation of Starfleet's protocols all highlight the **vulnerabilities** of the institution in this moment.
    power_dynamics: |2-

      Starfleet is **undermined and outmaneuvered** by the terrorists, who have exploited its systems and protocols to their advantage. However, the crew's countermeasure—though unorthodox—reasserts Starfleet's **adaptability and resourcefulness**. The organization's power is **fractured but not broken**, as Data's actions demonstrate the potential for Starfleet personnel to overcome even the most dire circumstances through **innovation and trust in one another**.
    organizational_goals:
    - Stop the terrorists from stealing the trilithium resin and escaping with the
      hostile ship
    - Protect the crew and the *Enterprise-D* from the baryon sweep's destruction
    - Uphold Starfleet's principles of justice and defense, even in the face of overwhelming
      odds
    influence_mechanisms:
    - Through the **skills and loyalty of its officers**, who act decisively despite
      the lack of formal support
    - Via **technological adaptation** (e.g., repurposing the VISOR as a weapon),
      demonstrating Starfleet's ability to innovate under pressure
    - By **leveraging institutional knowledge** (e.g., Data's understanding of Starfleet
      systems, Beverly's medical and technical expertise)
    - Through **unspoken trust** among the crew, enabling Riker to delegate critical
      tasks without hesitation
    institutional_impact: |2-

      This event highlights the **resilience of Starfleet's personnel** in the face of institutional vulnerabilities. While the organization's protocols and systems have been exploited by the terrorists, the crew's ability to **improvise and adapt** underscores the strength of Starfleet's **people over its processes**. The event also raises questions about **Starfleet's preparedness for asymmetric threats**, particularly those that exploit its trust in diplomatic engagements and technical protocols. The crew's success in this moment is a testament to their **training and camaraderie**, but it also exposes the **fragility of Starfleet's infrastructure** when faced with determined adversaries.
    internal_dynamics: |2-

      The event reveals **tensions between protocol and survival**, as the crew is forced to act outside of Starfleet's usual frameworks. There is also a **hierarchy of trust**—Riker's leadership is unquestioned, but the success of the plan depends on **individual initiative** (e.g., Beverly's technical skills, Data's precision). The lack of formal chain of command in this moment (e.g., no communication with Picard or the *Enterprise-D*) highlights the **isolation of the crew** and the **pressure on Riker to make life-or-death decisions** without support.
    global_id: ger_organization_73a4b614bde7
  - organization_uuid: ger_organization_768d01981bcc
    description_of_involvement: |2-

      Kelsey's Group is the **antagonistic force** driving the conflict in this event, with Orton and the Arkarian waiter acting as its representatives on the ground. Their goal is to **steal the trilithium resin** from the *Enterprise-D* and escape with the hostile ship before the baryon sweep destroys the saucer section. The group's **ruthless efficiency** is evident in their ability to exploit Starfleet's protocols, drop the defense shields, and hold the crew hostage. However, their plan is **undermined by the crew's desperation and ingenuity**, as the hypersonic gambit neutralizes their advantage. Kelsey's Group's involvement in this event is a **testament to their tactical prowess**, but also a **warning of their vulnerability** when faced with unexpected resistance.
    active_representation: |2-

      Through the **actions of Orton and the Arkarian waiter**, who enforce the group's objectives with violence and precision. Their **control over the computer panel** and their **vigilance in monitoring the crew** reflect Kelsey's Group's **discipline and coordination**. However, their **sudden incapacitation** by the hypersonic burst also highlights their **human limitations**—they are not invincible, and their plan can be disrupted by creative thinking.
    power_dynamics: |2-

      Kelsey's Group **dominates the immediate power dynamic**, using the threat of violence and the baryon sweep's deadline to pressure the crew into submission. However, their power is **temporary and fragile**, as the crew's countermeasure demonstrates. The group's reliance on **technical exploitation** (e.g., dropping the shields, bypassing security) is both their strength and their weakness—it makes them **vulnerable to countermeasures** that target their human operatives. The event underscores the **precarious nature of their control**, as their plan unravels in an instant.
    organizational_goals:
