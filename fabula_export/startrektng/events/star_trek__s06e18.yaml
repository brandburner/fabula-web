      end. The narrow metal walls amplify the tension, the flickering lights casting
      long shadows as Picard scrambles for his life. The tube’s confined space forces
      Satler into a fatal pause—her investigation of the jacket and the manhole below
      is her last mistake. The hum of the ship’s systems and the distant alarms create
      a sensory overload, heightening the stakes of the chase. The tube’s role in
      this event is both a corridor of escape and a death trap, its very design turning
      it into an instrument of Picard’s deception.
