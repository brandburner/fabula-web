  title: Kelsey executes Neil for mission security
  description: Kelsey and Neil emerge from the Jefferies Tube after transporting the
    trilithium thermos, with Neil visibly exhausted. Kelsey interrogates him about
    the modifications he made to the thermos, ensuring the trilithium extraction will
    proceed without complications. The moment Neil confirms the thermos is functional,
    Kelsey coldly executes him, demonstrating her ruthless pragmatism and the terrorists'
    willingness to eliminate even their own members if they become liabilities. The
    act is swift and calculated, reinforcing the high stakes of the mission and the
    terrorists' fanatical commitment to their goal. When Picard and Kiros arrive shortly
    after, Kelsey lies about Neil’s fate, blaming the baryon sweep, and forces Picard
    to lead the group as a human shield. This brutal display underscores the escalating
    danger Picard faces and the terrorists' moral decay, while also foreshadowing
    the inevitable confrontation between Picard and Kelsey as the baryon sweep approaches.
