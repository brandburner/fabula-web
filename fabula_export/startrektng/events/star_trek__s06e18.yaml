- fabula_uuid: act_abb4d9471b51d234
  number: 3
  summary: 'The terrorists, now in control of Main Engineering, work to prepare the
    engine core for their true objective. Kelsey, Neil, Pomet, and Satler meticulously
    adjust equipment, with Kelsey displaying a calm yet demanding demeanor. Kiros
    brings Picard into Main Engineering, holding him at weapon-point. Picard, thinking
    quickly, adopts the persona of "Mott the barber," claiming he returned to the
    ship for his saddle and became lost. Kelsey, initially skeptical, assigns Satler
    to guard the seemingly harmless barber. Picard, under Satler''s lax watch, observes
    the terrorists'' operations. He reacts with dismay upon hearing Kelsey explicitly
    state their intention to steal trilithium resin, confirming his worst fears about
    the material''s potential as a weapon. Meanwhile, at Arkaria Base, the hostage
    situation persists. Riker, Troi, and Beverly discuss their limited options. Beverly
    tends to an unconscious Geordi, noting Hutchinson''s death. Data, ever analytical,
    proposes a daring counter-plan: modifying Geordi''s VISOR to generate a hypersonic
    pulse, capable of incapacitating everyone in the room. Riker agrees, instructing
    Beverly to make the adjustments discreetly. Back on the Enterprise, Picard, using
    the concealed laser-torch he took from Devor, subtly sabotages a field diverter.
    This triggers a cascade of events: vast quantities of gas flood Main Engineering,
    alarms blare, and the isolation door begins to close. Amidst the chaos, Picard
    knocks Satler aside, destroys the diverter, and narrowly escapes into a Jefferies
    Tube, with Satler in close pursuit. Picard scrambles through the tube, but his
    path is blocked by the advancing green sheet of the baryon sweep, trapping him
    between the deadly energy field and the pursuing Satler, intensifying the immediate
    danger and setting a ticking clock.'
