  title: Picard ambushes Kelsey in Ten Forward
  description: "\n  Picard lures Kiros into a trap in Ten Forward, triggering an explosion\
    \ that incapacitates her. He seizes the moment to attack Kelsey, but she recovers\
    \ and kicks him away, nearly securing the trilithium thermos. Their fight escalates\
    \ as the baryon sweep breaches the wall, forcing them into a desperate struggle.\
    \ Kelsey gains the upper hand, retrieves the thermos, and beams out with it—leaving\
    \ Picard trapped by the advancing sweep. With no escape, Picard urgently contacts\
    \ Arkaria Base to deactivate the sweep, unaware that Kelsey’s theft has already\
    \ succeeded. The scene underscores Picard’s resourcefulness and Kelsey’s ruthlessness,\
    \ while the baryon sweep’s sudden intrusion heightens the urgency of the trilithium\
    \ theft and the looming extraction by the mysterious ship.\n  "
