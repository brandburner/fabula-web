  global_id: null
  title: Terrorists ambush Arkaria reception
  description: "\n  The Arkaria Base reception, already tense with Geordi’s discovery\
    \ of anomalous energy readings, erupts into violence when the Waiter—revealed\
    \ as a terrorist—draws a concealed phaser and fires at Riker, narrowly missing.\
    \ Orton, the base administrator, immediately joins the attack, shoving Geordi\
    \ aside and pulling his own weapon. The Waiter shoots Geordi in the chest, knocking\
    \ him unconscious, then turns on Hutchinson, who lunges at him. Orton fires, killing\
    \ Hutchinson instantly. The room freezes as Orton and the Waiter—now armed and\
    \ in control—force the remaining crew (Riker, Data, Troi, and others) into submission\
    \ at phaser-point. The ambush marks the first overt act of aggression by the trilithium\
    \ thieves, escalating the conflict from covert sabotage to direct confrontation.\
    \ Riker and Data exchange a silent, desperate glance, realizing they are now hostages\
    \ with no immediate means of escape. The scene ends with the terrorists securing\
    \ the room, setting up the high-stakes hostage situation that will dominate the\
    \ next act.\n  "
