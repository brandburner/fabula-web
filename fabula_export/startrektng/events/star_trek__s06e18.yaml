  global_id: null
  title: Picard authorizes sweep despite Worf’s warning
  description: On the Bridge, Picard is immediately besieged by Geordi and Worf as
    the ship prepares for evacuation. Geordi warns that the Enterprise’s high baryon
    particle levels may require a stronger-than-normal sweep, risking system overloads,
    while Worf urgently requests authorization to disable command functions during
    the sweep. Picard, under extreme time pressure, prioritizes Worf’s security concerns
    over Geordi’s engineering warnings, authorizing the sweep despite the potential
    risks. The moment underscores Picard’s tactical focus on immediate threats—here,
    the baryon sweep—while revealing his tendency to defer to Worf’s security instincts
    over Geordi’s technical expertise. Just as Picard exits to take Orton’s call,
    Worf’s request to skip the reception (granted) contrasts with Geordi’s denied
    request, exposing a subtle but telling hierarchy in Picard’s leadership. The scene
    crystallizes the crew’s fractured priorities and Picard’s burden of balancing
    competing crises under duress.
