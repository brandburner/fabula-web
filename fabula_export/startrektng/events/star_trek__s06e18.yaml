  global_id: null
  title: Riker executes the VISOR gambit
  description: With the Arkaria Base crew held hostage and a hostile ship closing
    in, Riker—battered from failed negotiations—orchestrates a high-stakes countermeasure.
    Data confirms the ship’s approach and the shields’ collapse, signaling the terrorists’
    extraction plan is underway. Riker, recognizing the moment as their last chance,
    orders Beverly to activate a modified VISOR device, which emits a hypersonic burst
    incapacitating everyone in the room—except Data, whose android physiology renders
    him immune. As the crew collapses around him, Data springs into action, rushing
    to the computer panel to intercept the incoming vessel. The scene crystallizes
    Riker’s shift from diplomacy to calculated risk, exposing the crew’s vulnerability
    and the desperate measures required to stop the trilithium theft. The gambit hinges
    on Data’s precision and the crew’s trust in his abilities, underscoring the high
    stakes of the confrontation and the fragility of their position.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e18
  scene_sequence: 30
  sequence_in_scene: 51
  key_dialogue:
  - 'DATA: That was a perimeter warning from the Remmler Array. A small ship is approaching.'
  - 'RIKER: This has to be what they''ve been waiting for.'
  - 'RIKER: Data, you''re going to be the only one unaffected by the hypersonic burst.
    As soon as everyone''s unconscious, you''ve got to get to the computer panel and
    stop that ship somehow.'
  - 'DATA: I will try, sir.'
