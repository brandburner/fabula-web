- fabula_uuid: cand_evt_scene_fdb0c79de89b7c75_01
  global_id: null
  title: Baryon sweep engulfs saucer section
  description: "\n  The baryon sweep—a catastrophic wave of destabilized subatomic\
    \ particles—reaches the *Enterprise*’s saucer section, triggering violent structural\
    \ tremors that force Picard and the crew into immediate, life-or-death action.\
    \ The expanding wave destabilizes the ship’s integrity, forcing Picard to abandon\
    \ his ambush in Sickbay and prioritize survival over confrontation. The escalating\
    \ threat compresses time, raising stakes as the crew must now contend with both\
    \ the baryon sweep *and* the stolen trilithium, while the looming arrival of the\
    \ mysterious ship looms as an unseen deadline. The event underscores the dual\
    \ crises: the immediate physical threat of the sweep and the strategic threat\
    \ of the trilithium theft, both of which demand Picard’s attention in real time.\
    \ The tremors and structural failures serve as a ticking clock, forcing the crew\
    \ to adapt their plans mid-crisis.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e18
  scene_sequence: 21
  sequence_in_scene: 40
  key_dialogue: &id021
  - 'COMPUTER VOICE: "Warning. Baryon particle levels critical. Structural integrity
    failing in saucer section."'
  - 'PICARD: "Damn it!" (muttered, as he braces against a bulkhead)'
  is_flashback: false
  location_uuid: ger_location_4f4db4195817
  theme_uuids: []
  arc_uuids:
  - ger_conflictarc_4b46e5bda096
  participations: []
  object_involvements:
  - object_uuid: ger_object_86e00b4468d8
    description_of_involvement: "\n        The baryon sweep is the primary catastrophic\
      \ force in this event, manifesting as energy beams that strike the *Enterprise*’s\
      \ saucer section. These beams are a direct result of the Remmler Array’s destabilized\
      \ subatomic particles, which have surged uncontrollably toward the saucer. The\
      \ sweep’s impact is immediate and devastating: it triggers violent structural\
      \ tremors, buckles hull plating, and threatens the ship’s integrity. The sweep\
      \ is not just a physical threat but also a narrative tipping point, forcing\
      \ Picard to abandon his ambush plan and prioritize survival. Its role is both\
      \ destructive and revelatory, exposing the crew’s vulnerability and the fragility\
      \ of their strategic position.\n      "
    status_before_event: "\n        The baryon sweep was previously contained within\
      \ the Remmler Array nacelles, where it had already claimed the life of Satler\
      \ in a Jefferies tube. Its intensity was building, but it had not yet reached\
      \ the saucer section. The sweep was described as a 'green swath' creeping along\
      \ the nacelles, signaling the trilithium thieves’ advance and the impending\
      \ danger.\n      "
    status_after_event: "\n        The baryon sweep has now fully engaged the saucer\
      \ section, causing irreversible structural damage. The tremors and energy beams\
      \ have compromised the saucer’s integrity, making it a high-risk zone for the\
      \ crew. The sweep’s advance is relentless, and its next phase would likely involve\
      \ breaching internal systems, further endangering those aboard.\n      "
    global_id: ger_object_86e00b4468d8
  location_involvements:
  - location_uuid: ger_location_4f4db4195817
    description_of_involvement: "\n        The *Enterprise*’s saucer section is the\
      \ epicenter of this event, as it bears the full brunt of the baryon sweep’s\
      \ energy beams. The aft end of the saucer is struck directly, causing violent\
      \ structural tremors that ripple through the ship. This location shifts from\
      \ a strategic stronghold—where Picard had planned his ambush—to a battleground\
      \ for survival. The saucer’s integrity is visibly compromised, with hull plating\
      \ buckling and the ship’s systems overwhelmed. The location’s role is both practical\
      \ (the crew’s last refuge) and symbolic (a microcosm of the crew’s desperation).\n\
      \      "
    observed_atmosphere: "\n        Chaotic and desperate, with the saucer section\
      \ shaking violently under the assault. The atmosphere is one of urgency and\
      \ fear, as the crew realizes the ship’s structural failure is imminent. Alarms\
      \ blare, and the tremors create a sense of disorientation and helplessness.\n\
      \      "
    functional_role: Last refuge for the crew and primary battleground against the
      baryon sweep’s destruction.
    symbolic_significance: "\n        Represents the crew’s fragile hold on survival.\
      \ The saucer, once a symbol of exploration and security, is now a vulnerable\
      \ target, embodying the crew’s struggle against uncontrollable forces. Its failure\
      \ would signify the end of their mission and, potentially, their lives.\n  \
      \    "
    access_restrictions: Open to all crew members, but evacuation protocols are now
      in effect due to the structural danger.
    key_environmental_details:
    - Buckling hull plating under the energy beams’ impact
    - Violent tremors shaking the decks and bulkheads
    - Red alert lights flashing and alarms blaring
    global_id: ger_location_4f4db4195817
  - location_uuid: ger_location_ec2e2ba7e526
    description_of_involvement: "\n        The Remmler Array nacelles are the origin\
      \ point of the baryon sweep, but their role in this event is indirect: they\
      \ serve as the conduit through which the energy beams travel to strike the saucer\
      \ section. While the nacelles themselves are not the primary location of this\
      \ event, their connection to the saucer is critical. The green swath of the\
      \ sweep, visible along the nacelles, signals the advance of the threat and foreshadows\
      \ the impending disaster. The nacelles’ involvement underscores the ship’s vulnerability,\
      \ as the sweep’s path from the nacelles to the saucer is now irreversible.\n\
      \      "
    observed_atmosphere: Tense and foreboding, with the green swath of the sweep casting
      an eerie glow over the nacelles. The atmosphere is one of impending doom, as
      the crew watches the sweep’s advance on their screens.
    functional_role: Conduit for the baryon sweep’s destructive energy, linking the
      nacelles to the saucer section.
    symbolic_significance: "\n        Represents the inevitability of the crisis.\
      \ The nacelles, once a symbol of the *Enterprise*’s power, are now the source\
      \ of its destruction. Their role in this event highlights the ship’s fragility\
      \ and the crew’s loss of control over the situation.\n      "
    access_restrictions: Restricted to essential personnel due to the high risk of
      exposure to the baryon sweep.
    key_environmental_details:
    - The green swath of the sweep creeping along the nacelles
    - Violent tremors transmitted through the ship’s structure from the saucer section
    global_id: ger_location_ec2e2ba7e526
