- fabula_uuid: cand_evt_scene_56ac957db9074f5b_01
  global_id: null
  title: Picard prioritizes crises under time pressure
  description: "\n  On the Bridge of the evacuating *Enterprise*, Picard faces a high-stakes\
    \ decision as Geordi and Worf compete for his attention. Geordi warns that elevated\
    \ baryon particle levels—due to the ship's heavy warp usage—could force the Remmler\
    \ Array to use a stronger sweep beam, risking overloads in the field diverters\
    \ protecting critical systems. He requests additional diverters, but installation\
    \ will take 20 minutes. Meanwhile, Worf interrupts with an urgent message from\
    \ Administrator Orton, requesting Picard’s authorization to disable command functions\
    \ during the sweep. Picard, acutely aware of the ticking clock, must weigh Geordi’s\
    \ engineering concerns against Worf’s security priorities. He authorizes the command\
    \ disablement immediately, deferring Geordi’s request, and exits to take Orton’s\
    \ call. The moment underscores the crew’s fractured focus amid overlapping crises\
    \ and Picard’s burden of maintaining cohesion under duress. His prioritization—security\
    \ first, engineering second—reveals his strategic calculus: immediate threats\
    \ (Orton’s message) take precedence over long-term risks (baryon sweep complications).\
    \ The tension between Worf’s satisfaction and Geordi’s frustration hints at deeper\
    \ fractures in the crew’s unity, while Picard’s exhaustion and reluctance to attend\
    \ the reception foreshadow his growing isolation as the mission’s pressures mount.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e18
  scene_sequence: 3
  sequence_in_scene: 4
  key_dialogue:
  - 'GEORDI: I just finished...'
  - 'WORF: Request permission...'
  - 'GEORDI: ((to Worf)) After you...'
  - 'WORF: ((to Geordi)) No sir. I believe you spoke first.'
  - 'PICARD: We''re running out of time, gentlemen. Mister Worf?'
  - 'GEORDI: We''ve logged more warp hours in five years than most ships do in ten,
    so our baryon particle levels are pretty high. I''m a little worried that when
    the Remmler Array starts sweeping the ship it might have to use a stronger beam
    than normal to clear out all the radiation.'
  - 'PICARD: ((understanding)) And that might overload the field diverters protecting
    our key systems. How long until the new ones are in place?'
  - 'GEORDI: I''d say another twenty minutes.'
  - 'PICARD: ((concerned)) Additional units?'
  - 'PICARD: Computer, disable all command functions in thirty minutes. Authorization:
    Picard gamma-six-zero-seven-three.'
  - 'WORF: ((off console)) Incoming message, Captain. It''s the station administrator,
    Mister Orton.'
  - 'PICARD: In my Ready Room.'
  - 'WORF: Sir. Request permission to be excused from Commander Hutchinson''s... reception.'
  - 'PICARD: Permission granted. I only wish I could excuse myself as well.'
  - 'GEORDI: Captain, permission to -'
  - 'PICARD: Sorry, Mister LaForge... I can''t excuse the entire senior staff. Worf
    beat you to it.'
