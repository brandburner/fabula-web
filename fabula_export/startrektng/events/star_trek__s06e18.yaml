    \ trilithium resin from the engine core, working against the clock before the\
    \ baryon sweep hits the compartment in 30 minutes. Picard, now under Satler’s\
    \ guard, observes their operations while Kelsey pressures Pomet to accelerate\
    \ the extraction timeline. The revelation of the trilithium theft’s urgency forces\
    \ Picard to reassess the stakes: the terrorists aren’t just sabotaging the ship—they’re\
