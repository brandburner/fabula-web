      \ action—extracting, stabilizing, and securing the resin—demonstrates their\
      \ operational cohesion, even as internal fractures (Neil’s hesitation) begin\
      \ to show.\n      "
    power_dynamics: "\n        Kelsey exercises absolute authority over the group,\
