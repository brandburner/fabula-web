    to disarm him. The shot is precise but non-lethal, and Pomet collapses after a
    brief struggle, his weapon slipping from his grip. Picard moves to secure the
    weapon, but Kiros—who has silently approached from behind—presses a phaser to
    the back of Picard’s head, forcing him to surrender. The moment marks a brutal
    reversal: Picard’s tactical advantage evaporates, and his vulnerability is now
    absolute. The confrontation underscores the escalating stakes of the trilithium
    theft, as Picard’s ability to stop the terrorists hinges on his ability to escape
    Kiros’s control before the baryon sweep completes. The scene also highlights Picard’s
    willingness to use lethal force when necessary, a departure from his usual Starfleet
    principles, while Kiros’s ambush reveals the terrorists’ relentless coordination
    and Picard’s dwindling options for evasion or counterattack.'
