    description_of_involvement: The baryon sweep is the silent, relentless force that
      executes Picard’s trap, incinerating Satler as she investigates the jacket.
      Its presence looms over the entire scene, a ticking clock that drives the terrorists’
      desperation and Picard’s tactical decisions. The sweep’s arrival in the Jefferies
      Tube is sudden and lethal, underscoring the high stakes of the operation and
      the fragility of the ship’s structure. Its role in this event is both a narrative
      device and a physical threat, accelerating the collapse of the terrorists’ plan
      and forcing Picard to act with lethal efficiency.
    status_before_event: Advancing through the ship’s systems, its green sheet flickering
      ominously as it approaches the Jefferies Tube.
    status_after_event: Having claimed Satler’s life, it continues its inexorable
      march toward Main Engineering, where the terrorists scramble to relocate the
      trilithium before it arrives.
    global_id: ger_object_804f8557ab28
  - object_uuid: ger_object_86e00b4468d8
    description_of_involvement: The manhole cut into the Jefferies Tube floor is Picard’s
      improvised trap, a narrow opening just wide enough for him to escape but too
      small for Satler to avoid the baryon sweep. The jagged edges and dark void below
      symbolize the desperation of Picard’s situation—he is forced to use the ship’s
      own infrastructure against his pursuers. The manhole’s presence is a testament
      to Picard’s resourcefulness, turning a maintenance access point into a lethal
      snare. Its discovery by Satler is her undoing, as she pauses to investigate
      the jacket and is caught in the sweep’s path.
    status_before_event: Freshly cut by Picard’s plasma tool, concealed beneath his
      jacket, its purpose unknown to Satler until the moment of her death.
    status_after_event: Exposed and empty, a silent witness to Satler’s fate and a
      reminder of Picard’s willingness to use the ship’s environment as a weapon.
