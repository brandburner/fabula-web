    description_of_involvement: Kelsey’s Group is the primary antagonist force in
      this event, fully embodied by Kelsey, Neil, Pomet, Satler, and Kiros as they
      work to extract trilithium resin from the *Enterprise*’s engine core. Their
      actions are driven by a mix of desperation, technical skill, and ruthless efficiency,
      as they race against the baryon sweep’s 30-minute deadline. The group’s influence
      is exerted through their control of Main Engineering, the use of weapons to
      subdue captives (Picard), and their manipulation of the ship’s systems to bypass
      Starfleet protocols. Their presence in this event underscores their role as
      a disciplined but paranoid unit, willing to eliminate threats (e.g., Devor’s
      potential looting) to achieve their goals.
    active_representation: Through the collective action of its members, with Kelsey
      as the central figure directing the operation.
    power_dynamics: Exercising authority over the *Enterprise*’s systems and personnel,
      operating under the constraint of the baryon sweep’s deadline. Their power is
      derived from their technical skills, weapons, and the element of surprise, but
      it is also fragile, as evidenced by their paranoia and desperation.
    organizational_goals:
    - Secure the trilithium resin extraction before the baryon sweep sterilizes the
      compartment
    - Maintain control over the operation and neutralize any internal or external
      threats (e.g., Picard, Devor’s absence)
    influence_mechanisms:
    - Technical expertise in bypassing Starfleet systems and extracting volatile substances
    - Weapons and physical intimidation to enforce compliance and control captives
    - Strict hierarchical structure under Kelsey’s leadership, with clear roles for
      each member
    - Exploitation of the baryon sweep as a tool to pressure the crew and secure their
      escape
    institutional_impact: Their actions directly challenge Starfleet’s authority and
      expose the vulnerabilities of isolated starships. The theft of trilithium resin
      has broader implications for interstellar security, as the substance could be
      used to create catastrophic weapons or destabilize power dynamics in the region.
      The group’s ruthlessness also reflects a broader trend of piracy and sabotage
      in the Federation’s outer regions.
    internal_dynamics: Tensions emerge due to Devor’s absence, which Kelsey interprets
      as potential disloyalty or recklessness. The group’s cohesion is tested by the
      time pressure and the need to trust one another in a high-stakes environment.
      Kelsey’s paranoia and impatience create a sense of unease, as she struggles
      to balance her authority with the need to keep her team focused. The presence
      of an unexpected captive (Picard) adds another layer of instability, as the
      group must decide how to handle him without derailing the mission.
