  key_dialogue:
  - |-
    TROI: They haven't tried to communicate with the outside.
    RIKER: No demands, no political statements, no theft... they must want something.
  - |-
    DATA: It is possible that Geordi upset their timetable when he saw the hidden weapons.
    RIKER: Orton could be improvising... maybe he didn't plan to take us hostage this early... so now he doesn't know what to do...
  - |-
    DATA: Perhaps we can use the VISOR as a weapon. If the optical transducer were modified, it may be possible to generate a hypersonic pulse.
    BEVERLY: A hypersonic pulse would overload the audio receptors of everyone in the room. It would cause immediate unconsciousness.
    RIKER: Can you make the adjustments to the VISOR by yourself? It's going to look suspicious if both of you go over there.
    BEVERLY: I'll try... Geordi may have to help me through some of it.
