  title: Picard Improvises a Disguise in Engineering
  description: "\n  Picard, under duress from Kiros, is forced into Main Engineering\
    \ where Kelsey’s terrorists are preparing to extract trilithium resin from the\
    \ engine core. With the baryon sweep approaching in thirty minutes, the terrorists\
    \ work frantically to disable containment overrides and secure the resin before\
    \ the deadly energy field reaches the compartment. Kelsey, suspicious of Picard’s\
    \ presence, interrogates him, but Picard quickly improvises a disguise as 'Mott\
    \ the barber,' claiming he returned to the Enterprise to retrieve his saddle.\
    \ The ruse buys him time to observe the terrorists’ operations while Satler is\
    \ assigned to guard him. Picard’s reaction to the mention of trilithium resin\
    \ reveals his alarm, but he remains composed, using the opportunity to gather\
    \ critical intelligence about the terrorists’ timeline and objectives. The scene\
    \ establishes a high-stakes standoff where Picard’s wit and resourcefulness are\
    \ tested against Kelsey’s ruthless efficiency and the looming baryon sweep.\n\
    \  "
