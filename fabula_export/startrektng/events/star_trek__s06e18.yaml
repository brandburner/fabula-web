acts:
- fabula_uuid: act_b0412ebe0a6ae489
  number: 1
  summary: The Enterprise undergoes a baryon sweep at the Remmler Array, necessitating
    a full crew evacuation. Captain Picard, seeking a moment of solitude, efficiently
    handles various crew concerns from Troi's schedule delays to Beverly's medical
    storage issues and Riker's auto-shutdown sequence. Data attempts small talk with
    Picard, practicing a new subroutine, prompting Picard to suggest observing Commander
    Hutchinson at the upcoming Arkaria Base reception. Geordi expresses concern about
    the high baryon particle levels and the need for additional field diverters, which
    Picard notes. Worf and Geordi seek permission to avoid the reception, with Worf
    succeeding. Picard, after confirming the sweep schedule with Administrator Orton,
    savors a brief, quiet moment on the empty Bridge. This peace shatters with the
    arrival of six "technicians" (Kelsey, Neil, Pomet, Devor, Satler, Kiros) who disrupt
    the calm with their noisy work. Picard, intending to attend the reception, claims
    he needs to retrieve his saddle from his quarters. On his return to the ship,
    he discovers an open ODN junction box. Devor, one of the technicians, confronts
    Picard, leading to a physical altercation. Picard incapacitates Devor and overhears
    Kelsey and Neil discussing bypassing a magnetic containment conduit, confirming
    his suspicions about their true intentions. He attempts to use the transporter
    to escape and alert others, but the baryon sweep begins, disabling the system
    and trapping him on the now silent, dark Enterprise. This act establishes the
    initial threat, Picard's isolation, and the immediate danger posed by the mysterious
    technicians.
  key_moments: []
