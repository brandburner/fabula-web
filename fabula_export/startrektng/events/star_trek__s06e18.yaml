  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: "\n        Starfleet is the implicit victim of Kelsey’s\
      \ group, its infrastructure hijacked and its assets stolen. The *Enterprise*’s\
      \ Main Engineering, once a symbol of Starfleet’s technological prowess, is now\
      \ a battleground for the terrorists’ heist. The extraction of the trilithium\
      \ resin represents a direct challenge to Starfleet’s authority and security,\
      \ while the baryon sweep’s impending destruction adds to the urgency of the\
      \ crew’s countermeasures.\n      "
    active_representation: "\n        Through the *Enterprise*’s compromised systems\
      \ and the forced-open panel behind the core, Starfleet is represented as a vulnerable\
      \ institution. Its protocols and defenses have been bypassed, and its resources\
      \ (the trilithium resin) are being exploited by external forces. Picard’s off-screen\
      \ presence (as Mott) hints at Starfleet’s efforts to regain control, but the\
      \ immediate scene focuses on the terrorists’ success.\n      "
    power_dynamics: "\n        Starfleet is in a reactive position, its authority\
      \ undermined by the terrorists’ intrusion. The *Enterprise*’s systems are hijacked,\
      \ and its crew is either evacuated or held hostage, leaving the ship’s resources\
      \ (like the trilithium) exposed to theft. The organization’s power is temporarily\
      \ neutralized, but the stolen resin becomes a catalyst for Picard’s counterattack.\n\
      \      "
    organizational_goals:
    - Protect the *Enterprise*’s assets (e.g., trilithium resin) from theft and sabotage,
      in line with Starfleet’s mission to safeguard its technology and personnel.
    - Regain control of Main Engineering and neutralize the terrorists’ threat before
      the baryon sweep destroys the ship.
    influence_mechanisms:
    - Through institutional protocols (e.g., evacuation orders, command disables)
      designed to limit the terrorists’ access and protect the crew.
    - Via off-screen efforts (e.g., Picard’s infiltration as Mott) to sabotage the
      heist and turn the tide against Kelsey’s group.
    - By leveraging the baryon sweep as a natural deterrent, forcing the terrorists
      to act quickly and increasing the risk of their operation.
    institutional_impact: "\n        The theft of the trilithium resin highlights\
      \ Starfleet’s vulnerabilities in isolated operations, particularly during evacuations\
      \ or crises like the baryon sweep. The incident may lead to reviews of security\
      \ protocols and the deployment of additional safeguards for high-value assets\
      \ like trilithium.\n      "
    internal_dynamics: "\n        The crew’s fragmentation—some evacuated, others\
      \ held hostage—creates a power vacuum that the terrorists exploit. Picard’s\
      \ lone-wolf approach (disguised as Mott) reflects Starfleet’s decentralized\
      \ response, with individual officers taking initiative in the absence of centralized\
      \ command.\n      "
    global_id: ger_organization_73a4b614bde7
  - organization_uuid: ger_organization_768d01981bcc
    description_of_involvement: "\n        Kelsey’s terrorist group is the active\
      \ force behind the trilithium heist, their ruthless efficiency on full display\
      \ as Neil stabilizes the resin and Kelsey casually removes the thermos. The\
      \ group’s hierarchy is reinforced through Kelsey’s dismissive authority, while\
      \ their operational urgency is underscored by the baryon sweep’s impending destruction\
      \ of the *Enterprise*. This moment highlights their internal tensions—Neil’s\
      \ caution vs. Kelsey’s brutality—and their external threat to Starfleet’s assets.\n\
      \      "
    active_representation: "\n        Through Kelsey’s leadership and Neil’s technical\
