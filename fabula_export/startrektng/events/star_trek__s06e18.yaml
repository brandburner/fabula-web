  object_involvements:
  - object_uuid: ger_object_86e00b4468d8
    description_of_involvement: The baryon sweep is the event’s most lethal and inescapable
      force, a surging wave of destabilized subatomic particles generated by the Remmler
      Array. It breaches the wall of Ten Forward, trapping Picard and Kelsey in a
      deadly race against time. The sweep’s advance is relentless, its green glow
      casting an ominous light over the struggle, and its proximity forces both combatants
      to fight with heightened urgency. The sweep’s arrival marks a turning point,
      as Kelsey uses its distraction to reclaim the trilithium thermos and beam away,
      leaving Picard to face its deadly effects. Ultimately, the sweep’s deactivation
      by Data saves Picard’s life, but its presence looms as a constant reminder of
      the high stakes and the fragility of survival aboard the *Enterprise*.
    status_before_event: Advancing through the *Enterprise*’s nacelles, moving inexorably
      toward the saucer section, with Satler’s death already confirmed in a Jefferies
      tube.
    status_after_event: Deactivated by Data at Picard’s urgent request, sparing Picard
      and the remaining crew from certain death, though its residual effects linger
      in the disorientation of Riker and others.
    global_id: ger_object_86e00b4468d8
  - object_uuid: ger_object_a4e26a9b76a8
    description_of_involvement: Kelsey’s communicator is a compact device that transmits
      her voice and taunts to Picard during the struggle in Ten Forward. It beeps
      and flashes as she prepares to beam away, serving as a reminder of her triumph
      and Picard’s impending doom. The communicator also facilitates coordination
      between Kelsey and her team, though its use here is purely personal—her final
      words to Picard are laced with malice and victory. Its role is symbolic, representing
      the terrorists’ ability to communicate and evade capture, even in the face of
      Starfleet’s best efforts. The communicator’s beep marks the moment of Kelsey’s
      escape, a stark contrast to the silence that follows as Picard is left to face
      the baryon sweep alone.
    status_before_event: Attached to Kelsey’s person, used to coordinate with her
