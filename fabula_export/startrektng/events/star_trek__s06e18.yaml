  title: Picard Disguised in Main Engineering
  description: "\n  In the hijacked *Enterprise* Main Engineering, Picard—disguised\
    \ as a harmless barber named 'Mott'—is brought in by Kiros after being discovered\
    \ on Deck 7. The terrorists, led by Kelsey, are in the final stages of extracting\
    \ trilithium resin from the engine core, working against the clock before the\
    \ baryon sweep hits the compartment in 30 minutes. Picard, now under Satler’s\
    \ guard, observes their operations while Kelsey pressures Pomet to accelerate\
    \ the extraction timeline. The revelation of the trilithium theft’s urgency forces\
    \ Picard to reassess the stakes: the terrorists aren’t just sabotaging the ship—they’re\
    \ racing to secure the resin before the baryon sweep destroys it. This moment\
    \ marks a critical shift in Picard’s understanding of the threat, compelling him\
    \ to act decisively to stop the theft and prevent the ship’s destruction. The\
    \ scene also establishes Kelsey’s ruthless efficiency and the terrorists’ desperation,\
    \ heightening the tension as the clock ticks toward the mysterious ship’s extraction.\n\
    \  "
