- fabula_uuid: cand_evt_scene_6519d6a4e6d26329_01
  global_id: null
  title: Picard eavesdrops on trilithium theft plans
  description: Undercover as the barber 'Mott,' Picard infiltrates Main Engineering
    while the terrorists—Kelsey, Neil, and Pomet—prepare to extract volatile trilithium
    resin from the Enterprise’s engine core. Posing as a clueless civilian, he feigns
    ignorance while covertly listening to their discussions, confirming their intent
    to steal the resin for a catastrophic weapon. The tension escalates as Satler,
    assigned to guard him, grows suspicious of his presence. Picard’s eavesdropping
    reveals the terrorists’ precise timeline and the deadly consequences of their
    plan, validating his earlier suspicions about the resin’s potential. The scene
    underscores Picard’s resourcefulness in gathering intelligence under duress, while
    the terrorists’ ruthless efficiency foreshadows their willingness to eliminate
    obstacles—including him—without hesitation. The baryon sweep’s looming threat
    adds urgency, forcing Picard to balance his covert mission with the need to act
    before the ship is destroyed or the resin is stolen.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e18
  scene_sequence: 15
  sequence_in_scene: 25
  key_dialogue: &id009
  - 'KELSEY: "The resin’s volatile, but we’ve got the containment fields. Once we’ve
    got it, we’ll need to move fast—before Starfleet locks down the sector."'
  - 'NEIL: "What about the baryon sweep? If it hits before we’re done—"'
  - 'KELSEY: "Then we die. But we’re not going to die. We’ve got a window, and we’re
    taking it."'
  - 'PICARD (as Mott): "Uh, pardon me, but—what’s all this about? I was just told
    to wait here."'
  - 'SATLER: "You don’t need to know. Just stay out of the way."'
