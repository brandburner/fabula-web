- fabula_uuid: cand_evt_scene_58eac4727796330d_01
  global_id: null
  title: Riker provokes Orton to trigger VISOR pulse
  description: Riker, aware of Beverly and Geordi’s plan to use the modified VISOR
    as a weapon, deliberately provokes Orton into a physical confrontation to create
    the distraction needed for Beverly to activate the hypersonic pulse. After a brief
    verbal exchange—where Riker feigns negotiation only to land a surprise punch—Orton
    retaliates violently, while the Waiter restrains Riker. Meanwhile, Beverly triggers
    the VISOR, emitting a brief burst of light that incapacitates the terrorists (except
    Data), setting the stage for the crew’s escape. The scene highlights Riker’s calculated
    risk-taking, the crew’s reliance on split-second coordination, and the escalating
    brutality of their captors, all under the looming threat of the baryon sweep.
    The physical confrontation also underscores the terrorists’ fragility—Orton’s
    overreaction reveals his lack of control, while Riker’s gambit exposes the crew’s
    tactical ingenuity in high-pressure situations.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e18
  scene_sequence: 26
  sequence_in_scene: 45
  key_dialogue:
  - 'RIKER: How is he, Doctor?'
  - 'BEVERLY: He''s in a lot of pain, but he should be fine. He needs some water.'
  - 'BEVERLY: ((sotto, quick)) We''re almost ready. But when we set the VISOR to emit
    the hypersonic pulse, there''ll be a short burst of light. We need a distraction.'
  - 'TROI: ((sotto)) They need a distraction.'
  - 'RIKER: I think I can keep Orton busy for a few seconds.'
  - 'TROI: I don''t think Orton''s in a talking mood, Wil.'
  - 'RIKER: You just have to know how to talk to him.'
  - 'RIKER: Orton, I think we should discuss this situation.'
  - 'ORTON: There''s nothing to discuss. Sit down.'
  - 'RIKER: I think there''s a lot to discuss. Can''t we be reasonable here?'
  - 'ORTON: I''m not interested in hearing your hostage negotiation tactics, Commander.'
  - 'RIKER: It won''t hurt you to listen, will it?'
  - 'ORTON: ((bored)) All right.'
  - 'ORTON: Well, Commander... Here''s my response.'
