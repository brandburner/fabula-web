  - character_uuid: ger_agent_1a086b595c33
    emotional_state: Confident initially, then alarmed as he realizes the severity
      of the threat, followed by shock and resignation in his final moments.
    goals:
    - Defuse the situation through diplomacy or authority
    - Protect the crew, even at personal risk
    what_happened: |2-

