  - 'RIKER: This has to be what they''ve been waiting for.'
  - 'RIKER: Data, you''re going to be the only one unaffected by the hypersonic burst.
    As soon as everyone''s unconscious, you''ve got to get to the computer panel and
    stop that ship somehow.'
  - 'DATA: I will try, sir.'
