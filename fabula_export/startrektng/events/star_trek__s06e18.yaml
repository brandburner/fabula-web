- fabula_uuid: cand_evt_scene_b6cb700f4cb5cc36_01
  global_id: null
  title: Geordi detects sabotage at reception
  description: "\n  During the Arkaria Base reception, Geordi La Forge’s VISOR picks\
    \ up an anomalous energy signature from a food table—a subtle but critical clue\
    \ that the base is compromised. As he investigates, Orton and the Waiter (both\
    \ conspirators) escalate from passive obstruction to violent action. The Waiter\
    \ draws a hidden phaser and fires at Riker, narrowly missing him, while Orton\
    \ shoves Geordi aside and draws his own weapon. Hutchinson, attempting to intervene,\
    \ is shot and killed. The sudden attack forces the crew into a hostage situation,\
    \ marking the shift from diplomatic tension to active conflict. Geordi is knocked\
    \ unconscious, leaving Riker and Data trapped with no clear escape. The event\
    \ exposes the terrorists’ hidden technology and their willingness to kill, raising\
    \ the stakes for the crew’s survival and the protection of the trilithium resin.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e18
  scene_sequence: 14
  sequence_in_scene: 22
  key_dialogue:
  - 'GEORDI: Uh... I don''t know. I''m getting a weird energy reading from your table.'
  - 'WAITER: I''m sure it''s nothing serious. Perhaps the heating element under the
    tray is malfunctioning.'
  - 'ORTON: ((smiles)) I''m sure we can handle this, whatever it is, Commander. There''s
    no need to concern yourself.'
  - 'WAITER: Orton, now!'
  - 'ORTON: Stay right where you are.'
