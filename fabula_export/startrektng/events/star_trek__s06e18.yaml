    - By leveraging the baryon sweep’s urgency, creating a ticking clock that forces
      the team to act without hesitation.
    institutional_impact: "\n        The heist undermines Starfleet’s security protocols,\
      \ exposing vulnerabilities in the *Enterprise*’s defenses. The stolen trilithium\
      \ could fund further terrorist operations, while the group’s internal dynamics\
      \ foreshadow its eventual collapse (e.g., Neil’s execution).\n      "
    internal_dynamics: "\n        A growing rift between Neil’s cautious professionalism\
