  global_id: null
  title: Picard confronts Devor over sabotage
  description: 'Picard returns to the Enterprise in civilian clothes, only to discover
    an open ODN junction box with severed fiber-optic cables—a clear sign of sabotage.
    When Devor, one of the technical crew, confronts him with a laser-welder, Picard
    immediately suspects foul play. Instead of backing down, he uses the saddle he’s
    carrying as an improvised weapon, disarming and incapacitating Devor with a precise
    strike to the carotid artery. The confrontation confirms Picard’s suspicions that
    the technicians are not who they claim to be, and their actions are part of a
    coordinated effort to sabotage the ship’s evacuation. As the ship’s systems continue
    to shut down, Picard overhears Kelsey and Neil discussing their plan to bypass
    the magnetic containment conduit, revealing the terrorists’ true objective: stealing
    trilithium resin. The event marks a critical turning point, escalating the stakes
    and forcing Picard into a more aggressive, resourceful approach to protect the
    Enterprise and its crew.'
