  title: Crusher Resigns Against Picard’s Protest
  description: |2-

      Beverly Crusher stands on the transporter platform, suitcases packed and the cursed candle lit, preparing to leave the *Enterprise*—and Starfleet—permanently. Picard bursts in, brandishing a PADD with her resignation, demanding an explanation. Beverly dismisses his objections with cold finality, invoking her family’s ‘proud tradition’ as justification for abandoning her career. When Picard hesitates to countermand her order, she forces the transporter chief’s hand, dematerializing before Picard can stop her. The scene underscores the irrevocability of her choice: her defiance isn’t just professional severance but a symbolic rejection of her past life, leaving Picard powerless to intervene. The candle’s presence—her tether to Ronin—hints that her departure is less about healing and more about surrender to the ghost’s influence. The moment marks a narrative turning point, where Beverly’s transformation from Starfleet officer to Howard heiress is complete, and Picard’s authority is exposed as hollow in the face of supernatural forces.
