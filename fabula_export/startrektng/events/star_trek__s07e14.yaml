  title: Beverly confesses the dream’s intimacy
  description: 'In Ten Forward, Beverly confides in Troi about a vivid, physically
    charged dream where an unseen presence—Ronin—touched her with unsettling familiarity.
    She describes the sensation of hands moving across her skin, a whispered voice
    calling her name, and the distinct impression of a ring on one of the hands, all
    details that mirror her grandmother’s journal entries. The dream’s erotic intensity
    lingers with her, distracting her from work and leaving her preoccupied. Troi’s
    lighthearted response masks the underlying tension: Beverly’s fixation on the
    dream reveals Ronin’s growing psychological hold, blurring the line between memory,
    fantasy, and supernatural influence. The moment underscores the ghost’s ability
    to invade her waking life, foreshadowing deeper entanglement and the threat to
    her autonomy.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e14
  scene_sequence: 4
  sequence_in_scene: 8
  key_dialogue:
  - 'TROI: You dreamt you were in bed with someone?'
  - 'BEVERLY: Not exactly. I was in bed... but there wasn’t another person in the
    dream... it was more like a presence... A pair of hands. They were moving across
    my skin... Like a caress? Yes. And I heard a voice... a man... he whispered my
    name... It was almost like I knew him... or more like he knew me. He knew exactly
    how I liked to be touched... It was the most... physical dream I’ve ever had.
    The sensations were so real... And extremely... arousing.'
  - 'BEVERLY: I think I even felt a ring on one of the hands... when it touched my
    shoulder... and my neck. I wonder if I’ll have another dream tonight...'
