  location_involvements:
  - location_uuid: ger_location_5e773350528d
    description_of_involvement: The Caldos Colony Cemetery serves as the battleground
      for Beverly's confrontation with Ronin, its rows of tombstones and hedge-lined
      clearing bathed in stormy night. The grave becomes the epicenter of the supernatural
      battle, with Felisa's coffin materializing atop it and her reanimated corpse
      attacking Data and Geordi. The cemetery's peaceful daytime funeral setting contrasts
      sharply with its nighttime horror, the overcast skies and distant thunder amplifying
      the tension. Gravestones cast long shadows, and the wind howls through the hedge,
      creating an oppressive atmosphere.
    observed_atmosphere: Tension-filled with crackling plasma energy, distant thunder,
      and howling wind. The cemetery's peaceful daytime funeral setting is twisted
      into a nightmarish battleground, where the dead rise and the living fight for
      survival. The stormy night amplifies the horror, with flickering plasma light
      casting eerie shadows.
    functional_role: Battleground for Beverly's confrontation with Ronin; symbolic
      of the generational curse and the family's entanglement with the supernatural.
    symbolic_significance: Represents the cyclical nature of death and the inescapable
      pull of the Howard family's curse. The cemetery is both a place of rest and
      a site of violent possession, embodying the tension between life and death.
    access_restrictions: Open to the living (Beverly, Data, Geordi) but invaded by
      the dead (Felisa's corpse, Ronin). The hedge and tombstones create natural barriers,
      but the supernatural threat transcends physical limits.
    key_environmental_details:
    - Stormy night with overcast skies and distant thunder
    - Flickering green plasma energy illuminating the graves
    - Wind howling through the hedge, rustling tombstones
    - Felisa's coffin materializing atop her grave, lid askew
    - Scorched earth and plasma burns marking the battleground
    global_id: ger_location_5e773350528d
