- fabula_uuid: cand_evt_scene_5102c07291eafccb_01
  global_id: null
  title: Ronin’s spectral bargain for survival
  description: 'Beverly returns to her grandmother’s storm-lashed home, calling out
    to Ronin in a moment of vulnerability. He materializes before her, his corporeal
    form flickering with instability, and reveals his dependence on the candle’s flame—a
    lifeline he manipulates her into retrieving. While deflecting her grief over Quint’s
    death, Ronin weaves a seductive proposal of eternal bondage, exploiting her emotional
    turmoil to secure his own survival. The scene hinges on a high-stakes power dynamic:
    Beverly’s moral dilemma between compassion and self-preservation, and Ronin’s
    calculated desperation to escape his spectral curse. His sudden disappearance
    leaves her emotionally ensnared, her focus now entirely on him, foreshadowing
    her growing vulnerability to his influence and the supernatural threat to the
    *Enterprise* crew. The exchange establishes Ronin’s manipulative tactics and Beverly’s
    susceptibility to his supernatural allure, setting the stage for her eventual
    entrapment in his centuries-old curse.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e14
  scene_sequence: 7
  sequence_in_scene: 12
  key_dialogue:
  - 'BEVERLY: Ronin... I have to talk to you... are you here?'
  - 'RONIN: I''m here, Beverly... did you miss me?'
  - 'BEVERLY: Yes.... But... I must talk to you. There''s been an accident...'
  - 'RONIN: I know. Quint is dead.'
  - 'BEVERLY: Do you know what happened? What was he trying to do?'
  - 'RONIN: Beverly... there''s something more important we have to talk about...'
  - 'RONIN: It''s not easy for me to take corporeal form... I can''t do it for long.
    I want you to light the candle...'
  - 'BEVERLY: Quint said it was your home... is that true?'
  - 'RONIN: Yes... if I''m away from it for too long, I begin to weaken. That''s why
    the women in your family have always kept the candle lit.'
  - 'RONIN: Then we''ll be together... always.'
