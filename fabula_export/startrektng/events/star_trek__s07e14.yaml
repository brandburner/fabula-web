  title: Beverly destroys Ronin’s candle
  description: Beverly arrives at the cemetery to find Data and Geordi investigating
    Felisa’s grave, only for Felisa’s corpse to violently reanimate under Ronin’s
    control. The possessed body attacks Data and Geordi, deactivating Data and leaving
    Geordi critically injured. Beverly confronts Ronin, exposing his parasitic nature
    as an anaphasic lifeform dependent on organic hosts and the candle’s plasma flame.
    Ronin retaliates by threatening Geordi’s life, forcing Beverly to feign surrender
    before seizing Geordi’s phaser and destroying the candle—Ronin’s power source.
    In a final confrontation, Beverly orders Riker to shut down plasma conduits, neutralizing
    Ronin’s energy link and forcing him to vanish. The scene escalates the supernatural
    stakes, reveals Ronin’s vulnerability, and solidifies Beverly’s agency in defying
    his manipulation, though her exhaustion hints at the emotional toll of her actions.
    The destruction of the candle marks a turning point, severing Ronin’s connection
    to the physical world and shifting the conflict’s balance toward Beverly’s control.
