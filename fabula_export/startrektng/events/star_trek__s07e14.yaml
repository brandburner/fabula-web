  title: Quint’s Cursed Warning Escalates
  description: Beverly’s quiet reflection on her grandmother’s legacy is violently
    disrupted when Ned Quint, the Howard family’s long-time caretaker, bursts into
    the home and attempts to extinguish the sacred candle—a centuries-old heirloom
    tied to the family’s supernatural curse. Quint’s aggressive intervention reveals
    his role as the candle’s reluctant guardian, warning Beverly of the deadly consequences
    of keeping it lit. His ominous exit—after Beverly defiantly refuses to surrender
    the candle—escalates the supernatural threat, foreshadowing Ronin’s growing influence
    over her. The confrontation underscores Beverly’s stubbornness and emotional attachment
    to her family’s past, while Quint’s warnings serve as a critical but ignored cautionary
    moment. The scene deepens the curse’s looming danger, setting up Beverly’s inevitable
    entanglement with Ronin and the candle’s supernatural power.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e14
  scene_sequence: 2
  sequence_in_scene: 5
  key_dialogue:
  - 'QUINT: I wouldn''t get so high and mighty with me, Beverly Howard Crusher. I''ve
    spent more time here in the past five years than you have in the past twenty.'
  - 'QUINT: That candle has brought nothing but misery and bad luck to your grandmother.
    And if you had a lick of sense, you''d listen to me right now and do away with
    it.'
  - 'QUINT: Howard women... always the same stubborn fools... I wash my hands of it
    now. You stay in this house and keep that damned candle and I won''t be responsible
    for what happens.'
