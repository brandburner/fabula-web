  title: Quint warns Beverly at Felisa’s grave
  description: Beverly arrives at her grandmother’s grave to find Ned Quint tending
    it, his demeanor a mix of vulnerability and urgency. After an initial exchange
    where Beverly extends kindness—offering him continued employment at the house—Quint
    abruptly shifts, warning her in increasingly frantic terms about the supernatural
    dangers of the house. He links Felisa’s death to a vengeful ghost, the malfunctioning
    weather, and a cursed candle, his warnings escalating as the storm above them
    grows more violent. Beverly, though skeptical, is visibly unsettled by his intensity
    and the sudden appearance of camellias on the grave—Felisa’s signature flower—before
    the storm forces her to flee. The scene functions as a turning point, where Quint’s
    desperate pleas and the unnatural storm serve as foreshadowing for the supernatural
    threat Beverly will soon face, while also deepening the mystery of Felisa’s death
    and the ghost’s influence over the Howard family. The tension between Beverly’s
    scientific skepticism and the mounting evidence of the supernatural creates a
    pivotal moment of conflict, where her choice to ignore or heed Quint’s warnings
    will determine her fate and the safety of the Enterprise crew.
