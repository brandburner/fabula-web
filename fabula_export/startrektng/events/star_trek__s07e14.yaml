  global_id: null
  title: Beverly destroys Ronin’s power source
  description: In the cemetery at night, Beverly arrives to find Data and Geordi incapacitated
    by Felisa Howard’s reanimated corpse, now possessed by Ronin. Beverly confronts
    Ronin, who threatens Geordi’s life to force her compliance. She feigns surrender,
    placing the candle—a plasma-based receptacle for Ronin’s energy—near his feet,
    then seizes Geordi’s phaser and vaporizes the candle, severing Ronin’s power link.
    When Ronin lunges at her, she fires a sustained phaser burst, disintegrating him
    in a flash of energy. The act frees her from his supernatural manipulation but
    leaves her visibly shaken, immediately tending to the wounded Data and Geordi.
    The scene underscores Beverly’s resolve to break the curse, her moral conflict
    over violence, and the lingering trauma of her choices—all while asserting control
    over the supernatural threat through decisive action.
