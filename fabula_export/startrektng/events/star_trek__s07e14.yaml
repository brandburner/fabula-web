  scene_sequence: 12
  sequence_in_scene: 20
  key_dialogue:
  - 'BEVERLY: "I''m so glad you''re here... right now I can''t imagine what life was
    like before I met you."'
  - 'RONIN: "We''re nearly merged now... as two candles join to form a single light...
    so we will flourish as one."'
  - 'PICARD: "I think I liked you the way you were before, Beverly."'
  - 'RONIN: "You can''t do that. Leave her alone..."'
  - 'RONIN: "Beverly... come with me."'
  - 'BEVERLY: "No... no, I can''t just let him die."'
