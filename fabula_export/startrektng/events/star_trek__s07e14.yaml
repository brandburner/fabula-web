  title: Picard’s interrogation triggers Ronin’s violence
  description: "\n  Picard’s arrival at the Howard home interrupts a deeply intimate\
    \ moment between Beverly and Ronin, where the ghost’s anaphasic energy has already\
    \ begun merging with her. Beverly’s physical transformation—her eyes shifting\
    \ to emerald green—signals Ronin’s supernatural influence, but Picard’s relentless\
    \ questioning about Ronin’s origins and the anaphasic energy tied to Felisa Howard’s\
    \ coffin exposes the ghost’s vulnerability. Ronin’s initial defiance turns to\
    \ rage when Picard orders the exhumation of Felisa’s body, revealing the coffin\
    \ as the source of the energy. In a violent outburst, Ronin vanishes and retaliates\
    \ with a green plasma strike, incapacitating Picard and severing his psychic link\
    \ to Beverly. The attack forces Beverly to choose between her loyalty to Picard\
    \ and her supernatural bond with Ronin, ultimately breaking her free from Ronin’s\
    \ immediate control. The event escalates the conflict, exposing Ronin’s desperation\
    \ to protect his host and his willingness to harm others to maintain his hold\
    \ over Beverly.\n  "
