      to fill in Felisa’s grave are practical tools that underscore the colony’s low-tech,
      traditional approach to burial. Their wooden handles and broad metal scoops
      are suited to the rustic setting, contrasting with the advanced technology of
      the *Enterprise* crew. The shovels’ methodical, rhythmic motion as they heap
      dirt over the coffin completes the burial ritual, their clinking sounds and
      the thud of earth against wood creating a somber, almost meditative atmosphere.
      They serve as a reminder of the colony’s self-sufficiency and cultural identity.
