- fabula_uuid: cand_evt_scene_24e8593031871fef_01
  global_id: null
  title: Beverly confronts Quint over the candle
  description: In the Howard family home, Beverly shares intimate memories of her
    grandmother with Deanna Troi, revealing the emotional weight of her mother’s absence
    and the symbolic significance of the family’s heirloom candle. Troi’s empathic
    intuition allows her to recognize Beverly’s need for privacy, leaving her alone
    to confront the ghosts of her past. The moment is interrupted when Ned Quint,
    Felisa Howard’s caretaker, violently enters the home and attempts to extinguish
    the candle, claiming it is cursed. Beverly defends the heirloom, refusing to surrender
    it, and Quint warns her of the candle’s generational curse before storming out.
    The confrontation escalates the supernatural tension, foreshadowing the curse’s
    deadly consequences and Beverly’s defiance of its warnings. The scene deepens
    the thematic resonance between legacy, loss, and the unknown forces haunting the
    Howard estate, while also setting up Quint’s later sabotage and the candle’s role
    in Ronin’s influence over Beverly.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e14
  scene_sequence: 2
  sequence_in_scene: 4
  key_dialogue:
  - 'TROI: Your grandmother had remarkable green eyes...'
  - 'BEVERLY: Every woman in the Howard family has had green eyes... except for my
    mother and me.'
  - 'TROI: How well do you remember your mother?'
  - 'BEVERLY: Not very well... I was so young when she died. I just have the image
    of her face... and I can hear the sound of her voice, but I can''t tell you anything
    specific she ever said... Mostly, I remember Nana.'
  - 'TROI: That''s beautiful... what is it?'
  - 'BEVERLY: A family heirloom... it''s been in the Howard clan for at least twenty
    generations. It''s supposed to symbolize the ''enduring spirit of the Howards,
    wherever they may go -- a shining light to guide their fortune.'' Nana always
    kept it lit. I can remember sitting in here listening to ghost stories with only
    this candle burning...'
  - 'QUINT: I wouldn''t get so high and mighty with me, Beverly Howard Crusher. I''ve
    spent more time here in the past five years than you have in the past twenty.'
  - 'BEVERLY: What do you mean?'
  - 'QUINT: That candle has brought nothing but misery and bad luck to your grandmother.'
  - 'BEVERLY: Now listen, Mister Quint -- I don''t know what your relationship was
    with my grandmother. But this is my house now and these are my things.'
  - 'QUINT: I''m telling ya -- that candle has been a curse on your family for generations.
    And if you had a lick of sense, you''d listen to me right now and do away with
    it. Now give it to me.'
  - 'BEVERLY: This is a family heirloom and I intend to keep it. I would like you
    to leave my house. Now.'
  - 'QUINT: Howard women... always the same stubborn fools... I wash my hands of it
    now. You stay in this house and keep that damned candle and I won''t be responsible
    for what happens.'
