acts:
- fabula_uuid: act_f66707895fadfd85
  number: 1
  summary: Dr. Beverly Crusher attends her grandmother Felisa Howard's funeral on
    the Caldos Colony, delivering a heartfelt eulogy. During the service, a mysterious,
    pale man with striking green eyes throws a camellia onto the coffin, staring intensely
    at Beverly, sparking her curiosity. Following the funeral, Captain Picard agrees
    to delay the Enterprise's departure to assist the colony with malfunctioning weather
    control systems. Beverly returns to her grandmother's Scottish-style home, where
    she discovers Felisa's journal detailing a passionate, secret affair with a 34-year-old
    man named Ronin. She also finds and lights an ancient family heirloom candle.
    Ned Quint, Felisa's caretaker, confronts Beverly, attempting to extinguish the
    candle and warning her it brings misery and is a curse. Beverly dismisses his
    warnings, asserting her ownership of the house and its contents. Later, in her
    quarters, Beverly reads the journal and falls asleep. The candle's flame sputters
    to life on its own, and an unseen presence caresses her, whispering her name,
    leaving her breathless and shaken by the erotic dream.
  key_moments: []
  scene_numbers:
  - 1
  - 2
  - 3
- fabula_uuid: act_d8f3a26e643472ea
  number: 2
  summary: Beverly recounts her vivid, erotic dream to Deanna Troi, describing the
    physical sensations and the man's voice, acknowledging its profound effect on
    her. She mentions reading an erotic chapter in her grandmother's journal about
    Ronin, which she believes influenced the dream. Later, Beverly revisits the cemetery
    and finds Ned Quint tending Felisa's grave. Quint, more vulnerable now, reiterates
    his warnings about the house being haunted and the candle bringing the ghost,
    claiming the entity is causing the weather malfunctions. He urges Beverly not
    to light the candle or enter the house, fearing she will suffer the same fate
    as her grandmother. After Quint departs, Beverly discovers dozens of camellias
    strewn across Felisa's grave, which were not there before. A sudden, violent storm
    then breaks, forcing Beverly to flee. On the Enterprise bridge, the storm's severity
    prompts Picard to order a power transfer to stabilize the colony's weather systems.
    Beverly returns to her grandmother's home, finding it inexplicably filled with
    camellia flowers.
  key_moments: []
  scene_numbers:
  - 4
  - 5
- fabula_uuid: act_d5f0abb4af3a17cd
  number: 3
  summary: Inside the flower-filled Howard home, the door mysteriously shuts. Beverly
    calls out, initially suspecting Ned Quint, then confronts the unseen presence.
    A mirror rattles, then briefly reflects the image of the mysterious man from the
    funeral behind her. Beverly, shaken, demands the entity reveal itself. Ronin's
    seductive voice responds, confirming his identity as Felisa's lover and the presence
    from Beverly's dream, claiming he has returned for her. He seduces Beverly into
    a narcotic-like state, causing her combadge to fall and her to experience intense
    physical sensations. Ronin reveals himself as an 800-year-old spirit, who has
    moved with the Howard women through generations, and now with Beverly. Beverly
    struggles to maintain her Starfleet objectivity against his mesmerizing influence.
    Meanwhile, on the Enterprise, a dense fog rolls onto the bridge, caused by a feedback
    loop in the power transfer beam. Data and Geordi beam down to the weather control
    substation to address the problem, where they discover Ned Quint sabotaging the
    equipment. As Data attempts to stop him, a burst of green plasma energy fatally
    jolts Quint.
  key_moments: []
  scene_numbers:
  - 6
  - 7
  - 8
- fabula_uuid: act_0298bfbcf423c4d5
  number: 4
  summary: Data and Geordi investigate Ned Quint's death, initially attributing it
    to a plasma discharge. However, Beverly's medical scan reveals Quint was killed
    by an anomalous anaphasic energy residual, matching the signature of the weather
    system fluctuations. Data and Geordi decide to scan the colony for this energy
    signature, while Beverly, visibly distracted, delegates further tests on Quint's
    body. Beverly returns to the Howard home, calling for Ronin. He appears in corporeal
    form, explaining his weakening state away from the candle, which he calls his
    'home,' and reveals the Howard women kept it lit to sustain him. He asks Beverly
    to light the candle on the Enterprise, claiming he can travel along the power
    transfer beam. After a passionate kiss, Ronin vanishes. Beverly, now completely
    under his spell, returns to her quarters, lights the candle, and eagerly awaits
    Ronin. He appears, promising to merge with her and offer a love she has never
    known. Swept away in ecstasy, Beverly falls onto her bed. Soon after, Beverly
    appears in the Transporter Room with suitcases and the lit candle, informing a
    shocked Picard she is resigning from Starfleet to stay on Caldos and become a
    healer with Ronin. Picard, disturbed, reluctantly allows her to transport.
  key_moments: []
  scene_numbers:
  - 9
  - 10
  - 11
- fabula_uuid: act_a3b6eb10eae79c82
  number: 5
  summary: Picard and Troi discuss Beverly's sudden, uncharacteristic decision, suspecting
    Ronin's undue influence. Data reports an anaphasic energy signature emanating
    from Felisa Howard's coffin in the cemetery, prompting Picard to send Data and
    Geordi to investigate and to confront Ronin himself. In the Howard home, Ronin's
    green mist form merges with Beverly, causing her eyes to turn emerald green. Picard
    enters, startling Beverly, who appears dazed. He confronts her about her changed
    eyes and rash decision, leading to an angry defense from Beverly. Ronin then appears
    to Picard, refusing to answer questions about his origins or presence on Caldos,
    instead accusing Picard of jealousy. Data's report confirms the energy source
    is Felisa's coffin, and Picard grants permission to exhume the body, despite Ronin's
    protests. When Picard presses Ronin for answers, Ronin vanishes. Green plasma
    energy then bursts from thin air, striking Picard, which shocks Beverly and breaks
    Ronin's hypnotic hold; her eyes return to blue. Picard, recovering, urges Beverly
    to go to the cemetery. There, Data and Geordi exhume Felisa's coffin, only for
    her possessed body to sit up and attack them with green plasma. Beverly arrives,
    confronting Ronin, who now appears next to the limp body. Beverly reveals her
    understanding that Ronin is an anaphasic lifeform using organic hosts and the
    candle as a receptacle. Ronin threatens Geordi, but Beverly, feigning compliance,
    grabs Geordi's phaser and vaporizes the candle, weakening Ronin. She then fires
    the phaser at Ronin, destroying him in a final flash of energy. Beverly reactivates
    Data and checks on Geordi, then reflects with Troi on her grandmother's happiness
    with Ronin despite his true nature, as the Enterprise departs.
  key_moments: []
