    \ a violent green plasma strike, incapacitating Picard. The attack jolts Beverly\
    \ out of her submissive state, her eyes reverting to their natural blue as she\
    \ instinctively tends to Picard. Ronin demands she abandon Picard to stop Data\
    \ and Geordi from desecrating Felisa’s grave, but Beverly resists, her loyalty\
