      and the crew's reliance on tricorders and scientific protocols. While the confrontation
      is supernatural, Starfleet technology (phasers, tricorders, combadges) and institutional
      trust (Riker's immediate compliance) play crucial roles in neutralizing Ronin.
      The organization's scientific mandate clashes with the irrational horror of
      the possession, yet its tools ultimately turn the tide.
    active_representation: Through Beverly's leadership, Geordi's phaser/combadge,
      and Riker's off-screen compliance with her orders.
    power_dynamics: Exercising authority over the supernatural threat through institutional
      resources and crew trust. Starfleet's protocols are bent but not broken—Beverly's
      orders are followed without question, even in the face of the unknown.
    organizational_goals:
