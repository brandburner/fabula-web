  title: Picard orders investigation of ghostly energy
  description: "\n  In the Ready Room, Picard and Troi debate Beverly’s growing attachment\
    \ to Ronin, with Troi revealing Beverly’s emotional defensiveness and Picard questioning\
    \ whether Ronin’s influence is unnatural. Their discussion is interrupted by Data,\
    \ who reports detecting anaphasic energy—matching Ned Quint’s spectral signature—emanating\
    \ from the cemetery where Beverly’s grandmother is buried. Picard, now deeply\
    \ concerned, orders Data to investigate the source, while privately resolving\
    \ to confront Ronin himself. This moment marks a critical escalation: the crew’s\
    \ scientific inquiry shifts from weather anomalies to supernatural threats, and\
    \ Picard’s protective instincts override his earlier reluctance to intervene in\
    \ Beverly’s personal affairs. The discovery of the energy signature forces the\
    \ narrative toward direct confrontation with Ronin’s ghostly presence, while Picard’s\
    \ decision to meet Ronin signals his shift from passive observer to active adversary\
    \ in the unfolding crisis.\n  "
