  key_dialogue:
  - |-
    MATURIN: How long are you planning to stay?
    PICARD: Just a few more hours. Why?
    MATURIN: Well, as I'm sure you know, Caldos was one of the first terraforming projects of the Federation. Some of our weather controls and fusion systems are nearly a century old. I wouldn't mind having a starship Engineer take a look at them... perhaps give us a few upgrades. Maybe in exchange for a tour of the colony... and a home-cooked meal?
    PICARD: We're due at Starbase six-two-one tomorrow morning... but we can delay that for a few days. Yes... I'm sure we can find some time.
  - |-
    BEVERLY: Deanna... did you notice a peculiar man at the service? He looked like he was in his mid-thirties... dark hair?
    TROI: No...
    BEVERLY: He threw a flower on Nana's grave... a camellia... it was her favorite flower. She used to keep them all over the house.
    TROI: Maybe he was a friend... or one of her patients.
    BEVERLY: Maybe. It was just such a personal gesture... and he gave me the oddest look...
