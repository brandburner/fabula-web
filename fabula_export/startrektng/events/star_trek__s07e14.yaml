    institutional_impact: Starfleet's blend of science and discipline provides the
      tools and trust network that allow Beverly to defy Ronin's manipulation. The
      organization's emphasis on crew protection and problem-solving is tested but
      ultimately validated, even in the face of the inexplicable.
    internal_dynamics: Beverly's resignation from Starfleet (hinted at earlier) creates
      tension between personal and institutional loyalties, but in this moment, her
      dual roles as doctor and officer align to save the crew.
