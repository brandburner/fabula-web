- fabula_uuid: cand_evt_scene_3286dbd37b80c351_01
  global_id: null
  title: Ronin’s possession and Picard’s intervention
  description: "\n  Beverly, under Ronin’s supernatural influence, experiences a feverish,\
    \ intimate merging with the ghostly entity—her eyes shifting to an unnatural emerald\
    \ green as his vaporous form coalesces into her. The moment is shattered when\
    \ Picard arrives, disrupting the trance and exposing Beverly’s altered state.\
    \ Picard’s probing questions about Ronin’s origins and the exhumation of Felisa’s\
    \ coffin provoke Ronin’s violent reaction, culminating in a green plasma attack\
    \ that incapacitates Picard. Beverly, momentarily freed from Ronin’s control,\
    \ hesitates between her loyalty to Picard and her addiction to Ronin’s supernatural\
    \ allure. Ronin’s desperate plea to stop the exhumation and his subsequent disappearance\
    \ mark a turning point, forcing Beverly to confront the unnatural power he holds\
    \ over her and the danger he poses to the *Enterprise*’s mission.\n  "
