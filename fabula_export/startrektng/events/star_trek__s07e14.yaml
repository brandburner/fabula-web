  description: 'In the ready room, Picard and Troi discuss Beverly’s increasingly
    erratic behavior, with Troi revealing Beverly’s emotional defensiveness and possible
    romantic entanglement with Ronin. Picard dismisses the idea of Beverly’s choice
    as uncharacteristically impulsive, suggesting external influence. Data enters
    with a critical update: an anaphasic energy signature—matching Ned Quint’s spectral
    imprint—has been detected in the cemetery, directly tied to Felisa Howard’s grave.
    Picard orders Data to investigate the source, then declares his intent to meet
    Ronin face-to-face, marking a decisive shift from passive concern to active confrontation.
    The scene escalates the supernatural threat, framing Ronin as a direct adversary
    and Picard’s leadership as the crew’s only defense against the ghost’s growing
    control over Beverly and the *Enterprise*’s mission.'
