  key_dialogue:
  - 'MATURIN: Can you check the seismic stabilizers? We''ve been having a few tremors
    over the past couple of months.'
  - 'GEORDI: Governor... did you know you had a power fluctuation in your weather
    control system?'
  - 'MATURIN: Storm? It''s the middle of Summer—we don''t have rain at this time of
    year...'
  - 'GEORDI: Don''t worry, Governor. We''ll keep you dry.'
  - 'MATURIN: I certainly hope so. There''s a caber toss scheduled for tomorrow afternoon...
    and I''d hate to see it spoiled by an unexpected downpour.'
