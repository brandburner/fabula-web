- fabula_uuid: cand_evt_scene_0e59a0626d5a5aa6_03
  global_id: null
  title: Beverly Outmaneuvers Ronin’s Threat
  description: "\n  Cornered in the cemetery, Beverly confronts Ronin—now possessing\
    \ her grandmother’s corpse—after he disables Data and nearly kills Geordi with\
    \ anaphasic energy. She feigns surrender, placing the candle (Ronin’s power source)\
    \ at his feet, but seizes Geordi’s phaser and vaporizes it, severing Ronin’s energy\
    \ link. When he retaliates by threatening Geordi, she orders Riker to shut down\
    \ the weather control system’s plasma conduits, neutralizing Ronin’s remaining\
    \ power. Forced into a corner, Ronin lunges at her, but Beverly fires the phaser,\
    \ destroying him in a burst of energy. The confrontation ends with Beverly’s tactical\
    \ victory—she saves her crew, breaks the curse, and reclaims agency—but the cost\
    \ of violence lingers as she immediately tends to the wounded Data and Geordi,\
    \ revealing her lingering trauma and the fragility of her triumph.\n  "
