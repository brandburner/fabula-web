- fabula_uuid: cand_evt_scene_bbdb3753657464a7_03
  global_id: null
  title: Beverly notices the stranger at the funeral
  description: "\n  At her grandmother Felisa Howard’s funeral, Beverly delivers a\
    \ heartfelt eulogy that blends personal memories with the colony’s cultural traditions,\
    \ evoking warmth and nostalgia among the mourners. The moment is intimate and\
    \ grounding, a contrast to the eerie undercurrents of the story. As the coffin\
    \ is lowered, a stranger—a striking, pale man with intense green eyes—throws a\
    \ camellia onto the grave, a flower tied to Beverly’s family history. His gaze\
    \ lingers on her, unsettling her before he disappears into the crowd. The gesture\
    \ feels deliberate, almost ritualistic, and Beverly’s reaction (a mix of curiosity\
    \ and unease) signals that this is no ordinary mourner. The scene shifts from\
    \ solemnity to foreboding, planting the seed of the ghostly romance’s looming\
    \ threat. Beverly’s invitation to Troi to accompany her to the family home later\
    \ in the scene underscores her need for support as she begins to unravel the mystery\
    \ behind the stranger’s presence and the camellia’s significance.\n  "
