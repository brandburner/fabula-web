  title: Geordi detects weather anomaly
  description: In Engineering, Data and Geordi analyze Caldos Colony’s systems at
    Governor Maturin’s request, uncovering a previously undetected power fluctuation
    in the weather control system—a flaw that has persisted for 22 years. Geordi isolates
    the anomaly to a substation regulating atmospheric humidity, while Data’s analysis
    reveals unnatural storm formation in the colony’s desert and coastal regions.
    Maturin, already on edge, reacts with alarm to the news of an impending storm,
    which threatens the colony’s scheduled caber toss. His concern shifts from bureaucratic
    unease to personal anxiety, exposing his deeper investment in the event’s success.
    The discovery foreshadows the supernatural forces at play in Beverly’s family
    home, as the weather anomalies align with Ronin’s influence over the colony’s
    systems. Geordi reassures Maturin, but the tension lingers, underscoring the growing
    instability both on the planet and within the Enterprise’s mission.
