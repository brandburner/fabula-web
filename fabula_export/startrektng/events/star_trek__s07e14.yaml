  - 'BEVERLY: "Deanna... did you notice a peculiar man at the service? He looked like
    he was in his midthirties... dark hair? He threw a flower on Nana’s grave... a
    camellia... it was her favorite flower. She used to keep them all over the house."'
  - 'BEVERLY: "It was just such a personal gesture... and he gave me the oddest look..."'
