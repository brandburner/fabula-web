- fabula_uuid: cand_evt_scene_0e59a0626d5a5aa6_01
  global_id: null
  title: Felisa’s Possession and Ronin’s Exposure
  description: "\n  In a desecrated cemetery under the cover of night, Data and Geordi\
    \ La Forge open Felisa Howard’s coffin, only to trigger her violent resurrection.\
    \ Felisa’s corpse, now a vessel for Ronin’s anaphasic energy, erupts with plasma,\
    \ deactivating Data and critically injuring Geordi. Beverly arrives, witnessing\
    \ her grandmother’s reanimated body, and confronts Ronin, who emerges from Felisa’s\
    \ corpse. Beverly, breaking free from Ronin’s supernatural influence, exposes\
    \ his parasitic nature—revealing he has been using her family as hosts for centuries,\
    \ sustained by the candle’s plasma flame. Ronin, cornered, threatens Geordi, forcing\
    \ Beverly to destroy the candle with a phaser, destabilizing Ronin’s form. In\
    \ a final confrontation, Beverly fires on Ronin, vaporizing him in a burst of\
    \ energy. The scene marks the first direct confrontation between the Enterprise\
    \ crew and the supernatural threat, while also revealing Ronin’s vulnerability\
    \ and Beverly’s resilience against his control. The destruction of the candle\
    \ and Ronin’s defeat temporarily neutralize the immediate threat, but the event\
    \ underscores the deeper, generational curse Beverly must now face alone.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e14
  scene_sequence: 13
  sequence_in_scene: 23
  key_dialogue:
  - 'DATA: "I am reading definite signs of anaphasic energy in her body -- it appears
    to extend to the cellular level."'
  - 'BEVERLY: "You''re not Nana... Nana''s dead. Leave her alone."'
  - 'RONIN: "Beverly, these men were trying to stop us from being together. Once they''re
    gone, everything will be all right."'
  - 'BEVERLY: "No, you''re not. There''s no such thing as a ghost... you''re some
    sort of... anaphasic lifeform... Anaphasic energy is extremely unstable... without
    an organic host to maintain your molecular cohesion, you''d die... isn''t that
    right?"'
  - 'RONIN: "And I loved all of them... and they loved me. Give me the candle, Beverly."'
  - 'BEVERLY: "You''ve been using me... Nana... my whole family... for centuries."'
  - 'BEVERLY: "You''ve got nowhere left to go..."'
  - 'RONIN: "Yes, I do..."'
