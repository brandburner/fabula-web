      self.
    - To undo Q’s cruelty, not just to protect Beverly, but to assert her own moral
      boundaries against the Q Continuum’s indifference.
    what_happened: Amanda’s stammered invitation to Riker—‘You could wait for her
      here...?’—is a raw, unguarded moment that reveals the depth of her loneliness
      and her desperate grasp at normalcy. Her embarrassment at Q’s teasing is palpable,
      her body language tight and defensive, as if bracing for a blow. Yet when Q
      transforms Beverly, her horror is immediate, and her reversal of the transformation
      is swift and decisive. This duality—her vulnerability as a human and her power
      as a Q—is the core of her conflict, and the scene forces her to confront it.
