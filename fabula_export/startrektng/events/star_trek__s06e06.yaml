  title: Amanda’s vanishing act reveals her instability
  description: During a dinner in Ten Forward, Amanda’s refusal to eat—framed as a
    rejection of human needs—signals her accelerating detachment from mortality. Her
    fixation on Riker’s brief interaction (and subsequent departure to meet another
    woman) exposes her emotional fragility and burgeoning jealousy. When Beverly attempts
    to redirect her focus to Q’s lessons, Amanda’s attention remains locked on Riker,
    whose laughter with another woman triggers an impulsive, uncontrolled display
    of her Q powers. She vanishes herself and Riker in a sudden, violent act, leaving
    Troi and Beverly stunned. The moment underscores Amanda’s volatile emotional state,
    her untrained powers, and the dangerous intersection of her human vulnerabilities
    with her Q abilities. It also foreshadows the escalating consequences of her struggle
    between connection and omnipotence, setting up her later choice on Tagra Four.
