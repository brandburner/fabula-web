- fabula_uuid: act_f2230945e112ca02
  number: 2
  summary: Act Two plunges the crew into the mystery of Amanda's powers, as Picard,
    Riker, Geordi, and Troi discuss the incident with Beverly, who confirms Amanda's
    human physiology but can offer no scientific explanation for her abilities. The
    tension escalates dramatically with the sudden appearance of Q, who claims responsibility
    for orchestrating the warp core breach as a test of Amanda's true nature. Q reveals
    that Amanda is, in fact, a Q, and her human parents were Q in disguise who chose
    to live a mortal life on Earth, eventually dying in an 'accident.' Q's purpose
    is to take Amanda to the Q Continuum for training, a proposition vehemently opposed
    by Captain Picard, who insists Amanda has the right to choose her own future.
    Picard, distrustful of Q's motives, tasks Data with investigating the suspicious
    circumstances of Amanda's biological parents' death. Meanwhile, Beverly Crusher,
    with empathy, explains Amanda's true heritage to her, urging her to confront the
    reality of her powers and accept Q's guidance, despite his manipulative nature.
    The act concludes with a chilling glimpse into Q's true agenda as he converses
    with a 'Dark Shadow,' hinting that Amanda's fate, potentially termination, is
    still under review by the Continuum, raising the stakes significantly beyond mere
    training.
