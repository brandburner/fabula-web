acts:
- fabula_uuid: act_ebe99d12a426be52
  number: 1
  summary: 'Act One introduces Amanda Rogers, a bright but indecisive Starfleet intern,
    whose arrival on the Enterprise is quickly followed by inexplicable phenomena.
    Initially, these are minor, such as her accidentally manifesting and then dismissing
    a dozen puppies in her quarters, which leaves her frightened and confused about
    her latent abilities. The narrative then expands on her integration into ship
    life, showing her interactions with Doctor Crusher and Geordi La Forge, where
    she exhibits a keen intellect across various scientific fields. A more significant
    incident occurs in Shuttlebay Two when Amanda instinctively diverts a falling
    tool case from striking Commander Riker, an event that deeply disturbs her as
    she grapples with the unknown forces within her. The act culminates in a dramatic
    engineering crisis: a warp core breach threatens to destroy the Enterprise. In
    a moment of intense pressure, Amanda instinctively uses her burgeoning powers
    to contain the catastrophic explosion, saving the ship and its crew. This overt
    display of power leaves her terrified and the crew stunned, marking the definitive
    inciting incident that reveals her extraordinary nature to the ship''s command
    staff, setting the stage for the dramatic revelations to come. Her internal struggle
    with these uncontrolled abilities and the fear of being perceived as a ''freak''
    drives her initial character arc.'
