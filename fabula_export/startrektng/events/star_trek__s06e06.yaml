  global_id: null
  title: Amanda’s Rejection of Q’s Control
  description: 'In a moment of fragile vulnerability, Amanda confesses her emerging
    Q-like abilities to Beverly, seeking validation and human connection. The intimacy
    is shattered when Q materializes unannounced, scrutinizing her with predatory
    curiosity. His invasive questioning—demanding she account for her powers and dismissing
    her humanity—escalates into a confrontation. When Q attempts to forcibly take
    her to the Continuum, Amanda’s latent powers erupt, hurling him across the room
    in a raw display of defiance. The outburst reveals her growing agency and the
    depth of her resistance to Q’s manipulation, while Picard’s intervention underscores
    the moral stakes of her choice. The scene crystallizes Amanda’s existential conflict:
    her desire for a human life versus the inescapable pull of her omnipotent heritage,
    now embodied in Q’s relentless pressure.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e06
  scene_sequence: 10
  sequence_in_scene: 20
  key_dialogue:
  - 'AMANDA: It started happening about six months ago... things I wished for suddenly
    appearing... objects moving on their own... I thought I was going crazy... In
    a funny way, finding this out is kind of a relief.'
  - 'Q: There''s my girl! Very impressive the way you contained that explosion. What
    else have you done? Telekinesis, teleportation, spontaneous combustion of someone
    you didn''t like—that sort of thing.'
  - 'AMANDA: Leave me alone! I''m not going anywhere with you!'
