  global_id: null
  title: Amanda’s Moral Reckoning with Q
  description: "\n  In the ready room, Picard reveals the Q Continuum’s lethal intent\
    \ toward Amanda, exposing their role in her parents’ deaths and her uncertain\
    \ Q heritage. Amanda’s initial shock gives way to defiant anger as she challenges\
    \ Q’s authority, demanding answers for the Continuum’s hypocrisy. Picard seizes\
    \ the moment to deliver a scathing indictment of Q’s moral pretensions, framing\
    \ human vulnerability as a strength Q cannot comprehend. Q, uncharacteristically\
    \ subdued, offers Amanda a choice: embrace omnipotence in the Continuum or suppress\
    \ her powers to live as a human. Amanda, resolute, declares her intention to resist\
    \ her Q nature—only for Worf’s urgent summons to interrupt, forcing the confrontation\
    \ to an abrupt end. The scene pivots from existential reckoning to immediate crisis,\
    \ leaving Amanda’s decision—and her life—hanging in the balance.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e06
  scene_sequence: 28
  sequence_in_scene: 56
  key_dialogue: &id027
  - 'AMANDA: Kill me? Why?'
  - 'PICARD: They were responsible for the death of your parents...'
  - 'AMANDA: My parents -- ?'
  - 'PICARD: By what right do you appoint yourself to this position? Your arrogant
    pretense to being the moral guardians of the universe strikes me as a bit pale
    today. I don’t acknowledge it. I would put human morality against the Q’s any
    day.'
  - 'Q: You can come with me to the Continuum... The other choice is more difficult.
    You have within yourself the ability to refrain from using the power of Q. If
    you can do that—you can stay here.'
  - 'AMANDA: All I’ve wanted... since this whole thing began... was to be a normal
    human being again. I know I can resist.'
