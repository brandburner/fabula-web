- fabula_uuid: cand_evt_scene_b923c3352f378bcb_02
  global_id: null
  title: Beverly offers Amanda a lifeline to normalcy
  description: 'In the aftermath of Amanda’s confrontation with Q, Beverly Crusher
    finds her in her quarters, still reeling from the revelation of her Q heritage.
    Amanda pleads for a return to normalcy, insisting she wants nothing to do with
    her powers and that she still aspires to a Starfleet career. Beverly, though sympathetic,
    gently but firmly dismantles Amanda’s denial, acknowledging the impossibility
    of ignoring her Q nature. She frames Q as the only one who can help Amanda understand
    herself, even if he is unlikable. Amanda reluctantly accepts this reality but
    begs Beverly not to treat her differently, craving the stability of routine. Beverly
    responds with a pragmatic act of compassion: she assigns Amanda a mundane task
    in the medical lab, a small but deliberate gesture to anchor her to her human
    identity before the inevitable confrontation with her Q destiny. The exchange
    underscores Amanda’s fragile grip on her past and Beverly’s role as a reluctant
    but vital bridge between Amanda’s two worlds, offering her a fleeting taste of
    normalcy while acknowledging the storm ahead.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e06
  scene_sequence: 12
  sequence_in_scene: 25
  key_dialogue:
  - 'AMANDA: I don''t want anything to do with that Q person. I don''t care about
    having powers... You understand, don''t you? I have things I want to do... I''m
    going to the Academy... I want a career, I want to join Starfleet...'
  - 'BEVERLY: But you have to. I know how you feel. It would be so much easier if
    none of this had happened... if it would just go away. But it''s not going to
    go away.'
  - 'BEVERLY: You need someone to help you. And the person who can help you—is Q.
    ... There are hard choices you''re going to have to make about your future...
    and you can''t make them by ignoring the truth.'
  - 'AMANDA: You''re right. But I don''t want any of this to disrupt my time here.
    I want to do everything I''m expected to do... and I don''t want you to treat
    me any differently. Please?'
  - 'BEVERLY: You''ve got a deal. The first free hour you have, report to me in the
    medical lab. I have an experiment I need help with.'
