      and the threat of violence. It seeks to dominate Amanda by offering her a false
      choice—join the Continuum or suppress her powers—while simultaneously warning
      her of the difficulty of the latter path. Picard challenges this power dynamic
      by framing human vulnerability as a strength and by defending Amanda's right
      to choose her destiny. The Continuum's power is tempered by Q's uncharacteristic
      introspection, suggesting that Picard's moral arguments have struck a nerve,
      though Q would never admit it.
