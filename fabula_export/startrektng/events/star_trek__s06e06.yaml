  global_id: null
  title: Lote’s health crisis delays shuttle departure
  description: In Shuttlebay Two, Commander Riker and Orn Lote discuss the field modulator’s
    readiness for deployment on Tagra Four, with Lote praising its design. Just as
    Geordi confirms the shuttle’s preparedness, Lote suffers a sudden, violent coughing
    fit—so severe that he must use an emergency oxygen mask. The episode forces Riker
    to pause the mission, introducing a critical delay that disrupts the crew’s timeline
    and raises immediate concerns about Lote’s health. The interruption underscores
    the fragility of the mission and the unpredictable stakes of Amanda Rogers’ emerging
    Q powers, which are now threatening to derail the humanitarian effort entirely.
    The moment also highlights the crew’s vulnerability to unforeseen complications,
    reinforcing the tension between their duty to Tagra Four and the escalating Q-related
    crisis aboard the *Enterprise*.
