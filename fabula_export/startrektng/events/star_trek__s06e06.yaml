- fabula_uuid: cand_evt_scene_c8e50340cc695c39_01
  global_id: null
  title: Picard accuses Q of killing Amanda’s parents
  description: In the Ready Room, Picard directly confronts Q about the suspicious
    deaths of Amanda Rogers’ parents, presenting forensic evidence that implicates
    the Q Continuum in their execution. Q initially deflects with sarcasm but ultimately
    confirms the Continuum’s involvement, revealing their ruthless stance on hybrid
    beings. Picard demands Amanda’s right to know the truth before choosing her fate,
    but Q dismisses the idea of free will, instead framing her existence as a threat
    that must be either assimilated or eliminated. The exchange escalates the conflict
    between Starfleet’s moral principles and the Q Continuum’s draconian control,
    while also exposing the manipulative underpinnings of Amanda’s powers and the
    existential stakes of her decision. The scene ends with Q’s chilling ambiguity
    about Amanda’s survival, leaving her future—and Picard’s ability to protect her—hanging
    in the balance.
