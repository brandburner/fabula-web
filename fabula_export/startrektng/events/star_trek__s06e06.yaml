  title: Amanda Forces Beverly to Confront Resurrection
  description: 'In the sterile confines of the medical lab, Amanda—distracted by her
    recent vision of her biological parents—struggles to focus on her neural tissue
    experiment with Beverly. Her emotional turmoil surfaces as she confesses her guilt
    over using her burgeoning Q powers to summon her parents, then abruptly pivots
    to test Beverly’s moral limits by asking if she would resurrect her deceased husband,
    Jack, if given omnipotent power. Beverly’s visceral reaction (a mix of grief,
    hesitation, and ethical conflict) underscores the psychological weight of Amanda’s
    dilemma: whether to embrace her Q nature or resist its corrupting influence. The
    scene culminates with Q’s sudden appearance, pressuring Amanda to merge her medical
    work with his lessons, further entangling her in his manipulative agenda. The
    exchange reveals Amanda’s growing moral ambiguity—she frames the question not
    as a violation of natural law but as a test of loyalty to Q’s worldview, signaling
    her gradual corruption by his influence. Beverly’s departure leaves Amanda vulnerable,
    setting up Q’s next move to accelerate her choice between humanity and omnipotence.'
