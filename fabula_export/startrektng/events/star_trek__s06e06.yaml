      in the face of overwhelming odds)
    institutional_impact: "\n        The event underscores Starfleet’s vulnerability\
      \ when faced with forces beyond its jurisdiction, highlighting the tension between\
      \ its ideals and the harsh realities of the galaxy. The crew’s debate reflects\
