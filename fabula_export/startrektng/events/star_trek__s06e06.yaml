      embrace her true nature.
    - Say goodbye to Beverly and the crew, honoring her human connections before fully
      transitioning into her Q identity.
    what_happened: "\n        Amanda stands at the back of the bridge, her eyes locked\
      \ on the viewscreen showing the reactor crisis. As the crew struggles to stabilize\
      \ the reactor, she narrows her eyes in concentration, her hands subtly rising\
      \ as she instinctively taps into her Q powers. The planet transforms before\
      \ the crew's eyes, and she turns to face them, her voice steady but tinged with\
      \ sadness as she declares, 'I am Q.' She summons Beverly for a farewell, her\
      \ bittersweet tears reflecting the weight of her choice, before disappearing\
      \ with Q.\n      "
