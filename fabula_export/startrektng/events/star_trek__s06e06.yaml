  object_involvements:
  - object_uuid: ger_object_49e06c6f0254
    description_of_involvement: "\n        The Enterprise's main bridge viewscreen\
      \ shifts from showing the reactor control room on Tagra IV to a live feed of\
      \ the planet itself. This transformation allows the crew to witness the smog-choked\
      \ wasteland dissipate and Tagra IV restore to its lush, blue-green state. The\
      \ viewscreen serves as a narrative device, visually confirming Amanda's Q powers\
      \ and the emotional weight of her choice. It also underscores the crew's collective\
      \ awe and the irreversible nature of the event.\n      "
    status_before_event: Displaying the reactor control room on Tagra IV, alarms blaring
      and tension palpable.
    status_after_event: Showing the restored Tagra IV, its atmosphere clear and ecosystems
      thriving.
    global_id: ger_object_49e06c6f0254
  - object_uuid: ger_object_f557258380bf
    description_of_involvement: "\n        Geordi activates the neutrino infusion\
      \ device on the bridge during the Tagra IV reactor crisis, channeling targeted\
      \ neutrino pulses toward the planet's failing reactor core. The device fails\
      \ to stabilize the reactor, underscoring the crew's desperation and the inevitability\
      \ of Amanda's intervention. It serves as a tangible representation of the crew's\
      \ efforts to solve the crisis through science, only to be outmatched by Amanda's\
      \ latent powers.\n      "
    status_before_event: Activated by Geordi, pulsing with neutrino energy as he attempts
      to stabilize the reactor.
    status_after_event: Deactivated and ineffective, as the reactor stabilizes on
      its own through Amanda's Q powers.
    global_id: ger_object_f557258380bf
  - object_uuid: ger_object_b2429ff29ea2
    description_of_involvement: "\n        The field modulator is mentioned in the\
