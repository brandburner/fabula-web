- fabula_uuid: cand_evt_scene_d1dc66adb2c723d2_03
  global_id: null
  title: Amanda’s forced confession and moral reckoning
  description: After Riker rejects her romantic advances in the gazebo—a fantasy she
    conjures to manipulate his affections—Amanda, stung by his resistance, exercises
    her nascent Q powers to coerce a confession of love. The hollow triumph of the
    act forces her to confront the ethical cost of her abilities. When Riker’s forced
    devotion collapses back into reality, she undoes the spell, her humiliation and
    sorrow revealing the chasm between her desperate longing for human connection
    and the ethical boundaries of her power. This moment marks a turning point in
    her moral development, as she begins to recognize that her Q abilities cannot
    manufacture genuine affection or resolve her existential crisis. The scene underscores
    her vulnerability and the irreversible fracture of her human identity, setting
    up her eventual confrontation with Q and the Q Continuum’s demands.
