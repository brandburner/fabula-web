  global_id: null
  title: Amanda’s Forced Fantasy Collapses
  description: 'Amanda Rogers, intoxicated by her newfound Q powers and her infatuation
    with Riker, impulsively transports them to a secluded, moonlit gazebo—a romantic
    fantasy she constructs to manipulate his emotions. She attempts to seduce him
    with her powers, first through persuasion and then by forcibly altering his feelings
    to make him reciprocate her affection. When Riker resists her initial advances,
    she exercises her Q abilities to coerce a confession of love, forcing him into
    a passionate embrace. The hollow victory of the moment quickly unravels as Amanda
    realizes the emptiness of her manipulation. Riker’s genuine rejection—both before
    and after the forced illusion—exposes the ethical cost of her omnipotence. The
    scene culminates in her humiliation and tears, marking a turning point in her
    moral reckoning: she understands that true connection cannot be manufactured,
    and her powers, wielded without restraint, dehumanize both herself and others.
    The moment forces her to confront the fragility of genuine emotion and the arrogance
    of her growing Q arrogance, setting the stage for her eventual choice between
    humanity and omnipotence.'
