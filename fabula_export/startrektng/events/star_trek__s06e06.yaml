  title: Q reveals Amanda’s engineered Q lineage
  description: 'In the observation lounge, the *Enterprise* crew debates Amanda Rogers’
    sudden display of Q-like powers during the warp core breach, with Beverly Crusher
    reassuring them of her humanity. The tension escalates when Q materializes unannounced,
    wearing a Starfleet uniform, and casually admits to orchestrating the sabotage
    as a test. He drops the bombshell that Amanda’s biological parents were Q posing
    as humans, who conceived her out of curiosity before dying in an accident. Q’s
    revelation reframes the breach as a deliberate experiment, exposing his manipulative
    agenda: to instruct Amanda in her Q abilities and eventually force her into the
    Continuum. The crew reacts with outrage, particularly Beverly, who defends Amanda’s
    right to choose her own life. Q’s arrogance and disregard for human attachment
    clash with the crew’s moral stance, setting up a direct confrontation over Amanda’s
    future. The scene ends with Q abruptly transporting Picard away for a private
    discussion, leaving the crew stunned and the stakes heightened over Amanda’s identity
    and autonomy.'
