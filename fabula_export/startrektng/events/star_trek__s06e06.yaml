      breaking point comes when Q dismisses her humanity; her arm lifts *before* she
      screams, the telekinesis an unconscious eruption of rage and self-preservation.
      The act isn’t premeditated; it’s the body’s answer to violation, a primal ‘*no*’
      that leaves her shaking but unbroken.
