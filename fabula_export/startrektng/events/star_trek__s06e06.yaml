  title: Amanda forces Riker’s confession
  description: 'Amanda Rogers, intoxicated by her newfound Q powers and stung by Riker’s
    earlier rejection, transports him to a secluded gazebo—a romantic fantasy she
    constructs to manipulate his emotions. When Riker resists her advances, she escalates,
    using her powers to coerce a false confession of love. The hollow triumph of the
    moment forces her to confront the ethical cost of her abilities: she realizes
    that love born from coercion is meaningless, and her desperation has only deepened
    her isolation. The scene marks a turning point in her moral reckoning, as she
    undoes the spell and stands alone in the gazebo, humiliated and grappling with
    the chasm between her desires and the ethical boundaries of her power. Riker’s
    departure leaves her in tears, her fantasy shattered by the weight of her own
    actions.'
