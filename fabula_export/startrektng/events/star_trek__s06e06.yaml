- fabula_uuid: act_cf10087cb6e20a17
  number: 4
  summary: 'Act Four intensifies Amanda''s exploration of her powers and brings her
    to a critical moral juncture, while Picard uncovers the truth about her parents.
    Data reveals to Picard that the tornado which killed Amanda''s parents was unnaturally
    precise and powerful, spontaneously appearing and disappearing, strongly suggesting
    Q Continuum involvement. Meanwhile, Q continues Amanda''s training, teaching her
    to teleport. He takes her on a breathtaking journey onto the ship''s hull in space,
    dazzling her with the sheer wonder and freedom of Q abilities, successfully making
    her awestruck. However, Amanda''s human desires soon clash with her growing power.
    During dinner with Beverly and Troi, Amanda, feeling a burgeoning attraction to
    Commander Riker, sees him with another woman. In a fit of jealousy, she teleports
    herself and Riker to a romantic, fantastical gazebo. She attempts to force his
    affection, but Riker gently rejects her, explaining that true love cannot be compelled.
    Amanda, in a moment of emotional vulnerability, uses her powers to make Riker
    declare his love, only to immediately realize the emptiness and artificiality
    of such a forced emotion. Humiliated and heartbroken, she sends him back, acknowledging
    the profound lesson. The act culminates in Picard''s direct confrontation with
    Q, where he presents the evidence of the Q Continuum''s execution of Amanda''s
    parents. Q, after a moment of hesitation, confirms this grim truth and reveals
    the ultimate, deadly ultimatum facing Amanda: either fully embrace her Q nature
    and join the Continuum, or be terminated as an unacceptable ''hybrid,'' leaving
    her fate hanging precariously.'
