- fabula_uuid: act_c02937f07624f427
  number: 5
  summary: 'Act Five propels Amanda towards her ultimate choice and resolution. Picard,
    Beverly, and Troi grapple with the moral dilemma of informing Amanda about the
    Q Continuum''s threat to kill her. Picard ultimately decides she deserves to know
    the truth. He delivers the devastating news to Amanda: her parents were executed
    by the Q, and she faces the same fate if she doesn''t prove herself ''fully Q.''
    Amanda, enraged and defiant, confronts Q. Picard delivers a powerful, impassioned
    speech, defending human morality against Q''s arrogant ''superior morality,''
    arguing that humanity''s moral center is something Q lacks. Q, perhaps moved by
    Picard''s words, offers Amanda a final choice: join the Q Continuum or remain
    human by permanently suppressing her powers, a choice her parents failed to make.
    Amanda, determined to live a normal human life, chooses to suppress her powers.
    However, this decision is immediately tested by an escalating crisis on Tagra
    Four, where a reactor meltdown threatens thousands of lives, and transporters
    are inoperable due to atmospheric interference. Watching the unfolding disaster,
    Amanda cannot stand by. In a climactic display of her full Q power, she stabilizes
    the reactor and, in an instant, restores Tagra Four''s ravaged ecosystem to its
    natural, lush state. This act of immense compassion and power forces Amanda to
    confront and accept her true identity. She declares, ''I am Q,'' acknowledging
    that she cannot deny her nature. With a bittersweet farewell, Amanda decides to
    leave with Q to learn to control her powers, but expresses hope of one day visiting
    her friends on the Enterprise. The crew is left to reflect on the extraordinary
    young woman and her impossible, yet ultimately moral, choice.'
