  scene_sequence: 7
  sequence_in_scene: 13
  key_dialogue:
  - 'Q: And why not? They''re terribly inconvenient.'
  - 'PICARD: Are you responsible for the incident in Engineering?'
  - 'Q: Of course. I needed to find out if what I suspected about the girl was true.
    That she''s Q.'
  - 'BEVERLY: How is that possible? Her parents... her biological parents... were
    human.'
  - 'Q: Not exactly. They had assumed human form... in order to visit Earth. For an
    amusement, I suppose... but in vulgar human fashion they proceeded to conceive
    a child.'
  - 'Q: I can rescue her from that miserable existence.'
  - 'BEVERLY: That ''miserable existence'' is all she''s known for eighteen years.
    You have no right to take it away from her.'
