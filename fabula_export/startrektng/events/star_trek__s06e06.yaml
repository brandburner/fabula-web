  title: Q forces Amanda’s first teleportation trial
  description: 'After Q mocks Amanda’s moral outrage over his transformation of Dr.
    Crusher into a dog, he pivots to testing her burgeoning Q powers by vanishing
    mid-conversation and taunting her from all directions. His challenge—finding him
    via teleportation—is framed as a game, but the stakes are clear: Amanda must either
    embrace her latent omnipotence or prove herself unworthy of the Q Continuum. Her
    hesitation gives way to determination as she closes her eyes, concentrates, and
    disappears in pursuit, marking the first time she actively uses her powers under
    pressure. The moment blurs the line between mentorship and manipulation, as Q’s
    ‘game’ forces Amanda to confront the irreversible nature of her transformation.
    The scene functions as a turning point, where her human limitations collide with
    her emerging Q abilities, setting up her eventual choice between humanity and
    omnipotence.'
