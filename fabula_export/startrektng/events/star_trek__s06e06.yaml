  title: Picard decides to warn Amanda of Q’s threat
  description: In the Observation Lounge, Picard reveals to Beverly and Troi that
    Q has received orders from the Q Continuum to kill Amanda if she fails to embrace
    her Q heritage. Troi argues that Amanda deserves to know the truth, believing
    her emerging powers could protect her, while Beverly counters that even Q powers
    didn’t save Amanda’s parents. Picard, after weighing their arguments, concludes
    that Amanda must be told the full stakes of Q’s ultimatum, setting the stage for
    a pivotal confrontation that will force her to confront her destiny—or reject
    it entirely. The scene underscores Picard’s commitment to self-determination and
    the moral weight of withholding life-altering truths, while also highlighting
    the tension between protection and empowerment in Amanda’s journey.
