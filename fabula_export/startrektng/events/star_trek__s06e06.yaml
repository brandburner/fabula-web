  title: Amanda tests her powers under Q’s manipulation
  description: In Amanda’s quarters, Q taunts her by transforming Beverly Crusher
    into a dog, forcing Amanda to confront her moral outrage while he dismisses her
    reaction as naive. His playful cruelty reveals his detachment from human suffering,
    but also his calculated strategy to provoke her latent Q abilities. When Amanda
    reverses the transformation, Q seizes the moment to challenge her, urging her
    to practice teleportation. Before she can respond, he vanishes, leaving her no
    choice but to attempt tracking him through the ship—a high-stakes test that blurs
    the line between training and psychological manipulation. The scene marks a turning
    point where Amanda’s resistance to her Q nature is directly pitted against Q’s
    insistence that she embrace her omnipotence, setting up her eventual choice between
    compassion and power.
