      \ powers. Her emotional state is a mix of shock, fear, and a deep sense of isolation,\
      \ as she becomes acutely aware that she is fundamentally different from those\
      \ around her.\n      "
    goals:
    - To blend in and appear normal among the crew
    - To protect Commander Riker from harm (instinctively, without conscious thought)
    what_happened: "\n      Amanda Rogers stands near Geordi La Forge, her attention\
      \ initially focused on his technical explanation of Tagra IV’s barystatic filters.\
      \ However, her gaze quickly drifts to Commander Riker, who enters the shuttlebay\
      \ and begins reviewing a PADD. As Geordi continues speaking, Amanda’s infatuation\
      \ with Riker grows, causing her to lose track of the conversation entirely.\
      \ When she notices the tool case teetering on the overhang, her instinctive\
      \ reaction to protect Riker triggers an unconscious burst of telekinetic energy,\
      \ deflecting the case just before it strikes him. The sudden, violent manifestation\
      \ of her power leaves her visibly shaken, her face a mask of horror as she realizes\
      \ the implications of what just happened.\n      "
