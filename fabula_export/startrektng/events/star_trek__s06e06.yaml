  title: Amanda’s jealousy triggers uncontrolled teleportation
  description: 'During a tense dinner in Ten Forward, Amanda’s growing detachment
    from humanity is exposed when she refuses food, dismissing it as a ''human trait.''
    Her fragile emotional state becomes clear when Riker enters, and she eagerly invites
    him to join—only for him to decline and leave with another woman. The rejection
    triggers a visceral reaction: Amanda’s focus shatters, her Q powers erupt uncontrollably,
    and she teleports herself and Riker away in a shocking display of raw, unchecked
    ability. The abrupt disappearance leaves Beverly and Troi stunned, underscoring
    the severity of Amanda’s struggle—her powers are not just a gift but a destabilizing
    force tied to her unresolved human vulnerabilities. The moment forces the crew
    to confront the dangerous volatility of her untrained abilities and the emotional
    instability driving them.'
