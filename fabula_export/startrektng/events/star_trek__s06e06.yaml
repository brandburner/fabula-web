  object_involvements:
  - object_uuid: ger_object_2dad61e70a5f
    description_of_involvement: The *Enterprise*'s warp core serves as both a technical
      backdrop and a supernatural portal in this event. Initially, it is the site
      of Geordi and Data’s discussion about field modulators, its humming plasma chamber
      a symbol of controlled energy. However, when Q’s head emerges from its pulsating
      depths, the warp core transforms into a liminal space—a threshold between the
      mundane and the omnipotent. It is through this chamber that Q abducts Amanda,
      using it as a conduit to transport her from the safety of Engineering to the
      exposed hull of the ship. The warp core’s dual role (as both a Starfleet innovation
      and a Q-controlled gateway) underscores the tension between human achievement
      and cosmic power, and it becomes a literal and metaphorical bridge to Amanda’s
      reckoning with her identity.
    status_before_event: Operational but unstable, with Geordi and Data monitoring
      its plasma levels and discussing modulation techniques. The chamber glows with
      contained energy, its hum a constant presence in Engineering.
    status_after_event: Stabilized (as confirmed by Data later in the scene), but
      now imbued with a supernatural significance. The warp core’s role as a portal
      has been revealed, and its connection to Q’s manipulations makes it a point
      of vulnerability for the *Enterprise*.
    global_id: ger_object_2dad61e70a5f
  - object_uuid: ger_object_55512287a23c
    description_of_involvement: 'The small field of asteroids sweeping past Amanda
      and Q on the *Enterprise*''s hull is a masterful use of environmental storytelling.
      The asteroids serve no functional purpose—they are not a threat, nor do they
      interact with the characters—but their presence amplifies the sublime terror
      of the moment. Their silent, drifting motion contrasts sharply with the chaos
      of Engineering, reinforcing the isolation and vastness of space. For Amanda,
      the asteroids symbolize the indifference of the cosmos: she is a speck in an
      infinite expanse, her human concerns meaningless in the face of such scale.
      For Q, they are a tool, a visual aid to his manipulation, designed to make Amanda
      feel both insignificant and powerful—capable of commanding such forces, if she
      chooses to embrace her Q heritage. The asteroids’ symbolic weight far outweighs
      their physical presence.'
    status_before_event: Distant and unremarkable, part of the background of space.
      Their trajectory is not altered by the *Enterprise*’s presence.
    status_after_event: Unchanged in their path, but now imbued with narrative significance.
      They become a lasting image in Amanda’s mind, a reminder of the moment her humanity
      was tested.
    global_id: ger_object_55512287a23c
  - object_uuid: ger_object_f60710272c46
    description_of_involvement: Geordi and Data’s warp core monitoring console is
      the focal point of their technical discussion, its screens displaying critical
      data about plasma levels and reaction chamber metrics. The console serves as
      a distraction, keeping them unaware of Amanda’s presence and Q’s imminent intervention.
      When Q’s voice interrupts their conversation, the console’s alarms and readouts
      become irrelevant—overshadowed by the supernatural event unfolding. The console’s
      role in this event is to highlight the contrast between human ingenuity (represented
      by Geordi and Data’s problem-solving) and the effortless, disruptive power of
      the Q Continuum. Its sudden irrelevance underscores Q’s ability to render even
      the most advanced Starfleet technology obsolete with a single word.
    status_before_event: Active, with Geordi and Data analyzing data streams and discussing
      solutions to the Tagra IV reactor crisis. The console’s screens pulse with alerts
      and metrics, reflecting the urgency of their task.
    status_after_event: Functionally unchanged, but its purpose in the scene shifts
      from a tool for problem-solving to a symbol of human limitation. The crew’s
      attention is no longer on the console but on the unexplained disappearance of
      Amanda and Q.
