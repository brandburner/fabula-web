    - By imposing a moral and existential dilemma that forces the crew to confront
      the limits of their own ethics and power.
    institutional_impact: Highlights the clash between the Continuum’s rigid, detached
      authority and the crew’s human-centered values, underscoring the fragility of
      mortal agency in the face of cosmic forces.
    internal_dynamics: The Continuum’s internal policies and hierarchies are implied
      in its unyielding stance, suggesting a collective that brooks no dissent and
      views individuals as either assets or liabilities to be managed.
