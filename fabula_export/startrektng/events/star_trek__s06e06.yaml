      with Riker and Troi are all extensions of Starfleet’s institutional culture.
      The organization’s values—exploration, service, and compassion—are reflected
      in the crew’s treatment of Amanda, particularly in Riker’s gift of Henry and
      Troi’s empathetic support. However, Starfleet’s role is also a source of tension:
      Amanda’s longing to return to the *Enterprise* after graduation reveals her
      attachment to the institution, even as her Q heritage threatens to sever her
      ties to it. The event highlights Starfleet as both a source of belonging and
      a potential obstacle to Amanda’s human desires.'
