  title: Q Manipulates Amanda’s Curiosity
  description: 'In the medical lab, Amanda struggles to focus on her vaccine research
    for Tagra Four, her mind still reeling from Q’s revelation about her Q heritage
    and her parents. Beverly notices her distraction and offers support, but Amanda’s
    guilt and confusion about her newfound powers—particularly the ethical weight
    of omnipotence—surface when she forces Beverly to confront a hypothetical: would
    she resurrect her deceased husband if given the power? Beverly’s discomfort underscores
    the moral stakes of Amanda’s dilemma. The moment is interrupted when Q materializes,
    dismissive of Amanda’s scientific work but seizing the opportunity to exploit
    her curiosity. He pressures her to use her Q abilities to accelerate the experiment,
    framing it as a practical solution that would benefit Tagra Four. Amanda hesitates,
    torn between her duty to Beverly and her growing fascination with her latent powers.
    Q’s intervention marks a turning point: he weaponizes her scientific dedication
    against her, forcing her to confront the urgency of her choice—whether to embrace
    her Q nature or cling to her human identity. The scene crystallizes the conflict
    between Amanda’s moral compass and her burgeoning omnipotence, with Q acting as
    the catalyst for her accelerated reckoning.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e06
  scene_sequence: 15
  sequence_in_scene: 31
  key_dialogue:
  - |-
    AMANDA: Can you imagine how that felt... ?
    BEVERLY: No... I don't think I can.
    AMANDA: You were right... I can't ignore what's happened to me... but... I don't know if I can cope with it.
  - |-
    AMANDA: If it were you... if suddenly you could have anything you wanted... what do you think you'd do?
    BEVERLY: I... I'm not sure. I'd probably want to cure people... people who were hopelessly ill.
    AMANDA: Would you bring your husband back?
    BEVERLY: Oh, Amanda, I don't know... I don't think I could decide about something like that until I was faced with it...
  - |-
    Q: I have a splendid idea. We'll combine your work... with our lesson. I'll show you how to finish this in no time.
    AMANDA: I think I'd better do it the way Doctor Crusher showed me.
    Q: Why? I'm sure the Doctor would be delighted if you could speed things along. Think what it would mean... you could handle double... triple the workload. This sounds reasonable.
