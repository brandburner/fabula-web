  - 'GEORDI: Thanks for your help. We need every spare hand we can get; this is one
    of the biggest relief efforts we''ve ever mounted.'
  - 'AMANDA: Why are you taking everything down in shuttlecraft?'
  - 'GEORDI: We can''t use the transporters because of all the ionization in the Tagran
    atmosphere.'
  - 'RIKER: Yeah... I didn''t even see it coming...'
