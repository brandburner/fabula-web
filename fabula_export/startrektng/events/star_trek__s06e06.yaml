  title: Troi and Crusher debate Amanda’s truth
  description: 'In the Observation Lounge, Picard reveals Q’s ultimatum: if Amanda
    Rogers fails to prove herself as fully Q, the Continuum has ordered her death.
    Troi argues Amanda deserves to know the truth, believing her burgeoning powers
    could protect her, while Beverly counters that even Q’s power didn’t save Amanda’s
    parents. Picard ultimately sides with Troi, acknowledging Amanda’s right to the
    truth despite the emotional burden of delivering it. The exchange underscores
    the moral dilemma of protecting Amanda from existential danger while respecting
    her autonomy, foreshadowing the emotional fallout of their decision and the high
    stakes of her impending choice between humanity and Q omnipotence.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e06
  scene_sequence: 26
  sequence_in_scene: 53
  key_dialogue:
  - 'PICARD: I have no reason to believe Q is lying. He has orders from the Continuum...
    if Amanda doesn''t prove herself to be fully Q... he must kill her.'
  - 'TROI: We have to tell her...'
  - 'BEVERLY: I''m not sure we should... it seems almost cruel.'
  - 'TROI: Maybe she can protect herself... after all, she has a great deal of power.'
  - 'BEVERLY: So did her parents, and it didn''t save them.'
  - 'PICARD: I''m inclined to agree that Amanda deserves to know the truth of the
    situation. We don''t have the right to withhold such crucial information.'
