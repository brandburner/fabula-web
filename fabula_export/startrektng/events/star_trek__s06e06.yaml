      \ current humanitarian emergency. Their inability to regulate emissions and\
      \ manage the barystatic filters has resulted in a situation that requires Starfleet’s\
      \ intervention.\n      "
    organizational_goals:
    - To receive and utilize the humanitarian aid provided by Starfleet to address
      the environmental crisis on Tagra IV.
    - To eventually implement regulatory measures to prevent future crises, though
      this goal is not directly addressed in the current scene.
    influence_mechanisms:
