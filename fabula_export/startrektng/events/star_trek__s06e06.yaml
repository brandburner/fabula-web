- fabula_uuid: cand_evt_scene_b923c3352f378bcb_01
  global_id: null
  title: Amanda confronts her Q reality with Beverly
  description: 'In Amanda’s quarters, Beverly Crusher finds the young intern still
    reeling from Q’s revelations about her latent Q powers. Amanda pleads for Beverly’s
    understanding, insisting she wants nothing to do with her Q heritage and desperately
    clinging to her dream of a normal Starfleet career. Beverly, while sympathetic,
    refuses to indulge Amanda’s denial, delivering a blunt but compassionate truth:
    the powers won’t disappear, and Amanda must confront them. The exchange forces
    Amanda to acknowledge the inevitability of her Q nature, though she extracts a
    promise from Beverly to treat her as an ordinary crew member aboard the *Enterprise*.
    This fragile alliance sets the stage for Amanda’s eventual confrontation with
    Q, while also establishing Beverly as a reluctant but vital mentor who bridges
    Amanda’s human and Q identities. The scene underscores the tension between Amanda’s
    desire for normalcy and the inescapable reality of her heritage, framing her struggle
    as both personal and existential.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e06
  scene_sequence: 12
  sequence_in_scene: 24
  key_dialogue:
  - 'AMANDA: I don''t want anything to do with that Q person. I don''t care about
    having powers... You understand, don''t you? I have things I want to do... I''m
    going to the Academy... I want a career, I want to join Starfleet...'
  - 'BEVERLY: But you have to. I know how you feel. It would be so much easier if
    none of this had happened... if it would just go away. But it''s not going to
    go away.'
  - 'BEVERLY: You need someone to help you. And the person who can help you—is Q.
    ... There are hard choices you''re going to have to make about your future...
    and you can''t make them by ignoring the truth.'
