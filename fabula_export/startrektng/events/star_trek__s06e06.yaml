    what_happened: "\n      Commander Riker enters Shuttlebay Two and interacts briefly\
      \ with a non-descript crew member before stepping away to review a PADD. Unaware\
      \ of the danger above him, he stands directly beneath the overhang where the\
      \ tool case is perched. When the case begins to fall, an unseen force diverts\
      \ it just before impact, sparing him from injury. Riker reacts with a start,\
      \ looking around in confusion as Geordi calls out to check on his well-being.\
      \ His demeanor shifts from focused professionalism to mild disorientation, unaware\
      \ that Amanda’s powers were responsible for his near-miss.\n      "
