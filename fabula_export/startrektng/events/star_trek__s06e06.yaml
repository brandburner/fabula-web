      \ emergency, which the Enterprise is now tasked with mitigating. This event,\
      \ while centered on Amanda’s personal struggle, occurs within the broader context\
      \ of Starfleet’s response to Tagra IV’s plight.\n      "
    active_representation: "\n      Via the relief mission and the supplies being\
