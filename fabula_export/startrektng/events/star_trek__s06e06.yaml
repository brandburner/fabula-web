  - 'GEORDI: We can''t use the transporters because of all the ionization in the Tagran
    atmosphere.'
  - 'AMANDA: From the barystatic filters?'
  - 'GEORDI: ((a little surprised)) How''d you know that?'
  - 'AMANDA: I did a paper on eco-regeneration.'
