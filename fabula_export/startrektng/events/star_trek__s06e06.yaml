  - 'AMANDA: I''m just afraid I won''t have enough time for everything I want to do.
    I mean -- there''s school, and then graduate study, and a career... and of course
    I want to get married and have children -- lots of children -- and more animals...'
  - 'TROI: Amanda... whatever you choose, I''m sure you''ll be good at it.'
  - 'AMANDA: I know one thing... I wouldn''t mind coming back to the Enterprise when
    I graduate.'
  - 'TROI: Who knows? Maybe you will.'
