  title: Amanda’s uncontrolled power surge
  description: |2-

      In Shuttlebay Two, Amanda Rogers—distracted by her growing infatuation with Riker—fails to notice a tool case teetering on an overhang until it begins to fall directly toward him. Reacting instinctively, she unconsciously unleashes a burst of telekinetic energy, deflecting the case just before it strikes Riker. The sudden, violent manifestation of her Q-like abilities shocks her, as the tool case crashes to the ground with unnatural force. While the crew assumes it was a near-miss, Amanda’s horrified expression reveals the truth: she has no control over her emerging powers. The incident forces her to confront the fragility of her human identity and the looming threat of her uncontrollable abilities, marking the first tangible evidence of her connection to the Q Continuum. The moment underscores her internal conflict—her desire for normalcy clashing with the reality of her omnipotent nature—while setting up her subsequent fear of being exposed as a 'freak.'
