    her into a dog...'
  - 'Q: Now, be truthful, Amanda. Wasn''t it amusing? Just a little?'
  - 'Q: There, you see? My dear, what''s the point of having these abilities if you
    can''t enjoy them? Now -- have you been practicing your teleportation?'
  - 'Q: I''m going to hide somewhere on the ship... you try to find me.'
