  title: Amanda’s power manifests during distraction
  description: 'During a technical discussion with Geordi about Tagra Four’s environmental
    crisis, Amanda’s attention repeatedly drifts to Riker, betraying her growing infatuation.
    As Geordi explains the mechanics of barystatic filters, Amanda’s focus wavers—her
    gaze lingering on Riker as he reviews a PADD. The moment of distraction triggers
    an uncontrolled surge of her latent Q powers: a falling tool case, seemingly of
    its own volition, teeters and then *diverts midair*, crashing harmlessly away
    from Riker. The crew reacts to the near-miss, unaware of Amanda’s involvement,
    but her horrified expression reveals the truth. This unplanned manifestation forces
    her to confront the instability of her emerging abilities and the dangerous intersection
    of her human emotions (her fixation on Riker) with her burgeoning omnipotence.
    The scene underscores the fragility of her human identity and foreshadows the
    conflict between her Q nature and her desire for normalcy—particularly her susceptibility
    to distraction by Riker’s presence, which may later become a liability in her
    struggle for self-control.'
