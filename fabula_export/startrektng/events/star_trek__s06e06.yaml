  title: Q abducts Amanda from Engineering
  description: 'Amanda Rogers materializes in the *Enterprise*''s Engineering section,
    searching for Q while Geordi La Forge and Data discuss technical solutions for
    Tagra Four’s reactor crisis. Unseen, Q taunts her from within the warp core, his
    voice startling the crew—Geordi and Data turn just in time to witness Q’s head
    vanish back into the core, followed by Amanda’s abrupt disappearance. The moment
    underscores Q’s omnipotence and the crew’s helplessness, while also marking a
    critical escalation in his manipulative campaign to force Amanda into embracing
    her Q heritage. The abduction leaves the crew stunned, with Data, Beverly, and
    O’Brien reacting to the inexplicable event, which immediately transitions into
    Q’s next move: transporting Amanda to the ship’s hull in space to further sway
    her with the spectacle of Q power. This event serves as a turning point, stripping
    Amanda of agency and accelerating her transformation from Starfleet intern to
    reluctant Q heir, while exposing the crew’s vulnerability against Q’s whims.'
