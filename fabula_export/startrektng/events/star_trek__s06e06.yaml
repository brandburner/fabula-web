- fabula_uuid: cand_evt_scene_6adb65d3a0aa1709_02
  global_id: null
  title: Q abducts Amanda to the void
  description: Q violently abducts Amanda Rogers from the *Enterprise*'s Engineering
    section, materializing her onto the exposed hull of the ship in the silent void
    of space. The sudden transition—from the hum of warp core discussions with Geordi
    and Data to the vast, soundless cosmos—disorients Amanda, forcing her to confront
    the scale of the universe and her own burgeoning power. Q, observing her awe with
    satisfaction, orchestrates this moment as a deliberate temptation, leveraging
    the sublime spectacle of space to erode her human attachments and nudge her toward
    embracing her Q heritage. The scene underscores Q’s manipulative control over
    Amanda’s environment and her growing vulnerability to his influence, marking a
    critical escalation in his campaign to coerce her into the Continuum. The absence
    of sound and the sweeping asteroids amplify the existential weight of the moment,
    leaving Amanda’s humanity precariously balanced against the allure of omnipotence.
