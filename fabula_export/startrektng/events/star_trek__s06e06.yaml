      \ with sadness as she declares, 'I am Q.' She summons Beverly for a farewell,\
      \ her bittersweet tears reflecting the weight of her choice, before disappearing\
      \ with Q.\n      "
    beliefs:
    - Her compassion for others outweighs her fear of her own power.
    - She cannot remain human while possessing Q abilities, no matter how much she
      wishes to.
    observed_traits:
    - Compassionate to a fault
    - Resigned yet resolute
