  title: Amanda reveals her unnatural knowledge
  description: "\n  Riker escorts Amanda through the *Enterprise*’s corridors, attempting\
    \ to ease her nervousness as a new intern. His casual orientation—pointing out\
    \ companels and deck markers—is met with Amanda’s unsettling precision: she recites\
    \ the exact deck and section without hesitation, then casually admits she memorized\
    \ the ship’s specs *en route*. Riker’s surprise at her knowledge marks the first\
    \ crack in her human facade. The exchange isn’t just a logistical briefing; it’s\
    \ a subliminal reveal of her latent Q-like abilities, foreshadowing her divergence\
    \ from ordinary humanity. The moment hinges on Riker’s unguarded reaction—his\
    \ brief pause, the flicker of curiosity—suggesting he’s already sensing something\
    \ *off* about her, even if he can’t articulate it yet. The scene’s tension lies\
    \ in the contrast: Amanda’s quiet confidence vs. Riker’s instinctive wariness,\
    \ a dynamic that will later fuel her infatuation with him and his role as her\
    \ unwitting catalyst for self-discovery.\n  "
