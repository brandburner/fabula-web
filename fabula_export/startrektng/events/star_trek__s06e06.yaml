  title: Amanda’s Awkward Affection and Q’s Cruelty
  description: In the medical lab, Amanda’s clumsy attempt to prolong Riker’s company
    reveals her burgeoning romantic attachment—a rare moment of human vulnerability
    in a world where she is increasingly isolated by her Q powers. Her stammered invitation
    for him to stay, followed by Q’s mocking observation of her feelings, underscores
    the tension between her longing for normalcy and her inevitable transformation.
    Meanwhile, Beverly’s discovery that Q accelerated Amanda’s experiment invalidates
    her work, forcing Amanda to confront the consequences of Q’s interference. Q’s
    petty retaliation—briefly transforming Beverly into a dog—demonstrates his disdain
    for human emotions and authority, while Amanda’s horror at his cruelty highlights
    her internal conflict between her Q nature and her moral compass. The scene deepens
    the divide between Amanda’s duality and Q’s manipulative influence, setting up
    her eventual choice between humanity and omnipotence.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e06
  scene_sequence: 17
  sequence_in_scene: 34
  key_dialogue:
  - |-
    AMANDA: You could wait for her here... ?

    RIKER: Just tell her I'll be in Shuttlebay Two.
  - |-
    Q: You're attracted -- to him?

    AMANDA: Of course not...

    Q: I think you are. How repulsive... how can you stand that hair all over his face?
  - |-
    BEVERLY: I needed to know the rates of mitosis. By artificially accelerating them you made the experiment useless. Now I'll have to do it over again.

    Q: Don't be sorry. If she wants to do things the hard way, that's her business.

    BEVERLY: Why did you interfere with what she was doing?

    Q: She's Q... making her plod through human chores is an insult to her.
