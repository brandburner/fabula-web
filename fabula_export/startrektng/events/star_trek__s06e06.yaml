  global_id: null
  title: Q reveals Amanda’s engineered lineage
  description: "\n  In the Observation Lounge, the *Enterprise* crew—Picard, Riker,\
    \ Geordi, Troi, and Beverly—discuss Amanda’s mysterious warp core intervention\
    \ and her adoption history. Q materializes unannounced, wearing a Starfleet uniform,\
    \ and casually admits to orchestrating the warp breach as a test to confirm Amanda’s\
    \ Q heritage. He reveals that her biological parents were Q in human form, who\
    \ conceived her as an ‘amusement’ before becoming emotionally attached. When Beverly\
    \ challenges Q’s motives, he dismisses human attachments as ‘mawkish’ and explains\
    \ that Amanda’s latent powers must be controlled—or she risks catastrophic destruction.\
    \ Picard accuses Q of self-interest, but Q admits he’s acting under pressure from\
    \ the Q Continuum to ‘take precautions.’ Beverly erupts in defense of Amanda’s\
    \ right to choose her own life, while Q smugly asserts his authority to ‘rescue’\
    \ her from humanity. The confrontation escalates until Q abruptly transports Picard\
    \ away for a private discussion, leaving the crew stunned by the revelation of\
    \ Amanda’s engineered origins and Q’s manipulative control over her life.\n  "
