- fabula_uuid: cand_evt_scene_882c851b20a7c509_01
  global_id: null
  title: Picard and Beverly share temporal déjà vu
  description: "\n  In the intimate setting of the Ready Room, Beverly Crusher—exhausted\
    \ and unsettled—confides in Picard about her disorienting déjà vu, triggered by\
    \ the shattering of a glass. She describes hearing disembodied voices and an overwhelming\
    \ sense of having lived this moment before, her distress palpable. Picard, initially\
    \ offering comfort with a cup of steamed milk (a nod to his personal coping mechanisms),\
    \ reveals his own parallel experience: while reading, he felt he had encountered\
    \ certain paragraphs before, dismissing it as a lapse in memory. The exchange\
    \ escalates when Picard voices the unsettling possibility that their conversation\
    \ itself might be part of a repeating temporal loop. Beverly denies familiarity\
    \ with the moment, but the shared unease solidifies their bond and prompts Picard\
    \ to take decisive action. He orders a shipwide diagnostic, targeting the time\
    \ and place of Beverly’s sensory crisis, and schedules a senior staff meeting\
    \ for 0700 hours. The scene marks a critical pivot: Beverly’s personal breakdown\
    \ becomes the catalyst for the crew’s broader realization that the *Enterprise*\
    \ is trapped in a causality loop, demanding urgent investigation. The moment also\
    \ deepens the trust between Picard and Beverly, as their shared vulnerability\
    \ strengthens their professional and personal connection.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e18
  scene_sequence: 12
  sequence_in_scene: 22
  key_dialogue:
  - 'BEVERLY: It was the eeriest feeling. When the glass broke, it triggered the same
    sensation even more intensely— that I had done it all before.'
  - 'PICARD: Earlier, when I was reading this book... I had the distinct feeling I''d
    read certain paragraphs before. I just assumed I''d read the book years ago and
    forgotten.'
  - 'PICARD: Do you feel like we''ve had this conversation before?'
  - 'PICARD: This could be nothing more than a restless night. But let''s be sure...
    Call Geordi and Data. I want you to run a shipwide diagnostic, concentrating on
    the time and place you heard the voices. We''ll discuss the results tomorrow at
    oh seven hundred hours.'
