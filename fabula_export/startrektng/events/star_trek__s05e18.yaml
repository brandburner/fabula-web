  key_dialogue: &id037
  - 'WORF: We are clear of the distortion, Captain.'
  - 'PICARD: Data -- what happened?'
  - 'DATA: At the last moment, I speculated that ''three'' might refer to the number
    of rank insignia on Commander Riker''s uniform. This indicated to me that his
    suggestion was the correct course of action.'
  - 'GEORDI: You must''ve picked up a message we sent from the last loop... and stacked
    the deck in the poker game without realizing it.'
  - 'WORF: Captain -- we are being hailed by the other vessel. The computer identifies
    it as the U.S.S. Bozeman. A Federation starship, Soyuz class.'
  - 'GEORDI: Soyuz Class... they haven''t been in service for over eighty years.'
  - 'PICARD: Captain Bateson... do you know what year it is?'
  - 'BATESON: Of course I do -- it''s twenty-two seventy-eight.'
