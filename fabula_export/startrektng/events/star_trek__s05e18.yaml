  title: Temporal distortion triggers collision crisis
  description: |2-

    The *Enterprise* bridge is already under Red Alert when the temporal distortion reappears, forcing Picard and Riker to confront their helplessness in the causality loop. Picard orders a cautious retreat, but Ro reports the maneuvering thrusters are unresponsive—exposing the ship's vulnerability to the distortion's escalating threat. When the bridge lights flicker and die, emergency lighting reveals a power failure cascading through critical systems, leaving the crew exposed and disoriented.

    Troi's empathic premonition—a visceral, overwhelming urge to flee—triggers Picard's first decisive action of the loop: an evacuation order. Before it can be executed, a starship materializes on a collision course, forcing the crew into a desperate scramble. Riker proposes venting the shuttlebay, but Data's tractor beam solution becomes the crew's last hope. Worf executes the maneuver, but the collision is unavoidable—the starship slams into the *Enterprise*'s starboard nacelle, damaging the ship and confirming the loop's inescapable pattern. The event marks the first concrete acknowledgment of the temporal threat's severity, forcing the crew to accept that their previous attempts to break the cycle have failed, and that more drastic measures are needed.

    The scene functions as both a turning point and a revelation: it confirms the loop's reality, escalates the stakes, and forces Picard to abandon hesitation in favor of decisive action. The collision isn't just a physical disaster—it's a narrative one, proving that the crew's instincts and past strategies are insufficient. The damage to the nacelle also introduces a new variable: the ship's structural integrity is now compromised, raising the question of whether the *Enterprise* can survive another loop.
