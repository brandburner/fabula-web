    description_of_involvement: The bridge consoles flicker and lose power as the
      distortion’s energy surges, their screens displaying cascading error readouts.
      Data and Worf attempt to engage the tractor beam, but the consoles lock out
      every input, symbolizing the crew’s helplessness against the anomaly. The consoles’
      failure forces Data to override Picard’s order, leading to the shuttlebay decompression—a
      desperate but effective solution.
