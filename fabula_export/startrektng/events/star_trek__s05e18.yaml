- fabula_uuid: cand_evt_scene_be3291414f688163_02
  global_id: null
  title: Picard confirms temporal distortions in Sickbay
  description: "\n  In Sickbay, Beverly Crusher reveals to Picard that she and Geordi\
    \ La Forge have been experiencing déjà vu and unexplained temporal anomalies.\
    \ Beverly describes a premonition that led her to anticipate Geordi’s arrival\
    \ with symptoms of an ear infection—only for tests to reveal no infection, but\
    \ instead a phase-shift in his VISOR caused by distortions in the dekyon field.\
    \ Geordi confirms he’s seeing blurry afterimages, and Beverly’s scans detect miniscule\
    \ distortions in the surrounding dekyon field, which his VISOR is translating\
    \ into visual impulses. Picard, who has also experienced déjà vu, orders Geordi\
    \ to investigate the warp field generator and run a subspace scan for anomalies.\
    \ The exchange escalates the crew’s urgency to uncover the temporal mystery, as\
    \ Beverly’s premonition and Geordi’s VISOR malfunction provide the first concrete\
    \ evidence of a temporal causality loop. The scene shifts from individual suspicions\
    \ to a ship-wide investigation, with Picard’s directive marking a turning point\
    \ in the crew’s response to the anomaly.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e18
  scene_sequence: 15
  sequence_in_scene: 33
  key_dialogue: &id017
  - 'BEVERLY: Captain... have you been getting the feeling that you''ve experienced
    certain things before? A sense of... repetition?'
  - 'PICARD: Yes... recently. While I was reading. Why do you ask?'
  - 'BEVERLY: There have been similar incidents reported all over the ship. Feelings
    of déjà vu. And now this... I had a premonition Geordi was going to come in to
    sickbay. A few seconds later, he did -- with the symptoms of an ear infection.
    I was going to run all the standard tests... but somehow I knew they were going
    to be negative. So I ran an optical diagnostic... which traced the problem to
    Geordi''s VISOR... His dizziness is being caused by a phase-shift in his visual
    receptors. It''s causing him to see images that aren''t there...'
  - 'GEORDI: They''re like... blurry afterimages.'
  - 'BEVERLY: I ran a scan to see if I could detect what he was seeing. I picked up
    miniscule distortions in the surrounding dekyon field. Somehow, his VISOR seems
    to be translating those distortions into visual impulses.'
  - 'PICARD: While you''re at it, run a localized subspace scan to look for anything
    unusual.'
