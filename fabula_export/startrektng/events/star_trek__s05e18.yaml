      \ event she cannot rationalize. Her tone is a mix of professional detachment\
      \ and underlying disquiet, betraying her usual confidence. When the sound of\
      \ breaking glass abruptly interrupts the transmission, her voice tightens, though\
      \ she quickly reassures Geordi that she is unharmed. Beverly’s decision to head\
