- fabula_uuid: cand_evt_scene_061e2c745c1f96fe_01
  global_id: null
  title: Temporal Distortion Forces Collision Course
  description: "\n  The *Enterprise* bridge crew, already investigating a temporal\
    \ anomaly, detects a catastrophic space-time distortion too late. As the ship's\
    \ systems fail under the distortion's influence, Picard orders a retreat, but\
    \ the helm and shields are inoperative. Data identifies an energy surge in the\
    \ distortion field, revealing an unidentified starship—later revealed to be the\
    \ *Bozeman*—emerging on a direct collision course. Troi's empathic warning of\
    \ impending doom heightens the urgency, forcing the crew into a desperate scramble\
    \ for solutions. Riker proposes decompressing the shuttlebay to alter the ship's\
    \ trajectory, but Data counters with a tractor beam maneuver, which Picard authorizes.\
    \ The scene escalates from investigation to crisis, underscoring the crew's vulnerability\
    \ to the temporal loop's repeating cycle of destruction and setting up the immediate\
    \ need for a solution to avoid annihilation.\n  "
