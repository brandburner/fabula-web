  key_dialogue: &id029
  - 'GEORDI: Worf refers to a ''distortion.'' If this were a temporal distortion,
    and if we were close enough to it... it''s possible that a large enough explosion
    might''ve ruptured the space-time continuum. We collided... exploded... and got
    stuck in this repeating loop of time.'
  - 'PICARD: We can''t afford to start second-guessing ourselves. We''ll stay on our
    present course until we have reason to change it. In the meantime, let''s do everything
    we can to avoid a collision.'
  - 'GEORDI: Captain... We''ve been seeing the number three all over the ship. On
    consoles... in a poker game... All these ''threes'' can''t be coming up by accident.'
  - 'RIKER: Maybe somebody''s trying to tell us something.'
