  title: Collision course and failed evasion
  description: "\n  The *Enterprise* bridge crew scrambles to respond to an emerging\
    \ temporal distortion that materializes as a 23rd-century starship on a direct\
    \ collision course. Picard orders evasive maneuvers, but the helm and shields\
    \ fail, leaving the ship vulnerable. Riker proposes a desperate shuttlebay decompression\
    \ to alter their trajectory, but Data counters with a tractor beam solution—one\
    \ Picard authorizes. The crew’s urgency escalates as the ship’s systems degrade\
    \ under the distortion’s influence, and Troi’s empathic warning of impending doom\
    \ underscores the existential threat. The moment crystallizes the crew’s helplessness\
    \ against the loop’s inescapable mechanics, with Picard’s decision to override\
    \ Riker’s risky proposal reflecting his leadership under pressure: prioritizing\
    \ calculated risk over reckless improvisation, even as the clock ticks toward\
    \ impact.\n  "
