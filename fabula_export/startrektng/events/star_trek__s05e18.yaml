acts:
- fabula_uuid: act_9f01d1e0417abdae
  number: 1
  summary: The narrative opens with the USS Enterprise's catastrophic destruction
    in the Typhon Expanse, establishing the dire stakes. Following this explosive
    prologue, the timeline resets, and Captain Picard's log introduces the Enterprise's
    mission to chart the unexplored region. The crew engages in a routine poker game,
    where Dr. Beverly Crusher's intuitive win over Commander Riker foreshadows her
    later role in deciphering unusual patterns. Shortly after, Commander Geordi La
    Forge visits sickbay with unexplained dizziness, prompting Dr. Crusher to experience
    an unsettling sense of déjà vu, a feeling she dismisses despite its persistence.
    Later, alone in her quarters, Dr. Crusher hears faint, disembodied voices, culminating
    in her accidentally breaking a glass. She reports these anomalies, but ship sensors
    detect nothing unusual. The crew then encounters a highly localized space-time
    distortion. As they approach, ship systems fail, and a mysterious starship emerges
    on a collision course. Picard, acting on Data's recommendation, orders a tractor
    beam to alter the other ship's trajectory. This attempt fails, leading to a direct
    collision that replicates the Enterprise's initial destruction, thus revealing
    the cyclical nature of their predicament. This act establishes the initial loop,
    introduces the core mystery of the déjà vu and voices, and ends with the first
    confirmed repetition of the disaster, trapping the crew in a temporal causality
    loop.
