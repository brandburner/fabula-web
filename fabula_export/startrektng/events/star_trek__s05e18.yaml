  title: Data delivers catastrophic damage assessment
  description: 'As the *Enterprise* shudders violently in the temporal loop, Data
    processes the ship''s catastrophic damage with android precision, confirming the
    starboard nacelle is venting plasma—a critical structural failure. Beverly''s
    grim report of widespread casualties forces Data to deliver a stark, technical
    verdict: the ship is critically compromised. Riker immediately issues an evacuation
    order, escalating the crew''s desperation to break the loop before total destruction.
    The scene functions as a turning point, where the crew''s survival instincts clash
    with their need to solve the temporal paradox, raising the stakes for the entire
    mission. Data''s clinical assessment contrasts with the crew''s mounting panic,
    underscoring the urgency of their situation.'
