  title: Collision Course and Temporal Break
  description: The *Enterprise* crew detects a localized space-time distortion that
    rapidly escalates into a catastrophic collision threat. As the bridge loses power
    and systems fail, the crew scrambles to evade an oncoming starship, with Picard
    and Riker proposing conflicting solutions—Riker advocating for decompressing the
