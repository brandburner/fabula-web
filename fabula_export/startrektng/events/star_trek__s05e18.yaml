    \ retaining memory between iterations. Using a causality loop diagram, Geordi\
    \ explains how the loop resets everything, erasing prior knowledge each cycle.\
    \ Data then reveals his analysis of Beverly’s earlier recording, isolating three\
    \ critical voice fragments: Worf’s warning about a temporal distortion, Data’s\
    \ own alert of an impending collision, and Picard’s order to abandon ship. This\
    \ evidence confirms the crew’s catastrophic fate unless they intervene. When Picard\
    \ suggests avoiding the collision to escape the loop, Geordi counters that they\
    \ risk forgetting everything if the loop resets. He proposes encoding mission-critical\
    \ data into dekyon emissions—a method to transmit knowledge directly to Data’s\
