  title: Déjà vu reveals temporal loop
  description: During a routine poker game in Riker’s quarters, Beverly Crusher, Worf,
    and Riker experience an unsettling wave of déjà vu that allows them to predict
    Data’s card deals with eerie accuracy. Beverly’s initial suspicion escalates as
    she and Worf take turns calling the next cards before they’re revealed, their
    predictions matching perfectly. Riker soon joins in, confirming the phenomenon
    isn’t isolated. Data, analyzing the statistical impossibility of the event, declares
    it a temporal anomaly. Beverly’s urgency spikes—she interrupts the game to contact
    sickbay, seeking Geordi La Forge, marking the first concrete step toward investigating
    the repeating causality loop. The scene shifts from casual camaraderie to tense
    revelation as the crew begins to grasp they’re trapped in a temporal distortion,
    with Beverly’s proactive action foreshadowing her role in breaking the cycle.
