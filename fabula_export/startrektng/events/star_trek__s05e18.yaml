  title: Beverly’s déjà vu disrupts routine exam
  description: "\n  Beverly Crusher examines Geordi La Forge for dizziness, initially\
    \ attributing it to stress or overwork. As she prepares a hypospray, she’s struck\
    \ by an unsettling sense of déjà vu—the conversation, the symptoms, even the act\
    \ of administering the medication all feel eerily familiar. When Geordi insists\
    \ this is his first episode, her lingering doubt hints at a deeper anomaly, foreshadowing\
    \ the temporal loop’s distorting effects on memory. The moment marks the first\
    \ crack in the crew’s perception of linear time, as Beverly’s medical intuition\
    \ clashes with Geordi’s certainty, setting the stage for the crew’s eventual realization\
    \ of the repeating cycle. The scene’s tension lies in Beverly’s unspoken unease:\
    \ her professional confidence wavers as she questions whether her own memory—or\
    \ reality itself—can be trusted.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e18
  scene_sequence: 4
  sequence_in_scene: 8
  key_dialogue:
  - 'GEORDI: At first I thought the catwalk was spinning. Turns out it was me. I''m
    lucky Ensign Fletcher was there to grab me -- it''s a long way down to the bottom
    of the warp core.'
  - 'BEVERLY: You have all the symptoms of an inner-ear infection. That would explain
    your dizziness... and the headache. But I don''t see any physical evidence. My
    guess is... you''ve been working too hard.'
  - |-
    BEVERLY: Geordi... have you ever had these symptoms before?
    GEORDI: Never.
    BEVERLY: You're sure?
    GEORDI: Positive. Why?
    BEVERLY: It's funny... I get the feeling that we've discussed these complaints. I remember giving you a hypospray for dizziness.
