  title: Beverly discovers Geordi’s VISOR phase-shift
  description: "\n  Beverly Crusher examines Geordi La Forge in sickbay after he reports\
    \ dizziness and near-accidents, initially diagnosing an inner-ear infection. As\
    \ she prepares to treat him, both experience a sudden, disorienting sense of déjà\
    \ vu—they realize they’ve had this exact conversation before. Beverly cross-references\
    \ medical logs and finds no record of Geordi’s dizziness, despite both recalling\
    \ a prior examination. Suspicious, she runs an optical diagnostic on his VISOR\
    \ and detects an anomalous phase-shift in his visual receptors, suggesting temporal\
    \ distortion. The discovery implicates Geordi’s VISOR as a potential vector for\
    \ the causality loop, raising stakes for the crew’s ability to interpret past\
    \ messages and escape the repeating cycle. The moment marks a critical shift from\
    \ subjective déjà vu to objective evidence of temporal corruption, forcing Beverly\
    \ and Geordi to confront the unnatural repetition of their actions and the urgency\
    \ of breaking free before the next collision.\n  "
