  title: Riker orders emergency evacuation
  description: As the *Enterprise* spirals toward destruction in the temporal loop,
    the bridge crew scrambles to contain catastrophic system failures. Data confirms
    the starboard nacelle is venting plasma, while Ro reports inertial dampers failing
    and attitude control lost. Geordi initiates an emergency core shutdown to prevent
    a warp core breach, but the damage is already irreversible. With the ship’s systems
    collapsing and casualties mounting, Riker issues the critical order for all hands
    to abandon ship via escape pods. The command underscores the crew’s desperation
    to break the loop before the inevitable collision, marking a turning point where
    survival becomes the immediate priority over solving the temporal anomaly. The
    tension escalates as the crew’s helplessness contrasts with their earlier analytical
    focus, forcing a shift from problem-solving to survival mode.
