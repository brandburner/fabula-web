      undeniable proof of the temporal loop, bridging the gap between theory and evidence.
      The console’s beeps and hums underscore the urgency of the moment, its sterile
      efficiency contrasting with the crew’s growing dread.'
    status_before_event: Idle, awaiting input, its panels dark.
    status_after_event: Active, displaying audio waveforms and replaying the critical
