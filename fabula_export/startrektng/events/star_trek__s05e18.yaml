    description_of_involvement: The *Enterprise* shields are inoperative when the
      temporal distortion strikes, stripping away the energy barrier that normally
      guards the hull. Worf announces the failure amid red alert klaxons, while Ro
      confirms thruster outages. Picard watches the readouts drop to zero as the *Bozeman*
