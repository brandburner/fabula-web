  title: Beverly exposes Riker’s poker bluff
  description: "\n  In a high-stakes poker game aboard the *Enterprise*, Beverly Crusher\
    \ outmaneuvers Will Riker by calling his overconfident bluff, revealing his tell—a\
    \ subtle eyebrow twitch—and securing a decisive victory. The moment underscores\
    \ Beverly’s sharp intuition and Riker’s tendency to overplay his hand, a dynamic\
    \ that contrasts with the crew’s broader struggle against the temporal causality\
    \ loop. As the game escalates, Data’s precise dealing and Worf’s discomfort with\
    \ the stakes create a tense, character-driven interlude. The playful banter between\
    \ Beverly and Riker masks deeper professional respect, while the abrupt interruption\
    \ by Nurse Ogawa—summoning Beverly to sickbay—shifts the scene from camaraderie\
    \ to crisis, reinforcing the temporal loop’s urgency. The poker game serves as\
    \ a microcosm of the crew’s relationships under pressure, where personal rivalries\
    \ and trust are tested even as the ship’s fate hangs in the balance.\n  "
