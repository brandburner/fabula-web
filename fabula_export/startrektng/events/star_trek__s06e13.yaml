  global_id: null
  title: Riker and Worf confront Aquiel over the phaser
  description: In Aquiel’s quarters aboard the Enterprise, Riker and Worf interrogate
    her about a lethal phaser discovered in her shuttlecraft—set to a deadly discharge
    and linked to her violent confrontation with Rocha. Aquiel’s evasive responses,
    including claims of self-defense and memory loss, unravel under Riker’s methodical
    questioning, while Worf’s forensic observations reveal the weapon’s sustained
    fire pattern, exposing premeditation. Geordi, protective of Aquiel, challenges
    the phaser’s role as the murder weapon, suggesting a Klingon disruptor instead,
    but his intervention only heightens the tension. The exchange escalates suspicions
    about Aquiel’s true motives, deepening the mystery surrounding the relay station’s
    deadly events and foreshadowing the impending confrontation with Commander Morag.
    The scene serves as a turning point, shifting focus from external Klingon threats
    to internal Starfleet culpability, while Geordi’s emotional bias complicates the
    investigation’s objectivity.
