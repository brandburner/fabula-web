  title: Beverly reveals coalescent organism theory
  description: 'In Sickbay, Beverly Crusher presents her analysis of the melted organic
    residue from Relay Station 47, revealing it formed a perfect DNA replica of her
    hand. She theorizes the substance is a coalescent organism—a rare, microscopic
    lifeform that absorbs other organisms to survive, taking on their cellular structure.
    The crew realizes this explains Lieutenant Rocha’s disappearance and the attack
    on the station: the organism likely absorbed Rocha before reaching the station,
    then needed a new host (Uhnari or Morag). The revelation shifts the investigation
    from Klingon sabotage to a biological threat, prompting Picard to order the immediate
    tracking of both suspects. The discovery forces the crew to confront the terrifying
    possibility that one of their own—either Uhnari or Morag—may no longer be human
    but an alien entity in disguise. The tension escalates as Riker and Worf split
    to intercept the suspects, while the crew grapples with the implications of a
    shapeshifting predator aboard the station—or worse, on the *Enterprise* itself.'
