  - 'RIKER: We found your DNA on the consoles, and on the bulkheads... we know you
    were there.'
  - 'DATA: Commander Morag, we have discovered that the encrypted message bank on
    the station has been tampered with. Our analysis indicates that twenty-seven priority
    Starfleet messages are missing.'
  - 'MORAG: ((grudgingly)) Yes... I did take the messages...'
  - 'PICARD: Did you kill Lieutenant Rocha?'
  - 'MORAG: No. There was no one there. I saw blood... and signs of a struggle. I
    took the codes, but I killed no one.'
