    up drifting through space.'
  - 'AQUIEL (V.O.): -- I had the dream again. Mother is calling out my name... she''s
    somewhere in the house... I get to the top of the hill all right... but then the
    house is slanted... I''m still walking uphill. I can''t find her... doors everywhere
    and they all look the same...'
