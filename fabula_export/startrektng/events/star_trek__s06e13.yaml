  object_involvements:
  - object_uuid: ger_object_266d17e840af
    description_of_involvement: '*The Fatal Revenge* plays a pivotal role in this
      scene as a tangible artifact of Aquiel Uhnari’s personality and tastes. Geordi
      is seen reading the book at her desk, reacting with a shudder to its content—a
      visceral response that reveals his growing familiarity with her and his curiosity
      about her life. The book’s presence on her nightstand, splayed open under dim
      light, suggests it was a recent or significant read for her, possibly reflecting
      her dark humor or her fascination with morally ambiguous stories. Geordi’s internal
      monologue (''How could she read this stuff...?'') underscores the book’s role
      as a clue to her character, humanizing her beyond the cold facts of the investigation.
      It also serves as a narrative device, drawing Geordi (and the audience) into
      her world and deepening the emotional stakes of the mystery.'
    status_before_event: Lying open on Aquiel Uhnari’s nightstand, pages splayed under
      dim light amid personal clutter, including Maura the dog’s area. It is one of
      the first objects Geordi notices upon entering her quarters, and it remains
      untouched until he picks it up to read.
    status_after_event: Put down by Geordi when Riker enters, left open on the desk.
      Its role as a character-revealing artifact is fulfilled, but it remains in the
      quarters as a silent testament to Uhnari’s personality.
    global_id: ger_object_266d17e840af
  - object_uuid: ger_object_867d0d5467a7
    description_of_involvement: 'Aquiel Uhnari’s personal logs are the emotional and
      investigative core of this scene. Geordi accesses them using a device with an
      optical conduit, immersing himself in her voice, her struggles, and her intimate
      details—her family, her nightmares, her defiance of Keith Rocha’s orders, and
      her cultural ties to Hahlia. The logs serve multiple narrative functions: they
      humanize Uhnari, making her more than a victim or a suspect; they reveal her
      vulnerability and resilience, deepening the audience’s empathy; and they introduce
      critical investigative clues, such as her nightmares and her tensions with Rocha.
      The logs’ abrupt static distortion at the end adds a layer of mystery, suggesting
      that her story—and possibly her death—was cut short. Geordi’s emotional reaction
      to the logs (his attachment, his introspection) is mirrored by Maura the dog’s
      nuzzling of his hand, creating a poignant moment of shared grief between man
      and beast.'
    status_before_event: Stored on a device in Aquiel’s quarters, accessible via the
      computer terminal. The logs are intact but fragmented, with some entries (like
      Rocha’s) missing or corrupted due to the cascade effect from the encrypted messages.
    status_after_event: Partially reviewed by Geordi, with the most personal and revealing
      entries now imprinted in his memory. The logs remain on the device, but their
      emotional impact lingers, shaping Geordi’s investigation and his personal connection
      to Uhnari.
    global_id: ger_object_867d0d5467a7
