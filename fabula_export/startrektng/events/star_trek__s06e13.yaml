  title: Picard interrupts Riker with Klingon arrival
  description: "\n  In Aquiel Uhnari’s quarters aboard Relay Station 47, Geordi La\
    \ Forge is immersed in her personal logs, uncovering intimate details about her\
    \ life—her Hahliian heritage, her sister Shianna, her love of muskan seed punch,\
    \ and her 'unique' sense of humor. His growing emotional attachment to the presumed-dead\
    \ officer is evident as he casually refers to her by her first name, a slip that\
    \ Riker notices with quiet skepticism. Geordi’s technical investigation into the\
    \ station’s corrupted logs reveals a cascade failure that erased Rocha’s files,\
    \ suggesting deliberate tampering. The moment is interrupted when Picard’s com\
    \ signal summons Riker to the Observation Lounge, where Klingon Governor Torak\
    \ has arrived unannounced aboard the *Enterprise*. This abrupt pivot shifts the\
    \ narrative from forensic investigation to high-stakes diplomacy, forcing Riker\
    \ to abandon the scene and leaving Geordi’s emotional investment in Aquiel—and\
    \ the unresolved mystery of Rocha’s logs—hanging in the air. The interruption\
    \ underscores the tension between personal curiosity and professional duty, while\
    \ the Klingon arrival introduces a potential diplomatic crisis that could derail\
    \ the investigation entirely.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e13
  scene_sequence: 9
  sequence_in_scene: 21
  key_dialogue: &id027
  - 'GEORDI: I''ve managed to access all of Lieutenant Uhnari''s logs. I''m looking
    for Rocha''s now. Whatever happened to the encrypted messages had a cascade effect
    on the whole storage system, and I can''t find any of his files.'
  - 'RIKER: Maybe Rocha didn''t make the official logs... Uhnari might have been responsible
    for them.'
  - 'GEORDI: I don''t think so. Aquiel was the junior officer.'
  - 'RIKER: Aquiel?'
  - 'GEORDI: Lieutenant Uhnari. I was up all night watching her personal logs... I
    guess I''m starting to feel like I know her.'
  - 'RIKER: What was she like?'
  - 'GEORDI: Well... she was Hahliian... she had one sister, named Shianna... she
    drank muskan seed punch... she had a sense of humor that I could only describe
    as... ''unique.'' She loved to sing... and read... books of questionable taste.'
  - 'PICARD: The Klingon ship Qu''Vat has arrived with Governor Torak. Please report
    to the Observation Lounge.'
  - 'RIKER: On my way, sir.'
  is_flashback: false
  location_uuid: ger_location_e52408ebd409
