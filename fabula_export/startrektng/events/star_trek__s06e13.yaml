      sentience, demonstrating the organism’s ability to infiltrate and replace its
      victims at a fundamental level. This eerie display serves as a warning: if the
      coalescent can replicate Beverly’s hand, it can replicate any living being,
      making it an unseen, shape-shifting enemy. The replica becomes a symbol of the
      organism’s danger, driving the crew’s urgency to stop it before it claims another
      host.'
