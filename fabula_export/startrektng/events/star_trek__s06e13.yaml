  title: Picard orders covert Klingon investigation
  description: 'In Sickbay, Beverly Crusher uses micro-vaporization to extract DNA
    from the fused cellular residue of Aquiel Uhnari’s remains, confirming her death
    was caused by a high-level phaser blast—likely Klingon in origin. Picard and Riker
    discuss the implications: the proximity to Klingon space, the tampered encrypted
    messages Geordi discovered, and the unresolved disappearance of Lieutenant Rocha.
    Picard, wary of provoking a diplomatic incident, orders Riker to retrieve Rocha’s
    personnel file and discreetly initiate a search for the missing shuttle. Beverly’s
    reminder of Rocha’s fate underscores the urgency, framing this as the first critical
    step in uncovering a potential interstellar crisis before it escalates. The scene
    establishes Picard’s cautious leadership, Riker’s investigative instincts, and
    the looming threat of Klingon involvement, while also deepening the mystery of
    the relay station incident.'
