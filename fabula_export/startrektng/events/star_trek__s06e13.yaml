  title: Geordi challenges the phaser evidence
  description: In Aquiel’s quarters aboard the *Enterprise*, Riker and Worf interrogate
    Aquiel about a type-2 phaser found in her shuttlecraft—set to lethal discharge—while
    Geordi observes. Aquiel, visibly shaken, claims memory loss but admits the weapon
    could have been hers, though she denies premeditation. Riker reveals the phaser’s
    sustained fire pattern (30–40 seconds) contradicts self-defense, deepening suspicion.
    Geordi intervenes, arguing the burn pattern on Rocha’s remains doesn’t match a
    phaser but instead aligns with a Klingon disruptor, casting doubt on the official
    narrative. His technical objection shifts focus from Aquiel’s guilt to alternative
    explanations, including Klingon involvement. Riker, though skeptical, allows Geordi
    to revisit Rocha’s logs, signaling a pivot in the investigation. The exchange
    underscores Geordi’s protective bias toward Aquiel while exposing tensions between
    forensic evidence and diplomatic implications as Commander Morag’s arrival looms.
