- fabula_uuid: cand_evt_scene_2fae2b0e1854798c_01
  global_id: null
  title: Geordi forces Aquiel’s confession
  description: Geordi La Forge confronts Aquiel Uhnari in the relay station’s ops
    center, presenting irrefutable evidence that she deleted Lieutenant Rocha’s personal
    file—a file containing a letter accusing her of insubordination. Aquiel, cornered,
    admits to the deletion but insists she acted out of fear of being framed for Rocha’s
    murder. The revelation exposes her desperation and moral ambiguity, while Geordi’s
    growing suspicion clashes with his lingering trust in her. The scene escalates
    into a tense standoff, with Aquiel’s defensive posture and Geordi’s measured but
    firm questioning laying bare the fragility of their bond and the deeper conspiracy
    at play. The confrontation forces Aquiel to confront her own complicity in the
    cover-up, while Geordi’s role as investigator and potential ally becomes increasingly
    fraught with conflict. The moment serves as a turning point, shifting the investigation
    from external threats (Klingons, the coalescent organism) to internal distrust
    and the unraveling of Aquiel’s credibility.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e13
  scene_sequence: 24
  sequence_in_scene: 48
  key_dialogue: &id043
  - 'GEORDI: "Last night, after I dropped you off at your quarters... you established
    a subspace link with this console... You deleted some of Rocha''s personal file...
    didn''t you?"'
  - 'AQUIEL: "Yes... I did."'
  - 'GEORDI: "Why?"'
  - 'AQUIEL: "I found... a letter Rocha was planning to send to Starfleet Command...
    about me. The letter said I had become belligerent... and insubordinate. He was
    going to ask for a formal hearing."'
  - 'AQUIEL: "I didn''t kill him."'
  - 'GEORDI: "Then explain this..."'
  - 'AQUIEL: "I was afraid if they found the letter... I''d be blamed for the murder.
    I''m not a model officer, I realize that. Sometimes I act on impulse instead of
    thinking things through..."'
