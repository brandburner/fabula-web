    emotional_state: A rapid descent from righteous indignation to uncertainty, then
      to grudging cooperation, and finally to abject humiliation as his lies unravel
      and his superior abandons him.
    goals:
    - Avoid admitting to any wrongdoing to preserve his honor and avoid repercussions
      from Torak or the Klingon Empire.
    - Shift blame or create doubt about the evidence to escape custody and return
      to his ship.
    what_happened: Morag begins the scene in a state of outraged defiance, his Klingon
      pride on full display as he vehemently denies any involvement in Rocha’s death.
      As the evidence mounts—his DNA on the consoles, the tampered message bank, and
      the missing encrypted messages—his bluster falters, revealing a desperate man
      grasping at excuses. His attempt to flee is thwarted by Torak’s betrayal and
      the Klingon guard’s physical blockade, forcing him into a grudging admission
      of theft. By the end, he is a humiliated figure, his earlier bravado replaced
      by a crestfallen demeanor as Worf leads him away.
