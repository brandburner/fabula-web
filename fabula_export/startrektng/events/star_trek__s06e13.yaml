  global_id: null
  title: Riker interrogates Aquiel over phaser evidence
  description: In Aquiel’s quarters aboard the Enterprise, Commander Riker leads a
    methodical interrogation of Aquiel Uhnari, probing her about a type-2 phaser found
    in her shuttlecraft—set to lethal level ten—while Worf presses her on her history
    of conflict with the presumed victim, Keith Rocha. Aquiel, visibly shaken, struggles
    to recall details of the attack, her defensive posture and fragmented memory raising
    suspicion. Geordi La Forge interjects, challenging the phaser’s plausibility as
    the murder weapon and suggesting a Klingon disruptor might better explain the
    molecular damage. Riker, though measured, subtly shifts focus to Commander Morag’s
    impending arrival, signaling a strategic pivot in the investigation. The exchange
    underscores Aquiel’s vulnerability, Geordi’s protective bias, and the crew’s growing
    tension as diplomatic and forensic pressures collide. The scene ends with Geordi’s
    request to re-examine Rocha’s logs—a move that hints at his determination to uncover
    the truth, despite Riker’s implicit warning about emotional involvement.
