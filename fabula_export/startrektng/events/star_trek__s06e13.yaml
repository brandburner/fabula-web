  title: Aquiel’s Memory and Klingon DNA Reveal
  description: 'In the Observation Lounge, Aquiel recounts her harrowing attack by
    Rocha, her fragmented memory, and her 46-hour disappearance, while the crew’s
    skepticism grows. Riker probes her about accessing the weapons locker, exposing
    her uncertainty. Worf’s revelation of Klingon DNA at the crime scene triggers
    Torak’s defensive outburst, escalating tensions. Picard secures permission to
    interrogate Commander Morag, but the scene ends with Geordi hinting at a hidden
    witness—Maura—awaiting Aquiel, deepening the mystery. The confrontation forces
    the crew to confront conflicting narratives: Aquiel’s trauma, the Klingons’ denial,
    and the unresolved question of who—or what—is truly responsible for the relay
    station’s destruction. The event serves as a turning point, shifting focus from
    Aquiel’s guilt to the Klingons’ potential involvement while planting the seed
    for the organism’s eventual reveal.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e13
  scene_sequence: 11
  sequence_in_scene: 26
  key_dialogue: &id031
  - 'AQUIEL: We were running a level two diagnostic of the message buffer... nothing
    special. Rocha had been on edge all morning, but he''d been irritable ever since
    he got there, so I didn''t think anything of it... We were mid-way through the
    procedure... and suddenly... he attacked me... He grabbed me... and threw me against
    the port bulkhead... I yelled at him to stop, but he wouldn''t listen. He took
    me by the throat... I broke free and tried to get to the weapons locker... I''m
    not sure what happened next... but somehow I got aboard the shuttle and left...'
  - |-
    RIKER: You said you tried to get to the weapons locker... is it possible that you did?
    AQUIEL: No, I... I didn't.
    RIKER: You're sure?
    AQUIEL: I don't... exactly remember everything after he attacked me...
  - |-
    TORAK: You still try to blame us!
    WORF: Have the courage to admit your mistakes. Or are you a lo'Be Vos?
    TORAK: At least I do not wear the uniform of a P'tak!
    PICARD: Governor Torak... we are merely exploring all the possibilities. Lieutenant Uhnari's logs said Commander Morag was harassing the station...
    TORAK: He was doing his job!
    PICARD: If he was only doing his job, then I'm sure you won't mind if we speak to him.
