- fabula_uuid: act_284568c6243b1763
  number: 4
  summary: 'The discovery of the phaser set to kill in Aquiel''s shuttle intensifies
    the investigation, with Riker, Worf, and Geordi confronting her. Aquiel maintains
    her memory loss, suggesting she might have grabbed the phaser in self-defense,
    but Riker''s insistence on the sustained discharge required for the damage casts
    doubt on her claim. Geordi, protective of Aquiel, attempts to deflect the accusations,
    questioning the phaser''s capability and the lack of definitive proof. Riker,
    concerned about Geordi''s growing personal involvement, warns him against letting
    his feelings cloud his judgment, leading to a heated exchange. Determined to find
    more evidence, Geordi returns to the relay station and successfully accesses Rocha''s
    personal logs, only to discover a suspicious gap: several entries for Stardate
    46460 have been deleted. A command trace fails to identify the culprit. Concurrently,
    Commander Morag is brought aboard the Enterprise for questioning. Despite initial
    denials, Morag admits to boarding the station and taking encrypted messages but
    steadfastly denies any involvement in a murder, claiming the station was empty
    when he arrived. Back on the relay station, Geordi confronts Aquiel with the deleted
    logs. She confesses to deleting a message from Rocha that accused her of belligerence
    and insubordination, fearing it would incriminate her in his death. Overwhelmed
    by fear and the mounting evidence against her, Aquiel attempts to flee, but Geordi
    stops her, offering comfort and a promise to help, leading to a passionate kiss.
    Meanwhile, in Sickbay, Beverly''s continued analysis of the melted residue yields
    a shocking breakthrough: when infused with a resonance frequency burst, the organic
    fluid remarkably transforms into a perfect replica of her own hand, hinting at
    a bizarre biological phenomenon.'
