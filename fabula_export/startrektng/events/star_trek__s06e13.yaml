- fabula_uuid: cand_evt_scene_9fd6af7c4e56a847_01
  global_id: null
  title: Geordi admits reviewing Aquiel’s logs
  description: In Ten Forward, Geordi and Aquiel share a rare moment of cultural connection
    over Muskan seed punch, their guarded rapport softening as Geordi reveals his
    fluency in Hahliian. The warmth evaporates when Aquiel realizes Geordi has reviewed
    her private logs—an admission that forces him to justify his actions as part of
    the murder investigation. Her initial discomfort gives way to dark humor, briefly
    defusing the tension, but Geordi’s probing questions about her relationship with
    Rocha expose the deeper fractures in their dynamic. The exchange leaves Aquiel
    feeling exposed and Geordi grappling with the ethical cost of his professional
    duty, while hinting at the complexity beneath her guarded exterior. The scene
    marks a turning point in their relationship, shifting from fragile trust to irrevocable
    tension as the investigation’s demands collide with personal intimacy.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e13
  scene_sequence: 13
  sequence_in_scene: 29
  key_dialogue:
  - 'AQUIEL: Have you ever tried Muskan seed punch?'
  - 'GEORDI: Yeah... it nearly made me sick.'
  - 'AQUIEL: You have to be raised on it. It''s very nutritious... and the taste grows
    on you.'
  - 'GEORDI: ((in Hahliian)) Batar al nalia.'
  - 'AQUIEL: You speak Hahliian?'
  - 'GEORDI: ((shrugs)) Nelo, nelo...'
  - 'AQUIEL: Your accent is wonderful... almost flawless.'
  - 'GEORDI: Thanks... I''ve always had a knack for languages... probably because
    my folks moved around so much...'
  - 'AQUIEL: We never travelled. My family has lived in the same house for five generations.'
  - 'GEORDI: The one on the hill?'
  - 'AQUIEL: How did you know about that... ?'
  - 'GEORDI: Well... to be honest... when we thought you were dead... I had to review
    your logs... and your personal correspondence... for any possible clues about
    what happened.'
  - 'AQUIEL: ((quiet)) All of it?'
  - 'GEORDI: Most of it.'
  - 'AQUIEL: I''m sorry... it''s just that... I say things to my sister that I wouldn''t
    say to anyone else. I guess I''m feeling a little... exposed.'
  - 'GEORDI: I''d feel the same way.'
  - 'AQUIEL: Especially if I''d seen you in a (TECH) wig...'
  - 'GEORDI: I''m not sure. The woman I saw on those logs is very complicated. I think
    there''s more to you than meets the eye, Lieutenant.'
  - 'AQUIEL: In what way... ?'
  - 'GEORDI: Your relationship with Rocha, for example. He''d only been there five
    days... but there was already a lot of friction... and you almost seemed to delight
    in doing things that would upset him. Why would you take on extra com traffic...
    when you knew it would make him angry?'
  - 'AQUIEL: Is that a personal question? Or part of a murder investigation?'
  - 'GEORDI: I don''t know. Maybe both.'
  - 'AQUIEL: Keith Rocha was obnoxious from the minute he reported for duty. He treated
    me as though I were beneath contempt. I dealt with him the best way I could. I
    felt like I had to battle him just to hold my own. But that doesn''t mean I wanted
    him dead.'
  - 'GEORDI: Why do you think he attacked you?'
  - 'AQUIEL: I don''t know.'
