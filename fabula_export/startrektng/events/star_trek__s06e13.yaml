    description_of_involvement: The ops console monitor serves as the undeniable proof
      of Aquiel’s tampering, its screen displaying the glaring gaps in the logs where
      Rocha’s personal file should be. Geordi uses it as a visual anchor for his confrontation,
      directing Aquiel’s attention to the evidence with a simple gesture. The monitor’s
      stark, unblinking display amplifies the tension, forcing Aquiel to confront
      the reality of her actions. Its role is both functional—providing the evidence—and
      symbolic, representing the cold, institutional truth that Aquiel has tried to
      erase.
    status_before_event: Functional and displaying complete logs before Aquiel’s tampering;
