  title: Beverly confirms phaser blast killed Uhnari
  description: "\n  In Sickbay, Beverly Crusher and a medical technician use micro-vaporization\
    \ to extract DNA from the fused cellular residue on the deckplate where Aquiel\
    \ Uhnari was presumed killed. The procedure reveals molecular traces consistent\
    \ with a high-level phaser blast, though Beverly acknowledges a Klingon disruptor\
    \ could also be responsible. Picard and Riker observe the process, with Riker\
    \ noting the proximity to Klingon space and the tampered encrypted messages Geordi\
    \ discovered. Picard, wary of provoking a diplomatic incident, orders Riker to\
    \ retrieve Rocha’s personnel file and initiate a search for the missing shuttle.\
    \ The exchange underscores the escalating tension between the Federation and the\
    \ Klingons, while the forensic confirmation of Uhnari’s death deepens the mystery\
    \ surrounding her fate and Rocha’s disappearance. Beverly’s reminder of the unresolved\
    \ questions about Rocha’s whereabouts reinforces the urgency of the investigation,\
    \ framing this moment as a critical turning point in the case.\n  "
