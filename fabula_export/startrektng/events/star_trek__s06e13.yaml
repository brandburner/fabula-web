  title: Picard detains Morag under murder suspicion
  description: "\n  In the observation lounge, Picard and his senior staff confront\
    \ Commander Morag with forensic evidence linking him to Relay Station 47—his DNA\
    \ found on consoles and the message control module. Morag initially denies involvement,\
    \ but under pressure from Torak and the Klingon N.D., he admits to tampering with\
    \ encrypted Starfleet messages. When pressed about Lieutenant Rocha’s murder,\
    \ he claims innocence, describing blood and signs of a struggle but no bodies.\
    \ Picard, unimpressed, orders Morag’s detention until the investigation concludes.\
    \ Torak, prioritizing diplomatic damage control, reluctantly agrees. Worf escorts\
    \ a defeated Morag away, escalating the Klingon conspiracy angle and deepening\
    \ the crew’s distrust of their guests. The scene pivots from accusation to confinement,\
    \ with Morag’s admission of message theft exposing his duplicity while leaving\
    \ Rocha’s fate—and the true killer—unresolved.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e13
  scene_sequence: 23
  sequence_in_scene: 47
  key_dialogue:
  - 'MORAG: I killed no one!'
  - 'RIKER: We found your DNA on the consoles, and on the bulkheads... we know you
    were there.'
  - 'MORAG: Yes... I was there. My patrol route takes me near the station every six
    days. Three days ago I hailed them and there was no response. I was... concerned.'
  - 'PICARD: Did you kill Lieutenant Rocha?'
  - 'MORAG: No. There was no one there. I saw blood... and signs of a struggle. I
    took the codes, but I killed no one.'
  - 'PICARD: Governor, we would like Commander Morag to remain aboard the Enterprise
    until our investigation is complete.'
  - 'TORAK: Take him.'
