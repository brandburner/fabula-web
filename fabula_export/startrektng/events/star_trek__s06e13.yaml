- fabula_uuid: cand_evt_scene_896efef6499e7cb4_01
  global_id: null
  title: Beverly proposes DNA reconstruction technique
  description: "\n  In Sickbay, Beverly Crusher isolates cellular residue from the\
    \ melted deckplate of Relay Station 47, revealing severe DNA destabilization that\
    \ defies conventional explanation. Her tricorder scans confirm the damage is too\
    \ extensive for standard analysis, forcing her to propose an experimental solution:\
    \ a resonance frequency burst to reconstruct the DNA. Picard questions whether\
    \ a prolonged phaser blast could cause such disruption, but Beverly clarifies\
