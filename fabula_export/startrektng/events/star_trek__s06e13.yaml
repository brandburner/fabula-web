  title: Riker reveals missing phaser implicating Uhnari
  description: In the Ready Room, Riker presents Captain Picard with Lieutenant Keith
    Rocha’s pristine personnel file, contrasting it with Aquiel Uhnari’s contentious
    reputation and her own account of events at Relay Station 47. Riker’s skepticism
    deepens when he reveals Worf’s discovery of a missing phaser from the station’s
    weapons locker—a critical piece of evidence that directly implicates Uhnari in
    the officer’s death. Picard, though cautious, authorizes Riker to search Uhnari’s
    shuttle for further evidence, escalating the investigation’s urgency and shifting
    suspicion toward her. The exchange underscores the crew’s growing distrust of
    Uhnari’s story and the need to uncover the truth before the coalescent organism
    spreads further. The scene serves as a turning point, formalizing the shift from
    passive observation to active confrontation in the investigation, while also highlighting
    the tension between evidence and intuition in the pursuit of justice.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e13
  scene_sequence: 14
  sequence_in_scene: 32
  key_dialogue:
  - 'RIKER: Rocha''s file is spotless. Two decorations for valor... three outstanding
    evaluations from his previous commanders... Doesn''t sound like the same man Lieutenant
    Uhnari described.'
  - 'PICARD: What have you found out about Uhnari?'
  - 'RIKER: I checked into her record, too. Her last posting was on Deriben Five.
    I spoke with her commanding officer there. He said she''s argumentative... quick
    to take offense. He told me that he transferred Uhnari to this relay station because
    she was hampering their efforts. To be honest, sir... I''m beginning to have doubts
    about her story.'
  - 'RIKER: I had Worf check the weapons locker on the relay station... there''s a
    phaser missing.'
  - 'PICARD: You think she lied?'
  - 'RIKER: Lied... conveniently forgot... I''m not sure. I just think it''s something
    we have to consider.'
  - 'PICARD: As of now, we don''t have sufficient evidence one way or the other...
    I want you to examine her shuttle... perhaps there''s something there which will
    shed some light on her story.'
