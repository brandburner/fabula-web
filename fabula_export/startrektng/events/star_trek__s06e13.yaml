  title: Coalescent Theory and Hunt Begins
  description: 'In Sickbay, Beverly Crusher reveals her discovery that the melted
    organic residue from Relay Station 47 is a coalescent organism—a rare, microscopic
    lifeform that absorbs and mimics other organisms at a cellular level. She theorizes
    that Lieutenant Rocha was absorbed by the organism before arriving at the station,
    meaning the entity that attacked Uhnari was not Rocha but the coalescent itself.
    The crew realizes Uhnari may now be the coalescent, prompting Picard to order
    the computer to locate both Uhnari and Commander Morag. The computer reveals Morag
    is in his quarters while Uhnari has transported back to the relay station, triggering
    a high-stakes pursuit: Riker and Worf split up to intercept them, escalating the
    tension between containment and confrontation. The event shifts the investigation
    from Klingon sabotage to a biological threat, with the crew now racing to stop
    the coalescent before it claims another host. The urgency is heightened by the
    revelation that the organism’s cycle could last days or weeks, leaving no time
    to waste.'
