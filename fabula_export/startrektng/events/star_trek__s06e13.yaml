  key_dialogue:
  - 'GEORDI: "Alright... let''s try this again... The phase inducers are aligned...
    this should be working... Come on, Lieutenant... I know you''re in there somewhere..."'
  - 'AQUIEL: "Hello, Shianna. By the time you get this... the Batarael will be over.
    This is the first year I haven''t been there... I''ve been wondering who''s singing
    the Horath in my place..."'
  - 'AQUIEL: "I had the dream again... the one where Mother is screaming... I climb
    the hill to our house... but I can''t get to her... Shianna, this time I ran away.
    I was so scared I ran back down the hill... I think I know why I''ve been having
    dreams about danger... it''s because of what''s been happening with that Klingon.
    He''s getting more aggressive all the time. Not just the usual threats... Morag
    actually locked his disruptors on the station this time. I don''t really think
    there''ll be any trouble... it just gives me those panic feelings... wanting to
    run, wanting to get away from danger. Shianna, I couldn''t say this to anyone
    but you... but... the panic... is the same thing I used to feel when Father got
    angry... when I knew he was going to punish me... Only now I''m out here in space
    and there''s no place to run."'
