    emotional_state: Ominously absent, his erased presence suggests a man with something
      to hide—whether guilt, fear, or a darker motive. The logs’ corruption implies
      he was involved in a cover-up, adding urgency to the investigation.
    goals:
    - To obscure the truth (erased files suggest deliberate concealment)
    - To avoid accountability (implied by the violent struggle and his disappearance)
    what_happened: Keith Rocha is mentioned indirectly through the erased logs and
      the cascade failure in the station’s storage system. His absence is a looming
      question—why were his files deleted? The tension between his authoritarian demeanor
      (implied by Uhnari’s logs and Geordi’s corrections) and the violent struggle
      suggested by the station’s condition creates a shadow over the scene. Rocha’s
      erasure from the records mirrors his physical disappearance, tying his fate
      to the mystery.
