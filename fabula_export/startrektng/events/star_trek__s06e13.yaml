  title: Worf discovers Klingon DNA at murder scene
  description: "\n  In the Relay Station's ops center, Worf conducts a forensic scan\
    \ of the murder site while Riker observes. His tricorder detects Klingon DNA at\
    \ the crime scene, confirming Klingon involvement in the officer's death. The\
    \ revelation immediately escalates the investigation from a technical anomaly\
    \ to a potential interstellar incident, forcing Riker to confront the political\
    \ implications. Worf's discovery introduces a critical piece of evidence that\
    \ contradicts the station's official logs and raises questions about Klingon motives—whether\
    \ this was a targeted attack or something more sinister. The tension between forensic\
    \ evidence and diplomatic relations becomes palpable as Riker processes the implications,\
    \ setting up future confrontations with Klingon authorities like Commander Morag\
    \ and Governor Torak. The moment also underscores Worf's role as the crew's security\
    \ expert, whose expertise bridges the gap between scientific investigation and\
    \ political fallout.\n  "
