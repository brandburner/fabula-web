  key_dialogue:
  - 'RIKER: We found a type two phaser in your shuttlecraft. It was taken from the
    weapons locker on the station.'
  - 'AQUIEL: I told you I don''t remember what happened. Maybe I did get to the weapons
    locker...'
  - 'RIKER: The phaser was set to level ten. Standard procedure requires that all
    phasers are set to level one when they''re in storage.'
  - 'WORF: That means someone deliberately changed the setting. And there is the matter
    of your conflict with Lieutenant Rocha.'
  - 'GEORDI: Wait a minute. We haven''t even established this phaser as the murder
    weapon yet. And even at level ten... I don''t see how a phaser could do what the
    medical evidence says it did. A subspace disruptor like a Klingon weapon, maybe...'
  - 'RIKER: Commander Morag is due to arrive in two hours. We''ll see what he has
    to say.'
