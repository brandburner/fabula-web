acts:
- fabula_uuid: act_a172647abbd0d3cb
  number: 1
  summary: The USS Enterprise arrives at Relay Station 47 to find it silent and abandoned.
    An away team, including Riker, Worf, Geordi, and Beverly, beams aboard, discovering
    the station in disarray and filled with chaotic subspace messages. Geordi finds
    a dog hidden in a service duct, while Worf reports the station's shuttle is missing.
    Beverly uncovers the melted remains of what she believes to be Lieutenant Aquiel
    Uhnari, with blood traces confirming her presence. The team suspects foul play,
    with Lieutenant Keith Rocha also missing. Geordi attempts to access the station
    logs but encounters security lockouts, suspecting tampering with encrypted messages.
    He finds Aquiel's personal logs, which reveal her strained relationship with Rocha
    and mentions of a harassing Klingon commander, Morag. Beverly's analysis suggests
    a high-level phaser blast caused Uhnari's death, possibly a Klingon disruptor.
    Picard decides to contact the Klingon Governor regarding Morag, wary of a diplomatic
    incident. Geordi, persistent in his investigation, finally bypasses the security,
    gaining visual access to Aquiel's logs, where he sees her image for the first
    time, an exotic and striking alien woman. This act establishes the core mystery
    of the missing officers and the potential Klingon involvement, setting the stage
    for the investigation and Geordi's personal connection to the case.
  key_moments: []
