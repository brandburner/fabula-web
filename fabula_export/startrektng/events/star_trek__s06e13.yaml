  global_id: null
  title: Aquiel recounts violent Klingon encounter
  description: In the observation lounge, Aquiel—physically battered with a visible
    head wound and torn uniform—relates her harrowing account of Rocha’s unprovoked
    attack during a routine diagnostic. She describes being thrown against a bulkhead,
    choked, and barely escaping to a shuttle, though her memory gaps raise suspicion.
    Torak reveals she was found near the Klingon border, sparking tensions as Worf
    confirms Klingon DNA at the crime scene. Picard presses for clarity on her delayed
    return, while Riker subtly probes her inconsistent recollection of the weapons
    locker. Geordi’s revelation that she was missing for 46 hours underscores the
    timeline’s implausibility, and Beverly’s mention of bloodstains at the murder
    scene implicates Aquiel further. The exchange escalates diplomatic friction, with
    Torak’s outburst over Morag’s involvement and Worf’s Klingon insults heightening
    distrust. The scene ends with Geordi leading Aquiel away, hinting at unresolved
    personal connections and the coalescent organism’s looming threat.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e13
  scene_sequence: 11
  sequence_in_scene: 24
  key_dialogue:
  - 'AQUIEL: We were running a level two diagnostic of the message buffer... nothing
    special. Rocha had been on edge all morning, but he''d been irritable ever since
    he got there, so I didn''t think anything of it... We were mid-way through the
    procedure... and suddenly... he attacked me... He grabbed me... and threw me against
    the port bulkhead... I yelled at him to stop, but he wouldn''t listen. He took
    me by the throat... I broke free and tried to get to the weapons locker... I''m
    not sure what happened next... but somehow I got aboard the shuttle and left...'
  - |-
    RIKER: You said you tried to get to the weapons locker... is it possible that you did?
    AQUIEL: No, I... I didn't.
    RIKER: You're sure?
    AQUIEL: I don't... exactly remember everything after he attacked me...
  - |-
    TORAK: You still try to blame us!
    WORF: Have the courage to admit your mistakes. Or are you a lo'Be Vos?
    TORAK: ((furious)) At least I do not wear the uniform of a P'tak!
