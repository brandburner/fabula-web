  title: Geordi probes Aquiel’s past with Rocha
  description: In Ten Forward, Geordi and Aquiel share a moment of cultural connection
    over drinks, with Geordi revealing his fluency in Hahliian—a language tied to
    her heritage. The warmth quickly evaporates when Aquiel realizes Geordi has reviewed
    her private logs, including intimate correspondence with her sister. Though she
    initially reacts with hurt and defensiveness, her dark humor briefly defuses the
    tension. Geordi then shifts the conversation to her fraught relationship with
    Rocha, pressing her on why she provoked him and whether her actions contributed
    to his hostility. Aquiel admits Rocha was obnoxious from the start and that she
    fought to assert herself, but insists she never wanted him dead. The exchange
    leaves unresolved questions about her motives and the truth behind Rocha’s death,
    deepening the mystery while exposing the fragile trust between them. The scene
    underscores Geordi’s struggle to balance professional duty with personal attraction,
    and Aquiel’s guarded nature, which may hide more than she lets on.
