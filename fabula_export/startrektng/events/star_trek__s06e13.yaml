  key_dialogue: &id033
  - 'AQUIEL: We were running a level two diagnostic of the message buffer... nothing
    special. Rocha had been on edge all morning, but he''d been irritable ever since
    he got there, so I didn''t think anything of it... We were mid-way through the
    procedure... and suddenly... he attacked me...'
  - 'TORAK: We found her on our side of the border heading toward Sector Two Five
    Two Zero. She is lucky my patrol ship did not destroy her vessel on sight.'
  - 'PICARD: Lieutenant... why didn''t you contact Starfleet and report what happened
    aboard the Station?'
  - 'AQUIEL: I... don''t know, sir. Maybe I passed out. I''m not even sure how long
    I was in the shuttle before the Klingons picked me up.'
  - 'RIKER: You said you tried to get to the weapons locker... is it possible that
    you did?'
  - 'AQUIEL: No, I... I didn''t. (beat) I don''t... exactly remember everything after
    he attacked me...'
  - 'GEORDI: Your logs said that a Commander Morag had been harassing you... did you
    ever let him or any other Klingon aboard the station?'
  - 'AQUIEL: Absolutely not.'
  - 'TORAK: You still try to blame us!'
  - 'WORF: Have the courage to admit your mistakes. Or are you a lo''Be Vos?'
  - 'PICARD: Governor Torak... we are merely exploring all the possibilities. Lieutenant
    Uhnari''s logs said Commander Morag was harassing the station -'
  - 'TORAK: He was doing his job!'
  - 'GEORDI: Lieutenant... I know a friend of yours who''s very eager to see you.'
  - 'AQUIEL: Who?'
