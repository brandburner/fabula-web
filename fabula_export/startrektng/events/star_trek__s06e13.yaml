  key_dialogue: &id021
  - 'AQUIEL: ((leans into the camera)) Shianna, you always said I''d look great with
    a wig. So here it is. What do you think?'
  - 'AQUIEL: I took a big risk today... I countermanded an order he gave... I agreed
    to handle the com traffic of Relay Station one-nine-four while they shut down
    for maintenance. Rocha said we couldn''t handle the additional signal load...
    but I think he''s wrong. When he finds out... he''ll be furious.'
  - 'AQUIEL: It''s days like this that I wish I was home. You know what I miss? Muskan
    seed punch. Real Muskan seed punch... I''d give anything for some of the punch
    Mother used to make... with chunks of the seeds still in it... I had the dream
    again.'
