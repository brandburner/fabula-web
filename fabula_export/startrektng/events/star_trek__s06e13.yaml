  object_involvements:
  - object_uuid: ger_object_6ff1967595be
    description_of_involvement: 'The 27 missing priority Starfleet messages are a
      direct result of Morag’s sabotage and a critical piece of evidence in the interrogation.
      Data’s revelation that the messages are gone, combined with Morag’s DNA on the
      message control module, paints a clear picture of his motive: opportunistic
      theft of sensitive Starfleet communications. The missing messages represent
      a breach of security and a potential threat to Starfleet’s operations, raising
      the stakes of Morag’s actions beyond mere sabotage to include espionage. Their
      absence looms over the interrogation, symbolizing the broader implications of
      Morag’s betrayal and the fragility of the peace between the Klingon Empire and
      Starfleet.'
    status_before_event: Extracted by Morag from Relay Station 47 and likely transmitted
      to Klingon authorities, with their contents and significance unknown to Starfleet.
    status_after_event: Confirmed as missing, with Morag admitting to their theft.
      Their whereabouts and contents remain unresolved, adding to the mystery and
      tension surrounding the relay station’s role in the broader conflict.
    global_id: ger_object_6ff1967595be
  - object_uuid: ger_object_85891885ad3a
    description_of_involvement: 'The blood and signs of a struggle at Relay Station
      47 are referenced by Morag in his desperate attempt to shift blame. He claims
      to have found the blood and struggle marks upon arriving at the station, suggesting
      that Rocha’s death occurred before his arrival. While this detail does not exonerate
      him, it introduces a critical ambiguity into the investigation: if Morag is
      telling the truth about the blood, then Rocha’s killer remains at large, and
      the relay station’s mystery deepens. The blood serves as a haunting reminder
      of the unresolved violence, adding a layer of tension to the interrogation and
      underscoring the stakes of the investigation.'
    status_before_event: Present at Relay Station 47, collected as evidence by Starfleet’s
      forensic team, and analyzed to determine the timeline of the violence.
    status_after_event: Referred to by Morag as part of his defense, but its significance
      remains unresolved, leaving the question of Rocha’s killer unanswered.
    global_id: ger_object_85891885ad3a
