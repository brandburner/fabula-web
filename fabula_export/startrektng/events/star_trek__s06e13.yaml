- fabula_uuid: cand_evt_scene_437f509a3adedc68_01
  global_id: null
  title: Morag admits sabotage under DNA evidence
  description: In the Observation Lounge, Riker and Picard confront Commander Morag
    with forensic evidence—his DNA found at the crime scene—exposing his presence
    at Relay Station 47. Initially defiant, Morag claims he boarded the station after
    detecting no response, only to find signs of a struggle and blood. When Data reveals
    tampered encrypted messages and Morag’s DNA on the control module, Morag’s bluster
    collapses. Torak, prioritizing diplomatic cover, abandons him, forcing Morag to
    grudgingly admit to stealing Starfleet messages while denying any involvement
    in Rocha’s death. The scene escalates tensions between Klingon and Starfleet personnel,
    shifts the investigation’s focus to Morag’s sabotage, and underscores the fragility
    of their alliance amid the relay station’s unresolved mystery. Worf escorts a
    humiliated Morag into custody, leaving Picard and Torak to navigate the fallout
    of this breach of trust.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e13
  scene_sequence: 23
  sequence_in_scene: 45
  key_dialogue:
  - 'MORAG: I killed no one!'
  - 'RIKER: We found your DNA on the consoles, and on the bulkheads... we know you
    were there.'
  - 'MORAG: Yes... Yes, I was there. My patrol route takes me near the station every
    six days. Three days ago I hailed them and there was no response. I was... concerned.'
  - 'DATA: Commander Morag, we have discovered that the encrypted message bank on
    the station has been tampered with. Our analysis indicates that twenty-seven priority
    Starfleet messages are missing.'
  - 'MORAG: This is outrageous! We will not tolerate these accusations!'
  - 'TORAK: This is a... diplomatic matter, Morag. Do not make me search your ship.'
  - 'MORAG: ((grudgingly)) Yes... I did take the messages...'
  - 'PICARD: Did you kill Lieutenant Rocha?'
  - 'MORAG: No. There was no one there. I saw blood... and signs of a struggle. I
    took the codes, but I killed no one.'
