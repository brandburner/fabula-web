- fabula_uuid: act_ee0258122e6a469e
  number: 3
  summary: Aquiel recounts her version of events to Picard, Riker, Beverly, and Geordi,
    claiming Rocha attacked her, she escaped in the shuttle, and suffered memory loss,
    eventually being picked up by Klingons. Her story is met with skepticism, especially
    when she hesitates about accessing the weapons locker. Beverly confirms Aquiel's
    blood was at the scene, suggesting the melted remains are Rocha's, though a clear
    DNA scan is still pending. Worf's discovery of Klingon DNA at the scene leads
    to a heated exchange with Governor Torak, who reluctantly allows Picard to question
    Commander Morag. Geordi introduces Aquiel to Maura, the dog, which Aquiel recognizes,
    providing a moment of genuine connection and relief amidst the tension. Geordi
    and Aquiel share a drink in Ten Forward, where Geordi's admission of reviewing
    her personal logs makes Aquiel feel exposed but also fosters a deeper, albeit
    awkward, bond. Geordi probes her relationship with Rocha, highlighting her argumentative
    nature. Simultaneously, Riker investigates Aquiel's Starfleet record, finding
    it less than stellar, and discovers a missing phaser from the station's weapons
    locker, further fueling his suspicions about her truthfulness. Aquiel directly
    asks Geordi if he believes she could kill someone, and he, after a moment of reflection,
    says no, offering her profound relief. In Sickbay, Beverly struggles to reconstruct
    the DNA from the melted residue, noting its unusual destabilization. The act culminates
    with Riker and Worf searching Aquiel's shuttle and finding the missing phaser,
    chillingly set to kill, directly contradicting Aquiel's claims of memory loss
    and absence of a weapon.
