  scene_sequence: 2
  sequence_in_scene: 3
  key_dialogue: &id005
  - 'WORF: The shuttlecraft is gone. There is no one aboard.'
  - 'BEVERLY: All of the blood traces I found match Lieutenant Aquiel Uhnari. For
    now I''ll assume these are her remains... but I''ll need to take the deckplate
    back to Sickbay to make sure.'
  - 'RIKER: It would take a powerful weapon to do this... If that is Lieutenant Uhnari...
    Where''s Rocha? Before Uhnari died... or after?'
  - 'GEORDI: All encrypted subspace messages are sent through this channel. Look at
    the signal notation... It''s out of sequence. I''d say somebody tried to by-pass
    the access protocol and break into the coded messages. It caused the security
    lock-outs to freeze up.'
