- fabula_uuid: cand_evt_scene_78411ec206dce1f1_01
  global_id: null
  title: Riker reveals Uhnari’s troubled record
  description: 'In the Ready Room, Riker presents Picard with Lieutenant Keith Rocha’s
    pristine service record—decorations for valor, glowing evaluations—directly contradicting
    Aquiel Uhnari’s portrayal of him as volatile and antagonistic. Riker then discloses
    Uhnari’s own history: her commanding officer on Deriben V described her as argumentative
    and disruptive, transferred to the relay station to remove her from his crew.
    The revelation of a missing phaser from the station’s weapons locker further undermines
    Uhnari’s credibility, forcing Picard to question whether her account of the relay
    station’s events is truthful or self-serving. The exchange escalates Picard’s
    skepticism, shifting the investigation’s focus from external threats (like Klingon
    involvement) to internal inconsistencies within Starfleet’s own personnel. Riker’s
    report doesn’t just challenge Uhnari’s narrative—it forces Picard to confront
    the possibility that the truth may lie in the gaps between what she claims and
    what the evidence suggests.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e13
  scene_sequence: 14
  sequence_in_scene: 31
  key_dialogue:
  - 'RIKER: Rocha''s file is spotless. Two decorations for valor... three outstanding
    evaluations from his previous commanders... Doesn''t sound like the same man Lieutenant
    Uhnari described.'
  - 'RIKER: I checked into her record, too. Her last posting was on Deriben Five.
    I spoke with her commanding officer there. He said she''s argumentative... quick
    to take offense. He told me that he transferred Uhnari to this relay station because
    she was hampering their efforts.'
  - 'RIKER: I had Worf check the weapons locker on the relay station... there''s a
    phaser missing.'
  - |-
    PICARD: Why?
    RIKER: Lied... conveniently forgot... I'm not sure. I just think it's something we have to consider.
