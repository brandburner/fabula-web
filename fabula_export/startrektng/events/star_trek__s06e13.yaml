  object_involvements:
  - object_uuid: ger_object_9459d06eb979
    description_of_involvement: Beverly Crusher’s resonance frequency burst is proposed
      as an experimental technique to realign the destabilized DNA of the coalescent
      organism. Though not physically present in the scene, its theoretical application
      is central to the crew’s discussion of how to combat the threat. Picard’s question
      about whether a phaser blast could have caused the harm leads Beverly to specify
      the need for a 30-40 second burst of precise resonance, highlighting the crew’s
      desperation to find a way to neutralize the organism before it assimilates another
      host. The proposal hangs in the air as a high-stakes gamble, symbolizing the
      crew’s shift from investigation to active warfare against an unseen enemy. The
      resonance burst represents their last hope to reverse the organism’s mimicry
      and restore its victims’ true forms.
    status_before_event: A theoretical solution proposed by Beverly Crusher, not yet
      tested.
    status_after_event: Remains untested but is now a critical lead in the crew’s
      plan to counter the organism’s threat.
    global_id: ger_object_9459d06eb979
  - object_uuid: ger_object_8a2477c6962a
    description_of_involvement: 'The DNA replica of Beverly Crusher’s hand is the
      tangible, horrifying proof of the coalescent organism’s capabilities. Formed
      from the melted organic residue on the tray, this perfect replica pulses with
      unnatural life, demonstrating the organism’s ability to mimic cellular structures
      at a molecular level. Picard, Riker, and Worf lean in to examine it, their expressions
      a mix of awe and dread as they realize the implications: if the organism can
      replicate a hand, it can replicate a person. The replica becomes a symbol of
      the crew’s vulnerability, forcing them to confront the possibility that the
      enemy is not just out there—but already among them, wearing the face of someone
      they know. Its existence shatters their assumptions about identity and trust,
      turning Sickbay into a place of existential unease.'
    status_before_event: Formed from the melted organic residue during Beverly’s resonance
      scan, taking the shape of her hand.
    status_after_event: A confirmed biological threat, serving as undeniable evidence
      of the organism’s mimicry and the crew’s urgent need to act.
    global_id: ger_object_8a2477c6962a
  - object_uuid: ger_object_1e04e4d20d3c
    description_of_involvement: The gelatinous coalescent organism from Relay Station
