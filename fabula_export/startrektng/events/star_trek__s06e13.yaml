  sequence_in_scene: 30
  key_dialogue:
  - |-
    AQUIEL: How did you know about that... ?
    GEORDI: Well... to be honest... when we thought you were dead... I had to review your logs... and your personal correspondence... for any possible clues about what happened.
  - 'AQUIEL: Keith Rocha was obnoxious from the minute he reported for duty. He treated
    me as though I were beneath contempt. I dealt with him the best way I could. I
    felt like I had to battle him just to hold my own. But that doesn’t mean I wanted
    him dead.'
  - |-
    GEORDI: Why do you think he attacked you?
    AQUIEL: I don’t know.
