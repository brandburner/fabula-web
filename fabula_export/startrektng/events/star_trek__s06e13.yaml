  global_id: null
  title: Morag admits sabotage under interrogation
  description: In the Observation Lounge, Commander Morag is confronted with forensic
    evidence—his DNA on the relay station’s consoles and message control module—proving
    his presence at the crime scene. Initially defiant, he claims he boarded the station
    out of concern when no response came to his hails, finding it abandoned. Data
    reveals tampered encrypted messages, and Morag’s attempt to flee is blocked by
    the Klingon N.D., forcing him to admit he stole the codes. Though he denies killing
    Lieutenant Rocha, his reluctant confession shifts the power dynamic irrevocably
    against him, exposing his betrayal and deepening the Klingon conspiracy angle.
    Torak’s reluctant compliance with Picard’s detention order further isolates Morag,
    leaving him crestfallen as Worf escorts him away.
