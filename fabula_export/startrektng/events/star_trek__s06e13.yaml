  object_involvements:
  - object_uuid: ger_object_b6b873ab1ff2
    description_of_involvement: Aquiel's bloodstains outside the Selay delegates'
      quarters are identified by Beverly Crusher as evidence placing Aquiel at the
      murder scene. These vivid pools of blood serve as a visceral reminder of the
      violence that took place and the urgency of the investigation. Aquiel attributes
      them to her visible head wound from Rocha's attack, but their presence raises
      questions about her 46-hour absence and the timeline of events. Before the event,
      the bloodstains were fresh and part of the crime scene; after the event, they
      remain a critical piece of forensic evidence that ties Aquiel to the scene and
      complicates her testimony.
    status_before_event: Fresh bloodstains on the corridor floor outside the Selay
      delegates' quarters, part of the crime scene.
    status_after_event: Identified as Aquiel's blood, serving as evidence placing
      her at the murder scene and raising questions about her memory gaps.
    global_id: ger_object_b6b873ab1ff2
  - object_uuid: ger_object_867d0d5467a7
    description_of_involvement: Aquiel Uhnari's personal logs are referenced by Geordi
      La Forge as evidence of Commander Morag's harassment of the relay station. These
      logs, stored on a device accessed by Geordi, contain Aquiel's voice recordings
      detailing her defiance of Keith Rocha's orders, her longing for home, and her
      recurring nightmare. The logs end abruptly in static distortion, adding a layer
      of mystery and urgency to the investigation. Before the event, the logs were
      intact but tampered with (Keith Rocha's logs were deleted), and after the event,
      they serve as a critical piece of evidence that ties the Klingons to the station
      and raises questions about Aquiel's memory gaps.
    status_before_event: Intact but partially tampered with (Keith Rocha's logs deleted),
      stored on a device in Geordi's quarters.
    status_after_event: Accessed and analyzed by Geordi, serving as evidence of Klingon
      harassment and Aquiel's traumatic experiences. The abrupt static distortion
      at the end of the logs remains unresolved.
    global_id: ger_object_867d0d5467a7
  - object_uuid: ger_object_38115586234f
    description_of_involvement: The Klingon DNA evidence from the Uhnari murder scene
      is presented by Riker as a forensic sample that places Klingon personnel at
      the crime scene. This object—likely a swab or tricorder readout—serves as the
      linchpin of the confrontation between the *Enterprise* crew and the Klingons.
      Its presence sparks sharp debate, with Torak denying Klingon involvement and
      Worf accusing the Klingons of deception. The evidence is clutched as proof of
      Klingon presence, raising the stakes and forcing Torak to allow the interrogation
      of Morag. Before the event, the DNA evidence was collected during the forensic
      scan of the station; after the event, it remains a contentious piece of evidence
      that could unravel the truth.
    status_before_event: Collected during the forensic scan of Relay Station 47, stored
      as a sample for analysis.
    status_after_event: Presented as evidence in the Observation Lounge, sparking
      a heated debate and forcing Torak to concede to the interrogation of Morag.
    global_id: ger_object_38115586234f
  - object_uuid: ger_object_fc3f77bb009c
    description_of_involvement: The Outpost Message Buffer is referenced indirectly
      through Aquiel's recounting of the diagnostic procedure she and Rocha were running
      when the attack occurred. This object serves as the context for the violence,
      as the level two diagnostic was underway when Rocha suddenly turned on Aquiel.
      The buffer's role in the event is to highlight the routine nature of the task
      that preceded the chaos, as well as the potential for tampering or interference
