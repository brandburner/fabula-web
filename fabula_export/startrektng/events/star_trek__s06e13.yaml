  title: Geordi offers Aquiel a place on Enterprise
  description: 'In the quiet intimacy of Ten Forward, Geordi and Aquiel process the
    unresolved mysteries of Relay Station 47—her memory loss, Rocha’s attack, and
    the coalescent organism’s role in the chaos. Their conversation shifts from professional
    speculation to personal stakes when Aquiel reveals her reassignment to Starbase
    212. Geordi, subtly testing the boundaries of their bond, extends an informal
    invitation to join the *Enterprise* as a Level 2 specialist, leveraging his influence
    with Chief Pendleton. Aquiel’s refusal isn’t rejection but assertion: she declines
    to ride his coattails, insisting on earning her place through merit. Their exchange—warm,
    charged with unspoken tension—reaffirms their mutual respect while leaving their
    connection open-ended. The moment underscores Geordi’s protective instincts and
    Aquiel’s hard-won autonomy, both of which have been shaped by the mission’s traumas.
    The scene bridges the professional and personal, lingering on the unresolved nature
    of their relationship as the act closes.'
