- fabula_uuid: cand_evt_scene_38acc632755e2a98_03
  global_id: null
  title: Dathon reveals the ritual’s fatal cost
  description: "\n  In a moment of agonized vulnerability, Dathon—weakened by his\
    \ injuries—reveals that their shared peril was no accident but a deliberate recreation\
    \ of the Tamarian bonding ritual between Darmok and Jalad at Tanagra. By invoking\
    \ the mythic phrases 'Zinda! His face black... His eyes red...' and 'Callimas\
    \ at Bahar,' he forces Picard to confront the existential stakes of Tamarian communication:\
    \ meaning is forged through shared suffering, not words. Picard, now grasping\
    \ the ritual’s purpose, realizes Dathon orchestrated their stranding to test his\
    \ capacity to *become* Darmok, not just understand him. The revelation reframes\
    \ their struggle as a test of Picard’s willingness to endure hardship for connection,\
    \ while Dathon’s physical decline underscores the ritual’s fatal cost. The exchange\
    \ culminates in Picard reciprocating with the *Epic of Gilgamesh*, bridging their\
    \ cultures in a final, poignant act of shared storytelling before Dathon’s death.\n\
    \  "
