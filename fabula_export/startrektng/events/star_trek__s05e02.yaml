      *Enterprise*’s hull and nacelle.
    - The *Enterprise*’s shields flicker under the strain, their failure visible as
      the ship is rocked by each impact.
    - The silence of space is deafening, broken only by the distant hum of the ship’s
      engines and the occasional alert from the bridge.
