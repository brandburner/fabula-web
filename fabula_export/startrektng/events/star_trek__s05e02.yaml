- fabula_uuid: act_03309641c3e2b830
  number: 3
  summary: The unseen, energy-based creature, described as an electromagnetic disturbance,
    approaches Picard and Dathon on the planet’s surface. Dathon urgently offers Picard
    a dagger, repeating “Temba, his arms wide,” which Picard now accepts, recognizing
    the shared danger. On the Enterprise, Riker, alerted to the approaching threat,
    overrides Geordi’s initial timeline, demanding an immediate attempt to transport
    Picard, despite the low probability of success and the risk of revealing their
    intentions to the Tamarians. Geordi and his team work furiously to boost the annular
    confinement beam, struggling against the Tamarian scattering field. On the planet,
    the creature demonstrates its speed and power, cutting off escape routes. Picard,
    observing Dathon’s repeated use of “Shaka, when the walls fell” in moments of
    failure, begins to deduce the metaphorical nature of the Tamarian language, interpreting
    it as an expression of inability or defeat. As the creature prepares to attack,
    Picard connects “Darmok and Jalad at Tanagra” to their shared predicament. The
    creature lunges, becoming briefly visible, and Picard and Dathon, now communicating
    through shared action, fight it in a coordinated defense. During the skirmish,
    Geordi’s emergency transport attempt partially materializes Picard on the Enterprise,
    but the scattering field proves too strong, forcing Picard back to the planet
    and severely injuring Dathon. The Tamarian First Officer, despite Riker’s pleas,
    refuses to lower the scattering field, citing “Kailash... When it rises,” leaving
    Dathon gravely wounded and Picard isolated once more.
