  global_id: null
  title: Tamarians jam all comms but sensors
  description: "\n  On the Enterprise bridge, Riker attempts to contact Picard on\
    \ the planet below, only to find all Federation comms blocked by a Tamarian-generated\
    \ particle beam. Data confirms the disruption is deliberate—subspace and EM carriers\
    \ are scrambled, but sensor frequencies remain open, allowing the Tamarians to\
    \ observe Picard’s situation without interference. Worf theorizes this is a strategic\
    \ move, framing the standoff as a ritualized contest between champions, where\
    \ Picard’s isolation is part of the Tamarians’ unspoken rules. The revelation\
    \ underscores the Tamarians’ calculated approach: they’ve neutralized the Federation’s\
    \ ability to intervene while ensuring Picard and Dathon remain trapped in their\
    \ metaphorical duel. The crew’s frustration mounts as they realize they’re being\
    \ forced to watch, not act, heightening the stakes of Picard’s solitary struggle\
    \ on the planet’s surface.\n  "
