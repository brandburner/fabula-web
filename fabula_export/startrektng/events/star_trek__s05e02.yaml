- fabula_uuid: act_0ec6d6b26ddf74fb
  number: 5
  summary: With Dathon dead and the creature again approaching Picard, Riker prepares
    to execute the order to fire on the Tamarian ship, a desperate act risking full-scale
    war. Just as the creature lunges, the Enterprise’s emergency transport successfully
    beams Picard aboard. However, the Tamarian ship immediately retaliates, striking
    the Enterprise and disabling its warp engines and shields, leaving it vulnerable.
    Picard, arriving on the bridge, quickly assumes command, halting Riker’s order
    to return fire. He hails the Tamarian ship, and using the metaphorical language
    he learned from Dathon, conveys the events on the planet. Picard speaks of “Darmok
    and Jalad at Tanagra,” “the beast,” and “Shaka, when the walls fell,” communicating
    Dathon’s sacrifice and the shared struggle. The Tamarian First Officer, initially
    angered by Picard holding Dathon’s dagger, recognizes Picard’s use of their language,
    understanding that Dathon’s plan succeeded. The Tamarians express sadness for
    Dathon’s death and acknowledge the new connection by referring to “Picard and
    Dathon at El-Adrel.” They return Dathon’s log to Picard and then depart peacefully,
    having achieved their goal of establishing communication. In the ready room, Picard
    reflects on Dathon’s profound sacrifice for the sake of connection, acknowledging
    the Tamarian’s commitment to bridging the vast cultural divide. He picks up Dathon’s
    dagger, performs the Tamarian ritual of respect, and begins studying Earth’s own
    mythologies, preparing for future dialogue with a newly understood species.
