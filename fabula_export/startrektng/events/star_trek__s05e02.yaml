    Tamarians will back down rather than risk an exchange of phaser fire. But I feel
    like I''m playing a deadly game—the captain''s life is the prize, and I still
    don''t know the rules.'
  - 'RIKER: Enough to make them turn back, but not enough to hurt them. Nice shooting...'
  - 'RIKER: Who the hell are these people? There''s got to be some way to get through
    to them.'
  - 'RIKER: Deanna, help him. I want something by oh-nine hundred hours.'
