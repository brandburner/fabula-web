- fabula_uuid: cand_evt_scene_38b4dedfa1f90a47_02
  global_id: null
  title: Tamarians disable shuttle rescue attempt
  description: After Riker orders Worf to pilot a shuttlecraft to retrieve Picard
    from the planet’s surface, the Tamarians preemptively fire a non-lethal phaser
    strike, disabling the shuttle’s starboard nacelle and thrusters. The attack is
    precise—enough to halt the rescue mission without causing fatal damage—demonstrating
    the Tamarians’ refusal to allow Federation intervention while avoiding direct
    conflict. Back on the *Enterprise*, Geordi reveals the transporter will take a
    full day to modify, forcing Riker to pressure Data and Troi to accelerate their
    decoding of the Tamarian language. The escalation tightens the deadline, raising
    stakes as the crew’s window to prevent war narrows, now hinging on their ability
    to crack the alien metaphorical code before time runs out. Worf’s frustration
    with Riker’s cautionary approach surfaces, highlighting the crew’s divided priorities—Worf’s
    warrior instincts versus Riker’s diplomatic restraint—while underscoring the urgency
    of the communication crisis.
