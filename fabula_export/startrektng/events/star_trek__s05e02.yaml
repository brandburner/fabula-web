- fabula_uuid: cand_evt_scene_9f73614c320d4a50_01
  global_id: null
  title: Picard’s Fire and Dathon’s Metaphor
  description: "\n  Picard’s struggle to light a fire in the cold clearing becomes\
    \ a microcosm of his broader failure to communicate with Dathon. His frustration\
    \ mounts as his attempts to start a fire fail, while Dathon watches from across\
    \ the clearing with a roaring fire of his own, his amusement evident. Picard’s\
    \ sarcastic remark—'Shaka. When the walls fell.'—is met with Dathon’s cryptic\
    \ response, 'Darmok of Kanza. Jalad of the Kituay,' which Picard can’t decipher.\
    \ The exchange underscores the depth of their linguistic and cultural divide,\
    \ with Picard’s attempts to explain his identity ('Picard of the Federation...\
    \ of the starship Enterprise... of the planet Earth') falling on deaf ears. Dathon’s\
    \ ritualistic behavior—placing objects on the ground and performing a pattern-based\
    \ ritual—further highlights the alien nature of Tamarian communication. Just as\
    \ Picard’s frustration reaches its peak, Dathon unexpectedly offers him a burning\
    \ branch, uttering the word 'Temba' twice. Picard’s acceptance of the branch and\
    \ his successful ignition of his own fire mark a tentative breakthrough in their\
    \ standoff, symbolizing the first step toward mutual understanding. The moment\
    \ is charged with subtext: Dathon’s initial indifference gives way to a gesture\
    \ of generosity, while Picard’s gratitude signals his growing recognition of the\
    \ need to adapt to Tamarian ways of communication. The event serves as a turning\
    \ point, shifting the dynamic from hostility to cautious cooperation, and foreshadowing\
    \ Picard’s eventual deciphering of Tamarian metaphorical language.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e02
  scene_sequence: 8
  sequence_in_scene: 15
  key_dialogue:
  - 'DATHON: Shaka. When the walls fell.'
  - 'PICARD: Shaka indeed.'
  - 'PICARD: What now, Captain? Will you attack me in my sleep?'
  - 'DATHON: Darmok of Kanza. Jalad of the Kituay.'
  - 'PICARD: Picard of the Federation. Of the starship Enterprise... Of the planet
    Earth...'
  - 'DATHON: Kadir beneath Mo Moteh...'
  - 'DATHON: Temba. Temba.'
  - 'PICARD: Temba? What do you mean? Fire? Temba means fire?'
  - 'DATHON: Temba. His arms wide.'
  - 'PICARD: Temba is a person? His arms are wide. Because he''s holding them apart?
    In generosity? In giving? In taking?'
