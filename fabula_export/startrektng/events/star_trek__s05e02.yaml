  title: Tamarians disable shuttle rescue attempt
  description: "\n  Riker orders Worf to pilot a shuttlecraft to retrieve Picard from\
    \ the planet's surface, betting the Tamarians will avoid direct conflict. As the\
    \ shuttle descends, Data detects a power surge in the Tamarian ship, prompting\
    \ Riker to order evasive maneuvers. The Tamarians fire a precisely calibrated\
    \ phaser strike—non-lethal but effective—disabling the shuttle's starboard nacelle\
    \ and thrusters. Worf confirms he can land but not take off, forcing Riker to\
    \ recall the shuttle. The attack underscores the Tamarians' refusal to allow Federation\
    \ intervention while avoiding escalation. Back on the *Enterprise*, Geordi reveals\
    \ the transporter will take a full day to modify, raising the stakes as Picard's\
    \ survival now hinges on Data and Troi deciphering the Tamarian language before\
    \ time runs out. The event forces the crew to confront the Tamarians' unyielding\
    \ stance and the urgency of their mission, while Worf's frustration with the stalemate\
    \ highlights the growing tension between aggressive and diplomatic approaches.\n\
    \  "
