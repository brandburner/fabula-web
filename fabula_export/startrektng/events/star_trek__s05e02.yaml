- fabula_uuid: cand_evt_scene_38acc632755e2a98_04
  global_id: null
  title: Picard Recites Gilgamesh to Dathon
  description: "\n  Picard and Dathon, stranded on a hostile planet, engage in a desperate\
    \ attempt at communication through metaphor. After Dathon reveals their shared\
    \ peril was a deliberate recreation of the Tamarian bonding ritual between Darmok\
    \ and Jalad at Tanagra, Picard struggles to reciprocate in Tamarian language.\
    \ When Dathon, weakened and in pain, prompts Picard to share a story, Picard chooses\
    \ the *Epic of Gilgamesh*—a tale of friendship, mortality, and loss. As Picard\
    \ recites the story, Dathon’s condition worsens, and he dies mid-narration, his\
    \ final moments marked by a profound, wordless connection. The scene bridges linguistic\
    \ and existential divides, culminating in Picard’s whispered lament over Dathon’s\
    \ body, mirroring Gilgamesh’s grief for Enkidu. This moment marks a turning point\
    \ in Picard’s understanding of the Tamarians, their culture of shared suffering,\
    \ and the cost of their isolation. The event also serves as a thematic pivot,\
    \ reinforcing the narrative’s central conflict: the Federation’s inability to\
    \ communicate with the Tamarians without first experiencing their world through\
    \ sacrifice and shared peril.\n  "
