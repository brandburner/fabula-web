- fabula_uuid: cand_evt_scene_ceac002fcd5e125a_02
  global_id: null
  title: Riker confronts Tamarian communication barrier
  description: With Picard stranded on El-Adrel and the Tamarian scattering field
    blocking rescue attempts, Riker convenes a crisis meeting in the observation lounge
    to assess options. Geordi confirms the transporter is unusable, forcing Riker
    to consider a phaser strike against the Tamarian ship—a last resort he prefers
    to avoid. When he turns to Troi and Data for diplomatic alternatives, they reveal
    the Tamarians communicate entirely through metaphorical narrative imagery, rendering
    direct translation impossible. Data explains their language operates like knowing
    grammar without vocabulary, while Troi illustrates the problem by comparing it
    to referencing 'Juliet on her balcony' without context. The revelation underscores
    the Federation’s inability to communicate with the Tamarians, escalating the urgency
    of Picard’s mission to bridge the gap before tensions erupt into war. Riker’s
    frustration is palpable as he realizes even understanding their thought processes
    won’t help without shared narratives—a dead end that forces the crew to rely on
    Worf and Geordi’s tactical solution, despite its risks.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e02
  scene_sequence: 24
  sequence_in_scene: 43
  key_dialogue:
  - |-
    RIKER: Here's the situation on El-Adrel. The entity has moved off several hundred meters.
    BEVERLY: Captain Picard's bioscan readings are stable. The Tamarian's are not.
    TROI: He may have been injured...
  - |-
    DATA: The Tamarian ego structure does not seem to allow what we normally think of as self-identity. Their ability to abstract is highly unusual. They seem to communicate through narrative imagery—by reference to the individuals and places which appear in their mytho-historical accounts.
    TROI: It's as if I were to say to you 'Juliet. On her balcony.'
    BEVERLY: An image of romance.
    TROI: Exactly. Image is everything to the Tamarians. It embodies their emotional states, their very thought processes. It's how they communicate, and how they think.
  - 'DATA: It is necessary for us to learn the narratives from which the Tamarians
    are drawing these images. (beat) Given our current relations, that does not appear
    likely.'
