      and Geordi’s hesitations are communicated. When Geordi taps the device to respond,
      it chirps to life, carrying the weight of the moment in its static-filled transmission.
      The combadge isn’t just a communication tool here—it’s a symbol of the chain
      of command, the authority of Riker’s orders, and the tension between protocol
      and necessity. Riker’s voice cuts through the combadge with the sharpness of
      a blade, leaving no room for misinterpretation. Geordi’s use of it to request
      additional time is a plea for understanding, but the device itself is indifferent
      to the stakes—it simply transmits the urgency, the doubt, and the final, desperate
      gamble.
