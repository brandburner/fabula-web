  scene_sequence: 32
  sequence_in_scene: 56
  key_dialogue:
  - 'PICARD: The Tamarian was willing to risk all of us—just for the hope of communication,
    of connection. And now the door''s open between our peoples. That commitment meant
    more to him than his own life.'
  - 'PICARD: Would I do the same...?'
  - 'RIKER: Greek, sir?'
  - 'PICARD: The Homeric Hymns. One of the root metaphors of our own culture.'
