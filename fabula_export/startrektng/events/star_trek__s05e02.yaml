  title: Worf’s ritual theory and Riker’s rising fear
  description: "\n  On the *Enterprise* bridge, Riker struggles to establish communication\
    \ with Picard, who is stranded on the planet below with Tamarian Captain Dathon.\
    \ Data confirms the Tamarians’ particle beam is disrupting all EM and subspace\
    \ signals, isolating Picard and preventing any rescue attempt. Worf theorizes\
    \ the confrontation is a ritualized contest between champions—Picard against Dathon—suggesting\
    \ the Tamarians’ actions are deliberate and structured. Riker’s concern spikes\
    \ when he recalls Dathon was armed, realizing the stakes of the encounter are\
    \ far higher than initially assumed. The moment marks a shift from confusion to\
    \ escalating tension, as the crew begins to grasp the Tamarians’ strategic intent\
    \ and the danger Picard faces.\n  "
