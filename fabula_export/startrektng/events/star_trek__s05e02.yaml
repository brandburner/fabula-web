  key_dialogue: &id007
  - 'RIKER: Captain, do you read me?'
  - 'DATA: No, sir. The Tamarians are projecting a particle sustaining beam into the
    upper atmosphere. The result is a hyperionization that disrupts virtually all
    EM and subspace carriers.'
  - 'RIKER: That means they can''t communicate with their man, either. Or beam anybody
    through the field.'
  - 'WORF: A contest, perhaps. Between champions. Our captain against theirs.'
  - 'RIKER: (remembering) Theirs was armed...'
