- fabula_uuid: cand_evt_scene_7894cf5097da0603_01
  global_id: null
  title: Riker demands immediate transporter extraction
  description: 'In a high-stakes moment aboard the *Enterprise*, Riker—acting as first
    officer—orders Geordi La Forge to bypass standard transporter protocols and execute
    an emergency beam-out of Picard from the hostile planet. The tension escalates
    as Geordi and Lefler work frantically to recalibrate the transporter, acknowledging
    the extreme technical risks. Riker’s urgency reflects his leadership under pressure,
    but the scene underscores the desperate gamble: a failed transport could strand
    Picard permanently or worse. Geordi’s hesitation highlights the engineering challenges,
    while Riker’s refusal to accept delays reveals his commitment to Picard’s survival,
    even at the cost of Federation protocol. The exchange sets up a critical turning
    point—will the transporter work, or will the mission collapse under the weight
    of its own risks?'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e02
  scene_sequence: 15
  sequence_in_scene: 28
  key_dialogue:
  - 'RIKER''S COM VOICE: How close are we on the transporter?'
  - 'GEORDI: About two hours -- maybe three.'
  - 'RIKER''S COM VOICE: I want the captain out of there now.'
  - 'GEORDI: That''s not... likely, sir.'
  - 'RIKER''S COM VOICE: I don''t want to hear that, Commander.'
  - 'GEORDI: ((to Lefler)) What''s the resonance frequency?'
  - 'LEFLER: Point three four over standard.'
  - 'GEORDI: I want a resolution of point five three at the very least. I''ll need
    two more minutes, Commander. But there''s a good chance this isn''t gonna work.'
  is_flashback: false
  location_uuid: ger_location_5d1844b933cd
  theme_uuids: []
  arc_uuids: []
  participations:
  - character_uuid: ger_agent_13d3dc9ecbd7
    emotional_state: Tense and focused, with a undercurrent of anxiety. He’s confident
      in his skills, but the enormity of the risk—failures could mean Picard’s death—weighs
      on him. His hesitation isn’t about defiance; it’s about the grim reality of
      what they’re attempting.
    goals:
    - Recalibrate the transporter to the highest possible resolution to ensure Picard’s
      safe extraction, even if it means pushing the system beyond standard limits.
    - Buy enough time to make the attempt viable, while also preparing the crew for
      the possibility of failure.
    what_happened: 'Geordi La Forge is the heart of the engineering team’s frantic
      efforts, his hands moving with precision over the console as he recalibrates
      the transporter. His face is a mask of concentration, but the tension in his
      shoulders betrays his unease. When Riker’s demand comes through the combadge,
      Geordi doesn’t flinch—he acknowledges the impossibility of the task with a quiet
      ‘That’s not... likely, sir,’ but he doesn’t argue. Instead, he turns to Lefler,
      his voice steady as he requests the resonance frequency, already shifting into
