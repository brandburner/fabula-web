  - 'DATA: Commander. The Tamarian''s bioscans have become unreadable. He may be dead,
    sir.'
  - 'RIKER: If we know it — so do the Tamarians.'
  - 'DATA: Sir — sensors are tracking the entity. It is approaching Captain Picard''s
    position.'
