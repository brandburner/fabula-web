  title: Worf collapses before Alexander
  description: 'Worf, standing unsteadily with motor assist bands, attempts to project
    strength for Alexander’s sake but collapses in front of him, shattering the illusion
    of invincibility. His humiliation triggers a violent outburst—he orders Alexander
    and Troi away, his shame overwhelming any desire for comfort. The moment forces
    Alexander to witness his father’s vulnerability, deepening the crisis of Worf’s
    existential dilemma: whether to cling to Klingon honor or accept a life he now
    perceives as dishonorable. Troi’s silent presence underscores the tension between
    Worf’s cultural imperative and the unspoken bond between father and son, setting
    up the emotional reckoning to come.'
