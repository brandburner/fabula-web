  title: Worf requests ritual suicide from Riker
  description: In Worf’s sickbay room, the paralyzed Klingon warrior—humiliated by
    his condition and convinced his life as a warrior is over—confronts Riker with
    a direct request to assist in the Hegh'bat ritual suicide. Worf frames the act
    as the only honorable path left, appealing to Riker’s friendship while testing
    his loyalty to Klingon tradition. Riker’s visceral refusal forces Worf to escalate
    his plea, invoking their shared history as comrades in arms. The exchange exposes
    Worf’s despair and the cultural chasm between Klingon honor and Starfleet ethics,
    setting up a moral crisis for Riker and a potential turning point in Worf’s arc.
    The scene’s emotional tension hinges on Worf’s vulnerability and Riker’s conflicted
    reaction, with the unresolved plea lingering as a catalyst for future decisions.
