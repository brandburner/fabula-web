  title: Picard challenges Beverly’s medical ethics
  description: In Beverly’s office, Picard confronts her about her refusal to allow
    Dr. Russell’s experimental genetronic procedure for Worf, forcing Beverly to grapple
    with the moral weight of her decision. Picard argues that Worf’s Klingon honor
    code makes conventional recovery impossible, while the procedure—despite its risks—offers
    a chance at survival. Beverly resists, citing Starfleet Medical’s rejection of
    the procedure and her oath to avoid harm, but Picard’s reasoning begins to erode
    her certainty. The exchange exposes the tension between medical ethics and the
    desperate stakes of Worf’s condition, leaving Beverly conflicted and questioning
    her stance. Picard’s departure leaves her alone with the weight of the choice,
    signaling a potential shift in her approach to Worf’s treatment.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e16
  scene_sequence: 12
  sequence_in_scene: 24
  key_dialogue:
  - 'PICARD: Beverly... maybe you should consider letting her go ahead with the genetronic
    procedure.'
  - 'BEVERLY: How can you say that? She has a theory, based on a little empirical
    data and a lot of supposition...'
  - 'PICARD: If he can''t make a full recovery... Worf''s going to kill himself.'
  - 'BEVERLY: ((firm)) Not in my sickbay, he''s not. I''ll put him in a restraining
    field and post security outside the door before I let him commit suicide.'
  - 'PICARD: How long could you keep him like that? A week... a month... a year?'
  - 'PICARD: But perhaps he can come part of the way... maybe he can be persuaded
    to forgo the ritual... in order to take a chance at regaining the kind of life
    he needs.'
  - 'BEVERLY: The first tenet of good medicine is don''t make the patient any worse.
    Right now he''s alive and functioning... but if he goes into this operation he''ll
    probably come away a corpse.'
  - 'PICARD: It may not be good medicine... but for Worf, it may be the only choice.'
