  global_id: null
  title: Riker dismantles Worf’s ritual suicide
  description: 'In Worf’s sickbay, Riker arrives with ceremonial objects for the Hegh’bat
    ritual—only to violently reject it, calling it a ''despicable'' glorification
    of death. He forces Worf to confront the hypocrisy of his self-sacrifice by invoking
    fallen comrades who fought for life, not death. The confrontation escalates when
    Riker reveals that Klingon tradition requires Alexander to perform the ritual,
    exposing Worf’s emotional cowardice. Worf’s silence and Riker’s refusal to comply
    leave him isolated, forcing a reckoning with his honor and the lives he’d abandon.
    The scene pivots from ritual preparation to a crisis of identity, where Worf’s
    cultural absolutes collide with human empathy and lived experience. Riker’s exit
    leaves Worf with an impossible choice: cling to a flawed ideal or face the messy
    reality of survival.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e16
  scene_sequence: 14
  sequence_in_scene: 27
  key_dialogue:
  - 'RIKER: I''ve been studying this ritual of yours, and you know what I''ve decided?
    I think it''s despicable. I hate everything about it... the casual disregard for
    life... the way it tries to cloak suicide in some glorious notion of honor.'
  - 'RIKER: Do you remember Sandoval? Hit by a disruptor blast two years ago. She
    lived for about a week. How about Fang-lee... Marla Aster... Tasha Yar... how
    many good men and women—how many friends have we watched die? Every one of them—every
    single one—fought for life until the very end.'
  - 'RIKER: A Klingon does not put his own desires above those of his family and friends.
    How many people on this ship consider you a friend? How many owe you their lives?
    Have you given any thought to how you have affected the people around you? And
    how they might feel about your dying?'
