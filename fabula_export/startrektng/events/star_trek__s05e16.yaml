  - organization_uuid: ger_organization_a5de8992176d
    description_of_involvement: Klingon culture is the invisible but dominant force
      shaping Worf’s actions and emotional state in this scene. His defiance ('Klingons
      do not lie in bed') and rejection of Alexander ('No. I will not have him see
      me like this') are direct manifestations of Klingon values—physical strength
      as a measure of honor, and the stigma of weakness. The culture’s demand for
      resilience clashes violently with his paralysis, creating a crisis of identity
      that drives the scene’s tension. Worf’s collapse is not just physical but cultural,
      a failure to live up to the warrior ideal. His shame is tied to the Klingon
      belief that disability is a betrayal of one’s heritage, making his rejection
      of Alexander a desperate attempt to preserve his dignity in the eyes of his
      son and himself. The culture’s influence is so profound that it overrides his
      medical recovery, setting him on a path toward ritual suicide.
    active_representation: Through Worf’s dialogue, actions, and emotional state.
      His defiance, shame, and rejection of Alexander are all expressions of Klingon
      cultural expectations, even as they conflict with his physical reality.
    power_dynamics: Operating as an internal force that dictates Worf’s perceptions,
