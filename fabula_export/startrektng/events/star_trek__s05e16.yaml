- fabula_uuid: cand_evt_scene_914e093bf0638892_04
  global_id: null
  title: Riker forces Worf to confront Alexander’s role
  description: In Worf’s sickbay, Riker arrives with the ceremonial objects for the
    Hegh'bat ritual but immediately challenges Worf’s resolve, calling the ritual
    despicable and questioning its honor. Riker refuses to participate, instead revealing
    that Klingon law requires the eldest son—Alexander—to perform the ritual. Worf’s
    shock and resistance expose his deep-seated avoidance of confronting his son’s
    role in his death, forcing him to grapple with the emotional and cultural weight
    of his decision. The confrontation escalates as Riker dismantles Worf’s stoic
    facade, exposing the selfishness in his choice and compelling him to consider
    the lives he would leave behind. The scene culminates in Riker’s refusal to assist,
    leaving Worf alone with the realization that Alexander must now be part of his
    death—a revelation that shatters his emotional detachment and sets up his eventual
    rejection of suicide.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e16
  scene_sequence: 14
  sequence_in_scene: 29
  key_dialogue:
  - 'RIKER: I''ve been studying this ritual of yours, and you know what I''ve decided?
    I think it''s despicable. I hate everything about it... the casual disregard for
    life... the way it tries to cloak suicide in some glorious notion of honor.'
  - 'WORF: It is not something I expect you to understand. / RIKER: No... All you
    really expect me to do is bring you the knife and then walk away, so you can kill
    yourself in peace. Well, I''m not going to make it that easy for you.'
  - 'RIKER: According to tradition, that honor falls to a family member... preferably
    the oldest son. / WORF: That is not possible. He is a child. / RIKER: The son
    of a Klingon is a man the day he can first hold a blade. True? / WORF: Alexander
    is not fully Klingon... he is part Human. / RIKER: That''s an excuse. What you
    really mean to say is that it would be too hard for you to look at your son and
    tell him that he must hand you the knife... watch you stab it into your heart...
    and then pull the knife from your chest and wipe the blood on his sleeve. That
    is the rite of death, isn''t it?'
