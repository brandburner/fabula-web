- fabula_uuid: cand_evt_scene_914e093bf0638892_03
  global_id: null
  title: Riker forces Worf to confront his legacy
  description: 'In Worf’s sickbay, Riker arrives with the ceremonial objects for Hegh''bat,
    but instead of compliance, he delivers a brutal, emotionally charged indictment
    of Worf’s ritual suicide. Riker dismantles Worf’s stoic resolve by invoking the
    lives Worf has saved—from Starfleet comrades to the Klingon Empire—and exposing
    the selfishness of his decision. When Worf demands Riker’s assistance, Riker counters
    with Klingon law: the ritual must be performed by a family member, specifically
    Alexander. The revelation forces Worf to confront the unspoken cost of his death—not
    just on his son, but on the legacy he’s yet to fulfill. The confrontation leaves
    Worf shattered, his honor-bound resolve fractured by the weight of his unacknowledged
    influence on others. Riker’s exit leaves Worf alone with the crushing realization
    that his choice is no longer just about his own death, but about the lives he
    would abandon.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e16
