- fabula_uuid: cand_evt_scene_8820470e8bb8a538_01
  global_id: null
  title: Picard challenges Beverly’s medical ethics
  description: In Beverly Crusher’s office, Picard confronts her about suspending
    Dr. Russell after Worf’s paralysis, forcing a clash between Starfleet’s ethical
    boundaries and Klingon honor. Beverly, exhausted and resolute, defends her decision
    to block Russell’s experimental genetronic procedure, arguing that it violates
    medical principles and risks Worf’s life. Picard, however, appeals to Worf’s cultural
    identity—his inability to accept disability and his willingness to take risks—suggesting
    the procedure might offer a path between suicide and conventional therapy. The
    debate exposes Beverly’s moral rigidity and Picard’s pragmatic flexibility, while
    subtly shifting her perspective toward considering the procedure as a last resort.
    The scene underscores the tension between Starfleet’s protocols and the desperate
    choices of those who refuse to surrender to fate, setting up Beverly’s eventual
    approval of the risky surgery.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e16
  scene_sequence: 12
  sequence_in_scene: 22
  key_dialogue:
  - |-
    PICARD: Doctor?
    BEVERLY: Be my guest... but don't expect a lot of conversation, he's in full Klingon mode: honorable, strong... and closed-minded.
  - |-
    PICARD: Beverly... maybe you should consider letting her go ahead with the genetronic procedure.
    BEVERLY: How can you say that? She has a theory, based on a little empirical data and a lot of supposition...
  - |-
    PICARD: If he can't make a full recovery... Worf's going to kill himself.
    BEVERLY: ((firm)) Not in my sickbay, he's not. I'll put him in a restraining field and post security outside the door before I let him commit suicide.
  - |-
    PICARD: How long could you keep him like that? A week... a month... a year?
    BEVERLY: If I have to. Suicide is not an option.
  - |-
    PICARD: He can't make the journey you're asking of him, Beverly. You want him to go from contemplating suicide to accepting his condition and living with the disability. But that's too far... the road in between covers a lifetime of values and beliefs... he can't do it.
    BEVERLY: ((frustrated)) No, not all of it! There are some things I can't fix. Klingon or not, he's got to accept that his condition--
    PICARD: But perhaps he can come part of the way... maybe he can be persuaded to forgo the ritual... in order to take a chance at regaining the kind of life he needs.
  - 'PICARD: It may not be good medicine... but for Worf, it may be the only choice.'
