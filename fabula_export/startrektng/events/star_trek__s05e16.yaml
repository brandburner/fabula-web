  global_id: null
  title: Worf demands ritual suicide from Riker
  description: In a private sickbay confrontation, Worf—paralyzed and emotionally
    shattered—shocks Riker by requesting his assistance in the Klingon Hegh'bat ritual
    suicide. The moment begins with Riker’s awkward attempt at levity, which Worf
    immediately shuts down by revealing his permanent paralysis. Worf’s request isn’t
    just a plea for death; it’s a test of Riker’s loyalty, framed as the only path
    to restore his warrior’s dignity. Riker’s visceral refusal forces Worf to escalate
    his appeal, invoking their shared history and honor as a Klingon. The scene escalates
    from clinical detachment to raw emotional confrontation, with Worf’s unyielding
    stance revealing the depth of his cultural shame and Riker’s moral conflict. The
    exchange ends with Riker visibly shaken, the weight of Worf’s demand hanging between
    them. This moment isn’t just a turning point in Worf’s arc—it’s a collision of
    Klingon tradition and Starfleet values, forcing both men to confront the limits
    of their friendship and the cost of honor.
