      approach to medicine and the emotional, cultural dimensions of death and survival.
      The lab is a microcosm of the *Enterprise-D* itself—a place where logic and
      humanity must coexist, often in conflict.
    access_restrictions: Restricted to senior medical staff and key personnel (Beverly,
