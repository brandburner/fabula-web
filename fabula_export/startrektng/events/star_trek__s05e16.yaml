- fabula_uuid: cand_evt_scene_c8399df05f83dca8_02
  global_id: null
  title: Geordi exposes Worf’s bluff in cargo bay
  description: "\n  In the cargo bay, Worf and Geordi scan for a chlorinide leak among\
    \ stacked containers while bantering about a recent card game. Worf, still irritated\
    \ about losing to Deanna Troi, insists she couldn’t have bluffed him—until Geordi\
    \ reveals he used his VISOR to see Worf’s hand through the cards. The playful\
    \ revelation shifts to horror as Worf, distracted by the conversation, steps too\
    \ close to a structurally compromised container. The support beam collapses, and\
    \ the container crushes Worf, leaving him unconscious beneath the wreckage. Geordi’s\
    \ urgent call for medical assistance marks the catastrophic turning point that\
    \ triggers Worf’s paralysis and subsequent existential crisis.\n\n  This moment\
    \ is a microcosm of Worf’s duality: his pride in Klingon honor (embodied in the\
    \ card game) clashes with his vulnerability (exposed by Geordi’s VISOR and the\
    \ accident). The accident itself is a physical manifestation of his emotional\
    \ instability—his distraction from the immediate danger mirrors his later fixation\
    \ on ritual suicide over adaptive solutions. The event also foreshadows Geordi’s\
    \ role as an unwitting catalyst for Worf’s downfall, setting up their later dynamic\
    \ where Geordi’s technical insight (like his VISOR) will contrast with Worf’s\
    \ cultural rigidity.\n  "
