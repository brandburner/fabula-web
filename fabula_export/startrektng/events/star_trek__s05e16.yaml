      they follow (or defy) in their desperate attempt to save Worf. The organization’s
      influence is felt in the team’s adherence to—and eventual abandonment of—medical
      ethics, as they escalate from standard treatments to experimental and ultimately
      lethal interventions. Starfleet Medical’s values are tested: the belief in the
      power of science to overcome any obstacle is confronted by the reality of Worf’s
      death, while the tension between cultural sensitivity and medical intervention
      is laid bare. The organization’s protocols are both a guide and a constraint,
      their failure to save Worf a critique of the limits of Starfleet’s medical capabilities.'
    active_representation: Via the collective action of its members (Beverly, Russell,
      Ogawa) and the institutional protocols they follow (or defy) in their attempts
      to save Worf.
    power_dynamics: Exercising authority over the medical team’s actions, but ultimately
      constrained by the biological reality of Worf’s condition. The organization’s
