  title: Riker confronts Worf’s suicide request
  description: 'In Worf’s sickbay room, Riker arrives to find his paralyzed friend
    struggling with shame and cultural duty. Worf, unable to reconcile his warrior
    identity with his permanent disability, asks Riker to assist in the Klingon Hegh’bat
    ritual suicide—a request that forces Riker to grapple with his moral objections
    and the weight of their friendship. Worf’s appeal, framed as a final act of honor,
    exposes the depth of his despair and the cultural stigma binding him. The moment
    fractures Riker’s composure, leaving him stunned by the collision of Klingon tradition
    and Starfleet values. This exchange marks a turning point: Worf’s demand for death
    becomes Riker’s moral dilemma, setting up the larger conflict between honor, survival,
    and the ethical limits of friendship. The scene’s emotional core lies in Worf’s
    quiet desperation and Riker’s visceral refusal, a clash that underscores the irreconcilable
    divide between their worlds.'
