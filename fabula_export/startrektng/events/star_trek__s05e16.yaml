  key_dialogue: &id003
  - 'RIKER: You look pretty good for someone who''s been eating sickbay food for three
    days.'
  - 'WORF: I am not merely injured... Doctor Crusher believes my... paralysis will
    be permanent.'
  - 'WORF: I want you to assist me in performing the... Hegh''bat ceremony. I want
    you to help me die.'
  - 'WORF: When a Klingon can no longer stand and face his enemies as a warrior...
    when he becomes a burden to his family and friends... it is time for the Hegh''bat...
    time for him to die.'
  - 'WORF: I will not live as an object of... pity... or shame. My life as a Klingon
    is over.'
  - 'WORF: We have served together for many years... fought side by side... I know
    you to be a brave and honorable man... if you truly consider me your friend...
    help me now... help me end my life as I lived it... with dignity and honor. Please.'
