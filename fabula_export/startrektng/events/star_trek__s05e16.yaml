  key_dialogue: &id011
  - 'BEVERLY: I thought we had discussed genetronics.'
  - 'RUSSELL: We did.'
  - 'BEVERLY: And I also thought we had decided against recommending it.'
  - 'RUSSELL: You heard him... he''d rather die than live with the implants. I just
    gave him a better option than suicide.'
  - 'BEVERLY: He''s grasping at straws and you''re giving him one. Now, instead of
    dealing with his paralysis, he''s going to be thinking about this miracle cure
    of yours.'
  - 'RUSSELL: There''s a real chance this could work. And if it does, it''ll be a
    major breakthrough in neurogenetics that will change a lot of people''s lives.'
  - 'BEVERLY: You''re using the desperation of an injured man as an excuse to try
    a procedure you couldn''t do under normal circumstances.'
  - 'RUSSELL: Are you really going to hide behind the rules of some bureaucracy? Your
    patient''s life is at stake here.'
  - 'PICARD''S COM VOICE: We''ve located the survivors from the *Denver*.'
  - 'BEVERLY: We''re ready down here. I have triage teams standing by.'
  - 'RUSSELL: Could you use an extra pair of hands?'
  - 'BEVERLY: Absolutely.'
