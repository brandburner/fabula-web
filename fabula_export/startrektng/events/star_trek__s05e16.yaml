  title: Worf learns of permanent paralysis
  description: 'Worf regains consciousness in sickbay after a crushing cargo bay accident,
    initially disoriented but physically responsive. His attempt to sit up reveals
    the horrifying truth: he cannot move his lower body. Beverly Crusher delivers
    the devastating news—his spinal cord is irreparably damaged, leaving him permanently
    paralyzed. The moment shatters Worf’s warrior identity, forcing him to confront
    the existential weight of his injury. His confusion gives way to stunned realization
    as Beverly’s clinical confirmation strips away any hope of recovery, setting the
    stage for his subsequent crisis of honor and the ritual suicide request. The scene
    hinges on the brutal contrast between Worf’s Klingon resilience and the medical
    finality of his condition, with Beverly’s reluctant honesty underscoring the irrevocable
    shift in his life.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e16
  scene_sequence: 2
  sequence_in_scene: 4
  key_dialogue:
  - 'WORF: What... happened?'
  - 'BEVERLY: The containers you were checking fell on you. You''re lucky to be alive.'
  - 'WORF: I will not attempt to leave sickbay without your approval, Doctor. The
    restraining field is not necessary.'
  - 'BEVERLY: Worf... there is no restraining field.'
  - 'WORF: (objecting) But I cannot move my legs.'
  - 'BEVERLY: I know. You can''t move because one of the containers shattered seven
    of your vertebrae... and crushed your spinal cord.'
  - 'BEVERLY: I''m afraid... there''s no way to repair this kind of injury.'
