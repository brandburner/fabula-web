  global_id: null
  title: Worf learns of permanent paralysis
  description: 'Worf regains consciousness in sickbay after a crushing accident, initially
    disoriented but physically responsive. When he attempts to sit up, he discovers
    his lower body is paralyzed. Beverly Crusher delivers the devastating news: his
    spinal cord is irreparably damaged, leaving him permanently paralyzed. The moment
    shatters Worf’s physical and emotional resilience, forcing him to confront the
    irreversible loss of his warrior’s body—a crisis that will test his Klingon honor,
    his friendship with Riker, and his role as a father. The scene pivots from medical
    recovery to existential reckoning, setting up Worf’s subsequent spiral into despair
    and his request for ritual suicide.'
