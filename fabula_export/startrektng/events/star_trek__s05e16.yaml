  title: Troi’s suppressed grief surfaces
  description: After Alexander falls asleep in her lap, Troi’s professional composure
    finally cracks. The moment of quiet vulnerability reveals her unspoken anxiety—her
    fingers tremble as she strokes the boy’s hair, her breath shallow, her posture
    rigid with tension. This unguarded moment underscores the psychological toll Worf’s
    crisis has taken on her, not just as a counselor but as someone who has been holding
    space for others while neglecting her own emotional needs. The scene foreshadows
    Troi’s potential role as a bridge between Worf’s Klingon honor and the crew’s
    desperate hope for his survival, hinting at her future confrontation with suppressed
    grief and the fragility beneath her empathetic facade.
