  title: Worf entrusts Alexander to Troi
  description: In the quiet aftermath of Alexander’s poignant farewell, Worf—now resigned
    to his impending death—turns to Deanna Troi with a request that exposes his deepest
    vulnerability. After a tender but strained exchange with his son, where Alexander
    shares his school achievements and clings to Worf in a wordless hug, Worf watches
    Troi with uncharacteristic softness. He hesitates, then asks her to raise Alexander
    if he dies, framing it as a carefully considered decision rooted in his respect
    for her emotional insight and maternal instincts. Troi, visibly moved, accepts
