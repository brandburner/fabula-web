  title: Beverly condemns Russell’s ethics
  description: In Beverly’s office, Russell arrives to discuss Worf’s recovery, her
    tone initially light and self-congratulatory. Beverly, however, refuses to acknowledge
    Russell’s role, forcing a confrontation. Beverly’s cold dismissal escalates into
    a scathing indictment of Russell’s research-first approach, framing it as a violation
    of medical ethics. She accuses Russell of prioritizing breakthroughs over patient
    safety, citing the lives lost in her pursuit of progress. The exchange underscores
    their irreconcilable values—Beverly’s compassionate pragmatism versus Russell’s
    dogmatic adherence to experimental advancement—while marking the definitive collapse
    of their professional and personal compatibility. Russell’s exit leaves Beverly’s
    stance unchallenged, reinforcing her moral authority on the *Enterprise* and setting
    up future tensions over medical ethics, particularly as Worf’s recovery continues
    under her supervision. The scene also foreshadows Beverly’s eventual approval
    of Worf’s risky surgery, as her own principles will later bend under the weight
    of his life-or-death stakes.
