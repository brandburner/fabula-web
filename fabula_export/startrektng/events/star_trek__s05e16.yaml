- fabula_uuid: cand_evt_scene_914e093bf0638892_01
  global_id: null
  title: Riker dismantles Worf’s ritual suicide
  description: Riker arrives in Worf’s sickbay with ceremonial objects for the Hegh’bat
    ritual, only to violently reject the Klingon tradition, calling it a 'despicable'
    glorification of death. He challenges Worf’s honor by invoking fallen comrades
    who fought for life, exposing Worf’s self-pity and the cultural loophole that
    Alexander—not Riker—must perform the ritual. The confrontation forces Worf to
    confront his selfishness, the weight of his legacy, and the fragility of his Klingon
    absolutes. Riker’s refusal to comply leaves Worf isolated, his ritual blocked,
    and his resolve shaken—setting up his eventual choice to live for Alexander and
    the Empire’s unfinished battles. The scene pivots from cultural duty to emotional
    reckoning, with Riker’s moral outrage clashing against Worf’s paralyzed (literally
    and figuratively) sense of honor.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e16
  scene_sequence: 14
  sequence_in_scene: 26
  key_dialogue:
  - |-
    WORF: I am ready, Commander.
    RIKER: I've been studying this ritual of yours, and you know what I've decided? I think it's despicable. I hate everything about it... the casual disregard for life... the way it tries to cloak suicide in some glorious notion of honor.
  - 'RIKER: Do you remember Sandoval? Hit by a disruptor blast two years ago. She
    lived for about a week. How about Fang-lee... Marla Aster... Tasha Yar... how
    many good men and women—how many friends have we watched die? Even I''ve lost
    count. But every one of them—every single one—fought for life until the very end.'
  - |-
    RIKER: A Klingon does not put his own desires above those of his family and friends. How many people on this ship consider you a friend? How many owe you their lives? Have you given any thought to how you have affected the people around you? And how they might feel about your dying?
    WORF: ((a shout)) Enough!
  - |-
    RIKER: According to tradition, that honor falls to a family member... preferably the oldest son. The son of a Klingon is a man the day he can first hold a blade. True?
    WORF: Alexander is not fully Klingon... he is part Human.
    RIKER: That's an excuse. What you really mean to say is that it would be too hard for you to look at your son and tell him that he must hand you the knife... watch you stab it into your heart... and then pull the knife from your chest and wipe the blood on his sleeve. That is the rite of death, isn't it?
