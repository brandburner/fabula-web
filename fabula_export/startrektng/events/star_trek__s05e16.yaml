  scene_sequence: 2
  sequence_in_scene: 5
  key_dialogue:
  - 'WORF: What... happened?'
  - 'BEVERLY: The containers you were checking fell on you. You''re lucky to be alive.'
  - 'WORF: I will not attempt to leave sickbay without your approval, Doctor. The
    restraining field is not necessary.'
  - 'BEVERLY: Worf... there is no restraining field.'
  - 'WORF: But I cannot move my legs.'
  - 'BEVERLY: I know. You can''t move because one of the containers shattered seven
    of your vertebrae... and crushed your spinal cord. I''m afraid... there''s no
    way to repair this kind of injury.'
