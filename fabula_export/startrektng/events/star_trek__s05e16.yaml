  key_dialogue: &id005
  - 'WORF: I want you to assist me in performing the... Hegh''bat ceremony. I want
    you to help me die.'
  - 'WORF: When a Klingon can no longer stand and face his enemies as a warrior...
    when he becomes a burden to his family and friends... it is time for the Hegh''bat...
    time for him to die.'
  - 'WORF: I know you to be a brave and honorable man... if you truly consider me
    your friend... help me now... help me end my life as I lived it... with dignity
    and honor. Please.'
