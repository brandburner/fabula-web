- fabula_uuid: act_d8472f2a0c9be77a
  number: 3
  summary: Act Three intensifies the conflict between Beverly and Russell, while Worf's
    personal struggle reaches a new low. Beverly immediately confronts Russell for
    offering the unapproved genetronic procedure to Worf, accusing her of exploiting
    Worf's desperation and prioritizing a groundbreaking research opportunity over
    patient safety. Russell defends her actions, arguing for the potential of her
    research and dismissing Starfleet Medical's rejections as bureaucracy. Their argument
    is interrupted by the arrival of casualties from the Denver, forcing a temporary
    truce as they convert a shuttlebay into an emergency triage center. The chaotic
    environment of the emergency hospital highlights the pressure on medical staff.
    Meanwhile, Worf, attempting to show strength to Alexander, tries to stand using
    motor assist bands but collapses in front of his son, experiencing profound humiliation.
    He harshly dismisses Alexander, further damaging their relationship and revealing
    the depth of his shame. The ethical clash between the doctors escalates when Beverly
    discovers Russell used an experimental 'Borathium' treatment on a critically injured
    Denver patient, who subsequently dies. Beverly condemns Russell's reckless approach,
    accusing her of using a dying man as a research subject and prioritizing data
    over conventional life-saving treatments. Russell, unrepentant, argues her research
    will save thousands of lives in the long run. Beverly, outraged, relieves Russell
    of all medical duties, drawing a clear line against her experimental methods.
    This act showcases the dangerous implications of Russell's ambition and the emotional
    toll of Worf's condition on himself and his family.
