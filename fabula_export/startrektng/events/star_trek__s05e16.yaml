  title: Worf paralyzed in cargo bay accident
  description: "\n  In the Enterprise's cargo bay, Worf and Geordi investigate a chlorinide\
    \ leak among stacked containers. Their playful banter about Worf's poker hand—revealed\
    \ by Geordi's VISOR—shifts abruptly when Worf's suspicion turns to a structural\
    \ collapse. A leaking container melts its support beam, causing a catastrophic\
    \ fall that crushes Worf beneath heavy cargo. Geordi's frantic call for medical\
    \ aid marks the moment Worf's paralysis begins, setting in motion his existential\
    \ crisis over honor, death, and his son Alexander. The accident serves as both\
    \ a physical and narrative turning point: Worf's injury forces him to confront\
    \ his Klingon values, while the chlorinide mission (and later subspace anomalies)\
    \ become secondary to the crew's emotional reckoning with his fate. The scene's\
    \ tension lies in the contrast between Worf's earlier bravado and his sudden vulnerability,\
    \ foreshadowing the moral dilemmas that will divide the crew—particularly Riker,\
    \ Beverly, and Dr. Russell—in the coming beats.\n  "
