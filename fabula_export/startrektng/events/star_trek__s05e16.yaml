  title: Worf rejects Beverly and Alexander
  description: 'Worf, freshly paralyzed and refusing to accept his condition, attempts
    to stand in his sickbay room, only to collapse when his legs fail him. Beverly
    enters and catches him, delivering the devastating truth: his paralysis is likely
    permanent. Worf, consumed by Klingon honor and shame, dismisses her compassionate
    but firm assessment, insisting he must remain active despite his injuries. When
    Beverly mentions Alexander’s desire to visit, Worf reacts with visceral rejection,
    refusing to let his son see him in this state. His refusal to face his vulnerability—both
    physical and emotional—underscores the fracture between his warrior identity and
    his new reality, setting up his later confrontation with Riker over ritual suicide.
    The moment also foreshadows the emotional reckoning that will force Worf to choose
    between tradition and survival, while highlighting Beverly’s role as a bridge
    between medical pragmatism and Worf’s cultural pride.'
