  title: Genetronic failure reveals Worf’s dwindling time
  description: "\n  In the sterile glow of the medical lab, Dr. Russell and Beverly\
    \ Crusher attempt to replicate Worf’s spinal column using advanced genetronic\
    \ technology, but the procedure stalls when the machine fails to process his Klingon\
    \ dorsal root ganglia. The alarm blares, halting progress, and Ogawa delivers\
    \ a grim update: Worf now has less than two hours before irreversible brain damage.\
    \ Russell improvises a manual workaround, but the failure underscores the fragility\
    \ of Worf’s survival and the urgency of Riker’s impending decision—whether to\
    \ honor Worf’s ritual suicide request or fight for his life. The scene escalates\
    \ tension by exposing the experimental procedure’s limitations and forcing the\
    \ medical team to confront the ticking clock over Worf’s fate.\n  "
