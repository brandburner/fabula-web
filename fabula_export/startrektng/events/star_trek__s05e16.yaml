- fabula_uuid: act_bced97e7409588e1
  number: 2
  summary: Act Two deepens the medical and ethical quandaries surrounding Worf's paralysis.
    Beverly and Russell analyze Worf's unique Klingon anatomy, with Russell viewing
    its redundancies as 'overdesigned.' Russell then introduces the genetronic replicator,
    an advanced, experimental device capable of growing replacement organs. She proposes
    replacing Worf's entire spinal column, a procedure never before attempted on a
    humanoid, with a success rate of only thirty-seven percent in simulations. Beverly
    vehemently rejects this radical approach, citing the immense risk and ethical
    implications, preferring conventional treatments. This exchange further highlights
    the ideological clash between the two doctors. Concurrently, the Enterprise responds
    to a distress call from the transport ship Denver, creating a high-stakes medical
    emergency that will soon test their methods. Riker, still grappling with Worf's
    request, seeks Captain Picard's counsel. Picard, while acknowledging the human
    perspective, urges Riker to respect Worf's Klingon beliefs, emphasizing the depth
    of their friendship. Meanwhile, Counselor Troi confronts a distraught Alexander,
    who is desperate to see his father but is being kept away by Worf. Troi then confronts
    Worf directly, accusing him of selfishness and neglecting Alexander's emotional
    needs, challenging his honor-bound stance. Worf, under pressure, reluctantly considers
    neural implants offering partial mobility but rejects them after a painful demonstration,
    finding the prospect of limited function humiliating. Seizing the opportunity,
    Russell, against Beverly's explicit wishes, reveals the genetronic replication
    option to Worf, offering him a glimmer of hope for a full recovery and further
    complicating the ethical landscape.
