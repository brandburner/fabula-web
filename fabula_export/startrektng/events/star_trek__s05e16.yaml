- fabula_uuid: cand_evt_scene_ebb9808b4deb0683_01
  global_id: null
  title: Beverly strips Russell of medical privileges
  description: "\n  In the chaos of the shuttle bay triage center, where injured crew\
    \ and civilians are being treated, Beverly Crusher discovers a deceased patient—a\
    \ victim of Dr. Russell’s unauthorized experimental Borathium therapy. The confrontation\
    \ begins with Beverly’s clinical inquiry about the man’s death, which Russell\
    \ justifies as a calculated risk for groundbreaking medical progress. Beverly’s\
    \ initial disbelief turns to outrage as she realizes Russell bypassed standard\
    \ treatments to test her unproven rybotherapy. The argument escalates when Russell\
    \ deflects blame, accusing Beverly of prioritizing Worf’s case over scientific\
    \ advancement. Beverly, however, sees Russell’s actions as a pattern of ethical\
    \ violation, particularly in her push to experiment on Worf. The tension peaks\
    \ when Beverly invokes her authority as chief medical officer, stripping Russell\
    \ of her privileges. The exchange forces a reckoning over the moral limits of\
    \ medical innovation and the hierarchy of command in Starfleet’s medical ethics.\
    \ Russell’s cold defiance underscores her unyielding ambition, while Beverly’s\
    \ measured but firm response reasserts the primacy of patient safety over experimental\
    \ ambition. The moment crystallizes the ideological clash between conventional\
    \ medicine and radical progress, with Worf’s case looming as the flashpoint for\
    \ their conflict.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e16
  scene_sequence: 10
  sequence_in_scene: 20
  key_dialogue:
  - |-
    BEVERLY: What happened here?
    RUSSELL: He went into neural metaphasic shock.
    BEVERLY: From leporazine? That's unusual.
    RUSSELL: He couldn't take leporazine, his blood pressure was too low. So I had to try a different treatment.
    BEVERLY: A morathial series?
    RUSSELL: No. I tried a new rybotherapy I've been working with. It's called Borathium, and I've had some very good results...
  - |-
    BEVERLY: You used this man for one of your experiments?
    RUSSELL: Borathium is decades ahead of leporazine or morathial.
    BEVERLY: Morathial would have saved his life.
    RUSSELL: His injuries were so severe I don't think any conventional treatment could've saved him.
    BEVERLY: The point is, you didn't even try the standard treatments.
  - |-
    RUSSELL: That's what this is really about, isn't it? Lieutenant Worf. I'm offering him the chance to recover fully—a chance you can't give him.
    BEVERLY: What this is about is the kind of medicine you seem to practice.
    RUSSELL: I make no excuses about my approach to medicine. I don't like losing a patient any more than you do. But I'm looking down a long road, Doctor... this man didn't die for nothing—the data I gathered was invaluable... it will eventually help save thousands of lives.
    BEVERLY: I doubt that will comfort his family.
    RUSSELL: Let me ask you this: if, some years from now, Borathium therapy were to save the life of someone you loved... would you still condemn me?
    BEVERLY: I won't get drawn into a hypothetical argument, Doctor. Your research on this ship is over. You're relieved from all medical duties until further notice. Is that clear?
