      and ethics, their mere mention driving the conflict. Their absence from the
      scene is deliberate; they exist as an ideological battleground, not a tangible
      object. The debate over their use frames the larger question: How far should
      medicine go to save a life, and who gets to decide?'
    status_before_event: Stored in a secure medical lab or research facility aboard
      the *Enterprise*, awaiting approval for human trials. Their existence is theoretical
      in this context, as Starfleet Medical has denied Russell’s requests to test
