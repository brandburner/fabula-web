acts:
- fabula_uuid: act_dacd33213653d0c5
  number: 1
  summary: 'Act One establishes the central conflict following Worf''s debilitating
    injury. The teaser shows Worf''s accident in the cargo bay, resulting in permanent
    paralysis, a devastating blow to his identity as a Klingon warrior. Beverly Crusher
    delivers the grim prognosis, setting the stage for Worf''s emotional struggle.
    In his private sickbay room, Worf attempts to stand, demonstrating his refusal
    to accept his condition, only to collapse, highlighting his physical limitations.
    He rejects Beverly''s compassionate but firm medical advice, asserting his Klingon
    identity. Beverly, seeking a solution, brings in Dr. Toby Russell, a neurogeneticist
    known for experimental approaches. Russell''s arrival immediately introduces a
    contrasting medical philosophy; she is charming but asserts a detached, objective
    stance, hinting at her willingness to push boundaries. This sets up an underlying
    tension with Beverly, who is more patient-focused. The act culminates in Worf
    making a profound request to Commander Riker: to assist him in the Hegh''bat,
    a Klingon ritual suicide. Worf explains his belief that a warrior unable to fight
    becomes a burden, and he wishes to die with dignity. Riker, shocked and conflicted,
    struggles with his friendship and moral objections to suicide. This moment solidifies
    the core ethical dilemma of the narrative, forcing Riker to choose between cultural
    respect and personal conviction, and establishing Worf''s desperate state. The
    act effectively sets up the stakes for Worf''s life and the moral challenges facing
    those around him.'
