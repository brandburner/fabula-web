  title: Data struggles with artistic abstraction
  description: In Troi’s art class, Data—unable to grasp abstract artistic expression—sculpts
    a literal clay musical note after failing to replicate a PADD with precision.
    Troi, guiding students toward emotional abstraction, acknowledges his effort as
    a starting point but leaves him puzzled. The exchange underscores Data’s rigid
    logic, foreshadowing his later existential crisis when alien personalities invade
    his mind. The scene’s tension between literalism and creativity mirrors the broader
    conflict between Data’s synthetic nature and the emotional, irrational forces
    he will soon confront. The interruption by Riker’s combadge call abruptly shifts
    focus to the comet anomaly, linking Data’s artistic struggle to his impending
    role as a conduit for alien consciousness.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e17
  scene_sequence: 1
  sequence_in_scene: 2
  key_dialogue:
  - 'TROI: You obviously have no trouble with realism, Data, but you''re here to work
    on using your imagination. Maybe you should try something a little more... abstract.'
