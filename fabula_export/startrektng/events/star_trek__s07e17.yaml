  title: Picard deciphers Korgano’s duality in Masaka’s temple
  description: 'In Masaka’s temple—a cavernous, symbol-laden chamber centered around
    a golden solar throne—Picard, Troi, and Worf investigate the carvings adorning
    the columns. Troi discovers a critical pairing: Masaka’s dominant sun symbol and
    the smaller, receding horn emblem Picard has seen before. Picard synthesizes fragmented
    lore from Ihat and the old man, theorizing that the horn symbol represents Korgano,
    a mythical counterpart to Masaka’s destructive force. He posits that Korgano may
    be her consort or balance, a ritualistic counterweight to her power. The revelation
    reframes the cosmic conflict at play, suggesting that Korgano’s influence—embodied
    in the horn symbols—could be the key to controlling Masaka’s threat. Picard directs
    the team to search for additional horn artifacts, escalating the urgency to locate
    physical manifestations of Korgano’s power before Data’s transformation becomes
    irreversible. The moment marks a critical shift from passive investigation to
    active pursuit of a solution, with Picard’s deduction serving as the narrative
    linchpin between myth and tangible action.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e17
  scene_sequence: 21
  sequence_in_scene: 42
  key_dialogue:
  - 'PICARD: This would seem to be Masaka''s temple...'
  - 'TROI: Captain... look at this.'
  - 'PICARD: This is the first time I''ve seen these two symbols paired... That could
    be significant...'
  - 'PICARD: He''s not chasing her anymore... Ihat said that someone named Korgano
    was not chasing Masaka anymore. And the old man said, he pursues her no longer...
    In a sense, this smaller symbol is chasing Masaka. Perhaps it represents Korgano.'
  - 'PICARD: Both Ihat and the old man said that Korgano was the only one who could
    control Masaka... Many ritualistic cultures incorporate the idea of ''balance''
    into their belief systems. Masaka is a queen, a powerful, god-like figure... it''s
    not unreasonable to assume that she might have a counterpart... or a consort...'
  - 'PICARD: Spread out... see if you can find that horn-like symbol anywhere else.'
