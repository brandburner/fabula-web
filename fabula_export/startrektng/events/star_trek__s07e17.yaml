  title: Picard orders Archive destruction
  description: In the transformed Ten-Forward, where the Archive’s influence has warped
    the ship’s matter into alien vegetation and stone artifacts, Picard and Troi examine
    a sun-faced column symbolizing Masaka—a figure revered and feared by the alien
    personalities inhabiting Data. Geordi and Worf report that the transformation
    is spreading uncontrollably, with Deck Twelve now an aqueduct, confirming the
    Archive’s systemic corruption. Picard, grappling with the irreversible loss of
    knowledge, reluctantly orders the Archive’s destruction via manual photon torpedo
    launch, acknowledging the moral cost of sacrificing potential discovery for survival.
    The moment underscores the tension between curiosity and command, where leadership
    demands choices that weigh necessity against regret.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e17
  scene_sequence: 15
  sequence_in_scene: 29
  key_dialogue: &id007
  - 'TROI: Who is this?'
  - 'PICARD: I''d say it''s Masaka. Ihat referred to her as a queen... it''s not unusual
    in ceremonial cultures for royalty to be symbolized by a sun.'
  - 'TROI: You said the personalities inside Data were in awe of her... even terrified.'
  - 'PICARD: According to Data, the sun image is also the symbol for death.'
  - 'GEORDI: Captain, this is incredible... These artifacts weren''t beamed over here
    from the archive... the matter in Ten Forward was transformed.'
  - 'PICARD: Into living plants? How is that possible?'
  - 'WORF: We have received reports from the rest of the ship. Part of deck twelve
    is now an aqueduct.'
  - 'TROI: What are we being transformed into?'
  - 'GEORDI: I''m not sure I want to find out.'
  - 'PICARD: I don''t think we have a choice... we''ll have to destroy the Archive.
    Mister Worf?'
  - 'WORF: Sir, our weapon control systems are inoperative. However, we could configure
    a photon torpedo for manual launch...'
  - 'PICARD: Make it so.'
  - 'PICARD: There''s so much here we could have learned... I regret losing that opportunity.'
