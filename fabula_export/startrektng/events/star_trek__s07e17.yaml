- fabula_uuid: act_e33921786aacc5ab
  number: 2
  summary: Following the discovery of the ancient alien archive, the Enterprise crew,
    led by Picard, attempts to understand its nature. Data intuitively identifies
    the 87-million-year-old object as an "informational archive," a claim that puzzles
    his colleagues given his usual logical processes. Concerned about Data's unusual
    connection, Picard orders Geordi to perform a diagnostic on Data's positronic
    net. Meanwhile, Picard and Riker examine various artifacts that have materialized
    across the ship, all bearing the distinctive compass design and a less prominent
    "moon" symbol. Picard theorizes these symbols relate to "movement" and "death,"
    hinting at a deeper cultural significance. During the diagnostic in Engineering,
    Data experiences a profound "impulse" and expresses fear of "losing his mind."
    Suddenly, alien circuitry appears within his head, the compass design manifests
    as scars on his face, and a ceremonial neckplate materializes around his neck.
    Data's demeanor completely shifts; he adopts an animated, playful, yet ominous
    persona, declaring, "Masaka is waking." This dramatic transformation marks the
    full manifestation of the alien influence within Data, signaling a critical turning
    point where the external threat directly impacts a core crew member and introduces
    the central antagonist, Masaka.
