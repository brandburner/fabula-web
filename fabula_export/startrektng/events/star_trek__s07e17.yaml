  title: Data’s mask reveals Troi’s artifact connection
  description: "\n  During an art class, Data sculpts a striking clay mask—a fusion\
    \ of Venetian and Mayan aesthetics—with an uncanny precision that surprises Counselor\
    \ Troi. As she examines the piece, Data traces a compass-like design into the\
    \ clay, mirroring an artifact Troi recently discovered in her quarters. When Troi\
    \ questions Data about the artifact’s origin, he denies familiarity, yet the coincidence\
    \ deepens the mystery of the alien archive’s influence. The moment is interrupted\
    \ when Eric’s computer screen displays alien ideographic symbols arranged in the\
    \ same compass pattern, prompting Data to suggest further investigation. This\
    \ exchange subtly foreshadows the archive’s growing hold over Data and its unexplained\
    \ ties to Troi’s Betazoid heritage, while reinforcing the crew’s unease about\
    \ the ship’s transformation.\n  "
