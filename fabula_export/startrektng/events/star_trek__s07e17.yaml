- fabula_uuid: cand_evt_scene_bc3fb4fb2e3e25dd_01
  global_id: null
  title: Geordi proposes moon symbol as Masaka control
  description: "\n  On the *Enterprise* bridge, Geordi La Forge identifies Korgano’s\
    \ isolated moon symbol within the alien Archive’s transformation program, proposing\
    \ it as a potential means to regain control over Masaka. The crew debates the\
    \ risks—including destabilizing Data’s fractured consciousness—but Picard, desperate\
    \ to save the ship, authorizes the implementation. The gamble pays off when a\
    \ silver mask bearing Korgano’s symbol materializes, offering Picard a ritualistic\
    \ tool to confront Masaka. The moment marks a turning point where Picard abandons\
    \ passive observation for active deception, embracing cultural manipulation despite\
    \ the unknown consequences. Worf’s grim update—less than two hours before the\
    \ ship is unrecognizable—underscores the urgency, forcing Picard to act without\
    \ certainty. The scene pivots from scientific analysis to cultural improvisation,\
    \ revealing Picard’s willingness to risk his authority and the mission’s stability\
    \ for survival.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e17
  scene_sequence: 25
  sequence_in_scene: 47
  key_dialogue: &id013
  - 'GEORDI: I''ve found it, sir... This is the only place in the Archive where Korgano''s
    moon symbol is by itself and not paired with Masaka''s.'
  - 'PICARD: Mister La Forge, access the transformation program. When you''re ready,
    input the symbol.'
  - 'RIKER: Isn''t that a little risky?'
  - 'PICARD: In some sense, Korgano is Masaka''s nemesis. Whatever this symbol represents—it
    might give us a way to control her. If you have a better idea, I''d be glad to
    entertain it.'
  - 'PICARD: Perhaps we''ve been approaching this incorrectly. We''re dealing with
    a highly ritualistic culture... a society based on symbol and myth. Maybe we need
    to confront them on those terms instead... If I can incorporate myself into their
    rituals, perhaps Masaka will listen to me.'
  - 'WORF: I estimate we have less than two hours before there''s nothing left of
    the ship... at least nothing that we recognize.'
