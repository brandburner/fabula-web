  - object_uuid: ger_object_a5ec1230b545
    description_of_involvement: "\n      The Masaka temple icon is the symbolic trigger\
      \ for the transformation, a glowing ancient symbol from the D’Arsay archive\
      \ that Geordi inputs into the console. This icon represents the crew’s attempt\
      \ to engage with the archive on its own terms, a gamble that could either stabilize\
      \ Data or unleash the full force of the archive’s influence. The icon’s activation\
      \ is the catalyst for the corridor’s dissolution, marking the irreversible escalation\
      \ of the crisis and the crew’s loss of control over their environment.\n    "
    status_before_event: Displayed on Geordi’s console, glowing and awaiting input,
      a symbol of the archive’s power and mystery.
    status_after_event: The icon’s activation triggers the transformation, its role
      as a catalyst now fulfilled as the corridor dissolves into an alien landscape.
    global_id: ger_object_a5ec1230b545
  - object_uuid: ger_object_bbcb7f843143
    description_of_involvement: "\n      Geordi’s tricorder, though not explicitly\
