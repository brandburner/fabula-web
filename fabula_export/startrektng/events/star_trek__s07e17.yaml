acts:
- fabula_uuid: act_da78a55bd8dec1da
  number: 1
  summary: 'The narrative begins with Counselor Troi and Data in an art class, where
    Data''s literal interpretation of tasks (sculpting a perfect PADD, then a musical
    note) highlights his struggle with abstract thought. Simultaneously, the Enterprise
    encounters a rogue comet, and during a sensor scan, Data experiences a brief,
    intense sensor echo. This incident coincides with strange occurrences across the
    ship: Troi discovers an unfamiliar, compass-designed artifact in her quarters,
    and Riker, Worf, and Geordi find the replicated food and drinks in Ten Forward
    have been inexplicably altered into bio-organic, blood-like substances. Geordi
    traces these anomalies to alien information being downloaded into the ship''s
    computer via the sensor array, displaying ideographic symbols arranged in the
    same compass design. Data, to his own surprise, inexplicably recognizes and translates
    some of these symbols, including "Boundary," "Road," and "Death." Following Picard''s
    orders, the Enterprise uses phasers to vaporize the comet''s outer shell, revealing
    a massive, ancient, Mayan-esque geometric structure of alien technology. This
    object is adorned with the very same symbols that have infiltrated the Enterprise''s
    systems, confirming its role as the source of the mysterious events. The act establishes
    the initial mystery, the subtle infiltration of the alien influence, and Data''s
    unexpected connection to it, setting the stage for a deeper exploration of the
    archive.'
