  title: Sensor echo reveals comet’s hidden threat
  description: "\n  On the *Enterprise* bridge, Data initiates a full sensor analysis\
    \ of an anomalous comet, revealing its 87-million-year journey from the D'Arsay\
    \ system. As he details the comet’s composition—hydrogen-helium shell, icy mantle,\
    \ and a core of heavier elements—the bridge lights briefly flare, marking an unnoticed\
    \ but critical moment: an intense sensor echo that subtly disrupts Data’s systems.\
    \ The anomaly forces a recalibration, and Data proposes a 39-hour low-intensity\
    \ scan to investigate further. Picard approves, unaware that this decision will\
    \ expose a latent, unnatural threat within the comet’s core—one that will later\
    \ manifest as an alien intelligence capable of hijacking Data’s neural network.\
    \ The scene establishes the comet as a ticking time bomb, with Data’s initial\
    \ exposure setting in motion the ship’s eventual crisis. The tension lies in the\
    \ contrast between the crew’s routine scientific curiosity and the unseen, escalating\
    \ danger lurking beneath the comet’s surface.\n  "
