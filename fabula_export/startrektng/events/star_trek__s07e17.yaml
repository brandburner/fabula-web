  key_dialogue:
  - 'RIKER: Maybe we''d better talk in here. The Observation Lounge seems to have
    become a swamp.'
  - 'GEORDI: So far the Archive''s transformed over twenty percent of the ship...
    and we''ve lost main propulsion and weapons systems in the process.'
  - 'BEVERLY: I''ve been analyzing samples of these alien plant forms. They''ve been
    formed from biological matter we have on the ship... The stone, the artifacts...
    they''re made the same way—extrapolated from the ship''s own lloys.'
  - 'PICARD: So it''s using our ship—our lloys, our DNA—to create elements of its
    own culture... But whatever the intent behind the process, I don''t want this
    ship transformed into an alien city.'
  - 'PICARD: ... with Masaka. We need to find her... access her... talk to her.'
