  title: Geordi detects alien blood in Riker’s drink
  description: "\n  In Ten Forward, Geordi La Forge casually scans Riker’s drink with\
    \ his tricorder after Riker complains about its unusual taste and texture. The\
    \ scan reveals the liquid is bio-organic, containing oxygenated cells and serum\
    \ electrolytes—effectively blood. This discovery shifts suspicion from the bartender\
    \ to the replicator itself, suggesting the alien archive’s influence has infiltrated\
    \ the *Enterprise*’s systems. The moment escalates the mystery, hinting at a deeper\
    \ contamination of the ship’s infrastructure and crew, while reinforcing the theme\
    \ of unseen, systemic corruption. Geordi’s technical insight and Riker’s visceral\
    \ reaction (disgust, then suspicion) drive the scene’s tension, as the crew realizes\
    \ the anomaly is not isolated but part of a larger, unfolding threat.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e17
  scene_sequence: 4
  sequence_in_scene: 8
