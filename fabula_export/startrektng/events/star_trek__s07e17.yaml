- fabula_uuid: act_2fab16cc83eb01df
  number: 3
  summary: With Data now hosting an alien personality, the situation escalates rapidly.
    The newly emerged persona, Ihat, confidently asserts Data is "gone" and expresses
    a mixture of pride and fear regarding Masaka, describing her as embodying "pain?
    Death?" When Counselor Troi enters, Ihat is instantly replaced by a "Victim" personality,
    terrified of Masaka and eager for sacrifice. The command crew convenes, where
    Geordi explains that Data's positronic net is being radically reorganized into
    "behavioral nodes," creating multiple alien personalities and completely suppressing
    Data's original self. The Archive continues its transformation of Data, with no
    clear way to sever the connection without risking his life. Picard decides to
    engage with these emerging personalities to glean information. In Data's quarters,
    Picard attempts to communicate with the shifting personas—from the fearful Victim
    to the agitated Ihat, then to a frightened Boy. During this interaction, the ship
    trembles as the Archive activates a tractor beam, drawing the Enterprise in and
    overriding its control systems. The Frightened Boy grips Picard's wrist with android
    strength, warning of Masaka's destructive power. Data then reverts to Ihat, who
    grimly declares, "Masaka is awake." Simultaneously, Ten Forward undergoes a dramatic
    physical transformation, becoming a tropical landscape with stone slabs and a
    prominent column featuring a large, radiant female sun face, identified as Masaka.
    This act establishes the direct threat to Data and the ship, confirming Masaka's
    active influence and the rapid, physical transformation of the Enterprise.
