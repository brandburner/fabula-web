  title: Data’s alien fixation reveals deeper connection
  description: 'In Engineering, Geordi and Riker analyze the alien archive’s intrusion
    into the *Enterprise*’s systems, tracing its origin to the comet’s sensor scans.
    Riker proposes a phaser-based solution to expose the comet’s core, but the conversation
    is derailed when Data—uncharacteristically distracted—reveals his involuntary
    recognition of the alien symbols. His translation of the icons (*‘boundary,’ ‘death,’
    ‘messenger’*) exposes the archive’s ominous intent and foreshadows his role as
    its conduit. The moment marks a critical shift: Data’s fixation signals the archive’s
    growing influence over him, while Riker’s tactical proposal becomes secondary
    to the existential threat now unfolding. The scene pivots from problem-solving
    to existential dread, with Data’s detachment underscoring the archive’s insidious
    hold.'
