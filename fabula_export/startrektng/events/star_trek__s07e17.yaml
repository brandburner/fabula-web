              The Archive’s transformation program is the unseen but all-powerful mechanism driving the event. Geordi accesses it through his console, inputting Korgano’s moon symbol as a counter to Masaka’s influence. The program responds by materializing the silver mask, a physical manifestation of the ritualistic power embedded in the Archive. Its role is dual: a tool for Picard’s gambit and a reminder of the alien culture’s dominance over the *Enterprise*’s systems. The program’s behavior is unpredictable, yet it adheres to the symbolic logic of the D’Arsay archive, making it both a threat and a potential key to resolution.
    status_before_event: |2-

              Embedded within the *Enterprise*’s systems, restructuring 20% of the ship—including propulsion and weapons—by reordering molecular structures. The program is active but latent, awaiting symbolic input to trigger further transformations.
    status_after_event: |2-

              The program has produced a tangible artifact: the silver mask bearing Korgano’s moon symbol. It remains integrated into the ship’s systems, but its immediate focus has shifted to Picard’s ritualistic confrontation with Masaka. The mask’s materialization suggests the program is responsive to symbolic commands, though its long-term effects remain uncertain.
