      \ presence a steadying force amid the tension. He nods in acknowledgment of\
      \ Worf’s report, his voice calm as he confirms readiness with Riker. His posture\
      \ is erect, his expression inscrutable, but his eyes betray a flicker of anticipation\
      \ as Geordi prepares to input the symbol. The moment the transformation begins,\
      \ his grip on the tricorder tightens almost imperceptibly—a rare outward sign\
      \ of the stakes at play.\n      "
