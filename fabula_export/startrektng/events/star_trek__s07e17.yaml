  global_id: null
  title: Phasers reveal the archive’s true nature
  description: "\n  The *Enterprise* crew, led by Picard, orders Worf to fire phasers\
    \ at the comet, vaporizing its outer shell to expose an ancient, Mayan-esque geometric\
    \ structure embedded within. The revelation triggers immediate speculation: Data,\
    \ with uncharacteristic certainty, identifies it as an informational archive—older\
    \ than the comet itself—while Geordi confirms it has been using the ship’s sensor\
    \ beams to transmit data into *Enterprise* systems. Picard, sensing the object’s\
    \ potential danger, orders a diagnostic of Data’s positronic net after Data admits\
    \ to an intuitive understanding of its function, a statement that unsettles the\
    \ crew. The scene escalates from discovery to alarm as the archive’s active, possibly\
    \ parasitic nature becomes clear, setting up the immediate threat to Data and\
    \ the ship’s systems.\n  "
