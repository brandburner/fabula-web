      just technical; it is existential, as the circuitry replaces Data’s positronic
      brain matter, erasing his identity and making way for Masaka’s dominance. The
      net’s corruption is visually and narratively symbolic, marking the irreversible
      loss of Data’s self and the crew’s control over the situation.
