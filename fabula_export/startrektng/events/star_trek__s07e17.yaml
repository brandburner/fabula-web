  title: Picard identifies Korgano as Masaka’s counterbalance
  description: "\n  Picard, Troi, and Worf analyze a glyph revealing Masaka’s sun\
    \ symbol in pursuit of a prominent horn symbol—interpreted as Korgano—suggesting\
    \ a cyclical dominance between the two entities. Picard deduces that Korgano,\
    \ as Masaka’s counterpart, could force her to relinquish control of Data. Their\
    \ discussion is abruptly interrupted when Data/Masaka enters the temple, ascends\
    \ the throne, and dismisses Picard’s pleas with cold indifference. The encounter\
    \ underscores Masaka’s unassailable power and forces Picard to shift strategy:\
    \ if Masaka won’t negotiate, they must find Korgano to counter her. The moment\
    \ marks a critical tactical pivot, moving the crew from passive observation to\
    \ active intervention in the archive’s power structure.\n  "
