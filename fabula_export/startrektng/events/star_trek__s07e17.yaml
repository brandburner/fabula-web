    - To neutralize the Archive’s threat by any means necessary, even if it requires
      manual configuration of a photon torpedo
    influence_mechanisms:
    - Through the chain of command (Picard’s orders guide the crew’s actions)
    - Through the crew’s specialized skills (Geordi’s engineering, Worf’s tactical
