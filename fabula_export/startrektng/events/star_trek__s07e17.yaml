- fabula_uuid: cand_evt_scene_66c58498291e6082_03
  global_id: null
  title: Picard declares Masaka as the solution
  description: 'On the darkened, vine-encroached Bridge of the *Enterprise*, Picard
    and his senior staff regroup after discovering the Observation Lounge has been
    transformed into an alien swamp. Geordi reports that the Archive has already altered
    20% of the ship, disabling propulsion and weapons while repurposing the crew’s
    DNA and materials to construct its own environment. The crew debates the Archive’s
    purpose—Worf suggests it’s a weapon, Riker proposes a cultural preservation device,
    and Picard theorizes it might be a terraforming tool. Despite the uncertainty,
    Picard pivots to decisive action, identifying Masaka as the key to reversing the
    transformation. He orders Geordi to stabilize the transformation program while
    he personally commits to locating and communicating with Masaka, marking a shift
    from reactive panic to strategic intervention. The moment underscores Picard’s
    leadership under pressure and the crew’s collective vulnerability as they confront
    an unknown, adaptive threat that has already infiltrated their ship’s core systems
    and biology. The looming image of Masaka’s mask on the viewscreen reinforces the
    urgency of their mission: understanding her is the only path to salvation.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e17
  scene_sequence: 17
  sequence_in_scene: 34
  key_dialogue:
  - 'PICARD: So it''s using our ship—our lloys, our DNA—to create elements of its
    own culture...'
  - 'TROI: But why is all this happening? What is the Archive trying to accomplish?'
  - 'PICARD: But whatever the intent behind the process, I don''t want this ship transformed
    into an alien city. Mister La Forge, do you have any ideas?'
  - 'GEORDI: We still haven''t been able to cut off that beam... but I''ve managed
    to access the Archive by sending an energy pulse back along their signal path.
    If I can locate the transformation program, I might be able to get control of
    it.'
  - 'PICARD: But somehow... I believe the answer lies there... with Masaka. We need
    to find her... access her... talk to her.'
