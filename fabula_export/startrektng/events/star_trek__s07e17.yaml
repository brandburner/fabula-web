      \ turning point, as the tricorder’s readout forces the crew to confront the\
      \ contamination’s true nature. Its role is both diagnostic and symbolic: it\
      \ bridges the gap between the crew’s sensory discomfort (Riker’s disgust) and\
      \ the systemic threat posed by the comet’s influence. The tricorder’s authority\
      \ as a Starfleet tool lends credibility to the discovery, ensuring the crew\
      \ cannot dismiss the contamination as a fluke.\n      "
    status_before_event: Idle on the table, a standard-issue diagnostic tool among
