  title: Data confesses alien intrusion symptoms
  description: "\n  During a routine diagnostic in Engineering, Data—whose head is\
    \ partially open for examination—suddenly experiences an unsettling 'impulse'\
    \ that disrupts his usual composure. When Geordi notices his distress, Data admits\
    \ to an unfamiliar sensation, then asks a chilling question: 'What does it feel\
    \ like when a person loses his mind?' His voice wavers, revealing vulnerability\
    \ as he grapples with the possibility of losing control. Geordi reassures him,\
    \ but before he can finish, the diagnostic console registers violent anomalies.\
    \ Inside Data's head, alien circuitry has begun replacing his positronic brain,\
    \ and his face now bears the raised scars of the compass design from his earlier\
    \ sculpture. A ceremonial neckplate appears around his neck, signaling the emergence\
    \ of Masaka. The moment marks the first visible crack in Data's stability, foreshadowing\
    \ the alien archive's insidious influence and the existential threat to his identity.\
    \ The scene shifts from clinical concern to horror as Data's transformation accelerates\
    \ beyond his control, leaving Geordi stunned and the audience with a sense of\
    \ impending catastrophe.\n  "
