  global_id: null
  title: Picard returns Data’s mask
  description: 'In the Ready Room, Picard confronts Data with the Masaka mask—a personal
    artifact Data crafted himself during Troi’s art class, long before the alien archive’s
    influence. The mask, now glazed and preserved, becomes a tangible link between
    Data’s synthetic identity and the alien consciousnesses he absorbed. Picard’s
    curiosity about its survival during Data’s transformation prompts Data to disclose
    its origin, revealing how deeply the artifact is tied to his emotional processing
    of the encounter. This moment deepens the mask’s symbolic weight as a bridge between
    Data’s humanity and the alien experiences he endured, while reinforcing the scene’s
    thematic tension: the fragility of identity when confronted with the unknown.
    Data’s admission of feeling ‘empty’ after the alien personalities depart underscores
    his existential struggle, while Picard’s wry observation—‘you’ve been an entire
    civilization’—frames Data’s ordeal as transcendent yet isolating. The exchange
    closes with Picard returning the mask, a gesture of closure that also signals
    Data’s return to duty, though the weight of his experience lingers unspoken.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e17
  scene_sequence: 27
  sequence_in_scene: 53
  key_dialogue:
  - 'PICARD: I don''t understand... I thought all the alien artifacts had disappeared
    from the Enterprise.'
  - 'DATA: This was not created by the Archive... this is the clay mask I originally
    made. I have since glazed it.'
  - 'DATA: Yes. Although I am relieved to be rid of those alien personalities... there
    is a sense in which I am now... empty.'
  - 'PICARD: Well, Data, you may never become fully human... but you''ve had an experience
    that transcends the human condition. You have been an entire civilization.'
