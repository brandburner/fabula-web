    - Through tactical resources (phasers, diagnostics) to neutralize the threat.
    - Through the chain of command (Riker’s authority to make decisions in Picard’s
      absence).
    institutional_impact: "\n        The event exposes a fundamental tension in Starfleet’s\
      \ mission: the balance between exploration and self-preservation. The crew’s\
      \ growing unease reflects a broader question—*how far should they go to uncover\
      \ the truth?*—that will shape their actions moving forward.\n      "
    internal_dynamics: "\n        The absence of Picard creates a power vacuum, forcing\
      \ Riker to step into a leadership role that may require him to make morally\
      \ ambiguous decisions. There’s an unspoken debate between *science* (Geordi’s\
