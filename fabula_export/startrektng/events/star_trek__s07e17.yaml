  title: Data's possession reveals Masaka's awakening
  description: 'In Data''s quarters, Picard attempts to leave after receiving an urgent
    com from Geordi about the ship''s systems being overridden, but Data—manifesting
    as the vulnerable ''Boy'' persona—physically restrains him with android strength,
    pleading for help while revealing his escalating fear of the alien entities consuming
    him. The scene shifts abruptly as Ihat, a more sinister entity, seizes control
    and delivers a chilling revelation: Masaka, the most dangerous of the alien consciousnesses,
    has awakened. This transformation marks a critical escalation, where Data''s possession
    evolves from a personal crisis into an existential threat to the *Enterprise*
    and its crew. The moment underscores the urgency of Picard''s dilemma—balancing
    Data''s suffering against the ship''s survival—while exposing the true scale of
    the threat now aboard the vessel. The physical restraint and subsequent personality
    shift serve as a visceral demonstration of the alien entities'' dominance over
    Data, forcing Picard to confront the reality that this is no longer just about
    saving his friend but preventing a catastrophic transformation of the ship itself.'
