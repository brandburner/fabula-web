  object_involvements:
  - object_uuid: ger_object_1c30a0a84d1f
    description_of_involvement: "\n      The Archive’s Transformation Program is the\
      \ invisible antagonist of this scene—a malevolent force rewriting the *Enterprise*’s\
      \ very structure, atom by atom. Geordi’s discovery of Korgano’s moon symbol\
      \ within its code is a glitch in its otherwise seamless operation, a weakness\
      \ the crew exploits like hackers probing a firewall. When Picard orders its\
      \ activation, the program responds not with destruction, but with creation:\
      \ the silver mask, a physical manifestation of Korgano’s symbolic power. This\
      \ object is both a tool and a test—will Picard wield it as a key to unlock Masaka’s\
      \ influence, or will it become another layer of the Archive’s control? Its materialization\
      \ is a narrative pivot, shifting the crew from passive observers to active participants\
      \ in a cultural war.\n      "
    status_before_event: Embedded in the *Enterprise*’s systems, 20% of the ship’s
      structure already transformed into alien environments (vine-infested bridges,
      swamps). The program is running autonomously, with Masaka’s influence dominant.
    status_after_event: Temporarily disrupted by the input of Korgano’s symbol, resulting
      in the materialization of the silver mask. The program’s transformation of the
      ship continues, but Picard now holds a potential countermeasure—though its efficacy
      remains untested.
