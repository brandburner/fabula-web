  title: Picard adopts Korgano’s guise to confront Masaka
  description: "\n  On the *Enterprise* bridge, Geordi La Forge isolates Korgano’s\
    \ moon symbol—a lone icon within the alien archive’s transformation program—suggesting\
    \ it may serve as a counter to Masaka’s influence. Picard, desperate to save Data\
    \ and the ship from irreversible transformation, orders the symbol’s activation.\
    \ When a silver mask bearing Korgano’s symbol materializes, Picard seizes the\
    \ opportunity, proposing to impersonate Korgano in a ritualistic confrontation.\
    \ Despite warnings from Troi and Riker about the risks of cultural misinterpretation,\
    \ Picard acknowledges the gamble but insists on improvising within the alien’s\
    \ symbolic framework. Worf’s grim update—less than two hours before the *Enterprise*\
    \ is lost—underscores the urgency, forcing Picard to act. He exits with the mask,\
    \ resolved to confront Masaka on her own terms, marking a shift from passive observation\
    \ to active manipulation of the alien archive’s rituals.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e17
  scene_sequence: 25
