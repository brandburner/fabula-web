    to be sure.'
  - 'TROI: The question is... can we trust a personality from an alien Archive that
    seems bent on taking us over?'
  - 'PICARD: Ihat risked his life to show me that symbol... and Masaka killed him
    for doing it. I think we have to risk it.'
