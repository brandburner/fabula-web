- fabula_uuid: cand_evt_scene_89270f5de483afdb_01
  global_id: null
  title: Picard deciphers Korgano’s duality in temple
  description: "\n  In Masaka’s cavernous temple, Picard, Troi, and Worf examine the\
    \ architecture, where Picard identifies a recurring pairing of symbols: Masaka’s\
    \ sun emblem and a smaller horn-like mark. Recalling Ihat’s cryptic mention of\
    \ Korgano no longer pursuing Masaka, Picard theorizes the horn symbol represents\
    \ Korgano—a mythical counterpart to Masaka’s destructive force. This revelation\
    \ suggests a cosmic balance between the two figures, with Korgano as the only\
    \ entity capable of controlling Masaka. Picard directs the team to search for\
    \ additional horn symbols, framing the discovery as a potential key to mitigating\
    \ Data’s transformation. The moment shifts the crew’s understanding of the planet’s\
    \ lore from fragmented history to a structured duality, raising the stakes for\
    \ Data’s salvation and the ship’s survival.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e17
  scene_sequence: 21
  sequence_in_scene: 41
  key_dialogue:
  - 'PICARD: This would seem to be Masaka''s temple...'
  - 'TROI: Captain... look at this.'
  - 'PICARD: This is the first time I''ve seen these two symbols paired... That could
    be significant...'
  - 'PICARD: He''s not chasing her anymore... Ihat said that someone named Korgano
    was not chasing Masaka anymore. And the old man said, he pursues her no longer...'
  - 'PICARD: In a sense, this smaller symbol is chasing Masaka. Perhaps it represents
    Korgano.'
  - 'PICARD: Both Ihat and the old man said that Korgano was the only one who could
    control Masaka...'
  - 'PICARD: Many ritualistic cultures incorporate the idea of ''balance'' into their
    belief systems. Masaka is a queen, a powerful, god-like figure... it''s not unreasonable
    to assume that she might have a counterpart... or a consort...'
  - 'PICARD: Spread out... see if you can find that horn-like symbol anywhere else.'
