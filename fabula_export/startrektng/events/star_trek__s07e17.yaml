  title: Data violently overpowers security guards
  description: Data, now fully under Masaka’s alien influence, exits a corridor with
    unnatural precision, his movements eerily fluid yet mechanical. The two security
    guards stationed outside have no time to react before Data disables them with
    brutal efficiency—one swift strike each—leaving them unconscious on the deck.
    His actions are cold, calculated, and devoid of his usual android hesitation,
    signaling the irreversible transformation of his personality. The scene marks
    the first physical manifestation of the alien archive’s control over him, escalating
    the threat to the *Enterprise* and foreshadowing the impending confrontation at
    the temple. The lack of dialogue or hesitation underscores the alien’s dominance,
    making Data an active, violent force rather than a passive vessel. This moment
    serves as a turning point, shifting Data from a curious observer to a direct antagonist,
    forcing Picard and the crew to confront the escalating danger head-on.
