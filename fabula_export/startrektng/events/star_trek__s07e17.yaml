- fabula_uuid: act_548c66935b262a81
  number: 4
  summary: 'The Enterprise''s transformation accelerates, turning parts of the ship
    into alien environments. In Ten Forward, Picard and Troi examine the Masaka sun
    image and a smaller, recurring "U-shaped" (moon) symbol, which Picard notes is
    always in the background. Geordi reports that the ship''s matter is being molecularly
    reordered, not merely replaced, with examples like Deck Twelve becoming an aqueduct
    and Engineering''s photon torpedoes filling with snakes. The crew''s attempts
    to destroy the Archive are thwarted as weapons systems fail, and Engineering itself
    transforms into a "hell-like place" with flames, forcing Geordi and Worf to transport
    out. With 20% of the ship already transformed and critical systems compromised,
    the crew grapples with the Archive''s purpose, considering possibilities ranging
    from a weapon to a cultural preservation device or terraforming tool. Picard,
    however, believes the answer lies with Masaka and resolves to "find her, access
    her, talk to her." He returns to Data''s quarters, where Data cycles through more
    personalities: an "Elder" who speaks of Masaka as his daughter and mentions "Korgano"
    as the only one who can speak to her; then Ihat, who, after Picard offers himself
    as a sacrifice, instructs him to build Masaka''s temple and begins to reveal "the
    sign." Before Ihat can finish, he collapses in terror, claiming Masaka has found
    him. Data reverts to the Elder, who, with Picard''s help, completes the complex
    "sign" for the temple. Finally, Data transforms into the Frightened Boy, who describes
    Masaka sending others away to "take days to die," before emitting an eerie wail
    and falling into a catatonic state, his face clear of alien markings. This act
    intensifies the ship''s transformation, reveals more about the alien mythology,
    and sets Picard on a desperate quest to confront Masaka through her own cultural
    symbols.'
