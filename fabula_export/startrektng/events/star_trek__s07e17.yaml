  title: Data claims Masaka’s mask
  description: Data’s possession by the alien archive reaches a critical juncture
    as he abruptly breaks from his catatonic state, his movements unnaturally jerky
    and mechanical. His immediate fixation on Masaka’s mask—a physical vessel for
    the alien entity’s influence—signals the entities’ full control over him. The
    act of lifting the mask to his face is both a symbolic surrender to the alien
    presence and a physical manifestation of the archive’s growing dominance. This
    moment marks the irreversible escalation of Data’s transformation, shifting him
    from a passive conduit to an active threat. The scene foreshadows his violent
    confrontation with security guards and underscores the urgency of Picard’s mission
    to counter Masaka’s influence before Data becomes permanently lost to the archive’s
    control. The mask, as an artifact of the alien’s power, becomes a tangible representation
    of the existential threat now embodied by Data himself.
