  - character_uuid: ger_agent_53509ff1afc6
    emotional_state: Anxious and cautious; her fear of Masaka is evident in her reluctance
      to challenge the goddess directly, even in her fragmented state.
    goals:
    - To survive within the hierarchy of the alien consciousnesses by avoiding Masaka’s
      wrath.
    - To indirectly aid the crew in understanding the mythology, as her knowledge
      could lead to Data’s salvation.
    what_happened: |2

