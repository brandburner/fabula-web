  title: Crew confirms Enterprise's molecular decay
  description: "\n  The *Enterprise*’s Bridge is bathed in eerie emergency lighting\
    \ as the Archive’s influence spreads, transforming the ship’s structure into alien\
    \ plant forms and molecularly reconfiguring its components. Picard and Troi, en\
    \ route to the Observation Lounge, are intercepted by Riker, who reports the room\
    \ has become a swamp—a physical manifestation of the Archive’s invasive restructuring.\
    \ The senior staff gathers around the command area, where Geordi reveals the Archive\
    \ has already transformed 20% of the ship, disabling propulsion and weapons while\
    \ leaving life support intact. Beverly’s analysis confirms the Archive is repurposing\
    \ the ship’s biological matter and DNA to create its own cultural elements, raising\
    \ existential stakes. Worf posits the Archive could be a weapon, while Riker suggests\
    \ it might be a cultural preservation device. Picard, pacing, theorizes it could\
    \ be a terraforming tool, but regardless of its intent, he refuses to let the\
    \ *Enterprise* become an alien city. Geordi proposes a countermeasure: accessing\
    \ the Archive’s transformation program via an energy pulse, while Picard fixates\
    \ on Masaka as the key to resolving the crisis. The Viewscreen displays Masaka’s\
    \ mask, reinforcing her as the focal point of the threat. The scene crystallizes\
    \ the crew’s vulnerability and the urgency of severing the Archive’s connection\
    \ before total transformation erases the ship and its crew.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e17
