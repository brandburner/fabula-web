- fabula_uuid: cand_evt_scene_83f201f144bee3aa_01
  global_id: null
  title: Riker discovers contaminated drinks in Ten Forward
  description: "\n  In Ten Forward, Riker, Worf, and Geordi gather to discuss the\
    \ comet’s anomalous energy readings when Riker’s casual snacking triggers the\
    \ first physical clue of the ship’s contamination. His visceral reaction to the\
    \ unfamiliar snack—followed by his disgust at the drink’s unordered, viscous texture—sets\
    \ up the scene’s central tension: the Enterprise’s systems are no longer reliable.\
    \ Geordi’s tricorder scan reveals the drink contains bio-organic material resembling\
    \ blood, a discovery that shifts the crew’s focus from the comet’s external threat\
    \ to an internal, systemic corruption. The moment escalates from mild annoyance\
    \ to existential unease, as the replicator—the ship’s lifeline—becomes a vector\
    \ for the alien archive’s influence. Riker’s immediate instinct to confront the\
    \ bartender underscores the crew’s initial assumption that the contamination is\
    \ localized, while Geordi’s suggestion to investigate the replicator hints at\
    \ the broader, more insidious nature of the threat. The scene bridges sensory\
    \ unease (Riker’s physical discomfort) with the looming specter of the comet’s\
    \ transformative power, foreshadowing the Enterprise’s growing vulnerability to\
    \ the alien archive’s influence.\n  "
