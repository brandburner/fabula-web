- fabula_uuid: cand_evt_scene_b53f7e45241848d9_02
  global_id: null
  title: Picard manipulates Data’s personas for temple sign
  description: "\n  In Data’s quarters, Picard confronts the Elder persona—a frail,\
    \ elderly entity—who reveals Masaka’s violent history and the fragility of the\
    \ archive’s consciousnesses. When the Elder shifts into Ihat, a subordinate but\
    \ more cooperative entity, Picard exploits her fear of Masaka by offering himself\
    \ as a sacrificial vessel. Ihat begins drawing the sacred temple sign on Picard’s\
    \ hand, but Masaka’s sudden intrusion forces Picard to improvise. He guides the\
    \ Elder’s hand in the dirt, completing the symbol through a mix of coercion and\
    \ manipulation. The moment exposes the instability of Data’s borrowed identities,\
    \ the Elder’s subservience to Masaka, and Picard’s strategic cunning in securing\
    \ the key to the temple’s construction. The event culminates in Data’s collapse,\
    \ his face stripped of alien markings, as the Frightened Boy’s haunting wail signals\
    \ the escalating threat of Masaka’s influence over the ship.\n  "
