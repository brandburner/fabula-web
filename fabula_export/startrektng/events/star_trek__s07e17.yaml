- fabula_uuid: act_c45aaad13c0c6e34
  number: 5
  summary: With the Enterprise rapidly succumbing to the Archive's transformation,
    Picard and his crew race against time. On the bridge, now partially transformed
    with stone pedestals, Geordi announces he has located the Archive's transformation
    program, capable of accepting symbols. Despite the risk of turning the ship into
    rock, Picard authorizes inputting the "sign" for Masaka's temple, trusting Ihat's
    sacrifice. The corridor where Picard, Troi, and Worf stand instantly dissolves
    into a vast, cavernous temple, complete with stone columns and a golden, solar-disc
    throne. Within the temple, they discover glyphs pairing Masaka's sun symbol with
    the "horn" symbol, sometimes with one ascendant, sometimes the other. Picard deduces
    this horn symbol represents Korgano, Masaka's counterpart, akin to the moon to
    her sun, and the only entity capable of controlling her. Meanwhile, Data, emerging
    from his catatonic state, puts on Masaka's mask and, embodying the goddess, disables
    security guards before entering the temple and seating himself on the throne.
    Picard attempts to reason with Data/Masaka, but she imperiously dismisses him.
    Back on the bridge, Geordi locates Korgano's isolated moon symbol within the Archive.
    Picard, recognizing the need to engage with the alien culture on its own terms,
    orders the symbol to be input. A silver mask with Korgano's moon symbol appears.
    Picard dons the mask, intending to pose as Korgano, despite the unknown risks
    and the ship having less than two hours before complete transformation. In the
    temple, Picard, as Korgano, confronts Data/Masaka. He skillfully uses the mythology,
    asserting that Masaka needs him to be complete and that she lives for the chase.
    He suggests she is weary, offering her rest before the hunt begins anew. Data/Masaka,
    convinced, grows sleepy and closes her eyes. The temple instantly dissolves, returning
    the corridor to normal, and Data reverts to his original self, confused but unharmed.
    Riker confirms the ship is restored. In the Ready Room, Data reveals the Masaka
    mask Picard holds is his original clay sculpture, which he glazed. He reflects
    on the "remarkable experience" of hosting "thousands" of personalities, feeling
    "empty" yet having been "an entire civilization." Picard acknowledges Data's unique
    experience, concluding the extraordinary encounter.
