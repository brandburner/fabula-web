  title: Data’s fractured psyche collapses under Masaka’s shadow
  description: Picard enters Data’s quarters to find the android curled in a terrified
    ‘Victim’ persona, recoiling at his approach. When Picard demands to speak with
    Ihat, Data’s consciousness violently shifts—first into the domineering Ihat, who
    mocks the Victim’s weakness and reveals Masaka’s volatile nature, then abruptly
    into a childlike ‘Boy’ persona, trembling with fear. The ship suddenly lurches,
    lights fail, and Picard’s combadge call to the bridge cuts off as the crisis escalates.
    This scene exposes the depth of Data’s fragmentation, with each persona offering
    fragmented clues about Masaka’s dominance and the impending threat to the *Enterprise*.
    The physical tremor mirrors Data’s psychological unraveling, signaling a direct
    link between his instability and the ship’s survival. Picard’s inability to stabilize
    Data underscores the urgency of the situation, forcing him to abandon the interrogation
    mid-crisis.
