      \ vulnerability, as even its most fundamental systems are being co-opted. Geordi’s\
      \ suggestion to investigate the replicator marks the transition from personal\
      \ annoyance to systemic crisis, as the crew recognizes that the contamination\
      \ is not an isolated incident but a sign of deeper corruption. The replicator’s\
      \ implied compromise foreshadows Data’s later transformation, as both are vectors\
      \ for the alien archive’s power.\n      "
