  global_id: null
  title: Worf reveals the Enterprise’s imminent destruction
  description: "\n  The bridge crew, already under intense pressure from Data’s alien\
    \ possession and the ship’s escalating transformation, receives a devastating\
    \ update from Worf. After Picard orders Geordi to access the transformation program\
    \ and input Korgano’s moon symbol—an act of calculated risk to counter Masaka’s\
    \ influence—the crew briefly debates the dangers of their plan. The tension peaks\
    \ when Worf delivers the stark timeline: the *Enterprise* has less than two hours\
    \ before it is irrevocably altered, leaving no time for hesitation. Picard, now\
    \ holding the newly materialized silver mask, acknowledges the urgency with a\
    \ grim nod and exits toward the turbolift, signaling the crew’s shift from passive\
    \ investigation to desperate, high-stakes action. Worf’s revelation forces Picard\
    \ to abandon caution and embrace a risky cultural deception, raising the stakes\
    \ for Data’s salvation and the ship’s survival.\n  "
