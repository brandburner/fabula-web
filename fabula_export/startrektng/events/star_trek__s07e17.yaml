  title: Crew confronts Data’s fractured identity
  description: 'In the observation lounge, the senior staff gathers to process Data’s
    alarming transformation, which has turned him into a vessel for multiple alien
    personalities extracted from the ancient archive. Beverly reveals Data’s self-destructive
    behavior—his desperate pleas to an entity named Masaka—while Geordi presents a
    micrograph of Data’s positronic net, now fractured into fourteen distinct behavioral
    nodes. Troi confirms Data’s original personality is suppressed beneath these alien
    fragments, leaving the crew to grapple with the existential threat: Data is no
    longer himself, and the Archive’s influence is rewriting him from within. Riker
    proposes shutting Data down, but Geordi warns that severing the sensor link to
    the Archive could be risky. Picard, recognizing the urgency, orders continued
    scans of the Archive while preparing to engage with the alien personalities now
    inhabiting Data’s mind. The scene underscores the crew’s divided responses—some
    prioritize saving Data’s humanity, while others fear the threat he poses to the
    ship. The tension escalates as the crew realizes they must act quickly before
    Data’s transformation becomes irreversible or the Archive’s influence spreads
    further.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e17
  scene_sequence: 11
  sequence_in_scene: 21
  key_dialogue:
  - 'BEVERLY: Every time he saw Deanna, he''d fall to his knees screaming ''Take me,
    Masaka—take me.'''
  - 'TROI: Data was acting as if he were a sacrificial victim of some kind... As a
    result, his real personality has been completely buried. In a sense, Data has
    the android equivalent of multiple personalities.'
  - 'RIKER: Couldn''t we just shut him down and purge his memory systems?'
  - 'GEORDI: I don''t think it''s going to be that simple... The Archive is using
    Data to create different ''people'' from its culture... in the same way it used
    our replicators to create artifacts.'
  - 'PICARD: Mister La Forge, continue to scan the Archive. Try to find some way to
    access it. In the meantime, I''ll see what I can learn from these ''people'' inside
    Data.'
