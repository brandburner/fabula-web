  title: Picard confronts Data’s fractured personas
  description: Picard enters Data’s quarters to find him curled in terror as the *Victim*
    persona, a submissive fragment of his consciousness that fears Masaka. Picard
    attempts to communicate, but the *Victim* is quickly displaced by the *Ihat* persona—a
    domineering, aggressive entity that mocks the *Victim*’s weakness and dismisses
    Masaka as lazy but dangerous. Their exchange reveals the unstable hierarchy of
    the alien personalities now controlling Data, with Ihat implying Masaka’s destructive
    potential and Korgano’s absence as a critical factor. Before Picard can extract
    more information, Data’s form shifts again into a *Boy* persona, trembling in
    fear, before a violent ship tremor cuts the scene short. The rapid succession
    of personalities underscores the escalating instability of Data’s mind and the
    urgency of Picard’s mission to restore him before the ship is compromised. The
    dialogue and physical shifts highlight the alien entities’ dominance over Data,
    forcing Picard to adapt his approach mid-conversation, while the ship’s tremor
    signals a direct threat to the *Enterprise*’s integrity, tying Data’s psychological
    collapse to the crew’s survival.
