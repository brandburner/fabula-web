  - object_uuid: ger_object_a469a53351b2
    description_of_involvement: The Engineering diagnostic console is the tool through
      which Geordi monitors Data’s positronic net, and it becomes the first indicator
      of the impending disaster. Initially, it displays normal readouts as Geordi
      runs his diagnostic, but the moment Data describes his 'impulse,' the console
      erupts with violent anomalies. These anomalies are not just errors—they are
      visual representations of the alien circuitry invading Data’s brain, snaking
      into his systems and rewriting them. The console’s readouts serve as a real-time
      indicator of Data’s corruption, culminating in Geordi’s horrified realization
      as he witnesses the transformation firsthand. Its role is both functional (diagnostic
      tool) and narrative (foreshadowing and confirmation of the horror unfolding).
