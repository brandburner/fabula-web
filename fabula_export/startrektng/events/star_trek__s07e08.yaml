  title: Riker interrupts Picard-Crusher breakfast
  description: "\n  In Picard’s quarters, the captain and Beverly Crusher share a\
    \ rare, unguarded moment over breakfast, their conversation oscillating between\
    \ playful banter and Picard’s quiet unease about the Kesprytt mission. Beverly\
    \ teases Picard for his distractedness, revealing her awareness of his preoccupation\
    \ with the Prytt’s xenophobia and the Federation’s admission criteria. Their exchange\
    \ is intimate yet restrained—Picard’s guardedness contrasts with Beverly’s warmth,\
    \ hinting at their unresolved emotional history. The moment shatters when Riker’s\
    \ abrupt com signal interrupts, summoning them to Ambassador Mauric. The intrusion\
    \ forces a sudden transition from personal vulnerability to professional duty,\
    \ underscoring the tension between their private bond and the mission’s demands.\
    \ The scene serves as a microcosm of their dynamic: Picard’s reluctance to engage\
    \ emotionally, Beverly’s persistence in bridging the gap, and the ever-present\
    \ pull of duty that disrupts their connection.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e08
  scene_sequence: 1
  sequence_in_scene: 3
  key_dialogue:
  - |-
    BEVERLY: She's been very secretive... every time I ask her about it or try to edge around the subject, she changes the subject. Personally, I think she's in love.
    PICARD: Mmmmm.
    BEVERLY: Didn't you hear me? I said, she's in love.
    PICARD: Yes?
    BEVERLY: Is that all you can say?
    PICARD: What would you like me to say? I'm very pleased for them both.
  - |-
    BEVERLY: Are you worried about this mission with the Kes?
    PICARD: Not worried exactly... just uneasy. This notion of admitting half of their planet to the Federation while leaving the other half out...
  - |-
    RIKER'S COM VOICE: Riker to Captain.
    PICARD: Go ahead, Number One.
    RIKER'S COM VOICE: We've received word from Ambassador Mauric that he's ready to see you and Doctor Crusher.
    PICARD: Inform him we're on our way.
