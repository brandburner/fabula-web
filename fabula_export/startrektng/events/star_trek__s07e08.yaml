- fabula_uuid: cand_evt_scene_d655361cee5f302e_01
  global_id: null
  title: Prytt sever communication and Mauric intervenes
  description: Riker and Data attempt to establish direct contact with the Prytt government
    to negotiate the release of Picard and Crusher, but their unauthorized communication
    is immediately severed by a Prytt official. The abrupt termination escalates tensions,
    revealing the Prytt's hostility toward Federation interference. Before Riker can
    process the rejection, Minister Lorin issues a direct warning, threatening aggressive
    action if the Enterprise persists. The confrontation underscores the Prytt's isolationist
    stance and their willingness to escalate conflict. The tension peaks when Ambassador
    Mauric abruptly enters, claiming to have secured Picard and Crusher's escape—an
    intervention that arrives suspiciously soon after the Prytt's warning. Mauric's
    evasive behavior and insistence on secrecy raise immediate suspicion, forcing
    Riker to navigate a sudden shift from diplomatic failure to an uncertain alliance.
    The scene pivots from confrontation to conspiracy, leaving the crew questioning
    Mauric's motives and the true status of Picard and Crusher's freedom.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e08
  scene_sequence: 11
  sequence_in_scene: 21
  key_dialogue: &id021
  - |-
    PRYTT COM VOICE: Did you get authorization for this communication from the Security Ministry?
    RIKER: No. As I said, we didn't know how to contact you so-
    PRYTT COM VOICE: I cannot participate in an unauthorized communication.
  - |-
    LORIN: Enterprise, this is Security Minister Lorin. You will immediately cease all attempts at communication with our people.
    RIKER: Minister, we've been trying to contact someone in your government. It appears that you've detained two of our officers and we would like to discuss this situation.
    LORIN: There is nothing to discuss. If you do not terminate these transmissions, we will be forced to take aggressive action against your ship.
  - |-
    MAURIC: I am sorry. But perhaps this will brighten your spirits -- we have freed your Captain and doctor.
    RIKER: What?
    MAURIC: They were being held in a prison just outside the Prytt capital. One of our operatives was able to arrange their escape.
    RIKER: Ambassador... I'm afraid I must insist that you provide us with more information.
