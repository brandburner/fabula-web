    description_of_involvement: The Prytt trooper’s communicator is a small but pivotal
      object in this scene. After capturing Beverly, one trooper activates it to report
      her capture to Minister Lorin, sealing her fate. The communicator’s activation
      is swift and efficient, reflecting the Prytt’s disciplined chain of command.
      Its use underscores the institutional nature of Beverly’s capture—it is not
      a personal act but a formal report to Prytt’s leadership, reinforcing the organization’s
      control over the border and its prisoners.
    status_before_event: Attached to the trooper’s belt, inactive but ready for use.
    status_after_event: Activated and used to transmit the report, then likely returned
      to the trooper’s belt.
    global_id: ger_object_aa024ab1d3cb
