    - The hum of the Enterprise’s systems, a constant backdrop to the conversation
    - The small monitor screens at the aft station, where Lorin’s earlier transmission
      looms as a silent threat
    - The okudagram of the Prytt communications system, a visual reminder of the failed
      hail
