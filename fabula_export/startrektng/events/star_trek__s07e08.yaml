      are introduced by Mauric as proof of Picard and Crusher’s escape. He claims
      that Kes operatives provided the map to guide them across the border, but he
      refuses to disclose further details, insisting on secrecy. The map symbolizes
      the uncertain alliance between the *Enterprise* crew and Kes, as well as the
      high stakes of Picard and Crusher’s rescue. Its sudden appearance—shortly after
      the Prytt’s rebuff—raises suspicions about Mauric’s motives and the true nature
      of Kes’ involvement. The map is a tangible object that represents both hope
      and mistrust, as it offers a potential solution to the crisis but also introduces
      new questions about Kes’ reliability.
    status_before_event: In the possession of Mauric’s operative, likely stored securely
      and intended for Picard and Crusher’s use. Its existence is unknown to the *Enterprise*
      crew until Mauric mentions it.
    status_after_event: Mentioned but not physically present on the bridge. Mauric
      refers to it as evidence of the escape plan, but he does not produce it, leaving
      its authenticity and details open to question.
    global_id: ger_object_55e1359012c4
  - object_uuid: ger_object_392e9845c6bb
    description_of_involvement: The Prytt Communications System Com-Link is the direct
      channel through which Riker attempts to establish contact with the Prytt government.
      Data uses it to hail Prime Minister Horath’s office, but the Prytt Com Voice
      immediately terminates the transmission upon realizing it is unauthorized. The
      com-link symbolizes the fragile and contentious nature of interstellar diplomacy,
      as well as the Prytt’s refusal to engage with outsiders. Its abrupt severance
      by the Prytt Com Voice escalates the tension, leading to Lorin’s threatening
      intervention. The com-link is a physical manifestation of the Prytt’s isolationist
      policies, and its failure underscores the crew’s frustration.
    status_before_event: Functional and ready for use, integrated into the *Enterprise*’s
      communication systems. The com-link is set to the Prytt government’s frequency,
      as identified by Data.
    status_after_event: Deactivated after the Prytt Com Voice terminates the transmission.
      The channel remains closed, and further attempts to hail the Prytt are met with
      resistance.
    global_id: ger_object_392e9845c6bb
  - object_uuid: ger_object_860a15ed817d
    description_of_involvement: The USS *Enterprise*-D Bridge Aft Science Station
      Console is the operational hub for Data’s technical work and Riker’s diplomatic
      efforts. Data uses it to scan the Prytt communications system, identify the
      primary access module, and attempt to establish the unauthorized hail. The console
      beeps to alert the crew of Lorin’s incoming hail, and its screens display Prytt
      weapon system readouts, providing Worf with tactical data. The console is a
      multifunctional tool, serving as both a diagnostic instrument and a communication
      interface, and its presence is essential to the crew’s ability to respond to
      the Prytt’s actions in real time.
    status_before_event: Fully operational, with active displays showing Prytt communications
      data and weapon system readouts. The console is ready for use and integrated
      into the *Enterprise*’s broader systems.
    status_after_event: Remains functional but is no longer actively used for Prytt
      communications after the transmission is terminated. The console continues to
      monitor Prytt weapon systems, but its role in this specific event is completed.
    global_id: ger_object_860a15ed817d
  location_involvements:
  - location_uuid: ger_location_ebd1251307f2
    description_of_involvement: The USS *Enterprise*-D Bridge Aft Science Station
      is the primary setting for this event, serving as the command center for Riker,
      Data, and Worf’s efforts to contact the Prytt government. The station is compact
      but equipped with advanced LCARS panels, monitors, and consoles, allowing the
      crew to scan communications systems, monitor weapon readouts, and attempt unauthorized
      hails. The hum of equipment and the glow of screens create a tense, high-stakes
      atmosphere, as the crew grapples with the Prytt’s hostility and Mauric’s sudden
      intervention. The bridge is a symbol of Starfleet’s technological prowess and
      diplomatic resolve, but it also becomes a stage for the unfolding power struggle
      between the *Enterprise* crew, the Prytt, and Kes.
    observed_atmosphere: Tension-filled with urgent activity, the air thick with frustration
      and suspicion. The hum of equipment and the glow of monitors create a sterile
      yet charged environment, where every beep and transmission feels like a potential
      breakthrough or threat.
    functional_role: Command center for diplomatic and technical operations, serving
      as the nerve center for the *Enterprise*’s response to the Prytt crisis.
    symbolic_significance: Represents Starfleet’s authority and the crew’s determination
      to resolve the crisis, even as external forces (the Prytt and Kes) challenge
      their efforts.
    access_restrictions: Restricted to senior officers and essential crew members.
      Mauric and his aide are granted temporary access, but their presence is scrutinized.
