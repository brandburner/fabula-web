  title: Shared memories force emotional honesty
  description: "\n  Picard and Beverly navigate a rugged ravine while maintaining\
    \ a forced three-foot proximity, their neural implants exposing unspoken truths.\
    \ Beverly challenges Picard’s performative confidence, revealing his habit of\
    \ projecting certainty even when uncertain. Their playful banter turns introspective\
    \ when Picard accidentally reads her memory of Tom Norris—a humiliating childhood\
    \ incident that still haunts her. The shared vulnerability deepens their bond,\
    \ but their moment is interrupted by Prytt troopers, forcing them into silent,\
    \ coordinated evasion. Picard’s revelation about the border’s proximity (two kilometers\
    \ east, blocked by a forcefield) raises the stakes for their escape while underscoring\
    \ their growing reliance on unspoken trust. The scene blends humor, pathos, and\
    \ tension, using the neural link to accelerate emotional intimacy that neither\
    \ can ignore.\n  "
