  title: Mauric tests Worf’s loyalty with a deliberate delay
  description: Worf escorts Ambassador Mauric and his aide to their assigned quarters
    aboard the Enterprise, entering the access code and gesturing for them to enter.
    Instead of proceeding, Mauric hesitates, scanning the corridor and the room with
    deliberate suspicion before ordering Worf to enter first. The request is subtle
    but calculated—either a test of Worf’s obedience or a tactical maneuver to ensure
    the room is safe before Mauric himself enters. Worf complies without protest,
    though his slight puzzlement hints at his growing unease with Mauric’s behavior.
    The moment underscores Mauric’s manipulative nature and deepens Worf’s distrust,
    reinforcing the broader narrative tension between the Kes and the Federation’s
    crew. This exchange serves as a microcosm of the larger power dynamics at play,
    where Mauric’s actions force Worf to question whether he is being treated as a
    subordinate or a potential threat. The scene also foreshadows Mauric’s later betrayal,
    as his reluctance to enter first suggests he may have something to hide—likely
    tied to his involvement in Picard and Crusher’s kidnapping.
