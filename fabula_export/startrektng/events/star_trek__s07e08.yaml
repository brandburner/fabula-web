- fabula_uuid: act_51625d8d63df3c31
  number: 3
  summary: On the Enterprise bridge, Data successfully establishes a communication
    link with the Prytt government, directly contacting Prime Minister Horath's headquarters.
    The Prytt are shocked by the unauthorized communication and promptly terminate
    the transmission. Shortly after, Minister Lorin of the Prytt Security Council
    hails the Enterprise, angrily warning Riker to cease all communication attempts
    and threatening aggressive action if he persists. Riker maintains his request
    to discuss their detained officers, but Lorin refuses. Ambassador Mauric then
    arrives on the bridge, surprisingly announcing that Picard and Beverly have been
    freed by Kes operatives and are en route to the Kes border with a map. Riker and
    Worf are concerned by the lack of detail and Mauric's insistence on confidentiality,
    prompting Riker to demand more information. Mauric agrees to discuss operational
    details in his quarters, citing security concerns. Meanwhile, Picard and Beverly
    find themselves at a dead end in another cave. They discover their neural implants
    are now transmitting thoughts, as Picard 'hears' Beverly's thirst and later her
    fear of heights. This revelation confirms Lorin's earlier statement about the
    implants aligning to their psi-wave patterns, making their shared consciousness
    a new, inescapable reality. Beverly identifies a climbing route out of the cave.
    Back in Mauric's quarters, now converted into a secure, equipment-laden base,
    Mauric reveals to Riker that Kes 'friends' among the Prytt will meet Picard and
    Beverly at a tavern near the Kes border. Riker expresses concern about the public
    nature of the rendezvous, but Mauric assures him of its safety and the Kes's experience.
    Picard and Beverly continue their journey, experiencing a growing mental link
    that causes nausea if they move too far apart, cementing their forced proximity
    and intimate connection.
