- fabula_uuid: act_d1da33b050550dc8
  number: 4
  summary: Picard and Beverly continue their journey, now forced to remain within
    three feet of each other due to the strengthening neural link. They navigate a
    ravine, with Picard feigning confidence about the route, which Beverly immediately
    perceives through their shared thoughts. This leads to a playful exchange about
    his 'Captain's confidence' and her 'acerbic remarks.' Their mental link deepens,
    allowing them to access each other's memories and feelings, including Beverly's
    embarrassment over a past social faux pas. Picard finds the experience 'compelling
    in a strange way.' As they proceed, they spot Prytt troopers, forcing them to
    take cover and find an alternate route, relying on their shared thoughts to coordinate
    their movements. On the Enterprise, Riker and Worf confront Ambassador Mauric,
    who accuses the Federation of conspiring with the Prytt. Mauric claims Picard
    and Beverly's 'kidnapping' was a ruse to expose Kes operatives and that their
    failure to meet the rendezvous point proves they are secretly allied with the
    Prytt. Riker vehemently denies these accusations, dismissing Mauric's claims as
    paranoid, leading Mauric to declare his intention to leave the Enterprise. Later,
    Picard and Beverly make camp for the night. Their shared thoughts reveal Picard's
    true feelings about Beverly's elaborate breakfasts, preferring simple tea and
    scones, a preference Beverly shares. This lighthearted moment quickly turns profound
    as Beverly 'hears' Picard's long-repressed love for her, his guilt over Jack's
    death, and his reasons for keeping his distance. They confront these deep, unspoken
    emotions, acknowledging the attraction and the complexities of their friendship.
    The act concludes with them lying together by the fire, Beverly resting her head
    on Picard's shoulder, their bond irrevocably altered by their intimate shared
    experience.
