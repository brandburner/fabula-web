  title: Mauric accuses Federation of Prytt conspiracy
  description: "\n  Riker and Worf arrive in Kes quarters expecting cooperation but\
    \ are met with immediate hostility. Mauric’s aide scans them with a Kes tricorder,\
    \ setting a tense tone before Mauric drops a bombshell: Picard and Crusher never\
    \ reached their rendezvous point. Instead of concern, Mauric pivots to accusation,\
    \ suggesting the Federation orchestrated their disappearance as a cover to secretly\
    \ ally with the Prytt. His theory escalates into a full-blown conspiracy—Picard\
    \ and Crusher allegedly faked their capture to expose Kes operatives while negotiating\
    \ a military pact. Riker rejects the claim outright, calling it paranoid, but\
    \ Mauric doubles down, his demeanor shifting from diplomatic to accusatory. The\
    \ confrontation ends with Mauric threatening to abandon the *Enterprise*, while\
    \ Riker vows to proceed without Kes help. The scene fractures the fragile alliance\
    \ between Kes and the Federation, forcing Riker to choose between diplomacy and\
    \ loyalty to his crew. Mauric’s accusations aren’t just baseless; they’re a calculated\
    \ move to test Federation integrity and expose potential betrayal, while Riker’s\
    \ defiance signals his refusal to be manipulated—even if it risks escalating the\
    \ conflict.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e08
  scene_sequence: 18
  sequence_in_scene: 33
  key_dialogue:
  - 'MAURIC: Captain Picard and Doctor Crusher did not show up at the designated rendezvous
    point.'
  - 'MAURIC: It was a clever scheme... first you pretend to ''lose'' your officers
    during transport... then you ask us for help... and get us to expose several of
    our undercover operatives in the process. But what you didn''t expect was for
    us to get your people out of prison so quickly. They needed more time... more
    time to plot the destruction of the Kes with their new Prytt friends.'
  - 'RIKER: This is ridiculous. You''re starting to see conspiracies everywhere. We
    were invited here by the Kes, why would we want to ally ourselves with the Prytt?'
  - 'RIKER: You can believe what you want... we''re going to find our people with
    or without your help.'
  - 'MAURIC: Then I believe it''s time for us to be leaving the Enterprise.'
