    power_dynamics: The Kes are positioned as a potential ally of the Federation,
      seeking to leverage its resources and influence. However, their admission is
      contingent on the Federation’s willingness to overlook the Prytt’s xenophobia,
      which places them in a position of dependence on Federation policy.
    organizational_goals:
