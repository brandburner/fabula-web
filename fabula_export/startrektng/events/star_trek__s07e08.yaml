  global_id: null
  title: Beverly sacrifices herself to save Picard
  description: Picard and Beverly attempt to escape Prytt territory by weakening a
    forcefield border using Beverly’s tricorder. As Prytt troopers close in, Beverly
    makes a split-second decision to push Picard through the weakened field to safety,
    ensuring his escape while sacrificing herself to capture. The moment is charged
    with unspoken emotion—Picard’s horror at her sacrifice and their shared, silent
    connection across the border. The troopers secure Beverly, reporting her capture
    to Minister Lorin while Picard stands helpless in Kes territory. This act forces
    Picard to confront the depth of their bond and the cost of survival under the
    Prytt’s neural implants, while escalating the stakes of their separation and the
    Prytt’s ideological crusade against the Federation.
