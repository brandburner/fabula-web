- fabula_uuid: cand_evt_scene_fe3560d91dbbdc89_01
  global_id: null
  title: Riker questions Mauric’s risky extraction plan
  description: "\n  In Kes quarters—now repurposed as a covert operations hub—Riker\
    \ confronts Ambassador Mauric about the rescue mission to extract Picard and Crusher\
    \ from Prytt territory. The room’s sudden transformation into a high-tech Kes\
    \ command center (with equipment hastily concealed) immediately raises Riker’s\
    \ suspicion, though Mauric dismisses it as ‘security measures.’ Mauric outlines\
    \ a perilous rendezvous at a Prytt border tavern, relying on Kes-recruited Prytt\
    \ operatives to guide the fugitives to safety. Riker’s unease grows as Mauric\
    \ downplays the risks, subtly leveraging the Federation’s potential Kes membership\
    \ as leverage. The exchange reveals Mauric’s calculated pragmatism and Riker’s\
    \ protective instincts, while the hidden tech hints at deeper Kes deception. This\
    \ moment serves as a turning point: Riker must decide whether to trust Mauric’s\
    \ assurances or push for a safer alternative, with Picard and Crusher’s lives\
    \ hanging in the balance.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e08
  scene_sequence: 13
  sequence_in_scene: 25
  key_dialogue:
  - 'RIKER: I see you''ve done some redecorating.'
  - 'MAURIC: Just a few pieces of equipment we needed for security reasons. You understand.'
  - 'RIKER: Ambassador... how do you plan to get my people out of Prytt territory?'
  - 'MAURIC: The danger is minimal. Our operatives control most of the town.'
  - 'RIKER: I''d still feel better if they could rendezvous with your operatives in
    a less public place.'
  - 'MAURIC: Commander, I assure you we know what we''re doing. We have a great deal
    of experience in dealing with the Prytt. And we would hardly risk the safety of
    your people... after all -- we''re still hoping you''ll recommend our entrance
    into the Federation.'
