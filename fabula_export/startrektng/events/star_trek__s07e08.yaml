- fabula_uuid: cand_evt_scene_18cd51cbc55c3ee5_02
  global_id: null
  title: Worf discovers Picard and Crusher vanished mid-transport
  description: "\n  Worf confirms the transporter sequence to Ambassador Mauric’s\
    \ chambers is ready, and Picard and Beverly step onto the platform with professional\
    \ efficiency. The transport initiates normally, but when Kes Security confirms\
    \ they never arrived, Worf’s suspicion hardens into alarm. His repeated verification\
    \ of the transport logs—combined with the Kes relay’s insistence that no one materialized—reveals\
    \ a deliberate anomaly: the sequence completed from the *Enterprise*’s end, yet\
    \ the crew vanished en route. The scene’s tension escalates through Worf’s growing\
    \ unease, culminating in his stunned realization that an unseen force intercepted\
    \ the transport. This moment shifts the narrative from routine diplomacy to a\
    \ high-stakes crisis, foreshadowing the Prytt’s neural-implant assault and the\
    \ psychological vulnerability it will force upon Picard and Beverly.\n  "
