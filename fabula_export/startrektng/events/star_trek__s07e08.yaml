  object_involvements:
  - object_uuid: ger_object_abe3c6f18af4
    description_of_involvement: 'The USS Enterprise Transporter Logs (Mauric Transport)
      are pulled up by Worf immediately after Picard and Beverly dematerialize. The
      logs show a clean execution: the sequence was initiated, the beam coordinates
      to Kes were locked, and the energy discharge completed from the Enterprise''s
      end. However, Kes com voice insists no materialization occurred. This discrepancy
      in the logs—confirming completion from the Enterprise but no arrival at the
      relay—becomes the smoking gun that exposes the Prytt''s abduction. The logs
      shift the narrative from a routine transport to a high-stakes security breach,
      forcing Worf to confront the reality of the interception.'
    status_before_event: Recording the transport sequence as it unfolds, showing standard
      operational parameters.
    status_after_event: Confirm the transport completed from the Enterprise but reveal
      no arrival at Kes, exposing the interception.
    global_id: ger_object_abe3c6f18af4
  - object_uuid: ger_object_987a698e3841
    description_of_involvement: The USS Enterprise Transporter Platform serves as
      the physical stage for Picard and Beverly's dematerialization. As they step
      onto the glowing pads, the platform energizes with a familiar hum, dissolving
      them in shimmering light. The platform's activation is a routine part of the
      transport sequence, but its use here becomes the point of departure for their
      abduction. The platform's function—once a symbol of Starfleet's technological
      prowess—is subverted by the Prytt's tractor beam, which intercepts the transport
      mid-beam, redirecting Picard and Beverly to a psychological trap.
    status_before_event: Inactive but ready for use, with Picard and Beverly positioned
      on the platform awaiting transport.
    status_after_event: Dematerializes Picard and Beverly successfully from the Enterprise,
      but they fail to arrive at the intended destination, exposing the interception.
    global_id: ger_object_987a698e3841
  - object_uuid: ger_object_6506b4cc5494
    description_of_involvement: 'The Kes Security Relay Station Defense Shield is
      lowered to clear the path for Picard and Beverly''s transport to the Prytt homeworld.
      KES COM VOICE confirms the adjustment, but the shield''s lowering becomes a
      critical detail in the abduction: despite the shield being down, the transport
      fails to materialize at the relay station. This failure exposes the Prytt''s
      interference, as their tractor beam intercepts the transport mid-beam, diverting
      Picard and Beverly to their neural implant trap. The shield''s role shifts from
      a security measure to a narrative device highlighting the Prytt''s deception.'
    status_before_event: Active, surrounding the Kes Security Relay Station and blocking
      unauthorized transport.
    status_after_event: Lowered to allow the transport sequence, but the transport
      fails to arrive, revealing the interception.
    global_id: ger_object_6506b4cc5494
