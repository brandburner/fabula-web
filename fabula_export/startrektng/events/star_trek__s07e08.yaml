    I don''t have time for an extended negotiation session. So it''s time to lay all
    the cards on the table.'
  - 'RIKER: If anything happens to them, Starfleet is going to want a full investigation.
    That means more starships will be sent to Kesprytt... and those ships are going
    to want answers... which means they''ll be putting your country under a very large
    and very uncomfortable microscope.'
  - 'RIKER: Remember how unhappy you were when we contacted just one of your people
    without authorization? Well, think of what it''ll be like when ten starships start
    looking for answers. They''ll be contacting hundreds of your people... they''ll
    conduct massive sensor sweeps... they might even start sending down Away Teams.'
