    - Through their alignment with Federation values (unity, progressivism, cooperation)
    - Through the contrast they provide to the Prytt, highlighting the ethical stakes
      of the admission process
    institutional_impact: The Kes’ involvement in this event underscores the Federation’s
      challenge of balancing its ideals with the realities of planetary divisions.
      Their candidacy forces Picard and Beverly to confront the ethical implications
