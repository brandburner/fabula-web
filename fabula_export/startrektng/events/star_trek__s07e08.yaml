  - 'WORF: Commander. The Transporter sensor log shows an unusual concentration of
    antigraviton particles in the emitter coil. These particles do not occur naturally—something
    must have interfered with the Transporter.'
  - 'RIKER: The Prytt... things just got a little more complicated.'
  - 'RIKER: Contact Ambassador Mauric and tell him we need a meeting right away.'
