    to get used to... hearing your thoughts.'
  - 'BEVERLY: I was awake for several hours. And thanks to the implant, I got to ''hear''
    some very interesting dreams of yours.'
  - 'PICARD: So now that we''ve had this... unique experience... what do we do now?'
  - 'BEVERLY: I''m not afraid... but I''m also not ready.'
