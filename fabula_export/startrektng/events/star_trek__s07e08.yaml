  title: Riker traces Picard and Crusher to Prytt
  description: In the Transporter Room, Data confirms the system is functional but
    reveals an anomalous concentration of antigraviton particles—evidence of a Prytt
    tractor beam that diverted Picard and Crusher’s transport. Riker deduces the Prytt’s
    involvement, complicating the rescue effort. With Prytt territory shielded from
    sensors, Riker orders Worf to arrange an urgent meeting with Ambassador Mauric,
    the Kes diplomat, to exploit their diplomatic ties as a backchannel. The discovery
    shifts the mission from a technical malfunction to a geopolitical crisis, forcing
    Riker to navigate xenophobic Prytt hostility through Kes intermediaries. The scene
    establishes the Prytt as active antagonists and sets up Mauric’s role as a potential
    double agent, while Data’s technical precision contrasts with Riker’s strategic
    improvisation under pressure.
