      high stakes of Picard and Crusher’s rescue. Its sudden appearance—shortly after
      the Prytt’s rebuff—raises suspicions about Mauric’s motives and the true nature
      of Kes’ involvement. The map is a tangible object that represents both hope
      and mistrust, as it offers a potential solution to the crisis but also introduces
      new questions about Kes’ reliability.
    status_before_event: In the possession of Mauric’s operative, likely stored securely
