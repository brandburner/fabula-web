- fabula_uuid: cand_evt_scene_d655361cee5f302e_02
  global_id: null
  title: Mauric’s Suspicious Rescue Claim
  description: "\n  After Riker’s failed attempts to contact the Prytt government—first\
    \ through Data’s hacked communications and then via Minister Lorin’s hostile warning—Ambassador\
    \ Mauric abruptly arrives on the bridge with an unexpected announcement: Picard\
    \ and Crusher have been freed by Kes operatives. Mauric’s vague details (a prison\
    \ outside the Prytt capital, a map to the Kes border, and a 'confidential' border-crossing\
    \ plan) immediately raise Riker’s suspicions. When Riker demands specifics, Mauric\
    \ deflects, insisting on a private meeting in his quarters rather than the Ready\
    \ Room, further deepening the tension. The exchange underscores Mauric’s growing\
    \ role as an unreliable ally, forcing Riker to weigh trust against operational\
    \ urgency. The scene pivots from diplomatic frustration to a high-stakes power\
    \ play, where Mauric’s secrecy becomes the new threat.\n  "
