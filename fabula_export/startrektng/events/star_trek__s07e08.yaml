- fabula_uuid: cand_evt_scene_9d2f1c915781be07_01
  global_id: null
  title: Crusher sacrifices herself to save Picard
  description: Picard and Beverly reach the Prytt-Kes border forcefield, where Beverly
    attempts to weaken it using a multiphase pulse from her tricorder. As Prytt troopers
    close in, she makes a split-second decision to shove Picard through the weakened
    barrier to safety, ensuring his escape while remaining trapped herself. The troopers
    seize her, leaving Picard stranded on the Kes side, their unspoken bond and shared
    trauma now physically severed. This moment marks a turning point in their dynamic—Picard’s
    survival comes at the cost of Beverly’s capture, forcing him to confront the depth
    of their connection and the moral weight of survival under the Prytt’s neural
    implants. The forcefield’s distortion, the troopers’ arrival, and Beverly’s decisive
    action all escalate the tension, while the silent exchange between them underscores
    the emotional stakes of their separation. The event also sets up Beverly’s capture
    as a catalyst for future Prytt actions, including Lorin’s response and the broader
    conflict’s escalation.
