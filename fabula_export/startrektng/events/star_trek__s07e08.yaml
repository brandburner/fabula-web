  object_involvements:
  - object_uuid: ger_object_5327ccc5d0ef
    description_of_involvement: Beverly’s tricorder is the key tool in this escape
      attempt. She uses it to generate a multiphase pulse, which distorts the forcefield
      just enough to create a narrow passage. The tricorder’s sensor head glows as
      she adjusts the modulation frequency, guided by Picard’s technical input. The
      device’s steady data output is critical in the high-pressure moment, anchoring
      their desperate navigation of the border. Once Picard is pushed through the
      weakened field, the tricorder’s role is complete, but its success is bittersweet—it
      enabled escape for one but not the other.
    status_before_event: Possessed by Beverly, fully functional, and set to scan the
      forcefield’s energy signature.
    status_after_event: Still in Beverly’s possession as she is captured, but its
      function is irrelevant now that the escape attempt has failed for her.
    global_id: ger_object_5327ccc5d0ef
