  object_involvements:
  - object_uuid: ger_object_1e90bb83a8e7
    description_of_involvement: The Prytt prison cell door is a physical barrier to
      escape and a symbol of the prisoners’ confinement. Picard examines it upon waking,
      confirming its locked status, while Lorin remotely controls its opening and
      closing during the interrogation. The door’s impenetrability underscores the
      Prytt’s dominance over the cell, as even Picard’s attempt to jam the mechanism
      fails. Its seamless operation at Lorin’s command highlights the Prytt Security
      Ministry’s institutional control, leaving Picard and Beverly with no means of
      escape or communication with the outside world.
    status_before_event: Locked and secure, preventing any attempt by Picard or Beverly
      to leave the cell.
    status_after_event: Remains locked after Lorin and the guards exit, trapping the
      prisoners in their confinement.
    global_id: ger_object_1e90bb83a8e7
  - object_uuid: ger_object_9c490c74ed8d
    description_of_involvement: Minister Lorin’s Kes-version tricorder is a critical
      tool in this event, used to scan the neural implants at the base of Picard and
      Beverly’s necks. The device beeps softly as it confirms the implants’ activation
      and the prisoners’ identities, its glowing sensor and flashing readouts serving
      as a visual reminder of the Prytt’s technological coercion. Lorin’s use of the
      tricorder underscores the Prytt’s paranoia and their reliance on Kes technology—a
      paradox that highlights their xenophobic contradictions. The tricorder’s readings
      validate Lorin’s accusations and foreshadow the imminent extraction of the prisoners’
      thoughts, turning the cell into a high-tech interrogation chamber.
    status_before_event: Possessed by Minister Lorin, fully functional, and ready
      for use in scanning the prisoners.
    status_after_event: Retained by Lorin after the scan, its data confirming the
      implants’ calibration and the prisoners’ status as threats.
    global_id: ger_object_9c490c74ed8d
  - object_uuid: ger_object_5d1af6f6dce3
    description_of_involvement: The Prytt guards’ weapons serve as a silent but potent
      reminder of the prisoners’ captivity. Flanked by two armed guards, Minister
      Lorin enters the cell with an air of unassailable authority. The weapons hang
      ready, their mere presence amplifying the threat of physical enforcement should
      Picard or Beverly resist. The guards’ readiness to act on Lorin’s commands reinforces
      the Prytt Security Ministry’s control over the situation, leaving no doubt about
      the consequences of defiance. The weapons symbolize the Prytt’s reliance on
      force to maintain their isolationist agenda.
    status_before_event: Holstered but accessible, carried by the guards as they enter
      the cell with Lorin.
    status_after_event: Retained by the guards as they exit, their silent menace lingering
      in the prisoners’ minds.
    global_id: ger_object_5d1af6f6dce3
  - object_uuid: ger_object_920da3cf624f
    description_of_involvement: 'The Prytt neural implants are the centerpiece of
      this event, representing both a physical violation and a psychological threat.
      Beverly discovers the implants at the base of Picard’s and her own necks, identifying
      them as devices connected directly to the brainstem. Lorin later reveals their
      true purpose: calibration to the prisoners’ psi-wave patterns for thought extraction.
      The implants transform the cell into a battleground for the prisoners’ minds,
      forcing Picard and Beverly into a fragile alliance as they grapple with the
      impending violation of their most intimate thoughts. Their presence underscores
      the Prytt’s brutality and the Federation officers’ exposed vulnerability.'
    status_before_event: Already implanted in Picard and Beverly’s necks, dormant
      but ominously present upon their awakening.
    status_after_event: Activated and calibrated for thought extraction, looming as
      an immediate threat to the prisoners’ autonomy.
    global_id: ger_object_920da3cf624f
  - object_uuid: ger_object_f56b9aa1e32a
    description_of_involvement: Picard’s missing combadge symbolizes the prisoners’
      isolation and vulnerability. Its absence prevents communication with the *Enterprise*,
      cutting off their only lifeline to Starfleet support. Picard’s instinctive reach
      for the combadge upon waking reveals his reliance on institutional resources
      and his frustration at being stripped of his identity as a Starfleet officer.
      The combadge’s loss amplifies the Prytt’s control over the situation, as Picard
      and Beverly are left to navigate their captivity without external aid.
    status_before_event: Stripped from Picard upon capture, rendering him unable to
