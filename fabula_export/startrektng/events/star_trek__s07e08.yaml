  global_id: null
  title: Riker threatens Federation sanctions to force Kes cooperation
  description: In a high-stakes diplomatic confrontation, Riker abandons subtlety
    and directly threatens Minister Lorin and Ambassador Mauric with Federation consequences.
    After their bickering exposes the Kes delegation's internal divisions, Riker seizes
    control by exploiting their instability. He falsely promises to block Kes' Federation
    membership application, then escalates by warning that Starfleet will launch a
    full-scale investigation—including starships, sensor sweeps, and Away Teams—if
    Picard and Crusher aren't released. The threat forces Lorin into submission, revealing
    the Federation's leverage over Kes while underscoring the delegation's political
    fragility. Riker's calculated ruthlessness demonstrates his tactical mastery under
    pressure, but also highlights the Federation's willingness to use institutional
    power as a negotiating tool. The moment serves as a turning point, shifting from
    diplomatic posturing to overt coercion, and exposes the Kes' vulnerability to
    external pressure.
