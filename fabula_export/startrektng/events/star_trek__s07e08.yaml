- fabula_uuid: act_4fe2e15f59fa0e47
  number: 2
  summary: Commander Riker, Lieutenant Worf, and Counselor Troi meet with Ambassador
    Mauric of the Kes. Mauric offers a hostage rescue team, but Riker prioritizes
    diplomatic solutions, which Mauric dismisses as impossible due to the Prytt's
    fanatical xenophobia and century-long isolation. Mauric requests to establish
    a secure base of operations on the Enterprise, citing a breach in Kes communications,
    which Riker grants. Worf escorts Mauric and his aide to their assigned quarters,
    where Mauric's aide meticulously scans the room, and Mauric pointedly dismisses
    Worf, raising subtle suspicions about his true intentions. Simultaneously, Picard
    and Beverly navigate a hidden passage into a vast, secluded cavern beneath the
    planet's surface. They observe the passage's elaborate construction, prompting
    Beverly to speculate about the guard being a Kes agent. Picard, however, remains
    wary of a potential trap. As they proceed, they encounter extreme heat from an
    underground lava flow and detect methane gas. Small fireballs begin to erupt around
    them, indicating dangerous pockets of the compound. Beverly, using her tricorder,
    identifies a pattern to the eruptions, allowing them to carefully navigate through
    the hazardous chamber. The gas concentration intensifies, leading to a massive
    fireball chasing them. They narrowly escape by flinging themselves into an intersecting
    chamber, avoiding the scorching blast. This sequence highlights their resourcefulness
    and the immediate physical dangers of their escape route.
