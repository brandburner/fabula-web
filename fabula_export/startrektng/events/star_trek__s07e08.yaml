- fabula_uuid: act_4b1c6e555cfd9b5d
  number: 5
  summary: Riker orchestrates a tense meeting in the Observation Lounge, forcing Ambassador
    Mauric and Minister Lorin to confront each other. Both officials are hostile,
    accusing the other of conspiracy and deceit. Riker, frustrated by their bickering,
    takes decisive control. He threatens Mauric by stating he will recommend denying
    the Kes Federation membership, citing their 'troubled world' and 'paranoia,' effectively
    shocking Mauric into silence. He then turns to Lorin, threatening the Prytt with
    an extensive Starfleet investigation, massive sensor sweeps, and intrusive Away
    Teams if she does not cooperate in locating Picard and Beverly. This threat of
    unwanted scrutiny visibly unnerves Lorin. Meanwhile, on the planet, Picard and
    Beverly are pursued by Prytt guards. They race towards the forcefield border between
    Prytt and Kes territory. Beverly, using her tricorder, creates a distortion in
    the forcefield and, in a split-second decision, pushes Picard through to the Kes
    side just as the troopers arrive. The field fluctuates, preventing her passage,
    and she is captured by the Prytt. Lorin, now under pressure from Riker's threats,
    orders her trooper to transmit Beverly's coordinates to the Enterprise. Picard,
    Beverly, and Riker return to the Enterprise via transporter. Picard and Beverly
    share a silent, private joke, indicating their lingering mental connection, much
    to Riker's confusion. Later, in Picard's quarters, they share an intimate dinner,
    the implants now removed. They discuss the profound intimacy of their shared thoughts,
    with Beverly revealing she 'heard' Picard's dreams. Picard, acknowledging their
    newfound understanding, suggests they explore their feelings. Beverly, though
    not afraid, gently states she is 'not ready,' then kisses him on the cheek and
    leaves. Picard is left alone, reflecting on their changed relationship.
