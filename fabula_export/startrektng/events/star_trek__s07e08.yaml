      liaison with the Prytt. The Federation’s influence is indirect but critical:
      its officers are the ones detained, and its starship (the Enterprise) is the
      target of Prytt threats. The Federation’s goals—securing the release of its
      personnel and maintaining diplomatic neutrality—are at odds with Kes’s secrecy
      and the Prytt’s hostility. Riker’s struggle to balance these competing interests
      reflects the Federation’s broader challenge in navigating the complex politics
      of Kesprytt Three without compromising its principles.'
    active_representation: Through Commander Riker, who acts as the Federation’s spokesman
      and operational leader in the crisis.
    power_dynamics: Operating under the constraint of Federation neutrality but exerting
      influence through diplomatic pressure and the threat of Starfleet intervention.
