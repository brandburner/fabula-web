  key_dialogue:
  - |-
    RIKER: That's it.

    RIKER: I can see that... diplomacy is not going to get us anywhere today, and I don't have time for an extended negotiation session. So it's time to lay all the cards on the table.

    RIKER: That means it's time to stop fooling around and get serious.
  - |-
    RIKER: You're concerned that the Kes are about to be admitted into an associative membership with the Federation.

    LORIN: Correct.

    RIKER: As First Officer of the Enterprise I think I can promise you that is not going to happen. The Kes will be denied membership.
  - 'RIKER: Then maybe you should consider this: If anything happens to them, Starfleet
    is going to want a full investigation. That means more starships will be sent
    to Kesprytt... and those ships are going to want answers... which means they''ll
    be putting your country under a very large and very uncomfortable microscope.'
