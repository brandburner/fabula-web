  key_dialogue: &id029
  - |-
    BEVERLY: You don't really know, do you?
    PICARD: What?
    BEVERLY: You're acting like you know exactly which way to go... but you're just guessing. Do you do this all the time?
    PICARD: No. But... there are times when it's important for a Captain to give the appearance of confidence.
  - |-
    BEVERLY: I'm sorry... I couldn't resist...
    PICARD: I'm beginning to realize that you seem to always have some... acerbic remark on the tip of your tongue.
    BEVERLY: At least I've trained myself not to say it anymore. When I was a little girl, my mouth was always landing me in trouble with my parents... my teachers...
    PICARD: Your friends... and someone named Tom Norris... ?
    BEVERLY: That's right. We had one date... which I brought to an abrupt halt with the words... 'Is that a beard or is your face dirty?'
  - 'PICARD: The border''s only two kilometers east of here... there''s a forcefield
    protecting it, but we''ll have to find a way to deal with that when we get there.'
