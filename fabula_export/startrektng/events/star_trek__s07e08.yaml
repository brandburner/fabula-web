- fabula_uuid: cand_evt_scene_1fa8bcaabcea5152_03
  global_id: null
  title: Fireball Chase Forces Desperate Escape
  description: "\n  Picard and Beverly stumble into a hidden cave system, only to\
    \ discover it’s riddled with unstable methane pockets. Beverly’s tricorder reveals\
    \ a rhythmic pattern to the eruptions, allowing them to navigate cautiously—but\
    \ the gas buildup suddenly stops, signaling an impending disaster. As a massive\
    \ fireball erupts behind them, they sprint for an intersecting chamber, barely\
    \ evading the scorching blast. The escape isn’t just physical; the shared terror\
    \ and instinctive trust in the moment force them to confront their unspoken bond,\
    \ deepening the psychological stakes of their captivity. The Prytt’s neural implants,\
    \ still active, amplify their raw emotions, making the near-death experience a\
    \ visceral reminder of their vulnerability and interdependence.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e08
  scene_sequence: 10
  sequence_in_scene: 20
  key_dialogue: &id019
  - 'PICARD: There must be a lava flow or a hot spring somewhere near by.'
  - 'BEVERLY: I smell gas...'
  - 'PICARD: Can we get through it?'
  - 'BEVERLY: I think so... There seems to be a fairly regular pattern to these eruptions...
    if we''re careful we should be able to navigate through them.'
  - 'PICARD: Say when...'
  - 'BEVERLY: Now...'
  - 'PICARD: The eruptions have stopped...'
  - 'BEVERLY: The gas is building up!'
