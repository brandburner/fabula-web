    - Demonstrate the Prytt’s military resolve to deter further Federation encroachment.
    influence_mechanisms:
    - Using the threat of aggressive action against the Enterprise to pressure Riker
      into compliance.
    - Enforcing strict communication protocols to cut off unauthorized contact with
      the Prytt government.
    institutional_impact: The Prytt Security Ministry’s actions in this event reflect
      its broader commitment to xenophobia and sovereignty, but its rigidity also
      creates opportunities for Kes to exploit. The Ministry’s inability to detect
      or prevent the rescue (if Mauric is telling the truth) undermines its authority,
      potentially fueling internal tensions within the Prytt government.
    internal_dynamics: Possible internal debates over the Ministry’s handling of the
      Federation’s interference, or disagreements with the Prytt Prime Minister’s
      office over the appropriate response.
