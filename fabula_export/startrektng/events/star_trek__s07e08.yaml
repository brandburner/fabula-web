- fabula_uuid: cand_evt_scene_b6356e7561257f19_02
  global_id: null
  title: Lorin reveals the implants' true purpose
  description: "\n  Picard and Beverly Crusher awaken in a Prytt prison cell, disoriented\
    \ and stripped of their Starfleet insignia. Beverly discovers neural implants\
    \ embedded at the base of their necks, triggering immediate alarm. Before they\
    \ can process their situation, Minister Lorin enters with armed guards, coldly\
    \ confirming their status as prisoners under Prytt Security Ministry authority.\
    \ Lorin accuses them of conspiring with the Kes to form a military alliance—a\
    \ charge Picard denies. The confrontation escalates when Lorin reveals the implants'\
    \ sinister function: once calibrated to their psi-wave patterns, the devices will\
    \ forcibly extract their thoughts and memories. This revelation escalates the\
    \ immediate threat to their autonomy, forces them to confront the fragility of\
    \ their shared secrets, and underscores the Prytt's xenophobic agenda. The scene\
    \ ends with Lorin's ominous exit, leaving Picard and Beverly to grapple with the\
    \ psychological violation of their captivity and the looming extraction of their\
    \ most private thoughts.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e08
  scene_sequence: 3
  sequence_in_scene: 7
  key_dialogue:
  - 'BEVERLY: Jean-Luc...'
  - 'PICARD: What is it?'
  - 'BEVERLY: I''m not sure... It''s an implant... looks like it might be connected
    directly to the brainstem.'
  - 'PICARD: Some kind of coercive device...?'
  - 'LORIN: You are not hostages. You are prisoners.'
  - 'PICARD: Prisoners. By whose authority?'
  - 'LORIN: You are being held under the authority of the Prytt Security Ministry.
    The charge is conspiring with the enemy.'
  - 'PICARD: The enemy... you mean the Kes.'
  - 'LORIN: We are not fools. We are aware of the Federation attempt to establish
    a military alliance with the Kes. It will not be tolerated.'
  - 'PICARD: Your information is in error. There are no plans to enter into any...'
  - 'LORIN: There is no point in trying to mislead us, Captain. The devices which
    have been implanted in your cerebral cortexes will soon be calibrated to your
    psi-wave patterns. At that time, we will get all the information we need.'
  - 'PICARD: And you will discover that we''re telling the truth.'
  - 'LORIN: We shall see.'
