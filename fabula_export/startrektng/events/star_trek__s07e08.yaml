acts:
- fabula_uuid: act_f87f4b8b99ef0986
  number: 1
  summary: The narrative opens with Captain Picard and Doctor Crusher having breakfast,
    discussing trivial crew matters before Picard expresses unease about the Federation's
    potential alliance with the Kes, which excludes the xenophobic Prytt. Their conversation
    is interrupted by Riker, summoning them to meet Ambassador Mauric. They proceed
    to the Transporter Room, where Worf prepares their transport to Kesprytt Three.
    The transport sequence initiates, but a long, agonizing beat later, Kes Security
    reports that Picard and Beverly did not arrive. This sets the stage for their
    disappearance. Picard and Beverly awaken in a dark, damp prison cell, disoriented
    and without their communicators. They discover electronic implants at the base
    of their necks, which Beverly identifies as coercive devices connected to their
    brainstems. Minister Lorin, a Prytt Security official, enters with guards, revealing
    they are prisoners, not hostages, accused of conspiring with the enemy (the Kes).
    Lorin states the implants will soon be calibrated to extract information. Meanwhile,
    on the Enterprise, Data determines a tractor beam from Prytt territory deflected
    the transporter beam. Riker, learning of the Prytt's xenophobia, decides to work
    through the Kes and contacts Ambassador Mauric. Back in the cell, a guard delivers
    food, which unexpectedly contains Beverly's medical tricorder. The tricorder displays
    an escape map with a coded cell door release. Despite Picard's caution about a
    potential trap, Beverly insists on taking their chances, and they use the tricorder
    to open the cell, slipping into the unknown.
  key_moments: []
  scene_numbers:
