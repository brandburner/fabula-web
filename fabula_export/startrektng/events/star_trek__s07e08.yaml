  - 'MAURIC: Captain Picard and Doctor Crusher did not show up at the designated rendezvous
    point. We find it strange that your officers would follow the escape plan so precisely
    — but then fail to make a crucial rendezvous with our operatives.'
  - 'MAURIC: Of course you''re not. You wouldn''t know if your Captain and Doctor
    were meeting secretly with the Prytt. Meeting in order to set up a military alliance
    with the Federation...'
  - 'RIKER: This is ridiculous. You''re starting to see conspiracies everywhere. We
    were invited here by the Kes, why would we want to ally ourselves with the Prytt?'
