  - character_uuid: ger_agent_596f60e072a1
    emotional_state: "\n        Starts playful and teasing, shifts to introspective\
      \ and slightly sad during the Tom Norris memory reveal, then becomes concerned\
      \ and alert as they evade Prytt troopers.\n      "
    goals:
    - Call out Picard’s performative confidence to foster authenticity in their relationship.
    - Share her own vulnerabilities to deepen their emotional connection and trust.
    what_happened: "\n        Beverly actively challenges Picard’s performative confidence,\
      \ using their forced proximity and the neural link to call out his uncertainty.\
      \ She shares her own vulnerability by revealing the Tom Norris memory, laughing\
      \ at first but then admitting lingering embarrassment. Her physical presence\
