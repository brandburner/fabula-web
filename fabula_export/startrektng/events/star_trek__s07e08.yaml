- fabula_uuid: cand_evt_scene_1f1003550e556b7e_01
  global_id: null
  title: Riker extracts Beverly’s coordinates
  description: 'In the Observation Lounge, Riker leverages Minister Lorin’s moral
    compromise to secure Beverly Crusher’s coordinates, forcing her to transmit them
    to the Enterprise. The Prytt’s hypocrisy is exposed as Lorin capitulates under
    Riker’s pressure, while Mauric remains silent, his complicity in the Prytt’s actions
    now undeniable. Riker’s abrupt departure leaves Lorin and Mauric to confront the
    consequences of their choices—Lorin’s betrayal of her own principles and Mauric’s
    role in the escalating crisis. The moment marks a turning point: Beverly’s rescue
    is now imminent, but the political and emotional fallout for the Prytt and Kes
    deepens, setting up further conflict between the factions and the Federation.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e08
