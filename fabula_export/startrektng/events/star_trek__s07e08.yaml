  title: Picard and Crusher vanish mid-transport
  description: "\n  In the Enterprise’s transporter room, Picard and Beverly Crusher\
    \ prepare to beam down to Ambassador Mauric’s chambers on the Prytt homeworld,\
    \ a diplomatic mission that will soon spiral into a psychological trap. Worf confirms\
    \ the coordinates, and after Picard orders the transport sequence, the two dematerialize—only\
    \ for Kes Security to report they never arrived. The discrepancy reveals a deliberate\
    \ abduction, as the Prytt’s neural implants activate upon their arrival, forcing\
    \ Picard and Beverly into a shared mental space where buried emotions and the\
    \ fragility of their bond will be exposed. The scene pivots from routine procedure\
    \ to high-stakes crisis, with Worf’s realization that the transport completed\
    \ *from* the Enterprise but not *to* the Prytt relay station signaling a calculated\
    \ kidnapping. The tension escalates as the crew’s focus shifts from diplomacy\
    \ to rescue, while Picard and Beverly remain unaware of the psychological assault\
    \ awaiting them.\n  "
