- fabula_uuid: cand_evt_scene_3955bb39645a962f_01
  global_id: null
  title: Riker rejects Mauric’s hollow diplomacy
  description: In the observation lounge, Ambassador Mauric offers a performative
    apology for Picard and Crusher’s abduction, but his proposal to immediately deploy
    a hostage rescue team—without attempting diplomacy—exposes the Prytt’s intractable
    hostility. Riker, committed to exhausting all nonviolent options, challenges Mauric’s
    cynicism, while Troi’s insistence on the possibility of Prytt change clashes with
    Mauric’s century-old experience of their xenophobia. The exchange forces Riker
    to assert command authority, but Mauric’s request to establish a Kes base of operations
    on the *Enterprise*—under the guise of security—hints at deeper distrust. The
    scene pivots from diplomatic posturing to a confrontation over the limits of negotiation,
    with Worf’s silent presence underscoring the crew’s growing unease about Mauric’s
    true motives. The tension escalates as Riker’s insistence on diplomacy collides
    with Mauric’s insistence on inevitability, setting up the crew’s eventual forced
    choice between empathy and force.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e08
  scene_sequence: 6
  sequence_in_scene: 12
  key_dialogue:
  - 'MAURIC: On behalf of my government, I would like to take this opportunity to
    present our profound apologizes to you regarding this unfortunate incident.'
  - |-
    RIKER: That's very kind, Ambassador. But I don't think anyone here blames you or the Kes government for what's happened.
    TROI: Our primary concern is not to assign blame, but to recover our missing officers.
  - |-
    MAURIC: I don't believe we have any... diplomatic options, Commander. There are no formal relations with the Prytt... no ambassadors... there's simply no way to contact them.
    TROI: Surely you must have some means of communication in case of a planetary emergency.
    MAURIC: We have never had need of such a system.
  - |-
    MAURIC: Allow me to be blunt. The Prytt are a fanatical, xenophobic people, with little regard for civilized discourse. Even if you do establish a communications link with them, it will be a complete waste of time.
    RIKER: Mister Ambassador... with all due respect, I feel I should make an attempt to communicate with the Prytt before I sanction the use of force.
  - 'MAURIC: I do have one request. We believe that the Prytt obtained their information
    about the transport of your captain and doctor through a breach in our communications
    network. If I could set up a base of operations here on the Enterprise, I would
    feel much more secure.'
