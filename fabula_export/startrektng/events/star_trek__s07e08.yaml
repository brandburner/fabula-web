  global_id: null
  title: Riker rejects Mauric’s force plan
  description: In the observation lounge, Ambassador Mauric offers Kes military support
    for a hostage rescue operation, dismissing diplomacy as futile against the xenophobic
    Prytt. Riker resists, insisting on attempting communication first, revealing his
    preference for negotiation over force. Mauric, though outwardly conciliatory,
    subtly undermines Riker’s stance by framing the Prytt as irredeemably hostile,
    while also securing a tactical advantage by requesting a base of operations on
    the *Enterprise*—a move that hints at hidden motives. The exchange exposes the
    ideological divide between Federation pragmatism and Kes cynicism, setting up
    future conflict over leadership and trust. Worf’s silent compliance with Mauric’s
    request foreshadows later tensions, as the Kes ambassador’s influence begins to
    extend into the *Enterprise*’s operations.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e08
  scene_sequence: 6
  sequence_in_scene: 14
  key_dialogue:
  - 'MAURIC: On behalf of my government, I would like to take this opportunity to
    present our profound apologizes to you regarding this unfortunate incident.'
  - 'RIKER: I don''t think anyone here blames you or the Kes government for what''s
    happened.'
  - 'MAURIC: I don''t believe we have any... diplomatic options, Commander. There
    are no formal relations with the Prytt... no ambassadors... there''s simply no
    way to contact them.'
  - 'RIKER: Mister Ambassador... with all due respect, I feel I should make an attempt
    to communicate with the Prytt before I sanction the use of force.'
  - 'MAURIC: I do have one request. We believe that the Prytt obtained their information
    about the transport of your captain and doctor through a breach in our communications
    network. If I could set up a base of operations here on the Enterprise, I would
    feel much more secure.'
