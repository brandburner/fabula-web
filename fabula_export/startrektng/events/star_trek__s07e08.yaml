  global_id: null
  title: Picard and Crusher discover neural implants
  description: "\n  Picard and Beverly Crusher awaken in a dark, damp Prytt prison\
    \ cell after being forcibly transported from the *Enterprise*. Disoriented and\
    \ stripped of their Starfleet devices, they quickly realize they are not on Kesprytt\
    \ as planned but in Prytt custody. Beverly notices a neural implant at the base\
    \ of Picard’s neck, and upon examining her own, confirms they’ve both been fitted\
    \ with coercive devices. Their confusion turns to alarm as Minister Lorin enters\
    \ with armed guards, revealing they are prisoners accused of conspiring with the\
    \ Kes. Lorin coldly explains the implants will soon extract their thoughts, exposing\
    \ their alleged deception. The scene escalates from disorientation to psychological\
    \ threat, establishing the Prytt’s xenophobic agenda and the immediate danger\
    \ of forced mental intrusion. The discovery of the implants forces Picard and\
    \ Beverly into a fragile alliance, their shared vulnerability becoming the first\
    \ test of their ability to resist Prytt interrogation.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e08
  scene_sequence: 3
  sequence_in_scene: 6
  key_dialogue:
  - |-
    BEVERLY: I'm not sure.
    PICARD: What is it?
    BEVERLY: It's an implant... looks like it might be connected directly to the brainstem.
  - |-
    LORIN: You are not hostages. You are prisoners.
    PICARD: Prisoners. By whose authority?
    LORIN: You are being held under the authority of the Prytt Security Ministry. The charge is conspiring with the enemy.
  - |-
    LORIN: The devices which have been implanted in your cerebral cortexes will soon be calibrated to your psi-wave patterns. At that time, we will get all the information we need.
    PICARD: And you will discover that we're telling the truth.
