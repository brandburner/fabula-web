  sequence_in_scene: 4
  key_dialogue:
  - 'PICARD: There have been three major engagements in the last two weeks... all
    of them won by ships loyal to the Duras family.'
  - 'PICARD: The Romulans have been trying to destroy the Federation/Klingon Alliance
    for over twenty years, and at the same time, the Duras have been secretly conspiring
    with the Romulans. Doesn''t it strike you as odd that the Duras are able to field
    such an overpowering force against Gowron? That they outmatch him at almost every
    turn?'
  - 'PICARD: We must stop the flow of supplies and equipment from the Romulans to
    the Duras family. I propose we take a fleet of ships to the Romulan/Klingon border.
    We''ll take no offensive action, but we''ll be in a position to expose any Romulan
    shipments that try to cross the border.'
  - 'SHANTHI: A blockade... But how will you overcome the Romulan cloaking device?'
  - 'PICARD: My chief engineer has developed a system that should help us nullify
    that advantage. Each ship will send out an active tachyon beam to the other ships
    in the blockade fleet. In theory, any cloaked vessel that tries to pass between
    our ships should cross one of those beams and be detected.'
  - 'RIKER: Nicely done... I hope you know what you''re doing.'
  - 'PICARD: So do I, Number One.'
