  key_dialogue: &id011
  - 'HOBSON: We''ve arrived at the designated coordinates, Captain.'
  - 'DATA: Why are auxiliary back-ups not functioning?'
  - 'HOBSON: There wasn''t enough time to test all the back-ups before leaving the
    yard.'
  - 'DATA: Mister Hobson, it is inappropriate for you to determine a course of action
    without consulting the commanding officer.'
  - 'HOBSON: I was trying to safeguard the lives of people on those decks, but you''re
    right. Belay those orders, everyone. The phasers and torpedos are back on-line.
    What should we do, sir?'
  - 'HOBSON: Thank you, sir.'
