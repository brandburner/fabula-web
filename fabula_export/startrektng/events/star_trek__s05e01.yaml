    emotional_state: Professionally composed but internally conflicted, oscillating
      between frustration at Data’s denial and resignation to the reality of serving
      under an android captain.
    goals:
    - Secure a transfer to avoid serving under an android commander, citing professional
      concerns as a cover for prejudice.
    - Convey his objections to Data’s leadership in a way that frames them as logical
      rather than personal, hoping to sway Data or justify his request.
    what_happened: Hobson, the *Sutherland*’s first officer, initially greets Data
      with icy professionalism before seizing the opportunity to challenge his authority.
      He frames his request for a transfer as a matter of professional suitability,
      drawing parallels to Klingons and Berellians to argue that androids are unfit
      for command. Though his tone is measured and professional, his objections reveal
      deep-seated prejudice. When Data denies the request, Hobson is momentarily nonplussed
      but ultimately resigns himself to the situation, returning to his duties with
      a mix of resignation and lingering skepticism.
