  object_involvements:
  - object_uuid: ger_object_d46d151e4dbf
    description_of_involvement: The malfunctioning audio pickup circuits on the *Sutherland*’s
      bridge fail to respond to Data’s voice commands, forcing him to manually input
      queries into the console. This technical failure serves as a metaphor for the
      institutional and operational challenges Data faces—his authority, like the
      circuits, is not immediately recognized or functional. Hobson’s explanation
      of the malfunction highlights the disarray of the ship, while Data’s adaptability
      in switching to manual input demonstrates his resourcefulness. The circuits’
      silence amplifies the tension, as Data must prove his competence in a setting
      where even basic systems are unreliable.
    status_before_event: Malfunctioning; fails to respond to Data’s voice command,
      requiring manual override.
    status_after_event: Remains malfunctioning but is bypassed as Data manually accesses
      the computer via console inputs.
    global_id: ger_object_d46d151e4dbf
  - object_uuid: ger_object_3105fed00c21
    description_of_involvement: Data uses the *Sutherland*’s bridge console to manually
      query the dilithium matrix after the audio pickup circuits fail. The console’s
      diagnostic readouts flicker with numeric data, confirming the warp core’s stability—a
      critical operational check amid the ship’s rushed departure. Hobson watches
      closely as Data works, his skepticism palpable. The console becomes a symbolic
      battleground for Data’s authority, as his precise inputs and adaptability contrast
      with the crew’s doubts. Its glowing interfaces hum under his commands, a visual
      representation of his technical competence and leadership.
    status_before_event: Functional but requiring manual input due to audio circuit
      failure; displays diagnostic readouts for the dilithium matrix.
    status_after_event: Continues to function as Data uses it to assess the ship’s
      status, though the broader disarray of the bridge remains.
    global_id: ger_object_3105fed00c21
  - object_uuid: ger_object_f1565b6b5693
    description_of_involvement: Tools and boxes litter the *Sutherland*’s bridge floor,
      evidence of the ship’s rushed and disorganized preparations. The N.D. Engineer
      steps among them as Data arrives, while Hobson and the crew navigate the clutter.
      This disarray mirrors the institutional and operational chaos Data inherits,
      as well as the crew’s skepticism about his leadership. The scattered tools and
      boxes serve as a visual metaphor for the challenges he must overcome—both technical
      and interpersonal—to assert his authority and restore order.
    status_before_event: Scattered across the bridge floor, creating a sense of disarray
      and urgency.
    status_after_event: Remain scattered but are largely ignored as the crew resumes
      their duties under Data’s command.
    global_id: ger_object_f1565b6b5693
  - object_uuid: ger_object_bd600d126945
    description_of_involvement: Data queries the *Sutherland*’s dilithium matrix directly
      via the bridge console, bypassing the faulty audio circuits. The matrix’s numeric
      readouts flicker across the panel, confirming its stability—a vital system check
      as the ship prepares for departure. Hobson’s scrutiny of this interaction underscores
      the high stakes of Data’s command, as the crew assesses his technical proficiency.
      The matrix’s status symbolizes the ship’s readiness and Data’s ability to navigate
      operational challenges, reinforcing his competence despite institutional prejudice.
    status_before_event: Stable but unconfirmed due to audio circuit failure; requires
