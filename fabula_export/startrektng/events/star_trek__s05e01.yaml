      designed to assert Romulan dominance and force the Federation into a reactive
      position. The warbird’s presence is a physical manifestation of Sela’s authority
      and the Romulan Star Empire’s willingness to escalate the conflict. Its decloaking
      triggers O’Brien’s urgent warning and sets the stage for the confrontation that
      follows. The warbird’s hailing of the *Enterprise* is the catalyst for Sela’s
      appearance on the viewscreen, making it a critical object in the unfolding of
      this event.
