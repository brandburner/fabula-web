- fabula_uuid: cand_evt_scene_987cfa18bf7d6d85_01
  global_id: null
  title: Picard assigns Riker and Geordi to blockade command
  description: In the *Enterprise* ready room, Picard reviews resource constraints
    with Riker, Data, and Geordi, who present the limited availability of Starfleet
    ships for the covert Romulan blockade. Despite the operational challenges—including
    understaffed vessels and incomplete repairs—Picard decisively expands the fleet
    by requisitioning the *Tian Nan Men*, *Hermes*, and *Sutherland*, regardless of
    their readiness. He then assigns Riker to command the *Excalibur* and Geordi as
    his first officer, signaling his trust in their leadership under pressure. The
    exchange reveals Picard’s strategic urgency and his willingness to bend Starfleet
    protocols to achieve the mission’s objectives. After Riker and Geordi depart,
    Data—left unassigned—challenges Picard’s decision, exposing his own ambition and
    the lingering prejudice against androids in command roles. Picard, caught off-guard
    by Data’s directness, quickly rectifies the oversight by offering him command
    of the *Sutherland*, a moment that validates Data’s capabilities and underscores
    Picard’s commitment to meritocracy. The scene serves as both a logistical turning
    point (solidifying the blockade’s structure) and a character-driven revelation
    (Data’s self-advocacy and Picard’s implicit bias).
