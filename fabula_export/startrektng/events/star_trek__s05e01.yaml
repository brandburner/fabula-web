  object_involvements:
  - object_uuid: ger_object_6c7d30fd6a21
    description_of_involvement: The alarm beep is the auditory trigger for the crisis,
      its sharp electronic tone piercing the bridge and drawing Hobson’s immediate
      attention. The alarm’s persistence underscores the urgency of the situation,
      forcing Data and Hobson into a high-pressure confrontation over command authority.
      Its role is both functional—alerting the crew to the emergency—and narrative,
      symbolizing the instability of the *Sutherland*’s operations under divided leadership.
    status_before_event: Silent, with the ship on yellow alert but no immediate crises.
    status_after_event: Persistent and urgent, drawing the crew’s focus to the radiation
      leak and power coupling failure.
    global_id: ger_object_6c7d30fd6a21
  - object_uuid: ger_object_3105fed00c21
    description_of_involvement: The *Sutherland*’s bridge console becomes the battleground
      for Data and Hobson’s power struggle. Data taps its panels to assess the radiation
      leak, while Hobson deliberately takes phaser and torpedo controls offline, using
      the console as a tool to undermine Data’s authority. The console’s flickering
      screens and diagnostic readouts serve as a visual metaphor for the instability
      of command, with Hobson’s actions forcing Data to publicly reassert control.
      The object’s role is both functional—displaying critical ship data—and narrative,
      symbolizing the fragility of Data’s leadership in the face of human prejudice.
    status_before_event: Functioning but displaying warnings of the power coupling
      overload and radiation leak; phaser and torpedo controls are initially online.
    status_after_event: Phaser and torpedo controls are taken offline per Data’s orders,
      with the console now focused on repairing the starboard power coupling. The
      alarm beeps persist, but the crew’s attention shifts to engineering tasks.
    global_id: ger_object_3105fed00c21
  - object_uuid: ger_object_ddb6aa64b56d
    description_of_involvement: Like the phaser controls, the torpedo control units
      are taken offline by Hobson and later reinstated by Data, serving as a tangible
      representation of the shifting power dynamics on the bridge. Their fluctuation
      in status—online, offline, and back online—parallels the crew’s hesitation and
      the broader institutional tensions within Starfleet. The units’ role is both
      functional and symbolic, highlighting the fragility of Data’s command and Hobson’s
      strategic undermining.
    status_before_event: Online and functional, ready for tactical use.
    status_after_event: Taken offline to prioritize repairs on the starboard power
      coupling, with their status reflecting the unresolved command tensions.
    global_id: ger_object_ddb6aa64b56d
  - object_uuid: ger_object_416742c0441b
    description_of_involvement: The phaser control units become a symbol of the power
      struggle between Data and Hobson. Hobson takes them offline without consultation,
      using them as a tool to assert his authority and expose Data’s perceived weakness.
      Data counters by reinstating them, only to take them offline again to prioritize
      repairs—a back-and-forth that leaves the crew confused and the command structure
      fractured. The units’ status fluctuates, mirroring the instability of Data’s
      leadership and Hobson’s calculated defiance.
    status_before_event: Online and functional, ready for tactical use.
    status_after_event: Taken offline to prioritize repairs on the starboard power
      coupling, with their status reflecting the unresolved command tensions.
    global_id: ger_object_416742c0441b
  - object_uuid: ger_object_e15fd7cd995e
    description_of_involvement: The starboard power coupling is the catalyst for the
      crisis, its overload triggering the radiation leak on decks 10–12 and setting
      the stage for Hobson’s defiance. The coupling’s failure forces Data and Hobson
      into a direct confrontation over command authority, with Hobson using the emergency
      as an opportunity to challenge Data’s leadership. The object’s malfunction is
      both a technical problem and a narrative device, exposing the crew’s latent
      distrust of Data and the institutional tensions within Starfleet.
    status_before_event: Functioning but unstable, with pre-departure testing failures
      contributing to its eventual overload.
    status_after_event: Severely damaged, venting radiation and requiring immediate
      repairs. The crew’s focus shifts to engineering to address the breach.
    global_id: ger_object_e15fd7cd995e
