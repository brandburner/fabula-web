  title: Hobson’s reluctant respect for Data
  description: "\n  On the *Sutherland* bridge, Data confirms the Romulan ships have\
    \ retreated after his reconfigured photon torpedoes exposed their cloaked positions.\
    \ Hobson, who had previously questioned Data’s command abilities due to his android\
    \ nature, watches the tactical display with a subtle but unmistakable shift in\
    \ demeanor. His initial skepticism gives way to a quiet, almost reluctant respect—evidenced\
    \ by his use of the title 'Captain' for the first time. Data, ever composed, acknowledges\
    \ the tactical success with his usual detachment but issues orders to report to\
    \ the flagship and begin radiation cleanup. The moment is small but significant:\
    \ Hobson’s unspoken concession marks a turning point in the crew’s perception\
    \ of Data’s leadership, reinforcing the broader narrative of prejudice and professionalism\
    \ in Starfleet. The scene underscores how competence, not biology, earns authority,\
    \ while Data’s emotional neutrality contrasts sharply with Hobson’s human vulnerability\
    \ to change.\n  "
