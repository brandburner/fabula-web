  title: Kurn risks warp jump to escape corona
  description: The *Bird of Prey* is violently buffeted as it nears the star’s corona,
    its shields failing and hull temperatures soaring. Worf urgently warns Kurn of
    the escalating danger, but Kurn remains fixated on the viewscreen, calculating
    the precise moment to execute a high-risk warp jump. Ignoring Worf’s protests,
    Kurn orders the helmsman to stand by, then barks the command to engage warp at
    the last possible second. The maneuver succeeds, but the scene underscores Kurn’s
    ruthless, instinct-driven leadership—prioritizing survival over protocol and forcing
    Worf to confront the brutal pragmatism of Klingon honor in wartime. The tension
    between logic and desperation mirrors the broader Klingon civil war, where tradition
    and survival often collide.
