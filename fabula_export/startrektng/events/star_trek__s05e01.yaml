- fabula_uuid: cand_evt_scene_5ee0c279d7f89238_02
  global_id: null
  title: Sela exploits Data’s ship to breach tachyon net
  description: "\n  Sela, analyzing the Federation’s tachyon detection grid, recognizes\
    \ Picard’s blockade as a deliberate trap when a *Sutherland* warp drive failure\
    \ creates a gap in the net. Movar urges her to exploit the opening, but Sela deduces\
    \ Picard’s strategy—he’s baiting the Romulans into a predictable move. Instead\
    \ of falling for the ruse, she targets Data’s ship, the weakest link in the Federation’s\
    \ formation. By disabling a section of the tachyon net with a targeted energy\
    \ burst, she bypasses Picard’s defenses while leveraging Data’s outsider status\
    \ as a tactical vulnerability. The decision forces the *Sutherland* crew into\
    \ crisis, exposing the Federation’s prejudice and forcing Data to confront his\
    \ isolation as an android in command. Sela’s move is both a calculated strike\
    \ and a psychological gambit, exploiting the crew’s distrust of Data to fracture\
    \ their unity.\n  "
