  - object_uuid: ger_object_3b6e5e5865d4
    description_of_involvement: "\n        The Romulan guard’s phaser is the most\
      \ visually and narratively potent object in this event, serving as a silent\
      \ but unmistakable symbol of Romulan authority and the shift in power. It is\
