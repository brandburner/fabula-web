- fabula_uuid: cand_evt_scene_53873294cf98a143_01
  global_id: null
  title: Picard and Gowron plan Romulan trap
  description: "\n  Picard and Gowron strategize to expose Romulan interference in\
    \ the Klingon civil war by provoking a Duras request for aid. Picard proposes\
    \ a high-risk Federation blockade, knowing the Duras sisters will call for Romulan\
    \ support—allowing Starfleet to intercept and prove Romulan involvement. Gowron\
    \ agrees, but casually reveals Worf’s capture by the Duras, framing it as a tactical\
    \ loss rather than a personal betrayal. The exchange underscores the Federation-Klingon\
    \ alliance’s fragility: Picard’s calculated gamble risks escalation, while Gowron’s\
    \ cold pragmatism exposes his willingness to sacrifice Worf for political leverage.\
    \ The scene pivots from strategic collaboration to emotional tension, foreshadowing\
    \ Worf’s fate and the blockade’s consequences.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e01
  scene_sequence: 17
  sequence_in_scene: 29
  key_dialogue:
  - 'PICARD: In thirteen hours we will be forced to either withdraw from the border
    or fight the Romulan fleet. Neither of those alternatives is acceptable. We must
    expose their involvement before the deadline.'
  - 'GOWRON: What is it you propose?'
  - 'PICARD: If you launch a massive attack now, the Duras forces will need supplies...
    Lursa and B''Etor will call for help... the Romulans will try to run the blockade...
    and we''ll be ready for them.'
  - 'GOWRON: ((nods in understanding)) And once the Romulan connection has been exposed...
    support will fall away from Lursa and B''Etor. Very well... I will make preparations.'
  - 'GOWRON: ((then off-hand)) One thing more, Picard. Worf has been captured by the
    Duras. I hope he dies well. Qapla!'
