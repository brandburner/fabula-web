  title: Worf’s Loyalty Tested by Kurn’s Departure
  description: In a tense confrontation at a Klingon nightclub, Worf and Kurn clash
    over Worf’s pragmatic stance—prioritizing the war effort over blind loyalty to
    Gowron. Kurn, embodying traditional Klingon honor, accuses Worf of betraying their
    people by questioning Gowron’s leadership. Their argument escalates until Kurn
    storms out, leaving Worf vulnerable. Two Klingon thugs, who had been observing
    the brothers, seize the opportunity to ambush Worf, overpowering him and dragging
    him unconscious from the club. The scene underscores Worf’s internal conflict
    between his Starfleet duty and Klingon heritage, while Kurn’s departure fractures
    their bond and leaves Worf’s allegiance precarious. The attack also sets up Worf’s
    abduction, a direct consequence of his divided loyalties and the volatile political
    climate of the Klingon civil war.
