  title: Picard Rewards Data’s Moral Judgment
  description: "\n  In the *Enterprise* ready room, Data reports to Picard expecting\
    \ disciplinary action for defying orders during the Klingon civil war blockade.\
    \ Instead of reprimanding him, Picard praises Data’s independent judgment, framing\
    \ blind obedience as a greater danger than calculated disobedience. The exchange\
    \ underscores Picard’s trust in Data’s ethical reasoning over rigid protocol,\
    \ reinforcing their mentor-student dynamic. Picard’s subtle smile as Data exits\
    \ signals his pride in Data’s growth, while the moment also critiques Starfleet’s\
    \ hierarchical culture. The scene serves as a thematic counterpoint to Worf’s\
    \ struggle with loyalty, emphasizing conscience over blind duty.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e01
  scene_sequence: 24
  sequence_in_scene: 38
  key_dialogue:
  - 'DATA: Sir, I wish to submit myself for disciplinary action. I disobeyed a direct
    order from a superior officer. Although there was a positive outcome as a result
    of my actions, I have learned that... the ends cannot justify the means.'
  - 'PICARD: No, they can''t. However... the excuse ''I was only following orders''
    is the epitaph of too many tragedies in our history. Starfleet does not want officers
    who will blindly follow orders without analyzing the situation. Your actions were
    appropriate for the circumstance, and I have noted that in your record.'
  - 'PICARD: Mister Data... Nicely done.'
