- fabula_uuid: cand_evt_scene_07e290289ddc9a60_01
  global_id: null
  title: Data defies orders to hunt Romulans
  description: "\n  On the *Sutherland* bridge, Data systematically overrides Starfleet\
    \ protocols and ignores direct warnings from Hobson and the *Enterprise* to conduct\
    \ unauthorized, aggressive sensor sweeps for tachyon signatures—evidence of cloaked\
    \ Romulan vessels. His actions escalate tensions amid growing skepticism about\
    \ his command decisions, while his insistence on pursuing the Romulan threat underscores\
    \ his determination to prove his capabilities despite institutional resistance\
    \ and prejudice. The scene culminates in Data ordering a high-energy photon torpedo\
    \ burst into empty space, a calculated risk that defies both Starfleet regulations\
    \ and Picard’s explicit orders. Hobson’s frustration and repeated objections highlight\
    \ the crew’s unease, while Data’s unwavering focus reveals his strategic confidence\
    \ and willingness to challenge authority when logic demands it. The moment serves\
    \ as a turning point in Data’s arc, demonstrating his growth from a rule-following\
    \ officer to a commander who trusts his own judgment—even when it isolates him\
    \ from his superiors and crew.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e01
  scene_sequence: 21
  sequence_in_scene: 35
  key_dialogue:
  - 'HOBSON: The Enterprise wants to know the reason we''ve stopped.'
  - 'DATA: Computer, overlay display with tachyon emissions.'
  - 'HOBSON: Sir. This is pointless. Those readings could be anything. There''s no
    way for us to prove the Romulans are out there.'
  - 'DATA: Reconfigure the photon torpedo warhead yields. Set for a high energy burst
    at level six.'
  - 'HOBSON: At level six? But that won''t even--'
  - 'DATA: Do it.'
  - 'PICARD''S COM VOICE: Mister Data, you were ordered to rendezvous with the fleet
    at Gamma Eridon. Acknowledge.'
  - 'DATA: Stand by, Captain.'
  - 'DATA: Mister Hobson, prepare to fire.'
  - 'HOBSON: Didn''t you hear that? Picard wants us--'
  - 'DATA: Fire.'
