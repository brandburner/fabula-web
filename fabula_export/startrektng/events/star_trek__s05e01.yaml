    emotional_state: Reluctantly respectful with an undercurrent of quiet introspection.
      The shift in his demeanor is not one of joy or even relief, but of a man who
      has been forced to confront his own prejudices and find them wanting. There
      is no gloating in his concession, only a somber acknowledgment that Data’s authority
      is earned, not granted—and that his own resistance was misplaced. The emotional
      cost of this moment is the unspoken admission that his initial skepticism was
      not just professional, but personal.
    goals:
    - Acknowledge Data’s tactical success and the effectiveness of his unconventional
      strategy, thereby validating his command.
    - Transition the *Sutherland* from combat mode to post-engagement protocols, ensuring
      the crew follows Data’s orders without further resistance.
    what_happened: 'Hobson stands beside Data at the tactical console, his initial
      skepticism—bordering on outright prejudice—now giving way to a reluctant respect.
      His body language shifts subtly: the rigid set of his shoulders softens, and
      his gaze, once dismissive, now lingers on Data with something akin to acknowledgment.
      When he speaks the word *''Captain''* for the first time, it is not just a title,
      but a concession, an admission that his earlier resistance was not just about
      protocol, but about bias. The word hangs in the air, heavy with the unspoken:
      *I was wrong.* Yet there is no triumph in his voice, only a quiet acceptance,
      as if the moment has stripped him of his defenses. He does not smile, but the
      tension in his jaw eases, a small but telling sign of his internal shift.'
