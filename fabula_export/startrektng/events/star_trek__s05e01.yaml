  - character_uuid: ger_agent_0e5c114935a9
    emotional_state: Disturbed yet composed, with a growing awareness of his tenuous
      command authority and the crew’s latent distrust of his android leadership.
    goals:
    - Maintain operational control of the *Sutherland* during the crisis
    - Reassert his command authority in the face of Hobson’s defiance
    what_happened: Data moves to the console to assess the radiation leak, his golden
      eyes scanning the monitor with concern as Hobson issues orders without consultation.
      When Hobson deliberately undermines his authority by taking tactical systems
      offline, Data intervenes with a firm but measured rebuke, reasserting control
      over the bridge. His precise, logical commands—'Take the phasers and torpedo
      units off-line and begin repairs on the starboard power coupling'—are met with
      Hobson’s sarcastic compliance, leaving Data isolated as the crew exits with
      Hobson. His posture stiffens slightly, a rare hint of disturbance crossing his
      features as he grapples with the realization that his command is not fully accepted.
    observed_status: Data moves to the console to assess the radiation leak, his golden
      eyes scanning the monitor with concern as Hobson issues orders without consultation.
