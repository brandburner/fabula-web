- fabula_uuid: cand_evt_scene_5ee0c279d7f89238_01
  global_id: null
  title: Sela outmaneuvers Picard’s trap
  description: "\n  On the Romulan Warbird, Movar briefs Sela on the Duras family’s\
    \ impending defeat at Gowron’s hands, revealing their desperate plea for Romulan\
    \ aid. Sela, recognizing the tactical opportunity, studies the Federation’s tachyon\
    \ detection grid and approves a plan to exploit its weakness with a tachyon pulse.\
    \ However, when a Federation ship’s warp drive fails—creating a deliberate gap\
    \ in the grid—Movar urges immediate action. Sela, sensing Picard’s trap, refuses\
    \ to take the bait. Instead, she identifies Data’s *Sutherland* as the weakest\
    \ link in the Federation’s defenses and orders a targeted energy burst to disable\
    \ it, bypassing Picard’s blockade entirely. The decision underscores Sela’s strategic\
    \ brilliance and her ability to see through Picard’s manipulations, while also\
    \ setting up the Romulans’ overconfidence as a future liability.\n  "
