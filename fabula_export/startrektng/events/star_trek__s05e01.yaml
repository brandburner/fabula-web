- fabula_uuid: cand_evt_scene_276cd0f3d18baf60_01
  global_id: null
  title: Guinan Reveals Tasha’s Hidden Past
  description: "\n  In the *Observation Lounge*, Picard, Troi, and Beverly debate\
    \ Sela’s claim to be Tasha Yar’s daughter, with Troi’s empathic senses detecting\
    \ no deception and Beverly’s medical records contradicting the assertion. Picard\
    \ dismisses the claim as a Romulan distraction, but Guinan’s sudden appearance\
    \ introduces a far more unsettling revelation: she insists Tasha Yar was a survivor\
    \ of the *Enterprise-C*’s destruction at Narendra III, taken to Romulus as a prisoner—and\
    \ that Picard himself sent her there. Guinan’s fragmented but insistent memories\
    \ force Picard to confront the possibility that Sela’s claim is not just a lie\
    \ but a consequence of his own past actions. The exchange shifts the scene from\
    \ strategic debate to personal reckoning, as Guinan’s intuition challenges Picard’s\
    \ rational dismissal and compels him to seek a direct confrontation with Sela.\
    \ The moment underscores the story’s recurring theme of hidden histories and the\
    \ unintended consequences of past decisions, while also deepening Picard’s emotional\
    \ investment in the conflict.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e01
  scene_sequence: 13
  sequence_in_scene: 21
  key_dialogue:
  - |-
    PICARD: Then you believe her, Counselor?
    TROI: I'm not saying we should accept her claim at face value... but I sensed no deception from her. She really believes that she is the daughter of Tasha Yar.
    BEVERLY: Regardless of what she believes, Sela cannot be her daughter. I've reviewed all of Tasha's medical records, and there is no indication that she was ever pregnant.
  - |-
    GUINAN: How much do you know about what happened to the last ship named *Enterprise*?
    PICARD: The *Enterprise-C*? It was lost... at the battle of Narendra Three... while defending a Klingon outpost from the Romulans.
    GUINAN: And the survivors?
    PICARD: There were stories... that there might have been prisoners, taken back to Romulus. But those were just rumors.
    GUINAN: There were survivors. And one of them was Tasha Yar.
  - |-
    GUINAN: You can't just dismiss this. If I'm right... if you did send Tasha Yar on that ship... then, in a way, Picard... you're responsible for her daughter.
    PICARD: I think... it's time I met Commander Sela.
