- fabula_uuid: act_c7f170661399f87d
  number: 1
  summary: Picard faces immediate logistical challenges in assembling a twenty-ship
    fleet for the blockade, as Starfleet resources are stretched thin. He makes decisive,
    unconventional choices, including assigning Commander Data to captain the *Sutherland*,
    a Nebula-class starship. Data, initially hesitant to request command, accepts
    the role, only to immediately encounter prejudice from his first officer, Lieutenant
    Commander Hobson, who openly questions an android's suitability for command. Data,
    impassive, denies Hobson's transfer request and proceeds with his duties. Meanwhile,
    on the Klingon homeworld, Worf grapples with the cultural nuances of the civil
    war, observing his brother Kurn's casual camaraderie with an enemy Duras captain
    in a neutral nightclub. Worf's Starfleet discipline clashes with Klingon customs
    of honor and revelry. The Duras sisters, Lursa and B'Etor, observe Worf, plotting
    to exploit his divided loyalties. The Federation fleet, including the *Enterprise*
    and *Sutherland*, departs for the Romulan-Klingon border, with Picard leading
    the charge, setting the stage for the imminent confrontation.
