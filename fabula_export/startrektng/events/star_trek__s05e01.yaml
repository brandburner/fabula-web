    - Prove the Duras loyalists’ commitment to their house, even in the face of certain
      defeat.
    influence_mechanisms:
    - Through the blind loyalty of their warriors, who follow orders without question,
      even when it leads to their destruction.
    - By leveraging the Klingon honor code to justify their aggressive tactics, framing
