    description_of_involvement: |2-

              Starfleet is the invisible but omnipresent force shaping every decision in this scene. Its protocols, resources, and cultural biases are both the constraint and the catalyst for Picard’s actions. The organization is represented through the PADDs’ data (listing underprepared ships and understaffed crews), the yard superintendent’s objections (voiced indirectly), and the unspoken tension around Data’s command potential. Starfleet’s influence is exerted through its chain of command—Picard’s authority to override bureaucratic concerns—and its institutional memory, which Data invokes when citing his twenty-six years of service. The organization’s goals and limitations are laid bare: it seeks to prevent Romulan interference in the Klingon civil war, but its stretched resources and internal prejudices threaten to undermine its mission.
    active_representation: |2-

              Through institutional protocol (PADDs, yard superintendent’s objections), chain of command (Picard’s authority to assign officers), and cultural biases (Data’s exclusion from command consideration).
    power_dynamics: |2-

              Exercising authority over individuals (Picard’s decisions bind Riker, Geordi, and Data to their assignments) but being challenged by external forces (Romulan interference) and internal tensions (unconscious bias against androids).
    organizational_goals:
    - Deploy a functional blockade fleet to counter Romulan aid to the Duras family
      in the Klingon civil war, despite logistical constraints.
    - Uphold Starfleet’s principles of meritocracy and equality, even as institutional
      biases (e.g., against androids) threaten to undermine them.
    influence_mechanisms:
    - Policy (Picard’s authority to override the yard superintendent’s concerns about
      ship readiness)
    - Resources (assigning underprepared ships and understaffed crews to the mission,
      despite risks)
    - Chain of command (Picard’s decisions bind his officers to their roles, reinforcing
      hierarchy)
    - Cultural norms (Data’s challenge exposes the unspoken bias against androids
      in leadership, forcing Starfleet to confront its own prejudices).
    institutional_impact: |2-

              The scene highlights Starfleet’s tension between its idealistic principles (meritocracy, equality) and its practical limitations (stretched resources, internal biases). Picard’s decision to assign Data the *Sutherland* is a small but significant step toward addressing this tension, though the broader institutional change remains unresolved. The blockade itself becomes a test of Starfleet’s ability to adapt—both tactically and morally—in the face of external threats.
    internal_dynamics: |2-

              Factional disagreement emerges around Data’s command potential, revealing a divide between those who see him as a capable officer (Picard, Riker, Geordi) and those who may harbor prejudice (implied by the yard superintendent’s objections and Picard’s initial hesitation). The chain of command is tested as Data asserts his right to lead, challenging Picard to live up to Starfleet’s stated values.
