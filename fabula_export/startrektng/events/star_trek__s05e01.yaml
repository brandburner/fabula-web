  global_id: null
  title: Duras Sisters Offer Worf a Tainted Alliance
  description: 'Worf awakens in the Duras family home to find B''Etor physically and
    sexually provocative, while Lursa presents a calculated offer: a mating bond with
    B''Etor, a fatherly role for Toral, and a path to rule the Klingon Empire—all
    under Romulan influence. The sisters weaponize Worf’s Klingon honor and paternal
    instincts, framing their proposal as a way to restore glory to the Empire. Worf’s
    initial confusion gives way to disgust as he realizes their true intentions: a
    dishonorable alliance that would betray Klingon tradition. The moment is interrupted
    by Sela’s transmission, revealing the sisters’ failure and ordering Worf’s immediate
    handover to Romulan custody. The scene forces Worf to confront his divided loyalties—between
    Starfleet duty and Klingon heritage—while exposing the Duras sisters’ manipulative
    tactics and Romulan collusion in the civil war. The tension escalates as Worf’s
    rejection of their offer becomes inevitable, setting up his eventual defiance
    of their treachery.'
