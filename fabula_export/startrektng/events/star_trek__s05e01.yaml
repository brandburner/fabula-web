- fabula_uuid: cand_evt_scene_f33e3620483ad048_01
  global_id: null
  title: Data defies orders to hunt Romulans
  description: "\n  On the *Sutherland*'s bridge, Data receives fleet-wide orders\
    \ to redeploy to Gamma Eridon at maximum warp. Instead of complying, he pauses\
    \ to analyze sensor data, theorizing that the Romulans' disruption of the tachyon\
    \ net may have left detectable ionized particle traces. When Hobson questions\
    \ the logic—arguing the area is too saturated with tachyon particles to isolate\
    \ signatures—Data overrides standard protocol, halting the ship and reconfiguring\
    \ sensors to scan for the traces. Hobson escalates his objection, accusing Data\
    \ of endangering the crew by prioritizing a speculative hunt over direct orders.\
    \ Data responds with quiet but unyielding authority, invoking his command prerogative\
    \ and threatening to relieve Hobson if he refuses to comply. The confrontation\
    \ forces Hobson to back down, marking a critical moment where Data’s growing autonomy\
    \ as a commander clashes with the crew’s lingering skepticism of his judgment.\
    \ The scene underscores the tension between Data’s logical decisiveness and the\
    \ human crew’s emotional resistance to his leadership, while advancing the broader\
    \ plot of exposing Romulan interference in the Klingon civil war.\n  "
