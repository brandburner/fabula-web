  title: Worf confronts Kurn in Klingon nightclub
  description: Worf enters a chaotic Klingon nightclub, where the atmosphere is a
    controlled riot of drinking, brawling, and raucous laughter. His expression remains
    stern, contrasting with the revelry around him. He spots Kurn at a table with
    Captain Larg, a Duras loyalist who led the attack on them the previous day. Kurn
    greets Worf warmly, but the tension is palpable—Larg’s presence is a direct challenge
    to Worf’s divided loyalties. The scene underscores the unresolved conflict between
    Worf’s Starfleet duty and his Klingon heritage, while Kurn’s casual camaraderie
    with a Duras ally hints at deeper Romulan-Klingon intrigues. The moment forces
    Worf to confront the reality of his brother’s allegiances and the looming threat
    of the civil war’s escalation. The dialogue reveals Kurn’s defiance and Larg’s
    taunting, setting up a confrontation that will test Worf’s resolve and force him
    to choose between blood and duty.
