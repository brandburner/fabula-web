  title: Data rejects Hobson’s transfer request
  description: In the chaotic, half-prepped bridge of the *Sutherland*, Data assumes
    command amid the crew’s unspoken skepticism. Hobson, the ship’s first officer,
    immediately challenges Data’s authority by requesting a transfer, framing his
    objection as a matter of professional suitability rather than personal bias. He
    draws a parallel to Klingons as counselors or Berellians as engineers, arguing
    that androids are fundamentally unfit for command. Data, unshaken, denies the
    request with quiet resolve, reaffirming his authority not through force but through
    calm logic. The exchange tests Data’s leadership under institutional prejudice
    and forces Hobson to confront the reality of serving under an android captain.
    The moment underscores the crew’s lingering doubts while marking Data’s first
    act of command as a turning point in his growth—one that will later be validated
    by his tactical success against the Romulans. The tension here isn’t just about
    a transfer; it’s about whether the crew will accept a synthetic officer as their
    leader, a question that will shape the *Sutherland*’s mission and Data’s place
    in Starfleet’s future.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e01
  scene_sequence: 7
  sequence_in_scene: 11
  key_dialogue: &id009
  - |-
    HOBSON: I'd like to request a transfer.
    DATA: May I ask why?
    HOBSON: I don't believe I would be... a good first officer for you.
    DATA: Your service record to date suggests that you would perform that function competently.
    HOBSON: That's not what I mean. I don't think that I would be a good first officer for you.
    DATA: Why?
    HOBSON: Frankly, sir... I don't believe in your ability to command this ship. You're a fellow officer and I respect that... but no one would suggest that a Klingon would make a good ship's counselor or that a Berellian could be an engineer. They're just not suited for those positions. By the same token, I don't think that an android is a good choice to be captain.
  - 'DATA: I understand your concerns. Request denied.'
