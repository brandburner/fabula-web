  title: Sela mobilizes Romulan forces against Picard
  description: "\n  In the Duras family home, Sela asserts her authority over the\
    \ Romulan-Klingon alliance by dismissing B'Etor’s concerns about the delayed convoy\
    \ and silencing Toral’s impulsive demands for immediate action. When Lursa reveals\
    \ Picard’s Federation fleet—twenty starships—is advancing toward Klingon territory,\
    \ Sela’s demeanor shifts from cold indifference to calculated urgency. She orders\
    \ Movar to return to Romulus and assemble the fleet at specified coordinates within\
    \ two days, escalating the Romulan response to Picard’s blockade. The exchange\
    \ underscores Sela’s strategic dominance over the Duras sisters and her willingness\
    \ to provoke direct confrontation with Starfleet, marking a pivotal escalation\
    \ in the Klingon civil war. The scene also highlights Toral’s marginalization\
    \ and the Duras sisters’ growing dependence on Romulan support, while Sela’s measured\
    \ but decisive actions reveal her as the true architect of the Romulan intervention.\n\
    \  "
