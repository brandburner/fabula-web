  object_involvements:
  - object_uuid: ger_object_5aab6c3d4b0d
    description_of_involvement: "\n        The Federation Decoy Ship’s Warp Drive\
      \ is the *Sutherland*, whose failure creates the gap in the tachyon net. Movar\
      \ initially identifies this as an opportunity for the Romulans to slip through\
      \ the blockade, but Sela recognizes it as a deliberate ruse by Picard. Rather\
      \ than exploiting the gap, she targets the *Sutherland* itself, disabling it\
      \ and forcing the Federation to redeploy their forces. The ship’s warp drive\
      \ failure is thus the catalyst for Sela’s counterstrategy, turning Picard’s\
      \ bait into a liability for the Federation.\n      "
    status_before_event: "\n        Operational but failing, causing the *Sutherland*\
      \ to drift off the blockade line and create a gap in the tachyon net. The failure\
      \ is intentional, part of Picard’s trap.\n      "
    status_after_event: "\n        Completely disabled by the Romulan energy burst.\
      \ The *Sutherland* is now incapacitated, unable to maintain its section of the\
      \ tachyon grid, and vulnerable to further Romulan attacks.\n      "
    global_id: ger_object_5aab6c3d4b0d
