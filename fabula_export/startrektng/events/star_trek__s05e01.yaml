  title: Sela Delivers Federation Ultimatum
  description: "\n  On the *Enterprise* bridge, O’Brien detects a Romulan warbird\
    \ decloaking directly in front of the ship. Picard, defying protocol, orders shields\
    \ to remain down, creating a moment of vulnerability. When Sela appears on the\
