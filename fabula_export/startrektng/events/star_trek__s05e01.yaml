  organization_involvements:
  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: 'Starfleet’s authority is invoked as Data assumes
      command of the *Sutherland* by order of the organization. His declaration—‘By
      order of Starfleet, I hereby take command of this vessel’—frames his leadership
      as an institutional directive, not a personal choice. Hobson’s challenge to
      Data’s authority, however, reveals an internal tension within Starfleet: the
      organization’s progressive stance on synthetic officers (e.g., Data’s command)
      clashes with the prejudices of its members (e.g., Hobson’s objections). The
      crew’s skepticism further highlights the organizational struggle to reconcile
      innovation with tradition, as Data’s leadership tests Starfleet’s commitment
      to diversity and meritocracy.'
    active_representation: Through institutional protocol (Data’s formal assumption
      of command) and the collective skepticism of the crew (reflecting broader organizational
      biases).
    power_dynamics: Exercising authority over individuals (Data’s command is enforced
      by Starfleet) but being challenged by internal prejudices (Hobson’s objections
      and the crew’s skepticism).
    organizational_goals:
    - Assert Starfleet’s progressive values by placing an android in command, despite
      institutional biases.
    - Ensure the *Sutherland*’s operational readiness for its urgent mission, regardless
      of internal resistance.
    influence_mechanisms:
    - Institutional protocol (Data’s command is legitimized by Starfleet’s orders).
    - Hierarchical authority (Data’s rank and Starfleet’s directive override Hobson’s
      objections).
    - Symbolic gestures (Data’s reference to the ship’s log as an official record
      of his command).
    institutional_impact: The event underscores Starfleet’s internal struggle to balance
      innovation with tradition, as Data’s leadership becomes a litmus test for the
      organization’s commitment to diversity and meritocracy. The crew’s skepticism
      and Hobson’s prejudice reveal the institutional challenges Data must overcome
      to prove his competence.
    internal_dynamics: Factional disagreement emerges between Starfleet’s progressive
      stance on synthetic officers and the prejudices of its members, particularly
      those like Hobson who resist change. The chain of command is tested as Data
      asserts his authority, forcing the crew to confront their biases.
    global_id: ger_organization_73a4b614bde7
