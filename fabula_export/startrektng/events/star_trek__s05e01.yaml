    goals:
    - Undermine Data’s authority to expose crew distrust of android leadership
    - Assert his own influence over the bridge crew during the crisis
    what_happened: Hobson seizes the opportunity presented by the power coupling overload
      to challenge Data’s authority, moving swiftly to take phaser and torpedo controls
      offline and issuing orders to the crew without consultation. His body language
      is controlled but tense, his voice laced with thinly veiled resentment as he
      feigns deference with a sarcastic 'Thank you, sir' after Data reasserts control.
      He exits the bridge with the crew, leaving Data isolated—a calculated move to
      undermine his command and expose the crew’s skepticism of android leadership.
