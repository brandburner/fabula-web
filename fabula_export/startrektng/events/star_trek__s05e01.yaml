      \ but it serves as a metaphor for the fragility of the Duras sisters’ scheme.\
      \ One press, and their carefully laid plans unravel.\n      "
    status_before_event: Inactive, part of the monitor’s control panel, awaiting activation.
    status_after_event: Deactivated, its function fulfilled in facilitating Sela’s
      transmission.
    global_id: ger_object_b4aba7e6159e
  - object_uuid: ger_object_c8603daf3368
    description_of_involvement: "\n        The Duras sisters’ couch is the physical\
      \ stage for the seduction and subsequent confrontation in this event. Worf awakens\
      \ to find himself lying on it, with B'Etor draped over him in a provocative\
      \ pose. The couch’s short length forces an intimacy between them, amplifying\
      \ the tension of her advances. When Worf sits bolt upright in disgust, the couch\
      \ becomes a barrier between them, as B'Etor retreats to the far end. Later,\
      \ the couch serves as a neutral ground where Worf’s defiance is met with Sela’s\
      \ order, and the Romulan guard’s phaser. Its role is purely functional—a setting\
      \ for the power struggle—but its proximity to the characters makes it a silent\
      \ witness to their manipulations and failures.\n      "
    status_before_event: Occupied by Worf and B'Etor, its cushions slightly disheveled
