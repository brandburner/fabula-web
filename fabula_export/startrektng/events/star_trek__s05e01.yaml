- fabula_uuid: cand_evt_scene_2e742bcafe40e88d_02
  global_id: null
  title: Picard secures blockade against Romulan interference
  description: In a high-stakes diplomatic confrontation, Captain Picard persuades
    Fleet Admiral Shanthi to authorize a Federation blockade at the Romulan-Klingon
    border—despite its political risks—by exposing Romulan covert support for the
    Duras family. Picard’s passionate argument hinges on the Romulans’ long-standing
    efforts to destabilize the Federation-Klingon Alliance, while Shanthi’s cautious
    approval sets the stage for a risky but necessary intervention. The exchange reveals
    Picard’s strategic acumen and the moral weight of his decision, as Riker’s quiet
    skepticism underscores the personal and operational uncertainties ahead. This
    moment marks a critical escalation in the Federation’s response to Romulan meddling,
    with the blockade serving as both a tactical maneuver and a symbolic stand against
    external interference in Klingon affairs. The scene’s tension lies in the balance
    between Picard’s conviction and the unspoken doubts of those around him, including
    Shanthi and Riker, whose reactions foreshadow the challenges of executing the
    plan.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e01
  scene_sequence: 3
  sequence_in_scene: 5
  key_dialogue:
  - 'PICARD: There have been three major engagements in the last two weeks... all
    of them won by ships loyal to the Duras family. None of which is our concern,
    Jean-Luc. The Klingon civil war is, by definition, an internal matter of the Empire.
    PICARD: Agreed. But if the Duras are being aided by the Romulans, then it becomes
    very much our concern. The Romulans have been trying to destroy the Federation/Klingon
    Alliance for over twenty years, and at the same time, the Duras have been secretly
    conspiring with the Romulans. Doesn''t it strike you as odd that the Duras are
    able to field such an overpowering force against Gowron? That they outmatch him
    at almost every turn?'
  - 'PICARD: We must stop the flow of supplies and equipment from the Romulans to
    the Duras family. I propose we take a fleet of ships to the Romulan/Klingon border.
    We''ll take no offensive action, but we''ll be in a position to expose any Romulan
    shipments that try to cross the border. SHANTHI: ((musing)) A blockade... But
    how will you overcome the Romulan cloaking device? PICARD: My chief engineer has
    developed a system that should help us nullify that advantage. Each ship will
    send out an active tachyon beam to the other ships in the blockade fleet. In theory,
    any cloaked vessel that tries to pass between our ships should cross one of those
    beams and be detected.'
  - 'RIKER: ((quietly)) Nicely done... I hope you know what you''re doing. PICARD:
    ((quietly)) So do I, Number One.'
