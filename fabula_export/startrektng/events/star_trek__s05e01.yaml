  - organization_uuid: ger_organization_73a4b614bde7
    description_of_involvement: Starfleet’s institutional dynamics are on full display
      in this event, with Hobson’s defiance of Data’s authority exposing the deeper
      prejudices within the organization. The power struggle reflects Starfleet’s
      hierarchical tensions, where human officers like Hobson resist android command
      despite Data’s qualifications. The scene highlights the organization’s struggle
      to adapt to technological and social change, with Data’s isolation symbolizing
      the broader challenges faced by non-human officers in a traditionally human-dominated
      structure.
