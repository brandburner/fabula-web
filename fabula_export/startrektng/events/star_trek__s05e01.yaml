  title: Gowron reveals Worf’s capture
  description: "\n  After finalizing a high-stakes plan with Picard to expose Romulan\
    \ interference in the Klingon civil war, Gowron delivers a devastating aside:\
    \ Worf has been captured by the Duras sisters. The revelation is casual, almost\
    \ dismissive—Gowron’s tone suggests Worf’s fate is secondary to the larger political\
    \ maneuvering. Picard’s reaction is one of quiet shock, his measured silence underscoring\
    \ the betrayal’s weight. This moment fractures the fragile trust between the Federation\
    \ and the Klingon Empire, forcing Picard to confront the cost of their alliance.\
    \ For Worf, it crystallizes his existential crisis: his loyalty to a House that\
    \ has abandoned him and a captain who may now question his value in the conflict.\
    \ The exchange also serves as a thematic pivot, exposing the ruthless pragmatism\
    \ of Klingon politics and the personal toll of geopolitical gamesmanship.\n  "
