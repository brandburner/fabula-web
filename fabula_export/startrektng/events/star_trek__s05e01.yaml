    description_of_involvement: 'The United Federation of Planets is represented in
      this event through Captain Picard’s actions and dialogue, which reflect Starfleet’s
      strategic interests and moral principles. Picard’s confrontation with Sela is
      framed within the broader context of the Federation’s blockade of the Romulan-Klingon
      border, aimed at preventing external interference in the Klingon civil war.
      His unyielding stance—refusing to let personal revelations sway his judgment—embodies
      the Federation’s commitment to neutrality and the rule of law. The organization’s
      influence is exerted through Picard’s authority as a Starfleet captain, his
      access to intelligence (such as Guinan’s insights), and his ability to deploy
      a fleet of starships as a deterrent. The Federation’s goals in this event are
      twofold: to expose and counter Romulan meddling in Klingon affairs and to uphold
      the alliance with Chancellor Gowron’s faction.'
