      their tactics fail to adapt to the changing nature of the conflict.
    internal_dynamics: The Duras loyalists are bound by unquestioning allegiance to
      their house, but their rigid adherence to tradition makes them vulnerable to
      more adaptable opponents like Kurn. This internal rigidity reflects the family’s
      broader struggle to maintain relevance in a war that demands flexibility.
    global_id: ger_organization_dccc63d3c3ed
