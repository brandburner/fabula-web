- fabula_uuid: act_db02d528e64e3e56
  number: 3
  summary: Following her shocking revelation, Sela issues a firm ultimatum to Picard,
    demanding the Federation fleet's withdrawal from the Romulan-Klingon border within
    twenty hours, threatening military action otherwise. Picard, Troi, and Beverly
    discuss Sela's extraordinary claim. Beverly, relying on medical records, dismisses
    the possibility of Tasha's maternity, while Troi, using her empathic abilities,
    senses no deception from Sela, only genuine belief. Picard initially views Sela's
    story as a Romulan tactic to create distraction and instability. However, Guinan
    intervenes, approaching Picard with fragmented, intuitive memories of Tasha Yar
    being aboard the *Enterprise-C* when it was lost twenty-four years prior, and
    disturbingly, implies Picard's indirect role in sending her there, hinting at
    a complex temporal paradox. Guinan insists that if her intuition is correct, Picard
    bears a measure of responsibility for Sela's existence. Swayed by Guinan's profound
    conviction and the weight of her words, Picard reconsiders his skepticism and
    decides to meet Sela again, seeking clarity on this bizarre and personal connection.
    Meanwhile, on the Klingon homeworld, Worf's attempts to prioritize the broader
    war effort and strategic planning over matters of individual honor clash intensely
    with Kurn's adherence to traditional Klingon values. Their heated argument culminates
    in Kurn's frustrated departure. Shortly thereafter, Worf is ambushed by two Klingons,
    overpowered, and forcibly taken away, his capture orchestrated by the manipulative
    Duras sisters.
  key_moments: []
  scene_numbers:
  - 13
  - 14
  - 15
  - 16
- fabula_uuid: act_b84fda9958a2314c
  number: 4
  summary: 'Picard confronts Sela, revealing his knowledge of Tasha Yar''s presence
    on the *Enterprise-C* twenty-four years prior, catching Sela off guard. Sela,
    regaining her composure, confirms the improbable truth: Tasha was a survivor of
    the *Enterprise-C* and was taken captive. A Romulan general spared Tasha''s life
    in exchange for her becoming his consort, leading to Sela''s birth a year later.
    Sela recounts Tasha''s attempt to escape with her as a child, and Sela''s cry
    betraying them, resulting in Tasha''s execution. Sela declares her complete Romulan
    identity, devoid of human sentiment. Meanwhile, Worf, held captive in the Duras
    home, endures an unsettling encounter with Lursa and B''Etor. They attempt to
    manipulate him, proposing a political alliance cemented by Worf''s marriage to
    B''Etor, promising co-rule of the Empire. Worf vehemently rejects their offer,
    denouncing their lack of honor and subservience to Romulan influence. Sela, via
    monitor, orders Worf turned over to a Romulan guard for interrogation. Picard
    then coordinates with Gowron, proposing a joint strategy: Gowron launches a major
    offensive, forcing the Duras to request Romulan supplies, which the Federation
    fleet will then intercept. Gowron reveals Worf''s capture. Picard and Riker devise
    a tactical plan to create a feigned weakness in the tachyon net, intending to
    lure and trap the Romulan supply convoy. Sela, however, anticipates Picard''s
    ruse and instead targets Data''s *Sutherland* to disable a section of the net,
    aiming to exploit a perceived vulnerability.'
  key_moments: []
  scene_numbers:
  - 17
  - 18
- fabula_uuid: act_888f762e14ff1193
  number: 5
  summary: Romulan ships prepare to cross the border. Sela executes her plan, deploying
    a high-energy tachyon pulse that disables a significant portion of the detection
    net around Data's *Sutherland*. Picard, observing the disruption, orders the entire
    Federation fleet to fall back and re-establish the net elsewhere. Data, however,
    defies this direct order. He deduces that the Romulan ships, despite their cloaks,
    might carry a residual tachyon signature from the pulse. Overriding Hobson's protests
    and asserting his command, Data orders the *Sutherland* to stop and reconfigure
    its sensors. He then uses reconfigured photon torpedoes, set to a low yield, to
    illuminate the cloaked Romulan ships, exposing their presence to the entire fleet.
    Sela, witnessing her fleet's exposure, realizes their plan is compromised and
    orders an immediate retreat back to Romulan territory, abandoning the Duras sisters
    to their fate. Hobson, witnessing Data's decisive and effective command, expresses
    genuine respect. On the Klingon homeworld, Lursa and B'Etor abandon Toral as Gowron's
    forces overwhelm the Duras. Kurn rescues a battered Worf. Picard commends Data
    for his independent judgment. In the Great Hall, Gowron offers Worf the traditional
    Klingon right to execute Toral. Worf, after a moment of internal struggle and
    a silent exchange with Picard, drops the knife, declaring that vengeance is "not
    his way." He spares Toral's life, rejecting the Klingon code of vengeance. Picard,
    acknowledging Worf's moral stance, grants him permission to return to duty, concluding
    the complex conflict with a powerful statement of individual conscience over rigid
    tradition.
