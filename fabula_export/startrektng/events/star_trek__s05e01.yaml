- fabula_uuid: cand_evt_scene_4f42a0d98aa48ee7_03
  global_id: null
  title: Data’s Command Authority Undermined
  description: On the *Sutherland*’s bridge, Data’s leadership is publicly challenged
    by Lieutenant Hobson, who exploits a power coupling crisis to seize control and
    humiliate the android captain. Hobson’s calculated defiance—masked as efficiency—exposes
    the crew’s latent distrust of Data’s command, forcing him to assert authority
    in a way that feels reactive rather than decisive. The exchange leaves Data isolated
    on the bridge, grappling with the fragility of his position and the human prejudice
    that undermines his logical competence. The scene underscores the tension between
    Starfleet’s faith in Data’s capabilities and the crew’s skepticism, setting up
    a broader conflict over whether an android can command in a high-stakes, emotionally
    charged mission. Hobson’s exit with the crew symbolizes the erosion of Data’s
    influence, leaving him to confront the reality that his leadership is not yet
    unquestioned—despite his technical proficiency and adherence to protocol.
