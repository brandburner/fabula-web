      lack of reaction is not indifference, but a deliberate choice to let the moment
      speak for itself, reinforcing that his authority is derived from results, not
      sentiment.
    goals:
    - Confirm the tactical success of the photon torpedo reconfigured to expose the
      Romulans, ensuring the crew understands the strategy’s effectiveness.
    - Issue clear, efficient orders to transition the *Sutherland* from combat readiness
      to post-engagement protocols, maintaining operational discipline.
    what_happened: Data stands at the tactical console, his golden eyes scanning the
      readouts with the precision of a machine analyzing data. His posture is erect,
      his movements deliberate but unhurried, as if the weight of the moment—Hobson’s
      reluctant concession—registers as nothing more than another variable in an equation.
      He confirms the tactical success of the photon torpedo reconfigured to expose
      the Romulans, his voice steady and devoid of triumph, as if the outcome were
      inevitable. When Hobson addresses him as 'Captain' for the first time, Data
      does not react; there is no acknowledgment, no acknowledgment of the shift in
      dynamic, only the issuance of orders to report to the flagship and begin cleanup.
      His detachment is not indifference, but a refusal to engage with the emotional
      subtext of the moment—perhaps because he cannot, or because he chooses not to.
