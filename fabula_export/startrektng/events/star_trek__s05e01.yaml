  global_id: null
  title: Sela Seizes Control Over Worf
  description: "\n  In the Duras family home, Worf awakens to find B'Etor seductively\
    \ manipulating him, while Lursa proposes a treacherous alliance—marrying him to\
    \ B'Etor to unite their forces and rule the Klingon Empire from Romulus. Worf\
    \ rejects their dishonorable scheme, condemning their betrayal of Klingon tradition.\
    \ Before the confrontation escalates, Sela interrupts via monitor, dismissing\
    \ Lursa’s failure and demanding intelligence on the Federation fleet. Without\
    \ hesitation, she orders Worf’s immediate detention by a Romulan guard, stripping\
    \ him of autonomy and symbolizing the Duras sisters’ irrelevance. The scene underscores\
    \ Sela’s ruthless ambition, the fragility of the Duras sisters’ power, and the\
    \ escalating Romulan interference in the Klingon civil war. Worf’s defiance is\
    \ met with physical coercion, marking a turning point in his struggle between\
    \ loyalty and survival.\n  "
