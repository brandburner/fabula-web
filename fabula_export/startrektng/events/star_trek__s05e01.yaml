  scene_sequence: 16
  sequence_in_scene: 26
  key_dialogue:
  - 'B''ETOR: Something wrong?'
  - 'LURSA: Welcome, Worf... son of Mogh. The same as you... personal honor... and
    glory for the Empire.'
  - 'WORF: Your family has never valued honor.'
  - 'B''ETOR: The rewards... could be greater than you can imagine.'
  - 'LURSA: Join us, Worf... and we will usher in a new era for our people.'
  - 'WORF: An era where honor has no meaning... where Klingons trade loyalties in
    dark rooms... and where the Empire is ruled... from Romulus.'
  - 'SELA: Enough, Lursa. You''ve failed. Turn him over to the guard.'
