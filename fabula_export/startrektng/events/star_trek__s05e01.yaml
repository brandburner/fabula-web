      torpedo burst.
    global_id: ger_object_09db905cd8f4
  - object_uuid: ger_object_36a9549afb00
    description_of_involvement: "\n        The photon torpedo warheads on the *Sutherland*\
      \ bridge are reconfigured by Hobson under Data’s direct orders to deliver a\
      \ high-energy burst at level six. This is an unconventional and risky maneuver,\
      \ as photon torpedoes are typically used for targeted strikes rather than broad-spectrum\
