  title: Hobson undermines Data’s command
  description: During a high-stakes crisis on the *Sutherland*’s bridge, Lieutenant
    Hobson seizes the initiative by openly defying Data’s command, issuing contradictory
    orders to the crew and forcing Data into a public power struggle. The incident
    begins with a power coupling overload and radiation leak, which Hobson initially
    addresses without consulting Data. When Data intervenes, Hobson deliberately reverses
    his orders—publicly deferring to Data while subtly exposing the crew’s latent
    distrust of the android’s leadership. The exchange escalates tension between human
    skepticism and Data’s untested authority, leaving Data isolated and questioning
    his ability to command. Hobson’s sarcastic compliance, masked as deference, underscores
    the crew’s unresolved prejudice, forcing Data to confront the fragility of his
    position in a moment of vulnerability. The scene serves as a turning point, revealing
    the crew’s divided loyalties and setting up Data’s subsequent leadership crisis.
