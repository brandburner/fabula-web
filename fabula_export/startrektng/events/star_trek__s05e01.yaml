    global_id: ger_object_73de37e26a63
  - object_uuid: ger_object_af0021d1a4cd
    description_of_involvement: "\n        The Romulan Tachyon Pulse is proposed by\
      \ Movar as a means to disable the Federation’s tachyon detection grid. Sela\
      \ initially approves the plan but rejects it when she realizes the gap in the\
      \ net is a trap. Instead of using the pulse to breach the grid, she orders a\
      \ targeted energy burst at Data’s *Sutherland*, achieving the same goal—disabling\
      \ a section of the net—while avoiding Picard’s bait. The pulse remains a backup\
      \ option but is ultimately unnecessary due to Sela’s sharper tactical insight.\n\
      \      "
    status_before_event: "\n        Planned but not yet executed. Movar presents it\
      \ as a viable tactic to disrupt the tachyon grid, but Sela halts its use upon\
      \ recognizing Picard’s trap.\n      "
    status_after_event: "\n        Abandoned in favor of the targeted energy burst.\
      \ The pulse is no longer needed, as Sela’s alternative strategy achieves the\
      \ desired result without falling into Picard’s snare.\n      "
    global_id: ger_object_af0021d1a4cd
  - object_uuid: ger_object_76fea6193caf
    description_of_involvement: "\n        The Romulan Warbird’s Targeted Energy Burst\
      \ is the weapon Sela uses to disable Data’s *Sutherland*. After recognizing\
      \ Picard’s trap, she orders the burst to strike the *Sutherland* directly, exploiting\
      \ its status as the weakest link in the Federation’s formation. The burst disables\
      \ the ship instantly, creating a gap in the tachyon net and allowing the Romulans\
