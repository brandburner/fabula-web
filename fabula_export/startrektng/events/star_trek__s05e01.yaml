  title: Picard and Sela’s High-Stakes Interrogation
  description: "\n  In a tense, psychologically charged confrontation aboard the *Enterprise*,\
    \ Picard and Sela engage in a verbal duel that exposes their respective vulnerabilities\
    \ while reinforcing their strategic postures. Sela, initially attempting to assert\
    \ dominance through aggressive posturing and veiled threats about Romulan cloaking\
    \ technology, finds herself outmaneuvered as Picard subtly reveals his knowledge\
    \ of Federation countermeasures. The dynamic shifts when Sela pivots to a personal\
    \ revelation: she claims to be Tasha Yar’s daughter, born from a forced union\
    \ between Yar and a Romulan general after the *Enterprise-C*’s destruction. Picard,\
    \ though skeptical, listens as Sela recounts Yar’s betrayal and execution, her\
    \ voice betraying a mix of contempt and unresolved grief. The exchange culminates\
    \ in Sela’s warning—Picard has fourteen hours to prepare—leaving him grappling\
    \ with the implications of her story and the looming Romulan threat. The scene\
    \ underscores Picard’s strategic acumen, Sela’s emotional complexity, and the\
    \ unresolved power dynamics between them, while hinting at deeper Romulan-Federation\
    \ tensions tied to the Klingon civil war.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e01
  scene_sequence: 15
  sequence_in_scene: 23
  key_dialogue:
  - 'SELA: Well, Captain... what is this urgent matter we need to discuss?'
  - 'PICARD: I''m afraid you misinterpret our presence here. I want to reassure you
    that we have no hostile intentions.'
  - 'SELA: Ah. Then I can report to my superiors that a fleet of twenty-three Federation
    starships is on our border for... humanitarian reasons?'
  - 'PICARD: It is most certainly our intent to prevent any external power from interfering
    in Klingon affairs.'
  - 'SELA: Nor do we have any plan to do so. But Captain... if for any reason we chose
    to enter Klingon territory... how would you stop us? With our cloaking devices
    we can slip by you at will.'
  - 'PICARD: Then why not send your ships across?'
  - 'SELA: You sound eager for us to try... perhaps you''ve discovered a method of
    detecting our ships...'
  - 'SELA: You want the answer to the only real question on your mind... how could
    Tasha Yar be my mother?'
  - 'PICARD: It''s been suggested that Tasha was aboard the *Enterprise-C* when it
    was destroyed twenty-four years ago. She was one of the survivors. You are obviously
    the product of a union between her and a Romulan.'
  - 'SELA: Yes... she was on that ship twenty-four years ago. She was sent there...
    by you... from the future.'
  - 'SELA: One night... when I was four... she came to me, bundled me up and told
    me to stay quiet as we left the compound. I realized she was taking me away...
    away from my home, away from my father... so I cried out. My father had offered
    her life. He had given her a home, given her a daughter. How did she repay him?
    With betrayal. They executed her.'
  - 'SELA: Everything in me that was human... died with my mother that day. All that
    is left... is Romulan. Never doubt that.'
  - 'PICARD: Doubts? I''m full of them. Nothing in my experience can assure me that
    what you say is true... but I do know one thing: it will not affect my judgment
    in our next encounter.'
  - 'SELA: You have fourteen hours, Captain. I suggest you use them wisely.'
