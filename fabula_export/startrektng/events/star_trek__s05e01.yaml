- fabula_uuid: act_185173c1fb606c77
  number: 0
  summary: The narrative opens with a high-stakes escape as Kurn and Worf's Bird of
    Prey evades pursuing Duras ships through a perilous, star-grazing maneuver, immediately
    establishing the brutal intensity of the Klingon civil war. This dramatic sequence
    underscores the desperate measures taken in the conflict. Following this, Captain
    Picard presents a bold and potentially controversial proposal to Fleet Admiral
    Shanthi at Starbase 234. Picard, convinced of Romulan interference in the Klingon
    conflict, advocates for a proactive Federation blockade along the Romulan-Klingon
    border. He details his Chief Engineer's innovative tachyon detection grid, designed
    to nullify Romulan cloaking technology and expose their illicit supply lines.
    Despite initial skepticism from Shanthi and a disapproving Starfleet Admiral,
    Picard's passionate conviction and logical presentation sway her. Shanthi grants
    conditional approval, instructing Picard to assemble his fleet while she consults
    the Federation Council. Riker expresses quiet concern about the gravity of Picard's
    decision, acknowledging the immense risks and high stakes involved in confronting
    the Romulan Empire, effectively setting the stage for the complex geopolitical
    and personal conflicts to follow.
