      unseen risks.
    - The Federation-Klingon Alliance must be preserved, but not at the cost of Starfleet’s
      principles.
    observed_traits:
    - Loyal but skeptical
    - Tactically minded
    - Diplomatic in demeanor
    - Observant of power dynamics
    - Comfortable with ambiguity
