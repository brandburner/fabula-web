    global_id: ger_object_3105fed00c21
  - object_uuid: ger_object_09db905cd8f4
    description_of_involvement: "\n        The sensor schematic on the *Sutherland*\
      \ bridge viewscreen is the focal point of Data’s investigation. It displays\
      \ a series of blotches representing potential anomalies, which Data overlays\
      \ with tachyon emissions data to highlight subspace inertial displacement—a\
      \ telltale sign of cloaked Romulan vessels. The schematic evolves dynamically\
      \ as Data refines the sensor sweep, concentrating on the highlighted area to\
      \ isolate the tachyon signatures. This object is both a tool for Data’s strategy\
      \ and a visual representation of the tension between logic and institutional\
      \ skepticism.\n      "
    status_before_event: Displaying standard sensor readings with no anomalies highlighted,
