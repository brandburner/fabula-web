- fabula_uuid: cand_evt_scene_dbd6afd356dfd8fc_02
  global_id: null
  title: Sela reveals Tasha Yar’s brutal fate
  description: "\n  In a tense, psychologically charged confrontation aboard the *Enterprise*,\
    \ Sela weaponizes Tasha Yar’s tragic past to destabilize Picard. After probing\
    \ his knowledge of Romulan cloaking technology, she pivots to the personal—revealing\
    \ that Tasha was captured by Romulans after the *Enterprise-C*’s destruction,\
    \ forced into a union with a Romulan officer, and executed for attempting to flee\
    \ with their daughter (Sela). The disclosure is a calculated strike: it exploits\
    \ Picard’s guilt over Tasha’s fate, forces him to confront the moral ambiguities\
    \ of his past, and cements Sela’s Romulan identity as a rejection of her mother’s\
    \ humanity. Her cold recitation of the execution—‘They executed her’—hides a flicker\
    \ of unresolved grief, but she quickly masks it behind Romulan defiance. The moment\
    \ leaves Picard reeling, not just from the revelation’s plausibility but from\
    \ its strategic implications: Sela’s ultimatum (14 hours) and her claim that Tasha’s\
    \ betrayal ‘killed everything human’ in her. The exchange deepens the conflict\
    \ between Picard’s ideals and the brutal realities of Romulan politics, while\
    \ framing Sela as both a weapon of her culture and a victim of her mother’s legacy.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e01
  scene_sequence: 15
  sequence_in_scene: 24
  key_dialogue:
  - 'SELA: You want the answer to the only real question on your mind... how could
    Tasha Yar be my mother?'
  - 'SELA: She was among those few who survived. They were all to have been executed
    after their interrogation. But a Romulan general saw her... and he became... enamored
    with her. So a bargain was struck: their lives would be spared if she became his
    consort. I was born a year later.'
  - 'SELA: One night... when I was four... she came to me, bundled me up and told
    me to stay quiet as we left the compound. I realized she was taking me away...
    away from my home, away from my father... so I cried out. My father had offered
    her life. He had given her a home, given her a daughter. How did she repay him?
    With betrayal. They executed her.'
