  key_dialogue:
  - 'WORF: We are at war! Gowron should forbid any challenges until we are victorious.'
  - 'KURN: A Klingon does not... postpone a matter of honor.'
  - 'WORF: A Klingon should place the good of the Empire above his own pride!'
  - 'KURN: So now Gowron no longer suits you... perhaps you mean to challenge him
    for the leadership of the Council?'
  - 'WORF: No.'
  - 'KURN: Then do not speak of this again!'
  - 'KURN: I did not wish to follow Gowron... you came to me and insisted we support
    him against the Duras family. The time for debate is over!'
  - 'KURN: We are Klingons. He is our leader. If that is not enough for you, then
    perhaps you made the wrong choice when you put on that uniform.'
