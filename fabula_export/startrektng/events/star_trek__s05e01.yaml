- fabula_uuid: cand_evt_scene_4f42a0d98aa48ee7_01
  global_id: null
  title: Hobson undermines Data’s command authority
  description: 'On the *Sutherland*’s bridge, Lieutenant Hobson seizes control during
    a power coupling overload crisis, deliberately bypassing Data’s authority to expose
    the crew’s latent distrust of his android command. After Hobson issues contradictory
    orders—ostensibly to safeguard the ship—Data is forced to publicly reassert control,
    but the damage is done: Hobson’s calculated defiance reveals the crew’s skepticism
    of Data’s leadership and leaves him isolated on the bridge, questioning his ability
    to command. The exchange escalates tensions between human prejudice and Data’s
    untested authority, while raising operational stakes for the *Sutherland*’s mission.
    Hobson’s sarcastic compliance ("*Thank you, sir*") underscores his passive-aggressive
    resistance, framing the scene as a microcosm of the broader conflict between tradition
    and innovation in Starfleet’s hierarchy.'
