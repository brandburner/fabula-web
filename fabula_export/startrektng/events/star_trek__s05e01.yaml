      jarring interruption—Sela’s transmission—that exposes the Duras sisters’ subordination
      to Romulan authority. The home’s role is multifaceted: it is a trap for Worf,
      a command center for the Duras family’s bid for power, and a stage for the Duras
      sisters’ failed manipulation. The tension in the room is palpable, as Worf’s
      rejection of their offer and Sela’s abrupt takeover force the Duras sisters
      to comply with Romulan demands.'
