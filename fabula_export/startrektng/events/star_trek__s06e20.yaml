- fabula_uuid: act_9610521fca9cf915
  number: 5
  summary: Gul Ocett's Cardassian ships continue their attack on the Enterprise and
    the Klingon vessel. Riker and Worf, however, remain calm, having anticipated the
    betrayal thanks to Geordi's earlier discovery. They simulate heavy damage using
    inertial dampers, tricking the Cardassians into believing their attack was successful
    before the Cardassian ships depart for Rahm-Izad. Picard, Nu'Daq, and Beverly
    arrive on the bridge, and Riker confirms the Enterprise sustained minimal damage.
    Picard deduces the Cardassians will soon realize Rahm-Izad is the wrong destination.
    He invites Nu'Daq to join them, and the Klingon reluctantly agrees. Picard then
    sets a course for the Vilmoran System, the true location of the final fragment.
    Upon arrival, initial scans show no life, but Data identifies a fossilized seabed
    with primitive lichen, indicating past and limited present life. Picard, Beverly,
    Worf, and Nu'Daq beam down, quickly locating the lichen. Before they can collect
    a sample, Gul Ocett and a Cardassian guard materialize, aiming weapons at the
    away team. Four Romulans, led by their Captain, then emerge, revealing they have
    been shadowing the Enterprise since Galen's attack. A multi-faction standoff ensues,
    with Gul Ocett threatening to destroy the rockface. Amidst the squabbling, Picard
    observes fossilized vegetation in the seabed. Beverly discreetly scrapes a sample,
    and Picard connects her sampling device to his computer. The program activates,
    reconfiguring the tricorder to project a hologram into the middle of the standoff.
    The hologram is a wise, ancient humanoid, who explains their species seeded life
    across the galaxy four billion years ago, guiding evolution to resemble themselves.
    The message, scattered in DNA fragments, was designed to be activated through
    cooperation. The humanoid expresses hope that the discoverers will remember them
    and recognize their shared ancestry. The hologram disappears, and the immediate
    moment of potential unity is shattered by Nu'Daq's and Gul Ocett's unimpressed,
    dismissive reactions. Picard and Beverly beam back to the Enterprise, reflecting
    on the profound discovery's reception. Later, the Romulan Captain contacts Picard,
    expressing a newfound introspection and acknowledging a shared humanity, suggesting
    a glimmer of hope for future understanding.
