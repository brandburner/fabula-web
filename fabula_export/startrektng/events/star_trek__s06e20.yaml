  title: Picard transitions from science to command
  description: "\n  Picard records a log entry documenting the *Enterprise*'s protostar\
    \ analysis, reinforcing the ship's scientific mission as a routine but methodical\
    \ pursuit. Data confirms the completion of spectral evaluations, prompting Picard\
    \ to authorize a course change to the next protostar—a decision that subtly underscores\
    \ the crew's disciplined approach to their broader quest. The moment is interrupted\
    \ by Riker's unexpected summons to the Observation Lounge, signaling a shift from\
    \ scientific inquiry to operational urgency. Picard's immediate compliance reveals\
    \ the tension between his personal intellectual passions and his duty as captain,\
    \ foreshadowing the escalating stakes of their galactic race against rival factions.\
    \ The scene serves as a microcosm of the larger narrative conflict: the pursuit\
    \ of knowledge versus the demands of command, with Picard caught between the two.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e20
  scene_sequence: 1
  sequence_in_scene: 1
  key_dialogue: &id001
  - 'PICARD: ((V.O.)) Captain''s log, Stardate 46731.5. We are in the midst of the
    Volterra nebula, a stellar nursery. Our three-week mission is a routine analysis
    of several dozen protostars in various stages of development.'
  - 'DATA: Captain, I have completed the spectral evaluation of the outer shell. Our
    survey of this protostar is complete.'
  - 'PICARD: ((to Con)) Ensign, lay in a course to the next one, three quarters impulse.'
  - 'RIKER''S COM VOICE: Riker to Captain Picard.'
  - 'PICARD: Yes, Number One?'
  - 'RIKER''S COM VOICE: May I see you in the Observation Lounge, Sir?'
