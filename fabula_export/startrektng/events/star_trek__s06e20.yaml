    symbolic_significance: Represents the crew’s unfulfilled need for personal connection
      and emotional processing. The arboretum’s association with Troi—who acts as
      the ship’s emotional compass—reinforces its role as a space for vulnerability
      and healing, which is constantly deferred in favor of duty.
