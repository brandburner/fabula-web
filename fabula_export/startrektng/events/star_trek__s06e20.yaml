  - location_uuid: ger_location_d7e672a1e08b
    description_of_involvement: The Lichen-Covered Rockface rises from the fossilized
      seabed, its surface encrusted with bright yellow-red-green lichen that encodes
      the four-billion-year-old DNA message. This location is the epicenter of the
      standoff, as factions vie for control of the ancient discovery. Beverly scans
      it with her tricorder to confirm the signal, while Gul Ocett attempts to back
      toward it with her sampling device. The rockface's activation of the holographic
      message transforms it from a mere scientific curiosity into a symbol of shared
      ancestry, uniting the factions for a fleeting moment before conflict resumes.
    observed_atmosphere: Charged with tension and anticipation, the rockface becomes
      a focal point of both scientific discovery and political conflict. Its activation
      of the hologram creates a moment of awe and introspection, briefly overshadowing
      the aggression of the standoff.
    functional_role: Source of the ancient DNA message and the catalyst for the holographic
      revelation, serving as the prize in the three-way standoff.
    symbolic_significance: Represents the bridge between past and present, science
      and mythology, and the potential for unity among warring factions.
    access_restrictions: Heavily contested, with factions attempting to secure or
      destroy the rockface to assert dominance.
    key_environmental_details:
