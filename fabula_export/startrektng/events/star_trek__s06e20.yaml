    status_after_event: Compromised and potentially disabled, with Galen’s fate uncertain.
      The *Enterprise* is now en route to its last known location at maximum warp.
    global_id: ger_object_40fb28894d67
  - object_uuid: ger_object_f31fc57ff14c
    description_of_involvement: Professor Galen’s distress transmission is the inciting
      incident of the event, serving as both a call to action and a symbol of the
      mission’s escalating stakes. The transmission’s abrupt cutoff—mid-sentence and
      mid-image—creates a sense of unresolved tension, forcing the *Enterprise* crew
      to act without full knowledge of the threat. Galen’s fearful expression and
      the chaotic background of his shuttle interior convey the immediacy of the danger,
