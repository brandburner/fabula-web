- fabula_uuid: cand_evt_scene_69fa66d77ede0663_01
  global_id: null
  title: Troi notices Picard’s withdrawal before Galen’s distress call
  description: 'On the *Enterprise* bridge, Picard stands apart from the crew, his
    usual commanding presence muted as Data confirms their arrival time at the Atalia
    system. Troi, attuned to emotional currents, observes his uncharacteristic quietude
    and subtly invites him to the arboretum—a space of intimacy and reflection—both
    as a professional counselor and a concerned friend. Before Picard can respond,
    Worf interrupts with an urgent distress call from Professor Galen, whose transmission
    cuts off abruptly after revealing he is under attack. Picard’s immediate shift
    from personal introspection to decisive action (ordering warp eight to Galen’s
    location) underscores the duality of his crisis: his guilt over Galen’s past and
    the mission’s existential stakes now collide, forcing him to confront his emotional
    withdrawal in real time. The moment bridges Picard’s private vulnerability with
    the mission’s escalating urgency, setting up the race to save Galen and decode
    the DNA message.'
