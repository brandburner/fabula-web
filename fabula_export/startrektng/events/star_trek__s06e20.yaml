- fabula_uuid: act_436816c8289c0c93
  number: 4
  summary: Facing a three-way standoff at Loren Three, Picard convenes a meeting in
    the Observation Lounge with Klingon Captain Nu'Daq and Cardassian Gul Ocett. Initially,
    both alien captains attempt to conceal their true intentions with flimsy excuses.
    Picard cuts through their deception, revealing his knowledge of Galen's research
    and the DNA program, forcing them to acknowledge the situation. He proposes an
    alliance, reasoning that no single party possesses all the necessary fragments.
    Gul Ocett admits to having a sample from Loren Three, while Nu'Daq proudly claims
    the Indri Eight fragment, confirming his ship destroyed the planet's biosphere.
    Picard argues that only through cooperation can they complete the program, dismissing
    their theories of it being a weapon or power source until fully assembled. He
    proposes they combine their fragments on the Enterprise, with all parties observing
    simultaneously to ensure fairness. After some deliberation, both alien captains
    agree to Picard's terms. In the lab, Nu'Daq and Gul Ocett contribute their fragments,
    filling most of the remaining gaps in the program, leaving only one piece missing.
    Picard theorizes the original designers would have made the puzzle solvable, suggesting
    a pattern to the fragments' distribution. Beverly begins programming the computer
    to extrapolate the location of the final missing piece. While waiting, Nu'Daq
    attempts to bribe Data for early access to the results, an attempt Data innocently
    exposes. Geordi discovers Gul Ocett tampering with the Enterprise's defensive
    systems. The computer completes its analysis, projecting a galactic map highlighting
    stars forming the program's design, pointing to the Rahm-Izad system as the location
    of the final fragment. Gul Ocett immediately beams out, and her ships simultaneously
    attack the Enterprise and Klingon vessel, betraying the alliance.
