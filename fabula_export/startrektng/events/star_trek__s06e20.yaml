      velocity and diplomatic clearances—highlighting the practical challenges Picard
      would face if he joined. The shuttle serves as a metaphor for the expedition
      itself: compact, resource-limited, and reliant on the combined talents of its
      crew. Galen’s emphasis on its vulnerabilities (‘a matter of weeks’ with a starship,
      but far longer with the shuttle) creates a sense of urgency and stakes, framing
      the expedition as a test of endurance and commitment. The shuttle’s mention
      is functional but thematically rich, tying Picard’s decision to both logistical
      realities and personal sacrifice.'
