    description_of_involvement: Beverly Crusher’s sampling instrument is used to extract
      a fossilized sample from the seabed, which, when processed with Picard’s computer,
      activates the DNA program and triggers the hologram. The device’s compact design
      allows for discreet operation amid the standoff, enabling the away team to work
      subtly while the factions argue. Its role in uncovering the truth is pivotal,
      as it provides the physical evidence needed to reveal the ancient message.
    status_before_event: Attached to Beverly’s belt, ready for use on the planet surface.
    status_after_event: Used to extract the fossilized sample, which activates the
