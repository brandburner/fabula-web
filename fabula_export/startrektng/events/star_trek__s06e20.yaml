- fabula_uuid: cand_evt_scene_823a7cd79b6d7450_02
  global_id: null
  title: Picard Overrides Starfleet for Galen’s Legacy
  description: "\n  On the *Enterprise* bridge, Picard stares at the unremarkable\
    \ planet Ruah Four, where Galen’s final research trip ended in failure. Data’s\
    \ scans confirm no trace of ancient civilization, leaving Picard visibly frustrated.\
    \ In a moment of quiet realization, Picard reconstructs Galen’s itinerary—Vulcan\
    \ ship to Deep Space Four, Al-Leyan transport to Caere, and finally a shuttle\
    \ to Indri Eight. Despite Data’s report that Indri Eight is an uninhabited L-class\
    \ planet with no signs of life, Picard insists on diverting there, convinced Galen’s\
    \ death and the planet are connected. Riker’s protest about Starfleet’s diplomatic\
    \ obligations and their lateness for the Atalia Seven conference is met with a\
    \ sharp rebuke. Picard’s fixation on Galen’s legacy—now intertwined with his own\
    \ guilt—overrides protocol, setting the *Enterprise* on a course that defies both\
    \ Starfleet’s authority and the looming threat of Klingon and Cardassian interference.\
    \ The crew’s reactions (Riker’s hesitation, Worf’s silent exchange) underscore\
    \ the tension between duty and obsession, while Picard’s exit to the Ready Room\
    \ signals his emotional withdrawal from the crew’s concerns.\n  "
