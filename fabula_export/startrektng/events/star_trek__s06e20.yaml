  object_involvements:
  - object_uuid: ger_object_49e06c6f0254
    description_of_involvement: The *Enterprise*’s forward viewscreen is the primary
      medium through which the crisis unfolds. It displays Galen’s terrified face
      and the interior of his shuttle, making the threat visceral and immediate. The
      screen’s sudden shift from a routine navigational update to a life-or-death
      scenario underscores the abruptness of the event. Worf’s manipulation of the
      controls to display the transmission highlights the screen’s role as a critical
      tool for communication and threat assessment. Its ability to cut to static mid-transmission
      symbolizes the fragility of the situation and the crew’s sudden loss of control
      over the narrative.
    status_before_event: Displaying routine navigational data, including Data’s update
      on the *Enterprise*’s arrival time at the Atalia system.
    status_after_event: Showing static after the transmission is cut off, with the
      crew now focused on locating the shuttle’s origin and setting a course to intercept.
    global_id: ger_object_49e06c6f0254
  - object_uuid: ger_object_40fb28894d67
    description_of_involvement: Galen’s shuttle is the physical manifestation of the
      crisis, serving as both the setting for his distress call and the target of
      the unknown assailants. Its cramped interior, visible on the viewscreen, underscores
      the vulnerability of its occupant. The shuttle’s lack of defensive capabilities
      or diplomatic clearances is implied by the ease with which it is boarded, heightening
      the tension. The transmission from the shuttle is the catalyst that disrupts
      the *Enterprise*’s routine, forcing the crew into action. Its sudden cutoff
      symbolizes the abruptness of the threat and the urgency of the response required.
    status_before_event: Operational but unprotected, en route to an unspecified destination
      in the Atalia system. Galen is aboard, transmitting a distress call as unknown
      forces board the vessel.
    status_after_event: Compromised and potentially disabled, with Galen’s fate uncertain.
      The *Enterprise* is now en route to its last known location at maximum warp.
    global_id: ger_object_40fb28894d67
  - object_uuid: ger_object_f31fc57ff14c
    description_of_involvement: Professor Galen’s distress transmission is the inciting
      incident of the event, serving as both a call to action and a symbol of the
      mission’s escalating stakes. The transmission’s abrupt cutoff—mid-sentence and
      mid-image—creates a sense of unresolved tension, forcing the *Enterprise* crew
      to act without full knowledge of the threat. Galen’s fearful expression and
      the chaotic background of his shuttle interior convey the immediacy of the danger,
      while his truncated plea ("I'm being boarded -") leaves the nature of the assailants
      and their motives ambiguous. This ambiguity heightens the urgency of the response,
      as the crew must act on incomplete information.
    status_before_event: Being transmitted from Galen’s shuttle, with audio and visual
      feeds intact.
    status_after_event: Cut off abruptly, with the transmission blocked by unknown
      forces. The *Enterprise* crew is left with only the last known coordinates of
      the shuttle.
    global_id: ger_object_f31fc57ff14c
