- fabula_uuid: cand_evt_scene_b5e1af6994672462_02
  global_id: null
  title: Ancient Message Reveals Shared Ancestry
  description: "\n  Amid a volatile three-way standoff between Klingons, Cardassians,\
    \ and Romulans over the lichen sample containing the DNA message, Picard and Beverly\
    \ quietly extract a fossilized sample from the planet's surface. While the factions\
    \ argue and threaten each other, Picard activates the ancient program, triggering\
    \ a holographic message from a long-dead humanoid species. The hologram reveals\
    \ that their civilization seeded life across the galaxy, intentionally designing\
    \ humanoid species to resemble their own form. The message emphasizes cooperation\
    \ and shared ancestry, calling for unity among the warring factions. However,\
    \ Nu'Daq's immediate rejection of the message shatters the fragile moment of potential\
    \ understanding, leaving the factions to retreat to their ships without resolution.\
    \ The revelation forces Picard and Beverly to confront the weight of this discovery—both\
    \ scientifically and philosophically—while the political tensions remain unresolved.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e20
  scene_sequence: 33
  sequence_in_scene: 54
  key_dialogue: &id035
  - 'HUMANOID: "You are wondering who we are; why we have done this; how it has come
    that I stand before you, the image of a being from so long ago. Life evolved on
    my planet before all others in this part of the galaxy. We left our world, explored
    the stars, and found none like ourselves. We were alone. Our civilization thrived
    for ages. But what is the life of one race, compared to the vast stretches of
    cosmic time? We knew that someday we would be gone. And that nothing of us would
    survive. So we left you."'
  - 'HUMANOID: "Our scientists seeded the primordial oceans of many worlds, where
    life was in its infancy. These seed codes directed your evolution toward a physical
    form resembling ours—this body you see before you. Which is, of course, shaped
    as yours is shaped. For you are the end result. The seed codes also contained
    this message, which we scattered in fragments on many different worlds. It was
    our hope that you would have to come together in cooperation and fellowship in
    order to activate this message. And if you can see and hear me, our hope has been
    fulfilled."'
  - 'NU''DAQ: "That is all? If she were not dead, I would kill her."'
