  - object_uuid: ger_object_8aa84b4ce73b
    description_of_involvement: The lichen-covered rockface serves as the focal point
      of the standoff, containing the four-billion-year-old DNA message that all factions
      seek. Beverly scans it with her tricorder, confirming the signal, while Gul
      Ocett and the Romulans vie for control. The rockface’s jagged surface, encrusted
      with bright yellow-red-green lichen, symbolizes the ancient past and the potential
      for unity. Its destruction is threatened by Gul Ocett, but the away team’s discreet
      analysis ultimately reveals the truth, making it the narrative heart of the
      event.
    status_before_event: Untouched but targeted by all factions, its lichen holding
