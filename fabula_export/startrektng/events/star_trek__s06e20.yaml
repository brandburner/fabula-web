- fabula_uuid: cand_evt_scene_1049749f87819e53_01
  global_id: null
  title: Picard deduces the DNA pattern
  description: In the Enterprise lab, Picard, Data, Beverly, and their uneasy Klingon
    and Cardassian allies work to reconstruct the ancient DNA program. After combining
    their fragments, only one piece remains missing. Picard theorizes the designers
    embedded a deliberate pattern to guide seekers, suggesting the message was never
    meant to be fully decoded without a specific key or ritual. Beverly is tasked
    with programming the computer to analyze the distribution pattern of the pieces,
    extrapolating the location of the final fragment. The tense collaboration forces
    the rivals to remain aboard the Enterprise while they wait for results, raising
    the stakes as the team races to unlock the truth before their adversaries do.
    Picard’s deduction shifts the mission from brute-force searching to strategic
    analysis, deepening the mystery while escalating the urgency of the quest.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e20
  scene_sequence: 23
  sequence_in_scene: 40
  key_dialogue:
  - 'DATA: ((to Klingon)) Captain.'
  - 'NU''DAQ: Excellent.'
  - 'BEVERLY: There''s still one missing piece...'
  - 'NU''DAQ: Pahk! We have surrendered what we had for nothing.'
  - 'GUL OCETT: You are remarkably short-sighted, Nu''Daq. We are closer to the answer
    than we were.'
  - 'PICARD: This is a... jigsaw puzzle... whose pieces have been scattered across
    the galaxy. Doesn''t it seem reasonable to assume that the original designers
    meant for someone to find this puzzle—why else would they put the pieces in our
    DNA? And doesn''t that in turn suggest that they would try to make it easy for
    us to find all the pieces? That there might be some... pattern to their distribution?'
  - 'PICARD: Doctor, program the computer to analyze the distribution pattern of the
    pieces we have, correcting for changes in star configurations over four billion
    years... and extrapolate for the missing piece.'
