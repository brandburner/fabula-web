    \ civilization on Ruah Four forces him to confront Galen’s final itinerary. His\
    \ recollection of Galen’s uncharted destination—Indri Eight—ignites a new lead,\
    \ despite the planet’s lack of recorded history. Riker’s objection highlights\
    \ the crew’s tension between duty and obsession, but Picard’s insistence on following\
    \ Galen’s path underscores his guilt-driven determination. The Enterprise’s abrupt\
    \ course change to Indri Eight escalates the race against rival factions, framing\
    \ the next critical leg of the quest.\n  "
