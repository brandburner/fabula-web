  key_dialogue:
  - 'GALEN: I made a discovery so profound in its implications that silence seemed
    the wisest course. This... work has occupied my every waking thought, it''s intruded
    upon my dreams. It''s become my life. And when it''s finished, when I announce
    my findings... It will be heard half-way across the galaxy.'
  - 'GALEN: What if you could have helped Schliemann discover the City of Troy? Or
    if you had been with M''Tell as she stepped upon Ya''Seem for the first time?
    How could anything compare?'
  - 'PICARD: May I sleep on it?'
  - 'GALEN: Dream not of today, Mister Picard.'
  - 'PICARD: Dream not of today, Professor.'
