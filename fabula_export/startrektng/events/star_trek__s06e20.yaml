  title: Picard disables Yridian attack to save Galen
  description: "\n  The *Enterprise* detects Professor Galen’s distressed shuttle\
    \ under Yridian attack, prompting Picard to immediately order a rescue. When the\
    \ Yridians ignore hails and fire on the *Enterprise*, Picard retaliates with disabling\
    \ phaser shots, forcing their surrender and freeing Galen’s vessel. The confrontation\
    \ escalates tensions in the galaxy-spanning race for the DNA message’s secrets,\
    \ revealing the Yridians as a new, aggressive obstacle—and Picard’s willingness\
    \ to use force to protect his mentor and the mission’s stakes. The scene underscores\
    \ the high-stakes urgency of the quest, where both adversaries and allies may\
    \ hold critical clues, and forces Picard to weigh the cost of lost intelligence\
    \ against the necessity of self-preservation. Data’s analysis of Galen’s vital\
    \ signs heightens the emotional urgency, while Worf’s tactical readiness and Riker’s\
    \ command of battle stations reinforce the crew’s preparedness for escalating\
    \ conflict.\n  "
