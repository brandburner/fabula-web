- fabula_uuid: cand_evt_scene_a24984895deef00e_01
  global_id: null
  title: Data defeats Nu'Daq in physical and moral tests
  description: "\n  In Ten Forward, Nu'Daq initiates a series of escalating challenges\
    \ to exploit Data's access to the DNA search results. First, he tests Data's physical\
    \ strength through the Klingon ritual B'aht Qul, a test of endurance where the\
    \ Klingon is effortlessly overpowered. When Nu'Daq attempts a dishonorable headbutt,\
    \ Data remains unshaken, explaining his android physiology with clinical detachment.\
    \ Undeterred, Nu'Daq shifts tactics, whispering a bribe offer—implying Data could\
    \ gain favor in the Klingon Empire if he shares the search results early. Data,\
    \ unfazed, calmly exposes the bribery attempt, forcing Nu'Daq to retreat in humiliation.\
    \ The confrontation underscores Data's unassailable integrity and the moral divide\
    \ between the Federation and its adversaries, while reinforcing the stakes of\
    \ the DNA quest. Nu'Daq's failure to corrupt Data highlights the futility of underhanded\
    \ tactics in the face of Picard's mission for truth.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e20
  scene_sequence: 24
  sequence_in_scene: 42
  key_dialogue:
  - |-
    NU'DAQ: Good evening, Commander Data.
    DATA: Hello, Captain.
    NU'DAQ: Is there any word yet on the missing fragment?
    DATA: The computer is processing the data. I will be notified as soon as there is any information.
  - |-
    NU'DAQ: Commander, your reputation for... physical strength is known even in the Klingon Empire.
    DATA: I am familiar with many Klingon rituals -- including the B'aht Qul.
    NU'DAQ: ((counting in Klingon)) Wa'... Cha'... Wej -
    DATA: ((in explanation)) My upper spinal support is a polyalloy designed for extreme stress. My skull is composed of cortenide and duranium.
  - |-
    NU'DAQ: If I were to learn the results of the computer search before the others... It would give the Klingon Empire a strategic advantage.
    DATA: You are attempting to bribe me.
    NU'DAQ: Not at all.
    DATA: You suggested a plan that would work to your advantage, one that I would be capable of executing. You then implied a reward. Clearly -
