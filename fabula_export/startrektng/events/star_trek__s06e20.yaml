      link between the away team and the *Enterprise*, allowing Riker to warn of approaching
      threats and Picard to coordinate the team’s extraction. Its open-channel chirp
      bridges isolated crises, turning alerts into action and ensuring the team’s
      safety amid the volatile standoff. The device symbolizes Starfleet’s operational
      discipline and the away team’s reliance on their ship’s support.
    status_before_event: Attached to Picard’s uniform, inactive but ready for use.
    status_after_event: Used to communicate with Riker, ensuring the away team’s safe
