      \ prompting.\n      "
    active_representation: "\n        **Through Picard’s internalized sense of duty\
      \ and the *Enterprise*’s operational context**. Starfleet is not represented\
      \ by a **spokesman or protocol** in this scene, but rather through **Picard’s\
      \ own voice**—his **conflict, his guilt, and his ultimate loyalty** all reflect\
