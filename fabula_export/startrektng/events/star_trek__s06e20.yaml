  title: Data detects fossilized lichen on dead world
  description: |2-

      On the *Enterprise* bridge, Data’s sensors detect an anomaly—a fossilized lichen colony buried in a long-dead seabed on an otherwise barren planet. The discovery contradicts the planet’s apparent sterility, suggesting a hidden history of life. Riker immediately recognizes the significance, swiftly programming the transporter coordinates to beam down a team. The exchange is efficient but charged with urgency, as the find could hold the final clue to the galaxy’s shared genetic heritage—a prize now contested by rival factions. Data’s clinical observation contrasts with Riker’s decisive action, underscoring the mission’s duality: scientific curiosity and tactical necessity. The beat serves as a catalyst, propelling the plot forward while reinforcing the stakes of the archaeological quest.
