acts:
- fabula_uuid: act_0034f93698b5eaeb
  number: 1
  summary: Captain Picard, engaged in a routine protostar analysis, receives an unexpected
    visit from his former archaeology mentor, Professor Richard Galen. Galen presents
    Picard with an ancient Kurlan figurine, which Picard identifies as a rare artifact
    containing smaller figurines, symbolizing a community of individuals. Galen reveals
    he is on an expedition of profound historical significance and invites Picard
    to join him, an offer that tempts Picard with the archaeological career path he
    once considered. Picard discusses this internal conflict with Beverly, acknowledging
    his passion for the past but reaffirming his commitment to Starfleet. He ultimately
    declines Galen's offer, leading to a bitter confrontation where Galen accuses
    Picard of being a "dilettante" and abandoning him. Galen departs prematurely,
    only to send a distress call shortly after. The Enterprise races to his aid, finding
    his shuttle under attack by a Yridian vessel. Despite the Enterprise's intervention,
    Galen sustains a fatal disruptor hit. Before dying, he expresses regret for his
    harsh words to Picard, leaving Picard with profound guilt and a renewed determination
    to understand Galen's mysterious work.
