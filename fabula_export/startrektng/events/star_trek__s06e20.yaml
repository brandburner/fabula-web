      after the Yridian breach. The computer yields nineteen blocks of raw numbers
      from Galen’s research, which the crew analyzes on the viewscreen. Though the
      data is indecipherable without additional context, its existence—and the Yridians’
      attempted theft—hints at a deeper conspiracy. The computer’s encryption protocol,
      triggered by Galen during the attack, partially protected the files but allowed
      the Yridians to copy some of the number blocks before their deaths. This object
      serves as the linchpin of the scene, driving the crew’s urgency and Picard’s
      decision to redirect the *Enterprise* to Ruah Four.
