  - object_uuid: ger_object_40fb28894d67
    description_of_involvement: Galen’s shuttle is the physical manifestation of the
      crisis, serving as both the setting for his distress call and the target of
      the unknown assailants. Its cramped interior, visible on the viewscreen, underscores
      the vulnerability of its occupant. The shuttle’s lack of defensive capabilities
