      tension between personal connection and professional duty. Though the arboretum
      is never physically entered in this event, its mention creates a subtextual
      layer: a reminder of the emotional lives of the crew and the moments of respite
      that are constantly interrupted by crisis. The location’s lush, calming atmosphere
      is implied but never realized, heightening the sense of loss as the distress
      call derails the opportunity for connection.'
