    power_dynamics: "\n        **Exercising authority over Picard’s personal choices**.\
      \ Starfleet’s **institutional expectations** (loyalty, duty, mission priority)\
      \ **constrain Picard’s freedom**, making Galen’s offer feel like a **forbidden\
      \ temptation**. However, Picard’s **internal struggle** also reveals that Starfleet’s\
      \ **power is consensual**—he **chooses** to uphold its values, even as he **regrets\
      \ the cost**. The organization’s **influence is absolute but subtle**, operating\
      \ through **Picard’s own conscience** rather than overt control.\n      "
    organizational_goals:
    - To **maintain Picard’s loyalty** to the *Enterprise* and its mission, even amid
      personal temptations.
    - To **reinforce the hierarchy of duty over personal desire**, ensuring that Picard’s
      **archaeological passions** do not overshadow his **Starfleet obligations**.
    influence_mechanisms:
