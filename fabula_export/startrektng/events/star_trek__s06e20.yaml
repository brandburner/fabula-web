- fabula_uuid: act_a130da1310c3451e
  number: 2
  summary: 'Following Galen''s death, Picard investigates the Yridian attack, learning
    they attempted to download files from Galen''s computer. Geordi and Data recover
    nineteen encrypted number blocks from the shuttle''s partially reconstructed computer,
    but their meaning remains unknown. Picard speculates the Yridians knew more about
    Galen''s work and might have been delivering the data to another party. Driven
    by a need to understand Galen''s final mission, Picard diverts the Enterprise
    from its diplomatic conference schedule. He instructs Data to analyze Galen''s
    flight logs, which reveal visits to unexplored systems: Ruah Four and Indri Eight.
    The Enterprise travels to Ruah Four, but scans reveal no evidence of ancient civilization,
    leaving Picard frustrated. Recalling Galen''s intended itinerary, Picard then
    orders a course to Indri Eight, despite Riker''s concerns about the diplomatic
    timetable and the planet''s unpromising nature. In his ready room, Picard confides
    in Troi, reiterating his resolve to ensure Galen''s death is not in vain, dismissing
    any suggestion that his pursuit is driven by guilt. As the Enterprise approaches
    Indri Eight, sensors detect severe atmospheric fluctuations. The viewscreen reveals
    the planet''s atmosphere is being consumed by a global plasma reaction, destroying
    all life on its surface, confirming the dangerous nature of Galen''s research
    and the presence of a ruthless competitor.'
