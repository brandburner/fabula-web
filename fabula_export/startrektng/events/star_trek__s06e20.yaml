  title: Yridians breach Galen’s encrypted files
  description: In the Observation Lounge, Picard and the senior staff analyze evidence
    of a Yridian cyber-intrusion into Galen’s encrypted research files, uncovering
    nineteen blocks of raw numbers that the Yridians attempted to extract before their
    deaths. Geordi and Data confirm the Yridians boarded Galen’s shuttle and triggered
    a protective encryption protocol, but some number blocks were likely copied. Picard
    deduces the Yridians were acting as intermediaries for an unseen third party,
    given the absence of transmission logs or vessel traces. This revelation escalates
    the stakes, exposing the vulnerability of the team’s discoveries and hinting at
    a deeper, more insidious conspiracy. The discovery of Galen’s visit to Ruah Four—recorded
    in the shuttle’s flight logs—compels Picard to abandon the diplomatic conference
    and redirect the *Enterprise* toward the system, prioritizing the ancient DNA
    message over Starfleet’s immediate obligations. The scene underscores Picard’s
    obsession with Galen’s legacy and the growing urgency of their mission, while
    also introducing a new layer of adversaries who may already possess critical fragments
    of the puzzle.
