    symbolic_significance: "\n        Represents the intersection of personal health\
      \ and institutional mission. Sickbay is a place of healing, but in this moment,\
      \ it becomes a site of desperation—a microcosm of the crew’s struggle to balance\
      \ routine operations with the urgent, obsessive pursuit of truth. The vestibule,\
