  scene_sequence: 13
  sequence_in_scene: 26
  key_dialogue:
  - 'TROI: What I really meant was -- how''s it going with you?'
  - 'PICARD: If I had only gone with him -'
  - 'TROI: ... You might both be dead. Captain, you can''t start thinking like that.
    You didn''t abandon him. You chose not to abandon a life-long career. It was the
    right decision. And it was in no way responsible for his death.'
  - 'PICARD: I simply will not allow Galen''s death to be in vain. If that means inconveniencing
    a group of squabbling delegates for a few more days, then so be it. The responsibility
    is mine.'
