- fabula_uuid: act_aecbe651920d0ee3
  number: 3
  summary: Orbiting the destroyed Indri Eight, Picard questions why anyone would annihilate
    life on an uninhabited planet. He hypothesizes Galen's number blocks relate to
    organic material, prompting Data to narrow the computer's search parameters to
    the biological database. In the lab, Picard and Beverly anxiously watch as the
    computer successfully matches the number blocks, revealing them to be mathematical
    representations of DNA fragments from nineteen different worlds. Beverly notes
    their similar protein configurations, despite originating from diverse species
    across the quadrant, suggesting a deliberate, unnatural compatibility. They instruct
    the computer to link the fragments, which assemble into a geometric, circuit-like
    pattern. Geordi confirms this is an algorithm, a molecularly coded computer program,
    indicating it was "written" over four billion years ago and incorporated into
    the earliest lifeforms on these planets. The program, however, remains incomplete,
    with several fragments missing. Picard orders DNA samples taken from non-Federation
    crewmembers, hoping to find a match. Meanwhile, Picard remembers Galen's casual
    remark about being "in the neighborhood" of Kurl, leading him to deduce the missing
    fragment might be from Loren Three. As the Enterprise approaches Loren Three,
    Picard anticipates competition. Upon arrival, two Cardassian vessels are already
    in orbit, led by Gul Ocett, who challenges Picard's presence. A Klingon attack
    cruiser then decloaks, hailing both ships, escalating the situation into a three-way
    standoff for the ancient genetic code.
