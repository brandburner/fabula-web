acts:
- fabula_uuid: act_a6ac57c4f9ea1a2f
  number: 1
  summary: The Enterprise responds to a distress call from the freighter Arcos, which
    is orbiting Turkana Four, Tasha Yar's home world. The Arcos explodes, but an escape
    pod is detected heading for the colony. Captain Picard, despite warnings about
    the lawless nature of Turkana Four, dispatches an away team consisting of Riker,
    Data, Worf, and Dr. Crusher to investigate. The team beams down to a bombed-out
    settlement and encounters members of the Coalition, one of the warring factions.
    Their leader, Hayne, informs the Federation officers that the rival Alliance holds
    the missing crewmen for ransom. Hayne attempts to leverage the situation, offering
    assistance in exchange for Starfleet phasers, a proposal Riker immediately rejects,
    recognizing it as a thinly veiled demand. The away team returns to the Enterprise
    to consider their options. Shortly after, Hayne contacts the Enterprise again,
    introducing Ishara Yar, who claims to be Tasha Yar's sister. This revelation stuns
    the bridge crew, fundamentally shifting the dynamics of the mission and introducing
    a deeply personal element to the conflict on Turkana Four.
