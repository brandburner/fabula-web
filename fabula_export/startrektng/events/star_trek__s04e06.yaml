  title: Data admits emotional bond to Ishara
  description: In the Ready Room, Data reports Ishara Yar’s willingness to remove
    her magnetic implant and her desire to join Starfleet, catching Picard and Troi
    off guard. Picard, initially hopeful, questions whether Ishara’s past aligns with
    Starfleet’s values, while Troi senses her divided loyalties. Data defends Ishara’s
    potential, arguing that youthful decisions don’t define a person’s future. When
    Troi probes his strong support, Data hesitates before admitting, ‘I have become
    used to her,’—a rare, vulnerable confession that hints at his growing emotional
    attachment to her. The exchange exposes Data’s internal conflict between logic
    and burgeoning human-like sentiment, while also reinforcing the crew’s lingering
    doubts about Ishara’s trustworthiness. This moment serves as a turning point,
    revealing Data’s unexpected emotional investment and foreshadowing the betrayal
    to come.
