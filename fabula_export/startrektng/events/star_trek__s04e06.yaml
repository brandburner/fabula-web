  global_id: null
  title: Riker orders emergency transporter extraction
  description: Under mounting pressure from the Alliance pursuit and escalating alarms,
    Riker overrides protocol to demand Chief O'Brien beam Ishara out of hostile territory
    immediately. The urgency of his order—delivered while Geordi struggles to repair
    the escape pod’s damaged scanner—underscores the crew’s precarious position and
    the high stakes of Ishara’s potential betrayal. Geordi’s technical difficulties
