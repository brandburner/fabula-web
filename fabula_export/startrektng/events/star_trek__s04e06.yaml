    \ a transport shaft. Ishara interrupts to offer critical knowledge of the tunnels,\
    \ but her magnetic implant—a Coalition relic with a micro-explosive—complicates\
    \ the mission. Data suggests surgical removal, exposing the implant’s emotional\
