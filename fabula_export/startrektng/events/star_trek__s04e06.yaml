  title: Coalition leader’s desperate retreat
  description: The away team’s cautious entry into the tunnel system is abruptly disrupted
    when a group of injured Coalition members—fleeing an unseen but clearly violent
    threat—stumble into their path. Beverly’s instinctive medical intervention exposes
    the team’s presence, forcing a confrontation with the Coalition. The leader’s
    cryptic offer to exchange information for aid is cut short when their proximity
    alarms trigger, revealing the immediate threat of the Alliance. The Coalition’s
    panicked retreat into the tunnels forces the away team into a frantic pursuit,
    escalating the scene’s urgency and deepening the mystery of their true intentions.
    This moment underscores the precarious trust between the Enterprise crew and the
    Coalition while exposing the volatile political landscape of Turkana Four. The
    sudden flight of the Coalition members hints at a larger, unseen danger lurking
    in the shadows, setting up the away team’s next confrontation with Hayne and the
    Alliance.
