  title: Ishara proposes a dangerous diversion
  description: In Engineering, Ishara presents a high-risk plan to exploit her magnetic
    implant as a diversion, triggering defense alarms to create chaos and allow the
    Enterprise crew to rescue the captured crewmen. Riker initially rejects the idea
    due to safety concerns, but Ishara insists on her duty to assist, emphasizing
    the urgency of the situation. Data raises the need for her to be armed, which
    Riker finds troubling. The crew’s distrust of Ishara deepens as Riker decides
    to consult Picard and orders Data to escort her to Dr. Crusher for identity verification,
    marking a shift from cooperation to scrutiny. The tension escalates as Ishara’s
    willingness to take extreme risks contrasts with the crew’s hesitation, highlighting
    the fragile trust between them and the high stakes of the mission.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e06
  scene_sequence: 13
  sequence_in_scene: 30
  key_dialogue:
  - 'ISHARA: Transport me into this corridor. My magnetic implant will set off the
    defense alarms. They''ll think it''s a raid by the Coalition.'
  - 'RIKER: Too dangerous. We''ve seen what those tunnels look like. You could easily
    be cut off from the rest of us.'
  - 'ISHARA: I was ordered to assist you in any way possible. That doesn''t mean ''as
    long as it''s safe, or convenient.'''
  - 'DATA: She would have to be armed, Commander.'
  - 'RIKER: I want to discuss this with the Captain. Mister Data, take Ishara to see
    Doctor Crusher.'
