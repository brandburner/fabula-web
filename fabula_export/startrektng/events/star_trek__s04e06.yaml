    emotional_state: Surface-level indifference masking a deep-seated woundedness,
      with moments of calculated warmth when it serves her immediate goals. Her offer
      of the data chip is a performance—part genuine expertise, part manipulation
      to secure her position aboard the *Enterprise*.
    goals:
    - Position herself as an indispensable asset to the rescue mission to ensure her
      own survival and potential integration into Starfleet
    - Test Data’s (and by extension, Starfleet’s) willingness to trust an outsider
      with critical information
    - Avoid revealing the full extent of her internal conflict or past loyalties
    what_happened: 'Ishara steps off the transporter pad with the controlled wariness
      of someone who has spent a lifetime in hostile environments. Her first words—*''You''re
      not human.''*—are not an accusation but a statement of fact, delivered with
      the same detachment she might use to assess a weapon’s capabilities. When Data
      corrects her assumption about the *Enterprise*’s purpose, her reaction is one
      of mild disinterest, as if the distinction between exploration and war is irrelevant
      to her immediate concerns. The shift in her demeanor is abrupt: she produces
      the data chip with the efficiency of a soldier executing an order, her offer
      to ''fill in the specific details from memory'' framed as a transaction rather
      than an act of goodwill. Her emotional disconnection is palpable, but beneath
      it lies a flicker of vulnerability—something unspoken, perhaps the ghost of
      her sister Tasha or the weight of her own fractured loyalties.'
