  title: Data confronts betrayal’s emotional cost
  description: In the quiet intimacy of Riker’s quarters, Data seeks out his commander
    to process the lingering psychological impact of Ishara Yar’s betrayal. He frames
    his confusion as a 'feedback loop' in his mnemonic network—a disruption of his
    logical frameworks—while Riker validates the android’s disorientation as a universal
    human experience. Their exchange evolves into a philosophical reckoning with trust,
    vulnerability, and the paradox of love as a leap of faith. Riker’s admission that
    'every single time' he trusts, he risks betrayal forces Data to confront the existential
    cost of emotional connection, particularly for an artificial being grappling with
    human-like affection. The scene underscores Data’s evolving capacity for love
    while exposing the fragility of trust, a tension that will shape his future relationships.
    The dialogue’s quiet intensity reveals how betrayal doesn’t just wound—it forces
    a reckoning with the very foundations of connection.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e06
  scene_sequence: 45
  sequence_in_scene: 81
  key_dialogue:
  - 'DATA: Recent events have left me puzzled, Sir. It has been days since Ishara
    left. And yet, my thoughts seem to dwell on her. Almost as if I were experiencing
    a feedback loop in my mnemonic network.'
  - 'RIKER: In every trust is the possibility of betrayal. I don’t think you were
    prepared for that. DATA: Were you prepared? RIKER: I’m not sure anybody ever is.'
  - 'DATA: So, a prerequisite for love is accepting the risk of betrayal. RIKER: That’s
    an interesting point of view, Data. Maybe you’re right.'
