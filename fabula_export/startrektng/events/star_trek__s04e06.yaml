  - character_uuid: ger_agent_866cef9a8deb
    emotional_state: 'A raw, primal fear—this is the first time Ishara has been so
      utterly vulnerable since arriving on the Enterprise. The attack shatters her
      composure, leaving her exposed in a way that mirrors her deeper insecurities:
      her sister’s legacy, her fractured loyalties, and the gnawing sense that she
      doesn’t belong anywhere. There’s a flicker of gratitude toward Riker, but it’s
      buried under the adrenaline and the lingering question: *Was this ambush her
      fault?*'
    goals:
    - Survive the immediate threat and recover her bearings
    - Avoid being left behind or used as leverage by the Alliance
    what_happened: 'Ishara is caught completely off-guard, her implant’s alarm blaring
      too late to warn her of the ambush. The stunstick’s crackling arc hits her like
      a freight train, sending her crashing to the ground, her phaser firing wildly
      as she struggles to recover. Dazed and disoriented, she tries to push herself
      up, her movements sluggish, her breath ragged. Riker’s intervention is her only
      reprieve—she’s barely conscious as he drags her to cover, her body limp with
      shock. Her vulnerability in this moment is palpable: stripped of her usual guardedness,
      she’s reduced to a target, her survival dependent on Riker’s actions.'
