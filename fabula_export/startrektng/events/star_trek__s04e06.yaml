  title: Picard risks warp limits to save Arcos
  description: 'The *Enterprise* crew receives a desperate distress call from the
    *Arcos*, its warp core failing catastrophically. Tan Tsu’s transmission—interrupted
    by explosions—reveals the crew has only minutes before containment breach. Picard,
    weighing the risks of prolonged warp stress against the lives at stake, orders
    the ship to exceed safe limits (9.3 → 9.6), a decision that tests the crew’s loyalty
    and the *Enterprise*’s structural integrity. Data confirms the calculations, while
    the bridge hums with tension as the ship pushes beyond its designed capabilities.
    This moment underscores Picard’s leadership under pressure, his willingness to
    gamble the ship’s safety for a rescue mission, and the crew’s implicit trust in
    his judgment. The stakes are clear: failure means the *Arcos*’s destruction, but
    the risks to the *Enterprise* are equally dire, setting up a high-tension race
    against time.'
