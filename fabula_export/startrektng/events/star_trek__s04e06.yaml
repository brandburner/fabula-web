      honor. His physical presence dominates the corridor, a silent rebuke to her
      moral flexibility, as he escorts her toward the turbolift with the inevitability
      of a judge’s gavel.
    beliefs:
    - Betrayal, even for survival, is an unforgivable violation of a warrior’s code—whether
      Klingon or otherwise.
    - Starfleet’s justice, while more merciful than Klingon law, must still hold individuals
      accountable for their actions, especially when lives are at risk.
    observed_traits:
    - Uncompromising
    - Disgusted
    - Authoritative
    - Emotionally detached (surface-level)
    - Culturally rigid
