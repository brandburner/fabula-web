  title: Arcos warp core breach transmission
  description: "\n  The *Enterprise* bridge erupts into controlled chaos as Tan Tsu’s\
    \ desperate, staticky transmission from the *Arcos* confirms an imminent warp\
    \ core breach. The audio crackles with explosions in the background, underscoring\
    \ the urgency of the situation. Picard, already pushing the ship’s limits, reacts\
    \ instantly—ordering a dangerous warp speed increase (9.6) to reach the stricken\
    \ freighter in time. Data’s calm but precise calculations (seven minutes and fifteen\
    \ seconds to transporter range) contrast with the raw panic in Tsu’s voice, which\
    \ cuts out abruptly mid-sentence. The crew’s collective tension is palpable: Worf’s\
    \ report of the failing transmission, Data’s technical warnings about prolonged\
    \ warp strain, and Picard’s decisive leadership all collide in this high-stakes\
    \ moment. The event serves as a turning point, forcing the *Enterprise* to abandon\
    \ caution and risk structural damage to save lives. Subtextually, it mirrors the\
    \ crew’s emotional investment in Tasha Yar’s past, as Turkana Four looms as both\
    \ a rescue mission and a confrontation with her legacy.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e06
  scene_sequence: 3
  sequence_in_scene: 5
  key_dialogue:
  - 'TAN TSU: Enterprise, this is Tan Tsu, Arcos engineer. Estimate five minutes till
    warp drive containment breach.'
  - 'TAN TSU: Make that three minutes. Thanks for trying, Enterprise...'
  - 'PICARD: Warp nine-point-three, Ensign.'
  - 'PICARD: How much time?'
  - 'DATA: Seven minutes and fifteen seconds will bring us within transporter range.'
  - 'PICARD: Go to warp nine-point-six.'
