    status_before_event: |2-

              Stranded on the surface of Turkana IV, its systems potentially damaged from the crash landing. It is a silent witness to the colony's collapse, a beacon of hope for the Arcos crewmen, and an unknown variable in the away team's calculations. Its exact condition—whether it is intact, compromised, or already compromised by hostile forces—is a mystery that drives the team's sense of urgency.
