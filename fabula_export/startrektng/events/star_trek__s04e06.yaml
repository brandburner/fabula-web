      divisions to surface unfiltered.
    beliefs:
    - Justice must be tempered with the possibility of redemption, but only if the
      individual demonstrates genuine remorse and a commitment to change.
    - The crew’s collective judgment is a valuable barometer for determining an outsider’s
      trustworthiness.
