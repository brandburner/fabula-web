      \ the real danger lies. The organization’s influence is *observational* rather\
      \ than interventionist, setting the stage for the away team’s more hands-on\
      \ approach below. The power dynamic is one of *controlled distance*—Starfleet\
      \ can project its strength, but it cannot (or will not) fully commit to resolving\
      \ the colony’s conflicts.\n      "
