    emotional_state: 'Cold operational focus—this guard is a tool of the Alliance,
      his emotions subsumed by the faction’s brutal code. There’s no malice, only
      the mechanical execution of his role: eliminate threats, enforce control. His
      demeanor shifts to stunned inertia only after Riker’s phaser fire drops him,
      his body going limp mid-swing.'
    goals:
    - Subdue or eliminate Ishara as a perceived threat to the Alliance
    - Maintain control over the corridor, preventing Coalition incursions
    what_happened: 'The Alliance guard strikes first, his stunstick arcing with brutal
      efficiency as he steps from cover. His attack is clinical—no hesitation, no
      dialogue, just the crackling flash of the weapon connecting with Ishara’s ribcage,
      sending her sprawling. He advances for a follow-up strike, his posture aggressive
      and unyielding, but Riker’s phaser blast drops him before he can land the second
      blow. His role in the event is purely antagonistic: a faceless enforcer of the
      Alliance’s dominance, his actions a stark reminder of the colony’s violence.'
