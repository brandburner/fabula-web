- fabula_uuid: act_73de306a5fd74c53
  number: 3
  summary: Back on the Enterprise, Riker explains his risky decision to rescue Ishara,
    admitting his emotional response stemmed from the loss of Tasha Yar under his
    command. Captain Picard cautions Riker against emotional decisions but commends
    his actions. Dr. Crusher confirms Ishara's DNA match, definitively establishing
    her as Tasha's sister. Picard visits Ishara in Sickbay, sharing stories of Tasha's
    bravery and selflessness, attempting to reframe Ishara's perception of her sister.
    Ishara, visibly affected, begins to question her long-held beliefs. Later, working
    with Data, Ishara continues to map the colony's intricate tunnel systems, revealing
    the location of critical fusion generators that power the Alliance's defenses.
    Data, observing Ishara's curiosity about Tasha's past, explains his unique understanding
    of 'friendship' as a pattern of familiarity and anticipated presence, a concept
    that resonates deeply with Ishara as she reflects on her sister's absence. Geordi
    locates the captured crewmen, trapped deep within Alliance territory, necessitating
    a new strategy due to the depth. Data proposes a method to safely remove Ishara's
    magnetic implant, allowing her to guide the away team without triggering alarms.
    Ishara initially hesitates, acknowledging the implant's symbolic importance to
    her identity, but ultimately agrees. She confides in Data her growing disillusionment
    with the colony's violent lifestyle and expresses a desire to join Starfleet,
    finding the prospect of working for a common good 'appealing.' Picard, though
    concerned by Troi's warnings of Ishara's divided loyalties, approves the plan.
    Ishara, visibly distressed, informs Hayne of her decision to stay with Starfleet,
    hinting at the profound internal conflict she experiences as she seemingly embraces
    a new path.
