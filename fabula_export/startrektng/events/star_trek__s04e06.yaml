      The explosions heard in the transmission are physical manifestations of its
      collapse.
    status_after_event: Unknown, but presumed to have breached given the urgency of
      the situation and the abrupt cutoff of the transmission. The *Enterprise*’s
      crew can only hope they reach transporter range in time to save the *Arcos*’s
      crew.
