    emotional_state: "\n        *Professional detachment with underlying tension.*\
      \ Geordi’s exterior is one of calm efficiency, but his internal state is one\
      \ of *focused intensity*. He knows the drilling shaft is the linchpin of the\
      \ rescue, and any miscalculation could doom the away team. His emotional energy\
      \ is channeled entirely into ensuring the depth readings are accurate, with\
      \ no room for error. The confirmation to Picard is not just a technical update—it’s\
      \ a green light for action, and Geordi carries the responsibility of that moment\
      \ with quiet gravity.\n      "
    goals:
    - Provide Picard with an accurate and timely confirmation of the drilling shaft’s
      depth to enable the rescue.
    - Ensure the transporter lock is stable and the away team’s extraction is not
      compromised by technical failures.
    what_happened: "\n        Geordi is hunched slightly over his console, his fingers\
      \ dancing across the controls as he monitors the drilling depth in real-time.\
      \ His voice is steady, almost mechanical, as he calls out the increments—*‘One\
      \ point three… one point four…’*—each number a step closer to the rescue’s feasibility.\
      \ When he reaches 1.6 kilometers, he turns slightly toward Picard, his expression\
      \ neutral but his tone carrying the unspoken weight of the moment: *‘Deep enough\
      \ for transport, Sir.’* There’s no triumph in his voice, only professional confirmation.\
      \ Geordi’s role here is that of the engineer as the voice of reason and precision,\
      \ his work the foundation upon which Picard’s command rests.\n      "
