  title: Alliance delivers hostage ultimatum
  description: The Enterprise senior staff interrogates Ishara Yar about Turkana Four’s
    factional conflict, revealing her complicated past and divided loyalties. Just
    as Ishara begins to explain the planet’s fractured history—including her own decision
    to stay behind with the Coalition while Tasha escaped—the crew receives a chilling
    ultimatum from the Alliance via captured crewman Tan Tsu. The transmission, showing
    Tan Tsu battered and under duress, demands immediate Federation reparations within
    twenty hours or threatens the execution of hostages. The ultimatum forces the
    crew to confront the Alliance’s ruthlessness and the ticking clock of their comrades’
    lives, while Ishara’s admission about her allegiance to the Coalition introduces
    a critical wildcard in the unfolding standoff. The moment escalates the crisis,
    shifting the focus from Ishara’s personal history to the urgent need for a rescue
    mission and exposing the fragility of trust within the crew.
