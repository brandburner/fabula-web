    description_of_involvement: The weapons carried by the Alliance guards—phasers
      and stunsticks—are rendered ineffective during the ambush. The guards never
      draw their weapons, as they are stunned before they can react. Their inert state
      underscores the away team’s precision and the guards’ lack of preparedness.
      The weapons’ presence is a reminder of the potential threat the Alliance poses,
      but in this moment, they are irrelevant to the outcome of the ambush.
    status_before_event: Holstered and unused, as the guards are caught off guard
      by the alarms and the away team’s ambush.
    status_after_event: Still holstered and inert, as the guards are stunned before
      they can draw their weapons. The weapons remain a symbolic threat, but they
      do not factor into the immediate outcome of the event.
    global_id: ger_object_891fecc4c5ac
  - object_uuid: ger_object_65d73f0fa7dd
    description_of_involvement: The Arcos escape pod is the primary objective of the
      away team’s mission. Damaged from its impact on Turkana IV, it requires Geordi’s
      immediate attention to reroute power and gain access. The pod’s condition is
      critical—its functionality will determine whether the team can use it as a tactical
      asset or an escape route. The pod’s presence in the chamber is both a goal and
      a vulnerability, as it draws the Alliance’s attention and creates a focal point
      for the ambush.
    status_before_event: Damaged and inaccessible, its scanner is non-functional,
      and its access panel is sealed. It is guarded by two male Alliance guards, who
      are easily overwhelmed by the away team’s ambush.
    status_after_event: Geordi begins working on the pod, using his toolkit to reroute
      power and gain access. The pod is now under the control of the away team, though
      its full functionality remains uncertain until Geordi completes his repairs.
    global_id: ger_object_65d73f0fa7dd
  - object_uuid: ger_object_66d5a5b28510
    description_of_involvement: The proximity alarms play a crucial role in the ambush,
      creating the distraction that allows the away team to stun the remaining Alliance
      guards. Their sudden blaring offscreen triggers the female guard and reinforcements
      to abandon their post, leaving only two guards behind. The alarms are a tactical
      tool used by Riker to exploit the Alliance’s disorganization, turning their
      own security measures against them. Their effectiveness highlights the team’s
      ability to adapt and improvise in high-pressure situations.
    status_before_event: Active and blaring, drawing the attention of the Alliance
      guards and creating chaos in the chamber.
    status_after_event: The alarms continue to blare, but their immediate impact has
      been achieved—the away team has secured the escape pod, and the guards who were
      lured away remain distracted.
    global_id: ger_object_66d5a5b28510
  - object_uuid: ger_object_94911cebb116
    description_of_involvement: Geordi’s toolkit-sized box of equipment is essential
      to the team’s success in securing the escape pod. He carries it out from cover
      immediately after the ambush, using it to begin repairs on the pod’s access
      panel. The toolkit represents Geordi’s technical expertise and resourcefulness,
