- fabula_uuid: cand_evt_scene_30027b375f421316_02
  global_id: null
  title: Away Team Prepares for High-Risk Rescue
  description: "\n  In the transporter room, Data delivers a grim assessment of Turkana\
    \ Four’s devastated surface settlement and its sprawling underground colonies,\
    \ revealing the scale of destruction and the precarious situation of the captured\
    \ crew. Meanwhile, Riker and O’Brien pinpoint the escape pod’s location beyond\
    \ the colony perimeter, setting the stage for a high-stakes rescue mission. Worf\
    \ voices concerns about the colony’s lawlessness, invoking Tasha Yar’s past warnings\
    \ about rape gangs, but Riker insists Beverly Crusher accompany the team to provide\
    \ immediate medical aid. The tension between caution and duty is palpable as the\
    \ away team prepares to beam down, phasers set to maximum stun, underscoring the\
    \ urgency and danger of their operation. The scene serves as a critical turning\
    \ point, where the crew’s resolve to rescue their people clashes with the very\
    \ real risks of the mission, foreshadowing the betrayal yet to come.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e06
  scene_sequence: 5
  sequence_in_scene: 10
  key_dialogue: &id005
  - 'DATA: The surface settlement appears to be all but destroyed. Sensors show that
    the colonists now live in structures that extend nearly three kilometers beneath
    the city.'
  - 'WORF: ((re: Beverly)) Sir, we can anticipate a violent response to our presence.
    Perhaps the Doctor should wait here for our signal.'
  - 'BEVERLY: ((an edge)) I appreciate the concern. But I think it''s exaggerated.'
  - 'WORF: Doctor, the colony is completely lawless. Lieutenant Yar spoke of rape
    gangs...'
  - 'RIKER: ((a decision)) She''s coming. The Arcos crewmen may require immediate
    medical assistance.'
