- fabula_uuid: cand_evt_scene_30027b375f421316_01
  global_id: null
  title: Away Team Prepares for High-Risk Rescue
  description: "\n  In the transporter room, Picard’s log entry (off-screen) frames\
    \ the mission’s moral dilemma: Turkana Four, a rogue colony with severed Federation\
    \ ties, demands a rescue operation despite its lawless reputation. The away team—Riker,\
    \ Data, Worf, and Beverly—assembles, with Worf voicing concerns about the colony’s\
    \ brutality, referencing Tasha Yar’s past warnings of ‘rape gangs.’ Beverly insists\
    \ on joining, citing the need for immediate medical aid, while Riker overrides\
    \ Worf’s objections, prioritizing the Arcos crewmen’s survival. Data’s sensor\
    \ data reveals the colony’s subterranean infrastructure, hinting at hidden dangers.\
    \ The team’s phasers are set to maximum stun, signaling the mission’s escalating\
    \ stakes. As they dematerialize, the scene underscores the tension between duty\
    \ and personal risk, with Worf’s protective instincts clashing against Riker’s\
    \ decisive leadership. The moment also foreshadows the team’s impending confrontation\
    \ with Ishara’s betrayal and the colony’s volatile factions.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e06
  scene_sequence: 5
  sequence_in_scene: 9
  key_dialogue:
  - 'WORF: ((re: Beverly)) Sir, we can anticipate a violent response to our presence.
    Perhaps the Doctor should wait here for our signal.'
  - 'BEVERLY: ((an edge)) I appreciate the concern. But I think it''s exaggerated.'
  - 'WORF: Doctor, the colony is completely lawless. Lieutenant Yar spoke of rape
    gangs...'
  - 'RIKER: ((a decision)) She''s coming. The Arcos crewmen may require immediate
    medical assistance.'
