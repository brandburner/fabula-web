- fabula_uuid: act_6f23420f0da7b74b
  number: 2
  summary: Following Ishara's revelation, Captain Picard and his senior staff express
    skepticism regarding her identity and Hayne's motives, suspecting a manipulation.
    Despite their reservations, Picard decides to accept Ishara's offer of assistance,
    viewing it as a viable option to rescue the captured crewmen. Ishara beams aboard
    the Enterprise, where she immediately notes Data's android nature and initially
    assumes he is a combat unit. Data, intrigued by her connection to Tasha and her
    stark perspective, escorts her to the Observation Lounge. During their walk, Ishara
    dismisses Tasha's escape from Turkana Four as 'cowardice,' a statement that surprises
    Data and reveals a deep-seated resentment. In the lounge, Ishara offers her DNA
    for verification, which Beverly Crusher accepts. Ishara then provides the crew
    with critical intelligence about the colony's factions and the history of its
    conflict. The mission gains urgency when the Enterprise receives a ransom ultimatum
    from the Alliance via a captured crewman. Ishara proposes a daring plan to infiltrate
    Alliance territory, using her magnetic implant to trigger proximity alarms as
    a diversion. Riker initially hesitates due to the inherent danger to Ishara, but
    ultimately agrees. During the rescue mission, the away team successfully secures
    the crewmen. However, Ishara deviates from the agreed-upon plan, triggering her
    implant and drawing attention, but then running off. Riker, realizing she is in
    danger, breaks away from the primary objective to rescue her from Alliance guards,
    bringing her back to the Enterprise.
