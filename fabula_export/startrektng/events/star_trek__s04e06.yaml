  title: Riker tests Data’s poker intuition
  description: "\n  In Riker’s quarters, a high-stakes poker game between Riker, Data,\
    \ Troi, and Worf escalates into a psychological duel when Riker attempts to outmaneuver\
    \ Data using a card trick. After Data systematically exposes the deception—tracing\
    \ Riker’s thumb placement and deck manipulation—the android wins the pot, proving\
    \ his ability to analyze human behavior and predict deception. The moment underscores\
    \ Data’s evolving capacity to navigate human psychology, even as Picard’s abrupt\
    \ mission update interrupts their rivalry, foreshadowing the crew’s impending\
    \ crisis on Turkana IV. Riker’s playful challenge masks a deeper test of Data’s\
    \ adaptability, while Troi and Worf serve as amused spectators to the unfolding\
    \ mind game. The scene’s tension shifts from camaraderie to foreboding as the\
    \ distress call from Turkana IV disrupts the game, signaling the crew’s transition\
    \ from leisure to mission-critical urgency.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e06
  scene_sequence: 2
  sequence_in_scene: 2
  key_dialogue:
  - 'RIKER: Tell you what. I''ll bet you I can find a card that you bury anywhere
    in this deck. And furthermore, I''ll make you help me do it.'
  - 'DATA: You surreptitiously placed the edge of your left thumb onto the card immediately
    after I inserted it back into the deck. When you divided the deck to reshuffle,
    you kept that card on top. You thus were able to have me either discard or save
    depending on the card''s location, which you followed at each step. Until we were
    left with one—the card I originally chose.'
  - 'PICARD''S COM VOICE: We''ve received a distress call. Changing course to intercept...'
