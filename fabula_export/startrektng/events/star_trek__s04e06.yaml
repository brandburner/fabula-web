  title: Ishara’s hollow confirmation to Hayne
  description: 'In the Observation Lounge, Ishara Yar stands before a viewscreen displaying
    Hayne’s image, her body language betraying the internal conflict beneath her composed
    exterior. Though she delivers the expected confirmation—*It’s working*—her hesitation
    and the unmistakable uncertainty on her face reveal the fracture in her resolve.
    The moment underscores her moral ambiguity: while she outwardly aligns with Hayne’s
