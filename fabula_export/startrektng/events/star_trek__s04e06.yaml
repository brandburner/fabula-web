- fabula_uuid: cand_evt_scene_588d9f5b9dfae165_01
  global_id: null
  title: Ishara’s Pursuit and Geordi’s Repair Crisis
  description: 'The event unfolds in parallel tension: Ishara Yar, her loyalties now
    suspect, flees through the corridors of Turkana Four as her magnetic implant pulses
    ominously, signaling her betrayal to the pursuing Alliance guards. Meanwhile,
    in the escape pod chamber, Geordi La Forge struggles with critical damage to the
    pod’s scanner, delaying repairs and raising the stakes for the rescue mission.
    Riker, aware of the distant alarms, orders O’Brien to beam Ishara out immediately,
    escalating the crew’s distrust of her while Geordi works frantically to reroute
    power. The scene underscores the dual crises—Geordi’s technical failure and Ishara’s
    deception—both of which threaten the mission’s success and deepen the crew’s fractured
    trust. The urgency of the alarms and the fragmented visuals (Ishara’s flight vs.
    Geordi’s repairs) create a sense of simultaneous, escalating chaos, forcing the
    crew to act on incomplete information and divided priorities.'
