  title: Ishara confronts Tasha’s absence through Data
  description: In a moment of quiet vulnerability, Ishara—now dressed in Federation
    attire—guides Data through a detailed schematic of the underground city’s fusion
    sources. Their technical exchange shifts abruptly when Ishara, seemingly against
    her own restraint, asks Data about Tasha’s life on the *Enterprise*. Data’s clinical
    yet poignant explanation of friendship as ‘anticipated sensory input’ forces Ishara
    to confront the emotional void left by her sister’s death. The revelation that
    Data ‘misses’ Tasha’s absence, despite lacking human emotions, triggers Ishara’s
    suppressed grief, marking a turning point in their dynamic. The scene pivots from
    strategic collaboration to raw, shared loss, exposing Ishara’s fragile connection
    to her past and Data’s evolving understanding of human attachment.
