  title: Enterprise responds to Turkana Four distress
  description: 'The USS Enterprise receives a distress call from Turkana Four, Tasha
    Yar’s homeworld, where her estranged sister Ishara is involved in a crisis. The
    crew—led by Riker, Data, and Worf—prepares to respond, with Picard weighing the
    risks of the mission. The scene establishes the emotional stakes of Tasha’s unresolved
    past, the crew’s urgency, and the moral ambiguity of Ishara’s role. Subtextual
    tension arises as the crew debates trust, loyalty, and the potential for betrayal,
    foreshadowing the moral dilemmas they will face on the planet’s surface. The Enterprise’s
    warp-speed journey underscores the urgency of the situation, while the crew’s
    preparations reveal their individual concerns: Riker’s leadership under pressure,
    Data’s analytical detachment, and Worf’s warrior’s skepticism about the mission’s
    dangers. The distress call itself—transmitted by Tan Tsu, a crewman from the freighter
    *Arcos*—hints at the larger conflict unfolding on Turkana Four, where the Coalition
    and Alliance factions are vying for control. This moment serves as both a setup
    for the away team’s mission and a thematic exploration of the cost of trust in
    the face of personal history.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e06
  scene_sequence: 1
  sequence_in_scene: 1
  key_dialogue:
  - 'PICARD: "Mr. Worf, status report on that distress call."'
  - 'RIKER: "Captain, we’re talking about Tasha Yar’s homeworld. If there’s even a
    chance her sister is involved, we can’t ignore it."'
  - 'DATA: "The transmission contains significant interference, but the coordinates
    are clear. The source appears to be a Coalition outpost near the capital city."'
  - 'WORF: "Captain, sending an away team into a warzone without full intelligence
    is reckless. The Klingon High Council would never—"'
  - 'PICARD: "Noted, Mr. Worf. But Starfleet does not turn its back on a distress
    call. Prepare the away team. Mr. Data, you’re with them."'
