  title: Ishara’s betrayal triggers violent pursuit
  description: The away team’s fragile trust in Ishara Yar shatters when she abruptly
    attacks an Alliance guard, triggering a colony-wide alarm. The violent act forces
    Riker to split his forces—Worf and the freed crewmen retreat to the *Enterprise*
    while Riker and Data pursue Ishara alone. Her betrayal exposes her Coalition loyalties,
    directly challenging Data’s emotional programming and escalating the crisis. The
    scene marks a critical fracture in strategy and trust, with Ishara’s actions revealing
    her true allegiance in a moment of high tension. The phaser fire outside the colony
    underscores the escalating danger, while Riker’s split-second decision to divide
    his team reflects the mission’s unraveling.
