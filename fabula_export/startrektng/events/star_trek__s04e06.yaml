  title: Ishara entrusts Data with her implant
  description: In Sickbay, Dr. Crusher confirms Ishara Yar’s full physical recovery
    after removing her magnetic implant, marking her readiness for the Turkana Four
    mission. Ishara, visibly healthier and emotionally vulnerable, expresses gratitude
    to Data for his support during her recovery. The moment takes an unexpected turn
    when she hands Data her implant—a symbolic gesture laden with foreshadowing—telling
    him to keep it 'just in case something goes wrong.' Data’s puzzled reaction underscores
    the tension between Ishara’s outward confidence and her unspoken fears about the
    mission’s dangers. The exchange deepens the crew’s unease about her loyalties
    while positioning Data as an unwilling but pivotal confidant in the unfolding
    crisis. The implant, now in Data’s possession, becomes a tangible symbol of Ishara’s
    fractured trust and the mission’s looming complications.
