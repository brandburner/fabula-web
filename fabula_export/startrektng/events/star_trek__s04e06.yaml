      authority and the away team’s connection to the *Enterprise*. He touches it
      to signal their departure, a gesture that underscores the negotiation’s stakes
      and the crew’s reliance on their ship’s resources. The combadge also serves
      as a reminder of Picard’s leadership and the principles the away team is sworn
      to uphold, even in the face of Hayne’s manipulations. Its activation marks the
      end of the negotiation and the team’s retreat, but it also foreshadows the Coalition’s
      future interest in the *Enterprise*’s technology and capabilities. The combadge
      is a small but significant object, representing both the crew’s power and their
      vulnerability in this hostile environment.
    status_before_event: Pinned to Riker’s uniform, inactive but ready to be activated
      for transport.
    status_after_event: Activated to beam the away team back to the *Enterprise*,
      fulfilling its primary function as a communication and transport device.
