  object_involvements:
  - object_uuid: ger_object_51e0059c7481
    description_of_involvement: The Arcos’ subspace transmitter is the lifeline connecting
      the doomed freighter to the *Enterprise*. Its failing state—crackling with static,
      cutting in and out, and ultimately silencing Tan Tsu mid-sentence—creates a
      sense of desperation and urgency on the bridge. Worf relays the transmission,
      and its fragmented audio (including the haunting ‘Thanks for trying’) serves
      as the emotional and narrative impetus for Picard’s decision to risk the *Enterprise*.
      The transmitter’s role is both functional (conveying critical information) and
      symbolic (representing the thin thread of hope for the Arcos crew).
    status_before_event: Failing and intermittent, with static and explosions disrupting
      the signal. Tan Tsu’s voice is barely audible at times, and the transmission
      cuts out entirely at the end.
    status_after_event: The transmitter is silent, having failed completely after
      Tan Tsu’s final words. Its role in the event is fulfilled, but its failure underscores
      the urgency of the rescue.
    global_id: ger_object_51e0059c7481
  - object_uuid: ger_object_17fec35c84d2
    description_of_involvement: The Arcos’ failing warp core is the ticking time bomb
      that drives the entire event. Its imminent breach—first estimated at five minutes,
      then frantically revised to three—is the catalyst for Picard’s high-stakes decision
      to push the *Enterprise* to warp 9.6. The core’s instability is audible through
      Tan Tsu’s transmission, with explosions interrupting his voice, creating a sense
      of urgency that permeates the bridge. Its role is both a narrative device (forcing
      the crew to act) and a symbolic representation of the fragility of life and
      the consequences of inaction.
    status_before_event: Operational but critically unstable, with containment failing
      and explosions rocking the Arcos freighter. Tan Tsu’s transmission indicates
      it is mere minutes from a catastrophic breach.
    status_after_event: The warp core’s status remains unknown, but the *Enterprise*’s
      desperate sprint to transporter range suggests it has not yet breached—though
      the tension implies it is still a looming threat.
    global_id: ger_object_17fec35c84d2
  - object_uuid: ger_object_987a698e3841
    description_of_involvement: The *Enterprise*’s transporter system is the ultimate
      goal of the crew’s desperate sprint—it is the tool that will (hopefully) save
      the Arcos crew before their warp core breaches. Though not yet activated, its
      presence looms over the event, as Data calculates the time required to reach
      transporter range. The system represents both hope (a chance to rescue the Arcos
      crew) and risk (the strain on the *Enterprise* to get there in time). Its role
      is functional (the means of rescue) and symbolic (the crew’s moral obligation
      to act, despite the dangers).
    status_before_event: Standby mode, not yet activated. The crew is still out of
      transporter range, and Data’s calculations determine how long it will take to
      get there.
    status_after_event: The transporter system remains inactive, but the *Enterprise*
      is now on a trajectory to reach range as quickly as possible. Its activation
      is imminent, pending the crew’s success in navigating the high warp speed.
    global_id: ger_object_987a698e3841
  - object_uuid: ger_object_c6aa9a1fc2f2
    description_of_involvement: The *Enterprise*’s bridge controls are the nerve center
      of the crisis, with Worf operating the comms to relay the Arcos transmission
      and the ensign adjusting warp speed at Picard’s command. The hum of the ship
      and the tactile response of the controls (e.g., the ensign ‘working the controls’)
      create a sense of immediate, high-stakes action. These controls are not just
