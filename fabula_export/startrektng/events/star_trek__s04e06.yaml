  title: Ishara learns Tasha’s death was unjust
  description: In Sickbay, Beverly Crusher collects Ishara’s DNA to confirm her genetic
    link to Tasha Yar, a process Ishara endures with quiet tension. The exchange reveals
    her lingering grief and suspicion, particularly when Data reveals Tasha was killed
    without provocation—a detail that hardens Ishara’s resolve to avoid the same fate.
    The revelation arrives as Riker enters to confirm Ishara’s inclusion in the rescue
    mission, creating a pivotal moment where her distrust of the crew and her own
    vulnerability collide. The scene underscores the emotional weight of Tasha’s legacy
    and the fragile trust between Ishara and the Enterprise crew, setting up her eventual
    betrayal and the crew’s growing paranoia about her motives.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e06
  scene_sequence: 14
  sequence_in_scene: 31
  key_dialogue:
  - 'ISHARA: You have Tasha''s DNA on file?'
  - 'DATA: Tasha exists in our memories as well.'
  - 'ISHARA: How did she die?'
  - 'DATA: Lieutenant Yar was killed on Vagra Two by a malevolent entity... she was
    killed as a demonstration of the creature''s power. Without provocation.'
  - 'ISHARA: That''s not how I intend to die.'
