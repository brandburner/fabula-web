  title: Away team confronts Turkana Four’s ruins
  description: 'The away team materializes in the war-torn ruins of Turkana Four,
    a dystopian cityscape resembling a bombed-out 24th-century South Bronx. The chaotic,
    lawless environment immediately establishes the planet’s brutal reality and the
    mission’s high stakes. The team’s arrival is met with visual and atmospheric cues—crumbling
    infrastructure, scattered debris, and an oppressive sense of danger—that foreshadow
    the moral ambiguity of their encounter with Ishara Yar. The ruins serve as a physical
    manifestation of Tasha Yar’s past, grounding the crew in the harsh conditions
    they must navigate while hinting at the fractured loyalties that will later test
    their trust. The scene’s tension is palpable, as the team’s presence in this hostile
    territory sets the stage for their first critical test: assessing whether Ishara’s
    offer of help is genuine or a trap. The visual and thematic weight of the ruins
    underscores the mission’s urgency and the personal stakes for Riker, who is forced
    to confront Tasha’s legacy in this broken world.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e06
  scene_sequence: 6
  sequence_in_scene: 13
  key_dialogue:
  - 'RIKER: (to the team) "Phasers set to maximum stun. We don’t know what we’re walking
    into, but we know it’s not friendly."'
  - 'TROI: (softly, scanning the area) "This place... it’s not just abandoned. It’s
    haunted. By more than just ghosts."'
  - 'WORF: (gripping his weapon) "A warrior’s code demands we honor the fallen. But
    this... this is no battlefield. It is a graveyard."'
