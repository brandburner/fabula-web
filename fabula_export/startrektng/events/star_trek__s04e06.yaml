  title: Riker splits the team under fire
  description: "\n  In the cramped, high-tension confines of the escape pod, Riker\
    \ makes a decisive tactical call that fractures the team’s cohesion. With the\
    \ transporter blocked and Geordi La Forge’s position vulnerable, Riker orders\
    \ Worf to remain behind—despite the Klingon’s visible reluctance—to protect the\
    \ engineer while he ventures alone into the corridor. The command is delivered\
    \ with clipped urgency, leaving no room for debate, though Worf’s protest ('Commander—')\
    \ hints at deeper unease: a clash between duty and the unspoken bond of their\
    \ shared history. Riker’s departure underscores the mission’s escalating stakes,\
    \ forcing Worf to grapple with the frustration of being sidelined while his commander\
    \ faces unknown dangers ahead. The moment crystallizes the crew’s fractured trust,\
    \ with Riker’s leadership tested by the need to prioritize tactical necessity\
    \ over personal loyalty.\n  "
