  title: Enterprise arrives at destroyed colony
  description: The *Enterprise* arrives in the Turkana system after receiving a distress
    call, only to witness the freighter *Arcos* explode in orbit around Turkana Four.
    Data detects an escape pod heading toward the colony, but repeated hails from
    Picard go unanswered, raising immediate suspicion. Worf confirms the colony’s
    silence, while Data reveals a prior Federation warning that any beaming down would
    result in death. Despite the risks, Picard orders Riker to prepare an away team,
    setting the stage for a dangerous mission tied to Tasha Yar’s past and Ishara’s
    potential betrayal. The scene establishes tension through unanswered communications,
    the colony’s ominous silence, and the crew’s growing unease about the mission’s
    safety.
