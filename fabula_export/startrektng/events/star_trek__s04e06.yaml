      to his faction’s stability and operations.
    - To negotiate from a position of strength, even when his leverage is weak, by
      appealing to the crew’s sense of fairness or exhaustion.
    what_happened: "\n      Hayne appears on the viewscreen, his demeanor shifting\
      \ from defiant to conciliatory as the confrontation unfolds. Initially, he is\
      \ unapologetic, justifying his actions as a ‘calculated risk,’ but his tone\
      \ softens when he checks on Ishara’s well-being. When Picard orders her release,\
