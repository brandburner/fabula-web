  title: Coalition members expose hidden threat
  description: |2

    The away team’s cautious advance through Turkana Four’s tunnel system is abruptly disrupted when a group of injured Coalition members—fleeing an unseen but violent threat—stumble into their path. Beverly’s instinctive medical intervention exposes the team’s presence, forcing a confrontation that reveals the fragility of their assumed safety. The Coalition’s proximity detectors pulse in warning, signaling an approaching enemy, while their leader’s cryptic offer of information in exchange for aid underscores the planet’s volatile political landscape. Riker’s decision to follow them marks a critical shift from passive observation to active engagement, escalating the mission’s stakes and forcing the crew to confront the escalating danger lurking in the tunnels.
