  sequence_in_scene: 48
  key_dialogue:
  - 'ISHARA: Our parents were killed in some crossfire just after I was born. Some
    people took care of us for a few months... Then one day we came home and they
    were gone. So Tasha took care of me. And when I got old enough, I joined the Coalition.'
  - 'ISHARA: I always thought she was weak for doing that... But maybe I was wrong.
    Maybe she made the right choice.'
  - 'ISHARA: To work together for something besides killing... to be close to someone
    without having to protect your back. You''re a perfect example. I hardly even
    know you, Data, but already I completely trust you. I even consider you my friend.'
