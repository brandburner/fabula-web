  title: Data Confronts Ishara’s Sabotage
  description: In a tense standoff outside the overloading fusion generator, Ishara
    Yar—revealed as a Coalition operative—sabotages the Alliance’s defenses to allow
    a Coalition invasion, forcing Data to confront her betrayal. Data, initially puzzled
    by her actions, realizes her deception extended to their entire relationship,
    including her feigned friendship. When he refuses to leave despite the generator’s
    imminent explosion, Ishara threatens to kill him, her phaser set to lethal. Riker’s
    sudden intervention allows Data to stun Ishara, preventing the generator’s destruction
    and exposing her true allegiance. The confrontation leaves Data grappling with
    the emotional weight of betrayal and the fragility of trust, while Riker’s discovery
    of Ishara’s phaser setting underscores the lethal stakes of her deception. The
    scene pivots from rescue to confrontation, forcing the crew to reckon with the
    consequences of misplaced trust and the cost of Ishara’s loyalty to the Coalition.
