  title: Away team establishes covert position
  description: |2-

      The away team—Riker, Data, Worf, and Geordi—materializes in a crumbling tunnel chamber on Turkana Four, immediately taking tactical cover behind a projection near the damaged escape pod. The pod, guarded by three armed Alliance members (two with stunsticks, one with a phaser), becomes the focal point of their covert operation. Riker, assuming command, discreetly signals the *Enterprise* via his insignia, confirming their arrival and position. The scene establishes the team's vulnerability in hostile territory, where stealth is paramount but action looms. The tension between secrecy and the impending rescue mission is palpable, as the team's presence could be detected at any moment by the guards. This moment serves as a critical setup, reinforcing the precarious balance between tactical patience and the urgency of their objective: extracting the captured crewmen without triggering a confrontation. The visual contrast between the team's hidden position and the exposed escape pod underscores the high stakes of their mission.
