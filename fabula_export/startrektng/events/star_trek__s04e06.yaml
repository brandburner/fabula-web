  title: Ishara’s Betrayal and Picard’s Reckoning
  description: "\n  The scene unfolds in orbit around Turkana Four, where the Enterprise\
    \ crew—having just thwarted Ishara’s attempt to sabotage the mission—confronts\
    \ the full weight of her deception. Riker discovers Ishara’s phaser was set to\
    \ kill, confirming her lethal intent, while Picard delivers a sobering admission:\
    \ the crew projected Tasha Yar’s qualities onto Ishara, a misplaced trust that\
    \ now fractures under the weight of her betrayal. The moment is charged with tension\
    \ as Ishara, moments before transport, offers an ambiguous confession—‘I *did*\
    \ like you’—leaving her true motives unresolved and deepening the crew’s grief\
    \ over Tasha. Picard’s decision to transport her away is laced with regret, underscoring\
    \ the cost of idealism in the face of human complexity. The scene serves as both\
    \ a turning point in the crew’s understanding of Ishara and a thematic pivot,\
    \ forcing them to confront the fragility of trust and the lingering shadow of\
    \ Tasha’s legacy.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e06
  scene_sequence: 40
  sequence_in_scene: 73
  key_dialogue:
  - 'RIKER: "She had her phaser set to kill. She wasn’t just trying to stop us—she
    was trying to *end* us."'
  - 'PICARD: "We saw what we wanted to see in her. Tasha’s sister. A chance to redeem
    the past. But Ishara was never Tasha."'
  - 'ISHARA: "I *did* like you. But the Coalition… they gave me a place when no one
    else would."'
