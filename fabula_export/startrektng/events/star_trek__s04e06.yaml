- fabula_uuid: act_3aef1c3be143f23d
  number: 5
  summary: Ishara, with her phaser trained on Data and the fusion generator rapidly
    overloading, reiterates her commitment to the Coalition, stating her willingness
    to die for them. Data, realizing the full extent of her betrayal, questions if
    her friendship with him was merely a calculated part of her deception. Ishara's
    silence confirms his suspicion, revealing her guilt but also her unwavering resolve.
    As the generator's hum intensifies, Ishara desperately urges Data to leave, but
    he refuses, bound by his duty to prevent mass casualties. Riker arrives, distracting
    Ishara, who fires at him, providing Data the critical moment to stun her with
    his phaser. Data then quickly works to stabilize the overloading generator, averting
    the catastrophic explosion. Riker, examining Ishara's phaser, discovers it was
    set to kill, confirming the depth of her deception. Ishara is brought to the Bridge,
    where a palpable coolness from the crew replaces their previous warmth. Picard
    confronts a disappointed Hayne, who demands Ishara's immediate return. Riker angrily
    refutes Hayne's claims of jurisdiction, highlighting the hypocrisy of his violent
    regime. Picard, after a silent exchange with Ishara, orders Data to escort her
    to the transporter room for her return to Turkana Four. The decision surprises
    the crew, but Picard explains his disappointment, acknowledging that the crew,
    including himself, projected Tasha's qualities onto Ishara, seeing 'more than
    what was there.' In the transporter room, Ishara expresses regret, claiming parts
    of their 'friendship' were genuine, but Data, maintaining his android logic, states
    he cannot be emotionally injured. He energizes the transporter, and Ishara dematerializes.
    Later, in Riker's quarters, Data reflects on his confusion and the lingering thoughts
    of Ishara, likening it to a 'feedback loop.' Riker explains the inherent risk
    of betrayal in trust and love, acknowledging that no one is truly prepared for
    such pain. Data, processing this, questions if it is better not to trust, to which
    Riker responds that without trust, there can be no emotional bonds. The episode
    concludes with Data, alone in the corridor, examining Ishara's magnetic implant,
    his face unreadable, left to ponder the complexities of trust, deception, and
    the human condition.
