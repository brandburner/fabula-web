  - object_uuid: ger_object_3c47f8835371
    description_of_involvement: 'Ishara''s magnetic implant is the emotional and tactical
      crux of this event. Embedded beneath her collarbone, it contains a micro-explosive
      that would detonate on contact with air, making its removal a high-stakes proposition.
