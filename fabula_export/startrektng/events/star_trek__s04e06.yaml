  global_id: null
  title: Riker negotiates with Hayne over hostages
  description: "\n  In a tense, makeshift meeting space beneath Turkana Four’s surface,\
    \ Riker and the away team confront Hayne, a charismatic but calculating Coalition\
    \ leader who offers to help rescue the captured Federation crewmen—if the Enterprise\
    \ provides phasers in exchange. Hayne’s proposal is framed as a pragmatic alliance\
    \ to ‘preserve the peace,’ but his dismissive attitude toward Tasha Yar’s violent\
    \ past and his demand for weapons reveal his true motives: maintaining power in\
    \ a fractured city. Riker, sensing deception, deflects with cautious diplomacy,\
    \ accepting a bottle of synthale as a ‘gift’ while Data discreetly scans it for\
    \ tampering. The moment ends with Riker abruptly signaling the *Enterprise* to\
    \ beam the team up, cutting short negotiations to reassess the situation’s risks.\
    \ Hayne’s subsequent order to gather intelligence on the *Enterprise* foreshadows\
    \ his long-term strategic interests, while Riker’s retreat underscores his distrust\
    \ of Hayne’s claims and Ishara’s potential betrayal. The exchange exposes the\
    \ Coalition’s instability and Hayne’s manipulative tactics, setting up future\
    \ conflicts over trust and survival.\n  "
