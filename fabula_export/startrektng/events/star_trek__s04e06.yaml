- fabula_uuid: cand_evt_scene_cdf983b7885103ed_01
  global_id: null
  title: Ishara Yar’s Ambiguous Offer
  description: "\n  The *Enterprise* crew, still processing the Coalition’s violent\
    \ factionalism, receives a transmission from Turkana Four where Hayne introduces\
    \ Ishara Yar—Tasha’s estranged sister—as a potential liaison for rescuing the\
    \ captured crew. The revelation of Ishara’s identity stuns the crew, forcing them\
    \ to confront the blurred lines between ally and adversary. Picard, wary but pragmatic,\
    \ convenes his officers to weigh the risks of trusting Ishara, whose loyalties\
    \ remain ambiguous. Data’s analytical detachment clashes with the emotional weight\
    \ of Tasha’s legacy, while Worf and Riker voice skepticism about Hayne’s motives.\
    \ Despite Troi’s sense of deception and Beverly’s doubts about Ishara’s authenticity,\
    \ Picard ultimately accepts the proposal, committing the *Enterprise* to a high-stakes\
    \ mission with an untested ally. The decision sets the stage for betrayal and\
    \ forces Data to grapple with the complexities of human trust and friendship.\n\
    \  "
