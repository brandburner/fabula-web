- fabula_uuid: cand_evt_scene_639bedeb253edb88_01
  global_id: null
  title: Picard Releases Ishara Despite Crew Opposition
  description: "\n  On the Enterprise bridge, Picard confronts Hayne after Ishara’s\
    \ betrayal is exposed, where Hayne demands her immediate return. The crew—particularly\
    \ Riker—reacts with anger, but Picard, after a silent exchange with Ishara, orders\
    \ Data to escort her to the transporter room for release. The decision shocks\
    \ the crew, who expected retribution. Picard’s action underscores his diplomatic\
    \ pragmatism, acknowledging the crew’s misplaced idealization of Tasha Yar in\
    \ Ishara and the need to prioritize long-term stability over immediate justice.\
    \ The moment tests Data’s loyalty and forces the crew to confront their own biases,\
    \ while Hayne’s gratitude goes unacknowledged, highlighting Picard’s moral authority\
    \ and the cost of his leadership choices.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e06
  scene_sequence: 42
  sequence_in_scene: 76
  key_dialogue:
  - 'PICARD: Your strategy failed.'
  - 'HAYNE: It was a calculated risk. You gave us an opportunity we couldn''t ignore.'
  - 'RIKER: You''re not in a position to dictate to anybody. She attacked two Federation
    officers.'
  - 'PICARD: Commander Data, escort Ishara to the transporter room.'
  - 'RIKER: You''re far more charitable than I would have been, Captain.'
  - 'PICARD: I understand your feelings, Number One. I share them. But perhaps the
    fault lies in ourselves. We were so eager to embrace her. Each of us, myself included,
    wanted to see something of Tasha in her sister. We saw more than what was there.'
