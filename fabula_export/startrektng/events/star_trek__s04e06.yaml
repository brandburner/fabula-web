      in the tunnel intersection reinforces the Coalition’s claim to authority, while
      also highlighting the artificiality of their 'peace'—a truce enforced by proximity
      detectors and brute force rather than genuine cooperation. The schematic becomes
      a silent witness to the negotiation, underscoring the stakes of the hostage
      situation and the away team’s limited understanding of local dynamics.
