  global_id: null
  title: Picard authorizes rescue despite Troi’s warnings
  description: In the Ready Room, Picard deliberates over Ishara Yar’s request to
    leave Turkana IV and join Starfleet, weighing her potential as an officer against
    Troi’s warnings of divided loyalties. Data advocates for the rescue mission, citing
    Ishara’s willingness to cooperate and her rare suitability for Starfleet training,
    while Troi expresses skepticism about her true intentions. Picard ultimately overrules
    his doubts, authorizing the rescue mission to save the captured crew, driven by
    the moral imperative to help and the hope of redeeming another Yar for Starfleet.
    The decision underscores the tension between duty and personal stakes, particularly
    given Tasha Yar’s legacy and the crew’s unresolved grief over her past. Data’s
    admission that he has ‘become used to her’ hints at an unexpected emotional bond,
    complicating his usual logical detachment and foreshadowing the betrayal to come.
