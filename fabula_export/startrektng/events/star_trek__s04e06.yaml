  title: Ishara volunteers a high-risk diversion
  description: In Engineering, Ishara presents a detailed map of Turkana Four’s access
    tunnels to Riker, Data, Geordi, and Worf, demonstrating her tactical expertise.
    When Riker proposes a direct transport insertion, she warns of the Alliance’s
    preparedness, revealing her intimate knowledge of their strategies. Worf suggests
    a diversion, and Geordi proposes photon grenades, but Riker dismisses the plan
    as insufficient. Ishara then volunteers to use her magnetic implant to trigger
    false alarms, creating chaos that would buy the team time. Riker resists, citing
    the danger, but Ishara insists on fulfilling her duty—even if it’s unsafe. Her
    defiance and willingness to risk her life force Riker to confront the crew’s lingering
    distrust of her motives. The tension escalates when Data raises concerns about
    arming her, and Riker ultimately defers to Picard, ordering Data to escort Ishara
    to Crusher for DNA verification. The scene underscores the crew’s fractured trust
    and the mission’s urgency, while Ishara’s boldness challenges Riker’s leadership
    and the team’s assumptions about her loyalty.
