  title: Ishara probes Data about Tasha’s legacy
  description: In the Enterprise’s bridge, Ishara—now dressed in Federation-style
    clothing—works alongside Data to map the underground city of Turkana Four. As
    they refine the schematic, Ishara subtly shifts the conversation from tactical
    details to Tasha Yar’s past, asking Data about her sister’s relationships with
    the crew, particularly Worf and Riker. Data, initially surprised by her curiosity,
    explains Tasha’s closeness to the crew and his own understanding of friendship
    as a pattern of familiarity. Ishara’s questions reveal her unresolved grief and
    curiosity about Tasha’s life, while Data’s clinical yet poignant response forces
    him to confront the emotional weight of her absence. The exchange deepens Ishara’s
    connection to the crew while exposing the fragility of trust between her and Data,
    as her hidden motives and lingering loyalty to the Alliance remain unspoken but
    palpable. The moment serves as a turning point, shifting their dynamic from suspicion
    to a fragile, shared vulnerability rooted in loss.
