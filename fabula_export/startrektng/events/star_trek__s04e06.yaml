  - |-
    DATA: Ishara is willing to have the implant removed.
    PICARD: Very good. You may inform Doctor Crusher.
    DATA: She also expressed a desire to leave the colony. She hopes to apply to the Academy and eventually join Starfleet.
  - |-
    PICARD: Did her sister not come from the very same environment, Sir?
    DATA: I do not know. But I do know that often for humans, decisions made in youth only hold true for youth.
  - |-
    TROI: I get a sense of ambiguity from her. Her loyalties are clearly divided, Captain, no matter what she may say.
    PICARD: Are you suggesting we deny her an escape from this environment, Counselor?
