  - organization_uuid: ger_organization_5f0bc4029287
    description_of_involvement: 'The Coalition is the dominant force in this event,
      using the negotiation as an opportunity to extract phasers and intelligence
      from the away team. Hayne’s charismatic yet manipulative leadership sets the
      tone, while the faction’s collective presence reinforces their territorial control
      and unity. The Coalition’s goals are explicitly stated: to ‘preserve the peace’
      by strengthening their military position against the Alliance, a euphemism for
      their desire to dominate Turkana IV. Their influence mechanisms include psychological
      manipulation (e.g., the mention of Tasha Yar, the stolen synthale), territorial
      displays (e.g., the schematic wall-hanging), and the threat of violence (e.g.,
      the stunstick, the proximity detectors). The organization’s power dynamics are
      those of a guerrilla faction desperate for resources, willing to exploit the
      away team’s trust and emotional vulnerabilities to achieve their objectives.'
    active_representation: Through Hayne’s leadership, the faction’s collective presence,
      and their use of psychological and territorial displays to assert dominance.
    power_dynamics: Exercising authority over the away team through manipulation,
      territorial control, and the threat of violence. Operating under the constraint
      of limited resources but leveraging these constraints to justify their demands.
    organizational_goals:
    - Extract phasers and other technology from the *Enterprise* to strengthen the
      Coalition’s military position against the Alliance.
    - Gather intelligence on the *Enterprise*’s capabilities and weaknesses to prepare
      for future confrontations or negotiations.
    influence_mechanisms:
    - Psychological manipulation, including the mention of Tasha Yar and the stolen
      synthale as ‘gifts.’
    - Territorial displays, such as the schematic wall-hanging and the use of the
      stunstick to trace Coalition-controlled areas.
    - The threat of violence, reinforced by the presence of armed Coalition members
      and the proximity detectors.
    - Exploitation of the away team’s emotional vulnerabilities, particularly their
      ties to Tasha Yar and their desire to rescue the hostages.
    institutional_impact: The Coalition’s actions in this event underscore their desperation
      and opportunism, as well as their willingness to betray trust for short-term
      gains. Their long-term strategy—gathering intelligence on the *Enterprise*—hints
      at a broader ambition to challenge Starfleet’s authority and expand their influence
      beyond Turkana IV.
    internal_dynamics: The faction’s unity and loyalty to Hayne are evident, but there
      is also an underlying tension between their immediate needs (e.g., phasers)
      and their long-term goals (e.g., intelligence gathering). Hayne’s post-negotiation
      order to his second-in-command reflects a hierarchical structure where his word
      is law, but it also suggests internal processes for executing his directives.
    global_id: ger_organization_5f0bc4029287
  - organization_uuid: ger_organization_ce16937bb381
    description_of_involvement: The Alliance is referenced indirectly in this event
      as the Coalition’s rival faction and the captors of the *Enterprise* crew. Hayne’s
      dismissive remarks about the Alliance—calling them ‘good friends’ and implying
