- fabula_uuid: cand_evt_scene_16a44f66e1a56a85_02
  global_id: null
  title: Hayne’s phaser bargain and Tasha’s legacy
  description: In a tense underground meeting, Hayne—leader of the Coalition faction
    on Turkana Four—reveals that the Alliance holds Federation crewmen hostage and
    offers to help rescue them in exchange for phasers. His casual theft of synthale
    and dismissive attitude toward violence ("ancient history") clash with the away
    team’s skepticism, particularly when Data mentions Tasha Yar’s violent past on
    the planet. Hayne’s flippant remark about her death ("That’s as good a way to
    die as any") exposes his indifference to the planet’s unresolved trauma, while
    Riker’s measured response ("We’ll return to the Enterprise and consider your proposal")
    signals his distrust. The scene ends with Hayne ordering research on the *Enterprise*,
    foreshadowing his opportunistic motives and the crew’s misjudgment of local alliances.
    The exchange underscores the fragility of the mission and the lingering weight
    of Tasha’s legacy on Turkana Four’s present instability.
