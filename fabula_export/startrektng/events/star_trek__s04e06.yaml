  title: Riker Approves Ishara’s Mission Role
  description: 'In *Sickbay*, Beverly Crusher completes Ishara Yar’s DNA scan to confirm
    her genetic link to Tasha, while Ishara’s growing unease about her sister’s death—revealed
    by Data as unprovoked and brutal—hardens her resolve. The tension escalates when
    Riker enters with Picard’s approval for Ishara to join the rescue mission, despite
    her ambiguous loyalties. Her quiet, restrained acceptance signals a critical juncture:
    the crew’s desperation to save their captured comrades now hinges on trusting
    an outsider with a fraught past and a simmering grudge. The scene underscores
    the crew’s vulnerability and the high stakes of relying on someone whose motives
    remain unclear, even as Ishara’s own conflicted emotions—grief, defiance, and
    a flicker of curiosity about Starfleet—begin to surface.'
