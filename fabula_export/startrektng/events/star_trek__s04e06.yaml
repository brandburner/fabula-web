  - object_uuid: ger_object_d736a5133309
    description_of_involvement: 'The Coalition’s proximity detectors—diamond-shaped
      devices embedded under the members’ garments near the collarbone—glow orange-yellow
      in foreign territory and pulse when enemies approach. Hayne taps his own detector
      to explain how it warns the Coalition of approaching threats, reinforcing his
      claim that the implants prevent ''serious damage'' between factions. The devices
      serve as both a practical tool for survival and a symbolic representation of
      the fragile peace between the Coalition and the Alliance. Their absence of glowing
      in this scene (as the away team is in Coalition territory) subtly underscores
      the tension: the crew is not yet perceived as a direct threat, but the detectors
      remain a constant, unspoken reminder of the planet’s volatility.'
    status_before_event: Active and functional, embedded in Coalition members’ garments.
      Glowing orange-yellow in foreign territory (e.g., Alliance-controlled areas)
      but inactive in Coalition-controlled spaces like the tunnel intersection.
    status_after_event: Remain active and functional, embedded in Coalition members’
      garments. Their role in the negotiation is to validate Hayne’s claim about the
      limited threat posed by the Alliance, though the away team’s skepticism suggests
      they may not fully trust this 'peacekeeping' mechanism.
    global_id: ger_object_d736a5133309
  - object_uuid: ger_object_20a1c84677e7
    description_of_involvement: 'Hayne’s stunstick—a blunt, nightstick-style weapon—serves
      as a prop to emphasize his authority and the Coalition’s militarized approach
      to ''peacekeeping.'' He grabs it and jabs it at the schematic wall-hanging to
      trace territory lines, demonstrating the Coalition’s control over their side
      of the sunken city. The stunstick symbolizes the faction’s reliance on force
      and intimidation, even in negotiations. Its presence reinforces the away team’s
      unease, as it underscores the Coalition’s willingness to use violence to maintain
      their power. The weapon also functions as a visual metaphor for Hayne’s dual
      role: a charismatic leader who can shift from charm to threat in an instant.'
    status_before_event: Leaning against the crate or wall, within Hayne’s immediate
      reach. It is part of the Coalition’s standard arsenal, used for both defense
      and intimidation.
    status_after_event: Returned to its resting place after Hayne uses it to point
      at the schematic. It remains a visible reminder of the Coalition’s militarized
      culture, though its specific role in this event is ceremonial rather than functional.
    global_id: ger_object_20a1c84677e7
  - object_uuid: ger_object_ad0f756e012d
    description_of_involvement: 'Riker’s combadge is a constant, unspoken reminder
      of the away team’s connection to the *Enterprise* and Starfleet’s authority.
      Though it is not physically interacted with during this event (beyond Riker’s
      implicit reliance on it for transportation), its presence symbolizes the crew’s
      accountability to a higher command structure. When Riker finally touches it
      to beam back to the ship, it marks the end of the negotiation and the crew’s
      temporary submission to Hayne’s terms—at least for now. The combadge also serves
      as a narrative device, reinforcing the away team’s dual role: they are both
      independent actors in the field and extensions of Starfleet’s mission. Its activation
      is a silent but powerful assertion of their allegiance to Picard and the *Enterprise*.'
    status_before_event: Pinned to Riker’s uniform, inactive but ready for use. It
      is a standard-issue Starfleet communication device, symbolizing the crew’s link
      to the ship and their chain of command.
    status_after_event: Activated by Riker to beam the away team back to the *Enterprise*.
      It fulfills its primary function, ensuring the crew’s safe return and reinforcing
      their reliance on Starfleet protocol.
    global_id: ger_object_ad0f756e012d
  - object_uuid: ger_object_7358bde5afc4
    description_of_involvement: The schematic wall-hanging of the sunken pyramid city
      is a critical prop in Hayne’s negotiation, serving as both a strategic tool
      and a visual aid to justify the Coalition’s demands. He uses it to delineate
      territory lines, showing the away team the divided city and the Coalition’s
      control over one half. The map symbolizes the fragile balance of power on Turkana
