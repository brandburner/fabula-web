  key_dialogue: &id031
  - |-
    ISHARA: Where was Tasha's post?
    DATA: The Tactical Station -- where Lieutenant Worf is now.
  - |-
    ISHARA: Did Tasha have many friends here?
    DATA: Yes. She was especially close to Commander Riker and Lieutenant Worf. And to myself.
    ISHARA: Are you able to have friends?
    DATA: Yes.
    ISHARA: But you don't have feelings, do you?
    DATA: Not as such. However, perhaps even among humans, friendship is sometimes less an emotional response, and more a sense of familiarity.
    ISHARA: You can become used to someone.
    DATA: Exactly. As I experience certain sensory input patterns, my mental pathways become accustomed to them. The inputs eventually are anticipated. And even 'missed when absent. When something once expected is no longer there.
    ISHARA: (softly) Like my sister.
    DATA: Yes. Like your sister.
  - |-
    DATA: What is this structure?
    ISHARA: A main fusion source -- there's one next to each of the Alliance headquarters. It powers all their defensive systems.
