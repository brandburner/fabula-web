- fabula_uuid: act_255f30c60e005291
  number: 4
  summary: 'Dr. Crusher successfully removes Ishara''s magnetic implant, marking a
    symbolic break from her past on Turkana Four. Ishara, feeling a profound sense
    of liberation, entrusts the implant to Data, asking him to keep it as a reminder,
    hinting at a premonition of danger. The Enterprise begins drilling a shaft through
    the planet''s bedrock, creating a safe transport path for the away team. Riker,
    Data, Worf, and Ishara beam down into an isolated tunnel. Ishara, now acting as
    the guide, leads them confidently through the Alliance''s territory, asserting
    that security is minimal in this deep section. However, her initial confidence
    wavers as she struggles to navigate the altered tunnels, admitting uncertainty
    about the path. Eventually, she guides them to the chamber holding the captured
    crewmen. Riker, Data, and Worf breach the door and secure Tan Tsu and the other
    crewman. Crucially, Ishara does not enter the chamber with them. Instead, she
    immediately deviates from the mission, deliberately heading towards a different
    objective. She encounters an Alliance guard, blasts him, and the injured guard
    triggers a loud alarm before collapsing. Ishara, despite the alarm, continues
    her rogue mission. Riker, realizing Ishara''s disappearance and the alarm, sends
    Worf and the freed crewmen back to the Enterprise, while he and Data pursue Ishara.
    Data locates Ishara at a room-sized power generator, where she is actively manipulating
    controls to overload it. Data confronts her, puzzled by her actions, and Ishara
    reveals her true, treacherous intention: to disable the Alliance''s defense systems,
    allowing the Coalition''s three thousand troops to invade and destroy the Alliance,
    regardless of the Federation''s involvement or the resulting casualties. She aims
    her phaser at Data, prepared to kill him to complete her plan.'
