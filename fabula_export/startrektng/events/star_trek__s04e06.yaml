- fabula_uuid: cand_evt_scene_469ea731d2259e4a_01
  global_id: null
  title: Riker rescues Ishara under fire
  description: In a chaotic ambush within the Turkana Four corridor, Ishara is violently
    attacked by a guard wielding a stunstick, leaving her stunned and vulnerable.
    As she struggles to recover, Riker intervenes with precise phaser fire, neutralizing
    the immediate threat before two additional guards open fire on him. Riker returns
    fire while dragging the barely conscious Ishara to cover, simultaneously coordinating
    their extraction via his combadge. The scene underscores Riker’s tactical prowess
    and protective instincts, but also highlights the escalating danger of Ishara’s
    divided loyalties—her betrayal now a tangible threat that forces Riker to act
    as both rescuer and potential interrogator. The urgency of the moment, combined
    with the physical brutality of the attack, reinforces the high stakes of the mission
    and the fragility of trust between the crew and Ishara.
