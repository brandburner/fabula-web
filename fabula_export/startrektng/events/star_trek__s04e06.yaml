- fabula_uuid: cand_evt_scene_867358cd70385963_02
  global_id: null
  title: Ishara reveals tunnel expertise
  description: 'In the transporter room, Ishara materializes aboard the *Enterprise*
    and immediately engages Data in a probing exchange about his purpose. Her initial
    assumption—that he is built for combat—exposes her war-focused mindset and the
    disconnect between her expectations and the *Enterprise*’s exploratory mission.
    Data corrects her, subtly asserting the ship’s non-militarized role, which Ishara
    receives with detached indifference. The moment pivots when she abruptly shifts
    focus, offering a data chip containing a general grid of Turkana Four’s tunnel
    systems and claiming she can fill in specifics from memory. This abrupt transition
    underscores her strategic maneuvering: she positions herself as an indispensable
    asset for the rescue mission, forcing Data to weigh her sudden utility against
    lingering suspicions about her loyalties. The exchange reveals Ishara’s tactical
    intelligence and her ability to pivot from confrontation to cooperation, while
    Data’s measured response highlights his role as a neutral but observant arbiter
    of trust. The scene sets up the tension around Ishara’s true motives and the crew’s
    reliance on her expertise, despite unresolved doubts about her allegiance.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e06
  scene_sequence: 10
  sequence_in_scene: 23
  key_dialogue:
  - |-
    ISHARA: Built for fighting... ?
    DATA: On what do you base that assumption?
    ISHARA: A cybernetic device serving on a starship...
  - |-
    DATA: The Enterprise is not a ship of war. It is a ship of exploration.
    ISHARA: The first thing to do is help you map the colony.
    ISHARA: This is a general grid of the tunnel systems. I can fill in the specific details from memory.
