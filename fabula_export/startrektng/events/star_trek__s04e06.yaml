      implant removed,’ framing the act as a necessary step toward her escape from
      Turkana IV and her aspiration to join Starfleet. Picard and Troi, however, interpret
      the implant’s removal as a metaphorical act of escape—one that may or may not
      be sincere. The implant’s presence (or absence) in Ishara’s body is tied to
      her loyalty to the gangs and her potential to betray the *Enterprise-D* crew.
      Its removal is authorized by Picard, but the crew’s decision to proceed with
      the rescue mission, despite Troi’s warnings, sets the stage for the implant’s
      symbolic significance to be tested: will its removal truly signify a break from
      her past, or will it prove to be a hollow gesture?'
