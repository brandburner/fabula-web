  - object_uuid: ger_object_7358bde5afc4
    description_of_involvement: The schematic wall-hanging of the sunken pyramid city
      is a critical visual aid in Hayne’s negotiation. It maps the divided territory
      between the Coalition and the Alliance, with the Coalition controlling the lower
      depths and the Alliance the upper sections. Hayne uses the stunstick to trace
      these lines, emphasizing the Coalition’s claim to authority and the away team’s
      limited options. The schematic is not just a territorial marker but a psychological
      tool, designed to overwhelm the away team with the complexity of the factional
      conflict and the Coalition’s entrenched position. Its presence reinforces the
      idea that the away team is outsiders in a deeply divided and volatile world,
      where their understanding of the landscape is incomplete and their leverage
      limited.
    status_before_event: Hanging on the wall, visible and accessible for Hayne to
      use as a prop during the negotiation.
    status_after_event: Remains on the wall, unchanged, as a permanent reminder of
      the Coalition’s territorial claims and the away team’s outsider status.
    global_id: ger_object_7358bde5afc4
