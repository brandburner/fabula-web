  global_id: null
  title: Ishara tests Data’s emotional limits
  description: 'In a tense, wordless corridor walk, Ishara probes Data’s emotional
    capacity by breaking the silence and demanding engagement. When he responds with
    detached pragmatism—‘What do you wish to talk about?’—she hesitates, her frustration
    palpable. The moment reveals her need for human connection (or at least the illusion
    of it) and Data’s inability to provide it, underscoring the fundamental incompatibility
    between them. This silent standoff, charged with unspoken tension, foreshadows
    Ishara’s later betrayal: her inability to trust Data’s loyalty stems from his
    inability to *feel* loyalty at all. The scene also highlights Data’s struggle
    to navigate human expectations, reinforcing the narrative’s central question—can
    an android truly understand betrayal, or is he doomed to misread its signs?'
