- fabula_uuid: act_dd3aecc06d26edda
  number: 3
  summary: In Sickbay, Geordi's burned hands are being treated. Picard questions how
    the injury occurred, and Beverly explains an energy discharge in the interface
    suit, bypassing safety overrides due to a feedback loop caused by Geordi's strong
    neural response to extremely high tolerance levels. Geordi deduces the heat sensors
    overloaded. Picard, accepting the technical explanation, declares the Raman's
    crew dead and expresses reluctance to risk Geordi further for retrieval. Geordi,
    however, insists on continuing, arguing that retrieving the data would give meaning
    to the lost lives, his urgency driven by his mother's disappearance. Beverly,
    after considering, deems the risk acceptable if input levels are lowered. Picard
    agrees to proceed, instructing Riker to move the probe to the Raman's auxiliary
    control room. Geordi uses his recuperation time to contact his father, Doctor
    La Forge, who is already planning a memorial service for the Hera's crew. Geordi
    vehemently rejects his father's acceptance of his mother's death, insisting on
    hope until "hard evidence" proves otherwise. Later, Geordi visits Data, who is
    studying "empty spaces" in Doosodarian poetry. Data, with his characteristic directness,
    asks if Geordi wishes to be comforted about his mother. Geordi initially denies
    it, but Data's persistence and logical deduction lead Geordi to admit his distress
    and question his sanity for believing his mother is alive. Data acknowledges Geordi's
    sanity but calls his evaluation of information "biased," citing the low probability
    of recovery for ships like the Hera. Geordi, frustrated, apologizes for snapping.
    He confides in Data his fear of not knowing what he will do if his mother is truly
    dead. Back in the lab, Beverly and Data prepare Geordi for re-interfacing, setting
    input levels at fifty-three percent. Geordi, finding the initial view too dark,
    requests more input. As Data increases the gain, Geordi becomes stunned, staring
    straight ahead. The act concludes with the dramatic reveal that Geordi sees his
    mother, Captain Silva La Forge, standing directly in front of him within the auxiliary
    control room.
