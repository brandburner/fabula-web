  object_involvements:
  - object_uuid: ger_object_50ec10f7079e
    description_of_involvement: 'The Raman ship''s tractor beam controls are the *mechanism*
      through which Data attempts to stabilize Geordi''s condition. Physically, they
      are a console of glowing buttons and sliders, but narratively, they represent
      the fragile balance between human life and institutional safety. Data''s adjustment
      of the beam to 80% of tolerance is a technical solution to a medical emergency,
      but it is also a metaphor for the compromises the crew must make: they are using
      a tool designed for shipboard operations to save a life, repurposing technology
      in a way that stretches its intended function. The beam''s power level becomes
      a stand-in for the larger ethical question: how much risk is acceptable when
      a crewmate''s life is on the line?'
    status_before_event: Operational but at a lower power setting, insufficient to
      counteract the neural interface's overload on Geordi's system.
    status_after_event: Temporarily boosted to 80% of tolerance, providing marginal
      stabilization but still operating within a precarious safety margin.
    global_id: ger_object_50ec10f7079e
  - object_uuid: ger_object_f49881aa1a45
    description_of_involvement: 'The experimental neural interface headpiece, though
      not physically present in this beat, looms large as the *cause* of Geordi''s
      distress. Its absence from the scene is a narrative ellipsis—we know it is the
      source of the crisis, the reason Beverly''s vital signs monitor is spiking,
      the reason Data is adjusting the tractor beam at all. The interface is a double-edged
      sword: it is Geordi''s only link to the Raman ship and his missing mother, but
      it is also the instrument of his torment, pushing his body to its limits. In
      this moment, it is the unspoken antagonist, the ''elephant in the room'' that
      everyone is working around, its dangers manifest in Geordi''s implied suffering
      and the urgent need to stabilize him.'
    status_before_event: Attached to Geordi's VISOR terminals, actively overloading
      his neural pathways, causing physical distress (coughing, convulsions) and elevating
      his heart rate to dangerous levels.
    status_after_event: Still active but temporarily mitigated by the tractor beam
      adjustment, though its long-term effects on Geordi remain unresolved.
    global_id: ger_object_f49881aa1a45
