- fabula_uuid: cand_evt_scene_e38a500a16240551_01
  global_id: null
  title: Picard logs Geordi’s medical evacuation
  description: 'Following Geordi La Forge’s traumatic disconnection from the experimental
    neural interface—a crisis triggered by his mother’s unresolved disappearance and
    the alien entity’s manipulation—Captain Picard records a supplemental log entry.
    The log confirms the crew’s immediate removal of Geordi from duty and the *Enterprise*’s
    course correction to Starbase 495 for medical evaluation. This decision underscores
    the mission’s escalating stakes: Geordi’s emotional instability and the entity’s
    influence now threaten both the crew and the ship’s operational integrity. The
    log’s clinical tone contrasts with the underlying tension, signaling Picard’s
    shift from crisis management to long-term crew safety. The event serves as a narrative
    pivot, marking the transition from active rescue to reckoning with the fallout
    of Geordi’s actions and the entity’s lingering threat.'
