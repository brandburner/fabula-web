      casting an eerie glow over the bridge.
    - The distant, muffled sounds of the ship’s systems—sensors, deflector shields,
      and life support—creating a low, rhythmic hum.
    - The occasional flicker of data streams on consoles, reflecting the crew’s ongoing
      scans of the planet’s surface.
    - The absence of natural light, replaced by the artificial illumination of the
      bridge, reinforcing the isolation of the mission.
