    inside the ship. If you want to take a couple of days off, I''ll run the interface.'
  - 'GEORDI: The interface is calibrated specifically for my VISOR inputs. You''d
    need at least ten hours to convert it. Those crewmen down there can''t wait...'
  - 'RIKER: The Hera is reason enough.'
  - 'GEORDI: The Hera is missing. That''s all. Until I hear something more, my mother
    might just as well have taken the crew on an unscheduled holiday.'
