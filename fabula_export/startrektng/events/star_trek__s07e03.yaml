  - 'GEORDI: It''s my fault, sir. Data was just -'
  - 'PICARD: ((interrupting)) I''ll deal with Data at another time. Meanwhile, I''ll
    have to write this incident into your permanent record.'
  - 'PICARD: I''m very sorry you didn''t find your mother.'
  - 'GEORDI: When I was down there... it was so real. It''s funny, but in a way...
    I feel like I got a chance to say goodbye...'
