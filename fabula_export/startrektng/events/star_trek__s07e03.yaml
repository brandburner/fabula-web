      \ those boundaries**. The organization’s **presence is felt through its absence**—no\
      \ senior officer is physically present to **approve or condemn** Geordi’s actions,\
      \ leaving him in a **gray area** between **duty and desperation**. The **memorial\
      \ service** planned for the *Hera*’s crew symbolizes Starfleet’s **official\
      \ acceptance of loss**, which Geordi **rejects**.\n      "
    active_representation: "\n        **Via institutional protocol** (e.g., safety\
      \ overrides, chain of command) and **implied consequences** (e.g., disciplinary\
      \ action for defying orders). Starfleet’s **culture of caution** is **internalized\
      \ by Data**, who struggles to **balance logic with Geordi’s emotional plea**.\n\
      \      "
    power_dynamics: "\n        **Exercising indirect authority**—Geordi’s actions\
