  title: Geordi reassures Silva while testing interface
  description: "\n  In Auxiliary Control, Geordi La Forge confirms the experimental\
    \ neural interface is functioning as he prepares to initiate a warp cascade to\
    \ locate Silva’s missing ship. His technical focus is undercut by a moment of\
    \ personal vulnerability—he apologizes for neglecting her during his last visit,\
    \ promising it won’t happen again. The exchange reveals his guilt over prioritizing\
    \ work over family, while Silva’s measured response (‘You were... too busy with\
    \ work’) underscores their strained dynamic. Data’s warning about neural feedback\
    \ risks lingers in the background, foreshadowing the scene’s dual stakes: the\
    \ mission’s urgency and Geordi’s unresolved emotional debt. The moment bridges\
    \ technical precision and raw human connection, setting up the collision of logic\
    \ and longing that will define the act’s climax.\n  "
