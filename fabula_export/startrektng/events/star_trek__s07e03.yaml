    what_happened: "\n        Geordi sits on the biobed in Sickbay, his hands still\
      \ partially submerged in the blue-glowing burn treatment box, the interface\
      \ suit clinging to his torso like a second skin. His voice is thick with emotion\
      \ as he argues for the Raman retrieval, his body language tense—leaning forward,\
      \ hands gesturing emphatically despite the pain. The sensors on his palms, now\
      \ bandaged, are a visible reminder of the interface’s danger. His plea is personal,\
      \ almost desperate, as he invokes the Raman crew’s sacrifice, his own grief\
      \ over his mother’s disappearance lending urgency to his words.\n      "
