  title: Geordi confronts grief with Data
  description: 'In Data’s quarters, Geordi—emotionally raw after his mother’s disappearance—seeks
    unspoken comfort, only for Data’s blunt inquiry to force him into acknowledging
    his repressed grief. Their exchange begins with Data’s literal-minded poetry analysis
    (a Doosodarian lacuna), which Geordi dismisses as absurd, revealing his defensiveness.
    When Data presses the issue, Geordi snaps, then apologizes, finally admitting
    his fear that his mother is dead. The moment ends with Geordi’s quiet confession—‘If
    she really is dead… I don’t know what I’m going to do’—before he retreats, leaving
    Data to process the limits of his empathy protocols. The scene serves as a turning
    point: Geordi’s refusal to accept his mother’s death (established earlier) collides
    with Data’s logical assessment, forcing Geordi to confront his pain directly for
    the first time. The unresolved tension between hope and reality deepens the narrative’s
    emotional stakes, while Data’s inability to fully comfort Geordi underscores the
    human-machine divide.'
