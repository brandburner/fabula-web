  title: Geordi defies Picard to find his mother
  description: "\n  Geordi La Forge openly defies Captain Picard’s direct order to\
    \ halt the descent of the Raman, driven by his desperate search for his mother’s\
    \ lost ship. Despite Data’s warnings about exceeding the neural interface’s tolerance\
    \ levels and Silva La Forge’s pleas to continue, Geordi pushes forward, convinced\
    \ that stopping will doom his mother and her crew. When Picard orders him to disengage,\
    \ Geordi refuses, arguing that retreat means certain death for the Hera. His scans\
    \ reveal no trace of the ship—only an empty void—before Silva La Forge suddenly\
    \ seizes his head, unleashing a violent energy surge that inflicts excruciating\
    \ pain. The attack exposes her true, malevolent nature, shattering Geordi’s hope\
    \ and revealing the alien entity’s deception. The moment marks a brutal turning\
    \ point: Geordi’s defiance, rooted in love and grief, becomes a catalyst for the\
    \ entity’s violent reveal, forcing the crew to confront a threat far worse than\
    \ they anticipated.\n  "
