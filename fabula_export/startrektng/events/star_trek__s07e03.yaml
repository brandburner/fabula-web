  key_dialogue:
  - 'DATA: I suspected you would decide to operate the interface alone.'
  - 'GEORDI: I can''t just sit back and do nothing when my mother might be down on
    that planet... I''ll have to live with it for the rest of my life... wondering...
    if I left her to die... I couldn''t take that, Data... I couldn''t... That''s
    why I have to do this.'
  - 'DATA: I will monitor the interface and attempt to keep you safe.'
  - 'DATA: However, I have a request. I would ask you to consider the possibility
    that what you see is not real.'
