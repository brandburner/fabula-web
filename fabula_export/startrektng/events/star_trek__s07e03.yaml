  global_id: null
  title: Riker challenges Geordi’s emotional detachment
  description: In Geordi’s quarters, he replays a personal message from his missing
    mother, Silva, pausing it when Riker enters. The message—a lighthearted recording
    from three weeks prior—reveals Silva’s warmth and Geordi’s unresolved guilt over
    not responding. Riker, observing Geordi’s emotional state, offers to take over
    the critical neural interface duties, framing it as an opportunity for Geordi
    to step back and grieve. Geordi initially deflects with technical excuses, insisting
    the interface requires his VISOR calibration, but Riker presses the issue, invoking
    the *Hera*’s disappearance as a valid reason for Geordi to withdraw. Geordi’s
    reaction—defensive, almost hostile—exposes his refusal to acknowledge his grief,
    even as the mission’s urgency demands his full focus. The exchange underscores
    the tension between Geordi’s professional duty and his repressed trauma, with
    Riker serving as a reluctant mirror, forcing Geordi to confront the cost of his
    emotional suppression. The moment hinges on Geordi’s refusal to yield, not just
    to Riker’s offer, but to the vulnerability it represents—a choice that will later
    have consequences when his unresolved pain intersects with the alien entity’s
    desperation.
