      his duty as Chief Engineer and his personal connection to loss.
    - Uncover the cause of the *Raman*'s distress signal by investigating the magnetic
      storage bay, even if it means bending protocol.
    what_happened: Geordi La Forge begins the event by physically removing fallen
      debris to investigate a dead crew member, confirming his death with a clinical
      but empathetic touch. He then deduces the crew's likely refuge in the magnetic
      storage bay and, with Data's assistance, forces open the sealed door using a
      phaser burst. Upon discovering six additional corpses, he is momentarily triumphant
      before the sentient flames erupt, violently attacking him and leaving his palms
      burned. His reactions—shock, pain, and a cry of agony—reveal both his physical
      vulnerability and the emotional toll of the discovery.
