  title: Geordi breaches the Raman’s wreckage
  description: "\n  Under Data’s precise calibration and Beverly’s tense supervision,\
    \ Geordi La Forge interfaces with the experimental probe, his VISOR flickering\
    \ violently as the neural link floods his senses with the Raman’s dying systems.\
    \ The interface overloads his nervous system—his body convulses, veins bulging\
    \ as he fights to maintain focus. Beverly warns of catastrophic feedback, but\
    \ Geordi pushes through, his desperation to uncover his mother’s fate overriding\
    \ all caution. When he finally pinpoints the derelict Raman, he fires his phaser\
    \ at a sealed storage bay, breaching the hull. The sudden decompression exposes\
    \ the ship’s interior, revealing the frozen corpses of the Raman’s crew—including\
    \ a figure in a Starfleet uniform, her face obscured by ice. As Geordi’s phaser\
    \ overheats, the alien entity’s voice whispers through the interface, its tone\
    \ shifting from Silva’s to something inhuman. The discovery confirms the Raman’s\
    \ connection to his mother’s disappearance but leaves her fate—and the entity’s\
    \ true nature—even more enigmatic. The scene ends with Geordi collapsing, his\
    \ VISOR cracked and his hands blistered from the feedback, as Beverly rushes to\
    \ stabilize him. The wreckage holds answers, but at a cost: Geordi’s physical\
    \ and emotional limits are now undeniable.\n  "
