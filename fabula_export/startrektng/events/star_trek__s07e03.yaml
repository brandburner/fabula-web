      and flickering monitors create a sense of controlled urgency, as Beverly and
      Data focus intently on Geordi’s condition. The atmosphere is one of vigilance
      and readiness, with a subtle undercurrent of concern for Geordi’s well-being.
    functional_role: Command and control hub for the rescue mission. The lab is where
