    for launch?"'
  - 'RIKER: "There shouldn’t be a problem going higher—the safety override will kick
    in at ninety-eight percent tolerance and disengage the interface."'
  - 'GEORDI: "We’ve tested the interface at up to seventy percent of tolerance."'
