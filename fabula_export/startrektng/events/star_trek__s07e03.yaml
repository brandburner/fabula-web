  title: Riker challenges Geordi’s denial of grief
  description: In Geordi’s quarters, he replays a three-week-old message from his
    missing mother, Silva, whose playful tone and unanswered attempts to connect with
    him underscore the unresolved pain of her disappearance. The moment is interrupted
    by Riker, who offers to take over the neural interface mission to give Geordi
    space to grieve. Geordi reacts defensively, insisting his expertise is irreplaceable
    and dismissing the Hera’s disappearance as ambiguous—‘might just as well have
    taken the crew on an unscheduled holiday’—while his body language (standing abruptly,
    avoiding eye contact) betrays his emotional fragility. Riker’s concern (‘The Hera
    is reason enough’) goes unacknowledged, revealing Geordi’s refusal to confront
    his grief, even as the mission’s stakes rise. The exchange exposes the tension
    between duty and emotional survival, foreshadowing Geordi’s later irrational insistence
    that his mother is alive despite all evidence to the contrary. The scene functions
    as a turning point, where Geordi’s professional composure cracks under the weight
    of unprocessed loss, raising questions about his ability to lead the away team
    effectively.
