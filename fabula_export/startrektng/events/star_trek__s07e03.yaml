    \ Geordi lies in Sickbay, physically and emotionally drained. Beverly Crusher,\
    \ monitoring his condition, assumes he’ll now rest—but Geordi’s hollow compliance\
    \ masks deeper resistance. His terse reply, *‘There’s something I need to do anyway,’*\
    \ signals his refusal to process the trauma, instead redirecting his focus toward\
    \ the unresolved mystery of his mother. The exchange underscores his emotional\
    \ detachment: while his body demands recovery, his mind is already fixated on\
    \ the next step in his obsessive pursuit of answers. This moment foreshadows his\
    \ self-destructive trajectory, where grief and guilt will override his well-being,\
    \ setting up future conflicts with Starfleet protocol and his own limits.\n  "
