- fabula_uuid: act_800a3b3edaae5148
  number: 5
  summary: Geordi, as the probe, stands in Auxiliary Control, calling for his "Mom."
    Silva La Forge appears, confirming she is not physically present but on her ship
    on the surface, pulled in by a warp funnel. Geordi, validated, believes his theory
    is correct. She explains they communicate via a subspace signal. Data, monitoring
    from the lab, notes unusual subspace energy readings, lending credibility to Geordi's
    claims. Geordi proposes an inverse warp cascade to reverse the funnel and return
    the Hera to its origin. Data warns of increasing atmospheric turbulence and the
    risk of destruction, but Geordi insists he must try. As he begins the descent,
    Silva expresses gratitude. Geordi, puzzled by her use of "home," notices his vision
    fading as the probe descends out of range. He demands Data increase the input
    gain, even beyond tolerance, to maintain connection, citing the Hera's three hundred
    crew members. Data reluctantly agrees, warning of neural shock if the input is
    not gradually lowered upon disconnection. Geordi continues his descent, apologizing
    to his "mother" for not seeing her earlier. On the Bridge, Worf reports the Raman's
    descent. Data warns Geordi he will reach one hundred percent tolerance before
    reaching the Hera. Geordi insists on going beyond tolerance, forcing Data to disengage
    safety systems and go to full tolerance. Picard orders Geordi to stop and disengage,
    but Geordi refuses, citing his mother's life. He scans for the Hera but finds
    nothing. Silva, now fearful, grabs Geordi's head, and energy tendrils arc from
    her hands, causing him immense pain as his neural synapses overload. In the lab,
    Beverly confirms Geordi cannot survive this. Data, hearing Geordi's plea to reverse
    tractors, complies. Silva is repelled from Geordi, transforming into a flame,
    then back to her form. Geordi realizes she is an alien entity. He explains to
    Picard that subspace beings, accidentally trapped by the Raman, communicated by
    accessing thoughts, inadvertently killing the crew, and took his mother's form
    to persuade him to return them to the lower atmosphere. The Raman jolts violently,
    systems overload, and shields fail. Silva, as a flame, moves through the bulkhead,
    disappearing. As the Raman explodes, Geordi's link is severed. In the lab, Beverly
    switches inputs, feeding Geordi's neural receptors recorded sensory data to simulate
    a controlled disconnection. Geordi's face relaxes, and Beverly confirms his vital
    signs are stabilizing. Later, in Picard's Ready Room, Picard reprimands Geordi
    for disobeying orders and endangering himself, noting it in his record. He then
    expresses sympathy for Geordi's loss. Geordi, though accepting his mother is likely
    lost, finds a sense of closure from the intensely real, albeit hallucinatory,
    experience of saying goodbye.
