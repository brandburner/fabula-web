    TROI: That's not what I asked.
  - |-
    TROI: You're very worried about the disappearance of your mother... and guilty over not seeing her when you had the chance. So you're unwilling even to consider that she might be dead. This need to believe she's alive is so strong, it manifested itself as a physical image.
    GEORDI: But she told me she's trapped on the planet! She's in danger! If this was some kind of wish fulfillment, don't you think I'd fantasize her being safe and sound?
    TROI: No. Because that would end the fantasy -- you'd know it wasn't true. The more involved and complicated and unending your story is, the longer you can believe your mother is still alive.
  - 'GEORDI: That''s your theory, Counselor. I''ve got a different one.'
