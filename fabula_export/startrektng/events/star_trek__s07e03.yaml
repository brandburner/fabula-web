  title: Geordi Rejects Troi’s Grief Theory
  description: In Troi’s office, Geordi La Forge resists emotional confrontation,
    initially deflecting her questions about his mother with professional detachment.
    When Troi presses him to describe Silva, he idealizes her—brilliant, perceptive,
    a "good judge of character"—before his voice cracks as he admits he ignored her
    last request to meet. His guilt over not making time for her surfaces, but he
    lashes out when Troi suggests his visions of her are a psychological coping mechanism.
    Geordi dismisses her theory, insisting his mother’s distress is real, and storms
    out, leaving Troi visibly concerned. The exchange exposes his unresolved grief
    and his refusal to accept her loss, foreshadowing how his denial will clash with
    the mission’s demands and the alien entity’s plea for connection. The scene pivots
    from clinical counseling to raw emotional conflict, revealing Geordi’s vulnerability
    beneath his engineer’s pragmatism.
