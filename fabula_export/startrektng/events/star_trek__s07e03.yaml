acts:
- fabula_uuid: act_2bac289c39099366
  number: 0
  summary: 'The teaser opens with Geordi La Forge, without his VISOR, rushing through
    a smoke-filled Jefferies tube during a Red Alert. He identifies hazardous gases
    and heat, eventually locating a fire. Despite Riker''s caution, Geordi plunges
    into the blaze, activating an emergency suppression system that extinguishes the
    fire. This intense sequence is revealed to be a simulation: Geordi is in the lab,
    connected to an experimental neural interface unit, wearing a body-suit with blinking
    nodes. Data monitors the unit, Beverly Crusher studies the console, and Riker
    observes. Beverly notes Geordi''s vital functions are normal, and Data confirms
    the interface operates within parameters. Geordi explains his coughing was a psychosomatic
    response, feeling truly present in the simulation. Beverly highlights the interface''s
    perfection for Geordi, as his VISOR inputs directly transmit information to his
    cerebral cortex. Riker plans to move the probe to the launch bay. Geordi experiences
    a momentary control issue with his left leg, which Data corrects by increasing
    tactile sensor input. Riker questions the body-suit''s purpose, learning it provides
    tactile sensations. As Geordi virtually exits the Jefferies tube, he sees his
    reflection in a glass panel, realizing he sees the probe—a metallic cylinder with
    sweeping force beams—not himself, and makes a wry comment about his "handsomeness."
    This sequence establishes the interface''s immersive capabilities and Geordi''s
    unique connection to it, setting the stage for its critical role in the narrative.'
