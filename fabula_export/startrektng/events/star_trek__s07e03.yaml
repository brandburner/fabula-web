  title: Geordi confronts grief with Data
  description: In Data’s quarters, Geordi—visibly unsettled—seeks out his friend under
    the pretense of casual conversation, only to reveal his unspoken anguish over
    his mother’s disappearance. Data, initially studying poetry’s empty spaces, shifts
    to bluntly addressing Geordi’s emotional state, forcing him to confront his denial.
    Geordi’s frustration erupts when Data’s logic clashes with his desperate hope,
    but the moment softens as Geordi admits his fear of losing his mother. The exchange
    ends with a silent, wordless gesture—Geordi’s hand on Data’s shoulder—acknowledging
    their bond beyond logic. This scene deepens Geordi’s vulnerability and Data’s
    evolving understanding of human grief, while reinforcing their unspoken trust.
