  object_involvements:
  - object_uuid: ger_object_262f90264dbe
    description_of_involvement: 'Geordi''s VISOR serves as the critical link between
      his mind and the neural interface, transmitting the colored imagery of the stricken
      ship''s corridor and the toxic gases. When Geordi removes it briefly (implied
      by the interface''s direct cortical connection), the VISOR''s absence allows
      the interface to flood his senses unfiltered, heightening his exhilaration and
      physical strain. The VISOR''s biotechnological design ensures the interface''s
      signals are precise, but its direct link to his nervous system also makes him
      vulnerable to overload. As Beverly warns, the VISOR''s role is dual: it enables
      the mission but also exposes Geordi to its dangers.'
    status_before_event: Securely strapped over Geordi's eyes in the lab, fully integrated
      with the neural interface and displaying black-and-white imagery before the
      signal strength increases.
    status_after_event: Fully engaged with the interface, transmitting vivid colored
      data but also contributing to Geordi's rising heart rate and physical distress.
      The VISOR remains functional but is a point of concern for Beverly.
    global_id: ger_object_262f90264dbe
  - object_uuid: ger_object_50ec10f7079e
    description_of_involvement: The Enterprise's tractor beams are the critical tool
      for freeing the trapped crew member, but their power must be increased by Geordi's
      urgent request. As he struggles to lift the collapsed bulkhead manually, he
      realizes the beams' standard setting is insufficient. His call for 'more power'
      transforms the tractor beams from a passive tool into an active lifeline, directly
      tied to the crew member's survival. The beams' ability to cut through the toxic
      atmosphere and lift debris symbolizes the fusion of technology and human determination
      in the rescue effort.
    status_before_event: Operational but set at standard power levels, insufficient
      to lift the heavy bulkhead debris.
    status_after_event: Boosted to higher power on Geordi's command, now capable of
      lifting the debris and freeing the trapped crew member (though the outcome is
      not shown in this event).
    global_id: ger_object_50ec10f7079e
  - object_uuid: ger_object_674353f1ce28
    description_of_involvement: Geordi's lab vital signs monitor becomes a battleground
      between Beverly's medical authority and Geordi's determination. The monitor
      displays his climbing heart rate, respiratory patterns, and neural activity
      in real time, serving as a visual representation of the interface's physical
      toll. Beverly's hand hovers over the console, ready to disconnect Geordi if
      his vitals cross a critical threshold. The monitor's beeping and scrolling data
      create a sense of urgency, underscoring the high stakes of the rescue and the
      personal cost Geordi is willing to pay.
    status_before_event: Stable readings, with Geordi's vitals within normal ranges
