- fabula_uuid: act_6c9ba1c894d017b2
  number: 4
  summary: Geordi, stunned, barely whispers "Mom," confirming his vision to Data and
    Beverly, who are monitoring him from the lab. His "mother," Silva La Forge, initially
    seems confused, then confirms her identity. Geordi explains he is on the Enterprise,
    interfaced with the probe. Silva urgently states they must "go down" to the "surface"
    because "we're dying." Geordi, puzzled, asks if "we" refers to the Hera, believing
    his mother's ship is on the planet's surface. Beverly, hearing only Geordi's side
    of the conversation, attempts to disconnect him, but Geordi insists she wait.
    Silva pleads for his help, and as Geordi reaches out to her, a violent shocking
    arc occurs, causing him to cry out in pain. The safety cut-off disengages the
    interface, and Geordi loses consciousness from neural shock. In Sickbay, Geordi
    recovers, though shaken. Beverly assures Picard there is no permanent damage but
    advises against further exposure to such stimulus. Picard asks about the hallucination's
    cause, but Geordi vehemently denies it was a hallucination. Data presents probe
    sensor logs, showing no human presence on the Raman. Geordi hypothesizes his mother's
    ship is on the surface and she contacted him via a unique transmission only he,
    through the probe, could detect. Data concedes the probe allows Geordi to sense
    unusual phenomena. Beverly explains the brain interprets incomprehensible sensory
    input as best it can, sometimes visually, which Geordi misinterprets as validation.
    Beverly gently clarifies this doesn't confirm his mother's communication. Geordi,
    frustrated, insists his mother's ship is trapped. Picard questions the Hera's
    presence given its last known location and Data highlights the impossibility of
    a ship surviving the atmospheric pressure. Picard denies Geordi permission to
    re-interface, ordering Data to find an alternate plan to salvage the Raman within
    two hours, and directs Geordi to speak with Counselor Troi. In Troi's office,
    Geordi, impatient, initially resists discussing his childhood but describes his
    mother as brilliant, funny, and perceptive. He expresses regret for not seeing
    her three weeks prior when they had the chance. Troi theorizes Geordi's intense
    need to believe his mother is alive, fueled by guilt, manifested as a physical
    image, and that the fantasy must be complicated to sustain belief. Geordi rejects
    this, arguing a wish fulfillment would show her safe. In the Obs Lounge, Data
    presents a plan to use shuttles and tractor beams to retrieve the Raman. Geordi
    interrupts, proposing his theory of a subspace funnel, caused by experimental
    warp drive modifications on the Hera, bringing his mother's ship to Marijne Seven.
    Data confirms the possibility of subspace deformations but deems it "nearly impossible."
    Picard rejects Geordi's hypothesis and orders the shuttle plan. Picard then privately
    tells Geordi he cannot risk his safety on a "dubious hypothesis." Geordi, appearing
    to give up, then resolves to act independently. In the lab, Geordi prepares the
    interface alone. Data enters, having predicted Geordi's defiance. Geordi confesses
    his anguish at the thought of leaving his mother to die. Data, swayed by Geordi's
    emotional plea, agrees to monitor the interface, rationalizing that he cannot
    confine Geordi for something he hasn't yet done. Geordi, touched, puts on the
    interface unit, promising Data he will consider the possibility that what he sees
    is not real.
