  key_dialogue: &id019
  - 'DATA: "Geordi, your physiological responses indicate extreme distress. Your refusal
    to acknowledge your mother’s death is impairing your judgment."'
  - 'GEORDI: "I don’t need a lecture, Data. I need to find her. If there’s even a
    chance—"'
  - 'BEVERLY: "Geordi, we’re adjusting the interface parameters to reduce neural feedback.
    But you have to promise me—if it gets too intense, you pull out."'
  - 'GEORDI: "I can handle it. I have to."'
