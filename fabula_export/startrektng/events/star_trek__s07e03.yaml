- fabula_uuid: cand_evt_scene_236c14b6b5b80ddb_01
  global_id: null
  title: Picard delivers news of Geordi's mother's disappearance
  description: "\n  In the lab, Geordi La Forge is deeply focused on the experimental\
    \ neural interface, working alongside Data to refine its functionality. The scene\
    \ shifts abruptly when Captain Picard enters, his demeanor immediately signaling\
    \ gravity. After dismissing Data with quiet formality, Picard delivers the devastating\
    \ news: the *Hera*—Captain Silva La Forge’s ship—has vanished without explanation,\
    \ along with its entire crew. Geordi’s initial shock gives way to a hollow confirmation\
    \ of what he already fears: his mother is gone. The revelation fractures his professional\
    \ composure, leaving him visibly shaken. Picard’s measured delivery contrasts\
    \ with Geordi’s unspoken devastation, marking a turning point where personal grief\
    \ collides with the mission’s escalating stakes. The moment forces Geordi to confront\
    \ the fragility of hope and the weight of unresolved loss, while also setting\
    \ up his subsequent defiance of Starfleet protocols in pursuit of answers.\n  "
