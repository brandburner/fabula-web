    emotional_state: A storm of anguish and guilt, barely contained by a thin veneer
      of resolve. His fear of failure and abandonment is palpable, driving him to
      defy authority despite the risks.
    goals:
    - To locate his missing mother, Silva La Forge, using the neural interface, regardless
      of the personal or professional consequences.
    - To prove to himself that he did everything possible to save her, alleviating
      the guilt he fears would haunt him for the rest of his life.
    what_happened: Geordi La Forge is caught in the act of defying orders, wearing
      the interface suit and preparing the neural interface alone. His initial surprise
      at Data’s entrance quickly gives way to an emotional outburst as he vocalizes
      his crippling fear of abandoning his mother. He turns away, overwhelmed, before
      steeling himself to continue setting up the interface despite Data’s threats.
      His physical state—clenched fists, trembling voice, and the raw anguish in his
      eyes—reveals the depth of his desperation. Ultimately, he accepts Data’s compromise,
      removing his VISOR and preparing to activate the interface, his resolve hardened
      by the need to act.
