  title: Geordi discovers trapped Raman crew
  description: "\n  Geordi La Forge, interfaced with the Raman’s failing systems via\
    \ the experimental neural probe, navigates the ship’s collapsing corridors in\
    \ a desperate search for survivors. His VISOR’s black-and-white vision suddenly\
    \ floods with color as the interface stabilizes, revealing the severity of the\
    \ hull breach and toxic atmospheric buildup—methane and ammonia—escalating toward\
    \ the Bridge. His urgency spikes when he rounds a corner and finds a crew member\
    \ pinned beneath a collapsed bulkhead. The discovery forces Geordi to prioritize\
    \ an immediate rescue over his own physical strain (his heart rate already elevated)\
    \ and the mission’s broader objectives. The moment becomes a turning point: his\
    \ emotional investment in the Raman’s crew mirrors his unresolved grief over his\
    \ mother’s disappearance, blurring the line between duty and personal desperation.\
    \ The trapped crew member’s survival now hinges on Geordi’s ability to coordinate\
    \ a tractor beam rescue *before* the ship’s collapse buries the truth—about the\
    \ Raman *and* his mother—forever.\n  "
