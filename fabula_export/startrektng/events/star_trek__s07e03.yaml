  title: Geordi confronts spectral Silva amid ship crisis
  description: "\n  In the midst of a violent systems failure aboard the *Enterprise*,\
    \ Geordi La Forge fights to stabilize the ship as consoles erupt in sparks and\
    \ the vessel lurches unpredictably. His focus is shattered when Silva La Forge—his\
    \ presumed-dead mother—materializes before him, offering cryptic reassurance ('We're\
    \ safe now...') before dissolving into spectral flame. The encounter is emotionally\
    \ charged: Silva's presence is both tender and unsettling, her form flickering\
    \ between maternal familiarity and alien otherness. Geordi's stunned silence and\
    \ the ship's escalating chaos underscore the dual crises—technical and psychological—converging\
    \ on him. The moment forces him to confront the blurred boundary between grief,\
    \ memory, and the unknown entity impersonating his mother, while the ship's failing\
    \ systems heighten the stakes of his distraction. The event serves as a turning\
    \ point, where personal trauma and professional duty collide, leaving Geordi emotionally\
    \ compromised and the *Enterprise* teetering on the brink of catastrophe.\n  "
