- fabula_uuid: act_1b38a6422be8d569
  number: 2
  summary: Geordi watches a recorded message from his mother, Captain Silva La Forge,
    on his monitor, smiling sadly at her affectionate teasing. He quietly corrects
    her, "Your only son, Mom," highlighting his deep bond and current grief. Silva
    discusses her ship, the Hera, and a new chief engineer, then playfully attempts
    to set Geordi up with her. The message concludes with a reminder about his father's
    surprise birthday party. Geordi tells Riker the message arrived three weeks prior
    and he never responded, expressing regret. Riker informs Geordi the probe has
    entered the planet's atmosphere and offers to run the interface, sensing Geordi's
    emotional distress. Geordi refuses, citing the interface's calibration to his
    VISOR and the urgency of the Raman crew's situation. Riker argues the Hera's disappearance
    is reason enough to take time off, but Geordi vehemently denies his mother is
    lost, insisting she might be on an "unscheduled holiday." He leaves for the lab.
    In the lab, Geordi, wearing the interface helmet, prepares as Data adjusts it
    and Beverly monitors. Data initiates the interface, and Geordi's face changes,
    indicating his immersion. He initially sees only darkness but gains vision as
    Data increases the input signal, first in black and white, then in color, with
    the glare of a Red Alert. Geordi describes the experience as exciting, like a
    roller coaster or a first date, despite Beverly noting his increased pulse. He
    reports the Raman is a "mess" with atmospheric gases, suspecting a hull breach
    near the Bridge. He finds a trapped crew member, dead beneath a collapsed bulkhead,
    and cannot move it. Data, with Beverly's cautious approval, increases power to
    the tractor beams (to eighty percent of tolerance). Geordi removes the debris,
    confirming the crewman's death. He then uses a phaser burst from his hand to open
    a magnetic storage bay door, finding six more dead bodies. Suddenly, flames erupt,
    attacking Geordi. He cries out in pain as the flames make contact with his virtual
    hands. Beverly orders Data to disconnect him, and Geordi, dazed, discovers his
    palms are physically burned, stunning everyone present.
