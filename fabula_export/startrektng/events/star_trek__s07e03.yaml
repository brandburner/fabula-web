      \ and the **source of peril**. As Geordi’s vision flickers and the connection\
      \ to the probe weakens, the interface becomes a **ticking time bomb**, its failing\
      \ systems mirroring the **fragility of the rescue mission**. Data’s reluctance\
      \ to increase the input gain stems from the **known risks of neural feedback**—risks\
      \ that are now manifesting in Geordi’s physical distress (e.g., his **coughing,\
      \ convulsions, and fading vision**). The headpiece symbolizes the **tension\
      \ between innovation and ethics**, as Geordi pushes it beyond its limits, gambling\
      \ his **mental health** for the *Hera*’s crew.\n      "
    status_before_event: "\n        Functioning but **unstable**, with **subspace\
      \ energy fluctuations** detected by Data. The interface is **operational but\
      \ at 75% of tolerance**, already causing **mild neural feedback** in Geordi.\
      \ It is **physically attached to Geordi’s VISOR**, integrating seamlessly with\
      \ his sensory inputs.\n      "
    status_after_event: "\n        **Critically compromised**, with Geordi **losing\
      \ connection to the probe** and experiencing **severe visual distortion**. Data\
      \ has **incrementally increased the gain**, but the system is **approaching\
      \ failure**, risking **permanent neural damage** to Geordi. The interface remains\
