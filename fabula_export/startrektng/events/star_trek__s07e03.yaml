- fabula_uuid: cand_evt_scene_fbbdf3a24048a38f_01
  global_id: null
  title: Geordi risks interface overload to rescue crew
  description: "\n  Geordi La Forge, connected to the experimental neural interface,\
    \ pushes past medical warnings as the interface's signal strength increases, flooding\
    \ his senses with vivid, colored imagery of the stricken science ship's corridor.\
    \ Beverly Crusher monitors his rising heart rate with concern, threatening to\
    \ disconnect him if his vitals destabilize further. Geordi, exhilarated by the\
    \ sensory rush, dismisses her warnings, comparing the experience to a 'roller\
    \ coaster' or 'first date'—revealing his emotional investment in the mission.\
    \ As he navigates the corridor, he detects a hull breach and traces the source\
    \ of toxic atmospheric gases (methane and ammonia) to the Bridge. Rounding a corner,\
    \ he discovers a trapped crew member pinned beneath collapsed bulkhead material.\
    \ Despite the worsening conditions, Geordi prioritizes the rescue, calling for\
    \ increased tractor beam power to free the victim, while Data and Beverly continue\
    \ to monitor his deteriorating physiological state. The scene underscores Geordi's\
    \ reckless determination to prove the interface's capabilities—even at personal\
    \ cost—while foreshadowing the physical and psychological toll of his defiance.\n\
    \  "
