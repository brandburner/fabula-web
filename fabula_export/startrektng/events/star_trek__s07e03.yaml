  title: Geordi defies orders with Data’s reluctant aid
  description: 'In the lab, Geordi La Forge prepares to use the experimental neural
    interface alone, defying Starfleet protocols to search for his missing mother.
    Data arrives, having anticipated Geordi’s recklessness, and confronts him about
    disobeying Captain Picard. Geordi’s emotional breakdown—fearful of living with
    the guilt of inaction—exposes his desperation, forcing Data to reconsider. After
    a tense standoff, Data compromises: he won’t confine Geordi but will monitor the
    interface to mitigate risks. Geordi, moved by Data’s unexpected support, removes
    his VISOR and initiates the connection, setting the stage for a dangerous encounter
    with the alien entity. The moment marks a turning point in their dynamic, blending
    defiance with loyalty as Data rationalizes his choice through logic, while Geordi’s
    raw grief drives the mission forward despite the risks. The scene ends with the
    interface activating, leaving Geordi’s fate uncertain but his determination unshaken.'
