    It''s a tragic thing... But I can''t risk your safety on the basis of a dubious
    hypothesis.'
  - 'GEORDI: If there''s even one chance in a million I''m right and she''s alive...'
  - 'PICARD: I''m sorry, Geordi. I''ve made my decision.'
