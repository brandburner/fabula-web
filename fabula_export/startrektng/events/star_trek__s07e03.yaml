  title: Geordi attacked by sentient flames
  description: "\n  Geordi La Forge discovers the dead crew of the *Raman* in a magnetic\
    \ storage bay, confirming the ship’s catastrophic failure. As he examines the\
    \ bodies, sentient flames erupt violently in front of him, lashing out with deliberate\
    \ hostility. The flames make direct contact with his palms, burning him and forcing\
    \ him to recoil in pain. This is the first physical manifestation of the alien\
    \ entity’s presence—hostile, desperate, and targeting Geordi specifically. The\
    \ attack underscores the escalating danger of his mother’s disappearance and the\
    \ entity’s growing aggression, while also revealing Geordi’s vulnerability despite\
    \ his technical expertise. The flames’ sentience suggests a deeper, unresolved\
    \ connection between Geordi and the alien consciousness impersonating his mother.\n\
    \  "
