- fabula_uuid: act_9de1674e53e791dd
  number: 1
  summary: The Enterprise orbits a turbulent, greenish gas giant, responding to a
    distress call from the science vessel Raman, trapped within the planet's atmosphere.
    Captain Picard's log confirms the mission to rescue the Raman's crew using an
    experimental interface probe. On the Bridge, Data, Riker, and Geordi analyze the
    planet's atmospheric layers, noting the Raman's position far below its intended
    sampling depth. Geordi speculates about shield failure or nacelle issues. Picard
    asks about life signs, but Geordi reports bio-sensors are useless due to atmospheric
    interference. Data explains the probe's focused particle beam should cut through
    the interference, though Geordi notes the interface may operate at near tolerance
    levels. Riker assures Picard the safety override will disengage the interface
    at ninety-eight percent tolerance. Worf interrupts, announcing a transmission
    from Admiral Holt for Picard. Picard instructs Geordi and Data to prepare the
    probe for launch, aiming for the Raman's secondary airlock. In his Ready Room,
    Picard greets Admiral Holt, who, after some pleasantries, reveals the Hera, Captain
    Silva La Forge's ship (Geordi's mother), disappeared nine days ago without a trace.
    Holt expresses little hope for its recovery. Picard grimly accepts the news, preparing
    to inform Geordi. In the lab, Picard pulls Data aside, then tells a stunned Geordi
    that the Hera is missing and his mother has disappeared along with her crew. Geordi's
    grave expression concludes the act, introducing his profound personal crisis and
    the central emotional conflict.
