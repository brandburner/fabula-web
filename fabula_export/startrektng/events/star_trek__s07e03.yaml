  title: Geordi rejects Troi’s psychological theory
  description: In Troi’s office, Geordi La Forge—visibly agitated and emotionally
    raw—reluctantly engages in a counseling session about his mother’s disappearance.
    Troi probes his grief, first asking about Silva’s personality before shifting
    to the last time they met, exposing Geordi’s unresolved guilt over not prioritizing
    a final visit. As Troi theorizes that his visions of Silva are a psychological
    coping mechanism—manifestations of his refusal to accept her death—Geordi initially
    listens but ultimately dismisses her analysis outright. His rejection isn’t just
    about the theory’s validity; it’s a defensive refusal to confront the possibility
    that his mother is gone, a denial that fuels his determination to re-interface
    and pursue the truth independently. The exchange underscores Geordi’s emotional
    fragility and his growing isolation from the crew’s support, setting up his subsequent
    defiance of orders and deeper entanglement with the alien entity. Troi’s concern
    lingers as Geordi exits, her expression revealing her fear that his denial could
    jeopardize both the mission and his own stability.
