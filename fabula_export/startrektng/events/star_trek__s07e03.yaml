  global_id: null
  title: Geordi’s emotional breakdown and risky interface
  description: Geordi La Forge, already emotionally raw from his mother’s disappearance
    and his father’s grief, is pushed to a breaking point when Data’s logical interrogation
    forces him to confront his denial. Beverly Crusher and Data prepare him for a
    second high-risk interface attempt, adjusting parameters to minimize danger, but
    the scene underscores Geordi’s psychological fragility and the crew’s desperation
    to salvage the mission. His vulnerability is laid bare as he clings to the hope
    of seeing his mother again, despite the risks—both physical and emotional. The
    tension between his need for answers and the crew’s concern for his safety creates
    a charged moment where the mission’s stakes collide with Geordi’s personal crisis.
    The scene serves as a turning point, revealing the depth of his trauma and setting
    up the next high-stakes interface attempt where he will confront the alien entity
    masquerading as his mother.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e03
  scene_sequence: 24
