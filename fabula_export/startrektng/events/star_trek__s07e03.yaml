  title: Geordi’s Rejected Subspace Theory
  description: 'In the Obs Lounge, Geordi La Forge interrupts Data’s shuttlecraft
    rescue plan for the *Raman* by proposing a radical theory: the *Hera*—his mother’s
    missing ship—may have been pulled through a subspace funnel to Marjin Seven. Despite
    Data cautiously validating the *possibility* of such an event, Picard and Riker
    dismiss the hypothesis as too speculative, prioritizing the shuttle plan. Geordi’s
    insistence reveals his emotional investment in finding his mother, while Picard’s
    refusal underscores the tension between personal obsession and Starfleet pragmatism.
    The dismissal leaves Geordi visibly frustrated, setting up his later defiance
    of orders. The exchange also highlights Data’s conflicted role as both Geordi’s
    ally and a Starfleet officer bound by logic, while Picard’s firm but sympathetic
    stance reinforces his leadership burden—balancing crew morale with mission objectives.
    The scene deepens the mystery of Silva La Forge’s disappearance and foreshadows
    Geordi’s growing desperation to act outside protocol.'
