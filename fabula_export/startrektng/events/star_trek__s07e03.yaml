    emotional_state: Calculating yet conflicted, Data’s usual logical detachment is
      tested by Geordi’s raw emotion. He is torn between his duty to uphold protocol
      and his desire to support his friend, ultimately prioritizing Geordi’s well-being
      over strict adherence to orders. His emotional state is one of cautious optimism,
