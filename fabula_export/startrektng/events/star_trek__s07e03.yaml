      to begin scanning the vessel’s interior. Its telemetry is being monitored by
      Data and the bridge crew, and it has become the focal point of the next phase
      of the mission.
    global_id: ger_object_5ea546dddc2c
  - object_uuid: ger_object_d711793c960b
    description_of_involvement: "\n        The Raman Secondary Airlock is the threshold\
      \ between the *Enterprise*’s mission and the *Raman*’s enigma. Its breach by\
      \ the probe is the event’s catalytic moment, transforming the abstract distress\
      \ call into a tangible, explorable space. The airlock’s role here is symbolic\
