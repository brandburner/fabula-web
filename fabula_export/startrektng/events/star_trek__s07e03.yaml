    emotional_state: A volatile mix of guilt, defensiveness, and repressed grief,
      masked by technical precision and forced professionalism. His emotional state
      is a pressure cooker, with Riker’s intervention acting as the catalyst for a
      brief but intense crack in his composure.
    goals:
    - To maintain control over the neural interface mission, using technical expertise
      as a shield against his emotions.
    - To avoid confronting his grief over his mother’s disappearance, even as Riker’s
      persistence forces him to the edge of acknowledgment.
    what_happened: Geordi is initially alone in his quarters, watching a personal
      message from his mother, Silva La Forge, with a mix of sadness and longing.
      His body language—sad smile, quiet self-directed remark—reveals his emotional
      attachment to the message. When Riker enters, Geordi freezes the playback, his
      posture stiffening as he shifts into a defensive mode. He engages in a tense
      exchange with Riker, insisting on continuing the mission despite his emotional
      state. His final action—standing abruptly and heading for the door—signals his
      refusal to yield, both to Riker’s concern and to his own grief.
