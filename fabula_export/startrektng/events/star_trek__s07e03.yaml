  title: Geordi reveals the alien entity’s tragic origin
  description: "\n  In Auxiliary Control, Geordi La Forge explains to Picard the true\
    \ nature of the Raman’s distress call: the crew encountered sentient subspace\
    \ lifeforms that, desperate to communicate, assumed the form of Geordi’s long-lost\
    \ mother to manipulate him into descending closer to the planet’s surface. The\
    \ beings’ attempt to interface with the Raman crew’s minds proved fatal, but Geordi’s\
    \ VISOR shielded him from harm, allowing him to witness their grief and isolation\
    \ firsthand. This revelation forces Picard to confront the ethical dilemma of\
    \ the beings’ survival versus the safety of the Enterprise crew, while also exposing\
    \ Geordi’s unresolved grief over his mother’s disappearance. The moment underscores\
    \ the alien entity’s tragic desperation and Geordi’s moral conflict—his technical\
    \ expertise is now the only thing standing between the beings’ extinction and\
    \ the Enterprise’s potential danger.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e03
  scene_sequence: 39
  sequence_in_scene: 65
  key_dialogue:
  - 'GEORDI: "As I understand it... when the Raman got close to the planet, they accidentally
    picked up some lifeforms that live in the lower atmosphere. Subspace beings of
    some kind—intelligent. When the ship went back into a higher orbit, the beings
    were trapped."'
  - 'GEORDI: "One of them is able to communicate with me. It must have read my thoughts
    through the probe interface and took the form of my Mother—to try to talk me into
    taking the ship closer to the surface."'
  - 'PICARD: "Were these beings responsible for the death of the Raman''s crew?"'
  - 'GEORDI: "Yes, but I don''t think it was on purpose. They probably tried to communicate
    with them the same way they''re communicating with me—by directly accessing their
    thoughts. That must''ve been fatal to the crew... I guess the interface protected
    me."'
