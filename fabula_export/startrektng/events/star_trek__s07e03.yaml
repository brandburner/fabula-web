  title: Silva’s violent transformation and Geordi’s revelation
  description: Geordi’s agony intensifies as Silva La Forge clutches his head, her
    desperation manifesting in physical violence. When Data reverses the tractor beams,
    Silva is violently repelled, her form dissolving into a flame-like entity before
    re-solidifying. The transformation shatters Geordi’s belief in her humanity, forcing
    him to confront the alien nature of the entity impersonating his mother. Her plea—‘You
    are killing us’—exposes the entity’s vulnerability and the moral stakes of the
    confrontation, while Geordi’s visceral reaction underscores the emotional and
    existential crisis at the heart of the scene. The moment serves as a turning point,
    revealing Silva’s true nature and escalating the tension between survival and
    sacrifice.
