  title: Geordi confronts Silva’s trapped spirit
  description: "\n  In Auxiliary Control, Geordi La Forge—alone and interfaced with\
    \ the probe—experiences a hallucinatory vision of his mother, Silva, who materializes\
    \ before him. The encounter begins with Geordi calling out to her, his voice laced\
    \ with desperate hope, only for Silva to clarify that she is not physically present\
    \ but trapped aboard her ship on the planet’s surface, pulled into a warp funnel.\
    \ Geordi’s immediate reaction—‘That’s just what I thought!’—validates his theory\
    \ about her disappearance, but the revelation is bittersweet, as it also exposes\
    \ the alien entity’s manipulation of his grief. The moment is emotionally charged,\
    \ blending Geordi’s relief at confirming his hypothesis with the creeping dread\
    \ of realizing the entity’s influence. Data’s interruption—‘Geordi, are you seeing\
    \ the image of your mother?’—shatters the illusion, forcing Geordi to confront\
    \ the possibility that his deepest longing is being weaponized. This event serves\
    \ as a turning point, deepening the mystery of the distress call while underscoring\
    \ the alien entity’s psychological manipulation of Geordi’s trauma.\n  "
