  global_id: null
  title: Geordi’s father delivers devastating news
  description: 'In a tense, emotionally charged phone call, Geordi La Forge’s father
    delivers the crushing news that Starfleet has declared the *Hera*—his mother’s
    ship—officially lost after nine days of silence. The call forces Geordi to confront
    the brutal reality of his mother’s presumed death, which he has been avoiding
    by clinging to desperate hope. His father, already grieving, insists on holding
    a memorial service, but Geordi refuses to accept the loss without proof, his denial
    clashing with his father’s raw grief. The exchange exposes the deep emotional
    chasm between them: Geordi’s unresolved hope and guilt, and his father’s inability
    to process the loss without closure. The moment escalates the personal stakes
    of Geordi’s search for answers, framing his defiance of Starfleet’s orders as
    not just a professional risk but a deeply personal quest to honor his mother’s
    memory. The call ends with unresolved tension, leaving Geordi more determined
    to use the neural interface to find the truth, regardless of the cost.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e03
  scene_sequence: 24
  sequence_in_scene: 35
  key_dialogue:
  - 'DOCTOR LAFORGE: "Geordi, Starfleet has declared the *Hera* lost. Nine days, no
    signal. They’re holding a memorial service tomorrow."'
  - 'GEORDI: "No. No, Dad, I can’t—I won’t accept that. Not without proof."'
  - 'DOCTOR LAFORGE: "You think I want to believe this? Your mother was my life. But
    we have to face it. She’s gone."'
  - 'GEORDI: "Then why aren’t you fighting for her? Why are you giving up?"'
