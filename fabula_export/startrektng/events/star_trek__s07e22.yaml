  key_dialogue:
  - 'BEVERLY: What''s he like?'
  - 'PICARD: I''m not sure I can tell you. He''s put up so many barriers... I don''t
    really know what''s underneath.'
  - 'BEVERLY: Keep in mind... he''s had twenty years to be angry that his father wasn''t
    there... it''ll take time to get over those feelings -- but I think it''s possible.'
  - 'PICARD: What I sense about this young man... is that he''s very independent.
    I think it''s best if I leave him alone. Let him come to me if he wants.'
  - 'BEVERLY: Are you really thinking about what''s best for Jason... or easiest for
    you?'
