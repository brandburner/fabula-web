  title: Picard Orders Subspace Transport to Bok
  description: 'Picard receives a chilling pre-recorded transmission from Daimon Bok,
    who reveals Jason Vigo—allegedly Picard’s son—bound and threatened with a knife.
    The message is a vengeful taunt, marking the anniversary of Bok’s son’s death
    at Picard’s hands. Data traces Bok’s ship to a distant location, forcing Picard
    to make a desperate decision: he orders the *Enterprise* to pursue at maximum
    warp, then demands Data attempt a risky subspace transport to board Bok’s vessel.
    Data warns of the fatal risks, but Picard insists, overriding tactical caution.
    The exchange underscores Picard’s emotional unraveling—his need to protect Jason
    eclipses his usual disciplined judgment, marking a turning point in his character
    arc. Riker’s quiet objection highlights the futility of the warp pursuit, while
    Data’s reluctant compliance signals the crew’s loyalty despite the danger. The
    scene escalates the stakes, forcing Picard to confront Bok’s threat directly while
    revealing his growing desperation and moral compromise.'
