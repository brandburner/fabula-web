    emotional_state: A storm of urgency and fear—his usual calm is fractured by the
      possibility of losing Jason before he can even meet him, and the weight of Miranda’s
      death looms over his choices.
    goals:
    - To recover Jason Vigo alive, regardless of the risks.
    - To outmaneuver Bok’s threat by securing Jason before the Ferengi can act.
    what_happened: Picard dominates the scene, his posture rigid with command but
      his voice betraying a rare edge of urgency. He leverages Miranda’s botanical
      background to refocus the search, then reacts viscerally to Data’s revelation
      of the underground male—his body language (a sharp turn toward the turbolift,
      a clenched jaw) signals his conviction that this is Jason. Overriding Riker’s
      skepticism and Worf’s warnings, he orders the beam-out, his decision driven
      by paternal instinct and the ticking clock of Bok’s threat. The turbolift doors
      closing behind him underscore his resolve to confront this moment alone.
