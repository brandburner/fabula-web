  key_dialogue:
  - |-
    JASON: What the... ?
    PICARD: That's right. I'm Captain Picard... Jean-Luc Picard.
  - |-
    PICARD: The person who made the threat is under the impression that... that you are my son...
    JASON: Am I... ?
    PICARD: I don't know...
  - |-
    JASON: My mother never told me who my father was... just that he was in Starfleet.
    PICARD: Perhaps we should contact her... ?
    JASON: She... died a few years ago...
