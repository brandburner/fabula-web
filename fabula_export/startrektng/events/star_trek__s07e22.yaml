  title: Picard and Jason share painful truths
  description: "\n  In a rare moment of vulnerability, Picard isolates himself with\
    \ Jason on a holodeck cave climb, using his climbing skills to establish credibility\
    \ and lower Jason’s defenses. When Jason briefly softens, Picard probes about\
    \ Miranda’s past, uncovering the brutal circumstances of her death—murdered for\
    \ food she refused to surrender to thieves. Jason’s raw, fragmented storytelling\
    \ reveals his mother’s selflessness and the emotional scars he carries, while\
    \ Picard reciprocates with his own regret over his estranged father. When Jason\
    \ confesses to a life of crime, Picard refuses to reject him, insisting their\
    \ bond transcends his past. The exchange fractures Jason’s defenses, creating\
    \ a fragile but meaningful connection before they resume their climb. This moment\
    \ deepens Picard’s resolve to protect Jason, regardless of his flaws, while exposing\
    \ the shared pain that binds them.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e22
  scene_sequence: 19
  sequence_in_scene: 32
  key_dialogue:
  - 'JASON: She heard about the children on Camor who''d been orphaned during the
    Cardassian war... I was only ten when we went there. I remember her telling me
    about all the boys and girls who didn''t have anybody to take care of them...
    So she found this big house... and started rounding up children. Eventually, there
    were over forty of them... She called it a school. She got up before dawn and
    she went to bed after midnight and in between she never stopped working. Then
    one day... two men attacked her... on the street in broad daylight... for the
    food she was carrying... If she''d just given it to them, they probably wouldn''t
    have hurt her. But she knew we needed the food... So they killed her.'
  - 'PICARD: I know. I''m aware of your trouble with the Camor authorities. It doesn''t
    change anything. You''re still my son. And, like it or not, I''m your father.
    I don''t know what that means, but I know it means something. That we''re... connected...'
  - 'JASON: No? Well let me spell it out for you. I''ve been in trouble since I was
    a teenager... I steal, I lie, I use people. I''m a criminal. That''s what your
    son is.'
