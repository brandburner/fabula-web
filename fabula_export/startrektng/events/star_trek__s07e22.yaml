  object_involvements:
  - object_uuid: ger_object_554a959815d6
    description_of_involvement: 'The Ferengi probe serves as the primary delivery
      mechanism for Bok’s vengeful message, hurtling toward the *Enterprise* at high
      warp and locking onto Picard by name. Its unarmed status belies its true purpose:
      psychological warfare. The probe’s beam contains holographic imaging data, which
      Data isolates and allows through the shields, enabling Bok’s hologram to materialize
      near Picard’s Ready Room door. The probe’s path—traced through the Dichromic
      Nebula and past a class four pulsar—hints at Bok’s meticulous planning and the
      lengths he has gone to execute his revenge. Its sudden disappearance after the
      transmission leaves a lingering sense of threat, symbolizing Bok’s unseen but
      ever-present danger.'
    status_before_event: Approaching the *Enterprise* at high warp, unarmed but emitting
      a targeted hail directed at Picard by name.
    status_after_event: Disappears after transmitting Bok’s holographic message, its
      purpose fulfilled but its implications lingering.
    global_id: ger_object_554a959815d6
  - object_uuid: ger_object_b0edcc4aa502
    description_of_involvement: The translucent hologram of Daimon Bok materializes
      near Picard’s Ready Room door, his Ferengi features twisted in hatred as he
      delivers his ultimatum. The hologram’s prerecorded nature means Bok cannot interact
      with the crew in real-time, but his cold, calculated words and the threat to
      Jason Vigo make his presence feel immediate and menacing. The hologram’s symbolic
      placement—near Picard’s private space—underscores the personal nature of Bok’s
      vendetta, invading Picard’s sanctuary and forcing him to confront his past in
      front of his crew.
    status_before_event: Encoded within the probe’s beam, awaiting transmission and
      projection.
    status_after_event: Disappears abruptly after delivering Bok’s message, leaving
      a chilling silence in its wake.
    global_id: ger_object_b0edcc4aa502
