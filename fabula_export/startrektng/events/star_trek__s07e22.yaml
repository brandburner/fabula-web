  title: Picard meets Jason Vigo in transporter room
  description: Jason Vigo materializes aboard the *Enterprise* mid-climb, disoriented
    and defiant, only to find Captain Picard awaiting him. Picard immediately establishes
    authority and urgency, revealing a lethal threat against Jason’s life—one tied
    to a Ferengi Daimon’s claim that Jason is Picard’s son. Jason, initially skeptical
    and evasive, drops his pretense when Picard invokes his late mother, Miranda,
    creating an emotional bond. The revelation of her death and Picard’s offer of
    a paternity test shift the dynamic from distrust to cautious collaboration, as
    Jason’s survival hinges on uncovering the truth. The scene blends tension (Bok’s
    threat), emotional vulnerability (Miranda’s absence), and thematic stakes (legacy
    vs. truth), with Picard’s protectiveness clashing against Jason’s roguish independence.
    Their shared smile at the end signals fragile trust, but the unresolved paternity
    looms as a ticking clock—both for Jason’s safety and Picard’s reckoning with his
    past.
