  key_dialogue:
  - 'RIKER: Data found out that the woman you mentioned does have a son named Jason.'
  - 'PICARD: There is a possibility that the boy is my son... I was involved with
    his mother for a short time about twenty four years ago. I met her through a friend
    during shore-leave on Earth. It was all very romantic... probably because we both
    knew I''d be leaving in two weeks... we kept in touch for a short while, but we
    never managed to get together again...'
  - 'PICARD: Whether he''s really my son or not, the fact is he''s in danger. Bok
    tried to kill me six years ago... I have no doubt he intends to make good on his
    threat against the boy...'
