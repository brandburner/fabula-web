  title: Picard orders Jason’s protection despite Bok’s threat
  description: 'In the aftermath of Bok’s violent intrusion into his quarters—where
    the Ferengi revealed Jason Vigo as Picard’s alleged son—Picard and Worf investigate
    the breach in Engineering. Geordi confirms no physical intrusion occurred, ruling
    out a transporter breach or hologram, leaving Bok’s method of entry a mystery.
    Picard, unsettled, orders Worf to assign Jason a security detail, prioritizing
    his safety over his own. The moment is interrupted when Data delivers unsettling
    news: Jason’s criminal record, including petty theft, disorderly conduct, and
    repeated trespassing charges. Picard’s reaction—disappointment, not shock—suggests
    his growing skepticism about Bok’s claim, but his protective instinct remains.
    The scene underscores Picard’s moral dilemma: whether to trust Bok’s threat or
    Jason’s character, while Bok’s unseen presence looms as an unresolved danger.'
