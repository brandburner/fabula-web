  key_dialogue:
  - |-
    JASON: What is all this... ?
    PICARD: Archaeological fragments I've collected over the years... This is a Silvan glyph stone... And this is a Gorlan prayer stick... it's extremely rare...
  - |-
    JASON: I'd say you got taken.
    PICARD: Perhaps... but I value it nonetheless... On Camor, something has value if you can eat it or sell it... everything else is a luxury.
  - |-
    PICARD: Years ago, I was forced to destroy a starship that was under his son's command. Apparently Bok feels it would be fitting vengeance to kill my son.
    JASON: I can't hide forever.
    PICARD: Of course not. We're trying to locate Bok... I intend to confront him, settle this matter.
