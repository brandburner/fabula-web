- fabula_uuid: act_52da947797219074
  number: 3
  summary: Following Bok's unsettling appearance, Picard, Worf, and Geordi investigate
    the breach, concluding that Bok likely utilized a modified, undetectable subspace
    transporter rather than holographic projection or mind control. Prioritizing Jason's
    safety, Picard assigns him a security detail, despite Worf's concerns for the
    Captain's own well-being. Data then presents Picard with Jason's criminal record,
    detailing charges of petty theft, disorderly conduct, and numerous instances of
    trespassing related to his climbing activities. This revelation further complicates
    Picard's understanding of his son. In Ten Forward, Jason, under the watchful eyes
    of his security detail, attempts to charm Lieutenant Rhodes, showcasing his roguish
    demeanor. However, a sudden, violent tremor in his hand reveals a hidden vulnerability,
    which he quickly tries to conceal. Picard later confronts Jason, explaining Bok's
    recent intrusion, but Jason, hardened and independent, suggests being left to
    his own devices, which Picard firmly rejects. Picard's attempts to bond through
    shared activities like rock climbing or fencing are met with Jason's steadfast
    refusal, as the young man reiterates his intention to leave once Bok is dealt
    with, seeing no value in forming a relationship. The Enterprise then detects residual
    energy from a Ferengi vessel in the Xendi Kabu system, confirming Bok's presence.
    A second, cloaked probe materializes, exploding in a coded light pattern that
    translates to "My revenge is at hand." Moments later, Bok reappears in Picard's
    ready room, taunting him and explicitly stating his intention to murder Jason
    as retribution for his own son's death, before vanishing with an even more advanced,
    silent transporter effect. The act culminates with Jason suffering a severe, convulsive
    seizure in his quarters, introducing a new, grave medical threat that adds another
    layer of urgency and mystery to the unfolding drama.
