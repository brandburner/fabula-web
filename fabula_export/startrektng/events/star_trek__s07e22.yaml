  title: Paternity confirmed in Sickbay
  description: |2-

      In Sickbay, Beverly Crusher conducts a genetic test to determine whether Jason Vigo is Picard’s biological son. The awkward tension between Picard and Jason is palpable as Picard attempts small talk—asking about Jason’s cave-climbing hobby and his current employment status—only to be met with evasive or dismissive responses. Jason’s guarded demeanor and Picard’s fumbling attempts to connect highlight the emotional distance between them. When Beverly reveals the test results, confirming Picard as Jason’s father, the moment is charged with significance: Picard’s past collides with his present, raising the stakes of Bok’s threat and forcing Picard to confront his newfound paternal responsibility. The revelation also solidifies Jason’s vulnerability, as his biological connection to Picard makes him a more tangible target for Bok’s revenge. The scene serves as a turning point, shifting the narrative from uncertainty to a confirmed biological bond that will drive the rest of the story’s conflict.
