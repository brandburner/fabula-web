- fabula_uuid: cand_evt_scene_7f277220eb25df44_01
  global_id: null
  title: Jason’s tremor and Picard’s failed connection
  description: Jason Vigo’s attempt to charm Lieutenant Rhodes fractures when a physical
    tremor—likely a symptom of his genetic instability—betrays his vulnerability.
    Picard arrives, revealing Bok’s nocturnal visit to his quarters, which forces
    Jason to confront the reality of his danger. Picard, driven by Beverly’s earlier
    question about fatherhood, tries to bond with Jason by offering shared activities
    (rock climbing, fencing), but Jason bluntly rejects the overtures, insisting he
    prefers solitude and will leave once Bok is caught. The exchange exposes Jason’s
    emotional walls and Picard’s unresolved paternal instincts, while the tremor hints
    at a deeper, unaddressed medical crisis. The scene underscores the fragility of
    their relationship and the futility of Picard’s attempts to bridge the gap between
    them, leaving both men emotionally isolated despite their physical proximity.
