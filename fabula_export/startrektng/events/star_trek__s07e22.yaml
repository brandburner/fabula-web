  title: Picard confronts Jason Vigo’s paternity claim
  description: "\n  Picard materializes in the transporter room as Jason Vigo—mid-climb\
    \ in a cave—is abruptly beamed aboard the *Enterprise*. Jason, initially dismissive\
    \ and unaware of the danger, reacts with shock when Picard reveals a death threat\
    \ against him, tied to a Ferengi Daimon’s belief that Jason is Picard’s son. The\
    \ revelation forces Jason to abandon his pretense of anonymity, and Picard’s mention\
    \ of Jason’s mother triggers a painful disclosure: she died years ago, leaving\
    \ Jason with no answers about his paternity. Picard, grappling with the emotional\
    \ weight of the moment, proposes a genetic test to confirm their relationship,\
    \ while Jason’s dark humor masks his fear of the threat—and the possibility of\
    \ Picard being his father. The exchange establishes the high stakes of Bok’s vendetta,\
    \ the fragility of Jason’s past, and Picard’s moral obligation to protect a young\
    \ man who may be his son, regardless of the truth.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e22
  scene_sequence: 5
  sequence_in_scene: 10
  key_dialogue:
  - |-
    PICARD: We thought you were in danger.
    JASON: Oh... well... I wasn't. Maybe you should just beam me back where I was?
  - |-
    PICARD: The person who made the threat is under the impression that... that you are my son...
    JASON: Am I... ?
    PICARD: I don't know...
  - |-
    JASON: My mother never told me who my father was... just that he was in Starfleet.
    PICARD: Perhaps we should contact her... ?
    JASON: She... died a few years ago...
  - |-
    JASON: If I'm not your son... is this person still going to want to kill me?
    PICARD: Once he's made aware of the fact, I expect he won't...
    JASON: In that case you won't mind my saying that I hope you're not my father...
