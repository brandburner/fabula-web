- fabula_uuid: cand_evt_scene_173eebc07d1c9e89_01
  global_id: null
  title: Forrester-Trent Syndrome Diagnosed
  description: "\n  In the aftermath of Jason Vigo's violent seizure, Beverly Crusher\
    \ confirms the devastating diagnosis: Forrester-Trent syndrome, a rare hereditary\
    \ degenerative neurological disorder. The revelation forces Picard to confront\
    \ the impossible—if Jason is truly his son, why does neither Picard nor Jason's\
    \ mother carry the disease? Beverly's insistence on further scans to uncover the\
    \ anomaly deepens the mystery, while Picard's emotional vulnerability surfaces\
    \ as he grapples with his inadequacy as a father figure. The scene pivots from\
    \ clinical urgency to raw personal conflict, with Beverly offering reassurance\
    \ that parenthood is learned through patience and presence. Jason, visibly shaken,\
    \ exits in silence, leaving Picard and Beverly to discuss the uncertain prognosis\
    \ and Picard's self-doubt about his ability to connect with Jason. The diagnosis\
    \ escalates the stakes, transforming Bok's threat from a personal vendetta into\
    \ a medical crisis with existential implications for Jason's survival.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e22
  scene_sequence: 16
  sequence_in_scene: 26
  key_dialogue:
  - 'BEVERLY: You have a condition called Forrester-Trent syndrome. It''s a degenerative
    neurological disorder—very rare.'
  - 'PICARD: What do you mean degenerative? BEVERLY: If it goes untreated, it can
