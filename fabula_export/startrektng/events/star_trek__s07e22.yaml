  title: Bok’s transporter signature triggers bridge crisis
  description: The bridge crew, under Riker’s command, detects Daimon Bok’s transporter
    signature approaching the *Enterprise*, immediately triggering a high-stakes crisis.
    Data identifies the signature as Ferengi in origin, prompting Riker to order Worf
    to track its source while Geordi confirms a signal lock on Jason Vigo. The urgency
    of Bok’s vengeful pursuit forces Riker to act decisively—attempting to alert Picard
    while preparing to counter Bok’s imminent abduction attempt. The scene escalates
    tension by exposing the crew’s vulnerability and the precariousness of Jason’s
    safety, setting up Picard’s forced confrontation with his past and the immediate
    threat to a son he may not even know exists. The dialogue and actions reveal the
    crew’s professionalism under pressure, but also the underlying desperation of
    their situation as Bok’s signature closes in on the ship.
