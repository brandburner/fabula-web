  title: Picard narrows search using Vigo’s botanical link
  description: "\n  On the *Enterprise*’s bridge, Picard and the senior staff begin\
    \ the search for Jason Vigo on Camor Five. Data’s initial scans yield no direct\
    \ leads, but Picard leverages his personal knowledge of Miranda Vigo’s botanical\
    \ training to propose focusing on agricultural regions. Data confirms the southern\
    \ continent is the only cultivated area, narrowing the search. When Data detects\
    \ seven humans—none matching Miranda’s profile—Picard presses for details, revealing\
    \ an eighth individual, a male in his 20s or 30s, hidden two kilometers underground.\
    \ The discovery triggers a visceral reaction in Picard, who immediately suspects\
    \ this could be Jason. Riker’s skepticism about the underground location contrasts\
    \ with Picard’s growing urgency, while Worf’s seismic instability warning adds\
    \ physical danger to the stakes. Picard orders the unknown male beamed aboard,\
    \ setting the stage for a critical confrontation with Bok’s threat and the truth\
    \ about Jason’s identity.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e22
  scene_sequence: 4
  sequence_in_scene: 6
  key_dialogue: &id007
  - 'PICARD: Miranda was trained as a botanist... she used to talk about running a
    farm some day. We might start with the agricultural areas.'
  - 'DATA: I am detecting seven humans... three are female... however they are all
    too young to be Miranda Vigo.'
  - 'PICARD: That''s seven, you said there were eight humans.'
  - 'DATA: I am having difficulty getting a clear reading on the eighth... the individual
    appears to be located approximately two kilometers beneath the planet''s surface.'
  - 'PICARD: Male or female?'
  - 'DATA: Male... adult... between twenty and thirty years old.'
  - 'PICARD: Unless he was forced to.'
