  title: Troi probes Vigo’s emotional defenses
  description: Deanna Troi visits Jason Vigo in his quarters under the pretense of
    offering counseling, but Vigo immediately weaponizes his charm to deflect her
    efforts. He alternates between feigned vulnerability and flirtatious distraction,
    subtly testing her reactions to gauge her susceptibility. Troi, initially taken
    aback by his roguish demeanor, quickly recognizes the manipulation—his calculated
    shifts between openness and evasion reveal a practiced ability to control social
    dynamics. When she presses about his feelings toward Picard, Vigo dismisses the
    question with a shrug and pivots to personal compliments, forcing Troi to terminate
    the session. His smug self-satisfaction as she leaves underscores his resistance
    to genuine emotional engagement, deepening the mystery of his true motives and
    reinforcing the crew’s suspicion that he is hiding something. The scene serves
    as a critical character reveal, exposing Vigo’s manipulative nature while highlighting
    Troi’s professional instincts and the crew’s growing unease about his presence
    aboard the *Enterprise*.
