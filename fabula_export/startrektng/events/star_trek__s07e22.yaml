- fabula_uuid: cand_evt_scene_d79adbbdedd7c1a9_01
  global_id: null
  title: Bok’s coded threat detonates on the bridge
  description: |2-

      The *Enterprise* bridge crew detects a cloaked Ferengi probe—identical to Bok’s previous transmission—materializing near the ship. Worf identifies it as a new threat, but Data quickly determines it is not an attack but a message. The probe explodes in a rapid-fire light pattern, which Data decodes as a cryptic warning in B'Zal: *'My revenge is at hand.'* Picard’s frustration boils over as he realizes Bok’s ability to breach their defenses at will, forcing him to confront the escalating danger to Jason Vigo. The message confirms Bok’s relentless pursuit, deepening Picard’s sense of helplessness and the narrative tension. The crew’s inability to trace Bok’s origin or counter his tactics underscores his strategic advantage, while Picard’s retreat to his ready room signals his need to process the threat in isolation. The event serves as a turning point, shifting the story from reactive defense to an urgent, high-stakes confrontation with Bok’s vendetta.
