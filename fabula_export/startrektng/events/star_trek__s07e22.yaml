  - object_uuid: ger_object_554a959815d6
    description_of_involvement: 'The Ferengi probe is the narrative catalyst for the
      event, hurtling toward the *Enterprise* at high warp and hailing Picard by name.
      Its unarmed status belies its true purpose: delivering Bok’s holographic message.
      The probe’s beam pierces the shields, projecting Bok’s prerecorded hologram
      near Picard’s Ready Room door. Its advanced technology—including subspace transmission
      capabilities and holographic projection—demonstrates the Ferengi’s resourcefulness
      and Bok’s meticulous planning. The probe’s role is purely functional, serving
      as a vessel for Bok’s revenge, but its presence transforms the bridge from a
      place of routine operations to a stage for personal confrontation.'
    status_before_event: Approaching the *Enterprise* at high warp, unarmed but equipped
      with advanced holographic transmission technology. Its path is premeditated,
      targeting Picard specifically.
    status_after_event: 'The probe’s mission is complete: it has delivered Bok’s message
      and disappeared, leaving behind the emotional and strategic fallout of its transmission.'
    global_id: ger_object_554a959815d6
  - object_uuid: ger_object_b0edcc4aa502
    description_of_involvement: The translucent hologram of Daimon Bok is the visual
      and emotional centerpiece of the event. It materializes near Picard’s Ready
      Room door, its static nature emphasizing Bok’s premeditation and control. The
      hologram’s cold, hate-filled eyes and taunting smile convey the depth of his
      vengeance, while his prerecorded dialogue reveals the existence of Jason Vigo
      and the threat to his life. The hologram’s placement—near Picard’s private space—symbolically
      invades his sanctuary, forcing him to confront his past in the most public and
      vulnerable way possible. Its role is to deliver Bok’s ultimatum with maximum
      psychological impact, leaving Picard and the crew reeling.
    status_before_event: Stored within the probe as a prerecorded message, awaiting
      transmission.
    status_after_event: The hologram dissipates after delivering its message, but
      its emotional and strategic impact lingers, driving the crew’s subsequent actions.
    global_id: ger_object_b0edcc4aa502
