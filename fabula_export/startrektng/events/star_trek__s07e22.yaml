  - object_uuid: ger_object_554a959815d6
    description_of_involvement: "\n        The Ferengi probe is the central object\
      \ of this event, materializing near the *Enterprise* and transmitting Bok’s\
      \ cryptic message. It appears identical to the previous probe sent by Bok, confirming\
      \ his signature method of communication. The probe’s cloaking technology allows\
      \ it to evade detection until it is nearly upon the ship, adding to the sense\
      \ of vulnerability. Its explosion in a rapid-fire light pattern serves as a\
      \ deliberate and ominous message, decoded by Data as *'My revenge is at hand.'*\
      \ The probe’s behavior underscores Bok’s ability to infiltrate and intimidate\
      \ the *Enterprise* crew, escalating the tension and urgency of the situation.\n\
      \      "
    status_before_event: Cloaked and undetected, approaching the *Enterprise* at high
      speed.
    status_after_event: Destroyed after transmitting its message, leaving no physical
      trace but a lingering sense of threat.
    global_id: ger_object_554a959815d6
