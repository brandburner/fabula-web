  title: Beverly reveals Jason’s genetic truth
  description: 'Picard enters Beverly’s office with uncharacteristic optimism, his
    energy contrasting sharply with her tense demeanor. The moment he notices her
    expression, his posture shifts—shoulders lowering, fingers tightening on the chair—as
    he braces for bad news. Beverly delivers the results of Jason Vigo’s micro-cellular
    scan, confirming a genetic link to Picard. The revelation lands like a physical
    blow: Picard’s face pales, his breath catches, and his usual composure fractures.
    The news forces him to confront an unspoken past (his brief relationship with
    Miranda Vigo) and the immediate threat to a son he never knew existed. The scene
    pivots from personal curiosity to existential crisis, as Picard’s worldview—rooted
    in duty and control—is upended by biology and Bok’s vengeful plot. Beverly’s measured
    delivery underscores the gravity of the discovery, while Picard’s visceral reaction
    reveals the depth of his emotional investment, despite his denial.'
