  title: Vigo’s Criminal Record Revealed
  description: 'Following Bok’s violent intrusion into Picard’s quarters and the revelation
    that Jason Vigo may be his son, Picard orders Worf to assign a security detail
    to Jason. As Picard leaves Engineering to address the threat, Data intercepts
    him with an unexpected disclosure: Jason’s criminal record, which includes petty
    theft, disorderly conduct, and repeated trespassing charges. The revelation forces
    Picard to confront the moral ambiguity of Jason’s character, complicating his
    protective impulse. Data’s clinical delivery contrasts with Picard’s visible dismay,
    underscoring the emotional weight of the discovery. The moment shifts Picard’s
    focus from external threats to internal doubts about Jason’s true nature, deepening
    the narrative’s central tension between trust and deception.'
