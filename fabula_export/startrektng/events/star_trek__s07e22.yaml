  scene_sequence: 2
  sequence_in_scene: 3
  key_dialogue: &id005
  - 'PICARD: ((to Worf)) Put a tractor beam on that probe and determine if it''s safe
    to beam it aboard. I want to know where it came from.'
  - 'PICARD: Mister Data, see if there''s any mention of a Jason Vigo in Federation
    records. You might start with Miranda Vigo—she was born on New Gaul about forty
    years ago...'
  - 'PICARD: Contact the Ferengi Government and find out what you can about Bok. He
    was wearing a Daimon''s uniform—if he''s regained his rank, I want to know why.'
