    goals:
    - Understand the nature of the probe’s threat and Bok’s intentions
    - Protect Jason Vigo, regardless of the truth of his paternity, from Bok’s vengeance
    what_happened: Picard enters the bridge from his Ready Room, his demeanor composed
      but alert as he demands a report from Riker. His expression shifts from professional
      curiosity to stunned confusion as Worf reveals the probe is hailing *him* by
      name. Picard’s voice is steady as he orders the channel opened, but his composure
      cracks when Bok’s hologram materializes, delivering the devastating revelation
      about Jason Vigo. His face pales, his hands gripping the armrests of his chair
      as he absorbs the implications of Bok’s words. The weight of the past and the
      threat to an unknown son leave him momentarily speechless, his emotional vulnerability
      laid bare before the crew.
