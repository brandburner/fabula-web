- fabula_uuid: act_c89331cbe6dde4b9
  number: 2
  summary: 'Following the bombshell revelation of his paternity, Picard endeavors
    to forge a connection with Jason in his quarters, sharing personal archaeological
    treasures. However, Jason remains distant and guarded, his upbringing on Camor
    Five instilling a pragmatic worldview that clashes with Picard''s more intellectual
    pursuits. Jason expresses a desire to return to his life on Camor, but Picard,
    citing Bok''s imminent threat, insists he remain aboard the Enterprise. Picard
    explains Bok''s motive for vengeance, rooted in the destruction of Bok''s son''s
    ship, but Jason remains emotionally detached. Meanwhile, the crew investigates
    the probe, with Geordi and Data struggling to decipher its encrypted navigational
    data. A message from Daimon Birta provides a crucial lead: Bok was stripped of
    his Daimon rank, imprisoned, and later bought his freedom, last seen in the Dorias
    cluster. This information allows Data and Geordi to trace the probe''s origin
    to the Xendi Kabu system, giving Picard a target. Grappling with his inability
    to connect with Jason, Picard seeks counsel from Beverly Crusher, expressing his
    frustration and sense of helplessness. Beverly insightfully challenges Picard,
    questioning whether his reluctance to push for a relationship with Jason stems
    from what''s best for his son or what''s easiest for himself. Counselor Troi also
    attempts to reach Jason, but he skillfully deflects her efforts with charm and
    roguishness, revealing a manipulative streak. The act culminates dramatically
    when Bok silently materializes in Picard''s quarters during the night, delivering
    a chilling, personal taunt and reiterating his vow to kill Jason. Bok''s mysterious
    disappearance leaves Picard deeply unsettled and underscores the immediate, pervasive
    danger.'
