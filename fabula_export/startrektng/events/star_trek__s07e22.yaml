acts:
- fabula_uuid: act_ec5225528520bb4f
  number: 1
  summary: The narrative opens with the Enterprise receiving a mysterious probe that
    projects a holographic message from Daimon Bok, a vengeful Ferengi. Bok, seeking
    retribution for Picard's role in his son's death, claims Jason Vigo is Picard's
    son and vows to kill him. Picard, initially stunned and disbelieving, immediately
    launches an investigation. Data confirms a Miranda Vigo, with whom Picard had
    a brief romantic encounter twenty-four years prior, indeed had a son named Jason,
    now 23, living on the remote planet Camor Five. Picard confides in Riker about
    the possibility of paternity, acknowledging Miranda's independent nature might
    explain why he was never informed. Driven by a sense of responsibility, regardless
    of biological ties, Picard orders the Enterprise to Camor Five to protect Jason.
    Upon arrival, Data locates Jason living deep underground, imperiled by seismic
    activity. The crew beams Jason aboard just in time, finding him confused and resistant
    to their interference. Picard confronts Jason with the extraordinary claim of
    paternity and the grave threat from Bok. Jason, revealing his mother's death,
    agrees to a genetic test, which conclusively confirms Picard's biological fatherhood.
    The act concludes with Jason's wry remark about hoping Picard wasn't his father,
    highlighting the immediate danger this newfound relationship brings. This act
    meticulously sets up the central conflict, introduces the key characters, and
    establishes the high stakes, culminating in the shocking confirmation of Picard's
    paternity, which irrevocably alters his life and the narrative's trajectory.
