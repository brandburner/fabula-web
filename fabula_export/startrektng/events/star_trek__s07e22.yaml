  title: Underground Male Detected Beneath Camor Five
  description: "\n  The Enterprise crew narrows their search for Jason Vigo by leveraging\
    \ Miranda Vigo’s botanical background, focusing on agricultural regions. Data’s\
    \ scan reveals seven humans—none matching Miranda’s profile—but uncovers an eighth\
    \ individual obscured underground, approximately two kilometers beneath the planet’s\
    \ surface. Picard’s visceral reaction to the discovery (potentially Jason Vigo)\
    \ contrasts with Riker’s skepticism, raising stakes in the search. Worf’s report\
    \ of seismic instability in the area forces Picard to act decisively, ordering\
    \ the immediate transport of the underground male aboard the Enterprise. The scene\
    \ escalates tension by shifting focus from Bok’s threats to Jason’s survival,\
    \ while Picard’s instinctive protectiveness—despite unresolved paternity—reveals\
    \ his emotional investment in the situation.\n  "
