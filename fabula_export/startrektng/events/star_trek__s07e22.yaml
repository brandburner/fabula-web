  title: Picard confirms Jason Vigo’s existence and orders rescue
  description: In the ready room, Picard receives Riker’s report confirming the existence
    of Jason Vigo—a young man who may be his son—based on Data’s investigation. The
    revelation triggers a private confession to Riker about his past relationship
    with Jason’s mother, Miranda Vigo, and the emotional weight of the possibility
    that he has an unknown heir. Despite the uncertainty of paternity, Picard’s moral
    imperative to protect Jason from Daimon Bok’s threat drives him to immediately
    order the *Enterprise* to Camor Five at warp five. The scene underscores Picard’s
    leadership under personal crisis, his strategic decisiveness, and the tension
    between duty and paternal instinct. Riker’s presence as a confidant humanizes
    Picard’s vulnerability, while the urgency of the command sets the stage for the
    crew’s mission to locate and secure Jason before Bok can act.
