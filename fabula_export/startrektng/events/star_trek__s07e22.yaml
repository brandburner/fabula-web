    I don''t have the faintest idea how to do it.'
  - 'BEVERLY: I don''t think anyone is born knowing how to be a parent. You kind of
    figure it out as you go.'
  - 'PICARD: I''m just not sure that''s going to be enough in his case. I found out
    he has a criminal record. Nothing terribly serious—petty theft, that sort of thing—but...
    he''s a grown man. Is it too late for him to turn around?'
  - 'BEVERLY: That''s really up to him. Maybe. But you can''t blame yourself for not
    having been there. All you can do is be there for him now.'
