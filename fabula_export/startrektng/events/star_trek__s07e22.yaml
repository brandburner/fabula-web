  title: Bok’s holographic vengeance threat
  description: "\n  The *Enterprise* bridge crew detects an unmanned probe approaching\
    \ at high warp, which inexplicably hails Picard by name—a clear sign of premeditated\
    \ targeting. Worf’s warning of a power surge triggers Riker to raise shields,\
    \ heightening tension as the crew braces for an unknown threat. The probe transmits\
    \ a holographic message from Daimon Bok, a Ferengi Daimon whose son Picard was\
    \ indirectly responsible for killing years earlier. Bok’s prerecorded hologram\
    \ delivers a chilling ultimatum: he has discovered Jason Vigo, a young man he\
    \ claims is Picard’s son, and vows to kill him in retaliation. Picard’s stunned\
    \ reaction underscores the emotional gut-punch of Bok’s revelation, which forces\
    \ him to confront a past he believed buried and a son he never knew existed. The\
    \ scene escalates from tactical alert to personal crisis, setting the stage for\
    \ Picard’s desperate race to protect Jason and uncover the truth behind Bok’s\
    \ deception.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e22
  scene_sequence: 1
  sequence_in_scene: 1
  key_dialogue: &id001
  - 'WORF: I am reading a power surge —'
  - 'RIKER: Shields up.'
