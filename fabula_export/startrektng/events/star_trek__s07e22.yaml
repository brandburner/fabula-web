  title: Bok’s holographic vengeance threat
  description: "\n  The *Enterprise* bridge is on high alert when an unidentified\
    \ probe locks onto the ship and hails Picard by name. After raising shields, the\
    \ crew isolates a holographic transmission—a prerecorded message from Daimon Bok,\
    \ a Ferengi Daimon whose son Picard killed years earlier. Bok’s hologram delivers\
    \ a chilling ultimatum: he has discovered Jason Vigo, whom he claims is Picard’s\
    \ long-lost son, and vows to kill him in retaliation. The revelation forces Picard\
    \ into a crisis of moral reckoning, as Bok weaponizes the possibility of paternity\
    \ to inflict maximum psychological damage. The scene escalates tension by blending\
    \ personal vendetta with existential stakes, leaving Picard stunned and the crew\
    \ scrambling to verify the threat’s validity. Bok’s taunting smile and cold declaration—‘Jason\
    \ Vigo is as good as dead’—frame the event as a turning point, shifting the narrative\
    \ from procedural urgency to a deeply personal, high-stakes confrontation.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e22
