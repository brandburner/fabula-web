  title: Picard reveals Bok’s threat to Jason
  description: 'In Picard’s quarters, Jason Vigo—initially dismissive of Picard’s
    archaeological collection and emotional overtures—gradually reveals his guarded,
    pragmatic worldview shaped by Camor’s harsh values. When Picard attempts to connect
    by sharing his brief past with Jason’s mother, Miranda, Jason’s silence and subtle
    reactions betray deep-seated resentment and vulnerability. The moment pivots when
    Picard discloses the truth: Daimon Bok, a vengeful Ferengi, believes Jason is
    Picard’s son and seeks to kill him as retribution for Picard’s role in his own
    son’s death. Though Jason reluctantly agrees to stay aboard the *Enterprise* for
    his safety, the revelation deepens his emotional distance from Picard, leaving
    their relationship fraught with unresolved tension and unspoken history. The scene
    underscores the fragility of their bond and the weight of Picard’s unresolved
    past, while setting up the immediate conflict with Bok and the crew’s need to
    protect Jason.'
