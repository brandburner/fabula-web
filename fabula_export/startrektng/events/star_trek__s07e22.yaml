- fabula_uuid: cand_evt_scene_84d583f9656b2e89_01
  global_id: null
  title: Picard mobilizes Enterprise crew to verify Bok’s threat
  description: 'In the immediate aftermath of Daimon Bok’s explosive revelation—that
    Jason Vigo is Picard’s son and that Bok intends to kill him—Picard swiftly shifts
    from stunned silence to decisive action. He orders Worf to secure and analyze
    the probe Bok used to deliver his message, ensuring no further threats remain
    active. To Data, he assigns the critical task of verifying Jason Vigo’s existence
    through Federation records, specifically directing him to investigate Miranda
    Vigo, a woman Picard had a brief romantic encounter with decades earlier on New
    Gaul. Simultaneously, Picard tasks Riker with contacting the Ferengi Government
    to ascertain Bok’s current status and authority, given his Daimon uniform. The
    orders are delivered with clinical precision, but the subtext is unmistakable:
    Picard is treating this as a credible, immediate threat, regardless of whether
    Jason Vigo is biologically his son. His exit to the Ready Room underscores the
    personal weight of the situation, leaving the crew to speculate about his emotional
    state while they execute their assignments. The scene establishes Picard’s strategic,
    methodical response to a crisis that could shatter his past and endanger an unknown
    heir, setting the stage for a multi-front investigation.'
