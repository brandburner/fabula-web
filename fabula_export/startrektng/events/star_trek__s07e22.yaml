  global_id: null
  title: Picard Exposes Bok’s Deception on Bridge
  description: Jason Vigo attempts to bargain with Daimon Bok, offering a fake death
    to spare his life, but Bok refuses, insisting Picard must witness his son’s death.
    Picard suddenly materializes on the Ferengi bridge via a risky transport, disrupting
    the standoff and forcing Bok to hold a knife to Jason’s throat. Picard, recognizing
    Bok’s deception, reveals that Jason is not his biological son—Bok had resequenced
    Jason’s DNA to frame Picard for paternity. The Ferengi crew, realizing Bok’s scheme
    was never about profit but vengeance, turn against him. Tol disarms Bok, and Picard
    secures their release by threatening the Enterprise’s imminent attack. The scene
    pivots from Jason’s desperate negotiation to Picard’s strategic dismantling of
    Bok’s authority, exposing the Ferengi’s fraud and shifting the power dynamic in
    an instant. The revelation forces Jason to confront the truth of his origins while
    Picard asserts control over the situation, leveraging both logic and the Ferengi’s
    profit-driven instincts to neutralize the threat. The event resolves the immediate
    crisis but leaves lingering questions about Jason’s identity and Picard’s unresolved
    past with Miranda Vigo.
