- fabula_uuid: cand_evt_scene_490f27c2be14bc7b_01
  global_id: null
  title: Birta’s Intel Narrows Bok’s Trail
  description: 'On the *Enterprise* bridge, Picard and his senior officers—Data, Geordi,
    and Worf—struggle to decode the encrypted probe’s origin, revealing only that
    it passed through a Dichromic Nebula and near a class four pulsar. Before they
    can proceed, Daimon Birta’s transmission arrives, offering cryptic but critical
    intelligence: Bok was imprisoned for instability, escaped by paying his debt,
    and was last seen in the Dorias cluster. Though Birta dismisses responsibility
    for Bok’s actions, his information proves pivotal—Geordi and Data cross-reference
    it with the probe’s particle signature, pinpointing the Xendi Kabu system as the
    launch site. Picard, seizing the lead, immediately orders the *Enterprise* to
    set course, propelling the crew toward a confrontation with Bok and the truth
    about Jason Vigo’s fate. The scene underscores the tension between bureaucratic
    Ferengi indifference and Picard’s relentless pursuit of justice, while the crew’s
    technical collaboration highlights their reliance on both instinct and data to
    unravel Bok’s scheme. The revelation of Xendi Kabu as the origin serves as a narrative
    turning point, shifting the story from investigation to direct action and raising
    the stakes for Jason’s safety and Picard’s reckoning with his past.'
