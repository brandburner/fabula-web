  object_involvements:
  - object_uuid: ger_object_554a959815d6
    description_of_involvement: The Ferengi probe is the physical manifestation of
      Bok’s threat, delivering his holographic ultimatum and serving as a critical
      clue in the investigation. Picard orders Worf to secure it with a tractor beam
      to determine its safety and origin. The probe’s encrypted data and subspace
      signature will later reveal Bok’s ship coordinates, making it a pivotal object
      in tracing the threat. Its presence on the bridge symbolizes the immediate danger
      and the need for swift action.
    status_before_event: Approaching the Enterprise at high warp, transmitting Bok’s
      holographic message and hailing Picard by name. Its encrypted data and subspace
      signature are untapped but contain critical information about its origin and
      Bok’s location.
    status_after_event: Secured by Worf’s tractor beam, awaiting analysis to determine
      its safety and trace its path through the Dichromic Nebula and past the class
      four pulsar to Xendi Kabu. The probe’s data will be extracted to uncover Bok’s
      ship coordinates and potential further threats.
    global_id: ger_object_554a959815d6
  - object_uuid: ger_object_e8dbcce11a6e
    description_of_involvement: Daimon Bok’s uniform, as seen in the holographic projection,
      is a symbol of his authority and a critical clue in assessing the legitimacy
      of his threat. Picard points to the uniform when ordering Riker to contact the
      Ferengi Government to verify Bok’s current status and rank. The uniform’s insignia
      and design serve as concrete evidence, grounding the investigation in tangible
      details rather than mere claims. Its presence in the hologram reinforces Bok’s
      seriousness and the potential official sanction behind his actions.
    status_before_event: Worn by Bok in the holographic projection, displaying his
      Daimon rank and Ferengi insignia. The uniform is a visual cue to his authority
      and a trigger for Riker’s investigation into his current status.
    status_after_event: Referenced in Riker’s inquiry to the Ferengi Government, where
      its insignia and design will be used to verify Bok’s rank and the legitimacy
      of his threat. The uniform’s details will inform the crew’s understanding of
      Bok’s power and influence.
    global_id: ger_object_e8dbcce11a6e
  - object_uuid: ger_object_4b9c945fe480
    description_of_involvement: Federation records on Jason Vigo and Miranda Vigo
      are the primary investigative tool assigned to Data. Picard directs him to search
      these records to verify Jason Vigo’s existence and confirm his connection to
      Miranda Vigo, a woman Picard had a past relationship with on New Gaul. The records
      serve as the factual backbone of the investigation, providing the evidence needed
      to assess the validity of Bok’s claim. Their discovery will either confirm or
      deny the paternity claim, shaping Picard’s next steps.
    status_before_event: Stored in Federation databases, untapped but containing critical
      information about Jason Vigo’s identity, lineage, and Miranda Vigo’s history.
