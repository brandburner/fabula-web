  sequence_in_scene: 2
  key_dialogue: &id003
  - 'BOK: I trust you remember me, Picard, because I haven’t forgotten you... or how
    you murdered my son...'
  - 'BOK: For fifteen years I’ve thought about how to avenge his death... but nothing
    I could do to you could equal what you did to me... until now.'
  - 'BOK: You thought you could hide him from me, didn’t you? But I found out about
    him... Jason Vigo is as good as dead. I’m going to kill your son, Picard, just
    like you killed mine...'
