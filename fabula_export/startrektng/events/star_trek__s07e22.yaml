- fabula_uuid: act_af03f8a6356739c3
  number: 4
  summary: 'Act Four intensifies the personal and external threats facing Picard and
    Jason. In Sickbay, Beverly Crusher diagnoses Jason with Forrester-Trent syndrome,
    a rare and degenerative neurological disorder, revealing its hereditary nature.
    However, she notes the puzzling absence of the disease in both Picard and Jason''s
    mother, Miranda, suggesting a potential random mutation and initiating further
    micro-cellular scans. Picard, deeply distressed by Jason''s illness and his own
    helplessness, confides in Beverly, admitting his earlier reluctance to connect
    with Jason stemmed from his own inexperience and fear, validating Beverly''s earlier
    insightful challenge. Beverly offers gentle guidance, emphasizing the importance
    of patience and simply being present for Jason now. Meanwhile, Geordi and Data
    make a critical breakthrough, identifying Bok''s method of infiltration: an unstable,
    energy-intensive subspace transporter, which explains his silent appearances and
    ability to bypass shields. Picard, realizing this technology could also be used
    to abduct Jason, orders Geordi and Data to establish a constant signal lock on
    his son. Seeking to bridge the emotional gap, Picard joins Jason in the Holodeck,
    where Jason is rock climbing. During this shared activity, Jason, finally opening
    up, recounts the tragic story of his mother''s death, killed while protecting
    orphaned children on Camor. He then confesses his criminal past, but Picard, already
    aware, reaffirms his unwavering connection, stating that Jason''s past does not
    diminish their bond. This vulnerable exchange marks a significant step in their
    relationship. The fragile connection is shattered when Beverly summons Picard,
    indicating she has crucial news from Jason''s micro-cellular scan. Simultaneously,
    Bok attempts to beam Jason directly from his quarters. Despite Geordi''s frantic
    efforts to maintain a signal lock, Jason partially materializes on the transporter
    pad before completely vanishing, abducted by Bok''s superior subspace technology.
    Picard, arriving just in time to witness Jason''s disappearance, is left with
    a profound sense of failure and devastation.'
