  global_id: null
  title: Picard climbs to Jason’s trust
  description: "\n  Picard deliberately isolates himself with Jason on the holodeck’s\
    \ cave simulation, dismissing security to create an unguarded space. He climbs\
    \ the rockface to demonstrate his skill and establish credibility, mirroring Jason’s\
    \ own climbing prowess. The act lowers Jason’s defenses, allowing Picard to probe\
    \ into Miranda’s past—a topic Jason has avoided. Through shared vulnerability,\
    \ Picard reveals his regret over his estranged relationship with his own father,\
    \ while Jason reluctantly shares the trauma of Miranda’s death and his own criminal\
    \ history. Picard’s insistence on their connection, despite Jason’s self-loathing,\
    \ creates a fragile but critical alliance. The moment hinges on Picard’s calculated\
    \ risk: by exposing his own flaws and past failures, he disarms Jason’s resistance,\
    \ setting the stage for a tentative father-son bond. The revelation of Bok’s impending\
    \ discovery looms as subtext, heightening the urgency of their emotional exchange.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e22
  scene_sequence: 19
  sequence_in_scene: 31
  key_dialogue:
  - 'PICARD: I like climbing. There''s something about... literally having your fate
    in your own hands.'
  - 'JASON: She heard about the children on Camor who''d been orphaned during the
    Cardassian war... She found this big house... and started rounding up children.
    Eventually, there were over forty of them... Then one day... two men attacked
    her... on the street in broad daylight... for the food she was carrying... If
    she''d just given it to them, they probably wouldn''t have hurt her. But she knew
    we needed the food... So they killed her.'
  - 'PICARD: I know. I''m aware of your trouble with the Camor authorities. It doesn''t
    change anything. You''re still my son. And, like it or not, I''m your father.
    I don''t know what that means, but I know it means something. That we''re... connected...'
