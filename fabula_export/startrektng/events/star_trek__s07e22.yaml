- fabula_uuid: cand_evt_scene_dafccf0f14f5c02e_01
  global_id: null
  title: Bok abducts Jason via transporter
  description: "\n  The scene opens with Picard mid-conversation in Beverly’s office\
    \ when Riker’s urgent com signal interrupts, revealing Daimon Bok’s transporter\
    \ beam is targeting Jason’s quarters. Data confirms the beam’s focus, and Riker\
    \ identifies the location as Jason’s room. In the transporter room, Geordi scrambles\
    \ to counter the beam, but Bok’s signal proves too strong. As Rhodes and Garvey\
    \ burst into Jason’s quarters, they find him standing by the replicator—only for\
    \ his body to begin dematerializing under Bok’s transporter effect. Jason’s horrified\
    \ reaction as he watches his hands fade underscores his helplessness. In the transporter\
    \ room, Geordi attempts a counter-transport, but Bok re-establishes his lock,\
    \ and Jason’s body flickers between materialization and dematerialization. Picard\
    \ arrives just in time to witness Jason’s complete disappearance, his outstretched\
    \ hand too late to intervene. The moment forces Picard to confront the brutal\
    \ reality of Bok’s leverage: Jason is now in the Ferengi’s clutches, and Picard’s\
    \ past has become a weapon against him. The scene escalates the stakes by stripping\
    \ Picard of control, leaving him powerless as Bok’s vengeance unfolds.\n  "
