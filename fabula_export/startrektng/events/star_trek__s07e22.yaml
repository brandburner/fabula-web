  scene_sequence: 17
  sequence_in_scene: 28
  key_dialogue:
  - 'GEORDI: I think we''ve found something...'
  - 'DATA: Bok was in direct contact with this chair for an extended period... it
    is showing a distinctive subspace signature as a result.'
  - 'PICARD: My understanding is that such devices were impractical.'
  - 'DATA: The Federation abandoned its research in the field because the technology
    was found to be unreliable... as well as extremely energy intensive.'
  - 'PICARD: What range would this kind of transporter have?'
  - 'DATA: In theory it could operate over several light years.'
  - 'PICARD: I''m concerned that he''s going to try to take Daniel -- is there any
    way we can protect him?'
  - 'GEORDI: We could keep a signal lock on him at all times... if Bok tried to beam
    him away, we might be able to keep him from getting a pattern lock.'
  - 'PICARD: Make it so.'
