  title: Worf confronts Klingons' self-imposed exile
  description: In the meeting hall, Worf challenges L'Kor and the Klingon survivors
    about their decision to remain with the Romulans rather than return to the Empire
    in perceived dishonor. The survivors reveal their brutal capture at Khitomer,
    their failed suicide attempts, and their choice to stay as prisoners to preserve
    their families' honor. Worf argues that their continued captivity is dishonorable,
    but the Klingons dismiss his Starfleet identity as irrelevant, exposing a generational
    and ideological rift. L'Kor's chilling admission—that he hopes his son would kill
    him if found—underscores the depth of their shame and forces Worf to confront
    the cost of his own unyielding principles. The exchange leaves Worf grappling
    with the tension between Klingon tradition and Starfleet's evolving values, while
    the survivors' refusal to acknowledge the outside world highlights their emotional
    and cultural isolation. The moment serves as a turning point, deepening Worf's
    existential crisis and setting up his later conflict with Tokath and the younger
    Klingons' cultural awakening.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e17
  scene_sequence: 1
  sequence_in_scene: 1
  key_dialogue:
  - |-
    L'KOR: We cannot leave this place.
    WORF: Are you afraid to die escaping?
    L'KOR: We are dead, Worf. We died at Khitomer.
  - |-
    GI'RAL: We were defending an outpost on the perimeter... the Romulans took out our shields... their next blast rendered us unconscious... when we awoke... we were prisoners... unarmed and shackled.
    WORF: Why did you allow it to happen?
    GI'RAL: We had no choice!
  - |-
    L'KOR: The Romulan Commander -- Tokath -- thought he was being kind.
    GI'RAL: When it was clear that we would be of no use to them, Tokath offered to let us go.
    L'KOR: But we knew that our families believed we had fallen in battle. We did not wish to return and dishonor them.
  - |-
    WORF: I understand your desire to preserve your families' honor. But what of your own? There is no honor in remaining prisoners.
    L'KOR: We lost our honor when we were captured. It does not matter what happens to us.
  - |-
    L'KOR: Why did you come here, Worf? If you had found your father... you would have found only dishonor.
    WORF: If he had been captured as you were, if I had found him here... I would be glad to see him. There would be no room in my heart for shame.
    L'KOR: Much has changed since Khitomer. I can only hope that if my son came here... he would be Klingon enough to kill me.
