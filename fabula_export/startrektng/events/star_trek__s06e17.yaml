  title: Picard and Troi debate Worf’s divided loyalty
  description: On the *Enterprise* bridge, Picard and Troi discuss Worf’s disappearance
    and his internal conflict over his father’s fate. Picard orders a search for the
    Yridian trader who last saw Worf, while Troi reveals Worf’s contradictory desires—both
    hoping his father is dead (to spare him dishonor) and desperately wanting to find
    him (to reclaim honor). Their exchange forces Picard to question whether imprisoned
    Klingons would even *want* rescue, exposing the moral ambiguity of their mission
    and Worf’s fractured identity. The scene underscores the emotional stakes of Worf’s
    absence and the broader tension between duty and personal reckoning.
