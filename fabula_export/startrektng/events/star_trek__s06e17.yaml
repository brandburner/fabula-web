      by the Romulan guards, the Klingon elders, and the physical structures like
      the compound wall and storage barrels that Worf manipulates.
    power_dynamics: The colony operates under the Romulans’ authority, with Klingon
      culture suppressed and the younger generation willfully ignorant of their heritage.
      Worf’s escape disrupts this dynamic, exposing the colony’s fragility and the
      power imbalance between the Romulans and the Klingons.
