  scene_sequence: 9
  sequence_in_scene: 17
  key_dialogue:
  - 'WORF: ... Kahless held his father''s lifeless body in his arms. He could not
    believe what his brother had done. Then his brother threw their father''s sword
    into the sea, saying that if he could not possess it, neither would Kahless. That
    was the last time the brothers would speak.'
  - 'TOQ: That is impossible!'
  - 'WORF: For you, perhaps. Not for Kahless. He was a great warrior.'
  - 'WORF: These are our stories. They tell us who we are.'
