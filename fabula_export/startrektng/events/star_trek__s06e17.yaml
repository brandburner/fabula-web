- fabula_uuid: cand_evt_scene_f5efa6176686a0f4_02
  global_id: null
  title: Worf exposes colony’s hidden control
  description: "\n  Worf’s reconnaissance of the compound reveals a community living\
    \ in willful ignorance of their past, their culture, and their freedom. His confrontation\
    \ with Toq over the desecration of a sacred Klingon spear—used as a gardening\
    \ tool—exposes the younger generation’s erasure of their heritage, while Toq’s\
    \ dismissive attitude underscores the colony’s deliberate suppression of Klingon\
    \ identity. When Ba’el approaches, Worf plants seeds of doubt by questioning the\
    \ colony’s ‘safety’ and suggesting she test its openness by requesting to visit\
    \ the Klingon homeworld. Her defensive reaction and Gi’ral’s abrupt interruption\
    \ reveal the colony’s oppressive control, forcing Worf to confront the hypocrisy\
    \ of a ‘peaceful’ coexistence built on lies. The moment crystallizes the generational\
    \ divide, the colony’s true nature as a prison, and Worf’s moral conflict between\
    \ duty and truth. His hidden transponder activation signals his intent to act\
    \ on these revelations, setting up his eventual defiance of the colony’s rules.\n\
    \  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e17
  scene_sequence: 2
  sequence_in_scene: 4
  key_dialogue: &id003
  - |-
    WORF: This is a Gin'tak spear.
    TOQ: What of it?
    WORF: Have your parents taught you nothing? This is used for battle—not for tilling soil.
    TOQ: We have no need for weapons here. The war is far away.
    WORF: What war?
    TOQ: The war our parents came here to escape.
  - |-
    BA'EL: Aren’t you happy to escape the war?
    WORF: The war... BA'EL: Yes... we’ve heard the stories all our lives. How people are slaughtered in terrible battles... forced to fight, whether they want to or not. That’s why our parents came here—to make a safe home... a place where they could raise their children in peace. I should think you’d be relieved to get away from the fighting. You’re safe here.
    WORF: A place can be safe—and still be a prison. Where I come from, people are free to come and go as they choose.
  - |-
    WORF: Tell your Father you would like to leave. Tell him you want to visit the Klingon home world. See what he says.
    BA'EL: Why would I want to go there? It’s dangerous.
    WORF: Not any longer.
    GI'RAL: (off-camera) Ba'el! Come here!
    BA'EL: Yes, mother.
    GI'RAL: (harsh whisper) I told you not to speak with him.
