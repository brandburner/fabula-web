      survivors and Romulans, built on mutual sacrifice but enforced through the suppression
      of Klingon heritage. The colony''s institutions—Tokath''s leadership, the elders''
      authority, and the Romulan Guards'' enforcement—are all tested as the youth
      defy the execution. The colony''s survival depends on unity, but that unity
      is shattered by the youth''s embrace of their identity. The organization''s
      internal dynamics are laid bare: the elders'' complicity in suppression, Tokath''s
      fractured leadership, and the youth''s rejection of the status quo.'
