      allowing Tokath to oversee the Klingons).
    influence_mechanisms:
    - Through policy (the order to execute the Klingons unless Tokath stayed).
    - Through personal pressure on Tokath (his career sacrifice and the threat of
      reinstating the execution order).
    - Through institutional memory (Tokath’s reference to the High Command’s directives
      as a warning to Worf).
    institutional_impact: The High Command’s policies create a moral dilemma for Tokath,
      forcing him to balance his duty to Romulan authority with his personal bonds
      to the Klingons. Their influence is the unseen hand shaping the colony’s fragile
      peace, and their potential reinstatement of the execution order hangs as a threat
      over Worf’s actions.
    internal_dynamics: Tokath’s personal defiance of the High Command’s orders (by
      protecting his Klingon family) creates internal tension, as he operates within
      the system while subtly undermining it. His marriage to Gi'ral is a direct challenge
      to Romulan-Klingon norms, reflecting a broader ideological rift within the organization.
