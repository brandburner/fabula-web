    what_happened: 'The Romulan guards crash through the jungle foliage like a disciplined
      force, their boots pounding the earth in unison. They move with the efficiency
      of soldiers who have spent decades maintaining order in a colony that has known
      no threats—until now. Their weapons are drawn not out of fear, but routine,
      as if capturing an intruder is a chore rather than a crisis. They surround Worf
      with clinical precision, their expressions unreadable behind the masks of duty.
