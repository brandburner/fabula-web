    description_of_involvement: The Romulan Guard’s involvement in this event is the
      embodiment of institutional control. Their disciplined pursuit and capture of
      Worf are not personal vendettas, but the execution of their duty to maintain
      the colony’s secrecy and stability. The guards’ actions reflect the Romulan
      Star Empire’s broader policy of suppressing Klingon culture, ensuring that the
      survivors remain pacified and isolated. Their presence here is a reminder that
      the colony’s peace is not natural, but enforced through relentless vigilance.
      The guards’ efficiency in capturing Worf underscores their role as the enforcers
      of Romulan authority, willing to use force to preserve the status quo.
    active_representation: Via collective action—multiple guards pursue, surround,
      and capture Worf, their movements synchronized and purposeful. Their weapons
      and uniforms symbolize Romulan military authority.
    power_dynamics: Exercising overwhelming authority over Worf and the colony. Their
      control is absolute in this moment, backed by the full weight of Romulan institutional
      power. Worf, despite his strength, is outmatched not just physically, but by
      the system the guards represent.
    organizational_goals:
