  title: Worf demands hunting rights
  description: 'Worf challenges Tokath’s authority by demanding permission to train
    outside the compound, invoking his Klingon warrior’s honor as proof of his loyalty.
    Tokath initially refuses, citing Worf’s past escape attempt, but L’Kor’s intervention—backed
    by his own unbroken word—pressures Tokath into a reluctant concession. The compromise
    comes with a lethal condition: Toq, a young Klingon, is assigned to execute Worf
    if he flees. The exchange exposes Tokath’s distrust, L’Kor’s lingering faith in
    Klingon honor, and Worf’s calculated risk-taking to regain autonomy while subtly
    testing the colony’s fragile stability. The scene crystallizes Worf’s precarious
    position: his honor is both his leverage and his liability in this fractured society,
    where survival depends on navigating Romulan-imposed rules and Klingon cultural
    revivalism.'
