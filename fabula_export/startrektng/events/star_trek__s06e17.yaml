      in this event, shaping Worf’s actions and beliefs. His refusal to flee execution
      is rooted in the Empire’s warrior code, which dictates that death in battle
      is preferable to dishonor. The Empire’s influence is felt in Worf’s dialogue—his
      insistence that Ba'el ‘does not yet understand what it is to be Klingon’—and
      in the cultural divide it creates between him and the colony’s assimilated Klingons.
      Though the Empire is not physically present, its ideological weight is inescapable.
