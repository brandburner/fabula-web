- fabula_uuid: cand_evt_scene_e295253613fcb127_01
  global_id: null
  title: Worf's Surveillance and Mok'bara Defiance
  description: "\n  Tokath, acting on suspicion of the Yridian ship's escape, implants\
    \ a boridium tracking device in Worf's arm—a brutal assertion of Romulan control—while\
    \ assigning Toq as his guard. The procedure is clinical but humiliating, stripping\
    \ Worf of autonomy and reinforcing his status as a prisoner. L'Kor, though sympathetic,\
    \ enforces the colony's rules, leaving Worf seething with defiance. Moments later,\
    \ Worf channels his frustration into teaching Mok'bara to the colony's young Klingons,\
    \ including Ba'el, who are drawn to the forgotten warrior traditions. When Toq\
    \ attempts to intervene, Worf effortlessly disarms him, demonstrating both his\
    \ skill and the futility of the colony's attempts to suppress Klingon identity.\
    \ The scene crystallizes the tension between Worf's Klingon pride and the colony's\
    \ enforced submission, while planting the seeds for a cultural awakening among\
    \ the younger generation. The tracking device becomes a physical symbol of Worf's\
    \ forced compliance, while his Mok'bara lesson becomes an act of quiet rebellion,\
    \ foreshadowing his role as a catalyst for change.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e17
  scene_sequence: 7
  sequence_in_scene: 13
  key_dialogue: &id011
  - 'TOKATH: We haven''t had to use one of these in a long time. It implants a small
    boridium pellet under the skin... we can use its energy signature to track you.'
  - 'WORF: Never.'
  - 'WORF: The Mok''bara... The forms clear the mind... and center the body.'
  - 'WORF: The forms are the basis for Klingon combat. You would be wise to learn
    them.'
  - 'TOQ: We''ll see what L''Kor thinks of this.'
