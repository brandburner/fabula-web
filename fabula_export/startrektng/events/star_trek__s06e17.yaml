  key_dialogue:
  - |-
    BA'EL: What do you want?
    WORF: I... I am sorry if I upset you.
    BA'EL: There's nothing wrong with what I am.
    WORF: What I mean is... it is not your fault.
    BA'EL: What? Being born? I'm sorry if that offends you.
  - |-
    WORF: I don't know.
    BA'EL: Can't you leave the hatred behind, too? Can't you accept me... as I am?
  - |-
    GI'RAL: My husband died at Khitomer. We had left a son on the Home World... five years old. The first year I was here I thought I would die from the pain of knowing I'd never see him again.
    ... I looked at Tokath... our captor. I saw that he was a kind man... and a lonely one. And I knew that he was looking at me, as well.
    ... I am not ashamed of that decision, and I won't be judged for it. Leave this house. You've done enough harm.
