  key_dialogue: &id021
  - 'TOKATH: I know there are those among you who may question what I''m about to
    do. And you would not be wrong to do so... What we have built together would be
    destroyed by this man. And I cannot let that happen.'
  - 'WORF: Your words are eloquent, Tokath. But the truth is that I am being executed
    because I brought something dangerous to your young people: knowledge. Knowledge
    of their origins. Knowledge of the real reasons you are here in this camp. The
    truth is a threat to you...'
  - 'TOQ: If you kill him... you will have to kill me, too. I want to leave... as
    do many others. You will have to kill us to keep us here.'
  - 'GI''RAL: Tokath... long ago, when your captives asked to stay here... we hoped
    not to dishonor our children on the Home World. But perhaps, over the years, we
    lost sight of the children we raised here. This is our prison. It should not be
    theirs.'
  - 'WORF: You must promise them—that you will never reveal their secret. No one must
    know of this place.'
