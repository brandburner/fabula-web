  title: Worf’s capture by Toq’s betrayal
  description: Worf, fleeing Romulan guards through the jungle, reaches a clearing
    where Shrek—the Yridian trader who brought him to the colony—waits with his shuttle.
    Just as Worf nears escape, Toq, a young Klingon from the colony, ambushes him
    from behind, tackling him to the ground. The betrayal stuns Worf, who recognizes
    Toq as one of his own kind, deepening the emotional wound of his capture. Before
    Worf can react, Romulan guards burst through the foliage and seize him, their
    weapons drawn. The scene ends with Toq’s satisfied expression, underscoring his
    role in the betrayal and the collapse of Worf’s fragile trust in the colony’s
    peace. This moment forces Worf into captivity, escalating the conflict between
    tradition and survival while exposing the fragility of the Klingon-Romulan alliance.
    The betrayal also marks a turning point in Toq’s arc, as his actions reveal his
    internal conflict between loyalty to the colony’s peace and the awakening Klingon
    heritage Worf has ignited in him. The event directly follows Worf’s escape and
    sets up his subsequent imprisonment, where he will confront the consequences of
    his defiance and the cost of his cultural reawakening among the younger generation.
