  - character_uuid: ger_agent_868446276ca7
    emotional_state: Shocked and betrayed, with a simmering rage beneath his stoic
      exterior. His physical exhaustion contrasts with the adrenaline-fueled desperation
      of his flight, culminating in a crushing sense of failure as he’s captured.
    goals:
    - Escape the Romulan colony and return to the *Enterprise* to report his findings
    - Protect the Klingon survivors from further Romulan oppression, even if it means
      defying Starfleet protocols
    what_happened: Worf flees through the jungle at a sprint, his breath ragged as
      he dodges Romulan guards and splashes through a pond, his boots sinking into
      the mud. He hides briefly in dense fronds, heart pounding, as guards pass within
      feet of him. Spotting Shrek’s shuttle in a clearing, he bolts toward it—only
      to be tackled violently to the ground by Toq. Stunned, he wrestles free and
      locks eyes with Toq, his expression shifting from confusion to betrayal. Before
      he can react, Romulan guards crash through the brush, weapons leveled, and seize
      him. His body tenses as he’s dragged away, the klaxon’s wail drowning out any
      protest.
    observed_status: Worf flees through the jungle at a sprint, his breath ragged
      as he dodges Romulan guards and splashes through a pond, his boots sinking into
