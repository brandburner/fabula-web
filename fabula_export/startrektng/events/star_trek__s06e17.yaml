  title: Worf’s capture by Toq and Romulans
  description: "\n  Worf flees through the jungle after triggering a colony-wide alarm,\
    \ pursued by Romulan guards. He narrowly evades capture by hiding in foliage but\
    \ is ambushed by Toq, the young Klingon he had begun to mentor. Toq’s betrayal—delivering\
    \ Worf to the Romulans—marks a brutal turning point: the colony’s fragile peace\
    \ shatters, and Worf’s defiance of Romulan authority is met with violent consequences.\
    \ The scene underscores the colony’s internal fractures, where even Klingon youth,\
    \ raised in secrecy, are torn between survival and heritage. Worf’s capture forces\
    \ the narrative toward a confrontation between duty (his Starfleet oath) and the\
    \ awakening cultural identity he ignited among the young Klingons. The event also\
    \ sets up Picard’s log entry, revealing Worf’s disappearance to the *Enterprise*\
    \ crew and raising stakes for the broader mission.\n  "
