      ignorant of their past and compliant with the colony’s rules.
    - Through the physical structures of the colony, such as the compound wall and
      storage barrels, which are used to maintain control and are later exploited
      by Worf.
    institutional_impact: Worf’s escape forces the colony to confront the unsustainability
      of its enforced peace. The explosion and alarm symbolize the breaking of this
      peace, and the subsequent crisis will likely lead to a reckoning with the colony’s
      cultural and political dynamics.
    internal_dynamics: The colony is divided between the elders, who uphold the rules
      to protect the community, and the younger generation, who are increasingly inspired
      by Worf’s teachings and defiant of the suppression of their heritage. This tension
