  sequence_in_scene: 14
  key_dialogue: &id013
  - 'BA''EL: What are you doing?'
  - 'WORF: The Mok''bara... The forms clear the mind... and center the body.'
  - 'WORF: This is the Mok''bara... a great warrior called Kahless invented the forms
    when he went to the underworld in search of his father. Kahless showed him the
    forms, and his father was able to remember his body and return to the world of
    the living.'
  - 'WORF: The forms are the basis for Klingon combat. You would be wise to learn
    them.'
  - 'WORF: I will teach you. Join us.'
