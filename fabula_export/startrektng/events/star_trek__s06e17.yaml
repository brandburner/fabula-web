  global_id: null
  title: Worf challenges Toq with Qa'vak
  description: Worf interrupts a group of young Klingons playing a modified version
    of the Qa'vak ritual, demonstrating its proper execution with precision. When
    Toq dismisses the tradition as irrelevant, Worf goads him into attempting the
    skill, subtly correcting his form and praising his progress. The exchange reveals
    Toq’s latent competitive spirit and Worf’s strategic intent to reawaken Klingon
    heritage. Worf then proposes teaching Toq to hunt—a forbidden act in the colony—planting
    the seeds for rebellion. Toq’s hesitation underscores the generational divide,
    while Worf’s confidence signals his willingness to defy Tokath’s authority, setting
    up their later confrontation over the ritual hunt’s legitimacy. The scene hinges
    on Worf’s dual role as mentor and provocateur, using discipline as a tool to challenge
    the colony’s passive coexistence with the Romulans.
