    what_happened: 'Shrek stands by his shuttle, his alien features tight with concern
      as he waves Worf toward him. His relief at seeing Worf is short-lived; the moment
      Toq ambushes him, Shrek’s expression shifts to resignation. He takes one last
      look at Worf—now wrestling with Toq on the ground—before melting back into the
      foliage, his shuttle’s engines already humming to life. He does not intervene,
      does not fight, does not even call out. His priority is self-preservation, and
      he disappears into the jungle like a shadow, leaving Worf to his fate. This
      is not cowardice, but pragmatism: Shrek’s survival depends on staying out of
      conflicts that do not directly involve him.'
