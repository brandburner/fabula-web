    description_of_involvement: 'The Romulan High Command is invoked indirectly through
      Tokath’s backstory, as he explains that his decision to oversee the colony ended
      his military career. Their policies—ordering the execution of Klingon survivors
      unless Tokath stayed to monitor them—frame the colony’s existence as a fragile
      compromise between Romulan authority and Klingon survival. The High Command’s
      influence is felt in Tokath’s warning to Worf: any disruption could reignite
      their wrath, threatening the colony’s peace. Their presence looms as the ultimate
      authority, shaping Tokath’s actions and the colony’s stability, even as he defies
      them personally by protecting his Klingon family.'
    active_representation: Via institutional protocol (Tokath’s career sacrifice)
      and implied threat (the High Command’s order to execute the Klingons).
    power_dynamics: Exercising authority over Tokath and the colony, but operating
      under constraint (Tokath’s personal defiance of their orders to protect his
      family).
    organizational_goals:
