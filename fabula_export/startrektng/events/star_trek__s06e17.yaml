- fabula_uuid: cand_evt_scene_7b373ba0493499a0_02
  global_id: null
  title: Gi'ral confronts Worf over hatred and love
  description: 'Worf arrives at Ba''el''s quarters to apologize for his earlier outburst,
    but his attempt to reconcile with her is clumsy and rooted in rigid Klingon-Romulan
    prejudices. When he suggests Ba''el ''cannot help being what she is,'' she rejects
    his condescension, forcing him to confront his own hypocrisy—he had been drawn
    to her before knowing her heritage. His inability to fully accept her as she is
    crushes Ba''el, who flees in tears. Gi''ral, witnessing the exchange, intervenes
    with a searing indictment of Worf''s judgment. She reveals her own devastating
    loss at Khitomer—her son, left behind on the Homeworld—and her deliberate choice
    to abandon hatred in favor of love with Tokath, a Romulan. Her defiance of Worf''s
    moralizing is absolute: she refuses to be shamed for her decision, ordering him
    to leave and protect her family from his toxic influence. The confrontation forces
    Worf to grapple with the cost of his own unyielding worldview, marking a rupture
    in their relationship and a turning point in his ideological awakening. Gi''ral’s
    speech becomes a thematic counterpoint to Worf’s rigid honor, exposing the fragility
    of his convictions and the human cost of vengeance.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e17
  scene_sequence: 13
  sequence_in_scene: 24
  key_dialogue:
  - |-
    BA'EL: What do you want?
    WORF: I... I am sorry if I upset you.
    BA'EL: There's nothing wrong with what I am.
    WORF: What I mean is... it is not your fault.
    BA'EL: What? Being born? I'm sorry if that offends you.
  - |-
    GI'RAL: My husband died at Khitomer. We had left a son on the Home World... five years old. The first year I was here I thought I would die from the pain of knowing I'd never see him again. Not a day goes by that I don't think of him, wonder about him. But I will never know who he is. I gave him up—because I loved him too much to dishonor him.
    WORF: I understand your sacrifice. And I respect it. But to mate with a Romulan—this I do not understand.
    GI'RAL: By the second year, I had stopped weeping for my son. There were days when I could even laugh... and I began to look around me and realize that this would be my world forever. I looked at Tokath... our captor. I saw that he was a kind man... and a lonely one. And I knew that he was looking at me, as well. In the third year I decided to give up hatred... and loneliness. I am not ashamed of that decision, and I won't be judged for it. Leave this house. You've done enough harm.
  - |-
    BA'EL: Worf... before you knew... you were attracted to me. Can't you leave the hatred behind, too? Can't you accept me... as I am?
    WORF: I don't know.
