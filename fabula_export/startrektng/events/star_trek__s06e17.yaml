      heritage. It functions as the ideological and moral framework that justifies
      his prejudice, framing Romulans as inherently dishonorable and their relationships
      with Klingons as obscene. The Empire’s influence is felt in Worf’s uncompromising
      stance, his demand for 'truth,' and his refusal to acknowledge the complexity
      of Ba’el’s situation. Meanwhile, the Empire’s cultural norms are challenged
      by Ba’el’s existence and her defiance of its rigid boundaries, foreshadowing
      the generational conflict to come.
    active_representation: Through Worf’s actions, dialogue, and moral absolutism,
      which embody the Empire’s honor codes and historical grievances (e.g., Khitomer).
    power_dynamics: Exercising ideological authority over Worf, who internalizes its
      values and enforces them in this confrontation. The Empire’s power is challenged
      by Ba’el’s mixed heritage and her refusal to accept its moral judgments, representing
      a younger generation’s pushback against traditional Klingon dogma.
    organizational_goals:
