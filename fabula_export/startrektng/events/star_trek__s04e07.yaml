      rivals (e.g., Worf).
    institutional_impact: The Council's involvement in this scene underscores its
      role as a corrupting force within Klingon society. Its willingness to cover
      up the Khitomer massacre and K'mpec's murder reveals a systemic rot that threatens
      the Empire's stability. K'Ehleyr's investigation, by exposing these machinations,
      poses a direct challenge to the Council's authority and could spark a broader
      reckoning with its practices.
    internal_dynamics: Factional tensions are implied, with Duras acting as a rogue
      element within the Council, using its institutional power for personal gain.
      There's also a hint of internal debate over how to handle the fallout from K'mpec's
      death, with some members (like Gowron) likely pushing for transparency, while
      others (like Duras) seek to exploit the chaos.
