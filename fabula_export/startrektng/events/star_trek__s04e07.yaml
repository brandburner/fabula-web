  title: Beverly reveals Duras' suicide bomber
  description: "\n  In Beverly Crusher’s office, she and Riker examine autopsy data\
    \ from the recent explosion that killed Klingon delegates. Beverly explains that\
    \ the lacerations and tissue damage from the blast were initially confusing, but\
    \ dynascans revealed a critical detail: one of the wounds originated *inside*\
    \ the victim’s forearm. This indicates the bomb was surgically implanted—a method\
    \ consistent with Klingon honor-based suicide tactics. When Riker asks which faction\
    \ the bomber belonged to, Beverly confirms it was one of Duras’ men, directly\
    \ implicating Duras in the assassination. The revelation escalates the political\
    \ stakes of K’mpec’s murder, as it suggests Duras is not only a murderer but also\
    \ willing to use Romulan technology (implied by the surgical precision) to eliminate\
    \ rivals. The discovery forces Riker to confront the brutal reality of Klingon\
    \ succession politics, where honor and betrayal are intertwined. This moment serves\
    \ as a turning point, shifting the investigation from speculation to concrete\
    \ evidence against Duras, while also foreshadowing the violent consequences of\
    \ Worf’s personal vendetta.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e07
  scene_sequence: 27
  sequence_in_scene: 48
  key_dialogue:
  - 'BEVERLY: There''s always a pattern to the lacerations and tissue damage. It would
    normally give us a clear indication of direction, distance, force of impact...'
  - 'RIKER: Normally?'
  - 'BEVERLY: In this case, the pattern was virtually impossible to identify... I
    couldn''t understand it until I checked the dynascans... This wound is different
    from all the others... it was made from the inside out. The bomb was implanted
    in one of their forearms.'
  - 'RIKER: It is considered an honorable way for a Klingon to die, Doctor... a suicide
    that also takes an enemy. Which one of them was it?'
  - 'BEVERLY: Duras'' man.'
