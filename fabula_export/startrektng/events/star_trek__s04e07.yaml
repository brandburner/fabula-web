  title: Worf Rejects Alexander’s Klingon Legacy
  description: 'K’Ehleyr confronts Worf in her quarters after he abruptly ends Alexander’s
    playtime, exposing his refusal to acknowledge their son as Klingon. Their argument
    escalates into a raw clash over honor, legacy, and Worf’s self-imposed exile from
    fatherhood. K’Ehleyr forces Worf to admit his discommendation stems from his father’s
    alleged betrayal at Khitomer, but Worf refuses to reveal the full truth—leaving
    their unresolved tension hanging as Riker’s summons interrupts. The scene underscores
    Worf’s fractured identity: a warrior without honor, a father without a son, and
    a Klingon without a House. His evasion of K’Ehleyr’s questions hints at deeper
    secrets about Khitomer, while his rejection of Alexander mirrors his own disowned
    past, setting up his later reckoning with Duras and his son’s future.'
