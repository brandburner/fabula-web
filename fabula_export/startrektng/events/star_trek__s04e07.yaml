  global_id: null
  title: Picard reveals Romulan detonator evidence
  description: During the ja'chuq recess, Picard deliberately halts Gowron and Duras
    from departing, exploiting their political vulnerability to force Worf’s inclusion
    in the investigation. When Worf reveals the Enterprise’s forensic analysis—identifying
    the bomb’s Romulan molecular-decay detonator—the revelation triggers immediate
    outrage. Gowron’s dismissive claim of 'inconclusive' findings is exposed as a
    lie, while Duras’s evasive body language (avoiding Worf’s stare) and abrupt exit
