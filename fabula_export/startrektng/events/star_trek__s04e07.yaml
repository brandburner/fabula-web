  title: Worf’s Vengeance Roar and Alexander’s Witnessing
  description: Worf and Alexander discover K'Ehleyr mortally wounded in her quarters,
    her final breaths revealing Duras as her killer. As she dies in Worf’s arms, she
    binds Alexander to him by placing the boy’s hand in his, a symbolic transfer of
    responsibility. Worf’s grief erupts into a primal roar—a Klingon ritual of mourning
    and a declaration of vengeance—while he forces Alexander to confront death directly,
    commanding him to 'look... and always remember.' The moment crystallizes Worf’s
    shift from Starfleet officer to Klingon warrior, his rage overriding duty, while
    Alexander is thrust into the brutal cycle of Klingon honor. Beverly arrives too
    late to save K'Ehleyr, and Worf departs abruptly, leaving Alexander in her care
    as he prepares to pursue Duras. The scene serves as both a turning point in Worf’s
    arc (abandoning Starfleet for vengeance) and a traumatic initiation for Alexander
    into the consequences of Klingon justice.
