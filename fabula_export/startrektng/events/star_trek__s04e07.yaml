    global_id: ger_object_6ecdef60b2de
  - object_uuid: ger_object_ba97dc6fd3a3
    description_of_involvement: "\n        The Klingon vessels Vorn and Buruk are\
      \ mentioned by Wesley as holding stations 13 kilometers from the *Enterprise*,\
      \ their presence a constant reminder of the Klingon Empire’s military might\
      \ and the high stakes of the succession crisis. While they do not physically\
      \ interact with the bridge crew, their proximity and the tension they represent\
      \ are palpable, serving as a backdrop to Duras’s transmission. Their role is\
      \ symbolic—representing the looming threat of Klingon aggression and the fragile\
      \ peace that Picard is trying to maintain. The mention of their positions also\
      \ underscores the *Enterprise*’s vulnerability, surrounded by hostile forces\
      \ while Picard navigates a diplomatic minefield.\n      "
    status_before_event: Holding stationary positions 13 kilometers from the *Enterprise*,
      their weapons and shields at standby, awaiting further orders from Duras or
      Gowron.
    status_after_event: Remain in their positions, but their presence is now framed
      by the aftermath of Duras’s transmission, with the crew aware that the Klingon
