  key_dialogue:
  - 'PICARD: We haven''t completed our analysis of the bomb debris... and Doctor Crusher
    is still studying the remains of the two men killed in the explosion. We need
    more time.'
  - 'K''EHLEYR: Duras and Gowron will be here in a few minutes. I don''t think you
    can delay this meeting again.'
  - 'PICARD: Is there some way of stretching out the formalities once they arrive?'
  - 'K''EHLEYR: In the modern Rite of Succession, only a brief proclamation that two
    challengers have been chosen is necessary.'
  - 'PICARD: You said ''modern Rite''... how was the ritual performed in the past?'
  - 'K''EHLEYR: The old forms dictated that the challengers perform the *ja''chuq*.
    It''s a long, involved ceremony where the challengers list the battles they''ve
    won, the prizes they''ve taken... the idea is to prove their worthiness to lead
    the Council.'
  - 'PICARD: Can the old form still be used?'
  - 'K''EHLEYR: It''s up to you... you can use any form you want.'
  - 'K''EHLEYR: Captain... What do you know about Worf''s discommendation?'
  - 'PICARD: I''m sorry... but I cannot discuss it.'
