  title: Beverly discovers K'Ehleyr's murder
  description: 'Beverly Crusher confirms K''Ehleyr''s death from multiple stab wounds,
    revealing the brutality of the attack and the impossibility of saving her. Picard
    and Riker immediately realize Worf''s absence is suspicious—especially when the
    computer confirms he transported to the Klingon ship *Vorn* shortly after the
    murder. The discovery forces Picard into a crisis: Worf''s sudden disappearance
    suggests guilt or vengeance, both of which threaten the fragile Klingon succession
    negotiations. The moment shifts the story from political intrigue to personal
    tragedy, with Worf''s actions now a direct challenge to Picard''s authority and
    the Federation''s role in the crisis. The tension escalates as Riker prepares
    to pursue Worf, while Picard is left grappling with the implications of a Klingon
    officer''s betrayal of Starfleet trust.'
