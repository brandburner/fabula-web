  global_id: null
  title: K'Ehleyr reconstructs Worf's hidden past
  description: After her volatile confrontation with Worf in the turbolift, K'Ehleyr
    returns to her quarters visibly unsettled but determined to uncover the truth
    about his past. She initiates a methodical investigation by accessing restricted
    mission logs from the Enterprise's last visit to the Klingon homeworld, seeking
    clues about Worf's discommendation and its connection to the current political
    crisis. When she encounters security barriers blocking Worf's personal records,
    she adapts her strategy—systematically reviewing other officers' logs in chronological
    order to piece together the events surrounding his history. Her actions reveal
    her growing suspicion that Worf's past holds critical secrets tied to Duras's
    involvement in K'mpec's murder, while also demonstrating her own political acumen
    and willingness to bypass Klingon protocols for the sake of truth. The scene underscores
    her role as both an investigator and a mother protecting her son's future, as
    well as her complex relationship with Worf—one marked by both intimacy and distrust.
