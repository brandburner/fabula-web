- fabula_uuid: cand_evt_scene_f329e155fc916b6b_01
  global_id: null
  title: Worf rejects K'Ehleyr's intimacy and defends Klingon honor
  description: 'In the confined space of a turbolift, K''Ehleyr tests Worf''s emotional
    walls by flirting with him, her sardonic remark—''Not even a bite on the cheek
    for old time''s sake?''—designed to provoke a reaction. Worf responds with cold
    formality, invoking his discommendation as a barrier, but when she challenges
    his commitment to Klingon traditions, his restraint shatters. His eruption—''You
    may not respect our traditions... I do!''—reveals the raw, unresolved conflict
    between his personal shame and his unshaken cultural identity. The exchange escalates
    when K''Ehleyr delivers a devastating verbal strike: ''What should I tell Alexander...
    that he has no father?'' This forces Worf to confront his paternal abandonment,
    leaving him emotionally shattered as he exits abruptly. The moment underscores
    his internal struggle: a warrior stripped of honor yet bound by the very traditions
    that cast him out, while K''Ehleyr’s persistence highlights her role as a bridge
    between his past and present obligations.'
