- fabula_uuid: cand_evt_scene_aac420baea8caff3_02
  global_id: null
  title: Picard asserts command amid succession crisis
  description: On the *Enterprise* bridge, Picard maintains icy composure as Duras
    challenges his authority over the Klingon succession ceremony, his impatience
    and hostility revealing the high-stakes political tension. When Worf and K'Ehleyr
    arrive, Duras publicly insults Worf as a 'pahtk' (a disgraced Klingon), forcing
    Picard to terminate the transmission and reassert control. He then issues precise
    orders to Data (contact Gowron) and Worf (prepare for the ceremony), demonstrating
    his strategic acumen while subtly acknowledging Worf’s personal turmoil. The scene
    underscores Picard’s role as the reluctant arbiter of Klingon succession, where
    every command carries weight in the unfolding power struggle. The moment also
    highlights Duras’s antagonism and Worf’s marginalized status, setting up future
    conflicts over honor and vengeance.
