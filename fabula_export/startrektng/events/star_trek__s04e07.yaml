  global_id: null
  title: Duras publicly humiliates Worf on bridge
  description: During a tense transmission with Duras, Picard asserts his authority
    over the Klingon succession ceremony, setting a one-hour deadline. When Worf and
    K'Ehleyr enter the bridge, Duras immediately targets Worf, calling him a *pahtk*
    (a dishonorable outcast) and demanding he be excluded from the ceremony. Picard,
    recognizing the escalating conflict, abruptly terminates the transmission, but
    not before Duras’s insults land. The exchange deepens Worf’s internal conflict—his
    discommendation is now publicly weaponized by his enemy, forcing him to confront
    his marginalized status in Klingon society. The moment also underscores Picard’s
    strategic control over the situation, though the unresolved tension leaves Worf’s
    honor—and the Federation-Klingon alliance—further strained. The scene serves as
    a microcosm of the broader succession crisis, where personal vendettas and political
    maneuvering collide.
