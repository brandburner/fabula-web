  object_involvements:
  - object_uuid: ger_object_524cf2311f3b
    description_of_involvement: 'The poison *Veridium Six* is the narrative catalyst
      of this event, introduced by Picard as the method of K’mpec’s murder. Its mention
      is brief but devastating—it shatters Worf’s worldview by revealing that a Klingon
      leader was killed in a dishonorable manner, forcing him to question the very
      foundations of his cultural identity. The poison symbolizes the erosion of Klingon
      honor and the political corruption seeping into the High Council. Its slow-acting
      nature (mentioned in the canonical description) adds a layer of irony: the murder
      was not just dishonorable but also cowardly, as it allowed the assassin to avoid
      direct confrontation.'
    status_before_event: Unknown to Worf; Picard possesses this knowledge as a result
      of his private meeting with K’mpec on the Klingon cruiser.
    status_after_event: Revealed to Worf, who reacts with shock and disbelief. The
      poison becomes a symbol of the moral decay in Klingon politics, haunting Worf’s
