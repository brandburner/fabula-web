  title: Worf rejects K'Ehleyr's oath but accepts mentorship
  description: 'Worf visits K''Ehleyr under the pretense of official duty, but their
    unresolved emotional bond immediately surfaces. K''Ehleyr, sensing his true motives,
    challenges his denial of their connection, forcing Worf to confront his lingering
    devotion. Their charged exchange reveals Worf''s internal conflict: while he acknowledges
    their Klingon bond (''My blood calls to yours''), he refuses to take the oath
    due to his discommendation, fearing it would shame their son, Alexander. K''Ehleyr,
    though wounded, proposes a compromise—allowing Worf to serve as Alexander''s mentor
    rather than father. Worf reluctantly agrees, marking a fragile step toward reconnection
    despite his rigid adherence to Klingon honor. The scene underscores Worf''s struggle
    between personal desire and duty, while K''Ehleyr''s persistence highlights her
    willingness to defy tradition for their relationship. The unresolved tension leaves
    their bond precarious, complicating Worf''s loyalty to Picard and his role in
    the succession crisis.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e07
  scene_sequence: 12
  sequence_in_scene: 24
  key_dialogue:
  - |-
    WORF: I... have not received your report on the explosion.
    K'EHLEYR: Two Klingons killed... a few minor injuries.
    K'EHLEYR: Were you concerned about me?
    WORF: As head of security... it is my duty to be concerned.
  - |-
    K'EHLEYR: Is that it? Just official concern for my well-being?
    WORF: (difficult) You know my... feelings.
    K'EHLEYR: Maybe I've forgotten.
  - |-
    WORF: My blood calls to yours.
    K'EHLEYR: My blood answers.
    WORF: I cannot allow you to... suffer my humiliation.
    K'EHLEYR: There would be no suffering... I don't care what other Klingons think of you.
    WORF: But what of the boy? He may want to live in the Empire someday. He would be an outcast... another traitor from a family of traitors.
    K'EHLEYR: Family of traitors? I don't believe that for a minute.
    WORF: Respect my wishes in this matter. I cannot take the oath with you... and I cannot claim your son.
  - 'K''EHLEYR: If you cannot be his father... at least be his friend.'
