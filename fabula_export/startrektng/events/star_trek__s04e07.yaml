- fabula_uuid: act_5185c904de9b5519
  number: 4
  summary: The discovery of Romulan involvement in the bombing raises alarms among
    Picard's senior staff, who discuss the implications of a potential Klingon-Romulan
    alliance and its threat to Federation security. Worf insists Duras is responsible
    but cannot provide concrete evidence, frustrating K'Ehleyr. Picard, recognizing
    the gravity of the situation, assigns Worf as his Chief Security Officer for the
    upcoming proceedings, anticipating Worf's presence will be disruptive to Duras
    and Gowron. K'Ehleyr, determined to uncover the truth, confronts Worf in the turbolift,
    accusing him of hiding vital information behind his 'precious Klingon honor' and
    implying his cowardice. Their argument escalates into a tense, emotionally charged
    standoff, highlighting the deep rift between them. Undeterred, K'Ehleyr begins
    her own investigation, accessing Enterprise logs related to the Khitomer massacre.
    She discovers altered transmission logs and attempts to access restricted High
    Council records, only to find access denied by Duras. This revelation, coupled
    with a security officer's observation of Duras slipping away from his quarters,
    points directly to Duras's culpability. K'Ehleyr then confronts Duras directly,
    accusing him of betraying his people to the Romulans, just as his father allegedly
    did, and challenging his role in sealing the Khitomer records. Duras, threatened
    by her discoveries, responds with a veiled threat against her. This act significantly
    narrows the focus of suspicion onto Duras and sets the stage for the climactic
    confrontation.
