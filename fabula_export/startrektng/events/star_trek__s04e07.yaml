  global_id: null
  title: K'Ehleyr uncovers Duras' Khitomer cover-up
  description: 'K''Ehleyr, acting on suspicion of altered *Enterprise* logs, interrogates
    the ship''s computer to uncover discrepancies in the Khitomer massacre records.
    When she attempts to cross-reference these findings with restricted Klingon High
    Council files, she is denied access—only to discover that Duras personally blocked
    the records. This revelation forces her to dig deeper into Duras'' biographical
    files, exposing his direct involvement in the conspiracy. The moment marks a critical
    turning point: K''Ehleyr''s investigation shifts from general inquiry to targeted
    suspicion of Duras, directly implicating him in K''mpec''s murder and the broader
    succession crisis. The discovery also raises urgent questions about Duras'' motives,
    his Romulan connections, and the extent of his influence over Klingon politics—all
    of which will shape Worf''s quest for vengeance and Picard''s arbitration efforts.
    The scene is a masterclass in procedural tension, where bureaucratic obstacles
    (access restrictions, encrypted files) become dramatic obstacles, and K''Ehleyr''s
    methodical approach contrasts with the explosive implications of her findings.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e07
  scene_sequence: 23
  sequence_in_scene: 43
  key_dialogue:
  - 'K''EHLEYR: Computer, why was the Enterprise crew studying the transmission logs
    from the Khitomer outpost?'
  - 'COMPUTER VOICE: Reference Chief Engineer''s entry, stardate 43686.1. Certain
    transmission logs between the Khitomer outpost and the Romulan patrol ships were
    altered after the destruction of the colony.'
  - 'K''EHLEYR: Altered. By whom?'
  - 'COMPUTER VOICE: That information is not available.'
  - 'K''EHLEYR: Computer, interlock with the Klingon Imperial information net.'
  - 'COMPUTER VOICE: Interlock established.'
  - 'K''EHLEYR: Federation Ambassador K''Ehleyr requesting diplomatic access to High
    Council record. Security code pah doQ cha!'
  - 'COMPUTER VOICE: Access denied. Restricted materials, du-ko-cha clearance only.'
  - 'K''EHLEYR: By whose order?'
  - 'COMPUTER VOICE: Council member Duras.'
