  global_id: null
  title: K'mpec's dying confession to Picard
  description: In a private, dimly lit chamber aboard K'mpec's cruiser, the dying
    Klingon chancellor reveals he has been poisoned with Veridium Six and demands
    Picard arbitrate the Klingon succession. K'mpec, frail but still commanding, admits
    he approved Duras's past attacks on Worf and Picard—justifying them as necessary
    sacrifices to prevent wider war. Picard, initially resistant, is moved by K'mpec's
    vulnerability and the weight of his leadership, ultimately accepting the unspoken
    task of securing the Empire's future. The exchange foreshadows the coming succession
    crisis and the Federation's entanglement in Klingon politics, while exposing K'mpec's
    moral compromises and Picard's reluctant complicity in Klingon honor codes. The
    scene ends with K'mpec's grim reflection on the impending war, leaving Picard
    to confront the consequences of his agreement.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e07
  scene_sequence: 6
  sequence_in_scene: 10
  key_dialogue: &id003
  - 'K''MPEC: It''s about time you arrived, Picard. Didn''t she tell you I was dying?'
  - 'K''MPEC: I''m not ill, I''m dying. Sit.'
  - 'PICARD: I will?'
  - 'K''MPEC: No one on the Council can be trusted and... I have my reasons for wanting
    an... outsider.'
  - 'PICARD: K''mpec. You can''t be serious. A Federation officer has no business...'
  - 'K''MPEC: Nonsense. You are an accomplished mediator. This is no different than
    any other dispute requiring your services.'
  - 'PICARD: On the contrary, I think it is very different. And I must respectfully
    decline.'
  - 'K''MPEC: If you refuse the dying request of the Klingon Supreme Commander...
    it will be a Federation insult to all Klingons!'
  - 'K''MPEC: Besides, I''ve already sent the orders to the leaders of the two opposing
    factions. They''re on their way.'
  - 'PICARD: You had no right to involve me without my permission.'
  - 'K''MPEC: If I''d asked, you would have said no.'
  - 'PICARD: This is not a case of simple mediation... you are asking me to choose
    the next leader of the Klingon Empire.'
  - 'K''MPEC: No. By tradition, the two strongest challengers fight for the right
    of succession. But as mediator only you can designate those challengers.'
  - 'PICARD: But you''ve just said there are only two challengers arriving. What is
    the point?'
  - 'K''MPEC: The point, my good Captain Picard, is for you to discover which one
    of them has killed me -- Gowron or Duras.'
  - 'PICARD: Interesting? Yes, I would say that, since he conspired to strip Worf
    of his good name and tried to have me killed...'
  - 'K''MPEC: And I approved.'
  - 'K''MPEC: All for the good of the Empire. That should be my epitaph.'
  - 'K''MPEC: Find the assassin. The Klingon who kills without showing his face has
    no honor. He must not lead the Empire. Such a man would be capable of anything.
    Even war with the Federation.'
  - 'PICARD: Very well. I accept.'
