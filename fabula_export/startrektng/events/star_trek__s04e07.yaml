- fabula_uuid: cand_evt_scene_6e88fca96ec4a4a9_02
  global_id: null
  title: Worf vanishes to the Klingon ship Vorn
  description: "\n  The discovery of K'Ehleyr's brutal murder—stabbed multiple times\
    \ in her quarters—shatters the fragile peace aboard the *Enterprise*. Picard and\
    \ Riker stand in stunned silence as Beverly Crusher delivers the grim autopsy\
    \ report, her voice tight with professional restraint. The moment hangs heavy\
    \ with unspoken dread: this is no random act, but a calculated strike in the Klingon\
    \ succession crisis. Picard’s first question cuts to the heart of the matter:\
    \ *Where’s Worf?* Beverly reveals he fled immediately after the discovery, and\
    \ the computer confirms the worst—Worf has secretly transported to the Klingon\
    \ vessel *Vorn*, bypassing Starfleet protocol and Picard’s authority. The revelation\
    \ lands like a physical blow. Riker’s immediate reaction—*‘On my way’*—signals\
    \ the urgency of the situation, but the damage is already done. Worf’s defiance\
    \ isn’t just a personal betrayal; it’s a direct challenge to Picard’s command\
    \ and a reckless plunge into the blood-soaked politics of the Klingon High Council.\
    \ The scene pivots from grief to crisis, forcing Picard into a silent but urgent\
    \ pursuit while the stakes escalate: Worf’s honor-bound quest for vengeance now\
    \ threatens to ignite a full-scale war.\n  "
