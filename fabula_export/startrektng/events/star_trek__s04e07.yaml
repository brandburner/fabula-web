  title: K'Ehleyr exposes Gowron's bribery attempt
  description: "\n  In the observation lounge, the senior staff debates the Romulan-Klingon\
    \ conspiracy behind K'mpec's assassination. K'Ehleyr reveals Gowron's bribery\
    \ attempt—offering her a Council seat if she accelerates the succession—while\
    \ subtly warning her of K'mpec's fate if she refuses. Worf, visibly tense, insists\
    \ Duras is the true conspirator but refuses to elaborate, forcing Picard to assign\
    \ him to the next transition proceeding despite his discommendation. The exchange\
    \ underscores the crew's fractured trust: Picard withholds Federation intelligence,\
    \ Worf conceals personal vendettas, and K'Ehleyr grows frustrated at being excluded\
    \ from critical decisions. The scene escalates the succession crisis by tying\
    \ Romulan interference to Klingon infighting, while Worf's silence hints at deeper,\
    \ unresolved conflicts with Duras.\n  "
