    description_of_involvement: "\n        The Enterprise Forensic Analysis Record\
      \ is the digital archive Worf references to support his revelation of the Romulan\
      \ detonator. It contains Starfleet's comprehensive findings on the explosion,\
      \ which Worf uses to counter Gowron and Duras' dismissive claims. Picard orders\
      \ a complete record to be sent to both Klingon vessels and the High Council,\
