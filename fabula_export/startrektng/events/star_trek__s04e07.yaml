- fabula_uuid: act_d090a17989a3c49c
  number: 5
  summary: 'Dr. Beverly Crusher''s autopsy reveals a critical piece of evidence: the
    bomb was surgically implanted inside one of Duras''s men, confirming Duras''s
    direct involvement in the explosion and K''mpec''s murder. As Worf and Alexander
    approach K''Ehleyr''s quarters, they discover her fatally wounded. With her dying
    breath, K''Ehleyr confirms Duras as her assailant, placing Alexander''s hand in
    Worf''s as a final act of trust and acceptance. Enraged and grief-stricken, Worf
    lets out a primal Klingon roar of vengeance, removes his Starfleet insignia, retrieves
    his ancestral bat''telh, and transports directly to Duras''s ship, claiming the
    right of vengeance. On Duras''s vessel, Klingon guards respectfully allow Worf
    to confront Duras. Duras, attempting to manipulate Worf, claims he is the only
    one who can prove Worf''s father''s innocence. Worf, unwavering in his resolve,
    declares that his honor is secondary to avenging K''Ehleyr, and kills Duras in
    a brutal duel, just as Riker and Data arrive. Back on the Enterprise, Picard reprimands
    Worf for his actions but acknowledges the High Council considers the matter closed.
    He offers Worf the chance to resign from Starfleet, which Worf declines, accepting
    a reprimand instead. Picard then urges Worf to reveal the truth about his father''s
    innocence, now that Duras is dead. Worf explains the High Council''s complicity
    in the lie, stating they would never admit their own dishonor, but vows that he
    and his brother will eventually force them to reveal the truth. Finally, Worf
    makes the difficult decision to send Alexander to live with his human parents
    on Starbase Seventy-Three, acknowledging that he cannot provide the stable home
    Alexander deserves. In a poignant moment, Alexander asks if Worf is his father,
    and Worf, for the first time, fully accepts him, embracing his son as the Enterprise
    warps away.'
