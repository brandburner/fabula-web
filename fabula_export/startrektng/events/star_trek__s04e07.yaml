  title: K'Ehleyr forces Worf to confront Alexander’s abandonment
  description: 'In the confined space of a turbolift, K''Ehleyr deliberately provokes
    Worf by referencing their shared past, first testing his emotional defenses with
    a flirtatious remark about ''old time''s sake.'' When Worf rebuffs her with cold
    formality, invoking his discommendation as a barrier, she escalates the confrontation
    by challenging his commitment to Klingon traditions. His explosive reaction—''You
    may not respect our traditions... I do!''—reveals the depth of his internal conflict:
    a warrior stripped of honor yet still bound by the cultural identity that cast
    him out. As he attempts to leave, K''Ehleyr delivers her devastating verbal strike:
    ''What should I tell Alexander... that he has no father?'' The question lands
    like a blade, forcing Worf to confront the consequences of his abandonment. His
    abrupt exit and her disappointed but determined pursuit underscore the unresolved
    tension between his duty to the Empire and his personal failure as a father, deepening
    the emotional stakes of his character arc. The moment serves as a turning point,
    compelling Worf to grapple with the weight of his choices beyond mere vengeance
    or honor—it forces him to face the human cost of his discommendation.'
