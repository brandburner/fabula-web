- fabula_uuid: cand_evt_scene_e5983416254e9f85_02
  global_id: null
  title: Picard enforces Worf’s authority over Klingon objections
  description: In the tense aftermath of K'mpec’s assassination, Picard deliberately
    provokes Gowron and Duras by insisting Worf—disgraced in Klingon eyes—remain as
    chief of security for the investigation. When the Klingons erupt in outrage, Picard
    leverages his authority as arbiter of the Rite of Succession, threatening to adjourn
    the proceedings if they refuse. His ultimatum forces them to comply, exposing
    the fragile power balance between Starfleet and Klingon politics. Worf then seizes
    the moment to interrogate them about their investigations, revealing the Romulan
    detonator—a discovery that shatters their claims of a simple bomb and forces both
    factions to retreat to their ships for damage control. The scene escalates the
    succession crisis from ritualistic posturing to a geopolitical confrontation,
    while reinforcing Worf’s precarious role as a bridge between cultures. Picard’s
    calculated risk—prioritizing truth over Klingon tradition—sets the stage for deeper
    betrayals and Worf’s eventual confrontation with Duras.
