  title: Picard invokes ja'chuq to force Klingon compliance
  description: "\n  In the charged atmosphere of the *Enterprise*'s observation lounge,\
    \ Picard and K'Ehleyr enter to find Gowron and Duras locked in a volatile standoff,\
    \ their mutual hatred threatening to erupt into violence. The two Klingons trade\
    \ insults—Duras accuses Gowron of cowardice and bomb-planting, while Gowron vows\
    \ a slow, painful death for Duras. When Gowron lunges at Duras, Picard intervenes\
    \ with a sharp command in Klingon ('mev yap!'), halting the confrontation. He\
    \ then declares his intent to enforce the ancient *ja'chuq* ritual, forcing the\
    \ rivals to prove their worthiness to lead the High Council. Both Klingons resist\
    \ the idea, but K'Ehleyr’s subtle reinforcement of Picard’s authority—hinting\
    \ the ritual could take days—compels them to reluctantly sit. The moment underscores\
    \ Picard’s tactical dominance over the Klingons, K'Ehleyr’s political acumen,\
    \ and the fragility of Klingon leadership, while setting the stage for the ritual’s\
    \ unfolding consequences.\n  "
