  title: Worf and K'Ehleyr’s Turbolift Confrontation
  description: Worf enters the bridge to find K'Ehleyr waiting for him, her presence
    an immediate and unspoken challenge to his carefully constructed Starfleet identity.
    The charged silence between them—fraught with years of unresolved history, Klingon
    honor, and the unspoken weight of their shared son—escalates the moment they step
    into the turbolift together. This private space becomes a pressure cooker for
    their confrontation, where K'Ehleyr forces Worf to confront his discommendation,
    his fear of Duras, and the personal betrayal that has festered since their separation.
    The scene is a turning point in Worf’s arc, as K'Ehleyr’s blunt accusations strip
    away his defenses, exposing the raw conflict between his Klingon instincts and
    his Starfleet duty. Their exchange is a collision of past and present, setting
    the stage for Worf’s eventual reckoning with Duras and his role in the Klingon
    succession crisis. The turbolift’s confined space mirrors the inescapable nature
    of their shared history, while the absence of witnesses underscores the intimacy—and
    volatility—of their reunion.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e07
  scene_sequence: 19
  sequence_in_scene: 37
  key_dialogue: &id015
  - 'K''EHLEYR: "You have avoided this moment for too long, Worf. The past does not
    disappear because you refuse to face it."'
  - 'WORF: "I have faced it. Every day. But I cannot change what was done."'
  - 'K''EHLEYR: "You fear Duras. That is why you hide behind Starfleet’s skirts. But
    a warrior does not hide. A warrior *acts*."'
