      but still imposing. It is a relic of his power, now barely held up by his weakening
      body.
    status_after_event: The cloak remains, but its symbolic weight has shifted. It
      is no longer just K'mpec's—it is a prize in the coming power struggle, and Picard's
      acceptance of the arbitration role makes him, however reluctantly, a part of
      that struggle. The cloak's future possession will be decided by the very men
      Picard is being asked to judge.
