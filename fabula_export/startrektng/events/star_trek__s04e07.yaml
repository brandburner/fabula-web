- fabula_uuid: cand_evt_scene_152e6bd70ebdc6f2_03
  global_id: null
  title: Worf learns of K'mpec's poisoning
  description: 'In the ready room, Picard reveals to Worf that K''mpec was murdered
    by poison—a dishonorable act that immediately raises suspicion toward Duras, whom
    Worf already distrusts. Worf’s visceral reaction (''A Klingon would not use poison...'')
    underscores his deep-seated Klingon values, while Picard’s measured response forces
    Worf to confront his own complicity in past lies about Duras’s father. The exchange
    establishes the central conflict: Worf’s personal vendetta against Duras clashes
    with Picard’s need for impartial arbitration, setting up the political and moral
    stakes of the succession crisis. Worf’s admission of ignorance about Gowron highlights
    his divided loyalties—his Klingon heritage versus his Starfleet duty—and foreshadows
    his eventual reckoning with both rivals. The scene pivots from professional formality
    to raw emotional tension as Worf’s honor is tested by the revelation that Klingon
    politics have once again entangled him in betrayal and bloodshed.'
