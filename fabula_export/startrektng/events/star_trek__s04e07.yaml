    description_of_involvement: K'Ehleyr’s computer terminal is the primary tool of
      her investigation, a sleek but unyielding interface that both enables and thwarts
      her efforts. She uses it to query the Enterprise’s mission logs, her fingers
      moving with urgency as she demands stardates, log counts, and specific records.
