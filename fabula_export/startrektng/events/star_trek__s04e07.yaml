  - organization_uuid: ger_organization_d7a709163367
    description_of_involvement: The Klingon High Council is the absent but looming
      authority in this scene, its inability to mediate the succession crisis the
      very reason K'mpec brings in Picard. The Council's corruption and infighting
      are implied in K'mpec's distrust ('No one on the Council can be trusted') and
      his decision to bypass traditional Klingon arbitration in favor of an outsider.
      The Council's dysfunction is a direct threat to the Empire's stability, and
      K'mpec's poisoning—likely orchestrated by a Council member—underscores the stakes.
      Picard's arbitration is not just about choosing a leader but exposing the Council's
      complicity in K'mpec's murder, which could lead to its reform or further fragmentation.
    active_representation: Through K'mpec's dismissal of the Council ('No one on the
