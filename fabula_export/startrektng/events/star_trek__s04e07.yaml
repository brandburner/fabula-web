      to avoid each other, the forced proximity—amplify the tension, making every
      word, every glance, and every shift in posture feel **intensified and inescapable**.
      When Worf finally exits, the turbolift’s doors slide open like a **gateway to
      temporary reprieve**, but the emotional damage lingers.
