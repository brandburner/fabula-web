acts:
- fabula_uuid: act_36f0ca2df72a3616
  number: 1
  summary: The Enterprise investigates radiation anomalies, leading to the unexpected
    arrival of Ambassador K'Ehleyr and her young son, Alexander, on a Klingon attack
    cruiser. Worf, visibly uncomfortable, attempts to avoid receiving K'Ehleyr due
    to his discommendation, but Captain Picard insists. The encounter reveals a past
    romantic relationship between Worf and K'Ehleyr, and Worf's stunned reaction to
    Alexander's presence strongly implies the boy is his son. K'Ehleyr then informs
    Picard and his senior staff that the Klingon Empire faces potential civil war
    due to the imminent death of K'mpec, the head of the High Council. K'mpec, aboard
    his cruiser, summons Picard for a private meeting, revealing he has been poisoned
    with Veridium Six. He tasks Picard, as an outsider, to arbitrate the succession
    between Gowron and Duras after his death, and critically, to identify which of
    them murdered him, asserting the assassin must not lead the Empire. Picard initially
    declines, citing Starfleet's non-interference policy, but K'mpec manipulates him
    by declaring refusal an insult to all Klingons and revealing he has already summoned
    the challengers. Faced with the dire implications of a Klingon civil war and the
    insult to the Federation, Picard reluctantly accepts the dangerous arbitration.
    This act establishes the immediate high stakes for the Klingon Empire and the
    Federation, while simultaneously introducing the profound personal crisis for
    Worf regarding his son and his dishonored status.
  key_moments: []
  scene_numbers:
