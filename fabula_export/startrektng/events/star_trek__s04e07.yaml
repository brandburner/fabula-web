  title: Worf admits fatherhood to Alexander
  description: 'In Worf’s quarters, the Klingon warrior attempts to distance himself
    from Alexander by proposing to send the boy to live with his human parents, framing
    it as an act of care. Alexander, sensing the emotional evasion, presses Worf with
    a direct question: ''Are you my father?'' The confrontation forces Worf to confront
    his buried paternal instincts and Klingon honor. After a tense pause, he admits
    the truth—''Yes... I am your father''—and the moment culminates in an awkward
    but profound embrace, marking the first step in Worf’s reluctant acceptance of
    his role as a father. The scene underscores the collision of Klingon stoicism
    with human vulnerability, setting up Worf’s future struggles to reconcile his
    warrior identity with his paternal responsibilities amid the Klingon succession
    crisis.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e07
  scene_sequence: 35
  sequence_in_scene: 60
  key_dialogue:
  - 'WORF: My parents... my human parents will meet us at Starbase Seventy-Three.
    They will care for you.'
  - 'ALEXANDER: Why can''t I stay with you?'
  - 'WORF: You deserve a home... a family. My parents can provide that... I cannot.'
  - 'ALEXANDER: Are you my father?'
  - 'WORF: Yes... I am your father.'
