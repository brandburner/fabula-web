- fabula_uuid: cand_evt_scene_a366cadcd1cbbd5b_01
  global_id: null
  title: K'Ehleyr accuses Duras of Khitomer betrayal
  description: In a private confrontation in K'Ehleyr's quarters, Duras confronts
    her about accessing restricted Klingon Council records, revealing his knowledge
    of her investigation into the Khitomer massacre. K'Ehleyr counters by accusing
    Duras of altering evidence to frame Worf's father, Mogh, as a traitor and sealing
    records to cover his own family's complicity. The exchange escalates as K'Ehleyr
    weaponizes Duras' own hypocrisy—his father's presence at Khitomer and Duras' manipulation
    of Worf in the Council—exposing his moral corruption. Duras responds with a veiled
    threat, setting the stage for his violent retaliation. The scene functions as
    a turning point, where K'Ehleyr's investigation directly challenges Duras' power
    and forces him into a corner, while also deepening the narrative's focus on Worf's
    discommendation and the legacy of Khitomer as a political weapon. The tension
    between them becomes a microcosm of the larger succession crisis, with K'Ehleyr's
    defiance and Duras' desperation foreshadowing the violent escalation to come.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e07
  scene_sequence: 26
  sequence_in_scene: 47
  key_dialogue:
  - 'DURAS: I have been informed of your attempt to access restricted Council records.'
  - 'K''EHLEYR: I''ve been investigating what happened at Khitomer. Not an easy task...
    considering that most of the records are sealed...'
  - 'DURAS: Worf''s father was a traitor.'
  - 'K''EHLEYR: No, the evidence was altered to make it appear that way. I found it
    interesting to read that your father was also at Khitomer. And you are the one
    who sealed the records.'
  - 'K''EHLEYR: The son betrays his people to the Romulans just as his father did...
    Eh, Duras?'
  - 'DURAS: Do not pursue this matter further...'
  is_flashback: false
  location_uuid: ger_location_f456faa25e40
  theme_uuids: []
  arc_uuids: []
  participations:
  - character_uuid: ger_agent_12296336fa36
    emotional_state: Righteously indignant with a steely resolve, masking a deep-seated
      anger at the injustice done to Worf and his family. Her defiance is not reckless
      but calculated, driven by a sense of duty to expose the truth and protect those
      she cares about.
    goals:
    - To expose Duras' manipulation of the Khitomer records and his role in framing
      Mogh as a traitor.
    - To force Duras to acknowledge his family's complicity in the Khitomer massacre
      and his own hypocrisy in accusing others of dishonor.
    what_happened: K'Ehleyr stands her ground in her quarters, her posture unyielding
      as she confronts Duras. She is seated at her terminal when Duras enters, but
