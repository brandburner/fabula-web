  title: K'Ehleyr warns of Klingon civil war
  description: In the Enterprise's observation lounge, Ambassador K'Ehleyr delivers
    a stark briefing to Picard and his senior staff, revealing the Klingon Empire's
    imminent civil war following K'mpec's terminal illness. She frames the conflict
    as a power struggle between Gowron and Duras, warning that the Federation will
    inevitably be drawn in. The tension escalates when she discloses K'mpec's specific
    request for a private meeting with Picard aboard his cruiser—a summons that disrupts
    the Enterprise's mission and forces Picard into the role of reluctant arbiter.
    Worf's presence during the briefing adds personal stakes, as K'Ehleyr's glance
    at him underscores the intersection of Klingon honor and Federation duty. The
    scene establishes the high-stakes political crisis and Picard's forced entanglement
    in Klingon succession politics, while Data's observation about 'ulterior motives'
    foreshadows the deeper conspiracy involving Duras and Romulan involvement. The
    moment marks a turning point where Picard's diplomatic neutrality is shattered
    by Klingon tradition and the weight of a dying leader's final request.
