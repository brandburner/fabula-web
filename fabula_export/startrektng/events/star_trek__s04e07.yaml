  - 'DURAS: You''ve already proved you don''t have the courage to face me... perhaps
    you should plant another bomb...'
  - 'PICARD: ((firm)) Sit down.'
  - 'PICARD: I choose to respect the ancient ritual. Each of you must prove your worthiness
    to lead the High Council.'
  - 'K''EHLEYR: Or days... depending on your cooperation.'
