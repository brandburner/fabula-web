  title: Worf’s Confession Cut by Duty
  description: In K'Ehleyr's quarters, Worf and Alexander return from their time together,
    where Worf abruptly ended their interaction due to Alexander’s unfamiliarity with
    Klingon traditions. K'Ehleyr, sensing Worf’s frustration, presses him about his
    sudden paternal concern, exposing his unresolved conflict over acknowledging Alexander
    as his son. The tension escalates as K'Ehleyr challenges Worf’s refusal to claim
    Alexander due to his discommendation, forcing him to confront the shame tied to
    his father’s alleged betrayal at Khitomer. Just as Worf begins to open up—admitting
    his father was accused of Romulan collaboration and that he withdrew his challenge
    to the High Council—Riker’s summons interrupts the moment. The abrupt call to
    the bridge leaves Worf’s confession unfinished, deepening the emotional strain
    between them and reinforcing the Enterprise’s demands on his divided loyalties.
    The unresolved tension lingers, heightening the stakes of Worf’s internal struggle
    between honor, guilt, and his duty to Starfleet.
