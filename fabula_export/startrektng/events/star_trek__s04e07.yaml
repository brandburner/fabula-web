  sequence_in_scene: 9
  key_dialogue: &id001
  - 'K''MPEC: It''s about time you arrived, Picard. Didn''t she tell you I was dying?'
  - 'K''MPEC: I''m not ill, I''m dying. Sit. I need your help.'
  - 'K''MPEC: After I die... you will act in my name to arbitrate the struggle for
    power.'
  - 'PICARD: I will? K''MPEC: No one on the Council can be trusted and... I have my
    reasons for wanting an... outsider.'
  - 'K''MPEC: If you refuse the dying request of the Klingon Supreme Commander...
    it will be a Federation insult to all Klingons!'
  - 'K''MPEC: And I approved. All for the good of the Empire. That should be my epitaph.'
  - 'K''MPEC: Find the assassin. The Klingon who kills without showing his face has
    no honor. He must not lead the Empire.'
  - 'PICARD: Very well. I accept.'
