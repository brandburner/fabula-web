- fabula_uuid: cand_evt_scene_a5a745e40eb79d86_01
  global_id: null
  title: Picard invokes ja'chuq to halt Klingon violence
  description: "\n  In the Observation Lounge, tensions between Gowron and Duras reach\
    \ a boiling point as they trade insults and nearly come to blows, with Duras accusing\
    \ Gowron of cowardice and Gowron threatening to kill Duras. Security guards intervene,\
    \ but the situation remains volatile. Picard enters with K'Ehleyr and seizes control\
    \ by invoking the ancient Klingon ritual of *ja'chuq*, forcing the warring factions\
    \ to submit to its authority. Initially resistant, Gowron and Duras reluctantly\
    \ comply when Picard asserts the ritual’s legitimacy, with K'Ehleyr reinforcing\
    \ its binding nature. The moment marks a tactical victory for Picard and K'Ehleyr,\
    \ temporarily averting bloodshed while deepening the tension between Starfleet\
    \ authority and Klingon honor. The ritual’s invocation also sets the stage for\
    \ uncovering K'mpec’s murderer, as it forces the factions into a structured, time-consuming\
    \ process that exposes their true motives and weaknesses.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e07
  scene_sequence: 14
  sequence_in_scene: 28
  key_dialogue:
  - 'DURAS: The Council must have a leader... now!'
  - 'DURAS: ((re: Gowron)) Complete the rite so I can kill this ha''DIbah.'
  - 'GOWRON: ((deadly)) You will die slowly, Duras.'
  - 'DURAS: You''ve already proved you don''t have the courage to face me... perhaps
    you should plant another bomb...'
  - 'PICARD: ((firm)) Sit down.'
  - 'PICARD: I choose to respect the ancient ritual. Each of you must prove your worthiness
    to lead the High Council.'
  - 'GOWRON: That will take hours!'
  - 'K''EHLEYR: Or days... depending on your cooperation.'
