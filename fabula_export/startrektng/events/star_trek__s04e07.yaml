  title: Worf rejects oath but accepts mentorship
  description: 'In K''Ehleyr''s quarters, Worf arrives under the pretense of official
    duty but is visibly concerned for her safety after the explosion. Their unresolved
    emotional bond resurfaces as K''Ehleyr challenges his formal demeanor, revealing
    their lingering devotion. Worf admits he would have taken the oath with her—not
    just for tradition—but for love, yet refuses to claim Alexander as his son due
    to his discommendation, fearing the boy would suffer the same social stigma. K''Ehleyr,
    acknowledging his pain, proposes a compromise: if he cannot be Alexander''s father,
    he can at least be his friend and mentor. Worf reluctantly agrees, marking a fragile
    step toward reconnection despite his rigid adherence to Klingon honor. The scene
    underscores Worf''s internal conflict between personal desire and cultural duty,
    while K''Ehleyr''s pragmatic compromise sets the stage for their evolving relationship
    amid the succession crisis.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e07
  scene_sequence: 12
  sequence_in_scene: 25
  key_dialogue:
  - |-
    WORF: I... have not received your report on the explosion.
    K'EHLEYR: Two Klingons killed... a few minor injuries.
    K'EHLEYR: Were you concerned about me?
    WORF: As head of security... it is my duty to be concerned.
  - |-
    K'EHLEYR: I thought about telling you... wanted to tell you. I wasn't ready.
    WORF: I cannot allow you to... suffer my humiliation.
    K'EHLEYR: There would be no suffering... I don't care what other Klingons think of you.
    WORF: But what of the boy? He may want to live in the Empire someday. He would be an outcast... another traitor from a family of traitors.
  - |-
    K'EHLEYR: If you cannot be his father... at least be his friend.
    WORF: (considers, then nods) ...I agree.
