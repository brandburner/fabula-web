  title: Worf confronts K'Ehleyr and Alexander
  description: Worf enters the transporter room expecting K'Ehleyr alone, but the
    technician announces two incoming. When the transporter materializes K'Ehleyr
    and their young son Alexander, Worf's carefully controlled demeanor fractures.
    His initial shock reveals suppressed emotions—both longing and dread—before he
    locks them away behind Klingon stoicism. The boy's presence forces Worf to confront
    his discommendation and the son he never knew existed, while K'Ehleyr's knowing
    smile suggests she understands the turmoil beneath his facade. This moment serves
    as a personal turning point for Worf, where his past and present collide, threatening
    to destabilize his already precarious position during the Klingon succession crisis.
    The scene establishes Alexander as a catalyst for Worf's emotional reckoning and
    foreshadows the conflict between Klingon honor and paternal duty that will define
    his arc.
