  object_involvements:
  - object_uuid: ger_object_986754352c0d
    description_of_involvement: 'The Okudagram on K''Ehleyr’s terminal serves as a
      silent but potent symbol of her dual role as a Federation ambassador and a mother
      entangled in Klingon politics. While she is initially absorbed in its data—likely
      related to the Khitomer massacre or the succession crisis—it quickly becomes
      a backdrop to the emotional confrontation between her and Worf. The Okudagram’s
      presence underscores the institutional stakes of their personal conflict: K''Ehleyr’s
      work is a reminder of the broader Klingon-Federation tensions, while her focus
      on it before the argument suggests she is trying to compartmentalize her personal
      life from her duties. By the end of the event, the Okudagram remains untouched,
      a metaphor for unresolved questions and the interruption of their conversation
      by Riker’s summons.'
    status_before_event: Active and displayed on K'Ehleyr’s terminal, with data readouts
      visible. It commands her attention at the start of the scene, symbolizing her
      professional focus before the emotional disruption.
    status_after_event: Unchanged and still displayed on the terminal, now ignored
      as the argument concludes. Its presence lingers as a visual reminder of the
      unresolved tension and the larger political context.
    global_id: ger_object_986754352c0d
  - object_uuid: ger_object_dde5951744bb
    description_of_involvement: 'Worf’s communicator is a functional yet narratively
      charged object in this scene. It chirps twice: first, when Riker summons him
      to the bridge, slicing through the emotional tension like a physical interruption.
      The device is small but mighty, representing the inescapable pull of Starfleet
      duty and the collision of Worf’s personal and professional lives. Its activation
      marks the abrupt end of his vulnerable moment with K''Ehleyr, reinforcing the
      theme that his obligations to the Enterprise often take precedence over his
      personal demons. The communicator is also a symbol of Worf’s divided loyalties—it
      connects him to a world (Starfleet) that offers him purpose but also isolates
      him from the Klingon traditions he still grapples with.'
    status_before_event: Attached to Worf’s uniform, dormant but ever-present as a
      reminder of his Starfleet role. It is a constant, if silent, presence until
      activated.
    status_after_event: Reactivated and holstered after Worf acknowledges Riker’s
      summons. Its use is brief but impactful, leaving the emotional conversation
      between Worf and K'Ehleyr unresolved.
