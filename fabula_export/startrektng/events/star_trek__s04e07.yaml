  scene_sequence: 10
  sequence_in_scene: 18
  key_dialogue:
  - 'WORF: Duras must not be allowed to lead the council.'
  - 'PICARD: He has a legal claim, Worf. Your personal feelings toward him...'
  - 'WORF: It is not personal, sir. His father betrayed my people to the Romulans.
    Duras is a traitor.'
  - 'PICARD: Klingon tradition may blame the son for the father''s sins. I cannot,
    Worf. Treason was his father''s disgrace. Duras'' crime was to put that blame
    on your father... I will not forget that. But you should not forget that you chose
    to accept the consequences of that lie.'
  - 'WORF: To preserve the Empire.'
  - 'PICARD: The issue now is whether or not he killed K''mpec.'
  - 'WORF: A Klingon would not use poison... the murder would have no honor.'
