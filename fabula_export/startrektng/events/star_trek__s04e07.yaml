- fabula_uuid: act_01b9cb198ca49b0e
  number: 3
  summary: 'In the aftermath of the explosion, Worf checks on K''Ehleyr, ostensibly
    for a security report, but their interaction quickly reveals a rekindled romantic
    tension. K''Ehleyr acknowledges their mutual attraction and Worf''s past feelings,
    but Worf, still bound by his perceived dishonor, reiterates his inability to claim
    her or Alexander, fearing it would condemn them to a life of shame. K''Ehleyr,
    understanding his pain, asks him to at least be Alexander''s friend, which Worf
    accepts. Meanwhile, Picard, needing to buy time for investigations into the explosion,
    learns from K''Ehleyr about the ancient, lengthy ja''chuq ritual. He decides to
    implement this obsolete ceremony to prolong the succession process. K''Ehleyr
    attempts to question Picard about Worf''s discommendation, but Picard, bound by
    confidentiality, refuses to disclose details. Picard then convenes Duras and Gowron,
    who are restless and hostile, and forces them to begin the ja''chuq, much to their
    dismay, effectively gaining valuable time. Concurrently, Worf attempts to bond
    with Alexander by teaching him to wield a bat''telh, his ancestral weapon, fostering
    a small but significant connection. Gowron, seeking an advantage, tries to persuade
    K''Ehleyr to side with him, offering her power and subtly threatening her, but
    she rebuffs his advances. The investigation into the bomb yields a crucial discovery:
    Geordi and Data identify a molecular-decay detonator, a device exclusively used
    by Romulans, strongly suggesting external, likely Romulan, involvement in the
    Klingon political machinations.'
