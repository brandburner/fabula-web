    emotional_state: '**Determined frustration**—she is not here to comfort Worf but
      to *force* him to confront his responsibilities. Her surface sarcasm masks **deep
      concern** for Alexander and **exasperation** with Worf’s self-imposed exile.
      There’s a flicker of **pity** when she delivers the line about Alexander, but
      it’s quickly replaced by **resolute disappointment** in Worf’s refusal to engage.
      Her emotional state is that of someone who has **run out of patience** but hasn’t
      yet given up hope.'
    goals:
    - To break through Worf’s emotional armor and force him to acknowledge his role
      as Alexander’s father, regardless of his discommendation.
    - To challenge Worf’s blind adherence to Klingon traditions, exposing the hypocrisy
      of a culture that casts him out yet demands his loyalty.
    what_happened: 'K''Ehleyr dominates the turbolift’s confined space with a predatory
      grace, her sardonic grin and deliberate flirtation designed to dismantle Worf’s
      defenses. She studies him like a tactical opponent, waiting for the right moment
      to strike—first with humor, then with pointed challenges to his Klingon traditions.
      Her body language is relaxed but intentional: leaning slightly toward him when
      she speaks, her hands resting casually on her hips, signaling confidence. The
      verbal blow about Alexander is delivered with unflinching directness, her voice
      dropping into a quieter, almost pitying tone that cuts deeper than any shout.
      When Worf exits, she doesn’t gloat; instead, her disappointment is palpable,
      and she follows him out, her persistence suggesting this confrontation is far
      from over.'
