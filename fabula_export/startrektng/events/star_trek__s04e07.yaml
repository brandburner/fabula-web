  title: K'Ehleyr's Final Accusation and Worf's Vengeance Oath
  description: 'Worf and Alexander discover K''Ehleyr mortally wounded in her quarters,
    her final breaths revealing Duras as her killer. In a poignant, honor-bound moment,
    she entrusts Alexander to Worf’s care, binding them in grief and vengeance. Worf’s
    roar of rage—both ritual and raw—signals the irrevocable shift from mourning to
    blood oath, while Alexander’s forced confrontation with death marks the beginning
    of his Klingon inheritance. Beverly’s arrival confirms the futility of medical
    intervention, and Worf’s abrupt departure foreshadows his lethal confrontation
    with Duras, cementing the antagonist’s role in the Klingon succession crisis.
    The scene operates as a turning point: K''Ehleyr’s death becomes the catalyst
    for Worf’s discommendation to be temporarily suspended by honor, while Alexander’s
    witnessing of violence ensures his future entanglement in Klingon politics. The
    emotional architecture here—grief, duty, and the weight of legacy—drives the narrative
    toward its inevitable climax: Worf’s duel with Duras.'
