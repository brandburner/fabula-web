- fabula_uuid: cand_evt_scene_72cefbc967a9d9a3_01
  global_id: null
  title: Picard forces Worf to confront resignation
  description: In the ready room, Picard delivers a formal reprimand to Worf for killing
    Duras, framing it as a violation of Starfleet duty despite Worf’s insistence that
    he acted within Klingon law. Picard’s argument pivots from institutional loyalty
    to personal appeal—acknowledging Worf’s grief over K’Ehleyr while subtly questioning
    whether his Klingon identity can coexist with Starfleet service. The tension escalates
    when Picard offers Worf the option to resign, forcing him to choose between his
    career and his cultural obligations. Worf’s refusal to resign reveals his lingering
    commitment to Starfleet, but Picard’s final challenge—urging Worf to expose the
    truth about his father’s innocence—shifts the conflict from personal grief to
    systemic injustice, setting up Worf’s future confrontation with the Klingon High
    Council. The scene underscores the irreconcilable pull between Worf’s dual identities
    and the cost of silence in both Starfleet and Klingon society.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e07
  scene_sequence: 34
  sequence_in_scene: 58
  key_dialogue:
  - 'PICARD: Lieutenant, you are a fine officer... your service aboard this ship has
    been exemplary... Until now.'
  - 'WORF: Sir, I acted within the boundaries of Klingon law and tradition.'
  - 'PICARD: The Enterprise crew currently includes representatives from thirteen
    planets, Mister Worf. They each have their individual beliefs and values and I
    respect them all. But every member of the crew has chosen to serve Starfleet.
    If anyone cannot perform his duties because of the demands of his society, he
    must resign.'
  - 'PICARD: Do you wish to resign, Lieutenant?'
  - 'PICARD: Isn''t it time for the truth about your father''s innocence to be told?
    After all, the reasons you accepted this dishonor were to protect the name of
    Duras, and hold the Empire together. Now that he''s died in disgrace... where
    is the honor in further silence?'
  - 'WORF: Each member of the Klingon high council shared in that lie. They will not
    be so willing to admit their own dishonor. But the day will come when my brother
    and I will... ''convince them to speak the truth.'''
