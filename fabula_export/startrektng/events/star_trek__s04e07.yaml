  title: K'mpec forces Picard into succession arbitration
  description: In a dimly lit Klingon cruiser cabin, K'mpec—frail but still commanding—reveals
    he has been poisoned with Veridium Six and demands Picard arbitrate the Klingon
    succession. The dying chancellor frames refusal as a Federation insult, exploiting
    Picard's diplomatic reputation to entangle him in the power struggle. K'mpec admits
    he tacitly approved Duras's past attacks on Worf and the Federation, justifying
    them as necessary sacrifices. Picard, initially resistant, reluctantly accepts
    the role after K'mpec reveals the two contenders—Gowron and Duras—are already
    en route. The scene establishes Picard's forced involvement in Klingon politics,
    the personal stakes tied to Duras, and the moral ambiguity of K'mpec's leadership.
    The weight of the Empire's future now rests on Picard's shoulders, setting the
    stage for a deadly game of succession and the potential for galactic war.
