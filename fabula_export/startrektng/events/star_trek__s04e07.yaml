- fabula_uuid: cand_evt_scene_0cd78f9c33fe2588_01
  global_id: null
  title: Gowron tests K'Ehleyr's loyalty with power and threats
  description: 'In a private confrontation aboard the *Enterprise*, Gowron approaches
    K''Ehleyr under the guise of political discussion but quickly reveals his true
    intent: to coerce her allegiance by offering her power within the Klingon Empire.
    When she rejects his overtures—calling his tactics ''Ferengi''—he escalates, thinly
    veiling a threat against her by referencing K''mpec''s violent fate. K''Ehleyr,
    unshaken, responds with defiance, asserting her strength and independence. The
    exchange exposes Gowron''s manipulative nature and underscores K''Ehleyr''s unwavering
    loyalty to Worf and the Federation, while deepening the political stakes of the
    succession crisis. Her refusal to yield forces Gowron to retreat, but the tension
    lingers, signaling the volatility of the Klingon power struggle and the personal
    risks K''Ehleyr faces in opposing him.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e07
  scene_sequence: 16
  sequence_in_scene: 31
  key_dialogue:
  - 'GOWRON: What do you want? Command of a ship... a seat on the Council? There are
    many opportunities for you in the Empire.'
  - 'K''EHLEYR: Opportunities that will present themselves only if you come to power.
    You talk like a Ferengi.'
  - 'GOWRON: K''mpec was also stubborn... he too refused to listen... now he''s gone...
    you need not make the same mistake.'
