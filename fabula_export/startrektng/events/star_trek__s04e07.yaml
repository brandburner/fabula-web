- fabula_uuid: act_ddb684470f9d2048
  number: 2
  summary: Following K'mpec's death, the Enterprise awaits the arrival of the two
    challengers, Duras and Gowron. Worf attempts to instill Klingon values in Alexander,
    but the boy's disinterest and assertion that he doesn't want to be a warrior deeply
    frustrates Worf. In a private conversation, K'Ehleyr confronts Worf about Alexander's
    paternity, criticizing his refusal to acknowledge their son. Worf explains his
    discommendation would also bring shame upon Alexander, preventing him from claiming
    the boy. K'Ehleyr presses Worf for the true reason behind his acceptance of discommendation,
    hinting at a deeper secret related to his father's alleged collaboration with
    Romulans at Khitomer, but Worf remains evasive, consumed by his internal conflict
    and past trauma. Duras and Gowron arrive, immediately displaying animosity. Duras
    openly insults Worf and Picard, challenging Picard's authority. Picard, however,
    asserts his role as arbiter. During the Sonchi ceremony, a traditional Klingon
    rite to confirm K'mpec's death, an explosion occurs from where Duras's men are
    standing, introducing an element of sabotage and violence into the succession
    process. This act intensifies both the political intrigue and Worf's personal
    struggle, highlighting the clash between his Starfleet duties, Klingon honor,
    and his newfound paternal responsibilities.
