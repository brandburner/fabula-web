  title: Worf invokes bat'leth vengeance for K'Ehleyr
  description: "\n  In Duras’ dimly lit quarters aboard the Klingon ship, Worf—armed\
    \ with a bat'leth and accompanied by a Klingon guard—enters unannounced, his presence\
    \ immediately disrupting Duras’ private meeting with his retainers. The guard’s\
    \ declaration that Worf has claimed the *right of vengeance* shifts the room’s\
    \ power dynamics: Duras’ retainers step back in deference, acknowledging the ritual’s\
    \ legitimacy under Klingon law. Duras, caught off-guard, initially dismisses Worf\
    \ as a 'traitor,' but Worf’s revelation that K'Ehleyr was his *mate*—delivered\
    \ with raw, unfiltered grief—exposes the personal stakes of the confrontation.\
    \ The weight of the admission silences the room, forcing Duras to confront not\
    \ only Worf’s claim but the moral gravity of his own actions. A retainer presents\
    \ Duras with a scythe-like weapon, and the two warriors lock eyes in a charged\
    \ standoff, the duel’s inevitability now sealed by honor and blood. The scene\
    \ crystallizes Worf’s emotional arc (from suppressed grief to reckoning) while\
    \ escalating the act’s central conflict: Duras’ guilt over K'Ehleyr’s death and\
    \ the fragile balance of Klingon succession politics.\n  "
