      count of forty-three officer logs and ten personal logs—before flatly denying
      access to Worf’s restricted personal log. This forces K'Ehleyr to pivot, eliminating
      personal logs and ordering the remaining records chronologically. The terminal
      thus serves as both a gateway to truth and a symbol of the institutional barriers
      she must overcome, its clinical responses underscoring the tension between her
      personal mission and Starfleet’s protocols.
