  title: Romulan sabotage exposed in bomb analysis
  description: "\n  In Main Engineering, Geordi and Data present their forensic analysis\
    \ of the bomb that killed K'mpec to Riker. Their findings reveal the explosive\
    \ was a triceron-based device with a molecular-decay detonator—technology exclusively\
    \ used by the Romulans. This discovery shifts the narrative from an internal Klingon\
    \ power struggle to an external Romulan conspiracy, implicating the Romulans in\
    \ K'mpec's assassination. The revelation forces Riker to confront the political\
    \ implications: the assassination was not merely a Klingon vendetta but a calculated\
    \ Romulan intervention, escalating the stakes of the succession crisis. The moment\
    \ serves as a critical turning point, exposing the depth of Romulan involvement\
    \ and setting up future confrontations between the Federation and the Romulans,\
    \ while also deepening the mystery of who within the Klingon hierarchy collaborated\
    \ with them.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e07
  scene_sequence: 17
  sequence_in_scene: 33
  key_dialogue:
  - 'GEORDI: (to Riker) We''ve completed our analysis of the bomb debris.'
  - 'DATA: The explosive was a triceron derivative.'
  - 'GEORDI: The entire device couldn''t have been more than three cubic millimeters
    in size...'
  - 'RIKER: Then it could have been hidden anywhere in the room.'
  - 'GEORDI: There''s one other thing, Commander... The bomb had a molecular-decay
    detonator.'
  - 'DATA: Only one race uses that device, sir...'
  - 'RIKER: (nods) The Romulans.'
