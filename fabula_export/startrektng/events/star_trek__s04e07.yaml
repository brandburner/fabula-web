  title: K'Ehleyr rejects Gowron's power play
  description: In a charged confrontation aboard the *Enterprise*, Gowron attempts
    to coerce K'Ehleyr into supporting his bid for the Klingon High Council by offering
    her political rewards and subtly threatening her safety. His veiled references
    to K'mpec's murder—'he too refused to listen... now he's gone'—serve as a warning,
    but K'Ehleyr refuses to be intimidated. She counters his manipulation with defiance,
    calling him out for his transparent self-interest ('You talk like a Ferengi')
    and asserting her own strength ('I am not [old and weak]'). The exchange exposes
    Gowron's desperation and vulnerability, as his inability to sway her forces him
    to retreat. This moment reshapes their power dynamic, solidifying K'Ehleyr's independence
    and undermining Gowron's authority in the succession crisis. The scene also highlights
    her loyalty to Worf and the Federation, as she rejects Gowron's offer of Klingon
    glory in favor of her own path. The tension escalates the political stakes, reinforcing
    K'Ehleyr's role as a key player in the unfolding crisis.
