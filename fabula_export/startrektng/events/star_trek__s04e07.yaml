- fabula_uuid: cand_evt_scene_24e6a17591b6bcbf_01
  global_id: null
  title: Worf reclaims his bat'leth and Klingon identity
  description: 'Worf’s grief over K''Ehleyr’s murder and his Klingon honor collide
    in a moment of visceral transformation. Alone in his quarters, he strips away
    his Starfleet insignia and sash—symbols of his divided loyalties—before seizing
    his bat''leth from the wall. The act is deliberate, ritualistic, and irreversible:
    he is no longer a Starfleet officer but a Klingon warrior reclaiming his birthright.
    This physical shedding of his dual identity marks the point of no return, where
    personal vengeance overrides duty. The bat''leth, a weapon of his ancestors, becomes
    the instrument of his oath against Duras, signaling his total commitment to the
    blood vow he has sworn. The scene is silent but charged with the weight of his
    decision, a turning point that will force Picard, Riker, and the Enterprise crew
    to confront the consequences of Worf’s choice.'
