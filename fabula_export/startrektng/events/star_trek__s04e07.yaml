      design: polished metal walls, a control panel with a glowing interface, and
      sufficient space for two adults to stand without touching—though the confined
      nature of the space still feels intimate.'
    status_after_event: The turbolift remains physically unchanged, but the **emotional
      residue** of the confrontation lingers in the air. The doors close behind Worf
