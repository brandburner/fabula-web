  key_dialogue:
  - |-
    WORF: Gowron... ?
    K'EHLEYR: (barely shakes head)
    WORF: Duras?
    K'EHLEYR: (looks at him, acknowledging)
  - |-
    K'EHLEYR: Alexander...
    (She takes his hand, puts it in Worf's hand)
    WORF: (nods in acceptance)
  - |-
    WORF: You have never seen death?
    ALEXANDER: (shakes head)
    WORF: Then look... And always remember.
