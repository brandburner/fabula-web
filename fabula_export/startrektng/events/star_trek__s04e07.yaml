      denial of access to the Khitomer massacre records. Duras' personal block on
      these records isn't just a bureaucratic technicality; it's a direct exercise
      of the Council's authority to suppress truth. The Council's shadow looms over
      K'Ehleyr's investigation, its corruption embodied in Duras' actions. The scene
      highlights the Council's role as both a target of reform (through K'Ehleyr's
      efforts) and a bastion of entrenched power (through Duras' obstruction).
    active_representation: Via institutional protocol (access restrictions, clearance
      requirements) and the digital traces of Duras' manipulation (e.g., the 'Denied'
      message).
