  global_id: null
  title: Picard Forces Worf to Confront His Silence
  description: 'In the ready room, Picard delivers a formal reprimand to Worf for
    his unchecked vengeance against Duras, framing it as a violation of Starfleet’s
    duty. The tension escalates when Picard—knowing Worf’s actions stem from Klingon
    honor—pressures him to resign if he cannot reconcile his cultural obligations
    with his Starfleet oath. Worf resists, but Picard’s probing about Mogh’s disgrace
    exposes the deeper conflict: Worf’s silence has protected the High Council’s lie,
    and now, with Duras dead, the time for truth has arrived. Worf’s vow to ‘convince’
    the Council to admit their dishonor marks the incipient stage of his crusade to
    restore his father’s name, setting up a direct confrontation with Klingon power
    structures. The scene pivots from disciplinary confrontation to a moment of reckoning,
    where Picard’s challenge forces Worf to acknowledge that his vengeance has only
    delayed the inevitable—his family’s honor must be reclaimed through truth, not
    bloodshed alone.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e07
  scene_sequence: 34
  sequence_in_scene: 59
  key_dialogue:
  - 'PICARD: The Enterprise crew currently includes representatives from thirteen
    planets, Mister Worf. They each have their individual beliefs and values and I
    respect them all. But every member of the crew has chosen to serve Starfleet.
    If anyone cannot perform his duties because of the demands of his society, he
    must resign.'
  - 'PICARD: Isn''t it time for the truth about your father''s innocence to be told?
    After all, the reasons you accepted this dishonor were to protect the name of
    Duras, and hold the Empire together. Now that he''s died in disgrace... where
    is the honor in further silence?'
  - 'WORF: Each member of the Klingon high council shared in that lie. They will not
    be so willing to admit their own dishonor. But the day will come when my brother
    and I will... ''convince them to speak the truth.'
