  title: Geordi interrupts with firestorm timeline
  description: "\n  The bridge crew monitors the escalating firestorm on Bersallis\
    \ Three, with Worf confirming the storm will reach the outpost in seventeen minutes.\
    \ Picard’s professional intensity masks his personal tension—his concern for the\
    \ colonists and Nella Daren’s team is palpable, though he maintains composure.\
    \ The moment is disrupted by Geordi’s urgent comm request, forcing Picard to pivot\
    \ from tactical assessment to immediate crisis response. This interruption underscores\
    \ the dual pressures he faces: the life-or-death stakes of the evacuation and\
    \ his unresolved emotional conflict with Nella, which now threatens to distract\
    \ him from command decisions. The scene tests Picard’s ability to compartmentalize,\
    \ as the ticking clock and Geordi’s pending update demand his full attention.\n\
    \  "
