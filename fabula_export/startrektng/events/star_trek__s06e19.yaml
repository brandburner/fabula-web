- fabula_uuid: cand_evt_scene_49851268bb70238a_01
  global_id: null
  title: Picard orders Nella’s team to hold position
  description: 'In the midst of a catastrophic firestorm on Bersallis Three, Picard’s
    voice crackles over a distorted transmission, delivering a command that forces
    Nella Daren and her perimeter team into a no-win scenario. The order—*hold your
    positions*—is framed as imperative for the colony’s evacuation, but the subtext
    is clear: their survival is secondary to the mission. Nella’s reaction, captured
    in a close-up of her face, reveals the weight of the decision: her expression
    hardens with resignation, her jaw tightening as she processes the moral calculus
    behind Picard’s command. This moment exposes the ruthless pragmatism of his leadership,
    where duty overrides personal connection, and the cost of his choice is not just
    tactical but deeply human. The scene underscores the tension between Picard’s
    professional obligations and his burgeoning emotional attachment to Nella, setting
    up a later confrontation over the moral boundaries of command.'
