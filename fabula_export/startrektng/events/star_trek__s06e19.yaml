  title: Picard sends Nella into danger
  description: 'In the transporter room, Picard oversees the final preparations for
    Nella Daren’s high-risk mission to Bersallis Three. As the team—including Riker—stands
    on the transporter pad, Picard’s gaze lingers on Nella, his professional demeanor
    strained by unspoken tension. The moment is charged with subtext: his command
    authority clashes with his personal dread for her safety. When he orders ‘Energize,’
    the team dematerializes, leaving Picard alone with the weight of his decision.
    The scene underscores the collision of duty and affection, marking a turning point
    where his emotional investment in Nella threatens to compromise his command objectivity.
    The fade-out emphasizes the irreversible nature of the choice, setting up the
    escalating stakes of the firestorm crisis and Picard’s internal conflict.'
