  title: Riker delivers storm timeline update
  description: 'In a tense, fast-moving corridor exchange, Riker briefs Picard on
    the escalating crisis: Lieutenant Marquez is already deployed on Bersallis Three,
    but the firestorm is accelerating faster than projected, now expected to strike
    the colony in under fifty minutes. Picard absorbs this update with visible gravity,
    his expression tightening as the clock tightens. The urgency of the situation
    forces him to confront the immediate stakes—both for the mission and for Nella
    Daren’s safety—while reinforcing the high-pressure environment that will test
    his command decisions. This moment serves as a critical escalation point, accelerating
    the narrative tension and underscoring the personal cost of Picard’s leadership
    choices as the storm’s arrival looms.'
