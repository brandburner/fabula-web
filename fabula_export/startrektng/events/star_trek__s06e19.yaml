  title: Beverly discovers Picard’s hidden musical intimacy
  description: 'In Sickbay, Beverly Crusher examines Nella Daren’s piano-related wrist
    strain, uncovering the depth of Picard’s private musical bond with her. Nella
    casually reveals their duet practice, prompting Beverly to probe Picard’s emotional
