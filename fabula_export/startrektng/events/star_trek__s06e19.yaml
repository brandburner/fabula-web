      on upholding their boundaries is equally a nod to Starfleet’s expectations,
      a reminder that their relationship must not interfere with duty. The organization’s
      presence is felt in the stiffness of Picard’s posture, the measured tone of
      his voice, and the way both characters dance around the elephant in the room:
      their love for each other.'
