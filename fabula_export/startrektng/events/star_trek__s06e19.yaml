    description_of_involvement: Starfleet is the invisible but omnipresent force shaping
      every action in this event. It is the institution that demands Picard make the
      'right' choice, the framework within which Riker and Worf operate, and the reason
      Nella and her team are on the surface in the first place. Starfleet’s protocols
      dictate the evacuation’s timeline, the deflector team’s mission, and the chain
      of command that forces Picard to issue the fateful order. Its presence is felt
      in the combadges, the *Enterprise*’s bridge, and the unspoken expectation that
      lives will be sacrificed for the greater good. The organization is both a shield
      and a sword—it provides the resources for rescue, but also the moral dilemmas
      that test its officers’ humanity.
    active_representation: Via institutional protocol (evacuation timelines, chain
      of command), through the actions of its officers (Picard, Riker, Worf), and
      the technology at their disposal (deflectors, combadges, *Enterprise* systems).
    power_dynamics: Exercising authority over individuals (Picard’s command), being
      challenged by external forces (the firestorm), and operating under constraint
      (limited time, resources, and moral flexibility).
    organizational_goals:
    - Evacuate the 73 colonists before the firestorm hits
    - Minimize loss of life among Starfleet personnel (including the deflector team)
    influence_mechanisms:
    - Institutional protocols (evacuation priorities, command structures)
    - Technological resources (deflectors, transporters, sensors)
    - Moral and ethical frameworks (duty, sacrifice, the 'greater good')
    - Chain of command (Picard’s authority to make the final call)
    institutional_impact: The event highlights the tension between Starfleet’s ideals
      (protecting lives, exploring the unknown) and its harsh realities (impossible
      choices, acceptable losses). It forces the organization’s officers to confront
      the cost of their missions and the limits of their humanity.
    internal_dynamics: A test of the chain of command—Picard’s decision will either
