  global_id: null
  title: Picard and Nella confront command’s cost
  description: 'In Picard’s quarters, Nella recounts the harrowing details of her
    team’s near-fatal mission on Bersallis Three, where she and Deng barely survived
    a firestorm while Richardson died. Her clinical retelling masks the trauma beneath,
    but Picard’s attempt to apologize—his need for absolution—collides with her unresolved
    grief. When he admits he emotionally shut down after believing she was dead, Nella
    reveals her fear wasn’t of the storm but of his self-blame. Their shared vulnerability
    forces them to acknowledge the irreconcilable tension between their relationship
    and their duties: Picard’s command decisions could kill her, and her survival
    could cripple him. The moment crystallizes their mutual realization that love
    and leadership cannot coexist on the same ship. Nella’s quiet transfer request
    and Picard’s hollow promise of future shore leave underscore the inevitability
    of their separation, leaving both emotionally hollowed out by the weight of their
    choices.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e19
  scene_sequence: 35
  sequence_in_scene: 54
  key_dialogue:
  - 'NELLA: ... when communications went out, I knew we had to fend for ourselves.
    We modified our phasers to create resonant disruptions in the deflector field...
    the disruptions formed small pockets inside the plane of the field... and we each
    stood inside one to wait out the storm. Richardson didn''t make it... all Deng
    and I could do was stand there... and watch.'
  - 'PICARD: Nella... you know I had to give that order - NELLA: Don''t... don''t
    say you''re sorry.'
  - 'PICARD: When I thought you were dead, I went into some kind of shutdown... I
    didn''t want to think, I didn''t want to feel. I was here, in my quarters, and...
    the only thing I could focus on was music... and how it would never give me joy
    again.'
  - 'NELLA: Well... where do we go from here? PICARD: We could continue... hoping
    we wouldn''t face a situation like that again... knowing that we might... hoping
    the pressures on us wouldn''t begin to erode our feelings for each other... That''s
    not what I want for us. NELLA: I know. Neither do I. PICARD: I don''t think we
    can serve on the same ship.'
