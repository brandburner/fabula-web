- fabula_uuid: act_53397235897dc52a
  number: 3
  summary: 'Leaving the Jefferies Tube, Picard and Nella''s romantic moment is abruptly
    interrupted by the presence of a crewman in the turbolift, causing Picard to revert
    to a formal, professional demeanor, which leaves Nella questioning his feelings.
    Simultaneously, a firestorm on Bersallis Three is reported, initially not a direct
    threat. Picard seeks Deanna Troi''s counsel regarding his relationship with Nella,
    expressing concerns about objectivity and command. Troi, however, gives her ''permission,''
    validating his feelings. Picard then apologizes to Nella for his public reserve,
    explaining his self-consciousness, and shares the deeply personal story of the
    Kataan probe and his flute, demonstrating the profound meaning of their shared
    music. This leads to a more passionate kiss, solidifying their private bond. However,
    the professional implications surface when Riker expresses discomfort about Nella''s
    requests for personnel transfers, fearing perceived favoritism. Picard addresses
    Riker''s concerns, reassuring him of his trust. Later, Picard and Nella discuss
    Riker''s discomfort, and Picard warns her about maintaining her effectiveness
    as an officer, playfully threatening to replace her if her performance suffers.
    Their romantic dinner is then dramatically interrupted by an urgent report: the
    Bersallis Three firestorm has changed course and now directly threatens the outpost,
    requiring immediate evacuation.'
