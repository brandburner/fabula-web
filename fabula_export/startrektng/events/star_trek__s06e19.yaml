    protocols for the surface."'
  - 'RIKER: "Sir, we’ve got deflector teams already in place, but the storm’s energy
    readings are off the scale. If we don’t stabilize the perimeter—"'
  - 'PICARD: "I’m aware, Number One. But we don’t have time for alternatives. Get
    me a status report on the deflector grid—now."'
