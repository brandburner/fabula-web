    description_of_involvement: Picard’s communicator is the sole conduit between
      the *Enterprise* and the perimeter team on Bersallis Three, its crackling transmission
      a fragile lifeline in the firestorm. The device distorts Picard’s voice, stripping
      it of warmth and humanity, leaving only the cold authority of command. Its static-filled
      transmission underscores the physical and emotional distance between Picard
      and Nella, as well as the precarity of their situation. The communicator is
      not just a tool for communication; it is a symbol of Starfleet’s reach and the
      impersonal nature of its directives. When Picard signs off with *‘Picard out,’*
      the finality of the transmission mirrors the finality of the order—there is
      no room for negotiation or appeal.
    status_before_event: Functional but strained, with intermittent static due to
      the firestorm’s interference. Held by an off-screen crew member on the *Enterprise*
      bridge, likely Worf or another senior officer.
    status_after_event: Remains active but now carries the weight of the order issued.
      The static continues, a constant reminder of the tenuous connection between
      command and those executing it.
