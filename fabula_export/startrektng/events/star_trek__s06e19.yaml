  title: Picard Challenges Nella’s Assignment
  description: In the observation lounge, senior officers gather to devise a countermeasure
    against the deadly firestorm threatening Bersallis Three. Geordi and Nella propose
    a high-risk thermal deflector strategy, which Riker swiftly endorses, assigning
    Nella to coordinate the perilous deployment. Picard’s visible discomfort—his stiffened
    posture and quiet intervention after the meeting—reveals his personal fear for
    her safety, clashing with his professional duty. Nella rebuffs his concern, invoking
    their agreement to keep their relationship separate from work, leaving Picard
    visibly shaken by the collision of duty and emotion. The exchange underscores
    the fragility of their professional boundaries and foreshadows the emotional toll
    of the crisis on Picard’s leadership and their relationship.
