- fabula_uuid: cand_evt_scene_9affec9cad91658e_01
  global_id: null
  title: Picard learns Daren is missing
  description: 'In the aftermath of the Bersallis Three evacuation, Picard enters
    sickbay to check on Riker, who delivers the devastating news that two perimeter
    teams—including Daren’s—are unaccounted for. Riker’s grim report forces Picard
    to confront the unspoken stakes of Daren’s mission, his professional composure
    fracturing as he realizes she may be lost. The moment is a turning point: Picard’s
    visceral reaction (ashen face, abrupt departure) exposes his repressed emotional
    attachment to Daren, colliding with his duty as captain. The scene underscores
    the tension between personal vulnerability and command responsibility, setting
    up Picard’s later grief and the narrative’s emotional climax.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e19
  scene_sequence: 32
  sequence_in_scene: 50
  key_dialogue:
  - 'RIKER: I got out with the last of the colonists. If it hadn''t been for the perimeter
    teams, we wouldn''t have made it.'
  - 'RIKER: ((grim)) The interference kept us from getting the other two... I don''t
    see how they could have survived.'
  - 'RIKER: The last I knew, Commander Daren was with team six.'
