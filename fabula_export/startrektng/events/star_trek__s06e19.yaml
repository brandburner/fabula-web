  title: Picard seeks Troi’s counsel on love and duty
  description: 'In the Ready Room, Picard initiates a private conversation with Troi,
    framing his concern as a matter of protocol to mask his personal vulnerability.
    He admits his growing feelings for Nella Daren but expresses fear that these emotions
    could compromise his command objectivity. Troi, recognizing the depth of his conflict,
    validates his feelings while gently challenging his assumption that suppressing
    them is the only professional solution. The exchange reveals Picard’s internal
    struggle between personal desire and Starfleet duty, with Troi’s blessing serving
    as both validation and a nudge toward self-reflection. The moment is pivotal:
    Picard’s relief at Troi’s approval is tempered by lingering uncertainty, setting
    up his eventual reckoning with Nella and the broader consequences of their relationship
    on his leadership.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e19
  scene_sequence: 15
  sequence_in_scene: 24
  key_dialogue:
  - |-
    PICARD: I wanted to talk to you about a matter of... protocol.
    PICARD: I know there are no Starfleet regulations about a Captain becoming involved with a fellow officer, but...
    TROI: You'd like my opinion about you and Commander Daren.
  - |-
    TROI: And you think that perhaps your feelings toward Nella could change the way you function as Captain...
    PICARD: Yes. Relationships with coworkers can be fraught with consequences.
    TROI: That's true. But cutting yourself off from your feelings can carry consequences that are just as important.
  - |-
    PICARD: If I were... would you give it?
    TROI: Yes.
