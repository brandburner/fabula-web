  scene_sequence: 20
  sequence_in_scene: 30
  key_dialogue:
  - 'PICARD: Commander Riker came to talk to me this afternoon. About you.'
  - 'NELLA: Did he think I was asking for special treatment?'
  - 'PICARD: All I''m saying is that it''s something we have to be aware of. But don''t
    compromise yourself, do what you have to do. Because if I find out that the head
    of Stellar Sciences isn''t effective anymore, I''ll do what I have to do... I''ll
    replace her.'
  - 'WORF''S COM VOICE: Bridge to Captain. Bersallis Three reports that the storm
    has changed its speed and heading. They are predicting it will hit the outpost
    within eight hours and are requesting evacuation.'
