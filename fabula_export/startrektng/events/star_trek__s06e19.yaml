- fabula_uuid: act_226f01ad60b3a3d6
  number: 4
  summary: The Enterprise arrives at Bersallis Three, where a critical meeting is
    held to plan the evacuation of the Federation outpost, now directly threatened
    by an unprecedented firestorm. Geordi and Nella propose a risky plan to deploy
    thermal deflector units to create a protective 'fire wall' against the storm.
    Riker assigns crucial roles, including Nella to coordinate the dangerous deflector
    deployment on the surface. Picard, visibly stiffening at Nella's assignment, privately
    expresses his concern for her safety, questioning Riker's choice and suggesting
    other personnel could handle it. Nella reminds him of their agreement to keep
    their relationship from interfering with their work, reassuring him that she is
    the best person for the job. Picard reluctantly accepts her reasoning, though
    his discomfort remains evident. As the storm intensifies and time runs out, Picard
    watches Nella and the other teams dematerialize to the planet's surface, his eyes
    conveying deep worry and a profound sense of personal risk as he sends her into
    imminent danger.
