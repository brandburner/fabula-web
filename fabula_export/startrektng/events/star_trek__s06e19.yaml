    functional_role: |2-

      Battleground and evacuation site. The northern perimeter is where the deflector system must hold long enough to protect the team and the colonists, and where Picard's command decision will play out. It is a place of last resort, where the fate of the mission is decided in the final minutes before the firestorm strikes.
