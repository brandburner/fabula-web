  object_involvements:
  - object_uuid: ger_object_c264bac39b52
    description_of_involvement: 'The failing deflector system is the fragile lifeline
      of Nella Daren and her team, a precarious shield against the encroaching firestorm.
      Sparks erupt from its control panels as they struggle to manually calibrate
      it, the equipment groaning under the strain of the storm’s electromagnetic interference.
      It is both a tool and a ticking clock—its stability determines whether the team
      survives the next four minutes, and its failure would doom them instantly. The
      deflectors are a physical manifestation of the dilemma: a temporary solution
      that buys time, but at the cost of exposing others to risk.'
    status_before_event: Functional but unstable, requiring constant manual adjustments
      to maintain the energy field. Sparks indicate internal damage, and the cross-connections
      are failing under the storm’s pressure.
    status_after_event: Still operational but critically weakened—its collapse is
      imminent, and the team’s efforts have only delayed the inevitable by minutes.
      The storm’s approach renders it a liability rather than a shield.
    global_id: ger_object_c264bac39b52
  - object_uuid: ger_object_14188151dae6
    description_of_involvement: The combadges serve as the lifeline between the storm-lashed
      surface and the *Enterprise* bridge, crackling with static as critical updates
      are relayed. Nella’s combadge is gripped tightly in her hand, her voice straining
      to be heard over the wind as she reports the deflectors’ status. Picard’s combadge
      is the conduit through which he receives Worf’s countdown and Riker’s evacuation
      updates, the device buzzing with the urgency of the moment. These objects are
      more than tools—they are the vessels of tension, the means by which the impossible
      choice is communicated and must be answered.
