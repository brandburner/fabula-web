    institutional_impact: The crew’s actions have accelerated the crisis, forcing
      a shift from institutional reliance to individual ingenuity.
    internal_dynamics: Fragmentation and loss of cohesion—crewmembers are either de-evolved
      or absent, leaving Picard and Data as the sole functional leadership.
