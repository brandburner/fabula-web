      crisis. While not physically present here, the tricorder''s role in the mutation''s
      origin looms over the scene, as Picard and Data investigate the consequences
      of that initial treatment. The object''s absence highlights the urgency of their
      mission: to find a cure before the entire crew succumbs to the same fate as
      Troi.'
