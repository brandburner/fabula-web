  title: Riker’s embarrassment and Barclay’s cure
  description: In a moment of levity amid the crew’s de-evolution crisis setup, Commander
    Riker seeks medical treatment in Sickbay for injuries sustained during a romantic
    encounter with Rebecca White—specifically, cactus thistles embedded in his skin.
    The scene contrasts Riker’s human vulnerability with the high-stakes plot unfolding,
    as Beverly Crusher diagnoses Barclay’s hypochondriacal fears as a mild Urodelan
    Flu, administering a synthetic T-cell to activate a dormant gene. This treatment,
    though seemingly routine, becomes the inciting incident of the episode’s central
    crisis, as the synthetic T-cell mutates and triggers the airborne de-evolution
    virus. Meanwhile, Ogawa reveals her pregnancy, a detail that later becomes critical
    to the cure, while Data’s cat, Spot, also de-evolves into an iguana. The scene’s
    comedic tone underscores the absurdity of the crew’s predicament, reinforcing
    their shared humanity even as their bodies begin to regress. Riker’s embarrassment
    serves as a brief but pointed contrast to the escalating stakes, grounding the
    narrative in personal stakes before the crisis fully unfolds.
