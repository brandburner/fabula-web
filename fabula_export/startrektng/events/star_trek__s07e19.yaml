  - 'BEVERLY: No... in a way, it was mine. I didn’t realize it at the time, but there’s
    an anomaly in your genetic chemistry that caused the synthetic T-cell to mutate...
    Instead of just activating one dormant gene, it started to activate all of them
    -- including your introns.'
  - 'TROI: (re: Barclay) (with humor)) He transformed into a spider... and now he’s
    had a disease named after him... I think I’d better clear my calendar for the
    next few weeks.'
