  - character_uuid: ger_agent_868446276ca7
    emotional_state: Feral and mating-driven, with aggression momentarily redirected
      by primal instincts. His emotional state is a raw, unfiltered expression of
      de-evolved Klingon biology, devoid of higher reasoning or moral constraints.
    goals:
    - To break into Sickbay and assert dominance (initial goal, overridden by pheromones)
    - To pursue the source of the pheromones (mating instinct takes priority)
    what_happened: Worf, now a hulking, feral Klingon in advanced de-evolution, pounds
      aggressively on the Sickbay door with primal fury. His transformation is evident
      in his enlarged form and raw, instinct-driven behavior. Upon sensing the pheromones,
      his pounding stops abruptly, and he lets out a mating howl before charging down
      the corridor in pursuit of Picard, his movements driven by mating instincts
      rather than rational thought.
    observed_status: Worf, now a hulking, feral Klingon in advanced de-evolution,
