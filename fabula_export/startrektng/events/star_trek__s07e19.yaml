- fabula_uuid: cand_evt_scene_ac7fdce0eb895916_02
  global_id: null
  title: Picard insists on retrieving rogue torpedo
  description: "\n  The bridge crew conducts a routine test of the Enterprise's upgraded\
    \ photon torpedoes, with Worf demonstrating their enhanced yield and targeting\
    \ systems. When one torpedo malfunctions and veers off course, Picard immediately\
    \ orders its destruction, but Worf reports the detonator fails. Recognizing the\
    \ danger posed by the rogue weapon, Picard overrules Data's safety objections\
    \ and Riker's suggestion of a shuttle pilot, insisting on personally retrieving\
    \ it in a shuttlecraft. His decision stems from both a desire to escape the tedium\
    \ of the bridge and a commander's instinct to handle critical situations directly.\
    \ Data, however, abruptly requests a delay for unspecified personal matters, introducing\
    \ an unexpected detour that hints at deeper stakes beyond the immediate crisis.\
    \ The scene pivots from a technical failure to a moment where Picard's leadership\
    \ and Data's rare personal request intersect, foreshadowing the crew's impending\
    \ struggle against the de-evolution crisis.\n  "
