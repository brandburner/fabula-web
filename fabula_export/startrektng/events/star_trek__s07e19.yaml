  title: Riker’s devolution exposed
  description: "\n  Picard and Data enter the Ready Room to find Commander Riker in\
    \ a horrifyingly reduced state—his cognitive functions stripped to a proto-human\
    \ level. His physical appearance is grotesque: a thickened skull, protruding canines,\
    \ and dark hair covering his face and hands, resembling an early primate. When\
    \ Picard attempts to address him, Riker reacts with primal aggression, hurling\
    \ a terminal and lunging at Picard in a violent outburst. Data intervenes with\
    \ a phaser, stunning Riker unconscious after he recovers from the first shot.\
    \ The encounter confirms the crew’s de-evolution, with Data’s medical scan revealing\
    \ Riker’s brain has shrunk by 20%, leaving him incapable of comprehension. This\
    \ moment serves as a visceral turning point, escalating the crisis and forcing\
    \ Picard and Data to confront the irreversible nature of the mutation spreading\
    \ through the ship. The event underscores the urgency of their mission to synthesize\
    \ a cure before the entire crew loses all higher reasoning.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e19
  scene_sequence: 22
  sequence_in_scene: 40
  key_dialogue:
  - 'PICARD: Commander Riker... ?'
  - 'DATA: His cranial plates have thickened by twenty percent -- his brain is much
    smaller, sir. I doubt he can comprehend our language.'
  - 'PICARD: I think he''s trying to communicate...'
  - 'PICARD: Wil, can you -'
  - 'DATA: Captain... I believe the crew is de-evolving.'
