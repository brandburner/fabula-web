  title: Barclay’s T-cell treatment triggers mutation
  description: "\n  In Sickbay, Beverly Crusher diagnoses Barclay’s hypochondriacal\
    \ fears as a mild case of Urodelan Flu, a rare K-3 cell imbalance. Her administration\
    \ of a synthetic T-cell—intended to activate a dormant gene—unwittingly sets off\
    \ a chain reaction: the treatment mutates and becomes airborne, infecting the\
    \ *Enterprise* crew and initiating their rapid de-evolution. The scene begins\
    \ with comedic levity (Riker’s post-romantic cactus thistle removal) and a moment\
    \ of warmth (Ogawa revealing her pregnancy), but the inciting incident of the\
    \ episode’s central crisis emerges when Beverly’s well-intentioned medical intervention\
