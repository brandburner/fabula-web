    Is he responding to some sort of predatory instinct? Does he see us as prey?'
  - 'PICARD: The mating process... Counselor Troi has been bitten by a Klingon...
    but it''s not in a life-threatening location... nowhere near a major artery or
    organ... And look at the wound itself... the penetration of the bite is very shallow,
    as if he didn''t intend to seriously injure her...'
  - 'PICARD: No... you... you must stay here... continue working on the retro-virus...
    I''ll go... No time... no time to argue.'
