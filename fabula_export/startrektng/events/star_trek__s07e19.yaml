  title: Riker’s Cognitive Collapse and Worf’s Venom Threat
  description: In the observation lounge, Ogawa reports Beverly Crusher’s near-fatal
    attack by Worf, revealing his venomous mutations and the crew’s escalating de-evolution.
    Barclay links Worf’s venom to the acidic compound spreading across the ship, confirming
    the pathogen’s systemic threat. Riker, visibly deteriorating, struggles to process
    the crisis, deferring critical decisions to Geordi—his cognitive decline now impairing
    command. The scene underscores the crew’s unraveling cohesion, with Riker’s inability
    to contact Starfleet marking a failure of leadership at the precise moment the
    Enterprise needs unified action. The tension between Ogawa’s clinical urgency
    and Riker’s fading competence exposes the ship’s vulnerability, while Barclay’s
    hyperactive state contrasts with the others’ paralysis, foreshadowing the chaos
    to come.
