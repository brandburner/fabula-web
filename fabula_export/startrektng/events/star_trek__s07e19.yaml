    hurling a terminal and lunging at Picard in a feral attack. Data intervenes with
    a phaser stun, subduing Riker and confirming the crew’s de-evolution through a
    medical scan. The scene underscores the escalating crisis: even the most disciplined
    officers are losing their humanity, and the clock is ticking to reverse the mutation
    before it becomes irreversible. The moment serves as a brutal turning point, forcing
    Picard and Data to confront the existential threat to the entire crew’s survival.'
