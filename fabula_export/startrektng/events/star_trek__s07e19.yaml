  title: Troi's primal environmental adjustments
  description: Deanna Troi, visibly unraveling under the airborne mutation's effects,
    exhibits compulsive behaviors to counteract her escalating metabolic demands.
    She drinks an entire glass of water in one go, then immediately refills it, signaling
    her body's desperate need for hydration. Her next action—adjusting her quarters'
    temperature to 29°C and humidity to 90%—reveals her instinctive attempt to regulate
    her rapidly changing physiology. The clinical precision of her commands contrasts
    with the primal urgency of her actions, underscoring the de-evolution's psychological
    toll. This moment serves as a visual and narrative escalation, demonstrating how
    the mutation is stripping away her humanity layer by layer, while also foreshadowing
    the crew's inevitable regression if Picard and Data fail to synthesize the retro-virus
    in time. The environmental adjustments also hint at her impending transformation
    into an amphibian, as her body seeks conditions that mimic her future state.
