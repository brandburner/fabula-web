  - 'WORF: One of the torpedoes has veered off course. It appears to be a malfunction
    in the guidance system.'
  - 'PICARD: Abort and destroy.'
  - 'WORF: Torpedo is not responding... the subspace detonator will not engage.'
  - 'PICARD: Then I''ll take a shuttlecraft to retrieve it. Mister Data, you''re with
    me.'
  - 'DATA: That would be inadvisable, sir. The asteroid field is unusually dense—the
    Enterprise is too large to navigate through it safely.'
  - 'DATA: Captain, I will need a few minutes to take care of some personal affairs.'
