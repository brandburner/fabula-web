      leveraging all available sensors.
    - Identify the cause of the *Enterprise*’s absence to restore logical continuity
      and aid Picard’s decision-making.
    what_happened: "\n        Data sits at the shuttlecraft’s helm, his golden eyes\
      \ flickering as he processes the anomaly. His fingers move with precision over\
      \ the console, but his voice carries an uncharacteristic note of puzzlement—'I\
      \ do not know'—as he fails to raise the *Enterprise* on any channel. When Picard\
