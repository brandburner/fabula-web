  participations:
  - character_uuid: ger_agent_868446276ca7
    emotional_state: Feral and enraged, driven by instinctual fury at the loss of
      control and the sight of Picard—once a respected superior—now a target for his
      primal hunting impulses. The roar is not just anger but a declaration of dominance
      and territorial threat.
    goals:
    - Capture or eliminate Picard as prey
    - Assert dominance over the corridor/turbolift space
    what_happened: Worf, now fully transformed into a prehistoric, feral Klingon,
      stands at the far end of the corridor, his body bulkier and more powerful, his
      uniform torn in places. His head is utterly transformed—ridges bristle with
      sharp edges, encasing his entire face in black chitin-like material, and a large
      mandible snaps open and shut. He tilts his head back and lets out a guttural
      roar of rage upon realizing Picard is escaping, then charges toward him with
      predatory intent, his movements hunched and primal.
    observed_status: Worf, now fully transformed into a prehistoric, feral Klingon,
