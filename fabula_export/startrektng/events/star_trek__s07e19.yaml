      actions.
    goals: []
    what_happened: Ensign Dern’s corpse lies broken on the bridge deck, his uniform
      in tatters and his face marred by deep scratch marks. His spinal column is shattered
      in three places, and his DNA shows early-stage mutations from the virus. Dern’s
      body serves as a grim testament to the violence unleashed by the de-evolution
      process, his death marking the transition from isolated cases to a shipwide
      catastrophe. His presence on the bridge underscores the immediacy and brutality
      of the threat.
