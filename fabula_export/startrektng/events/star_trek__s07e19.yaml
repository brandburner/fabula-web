  title: Troi’s irreversible amphibian transformation
  description: "\n  Picard and Data discover Counselor Troi submerged in her bathtub,\
    \ her body fully transformed into an amphibian-like state. Her gills, golden slit-pupiled\
    \ eyes, and eel-like skin confirm her irreversible de-evolution, while a Klingon\
    \ saliva bite mark on her cheek suggests external interference. When Picard pulls\
    \ her from the water, Troi—now disoriented and alien—wriggles free and returns\
    \ to the water, rejecting her human past. Data’s scan reveals her DNA is in ribocyatic\
    \ flux, no longer human, while Picard, horrified, prioritizes regaining ship control\
    \ over further analysis. The moment crystallizes the crew’s accelerating biological\
    \ crisis and forces Picard to abandon personal stakes for mission survival, underscoring\
    \ the conflict between scientific curiosity and existential urgency.\n  "
