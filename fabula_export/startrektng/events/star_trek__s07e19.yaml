  - object_uuid: ger_object_5bb0b3487328
    description_of_involvement: The Sickbay wall monitor is critical to Data’s efforts
      to restore the medical database and continue retro-virus research. Initially
      offline due to the de-evolution crisis, Data bypasses the main computer systems
      by activating local subprocessors, bringing the monitor back online. This restoration
      enables real-time tracking of genetic re-sequencing and other medical data,
      providing the crew with a lifeline in their fight against the de-evolution virus.
      Its functionality is directly tied to the success of the cure.
    status_before_event: Offline due to the de-evolution crisis, dark and non-functional,
