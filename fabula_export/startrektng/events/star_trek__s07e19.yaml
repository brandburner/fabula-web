      assessment to active defense. The weapons hum with readiness, their presence
      underscoring the immediate physical threat and the crew’s need to protect themselves
      against the de-evolved intruder. The phasers serve as both a practical tool
      for confrontation and a narrative marker of the escalating danger aboard the
