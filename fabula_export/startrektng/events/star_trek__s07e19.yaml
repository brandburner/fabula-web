  scene_sequence: 8
  sequence_in_scene: 15
  key_dialogue:
  - 'BARCLAY: We removed the torpedo bay''s primary guidance module and found a power
    fluctuation in the forward sensor cluster and we think there may be a radial imbalance
    in the phase discriminator. Now what we want to do next is run a level four diagnostic,
    but that''s going to mean shutting down auxiliary power to nineteen decks and
    -'
  - 'RIKER: Wait... slow down... I lost you back there... Which sensor cluster?'
  - 'GEORDI: It''s all right in here in this diagram, sir.'
  - 'RIKER: I''ll... take a look at this later. In the meantime, go ahead and run
    your diagnostic. I''ll notify all departments about the power shutdown.'
  - 'RIKER: He''s full of energy today.'
  - 'GEORDI: I can''t get him to slow down. He''s been working since late last night...'
