- fabula_uuid: cand_evt_scene_739692c0fa011f98_01
  global_id: null
  title: Bridge Horror and Mutation Scale Revealed
  description: "\n  Picard and Data return to the Enterprise’s bridge to find it in\
    \ ruins—walls clawed, consoles shattered, and Ensign Dern’s corpse sprawled on\
    \ the deck, his spine broken and DNA already mutating. The scene confirms the\
    \ airborne virus has escalated from isolated cases to a shipwide catastrophe,\
    \ with Data’s scan revealing over a thousand lifeforms undergoing genetic regression.\
    \ Picard prioritizes restoring attitude control while Data identifies dangerous\
    \ concentrations of mutated life in the arboretum and aquatics lab. The discovery\
    \ of Dern’s body—attacked by something feral—underscores the virus’s physical\
    \ violence, while the thumping from the Ready Room signals an immediate, unseen\
    \ threat. The moment crystallizes the crisis: the crew’s humanity is unraveling,\
    \ and the ship itself has become a battleground.\n  "
