acts:
- fabula_uuid: act_3b37f637359988cc
  number: 1
  summary: The narrative opens in Sickbay, establishing Lieutenant Barclay's pervasive
    hypochondria, which Doctor Crusher addresses by administering a synthetic T-cell
    to combat a mild Urodelan Flu. During this initial sequence, Nurse Ogawa reveals
    her pregnancy, a detail that will prove critically important later, and Data entrusts
    Barclay with the care of his expectant cat, Spot. This seemingly innocuous setup
    subtly introduces the key biological elements and characters central to the unfolding
    crisis. Following this, Captain Picard and Data depart the Enterprise on a mission
    to retrieve a stray photon torpedo, leaving Commander Riker in temporary command.
    Almost immediately, during routine weapon tests, Lieutenant Worf exhibits unusual
    agitation and aggression, snapping at Riker and later displaying increasingly
    feral eating habits in Ten Forward, coupled with a disturbing, predatory gaze
    directed at Counselor Troi. Troi, in turn, begins to experience an uncharacteristic
    and intense sensitivity to cold. Worf's behavioral regression escalates further
    as he instinctively constructs a crude nest in his quarters, adopting a fetal
    sleeping position, signaling a profound, primordial shift within his biology.
    These early, unsettling changes among key crew members serve as the initial tremors
    of the widespread de-evolution about to engulf the ship, effectively establishing
    the central mystery and strategically removing the two most capable problem-solvers
    from the immediate scene. The synthetic T-cell, administered to Barclay, stands
    as the silent, unseen catalyst for the impending biological catastrophe.
