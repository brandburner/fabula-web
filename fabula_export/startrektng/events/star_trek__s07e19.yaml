- fabula_uuid: act_41d3d3ff0be3ffb3
  number: 2
  summary: The de-evolutionary symptoms among the crew intensify and spread rapidly.
    Lieutenant Barclay displays extreme hyper-energy, rapid speech, and nervous tics,
    indicating an accelerated metabolic state, while Commander Riker's cognitive abilities
    noticeably decline, rendering him slow and struggling to comprehend technical
    reports or diagrams. In Engineering, Barclay and Geordi discover a corroded panel,
    suggesting an unknown, highly corrosive organic solvent is at work, a precursor
    to the biological nature of the threat. Simultaneously, Counselor Troi's obsession
    with warmth and hydration escalates dramatically, leading her to immerse herself
    in her bathtub, fully clothed, in a desperate, instinctual attempt to regulate
    her rapidly changing body temperature. On the Bridge, Riker's mental incapacitation
    becomes profound, rendering him unable to make even basic decisions or recall
    recent events, leaving the ship's command structure critically compromised. The
    crisis culminates dramatically when Worf, now fully consumed by primal instincts,
    violently bites Troi on the cheek. Doctor Crusher, investigating Worf's increasingly
    erratic and animalistic behavior, discovers a strange, veiny venomous sac developing
    on his neck. Before she can fully understand its implications, Worf attacks her
    with a blast of bio-acidic venom and escapes Sickbay, leaving her incapacitated
    and the medical bay in disarray. Nurse Ogawa reports widespread strange behavioral
    changes among sixty crewmen, confirming a rapidly spreading, unknown disease.
    The act concludes with Riker completely disoriented, staring vacantly out a window,
    unable to contact Starfleet, signifying the Enterprise's descent into chaos and
    the crew's complete loss of control.
