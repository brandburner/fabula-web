      feral pounding threatens to breach it, putting Data’s research and the crew’s
      lives at risk. Picard’s pheromone distraction is a direct response to this threat,
      buying time to prevent Worf from breaking through. The door’s integrity is symbolic
      of the crew’s tenuous hold on order amid the crisis, and its survival is critical
      to their ability to fight back.
    status_before_event: Intact but under siege, buckling under Worf’s relentless
