    global_id: ger_object_a9c296e75089
  - object_uuid: ger_object_7bbe8afb1820
    description_of_involvement: The rerouted plasma cable, previously identified by
      Barclay as a critical vulnerability in the Jefferies Tubes, becomes Picard’s
      improvised weapon against Worf. Picard rips the cable from a corroded panel,
      and its crackling plasma energy becomes the deciding factor in the confrontation.
      He uses it to deliver a massive electrical shock to Worf, dropping the Klingon
      unconscious. The cable’s role shifts from a maintenance hazard to a lifesaving
      tool, symbolizing the crew’s ability to turn their ship’s flaws into advantages
      in a crisis.
    status_before_event: Exposed and accessible in the Jefferies Tube, rerouted by
      Barclay earlier in the episode and still crackling with plasma energy.
    status_after_event: Severed from the panel and used to electrocute Worf; its energy
      is spent, and it lies dormant beside the unconscious Klingon.
    global_id: ger_object_7bbe8afb1820
  - object_uuid: ger_object_5bb0b3487328
    description_of_involvement: The Sickbay wall monitor displays Ogawa’s genetic
      re-sequencing in real time, tracking the retro-virus’s progress as her DNA gradually
      returns to normal. Data interacts with the monitor, adjusting nucleotide substitution
      rates to accelerate the process. The monitor’s graphic representation of the
      DNA strand—twisting, breaking, and reordering—serves as a visual metaphor for
      the crew’s struggle to reverse the de-evolution. Its data is critical to Data’s
      ability to communicate the treatment’s success to Picard.
    status_before_event: Displaying a mutated DNA strand in a frenzied state of re-sequencing,
      with progress at 70% normal.
    status_after_event: Showing a fully re-sequenced DNA strand, indicating Ogawa’s
      stabilization and the retro-virus’s success.
    global_id: ger_object_5bb0b3487328
  - object_uuid: ger_object_3e67235a4c73
    description_of_involvement: Worf’s venom sac, a grotesque and veiny pouch bulging
      from his neck, is the primary weapon in his de-evolved state. He sprays Picard
      with corrosive venom, forcing the captain to drop his phaser and retreat. The
      venom sac represents the biological regression of the crew, turning Worf into
      a predator whose attacks are both physical and chemically devastating. Its presence
      heightens the stakes of the confrontation, as Picard must avoid direct contact
      while devising a way to neutralize the threat.
    status_before_event: Engorged and throbbing with bioacidic venom, ready to spray
