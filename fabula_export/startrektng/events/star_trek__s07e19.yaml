  - object_uuid: ger_object_a9c296e75089
    description_of_involvement: Data’s combadge facilitates crucial communication
      between him and Picard during the crisis. He taps it to relay the progress of
      Ogawa’s treatment, confirming that the retro-virus is working and can be deployed
      shipwide. The combadge ensures that Picard, even in the midst of his life-or-death
