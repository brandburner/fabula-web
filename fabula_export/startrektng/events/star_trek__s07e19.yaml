  - object_uuid: ger_object_0259d7fdd69f
    description_of_involvement: 'Picard and Data draw their phasers in unison, marking
      a dramatic shift from diagnostic analysis to armed action. The phasers, humming
      with charged energy, symbolize the crew’s descent into chaos—where logic and
      science must now contend with the primal threat of the virus. Their decision
      to arm themselves reflects the breakdown of order: the ship’s systems are failing,
      crewmembers are de-evolving, and time is their only enemy. The phasers become
      tools of both defense and desperation as they prepare to navigate a ship overrun
      by its own biology.'
    status_before_event: Holstered on Picard and Data’s uniforms, fully charged and
      operational.
    status_after_event: Drawn and held at the ready, phasers become extensions of
      their determination as they exit Sickbay.
