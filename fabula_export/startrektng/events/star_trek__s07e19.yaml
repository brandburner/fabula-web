  title: Picard deduces Worf’s mating drive
  description: With Worf’s feral assault on Sickbay’s door escalating, Picard—fighting
    his own de-evolving instincts—analyzes the Klingon’s primal howls and realizes
    they stem from a mating drive triggered by Troi’s earlier bite. Recognizing the
    danger, Picard devises a plan to lure Worf away using Troi’s pheromones, ensuring
    Data can continue synthesizing the retro-virus cure. The moment underscores the
    crew’s desperate struggle against their own biology while highlighting Picard’s
    leadership under extreme duress. His decision to personally execute the distraction—despite
    Data’s warnings—reveals his willingness to sacrifice himself for the mission,
    even as his own rationality frays at the edges. The scene also foreshadows the
    thematic tension between instinct and control, a conflict central to the episode’s
    crisis.
