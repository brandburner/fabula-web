- fabula_uuid: cand_evt_scene_6ea571ece4244ca1_02
  global_id: null
  title: Data restores Sickbay systems while Picard lures Worf
  description: 'In a high-stakes moment of parallel action, Picard uses pheromones
    to distract a feral, de-evolved Worf—now a monstrous prehistoric Klingon—luring
    him away from Sickbay to prevent interference with Data’s critical work. Meanwhile,
    Data bypasses the offline medical database by rerouting the Enterprise’s computer
    to activate local subprocessors, successfully restoring Sickbay’s wall monitor.
    This dual maneuver—Picard’s tactical misdirection and Data’s technical ingenuity—creates
    a fragile window of opportunity to analyze the airborne synthetic T-cell mutation,
    a pivotal step in reversing the crew’s de-evolution before it becomes irreversible.
    The scene underscores the escalating crisis: Picard’s desperation to protect Data’s
    work contrasts with Data’s methodical precision, while Worf’s transformation into
    a primal threat highlights the urgency of the situation. The restored monitor
    becomes a lifeline for the crew’s survival, symbolizing hope amid chaos.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e19
  scene_sequence: 28
