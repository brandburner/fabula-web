  - character_uuid: ger_agent_868446276ca7
    emotional_state: Feral and single-minded, driven by primal mating instincts after
      exposure to the pheromones. His emotional state is a volatile mix of aggression
      and instinctual urgency, with no trace of his usual disciplined Klingon honor
      or Starfleet training.
    goals:
    - Destroy the barrier (Sickbay door) to reach those inside, driven by de-evolved
      aggression.
    - Pursue the source of the pheromones (Picard) once exposed, acting on mating
      instincts.
    what_happened: Worf, now a hulking, feral monstrosity, pounds aggressively on
      the Sickbay door with primal fury. His transformation into a prehistoric Klingon
      is barely glimpsed but felt through the thunderous impacts and guttural howls.
      When Picard sprays pheromones into the corridor, Worf’s aggression instantly
      shifts to mating instinct—he ceases his assault on the door, sniffs the air,
      and lets out a mating howl before charging after Picard in a thunderous pursuit
      down the corridor. His movements are raw, instinct-driven, and devoid of higher
      reasoning, embodying the de-evolution’s full horror.
