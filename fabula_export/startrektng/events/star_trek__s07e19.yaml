  title: Data proposes micro-cellular scans in his quarters
  description: In Sickbay, Picard and Data analyze Riker’s de-evolved DNA, confirming
    the synthetic T-cell mutation activates dormant introns, forcing crewmembers into
    ancestral forms. Data reveals Picard is infected with a 12-hour deadline before
    irreversible transformation. When the ship’s main computer is deemed compromised,
    Data suggests using his independent quarters computer for micro-cellular scans—a
    critical pivot from reactive crisis management to targeted intervention. The two
    arm themselves with phasers, marking their shift from passive observation to active
    problem-solving as they prepare to leave Sickbay for Data’s quarters, where the
    next phase of the cure’s development will unfold. The moment underscores the urgency
    of their mission and the fragility of their remaining time.
