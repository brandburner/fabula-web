    asks about the pending Starfleet weapons analysis, Riker’s blank stare and delayed
    response reveal his cognitive decline—a direct consequence of the T-cell mutation.
    His hesitation and distant demeanor mark a critical turning point, exposing the
    virus’s accelerating toll on his mind and undermining his command authority. The
    moment forces Picard to intervene later, as Riker’s inability to perform basic
    duties foreshadows his full devolution into a proto-human. The scene underscores
    the urgency of the cure, as the crew’s collective intelligence erodes before their
    eyes.
