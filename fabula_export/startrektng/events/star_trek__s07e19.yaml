      Data to operate outside conventional procedures. The organization's ability
      to function is being tested, and its survival depends on their ability to adapt
      and find a solution.
    internal_dynamics: The crew's de-evolution is creating internal tensions, as some
      members may be resistant to or unaware of their transformation. Picard and Data
      must navigate this chaos, balancing their investigative efforts with the need
      to protect the remaining crew members from further harm.
