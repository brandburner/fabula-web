- fabula_uuid: cand_evt_scene_739692c0fa011f98_02
  global_id: null
  title: Picard and Data discover bridge devastation
  description: Picard and Data arrive on the darkened, vandalized bridge to find Ensign
    Dern’s corpse—his spine broken and DNA mutating—confirming the airborne virus
    has begun irreversible de-evolution across the crew. While Picard restores attitude
    control, Data’s scan reveals over a thousand lifeforms aboard are regressing,
    with concentrated clusters in the arboretum and aquatics lab. A sudden, violent
    thumping from the Ready Room forces them to arm themselves, shifting their focus
    from analysis to immediate confrontation with an unknown threat. The scene escalates
    the crisis from isolated infection to shipwide catastrophe, underscoring the ticking
    clock to reverse the de-evolution before the crew is lost entirely. The thumping
    hints at a physical, aggressive presence—likely Worf in his de-evolved state—adding
    urgency to their investigation.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e19
  scene_sequence: 21
  sequence_in_scene: 39
  key_dialogue: &id021
  - 'DATA: His upper spinal column has been broken in three places.'
  - 'PICARD: It looks like he''s been attacked by some sort of animal... Has his DNA
    changed, as well?'
  - 'DATA: Yes. However, the mutation was in its initial stages when he died.'
  - 'PICARD: I''ve restored attitude control to the ship. But I can''t get main power
    back on-line... it looks like the entire power transfer grid has been destroyed...'
  - 'DATA: Captain, I am picking up one thousand eleven individual life readings within
    the ship. All exhibit a genetic flux similar to the one we observed in Counselor
    Troi.'
  - 'PICARD: Then the entire ship has been affected...'
