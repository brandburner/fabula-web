  - character_uuid: ger_agent_58541dc230ae
    emotional_state: Desperate yet determined; fear is present but overshadowed by
      the need to survive and protect his crew. A mix of adrenaline-fueled urgency
      and quiet resolve.
    goals:
    - Escape Worf’s ambush and survive the Jefferies Tube chase
    - Protect Data’s work in Sickbay by neutralizing the immediate threat (Worf)
    what_happened: Picard, trapped in a malfunctioning turbolift, escapes through
      the ceiling hatch into the Jefferies Tubes, where he is immediately ambushed
      by Worf. He loses his phaser after being sprayed with venom, forcing him to
      rely on his wits and physical agility. Picard crawls through the narrow tubes,
      his movements desperate and calculated, until he reaches a corroded panel. He
      rips out a plasma cable, uses it to electrocute Worf, and collapses beside the
      unconscious Klingon, exhausted but victorious. His survival is a testament to
      his adaptability and refusal to surrender to the chaos around him.
    observed_status: Picard, trapped in a malfunctioning turbolift, escapes through
      the ceiling hatch into the Jefferies Tubes, where he is immediately ambushed
      by Worf. He loses his phaser after being sprayed with venom, forcing him to
