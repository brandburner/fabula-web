    - The ship’s failing systems, which create a sense of institutional collapse and
      force prioritization of engineering repairs over medical solutions.
    institutional_impact: The crew’s de-evolution and the ship’s systemic failures
      reflect the fragility of Starfleet’s institutional structures when faced with
      an unprecedented biological and mechanical crisis. The organization’s survival
      depends on the ability of its senior officers (Picard and Data) to adapt and
      improvise solutions outside conventional protocols.
    internal_dynamics: Chain of command being tested—Picard and Data must make decisions
      that balance scientific discovery with engineering repairs, as the crew’s inability
      to perform their duties threatens the ship’s existence. There is also an implicit
      tension between the crew’s biological regression and their institutional roles,
      as their de-evolution undermines their ability to fulfill their duties.
