  title: Picard devises pheromone lure for Worf
  description: In Sickbay, Picard and Data face an escalating crisis as Worf, now
    fully de-evolved into a feral Klingon, repeatedly smashes against the door, his
    primal mating instincts fixated on Troi. Picard, struggling to suppress his own
    de-evolving instincts, deduces Worf’s behavior stems from a mating drive triggered
    by Troi’s Betazoid pheromones. Data extracts and amplifies Troi’s pheromones using
    a medical sampler, creating a potent lure to distract Worf. Despite Data’s objections,
    Picard insists on carrying the lure himself, prioritizing the retro-virus research
    over his own safety. The scene underscores the crew’s desperate measures to regain
    control amid biological chaos, with Picard’s leadership tested as he confronts
    his own fear while ensuring Troi’s protection and the mission’s progress. The
    pheromone lure becomes a tactical gambit to buy time, exposing the crew’s fractured
    cohesion and the urgency of their de-evolution crisis.
