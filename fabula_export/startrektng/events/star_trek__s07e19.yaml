  key_dialogue: &id043
  - |-
    PICARD: Set your phaser to heavy stun.
    DATA: We have no way of knowing if the stun setting will have any effect on him, sir. And a higher setting may kill him.
  - |-
    PICARD: Then... what does he want?
    PICARD: Predators use vocalizations to frighten off other predators... to mark territory... and to initiate the mating process...
    PICARD: The mating process...
  - |-
    PICARD: No... you... you must stay here... continue working on the retro-virus... I'll go...
    DATA: Captain, that would be extremely unwise. Worf may be much faster than -
    PICARD: No time... no time to argue.
