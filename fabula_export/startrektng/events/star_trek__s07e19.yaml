    while his abrupt confession about the torpedo guidance failure reveals his deteriorating
    mental state. Troi’s discomfort with the ship’s dry air and Worf’s dismissive
    behavior underscore the crew’s unraveling cohesion, marking a turning point where
    the mutation’s physical and emotional effects become undeniable. The scene forces
    Troi to confront her own growing unease, as Worf’s loss of control mirrors the
    broader crisis escalating beyond psychological strain into visceral, uncontrollable
    transformation.
