  title: Worf’s feral assault on sickbay
  description: "\n  Picard and Data, racing against the crew’s de-evolution, achieve\
    \ a critical breakthrough: Data identifies Ogawa’s unaffected embryo as the key\
    \ to synthesizing a retro-virus cure. Just as Picard’s relief surfaces—‘How soon\
    \ can you have it ready?’—the fragile hope is shattered by a violent intrusion.\
    \ A monstrous force slams against the sickbay door, its armored exoskeleton buckling\
    \ the metal inward. Data’s tricorder scan reveals the attacker’s identity: Worf,\
    \ now a feral Klingon driven by primal instincts. The sniffing, howling, and relentless\
    \ pounding escalate the threat, trapping Picard and Data inside. The scene pivots\
    \ from scientific resolution to visceral survival, forcing Picard to confront\
    \ the escalating danger while his own de-evolving instincts gnaw at his rationality.\
    \ The moment underscores the urgency of the cure and the crew’s desperate struggle\
    \ against their own biology.\n  "
