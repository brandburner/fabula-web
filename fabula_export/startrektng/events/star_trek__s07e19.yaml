- fabula_uuid: act_2fa769123a9e6c0a
  number: 3
  summary: Captain Picard and Data return to the Enterprise after their three-day
    mission, finding the starship adrift, dark, and tumbling aimlessly through empty
    space. All internal systems are in emergency mode, and communication attempts
    fail entirely. Upon boarding the shuttlebay, they encounter a ship transformed
    into a primal, disorienting environment, filled with strange animalistic howls,
    screeches, and clicks, along with an abundance of pungent pheromones. Their initial
    exploration leads them to discover a long, dried reptilian skin husk, resembling
    a shed human-like epidermal layer, providing the first concrete evidence of profound
    biological changes. Their search for the crew leads them to Counselor Troi's quarters,
    now a steamy, humid, greenhouse-like environment. There, they find Troi submerged
    face-down in her bathtub, having de-evolved into an amphibian with prominent gill
    slits, oily skin, and inhuman golden eyes with vertical red slits. She gasps for
    air and shows no recognition of Picard or Data. Data's scans confirm her DNA is
    undergoing rapid re-sequencing, fundamentally altering her into an ancient, water-dwelling
    lifeform. They then find Ensign Dern dead on the Bridge, his body bearing severe
    scratch marks and a broken spinal column, consistent with an animal attack, and
    his DNA showing early stages of mutation. In the Ready Room, they encounter Commander
    Riker, who has devolved into a proto-human, exhibiting a pronounced forehead,
    large canines, and dark hair, attacking them with primal, unthinking aggression.
    Data definitively concludes that the entire crew is de-evolving, each transforming
    into earlier forms of life from their respective homeworlds. This act marks the
    grim realization of the catastrophe's true nature and terrifying scale, setting
    the stage for the desperate search for a cure.
