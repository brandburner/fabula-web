  title: Worf’s unraveling on the bridge
  description: Worf’s frustration with the malfunctioning weapons array—now compounded
    by the synthetic T-cell’s de-evolutionary effects—escalates into uncharacteristic
    irritability and aggression. When Riker approaches to offer assistance, Worf snaps
    at him for standing too close, revealing his deteriorating mental state. Riker,
    noticing Worf’s exhaustion and erratic behavior, orders him to take a break, but
    Worf resists before reluctantly complying. The exchange underscores the crew’s
    unraveling cohesion under the crisis, with Worf’s Klingon physiology accelerating
    his regression into primal aggression. His resistance to Riker’s authority foreshadows
    his later, more violent de-evolution, while Riker’s concern highlights the crew’s
    growing instability as the mutation progresses.
