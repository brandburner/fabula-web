  organization_involvements:
  - organization_uuid: ger_organization_c449a29f3948
    description_of_involvement: 'The USS *Enterprise* crew, once a model of Starfleet
      efficiency, is now fractured by the intron virus. Their collective actions—damaging
      the main computer in panic, de-evolving into primitive forms—have crippled the
      ship’s systems and accelerated the crisis. The organization’s usual protocols
      are useless; survival now depends on the improvisation of Picard and Data. The
      crew’s fragmentation is both a cause and consequence of the virus, forcing the
      remaining unaffected members to operate outside institutional norms. Their collective
      failure underscores the stakes: without a cure, the *Enterprise* will cease
      to function as a starship, becoming instead a floating menagerie of its own
      crew.'
