- fabula_uuid: cand_evt_scene_9055d8c31caf1e83_02
  global_id: null
  title: Picard and Data discover Troi’s de-evolved quarters
  description: "\n  Picard and Data navigate the Enterprise’s darkened corridors,\
    \ now filled with unsettling animalistic sounds—howls, screeches, and distant\
    \ cries—that signal the crew’s accelerating de-evolution. Their discovery of a\
    \ discarded reptilian skin husk, vaguely humanoid in shape, confirms the mutation’s\
    \ alien origin and escalates the crisis’s urgency. The husk’s presence, unexplained\
    \ by any known species aboard, forces Picard to confront the reality that the\
    \ transformation is no longer theoretical but physically manifesting. Their investigation\
    \ leads them to Deanna Troi’s quarters, where condensation on the door and the\
    \ absence of a response to hails suggest something is gravely wrong. When they\
    \ force entry, steam billows out, revealing a humid, transformed environment inside—a\
    \ clear sign that Troi, like the rest of the crew, is succumbing to the synthetic\
    \ T-cell mutation. The scene underscores the mission’s desperation: if Troi, a\
    \ key crew member, is already de-evolving, the entire ship may soon be beyond\
    \ saving. Data’s inability to detect her inside heightens the tension, as Picard\
    \ prepares to enter the hazardous quarters, phasers drawn, to confront whatever\
    \ awaits them.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e19
  scene_sequence: 18
  sequence_in_scene: 33
  key_dialogue: &id015
  - 'PICARD: That sounds like... animals.'
  - 'DATA: Yes, sir. I am able to discern over three hundred different vocalizations.'
  - 'PICARD: Look at this...'
  - 'DATA: It is composed of reptilian DNA... I believe it is an epidermal layer that
    has been cast off during molting.'
  - 'PICARD: But it seems to be humanoid...'
  - 'DATA: Yes, sir. I cannot explain it. There are no species aboard the Enterprise
    that shed their skin in this fashion.'
  - 'PICARD: This is Commander Troi''s quarters... can you tell if she''s inside?'
  - 'DATA: No, sir.'
  - 'PICARD: I want to take a look inside. Stand ready.'
