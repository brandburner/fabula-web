    description_of_involvement: Picard’s hypospray of pheromones is the linchpin of
      his high-risk distraction tactic. He uses it to spray a mist into the corridor,
      triggering Worf’s mating instincts and redirecting his aggression. The pheromones
      are a biological weapon of sorts, exploiting Worf’s de-evolved state to create
      an opening for Data’s research. Their effectiveness hinges on Worf’s primal
      response, making them a temporary but critical tool in the larger struggle to
      save the crew.
    status_before_event: Possessed by Picard, fully charged and ready for use in the
