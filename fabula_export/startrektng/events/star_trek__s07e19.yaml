  title: Worf’s venomous regression exposes crisis
  description: Beverly Crusher investigates Troi’s unexplained hypothermia and Worf’s
    catatonic state, uncovering a grotesque venom sac on his neck—a mutation from
    the airborne T-cell virus. When Worf, now feral and unresponsive, sprays her with
    bioacidic venom before fleeing Sickbay, the attack confirms the virus’s violent
    de-evolutionary effects and forces the medical team into emergency response. The
    scene escalates stakes by revealing Worf’s irreversible transformation into a
    predatory, animalistic state, while Beverly’s injury underscores the crew’s vulnerability
    to the pathogen’s accelerating biological regression. Ogawa’s mention of other
    crewmembers with conflicting temperature symptoms foreshadows the virus’s widespread,
    unpredictable impact, setting up the broader crisis to come.
