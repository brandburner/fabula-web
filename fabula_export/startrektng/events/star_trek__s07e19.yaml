  - character_uuid: ger_agent_868446276ca7
    emotional_state: Feral rage with no trace of recognition or restraint; driven
      purely by survival instincts and the need to dominate.
    goals:
    - Hunt and subdue Picard as a threat or prey
    - Defend his territory (the Jefferies Tubes) from intrusion
    what_happened: Worf, now a feral, venom-spitting predator, ambushes Picard in
      the Jefferies Tubes, his Klingon instincts fully unleashed. He sprays venom
      from his mutated sac, forcing Picard to drop his phaser, and pursues him relentlessly
      through the narrow crawlways. His movements are animalistic—snarling, roaring,
      and attacking with brute force—until Picard outmaneuvers him by using a plasma
      cable to deliver a crippling electrical shock. Worf collapses unconscious, his
      body still twitching from the surge.
