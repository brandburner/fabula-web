  title: Picard and Data discover the Enterprise missing
  description: 'After a three-day search for a lost torpedo, Picard and Data return
    to the prearranged coordinates in their shuttlecraft, only to find the *Enterprise*
    inexplicably absent. Data’s scans confirm the ship’s disappearance, leaving no
    trace of its location or status. Picard’s initial assumption of a delay is quickly
    dismissed as Data fails to raise the ship on any communication channel. The absence
    of the *Enterprise*—and with it, the crew’s only hope for reversing the de-evolution—plunges
    the duo into a crisis. The moment forces Picard to confront the reality that their
    mission has just become exponentially more dire: without the ship, they lack the
    resources, medical facilities, and crew expertise needed to synthesize the retro-virus.
    The scene underscores the fragility of their situation, shifting the narrative
    from a race against time to a fight for survival in an unknown, potentially hostile
    environment. The tension escalates as Picard’s leadership is tested—he must now
    decide how to proceed with limited information and dwindling options, while Data’s
    analytical precision highlights the gravity of their predicament. This event serves
    as a narrative turning point, transforming the story from a contained crisis aboard
    the *Enterprise* into a desperate, open-ended struggle for Picard and Data to
    reunite with their crew—or find another way to save them.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e19
  scene_sequence: 16
  sequence_in_scene: 29
  key_dialogue:
  - 'PICARD: ((V.O.)) Captain''s Log, supplemental. Commander Data and I have recovered
    the stray torpedo after a three-day search. We are enroute back to the *Enterprise*.'
  - 'DATA: Captain, the ship is not at the pre-arranged coordinates.'
  - 'PICARD: Have they been delayed?'
  - 'DATA: I do not know. I am unable to raise them on any communication channel.'
