- fabula_uuid: cand_evt_scene_9055d8c31caf1e83_01
  global_id: null
  title: Picard and Data find reptilian husk evidence
  description: "\n  In a darkened, sound-filled corridor of the *Enterprise*, Picard\
    \ and Data move cautiously past eerie animalistic cries—howls, screeches, and\
    \ clicks—echoing through the ship. Picard spots a discarded reptilian husk on\
    \ the floor, a dried, vaguely humanoid skin resembling a shed snakeskin. Data\
    \ scans it and confirms it is composed of reptilian DNA, though no known species\
    \ aboard the ship molts in this way. The discovery confirms the crew’s de-evolution\
    \ is not just biological regression but an alien transformation, deepening the\
    \ mystery. As they continue, they notice condensation on Deanna Troi’s door, suggesting\
    \ her quarters may be hazardous. Picard orders Data to stand ready as they prepare\
    \ to breach the room, revealing the escalating crisis aboard the ship.\n  "
