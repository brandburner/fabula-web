  key_dialogue: &id007
  - |-
    BARCLAY: Me?
    DATA: It is possible that it will take several days for Captain Picard and me to complete our mission. I would prefer to have a human present to supervise the birthing process.
  - |-
    BARCLAY: So... has she picked the place?
    DATA: The... 'place'?
    BARCLAY: Cats usually like to pick out a specific location to give birth... It's usually someplace dark... and secluded...
    DATA: I am not certain. Spot has escaped from my quarters on several occasions. And there are twelve male felines on board.
  - 'DATA: Goodbye, Spot. I believe you are in... good hands.'
