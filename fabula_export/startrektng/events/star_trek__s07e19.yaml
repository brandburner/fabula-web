  title: Troi’s Uncharacteristic Bridge Outburst
  description: During a routine bridge shift, Counselor Troi—typically the ship’s
    emotional anchor—exhibits uncharacteristic volatility when she abruptly demands
    a temperature increase to combat her growing discomfort. Worf, already irritable
    and disheveled, resists, leading to a tense standoff where Troi insists on her
    command despite his objections. Her behavior escalates from edginess to outright
    defiance, culminating in her abrupt departure to take a bath—a decision that contradicts
    her professional demeanor. The exchange underscores the virus’s psychological
    destabilization, as Troi’s need for warmth and her emotional fragility signal
    the early stages of her de-evolution. Worf’s indifference to her strange behavior
    foreshadows his own impending descent into feral aggression, while Troi’s exit
    marks the first visible symptom of the crew’s unraveling cohesion.
