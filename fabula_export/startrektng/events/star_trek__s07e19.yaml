  object_involvements:
  - object_uuid: ger_object_0b93892aac7e
    description_of_involvement: The hypospray loaded with Troi's amplified pheromones
      is the critical tool in Picard's plan to distract Worf. Data extracts Troi's
      pheromones using a medical sampler device, connects it to a hypospray-loader,
      and activates a bio-activant solution to amplify the scent. Picard ultimately
      takes the hypospray, intending to use it to lure Worf away from Sickbay. This
      object symbolizes the crew's reliance on science and quick thinking to outmaneuver
      their primal instincts, as well as the desperate measures they must take to
      survive.
    status_before_event: Unused, stored on a medical sampler tray in Sickbay.
    status_after_event: Loaded with amplified pheromones and in Picard's possession
      as he prepares to execute the distraction plan.
    global_id: ger_object_0b93892aac7e
  - object_uuid: ger_object_0259d7fdd69f
    description_of_involvement: Picard and Data's phasers are mentioned as potential
      weapons, though they are not drawn or used in this specific event. Their presence
      serves as a reminder of the crew's preparedness for violence, even as they opt
      for a non-lethal distraction strategy. The phasers symbolize the tension between
      rational problem-solving (using pheromones) and the ever-present threat of brute
      force (Worf's aggression). Their unused status in this moment highlights the
      crew's preference for cleverness over confrontation, though the phasers remain
      a last-resort option.
    status_before_event: Holstered and unused, but accessible to Picard and Data.
    status_after_event: Still holstered and unused, as the crew prioritizes the pheromone
      distraction plan.
    global_id: ger_object_0259d7fdd69f
  - object_uuid: ger_object_709dc5aa3be2
    description_of_involvement: Data's medical sampler device is the tool that initiates
      the pheromone extraction process. He applies it to Troi's neck to draw a blood
      sample from her sebaceous glands, where pheromones are produced. This device
      is critical to the plan, as it allows Data to isolate the scent that will be
      amplified and used to lure Worf. The sampler's precision and functionality reflect
      Data's analytical approach to problem-solving, as he methodically extracts the
      necessary components for the distraction. Its role in the event underscores
      the crew's reliance on technology and science to counter their primal instincts.
    status_before_event: Stored on a medical sampler tray in Sickbay, unused.
    status_after_event: Used to extract Troi's pheromones and connected to the hypospray-loader
      for amplification.
    global_id: ger_object_709dc5aa3be2
  - object_uuid: ger_object_7cc5b0af60e6
    description_of_involvement: 'The Sickbay door is the primary barrier and symbolic
      threshold in this event. Worf''s relentless pounding and howls from outside
      create a sense of imminent danger, as the door barely contains his feral aggression.
      The door''s creaking metal and buckling surface underscore the fragility of
      the crew''s sanctuary and the urgency of Picard''s plan. Picard''s decision
      to use the door by Beverly''s office as an exit point for the distraction highlights
      the door''s dual role: both a protective barrier and a potential escape route.
      Its status as the last line of defense adds tension to the scene, as the crew''s
      survival depends on it holding just a little longer.'
    status_before_event: Intact but under severe stress from Worf's assault, with
      visible buckling and creaking.
    status_after_event: Still standing but weakened, as Picard prepares to exit through
      Beverly's office to execute the distraction.
    global_id: ger_object_7cc5b0af60e6
  - object_uuid: ger_object_5b89f8a3f934
    description_of_involvement: Data's hypospray-loader is the device that amplifies
      Troi's pheromones into a potent lure. After extracting the pheromones with the
      medical sampler, Data connects the sampler to the hypospray-loader and activates
      a bio-activant solution. The loader's function is to intensify the scent, making
      it strong enough to distract Worf from a distance. This object is central to
      the plan's success, as it transforms Troi's natural pheromones into a tool for
      manipulation. Its use reflects the crew's ingenuity in repurposing medical technology
      for survival, turning biology against biology in a desperate gamble.
    status_before_event: Stored on a desktop in Sickbay, unused.
    status_after_event: Used to amplify Troi's pheromones, now loaded with the potent
      lure for Worf.
