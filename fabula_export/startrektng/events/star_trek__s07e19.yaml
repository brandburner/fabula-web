  global_id: null
  title: Picard learns he faces de-evolution
  description: In the dimly lit Sickbay, Picard and Data examine the unconscious,
    proto-humanoid Riker, whose DNA has been hijacked by a synthetic T-cell activating
    dormant introns. Data explains that the virus is forcing crewmembers to regress
    into earlier evolutionary forms—Riker into an Australopithecine, Troi into an
    extinct amphibian. The revelation escalates when Data delivers the devastating
    news that Picard, too, is infected and will begin de-evolving within twelve hours,
    likely into a primate like a lemur. Though Picard briefly attempts humor to mask
    his unease, he swiftly refocuses on solving the crisis, approving Data’s plan
    to use his independent computer for micro-cellular scans. The moment underscores
    the existential stakes, forcing Picard to confront his own mortality while maintaining
    leadership under pressure. Their decision to arm themselves and relocate to Data’s
    quarters marks a shift from diagnosis to active intervention, setting the stage
    for the final race against time.
