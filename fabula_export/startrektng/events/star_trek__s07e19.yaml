  key_dialogue:
  - 'PICARD: Data!'
  - 'DATA: I believe it was Lieutenant Barclay. He appeared to be partially transformed
    into an arachnid.'
  - 'PICARD: A spider?'
  - 'DATA: I recognized the chitin colorations. He is becoming a member of the Pisauridae
    family.'
  - 'PICARD: I have the most intense feeling of... fear... panic... as if I were being
    watched... I can''t explain it.'
  - 'DATA: You may be experiencing the initial stages of your transformation. Early
    primates were often prey for larger carnivores -- as a result, their instincts
    probably included a heightened sense of awareness.'
  - 'PICARD: If that''s the case, then my instincts tell me... we''d better hurry.'
