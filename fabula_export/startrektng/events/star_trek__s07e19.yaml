      as their de-evolution threatens the ship's survival. Picard and Data, as the
      remaining rational members, exert authority to investigate and counteract the
      mutation, but their power is constrained by the unknown and the urgency of the
      situation. The organization's usual hierarchical structure is collapsing, replaced
      by a desperate, ad-hoc response to the crisis.
