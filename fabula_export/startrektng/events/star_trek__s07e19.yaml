    description_of_involvement: 'The USS *Enterprise* crew is represented in this
      event through Data’s and Barclay’s actions, as well as Picard’s off-screen summons.
      The crew’s institutional priorities are embodied in Picard’s urgent call to
      Data, which interrupts the personal moment between Data, Barclay, and Spot.
      The event highlights the crew’s fractured focus: while some members (e.g., Barclay)
      attend to personal or emotional needs (e.g., Spot’s labor), others (e.g., Data,
      Picard) are pulled away to address the shipwide crisis. This tension underscores
      the crew’s struggle to balance individual well-being with collective survival,
      a recurring theme in *Star Trek*.'
    active_representation: Through the actions of individual crewmembers (Data, Barclay)
      and the authoritative voice of command (Picard’s summons). The crew’s institutional
      role is also implied in the ship’s operational urgency, which contrasts with
      the personal moment in Data’s quarters.
    power_dynamics: The crew operates under a hierarchical structure, with Picard’s
      authority overriding personal matters (e.g., Spot’s care). However, the event
      also highlights the agency of individual crewmembers, such as Barclay’s willingness
      to step into a caretaker role, which suggests a degree of autonomy within the
      chain of command.
