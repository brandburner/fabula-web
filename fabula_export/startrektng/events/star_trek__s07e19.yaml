  global_id: null
  title: Worf bites Troi in primal rage
  description: 'In Troi’s steam-filled bathroom, Worf—overwhelmed by de-evolutionary
    instincts—invades her private space with predatory fixation. His primal urges
    strip away Klingon discipline, reducing him to a growling, territorial creature.
    When Troi resists his advances, Worf’s frustration erupts into violence: he bites
    her cheek, drawing blood. The act shocks both characters, exposing the irreversible
    severity of his regression and the crew’s accelerating descent into feral states.
    Troi’s defiance and Worf’s stunned reaction mark a turning point, where moral
    boundaries collapse under biological imperative, deepening the existential stakes
    of the crisis. The bite becomes a physical manifestation of the virus’s psychological
