  title: Worf’s predatory invasion of Troi’s bath
  description: In a moment of unchecked primal regression, Worf—stripped of his Klingon
    discipline by the T-cell mutation—invades Troi’s private bathroom, his predatory
    instincts fully unleashed. The steam-filled room heightens the surreal tension
    as he looms over her, his voice a guttural growl, demanding she leave the water.
    Troi, though vulnerable in the tub, resists with sharp defiance, invoking security
    and asserting her boundaries. Worf’s confusion at her rejection escalates into
    violence when he bites her cheek, shocking both into stunned silence. The scene
    exposes the raw, destabilizing consequences of the crew’s de-evolution on interpersonal
    dynamics and moral restraint, marking a turning point in Worf’s descent into feral
    aggression and Troi’s forced confrontation with her own vulnerability. The bite
    becomes a physical manifestation of the virus’s erosion of control, while Troi’s
    defiance underscores the crew’s desperate struggle to retain their humanity amid
    the crisis.
