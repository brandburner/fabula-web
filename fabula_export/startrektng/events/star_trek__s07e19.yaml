      yet his actions—bending to kiss Spot goodbye and acknowledging Barclay’s intuition
      about the nesting spot—reveal a subtle emotional investment. He confirms Spot’s
      selective trust in Barclay and shares her history of aggression with other crewmembers,
      framing Barclay as the ideal caretaker. His departure is abrupt, triggered by
      Picard’s summons, but his final words to Spot carry a note of affection, hinting
      at his growing attachment to her.
