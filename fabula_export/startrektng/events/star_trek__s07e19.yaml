  - object_uuid: ger_object_4b7733cc984e
    description_of_involvement: "\n        The subspace detonator is a critical failsafe\
      \ mechanism designed to destroy malfunctioning torpedoes remotely. When Worf\
      \ attempts to activate it, the detonator’s failure to engage escalates the crisis,\
      \ forcing the crew to consider alternative solutions. This malfunction is not\
      \ just a technical glitch but a narrative device—it removes the crew’s easy\
      \ out, compelling Picard to take direct action. The detonator’s failure also\
      \ underscores the theme of uncontrollable forces, a motif that will dominate\
      \ the de-evolution plot.\n      "
    status_before_event: Functional and armed, ready to detonate the rogue torpedo
      on command.
    status_after_event: Non-responsive and ineffective, leaving the torpedo intact
      and adrift.
