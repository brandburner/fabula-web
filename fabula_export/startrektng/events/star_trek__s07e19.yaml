- fabula_uuid: act_02a9c093381755e3
  number: 5
  summary: 'The climax unfolds with Worf, now a formidable, de-evolved Klingon, relentlessly
    attempting to breach the Sickbay door, trapping Picard and Data inside. Picard,
    battling his own escalating primal fears and instincts, deduces Worf''s motivation:
    a powerful mating drive towards the amphibian Troi. Data swiftly synthesizes a
    highly amplified pheromone lure using Troi''s genetic material. Picard, despite
    his terror and the onset of his own de-evolutionary symptoms, bravely takes the
    hypospray and ventures into the corridors to draw Worf away from Sickbay, allowing
    Data to continue working on the retro-virus. The chase is intense and harrowing,
    with Picard spraying pheromones to confuse Worf, who is revealed in his full,
    terrifying prehistoric Klingon form—a hulking creature with enormous, chitinous
    ridges, snapping mandibles, and immense strength. Trapped in a turbolift, Picard
    narrowly escapes into a Jefferies Tube. Worf pursues, spraying Picard with corrosive
    venom, causing painful acid burns on his arm. Cornered, Picard ingeniously uses
    the previously re-routed plasma cable from Act Two to electrocute Worf, subduing
    the creature without killing him. With Worf incapacitated, Data successfully synthesizes
    and releases the retro-virus into the ship''s atmosphere. Over time, the crew
    gradually returns to their normal states. Doctor Crusher later explains the anomaly
    in Barclay''s genetic chemistry caused the synthetic T-cell to mutate and activate
    dormant introns, leading to the widespread de-evolution. She proposes naming the
    new ailment “Barclay''s Proto-morphosis Syndrome,” concluding the bizarre and
    dangerous ordeal with a touch of characteristic Starfleet humor.'
