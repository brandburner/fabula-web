- fabula_uuid: cand_evt_scene_1a9789e790afe7c9_01
  global_id: null
  title: Riker’s de-evolution reveals crew-wide crisis
  description: "\n  In Sickbay, Picard and Data examine the unconscious, proto-human\
    \ Riker—now regressed into an Australopithecine state—after Picard administers\
    \ a tranquilizer to keep him sedated. Data’s DNA analysis confirms the synthetic\
    \ T-cell treatment has mutated into an intron virus, reactivating dormant genetic\
    \ sequences across the crew. The revelation escalates the stakes: Riker’s transformation\
    \ is not an isolated incident but part of a shipwide de-evolution crisis, with\
    \ Troi’s amphibian traits and potential non-Earth crew mutations hinting at a\
    \ broader pandemic. Data delivers the worst news yet: Picard is also infected,\
    \ with twelve hours before his own primate regression begins. The urgency spikes\
    \ as they realize the ship’s main computer is compromised, forcing them to relocate\
    \ to Data’s quarters for analysis. The scene pivots from medical examination to\
    \ existential threat, with Picard’s dark humor masking his dread as he and Data\
    \ prepare to leave Sickbay armed and determined to find a cure before the crew\
    \ loses their humanity entirely.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e19
  scene_sequence: 23
  sequence_in_scene: 43
  key_dialogue: &id023
  - 'PICARD: This tranquilizer should keep him unconscious for another seven hours.
    What have you found out?'
  - 'DATA: I have analyzed Commander Riker''s DNA structure. A synthetic T-cell has
    invaded his genetic code. This T-cell has begun to activate his latent introns.'
  - 'PICARD: So these... introns are causing her DNA to re-combine in an earlier configuration?'
  - 'DATA: That is correct. In her case, the DNA is creating an amphibious lifeform
    which became extinct over fifty million years ago.'
  - 'DATA: I feel I must point out, sir, that you have become infected with the intron
    virus, as well.'
  - 'PICARD: How long before I start to change?'
  - 'DATA: According to my calculations, within the next twelve hours, you will begin
    to exhibit the first signs of your eventual transformation.'
