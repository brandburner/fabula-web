- fabula_uuid: act_6ffca13f4997891e
  number: 4
  summary: 'In Sickbay, Picard and Data examine the unconscious proto-human Riker.
    Data provides a detailed explanation of the de-evolutionary process: a synthetic
    T-cell has invaded the crew''s genetic code, activating latent introns—dormant
    genetic codes from earlier evolutionary stages—which are now re-sequencing their
    DNA into ancestral configurations. Picard receives the alarming news that he,
    too, is infected and will begin his own de-evolution within twelve hours, likely
    into an early primate like a lemur. Seeking a solution, they move to Data''s quarters,
    where they discover Spot has transformed into an iguana, but her newly born kittens
    are miraculously unaffected by the virus. This critical observation leads Picard
    to theorize that natural immune systems within the womb, specifically amniotic
    fluid, might contain antibodies capable of inhibiting the virus. Data identifies
    pregnant Nurse Ogawa as a potential human source for a retro-virus. Their efforts
    are interrupted by a ship-wide tremor, indicating a warp plasma vent failure,
    necessitating a trip to Engineering. In Engineering, Picard encounters Lieutenant
    Barclay, now a terrifying spider-like creature with bulbous black eyes and hooked
    hands, who attacks him. Picard experiences an intense, primal feeling of fear
    and panic, confirming his own impending transformation and the activation of his
    own ancestral instincts. They locate Ogawa, who is also beginning to de-evolve,
    and Data begins the urgent work of synthesizing a retro-virus from her unaffected
    embryo''s amniotic fluid. The act culminates with Worf, now a heavily armored,
    monstrous Klingon, violently attacking the Sickbay door, trapping them and raising
    the stakes to an immediate, physical threat, as their time to find a cure rapidly
    diminishes.'
