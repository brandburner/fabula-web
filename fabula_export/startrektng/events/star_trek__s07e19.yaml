- fabula_uuid: cand_evt_scene_6ea571ece4244ca1_01
  global_id: null
  title: Picard lures Worf with pheromones
  description: "\n  Picard, armed with a hypospray of pheromones and a phaser, executes\
    \ a high-risk tactical maneuver to distract Worf from Sickbay. Worf, now a hulking,\
    \ feral Klingon in advanced de-evolution, is pounding on the Sickbay door, his\
    \ primal instincts threatening Data’s critical research. Picard sprays the pheromones\
    \ into the corridor, triggering Worf’s mating drive. The pounding stops—then Worf’s\
    \ footsteps thunder toward Picard, who flees down the corridor, initiating a desperate\
    \ chase. Meanwhile, in Sickbay, Data bypasses the offline medical database by\
    \ rerouting the computer to activate local subprocessors, restoring the wall monitor\
    \ just as Picard’s distraction buys him the time needed to continue his work.\
    \ The scene underscores Picard’s strategic adaptability under pressure and the\
    \ escalating stakes of the crew’s biological regression, where even allies become\
    \ existential threats.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e19
  scene_sequence: 28
  sequence_in_scene: 56
  key_dialogue: &id045
  - 'DATA: Computer — activate medical database.'
  - 'COMPUTER VOICE: Main computer systems are inactive — unable to comply.'
  - 'DATA: Computer, bypass database system — activate local subprocessors only.'
  - 'COMPUTER VOICE: Acknowledged.'
