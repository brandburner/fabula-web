  title: Barclay’s arachnid attack triggers Picard’s primal fear
  description: 'Picard and Data enter Engineering to repair a damaged plasma vent,
    only to discover the space infested with fibrous webs and an eerie chittering
    noise. Picard investigates Geordi’s office and is startled by Barclay—now a grotesque
    spider-human hybrid—who slams against the glass partition, his bulbous eyes and
    hooked limbs evoking primal terror. Picard’s phaser trembles in his grip as he
    calls for Data, who arrives just as Barclay scuttles away. The encounter forces
    Picard to confront his escalating de-evolution symptoms: a visceral, atavistic
    fear that Data clinically attributes to early primate survival instincts. The
    moment marks a critical escalation—Barclay’s mutation is no longer an external
    threat but a harbinger of Picard’s own unraveling, while Data’s detached analysis
    underscores the biological urgency of reversing the crew’s transformations before
    they become irreversible. The scene’s tension hinges on the contrast between Barclay’s
    monstrous physicality and Picard’s psychological unraveling, both symptoms of
    the synthetic T-cell’s mutation. The event serves as a turning point, shifting
    the narrative from external crisis (the warp core failure) to an internal one
    (Picard’s de-evolution), and foreshadows the crew’s desperate race against time
    to synthesize a cure before their humanity is lost entirely.'
