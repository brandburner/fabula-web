- fabula_uuid: cand_evt_scene_7ea1667acffa0aef_01
  global_id: null
  title: Picard flees de-evolved Worf in corridor
  description: Picard, cornered in a dead-end corridor, races toward a malfunctioning
    turbolift as Worf—now fully transformed into a prehistoric, feral Klingon—pursues
    him with predatory intent. The turbolift doors finally open, but Worf’s enraged
    roar and rapid approach force Picard into a desperate dive inside just as the
    doors close. The encounter underscores the irreversible physical and psychological
    degradation of the crew, with Worf’s primal aggression replacing their once-unbreakable
    bond. The chase highlights Picard’s vulnerability and the ticking clock to reverse
    the mutation before all rational thought is lost. The moment also serves as a
    turning point, forcing Picard to abandon diplomacy and rely on instinct for survival.
