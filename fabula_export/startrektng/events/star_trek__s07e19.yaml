- fabula_uuid: cand_evt_scene_a6d7d38bae2f844d_01
  global_id: null
  title: Troi’s amphibian transformation revealed
  description: 'Picard and Data enter Troi’s bathroom to find her submerged in the
    bathtub, her body motionless and seemingly lifeless. Picard pulls her from the
    water, only to discover her horrifyingly transformed: her skin now slick and eel-like,
    her neck bearing gill slits, and her eyes a disconcerting gold with vertical red
    slits. She gasps for air but appears disoriented, her movements alien and unrecognizing.
    Data’s tricorder scan confirms her DNA is in ribocyatic flux, her genetic code
    permanently re-sequenced into an amphibian state. Picard notices a Klingon bite
    mark on her cheek, and Data identifies it as Klingon saliva, suggesting an external
    attack. Troi slips back into the water, her transformation now irreversible. The
    discovery forces Picard and Data to confront the escalating, uncontrollable nature
    of the synthetic T-cell mutation, raising the stakes of their race against time
    to reverse the crew’s de-evolution before it consumes them all. The scene underscores
    the crisis’s urgency and the personal cost of failure, as Troi’s transformation
    serves as a harrowing preview of what awaits the rest of the crew if no cure is
    found.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s07_e19
  scene_sequence: 20
  sequence_in_scene: 35
  key_dialogue:
  - 'PICARD: Deanna!'
  - 'DATA: Her DNA is in a state of ribocyatic flux... her genetic codes are being
    re-sequenced... and her cells are mutating as a result. At a fundamental level,
    she is no longer human.'
  - 'PICARD: What... is she?'
  - 'DATA: Her respiratory tissue has become capable of metabolizing water as well
    as air... and her eyes have developed nictitating membranes... I believe she has
    become... amphibian, sir.'
  - 'PICARD: She''s been injured...'
  - 'DATA: There is Klingon DNA in the wound. It is saliva.'
  - 'PICARD: You mean, she''s been bitten?'
