  key_dialogue: &id033
  - 'DATA: I believe Spot has had her kittens.'
  - 'PICARD: They sound hungry.'
  - 'DATA: Yes. I am curious as to why Spot is not taking care of them.'
  - 'PICARD: It would seem the intron virus isn’t limited to humanoid lifeforms.'
  - 'DATA: No, sir.'
  - 'PICARD: As I remember my biology, there are several natural immune systems that
    come into play in the womb of the mother... to protect the unborn from viral infections...'
  - 'DATA: That is true. The placental barrier, maternal antibodies and amniotic fluid
    all serve as a filtration system.'
  - 'PICARD: Maybe we could... inhibit this intron virus by using some of the natural
    antibodies in Spot''s amniotic fluid...'
  - 'DATA: It would take further research, but I believe that to be effective on humanoid
    crewmembers, humanoid antibodies would be necessary.'
  - 'PICARD: Then perhaps we should locate a humanoid who''s pregnant...'
  - 'DATA: Nurse Ogawa recently became pregnant...'
  - 'PICARD: Then we need to locate Nurse Ogawa.'
  - 'DATA: ((off console)) One of the warp plasma vents has failed. Main Engineering
    has been abandoned -- there is no one there to fix the problem.'
