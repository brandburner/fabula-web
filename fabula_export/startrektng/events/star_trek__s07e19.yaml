      Their de-evolution into primitive forms (e.g., Australopithecines, amphibians)
      is a direct consequence of the synthetic T-cell’s mutation, which was initially
      administered to treat Barclay’s Urodelan Flu. The crew’s absence from Main Engineering
      underscores their inability to maintain the ship’s systems, accelerating the
      crisis. Meanwhile, Nurse Ogawa’s pregnancy emerges as a critical resource for
      their survival, tying the crew’s fate to her well-being.
