  organization_involvements:
  - organization_uuid: ger_organization_c449a29f3948
    description_of_involvement: |2

      The USS *Enterprise* crew is the collective victim of the intron virus, their bodies and minds under siege as the synthetic T-cell treatment mutates and reactivates dormant genetic sequences. In this event, the crew’s plight is embodied by Riker’s proto-human form, Troi’s implied amphibious regression, and Picard’s impending primate transformation. Their usual roles—medical staff, security, command—are rendered obsolete by the biological crisis, forcing Picard and Data to improvise solutions. The crew’s collective helplessness is a driving force in the scene, as their panic and mishandling of the ship’s systems (e.g., damaging the main computer) exacerbate the problem. Yet, their bond and shared history also serve as a unifying thread, motivating Picard and Data to find a cure before it’s too late.
    active_representation: Through the physical manifestations of the virus (Riker’s
      regression, Troi’s implied transformation) and the institutional failures (damaged
      main computer, compromised systems).
    power_dynamics: Exercising no authority—entirely at the mercy of the virus, with
      Picard and Data as the only functional agents capable of response.
    organizational_goals:
    - To survive the de-evolution process and retain their humanity.
    - To trust in Picard and Data’s leadership to find a solution before the crew
      is lost forever.
    influence_mechanisms:
    - Collective panic and mishandling of ship systems (e.g., damaging the main computer).
    - Shared history and bonds motivating Picard and Data to act on their behalf.
    institutional_impact: The crew’s usual institutional structures (medical protocols,
      chain of command, technological reliance) have collapsed, leaving them vulnerable
      and dependent on improvisation.
    internal_dynamics: Factional disintegration—crewmembers are either transforming,
      panicking, or (in the case of Worf) becoming feral threats. The organization’s
      cohesion is dissolving.
    global_id: ger_organization_c449a29f3948
