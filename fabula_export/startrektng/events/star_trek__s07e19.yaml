  key_dialogue: &id035
  - 'DATA: I have analyzed Nurse Ogawa''s embryo. It has been unaffected by the virus.
    I believe I can use her amniotic fluid as a template for a retro-virus. It would
    neutralize the synthetic T-cell, and re-establish the original genetic patterns
    of each host.'
  - 'PICARD: How soon can you have it ready?'
  - 'DATA: It will not take long to isolate the appropriate genetic material. However,
    I will need to get the Sickbay computer back on -'
  - 'PICARD: ((anxious)) What -- what''s that?'
  - 'DATA: ((off tricorder)) It is large, approximately two hundred kilograms... and
    it is heavily armored with an exoskeleton of some sort... The lifesigns appear
    to be... Klingon.'
  - 'PICARD: Worf...'
