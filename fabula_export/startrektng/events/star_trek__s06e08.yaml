  key_dialogue:
  - 'WORF: I will be positioned here, at the Eastern end of the street... Frank Hollander
    says he will approach from this end... Once he gets to this point, he will be
    within range.'
  - 'TROI: Understood. What about Alexander?'
  - 'WORF: There is a rain barrel in front of the saloon. It should be enough to stop
    the bullets.'
  - 'ANNIE: You wouldn''t believe what I went through to talk Old Man Newsome out
    of his telegraph machine... Lord knows why I keep riskin'' my life for you, Sheriff...'
  - 'WORF: Thank you, Ms. Annie. I am... in your debt.'
  - 'TROI: How long will the field last?'
  - 'WORF: It is highly unstable. No more than fifteen seconds.'
  - 'TROI: Let''s hope that''s enough.'
