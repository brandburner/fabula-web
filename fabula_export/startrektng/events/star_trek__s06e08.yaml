  title: Alexander escalates simulation difficulty
  description: "\n  In the Gold Strike Saloon, Worf and Alexander confront Eli Hollander—a\
    \ corrupted Data doppelgänger—only for Alexander to abruptly freeze the program\
    \ after Worf effortlessly overpowers Eli. Frustrated by the lack of challenge,\
    \ Alexander resets the simulation to an earlier point and increases its difficulty\
    \ to Level Four, forcing a more dangerous and unpredictable confrontation. The\
    \ patrons scatter in fear as Eli, now emboldened by the higher stakes, taunts\
    \ Worf with escalating threats, including drawing his pistol and ordering his\
    \ henchmen to disarm the Klingon. Just as Eli gains the upper hand, Troi (disguised\
    \ as a stranger) intervenes, firing a warning shot and saving Worf. This moment\
    \ marks a critical escalation: the simulation’s corruption deepens, the stakes\
    \ rise, and the stage is set for a more violent confrontation ahead. Alexander’s\
    \ impatience and desire for challenge inadvertently trigger a chain reaction that\
    \ destabilizes the holodeck further, foreshadowing the emergence of fully corrupted\
    \ Data doppelgängers.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e08
  scene_sequence: 5
  sequence_in_scene: 11
  key_dialogue:
