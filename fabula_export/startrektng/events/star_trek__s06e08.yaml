- fabula_uuid: cand_evt_scene_ef90872f1936fb24_01
  global_id: null
  title: Worf’s Forced Mercy in the Exchange
  description: 'The prisoner exchange between Worf and Data/Frank Hollander spirals
    into a violent ambush when Data’s corrupted doppelgängers—now armed with android
    precision—open fire on Worf. Despite his force field deflecting the initial barrage,
    it fails under sustained attack, leaving him vulnerable. As Data/Frank’s gun clicks
    empty, Worf seizes the moment to draw his own weapon, but hesitation grips him
    when he notices Alexander watching from the saloon doorway. Instead of executing
    Data/Frank, Worf spares him, a choice that underscores his internal conflict between
    Klingon vengeance and his evolving moral restraint. Troi’s timely intervention
    with her rifle secures the standoff, but the moment lingers as a turning point:
    Worf’s mercy, though pragmatic, reveals his struggle to reconcile his instincts
    with the values he’s trying to instill in Alexander. The scene escalates the threat
    of Data’s corrupted subroutines while forcing Worf to confront the cost of his
    actions under pressure.'
