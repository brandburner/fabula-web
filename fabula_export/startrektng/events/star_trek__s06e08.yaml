      control. The tricorder spin is a taunt, a claim of territory in Data’s mind,
      setting the stage for the Holodeck’s later chaos.
    goals:
    - Infiltrate and corrupt Data’s positronic subroutines (achieved through the power
      surge)
    - Assert dominance over Data’s actions (manifested in the tricorder spin)
    what_happened: Eli Hollander is not physically present in Engineering but is indirectly
      manifested through Data’s unconscious mimicry of his signature tricorder spin.
