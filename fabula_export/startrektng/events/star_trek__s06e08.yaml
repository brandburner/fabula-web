    into a Data doppelgänger, complete with the android’s face, voice, and unsettling
    personality. The doppelgänger mocks Worf’s injury and hints at the escalating
    threat: the Holodeck’s instability has replicated Data’s consciousness into its
    characters, signaling a dangerous loss of control. The encounter underscores the
