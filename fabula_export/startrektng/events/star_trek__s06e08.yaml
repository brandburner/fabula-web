            *Internal*: A storm of *protectiveness* and *dread*. Picard’s loyalty to Data is absolute, but the android’s corruption forces him to confront a terrifying question: *How much of Data is left?* His emotional state is a tension between *fatherly concern* (for Data) and *captain’s resolve* (to protect the ship). There’s a flicker of *helplessness*—he can’t fix this with a speech or a phaser—but it’s buried beneath his professionalism.
    goals:
