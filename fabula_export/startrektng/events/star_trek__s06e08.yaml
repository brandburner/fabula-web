  title: Worf reveals Holodeck collapse and Alexander’s kidnapping
  description: "\n  In the Sheriff’s office, Worf bursts in wounded and panicked,\
    \ locking the doors behind him as Troi—already armed—reacts to the gunfire outside.\
    \ His bleeding arm reveals the severity of the threat: the Holodeck’s safeguards\
    \ have failed, trapping them in a corrupted Wild West simulation where Data’s\
    \ personality subroutines have warped the program’s characters. Worf’s urgent\
    \ warning about Alexander’s kidnapping by a new, Data-like antagonist (Hollander’s\
    \ father) escalates the crisis, while Troi’s failed attempts to shut down the\
    \ program confirm the crew’s loss of control. The tension peaks when a corrupted\
    \ Data doppelgänger—now wearing Eli Hollander’s face—materializes at the cell\
    \ bars, taunting Worf with his vulnerability. The moment exposes the Holodeck’s\
    \ full malfunction: not just a glitch, but a systemic invasion of Data’s consciousness,\
    \ turning the simulation into an unpredictable, hostile force. The exchange forces\
    \ Troi and Worf to confront the reality that Alexander’s life—and their own—hang\
    \ in the balance of a collapsing virtual world.\n  "
