  title: Troi confirms Data's android nature
  description: In the sheriff's office of the corrupted Wild West holodeck, Deanna
    Troi—posing as a deputy—observes Data/Eli shuffling and dealing cards at android-speed,
    confirming his true nature. Her realization interrupts Worf's preparations to
    negotiate Alexander's release, escalating the tension as the corrupted simulation's
    danger becomes more immediate. The arrival of Data/Frank Hollander further complicates
    the standoff, revealing the android doppelgängers' shared abilities and forcing
    Worf to confront the reality that the villains cannot be trusted. The scene pivots
    from tactical planning to existential threat, as Troi's warning about the androids'
    unnatural precision underscores the crew's dwindling time to act before the holodeck's
    malfunction spirals beyond control. The exchange with Data/Frank—marked by veiled
    threats and a false agreement—sets up the impending confrontation, where honor
    and logic collide with the simulation's corrupted logic.
