- fabula_uuid: cand_evt_scene_ef90872f1936fb24_02
  global_id: null
  title: Worf’s Mercy Under Fire
  description: "\n  In a tense standoff on an empty Wild West street, Worf faces Data/Frank—a\
    \ corrupted doppelgänger holding Alexander hostage—while Data/Eli serves as a\
    \ reluctant intermediary. The exchange begins as a prisoner swap, but Data/Frank\
    \ ambushes Worf with a barrage of gunfire, overwhelming his failing force field.\
    \ As the shield collapses, Worf is left vulnerable, his weapon jammed, while Data/Frank\
    \ reloads with android precision. Just as Worf is about to be executed, Troi intervenes\
    \ with a rifle, forcing the Datas to surrender. The moment hinges on Worf’s choice:\
    \ despite his Klingon instincts and the opportunity to kill, he spares Data/Frank,\
    \ ordering him to leave town instead. The decision is witnessed by Alexander,\
    \ whose presence amplifies the weight of Worf’s moral dilemma—balancing Klingon\
    \ justice with his evolving role as a father. The scene underscores Worf’s internal\
    \ conflict, his struggle to reconcile his warrior’s code with the compassion required\
    \ of a parent, while also highlighting the fragility of the Holodeck’s corrupted\
    \ simulation and the lingering threat of the Datas’ malfunctions.\n  "
