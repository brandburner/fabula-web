acts:
- fabula_uuid: act_7df4d1420375e3c5
  number: 1
  summary: The narrative begins with Captain Picard, Beverly Crusher, and Worf each
    attempting to pursue personal projects during a delay in the Enterprise's schedule.
    Picard's musical composition is repeatedly interrupted by requests from Geordi
    and Data for an experimental neural interface, Beverly for a play rehearsal, and
    Worf for security drills. Worf, ultimately dismissed to enjoy his free time, reluctantly
    agrees to join Alexander in a Wild West Holodeck simulation. In the Holodeck,
    Worf and Alexander assume roles as Sheriff and Deputy in Deadwood, South Dakota.
    They encounter Eli Hollander, a notorious gunslinger. Worf quickly subdues Eli,
    which disappoints Alexander, who then increases the program's difficulty. The
    simulation resets, presenting a more challenging Eli and his henchmen. Worf engages
    in a more intense brawl, but is ultimately outdrawn by Eli. Counselor Troi, appearing
    as a mysterious stranger, intervenes and saves Worf. Concurrently, in Engineering,
    Data and Geordi proceed with their neural interface experiment, connecting Data's
    positronic net to the ship's computer. During the process, Data experiences a
    brief power surge. After disconnecting, Data unconsciously performs Eli Hollander's
    theatrical gun-spinning move, hinting at an unforeseen corruption beginning to
    manifest.
  key_moments: []
  scene_numbers:
  - 1
  - 2
  - 3
  - 4
- fabula_uuid: act_bce165531f38c6b0
  number: 2
  summary: 'In the Holodeck''s Sheriff''s office, Worf and Alexander interrogate Eli
    Hollander, who is now jailed. Eli taunts them, revealing he expects his father,
    Frank Hollander, to break him out, foreshadowing a greater threat. Troi, still
    in character as ''Durango,'' agrees to become a temporary deputy for a fee, prompting
    Alexander to leave for the bank. Meanwhile, Annie Meyers, a saloon girl, aggressively
    flirts with Worf, culminating in a slap when he rejects her advances. On the Enterprise,
    signs of widespread computer malfunction begin to appear: Picard''s musical composition
    program plays Dvorak instead of Mozart, and Beverly Crusher''s play script is
    replaced by Data''s poetry. Geordi and Data investigate, realizing that a core
    subroutine (C-47), responsible for recreational programming and library access,
    has been corrupted and replaced by elements of Data''s personal programming during
    their experiment. Alexander, returning from the bank with a bag of money, is ambushed
    and kidnapped by Eli''s henchmen. He attempts to freeze the program, but it fails
    to respond, indicating a serious malfunction. The shadowy figure of Frank Hollander
    emerges, demanding his son, and steps into the light to reveal a face identical
    to Data''s, confirming the dangerous integration of Data''s persona into the Holodeck''s
    antagonists.'
  key_moments: []
  scene_numbers:
  - 5
  - 6
- fabula_uuid: act_4c6fe2d4566e633e
  number: 3
  summary: 'On the Enterprise, Data exhibits increasingly pronounced Texan mannerisms
    and speech patterns, completely unaware of his altered behavior, while his replicator
    dispenses cat food. In the Holodeck, Troi attempts to teach Worf the quick-draw,
    but his awkwardness results in an accidental shot, further highlighting his discomfort
    with the Western setting. Concerned by Alexander''s prolonged absence, Worf leaves
    the Sheriff''s office to find him, instructing Troi to guard Eli. Worf enters
    the saloon, where he encounters Data/Frank Hollander, who, along with his henchmen,
    demands Eli''s release. Initially, Worf believes Data is merely engaging in character
    play, but Data/Frank''s aggressive pushes and android strength, coupled with the
    Holodeck''s failure to respond to Worf''s ''freeze program'' command, reveal the
    grave reality: the safeguards are offline. Data/Frank then shoots Worf, inflicting
    a real, bleeding wound, confirming the physical danger within the simulation.
    Worf retreats to the Sheriff''s office, locking the door and informing Troi about
    the failed safeguards and his injury. They attempt to end the program and contact
    the Enterprise, but both fail. Data/Eli, now also bearing Data''s face, taunts
    them from his cell, solidifying their realization that the Holodeck characters
    have become sentient, dangerous entities embodying Data''s abilities.'
  key_moments: []
  scene_numbers:
  - 7
  - 8
  - 9
  - 10
- fabula_uuid: act_8c3dfbae9b02b44b
  number: 4
  summary: 'Worf and Troi confront Data/Eli, confirming that he possesses Data''s
    superhuman abilities, not just his appearance. Troi deduces that completing the
    program''s narrative might be the only way to terminate the simulation. Worf begins
    searching the town for Alexander, learning from witnesses that Eli''s men abducted
    him. Meanwhile, on the Enterprise, Picard and Riker are briefed on the escalating
    malfunctions, including replicators dispensing cat food and Data''s increasingly
    pronounced Texan accent. Data''s denial of using Western slang further highlights
    his unawareness of his own corruption, prompting Picard to send him back to Engineering
    with Geordi. Back in the Holodeck, Troi observes Data/Eli shuffling cards at hyper-speed,
    definitively confirming that the Holodeck characters have inherited Data''s android
    capabilities, making them incredibly dangerous adversaries. Data/Frank Hollander
    then returns to the Sheriff''s office, demanding Eli''s release. Worf, despite
    his Klingon honor, agrees to an exchange: Alexander for Eli, to take place in
    two hours. Troi, however, expresses profound skepticism, warning Worf that the
    villains will undoubtedly break their word and that facing an android-powered
    gunfighter will be a deadly confrontation, underscoring the gravity of their predicament.'
  key_moments: []
  scene_numbers:
  - 11
  - 12
  - 13
- fabula_uuid: act_19a1a41a0b88b7d1
  number: 5
  summary: On the Enterprise, Geordi and Data continue working to purge the corrupted
    memory structures from both Data and the ship's computer, anticipating a full
    restoration within hours. Data's Texan persona is still active, but he remains
    oblivious to it. In the Holodeck, Worf and Troi meticulously plan their strategy
    for the exchange. Worf fashions a makeshift, unstable force field device for his
    holster and designates a rain barrel as a hiding spot for Alexander. The exchange
    commences on the deserted Western street. Data/Frank Hollander, Alexander, and
    Eli Hollander approach their respective positions. Data/Frank initiates an ambush,
    with Data/henchman and Data/bandito appearing. Data/Frank opens fire on Worf.
    Worf's force field activates, deflecting several bullets, but quickly fails under
    the sustained assault. Out of bullets, Data/Frank is about to be re-armed by the
    Data/bandito, but Worf, fumbling slightly, manages to draw and shoot the gun out
    of Data/Frank's hand. Troi emerges from a covered wagon, holding the remaining
    Data-faced henchmen at bay with her rifle. Worf, seeing Alexander watching from
    the saloon doorway, chooses to spare Data/Frank, ordering him to leave town instead
    of killing him. The program, however, fails to terminate, and Data/Annie Meyers,
    also bearing Data's face, appears and kisses Worf. Disgusted, Worf finally manages
    to shut down the simulation. Back on the Enterprise, Data and the computer are
    fully restored. Worf checks on Alexander, who expresses disappointment about not
    returning to the 'Ancient West.' Worf, now embracing the adventure, implies they
    will return, donning his cowboy hat and practicing his quick-draw in the mirror,
    signifying his unexpected enjoyment and integration of the Western experience
    with his Klingon honor.
