  title: Rehearsal disrupted by Data’s poetry
  description: "\n  During a rehearsal of Beverly’s play, Riker and the cast discover\
    \ their PADDs have been corrupted, displaying Data’s poetry instead of the script.\
    \ Beverly notices the discrepancy first, interrupting Riker mid-line as he recites\
    \ what he believes to be his dialogue. Upon inspection, both realize the entire\
    \ play has been replaced with Data’s literary output—a direct symptom of the ship’s\
    \ deeper integration of his personality subroutines. The malfunction underscores\
    \ the Holodeck’s instability, foreshadowing the escalating danger in the Wild\
    \ West simulation where Worf and Alexander are already at risk. The moment serves\
    \ as a critical diagnostic clue, revealing the extent of the system’s corruption\
    \ beyond the Holodeck and hinting at the broader implications of Data’s subroutine\
    \ infiltration.\n  "
