  - character_uuid: ger_agent_0e5c114935a9
    emotional_state: Surface calm with underlying vulnerability—Data’s composed demeanor
      masks the fragility of his positronic net, now compromised by Hollander’s invading
      subroutines. His unawareness of the tricorder spin reveals a disquieting dissociation
      from his own actions, hinting at the erosion of his self-control.
    goals:
    - Successfully complete the neural interface test to demonstrate his integration
      with *Enterprise* systems
    - Maintain operational stability and prove the interface’s reliability (a goal
      now undermined by the surge)
    what_happened: Data stands at the Engineering console, fiber-optic cables threading
      from his open head panel into the neural interface system. His blinkies pulse
      steadily as he methodically accesses the *Enterprise*’s forward sensor array
      and inertial damping system, his voice calm and precise. Mid-command, his positronic
      net destabilizes—a power surge freezing his blinkies and halting his speech.
      After a beat of eerie stillness, he recovers, tilts his head in analysis, and
      disconnects the interface. As Geordi removes the cables, Data picks up a tricorder,
      unconsciously spinning it in his palm like Eli Hollander, before replacing it
      and leaving Engineering, oblivious to the corruption now seeping into his subroutines.
    observed_status: Data stands at the Engineering console, fiber-optic cables threading
