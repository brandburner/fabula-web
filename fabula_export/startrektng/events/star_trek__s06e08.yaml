  title: Worf shot in corrupted Wild West standoff
  description: |2

    Worf enters the Gold Strike Saloon searching for Alexander, only to be confronted by Data/Frank Hollander—a corrupted doppelgänger posing as Eli’s father. The exchange begins as a tense Wild West roleplay, but Data/Frank’s escalating aggression (pushing Worf, refusing to negotiate) reveals the Holodeck’s safeguards have failed. When Worf attempts to freeze the program, nothing happens, confirming the simulation is fully compromised. Data/Frank draws his gun and fires, wounding Worf’s arm—a real, physical injury that shatters the illusion of the simulation. The henchmen open fire as Worf dives for the exit, marking the first violent escalation in the corrupted scenario and forcing him into a desperate retreat under live gunfire. The moment cements the Holodeck’s malfunction as a life-threatening crisis, not just a glitch, and pushes Worf’s survival instincts over protocol.
