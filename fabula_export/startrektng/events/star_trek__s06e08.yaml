  title: Troi probes Eli’s fractured psyche
  description: 'After Worf’s accidental gunshot disrupts their training, Troi takes
    over guarding Eli while Worf searches for Alexander. Alone with the prisoner,
    Troi shifts into counselor mode, probing Eli’s violent past with a mix of professional
    curiosity and playful provocation. Eli’s dismissive reaction—ignoring her while
    shuffling cards—reveals his emotional detachment, hinting at deeper psychological
    instability. The moment underscores the Holodeck’s corruption: Eli’s fractured
    psyche mirrors the simulation’s systemic breakdown, foreshadowing the Data doppelgängers’
    later emergence. Troi’s attempt to engage him fails, but her observation of his
    behavior becomes critical evidence of the program’s instability, linking Eli’s
    moral decay to the broader malfunction.'
