  title: Troi disrupts Eli’s ambush of Worf
  description: "\n  In the corrupted Wild West holodeck, Eli—one of Data’s corrupted\
    \ doppelgängers—ambushes Worf, gaining the upper hand and holding him at gunpoint\
    \ after a brutal fight. Before Eli can execute Worf, Troi (disguised as a mysterious\
    \ stranger named 'Durango') intervenes, firing a warning shot that blasts Eli’s\
    \ hat off and forces him to stand down. The intervention reveals Troi’s presence\
    \ in the simulation, hinting at deeper interference in the holodeck’s malfunction.\
    \ The moment also underscores the escalating danger of the corrupted program,\
    \ as Eli’s taunts and violence reflect the instability of the holodeck’s AI, now\
    \ influenced by Data’s fragmented subroutines. Worf’s initial confidence in the\
    \ simulation is shattered, and Alexander’s excitement turns to concern as the\
    \ holodeck’s instability becomes undeniable. The scene serves as a turning point,\
    \ shifting the dynamic from a controlled Wild West simulation to a life-threatening\
    \ scenario where the rules no longer apply.\n  "
