  title: Frank’s violence forces Worf’s retreat
  description: 'Worf enters the Gold Strike Saloon searching for Alexander, only to
    encounter Annie Meyers’ lingering hostility and Data/Frank Hollander’s arrival
    with armed henchmen. Frank’s polite but menacing demeanor quickly escalates into
    physical intimidation—first with a crushing grip on Worf’s shoulder, then a violent
    shove—when Worf refuses to negotiate for Alexander’s release. Worf’s attempts
    to break character and freeze the program fail, revealing the Holodeck’s malfunction
    is far more dangerous than a simulation. When Frank draws his gun and fires, wounding
    Worf’s arm, the scene erupts into chaos as the henchmen open fire, forcing Worf
    into a desperate, bleeding retreat through the saloon doors. The violence shatters
    the illusion of the Wild West program, confirming the doppelgängers’ unchecked
    aggression and the simulation’s lethal reality. Worf’s physical injury and the
