      to shield them from the sun, is a defining element of his holographic persona.
      It casts a shadow over his face, obscuring his expression and adding to the
      town’s mysterious stillness. When he tilts his head slightly to observe Worf
      and Alexander, the hat shifts just enough to reveal his squinting gaze, a subtle
      but effective detail that draws attention to his role as a silent witness. The
      hat’s weathered appearance grounds the simulation in its Wild West setting,
      but its stillness—unlike the creaking chair or the horse’s whinny—hints at the
      programmed nature of the town’s inhabitants.
