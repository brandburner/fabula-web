  global_id: null
  title: Data’s corrupted personality surfaces in Engineering
  description: "\n  In Engineering, Data—his neural interface still compromised by\
    \ the Wild West holodeck’s corrupted data—greets Riker with an uncharacteristic\
    \ Texan drawl, his speech slipping between his normal voice and the anachronistic\
    \ accent. Geordi explains that Data’s memory subroutines have been overwritten\
    \ by 19th-century American West files, a direct consequence of the failed neural\
    \ interface experiment. Data, unaware of his altered state, compounds the absurdity\
    \ by tipping an imaginary hat and referencing 'supper' in a folksy tone. The scene\
    \ underscores the escalating systemic failure: while Data’s corruption is localized\
    \ to personality quirks for now, the ship’s computer remains compromised, with\
    \ its recreational database still purging corrupted data. The moment serves as\
    \ a microcosm of the larger crisis—what begins as a humorous glitch (Data’s drawl)\
    \ foreshadows the holodeck’s deeper, more dangerous malfunctions, where his corrupted\
    \ subroutines could soon threaten the ship’s integrity and crew safety. Riker’s\
    \ reaction—a mix of concern and resignation—hints at the crew’s growing unease\
    \ as the problem spreads beyond Engineering.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e08
  scene_sequence: 17
  sequence_in_scene: 35
  key_dialogue:
  - 'DATA: ((to Riker, Texan accent)) Howdy, Commander.'
  - 'DATA: ((normal voice)) Well... we figure parts of my memory structure... have
    been replaced with information from the computer''s recreational database.'
  - 'DATA: ((normal voice)) That''s right, partner.'
  - 'DATA: You just sit tight, Commander. We''ll have it fixed up in time for supper.'
