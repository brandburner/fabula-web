  title: Frank Hollander reveals corrupted Data identity
  description: 'Alexander, bound and gagged, is dragged through a dark mine tunnel
    by Eli’s henchmen after his unprovoked capture. The shadowy figure of Frank Hollander
    emerges, his face initially obscured, but as he steps into the light, his features
    are revealed to be an exact replica of Data’s. The moment exposes the Holodeck’s
    systemic corruption—Frank’s presence as a Data doppelgänger signals that the simulation’s
    integrity has collapsed entirely, with Data’s personality subroutines now manifesting
    as hostile entities. Alexander’s desperate attempts to freeze the program fail,
    underscoring the crew’s helplessness against the malfunction. Frank’s cold declaration
    that Alexander is ‘more valuable alive’ escalates the threat, framing the boy
    as a bargaining chip in a conflict that now endangers the entire Enterprise. The
    reveal of Frank’s face—Data’s face—serves as a thematic bridge, linking the Holodeck’s
    corruption to Data’s broader existential crisis, while the shift from Alexander’s
    cowboy bravado to childlike fear highlights the simulation’s psychological toll
    on its victims. This moment marks a turning point: the Holodeck is no longer a
    controlled environment but a battleground where Data’s fractured identity holds
    the crew hostage.'
