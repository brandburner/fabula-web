      nearby. Townsfolk mill about quietly; a horse snorts at a hitching post. The
      air hangs still until a gunshot cracks the calm, shattering the illusion. Corrupted
      holograms ambush Alexander here amid the facades, their mechanical grip exposing
      the holodeck’s failing safeguards. Tension coils as Klingon father and son confront
      simulated chaos turning lethal.
