  key_dialogue:
  - |-
    BEVERLY: Jean-Luc, I need to talk with you about *Something for Breakfast*.
    PICARD: Ah... yes... a very intriguing drama. But I really don't have the time it would take to learn a part. And anyway, I'm not much of an actor...
    BEVERLY: That's no problem. You wouldn't be playing one of the leads. You play the butler.
  - |-
    PICARD: Let me read the play again... and I'll let you know.
    BEVERLY: You'll be wonderful, Jean-Luc. Rehearsal's at one thirty this afternoon.
  - |-
    PICARD: Mister Worf... is there some reason you're trying to give yourself more work?
    WORF: No sir. I simply wished to use the extra time to...
    PICARD: ... Enjoy yourself. You have some free time. Use it.
