  title: Worf’s gun mishap and abrupt departure
  description: In the sheriff’s office of the corrupted Wild West Holodeck, Deanna
    Troi attempts to train Worf in quick-draw techniques, but his inexperience causes
    his gun to fire accidentally into the floor. The moment exposes Worf’s vulnerability
    and the fragility of their situation, as Eli Hollander mocks him from his cell.
    Troi’s concern for Alexander’s prolonged absence escalates the tension, prompting
    Worf to abandon the training abruptly and depart to search for his son. The incident
    deepens the narrative stakes by highlighting Worf’s protective instincts and the
    escalating danger within the malfunctioning simulation, leaving Troi to guard
    Eli alone.
