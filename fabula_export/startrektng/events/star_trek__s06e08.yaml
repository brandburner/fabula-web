      subroutines already corrupting Data’s programming, foreshadowing the Holodeck’s
      later malfunction where Hollander’s doppelgängers will fully emerge. His influence
      is a silent, creeping force, unseen but undeniable in its impact on Data’s behavior.
    observed_status: Eli Hollander is not physically present in Engineering but is
