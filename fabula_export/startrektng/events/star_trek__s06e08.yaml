  - object_uuid: ger_object_3bc49c49a8a2
    description_of_involvement: Worf wears this small metallic box, fashioned from
      scavenged spare parts like those delivered by Annie Meyers via telegraph machine.
      Copper wiring links it to his communicator pin on his vest, and it attaches
      directly to his holster. The unstable device generates a brief force field for
      defense, lasting no more than fifteen seconds—Worf, Troi, Frank Hollander, and
