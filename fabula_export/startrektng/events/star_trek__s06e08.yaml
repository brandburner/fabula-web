  title: Computer corruption traced to Data’s subroutines
  description: "\n  In Engineering, Geordi La Forge confirms the PADDs are operational\
    \ but reveals the ship’s computer has diverted from Beverly Crusher’s play to\
    \ access Data’s literary files—a direct consequence of their failed neural interface\
    \ experiment. This discovery triggers a joint diagnostic effort: Geordi initiates\
    \ a Level Two diagnostic of the computer’s core systems, while Data prepares to\
    \ conduct a self-diagnostic to assess whether his subroutines have infiltrated\
    \ the ship’s network. The exchange underscores the systemic nature of the corruption,\
    \ hinting at a deeper, unchecked contamination of the Enterprise’s systems. Beverly’s\
    \ lingering concern about her missing play contrasts with the escalating technical\
    \ crisis, reinforcing the tension between personal and operational priorities.\
    \ The scene serves as a critical turning point, shifting the narrative from isolated\
    \ malfunctions to a full-scale systemic threat requiring immediate intervention.\n\
    \  "
