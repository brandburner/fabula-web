  title: Data doppelgänger invades Worf’s space
  description: "\n  After Worf and Troi reunite with Alexander in the Gold Strike\
    \ Saloon, Worf attempts to terminate the corrupted Holodeck program, but the computer\
    \ fails to respond. The tension escalates when Data/Annie—a corrupted doppelgänger\
    \ with Data’s face—enters, aggressively flirting with Worf and kissing him, violating\
    \ his personal boundaries. The encounter underscores the program’s instability\
    \ and forces Worf to confront the unnatural, predatory behavior of the corrupted\
    \ simulation. The scene ends abruptly as Worf finally commands the computer to\
    \ terminate the program, restoring the Enterprise’s grid and signaling the resolution\
    \ of the malfunction. The moment exposes the fragility of the Holodeck’s integrity\
    \ and the psychological toll of the corruption on Worf, who is visibly repulsed\
    \ by the violation.\n  "
