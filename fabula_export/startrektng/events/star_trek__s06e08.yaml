  object_involvements:
  - object_uuid: ger_object_dde5951744bb
    description_of_involvement: Worf and Troi lay their Starfleet communicator pins
      on the sheriff’s office desk amid tense tactical planning for Alexander’s hostage
      exchange. Worf picks one up, pries off the pin, and integrates it with telegraph
      parts into a makeshift force field generator that lasts fifteen seconds—their
      edge in the unstable holodeck. The badges catch faint light from swinging lanterns
      as scavenged Starfleet tools clash with Wild West grit, symbolizing the fusion
      of technology and frontier survival.
    status_before_event: Attached to Worf’s uniform, functioning as a standard communicator
      pin.
    status_after_event: Repurposed into a force field device, now attached to Worf’s
      holster, depleted after use.
    global_id: ger_object_dde5951744bb
  - object_uuid: ger_object_b17c8a2e17d3
    description_of_involvement: The covered wagon squats on the dusty western street,
      its canvas flaps and wooden frame shielding Troi from view. She springs out
      rifle-first to halt Data/Frank’s execution of Worf, her sudden appearance breaking
      the standoff. Alexander watches from the saloon as the wagon’s bulk anchors
      the chaotic exchange, its presence turning ambush into rescue. The wagon’s canvas
      flaps billow slightly in the wind, adding to the tension of the moment.
    status_before_event: Stationary on the street, flaps closed, hiding Troi inside.
    status_after_event: Flaps open, Troi no longer inside, serving as a tactical vantage
      point.
    global_id: ger_object_b17c8a2e17d3
  - object_uuid: ger_object_3f0d67517969
    description_of_involvement: Data/Frank draws his pistol in the dusty western street
      and unleashes six shots at Worf’s flickering force field during the prisoner
      exchange ambush. The weapon jams and clicks empty after the barrage, its hammer
      striking futilely as Data/Frank is left exposed. Data/Bandito tosses it to Data/Frank,
      who reloads with android precision amid the standoff. The pistol’s failure and
      subsequent reload highlight the Datas’ mechanical advantage and the fragility
      of Worf’s defenses.
    status_before_event: Loaded with six bullets, ready for use by Data/Frank.
    status_after_event: Empty, reloaded by Data/Bandito, then blown out of Data/Frank’s
      hand by Worf’s shot.
    global_id: ger_object_3f0d67517969
  - object_uuid: ger_object_cca72ae7fc8d
    description_of_involvement: Data/Frank strikes the wooden matchstick against his
      boot or a rough surface to light his cigar during the tense prisoner exchange
      on the dusty western street. The brief flare casts flickering shadows across
      his face and the standoff participants—Worf, Alexander, Data/Eli, and Data/Henchman—adding
      gritty atmosphere amid rising violence. Sulfur scent lingers as the flame catches
      the cigar tip, symbolizing the ignition of conflict.
    status_before_event: Unlit, held in Data/Frank’s hand, ready to strike.
    status_after_event: Burned out, discarded or still held as Data/Frank retreats.
    global_id: ger_object_cca72ae7fc8d
  - object_uuid: ger_object_8b4cd34b0028
    description_of_involvement: Weathered wooden barrel stands outside the saloon
      on the dusty holodeck street, filled with stagnant rainwater. Worf points to
      it during planning as prime cover, thick enough to stop bullets aimed at Alexander.
      In the exchange, characters duck behind it for shelter as Data doppelgängers
      unleash fire, its solid bulk deflecting shots in the chaotic standoff. The rain
      barrel serves as a critical piece of cover, symbolizing the fragile safety Alexander
      finds amid the violence.
    status_before_event: Full of rainwater, positioned outside the saloon, untouched.
    status_after_event: Slightly damaged from bullet impacts, still standing but no
      longer pristine.
    global_id: ger_object_8b4cd34b0028
  - object_uuid: ger_object_ab3a461f7bd1
    description_of_involvement: Troi grips the classic lever-action Winchester Rifle
      in the Gold Strike Saloon’s dim light. Its wooden stock presses against her
      shoulder as she levels the barrel and fires a precise warning shot. The blast
      tears Eli Hollander’s hat from his head, scatters patrons, and forces Eli and
      his henchman Bandito to stand down during their ambush on Worf. Alexander watches
      tensely as the rifle’s report echoes, underscoring the holodeck’s escalating
      violence. The rifle symbolizes Troi’s intervention and her role as a protector,
      turning the tide of the standoff.
    status_before_event: Loaded and ready, hidden in the covered wagon, awaiting Troi’s
      use.
    status_after_event: Still functional, held by Troi as she and Worf head toward
      the saloon.
    global_id: ger_object_ab3a461f7bd1
  - object_uuid: ger_object_c85154e490d7
    description_of_involvement: A distant church bell tolls six times across the empty
      Wild West street, its deep, resonant clangs punctuating the tense standoff.
      Positioned in the simulated town, the bell’s methodical rhythm builds foreboding
      as Worf faces Data/Frank’s ambush, Alexander watches, Data/Eli mediates, and
      Troi prepares to intervene. The sound hangs heavy, amplifying the moral weight
      of Worf’s mercy without direct handling by characters. The bell serves as an
      ominous backdrop, reinforcing the high stakes of the moment.
    status_before_event: Silent, part of the holodeck’s ambient soundscape.
    status_after_event: Tolls six times, then falls silent again as the standoff concludes.
