  - object_uuid: ger_object_a2868eb28531
    description_of_involvement: 'The USS Enterprise-D serves as the overarching setting
      for this event, both as the physical vessel housing the corrupted holodeck and
      as the ultimate safe haven once the program is terminated. While the Gold Strike
      Saloon is the immediate location of the action, the Enterprise’s presence is
      felt through the computer’s voice, Worf’s authority as a senior officer, and
