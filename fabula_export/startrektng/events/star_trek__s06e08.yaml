  title: Geordi authorizes Data’s memory purge
  description: "\n  In Engineering, Geordi La Forge and Data diagnose the android’s\
    \ worsening memory corruption—his speech now laced with an anachronistic Texan\
    \ drawl—while Riker observes the escalating malfunction. Geordi confirms the root\
    \ cause: Data’s personality subroutines have been overwritten by Wild West holodeck\
    \ data during the neural interface experiment. With the ship’s computer also compromised,\
    \ Geordi initiates a memory purge to restore Data’s core programming, estimating\
    \ it will take hours. The procedure marks a critical intervention to stabilize\
    \ both Data and the Enterprise’s systems before further damage occurs. Riker’s\
    \ departure underscores the urgency, as the purge must complete before the holodeck’s\
    \ corrupted doppelgängers (including Data/Eli Hollander) pose irreversible threats\
    \ to Worf, Alexander, and the crew. The scene bridges the technical crisis with\
    \ the ongoing Wild West holodeck disaster, framing the purge as a last-resort\
    \ fix to reclaim control over the ship’s systems and Data’s identity.\n  "
