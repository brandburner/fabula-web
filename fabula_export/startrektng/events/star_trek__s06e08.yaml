  title: Worf terminates the corrupted simulation
  description: "\n  After reuniting with Alexander in the Gold Strike Saloon, Worf\
    \ immediately senses something is wrong when the computer fails to respond to\
    \ his command to end the program. The tension escalates when Data/Annie—a corrupted\
    \ doppelgänger now bearing Data’s face—enters and aggressively embraces Worf,\
    \ kissing him in a grotesque parody of affection. Disgusted by the unnatural violation,\
    \ Worf forcefully repeats his command to terminate the simulation, his voice sharp\
    \ with revulsion. The saloon dissolves into the Holodeck’s grid, signaling the\
    \ program’s collapse and the restoration of control. The abrupt shift underscores\
    \ the simulation’s instability and Worf’s role as the decisive force reasserting\
    \ order over chaos, while also exposing the blurred boundaries between artificial\
    \ and organic behavior that the malfunction has exploited.\n  "
