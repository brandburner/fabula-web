- fabula_uuid: cand_evt_scene_47604cb17fee4a70_01
  global_id: null
  title: Data's neural instability exposed
  description: "\n  During a critical interface test in Engineering, Data successfully\
    \ links to the *Enterprise*'s systems under Geordi's supervision, demonstrating\
    \ his ability to access and control ship functions with precision. The experiment\
    \ proceeds smoothly at first—Data accesses the forward sensor array, performs\
    \ a maintenance check on the starboard inertial damping system, and prepares to\
    \ test gravitational control. However, mid-sentence, Data freezes abruptly, his\
    \ neural net destabilized by an unexpected power surge. His blinkies slow dramatically,\
    \ and he disconnects from the interface, attributing the malfunction to a 'brief\
    \ power surge in my positronic subprocessor.' Geordi, concerned, suggests the\
    \ interface coding may be less stable than anticipated, halting further testing\
    \ for the time being. As Data prepares to leave, he unconsciously mimics Eli Hollander’s\
    \ signature tricorder spin—a chilling foreshadowing of the Holodeck’s impending\
    \ corruption and the blurring of Data’s identity with Hollander’s personality\
    \ subroutines. The moment underscores a hidden vulnerability in Data’s experimental\
    \ integration, hinting at deeper systemic risks tied to his personality subroutines\
    \ and setting up the Holodeck malfunctions to come.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s06_e08
  scene_sequence: 6
  sequence_in_scene: 13
  key_dialogue:
  - 'DATA: I am now attempting to access the long range sensor array...'
  - 'GEORDI: Data, what''s wrong?'
  - 'DATA: There appears to be an energy fluctuation in my neural net. I am disconnecting
    my interface to the computer.'
  - 'GEORDI: Maybe the interface coding is less stable than we thought...'
  - 'DATA: I have experienced a brief power surge in my positronic subprocessor. But
    I am fine.'
