    - To escape the henchmen’s grasp and rejoin Worf
    what_happened: Alexander walks confidently through the Holodeck’s Wild West simulation,
      jingling a canvas bag of money—his prize from a recent victory. His expression
      is triumphant, almost giddy, as he revels in the moment. Suddenly, a hand grabs
      his shoulder, and he freezes, his eyes widening in shock. Before he can react,
      one of Eli’s henchmen clamps a hand over his mouth, muffling any attempt to
      call for help. Alexander’s body tenses as he’s dragged away, his struggles ineffective
      against the henchmen’s superior strength. His emotional state shifts rapidly
      from pride to sheer terror, his eyes darting desperately for an escape that
      doesn’t exist.
