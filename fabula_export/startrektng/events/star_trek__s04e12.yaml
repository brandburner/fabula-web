- fabula_uuid: cand_evt_scene_1dcb884d5c4ebd0f_01
  global_id: null
  title: O'Brien risks transport to Phoenix
  description: In the transporter room, Chief Miles O'Brien and Lieutenant Geordi
    La Forge execute a high-risk technical maneuver to beam O'Brien through the *Phoenix*'s
    shields—a procedure fraught with phase errors and potential catastrophic failure.
    O'Brien, confident in his ability to compensate for instability, insists the operation
    is viable, while Geordi reluctantly adjusts the pattern buffer cycle to mitigate
    risks. Their dialogue reveals O'Brien's tactical certainty and Geordi's cautious
    skepticism, underscoring the crew's desperation to stop Maxwell. The successful
    transport materializes O'Brien aboard the *Phoenix*, where he immediately begins
    his covert infiltration. This moment highlights the crew's resourcefulness in
    defying Starfleet protocols to avert war, while foreshadowing the moral and technical
    dangers of their gambit. The scene also deepens O'Brien's arc as a former Maxwell
    loyalist now acting against his former captain, blending personal conflict with
    the mission's urgency.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e12
  scene_sequence: 26
  sequence_in_scene: 54
  key_dialogue:
  - |-
    O'BRIEN: It's good we're trying this with another Federation ship. It would never work with an alien vessel.
    GEORDI: I'm not so sure it's going to work this time. Can you get an accurate enough fix on his shield modulation to get through?
    O'BRIEN: I think so. The *Phoenix* should be following standard Starfleet protocols. They have to align their shields at the start of every sweep.
  - |-
    GEORDI: But if there's any phase error... you could materialize outside the ship... we'd never have a chance to correct.
    O'BRIEN: I've been monitoring his sweep patterns... I'm telling you, I can compensate...
