      but still formidable opponent—serves as a visual metaphor for the fragile peace
      and the ever-present risk of war. Its role in the event is to underscore the
      stakes: one wrong move could reignite full-scale conflict.'
    status_before_event: Approaching the Enterprise at high warp, shields raised and
