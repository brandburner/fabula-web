      symbolizes the fracture in the chain of command and the isolation of rogue actors,
      forcing Picard to act without Maxwell’s direct input or justification. The absence
      of these communiqués underscores the urgency of Picard’s mission: he must locate
      Maxwell not just to stop him, but to understand *why* he has turned against
      Starfleet.'
