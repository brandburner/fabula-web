  - |-
    MAXWELL: You must think I've gone mad.
    PICARD: The thought has occurred.
  - |-
    MAXWELL: I know what they're doing. I can smell it. There's no good reason for a science station in the Cuellar System... but it's a hell of a strategic site for a military transport station...
    PICARD: Whatever circumstances you believed you encountered, why didn’t you notify Starfleet?
  - |-
    PICARD: What had to be done’? For whom, Maxwell? Why does a man with your long, brilliant service suddenly abandon the fundamental principles that he has believed in, even fought for, all his life... ? I'll tell you what I believe... it was because of what they did to your wife... and your children...
    MAXWELL: ... Not true. Not true...
  - |-
    PICARD: We are not going after any more Cardassian ships, Captain Maxwell... you are going to return to your bridge and set a course for Starbase Two-one-one... the Phoenix and the Enterprise will return to Federation space together. I will permit you the dignity of retaining your command during our voyage. My only alternative would be to put you in our brig, while we tow your ship back to starbase in disgrace.
    MAXWELL: I will return to my ship.
