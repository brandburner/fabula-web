  title: Picard Assigns Troi and Data to Monitor Crew
  description: On the *Enterprise* bridge, Picard briefs the crew about the imminent
    arrival of three Cardassians—Gul Macet and his aides—while navigating tensions
    over security protocols. Worf and Riker push for restrictive measures, but Picard
    insists on treating the Cardassians as guests, framing their reception as a moral
    and strategic test for peace. After conceding to limited security precautions,
    Picard tasks Troi with monitoring crew emotions and Data with identifying personnel
    who served under rogue Captain Maxwell. Data’s revelation that Chief O’Brien served
    under Maxwell becomes a critical intelligence point, setting up O’Brien’s later
    conflict. The scene underscores Picard’s leadership under pressure, balancing
    diplomacy with covert investigation while exposing the crew’s lingering distrust
    of the Cardassians.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e12
  scene_sequence: 7
  sequence_in_scene: 14
  key_dialogue:
  - 'PICARD: ... there will be three Cardassians transporting on board... Their Captain,
    Gul Macet and two of his aides. My intention is to be as open as possible with
    them... allow them to share in our search for the Phoenix.'
  - 'WORF: Sir, it is necessary to assign them a security detail.'
  - 'PICARD: They will be our guests, Mister Worf. I don''t want them to feel like
    prisoners.'
  - 'PICARD: However... it is not an exaggeration to say that the difference between
    peace... and war... is up to us. And the way we treat the Cardassians may make
    the difference.'
  - 'PICARD: Counselor, stay close to the crew. Some of them might be uncomfortable
    with the Cardassians on board. I want no incidents.'
  - 'PICARD: Mister Data, is there anyone on board who served previously with Captain
    Benjamin Maxwell?'
  - 'DATA: Accessing... Chief O''Brien served under his command aboard the Rutledge.'
