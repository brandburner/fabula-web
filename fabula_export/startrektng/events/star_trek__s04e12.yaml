  object_involvements:
  - object_uuid: ger_object_5131f75fe84d
    description_of_involvement: The Cardassian supply ship is the second victim of
      Maxwell's attack, its destruction serving as a brutal punctuation mark to the
      escalation. Data's narration highlights its defenselessness—'fifty civilians
      aboard, all lost'—as photon torpedoes reduce it to a fireball. The ship's destruction
      is morally indefensible, even in the context of war, and it forces Macet to
      enumerate the dead in a moment of raw, horrified realization. The supply ship's
      demise is not just a tactical loss; it is a symbolic breaking point, shattering
      the last remnants of the fragile peace between the Federation and the Cardassians.
    status_before_event: Traveling in Cardassian space, carrying fifty civilians and
      limited defensive armaments.
    status_after_event: Completely destroyed, reduced to a debris field, with all
      fifty civilians killed.
    global_id: ger_object_5131f75fe84d
  - object_uuid: ger_object_52dd2ff7d55c
    description_of_involvement: The Cardassian warship is the first target of Maxwell's
      attack, its destruction serving as the catalyst for the crisis. Data's narration
      details its evasive maneuvers and the *Phoenix*'s precise phaser and photon
      torpedo strikes, which obliterate the vessel and its six hundred crew in seconds.
      The warship's destruction is framed as an act of retaliation, but its scale
      and efficiency make it a declaration of war. The ship's demise is a turning
      point, forcing Picard to confront the reality of Maxwell's vendetta and the
      fragility of the peace treaty.
    status_before_event: Approaching the *Phoenix* at high speed, weapons powered
      and ready for engagement.
    status_after_event: Completely destroyed, reduced to a debris field, with all
      six hundred crew members killed.
    global_id: ger_object_52dd2ff7d55c
  - object_uuid: ger_object_6ecdef60b2de
    description_of_involvement: The *Enterprise* bridge viewscreen serves as the primary
      medium through which the crew witnesses the destruction of the Cardassian warship
      and supply ship. It displays the Okudagram tactical overlay, showing weapon
      ranges and the relative positions of the *Phoenix* and the Cardassian vessels.
