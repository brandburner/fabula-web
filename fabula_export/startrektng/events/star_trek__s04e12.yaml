- fabula_uuid: cand_evt_scene_7f285d1cfc543ed3_01
  global_id: null
  title: O'Brien confronts Maxwell’s moral crusade
  description: 'In the transporter room, Picard seeks O’Brien’s perspective on Maxwell’s
    vendetta, probing the emotional and ethical underpinnings of his actions. O’Brien,
    initially defensive, frames Maxwell’s campaign as a justified response to Cardassian
    aggression, revealing his own unresolved trauma and blind loyalty. Picard’s measured
    questioning exposes the moral ambiguity of Maxwell’s crusade—particularly the
    cost of prolonged anger—and forces O’Brien to grapple with the possibility that
    vengeance, not justice, drives Maxwell’s actions. The exchange leaves O’Brien
    unsettled, questioning whether Picard’s warning about ‘old leather’ anger was
    directed at Maxwell or himself. The scene deepens the narrative’s central tension:
    whether Maxwell’s accusations of Cardassian rearmament are true, and whether stopping
    him risks enabling a greater threat.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e12
  scene_sequence: 15
  sequence_in_scene: 30
  key_dialogue:
  - 'O''BRIEN: He''s a rare one, all right. I count myself lucky, sir—I''ve served
    with the two finest Captains in Starfleet.'
  - |-
    PICARD: How did he take it... when his family was killed?
    O'BRIEN: I'd say he took it well. Oh, I know he was broken up inside... who wouldn't be? But you'd never know it to see him. He never missed a minute's duty, always had a smile and a joke...
  - 'PICARD: I think... when one has been angry for a very long time... one gets used
    to it. Then it becomes comfortable... like old leather. And finally, it is so
    familiar that one can hardly remember feeling any other way. But in the long run,
    we are the ones who are damaged by that kind of anger. We are. Not them.'
