      provocation or deception.
    - To signal Starfleet’s awareness of Cardassian rearmament as a deterrent, forcing
      the Cardassian Union to reconsider its actions.
    - To uphold Starfleet’s ideals of discipline, transparency, and mutual restraint,
      while preparing for the possibility of conflict.
    influence_mechanisms:
