  - 'O''BRIEN: That''s what everybody thinks about the enemy. That''s probably what
    they think about us.'
  - 'MAXWELL: We''re not the same at all. We do not start wars. We do not make surprise
    attacks on manned outposts. We do not butcher women and children in their homes...
    children who never got the chance to grow up...'
  - 'MAXWELL: I''m not gonna win this one, am I Chief?'
  - 'O''BRIEN: Nossir.'
  - 'MAXWELL: Maxwell to Bridge. Stand down all weapons.'
