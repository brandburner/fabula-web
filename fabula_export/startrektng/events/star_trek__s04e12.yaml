  title: Macet undermines Worf’s authority on the bridge
  description: "\n  Worf enters the bridge gripping Glinn Telle, a Cardassian aide\
    \ caught accessing Federation weapon systems—a direct violation of Starfleet’s\
    \ neutrality. Telle protests his innocence, claiming he was studying terminal\
    \ interfaces, but Worf’s accusation and Picard’s immediate attention signal the\
    \ severity of the breach. Instead of backing his subordinate, Gul Macet publicly\
    \ rebukes Telle, confining him to quarters without investigation. The move is\
    \ a calculated power play: Macet asserts Cardassian control over their personnel\
    \ while subtly eroding Worf’s credibility in front of the bridge crew. Picard’s\
    \ silent acquiescence to Macet’s intervention—despite Worf’s clear justification—exposes\
    \ the fragility of the *Enterprise*’s diplomatic mission. The tension escalates\
    \ as Macet then requests a private meeting with Picard, hinting at deeper Cardassian\
    \ motives or a strategic concession. The scene underscores the collision of Starfleet’s\
    \ ideals and Cardassian pragmatism, with Worf’s authority (and by extension, Picard’s\
    \ command) now visibly compromised.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e12
  scene_sequence: 17
  sequence_in_scene: 35
  key_dialogue:
  - 'TELLE: I will protest this, Klingon!'
  - 'WORF: He was found at a computer station on Deck thirty-five, attempting to access
    information on our weapon systems.'
  - 'TELLE: A lie, Gul Macet. I was studying the terminal interface systems... they
    are more efficient than ours. I have no idea what was in the files.'
  - 'MACET: What business did you have going near one of their computers?'
  - 'MACET: Go to your quarters. You are confined there for the duration of this expedition.'
  - 'MACET: Captain... may we speak in private?'
