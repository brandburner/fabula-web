- fabula_uuid: cand_evt_scene_0a958e2cd4e23e6d_03
  global_id: null
  title: Picard recounts Cardassian ambush to justify caution
  description: 'Picard stands on the Enterprise bridge, gazing at the Cardassian sector,
    when he spontaneously recounts a personal failure—a Cardassian ambush during a
    Stargazer-era truce negotiation. His voice carries a rare vulnerability as he
    describes lowering shields in good faith, only to be ambushed and nearly destroyed.
    The anecdote serves a dual purpose: it reinforces Picard’s strategic caution about
    Cardassian intentions, directly countering Worf’s Klingon distrust ("The Cardassians
    have no honor") and Troi’s idealistic trust ("They''re our allies now"). The moment
    also subtly humanizes Picard, revealing the emotional scars beneath his diplomatic
    composure. Worf’s reaction ("Trust is earned, not given away") creates a philosophical
    tension that mirrors the larger conflict between Maxwell’s vengeful pragmatism
    and Picard’s principled leadership. The flashback-like recollection, though brief,
    establishes Picard’s personal history with Cardassian deception as a recurring
    theme, foreshadowing the crew’s internal divisions over trust and security in
    the face of Maxwell’s accusations. The replicator’s unappetizing meal—a minor
    but telling detail—underscores the crew’s unease in Cardassian space, reinforcing
    the scene’s atmosphere of tension and distrust.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e12
  scene_sequence: 1
  sequence_in_scene: 3
  key_dialogue: &id003
  - 'PICARD: Last time I was in this sector, I was on the Stargazer, running at warp
    speed ahead of a Cardassian warship.'
  - 'PICARD: I''d been sent to make preliminary overtures to a truce... I lowered
    my shields as a gesture of good will. But the Cardassians weren''t impressed.
    They took out most of my weapons and damaged the impulse engines before I could
    regroup and run.'
  - 'WORF: The Cardassians have no honor. I do not trust them.'
  - 'TROI: They''re our allies now, Worf. We have to trust them.'
  - 'WORF: Trust is earned, not given away.'
