    O'BRIEN: What is it?
    KEIKO: Kelp buds... plankton loaf... and sea berries.
    O'BRIEN: Sweetheart... I'm not a fish.
  - 'O''BRIEN: Keiko, I''ve been thinking... You''ve introduced me to all the wonderful
    foods you''re accustomed to... I''d like to do the same. Isn''t that what marriage
    is about? Sharing?'
  - |-
    O'BRIEN: I can still remember the aromas when my mother was cooking... She didn't believe in a replicator. She thought real food was more nutritious.
    KEIKO: She handled... real meat... touched it and cut it?
  - 'KEIKO: Okay. Maybe I''ll have something special for you, tonight, too...'
