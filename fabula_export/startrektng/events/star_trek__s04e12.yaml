    description_of_involvement: The United Federation of Planets is represented on
      the *Enterprise* bridge through Captain Picard’s leadership and the crew’s adherence
      to Starfleet protocols. The organization’s ideals—diplomacy, restraint, and
      the pursuit of justice—are tested in this moment as the crew grapples with Maxwell’s
      actions. The Federation’s moral authority is on the line, and Picard’s decisions
      will determine whether it can maintain its standing as a beacon of peace or
      be dragged into a war it sought to avoid. The crew’s unity and discipline reflect
      the Federation’s values, even as those values are challenged by the escalating
      crisis.
