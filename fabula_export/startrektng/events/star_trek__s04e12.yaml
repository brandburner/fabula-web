- fabula_uuid: cand_evt_scene_3ce33c2649b95239_02
  global_id: null
  title: Picard witnesses Maxwell’s war crimes
  description: "\n  The Enterprise bridge crew, including Picard, Riker, Macet, Data,\
    \ and Worf, observe in real-time as the *Phoenix*—under Benjamin Maxwell’s command—engages\
    \ and destroys a Cardassian warship in a preemptive strike. Data’s clinical narration\
    \ underscores the escalation: the warship fires first, but the *Phoenix* retaliates\
    \ with overwhelming force, obliterating it. Moments later, the *Phoenix* turns\
    \ its weapons on an unarmed Cardassian supply ship, annihilating it as well. Macet\
    \ reveals the devastating toll—600 dead on the warship, 50 on the supply ship—including\
    \ civilians. The revelation forces Picard to confront the moral horror of Maxwell’s\
    \ actions, while Macet’s stunned departure signals the fracture of diplomatic\
    \ trust. Picard’s immediate order to pursue the *Phoenix* at maximum warp marks\
    \ the Enterprise’s formal entry into the crisis, raising the stakes as the crew\
    \ grapples with the specter of renewed war and the possibility that Maxwell’s\
    \ accusations of Cardassian rearmament may be justified. The scene serves as a\
    \ turning point, shifting the narrative from investigation to direct intervention,\
    \ while exposing the fragility of the peace and the personal cost of vengeance.\n\
    \  "
