- fabula_uuid: cand_evt_scene_836b61543a58d363_03
  global_id: null
  title: Picard Balances Diplomacy and Security with Cardassians
  description: "\n  On the Enterprise bridge, Picard briefs the crew about the imminent\
    \ arrival of three Cardassian delegates—Gul Macet and two aides—while the ship\
    \ remains locked in a tense standoff with their vessel. The captain emphasizes\
    \ openness and hospitality, framing the Cardassians as potential allies in the\
    \ search for Maxwell’s rogue ship, the *Phoenix*. Worf and Riker immediately challenge\
    \ this approach, advocating for stricter security measures given the crew’s deep-seated\
    \ distrust of the Cardassians. Picard acknowledges their concerns but insists\
    \ on a diplomatic stance, arguing that the crew’s behavior could determine whether\
    \ peace or war prevails. He assigns Troi to monitor crew morale and Data to identify\
    \ personnel with prior ties to Maxwell, revealing Chief O’Brien’s past service\
    \ under the rogue captain. The scene culminates with Picard ordering Riker and\
    \ Troi to greet the Cardassians in Transporter Room Three while subtly signaling\
    \ his intent to interrogate O’Brien separately. The exchange underscores Picard’s\
    \ strategic duality: publicly extending trust to the Cardassians while privately\
    \ preparing for deception, both from them and within his own crew.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e12
  scene_sequence: 7
  sequence_in_scene: 15
  key_dialogue:
  - 'PICARD: ... there will be three Cardassians transporting on board... Their Captain,
    Gul Macet and two of his aides. My intention is to be as open as possible with
    them... allow them to share in our search for the *Phoenix*.'
  - 'WORF: Sir, it is necessary to assign them a security detail.'
  - 'PICARD: They will be our guests, Mister Worf. I don''t want them to feel like
    prisoners.'
  - 'PICARD: However... it is not an exaggeration to say that the difference between
    peace... and war... is up to us. And the way we treat the Cardassians may make
    the difference.'
  - 'PICARD: Mister Data, is there anyone on board who served previously with Captain
    Benjamin Maxwell?'
  - 'DATA: Accessing... Chief O''Brien served under his command aboard the *Rutledge*.'
