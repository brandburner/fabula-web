- fabula_uuid: cand_evt_scene_96374c4981e1dc15_02
  global_id: null
  title: Maxwell arms the Phoenix for war
  description: 'The *Enterprise* intercepts the *Phoenix* as it reaches the Cardassian
    freighter, revealing Maxwell’s escalation from rogue diplomacy to outright defiance.
    Picard, now forced to confront a fellow Starfleet officer, orders a red alert
    and prepares for combat, while O’Brien—leveraging his shared history with Maxwell—proposes
    a desperate, high-risk personal mission to beam aboard the *Phoenix* and appeal
    to their past bond. The scene crystallizes the crisis: Maxwell’s vendetta has
    crossed into open rebellion, Picard’s authority is tested, and O’Brien’s trauma-driven
    loyalty becomes the only potential bridge between war and peace. The tension hinges
    on whether Maxwell will fire first or if O’Brien’s gamble can buy time for diplomacy.
    Data’s sensor blind spots and Worf’s tactical warnings underscore the fragility
    of the standoff, while Picard’s measured but firm response sets the stage for
    a Federation-on-Federation confrontation.'
