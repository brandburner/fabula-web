      through which Picard’s desperate message to Maxwell is sent, warning him of
      the relayed transponder codes. These channels, usually a tool for secure communication,
      become a vehicle for betrayal—Picard uses them not to coordinate with Maxwell,
      but to alert him of his impending doom. The channels’ role is bittersweet: they
      facilitate both diplomacy and deception, underscoring the crew’s internal conflict.
      Their activation is a last-ditch effort to reach Maxwell, but the message is
      ultimately futile, as the *Phoenix* remains on course.'
