acts:
- fabula_uuid: act_c10746cb540b62ce
  number: 1
  summary: This act establishes the precarious peace between the Federation and the
    Cardassians, nearly a year after a treaty. Captain Picard's log notes the Enterprise's
    mapping survey near the Cardassian sector, highlighting the historical tension
    and the Cardassians' skittishness. Picard recounts a past encounter, underscoring
    the Cardassians' aggressive nature. Simultaneously, the narrative introduces Chief
    O'Brien's domestic life with Keiko, where his aversion to replicated food hints
    at a deeper connection to traditional ways and perhaps a past less removed from
    hardship. This domestic scene is abruptly shattered when the Enterprise comes
    under attack by a Cardassian warship, forcing Picard to retaliate. The immediate
    crisis reveals that a Federation starship, the Phoenix, commanded by the highly
    respected Captain Benjamin Maxwell, has destroyed a Cardassian science station.
    Admiral Haden orders Picard to locate Maxwell and, to maintain transparency, host
    a Cardassian delegation led by Gul Macet. This directive creates internal tension
    among the Enterprise crew, particularly for O'Brien, who served under Maxwell
    and fiercely defends him, while also displaying overt discomfort and animosity
    towards the Cardassians, which Counselor Troi observes with concern. The act concludes
    with the Cardassian delegation boarding the Enterprise, setting the stage for
    diplomatic and personal conflicts.
