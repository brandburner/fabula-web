  global_id: null
  title: Picard reveals Maxwell’s executions to O’Brien
  description: 'In the transporter room, Picard confronts O’Brien with the brutal
    truth: Maxwell has secretly executed six hundred Cardassians in cold blood. O’Brien,
    initially defensive and loyal to Maxwell, is visibly shaken by the revelation,
    which forces him to question the moral foundations of his former captain’s crusade.
    Picard’s measured but devastating critique—comparing prolonged anger to ‘old leather’—hits
    O’Brien personally, exposing his own unresolved trauma and complicity in the cycle
    of vengeance. The scene pivots from O’Brien’s blind faith in Maxwell to a moment
    of existential reckoning, where Picard’s warning about the ‘damage’ of unchecked
    rage lingers as a direct challenge to O’Brien’s own repressed grief. The confrontation
    leaves O’Brien emotionally unmoored, forcing him to confront whether his loyalty
    to Maxwell is rooted in justice or shared vengeance. The exchange also underscores
    Picard’s strategic precision: he doesn’t just expose Maxwell’s crimes—he weaponizes
    psychological insight to fracture O’Brien’s allegiance, planting the seeds for
    his later defiance of Maxwell’s orders.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e12
  scene_sequence: 15
  sequence_in_scene: 32
  key_dialogue:
  - 'O''BRIEN: He''s a rare one, all right. I count myself lucky, sir -- I''ve served
    with the two finest Captains in Starfleet.'
  - 'PICARD: Within the last hour... Benjamin Maxwell has sent over six hundred of
    them to their deaths.'
  - 'PICARD: I think... when one has been angry for a very long time... one gets used
    to it. Then it becomes comfortable... like old leather. And finally, it is so
    familiar that one can hardly remember feeling any other way. But in the long run,
    we are the ones who are damaged by that kind of anger. We are. Not them.'
