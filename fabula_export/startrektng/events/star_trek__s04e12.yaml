- fabula_uuid: cand_evt_scene_a3dcb51a2fc64522_01
  global_id: null
  title: Picard orders pursuit of Maxwell’s rogue ship
  description: "\n  The *Enterprise* bridge erupts into controlled chaos as Data detects\
    \ the *Phoenix*—now under Benjamin Maxwell’s command—abruptly altering course\
    \ away from its expected trajectory. Picard, already operating under the tension\
    \ of a covert mission to contain Maxwell, immediately recognizes the deviation\
    \ as a critical escalation. His orders come in rapid succession: a course change\
    \ to pursue, repeated hails to Maxwell (which go unanswered), and a demand for\
    \ tactical analysis from Data and Worf. The revelation that the *Phoenix* is now\
    \ heading directly toward a Cardassian vessel—a supply ship bound for a research\
    \ station—deepens the crisis. Macet’s confirmation that the target is non-military\
    \ contradicts Maxwell’s claims of Cardassian rearmament, forcing Picard to confront\
    \ the moral ambiguity of Maxwell’s actions: is this a justified preemptive strike\
    \ or a reckless provocation that could reignite war? The scene culminates in Picard’s\
    \ decision to push the *Enterprise* to its limits (warp nine) and arm phasers,\
    \ a direct confrontation between duty and the ethical gray area of Maxwell’s vendetta.\
    \ Riker’s suggestion to bring Chief O’Brien—Maxwell’s former tactical officer—onto\
    \ the bridge adds a personal layer, hinting at the emotional and psychological\
    \ stakes of the confrontation ahead.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e12
  scene_sequence: 24
  sequence_in_scene: 48
  key_dialogue: &id023
  - 'PICARD: Mister Data, how long before we clear Cardassian space?'
  - 'DATA: At our present speed, three hours and twenty minutes.'
  - 'DATA: Captain... the *Phoenix* is changing course.'
  - 'MACET: What is he doing?!'
  - 'PICARD: ((to Conn)) Ensign, change course to pursue. Mister Worf, hail Captain
    Maxwell.'
  - 'WORF: No response, sir.'
  - 'RIKER: Data, project his new course.'
  - 'DATA: Sir, the *Phoenix* is heading directly for a Cardassian vessel... point-one-two
    light years from our location.'
  - 'MACET: He''ll attack that ship—just as he did the others.'
  - 'PICARD: ((to Macet)) Do you know what that vessel might be?'
  - 'MACET: I imagine it''s a supply ship, headed for the research station in the
    Kelrabi system. The destruction of our primary science outpost has put an added
    burden on the others.'
  - 'WORF: The *Phoenix* still does not respond.'
  - 'PICARD: Ensign, warp eight. Overtake him.'
  - 'DATA: Sir, the *Phoenix* has accelerated to warp nine. We will not be able to
    reach him before he intercepts the Cardassian ship.'
  - 'PICARD: Warp nine, Ensign. Mister Worf, arm phasers... continue hails...'
  - 'RIKER: Captain, Chief O''Brien was Maxwell''s Tactical officer...'
  - 'PICARD: Get him up here.'
