      a Starfleet captain. His words and actions reflect Starfleet’s institutional
      stance on vigilance, deterrence, and strategic restraint.
    power_dynamics: Exercising authority and influence through intelligence, surveillance,
      and the implied military capability of the *Enterprise-D*. Starfleet’s power
      in this event is assertive but measured—Picard’s warning is designed to deter,
      not provoke.
    organizational_goals:
