  - object_uuid: ger_object_52dd2ff7d55c
    description_of_involvement: The Cardassian warship is the aggressor in this ambush,
      its sleek design a stark contrast to the chaos it unleashes. It fires two phaser
      blasts at the *Enterprise*, the first causing minor damage to the secondary
      hull before shields are raised, and the second—a larger, more devastating explosion—that
      rocks the ship and forces Geordi to report the starboard power coupling failure.
      The warship’s actions are unprovoked, a direct violation of the fragile peace
      treaty, and its presence looms over the *Enterprise* like a specter of the past
      conflicts that shaped Picard’s and Worf’s distrust of the Cardassians. The ship’s
      destruction later in the episode (off-screen in this event) is foreshadowed
      by its ruthless efficiency here.
