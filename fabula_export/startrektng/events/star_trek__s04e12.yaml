  title: Picard races to intercept Maxwell’s attack
  description: With the *Phoenix* abruptly altering course toward a Cardassian vessel,
    Picard orders the *Enterprise* to pursue at maximum warp, escalating the crisis
    from diplomatic tension to direct confrontation. Data confirms Maxwell’s ship
    is heading for a Cardassian supply vessel—a non-military target—undermining Maxwell’s
    claims of Cardassian rearmament and forcing Picard to question whether the rogue
    captain’s vendetta is justified or a reckless provocation. Macet’s revelation
    about the target’s civilian nature deepens Picard’s unease, while Worf’s failure
    to hail Maxwell and Riker’s suggestion to bring O’Brien to the bridge (due to
    his past with Maxwell) introduce tactical and personal stakes. The scene shifts
    from diplomacy to urgent action, with Picard arming phasers and pushing the *Enterprise*
    to its limits, signaling a turning point where the mission’s moral ambiguity becomes
    impossible to ignore.
