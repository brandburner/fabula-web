      to Starfleet protocols and moral principles.
    power_dynamics: Exercising authority over the *Enterprise* and its crew, but operating
      under the constraint of diplomatic obligations and the need to avoid war. The
      Federation’s power is also challenged by the rogue actions of Maxwell, which
      threaten to undermine its credibility.
    organizational_goals:
