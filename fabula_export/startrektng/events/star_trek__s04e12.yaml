  title: Picard Confronts Maxwell’s Vengeance
  description: In the Enterprise’s ready room, Picard engages in a tense, high-stakes
    confrontation with Benjamin Maxwell, a rogue Starfleet captain whose unauthorized
    attack on a Cardassian science station threatens to reignite war. Maxwell, initially
    attempting to appeal to Picard’s shared wartime experience, defends his actions
    by claiming the station was a military supply hub—though he admits to lacking
    concrete proof. Picard, unyielding, challenges Maxwell’s lack of documentation
    and his disregard for Starfleet protocol, exposing the ideological divide between
    vengeance and command integrity. The exchange escalates as Picard directly accuses
    Maxwell of being driven by personal grief over the Cardassian deaths of his family,
    forcing Maxwell to confront the emotional core of his vendetta. Though Maxwell
    insists his actions were justified to prevent war, Picard refuses to be swayed,
    ultimately ordering Maxwell to return to his ship under the threat of imprisonment.
    The scene crystallizes Picard’s role as a steward of duty over retribution, while
    Maxwell’s broken defiance foreshadows the cost of his choices and the fragility
    of the peace he sought to protect. The confrontation leaves both men emotionally
    wounded, with Maxwell’s fate—and the truth of his accusations—unresolved but hanging
    in the balance of interstellar diplomacy.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s04_e12
  scene_sequence: 22
  sequence_in_scene: 45
  key_dialogue:
  - |-
    MAXWELL: You must think I've gone mad.
    PICARD: The thought has occurred.
  - |-
    MAXWELL: I know what they're doing. I can smell it. There's no good reason for a science station in the Cuellar System... but it's a hell of a strategic site for a military transport station...
    PICARD: Whatever circumstances you believed you encountered, why didn't you notify Starfleet?
  - |-
    PICARD: ... to avenge their deaths.
    MAXWELL: ... Not true. Not true...
  - |-
    PICARD: We are not going after any more Cardassian ships, Captain Maxwell... you are going to return to your bridge and set a course for Starbase Two-one-one... the Phoenix and the Enterprise will return to Federation space together.
    MAXWELL: I will return to my ship.
