    militia made a sneak attack on an outpost... wiped out close to a hundred civilians.'
  - 'MACET: Then it''s vengeance he''s after.'
  - 'O''BRIEN: ((half-rising)) Captain Maxwell would never -'
  - 'PICARD: Gentlemen, please. Let us avoid speculation, and confine this discussion
    to facts.'
