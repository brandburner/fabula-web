    emotional_state: A cascade from defensive pride to stunned disbelief to creeping
      self-doubt. O’Brien is a man who has built his identity on loyalty and duty,
      and Picard’s words force him to question whether he has been complicit in something
      monstrous. His emotional state is one of *unraveling*—the ‘old leather’ metaphor
      doesn’t just apply to Maxwell; it applies to him, too.
    goals:
    - Defend Maxwell’s honor and justify his actions to Picard (and, implicitly, to
      himself).
    - Avoid confronting the possibility that his own anger toward the Cardassians
      is as destructive as Maxwell’s.
    what_happened: 'O’Brien begins the scene in a state of quiet professionalism,
      his hands moving over the transporter controls with the ease of long practice.
      Picard’s arrival startles him, but his initial deference quickly gives way to
      defensive pride as he speaks of Maxwell—a man he clearly idolizes. His descriptions
      of Maxwell’s stoicism after the loss of his family are laced with admiration,
      but Picard’s probing reveals the cracks: O’Brien’s own trauma (echoed in his
      distrust of Cardassians) makes him an eager accomplice in Maxwell’s narrative.
      The revelation of the mass killings hits him like a physical blow, his body
      language collapsing inward as Picard’s metaphor about ‘old leather’ lands. He
      is left staring at the transporter controls, his reflection a ghost of the man
      who entered the room.'
