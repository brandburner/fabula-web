  object_involvements:
  - object_uuid: ger_object_17de0c106969
    description_of_involvement: 'The emergency signal from the Cuellar System science
      station is the inciting incident that shifts the entire dynamic of the confrontation.
      Mentioned by Macet as proof of the Federation’s violation of the peace treaty,
      the signal—sent moments before the station’s destruction—hangs in the air like
      an unanswerable accusation. Though not physically present on the bridge, its
      existence is a narrative catalyst, forcing Picard to confront the possibility
      of a rogue Starfleet officer. The signal’s role is to introduce a layer of moral
      complexity: is the Federation guilty of aggression, or is this the work of a
      lone actor? Its absence from the scene (it is only described) makes it all the
      more haunting, a ghostly reminder of the cost of war.'
    status_before_event: Transmitted two days prior from the Cuellar System, capturing
      the final moments of the science station before its destruction. The signal
      is stored in Cardassian logs and cited by Macet as evidence.
    status_after_event: The signal’s contents remain unresolved, but its mention lingers
      as a ticking clock. Picard must now investigate its authenticity within the
      one-hour truce, adding urgency to the Enterprise’s mission.
    global_id: ger_object_17de0c106969
  - object_uuid: ger_object_6ecdef60b2de
    description_of_involvement: 'The Enterprise’s bridge viewscreen serves as the
      primary conduit for the high-stakes confrontation between Picard and Macet.
      It displays the *Trager*’s damaged forward section after the phaser exchange,
      then shifts to a live feed of Gul Macet, whose intense gaze and accusatory tone
      dominate the screen. The viewscreen also symbolically frames the power dynamics
      of the exchange: Picard, centered and composed, versus Macet, whose image looms
      large with the weight of his allegations. When Macet’s transmission ends, the
      screen reverts to the *Trager*, now standing down but still a looming threat.
      The viewscreen’s role is both functional—providing visual and auditory communication—and
      narrative, as it visually reinforces the tension and stakes of the negotiation.'
    status_before_event: Active, displaying tactical sensor feeds of the Cardassian
      patrol and the *Trager*’s approach at warp nine. The screen flickers slightly
      as phaser fire is exchanged, then stabilizes as the *Trager* stands down.
    status_after_event: Shows the *Trager* in a state of reduced threat, its forward
      shields disabled and its hull marked by phaser scorch. The screen then cuts
      to a static view of the ship, symbolizing the fragile truce and the looming
      countdown to Macet’s ultimatum.
    global_id: ger_object_6ecdef60b2de
  - object_uuid: ger_object_cd2bc843b9b1
    description_of_involvement: The Enterprise’s phaser banks are the physical instruments
      of Picard’s retaliatory strike against the *Trager*. Under Worf’s targeting
      and Data’s confirmation, they unleash precise orange energy bursts that hammer
      the Cardassian ship’s aft shield generators, causing a cascading power failure
      in the forward shields. The phasers are not used lethally but as a calculated
      show of force, disabling the *Trager* just enough to force Macet into negotiation.
      Their role is both tactical—neutralizing an immediate threat—and diplomatic,
      demonstrating Picard’s willingness to escalate if necessary. The phasers’ impact
      is felt not just in the damage they inflict but in the psychological leverage
      they provide Picard during the subsequent standoff.
    status_before_event: Charged and ready, locked onto the *Trager*’s aft section.
      Worf monitors their targeting systems, awaiting Picard’s order to fire.
    status_after_event: Powered down after the retaliatory strike, but remain on standby
      in case the negotiation fails. Their recent use is a silent reminder of the
      Enterprise’s capability and Picard’s resolve.
    global_id: ger_object_cd2bc843b9b1
  - object_uuid: ger_object_95e6e4a60a7f
    description_of_involvement: 'The *Trager*, a Cardassian warship, is the physical
      embodiment of the threat and the target of Picard’s retaliatory strike. It fires
      first, prompting the Enterprise to respond with phaser fire that cripples its
      aft shield generators and forward shields. The *Trager*’s damage is tactical
