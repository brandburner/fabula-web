  key_dialogue: &id009
  - 'PICARD: Why have you fired on us?'
  - 'MACET: A curious question. In war, one attacks one''s enemies.'
  - 'PICARD: A Federation starship...?'
  - 'MACET: Attacked an unarmed science station. They had barely enough time to send
    an emergency signal... before they were incinerated.'
  - 'PICARD: Gul Macet... the Federation and the Cardassians have struggled too hard
    for peace to abandon it so easily...'
  - 'MACET: We are not the ones who abandoned it, Captain.'
