  key_dialogue:
  - |-
    PICARD: You've spent a good deal of time on the surface, Counselor. How do you suggest we change their minds... ?
    TROI: I'm not sure we can. It means abandoning their fundamental way of life.
  - |-
    PICARD: They've managed to turn a dubious scientific endeavor into dogma... Troi, they have given their humanity away to this genetic manipulation... many of the qualities they breed out—the uncertainty, the self-discovery, the unknown—those are the very qualities that make Human life worth living... at least to me. Would you?
    TROI: I've asked myself that question a lot during the past few days. I don't know. I doubt it.
  - |-
    PICARD: This leader of theirs, Conor, he seems like a reasonable man, doesn't he? ... You admire him.
    TROI: Yes.
    PICARD: Try at least to help him accept the reality of what may happen to his colony. If he makes the right decision, and he's as good a leader as he was 'designed' to be... perhaps the others will follow him.
