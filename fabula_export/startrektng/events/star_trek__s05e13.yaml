      though not explicitly mentioned here, looms in the subtext: it’s the tool Geordi
      used to show her how to communicate, a symbol of the knowledge and independence
      she’s about to lose.'
    status_before_event: Active and humming with residual energy from the crisis—screens
      flicker with post-crisis diagnostics, and the consoles bear the marks of urgent
