- fabula_uuid: act_5c92f1c2a4264944
  number: 4
  summary: The Enterprise positions itself parallel to the stellar core fragment,
    preparing for the critical operation. Picard, Riker, Data, and Worf monitor the
    situation from the bridge, while Geordi and Hannah, now a cohesive team, prepare
    to activate the enhanced tractor beam in Engineering. The tension is palpable
    as they initiate the procedure, diverting massive amounts of power from non-critical
    ship systems. Hannah's theoretical physics, combined with Geordi's adapted VISOR
    technology, allows them to push the tractor beam's emitters far beyond standard
    operating levels. On the bridge, Data reports rising power levels and then, alarmingly,
    the failure of emitter circuits and life support systems on various decks as the
    Enterprise strains under the immense energy demands. Riker orders evacuation procedures
    for affected decks, urging Geordi for more power. Hannah and Geordi, despite the
    ship's critical warnings and flickering lights, continue to increase the pulse
    frequency, determined to achieve the necessary course correction. With seconds
    to spare before ship-wide life support failure, Hannah confirms they have achieved
    the crucial 1.21-degree shift. Geordi rapidly shuts down the tractor beam and
    restores power, saving the Enterprise from catastrophe. Picard hails Conor, informing
    him of their success. While Conor expresses gratitude, Hannah's initial exhilaration
    quickly fades as the reality of returning to her isolated, predetermined life
    sinks in, the joy of triumph replaced by a sense of loss and disillusionment.
