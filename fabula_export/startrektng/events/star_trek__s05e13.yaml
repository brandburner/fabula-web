- fabula_uuid: cand_evt_scene_ad358f94b194f4a7_03
  global_id: null
  title: Conor Defends Colony’s Genetic Design
  description: 'In the Genome Colony courtyard, Conor articulates the colony’s genetically
    engineered society to the *Enterprise* crew, contrasting its predetermined harmony
    with the Federation’s individualistic chaos. His passionate defense—‘I was born
    to lead... I am exactly what I would choose to be’—reveals his deep belief in
    the system, while Benbeck’s elitist outburst (‘beyond normal humans’) exposes
    the colony’s fragility. Geordi’s sharp rebuttal (‘I can see you just fine’) and
    Riker’s challenge (‘Kind of takes some of the fun out of choosing’) force Conor
    to justify the system’s rigidity, culminating in Troi’s emotional alignment with
    him. The exchange underscores the ideological divide: Conor’s leadership style,
    rooted in genetic destiny, clashes with the crew’s values of free will and adaptability,
    setting up the colony’s eventual crisis of identity.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e13
  scene_sequence: 5
  sequence_in_scene: 11
  key_dialogue:
  - 'CONOR: We are not just ''reluctant'', Ms. Troi. It is imperative that we remain.'
  - 'BENBECK: It would be suicide to evacuate. It would destroy everything we''ve
    worked for two centuries to accomplish... We have evolved beyond... beyond normal
    humans.'
  - 'GEORDI: I can see you just fine, sir.'
  - 'CONOR: I have been bred to fill this specific role... we grow up knowing exactly
    what our society needs from us... what we are expected to do. My entire psychological
    makeup tells me that I was born to lead... I am exactly what I would choose to
    be.'
  - 'RIKER: Kind of takes some of the fun out of choosing, doesn''t it?'
  - 'TROI: We will do whatever we can to help you preserve it.'
