      \ EPS levels add to the tension, highlighting the fragility of the *Enterprise*'s\
      \ systems under such extreme demands.\n      "
    status_before_event: Stable and within normal operational ranges, supporting standard
      ship functions.
    status_after_event: Spiking at extreme levels, pushed to the limits by the tractor
      beam's power demands, risking system failure.
    global_id: ger_object_15c542de4ec4
  - object_uuid: ger_object_97960015a863
    description_of_involvement: "\n        The consoles in Engineering and on the\
      \ bridge serve as critical interfaces for the crew, displaying real-time data\
      \ on the tractor beam's power levels, emitter strain, and EPS fluctuations.\
      \ Geordi and Hannah work frantically at these panels, adjusting settings and\
      \ monitoring readings as they push the tractor beam to its limits. The consoles'\
      \ flickering screens and urgent alerts create a sense of high-stakes tension,\
      \ reflecting the crew's desperate efforts to save the colony. Data and Riker\
      \ also rely on bridge consoles to track power levels and issue commands, making\
      \ these objects central to the event's narrative and technical execution.\n\
      \      "
    status_before_event: Functioning normally, displaying standard operational data
      for the *Enterprise*'s systems.
    status_after_event: Overloaded with data and alerts, straining under the extreme
      demands placed on the tractor beam and ship's systems.
    global_id: ger_object_97960015a863
  - object_uuid: ger_object_cf8b149b1227
    description_of_involvement: "\n        The graviton generators operate normally\
      \ throughout the event, providing stable support to the tractor beam despite\
      \ the extreme strain on the ship's systems. Hannah monitors their performance\
      \ closely, confirming that they remain functional even as the emitter circuits\
      \ and other components are pushed to their limits. Their reliability is a small\
