- fabula_uuid: cand_evt_scene_ad358f94b194f4a7_01
  global_id: null
  title: Conor reveals the colony’s eugenics foundation
  description: In the Genome Colony’s courtyard, Conor—charismatic but ideologically
    bound—defends the colony’s genetically engineered society to the *Enterprise*
    away team. His revelation that eight generations of colonists have been selectively
    bred to create a 'perfect' society forces Troi, Riker, and Geordi to confront
    the ethical implications of eugenics. Benbeck, a rigid elder, reinforces the colony’s
    isolationist dogma, dismissing outsiders as inferior, while Conor’s passionate
    justification—framed as an ideal existence—exposes the tension between the colony’s
    self-perceived superiority and its vulnerability to external threats. The exchange
    deepens Troi’s personal connection to Conor, complicating her professional judgment,
    while Geordi’s blunt challenge to Benbeck’s elitism underscores the moral stakes
    of the *Enterprise*’s intervention. The scene pivots from initial curiosity to
    a confrontation with the colony’s core ideology, setting up the crew’s moral dilemma
    over whether to preserve the colony’s engineered society or expose it to the broader
    universe’s values.
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e13
  scene_sequence: 5
  sequence_in_scene: 9
  key_dialogue:
  - 'CONOR: Our ancestors came from Earth to develop the perfect society. They believed
    that through controlled procreation, they could create people without flaws...
    and those people would build a paradise.'
  - 'BENBECK: We have immeasurably extended the potential of humanity—physically,
    psychologically—we have evolved beyond... beyond... GEORDI: Beyond us... BENBECK:
    Frankly, yes.'
  - 'CONOR: I have been bred to fill this specific role... we grow up knowing exactly
    what our society needs from us... what we are expected to do. Think of it another
    way—are there still people in your society who have not discovered who they really
    are or what they''re meant to do with their lives?'
