- fabula_uuid: act_0bd520835261b6f5
  number: 3
  summary: Geordi and Hannah successfully demonstrate their enhanced tractor beam
    technology to Picard and Riker. While not powerful enough on its own, combined
    with structural fortifications for the biosphere, it offers a viable solution
    to save the colony without evacuation. Picard approves the plan, which necessitates
    transporting fifty Starfleet engineering crews to Moab IV for 48 hours to implement
    the upgrades. This decision marks a significant escalation of external presence
    within the isolated society. Simultaneously, Troi confronts Conor, revealing her
    intention to return to the Enterprise permanently and end their relationship.
    She confesses her anger at herself for allowing their connection to develop, fearing
    she could fall in love with him and acknowledging the impossibility of their union
    due to their differing worlds and the colony's genetic principles. Conor, surprisingly,
    seems almost to hope for evacuation as an escape from his duties, highlighting
    the profound impact of their brief affair. Their conversation is interrupted by
    the arrival of Geordi and Hannah, who deliver the news about the required Starfleet
    personnel. Overwhelmed by the "assault of technology, of people," Conor reluctantly
    grants approval for the mass transport. Starfleet officers begin beaming down
    in rapid succession, further eroding the colony's isolation and forcing Conor
    to retreat, visibly struggling with the rapid, irreversible changes unfolding
    around him. The act concludes with the colony's physical salvation seemingly assured,
    but its social and ethical integrity increasingly compromised.
