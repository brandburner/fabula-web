      \ personal cost. Picard's leadership, Riker's resourcefulness, and Geordi's\
      \ technical brilliance all embody Starfleet's values, as they strive to balance\
      \ the Prime Directive with humanitarian intervention. The crew's collective\
      \ effort to save the colony underscores Starfleet's role as a force for good\
      \ in the universe, even in the face of overwhelming odds.\n      "
