  global_id: null
  title: Troi ends relationship with Conor
  description: 'In the quiet of the colony’s courtyard at dawn, Deanna Troi—still
    emotionally raw from their intimacy—formally ends her relationship with Aaron
    Conor, invoking the colony’s genetic constraints as the justification. Their charged
    exchange reveals the deeper truth: their love persists, and Conor’s desperate
    hope for evacuation was a last-ditch attempt to preserve it. The scene crystallizes
    the collision between duty and desire, forcing Troi to confront the cost of her
    choices while exposing Conor’s vulnerability beneath his defiance. The moment
    is interrupted by Geordi and Hannah’s arrival, announcing the imminent deployment
    of Starfleet engineering crews—a development that overwhelms Conor, marking the
    collapse of his resistance to outside intervention. The scene ends with Troi’s
    departure and Conor’s withdrawal, their unresolved emotions hanging in the air
    as the colony’s fate shifts irrevocably toward salvation and change.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e13
  scene_sequence: 13
  sequence_in_scene: 31
  key_dialogue:
  - 'TROI: I''m going back to the ship, Aaron. I''m not going to see you again.'
  - 'CONOR: Why... ?'
  - 'TROI: Because it''s the right thing to do.'
  - 'CONOR: I''m not convinced of that.'
  - 'TROI: You''re angry...'
  - 'CONOR: Yes. I''m angry. With myself. For allowing this to happen.'
  - 'TROI: I could fall in love with you, Aaron. So easily. But we both know the end
    of that story, don''t we? How would Martin feel about introducing half-Betazoid
    DNA into the genetic balance?'
  - 'CONOR: If we have to evacuate, anything is possible...'
  - 'TROI: Listen to yourself. A few days ago, you didn''t even want to talk to us.'
