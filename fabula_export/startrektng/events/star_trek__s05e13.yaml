acts:
- fabula_uuid: act_8a1be54fe4e0b61e
  number: 1
  summary: 'The Enterprise, tracking a massive stellar core fragment, discovers a
    hidden, genetically engineered human colony on Moab IV. Captain Picard attempts
    to warn and evacuate them, but their leader, Aaron Conor, refuses, citing the
    colony''s meticulously designed society and biosphere. Conor reluctantly permits
    an away team—Commander Riker, Geordi La Forge, and Counselor Deanna Troi—to visit.
    On the surface, the team learns the colonists are the product of eight generations
    of selective breeding, designed for physical and psychological perfection and
    complete integration with their environment. A strict elder, Benbeck, vehemently
    opposes any outside influence, fearing the destruction of their two-century-old
    endeavor. Conor, however, is a charismatic leader, bred for his role, who passionately
    defends their way of life. Geordi begins collaborating with colony scientist Hannah
    Bates to find a technical solution to deflect the fragment, while Troi and Conor
    develop a subtle, flirtatious connection. Hannah eventually proposes a radical
    idea: adapting Enterprise technology to create a multiphase tractor beam, but
    this requires her to travel to the starship. Conor, despite Benbeck''s strong
    objections and the colony''s strict isolationist principles, grants Hannah permission,
    marking the first time a colonist has left their world. This decision, driven
    by necessity, begins to fray the colony''s carefully maintained isolation and
    sets the stage for deeper cultural and personal interference. Troi, having formed
    a bond with Conor, returns to the Enterprise, leaving him to grapple with the
    implications of his choice.'
