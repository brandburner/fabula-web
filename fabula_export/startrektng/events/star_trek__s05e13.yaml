  title: Picard confronts Conor’s refusal to evacuate
  description: 'Captain Picard initiates first contact with Aaron Conor, leader of
    the genetically engineered colony on Moab IV, to warn of an impending stellar
    fragment that will devastate the planet. Conor initially dismisses the threat,
    citing his colony’s biosphere’s ability to withstand seismic instability, but
    Data’s technical analysis reveals the fragment’s catastrophic potential. Picard
    insists on evacuation, offering relocation to a safe planet, but Conor refuses,
    exposing his deep-seated distrust of outsiders and the colony’s isolationist ideology.
    The tension escalates as Riker and Picard press for action, with Conor ultimately
    conceding only to allow a small *Enterprise* delegation—including Troi and Geordi—to
    investigate the biosphere’s anomalies. The exchange reveals Picard’s moral dilemma:
    whether to respect the colony’s autonomy or compel their salvation, while Conor’s
    defiance underscores the colony’s fragile dependence on their engineered environment
    and their fear of external influence. The scene sets up the away team’s mission
    and foreshadows the ethical and technical challenges ahead.'
