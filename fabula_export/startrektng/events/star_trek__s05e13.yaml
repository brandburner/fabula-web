  global_id: null
  title: Troi lingers with Conor after Riker leaves
  description: 'After Riker beams away, Troi remains in the Genome Laboratory with
    Conor and Hannah, signaling her growing emotional investment in the colony and
    its leader. The moment is charged with unspoken tension: Troi’s request to stay—framed
    as professional curiosity—reveals her personal interest in Conor, while Conor’s
    immediate, unhesitating approval of her presence suggests a reciprocal attraction.
    Hannah’s fascination with Geordi’s VISOR and her technical expertise set up the
    colony’s scientific capabilities, but the real narrative weight lies in the lingering
    silence between Troi and Conor after Riker’s departure. Their shared glance, unmediated
    by the crew’s presence, hints at an emotional or ethical crossroads for Troi,
    whose Betazoid empathy may force her to confront Conor’s hidden vulnerabilities
    or motives. The scene foreshadows her later confession to Picard about unprofessional
    conduct, as her lingering presence here marks the beginning of her emotional entanglement
    with the colony’s leader.'
