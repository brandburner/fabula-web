      \ adding an emotional undercurrent. The courtyard's open yet enclosed design\
      \ mirrors the colony's psychological state—protected but stifled, on the brink\
      \ of change. The space becomes a stage for Conor's leadership crisis, as he\
      \ grapples with the weight of his decision amid the stares of awestruck and\
      \ uneasy colonists. The courtyard's atmosphere is tense, charged with the anticipation\
      \ of irreversible change.\n      "
