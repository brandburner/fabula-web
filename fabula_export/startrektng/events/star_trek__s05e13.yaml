  key_dialogue: &id017
  - 'CONOR: A nursery rhyme my mother used to read to me has been running round and
    round my mind since this all began...'
  - 'CONOR & TROI: All the King''s horses and all the King''s Men... Couldn''t put
    Humpty together again.'
  - 'CONOR: We are every bit as fragile as an egg and as impossible to reconstruct...
    integrated and refined to such a degree that any fundamental change would lead
    to chaos... Nobody ever talks about how the King feels about being so... helpless...'
  - 'TROI: Aaron, this is wrong...'
  - 'CONOR: Terribly wrong.'
