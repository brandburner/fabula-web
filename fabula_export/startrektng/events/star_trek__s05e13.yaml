  title: Riker challenges colony’s predetermined harmony
  description: 'In the Genome Colony’s courtyard, Conor passionately defends the colony’s
    genetically engineered society as a harmonious alternative to Federation individualism,
    while Riker directly challenges its elimination of free will. Conor’s eloquent
    justification—framed as psychological certainty—contrasts with Benbeck’s rigid
    dogmatism, exposing the colony’s ideological fractures. Troi’s silent alignment
    with Conor underscores the scene’s central tension: whether predetermined harmony
    is preferable to the risks of autonomy. Geordi’s pointed remark about blindness
    subtly critiques the colony’s exclusionary perfectionism, while Conor’s personal
    charisma complicates the away team’s moral stance. The exchange forces the Enterprise
    crew to confront whether their intervention is liberation or interference, with
    Conor’s final appeal to preserve their ‘ideal existence’ leaving the ethical dilemma
    unresolved but sharpened.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e13
  scene_sequence: 5
  sequence_in_scene: 12
  key_dialogue:
  - 'RIKER: Kind of takes some of the fun out of choosing, doesn’t it?'
  - 'CONOR: Not at all. My entire psychological makeup tells me that I was born to
    lead... I am exactly what I would choose to be. Think of it another way—are there
    still people in your society who have not discovered who they really are or what
    they’re meant to do with their lives? They may be in the wrong job... they may
    be writing bad poetry. Even worse, there may be great poets working as laborers,
    never to be discovered. That does not happen here.'
  - 'GEORDI: What ‘function’ would that be?'
  - 'CONOR: He is the interpreter of our founders’ intentions for this society.'
