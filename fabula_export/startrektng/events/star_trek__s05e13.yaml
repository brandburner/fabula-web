      systems. Operating at 170% over standard capacity and later at 390%, the emitters
      begin to show signs of strain, with Hannah warning that they won’t hold for
      long. Their role in the operation is critical, as they are the physical components
      that project the tractor beam’s energy. The emitters’ failure to divert the
      fragment’s trajectory forces the crew to consider a riskier high-frequency pulse,
      highlighting the tension between technological capability and the moral imperative
      to save the colony.
