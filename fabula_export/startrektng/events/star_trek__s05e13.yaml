- fabula_uuid: cand_evt_scene_87868711d4589904_01
  global_id: null
  title: Hannah proposes the tractor beam solution
  description: "\n  In the Genome Laboratory, Hannah and Geordi analyze the catastrophic\
    \ impact of the stellar fragment on the colony’s biosphere, with Hannah calculating\
    \ that the biosphere’s superstructure cannot survive the tectonic shocks. Desperate\
    \ for a solution, Hannah probes Geordi about the *Enterprise*’s energy capabilities,\
    \ leading to her theoretical proposal of a multiphase tractor beam—a radical idea\
    \ that could alter the fragment’s path but requires her immediate departure to\
    \ the ship. The conversation shifts to the courtyard, where Hannah presents the\
    \ plan to Conor and Benbeck, framing it as the colony’s only chance to avoid evacuation.\
    \ Benbeck vehemently opposes the violation of the colony’s isolationist principles,\
    \ but Conor, after a tense internal struggle, reluctantly approves Hannah’s departure,\
    \ marking a pivotal moment in the colony’s history. The scene ends with Hannah,\
    \ Geordi, and Troi beaming up to the *Enterprise*, leaving Conor to grapple with\
    \ the consequences of his decision. This event crystallizes the colony’s survival\
    \ hinging on Starfleet’s intervention while signaling Hannah’s transformation\
    \ from passive observer to active participant in her people’s fate.\n  "
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e13
  scene_sequence: 8
  sequence_in_scene: 18
  key_dialogue: &id011
  - 'HANNAH: The biosphere''s superstructure will never withstand the tectonic shocks.
    The environment would be compromised.'
  - 'GEORDI: We can move a small moon or an asteroid, but a stellar core fragment?
    That''s way too massive for our tractor beam...'
  - 'HANNAH: A wild idea. Purely theoretical.'
  - 'GEORDI: A multiphase tractor beam?'
  - 'HANNAH: When we first spotted the fragment approaching, I came up with the idea...
    but we can''t generate the kind of energy we would need... You can.'
  - 'BENBECK: No.'
  - 'HANNAH: With my theories and their equipment, we might be able to alter the fragment''s
    path -- it''s our only chance to avoid evacuation.'
  - 'CONOR: No one had ever come here... and no one had ever left. Until today. This
    is a date to note in our history books.'
  - 'CONOR: I don''t think they intended us to die, Martin.'
  - 'CONOR: You can go, Hannah.'
