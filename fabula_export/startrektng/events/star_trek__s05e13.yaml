  key_dialogue: &id015
  - 'HANNAH: Well, either we''re going to have to move... or that fragment is...'
  - 'GEORDI: We can move a small moon or an asteroid, but a stellar core fragment?
    That''s way too massive for our tractor beam...'
  - 'HANNAH: A multiphase tractor beam? When we first spotted the fragment approaching,
    I came up with the idea... but we can''t generate the kind of energy we would
    need... You can.'
  - 'BENBECK: No.'
  - 'HANNAH: With my theories and their equipment, we might be able to alter the fragment''s
    path -- it''s our only chance to avoid evacuation.'
  - 'CONOR: No one had ever come here... and no one had ever left. Until today. This
    is a date to note in our history books.'
  - 'BENBECK: This is in direct violation of the intentions of our founders, Aaron...'
  - 'CONOR: I don''t think they intended us to die, Martin.'
  - 'TROI: May I return later?'
  - 'CONOR: I look forward to it.'
