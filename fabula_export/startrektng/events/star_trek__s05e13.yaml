      victims and antagonists in this narrative. The colony’s resistance to Starfleet’s
      warnings forces Picard and Troi to confront the limits of their influence and
      the ethical cost of cultural interference.
    active_representation: Through Troi’s admiration for Conor and the colonists’
      beliefs, and Picard’s disdain for their genetic determinism, the colony is represented
      as a complex moral foil—neither purely heroic nor villainous, but a society
      whose values challenge Starfleet’s own.
    power_dynamics: The colony holds significant power in this moment, as its refusal
      to evacuate forces Starfleet to reconsider its non-interference stance. However,
      its power is also fragile, dependent on the colonists’ unshakable belief in
      their engineered way of life—a belief that Picard and Troi are tasked with either
      respecting or dismantling.
    organizational_goals:
