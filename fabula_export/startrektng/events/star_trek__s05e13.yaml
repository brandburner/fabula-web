  object_involvements:
  - object_uuid: ger_object_15c542de4ec4
    description_of_involvement: "\n        The EPS (Electro-Plasma System) power levels\
      \ are a critical metric in this event, tracked by Data on the bridge and monitored\
      \ by Geordi and Hannah in Engineering. As the crew pushes the tractor beam to\
      \ its limits, the EPS levels spike under the strain, reflecting the ship's engineered\
      \ resilience and the desperate measures being taken. The rising power levels\
      \ underscore the high stakes of the maneuver, as the crew risks catastrophic\
