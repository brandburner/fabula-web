    global_id: ger_object_cf8b149b1227
  - object_uuid: ger_object_ccc723820ac8
    description_of_involvement: "\n        Warp power is a critical energy source\
      \ in this event, rerouted from propulsion and noncritical systems to the tractor\
      \ beam generator by Geordi and Hannah. This redirection is a last-ditch effort\
      \ to increase the beam's power output and alter the fragment's trajectory. The\
      \ decision to tap into warp power reflects the crew's desperation, as they sacrifice\
      \ the ship's primary propulsion system to feed the tractor beam. The rerouting\
      \ of warp power adds to the high-stakes tension, as it further strains the *Enterprise*'s\
      \ systems and underscores the crew's willingness to take extreme risks to save\
      \ the colony.\n      "
    status_before_event: Allocated to propulsion and other standard ship functions,
      supporting the *Enterprise*'s sublight and warp capabilities.
    status_after_event: Rerouted to the tractor beam generator, significantly increasing
      its power output but leaving the ship vulnerable in terms of propulsion.
    global_id: ger_object_ccc723820ac8
  - object_uuid: ger_object_25622e6a6e6c
    description_of_involvement: "\n        The tractor beam is the *Enterprise*'s\
      \ primary tool in this event, projected from the ship and locked onto the stellar\
      \ fragment in a desperate attempt to alter its course. Geordi and Hannah work\
      \ to push it to 390% over standard capacity, rerouting power from life support\
      \ and noncritical systems to feed its energy demands. The beam pulses with visible\
      \ energy, straining against the fragment's massive inertia. Its failure to change\
      \ the fragment's trajectory forces the crew to confront the brutal reality that\
      \ their technology may not be enough to save the colony, underscoring the event's\
      \ thematic tension between human ingenuity and cosmic indifference.\n      "
    status_before_event: Operational at standard capacity, locked onto the fragment
      but unable to alter its course.
    status_after_event: Pushed to 390% over standard capacity, straining emitter circuits
      and graviton generators to the point of potential failure, yet still unable
      to divert the fragment.
    global_id: ger_object_25622e6a6e6c
  - object_uuid: ger_object_19982c3d3b7e
    description_of_involvement: "\n        Life support systems are sacrificed in\
      \ this event to divert power to the tractor beam, as Riker orders Data to reduce\
      \ them to minimum requirements. This drastic measure reflects the crew's willingness\
      \ to endure personal discomfort and risk in the name of saving the colony. The\
      \ reduction of life support adds to the high-stakes tension, as it highlights\
      \ the crew's commitment to the mission and the extreme lengths they are willing\
