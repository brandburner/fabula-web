- fabula_uuid: cand_evt_scene_87868711d4589904_02
  global_id: null
  title: Conor approves Hannah’s departure
  description: 'In the Genome Laboratory, Hannah and Geordi analyze the impending
    stellar fragment’s catastrophic impact on the colony’s biosphere, revealing the
    colony’s inability to withstand the tectonic shocks. Hannah proposes a radical
    solution—a multiphase tractor beam powered by the *Enterprise*’s energy reserves—but
    this requires her immediate departure to the ship. When the group relays the plan
    to Conor and Benbeck in the courtyard, Benbeck vehemently opposes the idea, invoking
    the colony’s foundational isolationist principles. Conor, torn between tradition
    and survival, ultimately concedes, approving Hannah’s departure despite Benbeck’s
    warnings about genetic and societal imbalance. The decision marks a seismic shift:
    the colony’s survival now hinges on external intervention, and Hannah’s departure
    symbolizes the first breach in the colony’s rigid dogma. The moment is charged
    with subtext—Conor’s reluctant approval reflects his internal conflict between
    leadership and preservation, while Troi’s silent exchange with him underscores
    the emotional weight of the colony’s impending transformation. The scene ends
    with Hannah, Geordi, and Troi beaming away, leaving Conor and Benbeck in a fractured
    standoff, setting the stage for the colony’s irreversible change.'
  episode_uuid: ep_sea_ser_star_trek_the_next_generation_s05_e13
  scene_sequence: 8
  sequence_in_scene: 19
  key_dialogue: &id013
  - 'HANNAH: Your ship... what kind of energy output is it capable of generating?'
  - 'GEORDI: We have a matter/antimatter warp reaction system, the most powerful in
    Starfleet... normally kicks plasma up into the terawatt range... what are you
    thinking about?'
  - 'HANNAH: Well, either we''re going to have to move... or that fragment is...'
  - 'GEORDI: We can move a small moon or an asteroid, but a stellar core fragment?
    That''s way too massive for our tractor beam...'
  - 'HANNAH: A multiphase tractor beam? When we first spotted the fragment approaching,
    I came up with the idea... but we can''t generate the kind of energy we would
    need... You can.'
  - 'BENBECK: No.'
  - 'HANNAH: With my theories and their equipment, we might be able to alter the fragment''s
    path -- it''s our only chance to avoid evacuation.'
  - 'CONOR: No one had ever come here... and no one had ever left. Until today. This
    is a date to note in our history books.'
  - 'BENBECK: This is in direct violation of the intentions of our founders, Aaron...'
  - 'CONOR: I don''t think they intended us to die, Martin.'
  - 'BENBECK: Her absence will create an additional imbalance...'
  - 'CONOR: Temporarily. The circumstances require us to be flexible.'
  - 'CONOR: You can go, Hannah.'
