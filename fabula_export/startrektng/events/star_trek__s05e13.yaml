  title: Conor’s Praise and Hannah’s Reality
  description: 'In the aftermath of the stellar fragment crisis, Conor publicly acknowledges
    Hannah’s pivotal role in saving the colony, framing her actions as a historic
    achievement. His praise—delivered via monitor—elevates her status among the colonists,
    offering a fleeting moment of recognition and agency. However, the moment’s triumph
    is immediately undercut by the stark reality of her return to the colony, where
    her newfound confidence and independence will be stripped away. Hannah’s exhilaration
    fades as Conor’s words remind her of the constraints awaiting her: a society that
    values control over individuality, and a predetermined life she no longer wishes
    to accept. The scene underscores the tension between personal aspiration and systemic
    oppression, crystallizing Hannah’s internal conflict and foreshadowing her eventual
    defiance. The emotional shift—from elation to resignation—serves as a turning
    point, marking the end of Act Four and setting up her imminent rebellion against
    the colony’s rigid structures.'
