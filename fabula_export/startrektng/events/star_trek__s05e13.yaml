    description_of_involvement: The Genome Colony’s presence looms large in this scene,
      even though its members are physically absent. The colony’s genetic engineering
      and its residents’ refusal to evacuate are the catalysts for Picard and Troi’s
      moral dilemma. Their way of life—built on the premise that genetic perfection
