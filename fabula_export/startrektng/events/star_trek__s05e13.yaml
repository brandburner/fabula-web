      and the isolationist faction.
    - To ensure the colony's survival, even if it requires breaking tradition and
      accepting external intervention, as argued by Conor and Hannah.
    influence_mechanisms:
    - Through its leadership (Conor's decision-making authority and Benbeck's ideological
