- fabula_uuid: cand_evt_scene_171b7ae8fc4126cf_02
  global_id: null
  title: Tractor beam fails to alter fragment
  description: "\n  In a high-stakes technical collaboration, Geordi La Forge and\
    \ Hannah Bates work in Engineering to reroute power from non-critical systems\
    \ to the Enterprise’s tractor beam, attempting to alter the trajectory of a deadly\
    \ stellar fragment. The scene opens with Picard’s log establishing the urgency\
    \ of the situation—gravitational effects are already impacting Moab IV, and the\
    \ fragment’s trajectory must be adjusted by 1.2 degrees to ensure the colony’s\
    \ survival. Geordi and Hannah exchange a brief, charged moment of camaraderie\
    \ before engaging the tractor beam, their professionalism masking the tension\
    \ of the moment. As they push the system beyond standard limits—emitter circuits\
    \ operating at 170% over standard, then 390%—the beam locks onto the fragment,\
    \ but its trajectory remains unchanged. Geordi insists on increasing the pulse\
    \ frequency despite Hannah’s warning that the emitter circuits won’t hold. The\
    \ failure of the tractor beam to alter the fragment’s course sets up the next\
    \ critical decision: a dangerous high-frequency pulse that risks catastrophic\
    \ emitter failure. The scene underscores the crew’s moral dilemma—technological\
    \ limits may doom the colony they swore to save—and highlights the growing trust\
    \ and collaboration between Geordi and Hannah, whose shared determination humanizes\
    \ the high-pressure environment. The moment also foreshadows the ethical and technical\
    \ challenges that will define the colony’s fate.\n  "
