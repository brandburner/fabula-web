  title: Enterprise diverts fragment with tractor beam
  description: "\n  The Enterprise executes a high-stakes maneuver to divert a stellar\
    \ fragment threatening the Moab IV colony. Picard orders the ship within tractor\
    \ beam range, while Geordi La Forge and Hannah Bates work in Engineering to reroute\
    \ power and stabilize the beam. The crew shuts down noncritical systems to maximize\
    \ energy output, with Data increasing EPS levels and Riker reducing life support\
    \ to minimum requirements. Despite the tractor beam reaching 390% over standard\
    \ capacity, the fragment's course remains unchanged, forcing Geordi to propose\
    \ increasing pulse frequency—a risky move that could overload the emitter circuits.\
    \ The scene underscores the crew's technical ingenuity and their moral commitment\
    \ to saving the colony, even as the operation teeters on failure. The tension\
    \ between Starfleet's advanced technology and the colony's fragile isolationism\
    \ becomes palpable, with Hannah's growing confidence in Geordi's expertise contrasting\
    \ with the colony's ingrained distrust of outside intervention.\n  "
