- fabula_uuid: ger_location_7ef910a7dc7c
  global_id: ger_location_7ef910a7dc7c
  canonical_name: Neutrino Probe Crater (Galorndon Surface)
  description: A shallow, windswept crater on the Galorndon surface centered on a
    neutrino beacon/probe. The bowl is wind-scoured and pumice-gray, its jagged rim
    smeared with storm-slick dust; a neutrino probe juts from loosened soil, its casing
    singed and scuffed beneath thinning sleet while the beacon pulses an eerie, clinical
    glow. Ozone, burnt circuitry, and the metallic hiss of emergency power mingle
    in the air as tricorder chirps and tactical work compress sound into a cramped
    locus. The site serves as both discovery/workshop — where quick hands jury‑rig
    circuitry — and the exposed locus of a high‑risk transport and diplomatic resolution,
    where wounded bodies, fragile trust, and decisions about the Enterprise's trajectory
    converge.
  location_type: Planetary Surface Crater
