  global_id: ger_location_4d0a7f237ca5
  canonical_name: Geophysical Laboratory
  description: Stale mineral dust and the low hum of consoles hang in a crowded geophysical
    laboratory where cabinets of rock samples, stratigraphic maps, and seismic readouts
    press against narrow aisles. Screens glow with topographic rendering while tactile
    consoles blink with survey telemetry; the room smells faintly of metal and solvent.
    Voices ricochet off concrete walls as command and crew negotiate roles, turning
    this technical workspace into an arena where authority, doubt, and recruitment
    collide under fluorescent light.
