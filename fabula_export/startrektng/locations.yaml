- fabula_uuid: ger_location_2b55917e8aaa
  global_id: ger_location_2b55917e8aaa
  canonical_name: USS Jenolen
  description: The USS Jenolen, a 23rd-century transport starship, is depicted in
    two critical moments of catastrophic failure during its orbit above the Dyson
    Sphere portal. In the first instance, the ship holds orbit while Scott and Geordi
    monitor the portal on glowing consoles, engaging in a tense debate over a risky
    rescue plan. Sparks fly from failing panels as the vessel begins to shudder violently,
    engines groaning in distress. In the second instance, the bridge erupts in flames
    and sparks, with Scott desperately gripping failing controls amid thunderous alarms
    and buckling deck plates. The ship's destruction by the USS Enterprise's torpedoes
    clears the escape path, leaving behind echoes of its 23rd-century resilience in
    the 24th-century void. The vessel's interior is characterized by erratic lighting,
    thickening smoke, and the acrid scent of ozone, reflecting its final moments of
    struggle against the Dyson Sphere's stresses.
  location_type: Starship Interior
