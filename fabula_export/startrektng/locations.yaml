- fabula_uuid: ger_location_803a75711b0a
  global_id: ger_location_803a75711b0a
  canonical_name: Hekaras Corridor
  description: Hekaras Corridor spans over 12 light-years through a treacherous expanse
    of space saturated with intense tetryon fields. These fields scramble warp fields
    and cripple sensors, confining ships to a single narrow path—the only viable route
    for faster-than-light travel. The USS Fleming vanished while charting this corridor,
    and the Enterprise later encountered a debris field emitting verteron particles
    that triggered a crippling pulse, causing warp failure, shield collapse, and subspace
    disruption. The region is marked by latent danger, subspace rifts, and the risk
    of vanishing vessels, demanding precise navigation and technological resilience.
  location_type: Hazardous Space Passageway
