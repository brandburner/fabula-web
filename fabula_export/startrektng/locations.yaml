- fabula_uuid: ger_location_c5bdb558ede0
  global_id: ger_location_c5bdb558ede0
  canonical_name: Behind the Bell Captain's Stand (Royale Lobby)
  description: 'A cramped rear alcove directly behind the bell captain’s stand at
    the Royale’s front desk: a narrow concealment formed by the desk’s service counter
    and a low stack of hotel forms. Fluorescent light spills across a scuffed tile
    floor while the hum of the lobby presses around the space. The bellboy slides
    open a shallow drawer here to arm himself, hands brushing paper and brass; the
    spot smells faintly of polish and cigarette smoke, and the close quarters amplify
    whispered fear, desperate resolve, and the mechanical crackle of a dying comm
    lifeline.'
  location_type: Hotel Front Desk Alcove
