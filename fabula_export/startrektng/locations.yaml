- fabula_uuid: ger_location_6a7277276214
  global_id: ger_location_6a7277276214
  canonical_name: Cerberus II
  description: Cerberus II looms as a remote alien planet, shrouded in mystery and
    scientific enigma. It houses an experimental rejuvenation therapy of profound
    consequence—capable of reversing age and restoring youth rapidly. The planet's
    exotic and perilous environment serves as the birthplace of this radical medical
    intervention, infusing Cerberus II with an aura of both hope and hazard. This
    world, distant and largely unseen, becomes a silent catalyst for deep personal
    and strategic ruptures as its therapy transforms Admiral Jameson, fueling ambition
    but fracturing trust. Cerberus II embodies the hidden frontiers of medical science
    and the ethical tremors rippling through those who wield its power.
  location_type: Planet
