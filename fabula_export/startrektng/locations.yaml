  canonical_name: Holodeck — Tropical Beach (Night)
  description: 'A staged tropical shoreline generated by the holodeck: warm sand yielding
    underfoot, waves sighing and throwing white foam beneath a full amber moon, and
    a warm, salt‑and‑coconut breeze that brushes skin. Low tables hold playful coconut
    drinks while a hired gypsy violinist threads plaintive melody through the air.
    The simulation cultivates intimacy and playful romance, then snaps into embarrassment
    when the program is ended and intrusive music lingers. The environment functions
    as an engineered private refuge that both invites connection and exposes Geordi’s
    acute social vulnerability.'
