- fabula_uuid: ger_location_430205db805e
  global_id: ger_location_430205db805e
  canonical_name: Fifteen-Sector Threat Radius (Federation)
  description: 'A calculated swath of Federation-controlled star systems stretching
    across fifteen contiguous sectors, invoked as a cold metric of impending danger.
    Mentioned by the wounded Romulan Setal in the Observation Lounge, the radius reads
    like a battleground on a map: tactical overlays flare, faces harden, and command
    choices compress into urgent logistics. It functions less as terrain and more
    as a juridical-visual instrument—an invisible ring that redraws priorities, ushers
    ships into motion, and converts diplomatic uncertainty into a looming timetable
    for war.'
  location_type: Strategic Threat Radius (Interstellar Region)
  parent_location_uuid: ger_location_8430bb92765f
