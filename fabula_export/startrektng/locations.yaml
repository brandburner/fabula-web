  global_id: ger_location_719dc57f2ff8
  canonical_name: Alliance Headquarters (Turkana IV)
  description: Fortified Alliance Headquarters anchors Turkana IV's underground city,
    its fusion source humming with raw power that fuels defensive systems—force fields,
    proximity alarms, and automated sentries. Ishara traces its position on schematics
    displayed at the Enterprise science station, noting how each gang headquarters
    relies on these volatile reactors for survival amid derelict tunnels and rival
    incursions. Shadows and echoes define the space, where footsteps trigger ambushes
    and loyalty fractures under siege.
  location_type: Underground Gang Headquarters
