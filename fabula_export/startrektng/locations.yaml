  global_id: ger_location_7c095e2e2ab5
  canonical_name: Ravine (Alternate Route)
  description: Narrow ravine terrain through which Picard and Beverly attempt to evade
    Prytt troopers by taking a winding detour. The path is rugged, with jagged rocks
    and sparse cover, and demands backtracking that delays their dash to the border
    two kilometers east behind a forcefield. Picard initially rejects the route due
    to the backtracking required, but it remains a critical evasion point in their
    journey. The ravine's exposed nature forces silent coordination and trust between
    the pair, with their neural link sharpening split-second decisions. Dust hangs
    in the daylight air, and the terrain offers scant cover from Prytt troopers patrolling
    nearby ridges.
