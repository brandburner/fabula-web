  canonical_name: Kes-Prytt Border Zone (Prytt Side)
  description: |-
    The contested planetary border between Prytt and Kes territories, marked by an invisible forcefield with flanking signs and stanchions. This fraught frontier serves as a critical escape route for fugitives fleeing Prytt control into Kes sanctuary. The border is heavily patrolled and secured by troopers, with diplomatic tensions and factional divides creating a volatile atmosphere. Key narrative moments include:
      - Mauric's secret instructions directing Picard and Crusher to this location via map
      - Riker's wary observation of the border's guarded checkpoints and shadowed trails
      - Picard and Beverly's desperate sprint across the open ground, with Beverly using her tricorder to destabilize the forcefield
      - The dramatic moment where Beverly thrusts Picard through the flickering barrier to Kes-side safety while being tackled by Prytt troopers
      - Picard checking his tricorder in a ravine and finding the border two kilometers east, their path to escape sealed by a forcefield, with proximity tormenting them during Prytt patrol evasion
      The border's perils are amplified by diplomatic breakdowns and the high-stakes nature of escape attempts across this factional divide.
  location_type: Planetary Border
  parent_location_uuid: null
