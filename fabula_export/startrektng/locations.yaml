  canonical_name: Garvin’s Home Stairwell (Lab-Living Quarters Link)
  description: Indoor vertical passage in Garvin’s home on Barkon Four, connecting
    the makeshift laboratory (where Data works) to the upper floor where Garvin, Gia’s
    bedridden father, rests. The stairwell’s narrow, enclosed design and echoing footsteps
    underscore the household’s tension between illness, suspicion, and scientific
    intervention, with Gia’s repeated ascents/descents symbolizing her emotional and
    physical burden.
  location_type: Residential Stairwell
