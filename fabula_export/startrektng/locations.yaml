  global_id: ger_location_d04addb53eb0
  canonical_name: Class M Planets, Hromi Cluster
  description: 'Charted but unvisited, the Class M planets in the Hromi Cluster register
    as pale schematic blips on tactical displays — habitable worlds Data flags as
    plausible Gatherer encampment sites. Their surfaces remain unknown, offering the
    promise of shelter and the menace of concealment. The cluster compresses diplomatic
    uncertainty into urgent operational choice: coordinates harden into potential
    battlegrounds, anonymity breeds tactical risk, and the crew feels a protective
    pressure to intercept or secure these worlds before their secrets become dangers.
    The cluster functions as destination, threat vector, and moral pivot that reframes
    the mission.'
