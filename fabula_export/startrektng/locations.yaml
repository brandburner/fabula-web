  description: The Central Area (Residential Pods) anchors Melona Colony's layout
    in a sunlit valley, positioned amid emerging residential pods. Carmen designates
    it for the school and arts center, envisioning a hub for education and culture.
    Riker and she pore over plans here, their flirtatious exchange highlighting dreams
    of rooted community life amid construction scaffolds and open earth, ready to
    foster gatherings once built.
