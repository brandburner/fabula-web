  global_id: ger_location_7df9e12ac57c
  canonical_name: Troi's Quarters
  description: Deanna Troi's private quarters on the USS Enterprise-D, a multifunctional
    space serving as both a personal refuge and a site of psychological distress.
    The quarters include a bedroom (where Troi rests after a hallucination involving
    her mirror reflection, examined by Beverly Crusher with a tricorder) and a washroom
    (where she later screams in terror at her alien-like reflection, prompting Worf
    to override the lock). The dimly lit, enclosed space amplifies her vulnerability,
    culminating in a Paxan energy pulse enveloping her head while she lies unconscious.
    Key interactions occur here with Beverly Crusher, Worf, Picard, Geordi La Forge,
    and Riker, tying the location to multiple critical events in the episode 'Clues'.
