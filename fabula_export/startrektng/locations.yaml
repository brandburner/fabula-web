  description: A lonely expanse of void measured from the ship's starboard nacelle,
    positioned precisely two kilometers away and serving as a calculated dumping ground
    for hazardous material. Cold starlight skims the silhouette of the nacelle while
    transporter coordinates lock onto an empty pocket of space; there is no bulkhead,
    only vacuum, faint thruster plumes, and the distant electrical whisper of the
    ship's fields. Functionally sterile and intentionally remote, the site absorbs
    destructive force harmlessly away from crewed decks, converting imminent danger
    into controlled detonation and offering tense technical reprieve amid the clangor
    of shipboard emergency.
  location_type: Starship Exterior — Nacelle Vicinity
