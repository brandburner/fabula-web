  canonical_name: Tertiary Subspace Domain
  description: A remote pocket within subspace's infinite domains pulses with tetryon
    emissions that tear open rifts aboard the Enterprise, starting in Cargo Bay Four.
    Aliens abduct crew members like Riker here for their experiments, pulling victims
    into this hidden alien workspace. Riker volunteers to enter, carrying a homing
    device for a graviton pulse counterattack, as the crew debates neuro-stimulant
    risks and return uncertainties amid the domain's lethal pull.
  location_type: Subspace Domain
