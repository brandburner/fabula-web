- fabula_uuid: ger_location_574b1404fd90
  global_id: ger_location_574b1404fd90
  canonical_name: FGC-47 Nebula
  description: A hazardous interstellar nebula characterized by swirling red clouds
    of gas and dust enveloping the USS Enterprise, with a neutron star at its core.
    The nebula's dense energy strands form intricate lattices resembling spider webs
    or seaweed fields, triggering tremors, velocity drops (up to 2.4%), helium and
    trionium spikes, and hull stress. These strands trap the ship, blocking escape
    and birthing a sentient energy being (Isabella) that infiltrates the Enterprise
    undetected. The nebula's retreat marks the crew's liberation from Isabella's influence,
    symbolizing both cosmic danger and emotional resolution.
  location_type: Nebula
