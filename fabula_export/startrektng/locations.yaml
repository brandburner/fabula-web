- fabula_uuid: ger_location_f02600eb3cf3
  global_id: ger_location_f02600eb3cf3
  canonical_name: Uruk
  description: Uruk appears in Picard's recitation of the Epic of Gilgamesh as the
    ancient city King Gilgamesh rules. Enkidu enters from the wilderness, clashes
    with Gilgamesh, then forges a deep friendship marked by shared battles and grief.
    Towering walls enclose streets alive with royal power and mortal trials. Picard
    invokes this setting to mirror his bond with Dathon—strangers turned allies through
    peril—amid the night clearing's tense hush, as Dathon weakens and dies.
  location_type: Ancient Mesopotamian City-State
