  global_id: ger_location_ad5baedbea61
  canonical_name: Bajor
  description: Bajor serves as the homeworld of the Bajoran people, a planet they
    lost to Cardassian occupation, which displaced much of its population into refugee
    camps. This brutal history breeds deep suffering and sparks militant resistance,
    as Admiral Kennelly notes when discussing Orta's terrorist splinter group. The
    legacy of exile frames Bajor as a symbol of unresolved injustice, driving demands
    for recognition amid Starfleet's covert interventions.
  location_type: Inhabited Planet
