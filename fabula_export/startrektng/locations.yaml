  canonical_name: Geordi La Forge's Shuttlecraft
  description: Geordi La Forge travels alone through space in the confines of his
    shuttlecraft, music filling the cabin as he converses casually with the computer.
    The intimate space fosters a sense of relaxed isolation during routine transit.
    Troi draws out this memory to shatter his false Risa recollections, exposing it
    as the authentic prelude to Romulan abduction—his vulnerability stark amid the
    quiet routine.
  location_type: Starfleet Shuttlecraft Interior
