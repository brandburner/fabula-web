  canonical_name: Beta Kupsic
  description: 'Stars rearrange into a named grid as the ship slips into Beta Kupsic:
    an abstract stellar locus felt more in console pings and course vectors than in
    any visible planet. The bridge tightens into efficient motion; a terse navigational
    tone cuts the Holodeck’s pastoral quiet and drags command back into crisis. Beta
    Kupsic functions as a procedural hinge — a mapped destination that converts intention
    into trajectory, an impersonal cosmic address that instantly alters mood, duty,
    and the crew’s emotional horizon.'
