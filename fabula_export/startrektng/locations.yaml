  canonical_name: Beta Moon's Limb
  description: Crew detects the unidentified vessel bursting from this shadowed horizon
    edge as the shuttle skims the ionosphere. The limb hides the threat until Worf's
    scan reveals it, phasers charging amid tense silence. Riker reinforces shields;
    Picard demands clearance. This celestial rim turns diplomatic transit into evasion,
    embodying sudden peril in open space.
