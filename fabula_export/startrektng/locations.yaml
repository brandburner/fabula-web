- fabula_uuid: ger_location_48e115b51019
  global_id: ger_location_48e115b51019
  canonical_name: Klingon Home World
  description: 'A single‑continent, storm‑lashed Klingon planet dominated by a fortress‑city
    and the towering Great Hall that scars the skyline. Wind rakes across granite
    ramparts; lightning punctures a charcoal sky while rain and ash sting exposed
    faces. Spartan, defensive architecture—bastions, yawning plazas, and ceremonial
    steps—frames public rituals and makes politics theatrical and dangerous. The atmosphere
    presses on skin and spirit: cold salt on stone, the tang of ozone, and the constant
    howl of weather that sharpens honor into risk and foreshadows humiliation and
    violence.'
  location_type: Planetary Capital (Fortress‑City)
