  global_id: ger_location_737bbc13017e
  canonical_name: Gowron's Ship (In Orbit)
  description: Gowron's Klingon ship dominates the orbital view above Qo'noS, its
    angular hull cutting through the starfield while the USS Enterprise lingers in
    the distant background. Crews track the tense standoff from both vessels as the
    High Council's fracture erupts into civil war preparations. Gowron's loyalists
