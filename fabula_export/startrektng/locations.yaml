  global_id: ger_location_b2e59239f9a9
  canonical_name: Uxbridge House (Rana IV)
  description: 'The Uxbridge family home on Rana IV considered as a single physical
    location across scenes and narrative states: exterior lawn/stoop and adjacent
    interior spaces (porch lawn where Picard and Worf first materialize) as well as
    the later scene in which the reconstructed house is vaporized into a crater. This
    consolidated entry records both the intact domestic threshold (neighborly gestures,
    tea service, yard work) and the later destroyed structure (smoking crater, displaced
    artifacts) as temporally distinct states of the same canonical place, used to
    anchor related events.'
  location_type: Colonist Private Residence
