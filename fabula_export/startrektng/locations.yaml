  global_id: ger_location_8f57d16f6192
  canonical_name: Gemaris V
  description: Gemaris V, a cloud-shrouded inhabited planet, hosts two weeks of grueling
    trade negotiations between the fractious Gemarians and Dachlyds, mediated by Captain
    Picard. The planet's oppressive atmosphere and thick clouds amplify tension and
    isolation during the endless talks, leaving Picard drained and emotionally hollow
    upon the Enterprise's departure. The surface serves as a diplomatic battleground,
    where Picard's exhaustion foreshadows his deeper unraveling. The Enterprise orbits
    above during the mediation, underscoring the high-stakes nature of the dispute
    and the toll of command.
  location_type: Inhabited Planet
