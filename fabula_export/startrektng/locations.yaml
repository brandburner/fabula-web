  global_id: ger_location_42cd2fc820cc
  canonical_name: Upstage Left Turbolift
  description: Positioned at upstage left off the Enterprise's main bridge, this turbolift
    offers swift vertical transit to lower decks. Data enters it right after reciting
    Picard's voice code at superhuman speed and triggering the cascade sequence, which
    locks the crew out of all systems. The doors hiss shut behind him, the car humming
    as it carries the android away—his calculated exit leaves Picard and the bridge
    officers staring in stunned silence amid flashing red alerts, underscoring their
    sudden powerlessness.
  location_type: Starship Turbolift
