- fabula_uuid: ger_location_e81aa1482f70
  global_id: ger_location_e81aa1482f70
  canonical_name: Experimental Shuttle (Metaphasic Shield Test, Inside Star's Corona)
  description: 'A cramped experimental shuttle used for testing metaphasic shielding
    technology during a high-risk mission into a star''s blazing corona. The shuttle''s
    interior features flickering consoles displaying stellar data, a viewport framing
    the sun''s raging plasma, and reinforced hulls resisting extreme radiation and
    plasma storms. The space serves as a scientific research vessel piloted by different
    crew members (Jo''Bril and Beverly Crusher) during separate but thematically linked
    missions in the same episode (''Suspicions''). In both cases, the shuttle''s systems
    are pushed to their limits: in Jo''Bril''s mission, baryon particles flood the
    cabin, causing system overload and collapse; in Beverly''s mission, the unproven
    metaphasic field is tested under extreme solar interference, isolating the shuttle
    from the *Enterprise*. The shuttle''s design and purpose are identical, differing
    only in the pilot and specific mission parameters.'
  location_type: Experimental Shuttlecraft Cabin
  parent_location_uuid: null
