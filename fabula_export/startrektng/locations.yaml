  canonical_name: De Laure Belt
  description: A sprawling astrophysical belt that encircles Tau Cygna Five in a sickly,
    invisible halo of hyperonic radiation. Sensors register relentless particle fluxes
    and shimmering interference that shred protective fields and poison life-support
    thresholds; the belt reads as an invisible gauntlet, lethal to unshielded humans
    and treacherous for transport. Silence hangs on viewscreens as instruments cough
    out garbled data, and command decisions harden into rescue gambits. Functionally,
    the belt converts diplomatic urgency into an operational nightmare, blocking evacuation
    routes and forcing ships to weigh lives against radiation and time.
