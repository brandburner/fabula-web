  global_id: ger_location_610ec3e84e74
  canonical_name: Station Nigala-Four
  description: 'The bridge tightens as a single navigation order resets the ship''s
    focus: Station Nigala-Four. The name snaps across the helm, converting Q''s absurd
    celebration into brisk, procedural motion. Presented in the scene solely as a
    plotted destination, the station functions as a distant orbital waypoint — a pragmatic
    locus for resupply, sensors, or bureaucracy — that yanks the crew from emotional
    residue back into duty. Its invocation leaves Picard cautious and the Enterprise
    steering toward a routine harbor after crisis.'
