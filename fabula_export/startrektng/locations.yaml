  description: 'The Selcundi Drema System: a volatile Selcundi star system approached
    by the U.S.S. Enterprise in TNG S2E15 "Pen Pals." The system is ringed by primordial
    gas, shows anomalous spectrographic signatures (Ico‑spectrogram anomalies / dilithium–traker
    correlations) and contains the named world Drema Four. It appears across bridge
    and laboratory scenes as both an immediate navigation hazard (primordial gas,
    unstable proto-worlds) and as the clinical object of geophysical analysis (lab
    PADD telemetry, spectrogram readouts), provoking technical caution and ethical
    decisions around the Prime Directive.'
