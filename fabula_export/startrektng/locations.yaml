  episode_count: 0
- fabula_uuid: ger_location_bc060439b04a
  global_id: ger_location_bc060439b04a
  canonical_name: Iconian Gateway — Desert City (Projected View)
  description: 'A distant desert city is visible only as a projection through an Iconian
    aperture: rippling ochre/pale dunes stretch under a hard sky and heat-haze warps
    the horizon where a low, clustered city of spires and low walls glints like a
    mirage. The image is carried on a spinning green portal framed by humming alien
    machinery; a single track and wind-lifted sand suggest reachability, but the sight
    remains fleeting and synthetic—at once revelation and tactical risk, proof the
    gateways link to habitable worlds while remaining unreachable except via the Iconian
    system.'
  location_type: Planet Surface (Gateway Vista)
  parent_location_uuid: null
  season_appearances:
