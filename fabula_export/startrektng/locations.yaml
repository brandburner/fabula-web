  global_id: ger_location_3fad403fd902
  canonical_name: USS Yamato Aft Station
  description: The Yamato's aft station looms as a dimly lit tactical nexus at the
    rear of the bridge, its control panels flickering with intermittent power surges
    that cast jagged shadows across abandoned consoles. Designed for covert monitoring
    and reserve command functions, this compact space now reeks of ionized air and
    the metallic tang of inactive systems. The lack of crew manifests in drifting
    padds still magnetized to stations and chairs askew from hurried evacuation. Worf's
    tactical brilliance identifies it as both a point of vulnerability for surprise
    assault and the perfect hidden vantage—control interfaces still primed for reactivation,
    sensor blind spots calibrated for bridge surveillance. Its emptiness pulses unnervingly
    beneath standard lighting, a nerve center reduced to silenced alarms and frozen
    tactical readouts.
