  global_id: ger_location_c220f7553916
  canonical_name: New Gaul
  description: New Gaul anchors Miranda Vigo's birthplace and the site of her brief
    romantic encounter with Jean-Luc Picard decades earlier. Picard invokes the planet
    in urgent Bridge orders to Data, tasking him to scour Federation records there
    for clues to Jason Vigo's origins. This distant world pulls Picard's personal
    history into the crisis sparked by Daimon Bok's threat to kill the young man claiming
    sonship, blending past intimacy with present peril.
  location_type: Inhabited Planet
