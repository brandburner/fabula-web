  canonical_name: Norkan Campaign
  description: A planetary-scale theater of violence and memory, the Norkan Campaign
    names the scorched districts and shattered outposts on Jarok’s world where a ‘massacre’
    left physical scars and civic trauma. Smoke-faded ruins, stilled watchposts, and
    the acrid tang of burned circuitry haunt local recollection; the campaign functions
    as a cultural script—a justificatory myth of strategic necessity that reshapes
    guilt into duty, pressures outsiders with demands for redemption, and anchors
    paternal and political motives in communal loss.
