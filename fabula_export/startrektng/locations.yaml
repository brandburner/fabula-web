  global_id: ger_location_e8bfc39e0fa8
  canonical_name: Worf's Quarters
  description: |-
    Worf's personal quarters aboard the USS Enterprise-D, a confined space where he practices martial arts, engages in father-son interactions with Alexander Rozhenko, and grapples with emotional turmoil. The quarters are sparsely furnished, with bare bulkheads that heighten the intimacy of confrontations (e.g., with Deanna Troi) and private moments (e.g., practicing quick-draws or reassuring Alexander). Key events include:
      - **Grief and Rage**: Worf shatters a table in fury over rumors of his father Mogh's survival in a Romulan prison camp (confronted by Deanna Troi).
      - **Father-Son Dynamics**: Alexander eagerly awaits Worf after a Picard meeting, clashing over holodeck adventures (e.g., Wild West/Deadwood). Worf later reassures Alexander after holodeck trauma.
      - **Solo Reflection**: Worf drills martial arts or quick-draws alone, using the space for emotional processing and Klingon discipline.
