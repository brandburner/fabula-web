- fabula_uuid: ger_location_92288d89d16a
  global_id: ger_location_92288d89d16a
  canonical_name: Epsilon Mynos System
  description: The Epsilon Mynos System sprawls across the void as a shadowed star
    domain, long whispered in legends and now caught in the Enterprise’s scanning
    net. Cloaked beneath an elusive veil, it harbors Aldea, a planet veiled in green
    luminescence and ancient mystery. Faint energy signatures pulse through its spatial
    fabric, drawing the crew into a tense dance of revelation and disbelief. The system’s
    quiet depths crackle with psychic presence and spatial distortions, wrapping the
    starfield in an atmosphere thick with awe, caution, and the electric thrill of
    first contact with a civilization hidden in myth.
  location_type: Star System
  parent_location_uuid: null
