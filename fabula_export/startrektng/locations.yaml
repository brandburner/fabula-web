- fabula_uuid: ger_location_064d354da0c8
  global_id: ger_location_064d354da0c8
  canonical_name: Center Floor of the Ship's Gymnasium (USS Enterprise-D)
  description: Picard dominates Guinan with precise thrusts and parries across this
    open center floor in the USS Enterprise-D's gymnasium. Foils clash sharply, feet
    scrape and pivot on the marked strip under steady lights, breaths grow ragged
    amid sweat-slicked masks. Ship systems hum faintly as Guinan's questions about
    the Borg drone cut through deflections, her feigned stumble luring Picard's pity
    before a swift disarm exposes his unresolved tensions. The space turns physical
    combat into raw emotional sparring.
  location_type: Starship Gymnasium (Central Fencing Area)
