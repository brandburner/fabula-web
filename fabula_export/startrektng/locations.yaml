  global_id: ger_location_9c9cbe1fed4e
  canonical_name: Bridge of the Ancient Promellian Warship
  description: 'A dead Promellian command deck: consoles sit mute beneath a scoured
    dome of deck plating, flickers of long-faded status lights ghost across braided
    conduits, and a vast forward aperture yawns like a blind eye. Air tastes of cold
    metal and old ozone; instrument panels yield only cryptic echoes to Data''s probes
    while the silence presses against Riker''s boots. Sensors register paradoxical
    safety aboard the hull even as a directional field pins its attention to the Enterprise.
    The space functions as forensic theater and tactical puzzle — a ruin where readings
    are interrogated, hypotheses are forged, and the crew confronts engineered menace
    rather than random hazard.'
