  canonical_name: Troi’s Childhood Hearth (Betazed)
  description: "\n  A Betazoid family hearth in Troi’s childhood home on Betazed,\
    \ where her grandfather projected telepathic stories directly into her mind through\
    \ the flames. The fireplace serves as a silent conduit for emotional bonds, evoking\
    \ vivid empathic visions that parallel Troi’s later disorienting empathic experiences\
    \ (e.g., in the nacelle tube). Its warm glow symbolizes intimacy, wonder, and\
    \ the unspoken connection between generations. Worf later draws parallels to Klingon\
    \ fire-gazing rituals, reinforcing its role as a site of silent revelation. Troi\
    \ revisits this hearth alone in adulthood, where the flames rekindle her grandfather’s\
    \ voice, pulling her back to those formative moments of shared empathy.\n  "
