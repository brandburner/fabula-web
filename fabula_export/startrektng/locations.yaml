- fabula_uuid: ger_location_3eb8c849d048
  global_id: ger_location_3eb8c849d048
  canonical_name: Silent Pool (Town Square Basin)
  description: A shallow, quiet basin set into the main street square at the plant
    and aqueduct, the Silent Pool collects the town's dust and daylight into a still,
    reflective surface. Midday heat warms flagstones; the pool's lip holds grit and
    loosened earth where a hand can scoop and let go. The space absorbs sound—murmurs
    of a crowd, the clink of rifles, the metallic whisper of an aqueduct—so that small
    gestures become loudly intimate. Used as a place of private surrender and grisly
    ritual, the pool functions as a tactile, symbolic low point where pride meets
    loss.
  location_type: Public Square Reflecting Basin
  parent_location_uuid: null
