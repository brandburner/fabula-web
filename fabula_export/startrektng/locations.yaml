- fabula_uuid: ger_location_a3ec5cc43470
  global_id: ger_location_a3ec5cc43470
  canonical_name: Shuttlecraft (Rogue Torpedo Retrieval Mission)
  description: 'Starfleet shuttlecraft used by Picard and Data for a critical mission
    involving the retrieval of a rogue torpedo and the docking approach to the stricken
    *Enterprise-D* during the de-evolution crisis. The shuttle''s smaller frame allows
    it to navigate hazardous environments like asteroid fields and perform precise
    docking maneuvers to the tumbling *Enterprise-D*. The interior features consoles
    displaying torpedo trajectories, evasion routes, and sensor readouts of distorted
    life signs/power surges, with viewports offering a star-strewn view of space.
    The mission unfolds in three distinct phases: (1) the initial launch from *Shuttlebay
    Two* to retrieve the rogue torpedo, (2) the docking approach to the tumbling *Enterprise-D*
    where Picard manually controls the shuttle to match its rotation, and (3) the
    return journey where the shuttle becomes stranded without the *Enterprise*, forcing
    Picard and Data to confront their isolation. The shuttle''s systems—including
    impulse engines, sensor arrays, and axial stabilizers—play a pivotal role in all
    phases of the mission.'
  location_type: Starfleet Shuttlecraft
  parent_location_uuid: null
