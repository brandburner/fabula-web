  canonical_name: Tau Cygna System
  description: 'A distant star system whose name now carries an unbearable legal weight:
    Tau Cygna registers less as landscape and more as a jurisdiction under threat.
    Cold starlight frames a contested orbit; speakers on the Enterprise bridge treat
    its coordinates like a courtroom exhibit. The place crackles in the crew’s minds
    with deadline pressure, imagined evacuation corridors, and the hush of lives at
    risk. Sound tightens into protocol—maps, manifests, and casualty estimates replace
    stars—while dread and bureaucratic formality collide over the fate of colonists
    on Tau Cygna Five.'
