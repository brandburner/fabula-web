- fabula_uuid: ger_location_170ac4eced47
  global_id: ger_location_170ac4eced47
  canonical_name: Riker's Quarters
  description: 'Commander William T. Riker''s private quarters aboard the USS Enterprise-D,
    consisting of two distinct but interconnected spaces: (1) the main living area
    (cluttered with alien artworks, bravery decorations, and unfamiliar furniture,
    reflecting a fabricated 16-year personal history) and (2) an adjacent bedroom
    reserved for his ten-year-old son Jean-Luc. The bedroom—where off-key trombone
    practice echoes—serves as the emotional core of the fabricated family life, while
    the main quarters function as a retreat for Riker''s raw emotional confrontations
    (e.g., meeting Jean-Luc, learning of Min''s death, accessing deceptive family
    records). The space amplifies Riker''s confusion, grief, and dawning suspicion
    during the events of *Future Imperfect*, exposing the illusion of his fabricated
    life.'
  location_type: Officer's Quarters (Starship)
