    dais and forward viewscreen. Underfoot the ramp gives a faint metallic echo; low
    railings catch gloved hands as officers surge up its length. In crises it becomes
    a conduit for urgent motion and exposed intimacy—footfalls staccato against LCARS
    hum, voices compressed by the room’s charged silence, and bodies converging on
