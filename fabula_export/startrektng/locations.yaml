  canonical_name: Underground Complex
  description: The underground complex envelops the away team in a cold, sterile void,
    punctuated by a dark, curving tunnel leading into unknown depths. Concealed illumination
    devices flicker to life, unraveling eerie emptiness and exposing metal sliding
    doors that guard secrets beneath the surface. As life scans register no organic
    presence, the silence deepens, draping the space in a brooding atmosphere of vanished
    colonies and foreboding mystery. This labyrinthine underworld channels tension
    and anticipation, marking a critical threshold into the heart of Data's lost origins.
