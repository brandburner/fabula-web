  global_id: ger_location_148bf7707710
  canonical_name: Hotel Entrance
  description: Bustling threshold of a 19th-century San Francisco hotel, where bellboys
    load suitcases into horse-drawn carriages under the clatter of hooves and creak
    of wooden wheels. Guests hand over coins and depart abruptly, like Mister Lane
    storming out after poker losses. Staff exchange quick words and place bets with
    lurking bookies. Data stands here amid skepticism about his disheveled uniform
    and lack of funds, highlighting the entrance as a crossroads of arrivals, rejections,
    and opportunistic schemes.
  location_type: 19th-Century Hotel Entrance
