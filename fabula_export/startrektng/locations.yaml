  description: Barren world in an unexplored star system, circled by a unprecedented
    plasma anomaly—a fluid, pulsating mass like a glowing balloon filled with liquid,
    sheathed in silicates and actinides. The Enterprise drops from warp nearby, holds
    at 10 km from the entity on Picard's order, and scans reveal no Starfleet records.
