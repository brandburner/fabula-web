  global_id: ger_location_1e42be8b06be
  canonical_name: Gamelan Four
  description: Gamelan Four hangs in orbit as a peaceful inhabited world, its surface
    leadership under Chairman Songi broadcasting urgent distress amid a radiation
    crisis. A derelict waste vessel, snared by the planet's gravity well, leaks lethal
    emissions that climb steadily, endangering all life below. Enterprise holds position
    nearby, sensors locked on the threat while crew debates deflection paths toward
    the system's sun. The planet's vulnerability presses the crew—defenseless against
    the unmanned hazard, its fate hinges on swift Starfleet action.
  location_type: Planetary Mining Settlement
