  global_id: ger_location_493017365ce9
  canonical_name: Barkonian Village School
  description: Garvin escorts Gia toward this off-screen school through the early
    morning town square, embedding it in the villagers' daily rhythm on pre-industrial
    Barkon IX. Children attend lessons here amid Renaissance-era simplicity—stone
    or timber structure approached by dirt paths, filled with wooden benches, chalkboards,
    and the chatter of young students mastering basic skills. Data's contaminated
    arrival nearby disrupts paths to this routine anchor of community learning and
    stability.
  location_type: Pre-Industrial Village School
