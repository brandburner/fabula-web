- fabula_uuid: ger_location_14928c9f3802
  global_id: ger_location_14928c9f3802
  canonical_name: Angosian Senate Rotunda
  description: A vast, high‑vaulted domed chamber at the heart of Angosia’s government,
    the rotunda is ringed by Corinthian columns and towering galleries, lit by warm
    civic lighting and filtered sunlight through stained glass. Marble floors and
    carved benches amplify measured footsteps and polite conversation; ceremonial
    banners and a raised dais frame official proceedings. Populated by aides, guards,
    diplomats and senators, the space serves as a stage for civic ritual — and, when
    crisis intrudes, a public arena for political reckoning. In the episode, the rotunda’s
    cultivated calm is shattered first by news of the Lunar Five breakout and later
    by veterans who burst in, forcing Picard and others to interpose as hidden culpabilities
    become an inescapable, public crisis.
  location_type: Senate Rotunda
  parent_location_uuid: ger_location_c573cd5eceb0
