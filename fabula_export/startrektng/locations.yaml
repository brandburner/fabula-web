- fabula_uuid: ger_location_a0de615bc2d3
  global_id: ger_location_a0de615bc2d3
  canonical_name: Amanda's Family Home (Kansas)
  description: 'Amanda''s family home in Kansas stands as the site of sudden devastation:
    a tornado materializes without storm fronts, destroys the house, and vanishes
    abruptly, killing her parents inside. Picard cites its localized path and spontaneous
    nature as proof of unnatural origins tied to the Q Continuum. The space evokes
    ordinary domestic life shattered by omnipotent force, anchoring Amanda''s grief
    and the debate over her powers.'
  location_type: Midwestern Family Home
