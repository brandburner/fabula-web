- fabula_uuid: ger_location_585cf37d9d39
  global_id: ger_location_585cf37d9d39
  canonical_name: Room 727 (Richey's Suite) — The Royale
  description: 'Room 727 is the seventh-floor suite in The Royale where the away team
    discovers a long‑decayed skeleton in a pale‑blue flight suit embroidered ''Colonel
    S. Richey.'' Dim, garish period trappings—neon signage, cracked wallpaper, pulp
    novels, and a too‑bright lamp—convert staged artifice into forensic evidence.
    The space functions as a discovery chamber and moral hinge: sensory kitsch yields
    human identity, grief surfaces amid sterile fakery, and the confined suite drives
    the crew’s urgent, rule‑bound efforts to escape the hotel.'
  location_type: Hotel Guest Room
