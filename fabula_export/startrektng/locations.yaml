- fabula_uuid: ger_location_64584cdbee5c
  global_id: ger_location_64584cdbee5c
  canonical_name: Moonlit Gazebo
  description: Amanda Rogers conjures this secluded gazebo under a starry night sky
    within an enchanted forest to ensnare William Riker in her romantic fantasy. Moonlight
    filters through dense tree branches, illuminating lattice walls and stone floors
    with silvery glow. The air carries a charged hush as she presses advances, forces
    a false confession of love with her Q powers, then watches the illusion crumble.
    Riker rejects her outright; she collapses in tears amid the fading magic, confronting
    the futility of coerced affection.
  location_type: Enchanted Forest Gazebo
