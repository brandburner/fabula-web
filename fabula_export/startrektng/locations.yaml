  description: An unnamed, cloud-shrouded planetary mass that appears as a blunt,
    shadowed bulk on the tactical display during the simulated Kumeh maneuver. Its
    dark limb severs visual and sensor lines, providing immediate concealment that
    the Enterprise uses as both shield and stage; the world functions as both raw
