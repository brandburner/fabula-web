- fabula_uuid: ger_location_71d9fcdd2056
  global_id: ger_location_71d9fcdd2056
  canonical_name: Loren System (Orbit Above Loren III)
  description: The Loren System is a star system where the *Enterprise* drops from
    high warp into its void, sensors locking onto two Cardassian war vessels orbiting
    Loren III (the system's third planet). This orbital space becomes a charged battleground
    as Gul Ocett hails with demands, Picard calls battle stations, and Worf reports
    a Klingon cruiser decloaking nearby. The system's third planet, Loren III, is
    the focal point of a three-way standoff between the Federation, Cardassians, and
    Klingons over ancient secrets buried in its biosphere. The tension escalates as
    weapons charge in vacuum silence, with the planetary disk below underscoring the
    raw competition for genetic traces and shifting alliances.
  location_type: Star System
  parent_location_uuid: null
