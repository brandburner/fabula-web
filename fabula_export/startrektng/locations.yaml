  description: Pilots beam into Mimas straight from the Titan collision that kills
    Joshua Albert. Wesley Crusher materializes amid the chaos, joining the surviving
    Nova Squadron members in medical bays and briefing rooms. The station buzzes with
    emergency protocols—medics scan injuries, officers log reports—while Saturn looms
