  canonical_name: Penthara Four Upper Atmosphere
  description: Dark clouds roil in Penthara Four's upper atmosphere, riven by lightning
    and swollen with volcanic plumes surging from the surface below. Deflector beams
    and phaser discharges target this turbulent layer for ionization, but partially
    disperse on contact with thick dust clouds. From the Enterprise bridge, the crew
    witnesses beams struggling through the chaos, their partial success amplifying
    the high-stakes gamble against planetary doom.
