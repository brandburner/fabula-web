    star system invoked in TNG as a juridical/strategic coordinate: an isolated location
    whose remoteness converts into political leverage and narrative weight. It appears
    across multiple scenes and episodes with sterile sensor readings, manifests and
    navigation arrays framing its role as jurisdictional leverage or site of trauma/flight.
    Consolidated description unifies references to legal/extradition tensions, procedural
    closure, and the human cost that the Enterprise must reckon with.'
