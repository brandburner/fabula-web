  global_id: ger_location_d7e672a1e08b
  canonical_name: Lichen-Covered Rockface
  description: Jagged lichen-covered rockface rises from a desolate fossilized seabed
    under harsh daylight. Gul Ocett and her Cardassian guard block access to the DNA-laden
    lichen, drawing weapons as Klingons and Romulans join the standoff. Picard and
    Beverly scan discreetly, activating an ancient hologram that projects a humanoid
    preaching galactic unity. Factions lower phasers in stunned silence until Nu'Daq
    snarls rejection, shattering the moment as they disperse.
