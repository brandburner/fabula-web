- fabula_uuid: ger_location_e346cf0e422c
  global_id: ger_location_e346cf0e422c
  canonical_name: Mondor Armament Bay
  description: 'A cramped, metallic hold deep within the freighter Mondor that functions
    as a rudimentary weapons workshop and storage bay. Fluorescent engineering lights
    glint off crude Pakled turrets and bunched wiring; a bank of analogue force meters
    and clumsy launch rails punctuate an array of jury-rigged consoles. The air smells
    of ozone and warm metal; footsteps clang on grated flooring. The space radiates
    coercion: underlit faces, tight sight-lines, and the constant mechanical hum turn
    technical procedure into intimidation. Here technicians are turned into captives,
    expertise weaponized under watchful, blunt authority as humiliation, threat, and
    tactical leverage collide.'
  location_type: Starship Armament Bay
