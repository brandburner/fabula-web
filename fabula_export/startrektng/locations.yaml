- fabula_uuid: ger_location_373ed2cbda60
  global_id: ger_location_373ed2cbda60
  canonical_name: Doorway at Centerplace
  description: The Doorway at Centerplace stands as a solemn threshold within Lutan's
    austere Centerplace on Ligon, where ritual and power collide. Guarded by sentries,
    this entry point marks the tense moment Lieutenant Yar is formally presented and
    removed amid the clash of Starfleet diplomacy and Ligonian honor codes. The doorway
    embodies cultural gravity and suspense, a physical and symbolic gateway between
    captive defiance and ceremonial tradition, charged with the weight of life-or-death
    stakes unfolding beyond its guarded frame.
