    and wildflowers, anchoring the new Melona Colony. Colonists drive flags and tape
    boundaries for hospitals, schools, and residential pods as Riker, Carmen, Beverly,
    and Data plan construction amid flirtatious banter and practical logistics. Peace
    fractures with an eerie whir; the Crystalline Entity descends, its beam vaporizing
    the site into dust and skeletal remains. Survivors scramble to nearby caves, Riker
    issuing frantic evacuation orders while witnessing Carmen's sacrifice.
