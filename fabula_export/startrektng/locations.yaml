- fabula_uuid: ger_location_97f744de16f7
  global_id: ger_location_97f744de16f7
  canonical_name: Promellian Wreck (Debris Field)
  description: 'A shattered Promellian vessel lies at the heart of a ragged debris
    field, its twisted hull and jagged structural ribs jutting like the bones of a
    ruined leviathan. Scattered coils, fused circuit plates, and blackened access
    ports hide within a carpet of microfragments; sensor sweeps pick out embedded
    devices that pulse with malignant intent. The wreck radiates a low, corrosive
    hum — instrumentation flares, and any energy draw triggers lethal radiation spikes
    as hidden Aceton assimilators siphon power. This site functions as both archive
    and ambush: salvaged logs and coils reveal the ship’s fate even as the surrounding
    rubble conceals the traps that escalate the crisis.'
  location_type: Derelict Alien Ship / Debris Field
