- fabula_uuid: ger_location_3c10e2d9ff3e
  global_id: ger_location_3c10e2d9ff3e
  canonical_name: Valley of Chula
  description: 'A remembered Romulan valley rendered with sharp, aching clarity by
    a simulation: a wide gorge of weathered rock and low light, wind threading through
    cut channels and carrying the metallic tang of memory. The space tastes like home
    and loss at once—open vistas promising refuge and the particular geography of
    a homeland that imprints identity. Presented to soothe, the valley instead fractures
    the refugee''s composure, converting landscape into accusation, catalyst, and
    a political summons; it functions as a cultural touchstone that summons duty,
    shame, and resolve.'
  location_type: Romulan Valley (Natural Landmark / Cultural Site)
