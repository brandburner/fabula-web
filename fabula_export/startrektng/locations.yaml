  global_id: ger_location_c593b98ef77c
  canonical_name: Rocky Pit
  description: 'Jagged rocks form a barren pit on the harsh mining planet, trapping
    stranded Ferengi miner Gorta amid dust and sparse cover. The away team—Worf, Riker,
    Geordi, and Data—corners him here for tense interrogation. Gorta spills details
    of the Duras sisters'' betrayal: stealing ore and a cloaked Bird-of-Prey bound
    for the Ufandi system. The pit''s isolating walls amplify the crew''s urgency
    and Gorta''s opportunistic defiance during negotiations.'
