- fabula_uuid: ger_location_8915d2ad4f84
  global_id: ger_location_8915d2ad4f84
  canonical_name: Third Moon
  description: A distant, unnamed lunar satellite lying within transporter range of
    the ship, the Third Moon registers as both a physical landing point and an emotional
    horizon. Bright and remote in imagination, it functions as the site of Anya’s
    departure — a transient staging ground reached only by matter-beam — and carries
    the chill of finality that follows a ritual farewell. The moon’s silence and imagined
    bleakness amplify the severing of guardianship and the hush of duty, making it
    a portable, evocative destination rather than a detailed topography.
  location_type: Planetary Moon (Transport Destination)
