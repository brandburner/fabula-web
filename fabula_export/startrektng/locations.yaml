- fabula_uuid: ger_location_bc3826211151
  global_id: ger_location_bc3826211151
  canonical_name: Transporter Room 3 (USS Enterprise-D)
  description: Primary transporter room aboard the USS Enterprise-D, featuring standard
    Starfleet transporter pads, control consoles, and clinical lighting. This room
    serves as the default location for away missions, including high-risk operations
    (e.g., Nervala Four, Bersallis III, Jenolan rescue, derelict ship missions) and
    emergency beams (e.g., anomaly probes, Romulan incursion, temporal freeze). Key
    personnel such as Captain Picard, Commander Riker, Data, Worf, Chief O'Brien,
    Ensign Palmer, Lt. Nella Daren, and Reginald Barclay have directed or participated
    in beam-out/beam-in operations from this location. The room is characterized by
    its humming consoles, glowing transporter pads, and tension-filled atmosphere
    preceding critical missions. It is the most frequently depicted transporter room
    in the series and has been involved in both routine and crisis scenarios, including
    the disappearance of security officers during the Romulan incursion.
  location_type: Starship Transporter Room
