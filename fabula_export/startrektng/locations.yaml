- fabula_uuid: ger_location_d3529078994d
  global_id: ger_location_d3529078994d
  canonical_name: Graves' Laboratory
  description: Graves' Laboratory hums with the quiet tension of a dying man's last
    stand, its sterile surfaces reflecting the cold glow of suspended animation equipment.
    Shelves cluttered with aging scientific instruments and half-finished prototypes
    cast long shadows across metallic workbenches, creating a claustrophobic arena
    for existential confrontation. The air carries the faint scent of ozone and antiseptic,
    undercut by the melancholy strains of 'If I Only Had A Heart' whistled by a scientist
    bargaining with mortality. This confined space becomes a philosophical battleground
    where human desperation collides with android innocence—its every surface a potential
    chess piece in Graves' grotesque game of consciousness transfer. Flickering monitor
    lights pulse like failing vital signs as Data's golden eyes reflect both the clinical
    precision of the lab and the profound questions it now hosts.
  location_type: Private Research Laboratory
  parent_location_uuid: null
