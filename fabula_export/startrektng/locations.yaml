  global_id: ger_location_dbadc6f9bfa5
  canonical_name: 'Crew Quarters #2'
  description: Compact crew quarters aboard the USS Enterprise-D hold a single crewman
    mid-workout, his breathing steady as the computer voice announces rising heart
    rate and calorie burn. Ro hovers invisible and intangible nearby, eyes locked
    on a Romulan agent gliding covertly through the space. The agent's fluid movements
    evade detection amid exercise mats and dim lighting, while the oblivious crewman
    pushes through reps. This everyday refuge turns tense witness point, mundane routine
    clashing against sabotage threat as Ro grasps the infiltration's scope without
    power to act.
