  canonical_name: Promellian Debris Field (rubble surrounding the Promellian wreck)
  description: A hazardous Promellian debris field formed from the frozen wreckage
    and shredded hull of a Promellian battlecruiser. Jagged fragments and compacted
    rubble tumble on slow, uncertain trajectories and ring the crippled ship; hidden
    hostile devices (including Aceton assimilators) and intermittent, sickly radiation
    make the area a deliberate booby-trap that spikes and collapses sensors, threatens
    hull integrity, and forces extreme tactical restraint. The field functions as
    both navigational gauntlet and archaeological threshold in Starfleet encounters.
  location_type: Space Debris Field (Navigational Hazard)
