- fabula_uuid: ger_location_cabe59864ae9
  global_id: ger_location_cabe59864ae9
  canonical_name: Lonka Pulsar
  description: The Lonka Pulsar is a neutron star located within the Lonka Cluster,
    a remote stellar expanse. It emits intense rhythmic energy beams and gravitational
    forces, drawing the USS *Enterprise-D* off course at warp two (later half impulse)
    under the False Picard's unexplained orders. This detour disrupts the ship's planned
    rendezvous with the USS *Hood*, creating delays and tensions among the crew. Key
    interactions include Wesley Crusher's hesitation at consoles, Data's logged suspicions,
    Riker's questioning of the deviation, and Worf's operational involvement. The
    pulsar's isolation and the False Picard's actions amplify a test of obedience,
    fracturing trust amid blocked communications and rising defiance. The Lonka Cluster
    serves as the broader stellar region anchoring this pulsar, though the pulsar
    itself is the primary focus of the narrative conflict.
  location_type: Pulsar
  parent_location_uuid: null
