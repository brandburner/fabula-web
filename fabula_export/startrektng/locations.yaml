- fabula_uuid: ger_location_92d05fb213ed
  global_id: ger_location_92d05fb213ed
  canonical_name: Courtroom Disposal Chute
  description: 'A narrow metal aperture set low in the courtroom wall, the disposal
    chute offers a cold, final gesture against the room’s ceremonial gravity. Polished
    steel edges catch the harsh overhead light; a thin hydraulic hiss answers when
    the lid clicks. Sound collapses into the throat of the chute, amplifying the smallness
    of whatever is sent into it. The device functions as both utility and rhetorical
    instrument: when an object arcs into its darkness, the courtroom’s abstract judgments
    acquire physical weight. The chute eats objects with indifferent efficiency, converting
    evidence and metaphor into vanished proof and forcing witnesses to confront the
    literal finality of disposal.'
  location_type: Courtroom Fixture (Disposal Chute)
  parent_location_uuid: ger_location_32439921dabc
