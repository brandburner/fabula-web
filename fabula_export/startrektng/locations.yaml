  global_id: ger_location_276e5c29771e
  canonical_name: Police Station Waiting Room
  description: The Police Station Waiting Room crackles with mounting tension as Beverly
    Crusher arrives, shaken by the gravity of Captain Picard’s murder accusation.
    Sparse and utilitarian, this room becomes a crucible where fear and uncertainty
    collide with the surreal edge of a simulated interrogation. Under flickering fluorescent
    lights, Data and Whalen scrutinize memorabilia, grounding the space in a mix of
    nostalgic echoes and harsh present realities. The air pulses with anxiety and
    fragile hope, marking this waiting room as the emotional gateway into a deadly
    psychological trial that tests trust and resilience.
  location_type: Waiting Room
