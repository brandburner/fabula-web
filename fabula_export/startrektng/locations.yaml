  global_id: ger_location_6be1c14d69d8
  canonical_name: Old Man's Porch
  description: Wooden porch attached to a weathered building on the holodeck's Western
    street projects quiet vigilance. The Old Man rocks steadily in his chair, pipe
    clenched between his teeth as aromatic smoke drifts into the still air while he
    scans the dusty thoroughfare below. His sudden pause halts the creak of wood just
    before a distant gunshot cracks the town's eerie hush, horse hooves stamping nervously
    nearby. Alexander glances at the figure; Worf presses forward, senses alert to
    the simulation's building peril.
