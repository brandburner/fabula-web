  description: Sela and Movar stand amid glowing consoles and tactical monitors in
    the Romulan Warbird's command center. Screens display the Federation tachyon grid,
    highlighting gaps from the Sutherland's warp failure. Alarms pulse as they analyze
    data, reject Picard's baited trap, and target Data's ship with a precise energy
