  description: Lieutenant Rocha's prior posting before Relay Station 47, the Triona
    System outpost stands as a remote frontier station vulnerable to undetected biological
    threats. Beverly Crusher theorizes the coalescent organism absorbed Rocha here
    during his service, its microscopic form mimicking cellular structures amid the
    isolation of deep space. Harsh conditions and sparse oversight mark this outpost,
    where routine patrols turned deadly, seeding the entity that later assaulted the
    relay station crew.
