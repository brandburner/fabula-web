  global_id: ger_location_723615851a15
  canonical_name: Barkon IV
  description: Barkon IV unfolds as a pre-industrial planet, its rural expanse stretching
    over 100 kilometers between the crashed probe's remote impact site and the nearest
    human settlement. Data traverses this isolated terrain alone, retrieving radioactive
    fragments amid risks to the biosphere and potential detection by primitive inhabitants
    who live without advanced technology. Radiation interference hampers communications,
    heightening isolation as the Enterprise crew monitors from orbit.
