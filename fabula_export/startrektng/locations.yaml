- fabula_uuid: ger_location_c95a89ed75c6
  global_id: ger_location_c95a89ed75c6
  canonical_name: Subspace Anomaly (Uncharted Space)
  description: A subspace anomaly originating near Starbase 133, serving as the epicenter
    of reality distortions caused by Wesley Crusher's warp experiment. The USS Enterprise
    enters this void—an endless expanse where stars fade into blackness—while Beverly
    Crusher experiences emotional and psychological unraveling. The anomaly manifests
    as both a physical threshold (where the Enterprise glides into absolute silence)
    and a subspace bubble (where memory erosion, computer contradictions, and spatial
    instability occur). The Traveler's guidance and Wesley's subspace message tie
    this anomaly to alternate existences, symbolizing the crew's descent into psychological
    collapse and the fracturing of reality.
  location_type: Uncharted Deep Space
