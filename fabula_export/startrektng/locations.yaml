- fabula_uuid: ger_location_db8f0a4631c1
  global_id: ger_location_db8f0a4631c1
  canonical_name: Captain's Ready Room
  description: A compact, private command enclosure opening off the bridge where the
    captain convenes senior staff for urgent deliberation. Low, focused lighting and
    the ship’s steady hum press inward; muted consoles, a polished desk and a close
    ring of chairs organize bodies and data into a tight tactical geometry. Bulkhead
    vibrations and distant bridge chatter leak through the threshold as officers trade
    clipped reports, risk assessments, and orders. The room hardens under pressure—strategy
    sharpens into argument, authority settles into controlled commands, and a sudden
    unauthorized comm intrusion exposes operational vulnerability and raw cultural
    friction, turning confidential counsel into a frontline of command judgment.
  location_type: Starship Captain's Ready Room
  parent_location_uuid: ger_location_9210455f0126
