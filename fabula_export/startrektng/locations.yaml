    Facility)
  description: Krola stands at this window, phaser gripped tightly, as he surveys
    the corridor below where the mob's violence has just battered Riker into unconsciousness.
    The view extends to the nearby surgical area, where doctors scramble to repair
    the commander's reopened wounds amid shouts and clattering instruments. Sterile
