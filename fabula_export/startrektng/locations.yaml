  global_id: ger_location_4476af5c7836
  canonical_name: Romulan Market
  description: Lurin eyes the Romulan market as his profit windfall, a shadowy trading
    hub where he plans to offload the captured Enterprise to Romulan buyers. Ferengi
    opportunism meets Romulan cunning amid stalls hawking contraband tech, exotic
    ores, and cloaked starship components. Haggling echoes through narrow alleys thick
    with suspicion, plasma fumes, and the metallic tang of illicit deals. Guards patrol
    edges, enforcing secrecy while deals like ship sales unfold in back corners, drawing
    pirates and spies into high-stakes exchanges.
  location_type: Romulan Black Market Bazaar
