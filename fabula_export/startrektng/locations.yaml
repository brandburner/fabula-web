- fabula_uuid: ger_location_70c1dffaee76
  global_id: ger_location_70c1dffaee76
  canonical_name: Uxbridge House Front Room
  description: A small, battered front room that opens onto a scorched Rana IV landscape
    yet remains impossibly intact; sunlight slices through a tidy curtain onto a threadbare
    rug and a warped wooden threshold. Voices puncture the stunned quiet as Kevin
    and Rishon occupy this uneasy domestic pocket, meeting the Enterprise away team
    at the front door—where a concealed snare lifts Riker, a phaser lies nearby, and
    suspicion and fragile gratitude collide. The space smells faintly of old tea and
    smoke, creaks under sudden motion, and functions as both hospitable threshold
    and forensic stage where first contact fractures into accusation, humiliation,
    and the first seeds of a larger investigation.
  location_type: Suburban Home Front Room
  parent_location_uuid: ger_location_b2e59239f9a9
