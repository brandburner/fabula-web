- fabula_uuid: ger_location_2dd2bc24d648
  global_id: ger_location_2dd2bc24d648
  canonical_name: Nuria's Village Huts
  description: 'A clustered ring of simple huts serving as the primary dwellings of
    Nuria''s people: low, modest shelters pressed close along dirt paths, the air
    threaded with the faint tang of smoke and human activity. The settlement feels
    intimate and materially constrained—an everyday world of close kinship, routine
    labor, and visible lineage. Narratively, the huts stand between caves and bows
    in a technological genealogy Picard invokes: they embody a stage of material familiarity
    that can either cradle wonder or demand reclaimed responsibility from those tempted
    to deify outsiders.'
  location_type: Primitive Village (Hut Dwellings)
