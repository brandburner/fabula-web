  global_id: ger_location_7717cadb2cf2
  canonical_name: Kaelon II
  description: Kaelon II (also referred to as 'Kaelon Two') is the homeworld of the
    Kaelon people, a fiercely isolationist civilization facing extinction due to their
    dying sun. The planet is the cultural and ritualistic heart of Kaelon society,
    where 'The Resolution'—a ritual suicide commanding the elderly to die to preserve
    societal strength—is performed. The Enterprise's crew witnesses warships rising
    to intercept them as families gather for this ritual, highlighting the tension
    between reclusive traditions and the potential for scientific salvation. Lwaxana
    Troi's emotional intervention to halt Timicin's participation in 'The Resolution'
    transforms the planet into a symbol of rebellion against cultural fatalism, marking
    a pivotal moment in Kaelon-Federation relations.
  location_type: Reclusive Alien Planet
