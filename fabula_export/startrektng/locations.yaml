- fabula_uuid: ger_location_ccf48fa1bc88
  global_id: ger_location_ccf48fa1bc88
  canonical_name: Gamma Erandi Nebula
  description: A vast gaseous interstellar cloud fills the Enterprise's main viewscreen,
    swirling with embryonic stars and raw energy. Picard gazes at it in quiet reverence,
    struck by its incomprehensible beauty, while Data computes its power output at
    five point three four times ten to the forty-first watts. The nebula's shimmering
    chaos underscores their clash—human awe against android precision—and drives the
    scene's exploration of logic's limits.
  location_type: Interstellar Nebula
