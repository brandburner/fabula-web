  canonical_name: Gul Madred's Interrogation Room
  description: 'Gul Madred dominates this stark Cardassian interrogation chamber,
    a large echoing space that isolates and intimidates captives like Picard. Sparse
    elements define it: Madred''s desk holding a PADD, Picard''s restraint chair,
    a ceiling bar for naked suspension, a light fixture with four glaring bulbs for
    psychological games, and medical gear for neural serums. Guards secure the heavy
    door; the clinical oppression amplifies Picard''s exhaustion, vulnerability, and
    defiance amid torture, briefly pierced by Madred''s interaction with his daughter
    Jil Orra.'
