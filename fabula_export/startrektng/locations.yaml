  global_id: ger_location_5d488d87272d
  canonical_name: Reaction Chamber (Space Station)
  description: This engineering compartment on the space station houses volatile plasma
    reactions for high-risk maintenance. Farallon describes how an exocomp entered
    amid a breach simulation and vaporized in a searing explosion, its components
    reduced to plasma in seconds. Crew debate marks the chamber as a testbed for self-preservation
    instincts, its confined walls pulsing with energy conduits, acrid heat, and the
    sharp tang of ionized air—a stark arena where mechanical limits meet questions
    of life.
