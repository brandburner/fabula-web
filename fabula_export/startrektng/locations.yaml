  global_id: ger_location_c87b13c4a083
  canonical_name: Lower Three Decks of the Saucer
  description: Crew scramble through humming corridors as deflector radiation seeps
    in, triggering alarms and red emergency lights. Bulkheads vibrate under weapon
    strain; Deanna Troi guides rattled personnel to upper safe zones, her steady commands
    piercing shouts and claxon wails. The decks turn chaotic refuge-turned-hazard,
    forcing rapid exodus amid Borg pursuit.
  location_type: Starship Saucer Decks
