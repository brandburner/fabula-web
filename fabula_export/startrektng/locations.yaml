  global_id: ger_location_43deed425efb
  canonical_name: Children's Center
  description: Aboard the starship, the Children's Center hosts ceramics classes and
    other activities designed for young crew members. Counselor Troi recommends it
    to Lieutenant Sutter as a space where Clara can build real friendships and skills
    through hands-on socialization. Children mold clay at tables under gentle lighting,
    laughter mixing with the hum of ship systems, countering isolation from imaginary
    or alien influences.
