  description: Data tracks the Enterprise's approach to the Atalia system from the
    bridge, 37 hours away at warp speed. Stars elongate into streaks on the viewscreen
    as the ship closes in on this stellar cluster of worlds and potential outposts.
    Picard nods at the update amid routine operations, but Galen's distress call shatters
