  description: A sudden hole of swirling white light rips open on Devidia II's night
    surface, emitting a deafening sonic boom. Silver-gray aliens emerge carrying stolen
    human life essence and a writhing ophidian. Picard leads Riker, Troi, Geordi,
    and Beverly into its blinding vortex, chasing the predators despite risks of temporal
    disruption. The portal swallows the team whole, thrusting them toward the aliens'
    lair in eerie silence afterward.
