- fabula_uuid: ger_location_c038181b5cc3
  global_id: ger_location_c038181b5cc3
  canonical_name: Jeremy Aster's Recreated Home (Aster Home, Earth)
  description: 'A recreated Aster family home — an intimately detailed suburban interior
    constructed as an illusion: warmed wood floors, a sagging/ threadbare sofa and
    rug, framed family photos on a mantel, toys and a schoolbook left untouched, and
    the faint scent of home cooking and detergent. Light and lamplight pool in the
    small living room; a doorway frames Marla (the mother figure) and Troi’s caregiving
    presence. Functionally this space is an engineered, emotional lure designed to
    tempt Jeremy Aster back into an anesthetized past and to force a wrenching choice
    between fabricated safety and the work of grief.'
  location_type: Recreated Private Residence (Illusory Domestic Space)
