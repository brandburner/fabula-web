  canonical_name: Solaris 5 Mountain Summit
  description: The war-weathered mountain top of Solaris 5 (also called Solari) serves
    as a symbolic diplomatic venue where past violence and present peace coexist.
    This windswept plateau features jagged rock formations and indigenous stone tables,
    with flickering truce torches marking the fragile ceasefire. The thin air carries
    tension between armed factions and Starfleet negotiators, while the scarred terrain
    bears silent witness to the planet's violent history - transformed by Riva into
    a sacred ceremonial space for reconciliation talks.
