  canonical_name: Shuttlecraft Control Position
  description: 'Air tastes recycled and thin as the shuttle''s low-curved control
    alcove squeezes around its occupants. Narrow consoles ring Picard like a cage:
    banks of dim indicator lamps, a faint stardate readout, and the cool LCARS glow
    that picks out the humiliation on his uniform as an unseen hand — Q''s hand —
    mock-cleans a hot‑chocolate stain. The cockpit''s close quarters amplify every
    word, every scoff; attempts to hail the Enterprise die on dead circuits. Authority
    shrinks to the space between two seats, where omnipotence tucks itself behind
    a flight yoke and command becomes a test of dignity and time.'
