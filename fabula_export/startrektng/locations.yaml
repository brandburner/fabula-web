- fabula_uuid: ger_location_6cbfe0ad7979
  global_id: ger_location_6cbfe0ad7979
  canonical_name: Geordi La Forge's Rim-Mounted LCARS Diagnostic Console (Main Engineering)
  description: 'A compact, instrumented work bay wedged into the rim of Main Engineering,
    Geordi''s Engineering Station hums with focused intent: a curved console array,
    tactile keys glowing LCARS amber, and a personal viewport of diagnostic readouts
    that catch every flinch of circuitry. Crew cluster close, shoulders almost touching,
    voices low and urgent as hands fly over displays. Ozone and warm metal lace the
    air; tension and disbelief crack like static when grim cultural data materializes
    on the screens. The station functions as both technical nerve node and intimate
    confessional where hard facts force emotional reckoning.'
  location_type: Starship Engineering Workstation
