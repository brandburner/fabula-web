- fabula_uuid: ger_location_f94a4fe0baf7
  global_id: ger_location_f94a4fe0baf7
  canonical_name: Laboratory Offshoot Room
  description: 'A small offshoot room opens off the laboratory, folding the lab''s
    clinical edge into a shadowed pocket where private exchange intensifies. The holodeck''s
    precise reconstruction tightens focus: footsteps cross a narrow threshold, breath
    shortens, and conversation slides from formal to intimate. Manua shepherds Riker
    inside, Apgar follows, and the space compresses sexual tension and humiliation
    into a charged, overheated hush. Surfaces feel close, the doorway frames exit
    and entrapment alike, and the room functions as a deliberate private continuation
    of the lab encounter—a crucible for motive, accusation, and personal power to
    play out away from the main workspace.'
  location_type: Holodeck Laboratory Anteroom
