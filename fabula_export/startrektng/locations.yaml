- fabula_uuid: ger_location_c2adc7b066bd
  global_id: ger_location_c2adc7b066bd
  canonical_name: Science Station Two
  description: A numbered science console set into the Enterprise‑D main bridge, Science
    Two pulses with clinical LCARS light as Wesley and Geordi lean over its display,
    fingers racing across sensors and database queries. The station breathes a low
    hum of processors and fan noise; amber and blue readouts flicker with search results,
    diagnostic graphs, and scattered telemetry. Static snaps through command channels
    while the two technicians triangulate records and piece together Colonel Richey’s
    trail to the Royale. Tension tangles with technical focus here—urgent keystrokes,
    clipped exchanges, and the close, concentrated light that turns raw data into
    a moral and strategic hinge for command.
  location_type: Starship Bridge — Science Console
