  description: Riker's hospital room traps him in sterile confinement within a Malcorian
    medical facility. A sealed window resists his escape bid, a closet stores his
    civilian clothes, and a door leads to a guarded hallway patrolled by suspicious
    staff. Berel dismantles Riker's alias here in tense interrogation amid beeping
    monitors and clinical smells. Lanel enters later, bargaining intimacy for a diversion
    that sparks chaos outside. The space amplifies Riker's isolation, vulnerability,
    and the ticking threat of exposure in a xenophobic world.
