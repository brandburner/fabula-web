  global_id: ger_location_18070428b4dd
  canonical_name: Durken’s Office
  description: Oval-shaped room with large windows and a tall one where Durken stands
    silhouetted in thoughtful poses. A seating area hosts cabinet meetings and tense
    diplomatic confrontations. Durken conducts bureaucratic work here until interruptions
    by Mirasta, Picard, and Yale shift the mood to high-stakes debates over warp programs,
    Riker's capture, and Federation surveillance. The door signals intrusions into
