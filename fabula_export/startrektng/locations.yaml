- fabula_uuid: ger_location_041d04ad7acd
  global_id: ger_location_041d04ad7acd
  canonical_name: The Royale (Casino / Hotel)
  description: The Royale — a single casino-hotel complex whose gaming floor and hotel
    lobby are narratively and spatially contiguous in the episode. Neon-lit carpets,
    roulette and craps tables, slot banks, a front desk and revolving doors form one
    engineered hospitality environment where scripted civility masks an inescapable
    trap. The space functions both as a gaming floor (tables, dealers, spectators)
    and as hotel circulation (lobby, elevators, back rooms) that loop characters back
    inside the constructed reality.
  location_type: Casino Floor
