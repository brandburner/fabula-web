- fabula_uuid: ger_location_5f96cf3c7dcb
  global_id: ger_location_5f96cf3c7dcb
  canonical_name: Field of Stars Outside Shuttlecraft
  description: 'A cold, indifferent scatter of pinpricks stretches beyond the shuttle’s
    small viewport, swallowing orientation and severing Picard from familiar bearings.
    Stars sit as distant witnesses, glittering without reference, their steady light
    underscoring the shuttle’s fragility. The vista reads as existential: scale compresses
    the captain’s authority into a cramped cabin while the infinite beyond amplifies
    humiliation, isolation, and the uncanny power exerted by Q. Sightlines emphasize
    distance rather than destination, converting navigation into a psychological void
    where the ship’s absence becomes an accusation and space itself feels remote and
    unmooring.'
  location_type: Immediate Exterior Space (Shuttle Vicinity)
