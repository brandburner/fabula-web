  global_id: ger_location_b3921b864c61
  canonical_name: Biolab (Starship Science Laboratory)
  description: Starship science laboratory (Biolab) where Worf and Alexander participate
    in Ms. Kyle's lesson on endangered species, featuring tables of animal and plant
    models and a cargo container holding the camouflaged Corvan Gilvos. A heated confrontation
    over a stolen lizard model fractures father-son trust. Later, during the Soliton
    crisis, the lab suffers a catastrophic fire, filling the space with thick smoke,
    roaring flames, and collapsing structures. Zero visibility and debris pin Alexander
    near the Gilvos container, forcing a frantic rescue as doors seal and structures
    groan. The fire transforms the sterile research hub into a fiery deathtrap, isolating
    Riker, Worf, and Alexander from the Enterprise bridge crew amid desperate survival
    efforts.
  location_type: Starship Science Laboratory
