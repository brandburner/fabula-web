  description: A colossal, enigmatic alien starship looms in geosynchronous orbit
    beside the USS Enterprise, radiating a pulsing glow that unsettles the crew and
    triggers a tense scan. This living vessel commands the dark void of space, its
    immense presence dwarfing the starship and provoking strategic caution. The vessel’s
    deliberate probe deepens the crisis, embodying an inscrutable cosmic threat that
    challenges Starfleet’s resolve amid mounting tension and mystery in the silent
    expanse near planet Cygnus IV.
