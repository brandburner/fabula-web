  global_id: ger_location_b7cdf50e0783
  canonical_name: Hurada Three
  description: Hurada Three emerges from Federation medical records as a distant planet
    visited by Tarmin's Ullian delegation. Two residents there suffered comas diagnosed
    as Iresine Syndrome at the exact time of the visit, a pattern Geordi and Data
    uncover on the Enterprise bridge. This discovery casts the planet as ground zero
    for suspicion, its clinical logs exposing a link between Ullian telepathy and
    induced memory trauma mimicking known syndromes.
