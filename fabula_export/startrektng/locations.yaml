- fabula_uuid: ger_location_760ffc5356aa
  global_id: ger_location_760ffc5356aa
  canonical_name: Dyson Sphere (Northern Hemisphere Surface)
  description: The northern hemisphere surface of an immense, uncharted Dyson Sphere—a
    smooth, artificial megastructure the size of Earth's orbit—holds the crashed USS
    Jenolan, its distress signal pulsing faintly after 75 years. Data's scans detect
    minimal life support but no signs of life amid the vast, gravity-warping expanse.
    Picard and the bridge crew stare in astonishment at viewscreen images, speculating
    on ancient builders who harnessed a star's full output. The wreck's position draws
    Riker and Worf's away team, blending scientific awe with rescue urgency against
    an enigmatic, potentially inhabited relic.
  location_type: Megastructure Surface
