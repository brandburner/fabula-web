    grief collide. The threshold glows with a bluish forcefield whose hum punctuates
    hushed commands; footsteps and formal voices harden the air as Worf and sentries
    militarize the doorway. Anya steps from this interior with quiet resolve, turning
    personal farewell into ritualed transfer of duty. The space registers tactile
    touches, lowered gazes, and the mechanical sigh of the field collapsing, carrying
