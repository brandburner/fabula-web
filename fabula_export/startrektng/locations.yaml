- fabula_uuid: ger_location_52daa47f84d2
  global_id: ger_location_52daa47f84d2
  canonical_name: Orelious Nine
  description: 'A ruined planetary system ringed by the scattered bones of a long-ago,
    decisive battle. From Ten-Forward its horizon reads as a glittering, deadly ocean
    of broken hulls, armor shards, and frozen fusion plumes; sensors resolve intact
    but lifeless Promellian architecture embedded in the drift. The place smells of
    study and threat: historians hunger for preserved engines, engineers salivate
    at Lang Cycle relics, while crew members feel private grief at the scale of loss.
    Navigation in the field is tense and tactical — debris chews at shields and cloaks
    old traps — and the site functions as both archaeological trove and lethal museum
    of war.'
  location_type: Remote Planetary System / Battlefield Debris Field
  parent_location_uuid: null
