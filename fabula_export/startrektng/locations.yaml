  description: The USS Enterprise hangs motionless in orbit above Theta Eight. Starlight
    fractures across hull plating while console backlights pulse faintly from within;
    the ship’s exterior and the surrounding orbital void register as a cold, clinical
    vantage and helpless watchtower. Picard’s clipped supplemental log echoes through
    the vacuum, framing isolation and urgency as unseen sensors comb the planet below.
    Lost contact with an away team turns the empty black into an accusatory presence;
    this orbital expanse functions as both crucible and command stage where dread,
    tactical desperation, and operational decisions converge.
