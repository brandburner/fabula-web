- fabula_uuid: ger_location_3e544913924f
  global_id: ger_location_3e544913924f
  canonical_name: Detention Cell Wall Power Terminal Panel
  description: 'Geordi pries open the panel on the detention cell wall, revealing
    the power terminal''s exposed circuits and conduits. He connects the custom-built
    power line here, channeling energy to revive the weakened Borg drone amid sterile
    metal surroundings and humming forcefields. The spot anchors the scene''s tension:
    Worf stands guard nearby while the Borg recites assimilation threats, its pale
    form slumped against the opposite wall. Flickering lights from the terminal cast
    harsh shadows, blending technological precision with the ethical friction of aiding
    a captive enemy.'
  location_type: Starship Detention Cell Power Terminal
