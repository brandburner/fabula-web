- fabula_uuid: ger_location_372d2844342b
  global_id: ger_location_372d2844342b
  canonical_name: Planet Atlec
  description: Planet Atlec emerges in the diplomatic crossfire as a world steeped
    in pride and unyielding demands, its governance willing to threaten interstellar
    conflict over matters of honor. Though unseen in this moment, its presence looms
    large through Debin's aggressive ultimatums, painting Atlec as a society where
    protocol bends to wounded dignity. The planet's political will manifests in tense
    bridge communications—clipped threats cutting through Enterprise's viewscreen
    with the weight of an entire civilization's simmering grievances. Actions taken
    light-years away ripple back to this homeworld's corridors of power, where diplomatic
    slights transform into casus belli. Atlec flexes its sovereignty through proxy
    conflict, its unseen surface a silent player in this high-stakes standoff that
    could erupt into violence at any moment.
  location_type: Feuding Homeworld
