- fabula_uuid: ger_location_18daa78f8812
  global_id: ger_location_18daa78f8812
  canonical_name: Kavis-Alpha-Four
  description: 'Kavis-Alpha-Four stands as a remote, deliberately chosen refuge and
    quarantine world for an emergent nanite civilization. Orbital hush and calculated
    distance define its mood: sensor arrays and containment protocols edge the planet’s
    perimeter while low, modular facilities host containment and research operations.
    The place registers as both sanctuary and cage—clinical lights, humming diagnostics,
    and the metallic tang of maintenance air underscore the ethical weight of housing
    a sentient swarm. The planet functions narratively as a measured solution: a place
    where survival, stewardship, and containment collide.'
  location_type: Planetary Relocation and Containment Site
