  canonical_name: Close Orbit
  description: Close Orbit pins the Enterprise nearer the planet and the ruined research
    station, compressing reaction time and amplifying every sensor ping into urgent
    demand. Viewscreens flood with debris streaks and diagnostic readouts; consoles
    thrum beneath clipped orders as bridge officers convert observation into hunt.
    Sickbay and engineering measure a precise, five‑hour pulse; that ticking clock
    turns the orbit into a lever Picard can lift or drop. The stance feels tactical
    and intimate—maneuver margins thin, moral pressure mounts, and the ship’s exterior
    becomes a charged, claustrophobic vantage for rescue, accusation, and decisive
    action.
