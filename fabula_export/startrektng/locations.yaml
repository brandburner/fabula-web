  global_id: ger_location_57922967512a
  canonical_name: Romulan Capital
  description: 'An austere seat of Romulan authority centered on vast ceremonial space
    where power performs itself. Cold stone and dark metal monuments rise above broad,
    echoing plazas; angular architecture and high, flapping banners throw hard shadows
    that sharpen every silhouette. Cloaked warbirds linger in orbit like sentries
    while ground-level promenades ring with guarded viewing platforms and martial
    iconography. Functionally, the place operates as stagecraft for state triumph:
    a public showcase where trophies—such as a shattered starship hull—would be installed
    as propaganda to intimidate rivals and legitimize victory.'
