  global_id: ger_location_4488ca00fa77
  canonical_name: New Base
  description: A recently established Starfleet base invoked by Phillipa Louvois to
    explain thin JAG staffing and the logistical obstacles to convening a hearing.
    The base registers as an austere, under-resourced outpost with a skeleton administrative
    staff and stretched transport links; its infancy translates into delayed personnel
    rotations, constrained legal support, and a bureaucratic mindset that prioritizes
    operational demands over procedural ceremony. The mention functions as a concrete
    explanation for distant, slow, and costly legal logistics.
  location_type: Starfleet Base
