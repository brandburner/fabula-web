  global_id: ger_location_769107299d2d
  canonical_name: Federation Space (Maquis Border Region)
  description: Federation Space spans quadrants patrolled by Starfleet ships, linking
    member worlds through warp lanes and sensor networks. The Enterprise races back
    here from the galaxy's core, helm controls restored under Picard's command. Crew
    sensors pick up familiar signals—trade convoys, outpost beacons—replacing the
    alien void with structured territory where exploration meets diplomacy. Barclay's
    recovery and the Cytherians' farewell mark the shift to known stars.
