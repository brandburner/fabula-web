  global_id: ger_location_6d1beaee4bb8
  canonical_name: Lake of Lusor
  description: Kahless plunged his molten hair—cut and heated in rock—to quench in
    the Lake of Lusor's waters, hardening the first bat'leth and naming it after slaying
    tyrant Molor. This sacred lake anchors Klingon mythology, its cool depths meeting
    primal fire to birth their signature weapon. Revered as holy geography, the site
    fuses creation legend with cultural identity, evoking steam-hissed triumph amid
    ancient forges and battles.
  location_type: Sacred Klingon Lake
