  global_id: ger_location_5b3dc768ee4a
  canonical_name: Orbit of the Freighter Sanction Around the Fourth Planet
  description: Freighter Sanction drifts in a decaying orbit, an old and battered
    Ornaran cargo vessel crippled by failing systems and intense solar flare interference.
    Its hull shows scars of neglect and damage, while the crew aboard wrestles with
    technical incompetence and growing desperation. The freighter’s interior atmosphere
    is tense and fraught with confusion, marked by fractured command and a chilling
    detachment from impending doom. As the ship spirals toward atmospheric entry,
    the haunting electromagnetic interference it emits disrupts rescue attempts. The
    vessel holds a mysterious, coveted cargo—Felicium—that drives the crew’s obsessive
    and conflicted priorities amidst the crisis. This isolated and failing freighter
    becomes a crucible of human frailty, addiction, and ethical turmoil, ultimately
    succumbing to fiery destruction while leaving survivors clinging to the last vestiges
    of hope and survival.
