- fabula_uuid: ger_location_c573cd5eceb0
  global_id: ger_location_c573cd5eceb0
  canonical_name: Angosian Capitol (Capitol City of Angosia)
  description: The Angosian Capitol — the principal seat of government on the planet
    Angosia — is a restrained cluster of government buildings and ceremonial approaches
    that functions as both administrative center and high-value political stage. Its
    low-slung senate complex, plazas and avenues create a setting where diplomatic
    ritual and civic life meet volatile unrest; scenes and reports identify it as
    the destination for Roga Danar and the fleeing prisoners and as a potential flashpoint
    for violence and diplomatic crisis.
  location_type: Capitol Grounds / Government District (Exterior)
