  global_id: ger_location_c5c2c49ac921
  canonical_name: Launch Site
  description: 'A distant, mission-critical launch site registers on the Enterprise''s
    instruments as the fixed point toward which the crew drives. The site functions
    less as a place seen than as a deadline felt: countdown compresses time, orders
    harden, and every system reading tightens like a pulse. Approaching it provokes
    physical reverberations aboard the ship—jolts, thrown bodies, alarms—transforming
    procedural focus into raw urgency. The launch site''s presence converts navigational
    data into moral pressure, forcing command into damage control and desperate stabilization.'
  location_type: Orbital Launch Facility
