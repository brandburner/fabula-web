- fabula_uuid: ger_location_113958feeca7
  global_id: ger_location_113958feeca7
  canonical_name: Bajoran Aqueduct Systems
  description: Expansive network of aqueducts crisscrossing Bajor's surface, vital
    for water distribution but ravaged by Cardassian occupation forces. Shattered
    conduits and collapsed channels leak precious resources into parched valleys,
    forcing Bajoran engineers to prioritize reconstruction amid simmering post-withdrawal
    tensions. The Enterprise docks at DS9 specifically to lend Federation expertise,
    with Picard logging the urgent repair mission as crews navigate political fragility
    and infrastructure decay under Bajor's watchful gaze.
  location_type: Planetary Aqueduct Network
