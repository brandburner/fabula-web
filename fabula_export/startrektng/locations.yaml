- fabula_uuid: ger_location_3df6a86d8011
  global_id: ger_location_3df6a86d8011
  canonical_name: Perceived Horror Chamber (Sickbay)
  description: 'A nightmarish, non-physical prison that folds over Sickbay’s familiar
    geometry: fluorescent lights stutter into black bruises, instrument hums slow
    into distant heartbeats, and walls seem to inch inward with impossible angles.
    Time shivers here—present and a broken six-hours-later overlap—trapping a mute,
    terror-stricken duplicate in a looping pocket of sensation. The space feels claustrophobic
    and electric, designed less for containment than for exposure: it forces confronting
    futures, sustains a psychic panic that resists sedation, and converts bedside
    empathy into a tactical emergency.'
  location_type: Perceived Dimensional Trap (Sickbay-Adjacent)
