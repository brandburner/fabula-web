  global_id: ger_location_f5be9c551337
  canonical_name: Romulan Street (Bleak Neighborhood)
  description: Colorless, bleak street in a struggling Romulan neighborhood on Romulus.
    Pedestrians line up outside a general store amid oppressive poverty. A dimly lit
    café sits nearly empty, its patrons hunched over sparse meals. Residents hurry
    past without eye contact, amplifying paranoia under surveillance. D'Tan runs breathlessly
    to deliver coded signals like a flower or forbidden Vulcan book to Spock and Picard,
    who meet Senator Pardek here for secretive reunification talks. Suspicion from
    vendors and patrolling soldiers heightens the tension of underground operations.
  location_type: Impoverished Urban Street
