  global_id: ger_location_b5a9b78732db
  canonical_name: Molly's Bedroom (O’Brien’s Quarters, USS Enterprise-D)
  description: "\n    Molly's bedroom within the O’Brien family quarters aboard the\
    \ USS Enterprise-D, a space where the emotional fractures of the O’Brien family\
    \ are laid bare. The room serves as a microcosm of the family’s unraveling: Molly’s\
    \ cries for 'Mommy' pierce the tension between her parents, while the confined,\
    \ intimate setting amplifies the existential crisis of Keiko’s transformation.\
    \ The faint hum of the starship permeates the space, underscoring the tension\
    \ between domestic routine and the irreversible changes wrought by the childlike\
    \ form of Keiko. Dim lighting and close walls trap the palpable hurt of Young\
    \ Keiko and Molly’s confusion, turning this child’s sanctuary into a mirror of\
    \ the family’s disintegration.\n  "
