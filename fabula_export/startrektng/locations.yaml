- fabula_uuid: ger_location_9dccc1855f87
  global_id: ger_location_9dccc1855f87
  canonical_name: Unidentified Planet Surface (Yamato Probe Origin)
  description: 'A remote, unnamed planetary surface that furnishes the single, uncanny
    origin for the Yamato probe: a sparse, indifferent stretch of ground or low atmosphere
    from which a small translucent spherical device rises, its crackling, spider‑like
    energy streaking the air. The recorded vista offers little environmental context—empty
    horizons, raw planetary texture, and the probe as the sole active witness—so the
    place functions as forensic ground: a mute theater where a subtle alien artifact
    reframes a ship’s loss and forces command decisions. The surface reads as both
    origin and mystery, pressing investigators to treat terrain as evidence rather
    than backdrop.'
  location_type: Planetary Surface
