  global_id: ger_location_5c1babba59ac
  canonical_name: Starship Gorkon
  description: The Starship Gorkon races alongside the USS Enterprise through open
    space, its angular Klingon hull cutting a sharp silhouette against the starfield.
    Picard captures the sight in his captain's log from Main Engineering, where viewscreens
    display the parallel course. Engines pulse with restrained power, nacelles flaring
    as both vessels hold formation. The proximity demands vigilant sensor sweeps from
    bridge crews, the visual tandem heightening awareness of diplomatic maneuvers
    and shared trajectories amid interstellar voids.
