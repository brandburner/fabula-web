  description: Inmates gather in this supervised space within the Tilonian asylum,
    some seated in clusters chatting quietly, others pacing restlessly or staring
    blankly at walls under guards' watchful eyes. Worn tables and chairs fill the
    room, fluorescent lights buzz overhead casting stark shadows on scuffed floors
    thick with institutional tension. Riker sits here lost in dissociation as Beverly
    Crusher approaches disguised as a doctor, her tricorder scan and urgent whispers
    failing to break through his delusions amid the low hum of activities and murmured
    voices.
