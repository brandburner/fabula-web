  global_id: ger_location_eccc1b7d5364
  canonical_name: Off-Screen Street Corner (Holodeck Brooklyn Streets)
  description: Shadows swallow this off-screen corner on the Holodeck's deserted Brooklyn
    street, steps from the subway exit. The Hitman ducks into hiding here, his furtive
    dash pulling Troi and Worf into pursuit while Data stays behind. Moments later,
    a rogue 1940s taxi barrels toward Data, then vanishes into the same shadowed nook.
    Empty pavement stretches under overcast skies, buildings loom silent, and the
    air hums with simulated tension as the Holodeck's intelligence turns hostile.
  location_type: Holodeck-Simulated Urban Street Corner
