  canonical_name: Lagrange Point behind Rana Four's Outer Moon (shadowed tactical
    staging area)
  description: 'A dead‑still orbital pocket located directly behind Rana Four''s outermost
    natural moon where gravitational equilibrium and permanent shadow create a sensor‑blind
    staging area. Vessels can ''ride'' this invisible shelf—hulks held in gravitational
    equipoise and vectorally concealed from routine sweeps—allowing a predator to
    wait motionless until it chooses to strike. The point blunts sensors and tactical
    lines, producing a cold, patient, and unreadable vantage used for covert ambush
    in the Rana Four system (appears in Star Trek: TNG, episode ''The Survivors'').'
  location_type: Orbital Lagrange Point (Staging Area)
