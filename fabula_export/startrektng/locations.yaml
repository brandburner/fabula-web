- fabula_uuid: ger_location_ebb4e854e4f8
  global_id: ger_location_ebb4e854e4f8
  canonical_name: Second Planet, Braslota System
  description: 'Cold and mapped in schematic blue, the second planet of the Braslota
    System hangs beneath the Hathaway as the aged starcruiser orbits its upper atmosphere.
    Sensors return a silent, disciplined world — ringless or faintly banded, muted
    in color under distant starlight — that functions as a tactical stage more than
    a characterful homeworld. The planet''s presence hardens the Observation Lounge:
    coordinates translate into pressure, orbital vectors become moral stakes, and
    the quiet bulk of the world anchors a clinical war‑game. Characters feel its gravity
    as a backdrop for testing command, strategy, and reputation under an unforgiving
    forty‑eight‑hour clock.'
  location_type: Planet (Second Planet of Star System)
  parent_location_uuid: null
