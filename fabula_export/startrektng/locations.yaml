  global_id: ger_location_e3e2640c852b
  canonical_name: Planet's Surface
  description: Picard and Dathon occupy this remote site, cut off after Tamarians'
    phaser strike cripples Worf's shuttle nacelle and thrusters mid-descent. Unable
    to land or depart, the surface enforces total isolation, amplifying pressure on
    Enterprise crew to decode Tamarian metaphors. Crew experiences it as an unreachable
    void—tense, foreboding—where Picard's survival tests diplomatic limits amid stalled
    rescue and 24-hour transporter delay.
  location_type: Alien Planet Surface
