  canonical_name: Salia's Quarters (USS Enterprise)
  description: 'Reserved, formally appointed suite aboard the USS Enterprise used
    by Salia (head-of-state). The space reads as an admiralty-level suite: antechamber
    leading to a parlor and sleeping alcove, softened lighting, diplomatic furnishings,
    and discrete security — designed to provide privacy while signalling formal respect
    and ceremonial function. On-screen usage in ''The Dauphin'' matches the source:
    protocolized doorway/threshold behavior, guarded access, and scenes involving
    Picard, Riker, Data, Worf and Wesley.'
