- fabula_uuid: ger_location_62306ce3e711
  global_id: ger_location_62306ce3e711
  canonical_name: Hidden Storage Area in Colony Laboratory
  description: 'The Colony Laboratory stands as a haunting monument to synthetic origin,
    an advanced yet deserted research facility on Omicron Theta where Data’s enigmatic
    beginnings unravel. Sterile and sophisticated, its silent halls harbor chilling
    revelations: a human-shaped epidermal mold identical to Data’s exterior, children’s
    drawings hinting at the colony’s doom, and hidden caches of android parts that
    suggest a shadowed sibling. This cavern of forgotten technology pulses with eerie
    stillness, where the echoes of Doctor Noonien Soong’s genius and the weight of
    abandonment collide, forcing the crew to confront the fragile boundary between
    creation and identity.'
  location_type: Storage Area
