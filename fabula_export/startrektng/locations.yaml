  canonical_name: Glade in Holodeck Two
  description: Holodeck Two runs the Shiralea VI colony program, transforming into
    a sunlit glade buzzing with free spirits. Wind dancers greet arrivals with flowing
    scarves, fire artists sculpt flames from breath, and jugglers rally crowds for
    laughing hours and mudbaths. Lovers bicker in absurd loops until a poet's phrase—'The
    higher, the fewer'—silences them, sparking Alexander's embrace of joyful illogic.
    Lwaxana dives into the tactile chaos, contrasting the Enterprise's rigid order
    and fueling personal rebellion.
