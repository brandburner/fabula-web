  description: Steel walls seal this compact enclosure inside the biolab, its single
    wide window framing a lush artificial habitat of tangled branches and dim mist.
    Corvan Gilvos cling to perches, their iridescent skins shifting to match bark
    and leaves in perfect camouflage. Children press close to the glass, breaths fogging
