  global_id: ger_location_777410c913c8
  canonical_name: Brechtian Cluster
  description: Data projects the Brechtian Cluster as one of two possible destinations
    for the Crystalline Entity, a star cluster containing two inhabited planets that
    face destruction if the Entity arrives. This revelation sharpens the crew's moral
    dilemma between annihilation and communication. Earlier, the cluster marks the
    Entity's suspected prior location and serves as the general directional reference
    guiding the Enterprise's pursuit through space.
