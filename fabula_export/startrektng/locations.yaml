  global_id: ger_location_fba042b2c0d2
  canonical_name: Science Two (Bridge Science Station) — Main Bridge, USS Enterprise‑D
  description: 'A compact science console positioned on the Enterprise‑D’s main bridge,
    Science Two hums with focused instrumentation and diagnostic feeds. Panels flood
    with coil analysis readouts, cascading graphs, and terse status messages; tactile
    controls click under gloved hands while a low processor tone underwrites the tension.
    Officers lean in over narrow sightlines, triangulating anomalous coil behavior
    and running iterative diagnostics. The space functions as an analytical outpost
    in a ship‑wide crisis: clinical, urgent, and electrically charged with problem‑solving
    pressure.'
  location_type: Starship Bridge — Science Console
