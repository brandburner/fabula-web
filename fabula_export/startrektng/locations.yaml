- fabula_uuid: ger_location_8b7e3f808738
  global_id: ger_location_8b7e3f808738
  canonical_name: Iconia Launch Site
  description: 'A Iconian launch facility on Iconia that functions as the suspected
    origin point for active Iconian probes and as the repository for launch records
    the away team must retrieve. The site combines features of an offworld industrial
    scar — silent runways, ruined infrastructure and lingering electromagnetic interference
    — with internal launch infrastructure: cavernous launch bays, heavy blast-doors,
    ringed vents and conveyor gantries that feed sleek autonomous devices into space.
    The atmosphere is one of mechanical strain and ozone; tactically it is both the
    source of world‑shaping hardware and a focal point for denial and sabotage operations.'
  location_type: Planetary Launch Site
  parent_location_uuid: null
  season_appearances:
