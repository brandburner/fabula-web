  global_id: ger_location_ca0d3ca29215
  canonical_name: Forcas III
  description: Forcas III hosts the brutal Bat'leth tournament where Worf wins Champion
    Standing amid harsh conditions that maim several contenders. Warriors clash with
    curved blades in tests of Klingon honor and skill, their roars and blood marking
    fierce ritual combat on this remote world. Worf returns via shuttlecraft polishing
    his trophy Bat'leth, his recalled triumph soon undermined by falsified ship logs
    and Riker's denial of the event, anchoring the quantum anomaly's assault on his
    reality.
  location_type: Inhabited Alien Planet
