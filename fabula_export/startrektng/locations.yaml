  canonical_name: Karst Terrain Surrounding the Duck Blind
  description: A fractured, sinkhole-pocked karst field ringed around a solitary duck
    blind, where thallium-rich bedrock and hidden caverns stitch the ground into an
    irregular, treacherous tapestry. Damp air carries the hollow echo of subterranean
    rivers; sudden voids gape with black mouths, and the surface hides complex cave
    networks that scatter footprints and scatter sensors. The terrain actively masks
    biosignatures and complicates rescue and detection, lending the area a claustrophobic,
    uncanny menace and forcing agonized strategic choices.
