  description: Picard and Data follow the scientist through this tunnel on Devidia
    II, where mining lights line the walls and cast stark beams across jagged rock
    surfaces. The passage hums with faint mechanical echoes, cool damp air clings
    to exposed stone, and shadows deepen as it slopes toward the underground cavern.
    Harsh illumination reveals tool marks from past excavations, heightening tension
