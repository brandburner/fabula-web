- fabula_uuid: ger_location_2ba6c727b876
  global_id: ger_location_2ba6c727b876
  canonical_name: Utopia Planitia — Drafting Room Five
  description: 'Cold metal frames and pinboard-lit alcoves converge in Drafting Room
    Five at Utopia Planitia, a restricted engineering enclave where nascent starship
    designs live under lock and code. Fluorescent strips bathe rolled schematics in
    clinical light while low fans and server hums stitch time to urgency. The air
    tastes faintly of ozone and machine oil; reaching for a prototype blueprint here
    feels like prying open a future under oath. The room functions as both technical
    archive and clandestine workshop: a precise, pressured space that channels desperate
    problem-solving and guarded institutional authority toward one high-stakes outcome.'
  location_type: Starbase Engineering Drafting Room
