  global_id: ger_location_07ba9bbc786d
  canonical_name: Mining Shuttle (Nenebek) Interior
  description: The cramped interior of the Nenebek mining shuttle, where the crew
    huddles during a catastrophic descent to Lambda Paz moon. Explosions rip through
    systems, sparking fires and filling the air with thick smoke as consoles flicker
    and alarms wail. The hull temperature climbs to 700 degrees during the violent
    descent, culminating in a crash that leaves the survivors stranded amid failed
    panels and lingering sparks. Key events include Picard seizing controls from Dirgo,
    Wesley scanning ahead, and the shuttle's port thruster exploding, threatening
    the main impulse engine and navigation systems.
