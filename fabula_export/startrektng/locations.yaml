  global_id: ger_location_48e4e5816058
  canonical_name: United States of America
  description: 'A mid‑century American backdrop invoked in a 1945 San Francisco holodeck
    program: rain‑slicked streets, neon glows, fog rolling off the bay, and the cadence
    of wartime return and postwar relief. The country registers here as a cultural
    and temporal frame—lawmen in trenchcoats, jittery jazz from a corner club, and
    an urban density that shapes noir psychology. It functions less as a geopolitical
    abstraction and more as an atmospheric container for mood, social rituals, and
    period codes that characters inhabit and exploit within the simulated scene.'
