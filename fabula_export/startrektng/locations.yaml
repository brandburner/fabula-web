  canonical_name: City of Troy
  description: Galen names the City of Troy, site of Schliemann's excavation, as the
    pinnacle of archaeological discovery. This ancient place turns legend into stone
    through persistent digs that unearth buried walls and epic history. He deploys
    the reference in Ten Forward's subdued light to ignite Picard's abandoned passion,
