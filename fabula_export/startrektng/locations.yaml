  canonical_name: Beverly Crusher’s Office (Enterprise-D Sickbay)
  description: 'Beverly Crusher''s compact office in Enterprise-D Sickbay hosts private
    confrontations that mix clinical duty with raw emotion. Kareel, carrying Odan''s
    symbiont, meets Beverly here for a final reckoning: gratitude for the transfer
    yields to heartbreak as Beverly ends their bond, unable to adapt to Trill host
    cycles. Diagnostic panels hum amid medical reports and a bittersweet kiss seals
    the farewell. Enclosed walls intensify personal stakes, echoing prior urgent consultations.'
  location_type: Starship Sickbay Office
