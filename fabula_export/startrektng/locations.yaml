  canonical_name: Garadius Four
  description: Garadius Four draws the Enterprise at warp speed as Picard's priority
    destination. A deteriorating diplomatic situation grips the planet, fueling his
    urgency to intervene before tensions erupt into conflict. Crew discussions reveal
    high stakes in fragile negotiations, with the world positioned as a flashpoint
    for interstellar relations. Picard overrides delays, underscoring the planet's
    precarious balance between alliance and breakdown.
