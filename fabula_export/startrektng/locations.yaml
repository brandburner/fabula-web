- fabula_uuid: ger_location_6ac670029ade
  global_id: ger_location_6ac670029ade
  canonical_name: Jouret IV Colony Site (Borg-Scarred Surface)
  description: "\n      A planetary colony site on **Jouret IV**, ravaged by Borg\
    \ assimilation, where night cloaks the surface in eerie silence. The area is marked\
    \ by **twisted debris, anomalous energy readings, and scars of cybernetic destruction**,\
    \ serving as the epicenter of a lingering Borg threat. Dawn breaks over the site\
    \ as Shelby and Data scan the soil, detecting **magnetic-resonance traces** that\
    \ confirm Borg activity. Riker and Geordi materialize into this location, where\
    \ Shelby reveals her unauthorized findings amid a heated clash over command authority.\
    \ The barren ground holds **irrefutable evidence of the invasion**—subtle signatures\
    \ in the dirt that shift the mission from outpost mystery to full-scale threat.\
    \ Tension grips the away team under pale light, the planet's quiet expanse amplifying\
    \ their fractured unity and the Borg's looming shadow. The absence of colonists\
    \ and the haunting atmosphere—chilled winds, sensor ghosts, and the weight of\
    \ Starfleet's response—underscore the site's critical role in tracing the Borg's\
    \ residual influence.\n      "
  location_type: Planetary Colony Site
  parent_location_uuid: ger_location_e4eae6cd3950
