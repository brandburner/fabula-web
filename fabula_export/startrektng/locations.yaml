  global_id: ger_location_fd829ef8b929
  canonical_name: Clouded Planet Surface
  description: 'A shadowed, clouded alien world sprawls beneath misted skies where
    an away team moves across uneven ground toward a covert launch site. The air tastes
    of ozone and static; distant flora and jagged outcrops catch the sickly glow of
    a mechanical probe as it arcs skyward. Seconds later the probe’s detonation in
    orbit vomits a pulse that cripples a Romulan cruiser and molecularly disintegrates
    a transport. Radios spit with broken syllables, suits flicker with failing systems,
    and the terrain compresses into a single urgent choice: retrieve the team or preserve
    the ship. The planet operates as a remote trigger point whose hidden defenses
    and inscrutable technologies escalate tactical, moral, and geopolitical stakes.'
