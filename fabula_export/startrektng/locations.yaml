  global_id: ger_location_159666bfd1d3
  canonical_name: Holodeck New York-Style Nightclub Simulation
  description: A holodeck entertainment simulation that recreates a 20th-century New
    York–style nightclub. The environment blends dim, neon-tinged walls and velvet-upholstered
    booths with haze from synthetic smoke and laser/ambient lighting; holographic
    patrons crowd around tables while jazz-infused basslines and layered conversations
    form an oppressive wall of sound. A small elevated stage with faux-brick/faux-candle
    ambience and a lone microphone stand hosts phantom performances — notably Data
    attempting a comedy routine whose mechanical timing triggers programmed waves
    of applause and exposed hollowness. Sensory details include holographic whiskey
    and stale tobacco scents, rows of untouched cocktail glasses, and the simulation’s
    collapse into emergency lighting and the deactivated black-and-yellow holodeck
    grid. Functionally, this recreation serves as Data’s laboratory for humor and
    a commentary on authenticity versus performance.
  location_type: 'Holodeck Simulation: Nightclub'
