  description: Geordi mans the engineering console on Brattain's bridge, a tight control
    center lined with humming computers and science stations. Data taps at auxiliary
    panels while Riker issues orders from the command area. Screens show green across
    all systems, but the engines refuse to start, baffling the team. Frustration mounts
