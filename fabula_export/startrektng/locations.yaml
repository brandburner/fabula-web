  global_id: ger_location_d8766a80d329
  canonical_name: Kazis Binary System
  description: Twin stars grind in a tight, unforgiving embrace, their paired gravity
    wells bending trajectories into a lethal ballet. On the bridge, a tiny, centuries‑old
    satellite appears as a fragile dot on the viewscreen, tracked helplessly toward
    those crushing orbits. Cold stellar light fractures across instrument panels;
    warning chimes pulse; crew members feel time compress into a moral deadline. The
    system reads as an imminent tribunal — a remote, violent arena that forces urgent
    choices about preservation, risk, and duty.
  location_type: Binary Star System
