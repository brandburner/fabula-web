- fabula_uuid: ger_location_f4240ec2a5e4
  global_id: ger_location_f4240ec2a5e4
  canonical_name: Rugged Slope
  description: Picard and Beverly Crusher edge down this brush-covered slope under
    daylight, their escape from the Prytt leaving them physically drained. Thick vegetation
    claws at uniforms, loose earth slips under boots, forcing cautious steps amid
    mounting exhaustion. They separate to test the telepathic bond's range—nausea
    grips them instantly, dizziness drops them, tricorder rules out injury. The terrain
    witnesses their raw confrontation with invasive thoughts bleeding between minds,
    professional walls crumbling into unwanted intimacy and shared dread.
  location_type: Rugged Planetary Slope
  parent_location_uuid: null
  season_appearances:
