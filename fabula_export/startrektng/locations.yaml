  description: Tau Alpha C anchors Beverly Crusher's unraveling memories as Dr. Quaice's
    last known destination, a remote planet she demands the Enterprise reach amid
    red alert klaxons on the bridge. The computer first confirms it exists, then denies
    all records and blocks course changes, stranding her in doubt. Wesley targets
    a subspace distress call there from the observation lounge, but the Traveler reveals
    it bypassed conventional channels. Crew debates pierce the tense air, where fading
    life signs and reality's fragility press against bulkheads and consoles.
