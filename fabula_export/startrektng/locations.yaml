  global_id: ger_location_9c6d17537b72
  canonical_name: Darwin Laboratory - Secondary Lab
  description: The Darwin Laboratory hums with the silent tension of impending doom,
    its sterile surfaces reflecting the pale glow of bioscanners and genetic sequencers.
    The secondary lab specifically serves as the site of Dr. Pulaski's desperate efforts
    against the rapid-aging contagion, with stark white lighting bouncing off sterile
    surfaces and workstations crammed with bioscanners and DNA sequencers forming
    islands of purpose in the clinical space. The air carries the sharp tang of sterilization
    protocols, underscoring containment measures. This auxiliary research space becomes
    both refuge and prison where scientific resolve clashes with protective instincts.
