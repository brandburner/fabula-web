  global_id: ger_location_7de1b34d4997
  canonical_name: Heat Chamber in Manheim's Laboratory
  description: A towering, 20-foot tall silo-like heat chamber dominates the heart
    of Manheim's laboratory, emanating lethal waves of scorching heat and oxygen depletion.
    Its imposing steel interior challenges Riker's endurance as he ascends to perform
    a critical microchip swap under a ticking self-destruct countdown. The chamber’s
    oppressive atmosphere blends technological peril with raw physical trial, while
    the heavy steel doors fight to shut automatically, held at bay by Worf’s brute
    strength. This crucible of heat and imminent destruction crystallizes the crew’s
    desperate resolve and unity in the race to avert catastrophe.
  location_type: Laboratory Heat Chamber
