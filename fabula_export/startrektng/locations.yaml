- fabula_uuid: ger_location_509624d7370c
  global_id: ger_location_509624d7370c
  canonical_name: Orbit Above Angosia's North Pole
  description: 'A cold, magnetically noisy band of space hovering directly over Angosia''s
    northern polar cap, where intense polar magnetics smear and mask sensor returns.
    Instruments stutter under a shifting electromagnetic veil; faint glints of a small
    transport resolve and vanish as the craft uses the pole''s interference to feint
    and hide. The void feels intimate and claustrophobic from the ship’s displays—auroral
    currents and magnetized turbulence translate into tactical uncertainty, a theatre
    for diversionary suicide runs and furtive ejections. On the bridge this orbit
    converts technical ambiguity into political peril: a place where concealment becomes
    a weapon and retrieval decisions carry immediate diplomatic weight.'
  location_type: Planetary Polar Orbit
  parent_location_uuid: ger_location_3a97c22a5f91
