    walls close in on the vaulted cul-de-sac, amplifying echoes of scraping tools
    and Sovak's frantic bare-handed clawing after the Tox Uthat fails to appear. Dim
    light catches sweat-streaked faces amid standoff tension; the Vorgons observe
    silently before departing. Dirt piles ring the edge, marking futile obsession—Sovak's
    descent into madness leaves the hole as a stark, empty testament to shattered
    greed.
