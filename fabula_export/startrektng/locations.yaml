  canonical_name: Klingon Space Orbit (Civil War Conflict Zone)
  description: Two Klingon warships lock into silent confrontation in orbit through
    Klingon space—one traditionalist, the other modernist loyalist. Hulls align amid
    charged weapons and starry void, no hails exchanged. Visual tension mounts as
    factions hold position, mirroring the Empire's ideological split and civil war
    brink. Vacuum enforces isolation, every hull contour and glowing disruptor bank
    amplifying the standoff's gravity and Worf's divided loyalties. Broader zone sees
    Enterprise ambushes by Birds of Prey, shield strains, and system failures underscoring
    survival stakes.
