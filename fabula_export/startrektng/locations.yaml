  global_id: ger_location_e5107612dc90
  canonical_name: Dytallix B
  description: Dytallix B emerges as a remote, hostile mining planet scarred by abandoned
    tunnels and extreme environmental conditions. Its desolate surface stretches under
    a bleak sky, echoing isolation and danger. The planet’s harsh, uninhabited terrain
    harbors a secretive undercurrent of conspiracy and distrust, as Starfleet’s Captain
    Picard braves its forbidding mines alone amid detected life signs. The air carries
    the weight of covert operations, hidden threats, and fractured loyalties, making
    Dytallix B a crucible of silent tension where survival hinges on stealth and resolve.
  location_type: Hostile Mining Planet
