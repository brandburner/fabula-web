  canonical_name: Troi's Bathroom (USS Enterprise-D)
  description: Within Counselor Deanna Troi's quarters on the USS Enterprise-D, this
    compact washroom holds a mirror that triggers Troi's hallucinatory terror. She
    presses against the opposite wall, body rigid, face drained of color after her
    reflection morphs into an alien presence. Her scream draws Worf bursting through
    the door, turning the tight space into a nexus of raw fear and urgent intervention.
    Cool lighting casts stark shadows, amplifying isolation amid the quarters' personal
    confines as psychological fracture takes hold.
