  global_id: ger_location_244be20d6524
  canonical_name: Reception Area
  description: The Reception Area aboard the Enterprise and the Starfleet Admirals’
    Meeting Room function as adjacent or closely connected formal spaces within Starfleet
    contexts where political suspicion, veiled accusations, and strategic confrontations
    occur. Both spaces serve as charged antechambers for high-ranking officers confronting
    ideological divides and covert betrayal within Starfleet’s highest ranks. They
    share involvement of Admirals Savar and Aaron, Picard, and others, with similar
    atmospheres of mistrust and tension, supporting consolidation into a single canonical
    entity representing the formal reception zone within the episode 'Conspiracy.'
