  canonical_name: Yamato Engineering Section — Antimatter Containment Chamber
  description: 'The Yamato''s engineering section housing the antimatter containment
    chamber: a cramped, mechanical locus where magnetic seals and containment housings
    fail, producing scorched conduits, collapsing magnetic rims, and an escalating
    antimatter release that serves as the origin point for the ship''s catastrophic
    failure. Diagnostic schematics and forensic analyses present the space as the
    epicenter of the incident—smoke-tinged air, intermittent readouts, red alarms,
    and warped access hatches mark the scene; the chamber''s failure transforms a
    rescue into a crisis.'
