  global_id: ger_location_45efe338a595
  canonical_name: Planet Surface — Field Generator Site
  description: 'A remote, wind-swept stretch of planet surface that houses the field
    generator installation: a cluster of mirror coils and battered conduit arrays
    bristling against a barren horizon. Electrical breaths puncture the quiet in a
    metronomic cadence, each repeating planetary discharge leaving a metallic aftertaste
    on the air and a low, resonant rumble underfoot. The site reads as an instrument
    as much as infrastructure — lenses and reflectors arranged to catch and reshape
    ambient lambda sparks into focused Krieger Waves. For investigators, the place
    feels forensic: every echo and timing pattern becomes evidence, every scorch and
    alignment a clue to intentional timing and lethal design.'
