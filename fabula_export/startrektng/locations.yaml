  description: A remote swath of the Gamma Quadrant that crackles in sensor readouts
    and recedes from every attempt at direct sight. The Denkiri Arm arrives as probe
    telemetry — a distant destination beyond a transient wormhole, mapped in spikes
    of particle flux and truncated signal echoes. Instruments record empty coordinates
    where a destination should be; the region tastes of cold radiation and static,
    carrying the uneasy promise of instant transit and the political peril of unknown
    borders. Exact stellar landmarks remain unobserved; knowledge rests on a single
    probe's emergence and the consequences it sparks.
