- fabula_uuid: ger_location_60a5dc8d284a
  global_id: ger_location_60a5dc8d284a
  canonical_name: Lumar Cafe
  description: Steam rises from chipped ceramic cups as a neon LUMAR sign flickers
    over a narrow counter; the cafe hums with low conversation, the clatter of plates,
    and the bitter tang of fried oil. Servers weave between cramped tables, while
    a shadowed back service corridor leads to a small storage room and the street
    door. The Lumar Cafe functions as a quotidian workplace and neighborhood gathering
    point whose ordinary rhythms are violently ruptured by an explosion and a linked
    kidnapping—transforming the space into a source of eyewitness testimony, local
    gossip, and lingering unease for staff and patrons alike.
  location_type: Neighborhood Cafe (Commercial Dining Establishment)
