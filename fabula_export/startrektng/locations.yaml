  global_id: ger_location_5d69386028b5
  canonical_name: Thallium-Rich Karst Cavern Network
  description: Jagged karst caverns yaw beneath the planet’s surface, their cold air
    tasted with metallic dust from thallium-rich bedrock. Dripping stalactites and
    narrow sinkholes carve a dim, echoing labyrinth where footsteps vanish and biosensor
    returns flatten into static. Hidden alcoves and mineral-lined chambers can hide
    fragile life, turning the subterranean maze into both refuge and moral crucible
    as urgent medical stakes collide with the danger of contamination and misread
    signals.
  location_type: Planetary Subterranean Cave System
