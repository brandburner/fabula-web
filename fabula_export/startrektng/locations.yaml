- fabula_uuid: ger_location_875c999b8b9a
  global_id: ger_location_875c999b8b9a
  canonical_name: Romulan Ship
  description: 'A distant, hostile‑flagged vessel that receives a materialized subject
    the moment the Enterprise reclaims a failing transporter lock. The ship’s presence
    registers as a cold, unreadable silhouette on sensors—metallic hull, sealed compartments,
    and an atmosphere of diplomatic peril. Crew reactions snap from technical alarm
    to strategic dread: lost lock, sudden reappearance aboard an other‑party vessel,
    and the instant need to weigh rescue against escalation. The space functions as
    an offstage opponent whose existence transforms a technical malfunction into a
    high‑stakes political and tactical crisis.'
  location_type: Romulan Science Ship
