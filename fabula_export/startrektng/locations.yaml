  global_id: ger_location_74a59a4ac223
  canonical_name: Governor Vagh's Office
  description: Night shadows fill Governor Vagh's office as he confronts Picard, Riker,
    and Kell, slamming a Federation phaser rifle onto his desk to accuse Starfleet
    of arming Kriosian rebels. Picard defuses fury with a Klingon honor oath, demanding
    analysis aboard the Enterprise. Geordi later pierces the tension, exposing the
    rifle's Romulan discharge crystals amid Vagh's skepticism. The room enforces uneasy
    neutrality between Klingon aggression and Federation restraint, rifle at center
    of alliance-testing crisis.
