  global_id: ger_location_89bec4941014
  canonical_name: Guest Lounge — USS Enterprise (NCC-1701-D)
  description: 'Soft LCARS light pools over curved seating and polished bulkhead glass
    in the Enterprise guest lounge. A low mechanical hum and filtered airflow hold
    the room in clinical calm as officers tend to bewildered 20th‑century cryo‑survivors.
    Upholstered benches, low glass tables, a compact display console, and a service
    alcove frame close, intimate conversation: Beverly Crusher checks vital signs,
    Data supplies temporal context with machine precision, and Riker offers quiet,
    authoritative reassurance. The lounge functions as a refuge and processing chamber
    where private grief, social disorientation, and Starfleet procedure collide under
