  global_id: ger_location_2d30edbce873
  canonical_name: Pond in Betazed Clearing
  description: This pond lies in a secluded daytime clearing on Betazed, its still
    waters catching tossed Ferengi daisies as Lwaxana Troi rejects Daimon Tog's gift
    with contempt. Surrounding greenery frames tender moments—Riker and Deanna touch
    a nearby Muktok plant, its melody stirring old romance—before Lwaxana's picnic
    intrudes and Tog's transporter beam abducts them all. Breezy tranquility yields
    to tension, the pond witnessing disdain amid rising chaos.
  location_type: Planetary Clearing Pond
