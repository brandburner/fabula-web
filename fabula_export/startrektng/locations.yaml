  description: Tight confines buzz with emergency activity as Berel and Tava rush
    Riker inside post-mob attack. Specialized tools hum and slice precisely to mend
    his aggravated telencephalin and other wounds. Harsh lights beat down on the operating
    table; antiseptic sharpness fills the air. Krola peers through the window, phaser
