    vessel Artemis set course for — a named destination that lives primarily in crew
    briefings and origin stories rather than as lived geography. Referenced to explain
    why a community of settlers exists where they do, the place functions as a vanished
    point of origin: an absent shore that shapes identity, legal claims, and the bitter
    irony of an accidental settlement. Its presence feels bureaucratic and mourned,
