  description: 'A promised parcel of territory invoked as political capital: an allocated
    sweep of land designated by Sovereign Marouk to placate and uplift the Gatherer
    people. The place exists primarily as a commitment voiced in ceremonial negotiation—imagined
    as refuge, economic lifeline, and guarantee of dignity. Its presence tastes of
    diplomacy and tempered hope, carrying the dampened urgency of a bargain made aboard
    a contested ship, and it functions as both remedy and bargaining chip until cartographic
    lines and enforcement give it substance.'
