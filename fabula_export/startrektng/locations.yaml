  global_id: ger_location_a2c77b6a8b32
  canonical_name: Nelvana System
  description: 'A sparsely lit star domain that centers on the barren world Nelvana
    Three, the Nelvana System reads as a strategic void: empty on sensors yet charged
    with political tension. Bridge consoles show magnified, featureless star charts
    as Data isolates sweep after sweep and returns no anomalies. The silence tastes
    like a trap — a stage for deception and a crucible for command judgment — where
    delayed orders, Romulan decloaks, and one man''s shattered honor collide against
    a cold, indifferent stellar backdrop.'
  location_type: Star System
