- fabula_uuid: ger_location_fc9b64b56757
  global_id: ger_location_fc9b64b56757
  canonical_name: Acamar Three
  description: 'Acamar Three commands the story’s moral and logistical axis: a sovereign
    seat of power and the promised refuge that Picard seeks to offer the Gatherers.
    Dusted continents and distant orbital lanes frame a planet that feels both ancestral
    and transactional—Marouk’s title, the site of a century‑old schism, and the place
    where displaced people might reclaim home. Data streams pulse up from planetary
    archives to the Enterprise: medical repositories and civil databases arrive as
    forensic lifelines. The world radiates diplomatic gravity and wounded memory,
    a place of ceremonial amnesties, political theater, and the raw hope of reunification
    that drives decisions aboard the ship.'
  location_type: Planetary World
