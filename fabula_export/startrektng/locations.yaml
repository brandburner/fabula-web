  global_id: ger_location_749effb537a8
  canonical_name: Devala Lake
  description: Geordi recalls Devala Lake's broad waters during a sailing outing where
    Data topples overboard in full uniform, arms flailing before he sinks then surfaces,
    prompting Geordi's unrestrained laughter. Sunlight dances on ripples; shore grass
    yields underfoot. The site cements their bond through mishap and mirth, now invoked
    as a poignant tether to Data's buried ethics amid looming betrayal.
