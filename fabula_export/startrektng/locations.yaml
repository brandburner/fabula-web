  global_id: ger_location_d7ce55356726
  canonical_name: Outpost Sierra Six
  description: 'A remote Neutral Zone sensor outpost broadcasting terse, clinical
    telemetry across long-range channels. Windless void and engineered metal mark
    its presence: low-profile antennae and armored sensor domes, blinking status lights,
    and encrypted uplinks that spit precise contact data. From the Enterprise bridge
    its voice arrives as a single confirming ping—objective, detached, and decisive—translating
    distant motion into tactical certainty. The outpost functions as a cold-eyed sentinel
    whose confirmation forces command-level choices between protocol and humanitarian
    impulse.'
  location_type: Neutral Zone Sensor Outpost
