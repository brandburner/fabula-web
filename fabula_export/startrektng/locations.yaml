  canonical_name: Main Control Room
  description: The Main Control Room commands tense authority as a remote technical
    nerve center within the Velara III terraforming base. Geordi and Bensen anchor
    themselves at flickering consoles, orchestrating power shutdowns and monitoring
    the hydraulics room and laser drill systems through a bank of screens and controls.
    The room hums with urgent energy, its modest space layered by the invisible threat
    looming in the sabotaged machinery. Communication pulses here—every alert, command,
    and status update converges in this hub, where the fragile balance between safety
    and catastrophe is held by a few expert hands. The atmosphere tightens with suspicion
    and focus, as the unseen enemy weaponizes the base’s own systems against them,
    turning this otherwise quiet control chamber into the frontline of a deadly technological
    conflict.
