  canonical_name: Marr's Quarters
  description: Dr. Marr's quarters provide a cramped, dimly lit sanctuary aboard the
    starship, thick walls sealing in her unraveling grief. Personal effects surround
    her as she forces Data to impersonate her dead son Renny, seeking validation for
    her vengeful acts. Data's precise, emotionless recitation of Renny's disapproval
    echoes off the bulkheads, her delusions fracture, eyes glaze, and isolation deepens
    the emotional void left by shattered illusions.
