  canonical_name: Orbit Above Devidia Two
  description: The Enterprise holds steady orbit above Devidia Two, positioned over
    the planet's surface where a 19th-century cavern hides Data's severed head amid
    alien temporal activity. Bridge crew pores over readouts, piercing the hyperionized
    atmosphere with sensors while frustration builds over disrupted signals. Picard
    directs operations from this vantage, launching away teams to confront the threat
    below and coordinating the crew's response to Data's endangered fate.
