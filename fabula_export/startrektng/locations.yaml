  canonical_name: Tanugan Lab (holodeck forensic reconstruction)
  description: 'A holodeck-recreated forensic laboratory space used in the TNG episode
    "A Matter of Perspective": compact, clinical workroom with low modular benches,
    banks of consoles and diagnostic displays, and a prominent Lambda-field generator.
    Holographic figures (including Riker and Nel Apgar) are projected among assay
    racks and glass screens while a single workstation blinks with diagnostic traces.
    Projected readouts and overlays (used by characters such as Krag) convert routine
    instrumentation into visual evidence; the environment conveys antiseptic recycled
    air, faint ozone, and taut stillness as memory, telemetry and testimony are tested.'
  location_type: Private Research Laboratory
