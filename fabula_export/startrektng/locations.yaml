  global_id: ger_location_78a0eba5cd43
  canonical_name: Data's Quarters Holodeck
  description: Data gathers holographic Isaac Newton, Albert Einstein, and Stephen
    Hawking around a poker table in this hybrid space aboard the Enterprise-D. Newton
    bristles at scrutiny, Einstein trades quips, and Hawking bluffs four sevens to
    win. Chips clack amid banter until red alert blares. Data ends the program; holograms
    dissolve in photonic bursts, exposing yellow-grid holodeck walls against black
    panels and humming projectors. The chamber doubles as Data's lab for dissecting
    human bluffs, wit, and defensiveness before duty calls.
