  global_id: ger_location_666d5d3477ef
  canonical_name: Planet Straleb
  description: Planet Straleb simmers with the weight of unspoken conflicts, its presence
    felt through the arrogance and brash demands of Kushell, who treats Okona's extradition
    as a matter of national honor. Though its surface remains unseen, its influence
    permeates the tense bridge of the Enterprise—a distant yet potent force, demanding
    attention through threats and posturing. Straleb's political gravity pulls at
    the diplomatic tightrope Picard walks, its unseen culture steeped in pride and
    the willingness to escalate to violence for reputation. The planet exists in this
    scene not as a physical space but as a catalyst for tension, its identity forged
    by the aggression of those who call it home.
