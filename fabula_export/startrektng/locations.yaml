  description: Cargo Bay Six buzzes with urgent activity as critically injured colonists
    are beamed directly into this designated staging area for immediate medical triage
    and treatment. The bay’s cavernous industrial expanse contrasts sharply with the
    delicate human lives arriving in crisis, as medical teams mobilize burn units
    and rapid response kits amid the echoing clang of cargo operations. It serves
    as a vital transitional zone on the USS Enterprise, where stark emergency demands
    collide with organized, life-saving protocols under Captain Picard and Doctor
    Crusher’s resolute coordination. The atmosphere vibrates with the tension of mounting
    casualties and relentless effort to save lives, marking it as a critical node
    in the unfolding disaster response.
