  canonical_name: Starry Void of Space
  description: A starry blackness abruptly replaces the Enterprise corridor's walls.
    Hedril and the wolf plunge into its depths, vanishing instantly. Deanna Troi stands
    at the edge, hearing a disembodied voice plead 'Help me...' from the void's heart.
    Compelled by urgency, she leaps in, crossing from solid deck plating into cosmic
    emptiness that embodies Lwaxana Troi's buried trauma.
