- fabula_uuid: ger_location_dcbe6b0ffaff
  global_id: ger_location_dcbe6b0ffaff
  canonical_name: Port Bulkhead (Relay Station 47)
  description: 'Relay Station 47, a remote Starfleet outpost near the Klingon border
    in the Ipai Sector, is a tense crime scene pulsing with murder mystery and coalescent
    threat. The station''s corridors are littered with signs of violence: bloodstains
    on consoles, melted remains in engineering, and Klingon DNA smeared across bulkheads.
    The Ops Center (primary communications hub) is packed with crowded consoles and
    communications equipment, where the away team materializes amid chaotic subspace
    messages. A service duct near the ops floor hides a trapped dog (Maura), while
    a port bulkhead bears evidence of Aquiel Uhnari''s assault. Key areas include
    Aquiel''s quarters (unmade beds, scattered knick-knacks, jewelled headband, corrupted
    workstations), an ajar weapons locker (missing phaser), and log consoles where
    Geordi confronts Aquiel. Subspace interference drowns hails and masks life signs,
    amplifying the station''s eerie silence and isolation.'
  location_type: Space Station Operations Center
