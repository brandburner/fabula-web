  global_id: ger_location_55da5685ba2a
  canonical_name: Krios Capital City
  description: Jagged spires tower over Krios Capital City, their brutal Klingon-inspired
    design forming fortress-like structures that dominate the skyline. An oppressive
    atmosphere permeates the metropolis, where shadows stretch across streets heavy
    with tension. This urban expanse embodies the razor-edge peace between Federation
    diplomats and Klingon forces, every sharp angle and looming edifice signaling
    the risk of erupting conflict. The city's harsh grandeur presses on observers,
    amplifying the stakes of fragile negotiations amid whispers of rebellion.
  location_type: Klingon-Influenced Capital Metropolis
