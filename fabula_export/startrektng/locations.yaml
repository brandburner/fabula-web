- fabula_uuid: ger_location_87362a5dccb5
  global_id: ger_location_87362a5dccb5
  canonical_name: New Caves
  description: Deep within Romulus, the New Caves carve a labyrinth of hidden chambers
    where the Romulan underground convenes in secrecy. D'Tan guides Picard, Data,
    and Spock through these dim, echoing passages, declaring them safe from Pardek
    and other threats—'Pardek never saw these caves... It's safe, they won't find
    us here.' Members huddle here to study Vulcan philosophy, debate reunification
    ideals, and forge plans for cultural evolution. The cool, shadowed stone fosters
    quiet resolve during Spock's pivotal decision to remain and his mind-meld with
    Picard.
  location_type: Hidden Cavern System
