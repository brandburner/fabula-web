  description: Enterprise orbits Qualor Two while crew probes the theft of Vulcan
    ship T’Pau’s navigational deflector from the surplus depot. Decommissioned Federation
    vessels fill vast hangars stocked with salvaged tech and mothballed hulls. Riker
    dispatches his team to scour the neglected site amid suspicions of Ferengi or
    Romulan involvement. Investigators navigate dusty stockpiles heavy with disuse,
    chasing leads through the planet’s underbelly where a nearby piano bar hosts separate
    intel exchanges.
