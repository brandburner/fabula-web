- fabula_uuid: ger_location_94d95a1b2a78
  global_id: ger_location_94d95a1b2a78
  canonical_name: Euclidian Solar System
  description: 'The Euclidian Solar System sits in the narrative as a named horizon
    — a mapped cluster of suns and planets that marks the edge of the known charts.
    It carries the dust of history and the pulse of old ambitions: the lost explorer
    Charybdis once aimed to push beyond this system, and that attempt anchors contemporary
    missions in cosmic context. The system feels remote and authoritative, a reference
    point for cartographers and captains, its pale star fields furnishing quiet, echoing
    telemetry and the uneasy pride of explorers who test the border between charted
    safety and the unknown.'
  location_type: Star System
