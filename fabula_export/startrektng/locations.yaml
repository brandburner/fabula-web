- fabula_uuid: ger_location_3832d8cb6002
  global_id: ger_location_3832d8cb6002
  canonical_name: Duck Blind Bluff
  description: A low, wind-edged bluff that crowns the marshes above the duck blind,
    offering a hard, exposed vantage where sky and reeds meet. Sun slants across squat
    shrubs and salt-stiff grass; the drop to the wetlands smells of damp peat and
    bird oil. Paths worn by furtive footsteps lead down toward the hidden blind; the
    place functions as a lookout and the threshold between surveillance and action.
    Solitude tightens here—thoughts sharpen, doubts gather, and small discoveries
    carry outsize weight. The bluff channels observation into decision, making it
    the quiet crucible for reconnaissance and the narrative pivot that sets communal
    upheaval in motion.
  location_type: Wetland Bluff / Observation Vantage
