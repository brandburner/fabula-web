  global_id: ger_location_b2c3646109c8
  canonical_name: Parkland (Holodeck)
  description: 'A wide, simulated parkland unfurls inside the holodeck: long grasses
    and scattered trees bathed in warm sunlight, distant birdcalls layered over the
    faint electrical hum of the system, and an open lawn that swallows footsteps.
    The space registers as both comforting and uncanny as a lone, off‑key whistle
    threads through the air; it hosts intimate human moments—music practice, candid
    conversation—and functions narratively to humanize an android, surface bias, and
    stage the recruitment for an away mission.'
  location_type: Holodeck Simulation
