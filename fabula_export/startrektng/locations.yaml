- fabula_uuid: ger_location_8264bac0d071
  global_id: ger_location_8264bac0d071
  canonical_name: Holodeck Observation Gallery
  description: A narrow, elevated observation tier that rims the holodeck complex,
    the gallery offers a protected vantage from which officers and visitors watch
    simulations unfold. Clear blast‑panels, recessed benches, and a low rail define
    its line of sight; consoles and recorders tuck into alcoves while a faint ozone
    tang and the holodeck's recycled‑air hum linger. After a simulated detonation,
    the gallery remains a quiet island of intact structure and stunned witnesses —
    bodies pressed toward the rail, voices reduced to urgent whispers, shock and forensic
    curiosity colliding as command recalibrates in the wake of performance and proof.
  location_type: 'Starship Interior: Holodeck Observation Gallery'
