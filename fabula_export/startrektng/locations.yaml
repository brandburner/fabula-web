  canonical_name: Shuttlecraft Cockpit (Riker-Odan Escape Sequence)
  description: Cramped Starfleet shuttlecraft cockpit where Commander William Riker
    pilots under extreme duress during the escape sequence from the escort ship's
    attack. Odan (symbiont host) is buckled into the passenger seat behind Riker.
    The cockpit features forward controls, flashing red alert consoles, and comms
    linking to the USS Enterprise. The scene is marked by violent evasive maneuvers,
    phaser fire impacts, shield strain, and progressive structural damage (sparking
    consoles, buckling panels, hull breaches, and venting atmosphere). Odan's critical
    injury (from being thrown across the cabin) and his warning about transporter
    dangers force Riker to pilot the disintegrating craft manually. The environment
    is chaotic, with alarms, engine whine, near-miss jolts, and thickening smoke.
