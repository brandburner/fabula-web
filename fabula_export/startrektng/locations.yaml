  global_id: ger_location_c8380f8e8d68
  canonical_name: Nervala IV
  description: Nervala IV draws the USS Enterprise into orbit, its atmosphere shimmering
    with strange luminescence that catches the light across bridge viewports. Picard
    logs the ship's position as crews await retrieval of scientific data abandoned
    by Starfleet researchers eight years earlier, when a mission forced their evacuation.
    This remote planet pulses with mission urgency, its glowing haze underscoring
    the delay that pulls Riker from Ten Forward's jazz night into duty's grip.
