  description: 'Malcor III dominates the view from Ten Forward''s viewports, a swirling
    orb of blue and green where Enterprise orbits amid high-stakes first contact.
    Its surface buzzes with Malcorian life: Chancellor Durken pushes for Federation
    ties while xenophobic Minister Krola stirs isolationist fears. Riker''s undercover
    stint as a tourist vanished there, fueling surveillance revelations and diplomatic
    peril. Mirasta Yale gazes at her homeworld, her wonder turning to dread over the
    planet''s fragile politics and hidden Federation watchers.'
