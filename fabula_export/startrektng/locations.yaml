  global_id: ger_location_3e3fcbce3894
  canonical_name: Ranuos Six
  description: 'Ranuos Six registers as a distant, work‑focused world — the kind of
    remote posting where phase engineering and anti‑matter research demand austere
    facilities and tight safety regimes. Characters speak of it as isolated, wind‑blasted
    terrain ringed by containment domes and humming laboratories, a place where long
    shifts and technical rigor replace shipboard camaraderie. Mention functions narratively
    as a foil to the Enterprise: a solitary, clinical outpost that amplifies Sonya’s
    relief and youthful excitement at instead joining a living starship crew.'
