  global_id: ger_location_ed9011eb38b4
  canonical_name: Thirty-Foot Precipice Over the Beam-Out Point
  description: A tremor fractures the cavern floor in the Second Magma Pocket, carving
    a sheer thirty-foot precipice that strands Data and Juliana above their pattern
    enhancers and original beam-out site. Jagged rock offers no handholds as ceiling
    chunks crash down and seismic shocks rumble through. Palm beacons throw stark
    shadows across the unstable drop, compelling a desperate leap where Data absorbs
    the impact and Juliana's fall rips open her android arm, turning physical peril
    into shattering revelation amid the confined, quaking heat.
  location_type: Subterranean Cavern Precipice
