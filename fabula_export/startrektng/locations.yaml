  canonical_name: Moon's Southern Polar Region
  description: Counselor Troi senses voices riding fierce winds from the moon's southern
    polar region, a deliberate summons she links to the wrecked *Essex*. This remote
    expanse draws the *Enterprise* crew's investigation and emerges as the Ux-Mal
    entities' demanded destination, where they insist the ship travel to enable their
    escape. The site's unseen pull heightens tension, blending historical mystery
    with alien urgency.
