  description: Exterior deep-space environment surrounding the *Khazara*, where disruptor
    beams are fired at the *USS Enterprise* during a tense standoff. Focused on visual
    action, sabotage, and the mechanical outcome of N'Vek's interference with the
    warbird's weapons. Observed by the *Khazara*'s bridge crew from inside the ship.
