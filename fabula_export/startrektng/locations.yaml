  global_id: ger_location_0d4194c8ce85
  canonical_name: Planet Near the Duck Blind
  description: 'Sheets of karst topography scar the planet’s surface, folding into
    sinkholes and a network of caverns that swallow light and sensors alike. Thallium‑rich
    bedrock knits the ground into a subtle mask, muffling biosignatures until only
    Mintakan life reads clearly on long‑range scans. Wind whistles through limestone
    mouths; damp, mineral air tastes faintly metallic. The area adjacent to a weathered
    duck blind reads like an abandoned hunt site but hides vertical shafts and echoing
    tunnels where a missing crewmember might vanish. The place compresses urgency
    and ethical restraint: medical desperation rubs raw against the threat of cultural
    contamination and the danger of blind rescue.'
