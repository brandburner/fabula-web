  canonical_name: Galen Four Federation Colony
  description: Talarian raiders struck the Galen Four Federation Colony, killing Jeremiah
    Rossa's parents and leaving the boy orphaned amid the wreckage of his birthplace.
    This remote outpost embodies frontier vulnerability, its destruction revealed
    through Starfleet DNA records in the Observation Lounge. The crew grapples with
    the site's lingering tragedy, which conditions Jeremiah's resistance to his human
    roots and demands Picard's reluctant mentorship to bridge the loss.
  location_type: Federation Planetary Colony
