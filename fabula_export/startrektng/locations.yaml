- fabula_uuid: ger_location_04f043378e31
  global_id: ger_location_04f043378e31
  canonical_name: Gatherer Ship Meeting Chamber
  description: 'A compact, controlled chamber within a Gatherer vessel where diplomacy
    and menace sit cheek by jowl. The space funnels ritualized power: a formal seating
    arrangement that forces opponents into pronounced postures, a table for ceremonial
    brandy, and tight sightlines that make every gesture a political statement. Air
    feels constrained by protocol and security; silent attendants hover at the edges
    while neutral surfaces emphasize authority. Negotiation here carries palpable
    tension—every pause, offered drink, and concealed presence can pivot between reconciliation
    and violent rupture.'
  location_type: Alien Starship Meeting Chamber
  parent_location_uuid: null
