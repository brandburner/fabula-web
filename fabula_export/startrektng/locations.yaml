  canonical_name: Dikonalpha Pulsar
  description: A **class-nine neutron star** with **intense, rhythmic emissions**,
    proposed by Geordi La Forge as a **detonation site for a modified photon torpedo**
    to produce vertion particles and stabilize the ship's emergent AI. Central to
    a **high-stakes bridge deliberation** between Riker and Picard, where its properties
