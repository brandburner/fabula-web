  description: The Aldea First Unit Chamber stands as a stark, austere enclave within
    the enigmatic planet Aldea. White walls stretch bare except for ancient tapestries
    that whisper forgotten histories under cold lighting. This confined, spartan room
    throbs with tense negotiation and fragile power, hosting solemn receptions where
    Aldean leaders confront Federation officers with desperate ultimatums. It doubles
    as the grim holding cell for abducted children, where uneasy hospitality masks
    a culture on the brink of extinction. The chamber’s oppressive atmosphere tightens
    with every confrontation—echoing whispered betrayals, fragile leadership struggles,
    and the crushing weight of survival against time. Every shadowed corner reflects
    the planet’s fading hope and the fraught dance of diplomacy and defiance that
