  global_id: ger_location_a732ce98d5f3
  canonical_name: Mars Station
  description: Mars Station looms as a sprawling planetary facility anchored to the
    red world’s industrial spine, a pragmatic hive of drafting rooms, workshops, and
    orbital interfaces. Concrete-and-metal corridors carry the tang of solder and
    machine oil; fluorescent light slices paper schematics and holo-readouts alike.
    The station houses the Utopia Planitia drafting room where a restricted prototype
    schematic rests, making the space equal parts bureaucratic archive, technical
    crucible, and tense rehearsal chamber for desperate engineering gambits. Personnel
    circulate with purposeful fatigue, urgency thick in the air when experimental
    designs are summoned under deadline pressure.
