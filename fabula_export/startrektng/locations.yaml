  canonical_name: Worf's Sickbay Room
  description: This private room adjoins the Enterprise's main sickbay, holding Worf
    as he recovers from paralysis. A diagnostic bed anchors the center, flanked by
    medical monitors and equipment that hum steadily. Worf lies prone or struggles
    to stand using motor assist bands, his collapses marking moments of raw vulnerability.
    Riker enters with Hegh'bat ritual objects, placing them on the bed during tense
    standoffs. Beverly delivers permanent paralysis diagnoses here, while Alexander
    witnesses his father's humiliating falls and emotional rejections. Troi stands
    by silently amid farewells. The confined walls heighten intimacy, amplifying clashes
    between Klingon honor, shame, and Starfleet care.
