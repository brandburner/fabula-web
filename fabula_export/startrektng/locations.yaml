  canonical_name: Stalled Turbolift
  description: The turbolift stalls between decks on the crippled Enterprise, its
    cabin lit by dim emergency panels amid the hum of strained power systems. Ro Laren
    grabs the emergency hand crank, her arms straining as she winds it furiously to
    pry open the upper hatch and haul herself onto the bridge. Seconds later, an emergency
    bulkhead clamps shut below, its heavy thud echoing up the shaft and sealing the
    bridge crew from the ship's shattered lower sections. Confined metal walls press
    in, carrying vibrations of distant explosions and the ship's mortal groans.
