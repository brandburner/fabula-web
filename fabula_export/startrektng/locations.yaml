  canonical_name: Crystalline Coral-Like Forest
  description: A ghostly forest of interlocking crystalline limbs, glowing faintly
    under an eternal twilight sky on a storm-ravaged alien planet. The forest's coral-like
    structures form a labyrinthine trap that ensnares the unwary, its energy field
    interference crippling Starfleet technology such as tricorders and communicators.
    This hostile, otherworldly environment pulses with latent menace as it conceals
    ambush predators, turning rescue attempts into desperate survival struggles amid
