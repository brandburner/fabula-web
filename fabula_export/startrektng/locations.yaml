  canonical_name: Tarmin's Home Planet
  description: Tarmin's home planet orbits within the Nel system, a world untouched
    by the unexplained comas that struck two neighboring planets during Ullian visits.
    Tarmin remained there physically throughout the incidents, its clean planetary
    records—free of any disruptions—form his airtight alibi. Crew on the Enterprise
    bridge pores over these logs, the planet's normalcy a stark counterpoint to the
    system's shadowed mysteries, its quiet stability exonerating Tarmin amid rising
    suspicions.
