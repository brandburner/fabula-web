  description: Connor urges young Jeremiah to flee into this forest during the Talarian
    raid, its imagined shelter contrasting phaser blasts, explosions, and his mother's
    fatal stand. In Jono's repressed memory, the space evokes desperate escape from
    parental loss, a symbolic haven unvisited amid the chaos that shattered his early
    life and forged his Talarian identity.
