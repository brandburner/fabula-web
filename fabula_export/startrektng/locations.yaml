  canonical_name: Holodeck Train Salon Car
  description: 'Crew steps into this opulent Victorian salon car on the holodeck train,
    heavy drapes drawn over windows to cast dim light across polished wood and brass
    fittings. A signal cable snakes along the floor amid eclectic passengers: flappers
    chatter, a knight assembles puzzles, a hayseed crafts, a gunslinger watches silently.
    Conductor confronts intruders here, exposing their sabotage; Hitman bursts through,
    pistol shots down the Engineer in Riker''s arms. The space turns from quirky refuge
    to trap, holographic violence rippling toward Enterprise control.'
