  description: 'A Holodeck simulation of a New York City street intersection dominated
    by a construction site, where an apartment building''s entrance is bricked over
    with a single gap. The scene features unstable ground conditions mimicking earthquakes,
    causing scaffolding to collapse and debris to scatter. Key elements include: (1)
    Data kneeling at an open manhole using a device to stabilize the simulation; (2)
    Worf rescuing Troi from falling debris; (3) a stalled taxi with locked tires on
    buckled asphalt; and (4) the Hitman performing a ritual involving a glowing gold
    brick that triggers the simulation''s instability. The scene is tied to the ship''s
    sentience and the Holodeck''s emergent intelligence, with dust and grit filling
    the air amid the fading tremors.'
  location_type: Holodeck Urban Construction Site
  parent_location_uuid: null
