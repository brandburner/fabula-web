  canonical_name: Wesley's Table (Ten-Forward)
  description: A tucked, semi-secluded table in Ten-Forward where Ensign Wesley Crusher
    studies beneath a pool of lamplight. The lounge's hum, distant clinks of glass,
    and the scent of snacks recede here; datapads, open books, and a scatter of food
    create a slightly cluttered, domestic atmosphere. The table serves as a private
    island inside a social salon — a site for focused study, blunt intrusions, furtive
    confession, and small human realignments (notably Brull's snack-stealing visit
    that reveals his softer side and reframes personal stakes during the episode).
