  description: Narrow maintenance access route on the Enterprise's starboard side
    leads toward engineering through tight passages lined with conduits and emergency
    systems. Data proposes it as the sole viable path after crisis bulkheads block
    direct corridors. Riker and Data commit to traversing its perilous confines—risking
    structural hazards, poor lighting, and physical strain—to reach engineering and
    regain ship control. Crew highlight its danger, forcing split-second decisions
    amid chaos.
