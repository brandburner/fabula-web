- fabula_uuid: ger_location_29dc3e735058
  global_id: ger_location_29dc3e735058
  canonical_name: Rex's Bar
  description: 'Rex''s Bar plunges into a smoke-laced, dimly lit noir dive recreated
    on the Holodeck: low amber lamps pool over a worn counter, the air tastes of spent
    scotch and old stories, and shadowed booths cradle private confidences. The proprietor
    Rex moves with sardonic ease, trading ribald banter for thin comfort while patrons
    retreat into their dramas. The space functions as refuge and crucible — a place
    where Picard slips into a Dixon Hill persona to mask pain, where intimacy suddenly
    ruptures into physical threat, and where comic distractions and urgent duty collide,
    forcing characters back into the mission.'
