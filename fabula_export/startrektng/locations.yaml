- fabula_uuid: ger_location_632ffc554baa
  global_id: ger_location_632ffc554baa
  canonical_name: Alternate Timeline (Tasha Yar's Original Timeline)
  description: 'Hangs like a negative space of history: an unseen temporal corridor
    where choices never occurred and Tasha Yar’s life ends in an empty, anonymous
    death. The alternate timeline feels cold, stripped of consequence, its presence
    tasted as a chill of inevitability when Guinan reads it aloud. Characters experience
    it as a moral mirror and a ledger of lost possibility—an abstract, haunting locus
    that transforms fate into a deliberate question of meaning, urgency, and sacrificial
    choice.'
  location_type: Alternate Timeline (Temporal Concept)
