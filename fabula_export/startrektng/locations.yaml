- fabula_uuid: ger_location_fa1950efb0a3
  global_id: ger_location_fa1950efb0a3
  canonical_name: Gault Agricultural Colony
  description: Gault Agricultural Colony spreads across fertile fields and gently
    rolling farmland, a remote human farming settlement dedicated to cultivating crops
    and sustaining families. It hums with the quiet rhythms of rural life, enveloped
    in the scent of fresh earth and the steady labor of tending to the land. This
    colony stands as a crucible of dual identity and cultural tension, where Worf
    was raised by human Starfleet foster parents, embodying the intersection of human
    nurturing and Klingon heritage. The atmosphere carries a subtle undercurrent of
    estrangement and belonging, as the colony serves both as a cradle of human simplicity
    and a backdrop to Worf's complex upbringing far from Klingon warrior society.
  location_type: Agricultural Colony
