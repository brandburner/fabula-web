- fabula_uuid: ger_location_969f822d85a3
  global_id: ger_location_969f822d85a3
  canonical_name: Secluded Underbrush (Tarchannen III)
  description: Tarchannen III is a hostile alien planet where Federation shuttles
    are incinerated upon atmospheric entry, scattering debris across its surface.
    The planet's terrain is infested by an alien species that implants DNA into hosts,
    warping them into grotesque forms and luring them back to hasten further transformations.
    The surface is characterized by perpetual twilight, barren terrain, and eerie
    silence, with long shadows cast by dim light. Two abandoned shuttlecraft wrecks
    sit lifeless on the surface, sensors confirming no signs of surviving crew. Away
    teams, including Geordi La Forge and Susanna Leijten, beam down to investigate
    the derelict shuttles and confront the planet's transformative influence, using
    UV lights to navigate the hostile haze and rising compulsion.
  location_type: Planetary Underbrush
  parent_location_uuid: ger_location_3fa61f0a57eb
