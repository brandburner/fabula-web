- fabula_uuid: ger_location_aae8da0a1694
  global_id: ger_location_aae8da0a1694
  canonical_name: Ornara
  description: Ornara, the home planet of the Ornarans, groans under the weight of
    a devastating Felicium addiction crisis that fractures its people’s spirit and
    survival. The planet’s surface bears the invisible scars of social collapse and
    despair, while distant transmissions carry fractured pleas that echo the desperation
    suffusing its atmosphere. Ornara emerges not merely as a geographical point but
    as a crucible of agony and ethical conflict, the locus where coercion and compassion
    collide. Its battered communities and the solemn burden of dependency render the
    planet a palpable presence that drives high-stakes moral reckoning among the Enterprise
    crew, embodying the tragic cost of exploitation and the fragile hope for redemption.
  location_type: Planet
  parent_location_uuid: null
