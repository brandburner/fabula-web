- fabula_uuid: ger_location_c6bc698cc808
  global_id: ger_location_c6bc698cc808
  canonical_name: Gamma Tauri IV (Cloud-Shrouded Planet)
  description: 'Gamma Tauri IV, also known as the Cloud-Shrouded Planet, is a shadowed,
    enigmatic world cloaked beneath dense, thick swirling clouds. It anchors a high-stakes
    confrontation between the USS Enterprise and a Ferengi vessel in ''Star Trek:
    The Next Generation - The Last Outpost''. The planet harbors relics of the extinct
    Tkon Empire, with a surface emanating a powerful, eerie green forcefield that
    immobilizes starships and drains their power. From ancient planetary ruins to
    unmanned monitor posts, it holds the stolen energy converter central to a diplomatic
    and technological crisis. Its veiled atmosphere and mysterious nature make it
    a focal point for investigation, tension, and the crew''s tentative hope for survival
    amidst overwhelming odds.'
  location_type: Planet
  parent_location_uuid: null
