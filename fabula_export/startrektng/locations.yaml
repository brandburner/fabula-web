  description: Geordi sweeps his tricorder across Buildings Four and Five in the abandoned
    Tarchannen Three outpost. Clean surfaces reveal no phaser burns, no shattered
    doors, no blood trails or overturned furniture—hallmarks of the crew's inexplicable
    vanishing without fight or flight. Perpetual twilight bathes the squat structures
    in dim haze, their silent facades amplifying the unnatural quiet. Investigators'
