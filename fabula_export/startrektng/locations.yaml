  global_id: ger_location_5a1d000bb71b
  canonical_name: Snowy Alien Landscape
  description: A sudden, ruthless holodeck glitch violently shatters the illusion
    of Dixon Hill’s office, plunging the characters into a hellish, frozen alien landscape.
    The environment crashes over them with biting cold and disorienting ferocity,
    provoking shivers and terror. This transient, spectral place flickers between
    simulation scenes, exposing the fragile boundary between virtual fantasy and deadly
    reality. Its stark, icy wasteland becomes a crucible of fear and chaos, destabilizing
    both body and mind in a brief but harrowing ordeal.
  location_type: Holodeck Simulation Environment
