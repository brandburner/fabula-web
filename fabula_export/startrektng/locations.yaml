  canonical_name: Lysian Border
  description: The Lysian Border slices through deep space as an invisible line on
    starship sensors, signaling entry into Lysian territory. Enterprise crosses it
    at cautious impulse, viewscreen fixed on the starfield ahead. Moments later, a
    destroyer materializes, hails the intruder, then fires disruptors. Bridge crew
    tenses amid alert klaxons and scan readouts; phasers slice the void, obliterating
    the vessel in a flash of plasma. Silence follows, heavy with the moral weight
    of first contact turned lethal.
