  global_id: ger_location_4ece21ebf019
  canonical_name: Promellian Warship Communications Room
  description: Sun-bleached consoles crouch beneath fractured overhead ribs as dust
    motes drift through cold, metallic air. Banked monitors and analogue radio racks
    sag under the weight of age; empty coil housings and frayed wiring puncture panels.
    A bleached skeleton slumps at a dead console, a mute witness to long-ago decisions.
    Technicians become archaeologists here as fragile playback coils click and spin,
    throwing a warped, grainy image of Captain Galek Sar onto a screen. The space
    reads as a haunted archive and moral fulcrum — an eerie, technical sanctum where
    revelation replaces noise and the ship’s history forces the living to confront
    deliberate choice and its consequences.
  location_type: Shipboard Communications Room
