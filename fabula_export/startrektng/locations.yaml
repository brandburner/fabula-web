  description: Picard and Guinan drop onto a bench at the side of the ship's gymnasium,
    breaths steadying after fencing volleys. This tucked-away spot shields their talk
    from the main floor's expanse, Guinan's words turning rest into reckoning over
    the rescued Borg drone. Masked faces gleam with sweat, foils rest nearby, the
    gym's vaulted space quiets to ship hum and their raw exchange—pity clashing with
    resolve in sudden disarms and exposed vulnerability.
