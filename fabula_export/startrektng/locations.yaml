  description: Sub-location within the holodeck-simulated Boraalan camp, where Worf
    has a private moment with Dobara amid the urgency of the holodeck's impending
    collapse. Characterized by holodeck-generated stars, faint campfire voices, and
    the emotional tension of Dobara's pregnancy news.
