- fabula_uuid: ger_location_7d11fa473b34
  global_id: ger_location_7d11fa473b34
  canonical_name: The Void
  description: 'A vast, unlit gulf hangs beyond the ship — an interstellar void that
    absorbs light and sound and presses on the crew’s perception. Sensors sweep the
    blackness and Data announces the area ''clear,'' yet the void''s presence lingers
    as the implied source of the earlier danger and possible illusion. On the bridge
    it functions as a silent antagonist: cosmic emptiness that forces urgent maneuvers,
    fractures trust in instruments, and leaves a residue of existential doubt.'
  location_type: Interstellar Void
  parent_location_uuid: null
