  global_id: ger_location_ac2ded06054d
  canonical_name: Research Station (Primary Facility)
  description: |-
    A Starfleet research station featuring a central transporter pad area where the away team materializes. The space is characterized by its eerie pristine condition, contrasting with Riker's memories of chaotic evacuation. Key features include:
      - A **non-operational transporter pad** (primary entry point for the away team)
      - **Pristine corridors and consoles** with faint operational hums
      - A **patched hole in the ceiling**, indicating recent intrusions
      - **Tense interactions** between the two Rikers in the back repair area
      - **Defensive postures** forming near the door as the duplicate Riker is revealed
      - **East corridor area** (40 meters due east of the main room), where Data's tricorder detects the duplicate Riker's approach
      The station's unsettling order heightens themes of identity and suspicion, serving as a critical setting for the episode's central confrontation. The east corridor is a specific area within this facility where the away team crouches with phasers drawn, awaiting the duplicate Riker's arrival.
  location_type: Starfleet Research Station
