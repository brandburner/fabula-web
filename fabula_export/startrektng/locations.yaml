- fabula_uuid: ger_location_2431811958be
  global_id: ger_location_2431811958be
  canonical_name: Unidentified Planet Surface (Sarjenka Receiver Site)
  description: 'A remote, unnamed stretch of planetary ground yawns under an indifferent
    sky — winds thin, horizons empty, and the landscape presses as a hollow stage
    for a solitary failure. Sensors once locked on a tiny receiver buried or mounted
    in that terrain; now only a dead signal and scorched traces remain. Silence tastes
    metallic; dust sifts through invisible currents where data once flowed. The place
    functions as an emotional void for those aboard the ship: confirmation of its
    ruin severs the last human contact, collapses restraint into action, and turns
    anonymous geology into a charged locus of loss, ethical crisis, and urgent pursuit.'
