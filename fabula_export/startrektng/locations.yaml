  global_id: ger_location_9019f08c8aa8
  canonical_name: Gold Strike Saloon (Holodeck Wild West Simulation)
  description: The Gold Strike Saloon is a frontier-style saloon located in the USS
    Enterprise-D's corrupted Wild West holodeck program, featuring a prominent wooden
    porch. The saloon is characterized by batwing/swinging doors, a scarred wooden
    bar with dusty bottles, shadowed tables, and a rain barrel used as cover during
    tense standoffs. The porch, with its weathered wooden planks and tethering rail,
    serves as a key entry point for characters like Data-as-Frank Hollander and his
    henchmen, amplifying the menacing atmosphere before they enter the saloon. The
    space serves as a key setting for roleplaying violence, holographic glitches,
    and narrative tension—beginning as a lively roleplay environment before devolving
    into lethal chaos as the program corrupts. Worf and Alexander interact here during
    a hostage exchange, while Data-as-Frank Hollander's meetings with Worf also take
    place in this space. The saloon's appearance and function are integral to the
    episode's themes of honor, control, and the blurred line between simulation and
    reality.
  location_type: Holodeck Old West Saloon
