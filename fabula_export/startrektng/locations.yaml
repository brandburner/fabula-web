  description: Vast star system where the USS Enterprise arrives to tackle artificial
    tricyanate contamination on Beta Agni II. Wesley Crusher pilots the ship into
    precise orbit around the planet, sensors revealing unnaturally concentrated toxins
    suggesting sabotage. Crew launches a hytritium probe from this tense expanse,
    its emptiness amplifying suspicions amid the mission's urgent stakes. Stars gleam
    coldly against the void as the ship hovers, engines humming, ready to deploy countermeasures
    into the poisoned world's atmosphere.
