  global_id: ger_location_56c29f4d1e27
  canonical_name: Holodeck Parkland Stream
  description: A shallow, artfully contrived stream threads through an artificial
    parkland, water laughing over slate stepping stones and slick edges that catch
    a boot heel. Sunlight pours from holodeck projectors, warming faux grass while
    the stream’s constant murmur cuts a private channel through programmed birdsong
    and distant promenade noise. Characters step carefully, toes testing stones; a
    single misstep flips posture into startled laughter and intimate repair. The feature
    functions as a small choreography of movement and vulnerability, staging quiet,
    humanizing exchanges amid simulated nature and revealing offhand habits under
    casual pressure.
  location_type: Holodeck Environment (Parkland Stream)
