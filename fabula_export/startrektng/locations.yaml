    position reads as a destination on charts and a forensic scar in space: telemetry
    blips, a recorded visual log, and the probe’s crackling energy tie the coordinate
    to an unresolved violence. The coordinate functions as navigational anchor, tactical
    risk marker (dangerously near Romulan space), and the narrative spur that compels
    the Enterprise to assume the Yamato’s mission.'
