  description: 'The forward bridge of the Klingon cruiser T''Ong: a compact, battle‑scarred
    command ring with worn/red‑stained control pylons, brass‑toned displays and a
    low metallic hum. The captain''s dais (K''Temoc) and the surrounding stations
    function as a theater of Klingon protocol where honor and shame are publicly confronted
    — actions such as aborted shield sequences, a first officer''s hesitation, and
    the crew lowering shields crystallize into a ceremonial transfer of command when
    the bridge is shown on the Enterprise viewscreen.'
