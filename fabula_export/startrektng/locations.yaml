  global_id: ger_location_9ea267e0ea46
  canonical_name: Meklinite Asteroid Field
  description: The Meklinite Asteroid Field, a mineral-rich expanse of jagged asteroids
    packed with meklinite and Kefnium, looms ahead of the limping *USS Enterprise*.
    This treacherous debris field interferes with sensors while simultaneously nourishing
    a newborn energy being, whose composition echoes that of its parent. The crew
    faces a fraught decision to detach and abandon the energy being within the field,
    which subsequently gives rise to a swarm of alien creatures. These creatures surge
    from the asteroid field toward the *Enterprise* in a coordinated tactical assault,
    arriving just ten minutes after their emergence. The field’s proximity to the
    ship and the swarm’s coordinated attack create a high-tension scenario, with the
    *Enterprise* exposed and vulnerable in deep space.
  location_type: Asteroid Field
