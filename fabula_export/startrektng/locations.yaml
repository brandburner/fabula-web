- fabula_uuid: ger_location_d9f70bff264d
  global_id: ger_location_d9f70bff264d
  canonical_name: Kamala's Quarters
  description: 'Kamala''s quarters aboard the Enterprise form a confined private space
    that intensifies every encounter. Riker enters for a tour, but Kamala''s sudden
    kiss under pheromonal sway leaves him shaken, sweat beading as he flees. Picard
    crosses the threshold repeatedly: lights dim then brighten at his command, a mirror
    captures her gown-clad transformation, silences stretch during confessions of
    loneliness and duty. Briam confines her here like a prisoner; Data stands chaperone
    amid probing empathic tensions. The room traps isolation, vulnerability, and forbidden
    desire, its walls echoing the clash between personal longing and diplomatic restraint.'
  location_type: Starship Guest Quarters
  parent_location_uuid: null
