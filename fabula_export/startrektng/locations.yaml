  global_id: ger_location_a5cd8e25ffdd
  canonical_name: Far Side of the Star (Defensive Position)
  description: The Enterprise slips behind this star's far side, stellar mass blocking
    Borg sensors as the vessel closes in three minutes. Plasma flares edge the horizon,
    stars prick the black void beyond hull viewports. Picard raises shields; Data
    tracks radiation spikes. Crew holds breath in shadowed cover, weighing Hugh's
    wait among wreckage against assimilation's pull. Proactive shield buys time, tension
    coils in tactical hush.
  location_type: Deep Space Defensive Position
