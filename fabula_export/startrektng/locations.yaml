- fabula_uuid: ger_location_fd8d82ed7ca0
  global_id: ger_location_fd8d82ed7ca0
  canonical_name: Secluded Area Behind Rocks (Tarchannen III)
  description: Jagged rocks shield this dim pocket of Tarchannen III's treacherous
    underbrush from view. Shadows swallow Geordi and two fully transformed creatures
    as they huddle, primal instincts overriding human resolve. Susanna slips past
    the away team into the gloom, her voice cutting through the tension to stir Geordi's
    fading humanity. UV light pierces the dark, exposing twisted forms and the fragile
    line between man and alien. The air hangs thick with threat, every rustle amplifying
    the isolation.
  location_type: Planetary Rocky Hideout
  parent_location_uuid: ger_location_969f822d85a3
