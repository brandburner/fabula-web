  global_id: ger_location_086ea76cbb74
  canonical_name: Atmosphere Above the Klingon Homeworld
  description: 'A savage, storm‑tossed sky that roars above a single‑continent Klingon
    realm. Winds whip across a fortress‑city and the towering Great Hall, alternating
    fierce heat and biting cold to produce visual extremes and constant turbulence.
    Lightning and driving rain strip details from the vista while gusts blur the line
    between weather and threat. The atmosphere amplifies political menace: it presses
    on hulls and eyes alike, externalizing Worf’s private peril and framing honor,
    memory, and statecraft within an unforgiving natural theater.'
