  canonical_name: Arkaria Base Reception Hall
  description: |-
    Primary diplomatic reception space within Arkaria Base, featuring:
      - **Purpose**: Hosts formal gatherings (e.g., receptions) for Starfleet personnel and Arkaria Base staff.
      - **Layout**: Central hall with food tables laden with hors d'oeuvres along walls, a control panel at one end, and circulating waiters.
      - **Key Events**:
        - **Diplomatic Reception**: Enterprise officers (Riker, Data, Geordi, Worf) interact with Arkaria Base staff (Orton, Hutchinson) amid small talk. Data interrogates Orton/Hutchinson on naming conventions/color theory; Geordi detects anomalous energy signatures.
        - **Violent Escalation**: Orton and a waiter draw concealed phasers, killing Hutchinson, stunning Geordi, and forcing Riker/Data/others into submission at gunpoint.
        - **Earlier Scene**: Picard, Riker, Data, and Troi attend a festive reception where Hutchinson dominates conversations (horses/ornithology), while crew members (Riker slips away, Data mimics gestures, Picard invents excuses) exhibit discomfort.
      - **Atmosphere**: Tension masks unease under Arkaria Base's isolation, with crew unease escalating into a deadly standoff.
      - **Narrative Role**: Serves as the primary setting for the episode's central conflict (*Starship Mine*), transitioning from forced civility to violent confrontation.
  location_type: Starbase Reception Hall
