  canonical_name: Jenna D’Sora’s Quarters
  description: Jenna D’Sora enters her quarters after her corridor doubt fades from
    view, closing the door on the ship's humming corridors. The space offers immediate
    solitude, its compact layout—standard starship bunk, desk, and personal console—shielding
    her from crew eyes. She processes emotional cracks in her romance with Data here,
    the dimmed lights and soft environmental hum amplifying her isolation. Walls hold
    faint personal echoes, like holophotos or mementos, underscoring the tension between
    human vulnerability and starship routine.
