  canonical_name: Science Ship Ops
  description: Compact operations hub on the science ship centers around a transporter
    stage where Barclay stands alone after Geordi's departure. Transporter coils hum
    with building energy as Barclay activates the system, his body tense from phobia.
    Dematerialization unleashes a swirling quasi-energy entity from the beam—a grotesque
    funnel-mouth lunging at him—shaking him upon rematerialization on the Enterprise.
