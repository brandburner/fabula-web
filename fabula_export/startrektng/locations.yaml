  description: 'A compact, humming laboratory tucked inside the starship’s internal
    decks: consoles glow with pale glyphs, ventilation sighs a steady mechanical breath,
    and the metallic tang of ozone and hot circuitry hangs under fluorescent panels.
    Engineers and officers cluster around a central workbench where a newly animated
    positronic brain glints; debate and intimacy collide as protocol rubs against
    parental claim. The space tightens around moral heat—quiet instruments bear witness,
    and every measured beep counts the seconds of emergent life.'
