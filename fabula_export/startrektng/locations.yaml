  global_id: ger_location_f2a472c12bef
  canonical_name: Infirmary (Romulan Facility)
  description: Ethan faked illness in this supervised medical space to slip Romulan
    oversight during his first escape. Sterile confines hold biobed hums and guard
    scrutiny, turning healing into captivity. Rock walls nearby block sensors, aiding
    stealthy exits through vents. Tension coils from watchful eyes, underscoring survival
    ploys amid isolation.
