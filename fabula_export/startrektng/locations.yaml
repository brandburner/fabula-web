  global_id: ger_location_504fd3aececc
  canonical_name: Designated Coordinates (Empty Starfield)
  description: Sensors lock onto the designated coordinates, revealing a vast empty
    starfield. Distant stars pierce the inky void, but the T'Pau fails to appear.
    Dokachin stares at the viewscreen in stunned silence as Geordi confirms the ship's
    absence. The barren expanse shocks the observers, shattering expectations and
    igniting urgent questions about the vessel's fate. This visual void propels Riker
    to pivot the investigation toward the Tripoli, exposing layers of potential deception
    amid the cold silence of space.
