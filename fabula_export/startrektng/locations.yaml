  canonical_name: Subterranean Caves 29 Kilometers East of Risa
  description: A labyrinthine subterranean cave system located 29 kilometers east
    of Risa, identified as the hiding place of the Tox Uthat. Picard and Vash must
    traverse rugged terrain to enter this network of twisting tunnels and shadowed
    chambers, where damp stone walls, jagged stalactites, and unstable ledges create
    a perilous environment. The confined darkness and ominous atmosphere heighten
    isolation, forcing reliance on dim lights and each other as they navigate the
    maze toward the artifact's resting place. The caves are pinpointed in Professor
    Estragon's notes and serve as the expedition's climactic destination.
