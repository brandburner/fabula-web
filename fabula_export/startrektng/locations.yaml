- fabula_uuid: ger_location_79261f916e7c
  global_id: ger_location_79261f916e7c
  canonical_name: United Federation of Planets
  description: 'A vast, law‑bound sweep of star systems, worlds, starbases, and patrolled
    corridors that functions as both sanctuary and jurisdiction. When Picard asserts
    that the Romulan crossing entered Federation territory, abstract polity hardens
    into immediate consequence: bridge consoles flare with procedural urgency, diplomatic
    constraints tighten, and every tactical choice acquires legal and moral weight.
    The Federation’s reach reshapes action into statecraft, converting sanctuary into
    a potential battleground while imposing institutional oversight, patrol networks,
    and the heavy expectation of restraint under fire.'
  location_type: Interstellar Polity
