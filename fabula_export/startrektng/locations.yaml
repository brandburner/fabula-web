- fabula_uuid: ger_location_cb296890093a
  global_id: ger_location_cb296890093a
  canonical_name: Barradas Three
  description: A large, sunlit clearing on Barradas Three where forest encroaches
    from the treeline, revealing weathered stone blocks of ancient ruins overgrown
    with vines and underbrush. The ground is scarred by strange circular indentations
    etched with micro-crystalline damage (consistent with Romulan technology patterns),
    disrupting tricorder readings and linking to Picard's disappearance. Abandoned
    Romulan artifacts are scattered in the grass, further tying the site to Picard's
    disappearance. The clearing serves as both a tactical cover point for Riker's
    away team (Worf, Geordi, security officers) and an ambush location for Tallera,
    Vekor, and Narik, who attack from the treeline. Phaser fire kills one officer
    and pins the team, while jamming blocks Enterprise contact. The ruins and treeline
    provide defensive cover during the firefight.
  location_type: Uninhabited M-Class Planet
