  canonical_name: City of Quin'lat
  description: Kahless invokes the City of Quin'lat in an anecdote about a man who
    stood defiant against a raging storm, marking it as a crucible of Klingon legend
    where heroes prove their mettle amid howling winds and unyielding stone. Gowron
    hurls the obscure detail as a gauntlet, exposing Kahless's gaps in mythic recall.
    The city emerges as a spectral touchstone of authenticity—its battered ramparts
    and storm-scoured plazas testing claims to warrior heritage in the empire's oral
    tradition.
