  global_id: ger_location_a7a0fa5caad9
  canonical_name: Tau Cygna Five Colony
  description: 'A sunlit, small-town settlement anchored by a communal main street
    and threaded with an aging aqueduct and a public pool that functions as ritual
    center. Citizens move between open marketplaces and narrow domestic rooms like
    Ard''rian’s living room, where private consent collides with public authority.
    The air carries the hush of contested belonging and the sharp metallic aftertaste
    of coercion when an electronic prod silences a machine emissary. Tau Cygna Five
    registers as both home and battleground: fertile, familiar, textured by ancestral
    rites and frayed by the urgent mechanics of evacuation, resettlement, and threatened
    removal.'
