  global_id: ger_location_92c5d047d9fe
  canonical_name: Solais 5 - Mountain Top
  description: Perched high above the war-torn surface of Solais 5, this windswept
    summit serves as neutral ground for peace negotiations while overlooking the contested
    planet below. Jagged outcrops frame the tense diplomatic amphitheater where trusting
    torches cast flickering shadows across weathered stone. The harsh elevation becomes
    both literal and metaphorical battleground where technological dependency clashes
    with ancient animosities, its precarious neutrality amplified by cold thin air
    that carries every weapon rattle and strained whisper.
  location_type: Mountain Summit Meeting Ground
