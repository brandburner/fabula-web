  description: The Enterprise bursts from an unstable warp tunnel into this remote
    void, 30,000 light-years from its origin, hurtling toward the galaxy's dense core.
    Crew members grip consoles on the bridge as the viewscreen floods with converging
    star lines and blinding whiteout, then clears to reveal alien stars in unfamiliar
    patterns. Shock grips Picard, Riker, and the others amid the hum of straining
    systems, the vast distance amplifying their isolation and the peril of Barclay's
    unchecked transformation.
