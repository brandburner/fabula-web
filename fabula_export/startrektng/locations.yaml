  canonical_name: Romulan Warbird
  description: The Romulan Warbird surges from cloak directly behind Geordi's shuttle,
    its massive green-hulled form filling the viewport and casting an immediate shadow
    of threat across the stars. Jamming subspace communications with superior technology,
    it overrides shuttle shields and beams La Forge aboard in a transporter flash.
    This cloaked predator vessel dominates open space, enabling swift abductions and
    enforcing Romulan agendas through ambush tactics and internal compartments for
    captivity.
