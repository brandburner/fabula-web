  canonical_name: Main Engineering — U.S.S. Hathaway
  description: 'Main engineering on the U.S.S. Hathaway: a lower‑deck mechanical heart
    smelling of hot metal, ozone, and singed insulation. Panels hang open and braided
    conduits spark in dim light; worklights cut through smoke while failing reactors
    and stripped dilithium frame jury‑rigged repairs. Crews (notably Geordi and Wesley
    in scenes) work under harsh time pressure, improvising power reroutes and makeshift
    installations as the space functions as the ship’s urgent repair locus.'
