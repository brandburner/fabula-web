  canonical_name: Federation Space (Vulcan Ships)
  description: Sensors lock on a cloaked Romulan warbird hovering near three stolen
    Vulcan ships in Federation space. Riker demands withdrawal, but phasers rake the
    vessels, shattering hulls in silent explosions. Brief decloak reveals the predator's
    sleek lines before it vanishes, leaving twisted debris tumbling through the star-strewn
    vacuum. Bridge tension spikes as ruthless tactics deny Vulcan recovery.
