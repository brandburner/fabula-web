  description: Worf ducks out of the shuttle bay's chaos into this narrow corridor,
    where turbolift doors hiss open amid pulsing red alert lights and distant klaxon
    wails. Metal bulkheads press close, deck plates vibrate under urgent boots, and
    control panels blink as he summons security reinforcements. The space channels
    crisis momentum—brief pause between bay violence and shipwide response, thick
    with the scent of ionized air and tactical resolve.
