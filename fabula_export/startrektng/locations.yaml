  global_id: ger_location_cee453e59b4f
  canonical_name: Beta Stromgren System
  description: A remote star system located twenty-three parsecs beyond Starfleet's
    furthest manned outposts, where the Vega Nine probe uncovered a supergiant star
    in the final stages of collapse. The system is dominated by a supergiant star
    hurtling toward an imminent supernova, creating gravitational chaos and isolation
    that heightens the peril of the *USS Enterprise-D*'s mission. Tin Man, a sentient
    beacon, orbits within the system, drawing the crew into urgent first contact amid
    cosmic instability and interstellar rivalries. The system's stellar fury and isolation
    underscore the high stakes of the mission, with Romulan warships prowling the
    outer edges, their intercept course confirmed on tactical displays. Crew tension
    spikes as cosmic ruin looms alongside enemy aggression.
  location_type: Remote Star System
