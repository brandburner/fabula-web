  description: Geordi La Forge sits restrained in a starkly lit surgical chair aboard
    the Romulan ship, surrounded by bright overhead lights and machines that probe
    his visual cortex. Taibak removes the VISOR and triggers waves of artificial calm
    and terror, monitoring clenched teeth, sweat, and racing heartbeat. Lights divide
