  global_id: ger_location_8bb19149d607
  canonical_name: Royale Upper Interior (Approx. 31.9 m Above Lobby, Right)
  description: 'A vertical flank of the Royale that looms over the lobby, this upper
    interior feels like the hotel’s hidden backbone — narrow setbacks, facades of
    guest doors, and service conduits sitting 31.9 meters above and to the right of
    the registration desk. Quiet hangs heavy; the lobby’s eerie calm echoes up into
    this zone, turning distance into suspicion. The tricorder’s human-DNA ping makes
    the space suddenly concrete and ominous: a tragic body anchors the hotel’s architecture
    here. Plans snap into motion — turbolifts and a tactical ascent — converting abstraction
    into an urgent, breathless climb toward revelation.'
