  global_id: ger_location_7965df7a35ac
  canonical_name: Boothby's Flower Bed
  description: Boothby kneels in rich soil, fingers deep in primroses and weeds, as
    Picard crouches nearby under the Academy's open sky. The bed's tangled growth
    mirrors Nova Squadron's flaws—loyalty that chokes truth. Scents of damp earth
    and blooms frame their tense exchange, turning garden labor into stark prophecy
    of Locarno's sway and squadron disaster.
  location_type: Outdoor Flower Bed
