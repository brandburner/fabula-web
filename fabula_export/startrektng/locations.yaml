  global_id: ger_location_c619cb59bfa9
  canonical_name: Hayashi System
  description: The Hayashi system serves as the Enterprise's destination for a routine
    colonization survey. Crew members chart planetary atmospheres, scanning worlds
    for habitable zones amid scattered stars and gas clouds. Picard records this methodical
    work in his captain's log, noting the calm preparation until the USS Hood's sudden
    high-warp intercept disrupts everything. Tension rises on the bridge as the system's
    tranquility yields to urgent Starfleet orders, marking it as the mission's fragile
    starting point.
  location_type: Star System
