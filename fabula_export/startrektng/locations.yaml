  global_id: ger_location_bb917dcf2c99
  canonical_name: Side Door in Romulan Office
  description: Discreet secondary entrance within Proconsul Neral's Romulan office
    on Romulus permits covert access. Sela slips through after Spock departs, her
    sudden appearance prompting a charged glance with Neral that exposes their deception.
    This hidden portal facilitates clandestine meetings amid feigned diplomacy, heightening
    the room's tension as Vulcan hand gestures and reunification pledges give way
    to conspiracy. The door embodies Romulan intrigue, separating public facades from
    private plots in a space where trust erodes swiftly.
  location_type: Office Side Entrance
