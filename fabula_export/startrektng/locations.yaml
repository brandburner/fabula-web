- fabula_uuid: ger_location_da30b3a51914
  global_id: ger_location_da30b3a51914
  canonical_name: Chrysalia
  description: 'Chrysalia arrives as a whispered, reputational world: a home planet
    touted for its skewed demographics where women reportedly outnumber men four to
    one. The place tastes like rumor and leverage—an exoticized social landscape sold
    as abundant opportunity and sexual capital. Characters invoke Chrysalia as a bargaining
    chip, its imagined pleasures calibrated to seduce traders and buy political favor.
    The planet functions narratively as a promised prize, a cultural rumor that converts
    social statistics into transactional temptation and dangerous political currency.'
  location_type: Planet (Homeworld / Cultural Origin)
