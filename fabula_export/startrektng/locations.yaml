  global_id: ger_location_4d0f144b4392
  canonical_name: USS Enterprise-C
  description: 'A battered Constitution-class starship limps through a tormented stretch
    of space, its hull scarred by recent combat and systems stuttering as it fights
    to reach a temporal rift. Alarms thrum beneath the roar of distant phaser and
    torpedo impacts; the air of the crippled vessel tastes of ozone and scorched circuitry.
    From its crippled profile, frantic helm corrections attempt one last thrust toward
    the rift while nearby allies—under a hail of Klingon fire—strain to keep it within
    range. The ship functions as a fragile, heroic fulcrum: a wounded vessel whose
    continued motion decides timelines and demands sacrificial protection.'
