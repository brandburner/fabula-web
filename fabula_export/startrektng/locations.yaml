- fabula_uuid: ger_location_e5910208afca
  global_id: ger_location_e5910208afca
  canonical_name: Secret Tunnel Indentation
  description: Nestled at a sharp turn within the alien vessel’s organic tunnel, this
    subtle indentation in the soft wall conceals a secret passage. The yielding, almost
    living surface betrays the hidden path, which Counselor Troi discovers through
    her empathic insight. This location marks a crucial threshold, transitioning the
    away team from external exploration into the vessel’s enigmatic, sentient interior.
    The tactile softness and concealed nature of the indentation evoke a living environment
    that reacts to presence, heightening suspense as the team ventures into unknown
    psychic and physical domains within the ship.
  location_type: Tunnel Feature
