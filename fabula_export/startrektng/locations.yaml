    and armed with fusion pulse lasers, activate as the starship closes in. Picard
    orders red alert; the crew locks phasers and maximizes forward shields. At full
    impulse, the Enterprise plows through, phaser bursts shattering pods amid harmless
    laser grazes, exposing the system''s fragility and amplifying the officers'' moral
