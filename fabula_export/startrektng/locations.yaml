- fabula_uuid: ger_location_e04e070073c7
  global_id: ger_location_e04e070073c7
  canonical_name: Valo III
  description: Valo III (also referred to as 'Valo Three') is a remote planet housing
    a Bajoran refugee camp, serving as a contested destination for Bajoran settlers
    escorted by the USS Enterprise through Cardassian-patrolled space. The planet
    is a focal point for diplomatic tensions, as it is both a symbol of refuge from
    Cardassian occupation and a flashpoint for extremist violence. Jas Holza, a Bajoran
    diplomatic leader, operates from the camp, which is pitched by Data as a potential
    rendezvous point for Federation talks. However, the camp's volatile mix of desperate
    militants and extremist factions—along with Cardassian accusations of terrorism—creates
    a high-stakes environment. The Enterprise's mission to deliver the Bajoran vessel
    safely is complicated by Cardassian warships, ultimatums, and the risk of violence,
    testing Federation neutrality and resolve in the region.
  location_type: Refugee Camp
