  canonical_name: Mystery Ship Organic Tunnel
  description: The Mystery Ship Organic Tunnel pulses with eerie life, an alien vessel’s
    inner artery carved from glowing, biotic walls that hum with silent menace. The
    away team materializes here, stepping into a deserted labyrinth that mirrors the
    ancient underground tunnels beneath Farpoint Station. No mechanical sound disturbs
    the unsettling quiet, heightening the sense of a living entity whose hostility
    radiates psychically toward the buried Bandi city. This tunnel embodies the ship’s
    living heart, a crucible of mystery and danger where organic architecture blends
    with psychic warfare, forcing the explorers to confront a sentient vessel’s complex
    motives and volatile power.
