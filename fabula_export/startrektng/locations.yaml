  global_id: ger_location_7e77dce9adee
  canonical_name: Daled Four
  description: 'A hostile, wedge-shaped yellow world ringed in thick, signal‑muffling
    clouds; Daled Four reads like a planet turned inward. Its distorting troposphere
    warps long‑range communication and paints the Main Viewer in sickly gold. Scientists
    maintain an uninviting research outpost amid permanent day/night hemispheres that
    scar the surface and drive entrenched factional politics. The planet functions
    as both cradle and crucible: birthplace of Salia and Anya, origin of a gigawatt
    transmission and encoded coordinates, and the charged polity Salia is expected
    to govern—remote, harsh, and politically combustible.'
