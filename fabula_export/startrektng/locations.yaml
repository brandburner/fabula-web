  global_id: ger_location_bdf70e710d6a
  canonical_name: Utility Access Corridor (USS Enterprise)
  description: Data's sensors pinpoint an unexplained energy fluctuation surging through
    this utility access corridor aboard the USS Enterprise, detected amid Level Four
    diagnostic failures in Engineering. Geordi grabs his tricorder and leads the way
    to investigate the narrow, conduit-lined passage where panels hum under strain.
    The hidden anomaly poses a critical threat to ship systems, amplifying urgency
    as replicator malfunctions signal broader vulnerabilities during the metal-eating
    parasite crisis. Boots will echo down tight bulkheads as they probe the disturbance
    endangering crew survival.
  location_type: Starship Utility Corridor
