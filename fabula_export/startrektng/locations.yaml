    shuttles plunging into the volatile clouds while bracing for Cardassian ships.
    Sensors track the nebula's glow against starry black; bridge crew tenses at readouts,
    weighing proximity for Picard's extraction against open-space vulnerability. Phasers
    charge, impulse engines hum ready—defensive poise amid interstellar void.
