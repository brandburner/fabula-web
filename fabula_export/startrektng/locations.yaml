    chase for kidnapped Data. Worf pinpoints Kivas Fajo's confirmed presence here
    via recent records, with Riker noting the criminal's departure just seven hours
    earlier. Picard commands Wesley to chart course immediately, engines surging as
    the ship hurtles toward this planet. Tension grips the bridge; the world promises
    crucial leads in a pursuit where minutes dictate Data's survival. Unseen horizons
    fuel the crew's resolve amid fading trails.
