- fabula_uuid: ger_location_7980871feb4e
  global_id: ger_location_7980871feb4e
  canonical_name: Praxillus System
  description: The Enterprise arrives in the Praxillus system to conduct Timicin's
    helium ignition experiment on a stellar core. Picard's log voices the mission's
    stakes—igniting fusion to extend Kaelon sun's life—while sensors lock onto the
    target amid starfields. Crew stands ready on the bridge, experiment's success
    hinging on precise tractor beam alignment and containment fields, as personal
    distractions like Lwaxana's romance unfold below decks.
