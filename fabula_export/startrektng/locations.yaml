  description: The Mira System orbits a red giant star, casting its planets in a deep,
    ruddy glow. This star system harbors Dytallix B, a hostile, uninhabited mining
    planet scarred by abandoned mines and extreme environmental hazards. The system
    radiates a tense, secretive atmosphere as Starfleet vessels covertly navigate
    its space, underscored by Captain Picard's sudden, unlogged course change and
    strict communications blackout. Suspense thickens in this remote stellar domain,
    shaping a crucible of isolation and covert confrontation.
