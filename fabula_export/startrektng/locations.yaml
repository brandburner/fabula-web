  canonical_name: Riker's Room (Risa)
  description: Riker's quarters on Risa open to a plush bedroom suite with a large
    window framing the planet's lush night vistas. Platters of exotic hors d'oeuvres
    crowd low tables beside an empty champagne bottle; robes heap on a nearby rack.
    Pillows scatter across the bed where Riker and Etana chase, tumble, kiss, and
    entwine. She massages his shoulders before fastening a crescent-shaped neural
    device to his ear, projecting an addictive game overlay that floods him with pleasure
    upon success. The space amplifies seduction's intimacy and vulnerability's trap.
