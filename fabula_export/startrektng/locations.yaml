- fabula_uuid: ger_location_01c8dd06f9df
  global_id: ger_location_01c8dd06f9df
  canonical_name: Drema IV
  description: 'Drema IV endures constant tectonic strain, its crust buckling under
    immense geological pressures that spawn devastating earthquakes. Picard cites
    the planet as proof of his expertise: Starfleet deployed harmonic resonators there,
    fine-tuned to specific frequencies that vibrate through fault lines and bleed
    off seismic energy harmlessly into space. Crews monitored the operation from orbit,
    watching ground sensors confirm stability as the resonators hummed in unison across
    the surface. This triumph underscores potential parallels to the Atlantis project''s
    seismic challenges, evoking a world tamed by precise technology amid rumbling
    earth and fragile calm.'
  location_type: Tectonically Unstable Planet
  parent_location_uuid: null
