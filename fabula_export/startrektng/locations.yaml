  description: 'Picard and Vash rush through this lanai next to the resort lobby,
    an open passage in Risa''s tropical paradise. Sunlight filters across tiled floors
    and low walls as Sovak pursues, extending the lobby standoff with fresh threats.
    Gentle breezes carry resort scents, but tension dominates: idyllic calm sharpens
    the peril of phaser and Ferengi rage, turning escape into confrontation.'
