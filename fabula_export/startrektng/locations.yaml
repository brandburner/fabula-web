    hold)
  description: 'A low, aft cargo hold aboard the USS Enterprise converted into a ramshackle
    refuge and quarantine/staging bay: bulkhead panels and overhead gantries under
    utility lights, stacked crates forming bunks, humid recycled air mixed with cooking
    odors and animal musk, and crowded domestic activity alongside improvised social
