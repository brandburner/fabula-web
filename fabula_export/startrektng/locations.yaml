    standoff as a colony fights for independence amid accusations that the Federation
    arms rebels. Governor Vagh charges Starfleet with interference, escalating tensions
    toward a potential war zone. Klingon forces eye the region warily, marking the
    system's stars and planets as a flashpoint where fragile alliances fray under
    rebel gunfire and whispered betrayals.
