- fabula_uuid: ger_location_523d669bd1dc
  global_id: ger_location_523d669bd1dc
  canonical_name: Federation Starship Classroom
  description: The Federation Starship Classroom serves as an ordinary educational
    space aboard the USS Enterprise, filled with desks, learning stations, and the
    restless energy of young cadets. Its familiar, structured environment shatters
    as children—including Harry Bernard, Rose, and Tara—abruptly vanish in mysterious
    flashes of light, leaving stunned classmates and creaking silence behind. The
    classroom pulses with tension and disbelief, transforming from a safe haven of
    learning into a focal point of fear and loss amid a mounting crisis of child abductions
    aboard the starship. The atmosphere is thick with sudden absence and unresolved
    dread, underscoring the vulnerability of innocence caught in a galactic conflict.
  location_type: Starship Classroom
  parent_location_uuid: ger_location_63dcf01de5cd
