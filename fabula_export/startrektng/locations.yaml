    warp jump. Data pins heading away as Geordi fights impulse blackout and core surge
    in Engineering. Ship lurches violently from warp, systems stabilize mysteriously,
    stranding them beyond this region. Sector fades as origin of lost autonomy, crew
    grips consoles amid alarms and disorientation, uncertainty thick in recycled air.
