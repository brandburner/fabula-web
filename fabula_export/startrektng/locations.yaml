    Science Stations — USS Enterprise-D
  description: Data pinpoints these Enterprise facilities as sources for a phased
    ionic pulse to sabotage the shuttle's metaphasic shield. Lateral sensor arrays
    sweep space with modulated emissions from hull-mounted coils. Science Labs One,
    Four, and Sixteen house experimental generators and field modulators amid diagnostic
    consoles and whirring calibrators. Bridge science stations channel power through
    tactical interfaces, screens flickering with pulse configurations. Crews tap panels
    in these tight spaces, air sharp with ozone as energy signatures align for covert
    disruption.
