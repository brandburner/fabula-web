  global_id: ger_location_a14e10c6166b
  canonical_name: Mining Planet
  description: Remote mining planet riddled with rocky pits from illegal ore extraction.
    Gorta, the stranded Ferengi miner, huddles in one jagged pit as Worf, Riker, Geordi,
    and Data press him for details on the Duras sisters' betrayal. Dust clings to
    sheer rock walls enclosing the interrogation. Harsh isolation strands Gorta after
    Lursa and B'Etor seize the cloaked Bird-of-Prey and flee toward the Ufandi system,
    leaving urgency to crackle in the confined air.
