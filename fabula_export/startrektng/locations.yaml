  canonical_name: Celtris III
  description: A real, geopolitically significant Cardassian border planet with an
    underground research facility developing a metagenic weapon. Unlike symbolic locations,
    Celtris III is the setting for a high-stakes Starfleet infiltration mission with
    clear ties to the Cardassian Empire and Starfleet Intelligence.
