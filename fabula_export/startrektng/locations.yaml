- fabula_uuid: ger_location_f18fe96de00c
  global_id: ger_location_f18fe96de00c
  canonical_name: Starfleet Judicial Courtroom
  description: 'A high-tech, amphitheater-style Starfleet courtroom: curved tiers
    of stainless benches rise around a central dais, clinical lights glare off polymer
    railings, and an elevated judge''s bench fixes every gaze. Recording consoles
    and discreet sensor arrays hum beneath hushed formality, while testimony funnels
    intimate life into procedural boxes—medals, a book of sonnets, a holocube—alongside
    cold artifacts like a plasteel bar and a detached hand. The room tastes of antiseptic
    and restraint; a single switch can still a person and fracture loyalties. The
    space functions as a moral crucible where law, technology, and friendship collide
    and the Federation’s stance on sentient life is publicly forged.'
  location_type: Starfleet Judicial Courtroom
