- fabula_uuid: ger_location_f6a60bdc3f36
  global_id: ger_location_f6a60bdc3f36
  canonical_name: Ficus Quadrant
  description: 'A remote swath of deep space that registers less as a map coordinate
    and more as a gap in history — the birthplace of an ancient, raspy distress beacon
    traced to an obsolete European Hegemony archive. The quadrant returns only electromagnetic
    echoes and antiquated databanks: creaking signal pulses, static-laced telemetry,
    and sensor reads that smell of long-cold circuits. Its star charts show no recorded
    launches or colonies where a human outpost should stand, leaving silence to press
    on the Enterprise like a question. The region functions as both forensic puzzle
    and moral summons, converting Picard’s scholarly curiosity into command resolve
    to investigate a vanished human settlement.'
  location_type: Deep Space Quadrant
  parent_location_uuid: null
