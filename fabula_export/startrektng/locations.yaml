- fabula_uuid: ger_location_4ade23647660
  global_id: ger_location_4ade23647660
  canonical_name: Craps Tables (Royale Casino)
  description: 'Neon glare skitters across a crowded semicircle of felt and polished
    wood where dice clack like small, decisive drums. Air tastes faintly of perfume
    and recycled ventilation; a perfume of tension and perfunctory hospitality hangs
    thick above the pile of chips. Dealers call odds with rehearsed calm while programmed
    patrons chant ritual bets; plaques and $100,000 markers glint as fortune swells
    and collapses. Here, quiet mechanical scrutiny can redirect fate — an android''s
    precise touch rebalances loaded dice, metal meets ritual as winnings cascade,
    and a single, performative legal claim convulses the room into acquiescence. The
    space functions as crucible and stage: lure, evidence field, and the pivot where
    ownership, narrative, and escape compress into a single, cinematic transaction.'
  location_type: Casino Craps Table Area
  parent_location_uuid: null
