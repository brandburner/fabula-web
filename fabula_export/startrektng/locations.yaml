  global_id: ger_location_ca18e4320722
  canonical_name: Beverly's Quarters
  description: Beverly's quarters provide a sterile yet intimate refuge from Starfleet
    Academy's clinical corridors. Quiet tension fills the space as Picard relays Wesley's
    accident details—burns, fractures, a teammate's death—prompting Beverly's medical
    questions to mask her panic. Privacy enables her suppressed grief to emerge; she
    steps away, creating physical distance that echoes their emotional rift. Familiar
    surroundings contrast the Academy's impersonality, amplifying the raw stakes of
    maternal fear and institutional duty.
