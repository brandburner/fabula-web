  description: Crew races across dark surface at night. Data stood here cloaked, reporting
    on silver-gray predators draining energy from a forcefield-trapped ophidian. Vortex
    erupts with sonic boom, swallows him. Team finds generator and hand control scattered
    amid disturbance traces. Air hums with residual energy; shadows hide lurking threats.
    Picard and Riker scan empty ground, urgency sharpening their focus on the void
    left behind.
