  canonical_name: Crewmembers' Quarters (USS Enterprise-D)
  description: 'Riker and Ro Laren push through the doors into these standard crew
    cabins aboard the Enterprise-D, where disoriented residents clutch at fragmented
    memories. Personal items clutter compact desks and bunks—data padds, family holos,
    half-read novels—now mocking their owners'' confusion. The investigators question
    them amid the hum of life-support systems, each room a stark reminder of the crisis''s
    intimate toll: privacy shattered, routines upended, vulnerability exposed in spaces
    built for respite.'
