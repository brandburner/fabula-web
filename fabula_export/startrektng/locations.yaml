    alcove funnels footsteps and sightlines into a compact choke point. Damp stone
    swallows light; emergency lamps throw hard-edged shadows across dust, scorched
    equipment, and shadowed ledges. The spot serves both as a staging point and a
    moral crucible—sentries kneel in the doorway, tactical gear and hyposprays whisper,
    and the air carries metallic tang and distant system thrum. This threshold frames
