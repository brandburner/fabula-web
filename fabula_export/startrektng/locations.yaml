- fabula_uuid: ger_location_6078ce646f1e
  global_id: ger_location_6078ce646f1e
  canonical_name: Alpha Onias III
  description: Sensors on the Enterprise bridge capture anomalous subspace fluctuations
    beaming from Alpha Onias III, a planet Starfleet logs as barren and lifeless.
    Data pinpoints the signals to its surface, clashing with uninhabited reports and
    sparking Picard’s suspicion of a concealed Romulan base. The distant world yanks
    the crew from Riker’s birthday party into urgent scrutiny, its silence breeding
    tension over hidden threats that sensors strain to pierce.
  location_type: Remote Planet
