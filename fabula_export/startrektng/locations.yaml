  global_id: ger_location_3eb0933564d7
  canonical_name: Pulaski's Office
  description: A compact, clinical pocket set directly off Sickbay where antiseptic
    air and pale overhead panels compress conversation into urgent choices. Consoles
    glow with diagnostic readouts, a modest desk and two chairs flank a supply shelf,
    and the space holds at once the tools of medicine and the weight of command. Here
    Picard bursts in with tight footsteps and leaves with a quieter resignation; here
    Pulaski pins authority to a console, her glare and terse replies buying the uninterrupted
    time required for an experimental gambit. The room houses a diagnostic impasse
    and the thorned object of crisis, converting technical failure into an ethical,
    emotional crucible where private ritual, clinical procedure, and decisive action
    collide.
  location_type: Starship Sickbay Office
