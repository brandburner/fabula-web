  canonical_name: Galorndon Core Pit — Beam-Out Spot (Pit Perimeter)
  description: On the battered Galorndon Core pit perimeter a churned, mud-slick clearing
    serves as the away team's designated transport aperture. Lightning and electrical
    storms tear the sky; sheets of rain, ionic interference, and collapsing transporter
    windows make beaming intermittent and dangerous. The compact staging area—boots
    sinking in wet earth, voices shredded by static—frames an urgent moral choice
    as the injured Romulan and stranded crew are carried toward a last-chance evacuation
    point. The location functions as both a hostile environmental fringe of the pit
    exterior and a specific beam-out spot used in the episode's rescue sequence.
