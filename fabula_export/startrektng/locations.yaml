  canonical_name: Arsenal of Freedom
  description: A ruined, deceptive weapons installation sprawls across the planet
    surface, where simulated allies collapse into hovering, lethal constructs. Sensors
    and projections flicker as convincing faces peel away to expose compact, autonomous
    weaponry that fires energy fields and electro-plasmic waves. The ground fills
    with the electric sting of concussive discharges, frantic comms, and the metallic
    tang of damaged circuitry. Characters feel betrayal, sudden incapacitation, and
    urgent medical triage—an environment that converts tactical subterfuge into immediate,
    chaos-driven survival on a hostile battlefield.
