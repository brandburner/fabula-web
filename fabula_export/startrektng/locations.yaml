  global_id: ger_location_bd93d3bf067e
  canonical_name: Praxillus Surface
  description: A massive, fiery red expanse churns under intense stellar forces. The
    surface heaves as explosions ripple from the star's core, where temperatures climb
    to 220 million degrees Kelvin amid stable radiation and controlled pressure. Geordi
    and Data relay data feeds capturing this volatile renewal, while Timicin watches
    his experiment ignite success before instability looms. The roiling plasma underscores
    the high stakes of stellar engineering against cosmic fury.
  location_type: Star Surface
  parent_location_uuid: ger_location_7980871feb4e
