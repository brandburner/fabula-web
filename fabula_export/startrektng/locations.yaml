  global_id: ger_location_090c45b1b52d
  canonical_name: Paul Stubbs' Quarters (Stubbs' Cabin)
  description: Private quarters belonging to Paul Stubbs aboard the starship. The
    compact, low‑ceilinged cabin functions both as living/work space and, at moments
    of crisis, a claustrophobic site of enforced isolation and psychological unraveling.
    The room’s atmosphere alternates between recycled‑metal sterility and ozone/solder
    tang as failing terminals and cooling fans stutter; lighting constricts to narrow
    pools and occasional electrical arcs can render the occupant unconscious. Narrative
    beats occurring here include a disciplinary rebuke that turns the space into supervised
    confinement and a localized technical/biological assault that escalates contagion
    from nuisance to deliberate threat. The cabin therefore serves as both holding
    cell and locus of tactical revelation.
  location_type: Private Cabin (Researcher Quarters)
