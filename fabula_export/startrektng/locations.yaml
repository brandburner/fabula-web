  description: 'A *specific, catastrophic subspace anomaly* with a defined narrative
    role in *Star Trek: TNG S07E09 (''Force of Nature'')*, directly tied to the USS
    Enterprise''s escape during the Hekaras crisis and the death of Serova. Characterized
    by *intense tetryon radiation*, *accelerating spatial instability*, and *reality-warping
    forces*. Observed externally as a *glowing tear in space* and internally as a
    *chaotic maelstrom of distortions*.'
  location_type: Subspace Rift Interior
