- fabula_uuid: ger_location_e52408ebd409
  global_id: ger_location_e52408ebd409
  canonical_name: Observation Lounge (USS Enterprise-D)
  description: Senior officers crowd the Observation Lounge aboard the USS Enterprise-D,
    its sterile lighting casting sharp shadows across the conference table. Large
    viewports frame the starfield beyond, underscoring the isolation as Admiral Hanson
    relays the USS Lalo's violent erasure by a cube-shaped vessel. Tension grips the
    room—Picard snaps orders for warp 9 pursuit, Shelby pitches shield tweaks and
    phaser mods, voices low and urgent against the hum of displays. Crew faces register
    shock and resolve, the space contracting around their desperate countermeasures
    and the unspoken Borg shadow.
  location_type: Starship Observation Lounge
