  global_id: ger_location_991d74e1c9f1
  canonical_name: Abandoned Planet
  description: 'A forsaken, wind‑scarred world that radiates dormant menace; its atmosphere
    sits like a held breath ready to crush life the moment a barrier fails. From the
    ship’s vantage the planet reads as both archaeological riddle and immediate hazard—the
    air tasting of ozone and static, pressure gradients steep and sudden, and invisible
    currents that will flood any exposed space in seconds. Here an away team becomes
    a human summary of risk: trapped inside an alien construct whose field alone keeps
    the planet’s lethal sky at bay. The place functions narratively as the origin
    of urgency and moral reckoning, where a single breach promises catastrophic inhalation
    and near‑instant death.'
  location_type: Uninhabited Planet Surface
