  global_id: ger_location_996bf3bc18d4
  canonical_name: Omicron Theta System
  description: Omicron Theta System stands as the distant star system housing Data's
    enigmatic home planet, a place cloaked in the solemn mystery of origins and lost
    history. The USS Enterprise alters its course with a stirring resolve, shifting
    from routine exploration to a deeply personal mission to uncover the roots of
    Lieutenant Commander Data's existence. As the ship approaches this remote system,
    the atmosphere tightens with anticipation and introspection, marked by Data's
    absence from the bridge and the youthful weight Wesley Crusher assumes at his
    station. This system embodies themes of homecoming, identity, and existential
    inquiry, serving as the cosmic threshold where past shadows and future revelations
    collide.
  location_type: Frontier Space Colony
