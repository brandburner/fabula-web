  description: Data names the Daystrom Institute as home to the theoretical tomographic
    imaging scanner, a conceptual device built to slice through spatial anomaly interference.
    In tense Engineering talks aboard the Enterprise, he pitches it as the key to
    probing the threat erasing humanity. Engineers there forge untested tech amid
    high stakes, channeling Federation ingenuity into tools that defy warp core assumptions
