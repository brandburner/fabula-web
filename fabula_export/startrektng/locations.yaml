- fabula_uuid: ger_location_a023586d141b
  global_id: ger_location_a023586d141b
  canonical_name: Klingon Homeworld Surface
  description: Rugged expanse of the Klingon homeworld transmits a coded personal
    message to Picard, its cryptic words arriving precisely after his clash with Worf
    over Khitomer records. Duras family agents or Romulan operatives dispatch the
    signal from this warrior planet, where honor duels and political betrayals shape
    the air. Barren ridges and howling winds frame the site of intrigue, pulling the
    Enterprise deeper into Klingon succession chaos. Distance amplifies the message's
    menace, forcing Picard to question unseen loyalties amid Federation neutrality.
  location_type: Planetary Surface
