- fabula_uuid: ger_location_ceac59318f16
  global_id: ger_location_ceac59318f16
  canonical_name: The Royale (Hotel)
  description: 'The Royale (Hotel) glares like a trapped memory of twentieth‑century
    Las Vegas: a neon cowgirl watches over gaudy carpeting, stale cigarette smoke
    hangs in artificial stillness, and a revolving door snaps closed on any hope of
    exit. The space operates less like a building and more like a sealed narrative
    engine—scripted murders, preserved corpses in pale‑blue flight suits, and fridge‑cold
    motel suites rendered as museum dioramas. Sensory cues (garish light, antiseptic
    preservation, the metallic click of a doomed plot turning) compress time and agency,
    turning lobby, corridors, and suites into a claustrophobic stage where the hotel
    both imprisons and performs its victims. The Royale functions simultaneously as
    crime scene, theatrical set, and legal object of the crew’s escape strategy.'
  location_type: Artificial Narrative Hotel
  parent_location_uuid: null
