- fabula_uuid: ger_location_e0222349e17d
  global_id: ger_location_e0222349e17d
  canonical_name: Picard's Ready Room (USS Enterprise-D)
  description: |-
    The Captain's Ready Room aboard the USS Enterprise-D serves as Picard's private office, appearing in three distinct temporal contexts across *All Good Things...*:
          1) **Past Timeline (location_72496696d9bf)**: Picard confronts Troi amid crew distrust, with the replicator's failure signaling timeline instability. Tasha Yar's voice and young Riker's image appear via com panel, prompting Troi's confession of their past romance. The space confines their tense exchange until Q transports Picard to courtroom judgment.
          2) **Present Timeline (location_d0fb010ab3ab)**: Picard materializes back into this office disoriented, gasping for breath as Q's courtroom gong fades. The room's enclosed quiet sharpens the shock of Q's verdict—humanity guilty, Picard its cause—before he moves toward the bridge.
          3) **General Timeline (location_47a8a0842440)**: The room functions as Picard's retreat during Yellow Alert, featuring LCARS consoles, a star-strewn viewport, and chairs for strategy talks. Beverly's worried gaze trails him as he withdraws here to grapple with personal stakes and command burdens.

          **Key Features**: Polished desk, LCARS consoles, viewport, replicator (with temporal programming quirks), com panel, and a low table for meetings. The room's enclosed nature amplifies emotional and narrative tension, serving as a threshold between Picard's public command and private vulnerabilities.
  location_type: Starship Captain's Ready Room
