- fabula_uuid: ger_location_5fc9bdbb0626
  global_id: ger_location_5fc9bdbb0626
  canonical_name: Holodeck Three
  description: Holodeck Three on the USS Enterprise-D confines Lieutenant Barclay
    during a high-stakes mission, where he interfaces directly with the ship's computer
    in his hyper-intelligent state, unresponsive to bridge commands and steering the
    vessel toward a galactic core disturbance. Geordi La Forge learns of this unusual
    location from Engineering and scowls before rushing there. Picard later sends
    Worf with a security team to force a disconnection, transforming the grid-floored
    chamber with humming emitters into a site of desperate intervention. Shadows from
    prior Tarchannen simulations linger amid the emitters' glow, amplifying isolation
    and crisis tension.
  location_type: 'Starship Interior: Holodeck Simulation Chamber'
