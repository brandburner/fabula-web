  global_id: ger_location_de388d2222e6
  canonical_name: Transporter Stage (USS Jenolan Ops Center)
  description: A two-man transporter stage in the dimly lit Ops center of the derelict
    USS Jenolan, powered by auxiliary systems amid the ship's failing life support
    and stale air. This platform is used by Riker, Geordi, and Worf to revive Montgomery
    Scott from 75 years in stasis. The stage glows as Scott materializes, disoriented,
    highlighting the outdated system's improbable preservation of life against severe
    decay. The Ops center itself is a cramped, dimly lit chamber with smashed bulkheads,
    burnt-out consoles, and a modest command area, where the crew detects Scott's
    stasis pattern buffer.
  location_type: Starship Transporter Platform
