  description: A derelict orbital cryonics storage module — a compact, clinical habitat
    suspended in high orbit whose rows of sealed stasis pods have rimed with frost
    and slicked with oil‑streaked condensation. Diagnostic LEDs and refrigeration
    pumps sputter beneath corroded panels as printed nameplates and corporate seals
    peel under ice. The module’s redundant life‑support systems now cough and fail,
    the air carrying antiseptic cold and the metallic tang of dying machinery; what
    was once bureaucratic cargo and a preservation ritual becomes an urgent medical
