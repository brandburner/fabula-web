  global_id: ger_location_fa7e336b5a61
  canonical_name: Tasha Yar's Home Colony
  description: Tasha Yar's Home Colony stands as a haunting, distant place etched
    deeply into her psyche, where brutal violence shattered her sense of safety. Recalled
    through fractured memories and nightmarish hallucinations, this colony’s dark
    underbelly emerges as a grim backdrop of trauma and survival, marked by the terror
    of being hunted by a violent rape gang. Though unseen directly, the colony’s oppressive
    atmosphere looms large, shaping Tasha’s guarded demeanor and emotional scars,
    embodying the dangerous world from which she escaped to join Starfleet. This location
    pulses with raw vulnerability and echoes of past horrors that relentlessly threaten
    her present stability.
