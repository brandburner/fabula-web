  canonical_name: Borg Lab
  description: Sterile chamber aboard the Borg ship crammed with alien consoles, humming
    Borg technology, and scattered weapons. Geordi straps to a tilting platform here,
    blindfolded and helpless under Data's clinical experiments—scans probe his neural
    net, near-irradiation threatens destruction, pain receptors neutralized amid cold
    lighting. Tension peaks as Data halts procedures after Geordi's pleas, then confronts
    and kills Lore at a flickering console. Clinical detachment clashes with desperate
    human pleas, amplifying captivity's horror and android betrayal.
