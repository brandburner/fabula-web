- fabula_uuid: ger_location_442384f46c70
  global_id: ger_location_442384f46c70
  canonical_name: Ventax II
  description: |-
    Ventax II (also referred to as 'Ventax Two' in some records) is a colonized planet characterized by agrarian fields and a society that abandoned advanced technology a millennium ago. The planet is plagued by geological tremors and mass hysteria fueled by the legend of Ardra, an ancient devil-figure from Ventaxian prophecies. Key locations on Ventax II include:
          1. **Surface regions**: Agrarian fields, sites of mass hysteria, and the epicenter of the cultural collapse.
          2. **Ventax Two Science Station**: A Federation research outpost besieged by a mob led by Acost Jared, where Dr. Clark and her technicians barricade amid breached doors, smoke, and screams. The station serves as a battleground where the away team (Picard, Data, Worf, Troi) confronts Ardra's mythic forces.
          The planet becomes a focal point for a direct confrontation between Picard’s away team and the mythic forces unleashed by Ardra’s legend, turning its surface into ground zero for cultural collapse and myth-made-real.
  location_type: Inhabited Planet
  parent_location_uuid: ger_location_338cbd746edc
