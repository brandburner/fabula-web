  global_id: ger_location_0db17f5063d9
  canonical_name: Federation Territory
  description: Picard charts warp two to this secure expanse, pulling the Enterprise
    from Neutral Zone tensions after Mendak cuts communications over T'Pel's death.
    Crew shifts focus from diplomatic fallout to homeward transit, sensors soon sweeping
    familiar stars under Federation protection. Bridge commands echo the relief of
    crossing into defended space, where Romulan accusations fade against the vast,
    patrolled frontier.
  location_type: Federation Controlled Space
