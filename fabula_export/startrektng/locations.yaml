  canonical_name: Lieutenant Hagler's Quarters (Deck Seven, Section Nineteen)
  description: 'Worf''s bridge alarm pinpoints Lieutenant Hagler''s quarters on Deck
    Seven, Section Nineteen, as the site of the missing officer''s abrupt return.
    This private cabin—compact with bunk, console, and personal gear amid the Enterprise-D''s
    steady hum—snatches focus from tetryon sensor analysis. Hagler''s presence sparks
    crew alarm: Does exhaustion mark him? Alien influence? The space embodies sudden
    pivot from anomaly to human peril, isolation amplifying crisis stakes.'
