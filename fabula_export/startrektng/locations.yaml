    level scorched by an inexplicable radiation burst. Officers smell hot ionized
    air as tricorders flash anomalous readings and a quarter-sized melted duranium
    scar gapes in a bulkhead outside Cargo Bay Twelve. Red emergency indicators and
    distant alarms throw hard, clinical light over sealed hatches and tense technicians.
