  description: A compact, utilitarian cache of spare parts and consumables, Ship's
    Stores hums with fluorescent light and the low mechanical heartbeat of a starship.
    Metal racks groan under crates stamped with inventory codes; narrow aisles funnel
    technicians and apprentices who rifle through labeled bins for urgently needed
    components. The air smells of machine oil and ozone. Functioning as the ship’s
    logistical nerve, it converts engineering requests into tangible relief — a place
    where crises shrink to a single salvaged module.
