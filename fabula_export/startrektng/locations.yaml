- fabula_uuid: ger_location_f22ac64df040
  global_id: ger_location_f22ac64df040
  canonical_name: Outer Cometary Cloud
  description: 'A ragged, diffuse halo of icy bodies drifts at the edge of sensor
    range: slow, glittering arcs, pale nuclei and motes of dust that flicker across
    tactical displays. Bridge consoles translate that cold scatter into course vectors
    and collision warnings, and the stellar backdrop feels sharpened and impartial.
    The cloud functions as both destination and danger—it compresses command decisions
    into crisp helm orders, sharpens discipline, and converts philosophical calm into
    immediate navigational urgency.'
  location_type: Cometary Cloud (Astronomical Region)
