- fabula_uuid: ger_location_41365b04d9a4
  global_id: ger_location_41365b04d9a4
  canonical_name: Ready Room (Admiral Hanson's Galaxy-Class Starship)
  description: Admiral Hanson's ready room on his Galaxy-class starship doubles as
    a crisis command hub. He occupies the space during subspace linkups with the Enterprise
    crew, issuing briefings on Picard's loss to the Borg and promoting Riker to captain.
    Wall-mounted LCARS consoles display fleet deployments and Borg trajectories. Dim
    lighting casts shadows across the desk and chairs, amplifying the admiral's resolute
    tone and the mounting pressure of Earth's defense.
