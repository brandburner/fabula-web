- fabula_uuid: ger_location_03ce626248d1
  global_id: ger_location_03ce626248d1
  canonical_name: Debin Craft
  description: The Debin Craft pulses with restrained hostility as it hangs in silent
    confrontation with the USS Enterprise—an alien vessel bristling with diplomatic
    tension and paternal outrage. Angular hull plates catch the sterile glow of bridge
    lighting reflected on the Main Viewer, its surfaces sharpened by the edge of accusation.
    This compact warship serves as both communication hub and emotional battleground,
    its cramped interior vibrating with the raw energy of Debin's wounded pride and
    his daughter Yanar's visible shame. Every transmission from its comm array carries
    the weight of violated honor codes, transforming the craft from neutral transport
    into a vessel of vengeance. Cold instrument panels reflect the faces of its angry
    occupants, their silhouettes moving like specters behind viewport glass as they
    prepare their damning presentation for Picard—starship against starship in a standoff
    where truth and perception collide.
  location_type: Alien Diplomatic Vessel
