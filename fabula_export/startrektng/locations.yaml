  global_id: ger_location_2eadc962b05b
  canonical_name: Reception Room Outside Dining Room
  description: The Reception Room Outside Dining Room tightens atmosphere into a crucible
    of hostility and psychological warfare. Its confined space crackles with undercurrents
    of suspicion and veiled accusations. Here, a grim, sarcastic toast to the ill-fated
    USS Horatio unfolds, punctuated by biting dismissals and sharp provocations that
    deepen mistrust. The room's tense ambiance traps characters in a charged confrontation
    that fractures leadership bonds and escalates the infiltration crisis, turning
    ritualized ceremony into a weaponized arena for power struggles and covert agendas.
  location_type: Starship Reception Room
