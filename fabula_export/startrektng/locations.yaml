  description: Counselor Troi approaches her vanity in her Enterprise quarters to
    retrieve a hairbrush, selecting it as the focal object for Jev's invasive Ullian
    memory probe. Picard stands nearby, his reluctance palpable amid the room's soft
    lighting and personal furnishings. The polished surface holds intimate reminders
    of routine self-care, now charged with tension as Troi grips the brush, her face
    tightening with resurfacing trauma from an unseen violation. This private fixture
    anchors the procedure's emotional weight, exposing her vulnerability under Jev's
    clinical guidance.
