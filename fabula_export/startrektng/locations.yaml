  global_id: ger_location_7c9ec73d43bf
  canonical_name: Bajoran Carrier
  description: This aging Bajoran carrier rises from the planetary surface toward
    Valo III, its engines limited to half-impulse speed. Picard hails from the Enterprise
    bridge and draws a terse audio acknowledgment—no visuals appear, signaling the
    crew's guarded distrust. The ship embodies strained Bajoran-Starfleet ties, crewed
    by those scarred by occupation, as Ro matches its sluggish pace under Picard's
    precise orders.
