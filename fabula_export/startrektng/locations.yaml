  global_id: ger_location_29c230e4582a
  canonical_name: J-Two-Five System
  description: 'A distant, unnamed star system that suddenly anchors the Enterprise
    in an enforced silence — Data’s precise sensors pin the ship’s position near J-Two-Five
    after a seven-thousand‑light‑year displacement. The system reads as a cold reference
    point on tactical displays: a sparse constellation beyond the viewscreen that
    converts panic into coordinates. Its presence tightens the ship’s emotional atmosphere
    — Guinan’s private dread, Riker’s incandescent anger, and Picard’s reluctant resolve
    all land against this isolated stellar backdrop. Functionally, the system operates
    as a narrative boundary between known Federation space and an alien gulf: it quantifies
    distance to rescue (a two‑year transit to the nearest starbase at maximum warp),
    dramatizes operational isolation, and concentrates urgency into command decisions
    made under cosmic pressure.'
