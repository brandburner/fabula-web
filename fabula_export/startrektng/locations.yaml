  global_id: ger_location_d0db62fc4aa9
  canonical_name: Planet Surface Near Manheim's Laboratory
  description: A scarred stretch of planet surface that was the emplacement for an
    industrial field generator and its mirror‑coil arrays adjacent to Manheim’s compact
    research lab. Braided conduits run from a concrete plinth to reflective coils
    that concentrate ambient discharges into focused pulses; the soil and equipment
    are scorched and pitted, the air tastes of ozone and the ground hums with latent
    charge and intermittent flashes. The site bears blast‑shattered workstations,
    ruined ground computers and singed data nodes; fluctuating energy fields warp
    instruments and evidence. Functionally this location is both the physical origin
    of a catastrophic pulse (Krieger Waves) and the evidentiary crucible investigators
    must catalogue—material recovered here drives holodeck reconstructions and procedural
    adjudication.
