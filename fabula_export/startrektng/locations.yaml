- fabula_uuid: ger_location_701c5bf1b6f0
  global_id: ger_location_701c5bf1b6f0
  canonical_name: Center of the Vortex
  description: 'A violent, pinpoint heart of a living spatial maelstrom that drags
    vessels like a mechanical hand. The center throbs with white-hot energy: probes
    vaporize on contact, energy filaments lash across command consoles, and an almost-gravitational
    pull pins the Enterprise immobile. The locus fixes itself on Jean-Luc Picard,
    radiating an instinctive, probing attention that manifests as a tractor-like drag
    and a wreath of power around his terrified duplicate. The place smells of ozone
    and fear, sounds as a high, keening hum, and functions as both lethal threat and
    desperate target for a last-ditch rescue.'
  location_type: Interdimensional Vortex Core
  parent_location_uuid: ger_location_650009a84e61
