- fabula_uuid: ger_location_a53032faed84
  global_id: ger_location_a53032faed84
  canonical_name: Antede Three
  description: 'Antede Three sits beneath the Enterprise’s orbit as the Antedians’
    home world and the diplomatic fulcrum for a fraught mission. The planet projects
    cultural distance: its delegates arrive in self‑induced catatonia and bear unfamiliar,
    writhing vermicular food that raises immediate biohazard and ethical questions
    aboard the ship. Antede Three therefore functions as both origin and provocation—its
    traditions pressuring Starfleet protocol, its presence forcing containment, medical
    scrutiny, and heightened security as fragile politeness collides with visceral
    unease.'
  location_type: Planetary World
  parent_location_uuid: null
