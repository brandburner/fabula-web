- fabula_uuid: ger_location_e6a53f4f555b
  global_id: ger_location_e6a53f4f555b
  canonical_name: Dyson Sphere Interior
  description: A massive circular portal irises open, exposing the Dyson Sphere's
    colossal interior chamber where a brilliant star blazes at the core. Tractor beams
    and graviton surges seize the Enterprise, hurling the ship past dish antennas
    into this starlit void. Bridge crew stumbles under emergency red lighting as impulse
    power fails, the megastructure's immense curve swallowing the vessel whole. Awe
    mixes with dread; this hidden stellar enclosure redefines the sphere as a habitable
    enclosure engineered around its captive sun, trapping intruders in engineered
    silence.
  location_type: Megastructure Interior
  parent_location_uuid: ger_location_760ffc5356aa
