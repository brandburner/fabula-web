- fabula_uuid: ger_location_c67fc8a1dfb6
  global_id: ger_location_c67fc8a1dfb6
  canonical_name: Aucdet Nine
  description: 'Aucdet Nine burns beneath Enterprise''s sensor array as both sanctuary
    and death-trap, its plague-stricken surface blotched with desperate quarantine
    strobes. This colony world pulses with lethal urgency - Federation medical stations
    orbit like mechanical sentinels while surface facilities leak hemorrhagic terror
    into vacuum. The planet serves dual masters: source of salvation specimens racing
    toward containment systems, and ticking clock driving every bridge decision. Ghost-blue
    atmospheric swirls hide thousands dying in isolation beneath, while surgical-sterile
    orbital platforms await Enterprise''s cargo of carefully packaged apocalypse.
    Every sensor sweep reveals new horrors: empty vessels where crews vanished into
    fever shadows, medical equipment abandoned mid-procedure, entire settlements sealed
    behind biohazard forcefields like urns waiting for cremation.'
