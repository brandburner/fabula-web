- fabula_uuid: ger_location_be7b06c803a4
  global_id: ger_location_be7b06c803a4
  canonical_name: Duck Blind Hillside
  description: A remote, grass-swept slope that sits downwind from the assembly hall,
    the Duck Blind Hillside presents a lone, shimmering duck blind as a metallic silhouette
    against the sky. From the bronze astrolabe's ceremonial vantage the blind catches
    light and seems almost otherworldly; wind rasping through scrub and the faint
    tang of metal accompany the sightline. The place functions as a narrative threshold—an
    ordinary landscape pierced by anomalous technology—drawing Liko and Oji away from
    ritual into investigation, suspense, and the cultural rupture that follows.
  location_type: Terrain Feature (Hillside / Slope)
