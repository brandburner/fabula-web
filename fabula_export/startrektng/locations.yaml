- fabula_uuid: ger_location_affe17c3c829
  global_id: ger_location_affe17c3c829
  canonical_name: Loose Orbit
  description: 'Cold fragments wheel in a loose orbit — an anonymous ring of debris
    suspended against the black, untethered and drifting with indifferent grace. Sensors
    paint it as scattered punctuation: irregular glints, slow, lazy trajectories,
    and an object dense enough to warrant a beam‑up. The orbit itself reads as a liminal
    zone, neither settled nor ballistic, a spatial ambiguity that snaps Picard from
    private calculation into urgent command. The debris field functions as narrative
    provocation: it smells of risk, invites forensic curiosity, and converts philosophical
    stillness into immediate operational peril as the crew commits to retrieve a sample.'
  location_type: Planetary Orbital Location
  parent_location_uuid: null
  season_appearances:
