  description: The Enterprise closes on Sector 21503, a tense stellar expanse hugging
    the Cardassian border where fragile peace hangs by a thread. Data announces proximity
    from the conn, prompting Picard to order Worf's sensor sweeps for patrols. Crew
    tensions flare—Worf decries Cardassian honor, Troi defends alliance ideals—as
    Picard recounts his Stargazer ambush, lowering shields only to face betrayal.
    The starfield outside the viewscreen pulses with unseen threats, every ping a
