  description: Geordi names the Modean system as a key site for his father's exozoological
    fieldwork, where researchers studied alien invertebrates across its planets and
    outposts. He recalls shuttling there during childhood, amid a nomadic pattern
    of travel between distant research stations and starship commands. The system's
