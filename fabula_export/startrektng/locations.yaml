  global_id: ger_location_16d34ec3102b
  canonical_name: Bakery on Third
  description: Tucked on Third Street in 1893 San Francisco, this bakery equips hotel
    bellboys like Jack with wax-paper-wrapped pastries still warm from the oven and
    stacks of the morning newspaper, its pages crisp with fresh ink. Flour dusts the
    wooden counters amid the hum of coal ovens and the chatter of early customers
    pushing through the city's morning fog. Though unseen, the spot roots daily hustles
    in simple transactions, fueling ambitions sparked in nearby hotel rooms.
  location_type: Urban Bakery
