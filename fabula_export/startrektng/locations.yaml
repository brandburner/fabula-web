  canonical_name: Ferengi Shuttle
  description: A compact Ferengi shuttle drifts powerless through the starlit void
    near the USS Enterprise, its containment field flickering and collapsing while
    the reactor core destabilizes. Inside, two Ferengi crew scramble amid blaring
    alarms and shuddering bulkheads, their distress calls cut short as sparks ignite
    a chain reaction. The vessel erupts in a brilliant flash, hurling twisted debris
    outward in silent vacuum, observed from the Enterprise bridge as a stark loss.
  location_type: Ferengi Shuttle
