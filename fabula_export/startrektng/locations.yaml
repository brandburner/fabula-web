  description: Picard's tricorder picks up this structure 2 kilometers south across
    the alien planet's surface, the sole nearby signal of potential civilization or
    resources amid raging plasma storms. From the wrecked Iyaaran shuttle's interior,
    it beckons as Picard's best hope for aid to save the injured pilot Voval and secure
    rescue. Harsh terrain and isolation amplify its promise and peril, pulling the
    captain into unknown dangers under stormy skies.
