  global_id: ger_location_c17d17c40265
  canonical_name: Planet Cygnus IV (Farpoint Planet)
  description: 'Planet Cygnus IV, also known as Farpoint Planet, is the silent, looming
    celestial body central to the early episodes of Star Trek: The Next Generation.
    The U.S.S. Enterprise maintains a steady orbit around this enigmatic world, which
    serves as the backdrop for the intense cosmic trial conducted by Q at Farpoint
    Station. This planet’s quiet surface and emotional resonance establish it as a
    crucible where humanity’s worth is scrutinized, embodying the mounting tension
    and anticipation that permeate the Enterprise crew''s experience during this critical
    test.'
