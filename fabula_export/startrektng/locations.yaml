  global_id: ger_location_a3550dab644f
  canonical_name: Denius Three
  description: 'Denius Three registers as a remote planetary digscape: wind-scoured
    trenches, half-buried strata, and concreted excavation scaffolds encircle a ruin-strewn
    horizon. Archaeologists pick through millennia of dust where a corroded alien
    device lay hidden, its metal pitted and whispering ancient trajectories. The site
    feels politically hot — provenance transforms into leverage — so every footprint
    and catalog number carries geopolitical weight. Light slants across exposed seams
    of rock; the air tastes of ozone and old fire, and secrecy hangs as thick as the
    sediment.'
  location_type: Planetary Archaeological Dig Site
