  global_id: ger_location_3d5c7c59656c
  canonical_name: Upper Atmosphere of Galorndon Core
  description: Gales carve a charged sheath across Galorndon Core's upper atmosphere,
    a storm-wrapped band of turbulence that chews at sensors and reddens instrument
    readouts. Consoles flash smeared returns as particulate scatter and ionized currents
    drown routine telemetry; static and false echoes puncture the bridge's attentions.
    A probe plunges into the maelstrom while Wesley's neutrino beacon threads a narrow
    signal through the noise. The space functions as a hostile investigative threshold—ferocious
    winds, abrasive charged particles, and chaotic atmospheric shear that make detection
    and rescue precarious yet urgent.
