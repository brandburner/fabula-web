  global_id: ger_location_43c531d01819
  canonical_name: Trill Ship
  description: The Trill Ship races through space, delayed nine hours and carrying
    the new host Kareel for Odan's symbiont. Enterprise crew intercepts it at warp
    nine amid urgent medical crisis on the bridge, where Beverly Crusher prepares
    the life-saving transfer. After success, the ship departs with Odan in Kareel,
    parting company from the Enterprise and symbolizing Beverly's final separation
    from her lover's ever-changing form. Crew watches it vanish, tension easing into
    sorrow.
