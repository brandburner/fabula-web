- fabula_uuid: ger_location_a5e169d0eccd
  global_id: ger_location_a5e169d0eccd
  canonical_name: First Starbase
  description: 'First Starbase perches off-ship as the routine medical and logistical
    anchor for Starfleet vessels: docking rings and transfer berths frame a functional
    silhouette, while sterile sickbays, triage bays, and administrative wards hum
    with the quiet efficiency of institutional care. Crew members invoke it as the
    standard for clinical familiarity—Garrett notes she has never seen a sickbay like
    the Enterprise‑D’s, not even on a starbase—marking the station as a pragmatic,
    clinical reference point for treatment, transfer, and bureaucratic processing.'
  location_type: Federation Starbase (Orbital Facility)
