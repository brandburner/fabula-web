  canonical_name: Escape Pod Chamber Adjoining Tunnels
  description: Narrow tunnels branching off the escape pod chamber, used by Alliance
    guards to respond to proximity alarms. Metal grating amplifies footsteps and echoes,
    while the confined space heightens urgency as reinforcements rush to defend the
    pod. This location is distinct from the fusion generator tunnel and serves as
