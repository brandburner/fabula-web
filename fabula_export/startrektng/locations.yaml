- fabula_uuid: ger_location_f0b6ad7ee0db
  global_id: ger_location_f0b6ad7ee0db
  canonical_name: Romulan Senate
  description: 'Senator Pardek serves here as the central hub of Romulan political
    power, convening for sessions that drive imperial decisions. Data pinpoints its
    recesses on the third day of the Romulan week, when Pardek retreats to the Krocton
    Segment, leaving chambers empty. Crew discussions reveal its rhythm: active deliberations
    yield to scheduled silences, tying Pardek''s reformist work to this institutional
    pulse amid tense interstellar maneuvering.'
  location_type: Romulan Senate Chamber
