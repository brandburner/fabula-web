  global_id: ger_location_4df271898311
  canonical_name: Soren’s Quarters (USS Enterprise-D)
  description: 'Riker hurries to this private cabin aboard the USS Enterprise-D, pulse
    quickening at the thought of reuniting with Soren to seal their escape from J’naii
    oppression. The door frames their hidden sanctuary, site of whispered plans and
    forbidden intimacy. Krite bursts out instead, shoulders squared in the corridor,
    slams the truth home: Soren sits in custody. Steel bulkhead and soft lighting
    enclose a space now echoing with betrayal, its threshold dividing personal passion
    from public judgment. Tension crackles as Riker absorbs the blow, fueling his
    defiance.'
