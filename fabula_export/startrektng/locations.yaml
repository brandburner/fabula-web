  global_id: ger_location_3b3d14e4c747
  canonical_name: Enterprise Shuttlebay (USS Enterprise-D)
  description: Crew secures the deactivated nucleonic probe in this primary shuttlebay
    aboard the USS Enterprise-D, its cavernous volume filled with rows of parked shuttles
    like Thirteen-sixty-five-baker under harsh lighting and humming machinery. Technicians
    swarm the alien device with tricorders, scanning its surface after it imprinted
    decades of Kataan life onto Picard. Metal deck plates echo Worf's orders and crew
    steps, access tubes framing urgent analysis amid prior crises like Rasmussen's
    timepod confrontation where Data exposed theft and the pod vanished. The vast
    hangar pulses as operational hub and crisis stage, technicians bracing for revelations
    from the probe's mind-bridging tech.
