  global_id: ger_location_a5cb7799a379
  canonical_name: Tunnel Leading to Cave Entrance (Exit Point)
  description: A narrow, dust-choked tunnel connecting the volcanic cave system to
    the hostile moon's surface. This passage serves as the sole exit point from the
    cave complex, where Picard, Wesley, and Dirgo navigate during their desperate
    search for water. The tunnel's confines amplify sound and tension, marking a critical
    transition zone between the cave's interior and the exterior environment. Key
    narrative moments include Dirgo's abrupt exit after conflict with Wesley, and
    the group's initial emergence from the cave system into the dry chamber. The tunnel's
    dim lighting and rough walls create a claustrophobic atmosphere that underscores
    the characters' isolation and urgency.
