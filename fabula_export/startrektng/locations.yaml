  global_id: ger_location_057b4c91424f
  canonical_name: Observation Deck
  description: A long, windowed salon that frames the void, the Observation Deck drenches
    occupants in starlight and the ship’s low mechanical pulse. Plush seating arcs
    toward a central briefing area where senior officers cluster; tactical displays
    and quiet voices puncture the hush. The air tightens when the captain summons
    counsel — urgency collides with domestic calm, strategy sharpening into moral
    reckoning. Sightlines to empty space and the soft throb of systems make every
    decision feel exposed and irrevocable.
  location_type: Starship Meeting Lounge
