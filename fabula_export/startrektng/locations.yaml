  global_id: ger_location_8bdeda1621af
  canonical_name: Triangulum System
  description: 'A distant, cold star system invoked as a cautionary precedent: coordinates
    that harbor stealth and subterfuge rather than welcoming worlds. The name clicks
    like a warning on a bridge console—an example of how a small system can conceal
    political fugitives and a hidden vessel. It carries the chill of remote space,
    the prick of tactical memory, and functions narratively as a lesson in unseen
    threats and the limits of surface-level assurances.'
