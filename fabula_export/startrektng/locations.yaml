- fabula_uuid: ger_location_2d4fcd2ae155
  global_id: ger_location_2d4fcd2ae155
  canonical_name: Angosian Transport Ship
  description: 'A utilitarian, state‑issued transport that looms off the viewscreen
    as a cold, bureaucratic presence; its dark silhouette approaches the Enterprise
    carrying a single, politically fraught cargo. Communications crack with clipped
    Angosian formality as delegates transmit transfer coordinates and lay claim to
    custody. The ship functions as both conveyance and diplomatic emissary—its metal
    hull and clinical interior implied rather than shown—casting an administrative
    weight across the bridge. Crew feel the tension as procedure grinds against moral
    hesitation: transmitted orders, the muffled hum of engines at range, and the thin,
    sterile geometry of a vessel built for custody and control.'
  location_type: Angosian Transport Starship
  parent_location_uuid: null
