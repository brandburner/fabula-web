  global_id: ger_location_051f54392f2a
  canonical_name: Sheliak Ship (Interior)
  description: Mists thread through a dim, alien chamber where law overrides welcome.
    Vertical planes of dark metal and intermittent pale panels carve the space into
    austere, courtroom-like volumes; unreadable script and linear light pulse with
    procedural insistence. The air tastes of cold ionization, footfalls vanish into
    swallowed echoes, and transporter rings snap open and shut like dismissive verdicts.
    Negotiation collapses beneath the Sheliak's hyper‑legal cadence—humans feel exposed,
    minimized, and abruptly expelled by precise, bureaucratic force.
