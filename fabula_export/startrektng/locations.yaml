  canonical_name: Moon Surface and Atmosphere (Ux-Mal Exile Site)
  description: The moon's surface and atmosphere serve as a critical location in the
    Ux-Mal possession crisis. Electromagnetic interference saturates the moon's atmosphere,
    blocking transporters and forcing Riker's shuttle to punch through turbulent layers
    toward the surface. The barren, hostile surface is the dreaded origin and potential
    exile for the Ux-Mal entities possessing the *Enterprise* crew, as highlighted
    during the Ten Forward confrontation. O'Brien proposes beaming back the possessed
    to this location if the forcefield drops, exposing psychological fractures among
    the aliens. Crew members experience violent descent turbulence, and Riker logs
    calculated risks amid hidden threats that trigger possession crises among the
    away team. The location embodies both physical danger (turbulent atmosphere, harsh
    surface) and psychological tension (exile fear, tactical transporter proposal
    as psychological weapon).
  location_type: Extraterrestrial Moon Surface and Atmosphere
