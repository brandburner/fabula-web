  canonical_name: Uncharted Subspace Distortion Region
  description: A violent and unstable subspace distortion that yanks the *Enterprise*
    into an uncharted expanse, erasing all traces of entry. The region warps physics—sensors
    glitch, navigation fails, and natural laws falter—trapping the crew in isolation.
    Distant stars fade against a black void as Borg cubes materialize, their cutting
    beams piercing hulls and assimilation drones breaching sections. The crew battles
    dread in red-lit corridors while warp coils strain against the region's incomprehensible
    geometry. The distortion field also serves as a tactical advantage for the Borg,
    allowing their ships to exploit its instability for ambushes and escapes. Physical
    turbulence, spatial disorientation, and system disruptions plague the *Enterprise*
    and its crew, heightening the threat of assimilation.
  location_type: Uncharted Space Region
