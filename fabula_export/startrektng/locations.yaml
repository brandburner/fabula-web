  canonical_name: Enterprise Schoolroom
  description: A compact, shipboard classroom that hums with the Enterprise’s life
    support and youthful chatter. Modular desks and recycled-light panels give the
    space a functional intimacy; the corridor’s footfalls and distant consoles leak
    through its walls. The room operates as a social training ground where curiosity
    collides with peer cruelty — a place that promises belonging but can expose otherness.
    For Lal, the classroom becomes a fragile arena of discovery, misunderstanding,
    and the emerging ethics of guardianship.
