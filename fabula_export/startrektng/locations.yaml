  description: Klingon attack cruisers close on Beverly Crusher's medical ship, disruptors
    firing in a coordinated assault. The Enterprise responds with phaser banks and
    photon torpedoes, striking one cruiser dead center. It erupts in fire and debris,
    scattering across the void, while survivors break off, shields straining under
    return fire. Crews on nearby bridges track the exchange through tactical displays,
    the silent space battle marking a pivot from siege to intervention amid the temporal
    crisis.
