- fabula_uuid: ger_location_109706a20842
  global_id: ger_location_109706a20842
  canonical_name: Starfleet Academy Flight Range (Near Saturn)
  description: Cadets fly Nova Squadron ships in precise close formations across this
    orbital expanse near Saturn, the gas giant's swirling bands filling cockpit views.
    High-stakes maneuvers demand split-second control; Wesley's team attempts the
    forbidden Kolvoord Starburst, leading to collision that rips vessels apart in
    explosive debris. Joshua Albert dies in the wreckage, the void's silence broken
    only by distress calls. Picard recounts the inherent risks to Beverly, framing
    the range as a proving ground where ambition meets deadly consequence, fueling
    Wesley's looming moral crisis over loyalty and truth.
  location_type: Orbital Flight Training Range
