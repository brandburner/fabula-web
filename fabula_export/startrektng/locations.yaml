  description: Galen transmits his distress call from this isolated shuttle as unknown
    assailants force entry. The cramped interior fills the transmission's background,
    cluttered with science equipment amid signs of struggle. Static disrupts the feed
    while Galen reports the boarding, his face tense against the vulnerable confines.
