  canonical_name: Bridge Tactical Station
  description: Amber LCARS backlight a compact, forward-facing tactical console where
    a single posted officer translates sensor chaos into immediate options. Flickering
    threat overlays, targeting reticles, and concise status strips cram the screen
    while a low processor hum underwrites clipped vocal reports. Worf pins the viewscreen
    object with rigid attention, monitors threat vectors, and advocates an urgent
    tractor-beam intervention — the station tightens into a pivot point where procedure,
    split-second judgment, and moral curiosity collide, turning technical readouts
    into an actionable moral choice.
