- fabula_uuid: ger_location_9d41f0d20184
  global_id: ger_location_9d41f0d20184
  canonical_name: Meeting Room
  description: 'Rows of seats pack the room with the Archeology Council and Enterprise
    crew, including Riker, Troi, Beverly, Data, Geordi, Worf, and Vash. Picard grips
    the podium, launching his Tagus Three lecture as a detective yarn. Q''s pranks
    erupt: hunting caps settle on Beverly and Troi, a quarterstaff fills Riker''s
    hands, Geordi''s grasps a mandolin, Data clutches a leg of lamb under a cowl,
    Worf bears a chaperone. Picard dons yeoman jerkin, cap, and bow mid-sentence,
    bellows ''What the hell!'', then flashes out of sight. Scholarly poise crumbles
    into audience gasps and stunned chaos.'
  location_type: Lecture Hall
