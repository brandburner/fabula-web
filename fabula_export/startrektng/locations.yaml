  global_id: ger_location_c89cec7f1816
  canonical_name: Rebel Camp
  description: 'A sprawling subterranean encampment hollowed into a cavern: low, damp
    rock ribs cradle a scatter of lean-tos, tarpaulins, and cobbled-lit passageways.
    Flickering makeshift lamps throw patients'' gaunt faces into sharp relief at a
    crude infirmary where the air tastes of earth, antiseptic, and metal. Beverly
    picks her way past delirious bodies whose cells unspool under the Ansata inverter,
    while stolen Federation instruments glint among scavenged supplies. As Beverly
    and Finn move through it, the camp reads as both refuge and courtroom—dangerous,
    politicized, and morally combustible.'
  location_type: Underground Rebel Encampment
