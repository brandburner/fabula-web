    monitors streaming police feeds and lists of names. Evidence piles crowd flat
    surfaces—case files, an odd Ansata armband, and scuffed data slates—while the
    air tastes of stale coffee and raw exhaustion. Voices sharpen into interrogation
    and negotiation here; moral arguments ricochet off monitors as political trauma
    and procedural duty collide. The room functions as both command hub and confessional
    arena, where coercion is argued into policy and personal guilt becomes a tactical
    lever.'
