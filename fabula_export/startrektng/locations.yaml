  global_id: ger_location_bbe1059c9f17
  canonical_name: Borg Crash Site
  description: Twisted wreckage from a derelict Borg vessel scars a frozen moon's
    snowy surface under twilight skies. Debris litters the icy ground, mingled with
    dead Borg corpses and shuttle remnants. The away team trudges through drifts,
    medical tricorders piercing the cold as they uncover and stabilize an injured
    adolescent Borg amid scorched metal and pristine snow. Tension mounts with an
    intercepted homing signal, marking the site as a hazardous foothold between compassion
    and looming threat.
  location_type: Frozen Moon Crash Site
