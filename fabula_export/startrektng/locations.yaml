- fabula_uuid: ger_location_e820434087ae
  global_id: ger_location_e820434087ae
  canonical_name: Lwaxana’s Quarters (USS Enterprise-D)
  description: Lwaxana Troi’s quarters on the USS Enterprise-D hold her gaudy wedding
    dress amid spacious accommodations that fit Mister Homn’s towering bulk. An adjoining
    room offers seclusion when she dismisses him. Alexander enters here to apologize,
    only to face her pivot to marriage woes and emotional cracks beneath bravado.
    Lwaxana clashes with Campio, Erko, Worf, and Deanna over Kostolain protocols,
    defying structure with holodeck invitations and abrupt exits alongside Alexander.
