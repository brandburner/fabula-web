  global_id: ger_location_86a2fb79ccec
  canonical_name: Atrea
  description: Deep within Atrea's unstable crust, the first magma pocket holds superheated
    molten rock amid seismic tremors from the planet's rapid solidification. Pran
    targets it for the infusion unit setup, which the crew will beam in while the
    second pocket cools. Phaser drills from the Enterprise above carve access paths
    through overlying rock layers laced with magnesite ore, demanding harmonic stabilization
    to prevent feedback shocks. Crew in Engineering monitor readouts of roiling heat
    and pressure, where plasma injection aims to halt core collapse and planet-wide
    quakes.
