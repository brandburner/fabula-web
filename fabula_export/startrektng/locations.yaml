  global_id: ger_location_2afdbcabd512
  canonical_name: USS Enterprise Orbit Around Theta Eight
  description: 'Cold light fractures along the hull as the Enterprise holds a tense
    parking orbit above the brutal, ice‑green world Theta Eight. The Main Viewer fills
    with a knife‑edge planet — liquid neon pools, methane clouds, ammonia tornadoes
    scoured by hurricane‑force winds and temperatures plunging below −291°F — while
    bridge consoles hum and diagnostic lights stutter. Riker’s clipped log and Geordi’s
    clinical sensor readouts turn abstract data into immediate danger, compressing
    exploration into a salvage investigation. The orbit functions as a suspended theater
    of procedure and dread: a technical vantage that magnifies the unknown on the
    night side, hardens crew banter into focused unease, and forces command into rapid,
    consequential choices.'
  location_type: Starship Exterior Orbit
