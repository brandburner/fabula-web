- fabula_uuid: ger_location_da6aaf828779
  global_id: ger_location_da6aaf828779
  canonical_name: Balfour Lake
  description: Beverly recalls Balfour Lake as the serene site of a family camping
    trip with Jack Crusher and young Wesley. Fireside gatherings by the water's edge
    evoke lost moments of laughter and closeness amid rustling woods and lapping waves.
    This memory surfaces during her neural link with Picard, igniting his guilt over
    unspoken love for her during her marriage. The lake's nostalgic pull fractures
    their guarded friendship, turning past joy into present reckoning under starlit
    skies.
  location_type: Planetary Lake (Memory)
