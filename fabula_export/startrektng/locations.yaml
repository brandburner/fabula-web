- fabula_uuid: ger_location_2c178ff4abaa
  global_id: ger_location_2c178ff4abaa
  canonical_name: Tanuga Four Research Station
  description: 'A compact orbital research outpost clings to local gravity like a
    laboratoryed heartbeat: corrugated modules ring a central lab, sensor arrays angle
    into black, and portholes throw cold starlight across instrument panels. Engineers
    keep a constant hum of recycling air and precision diagnostics; the air tastes
    of ozone and ionized metal when experiments push systems to their limits. The
    station houses Dr. Nel Apgar''s Krieger Waves apparatus—gleaming conduits, containment
    nodes, and braided cabling that vibrate with experimental power. The station''s
    role reads as scientific sanctuary and fragile proof‑of‑concept, until its systems
    fail: alarms snap to life, viewscreen fire blooms white‑hot, and a sudden, violent
    explosion fractures orbit, converting scientific curiosity into immediate crisis
    and spawning suspicion among those who watched it vanish.'
  location_type: Orbital Research Station
