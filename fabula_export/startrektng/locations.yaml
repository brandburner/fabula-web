  canonical_name: Science Labs (USS Enterprise-D)
  description: Worf directs the science labs aboard the USS Enterprise-D to stand
    ready and coordinate with Data on the pulsating plasma anomaly—a fluid mass laced
    with silicates and actinides orbiting the seventh planet. Consoles light up with
    sensor feeds, screens track the glowing entity's movements at ten kilometers,
    and technicians hunch over readouts amid the hum of analyzers. The labs channel
    crew excitement into precise scans, turning raw data into insights that propel
