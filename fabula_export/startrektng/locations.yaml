  global_id: ger_location_5d030dd34678
  canonical_name: Romulan Main Bridge
  description: 'A Romulan starship bridge: a compact, sharply ordered command chamber
    whose calm protocol masks sudden menace. Consoles throw narrow bands of tactical
    data across masked faces; the space supports cloaking, rapid tactical response,
    and (when seen through otherworldly apertures) instant strategic escalation. In
    some scenes the bridge is shown amid damage—smoke, sparks, countdowns and transporter
    disruptions—underscoring its role as the Romulan tactical and political nerve
    center.'
