- fabula_uuid: ger_location_eab040d71ad7
  global_id: ger_location_eab040d71ad7
  canonical_name: Duras Family Home Living Room
  description: Shadows cloak the Duras Family Home, a fortified Klingon residence
    turned command center. Heavy couches and chairs fill its inner rooms, where Worf
    stirs awake to B'Etor's advances and Lursa's alliance pitch. Monitors crackle
    with Sela's interruptions, her face dominating screens as she seizes control.
    Romulan guards burst through doors to seize prisoners. Here, the Duras sisters
    huddle with Movar and Toral, voices sharp over delayed convoys and Picard's advancing
    fleet, Romulan authority eclipsing Klingon rage in plots to seize the empire.
  location_type: Klingon Residence Living Room
