  global_id: ger_location_704be779ee38
  canonical_name: USS Potemkin
  description: 'The USS Potemkin is a Federation starship with two pivotal roles in
    Lieutenant Riker''s past: (1) It was the vessel where a transporter accident during
    a Nervala IV mission split Riker into two identical men, creating the ''duplicate''
    that fuels the Enterprise crew''s existential debate; and (2) It was the ship
    Riker was assigned to immediately after parting from Troi at the Janaran Falls,
    marking the beginning of their eight-year separation. The ship''s transporter
    logs (from the Nervala IV incident) and Riker''s personal memories (of his assignment
    and departure) are both central to the narrative''s exploration of identity and
    career choices.'
