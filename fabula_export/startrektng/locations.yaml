  canonical_name: Space Station Living Area (Holodeck Recreation)
  description: 'A simulated communal parlor rendered inside a holodeck to replicate
    a space station''s living area: low recessed lighting, faux bulkhead paneling,
    a small service table with chilled champagne, and upholstered seating arranged
    for intimate conversation. Voices hover between flirtation and accusation as social
    rituals — toasts, offers of hospitality, a hostess''s practiced charm — harden
    into evidentiary gestures when the program freezes. The space functions narratively
    as both private mise‑en‑scène and prosecutorial stage, where warmth curdles into
    suspicion and a casual invitation to "stay aboard the station" becomes a pivotal,
    charged datum.'
