  canonical_name: Morikin Seven
  description: Morikin Seven hosted Jean-Luc Picard's sophomore-year Starfleet training
    assignment. Cadets like him drilled there amid remote outposts, where an outlying
    asteroid drew Nausicaan thugs for a brutal brawl. Picard stabbed in self-defense,
    the scar a badge of reckless youth. He shares the tale smiling in the Observation
    Lounge, the site's isolation now fueling fond nostalgia for the wild cadet who
    became captain.
