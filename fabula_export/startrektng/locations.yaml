  global_id: ger_location_1b5970dbf2d6
  canonical_name: Borg Scout Ship
  description: A cold, utilitarian hull lurks just outside sensor range, a predatory
    presence in the nearby void. The Borg Scout Ship hovers in proximity to the Enterprise,
    its probing emissions explaining the sudden materialization of scouts inside Main
    Engineering. Metal surfaces read blank and featureless; its systems hum with clinical
    efficiency and adaptive protocols. The vessel functions as an offstage antagonist
    and source of existential threat—an analytical predator that converts a single
    breach into a strategic crisis, draining power, scavenging parts, and forcing
    desperate Starfleet countermeasures.
  location_type: Borg Scout Starship
