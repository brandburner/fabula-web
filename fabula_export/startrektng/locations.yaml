  global_id: ger_location_d1cac5f75660
  canonical_name: Second Corridor of the Tsiolkovsky
  description: This narrow, shadowed corridor aboard the Tsiolkovsky becomes a chilling
    site of sudden disappearance as Mason vanishes while walking with his parents.
    The space reverberates with tense uncertainty and eerie silence, its confined
    metallic walls framing a moment where safety fractures without warning. The corridor’s
    oppressive atmosphere thickens the air with dread and urgency, marking it as a
    critical passage where familial bonds shatter and the looming threat of abduction
    takes physical form. Flickering overhead lights cast anxious shadows, while the
    distant hum of ship systems underscores the unsettling stillness of this fraught
    threshold.
