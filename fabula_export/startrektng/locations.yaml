- fabula_uuid: ger_location_9ecba5af56d9
  global_id: ger_location_9ecba5af56d9
  canonical_name: Precipice Near the Cargo Freighter
  description: A sheer precipice juts over a deep gorge close to the crashed cargo
    freighter on a remote planet. Anna hikes here during months of isolation, perching
    on the edge as winds gust upward from the abyss. She stares down, gripped by despair
    that pushes her toward suicide. The rocky ledge amplifies her solitude; every
    echo off sheer walls and howl through the chasm underscores the psychological
    strain of abandonment. This natural vantage marks her lowest point, where the
    void below tempts escape from unending exile.
  location_type: Planetary Gorge Precipice
