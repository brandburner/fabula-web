- fabula_uuid: ger_location_e234352672e1
  global_id: ger_location_e234352672e1
  canonical_name: Cardassian Border Region (Klingon-Romulan Settlement Vicinity)
  description: "\n        The **hostile expanse of Cardassian space**, including its\
    \ **border regions**, where the *Enterprise* crew tracks Maxwell's *Phoenix* during\
    \ a high-stakes pursuit. Sensors are locked on a destroyed station and an approaching\
    \ supply vessel, with Data calculating a three-hour, twenty-minute window for\
    \ their exit amid warp pursuits. Geopolitical tension escalates as Cardassian\
    \ observers monitor the *Enterprise*'s movements, and the void hums with the shadow\
    \ of impending conflict. This region—encompassing **both the interior of Cardassian\
    \ territory and its border zones**—is a flashpoint for diplomatic peril, with\
    \ memories of past incidents (e.g., the Setlik Three raid) heightening the stakes.\
    \ The *Enterprise* positions itself here during the urgent hunt, navigating fragile\
    \ trust with Cardassian guests aboard while avoiding actions that could ignite\
    \ border conflicts.\n      "
  location_type: Hostile Interstellar Territory
  parent_location_uuid: null
  season_appearances:
  - 6
  local_uuids:
