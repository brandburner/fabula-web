  global_id: ger_location_553556170ebf
  canonical_name: Mondor (Pakled ship)
  description: 'The disabled Pakled ship Mondor: a lightly armed, failing vessel whose
    exterior silhouette appears on the Enterprise viewscreen while its interior is
    a cramped, low-ceilinged environment of exposed conduits, flickering amber lights,
    sparking junctions, sluggish power readouts, and jury-rigged consoles. The ship
    functions narratively as both a desperate refuge and a deceptive trap — its bridge
    and corridors manufacture false comfort and engineered vulnerability, isolating
    a trusting engineer and provoking rescue and ethical tension.'
