  description: 'Caldonia registers as Leyor’s enclosed home world: a polity that prizes
    scholarship, deliberation, and cautious administration above cavalier risk. Conversation
    paints it as inward‑facing and habitually circumspect — a place of quiet study
    halls, layered archives, and council chambers that reward measured argument. The
