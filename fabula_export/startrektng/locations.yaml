- fabula_uuid: ger_location_6b52119c3443
  global_id: ger_location_6b52119c3443
  canonical_name: Secluded Corner of the Cargo Bay
  description: A cramped, tucked-away corner behind a ragged stack of metal cargo
    containers on a starship. The space smells of oil, warmed metal, and sharp alcohol
    fumes from an illicit still; dim overhead lights cast angular shadows across spilled
    sacks, crates used as tables, and a battered pot with dripping tubing. Muffled
    laughter and low voices bounce off bulkheads—this furtive nook functions as a
    covert workshop and meeting place for contraband distilling and clandestine socializing,
    a locus where humor, defiance, and the risk of shipboard discipline collide.
  location_type: Starship Cargo Bay Alcove
