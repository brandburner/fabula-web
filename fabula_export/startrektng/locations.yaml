  canonical_name: Minos Korva
  description: Minos Korva anchors a Federation star system near the McAllister Nebula,
    sheltering two million colonists in a sector Cardassians have long coveted for
    its strategic edge. Jellico spots the invasion threat after spotting Reklar's
    nebula-tainted hull, plotting an Enterprise intercept course at maximum warp.
