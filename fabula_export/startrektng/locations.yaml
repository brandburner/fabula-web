- fabula_uuid: ger_location_3ac631fc303a
  global_id: ger_location_3ac631fc303a
  canonical_name: Borg Compound (Main Hall)
  description: "\n        A **fortified Borg facility on a planet**, comprising:\n\
    \        1. **Exterior/Reconnaissance Areas**: Overlooked by Riker and Worf from\
    \ a planetary vantage point; features a fortified layout ambushed by Borg.\n \
    \       2. **Interior Hall (Assembly Space)**: A vast space where Lore commands\
    \ from a raised platform, taunting captives (Picard, Troi, Geordi) amid crowds\
    \ of individualized drones. Chaos erupts in melees, with Riker and Worf hiding\
    \ in the stage area. Dampening fields block scans.\n        3. **Environmental\
    \ Ducts/Caverns**: Link to nearby caverns for covert access, used post-fight by\
    \ Picard, Riker, Hugh, and Data.\n        The Compound is a **single integrated\
    \ location** with distinct functional zones, not separate entities. The 'Borg\
    \ Hall' (target) is explicitly described as part of the 'Borg compound' in its\
    \ embedded context ('Vast assembly space **in the Borg compound**').\n      "
  location_type: Planetary Borg Compound
