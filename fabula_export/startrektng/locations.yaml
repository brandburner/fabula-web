  canonical_name: Security Holding Cell (USS Enterprise-D)
  description: A secure containment area aboard the USS Enterprise-D where Jono is
    held under tight custody following his stabbing attack on Picard. Originally designated
    as **Jono's Confinement Quarters** (guest quarters repurposed for isolation),
    the space is secured with force fields and guarded by Worf, who maintains vigilance
    with his bat'leth. The sterile, humming environment reflects Jono's internal conflict
    between his human roots and Talarian conditioning, as well as his rejection of
    the space as a 'cage.' Picard later attempts to personalize the quarters during
    a failed connection, but Jono's defiance fills the room with Talarian wailing.
    The area serves as a **secure barrier** protecting the crew while containing Jono's
    volatile presence, underscoring the tension between Starfleet's rigid environment
    and Jono's divided loyalties.
