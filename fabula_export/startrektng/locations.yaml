  canonical_name: Data's Laboratory (Deck 38 — USS Enterprise‑D)
  description: 'A locked, clinical research laboratory aboard the USS Enterprise‑D
    (Deck 38). Metal benches, braided conduits, diagnostic consoles and tool‑lit workbenches
    cluster around a central area where Data assembles a humanoid foot and seeds a
    positronic brain for Lal. The room functions as a clandestine workshop and intimate
    research bay: consoles line the bulkheads, wiring looms and pale synthetic epidermis
    are present, the air carries solder/ozone and a faint metallic tang, and the space
    is associated with secret assembly, diagnostics, revelation, and the emotional
    arc of Data and Lal (episode: "The Offspring").'
