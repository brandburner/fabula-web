- fabula_uuid: ger_location_fe4ce71f5048
  global_id: ger_location_fe4ce71f5048
  canonical_name: Thalos Seven
  description: Thalos Seven presents as a sun‑baked, cocoa‑rich world whose air carries
    a faint, warm scent of chocolate and fermented beans. Fields and aging warehouses
    ripple under low hills; wooden racks and spice‑dark barrels hum with slow, patient
    processes that transform raw pods into luxuriously rounded flavors. The planet
    functions as a locus of quiet craft and worldly leisure in Wesley's anecdotes
    — a favored refuge that evokes travel, sensory richness, and the promise of freedom,
    offered here as an emblematic doorway away from duty and isolation.
  location_type: Planet (Cocoa‑Aging Region)
