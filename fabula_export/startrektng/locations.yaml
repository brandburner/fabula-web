- fabula_uuid: ger_location_7466f0eb7fa5
  global_id: ger_location_7466f0eb7fa5
  canonical_name: Tunnels Opposite the Chamber (Turkana IV)
  description: Turkana IV is a lawless Earth colony planet with a reddish surface
    rendered uninhabitable by war, forcing survivors into vast subterranean settlements
    riddled with tunnels. Once a Federation colony, it severed ties 15 years prior,
    leading to the rise of brutal factions (Coalition and Alliance) and lawless gangs.
    The planet is the birthplace of Tasha Yar and Ishara Yar, whose harsh upbringings
    were shaped by its factional violence and rape gangs. **Key subterranean locations
    include the Tunnel System, Guarded Holding Chamber, and narrow branching tunnels**
    (e.g., 'Next Tunnel, Turkana IV Colony'). The Enterprise away team beams down
    amid warnings of death, navigating the lawless depths to hunt escape pods and
    captives—including tense pursuits through tunnels like the one where Riker hauls
    Ishara to safety. Picard gazes at the planet with concern, while the colony repels
    hails and presents a brutal reality, forcing emotional reckonings with Yar's past.
  location_type: Lawless Subterranean Colony Planet
