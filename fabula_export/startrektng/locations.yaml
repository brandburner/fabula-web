- fabula_uuid: ger_location_2d39d746125d
  global_id: ger_location_2d39d746125d
  canonical_name: Duck Blind Karst Field
  description: Jagged sinks pockmark the duck blind area, their rim-strewn mouths
    yawning into dark, limestone hollows that swallow footsteps and sensor blips alike.
    The air tastes faintly metallic where thallium-rich bedrock bleeds into cavern
    mouths; damp echoes and a drifting mineral dust mute movement and obscure life-sign
    signatures. Teams feel the ground hesitate beneath them, search protocols falter
    at every unpredictable collapse, and urgency warps into caution as the terrain
    promises concealment for the lost and danger for the rescuers.
  location_type: Karst Sinkhole Field
