  global_id: ger_location_0a8fd7167580
  canonical_name: Hugora Nebula
  description: Dense clouds cloak the Hugora Nebula, shielding Starfleet ships from
    Maquis sensors. The Enterprise and allied vessels station deep inside its swirling
    haze, engines idle, crews poised on alert bridges. Picard exploits the nebula's
    obscuring gases for the ambush, positioning forces to intercept the rebel convoy
    after it pursues the fake Cardassian bait. Tension grips the hidden flotilla as
    readouts track approaching signatures through the foggy void.
