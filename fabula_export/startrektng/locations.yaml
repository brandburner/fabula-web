  global_id: ger_location_c8ec6cf4ce56
  canonical_name: Rasmussen's Quarters
  description: Rasmussen steps into his assigned quarters aboard the Enterprise, a
    tight space with plain fixtures that draw his scorn. He mutters disappointment
    at the basic setup, crosses to the sink, and scrubs his hands under running water.
    The room's stark walls close in as he turns to Data with a smug smile, dismisses
    him curtly, and savors his hidden plans. Cool lighting casts sharp shadows, heightening
    the contrast between starship hospitality and his arrogant dismissal of it all.
