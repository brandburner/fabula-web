  description: "\n        A Klingon attack cruiser-class vessel central to the 'Reunion'\
    \ episode (S4E7) of *Star Trek: The Next Generation*. The ship serves as the backdrop\
    \ for Worf's unauthorized transport following K'Ehleyr's death and his subsequent\
    \ vengeance against Duras. Its decks are defined by Klingon warrior codes, blood\
    \ oaths, and the tension between Starfleet loyalty and personal honor.\n\n   \
    \     **Key Locations Aboard**:\n        - The *bridge* (where K'Ehleyr hails\
    \ the Enterprise; see 'Klingon Attack Cruiser Bridge').\n        - *Duras’ Quarters*\
    \ (a dimly lit, oppressive space where Worf confronts Duras in a ritual standoff).\n\
    \        - General decks (where Worf's transport and the succession crisis unfold).\n\
    \n        The vessel is pursued by the *Enterprise* and symbolizes the broader\
    \ Klingon succession conflict, with its internal spaces (e.g., Duras’ Quarters)\
    \ playing critical roles in the episode's climax.\n      "
