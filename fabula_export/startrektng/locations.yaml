- fabula_uuid: ger_location_bf65ffbcab44
  global_id: ger_location_bf65ffbcab44
  canonical_name: Borg Nebula Minefield
  description: A dense, turbulent interstellar nebula composed of ionized gas and
    dust, initially serving as a hiding place for the USS Enterprise from Borg sensors.
    The nebula contains a magnetometric minefield—self-detonating charges that explode
    in chain reactions, creating shockwaves that force the Enterprise into evasive
    maneuvers. The chaotic environment is visually characterized by swirling clouds,
    brilliant flashes from detonations, and proximity alerts blaring on the bridge.
    The nebula's dual role as cover and lethal trap is central to the episode's tension,
    culminating in the Enterprise's emergence into direct confrontation with the waiting
    Borg cube. Turbulent clouds of ionized gas envelop the Enterprise, hiding Borg-deployed
    magnetometric charges that rip through shields and demand sharp evasive turns,
    turning evasion into a gauntlet of sparks and strain.
  location_type: Interstellar Nebula
  parent_location_uuid: null
