- fabula_uuid: ger_location_f1bdf80c98f4
  global_id: ger_location_f1bdf80c98f4
  canonical_name: Sections 24–47, Decks 35–38 (Stern of the Enterprise)
  description: Riker's bridge monitor flags Sections 24–47 on decks 35–38 in the Enterprise's
    stern as hotspots for ion radiation contamination trailing the Soliton wave. Evacuation
    orders snap out—bulkheads slam shut, alarms pierce the air, crew dashes through
    humming corridors and tight compartments as radiation creeps in. Flickering hazard
    lights cast red glows on deck plating, scrubbers whine against the invisible spread,
