  global_id: ger_location_44c67b40e53b
  canonical_name: Lubbock, Texas
  description: Lubbock, Texas steps into the scene as an invoked hometown — a named
    origin used to pry loose personal detail from an observed player. The city’s mention
    snaps the casino’s performative reality toward a real-world life, supplying a
    plausible lineage, municipal records, and human attachments the investigators
    can exploit. As spoken bait, Lubbock functions narratively as both a tether for
    identity and a practicable lead that collapses artifice into investigable consequence.
