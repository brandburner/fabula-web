    001, Earth's sector, on Starfleet's priority recall. Sensors pick up traces of
    extraterrestrial activity embedded in 19th-century Earth history, linking to Data's
    severed head and a vast cosmic threat. The ship drops from warp into orbit, viewscreens
    framing the blue planet below while crew tension builds over this temporal incursion
    that rewrites humanity's origins. Urgent orders echo on the bridge, every scan
