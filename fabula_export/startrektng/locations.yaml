  global_id: ger_location_d0e67912bf1b
  canonical_name: Devidia II Surface (42°7'N, 88°0'E)
  description: |-
    The Devidian habitat on Devidia Two serves as the aliens' primary stronghold and origin of triolic waves fueling temporal raids on 19th-century Earth. This location encompasses:
          1. **Subterranean Devidian Cavern**: A dimly lit underground space with polarized crystalline walls that focus space-time distortions (where the Devidians attack, sever Data's head, and open the temporal rift).
          2. **Planetary Surface Nexus**: The unstable surface where the crew materializes after the rift closes, marked by alien terrain and Data's lifeless body. This surface is part of the same habitat system, as evidenced by its role in the temporal mission and shared characters/events.

          The habitat is a nexus of rifts and energy drains, inhabited by silver-gray predators. Picard authorizes its destruction to sever time travel, halt life-force thefts, and resolve Data's fate—though this risks historical disruptions. Key events include the initial targeting, the cavern attack, and the surface materialization.
  location_type: Extraterrestrial Habitat
