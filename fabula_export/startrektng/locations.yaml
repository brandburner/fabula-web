    a vital sanctuary and strategic hub during combat crises. Characters navigate
    its corridors enveloped in a charged atmosphere of hopeful tension and restrained
    fear, balancing vulnerability with quiet resilience. It functions as a secure
    refuge where non-combatants shelter during the ship’s separation maneuver. The
