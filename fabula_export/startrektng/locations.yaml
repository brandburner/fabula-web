- fabula_uuid: ger_location_668734740ae3
  global_id: ger_location_668734740ae3
  canonical_name: The Docks
  description: Madeline points the caller toward the docks, a shadowed waterfront
    where Captain Picard might hide amid creaking piers and looming warehouses. Fog
    drifts off the bay, carrying salt and diesel smells, while dockworkers haul crates
    under flickering lamps. Ships groan against bollards, and narrow alleys twist
    into darkness—prime turf for detective stakeouts or fugitives dodging pursuit
    in this 1940s holodeck noir. The tip signals Picard's cover fraying as real-world
    threats pierce the simulation.
  location_type: Holodeck Waterfront Docks
