  global_id: ger_location_8f2e11809b01
  canonical_name: Main Street Pumping and Purification Station
  description: 'The colony’s main-street pumping and purification hub: a squat, utilitarian
    station of weathered steel and corrugated siding where soot-darkened and brine-lined
    pipes braid across catwalks, exposed valves and a humming motor bank mark pressurized
    flow, and a concrete settling basin and control alcove hold patchwork meters and
    repairs. The air carries hot metal, brine, ozone and faint mineral tang. Functioning
    as essential infrastructure and an improvised civic stage, the station is where
    technical decisions become moral choices and tense confrontations (notably evacuation
    disputes involving Gosheven and other villagers) play out beneath the machine’s
    relentless rhythm.'
