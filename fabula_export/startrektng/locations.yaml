- fabula_uuid: ger_location_fb9bf3fd7b6b
  global_id: ger_location_fb9bf3fd7b6b
  canonical_name: Bedouin's Tent
  description: 'An imagined, compact nomadic shelter summoned as metaphor: canvas
    walls breathing with desert wind, the low glow of a central hearth, woven rugs
    and the soft scent of tack and animal hair. Picard conjures this tent as a rhetorical
    refuge — a private, ancestral space that compresses duty, tactile care, and mutual
    dependence between rider and war mare. The tent functions narratively as an evocative
    emblem of reciprocal trust, survival, and long-practiced intimacy rather than
    a physical setting in the episode.'
  location_type: Metaphorical Location
