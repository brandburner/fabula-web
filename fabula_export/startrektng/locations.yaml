- fabula_uuid: ger_location_aede56315ce0
  global_id: ger_location_aede56315ce0
  canonical_name: Exterior Space Around the U.S.S. Enterprise and Klingon Cruiser
    T'Ong
  description: 'Void yawns black around the Enterprise, starlight skimming along plated
    hulls as the ancient Klingon cruiser T''Ong sheds its cloak into sudden, hard
    visibility. The two vessels cut geometric arcs through the star field — warp trails,
    braking vectors, and the instantaneous hush of a ship brought to a dead stop in
    another''s path. Vacuum steals sound; only distant sensor pings, strained bridge
    commands, and the bright, clinical wash of external illumination remain. This
    immediate exterior functions as a tactical theater and moral proving ground: maneuvers
    become messages, decloaking becomes accusation, and cultural power is made visible
    in the spacing and posture of starships as much as in voice or weaponry.'
  location_type: Starship Exterior (Immediate Vicinity)
  parent_location_uuid: null
