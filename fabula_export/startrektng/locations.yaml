  canonical_name: Tarsas III
  description: Tarsas III looms as a remote planetary body anchoring the orbit of
    Starbase 74, a critical Federation installation poised for strategic maintenance
    and upgrades. The planet’s vast expanse stretches beneath the starbase, casting
    a silent, steadfast presence that marks the boundary between spaceborne operations
    and planetary reality. Its atmosphere hums with quiet constancy, framing the starbase's
    role as a beacon of order in the cold void. Characters witness Tarsas III as a
    stable gravitational center, a silent guardian around which complex technological
    and political maneuvers unfold, embodying both the backdrop and catalyst for the
    narrative's tension beneath routine starship refitting.
