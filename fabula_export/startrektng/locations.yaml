- fabula_uuid: ger_location_4f841f7b5911
  global_id: ger_location_4f841f7b5911
  canonical_name: Horseshoe Amphitheater
  description: 'A vast horseshoe of tiered benches curves around a central dais where
    engineers and Gosheven take their stand. The structure sits on the planet surface,
    packed with citizens — including Haritath and Kentor — whose murmurs and shifting
    loyalties ripple through the air. Dust rises underfoot, voices ricochet off stone,
    and sunlight slices across weathered seating while the aqueduct purifying plant
    looms beyond, its channels and distant machinery providing a sterile, mechanical
    backdrop. The space functions as the colony''s public forum and theatrical battleground:
    a place where rhetoric, spectacle, and moral pressure collide and communal conviction
    can fracture in real time.'
  location_type: Colony Assembly Amphitheater
