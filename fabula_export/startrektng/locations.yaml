- fabula_uuid: ger_location_801f506c6383
  global_id: ger_location_801f506c6383
  canonical_name: Unnamed Space Station (Tyran Particle Fountain Crisis)
  description: |-
    Picard and Geordi are trapped inside this remote, unnamed space station orbiting a moon in the Tyran system, positioned directly over the particle fountain mining site. The station is boxed behind a force field ticking down to collapse in 22 minutes, with a runaway reaction in the crisis core threatening to rip the structure apart. Engineering spaces hum with overload alerts and venting plasma, while radiation surges scramble comms with bursts of static. Isolation amplifies dread as the Enterprise crew presses for rescue amid ethical clashes over exocomp bombs. **Key operational context**:
            - The station orbits a moon in the Tyran system, directly over the particle fountain mining site, where high-energy particle streams fuel extraction technology. Enterprise sensors monitor its operations, tracking plasma glows and gravitational shears.
            - The particle fountain's runaway reaction originates in the crisis core, with venting plasma and overload alerts contributing to the station's impending collapse. Secondary explosions rock confined spaces, leaving debris and bruising crew members.
            - Sub-locations include the **Far Corner Near Impeller Control**, where Geordi locates Takenta's body after a secondary explosion, and broader engineering spaces where alarms blare.
          The facility's operations are monitored by the Enterprise, with Worf and Data interacting with station systems (e.g., bridge comms) as the crisis unfolds.
  location_type: Orbital Space Station
  parent_location_uuid: null
  season_appearances:
