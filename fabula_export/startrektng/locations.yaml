- fabula_uuid: ger_location_5043293066c4
  global_id: ger_location_5043293066c4
  canonical_name: Surface of Planet Minos
  description: 'A pressured, inhabited planetary surface on Minos where escalating
    stellar flares and environmental hazards create acute survival pressure. Tangled
    vegetation, ancient stone, and concealed sinkholes open into shadowed caverns
    where colonists shelter; a solitary monitoring satellite hangs in the sky as the
    only link to outside rescue. The air tastes of ozone and heat as urgency snaps
    the calm — transport windows narrow, cultural shock threatens fragile social order,
    and every surface becomes a frantic threshold between survival and annihilation.
    (Merged alias: “Minos Surface”.)'
  location_type: Planetary Surface (Colonized; Subsurface Caverns; Monitoring Satellite)
