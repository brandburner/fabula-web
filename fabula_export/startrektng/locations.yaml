  canonical_name: Caverns - Lava Tube Dead End
  description: A constricted, one-foot-diameter lava tube dead-end that requires phaser
    enlargement to allow passage, serving as a physical bottleneck and transition
    point to another chamber. This location appears after the team has already rappelled
    into the Cave Bottom and is characterized by claustrophobia, desperation, and
    the need to crawl single-file.
