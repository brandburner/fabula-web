  description: Specialized auxiliary command center **distinct from the main bridge**,
    used for diplomatic crises (e.g., Prytt government hails) and escape scenarios.
    Named after the *Raman* class or diplomatic designation, this bridge serves as
    a **backup or secondary hub** for tactical and strategic operations when the **main
