- fabula_uuid: ger_location_01bec9433a0a
  global_id: ger_location_01bec9433a0a
  canonical_name: Pulaski's Quarters
  description: Pulaski's Quarters aboard the USS Enterprise serve as both a private
    sanctuary and an unexpected battleground against time. The space carries the clinical
    precision of a Starfleet officer's living area—neat, efficient, yet subtly personalized.
    Light panels cast a sterile glow over standard-issue furniture, interrupted only
    by scattered personal effects that hint at Pulaski's humanity beneath her professional
    exterior. When Riker and Data breach the locked doors in desperation, their frenzied
    search turns order into chaos—drawers upturned, bedding disturbed, every surface
    violated in their hunt for unaltered DNA. The space thrums with electric tension
    as their mission shifts from respectful intrusion to frantic salvation. Strands
    of hair glint like lifelines amid the disarray, transforming this private refuge
    into the crucible where Pulaski's fate might yet be rewritten.
  location_type: Starship Private Quarters
  parent_location_uuid: null
