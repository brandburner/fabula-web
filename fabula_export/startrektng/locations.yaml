- fabula_uuid: ger_location_2d66f5758743
  global_id: ger_location_2d66f5758743
  canonical_name: Drema Four
  description: A volcanic, ash-choked planet—Drema Four—smolders and shudders under
    rupturing plates and erupting volcanic mouths. Tremors and ash plumes blot the
    sky while molten rivers advance like living fire; heat, sulfur, and falling embers
    make surface shelter untenable. Sensors (from orbit) register tremors, failing
    communications and hazardous emissions (including radioactive Illium-629), while
    nearby dilithium lattice activity and tectonic fury present the planet as both
    a scientific anomaly and an immediate environmental antagonist. The world’s intermittent
    signal (the child Sarjenka) turns raw data into urgent personhood, forcing the
    Enterprise to weigh engineering responses against moral cost.
  location_type: Planet
  parent_location_uuid: null
