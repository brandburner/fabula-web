  global_id: ger_location_eab8159c4e4f
  canonical_name: Path to Assembly Hall (Mintaka Three)
  description: A narrow, sun-bleached trail along Mintaka Three’s communal outskirts,
    the path hums with the heat and smell of smoke and pressed earth. Villagers crowd
    its edges, hands clutching ropes and primitive weapons as tension snaps tight;
    the path funnels movement toward the assembly hall and turns routine travel into
    a political choke point. Steps kick up dust, murmurs harden into shouts, and the
    sudden flash of a crossbow converts this transitional artery into the stage for
    a volatile hostage seizure and an immediate ethical crisis.
  location_type: Outdoor Path (Planet Surface)
