  description: Storms lash the Distress Signal Moon's approach, lightning strobing
    across the shuttle's interior as Riker doubts survival on its harsh surface—likely
    hiding the signal's source underground. Crew braces through violent buffeting,
    instruments flickering, alarms screaming amid power loss. This barren world isolates
    them from the Enterprise, its environmental fury converging with alien threats
    to trap the away team in escalating danger.
