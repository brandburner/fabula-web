    tactical map inside the sheriff's office, assigning it as his position for the
    hostage exchange with Frank Hollander. This exposed stretch at the town's periphery
    offers clear sightlines and potential cover from flanking wooden buildings under
    glaring simulated sunlight. Dust hangs in still air amid whinnies from distant
    horses and creaks from batwing doors. Holodeck corruption looms—glitching holograms
    could erupt from shadows, turning calculated standoff into lethal chaos as the
    office clock jumps ahead, heightening urgency.
