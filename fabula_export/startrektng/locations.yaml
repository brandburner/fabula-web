  description: This hazardous zone lingers just outside the heart of the Batris’ Main
    Engineering, where magnetic and radioactive interference twist sensor readings
    into unreliable echoes. The air vibrates with residual energy from recent battle
    damage, suffused with a tense stillness that frays nerves and clouds judgment.
    Life signs flicker ambiguously in the haze, setting a precarious stage where danger
    and hope collide amid the ship’s wounded core. Shadows stretch from battered bulkheads,
    and the faint hum of failing systems undercuts the ominous silence, transforming
    this liminal space into a crucible of risk and fraught uncertainty for the away
