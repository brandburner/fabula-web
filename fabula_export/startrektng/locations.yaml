  canonical_name: Curtis Creek
  description: Gentle waters of Curtis Creek draw Riker’s illusory family for fishing
    trips and picnics. Young Jean-Luc recalls laughter with father Will and mother
    beside the flowing stream, rods arcing through air, blankets spread on grassy
    banks under rustling leaves. Sun warms the scene as baskets unpack meals, birds
    call overhead, and water laps stones—nostalgic haven reinforcing fabricated bonds
    until Riker’s doubts fracture the warmth.
