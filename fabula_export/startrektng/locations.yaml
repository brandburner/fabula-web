  canonical_name: Transporter Room Six (Emergency/High-Priority) (USS Enterprise-D)
  description: Transporter Room Six on the USS Enterprise-D centers on a glowing pad
    ringed by humming LCARS consoles and precise Federation transporter controls.
    Chief Hedrick runs standard maintenance when Geordi's chameleon-skinned alien
    form partially materializes from the Tarchannen contagion, lunging violently to
    knock him down amid a failed security alert. Earlier visits saw Leah Brahms beam
    in to accuse Geordi of sabotage and Mirasta Yale arrive under Worf's watch with
    Crusher and Picard present. Consoles flicker during arrivals; the space shifts
    from efficient routine to sudden predatory horror.
