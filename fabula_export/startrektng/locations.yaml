  canonical_name: Mountains of the Smaller Continent (Iconia)
  description: Jagged ridgelines slice a rust-brown sky above Iconia’s smaller continent,
    concentrating an unnatural, humming pulse within a narrow mountain basin. Sensors
    flare against rocky spines and frozen scree as a localized remnant of ancient
    technology thrums beneath lichen-streaked stone. The air tastes metallic and thin;
    light flares intermittently from hidden installations, turning archaeological
    curiosity into immediate danger when a projectile erupts from the heights. From
    orbit the range reads as a pinpointed hotbed of residual energy, transforming
    geological silence into a tactical locus where discovery collides with survival
    and every scan risks triggering the planet’s lethal legacy.
