  global_id: ger_location_67910df5993a
  canonical_name: USS Enterprise‑C
  description: A crushed, overheated engineering level where life‑support and power
    systems groan beneath catastrophic damage. Smoke stings the throat; ozone and
    scorched insulation hang in the air as sparking conduits arc behind collapsed
    bulkheads. Diagnostic panels flicker with red warnings while muted alarms thud
    through warped deck plating. Technicians who can still move shove past wreckage,
    hauling field kits; Geordi aims here to stabilize life‑support and jury‑rig failing
    systems. The deck reads as a frantic repair locus and grim triage point, where
    technical improvisation fights time and loss.
