  canonical_name: Badar N'D'D's Quarters
  description: Badar N'D'D's Quarters and the Guest Quarters represent the same dimly
    lit, shadow-draped enclave aboard the Enterprise characterized by tension, cultural
    collision, and diplomatic fragility. This private space is a crucible for confrontations,
    mistrust, and mounting menace under a veneer of civility, notably involving Badar
    N'D'D and Tasha Yar in scenes of rising threat and hostility.
