- fabula_uuid: ger_location_8b2761ab48ba
  global_id: ger_location_8b2761ab48ba
  canonical_name: Moon of Bre'el Four
  description: 'A distant, pale satellite resolves on the bridge viewscreen as a battered,
    cratered disk ringed by instrument overlays and orbital vectors. Sensors paint
    velocity and altitude readouts across its shadowed plains and bright highlands;
    the visual reads as both geological object and operational telemetry. Cold silence
    radiates from the image even as the crew registers motion: steady orbital markers
    confirm a safe trajectory. The moon functions narratively as concrete proof of
    danger averted, a small celestial body whose restored orbit releases taut anxiety
    aboard ship and restores fragile order to the immediate crisis.'
  location_type: Planetary Moon (Remote Orbital View)
