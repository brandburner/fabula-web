  canonical_name: Starfleet Headquarters / Starfleet Command
  description: Starfleet Headquarters, also known as Starfleet Command, serves as
    the nerve center and strategic seat of Federation authority. This sprawling complex
    embodies bureaucratic power and shadowed intrigue, with austere chambers and secure
    communication hubs pulsing with suspicion and guarded diplomacy. Admirals convene
    here via video transmission amid undercurrents of mistrust and conspiracy, reflecting
    a psychological battleground where loyalty and betrayal intertwine at the highest
    command levels.
