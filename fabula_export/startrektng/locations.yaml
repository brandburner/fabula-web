  global_id: ger_location_dabdf112cb5e
  canonical_name: Planet Vandor
  description: Planet Vandor emerges as a small, remote world coated in an eerie violet
    hue, its surface perpetually encased in a shimmering, impenetrable forcefield.
    The planet’s alien glow casts a haunting light that underscores its isolation
    and the dangerous secrets it holds. Within this sealed sanctuary, Professor Paul
    Manheim conducts perilous and groundbreaking experiments, while his wife Laura
    awaits rescue. The atmosphere vibrates with tension — a crucible of scientific
    obsession and human desperation. The forcefield’s sudden dimming signals a fragile
    hope amid the overwhelming barriers, as the Enterprise races against time to breach
    defenses and save those trapped inside. Vandor’s landscape, though unseen, pulses
    with mystery, danger, and the shadow of dimensional rifts that threaten to unravel
    reality itself.
  location_type: Remote Planet with Forcefield Shielding
