  global_id: ger_location_a0e92b4620ef
  canonical_name: Derelict Borg Ship (Away Team's Coordinates)
  description: Chief O'Brien locks transporters onto this derelict Borg ship at the
    away team's coordinates. The crew strands amid failing bulkheads and intermittent
    lights. Ion storms nearby spike interference, pushing beam-in disintegration risk
    to 50%. Picard orders the beam-down despite hazards. Hugh recalls thousands of
