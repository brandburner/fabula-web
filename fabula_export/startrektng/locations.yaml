- fabula_uuid: ger_location_b1807b2f73ee
  global_id: ger_location_b1807b2f73ee
  canonical_name: Northern Province of Kataan
  description: Batai identifies the Northern Province of Kataan to Picard as the region
    holding Ressik, a drought-plagued world unknown to him. Parched lands drive communal
    sapling-planting ceremonies in town squares, where residents plant fragile hope
    against encroaching desertification. Dust clings to skin and clothes; tension
    simmers in conversations about survival. Picard's probing questions cut through
    the collective resignation, marking his dislocation in this vast, dying expanse.
  location_type: Arid Planetary Province
  parent_location_uuid: ger_location_e17220472604
