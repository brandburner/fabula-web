- fabula_uuid: ger_location_7b31ba46d819
  global_id: ger_location_7b31ba46d819
  canonical_name: Anbo-Jyutsu Ring
  description: A circular combat pit etched into the Enterprise gymnasium floor, the
    Anbo-Jyutsu Ring concentrates every sound and breath into a charged, intimate
    arena. Blindfolds dim vision while beeping training staffs punctuate the air;
    the mat's textured surface feeds tactile cues underfoot and lights mark tactical
    exits and scoring zones. The ring forces opponents close, translating old resentments
    into measured strikes and confessionary pauses. Close metal bulkheads reflect
    each impact and the space tastes of sweat and disciplinary focus, converting ritual
    training into a decisive stage for personal reckoning and public adjudication.
  location_type: Gymnasium Combat Circle
  parent_location_uuid: ger_location_0e0b55e387c9
