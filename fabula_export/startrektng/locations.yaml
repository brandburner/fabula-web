- fabula_uuid: ger_location_d332229d73c6
  global_id: ger_location_d332229d73c6
  canonical_name: Injector Room
  description: Geordi and Data step through the access door from the nacelle control
    room into this confined space, where the plasma injector hums against one wall.
    An observation window frames the glowing plasma stream surging through the nacelle
    tube beyond. Troi joins them here, her empathic flashback triggered as they pry
    open a hidden wall panel over the power conduit Kwan accessed. Tricorder scans
