  global_id: ger_location_8c6b2bbc931d
  canonical_name: Temporal Anomaly Field (Runabout Path Toward USS Enterprise-D)
  description: "\n        A scattered field of temporal fragments littering the runabout's\
    \ path toward the USS Enterprise-D, where time flows diverge—some frozen still,\
    \ others racing ahead. The anomalies intensify directly toward the Enterprise\
    \ as the epicenter, obstructing half-impulse progress and demanding Data's constant\
    \ course tweaks. Geordi's sensors reveal dozens of shards shimmering like fractured\
    \ glass against the starry void, filling the cockpit with alert tones and distortion\
    \ visuals. The crew grips their stations amid the gamble, with Picard urging them\
    \ to press on before time shreds their defenses. This phenomenon is experienced\
    \ from the runabout's perspective in deep space, near the frozen USS Enterprise-D\
    \ and Romulan Warbird.\n      "
