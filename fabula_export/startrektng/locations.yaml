- fabula_uuid: ger_location_d50f34c3b262
  global_id: ger_location_d50f34c3b262
  canonical_name: Klingon Cruiser P'rang
  description: 'The P''rang arrives as an offstage, ancient Klingon cruiser poised
    to receive K''Ehleyr — a hulking, honor-steeped vessel whose imminent rendezvous
    shapes choices on the Enterprise deck. Though unseen in this scene, the ship''s
    presence feels tactile: a looming deadline three days away, the weight of oaths
    and ritual that will be exacted aboard, and the pressure it exerts on Worf and
    K''Ehleyr''s farewell. Metallic authority, the promise of formal obligation, and
    the chill of duty converge; the cruiser functions as both physical destination
    and cultural crucible where private longing meets immutable tradition.'
  location_type: Klingon Cruiser (Starship)
