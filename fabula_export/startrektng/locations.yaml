    tasked with scouring the terrain for critical evidence of a brutal Borg attack.
    Gamma 2-5 draws the highest priority due to suspected remnants of the assault.
    Troi senses building emotional undercurrents, Geordi scans disrupted ground, and
    the security guard stands ready as the group advances into open expanse fraught
