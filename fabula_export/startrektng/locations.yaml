- fabula_uuid: ger_location_981a14d1576e
  global_id: ger_location_981a14d1576e
  canonical_name: Detention Cell (USS Enterprise-D)
  description: Crew clusters around the shimmering force field in this stark detention
    cell aboard the USS Enterprise-D, where an injured adolescent Borg lies critically
    wounded with internal damage and failing biochips. Beverly Crusher pushes to reconstruct
    implants for survival; Picard directs Geordi to craft a lethal programming virus
    that spreads through the Collective's network. Worf stands guard amid reinforced
    walls and cold lighting, the confined space amplifying clashes between medical
    mercy and tactical ruthlessness. Security monitors track every twitch, isolation
    sharpening ethical debates and strategic resolve.
  location_type: Starship Detention Cell
