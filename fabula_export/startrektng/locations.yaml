  canonical_name: Normal Space Outside Mar Oscura Nebula
  description: Enterprise surges from Mar Oscura nebula into this star-strewn expanse,
    sensors snapping clear as Data confirms the transition. Starfield fills viewscreens,
    stars elongating into streaks during warp acceleration to Starbase 260. Picard
    stands at the forward screen, relief softening his gaze after disorientation;
