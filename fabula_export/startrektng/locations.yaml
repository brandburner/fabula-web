  global_id: ger_location_820c96da664f
  canonical_name: Ferengi Vessel
  description: This Ferengi vessel radiates menace and cunning, with key internal
    locations including the Science Room where DaiMon Bok wields the ominous Thought
    Maker device. The vessel’s bridge is a claustrophobic crucible of sharp cultural
    pride and guarded hostility. The Science Room hums with eerie intensity, serving
    as a sinister crucible for psychological warfare against Captain Picard, weaponizing
    trauma and fractured memories. The ship embodies the Ferengi’s ruthless opportunism
    and inscrutable motives, standing as the staging ground for a relentless mental
    assault and strategic conflict against the U.S.S. Enterprise.
  location_type: Spaceship Interior
