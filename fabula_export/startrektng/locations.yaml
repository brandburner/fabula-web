  global_id: ger_location_8e5157c0c245
  canonical_name: Romulus
  description: Romulus stands as the Romulan Star Empire's homeworld, its green-blue
    atmosphere dotted with warbird fleets in orbit. Picard dispatches a coded subspace
    signal from its surface, which the Enterprise crew intercepts while orbiting Galorndon
    Core. Spock follows with a scrambled transmission on all subspace channels, warning
    of an imminent Romulan invasion force. Surface commanders relay urgent orders
    from bases amid cloaked espionage, as Federation officers track these covert messages
    that pierce the planet's veil of secrecy.
