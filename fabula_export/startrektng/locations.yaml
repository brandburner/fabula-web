- fabula_uuid: ger_location_43d78e3a702c
  global_id: ger_location_43d78e3a702c
  canonical_name: Royale Lobby Elevator
  description: 'A gleaming, public elevator sits like a polished throat at the heart
    of the Royale lobby: mirrored panels, brass trim, and a soft mechanical sigh punctuate
    the casino''s clatter. Foot traffic funnels here; arrivals spill into the gaming
    floor and late-night conversations refract off reflective doors. The elevator
    functions as an arrival point and spatial anchor—TEXAS steps out behind Data,
    space and threat colliding in a single motion—while its presence frames containment:
    staff hover nearby, hospitality slips into surveillance, and attempts to reach
    the outside world fail just beyond its doors. The space tastes of recycled air,
    faint ozone, and the sharp tang of artificial calm, turning ordinary transit into
    a narrative hinge where escape and entrapment intersect.'
  location_type: Hotel Elevator
