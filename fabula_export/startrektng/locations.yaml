  global_id: ger_location_00f8eba746c7
  canonical_name: Tanagra
  description: Tanagra emerges in Tamarian legend as a remote island or rugged country
    plagued by a savage beast. Darmok and Jalad land there as strangers, fight the
    monster together in its wild terrain, and emerge united—warriors bound by shared
    peril. Picard deciphers this mythic battleground as a mirror to his desperate
    stand with Dathon against El-Adrel's dangers, where isolation yields to fragile
    connection amid looming death.
