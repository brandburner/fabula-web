    Phelan system for trade negotiations. Crew members on the bridge register this
    shift as engines power up for warp, leaving J'naii orbit behind. The system pulls
    the ship into new duties—diplomats will soon face alien traders across planetary
    orbits, exchanging goods amid stellar vastness. Tension from the prior mission
