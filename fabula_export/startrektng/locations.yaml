  canonical_name: Sarajevo
  description: 'Sarajevo registers here as a charged, historic European city invoked
    as a cautionary anchor against meddling with time. The name snaps the conversation
    out of abstract calculus and into a bloody historical instant—the assassination
    that sparked global conflagration—conjuring narrow streets, political tinder,
    and the ripple of unintended consequences. Characters experience the city as a
    rhetorical fulcrum: a compact locus of fragile causality, moral peril, and the
    long, unpredictable arc of history that any intervention threatens to fracture.'
