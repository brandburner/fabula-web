  global_id: ger_location_0b3f5d76ef72
  canonical_name: Howard Home (Living Room and Sitting Room)
  description: Beverly Crusher stands in this spacious living area flowing into an
    adjacent sitting room, Scottish country antiques mingling with replicator and
    terminal amid drying herbs and medicinal relics. Family heirlooms—a flickering
    candle, worn journal—anchor the space where sunlight filters past a stairway to
    unseen upper floors. Troi listens to Beverly's grandmother tales here before departing;
    Quint later storms in, lunging for the candle amid shouts of curses and defiance,
    turning quiet legacy into charged standoff.
  location_type: Scottish Country Home
