  global_id: ger_location_a6a44699751d
  canonical_name: Deadwood
  description: A dirt road cutting through wooden saloons and storefronts in the USS
    Enterprise-D's holodeck simulation of 19th-century Deadwood, South Dakota. Townsfolk
    mill about under a clear sky, with an old man halting his rocking on a porch and
    a horse whinnying with unease. Worf and Alexander walk the street as sheriff and
    deputy, surveying the quiet town until a flirtatious woman passes and a distant
    gunshot cracks the air, turning calm into crisis. This location serves as the
    primary setting for the corrupted Wild West simulation, where glitching holograms
    ambush Alexander amid the facades, exposing the holodeck's failing safeguards.
    The street features a saloon with batwing doors, a sheriff's office, and a hitching
    post with a horse, all part of the simulation that devolves into lethal chaos
    as the program corrupts.
