- fabula_uuid: ger_location_f43b3549939b
  global_id: ger_location_f43b3549939b
  canonical_name: Pagh Hull
  description: 'Steel skin ruptures as a subatomic organism chews outward, spitting
    molten seams and hissing vacuum into corridors. The hull section registers as
    a hot, bleeding wound: warped plating, fresh scorch marks, and a thin film of
    ablated composite glinting under red alert lights. Sensors stutter with unreadable
    signatures while alarms slice the bridge’s air; engineers taste adrenaline as
    they map a living hole spreading through armor. This surface functions as the
    immediate crisis locus—both a technical emergency that threatens life-support
    and the political flashpoint that turns repair into suspicion and battle readiness.'
  location_type: Starship External Hull Location
