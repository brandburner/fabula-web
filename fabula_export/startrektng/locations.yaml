  global_id: ger_location_7f6b0f4e7bc2
  canonical_name: Vash’s Quarters
  description: 'Vash’s quarters aboard the Enterprise-D form a cramped personal haven
    cluttered with archaeological gear: tools, a map of Tagus ruins, and a PADD outlining
    forbidden expeditions. Picard forces entry, igniting a tense confrontation amid
    the intimate confines, where her defiance clashes against his Starfleet rigidity.
    The space amplifies emotional rawness—Vash steels herself at the door, tools scattered
    as evidence of her independence. Q materializes post-argument, grinning from the
    bulkhead, turning private fallout into cosmic amusement. Crew never enters; it
    stays Vash''s defiant sanctuary for pre-reception preparations.'
