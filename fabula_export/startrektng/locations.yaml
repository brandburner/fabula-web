- fabula_uuid: ger_location_c448f21b94e6
  global_id: ger_location_c448f21b94e6
  canonical_name: Pleasure Haven (Risan Resort)
  description: Pleasure Haven is a sprawling Risian resort designed for indulgence,
    featuring open lanais overlooking tropical vistas, airy lobbies with sun-drenched
    lanais, reflective ponds, and stone shrines housing the Horga'hn idol. The resort
    evokes a twenty-fourth-century Hawaiian aesthetic, blending hedonistic luxury
    with cultural symbols. Key events include Picard's forced relaxation, Sovak's
    ambush, Vash's calculated entrance, and Riker's prank—all of which disrupt the
    resort's serene atmosphere, transforming it into a site of tension and conspiracy.
    The lobby, in particular, serves as a focal point for these disruptions, where
    guests' relaxed bustle fractures into tense pursuit amid Vorgon demands and shadowy
    observers.
  location_type: Risian Resort
