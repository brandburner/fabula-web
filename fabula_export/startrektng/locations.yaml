  canonical_name: Jungle Perimeter (Romulan Prison Camp)
  description: 'A **water feature** in the jungle perimeter of the Romulan prison
    camp, serving dual narrative roles: (1) a **tactical barrier** during Worf''s
    frantic escape (guards wade through muddy water, slowing pursuit), and (2) a **symbolic
    refuge** for secret meetings between Worf and Ba''el (mirroring starry skies,
    steam rising during hidden baths). The pond''s location—near the camp fringe—links
    it to both the chase scene and the mentorship/romantic subplot. Canopy-filtered
    sunlight and humid air unify its atmospheric role across episodes.'
