    for a dying people. Its curved walls harbor a sacred chamber adorned with haunting
    portraits depicting Wyatt Miller’s life stages, signaling a profound, mystical
    bond. The ship’s interior pulses with eerie quiet and emotional weight as Wyatt
    beams aboard, bearing critical medical supplies and confronting his destined role
    as healer. Through tense encounters with infected survivors and a poignant farewell
    broadcast to the Enterprise bridge, the vessel becomes a crucible of sacrifice,
    hope, and cosmic destiny. Departing Haven, it carries Wyatt, Ariana, and the remaining
    Tarellian survivors into deep space, embodying the fragile persistence of life
    amid epidemic despair.
