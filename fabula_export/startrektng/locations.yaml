- fabula_uuid: ger_location_9aad4087ad96
  global_id: ger_location_9aad4087ad96
  canonical_name: Loren III
  description: Loren III (also known as Loren Three) is the only habitable planet
    in the Kurlan system, orbiting a dim star alongside barren sister worlds. Picard
    identifies it as the secret site where Galen likely harvested a missing DNA sample
    during his cryptic visit to nearby Kurl. The planet becomes a focal point for
    the *Enterprise* crew, who scan its surface for genetic traces amid suspicions
    of withheld evidence and rival pursuits. Gul Ocett's Cardassian team later steals
    a DNA fragment from its biosphere, cloaking the theft under the guise of scientific
    surveys or colonization efforts. The planet's biology plays a critical role in
    reconstructing the Progenitors' message, serving as a remote flashpoint that forces
    uneasy cooperation between the *Enterprise* crew, Ocett, and Nu'Daq during high-stakes
    negotiations in the Observation Lounge.
  location_type: Habitable Planet
  parent_location_uuid: ger_location_71d9fcdd2056
