  canonical_name: Human Thermal Trace Path (Planet Surface)
  description: Daylight bathes the alien planet's rugged surface as Riker and Worf
    track faint thermal traces left by an unknown human. Tricorders hum, displaying
    glowing signatures of recent footsteps amid failed Borg scans. The path cuts through
    barren terrain, dust stirring under boots, pulling the officers from structure
    hunt to urgent pursuit. Tension builds with each step, the trail hinting at Lore's
    chaotic influence amid monolithic Borg threat.
