  canonical_name: Away Team Beamdown Point
  description: 'A fixed planetary landmark designated as the Away Team Beamdown Point
    sits as an operational coordinate on the planet’s surface: a pragmatic, non-sensory
    anchor used to orient crews during missions. Described only by relative distance
    (e.g., "two kilometers north of the Away Team Beamdown Point"), it functions as
    a terse topographical reference amid failing sensors and heightened emotion. The
    point carries procedural weight—cold, surveyor-like precision that clashes with
    the bridge’s rising empathic disturbance—converting imprecise perception into
    actionable spatial data for visual verification and mission deployment.'
