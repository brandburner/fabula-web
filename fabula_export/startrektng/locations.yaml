  description: 'A liminal, myth‑laden world recited as the Bringloidi’s first waking
    place, alive in memory more than map. Light here folds like fabric, horizons pulse
    with soft, insectile colors, and a constant, distant chiming suggests a guardian
    watching from above. The place functions as comfort and origin myth: a promised
    refuge, a site of collective birth and fragile belonging that anchors oral rituals,
    soothes children, and supplies the refugees with a shared identity when the present
    is chaotic and brutal.'
