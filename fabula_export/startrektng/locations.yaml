    cast clinical light across ribbed bulkheads; the air smells of ozone, coolant,
    and recycled breath. During the quarantine, stretchers and med teams shove through
    tight turns, voices ricochet off metal, and improvised triage stations flare into
    existence beneath exposed piping. These tunnels function as a furtive, urgent
