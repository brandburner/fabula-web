- fabula_uuid: ger_location_1067b6a50e06
  global_id: ger_location_1067b6a50e06
  canonical_name: Ante Room
  description: 'A spare, intentionally simple waiting chamber that sits directly before
    the Klingon Great Hall. Characters beam into this antechamber, gather beneath
    low, functional lighting, and hold hushed, private counsel while the cavernous
    ceremonial space waits beyond. Sparse benches and uncluttered walls make the room
    a staging ground: ritual nerves coalesce here as a small delegation steels itself,
    footsteps fall softer, and the charged quiet tightens before the formal procession
    and public confrontation in the Great Hall.'
  location_type: Ceremonial Anteroom
  parent_location_uuid: null
