  canonical_name: Habak
  description: Smoke curls thick from a central firepit inside the Habak, casting
    disorienting shadows that heighten the oppressive tension during vision quests.
    Wesley Crusher sweats through hours of ritual exhaustion here, his body trembling
    as Lakanta vanishes into the haze. Familiar voices pierce the silence, and dying
    embers mark his emergence, transformed by spiritual reckoning in this sacred enclosure
    of the Native American village.
