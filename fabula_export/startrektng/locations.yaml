  global_id: ger_location_e168ccb91004
  canonical_name: Lambda Paz (Moon of Pentarus Three)
  description: Wesley identifies Lambda Paz as a barely habitable class M moon orbiting
    Pentarus Three—the shuttle's sole landing option amid failing systems. Mean surface
    temperature hits 55°C, baking the terrain in relentless heat, while intense magnetic
    fields disrupt sensors and force manual course corrections. Dirgo fights the controls
    toward its hostile surface, crew tension mounting as extreme conditions threaten
    a brutal descent and uncertain survival.
