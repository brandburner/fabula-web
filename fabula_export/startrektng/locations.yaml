- fabula_uuid: ger_location_1d61292b6404
  global_id: ger_location_1d61292b6404
  canonical_name: Kurn's Quarters
  description: 'A narrow, private cabin aboard the ship where dim panels and the steady
    ship-hum press close against a single occupant''s life. Metal walls frame a small
    window, a bunk, and a sparse work surface; personal tokens sit tucked into corners,
    guarded and deliberate. The room tastes of restraint and memory: it holds recollection
    like a wound, turning private confession and quiet reflection into a charged,
    intimate arena. Here provocation becomes ritual, brotherhood and honor collide,
    and a single revelation can fracture loyalties. The quarters feel claustrophobic
    and intense—an enclosed crucible that amplifies anger, confession, and the political
    consequences that follow.'
  location_type: Starship Private Quarters
  parent_location_uuid: ger_location_d394874bc8cc
