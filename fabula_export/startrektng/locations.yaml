  global_id: ger_location_615e63b7fe4e
  canonical_name: Civic Chamber Far Door
  description: Guards haul the struggling Soren toward the far door at the Civic Chamber's
    rear. Her desperate pleas echo off the chamber walls as they force her through,
    sealing her fate within the J'naii system's grip. Riker lunges forward but halts,
    powerless, as the door swallows her figure. Tension grips the air, heavy with
    the regime's rejection of her identity and Federation ideals. The exit marks the
    boundary between futile resistance and inevitable oppression.
