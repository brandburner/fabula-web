  canonical_name: Cul de Sac
  description: Rocks and thick vegetation enclose this small outdoor area, creating
    a natural shield where Picard and Beverly camp for the night. Campfire flames
    flicker against the stone walls, casting warm light that draws them closer during
    their raw emotional exchange. Stars pierce the dark sky overhead as they lie together,
