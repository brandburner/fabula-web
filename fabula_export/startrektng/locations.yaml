- fabula_uuid: ger_location_26fd1646ca33
  global_id: ger_location_26fd1646ca33
  canonical_name: Dual Star System
  description: A cold, binary-star region where two suns wheel in a slow, luminous
    pas de deux, throwing the void into alternating bands of glare and shadow. Navigation
    readouts tighten as the Enterprise threads the twin gravitational wells; stellar
    glare washes sensor scopes and paints the hull in shifting, amber-and-cerulean
    highlights. The place reads as a spatial limen—beautiful and hazardous—its twin
    light-sources compressing distance and urgency while underscoring isolation and
    strategic vulnerability in deep space.
  location_type: Binary Star System
