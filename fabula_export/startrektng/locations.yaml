- fabula_uuid: ger_location_89e99457c3a2
  global_id: ger_location_89e99457c3a2
  canonical_name: Exterior Space Around the U.S.S. Enterprise and Disabled S.S. Tsiolkovsky
    (Near Dying Star)
  description: A cold, hostile pocket of void pressed tight against a dying star where
    the crippled S.S. Tsiolkovsky hangs tethered to the U.S.S. Enterprise. Indifferent
    starlight picks out hull plating while blazing debris streaks and a detonating
    saucer section arc past in slow, traumatic motion. Sensor pings and strained command
    channels thin into vacuum; the scene vibrates with mechanical grit, desperate
    engineering improvisation, and the raw emotional weight of loss. This space functions
    as a battleground and crucible—where repulser gambits shove wreckage aside, memory‑weapons
    detonate like psychic ordnance, and even a fragile life‑force slips cleanly into
    the indifferent dark.
  location_type: Orbital Location
  parent_location_uuid: null
