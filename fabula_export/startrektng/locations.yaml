  global_id: ger_location_bf283d497b00
  canonical_name: Koinonian–Energy World
  description: 'A liminal, unnamed planet once inhabited by two divergent intelligences
    — ephemeral energy beings and the corporeal Koinonians. The place hangs at the
    edge of memory: low, electrical currents hum like distant conversation; phosphorescent
    horizons fold into columns of light that feel like archived grief. Off-screen
    and invoked as origin and refuge by an illusionary Marla, the world functions
    as a narrative attractor for longing, mourning, and the ethical cost of fabricated
    consolation. It reads as a remembered landscape that both comforts and condemns,
    where belonging and illusion collide.'
