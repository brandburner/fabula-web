  canonical_name: TAC Officer's Office
  description: The TAC Officer's Office serves as a focused command center within
    the Academy’s testing environment, where Officer Chang monitors candidate performance
    and delivers critical point standings. This functional office pulses with quiet
    authority, its atmosphere charged by the high stakes of the trials unfolding beyond
    its doors. Candidates passing nearby feel the weight of constant evaluation, as
    the office embodies both administrative control and the tension of covert cultural
    testing. The space acts as a compact, authoritative enclave within the bustling
    corridors of the Academy, embodying the nexus between official evaluation and
    the personal drama that unfolds just beyond its door.
