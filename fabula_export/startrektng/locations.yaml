  description: Riker and Soren maneuver in the shuttle's cramped cabin, hands brushing
    over control panels and glowing monitors during systems reviews. Alarms wail as
    the port engine fails, twisting the craft violently and hurling Soren into a console.
    The Enterprise tractor beam locks on, steadying them. Physical closeness fuels
    Soren's confession of forbidden gender identity amid repairs. Power drains in
