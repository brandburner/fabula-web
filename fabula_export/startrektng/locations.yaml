  global_id: ger_location_540f17ece59c
  canonical_name: Orbit Above Galorndon Core
  description: 'Cold metal and blinking consoles hang above a storm-lashed world —
    Galorndon Core yawns below, a roiling disk that chews at sensors and reddens instrument
    readouts. From this orbital vantage, commands triangulate rescue and diplomacy
    at once: triage strains against political calculus, and the ship functions as
    lifeline and citadel. Static and false echoes pepper tactical displays while commanders
    weigh the cost of action. The orbit also serves as a mnemonic touchstone for crews:
    a site of prior confrontations and medical improvisation that haunts current judgement
    and fuels interpersonal mistrust.'
  location_type: Planetary Orbit (Ship Vantage)
