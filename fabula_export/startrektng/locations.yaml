- fabula_uuid: ger_location_82212754e526
  global_id: ger_location_82212754e526
  canonical_name: Utopia Planitia Shipyard (Orbital Facility)
  description: Utopia Planitia anchors the engine schematic program Leah Brahms loads
    into Geordi's holodeck simulation. Engineers like Geordi developed warp core designs
    here amid vast orbital docks and assembly gantries orbiting Mars. The facility
    pulses with the precision of starship construction—humming fabrication bays, holographic
    blueprints suspended in zero gravity, and teams calibrating nacelles under harsh
    industrial lights. This origin point ties Geordi's professional legacy to the
    program's uncanny realism, fueling Leah's investigation.
  location_type: Orbital Shipyard
  parent_location_uuid: null
