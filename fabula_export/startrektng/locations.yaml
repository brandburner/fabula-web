  global_id: ger_location_e329669fc445
  canonical_name: Family Quarters
  description: Family Quarters stand as a private, intimate sanctuary within the starship,
    a refuge where vulnerable bonds between kin play out amid growing crisis. The
    space absorbs the raw emotional shock as Alexandra vanishes suddenly before the
    eyes of her mother Toya, shattering the fragile safety such quarters typically
    provide. Quiet tension fills the air, fractured by the panic and disbelief of
    those present, underscoring how this once secure retreat now pulses with dread
    and loss. The quarters embody the personal stakes underpinning the broader conflict,
    a crucible where familial love confronts unfathomable threat.
