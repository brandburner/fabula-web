  global_id: ger_location_75bf8ff4f209
  canonical_name: S.S. Tsiolkovsky
  description: The S.S. Tsiolkovsky drifts silently in orbit around a collapsing star,
    a scarred research vessel transformed into a spectral monument of catastrophe.
    Once alive with scientific purpose, it now emits fragmented distress signals—a
    haunting broadcast that shifts from chaotic laughter and unsettling transmissions
    to the cold void of dead silence. The ship’s shattered emergency hatch and absence
    of life signs paint a grim tableau of sudden disaster and violent decompression,
    marking the Tsiolkovsky as a critical locus of danger and mystery that imposes
    a shadow over all who approach.
  location_type: Research Vessel Orbit
