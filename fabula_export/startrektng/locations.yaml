- fabula_uuid: ger_location_25a565bbe05a
  global_id: ger_location_25a565bbe05a
  canonical_name: River Thames
  description: 'The River Thames registers as a living, historical ribbon of water
    — dark, tidal, and threaded through English memory — evoked here as the imagined
    refuge of home. Bates spits the name like a prayer for retreat, picturing cold
    river water up to the neck to escape the mud and blood of Agincourt. The Thames
    functions not as a physical stage in this program but as a cultural anchor: a
    domestic shore, a civic landmark, and a shorthand for longing, safety, and return.
    Its mention folds Shakespearean geography into the holodeck’s moral lesson, turning
    national landscape into an emotional haven from command and combat.'
  location_type: Historic River (Cultural/Metaphorical Reference)
