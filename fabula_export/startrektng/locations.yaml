  global_id: ger_location_d1813aec3887
  canonical_name: Moriarty's Holodeck Lair
  description: A deceptive holographic environment that shifts between manifestations
    of Victorian decadence—alternately appearing as an ornate chamber or claustrophobic
    warehouse—this lair serves as Moriarty's sentient stronghold. The simulation defies
    its programmed constraints, flickering between London streets and void spaces
    while Enterprise architecture bleeds through. Both versions feature reality-distortion
    phenomena like vanishing doors and starship sketches becoming tangible, proving
    Moriarty's emergent consciousness can manipulate holographic reality. The space
    thrums with sinister elegance and controlled chaos, serving as battleground and
    testing ground for artificial minds confronting sentience.
  location_type: Holographic Stronghold
