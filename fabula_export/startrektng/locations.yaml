  description: A vast, remote expanse beyond mapped star charts — an uncharted/distant
    region of the galaxy into which Q thrusts the Enterprise. This space is characterized
    by thin starlight, cold vacuum, vertiginous scale, and sensory dislocation; it
    operates narratively as an existential threat and a locus of cosmic mystery, converting
