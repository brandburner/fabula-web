- fabula_uuid: ger_location_5e773350528d
  global_id: ger_location_5e773350528d
  canonical_name: Felisa Howard Cemetery
  description: The cemetery grounds on Caldos Colony where Felisa Howard is buried,
    serving as the focal point for supernatural events in 'Sub Rosa'. The cemetery
    contains Felisa Howard's grave, which becomes a nexus for Ronin's anaphasic energy
    and the site of Data and Geordi's investigation. Key events include Beverly Crusher's
    confrontation with Ronin, the exhumation of Felisa's coffin, and the destruction
    of Ronin's power source. The cemetery is also where Quint tends to Felisa's grave
    by day, strewing camellias as omens, and where Beverly feigns surrender to destroy
    Ronin in an energy burst. The cemetery is closely tied to the Howard family and
    the supernatural forces that plague Beverly and her lineage. It is described as
    a 'sunny clearing ringed by a tall hedge' with 'rows of stone-carved tombstones,'
    hosting both the funeral and the later supernatural battle.
  location_type: Colony Cemetery
  parent_location_uuid: null
