- fabula_uuid: ger_location_650009a84e61
  global_id: ger_location_650009a84e61
  canonical_name: Earth
  description: 'Blue‑green and immediate even at narrative remove, Earth stands as
    the survivors’ lost homeland and the promised destination that anchors hope, grief,
    and bureaucracy. It functions as both a geopolitical member world of the United
    Federation of Planets and a private map of family lines — a living planet of cities
    (Indianapolis named), banks, and descendants — toward which the USS Charleston
    will carry acclimating guests. The planet carries emotional weight: a repository
    of memory, legal tangles, and possible reunion that steadies characters amid diplomatic
    crisis and cultural dislocation.'
