    scar the ground nearby, where Susanna detects presences and collapses in alien-induced
    panic. The shuttle frames their fragile outpost: hull gleams under alien skies,
    interior offers brief shelter, exterior exposes them to whipping winds and unseen
    threats. Tension builds as medical transport beams her away, leaving the team
    exposed amid the planet''s eerie silence.'
