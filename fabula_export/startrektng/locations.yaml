  canonical_name: Nearby Doorway (Maquis Settlement)
  description: This sturdy door in the Maquis settlement stands as a vital refuge
    during the nighttime Cardassian ambush. Fighters wrench it open to seize weapons,
    launching desperate counterattacks amid phaser fire and explosions. A direct blast
    scorches its frame, sending splinters and smoke billowing into the dark air as
    shouts and energy discharges fill the chaotic night, capturing the raw peril and
    frantic resistance of the raid.
