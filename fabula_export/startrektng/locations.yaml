  global_id: ger_location_abe27c6a8582
  canonical_name: Prytt Capital Prison
  description: |-
    A secure prison facility positioned outside the Prytt capital, consisting of multiple components including:
          - **Main Prison Complex**: A harsh, isolated facility where Picard and Crusher are initially held captive. Stripped of their Starfleet gear and fitted with neural implants, they experience disorientation and vulnerability in this claustrophobic environment.
          - **Prison Cells**: Small, dingy, and claustrophobic cells (e.g., the specific cell where Picard and Crusher are held) with bare walls, shadows, and dim lighting. These cells enforce Prytt's dominance and serve as the setting for key interactions, including Minister Lorin's accusations and the discovery of Beverly's tricorder hidden in a food tray.
          The prison's harsh confines amplify feelings of helplessness, which eventually turn to resolve as Picard and Crusher engineer their escape. The facility is part of a larger Prytt-controlled territory, where Federation officers face threats of indefinite detention before breaking free into uncertain flight.
  location_type: Planetary Capital Prison
