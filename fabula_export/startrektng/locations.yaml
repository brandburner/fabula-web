  global_id: ger_location_19f81fa8960b
  canonical_name: Norpin Colony
  description: Norpin Colony serves as the proposed retirement haven for Montgomery
    Scott, a place reserved for 'old men' like him to withdraw from active duty. Characters
    frame it as a symbol of obsolescence, prompting Scott's rejection during his shuttlebay
    farewell. He chooses purpose over this distant settlement's quiet repose, where
    veterans confront the end of their engineering legacies amid structured habitats
    and unfamiliar 24th-century calm.
