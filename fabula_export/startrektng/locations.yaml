  canonical_name: Pool Table Area Adjacent to Dilithium Chamber
  description: Crew shelter here from dilithium chamber hazards aboard USS Enterprise-D
    Engineering. Isolation doors shield the space, sealing shut as blast rips chamber
    hatch, sparing pool table and surrounds from radiation and debris. Machinery hums
    steadily amid billiard setup—felt surface, cues racked—now charged with crisis
    tension. Geordi and Data reference it in sabotage probe, marking safer fringe
    where routine rec yields to forensic scrutiny.
