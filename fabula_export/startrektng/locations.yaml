  canonical_name: Relay Station 194
  description: Relay Station 194 functions as a remote Federation communications outpost
    overwhelmed by subspace traffic during maintenance downtimes. Aquiel Uhnari rerouted
    its signals from Relay Station 47, countermanding Keith Rocha's strict orders
    and sparking direct conflict between them. This act exposes the fragile interdependencies
    of isolated relay networks, where one station's burden forces defiance amid humming
