  global_id: ger_location_a43721c4d4f7
  canonical_name: O’Brien’s Quarters (USS Enterprise-D)
  description: Chief Miles O'Brien paces restlessly in his family quarters aboard
    the USS Enterprise-D, sleep deprivation from the Tyken's Rift fueling paranoia.
    Keiko enters with energy, seeking connection, but he accuses her of infidelity
    with Tom Corbin and shoves her away when she approaches. The compact space traps
    their raw confrontation, ship's hum underscoring fractured trust and the Rift's
    psychological siege on crew bonds.
  location_type: Starship Family Quarters
