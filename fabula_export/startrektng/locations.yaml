  description: Soren and guards traverse this shadowed hallway as their exit from
    the civic center, footsteps echoing under night cover. Riker and Worf track every
    movement from concealment, tension mounting with each step toward the threshold.
    The path bridges stifling chamber judgments to open-air ambush potential, air
