  global_id: ger_location_3134eecb4f85
  canonical_name: Gagarin IV
  description: 'Gagarin IV (also referenced as Gagarin Four) is a planetary/orbital
    location featured in Star Trek: The Next Generation — "Unnatural Selection". It
    functions as a critical waypoint in the Enterprise''s mission: initially a routine
    destination and then the urgent vector for a biological/quarantine crisis. In
    orbit the planet exerts narrative influence over shipboard drama (crew interactions,
    last-minute declarations, cargo transfer) while on the mission side it prompts
    navigation redirects, sensor attention, and the quarantine/exploration tension
    central to the episode''s plot.'
