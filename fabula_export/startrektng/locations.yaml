- fabula_uuid: ger_location_f2b2bda3b246
  global_id: ger_location_f2b2bda3b246
  canonical_name: Bersallis Three (Northern Continent)
  description: The northern continent of Bersallis Three, a vast and unpopulated expanse
    characterized by cyclical fire storms that pose a potential threat to a nearby
    Federation outpost. The continent's remote terrain and extreme environmental conditions—marked
    by churning flames, blistering heat, and untracked storm paths—draw the attention
    of the USS *Enterprise* crew. Worf reports the lack of population and initial
    low threat assessment, while Geordi La Forge advocates for scientific investigation
    of the rare phenomenon. Captain Picard ultimately prioritizes the study of the
    storms, despite mission conflicts, as the Enterprise charts a course to observe
    the natural infernos reshaping the northern frontier.
  location_type: Storm-Affected Planetary Continent
