  global_id: ger_location_8430bb92765f
  canonical_name: Federation Space
  description: A cold, law‑marked starfield where the USS Enterprise and a Klingon
    warship hang face to face, the void between them charged with protocol and threat.
    Pinprick stars frame silhouetted hulls; sensor readouts and distant radio silence
    give the space a legal weight. Tension ripples across bridge viewers as treaty
    lines and duty collide with pride and suspicion. This open interstellar zone functions
    as courtroom, battleground, and diplomatic stage—an external backdrop that compels
    restraint, choice, and the hard calculus of honor.
  location_type: Open Interstellar Space (Federation Jurisdiction)
