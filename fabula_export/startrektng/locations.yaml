  global_id: ger_location_f56a971cb8ee
  canonical_name: Fifth Planet of Selcundi Drema (Asteroid Belt / Former Fifth Planet)
  description: A jagged, orbital gauntlet of tumbling rocks and shifting trajectories
    that looms as a living navigational hazard. Sensors spit terse warnings as echoes
    of mass and momentum flicker across tactical displays; the helm must trade velocity
    for survivability when plotted courses bisect the field. Commands harden into
    arithmetic — seconds versus safe vectors — and the belt presses moral pressure
    on officers forced to choose speed over lives. It functions as a spatial choke
    point that sharpens debate, tests seamanship, and makes every micro-adjustment
    count under the bridge's watchful glare.
  location_type: Asteroid Belt (Navigational Hazard)
