  global_id: ger_location_8748073fbdd7
  canonical_name: Sarjenka's Room (Drema Four)
  description: 'A small private bedroom on Drema Four: a comb-like cluster of hexagonal
    cells forming a child''s chamber choked with ash, littered with broken toys, star
    pictures, a ruined transmitter, and a battered lute. The room is dim and hushed,
    a sleeping child beneath thin covers with an Elanin Singer Stone in small fingers.
    One wall can slide open to the planet beyond, revealing shifting volcanic conditions
    (from molten rivers and immediate volcanic threat to a quieter, smoke-thinning
    vista), and the space smells of smoke and dust while trembling with seismic urgency.
    The location is the site of an intimate, fragile human moment and an unauthorized
    rescue that links technological action with private consequence.'
  location_type: Private Residence Bedroom
