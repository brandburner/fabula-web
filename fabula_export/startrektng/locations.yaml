  description: Hal Moseley's cluttered office doubles as the bustling crisis center
    in this planetary facility. Monitors flicker with environmental readouts and maps
    plotting the atmospheric collapse, while windows frame relentless heavy snowfall
    blanketing Penthara IV. Picard, Geordi, Moseley, and scientists huddle amid the
    tension, debating the ironic CO₂ release plan—reversing decades of climate work
    to avert total freeze—as urgent updates on freezing New Seattle rivers and 12-kilometer
    cloud depths demand immediate action.
