    and a faint electrical hum blending with distant station noise. The chamber feels
    hospitable yet staged—program controls allow instant freeze and replay—so convivial
    gestures and flirtations harden into replayable evidence when an investigator
    interrupts and reframes private ritual as prosecutable fact.'
