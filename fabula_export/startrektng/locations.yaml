  description: 'The western continent of Bre''el Four: a vast continental expanse
    that, in Episode ''Deja Q'', is identified as the projected impact area for a
    colliding ferrous crystalline moon. The region functions as the human-scale theater
    of catastrophe — coastal plains exposed to tidal failure, mountain ranges primed
    for seismic collapse, dense settlements braced for firestorms and global cooling
    — and is repeatedly referenced in bridge reports, alarms, and countdowns as an
    imminent physical threat with a time-critical deadline.'
