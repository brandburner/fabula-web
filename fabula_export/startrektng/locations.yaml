- fabula_uuid: ger_location_dcdd521f0ef0
  global_id: ger_location_dcdd521f0ef0
  canonical_name: Caverns - Precipice
  description: 'A violent tremor fractures the cavern floor of the Second Magma Pocket
    (within Atrea''s subterranean caverns), carving a sheer 30-foot precipice that
    severs Data and Juliana from the pattern enhancers and beam-out point. Palm beacons
    flicker across unstable rock amid collapsing ceiling debris and rising seismic
    groans. The precipice, located in the caverns near the Second Magma Shaft, forces
    the characters to leap the gap; Data absorbs the landing while Juliana slams down,
    her arm ripping open to reveal android wiring in the dim, claustrophobic chaos.
    This feature is a critical obstacle in the episode''s climax (S7E10: *Inheritance*).'
  location_type: Subterranean Cavern Precipice
