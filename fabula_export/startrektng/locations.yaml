- fabula_uuid: ger_location_a406605d6744
  global_id: ger_location_a406605d6744
  canonical_name: Surface of Minos Crumbled High-Tech Ruins
  description: The surface of Minos unfolds as a haunting tableau of ancient, crumbled
    high-tech ruins overgrown by dense underbrush, where remnants of melted tritanium
    and advanced weaponry lie scattered. An eerie stillness pervades the clearing,
    pierced only by the faint hum of residual energy from a lethal, self-adaptive
    defense system. Invisible surveillance pervades the air, betraying an unseen adversary’s
    watchful presence. The ruins radiate a chilling fusion of forgotten technological
    marvel and hostile menace, trapping the away team in a deadly dance of deception
    and danger beneath the planet’s ominous canopy.
  location_type: Planetary Surface Ruins
