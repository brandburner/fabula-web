    of warm metal and concentrated focus while soft console light washes shaded faces.
    Here Geordi pores over cross‑sections of the warp engines, confronts denied access
    to private design logs, and endures a sudden, intimately delivered technical revelation
    as the holographic Leah traces the reactant path. The space functions as both
