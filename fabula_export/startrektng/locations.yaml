- fabula_uuid: ger_location_08d128cac230
  global_id: ger_location_08d128cac230
  canonical_name: Evadne IV
  description: Evadne IV (also referred to as 'Evadne Four') is a Class M planet that
    becomes the focal point of the *USS Enterprise*'s investigation after a wormhole
    anomaly erases 24 hours from the crew's logs. The planet's sensor readings initially
    suggest habitability, but subsequent probe data reveals conflicting Neptune-like
    gas giant characteristics, sparking debate among the bridge crew. Picard orders
    a direct course to Evadne IV, overriding Riker's skepticism about the wormhole
    'afterimage' theory and probe discrepancies. The planet's unstable nature—highlighted
    by Data's warnings—leads to a probe launch instead of direct approach, as the
    crew grapples with the anomaly's temporal and sensory distortions. The unresolved
    tension around Evadne IV's true nature and the wormhole's echoes challenge the
    crew's perception of reality and mission priorities.
  location_type: Class M Planet
  parent_location_uuid: null
