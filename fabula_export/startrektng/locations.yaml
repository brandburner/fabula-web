- fabula_uuid: ger_location_e884c3b8e0da
  global_id: ger_location_e884c3b8e0da
  canonical_name: Epsilon Sector
  description: 'Epsilon Sector functions as an abstract navigational quadrant — a
    plotted objective summoned from the bridge rather than a visible place. It registers
    in the cadence of keystrokes, console pings, compressed helm confirmations, and
    the low, mechanical spool of engines as course vectors snap into place. The sector''s
    presence reshapes the bridge''s atmosphere: Picard''s terse order converts private
    relief into professional motion, applause dies, routine reasserts itself, and
    the crew channels lingering vulnerability into steady duty as the ship drives
    toward an indifferent patch of space.'
  location_type: Space Sector
