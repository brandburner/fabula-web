  canonical_name: Ruah Four
  description: Galen's shuttle sliced into Ruah Four, an uncharted star system, before
    he reached the Enterprise—logs betray this hidden vector amid Yridian-tampered
    files. Picard locks eyes on the main viewer, orders full divert from diplomatic
    duties, and surges the ship into warp toward void-probed stars. Crew tension spikes
    in the Observation Lounge as sensors hunt ancient DNA clues in the system's remote
    silence, eclipsing all other priorities.
