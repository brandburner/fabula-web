  description: Ethan unrolls a hand-drawn map of the Romulan Base Tunnels in the cramped
    storeroom, marking paths to the shuttle bay, communications hub, and living quarters.
    Riker leans in, eyes tracing the lines as they plot escape routes while Romulan
    guards close in. Narrow passages twist through the base's depths, dim lights flickering
