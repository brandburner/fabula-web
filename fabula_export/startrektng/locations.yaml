- fabula_uuid: ger_location_16f539c232b7
  global_id: ger_location_16f539c232b7
  canonical_name: USS Enterprise‑C Bridge
  description: 'The battle-damaged bridge of the U.S.S. Enterprise‑C: a compact command
    ring turned shattered command chamber where scorched circuitry and smoking consoles
    mix with the metallic scent of damage. Klaxons and warning lights pulse while
    tactical readouts and the main viewer frame distant ships and impossible choices.
    Collapsed bulkheads, twisted metal and fallen crew create a scene of triage and
    technical repair even as officers, junior and senior, clamp duty to grief. Orders
    land like hammers as shields rise and weapons charge — this room functions as
    both the ship''s tactical fulcrum and a moral amphitheater, the staging ground
    for sacrifice and a timeline‑altering decision.'
  location_type: Starship Bridge
