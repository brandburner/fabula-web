  global_id: ger_location_19b11ad83456
  canonical_name: 'Biologically Toxic Spatial Anomaly (TNG S7E25: ''All Good Things...'')'
  description: A spatially anomalous rift radiating toxic energies that cause *tissue
    regression* (children revert to fetal stages), forcing the *Enterprise* to position
    itself in its path for tachyon pulse scans. Central to the *series finale’s* moral
    dilemmas about sacrificing the ship to save humanity from erasure. Involves Worf,
    Data, and Selar, with evacuation orders and biological horror themes.
  location_type: Spatial Anomaly
