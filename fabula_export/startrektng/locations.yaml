    Klingon forces clashed and fell back amid contested stars. Debris likely litters
    the void from shattered ships, marking a tactical loss that sidelines Gowron's
    fleet. This setback buys time for Duras operations, as Sela reassures B'Etor their
    region stays secure from his immediate push. Tense discussions in the Duras home
