  global_id: ger_location_404740f08432
  canonical_name: Chandlerland Hallway
  description: 'A narrow, retro-noir corridor within the Chandlerland holodeck simulation:
    faux-wood paneling, lamplight pooling on patterned wallpaper, synthetic smoke
    and staged rain, with slightly off acoustics that amplify footsteps. The space
    functions as an intimate, tensioned passage where escapist persona and physical
    risk collide—violence can break the simulation’s containment (real blows, blood),
    forcing role-play into immediate bodily danger. Part of the Chandlerland holonovel
    (Dixon Hill program).'
