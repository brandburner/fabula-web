    where exotic hors d'oeuvres crowd low tables next to empty champagne bottles,
    scattered robes, and rumpled pillows. Riker once tumbled into intimacy here with
    Etana, her neural device sparking addictive pleasure amid the haze of recreation
    and hidden schemes.
