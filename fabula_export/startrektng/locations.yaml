  canonical_name: '"Q" Courtroom'
  description: An immense, oppressive courtroom conjured by the omnipotent Q, designed
    to evoke a brutal mid-21st century dystopian dictatorship. This archaic tribunal
    setting—a crucible of surreal and degrading legal theater—confines humanity's
    representatives in ragged uniforms before a merciless cosmic judge. Armed soldiers,
    a Mandarin-Bailiff, and stark wooden docks amplify the atmosphere of intimidation
    and arbitrary cruelty. The courtroom pulsates with tension as Q presides as judge,
    jury, and prosecutor, meting out frozen stasis and lethal threats while Picard
    defiantly challenges the legitimacy and morality of this spectacle. The space
    embodies a Kafkaesque justice system where human dignity clashes with cosmic omnipotence,
    driving the narrative’s existential trial forward.
  location_type: Courtroom
