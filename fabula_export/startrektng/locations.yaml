  canonical_name: Asteroid Surface (Back Side)
  description: A jagged, shadowed stretch along the back side of a solitary asteroid,
    its steep curvature and pitted regolith physically block direct line-of-sight
    and create pronounced sensor blind spots. Scattered wreckage and a half-buried
    drive section stud the coarse dust, turning the surface into a forensic scene
    that the Enterprise must circumnavigate. The environment feels granular and silent,
    compressing tactical maneuvers into careful, suspenseful probing as crews contend
    with oblique angles and hidden hazards.
