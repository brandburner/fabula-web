  global_id: ger_location_4dd8490450ad
  canonical_name: Marlonia
  description: Marlonia draws Picard for shore leave with its ancient caves, where
    he excavates pottery fragments amid dust and shadows. Guinan highlights the planet's
    surface beauty—lush and inviting—yet Picard ignores it, tunneling deep into archaeological
    digs. Fragments of Marlonian cookware, handled with care on the returning shuttle,
    carry the echo of buried history and cool cavern air, underscoring his passion
    against the world's overlooked splendor.
  location_type: Inhabited Alien Planet
