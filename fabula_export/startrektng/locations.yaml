  canonical_name: Klingon Bird-of-Prey
  description: Data, disguised as a Romulan, strides onto the Klingon Bird-of-Prey
    bridge and presses Captain K'Vada for computer access to hack Romulan networks,
    with conn and tactical officers watching from their stations. Picard later storms
    in, deciphers a Romulan transmission, and clashes with K'Vada over transport coordinates,
    shouting Klingon commands that echo off bulkheads. K'Vada records a private log
    here after Data leaves, his voice low amid humming consoles and viewscreens flickering
    with Enterprise feeds. Tension fills the air during negotiations, as Klingon resolve
    meets fragile Starfleet alliances in this cramped command center.
