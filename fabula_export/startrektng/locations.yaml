  canonical_name: Phaser Range (USS Enterprise)
  description: Worf fires phasers at holographic targets in this small, dimly lit
    compartment aboard the USS Enterprise. Confined bulkheads trap echoes of shots
    and footsteps, ship's hum steady in the background. Guinan slips in unannounced,
    phaser in hand, and turns his solitary drill into sharp verbal sparring. Targets
    flare under their fire while she probes his Klingon identity, the tight space
    sharpening tension between stoic restraint and raw emotion. Neutral ground shifts
    intimate as Worf's defenses crack.
