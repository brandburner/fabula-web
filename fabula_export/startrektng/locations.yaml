  global_id: ger_location_3342be1adea6
  canonical_name: Main Bridge of the USS Enterprise-D
  description: |-
    The primary command center of the USS Enterprise-D, where Commander Riker oversees operations from the center seat amid glowing LCARS consoles. The bridge serves as the tactical and strategic hub for missions involving the Kalla system, including the hunt for the Duras sisters' plot. Key personnel include:
      - **Data** (Ops): Monitors sensor data, tracks Yridian freighters, and coordinates away team operations.
      - **Worf** (Tactical): Manages weapons systems (e.g., phaser fire to destroy bait ore) and reports on threats like abandoned mining shafts.
      - **Deanna Troi** (Counselor): Assesses emotional cues during communications (e.g., detecting lies in hails to Quark and Yog).
      - **K'mtar** (Observer): Provides external perspective on Romulan/Klingon tensions tied to the Kalla system.
      The bridge is characterized by high-stakes operations, magnesite interference disrupting sensor readings, and a disciplined Starfleet atmosphere where every order and scan reflects the urgency of the mission.
