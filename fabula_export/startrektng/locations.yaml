  global_id: ger_location_232b70c3a1d0
  canonical_name: Port of the Duck Blind
  description: A narrow observation aperture set into the weathered metal frame of
    a camouflaged duck blind, this slit functions as both lookout and tactile threshold.
    Characters press their faces and fingers to cold metal, peering through shadow
    into the clearing beyond; the small opening concentrates sight and sound into
    a single, urgent focus. Sparks and a lethal discharge erupt here, transforming
    curiosity into catastrophe, while the aperture’s uncanny vanishing—when holographic
    camouflage reasserts—turns the port into a locus of trauma, witness, and forbidden
    intervention.
  location_type: Observation Aperture (Duck Blind)
