- fabula_uuid: ger_location_ca0d3a99d681
  global_id: ger_location_ca0d3a99d681
  canonical_name: Deep Space Standoff Zone (Enterprise-Romulan Confrontation)
  description: A high-stakes deep-space confrontation where the USS Enterprise faces
    off against multiple Romulan warbirds in a tense diplomatic and military standoff.
    The Romulans, led by Admiral Mendak, initially outnumber the Enterprise (5 warbirds
    to 1 Federation vessel), forcing Picard into a tactical retreat after the Federation's
    diplomatic position is undermined by betrayal (T'Pel/Selok) and strategic vulnerability.
    The location is defined by its vast, star-speckled void, the silent vacuum amplifying
    the Enterprise's isolation and the Romulans' overwhelming presence. The encounter
    highlights Federation-Romulan tensions, the fragility of diplomacy, and the psychological
    weight of numerical inferiority in deep space. This zone includes the starboard
    side of the Enterprise (relative to the ship's orientation) where a Romulan Warbird
    decloaks during tense bridge negotiations, marking the critical moment of confrontation.
  location_type: Deep Space Confrontation Zone
