  canonical_name: Nel Bato System
  description: Wesley Crusher identifies the Nel Bato system as a key candidate within
    the *Jovis*'s calculated maximum range during the bridge hunt for Kivas Fajo.
    This stellar expanse draws speculation as the collector's greedy choice for evasion—its
    scattered stars, nebulae fringes, and remote sectors provide shadowy cover amid
    vast interstellar voids. Crew members scan tactical readouts, weighing its isolation
    against the *Enterprise*'s advancing pursuit, tension building as Fajo's arrogance
    meets their precision.
