- fabula_uuid: ger_location_1fa56e39a470
  global_id: ger_location_1fa56e39a470
  canonical_name: Alkar's Quarters
  description: Alkar's quarters provide a dim, sterile refuge aboard the starship,
    its confined walls sealing in manipulations and breakdowns. Medics kneel over
    Maylor's body on the floor as Beverly fights to revive her. Alkar draws Troi and
    Liva into hypnotic rituals here, their voices murmuring incantations amid the
    low hum of ship systems. Worf guards the door outside while transporters lock
    onto Liva inside. Tension builds in the intimate space as Alkar's serene mask
    cracks, rage spills out, and security traps him during his escape attempt.
  location_type: Starship Guest Quarters
