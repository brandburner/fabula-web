- fabula_uuid: ger_location_ce84eb8b21c0
  global_id: ger_location_ce84eb8b21c0
  canonical_name: Rutia Four
  description: 'Rutia Four presents as a politically charged, populated planet whose
    urban centers host loud, crowded plazas and frayed civic order. The Rutian Plaza
    in particular smells of fried street food and scorched stone after an explosion;
    dust hangs in sunlit air while urgent voices clash with the low hum of arriving
    starships. The planet functions as the backdrop for a Starfleet humanitarian mission
    turned crisis: protests ripple through its streets, medics race against chaos,
    local security jitters, and the risk of abduction and political escalation pulses
    beneath public grief. Sensory grit and moral urgency define the place.'
  location_type: Planet
