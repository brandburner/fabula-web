  global_id: ger_location_abb0f5e8b4a0
  canonical_name: Central Square Food Vendor
  description: Nestled in the central square of the Maquis settlement under night
    skies, this outdoor food vendor dispenses steaming hasperat—a Bajoran wrap thick
    with spiced peppers and lamb. Macias orders it for Ro Laren here, igniting their
    bond over childhood memories of loss and Cardassian horrors. The stall's warm
    aromas cut through the cool air, anchoring a fleeting moment of cultural intimacy
    amid the rebels' wary outpost, where rebels gather amid dim lights and shadowed
    paths.
