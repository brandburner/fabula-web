  canonical_name: Khitomer Outpost
  description: 'Khitomer Outpost sits like a healed-open wound on the Klingon borderlands:
    stone-and-metal ramparts scarred by fire, wind-whipped watchtowers puncturing
    a gray horizon, and an air that tastes faintly of smoke and old blood. The place
    carries the echo of massacre—empty berths, scorched parapets, and the memory of
    Romulan violence that orphaned a child and forged a lifelong rage. In conversation
    it functions as a moral fulcrum, collapsing private grief and cultural trauma
    into blunt, combustible justification for distrust and retaliation.'
