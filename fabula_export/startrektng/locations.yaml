  canonical_name: Zalkonian Starship
  description: The Zalkonian Starship is the primary command vessel of the Zalkonian
    forces, from which Sunad directs operations during the tense standoff with the
    USS *Enterprise*. Visible on the *Enterprise*'s main viewer, this bridge-like
    alien starship serves as a mobile fortress of biological aggression and ideological
    zeal. Sunad issues ultimatums from this vessel, including demands for John Doe's
    surrender, and deploys a bio-weapon that constricts the throats of the Starfleet
    crew. The ship's close proximity to the *Enterprise* heightens the immediate threat,
    and its tactical maneuvers—such as the swift departure after Sunad's teleportation
    back aboard—underscore its role as a ruthless instrument of Zalkonian dominance.
    The vessel's interior is characterized by tension and urgency, with glowing transporter
    effects marking Sunad's defiant return after confrontations.
