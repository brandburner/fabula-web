  global_id: ger_location_0a9f2ac0da22
  canonical_name: Tessen Three
  description: 'Tessen Three borders the nitrium-rich Pelloris asteroid field, a vast
    debris cloud of jagged rocks that draw metal-eating parasites. The Enterprise
    destroyed an asteroid here earlier, shattering its crust and releasing the infestation
    that now ravages the ship''s systems. Geordi and Data pinpoint this origin during
    the crisis in Engineering, spurring Picard to warp the wounded vessel back. Crew
    members confront the site''s double edge: past folly reborn as potential salvation
    amid failing power and spreading decay.'
  location_type: Planet
