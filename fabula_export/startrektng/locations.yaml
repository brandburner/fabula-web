- fabula_uuid: ger_location_c056a650adb2
  global_id: ger_location_c056a650adb2
  canonical_name: Rutian Police Headquarters
  description: A hulking civic fortress that hums with bureaucratic efficiency and
    latent menace, the Rutian Police Headquarters wears its authority like armor.
    From the plaza the building’s stone and glass facade glowers, funneling citizens
    through stamped metal doors into fluorescent corridors, tiled holding cells, and
    a thrum of clerks processing names. Conversations cut off when uniforms pass;
    rumors ripple that suspects brought here before Alexana’s rule often disappear
    without trace. The air tastes of disinfectant and stale coffee, punctuated by
    the metallic clink of handcuffs and the distant drone of interrogation rooms.
    The HQ functions as both visible instrument of order and a shadowed engine of
    political control, where fear contracts into compliance.
  location_type: Metropolitan Police Headquarters
