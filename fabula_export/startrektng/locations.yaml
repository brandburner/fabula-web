- fabula_uuid: ger_location_b72bd0456a5b
  global_id: ger_location_b72bd0456a5b
  canonical_name: Gamma Quadrant
  description: 'A vast swath of deep space referenced as the Barzan probe’s intended
    destination, the Gamma Quadrant stands as a remote navigational region heavy with
    strategic and diplomatic weight. Characters experience it through sensor readouts
    and tense bridge discussion: clinical pings, mapped coordinates, and the hush
    of possibility as the wormhole supposedly links two political spheres. The quadrant
    functions as an absent yet potent presence—a promised shortcut that reframes negotiations,
    tempts exploration, and sharpens anxiety when the wormhole behaves unpredictably
    and fails to deliver crew where the Barzan data promised.'
  location_type: Deep Space Quadrant
