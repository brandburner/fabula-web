  global_id: ger_location_5cb346197db7
  canonical_name: Klavdia Three
  description: 'Klavdia Three registers as a small, neutral planet whose air and climates
    closely mirror Daled Four, offering a familiar but sheltered world for its wards.
    Characters speak of classrooms, guarded upbringing, and a life largely spent learning
    rather than roaming—an existence of routine study and custodial oversight under
    neutral protection. The planet functions narratively as Salia''s entire experiential
    horizon: a contained birthplace that smells of institutional kitchens and quiet
    corridors, frames longing for other worlds, and becomes the diplomatic waypoint
    that forces the Enterprise to slow, assume caution, and weigh freedom against
    duty.'
