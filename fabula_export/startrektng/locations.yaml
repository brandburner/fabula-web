  canonical_name: Nearby Space Around the Enterprise at the Disabled Tsiolkovsky
  description: This tense orbital expanse situates the U.S.S. Enterprise in a precarious
    close orbit around a dying star and the disabled science vessel S.S. Tsiolkovsky.
    The cold silence of space presses in, heavy with cosmic danger and urgency. Captain
    Picard directs a critical data retrieval amid the looming collapse, turning this
    fragile celestial arena into a crucible of survival and scientific salvation.
    The charged atmosphere bristles with cautious determination as the crew races
    against time to salvage knowledge that may predict stellar doom.
