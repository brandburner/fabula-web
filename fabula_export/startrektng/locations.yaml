- fabula_uuid: ger_location_c8d440dde103
  global_id: ger_location_c8d440dde103
  canonical_name: Federation Planet
  description: 'A remote Federation world that presses isolation and urgency into
    the crew''s decisions: the away team lies stranded here, and a Romulan officer''s
    fate anchors diplomatic brinkmanship to its surface. The planet reads as a tactical
    and moral landscape—cold distance, creased by emergency signals and the raw ache
    of vulnerability—where rescue operations collide with territorial law. Sound and
    sensor gaps magnify fear; every transmission becomes a plea and every delay risks
    turning duty into catastrophe.'
  location_type: Planet (Federation World)
