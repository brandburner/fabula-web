- fabula_uuid: ger_location_b75ec3fe7fa5
  global_id: ger_location_b75ec3fe7fa5
  canonical_name: Scrub-Covered Ridge
  description: Riker and Worf crest this ridge on the planet's sunlit surface, sparse
    scrub-like vegetation scraping against their boots amid rocky inclines. Tricorder
    scans falter at first, then Worf locks onto faint energy pulses. Residual thermal
    traces glow human—recent footsteps cutting deliberate paths through the brush,
    turning their Borg hunt into a chase shadowed by Lore's chaotic pull. Tension
    spikes under clear skies as the barren ridge yields clues to fractured drone movements.
  location_type: Planetary Ridge
