  canonical_name: Horga'hn Shrine
  description: Tucked within the deserted Risan resort lobby at night, the Horga'hn
    Shrine occupies a specific corner where a smaller Horga'hn statue conceals the
    Tox Uthat artifact. Vash moves toward it stealthily, intent on retrieval, only
    for Picard to intercept her. The hidden compartment fuels tense deception and
    confrontation, its discovery exposing Vash's scheme amid shadows and strategic
    revelations.
