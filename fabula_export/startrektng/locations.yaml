- fabula_uuid: ger_location_1e2580d6dac0
  global_id: ger_location_1e2580d6dac0
  canonical_name: Path to the Planet
  description: The Enterprise drops from warp to impulse along this direct route to
    the planet, only to confront an anomalous green energy field that blocks advance.
    Worf detects the barrier as the ship holds position under raised shields and armed
    phasers. A slow-moving energy pulse launches from the field, slamming into the
    shields with a blinding green flash that spreads in a fluorescent shower before
    fading. The impact delivers vital data on the unknown intelligence while heightening
    crew suspicion and mission urgency.
  location_type: Deep Space Planetary Approach
