- fabula_uuid: ger_location_3fab57806996
  global_id: ger_location_3fab57806996
  canonical_name: Delos IV
  description: Delos IV (also referred to as 'Delos Four') is a distant, colonized
    planet that anchors Beverly Crusher's memory of her 15-year medical internship
    under Dr. Dalen Quaice. The planet serves as the site of her professional origins,
    where she claims to have honed her medical skills amid sterile wards and clinical
    mentorship. However, its existence is disputed by the *Enterprise* crew, with
    Beverly invoking it on the bridge amid skepticism and mounting evidence of erased
    records. The planet's isolation and fading memories of growth and trust deepen
    the mystery surrounding Beverly's past and her current state of isolation.
