  description: The site where villagers buried radioactive metal fragments from Data's
    probe after killing him in fear. This location is **dense, canopied, and steps
    from the town square**, marked by **disturbed earth, glowing hazards, and the
    echo of panicked shovels**. It embodies the villagers' terror of contamination
