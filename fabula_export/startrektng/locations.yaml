- fabula_uuid: ger_location_7aa94987f21b
  global_id: ger_location_7aa94987f21b
  canonical_name: Guest Quarters Viewport
  description: A narrow viewport set into the private guest quarters, the glass frames
    the ship’s motion into silver streaks as stars smear and snap when the Enterprise
    slips to warp. Light from the passing starfield washes the cabin in cold, indifferent
    pinprick gleams while the hull hums beneath footfalls. Servants unpack luggage
    in low, ritualized motions; Sovereign Marouk lingers at the glass, small and fascinated,
    breathing in the cosmic blur. The aperture functions as an emotional lens—distance
    made visible, curiosity exposed, and the quiet center for ceremonial gestures
    like Yuta’s tentative water‑tasting that reveal social order and latent unease.
