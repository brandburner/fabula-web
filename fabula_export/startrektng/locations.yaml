  description: Enterprise crew locks sensors on Tarchannen Three from this orbital
    perch, the silent planet below radiating parasitic threat. Geordi's post-surgery
    vanishing—confirmed off-ship—points here as infection's pull yanks victims toward
    transformation. Bridge alarms spike, turning routine orbit into taut standoff
