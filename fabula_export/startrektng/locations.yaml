  canonical_name: Great Hallway
  description: The Great Hallway stretches long and tense, a narrow passage where
    desperation ignites a fierce chase. The air crackles with urgency as wounded Admiral
    Aaron staggers through, phaser fire shattering the quiet. At the corridor’s end,
    Commander Remmick waits calmly beside a mysterious device, his form the stage
    for a grotesque parasitic revelation. The space contracts with dread and disbelief
    as alien horrors burst into violent life, turning this hallway into a crucible
    of brutal confrontation, exposing the fragile illusion of peace and the savage
    core of infiltration lurking beneath Starfleet’s surface.
