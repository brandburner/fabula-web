  canonical_name: K'mpec's Cruiser
  description: 'K''mpec''s cruiser—a Klingon command vessel—serves as the pivotal
    location for the Chancellor''s poisoning death and the ensuing succession crisis.
    The ship anchors the Empire''s political turmoil, hosting the Sonchi ceremony
    where Picard mediates between Gowron and Duras amid accusations of betrayal. Klingon
    austerity defines its atmosphere: dim lighting, metallic bulkheads, and the weight
    of tradition and conspiracy. The vessel''s decks echo with the tension of high-stakes
    negotiations, where honor and duty collide in the wake of K''mpec''s final testament.'
