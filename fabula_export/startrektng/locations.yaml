  description: Guests in period attire fill the parlors of this 19th-century San Francisco
    Victorian home during a high-society literary reception. A doorman blocks the
    entrance, questioning Data's arrival before allowing entry. Inside, gas lamps
    cast warm glows on ornate woodwork and heavy drapes as Data confronts Guinan,
    exposing his android nature. Samuel Clemens lurks nearby, his eavesdropping sharpens
    suspicion amid murmurs and clinking glasses, the close quarters amplify secrecy's
    strain.
