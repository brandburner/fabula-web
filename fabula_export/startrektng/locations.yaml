  description: 'A holodeck-configured recreation of a cluttered space-station research
    laboratory rendered with clinical precision: banks of consoles and diagnostic
    displays, exposed experimental apparatus and an alloy workbench scarred by simulated
    use. Programmed ventilation and a faint ozone/antiseptic tang mix with the hum
    of distant machinery while holoprojectors stitch believable surfaces and schematics
    into the air. The environment functions as evidentiary theater—clinical lighting,
    staged points of contact, and holographic reenactments turn private intimacies
    into public demonstrations for adjudication and testimony.'
