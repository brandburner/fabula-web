  global_id: ger_location_351b4cb66f4d
  canonical_name: Planet Brekka
  description: Planet Brekka presents as a vibrant, inhabited world pivotal to interstellar
    commerce and medical crises. Its atmosphere marks the fatal destination where
    the Sanction freighter descends and crashes, introducing survivors tied deeply
    to Brekka’s culture. This planet serves as the cradle of the Felicium medicine,
    a precious and addictive pharmaceutical resource driving economic interests and
    political tensions. The air pulses with urgency and conflict as Brekkian merchants
    claim ownership of this vital cargo, while survivors and visitors grapple with
    the ethical and mortal stakes bound to this world. Brekka’s identity is inseparable
    from its role as a contested homeland, a source of life-saving medicine, and a
    nexus of interplanetary strife.
