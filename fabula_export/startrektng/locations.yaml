  global_id: ger_location_4aed4c39f6a3
  canonical_name: Alliance-Controlled Side of the City
  description: Hayne identifies this territory on Turkana Four as Alliance domain
    across fragile borders from Coalition tunnels. Captured Enterprise crewmen serve
    as hostages here, their lives bartered in phaser deals amid threats of execution.
    The divided underground city breeds distrust, with faction arsenals clashing in
    dim passages scarred by violence and echoes of Tasha Yar's turbulent past. Away
    team members sense the peril in Hayne's warnings, the air thick with opportunistic
    tension and unresolved trauma.
