  global_id: ger_location_8110aaa8a1a4
  canonical_name: Boradis Three
  description: Boradis Three stands as a frontier colony world at the edge of mapped
    space, evoked in terse archival briefing rather than lived detail. The planet
    reads as a historical anchor — the site of the first Federation outpost in the
    Boradis system — a place of weathered structures, low hums of orbital traffic,
    and institutional memory that frames strategic choice. Its name carries bureaucratic
    weight in conversation, summoning governance, settlement history, and the quiet
    gravitas of a sector’s origin point.
  location_type: Colony Planet
