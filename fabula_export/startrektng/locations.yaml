- fabula_uuid: ger_location_c8e1dc8afae7
  global_id: ger_location_c8e1dc8afae7
  canonical_name: Iconia (Iconian Homeworld)
  description: 'Iconia — the Iconian homeworld — is a dead, brown-red world pocked
    by a planetwide bombardment and studded with relics of far older engineering.
    Its surface reads as an archaeological grave: jagged mountain ranges hide concentrated,
    humming remnants of advanced technology while pale plains and blackened basins
    mark vanished ecosystems. Sensors detect dormant power cores and buried machines
    that pulse like distant heartbeats; from orbit sudden blinding flashes or emergent
    projectiles can turn scientific curiosity into immediate tactical peril. The planet
    functions as both strategic fulcrum and ecological ruin, its silent ruins offering
    technology potent enough to alter regional power while its atmosphere and surface
    show long-term environmental damage.'
  location_type: Ruined Homeworld Planet
  parent_location_uuid: null
  season_appearances:
