- fabula_uuid: ger_location_aa98eca314ba
  global_id: ger_location_aa98eca314ba
  canonical_name: Shuttlecraft (in Space) / Fermi Interior
  description: |-
    A Starfleet shuttlecraft (specifically the *Fermi*) that appears in two distinct but narratively connected contexts in *Star Trek: TNG* S6E7 'Rascals':
          1) **Adrift in Space**: The shuttlecraft is caught in an energy anomaly that disables systems, warps bulkheads, and triggers a transporter mishap that shrinks the crew (Picard, Guinan, Keiko, Ro) to child size. This scene occurs *in space* during the anomaly event.
          2) **Interior (Returning from Marlonia)**: The shuttlecraft's interior is shown later during a calm return trip from Marlonia, where Picard shares pottery fragments with the crew. Worf's distress signal interrupts this scene, linking it to the earlier anomaly.
          Both contexts involve the same shuttlecraft (*Fermi*) but differ in *location* (space vs. returning to the *Enterprise-D*) and *narrative function* (crisis vs. camaraderie). The crew members (Picard, Guinan, Keiko, Ro) and shuttlecraft name (*Fermi*) are consistent across both scenes, confirming this is the same entity.
  location_type: Starfleet Shuttlecraft Interior
