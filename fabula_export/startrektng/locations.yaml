  description: The Enterprise arrives in orbit around Kesprytt Three, an Earth-sized
    blue-green planet that masks profound societal rifts. Home to the progressive
    Kes faction seeking Federation associate membership and the xenophobic Prytt facing
    exclusion, it prompts Picard's logged evaluation and personal ethical qualms during
    breakfast with Crusher. Swirling atmospheres and vast oceans visible from space
    underscore the mission's high stakes, where unity fractures along cultural lines.
