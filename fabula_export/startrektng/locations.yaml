  global_id: ger_location_788879b735b1
  canonical_name: Plane of Frozen Methane
  description: A vast field of glassy, frozen methane stretches under a low, alien
    sky, its surface hard and merciless to sensor and skin. The plain registers as
    an inhospitable expanse—biting cold, hydrocarbon frost, and shimmering mirages
    of strain on external scanners. At its center an unmistakably artificial building
    sits on the frozen crust, ringed by an improbable band of breathable air; the
    fragile, localized atmosphere reads like a human oasis carved from poison. The
    plain functions as a hostile, isolating stage that converts scientific curiosity
    into tactical peril, forcing minimal, highly cautious incursions and heightening
    the moral stakes of any descent.
