  canonical_name: Six-Acre Oasis on Rana IV
  description: A single six‑acre emerald island of life on the charred planet Rana
    IV containing one intact house and two faint life signs. Vegetation and breathable
    air are locally present amid surrounding ash; sensors record humid soil and domestic
    mechanical signatures. This compact locus—variously described as an oasis, a survivor
    dwelling, or a small Federation settlement site—serves as the episode’s moral
    fulcrum and the site of Starfleet away‑team interactions.
