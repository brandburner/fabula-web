  canonical_name: Large Alien Building
  description: Picard's away team advances across the sunlit planet surface toward
    this imposing alien structure, phasers at the ready after a recent attack. Geordi
    sweeps his tricorder over its exterior, detecting no Borg energy signatures yet
    pinpointing a hatch-like entrance twenty meters ahead. Caution defines their steps;
    the building looms as an enigmatic threat, its unknown interior fueling dread
    of ambush or darker discoveries amid the tense silence.
