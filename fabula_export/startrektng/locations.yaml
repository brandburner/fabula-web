- fabula_uuid: ger_location_68b09eae25d3
  global_id: ger_location_68b09eae25d3
  canonical_name: USS Yamato Shuttle Bay
  description: 'Doors yaw open onto a scarred shuttle bay aboard the stricken Yamato,
    a cavern of metal and halted motion where the sudden loss of a containment forcefield
    leaves torn bulkheads and abandoned tools strewn across scorched decking. Flickering
    emergency lights stain surfaces anemic red as the bay yawns into the vacuum beyond—air
    tastes of ozone and burnt insulation, and silence presses where footsteps and
    chatter once kept time. The bay reads as a site of abrupt catastrophe: magnetic
    locks limp, maintenance ladders hang at odd angles, and the absence of an engineering
    team echoes as a presence in itself. Characters entering feel the raw, immediate
    risk of structural instability and system collapse; the space carries the smell
    of fried circuits, the jolt of an interrupted life-support hum, and the cold,
    accusing geometry of a failure that cost lives.'
  location_type: Starship Hangar Bay
  parent_location_uuid: null
