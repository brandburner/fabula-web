- fabula_uuid: ger_location_b20b845e1512
  global_id: ger_location_b20b845e1512
  canonical_name: Night Side of Theta Eight
  description: 'A brutally dark hemisphere of an ice‑green world where cold bites
    and visibility collapses: liquid neon pools, methane and nitrogen choke the air,
    and hurricane‑force winds sculpt a searing, sensory absence. Temperatures plunge
    below −291°F, instruments stutter, and the planet’s shadow creates sensor blind
    spots that swallow conventional signatures. The night side functions as a narrative
    trapdoor—an enigma that hides impossible evidence, forces the ship to rely on
    imperfect scans, and tightens crew unease as discovery shifts from salvage to
    existential threat.'
  location_type: Planetary Night Hemisphere
