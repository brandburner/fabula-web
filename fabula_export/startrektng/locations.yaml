- fabula_uuid: ger_location_3a97c22a5f91
  global_id: ger_location_3a97c22a5f91
  canonical_name: Angosia
  description: 'Smoke and alarm lights blur the low horizon of Lunar Five as Picard
    directs a hand-picked team toward its scarred settlements. Riot-torn streets and
    shattered security barricades ring the orbital landing zone; civilians huddle
    beneath overturned market stalls while military drones crisscross ash-gray skies.
    The moon reads as a raw political wound—engineered soldiers vanish into alleyways,
    whispered blame hangs heavy on the air, and every footstep risks sparking fresh
    violence or exposing state secrets. The place functions as both crime scene and
    courtroom: a confined, austere landscape where containment, investigation, and
    diplomatic consequences collide under impatient stars.'
  location_type: Planetary Moon — Urban/Riot Zone
  parent_location_uuid: ger_location_3a97c22a5f91
