- fabula_uuid: ger_location_9eb54c822a8e
  global_id: ger_location_9eb54c822a8e
  canonical_name: Federation-Cardassian Border Zone
  description: |-
    The contested frontier between Federation and Cardassian space near the Argaya system, where the Enterprise operates within 5,000 kilometers of hostile Cardassian territory. This volatile region is characterized by:
      - **Geopolitical Tension**: A heavily patrolled demilitarized zone where unauthorized crossings risk open conflict between the Federation and Cardassian Union.
      - **Strategic Positioning**: The Enterprise maintains a precarious position near the boundary, enabling rapid response to crises (e.g., rescue missions) while avoiding direct provocation.
      - **High-Stakes Rescue Scenarios**: Escape pods and shuttles drifting into Cardassian space (e.g., 50,000–200,000 km inside) force the crew to weigh diplomatic consequences against moral duty, often resulting in desperate gambits to extract personnel.
      - **Sovereignty Enforcement**: The boundary is strictly monitored, requiring precise navigation (e.g., transport beams must 'hug the boundary' without crossing). Cardassian patrols and sensors create a 'deadly quiet' environment where interception threats loom.
      - **Narrative Themes**: The border embodies the duality of duty vs. restraint, with officers like Picard and Worf grappling with the 'starlit void of hostile restraint and calculated risk.'
  location_type: Contested Interstellar Border
  parent_location_uuid: null
  season_appearances:
