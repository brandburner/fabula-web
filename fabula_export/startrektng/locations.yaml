  global_id: ger_location_902ae84ee938
  canonical_name: Genome Colony Courtyard
  description: Colonists converge in the Genome Colony Courtyard, an oasis of lush
    vegetation, blooming flowers, sculptures, and comfortable seating enclosed by
    transparent walls. Beyond them stretches the toxic wasteland, sharpening the space's
    fragile perfection. Here, Benbeck clashes with Conor over outsiders, the Enterprise
    team materializes amid stares of awe and unease, crews debate genetic destiny
    and free will, and Troi strolls flirtatiously with Conor, stirring hidden longings
    beneath engineered harmony.
  location_type: Planetary Colony Courtyard
