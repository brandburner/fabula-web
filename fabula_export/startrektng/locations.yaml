    communications bay, packed with tightly coiled Promellian memory wiring and technical
    detritus. Cold metal walls sweat faint corrosion; a faint phosphor wash from nearby
    consoles paints the coils in ghostly blue. The air tastes of ozone and long-dormant
    circuits. Designed for small-item stowage and quick access by signal technicians,
    the locker feels isolated and secretive — a pocket of possibility where Data retrieves
    the coils that reignite hope and propel the crew toward decoding a lost captain's
    log under mounting pressure.
