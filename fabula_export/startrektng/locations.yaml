- fabula_uuid: ger_location_a2b83506a620
  global_id: ger_location_a2b83506a620
  canonical_name: Devron System Anomaly
  description: A massive subspace anomaly within the Devron System (Neutral Zone,
    near Romulan territory) that threatens catastrophic temporal disruptions across
    timelines. The anomaly's unstable core—where three *Enterprise*s pierce its heart—emits
    ominous light, drawing ships (including civilian Terrellian transports and multiple-timeline
    *Enterprises*) toward its gravitational pull. Sensors detect the rift off the
    port bow, with temporal energies warping space, spawning ghostly echoes of sister
    ships, and causing violent tremors. The core's vortex demands sacrifice to seal
    the rift, while Romulans probe its dangers under fragile pacts. Crews brace for
    temporal disruptions and diplomatic fallout as the anomaly's lethal embrace looms,
    with bridges quaking under power surges and warp shells straining against subspace
    barriers.
