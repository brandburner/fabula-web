  global_id: ger_location_9f047a50c520
  canonical_name: Las Vegas, Nevada
  description: 'Las Vegas, Nevada registers here as the terrestrial anchor the bridge
    crew uncovers when data links a twentieth‑century hotel called The Royale to a
    real‑world address. The city arrives as a flash of neon and endless façades in
    the crew’s screens: a canyon of casinos, late‑night sirens, and hubbub folded
    into archival records, legal filings, and hospitality ledgers. Its presence converts
    an abstract illusion into a geographic target, infusing the rescue with cultural
    texture — risk, anonymity, and the moral weight of a city built on chance.'
