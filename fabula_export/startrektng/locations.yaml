- fabula_uuid: ger_location_ebf80d515c78
  global_id: ger_location_ebf80d515c78
  canonical_name: Klingon Homeworld Ocean
  description: 'A planet‑engulfing, storm‑lashed ocean that throws thunderous swells
    and salt spray against the cliffs of a single‑continent Klingon world. From orbit
    it reads as an indifferent, elemental antagonist: a roiling gray horizon, wind‑scoured
    crests, and endless, battering weather that dwarfs the fortress‑city and the towering
    Great Hall. The sea''s noise and vastness sharpen the scene''s menace—honor and
    memory feel small beside its roar—so the ocean functions narratively as an external
    pressure, foreshadowing political violence and amplifying Worf''s private peril
    with raw, physical threat.'
  location_type: Planetary Ocean
  parent_location_uuid: ger_location_48e115b51019
