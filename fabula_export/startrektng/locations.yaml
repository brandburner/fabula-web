  global_id: ger_location_2816c3053942
  canonical_name: Departing Vessel Near Solarion Four
  description: 'A Bajoran militant vessel flees Solarion Four''s orbit after destroying
    the colony. It broadcasts a low-band transmission to the Enterprise: a male voice
    claims responsibility for the attack and warns that no one remains safe in the
    sector until Bajor regains its homeland. Worf pinpoints the signal amid sensor
    blackouts as the ship slips into the void near Cardassian space. Tension grips
    the Enterprise bridge from this remote threat, the vessel''s escape amplifying
    the crisis of failed hails and political escalation.'
