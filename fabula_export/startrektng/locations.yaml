- fabula_uuid: ger_location_55a33c5514c5
  global_id: ger_location_55a33c5514c5
  canonical_name: Old City Street
  description: 'A narrow, weathered thoroughfare that breathes history and danger:
    cracked paving stones, leaning masonry, and shadowed alcoves frame a tight exterior
    street where motion compresses and threats arrive without warning. Footsteps echo
    off stamped doorways as two ornate‑armed assassins materialize and violence snaps
    the air; Picard meets them with controlled skill while the crowd''s distant murmurs
    dissolve into a knife''s hiss. The place tastes of dust and iron, tastes of political
    pressure and old grudges — a public artery that becomes a private ambush theater
    and the crucible for Kahlest’s sudden, lethal intervention and the high‑stakes
    choice that follows.'
