  global_id: ger_location_9e2083d1da19
  canonical_name: Starfleet Rescue Shuttle
  description: Riker and Soren target this Starfleet shuttle for their joint rescue
    into the null-space anomaly. They plan to review flight operations in its cockpit,
    surrounded by navigational consoles and pilot stations alive with diagnostic readouts.
    The compact interior hums faintly with standby systems, its controlled space fostering
    their teamwork amid mission tension. Confinement heightens focus as they prep
    controls for the hazardous electromagnetic void, marking the shuttle as launch
    point for defiance and discovery.
  location_type: Starfleet Shuttlecraft
