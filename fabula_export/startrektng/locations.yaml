  canonical_name: Open Council (Klingon High Council)
  description: 'A public tribunal hall where the Klingon High Council convenes to
    expose truth, pronounce ritual judgments, and resolve political crises. The space
    reads as austere and formal: rows of assembled council members and public observers
    press around a raised dais where testimony and accusations land like blows. Ritual
    language and ceremonial weight fill the air; accusation converts private rot into
    public spectacle. The hall functions as both evidentiary forum and theatrical
    site of honor’s fate—where Kahlest’s proof would be aired and Worf’s discommendation
    publicly declared.'
  location_type: Council Chamber (Tribunal Hall)
