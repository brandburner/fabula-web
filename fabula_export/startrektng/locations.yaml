- fabula_uuid: ger_location_e86a4cfc498b
  global_id: ger_location_e86a4cfc498b
  canonical_name: Odan's Quarters
  description: Odan's quarters aboard the Enterprise form a confined private sanctuary
    with a rumpled bed, mirror, and counter for medical devices. Odan and Beverly
    linger here in playful intimacy after a night together, interrupted by Picard's
    com signal. Later, Beverly examines Riker hosting Odan's symbiont amid emotional
    confrontations that crack her composure. Riker paces frantically, queries the
    computer, collapses into a chair, fails to replicate balso tonic, and confesses
    desire to Beverly, leading to a charged kiss. The space amplifies tension, vulnerability,
    and the clash of desire with duty.
  location_type: Starship Guest Quarters
