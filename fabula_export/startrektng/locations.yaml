  global_id: ger_location_e678052a0514
  canonical_name: Galor Four Annex
  description: 'A compact annex serving as a satellite mouthpiece for the Daystrom
    Institute, the Galor Four Annex feels bureaucratic and function-first: humming
    comms relays, sterile lighting, and a dedicated intake channel for supplemental
    science logs. Staffed more by protocol than personnel, the space operates as an
    institutional sink where intimate observations become archived evidence. Its presence
    in Data''s log address marks it as an authoritative recipient of research records,
    an administrative gate that can convert private caregiving into formal scrutiny
    and bureaucratic consequence.'
