  canonical_name: Uncrewed Vessel in Orbit
  description: Worf's sensors on the Enterprise bridge pick up the uncrewed vessel
    slipping into orbit around the planet, its silent form circling the site of a
    lone human lifeform. Crew readouts display the automated intruder's path amid
    hyperionized space, its unexplained presence casting an ominous shadow over the
    hijacked ship's chaos. Tension mounts as this orbital watcher hints at hidden
    threats below, spurring desperate countermeasures against Data's overrides.
