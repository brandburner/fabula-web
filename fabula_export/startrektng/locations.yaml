- fabula_uuid: ger_location_22f7065d367d
  global_id: ger_location_22f7065d367d
  canonical_name: Third Tunnel
  description: A narrow, echoing passage hewn from raw cavern rock, the Third Tunnel
    runs as one artery of the surveyed subterranean network. Cold sensor beams and
    wavering headlamps pick out mineral ridges and settling dust; the air holds a
    metallic tang and the memory of impact. The Away Team has just completed its formal
    survey here and pushes onward toward a ceremonial chamber before the space becomes
    the site of an unmarked explosive detonation that kills Lieutenant Marla Aster.
    Footsteps, fractured comms, and the sudden absence of a crewmember make the tunnel
    both transitional route and tragic locus, charging command decisions with urgency,
    grief, and moral responsibility.
  location_type: Subterranean Tunnel (Cavern Network)
