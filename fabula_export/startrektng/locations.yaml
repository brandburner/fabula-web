  canonical_name: Mempa Sector
  description: Kurn's allies station squadrons across the Mempa sector, a key strategic
    zone in Klingon space rife with Birds of Prey ready for action. Squadron commanders
    converge here for urgent meetings, plotting support for the revised strategy against
    Gowron. The starry void hums with tension as loyalty to the House of Mogh solidifies
    amid the civil war's shifting fronts, every alliance forged in these encounters
    poised to tip the balance toward family honor.
