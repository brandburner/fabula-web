  canonical_name: Cuellar System Cardassian Science Station
  description: 'Gul Macet accuses Federation forces of destroying the unarmed Cardassian
    science station in the Cuellar System two days earlier. This remote orbital outpost
    in Cardassian space conducted research until a rogue Starfleet vessel obliterated
    it, igniting retaliation against Picard''s Enterprise. The station''s loss exposes
    treaty fragility: sensors would have scanned empty starfields, labs hummed with
    quiet analysis, now reduced to drifting debris amid system voids, forcing Picard
    to unravel the unprovoked strike within one hour.'
