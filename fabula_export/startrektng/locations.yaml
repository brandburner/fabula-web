  canonical_name: Underground Cavern on Devidia II
  description: Dim mining lights line the tunnels of this underground cavern on Devidia
    II, casting shadows over a rockface warped by triolic waves from alien energy.
    Picard, Data, and a scientist pick through 19th-century artifacts—bifocals, Colt
    pistol, pocket watch etched 1889—before pulling back a tarp to expose Data's dusty,
    neck-broken severed head. Dust hangs in the air amid stunned silence, the space
    heavy with temporal paradox and extraterrestrial menace.
