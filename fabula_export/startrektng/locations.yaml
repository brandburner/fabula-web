  canonical_name: Exercise Room (Mirrored)
  description: A compact, mirrored exercise room lined with full‑height reflective
    panels, thin mats, and discreet overhead lighting. Surfaces throw bodies and expressions
    back at themselves, magnifying small gestures into unmistakable truth. The air
    carries a faint metallic tang and the muted thump of distant ship systems; acoustics
    deaden footsteps so whispered admissions bloom into intimacy. Privacy tightens
    around casual stretching, converting physical routine into a charged confessional
    where professional restraint and sudden desire collide.
  location_type: Starship Exercise Room
