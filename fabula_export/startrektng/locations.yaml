  canonical_name: Hill Near Shuttle Crash Site on Vagra Two
  description: A rugged, desolate hill rises starkly on the rocky surface of the barren
    planet Vagra Two, encompassing the area outside the crashed shuttlecraft where
    the wreckage lies. The terrain is littered with jagged debris and dust, marked
    by the shuttle crash's violent impact, and shadowed by the presence of the malevolent
    entity Armus. This location embodies the forbidding and tense environment surrounding
    the crash site, where the away team faces psychological and physical threats amid
