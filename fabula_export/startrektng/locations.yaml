  description: 'Sensors lock onto this precise point 210 km above Ventax Two''s surface
    at 34° N, 62° E: an unremarkable void that Dr. Clark dismisses as empty space.
    Geordi stretches ultraviolet scans across Z-particle trajectories, exposing Ardra''s
    cloaked vessel lurking there. The ship projects her illusory powers, fooling planetary
    sensors and crowds below. Crew readouts shift from blank screens to sharp outlines
    of technological deception, fueling the push to unmask her fraud amid orbiting
    silence and hidden threat.'
