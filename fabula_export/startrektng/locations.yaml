  global_id: ger_location_3504a2046670
  canonical_name: Secondary Hull Between Warp Nacelles
  description: Crew sees the creature latch onto this exposed section on the viewscreen.
    Glowing energy tendrils pulse between the nacelles, pulling power from fusion
    reactors below. Hull plating strains under the bond, nacelles flare blue against
    the star-streaked backdrop, marking the spot as the ship's vital underbelly. Tension
    builds as power flickers shipwide, the attachment a visible threat during evasive
    turns.
  location_type: Starship Hull Section
