- fabula_uuid: ger_location_97111b905d65
  global_id: ger_location_97111b905d65
  canonical_name: Overgrown Air Shafts
  description: Nestled beneath the hostile surface of Minos, the Overgrown Air Shafts
    lie concealed beneath thick, tangled vegetation. These forgotten vent openings
    offer secretive underground access, their rusted grates and clogged passages swallowing
    light and sound. The air hangs heavy with damp earth and decaying foliage, while
    the faintest draft hints at labyrinthine tunnels below. As the team scrambles
    to clear dense underbrush, these shafts transform into critical lifelines—hidden
    gateways promising safe passage amid encroaching danger and relentless weapon
    spheres, embodying urgency, resourcefulness, and the fragile hope of survival.
  location_type: Concealed Subterranean Access
