  global_id: ger_location_fbf7bc7d91ef
  canonical_name: Dark Austere Café (Romulan Street Café)
  description: A dimly lit, austere café located on a bleak Romulan street, serving
    as a clandestine hub for the reunification movement. The café is characterized
    by its tense, hushed atmosphere, where patrons eat in silence under the watchful
    eye of surveillance. Spock and Picard, disguised as locals, meet here to receive
    D'Tan's flower signal and a forbidden Vulcan book. An old grim woman ladles out
    soup, while Pardek scans for surveillance and hustles them out, emphasizing the
    café's role as a fragile yet critical meeting place for underground activities.
