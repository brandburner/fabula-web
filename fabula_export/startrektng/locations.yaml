    choice into a single, urgent threshold. The Ares functions as procedural gravity:
    sensors and corridors never detailed, it nevertheless radiates bureaucratic weight,
    strategic purpose, and the chill of commitment that propels a character out of
    personal rumination and into immediate action.'
