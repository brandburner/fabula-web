  canonical_name: Klingon Homeworld Cityscape (Matte Painting)
  description: A static matte painting depicting the exterior of a Klingon city during
    civil war, used as a visual narrative device to symbolize the empire's internal
    strife. Appears as a single, non-interactive shot in Episode S5E1 ('Redemption
    II') after Data exits the Enterprise ready room. No characters interact here;
