- fabula_uuid: ger_location_87fc3f362d66
  global_id: ger_location_87fc3f362d66
  canonical_name: Drive Section
  description: Crew sensors pick up silence from the Drive Section, where Picard and
    children remain trapped post-strike. No life signs register amid failing systems,
    heightening despair on the bridge and lounge. Ominous quiet underscores isolation
    by bulkheads; crippled structure threatens containment breach, forcing choices
    between saucer separation and desperate stabilization efforts. Tension builds
    as potential survivors hang in balance.
  location_type: Starship Drive Section
