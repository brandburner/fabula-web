  global_id: ger_location_a98301f5cbb1
  canonical_name: Tunnel Intersection
  description: Crates stack into rough seats and leaning spots in this Coalition-controlled
    tunnel intersection, where Riker, Picard, Data, Beverly, and Worf face Hayne across
    a tense standoff. Rough walls echo negotiations over phasers for hostages, the
    air thick with distrust and the faint scent of stolen synthale. Absent orange-yellow
    glows from Alliance proximity implants confirm safe territory, its guerrilla simplicity
    amplifying Hayne's opportunistic barbs and the away team's guarded skepticism.
