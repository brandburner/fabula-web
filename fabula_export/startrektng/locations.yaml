  canonical_name: Port Bow (20,000 km off the Enterprise)
  description: Worf's sensors pinpoint an unexplained energy signature 20,000 km off
    the Enterprise's port bow, a remote void amid stars that snags the senior staff's
    attention. Detection coincides exactly with Beverly Crusher's report of disembodied
    voices haunting crew quarters, fueling suspicion of linked phenomena. Officers
    abandon Observation Lounge debate, rush to the bridge, and train viewscreens on
    this distant threat vector. Black expanse isolates the anomaly, heightening tension
    as scans probe potential ties to unraveling temporal reality.
