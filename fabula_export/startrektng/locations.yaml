  canonical_name: Assembly Hall Exterior (Mintaka Three)
  description: Jagged, wind‑sheared rocks and a low weathered outcrop ring the narrow
    approach to the village assembly hall on Mintaka Three. Sun‑baked surfaces, crevices,
    and pitted rock provide cover and alter sightlines; characters skirt the stone
    while boots scrape gravel and covert observation passes through the air. The terrain
    functions as a tactical marker and choreography beat in scenes where Riker drags
    a wounded Palmer through crevices, using outcrops for cover and a precise line‑of‑sight
    window to lock a transporter beam. This exterior approach is narratively contiguous
    with the assembly hall but serves as a distinct terrain feature crucial to pursuit,
    rescue, and escalating cultural tension.
