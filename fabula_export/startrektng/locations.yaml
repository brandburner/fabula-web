- fabula_uuid: ger_location_9f00e659908e
  global_id: ger_location_9f00e659908e
  canonical_name: Centerplace Arena First Row of Spectators
  description: The first row of spectators in the Centerplace Arena occupies the most
    perilous vantage point, bracing under the raw violence of a ruthless Ligonian
    ritual combat. This narrow strip of witness space transforms into a crucible of
    chaos when a glavin weapon, hurled in deadly combat, accidentally poisons a spectator,
    shattering the fragile boundary between observer and participant. Tension and
    cultural shock ripple outward as the crowd reacts with outrage to the breach of
    sacred custom that follows—a defiant transporter escape that ignites fury and
    marks a turning point in honor, survival, and escalating conflict. This charged
    area embodies the violent intersection of ancient tradition, mortal risk, and
    the explosive drama of a culture pushed to its limits.
  location_type: Spectator Area
  parent_location_uuid: null
