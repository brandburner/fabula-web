- fabula_uuid: ger_location_bd48817558b3
  global_id: ger_location_bd48817558b3
  canonical_name: Geneva
  description: 'Geneva registers as a distant, bureaucratic gravity well: an international
    financial center that exists for the characters as clipped telephone clicks, institutional
    formality, and the cold arithmetic of accounts. In the guest lounge the city compresses
    into a nameless line on Ralph’s mind, dragging attention away from immediate human
    needs and converting global institutions into intimate panic. The space tastes
    of paper‑thin security, ledgered weight, and muted authority—an offstage metropolitan
    presence that catalyzes fear, urgency, and the crew’s moral reprioritization.'
  location_type: Metropolitan International Financial Center
