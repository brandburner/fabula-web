- fabula_uuid: ger_location_ee87f8a459ff
  global_id: ger_location_ee87f8a459ff
  canonical_name: Ansata Subterranean Cavern
  description: A sealed cavern thirty meters below ground that houses the Ansata stronghold,
    cut into bedrock and isolated from any surface egress. Institutional lighting
    rigs flatten the stone into a faux daytime, concealing vertical shafts and narrow
    service corridors. When power is cut, darkness becomes a weapon—corridors collapse
    into silence, metal and concrete lose scale, and echoes turn the layout treacherous.
    Recycled air, mechanical hums, and rigid access points create a claustrophobic,
    militarized environment designed for containment and tactical defense, making
    the space both a scientific discovery and an immediate operational objective.
  location_type: Subterranean Military Complex
