  global_id: ger_location_0bd31e49ba80
  canonical_name: Nearest River
  description: Gia identifies the nearest river as two days' walk from the village,
    the only other fresh water source available. Villagers ignore it because the distance
    makes daily trips impossible. Its waters offer clean hydration amid scarcity,
    but rugged paths and time demands keep it remote. Data and Gia reference it during
    crisis talks, highlighting the well's centrality and their isolation from broader
    relief.
