  global_id: ger_location_845055b6ce12
  canonical_name: Forward Turbolift
  description: Narrow turbolift cabin on the USS Enterprise-D provides swift access
    to the bridge. Beverly Crusher rushes through its doors onto the bridge clutching
    emergency medical equipment amid a crisis with Picard's health. Picard previously
    escorted science fair winners Marissa, Jay Gordon, and Patterson inside, their
    footsteps echoing off metal walls under faint panel glows and the deck's steady
    hum. Data and Dr. Marr discussed colonists and energy spikes during their ride.
    Confined space amplifies tension during high-stakes transits, from medical emergencies
    to potential disasters like sudden plunges.
