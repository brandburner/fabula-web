  canonical_name: Great Hall
  description: A cavernous, ceremonial chamber that dominates civic life—stone and
    shadow rising into a vaulted expanse where the High Council sits on a raised dais
    and the populace crowds the floor like a watching tide. Voices ricochet off hard
    surfaces, ritual silence snapping into sharp accusation; banners and insignia
    focus every gaze on the center where challenges are declared and verdicts are
    enforced. Weather-beaten spires and storm-lashed vistas frame its exterior, making
    the hall a fortress-city landmark. Functionally equal parts parliament, supreme
    court, and public square, it stages public ritual, political theater, private
    menace, and the formal rites that shape Klingon honor and fate.
  location_type: High Council Ceremonial Hall
