  global_id: ger_location_24f5b68d30d4
  canonical_name: Geordi's Cabin
  description: Quiet darkness fills Geordi's cabin as he naps, the space hushed and
    shadowed for rest. Data's transmission replay disrupts the stillness, jolting
    him awake with urgent echoes. He grabs his VISOR, activates it—the device's hum
    cuts through silence, sharpening his vision and resolve. Tension charges the air;
    he rises purposefully and exits, transforming personal quarters from refuge to
    launch point for rescue.
