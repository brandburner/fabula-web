- fabula_uuid: ger_location_29727a97a747
  global_id: ger_location_29727a97a747
  canonical_name: Royale Hotel — Seventh Floor Hallway
  description: A long, narrow hotel corridor hums with fluorescent indifference, its
    muted wallpaper and threadbare runner punctuated by brass room plates. The away
    team moves in a tight, tactical line; Data holds his tricorder aloft, its readings
    chirping like a Geiger counter in a morgue. Door 727 sits dead-center in the span,
    offering only the hotel's indifferent silence to Riker's measured knocks. When
    Riker forces the door, the hallway’s cautious observation snaps into invasive
    action—an atmosphere of clinical curiosity and mounting dread that compresses
    every footstep and breath.
  location_type: Hotel Corridor
