  global_id: ger_location_654ea829d3e3
  canonical_name: Far End of the Cargo Bay
  description: Amid the Enterprise cargo bay's chaos—a plasma fire rages, radiation
    climbs to 83 rads and rising—Beverly Crusher's tricorder pinpoints this far-end
    zone with 20% lower radiation levels. Geordi La Forge and Crusher haul unstable
    quaratum containers here manually, anti-grav units failing and transporters offline.
    Heat scorches the air, heavy crates strain their arms, and every delayed second
    risks ship-wide catastrophe. The space demands raw endurance, its relative safety
    a slim margin in the crisis.
  location_type: Starship Cargo Bay Section
