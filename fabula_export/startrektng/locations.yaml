  canonical_name: 'Ship''s Gymnasium (USS Enterprise-D) [S6E24: Second Chances]'
  description: Picard and Guinan clash swords in the fencing area, blades ringing
    off padded floors amid scattered gym bags on a nearby bench. They pause to rest
    there, sweat cooling in the confined air, before Guinan's feigned stumble draws
    Picard's pity and her swift disarm. This neutral space aboard the starship strips
    away command's distance, forcing raw emotional duels over Borg mercy and personal
    trauma amid the hum of ship life.
