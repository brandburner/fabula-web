  canonical_name: Corridor Intersection (Deck Six, Section 25)
  description: |-
    A critical junction on Deck Six, Section 25 of the USS Enterprise, where two corridors converge. This location serves as the primary setting for Wesley Crusher's decoy trap, where he plants a Type-1 phaser programmed to emit weak energy bursts that trigger a security forcefield. The scene unfolds as follows:
      - **Geordi's Investigation**: Geordi La Forge tracks phaser bursts mimicking Wesley's energy signature to this intersection, identifying it as a rigged decoy trap.
      - **Security Response**: Captain Picard seals the corridor behind shimmering forcefields and deploys a security team, including Commander Riker, Lieutenant Worf, and additional guards, who charge in with phasers drawn. They find the space empty, revealing the ruse, with only the sparking phaser device amid humming conduits and echoing alarms.
      - **Narrative Tension**: The tight, confined space amplifies the tension as the crew probes the empty trap, their boots thudding on the deck plates. Meanwhile, Wesley slips away undetected, exploiting the distraction.
      The location is characterized by its **humming bulkheads**, **flickering conduits under sensor strain**, and **shadowed junctions**, all contributing to the atmosphere of frustration and urgency as the crew realizes they've been misled.
  location_type: Starship Corridor Junction
