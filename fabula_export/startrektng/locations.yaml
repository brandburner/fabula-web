  global_id: ger_location_180134f0d89a
  canonical_name: Dulisian IV
  description: Dulisian IV (also referred to as 'Dulisian Four') is a Federation colony
    world experiencing total environmental systems failure, triggering a priority-one
    distress call. Toxic atmospheres, structural breaches, and collapsing shields
    threaten thousands of colonists, forcing a desperate mass evacuation. The crisis
    presents a moral dilemma for the USS Enterprise, as Commander Riker must balance
    the urgent need for rescue against potential Romulan deception, testing the limits
    of Starfleet's humanitarian obligations and strategic caution.
  location_type: Planetary Colony
