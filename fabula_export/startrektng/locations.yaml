  global_id: ger_location_850321575acc
  canonical_name: Iadara Colony
  description: Freeze-frame images from the compromised Argus Array capture Iadara
    Colony, one of several Federation sites Geordi identifies under covert Cardassian
    surveillance. Displayed on Engineering consoles, the stark visuals reveal this
    remote outpost's vulnerability amid the frontier's tense expanse. Crew members
    confront the breach's implications as logs confirm a Galor-class warship's role,
    amplifying the colony's isolation and strategic peril in the subspace telescope's
    silent gaze.
  location_type: Federation Planetary Colony
