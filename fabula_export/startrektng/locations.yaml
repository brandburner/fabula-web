  global_id: ger_location_76c8f7193609
  canonical_name: Observation Lounge (Starbase 234)
  description: Picard stands before Fleet Admiral Shanthi in this formal lounge on
    Starbase 234. Curved windows frame starfields as they debate the Romulan blockade
    proposal. Tactical arguments fill the neutral space, where Shanthi's caution yields
    to conditional approval. Tension mounts amid strategic displays, marking the lounge
    as a hub for Federation diplomacy and high-stakes decisions.
