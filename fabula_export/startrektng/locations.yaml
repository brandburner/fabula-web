  global_id: ger_location_97ffa9e51f17
  canonical_name: Romulan Surface
  description: Data traces the Romulan subspace transmission—carrying coded sequence
    1400—to this planetary surface, pinpointing it as the origin relayed to the Barolian
    vessel near Galorndon Core. Picard orders an immediate beam-down with Data to
    probe the site, tying the signal to Proconsul Neral's announcement and exposing
    Romulan intelligence maneuvers. The surface conceals covert operations fueling
    invasion fears, its alien terrain demanding direct Federation incursion amid fragile
    Klingon-Federation tensions.
  location_type: Planetary Surface
