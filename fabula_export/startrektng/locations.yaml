  canonical_name: Astrophysics Laboratory
  description: Nestled within the USS Enterprise-D, the Astrophysics Laboratory draws
    science fair winners on guided tours with promises of stellar analysis and cosmic
    data displays. Picard directs shy Marissa, earnest Jay Gordon, and energetic Patterson
    here alongside hydroponics, bypassing battle bridge and torpedo bay. Screens flicker
    with starfield models, consoles hum with sensor readings, and workbenches hold
    spectrographic tools—spacesuits hang nearby for zero-gravity simulations. The
    air carries faint ozone from active plasma coils, underscoring its function as
    a bastion of intellectual pursuit amid shipboard adventure.
