  description: 'The colony''s aqueduct and adjoining water purification plant: weathered
    low stone aqueducts and concrete channels threaded with looping iron piping, squat
    treatment machinery and a rusted control pedestal overlooking the intake. A low
    mechanical hum and the faint chemical tang of treatment mingle with sun-baked
    dust and mineral streaks on the walls. The facility functions as the community''s
    lifeline — politically charged, defended by villagers when threatened, and the
    focal point of a decisive scene when its controls are smashed and the town''s
