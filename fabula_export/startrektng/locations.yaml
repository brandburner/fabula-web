  global_id: ger_location_cac7824fbb2c
  canonical_name: Rosseau Five — Tiny Point of Land
  description: 'A minute, windswept promontory inside the Rosseau Five holodeck program:
    a tiny point of land that juts into an immeasurable dark, where synchronized moons
    and a shower of shooting stars paint the sky. Hard underfoot and exposed to a
    thin, alien breeze, the point collapses the horizon into glittering infinity.
    A distant, swelling chord and the hush of simulated air make intimacy feel fragile
    and enormous at once. The space compresses vulnerability and longing, forcing
    personal choice into stark relief as characters stand isolated against cosmic
    scale.'
  location_type: Holodeck Simulation Feature
