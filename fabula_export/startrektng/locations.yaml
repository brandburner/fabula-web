  canonical_name: Orbit of Aldea
  description: Aldea unveils itself as a cloaked planet draped in a gentle light green
    hue, shrouded beneath a faint, mysterious film. Once hidden within the Epsilon
    Mynos system, the planet radiates an aura of ancient secrets and advanced culture,
    inspiring awe and deep curiosity. The revelation pierces the silence of space
    with a low, resonant rumble, amplifying a tension mingled with wonder aboard the
    Enterprise. This serene world, veiled for ages, now stands as a pivotal ground
    for first contact, its psychic presence and enigmatic beauty poised to challenge
    the crew’s perceptions and ignite the unfolding mystery of Aldea’s legacy.
