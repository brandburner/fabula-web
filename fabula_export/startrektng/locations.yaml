  global_id: ger_location_ab0698f21502
  canonical_name: Lava Caves of No'Mat
  description: Deep tunnels of molten rock scar No'Mat, where searing heat and flickering
    lava light jagged walls with ruddy glows. Distant rumbles break heavy silence
    during MajQa meditation. Worf isolated himself here for six days, exhaustion yielding
    visions of Kahless prophesying his Starfleet destiny. Kahless later invokes Worf's
    childhood vision from these caves, a memory Torin reveals as implanted during
    cloning, anchoring Worf's spiritual conflict amid primal isolation.
  location_type: Natural Lava Caves
