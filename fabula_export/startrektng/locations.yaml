- fabula_uuid: ger_location_9ff07cab095a
  global_id: ger_location_9ff07cab095a
  canonical_name: The Shroud
  description: A bleak, outdoor expanse near the malevolent entity Armus on the planet
    Vagra 2, etched with an atmosphere of ruthless domination and psychological torment.
    This tense no-man's-land borders a crashed shuttlecraft, where Commander Riker
    and Dr. Beverly Crusher confront Armus’s cruel whims and sadistic control. The
    air hums with oppressive menace as Armus wields power through mocking taunts and
    brutal physical interference, manipulating Geordi’s visor and holding the crew
    hostage within its ruthless domain. Inside the shuttle, Counselor Troi faces Armus’s
    volatile emotions, revealing a tragic origin that deepens the chilling tension.
    This terrain becomes a crucible for negotiation, defiance, and escalating conflict,
    as hope clashes with despair under the shadow of an entity fueled by rage and
    abandonment.
  location_type: Outdoor Negotiation Area Near Alien Entity
  parent_location_uuid: null
