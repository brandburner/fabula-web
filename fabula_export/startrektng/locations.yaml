  global_id: ger_location_5c1461dcc59d
  canonical_name: Orbit Above Rana IV (High Approach Vector)
  description: 'The Enterprise occupies a tense, high orbit above Rana IV: a cold,
    elevated arc designated by bridge sensors as the high approach vector. The Main
    Viewer centers burnt landscapes and scattered orbital debris while bridge sensors
    and tactical consoles mark the corridor as the origin of the attack. From this
    orbit Starfleet stages beaming operations and logistical support—transporters
    flare as away teams materialize—while the orbit also functions as a moral fulcrum
    for command as they watch the consequences unfold below.'
