  global_id: ger_location_473413463246
  canonical_name: Vegetable Patch at the End of the Compound
  description: Rows of vegetables stretch along the compound's far edge under open
    daylight skies. Toq hoes soil with a bat'leth, its curved blades caked in dirt
    amid the scent of turned earth and growing plants. Worf strides up, halts in outrage,
    and demands answers from the youth who sees no sacrilege. Distant open gates and
    lax Romulan guards frame the deceptive calm; Ba'el approaches across the patch
    while Gi'ral watches from nearby, their exchange underscoring the colony's enforced
    tranquility and lost warrior ways.
  location_type: Klingon Colony Vegetable Patch
