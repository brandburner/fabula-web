  canonical_name: Ferengi Vessel Transporter Pad (Trap Stage)
  description: 'A hijacked Ferengi transporter pad that rematerializes Ferengi #1
    as a prisoner, locked in by a forcefield and stripped of his weapon. Used as a
    narrative device to demonstrate the children''s ingenuity in episode *Rascals*
