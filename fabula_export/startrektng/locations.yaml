  global_id: ger_location_9778c61d9179
  canonical_name: Nearby Hill
  description: Grassy hill rises just outside Sherwood Forest's edge, providing the
    Seven Men at Arms a clear vantage to notch longbows and loose arrows. Shafts whistle
    down, herding Picard's costumed crew—Worf bleeding from his wound—deeper into
    the trees. Sunlight filters through overhanging branches, heightening the ambush's
    sudden menace in Q's fabricated medieval landscape.
