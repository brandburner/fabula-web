  canonical_name: Kabul River in the Himalayas
  description: 'Picard suggests this holodeck program to Riker for relaxation amid
    bridge strain: the Kabul River rushes through towering Himalayan peaks, its turquoise
    waters carving gorges under vast skies. Crisp alpine air carries echoes of adventure—whitewater
    rapids and rugged trails promise escape. Duty interrupts, leaving the simulation
