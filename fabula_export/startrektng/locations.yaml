  global_id: ger_location_f69559558dce
  canonical_name: North Wing
  description: Worf and the security guard push through the north wing's corridors
    and rooms, tricorders probing for survivors amid the outpost's slaughter. Dead
    Starfleet bodies sprawl across floors, wounds seared by plasma beams under flickering
    lights and humming conduits disrupted by electromagnetic interference. Bulkheads
    stand mostly intact from the precise Borg assault, but silence amplifies every
    footfall and jammed door, shadows harboring unseen drones as tension coils during
    the hunt.
  location_type: Science Outpost Wing
