- fabula_uuid: ger_location_f2bcc069a085
  global_id: ger_location_f2bcc069a085
  canonical_name: Romulan Territory
  description: 'A sovereign expanse of cold, law-bound space where cloaks swallow
    outlines and jurisdiction bleeds into tactical choice. Dark starfields stretch
    beyond an invisible boundary; sensor pings die against a political line. Ships
    slip behind stealth like shadows returning home, and the region functions as both
    refuge and barrier — the destination of contested neutrino pulses and the place
    investigators point to when tracing recipients of Mogh''s transmissions. The space
    tastes of quiet menace and procedural consequence: pursuing it risks breaching
    treaty obligations and converting rescue into diplomatic provocation.'
  location_type: Sovereign Territorial Space
