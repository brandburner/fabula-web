  description: The overarching Borg stronghold where Geordi La Forge, Captain Picard,
    Deanna Troi, and Data are held captive under Lore's control, encompassing underground
    caverns, environmental control ducts, and the primary confinement areas. The tunnels
    beneath the compound are a **sub-component** of this location.
