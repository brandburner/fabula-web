  description: This rugged asteroid floats in the void of deep space, its metallic
    composition irresistible to the metal-eating parasites known as 'Twinkling Stuff.'
    The Enterprise targets it with a high-energy particle beam, transforming the barren
    rock into a glowing lure. Swarms detach from the ship's hull and surge toward
    it, the parasites' twinkling masses streaking through the darkness, granting the
    crew vital breathing room amid the silent stellar expanse.
