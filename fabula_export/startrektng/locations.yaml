- fabula_uuid: ger_location_5f1a0924ac94
  global_id: ger_location_5f1a0924ac94
  canonical_name: Plasma Stream Maintenance Area
  description: A high-risk maintenance access point on the USS Enterprise-D where
    plasma conduits discharge lethal energy behind a shimmering force-field. This
    location is psychically charged with the violent residue of Pierce's murders and
    his staged suicide, creating a dangerous empathic trap. The area is cramped, with
    exposed conduits snaking through dim shadows, and ionized air thick with mechanical
    vibration and psychic echoes. Troi is drawn here by the lingering rage and despair
    of Pierce's victims, nearly succumbing to suicidal impulses toward the plasma
    stream. Worf and other crew members interact with this space during investigations
    into the psychic disturbances it harbors.
  location_type: Starship Hazardous Energy Conduit
