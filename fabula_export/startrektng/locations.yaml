- fabula_uuid: ger_location_7b3b6c9b40f1
  global_id: ger_location_7b3b6c9b40f1
  canonical_name: Jeremy Aster's House — Front Room
  description: 'An impossibly precise recreation of Jeremy Aster’s front room, reconstructed
    down to a sleeping cat, a familiar blanket draped over the sofa, and the steady
    chiming of a grandfather clock. Textures invite touch—wool, worn wood, warm upholstery—soothing
    the senses and blurring the line between memory and artifice. The space operates
    as both sanctuary and snare: an alien intelligence sculpts domestic intimacy to
    seduce a grieving boy, converting private comfort into tactical terrain that strains
    shipboard authority and ethical resolve. Atmosphere sits at once cozy and uncanny,
    persuasive enough to arrest will and consequential enough to force command decisions.'
  location_type: Suburban Home — Front Room
  parent_location_uuid: null
