  description: A cramped, combat-ready security node set on Deck Nine, accessed directly
    from the bridge through a short corridor. Consoles flare with amber priority indicators
    and terse message headers; a single viewport or status panel keeps the station
    tethered to shipwide tactical feeds. The air tastes of recycled metal and charged
    circuitry as footsteps and the measured stomp of Worf approach. This is a place
    of immediate response—where coded warnings convert into armed posture, orders
