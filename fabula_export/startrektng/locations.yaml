    as the hub for her experimental equipment delivery. Crates of specialized medical
    gear arrive here for setup, filling the sterile space with humming scanners and
    calibration consoles primed for high-risk procedures. Biobeds line the walls under
    bright lights, ready for surgeries like Worf's cybernetic spinal graft. Tension
