- fabula_uuid: ger_location_cc7320de4a53
  global_id: ger_location_cc7320de4a53
  canonical_name: Klingon Rite of Ascension Chamber
  description: 'A holodeck-instantiated Klingon ceremonial chamber rendered with clinical
    precision: eerie, low lighting washes stainless-steel troughs and raised platforms
    in cold reflections. Central platforms rise like altars; a long trough bisects
    the floor. Holographic Klingon figures ring the ritual space, their painstiks
    humming with implied lethality. The air smells faintly of ozone from the holodeck
    emitters; metallic echoes and the cadence of ceremonial voice-forms compress into
    a tight, charged atmosphere. Functionally, the chamber forces ethical decisions—turning
    cultural reconstruction into an immediate, high-risk test of loyalty and sacrifice.'
  location_type: Holodeck Simulation Room
