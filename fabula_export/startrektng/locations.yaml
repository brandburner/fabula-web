  canonical_name: Timicin's Quarters
  description: Dimly lit confines aboard the Enterprise hold Timicin's bed, food dispenser,
    and console for scientific work. Timicin retreats here alone after spurning Lwaxana's
    invitation, his solitude shattered when she storms in to massage his shoulders,
    ignite a defiant kiss, and dismantle his cultural defenses. Darkness cloaks raw
    debates over ritual suicide; Dara bursts in later, her tearful accusations of
    shame amplifying the inescapable familial rift. The space traps personal crises,
    forcing confrontations between Kaelon duty, Betazoid passion, and fragile resolve.
