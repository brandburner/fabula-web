  canonical_name: Meeting Room (on Dorvan V)
  description: Picard and Troi face Anthwara and Wakasa across a broad table lined
    with chairs and PADDs in this large room. Sleek 24th-century design—smooth panels,
    subtle lighting—clashes with the surrounding village's rustic simplicity. Neutral
    ground hums with tension as the Tribal Council rejects relocation, voices steady
    in defense of their sacred planet. Impasse hangs heavy; Troi adjourns, Picard
    offers an Enterprise visit, turning confrontation toward fragile dialogue.
  location_type: Planetary Village Meeting Room
