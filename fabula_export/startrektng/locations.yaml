  description: 'A compact command arc on the Enterprise‑D''s main bridge where consoles
    and standing officers crowd into a narrow conversational ring. Warm LCARS light
    bathes faces; a low processor hum steadies the air until personality and crisis
    collide. Characters cluster here to issue orders, trade terse updates, or stage
    private provocations with public consequences — as when Lwaxana Troi sidles up
    to Riker, her flirtation stealing focus and ratcheting diplomatic urgency into
    distracted chaos. The space feels both operationally critical and embarrassingly
    intimate: tactile keys click, status chimes thread through awkward laughter, and
