- fabula_uuid: ger_location_39f9c8d7e441
  global_id: ger_location_39f9c8d7e441
  canonical_name: Ten Forward (Including Pool Table Area, USS Enterprise-D)
  description: |-
    Ten Forward is the USS *Enterprise*-D's primary crew lounge, a forward-facing space with panoramic stellar views, a long bar (where Guinan serves drinks), and a **pool table area** where crew members gather for informal conversations and crisis strategy. Key narrative beats include:
            - **Riker and Troi’s conversation**: Riker admits his fear of command near the pool table, while Guinan overhears from the bar and offers a cryptic job offer (*Transfigurations*).
            - **Borg crisis strategy**: Shelby, Riker, Geordi, Wesley, Data, and others abandon pool cues to debate defense plans amid dim lighting, repurposing the recreational space for urgent planning (*The Best of Both Worlds, Part I*).
            - **Picard and Guinan’s discussion**: The lounge empties into darkness during the Borg invasion, with Picard and Guian reflecting on survival near the bar (*The Best of Both Worlds, Part I*).
          The lounge’s duality—as both a place of camaraderie and a setting for existential reflections—highlights its role as a narrative microcosm for the *Enterprise*’s crew and their struggles. The **pool table area** is a sub-location where recreational activities (e.g., pool games) intersect with high-stakes discussions.
  location_type: Starship Lounge
