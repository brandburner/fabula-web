  global_id: ger_location_6bf051a69644
  canonical_name: Devolin System
  description: Central to the plot of *The Pegasus* (S7E12), this system is a **turbulent
    debris field** with **swirling rock fragments and ionizing radiation**, posing
    **sensor-scattering hazards** that threaten navigation. It serves as the **cloaked
    battlefield** where the USS *Enterprise*-D and the Romulan warbird *Terix* race
    to salvage the USS *Pegasus*, with **radiation storms heightening the urgency
    of every scan**. Interacted with by Jean-Luc Picard, Data, Geordi La Forge, William
    T. Riker, and Worf.
