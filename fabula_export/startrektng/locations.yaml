  global_id: ger_location_b49cd517f5e9
  canonical_name: Hekaras Two
  description: 'Hekaras Two anchors the Hekaras system as an inhabited planet shadowed
    by the treacherous Hekaras Corridor, where tetryon fields scramble warp engines
    and sensors. Troi urges the crew to query its residents for sightings of the missing
    Fleming, but Riker cites government logs: no contact occurred, save a single Ferengi
    trader''s passage. The world lingers as an untapped lead, its people monitoring
    the rift-plagued route amid subspace hazards that demand precise navigation.'
