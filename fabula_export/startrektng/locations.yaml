  global_id: ger_location_dafa54a1836e
  canonical_name: Room Where Ro’s Father Was Tortured
  description: Ro recalls this room during her ready room confession to Picard, the
    site where Cardassians tortured her father to death in her childhood presence.
    The memory floods back raw and unfiltered, chains clinking in her mind, screams
    piercing the dim confines, blood staining the floor—harsh symbols of occupation
    terror that scar her loyalty between Bajoran roots and Starfleet oath. Shadows
    of brutality linger here, driving her covert choices.
  location_type: Cardassian Interrogation Room
