  canonical_name: Planet Surface - A Different Area
  description: Picard's away team halts amid dense brush that blocks long-range sightlines
    on this distinct sector of the alien planet. Exhausted from hunting Data, they
    cluster to debate modifying a phaser into a luvetric pulse generator—Geordi's
    scans reveal the plan's fatal risk to Data's positronic net. Troi stiffens, her
    empathic senses lock onto a distant anomalous structure half-veiled by foliage,
