  global_id: ger_location_54305d985075
  canonical_name: Lwaxana's Quarters (USS Enterprise-D)
  description: Lwaxana's quarters aboard the USS Enterprise-D form a private haven
    of flamboyant luxury, cluttered with gowns and accessories as she primps theatrically
    for Timicin, Mister Homn assisting silently while Deanna watches with exasperation.
    The space crackles with mother-daughter friction over Lwaxana's relentless pursuit.
    Later, Troi exits to leave Lwaxana and Timicin alone for their raw confrontation—his
    silent resolve to face the Resolution rite amplifies vulnerability amid plush
    surroundings, the door a threshold to unspoken grief and fleeting intimacy.
