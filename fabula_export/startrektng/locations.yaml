  canonical_name: Juhraya Colony
  description: Juhraya Colony, a Cardassian-occupied settlement in the Demilitarized
    Zone, endures brutal occupation where Macias suffered a violent beating at the
    hands of Cardassian forces. Federation ships passed nearby without intervening,
    deepening the colonists' sense of abandonment and fueling resentment toward both
    Cardassian oppression and Starfleet's perceived neutrality. The colony's isolation
    and the scars of its inhabitants—both physical and psychological—embody the broader
    struggle of the Maquis and serve as a catalyst for rebellion. Dust-choked streets
    and alleys echo with the violence of occupation, where impunity breeds lasting
    rage and mirrors the buried grief of figures like Ro Laren.
