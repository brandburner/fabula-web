  canonical_name: Orbit of Edo's World / Space in Orbit Around Blue-Green Planet
  description: A vibrant blue-green planet sprawls below the USS Enterprise, visible
    through the ship’s Main Viewer, anchoring a tense external mission backdrop. This
    expansive orbital region serves as the cosmic stage where diplomatic and existential
    stakes converge amid the silent vastness of space. The planet’s lush, earthlike
    surface contrasts with the cold void surrounding the Enterprise, framing a fragile
    theater of unfolding moral dilemmas and strategic command decisions. The Main
    Viewer transforms this distant world into an ever-present visual focus, its serene
    appearance belying the mounting tensions on the bridge as Captain Picard and crew
    contend with both external threats and internal crises.
