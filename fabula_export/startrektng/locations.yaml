  description: Picard enters this secure cargo hold aboard Baran's mercenary ship,
    crates stacked high with ancient artifacts under harsh overhead lights and constant
    monitoring. The air carries the faint metallic tang of recycled atmosphere and
    dust from relics. Baran orders the inspection to test loyalty and separate Picard
    from Riker, turning the space into a tense proving ground amid undercover strain.
    Doubles as an impromptu archaeological lab where Picard later clashes with Tallera
