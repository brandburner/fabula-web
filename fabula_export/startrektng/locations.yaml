  global_id: ger_location_8f0aeb4609ea
  canonical_name: Geordi La Forge's Private Office (Main Engineering, Deck 42, USS
    Enterprise-D)
  description: A private workspace *exclusively for Geordi La Forge* within Main Engineering
    on Deck 42 of the USS Enterprise-D. This office is distinct from the shared engineering
    floor and its equipment (e.g., the Rim-Mounted LCARS Diagnostic Console). It is
    glass-partitioned, allowing for private diagnostics and briefings while remaining
    adjacent to the main engineering activity. The office serves as a space for focused
    work, leadership tests, and urgent diagnostics, as seen during the Devron anomaly
    contingencies and other critical engineering operations.
