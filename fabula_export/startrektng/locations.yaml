- fabula_uuid: ger_location_e7957cffd2e9
  global_id: ger_location_e7957cffd2e9
  canonical_name: Ancestral Burial Mountain
  description: A single, weathered peak rises beyond the colony’s amphitheater and
    the aqueduct’s angular silhouette, its dark ridge cutting the sky like a memory.
    Colonists point to it as the resting place of Ard'rian’s father, a private graveyard
    given the heft of public meaning. Wind strips sound across its slopes; gullies
    and scrub catch light and shadow. The mountain functions as an emotional landmark
    and moral fulcrum—its presence hardens arguments, summons duty, and anchors the
    debate about evacuation with the tangible possibility of buried kin lost to annihilation.
  location_type: Regional Mountain (Ancestral Burial Site)
