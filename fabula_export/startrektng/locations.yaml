- fabula_uuid: ger_location_d607e99b2c86
  global_id: ger_location_d607e99b2c86
  canonical_name: Angel One
  description: Angel One looms as a vivid green Class M planet marked by lush terrain
    and complex political currents. Its surface shelters a fiercely matriarchal constitutional
    oligarchy led by the stern Elected One, Beata, whose authority casts a cold shadow
    over diplomatic exchanges. The planet’s atmosphere simmers with tension as the
    USS Enterprise orbits vigilantly, grappling with cultural clashes, hidden fugitives
    challenging the fragile social order, and the haunting mystery of missing freighter
    survivors. Strategic stakes sharpen under the looming Romulan threat, while the
    away team navigates hostile receptions, secret survivors, and deep-rooted societal
    conflicts. Angel One pulses with a blend of natural beauty and fraught human drama,
    a crucible where diplomacy, survival, and cultural confrontation collide.
  location_type: Class M Planet
  parent_location_uuid: null
  season_appearances:
