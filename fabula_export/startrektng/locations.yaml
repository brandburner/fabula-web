  global_id: ger_location_dbfb82b9f30d
  canonical_name: Rasmussen's Time-Pod
  description: Rasmussen's high-tech, minimalist time-pod interior, where exposed
    trays hold stolen *Enterprise* technology (humming tricorders, medical scanners,
    Geordi La Forge's visor, and *Ten Forward* barware) alongside other looted items.
    The cramped, sterile space—lit by sparse blinking controls and sterile walls—amplifies
    tension as Rasmussen draws a malfunctioning phaser, his desperation palpable amid
