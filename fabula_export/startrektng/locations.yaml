  global_id: ger_location_39c8d6b8d2be
  canonical_name: Sikla Medical Facility
  description: Riker suffers critical injuries here after a xenophobic mob beats him
    unconscious. Guards secure entrances while doctors treat his wounds under intense
    scrutiny. Krola targets this site to administer dangerous drugs, wrenching the
    injured commander back to consciousness for brutal interrogation. Sterile halls
    and treatment rooms pulse with paranoia, alien rumors, and the weight of concealed
    diplomacy as staff confront Riker's disguised identity amid threats of lockdown.
  location_type: Urban Medical Facility
