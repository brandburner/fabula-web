  global_id: ger_location_a01824b2d1a7
  canonical_name: Lieutenant Barclay’s Quarters
  description: Lieutenant Barclay’s personal quarters aboard the USS Enterprise-D
    serve as his private retreat from engineering duties. This standard Starfleet
    officer’s space includes a compact bedroom, living area with workstation, personal
    replicator, and storage for uniforms and tech manuals. Larson checks here via
    ship systems and finds it empty, confirming Barclay’s absence during a high-stakes
    mission. The unoccupied room heightens Geordi’s worry over Barclay’s unstable
    state, turning a routine check into a signal of potential crisis.
