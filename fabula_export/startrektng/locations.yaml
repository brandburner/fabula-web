  global_id: ger_location_21348ab45209
  canonical_name: Planet Bre'el
  description: 'A planet under an urgent celestial threat, Bre''el hangs at the center
    of a ticking crisis: its satellite faces destructive perturbation as the moon
    approaches perigee in minutes. Alarms translate into a tangible pressure that
    radiates from orbital communications to field stations; the Bre''el Four science
    station answers frantic hails while rescue protocols mobilize. The atmosphere
    crackles with technical improvisation and moral urgency—countdowns, shouted orders,
    and strained calculations compress civic life into a single, desperate effort
    to prevent orbital catastrophe and protect those below.'
