- fabula_uuid: ger_location_e4ff344bb4fd
  global_id: ger_location_e4ff344bb4fd
  canonical_name: Rana IV's Three Moons
  description: 'Three pale satellites wheel around Rana IV in staggered, syncopated
    orbits that slice the planet''s sky into shifting corridors. They present as both
    landmark and menace: their positions cast sensor shadows, channel gravitational
    tugs, and create blind pockets that complicate orbital insertion, transporter
    locks, and approach vectors. On the Enterprise bridge they register as crisp tactical
    concerns—Picard orders an approach clear of them—while their silent presence ratchets
    unease, framing Rana IV''s ruined surface with a cold, unblinking geometry that
    narrows options and raises the stakes for any descent.'
  location_type: Planetary Moons
