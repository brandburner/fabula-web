- fabula_uuid: ger_location_3036171c50a0
  global_id: ger_location_3036171c50a0
  canonical_name: Ligonian Orbital Control Station
  description: Perched in orbit above planet Ligon II, the Ligonian Orbital Control
    Station pulses with tense urgency as the vital nexus of Ligonian communications.
    This orbital space station serves as the fragile interface of hostile diplomacy
    and technological vigilance, where the USS Enterprise strains to establish contact
    amid escalating cultural conflict. Signals flare with ritualized aggression and
    cautious negotiation, the station embodying the volatile balance of power heightened
    by Lieutenant Yar's abduction and the fragile dance of diplomatic brinkmanship.
    Within its confines, communication channels hum with political intrigue, as the
    starship's crew maneuvers carefully to interpret and respond to Ligonian demands.
  location_type: Orbital Space Station
