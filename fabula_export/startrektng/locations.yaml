  global_id: ger_location_69377bbb5179
  canonical_name: Gantol Excavations
  description: Ensign Janklow departs for the Gantol excavations on temporary assignment,
    leaving his puppy Henry behind in Amanda Rogers' quarters aboard the Enterprise-D.
    This off-ship site pulls crew members into fieldwork amid planetary digs—dusty
    trenches, heavy equipment hum, and the sharp scent of turned soil—disrupting routines
    and sparking small acts of care like pet-sitting. The location underscores shipboard
    life's fragility against distant missions.
  location_type: Planetary Excavation Site
