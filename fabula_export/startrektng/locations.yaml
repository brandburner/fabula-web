  canonical_name: Planet within the DMZ
  description: Ships approach this planet in the Demilitarized Zone, its surface pocked
    with craters and blast scars from endless skirmishes. Orbit swarms with wrecked
    hulls and garbled signals, marking a no-man's-land beyond Federation reach. Cameras
    hold on the battered world to spotlight the Maquis stronghold, where Ro Laren
    plunges into undercover operations amid volatile tensions that threaten all-out
    war.
