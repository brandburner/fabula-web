  canonical_name: Deuterium Control Conduit
  description: A narrow, metallic conduit embedded in Main Engineering's guts, the
    Deuterium Control Conduit channels fuel lines and diagnostic access points beneath
    warm console glow. Cool duranium surfaces hum with ionized breath; fiber‑optic
    ports glitter like nervous synapses. Technicians crouch at its lip to probe resonant
    fields, and a single misset instrument can spasm the whole system into alarm.
    It reads as both vital infrastructure and an intimate, tension‑charged workspace
    where small mistakes announce themselves as loud, shipwide warnings.
