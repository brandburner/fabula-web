  global_id: ger_location_55d9bc8adb33
  canonical_name: Underground Passageway Entrance
  description: A heavy locked metal door guards the shadowy entrance to the subterranean
    passage beneath Farpoint Station’s old city. Riker and Data force the door open
    amid looming ruins and a burning cityscape, the metallic barrier a stark threshold
    between exposed danger above and the unknown threat lurking below. The sudden
    phaser-like blast nearby shatters the fragile calm, casting flickering, ominous
    light on their determined faces. This entrance embodies a tense gateway into concealed,
    hostile depths, underscoring the away team's vulnerability and the escalating
    peril as they descend into the station’s dark underbelly.
