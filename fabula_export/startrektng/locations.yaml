- fabula_uuid: ger_location_91cef3d80f82
  global_id: ger_location_91cef3d80f82
  canonical_name: Main Shuttle Bay
  description: 'The Main Shuttle Bay yawns as a cavernous hangar aboard the starship,
    floodlights slicing through ionized air and the metallic tang of ozone. Landing
    clamps and gantries frame a central pad where an incoming captain''s shuttle must
    be locked down, checked, and cleared within a razor-thin window. Crew move with
    focused urgency—medical teams, security, and flight technicians—erecting quarantine
    barriers and readying docking mechanisms as a twelve‑minute ETA ticks down. Arrival
    here converts into immediate triage and custody: the bay is both waypoint and
    battleground where retrieval, containment, and the decision to launch away toward
    the Neutral Zone collide.'
  location_type: Starship Shuttle Bay
