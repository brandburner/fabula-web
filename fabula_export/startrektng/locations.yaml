  global_id: ger_location_56fa642945d4
  canonical_name: Promellian Asteroid Field
  description: Jagged rocks wheel in mute suspension beneath a pinprick sky as simulated
    debris tumbles past a fragile ship silhouette; the field reads as a hostile labyrinth
    engineered to punish proximity. Close encounters with tumbling planetoids trigger
    an ancient Promellian booby-trap that manifests as a sudden, searing radiation
    kill-beam. A calm computer voice punctuates each trial — 'deflector shield failure'
    — while an inexorable twenty-six minute countdown turns clinical simulation into
    immediate, bone-deep urgency. The environment feels cold, mechanical, and malevolent,
    alternately obeying and undermining calculation, forcing crews to test intuition
    against a trap that refuses consistent logic.
  location_type: Holodeck Simulation — Hazardous Asteroid Field
