  global_id: ger_location_2653ef2151e2
  canonical_name: House Courtyard (Gateway View)
  description: 'A compact, sunlit courtyard tucked within the walls of a modest house,
    framed by stone or low stucco parapet and planted with shadowed greenery. The
    scene reads as private and domestic: a flagged ground, a weathered threshold,
    the hush of laundry lines or a single fountain. When the Iconian aperture spins
    it into view, intimacy becomes spectacle—close textures and quiet human scale
    compressed into a brief, distant tableau that suggests cultural specificity and
    reachable worlds beyond the gateway.'
  location_type: Residential Courtyard
