  canonical_name: Penthara IV Underground CO2 Pockets
  description: Maps in Penthara IV's science lab crisis center mark three underground
    pockets holding trapped carbon dioxide beneath the planet's surface. Picard and
    Geordi plan to breach these reservoirs, releasing pressurized CO2 to form a greenhouse
    layer that captures the 20% sunlight piercing thick dust clouds and 12-kilometer
    cloud cover. Frozen rivers in New Seattle underscore the stakes; these hidden
    pockets carry the weight of moral paradox for scientists like Moseley, who fought
    such gases for decades. Pressurized depths promise heat amid encroaching ice,
    driving the crew's urgent intervention.
  location_type: Subterranean Gas Reservoirs
