- fabula_uuid: ger_location_cd5412de7c69
  global_id: ger_location_cd5412de7c69
  canonical_name: Crusher's Lab
  description: 'Sickbay: the Enterprise''s medical laboratory where Dr. Beverly Crusher
    works. This clinical nerve center hums with diagnostic urgency — narrow benches
    host centrifuges, assay readers, stacked sample trays and diagnostic scanners
    while holo-screens scroll genome alignments and ribosomal-compatibility matrices.
    The air carries a sharp mix of antiseptic and warmed metal as technicians route
    specimens, annotate prelim results, and flag mismatches. The space also reads
    as a private, late-night study/work nook: cluttered desks, personal effects, and
    evidence of private experiments (e.g., Wesley Crusher''s nanite work) combine
    with formal diagnostic work to convert molecular data into shipwide command decisions.'
  location_type: Medical Research Laboratory
