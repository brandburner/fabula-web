  global_id: ger_location_e60df53d7ec7
  canonical_name: C Deck
  description: C Deck hums with the low, rhythmic pulse of the Enterprise's operational
    systems—a transitional artery where personnel traverse between duty stations and
    personal quarters. Its corridors, lined with soft illumination panels, echo with
    distant footsteps and the occasional murmur of passing crew members. Strategic
    intersections like this serve as covert meeting points, where rogue captains like
    Okona leverage fleeting privacy to orchestrate ambiguous rendezvous. The deck's
    functional neutrality—free from the scrutiny of command centers or the bustle
    of recreational areas—makes it an ideal nexus for exchanges that blur the lines
    between diplomacy and deception. Here, characters slip between roles as easily
    as turbolift doors part, embodying the Enterprise's capacity to harbor both protocol
    and subterfuge beneath its seamless exterior.
