    hub with busy docking rings, stacked cargo berths, and quick-turn logistics. The
    air carries a faint tang of recycled atmosphere and packaged food stores; clerks
    and cargo techs move with efficient purpose. In the episode, the base exists narratively
    as the provenance of scarce culinary goods, anchoring Riker’s small domestic ritual
