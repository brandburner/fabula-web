- fabula_uuid: ger_location_0f0b9a28685b
  global_id: ger_location_0f0b9a28685b
  canonical_name: Deep Space Near the Enterprise (Probe Tether)
  description: 'Stars speckle the black void close to the USS Enterprise''s hull,
    where an alien probe holds position despite the ship''s evasive maneuvers. A narrow
    nucleonic beam locks onto Captain Picard, forming an unbreakable tether the probe
    adjusts to match every course change. Bridge viewscreens capture the standoff:
    the Enterprise pulls away at impulse, but the probe shadows relentlessly, its
    silent presence driving hyperactive fibrogenic activity and neurotransmitter surges
    in Picard. Crew scans reveal no trauma, only cellular rewriting, turning the empty
    expanse into a zone of inescapable biological claim and mounting dread.'
  location_type: Deep Space Near Starship
