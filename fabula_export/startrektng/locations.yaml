  global_id: ger_location_e8ef5d2b7225
  canonical_name: USS Enterprise Orbit Around Mintaka Three
  description: A bronze‑age world of wind‑whitened bluffs and a small, clustered community
    centered on a ceremonial Assembly Hall. Scientists operate a covert anthropological
    observation outpost here — a camouflaged ‘duck blind’ carved into a cliff that
    projects holographic rock to conceal a metal observation port. Sparks and blue
    arcs from a reactor failure rip open that camouflage, ejecting an injured native
    onto a narrow ledge and turning private fieldwork into a public miracle. The planet
    vibrates with urgent rescue efforts, ethical fury in Sickbay, and the slow, devastating
    creep of religious fervor as a healed man’s return ignites worship and cultural
    contamination across the settlement.
