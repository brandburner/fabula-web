  description: The Holding Area crushes survivors into a cramped, claustrophobic enclosure
    thick with tension and despair. Dim lighting and sparse furnishings amplify the
    sense of confinement as prisoners await execution, their fates entangled in a
    brutal cultural clash. The air pulses with raw emotion—defiant resistance, moral
    quandaries, and desperate hope collide as Commander Riker’s team confronts Ramsey
    and his followers. This space becomes a crucible where duty, ideology, and survival
    fracture, setting the stage for forcible extraction amid the heavy weight of impending
    death and contested autonomy.
