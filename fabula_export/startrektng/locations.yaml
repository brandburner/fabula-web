  global_id: ger_location_bbf10a9e9ffd
  canonical_name: Enterprise Containment Laboratory
  description: Behind triple-redundant force fields that crackle with barely contained
    energy, the Enterprise's specialized plague containment laboratory stands as humanity's
    final fortress against microscopic annihilation. Lethal specimens rest in crystalline
    stasis, their lethality contained by technology that pulses with calculated precision.
    The air itself seems to vibrate with the weight of 21 million phantom fever dreams
    pressing close against invisible barriers. This is no ordinary medical space —
    steel tables gleam under harsh containment lighting that never dims, auto-sterilization
    protocols hiss through hidden vents with mechanical finality, and every surface
    bears the invisible residue of protocols written in death's own hand. Here, salvation
    for a civilization balances on the edge of sealed containers no larger than a
    human fist.
  location_type: Starship Bio-Containment Laboratory
