  global_id: ger_location_a4cb826258d7
  canonical_name: Sector Four-Eight-Seven
  description: 'Sector Four-Eight-Seven registers as a sterile set of coordinates
    spoken into the captain''s log, a cold navigational anchor that flattens emotion
    into procedure. The designation offers no physical landmarks—only telemetry, clipped
    routine, and the ship''s soft hum—while it frames the corridor''s sudden human
    crises: an absent commander, a crew scrambling, and Data''s private project exposed
    under institutional light. The sector functions as a bureaucratic and tactical
    horizon, converting personal urgency into mission context and elevating stakes
    through clinical distance.'
