  global_id: ger_location_1af40a72fd6a
  canonical_name: Section 18-Gamma-12
  description: Section 18-Gamma-12 marks a precise docking zone amid the Romulan junkyard's
    drifting wreckage. Decaying ship hulls crowd the coordinates where the T’Pau last
    logged position, drawing the Enterprise through cluttered debris. Dokachin, the
    Zakdorn quartermaster, guards access to these restricted files, underscoring the
    area's isolation and bureaucratic oversight. Crew plot a course into this silent,
    hazard-filled expanse, tension building as they approach the forsaken dock amid
    echoing voids and faint technological decay.
