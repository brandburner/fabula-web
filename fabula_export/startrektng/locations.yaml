- fabula_uuid: ger_location_71c0f5372a76
  global_id: ger_location_71c0f5372a76
  canonical_name: Rachelis System
  description: Rachelis System sprawls as a vast constellation of civilization drowning
    in its own biological nightmare. Twin suns pulse like infected wounds in the void
    while orbital paths swarm with worlds that once teemed with billions. Now death
    coils through every corridor of this densely populated expanse, a plasma plague
    that burns like starfire through populations once counted in trillions. The system
    itself has become patient zero for cosmic tragedy—every communication channel
    screams with the digital wailing of a civilization in freefall, every planetary
    defense grid flickers as medical infrastructure collapses under the weight of
    impossible demand. This is not merely infected space; this is the living graveyard
    of an entire interstellar civilization, where the Enterprise's cargo deck five
    transforms into humanity's last bridge to salvation.
  location_type: Star System
  parent_location_uuid: null
