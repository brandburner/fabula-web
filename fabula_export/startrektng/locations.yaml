  global_id: ger_location_51e3447368a6
  canonical_name: Surface of Tau Cygna Five
  description: Tau Cygna Five arrives as a tense, wind-swept world scarred by daily
    survival and stubborn pride. The planet hosts a compact human colony of roughly
    fifteen thousand souls clustered around stone-built homes, hand-hewn furniture,
    and communal aqueducts whose water functions as a sacred emblem. Sensors warn
    of lethal hyperonic radiation bathing the surface while the viewscreen broadcasts
    a cold Sheliak treaty demanding human removal. Orbit bristles with Starfleet urgency
    as shuttles stage at a landing site, leaders argue on main streets, and android
    and human emissaries race to convert logic into rescue before an inexorable deadline.
