  canonical_name: Romulan Base
  description: 'A cold, strategic stronghold that looms beyond sight—a sealed Romulan
    installation scheduled to come online in twenty‑one hours. The base exists as
    a political fuse: its silent infrastructure and hidden defenses convert rumor
    into an urgent deadline, compressing diplomatic calculations into raw pressure.
    Hushed reports and tense pacing in Setal’s guest quarters turn the base into an
