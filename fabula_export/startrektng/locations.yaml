- fabula_uuid: ger_location_aaef638596ca
  global_id: ger_location_aaef638596ca
  canonical_name: Enterprise‑C Bridge Emergency Exit
  description: A narrow, battle-scarred egress cutting through the aft bulkhead of
    the Enterprise‑C bridge, the emergency exit gapes like a wound amid shattered
    consoles and smoking circuitry. Fluorescent emergency strips gutter along the
    ceiling; scorched handrails sweat with the heat of recent overloads. Voices ricochet
    down the short corridor as crew shove past collapsed panels toward Engineering;
    the air tastes of ozone, burnt insulation, and antiseptic fear. Functioning as
    an urgent lifeline, the passage funnels panicked movement, triage traffic, and
    a fragile command succession from the ruined bridge to the ship’s technical heart.
  location_type: Bridge Emergency Egress Corridor
