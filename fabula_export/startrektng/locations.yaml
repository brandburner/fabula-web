- fabula_uuid: ger_location_f134fdf6e4bd
  global_id: ger_location_f134fdf6e4bd
  canonical_name: Planetary Axis (Axial Tilt)
  description: 'A planet’s tilted spine drives merciless climate swings: seasons vault
    into extremes, storms rage from unexpected directions, and weather behaves like
    a politicized force. Wind hammers fortress walls, sleet digs into ceremonial banners,
    and lightning braids across a sky that never settles. Characters feel the planet’s
    mood in their bones—honor and danger sharpen under a sky that punishes indecision.
    The axial tilt operates as an unseen architect of tension, making terrain and
    weather active participants in every confrontation and ritual.'
  location_type: Planetary Geophysical Feature
  parent_location_uuid: null
