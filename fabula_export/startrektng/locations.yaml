- fabula_uuid: ger_location_35e06be42e22
  global_id: ger_location_35e06be42e22
  canonical_name: Derelict Small Control Area
  description: 'A cramped, late‑twentieth‑century control room aboard a derelict vessel,
    air thin with a metallic tang and minimal oxygen that presses at the throat. Low
    consoles crowd the space, analog dials and an ancient solar generator hissing
    beneath a faint, persistent hum while the ship’s computers sit dead and mute.
    A sealed sliding hatch and legacy disk drive anchor tactile, forensic work: hands
    pry, levers yield, a careful physical download replaces brute force. The room
    vibrates with urgent pressure — a twelve‑minute shuttle ETA — and the clash between
    preservation and force sharpens every movement and decision.'
  location_type: Derelict Control Room
