- fabula_uuid: ger_location_28aa55b2563a
  global_id: ger_location_28aa55b2563a
  canonical_name: Sigma Erani System
  description: Fajo names Sigma Erani System the Enterprise crew's only fallback for
    hytritium after his own depleted stocks. Three weeks of starship travel separate
    the bridge from this remote stellar cluster, where deposits exist but prove unreliable—yields
    sporadic, extraction risky, and logistics strained by isolation. Picard weighs
    the detour's cost against Data's abduction and the ship's urgent fuel needs, the
    system's distance amplifying the crew's tension during Fajo's interrogation. Debris
    from the staged shuttle explosion drifts on the viewscreen as voices debate this
    hazy prospect, its promise dimmed by doubt and delay.
  location_type: Star System
  parent_location_uuid: null
