  canonical_name: Kahlest's Home (Klingon Homeworld)
  description: 'A small, dimly lit Klingon dwelling that presses intimacy against
    grief: low, comfortable furnishings sit beneath shadowed rafters, woven tapestries
    mute wind and rain beyond thin walls, and the air carries the metallic tang of
    old smoke and salt. The room holds memory like a wound—photographs, ritual tokens,
    and a single chair cradling a broken survivor. Conversation compresses into whispered,
    jagged exchanges; sorrow hangs heavy enough to change breath. Narratively this
    private house functions as a confessional and a political bottleneck, where testimony
    might save a life but trauma clamps the throat.'
  location_type: Private Klingon Dwelling
