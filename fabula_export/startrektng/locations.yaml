  canonical_name: Historical Courthouse (Penthor‑Mul Trial)
  description: 'A weathered civic courthouse caught in a reconstructed archival photograph:
    dignified stone steps rise to fluted columns and a shadowed lintel, while a narrow
    procession threads through a tense public threshold. The frame freezes uniforms,
    chained hands, and the dragged dignity of an accused as witnesses crowd the periphery.
    Light and grain of the image compress time, turning architectural detail into
    evidence—a civic stage where verdicts once translated into clan destinies and
    a single trial now fuels decades‑old vengeance and political rupture.'
