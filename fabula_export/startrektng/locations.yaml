  global_id: ger_location_b78a792211ca
  canonical_name: Holodeck — Space Station Guest Quarters (Space Station Simulation)
  description: 'A simulated private guest cabin projected within the space-station
    holodeck: narrow bed and sealed/latched door, draped windows or engineered walls,
    soft synthetic fabrics and staged household clutter, low amber or lamp lighting,
    and the faint electrical/mechanical hum of the program. Synthetic perfume and
    an unnerving clarity of frozen gesture fill the room. The cramped floorplan creates
    claustrophobic proximity; narratively the space functions as Manua’s sanctuary
    and the location of a contested assault reconstruction—Picard inspects a frozen
    holographic tableau (fabric clutched, pleading face suspended) that turns the
    suite into an evidentiary theater where memory, perception, and constructed simulation
    collide.'
