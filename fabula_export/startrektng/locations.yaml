- fabula_uuid: ger_location_230be6222c01
  global_id: ger_location_230be6222c01
  canonical_name: Tanugan Research Station (Holodeck Simulation)
  description: 'A forensic reconstruction of the Tanugan research station rises inside
    the Holodeck: scarred bulkheads, damp laboratory bays, and a battered observation
    dome rendered with clinical precision. Synthetic air carries a faint tang of ozone;
    seam-lines and floor grid occasionally betray the illusion. Lighting cuts like
    evidence, exposing scorch patterns and instrument arrays while the set’s controlled
    acoustics amplify testimony and silence alike. The space functions as an evidentiary
    theater—designed for walk‑through depositions, meticulous cross‑examination of
    traces, and the cold conversion of memory into demonstrable fact, where personal
    loyalty confronts mechanical proof.'
