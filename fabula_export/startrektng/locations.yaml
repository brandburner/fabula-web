- fabula_uuid: ger_location_e6603d16cde4
  global_id: ger_location_e6603d16cde4
  canonical_name: Promellian Cruiser
  description: 'A weathered, ancient Promellian cruiser drifts as a sealed repository
    of bygone engineering and quiet menace. Metal hulls hold a museum‑still silence;
    Picard regards the vessel like a ship‑in‑a‑bottle, admiration flickering across
    his face while sensors report a breathable atmosphere and antiquated systems.
    The cruiser reads as both relic and trap: an outwardly intact derelict whose antiquity
    infects nearby transporters, producing a faint brownout that turns curiosity into
    caution. Its air tastes stale, its passageways promise discovery and danger, and
    its presence transforms an ordinary away mission into an excavation of memory
    and hidden hazard.'
  location_type: Derelict Promellian Starship (Cruiser)
