  global_id: ger_location_e8b54855dd73
  canonical_name: Romulan Office
  description: Proconsul Neral's spacious Romulan office on Romulus boasts clean lines
    and orderly design that project authority and power. Computer panels and terminals
    line the walls, joined by chairs, a central desk for cover, and a holographic
    emitter. Hidden compartments and passages in the walls conceal escapes and ambushes,
    with an underground exit to the east. The room hosts diplomatic meetings laced
    with deception, invasion plot revelations, tense standoffs with Sela, holographic
    activations, and Spock's broadcast exposing the conspiracy.
