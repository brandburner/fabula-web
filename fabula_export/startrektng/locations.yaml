  description: Enterprise holds position directly above this silent world, sensors
    sweeping its barren surface amid the dark sprawl of Mar Oscura nebula. No life
    signs flicker on readouts, no anomalies disrupt the void—Riker confirms clean
    scans as crew huddles at science station, tension building despite the planet's
    inert readings. Nebula's shadow looms through viewscreens, framing a deceptively
    calm celestial body that belies shipboard threats.
