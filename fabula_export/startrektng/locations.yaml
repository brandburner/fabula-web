  description: 'Federation prison holding Ensign Ro in disciplinary confinement before
    her Enterprise assignment. Admiral Kennelly visited her there to pitch the covert
    mission: arm Bajoran militant Orta with Starfleet weapons and ships to curb terrorism.
    Amid locked cells and guarded isolation, this encounter ignited Ro''s conflicted
