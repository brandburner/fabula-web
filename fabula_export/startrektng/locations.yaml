- fabula_uuid: ger_location_710ce56719e6
  global_id: ger_location_710ce56719e6
  canonical_name: Acamarian Outpost
  description: 'Wind-driven dust scours low concrete and metal bunkers on Acamar''s
    periphery; scorched plating and pitted blast doors tilt beneath a bruised sky.
    Narrow service corridors open onto a central compound of guard towers, a landing
    pad scarred by burn patterns, and a ring of sealed holding cells whose locks bear
    the heat of improvised breaches. Flickering terminals keep brittle logs and archived
    manifests—photographs, custody records, and quarantine tags—that trace a single
    violent moment: the Gatherer raid that seized Penthor‑Mul. The outpost feels like
    a preserved wound: institutional order interrupted by sudden brutality, where
    archival detritus and forensic traces turn place into evidence and memory into
    accusation.'
  location_type: Planetary Security Outpost
