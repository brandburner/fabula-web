- fabula_uuid: ger_location_63dcf01de5cd
  global_id: ger_location_63dcf01de5cd
  canonical_name: Federation Flagship
  description: The starship hums with ordinary life — a social deck's low murmur,
    the clink of glass, and the soft warmth of conversation — until propulsion sings
    and everything tightens to a wire. Warp vibrations thrum through bulkheads; consoles
    flicker as the ship lurches and then shudders out of warp. A jagged temporal rift
    yawns forward, colors and geometry tearing the viewspace into screaming light.
    Alarms braid with stunned silence, crews bolt from intimate corners to the bridge,
    and private moments harden into urgent duty as command converts mundane comfort
    into immediate crisis.
  location_type: Federation Starship
