- fabula_uuid: ger_location_308cddb58f79
  global_id: ger_location_308cddb58f79
  canonical_name: Royale Casino Forecourt
  description: A narrow forecourt and curbside immediately outside the Royale Casino’s
    theatrical facade. Slick with reflected neon and passing headlights, the space
    smells faintly of engine exhaust, dust, and perfumed air; pavement carries notes
    of engine oil. Functioning as a liminal threshold, it reads staged and constraining
    rather than genuinely public — the supposed parking place for a car and the locale
    invoked to test whether the hotel’s inhabitants can cross into an external world.
    At night the neon wash and artificial color heighten the sense that arrival and
    departure are part of the casino’s performed architecture, making this forecourt
    a diagnostic point where freedom is either verified or revealed as illusory.
  location_type: Casino Entrance Forecourt
