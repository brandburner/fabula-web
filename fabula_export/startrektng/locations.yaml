  description: Enterprise holds orbit around this unnamed planet to beam aboard fragile
    Mikulak tissue samples, nitrogen-cooled and stacked on pallets in the cargo bay.
    Picard notes the position in his log amid standard operations. Samples trigger
    chaos—anti-grav failure crashes cargo, nitrogen leaks pose contamination risk—forcing
    Geordi and Riker to confront Barclay's lapses. Crew senses the distant world as
    mission waypoint turned liability, its biology fueling shipboard breakdowns and
    frayed trust. Orbit offers a stark sphere against the void, quiet origin of brewing
    crisis.
