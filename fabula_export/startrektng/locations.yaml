  canonical_name: Data's Library (Future Cambridge)
  description: Bookshelves line the spacious walls of Data's library, filled with
    volumes and academic awards. A roaring fire crackles in the hearth, casting warm
    light over lounging cats and scattered papers. The room evokes Sherlock Holmes'
    study, blending coziness with scholarly depth. Picard spills tea here amid pleas
    about temporal shifts; Data and Geordi debate his sanity; Riker appears on a viewscreen
    over the fireplace, refusing aid before they plot a medical ship infiltration.
    Tension mounts as the fire's glow clashes with escalating stakes.
