- fabula_uuid: ger_location_e17220472604
  global_id: ger_location_e17220472604
  canonical_name: Kamin Family Home (Ressik, Kataan)
  description: 'The Kamin family home in Ressik, Kataan—a modest dwelling that serves
    as the private core of Kamin and Eline''s life, as well as the domestic setting
    for their son Batai. The interior is a warm, enclosed space where tensions between
    family members (including Picard as Kamin) build and passions stir, contrasting
    with the open courtyard outside. Key narrative moments occur here: Eline''s refusal
    to join Picard at the administrator''s meeting, Batai''s flute-playing, and confrontations
    between family members. The home''s walls amplify the emotional and identity fractures
    within the family, with shadows and silence reflecting the strain of Picard''s
    divided loyalties and the fading world of Kataan.'
  location_type: Family Home
