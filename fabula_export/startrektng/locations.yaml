  description: Geordi pries open the doors and steps into the cramped, silent interior
    of the derelict shuttlecraft stolen by Mendez from the Aries. Dim emergency lights
    cast flickering shadows across abandoned consoles, scattered data pads, and empty
    crew stations. Stale air hangs heavy with metallic tang and chill desolation.
