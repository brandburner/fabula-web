  global_id: ger_location_d73d4757ba0b
  canonical_name: Nottingham
  description: Stone walls rise high around Nottingham Castle, Sir Guy of Gisburne's
    fortified stronghold in Q's simulated medieval England. Soldiers patrol its corridors
    and guard chambers like Maid Marian's, where Vash awaits execution at dawn. Picard
    targets it for a desperate rescue, but Q warns that entry demands blood. Guards
    burst into rooms at their commander's signal, capturing intruders amid shadowed
    stone and flickering torchlight. The castle pulses with menace as the heart of
    antagonism, forcing Picard to weigh crew safety against Vash's fate.
  location_type: Medieval Fortress Courtyard
