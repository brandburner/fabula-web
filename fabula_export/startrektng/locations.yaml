- fabula_uuid: ger_location_d268cb8253b6
  global_id: ger_location_d268cb8253b6
  canonical_name: Tagus III
  description: Tagus III (also referred to as 'Tagus Three') is an inhabited alien
    planet orbiting a star in Federation space. Its surface features ancient, sealed
    ruins that hold archaeological treasures of unknown origin, sparking significant
    interest among scientists and archaeologists. The native inhabitants, the Taguans,
    strictly bar outsiders from accessing these sites, creating diplomatic tensions.
    The planet serves as the host for the Federation Archaeology Council’s symposium,
    where Picard’s frustration with the restrictions clashes with his scientific curiosity.
    Q’s proposal for a clandestine visit to the planet further complicates the situation,
    testing Picard’s resolve to uphold Federation laws and ethical boundaries while
    grappling with the allure of its untouched mysteries.
  location_type: Inhabited Alien Planet
