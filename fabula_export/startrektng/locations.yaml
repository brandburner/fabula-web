- fabula_uuid: ger_location_0044d822ebbf
  global_id: ger_location_0044d822ebbf
  canonical_name: Peliar Zel's Alpha Moon
  description: Peliar Zel's Alpha Moon (also referred to as 'Peliar Zel Moon' in some
    contexts) is one of two major satellites orbiting the planet Peliar Zel, alongside
    Beta Moon. Its inhabitants engage in industrial processes that tap into the planet's
    magnetic field for energy, a practice that has poisoned Beta Moon's atmosphere
    and ecosystems, leading to accusations of ecological genocide. The moon serves
    as a base for hostile forces disrupting peace talks on the planet below, and its
    inhabitants are implicated in escalating tensions that threaten to ignite a full-scale
    war across the system. The *Enterprise* crew tracks a mysterious vessel retreating
    to this moon after it cripples Odan's shuttle, highlighting its role in the ongoing
    conflict. Armed forces mass on both Alpha and Beta Moons, with weapons hot in
    a standoff that diplomats like Odan desperately attempt to defuse before war erupts.
  location_type: Colonized Planetary Moon
