- fabula_uuid: ger_location_f93693b0295e
  global_id: ger_location_f93693b0295e
  canonical_name: Morgue
  description: Beverly Crusher steels herself in the morgue's sterile chill, approaching
    the steel slab draped with a sheet over Jack's corpse. Picard lingers nearby as
    she lifts the fabric, unleashing raw grief—until Jev strikes. His face superimposes
    on Jack's, voice mimics Picard's, warping the memory into grotesque invasion.
    Harsh overhead lights cast unforgiving shadows, isolating the emotional rupture
    amid clinical steel and echoing silence.
  location_type: Starship Morgue
