  global_id: ger_location_8a312f5f62c5
  canonical_name: USS Enterprise Tactical Withdrawal Point
  description: A tense, makeshift refuge aboard the USS Enterprise where the crew
    regroups after a strategic retreat. This space throbs with urgency and restrained
    desperation, as command members coordinate survival amid a viral outbreak that
    debilitates a third of the crew and an imminent Romulan advance. The atmosphere
    crackles with suspicion and fractured alliances, highlighted by sharp confrontations
    and the heavy weight of leadership decisions. It serves as a critical juncture
    in the ship’s layered conflict, embodying both the vulnerability and resilience
    of Starfleet’s resolve under siege.
