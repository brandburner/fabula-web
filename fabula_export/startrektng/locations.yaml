  global_id: ger_location_7980c8119dc3
  canonical_name: 'Crew Quarters #3'
  description: 'Geordi and Ro linger in this compact Enterprise-D crew quarters after
    their clash with Parem, exhaustion yielding a rare moment of connection—Ro murmurs
    ''Thanks,'' Geordi replies ''Any time.'' Data bursts in, scans detect heavy chroniton
    contamination, and he sprays the room with an anyon emitter, his precision shattering
    their fragile intimacy. Confinement heightens the clash: raw human relief against
    mechanical urgency, the air thick with unseen particles and unresolved sabotage
    threats.'
