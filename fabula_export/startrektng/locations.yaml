  canonical_name: Starboard Nacelle
  description: The Starboard Nacelle Control Room is a critical engineering space
    at the forward end of the USS Enterprise-D's starboard nacelle, accessed through
    narrow corridors. The room features consoles lining the walls, a central catwalk
    (accessed via ladder) spanning the space, and an observation window overlooking
    operations. A maintenance door opens to the plasma injector room, emitting an
    eerie blue glow and dissonant hum from the active plasma stream. This room was
    the site of Lieutenant Kwan's suicide, where Riker and Worf confronted him as
    he leapt through the forcefield. Deanna Troi investigated psychic disturbances
    here, experiencing a powerful empathic wave while climbing the ladder to the catwalk—raw
    panic and dread from the ship's buried trauma forced her to stumble back. The
    space amplifies anxiety, with stark lighting and technical hum underscoring the
    ship's buried trauma. Geordi, Data, and Nara also checked conduits in this area,
    some untouched since construction.
