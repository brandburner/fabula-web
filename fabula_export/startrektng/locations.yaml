  global_id: ger_location_605cbebe6f0f
  canonical_name: Radiation-Soaked Debris Field
  description: A remote expanse of twisted wreckage floating in cold black, the debris
    field crackles with a low, insistent radiation hum that eats at shields and siphons
    energy. Jagged hull fragments and scorched antennae scatter like teeth around
    hidden devices that generate the lethal field. Phaser beams collapse against the
    cloud, heat blooming then shuddering as power vanishes into metal. The place carries
    a metallic tang in sensors and a moral weight on commanders who gamble against
    its unseen traps.
