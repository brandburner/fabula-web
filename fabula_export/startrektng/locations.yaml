- fabula_uuid: ger_location_ff0c7821d8e0
  global_id: ger_location_ff0c7821d8e0
  canonical_name: Derelict Borg Vessel
  description: Metal ribs cradle row upon row of sealed stasis slots, each fitted
    with a slick arm‑rest interface that physically ties flesh to hull. Dim panels
    pulse with cold indicators and low electrical hum; narrow corridors braid outward
    from a central spine. The space feels sentient—an integrated network that routes
    power and command, detaches a drone to manipulate a control panel, then reseals
    it in sleep. The air carries a metallic tang of ozone and antiseptic; footsteps
    echo like trespass on living machinery. Clinical fascination collides with tactical
    alarm as explorers confront a ship that thinks, adapts, and can deploy pieces
    of itself.
  location_type: Borg Starship Interior
