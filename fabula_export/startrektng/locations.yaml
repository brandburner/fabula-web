  canonical_name: Galorndon Cave
  description: A wind-scarred, storm-swept shelter on Galorndon Core where overhanging
    rock and a narrow cave mouth form a cramped refuge from ionic storms. Hot stones
    hiss and grit clings to boots as charged particles and electromagnetic interference
    corrode gear and foul VISORs. The place functions as a transient refuge and tactical
    listening post — claustrophobic and elemental — where Geordi and a Romulan (Bochra)
    experience failing instruments, a faint neutrino beacon that could signal rescue,
    and enforced proximity that drives improvisation and uneasy alliance.
