  global_id: ger_location_0ea7267a5c99
  canonical_name: Parliament Conference Planet
  description: A neutral, austere planet designated as the official venue for diplomatic
    negotiations between deeply hostile delegations, specifically the Selay and Antican
    factions amid simmering hostility. The planet’s atmosphere vibrates with fragile
    hope and underlying tension as emissaries gather to resolve their bitter dispute.
    Its diplomatic chambers and conference zones stand as solemn arenas where peace
    balances precariously against entrenched animosities, demanding careful navigation
    and high-stakes mediation to avert open conflict. This charged diplomatic venue
    becomes the crucible where deep-seated animosities clash and fragile peace efforts
    hang by a thread, setting the stage for delicate balancing acts in interstellar
    diplomacy.
  location_type: Conference Planet
