  canonical_name: Storage Closet (Victorian Boarding House)
  description: Samuel Clemens cowers in this cramped storage closet inside the Victorian
    boarding house, gripping the stolen transceiver component from Data's time-shift
    device. Data and Guinan corner him here after the theft, their confrontation unfolding
    in tight shadows amid dusty shelves and forgotten clutter. The confined space
    traps Clemens's ragged breaths and amplifies his paranoia, faint gaslight from
    the hall seeping under the door as he faces exposure. Wooden walls creak under
    the boarding house's weight, turning the nook into a pressure cooker of suspicion
