  canonical_name: Enterprise-D Main Passageways
  description: Broad corridors connect the Enterprise-D's engineering, bridge, and
    lower decks, now hardened into defensive lines. Security teams under Worf's command
    line smooth bulkheads, phasers drawn beneath flashing yellow alert panels. Warp
    core hum vibrates through deck plates, mixing with distant klaxons and urgent
    footfalls. These strategic routes block Data's system manipulations, every hatch
    and junction a potential flashpoint in the fight to reclaim ship control before
    an unknown destination looms.
  location_type: Starship Main Passageways
