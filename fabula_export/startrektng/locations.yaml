- fabula_uuid: ger_location_2b68230bc7e5
  global_id: ger_location_2b68230bc7e5
  canonical_name: Upper Catwalk, Main Engineering
  description: 'A narrow grated walkway suspended high above Main Engineering''s guts,
    the Upper Catwalk rings the chamber that houses the warp systems. Railings rattle
    underfoot, fluorescent and emergency strobes fracture the air, and the tang of
    ozone and hot metal rides every breath. The space gives a vertiginous vantage
    into the reactor/warp throat: it''s simultaneously a maintenance thoroughfare
    and a precarious staging point. During the attack the catwalk transforms into
    a launch pad for sabotage—a cramped, exposed place where a tossed satchel charge
    can fall straight onto the warp chamber, alarms howl, sensors scramble, and urgency
    tightens every step.'
  location_type: Starship Engineering Catwalk
  parent_location_uuid: ger_location_c27e36bbf4af
