  canonical_name: Peliar Zel Beta Moon
  description: "\n  The **Peliar Zel Beta Moon** is a satellite of the Peliar Zel\
    \ system, facing ecological collapse due to **Alpha Moon's magnetic field harvesting**,\
    \ which poisons its atmosphere and ecosystems. The inhabitants accuse Alpha Moon\
    \ of **ecological genocide**, arming defenses in a standoff that risks **planetary\
    \ war**. The moon is a focal point of **Federation mediation efforts** due to\
    \ its fragile habitability and escalating hostilities.\n\n  **Narrative Context:**\n\
    \  - **Enterprise crew** tracks a strange vessel retreating to this moon after\
    \ it cripples Odan's shuttle in open space.\n  - The moon's inhabitants **base\
    \ attackers** disrupting peace talks on the planet below, fueling the conflict\
    \ that armed forces escalate.\n  - **Tension rises** as the crew observes the\
    \ vessel vanish toward the surface, with Riker's manual landing fight underscoring\
    \ the moon's role in endangering the mission and diplomats.\n  - The moon's **ecological\
    \ ruin** and **militarization** are central to the **Peliar Zel system's broader\
    \ crisis**, requiring urgent intervention.\n  "
