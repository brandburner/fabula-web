  global_id: ger_location_00759e7f23c7
  canonical_name: Hidden Cave
  description: Dissident operatives escort Picard and Data from Romulus's capital
    streets into this secluded cave, a shadowed refuge amid the city's metallic spires.
    Dim light seeps through narrow fissures, casting stark contrasts that sharpen
    Spock's cold emergence from the gloom. The tight confines force Picard face-to-face
    with betrayal's sting, amplifying raw tension in their fractured confrontation.
    Echoes of deception linger in the damp air, turning the space into a crucible
    for personal reckoning and mission pivot.
  location_type: Clandestine Cave Hideout
