- fabula_uuid: ger_location_72675f3770c1
  global_id: ger_location_72675f3770c1
  canonical_name: Enterprise Laboratory (Data's Lab)
  description: 'A compact, clinical laboratory aboard the Enterprise where cold circuitry
    meets intimate creation: a transfer cradle sits like an incubator, LEDs pulsing
    in synchronized rhythm while taped sensor patches map two nervous systems into
    one. Fluorescent strips throw even light across brushed metal benches, diagnostic
    consoles, and a cluster of instruments arrayed for a single, irreversible procedure.
    The room hums with power conversion and quiet ventilation; the procedure reads
    as parental ritual — Data''s careful ministrations, Picard''s soft-voiced log,
    and the looming threat of Starfleet authority fold technical precision into urgent
    emotion, making the space both cradle and tribunal.'
  location_type: Starship Scientific Laboratory
