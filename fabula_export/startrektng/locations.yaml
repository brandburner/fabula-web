  global_id: ger_location_be2800691c54
  canonical_name: Uxbridge House Kitchen
  description: 'A small, private kitchen attached to the Uxbridge living room, centered
    on a narrow cupboard that holds a tea service the inhabitants treat like ritual.
    The space registers ordinary gestures — reaching for a teapot, settling cups —
    that momentarily restore domestic routine amid visible ruin. The cupboard’s quiet
    utility anchors grief and stubborn refusal to leave: ordinary sounds and small
    motions collide with the larger wreckage just beyond the threshold, making the
    kitchen both refuge and emotional fulcrum.'
  location_type: Private Residential Kitchen
