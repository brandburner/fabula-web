  description: A **physical, interior nightclub** on the Klingon homeworld where Worf
    confronts Kurn amid Duras allies. Characterized by violent merriment, bloodwine,
    and gagh, it serves as the setting for Worf’s ambush and a key plot point in Episode
    S5E1 ('Redemption II'). Patrons include Klingon civilians and thugs; the space
    is **functional and interactive**.
