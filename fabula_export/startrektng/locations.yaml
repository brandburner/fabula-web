- fabula_uuid: ger_location_10fc5d06752c
  global_id: ger_location_10fc5d06752c
  canonical_name: Sonny's Quarters
  description: 'A narrow, well-worn starship cabin that radiates informal warmth and
    cramped intimacy. A battered guitar and replicated strings sit against a small
    bunk and a scatter of personal trinkets; the constant hum of the vessel underpins
    laughter, lessons, and late-night plans. Music—strummed, joking, teaching—collides
    with the ship''s clinical rhythms: a romulan quip cuts the levity, a bridge com
    call yanks occupants back to duty. The room functions as refuge and crucible,
    hosting party scheming, candid confession, cultural astonishment (a three-hundred-year
    reveal), and private interrogation of motive, all within a space that feels both
    cozy and easily ruptured.'
  location_type: Starship Private Quarters (Crew Cabin)
