- fabula_uuid: ger_location_a429f4f386b9
  global_id: ger_location_a429f4f386b9
  canonical_name: Captain's Dining Room, USS Enterprise-D
  description: A polished, formal dining chamber that functions as the ship’s ceremonial
    table and a crucible for diplomatic hospitality. Oak-toned panels and a long,
    varnished table catch the LCARS glow while plates of replicated fare and silverware
    reflect soft overhead light. The room smells faintly of synthesized roast and
    ambient cleaning agents; the ship’s low hum and distant corridor footsteps frame
    conversation. Intended as neutral social ground, the space tightens under cultural
    friction—barbed remarks, controlled smiles, and stiff politeness transform ceremonial
    ritual into a charged arena where honor, tolerance, and loyalty collide.
  location_type: Starship Captain's Dining Room
