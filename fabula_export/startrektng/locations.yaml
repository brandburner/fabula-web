  global_id: ger_location_ed193e919351
  canonical_name: Courtyard Fronting Kamin Home
  description: Night falls over the Kamin Courtyard, a quiet outdoor space bathed
    in starlight where Picard peers through his telescope, Eline emerges from the
    house with gentle chiding, and young Batai plays his flute. This intimate enclosure
    frames raw family exchanges—Picard's frustration with Batai's musical ambitions
    clashes against Eline's steady nudges toward acceptance—capturing domestic rhythms,
    generational rifts, and whispers of Kataan's decline in serene shadows.
  location_type: Residential Courtyard
