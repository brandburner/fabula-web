- fabula_uuid: ger_location_61cee406c505
  global_id: ger_location_61cee406c505
  canonical_name: Planetary Magnetic Pole
  description: 'A violent, invisible seam at a planet''s polar cap where magnetic
    flux bends space for sensors and instruments. Charged gusts rattle hull-mounted
    arrays, compasses twitch, and long-range scans smear into ghostly silhouettes.
    Tactical crews speak of it like a living blind spot: Riker''s Potemkin gambit
    deliberately plunges systems into shadow and parks the vessel over this pole so
    enemy sensors resolve nothing but noise. The pole functions as both natural anomaly
    and improvised theater for deception, its cold, humming presence turning deliberate
    power cuts into theatrical erasure and tactical advantage.'
  location_type: Planetary Magnetic Pole (Geographic Feature)
