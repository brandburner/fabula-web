  canonical_name: Runabout Living Quarter (Aft Section)
  description: The rear compartment of the runabout, designed for crew rest, meals,
    and informal briefings. Features a central table with chairs, beds along the bulkheads,
    and a general-use console. This is where the crew recovers from stress, monitors
    non-critical patients (e.g., the destabilizing alien), and discusses strategic
