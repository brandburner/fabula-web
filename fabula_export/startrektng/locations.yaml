  global_id: ger_location_62cf20beaeba
  canonical_name: New Jersey (22nd Century)
  description: Rasmussen directs his time-pod back to New Jersey in the 22nd century,
    his established base of operations. Stolen Enterprise items—tricorders, medical
    equipment, Geordi's visor, Ten Forward barware—head there for unpacking and exploitation.
    He schemes to dissect Data amid these spoils, harvesting android components to
    advance his failed inventions. The location anchors his avarice, a 22nd-century
    haven for temporal plunder where desperation drives moral collapse.
  location_type: 22nd-Century Earth State
