  global_id: ger_location_2f4e1fcf3211
  canonical_name: Planet Beldoron
  description: 'Gales and ionic storms buffet Beldoron''s surface, forcing radio blackouts
    and warping subspace signals as a thin, hostile atmosphere chews at sensors. The
    planet now functions as a desperate rescue theater: a stranded engineer calls
    out from below while command rigs a portable neutrino beacon that must punch through
    Galorndon Core’s storm-strewn skies. Wind-driven static, distant thunder, and
    the metallic tang of charged air frame each transmission; the world reads as both
    home to civilian life and an unforgiving stage where diplomacy, technical ingenuity,
    and the urgency of survival collide.'
  location_type: Inhabited Planet (Storm‑affected Planetary Surface)
