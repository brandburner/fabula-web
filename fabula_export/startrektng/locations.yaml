  description: 'Ancient Sakethan burial mounds on Calder Two shelter valuable relics
    beneath earthen rises, drawing mercenaries who brave a Starfleet outpost''s defenses:
    phaser banks, photon torpedoes, and jamming fields. Picard leverages his fabricated
    smuggler past here—claiming routes through dust-choked passages and wind-scoured
    hills—to push stealthy infiltration over Baran''s frontal assault, heightening
    the site''s aura of guarded antiquity and lethal risk.'
