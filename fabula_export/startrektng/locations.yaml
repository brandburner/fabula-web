- fabula_uuid: ger_location_1176a4a28628
  global_id: ger_location_1176a4a28628
  canonical_name: Ferengi Captain's Ready Room
  description: 'A compact, private ready room aboard a Ferengi vessel where DaiMon
    Goss appears on-screen to answer hails and deliver loud, accusatory broadcasts
    to the Enterprise. The space functions as both a command office and a small media
    stage: close quarters surrounding a desk and communications console, deliberately
    geared for rapid response and theatrical proclamation. Commerce‑inflected ornamentation
    and tactile surfaces likely mark the room, but its narrative role is clear—an
    enclosed locus for provocation, negotiation, and propagandistic performance that
    converts private command into public spectacle.'
