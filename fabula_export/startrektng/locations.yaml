  global_id: ger_location_4f04050ccecd
  canonical_name: Ramatis System with Ramatis Three
  description: The Ramatis star system, with planetary body Ramatis Three at its center,
    stands as a crucible of interstellar diplomacy under the Federation's mediation.
    The system hums with unseen historical tensions while Ramatis Three's copper-green
    atmosphere masks planetary-scale political fault lines—together forming a cosmic
    chessboard where fragile negotiations unfold between warring factions. From star
    anomalies casting orbital shadows to the planet's ceremonial veneer of conference
    facilities, this is neutral territory where every sensor sweep, transporter lock
    and handshake risks triggering catastrophic outcomes.
