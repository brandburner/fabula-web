- fabula_uuid: ger_location_1a7e8b16a539
  global_id: ger_location_1a7e8b16a539
  canonical_name: New Manhattan on Beth Delta-One
  description: 'New Manhattan on Beth Delta-One appears as an offered shore of possibility
    — a promised metropolis Stubbs dangles as reward and refuge. Glass spires and
    layered promenades glint against a distant sky; crowded avenues hum with commerce
    and private lives; the scent of street food and ionized air suggests planetary
    bustle. The name functions less as a mapped waypoint than as an emotional destination:
    a vivid, future-facing image that Troi can hold, a lure Stubbs uses to paper over
    his inner void while selling hope and belonging he cannot deliver.'
  location_type: Off-World Metropolis / Colony
