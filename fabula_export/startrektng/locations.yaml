  canonical_name: Shuttlecraft Cockpit
  description: The Shuttlecraft Cockpit crushes occupants within its tight confines,
    a claustrophobic cockpit bathed in the faint glow of failing controls. Tension
    thickens the stale recycled air as Jake wrestles with trembling hands over the
    flight instruments, each flicker of the dim console lights echoing his spiraling
    panic. The cramped space amplifies the emotional weight of rebellion and fear,
    where authority collides with defiance amid the jarring lurches that signal the
    shuttle's weakening power. This cockpit acts as a crucible of crisis—an intimate,
    volatile arena where personal turmoil and mechanical failure intersect, threatening
    to swallow Jake whole and summon the Enterprise crew into urgent rescue.
