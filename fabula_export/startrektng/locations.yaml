- fabula_uuid: ger_location_644d023e20d2
  global_id: ger_location_644d023e20d2
  canonical_name: Debriefing Room Raised Platform
  description: A low, centralized raised platform anchors the debriefing room, forcing
    all attention to its small, clinical stage. Hard lighting chisels faces while
    footsteps echo on surrounding flooring; voices sharpen as questions land. Chairs
    frame the platform in a tight semicircle, turning interrogation into performance
    and moral calculus into spectacle. Riker paces and punctures testimony from this
    focal point; Troi leans in to pry at motive. The platform compresses space and
    time, converting procedural formality into emotional pressure and compelling witnesses
    to reveal fracture lines under scrutiny.
