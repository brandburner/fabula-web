  description: Geordi's office anchors a quiet corner of the USS Enterprise-D's Engineering
    section. Geordi and Susanna hunch over a wall monitor reviewing Tarchannen III
    footage, consoles humming amid the warp core's distant thrum. Walls seal out main
    engineering's clamor, fostering focused analysis that turns desperate as Susanna
    fixates on the planet. Her trembling outburst and visible transformation—dark
    neck blotches, fused fingers—erupt here, shoving Geordi toward his own crisis
    while underscoring the room's pull for urgent, private breakdowns.
