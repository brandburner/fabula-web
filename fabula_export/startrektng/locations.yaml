  global_id: ger_location_4223006bf0c6
  canonical_name: Oceanus Four
  description: Oceanus Four pulls the Enterprise from deep-space discovery with Starfleet's
    urgent diplomatic mandate. Picard cuts the Phoenix Cluster survey from five weeks
    to two, thrusting Riker into oversight of crowded science teams racing against
    the clock. This distant world breeds operational friction on the bridge, where
    crew warmth over Wesley's arrival clashes with imposed haste, priming tension
    for crises ahead.
