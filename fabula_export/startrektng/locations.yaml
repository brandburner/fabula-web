  canonical_name: 1941 Dixon Hill Interrogation Room
  description: The 1941 Dixon Hill Interrogation Room glares with harsh white light
    that slices through thick cigarette smoke, suffocating the air with tension and
    menace. This oppressive chamber confines Captain Jean-Luc Picard under aggressive
    scrutiny, where Detective Bell's brutal questioning and physical intimidation
    threaten to unravel his psychological resilience. The room bristles with period-specific
    props and characters embodying the era's grim, no-nonsense justice system, while
    moments of reluctant empathy surface amid hostility. The confined, smoke-filled
    space traps illusion and reality in a deadly dance, a crucible of resistance,
    fear, and fragile alliances that pulse beneath the surface of this historic Holodeck
    simulation.
