  canonical_name: Generic Corridors and Interior Sections (USS Enterprise-D)
  description: Unnamed corridors and interior sections identified as prime hunting
    grounds for de-evolved Worf. These areas lack specific deck numbers but are critical
    to Worf’s movement toward Sickbay, where he targets Deanna Troi. The corridors
    are described generically with bulkheads, overhead panels, and deck plating, emphasizing
