  canonical_name: Brown Dwarf Stars
  description: 'Brown dwarf stars occupy the dim borderland between planets and true
    stars: cooling, emberlike objects with dense, metal-rich atmospheres that register
    unusual elemental fingerprints. Data invokes these failed stars to account for
    anomalous abundances, pointing to slow fusion processes and atmospheric chemistry
    that seed surrounding material. The concept reads as forensic astronomy—cold,
    precise, and quietly consequential—shifting a social parley into a probe of cosmic
    chemistry and suggesting distant, low-luminosity bodies can leave detectable,
    diagnostic traces on nearby matter.'
