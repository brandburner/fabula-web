  global_id: ger_location_0f1571474c0a
  canonical_name: Ops Station (USS Enterprise-D)
  description: Data mans the Ops station consoles on the USS Enterprise-D bridge,
    stepping in to replace an ensign amid humming LCARS panels and flickering sensor
    readouts. He detects an anomalous E-band energy fluctuation, pinpointing irregularities
    that alert Riker and the crew to hidden threats. Curved workstations hum with
    operational data, serving as the bridge's critical sensor hub vulnerable to infiltrations—Ardra
    once seized it in disguise, lounging to taunt Picard before vanishing, leaving
    the real ensign disoriented amid rising tension and crew shouts.
  location_type: Starship Operations Station
