  description: Riker pries open the air conditioning grate and slips into this narrow
    crawlspace with Ethan, its walls pressing close in total darkness. Heavy metals
    in the encasing rocks scramble Romulan sensors, granting temporary safety. The
    fugitives crouch amid the unyielding stone, breaths shallow, as Ethan whispers
