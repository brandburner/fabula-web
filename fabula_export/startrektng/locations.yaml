  description: Q walks this dimly lit corridor until the Q Shadow intercepts him,
    its shadowy form manifesting the Continuum's collective will. Distorted sepulchral
    voice demands progress on Amanda Rogers; Q deflects with vague claims of human
    cooperation and reduced need for termination. Isolation amplifies secrecy, tension
    coils in shadows, underscoring the Continuum's bureaucratic detachment—her fate
