- fabula_uuid: ger_location_bf96339cab63
  global_id: ger_location_bf96339cab63
  canonical_name: Boraal Two
  description: "\n        Boraal Two, a planet on the brink of atmospheric collapse\
    \ due to plasmonic reactions, serves as the primary setting for *Star Trek: TNG*\
    \ episode 'Homeward'. Its eroding atmosphere unleashes energy bursts that jolt\
    \ the orbiting USS Enterprise, while its surface hosts:\n        - **Boraalan\
    \ villages** facing extinction, targeted by Nikolai's desperate salvage efforts.\n\
    \        - **Caverns** emitting anomalous deflector shield signals (technology\
    \ beyond Boraalan capabilities), which draw Picard and Worf's investigation. These\
    \ caverns include:\n          - **Passageways**: Dark, rough-hewn tunnels where\
    \ Worf confronts Vorin and Kateras, and Nikolai is discovered. The passageways\
    \ are described as 'deep within a Boraalan cavern,' confirming their location\
    \ on the planet.\n        - An **observation post** (Nikolai's station), a planetary\
    \ outpost with an intact structure and active power grid, but no life signs. The\
    \ post's abandonment sharpens fears for Nikolai's fate amid the planet's collapse.\n\
    \        The planet's crisis forces the Enterprise crew to confront Prime Directive\
    \ violations, with Worf scanning for his brother amid fading signals. Boraal Two's\
    \ uninhabitability in 38 hours heightens the urgency of the ethical and survival\
    \ dilemmas.\n      "
  location_type: Pre-Warp Planet (Atmospheric Collapse)
  parent_location_uuid: null
  season_appearances:
  - 7
  local_uuids:
    1: location_dbd3f6ba83fd
  first_appearance_season: 7
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_location_96a532e135ea
  global_id: ger_location_96a532e135ea
  canonical_name: Boraalan Main Cavern
  description: "\n        Expansive cavern on Boraal Two where Worf and Nikolai enter\
    \ from a narrow passageway, joining the Boraalan clan gathered around a crackling\
    \ campfire. Flickering flames illuminate scattered supplies, bedding, and a natural\
    \ underground spring that pools nearby. Rock walls enclose the makeshift living\
    \ space, marked by signs of prolonged habitation. The Boraalans cluster in the\
    \ open area, watching intently as the brothers clash over Nikolai's deflector\
    \ shield and Prime Directive breach. This cavern is the **central gathering space**\
    \ for the Boraalan clan and is accessed via the **Passageway Leading to the Cavern**\
    \ (previously a separate entity, now merged as a sub-location).\n      "
  location_type: Subterranean Refugee Cavern
  parent_location_uuid: null
