- fabula_uuid: ger_location_af527ec3718c
  global_id: ger_location_af527ec3718c
  canonical_name: Beverly Crusher's Office
  description: 'A private, clinical consultation room that reads equal parts medical
    workspace and intimate confessional. Soft, indirect lighting cushions diagnostic
    instruments and a modest desk; two chairs face one another across a small table
    where papers or a cup of coffee might rest. Personal touches—framed certificates,
    a few domestic mementos—temper antiseptic order, while a low mechanical hum anchors
    the ship beyond the door. The space tightens emotional exposure: it invites practical
    counsel, forces admissions of vulnerability, and functions as a crucible where
    questions of parenting, sentience, and care harden into decisive, painful choices.'
  location_type: Starship Chief Medical Officer's Office
  parent_location_uuid: ger_location_2777d0cd1383
