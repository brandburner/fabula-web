  canonical_name: Accretion Disk — Center (Wormhole Emergence Zone)
  description: At the core of the accretion disk a three‑planar, reflective, half‑spherical
    wormhole blossoms like a soap bubble, refracting starfields into kaleidoscopic
    light. The anomaly consumes an Enterprise shuttle and a Ferengi pod in a relativistic
    plunge; telemetry and communications are torn into slowed, garbled fragments as
    severe Doppler shifts, relativistic skew, and energetic interference rend signals.
    The disk core registers as electrically tense on the ship's instruments (an ozone-tinged,
    dazzling, surgically dangerous locus), turning routine observation into an urgent
    survival crucible.
