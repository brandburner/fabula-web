  global_id: ger_location_32d774ebbcc6
  canonical_name: Armus Slime Opening
  description: A viscous, living orifice that yawns in the creature Armus’s membrane,
    this gelatinous opening pulses and yields like skin gone liquid. The air stinks
    faintly of burnt ozone as wet surface tension drags at flesh; Riker’s face smears
    against inner tissue while the mass emits a high, keening shriek. The opening
    functions as immediate danger and bargaining chip—an entrapment zone that swallows
    bodies whole, halts beam-up attempts, and transforms rescue into a moral and tactical
    standoff under crushing pressure and panic.
