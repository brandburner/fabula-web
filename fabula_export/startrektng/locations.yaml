- fabula_uuid: ger_location_0522173a3422
  global_id: ger_location_0522173a3422
  canonical_name: Caldos
  description: "\n  **Caldos** is a seismically restless planet with desert and coastal\
    \ expanses, its surface marked by unstable weather control systems and unnatural\
    \ storms. The planet's atmosphere is characterized by churning green skies, energy\
    \ beams, and supernatural-like phenomena that disrupt colonial life. Caldos holds\
    \ historical significance as the ancestral home of Beverly Crusher, where her\
    \ family once lived under the shadow of the Ronin figure. The planet's instability—including\
    \ tremors, humidity spikes, and power fluctuations—threatens the Federation colony's\
    \ fragile existence, as observed and analyzed by the *Enterprise* crew (Data,\
    \ Geordi La Forge) during their orbit. The colony's weather control substation,\
    \ plagued by a 22-year-old hidden flaw, is central to the planet's instability,\
    \ which manifests in unnatural storms and public disruptions (e.g., the caber\
    \ toss event). Caldos's skies and storms echo unresolved historical and supernatural\
    \ forces tied to its colonial legacy.\n  "
  location_type: Federation Planetary Colony
  parent_location_uuid: ger_location_0522173a3422
