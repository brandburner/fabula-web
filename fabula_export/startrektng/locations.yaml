  global_id: ger_location_67a65493bcc8
  canonical_name: Farpoint Shopping Mall
  description: Farpoint Shopping Mall reveals an airy, sunlit marketplace within Farpoint
    Station, alive with bustling shops, varied booths, and vibrant Bandi vendors.
    The space hums with a delicate balance of commerce and quiet intrigue, serving
    as the primary ground where the away team assembles and launches their investigation.
    Walkways stretch beneath a canopy blending Earthly and alien flora, setting a
    scene of tentative warmth shadowed by the station's deeper mysteries. The mall’s
    atmosphere pulses with subtle tension, framing the unfolding urgency as Riker
    coordinates teams amid this lively yet enigmatic commercial hub.
  location_type: Marketplace
