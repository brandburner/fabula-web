  description: A low-lit cluster of shelters pressed into the belly of a cavern, where
    muted lamps and occasional fires puncture the stone gloom. People move through
    routine—sentries, traders, technicians—while a suspected generator coughs somewhere
    beneath tarps and scavenged gear. Damp air carries metal and oil; echoes swallow
