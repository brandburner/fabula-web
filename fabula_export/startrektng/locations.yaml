  canonical_name: Deanna Troi’s Quarters (USS Enterprise-D)
  description: Troi jerks awake in her bed, drenched in sweat, chest heaving as she
    gasps for breath. Dim residential lighting bathes the compact space in soft glows
    from wall panels and bedside console. Starship bulkheads enclose this private
    sanctuary, where the hum of life support underscores her return from the hallucinatory
    void. Sweat-soaked sheets cling to her skin; the quarters anchor her amid psychic
