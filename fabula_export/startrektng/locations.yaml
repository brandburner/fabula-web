  global_id: ger_location_f264e98417b9
  canonical_name: Planet Haven
  description: Planet Haven hangs tranquil and radiant—a blue-green Class M world
    steeped in serene beauty and ancient mythic healing powers. Electorine Valeda
    Innis governs this Federation treaty-bound sanctuary, where peace and fragile
    hope linger beneath the looming shadow of a desperate Tarellian plague ship hurtling
    toward its orbit. The USS Enterprise maintains vigilant watch overhead, caught
    in the agonizing balance between protecting this innocent world and confronting
    a deadly biological threat. The planet embodies a poignant crossroads of faith,
    duty, and moral complexity, its calm surface masking the escalating tension and
    ethical storms unfolding in its celestial vicinity.
