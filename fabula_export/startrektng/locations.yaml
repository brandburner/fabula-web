  global_id: ger_location_ff9f611bab4d
  canonical_name: New Martim Vaz
  description: New Martim Vaz registers as an aquatic city on Earth whose municipal
    registries mark the Uxbridges as native-born and record their professions. The
    city's bureaucratic imprint—birth certificates, colony registries, occupational
    listings—provides the forensic vocabulary Data retrieves to convert a hopeful
    rescue into an investigation. Salt-tinged civic memory and layered harbor architecture
    imply a maritime civic identity; narratively, New Martim Vaz operates as the couple's
    origin, an archival anchor that supplies provenance, motive, and emotional context
    for the crew's inquiry.
  location_type: Aquatic City
