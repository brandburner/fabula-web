  description: 'Picard’s comm cuts through Ten Forward, announcing arrival at the
    Devidia system—the Enterprise''s urgent waypoint. Crew connects it to Data''s
    severed head unearthed in 19th-century Devidia, a nexus of temporal rifts where
    past events bleed into the present. Guinan''s haunted "Full circle" captures the
    system''s pull: a vast stellar void humming with predestined paradoxes, isolation
    amplifying dread as the crew braces for confrontation with time''s unbreakable
    loops.'
