- fabula_uuid: ger_location_e5dffbd9ec15
  global_id: ger_location_e5dffbd9ec15
  canonical_name: Ferengi Craft
  description: 'A lean, predatory Ferengi starship that drives the scene’s crisis:
    weapon-focused and relentless, it presses the Enterprise with a withering barrage
    while closing on the crippled Hathaway. Sensors register it as an aggressive silhouette
    cutting the void, engines humming a predatory thrum as distance collapses. The
    craft radiates tactical menace — shock of laser fire, intermittent cloak of evasive
    maneuvering, and the constant pressure that forces command into desperate moral
    and technical choices. Its presence converts abstract danger into an immediate
    countdown: forty lives hang in the balance as officers scramble for deception
    and last-ditch tactics.'
