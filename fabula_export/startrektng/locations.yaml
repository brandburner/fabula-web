  description: Enterprise and Gowron's ship drop into orbit around the Klingon planet,
    their hulls silhouetted against the curving horizon. Viewscreens capture the world's
    surface, site of the raging succession crisis. Crew scans readouts tracking political
    shifts below while Worf wrestles internal heritage conflicts. Vacuum silence envelops
    the stationary vessels, amplifying isolation as Klingon power plays and personal
    loyalties collide in high orbit.
