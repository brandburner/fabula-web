  description: Narrow passages twist through rocky walls in these claustrophobic moon
    caves, where the away team materializes into eerie quiet broken only by detected
    molecular traces and energy fluctuations. Shadows hide Bajoran terrorists who
    ambush Picard, Worf, Data, and Troi, binding them at phaser point. Later, the
    tense isolation hosts Orta's confrontation with Picard and Ro, his mechanical
    voice echoing accusations of betrayal amid the oppressive confinement.
