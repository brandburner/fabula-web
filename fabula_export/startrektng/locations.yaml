  description: Sunlight streams into this Spartan room, casting light on a raised
    bed where Sarek rests, his face turned toward the warmth. Sparse decor heightens
    the solemn intimacy as Picard confronts the dying Vulcan ambassador amid his emotional
    unraveling—tears on his face, oscillations between rage and despair. Perrin tends
