  global_id: ger_location_2c1fc68f9861
  canonical_name: Hidden Panel Exit (Kamin Household)
  description: Picard triggers this concealed metallic panel in the Kamin main room
    wall with a touch, sliding it open to reveal a narrow exit leading outside. Eline's
    urgent warnings echo in the tense hush as he steps forward, uniform hunt fueling
    his defiance. Dim threshold frames household boundary, cool air wafting from beyond
    while daylight filters through, turning the space into a pivot of rebellion against
    imposed identity. The exit embodies fragile agency, every stride risking the fabricated
    world's unraveling.
  location_type: Hidden Household Exit
