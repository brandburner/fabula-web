- fabula_uuid: ger_location_2ccb173e2080
  global_id: ger_location_2ccb173e2080
  canonical_name: Angosian Holding Cell
  description: A stark, heavily secured detention space within an Angosian custodial
    facility that functions as the intended destination for a politically fraught
    prisoner transfer. Fluorescent supervision lights wash coldly over metal grating
    and compact cell modules; biometric locks and transfer ports punctuate an otherwise
    clinical, bureaucratic corridor. The room hums with restraint protocols and diplomatic
    tension, a place where custody, legal authority, and international consequence
    converge—silent, watchful, and engineered to dehumanize the transferred subject.
  location_type: Planetary Detention Holding Cell
  parent_location_uuid: ger_location_c573cd5eceb0
