- fabula_uuid: ger_location_c06dc3ec3552
  global_id: ger_location_c06dc3ec3552
  canonical_name: Mintakan Karst Cavern Network
  description: 'Watercarved galleries coil beneath a thallium-streaked plateau, where
    narrow sinkholes drop into vaulting caverns threaded by subterranean rivers. The
    air tastes faintly metallic; sensor returns smear and intermittently vanish as
    bedrock and flooded passages mask life signs. Passageways fragment line-of-sight
    and scramble search patterns, turning any rescue into a maze of acoustic echoes
    and poisoned breath. For the crew, these caverns function as both refuge and threat:
    a plausible hiding place for a missing colleague and the site where medical urgency
    grinds against the danger of cultural contamination.'
  location_type: Planetary Karst Cavern Network
