  global_id: ger_location_982c7e8dba25
  canonical_name: Lava Cave of Kahless on Boreth
  description: A sacred lava cave on Boreth, revered as the site where Kahless first
    appeared according to Klingon sacred texts. The cave is characterized by its intense
    heat, smoke from a central fire pit, and flickering candles that illuminate ancient
    Klingon artifacts along its jagged walls. It serves as a ceremonial space where
    warriors like Worf, Koroth, Torin, and Divok endure rituals seeking visions of
    Kahless. The cave is a crucible for Klingon spirituality and prophetic visions,
    often referenced in debates about the supernatural origins of Kahless. Worf later
    douses the flames in disillusionment, marking the end of the ritual amid thickening
    ceremonial tension. The cave's fiery depths and isolation amplify its role in
    Klingon mythology and faith.
  location_type: Ceremonial Lava Cave
