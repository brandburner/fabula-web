  global_id: ger_location_4ab54964089e
  canonical_name: Psychotectic Treatment Quarters (J'naii)
  description: Guards seize Soren and drag her toward these stark quarters after Noor's
    order in the Civic Chamber. The space confines her for psychotectic treatment,
    a forced procedure to suppress her gender identity and enforce J'naii conformity.
    Clinical fixtures dominate—restraint tables, glowing neural interfaces, bare metallic
    walls echoing her pleas. Humming machinery underscores isolation, transforming
    personal struggle into institutionalized suppression amid the regime's unyielding
    grip.
