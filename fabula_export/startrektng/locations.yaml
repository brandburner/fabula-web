  global_id: ger_location_658d9a6ad19c
  canonical_name: Nearest Starbase
  description: 'A procedural Federation starbase that functions as the nearest promised
    refuge beyond the ship''s hull: docking rings yawn, berths await, and transfer
    protocols hum with offstage efficiency. Mentioned here as an off-ship deposit
    point for a dangerous, depowered passenger, it reads as a logistical horizon —
    a place of administrative triage, repair bays, and sterile holding areas. Under
    the pressure of a ticking catastrophe, the base embodies frustrating remoteness:
    practical in function but temporally distant, its promise of sanctuary heightening
    the crew''s urgency and moral calculus.'
  location_type: Federation Starbase
