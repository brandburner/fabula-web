- fabula_uuid: ger_location_3bc7d765bd2c
  global_id: ger_location_3bc7d765bd2c
  canonical_name: Gath Gal'thong
  description: 'Gath Gal''thong sits on Romulus as a jagged, volcanic landmark where
    the planet’s famed "firefalls" once streaked down black cliffs. Heat and light
    tumble in molten curtains; ash sifts into ravines and glassy rock sings under
    sudden gusts. The place tastes of iron and memory—its glare carving private maps
    into exiles’ imaginations. Characters summon Gath Gal''thong as a sensory shorthand
    for home: roaring cascades of flame, the sting of smoke, and a horizon that anchors
    longing and loss. In the episode it functions as an emotional anchor, a sensory
    locus for grief, exile, and the ache of returning.'
  location_type: Planetary Natural Landmark (Firefalls Site)
  parent_location_uuid: null
