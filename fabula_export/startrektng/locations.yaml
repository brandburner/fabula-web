  canonical_name: Underwater Base Three Miles Below Sea-Level
  description: A hidden, submerged fortress lying three miles beneath the ocean's
    surface, this underwater base serves as the mysterious cradle of the Tarellian
    ship’s origin. Shrouded in deep-sea darkness and isolation, its existence is unveiled
    only through Wyatt's unsettling knowledge, hinting at a secret locale beyond conventional
    reach. The base radiates an aura of alien enigma and latent dread, anchoring the
    Tarellians’ desperate plight deep beneath the waves and elevating the stakes of
    the unfolding biomedical crisis aboard the Enterprise.
