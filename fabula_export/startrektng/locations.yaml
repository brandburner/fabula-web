  global_id: ger_location_361b0a06a9d1
  canonical_name: Underground Exit (East of the Wing)
  description: Data identifies this preplanned tunnel east of the Romulan Office wing
    as the team's escape route. With security scanners disabled, he, Spock, and companions
    slip inside after neutralizing Sela. Narrow confines muffle their steps, dim lighting
    casts long shadows on rough walls. Confined air grows heavy with urgency as they
    hurry from pursuing guards, the path's secrecy shielding their flight from Romulan
    alarms and deception.
