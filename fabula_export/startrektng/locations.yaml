- fabula_uuid: ger_location_453b2539a268
  global_id: ger_location_453b2539a268
  canonical_name: Iconian Underground Power Core
  description: 'A buried, humming heart beneath the Iconian control complex, the Iconian
    Underground Power Core throbs with concentrated, alien energy. Closed vaults and
    shadowed conduits channel a low, resonant pulse that animates the console above—spinning
    gateways and sickly green beams erupt when the core surges. Characters feel heat
    at the edges of perception, smell ozone and taste static as lights spike and portaling
    fields flare. Its presence reads as both technological marvel and strategic weapon:
    unseen, immense, and capable of instant global transit or catastrophic discharge.'
  location_type: Subterranean Power Core Chamber
  parent_location_uuid: null
  season_appearances:
