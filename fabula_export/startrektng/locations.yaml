- fabula_uuid: ger_location_d118a407bab2
  global_id: ger_location_d118a407bab2
  canonical_name: Primary Lab
  description: The Primary Lab pulses with subdued urgency, a sterile yet vital scientific
    hub where teams labor under flickering monitor lights. Workstations cluttered
    with holographic projections and DNA sequencers hum with quiet intensity, each
    screen reflecting the exhaustion and determination of researchers racing against
    time. Stark overhead illumination casts blue-white pools across chrome surfaces,
    amplifying the clinical atmosphere where breakthroughs and desperation walk a
    thin line. This is Pulaski’s chosen battleground—where she defies physical collapse
    to wrestle with genetic calamity, her gaunt reflection ghosting across dormant
    equipment. The space thrums with unspoken tension between containment protocols
    and scientific defiance, its very air charged with the weight of life-and-death
    calculations.
