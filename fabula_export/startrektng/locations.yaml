  global_id: ger_location_f78aac16928c
  canonical_name: Foliage Area (Arboretum)
  description: Dense foliage edges the Arboretum pond, where a mysterious figure throws
    a stone that ripples the water and disrupts a spectral reflection. The shape vanishes
    into thick leaves and tangled branches, rustling faintly amid damp, murky air
    and dripping vines. Shadows deepen the eerie distortion, heightening tension as
    pursuers catch only fleeting glimpses in the gloom between idyllic memory and
    traumatic reality.
  location_type: Starship Arboretum Foliage
