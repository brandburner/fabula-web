  description: 'Starbase 153 (also referenced in sources as Starbase One Five Three)
    is a Federation orbital launch-and-transfer node: compact, high-security docking
    rings and launch/probe tubes sit in a low orbital ring; maintenance gantries and
    sealed transfer plates operate under stark task lighting and clipped procedural
    comms. The station smells of ionized coolant and recycled atmosphere; annunciators
    and hails use encrypted clearances while technicians move with efficient, bureaucratic
    precision. From this base a two-meter Class‑Eight probe is launched carrying a
    sealed envoy when no starship is available, giving the station an atmosphere of
