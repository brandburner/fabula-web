  canonical_name: Double-Star Crucible System
  description: A compact neutron star locked in a perilous gravitational duet with
    a swollen red giant, forming a double‑star crucible whose intense tidal fields
    and ionizing radiation both enable a once-in-a-lifetime neutronium experiment
    and place the Enterprise in immediate existential jeopardy. The pairing shudders
    under the ship's hull as gravity tugs and radiation hisses; sparks of stellar
    fire, drifting debris and plasma, and spiking instrument readouts create a claustrophobic,
    high-stakes arena demanding extreme navigation and ethical reckonings.
