- fabula_uuid: ger_location_8d4340af45d1
  global_id: ger_location_8d4340af45d1
  canonical_name: Second Planet, Vilmoran System (Barren Surface with Fossilized Seabed)
  description: |-
    The second planet in the Vilmoran System, initially registered by Data's sensors as lifeless and arid, later revealed to harbor remnants of vast prehistoric oceans and hidden life forms (e.g., fossilized lichen colonies). The barren, cracked surface—once thought sterile—conceals deep geological and biological secrets, prompting urgent investigation by the *Enterprise* crew. The planet's deceptive appearance (whitened, desolate) contrasts with its scientific significance, drawing Klingon and Cardassian rivals while heightening the mission's stakes. Key features include:
      - **Surface**: Cracked, dry, and whitened, with visible traces of a long-dead seabed.
      - **Subsurface**: Fossilized lichen colonies and other elusive life-form remnants, detectable only through refined scans.
      - **Narrative Role**: A tense discovery site for the *Enterprise* away team, symbolizing the tension between appearance and reality in exploration.
  location_type: Arid Extraterrestrial Planet
  parent_location_uuid: ger_location_8d4340af45d1
