  canonical_name: Dixon Hill's Waiting Room and Office
  description: The dimly lit, somewhat rundown office and waiting room of Dixon Hill's
    noir simulation envelops Picard in a shadowy, period-specific atmosphere. This
    space crackles with vintage tension as playful mockery from a secretary collides
    with the sudden gravity of a socialite's deadly plea. The room’s worn furnishings
    and muted lighting frame a crucible of period-specific intrigue, blending escapist
    charm with lurking menace, transforming the space into a crucible where lighthearted
    banter shatters into urgent intrigue, pulling Picard into a dangerous game beneath
