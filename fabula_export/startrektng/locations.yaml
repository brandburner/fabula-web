  canonical_name: Narendra Three (Klingon Outpost)
  description: 'Narendra Three (Klingon Outpost) occupies a contested frontier waypoint
    where a violent engagement left a battered Federation cruiser last seen in the
    past. Sensors register a ragged distress call, disrupted communications, and combat
    signatures from incoming Klingon battlecruisers. The outpost feels militarized
    and urgent: alarms stutter, tactical overlays flash contact vectors, and scorched
    structures and strewn debris mark a confrontation that reads as both casualty
    site and chronological pivot. The location carries the taste of sudden loss and
    wrenching ethical consequence, forcing choices between immediate rescue and preservation
    of history.'
