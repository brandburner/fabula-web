- fabula_uuid: ger_location_4daac244e2eb
  global_id: ger_location_4daac244e2eb
  canonical_name: Vico Research Vessel (Wreckage)
  description: 'The Vico Research Vessel, a scientific starship destroyed near the
    Black Cluster, serves as a critical narrative anchor for the episode. Its wreckage—scanned
    by the Enterprise crew from the Observation Lounge—reveals evidence of violent
    destruction (e.g., torn hull, explosive decompressions) and becomes a focal point
    for Picard’s decision to investigate the cluster. The vessel’s forensic diagram
    (displayed in Engineering) details the deaths of Timothy’s parents: his mother
    in the computer core and his father on the exposed bridge, emphasizing the Black
    Cluster’s lethality and the boy’s orphan trauma. The wreckage’s remnants symbolize
    the mission’s urgency and the unseen threat lurking in the cluster.'
  location_type: Wrecked Research Starship
