- fabula_uuid: ger_location_383644d3b210
  global_id: ger_location_383644d3b210
  canonical_name: Hidden Colony — Planet Surface and Subterranean Caverns
  description: A bleak planetary surface conceals a small, centuries‑isolated human
    settlement burrowed into a network of caverns roughly thirty meters below the
    crust. The exterior is wind‑scarred while the interior contains cramped, low‑lit
    tunnels and low‑ceiling chambers where roughly two hundred residents keep livestock
    (bleating goats, clucking chickens) and maintain ritual rhythms. The caverns smell
    of damp stone, animal musk, and smoke; the space rings with animal noises, shouted
    orders and the clang of hurried evacuation activity as transport teams attempt
    extraction. Sensors translate cold orbital metrics into chaotic human faces below,
    and the caverns serve as the pressured origin point for morally charged rescue
    interactions (e.g., negotiation scenes).
  location_type: Planetary Surface with Subterranean Caverns
