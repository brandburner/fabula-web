  global_id: ger_location_a14f92d93caa
  canonical_name: New Berlin Colony
  description: New Berlin Colony operates as a remote Federation outpost where settlers,
    haunted by Borg threats, mistake a Ferengi trading ship for danger and broadcast
    false distress calls. Crews scramble on red alert only to stand down, their failure
    to follow Starfleet protocols fueling Picard's frustration and crew exhaustion.
    This third false alarm in a day lays bare colonial paranoia and instability, as
    absent Borg activity breeds fractures that Picard's log entry captures in weary
    detail.
  location_type: Federation Planetary Colony
