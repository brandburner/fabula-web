  global_id: ger_location_666319611486
  canonical_name: Hospital (Tilonians' Neuro-Somatic Illusion)
  description: Riker perceives this hospital as a sterile trap during Tilonian abduction.
    His mind builds it to resist neuro-somatic extraction, forcing oscillation between
    clinical confines and *Enterprise* decks. Beeping monitors and guarded isolation
    heighten disorientation, blending recent memories of mission prep and Beverly's
    care into a defensive asylum. Troi later names it psychological shield, underscoring
    its role in Riker's fractured reality.
  location_type: Illusory Hospital Construct
