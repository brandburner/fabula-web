  episode_count: 0
- fabula_uuid: ger_location_63c3594ee2bf
  global_id: ger_location_63c3594ee2bf
  canonical_name: Iconian Gateway
  description: 'A cold, humming aperture etched into ancient stone and alien alloy,
    the Iconian Gateway yawns opposite the central console like a patient maw waiting
    to be forced shut. Electric filaments weave across its rim; a thick, ion-taste
    tang hangs in the air as cycles of light pulse toward ignition. The threshold
    compresses time: footsteps stutter, breath shortens, and decisions harden into
    action. Picard strides into the opening as Worf hauls a crippled, half‑blinded
    Data away, the portal functioning as both lifeline and executioner—an engineered
    corridor between the Iconian site and the Enterprise whose existence demands sacrifice
    and swift, brutal choices.'
  location_type: Interstellar Portal
  parent_location_uuid: ger_location_8b7e3f808738
  season_appearances:
  - 2
  local_uuids:
