  canonical_name: Samrin's Planet
  description: 'Samrin''s Planet functions as a charged mnemonic landscape invoked
    to fracture silence between Worf and K''Ehleyr. The name lands like a thrown gauntlet,
    summoning intimacy, rivalry, and the sharp echo of a first meeting — flirtation
    folded into history. Within the tactical room its mention behaves like a sensory
    cue: remembered laughter, clipped words, and the taste of unresolved attraction
    coalesce into emotional leverage that reshapes strategy and widens personal fault
    lines.'
