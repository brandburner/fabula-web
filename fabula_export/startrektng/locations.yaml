  description: Gowron and Worf stride onto the bridge amid shuddering impacts from
    Duras disruptors. Consoles spark and explode, killing the weapons officer; Worf
    claims the station to target attackers. First officer reports aft shields down,
    helmsman notes damaged warp coils. Crew shouts status updates as the deck pitches,
    red alerts flash, and smoke fills the air. Gowron barks for overrides from his
    command chair, Worf defies lock-on orders for manual fire, destroying one Bird
