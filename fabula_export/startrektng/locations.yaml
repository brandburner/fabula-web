  description: Planet Vagra Two looms as a bleak, uninhabited world, its barren surface
    a silent adversary as Shuttlecraft Thirteen spirals helplessly toward its gravity
    well. Devoid of life, its hostile terrain offers no refuge, transforming the planet
    into a looming specter of imminent disaster. The crushing silence of space is
    pierced only by frantic emergency transmissions, heightening the urgency and dread
    that grip the crew racing to avert catastrophe. This desolate planet serves as
    a crucible of tension, shaping the narrative into a desperate fight for survival
    amid cold cosmic isolation.
