- fabula_uuid: ger_location_b1d9ec7569db
  global_id: ger_location_b1d9ec7569db
  canonical_name: Ligos Seven
  description: "\n      Ligos Seven is a planet that serves as the catalyst for the\
    \ Enterprise's mission in *Rascals*. It is the origin of a severed Starfleet distress\
    \ signal, prompting the crew's urgent response. The planet is also the site of\
    \ treacherous Vendarite mines, where Ferengi forces enslave captured science teams\
    \ under brutal conditions, including cave-ins, toxic gases, and forced labor.\
    \ These mines are leveraged by Lurin to coerce Riker. The planet's dual role—both\
    \ as the distress signal's source and as a Ferengi-controlled mining operation—drives\
    \ the episode's central crisis, culminating in the Enterprise's confrontation\
    \ with the Ferengi and the crew's transformation near its surrounding space.\n\
    \      "
  location_type: Planet
