    a leaden sky. Wind scours ash across the cracked ground; distant, hollow echoes
    of past conflict hang in the air. The simulation feels angular and unforgiving,
    mapping physical violence onto private grief. K''Ehleyr steps into this space
    as a deliberate rite, turning personal fury into ritualized combat; the arena
    both contains and amplifies tension, forcing heritage, desire, and restraint into
