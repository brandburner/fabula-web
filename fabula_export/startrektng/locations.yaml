- fabula_uuid: ger_location_12d25a12e293
  global_id: ger_location_12d25a12e293
  canonical_name: Thirteen Federation Colonies (T'Ong Strike Zone)
  description: 'A dispersed ring of thirteen lightly defended Federation colonies,
    outposts and small orbital stations that sit within the T''Ong''s projected strike
    envelope. Individually thinly manned and isolated, collectively they appear as
    vulnerable nodes on tactical displays: cold beacons and faint telemetry, brittle
    sensor coverage, modest starports, and fragile civilian infrastructure. Their
    imminent peril provokes urgent moral and tactical debate aboard Starfleet vessels
    charged with deciding how to prioritize civilian rescue versus military action.'
  location_type: Federation Colonial Settlements
