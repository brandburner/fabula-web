  global_id: ger_location_3c6531bb9424
  canonical_name: Crab Nebula
  description: A vast, filament-laced interstellar cloud of gas and dust that reads
    as a remote, immutable yardstick on star charts. Cold light threads through tendrils
    of ionized matter, its distance measured in sterile numbers and logarithms during
    polite but weary conversation. The nebula functions less as a lived place and
    more as a mathematical anchor—an awe-inspiring, impersonal endpoint that flattens
    emotion into coordinates and buys time through technical abstraction.
  location_type: Interstellar Nebula
