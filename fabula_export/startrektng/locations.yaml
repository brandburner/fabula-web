- fabula_uuid: ger_location_ec973a278ac0
  global_id: ger_location_ec973a278ac0
  canonical_name: Mariposa Cloning Laboratory
  description: 'Consolidated description: A clinical, windowless planetary cloning
    research facility on Mariposa—bright, regimented bays and stainless cloning banks
    open onto floors of incubators, cryotanks and humming cloning rigs. Fluorescent
    overhead lights and cold chrome surfaces are punctuated by printed labels, sealed
    specimen canisters, and the faint ozone of sterilant; some areas smell of antiseptic
    and scorched circuitry where damaged apparatus sits. Incubation units contain
    pallid, half-formed replicas; missing equipment, ruined apparatus, and contested
    samples make the site both a production center and a contested evidence locker.
    The facility is the focal point of forced inspections, seizures, and cultural
    humiliation when outside authorities demand access to cloning equipment and allegedly
    stolen tissue.'
  location_type: Planetary Cloning Laboratory
  parent_location_uuid: null
