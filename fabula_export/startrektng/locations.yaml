  canonical_name: Vandor Corridor
  description: A dark, toxic corridor on the planet Vandor, saturated with hostile
    environmental hazards that force the away team to activate respirators immediately
    upon arrival. The corridor throbs with a pulsating violet light, signaling the
    unstable dimensional energy that courses through it. This narrow passage becomes
    a crucible of danger when a sudden, violent dimensional energy blast violently
    disrupts the team's cautious advance, hurling them off balance and underscoring
    the lethal automated defenses and altered planetary conditions. The oppressive
    atmosphere blends toxic air, eerie illumination, and unpredictable bursts of energy,
    marking this corridor as a perilous threshold between alien wilderness and Manheim’s
    concealed laboratory deep within Vandor's hostile terrain.
