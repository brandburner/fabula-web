  global_id: ger_location_f04712e3f66c
  canonical_name: Hastily Carved Stone Hollow on Data's Homeworld
  description: A small, rectangular depression carved into the barren rock of Data's
    desolate home planet, this hollow masquerades as a natural formation but reveals
    itself as a rushed concealment. It shelters the simple stone pallet where Data
    was first found, embodying the abrupt collapse of a lost colonist sanctuary. The
    raw, unpolished hollow stands as a grim monument to the vanished agricultural
    colony and the mysterious origins of Data, cloaked in quiet desolation and urgent
    secrecy amid the lifeless terrain. Also described as a stark, rectangular hollow
    chiselled into the lifeless rock surface, with subtle signs of artificial construction
    and a hidden entrance unveiled by Geordi La Forge, reflecting the colony's desperate
    attempt to mask their existence beneath the barren terrain.
  location_type: Concealed Natural Hollow
