- fabula_uuid: ger_location_91761abb2a74
  global_id: ger_location_91761abb2a74
  canonical_name: Lutan's Centerplace on Ligon
  description: Lutan's Centerplace on Ligon stands as a solemn, walled enclave where
    austere Zen-like minimalism meets the weight of ancient cultural symbolism. This
    sanded, enclosed arena functions as the sacred ritual ground for formal greetings,
    tense negotiations, and honor-bound ceremonies in Ligonian society. The space
    vibrates with a charged stillness, as rigid tradition and political maneuvering
    unfold beneath its ascetic surfaces. Here, Captain Picard confronts the brutal
    complexities of Ligonian customs and the deeply personal stakes surrounding Lieutenant
    Yar’s abduction, as negotiations teeter between diplomacy and deadly ritual.
  location_type: Ritual Meeting Place
