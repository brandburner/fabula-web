- fabula_uuid: ger_location_c449993e27b1
  global_id: ger_location_c449993e27b1
  canonical_name: Exterior Space Around the Mondor
  description: 'Cold vacuum frames the Mondor’s dark silhouette as a sudden, glitching
    feed throws its hull onto the viewscreen—an isolated target hung against indifferent
    starlight. A faint shimmer hints at an advanced shield; light skitters off plating
    while the vessel’s outline reads as both prize and prison. The brief exterior
    shot tightens the bridge’s claustrophobia: transmissions cut, the ship feels unreachable,
    and every pixel of the image underscores vulnerability. Sightlines convert technical
    failure into emotional isolation, turning a distant hull into the focal point
    of a desperate, jammed confrontation.'
  location_type: Immediate Exterior Space (Starship Vicinity)
