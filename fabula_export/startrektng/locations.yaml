  global_id: ger_location_39ef7b429a75
  canonical_name: Pearl Harbor
  description: Pearl Harbor registers as a charged historical harbor and memorial
    site whose name snaps conversation taut with memory of sudden attack, loss, and
    national trauma. In the bridge exchange it functions as a rhetorical landmark
    — a warning that rash reprisals can escalate into widescale war. The place conjures
    salt-stung air, smoke and wreckage, dawn interrupted by surprise, and the heavy
    moral calculus leaders carry afterward. Characters invoke it to temper impulse,
    to call for prudence, and to remind others of the costs when diplomacy fails.
  location_type: Historic Naval Base / Memorial Site
