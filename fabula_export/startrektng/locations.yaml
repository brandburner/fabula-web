- fabula_uuid: ger_location_f5611a666ab3
  global_id: ger_location_f5611a666ab3
  canonical_name: Destroyed Shop (Rutian Plaza)
  description: 'A sunlit urban civic square that snaps from routine bustle into violent
    disorder: vendors'' stalls and scattered tables ring an open paved expanse, now
    caked with dust, blood, and the acrid sting of an explosive blast. Shouts and
    sirens gouge the air while the metallic taste of smoke lingers. Crowds compress
    into panic, emergency crews and improvised triage cluster around the wounded,
    and a watchful waiter lingers at the perimeter like a silent witness. Political
    authority arrives in formal guards, tension collides with medical oath, and an
    impossible flash of light—an abduction—transforms the plaza from rescue locus
    into the epicenter of a diplomatic and technological crisis.'
  location_type: Market Shop (Urban Plaza) - Destroyed
