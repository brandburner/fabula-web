  canonical_name: Pastel Stucco Street with Iron Balconies (Iconian Gateway Projection)
  description: A sunlit, narrow street of warm pastel stucco facades and ornate iron
    balconies, presented as a fleeting projection through an Iconian gateway/aperture.
    Facades blur into motion, shutters flicker, and the lattice of balcony railings
    carves shadow across cobblestone—an intimate, Mediterranean‑flavored urban fragment
    (balcony plants, muffled footsteps, market murmur implied) that functions narratively
    as a concise, convincing proof that the gateways open onto lived worlds.
