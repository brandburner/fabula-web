- fabula_uuid: ger_location_1eba5074aab6
  global_id: ger_location_1eba5074aab6
  canonical_name: Mondor Bridge
  description: 'A cramped, utilitarian bridge crowded with mismatched consoles and
    crude readouts, the Mondor Bridge hums with a deceptive, sluggish confidence.
    Lamps strobe amber and red as the Pakleds fumble at sensors; a forward viewscreen
    frames the Enterprise like an accusing eye. The air tastes of recycled metal and
    engine warmth while harsh overhead lighting throws greedy shadows across cables
    and jury-rigged panels. The space functions as both command center and trap: it
    contains Grebnedlog and Reginod’s bluster, conceals a Romulan-grade shield and
    crude armed torpedoes, and becomes the claustrophobic arena where Geordi is stunned,
    held hostage, and forced into last-second sabotage amid a bath of crimson warning
    light.'
  location_type: Starship Bridge
