  global_id: ger_location_9aac6ada9ffe
  canonical_name: Genome Laboratory
  description: Hannah's Genome Laboratory hums with focused research on the stellar
    fragment. Workbenches hold Okudagrams, schematics, and analysis tools where she
    collaborates with Geordi. Consoles flicker with colony data as Conor introduces
    her to the away team. Hannah scrutinizes Geordi's VISOR, sparking curiosity. Troi
    remains after Riker departs, exchanging a tense glance with Conor in this hub
    of scientific defiance and emerging alliances.
  location_type: Colony Genome Laboratory
