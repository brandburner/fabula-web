- fabula_uuid: ger_location_40828c011f44
  global_id: ger_location_40828c011f44
  canonical_name: Solais Five
  description: Solais Five looms in the viewscreen, a planet scarred by conflict yet
    shimmering with fragile diplomatic potential. Warring factions exchange laser
    fire across its surface, each bolt etching fresh tensions into the thin veneer
    of cease-fire. Orbiting above, the USS Enterprise monitors escalating military
    activity with taut vigilance, its sensors tracking every breach of the uneasy
    truce. The planet's atmosphere churns with the residue of battle—ionized particles
    catching sunlight like fractured promises. Below, a neutral hilltop awaits the
    landing party, its precarious peace offering a stage for Riva's high-stakes mediation.
    Solais Five doesn't just host violence; it breathes it, the very air crackling
    with the weight of civilizations teetering between annihilation and accord.
  location_type: Diplomatic Crisis Planet
