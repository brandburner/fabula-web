- fabula_uuid: ger_location_d3749ca79893
  global_id: ger_location_d3749ca79893
  canonical_name: Surface of Nelvana Three
  description: 'The Surface of Nelvana Three stretches as a sterile, barren expanse:
    jagged rock, pale dust, and an absence of life that reads as blank on the ship''s
    scopes. Sensors return nothing but mineral silence while a probe above detects
    faint, patterned subspace emissions—an unsettling mismatch that sharpens suspicion.
    The terrain''s austerity becomes tactical cover; its flat emptiness could easily
    conceal buried installations, cloaked platforms, or diagnostic blind spots. The
    place operates as a narrative fulcrum: its apparent emptiness forces commanders
    to confront imperfect intelligence, converting geological silence into a menacing
    unknown that demands a costly choice.'
  location_type: Planetary Surface
  parent_location_uuid: null
