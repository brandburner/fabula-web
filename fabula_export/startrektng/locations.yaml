  global_id: ger_location_f32ceacac993
  canonical_name: Bandi City / Farpoint Old City / Covered Village Square
  description: Bandi City, also known as Farpoint Old City, including the Covered
    Village Square, represents an ancient urban settlement characterized by historic
    streets and battered structures. The Covered Village Square serves as a pivotal
    gateway and contested battleground within this venerable city, embodying the tension
    between tradition and external threat amid a brutal siege. This area reflects
    the raw tension, cultural resilience, and complex dilemmas faced by the Bandi
    people in collision with futuristic society, with strategic importance in Starfleet's
    maneuvers and the moral crises of Picard and his crew.
