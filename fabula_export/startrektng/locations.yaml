  description: A distant populated planet looms vulnerable in the black void of space,
    its surface home to billions threatened by a massive asteroid hurtling on collision
    course. The Enterprise fires photon torpedoes from nearby space to shatter or
    deflect the rock, the world's survival testing Picard's command amid shipboard
    crises. Stars frame the tense standoff, the silent expanse heightening stakes
    as explosions light the path to planetary salvation.
