  global_id: ger_location_136db285173f
  canonical_name: Camouflaged Duck Blind Outpost
  description: A low, camouflaged field research observation outpost masquerading
    as a rural duck blind that doubles as a cramped laboratory and living quarters
    for a three-person field team (identified personnel include Barron, Palmer, and
    Warren). Synthetic foliage and holographic renderings fold the structure into
    its surroundings while equipment racks, bulkhead ports, consoles, and a tucked-away
    small reactor hum behind false walls. The air is tinged with ozone and lubricants;
    cables and instruments form tight pools of console glow. When the reactor shorts,
    the shelter experiences a violent burst of heat and light that rips canvas and
    metal, creating injuries, contamination risk, and urgent containment and moral
    decisions for rescuers and Starfleet personnel.
  location_type: Camouflaged Field Research Outpost / Observation Blind
