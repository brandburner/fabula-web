  canonical_name: Sector 001 (Terran System / Earth)
  description: Sensors lock onto the Borg cube's trajectory cutting straight through
    space toward Sector 001, the Terran System cradling Earth. Worf announces the
    course from the Enterprise bridge, his voice tight with urgency as screens map
    the path to humanity's homeworld. Consoles pulse with incoming data on the cube's
    speed, outpacing pursuit. The sector stands as the Federation's core—billions
    of lives, Starfleet headquarters, and cultural heart—now facing assimilation.
    Crew tension spikes; Riker's orders snap out amid the dread of drones targeting
    their origin point.
