- fabula_uuid: ger_location_32439921dabc
  global_id: ger_location_32439921dabc
  canonical_name: Courtroom Counsel Table
  description: 'A long, utilitarian counsel table anchors the courtroom, its smooth
    surface lined with datapads, legal briefs, and small microphones. Picard and Data
    occupy the center place at the table while opposing counsel — including Riker
    and Maddox — arrange themselves to the right, making the table the theater for
    argument and demonstration. Overhead lights sharpen faces and glint off metal
    surfaces; whispered asides and legal cadence ricochet across the room. The table
    functions as both evidentiary platform and emotional fulcrum: clinical procedure
    hardens into personal betrayal when Data’s power switch clicks and silence floods
    the space, leaving the table littered with the wreckage of a friendship and the
    raw stakes of a trial.'
  location_type: Courtroom Counsel Table
  parent_location_uuid: null
