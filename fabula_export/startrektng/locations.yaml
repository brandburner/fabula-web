  canonical_name: Undressed Stage
  description: Barclay performs Cyrano de Bergerac's death scene on this sparsely
    furnished stage aboard the USS Enterprise. A single chair stands amid the bare
    space, creating an intimate arena for the acting class. The loose setup encourages
    raw emotional exposure; Beverly Crusher and Deanna Troi watch in stunned silence
