- fabula_uuid: ger_location_d12e1e76caa4
  global_id: ger_location_d12e1e76caa4
  canonical_name: Moon in Orbit of the Enterprise
  description: 'This moon orbits the Enterprise, its thick crust blocking all scans
    to hide a Bajoran terrorist military base beneath. Picard and Riker study sensor
    readouts revealing the deliberate choice: an impenetrable surface masks weapons
    caches or docked vessels from Starfleet detection. The site''s secrecy exposes
    intelligence failures, heightens Cardassian tensions, and tests Picard''s neutrality
    amid Ro''s loyalties. Harsh lunar rock and shadowed craters frame a strategic
    stronghold pulsing with concealed threats.'
  location_type: Orbital Moon with Hidden Base
