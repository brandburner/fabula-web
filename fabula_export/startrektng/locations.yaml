  canonical_name: Science Lab (USS Enterprise-D)
  description: Sterile science lab aboard the USS Enterprise-D packs consoles, monitors,
    and a power conduit jury-rigged for Borg Hugh. Geordi La Forge and Beverly Crusher
    run perceptual tests here—geometric puzzles that Hugh solves with prosthetic eye
    precision—while voices drop amid humming gear. Hugh edges toward individuality,
    repeating his new name and voicing loneliness without Collective chatter. Ethical
    strain thickens the air as Geordi dodges Hugh's fate question and Beverly spots
    his vulnerability, turning the equipment-cluttered space into a crucible for compassion
