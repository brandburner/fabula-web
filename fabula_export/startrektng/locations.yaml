- fabula_uuid: ger_location_253399270498
  global_id: ger_location_253399270498
  canonical_name: Environmental Maintenance Laboratory
  description: The Environmental Maintenance Laboratory pulses with urgent tension
    as it entraps two technicians amid a critical life-support shutdown. Metal surfaces
    gleam under harsh fluorescents, while alarms shriek, fracturing the heavy silence
    with relentless urgency. Time contracts mercilessly as a countdown looms, suffusing
    the air with a choking blend of fear and desperation. This confined technical
    sanctum transforms into a high-stakes crucible where courage wrestles with paralyzing
    dread. Wesley Crusher’s frantic rush into the lab amplifies every sound and shadow,
    turning this space into a nerve center of raw, palpable life-or-death struggle.
  location_type: Environmental Maintenance Laboratory
