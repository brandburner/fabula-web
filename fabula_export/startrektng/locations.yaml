- fabula_uuid: ger_location_a2a2e0ffd855
  global_id: ger_location_a2a2e0ffd855
  canonical_name: The Cavern (Chasm Section) - Scaffolding Bridge
  description: "\n        An expansive subterranean space beneath the station, blending\
    \ **natural jagged rock formations** with **engineered walls lined by pipes, conduits,\
    \ and structural supports**. The cavern is bisected by a **mission-critical chasm**—a\
    \ deep, yawning gap bridged by **precarious scaffolding** that spans the deadly\
    \ void. This chasm is the focal point of perilous events, including:\n       \
    \ - A **catastrophic collapse** that leaves Lieutenant Riker dangling over the\
    \ abyss, rescued by Commander Riker’s grip (*Second Chances*).\n        - Commander\
    \ Riker racing across the **chasm-spanning scaffolding**, where a section buckles\
    \ under Lieutenant Riker’s weight, forcing a desperate rescue amid straining struts\
    \ and echoing shouts.\n        The space is characterized by **dim shadows, echoing\
    \ voids, and gusting winds** from unseen depths, amplifying the raw tension of\
    \ survival and loyalty tested within its confines. The chasm serves as both a\
    \ **physical barrier** and a **narrative crucible**, forcing characters to confront\
    \ their limits.\n      "
  location_type: Station Subterranean Cavern
  parent_location_uuid: null
