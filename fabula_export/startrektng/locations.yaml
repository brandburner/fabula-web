- fabula_uuid: ger_location_2c7ae59492df
  global_id: ger_location_2c7ae59492df
  canonical_name: Mariposa Reception Office
  description: A compact administrative room recessed directly off the reception hall,
    its door left open to expose a tidy desk, a humming computer terminal, and a pair
    of identical women working in tight synchrony. Fluorescent light washes the laminate
    surfaces while the faint scent of polish and warm electronics hangs in the air.
    Voices and footsteps from the larger reception area bleed through the threshold;
    the office functions as a polite interface for visiting delegations and a staging
    point for aides. In the scene it becomes an uncanny evidentiary node—routine clerical
    order transformed into visual proof of duplication that snaps the away team from
    ceremony into guarded suspicion.
  location_type: Government Reception Office
