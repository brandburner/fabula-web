- fabula_uuid: ger_location_fa3bbbd5f30d
  global_id: ger_location_fa3bbbd5f30d
  canonical_name: Surface of Iconia
  description: 'A brown-red, apparently lifeless expanse pocked by distant mountain
    ranges and the silent scars of an ancient cataclysm. Sensors pick up a localized,
    concentrated energy remnant in the highlands—anomalous technology pulsing beneath
    dead rock—while the surface otherwise reads as barren and wind-bleached. From
    orbit a sudden, blinding flash rips through the dusk: a projectile erupts from
    the ground, turning archaeological curiosity into immediate tactical peril. The
    place functions as both ruinous memory and active danger, where dormant artifacts
    can suddenly strike across space and force ships to choose capture over retreat.'
  location_type: Planet Surface
