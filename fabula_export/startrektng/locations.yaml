  canonical_name: Bio-Labs (USS Enterprise-D)
  description: Ambassador Byleth demands an immediate tour of the bio-labs after the
    arboretum, ambushing Worf in his quarters and accusing him of incompetence. These
    starship facilities house biological research stations with specimen analyzers,
    cultivation chambers, and data consoles where crew examine alien lifeforms under
    sterile lighting. The unvisited labs amplify Iyaaran provocation tactics, forcing
    Worf's defensive response and exposing cultural rifts between deliberate antagonism
    and Starfleet duty.
