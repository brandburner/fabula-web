  global_id: ger_location_75da128d749d
  canonical_name: Dusty Orange Planet
  description: 'A dusky, orange-tinged world fills the Main Viewer, its ocher atmosphere
    throwing a thin, amber twilight across the void. The USS Enterprise and the crippled
    Hathaway share a synchronous parking orbit here, the planet’s muted surface serving
    as a constant, oppressive backdrop to bridge rhythms: consoles hum, faces catch
    ruddy light, and time feels compressed under the weight of imminent decisions.
    Dust swirls and broad, weathered basins suggest long geologic age; the scene’s
    warm palette sharpens the countdown’s pressure and the crew’s strained focus.'
