- fabula_uuid: ger_location_84fd6b074b39
  global_id: ger_location_84fd6b074b39
  canonical_name: Mintakan Assembly Hall (Mintaka Three village)
  description: 'A sun‑baked communal assembly hall that anchors the Mintakan village
    on Mintaka Three. Low adobe and packed‑earth surfaces form a broad central clearing
    ringed by simple huts, benches, and raised stones where villagers cluster; a bronze
    astrolabe perches on the exterior flagstone apron, its ceremonial sightlines oriented
    toward distant hills and the duck blind. By day the space functions as civic forum
    and ritual center—rites convene, disputes are adjudicated, and authority is publicly
    performed. By night the same stage becomes a pressure chamber for panic and power:
    worship hardens into command, crowds surge, and choices made here reshape the
    community''s fate.'
  location_type: Village Assembly Ground / Community Gathering Area
