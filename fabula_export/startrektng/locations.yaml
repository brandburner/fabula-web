  canonical_name: Beverly Crusher’s Office (Sick Bay, USS Enterprise-D)
  description: A private, intimate office within Sick Bay, equipped with glowing diagnostic
    consoles, data padds, and biobed monitors. Designed for focused medical and psychological
    analysis, this space is where Picard, Troi, and Crusher examine Tam Elbrun’s Betazoid
    telepathy overloads and traumatic history in a confidential setting. The soft
