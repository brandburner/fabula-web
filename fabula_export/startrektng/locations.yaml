  global_id: ger_location_2adc2a235eea
  canonical_name: Royale Casino — Blackjack Table
  description: A tight blackjack table area on the Royale Casino gaming floor where
    lights strobe across green felt as a compact circle of players and an efficient
    dealer govern the rhythm of the game. Voices compress into murmurs between the
    snap of cards and the clink of chips; the crowd funnels around the table and pressure
    converges on anyone who hesitates. Data studies rules with clinical calm here,
    slipping two chips into his pocket as physical proof, while the dealer’s impatience
    and a player's abrupt pullback enforce the casino’s scripted tempo.
  location_type: Casino Blackjack Table
