  canonical_name: Holodeck Four (Dixon Hill Program)
  description: |-
    Holodeck Four on the USS Enterprise-D, configured as a 1940s detective simulation (Dixon Hill Program). This holodeck serves as the setting for multiple narrative threads in *Clues* (S4E14), including:
      - **Guinan's appointment**: A malfunctioning timeline within the program causes temporal distortions, forcing Guinan to confront the holographic secretary Madeline and exposing glitches linked to the Enterprise's missing 24 hours. The holographic emitters flicker under strain, blending noir office aesthetics with intrusive temporal anomalies.
      - **Picard's private escape**: Jean-Luc Picard uses the program as a sanctuary from his captaincy, immersing himself in the detective simulation's dim-lit offices, trench coats, and rain-slicked streets. The illusion is abruptly interrupted by Data's comlink, pulling Picard back to command duties.
      The holodeck's dual role—as both a narrative device (hosting the Dixon Hill simulation) and a physical location (Holodeck Four)—highlights its significance in the episode's themes of illusion vs. reality and the blurred boundaries between holographic and actual events.
  location_type: Starship Holodeck
