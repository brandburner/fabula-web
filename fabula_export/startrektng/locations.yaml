  global_id: ger_location_eef5ea130cb7
  canonical_name: Nel System
  description: Data identifies the Nel System, consisting of two planets, as a source
    of pending transmissions. These signals promise additional data on unexplained
    comas matching Riker and Troi's condition. From the Enterprise bridge, the crew
    anticipates this remote system's input, which could expand their investigation
    beyond current leads and reveal patterns tied to Ullian memory probes. The system's
    distance heightens urgency, positioning it as a key horizon for breakthrough evidence
    amid mounting suspicion.
