  canonical_name: Beta Moon's Upper Ionosphere
  description: Charged particles fill this thin atmospheric layer high above the Beta
    moon's surface. The shuttlecraft nears it when Worf spots an unidentified vessel
    rising from the moon's limb. Phaser banks glow as the ship locks on, forcing Riker
    to boost shields and veer away. Crew strain against the g-forces of evasion, the
    ionosphere's faint shimmer underscoring their isolation and the mission's plunge
    into peril.
