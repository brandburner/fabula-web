  description: The Denver drifts through space, battered enough to send out a distress
    call detected by the Enterprise. Faint life signs aboard prompt Picard to order
    immediate beam-out of survivors, who arrive in critical condition for triage in
    sickbay. No details emerge on its damage or crew losses, but the crisis pulls
