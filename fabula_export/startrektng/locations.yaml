    insulation; the air carries a metallic tang beneath the ship’s low mechanical
    hum and intermittent warning chimes. Flickering corridor lighting throws long
    shadows toward Shuttlebay Two, turning routine maintenance alcoves into blind
    spots for a fleeing saboteur. Functionally, the deck operates as a breach point
    and tactical lead—its open panel propels a ship‑wide hunt, forcing doubled security,
    frantic diagnostics, and a hunt‑and‑trap psychology that compresses time and raises
    stakes for anyone tracking Danar.
