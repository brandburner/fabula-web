  canonical_name: Madena VI Coalition Space
  description: The vast interstellar expanse near Madena VI pulses with the hum of
    unseen warp trails as the USS Enterprise navigates through the delicate political
    web of the coalition. Cold starlight glints off passing ships—some allies, some
    potential threats—in this neutral corridor where Federation diplomacy weaves through
    the razor's edge of local politics. The silence of space here carries the weight
    of unspoken treaties, the silent void stretching taut between trust and vigilance
    as the Enterprise charts its course through the coalition's contested borderlands.
    Navigation consoles flicker with tactical overlays marking the shifting allegiances
