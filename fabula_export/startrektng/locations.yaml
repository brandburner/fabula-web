  global_id: ger_location_c64af8c0eb90
  canonical_name: Dust Cloud Within Nebula
  description: The Enterprise buries itself in a thick dust cloud churning inside
    the nebula's vast gaseous folds. Fine particles obscure sensors and hull alike,
    muting the ship's profile against the swirling haze. The Borg cube hangs motionless
    nearby, its angular form cutting a patient shadow through the nebula's dim luminescence.
    Picard logs the standoff, his words capturing the void's oppressive quiet and
    the enemy's unyielding watchfulness, where every flicker risks exposure.
  location_type: Nebula Dust Cloud
