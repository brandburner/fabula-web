  global_id: ger_location_c9c8e5faee33
  canonical_name: Outer Rim of the Shipyard
  description: The outer rim of the shipyard cradles the Tripoli, a holding vessel
    that captured the T'Pau's secretly rerouted navigational deflector. Riker targets
    this peripheral zone after Geordi's scan revelation, marking it as the investigation's
    next frontline amid docked hulls and repair gantries. Suspicion clings to its
    distance from central docks, where crew envision shadowed bays hiding Romulan
    maneuvers and Ferengi debris ties. Tension builds as the bridge crew pivots inquiries
    here, probing for conspiracy threads in the industrial sprawl.
  location_type: Shipyard Perimeter
