- fabula_uuid: ger_location_7a761ed9e998
  global_id: ger_location_7a761ed9e998
  canonical_name: Cargo Bay 3
  description: Cargo containers tower in unsteady stacks across this vast Enterprise
    bay, secured by exposed metal support beams and crisscrossing lattice structures.
    Worf and Geordi weave through narrow aisles, tricorders probing for chlorinide
    leaks amid the low thrum of ship systems and faint chemical tang. Banter cuts
    short when a corroded beam buckles, unleashing a container's crushing weight on
    Worf and plunging the cluttered expanse into crisis. Industrial functionality
