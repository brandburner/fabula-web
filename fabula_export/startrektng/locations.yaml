- fabula_uuid: ger_location_d9cb88f11fe6
  global_id: ger_location_d9cb88f11fe6
  canonical_name: Delos Sun
  description: A volatile and hostile stellar environment dominated by the fierce
    Delos Sun, this location crackles with massive and unpredictable solar flares.
    The space nearby inundates the USS Enterprise with hazardous radiation that disrupts
    ship systems, including sensors and communications. Amid the blinding X-ray bursts
    and seething plasma storms, the Enterprise navigates with tense precision, balancing
    scientific curiosity with imminent danger. The smoldering solar tempest casts
    an intense glow that both threatens and fascinates, setting a crucible of urgency
    when a distress call from a doomed freighter breaks through the storm’s interference.
    Here, cosmic fury and human resolve collide in a perilous theater of survival
    and exploration.
  location_type: Hostile Stellar Environment
