- fabula_uuid: ger_location_aba47447526e
  global_id: ger_location_aba47447526e
  canonical_name: Beltane Nine
  description: Beltane Nine stands as a pivotal off-world hub where freighters dock
    and sign-on procedures occur, embodying a crossroads of escape and evasion. Its
    atmosphere pulses with undercurrents of desperation and avoidance, reflected in
    Jake Kurland’s urgent flight to flee familial and personal responsibility. The
    location reverberates with the tension of abandonment, symbolizing a fraught threshold
    between duty and self-preservation. Though physically unvisited, the mention of
    Beltane Nine as the intended destination anchors it as a critical narrative locus
    of reckoning and rebellion within the broader starship and Federation context.
  location_type: Freighter Docking Station
