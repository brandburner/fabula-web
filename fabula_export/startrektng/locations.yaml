- fabula_uuid: ger_location_9ef6378b7b2b
  global_id: ger_location_9ef6378b7b2b
  canonical_name: Granger's Office Side Door
  description: 'A narrow service door set into the side wall of Granger’s office,
    its frame bearing the scuffs of hurried traffic and a muted latch that yields
    to brisk, clinical force. Cold light from the corridor leaks through the seam
    when it opens, turning brief motion into a hard, exposed cut of space. The door
    functions as both extraction point and false threshold: clones shove bound officers
    through it with mechanical efficiency, then it receives a polite knock that admits
    a curious investigator. The doorway carries the chill of organized theft and the
    intimacy of a private office violated—where violence passes quickly into the ship
    of procedure and suspicion lingers in the closed air.'
  location_type: Administrative Office Doorway
