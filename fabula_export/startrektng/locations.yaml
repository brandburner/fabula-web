  global_id: ger_location_7f832384fcb7
  canonical_name: Harod Four
  description: Harod Four serves as a remote mining outpost where the Enterprise pauses
    to rescue stranded miners. Harsh conditions strand workers amid unforgiving terrain
    and isolated shafts, forcing Picard to detour from his course. Miners await extraction
    in a dust-laden environment, their vulnerability highlighting Starfleet's humanitarian
    pull. This stop delays arrival at negotiations, tightening the ship's schedule
    and amplifying diplomatic pressures.
