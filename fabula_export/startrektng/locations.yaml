- fabula_uuid: ger_location_ec5a12fb78cd
  global_id: ger_location_ec5a12fb78cd
  canonical_name: Galorndon Surface
  description: 'The storm‑lashed surface of the planet Galorndon Core: a battered,
    wind‑whipped plain of jagged rock and churned regolith where electrical storms,
    salt‑sharp air and ozone interfere with sensors. Scattered Romulan wreckage and
    a downed Romulan vessel smolder amid ultritium‑scarred debris. The terrain includes
    sudden collapses and yawning pits of loose soil that swallow sound and swallow
    people, turning exploration and forensics into urgent, dangerous rescue operations.'
  location_type: Storm-Swept Planetary Surface
