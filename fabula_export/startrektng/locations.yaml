  description: The forward viewscreen spans the front wall of the main bridge, framing
    space's vastness with crisp clarity. Flames erupt across it as Picard's shuttle
    explodes amid the nebula's swirling chaos, drawing stunned gazes from Riker and
    the crew. Consoles hum beneath the tension; this visual anchor confirms disaster,
    amplifying raw fear and urgency in the controlled pandemonium.
