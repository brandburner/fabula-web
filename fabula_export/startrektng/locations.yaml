- fabula_uuid: ger_location_22d23047f09f
  global_id: ger_location_22d23047f09f
  canonical_name: IKS Bortas
  description: Gowron's Klingon battlecruiser, the IKS Bortas, serves as a central
    location in multiple critical events. In one instance, it endures a savage ambush
    from a Bird of Prey (and later a second attacker), with its hull glowing under
    phaser impacts as shields flare and explosions ripple across its surface. Worf
    and Gowron stand aboard during this battle, their survival uncertain amid a leadership
    crisis. In another context, the Bortas is stationed in space awaiting Worf's arrival
    after his Starfleet resignation, with its warriors preparing for strikes against
    Duras's coup forces. The ship is a key player in the Klingon civil war, with tensions
    high due to Romulan interference threats.
  location_type: Klingon Battlecruiser
