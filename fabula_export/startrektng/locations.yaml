  canonical_name: Lashmir
  description: Lashmir marks a defining moment in Tamarian military history, where
    Uzani arrayed his army to draw enemies close with an open fist before striking
    with a closed fist. Dathon invokes this battle to demonstrate his people's metaphor-based
    language, mirroring the creature's charge on the planet clearing. Picard connects
