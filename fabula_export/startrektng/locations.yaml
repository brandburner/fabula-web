- fabula_uuid: ger_location_36ca93700753
  global_id: ger_location_36ca93700753
  canonical_name: Peliar Zel
  description: Peliar Zel is an inhabited alien planet orbiting in the void, its neutral
    inhabitants caught between the warring moons Alpha and Beta. Alpha's extraction
    of Peliar Zel's magnetic field for power has devastated Beta's environment, sparking
    genocide accusations and escalating tensions. The planet's fragile neutrality
    is threatened as armed forces mobilize and diplomats engage in tense peace talks.
    The Enterprise orbits overhead, with crew members like Odan preparing for surface
    missions to mediate the conflict, while Picard oversees the mission from the *Enterprise-D*'s
    Ready Room. The planet's shadowed continents and orbiting sentinels underscore
    the high stakes of the diplomatic efforts.
  location_type: Inhabited Alien Planet
  parent_location_uuid: null
