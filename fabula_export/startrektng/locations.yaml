- fabula_uuid: ger_location_ca67dcfc416c
  global_id: ger_location_ca67dcfc416c
  canonical_name: Ballroom (Reception Hall)
  description: Elegant daytime ballroom hosts a 19th-century literary reception. Well-dressed
    society members chat in small groups, their refined conversations filling the
    space. Guinan and Samuel Clemens debate philosophy on humanity's cosmic role.
    Data shatters the calm by forcing entry, dragging a protesting doorman inside
    with android strength. His arrival sparks confusion, recognition, and whispers
    of temporal secrets as the scene shifts from social grace to urgent confrontation.
  location_type: 19th-Century Reception Ballroom
