  global_id: ger_location_fc3ca5130302
  canonical_name: Rectangular Corridor Beyond M-4 Tunnel
  description: This sterile, rectangular corridor lies deep within the underground
    complex, immediately following the shadowed expanse of the M-4 Tunnel beneath
    Governor Karnas's residence. Its clean, unadorned surfaces contrast sharply with
    the tunnel’s decay, highlighted by a familiar sliding metal door that stands as
    a guarded threshold. The corridor’s cold emptiness amplifies the eerie silence
    and the weight of the away team's cautious advance, symbolizing a critical juncture
    between the known desolation of the tunnel and the mysterious enigma concealed
    beyond the metal barrier. The space pulses with tense anticipation, marking a
    physical and psychological boundary as the team penetrates further into the heart
    of Data’s origin story.
