  canonical_name: Miridian Six Research Station
  description: Classified Federation research station clings to the Neutral Zone's
    edge, its labs humming with secret experiments until Romulans swoop in. Ethan
    recalls capture there with his parents—alarms blaring, guards overwhelmed, families
    torn apart. Official records deny its existence, marking the sector uninhabited,
    which sharpens Riker's distrust of Romulan tales. Isolation amplifies peril; cloaked
    ships exploit the void between stars, turning scientific haven into trap of deception
    and loss.
