- fabula_uuid: ger_location_ff5cc80a82cd
  global_id: ger_location_ff5cc80a82cd
  canonical_name: Nightmare Void (Tyken's Rift Psychic Siege)
  description: "\n  A hallucinatory psychic void in the Tyken's Rift that manifests\
    \ as a disorienting, sensory-deprived expanse for Deanna Troi. The environment\
    \ weaponizes her empathic abilities, amplifying terror through:\n  - **Physical\
    \ properties**: A smoky, gaseous void offering no footing or resistance, where\
    \ Troi drifts powerlessly amid swirling murk.\n  - **Auditory torment**: A disembodied\
    \ 'Sighing Voice' that taunts her with fragmented phrases ('eyes in the dark,'\
    \ 'one moon circles'), echoing the distress of a trapped ship.\n  - **Visual assaults**:\
    \ Churning fog that distorts into grotesque shapes, with shadowy figures emerging\
    \ to embody the Rift's horrors.\n  - **Psychological siege**: Sensory emptiness\
    \ and oppressive haze that mirror the crew's looming mental collapse, while Troi's\
    \ transmission lifeline frays under the strain.\n  The void serves as a manifestation\
    \ of Tyken's Rift's psychological warfare, targeting Troi's mind during her REM-deprived\
    \ state.\n  "
  location_type: Hallucinatory Psychic Void
