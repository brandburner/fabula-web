  description: A **psychologically oppressive institutional corridor** in the Tilonus
    Asylum, designed to amplify Riker's sense of entrapment and perceptual distortion.
    Serves as a **physical manifestation of the asylum's control**, with harsh clinical
    lighting, echoing metallic surfaces, and a sterile, claustrophobic design. **Subjective
    space**—perceived through Riker's fractured reality, reinforcing themes of identity
    erosion. **Distinct from Enterprise corridors** in both function and thematic
    role.
