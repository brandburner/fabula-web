- fabula_uuid: ger_location_e21e00899472
  global_id: ger_location_e21e00899472
  canonical_name: Null Space Anomaly
  description: A deep-space anomaly detected during a shuttle mapping mission, characterized
    by an invisible void that absorbs matter and energy without trace. The anomaly
    manifests as a pocket of null space where sensor pulses, engine components, and
    even entire shuttle parts vanish upon contact. The event triggers violent turbulence,
    disorientation, and a sense of isolation for the crew (Riker and Soren), while
    faint neutrino bursts leak outward. The anomaly’s behavior mirrors Soren’s internal
    identity crisis, reinforcing the narrative’s thematic tension between visibility
    and hidden truths. **Location Type:** Deep Space Anomaly (Null Space Pocket).
  location_type: Deep Space Anomaly
