  global_id: ger_location_530bb907fb2f
  canonical_name: Poker Room
  description: In this 19th-century poker room, players crowd a table after a heated
    standoff between the Seaman and American Indian, tension defused by the Gambler's
    veiled threat. Data enters amid suspicion and racial barbs, counters with flawless
    French to claim a seat, staking gold from his communicator. Distrust permeates
    the air, deception fuels every bluff, and violence lurks as players confront biases
    in this high-stakes game.
