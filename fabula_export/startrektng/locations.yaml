- fabula_uuid: ger_location_b1c2e56d247c
  global_id: ger_location_b1c2e56d247c
  canonical_name: Crusher's Quarters
  description: 'Beverly Crusher''s quarters aboard the USS *Enterprise-D* serve as
    her personal retreat, blending domestic comfort with recurring supernatural disturbances.
    The space contains a bed for rest, a table of plants she trims for relaxation,
    and counters holding items like glasses of water. During temporal anomalies, the
    room darkens unnaturally, amplifies déjà vu, and experiences unexplained phenomena:
    disembodied voices (recorded with a tricorder), shattering glass despite altered
    routines, and an eerie sense of isolation. These disturbances prompt urgent calls
    to Picard and Geordi before Beverly heads to Engineering. The quarters also host
    past holographic games on recliners, witness evasive maneuvers by Wesley at desks,
    and feature tense entries by Worf, marking it as both a sanctuary and a crisis
    hub during anomalies.'
  location_type: Starship Personal Quarters
