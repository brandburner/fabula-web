  global_id: ger_location_29b8ebd8cdcf
  canonical_name: Grassy Field (Iconian Gateway Projection)
  description: 'A wide, green expanse unfurls as a brief, remote panorama — a grass‑strewn
    plain with a low horizon that reads as calm and terrestrial against the Iconian
    gateway’s spinning aperture. The projection smells of contradiction: pastoral
    openness compressed into a circulating image, its quiet light washing the control
    room’s consoles and cutting through the technical hum. The vista functions narratively
    as an impossible promise of ordinary space, offering emotional contrast to the
    sterile, dangerous control room and heightening the shock when the gateway cycles
    to starship bridges moments later.'
