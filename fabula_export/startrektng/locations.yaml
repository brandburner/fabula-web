  description: Riker and Worf haul themselves up the steep hill's rugged incline during
    reconnaissance of the nearby Borg compound. Loose gravel shifts under boots, demanding
    steady grips and labored breaths on the alien planet's unforgiving surface. The
    crest offers a clear overlook of enemy patrols below, but dense brush conceals
