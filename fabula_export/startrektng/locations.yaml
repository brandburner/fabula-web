- fabula_uuid: ger_location_ee323db0e157
  global_id: ger_location_ee323db0e157
  canonical_name: Presidio Army Fort
  description: Data and Guinan stand in Data's hotel room, plotting access to the
    Presidio Army Fort on San Francisco's rugged bluffs. This high-security U.S. military
    installation guards a hidden mine shaft—the sole entrance to the cavern housing
    Devidian threats. Guinan's skepticism mounts as she details the fort's strict
    perimeter patrols, barracks ringing with orders, and ironclad rules blocking civilian
    digs. Salty Pacific gusts whip the grounds outside, amplifying the isolation and
    risk of breaching its defenses to reach the underground lair.
