  global_id: ger_location_edfc8c8af0bb
  canonical_name: Tsiolkovsky Main Corridor
  description: A narrow artery within the disabled starship Tsiolkovsky (and by extension
    the Holodeck Corridor), this corridor pulses with surreal distortions and unstable
    reality shaped by a warp experiment's fallout. It hosts spectral illusions, including
    an emotional apparition of Captain Picard's deceased mother brewing tea, blurring
    the boundary between memory and metaphysical presence. The space throbs with tension
    as anxious crewmembers flee unseen threats and Captain Picard grapples with the
    fragility of existence amid mounting chaos. Despite the hall's familiar layout,
    its oppressive silence warps into a disorienting haze where thought and fear reshape
    the ship’s environment, heralding a crisis of mind and matter.
