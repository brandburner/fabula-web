  global_id: ger_location_aa274e9b2738
  canonical_name: Solarion Four Colony
  description: Solarion Four Colony clings to a remote frontier world, positioned
    perilously close to Cardassian space. Bajoran settlers under Federation auspices
    inhabit its habitats and outposts. A distress signal erupts from its comms arrays,
    cuts abruptly silent, then Bajoran militants broadcast their claim of total destruction.
    Enterprise crew confronts the void through failed hails, sensor blackouts, and
    chilling threats, the site's absence fueling crisis on the bridge.
