  canonical_name: Sickbay Doorway
  description: 'A narrow, clinical threshold at the mouth of Sickbay: a sliding hatch
    set in brushed metal, pale overhead fluorescents, and the faint antiseptic tang
    that clings to breath. Characters pause on its line—Picard halting with tightened
    posture, Troi stepping through with solemn urgency—while the aperture frames entrances
    and exits and concentrates motion into a single charged beat. The doorway functions
    as a staging point and emotional fulcrum, a thin membrane between scientific containment
    and the wider ship where command, fear, and care collide.'
