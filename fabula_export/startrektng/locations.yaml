  canonical_name: Enterprise Conference Room
  description: 'A windowless command chamber that collapses attention inward: a broad
    central table ringed with integrated interface consoles and tac displays that
    flicker with live damage reports and schematics. Emergency lighting slices faces
    into hard planes while the metallic breath of the ship and distant alarm hisses
    press at the edges. An empty chair—Beverly Crusher’s—haunts one side, signaling
    an unseen medical crisis as voices tighten and trade orders. Worf demands force,
    Riker cautions against traps, Data parses probing patterns, and Picard holds the
    room to diplomacy-first strategy, turning raw fear and technical data into a measured
    operational plan.'
