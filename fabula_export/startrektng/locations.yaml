  canonical_name: Southern Promontory, Arkaria
  description: Hutchinson pitches the Southern Promontory, Arkaria, as a muddy, cold,
    remote destination riders reach by horseback along a network of trails cutting
    through open plains. Viewers position there to watch Arkarian horn fowl tend nesting
    grounds or perform mating displays amid harsh winds and slick ground. The site's
    rugged isolation fuels conversation, spurring Picard's absurd saddle pretext to
    flee the reception's social press.
