- fabula_uuid: ger_location_d9076a5f0e55
  global_id: ger_location_d9076a5f0e55
  canonical_name: 221B Baker Street
  description: 221B Baker Street pulses with the spectral energy of Victorian London,
    a meticulously reconstructed holographic facsimile where gaslight flickers across
    mahogany walls lined with eclectic artifacts. Pipe smoke hangs suspended in time
    above leather-bound books and violin-strewn tables—a stage set for Data's cerebral
    performance as Holmes against Geordi's Watson. The space thrums with intellectual
    electricity, its narrow staircase and foggy window panes masking the starship
    corridor lurking just beyond perception. Every detail whispers nostalgic artifice—from
    the Persian slipper tobacco stash to the chemistry set hinting at perpetual experimentation—while
    simultaneously broadcasting its status as an elaborate simulation playing dangerously
    at sentience.
  location_type: 'Holodeck Simulation: Historical Residence'
