- fabula_uuid: ger_location_bb9d641ae31b
  global_id: ger_location_bb9d641ae31b
  canonical_name: Epsilon Pulsar Cluster
  description: 'A distant cluster/congregation of rapidly rotating neutron stars (pulsars)
    that the Enterprise has set course to survey. Appears in sensors as cold, strobe‑like
    beacons: periodic radio pulses, high‑energy spikes, and distinctive spectral signatures.
    Functions as a precise scientific survey target and an emotional lodestar for
    command — animating consoles, focusing the bridge crew, and serving as a geographic
    anchor for planned rendezvous. Scenes portray sterile instrument readouts, analytic
    urgency, and the tight excitement of exploratory purpose amid personal conflict.'
  location_type: Deep Space Pulsar Cluster (Astronomical Survey Target)
  parent_location_uuid: null
