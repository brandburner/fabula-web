  canonical_name: Norkan Outposts
  description: 'A cluster of battered frontier outposts where accusation and memory
    have hardened into political ammunition. The Norkan Outposts register as scarred
    terrain in conversation: silent barracks, blackened parapets, and the echo of
    ordered violence that refuses to die. References to the site cut through ceremony,
    converting geography into proof and moral reckoning. Characters invoke the outposts
    to weaponize history, to undermine authority, and to demand accountability for
    a massacre tied to Jarok’s past.'
