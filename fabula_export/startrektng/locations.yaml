  global_id: ger_location_e38a5dbc2c51
  canonical_name: 'Crew Quarters #1'
  description: 'Crew Quarters #1 aboard the USS Enterprise functions as a private
    residential space for the crew. An unnamed crew member stands before a mirror,
    brushing her hair in the quiet routine of off-duty life. Ro bursts through one
    wall in her intangible state, desperate to escape, while Parem pursues her relentlessly
    through the solid barriers. The room transforms into a silent arena of pursuit,
    where the oblivious occupant continues her task amid the unseen life-or-death
    struggle echoing through the confined space.'
