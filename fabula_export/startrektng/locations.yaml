  description: Narrow vestibule adjacent to Beverly Crusher's office in Sickbay on
    the USS Enterprise-D serves as a semi-public threshold between the main medical
    bay's activity and private consultations. Data lingers here to request dance lessons
    from Beverly, his words carrying to a passing nurse amid the hum of diagnostic
    panels and sterile lighting. The open space exposes Beverly to workplace scrutiny,
    forcing her to pull Data inside quickly. Tight confines foster proximity for awkward
    exchanges, blending professional duties with personal vulnerabilities as in prior
    encounters with Rasmussen.
