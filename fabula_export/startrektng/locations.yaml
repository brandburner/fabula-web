  global_id: ger_location_2bd8aa2ed925
  canonical_name: North America
  description: 'North America arrives as a terse claim of origin—Beverly names it
    and the word snaps like a line back to a living, terrestrial homeland. The continent
    registers as a vast, variegated geography of coasts, plains, mountain ranges,
    and dense cities; as a repository of family, childhood rhythms, and cultural shorthand
    that grounds Beverly amid the cavern''s clinical shadows. Mentioning North America
    shifts the scene''s emotional gravity: distance, belonging, and a private human
    past press against the infirmary''s antiseptic air, turning geopolitical scale
    into intimate provenance and moral context.'
  location_type: Continent
