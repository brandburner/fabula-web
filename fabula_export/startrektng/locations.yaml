  global_id: ger_location_d43ca1cf8845
  canonical_name: Frozen Enterprise
  description: The Frozen Enterprise traps the away team in a hostile, ice-bound starship
    where time acts as a weapon, distorting reality through artificial pockets. Biting
    cold seeps past protective subspace shields on their armbands, while temporal
    rifts spark disorientation—Troi staggers first. Picard, Data, and Troi beam to
    the bridge amid Geordi's urgent warnings, facing a desperate incursion to avert
    catastrophe. The environment pulses with instability, every step risking unraveling
    of crew and continuum.
