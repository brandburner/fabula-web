  global_id: ger_location_8341940b4785
  canonical_name: Graveyard of Ships
  description: Empty starfield spans the coordinates where the Tripoli should rendezvous,
    dotted with derelict vessels drifting in silence. The Enterprise maneuvers among
    the twisted hulks, powering down to mimic one for the stakeout. Worf confirms
    the void holds no active ships, only these abandoned wrecks that shield the ambush
    against deuterium smugglers. Tension grips the bridge as Riker positions the crew
    for interception amid the cold, motionless debris.
