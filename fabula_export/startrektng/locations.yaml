  global_id: ger_location_baac9396b2c2
  canonical_name: Enterprise Orbiting Vandor
  description: Suspended silently in the cold expanse of space above the planet Vandor,
    this orbital position cradles the USS Enterprise, holding a vigilant watch as
    it conducts critical medical and psychological interventions aboard Sickbay. The
    vast, shadowed backdrop of Vandor’s surface contrasts with the sterile, clinical
    intensity unfolding within the ship, where tension and emotional strain ripple
    beneath the surface as the crew confronts the fragile mental state of Professor
    Manheim. This orbit embodies isolation and the weight of command, embodying both
    scientific peril and quiet support amidst the shadows of paranoia and hope.
  location_type: Starship Exterior Orbit
