  canonical_name: Ux-Mal Star System
  description: Distant stellar expanse that birthed the Ux-Mal convicts, now their
    longed-for return after centuries on a penal moon. Possessed by Troi and Data
    amid Cargo Bay 4's swirling energy clouds and hive hum, the entities plot to hijack
    the *Enterprise* and steer it home, using crew bodies as vessels. Picard confronts
    their deception, shifting the threat from mystery to invasion aimed at this remote
    system.
