  global_id: ger_location_2464c836b488
  canonical_name: Narrow Approach Path to Duck Blind
  description: 'A narrow, weathered track squeezes toward a camouflaged duck blind
    set against a rocky outcrop. The path rides a tight corridor of packed earth,
    loose shale, and scrub—every step risks a slide as the trail falls away to low
    brush. Wind and distant wildlife add a thin soundtrack while the blind’s holographic
    edge blurs the boundary between solid rock and staged shelter. The route acts
    as an approach corridor and dramatic hinge: it funnels a local hunter within arm’s
    reach of a staged miracle, becomes the place of a painful electrical discharge
    and collapse, and seeds a traumatic, religiously charged witness that will reshape
    the community’s relationship to the Enterprise.'
  location_type: Narrow Outdoor Approach Path
