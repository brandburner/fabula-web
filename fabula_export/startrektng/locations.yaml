  global_id: ger_location_991b7b338928
  canonical_name: Ruins of Nafir
  description: Weathered stone arches and collapsed vaults litter the ruins of Nafir,
    a forsaken site choked with dust and shadows. Smugglers extract rare Romulan relics
    from its buried chambers, hauling them through treacherous passages to frontier
    markets. The bartender fingers this place as the heart of the black-market trade,
    where Picard's probe into the network ended in sudden disappearance—attacked,
    perhaps vaporized amid the debris. Yranac echoes the peril, marking the ruins
    as a magnet for archaeologists and thieves alike, where every unearthed artifact
    risks betrayal or worse.
