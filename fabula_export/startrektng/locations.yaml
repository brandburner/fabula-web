  canonical_name: Camouflaged Rockface (Duck Blind)
  description: Jagged outcrop on Devidia II's night-shrouded surface cradles silver-gray
    aliens in reclined positions around a glowing energy-feeding apparatus. They drain
    life essence from a restrained ophidian held by a forcefield, ignoring Data's
    cloaked observations. Humming machinery fills the air until a sonic boom and swirling
    vortex erupts, swallowing Data and his equipment into temporal chaos. Crew arrives
    to find only abandoned gear amid the alien site's eerie stillness.
