  canonical_name: Apgar Science Station
  description: 'Apgar Science Station stands as a ruined, planet‑side research outpost
    centered on a small reactor and a Lambda Field generator—now the smoking epicenter
    of a lethal pulse. Scorched access hatches hang open, warped instrumentation flickers
    beneath soot, and a metallic tang of ozone lingers in the air. Investigators crowd
    the perimeter, triangulating blast vectors and timing signatures while forensic
    teams photograph charred consoles. The site functions as both tragic crime scene
    and technical puzzle: its exploded reactor anchors the Holodeck reconstructions,
    fuels legal accusation, and provides the temporal pattern that drives the ship''s
    urgent scientific inquiry.'
