- fabula_uuid: ger_location_3d0551ae75bf
  global_id: ger_location_3d0551ae75bf
  canonical_name: Crashed Shuttle Interior
  description: 'Emergency lights flicker across the cramped cabin of the crashed shuttle,
    where Riker nurses his broken arm, Data scans twisted consoles and scattered debris,
    and Troi assesses their isolation. Shattered equipment litters the deck—phasers
    fused, medical kits ruptured, tools bent beyond use—while the hull groans against
    the alien moon''s fog-choked winds. Data''s inventory confirms their dire straits:
    technology fails amid electromagnetic interference, forcing reliance on wits alone
    in this battered refuge.'
  location_type: Starfleet Shuttlecraft Interior
