  canonical_name: H'atoria Colony
  description: Klingon colony positioned near the border, governed by Worf, who holds
    the last known post as overseer. Beverly sets the medical ship's course here twice—first
    after ordering a change, then to secure clearance into Empire space. Picard and
    Beverly target it for Worf's aid, leveraging his authority amid tense reunions
    and mission doubts. Remote isolation lags subspace signals, echoing past exiles
    that tested Klingon loyalties and delayed influences like Kurn's under Gowron.
