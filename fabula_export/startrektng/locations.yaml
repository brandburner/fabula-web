- fabula_uuid: ger_location_6ac2c07bc3d0
  global_id: ger_location_6ac2c07bc3d0
  canonical_name: Felisa Howard's House
  description: 'Felisa Howard''s house on Caldos colony—a family home minutes from
    the cemetery—where Beverly plans to sort personal matters after Felisa''s funeral.
    The house harbors a supernatural chill, with vengeful ghosts, cursed camellias
    sprouting unnaturally, and dangers linked to Felisa''s death and raging storms.
    Beverly invites Troi to join her there, drawn by its pull in unraveling the camellia
    omen and confronting her lineage''s shadowed past. The eulogy paints Felisa''s
    legacy: healing hands, gingerbread scents filling rooms heavy with memory, now
    yielding to unease as Beverly confronts her lineage''s past.'
  location_type: Colony Family Home
