- fabula_uuid: ger_location_cb80dc8214cc
  global_id: ger_location_cb80dc8214cc
  canonical_name: Snowed-In Ski Lodge (Holodeck Simulation)
  description: 'A compact, snowbound ski lodge rendered inside the holodeck: low,
    timbered ceilings, frosted windowpanes that frame an artificial white expanse,
    and the close, warm smell of burning wood that competes with the sterile hum of
    the simulation. Conversation lands against padded chairs and a small stone hearth;
    laughter and flirtation ripple through the manufactured hush. The space functions
    as social bait—an intimate, cozy refuge designed to loosen discipline and invite
    temptation—casting responsibility as a distant worry while spotlighting personal
    isolation and the cost of duty.'
  location_type: Holodeck Ski Lodge (Recreational Interior)
