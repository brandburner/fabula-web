- fabula_uuid: ger_location_f02bbd938625
  global_id: ger_location_f02bbd938625
  canonical_name: Stargazer Bridge
  description: The Stargazer Bridge stands as a derelict, battle-scarred command center
    aboard Captain Picard's long-lost starship, the USS Stargazer. Scorched and haunted
    by fire damage and faded echoes of a phantom battle, the bridge embodies both
    a physical ruin and a psychological battleground. Here, Picard materializes amid
    ghostly memories and visceral hallucinations, confronting a ruthless mental assault
    by DaiMon Bok and the sinister Thought Maker device. The space reverberates with
    the tension of spectral combat and personal vendetta, as flickering consoles and
    shadowed tactical stations witness the captain’s struggle to reclaim both his
    command and sanity. This bridge melds tragic history with fierce internal conflict,
    anchoring pivotal events of discovery, confrontation, and the enduring scars of
    past war.
  location_type: Spaceship Bridge
