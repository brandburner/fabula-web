- fabula_uuid: ger_location_43ddca9de8db
  global_id: ger_location_43ddca9de8db
  canonical_name: Boradis System
  description: 'Boradis System sits as a cold nodal sector on star charts—a nearby
    stellar cluster that functions chiefly as a navigational reference and rendezvous
    anchor. It smells of urgency aboard the bridge: mission coordinates fall just
    outside its jump points, colonies and outposts dot its periphery, and ships thread
    its lanes under time pressure. The system reads as operational space rather than
    a set-piece world—practical, taut, and charged with the unspoken stakes that drive
    a warp‑nine intercept and secretive Starfleet orders.'
  location_type: Star System
