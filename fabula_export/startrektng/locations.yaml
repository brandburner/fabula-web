  global_id: ger_location_f48ab92c7c6c
  canonical_name: Porte de Nesle
  description: Porte de Nesle appears in the Cyrano de Bergerac narrative as a stone
    gate in 17th-century Paris, site of the protagonist's legendary stand against
    a hundred foes. Barclay, performing as Cyrano, boasts of the clash amid torchlit
    shadows and clanging steel on cobblestones. The gate embodies swashbuckling defiance,
    its arched entrance framing a tale of solitary valor that underscores themes of
    bravado masking deeper vulnerabilities. Crew members hear this reference in the
    holodeck dining room, evoking the raw energy of nocturnal combat.
  location_type: Parisian City Gate
