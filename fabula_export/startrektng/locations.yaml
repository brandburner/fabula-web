  global_id: ger_location_7c0349516b25
  canonical_name: Jovian Run
  description: Jovian Run stretches from Jupiter's turbulent storms to Saturn's ringed
    expanse, a gauntlet of gravitational shear, debris clouds, and high-velocity maneuvers
    that shuttle pilots navigate at the edge of disaster. Jellico and Geordi cut their
    teeth here, executing Titan’s Turn—a razor-sharp slingshot around Titan that demands
    flawless timing and iron nerves. Their shared history on this brutal route sparks
    rare camaraderie amid mission tensions, the memory of roaring engines and whipping
    g-forces underscoring their proven expertise.
  location_type: Hazardous Interplanetary Shuttle Route
