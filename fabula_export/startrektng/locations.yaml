- fabula_uuid: ger_location_275d6d5a2944
  global_id: ger_location_275d6d5a2944
  canonical_name: Station Core
  description: The operational heart of Tyran Station, the Station Core is an unfinished
    expanse where engineers scramble amid scattered consoles, exposed access tunnels
    (including Conduit A-Four), and the massive particle fountain core. Tension saturates
    the air as equipment glitches, tremors rattle the deck, alarms shriek, and explosions
    tear through plasma lines. The core's instability is amplified by its raw access
    tunnels—narrow passages cluttered with construction debris and vibrating with
    tremors from the failing particle fountain. This is the epicenter of technical
    peril and ethical reckoning, where Geordi and Farallon clash over designs, deploy
    exocomps, order evacuations, and witness machine sacrifice. The core includes
    both the main operational area and its integrated access tunnels, which are critical
    to its function and the unfolding crises.
  location_type: Space Station Transporter Platform
