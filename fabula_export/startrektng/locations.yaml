  canonical_name: Deep Space (Moab IV Stellar Fragment Diversion)
  description: Moab IV is an uncharted planet hosting a secretive human colony on
    its southern continent, originally shielded by an artificial environment. The
    Enterprise crew initially detects human life signs and obsolete subspace emissions,
    but their hails trigger hostile shield activations. The planet faces imminent
    seismic catastrophe due to gravitational pulls from a nearby stellar fragment,
    which threatens to destroy the colony within days. Starfleet's intervention successfully
    diverts the stellar fragment, averting the disaster but leading to the colony's
    collapse. The planet serves as a poignant symbol of the moral complexities and
    human cost of the Prime Directive, leaving the Enterprise crew—particularly Captain
    Picard—with profound regret and existential reflection.
