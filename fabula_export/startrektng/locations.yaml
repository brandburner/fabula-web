  canonical_name: Lady Marian's Chamber
  description: Guards march Vash through Nottingham Castle's corridors to Lady Marian's
    chamber, a secluded stone room lit by flickering torches. Sir Guy confines her
    here to ready for their wedding, the heavy door sealing her in amid the castle's
    watchful shadows. The space enforces her assumed role, amplifying the deception's
    stakes as distant courtyard plots unfold.
