- fabula_uuid: ger_location_8c5d901c462c
  global_id: ger_location_8c5d901c462c
  canonical_name: Simulated Switzerland (Holodeck Ski Program)
  description: 'A manufactured Alpine landscape that unfolds within the ship’s holodeck:
    crisp, simulated air carries the sting of cold and the pine-sweet scent of fir
    while granular snow crunches underfoot. Sunlight slants across slope ridgelines;
    a distant chairlift croons and laughter ricochets off invisible valley walls.
    The illusion tempts with camaraderie and escape, but a low, clinical hum of ship
    systems threads the scene, reminding users that exhilaration sits atop engineered
    safety. Functionally, the space operates as a recreational gathering point for
    teenagers and a staged setting where social dynamics and private choices play
    out under artifice.'
  location_type: 'Holodeck Simulation: Alpine Ski Resort'
