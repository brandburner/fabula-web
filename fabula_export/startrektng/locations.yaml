  description: The forward control center of the runabout, equipped for high-stakes
    temporal and navigational emergencies. Includes helm controls, a central command
    position, and diagnostic stations for real-time monitoring of chroniton fields,
    fuel drains, and spacetime distortions. This is where the crew pilots the runabout,
    communicates with the *Enterprise-D*, and makes critical decisions during the
    temporal anomaly. Distinct from the aft living quarter, which lacks flight controls
    and specialized diagnostic tools.
