- fabula_uuid: ger_location_938182e7aa8a
  global_id: ger_location_938182e7aa8a
  canonical_name: Federation Medical Collection Station (Science Station Tango Sierra)
  description: 'Orbital Federation medical/research station combining sterile pharmaceutical
    production and bio-sample handling: a clean-room, biosafety-rated facility that
    stores and processes plague samples (containment pods, biosafety hoods) and develops
    antidotes and therapeutics. Operates under strict quarantine/protocols while supporting
    triage and research missions (scenes reference staff such as Hester Dealt). This
    entity consolidates the formal Federation designation and the operational callsign
    ''Science Station Tango Sierra.'''
  location_type: Orbital Plague Research Facility
