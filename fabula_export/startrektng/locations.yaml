- fabula_uuid: ger_location_b6dbb00fdcf6
  global_id: ger_location_b6dbb00fdcf6
  canonical_name: Nursery (USS Enterprise-D)
  description: Dimly lit and hushed, this room aboard the USS Enterprise-D cradles
    the newborn Juarez baby in a simple bassinet. Picard stands over the infant in
    his dress uniform, eyes fixed in quiet reverence as he whispers a welcome, the
    child's tiny breaths a stark counterpoint to the ship's impending destruction.
    The Nurse checks on the baby before slipping out. Data enters seeking Crusher,
    pauses at the scene, identifies the child, and shares the silence with Picard.
    Gentle lighting casts soft shadows, amplifying the fragile hope amid catastrophe.
  location_type: Starship Nursery
  parent_location_uuid: null
