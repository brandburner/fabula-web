  global_id: ger_location_4af4c1f54bd8
  canonical_name: Planet Surface (Gamma 2-5, Borg-Ravaged Sector)
  description: |-
    The surface of **Gamma 2-5**, a sector of an unnamed Borg-ravaged planet where Picard's team probes for traces of a Borg attack under clear skies before contact cuts off. This location is a high-stakes battleground where:
          1. **Riker’s Away Team** (Riker, Worf, and security guards) sweep the disrupted ground with tricorders, facing comms failure and a looming Borg ship from orbit.
          2. **Beverly Crusher** risks returning to the surface under the threat of Lore and Borg assimilation, navigating transporter delays.
          3. **Environmental Hazards**: The terrain is barren and exposed, with no cover from orbital attacks. Electromagnetic storms (mentioned in the target entity) disrupt sensors, heightening the dread of hidden Borg threats.
          The sector is later the site of a frantic extraction under Red Alert as the Borg ship charges weapons, isolating the team amid the planet’s electromagnetic interference.
