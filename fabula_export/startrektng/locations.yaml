  global_id: ger_location_9baeab558b57
  canonical_name: Igo Sector
  description: A remote stellar expanse in Federation space, characterized by binary
    star systems and extreme plasma phenomena. Serves as the primary setting for the
    USS Yosemite's distress and the USS Enterprise-D's rescue mission. Distortion
    fields and ionic interference within the sector impede standard Starfleet operations,
