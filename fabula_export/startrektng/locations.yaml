- fabula_uuid: ger_location_155f2f7df03b
  global_id: ger_location_155f2f7df03b
  canonical_name: China
  description: 'China appears as a long-inhabited, continental nation invoked here
    as a cultural and historical touchstone rather than a visited set-piece. Picard
    summons its weighty legacy—ancient cities, seafaring voyages, and once-mythic
    accomplishments—to dramatize how exploration converts legend into verifiable history.
    The mention conjures crowded markets, weathered stone, and layered traditions
    only insofar as they function rhetorically: a remembered, tactile world that collapses
    distance and certitude, sharpening curiosity and destabilizing complacent skepticism
    in the ready room exchange.'
