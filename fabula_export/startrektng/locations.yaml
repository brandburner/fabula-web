- fabula_uuid: ger_location_968141ec195e
  global_id: ger_location_968141ec195e
  canonical_name: Asteroid Debris Field
  description: 'A brooding expanse of tumbling rock and scattered wreckage where hulking
    asteroids and shards of a Promellian vessel drift in slow, dangerous orbits. Darkness
    breaks in cold glints off twisted metal; shields hum and consoles track unpredictable
    trajectories. Gravitative pulls and sudden shadows make navigation a tactile,
    high-stakes art—one miscalculation means catastrophic impact. This field operates
    as both battlefield and deathtrap: the site of the Enterprise''s desperate slingshot
    maneuver, the Promellian cruiser''s final destruction, and a crucible that forces
    human instinct to override automation.'
  location_type: Deep Space Debris Field
