  canonical_name: Deep Space Warp Field (Galen Distress and Yridian Attack)
  description: The USS Enterprise powers through this star-streaked expanse at high
    warp, nacelles glowing as elongated star trails streak past the hull. Sensors
    suddenly detect Professor Galen's shuttle under assault from Yridian ships. Phaser
    beams lance across the void, Picard's precise disabling shots forcing surrender
    amid the hum of warp drive and red alert klaxons. Isolation amplifies urgency
    as crew rescues the mentor amid galaxy-spanning intrigue over ancient DNA secrets.
