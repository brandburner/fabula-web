  global_id: ger_location_da6553569463
  canonical_name: Planet's Ionosphere (E and D Regions)
  description: Charged particles fill the planet's ionosphere in the E and D regions,
    forming a turbulent barrier where the Tamarian scattering field concentrates in
    the upper D layer. The shuttlecraft plunges through during descent, sensors flickering
    as communications cut out. Data reports the interference precisely while Worf
    fights failing controls after a targeted phaser strike severs the starboard nacelle
    and thrusters, stranding the craft and amplifying the crew's isolation and urgency.
  location_type: Planetary Atmospheric Layer
