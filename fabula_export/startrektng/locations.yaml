- fabula_uuid: ger_location_0e38fc671ab1
  global_id: ger_location_0e38fc671ab1
  canonical_name: Gravesworld
  description: Gravesworld looms as an isolated planet shrouded in unsettling silence,
    its surface a temporary haven for the brilliant but terminally ill scientist Ira
    Graves. The absence of follow-up communications after the initial distress call
    casts a pall of mystery over its barren landscapes, hinting at unseen dangers
    lurking beneath its desolate exterior. Transport anomalies plague arrival to this
    world, where spatial disorientation rattles even seasoned Starfleet officers.
    Graves' compound stands as a lone bastion of human presence—a claustrophobic stage
    where egotistical genius grapples with mortality, ethical boundaries blur, and
    desperate bids for immortality unfold. The planet becomes both a physical destination
    and a psychological crucible, its receding image in an observation lounge window
    mirroring the unresolved tensions left in the Enterprise's wake.
  location_type: Scientific Outpost Planet
