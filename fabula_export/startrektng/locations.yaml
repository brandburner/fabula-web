  canonical_name: Farpoint Station Underground Passages
  description: Farpoint Station Underground Passages wind through shadowed, concealed
    corridors beneath the bustling surface of the station. This includes a cavernous,
    dimly glowing tunnel composed of utterly alien material pulsing with otherworldly
    energy, serving as a nexus of psychic and existential turmoil. The passages evoke
    hidden menace and mystery beneath the station’s polished surface, forming a critical
    location for exploration and narrative tension.
