  global_id: ger_location_f8d2a7c0f18d
  canonical_name: Mars
  description: Mars floats red and barren in the black expanse of space, its dusty
    craters and thin clouds stark against the void. The Borg cube glides past without
    pause, shrugging off salvos from unmanned pods that streak from Martian defenses.
    Cutaway shots capture the planet's isolation as explosions bloom silently nearby,
    the futile resistance underscoring the Borg's unstoppable surge toward Earth and
    amplifying the crew's desperation light-years away.
