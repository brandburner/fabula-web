  canonical_name: Stone Block Stairway to Old Bandi City
  description: The stone block stairway rises sharply from glowing alien tunnels into
    the ancient ruins of Bandi City beneath Farpoint Station. Rough-hewn and weathered
    by time, the stairway acts as a precarious threshold between mysterious underground
    passages and the long-abandoned city above. Flickering lights and echoing explosions
    cast ominous shadows along the worn steps as Commander Riker and Data ascend alone,
    navigating this dangerous conduit under mounting pressure. This narrow passage
    embodies rising tension and isolation, marking a critical juncture in the away
    team's perilous mission to uncover the secrets hidden within the subterranean
