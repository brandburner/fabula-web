- fabula_uuid: ger_location_93e7468cea2b
  global_id: ger_location_93e7468cea2b
  canonical_name: Jenna's Quarters
  description: 'Jenna''s quarters overflow with creative disorganization: art objects
    crowd shelves, decorations spill onto every surface, casually discarded clothing
    drapes chairs, and shoes scatter across the floor. This warm, cluttered refuge
    starkly contrasts the Enterprise''s sterile precision, embodying Jenna''s emotional,
    personal chaos. Data dims the lights here for tentative romance, delivers flowers
    at the door, performs scripted affections amid the mess, and confronts disillusionment
    as kisses reveal his divided processors. Intimate tensions build and break in
    this personal haven.'
  location_type: Starship Personal Quarters
