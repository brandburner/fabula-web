  global_id: ger_location_06efcddd61bd
  canonical_name: Hills Beyond the Village (Kataan)
  description: Picard as Kamin traverses these arid, barren hills outside the village
    on Kataan, climbing steep ridges and scanning the vast, featureless horizon for
    traces of his Starfleet past. Dust swirls underfoot; unyielding rock and empty
    expanses amplify his isolation, the landscape's harsh silence mirroring the futility
