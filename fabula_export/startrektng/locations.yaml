  description: N'Vek pitches Draken Four as the warbird's next stop, the safest undetected
    path through Romulan space for defectors aboard. He frames it as a planned rendezvous
    where allies wait beyond enemy sensors, free from immediate pursuit. Troi counters
    sharply, rejecting the distant haven for direct Enterprise contact, her choice
    underscoring the planet's role as a shadowed fallback amid mounting risks and
    cloaked tension.
