- fabula_uuid: ger_location_371954e4facb
  global_id: ger_location_371954e4facb
  canonical_name: Angel One Executive Office
  description: 'The executive office on the planet Angel One: a compact, private chamber
    with low, controlled lighting pooling across a central desk and two close-set
    chairs. The air carries the faint tang of polished wood and recycled ship/shipyard
    air; with the door closed voices drop to charged whispers and the room functions
    as both confessional and negotiation chamber. It is the enclosed stage for intimate
    conversations and political/cultural testing involving figures such as William
    Riker and Beata.'
  location_type: Starship Officer's Office
  parent_location_uuid: ger_location_d607e99b2c86
