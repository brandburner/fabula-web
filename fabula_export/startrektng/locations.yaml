  global_id: ger_location_0f9602690d87
  canonical_name: Sixth Planet (Class M) — Mission Target
  description: 'A pale Class M world observed as a mission target and surveyed as
    a dead‑city planet: continents and coastal outlines resolve into ruined infrastructure
    — linear roads across scorched plains, jagged surface rips where whole cities
    vanish, and skeletal industrial terraces with no standing civic life. Sensor overlays
    translate the planet into forensic data, converting scientific curiosity into
    urgent dread as the crew treats the world as both crime scene and immediate objective.'
  location_type: Remote Planet (Viewscreen Display)
