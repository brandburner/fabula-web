  global_id: ger_location_213e87c9454d
  canonical_name: Main Viewer
  description: A cavernous forward screen that dominates the bridge, the Main Viewer
    converts unseen threats into urgent, legible spectacle. Officers crowd its glow
    as sensors flicker; a faint contact sharpens into the unmistakable silhouette
    of a Romulan cruiser, and the room’s instinctive readiness hardens into a higher-stakes
    restraint. The Viewer functions as both tactical instrument and diplomatic stage—projecting
    a single, inescapable image that forces choices, calms some hands and quickens
    others. Its bezel hums with data banners, reflected in tense faces and dim consoles,
    turning raw uncertainty into a focused point of consequence for command.
