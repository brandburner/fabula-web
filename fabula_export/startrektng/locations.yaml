  canonical_name: Aft Science Station
  description: Data mans the aft science station on the USS Enterprise-D bridge, LCARS
    panels glowing with Mar Oscura nebula scans and planetary readouts. Picard, Riker,
    Worf, and McKnight coordinate nearby—Riker clears planet probes, Worf logs ship
    incidents, Data proposes subspace causes. Picard orders warp one; as McKnight
    executes, station and wall shimmer out of existence, red alert klaxons wail, Worf
    reports Deck 37 decompression. Post-nebula jolt, crew huddles here again, Data
    recalibrates L-U band telemetry while Worf confirms light damage. Consoles hum
    under crisis pressure, anchoring analysis amid warp failures and structural scares.
