  description: 'A vast, industrial hold aboard the Enterprise, its cavernous metal
    volumes and overhead gantries bathe in harsh, utilitarian lighting while echoes
    magnify every voice. Crates and gantries loom like silent witnesses as a packed
    crowd presses across grated decking; the tang of recycled air and the sharp metallic
    scent of equipment hang under the swell of human breath. Here, logistical infrastructure
    yields to civic urgency: officers and colonists jostle for space as argument and
    rhetoric slice through the clangor. The bay converts into an improvised forum
    where leadership is brokered and moral burdens are publicly contested, turning
    private compromises into decisive political acts amid the ship’s industrial heart.'
