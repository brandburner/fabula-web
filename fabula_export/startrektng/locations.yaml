  description: Q transports Picard and his crew into this dense simulated woodland
    of ancient oaks and tangled paths, clad in 12th-century tunics and hoods. Arrows
    whistle through the trees during Sir Guy's ambush; Worf takes an injury defending
    Picard as they flee deeper into the shadows. A sun-dappled glade offers brief
    respite where Beverly binds wounds, shattered when Q materializes as High Sheriff.
    Night falls treacherous with hedge robbers lurking, yet it hides Picard's Merry
    Men as their outlaw base and planned safe haven amid the peril.
