  global_id: ger_location_a011267c7fea
  canonical_name: Battle of Cheron
  description: An invoked scar on Romulan memory and a named locus of historical grievance,
    the Battle of Cheron functions here as a charged reference rather than a mapped
    site. Uttered by the wounded defector Setal in the Observation Lounge, the name
    carries the weight of treaty repudiation and military rationale—a moral and political
    fulcrum that stiffens Romulan posture and justifies aggression. Physical specifics
    remain unspecified in the scene; the term operates as mnemonic thunder, summoning
    distrust, loss, and the threat of renewed conflict.
  location_type: Historical Battlefield
