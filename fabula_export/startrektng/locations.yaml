    cold, deliberate lighting carves the minister’s silhouette into a posture of authority.
    Voices crack with protocol and accusation; the room’s hush tightens every sentence
    into diplomatic weight. Seen only via viewscreen, the office functions as a remote
    podium for crisis—staged, controlled, and designed to project sovereign resolve
    while turning private counsel into public pressure.'
