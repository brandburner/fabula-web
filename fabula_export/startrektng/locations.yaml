  global_id: ger_location_2444ba790f8e
  canonical_name: Ro's Maquis Ship
  description: Ro beams aboard this rebel vessel, her form solidifying amid transporter
    glow as she embraces her Maquis future. The ship serves as a mobile base for Maquis
    operations, featuring a cockpit (where Kalita grips controls during auto-pilot)
    and a rear panel area (where Ro crouches to crack Starfleet encryption). Phaser
    holstered after standoff with Riker, she stands resolute in the tense confines,
    consoles humming under dim lights while crew absorbs her defection. The space
    pulses with insurgency's raw edge—scent of recycled air, echoes of her confession
    that she belongs here, severing Starfleet ties forever amid the hum of warp engines
    driving their fight. Key events include Ro's defection, sensor buoy disabling,
    and near-Demilitarized Zone border operations.
  location_type: Maquis Starship
