  description: Remote star system where the Enterprise pursues DaiMon Bok's probe,
    matching Birta's intel on its Ferengi particle signature. Central to the *Bloodlines*
    episode (S7E22), characterized by sensor sweeps, pulsar ghosts, and nebula haze.
    **Distinct from Ufandi System (S7E21), which involves the Duras sisters' magnesite
    heist and a Klingon ambush.**
