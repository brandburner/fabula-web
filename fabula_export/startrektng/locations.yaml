- fabula_uuid: ger_location_d0e1b5edf205
  global_id: ger_location_d0e1b5edf205
  canonical_name: Morgana Quadrant
  description: The Morgana Quadrant stretches as a vast, uncharted region of space
    that beckons the USS Enterprise with the alluring mystery of the unknown. Mentioned
    urgently in Picard's logs, this sector hums with the promise of discovery—until
    a perplexing anomaly transforms it into a cosmic trap. The quadrant devours probes
    whole, defies sensors with an insatiable void, and sparks unease through both
    scientific gaps (Data's rare 'I do not know') and cultural dread (Worf invoking
    Klingon legends of devouring space creatures). What begins as a routine exploration
    target becomes an existential threshold when the Enterprise crosses irrevocably
    into the silent, system-disabling maw of the anomaly—recasting the quadrant's
    endless starfield as a stage for first contact with an incomprehensible cosmic
    force.
  location_type: Deep Space Anomalous Sector
