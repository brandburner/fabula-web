- fabula_uuid: ger_location_62603d59718e
  global_id: ger_location_62603d59718e
  canonical_name: Small Neutron Star (Binary Companion)
  description: A dense, compact stellar corpse locked in a lethal orbital duet with
    a swollen red giant, this small neutron star radiates harsh pulses of ionizing
    energy and tight gravitational gradients that pinch space and stress nearby vessels.
    Approaching the object bathes instruments in spiking radiation, compresses tidal
    fields, and drives instruments to white-noise agitation; onboard, alarms bite
    and shielding strains as experiments and fragile cargo—like a nanite container—face
    sudden containment failure. The star functions as both scientific quarry and imminent
    hazard, an austere locus of awe, danger, and moral reckoning for crews drawn too
    close.
  location_type: Compact Stellar Object (Neutron Star, Binary Companion)
