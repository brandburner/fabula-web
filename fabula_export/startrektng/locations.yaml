  canonical_name: Lava Tube Passageway and Chamber
  description: A subterranean lava tube system featuring a narrow, constricted passageway
    leading to a jagged chamber at its end. The passageway is marked by jagged rock
    walls, fresh rubble from a recent cave-in, and unstable fissures that groan underfoot.
    Dust chokes the air, and flashlight beams reveal twisting paths ahead. The chamber
    at the end of the passageway is a larger, irregularly shaped space where Picard
    stands amid swirling rock dust as Worf emerges from the collapsed tunnel clutching
    Beverly Crusher. The entire system is unstable, with rubble shifting underfoot
    and tension spiking with each groan from settling stone, reflecting the team's
    fragility in the hostile subterranean environment.
