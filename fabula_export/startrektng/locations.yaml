  global_id: ger_location_a92aff7b37b1
  canonical_name: Port Nacelle Exterior (Area of the Nacelles)
  description: Exterior sector of the ship’s nacelle cluster (port-side) where propulsion
    hardware and hull plates are exposed to vacuum. Sensor readouts and alarms spike
    as energy flares / focused beams strike the nacelle area, causing nacelle vibrations,
    power conduit failures, and the collapse of steady warp telemetry. The space reads
    as intimate and vulnerable — engineers watch lights wink out while the bridge
    confronts physical proof of propulsion failure; in the same event a subtle, silent
    contact (sensed by Data) brushes the hull. Consolidates descriptions of focused
    impact on the nacelle cluster with the specific port-nacelle sensory moment.
  location_type: Warp Nacelle Exterior
