  description: Riker pilots a shuttlecraft straight to the Starship Endeavor, carrying
    Etana's mind-control device disguised as an addictive game. This Starfleet vessel
    stands as the next target in her network expansion, its crew poised for infection
    upon his arrival. The orders from the Enterprise bridge mark it as a key node,
    where unquestioning obedience will soon grip officers and engineers alike, turning
    the ship's corridors and bridge into extensions of Ktarian domination.
