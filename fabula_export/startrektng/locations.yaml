  global_id: ger_location_56eaa8f89fe0
  canonical_name: Tarod Nine
  description: 'Tarod Nine sits as a remote planetary outpost that the Enterprise
    closes on, its sensors returning a single chilling verdict: utterly wiped, everyone
    and everything gone. The world registers as an absence more than a place — a silent
    target on the viewscreen whose emptiness reads as threat. That vacuum of life
    sparks immediate bridge anxiety, driving tactical demands for Red Alert while
    pulling against diplomatic restraint. Tarod Nine functions as a narrative fulcrum:
    an annihilated waypoint whose sensor-silence forces agonized choices between safety
    and measured investigation.'
