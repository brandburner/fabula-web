  global_id: ger_location_4bac8b6c1368
  canonical_name: Barzan Wormhole
  description: 'The Barzan Wormhole: a capricious, luminous aperture in charted space
    that alternately appears as a ragged, light-bending opening and as an invisible,
    disorienting conduit. It radiates unstable energy (meson/lepton activity), exerts
    a faint gravitational tug, and causes instruments and vessels to misroute; the
    phenomenon produces sensory effects (bent light, smeared colors, faint metallic
    ozone) and generates acute tactical and political consequences as factions contest
    its control.'
  location_type: Interstellar Wormhole (Spatial Anomaly)
