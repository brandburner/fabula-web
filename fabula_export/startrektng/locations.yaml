- fabula_uuid: ger_location_da5c5b565967
  global_id: ger_location_da5c5b565967
  canonical_name: Secret Romulan Storeroom (Hidden in Rebuilt Tunnels)
  description: A cramped, cluttered storeroom hidden within the Romulan base's rebuilt
    tunnels, forgotten during the facility's reconstruction. The space is filled with
    stacked crates, one of which conceals a hand-drawn or synthetic cloth map of the
    facility (marking the shuttle bay and comms hub). The storeroom is dimly lit,
    with dust motes suspended in the air, amplifying the tension during a critical
    confrontation between Riker and Ethan. The illusion of the Romulan base fractures
    here, exposing the raw cavern walls beneath and revealing the deception orchestrated
    by Ethan. Romulans led by Tomalak burst in during this moment, marking the climax
    of the deception and the shattering of trust between the characters.
  location_type: Romulan Base Storeroom
