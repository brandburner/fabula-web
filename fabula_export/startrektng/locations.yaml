    its worn upholstery scarred by decades of ritual and combat. The chair commands
    the forward arc, catching the harsh glow of red status lights and the low rumble
    of Klingon processors; sweat, metal oil, and the tang of exertion hang in the
    recycled air. Officers ring the seat like a tribunal, voices rising into cheers
    or accusation as the occupant converts gesture into law. Here authority crystallizes
    into physical performance—oaths are demanded, loyalty tested, and brutality meted
    out to forge command legitimacy—making the chair less furniture than stage for
    violent social adjudication.
