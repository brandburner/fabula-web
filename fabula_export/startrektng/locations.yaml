- fabula_uuid: ger_location_3c63ff4309b7
  global_id: ger_location_3c63ff4309b7
  canonical_name: Purifying Station Pool
  description: A low, concrete basin where water roils and froths under mechanical
    aerators, the Purifying Station Pool hums with industrial purpose. Technicians
    lean over railings, dipping probes and clamping test rigs as a fine spray mists
    the air; clamp clicks, meter beeps, and wet shoes slap the grated catwalk. Harsh
    daylight throws hard reflections off oily ripples while the chemical tang and
    metallic chill mark this place as both utilitarian and urgent. The pool functions
    as a public worksite and a narrative threshold—workers’ testing and movement stage
    the opening actions and invite confrontation, alliance, and improvisation at the
    colony’s waterworks.
  location_type: Industrial Water Purification Pool
  parent_location_uuid: null
