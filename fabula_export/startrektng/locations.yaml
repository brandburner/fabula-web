  canonical_name: Bathroom Area within Clara's Quarters (USS Enterprise-D)
  description: Troi guides Clara into this compact bathroom area adjoining her quarters
    aboard the USS Enterprise-D, eyes darting across standard starship fixtures in
    search of Isabella. Sonic shower stall stands empty under automatic lights, sink
    cluttered with child's soaps and brushes beside a fog-free mirror reflecting their
    strained faces. Recycler vents hum softly in the sterile enclosure, yielding no
    alien sign but sharpening Clara's anxiety amid the brief, fruitless inspection
    that builds dread in the heart of home.
