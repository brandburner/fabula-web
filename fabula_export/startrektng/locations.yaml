  global_id: ger_location_63e8e9e3a637
  canonical_name: Ranian System
  description: 'A tense, shadowed star system flagged as the site of a recent hostile
    presence and now ringing with absence. Reports land like cold instruments: Worf’s
    sweep confirms the enemy has vanished, leaving ships and crew to weigh the silence.
    The system reads as both tactical coordinate and moral question—empty orbital
    signatures, muted sensor returns, and the bridge’s low hum combine into a taut
    atmosphere of uncertainty. The name functions as a destination and a dilemma,
    driving immediate search protocols and cautious command choices.'
