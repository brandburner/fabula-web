- fabula_uuid: ger_location_68918357323a
  global_id: ger_location_68918357323a
  canonical_name: Little Big Horn
  description: 'A storied nineteenth‑century battlefield invoked as a cautionary emblem
    of doomed sacrifice and public humiliation. Picard cites Little Big Horn as an
    analog to Custer’s last stand — a windswept burial ground of tactical hubris where
    valor and miscalculation collide. As spoken memory rather than a physical set
    piece in the scene, the place functions narratively as historical punctuation:
    a remote, echoing landscape of graves and broken standards that reframes contemporary
    betrayal as catastrophic pride.'
  location_type: Historical Battlefield
