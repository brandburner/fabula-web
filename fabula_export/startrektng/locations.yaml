- fabula_uuid: ger_location_ccbdefc668ca
  global_id: ger_location_ccbdefc668ca
  canonical_name: A Ship at Sea
  description: 'Salt tang and the endless slap of waves frame this remembered seagoing
    vessel — timber groans, rigging sings, and night watchlights smear across wet
    decks. The space condenses motion and intimacy: cramped corners become stages
    for furtive conversations, the horizon offers both anonymity and escape, and the
    constant rhythm of the sea lulls confessions into permanence. Narratively, the
    ship functions as an origin locus for Rishon and Kevin’s bond, an emblem of renewal
    and romantic beginning recalled against the ruin of Rana IV and the sharper present-day
    suspicion.'
  location_type: Seagoing Vessel (Civilian)
