  global_id: ger_location_877eaf258408
  canonical_name: Bok's Ship
  description: Daimon Bok's starship orbits three hundred billion kilometers from
    the Enterprise. Bok transmits a pre-recorded message from its confines, his face
    filling the viewscreen as he reveals Jason Vigo bound in heavy chains, a knife
    pressed to the captive's throat. The threat marks the anniversary of Bok's son's
    death at Picard's hands, driving Picard to order maximum warp pursuit and demand
    Data attempt a perilous subspace transport to board the vessel directly.
