  description: Data directs colonists to these subterranean caverns in the east hills,
    one kilometer east of Melona Colony, as the Crystalline Entity descends. Cool,
    shadowed chambers and twisting tunnels carved into rocky hillsides shield against
    the Entity's surface-scouring energy. Colonists race toward this natural refuge,
    its depths offering desperate cover amid whirring dread and darkening skies, a
    stark contrast to the sunlit valley's sudden peril.
