  global_id: ger_location_d0c8350729f3
  canonical_name: Ship's Decks (Twelve Decks)
  description: A stacked labyrinth of twelve decks yawns through the vessel, each
    level a ribbon of corridors, bulkheads and compartmented rooms that carry the
    ship’s life and labor. Emergency lights gutter along stairwells and maintenance
    ladders; distant alarms ricochet between levels as med calls ping in from all
    directions. The air tightens with recycled breath and effort — boots on metal,
    shouted orders, and the brittle scent of antiseptic — conveying a dispersed, shipwide
    crisis where human hands scramble to hold survival together across vertical distance.
  location_type: Starship Multi-Deck Section
