- fabula_uuid: ger_location_6ecba7d980ef
  global_id: ger_location_6ecba7d980ef
  canonical_name: Romulan Science Vessel Engine Room
  description: A cramped, disaster-stricken engineering space aboard a Romulan science
    vessel, where smoke, flames, and dead crew members create a tense atmosphere.
    The spherical warp core chamber—accessed via a single hatch—pulses erratically,
    inches from breach, while emergency bulkheads seal the area from the rest of the
    ship. Smaller than the *Enterprise*'s engineering section (approximately half
    its size), the space features Romulan-specific design elements, including a depolarized
    graviton generator and molecular phase inverter consoles. Away teams (e.g., Riker’s
    team, including Data, Geordi, and Ro) materialize here to address core implosions,
    transporter failures, and sabotage, often amid strained alliances with Romulan
    crew (e.g., Mirok). The environment is characterized by acrid smoke, flickering
    equipment, and urgent coordination to prevent catastrophic failure.
  location_type: Starship Engine Room
