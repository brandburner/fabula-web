- fabula_uuid: ger_location_aafebe0df57e
  global_id: ger_location_aafebe0df57e
  canonical_name: First City (Klingon Capital)
  description: The sprawling Klingon capital city, known as **First City**, encircles
    the Great Hall and serves as the political and cultural heart of the Klingon Empire.
    Its exterior is characterized by broad avenues, towering structures, and jagged
    stone architecture under a brooding sky. The city's streets carry the metallic
    tang of blood from ritual combats, while rigid arches frame gatherings of the
    High Council. Distant patrol chants and echoing roars underscore the empire's
    unyielding scale and the warrior society's internal power struggles. Guards stride
    shadowed plazas, their vigilance reflecting the city's role as a volatile political
    hub amid succession threats and Gowron's rule.
  location_type: Klingon Capital City Exterior
