  canonical_name: Storm Belt around the Floating Structure (frozen methane plain)
  description: A vast, furious ring of atmospheric violence encircling a lone, impossibly
    constructed building on a frozen methane plain. The belt batters approaching craft
    with razor winds, blinding sheets of ice and abrasive methane sleet, intermittent
    blue lightning and ionized discharges that crunch sensor arrays, and electromagnetic
    interference that garbles navigation fixes. A narrow band of marginally breathable
    atmosphere clings to the structure, making the storm both barrier and beacon and
    forcing any approach into a high‑risk navigational gauntlet.
