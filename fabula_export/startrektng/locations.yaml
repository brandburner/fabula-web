  global_id: ger_location_743b9523dd73
  canonical_name: Hydroponics Laboratory
  description: Picard pitches the Hydroponics Laboratory as a safe, educational stop
    on the children's tour, pairing it with astrophysics labs to sidestep their pleas
    for the battle bridge and torpedo bay. Patterson scoffs at the idea—'Gee, what
    fun'—highlighting its tame, scientific vibe amid the Enterprise's vast decks.
    This soil-free plant-growing space promises nutrient baths and glowing artificial
    lights, a quiet hub of life support that underscores the ship's self-sufficiency
    but bores adventure-hungry kids.
