  global_id: ger_location_eb9b6bda61be
  canonical_name: Mission Site
  description: 'A remote mission site marked by a single, defining act of violence:
    an explosive device detonates here and takes Marla Aster’s life. The location
    remains offstage and indistinct—heat and ozone implied, scorched ground and sudden
    silence imagined—yet its presence saturates the teacher’s office where the news
    is delivered. The place functions as both forensic origin and moral hinge: it
    explains trauma, justifies protection, and supplies the emotional gravity that
    reconfigures Jeremy’s ties to the Enterprise.'
