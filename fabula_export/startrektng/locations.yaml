- fabula_uuid: ger_location_6e69152efc24
  global_id: ger_location_6e69152efc24
  canonical_name: Federation Medical Dispensary
  description: 'A compact, utilitarian dispensary pressed into a civilian precinct:
    low counters ringed with crates stamped by the Federation, sealed instrument trays,
    and rows of rationed vials. The air tastes of antiseptic and polymer wrap, threaded
    with dust from hurried transport. Narrow shelves sag under labeled boxes and portable
    diagnostic kits; a battered intake desk bears a delivery manifest dated that morning.
    Functioning as a small provisioning outpost for medical supplies and emergency
    care, the dispensary serves as narrative provenance for the stolen instruments—its
    mundane logistics colliding with political urgency and forcing medical authority
    into an ethical battlefield.'
  location_type: Local Medical Dispensary
