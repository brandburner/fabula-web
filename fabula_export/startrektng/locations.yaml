  canonical_name: Unnamed Space Station (Lieutenant Riker's Stranding)
  description: Lieutenant Riker endured eight years here after transporter failure
    stranded him alone. Replicators sat dead, forcing him to ration meager supplies
    through endless shifts. A rockslide shattered his arm in the dim, echoing confines;
    he reset the bone himself amid grinding alerts and stale air. The station's failing
    systems and planetary hazards forged brutal isolation, raw survival, and unshakable
    resolve.
