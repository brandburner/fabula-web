  description: Mar Oscura Nebula is a vast, unexplored dark matter nebula—a starless
    void characterized by thick gaseous material that veils nearby stellar glows,
    creating an eerie, impenetrable frontier. The nebula poses significant risks to
    technology and navigation, including corrosive particles, warping interference,
    and structural stress on spacecraft. The *Enterprise* holds position on its outskirts
    for a photon torpedo experiment before preparing to plunge inward, while shuttlecraft
    operating within the nebula face critical system failures, isolation, and escalating
    danger. The nebula's hostile environment amplifies both physical and psychological
    strain on crews.
  location_type: Dark Matter Nebula
