  global_id: ger_location_8dcba8288b2c
  canonical_name: Dyson Sphere Central Star (Photosphere)
  description: The unstable central star within the Dyson Sphere, whose photosphere
    churns with superheated plasma and generates magnitude-12, Class B solar flares.
    The Enterprise is drawn toward this star at 90 million kilometers, with flares
    intensifying over three hours and overwhelming shields (holding at 23% capacity).
    The bridge viewscreen captures searing plasma bursts framed by the Dyson Sphere's
    enclosing shell, forcing desperate maneuvers for survival. The star's volatile
    pull and radiation pose existential threats to the ship.
  location_type: Hostile Stellar Environment
  parent_location_uuid: ger_location_e6a53f4f555b
