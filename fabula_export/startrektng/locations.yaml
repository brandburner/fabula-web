  description: 'Rhomboid Dronegar Sector 006 (aka Zero-Zero-Six): a remote deep-space
    sector that is the source of an urgent Mayday which forces the Enterprise to alter
    course. The sector''s emptiness is pierced by a drifting, powerless hulk (Pakled
    ship Mondor), producing a tense moral and operational crucible for Captain Picard
    and the bridge crew. Appears in Star Trek: The Next Generation — episode ''Samaritan
    Snare'' (scenes scene_8c8c8b28b7b618cc, scene_d8464453c934cc76) and is involved
