  global_id: ger_location_6a26623c866d
  canonical_name: Secluded Corridor (Picard Intercepts Ro Laren, USS Enterprise-D)
  description: Picard spots Ro Laren in this quiet corridor aboard the USS Enterprise-D
    and draws her aside for a private respite from the crew's suffocating attention
    after her return. Smooth bulkheads line the narrow space, the ship's engines humming
    faintly as their mentor-mentee exchange unfolds—Picard voices pride in her tactical
    growth, Ro admits his influence reshaped her life. Warmth builds until Riker's
    com badge chirps, shattering the intimacy and yanking them back to duty.
  location_type: Starship Corridor
