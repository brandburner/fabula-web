  global_id: ger_location_c061bcf7605a
  canonical_name: Koinonian World
  description: A blasted, ancient world pocked with gouges and scars that read like
    the map of a long‑forgotten battlefield. Orbital imagery pins ringed craters and
    sweeping striations of ruin, while pale, deliberate Koinonian markings etch the
    rock—archaeology and accusation in equal measure. The surface feels mute and vast
    from orbit, yet it hums with the weight of self‑destruction; the crew’s study
    of its blemishes turns clinical curiosity into urgent dread, where empathy flares,
    alarms snap, and the planet itself becomes a moral fulcrum for rescue and loss.
  location_type: Planet Surface
