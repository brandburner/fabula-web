  global_id: ger_location_e1ffc72ebf23
  canonical_name: Unseen Structure Entrance (Revolving Door)
  description: A lone, antique revolving door stands as a ceremonial threshold in
    a dead, featureless black void, marking the barely perceptible mouth of an enormous
    unseen structure. The air holds an uncanny stillness; distant ammonia storms churn
    beyond a sensor paradox that isolates the space. The door reads as deliberate
    architecture rather than natural formation—cool metal underfoot, the slow mechanical
    turn, and an eerie silence that concentrates duty, curiosity, and the terror of
    a point-of-no-return as the away team crosses into an unknowable interior.
  location_type: Extraterrestrial Structure Entrance
