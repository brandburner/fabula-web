  description: Geordi targets this narrow storage tunnel, adjacent to the chamber
    holding trapped crewmen, as the optimal breach point in the underground city's
    granite depths. Phaser banks drill a two-kilometer rescue shaft through unstable
    rock, risking collapse with every pulse. Precise calibration unlocks transporter
    access meters from the captives, turning the dim, twisting passage—scarred by
    jagged walls and faint emergency glows—into a high-stakes lifeline amid the maze's
