  global_id: ger_location_b9fe6f828c00
  canonical_name: The Royale Exterior Exits (Front Steps & Sidewalk)
  description: 'The Royale’s front exterior egress: the set of marked exit doors,
    front steps, adjoining sidewalk and curb that form a taut threshold between the
    hotel’s controlled interior and the contested street. Fluorescent lobby glare,
    leaking neon, exhaust and cigarette smoke compress the doorway into an administrative
    chokepoint and narrow arena where indoor menace becomes public danger; signage,
    staff choreography, and the physical sill shape this place as the immediate objective
    for characters pushing to escape the building.'
  location_type: Hotel Exterior Exit / Building Threshold
