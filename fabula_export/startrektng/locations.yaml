  global_id: ger_location_32c6013e6064
  canonical_name: Ohniaka III Outpost
  description: Ohniaka III Outpost, a strategically trivial Federation planetary outpost
    on the third planet of a backwater system, broadcasts a distress call through
    heavy electromagnetic interference that conceals life signs and raises Picard's
    suspicions. The outpost's surface facility serves as the site of a sudden Borg
    ambush during a routine investigation by the *Enterprise* crew. Inside, scattered
    consoles become barricades as Riker, Data, and Worf engage in a brutal confrontation
    with rogue Borg drones amid phaser blasts, shouts of rage, and slamming impacts.
    The confined space amplifies the chaos, transforming the mission into a desperate
    fight for survival.
