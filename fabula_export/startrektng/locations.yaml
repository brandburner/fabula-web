  canonical_name: Karnas's Office
  description: Karnas's Office on Mordan IV is a shadowed, tense chamber deeply embedded
    within the war-scarred infrastructure of the planet, hosting final confrontations
    between Governor Karnas, Admiral Jameson, Captain Picard, and others. The room
    symbolizes the weight of decades-long conflict, bitter history, and fragile truces
    forged amid raw emotions and political animosity. It functions as the crucible
    for diplomacy, redemption, and the painful cost of past sins within a high-stakes
    hostage crisis context.
