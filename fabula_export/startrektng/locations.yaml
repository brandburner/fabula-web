  description: The Reliant arrives in memory as a compact, service-forged Federation
    vessel that shaped Picard and Nakamura’s early careers—an anchor for a shared
    past that now surfaces as dry, clipped banter. Hull scars and faded lettering
    suggest long voyages; narrow corridors cultivate terse camaraderie and quick loyalties.
    The ship registers as a pressure-cooker of protocol and personal history, a site
