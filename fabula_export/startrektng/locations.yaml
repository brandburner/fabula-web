  canonical_name: Storm-Wracked Alien Planet Surface (Hostile Terrain)
  description: |-
    A hostile alien planet surface characterized by jagged rock formations, relentless plasma storms, and extreme environmental conditions. This location encompasses the immediate crash site of the Iyaaran shuttle and the surrounding 2-kilometer trek to a distant structure, where Picard and the ambassadors face isolation and danger. Key features include:
            - **Jagged rock formations** piercing the surface, with shadows between boulders concealing potential threats.
            - **Raging plasma storm** with lightning bolts capable of knocking characters unconscious, creating a deadly gauntlet of electrical discharges.
            - **Twisted wreckage** of the Iyaaran shuttle, a critical narrative element tied to the crash.
            - **Hostile isolation** where every environmental rumble heightens survival tension, including Picard's unconsciousness and abduction by a humanoid figure.
            - **2-kilometer treacherous terrain** leading to a distant structure, where Picard faces perilous isolation from the Enterprise.
