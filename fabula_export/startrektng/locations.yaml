  global_id: ger_location_ab871e53ab8c
  canonical_name: Doorway Near Hotel Entrance
  description: The doorway stands just off the hotel entrance, where the bookie positions
    himself to take the bellboy's bet on poker outcomes. Horse-drawn carriages rumble
    up to the curb nearby, their drivers unloading suitcases amid the clatter of hooves
    on cobblestone and the jingle of exchanged coins. Bellboys hustle luggage while
    disgruntled guests like Mister Lane emerge from losses inside, casting furtive
    glances toward this shadowed alcove. The space blends the open energy of arrival
    with discreet opportunities for wagers in 19th-century San Francisco's gritty
    street life.
