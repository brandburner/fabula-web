  global_id: ger_location_d012df198a6b
  canonical_name: Soong's Lab
  description: Soong's Lab fills a cavernous, cluttered room on a remote planet, shadows
    pooling under dim lights across high-tech consoles, cybernetic tools, and everyday
    clutter. A dentist's chair anchors adjustments and reactivations; an elaborate
    dinosaur model panorama shatters in betrayal's chaos. Doors whoosh shut automatically,
    locking in isolation. Soong severs neural links here, tests Data's obedience,
    debates humanity with his sons, reactivates Lore, then dies amid crew arrivals—dominance
    yields to vulnerability, creation to destruction.
  location_type: Planetary Android Laboratory
