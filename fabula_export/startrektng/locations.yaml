  global_id: ger_location_b40eec533956
  canonical_name: Holodeck — Romulus (Interior Recreation)
  description: 'Romulus stands as a lost planetary homeland, a tether of memory and
    identity rather than a physically present setting in the current scene. Voices
    turn toward its absent horizons: a geography of belonging that Setal mourns, a
    cultural gravity that shapes language, longing, and exile. The planet registers
    as inaccessible—its landscapes recalled like ache, its rituals and communal textures
    yearned for but denied. Within Ten-Forward the very name unlocks vulnerability,
    fuels political suspicion, and motivates Data’s controversial offer to recreate
    Romulus by technical means.'
