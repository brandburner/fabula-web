  canonical_name: Kallisko
  description: The Kallisko cuts through space as a defenseless transport ship, its
    weak shields and light weapons no match for the Crystalline Entity's pursuit.
    Captain's frantic distress calls echo across open channels, pleading for aid amid
    evasive twists. Screams erupt as the Entity overwhelms its hull, transmission
    snapping to dead silence confirmed by Data. Debris scatters in the void, the crew's
    annihilation reigniting Dr. Marr's trauma and etching helplessness into the Enterprise
    bridge.
