- fabula_uuid: ger_location_0f420b07bddb
  global_id: ger_location_0f420b07bddb
  canonical_name: Borg Nursery Chamber
  description: 'A vast, organ-like interior aboard a Borg vessel where flesh and machine
    are fused in clinical, grotesque production: cradle-like recesses and racks of
    horizontal slots hold infant bodies half-assembled into cybernetic implants while
    bio-neural conduits lace the floor and ceiling with a cold, pulsing light. The
    air carries a wet, chemical scent beneath a low mechanical hum; regenerative tissue
    strands knit into plates along the hull and surgical scaffolding and servos move
    with relentless, clinical motion. The chamber functions as production, containment,
    and living evidence—discovery here forces urgent ethical decisions, reframes tactical
    priorities, and often compels retreat.'
  location_type: Starship Nursery Chamber
  parent_location_uuid: null
