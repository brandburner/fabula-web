  canonical_name: Tarchannen III Outpost Landscape
  description: |-
    The desolate, perpetually twilit surface of Tarchannen III, where Starfleet investigators materialize to uncover the fate of the vanished outpost crew. The landscape is characterized by:
      - **Barren terrain**: Shadowy dunes and spindly black plants emerging from flawless sand
      - **Atmospheric conditions**: Perpetual twilight casting long shadows, creating an eerie stillness
      - **Key discoveries**: A torn Starfleet uniform (found by Ensign Hickman) and a derelict shuttlecraft (examined by Geordi La Forge and Susanna Leijten)
      - **Narrative significance**: The site's pristine sand (lacking footprints or signs of struggle) and gloomy silence heighten the mystery of the crew's sudden disappearance, suggesting the influence of an alien contagion or transformative planetary force. The landscape serves as a haunting backdrop for the investigation, emphasizing the planet's mysterious, transformative influence and the looming personal threats faced by the away team.
  location_type: Desolate Planet Surface
