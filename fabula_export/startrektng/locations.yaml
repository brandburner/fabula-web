- fabula_uuid: ger_location_d01630c743ab
  global_id: ger_location_d01630c743ab
  canonical_name: Starfleet Academy
  description: 'A formative institution that furnishes the tactical anecdotes and
    polished instincts officers carry into service. The Academy registers as the origin
    of Riker''s remembered maneuvers — the Tholian blind-spot gambit springs from
    its drills and scenario simulations — and functions as a repository of precedent
    that Data mines for statistical analogues. Memory of its exercises punctures abstract
    logic with human experience: training-born improvisation, competitive rehearsal,
    and ceremonial rigor feed into debates about judgment, unpredictability, and professional
    character.'
  location_type: Military Academy / Officer Training Institution
