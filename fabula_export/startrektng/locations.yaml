- fabula_uuid: ger_location_75944b210463
  global_id: ger_location_75944b210463
  canonical_name: Uxbridge House Front Door
  description: 'A battered residential threshold framed by scorched trim and peeling
    wallpaper, the Uxbridge front door opens onto a small, ruined living room strewn
    with heirlooms and dust. Lamplight and motes catch the waltz of an antique music
    box, turning ordinary domestic detail into an intrusive, almost sentient presence.
    The doorway functions as a compressed staging area: a fragile border where private
    grief presses against Starfleet procedure, where evacuation offers meet steadfast
    refusal and decisions are vocalized toward the waiting ship.'
  location_type: Residential Entryway (Front Door)
