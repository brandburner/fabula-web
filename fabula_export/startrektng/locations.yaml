  global_id: ger_location_c64fef345af2
  canonical_name: Back Door (Gia and Garvin's Home)
  description: Data slips through this shadowed back door into the home at night,
    scarf draped over his face to conceal his identity from the hunting villagers.
    Cool air carries distant shouts as he crosses the threshold, the wooden frame
    creaking softly under his careful steps. This discreet entry shields his movements,
    enabling urgent work inside amid rising peril—Gia's shocked gaze awaits, the space
    a tense gateway between external threats and fragile trust.
  location_type: Village Home Back Entrance
