  description: The USS Enterprise holds close to the Vetar amid the starry Demilitarized
    Zone void. Bridge viewscreens lock on the Cardassian ship's hull, scarred from
    Maquis phaser strikes, shields flickering low. Worf confirms rebel withdrawal;
    Picard hails Gul Evek, offering medical aid to the wounded crew. Weapons hum ready,
    transporters whine in charged silence, bulkheads vibrate with tension as fingers
    hover over controls. The black expanse sharpens diplomatic risks between Federation
    neutrality and Cardassian suspicion.
