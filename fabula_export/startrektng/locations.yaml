  description: 'A mute, distant world hangs beyond the ship''s sensor sweep — a dark,
    crescent bulk that registers as a planetary silhouette rather than a place of
    detail. It presses at the edge of perception: pale limb, featureless hemisphere,
    and the cold suggestion of gravity and distance. On the bridge it functions as
    a spatial anchor, turning abstract pursuit into a situated chase; crew members
    translate its presence into vectors, bearings, and political consequence. The
    planet''s silence intensifies the moment, flattening possibility into tactical
    urgency and reminding officers that even vanished drives and cunning escapees
    occur against an indifferent cosmic backdrop.'
