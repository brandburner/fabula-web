- fabula_uuid: ger_location_0646681b63fe
  global_id: ger_location_0646681b63fe
  canonical_name: Lunar Five (lunar penal facility & resettlement outpost)
  description: Lunar Five is a lunar complex operated by Angosia combining a military
    maximum-security penal installation with a resettlement outpost. Set against a
    barren regolith and ringed by reinforced modules, sealed airlocks, containment
    domes, watchtowers, and tracking stations, the site functions both as a penal
    fortress for high-risk detainees and as a politically fraught resettlement location
    for cast-off veterans. Its physical features (observation towers, containment
    fields, hardened modules) and its narrative role (diplomatic flashpoint, social
    stigma, and security challenges) are central to events in the episode "The Hunted."
  location_type: Military Lunar Penal Colony
