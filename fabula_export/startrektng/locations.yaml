  description: 'A rough planetary landing pad where a small shuttle once sat with
    its hull cooling and ramp lowered, exhaust tang clinging to loose soil. The site
    bears the quiet evidence of abrupt departure: trampled gravel, a smudge of burnt
    metal, and the whispered absence of those who never returned. Functionally the
    place of the fatal accident that killed Marla Aster, it anchors private grief
    to physical terrain—an exposed locus of sudden loss that converts mechanical detail
    into an enduring emotional wound for surviving family and the crew who must reckon
    with its consequences.'
