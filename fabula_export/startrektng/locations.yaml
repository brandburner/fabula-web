  description: A broad, brackish inland sea bounded by Eurasian shores, the Caspian
    Sea conjures silvery horizons, slow swells, and the ancient fisheries that harvest
    prized beluga and sevruga sturgeon roe. Its air tastes faintly of salt and history;
    salted wind and low, gull-riven skies frame a maritime economy tied to artisanal
    caviar production. Within the episode this place functions narratively as authoritative
    provenance for a luxury food—anchoring Picard's dinner table to terrestrial tradition
    and cultural authenticity, lending the caviar an aura of geographic specificity,
    heritage, and culinary value.
