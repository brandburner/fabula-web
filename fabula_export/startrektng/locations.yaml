- fabula_uuid: ger_location_aadee441ae15
  global_id: ger_location_aadee441ae15
  canonical_name: Bonestell Recreation Facility
  description: 'A crossroads-style community recreation facility on Bonestell: an
    open, intersecting hall where worn flooring and institutional lighting channel
    foot traffic past games, seating nooks, and low storefronts. Ambient noise — laughter,
    shouted challenges, and the slap of footwear — fills the air until a single confrontation
    detonates the room into chaos. Narrow alcoves and intersecting aisles create blind
    angles and sudden choke points; the tang of sweat and spilled drink lingers as
    memory of violence. Functionally, the space operates as a public nexus where casual
    encounters escalate into brutal conflict and where Picard suffered a near-fatal
    impalement, marking the facility as a site of personal reckoning and community
    danger.'
  location_type: Crossroads-style Recreation Facility
