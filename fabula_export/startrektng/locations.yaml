- fabula_uuid: ger_location_e79cfbd82d81
  global_id: ger_location_e79cfbd82d81
  canonical_name: Main Engineering — Batris
  description: 'Metal groans and loose panels clatter across a scarred deck as the
    Batris’ engineering becomes a war-torn corridor of failure. Debris piles choke
    passages, a boiling, acrid gas rides the air, and console lights strobe against
    warped bulkheads. Transporter readings flash and vanish under electromagnetic
    interference while the team scrambles past sparking conduits and pooling fluid.
    Tension compresses every breath: hurried commands, the shrill hiss of venting
    systems, and the distant thud of structural collapse. This is where evacuation
    collapses into improvisation, where loyalty forces impossible choices, and where
    the ship’s dying heartbeat converts routine procedure into desperate survival.'
  location_type: Starship Engineering Adjacent Area
  parent_location_uuid: ger_location_41857ce8b5be
