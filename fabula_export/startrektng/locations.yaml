  global_id: ger_location_41d7e08eb25e
  canonical_name: Betazoid Clearing Pond
  description: A secluded clearing on Betazed, located beneath the orbiting shadow
    of the USS Enterprise, where Lwaxana Troi, Deanna Troi, and William Riker vanished
    during their abduction. The clearing contains a small pond cradling wilted Zan
    Periculi flowers—rare botanical imports from Ferengi-controlled Lappa IV—which
    serve as a critical clue in the investigation. The site becomes the focal point
    of tension and frustration for Worf, Reittan Grax, and Data as they uncover evidence
    linking the abduction to an interstellar Ferengi conspiracy. The clearing's still
    waters and fading blooms underscore the urgency of the rescue mission.
