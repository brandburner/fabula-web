- fabula_uuid: ger_location_57159bf6867e
  global_id: ger_location_57159bf6867e
  canonical_name: Orbit Above Angel One
  description: Beneath the Enterprise, the lavender expanse of Angel One spins in
    lazy majesty—a planet that has just birthed its nightmare. This orbital perch
    clings like a memory the ship cannot shake, a curved line of departure that doubles
    as hunting ground. Silver auroras ghost across the upper atmosphere, mirroring
    the phantom energy sphere that now erupts from those same cloud layers, chasing
    the starship with predatory grace. The cold void here breathes with strange sentience;
    sensors flicker warnings that vanish into normal readings, leaving Data's certainty
    suspended between what his android logic records and what human reassurance dismisses.
    The Enterprise breaks this orbital embrace with engines roaring toward plague-stricken
    urgency, but the orbit themselves seem reluctant to release them—a gravitational
    memory that follows the ship even as they accelerate toward distant Aucdet IX.
  location_type: Orbital Location
  parent_location_uuid: null
