  description: Picard stirs in this derelict, canted room aboard the crashed Terellian
    cargo freighter, its tunnel-like space dimly lit by faint emergency glows. Half-charred
    consoles smolder amid scattered cargo containers, the floor tilted from impact.
    A single door seals the chamber. Anna tends his injuries here, her fire later
    crackling in a container to cast warm shadows across their tense exchanges, the
    air thick with isolation and crash-scarred metal.
