  description: Family Decks form a critical sanctuary within the starship, designated
    as the prioritized area for reserve power diversion to protect crew families during
    system failures. This zone extends life support, offering a fragile refuge amid
    the ship’s plunging environmental conditions. It holds profound emotional weight
    as the last bastion for loved ones, where desperate acts of care and moral conflict
    unfold, embodying the tense intersection of survival, parental devotion, and dignity
