  global_id: ger_location_11e1b518d270
  canonical_name: Sector 001 (Zero-Zero-One) Near Saturn
  description: The vast starry void of **Sector 001 (Zero-Zero-One)**, a remote space
    sector near Saturn's golden bands and icy rings, marks the Borg cube's arrival.
    This location—also referred to as the **Solar System Near Saturn**—serves as the
    critical entry point for the Borg invasion, framing their inexorable advance into
    Federation territory. The angular Borg cube drifts past the gas giant in silent
    vacuum, its dark hull cutting toward Earth. Shelby's com report pinpoints this
    sector, triggering urgency aboard the *Enterprise*—27 minutes to Jupiter Outpost
    92, 42 minutes to Sol—as the crew absorbs the news amid Sickbay tension. The cosmic
    emptiness here amplifies the invader's relentless push toward Earth, where planetary
    scale underscores the Federation's futile resistance. Detection in this sector
    seals the fate of nearby outposts and Earth.
