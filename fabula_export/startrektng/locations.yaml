  canonical_name: 20th-Century Bar (Unspecified)
  description: 'A remembered, not-present watering hole: the 20th‑Century Bar exists
    in longing more than in walls. It smells of cold spirits and warm wood, carries
    the clink of glass and the low hum of televisions—sensory anchors Sonny hunts
    for when a replicator martini briefly returns a vanished pleasure. The place functions
    as a social fulcrum in memory, a space where survivors expect companionship, distraction,
    and cultural continuity. Within the scene the bar’s absence aboard the Enterprise
    sharpens dislocation, exposing how comfort and ritual have been stripped from
    those newly awakened.'
