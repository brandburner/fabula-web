  global_id: ger_location_c9592ce42a07
  canonical_name: Cryonic Crypts
  description: A chilled, claustrophobic cryogenic chamber aboard a derelict ship
    lined with rows of coffin-like stasis coffers and glass crypts. Frost rims seals
    and scuffs the bulkheads; many lids are blackened, split, or forced open, and
    several bays are empty or desiccated—evidence of failed preservation and deliberate
    tampering. A faint refrigeration hum, the metallic tang of ozone and antiseptic,
    and dying electronics fill the air. Amid the ruin a single perfectly preserved,
    unconscious woman lies half-exposed, turning salvage into urgent rescue, forensic
    inquiry, and legal/moral consequence.
  location_type: Derelict Ship Cryogenic Vault
