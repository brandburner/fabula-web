- fabula_uuid: ger_location_2c30002b8915
  global_id: ger_location_2c30002b8915
  canonical_name: Courtroom Witness Stand (Witness Chair)
  description: 'The elevated witness platform in the courtroom — a single upright
    seat/stand where witnesses (here, Data and Commander Maddox) take the oath and
    deliver testimony. Positioned under harsh lights and the judge’s attention, the
    stand/chair functions as the theatrical and legal fulcrum: it holds personal items
    or evidence at its edge, focuses scrutiny, and channels institutional formality
    into a single bodily and symbolic locus during the hearing.'
  location_type: Courtroom Witness Seating
