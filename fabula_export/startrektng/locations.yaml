  global_id: ger_location_11bb6db293fc
  canonical_name: Structure in Section Gamma Two-Five
  description: Picard's away team reaches this structure on the alien planet surface
    as their final confirmed position before vanishing during the Borg attack probe.
    Riker and Worf push through disrupted terrain nearby, comms dead amid Red Alert
    klaxons from the Enterprise overhead. Borg ship's approach forces partial beam-outs;
    exposed searchers face silence and rising dread, transporters straining under
    evacuation load while weapons power up in the distance. Open expanse presses isolation,
    every scan yielding absence.
