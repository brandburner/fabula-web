  global_id: ger_location_6b478c5a1cf9
  canonical_name: Qo'noS (Klingon Homeworld)
  description: 'Qo''noS stands as the ancestral homeland of the Klingon people, a
    distant planetary cradle whose customs and proverbs shape warrior identity and
    obligations. Invoked here as cultural ground beneath Worf''s words, the world
    reads as iron-willed and ritual-steeped: a place of harsh landscapes, communal
    codes of honor, and terse moral instruction handed down in short, resonant sayings.
    Mention of Qo''noS functions narratively as a lodestone for belonging and kinship,
    a psychic locus that gives Worf authority and frames his offer of allegiance to
    Riker.'
