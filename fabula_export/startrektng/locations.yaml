- fabula_uuid: ger_location_452a2c68cf48
  global_id: ger_location_452a2c68cf48
  canonical_name: Rutian Detention Cells
  description: A network of cramped municipal holding cells used by Rutian police
    as an instrument of coercion. Narrow concrete modules stack behind barred corridors;
    fluorescent lights hum above locked doors while guards shepherd frightened civilians
    into small, windowless rooms. The air carries the metallic tang of fear and hurried
    footsteps, punctuated by shouted orders and the clack of keys. Functionally, these
    cells operate as temporary custody points and visible warnings—places where incarceration
    becomes a pressure tactic to extract political concessions and silence dissent.
  location_type: Municipal Holding Cells
