- fabula_uuid: ger_location_b2b363313153
  global_id: ger_location_b2b363313153
  canonical_name: Pond's Edge (Arboretum, USS Enterprise-D)
  description: Sunlight bathes the Arboretum's pond's edge, where calm waters reflect
    the simulated Betazoid greenery. This location serves as the focal point for the
    Troi family's trauma, where Kestra's drowning occurred and where Lwaxana Troi
    and Mr. Troi sit frozen in shock. The pond's still surface captures Hedril's ghostly
    reflection (later revealed as Kestra) and amplifies eerie dripping sounds, mirroring
    Lwaxana's repressed grief. Deanna Troi guides her mother here to confront Kestra's
    ghostly manifestation, pushing through decades of buried guilt amid tense air
    thick with familial pain and hesitant forgiveness. Ripples mark the spot of trauma
    relived, sunlight piercing the emotional haze as mother and daughter forge toward
    healing. The pond's dual nature—both idyllic and horrific—reflects the psychic
    distortions of the arboretum during the Troi family's crisis.
  location_type: Starship Arboretum Pond Edge
