  canonical_name: Defendant's Ship
  description: A distant Starfleet vessel invoked as an off‑stage presence whose manifest
    and chain‑of‑command exert decisive legal force within the JAG hearing. The ship
    itself remains unseen; its identity compresses into a roster of officers and an
    implied seniority that Phillipa Louvois consults to appoint a prosecutor. Procedurally
    charged and bureaucratic in effect, the vessel functions as an authoritative source
    of personnel, hierarchy, and duty—its absent corridors and bridge casting a bureaucratic
    shadow over the courtroom’s moral and command tensions.
