  global_id: ger_location_8ea79dff2631
  canonical_name: Starfleet Academy Infirmary
  description: Cadets recover here from training accidents, as Wesley Crusher does
    with second-degree burns and a fractured arm. Doctors manage regeneration series,
    screen metorapan allergies, and evaluate rybotherapy options. Beverly Crusher
    sends detailed medical records to guide treatment, highlighting the facility's
    reliance on expert input. Sterile biobeds hum under efficient Starfleet protocols,
    providing institutional care that steadies Wesley's recovery while Beverly grapples
    with maternal dread from afar.
  location_type: Academy Infirmary
