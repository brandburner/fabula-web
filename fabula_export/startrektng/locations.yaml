  global_id: ger_location_6d603d029850
  canonical_name: Main Street Square
  description: Sunlight bakes a broad, stony square that serves as the town’s main
    street and public commons. A ruined plant and an exposed aqueduct anchor one side,
    their rusted valves and broken pipes smelling of stale water and stubborn rot.
    Armed men form a human line at the plant; colonists cluster behind them, voices
    taut with fear. Narrow upper levels and balconies overlook the space, giving commanders
    a precarious height. The square functions as both ritual center and flashpoint—a
    communal heartbeat turned battlefield where leadership, pride, and the life-or-death
    choice to stay or evacuate collide.
  location_type: Planetary Town Square
