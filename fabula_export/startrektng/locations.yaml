  description: The star's chromosphere envelops the stellar core in a seething layer
    of superheated hydrogen plasma, alive with spicules and prominences that erupt
    and twist in magnetic fury. The Enterprise maneuvers into this turbulent zone
    to shield its warp signature from Borg sensors, exploiting the constant flares
    and ionized gases for cover. Picard details the plan amid tense farewells in the
    transporter room, betting on the stellar chaos to conceal their position while
    Hugh and Geordi infiltrate the Borg ship.
