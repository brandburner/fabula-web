  global_id: ger_location_ebcc07f2993c
  canonical_name: Hidden Chamber Beyond Sealed Door
  description: 'Troi sprints down the corridor, shoves aside stunned crewmembers,
    and forces open a sealed door to enter this hidden chamber. The space confronts
    her empathic senses with the Enterprise''s buried trauma: a murder from the ship''s
    construction era. Crew recoil from her ragged urgency, sensing the ominous threshold.
    Shadows of violence cling to the walls, drawing her deeper into a reckoning that
    frays her mind and exposes the vessel''s violent origins.'
  location_type: Starship Secret Chamber
