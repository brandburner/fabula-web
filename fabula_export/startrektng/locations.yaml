  global_id: ger_location_ddb8732c6da7
  canonical_name: Beverly Crusher’s Private Office (Adjacent to Sickbay, USS Enterprise-D)
  description: 'Beverly''s compact Sickbay office centers on a desk console lit by
    screen glow amid humming medical panels. Sliding doors enclose private debates:
    Picard presses Beverly on ethics during past Klingon treatments and current death
    certificates for Ro and Geordi; she updates Ro''s file to DECEASED. Ro phases
    through the desk, watches from the doorway as Picard passes through her intangible
    form. Tight confines amplify isolation, moral clashes, and existential terror,
    sealing confrontations from Sickbay''s bustle.'
