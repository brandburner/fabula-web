- fabula_uuid: ger_location_81504b200d3f
  global_id: ger_location_81504b200d3f
  canonical_name: Boraalans' Holodeck Chamber (Cavern)
  description: Cavernous holodeck simulation replicating the Boraalans' doomed planet,
    featuring stalactites, campfires, and herders tending livestock. Serves as the
    primary refuge for the Boraalan survivors, where Worf enters through a hidden
    passage and Starfleet intruders later expose Nikolai's Prime Directive breach.
    Contains a central pool that reveals holodeck grid lines when disturbed, and connects
    to hidden passages leading to the surface camp. The chamber's simulated environment
    includes earthy scents, faint chants, and echoing stone walls that create an immersive
    but fragile illusion.
  location_type: Starship Holodeck Habitat
