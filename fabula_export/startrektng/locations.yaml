  global_id: ger_location_d9061ee08edf
  canonical_name: Promellian Communications Bay
  description: Nestled within the gutted hull of an ancient Promellian warship, the
    communications bay thrums with cold circuitry and the faint, metallic whisper
    of archived coils. Narrow catwalks and clustered consoles frame racks of tightly
    coiled memory wiring; phosphorescent indicator lights smear against corroded plating.
    Technicians crouch over glowing readers as a tense urgency crackles—these archival
    memory coils offer the lone technical avenue to recover a dead captain’s log,
    turning hope into frantic, focused action.
  location_type: Warship Communications Bay
