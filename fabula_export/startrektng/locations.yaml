- fabula_uuid: ger_location_09e4f2f2f11b
  global_id: ger_location_09e4f2f2f11b
  canonical_name: Secaucus, New Jersey
  description: 'A modest New Jersey suburban town that exists offstage yet exerts
    a powerful gravitational pull on the shipboard drama. Mentioned as the birthplace
    of Clare Raymond''s children, Secaucus registers as municipal textures — hospital
    wards, birth registries, street addresses, and brittle paper records — that the
    crew can query through ship databases. The name functions as both investigative
    coordinate and emotional anchor: mundane bureaucracy collides with private loss,
    turning nostalgia and longing into a concrete trail for reunion or closure.'
  location_type: Suburban Town (Earth)
