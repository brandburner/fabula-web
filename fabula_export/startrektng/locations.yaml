  global_id: ger_location_844dd303eab0
  canonical_name: Guest Quarters Kitchen
  description: 'A compact, shipboard kitchen tucked into the guest quarters, structured
    for discreet service to a visiting sovereign and retinue. Stainless surfaces and
    modular appliances condense culinary function into a small, efficient footprint;
    scent of warm spices and recycled air hangs in the narrow passage. The space reads
