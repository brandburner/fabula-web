  global_id: ger_location_1dc67cfced2a
  canonical_name: Qualor-Two Piano Bar
  description: Dimly lit shadows cloak booths where alien prostitutes wait for customers
    and mysterious figures nurse drinks. Slow nights pulse with tense intimacy, ideal
    for quiet liaisons and covert meetings. Amarie plays piano at the center, drawing
    Riker for blues-fueled intel on Romulan plots and Worf for rare Klingon opera
    that Omag's interruption shatters. Neutral ground mixes cultural exchanges with
