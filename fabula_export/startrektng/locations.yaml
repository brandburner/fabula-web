  description: Geordi La Forge and Dr. Moseley huddle in this quake-proofed laboratory
    on Penthara Four, screens flickering with data on volcanic dust and ash clouds
    blocking sunlight. Earthquakes jolt the reinforced structure, shaking equipment
    as they analyze environmental hazards and devise countermeasures. The space holds
    as a tense safe haven amid seismic chaos, instruments humming while tremors underscore
    the planet's instability.
