- fabula_uuid: ger_location_1dd511998ff4
  global_id: ger_location_1dd511998ff4
  canonical_name: Lower Catwalk, Main Engineering
  description: A narrow metal walkway suspended over Main Engineering's humming guts,
    the lower catwalk hugs the rim of the deuterium conduit and offers a vertiginous
    vantage into the ship's mechanical heart. Fluorescent panels strobe across grated
    decking; the air tastes faintly of ozone and heated alloy. Railings rattle under
    leaning shoulders as diagnostic beams arc in violet across access ports and a
    delicate fiber‑optic probe bounces unsettlingly near the edge. The space compresses
    mentorship and authority into sharp, immediate beats — daydreams collapse into
    safety scares, blunt orders land like hammers, and quiet distrust breeds a fragile
    operational truce.
  location_type: Starship Engineering Catwalk
