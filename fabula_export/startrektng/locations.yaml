  global_id: ger_location_bd39344e963d
  canonical_name: Enterprise Pastoral Area
  description: The Enterprise Pastoral Area, also represented as the Parkland Holodeck
    Simulation, is a tranquil, immersive woodland glade aboard the starship, suffused
    with naturalistic serenity and soft, dappled light. This peaceful enclave serves
    as a solemn memorial site where the crew reflects and mourns Lieutenant Tasha
    Yar's memory, blending naturalistic simulation with emotional resonance. It offers
    a rare sanctuary bridging starship formality and raw human emotion, where holographic
    farewells shimmer with warm poignancy.
