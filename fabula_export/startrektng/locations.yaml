  canonical_name: Daycare Center
  description: Children mold clay into spiked Klingon cups at low tables in this brightly
    lit room aboard the USS Enterprise. Alexander draws shy Clara into collaboration,
    their shared laughter and stories blending with snack time chatter. Counselor
    Troi observes the budding rapport from the sidelines. Clay blocks topple and lumps
    fly under Isabella's invisible assault, igniting accusations between the children
