  global_id: ger_location_b018cdc8da1f
  canonical_name: Observation Lounge (USS Enterprise-D, Past Timeline)
  description: Gold ship models line the walls of this Observation Lounge, matching
    the USS Enterprise-D's first-season configuration in the past timeline. Picard
    records a security-locked captain's log at the central table, then summons Tasha
    Yar, Worf, and Deanna Troi for a briefing. The crew files in warily under soft
    lighting, their hesitation sharpening as Picard issues erratic orders—a Level
    Two Security Alert—and probes for alien presences. Forward windows frame distant
    stars while tension builds from challenged authority and concealed temporal secrets,
    marking the space as Picard's private arena of isolation.
  location_type: Starship Observation Lounge
