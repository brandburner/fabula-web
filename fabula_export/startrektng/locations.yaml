  global_id: ger_location_7948173407f7
  canonical_name: Deanna Troi's Counseling Office
  description: 'A private living quarter aboard the starship that also functions as
    Counselor Deanna Troi''s counseling chamber. The compact, warmly lit cabin is
    arranged for intimate, consequential conversation: two close chairs and a small
    table, a modest desk with personal touches, soft indirect lighting, and the ship''s
    low mechanical hum. As Troi''s private quarters it serves both as a personal refuge
    and a confidential counseling sanctuary where admissions arrive raw, professional
    steadiness reframes them, and relationship choices and emotional calibrations
    are made. Appears across multiple episodes (e.g., The Price, The Offspring, The
    Survivors) and scenes where the room doubles as origin point for private crises
    as well as counseling sessions.'
