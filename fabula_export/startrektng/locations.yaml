- fabula_uuid: ger_location_75e02ed8a271
  global_id: ger_location_75e02ed8a271
  canonical_name: Galorndon Rocky Hillside
  description: Gales whip dust and ionic static across a stony, sloped expanse on
    Galorndon’s battered surface. Jagged outcrops and loose scree carve shadowed hollows
    where percussion-like thunder of the storm masks movement; footing bites and visibility
    collapses into wavering shapes. Geordi forces a desperate crawl across this broken
    ground, the terrain offering brittle concealment that an unseen assailant exploits.
    A sudden, crushing impact collapses the world into cold pain, converting solitary
    rescue into capture beneath a sky of crackling interference. The space tastes
    of salt and fear, a hostile threshold that turns pursuit into peril and exposure
    into a tactical pivot.
  location_type: Planetary Terrain Feature
  parent_location_uuid: null
