  description: Corvan Two hosts dense rainforests that shelter Corvan Gilvos, tree-dwelling
    creatures adept at camouflage. Industrial pollutants now poison these ecosystems,
    spurring transplants of specimens from the Enterprise biolab to Brentalia. Towering
    trees and humid canopies define the landscape, where natural harmony yields to
    encroaching industry, heightening urgency in conservation talks.
