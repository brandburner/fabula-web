  global_id: ger_location_721c1276476d
  canonical_name: Ronara Prime
  description: Ronara Prime anchors the volatile frontier of the Demilitarized Zone,
    where Ro Laren claims recent residence before Maquis forces seized her. Dust-choked
    settlements and hidden outposts define its surface, drawing disillusioned officers
    and rebels alike amid constant Starfleet patrols. Ro recounts her time there during
    interrogation; Kalita snaps that she has left it behind, the planet's name testing
    her cover story. Tension hums in every mention—phasers ready, loyalties probed—as
    the world embodies the DMZ's lawless edge, where fugitives plot in shadowed bunkers
    and allegiances shift with each shuttle departure.
  location_type: Demilitarized Zone Planet
