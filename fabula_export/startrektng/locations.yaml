  canonical_name: Apgar Lambda Field Generator Site (Planet Surface)
  description: A remote stretch of the planet's surface centering on the ruined research
    emplacement that housed Dr. Apgar's Lambda Field generator. Scorched soil and
    twisted instrument frames ring a collapsed lab module; stray cables and shattered
    diagnostic arrays hum faintly with residual Lambda energy. The site radiates a
    cyclical, five‑hour, twenty‑minute, three‑second cadence—an unnerving mechanical
    heartbeat that links the landscape to distant station fatalities. Scientists arrive
    with data pads and grief, while investigators feel vindication and dread as the
    barren ground reads like a forensic clock, translating abstract theory into lethal
    consequence.
