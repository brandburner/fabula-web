  description: Narrow walls close in on a single rigid shelf-bed without a mattress,
    designed for one Klingon warrior but shared by Picard and Data. A computer console
    glows dimly in the dark, cramped space, amplifying tension during late-night work
    sessions. Data hunches over the terminal cracking Romulan encryption as Spock
    joins the effort, their philosophical clash over humanity echoing off the utilitarian
    surfaces. Picard paces briefly before exiting, the confined quarters heightening
    his isolation and the group's unease amid the Bird-of-Prey's austere military
    hum.
