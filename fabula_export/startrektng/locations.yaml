  global_id: ger_location_8ceed40c1178
  canonical_name: Enterprise Hull (External)
  description: The USS Enterprise's hull exterior faces the void of space, its forward
    torpedo launchers firing precise volleys—ten photon torpedoes total—into a test
    star for Dr. Timicin's ignition experiment. Worf commands deployment while Data
    verifies targeting. This surface previously hosted an alien lifeform draining
    ship power to impulse, exposing plating to vacuum hazards. Crew navigates operational
    precision and cultural stakes in stellar silence.
  location_type: Starship Hull Exterior
