    clearing where Riker drags Soren after Worf neutralizes her guards. Leaves crunch
    underfoot as tension builds; cool air sharpens their confrontation. Soren's blank
    denial of her past identity echoes here, her words crushing Riker's mission amid
    shadowed trees and isolation.
