- fabula_uuid: ger_location_48732096b6e6
  global_id: ger_location_48732096b6e6
  canonical_name: Jeremy Aster's Home — Front Room
  description: 'Sunlight pools on a lived-in rug while a grandfather clock ticks with
    the intimacy of a remembered life; a sleeping cat curls on an armchair and a familiar
    blanket smells of a vanished parent. The space feels handcrafted to console—tactile,
    warm, and impossibly exact—yet an uncanny edge hums beneath the comforts as an
    alien intelligence sculpts memory into temptation. The front room functions as
    both refuge and trap: it cradles the grieving boy while forcing command and counselor
    to confront a wrenching choice between consoling illusion and harsh reality.'
  location_type: Suburban Home — Front Room
  parent_location_uuid: null
