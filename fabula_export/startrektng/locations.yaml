- fabula_uuid: ger_location_48cac708427e
  global_id: ger_location_48cac708427e
  canonical_name: Ship's Decks (ship-wide / twelve decks)
  description: 'Ship-wide internal decks (reported as twelve in some records): metal
    corridors and stacked decks run like ribs through the vessel, forming a vertical
    city whose vents and bulkheads pulse with failing life support and the hollow
    thud of distant alarms. During Condition Red, alerts bleed through the ship like
    a pulse — every deck answers in staccato klaxons and flashing emergency indicators
    as systems telemetry streams urgent fault messages. Corridors feel militarized
    and taut; panels cast harsh crimson light, voices issue clipped commands, and
    command decisions echo across decks, turning routine passageways into zones of
    high alert where technical collapse and moral crisis collide.'
  location_type: Starship Multi-Deck Section
