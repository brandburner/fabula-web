  description: 'A vast, contested landmass that functions as a sovereign political
    authority rather than a mere backdrop: capitals send polished condemnations, provincial
    governors posture on state broadcasts, and borderlands thrum with insurgent rumor.
    The Ansata separatists claim this continent as the polity they reject, using abductions
    and propaganda to pry at the continent''s legitimacy. Diplomatic delegations arrive
    with guarded faces; intelligence briefs arrive with clipped urgency. The continent
    therefore registers in the ship''s corridors as pressure—legal, moral, and political—forcing
    restraint, shaping strategy, and converting private grief into a matter of interstate
    consequence.'
