  canonical_name: Royale Front Desk
  description: The Royale Front Desk (registration counter) — a low, brass‑trimmed
    registration/registration desk in the Royale hotel lobby where rehearsed hospitality
    masks menace. Fluorescent light, an assistant manager delivering clipped civility,
    a jittery bellboy, keys, chips and keycards exchanged across laminate; the desk
    functions as the construct’s welcome and control node where the away team first
    confronts the hotel's hollow veneer.
