  global_id: ger_location_95445956f627
  canonical_name: Black Cluster (Sector 97)
  description: The Black Cluster fills Sector 97 with a lens-like cloud of warped
    space that bends light and generates erratic gravitational forces. Sensors fail
    amid the distortion as the Enterprise drops from warp, exposing the derelict Vico
    adrift with breached hulls and exposed decks. Crew members stare at the mesmerizing
    haze, its perils amplifying every scan and order. Picard weighs risks here, balancing
    discovery against collapse threats in this zone where physics frays and danger
    lurks.
