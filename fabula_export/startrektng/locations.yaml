- fabula_uuid: ger_location_6ca11ba6d19f
  global_id: ger_location_6ca11ba6d19f
  canonical_name: Royale Revolving Door (Casino Lobby Entrance)
  description: 'A glass-and-brass revolving door at the outer edge of the Royale casino/lobby
    that functions as the site''s ritualized threshold. It hums with mechanical inevitability,
    smells faintly of cigar smoke, champagne and perfumed guests, and visually frames
    arrivals and departures—reflecting managers, patrons and staff. As a narrative
    choke-point it anchors scenes of arrival, confrontation, and egress: programmed
    patrons blur into a backdrop while staff freeze or react and violent incidents
    (gunfire, a falling bellboy) or the away team''s attempted exit play out against
    it.'
