  canonical_name: Enterprise Theater
  description: Rows of empty seats stretch into shadows, facing a stage dressed as
    a stark asylum cell with confining walls and dim, oppressive lights. Beverly Crusher
    directs from the front row, her commands echoing in the hush as Riker performs
    an inmate's breakdown. The illusion shatters when character breaks, revealing
    bare stage and vacant auditorium—raw space amplifies isolation, blurring rehearsal's
    artifice with Riker's real psychological strain amid empty echoes.
