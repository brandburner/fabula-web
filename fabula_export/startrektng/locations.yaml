  global_id: ger_location_bbb6b5fd543e
  canonical_name: Hotel Interior
  description: Mister Lane emerges from this 19th-century San Francisco hotel interior,
    pockets lighter after poker losses that sour his mood. The space hosts card games
    amid the era's bustle, drawing gamblers who exit to horse-drawn carriages at the
    entrance. Staff inside manage lodging requests, rejecting outsiders like Data
    for lack of funds while full staffs handle guests' needs.
