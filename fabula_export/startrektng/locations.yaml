- fabula_uuid: ger_location_d3ea08d66ae3
  global_id: ger_location_d3ea08d66ae3
  canonical_name: Federation Science Outpost (Ohniaka III)
  description: A Federation science outpost on Ohniaka III, the third planet of a
    backwater system, where the *Enterprise* crew responds to a distress call. The
    outpost is the site of a methodical Borg massacre, with corridors strewn with
    dead Starfleet officers bearing wounds from forced-plasma beams. Minimal structural
    damage suggests a surgical focus on crew, while electromagnetic interference scrambles
    tricorder scans for survivors. Jammed doors yield to bypasses, revealing motionless
    Borg drones. The outpost's south wing, a confined space amplifying isolation and
    dread, is where Riker and Data sweep for survivors, encountering a lone Borg drone
    amid flickering lights. The confined spaces and eerie silence turn the search
    into a confrontation with adaptive assimilators.
  location_type: Federation Science Outpost
