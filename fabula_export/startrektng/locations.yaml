  global_id: ger_location_a544c7ea5e78
  canonical_name: Professor Manheim's Laboratory
  description: 'Professor Manheim''s Laboratory is a high-stakes, tense scientific
    research facility featured in Star Trek: The Next Generation episode ''We''ll
    Always Have Paris''. The laboratory serves as a crucible of courage, scientific
    marvel, and existential peril. It is characterized by lethal intensity, mechanical
    tension, and unstable interdimensional energy trapped within its walls. The crew
    faces imminent danger from a rigged explosive device and catastrophic technological
    failures, racing against time to avert disaster. Key characters such as Data,
    Worf, William Riker, and Captain Picard play critical roles within this perilous
    environment where human curiosity meets volatile threats.'
