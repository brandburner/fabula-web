  global_id: ger_location_246db9396930
  canonical_name: Data's Hotel Room
  description: Data occupies this modest 19th-century hotel room in San Francisco
    as his workshop. Scavenged tools, anvil, newspaper, and pastry scraps crowd the
    space around his phaser prototype assembled from period materials. Daytime light
    reveals his efforts to mimic human frailty while lifting the anvil delivered by
    bellboy Jack. Their exchange sparks Jack's business ambitions and hints at alliance.
    Data shifts a newspaper covering his pastry and spots Guinan's photograph, freezing
    in realization of a timeline paradox. The room forces Data to balance invention,
    disguise, and unexpected human connections amid temporal stakes.
  location_type: Hotel Guest Room
