- fabula_uuid: ger_location_e9a9e84dc212
  global_id: ger_location_e9a9e84dc212
  canonical_name: Observation Rise
  description: 'Lightning slices a twilight grove as a low, barren rise thrusts above
    sodden ground. The incline offers a cramped, exposed vantage where a lone figure
    hauls himself to scan a thunder‑driven expanse: skeletal trees, churned soil,
    and a horizon that eats sound. Wind and rain strip certainty from every view;
    scents of ozone and wet earth bite the throat. The rise functions as an isolation
    crucible—an observation point that amplifies panic, vulnerability, and desperate
    appraisal of the surrounding wasteland.'
  location_type: Planetary Terrain Feature (Small Rise / Observation Point)
