  global_id: ger_location_9159be25d7bf
  canonical_name: Unnamed Cold Sector ("This Sector" / "This Section of the Galaxy")
  description: 'A cold, featureless stretch of space in the Neutral Zone characterized
    by absence: failed beacons, darkened outposts, empty sensor returns, and remote
    stations (including Tarod Nine). The region also contains at least one derelict
    with preserved terrestrial artifacts and human remains; its silence functions
    as a tactical blind spot that converts abstract coordinates into urgent moral
    and strategic pressure. Bridge crews (Picard, Riker, Worf, Geordi, Data) encounter
    terse diagnostics and uneasy viewscreen images across multiple scenes in the episode,
    indicating these scene-level descriptions point to the same unnamed sector.'
