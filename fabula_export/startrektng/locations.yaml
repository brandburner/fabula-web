  global_id: ger_location_b944f90e8a5f
  canonical_name: Surface of Rana IV
  description: Rana IV's surface serves as the remote, planetary ground where the
    away team operated and where Counselor Deanna Troi first encountered the intrusive,
    perfectly repeated melody that later unravels her. The space reads as an exposed
    field framed by a shuttle landing area and scattered mission equipment, its wind
    and distance amplifying a small sound into an intimate assault on memory. Functionally,
    it anchors the episode's threat—an origin point for a psychological or memetic
    intrusion that converts ordinary terrain into a site of personal and crew vulnerability.
  location_type: Planetary Surface
