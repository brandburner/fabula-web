  description: Public thoroughfare immediately outside the Sisters of Hope Infirmary,
    used by Riker for covert surveillance of Devidian activity. Features cobblestone
    streets, 19th-century foot traffic, and a policeman's patrol route. Serves as
    the exterior transition space between the open city and the infirmary interior.
