  canonical_name: Sentinel Minor Four
  description: 'Sentinel Minor Four serves as the remote endpoint for the USS Lalo''s
    freight run, plotted along its final trajectory before Borg interception. Admiral
    Hanson''s transmission highlights this distant outpost world, where routine supplies
    now hang undelivered amid the freighter''s annihilation. Enterprise officers grasp
    the stakes in the Observation Lounge: a frontier station cut off, its isolation
    amplifying the cube''s threat to Federation edges. Silence from this point underscores
    the void''s dangers—empty docking bays await cargoes that will never arrive.'
