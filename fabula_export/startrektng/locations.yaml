- fabula_uuid: ger_location_70bc1ae75235
  global_id: ger_location_70bc1ae75235
  canonical_name: Christopher’s Quarters
  description: 'Christopher’s quarters form a private, intimate cabin aboard the starship
    where Beverly Crusher confronts Christopher and T’Pan over Reyga’s death. Confined
    walls heighten defensiveness: Christopher protests her questions with vehemence,
    admits overhearing Kurak’s heated Klingon argument, and aligns with T’Pan’s neutral
    stance. The seclusion enables probing without interruption, sharpening suspicion
    as Beverly notes Klingon threats sometimes turn real. Tension fills the close
    space, exposing unease and possible complicity.'
  location_type: Starship Guest Quarters
