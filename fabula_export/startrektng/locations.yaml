- fabula_uuid: ger_location_8696bffc0621
  global_id: ger_location_8696bffc0621
  canonical_name: Outside the De-Contamination Area
  description: A sterile, tense threshold just beyond the de-contamination chamber,
    this space hums with clinical urgency and fraught anticipation. Dim lighting flickers
    over cold metal surfaces, casting long shadows that heighten the charged atmosphere
    where life and death hang in delicate balance. Here, Captain Picard and Commander
    Riker stand rigid with worry, their quiet exchanges eclipsed by the sudden chaos
    of a medical emergency. Emotions ripple as Laura, ghostlike and stunned, materializes
    in the doorway, drawing the invisible threads of past and present into the suffocating
    air. This liminal zone pulses with the weight of unstable experiments and personal
    hauntings, transforming it into a crucible of crisis and intimate reckoning.
  location_type: Starship Medical Bay Antechamber
