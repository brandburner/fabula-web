  canonical_name: Forward Half of the Secondary Hull
  description: Crew evacuate the forward half of the secondary hull under Deanna Troi's
    coordination as lethal radiation surges from the repurposed deflector weapon threaten
    exposure. Compartments and corridors empty amid flashing alarms and sealing bulkheads.
    The space turns hazardous, its decks abandoned to ionized air and mounting danger
    while the Enterprise fights for survival.
