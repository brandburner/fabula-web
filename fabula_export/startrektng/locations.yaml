  global_id: ger_location_e18a2e63b444
  canonical_name: DS-Four
  description: DS-Four kicks off Professor Galen's expedition to decode a four-billion-year-old
    DNA message, plotted as the prime destination on his Vulcan ship's star chart.
    In the Enterprise lab, Picard studies the route, torn between scholarly fire and
    captain's duty. Unvisited, the site pulls as first waypoint, fueling Galen's plea
    and Picard's doubt amid their bitter rift.
