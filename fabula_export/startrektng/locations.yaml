  global_id: ger_location_405992b7c516
  canonical_name: Kentor's Reconstructed House
  description: 'A modest, recently rebuilt dwelling that still carries the memory
    of its destruction: fresh timber and patched masonry edge soot-darkened stone
    and faint fire-scars. The house sits as a lived emblem within the settlement—private
    thresholds transmuted into public argument—because Gosheven cites the colony’s
    effort to rebuild it for Kentor to demand remaining. Its atmosphere fuses everyday
    domestic detail with civic meaning: smell of new timber, the shadow of past loss,
    and an insistence that labor and memory anchor people to place.'
