  canonical_name: Station Salem-One
  description: 'Picard invokes Station Salem-One as a grim historical touchstone:
    a space station whose sudden catastrophe once ruptured diplomatic restraint and
    cascaded into open conflict. The name carries the ghost-smell of burnt circuitry,
    the imagined echo of alarm-silenced corridors, and the cold geometry of ruined
    docking clamps seen through tactical readouts. As a rhetorical monument, it compresses
    fear, policy failure, and the moral cost of hasty reprisals into a single, chilling
    precedent.'
