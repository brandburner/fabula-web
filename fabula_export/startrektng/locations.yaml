  canonical_name: J'naii Woods (Forbidden Woods)
  description: 'A dense, secluded extraterrestrial forest bordering the J''naii courtyard,
    known locally as the ''Forbidden Woods'' due to its role as a site of taboo defiance.
    The woods serve as a charged, intimate setting where moonlight pierces the thick
    canopy, illuminating native flora and casting dramatic shadows. This is where
    Riker and Soren—under the pretense of exobotany research—slip away from J''naii
    norms for a defiant kiss, their embrace concealed by the forest''s isolation.
    The woods amplify tension, with every rustling leaf and snapping twig heightening
    the risk of discovery. Krite, a hidden observer, witnesses their transgression
    from among the roots, further emphasizing the woods'' dual role as both sanctuary
    and trap. The location''s dual naming (''J''naii Woods'' in official records,
    ''Forested Woods'' in local vernacular) reflects its ambiguous status: a natural
    space that becomes a site of cultural rebellion when night falls.'
