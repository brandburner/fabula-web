  global_id: ger_location_44709a8db571
  canonical_name: Terminus
  description: 'A distant, directional origin in space that funnels accretion matter
    into the wormhole — detectable not by visuals but by instruments as a focused
    inflow of charged particles and gravitational perturbations. Sensors report rising
    meson and lepton activity and increasing gravitational acceleration tracing back
    to the terminus, turning empty blackness into a tense corridor of energy. The
    crew experiences it as an off-screen source of danger: a remote pressure point
    that warps navigation vectors, corrupts predictions, and converts routine passage
    into an urgent, unstable hazard.'
  location_type: Wormhole Accretion Source
