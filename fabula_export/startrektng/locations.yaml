  canonical_name: USS Enterprise Orbit Around Tau Cygna V (Tau Cygna Five)
  description: The Enterprise holds a taut orbit above a planet as bridge displays
    and external sensors frame the battered silhouette of Tanuga Four. Viewscreens
    erupt with the station's violent disintegration while transporter readouts spike
    and power drains flicker through engineering schematics. Consoles hum and alarms
    bite; officers trade measured commands for quick, suspicious questions as routine
    procedure fractures into urgent investigation. The orbit serves as an operational
    vantage, an isolating void, and a staging ring where tactical calculation and
    moral pressure converge.
