  canonical_name: Malcorian Capital City (Capitol City)
  description: The Malcorian Capital City—also referred to as **Capitol City**—is
    the political and administrative heart of Malcor III, depicted as a vast extraterrestrial
    metropolis blending Earth-like urban grandeur with advanced alien architecture.
    Sweeping aerial shots reveal towering spires, grand government buildings, and
    broad streets, evoking bureaucratic rigidity and cultural insularity. The city
    serves as the primary setting for first-contact negotiations, cabinet meetings,
    and diplomatic tensions between the Federation and Malcorian leadership. Key locations
    include Chancellor Durken’s office, crowded plazas patrolled by guards, and government
    buildings where spy revelations and fracturing alliances unfold. The atmosphere
    is controlled and tense, reflecting the Malcorian resistance to offworld influence
    and the broader narrative tension between Starfleet adaptability and Malcorian
    tradition.
