  global_id: ger_location_e966abeac8d2
  canonical_name: Ro's Quarters
  description: Ro's quarters offer a tight, secluded haven aboard the starship, lit
    just enough for discretion during her encrypted subspace call to Admiral Kennelly.
    The enclosed walls trap the low hum of the transmission, heightening the stakes
    of her precise report on the covert mission. Isolation here sharpens Ro's divided
    loyalties—Starfleet duty clashing with Bajoran roots—while the instant connection
    betrays their rehearsed plot, charging the air with unspoken risks to Federation
    stability.
