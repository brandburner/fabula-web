- fabula_uuid: ger_location_2777d0cd1383
  global_id: ger_location_2777d0cd1383
  canonical_name: Enterprise Sickbay
  description: A compact, clinical medical bay aboard the Enterprise where bright,
    efficient lighting and diagnostic consoles frame urgent human moments. Here Dr.
    Beverly Crusher unstitches frozen silence, reviving three twenty‑first‑century
    patients whose sudden arrival ruptures the ship’s strategic tempo. The room smells
    faintly of antiseptic and machine coolant; monitors hiss and fluidics hum as sedatives,
    scans, and triage mingle with heated ethical debate. Security presence and Worf’s
    guarded posture tighten the air when entitlement or volatility surface. Picard’s
    hurried arrivals and departures transform the space into a battleground of duty,
    compassion, containment, and cultural dislocation.
  location_type: Starship Medical Bay
