- fabula_uuid: ger_location_3b9432404a54
  global_id: ger_location_3b9432404a54
  canonical_name: Outpost Delta 05
  description: 'Outpost Delta 05 — a Starfleet frontier sentinel on the Neutral Zone
    whose sensor arrays and defensive emplacements mark it as a routine watchtower.
    In the relevant scenes the installation is observed as an absence: scans return
    emptiness and a hollowed clearing on the planet surface where the outpost once
    stood. The merged entity captures both the installation identity and the present-state
    planetary clearing to reflect how narratives reference the site interchangeably
    when the outpost is gone.'
  location_type: Neutral Zone Border Outpost
