  global_id: ger_location_ad8223060520
  canonical_name: Crawlspace (Between Decks, Section Two-B to Section One, USS Enterprise-D)
  description: Geordi La Forge and Ensign Ro Laren squeeze through this cramped, claustrophobic
    crawlspace between decks, Sections Two-B to One, aboard the USS Enterprise-D.
    Tight conduits and structural beams press in from all sides, forcing awkward maneuvers
    as they position a plasma weapon for a desperate ambush on possessed crew in Ten
    Forward. Ro grimaces at the stifling discomfort, declaring she hopes never to
    see this part of the ship again. The dim, confined passage heightens their tension,
    every movement echoing the mission's brutal stakes.
