  canonical_name: Engineering (USS Enterprise-D)
  description: |-
    The USS Enterprise-D's primary engineering section, commonly referred to as 'Main Engineering,' serves as the ship's critical technical nerve center. This location houses the warp core and primary control consoles, playing a pivotal role in propulsion, power distribution, and temporal anomaly resolution. Key narrative events include:

      1. **Temporal Stasis Incident (Episode: 'Relics')**: Time locks Engineering in stasis, creating a frozen warp core breach scenario where every molecule remains suspended in a gaseous cloud threatening destruction. Data (with a modified tricorder) and Picard coordinate to reverse the temporal collapse.
      2. **Romulan Core Synchronization (Episode: 'Relics')**: Data activates a tricorder that synchronizes with the Romulan warp core, triggering temporal resonance and enabling breach reversal.
      3. **Possessed Romulan Attack (Episode: 'Relics')**: A possessed Romulan woman attacks Data during the crisis, forcing him to dodge while managing containment fields and power transfer.
      4. **Ensign Assistance (Episode: 'Relics')**: An unnamed ensign plays a supporting role by restarting power flow commands, aiding Data in stabilizing the warp core.
      5. **Temporal Anomaly Crisis (Episode: 'Timescape')**: A massive power surge detected from the bridge's Ops console—linked to a temporal anomaly—freezes the crew and ship in mid-crisis. Data navigates via Jefferies Tubes to investigate anomalies, including temporal resonance with the Romulan core and warp core breaches.

      The location's dual role as both a technical hub and a high-stakes narrative battleground underscores its importance in *Star Trek: TNG* episodes involving temporal mechanics, Romulan conflicts, and warp core emergencies. Consoles in this area often flare with overload warnings, demanding urgent analysis to avert disaster.
  location_type: Starship Main Engineering
