  global_id: ger_location_104e02d8ab3a
  canonical_name: Planet Benzar
  description: 'Planet Barzan hangs beneath the Enterprise like a quiet, high-stakes
    creditor: a distant orb whose very existence drives the room’s tension. Its identity
    centers on a newly discovered, apparently stable wormhole that promises strategic
    leverage and economic promise. The planet reads as vulnerable and urgent—its delegates
    plead for technology and independence while outside actors sniff profit. In the
    observation deck its presence translates into moral pressure, diplomatic desperation,
    and the threat of exploitation; the planet’s gravity is political rather than
    geological, an embodied stake that turns protocol into contest and compassion
    into bargaining currency.'
  location_type: Inhabited Planet (Wormhole Host)
