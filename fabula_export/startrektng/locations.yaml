- fabula_uuid: ger_location_3fd6e04efc69
  global_id: ger_location_3fd6e04efc69
  canonical_name: Ancestral Burial Hills
  description: A low, serrated band of sun-browned hills threads the distant horizon
    beyond the colony, forming a continuous communal burial ridge visible from the
    main street. Sunlight washes their clay faces and dust drifts from their slopes;
    colonists point to particular rises as graves. The feature functions as a moral
    and mnemonic landmark—anchoring personal grief (pointed out by Gosheven) to the
    colony’s collective duty and stubborn pride.
  location_type: Hills — Ancestral Burial Ridge
