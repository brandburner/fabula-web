  global_id: ger_location_888079d26caa
  canonical_name: Small Ridge
  description: Kamin climbs the small ridge in arid hills beyond his village, boots
    crunching over barren rock as he scans the empty horizon for Starfleet signs.
    Sunlight beats on the unyielding terrain, amplifying his solitude. From this vantage,
    distant fields stretch out, offering no artifacts or memories—only the sting of
    unresolved identity. His deliberate ascent cuts through the landscape's silence,
    each step a push against the planet's indifference.
  location_type: Arid Planetary Ridge
