  global_id: ger_location_3b87f9c97200
  canonical_name: Shuttle Bay (Main Level, USS Enterprise-D)
  description: The Enterprise-D's main-level shuttle bay, a vast hangar spanning the
    starship's deck, features grated catwalks ringing upper levels with railings and
    a control booth overlooking the proceedings. The space serves as a critical operational
    hub where security teams, medical personnel (including Beverly Crusher), and crew
    members interact during high-stakes events. Key narrative moments include Worf's
    fatal fall from an upper catwalk during a violent energy surge, followed by John
    Doe's miraculous revival of the Klingon through a radiant healing touch. The bay's
    design includes structural elements such as grated catwalks, railings, a control
    booth with hangar door panels, and a high ceiling. Narrative functions include
    violent clashes, medical emergencies, and supernatural interventions, often shifting
    from mechanical quiet to chaotic awe. The bay is also the setting for routine
    maintenance activities, such as shuttlecraft realignments under Geordi La Forge's
    supervision, where tension simmers beneath the surface.
  location_type: Starship Shuttle Bay
