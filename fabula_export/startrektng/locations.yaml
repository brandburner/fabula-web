- fabula_uuid: ger_location_f90e3206c0f9
  global_id: ger_location_f90e3206c0f9
  canonical_name: Evacuation Corridor (USS Enterprise-D)
  description: Central corridor system aboard the USS Enterprise-D during the chaotic
    evacuation before the baryon sweep. This space serves as a critical hub where
    Captain Picard coordinates with key personnel (Troi, Riker, Beverly) to reroute
    decks seven and eight through Cargo Bay Two transporters and direct Beverly to
    an astrophysics lab stasis unit. The corridor's narrow layout and confined spaces
    amplify the urgency of the evacuation, with echoing footsteps and the ship's hum
    creating a tense atmosphere. Key events include Picard's ambush of Pomet at a
    narrow intersection, his surrender to Kiros's phaser, and his subsequent march
    toward Ten Forward. The turbolift entrance (where Riker intercepts Picard) represents
    one of several access points within this larger corridor system.
  location_type: Starship Corridor
  parent_location_uuid: null
