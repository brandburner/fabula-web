- fabula_uuid: ger_location_bf5b20fde080
  global_id: ger_location_bf5b20fde080
  canonical_name: Earth's Atlantic Ocean
  description: Salt-laden horizon and endless swell form a weather-beaten corridor
    where twentieth‑ and early twenty‑first‑century liners once carved steady wakes.
    Data invokes Earth's Atlantic Ocean to pinpoint the Q‑E‑Two's historical operating
    area, summoning shipping lanes, crowded transatlantic traffic, and the layered
    memory of civilian voyages. The ocean operates as a distant, nostalgic, and forensic
    referent—vast, wind-scoured, and quietly freighted with human routes and logistical
