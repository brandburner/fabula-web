- fabula_uuid: ger_location_e973d28754c0
  global_id: ger_location_e973d28754c0
  canonical_name: Battle Section
  description: The Battle Section (also referred to as the Battle Bridge) of the USS
    Enterprise serves as the tactical command hub during the Borg encounter in *The
    Best of Both Worlds, Part II*. This isolated module contains weapons systems,
    power generators, and tactical arrays that draw the Borg's attention, allowing
    the saucer section to escape. Under Commander Riker's leadership, the crew executes
    evasive maneuvers (Riker Alpha/Beta patterns) while firing phasers and antimatter
    spreads at the Borg cube. The space is characterized by red alerts, overloading
    circuits (acrid ozone), and the straining thrum of engines as the crew braces
    for potential sacrifice to protect the fleeing saucer. Key interactions include
    confrontations with Locutus (assimilated Picard) and desperate counterattack orders
    from Shelby.
  location_type: Starship Battle Section
