  canonical_name: Far Door Near Parliamentarians
  description: This far door stands as a grim gateway within Angel One’s Great Hall,
    serving as the stern passage through which Ramsey, the prisoners, and Ariel are
    brought forth and removed. Its imposing presence marks a boundary between the
    public political arena and the harsh reality of incarceration and judgment. The
    door's heavy frame echoes with the weight of betrayal and impending death sentences,
    its threshold charged with ruthless matriarchal justice and shattered diplomatic
    hopes. The atmosphere thickens with tension and despair, amplifying the away team's
    moral crisis amid the planet’s escalating political and medical turmoil.
