  description: Two compact aft science stations sit edgewise to the command arc, consoles
    aglow with LCARS glyphs and braided cable runs that feed humming coils. Panels
    flare under load as instruments read at full capacity; technicians and supernumeraries
    hunch over diagnostics, fingers tracing tactile keys while coolant fans whisper
    and coherence meters blink. The air tastes of ozone and warm circuitry, tension
    coiling around each data readout as crews triage anomalous fields. Functioning
    as both observation posts and crisis workbenches, these stations translate raw
    sensor noise into tactical options and moral choices under tight time pressure.
