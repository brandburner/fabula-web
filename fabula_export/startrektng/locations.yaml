  global_id: ger_location_3dc777a93c0a
  canonical_name: Paulson Nebula
  description: Dense clouds of dilithium hydroxyls, manganese, chromium, and heavy
    metals swirl through the Paulson Nebula, creating an unstable electromagnetic
    haze that blinds Borg sensors and shields the Enterprise during evasion. Wesley
    Crusher pilots through treacherous debris and thick particulate matter, securing
    a fragile hiding spot. Crew members watch the oppressive chaos envelop the ship,
    its sensor-scrambling density buying precious time against relentless pursuit
    while underscoring their vulnerability.
  location_type: Interstellar Nebula
