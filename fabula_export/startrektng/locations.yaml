  global_id: ger_location_063a4d13216a
  canonical_name: Radiation Triage Assembly Area
  description: 'A hastily designated triage bay organized to receive and treat radiation
    casualties: modular stretchers and folding screens bracket a narrow corridor,
    bright task lamps stab through the low shipboard hum, and medics in protective
    gear move with precise, clipped efficiency. The air tastes metallic under the
    antiseptic tang; alarms and clipped orders puncture the tension. Designed for
    rapid decontamination, sorting, and emergency intervention, the space functions
    as a temporary frontline between disaster and definitive care, charged with urgency
    and clinical focus.'
