  description: Dense fog cloaks the alien moon's surface, but distant glimmering lights
    pierce the horizon. Troi senses an unnatural intelligence approaching from this
    direction, while Data's tricorder captures intense electromagnetic bursts. The
    lights reveal the alien entities' domain, trapping the crew in jammed communications
    and a storm that defies sensors. Isolation forces reliance on instinct amid the
    growing threat.
