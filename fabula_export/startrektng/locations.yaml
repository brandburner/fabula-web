- fabula_uuid: ger_location_ecaf317eeaa2
  global_id: ger_location_ecaf317eeaa2
  canonical_name: Hospital Corridor (Malcorian Medical Facility)
  description: Sterile passage in the Malcorian medical facility erupts into violence
    when Nilrem spots Riker escaping and shouts 'Stop him! The alien’s escaping!'
    Staff and bystanders grab chairs and bottles, forming a xenophobic mob that pummels
    Riker despite his fierce resistance. Shouts fill the smooth-walled space until
    Berel and Tava intervene, restoring order amid blood and chaos. Krola watches
    from an overlooking window, phaser in hand, as the attack aggravates Riker's injuries
    and exposes societal fractures.
  location_type: Hospital Corridor
