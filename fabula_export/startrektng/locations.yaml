- fabula_uuid: ger_location_d734cc5adbb8
  global_id: ger_location_d734cc5adbb8
  canonical_name: Indri VIII (Indri Eight)
  description: Indri VIII (also referred to as Indri Eight), an L-class alien planet,
    was initially encountered by the *Enterprise* crew as an unexplored world with
    deciduous vegetation covering its green expanses and no detectable animal life.
    Its quiet isolation was abruptly shattered when a global plasma reaction ignited
    its atmosphere, consuming the biosphere in seconds. The surface transformed from
    verdant to barren brown, erasing potential secrets—including a concealed DNA fragment—before
    the *Enterprise*'s viewscreen. Subsequent investigations revealed that the planet's
    destruction was orchestrated by the Nu'Daq, who scorched its surface in a brutal
    bid to harvest the DNA fragment from an ancient program. The devastation left
    behind exposed the ruthless desperation of interstellar competition, particularly
    between Klingon forces and Cardassian scavengers, and became a symbol of the moral
    cost of such conflicts. Picard later revealed the planet's fate in the *Enterprise*'s
    Observation Lounge, prompting the crew to confront the high stakes of interstellar
    rivalry and the fragility of alliances.
  location_type: L-Class Alien Planet
  parent_location_uuid: null
  season_appearances:
