  global_id: ger_location_1a7e3677a96d
  canonical_name: Klingon System
  description: A cold, politically charged star region toward which the Enterprise
    suddenly vectors, the Klingon System tastes of ionized metal and distant suns.
    Bridge consoles flash as trajectories realign; the stars smear into hurried navigation
    runs and the hum of engines threads through terse orders. The system functions
    as both destination and political fulcrum—Picard’s new course transforms private
    dishonor into an interstate crisis, and the emptiness beyond its jump points amplifies
    urgency, protocol, and the brittle honor that propels tactical decisions.
