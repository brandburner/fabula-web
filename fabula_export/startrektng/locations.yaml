  description: Assigned to Amanda Rogers during her internship on the *USS Enterprise-D*,
    these **guest quarters** are distinct from crew quarters, reflecting her temporary
    status and outsider perspective. The space is designed for **short-term use**
    and lacks personalization, emphasizing Amanda’s transitional role aboard the ship.
