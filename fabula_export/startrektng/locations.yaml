- fabula_uuid: ger_location_6de559af0386
  global_id: ger_location_6de559af0386
  canonical_name: Prytt-Kes Border Zone (Brush Ambush Site)
  description: |-
    The contested planetary border between Prytt and Kes territories, marked by an invisible forcefield with flanking signs and stanchions. This location serves as both a critical escape route and a site of violent confrontation. Key narrative moments include:
            - Prytt troopers bursting from dense brush lining the border, ambushing Picard and Beverly under daylight skies. The tangled foliage hides their advance until moments before seizure, amplifying peril near the humming forcefield.
            - Beverly's shove sends Picard to safety through the weakened forcefield onto the Kes side, while she is seized by Prytt soldiers. The undergrowth's cover turns ambush point into a site of sacrifice and severed bonds.
            - The sunlit open ground marking the tense divide between Prytt and Kes territories, where Picard tumbles through the forcefield onto the Kes side, gaining brief safety from advancing Prytt troopers.
            The location is characterized by its dual nature: the exposed open border area (dust swirling in the air, charged silence) and the dense brush where ambushes occur, creating a volatile atmosphere of relief and horror as key characters' bonds are severed amid the escalating conflict.
  location_type: Interstellar Border Territory
