  global_id: ger_location_d2864d2df632
  canonical_name: Risa Lanai Beach
  description: Outdoor tropical resort beach on Risa, featuring a lanai (open-air
    veranda) where Picard sits during his vacation. The beach is the primary setting
    for hedonistic escape, cultural clashes (e.g., Joval's Horga'hn expectations,
    Sovak's Ferengi accusations), and disruptions (e.g., dripping couple, Vash's arrival).
