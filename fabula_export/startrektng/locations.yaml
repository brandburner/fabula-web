- fabula_uuid: ger_location_6301ab430c57
  global_id: ger_location_6301ab430c57
  canonical_name: Indianapolis
  description: Indianapolis pulses as a terrestrial anchor that steadies Clare Raymond
    when Troi's search returns a records hit. The city registers offscreen as ordinary,
    human-scale life — addresses, family homes, weekday rhythms — a reachable geography
    that converts abstract loss into people and possibilities. Its imagined domestic
    hum and civic normalcy give Clare a concrete path back to Earth and a fragile
    hope that her line continues through living descendants.
  location_type: Midwestern American City
