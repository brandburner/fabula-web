- fabula_uuid: ger_location_b15eecccbab4
  global_id: ger_location_b15eecccbab4
  canonical_name: Pacifica Diplomatic Conference
  description: 'A formal, high-stakes diplomatic gathering set on the oceanic world
    of Pacifica, the conference occupies sun-bleached pavilions and diplomatic halls
    that open onto endless blue horizons. Delegates arrive beneath warm trade winds
    and the hush of protocol, but beneath the polite choreography simmers lethal urgency:
    the event becomes a ticking waypoint for assassination and political theater.
    The space smells faintly of salt and perfumed gowns, echoes with guarded conversation,
    and functions as both ceremonial destination and focal point for mission tension
    and moral decisions.'
  location_type: Planetary Diplomatic Conference Venue
  parent_location_uuid: ger_location_92fd178b3b22
