  global_id: ger_location_b112bda0846f
  canonical_name: Holodeck — Space Station Laboratory Reconstruction
  description: 'The holodeck hardens into a surgical reconstruction of a space station
    laboratory: clinical metal benches, mirrored coil arrays, and a facsimile transporter
    ring rendered with unsettling precision. A low, recycled‑air hum and faint ozone
    hang in the air as seam lines and projection scaffolding peek beneath perfect
    surfaces. Picard stages opposing testimonies here, freezing depositions into looping
    holograms while Geordi times a simulated converter pulse that detonates a mock
    reactor. The room feels contrived yet consequential — synthetic sight, sound,
    and physics conspire to convert doubt into forensic clarity and to force moral
    reckoning under controlled catastrophe.'
  location_type: Holodeck Simulation Room
