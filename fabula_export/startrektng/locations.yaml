  canonical_name: T-Tauri System
  description: The T-Tauri System, a star system containing the enigmatic T-Tauri
    Planet (sandy-brown, dusty surface) and a Neptune-like gas giant. Enterprise's
    initial warp drop reveals a wormhole flicker that pulls the ship into blinding
    light, causing crew unconsciousness. Probes later reveal sensor contradictions
    (Class M vs gas giant scans), fueling debates. The system is the 'scene of the
    crime' for the Paxan confrontation, where memory-wiping anomalies and xenophobic
    threats originate. Key events include the wormhole deception, crew's missing day,
    and Worf's wrist healing. The system's deceptive calm hides advanced technology
    capable of fabricating anomalies and enforcing secrecy through memory blocks.
