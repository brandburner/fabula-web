- fabula_uuid: ger_location_6c2042386612
  global_id: ger_location_6c2042386612
  canonical_name: Center of the City
  description: 'A compact civic core that anchors the Angosian capital: braided boulevards,
    civic buildings, and crowded squares now taste of dust and fear. Commerce stalls
    as shopfronts shutter and pedestrians freeze mid-step. After the shuttlebus bombing
    that killed sixty children, checkpoints spike, armored patrols thread the plazas,
    and the senate rotunda''s façade becomes a charged axis for political performance.
    Rumor and grief knot through the streets; mass detentions and security sweeps
    compress public life, converting fountains, benches, and broad sidewalks into
    contested thresholds under watchful lights and clipped orders.'
  location_type: City Center / Civic Core
  parent_location_uuid: null
