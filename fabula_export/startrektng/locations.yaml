  global_id: ger_location_2dad59f89395
  canonical_name: Klingon-Romulan Colony Compound (Former Prison Colony)
  description: A remote planetary settlement established as a former prison colony,
    now housing Klingon prisoners awakened to their heritage and Romulan captors in
    tense coexistence. The compound features well-tended barracks, crop fields, and
    open gates, masking its deceptive calm beneath unresolved cultural tensions. Worf's
    transformative influence is central to the colony's narrative arc, culminating
    in his departure as the USS Enterprise disengages from orbit. The site embodies
    themes of cultural rifts, enforced lies, and the uncertain future of its mixed-species
    population under hazy skies.
