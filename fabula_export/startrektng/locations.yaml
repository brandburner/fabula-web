- fabula_uuid: ger_location_667116336fb2
  global_id: ger_location_667116336fb2
  canonical_name: Anteroom to Romulan Holodeck
  description: 'Technicians strip Riker''s gray hair and beard with a precise Romulan
    device in this sterile anteroom next to the holodeck. Tension mounts as Riker
    confronts Tomalak, exposing the illusion''s flaws: computer time lags and Minuet''s
    holodeck origins. Tomalak shifts from condescension to frustration, ordering guards
    to remove Riker amid the controlled space''s cold precision. The chamber bridges
    the deceptive holodeck and deeper facility, marking the pivot from psychological
    manipulation to physical coercion.'
  location_type: Romulan Facility Anteroom
  parent_location_uuid: ger_location_3e17ff879624
  season_appearances:
  - 4
