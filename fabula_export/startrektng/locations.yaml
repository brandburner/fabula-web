  canonical_name: Romulan-Klingon Border
  description: Federation leaders target this tense interstellar frontier as the site
    for a blockade fleet. Picard positions ships along the border to halt Romulan
    supply runs to the Duras family, exploiting its role as a vital choke point. Geordi's
    tachyon grid blankets the zone, scanning for cloaked vessels that dart through
    neutral space. Patrols prowl the edges, where a single misstep risks war between
    empires. Crews brace for confrontation amid silent voids and flickering sensor
    sweeps.
