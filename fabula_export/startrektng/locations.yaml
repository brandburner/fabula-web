  global_id: ger_location_9a6693a5c1ec
  canonical_name: Starship Repulse
  description: The Starship Repulse emerges as Captain Taggert's Federation command—a
    vessel steeped in Starfleet efficiency and personal history. Its corridors echo
    with the imprint of Dr. Pulaski's tenure as Chief Medical Officer, marked by her
    notorious transporter aversion that left administrative scars in purged records.
    The ship's structural precision carries the weight of institutional secrets, its
    sterile bulkheads having witnessed Pulaski's professional clashes and unexpected
    admiration for Captain Picard. Through subspace transmissions, Repulse's bridge
    looms as a ghost of bureaucratic caution, its viewscreen casting cobalt shadows
    across Picard's ready room as past tensions transmit across the light-years. This
    starship exists both as physical spacecraft and psychological anchor point—the
    origin of personnel transfers that carry unspoken institutional baggage into the
    Enterprise's present crises.
  location_type: Federation Starship
