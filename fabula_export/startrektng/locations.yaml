  global_id: ger_location_4ee3a8ee3ef3
  canonical_name: Center of the Galaxy
  description: Enterprise drops out of warp into the galaxy's core, a dense expanse
    of countless stars that fills screens with awe-inspiring brilliance. Crew tenses
    as a holographic Cytherian alien appears here, cataloging them with clinical curiosity
    amid the stellar vastness. Picard recognizes the site's mystery aligns with Federation
    exploration, shifting caution to diplomatic engagement in this cosmic heart of
    knowledge exchange.
  location_type: Galactic Core
