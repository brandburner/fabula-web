  canonical_name: Devastated Star System
  description: Enterprise bursts from a violent transwarp jump into this ravaged star
    system, where Geordi detects remnants of two advanced civilizations reduced to
    plasma-scorched debris by Borg weapons. A planet below holds the shuttle's energy
    trail, but heavy electromagnetic interference—likely natural—blocks scans and
    hides potential ambushes. The crew confronts evidence of Borg aggression shifted
    from assimilation to annihilation, fueling urgency and dread on the bridge.
