    blocking detailed surface views. Geordi warns of ambush risks hidden in the interference
    as Picard green-lights Riker and Worf's armed away team for blind beam-down. Tension
    grips the bridge; the planet broods as a shrouded hazard, its storms amplifying
    the Borg's unpredictable menace.
