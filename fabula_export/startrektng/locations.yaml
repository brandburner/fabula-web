  description: The primary entry point to the Turkana IV tunnel system, where the
    away team initially slips into a wide, partially collapsed tunnel mouth. This
    location serves as both a refuge for fleeing Coalition fighters and a tactical
    entry/exit point for the Enterprise crew. The area features rubble-lined walls
    blending urban decay with subterranean gloom, proximity alarms, and a guarded
    door leading to the Alliance holding cells. Key events include Beverly Crusher
    treating injured fighters, Riker leading the chase deeper into the tunnels, and
    the away team's confrontation with Alliance sentries.
