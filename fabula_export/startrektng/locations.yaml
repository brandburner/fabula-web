  global_id: ger_location_b6b1b1b22a8f
  canonical_name: Klingon Vessel Pagh
  description: 'The Klingon vessel Pagh (also referenced as the Klingon cruiser Pagh)
    is a battle‑hardened Klingon warship: cold ribs of riveted plating, a clipped
    silhouette and scorched hull, narrow red‑tinged passageways, and a utilitarian,
    martial architecture. Its atmosphere—metallic air, deliberate footsteps, and ritualized
    crew behavior—frames Riker''s cultural testing and the Enterprise''s approach
    from Starbase 179. The ship functions narratively as an isolated theater of honor‑driven
    trials and confrontation.'
