  global_id: ger_location_874d69afbe86
  canonical_name: Restaurant (Referenced)
  description: 'A familiar, shore-side dining room summoned more by memory than by
    walls: lacquered tables, low amber lamps, the clink of glass and the breath of
    spiced broth. Characters imagine chair backs, a host’s nod, and steaming plates
    arriving with human ceremony — comforts that anchor identity and routine. Narratively
    the restaurant functions as a cultural magnet and absence: it stands as the twentieth‑century
    comfort Sonny hunts for and as a foil to the ship’s pragmatic food stations. The
    imagined smell, warmth, and social intimacy intensify the survivors’ displacement
    and underline institutional limits to personal care.'
