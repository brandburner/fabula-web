  description: 'Guinan''s private office aboard the USS Enterprise-D: a compact, dimly
    lit space used for intimate counsel and quick tactical monitoring. The room centers
    on a small personal viewscreen and a low console within reach of the bridge, narrow
    consoles and a single display ringed by status lights, and a small desk and swiveling
    chair with diagnostic readouts and tangled cables. Warm, personal light pools
    over simple furnishings; the viewscreen''s glow and the ship''s low mechanical
    hum punctuate urgent connections when Guinan translates instinct into warning
    or feeds terse input to the bridge crew.'
