  description: Sensors pick up anomalous energy pulsing from this cavern two kilometers
    beneath Alpha Onias III's barren Class M surface. The readings defy Starfleet
    records and prompt Worf to suspect Romulan deception. Riker's away team—Worf and
    Geordi—beams down to investigate, drawn by the site's urgency near the Neutral
    Zone. Tension builds as the crew shifts from routine scans to potential confrontation
    in the planet's hidden depths.
