- fabula_uuid: ger_location_e1ff299ca3c2
  global_id: ger_location_e1ff299ca3c2
  canonical_name: Non-Operational Areas
  description: 'Bulkheads seal and lights strobe across a constellation of darkened
    compartments: Non-Operational Areas feel like the ship''s scar tissue. Hatches
    click shut, vents whisper stale air, and consoles go dead as crews evacuate and
    post hazard markers. The bridge''s thirty-minute radiation verdict turns these
    corridors into deliberate sacrifice zones—sealed to contain contamination and
    shield critical systems. Anxiety hangs heavy at every threshold; footsteps and
    clipped orders echo as teams move methodically to isolate danger and protect remaining
    operational spaces.'
