  canonical_name: Romulan Trap Asteroid (Cavern Chamber)
  description: |-
    The **central chamber** of the Romulan Trap Asteroid, where the *Pegasus* is half-embedded in rock and the *Enterprise* is lured into a high-stakes escape scenario:
          - **Physical trap**: Rocky walls enclose the *Pegasus*, and the *Enterprise* must navigate a treacherous tunnel to reach this space. The cavern’s scale dwarfs starships, amplifying the peril.
          - **Narrative climax**: Crew reactions (e.g., Worf’s anomalous resonance readings, Riker and Pressman’s loaded glances) and the use of an illicit cloaking device to escape without scraping free define this as the **core of the trap**.
          - **Visual/aural cues**: Dim emergency lighting, stellar flickers through cracks, and the low hum of cloaking devices fill the space, creating a claustrophobic, high-tension environment.
          - **Connection to chasm system**: The *Enterprise* threads through a tunnel (see *Asteroid Gamma 601 Chasm System*) to burst into this chamber, linking the surface and subsurface layers of the trap.
  location_type: Deep Space Asteroid Interior
