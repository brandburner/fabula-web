- fabula_uuid: ger_location_abad80eefa12
  global_id: ger_location_abad80eefa12
  canonical_name: Test Ship
  description: The test ship floats in open space ahead of the Enterprise, towed into
    exact position by support craft. Data reports its alignment while Geordi confirms
    systems readiness. Ja’Dar triggers the Soliton Wave from Bilana III; the distortion
    engulfs the hull, accelerating the vessel into warp without disruption. Picard
    nods approval as the crew marks the test's clean success from the bridge, though
    the wave's path now endangers the colony below.
  location_type: Experimental Starship
  parent_location_uuid: ger_location_e26e517d0a7e
