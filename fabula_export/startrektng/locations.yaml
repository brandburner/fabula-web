  description: 'A specific deep-space sector (Sector Three-Five Mark Seven) serving
    as the narrative origin and locus of the Mary Rogers distress: a remote expanse
    where the distress of the transport Mary Rogers prompts Enterprise sensors to
    record wreckage coordinates and where the crisis that frames the episode unfolds.
    Functionally this sector operates both as the origin of engagement for the Enterprise
    (the sector to which Q returns the ship and from which the crisis began) and as
    the immediate scene of the mayday, amplifying the episode''s themes of isolation
    and moral urgency.'
