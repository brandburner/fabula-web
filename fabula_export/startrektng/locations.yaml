  global_id: ger_location_b4e682a2e363
  canonical_name: Essex
  description: The Essex carried Ux-Mal convicts five centuries ago during their first
    escape bid from the moon's penal colony. Electromagnetic currents trapped the
    ship, blocking its flight and forcing the entities back into banishment. Troi
    recounts this failure amid swirling energy rings in the Enterprise cargo bay,
    her voice steady as she reveals the vessel's defeat and the moon's unyielding
    grip on intruders.
