- fabula_uuid: ger_location_0eba384d20ac
  global_id: ger_location_0eba384d20ac
  canonical_name: First City of the Klingon Imperial Empire
  description: A thunderous imperial metropolis that functions as the ceremonial and
    political heart of Klingon authority. Massive stone and alloy spires puncture
    wind-lashed skies; broad plazas and honor-halls host banners, martial statuary,
    and the cadence of ritualized power. As a plotted destination on the Enterprise’s
    helm, the First City exerts immediate geopolitical gravity—turning private family
    dishonor into an interstate flashpoint and forcing Starfleet to confront ceremonial
    law, military posture, and diplomatic peril at once.
  location_type: Planetary Capital City (Klingon Imperial Capital)
