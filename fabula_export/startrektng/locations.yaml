    sheltering 15,311 civilians amid sparse defenses. Data's scans pinpoint four laser
    cannons, 39 cobalt fusion warheads, and weak shields, all protected by unmanned
    sentry pods firing fusion pulse lasers. The Enterprise crew targets it directly
    after breaching the pod field at full impulse, phasers blazing. Picard halts the
    assault upon confirming civilian presence, his sensors revealing the station's
    vulnerability and igniting the crew's moral standoff against orders to destroy
    it.
