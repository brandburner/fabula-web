  canonical_name: Timothy's Quarters (Foster Parents' Quarters)
  description: Compact starship cabin where Timothy huddles over a fragile Dokkaran
    temple model, his hands shaking with desperation for approval. Data enters, delivers
    precise critique from across the small table, sparking the boy's outburst—he smashes
    the structure in fury. Moments later, Data rebuilds it flawlessly at superhuman
    speed, leaving Timothy staring in silent awe amid the quiet hum of ship systems.
    The intimate confines amplify raw vulnerability, contrasting human fragility against
    android perfection.
