- fabula_uuid: ger_location_df7f5251cdde
  global_id: ger_location_df7f5251cdde
  canonical_name: Chicago
  description: 'Chicago appears as a named, offstage Midwestern origin invoked in
    Picard''s Dixon Hill introductions, credited as the hometown of the gangster nicknamed
    ''Nails.'' The city reads as a working‑class, urban backdrop that furnishes the
    holodeck persona with grit and local color: hard edges, rain‑slick streets, distant
    train clatter, and a no‑nonsense reputation that explains toughness, loyalty,
    and streetwise manner. Its presence functions narratively as a compact origin
    story—an atmospheric shorthand that grounds a period criminal in a recognizable
    American urban landscape without ever being physically depicted.'
  location_type: Midwestern American City
