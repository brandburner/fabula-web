  global_id: ger_location_2df54b550188
  canonical_name: Uxbridge Living Room
  description: 'A small, ruined living room that clings to past domestic routines
    amid destruction: faded upholstery, a warped side table, and a narrow cupboard
    where Rishon keeps her tea service. The air tastes of dust and old smoke; a faint
    mechanical tick of an heirloom music box layers over distant ship hums. Intimate
    objects — a garden snare, a chipped teacup, an ornate music box — concentrate
    personal history and loss, turning ordinary gestures like offering tea into fragile
    rituals. The space functions as both refuge and stubborn memorial, forcing visitors
    to confront private grief rather than technical solutions, and anchoring the scene’s
    telepathic and emotional stakes.'
  location_type: Suburban Home - Living Room
