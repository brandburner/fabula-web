  global_id: ger_location_ff5950332c5a
  canonical_name: Rahm-Izad System
  description: Computer screens in the Enterprise lab glow as Data and Beverly align
    the ancient DNA fragments into a stellar pattern matching galaxy stars. A glaring
    gap resolves into the Rahm-Izad system, its clustered lights pinpointing the final
    fragment's hiding place. Gul Ocett locks eyes on the display, then beams away
    without a word, her exit rippling suspicion through Picard and Nu'Daq. The system
    hangs distant yet charged, a contested prize fueling Cardassian secrecy and Federation
    resolve.
  location_type: Star System
