  canonical_name: Zorn's Cell
  description: Zorn's Cell pulses with a living menace deep inside the alien vessel's
    organic interior at Farpoint Station. This cylindrical confinement chamber imprisons
    Groppler Zorn within a shimmering forcefield that radiates palpable agony and
    symbiotic malevolence linked to the ancient Bandi city. The chamber's walls and
    floor undulate and shift like a sentient predator responding violently to intrusion.
    When the away team disables the forcefield, the cell transforms into a merciless
    battleground as plasma tendrils lash out and the floor softens into deadly traps.
    This hostile, pulsating space traps Troi, Data, and Tasha in escalating peril,
    embodying the vessel's savage defense and the profound mystery entwining alien
    life and human exploitation.
