  global_id: ger_location_be1d4b7751ad
  canonical_name: Central Square, Romulan Prison Camp
  description: Colony members pack the open square under harsh daylight, forming a
    tight semi-circle around Worf against the execution wall. Tokath justifies the
    killing through speeches on shared hardship; Worf exposes suppressed heritage.
    Tension erupts as Toq steps forward in battle armor, elders like L’Kor and Gi’ral
    shield the defiant youth, and Ba’el stands before her father’s disruptor. Silence
    breaks into schism, marking cultural fracture amid prior campfires and rituals
    that once bound the Klingon-Romulan prisoners.
