- fabula_uuid: ger_location_7512e30a6414
  global_id: ger_location_7512e30a6414
  canonical_name: Amargosa Diaspora
  description: The Enterprise plunges into the Amargosa Diaspora, a globular cluster
    far denser than star charts predict. Stars crowd the viewscreens, forcing the
    crew to scramble for better sensors to map its twists. Picard logs the entry while
    engineers in Engineering pore over the holographic display, urgency building as
    delays threaten the mission. This stellar thicket sparks risky deflector modifications,
    heightening shipboard tension amid the charting push.
  location_type: Globular Star Cluster
