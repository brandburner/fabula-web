- fabula_uuid: ger_location_609d5c7b26c4
  global_id: ger_location_609d5c7b26c4
  canonical_name: Ballroom Entryway (Far Across the Room)
  description: Doorman stands guard at this distant entryway to the 19th-century ballroom,
    clipboard in hand to check guest lists amid arriving gentlemen in tailcoats and
    ladies in gowns. Data, disguised in period attire, confronts the man here; his
    android strength overpowers protests as he drags the doorman across the polished
    floor toward the central debate. Crystal chandeliers gleam overhead, murmurs of
    literary chatter echo from the main floor, but tension spikes in this threshold
    zone where social barriers shatter under urgent temporal intrusion.
  location_type: Ballroom Entryway
