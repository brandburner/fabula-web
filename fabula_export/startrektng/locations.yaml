- fabula_uuid: ger_location_18678fd96c67
  global_id: ger_location_18678fd96c67
  canonical_name: Reactor Core Shaft — Main Engineering
  description: A vertical, industrial artery plunging through Main Engineering, the
    reactor core shaft throbs with heat, ionized hum, and the scent of ozone. Grated
    rims and maintenance lip panels puncture the cylinder of containment; service
    ladders and access hatches angle into shadowed recesses where Jefferies tubes
    branch like veins. Light from diagnostic consoles spills up the shaft in thin
    bands while metal echoes betray any climb or fall. Functioning as both vital infrastructure
    and an improvisational route, the shaft becomes a tactical vulnerability when
    an intruder scales its face to reach hidden maintenance conduits, turning the
    ship's power heart into a hunting ground.
