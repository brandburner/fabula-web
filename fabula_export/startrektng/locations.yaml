  canonical_name: Adjoining Bathroom
  description: The Adjoining Bathroom stands frozen in time and terror, its clinical
    intimacy shattered by the chilling frost creeping over every surface. Connected
    to the personnel quarters, it harbors a frozen woman trapped in the shower stall,
    a haunting symbol of the sabotage and creeping contagion silently infiltrating
    the Enterprise. The cold atmosphere suffocates the space with oppressive silence,
    transforming an everyday hygiene room into a grim crucible of death and dread.
    This bathroom marks the pivotal moment of first contamination exposure, the threshold
    where invisible menace crosses into the crew’s fragile sanctuary, setting a deadly
    infection in motion.
