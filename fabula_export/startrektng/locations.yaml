  global_id: ger_location_b8e7de912ccb
  canonical_name: Baran's Quarters (Mercenary Ship)
  description: Baran sprawls in overstuffed chairs amid gaudy sculptures, drinks while
    grilling Riker on loyalty and plotting Picard's death. Riker sits tense on a couch,
    feigning zeal. Later, Picard and Tallera pore over logs and resonator pieces here,
    suspicion mounting. Opulence clashes with the ship's grit, amplifying Baran's
    self-indulgent command in this private lair of intrigue and betrayal.
