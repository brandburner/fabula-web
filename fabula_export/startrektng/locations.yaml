  global_id: ger_location_610c0c91f802
  canonical_name: Garadius System
  description: Picard directs the Enterprise toward the Garadius system, setting it
    as the primary waypoint on the ship's plotted course. From the main bridge, the
    crew prepares warp engagement amid rising tension from chroniton field delays
    and unheard sabotage warnings. This stellar expanse pulls the starship forward
    through fraught space, symbolizing fragile progress after Romulan interactions,
    with every delay amplifying the risk of disaster in the dilithium chamber.
