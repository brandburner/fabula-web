  canonical_name: Deltived Asteroid Belt
  description: 'A ragged gauntlet of tumbling rock and drifting debris, the Deltived
    Asteroid Belt registers on sensors as a shifting, treacherous field that demands
    constant course corrections. It lives in rumor as much as in space—spoken of aboard
    ships as the place an errant godlike prank once shoved asteroids out of their
    lanes. The belt functions here as a narrative scar: a hazardous landmark, a shorthand
    for past calamity, and a conversational fulcrum that surfaces blame, embarrassment,
    and the fragile limits of navigation when omnipotence meddles.'
