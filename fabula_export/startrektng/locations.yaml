  description: Crew assembles in Transporter Room Two aboard the USS Enterprise-D,
    medical away team donning gear under the low hum of active consoles. Glowing pads
    stand ready to beam them to the Argolis moon's crashed ship and Borg signal source.
    Beverly Crusher coordinates amid tense preparations; Riker and Worf arrive, the
