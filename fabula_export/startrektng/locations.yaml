- fabula_uuid: ger_location_c4013e08f6bb
  global_id: ger_location_c4013e08f6bb
  canonical_name: Scorched Earth Surrounding the Uxbridge House
  description: 'A ring of blackened, cratered soil and splintered vegetation encircles
    an otherwise intact single-family house on Rana IV. Ash and ozone hang in the
    air; horizons roll with smoldering rubble and collapsed outbuildings. Charred
    tree stumps and heat-riven rocks pockmark the ground while particulate haze blurs
    distant shapes. The house’s unblemished facade reads as an impossible island within
    ruin, producing immediate dissonance: survivors register relief and suspicion
    in equal measure. Functionally the perimeter operates as a forensic stage — a
    deliberate absence of damage that prompts investigation, sensor sweeps, and moral
    questioning amid lingering thermal anomalies.'
  location_type: Ruined House Perimeter (Planetary Surface)
  parent_location_uuid: null
  season_appearances:
