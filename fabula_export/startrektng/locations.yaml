- fabula_uuid: ger_location_8c700ca5290f
  global_id: ger_location_8c700ca5290f
  canonical_name: Tagra IV Reactor Control Station
  description: The **Tagra IV Reactor Control Station** (also referred to as the *Tagra
    Four Barystatic Filter Control Station*) is a critical planetary facility on Tagra
    IV, where Riker, Geordi, and Lote work to stabilize a reactor meltdown threatening
    the planet's atmosphere. The station is depicted as a high-tension environment
    with blaring alarms, glowing red consoles, and a thick ozone tang, reflecting
    the urgency of the crisis. It serves as the focal point for the *Enterprise* crew's
    efforts to reroute power and prevent ecological collapse. The station's stabilization—alongside
    Amanda Rogers' Q-powered intervention—restores Tagra IV's environment from a smog-shrouded
    wasteland to vibrant green life.
  location_type: Planetary Reactor Control Room
