  global_id: ger_location_6fb532928e22
  canonical_name: Moon Orbiting the Fourth Planet
  description: Sensors from the Enterprise bridge lock onto this moon circling the
    fourth planet in the Argolis cluster. Data pinpoints its life-supporting atmosphere
    as the source of a cryptic, self-repeating transmission amid the system's unstable
    star. Potential life signs flicker on scans, hinting at a crashed vessel below.
    The signal pulses with unknown patterns, pulling Picard and the crew from star
    observation into wary investigation, their viewscreens framing the distant orb
    against volatile stellar flares.
