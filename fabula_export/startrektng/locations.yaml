  global_id: ger_location_77ae2a07ffb9
  canonical_name: Extraordinarily Interesting Astronomical Object
  description: A close, unnamed planet looms as a cold, luminous anchor on the Enterprise’s
    long-range displays, hanging directly ahead of a tumbling asteroid and a stripped
    transport. Pale limb and mottled cloudbands catch bridge sensors and chatter,
    converting distant beauty into operational data. Its presence sharpens attention,
    warps scale—small human decisions feel exposed beneath a vast indifferent globe—and
    it becomes the silent yardstick against which tactical uncertainty, sensor failure,
    and crew anxiety escalate.
  location_type: Planetary Body (Background Orbital Landmark)
