  global_id: ger_location_2835da904a23
  canonical_name: Lappa IV
  description: Lappa IV stands as a Ferengi-controlled world in contested interstellar
    space, homeland of the rare Zan Periculi flowers. These delicate blooms, discovered
    wilted near the Betazoid pond where Lwaxana Troi, Deanna Troi, and Will Riker
    vanished, carry a distinctive botanical signature. Data's precise identification
    exposes the Ferengi link, yanking the Enterprise crew's search from Betazed's
    serene clearings into the opportunistic shadows of Ferengi territory. The planet
    embodies hidden dangers—exotic flora masking a culture of commerce and cunning,
    where every clue risks deeper entanglements.
  location_type: Ferengi-Controlled Planet
