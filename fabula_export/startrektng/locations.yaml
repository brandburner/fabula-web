- fabula_uuid: ger_location_d6fdd01b832b
  global_id: ger_location_d6fdd01b832b
  canonical_name: The English Camp at Agincourt (Holodeck Simulation)
  description: 'A moonlit medieval encampment conjured inside the holodeck: rows of
    canvas tents ring low cookfires, torchlight trembles across damp earth, and the
    tang of smoky hearths blends with the clank of armor. Hushed sentries and clustered
    actors fill the dark with measured cadence as Data moves through the camp reciting
    Henry V while Picard watches, then steps forward to correct and mentor. Functioning
    as both theatrical stage and moral classroom, the space feels intimate and pedagogical—taut
    with rehearsal energy—until the sharp intrusion of a Neutral Zone alert severs
    performance and converts rehearsal into immediate command reality.'
  location_type: 'Holodeck Simulation: Historical Battle Encampment'
  parent_location_uuid: ger_location_5fc9bdbb0626
  season_appearances:
