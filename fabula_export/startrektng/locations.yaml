  global_id: ger_location_4bcf5deab80c
  canonical_name: Shielded Spring
  description: Fresh water bubbles from this shielded spring deep in the dim cavern,
    its force field shimmering under the alien sentry's watch. Wesley scans heat-sensitive
    patterns while Dirgo's phaser gambit triggers fibrous retaliation—selenium encrusts
    weapons and engulfs him, leaving Wesley desperate for Picard's survival. Stale
    air thickens with dehydration's edge; the guarded source taunts them amid echoing
