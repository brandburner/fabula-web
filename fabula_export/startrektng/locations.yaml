  description: Jupiter Outpost Nine-Two orbits near the gas giant, serving as Starfleet's
    forward observation post in the Sol system. Shelby's com report pinpoints it as
    the site of the Borg cube's first visual confirmation, where station crews detect
    the massive vessel's approach toward Earth. Operators relay urgent warnings across
    subspace channels, their scopes locked on the intruder amid Jupiter's swirling
    storms, granting the Enterprise crew vital minutes to respond before the cube
    breaches inner defenses. Tension grips the outpost as the Borg's shadow falls
    across its sensors.
