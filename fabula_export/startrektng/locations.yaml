- fabula_uuid: ger_location_18a45e4bd80c
  global_id: ger_location_18a45e4bd80c
  canonical_name: Lorenze Cluster
  description: The Lorenze Cluster emerges as a vast star cluster shrouding the enigmatic
    Planet Minos and the mysterious region where the USS Drake vanished without a
    trace. This remote cosmic arena pulses with eerie silence, harboring a lost civilization
    once infamous for its deadly automated arms manufacturing legacy. The cluster’s
    cold stellar expanse conceals danger beneath its serene facade, where the absence
    of intelligent life clashes sharply with the lingering echoes of mechanized death.
    It looms as an ominous crucible of vanished worlds and unresolved cosmic threats,
    setting a tense stage for exploration and peril.
  location_type: Star Cluster
