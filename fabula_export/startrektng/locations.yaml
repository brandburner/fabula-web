  global_id: ger_location_224b37e5019c
  canonical_name: Planet Clearing
  description: A tense, open clearing on an unnamed planet bakes under daytime heat,
    pierced by electrical noise and crackling distortions from an energy creature's
    unpredictable ripples in the air. Picard and Dathon stand stranded here, their
    escape blocked as they face the hostile battleground. Transporter beams scatter
    Picard's form amid the danger, forcing desperate coordination against the creature's
    aggressive strikes. The space amplifies urgency, blending planetary harshness
    with the captains' struggle to communicate through metaphor amid looming violence.
