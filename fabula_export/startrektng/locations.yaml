- fabula_uuid: ger_location_2e9e812f4894
  global_id: ger_location_2e9e812f4894
  canonical_name: Riker's Great Ship
  description: 'An implied Federation starship associated with William Riker, invoked
    as a vessel of spectacle and travel rather than shown directly. The ship registers
    through memory as wide promenades, public observation points, and engineered wonders
    Riker has used to impress and escort guests—bright viewscreens, humming matter-antennas,
    and the distant murmur of crew life. Narratively it operates as a counterpoint
    to the cramped privacy of Riker''s quarters: grand, mobile, and ceremonially public,
    its presence heightens intimacy when characters retreat from its bustle into quieter
    private spaces.'
