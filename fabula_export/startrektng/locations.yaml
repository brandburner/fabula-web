  global_id: ger_location_b1cc2f259114
  canonical_name: Crawl Space
  description: Crew huddles in this narrow, dimly lit conduit aboard the Enterprise,
    conduits humming faintly overhead. Ro and Geordi lock eyes in shared defeat amid
    the crisis. Keiko darts back to cradle her baby Molly, her footsteps echoing off
    metal walls. Tension fills the tight space as Worf and others stand ready, sensors
    blind and transporters offline, underscoring the crew's trapped vulnerability.
