  canonical_name: Alternate Timeline Enterprise Bridge (Borg-Ravaged)
  description: Ruined, Borg-ravaged version of the *Enterprise-D* bridge existing
    solely in an alternate timeline (S7E11 'Parallels'). Features alternate versions
    of the crew and serves as a narrative contrast to the prime reality. Physically
    destroyed and non-operational.
