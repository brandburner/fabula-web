  canonical_name: Enterprise Guest Quarters
  description: 'A cluster of compact, utilitarian cabins aboard the Enterprise repurposed
    as temporary lodging and quarantine for unexpected passengers. Narrow berths,
    fold‑out chairs, and wall‑mounted environmental panels press close; portable monitors,
    sealed meal packs, and sanitized linens mark recent medical triage. Life‑support
    hums at a measured pitch while the air carries faint disinfectant and recycled
    metal. Guarded door chimes and the steady presence of an escort create low, taut
    tension: at once refuge and holding pen, the space receives disoriented survivors,
    stages early recovery, and enforces Starfleet custody and humane oversight.'
  location_type: Starship Guest Quarters
