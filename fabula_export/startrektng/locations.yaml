  description: 'A wind-scoured, high-latitude stretch where spruce and snow meet cold
    water and raw sky, Alaska functions as the hard geographic anchor in Riker''s
    childhood photograph. The place snaps memory into focus: salt-stung air, the sting
    of chill against a young face, distant mountains cutting the horizon. As a narrative
    locus it condenses belonging and absence—terrain that explains youthful triumph
    and later paternal erasure—transforming a landscape into a private origin point
    that tugs at decisions about duty and escape.'
