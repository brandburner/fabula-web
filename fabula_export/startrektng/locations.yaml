  description: The M-4 Tunnel stretches beneath Governor Karnas's residence on Mordan
    IV, an ancient, neglected corridor swallowed by decades of disuse and shadow.
    Its walls echo with the tension of a hostage rescue mission, as the away team
    navigates its labyrinthine passages under Admiral Jameson's confident, memory-driven
    command. The tunnel’s physical decay mirrors the clash between lived experience
    and official schematics, creating a charged atmosphere where authority, trust,
    and memory collide. Dust chokes the stale air; faint distant sounds hint at hidden
