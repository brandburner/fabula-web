  canonical_name: Riker's Shuttle (Crashed on Alien Moon)
  description: Riker pilots the shuttle with Data and Troi aboard as electromagnetic
    interference strips power from all systems. Controls fail during emergency landing;
    the craft slams into the moon's surface in violent impact. Darkness engulfs the
    interior, stranding the crew without lights or comms amid static bursts. Isolation
    grips them on the alien lunar rock, where Ux-Mal entities lurk, poised to possess
    the vulnerable trio.
