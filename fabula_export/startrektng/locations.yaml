- fabula_uuid: ger_location_bd01c65251be
  global_id: ger_location_bd01c65251be
  canonical_name: Velara III
  description: 'Velara III stands as a barren, featureless yellow-ochre planet orbiting
    beneath the USS Enterprise, its desolate surface scarred by a Federation terraforming
    station. The planet’s stark emptiness contrasts sharply with the tense, claustrophobic
    atmosphere aboard the orbiting starship, where suspicion and dread pulse beneath
    every exchange. Velara III embodies a crucible of mystery and danger: a site where
    the terraforming project disrupted a fragile, silicon-based microbrain life-form,
    triggering sabotage, death, and a desperate struggle for coexistence. The planet’s
    silent expanse mirrors the psychological isolation and escalating paranoia enveloping
    the Federation team, while its role as the microbrain’s home, battleground, and
    quarantine zone underscores its pivotal place in the narrative’s exploration of
    life, conflict, and respect in the void.'
  location_type: Planet
  parent_location_uuid: null
