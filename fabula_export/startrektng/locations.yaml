- fabula_uuid: ger_location_e7e7dd4473d8
  global_id: ger_location_e7e7dd4473d8
  canonical_name: Federation Starbases (Sector Three-One)
  description: 'A dispersed network of orbital installations and relay nodes scattered
    across Sector Three‑One, normally pulsing with docking traffic, status pings,
    and steady beaconing. Now those beacons gutter; consoles fall mute; hail tones
    collapse into static. The silence reads as tactical absence: empty berths, darkened
    maintenance booms, ghosted comm-relays and command suites cut off from fleet channels.
    Officers translate the void into dread and urgency—supply lines fray, reconnaissance
    gaps widen, and cold alarm propels cautious, diplomatic-first responses.'
  location_type: Federation Starbase Network
  parent_location_uuid: ger_location_7865779b35b3
