  canonical_name: New Seattle
  description: New Seattle endures on Penthara IV as thick dust clouds pile 12 kilometers
    deep overhead, starving the city of sunlight and dropping temperatures sharply.
    Tropical rivers freeze at the edges, their waters turning solid amid the planet's
    collapse. A female scientist tracks these signs from the crisis center, her updates
    driving urgent calls for CO2 intervention to halt the encroaching freeze and restore
    heat.
