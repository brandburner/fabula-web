  global_id: ger_location_b56c4071d4e7
  canonical_name: Klyo (Moon)
  description: 'Klyo hangs as a bruised, rotating world on the edge of calamity: a
    battered moon pulled into a dangerously unstable trajectory, its scarred surface
    lit by fractured sunlight and the cold glare of starship sensors. The ship perceives
    rippling tidal anomalies, faint seismic glow and errant debris arcing from its
    rim. Klyo functions as an imminent moral and operational fulcrum — millions face
    annihilation unless its orbit is restored — and the moon''s volatile presence
    compresses command decisions into a ruthless, ticking urgency.'
  location_type: Planetary Moon
