  global_id: ger_location_a4a5a250dd0a
  canonical_name: Battle Bridge
  description: Patterson eyes the Battle Bridge with eager anticipation, picturing
    its tactical consoles and torpedo bays as the pinnacle of starship adventure.
    This secondary command hub draws the children's enthusiasm for combat-ready thrills,
    yet Picard steers the tour firmly away toward hydroponics and astrophysics labs.
    The denied visit amplifies tension between youthful excitement and the captain's
    measured priorities, casting the space as an elusive symbol of the Enterprise's
    martial edge amid the main bridge's watchful crew.
  location_type: Starship Battle Bridge
