  description: Picard pitches the Astrophysics Center on Icor Nine as a sharp alternative
    to idle shore leave, highlighting its symposium on rogue star clusters. Beverly
    counters that its relentless intellectual pace would drain him further, not restore
    him. The facility emerges as a nerve center of stellar inquiry—consoles hum with
    data streams, star charts flicker across walls, and scientists probe cosmic enigmas
    in focused debates under the planet's skies, embodying rigor over relaxation.
