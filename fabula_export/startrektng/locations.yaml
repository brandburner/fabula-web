  description: 'The USS Enterprise holds a close parking orbit above Surata IV (Surata
    Four). Hull plates catch starlight while bridge consoles and sensors hum; transporter
    locks and medical teams stand primed as Sickbay and Pulaski coordinate containment
    and evacuation. The orbit functions as a surgical staging ground and quarantine
