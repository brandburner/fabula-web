- fabula_uuid: ger_location_609041390a03
  global_id: ger_location_609041390a03
  canonical_name: Temporal Rift
  description: A jagged tear in spacetime that gapes beyond the Enterprise’s sensors,
    manifesting as a single, time‑limited corridor through which destiny pivots. The
    rift registers on tactical displays with a precise window—52 seconds—pressuring
    decisions into immediate sacrifice and mechanical daring. It radiates cold, off‑scale
    interference across sensor feeds, a distant visual core that draws targeting overlays
    and countdown timers. Onboard, consoles flare and voices sharpen as crews reroute
    power and absorb enemy strikes to hold the corridor open; the rift functions less
    as landscape and more as moral objective, the physical aperture through which
    the Enterprise‑C must slip to restore the greater timeline. Sound translates into
    alarms and the ship’s laboring hum; the rift’s presence compresses hope, fear,
    and engineering urgency into a single, decisive interval.
  location_type: Temporal Rift (Spatial Anomaly)
