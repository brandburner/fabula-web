- fabula_uuid: ger_location_41857ce8b5be
  global_id: ger_location_41857ce8b5be
  canonical_name: Main Engineering — USS Enterprise‑D
  description: 'Main Engineering thrums with a low, mechanical heartbeat: banks of
    consoles glow under flickering worklights, braided conduits hum, and the air tastes
    of ozone and warm metal. Here, authority compresses into terse commands—Captain
    Picard authenticates at the destruct computer while tension tightens every shoulder.
    The AUTO‑DESTRUCT indicator flares and a five‑minute countdown begins, transforming
    technical focus into existential urgency. Alarms thread through the room as officers
    trade clipped confirmations and Riker’s terse assent lands like a gavel. The space
    functions as the ship’s last practical barrier: a saturated, claustrophobic control
    hub where procedure, sacrifice, and sprinting resolve collide under imminent threat.'
  location_type: Starship Engineering Section
  parent_location_uuid: ger_location_41857ce8b5be
