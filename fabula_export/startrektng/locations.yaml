  canonical_name: Government Building, Malcorian Capital
  description: Towering spires rise above the Malcorian capital's skyline, capping
    the government building's imposing facade. Grand entrances frame approaches by
    diplomats, who navigate a controlled exterior heavy with bureaucratic weight.
    The structure's rigid architecture mirrors the Malcorians' cultural insularity—advanced
    yet hesitant—clashing visually with Starfleet's flexible presence. Aerial views
    highlight its role as a symbol of resistance, where tradition locks against progress
    in silent tension.
