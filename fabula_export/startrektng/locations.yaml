- fabula_uuid: ger_location_ec25b17962f5
  global_id: ger_location_ec25b17962f5
  canonical_name: Q'Maire
  description: Endar departs for Q'Maire after testing Jono's loyalties, marking it
    as his Talarian command vessel. From this ship, he will broadcast his ultimatum
    demanding Jono's return, turning the distant craft into a hub of escalating threats.
    The vessel underscores Talarian resolve—rigid, ritual-bound, and poised for conflict—while
    Picard and crew face its shadow from afar. Tension builds as Jono's fractured
    identity hangs between Enterprise safety and Q'Maire's pull.
