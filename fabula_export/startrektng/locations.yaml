  global_id: ger_location_3d82fc0707a9
  canonical_name: Uxbridge House Grove (Rana IV)
  description: A low, sheltering stand of trees beside the Uxbridge farmhouse on razed
    Rana IV. Trunks, low limbs and underbrush create a shadowed screen that swallows
    light and masks footsteps and sensors, the scent of scorched earth, sap and faint
    smoke hanging in the air. The grove provides immediate concealment for the Enterprise
    away team but doubles as a trap when a hidden snare attached to a gnarled trunk
    suddenly hoists Riker into view—turning pastoral calm into exposed peril. The
    location reads as both refuge and claustrophobic danger during first contact.
  location_type: Wooded Grove (Residential Outcrop)
