- fabula_uuid: ger_location_c6a000256d44
  global_id: ger_location_c6a000256d44
  canonical_name: Deep Space (Penthara IV Mission)
  description: Penthara IV (also referred to as 'Penthara Four') is a colonized planet
    that undergoes catastrophic environmental crises in two distinct but thematically
    linked events. In the first crisis, an asteroid strike on its unpopulated continent
    triggers a massive dust cloud, global cooling, and heavy snowfall blanketing the
    surface. The *Enterprise* crew observes the shrouded skies and icy transformation
    from orbit, where millions of colonists face existential threat. Phaser drills
    target twenty bore sites across six altitudes to track CO₂ levels, while the ship's
    ionization of the upper atmosphere sparks a fiery explosion, blue energy surges,
    and volcanic tremors before the skies clear and the crisis lifts. In the second
    crisis, the planet is dominated by continuous lightning flashes through dark,
    roiling clouds and thick volcanic plumes erupting from its fractured surface.
    The crew uses deflector dish beams powered by warp nacelles to ionize the atmosphere
    and prevent collapse, with Geordi La Forge manually compensating for density shifts
    on the treacherous surface amid quakes and storms, amplifying the mission's deadly
    stakes.
  location_type: Colonized Planet
