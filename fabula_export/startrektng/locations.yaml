  canonical_name: Hydraulics Chamber
  description: A tense industrial chamber humming with critical hydraulic machinery,
    the Hydraulics Chamber anchors the Velara III terraforming base’s operations.
    Dimly lit and claustrophobic, it vibrates with erratic power surges and hosts
    exposed mechanical conduits scarred by sabotage. It is a nerve center critical
    to the planet’s transformation efforts, where latent danger and technical failure
    collide amidst the shadows, embodying the fragile balance between scientific ambition
    and hostile interference.
  location_type: Industrial Machinery Control Chamber
