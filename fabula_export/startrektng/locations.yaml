- fabula_uuid: ger_location_306e73698d87
  global_id: ger_location_306e73698d87
  canonical_name: Ansata Base (Subterranean Cavern Stronghold)
  description: Ansata Base is a sealed subterranean cavern stronghold carved roughly
    thirty meters beneath the surface on the southern tip of the continent, located
    about three hundred kilometers from the nearest city. The facility blends engineered
    metal and cold bedrock into a claustrophobic labyrinth of vaulted hollows, tight
    corridors, and sealed chambers. Fluorescent lighting and life‑support systems
    maintain a clinical glare and sustained atmosphere until systems fail, at which
    point darkness and echoing acoustics become tactical weapons. No surface egress
    exists—entrances vanish into bedrock or are accessed through sealed shafts—so
    the base functions as both fortress and tomb, shaping covert extraction strategies
    and intense moral stakes for anyone who discovers it.
  location_type: Sealed Subterranean Stronghold (Cavern Complex / Military or Research
    Base)
  parent_location_uuid: ger_location_ee87f8a459ff
