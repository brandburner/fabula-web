    stellar expanse serving as rendezvous point with the USS Zapata. Wesley Crusher
    takes the helm for the first time, punching in coordinates for Xanthras Three
    at warp factor six amid the bridge crew's watchful eyes. The system's pull draws
    the ship from spacedock orbit, framing a mission waypoint thick with command tests
    and interstellar logistics. Crew tension simmers beneath routine orders, as the
    distant stars promise coordination with allied vessels.
