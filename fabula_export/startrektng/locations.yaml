  global_id: ger_location_f6734503300c
  canonical_name: Old City Doorway
  description: A recessed street-level threshold that anchors an Old City alleyway,
    the doorway serves as a taut vantage point where a lone figure can watch, hide,
    and strike. Narrow shadow and hard street light compress motion into a single
    decisive beat; the throwing arm clears from the frame while the city noise recoils
    into silence. The aperture functions narratively as a sudden portal of intervention—revealing
    survival, personal history, and the force of a testimony that will upset political
    balances.
  location_type: City Street Doorway
