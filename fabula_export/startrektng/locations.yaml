- fabula_uuid: ger_location_d3373b86403f
  global_id: ger_location_d3373b86403f
  canonical_name: Stargazer Tactical Station
  description: Perched above Captain Picard on the scarred bridge of the USS Stargazer,
    the Tactical Station serves as a grim command post dominated by DaiMon Bok's malevolent
    presence. This sterile chamber pulses with cold precision, hosting the dark art
    of psychological warfare. Bok stalks this room, calibrating intricate wave patterns
    that ripple with calculated menace and orchestrating shield activations and psychological
    assault through the sinister Thought Maker sphere. The space embodies an intense
    mental battlefield where Bok's vendetta claws at Picard's sanity and command,
    elevating the stakes beyond physical confrontation into mind-shattering vendetta.
    It is a nexus of strategic dominance and haunting manipulation, where the very
    fate of the Stargazer hinges on the brutal clash of wills.
  location_type: Starship Tactical Station
