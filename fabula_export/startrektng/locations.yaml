  global_id: ger_location_b401b64d93c2
  canonical_name: Blacksmith's Shop
  description: 'Tools clutter the entrance facing the town square—hammers, tongs,
    forges glowing under early light. Smoke carries charcoal bite and molten iron
    tang inside, where Skoran tests warm metal fragments for purity. A scarred table
    holds the haul: shards displayed, some hammered into jewelry sold cheap. Voices
    rise in haggling fury between Skoran and Garvin; anvil splinters, pinning an apprentice;
    unseen radiation seeps, felled by collapse and poison. Data lifts wreckage bare-handed
    amid stares, forging distrust in this gritty hub.'
  location_type: Village Blacksmith Shop
