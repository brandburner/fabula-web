  global_id: ger_location_15149fefd0b5
  canonical_name: K'mpec's Chambers
  description: 'K''mpec''s Chambers tightens every conversation into a crucible: a
    small, private Klingon council room that presses litigants and elders into close,
    unavoidable confrontation. Formal protocol and intimate scale collide here—ceremonial
    gravity replaces public spectacle, and silence feels like a verdict. The space
    absorbs confession and coercion alike, turning ritual language into political
    currency; breath shortens, authority narrows, and a single admission or slap converts
    private shame into empire‑shaking consequence. It functions as a site where law,
    honor, and survival are bargained in hushed, irrevocable terms.'
  location_type: Klingon High Council Elder's Private Chamber
  parent_location_uuid: null
