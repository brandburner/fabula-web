  canonical_name: Beverly Crusher’s Medical Ship (Future Timeline)
  description: 'Picard rides alone through the decks of this future medical starship
    commanded by Beverly Crusher, his ex-wife. Inside the turbolift, he stands rigid
    with determination as the car glides silently, his voice breaking the quiet with
    a firm vow: ''We’ll find the anomaly... I know we will.'' Sealed walls enclose
    his solitary resolve amid the vessel''s clinical hum, distant thrum signaling
    advanced medical operations and mission urgency in the altered timeline.'
