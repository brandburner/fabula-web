  global_id: ger_location_92fd178b3b22
  canonical_name: Pacific Oceanic World (Pacifica)
  description: Pacifica emerges as a serene ocean world, its vast, rolling waves and
    endless blue horizons beckoning with the promise of tranquil beaches and untouched
    natural beauty. The crew of the USS Enterprise approaches this watery planet anticipating
    a routine scientific mission, drawn to the peaceful allure that contrasts sharply
    with the tensions aboard the starship. The planet’s expansive seas and calm shores
    evoke a sense of respite and human longing for connection with nature, underscoring
    the fragile calm before an impending crisis. Its presence casts a hopeful yet
    vulnerable backdrop, embodying both exploration’s promise and the shadowed threats
    lurking beyond the horizon.
  location_type: Oceanic Planet
