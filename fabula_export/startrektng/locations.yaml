  global_id: ger_location_cb2d829af793
  canonical_name: Planet Sanction's Atmosphere
  description: The atmosphere of Planet Sanction forms a volatile boundary where the
    freighter Sanction spirals uncontrollably toward destruction. This perilous layer
    crackles with solar flare interference, electromagnetic chaos, and the crushing
    grip of gravity, turning the sky into a hostile, fiery gauntlet. The atmosphere's
    fierce turbulence shreds failing spacecraft with merciless intensity, embodying
    the razor-thin line between survival and disintegration. It looms as an unforgiving
    threshold, shrouded in cosmic menace and human desperation, where each breath
    of air teeters on the edge of annihilation.
