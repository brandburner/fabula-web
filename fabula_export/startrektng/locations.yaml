- fabula_uuid: ger_location_943cad79e931
  global_id: ger_location_943cad79e931
  canonical_name: Gatherer Camp
  description: A ragged, nocturnal outdoor encampment strewn with scavenged circuitry
    and makeshift shelters, the Gatherer Camp feels like a ruined junkyard pressed
    into service as a political stage. Flames lick a communal fire ring where a ritual
    circle convenes; discarded noranium and exotic weaponry scent the air with ozone
    and the metallic tang of stolen tech. Shadows hide ambushers; sudden phaser fire
    cracks the stillness and a deliberate ignition of noranium turns the clearing
    into a choking smoke-screen. Negotiation and theater collide here—chalices of
    trust, public tests of authority, a corpse stripped and examined—so that every
    footstep carries diplomatic weight, forensic consequence, and the palpable risk
    of renewed violence.
  location_type: Nomadic Outdoor Encampment
  parent_location_uuid: null
