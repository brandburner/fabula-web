    stirs images of crumbled walls and buried streets emerging from millennia of soil,
    a rhetorical anchor that amplifies the expedition's stakes. Picard hears it amid
    clinking glasses and low crew chatter, the word tugging at his archaeologist past
    while Starfleet obligations loom, turning distant ruins into a mirror for his
    divided loyalties.
