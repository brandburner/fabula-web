  canonical_name: Medical Lab (USS Enterprise-D)
  description: Tense surgical bay aboard the Enterprise-D hums with urgency during
    warp-speed travel. Beverly Crusher and Dr. Toby Russell direct a team amid beeping
    monitors and glowing consoles. Drechtal beam emitters stabilize the field as they
    sever Worf's brain stem, transfer his cerebral cortex to life support, and expose
    his back with an exo-scalpel. Ogawa tracks the three-hour, twenty-six-minute countdown
    to brain dysfunction. Clamshell frames lift away, revealing raw vulnerability
    in sterile light, where Starfleet precision battles Klingon fatalism.
  location_type: Starship Medical Laboratory
