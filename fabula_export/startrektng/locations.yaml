  description: 'A single simulated Las Vegas façade specific to The Royale hotel:
    a hyperreal, performative neon streetscape projected against the hotel exterior
    and visible from Richey’s suite. Garish cowgirl signage, flashing marquees and
    faux casino glitz create a compressed, decorative city motif that functions as
    both lure and indictment—dazzling spectacle that masks abandonment and frames
    the preserved interior in moral dissonance.'
