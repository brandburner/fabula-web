- fabula_uuid: ger_location_7463c13fa820
  global_id: ger_location_7463c13fa820
  canonical_name: USS Yamato Debris Field
  description: 'A blinding flash rends the black as the Galaxy-class USS Yamato detonates,
    ejecting a cathedral of flaming debris and a twisting saucer section that streak
    across the void in agonizing slow motion. Shredded bulkheads glitter like fallen
    meteors; sparks and glyph-like scorch marks smear the starfield. The silence of
    vacuum sharpens into an auditory hallucination—distant alarms, creaking metal,
    and the remembered thud of impact—turning spatial emptiness into a weaponized
    memory. The debris field functions as both physical wreckage and traumatic archive:
    a violent locus that jolts neural chemistry, forces retreat, and leaves survivors
    hollowed by the visible cost of catastrophe.'
  location_type: Deep Space Debris Field
  parent_location_uuid: null
