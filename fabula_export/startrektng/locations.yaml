  global_id: ger_location_4922c7eba693
  canonical_name: Street Corner Outside Dixon Hill's Office
  description: Machine-gun fire erupts from this narrow street corner, bullets ripping
    through the office window above and dropping the gunman in a spray of glass. Moments
    later, a 1948 Packard with whitewall tires screeches around the bend, engine roaring
    and tires squealing on wet pavement. Brick facades loom under gray skies, shadows
    hiding unseen threats in the heart of the simulated 1940s city, where sudden violence
    shatters the detective's sanctuary.
