- fabula_uuid: ger_location_a001d9517096
  global_id: ger_location_a001d9517096
  canonical_name: Batris Engineering Compartment / Batris Corridor / Engineering Section
    of Batris
  description: A dimly lit, battle-damaged artery within the hostile starship Batris
    featuring the Engineering Compartment and Corridor. Flickering emergency and console
    lights cast fractured shadows over scarred bulkheads, twisted panels, and leaking
    conduits. Toxic and noxious gases seep through ruptured pipes, choking the air
    with acrid menace. The claustrophobic space vibrates with latent chemical menace,
    mounting structural failure, and chaotic urgency. Desperate crew and hostile Klingon
    warriors collide amid tense survival efforts, with power scrambled to reinforce
    faltering shields. This volatile engineering zone pulses with cultural tension
    and raw desperation, embodying the fragile line between catastrophe and hope.
  location_type: Starship Engineering Corridor
