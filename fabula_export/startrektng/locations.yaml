  description: A Class-M planet and the primary destination of the USS Enterprise-D
    in 'The Most Toys,' serving as the nearest source of hytritium amid a critical
    shortage. Its cave systems and mineral deposits are central to the episode's plot,
    including the tricyanate toxin and Fajo's sabotage scheme.
