- fabula_uuid: ger_location_c3804938bd9c
  global_id: ger_location_c3804938bd9c
  canonical_name: Northern Perimeter (Bersallis Three) - Storm Defense Site
  description: The exposed northern perimeter of Bersallis Three during a catastrophic
    storm/firestorm event, serving as a critical storm defense site. Nella Daren's
    team (including Richardson and Deng) works frantically to calibrate deflector
    units along sheer rock faces under extreme conditions. This site mirrors the primary
    perimeter deflector site in function but is distinguished by its exposed location,
    extreme environmental threats (howling winds, advancing flames, blistering heat),
    and high-stakes tension as the team races against time to complete critical adjustments.
    Key features include flickering energy fields, beeping consoles/tricorders, and
    a tight countdown (9 minutes in one scene, 4 minutes in another). The site is
    essential for shielding nearby colonists from destruction and is part of the colony's
    defense infrastructure, alongside the secondary perimeter deflector site.
  location_type: Storm-Exposed Planetary Perimeter
