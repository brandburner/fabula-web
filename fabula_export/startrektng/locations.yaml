  canonical_name: Quarantine Anteroom (USS Enterprise-D)
  description: Data escorts Jake Potts through the Quarantine Anteroom aboard the
    USS Enterprise-D, a sterile chamber adjacent to Willie's isolation ward. Medical
    panels glow softly along bulkheads rigged with decontamination fields and observation
    windows. Jake approaches the barrier to speak with his brother, isolated by the
    parasitic infection from Ogus II fruit. The air carries a faint ozone tang from
    active scanners; tension builds as Riker’s disciplinary order forces Jake to face
    his prank’s fallout, blending family concern with shipboard protocol amid crew
    morale strains.
