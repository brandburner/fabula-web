  canonical_name: Alkar's Diplomatic Surface (Unspecified Planet)
  description: Planetary surface where Picard and Worf beam down to confront Ambassador
    Alkar during a critical diplomatic crisis. The site serves as the location of
    Alkar's delegation, where his diplomatic facade is exposed through autopsy revelations
    of his 'mother' Maylor's false identity. The surface is characterized by tense
    standoffs, empathic assaults on Deanna Troi, and security force fields that initially
    prevent transporter intrusion. The open terrain and dusty environment amplify
    the isolation and urgency of the confrontation, culminating in Picard's ultimatum
    to save Troi's life. The crew views this location as a high-stakes intervention
    ground where protocol is breached amid escalating peril and diplomatic fallout.
  location_type: Alien Planet Surface
  parent_location_uuid: null
