  global_id: ger_location_ef3b2d3afe87
  canonical_name: Planet's Middle Atmosphere (Turbulent Layer)
  description: The turbulent middle atmospheric layer of the unnamed gas giant, where
    the USS Hera is stranded. Characterized by dense interference that scrambles comms
    and life signs, extreme turbulence that batters the Raman probe, and hazardous
    conditions that threaten both the rescue mission and the neural interface used
    by Geordi La Forge. This layer presents a deadly gauntlet of raw atmospheric forces,
    forcing the crew to navigate particle-laden haze while debating risks such as
    shield collapse or nacelle rupture. The environment heightens rescue tension due
    to the risk of neural overload from beam strain during transport operations.
  location_type: Gas Giant Middle Atmosphere
