  global_id: ger_location_ec37a9476a4a
  canonical_name: Rehearsal Hall (Klingon Outpost Set from Firstborn)
  description: Dimly lit and fog-obscured, this space mimics the Klingon outpost from
    'Firstborn,' its rough walls and shadowed corners building a ritualistic hush.
    Data, robed with staff and book, delivers Prospero's renunciation from The Tempest,
    voice steady and solemn. Picard stands nearby, critiquing visibility for the audience.
    A locomotive's roar erupts without warning—steam hissing, wheels thundering—forcing
    both men to dive clear. The breach snaps the illusion; the hall reverts to bare
    walls, leaving scrapes, stunned silence, and hints of deeper ship malfunctions.
  location_type: Starship Holodeck
