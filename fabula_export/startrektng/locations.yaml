- fabula_uuid: ger_location_de688517e8a2
  global_id: ger_location_de688517e8a2
  canonical_name: Tactical Open Space Adjacent to the USS Enterprise
  description: 'Stars smear into streaks of engine-glow as the Enterprise, the crippled
    Hathaway, and the Kreechta lock into a tense orbital standoff. Sensors chatter
    and tactical displays flare while hull-deep thrums register through the ship —
    a cold, hard silence outside, frenetic command decisions inside. The void functions
    as a pressure cooker for moral and tactical wagers: photon torpedoes arc away
    like bright punctuation, a Klingon feint snaps the tempo, and then the Kreechta
    detonates into warp, a streak of white-hot escape that leaves the tableau raw,
    alternately vindicated and unsettled.'
  location_type: Interstellar Tactical Zone
