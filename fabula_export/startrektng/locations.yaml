  global_id: ger_location_cb576f6c00c2
  canonical_name: Asteroid Surface (Back Side Near Planet)
  description: 'A windless, pocked plain along the asteroid''s back side: fractured
    basalt, metallic slag, and a sparse, cold dust that eats sound. From the cavern
    below it reads like an unreachable ceiling—regolith and scattered wreckage sit
    just out of reach while no natural exits pierce the overhead rock. The surface
    functions as both physical barrier and narrative pressure, turning the cavern
    into a sealed theater of negotiation, sharpening tactical blind spots, claustrophobic
    isolation, and the urgent ache of separation from the open void above.'
