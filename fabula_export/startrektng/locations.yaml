  global_id: ger_location_23e7e8e08e0d
  canonical_name: Third Ridge
  description: The Third Ridge rises sharply on the rugged terrain of planet Quadra
    Sigma III, a critical forward vantage point where Worf stealthily scouts enemy
    positions. Shrouded by sparse foliage and jagged rocks, the ridge transforms into
    a tense observation post amid a hostile landscape. Enemy sentries, masked with
    eerie Bonapartist soldier costumes and grotesque fanged visages, lurk nearby,
    escalating the peril to an acute level. This terrain crackles with imminent danger,
    marking a pivotal threshold between covert reconnaissance and impending conflict
    under a sky heavy with threat.
  location_type: Terrain Feature
