  global_id: ger_location_a3c6beb66207
  canonical_name: Darthen
  description: Darthen functions as a neutral coastal city where Seronians and Rekag
    loyalists live side by side amid their factions' escalating war. Picard proposes
    its harbors and streets as a compromise site for unarmed peace talks, leveraging
    the mixed population to ensure acceptability. Salt air fills the air, waves break
    against docks crowded with fishing boats from both sides, and narrow alleys wind
    through markets where wary residents trade under flickering lanterns. Tension
    simmers beneath daily coexistence, positioning Darthen as a fragile bridge for
    diplomacy.
