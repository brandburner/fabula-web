- fabula_uuid: ger_location_6422a120aa25
  global_id: ger_location_6422a120aa25
  canonical_name: Crashed Shuttlecraft on Vagra 2
  description: This cramped, battered shuttlecraft lies crashed on the desolate planet
    Vagra 2, its interior confining Counselor Troi and injured crew member Ben Prieto,
    transforming into a chamber of psychological torment and urgent survival. The
    shuttlecraft's exterior is scarred and surrounded by a hostile, malevolent presence.
    Inside, shadows flicker as Armus inflicts cruel mental assaults, twisting the
    atmosphere with fear and helplessness. The shuttle serves as a desperate refuge
    for the injured away team, heightening claustrophobic tension. It functions as
    both prison and battleground, symbolizing the crew's struggle between despair
    and hope amid crushing physical and psychological confinement.
  location_type: Shuttlecraft Interior
