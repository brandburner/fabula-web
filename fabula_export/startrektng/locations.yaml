  canonical_name: Jungle Clearing Near Klingon Colony (Worf-Toq Mentorship Site)
  description: A dense, secluded jungle clearing near the Klingon colony where Worf
    mentors Toq in scent-hunting. The space is choked by thick vines and towering
    trees, with humid air carrying sharp animal scents and the distant echoes of unseen
    wildlife. Worf and Toq crouch together in this compact open area, their breaths
    and the rustling of leaves creating a tense, primal atmosphere. The clearing serves
    as a pivotal site for their mentor-student bond, where Toq first successfully
    detects the quarry's scent, marking a turning point in his Klingon training. The
    space later becomes charged with tension as unseen threats stir the brush, disrupting
    the mentorship's quiet intensity.
