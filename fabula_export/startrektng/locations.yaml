  global_id: ger_location_ad252db715d1
  canonical_name: Minos Surface Terrain and Jungle Foliage
  description: The surface terrain of planet Minos is characterized by dense, tangled
    jungle foliage and overgrown vegetation cloaking rugged alien soil, concealing
    hidden air shafts and passageways beneath the thick underbrush. This hostile environment
    forms a chaotic labyrinth of plants and shadows that complicate movement and provides
    cover for lethal automated weapons, creating a claustrophobic and perilous battleground.
    The terrain pulses with danger as search teams struggle amid technological threats
    and natural obstacles, reflecting the crew's desperate fight for survival amid
    the hostile wilderness.
