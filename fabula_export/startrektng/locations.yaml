- fabula_uuid: ger_location_9e2947d4ae98
  global_id: ger_location_9e2947d4ae98
  canonical_name: Koinonian Caverns (Main Cavern)
  description: 'A shadowed subterranean cavern — the main chamber of the Koinonian
    Caverns — carved into stone where damp walls sweat mineral sheen and distant drips
    puncture a cold hush. The space functions as a rebel encampment and improvised
    infirmary: alcoves and a central cavern hide a makeshift clinic where Beverly
    tends delirious patients, and secluded niches where Kyril Finn conducts coercive
    interrogations and forced meals. Torchlight and headlamps gouge islands of visibility
    from otherwise dense darkness; the main chamber serves as both prison and theater
    where private brutality, political argument, and medical triage intersect beneath
    a roof of rock and foreboding silence.'
  location_type: Subterranean Rebel Camp and Field Infirmary (Cavern)
