- fabula_uuid: ger_location_0f0d43290c13
  global_id: ger_location_0f0d43290c13
  canonical_name: Crashed Iyaaran Shuttlecraft
  description: The wrecked Iyaaran shuttlecraft that Picard and Anna encounter after
    their staged mishap. The shuttle's hull is severely damaged, with gaping openings
    and dead engines, initially appearing as a genuine crash site. However, the damage
    is later revealed to be part of the Iyaaran deception to isolate Picard for their
    love experiment. Before crashing, the shuttle's **interior** is described as cramped,
    with Picard and Voval interacting in the cockpit. Power failures, violent tremors,
    and failing life support force an emergency landing on the M-class planet. The
    wrecked frame looms on rough terrain near the cargo freighter, fueling Picard's
    growing distrust amid the planet's isolation. The shuttle's crash is a pivotal
    moment in the Iyaaran experiment, involving interactions with Picard, Voval, and
    the planet's harsh environment. Key details include the shuttle's pre-crash tension,
    Voval's clinical demeanor, and Picard's attempts to stabilize systems during the
    crash.
  location_type: Crashed Shuttlecraft
