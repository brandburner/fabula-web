  description: Geordi La Forge steps from the turbolift's narrow car onto the USS
    Enterprise-D bridge as Governor Vagh accuses Picard of weapons smuggling over
    the viewscreen. Doors hiss shut behind him amid Worf's reports of uncloaking Klingon
    cruisers—Attack Cruiser forward, Birds of Prey flanking. Smooth bulkheads and
    faint engine hum seal the confined space until it delivers him into crisis command,
    his timely arrival highlighting the sabotage's looming fallout on Federation-Klingon
    ties.
