  global_id: ger_location_d3418edacaba
  canonical_name: Uxbridge House Interior
  description: 'A small, stubbornly intact interior that sits incongruously amid Rana
    IV’s ruin: low-ceilinged rooms bleed into one another, corridors funneling movement
    from south end to north end and pooling in a battered front room. Light falls
    thinly through dust and scorched curtains; the air tastes of old wood and faint
    cooking smoke. The space feels defensive and mundane at once—an intimate domestic
    theater where two elderly occupants shelter, where a dangling, concealed snare
    and a nonfunctional phaser convert ordinary furnishings into clues and sources
    of suspicion.'
  location_type: Colonist Private Residence (Interior)
