  global_id: ger_location_c20c1c4ddb78
  canonical_name: Prytt-Controlled Mountain Ridges (Summit Ridge)
  description: A rugged, Prytt-controlled mountain ridge system featuring steep slopes
    and exposed summits patrolled by Prytt troopers. Picard and Beverly initially
    spot two ridges from a ravine as potential escape routes, but vague tricorder
    topography and Prytt patrols force them into cover. During a daylight ascent attempt,
    loose rocks and exposed terrain make stealth difficult. When guards spot them,
    phaser fire erupts, grazing Picard and forcing a desperate retreat. The terrain
    combines rugged slopes with tactical vulnerabilities, testing the pair's resilience
    and the limits of their neural implants. This location is central to the episode's
    escape sequence and highlights the physical and psychological strain of evasion
    under enemy control.
