  canonical_name: Jefferies Tube
  description: |-
    Narrow maintenance tunnels (Jefferies Tubes) lace the USS Enterprise-D, serving as critical access points for engineering and emergency egress. These confined spaces—particularly the **horizontal section in Engineering**—force users into tight crawls and climbs, with metal walls amplifying sounds and creating claustrophobic tension. Key narrative events include:

      1. **Picard's Escape (Starship Mine, S06E09)**:
         Picard dives into the Jefferies Tube from Main Engineering to evade Satler's pursuit after sabotaging a diverter. He cuts a manhole into the metal floor, uses his jacket as bait to lure Satler into a baryon sweep, and escapes through the opening as her scream echoes down the passage. The **horizontal section** is explicitly described as the location where Picard crawls, cuts the manhole, and drops through to evade the baryon sweep.

      2. **Terrorist Chase (Starship Mine, S06E18)**:
         Kelsey and Neil haul stolen trilithium resin through **vertical and horizontal shafts**, including the same horizontal section in Engineering. They navigate obstacles like Picard's severed ladder rungs, with tense radio exchanges occurring during their movement. The horizontal section is implied to be the same confined space where Picard's earlier escape occurred, as both events are tied to the Engineering Jefferies Tube and involve similar claustrophobic tension.

      The **horizontal section in Engineering** is the primary focus of dramatic tension, with echoes of footsteps, alarms, and strained breaths amplifying the stakes during chases and standoffs amid the ship's baryon sweep. This specific segment is distinct from other Jefferies Tubes aboard the *Enterprise-D* due to its **proximity to Main Engineering**, its role in Picard's escape, and its involvement in multiple high-stakes events.
  location_type: Starship Jefferies Tube Section
