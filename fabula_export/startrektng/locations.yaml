  canonical_name: Binary Star System
  description: Enterprise crew emerges from warp into the uncharted rim, where USS
    Brattain drifts powerless—engines cold, structure whole, life signs elusive. Sensors
    confirm identity amid ominous silence; Troi registers deep unease, a psychic chill
    hinting at rift-born horrors. Tension grips bridge as Picard logs the probe, the
