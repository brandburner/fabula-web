- fabula_uuid: ger_location_a6fab24e61fc
  global_id: ger_location_a6fab24e61fc
  canonical_name: Far Space Starbase Earhart
  description: 'A far‑space regional starbase serving as the backdrop for Picard’s
    shore leave and youthful misadventures. The outpost reads as a waypoint on the
    edge of routine patrols — a place where off‑duty officers trade formal command
    for temporary anonymity. Its presence in the anecdote anchors time and place:
    docking rings and distant traffic hum become the quiet context for barrooms, promenades,
    and the bruising encounter at the Bonestell that reshaped Picard’s career. The
    base functions narratively as both refuge and horizon — close enough to permit
    leave but remote enough to suggest frontier exposure and the consequences of pride.'
  location_type: Federation Starbase / Regional Outpost
