- fabula_uuid: ger_location_8cc27d601f37
  global_id: ger_location_8cc27d601f37
  canonical_name: Sickbay Maternity Ward
  description: 'Separated from Enterprise''s main medical bay by translucent isolation
    panels, this protective alcove—locally referred to as the maternity alcove—pulses
    with life-giving energy beneath harsh bioluminescent strips. Antiseptic air mingles
    with the metallic scent of diagnostic arrays as soft blue panels track vital signs
    of mother and child. Here, clinical sterility transforms into sacred space—where
    phaser-armed guards stand sentinel against invisible dangers, while android fingers
    tremble at the threshold of organic creation. This quarantined pocket exists in
    defiance of its sterile purpose: where scientific impossibility manifests as starlight
    crystallizing into living child, where protocol dissolves into wonder, and where
    every heartbeat echoes with whispered blessings across open comm channels.'
  location_type: Starship Medical Maternity Suite
  parent_location_uuid: ger_location_2777d0cd1383
