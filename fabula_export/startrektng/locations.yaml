- fabula_uuid: ger_location_65f0473cd98c
  global_id: ger_location_65f0473cd98c
  canonical_name: Captain's Mess, USS Enterprise-D
  description: A compact, officer-focused dining and social space reserved for senior
    bridge personnel, the Captain's Mess hums with low conversation, recycled air
    warmed by engine hum, and the soft glow of table consoles. Footsteps and the near-constant
    thrum of ship systems frame informal counsel and quiet meals; laughter and debate
    fold into the room’s function as a site of mentorship, private debriefing, and
    coded camaraderie. The mess reads as a transitional refuge where duty slips into
    interpersonal pressure and ceremonial routine.
  location_type: Starship Captain's Mess (Shipboard Mess Hall)
