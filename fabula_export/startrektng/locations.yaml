- fabula_uuid: ger_location_369065080712
  global_id: ger_location_369065080712
  canonical_name: Escape Pods
  description: Compact lifepods embedded along the Enterprise's hull serve as the
    crew's final evacuation option during catastrophe. Riker barks orders to abandon
    ship as the vessel spins wildly, plasma vents uncontrolled, and antimatter containment
    fails. Crew members scramble through corridors amid piercing alarms, but the warp
    core breach detonates before most reach these cramped refuges, dooming them in
    the fireball. They embody fleeting hope against annihilation.
  location_type: Starship Escape Pods
