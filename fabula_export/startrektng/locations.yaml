  global_id: ger_location_f4c59f9a38b6
  canonical_name: Gamma Hromi Two
  description: 'Gamma Hromi Two yawns as a cold, rocky world warmed by sparse pockets
    of life: the ship’s sensors pick out localized heat signatures and the orange
    flicker of campfires on its surface. From orbit the planet reads like a study
    in contrast — the sterile black of space pressing close while below scattered
    human-scale lights promise breath and motion. The Enterprise hangs sentinel, tension
    buzzing on the bridge as officers weigh curiosity against caution and prepare
    to translate distant warmth into a first-contact operation.'
  location_type: Terrestrial Planet (Surface and Orbital Vicinity)
