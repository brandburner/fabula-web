  global_id: ger_location_b48f6b7e7408
  canonical_name: Pagh Corridor
  description: 'The Pagh Corridor cuts a narrow, stark artery through the Klingon
    vessel’s interior: matte bulkheads swallow light, overhead conduits emit a dull
    mechanical thrum, and the air carries a metallic tang. Crew stand like sentries
    along the passage, their silent scrutiny predatory and ritualized. Riker moves
    beneath slow, formal appraisal—an exchange with a tactics officer turns casual
    curiosity into an official escort to the captain. This space functions as an honor
    threshold, where cultural distance, observed tension, and ceremonial procedure
    compress into a charged, foreboding atmosphere.'
  location_type: Klingon Starship Corridor
