  global_id: ger_location_91a6795ddf35
  canonical_name: Garran-Four
  description: Garran-Four anchors Leah's husband Michael, an engineer immersed in
    distant operations far beyond the Enterprise's reach. Subspace messages from this
    remote world pierce Ten-Forward's warmth, yanking Leah from her vulnerable exchange
    with Geordi. The planet pulls her toward a failing marriage and everyday duties,
    contrasting the starship's isolated freedom with unyielding external ties. Its
    signal evokes obligation's cold grip amid fleeting shipboard connections.
