  canonical_name: Gamma 2-5 Orbit
  description: The Enterprise warps into position around Gamma 2-5, Beverly Crusher
    directing an emergency orbital insertion to bring the ship within transporter
    range of stranded personnel on the surface below. Tactical screens track the Borg
    ship's approach from the far side of the planet, its massive form cutting through
    the void as it moves to intercept. Crew members monitor readouts amid rising tension,
    planetary horizon dominating viewscreens while transporters prepare beam-outs
    under threat of disruption. Alarms pulse, stations hum, every maneuver balances
    rescue urgency against closing danger.
  location_type: Planetary Orbit
