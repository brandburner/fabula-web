  canonical_name: Caverns - Large Chamber
  description: Dimly lit passageways carved from rough rock wind through these caverns,
    opening into larger chambers (including the 'Large Chamber') cluttered with cargo
    containers and scattered signs of habitation. Fractured Borg drones, some crippled
    and psychologically shattered, huddle here as a ragged group hiding from Lore's
    tyranny. Riker and Worf tread the tense shadows while Hugh confronts them, his
    bitterness echoing off the walls amid the heavy air of desperation and reluctant
    alliances.
