  global_id: ger_location_55262442009a
  canonical_name: Chaya‑Seven Caucuses
  description: 'A networked set of political caucuses on the world Chaya Seven, felt
    here as archival texture rather than a physical set piece. Records arrive as stamped
    attendance logs, voting rosters, and personality notes: brittle paper and encrypted
    municipal files that a starship computer mines to reconstruct civic affiliation
    and interpersonal patterns. The place registers as civic ritual—meeting halls,
    registrar terminals, and procedural bureaucracy—whose attendance footprints supply
    behavioral vectors used to tune a holographic personality facsimile.'
