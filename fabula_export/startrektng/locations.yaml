  canonical_name: Bilana Three
  description: Bilana Three floats in deep space, its surface scarred by twenty-three
    massive field coils that hum with power, generating the Soliton Wave for the revolutionary
    warp experiment. The Enterprise circles in orbit, crew scanning the planetary
    research sites where scientists prepare to launch a test ship two million kilometers
    out. Tension builds as coils charge, promising engine-free propulsion or potential
    catastrophe.
