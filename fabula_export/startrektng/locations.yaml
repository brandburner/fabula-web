  global_id: ger_location_ee6b6d692194
  canonical_name: Ferengi Guest Quarters
  description: 'A cramped Ferengi guest quarters presses the body into tight angles:
    narrow berth, low ceiling, and metallic walls stained by oil and long‑unused comforts.
    The air tastes faintly of antiseptic and ale, punctuated by the rasp of an old
    ventilation fan. Dim, flickering lamps throw hard shadows across a small table
    scarred by commerce; medical tools and vials crowd a corner where a makeshift
    lab blooms in secret. The room functions as a hush‑filled theater for clandestine
    plots—blood is drawn under whispered instruction, a single drop transforms under
    a surgeon’s hand, and the space itself hardens into a crucible for weaponization
    and betrayal.'
