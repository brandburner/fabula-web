  canonical_name: Three Other Stations in Sector (Investigation Sweep)
  description: Three sparsely staffed outposts arrayed across the sector, each a brittle
    knot of docking rings, skeletal habitation modules, and dimmed sensor arrays that
    answer the Enterprise's hails with static. Picard orders them swept as discrete
    waypoints for forensic search and diplomatic caution after Tarod Nine goes silent.
    The sweep converts empty corridors and humming life‑support into sites of dread
    and procedural rigor — cold air, echoing decks, terse logs, and tense bridge chatter
    as the crew threads readiness with restraint.
  location_type: Cluster of Space Stations
