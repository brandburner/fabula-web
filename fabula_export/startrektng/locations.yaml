- fabula_uuid: ger_location_ec2e2ba7e526
  global_id: ger_location_ec2e2ba7e526
  canonical_name: Remmler Array Nacelles (Enterprise Warp Nacelles)
  description: The **Remmler Array Nacelles** (also referred to as the **Enterprise
    Nacelles**) are the paired warp propulsion assemblies extending from the *Enterprise*'s
    engineering hull. During the baryon sweep at Arkaria Base, the Remmler Array grips
    these nacelles, with a green swath creeping along their length, signaling the
    advance of trilithium thieves through vulnerable conduits. Ship computers relay
    this intrusion to base screens and Main Engineering, where crew members monitor
    the anomaly amid escalating tension. The nacelles are critical to both impulse
    and warp drive, and their disintegration would cripple the ship. The Remmler Array's
    baryon sweep rays pierce the nacelles halfway, creating a race against time to
    prevent total vulnerability.
  location_type: Starship Warp Nacelles
