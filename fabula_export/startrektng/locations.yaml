  global_id: ger_location_7b3dbe1c18a7
  canonical_name: Aster Quarters
  description: 'A compact private billet aboard the starship where twelve-year-old
    Jeremy Aster stays — a dimly lit, domestic-feeling room whose soft lighting, humming
    ship systems, and personal mementos make it feel alternately like sanctuary and
    emotional trap. The space hosts scenes of quiet mourning, a playing home video
    of Jeremy''s mother, counseling at its threshold (Troi, Worf, Riker), and an apparition
    of Marla that converts comfort into coercion. Functionally: the shipboard quarters
    belonging to Jeremy Aster, the locus for both intimate grief and the narrative
    confrontation.'
