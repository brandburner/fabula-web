  global_id: ger_location_aefbe2a78ffb
  canonical_name: Rock Face Behind Data's Birth Pallet
  description: A barren, jagged rock face stands sentinel over the simple stone pallet
    where Data's origins quietly unfold. Concealed within this unassuming hollow lies
    a masterfully hidden entrance, revealed by Geordi’s sharp engineering eye. The
    landscape's lifeless desolation belies the secret sanctuary beneath—an urgent
    refuge crafted to protect a vanished colony's legacy. This site pulses with haunting
    silence and the weight of lost hope, marking a pivotal threshold where the stark
    truth of Data's creation and the mystery of his progenitors converge amid the
    planet's ecological ruin.
