  global_id: ger_location_0fe5d8c1eb25
  canonical_name: Second Magma Shaft (Atrea)
  description: Deep within Atrea's crust, this vertical drill shaft plunges toward
    the planet's molten core. Phaser beams from the orbiting Enterprise bore through
    superheated rock until they strike a magnesite ore pocket, triggering violent
    feedback that shakes the ship above. Unstable walls pulse with seismic energy
    as the crew pushes forward to inject plasma into the magma chamber below, aiming
    to reverse the world's rapid solidification and halt planet-wide quakes.
  location_type: Subterranean Magma Shaft
