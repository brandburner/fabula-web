- fabula_uuid: ger_location_c5772ee93fff
  global_id: ger_location_c5772ee93fff
  canonical_name: Gosheven Main Street
  description: Sunlight slashes across a wide, dusty avenue where market stalls and
    low civic buildings hunch close to the curb; voices rise and fracture into tight
    clusters as a town meeting dissolves into furtive conversations. Data stands at
    the margin, precise and watchful, while Haritath and Kentor slip up amid the crowd,
    words folded with caution. Ard'rian moves through the press, offering a quiet
    haven and routing the uneasy majority toward a clandestine plan. The street functions
    as a public theater of allegiance and fear—warm with everyday life yet brittle
    under the weight of political reprisal and the urgent logistics of evacuation.
  location_type: Town Main Street
