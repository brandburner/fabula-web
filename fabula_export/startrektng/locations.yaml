  global_id: ger_location_7a31ce8d8168
  canonical_name: Pedestrian Tunnel
  description: A narrow, claustrophobic pedestrian tunnel lined with cold concrete
    and streaked grout, where fluorescents throw harsh, flickering light that tastes
    of metal and stale air. Footsteps and whispered words ricochet off close walls;
    breath fogs in the confined space. Shadowed alcoves and service recesses carve
    hiding places from which violence can erupt without warning. The tunnel doubles
    as a furtive meeting ground for secreted bargains and as a lethal ambush corridor,
    its oppressive quiet amplifying surprise and turning political confrontation into
    immediate, bodily danger.
  location_type: Underground Pedestrian Tunnel
