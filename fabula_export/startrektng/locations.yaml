  global_id: ger_location_0f58b2739246
  canonical_name: Command Chair
  description: The forward command chair crowns the Enterprise's bridge, a poised,
    upholstered station at the apex of decision-making. Consoles ring around the seat;
    the panoramic viewer casts shifting starfields and sickly cloud-light across a
    captain's face. Picard snaps into the chair, posture tightening as procedural
    calm fractures—processors hum, indicator lights blink, and failed comms turn the
    air electric with isolation. From this seat orders issue like sharp instruments,
    authority concentrating into terse commands and private, haunted questions. The
    chair anchors moral weight, turning technical failure into urgent rescue planning
    and brittle, concentrated resolve.
