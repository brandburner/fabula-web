    perimeter on the outskirts of the ancient urban core, where Commander Riker and
    Lieutenant Data stand entrenched amid relentless explosions and heavy assault.
    This scarred frontline pulses with urgent tension and raw desperation, as the
    defenders confront hostile forces threatening the Bandi people. Amid the chaos
    of siege warfare, this zone marks a critical tactical engagement point, blending
    the city’s historic endurance with the brutal immediacy of urban combat. The atmosphere
