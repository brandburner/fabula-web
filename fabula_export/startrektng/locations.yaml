  global_id: ger_location_2ccb59420427
  canonical_name: Selcundi Drema Quadrant
  description: 'A cold swath of deep space scarred by planetary ruin and drifting
    rubble. Stars glint through a sullen haze of dust and fractured rock where a fifth
    world has been grinding into an asteroid belt for over a century. On the Enterprise
    bridge the quadrant arrives as data — spectral anomalies, forensic probe readings,
    and a ledger of geological collapse — but it lands on the captain as moral gravity:
    six weeks of operations, endless debris fields, and the question of intentionality
    turning scientific curiosity into an ethical crucible. The quadrant smells of
    ionized metal in instruments, tastes like static on long-range sensors, and presses
    on the crew with the hush of an unanswerable verdict.'
