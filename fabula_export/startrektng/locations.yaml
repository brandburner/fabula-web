  canonical_name: Uninhabited Koinonian War Planet
  description: Wind-scarred plains and ashen soil spread beneath a thin, sterile sky
    on an uninhabited world marked by conflict. No flora, fauna, or settlements interrupt
    the barren horizon; only fresh excavation scars ring where five stealthy subspace
    detonators were recently dug up, defused, and deliberately left to be found. The
    air carries a metallic chill and an accusing quiet, transforming the landscape
    into a forensic tableau that reads like a staged act of hostile intelligence rather
    than an accidental tragedy.
  location_type: Uninhabited Planetary War Site
