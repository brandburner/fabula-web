  global_id: ger_location_e51b336a90c3
  canonical_name: Racquetball Court
  description: Enclosed indoor court where Picard and Jono play racquetball alone.
    The walls amplify the ball's sharp electronic zaps, which warp into phaser blasts,
    explosions, and parental screams in Jono's mind, triggering his collapse amid
    the Talarian raid flashback. Sweat and echoes fill the tight space as the game
    exposes buried trauma, turning physical exertion into raw emotional release under
    harsh lighting.
