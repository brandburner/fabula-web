  canonical_name: Holodeck Battleground
  description: 'A holodeck battleground simulation of ruined terrain and demolished
    parapets: twilight-shattered rocks and splintered stones merge with buckled deck
    plating and scorched walls. Holographic matrices flicker and fracture while drifting
    smoke and an ozone tang hang in the air; the hum of overloaded emitters undercuts
    distant impacts and keening winds. Programmed ambush points and ruined cover channel
    motion into violent choreography that slips from training drill to ritualized
    combat. Functionally this space is used as a private arena/crucible — exemplified
    by Worf’s battlefield program and K''Ehleyr’s deliberate entry — where physical
    ruin becomes emotional theatre, and combat transforms into intimate reckoning.'
