  global_id: ger_location_b26710651b6e
  canonical_name: Illuminated Mine Chamber
  description: Geordi, Data, Worf, and security advance from the dim tunnel's rough-hewn
    walls into this open chamber on Kalla Three, its glow from an unknown source cutting
    through their palm beacons' jagged shadows. Muffled sounds of movement draw raised
    phasers and cautious steps, Worf leading as tension spikes. The space shifts the
    away team's focus from scouting shadows to facing hidden threats tied to Alexander's
    peril and deeper conspiracies.
  location_type: Alien Mine Chamber
