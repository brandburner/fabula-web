    life and simulated environments. Polished duranium panels and a compact console
    flank heavy sealed holodeck doors that slide on silent tracks; the air carries
    a faint ozone/force-field tang while muffled music and distant laughter leak from
    beyond the portal. Functionally and narratively this location concentrates anxiety
    and choice — used across episodes by characters such as Picard, Riker, and Data
