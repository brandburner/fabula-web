    station. His math pinpoints it inside Fajo's fuel-limited range, a spot the collector
    might favor for its rumored riches. Crew eyes it as prime Jovis hideout amid drifting
    rocks and rare ores that tempt Fajo's hoard. Tension builds as Picard weighs the
