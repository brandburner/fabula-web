- fabula_uuid: ger_location_fee69a59d489
  global_id: ger_location_fee69a59d489
  canonical_name: Star Station India
  description: 'A distant star station briefly illuminated in the Enterprise''s navigation
    trajectory, Star Station India pulses as a solitary waypoint in the void. The
    name crackles across tactical displays with crisp urgency—an unseen but pivotal
    coordinate where sensors, supplies, and Starfleet directives converge. Its precise
    orbital configuration remains off-screen, but its gravitational pull yanks the
    Enterprise from the bittersweet intimacy of Gagarin IV''s aftermath back into
    the regimented rhythm of deep-space patrol. Mentioned only in clipped course corrections,
    the station exists primarily as a vector: helm controls snap toward its coordinates
    even as lingering human connections strain against duty''s inexorable pull. Starfleet
    protocol solidifies here—a crisp pivot from crisis resolution to the next unnamed
    frontier.'
  location_type: Federation Star Station
