- fabula_uuid: ger_location_d3dd01380cb0
  global_id: ger_location_d3dd01380cb0
  canonical_name: Outpost Seran-T-One
  description: Cold metal and low, clinical light define an isolated research outpost
    where crystal engineering takes shape. Narrow corridors funnel toward sealed laboratories,
    their walls lined with schematics and glass cabinets of faceted dilithium samples
    that hum faintly. Access panels click shut and archived design logs sit behind
    strict security, lending the place an air of guarded expertise and quiet urgency.
    Engineers speak in clipped tones; heritage and provenance sit heavy on every panel
    and blueprint.
  location_type: Research Outpost (Dilithium Engineering Laboratory)
