  canonical_name: Pegos Minor Sector Coordinates Six-Six-Seven Eight Point Nine by
    Seven-Zero-Seven-Five-Four-Two Point Two
  description: An expansive, distant sector of space shrouded in mystery and danger,
    the Pegos Minor Sector pulses with the echo of a sudden, unexplained energy blast
    that disrupts the USS Enterprise. This remote region serves as the origin point
    for a frantic distress signal sent by the reclusive scientist Paul Manheim, drawing
    the Enterprise into a high-stakes rescue mission. Vast and silent, the sector
    looms as an imposing cosmic frontier, where isolation amplifies tension and where
    past secrets intertwine with urgent peril. Its forbidding emptiness sets the stage
    for a perilous journey, fraught with scientific intrigue and personal stakes that
    tighten the atmosphere aboard the starship as it charts a course into the unknown.
  location_type: Remote Space Coordinate
