  global_id: ger_location_17830e8fbf8d
  canonical_name: Ocean
  description: Tamarian legend casts the ocean as a vast, isolating expanse where
    Darmok stands alone, exposed to unseen dangers before Jalad's arrival. Picard
    traces its boundary in the sand with a stone, capturing the endless water's solitude
    that echoes his own peril beside Dathon. Crashing waves imply relentless struggle;
    the space shifts from lone vulnerability to shared ground in 'Darmok and Jalad
    on the ocean,' forging unity through ordeal.
  location_type: Mythical Ocean
