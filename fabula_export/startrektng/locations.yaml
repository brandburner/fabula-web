  canonical_name: Bird of Prey
  description: Worf asserts dominance over Kurn in this ready room aboard the Klingon
    Bird of Prey, orbiting Qo'noS. A massive captain's chair towers at center, dwarfing
    the Enterprise version, with walls lined by bat'leth blades, trophies, and honor
    banners under dim lights that throw stark shadows. Weapons displays and a sturdy
    desk reinforce the captain's authority. Tension saturates the air during their
    clash—Kurn pushes assassination, Worf demands strategic patience—binding blood
    ties to ruthless Klingon tactics for family redemption.
