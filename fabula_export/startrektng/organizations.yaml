  first_appearance_season: 1
  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_478f2494e4dd
  global_id: ger_organization_478f2494e4dd
  canonical_name: Weather Modification Net (Earth)
  description: The Weather Modification Net (Earth) serves as Earth's planetary defense
    system against severe weather. It detects and dissipates threats like tornadoes
    to protect populations. Picard highlights its unexplained failure to stop the
    tornado that killed Amanda Rogers' parents, pointing to possible sabotage or interference,
    such as from the Q Continuum, during bridge discussions amid the Tagra Four crisis.
  sphere_of_influence: Earth Planetary Weather Control
  season_appearances:
  - 6
  local_uuids:
    1: org_f685a78d3fdd
  first_appearance_season: 6
  tier: asteroid
  episode_count: 1
- fabula_uuid: ger_organization_3b891eaa25f7
  global_id: ger_organization_3b891eaa25f7
  canonical_name: Yridians
  description: Cybernetic raiders specializing in data theft and sabotage, operating
    in normal space-time without phase-shifting capabilities. Their attack on the
    *Enterprise* in *The Chase* (S6E20) is motivated by the acquisition of encrypted
    DNA files, suggesting a third-party brokerage model. Unlike Devidians, they do
    not phase through time or drain neural energy; their threat is purely physical
    and digital.
  sphere_of_influence: Interstellar Data Theft and Piracy
  season_appearances:
  - 6
  - 7
  local_uuids:
    1: org_1a8e00b37745
