- fabula_uuid: ger_organization_36f973da868e
  global_id: ger_organization_36f973da868e
  canonical_name: Starship Ares
  description: Starship Ares appears as a Starfleet vessel whose command posting is
    offered to Commander William Riker, functioning chiefly as a career-defining assignment
    and narrative catalyst. The Ares represents an operational command node where
    an incoming captain would exercise personnel authority, mission autonomy, and
    shipboard leadership. In the current material the ship's mention triggers familial
    and professional conflict, prompts loyalty offers (Worf volunteering to join),
    and reframes Riker's trajectory; class, complement, and mission profile remain
    unspecified.
  sphere_of_influence: Starfleet ship command, officer deployment, and career assignments
  season_appearances:
