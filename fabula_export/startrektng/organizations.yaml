  canonical_name: USS Charleston
  description: The USS Charleston is a Starfleet transport vessel tasked with short‑range
    rendezvous and personnel transfer operations. In the processed material it functions
    as a logistical partner to the Enterprise, receiving revived 21st‑century survivors
    and conveying them to Earth. Operating under Starfleet authority, it performs
    allied transport and support duties that free the Enterprise to sustain mission
    readiness during emergent humanitarian and security pressures.
