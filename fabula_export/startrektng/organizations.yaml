  tier: planet
  episode_count: 2
- fabula_uuid: ger_organization_29154a081a1d
  global_id: ger_organization_29154a081a1d
  canonical_name: Romulan Proconsul’s Office
  description: The Romulan Proconsul’s Office operates as the command center for a
    top Romulan political leader who authorizes rare diplomatic engagements. Pardek
    announces the Proconsul's agreement to meet Spock, creating an unprecedented opportunity
    amid the underground reunification push. This high-stakes decision unfolds under
    surveillance threats, positioning the office as a pivotal stakeholder in Romulan
    reform efforts and interstellar relations with Vulcan advocates.
  sphere_of_influence: Romulan Political Leadership and Diplomacy
  season_appearances:
  - 5
  local_uuids:
    1: org_d70627282740
  first_appearance_season: 5
