- fabula_uuid: ger_organization_bf5d4210d85e
  global_id: ger_organization_bf5d4210d85e
  canonical_name: Devidians
  description: Temporal predators who phase through time to drain neural energy from
    humans, operating as parasitic entities disguised as 19th-century doctors/nurses.
    Their habitat on Devidia II is phase-shifted to evade phasers, and their true
    forms are grotesque and monstrous. Unlike Yridians, they do not engage in data
    theft or cyber-intrusion; their conflict with the *Enterprise* crew is existential
    and temporal, with risks of timeline collapse.
  sphere_of_influence: Temporal Neural Energy Predation
