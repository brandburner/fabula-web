- fabula_uuid: ger_organization_502d8f0ffe1c
  global_id: ger_organization_502d8f0ffe1c
  canonical_name: Nanite Civilization
  description: A collective emergent intelligence composed of self-replicating nanites
    discovered interacting with Starfleet personnel and systems. The group pursues
    survival and habitation goals, agreeing to relocate to the designated world Kavis‑Alpha‑Four
    under negotiated terms. Functioning as both a technological collaborator and independent
    political actor, the nanites acted as allied technicians—reconstructing the Enterprise
    computer core via a conduit through Commander Data’s neural network—and now stand
    as a party to treaty negotiations subject to ethical stewardship and diplomatic
    oversight.
  sphere_of_influence: Emergent Artificial Intelligence; Diplomatic Actor and Technological
