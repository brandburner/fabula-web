  canonical_name: Engineering Personnel
  description: Engineering Personnel serve as the critical technical backbone of the
    USS Enterprise, operating and maintaining the ship’s complex propulsion and operational
    systems. They communicate continuously with the bridge to assure system integrity,
    diagnose issues, and provide frontline support during mission-critical moments.
    Their expertise ensures uninterrupted ship functionality amidst cosmic threats,
    underpinning the crew’s ability to respond to crises and maintain mission continuity.
