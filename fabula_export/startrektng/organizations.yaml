  global_id: ger_organization_bf22473d0611
  canonical_name: Federation Council
  description: The Federation Council serves as the interstellar deliberative and
    political authority for the United Federation of Planets, convening emergency
    sessions to weigh diplomatic crises and exert political pressure on executive
    and military branches. In the current material it assembles in response to a Romulan
    protest over a defector, signaling oversight, diplomatic priorities, and expectation
    that Starfleet and captains manage politically sensitive outcomes.
