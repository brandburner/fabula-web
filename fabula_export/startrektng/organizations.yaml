  global_id: ger_organization_32d00ab30377
  canonical_name: El-Aurians
  description: The El-Aurians are a people represented in the scene by Guinan; they
    appear as a victimized civilization annihilated by the Borg. Their destruction
    supplies compelling eyewitness authority that collapses diplomatic options and
    reframes command strategy. No internal institutions or hierarchy are shown; their
    role is chiefly cultural memory and a source of direct intelligence on Borg behavior.
