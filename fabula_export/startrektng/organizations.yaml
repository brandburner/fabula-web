- fabula_uuid: ger_organization_4b18cd9813be
  global_id: ger_organization_4b18cd9813be
  canonical_name: Farpoint Station
  description: Farpoint Station serves as a strategically significant orbital space
    station under the control of Bandi leader Groppler Zorn. It operates at the nexus
    of secrecy and escalating crisis, with its polite exterior concealing deep tensions
    and paranoia. The station becomes the focal point for an unfolding threat as an
    enormous, unknown vessel approaches its orbit, drawing urgent attention and defensive
    measures from key Federation personnel, including Captain Picard and his senior
    officers. The station's role extends beyond mere infrastructure to a site of political
    intrigue, hidden fears, and critical decision-making under pressure.
  sphere_of_influence: Strategic Orbital Control and Crisis Management
  season_appearances:
  - 1
  local_uuids:
