- fabula_uuid: ger_organization_307bfa211049
  global_id: ger_organization_307bfa211049
  canonical_name: Klingon Imperial Information Net
  description: The Klingon Imperial Information Net operates as the Empire's central
    database for official records, including restricted High Council files on events
    like the Khitomer massacre. K'Ehleyr interlocks with it via the Enterprise computer
    to cross-reference altered logs and probe Duras' biography. The system blocks
    unauthorized access, logs override attempts by Duras, and presents data in Klingon
    script and symbols. This bureaucratic repository exposes conspiracies through
    access restrictions and audit trails, bridging Klingon politics with external
    investigations.
  sphere_of_influence: Klingon Imperial Records Repository and Access Control
