  global_id: ger_organization_162f50a5738a
  canonical_name: Caldonians
  description: The Caldonians appear as a planetary people or political delegation
    represented at Ten Forward by the scholar-delegate Leyor. In the presented material
    they function as a negotiating faction and competitor in the Barzan Wormhole bidding,
    show diplomatic caution, and become a target of persuasion by rival negotiators.
    Their presence intersects with Federation envoys and competing parties, suggesting
    a formal civic or governmental representative role, though internal structure
    and hierarchy remain only minimally shown.
  sphere_of_influence: Interstellar Diplomacy and Planetary Representation (negotiating
    delegation/competitor in high-stakes resource bidding)
