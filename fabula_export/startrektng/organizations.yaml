- fabula_uuid: ger_organization_34c734482b9d
  global_id: ger_organization_34c734482b9d
  canonical_name: The Veterans
  description: 'A cohesive faction of engineered Angosian soldiers, led publicly by
    Roga Danar, who violently occupy the senate rotunda to demand formal recognition,
    reintegration, and accountability for the program that created them. They act
    as a militarized civil-rights movement: disciplined, battle-damaged, and politically
    uncompromising. Roughly a dozen are present during the confrontation, with a clear
    leadership voice but no shown formal bureaucracy. They force a public reckoning
    with the Angosian government and catalyze Federation actors to offer conditional
    rehabilitation rather than military intervention.'
  sphere_of_influence: Angosian Domestic Politics, Veteran Reintegration, and Militarized
    Civil Protest
