  episode_count: 0
- fabula_uuid: ger_organization_6753f0348b75
  global_id: ger_organization_6753f0348b75
  canonical_name: Crew of the Hathaway
  description: The Crew of the Hathaway comprises the forty personnel assigned to
    the derelict starship Hathaway. They represent a standard shipboard complement
    responsible for vessel operations and survival, currently immobilized and endangered;
    their potential abandonment sparks a heated moral and tactical debate aboard the
    Enterprise. The narrative implies a conventional command hierarchy but provides
    no names or ranks; the crew functions as allied non-Enterprise personnel whose
    rescue motivates urgent engineering and command decisions.
  sphere_of_influence: Starship Operations and Crew Welfare; Endangered Allied Personnel
  season_appearances:
  - 2
  local_uuids:
