  global_id: ger_organization_e258139dc203
  canonical_name: Emergency Crews
  description: A coalition of local rescue and medical response units that rushes
    to mass-casualty incidents; they arrive in identifiable emergency vehicles, establish
    a rescue perimeter, triage and treat the injured, and provide logistical support
    for ongoing scene operations. In the processed material they operate alongside
    Starfleet personnel and Rutian security, forming the immediate civilian emergency
    presence after a bombing while professional sweep teams and guards secure the
    site.
  sphere_of_influence: Local Emergency Response and Disaster Medical Services
