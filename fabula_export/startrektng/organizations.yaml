- fabula_uuid: ger_organization_46299d33c281
  global_id: ger_organization_46299d33c281
  canonical_name: Seronian and Rekag Peace Negotiation Delegation
  description: |-
    The combined leadership delegation from Seronia and Rekag, representing opposing factions in fragile interstellar peace negotiations. Their cooperation is critical to maintaining a ceasefire and preventing escalation into broader conflict. Key events include:
      - **Ceasefire violations and retaliatory strikes** that threaten diplomatic progress
      - **Trivial disputes** (e.g., seating arrangements) that reveal underlying tensions
      - **Commitment to mediation** with Ambassador Alkar in Darthen, announced as a breakthrough by Captain Riker
      - **Narrative disruptions** from Counselor Troi's empathic overload, which risks derailing negotiations
      The delegation's actions position them as pivotal figures in Federation-led diplomacy efforts to stabilize the region.
  sphere_of_influence: Interstellar Peace Negotiations
  season_appearances:
  - 6
  local_uuids:
