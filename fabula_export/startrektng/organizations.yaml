  global_id: ger_organization_a3ccc3827c29
  canonical_name: U.S.S. Enterprise-C
  description: A Starfleet warship operating under Federation authority, the U.S.S.
    Enterprise-C functions as a frontline exploratory and defensive vessel with a
    formal naval hierarchy (captain, bridge officers, engineering teams). In the processed
    material the crippled ship sustains catastrophic battle damage, suffers heavy
    casualties, and becomes the focal point of triage, evacuation decisions, and a
    mission-critical sacrificial action to restore a disrupted timeline. The Enterprise-C
    acts as an allied asset to the Enterprise-D and as the moral and tactical catalyst
    for decisive command choices.
  sphere_of_influence: Federation Starfleet Tactical, Exploratory, and Mission-Critical
