  global_id: ger_organization_60fd22833200
  canonical_name: Polity of Acamar
  description: The Polity of Acamar is the planetary governing authority of Acamar,
    currently led by the clan-based leader Marouk. The polity bears century-old clan
    feuds and a history of a failed amnesty that fractured society, producing entrenched
    divisions. Leadership operates through a centralized figure supported by retainers
    and clan stakeholders and exercises authority over whether external diplomatic
    reunification efforts may proceed.
  sphere_of_influence: Planetary Governance and Intercommunal Reunification Diplomacy
