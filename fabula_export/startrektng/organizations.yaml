- fabula_uuid: ger_organization_02f18b675840
  global_id: ger_organization_02f18b675840
  canonical_name: Tagra Four Planetary Authorities
  description: Tagra Four planetary authorities govern a world gripped by environmental
    crisis from barystatic filters and atmospheric ionization. Geordi La Forge and
    Amanda Rogers load shuttlecraft with supplies in Shuttlebay Two to rush relief
    to the planet. The authorities face criticism for favoring filters over emission
    regulations, which exacerbated the disaster. Commander Riker oversees preparations,
    marking the group as desperate recipients of Enterprise intervention amid policy
    failures that threaten planetary stability.
  sphere_of_influence: Planetary Governance and Environmental Crisis Response
  season_appearances:
