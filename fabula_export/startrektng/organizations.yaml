  global_id: ger_organization_cee13d24400f
  canonical_name: Robin’s Men (Picard’s Crew in Disguise)
  description: Picard’s Starfleet crew—including Riker, Data, Geordi, and others—poses
    as Robin Hood’s merry men in Q’s simulated medieval England. Vash drafts a letter
    to Riker’s men among them, pleading for rescue of Picard from execution in Sherwood
    Forest. They function as covert allies ready to intervene, their Starfleet discipline
    hidden behind outlaw roles amid Q’s manipulative game.
  sphere_of_influence: Covert Rescue Operations in Simulated Sherwood Forest
  season_appearances:
