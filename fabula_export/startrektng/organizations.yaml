  description: Starfleet Surveillance Teams maintain a covert presence on Malcor III's
    surface, monitoring the planet for years to prepare for first contact. Operatives
    conduct secret observations, including undercover roles like Riker's tourist disguise.
    Picard and Troi reveal this operation to Mirasta Yale in Ten Forward, prompting
