  global_id: ger_organization_fd61366f9060
  canonical_name: Stacius Trade Guild
  description: A legitimate (or officially recognized) interstellar trade guild to
    which Kivas Fajo belongs, serving as his professional background and front for
    his criminal activities. Uncovered in Fajo's biographical file during the *Enterprise*
    crew's investigation, but not directly involved in the abduction or deception
    plot.
