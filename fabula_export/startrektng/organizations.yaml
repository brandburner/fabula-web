  global_id: ger_organization_b14b0dc27467
  canonical_name: Planetary Society of Brekka
  description: The Planetary Society of Brekka governs the planet Brekka, overseeing
    the cultivation, production, and shipment of Felicium, a rare and economically
    significant substance. Brekka maintains a longstanding trade relationship with
    the neighboring planet Ornara, negotiating ownership and control of the Felicium
    cargo. Represented by delegates Sobi and Langor, this society asserts economic
    and territorial claims over Felicium resources, engaging in tense disputes rooted
    in the substance's critical role in interplanetary commerce and the unfolding
    ethical crisis aboard the Enterprise. Their negotiations reveal a complex social
    structure balancing planetary sovereignty, trade interests, and diplomatic relations
    under high-stakes pressures.
  sphere_of_influence: Planetary Governance and Interplanetary Trade of Felicium
