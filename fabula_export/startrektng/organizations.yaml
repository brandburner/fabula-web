  canonical_name: Dremans (inhabitants of Drema Four)
  description: The Dremans are the civilian inhabitants/native population of the planet
    Drema Four, depicted as noncombatant victims of an ecological/technological catastrophe.
    Lacking shown governance or military structures, they function mainly as a humanitarian
    constituency whose survival and the plea of a child provoke a Starfleet ethical
    crisis and debate over Prime Directive noninterference.
