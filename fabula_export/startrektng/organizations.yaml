  canonical_name: Kivas Fajo's Zibalian Trader Network (Fajo's Crew)
  description: A ruthless criminal syndicate disguised as hytritium traders aboard
    the *Jovis*, directly responsible for Data's abduction, high-value thefts, and
    deception of the *Enterprise* crew. Operates as Fajo's active operational unit,
    distinct from his legitimate Stacius Trade Guild affiliation.
