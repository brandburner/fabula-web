  global_id: ger_organization_7d4cdee4fbd4
  canonical_name: The Enterprise (Ship and Crew)
  description: A Federation starship and its command crew that operate as a single,
    decisive operational unit. In the processed material, the ship executes recovery
    and medical-evacuation orders, reassigns mission priorities, and conducts high‑speed
    course changes and warp transit on command. Command hierarchy centers on the ship's
    captain and senior bridge officers who coordinate tactical, engineering, medical,
    and diplomatic responses under time pressure.
  sphere_of_influence: Starship Operations, Crisis Response, and Interstellar Diplomacy
  season_appearances:
