- fabula_uuid: ger_organization_9c3b239c3938
  global_id: ger_organization_9c3b239c3938
  canonical_name: Mintakan Community
  description: 'The Mintakan Community is the indigenous people implicated by Liko''s
    presence aboard the starship; they represent a distinct local culture whose social
    fabric and memory are at risk of contamination by off-world contact. Within the
    current material they act as an affected population rather than a formal political
    body: their primary role is custodial stewardship of cultural knowledge and norms
    threatened by external intervention. Starfleet personnel frame decisions about
    medical care and memory alteration around protecting the Mintakan Community''s
    cultural integrity and long-term autonomy.'
  sphere_of_influence: Indigenous Cultural Community and Local Societal Integrity
  season_appearances:
  - 3
  local_uuids:
    1: organization_02b43dbe98f7
  first_appearance_season: 3
