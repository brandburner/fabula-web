- fabula_uuid: ger_organization_60f75ea5c663
  global_id: ger_organization_60f75ea5c663
  canonical_name: Enterprise Ship's Training Division
  description: The Enterprise Ship's Training Division functions as the specialized
    branch responsible for ongoing crew education and training aboard the starship
    Enterprise. During a critical contagion-induced psychological crisis, this division
    issues unusual orders mandating all officers attend a metaphysics lecture, reflecting
    its role in coordinating shipwide instructional activities even amid deteriorating
    discipline and command stability. Its actions illustrate how routine training
    protocols can become disrupted and manipulated under exceptional internal threats,
    impacting overall ship operations.
  sphere_of_influence: Starship Crew Training and Education
