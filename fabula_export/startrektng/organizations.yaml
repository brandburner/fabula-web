- fabula_uuid: ger_organization_b31cfeec83a3
  global_id: ger_organization_b31cfeec83a3
  canonical_name: Cardassian Militia
  description: The Cardassian Militia conducted a sabotage attack on the Federation
    colony at Setlik Three, killing civilians including Benjamin Maxwell's family.
    Chief Miles O’Brien names them as the perpetrators during a tense meeting aboard
    the Enterprise, where their actions spark Maxwell's vendetta against Cardassian
    targets and exacerbate Federation-Cardassian hostilities. Gul Macet and the Enterprise
    crew reference this incident as the root of ongoing border tensions, marking the
    militia as a provocative military force.
  sphere_of_influence: Military Sabotage and Border Aggression
  season_appearances:
