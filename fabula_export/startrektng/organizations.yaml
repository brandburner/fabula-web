- fabula_uuid: ger_organization_1fd784ccd7d6
  global_id: ger_organization_1fd784ccd7d6
  canonical_name: Cairn
  description: The Cairn operate as a telepathic species without spoken language,
    relying on intense image-based telepathy for communication. Lwaxana Troi instructs
    representatives Hedril and Maques in verbal skills to enable Federation integration.
    They host a reception in Ten Forward, where their adaptation efforts intersect
    with Enterprise crew interactions, revealing emotional strain on their instructor
    and cultural barriers in diplomacy.
  sphere_of_influence: Telepathic Species Adaptation and Federation Cultural Integration
  season_appearances:
