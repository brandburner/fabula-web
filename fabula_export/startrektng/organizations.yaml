  canonical_name: Klingon Congregation
  description: A mobilized assembly of Klingon citizens and background figures gathered
    in the Great Hall who function as a public audience, ritual witness, and source
    of communal pressure. Their visible reactions and presence enforce cultural norms,
    escalate political stakes around honor disputes, subject participants to public
    scrutiny, and indirectly influence High Council dynamics and individual decisions.
  sphere_of_influence: Public social pressure and ritual witnessing within Klingon
