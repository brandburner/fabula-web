- fabula_uuid: ger_organization_53f025150870
  global_id: ger_organization_53f025150870
  canonical_name: Romulan Warbird (Tomalak's Command)
  description: A Romulan Star Empire military warbird commanded by Tomalak, acting
    as an antagonistic tactical and diplomatic instrument. The vessel breaches Federation
    border space, threatens the USS Enterprise by routing power to disruptors, and
    exercises centralized shipboard command able to escalate toward conflict or halt
    hostilities through negotiation. It operates as a frontier coercion and political
    signal between Romulan and Federation actors.
  sphere_of_influence: Romulan military projection, tactical engagement, and border
    enforcement in contested interstellar space
  season_appearances:
