  global_id: ger_organization_7a4611cb637f
  canonical_name: Promellian
  description: An ancient Promellian polity that projected power through heavily armed
    capital ships, here represented by a derelict Promellian battle cruiser. The Promellian
    function as a militarized interstellar culture whose surviving artifacts serve
    as political and cultural signifiers, anchoring historical claims, informing contemporary
    research, and posing latent hazards uncovered by modern explorers.
  sphere_of_influence: Ancient Interstellar Military and Political Influence
  season_appearances:
