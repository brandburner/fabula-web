- fabula_uuid: ger_organization_62f62b477ef7
  global_id: ger_organization_62f62b477ef7
  canonical_name: Ferengi Vessel Crew (Hekaras Ambush)
  description: A *specific operational group* of Ferengi commanding a *vessel adrift
    near the Hekaras system*, engaged in a *deceptive ambush* of the *USS Enterprise*.
    Unlike the Ferengi Council (an institutional body), this crew acts as a *tactical
    unit* focused on *self-interest, deception, and hostility*, with no connection
    to governing authorities.
  sphere_of_influence: Deceptive Hostile Engagements
  season_appearances:
