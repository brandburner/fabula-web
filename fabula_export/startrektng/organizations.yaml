  tier: asteroid
  episode_count: 0
- fabula_uuid: ger_organization_c3dcc7ba74d8
  global_id: ger_organization_c3dcc7ba74d8
  canonical_name: Starbase 515
  description: Starbase 515 is a Federation orbital medical and emergency-response/support
    installation. The consolidated record describes an orbital clinical coordination
    node with an advanced surgical suite staffed by surgeons, anesthesiologists, nurses,
